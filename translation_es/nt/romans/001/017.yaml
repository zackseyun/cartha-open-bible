translation:
  language: es
  text: 'Porque en él[a] se revela la justicia de Dios, de fe en fe[b], como está escrito: «El justo vivirá por la fe[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, en el evangelio; el pronombre griego es neutro y remite al evangelio mencionado en el contexto anterior.
    reason: referent_clarification
  - marker: b
    text: La expresión griega ἐκ πίστεως εἰς πίστιν es un crux famoso; «de fe en fe» conserva la repetición retórica y deja abierta la ambigüedad. También puede entenderse como «desde la fe hacia la fe», «de la fe para la fe» o «por fe de principio a fin».
    reason: alternative_reading
  - marker: c
    text: O «el que es justo por la fe vivirá».
    reason: alternative_reading
lexical_decisions:
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: En español bíblico contemporáneo, «justicia de Dios» conserva la fuerza programática de Romanos y además permite mantener la tensión semántica entre justicia forense, fidelidad pactual y rectitud moral. «Rectitud» sería posible, pero atenúa el peso jurídico y teológico del término en este contexto.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo transparente con «de Dios», sin resolver interpretativamente si se trata de la justicia propia de Dios, proveniente de Dios o relacionada con su acción. Esto sigue la cautela del POB inglés.
- source_word: ἐν αὐτῷ
  english_pob_choice: in it
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  lexicon: BDAG
  rationale: Aunque el antecedente gramatical más natural del pronombre en español sería neutro conceptual, en español bíblico «en él» puede referirse al evangelio mencionado en el contexto inmediato. La alternativa «en ello» suena más abstracta y menos natural; se opta por una formulación idiomática sin alterar el referente contextual.
- source_word: ἀποκαλύπτεται
  english_pob_choice: is revealed
  chosen_spanish: se revela
  alternatives_spanish:
  - es revelada
  - está siendo revelada
  lexicon: BDAG
  rationale: «Se revela» comunica bien el pasivo/divino en español y evita una construcción más pesada como «es revelada», manteniendo el valor presente del verbo sin sobreinterpretar el aspecto.
- source_word: ἐκ πίστεως εἰς πίστιν
  english_pob_choice: from faith to faith
  chosen_spanish: desde la fe y para la fe
  alternatives_spanish:
  - de fe en fe
  - por fe y para fe
  - de la fe para la fe
  lexicon: BDAG
  rationale: 'La secuencia preposicional griega es notoriamente difícil. En español, «desde... y para...» preserva el movimiento retórico y evita una calca poco natural («de fe en fe») sin cerrar la ambigüedad. El sentido exacto sigue abierto: origen/meta, inicio/continuidad o relación entre fidelidad y fe.'
- source_word: δίκαιος
  english_pob_choice: the righteous one
  chosen_spanish: el justo
  alternatives_spanish:
  - el que es justo
  - la persona justa
  lexicon: BDAG
  rationale: «El justo» reproduce de forma natural el sustantivo adjetival singular masculino del texto citado. Es la fórmula bíblica más directa en español y mantiene la resonancia de la cita de Habacuc.
- source_word: ἐκ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - a causa de la fe
  - por medio de la fe
  lexicon: BDAG
  rationale: En la cita, «por la fe» es la opción más idiomática y amplia en español. Puede leerse instrumentally o modalmente, sin decidir de antemano si la frase se une con «vivirá» o con «el justo».
- source_word: ζήσεται
  english_pob_choice: shall live
  chosen_spanish: vivirá
  alternatives_spanish:
  - vivirá ciertamente
  - ha de vivir
  lexicon: BDAG
  rationale: «Vivirá» transmite el futuro del verbo de manera natural en español y conserva el tono escritural de la cita sin añadir solemnidad arcaizante innecesaria.
theological_decisions:
- issue: Sentido de δικαιοσύνη θεοῦ
  english_pob_reading: the righteousness of God
  chosen_spanish_reading: la justicia de Dios
  alternative_spanish_readings:
  - la justicia procedente de Dios
  - la rectitud de Dios
  rationale: 'Se mantiene la ambigüedad productiva del original: justicia de Dios como atributo divino, acción salvífica o justicia que procede de él. No se sustituye por una paráfrasis explicativa para no perder el peso doctrinal del pasaje en Romanos.'
  doctrine_reference: DOCTRINE.md; preservar tensión lexical-teológica en δικαιοσύνη.
- issue: Sentido de ἐκ πίστεως εἰς πίστιν
  english_pob_reading: from faith to faith
  chosen_spanish_reading: desde la fe y para la fe
  alternative_spanish_readings:
  - de fe en fe
  - por fe, para fe
  - por la fe, y hacia la fe
  rationale: La frase es genuinamente debatida y el POB inglés deja abierta la crux. En español se evita una solución doctrinal cerrada; la formulación conserva el doble movimiento sin imponer una interpretación única.
  doctrine_reference: Preservar la ambigüedad exegética; πίστις se rinde normalmente como fe.
- issue: Alcance de ἐκ πίστεως en la cita de Habacuc
  english_pob_reading: The righteous one shall live by faith.
  chosen_spanish_reading: El justo vivirá por la fe.
  alternative_spanish_readings:
  - El justo, por la fe, vivirá.
  - El que es justo por la fe vivirá.
  rationale: La colocación «por la fe» corresponde al uso tradicional y al mismo tiempo deja abierta la cuestión sintáctica de si modifica a «vivirá» o a «el justo». Se evita resolverla en la traducción principal, como hace el POB inglés.
  doctrine_reference: Cita de Habacuc 2:4; preservar la tensión sintáctica.
- issue: Función de la partícula δέ en la cita
  english_pob_reading: The righteous one shall live by faith.
  chosen_spanish_reading: El justo vivirá por la fe.
  alternative_spanish_readings:
  - Pero el justo vivirá por la fe.
  - Y el justo vivirá por la fe.
  rationale: Aunque δέ puede introducir contraste, en este lugar su fuerza es leve y, como en el POB inglés revisado, traducirla con «pero» haría la cita más áspera en español. Se omite para mantener fluidez y la función de apoyo escritural del pasaje.
  doctrine_reference: Revisión auditada del POB inglés; evitar contraste indebido.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó el contraste explícito de δέ en la cita de Habacuc para evitar una lectura adversativa forzada. Por ello, la versión española omite «pero» y mantiene una cita fluida. También se respetó el estado más reciente del POB inglés, sin introducir nuevas decisiones doctrinales no sustentadas por el auditable del original.
  spanish_consistency_notes:
  - Se mantuvo «justicia» como término principal para δικαιοσύνη, en línea con la carga teológica paulina y con el aviso lexical del proyecto.
  - Se evitó «Cristo» porque el versículo no lo contiene; el texto español conserva el referente contextual del evangelio con «en él».
  - Se prefirió «por la fe» en la cita, pero se desambiguó mediante nota porque el español permite la misma tensión sintáctica que el griego.
  - Se omitió la conjunción adversativa equivalente a «pero», siguiendo la revisión del audit trail inglés.
  - La puntuación y el orden siguen un estilo bíblico legible en español latinoamericano sin sacrificar la proximidad al original.
