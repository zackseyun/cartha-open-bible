revisions:
- from: 'Porque en él se revela la justicia[a] de Dios, desde la fe[b] y para la fe[b], como está escrito: «El justo vivirá por la fe[c]».'
  to: 'Porque en él[a] se revela la justicia de Dios, de fe en fe[b], como está escrito: «El justo vivirá por la fe[c]».'
  rationale: Se revisa «en él» con nota para evitar que el español oscurezca el referente neutro del griego, que apunta al evangelio. Se cambia «desde la fe y para la fe» por «de fe en fe» porque es más idiomático en español, conserva mejor la repetición compacta del original y se alinea mejor con la decisión auditada del POB inglés de mantener la ambigüedad sin sobreexplicar. La cita final se mantiene, pues es fiel, natural y teológicamente prudente.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:10:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y preserva la ambigüedad de δικαιοσύνη θεοῦ y de la cita de Habacuc. Sin embargo, falla en un punto importante: ἐν αὐτῷ es neutro y remite más naturalmente al evangelio, por lo que «en él» introduce en español una referencia masculina impropia y potencialmente personal. Además, «desde la fe y para la fe» no sigue con suficiente fidelidad la decisión auditada del POB inglés de conservar la repetición preposicional más cercana a «from faith to faith»; en español «de fe en fe» es más natural, más tradicional y mejor alineado con la preservación de la ambigüedad sin añadir una conjunción no presente en el griego.'
  spanish_quality_summary: El texto es legible y digno, pero «en él» suena ambiguo y puede hacer pensar en una persona en vez del evangelio. «Desde la fe y para la fe» resulta algo forzado y explicativo. «La justicia de Dios» y «El justo vivirá por la fe» son buenas opciones en español bíblico contemporáneo.
  glossary_alignment: 'Buena alineación general con el glosario: δικαιοσύνη -> «justicia», θεοῦ -> «de Dios», πίστις -> «fe». No hay conflictos con términos de proyecto mayores. La principal desviación es de fidelidad gramatical y de la racionalidad auditada, no de glosario.'
  issues:
  - severity: high
    issue: «en él» para ἐν αὐτῷ
    rationale: El pronombre griego es neutro singular y en el contexto remite al evangelio de 1:16. En español, «en él» normalmente se oye como masculino personal o concreto, y no preserva bien el vínculo gramatical que el POB inglés justificó con «in it». Conviene usar «en él[a]» con nota aclaratoria solo si el antecedente se explicita mejor, o mejor aún explicitar «en el evangelio» cuando el contexto lo exige. Dado que el griego usa pronombre y no sustantivo repetido, una nota permite preservar concisión sin perder referencia.
  - severity: medium
    issue: «desde la fe y para la fe» para ἐκ πίστεως εἰς πίστιν
    rationale: Aunque intenta conservar el doble movimiento, añade la conjunción «y», suena poco idiomático, y se aparta de la decisión del POB inglés de preservar la fórmula compacta y retóricamente repetitiva. «De fe en fe» es una opción española establecida, natural, y suficientemente abierta; las alternativas más interpretativas pueden ir en nota.
  - severity: low
    issue: Nota léxica de δικαιοσύνη
    rationale: La nota actual ofrece «rectitud», pero el POB inglés documentó específicamente «justice» como alternativa. En español conviene conservar «justicia» en el texto principal y ofrecer «rectitud» como alternativa solo si se desea, pero la nota debe reflejar mejor la tensión entre «justicia» y otras posibilidades. Como el texto principal ya usa «justicia», la nota puede señalar «O «la rectitud de Dios»» para mantener utilidad real.
  revised_spanish_text: 'Porque en él[a] se revela la justicia de Dios, de fe en fe[b], como está escrito: «El justo vivirá por la fe[c]».'
  revised_footnotes:
  - marker: a
    text: Es decir, en el evangelio; el pronombre griego es neutro y remite al evangelio mencionado en el contexto anterior.
    reason: referent_clarification
  - marker: b
    text: La expresión griega ἐκ πίστεως εἰς πίστιν es un crux famoso; «de fe en fe» conserva la repetición retórica y deja abierta la ambigüedad. También puede entenderse como «desde la fe hacia la fe», «de la fe para la fe» o «por fe de principio a fin».
    reason: alternative_reading
  - marker: c
    text: O «el que es justo por la fe vivirá».
    reason: alternative_reading
  revision_rationale: Se revisa «en él» con nota para evitar que el español oscurezca el referente neutro del griego, que apunta al evangelio. Se cambia «desde la fe y para la fe» por «de fe en fe» porque es más idiomático en español, conserva mejor la repetición compacta del original y se alinea mejor con la decisión auditada del POB inglés de mantener la ambigüedad sin sobreexplicar. La cita final se mantiene, pues es fiel, natural y teológicamente prudente.
