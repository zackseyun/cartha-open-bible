lexical_decisions:
- source_word: φάσκοντες
  english_pob_choice: Claiming
  chosen_spanish: Afirmando
  alternatives_spanish:
  - Alegando
  - Profesando
  lexicon: BDAG
  rationale: El participio presente expresa su autoafirmación sobre sí mismos. «Afirmando» conserva el matiz de declaración propia y suena natural en español sin debilitar la ironía del texto.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: ser
  alternatives_spanish:
  - estar
  lexicon: BDAG
  rationale: El infinitivo completa el contenido de la afirmación. «Ser» reproduce de forma directa la estructura del griego y la formulación de la pretensión.
- source_word: σοφοὶ
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - sabios de verdad
  lexicon: BDAG
  rationale: El adjetivo predicativo se traduce con un sustantivo/adjetivo sustantivado natural en español. «Sabios» mantiene la contraposición compacta con «necios» y el tono irónico de Pablo.
- source_word: ἐμωράνθησαν
  english_pob_choice: they became fools
  chosen_spanish: se volvieron necios
  alternatives_spanish:
  - se hicieron necios
  - se volvieron tontos
  - fueron hechos necios
  lexicon: BDAG
  rationale: 'El aoristo pasivo/intransitivo de μωραίνω aquí tiene fuerza resultativa: pasaron a ser necios. «Se volvieron necios» conserva el contraste antitético con «sabios» y evita suavizarlo a «necios» meramente como rasgo de conducta.'
theological_decisions:
- issue: Fuerza antitética entre la autoevaluación humana y el veredicto de Pablo
  english_pob_reading: Claiming to be wise, they became fools
  chosen_spanish_reading: Afirmando ser sabios, se volvieron necios
  alternative_spanish_readings:
  - Profesando ser sabios, se hicieron necios
  - Afirmando ser sabios, se hicieron necios
  - Afirmando ser sabios, fueron hechos necios
  rationale: 'La línea de Pablo es irónica y contrastiva: una pretensión de sabiduría queda desmentida por el resultado. «Se volvieron necios» preserva la lectura resultativa sin resolver la tensión entre cualidad moral y designación personal.'
  doctrine_reference: Rom 1:22; preservar la tensión retórica y moral del texto sin explicitar más de lo que el griego dice.
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y quedó sin cambios; la versión española sigue de cerca la elección óptima equivalente del audit trail, manteniendo la ironía, el paralelismo y la fuerza resultativa del aoristo pasivo.
  spanish_consistency_notes:
  - Se evita «SEÑOR»/cambios terminológicos no pertinentes; no aparece vocabulario doctrinal ajeno al versículo.
  - «Sabios» y «necios» mantienen el paralelismo antitético del griego y la traducción auditada en inglés.
  - Las notas alternativas reproducen la tensión léxica principal sin añadir interpretaciones ajenas al texto.
