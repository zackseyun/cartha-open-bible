translation:
  language: es
  text: Primero, doy gracias a mi Dios por medio de Jesús Mesías[a] por todos ustedes[b], porque su fe es proclamada en todo el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesucristo».
    reason: alternative_reading
  - marker: b
    text: O «su fidelidad»; también posiblemente «su confianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: Πρῶτον μὲν
  english_pob_choice: First
  chosen_spanish: Primero
  alternatives_spanish:
  - En primer lugar
  - Primeramente
  lexicon: BDAG
  rationale: El valor discursivo de Πρῶτον μὲν introduce el primer punto de la carta. En español, «Primero» comunica esa apertura de forma natural; μὲν no requiere traducción explícita porque funciona como partícula de enlace.
- source_word: εὐχαριστῶ
  english_pob_choice: I thank
  chosen_spanish: doy gracias
  alternatives_spanish:
  - agradezco
  - doy gracias a
  lexicon: BDAG
  rationale: El verbo expresa acción de agradecimiento. «Doy gracias» conserva el matiz verbal y suena natural y reverente en español bíblico actual.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a Dios mío
  - a mi Dios
  lexicon: BDAG
  rationale: El dativo con posesivo expresa el objeto de la acción de gracias. «A mi Dios» mantiene la relación personal de Pablo con Dios sin forzar una formulación extraña en español.
- source_word: διὰ Ἰησοῦ Χριστοῦ
  english_pob_choice: through Jesus Messiah
  chosen_spanish: por medio de Jesucristo
  alternatives_spanish:
  - por medio de Jesús Mesías
  - por medio de Jesús Cristo
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación; «por medio de» la conserva con claridad. Para Χριστοῦ, el español eclesial y la revisión del tramo en inglés muestran que «Jesucristo» es la forma más readable y fiel en este verso, sin borrar el título cristológico.
- source_word: περὶ πάντων ὑμῶν
  english_pob_choice: for all of you
  chosen_spanish: por todos ustedes
  alternatives_spanish:
  - acerca de todos ustedes
  - en favor de todos ustedes
  lexicon: BDAG
  rationale: En un contexto de acción de gracias, περί puede equivaler idiomáticamente a «por» o «en favor de». «Por todos ustedes» suena natural en español y conserva la amplitud inclusiva del grupo.
- source_word: ἡ πίστις ὑμῶν
  english_pob_choice: your faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su fidelidad
  - su confianza
  lexicon: BDAG
  rationale: El término πίστις se rinde de forma básica como «fe», siguiendo el valor principal usado en el proyecto. Se mantiene la posibilidad de matices alternativos en la nota, sin resolver prematuramente la tensión semántica.
- source_word: καταγγέλλεται
  english_pob_choice: is being proclaimed
  chosen_spanish: es proclamada
  alternatives_spanish:
  - se anuncia
  - está siendo proclamada
  lexicon: BDAG
  rationale: El pasivo presente indica una proclamación pública en curso. «Es proclamada» preserva la voz pasiva y resulta más natural y sobria en español bíblico que una perífrasis más pesada.
- source_word: ἐν ὅλῳ τῷ κόσμῳ
  english_pob_choice: throughout the whole world
  chosen_spanish: en todo el mundo
  alternatives_spanish:
  - por todo el mundo
  - en el mundo entero
  lexicon: BDAG
  rationale: κόσμος aquí funciona en alcance retórico amplio. «En todo el mundo» comunica adecuadamente la extensión global sin exagerar el giro idiomático español.
theological_decisions:
- issue: Tratamiento de Χριστοῦ en la fórmula «διὰ Ἰησοῦ Χριστοῦ»
  english_pob_reading: Jesus Messiah / Jesus Christ (revision history shows a brief editorial oscillation)
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús Cristo
  rationale: Aunque el proyecto suele preferir «Mesías» para Χριστός cuando el título está vivo, en esta fórmula nominativa fija el español bíblico reconoce ampliamente «Jesucristo». Esa forma evita una lectura forzada y no borra la referencia titulada, mientras sigue siendo transparente para el lector.
  doctrine_reference: 'DOCTRINE.md: Contested terms / Translate titles; preserve auditable exceptions'
- issue: Valor de πίστις en «ἡ πίστις ὑμῶν»
  english_pob_reading: your faith; also possibly your faithfulness, your trust
  chosen_spanish_reading: su fe
  alternative_spanish_readings:
  - su fidelidad
  - su confianza
  rationale: «Fe» es la lectura principal y más directa para πίστις en este contexto de testimonio cristiano. Se conservan alternativas porque el término puede abarcar confianza o fidelidad, pero el flujo del versículo favorece la proclamación de la fe como tal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Sentido retórico de περί en «περὶ πάντων ὑμῶν»
  english_pob_reading: for all of you
  chosen_spanish_reading: por todos ustedes
  alternative_spanish_readings:
  - acerca de todos ustedes
  - respecto de todos ustedes
  rationale: La preposición περί admite un valor de «acerca de», pero en una acción de gracias funciona idiomáticamente como «por/en favor de». La opción elegida mantiene la tonalidad de gratitud sin introducir una frialdad explicativa.
  doctrine_reference: 'DOCTRINE.md: Idiom and discourse particles'
translation_notes:
  revision_awareness: El contexto inglés muestra una oscilación editorial entre «Jesus Messiah» y «Jesus Christ», con una corrección posterior que restauró «Messiah» conforme a la política del proyecto. Para el español, se escogió «Jesucristo» por ser la forma de alta legibilidad y uso eclesial en un sintagma fijo, sin negar el título cristológico subyacente. También se preservó la alternativa semántica de πίστις en nota, como en el expediente inglés.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός y la posesión «mi Dios» para reflejar el tono personal del apóstol.
  - Se mantuvo «fe» para πίστις en el texto principal, con alternativas en nota para no cerrar el alcance semántico.
  - Se evitó traducir mecánicamente περί como «acerca de» porque el español idiomático en una acción de gracias pide una construcción más natural.
  - La cláusula final se formuló como «es proclamada» para conservar el pasivo presente y el sentido de divulgación continua.
