  glossary_alignment: Hay desalineación con la pauta del proyecto para Χριστός -> normalmente «Mesías». En este versículo no hay una excepción documentada válida en el estado final del audit trail; al contrario, la revisión final corrigió un desvío y restauró «Messiah». Por ello, el español debe reflejar «Jesús Mesías» en el texto principal. La nota alternativa puede preservar «Cristo» como forma tradicional. El tratamiento de πίστις como «fe» con nota para «fidelidad/confianza» sí está alineado.
