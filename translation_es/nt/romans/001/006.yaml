lexical_decisions:
- source_word: ἐν οἷς
  english_pob_choice: among whom
  chosen_spanish: entre quienes
  alternatives_spanish:
  - en quienes
  - entre los cuales
  lexicon: BDAG
  rationale: El relativo plural dativo retoma a las naciones mencionadas antes; en español, «entre quienes» expresa mejor la inclusión dentro de ese grupo que un calco como «en quienes».
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: también ustedes
  alternatives_spanish:
  - ustedes también
  - y ustedes
  lexicon: BDAG
  rationale: Mantiene el énfasis inclusivo de Pablo y suena natural en español moderno.
- source_word: κλητοὶ
  english_pob_choice: called
  chosen_spanish: llamados
  alternatives_spanish:
  - llamados y convocados
  - convocados
  lexicon: BDAG
  rationale: «Llamados» conserva la fuerza lexical y teológica de κλητός sin añadir interpretación; «convocados» sería más técnico y menos natural aquí.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - el Mesías Jesús
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» conforme a la política del proyecto y por tratarse aquí de un título, no de un nombre fijo.
theological_decisions:
- issue: Relación genitiva en κλητοὶ Ἰησοῦ Χριστοῦ
  english_pob_reading: called of Jesus Messiah
  chosen_spanish_reading: llamados de Jesús Mesías
  alternative_spanish_readings:
  - llamados por Jesús Mesías
  - llamados que pertenecen a Jesús Mesías
  rationale: La construcción griega es compacta y puede sugerir relación o posesión; «de Jesús Mesías» mantiene esa relación abierta sin forzar en español una expansión doctrinal. Se evita añadir «por» como lectura exclusiva de agencia.
  doctrine_reference: Romanos 1:6; cf. el uso paulino de κλητός en contextos de llamado divino
translation_notes:
  revision_awareness: 'La revisión inglesa pasó de una paráfrasis interpretativa («called to belong to») a una formulación más cercana al genitivo griego («called of»), y luego restauró «Messiah» por coherencia doctrinal. La versión española sigue esa línea reciente: conserva la relación compacta del original y mantiene «Mesías» para Χριστός.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» en lugar de «Cristo» para Χριστός, en conformidad con la política del proyecto y el registro del pasaje.
  - «Llamados» se usó en sentido vocacional/teológico, sin convertirlo en «elegidos» ni expandirlo a una idea de pertenencia explícita no expresada por el griego.
  - La preposición «de» en español refleja la elasticidad del genitivo griego; la nota preserva la alternativa de agencia («por»).
