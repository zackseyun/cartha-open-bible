translation:
  language: es
  text: Porque sus atributos invisibles[a], es decir, su poder eterno y su divinidad[b], se dejan ver claramente desde la creación del mundo, siendo entendidos por medio de lo que ha sido hecho, de modo que no tienen excusa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus cualidades invisibles».
    reason: lexical_alternative
  - marker: b
    text: O «naturaleza divina»; la palabra griega aquí es θειότης, no el término más fuerte θεότης.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ ἀόρατα αὐτοῦ
  english_pob_choice: his invisible attributes
  chosen_spanish: las cosas invisibles de él
  alternatives_spanish:
  - sus atributos invisibles
  - sus cosas invisibles
  lexicon: BDAG
  rationale: El neutro plural puede abarcar todo lo que en Dios no es visible. En español, «las cosas invisibles de él» conserva esa amplitud sin forzar un término técnico; luego la apposición aclara que se trata de su poder eterno y su divinidad.
- source_word: ἀπὸ κτίσεως κόσμου
  english_pob_choice: since the creation of the world
  chosen_spanish: desde la creación del mundo
  alternatives_spanish:
  - a partir de la creación del mundo
  - desde que fue creado el mundo
  lexicon: BDAG
  rationale: La preposición marca un punto temporal de referencia. «Desde» reproduce con naturalidad ese valor temporal en español y mantiene la idea de que la percepción ha estado disponible desde el inicio de la creación.
- source_word: τοῖς ποιήμασιν
  english_pob_choice: through what has been made
  chosen_spanish: por medio de lo que ha sido hecho
  alternatives_spanish:
  - por medio de las cosas hechas
  - a través de lo creado
  lexicon: BDAG
  rationale: 'El dativo es instrumental: lo creado sirve de medio para llegar al conocimiento. «Por medio de lo que ha sido hecho» conserva el pasivo/resultativo de la construcción y evita una paráfrasis excesiva.'
- source_word: νοούμενα
  english_pob_choice: being understood
  chosen_spanish: siendo entendidas
  alternatives_spanish:
  - siendo comprendidas
  - al ser entendidas
  lexicon: BDAG
  rationale: El participio explica cómo las cosas invisibles se vuelven cognoscibles. «Siendo entendidas» mantiene la dimensión mental del verbo sin volver el estilo demasiado técnico.
- source_word: καθορᾶται
  english_pob_choice: have been clearly seen
  chosen_spanish: se dejan ver claramente
  alternatives_spanish:
  - se ven claramente
  - han sido vistas claramente
  lexicon: BDAG
  rationale: El verbo intensivo expresa una visión clara y manifiesta. «Se dejan ver claramente» comunica esa visibilidad patente en español y sugiere continuidad sin depender de un perfecto compuesto forzado.
- source_word: ἥ τε ἀΐδιος αὐτοῦ δύναμις
  english_pob_choice: his eternal power
  chosen_spanish: su poder eterno
  alternatives_spanish:
  - su poder perpetuo
  - su poder sin fin
  lexicon: BDAG
  rationale: «ἀΐδιος» expresa permanencia eterna. «Poder eterno» es la forma más natural y fiel en español, manteniendo la idea de potencia divina duradera.
- source_word: θειότης
  english_pob_choice: divinity
  chosen_spanish: su divinidad
  alternatives_spanish:
  - su naturaleza divina
  - su deidad
  lexicon: BDAG
  rationale: La palabra θειότης apunta a cualidad divina, no al término más fuerte θεότης. «Divinidad» preserva esa distinción mejor que «deidad» y evita sobrecargar el texto con un término menos transparente.
- source_word: εἰς τὸ εἶναι αὐτοὺς ἀναπολογήτους
  english_pob_choice: so that they are without excuse
  chosen_spanish: de modo que no tienen excusa
  alternatives_spanish:
  - para que queden sin excusa
  - así que están sin excusa
  lexicon: BDAG
  rationale: La construcción expresa resultado. «De modo que» y «no tienen excusa» comunican con naturalidad el efecto final del argumento paulino en español contemporáneo.
theological_decisions:
- issue: Distinguir θειότης de θεότης sin perder fuerza teológica
  english_pob_reading: divinity
  chosen_spanish_reading: divinidad
  alternative_spanish_readings:
  - naturaleza divina
  - deidad
  rationale: El texto afirma que la creación revela algo verdaderamente divino de Dios, pero θειότης no exige la formulación más fuerte de «deidad». «Divinidad» conserva la afirmación teológica y mantiene la distinción léxica observada en el POB en inglés.
  doctrine_reference: Romanos 1:20; distinción léxica entre θειότης y θεότης
translation_notes:
  revision_awareness: El inglés POB fue revisado de una construcción con raya y «both» a una aposición más fluida con «that is». La presente versión española adopta igualmente una aposición explicativa («es decir») para reflejar el valor de ἥ τε sin perder la relación entre «las cosas invisibles» y «su poder eterno y su divinidad».
  spanish_consistency_notes:
  - Se mantiene «Dios» implícito mediante el pronombre «de él», conforme al contexto de Romanos 1:20.
  - Se evita «SEÑOR» o sustitutos de ocultamiento del nombre divino porque este versículo no contiene יהוה ni κύριος en forma directa.
  - «Divinidad» se usa de manera consistente para θειότης, reservando la posibilidad de «deidad» como alternativa nota, no como texto principal.
  - 'La estructura general procura una equivalencia formal-optimal: conserva el orden argumental del griego, pero adapta la sintaxis para sonar natural en español.'
