revisions:
- from: Porque las cosas invisibles de él, es decir, su poder eterno y su divinidad[a], se dejan ver claramente desde la creación del mundo, siendo entendidas por medio de lo que ha sido hecho[b], de modo que no tienen excusa.
  to: Porque sus atributos invisibles[a], es decir, su poder eterno y su divinidad[b], se dejan ver claramente desde la creación del mundo, siendo entendidos por medio de lo que ha sido hecho, de modo que no tienen excusa.
  rationale: Se reemplaza «las cosas invisibles de él» por «sus atributos invisibles» para reflejar mejor el sentido del neutro plural en español natural y alinearlo con la decisión léxica del POB. También se corrige la nota [b] para que ancle en «divinidad» y preserve la distinción documentada entre θειότης y θεότης. Se mantiene el resto de la redacción porque representa adecuadamente el sentido del griego.
