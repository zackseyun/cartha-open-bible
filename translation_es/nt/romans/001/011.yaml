  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: ἐπιποθῶ = «anhelo», ἰδεῖν = «verlos», τι…χάρισμα πνευματικόν = «algún don espiritual», y la nota sobre la alternativa pasiva de στηριχθῆναι está bien preservada. Sin embargo, la nota [a] no corresponde al ancla en el texto: el texto marca [a] en «verlos», pero la nota propone una alternativa para «comunicarles algún don espiritual», siguiendo correctamente la nota inglesa. Eso requiere reparación.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «Porque anhelo verlos…» fluye bien, aunque «Pues anhelo verlos» sería otra opción. «Comunicarles» es comprensible, pero suena algo menos directo que «compartirles» o «impartirles» para μεταδῶ; aun así, no es inaceptable. El problema principal es técnico y de anclaje de nota, no de legibilidad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Don espiritual» preserva bien la amplitud de χάρισμα πνευματικόν y evita una lectura excesivamente técnica. No aparecen términos sensibles del glosario mayor que requieran ajuste.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: En el POB inglés, la nota a comenta la expresión «impart some spiritual gift», no «to see you». En el borrador español, [a] aparece en «verlos[a]», pero su contenido («compartir con ustedes algún don espiritual») claramente corresponde a «comunicarles algún don espiritual». Esto rompe la correspondencia entre texto y nota exigida por el proyecto.
  - severity: low
    issue: «Comunicarles» es posible, pero menos preciso que una opción más cercana a μεταδῶ.
    rationale: μεταδῶ expresa transmitir/compartir/impartir algo a otros. «Comunicarles» puede funcionar, pero en español bíblico actual «compartirles» o «impartirles» reflejan más nítidamente el acto de hacer partícipe de un don. No es un error grave, pero conviene pulirlo junto con el ajuste de nota.
  revised_spanish_text: Porque anhelo verlos, para compartirles[a] algún don espiritual, a fin de fortalecerlos[b],
  revised_footnotes:
