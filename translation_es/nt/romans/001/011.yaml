translation:
  language: es
  text: Porque anhelo verlos, para compartirles[a] algún don espiritual, a fin de fortalecerlos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «impartirles algún don espiritual».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para que sean fortalecidos».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιποθῶ
  english_pob_choice: I long
  chosen_spanish: anhelo
  alternatives_spanish:
  - deseo intensamente
  - tengo gran deseo
  lexicon: BDAG
  rationale: «Anhelo» expresa un deseo fuerte y personal en español natural, conservando el peso afectivo del verbo griego sin sonar forzado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Mantiene la relación explicativa con el contexto anterior en una forma clara y natural para el español.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: ver
  alternatives_spanish:
  - visitar
  - conocer
  lexicon: BDAG
  rationale: El verbo griego es literalmente «ver»; en este contexto, la visita está implícita, pero «ver» conserva mejor la forma del original.
- source_word: τι
  english_pob_choice: some
  chosen_spanish: algún
  alternatives_spanish:
  - cierto
  - alguna
  lexicon: BDAG
  rationale: «Algún» conserva la indefinición del griego sin volver la frase pesada o artificial.
- source_word: μεταδῶ
  english_pob_choice: impart
  chosen_spanish: comunicarles
  alternatives_spanish:
  - compartir con ustedes
  - impartirles
  lexicon: BDAG
  rationale: «Comunicarles» en este contexto transmite la idea de dar o hacer partícipe a otro de algo, y resulta más natural que un calco rígido; «impartirles» se mantiene como alternativa cercana al inglés POB.
- source_word: χάρισμα
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - regalo
  - gracia
  lexicon: BDAG
  rationale: «Don» es la forma más adecuada en español para el sentido de un beneficio otorgado; preserva la amplitud del término sin imponer una lectura técnica estrecha.
- source_word: πνευματικὸν
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - del Espíritu
  lexicon: BDAG
  rationale: «Espiritual» conserva la ambigüedad del griego entre una cualidad espiritual general y una referencia más directa al Espíritu, sin resolverla de antemano.
- source_word: εἰς τὸ στηριχθῆναι ὑμᾶς
  english_pob_choice: to strengthen you
  chosen_spanish: a fin de fortalecerlos
  alternatives_spanish:
  - para que sean fortalecidos
  - a fin de que sean fortalecidos
  lexicon: BDAG
  rationale: La construcción final expresa propósito o resultado. «A fin de fortalecerlos» comunica el sentido en español con fluidez; las alternativas pasivas reflejan más de cerca el infinitivo pasivo griego y preservan la posibilidad interpretativa del POB inglés.
theological_decisions:
- issue: Alcance de «don espiritual»
  english_pob_reading: some spiritual gift
  chosen_spanish_reading: algún don espiritual
  alternative_spanish_readings:
  - algún don del Espíritu
  - algún beneficio espiritual con gracia
  rationale: El griego no obliga a entender un carisma técnico o milagroso específico. «Don espiritual» conserva el sentido amplio y la tensión teológica documentada por el POB inglés.
  doctrine_reference: Preservar la tensión léxica y teológica sin cerrar indebidamente el término.
- issue: Valor de la clausula final
  english_pob_reading: to strengthen you
  chosen_spanish_reading: a fin de fortalecerlos
  alternative_spanish_readings:
  - para que sean fortalecidos
  - a fin de que sean fortalecidos
  rationale: El infinitivo griego es pasivo, pero el inglés POB opta por una formulación activa idiomática y deja la pasiva en nota. En español se conserva una forma natural; la pasiva alternativa se mantiene disponible para no borrar el matiz del original.
  doctrine_reference: Mantener la posibilidad de lectura pasiva del griego sin sacrificar claridad en español.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y no hubo revisiones aplicadas en la pasada más reciente; la versión española busca mantener la misma tensión léxica y la misma solución de ambigüedad, con ajustes naturales al español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «don» para χάρισμα siguiendo el valor amplio del término en el contexto.
  - Se mantuvo la posibilidad pasiva en la nota final para reflejar el infinitivo griego στηριχθῆναι.
  - Los pronombres de segunda persona se adaptaron a la publicación en español neutral latinoamericano con «los» por concordancia de objeto directo plural masculino mixto o plural inclusivo en el español eclesial estándar.
