translation:
  language: es
  text: Soy deudor tanto a griegos como a bárbaros[a], tanto a sabios como a insensatos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extranjeros» o «no griegos»; aquí «bárbaros» refleja el contraste cultural común del griego con «griegos», no necesariamente una idea de salvajismo moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἕλλησίν
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - helenos
  - griegos de cultura griega
  lexicon: BDAG
  rationale: El dativo plural nombra una categoría étnico-cultural; «griegos» es el equivalente natural en español y conserva el primer polo del contraste social.
- source_word: βαρβάροις
  english_pob_choice: barbarians
  chosen_spanish: bárbaros
  alternatives_spanish:
  - extranjeros
  - no griegos
  lexicon: BDAG
  rationale: La palabra funciona como el opuesto convencional de «griegos» en el contraste cultural del griego. «Bárbaros» preserva esa etiqueta histórica; se mantiene la posible carga moderna con una nota.
- source_word: σοφοῖς
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - instruidos
  - eruditos
  lexicon: BDAG
  rationale: «Sabios» reproduce de manera directa el contraste con «insensatos» y suena natural en español bíblico contemporáneo.
- source_word: ἀνοήτοις
  english_pob_choice: foolish
  chosen_spanish: insensatos
  alternatives_spanish:
  - necios
  - sin entendimiento
  lexicon: BDAG
  rationale: «Insensatos» comunica la falta de entendimiento con un registro digno y mantiene el paralelismo con «sabios» sin estrechar el sentido a mera falta de educación.
- source_word: ὀφειλέτης
  english_pob_choice: under obligation
  chosen_spanish: deudor
  alternatives_spanish:
  - obligado
  - en deuda
  lexicon: BDAG
  rationale: Aunque el sentido básico es «deudor», Pablo expresa aquí una obligación moral/apostólica. «Soy deudor» conserva la metáfora de deuda que subyace al término y deja visible la tensión semántica; el contexto hace claro que no es deuda monetaria.
- source_word: τε ... καὶ / τε ... καὶ
  english_pob_choice: both ... and ... / both ... and ...
  chosen_spanish: tanto ... como ... / tanto ... como ...
  alternatives_spanish:
  - así a ... como a ...
  - ya a ... ya a ...
  lexicon: Greek grammar
  rationale: «Tanto ... como ...» reproduce el paralelismo correlativo del griego y mantiene el balance retórico de las dos parejas.
theological_decisions:
- issue: La metáfora de «deudor» frente al sentido idiomático de obligación apostólica
  english_pob_reading: I am under obligation
  chosen_spanish_reading: Soy deudor
  alternative_spanish_readings:
  - Estoy obligado
  - Tengo una obligación
  rationale: El inglés POB explicita la obligación; en español, «soy deudor» conserva la fuerza lexical de ὀφειλέτης y la imagen subyacente, sin perder el sentido contextual de deber apostólico.
  doctrine_reference: Responsabilidad/apostolado de Pablo; Romanos 1:1, 15
- issue: La etiqueta cultural «bárbaros» y su posible malentendido moderno
  english_pob_reading: barbarians
  chosen_spanish_reading: bárbaros
  alternative_spanish_readings:
  - extranjeros
  - no griegos
  rationale: Se preserva el contraste histórico greco-barbárico del texto. La nota aclara que el término no debe leerse automáticamente con la connotación de salvajismo moderno.
  doctrine_reference: Contexto sociocultural grecorromano; Hechos 28:2
translation_notes:
  revision_awareness: El inglés POB mantiene la estructura correlativa «both ... and ...» y resuelve ὀφειλέτης con «under obligation». El español conserva el paralelismo con «tanto ... como ...» y, por fidelidad al campo léxico, emplea «deudor» en lugar de neutralizar de entrada la metáfora; la nota atenúa la posible lectura moderna de «bárbaros».
  spanish_consistency_notes:
  - 'Se mantuvo el plural étnico-cultural en minúsculas: «griegos», «bárbaros».'
  - Se evitó «SEÑOR»/terminología de reemplazo porque el versículo no contiene el nombre divino.
  - «Insensatos» se eligió para conservar el contraste sabiduría/insensatez con registro bíblico claro.
