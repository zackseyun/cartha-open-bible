translation:
  language: es
  text: Porque no me avergüenzo de la buena noticia[a], porque es poder de Dios para salvación a todo el que cree, al judío primero y también al griego[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «evangelio».
    reason: lexical_alternative
  - marker: b
    text: «Griego» aquí puede referirse más ampliamente a un gentil, es decir, a un no judío.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαισχύνομαι
  english_pob_choice: am not ashamed
  chosen_spanish: no me avergüenzo
  alternatives_spanish:
  - no siento vergüenza
  - no me avergüenzo de ello
  lexicon: BDAG
  rationale: El verbo expresa la falta de vergüenza o de retraimiento por deshonra. «No me avergüenzo» es la equivalencia natural y mantiene el tono público y valiente de Pablo.
- source_word: εὐαγγέλιον
  english_pob_choice: good news
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  - buenas nuevas
  lexicon: BDAG
  rationale: Aunque la traducción inglesa opta por «good news» para transparencia léxica, en español «evangelio» es la forma más inteligible y estable para este término, sin perder su referencia a la buena noticia proclamada.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  lexicon: BDAG
  rationale: «Poder» reproduce con naturalidad el sentido de capacidad eficaz de Dios en este contexto soteriológico.
- source_word: εἰς σωτηρίαν
  english_pob_choice: for salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - en orden a salvación
  - hacia salvación
  lexicon: BDAG
  rationale: «Para salvación» conserva el valor teleológico de εἰς y suena natural en español contemporáneo.
- source_word: παντὶ τῷ πιστεύοντι
  english_pob_choice: to everyone who believes
  chosen_spanish: de todo el que cree
  alternatives_spanish:
  - para todo el que cree
  - para cada uno que cree
  lexicon: BDAG
  rationale: La construcción griega es distributiva; «de todo el que cree» mantiene la universalidad sin forzar una formulación demasiado literal. En español bíblico también es claro y fluido.
- source_word: Ἰουδαίῳ
  english_pob_choice: Jew
  chosen_spanish: al judío
  alternatives_spanish:
  - al Judeo
  - al judío
  lexicon: BDAG
  rationale: En el contraste paulino con Ἕλληνι, «judío» expresa correctamente la identidad étnico-religiosa.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primeramente
  alternatives_spanish:
  - primero
  - en primer lugar
  lexicon: BDAG
  rationale: «Primeramente» comunica prioridad en el orden de salvación sin añadir una jerarquía que no esté explícita en el texto.
- source_word: Ἕλληνι
  english_pob_choice: Greek
  chosen_spanish: al griego
  alternatives_spanish:
  - al gentil
  - al heleno
  lexicon: BDAG
  rationale: Se conserva el término del texto griego. Aunque en Pablo puede abarcar al no judío, la forma principal en español debe reflejar la palabra fuente; el sentido más amplio queda anotado aparte.
- source_word: τε ... καί
  english_pob_choice: and also
  chosen_spanish: y también
  alternatives_spanish:
  - y
  - así como también
  lexicon: BDAG
  rationale: «Y también» refleja la adición de καί con el matiz coordinante de τε, manteniendo una lectura natural en español.
theological_decisions:
- issue: Sentido de Ἕλληνι en la frase «al judío primero y también al griego»
  english_pob_reading: Greek in the main text, with broader non-Jewish sense noted in a footnote
  chosen_spanish_reading: al griego en el texto principal, con nota de que puede funcionar ampliamente para un no judío, es decir, un gentil
  alternative_spanish_readings:
  - al gentil
  - al no judío
  rationale: 'Se preserva la forma léxica del griego y, a la vez, se reconoce la tensión semántica documentada por la tradición auditada: en Pablo, «griego» puede representar al mundo gentil. No se borra esa amplitud; se explica en nota.'
  doctrine_reference: Primacía del texto fuente; preservar la tensión lexical sin resolverla por sustitución interpretativa.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el antecedente inglés; el borrador español sigue de cerca el audit trail y conserva la tensión léxica de Ἕλληνι mediante nota.
  spanish_consistency_notes:
  - Se usa «evangelio» por ser el término español establecido y por claridad eclesial, aunque la nota mantiene la alternativa léxica «buena noticia».
  - Se mantiene «al griego» en el cuerpo para respetar el dato lexical del griego, con nota explicativa sobre su posible alcance étnico más amplio.
  - Se usa «primeramente» para πρῶτον por su naturalidad bíblica y su valor de prioridad, no de exclusión.
