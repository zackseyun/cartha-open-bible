translation:
  language: es
  text: Y asimismo los varones, habiendo abandonado el uso natural de la hembra[a], se inflamaron en su deseo unos hacia otros[d][c][b], varones con varones cometiendo indecencia y recibiendo en sí mismos la justa retribución por su error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el uso natural de la hembra».
    reason: lexical_alternative
  - marker: b
    text: O «ardiendo en su lujuria unos por otros».
    reason: lexical_alternative
  - marker: c
    text: O «haciendo lo vergonzoso».
    reason: lexical_alternative
  - marker: d
    text: O «la retribución apropiada» o «la retribución debida» por su error.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρσενες / θηλείας
  english_pob_choice: males / the female
  chosen_spanish: varones / la hembra
  alternatives_spanish:
  - hombres / mujer
  - varones / hembras
  lexicon: BDAG
  rationale: Conservo el lenguaje biológicamente marcado del griego para mantener el contraste deliberado varón/hembra. «Varones» funciona de modo natural en español bíblico y evita suavizar la distinción con «hombres y mujeres».
- source_word: ἀφέντες
  english_pob_choice: having abandoned
  chosen_spanish: habiendo abandonado
  alternatives_spanish:
  - habiendo dejado
  - dejando atrás
  lexicon: BDAG
  rationale: El participio expresa una acción anterior a la del verbo principal. «Habiendo abandonado» preserva ese matiz de antecedencia con registro claro y digno.
- source_word: φυσικὴν χρῆσιν
  english_pob_choice: the natural use
  chosen_spanish: el uso natural
  alternatives_spanish:
  - las relaciones naturales
  - el uso sexual natural
  - las relaciones sexuales naturales
  lexicon: BDAG
  rationale: «Χρῆσις» aquí se refiere al uso relacional/sexual en contexto. «Uso natural» sigue de cerca el original y es suficientemente claro en español sin añadir más especificación que la que el verso ya aporta.
- source_word: ἐξεκαύθησαν ἐν τῇ ὀρέξει αὐτῶν
  english_pob_choice: were inflamed in their desire
  chosen_spanish: se inflamaron en su deseo
  alternatives_spanish:
  - ardieron en su deseo
  - ardieron en su lujuria
  - se consumieron de pasión
  lexicon: BDAG
  rationale: Conservo la imagen verbal de «inflamarse/arder» y traduzco ὄρεξις con «deseo», como hace el POB inglés, para no endurecer innecesariamente el término hacia «lujuria».
- source_word: εἰς ἀλλήλους
  english_pob_choice: for one another
  chosen_spanish: unos por otros
  alternatives_spanish:
  - el uno hacia el otro
  - mutuamente
  lexicon: BDAG
  rationale: «Unos por otros» expresa la reciprocidad del griego en un español natural y conserva la dirección relacional del texto.
- source_word: ἄρσενες ἐν ἄρσεσιν
  english_pob_choice: males with males
  chosen_spanish: varones con varones
  alternatives_spanish:
  - hombres con hombres
  - varones entre varones
  lexicon: BDAG
  rationale: Mantengo la repetición de la forma marcada por sexo para reproducir el énfasis retórico del griego. «Varones con varones» evita diluir la repetición con términos más generales.
- source_word: τὴν ἀσχημοσύνην κατεργαζόμενοι
  english_pob_choice: committing indecency
  chosen_spanish: cometiendo indecencia
  alternatives_spanish:
  - haciendo lo vergonzoso
  - cometiendo lo vergonzoso
  - realizando una acción vergonzosa
  lexicon: BDAG
  rationale: «Indecencia» comunica la fuerza moral de ἀσχημοσύνη sin introducir una etiqueta interpretativa más amplia que el griego no explicita.
- source_word: τὴν ἀντιμισθίαν
  english_pob_choice: the due penalty
  chosen_spanish: la justa retribución
  alternatives_spanish:
  - el debido castigo
  - la debida retribución
  - la recompensa correspondiente
  lexicon: BDAG
  rationale: «Ἀντιμισθία» indica una retribución correspondiente. Opto por «justa retribución» para conservar la idea de correspondencia y la valoración de ajuste/fittingness que el inglés POB también preserva.
- source_word: ἣν ἔδει
  english_pob_choice: due
  chosen_spanish: justa
  alternatives_spanish:
  - debida
  - correspondiente
  - necesaria
  lexicon: BDAG
  rationale: En español, «justa» condensa bien el matiz de algo que correspondía o era apropiado, evitando una perífrasis pesada. Mantiene la tensión entre correspondencia y juicio.
- source_word: τῆς πλάνης αὐτῶν
  english_pob_choice: for their error
  chosen_spanish: por su error
  alternatives_spanish:
  - por su extravío
  - por su engaño
  - por su desviación
  lexicon: BDAG
  rationale: «Error» es breve y fiel al campo semántico de πλάνη; el contexto no obliga a escoger una de sus posibles derivaciones más fuertes, como «engaño» o «extravío».
- source_word: ἐν ⸀ἑαυτοῖς ἀπολαμβάνοντες
  english_pob_choice: receiving in themselves
  chosen_spanish: recibiendo en sí mismos
  alternatives_spanish:
  - recibiendo en ellos mismos
  - recibiendo en su propio ser
  - recibiendo entre sí
  lexicon: BDAG
  rationale: Conservo la fuerza reflexiva de ἑαυτοῖς con una traducción directa y transparente. «En sí mismos» deja abierta la modalidad exacta del padecimiento, como hace el griego.
theological_decisions:
- issue: Si suavizar el lenguaje biológicamente marcado a un lenguaje relacional general
  english_pob_reading: males ... the female ... males with males
  chosen_spanish_reading: varones ... la hembra ... varones con varones
  alternative_spanish_readings:
  - hombres ... mujer ... hombres con hombres
  - personas ... mujer ... personas con personas
  rationale: El griego emplea términos sexados deliberadamente. Mantenerlos en español evita borrar la tensión retórica y semántica del pasaje. La traducción no resuelve ni atenúa la descripción del texto.
  doctrine_reference: Primacía del original; preservar tensión léxica y moral del pasaje
- issue: Cómo traducir la consecuencia final sin imponer una interpretación demasiado específica
  english_pob_reading: the due penalty for their error
  chosen_spanish_reading: la justa retribución por su error
  alternative_spanish_readings:
  - el debido castigo por su error
  - la recompensa correspondiente por su error
  rationale: El griego habla de una retribución correspondiente; no fuerza por sí mismo una sola modalidad jurídica o corporal. «Justa retribución» conserva esa amplitud y el sentido de correspondencia sin sobreinterpretar.
  doctrine_reference: Preservar la ambigüedad controlada del texto fuente
- issue: Si explicitar más el carácter moral de ἀσχημοσύνη
  english_pob_reading: committing indecency
  chosen_spanish_reading: cometiendo indecencia
  alternative_spanish_readings:
  - haciendo lo vergonzoso
  - cometiendo lo vergonzoso
  rationale: La palabra griega ya lleva juicio moral. «Indecencia» mantiene ese juicio en español sin añadir un glosado doctrinal ajeno al verso.
  doctrine_reference: Mantener el peso moral del léxico fuente sin ampliarlo artificialmente
translation_notes:
  revision_awareness: 'El POB inglés revisó la frase de χρῆσιν de «natural relations» a «natural use» para acercarse más al matiz léxico del griego. En español seguí esa revisión con «uso natural». También mantuve la triple correspondencia del audit trail: ὄρεξις como «deseo», ἀσχημοσύνη como «indecencia» y ἀντιμισθία/ἔδει como «justa retribución».'
  spanish_consistency_notes:
  - Usé «varones» para ἄρσενες de forma consistente, evitando alternar con «hombres» para no debilitar el paralelismo.
  - Mantuve «la hembra» en singular por fidelidad al contraste biológico del texto fuente y del POB inglés.
  - 'Conservé la secuencia participial en español: «habiendo abandonado... se inflamaron... cometiendo... recibiendo...», que refleja la estructura griega sin volverla rígida.'
  - Apliqué notas al pie solo donde el inglés POB preservó alternativas significativas o donde el español ofrece una alternativa real de lectura.
  - No sustituí «indecencia» por un eufemismo más suave ni por una etiqueta moderna que no está en el griego.
