translation:
  language: es
  text: por medio de quien recibimos gracia y apostolado para la obediencia de la fe[b] entre todas las naciones[a], por causa de su nombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre todos los gentiles».
    reason: lexical_alternative
  - marker: b
    text: O «la obediencia que proviene de la fe», o «la obediencia que consiste en la fe».
    reason: alternative_reading
lexical_decisions:
- source_word: δι’ οὗ
  english_pob_choice: Through whom
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por quien
  - mediante quien
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o mediación. «Por medio de quien» conserva la relación instrumental con la referencia anterior y suena natural en español bíblico sin perder transparencia.
- source_word: ἐλάβομεν
  english_pob_choice: we received
  chosen_spanish: recibimos
  alternatives_spanish:
  - hemos recibido
  - yo recibí
  lexicon: BDAG
  rationale: El aoristo en primera persona plural se rinde de forma directa con «recibimos». Mantiene el plural gramatical del griego, sin resolver en el texto principal si es plural retórico o corporativo.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: En el uso paulino, χάρις normalmente es «gracia». Esa es la opción más fiel y reconocible en español eclesial.
- source_word: καὶ ἀποστολήν
  english_pob_choice: and apostleship
  chosen_spanish: y apostolado
  alternatives_spanish:
  - y apostolado misionero
  - y una comisión apostólica
  lexicon: BDAG
  rationale: ἀποστολή es un sustantivo abstracto de comisión/envío apostólico. «Apostolado» conserva la forma nominal coordinada del griego y evita añadir matices no presentes en el texto.
- source_word: εἰς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con miras a
  lexicon: BDAG
  rationale: Aquí εἰς introduce finalidad. «Para» es la forma natural en español y conserva el movimiento hacia el propósito indicado.
- source_word: ὑπακοὴν πίστεως
  english_pob_choice: the obedience of faith
  chosen_spanish: la obediencia de la fe
  alternatives_spanish:
  - la obediencia que proviene de la fe
  - la obediencia que consiste en la fe
  lexicon: BDAG
  rationale: La construcción genitiva es comprimida y deliberadamente ambigua. «La obediencia de la fe» preserva esa tensión sin sobreexplicarla, como en el inglés POB.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Πίστις se rinde por defecto como «fe». Aunque «fidelidad» es posible en algunos contextos, aquí la decisión principal mantiene la lectura estándar y la ambigüedad teológica.
- source_word: ἐν πᾶσιν τοῖς ἔθνεσιν
  english_pob_choice: among all the nations
  chosen_spanish: entre todas las naciones
  alternatives_spanish:
  - entre todos los gentiles
  - en medio de todas las naciones
  lexicon: BDAG
  rationale: ἔθνη puede significar «naciones» o «gentiles». «Naciones» preserva el alcance amplio y geográfico-étnico; la alternativa gentilicia queda registrada como posibilidad léxica.
- source_word: ὑπὲρ τοῦ ὀνόματος αὐτοῦ
  english_pob_choice: for the sake of his name
  chosen_spanish: por causa de su nombre
  alternatives_spanish:
  - por amor de su nombre
  - en favor de su nombre
  lexicon: BDAG
  rationale: ὑπέρ expresa motivo o beneficio. «Por causa de su nombre» comunica bien la idea de actuar por honor, renombre o causa del nombre de Jesús, sin forzar una formulación demasiado idiomática.
theological_decisions:
- issue: Interpretación de ὑπακοὴν πίστεως
  english_pob_reading: the obedience of faith
  chosen_spanish_reading: la obediencia de la fe
  alternative_spanish_readings:
  - la obediencia que viene de la fe
  - la obediencia que es la fe
  rationale: La frase es sintácticamente densa y admite varias lecturas. La versión española conserva la ambigüedad en lugar de resolverla, siguiendo la filosofía de mantener la tensión teológica presente en el original.
  doctrine_reference: Preservar ambigüedad exegética; πίστις se traduce por defecto como fe.
- issue: Alcance de ἔθνεσιν
  english_pob_reading: among all the nations
  chosen_spanish_reading: entre todas las naciones
  alternative_spanish_readings:
  - entre todos los gentiles
  rationale: El término puede leerse como «naciones» o como «gentiles». El texto principal adopta la forma más amplia y neutral; la lectura gentilicia queda disponible como alternativa léxica sin perder el horizonte misional de Pablo.
  doctrine_reference: Mantener el alcance universal del encargo apostólico sin borrar la posible referencia a los gentiles.
translation_notes:
  revision_awareness: El texto español sigue de cerca el paquete fuente griego y el aparato auditado en inglés. No se introdujeron cambios respecto del sentido base, y se preservó la ambigüedad de ὑπακοὴν πίστεως y la posible oscilación de ἔθνεσιν entre «naciones» y «gentiles».
  spanish_consistency_notes:
  - Se usa «gracia» para χάρις, conforme al uso paulino y a la norma del proyecto.
  - Se mantiene «fe» para πίστις sin desplazarla por «fidelidad» en el texto principal.
  - «Apostolado» refleja la forma nominal del original y evita sustituirla por una perífrasis explicativa.
  - Se evita «SEÑOR» y no hay aquí término divino que requiera decisión sobre יהוה/YHWH.
  - La puntuación conserva una cadencia natural en español sin añadir elementos no presentes en el griego.
