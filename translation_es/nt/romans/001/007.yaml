  spanish_quality_summary: El texto es claro, digno y ampliamente legible. La frase «llamados santos» es fiel, aunque algo tensa para algunos lectores; con nota aclaratoria funciona bien. «Amados por Dios» suena un poco más natural en español contemporáneo que «amados de Dios», sin perder el matiz relacional. El resto del saludo está bien formulado.
  glossary_alignment: 'Hay buena alineación con el glosario del proyecto: θεός -> «Dios», χάρις -> «gracia», εἰρήνη -> «paz», κύριος -> «Señor», Ἰησοῦς -> «Jesús», Χριστός -> «Mesías». La principal falta es no incorporar en notas las alternativas relevantes ya auditadas: «llamados santos / llamados a ser santos / llamados santos = santos por llamamiento» y «Mesías / Cristo».'
  issues:
