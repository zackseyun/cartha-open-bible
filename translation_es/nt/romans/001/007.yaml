translation:
  language: es
  text: 'A todos los que están en Roma, amados por Dios y llamados santos[a]: gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor Jesús Mesías[b][c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamados santos/consagrados»; tradicionalmente, «llamados a ser santos».
    reason: lexical_alternative
  - marker: b
    text: O «Cristo».
    reason: lexical_alternative
  - marker: c
    text: O «amados por Dios, llamados santos».
    reason: previous_rendering
lexical_decisions:
- source_word: πᾶσιν τοῖς οὖσιν ἐν Ῥώμῃ
  english_pob_choice: To all those in Rome
  chosen_spanish: A todos los que están en Roma
  alternatives_spanish:
  - A todos los que se encuentran en Roma
  - A todos los de Roma
  lexicon: BDAG
  rationale: La frase dativa se vierte de forma natural en español conservando el sentido universal del saludo y la referencia locativa a Roma.
- source_word: ἀγαπητοῖς θεοῦ
  english_pob_choice: beloved by God
  chosen_spanish: amados de Dios
  alternatives_spanish:
  - amados por Dios
  - amados por Dios y de Dios
  lexicon: BDAG
  rationale: «Amados de Dios» mantiene el valor relacional del adjetivo y suena natural en español eclesial contemporáneo, sin forzar una paráfrasis.
- source_word: κλητοῖς ἁγίοις
  english_pob_choice: called saints
  chosen_spanish: llamados santos
  alternatives_spanish:
  - llamados a ser santos
  - llamados santos / santos por llamado
  - llamados santos
  lexicon: BDAG
  rationale: Se conserva la construcción adjetival del griego, sin añadir «a ser», porque el texto no expresa un infinitivo. «Santos» mantiene la fuerza lexical de ἅγιοι.
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: gracia
  alternatives_spanish:
  - gracia de Dios
  - favor
  lexicon: BDAG
  rationale: «Gracia» es el saludo paulino estándar y corresponde con precisión al sustantivo χάρις en este contexto epistolar.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz y bienestar
  - bienestar
  lexicon: BDAG
  rationale: «Paz» es el equivalente directo y mantiene el paralelismo del saludo con «gracia».
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: de Dios nuestro Padre
  alternatives_spanish:
  - de Dios, nuestro Padre
  - de nuestro Padre Dios
  lexicon: BDAG
  rationale: La construcción genitiva se vuelve en español de manera fluida y reverente; el orden conserva la expresión paulina sin añadir elementos.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Dueño
  - del Maestro
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su valor cristológico, adecuado al saludo litúrgico y al contexto de Romanos.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» conforme a la política del proyecto y al carácter titular del nombre en este contexto.
theological_decisions:
- issue: Cómo reflejar κλητοῖς ἁγίοις sin introducir una interpretación no explícita
  english_pob_reading: called saints
  chosen_spanish_reading: llamados santos
  alternative_spanish_readings:
  - llamados a ser santos
  - llamados santos / santos por llamado
  - llamados a la santidad
  rationale: El griego presenta dos adjetivos en paralelo; «llamados santos» preserva la forma y el sentido sin añadir un infinitivo ausente en el texto.
  doctrine_reference: Translation philosophy 1 y 3
- issue: Cómo renderizar Χριστός en este saludo epistolar
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la traducción titular «Mesías» por fidelidad al proyecto y porque el contexto sigue siendo transparente como título, no como nombre propio fijo.
  doctrine_reference: 'Project terminology default: Χριστός / Messiah language'
translation_notes:
  revision_awareness: 'La versión inglesa pasó por ajustes sintácticos y una corrección doctrinal que restauró «Messiah» frente a «Christ». En español se mantiene la coherencia con la política del proyecto: Χριστός se vierte como «Mesías», y κλητοῖς ἁγίοις se conserva como construcción adjetival sin expandirla a «a ser».'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Señor» para κύριος, con «Jesús Mesías» para Ἰησοῦ Χριστοῦ.
  - 'La puntuación reproduce la función de saludo e introducción epistolar con dos miembros paralelos: destinatarios y bendición.'
  - No se añadieron notas al pie porque no era necesario anclar alternativas textuales en el texto principal.
