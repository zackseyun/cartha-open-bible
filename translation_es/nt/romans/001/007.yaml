    rationale: El expediente inglés conserva explícitamente alternativas para κλητοῖς ἁγίοις («called holy ones»; tradicionalmente «called to be saints»), para Χριστοῦ («Christ»), y una alternativa de agrupación sintáctica. El borrador español no incluye ninguna nota, con lo que pierde parte del rastro auditado requerido.
  - severity: low
