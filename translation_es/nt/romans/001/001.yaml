translation:
  language: es
  text: Pablo, esclavo de Mesías Jesús, llamado a ser apóstol, apartado para el evangelio de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: Uso bíblico hispano estándar del nombre propio griego/latino.
  rationale: Nombre propio natural en español bíblico; 'Pablo' es la forma establecida y transparente para el lector.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - siervo cautivo
  lexicon: BDAG
  rationale: La relación de propiedad y pertenencia es teológicamente relevante en Romanos 1:1; 'esclavo' conserva esa fuerza mejor que 'siervo'.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí funciona como título, no como nombre fijo; 'Mesías' mantiene el sentido titular y la política terminológica de la POB.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Iesús
  lexicon: Transliteración española estándar del nombre propio.
  rationale: Forma normal y reconocible en español bíblico.
- source_word: κλητὸς ἀπόστολος
  english_pob_choice: a called apostle
  chosen_spanish: llamado apóstol
  alternatives_spanish:
  - llamado como apóstol
  - llamado a ser apóstol
  lexicon: BDAG
  rationale: La construcción adjetivo+sustantivo puede sonar appositiva en español; 'llamado apóstol' conserva la brevedad y la fuerza del griego sin añadir 'a ser'.
- source_word: ἀφωρισμένος
  english_pob_choice: set apart
  chosen_spanish: apartado
  alternatives_spanish:
  - separado
  - consagrado
  - designado
  lexicon: BDAG
  rationale: '''Apartado'' refleja la pasiva participial y la idea de separación para una comisión/consagración, con español natural.'
- source_word: εἰς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - con destino a
  - hacia
  lexicon: BDAG
  rationale: Marca finalidad de manera directa y natural en español.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: '''Evangelio'' conserva el término establecido y su peso teológico en contexto paulino.'
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - perteneciente a Dios
  lexicon: BDAG
  rationale: Genitivo directo y sobrio, coherente con el orden y la cadencia del griego.
theological_decisions:
- issue: Rendering de Χριστός en una autoidentificación paulina
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: El título tiene fuerza mesiánica en este saludo; 'Mesías' traduce el título en vez de transliterarlo, preservando el matiz documental de la POB.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título.'
- issue: Rendering de δοῦλος en Romanos 1:1
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - criado
  rationale: El texto presenta una pertenencia vinculante, y la doctrina POB indica este pasaje como uno donde la fuerza de 'esclavo' debe conservarse.
  doctrine_reference: 'DOCTRINE.md: δοῦλος → esclavo en contextos donde la sujeción propietaria es saliente.'
translation_notes:
  revision_awareness: 'La redacción sigue el estado más reciente del audit trail: se conserva ''slave/esclavo'' y la traducción titular de Χριστός/''Mesías'', evitando la regresión a ''servant/siervo'' y a ''Christ/Cristo'' en este verso.'
  spanish_consistency_notes:
  - Se mantiene el orden sobrio de la salutación paulina.
  - '''llamado apóstol'' evita una paráfrasis excesiva y sigue de cerca la sintaxis del griego.'
  - No se introducen notas al pie porque ninguna alternativa requiere anclaje en el texto para esta línea.
  - Se usa 'evangelio de Dios' para conservar el genitivo simple y la formulación tradicional del pasaje sin ocultar el referente divino.
