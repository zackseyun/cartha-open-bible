review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura causal de Διὰ τοῦτο, el sentido judicial de παρέδωκεν como «los entregó», la evaluación moral de πάθη ἀτιμίας y la idea de intercambio en μετήλλαξαν. También conserva la literalidad relativa de θήλειαι y χρῆσις. Sin embargo, presenta problemas en la puntuación final frente al griego (debe terminar con coma, no punto), en la nota a por ser espuria y no corresponder a una alternativa real del inglés auditado, y en la redacción de «el que es contrario a la naturaleza», que en español suena forzada; «lo que es contrario a la naturaleza» preserva mejor τὴν παρὰ φύσιν.
  spanish_quality_summary: El texto es generalmente claro y digno, pero «hembras» aplicado a seres humanos suena marcadamente áspero en español eclesial general; aun así, dado el expediente inglés revisado hacia una mayor literalidad, puede mantenerse con nota explicativa. La frase «el que es contrario a la naturaleza» resulta poco natural en español y conviene corregirla a «lo que es contrario a la naturaleza». Además, la nota [a] actual no aporta una alternativa válida y debe eliminarse.
  glossary_alignment: No hay conflicto con los términos base del proyecto (Dios, etc.). La decisión de usar «hembras» como equivalente más literal de θήλειαι es defendible por el audit trail, aunque estilísticamente tensa. «Pasiones deshonrosas» y «uso natural» están alineados con la racionalidad léxica documentada. Debe corregirse la nota para «uso natural» y mantenerse la alternativa «contra la naturaleza».
  issues:
  - severity: medium
    issue: La nota [a] es incorrecta y redundante.
    rationale: El inglés POB pone nota en «dishonorable passions» con el contenido «Or more literally, 'their females.'», es decir, una nota desalineada por el anclaje, pero no una alternativa a «pasiones deshonrosas». En español, «O, más literalmente, “pasiones deshonrosas”» no ofrece ninguna variante y confunde al lector.
  - severity: medium
    issue: «el que es contrario a la naturaleza» suena poco idiomático.
    rationale: Para τὴν παρὰ φύσιν, la formulación española natural y fiel es «lo que es contrario a la naturaleza» o «lo que va contra la naturaleza». El artículo masculino «el» con antecedente implícito «uso» no reproduce bien la construcción griega y endurece innecesariamente el español.
  - severity: low
    issue: La puntuación final no coincide con el griego fuente.
    rationale: El texto griego termina con coma porque la oración continúa en el v. 27. El borrador español termina con punto; conviene conservar la coma para reflejar la continuidad sintáctica.
  - severity: low
    issue: Falta una nota para «uso natural» si se quieren preservar las alternativas auditadas relevantes.
    rationale: El expediente inglés conserva una alternativa para τὴν φυσικὴν χρῆσιν («the natural use» / alternativa documentada). Dado que en español se optó por «uso natural», una nota puede preservar la posibilidad explicativa «uso conforme a la naturaleza» si se considera útil; más importante aún, la nota existente debe alinearse con una verdadera ambigüedad o alternativa.
  revised_spanish_text: Por esta razón, Dios los entregó a pasiones deshonrosas, pues aun sus hembras[a] cambiaron el uso natural[b] por lo que es contrario a la naturaleza[c],
  revised_footnotes:
