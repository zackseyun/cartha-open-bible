  to: Por esta razón, Dios los entregó a pasiones deshonrosas, pues aun sus hembras[a] cambiaron el uso natural[b] por lo que es contrario a la naturaleza[c],
  rationale: Se eliminó la nota [a] inválida, se mantuvo «hembras» con una nota útil que preserve la alternativa más natural «mujeres», se añadió una nota legítima para «uso natural», se corrigió «el que es contrario…» a «lo que es contrario…» para mejor español, y se ajustó la puntuación final a la coma del texto griego.
