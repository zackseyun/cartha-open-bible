    changes_summary: Revised 'women' to 'females' to reflect θήλειαι more closely, and 'natural relations' to 'the natural use' for closer lexical correspondence to τὴν φυσικὴν χρῆσιν while retaining formal, readable English.
translation:
  language: es
  text: Por esta razón, Dios los entregó a pasiones deshonrosas, pues aun sus hembras[a] cambiaron el uso natural[b] por lo que es contrario a la naturaleza[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «mujeres». El griego usa θήλειαι, un término que marca más directamente el sexo femenino.
    reason: lexical_alternative
  - marker: b
    text: O, «el uso conforme a la naturaleza».
    reason: lexical_alternative
  - marker: c
    text: O, «lo que es contra la naturaleza».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Porque de esto
  - Así que
  lexicon: διά
  rationale: Expresa con naturalidad en español la relación causal e inferencial del contexto, manteniendo el enlace con el argumento previo sin añadir paráfrasis.
- source_word: παρέδωκεν
  english_pob_choice: gave them over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los entregó al poder de
  - los abandonó
  lexicon: παραδίδωμι
  rationale: «Entregó» conserva el valor judicial de ceder a alguien a las consecuencias de su conducta. En español requiere un complemento implícito claro, aquí resuelto por el contexto inmediato.
- source_word: πάθη ἀτιμίας
  english_pob_choice: dishonorable passions
  chosen_spanish: pasiones deshonrosas
  alternatives_spanish:
  - pasiones vergonzosas
  - pasiones degradantes
  lexicon: πάθος; ἀτιμία
  rationale: «Deshonrosas» refleja bien ἀτιμία sin suavizar el juicio moral del texto. «Pasiones» conserva el plural concreto del griego.
- source_word: θήλειαι
  english_pob_choice: females
  chosen_spanish: hembras
  alternatives_spanish:
  - mujeres
  - females
  lexicon: θῆλυς
  rationale: Se mantiene la fuerza más literal del término griego, que en este contexto contrasta con el masculino del pasaje siguiente. «Mujeres» sería más natural, pero borra parcialmente esa marca léxica.
- source_word: μετήλλαξαν
  english_pob_choice: exchanged
  chosen_spanish: cambiaron
  alternatives_spanish:
  - intercambiaron
  - truequaron
  lexicon: μεταλλάσσω
  rationale: «Cambiaron» comunica el intercambio deliberado. «Intercambiaron» es posible, pero en español suena menos natural con este complemento.
- source_word: τὴν φυσικὴν χρῆσιν
  english_pob_choice: the natural use
  chosen_spanish: el uso natural
  alternatives_spanish:
  - el uso conforme a la naturaleza
  - la relación natural
  lexicon: φυσικός; χρῆσις
  rationale: 'Se preserva la cercanía lexical con el griego: χρῆσις se vierte con «uso». Aunque «relación» podría sonar más fluido, añade especificación que el griego no explicita directamente.'
- source_word: τὴν παρὰ φύσιν
  english_pob_choice: what is contrary to nature
  chosen_spanish: el que es contrario a la naturaleza
  alternatives_spanish:
  - lo contrario a la naturaleza
  - lo que va contra la naturaleza
  lexicon: παρά; φύσις
  rationale: La construcción mantiene el valor idiomático sin reducirlo a un adjetivo aislado. La frase subordinada en español hace visible la estructura evaluativa del original.
theological_decisions:
- issue: Cómo traducir θήλειαι sin borrar el contraste sexo-genérico del pasaje
  english_pob_reading: The English POB revised from 'women' to 'females' to reflect θήλειαι more closely and preserve the male/female pairing in the argument.
  chosen_spanish_reading: «Hembras» en el texto principal, con nota alternativa «mujeres».
  alternative_spanish_readings:
  - mujeres
  - females
  rationale: El griego usa θήλειαι, un término más amplio y más literal que «mujeres». En español, «hembras» conserva mejor esa literalidad y el contraste con el varón, aunque suena menos habitual; por eso se acompaña de nota para no ocultar la alternativa natural.
  doctrine_reference: Preservar la tensión lexical del texto sin resolverla por comodidad estilística.
- issue: Cómo verter πάθη ἀτιμίας sin rebajar la evaluación moral
  english_pob_reading: dishonorable passions
  chosen_spanish_reading: pasiones deshonrosas
  alternative_spanish_readings:
  - pasiones vergonzosas
  - pasiones degradantes
  rationale: La expresión griega contiene una valoración negativa explícita. «Deshonrosas» mantiene ese juicio con transparencia y evita reinterpretaciones eufemísticas.
  doctrine_reference: Retener la fuerza evaluativa del texto apostólico.
- issue: Cómo traducir τὴν παρὰ φύσιν manteniendo la tensión semántica
  english_pob_reading: what is contrary to nature
  chosen_spanish_reading: el que es contrario a la naturaleza
  alternative_spanish_readings:
  - lo contrario a la naturaleza
  - lo que va contra la naturaleza
  rationale: La formulación conserva el carácter relacional e idiomático de la frase griega. No se suaviza ni se amplía a categorías modernas que el texto no menciona.
  doctrine_reference: Preservar la tensión teológica y moral del pasaje sin paráfrasis interpretativa.
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión auditada del inglés POB que ajustó «women» a «females» y «natural relations» a «the natural use» para mayor cercanía lexical. En español, eso llevó a preferir «hembras» y «el uso natural», mientras que se mantuvo una estructura fluida y pública de lectura.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se preserva «naturaleza» para φύσις y «uso» para χρῆσις, evitando sustituir la expresión por una paráfrasis más interpretativa.
  - La puntuación reproduce la relación causal y la pausa fuerte del griego con una coma y punto y coma implícito por la sintaxis española.
  - El texto principal evita el calco de «contrario a naturaleza» y opta por una relativa natural en español, sin perder la referencia al original.
