translation:
  language: es
  text: quienes, aunque conocen el justo decreto[a] de Dios —que los que practican tales cosas son dignos de muerte—, no solo las hacen, sino que también aprueban a los que las practican.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «ordenanza», «requisito» o «juicio» para «decreto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: quienes
  alternatives_spanish:
  - los cuales
  - quien
  lexicon: BDAG
  rationale: En español, «quienes» mantiene el valor relativo que retoma a las personas descritas en el contexto anterior y suena natural en registro bíblico contemporáneo.
- source_word: τὸ δικαίωμα τοῦ θεοῦ
  english_pob_choice: God's righteous decree
  chosen_spanish: el justo decreto de Dios
  alternatives_spanish:
  - el decreto justo de Dios
  - la justa disposición de Dios
  - la sentencia justa de Dios
  lexicon: BDAG
  rationale: «δικαίωμα» aquí puede abarcar decreto, requerimiento o juicio; «decreto» preserva el peso jurídico del contexto, y «justo» conserva la fuerza moral/recta que el inglés POB expresó con 'righteous'.
- source_word: ἐπιγνόντες
  english_pob_choice: although they know
  chosen_spanish: aunque conocen
  alternatives_spanish:
  - habiendo conocido
  - sabiendo bien
  - aun conociendo
  lexicon: BDAG
  rationale: El participio se entiende con matiz concesivo en este contexto. «Aunque conocen» transmite de forma natural en español la idea de conocer y, aun así, persistir en la conducta descrita.
- source_word: οἱ τὰ τοιαῦτα πράσσοντες
  english_pob_choice: those who practice such things
  chosen_spanish: los que practican tales cosas
  alternatives_spanish:
  - los que hacen tales cosas
  - los que cometen tales cosas
  lexicon: BDAG
  rationale: «Practican» refleja mejor la idea de conducta habitual o característica que el mero acto puntual; «tales cosas» conserva la referencia a las acciones ya enumeradas en el contexto.
- source_word: ἄξιοι θανάτου
  english_pob_choice: worthy of death
  chosen_spanish: dignos de muerte
  alternatives_spanish:
  - merecedores de muerte
  - que merecen muerte
  - aptos para la muerte
  lexicon: BDAG
  rationale: «Dignos de muerte» es la correspondencia más directa y solemne en español, manteniendo el matiz judicial del enunciado sin especificar más de lo que el texto dice.
- source_word: ποιοῦσιν
  english_pob_choice: do
  chosen_spanish: las hacen
  alternatives_spanish:
  - las practican
  - las cometen
  - las realizan
  lexicon: BDAG
  rationale: Se mantiene una distinción útil entre el participio anterior y el verbo simple aquí; «las hacen» es natural en español y conserva la referencia a las mismas cosas mencionadas antes.
- source_word: συνευδοκοῦσιν
  english_pob_choice: approve of
  chosen_spanish: aprueban
  alternatives_spanish:
  - dan su aprobación a
  - consienten en
  - se complacen en
  lexicon: BDAG
  rationale: 'El verbo implica más que una participación pasiva: expresa consentimiento o aprobación de la conducta ajena. «Aprueban» es claro, fuerte y adecuado en español.'
- source_word: τοῖς πράσσουσιν
  english_pob_choice: those who practice them
  chosen_spanish: a los que las practican
  alternatives_spanish:
  - a los que hacen esas cosas
  - a los practicantes de ellas
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la frase anterior y el aspecto continuativo del participio griego, con una construcción natural en español.
theological_decisions:
- issue: Alcance de «dignos de muerte»
  english_pob_reading: The phrase is rendered as a statement of divine judicial verdict without specifying more than the text itself states.
  chosen_spanish_reading: La frase se traduce como un veredicto judicial divino sin precisar más allá de lo que dice el texto.
  alternative_spanish_readings:
  - merecedores de la pena de muerte
  - condenados a muerte
  - aptos para la muerte
  rationale: El griego afirma que son ἄξιοι θανάτου, pero no define el alcance completo de esa muerte. La traducción conserva la gravedad del juicio sin restringirlo indebidamente a una sola interpretación.
  doctrine_reference: Romanos 1:32; cf. Romanos 1:18-32
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés y el control cruzado posterior: no se registraron revisiones aplicadas, y la versión inglesa quedó estable en su lectura principal. La redacción española sigue esa estabilidad, pero usa términos naturales en español para conservar tanto el matiz jurídico de δικαίωμα como la concesión de ἐπιγνόντες y la fuerza evaluativa de ἄξιοι θανάτου.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se prefirió «justo decreto» como solución principal para δικαίωμα, sin borrar las alternativas documentadas.
  - Se conservó el contraste verbal entre «practican» y «las hacen», paralelo al griego entre πράσσοντες/ποιοῦσιν.
  - «Aprueban» mantiene el sentido de consentimiento/endorso de συνευδοκοῦσιν.
  - El tono es sobrio y publicable, sin expandir el texto más allá de la evidencia del original.
