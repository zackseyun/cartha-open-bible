translation:
  language: es
  text: Porque, aunque conocían a Dios, no lo glorificaron como a Dios ni le dieron gracias; al contrario, se volvieron vanos en sus razonamientos[a], y su corazón insensato[b] fue entenebrecido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en sus pensamientos' o 'en sus especulaciones'.
    reason: lexical_alternative
  - marker: b
    text: El griego dice 'corazón' en singular.
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la relación explicativa con el contexto anterior. 'Porque' comunica bien el valor causal/explicativo en español y suena natural al inicio de oración.
- source_word: γνόντες
  english_pob_choice: although they knew
  chosen_spanish: aunque conocían
  alternatives_spanish:
  - habiendo conocido
  - cuando conocieron
  lexicon: BDAG
  rationale: 'La forma participial aquí tiene fuerza concesiva en contexto: había conocimiento real de Dios, pero no produjo la respuesta debida. ''Aunque conocían'' preserva esa tensión.'
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: Objeto directo de γνόντες. En español, el dativo personal 'a Dios' es natural y claro.
- source_word: οὐχ ὡς θεὸν
  english_pob_choice: as God
  chosen_spanish: como a Dios
  alternatives_spanish:
  - como Dios
  - en calidad de Dios
  lexicon: BDAG
  rationale: Conserva la idea de tratarlo según la condición que le corresponde. 'Como a Dios' suena idiomático y mantiene la relación reverencial del griego.
- source_word: ἐδόξασαν
  english_pob_choice: did not glorify
  chosen_spanish: no lo glorificaron
  alternatives_spanish:
  - no lo honraron
  - no le dieron gloria
  lexicon: BDAG
  rationale: '''Glorificar'' preserva el peso teológico del verbo y evita rebajar la acción a mera cortesía. El pronombre retoma naturalmente a Dios.'
- source_word: ἢ ηὐχαρίστησαν
  english_pob_choice: or give thanks
  chosen_spanish: ni le dieron gracias
  alternatives_spanish:
  - ni agradecieron
  - ni le fueron agradecidos
  lexicon: BDAG
  rationale: La negación coordinada en español funciona mejor con 'ni'. 'Dar gracias' reproduce el valor verbal de ευχαριστέω de forma directa y reverente.
- source_word: ἐματαιώθησαν
  english_pob_choice: they became futile
  chosen_spanish: se volvieron vanos
  alternatives_spanish:
  - fueron hechos vanos
  - quedaron frustrados
  lexicon: BDAG
  rationale: El pasivo comunica un volverse a la vanidad/futilidad. 'Se volvieron vanos' mantiene el sentido de vaciamiento mental sin añadir una causalidad más fuerte que la explícita.
- source_word: ἐν τοῖς διαλογισμοῖς αὐτῶν
  english_pob_choice: in their thinking
  chosen_spanish: en sus razonamientos
  alternatives_spanish:
  - en sus pensamientos
  - en sus especulaciones
  lexicon: BDAG
  rationale: '''Razonamientos'' conserva la posible fuerza de deliberaciones o procesos mentales, y preserva la alternativa semántica que el inglés POB anotó. Se evita reducirlo solo a pensamiento difuso.'
- source_word: ἐσκοτίσθη
  english_pob_choice: was darkened
  chosen_spanish: fue entenebrecido
  alternatives_spanish:
  - se oscureció
  - quedó en tinieblas
  lexicon: BDAG
  rationale: '''Entenebrecido'' reproduce el campo metafórico de σκοτίζω y mantiene la pasiva. En español bíblico es claro, solemne y fiel al imaginario de oscuridad moral e intelectual.'
- source_word: ἡ ἀσύνετος αὐτῶν καρδία
  english_pob_choice: their senseless heart
  chosen_spanish: su corazón insensato
  alternatives_spanish:
  - su corazón sin entendimiento
  - su corazón necio
  lexicon: BDAG
  rationale: '''ἀσύνετος'' apunta a falta de entendimiento/discernimiento; ''insensato'' comunica bien la dimensión moral e intelectual. Se conserva el singular ''corazón'' como en el griego, sin normalizarlo al plural.'
theological_decisions:
- issue: Fuerza concesiva de γνόντες
  english_pob_reading: Although they knew God
  chosen_spanish_reading: aunque conocían a Dios
  alternative_spanish_readings:
  - habiendo conocido a Dios
  - cuando conocían a Dios
  rationale: 'Se preserva la culpa destacada por Pablo: el conocimiento no fue negado, pero sí traicionado. La concesión se expresa de forma natural en español sin diluir la responsabilidad.'
  doctrine_reference: Mantener la tensión retórica y moral del texto; no armonizarla artificialmente.
- issue: Singular de 'heart'
  english_pob_reading: their senseless heart
  chosen_spanish_reading: su corazón insensato
  alternative_spanish_readings:
  - sus corazones insensatos
  - su mente insensata
  rationale: El singular del griego se conserva porque funciona como un singular colectivo para la interioridad de la persona. Cambiarlo al plural perdería un rasgo textual relevante; 'mente' sería una simplificación interpretativa.
  doctrine_reference: Respetar el valor antropológico del singular griego sin forzar una antropología técnica ajena al versículo.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el criterio de equivalencia óptima del audit trail inglés. Se mantuvieron la fuerza concesiva de γνόντες, la pasiva de ἐματαιώθησαν y ἐσκοτίσθη, y el singular de καρδία. No se detectaron cambios de revisión aplicados en el expediente inglés reciente, por lo que la redacción refleja el estado estable del texto auditado.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al estándar del proyecto.
  - Se mantiene 'glorificaron' para δοξάζω por su peso teológico habitual en contextos dirigidos a Dios.
  - '''Dar gracias'' traduce εὐχαριστέω de manera verbal y natural en español.'
  - '''Razonamientos'' conserva la amplitud semántica de διαλογισμοί sin cerrar indebidamente la alternativa a ''pensamientos'' o ''especulaciones''.'
  - '''Corazón'' se conserva en singular para reflejar la forma griega y su sentido colectivo antropológico.'
