    rationale: El infinitivo articular τοῦ ἀτιμάζεσθαι mantiene fuerza verbal/resultativa. En español, «para el deshonor de» suena torpe; «para deshonrar sus cuerpos» o similar comunica mejor el sentido preservando la cercanía al original.
  - severity: low
    issue: La nota al pie repite la lectura principal
    rationale: La nota dice «O «entre ellos mismos»», pero esa ya es la lectura del texto. La nota debe ofrecer alternativas reales como «entre ellos» o «en sí mismos».
  - severity: low
    issue: «entre ellos mismos» es comprensible pero menos natural que «entre sí»
    rationale: Para el sentido recíproco/social de ἐν αὐτοῖς, «entre sí» es más idiomático en español general y conserva bien el sentido principal, mientras la nota puede mantener otras posibilidades.
  revised_spanish_text: Por eso Dios los entregó en los deseos de sus corazones a la impureza[a], para deshonrar sus cuerpos entre sí.
