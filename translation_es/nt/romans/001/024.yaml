translation:
  language: es
  text: Por eso Dios los entregó en los deseos de sus corazones a la impureza[a], para deshonrar sus cuerpos entre sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre ellos»; posiblemente «en sí mismos».
    reason: alternative_reading
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca la consecuencia lógica del argumento anterior. «Por eso» mantiene la relación inferencial de forma natural en español sin volverla más pesada que el griego.
- source_word: παρέδωκεν
  english_pob_choice: gave them over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los entregó en manos de
  - los abandonó a
  lexicon: BDAG
  rationale: El verbo expresa una entrega a una condición o poder dominante. «Los entregó» conserva la fuerza judicial y evita una paráfrasis interpretativa más intensa que el texto.
- source_word: ἐν ταῖς ἐπιθυμίαις τῶν καρδιῶν αὐτῶν
  english_pob_choice: in the desires of their hearts
  chosen_spanish: en los deseos de sus corazones
  alternatives_spanish:
  - por los deseos de sus corazones
  - en las pasiones de sus corazones
  lexicon: BDAG
  rationale: Se mantiene la preposición y la imagen antropológica de «corazones». «Deseos» reproduce la amplitud semántica de ἐπιθυμίαις sin restringirla de entrada a lujuria sexual.
- source_word: ἀκαθαρσίαν
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmundez
  lexicon: BDAG
  rationale: «Impureza» es el equivalente español natural para ἀκαθαρσίαν y conserva el sentido moral de contaminación sin arcaísmo.
- source_word: τοῦ ἀτιμάζεσθαι
  english_pob_choice: for the dishonoring of
  chosen_spanish: para el deshonor de
  alternatives_spanish:
  - para que fueran deshonrados
  - con el deshonor de
  lexicon: BDAG
  rationale: La construcción articular infinitiva se vierte con una expresión final nominal para seguir de cerca el griego, como hizo el POB inglés al evitar una cláusula finita. «Deshonor» conserva la idea de pérdida de honra/vergüenza pública.
- source_word: τὰ σώματα αὐτῶν
  english_pob_choice: their bodies
  chosen_spanish: sus cuerpos
  alternatives_spanish:
  - sus cuerpos físicos
  - sus cuerpos mortales
  lexicon: BDAG
  rationale: «Cuerpos» reproduce el sustantivo concreto y mantiene el énfasis paulino en la dimensión corporal.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among themselves / in themselves
  chosen_spanish: entre ellos mismos
  alternatives_spanish:
  - entre sí
  - en sí mismos
  lexicon: BDAG
  rationale: La frase es sintética y admite una lectura recíproca o reflexiva. «Entre ellos mismos» preserva la ambigüedad útil del griego y refleja la nota inglesa de lectura alternativa.
theological_decisions:
- issue: Cómo traducir παρέδωκεν sin suavizar la acción divina ni convertirla en un comentario doctrinal sobre reprobación
  english_pob_reading: gave them over
  chosen_spanish_reading: los entregó
  alternative_spanish_readings:
  - los abandonó
  - los dejó
  rationale: El texto presenta una acción divina real de entrega. «Los entregó» conserva esa tensión sin añadir una glosa sistemática como «los reprobó» o «judicialmente los abandonó», que excedería el alcance inmediato del versículo.
  doctrine_reference: Rom. 1:24; preservar la tensión textual sobre juicio y entrega divina.
- issue: Cómo reflejar la relación de ἐν ταῖς ἐπιθυμίαις... con εἰς ἀκαθαρσίαν
  english_pob_reading: in the desires of their hearts to impurity
  chosen_spanish_reading: en los deseos de sus corazones a la impureza
  alternative_spanish_readings:
  - por los deseos de sus corazones hacia la impureza
  - en las pasiones de sus corazones para la impureza
  rationale: Se conserva la secuencia de esfera/resultado sin convertirla en una explicación moral más amplia de la que el verso da. La formulación mantiene el movimiento del texto desde el deseo interior hacia la impureza.
  doctrine_reference: Rom. 1:24; mantener la progresión causal del pasaje.
translation_notes:
  revision_awareness: El inglés POB revisó la frase final de una cláusula finita («so that their bodies were dishonored») a una construcción nominal más cercana al infinitivo articular («for the dishonoring of their bodies»). La versión española sigue esa revisión con «para el deshonor de sus cuerpos», y conserva la ambigüedad de ἐν αὐτοῖς con una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se oculta el sujeto divino.
  - «Impureza» conserva el valor moral de ἀκαθαρσίαν sin introducir un término técnico eclesiástico.
  - «Corazones» respeta la antropología bíblica y evita reducir el término a «mente».
  - La nota [a] recoge la ambigüedad de ἐν αὐτοῖς sin decidirla de forma excesiva.
  - La sintaxis global busca cercanía al griego con español natural y publicable.
