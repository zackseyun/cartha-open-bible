revisions:
- from: Por eso Dios los entregó en los deseos de sus corazones a la impureza[a], para el deshonor de sus cuerpos entre ellos mismos.
  to: Por eso Dios los entregó en los deseos de sus corazones a la impureza[a], para deshonrar sus cuerpos entre sí.
  rationale: Se ajusta «para el deshonor de» a «para deshonrar» para reflejar mejor τοῦ ἀτιμάζεσθαι en español natural sin alejarse del audit trail inglés. Se cambia «entre ellos mismos» por «entre sí» por mayor naturalidad, y se corrige la nota para que preserve alternativas reales de ἐν αὐτοῖς en vez de repetir la lectura principal.
