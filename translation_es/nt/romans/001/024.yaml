  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido básico del griego: Διὸ = «Por eso», παρέδωκεν = «los entregó», ἐν ταῖς ἐπιθυμίαις τῶν καρδιῶν αὐτῶν = «en los deseos de sus corazones», εἰς ἀκαθαρσίαν = «a la impureza», y τὰ σώματα αὐτῶν = «sus cuerpos». También preserva la cautela del POB inglés sobre ἐν αὐτοῖς con nota alternativa. Sin embargo, «para el deshonor de sus cuerpos» suena poco natural en español y debilita el valor verbal de τοῦ ἀτιμάζεσθαι («ser deshonrados / deshonrarse»).'
  spanish_quality_summary: El texto es mayormente claro, pero «para el deshonor de sus cuerpos» resulta rígido y menos idiomático que una formulación verbal o nominal más natural. Además, la nota al pie actual repite como alternativa exactamente la lectura principal («entre ellos mismos»), por lo que no cumple una función real. Conviene simplificar la principal a «entre sí», que es más natural en español, y dejar las alternativas debatidas en la nota.
  glossary_alignment: 'No hay conflictos con el glosario principal: θεός se traduce correctamente como «Dios»; no aparecen términos de Yahvé, Mesías/Cristo, espíritu, gracia, carne, etc. «Impureza» concuerda bien con ἀκαθαρσίαν. «Los entregó» preserva adecuadamente la fuerza de παρέδωκεν sin glosa doctrinal excesiva.'
