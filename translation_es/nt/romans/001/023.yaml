review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: intercambio deliberado de la gloria de Dios por representaciones idolátricas, con la serie de hombre, aves, cuadrúpedos y reptiles. Sin embargo, hay pequeños puntos de ajuste para alinearse mejor con el audit trail: ἤλλαξαν se refleja mejor con «intercambiaron» que con «cambiaron», y ἀφθάρτου / φθαρτοῦ queda más nítidamente contrastado en español con «imperecedero» / «perecedero» que con «incorruptible» / «corruptible», ya que aquí el matiz principal es no estar sujeto a decadencia. La construcción ἐν ὁμοιώματι εἰκόνος está bien conservada de forma formal con «la semejanza de una imagen».'
  spanish_quality_summary: El español es claro y digno, pero puede sonar un poco rígido por la repetición de «y de» en la lista final y por «cuadrúpedos» sin sustantivo explícito. Una redacción más natural y todavía fiel sería mantener la estructura formal, pero con «intercambiaron» y «animales cuadrúpedos». También conviene simplificar la puntuación de la enumeración para lectura más natural en español bíblico moderno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» y «gloria» están bien. No hay términos sensibles como Yahvé/Mesías/esclavo. El único ajuste léxico recomendado es preferir «imperecedero» para ἀφθάρτου y «perecedero» para φθαρτοῦ, en consonancia con la rationale inglesa documentada sobre el contraste con decadencia.
  issues:
  - severity: medium
    issue: «cambiaron» debilita el matiz de sustitución deliberada de ἤλλαξαν
    rationale: El POB inglés escogió «exchanged» precisamente para expresar intercambio/sustitución, y «intercambiaron» lo preserva mejor en español que el más genérico «cambiaron».
  - severity: medium
    issue: «incorruptible / corruptible» no refleja tan claramente como «imperecedero / perecedero» el contraste de ἀφθάρτου con φθαρτοῦ
    rationale: El audit trail inglés privilegia el sentido de no estar sujeto a decadencia o perecimiento. En español, «incorruptible» puede sugerir matices morales o de integridad además del físico; «imperecedero» evita esa posible ambigüedad.
  - severity: low
    issue: «cuadrúpedos» solo es correcto, pero suena algo nominal y menos natural que «animales cuadrúpedos»
    rationale: El griego refiere una categoría de criaturas; añadir «animales» mejora la legibilidad sin perder literalidad.
  - severity: low
    issue: La enumeración con comas antes de cada «y de» suena algo pesada en español
    rationale: 'Puede aligerarse manteniendo fidelidad formal: «de hombre perecedero, de aves, de animales cuadrúpedos y de reptiles».'
  revised_spanish_text: y intercambiaron la gloria del Dios imperecedero por la semejanza de una imagen de hombre perecedero, de aves, de animales cuadrúpedos y de reptiles[a][b][c][d].
  revised_footnotes:
