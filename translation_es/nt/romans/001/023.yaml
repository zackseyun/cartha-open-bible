translation:
  language: es
  text: y intercambiaron la gloria del Dios imperecedero por la semejanza de una imagen de hombre perecedero, de aves, de animales cuadrúpedos y de reptiles[a][b][c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Dios incorruptible».
    reason: lexical_alternative
  - marker: b
    text: Lit. «por la semejanza de una imagen de hombre perecedero...».
    reason: lexical_alternative
  - marker: c
    text: O «hombre mortal».
    reason: lexical_alternative
  - marker: d
    text: O «seres que se arrastran».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤλλαξαν
  english_pob_choice: exchanged
  chosen_spanish: cambiaron
  alternatives_spanish:
  - intercambiaron
  - sustituyeron
  lexicon: BDAG
  rationale: Expresa la sustitución deliberada del original griego; en español, «cambiaron» comunica bien el acto de reemplazo en este contexto.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente teológico natural en español y conserva el contraste paulino entre la majestad de Dios y los ídolos.
- source_word: ἀφθάρτου
  english_pob_choice: imperishable
  chosen_spanish: incorruptible
  alternatives_spanish:
  - imperecedero
  - inmortal
  lexicon: BDAG
  rationale: «Incorruptible» sigue de cerca el sentido de no estar sujeto a corrupción o decadencia, y en español mantiene bien el contraste con lo corruptible.
- source_word: ἐν ὁμοιώματι εἰκόνος
  english_pob_choice: for the likeness of an image
  chosen_spanish: por la semejanza de una imagen
  alternatives_spanish:
  - en la semejanza de una imagen
  - por una imagen semejante
  lexicon: BDAG
  rationale: La construcción griega es compacta y redundante en su imaginería; «por la semejanza de una imagen» preserva esa relación sin volverse forzado en español.
- source_word: φθαρτοῦ ἀνθρώπου
  english_pob_choice: perishable man
  chosen_spanish: de hombre corruptible
  alternatives_spanish:
  - de hombre mortal
  - de ser humano corruptible
  lexicon: BDAG
  rationale: «Corruptible» conserva la correspondencia con «incorruptible» y la fuerza de contraste del griego; «hombre» mantiene el singular del original.
- source_word: πετεινῶν
  english_pob_choice: birds
  chosen_spanish: aves
  alternatives_spanish:
  - pájaros
  lexicon: BDAG
  rationale: «Aves» es claro, digno y suficientemente amplio para el término griego.
- source_word: τετραπόδων
  english_pob_choice: four-footed animals
  chosen_spanish: cuadrúpedos
  alternatives_spanish:
  - animales de cuatro patas
  - animales cuadrúpedos
  lexicon: BDAG
  rationale: «Cuadrúpedos» reproduce con precisión la categoría zoológica del griego y mantiene la lista estilísticamente compacta.
- source_word: ἑρπετῶν
  english_pob_choice: reptiles
  chosen_spanish: reptiles
  alternatives_spanish:
  - seres que se arrastran
  - animales que se arrastran
  lexicon: BDAG
  rationale: «Reptiles» es la opción concisa y natural en español; aunque el griego puede abarcar más ampliamente a las criaturas que se arrastran, la palabra funciona bien en la lista.
theological_decisions:
- issue: Cómo reflejar la contraposición entre el Dios verdadero y las imágenes creadas
  english_pob_reading: the glory of the imperishable God
  chosen_spanish_reading: la gloria del Dios incorruptible
  alternative_spanish_readings:
  - la gloria del Dios imperecedero
  - la gloria del Dios inmortal
  rationale: Se conserva el lenguaje de gloria e incorruptibilidad para mantener el contraste teológico y retórico del pasaje, sin suavizar la acusación de idolatría.
  doctrine_reference: Romanos 1:23; cf. Éxodo 20:4-5
- issue: Cómo tratar la construcción singular intensiva ἐν ὁμοιώματι εἰκόνος
  english_pob_reading: the likeness of an image
  chosen_spanish_reading: la semejanza de una imagen
  alternative_spanish_readings:
  - la semejanza de un ídolo
  - la apariencia de una imagen
  rationale: La redacción conserva la duplicación conceptual del griego sin convertirla en paráfrasis interpretativa; permite ver que Pablo acumula términos de semejanza e imagen.
  doctrine_reference: Romanos 1:23
- issue: Cómo traducir la serie final de criaturas
  english_pob_reading: birds and four-footed animals and reptiles
  chosen_spanish_reading: aves, cuadrúpedos y reptiles
  alternative_spanish_readings:
  - pájaros, animales de cuatro patas y reptiles
  - aves, animales cuadrúpedos y criaturas que se arrastran
  rationale: 'Se mantiene la enumeración de seres creados para subrayar la degradación idolátrica: de Dios a representaciones de criaturas.'
  doctrine_reference: Romanos 1:23; cf. Deuteronomio 4:16-18
translation_notes:
  revision_awareness: 'Se siguió de cerca la última revisión del texto fuente inglés: se preservó la construcción singular intensiva de ἐν ὁμοιώματι εἰκόνος con una fórmula española equivalente («la semejanza de una imagen»), y se mantuvo la lista final con equivalentes naturales y formales. También se respetó el contraste léxico imperishable/incorruptible mediante «incorruptible», como opción teológicamente transparente en español.'
  spanish_consistency_notes:
  - Se usa «Dios» y no un sustituto reverencial, conforme al texto fuente.
  - Se mantiene «gloria» para δόξα en sentido teológico.
  - «Incorruptible/corruptible» conserva el par de contraste del versículo.
  - La puntuación con comas y conjunción final sigue el ritmo enumerativo del griego y del POB inglés.
  - Los marcadores de nota se colocan solo donde hay alternativa lexical real en el texto.
