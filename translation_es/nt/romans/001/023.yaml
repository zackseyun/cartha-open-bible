  rationale: 'Se revisa para alinear mejor el español con las decisiones léxicas documentadas del POB: «intercambiaron» preserva mejor ἤλλαξαν; «imperecedero / perecedero» refleja con mayor precisión el contraste ἀφθάρτου / φθαρτοῦ; «animales cuadrúpedos» mejora la naturalidad. Se conserva la construcción formal «la semejanza de una imagen» para respetar ἐν ὁμοιώματι εἰκόνος, y se ajustan las notas para que correspondan exactamente al texto revisado.'
