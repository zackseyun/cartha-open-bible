translation:
  language: es
  text: Y no quiero que ustedes[a] ignoren, hermanos, que muchas veces me propuse ir a ustedes, pero se me impidió hasta ahora, para que tuviera algún fruto entre ustedes también[b], así como entre los demás gentiles[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "hermanos y hermanas".'
    reason: alternative_reading
  - marker: b
    text: '"Fruto" aquí se refiere a los resultados del ministerio de Pablo entre ellos.'
    reason: cultural_note
  - marker: c
    text: 'O: "las demás naciones".'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ θέλω δὲ ὑμᾶς ἀγνοεῖν
  english_pob_choice: I do not want you to be unaware
  chosen_spanish: Ahora no quiero que ustedes ignoren
  alternatives_spanish:
  - No quiero que ustedes sepan esto
  - No quiero que desconozcan
  lexicon: BDAG
  rationale: Conserva la fórmula paulina negada con un verbo natural en español. 'Ignoren' mantiene la idea de falta de conocimiento sin volver la frase pesada; el añadido 'Ahora' refleja el matiz discursivo de δέ en este contexto.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, creyentes
  lexicon: BDAG
  rationale: La forma gramatical es masculina plural. En español, 'hermanos' funciona como vocativo natural y estándar para un grupo mixto sin forzar una expansión que el texto griego no explicita en la forma léxica.
- source_word: πολλάκις προεθέμην
  english_pob_choice: I have often planned
  chosen_spanish: muchas veces me propuse
  alternatives_spanish:
  - muchas veces planeé
  - muchas veces tuve la intención
  lexicon: BDAG
  rationale: '''Me propuse'' expresa bien la intención reiterada y voluntaria de προεθέμην. Se evita un calco excesivamente técnico; ''muchas veces'' reproduce πολλάκις con claridad.'
- source_word: ἐκωλύθην
  english_pob_choice: have been prevented
  chosen_spanish: se me impidió
  alternatives_spanish:
  - fui impedido
  - se me obstaculizó
  lexicon: BDAG
  rationale: El pasivo sugiere impedimento externo. En español, 'se me impidió' comunica el hecho sin sonar artificial; mantiene la tensión de una acción frustrada por causa ajena.
- source_word: ἄχρι τοῦ δεῦρο
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta este momento
  - hasta el presente
  lexicon: BDAG
  rationale: Es una equivalencia idiomática directa y natural en español para el valor temporal de la expresión.
- source_word: ἵνα τινὰ καρπὸν σχῶ
  english_pob_choice: so that I might have some fruit
  chosen_spanish: para que tuviera algún fruto
  alternatives_spanish:
  - para que obtuviera algún fruto
  - para que recogiera algún fruto
  lexicon: BDAG
  rationale: '''Fruto'' conserva la metáfora paulina del resultado ministerial. ''Tuviera'' sigue el subjuntivo final y ''algún'' mantiene τινὰ sin exagerar la cuantía.'
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: '''Entre ustedes'' expresa mejor en español el valor relacional y comunitario que Pablo da a la frase, evitando la ambigüedad de una traducción demasiado literal.'
- source_word: καθὼς καὶ ἐν τοῖς λοιποῖς ἔθνεσιν
  english_pob_choice: just as among the rest of the Gentiles
  chosen_spanish: así como entre los demás gentiles
  alternatives_spanish:
  - así como entre las demás naciones
  - igual que entre el resto de los gentiles
  lexicon: BDAG
  rationale: '''Gentiles'' refleja el uso paulino de ἔθνη en este contexto mejor que ''naciones''. ''Demás'' reproduce λοιποῖς y mantiene la referencia a la misión de Pablo entre pueblos no judíos.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el criterio óptimo-equivalente del POB en inglés. Se preserva la metáfora de 'fruto', el impedimento pasivo y el alcance misionero de 'gentiles', sin introducir cambios doctrinales ni suavizar la tensión del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'hermanos' como vocativo directo, con nota de alternativa inclusiva donde el contexto sugiere una audiencia mixta.
  - '''Fruto'' se conserva como metáfora ministerial; la nota aclara su sentido sin sustituir el término.'
  - '''Gentiles'' se usa de forma consistente para ἔθνη en sentido paulino, siguiendo la lectura del audit trail en inglés.'
