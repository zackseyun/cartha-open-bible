translation:
  language: es
  text: quienes cambiaron la verdad de Dios[a] por la mentira, y adoraron y sirvieron a la creación[c] en lugar del Creador, quien es bendito para siempre[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la verdad que pertenece a Dios» o «la verdad acerca de Dios».
    reason: alternative_reading
  - marker: b
    text: O «por los siglos» o «a través de los siglos».
    reason: lexical_alternative
  - marker: c
    text: O «la criatura» o «lo creado».
    reason: lexical_alternative
lexical_decisions:
- source_word: μετήλλαξαν
  english_pob_choice: exchanged
  chosen_spanish: cambiaron
  alternatives_spanish:
  - intercambiaron
  - trastocaron
  lexicon: BDAG
  rationale: 'El verbo expresa un trueque o sustitución, no solo un cambio interno. En español, «cambiaron» comunica con naturalidad esa inversión: sustituyeron la verdad por la mentira.'
- source_word: τὴν ἀλήθειαν τοῦ θεοῦ
  english_pob_choice: the truth of God
  chosen_spanish: la verdad de Dios
  alternatives_spanish:
  - la verdad de Dios
  - la verdad acerca de Dios
  lexicon: BDAG
  rationale: La expresión griega admite tanto posesión como referencia temática. «La verdad de Dios» conserva esa ambigüedad sin forzarla, y es fiel al genitivo del original.
- source_word: ἐν τῷ ψεύδει
  english_pob_choice: for the lie
  chosen_spanish: por la mentira
  alternatives_spanish:
  - por la falsedad
  - en la mentira
  lexicon: BDAG
  rationale: En esta construcción de intercambio, el español natural requiere una preposición de sustitución. «La mentira» mantiene el singular enfático del griego y sugiere una falsedad paradigmatica, no solo falsedad abstracta.
- source_word: ἐσεβάσθησαν
  english_pob_choice: worshiped
  chosen_spanish: adoraron
  alternatives_spanish:
  - dieron reverencia
  - veneraron
  lexicon: BDAG
  rationale: El verbo se mueve en el campo del honor religioso, pero el contexto de Romanos 1 lo acerca al acto de culto. «Adoraron» es la opción española más directa y coherente con el paralelo del segundo verbo.
- source_word: ἐλάτρευσαν
  english_pob_choice: served
  chosen_spanish: sirvieron
  alternatives_spanish:
  - prestaron servicio religioso
  - rindieron servicio
  lexicon: BDAG
  rationale: λατρεύω apunta al servicio cultual. «Sirvieron» mantiene la distinción con «adoraron» y suena natural en español sin perder el sentido de servicio religioso.
- source_word: τῇ κτίσει
  english_pob_choice: the creation
  chosen_spanish: a la creación
  alternatives_spanish:
  - a la criatura
  - a lo creado
  lexicon: BDAG
  rationale: Dado el contraste con «el Creador», «la creación» preserva el par creador/creación y expresa el sentido colectivo más amplio mejor que «la criatura».
- source_word: παρὰ τὸν κτίσαντα
  english_pob_choice: rather than the Creator
  chosen_spanish: en lugar del Creador
  alternatives_spanish:
  - en vez del Creador
  - más bien que el Creador
  lexicon: BDAG
  rationale: παρά introduce contraste y preferencia. «En lugar del» transmite bien la sustitución y es idiomático en español, sin debilitar el contraste teológico.
- source_word: ὅς ἐστιν εὐλογητὸς εἰς τοὺς αἰῶνας
  english_pob_choice: who is blessed forever
  chosen_spanish: quien es bendito por los siglos
  alternatives_spanish:
  - quien es bendito para siempre
  - quien es bendito eternamente
  lexicon: BDAG
  rationale: La doxología relativa se vierte con una fórmula solemne y natural en español. «Por los siglos» conserva el valor idiomático de duración interminable del plural griego.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva la transliteración litúrgica estándar en español.
theological_decisions:
- issue: Genitivo en τὴν ἀλήθειαν τοῦ θεοῦ
  english_pob_reading: the truth of God
  chosen_spanish_reading: la verdad de Dios
  alternative_spanish_readings:
  - la verdad acerca de Dios
  - la verdad que pertenece a Dios
  rationale: El genitivo puede leerse como posesivo o como referencia objetiva. La redacción principal conserva la ambigüedad teológica y lexical sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión interpretativa donde el griego permite varias lecturas.
- issue: Distinción entre ἐσεβάσθησαν y ἐλάτρευσαν
  english_pob_reading: worshiped and served
  chosen_spanish_reading: adoraron y sirvieron
  alternative_spanish_readings:
  - dieron reverencia y sirvieron
  - veneraron y prestaron servicio
  rationale: El original distingue reverencia/culto y servicio religioso. En español, «adoraron y sirvieron» reproduce bien esa progresión y evita fusionar ambos verbos en un solo matiz.
  doctrine_reference: Mantener la distinción lexical entre honor religioso y servicio cultual.
translation_notes:
  revision_awareness: La redacción sigue el último pasaje revisado del audit trail, que optó por 'worshiped and served' para ἐσεβάσθησαν y ἐλάτρευσαν. En español se refleja esa decisión con 'adoraron y sirvieron', preservando además el contraste creador/creación y la doxología final. Se mantiene la ambigüedad del genitivo 'τὴν ἀλήθειαν τοῦ θεοῦ' mediante 'la verdad de Dios'.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Creador' para κτίσαντα, siguiendo el contraste explícito del versículo.
  - '''Amén'' se conserva como forma litúrgica estable en español.'
  - '''La creación'' se elige de forma coherente con la preferencia del audit trail por el sentido colectivo frente a ''la criatura''.'
