translation:
  language: es
  text: llenos de toda[a] injusticia, maldad, avaricia y malicia; llenos de envidia, asesinato, contienda, engaño y mala intención; cuchicheadores[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda injusticia»; el griego expresa un alcance total.
    reason: lexical_alternative
  - marker: b
    text: «Cuchicheadores» también puede traducirse como «chismosos» o «calumniadores en secreto».
    reason: lexical_alternative
lexical_decisions:
- source_word: πεπληρωμένους
  english_pob_choice: filled
  chosen_spanish: llenos
  alternatives_spanish:
  - llenados
  - colmados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado ya alcanzado; en español, «llenos» comunica bien ese estado resultante sin volver la frase artificial. En una lista de vicios, «llenos de» suena natural y conserva el sentido resultativo.
- source_word: πάσῃ
  english_pob_choice: every kind of
  chosen_spanish: toda
  alternatives_spanish:
  - toda clase de
  - todo tipo de
  - all
  lexicon: BDAG
  rationale: Con los sustantivos abstractos que siguen, el griego expresa amplitud total. «Toda» mantiene la fuerza inclusiva de manera más breve y fluida en español, sin perder el alcance comprehensivo.
- source_word: ἀδικίᾳ
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia moral
  - maldad
  - iniquidad
  lexicon: BDAG
  rationale: Aquí ἀδικία tiene un peso moral amplio. «Injusticia» es el equivalente más natural en español y puede abarcar la idea de conducta contraria a la rectitud, aunque «malicia» y «maldad» después permiten distinguir términos cercanos.
- source_word: πονηρίᾳ
  english_pob_choice: evil
  chosen_spanish: maldad
  alternatives_spanish:
  - mal
  - maldad moral
  - perversidad
  lexicon: BDAG
  rationale: «Maldad» expresa el carácter general de malicia o perversidad de forma clara y digna. Evita repetir «injusticia» y respeta la amplitud moral del término.
- source_word: πλεονεξίᾳ
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - ambición desmedida
  - codicia de ganancias
  lexicon: BDAG
  rationale: En español bíblico, «avaricia» comunica con precisión el deseo desordenado de tener más. Es suficientemente natural y conserva el matiz de apetito posesivo del término griego.
- source_word: κακίᾳ
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad
  - perversidad
  - maligno proceder
  lexicon: BDAG
  rationale: 'El texto griego distingue κακία de πονηρία. «Malicia» permite mantener esa distinción: no solo mal general, sino una disposición dañina o resentida hacia otros.'
- source_word: μεστοὺς
  english_pob_choice: full of
  chosen_spanish: rebosantes de
  alternatives_spanish:
  - llenos de
  - colmados de
  lexicon: BDAG
  rationale: «Rebosantes de» recoge la idea de abundancia insistente y ayuda a diferenciar esta segunda mitad de la lista de la primera. En español sigue siendo natural y refuerza la imagen de saturación moral.
- source_word: φθόνου
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - celos
  lexicon: BDAG
  rationale: «Envidia» es el equivalente estándar y preciso en español para el vicio designado por el griego.
- source_word: φόνου
  english_pob_choice: murder
  chosen_spanish: homicidio
  alternatives_spanish:
  - asesinato
  - muerte violenta
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «murder», en español «homicidio» funciona mejor dentro de una lista formal y mantiene la carga moral sin sonar excesivamente específica como «asesinato». También deja visible la gravedad del término sin forzar una juridicidad ajena al contexto.
- source_word: ἔριδος
  english_pob_choice: strife
  chosen_spanish: rivalidad
  alternatives_spanish:
  - contienda
  - discordia
  - pleito
  lexicon: BDAG
  rationale: «Rivalidad» comunica competencia conflictiva y desacuerdo persistente, una forma de contienda social que encaja bien con la lista. En español resulta clara y suficientemente amplia para este contexto.
- source_word: δόλου
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - fraude
  - astucia
  lexicon: BDAG
  rationale: «Engaño» conserva la idea de trampa deliberada en un registro natural y directo. Es la forma más transparente para el lector español contemporáneo.
- source_word: κακοηθείας
  english_pob_choice: maliciousness
  chosen_spanish: malignidad
  alternatives_spanish:
  - malicia
  - mala intención
  - perversidad
  lexicon: BDAG
  rationale: Este sustantivo tiene un matiz de mala disposición o carácter torcido. «Malignidad» ayuda a distinguirlo de «maldad» y «malicia», preservando la acumulación de matices del griego sin repetir exactamente el mismo término.
- source_word: ψιθυριστάς
  english_pob_choice: whisperers
  chosen_spanish: cuchicheadores
  alternatives_spanish:
  - murmuradores
  - gossipers
  - chismosos
  lexicon: BDAG
  rationale: La imagen literal es la de hablar al oído o en voz baja. «Cuchicheadores» conserva esa imagen y mantiene el contraste con otras formas de slander en el contexto inmediato, igual que la solución inglesa con «whisperers».
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto al estado auditado; la redacción española sigue de cerca el griego y conserva las distinciones léxicas observadas en el texto fuente y en la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene la acumulación de dos series adjetivales/participiales con un cambio visible entre «llenos de» y «rebosantes de», reflejando la variación griega entre πεπληρωμένους y μεστοὺς.
  - Se conserva una cadena de sustantivos viciosos con equivalentes españoles de registro bíblico pero comprensible, evitando unificación excesiva de términos cercanos.
  - No se introduce puntuación interpretativa adicional; los dos puntos y punto y coma buscan reflejar la estructura de lista del original.
  - Se usa «homicidio» en vez de «asesinato» para mantener un registro más general y compatible con el vicio-listado.
  - Se preserva la imagen verbal de ψιθυριστάς con «cuchicheadores», y la nota ofrece la alternativa semántica documentada por la POB inglesa.
