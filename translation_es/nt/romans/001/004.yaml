    changes_summary: 'Changed ''appointed'' to ''declared to be'' for better lexical accuracy of ὁρισθέντος; added ''the'' before ''Son of God'' for natural English; changed ''Messiah'' to ''Christ'' to reflect the Greek name-title form Ἰησοῦ Χριστοῦ more directly and naturally here; removed the comma after ''Messiah'' accordingly. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: y que fue declarado[a] Hijo de Dios con poder según el Espíritu de santidad[b] por la resurrección de entre los muertos—Jesús Mesías, nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «designado» Hijo de Dios con poder.
    reason: lexical_alternative
  - marker: b
    text: O «según el Espíritu Santo».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁρισθέντος
  english_pob_choice: declared / appointed / designated
  chosen_spanish: declarado
  alternatives_spanish:
  - designado
  - nombrado
  - apuntado
  lexicon: BDAG
  rationale: ὁρίζω puede expresar determinar, designar o declarar. En español, «declarado» conserva la idea de una proclamación o reconocimiento público sin forzar una lectura adoptiva, y mantiene la tensión teológica que el contexto permite.
- source_word: υἱοῦ θεοῦ
  english_pob_choice: Son of God
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  lexicon: BDAG
  rationale: La expresión es un título cristológico directo y la forma española estándar y transparente es «Hijo de Dios».
- source_word: ἐν δυνάμει
  english_pob_choice: in power
  chosen_spanish: con poder
  alternatives_spanish:
  - en poder
  - poderosamente
  lexicon: BDAG
  rationale: «Con poder» es natural en español y preserva la idea de una manifestación o esfera de poder, sin convertirlo en mero adverbio estilístico.
- source_word: κατὰ πνεῦμα ἁγιωσύνης
  english_pob_choice: according to the Spirit of holiness
  chosen_spanish: según el Espíritu de santidad
  alternatives_spanish:
  - según el espíritu de santidad
  - según el Espíritu Santo
  lexicon: BDAG
  rationale: La frase griega es inusual y conviene conservar su forma transparente. «Espíritu de santidad» refleja el genitivo con literalidad suficiente y deja abierta la cuestión referencial que el texto no resuelve explícitamente.
- source_word: ἐξ ἀναστάσεως νεκρῶν
  english_pob_choice: by the resurrection from the dead
  chosen_spanish: por la resurrección de entre los muertos
  alternatives_spanish:
  - por la resurrección de los muertos
  - a causa de la resurrección de entre los muertos
  lexicon: BDAG
  rationale: «De entre los muertos» reproduce bien el valor de ἐξ en este contexto y resulta idiomático en español bíblico actual.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: En esta serie el título Χριστός se rinde normalmente como «Mesías» según la política del proyecto, preservando el valor titular del término frente a un uso meramente nomimal.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  lexicon: BDAG
  rationale: «Señor» es la equivalencia cristológica estándar para κύριος y mantiene el registro confesional y reverente del pasaje.
theological_decisions:
- issue: Si ὁρισθέντος implica que Jesús comenzó a ser Hijo de Dios en la resurrección
  english_pob_reading: The translation preserves the Greek expression 'declared to be the Son of God in power' without implying that Jesus first became God's Son at the resurrection.
  chosen_spanish_reading: La traducción conserva «fue declarado Hijo de Dios con poder» sin sugerir que Jesús llegó a ser Hijo de Dios por primera vez en la resurrección.
  alternative_spanish_readings:
  - fue designado Hijo de Dios con poder
  - fue nombrado Hijo de Dios con poder
  rationale: La forma elegida permite leer el participio como una declaración pública o manifestación reconocida de una realidad ya presente, sin resolver más de lo que el griego afirma. Así se preserva la tensión textual y la cristología clásica indicada por el contexto.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Concilio de Calcedonia (451)
- issue: Si πνεῦμα ἁγιωσύνης debe identificarse explícitamente con el Espíritu Santo
  english_pob_reading: The main text uses 'the Spirit of holiness' and leaves the exact referent somewhat open.
  chosen_spanish_reading: El texto principal usa «el Espíritu de santidad» y deja abierto el referente exacto.
  alternative_spanish_readings:
  - el Espíritu Santo
  - su espíritu santo
  rationale: La construcción es rara y probablemente deliberada; por eso conviene no cerrar prematuramente la referencia. El español mantiene la misma apertura interpretativa que el griego.
  doctrine_reference: Romanos 1:3–4 en su paralelismo interno
translation_notes:
  revision_awareness: El borrador sigue el audit trail inglés más reciente en mantener la lectura de 'declared' para ὁρισθέντος y en restaurar 'Messiah' para Χριστός. También conserva la apertura interpretativa sobre πνεῦμα ἁγιωσύνης y refleja el tono sintáctico del original sin añadir explicaciones doctrinales al cuerpo principal.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός conforme a la terminología por defecto del proyecto, evitando «Cristo» salvo necesidad idiomática.
  - Se usó «Señor» para κύριος por su valor cristológico establecido en español.
  - La puntuación con raya larga reproduce la pausa del cierre de la cláusula griega y de la tradición editorial del pasaje.
  - Los marcadores de nota [a][b] aparecen en el texto exactamente donde corresponden a las alternativas registradas.
