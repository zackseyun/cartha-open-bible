    rationale: En español general y eclesial, la mayúscula reverencial en ambos términos no es necesaria aquí y puede sonar más a título editorial que a texto bíblico continuo. El griego no exige ese tratamiento; basta una formulación natural y digna.
  - severity: low
    issue: Redacción de la nota al pie algo rígida
    rationale: 'La nota ''O: «en escritos sagrados».'' reproduce bien la alternativa, pero puede simplificarse para ajustarse mejor al estilo de notas del proyecto en español.'
