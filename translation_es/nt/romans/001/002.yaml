lexical_decisions:
- source_word: ὃ
  english_pob_choice: which
  chosen_spanish: lo cual
  alternatives_spanish:
  - lo que
  - el cual
  lexicon: BDAG
  rationale: El relativo neutro retoma el anuncio previo del evangelio mencionado en el contexto inmediato. En español, 'lo cual' conserva bien esa referencia anafórica sin forzar género nominal.
- source_word: προεπηγγείλατο
  english_pob_choice: promised beforehand
  chosen_spanish: había prometido de antemano
  alternatives_spanish:
  - prometió de antemano
  - había anunciado de antemano
  lexicon: BDAG
  rationale: El verbo compuesto incluye la idea de promesa previa; 'había prometido de antemano' preserva tanto el valor promissivo como el aspecto temporal anterior, con una construcción natural en español.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - a través de
  - mediante
  lexicon: BDAG
  rationale: Con genitivo, διά expresa medio o agencia. 'Por medio de' comunica claramente la mediación de los profetas en español bíblico actual.
- source_word: προφητῶν
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - mensajeros proféticos
  lexicon: BDAG
  rationale: '''Profetas'' es la equivalencia directa y natural para los mensajeros inspirados por los que Dios habló anteriormente.'
- source_word: ἐν γραφαῖς ἁγίαις
  english_pob_choice: in the holy Scriptures
  chosen_spanish: en las Sagradas Escrituras
  alternatives_spanish:
  - en las santas Escrituras
  - en escritos sagrados
  lexicon: BDAG
  rationale: γραφαί en Pablo suele designar Escrituras reconocidas canónicamente, no simples escritos. 'Sagradas Escrituras' conserva esa fuerza referencial; el adjetivo en mayúscula inicial ayuda a marcar el carácter técnico y reverente del término en español.
theological_decisions:
- issue: Si γραφαῖς ἁγίαις debe entenderse como un título canónico o como una descripción general de escritos santos
  english_pob_reading: the holy Scriptures
  chosen_spanish_reading: las Sagradas Escrituras
  alternative_spanish_readings:
  - los santos escritos
  - escritos sagrados
  rationale: La lectura inglesa opta por el sentido canónico de γραφαί. En español, 'Sagradas Escrituras' comunica mejor ese valor reconocido sin debilitar la santidad atribuida al corpus escrito.
  doctrine_reference: Canonicidad de la Escritura; 2 Timoteo 3:15-16; Romanos 15:4
- issue: Si el relativo neutro ὃ debe hacerse explícitamente masculino o neutro en español
  english_pob_reading: which
  chosen_spanish_reading: lo cual
  alternative_spanish_readings:
  - lo que
  - el cual
  rationale: El antecedente conceptual es el evangelio anunciado en 1:1, no una persona o sustantivo masculino. 'Lo cual' mantiene la referencia neutra y la cohesión discursiva.
  doctrine_reference: Gramática del antecedente neutro; Romanos 1:1-2
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el testimonio del texto y de la auditoría coincide en la lectura tradicional-canónica de γραφαῖς ἁγίαις, por lo que la versión española sigue esa decisión con un equivalente natural y auditable.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico formal y natural en español.
  - Se prefirió 'Sagradas Escrituras' frente a un calco de 'holy writings' para conservar la fuerza canónica ya documentada en la auditoría inglesa.
  - '''Lo cual'' evita forzar género masculino al relativo neutro del griego.'
  - Se usó 'por medio de' para la mediación expresada por διά con genitivo.
