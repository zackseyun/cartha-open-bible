  rationale: Se corrige el conector inferencial para reflejar con mayor naturalidad οὕτως en español, se mejora la nota alternativa, y se reubica «también» para que el énfasis inclusivo de καὶ ὑμῖν recaiga más claramente en los destinatarios romanos. No se requiere adjudicación adicional porque son ajustes menores de estilo y precisión.
