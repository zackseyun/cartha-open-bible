translation:
  language: es
  text: Por eso[a], por mi parte, estoy deseoso de anunciarles el evangelio también a ustedes que están en Roma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así que».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So
  chosen_spanish: Así
  alternatives_spanish:
  - De modo que
  - Entonces
  lexicon: BDAG
  rationale: Funciona como conector inferencial/conclusivo; «Así» conserva esa relación de enlace sin sonar forzado en español.
- source_word: τὸ κατ’ ἐμὲ πρόθυμον
  english_pob_choice: for my part, I am eager
  chosen_spanish: por mi parte, estoy deseoso
  alternatives_spanish:
  - en lo que a mí respecta, estoy dispuesto
  - por mi parte, estoy listo
  lexicon: BDAG
  rationale: La expresión es elíptica e idiomática. «Por mi parte» reproduce el matiz personal de κατ’ ἐμέ, y «estoy deseoso» refleja πρόθυμον como disposición entusiasta, no solo disponibilidad.
- source_word: καὶ ὑμῖν
  english_pob_choice: also to you
  chosen_spanish: también a ustedes
  alternatives_spanish:
  - a ustedes también
  - también para ustedes
  lexicon: BDAG
  rationale: Mantiene el énfasis inclusivo de καί aplicado al destinatario, no al verbo.
- source_word: τοῖς ἐν Ῥώμῃ
  english_pob_choice: who are in Rome
  chosen_spanish: que están en Roma
  alternatives_spanish:
  - los que están en Roma
  - los que viven en Roma
  lexicon: BDAG
  rationale: El participio/artículo más la frase preposicional identifican a los destinatarios; «que están en Roma» es natural y fiel.
- source_word: εὐαγγελίσασθαι
  english_pob_choice: to proclaim the good news
  chosen_spanish: anunciarles... el evangelio
  alternatives_spanish:
  - predicarles el evangelio
  - evangelizarles
  lexicon: BDAG
  rationale: El verbo expresa anunciar buenas noticias. «Anunciarles el evangelio» conserva el contenido sin restringirlo a un formato litúrgico de predicación. Se mantiene el dativo de destinatario con «les».
theological_decisions:
- issue: 'Matiz de εὐαγγελίζω: «proclamar la buena noticia» vs. «predicar el evangelio»'
  english_pob_reading: to proclaim the good news
  chosen_spanish_reading: anunciarles el evangelio
  alternative_spanish_readings:
  - predicarles el evangelio
  - anunciar la buena noticia
  rationale: No hay una carga doctrinal especial en el término aquí, pero sí una preferencia por un español amplio y eclesialmente claro. «Anunciarles el evangelio» preserva el acto de comunicar buenas noticias sin reducirlo a la noción más estrecha de sermón formal.
  doctrine_reference: Ninguna; decisión lexical-contextual.
translation_notes:
  revision_awareness: Se siguió el cierre revisado del inglés POB, donde «also» modifica a «you» y no al infinitivo; por eso se colocó «también» junto a «a ustedes».
  spanish_consistency_notes:
  - Se evitó «Señor» porque el versículo no contiene κύριος ni el nombre divino.
  - Se evitó «Cristo» porque no aparece Χριστός en el texto fuente.
  - Se optó por «evangelio» en lugar de una paráfrasis más amplia para conservar la fuerza lexical de εὐαγγελίζω en el contexto paulino.
  - La formulación en primera persona singular conserva el sujeto implícito del griego y el carácter personal de la intención de Pablo.
