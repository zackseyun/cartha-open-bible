translation:
  language: es
  text: porque lo que se conoce acerca de Dios es claro entre ellos[a], pues Dios se lo ha hecho evidente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ellos» o «en su interior».
    reason: alternative_reading
lexical_decisions:
- source_word: διότι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce con naturalidad la razón del enunciado anterior y conserva la relación causal directa del griego.
- source_word: τὸ γνωστὸν
  english_pob_choice: what is known
  chosen_spanish: lo conocido
  alternatives_spanish:
  - lo que puede conocerse
  - lo cognoscible
  lexicon: BDAG
  rationale: El sustantivo neutro con artículo funciona de modo sustantivado; en español, «lo conocido» preserva bien esa forma sin añadir más de lo que el texto dice.
- source_word: τοῦ θεοῦ
  english_pob_choice: about God
  chosen_spanish: de Dios
  alternatives_spanish:
  - acerca de Dios
  - sobre Dios
  lexicon: BDAG
  rationale: 'El genitivo se entiende de manera objetiva: se trata de lo que puede conocerse respecto de Dios, y «de Dios» mantiene una formulación breve y fiel.'
- source_word: φανερόν
  english_pob_choice: plain
  chosen_spanish: claro
  alternatives_spanish:
  - evidente
  - manifiesto
  lexicon: BDAG
  rationale: «Claro» conserva la idea de algo abiertamente perceptible y se enlaza bien con el verbo cognado del final de la frase.
- source_word: ἐν αὐτοῖς
  english_pob_choice: among them
  chosen_spanish: entre ellos
  alternatives_spanish:
  - en ellos
  - dentro de ellos
  lexicon: BDAG
  rationale: La frase admite una lectura interna o colectiva. «Entre ellos» sigue la lectura pública/comunitaria adoptada en el texto principal, sin excluir del todo la posibilidad interna, que se conserva como alternativa.
- source_word: ἐφανέρωσεν
  english_pob_choice: has made it plain
  chosen_spanish: se lo ha hecho claro
  alternatives_spanish:
  - se lo ha revelado
  - lo ha manifestado
  lexicon: BDAG
  rationale: «Hacer claro» reproduce de manera natural el matiz de manifestar/poner de manifiesto y mantiene la conexión léxica con φανερόν.
theological_decisions:
- issue: Ambigüedad de ἐν αὐτοῖς
  english_pob_reading: among them
  chosen_spanish_reading: entre ellos
  alternative_spanish_readings:
  - en ellos
  - dentro de ellos
  rationale: Se conserva la tensión interpretativa del griego. El contexto de la carta favorece la disponibilidad pública de la revelación, pero el posible sentido interno no se elimina y queda reflejado en la alternativa.
  doctrine_reference: Preservar la ambigüedad exegética sin resolverla artificialmente.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste más reciente del POB inglés, que prefirió «what is known about God» frente a «what can be known about God» por mayor precisión léxica en τὸ γνωστὸν. Mantengo esa precisión con «lo conocido de Dios», y conservo la nota de ambigüedad para ἐν αὐτοῖς.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός conforme al estándar del proyecto.
  - Se prefirió «claro»/«hacer claro» para conservar el vínculo cognado entre φανερόν y ἐφανέρωσεν.
  - No se usó «SEÑOR» ni se introdujo terminología eclesiástica no presente en el texto.
