    issue: La nota [a] contradice o duplica el texto principal.
    rationale: 'El texto principal ya dice «en mi espíritu», pero la nota [a] ofrece precisamente «O: “en mi espíritu”». Una nota alternativa no puede repetir la lectura base; debe ofrecer «con mi espíritu» si se conserva el texto actual, o eliminarse.'
  - severity: medium
    issue: «evangelio» en el texto principal se aparta de la decisión auditada «good news».
    rationale: Aunque «evangelio» es una opción española natural, la auditoría inglesa documenta una preferencia deliberada por una formulación más transparente. En este contexto, «buena noticia» es viable en español y mantiene mejor la coherencia del proyecto.
  - severity: low
    issue: La nota literal sobre μνείαν ὑμῶν ποιοῦμαι es innecesaria si el texto principal ya usa la forma literal.
    rationale: 'Si el texto principal dice «hago mención de ustedes», la nota «Literalmente: “hago mención de ustedes”» no añade información. Conviene o cambiar el texto principal a una forma más idiomática y conservar la nota literal, o eliminar la nota.'
  revised_spanish_text: Porque Dios, a quien sirvo en mi espíritu en la buena noticia[a] de su Hijo, es mi testigo de que sin cesar hago mención de ustedes.
