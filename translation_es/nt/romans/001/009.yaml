translation:
  language: es
  text: Porque Dios, a quien sirvo en mi espíritu en la buena noticia[a] de su Hijo, es mi testigo de que sin cesar hago mención de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «evangelio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάρτυς
  english_pob_choice: witness
  chosen_spanish: testigo
  alternatives_spanish:
  - testimonio
  lexicon: BDAG
  rationale: En este juramento implícito, μάρτυς designa a quien da fe de la veracidad de la afirmación de Pablo. «Testigo» conserva el valor personal y forense mejor que «testimonio».
- source_word: λατρεύω
  english_pob_choice: serve
  chosen_spanish: sirvo
  alternatives_spanish:
  - adoro
  - rindo culto
  lexicon: BDAG
  rationale: Aquí λατρεύω expresa servicio devoto a Dios; «sirvo» mantiene el matiz de dedicación religiosa sin forzar un tecnicismo litúrgico.
- source_word: ἐν τῷ πνεύματί μου
  english_pob_choice: in my spirit
  chosen_spanish: en mi espíritu
  alternatives_spanish:
  - con mi espíritu
  lexicon: BDAG
  rationale: La preposición ἐν se refleja de manera directa con «en», siguiendo la revisión inglesa más cercana al griego. «Con mi espíritu» sería más interpretativo en español.
- source_word: εὐαγγελίῳ
  english_pob_choice: good news
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por «good news», en español bíblico «evangelio» es el equivalente natural y fiel del sustantivo εὐαγγέλιον; «buena noticia» suena menos estable en este contexto eclesial.
- source_word: τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: of his Son
  chosen_spanish: de su Hijo
  alternatives_spanish:
  - acerca de su Hijo
  lexicon: BDAG
  rationale: Se conserva el genitivo simple del original con «de su Hijo». La expansión «acerca de» interpretaría más de lo que exige la forma griega.
- source_word: ἀδιαλείπτως
  english_pob_choice: continually
  chosen_spanish: sin cesar
  alternatives_spanish:
  - continuamente
  - constantemente
  lexicon: BDAG
  rationale: El adverbio expresa continuidad ininterrumpida; «sin cesar» reproduce bien esa intensidad en español bíblico contemporáneo.
- source_word: μνείαν ὑμῶν ποιοῦμαι
  english_pob_choice: I mention you
  chosen_spanish: hago mención de ustedes
  alternatives_spanish:
  - los menciono
  - me acuerdo de ustedes
  lexicon: BDAG
  rationale: El giro griego es literalmente «hago mención de ustedes». En español, «hago mención de ustedes» conserva el idiomatismo y la relación con la redacción auditada, sin reducirlo a mero «recordar».
theological_decisions:
- issue: Cómo expresar el servicio de Pablo a Dios en relación con su espíritu
  english_pob_reading: I serve in my spirit
  chosen_spanish_reading: sirvo en mi espíritu
  alternative_spanish_readings:
  - sirvo con mi espíritu
  - sirvo desde mi espíritu
  rationale: La redacción sigue de cerca la revisión inglesa que volvió a «in my spirit», reflejando ἐν τῷ πνεύματί μου sin añadir un matiz instrumental más fuerte del que está en el griego.
  doctrine_reference: Romanos 1:9; cf. POB lexical note on ἐν τῷ πνεύματί μου
- issue: Cómo traducir εὐαγγέλιον sin imponer un término eclesiástico no explicitado por el proyecto
  english_pob_reading: good news
  chosen_spanish_reading: evangelio
  alternative_spanish_readings:
  - buena noticia
  rationale: Aunque el inglés POB usa una equivalencia más explicativa, en español «evangelio» es la forma consagrada y perfectamente transparente del término. Aquí no introduce una distorsión doctrinal y preserva la intertextualidad bíblica.
  doctrine_reference: Translation philosophy §6
- issue: Si la mención de Dios como testigo debe separarse del verbo principal
  english_pob_reading: For God, whom I serve in my spirit in the good news of his Son, is my witness that I continually mention you.
  chosen_spanish_reading: Porque Dios, a quien sirvo en mi espíritu en el evangelio de su Hijo, es mi testigo de que sin cesar hago mención de ustedes.
  alternative_spanish_readings:
  - Porque Dios es mi testigo, a quien sirvo en mi espíritu en el evangelio de su Hijo, de que sin cesar hago mención de ustedes.
  rationale: Se mantiene la estructura natural de la oración con la cláusula relativa antes del predicado, como en la revisión inglesa. Esto evita una separación artificial entre «es mi testigo» y el contenido del juramento.
  doctrine_reference: Romanos 1:9
translation_notes:
  revision_awareness: La versión inglesa pasó por una revisión estructural que unió la cláusula relativa con comas para mejorar la claridad y luego ajustó ἐν τῷ πνεύματί μου de «with my spirit» a «in my spirit». La redacción española refleja esa última lectura más cercana al griego y conserva el orden sintáctico natural del período, evitando una separación artificial del predicado principal.
  spanish_consistency_notes:
  - Se emplea «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se mantiene «Dios» para θεός y «Hijo» con mayúscula para el referente divino.
  - «evangelio» se usa como equivalente estable de εὐαγγέλιον en español bíblico, aunque el inglés POB prefiera «good news».
  - «sirvo» conserva el matiz de λατρεύω sin introducir «adoro» como opción dominante.
  - «sin cesar» expresa ἀδιαλείπτως con naturalidad y sin perder continuidad ininterrumpida.
