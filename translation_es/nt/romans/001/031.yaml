translation:
  language: es
  text: insensatos, desleales[a], sin cariño familiar[b], sin misericordia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inconfiables» o «quebrantadores de pacto».
    reason: lexical_alternative
  - marker: b
    text: La expresión griega apunta especialmente a la falta de afecto familiar natural.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσυνέτους
  english_pob_choice: senseless
  chosen_spanish: insensatos
  alternatives_spanish:
  - sin entendimiento
  - incapaces de discernir
  - necios
  lexicon: BDAG
  rationale: El griego indica falta de entendimiento o discernimiento moral e intelectual. «Insensatos» comunica de manera natural esa carencia en español y evita reducirlo solo a torpeza intelectual.
- source_word: ἀσυνθέτους
  english_pob_choice: faithless
  chosen_spanish: infieles
  alternatives_spanish:
  - desleales
  - inconfiables
  - quebrantadores de pacto
  lexicon: BDAG
  rationale: El término describe personas que no cumplen acuerdos o no son confiables en relaciones comprometidas. «Infieles» conserva esa falta de lealtad relacional en español, aunque la alternativa «quebrantadores de pacto» queda como posible matiz más específico.
- source_word: ἀστόργους
  english_pob_choice: heartless
  chosen_spanish: sin afecto natural
  alternatives_spanish:
  - sin amor familiar
  - sin cariño familiar
  - despiadados
  lexicon: BDAG
  rationale: El griego niega στοργή, es decir, el afecto natural, especialmente el familiar. La frase «sin afecto natural» refleja con precisión ese matiz que el inglés POB preservó en nota.
- source_word: ἀνελεήμονας
  english_pob_choice: merciless
  chosen_spanish: implacables
  alternatives_spanish:
  - sin misericordia
  - sin compasión
  - despiadados
  lexicon: BDAG
  rationale: El adjetivo significa literalmente carentes de misericordia o compasión. «Implacables» transmite bien esa dureza moral en español moderno; «sin misericordia» queda como alternativa más directa.
translation_notes:
  revision_awareness: El texto griego y el expediente inglés muestran un listado de cuatro adjetivos negativos sin cambios textuales relevantes; la versión española sigue de cerca el valor léxico de cada término y conserva en notas el matiz relacional y familiar donde el inglés POB también lo destacó.
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico claro y contemporáneo, sin recurrir a calcos innecesarios.
  - «Infieles» se eligió por su naturalidad en español y su capacidad para abarcar la idea de falta de lealtad; la nota preserva la alternativa más técnica.
  - «Sin afecto natural» se usa para hacer explícito el matiz cultural que en español no queda igual de compacto que en inglés con «heartless».
