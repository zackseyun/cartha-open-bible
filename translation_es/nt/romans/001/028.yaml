    changes_summary: Revised 'since' to 'just as' for καθὼς, restored the fuller sense of ἔχειν ἐν ἐπιγνώσει as 'to have God in their knowledge' rather than 'acknowledge God,' and changed 'unfit mind' to the more natural and contextually apt 'debased mind' for ἀδόκιμον νοῦν.
translation:
  language: es
  text: Y así como no tuvieron a bien tener a Dios en su conocimiento[a], Dios los entregó a una mente degradada[b], para hacer lo que no conviene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «retener a Dios en su conocimiento».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «una mente reprobada»; el adjetivo griego está relacionado con «no tuvieron a bien» antes en el versículo, preservando el juego de palabras.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ καθὼς
  english_pob_choice: And just as
  chosen_spanish: Y así como
  alternatives_spanish:
  - Y puesto que
  - Y dado que
  lexicon: SBLGNT; BDAG (καθώς)
  rationale: «Así como» conserva la relación comparativa / causal del griego en un español natural; el adverbio inicial «Y» reproduce la conexión discursiva sin sobrecargarla.
- source_word: οὐκ ἐδοκίμασαν
  english_pob_choice: did not see fit
  chosen_spanish: no aprobaron
  alternatives_spanish:
  - no les pareció bien
  - no consideraron valioso
  lexicon: BDAG (δοκιμάζω)
  rationale: δοκιμάζω aquí expresa evaluación y rechazo. «No aprobaron» conserva la idea de valorar y aceptar como apto, y permite mantener la tensión lexical con ἀδόκιμον más adelante.
- source_word: τὸν θεὸν ἔχειν ἐν ἐπιγνώσει
  english_pob_choice: to have God in their knowledge
  chosen_spanish: tener a Dios en su conocimiento
  alternatives_spanish:
  - retener a Dios en su conocimiento
  - reconocer a Dios
  lexicon: BDAG (ἔχω ἐν ἐπιγνώσει)
  rationale: La frase mantiene el sentido idiomático de poseer/retener a Dios dentro del ámbito del conocimiento, sin perder la concreción de «tener ... en su conocimiento».
- source_word: παρέδωκεν
  english_pob_choice: gave them over
  chosen_spanish: los entregó
  alternatives_spanish:
  - los abandonó
  - los entregó al poder de
  lexicon: BDAG (παραδίδωμι)
  rationale: «Entregó» comunica bien el acto judicial de abandono o remisión divina. Se evita expandir el objeto de manera interpretativa.
- source_word: ἀδόκιμον νοῦν
  english_pob_choice: a debased mind
  chosen_spanish: una mente reprobada
  alternatives_spanish:
  - una mente depravada
  - una mente debilitada
  lexicon: BDAG (ἀδόκιμος; νοῦς)
  rationale: «Reprobada» preserva la relación léxica con la idea de no haber aprobado en la primera mitad del versículo, y mantiene el matiz de algo que no ha pasado la prueba. Se evita «depravada» por ser más doctrinal y más fuerte de lo que el adjetivo exige por sí mismo.
- source_word: ποιεῖν
  english_pob_choice: to do
  chosen_spanish: para hacer
  alternatives_spanish:
  - para practicar
  - para cometer
  lexicon: BDAG (ποιέω)
  rationale: El infinitivo se vierte de forma directa con valor de resultado / finalidad tras «los entregó».
- source_word: τὰ μὴ καθήκοντα
  english_pob_choice: what is not fitting
  chosen_spanish: lo que no conviene
  alternatives_spanish:
  - lo que no es apropiado
  - las cosas que no deben hacerse
  lexicon: BDAG (καθήκω)
  rationale: «Lo que no conviene» es una manera natural de expresar lo impropio / no apto, conservando el juicio moral sin endurecerlo con una paráfrasis más explícita.
theological_decisions:
- issue: Cómo renderizar ἀδόκιμον νοῦν sin resolver la carga moral-teológica del término.
  english_pob_reading: a debased mind
  chosen_spanish_reading: una mente reprobada
  alternative_spanish_readings:
  - una mente depravada
  - una mente desacreditada
  rationale: Se mantiene una traducción que refleje tanto la idea de no haber sido aprobada como el acto judicial de abandono por parte de Dios, sin sustituir el término por uno posterior o más sistemático.
  doctrine_reference: Conservar la tensión lexical y judicial del pasaje; no homogeneizar con terminología dogmática posterior.
- issue: Relación entre el rechazo humano previo y la acción divina subsiguiente.
  english_pob_reading: just as ... God gave them over
  chosen_spanish_reading: Y así como ... Dios los entregó
  alternative_spanish_readings:
  - Y puesto que ... Dios los entregó
  - Y como ... Dios los abandonó
  rationale: «Así como» deja visible la conexión entre la negativa humana y la respuesta divina sin resolverla en un solo matiz causal; «los entregó» mantiene el lenguaje judicial del texto.
  doctrine_reference: Preservar el orden del argumento paulino sin atenuar la responsabilidad humana ni la iniciativa judicial divina.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se recuperó la fuerza comparativa de καθὼς con «Y así como», se reflejó ἔχειν ἐν ἐπιγνώσει con una formulación posesiva concreta («tener a Dios en su conocimiento»), y se optó por un equivalente que preserve el campo semántico de ἀδόκιμος sin elevarlo innecesariamente a terminología doctrinal más cargada.'
  spanish_consistency_notes:
  - Se usó «Dios» para θεός en ambas apariciones, conservando la repetición del original.
  - 'Se mantuvo la secuencia verbal del versículo: rechazo humano → entrega divina → finalidad moral negativa.'
  - Las notas [a] y [b] están ancladas exactamente en el texto y no se repiten en ningún otro lugar.
