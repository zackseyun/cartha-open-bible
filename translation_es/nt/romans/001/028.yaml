  text: Καὶ καθὼς οὐκ ἐδοκίμασαν τὸν θεὸν ἔχειν ἐν ἐπιγνώσει, παρέδωκεν αὐτοὺς ὁ θεὸς εἰς ἀδόκιμον νοῦν, ποιεῖν τὰ μὴ καθήκοντα,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/028.yaml
  text: And just as they did not see fit to have God in their knowledge[a], God gave them over to a debased mind, to do what is not fitting[b],
  footnotes:
