translation:
  language: es
  text: calumniadores, odiosos para Dios[a], insolentes, arrogantes, jactanciosos, inventores de males, desobedientes a los padres,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “aborrecidos por Dios”.
    reason: alternative_reading
lexical_decisions:
- source_word: καταλάλους
  english_pob_choice: slanderers
  chosen_spanish: murmuradores
  alternatives_spanish:
  - calumniadores
  - malhablados
  - difamadores
  lexicon: BDAG
  rationale: El término apunta a hablar contra otros de manera dañina o difamatoria. En español, “murmuradores” mantiene la idea de hablar mal de otros en un registro bíblico natural; “calumniadores” es más fuerte y puede implicar falsedad jurídica, por eso lo dejo como alternativa.
- source_word: θεοστυγεῖς
  english_pob_choice: hateful to God
  chosen_spanish: aborrecidos de Dios
  alternatives_spanish:
  - odiosos para Dios
  - aborrecidos por Dios
  - odiadores de Dios
  lexicon: BDAG
  rationale: La POB inglesa revisada prefirió una lectura pasiva/relacional sin afirmar demasiado el sentido activo. En español, “aborrecidos de Dios” conserva esa tensión y no fuerza “odiadores de Dios”, que sería más interpretativo y resolvería la ambigüedad demasiado pronto.
- source_word: ὑβριστάς
  english_pob_choice: insolent
  chosen_spanish: insolentes
  alternatives_spanish:
  - violentos
  - abusivos
  - injuriosos
  lexicon: BDAG
  rationale: “Insolentes” reproduce bien la mezcla de arrogancia, abuso y desvergüenza del término sin limitarlo a violencia física. Es el equivalente más compacto y natural en una lista de vicios.
- source_word: ὑπερηφάνους
  english_pob_choice: arrogant
  chosen_spanish: arrogantes
  alternatives_spanish:
  - soberbios
  - altivos
  - orgullosos
  lexicon: BDAG
  rationale: “Arrogantes” conserva el sentido de autoexaltación y diferencia este vocablo del siguiente en la lista. “Soberbios” también es posible, pero “arrogantes” suena más transparente en español moderno.
- source_word: ἀλαζόνας
  english_pob_choice: boastful
  chosen_spanish: jactanciosos
  alternatives_spanish:
  - alardosos
  - presumidos
  - fanfarrones
  lexicon: BDAG
  rationale: El sustantivo describe a quienes se pavonean o fanfarronean. “Jactanciosos” preserva ese matiz con un tono bíblico claro y no trivializa el vocablo como podría hacerlo “presumidos”.
- source_word: ἐφευρετὰς κακῶν
  english_pob_choice: inventors of evil
  chosen_spanish: inventores de males
  alternatives_spanish:
  - inventores de maldades
  - ideadores de males
  - diseñadores del mal
  lexicon: BDAG
  rationale: La frase griega describe a personas que idean creativamente lo malo. “Inventores de males” sigue de cerca la imagen y mantiene el plural genérico de κακῶν sin convertirlo en una abstracción excesiva.
- source_word: γονεῦσιν ἀπειθεῖς
  english_pob_choice: disobedient to parents
  chosen_spanish: desobedientes a los padres
  alternatives_spanish:
  - rebeldes contra sus padres
  - desobedientes a sus padres
  lexicon: BDAG
  rationale: El dativo con el adjetivo se expresa naturalmente con “a los padres”. “Desobedientes a los padres” es claro, fiel y suficientemente general para ambos sexos de progenitores en español.
theological_decisions:
- issue: Sentido de θεοστυγεῖς
  english_pob_reading: Revision chose 'hateful to God' rather than strongly active 'God-haters', while preserving the passive possibility in the audit trail.
  chosen_spanish_reading: aborrecidos de Dios
  alternative_spanish_readings:
  - odiadores de Dios
  - odiosos para Dios
  - aborrecidos por Dios
  rationale: 'La forma griega admite discusión entre una lectura activa y otra pasiva/relacional. En español, “aborrecidos de Dios” mantiene la ambigüedad útil: puede oírse como “odiados por Dios” sin cerrar del todo la frase en una acusación activa contra las personas. Esto preserva la tensión documentada por la POB inglesa.'
  doctrine_reference: Preservar la tensión exegética documentada; no resolver la ambigüedad sin base suficiente.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente para θεοστυγεῖς, evitando una afirmación más fuerte como “odiadores de Dios” y conservando la posibilidad pasiva/relacional registrada en el aparato auditado. El resto de la lista mantiene equivalencia semántica estrecha con el griego y un registro natural en español.
  spanish_consistency_notes:
  - Se mantiene el tono de lista asindética con sustantivos/adjetivos en plural, como en el griego.
  - Se evita “SEÑOR” porque no aparece aquí el tetragrámaton ni κύριος como sustituto directo.
  - Se conserva la secuencia de vicios con paralelismo léxico y sin explicitar conectores que el original no tiene.
  - Se usa “males” para κακῶν siguiendo la amplitud genérica de κακός; no se reduce a un solo matiz como “maldades” sin necesidad.
