  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La ira de Dios», «impiedad», «injusticia» y «verdad» están alineados con las decisiones auditadas. El principal ajuste necesario es llevar κατέχω a «suprimen» en el texto principal, reservando «detienen/retienen/reprimen» como alternativas de nota.
