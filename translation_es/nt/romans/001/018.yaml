translation:
  language: es
  text: Porque se está revelando la ira[a] de Dios desde el cielo contra toda impiedad e injusticia de los seres humanos[b], que suprimen[c] la verdad con injusticia[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se revela».
    reason: lexical_alternative
  - marker: b
    text: O «personas»; el griego se refiere a seres humanos en general.
    reason: lexical_alternative
  - marker: c
    text: O «detienen», «reprimen» o «retienen»; el verbo puede expresar la idea de contener, frenar o sofocar la verdad en este contexto.
    reason: lexical_alternative
  - marker: d
    text: O «en injusticia» o «por injusticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀποκαλύπτεται
  english_pob_choice: is being revealed
  chosen_spanish: se está revelando
  alternatives_spanish:
  - se revela
  lexicon: BDAG
  rationale: El presente pasivo indica una acción en curso; «se está revelando» conserva mejor ese aspecto progresivo que un presente simple, sin sonar forzado en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Aquí introduce la base explicativa de la afirmación anterior; «Porque» mantiene bien la relación lógica y resulta natural en español.
- source_word: ὀργὴ θεοῦ
  english_pob_choice: the wrath of God
  chosen_spanish: la ira de Dios
  alternatives_spanish:
  - el enojo de Dios
  - la indignación de Dios
  lexicon: BDAG
  rationale: «Ira» preserva la fuerza judicial y personal de ὀργή. «Enojo» o «indignación» suavizan o desplazan el tono del pasaje.
- source_word: ἀπ’ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - del cielo
  lexicon: BDAG
  rationale: «Desde el cielo» expresa con claridad el origen celestial de la revelación y suena idiomático en español.
- source_word: πᾶσαν ἀσέβειαν
  english_pob_choice: all ungodliness
  chosen_spanish: toda impiedad
  alternatives_spanish:
  - toda irreverencia
  - toda falta de piedad
  lexicon: BDAG
  rationale: «Impiedad» es un equivalente bíblico consolidado para ἀσέβεια y conserva la orientación vertical hacia Dios. «Irreverencia» puede servir, pero es algo más interpretativa.
- source_word: ἀδικίαν
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - iniquidad
  - maldad
  lexicon: BDAG
  rationale: Aunque «injusticia» puede sonar más social, aquí permite mantener la repetición con ἐν ἀδικίᾳ al final. En español también puede abarcar lo moral y relacional del término.
- source_word: ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: de los seres humanos
  alternatives_spanish:
  - de las personas
  - de la gente
  lexicon: BDAG
  rationale: La forma griega es genérica; «seres humanos» evita lectura masculina exclusiva y hace explícito el sentido inclusivo del original.
- source_word: τῶν ... κατεχόντων
  english_pob_choice: who suppress
  chosen_spanish: que detienen
  alternatives_spanish:
  - que suprimen
  - que reprimen
  - que retienen
  lexicon: BDAG
  rationale: «Detienen» puede comunicar la idea de frenar o contener la verdad. Sin embargo, la nota alternativa preserva que el verbo también puede entenderse como «suprimir» o «reprimir», y esa tensión no debe perderse.
- source_word: τὴν ἀλήθειαν
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad
  lexicon: BDAG
  rationale: Traducción directa y adecuada; no requiere matiz adicional.
- source_word: ἐν ἀδικίᾳ
  english_pob_choice: in unrighteousness
  chosen_spanish: con injusticia
  alternatives_spanish:
  - en injusticia
  - por injusticia
  lexicon: BDAG
  rationale: El griego admite lectura de esfera o medio. «Con injusticia» suena natural en español y preserva la idea de que la verdad es contenida o enfrentada por medios injustos, aunque «en injusticia» sigue siendo una alternativa posible.
theological_decisions:
- issue: Naturaleza de la ira de Dios
  english_pob_reading: God’s wrath refers to God’s own judicial wrath
  chosen_spanish_reading: La ira de Dios es una respuesta judicial personal de Dios, no solo una consecuencia impersonal
  alternative_spanish_readings:
  - una consecuencia moral impersonal
  - un efecto automático del pecado
  rationale: La construcción genitiva y el argumento paulino apuntan a una acción divina real. «Ira» conserva ese peso teológico sin transformar el texto en una mera ley de consecuencias.
  doctrine_reference: Romanos 1:18; justicia e ira divina en el marco paulino
- issue: Valor de ἐν ἀδικίᾳ al final
  english_pob_reading: in unrighteousness / by unrighteousness
  chosen_spanish_reading: con injusticia
  alternative_spanish_readings:
  - en injusticia
  - por injusticia
  rationale: El griego permite tanto esfera como medio. Dado que la frase describe cómo se retiene la verdad, «con injusticia» comunica bien el instrumento o acompañamiento moral, sin excluir la lectura espacial/metafórica.
  doctrine_reference: Romanos 1:18; ἀδικία como ámbito o medio de supresión de la verdad
- issue: Alcance de ἀνθρώπων
  english_pob_reading: people; the Greek refers to human beings generally
  chosen_spanish_reading: seres humanos
  alternative_spanish_readings:
  - personas
  - gente
  rationale: Se evita cualquier sesgo masculino y se mantiene la referencia universal de la frase. Esto sigue la decisión inglesa de explicitar el valor genérico del plural griego.
  doctrine_reference: Uso genérico de ἄνθρωπος en el griego bíblico
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB reforzó la correspondencia con el artículo en «the wrath of God» y explicitó el sentido genérico de ἀνθρώπων como «people/humans». La solución española refleja ambos puntos con «la ira de Dios» y «de los seres humanos». También se conserva la repetición de ἀδικία/ἐν ἀδικίᾳ mediante «injusticia ... con injusticia», porque esa reiteración es retóricamente significativa en el griego y fue preservada en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «ira» para ὀργή conforme al registro judicial del pasaje.
  - Se evita «hombres» para ἀνθρώπων, siguiendo el valor genérico documentado en el inglés POB.
  - Se conserva la tensión de ἐν ἀδικίᾳ con una nota de alternativa, sin normalizarla a una sola lectura.
  - Los marcadores de nota aparecen en el texto exactamente donde corresponden y se usan sin reutilización.
