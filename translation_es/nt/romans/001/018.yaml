  text: Ἀποκαλύπτεται γὰρ ὀργὴ θεοῦ ἀπ’ οὐρανοῦ ἐπὶ πᾶσαν ἀσέβειαν καὶ ἀδικίαν ἀνθρώπων τῶν τὴν ἀλήθειαν ἐν ἀδικίᾳ κατεχόντων,
base_translation:
  language: en
  yaml_path: translation/nt/romans/001/018.yaml
  text: For the wrath of God is being revealed from heaven against all ungodliness and unrighteousness of people who suppress the truth in unrighteousness[a][b][c][d][e].
  footnotes:
  - marker: a
    text: Or "is revealed."
    reason: lexical_alternative
  - marker: b
    text: Or "men"; the Greek refers to human beings generally.
    reason: lexical_alternative
  - marker: c
    text: Or "in unrighteousness."
    reason: lexical_alternative
  - marker: d
    text: '"Suppress" may also be rendered "hold down" or "restrain" in this context.'
    reason: lexical_alternative
  - marker: e
    text: Or 'unrighteousness of people who suppress the truth by unrighteousness'.
    reason: previous_rendering
  ai_draft:
