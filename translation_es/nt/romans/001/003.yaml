review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica: «acerca de su Hijo ... según la carne». También mantiene la tensión teológica entre filiación divina y descendencia davídica, y preserva «carne» en el texto principal con nota aclaratoria adecuada. Sin embargo, no refleja plenamente el griego ἐκ σπέρματος Δαυὶδ ni la auditoría inglesa revisada: «que fue descendiente de David» colapsa dos elementos («de la descendencia/simiente de David») en uno y pierde la fuerza de ἐκ + σπέρματος.'
  spanish_quality_summary: El español es claro y legible, pero «fue descendiente de David» suena algo menos natural y menos preciso que «descendió de la descendencia de David» o «procedente de la descendencia de David». Para un registro bíblico moderno y digno, conviene conservar la estructura de procedencia sin sonar forzado. La nota [a] actual también queda mal alineada con el texto, porque propone «semilla de David» desde «Hijo» en vez de anclarse en la frase de descendencia.
  glossary_alignment: 'No hay conflicto con la terminología global principal. «Hijo» y «según la carne» están bien manejados. El punto a corregir es léxico: σπέρματος debe aparecer de algún modo en español como «descendencia» en el texto principal, con «simiente» como alternativa posible en nota, en vez de absorberse en «descendiente».'
  issues:
  - severity: high
    issue: La frase «que fue descendiente de David» omite el valor explícito de ἐκ σπέρματος
    rationale: El griego dice literalmente que el Hijo vino/fue hecho «de la descendencia/simiente de David». El borrador reduce esto a un simple predicado de identidad genealógica y elimina un componente léxico significativo que la auditoría inglesa preserva con «from the offspring of David».
  - severity: medium
    issue: La nota [a] está anclada en «Hijo» pero su contenido trata la frase de descendencia
    rationale: Las notas deben anclarse en la palabra o frase pertinente. Aquí la alternativa «semilla de David» corresponde a σπέρματος, no a «Hijo».
  - severity: medium
    issue: La nota [b] resulta innecesaria y parcialmente redundante si el texto principal ya dice «descendencia de David»
    rationale: Si se corrige el texto principal para reflejar σπέρματος, ya no hace falta una nota separada para explicar «linaje»/procedencia, salvo que aporte una alternativa real.
  revised_spanish_text: acerca de su Hijo, que descendió de la descendencia[a] de David según la carne[b],
  revised_footnotes:
  - marker: a
    text: O «de la simiente de David».
    reason: lexical_alternative
  - marker: b
    text: Aquí «según la carne» se refiere a la descendencia humana o terrenal, no a una naturaleza pecaminosa.
    reason: theological_note
