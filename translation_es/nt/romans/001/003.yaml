translation:
  language: es
  text: acerca de su Hijo, que descendió de la descendencia[a] de David según la carne[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la simiente de David».
    reason: lexical_alternative
  - marker: b
    text: Aquí «según la carne» se refiere a la descendencia humana o terrenal, no a una naturaleza pecaminosa.
    reason: theological_note
lexical_decisions:
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  lexicon: BDAG
  rationale: En este contexto epistolar, περί introduce el contenido del evangelio anunciado en el versículo anterior. «Acerca de» conserva la relación temática sin volver la frase pesada en español.
- source_word: υἱοῦ
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - hijo
  lexicon: BDAG
  rationale: En español, «Hijo» con mayúscula comunica de forma natural la referencia cristológica a Jesús como Hijo de Dios. Mantiene la claridad referencial sin añadir una explicación interpretativa.
- source_word: γενομένου
  english_pob_choice: was descended from
  chosen_spanish: fue descendiente de
  alternatives_spanish:
  - procedió de
  - vino de
  - fue originado de
  lexicon: BDAG
  rationale: El participio de γίνομαι puede expresar origen o procedencia. «Fue descendiente de» conserva la fuerza genealógica y la formalidad del pasaje, sin reducirlo a una paráfrasis más libre.
- source_word: σπέρματος
  english_pob_choice: offspring
  chosen_spanish: descendiente
  alternatives_spanish:
  - linaje
  - simiente
  - descendencia
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «semilla», en español «descendiente» comunica con claridad la idea de linaje davídico. Se evita «simiente» por su rareza y posible ambigüedad.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  alternatives_spanish:
  - David
  lexicon: BDAG
  rationale: Nombre propio transliterado estándar, sin necesidad de adaptación adicional.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - en cuanto a la carne
  - según su condición humana
  - con respecto a la carne
  lexicon: BDAG
  rationale: Se mantiene «carne» para respetar la carga lexical de σάρξ y la tensión teológica del texto. En este contexto se refiere a su linaje humano y davídico, no a pecado.
theological_decisions:
- issue: Relación entre la filiación divina de Jesús y su descendencia davídica
  english_pob_reading: 'Retain both elements straightforwardly: ''his Son'' and ''who was descended from the offspring of David according to the flesh'''
  chosen_spanish_reading: Mantener juntos «su Hijo» y «que fue descendiente de David según la carne»
  alternative_spanish_readings:
  - «que vino de la descendencia de David»
  - «en cuanto a su naturaleza humana»
  rationale: El verso afirma simultáneamente la filiación divina y la procedencia davídica humana de Jesús. La traducción conserva esa tensión sin resolverla en una formulación doctrinal más explicativa que el original.
  doctrine_reference: Preserve theological tension rather than resolve it; Definition of Chalcedon affirmed in DOCTRINE.md
- issue: Sentido de σάρξ en este contexto
  english_pob_reading: '''According to the flesh'' here refers to human lineage or earthly descent, not to sinful nature.'
  chosen_spanish_reading: «Según la carne» entendido como linaje humano o descendencia terrenal, no como naturaleza pecaminosa
  alternative_spanish_readings:
  - «según su naturaleza humana»
  - «en cuanto a su humanidad»
  rationale: La nota debe evitar una lectura moralizante de σάρξ y preservar su valor genealógico/humano en Romanos 1:3. Por eso el texto principal mantiene la expresión literal y la anotación aclara su alcance.
  doctrine_reference: BDAG; Doctrine of the Incarnation / Chalcedonian Christology
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió una formulación más precisa y formal para γενομένου («was descended from»). En español se reflejó esa decisión con «fue descendiente de», manteniendo el registro elevado y la relación genealógica clara.
  spanish_consistency_notes:
  - Se usa «Hijo» con mayúscula por el contexto cristológico inmediato.
  - Se conserva «carne» en lugar de sustituirlo por «naturaleza humana» en el texto principal, para no borrar la tensión lexical documentada.
  - «Descendiente de David» comunica el sentido genealógico sin imponer un giro interpretativo excesivo.
  - La nota sobre «la carne» evita asociarla con pecado, siguiendo el audit trail inglés.
