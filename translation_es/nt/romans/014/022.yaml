base_translation:
  language: en
  yaml_path: translation/nt/romans/014/022.yaml
  text: The faith that you have[a], keep between yourself and God[b]. Blessed is the one who does not judge himself in what he approves.
  footnotes:
  - marker: a
    text: Or 'The conviction that you have, keep to yourself before God.' Greek πίστις is rendered 'faith' by default, but here it can denote a personal conviction about disputed matters.
    reason: lexical_alternative
  - marker: b
    text: Or 'does not condemn himself by what he approves.'
    reason: lexical_alternative
