    rationale: El griego tiene tanto κατὰ σεαυτόν como ἐνώπιον τοῦ θεοῦ. La redacción actual comprime ambas ideas, pero sacrifica la referencia expresa a la presencia/observación de Dios que el POB inglés quiso conservar.
  - severity: medium
