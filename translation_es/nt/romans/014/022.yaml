translation:
  language: es
  text: La fe que tienes[a], tenla para ti mismo delante de Dios. Bienaventurado el que no se juzga a sí mismo en lo que aprueba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La convicción que tienes, tenla para ti mismo delante de Dios». πίστις puede referirse aquí a una convicción personal sobre asuntos discutidos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no se condena a sí mismo en lo que aprueba». El griego también permite el matiz de autocondena.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - convicción
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Mantengo el término clave «fe» como equivalencia principal, en coherencia con la política del proyecto para πίστις. En este contexto ético, la referencia puede abarcar la convicción personal respecto de asuntos disputados; esa posibilidad queda preservada como alternativa sin sustituir el término base.
- source_word: κατὰ σεαυτὸν
  english_pob_choice: to yourself / between yourself and God
  chosen_spanish: entre tú y Dios
  alternatives_spanish:
  - para ti mismo
  - contigo mismo
  - a solas contigo mismo
  lexicon: BDAG
  rationale: La expresión idiomática comunica que esa fe/convicción no debe imponerse a otros, sino mantenerse en un ámbito privado y responsable. «Entre tú y Dios» refleja con naturalidad la relación y la idea de resguardo, evitando un calco demasiado rígido.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: entre tú y Dios
  alternatives_spanish:
  - delante de Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: Aunque el inglés distingue «between yourself and God» y «before God», en español ambas ideas quedan bien integradas en «entre tú y Dios» para conservar la privacidad relativa y la conciencia de rendición de cuentas ante Dios.
- source_word: μακάριος
  english_pob_choice: Blessed
  chosen_spanish: Bienaventurado
  alternatives_spanish:
  - Dichoso
  - Feliz
  lexicon: BDAG
  rationale: «Bienaventurado» conserva el peso teológico y ético del término en una exhortación paulina, y es plenamente inteligible en español eclesial. «Feliz» sería demasiado psicológico y «dichoso» menos solemne.
- source_word: κρίνων ἑαυτὸν
  english_pob_choice: judge himself
  chosen_spanish: se condena a sí mismo
  alternatives_spanish:
  - se juzga a sí mismo
  - se sentencia a sí mismo
  lexicon: BDAG
  rationale: 'Aunque κρίνω puede significar «juzgar», el contexto apunta al efecto de actuar contra la propia convicción aprobada: una autoacusación o autocondena. Por eso opto por «se condena a sí mismo», preservando la tensión semántica que el inglés anotó como alternativa.'
- source_word: ἐν ᾧ δοκιμάζει
  english_pob_choice: in what he approves
  chosen_spanish: en lo que aprueba
  alternatives_spanish:
  - por lo que aprueba
  - según lo que aprueba
  - en aquello que aprueba
  lexicon: BDAG
  rationale: δοκιμάζω implica evaluar y aprobar tras examinar. «En lo que aprueba» sigue de cerca el griego y conserva el vínculo con la esfera o estándar dentro del cual sobreviene la autocondena. La preposición «en» responde mejor al valor de ἐν que una causalidad demasiado explícita.
theological_decisions:
- issue: Sentido de πίστις en un contexto de asuntos discutibles
  english_pob_reading: faith understood as personal conviction before God regarding the matter in question
  chosen_spanish_reading: fe entendida como convicción personal delante de Dios respecto del asunto en cuestión
  alternative_spanish_readings:
  - fe como confianza general en Dios
  - fidelidad
  rationale: El contexto trata de prácticas discutibles y de conciencia. Mantengo «fe» en el cuerpo del texto por consistencia terminológica, pero la lectura contextual se precisa en la decisión lexical y en la nota, sin borrar la posible resonancia de «convicción».
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; Translation philosophy sections 3 and 5'
- issue: Valor de κρίνω en la clausula final
  english_pob_reading: does not judge himself / does not condemn himself by what he approves
  chosen_spanish_reading: no se condena a sí mismo en lo que aprueba
  alternative_spanish_readings:
  - no se juzga a sí mismo en lo que aprueba
  - no se sentencia a sí mismo en lo que aprueba
  rationale: El inglés POB deja abierta la tensión entre «juzgar» y «condenar». En español, «condenarse a sí mismo» expresa con más claridad el resultado moral implícito por actuar contra la propia aprobación, sin negar la base léxica de κρίνω. La nota preserva la alternativa literal.
  doctrine_reference: 'BDAG; DOCTRINE.md: guidance on context-sensitive renderings of κρίνω'
translation_notes:
  revision_awareness: 'Seguí el historial revisado del POB en inglés: conservé la estructura final «keep between yourself and God» como «consérvala entre tú y Dios», y mantuve la relación más estrecha con ἐν ᾧ δοκιμάζει mediante «en lo que aprueba». También preservé la alternativa léxica documentada para πίστις y la tensión entre juzgar y condenar en κρίνω.'
  spanish_consistency_notes:
  - Usé «Dios» para θεοῦ según el criterio del proyecto.
  - Mantuve un registro bíblico moderno y digno, evitando calcos innecesarios.
  - No apliqué «Cristo» ni «SEÑOR» porque no aparecen en este versículo.
  - La puntuación sigue el español estándar y conserva el paralelismo de dos enunciados.
