translation:
  language: es
  text: Así que, cada uno de nosotros dará cuenta de sí mismo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'acerca de sí mismo' o 'sobre sí mismo'; literalmente, el griego dice 'concerniente a sí mismo'. Idiomáticamente también puede entenderse 'por sí mismo'.
