lexical_decisions:
- source_word: ἄρα
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Expresa bien la inferencia conclusiva de ἄρα en un español natural y sobrio, manteniendo el valor lógico del pasaje sin volverlo rígido.
- source_word: ἕκαστος ἡμῶν
  english_pob_choice: each of us
  chosen_spanish: cada uno de nosotros
  alternatives_spanish:
  - cada uno de nosotros mismos
  - todos y cada uno de nosotros
  lexicon: BDAG
  rationale: Reproduce la fuerza distributiva de ἕκαστος con el partitivo ἡμῶν de forma clara y idiomática en español.
- source_word: λόγον
  english_pob_choice: an account
  chosen_spanish: cuenta
  alternatives_spanish:
  - rendición de cuentas
  - informe
  - explicación
  lexicon: BDAG
  rationale: 'En la expresión λόγον δώσει, el sentido es forense o evaluativo: dar cuenta. En español, ''dar cuenta'' comunica la idea de rendición ante una evaluación sin añadir más de lo que el griego exige.'
- source_word: δώσει
  english_pob_choice: will give
  chosen_spanish: dará
  alternatives_spanish:
  - rendirá
  - presentará
  lexicon: BDAG
  rationale: Conserva el futuro activo simple del verbo δίδωμι y encaja naturalmente con la construcción idiomática 'dar cuenta'.
theological_decisions:
- issue: Referencia individual y universal del juicio/evaluación
  english_pob_reading: each of us will give an account of himself
  chosen_spanish_reading: cada uno de nosotros dará cuenta de sí mismo
  alternative_spanish_readings:
  - cada uno de nosotros dará cuenta de sí
  - cada uno de nosotros dará cuenta de sí mismo
  rationale: El griego presenta el pronombre reflexivo en singular masculino de manera distributiva. En español, 'de sí mismo' conserva esa forma sin forzar un plural abstracto ni borrar la referencia individual.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate, distributive singular)
translation_notes:
  revision_awareness: La redacción sigue el cierre revisado del POB inglés ('will give an account of himself') y evita una paráfrasis más libre. También preserva la estructura inferencial de ἄρα y la idiomaticidad de λόγον δώσει mediante 'dará cuenta'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' implícito sin añadirlo, porque el versículo no lo expresa explícitamente.
  - La forma reflexiva singular 'de sí mismo' refleja el griego distributivo sin convertirlo en plural ni sustituirlo por un giro impersonal.
