translation:
  language: es
  text: Pero el que duda, si come, es condenado, porque no procede de la fe[a]; y todo lo que no procede de la fe es pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'porque no procede de convicción'. El griego dice 'de fe', lo cual aquí puede incluir el sentido de actuar con convicción firme delante de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: διακρινόμενος
  english_pob_choice: the one who doubts
  chosen_spanish: el que duda
  alternatives_spanish:
  - el que vacila
  - el que está dividido interiormente
  - el que disputa
  lexicon: BDAG
  rationale: En este contexto, el participio señala vacilación o duda interior respecto de comer, no necesariamente discusión con otros. 'El que duda' es natural en español y conserva la idea de conciencia insegura.
- source_word: ἐὰν φάγῃ
  english_pob_choice: if he eats
  chosen_spanish: si come
  alternatives_spanish:
  - si llegare a comer
  - si comiera
  lexicon: BDAG
  rationale: La construcción condicional expresa una acción posible. 'Si come' es la forma más clara y natural en español, manteniendo la fuerza condicional sin recargar el estilo.
- source_word: κατακέκριται
  english_pob_choice: is condemned
  chosen_spanish: es condenado
  alternatives_spanish:
  - está condenado
  - ha sido condenado
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado resultante de condenación. 'Es condenado' preserva ese estado de manera directa y sin introducir especificaciones no presentes en el griego.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la condenación. 'Porque' es la equivalencia más transparente y idiomática en español.
- source_word: ἐκ πίστεως
  english_pob_choice: from faith
  chosen_spanish: de la fe
  alternatives_spanish:
  - por fe
  - desde la fe
  - de convicción
  lexicon: BDAG
  rationale: Se conserva la metáfora preposicional del griego con 'de la fe'. Aunque el contexto puede implicar convicción consciente delante de Dios, la formulación mantiene el vocabulario paulino sin reducirlo a una paráfrasis.
- source_word: πᾶν ... ὃ
  english_pob_choice: everything that
  chosen_spanish: todo lo que
  alternatives_spanish:
  - todo aquello que
  - cualquier cosa que
  lexicon: BDAG
  rationale: La construcción neutra se expresa de manera natural y abarcadora con 'todo lo que', que comunica bien la generalidad del dicho.
- source_word: ἁμαρτία ἐστίν
  english_pob_choice: is sin
  chosen_spanish: es pecado
  alternatives_spanish:
  - es algo pecaminoso
  - es culpable
  lexicon: BDAG
  rationale: La construcción nominal se vierte de modo directo como 'es pecado', conservando el carácter categórico de la afirmación paulina.
theological_decisions:
- issue: πίστις en un contexto moral de conciencia
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - convicción
  - confianza
  - fidelidad
  rationale: La traducción mantiene 'fe' como equivalente básico de πίστις, tal como prescribe la línea doctrinal del proyecto. La posible idea contextual de actuar con convicción ante Dios queda preservada sin reemplazar el término principal.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith; preservar matices en nota cuando sea necesario'
- issue: Alcance de κατακέκριται
  english_pob_reading: is condemned
  chosen_spanish_reading: es condenado
  alternative_spanish_readings:
  - está condenado
  - ha sido condenado ante Dios
  - se condena a sí mismo
  rationale: El pasivo griego no especifica el agente de la condenación. Se conserva esa tensión con una forma pasiva simple en español, sin resolver si el énfasis recae en juicio divino, en conciencia o en ambos.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios y el control cruzado mostró alto acuerdo; por eso se mantiene la redacción esencial, con una nota que preserva la alternativa contextual de ἐκ πίστεως sin alterar el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'fe' para πίστις en coherencia con la terminología del proyecto.
  - Se evita 'Señor' o términos de tradición no presentes en este versículo.
  - '''Es condenado'' conserva el pasivo sin añadir sujeto agente.'
  - '''Todo lo que'' reproduce el alcance general del neutro singular griego.'
