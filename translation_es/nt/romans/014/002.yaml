translation:
  language: es
  text: Una persona cree que puede comer de todo[a], pero el que es débil come verduras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «está convencido de que puede comer de todo».'
    reason: lexical_alternative
  - marker: b
    text: En contexto, «débil» alude a debilidad de fe o de conciencia respecto de prácticas alimentarias (cf. Ro. 14:1).
    reason: cross_reference
lexical_decisions:
- source_word: ὃς μὲν
  english_pob_choice: One person
  chosen_spanish: Uno
  alternatives_spanish:
  - Una persona
  - Alguien
  lexicon: BDAG
  rationale: La construcción introduce un miembro representativo del contraste. En español, «Uno» mantiene la forma singular general sin marcar género y sigue de cerca el valor distributivo de la frase griega.
- source_word: πιστεύει
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - está convencido
  - tiene la convicción
  lexicon: BDAG
  rationale: Aquí πιστεύει gobierna un infinitivo y expresa convicción acerca de una práctica permitida. «Cree» conserva el vínculo léxico con πιστεύω y funciona naturalmente en español.
- source_word: φαγεῖν πάντα
  english_pob_choice: he may eat anything
  chosen_spanish: poder comer de todo
  alternatives_spanish:
  - comer todas las cosas
  - comer cualquier cosa
  lexicon: BDAG
  rationale: El infinitivo con πάντα expresa la extensión de lo que se considera permitido. En español, «poder comer de todo» comunica con naturalidad la idea de libertad alimentaria sin añadir más de lo que el griego dice.
- source_word: ὁ δὲ
  english_pob_choice: but the one
  chosen_spanish: pero el que
  alternatives_spanish:
  - pero uno
  - pero el otro
  lexicon: BDAG
  rationale: La segunda mitad del versículo marca contraste. «Pero el que» preserva el paralelismo con el primero y suena natural en español.
- source_word: ἀσθενῶν
  english_pob_choice: who is weak
  chosen_spanish: es débil
  alternatives_spanish:
  - el débil
  - está débil
  lexicon: BDAG
  rationale: El participio sustantivado describe a la persona caracterizada por debilidad en el contexto de conciencia/fe. «Es débil» mantiene la sencillez del texto sin especificar más de lo que este versículo dice.
- source_word: λάχανα
  english_pob_choice: vegetables
  chosen_spanish: verduras
  alternatives_spanish:
  - vegetales
  - hortalizas
  lexicon: BDAG
  rationale: λάχανα se refiere a productos de huerto/verduras. «Verduras» es el equivalente más claro y corriente en español moderno; «hortalizas» sería más técnico y «vegetales» puede sonar menos natural según el registro.
- source_word: ἐσθίει
  english_pob_choice: eats
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  - se alimenta de
  lexicon: BDAG
  rationale: El verbo simplemente afirma lo que come la persona débil. «Come» es la traducción directa y natural; no se añade «solo», porque esa exclusividad está implícita por el contraste pero no se expresa de forma explícita en el griego.
theological_decisions:
- issue: Sentido de «el que es débil»
  english_pob_reading: The phrase 'who is weak' refers in context to weakness of faith or conscience regarding food practices.
  chosen_spanish_reading: «el que es débil» deja que el contexto inmediato precise que se trata de debilidad de fe o de conciencia en asuntos de comida.
  alternative_spanish_readings:
  - el que es débil en la fe
  - el débil en conciencia
  rationale: El versículo por sí solo no añade la especificación «en la fe». Mantener la expresión breve conserva la tensión textual y permite que Romanos 14:1 determine el matiz contextual, sin sobreinterpretar este versículo.
  doctrine_reference: Preservar el alcance inmediato del texto y dejar que el contexto cercano aclare la categoría moral/espiritual.
translation_notes:
  revision_awareness: Coincide con el paquete fuente y el audit trail inglés; no se registran revisiones posteriores que alteren el sentido. La versión española sigue el mismo marco de equivalencia óptima, manteniendo el contraste retórico y la ambigüedad contextual de «débil».
  spanish_consistency_notes:
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene esa terminología.
  - Se conserva «débil» sin expandirlo a «débil en la fe» en el cuerpo principal para no añadir interpretación al texto base.
  - «Verduras» se usa como equivalente contemporáneo de λάχανα, coherente con el valor léxico señalado en el audit trail.
