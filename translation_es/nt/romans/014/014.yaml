translation:
  language: es
  text: Sé y estoy persuadido en el Señor Jesús de que nada es impuro en sí mismo; salvo que, para quien considera que algo es impuro[a], para esa persona es impuro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «común». El término griego aquí suele referirse a algo considerado ritualmente profanado o impuro.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Sé
  alternatives_spanish:
  - Conozco
  - Sé bien
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento asentado; «sé» es la equivalencia más natural y directa en español, con suficiente fuerza declarativa para Pablo.
- source_word: πέπεισμαι
  english_pob_choice: am persuaded
  chosen_spanish: estoy persuadido
  alternatives_spanish:
  - estoy convencido
  - estoy plenamente persuadido
  lexicon: BDAG
  rationale: El perfecto de πείθω comunica una convicción establecida; «estoy persuadido» conserva bien ese matiz y mantiene el tono paulino del original.
- source_word: ἐν κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_spanish: en el Señor Jesús
  alternatives_spanish:
  - por el Señor Jesús
  - unido al Señor Jesús
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» sin sobrerinterpretar la relación. «Señor» sigue el valor de κύριος según la convención doctrinal del proyecto.
- source_word: οὐδὲν κοινὸν
  english_pob_choice: nothing is unclean
  chosen_spanish: nada es impuro
  alternatives_spanish:
  - nada es común
  - nada es inmundo
  - nada es profano
  lexicon: BDAG
  rationale: En este contexto de pureza ritual, κοινός apunta a lo ritualmente contaminado o profano. «Impuro» comunica esa fuerza en español sin perder la tensión conceptual; «común» se reserva como alternativa literal implícita por la nota.
- source_word: δι’ ἑαυτοῦ
  english_pob_choice: in itself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - por sí mismo
  - por su propia naturaleza
  lexicon: BDAG
  rationale: La expresión indica estado intrínseco; «en sí mismo» reproduce bien la idea de que nada es intrínsecamente impuro.
- source_word: τῷ λογιζομένῳ
  english_pob_choice: to the one who considers
  chosen_spanish: para quien considera
  alternatives_spanish:
  - para el que juzga
  - para el que estima
  lexicon: BDAG
  rationale: λογίζομαι aquí es un acto de considerar/estimar mentalmente. «Para quien considera» conserva el énfasis cognitivo y evita forzar una connotación de juicio moral.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - algo cualquiera
  - cualquier cosa
  lexicon: BDAG
  rationale: En español, «algo» fluye mejor que «cualquier cosa» en esta estructura general, y mantiene el valor indefinido del original.
- source_word: ἐκείνῳ κοινόν
  english_pob_choice: to that person it is unclean
  chosen_spanish: para esa persona es impuro
  alternatives_spanish:
  - para él es impuro
  - para esa persona es inmundo
  lexicon: BDAG
  rationale: El dativo personal marca aplicabilidad subjetiva; «para esa persona» preserva esa relación sin restringir el género. «Impuro» mantiene la misma elección léxica que al inicio del versículo.
theological_decisions:
- issue: Sentido de κοινός en contexto de pureza
  english_pob_reading: Rendered as 'unclean' rather than 'common' to communicate ritual/moral-perception language in context, while not asserting intrinsic impurity.
  chosen_spanish_reading: Se traduce con «impuro» para comunicar la categoría de contaminación ritual o profana, sin afirmar que la cosa sea intrínsecamente mala.
  alternative_spanish_readings:
  - común
  - inmundo
  - profano
  rationale: El contexto paulino trata la percepción de pureza/impureza, no una impureza ontológica. «Impuro» es claro para el lector moderno y conserva la tensión teológica de que algo puede ser «impuro» para una conciencia y no en sí mismo.
  doctrine_reference: Principio de primacía del original y preservación de la tensión lexical; pureza ritual en la interpretación paulina.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y la línea auditada de la POB en inglés, manteniendo las decisiones clave: conocimiento asentado (οἶδα), convicción duradera (πέπεισμαι), relación con «el Señor Jesús», y el término de pureza κοινός como «impuro» con nota alternativa para «común». No se introdujeron cambios doctrinales adicionales ni se amplió el alcance del versículo.'
  spanish_consistency_notes:
  - Se mantiene «Señor Jesús» para κύριος Ἰησοῦς conforme a la terminología del proyecto.
  - «Impuro» se usa de manera consistente para κοινός en este versículo; la nota preserva la alternativa literal «común».
  - La formulación evita masculinizar innecesariamente el dativo personal al usar «esa persona».
