translation:
  language: es
  text: Porque ninguno de nosotros vive para sí[a], y ninguno muere para sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a sí mismo». El dativo reflexivo griego puede entenderse de forma más literal así; aquí, sin embargo, probablemente indica vivir o morir con uno mismo como fin o referencia última.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: none
  chosen_spanish: ninguno
  alternatives_spanish:
  - nadie
  lexicon: BDAG
  rationale: En el sujeto de ambas cláusulas, «ninguno» conserva la negación universal y suena natural en español dentro del paralelismo de Pablo.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce una explicación de la afirmación anterior; «porque» expresa bien esa relación causal/explanatoria en español.
- source_word: ἡμῶν
  english_pob_choice: of us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: La partícula partitiva con οὐδείς se rinde de forma natural como «ninguno de nosotros», manteniendo el alcance colectivo.
- source_word: ἑαυτῷ
  english_pob_choice: for himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí mismo
  - a sí mismo
  - para él
  lexicon: BDAG
  rationale: El dativo reflexivo expresa orientación o finalidad respecto de uno mismo. «Para sí» reproduce ese valor teleológico sin volverlo demasiado mecánico.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está viviendo
  lexicon: BDAG
  rationale: El presente simple comunica bien la verdad general o gnómica del dicho y preserva el paralelismo con la segunda cláusula.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante directa que une las dos cláusulas paralelas.
- source_word: ἀποθνῄσκει
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - está muriendo
  lexicon: BDAG
  rationale: El presente simple mantiene la misma forma gnómica que «vive» y conserva la simetría del verso.
theological_decisions:
- issue: Sentido del dativo reflexivo ἑαυτῷ en ambos miembros
  english_pob_reading: for himself
  chosen_spanish_reading: para sí
  alternative_spanish_readings:
  - a sí mismo
  - para sí mismo
  rationale: El contexto inmediato, especialmente el versículo siguiente, muestra que Pablo habla de vivir y morir orientados al propio interés o como fin último. «Para sí» conserva esa orientación sin resolverla de antemano con lenguaje doctrinal más explícito.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it
- issue: Valor genérico de las formas singulares
  english_pob_reading: himself
  chosen_spanish_reading: sí
  alternative_spanish_readings:
  - mismos
  - uno mismo
  rationale: El griego usa formas singulares que funcionan de modo genérico. En español, «sí» en «para sí» mantiene esa genericidad sin introducir pluralización innecesaria.
  doctrine_reference: Translation philosophy §4, gender-accurate over gender-neutral
translation_notes:
  revision_awareness: El texto sigue de cerca el griego y el audit trail inglés sin copiarlo mecánicamente. Se mantuvo la fuerza explicativa de γάρ con «porque» y el valor reflexivo-teleológico de ἑαυτῷ con «para sí», evitando una paráfrasis más interpretativa que borraría la tensión documentada.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» para el nombre divino cuando aparezca en otros contextos; aquí no aplica.
  - Se usó un español neutral y eclesialmente readable, evitando arcaísmos innecesarios.
  - Se mantuvo el paralelismo verbal «vive / muere» para reflejar la estructura griega.
  - La nota [a] marca una alternativa lexical real sin duplicar el significado del texto principal.
