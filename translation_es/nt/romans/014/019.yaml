translation:
  language: es
  text: Así que[a], procuremos las cosas de la paz y las cosas de la edificación unos de otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «las cosas de la paz y las cosas de la edificación para unos y otros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: La combinación inferencial introduce una conclusión práctica a partir del argumento previo. «Así que» suena natural en español y conserva el valor conclusivo sin endurecer el tono.
- source_word: τὰ τῆς εἰρήνης
  english_pob_choice: the things of peace
  chosen_spanish: las cosas de la paz
  alternatives_spanish:
  - lo que favorece la paz
  - las cosas que conducen a la paz
  lexicon: BDAG
  rationale: Se conserva la estructura nominal del griego con el repetido τὰ. «Las cosas de la paz» refleja con fidelidad la forma del texto y mantiene abierta la referencia a asuntos o acciones orientadas a la paz.
- source_word: διώκωμεν
  english_pob_choice: let us pursue
  chosen_spanish: persigamos
  alternatives_spanish:
  - procuremos
  - esforcémonos por
  lexicon: BDAG
  rationale: El verbo griego expresa una acción exhortativa en primera persona plural con sentido enérgico. «Persigamos» conserva mejor ese impulso de búsqueda activa que una opción más débil como «busquemos».
- source_word: τὰ τῆς οἰκοδομῆς
  english_pob_choice: the things of building up
  chosen_spanish: las cosas de la edificación
  alternatives_spanish:
  - las cosas que edifican
  - lo que edifica
  lexicon: BDAG
  rationale: οἰκοδομή retiene aquí la metáfora de edificación, entendida en sentido comunitario. «Edificación» es un equivalente natural en español y preserva el carácter metafórico sin volverlo genérico.
- source_word: τῆς εἰς ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: mutua
  alternatives_spanish:
  - unos a otros
  - recíproca
  lexicon: BDAG
  rationale: La frase apunta a la reciprocidad dentro de la comunidad. «Mutua» condensa bien esa relación recíproca en español y mantiene el sentido comunitario de εἰς ἀλλήλους.
theological_decisions:
- issue: Énfasis comunitario de la exhortación
  english_pob_reading: The verse exhorts believers corporately to pursue peace and mutual edification within the Christian community.
  chosen_spanish_reading: La exhortación se dirige a la comunidad para que busque la paz y la edificación entre sí.
  alternative_spanish_readings:
  - Una lectura centrada solo en la mejora moral individual
  - Una exhortación general a la paz sin matiz comunitario
  rationale: El plural exhortativo y la reciprocidad de ἀλλήλους muestran que el texto trata de la vida común de los creyentes. La traducción mantiene ese enfoque sin añadir lenguaje denominacional.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incorporando el marcador [a] directamente en el texto principal. La nota a pie de página corresponde ahora exactamente a ese marcador y ofrece la alternativa formal conservada por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo la estructura repetida de τὰ con dos expresiones paralelas («las cosas de la paz» / «las cosas de la edificación»).
  - Se eligió un registro neutral y eclesialmente legible, evitando calcos demasiado rígidos.
  - «Mutua» resume la reciprocidad de εἰς ἀλλήλους sin perder claridad en español.
