translation:
  language: es
  text: Porque el que de este modo[a] sirve al Mesías[b] es agradable a Dios y aprobado por las personas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en este asunto». La frase puede referirse de manera general al modo de vida descrito en el versículo anterior.
    reason: alternative_reading
  - marker: b
    text: Griego «Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
  - marker: c
    text: O «aprobado por la gente». El griego «hombres» puede funcionar representativamente para seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: in this way
  chosen_spanish: en esto
  alternatives_spanish:
  - de este modo
  - en esta manera
  - en este asunto
  lexicon: BDAG
  rationale: El demostrativo neutro puede mirar al modo de vida o al ámbito inmediato descrito en el contexto previo. En español, «en esto» conserva esa referencia anafórica breve y deja abierta la tensión entre modo y asunto, sin sobreespecificar.
- source_word: δουλεύων
  english_pob_choice: serves
  chosen_spanish: sirve
  alternatives_spanish:
  - es esclavo de
  - sirve como esclavo de
  lexicon: BDAG
  rationale: El participio expresa servicio en subordinación. Aquí el énfasis recae en la conducta práctica del creyente hacia el Mesías; por eso «sirve» comunica bien la idea sin añadir una formulación más fuerte de esclavitud que no domina el contexto.
- source_word: τῷ Χριστῷ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no simplemente como nombre propio. «Mesías» preserva ese valor titular y sigue la línea doctrinal del POB de traducir el título cuando el contexto lo permite.
- source_word: εὐάρεστος
  english_pob_choice: pleasing
  chosen_spanish: agradable
  alternatives_spanish:
  - placentero
  - bien visto
  lexicon: BDAG
  rationale: El adjetivo expresa ser aceptable o agradable ante Dios. «Agradable» es natural en español y conserva la idea de aprobación sin endurecer el tono con una formulación más técnica de lo que el griego exige.
- source_word: δόκιμος
  english_pob_choice: approved
  chosen_spanish: aprobado
  alternatives_spanish:
  - probado y aprobado
  - aceptable
  lexicon: BDAG
  rationale: δόκιμος comunica la idea de haber sido probado y resultar genuino o aprobado. En esta construcción breve, «aprobado» reproduce bien el resultado de esa prueba y funciona con claridad en español.
- source_word: τοῖς ἀνθρώποις
  english_pob_choice: by people
  chosen_spanish: por las personas
  alternatives_spanish:
  - por la gente
  - por los hombres
  lexicon: BDAG
  rationale: Aunque la forma griega es masculina plural, el sentido es representativo para seres humanos en general. «Las personas» da en español una lectura inclusiva y natural, manteniendo la referencia general al juicio humano.
theological_decisions:
- issue: Cómo verter Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto trata a Χριστός como título cristológico; traducirlo como «Mesías» conserva el contenido semántico sin importar una forma litúrgica tradicional que podría ocultar el valor del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-language distinctions'
- issue: Alcance de ἐν τούτῳ
  english_pob_reading: in this way
  chosen_spanish_reading: en esto
  alternative_spanish_readings:
  - de este modo
  - en este asunto
  rationale: La frase probablemente resume la manera de vida descrita en el contexto inmediato. «En esto» mantiene abierta esa relación sin resolverla en exceso y preserva la tensión contextual documentada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: ἀνθρώποις como referencia general a la humanidad
  english_pob_reading: approved by people
  chosen_spanish_reading: aprobado por las personas
  alternative_spanish_readings:
  - aprobado por la gente
  - aprobado por los hombres
  rationale: El griego masculino plural puede funcionar representativamente para la humanidad en general. «Las personas» comunica esa inclusión de forma natural en español, sin perder la dimensión de evaluación humana.
  doctrine_reference: 'DOCTRINE.md: Retain representative plurals when context supports them'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de «approved by men» a «approved by people» para reflejar mejor el valor representativo de ἀνθρώποις; la redacción española adopta desde el inicio una forma inclusiva natural («las personas») y mantiene la posibilidad alternativa en nota. También se conserva la opción contextual de ἐν τούτῳ como referencia anafórica amplia, sin cerrar el sentido a un solo referente.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme a la política del proyecto cuando el término funciona como título.
  - Se usa «agradable a Dios» para εὐάρεστος, con un registro claro y reverente.
  - Se usa «aprobado» para δόκιμος, evitando sobreexpansiones como «probado y aprobado» en el texto principal.
  - La nota sobre «en esto» preserva la ambigüedad contextual entre modo y asunto.
  - La referencia humana se expresa con «las personas» para mantener naturalidad e inclusión en español.
