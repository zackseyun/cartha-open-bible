translation:
  language: es
  text: 'Porque está escrito: «Tan cierto como que yo vivo, dice el Señor, toda rodilla se doblará a mí, y toda lengua confesará[a] a Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconocerá» o «alabará a Dios». El verbo griego puede llevar matices de confesión, reconocimiento o alabanza según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva introduce una cita escrituraria con valor de autoridad. «Está escrito» es la equivalencia española natural y conserva ese peso formal sin forzar el español.
- source_word: Ζῶ ἐγώ
  english_pob_choice: As I live
  chosen_spanish: Vivo yo
  alternatives_spanish:
  - Como vivo
  - Por mi vida
  lexicon: BDAG
  rationale: En esta cita, la expresión funciona como fórmula solemne de juramento. «Vivo yo» conserva el orden enfático del griego y la fuerza declarativa; «como vivo» sería más fluido, pero algo menos directo.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Yahvé
  lexicon: BDAG
  rationale: El texto griego dice κύριος, no el tetragrámaton. Siguiendo el audit trail inglés, se mantiene «el Señor» como referencia directa de la cita, sin resolver explícitamente en la traducción la cuestión del nombre divino subyacente.
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: ante mí
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: BDAG
  rationale: Aunque el dativo admite «a mí», en el contexto de doblar la rodilla la imagen española más natural y fiel es «ante mí», que expresa postura de sumisión o reverencia sin perder el vínculo con la primera persona divina.
- source_word: κάμψει πᾶν γόνυ
  english_pob_choice: every knee will bow
  chosen_spanish: se doblará toda rodilla
  alternatives_spanish:
  - se inclinará toda rodilla
  - toda rodilla se doblará
  lexicon: BDAG
  rationale: El giro español idiomático para la imagen es «doblar la rodilla». Se conserva el orden enfático «toda rodilla» y el futuro, manteniendo la metáfora corporal y su sentido de sometimiento.
- source_word: πᾶσα γλῶσσα
  english_pob_choice: every tongue
  chosen_spanish: toda lengua
  alternatives_spanish:
  - toda persona
  - cada lengua
  lexicon: BDAG
  rationale: La metáfora se mantiene literalmente para no aplanar la resonancia bíblica. «Toda lengua» preserva tanto el paralelismo con «toda rodilla» como la forma de la cita.
- source_word: ἐξομολογήσεται
  english_pob_choice: will confess
  chosen_spanish: confesará
  alternatives_spanish:
  - reconocerá
  - alabará
  lexicon: BDAG
  rationale: «Confesará» conserva el valor principal de declaración pública y reconoce la posibilidad de matiz de alabanza o reconocimiento sin trasladar ese matiz al cuerpo principal del texto.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo se expresa de forma directa con «a Dios», manteniendo la correspondencia con el «ante mí» anterior y con el audit trail inglés que evita armonizar las dos alusiones.
theological_decisions:
- issue: Relación entre la primera persona divina de la cita y el complemento final «a Dios»
  english_pob_reading: Retain the wording 'says the Lord ... every tongue will confess to God' without harmonizing the referents.
  chosen_spanish_reading: Mantener «dice el Señor ... y toda lengua confesará a Dios» sin armonizar los referentes ni resolver la cita en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - «... confesará ante mí»
  - «... confesará al Señor»
  - explicitar en el texto «Yahvé»
  rationale: 'El griego conserva una tensión textual: primero habla el Señor en primera persona («ante mí»), luego aparece «a Dios». La traducción debe preservar esa forma y no suavizarla. La implicación cristológica queda en el contexto, no se inserta en la redacción.'
  doctrine_reference: Preservar la tensión textual y la cita bíblica tal como funciona en Romanos 14:11; no resolverla traductológicamente.
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el griego de SBLGNT y el audit trail inglés de la POB. No se introdujeron cambios de sentido respecto de la última revisión aprobada; se mantuvo la tensión entre la cita en primera persona («Vivo yo») y el complemento final («a Dios»).
  spanish_consistency_notes:
  - Se usa «está escrito» para la fórmula escrituraria, coherente con el registro bíblico español contemporáneo.
  - Se evita sustituir «el Señor» por una forma que resuelva la cuestión del nombre divino en el texto mismo.
  - «Toda rodilla» y «toda lengua» conservan el paralelismo imagístico del griego.
  - «Confesará» mantiene la fuerza de ἐξομολογήσεται sin convertirla en mera «alabanza» en el cuerpo principal.
