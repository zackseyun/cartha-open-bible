    rationale: No es incorrecto, pero una fórmula como «Tan cierto como que yo vivo» comunica mejor el valor solemne y juramentado de Ζῶ ἐγώ en español natural y eclesialmente legible.
  - severity: low
    issue: Anclaje impreciso de la nota [a]
    rationale: La nota explica el verbo «confesará», no toda la cita. El marcador debe colocarse junto al verbo correspondiente para mayor precisión editorial.
