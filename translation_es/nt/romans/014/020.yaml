translation:
  language: es
  text: No derribes, por causa de la comida, la obra de Dios. Todo es ciertamente limpio[a], pero es malo para la persona que come de tal modo que causa tropiezo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todas las cosas son ciertamente limpias». El contexto trata de comida, por lo que algunas traducciones lo hacen explícito: «Todos los alimentos son limpios».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para la persona que come de tal modo que cause tropiezo». El griego usa «hombre» como forma representativa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕνεκεν βρώματος
  english_pob_choice: for the sake of food
  chosen_spanish: por causa de la comida
  alternatives_spanish:
  - por causa del alimento
  - por el bien de la comida
  - a causa de la comida
  lexicon: BDAG
  rationale: ἕνεκεν con genitivo expresa motivo o causa. «Por causa de la comida» conserva que la comida es un motivo trivial e insuficiente para el daño resultante, sin sonar demasiado literal o pesado en español.
- source_word: κατάλυε
  english_pob_choice: tear down
  chosen_spanish: derriben
  alternatives_spanish:
  - destruyan
  - demuelan
  - deshagan
  lexicon: BDAG
  rationale: El verbo transmite la idea de desmantelar o echar abajo lo que Dios está edificando. En español, «derriben» comunica bien esa fuerza metafórica y evita una impresión excesivamente absoluta o final que puede tener «destruir».
- source_word: τὸ ἔργον τοῦ θεοῦ
  english_pob_choice: the work of God
  chosen_spanish: la obra de Dios
  alternatives_spanish:
  - el trabajo de Dios
  - la obra que Dios hace
  lexicon: BDAG
  rationale: La traducción directa y natural «la obra de Dios» preserva la amplitud de la expresión y su peso teológico, sin limitarla artificialmente a una sola referencia.
- source_word: πάντα μὲν καθαρά
  english_pob_choice: All things are indeed clean
  chosen_spanish: Todas las cosas son ciertamente limpias
  alternatives_spanish:
  - Todo es ciertamente limpio
  - Todos los alimentos son ciertamente limpios
  lexicon: BDAG
  rationale: πάντα es amplio y el contexto inmediato trata de comida, pero el griego no dice explícitamente «alimentos». «Todas las cosas» mantiene la amplitud del texto, y «limpias» conserva el lenguaje de pureza.
- source_word: κακὸν
  english_pob_choice: evil
  chosen_spanish: malo
  alternatives_spanish:
  - mal
  - malvado
  - pernicioso
  lexicon: BDAG
  rationale: Aunque «malo» es menos intenso que «evil», en español resulta más natural en una frase predicativa con «es malo para...». Aquí comunica adecuadamente el juicio negativo del pasaje sin forzar un registro artificial.
- source_word: τῷ ἀνθρώπῳ
  english_pob_choice: for the person
  chosen_spanish: para la persona
  alternatives_spanish:
  - para el hombre
  - para uno
  - para alguien
  lexicon: BDAG
  rationale: El sustantivo griego es masculino singular, pero funciona de manera representativa. En español, «la persona» ofrece una lectura natural e inclusiva sin perder el sentido general del argumento.
- source_word: διὰ προσκόμματος
  english_pob_choice: in a way that causes stumbling
  chosen_spanish: de tal modo que tropieza
  alternatives_spanish:
  - con tropiezo
  - de manera que cause tropiezo
  - a causa de un tropiezo
  lexicon: BDAG
  rationale: El sintagma expresa la manera de comer y la idea de obstáculo o tropiezo. «De tal modo que tropieza» mantiene la imagen del tropiezo en español claro y fluido, sin convertirla en una paráfrasis excesiva.
- source_word: ἐσθίοντι
  english_pob_choice: who eats
  chosen_spanish: que come
  alternatives_spanish:
  - mientras come
  - el que come
  - comiendo
  lexicon: BDAG
  rationale: El participio presente funciona sustantivamente en la construcción con el artículo. «Que come» es la equivalencia más natural en español y conserva la identificación del sujeto caracterizado por esa acción.
theological_decisions:
- issue: Alcance de 'limpias' en relación con la comida y la libertad cristiana
  english_pob_reading: Render καθαρά as 'clean' and leave the statement broad but contextually tied to food.
  chosen_spanish_reading: Traducir καθαρά como «limpias» y dejar la afirmación amplia, pero contextualizada por la mención de la comida.
  alternative_spanish_readings:
  - «Todo es limpio» para enfatizar la libertad
  - «Todos los alimentos son limpios» para explicitar el contexto alimentario
  rationale: Pablo afirma la limpieza en el contexto de comer, pero el griego dice πάντα μὲν καθαρά, no «alimentos» de manera explícita. «Limpias» preserva el lenguaje de pureza y evita introducir una glosa interpretativa más fuerte de la que el texto exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Sujeto genérico de τῷ ἀνθρώπῳ
  english_pob_reading: Use 'person' in the main text, with an inclusive alternative footnoted.
  chosen_spanish_reading: Usar «la persona» en el texto principal para reflejar de modo natural el sentido genérico del griego.
  alternative_spanish_readings:
  - el hombre
  - uno
  - alguien
  rationale: Aunque la forma griega es masculina singular, funciona de modo representativo. En español, «la persona» comunica con naturalidad el valor genérico sin perder la fuerza universal del aviso de Pablo.
  doctrine_reference: Translation philosophy §4
- issue: Fuerza moral de κακὸν
  english_pob_reading: Render κακὸν as 'evil'.
  chosen_spanish_reading: Traducir κακὸν como «malo» en una frase con «es malo para...».
  alternative_spanish_readings:
  - mal
  - evil
  - nocivo
  rationale: El español permite varias opciones, pero «malo» funciona de manera idiomática y clara en esta construcción. Mantiene el juicio negativo del texto, aunque con una intensidad algo menos técnica que «mal» o «malvado».
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa, que prefirió una lectura genérica e inclusiva de τῷ ἀνθρώπῳ («person»). En español, esa intención se refleja naturalmente con «la persona», sin necesidad de mantener un masculino genérico marcado. También se preserva la estructura retórica del versículo: prohibición, afirmación general sobre la limpieza, y advertencia moral final. No se adoptó una glosa más explícita como «alimentos» en el texto principal, para respetar la amplitud de πάντα μὲν καθαρά.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «obra de Dios» para τὸ ἔργον τοῦ θεοῦ, conforme al estándar del proyecto.
  - Se eligió «limpias» para καθαρά, manteniendo el lenguaje de pureza sin convertirlo en una paráfrasis normativa.
  - La expresión «de tal modo que tropieza» conserva la imagen del obstáculo sin introducir vocabulario eclesial ajeno al texto.
  - El tono general es moderno y digno, adecuado para lectura pública e iglesia, sin depender de fórmulas arcaizantes.
