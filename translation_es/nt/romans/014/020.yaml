  text: μὴ ἕνεκεν βρώματος κατάλυε τὸ ἔργον τοῦ θεοῦ. πάντα μὲν καθαρά, ἀλλὰ κακὸν τῷ ἀνθρώπῳ τῷ διὰ προσκόμματος ἐσθίοντι.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/020.yaml
  text: Do not[a], for the sake of food, tear down the work of God. All things are indeed clean[b], but it is evil for the person who eats in a way that causes stumbling.
  footnotes:
  - marker: a
    text: Or, 'Everything is indeed clean.' The context concerns food, so some translations make that explicit with 'All foods are clean.'
    reason: lexical_alternative
  - marker: b
    text: Or, 'for the person who eats so as to cause stumbling.' The Greek 'man' is representative here.
    reason: lexical_alternative
