    reason: alternative_reading
  revision_rationale: 'Se ajustó el español para que sea más natural y, a la vez, más fiel a la red verbal griega de ἵστημι: «permanece en pie ... será hecho permanecer en pie ... hacerlo permanecer en pie». También se mejoró «esclavo doméstico» a «esclavo de la casa», que conserva la decisión léxica sobre οἰκέτης pero suena mejor en español amplio. «Puede» refleja de manera más directa δυνατεῖ que «es poderoso» en esta construcción verbal.'
