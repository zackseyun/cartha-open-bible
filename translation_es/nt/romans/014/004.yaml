translation:
  language: es
  text: ¿Quién eres tú para juzgar al esclavo de la casa de otro?[a] Él permanece en pie o cae ante su propio señor[b]; y será hecho permanecer en pie[c], porque el Señor puede hacerlo permanecer en pie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el esclavo doméstico de otro». El griego οἰκέτης designa específicamente a un miembro del personal de la casa y puede referirse tanto a un sirviente como a un esclavo; se prefirió «esclavo de la casa» para conservar la relación doméstica y la condición servil con un español más natural.
    reason: lexical_alternative
  - marker: b
    text: O «ante su propio amo». El mismo término griego, κύριος, aparece aquí y de nuevo en «el Señor»; se conservó «señor» en la primera ocurrencia para mantener el vínculo verbal.
    reason: lexical_alternative
  - marker: c
    text: Algunos entienden aquí «el Señor» como el señor humano dentro del símil; más probablemente Pablo se refiere ahora al Señor en sentido teológico, cuya capacidad asegura la permanencia del creyente.
    reason: alternative_reading
lexical_decisions:
- source_word: σὺ τίς εἶ
  english_pob_choice: Who are you
  chosen_spanish: ¿Quién eres tú
  alternatives_spanish:
  - ¿Quién eres
  - ¿Quién eres tú, pues
  lexicon: BDAG
  rationale: La pregunta retórica con σὺ enfatiza la reprensión. En español, mantener «tú» preserva esa fuerza sin volver la frase forzada.
- source_word: ὁ κρίνων
  english_pob_choice: to judge
  chosen_spanish: para juzgar
  alternatives_spanish:
  - para pasar juicio sobre
  - para juzgar a
  lexicon: BDAG
  rationale: El participio sustantivado se vierte naturalmente en infinitivo tras «¿Quién eres tú para...?»; «juzgar» conserva la directez del verbo κρίνω.
- source_word: ἀλλότριον οἰκέτην
  english_pob_choice: another's household slave
  chosen_spanish: el esclavo doméstico de otro
  alternatives_spanish:
  - el siervo doméstico de otro
  - el esclavo de la casa de otro
  lexicon: BDAG
  rationale: οἰκέτης designa a un miembro del personal de la casa con condición servil; «esclavo doméstico» conserva la relación vinculada a la casa y la fuerza social que la POB inglesa quiso retener.
- source_word: τῷ ἰδίῳ κυρίῳ
  english_pob_choice: before his own lord
  chosen_spanish: ante su propio señor
  alternatives_spanish:
  - ante su propio señor
  - delante de su propio señor
  - para su propio señor
  lexicon: BDAG
  rationale: 'El dativo expresa referencia/relación: el esclavo se encuentra con respecto a su propio κύριος. «Ante» refleja bien la idea de comparecer o estar bajo evaluación, y «señor» preserva el vínculo léxico con κύριος.'
- source_word: στήκει ἢ πίπτει
  english_pob_choice: He stands or falls
  chosen_spanish: está en pie o cae
  alternatives_spanish:
  - permanece en pie o cae
  - está firme o cae
  lexicon: BDAG
  rationale: La imagen de στήκω y πίπτω se reproduce con «está en pie o cae», una fórmula clara en español que mantiene el contraste sin añadir interpretación.
- source_word: σταθήσεται
  english_pob_choice: he will be made to stand
  chosen_spanish: se le hará estar en pie
  alternatives_spanish:
  - será puesto en pie
  - será afirmado
  lexicon: BDAG
  rationale: El futuro pasivo de ἵστημι conserva la idea de ser puesto en una condición de firmeza. «Se le hará estar en pie» mantiene la pasiva y el vínculo verbal con la cláusula anterior.
- source_word: δυνατεῖ γὰρ
  english_pob_choice: for the Lord is able
  chosen_spanish: porque el Señor es poderoso
  alternatives_spanish:
  - porque el Señor puede
  - porque el Señor tiene poder
  lexicon: BDAG
  rationale: δύναμαι/δυνατέω expresa capacidad o poder. «Es poderoso» comunica bien la idea de capacidad eficaz en un español natural y solemne.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor
  - su señor
  lexicon: BDAG
  rationale: Aquí el artículo y el contexto paulino favorecen la referencia teológica. «Señor» permite conservar la ambigüedad controlada entre el señor del símil y el Señor en sentido pleno, tal como la POB inglesa preserva la tensión.
- source_word: στῆσαι αὐτόν
  english_pob_choice: to make him stand
  chosen_spanish: hacerlo estar en pie
  alternatives_spanish:
  - sostenerlo
  - afirmarlo
  lexicon: BDAG
  rationale: El infinitivo causativo de ἵστημι se traduce con una construcción verbal que preserve la repetición de la imagen de «estar en pie».
theological_decisions:
- issue: Referente de ὁ κύριος en la cláusula final
  english_pob_reading: the Lord refers to the Lord in the theological sense (most likely Christ in Paul's discourse), not merely the human master within the analogy
  chosen_spanish_reading: el Señor se entiende en sentido teológico, no solo como el señor humano del símil
  alternative_spanish_readings:
  - su señor dentro de la metáfora doméstica
  - el amo de la casa
  rationale: La frase final pasa del marco doméstico a la afirmación de la capacidad divina de sostener. Mantener «el Señor» deja visible esa transición y no neutraliza la tensión entre metáfora social y referencia teológica.
  doctrine_reference: 'Contested terms: κύριος → Señor; preservar la tensión entre uso metafórico y uso teológico'
- issue: Relación entre la pasiva «se le hará estar en pie» y la acción divina
  english_pob_reading: the passive suggests divine agency, made explicit by the final clause
  chosen_spanish_reading: la pasiva sugiere una acción ejercida sobre él, explicitada por la cláusula final
  alternative_spanish_readings:
  - se le afirmará por sí mismo
  - él se sostendrá solo
  rationale: La pasiva no debe diluirse en una forma intransitiva; conserva la idea de que otro lo hace permanecer en pie, lo que encaja con la explicación final sobre la capacidad del Señor.
  doctrine_reference: Agency of God / divine sustaining grace
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés que cambió 'to his own lord' por 'before his own lord' para reflejar mejor el dativo y la idea de comparecencia ante el señor. En español se optó por 'ante su propio señor', que reproduce esa relación y mantiene la repetición léxica de 'estar en pie/cae/estar en pie' y la distinción entre el señor del símil y 'el Señor' final.
  spanish_consistency_notes:
  - Se preservó 'señor' para κύριος en ambas ocurrencias, con diferenciación contextual mediante mayúscula final y nota.
  - Se mantuvo la imagen de 'estar en pie' para sostener la correspondencia entre στήκει/σταθήσεται/στῆσαι.
  - '''Esclavo doméstico'' refleja la fuerza social de οἰκέτης sin recurrir a una paráfrasis genérica.'
  - La puntuación busca reproducir la cadencia de pregunta retórica, afirmación y razón causal.
