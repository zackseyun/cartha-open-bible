source:
  edition: SBLGNT
  text: σὺ τίς εἶ ὁ κρίνων ἀλλότριον οἰκέτην; τῷ ἰδίῳ κυρίῳ στήκει ἢ πίπτει· σταθήσεται δέ, ⸂δυνατεῖ γὰρ⸃ ὁ ⸀κύριος στῆσαι αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/004.yaml
  text: Who are you to judge another's household slave? He stands or falls before his own lord[a], and he will be made to stand[c][b], for the Lord is able to make him stand.
  footnotes:
  - marker: a
    text: Or 'another's household servant.' The Greek οἰκέτης refers specifically to a member of a household staff and can denote either a servant or a slave; 'household slave' was chosen here to preserve the bonded social relation.
    reason: lexical_alternative
  - marker: b
    text: Or 'to his own master.' The same Greek word, κύριος, is used here and again in 'the Lord'; 'lord' was retained in the first instance to preserve the verbal connection.
    reason: lexical_alternative
  - marker: c
    text: Some understand 'the Lord' here as the slave's master within the analogy; more likely Paul now points to the Lord in the theological sense, whose power secures the believer's standing.
    reason: alternative_reading
