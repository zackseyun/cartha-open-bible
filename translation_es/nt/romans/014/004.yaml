revisions:
- from: ¿Quién eres tú para juzgar al esclavo doméstico de otro?[a] Él está en pie o cae ante su propio señor[b]; y se le hará estar en pie[c], porque el Señor es poderoso para hacerlo estar en pie.
  to: ¿Quién eres tú para juzgar al esclavo de la casa de otro?[a] Él permanece en pie o cae ante su propio señor[b]; y será hecho permanecer en pie[c], porque el Señor puede hacerlo permanecer en pie.
  rationale: 'Se ajustó el español para que sea más natural y, a la vez, más fiel a la red verbal griega de ἵστημι: «permanece en pie ... será hecho permanecer en pie ... hacerlo permanecer en pie». También se mejoró «esclavo doméstico» a «esclavo de la casa», que conserva la decisión léxica sobre οἰκέτης pero suena mejor en español amplio. «Puede» refleja de manera más directa δυνατεῖ que «es poderoso» en esta construcción verbal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y la línea de la POB inglesa: mantiene la reprensión retórica, conserva οἰκέτης con fuerza servil, refleja la relación de responsabilidad ante su propio κύριος y sostiene la lectura teológica de ὁ κύριος en la cláusula final. Sin embargo, dos giros españoles no son los más fieles ni naturales: «está en pie» debilita la repetición verbal con el futuro pasivo/infinitivo de ἵστημι, y «se le hará estar en pie» / «hacerlo estar en pie» suena forzado en español.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero presenta una rigidez innecesaria en la cadena «estar en pie». En español bíblico natural y preciso, «permanece en pie o cae» y «será hecho permanecer en pie» conservan mejor el contraste y la pasiva sin sonar mecánicos. «Esclavo doméstico» es comprensible, aunque algo poco idiomático; puede mejorarse a «esclavo de la casa» sin perder la decisión léxica documentada.
  glossary_alignment: 'Buena alineación general con el glosario: δοῦλος/servidumbre se conserva con «esclavo»; κύριος se distingue contextualmente como «señor» y «Señor»; no hay conflicto con otros términos del proyecto. La única mejora recomendada es estilístico-lexical en la familia de ἵστημι para preservar el vínculo verbal de modo más natural en español.'
  issues:
  - severity: medium
    issue: «Se le hará estar en pie» es español torpe para σταθήσεται
    rationale: Aunque intenta conservar la pasiva, la construcción resulta poco idiomática. «Será hecho permanecer en pie» o «será puesto en pie» expresan mejor la pasiva; la primera además mantiene mejor el vínculo con «permanece en pie».
  - severity: medium
    issue: «Está en pie o cae» no refleja tan bien la relación verbal con σταθήσεται / στῆσαι
    rationale: στήκει aquí puede expresarse como «permanece en pie», lo que enlaza mejor con «será hecho permanecer en pie» y evita una imagen demasiado estática.
  - severity: low
    issue: «Esclavo doméstico» suena menos natural que «esclavo de la casa»
    rationale: La idea léxica es correcta, pero «esclavo de la casa» es más idiomático en español general y sigue reflejando οἰκέτης como esclavo perteneciente al ámbito doméstico.
