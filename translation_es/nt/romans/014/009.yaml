  text: εἰς τοῦτο γὰρ ⸀Χριστὸς ⸀ἀπέθανεν καὶ ἔζησεν ἵνα καὶ νεκρῶν καὶ ζώντων κυριεύσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/009.yaml
  text: For to this end Messiah died and lived again[a], so that he might rule over both the dead and the living.
  footnotes:
  - marker: a
    text: Or 'lived' or more explicitly 'rose to life.' The Greek says 'died and lived,' with the context indicating resurrection life.
    reason: lexical_alternative
