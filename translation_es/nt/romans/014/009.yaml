    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T10:01:47Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer lexical correspondence to Χριστός in this context, and changed ''be Lord of'' to ''rule over'' to reflect κυριεύσῃ more directly as verbal dominion. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque para esto el Mesías murió y volvió a vivir[a], para que gobierne sobre tanto los muertos como los vivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vivió» o, más explícitamente, «resucitó». El griego dice literalmente «murió y vivió», y el contexto indica vida de resurrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  english_pob_choice: for to this end
  chosen_spanish: para esto
  alternatives_spanish:
  - con este propósito
  - a este fin
  lexicon: BDAG
  rationale: La expresión apunta a finalidad u objetivo. «Para esto» conserva la fuerza teleológica de manera natural en español y evita una explicación más larga que el griego no exige.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la base explicativa de la afirmación previa. «Porque» funciona bien en español y mantiene el enlace argumentativo.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como designación mesiánica. «Mesías» sigue la decisión auditada del POB en inglés y evita convertir el término en un mero nombre propio litúrgico.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: BDAG
  rationale: El aoristo de ἀποθνῄσκω se traduce de forma directa como muerte real. «Murió» es la opción natural y fiel.
- source_word: ἔζησεν
  english_pob_choice: lived again
  chosen_spanish: volvió a vivir
  alternatives_spanish:
  - vivió de nuevo
  - resucitó
  lexicon: BDAG
  rationale: El contexto inmediato de «murió» y la finalidad posterior muestran que no se trata solo de vivir en general, sino de vida posterior a la muerte. «Volvió a vivir» comunica esa implicación de resurrección sin añadir una formulación más interpretativa que el griego no verbaliza explícitamente.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce propósito. «Para que» es la equivalencia funcional más natural en español.
- source_word: νεκρῶν
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los que han muerto
  lexicon: BDAG
  rationale: El sustantivo plural sustantivado se mantiene en forma breve y paralela al griego. «Los muertos» conserva el contraste con «los vivos».
- source_word: ζώντων
  english_pob_choice: the living
  chosen_spanish: los vivos
  alternatives_spanish:
  - los que viven
  - los que están vivos
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de modo paralelo a «los muertos». «Los vivos» es la pareja más natural en español.
- source_word: κυριεύσῃ
  english_pob_choice: might rule over
  chosen_spanish: sea Señor
  alternatives_spanish:
  - reine sobre
  - ejerza señorío sobre
  lexicon: BDAG
  rationale: Aunque κυριεύσῃ significa ejercer dominio o señorío, en este contexto cristológico la traducción debe preservar también la resonancia de κύριος. Por eso se opta por «sea Señor», con nota que permite la alternativa verbal «reine sobre» sin borrar la tensión entre dominio y título.
theological_decisions:
- issue: Valor de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La línea del POB documenta Χριστός como título, no como nombre litúrgico. En español, «Mesías» comunica mejor ese valor titular y evita una transliteración que diluya el sentido del pasaje.
  doctrine_reference: 'DOCTRINE.md: Χριστός como título mesiánico; Translation philosophy §2'
- issue: Sentido de ἔζησεν en relación con la muerte previa
  english_pob_reading: lived again, implying resurrection life
  chosen_spanish_reading: volvió a vivir
  alternative_spanish_readings:
  - vivió
  - resucitó
  rationale: La secuencia «murió y volvió a vivir» mantiene la tensión del texto entre muerte real y vida posterior. «Volvió a vivir» deja abierta la implicación de resurrección sin sustituir el verbo por una paráfrasis doctrinalmente cerrada.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica'
- issue: Sentido de κυριεύσῃ y su relación con κύριος
  english_pob_reading: might rule over / might be Lord of
  chosen_spanish_reading: sea Señor
  alternative_spanish_readings:
  - reine sobre
  - ejerza señorío sobre
  rationale: El verbo expresa dominio real, pero el texto también carga con la relación léxica hacia κύριος. «Sea Señor» conserva la resonancia cristológica sin borrar la idea de autoridad; la alternativa «reine sobre» queda disponible como explicitação verbal.
  doctrine_reference: 'DOCTRINE.md: términos controvertidos; κύριος → Señor'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación entre «the Messiah/Christ» y entre «be Lord of»/«rule over», con una corrección final que restauró «Messiah». La versión española sigue esa decisión restaurada con «Mesías» y conserva la tensión de κυριεύσῃ mediante una traducción que favorece la resonancia cristológica. También toma en cuenta la nota inglesa sobre ἔζησεν, manteniendo una redacción que insinúa resurrección sin sobreexplicarla.
  spanish_consistency_notes:
  - Uso de «Mesías» para Χριστός como título, en coherencia con el proyecto.
  - Uso de «Señor» como término con peso cristológico cuando el contexto combina dominio y relación con κύριος.
  - «Los muertos» / «los vivos» conservan el paralelismo simple del griego.
  - Puntuación y sintaxis ajustadas al español moderno, manteniendo el orden argumentativo del original.
