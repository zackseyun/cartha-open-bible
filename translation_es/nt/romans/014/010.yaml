translation:
  language: es
  text: Pero tú, ¿por qué juzgas a tu hermano?[b] ¿O también tú, por qué desprecias a tu hermano? Porque todos compareceremos ante el tribunal de Dios[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el tribunal de Cristo».
    reason: textual_variant
  - marker: b
    text: O «tu hermano o hermana»; el griego dice «tu hermano».
    reason: lexical_alternative
lexical_decisions:
- source_word: Σὺ δὲ
  english_pob_choice: But you
  chosen_spanish: Pero tú
  alternatives_spanish:
  - Pero tú, en cambio
  - Y tú
  lexicon: BDAG
  rationale: Conserva el contraste adversativo de δέ y el énfasis de σύ de manera natural en español. «Pero tú» mantiene la fuerza retórica sin volver la frase pesada.
- source_word: τί κρίνεις
  english_pob_choice: why do you judge
  chosen_spanish: ¿por qué juzgas?
  alternatives_spanish:
  - ¿por qué condenas?
  - ¿qué derecho tienes para juzgar?
  lexicon: BDAG
  rationale: La pregunta retórica con τί se vierte naturalmente como «¿por qué?». «Juzgas» preserva κρίνω sin cargarlo con «condenas», que iría más allá del matiz inmediato del contexto.
- source_word: τὸν ἀδελφόν σου
  english_pob_choice: your brother
  chosen_spanish: a tu hermano
  alternatives_spanish:
  - a tu hermano o hermana
  - a tu compañero en la fe
  lexicon: BDAG
  rationale: Se conserva el singular masculino gramatical de ἀδελφός y el posesivo de segunda persona. En español, la preposición «a» es necesaria con objeto directo personal.
- source_word: ἢ καὶ σὺ
  english_pob_choice: Or you also
  chosen_spanish: ¿O también tú?
  alternatives_spanish:
  - ¿O incluso tú?
  - ¿O tú también?
  lexicon: BDAG
  rationale: Mantiene la fuerza enfática de la segunda pregunta y el valor aditivo de καί. La inversión con «también tú» suena natural y retiene el reproche.
- source_word: τί ἐξουθενεῖς
  english_pob_choice: why do you despise
  chosen_spanish: ¿por qué desprecias?
  alternatives_spanish:
  - ¿por qué tratas con desprecio?
  - ¿por qué miras con desprecio?
  lexicon: BDAG
  rationale: ἐξουθενέω expresa tratar a alguien como de poca o ninguna cuenta; «desprecias» es una equivalencia breve y fuerte, adecuada al tono de amonestación.
- source_word: πάντες γὰρ
  english_pob_choice: For we will all
  chosen_spanish: Porque todos
  alternatives_spanish:
  - Pues todos
  - Porque todos nosotros
  lexicon: BDAG
  rationale: γάρ introduce la razón de la amonestación. «Porque todos» conserva la lógica causal y la amplitud inclusiva del verbo siguiente sin forzar la redundancia de «nosotros» en el español.
- source_word: παραστησόμεθα
  english_pob_choice: stand before
  chosen_spanish: compareceremos ante
  alternatives_spanish:
  - nos presentaremos ante
  - estaremos de pie ante
  lexicon: BDAG
  rationale: El futuro de παρίστημι en contexto judicial comunica presentarse o comparecer ante un tribunal. «Compareceremos ante» es idiomático en español jurídico y conserva la imagen forense.
- source_word: τῷ βήματι
  english_pob_choice: the judgment seat
  chosen_spanish: el tribunal
  alternatives_spanish:
  - el tribunal de justicia
  - el estrado de juicio
  lexicon: BDAG
  rationale: βῆμα puede referirse al asiento/estrado judicial; en español, «tribunal» comunica con claridad la escena forense. Se evita «asiento de juicio» por sonar menos natural y menos transparente.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: Se traduce directamente el genitivo como «de Dios», siguiendo el texto griego leído aquí. No se armoniza con la variante de algunos manuscritos que leen «de Cristo».
theological_decisions:
- issue: Identidad del tribunal ante el cual comparecen todos
  english_pob_reading: of God, with a footnote preserving the manuscript variant "of Christ"
  chosen_spanish_reading: el tribunal de Dios, con nota que preserva la variante manuscrita «de Cristo»
  alternative_spanish_readings:
  - el tribunal de Cristo
  - el tribunal del Mesías
  rationale: El griego base leído aquí dice τοῦ θεοῦ, por lo que la redacción principal debe ser «de Dios». La nota preserva la variante textual «de Cristo» sin resolverla por armonización, manteniendo la tensión documental del testimonio manuscrito.
  doctrine_reference: Primacía del texto original y preservación de variantes textuales significativas
translation_notes:
  revision_awareness: Se mantuvo la lectura base del SBLGNT con el matiz forense de βῆμα y sin suavizar la doble pregunta retórica. La variante manuscrita «de Cristo» queda en nota, y la alternativa de género para ἀδελφός se preserva también en nota, conforme al expediente inglés.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός, conforme al criterio del proyecto.
  - Se prefirió «compareceremos ante» para mantener el tono judicial de βήμα.
  - Se conservó «hermano» en el texto principal por fidelidad al masculino singular del griego.
  - La puntuación sigue el interrogativo doble y la frase causal final con coma en estilo bíblico legible.
