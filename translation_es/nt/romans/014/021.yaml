translation:
  language: es
  text: Es bueno no comer carne ni beber vino ni hacer nada por lo que tu hermano[a] tropiece, se ofenda o se debilite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más inclusiva en contexto, «tu hermano o hermana»; es decir, un creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es mejor
  - es noble
  lexicon: BDAG
  rationale: καλόν evalúa la conducta como moralmente conveniente o apropiada. «Es bueno» es natural en español y conserva el juicio valorativo sin añadir matiz interpretativo excesivo.
- source_word: τὸ μὴ φαγεῖν
  english_pob_choice: not to eat
  chosen_spanish: no comer
  alternatives_spanish:
  - abstenerse de comer
  lexicon: BDAG
  rationale: El infinitivo articular expresa la acción de manera general. «No comer» reproduce bien la forma simple y directa del griego, sin sobreexplicar.
- source_word: κρέα
  english_pob_choice: meat
  chosen_spanish: carne
  alternatives_spanish:
  - carnes
  - alimentos cárnicos
  lexicon: BDAG
  rationale: En este contexto se refiere a alimento, no a «carne» en sentido corporal. «Carne» es el equivalente más directo y usual; «carnes» sería menos natural aquí.
- source_word: μηδὲ πιεῖν οἶνον
  english_pob_choice: or drink wine
  chosen_spanish: ni beber vino
  alternatives_spanish:
  - ni tomar vino
  lexicon: BDAG
  rationale: μηδέ añade otra abstención. «Ni beber vino» conserva el paralelismo y la acumulación de prohibiciones con buena naturalidad en español.
- source_word: μηδὲ ἐν ᾧ
  english_pob_choice: or do anything by which
  chosen_spanish: ni hacer nada por lo cual
  alternatives_spanish:
  - ni hacer nada en lo cual
  - ni hacer nada en virtud de lo cual
  lexicon: BDAG
  rationale: El griego deja implícita la acción final tras «ni en/por lo cual». En español conviene suplirla con «hacer nada» para que el sentido quede explícito sin alejarse del texto.
- source_word: ὁ ἀδελφός σου
  english_pob_choice: your brother
  chosen_spanish: tu hermano
  alternatives_spanish:
  - tu hermano o hermana
  - tu hermano en la fe
  lexicon: BDAG
  rationale: ἀδελφός es masculino singular. Se mantiene «tu hermano» como forma concordante con el griego; la referencia amplia a un creyente puede notarse aparte, pero no se incorpora al texto principal.
- source_word: προσκόπτει
  english_pob_choice: stumbles
  chosen_spanish: tropiece
  alternatives_spanish:
  - se tropiece
  - choque
  lexicon: BDAG
  rationale: El verbo tiene la imagen de chocar o tropezar y, en contexto paulino, funciona como metáfora moral. «Tropiece» reproduce esa imagen de forma clara y natural.
- source_word: σκανδαλίζεται
  english_pob_choice: is offended
  chosen_spanish: sea escandalizado
  alternatives_spanish:
  - sea ofendido
  - caiga en tropiezo
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «is offended» para distinguirlo de προσκόπτει, en español «escandalizado» conserva mejor la fuerza de σκανδαλίζω como ser llevado a caer o a escandalizarse, sin banalizarlo como mera molestia.
- source_word: ἀσθενεῖ
  english_pob_choice: is weakened
  chosen_spanish: se debilite
  alternatives_spanish:
  - sea debilitado
  - flaquee
  lexicon: BDAG
  rationale: ἀσθενέω puede expresar debilidad física o figurada. En este contexto ético-consciencial, «se debilite» comunica bien la disminución de firmeza moral/espiritual.
theological_decisions:
- issue: Representación de ἀδελφός con valor masculino singular y posible alcance inclusivo
  english_pob_reading: your brother
  chosen_spanish_reading: tu hermano
  alternative_spanish_readings:
  - tu hermano o hermana
  - tu creyente
  rationale: La forma griega es masculina singular. Se conserva esa correspondencia en el texto principal, mientras que el alcance inclusivo se puede señalar en nota para no borrar la forma del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Distinción entre προσκόπτει, σκανδαλίζεται y ἀσθενεῖ
  english_pob_reading: stumbles / is offended / is weakened
  chosen_spanish_reading: tropiece / sea escandalizado / se debilite
  alternative_spanish_readings:
  - tropiece / sea ofendido / flaquee
  - choque / se escandalice / se debilite
  rationale: 'Conviene mantener tres matices distintos: choque o tropiezo, escándalo o caída, y debilitamiento. La formulación española preserva la progresión sin colapsar los verbos en un solo sentido.'
  doctrine_reference: POB lexical distinction principle for close Greek synonyms
translation_notes:
  revision_awareness: El contexto auditado muestra una revisión reciente en inglés que afinó σκανδαλίζεται como «is offended» para distinguirlo de προσκόπτει. En español, sin embargo, se optó por «sea escandalizado» porque mantiene mejor la fuerza del verbo σκάνδαλον/σκανδαλίζω y la progresión semántica con «tropiece» y «se debilite», sin perder la distinción funcional dentro de la lista.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras sustituciones de nombre divino porque no aplica en este versículo.
  - Se mantuvo el paralelismo negativo con «ni... ni... ni...».
  - «Carne» se usó en sentido alimentario, no antropológico.
  - La nota inclusiva se ancló en «tu hermano» para reflejar el alcance representativo del singular griego.
