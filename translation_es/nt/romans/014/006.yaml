translation:
  language: es
  text: El que observa el día[a], lo observa para el Señor. Y el que come, come para el Señor, porque da gracias a Dios; y el que no come, no come para el Señor, y da gracias a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «considera el día» o «piensa en el día»; el verbo griego puede denotar poner la mente en algo o darle consideración. Aquí probablemente lleva el sentido de observar un día.
    reason: lexical_alternative
lexical_decisions:
- source_word: φρονῶν / φρονεῖ
  english_pob_choice: observes / observes it
  chosen_spanish: considera / lo considera
  alternatives_spanish:
  - observa / lo observa
  - tiene en cuenta / lo tiene en cuenta
  - atiende a / lo atiende
  lexicon: BDAG
  rationale: En este contexto con τὴν ἡμέραν, φρονέω puede expresar dar importancia, tener en cuenta o observar una práctica respecto de un día. En español, «considera» comunica esa orientación mental y práctica sin forzar «observa», que puede sonar demasiado ritual o demasiado específico.
- source_word: ἡμέραν
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - un día
  lexicon: BDAG
  rationale: El artículo del griego se conserva con «el día». Mantiene la referencia definida y evita introducir una indefinición que el texto no tiene.
- source_word: κυρίῳ
  english_pob_choice: for the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - al Señor
  - en relación con el Señor
  - para Yahvé
  lexicon: BDAG
  rationale: El dativo expresa orientación o finalidad. «Para el Señor» es natural en español y preserva la idea de que la acción se hace con referencia y dedicación al Señor. Aquí «Señor» corresponde a κύριος en el marco paulino de la carta.
- source_word: ἐσθίων / ἐσθίει
  english_pob_choice: eats / eats
  chosen_spanish: come / come
  alternatives_spanish:
  - está comiendo / come
  - ingiere / ingiere
  lexicon: BDAG
  rationale: El presente simple mantiene el valor general o habitual del texto y preserva el paralelismo con la primera cláusula y con la abstención posterior.
- source_word: εὐχαριστεῖ
  english_pob_choice: gives thanks
  chosen_spanish: da gracias
  alternatives_spanish:
  - agradece
  - expresa gratitud
  lexicon: BDAG
  rationale: «Da gracias» es la forma más natural y bíblicamente reconocible en español para εὐχαριστέω, y conserva la acción verbal dirigida a Dios.
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  - a Dios mismo
  lexicon: BDAG
  rationale: El dativo tras εὐχαριστεῖ se expresa naturalmente con «a Dios» en español, haciendo explícita la dirección de la acción de agradecimiento.
- source_word: ὁ μὴ ἐσθίων
  english_pob_choice: the one who does not eat
  chosen_spanish: el que no come
  alternatives_spanish:
  - el que se abstiene de comer
  - el que no ingiere
  lexicon: BDAG
  rationale: La construcción participial negativa queda bien reflejada con «el que no come». Es paralela a «el que come» y evita añadir una precisión no presente en el griego.
theological_decisions:
- issue: Sentido de «el día»
  english_pob_reading: A general reference to esteeming/observing a particular day in the disputed practice of Romans 14, without specifying a Sabbath, feast day, or fast day.
  chosen_spanish_reading: Una referencia general a tener en cuenta u observar un día concreto en la práctica discutida de Romanos 14, sin especificar si se trata del sábado, de una fiesta o de un día de ayuno.
  alternative_spanish_readings:
  - Una referencia específica al sábado
  - Una referencia específica a días festivos judíos
  - Una referencia específica a días de ayuno
  rationale: El verso no identifica el tipo de día; la traducción debe conservar esa amplitud y no resolver la tensión interpretativa que el texto deja abierta.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una identificación no dicha en el texto.
- issue: Referente de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  rationale: En este contexto paulino, κύριος se conserva como «el Señor» para no borrar la distinción que el texto hace entre el Señor y Dios en las cláusulas de agradecimiento.
  doctrine_reference: 'Contested terms table: κύριος → Señor'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de SBLGNT y el audit trail inglés sin cambios sustantivos respecto de la lectura aprobada: mantiene la ambigüedad sobre «el día», conserva la distinción entre «el Señor» y «Dios», y refleja el paralelismo entre comer y no comer con agradecimiento.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, coherente con el contexto paulino y con la decisión auditada en inglés.
  - Se prefirió «da gracias» para εὐχαριστεῖ por ser la fórmula española más natural y directa.
  - Se mantuvo «el día» en singular definido, sin añadir identificaciones interpretativas.
  - La nota al pie marca la alternativa semántica principal de φρονέω sin sobrecargar el texto principal.
