base_translation:
  language: en
  yaml_path: translation/nt/romans/014/006.yaml
  text: The one who observes the day[a], observes it for the Lord. And the one who eats, eats for the Lord, for he gives thanks to God; and the one who does not eat, does not eat for the Lord, and he gives thanks to God.
  footnotes:
  - marker: a
    text: Or 'regards the day' or 'thinks of the day'; the Greek verb can denote setting one's mind on or giving regard to something. Here it likely carries the sense of observing a day.
    reason: lexical_alternative
