translation:
  language: es
  text: 'Por tanto, ya no nos juzguemos unos a otros, sino más bien decidamos esto: no poner tropiezo ni obstáculo[a] delante de un hermano[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «causa de caída» o «trampa»; aquí «obstáculo» no significa solo algo molesto, sino algo que hace tropezar a otro en sentido moral o espiritual.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «delante de un hermano o hermana»; el griego dice «hermano» en singular, refiriéndose aquí a un creyente compañero.'
    reason: alternative_reading
lexical_decisions:
- source_word: Μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya más
  alternatives_spanish:
  - no más
  - ya no
  lexicon: BDAG
  rationale: Expresa la cesación de una práctica en curso. 'Ya más' mantiene el matiz temporal de continuidad interrumpida; 'ya no' también sería posible, pero 'ya más' enlaza con el tono exhortativo sin sonar demasiado coloquial.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica respecto al argumento anterior. 'Por tanto' conserva mejor el valor conclusivo de οὖν en un registro bíblico claro y natural.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: los unos a los otros
  alternatives_spanish:
  - unos a otros
  - mutuamente
  lexicon: BDAG
  rationale: Reproduce la reciprocidad de manera transparente y solemne. 'Los unos a los otros' es algo más enfático y evita que el verbo en plural pierda la idea recíproca.
- source_word: κρίνωμεν
  english_pob_choice: let us ... judge
  chosen_spanish: juzguemos
  alternatives_spanish:
  - no condenemos
  - no juzguemos
  lexicon: BDAG
  rationale: Conserva la raíz semántica de κρίνω y la exhortación en primera persona plural. 'Juzguemos' permite mantener la repetición retórica con κρίνατε más adelante; la negación y el contexto evitan que se lea como un mandato positivo.
- source_word: ἀλλὰ τοῦτο κρίνατε μᾶλλον
  english_pob_choice: but rather decide this
  chosen_spanish: sino más bien decidan esto
  alternatives_spanish:
  - sino más bien juzguen esto
  - sino resuelvan esto
  lexicon: BDAG
  rationale: El segundo uso de κρίνω se vierte como 'decidan' para conservar la función de evaluación sin confundirla con el juicio sobre personas. 'Más bien' reproduce μᾶλλον y el imperativo plural refleja el cambio de exhortación.
- source_word: τὸ μὴ τιθέναι
  english_pob_choice: not to put
  chosen_spanish: no poner
  alternatives_spanish:
  - no colocar
  - no poner delante
  lexicon: BDAG
  rationale: El infinitivo articular expresa el contenido de la decisión. 'No poner' es idiomático y suficientemente literal para el mandato ético.
- source_word: πρόσκομμα
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - obstáculo
  lexicon: BDAG
  rationale: Conserva la metáfora de algo que hace tropezar. 'Tropiezo' es breve, natural y ya comunica el efecto moral sin necesidad de añadir una explicación en el cuerpo del texto.
- source_word: τῷ ἀδελφῷ
  english_pob_choice: before a brother
  chosen_spanish: delante de un hermano
  alternatives_spanish:
  - ante un hermano
  - para un hermano
  lexicon: BDAG
  rationale: La construcción con τιθέναι pide una imagen espacial de colocar algo en el camino de alguien. 'Delante de' refleja bien esa relación y mantiene el singular de ἀδελφῷ; en contexto, se trata de un creyente hermano.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: ni
  alternatives_spanish:
  - o
  - o bien
  lexicon: BDAG
  rationale: Aunque el griego es disyuntivo, en español la pareja negativa 'ni... ni' expresa con más naturalidad la coordinación de dos términos dependientes de 'no poner'. Mantiene la paralelismo sin añadir interpretación.
- source_word: σκάνδαλον
  english_pob_choice: an obstacle
  chosen_spanish: obstáculo
  alternatives_spanish:
  - escándalo
  - causa de caída
  lexicon: BDAG
  rationale: Sigue la revisión inglesa más reciente que distinguió σκάνδαλον de πρόσκομμα. 'Obstáculo' conserva la idea de impedimento y evita cargar el término con el sentido moderno de 'escándalo' como vergüenza pública.
theological_decisions:
- issue: Singular masculino ἀδελφῷ y referencia representativa
  english_pob_reading: brother
  chosen_spanish_reading: un hermano
  alternative_spanish_readings:
  - un hermano o hermana
  - un creyente
  rationale: La forma griega es singular masculino y el POB inglés mantiene 'brother' en el texto principal. En español se conserva 'hermano' y se deja el alcance representativo en la nota, sin neutralizar el término en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Distinción semántica entre πρόσκομμα y σκάνδαλον
  english_pob_reading: a stumbling block ... an obstacle
  chosen_spanish_reading: tropiezo ... obstáculo
  alternative_spanish_readings:
  - piedra de tropiezo ... trampa
  - causa de caída ... obstáculo
  rationale: La revisión inglesa distinguió ambos sustantivos para no fusionarlos. 'Tropiezo' conserva la imagen de hacer caer; 'obstáculo' comunica el impedimento sin borrar la diferencia léxica. Así se mantiene la tensión del par griego y su fuerza ética.
  doctrine_reference: DOCTRINE.md §Translation philosophy, points 1 and 6
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que distinguió σκάνδαλον como 'obstacle' para separarlo de πρόσκομμα. En español se reflejó esa distinción con 'tropiezo' y 'obstáculo', evitando el moderno 'escándalo' por su ambigüedad y conservando el paralelismo ético del versículo.
  spanish_consistency_notes:
  - Se mantuvo 'hermano' en singular por fidelidad al texto, con aclaración inclusiva en nota.
  - Se evitó 'Señor' u otras terminologías ajenas al pasaje, pues no aparecen en este versículo.
  - '''Juzgar'' se conservó para reproducir la repetición de κρίνω en dos formas distintas: prohibición y exhortación.'
  - La coordinación negativa en español se ajustó a la sintaxis natural con 'ni... ni', sin alterar el sentido de la disyunción griega.
  - '''Tropiezo'' y ''obstáculo'' se usaron para distinguir los dos sustantivos griegos relacionados pero no idénticos.'
