  text: Μηκέτι οὖν ἀλλήλους κρίνωμεν· ἀλλὰ τοῦτο κρίνατε μᾶλλον, τὸ μὴ τιθέναι πρόσκομμα τῷ ἀδελφῷ ἢ σκάνδαλον.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/013.yaml
  text: 'Therefore[a], let us no longer judge one another[b], but rather decide this: not to put a stumbling block or an obstacle before a brother.'
  footnotes:
  - marker: a
    text: Or 'before a brother or sister'; the Greek says 'brother' in the singular, referring here to a fellow believer.
    reason: alternative_reading
  - marker: b
    text: Or 'a cause for falling' or 'a snare'; here 'offense' means something that trips another into sin, not merely something that hurts feelings.
    reason: lexical_alternative
