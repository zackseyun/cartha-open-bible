    text: 'O: «delante de un hermano o hermana»; el griego dice «hermano» en singular, refiriéndose aquí a un creyente compañero.'
    reason: alternative_reading
  revision_rationale: Se corrige la exhortación a una forma inclusiva y natural en español («decidamos») para evitar el cambio abrupto de persona; se sustituye «ya más» por «ya no»; se simplifica «los unos a los otros» a «unos a otros»; y se reubican las notas a los términos que realmente explican («obstáculo» y «hermano»).
