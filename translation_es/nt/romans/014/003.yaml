translation:
  language: es
  text: El que come no menosprecie al que no come[a], y el que no come no juzgue al que come[b], porque Dios lo ha acogido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no trate con desprecio» para «no menosprecie».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no emita juicio contra» para «no juzgue».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo ha aceptado» o «lo ha recibido». El verbo también puede llevar la idea de acoger en comunión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐσθίων
  english_pob_choice: the one who eats
  chosen_spanish: el que come
  alternatives_spanish:
  - el que está comiendo
  - el comensal
  - quien come
  lexicon: BDAG
  rationale: El participio articular funciona como un sustantivo de clase; en español, «el que come» conserva esa referencia personal y el contraste con «el que no come» sin sonar forzado.
- source_word: τὸν μὴ ἐσθίοντα
  english_pob_choice: the one who does not eat
  chosen_spanish: al que no come
  alternatives_spanish:
  - al que no está comiendo
  - al no comensal
  - al que se abstiene
  lexicon: BDAG
  rationale: Se mantiene la correspondencia simple con el griego y la oposición directa con «el que come», sin añadir una especificación interpretativa que el versículo no explicita.
- source_word: ἐξουθενείτω
  english_pob_choice: must not despise
  chosen_spanish: no menosprecie
  alternatives_spanish:
  - no desprecie
  - no trate con desprecio
  - no mire con desdén
  lexicon: BDAG
  rationale: «Menospreciar» comunica bien la fuerza de considerar a alguien de poco valor. «Despreciar» también es posible, pero «menospreciar» suena más natural en este mandato y conserva el matiz de desdén o desestimación.
- source_word: ὁ δὲ μὴ ἐσθίων
  english_pob_choice: and the one who does not eat
  chosen_spanish: y el que no come
  alternatives_spanish:
  - pero el que no come
  - sino el que no come
  lexicon: BDAG
  rationale: Aunque δέ puede marcar contraste, en español la coordinación con «y» mantiene la estructura paralela del dicho y deja claro el contraste por la misma construcción antitética.
- source_word: κρινέτω
  english_pob_choice: must not judge
  chosen_spanish: no juzgue
  alternatives_spanish:
  - no condene
  - no haga juicio
  - no pase juicio sobre
  lexicon: BDAG
  rationale: «Juzgar» preserva el sentido amplio de κρίνω aquí, que es emitir juicio sobre otro creyente. «Condenar» estrecharía demasiado el alcance.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: La referencia es inequívoca y en español bíblico natural basta «Dios».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: «Porque» expresa con claridad la base explicativa de la prohibición y resulta fluido en español contemporáneo.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  - a esa persona
  lexicon: BDAG
  rationale: El acusativo griego puede reflejarse de modo natural en español con objeto directo neutro de persona ya recuperada por el contexto. «Lo» es breve y mantiene la referencia singular sin sobreexplicar el antecedente.
- source_word: προσελάβετο
  english_pob_choice: has welcomed
  chosen_spanish: ha recibido
  alternatives_spanish:
  - ha acogido
  - lo ha aceptado
  - lo ha recibido en comunión
  lexicon: BDAG
  rationale: La raíz de προσλαμβάνομαι aquí incluye recibir/acoger con sentido relacional. «Ha recibido» es fiel y permite en notas la alternativa de «ha acogido» o «ha aceptado»; «ha recibido en comunión» sería demasiado interpretativo para el texto principal.
theological_decisions:
- issue: Alcance del contraste entre comer y no comer
  english_pob_reading: Render the contrast generically as eating versus not eating, without specifying vegetarianism or ritual scruples in the verse itself.
  chosen_spanish_reading: Mantener el contraste genérico entre comer y no comer, sin identificar en el texto principal la práctica concreta en disputa.
  alternative_spanish_readings:
  - explicitar que se trata de comer de todo frente a abstenerse de ciertos alimentos
  - especificar una observancia dietética o ritual concreta
  rationale: El contexto inmediato sugiere una controversia alimentaria, pero este versículo, por sí mismo, formula la oposición de manera general. La traducción española conserva esa generalidad y deja la explicación para el contexto.
  doctrine_reference: Translation philosophy §1, §3
- issue: Referencia de «lo» en «porque Dios lo ha recibido»
  english_pob_reading: Keep the singular pronoun without resolving whether Paul especially points to the eater, the non-eater, or either party as applicable in the reciprocal argument.
  chosen_spanish_reading: Conservar el pronombre singular sin precisar si apunta al que come, al que no come o al creyente mencionado de modo representativo.
  alternative_spanish_readings:
  - porque Dios ha recibido a esa persona
  - porque Dios lo ha aceptado
  rationale: El griego deja el pronombre singular y el discurso recíproco funciona de manera representativa. «Lo ha recibido» preserva esa economía y no fuerza una resolución interpretativa.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: El texto sigue el último pase revisado sin cambios sustanciales respecto al audit trail inglés; se mantiene la misma solución semántica para los dos participios sustantivados, las dos prohibiciones y el cierre causal con προσλαμβάνομαι.
  spanish_consistency_notes:
  - Se usa «Dios» de forma directa, sin mascar la referencia divina con mayúsculas de reemplazo.
  - Se conserva «no come» en ambas cláusulas para mantener la simetría del griego.
  - «Lo ha recibido» mantiene el valor relacional del verbo sin añadir una glosa interpretativa al cuerpo del versículo.
  - Las notas a pie preservan las alternativas léxicas principales documentadas en el auditor inglés, adaptadas a un español natural.
