    text: Or 'must not treat with contempt' for 'must not despise.'
    reason: lexical_alternative
  - marker: b
    text: Or 'must not pass judgment on' for 'must not judge.'
    reason: lexical_alternative
  - marker: c
    text: Or 'has accepted him' or 'received him.' The verb also carries the sense of welcoming into fellowship.
    reason: lexical_alternative
