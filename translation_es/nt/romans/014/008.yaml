base_translation:
  language: en
  yaml_path: translation/nt/romans/014/008.yaml
  text: For if we live[a], we live to the Lord, and if we die, we die to the Lord. So then, whether we live or whether we die[b], we are the Lord’s.
  footnotes:
  - marker: a
    text: Or, 'for the Lord' in the repeated phrases 'we live to the Lord' and 'we die to the Lord.' The Greek dative can express relation, orientation, or advantage; 'to the Lord' was chosen to preserve the wording pattern and leave the nuance broad.
    reason: lexical_alternative
  - marker: b
    text: Or, 'we belong to the Lord' for 'we are the Lord’s.'
    reason: lexical_alternative
