translation:
  language: es
  text: Porque si vivimos[a], al Señor vivimos; y si morimos, al Señor morimos. Así que, ya sea que vivamos o ya sea que muramos[b], somos del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «porque si vivimos, vivimos para el Señor», y de igual manera en «morimos al Señor». El dativo griego puede expresar relación, orientación o ventaja; «al Señor» se eligió para mantener el patrón verbal y dejar amplio el matiz.
    reason: lexical_alternative
  - marker: b
    text: O, «pertenecemos al Señor» para «somos del Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τε γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si en efecto
  - Pues si
  lexicon: BDAG
  rationale: γάρ introduce la explicación del argumento previo, y ἐάν τε plantea la pareja condicional. «Porque si» conserva la relación inferencial en español sin volverla pesada.
- source_word: ζῶμεν / ζῶμεν
  english_pob_choice: we live / we live
  chosen_spanish: vivimos / vivimos
  alternatives_spanish:
  - estamos vivos / vivimos nuestras vidas
  lexicon: BDAG
  rationale: ζάω se traduce con el verbo común «vivir». El mismo verbo en ambas cláusulas mantiene el paralelismo del griego y su fuerza retórica.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - al Señor
  - en relación con el Señor
  lexicon: BDAG
  rationale: El dativo con ζάω y ἀποθνῄσκω expresa orientación o referencia. En español, «para el Señor» comunica bien esa dirección relacional y preserva el patrón repetido sin sonar forzado.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» conserva el título cristológico y la resonancia bíblica del término sin reducirlo a un equivalente funcional como «Maestro».
- source_word: ἀποθνῄσκωμεν / ἀποθνῄσκομεν
  english_pob_choice: we die / we die
  chosen_spanish: morimos / morimos
  alternatives_spanish:
  - estamos muriendo
  - fallecemos
  lexicon: BDAG
  rationale: ἀποθνῄσκω se vierte de modo directo como «morir». El español mantiene naturalmente la misma forma verbal en ambos miembros del paralelismo.
- source_word: οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: οὖν marca conclusión lógica. «Así que» suena natural en español moderno y conserva el enlace inferencial.
- source_word: τοῦ κυρίου ἐσμέν
  english_pob_choice: we are the Lord’s
  chosen_spanish: somos del Señor
  alternatives_spanish:
  - pertenecemos al Señor
  - somos de el Señor
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de forma natural como pertenencia. «Somos del Señor» mantiene la concisión del griego y la lectura posesiva sin sobreexplicar.
theological_decisions:
- issue: Alcance de κύριος en el versículo
  english_pob_reading: '''Lord'' is retained as a title without specifying beyond the text; in context it refers to the Lord Jesus while preserving the title''s theological resonance.'
  chosen_spanish_reading: «Señor» se conserva como título sin añadir una especificación que el verso no formula; en el contexto de Romanos apunta a Jesús, pero el texto mantiene la designación abierta.
  alternative_spanish_readings:
  - «Señor» como referencia más general a Dios
  - «Dueño» enfatizando autoridad
  rationale: 'El español debe respetar la tensión contextual: el verso usa κύριος de manera titulada y la argumentación cercana sugiere a Cristo, pero traducirlo con un nombre más específico iría más allá de la superficie del griego.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Señor); Preservar la tensión teológica'
- issue: Nuance relacional de vivir/morir 'para el Señor'
  english_pob_reading: The verse expresses belonging and orientation to the Lord in both life and death, without narrowing it to service alone.
  chosen_spanish_reading: El verso expresa orientación y pertenencia al Señor en la vida y en la muerte, sin reducirlo solo al servicio.
  alternative_spanish_readings:
  - vivir y morir por el Señor
  - vivir y morir bajo la autoridad del Señor
  rationale: La doble construcción con dativo y la cláusula final posesiva se complementan. «Para el Señor» y «somos del Señor» conservan esa tensión de orientación/pertenencia mejor que una sola paráfrasis cerrada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: Sin cambios en la última revisión; el cotejo informó alto acuerdo y ninguna observación pendiente. Se mantuvo la solución previa por su fidelidad al paralelismo griego y a la tensión relacional de κύριος.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, coherente con el resto del proyecto.
  - Se evitó «Cristo» en el texto principal porque el griego dice κύριος y el contexto inmediato no obliga a especificar más allá del título.
  - Se preservó el paralelismo verbal «vivimos / morimos» para reflejar el griego de forma audible y natural en español.
