translation:
  language: es
  text: Porque el reino de Dios no es comer y beber, sino rectitud[a], paz y gozo en el Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia». El griego δικαιοσύνη puede denotar rectitud o justicia; el texto principal sigue la traducción paulina habitual del proyecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - gobierno
  lexicon: BDAG
  rationale: «Reino» es la forma natural y eclesialmente inteligible en español para βασιλεία y conserva el concepto teológico establecido en el argumento de Pablo.
- source_word: βρῶσις
  english_pob_choice: eating
  chosen_spanish: comida
  alternatives_spanish:
  - comer
  - ingestión
  lexicon: BDAG
  rationale: El griego usa un sustantivo abstracto junto con πόσις; en español, «comida ni bebida» comunica con naturalidad el contraste sin forzar una construcción nominal artificial. Aunque «comer y beber» refleja la actividad, aquí la formulación nominal funciona mejor en español y sigue el sentido contextual de prácticas relacionadas con alimentos.
- source_word: πόσις
  english_pob_choice: drinking
  chosen_spanish: bebida
  alternatives_spanish:
  - beber
  - consumo
  lexicon: BDAG
  rationale: Se eligió «bebida» para mantener el paralelismo con «comida» en español. La referencia no es a la categoría de líquidos en general, sino a la oposición de prácticas alimentarias dentro del contexto de Romanos 14.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia recta
  lexicon: BDAG
  rationale: En español, «justicia» conserva mejor el rango semántico amplio de δικαιοσύνη y permite mantener viva la alternativa reconocida por el propio audit trail inglés. En este contexto paulino, el término apunta a la realidad justa/correcta del reino, no solo a un matiz moral privado.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - armonía
  - tranquilidad
  lexicon: BDAG
  rationale: «Paz» es el equivalente más directo y estable para εἰρήνη, preservando el sentido relacional y comunitario.
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - gozo
  lexicon: BDAG
  rationale: Se usa «gozo» porque suena más bíblico y solemne en español y encaja bien con la tríada paulina. «Alegría» sería plenamente posible, pero «gozo» conserva mejor el registro teológico del pasaje.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - en espíritu santo
  - por el Espíritu Santo
  lexicon: BDAG
  rationale: La mayúscula y la forma articulada «el Espíritu Santo» reflejan el referente personal del Espíritu Santo en el uso paulino. Se mantiene «en» para conservar la preposición griega y su matiz de esfera/ámbito, no se paraphrasea como «por».
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: «Porque» expresa con naturalidad la conexión explicativa con el versículo anterior. «Pues» también sería posible, pero «porque» resulta más claro en español actual sin perder la relación lógica.
theological_decisions:
- issue: Renderización de δικαιοσύνη en un contexto paulino
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El texto fuente y el audit trail inglés reconocen que δικαιοσύνη puede significar «righteousness» o «justice». En español, «justicia» mantiene la amplitud semántica y permite una lectura compatible con la vida justa del reino sin imponer una sola restricción moralista. Se preserva así la tensión lexical sin contradecir la opción principal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: Identificación de πνεύματι ἁγίῳ como referencia personal al Espíritu Santo
  english_pob_reading: in the Holy Spirit
  chosen_spanish_reading: en el Espíritu Santo
  alternative_spanish_readings:
  - en espíritu santo
  rationale: Aunque el griego no lleva artículo, el contexto paulino favorece una referencia personal al Espíritu Santo. La traducción en español capitaliza el término y evita una lectura impersonal que no está exigida por la gramática.
  doctrine_reference: Pauline pneumatology / BDAG contextual reading
translation_notes:
  revision_awareness: No se requieren cambios respecto al último pase auditado; la versión española mantiene la relación explicativa, el paralelismo semántico y la decisión paulina para δικαιοσύνη, con una nota que preserva la alternativa reconocida por el análisis léxico.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - «Espíritu Santo» se capitaliza por referencia personal; no se usa minúscula porque el contexto paulino apunta al Espíritu Santo.
  - La elección de «comida ni bebida» prioriza naturalidad española sin abandonar el sentido de las actividades de comer y beber en el contexto de Romanos 14.
  - La nota [a] se ancla en «justicia» porque esa es la tensión léxica documentada en el audit trail inglés.
