review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: contrasta lo que el reino de Dios no es con lo que sí es, y maneja correctamente «reino de Dios», «paz», «gozo» y «en el Espíritu Santo». Sin embargo, no sigue fielmente el audit trail inglés en dos puntos importantes: (1) βρῶσις/πόσις fueron escogidos en inglés como actividades («eating and drinking»), mientras que el español los cambió a cosas («comida ni bebida»), lo que estrecha y desplaza el contraste; (2) δικαιοσύνη en el POB inglés se fijó como lectura principal «righteousness», con «justice» solo en nota, pero el español puso «justicia» en texto principal y además ancló mal la nota.'
  spanish_quality_summary: El español es natural y legible, con buen registro bíblico contemporáneo. «Porque» y «en el Espíritu Santo» funcionan bien. No obstante, la nota [a] está colocada sobre «bebida» aunque explica «justicia», lo que incumple la disciplina de anclaje. Además, «comida ni bebida» suena idiomático pero no preserva tan bien la simetría verbal del original ni la decisión documentada del proyecto.
  glossary_alignment: 'Buena alineación con terminología base en «Dios», «Espíritu Santo» y «reino». Desalineación relevante en δικαιοσύνη: por la pauta del proyecto y la decisión teológica inglesa, la forma principal debe reflejar «righteousness», en español mejor «rectitud», y «justicia» debe quedar como alternativa en nota. Para βρῶσις/πόσις, conviene «comer y beber» para respetar la decisión auditada como actividades.'
  issues:
  - severity: high
    issue: δικαιοσύνη se tradujo en el texto principal como «justicia» en vez de reflejar la decisión principal del POB inglés
    rationale: El audit trail establece «righteousness» como lectura principal en este pasaje paulino, con «justice» como alternativa en nota. El español debe preservar esa jerarquía lexical; «rectitud» es la opción más cercana y natural aquí.
  - severity: high
    issue: La nota [a] está anclada en «bebida» pero comenta δικαιοσύνη
    rationale: Las notas deben aparecer exactamente en la palabra o frase pertinente. El anclaje actual induce error y viola las instrucciones formales del proyecto.
  - severity: medium
    issue: βρῶσις y πόσις se vertieron como «comida ni bebida» en vez de «comer y beber»
    rationale: Aunque suena natural, el inglés auditado justificó expresamente una traducción de actividad para mantener el paralelismo del griego y el contexto de prácticas debatidas. «Comer y beber» preserva mejor esa decisión.
  revised_spanish_text: Porque el reino de Dios no es comer y beber, sino rectitud[a], paz y gozo en el Espíritu Santo.
