translation:
  language: es
  text: Reciban al que es débil en la fe[a][b], no para contender sobre opiniones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dar la bienvenida» en lugar de «recibir». El verbo griego puede significar recibir a alguien en la propia compañía o comunión.
    reason: lexical_alternative
  - marker: b
    text: O «no para juzgar opiniones discutidas» o «no para disputas sobre razonamientos».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσθενοῦντα
  english_pob_choice: the one who is weak
  chosen_spanish: al que es débil
  alternatives_spanish:
  - al débil
  - a la persona débil
  - al que es débil en conciencia
  lexicon: BDAG
  rationale: El participio con artículo funciona de modo sustantivado; «al que es débil» conserva esa fuerza sin añadir de antemano que la debilidad sea de conciencia u otra clase. El contexto inmediato especifica el ámbito con «en la fe».
- source_word: τῇ πίστει
  english_pob_choice: in faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en fe
  - en confianza
  - en fidelidad
  lexicon: BDAG
  rationale: Se sigue el valor básico de πίστις como «fe». El dativo expresa el ámbito o respecto en el que esa persona es débil. «En la fe» es natural en español y conserva el posible matiz de una fe vivida o mantenida con debilidad.
- source_word: προσλαμβάνεσθε
  english_pob_choice: receive
  chosen_spanish: Reciban
  alternatives_spanish:
  - Den la bienvenida a
  - Acepten
  - Recíbanlo
  lexicon: BDAG
  rationale: El imperativo medio plural pide tomar a alguien consigo o admitirlo en comunión. «Reciban» mantiene la amplitud semántica de «receive» y es más sobrio que «den la bienvenida», sin reducir el mandato a una mera cortesía.
- source_word: μὴ εἰς
  english_pob_choice: not for
  chosen_spanish: pero no para
  alternatives_spanish:
  - no para
  - no con el fin de
  - no para que haya
  lexicon: BDAG
  rationale: La construcción expresa finalidad que debe evitarse. En español, «pero no para» comunica con naturalidad la prohibición de recibir a alguien con el propósito equivocado.
- source_word: διακρίσεις
  english_pob_choice: disputes
  chosen_spanish: disputas
  alternatives_spanish:
  - juicios
  - controversias
  - diferencias
  lexicon: BDAG
  rationale: En este contexto el término apunta a debates contenciosos, no a distinciones neutras. «Disputas» preserva el tono polémico y relacional.
- source_word: διαλογισμῶν
  english_pob_choice: opinions
  chosen_spanish: opiniones
  alternatives_spanish:
  - razonamientos
  - pensamientos
  - escrúpulos
  lexicon: BDAG
  rationale: 'El genitivo puede referirse a los contenidos debatidos: razonamientos, opiniones o ideas discutibles. «Opiniones» es claro, idiomático y compatible con el matiz de asuntos debatibles que la nota inglesa mantiene.'
theological_decisions:
- issue: Alcance de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - la fe
  - confianza
  - fidelidad
  rationale: Se conserva el valor doctrinal básico de πίστις como «fe». Aquí no se explicita «la fe» como cuerpo doctrinal, porque el contexto inmediato trata de la condición espiritual del hermano débil en un asunto discutible.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: El texto sigue el estado revisado más reciente, sin cambios pendientes en el audit trail inglés. Se conserva el acuerdo alto del revisor y las alternativas léxicas relevantes mediante notas al pie.
  spanish_consistency_notes:
  - Se mantiene «fe» para πίστις según el estándar del proyecto.
  - Se evita «SEÑOR» u otra sustitución no requerida; este versículo no contiene el nombre divino.
  - «Reciban» conserva la amplitud de προσλαμβάνεσθε mejor que una simple bienvenida.
  - Las notas al pie reproducen las alternativas auditadas sin añadir matices no sustentados por el griego.
