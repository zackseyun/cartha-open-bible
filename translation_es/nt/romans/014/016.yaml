revisions:
- from: Por tanto[a], no permitan que su bien[b] sea malhablado.
  to: Por tanto[a], no permitan que su bien[b] sea hablado como si fuera malo.
  rationale: Se revisa únicamente la expresión de βλασφημείσθω para lograr fidelidad semántica y español natural. «Sea hablado como si fuera malo» reproduce bien la idea de que algo bueno llegue a ser tratado verbalmente como malo, en línea con el audit trail inglés. Se conserva «su bien» para no estrechar indebidamente τὸ ἀγαθόν. La nota [b] integra la alternativa léxica documentada en inglés y evita la ambigüedad creada por el ajuste español.
