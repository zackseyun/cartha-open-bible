translation:
  language: es
  text: Por tanto[a], no permitan que su bien[b] sea hablado como si fuera malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así que». El griego οὖν marca una inferencia lógica a partir del argumento previo.
    reason: alternative_reading
  - marker: b
    text: O «su bien» puede aludir ampliamente al beneficio, la ventaja o la buena posición espiritual de ustedes; no se precisa aquí como «libertad». También puede traducirse «sea injuriado», «sea difamado» o, más literalmente, «sea blasfemado», aunque en español «blasfemado» puede sonar demasiado específicamente religioso en este contexto.
    reason: theological_and_lexical_note
lexical_decisions:
- source_word: μὴ
  english_pob_choice: do not let
  chosen_spanish: no permitan que
  alternatives_spanish:
  - no dejen que
  - no permitan
  lexicon: BDAG
  rationale: Con el imperativo pasivo μὴ βλασφημείσθω, la prohibición se expresa de manera natural en español como una construcción con «no permitan que», que conserva el sentido de impedir que algo ocurra sin forzar una forma arcaica.
- source_word: βλασφημείσθω
  english_pob_choice: be spoken of as evil
  chosen_spanish: sea malhablado
  alternatives_spanish:
  - sea blasfemado
  - sea difamado
  - sea maldecido
  lexicon: BDAG
  rationale: El verbo βλασφημέω puede denotar hablar de alguien o algo de manera injuriosa o difamatoria. Como el objeto aquí es «el bien» y no Dios, «sea malhablado» intenta reflejar el pasivo y el matiz de habla denigratoria sin cargarlo de forma innecesaria con el sentido religioso técnico de «blasfemar».
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: οὖν introduce una inferencia lógica. «Por tanto» preserva con claridad esa conexión argumentativa en español.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: BDAG
  rationale: El genitivo pronominal modifica τὸ ἀγαθόν y marca posesión o relación. En español, «su» comunica con naturalidad ese vínculo plural sin sonar regionalmente marcado.
- source_word: τὸ ἀγαθόν
  english_pob_choice: your good
  chosen_spanish: su bien
  alternatives_spanish:
  - su bondad
  - su beneficio
  - lo bueno de ustedes
  lexicon: BDAG
  rationale: El neutro articular funciona de modo sustantivo como «el bien». «Su bien» conserva la brevedad griega y mantiene abierto el referente, sin especificarlo como «libertad» o «privilegio».
theological_decisions:
- issue: Alcance de «τὸ ἀγαθόν»
  english_pob_reading: Rendered broadly as 'your good' without specifying the referent.
  chosen_spanish_reading: Traducido de manera amplia como «su bien», sin concretarlo.
  alternative_spanish_readings:
  - su libertad
  - su privilegio
  - su buena conducta / testimonio
  rationale: El texto de Pablo es deliberadamente conciso y puede abarcar el bien relacionado con la convicción, la libertad o la ventaja espiritual de los creyentes. Fijarlo como «libertad» o «privilegio» introduciría una interpretación que el griego no explicita. Mantener «su bien» preserva la tensión pastoral y teológica del pasaje.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó con alto acuerdo y sin objeciones textuales o de sentido. Se mantiene, por tanto, una traducción estable que conserva la relación lógica de οὖν y el alcance amplio de τὸ ἀγαθόν.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general para el nombre divino, pero este versículo no lo contiene.
  - Se evita «Cristo» porque no aparece ningún título cristológico en el verso.
  - «malhablado» intenta conservar el valor injurioso del verbo griego sin convertirlo en una paráfrasis explicativa excesiva.
