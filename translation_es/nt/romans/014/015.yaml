  to: Porque si tu hermano se entristece por la comida[a], ya no andas conforme al amor. No destruyas con tu comida a aquel[b] por quien murió el Mesías[c].
  rationale: Se corrige la cláusula final para reflejar fielmente ὑπὲρ οὗ Χριστὸς ἀπέθανεν en español natural y gramatical. Se restituye «Mesías» por la política terminológica del proyecto y por el audit trail. Se añade la nota sobre la fuerza de ἀπόλλυε y se eliminan notas innecesarias o mal priorizadas.
