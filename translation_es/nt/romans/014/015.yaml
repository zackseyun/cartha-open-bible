  text: εἰ ⸀γὰρ διὰ βρῶμα ὁ ἀδελφός σου λυπεῖται, οὐκέτι κατὰ ἀγάπην περιπατεῖς. μὴ τῷ βρώματί σου ἐκεῖνον ἀπόλλυε ὑπὲρ οὗ Χριστὸς ἀπέθανεν.
base_translation:
  language: en
  yaml_path: translation/nt/romans/014/015.yaml
  text: For if your brother is grieved because of food[a], you are no longer walking according to love[c][b]. Do not destroy that one with your food—the one for whom Messiah died.
  footnotes:
  - marker: a
    text: Or, 'brother or sister'; Greek 'brother' can function representatively for a fellow believer.
    reason: lexical_alternative
  - marker: b
    text: Or, 'Do not ruin' or 'Do not cause to perish.' The Greek verb is strong and may denote severe spiritual harm; the verse itself does not specify the precise doctrinal implication.
    reason: alternative_reading
  - marker: c
    text: Greek 'Christ'; rendered 'the Messiah' here because Χριστός functions as a title.
    reason: lexical_alternative
