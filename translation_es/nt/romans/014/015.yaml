review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: condición causal, tristeza del hermano, norma del amor y prohibición fuerte de ἀπόλλυε. Sin embargo, falla de manera importante en la cláusula final: «el que Cristo murió por él» no corresponde a ὑπὲρ οὗ Χριστὸς ἀπέθανεν y resulta gramaticalmente defectuoso en español. Debe ser «por quien murió el Mesías» o equivalente. Además, el borrador no sigue la política terminológica documentada para Χριστός, que en este contexto titular debe verterse como «Mesías», no «Cristo».'
  spanish_quality_summary: El español es en general legible, pero presenta un error serio de sintaxis en la segunda oración. «A ese» es posible, pero «a aquel» suena más digno y encaja mejor con ἐκεῖνον. También conviene conservar la nota del verbo fuerte ἀπόλλυε, presente en el audit trail inglés y ausente en el español. La nota actual sobre «conforme al amor» no es necesaria como alternativa, ya que repite prácticamente el texto principal.
  glossary_alignment: Alineación parcial. βρῶμα→«comida», ἀδελφός→«hermano», λυπεῖται→«se entristece», κατὰ ἀγάπην→«conforme al amor», περιπατεῖς→«andas», ἀπόλλυε→«destruyas» están bien encaminados. Pero Χριστός debe seguir la política del proyecto como «Mesías» en este uso titular; el propio audit trail inglés restauró «Messiah» por política doctrinal. También conviene reflejar la alternativa inclusiva para «hermano» y la fuerza de «destruyas».
  issues:
  - severity: high
    issue: 'Cláusula final mal construida: «el que Cristo murió por él»'
    rationale: No traduce fielmente ὑπὲρ οὗ Χριστὸς ἀπέθανεν y produce español incorrecto. La relación relativa debe ser «por quien murió el Mesías» o «aquel por quien murió el Mesías».
  - severity: high
    issue: Uso de «Cristo» en vez de «Mesías»
    rationale: El audit trail y la política del proyecto especifican que Χριστός, al funcionar como título aquí, debe verterse como «Mesías». El propio historial marcó como regresión la sustitución por «Christ/Cristo».
  - severity: medium
    issue: Falta la nota sobre la fuerza de ἀπόλλυε
    rationale: El inglés preserva alternativas importantes («ruin / cause to perish») para no cerrar la tensión teológica. El español debería conservar una nota equivalente.
  - severity: low
    issue: Nota b innecesaria y poco útil
    rationale: La nota sobre «conforme al amor» no aporta una alternativa significativa distinta del texto principal, mientras faltan notas más relevantes del audit trail.
  - severity: low
    issue: Marcador c reutilizado para dos anclajes de una misma nota
    rationale: No es intrínsecamente erróneo si una misma nota explica ambos lugares, pero aquí la mejor solución es reestructurar la frase y usar anclajes más claros y mínimos.
  revised_spanish_text: Porque si tu hermano se entristece por la comida[a], ya no andas conforme al amor. No destruyas con tu comida a aquel[b] por quien murió el Mesías[c].
  revised_footnotes:
