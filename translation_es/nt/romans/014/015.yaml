translation:
  language: es
  text: Porque si tu hermano se entristece por la comida[a], ya no andas conforme al amor. No destruyas con tu comida a aquel[b] por quien murió el Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hermano o hermana»; el griego «hermano» puede funcionar de modo representativo para un creyente o una creyente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «No arruines» o «No hagas perecer». El verbo griego es fuerte y puede denotar un daño espiritual severo; el versículo mismo no especifica la implicación doctrinal exacta.'
    reason: alternative_reading
  - marker: c
    text: Griego «Cristo»; aquí se vierte «Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: βρῶμα / βρώματι
  english_pob_choice: food / with your food
  chosen_spanish: comida / con tu comida
  alternatives_spanish:
  - alimento
  - lo que comes
  - tu comida
  lexicon: BDAG
  rationale: βρῶμα designa alimento en general, no específicamente carne. 'Comida' mantiene la amplitud del término y su naturalidad en español. En la segunda mitad, 'con tu comida' conserva el valor instrumental o causal del dativo τῷ βρώματί σου.
- source_word: ἀδελφός
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - fellow believer
  lexicon: BDAG
  rationale: La forma griega es masculina singular y el texto la conserva. 'Hermano' refleja con precisión esa forma; el sentido representativo dentro de la comunidad puede entenderse sin neutralizar el término en el cuerpo principal.
- source_word: λυπεῖται
  english_pob_choice: is grieved
  chosen_spanish: se entristece
  alternatives_spanish:
  - se duele
  - está afligido
  - se siente herido
  lexicon: BDAG
  rationale: El verbo expresa que alguien es afectado por tristeza o dolor. 'Se entristece' comunica el peso emocional de manera natural en español, sin exagerar ni suavizar el sentido.
- source_word: κατὰ ἀγάπην
  english_pob_choice: according to love
  chosen_spanish: conforme al amor
  alternatives_spanish:
  - según el amor
  - en línea con el amor
  - de acuerdo con el amor
  lexicon: BDAG
  rationale: '''Conforme a/conforme al'' reproduce bien la norma o patrón implícito en κατά. ''Amor'' conserva ἀγάπη sin convertirla en un término más abstracto o técnico.'
- source_word: περιπατεῖς
  english_pob_choice: you are walking
  chosen_spanish: andas
  alternatives_spanish:
  - vives
  - te conduces
  - caminas
  lexicon: BDAG
  rationale: El idioma español no siempre requiere mantener la metáfora de 'caminar' para que sea entendible; 'andas' conserva la imagen ética con naturalidad. Si se quisiera mayor explicitud, 'caminas' sería posible, pero 'andas' suena menos forzado en esta construcción.
- source_word: ἀπόλλυε
  english_pob_choice: do not destroy
  chosen_spanish: No destruyas
  alternatives_spanish:
  - No arruines
  - No hagas perecer
  - No lo pierdas
  lexicon: BDAG
  rationale: El imperativo negativo con μή exige una prohibición fuerte. 'Destruyas' preserva la severidad del verbo ἀπόλλυμι sin resolver de antemano si el daño es temporal, espiritual o escatológico.
- source_word: ἐκεῖνον
  english_pob_choice: that one
  chosen_spanish: a ese
  alternatives_spanish:
  - a ese hombre
  - a él
  - a aquel
  lexicon: BDAG
  rationale: El demostrativo enfatiza al individuo concreto en vista. 'A ese' mantiene la fuerza deíctica de ἐκεῖνον y suena natural en español junto con el verbo transitivo.
- source_word: ὑπὲρ οὗ
  english_pob_choice: for whom
  chosen_spanish: por quien
  alternatives_spanish:
  - por el cual
  - en favor de quien
  - a favor de quien
  lexicon: BDAG
  rationale: Con genitivo, ὑπέρ puede significar 'por' o 'en favor de'. 'Por quien' es idiomático en español y conserva la relación representativa o sacrificial del contexto.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el audit trail inglés osciló entre 'the Messiah' y 'Christ', la política del proyecto permite Cristo como forma fija de nombre/título cuando esa es la forma establecida en español eclesial y la frase suena más natural en el NT. Aquí se conserva 'Cristo' como forma tradicional y plenamente inteligible, sin perder el sentido titular.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - expiró
  lexicon: BDAG
  rationale: El aoristo indica simplemente que murió. 'Murió' es la correspondencia directa y natural en español.
theological_decisions:
- issue: Alcance de la advertencia de ἀπόλλυε
  english_pob_reading: Rendered as a serious warning, 'Do not destroy,' without specifying whether Paul means spiritual ruin in a temporal sense or final perdition.
  chosen_spanish_reading: 'Se conserva una advertencia seria: ''No destruyas'', sin precisar si el daño es espiritual, temporal o final.'
  alternative_spanish_readings:
  - No lo arruines
  - No lo hagas perecer eternamente
  rationale: El texto no obliga a resolver la discusión doctrinal sobre el alcance exacto de ἀπόλλυμι. La traducción debe mantener la fuerza del aviso y la tensión teológica, no cerrarla con una conclusión denominacional.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Referencia de ἀδελφός
  english_pob_reading: Main text keeps 'brother' as the masculine singular form.
  chosen_spanish_reading: La versión principal mantiene 'hermano' como forma masculina singular.
  alternative_spanish_readings:
  - hermano o hermana
  - fellow believer
  rationale: La forma gramatical griega es masculina singular y conviene reflejarla de modo transparente. El posible alcance inclusivo se puede expresar con nota sin borrar la forma del original.
  doctrine_reference: Gender-accurate over gender-neutral.
- issue: Sentido de Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: Cristo como título personal del texto, sin añadir 'Mesías' en el cuerpo principal.
  alternative_spanish_readings:
  - Mesías
  - el Mesías
  rationale: En español bíblico, 'Cristo' es una forma consolidada, clara y reverente. Dado que el nombre/título está plenamente lexicalizado, usar 'Cristo' evita una torsión estilística innecesaria y sigue siendo fiel al referente titular. La tensión entre título y nombre se preserva al no explicitar más allá del verso.
  doctrine_reference: Translate titles; transliterate names; contested-term handling for Χριστός.
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre traducir Χριστός como 'the Messiah' y volver a 'Christ' en una revisión posterior. Para esta entrega en español se opta por 'Cristo' en el texto principal, aprovechando la forma ya establecida en el uso bíblico español y evitando una transliteración semántica que sonaría menos natural en este idioma. Se conserva la tensión del verso en cuanto al alcance de ἀπόλλυε y la referencia masculina singular de ἀδελφός.
  spanish_consistency_notes:
  - Se mantiene la metáfora ética de 'andar' con un verbo español natural ('andas').
  - '''Comida'' se usa con valor general, no restringido a carne.'
  - El demostrativo se vierte con 'ese' para conservar la deíxis.
  - Las notas distinguen entre forma principal y alternativa inclusiva sin borrar el singular griego.
  - No se emplea 'SEÑOR' ni se introduce un término eclesiástico adicional no requerido por el griego.
