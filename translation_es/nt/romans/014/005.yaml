translation:
  language: es
  text: Uno juzga un día[a] por encima de otro día, mientras otro juzga todos los días por igual[b]. Que cada uno esté plenamente convencido[c] en su propia mente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «considera un día más importante que otro día».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «cada día»; el sentido en contexto es «todos los días por igual» o «todos los días iguales».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «esté plenamente seguro» o «esté plenamente persuadido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρίνει
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - considera
  - estima
  - valora
  lexicon: BDAG
  rationale: κρίνω aquí expresa una evaluación o distinción entre días, no necesariamente una condena. «Juzga» conserva esa fuerza evaluativa y mantiene el vínculo lexical con el verbo griego, a la vez que suena natural en español.
- source_word: ἡμέραν παρ’ ἡμέραν
  english_pob_choice: one day above another day
  chosen_spanish: un día por encima de otro día
  alternatives_spanish:
  - un día más que otro
  - un día sobre otro día
  lexicon: BDAG
  rationale: La construcción comparativa con παρά pide una diferencia entre días. «Por encima de» comunica con claridad la comparación sin identificar cuáles días están en vista ni introducir una interpretación no explicitada por el texto.
- source_word: πᾶσαν ἡμέραν
  english_pob_choice: every day alike
  chosen_spanish: cada día igual
  alternatives_spanish:
  - cada día
  - todos los días igual
  lexicon: BDAG
  rationale: El griego dice literalmente «cada día / todo día». En contexto, la segunda cláusula contrasta con la primera y expresa que no se distingue entre días. «Cada día igual» preserva ese sentido contextual sin añadir una frase explicativa excesiva.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada hombre
  lexicon: BDAG
  rationale: El singular distributivo de ἕκαστος se expresa de manera natural con «cada uno», manteniendo el énfasis individual sin restringir innecesariamente el alcance del referente.
- source_word: ἐν τῷ ἰδίῳ νοῒ
  english_pob_choice: in his own mind
  chosen_spanish: en su propia mente
  alternatives_spanish:
  - en su propio entendimiento
  - en su propia convicción
  lexicon: BDAG
  rationale: νοῦς designa la mente o facultad de pensamiento. «En su propia mente» es una traducción directa y clara; conserva el matiz interno de convicción personal que requiere el contexto.
- source_word: πληροφορείσθω
  english_pob_choice: be fully convinced
  chosen_spanish: esté plenamente convencido
  alternatives_spanish:
  - esté plenamente asegurado
  - esté plenamente persuadido
  lexicon: BDAG
  rationale: El imperativo pasivo expresa una certeza asentada o una convicción plena. «Esté plenamente convencido» es idiomático en español y refleja bien la fuerza exhortativa del pasaje.
theological_decisions:
- issue: Naturaleza de los días mencionados
  english_pob_reading: Keep the reference general as 'day' without specifying Sabbath, feast days, or fast days.
  chosen_spanish_reading: Mantener la referencia general a «día» sin especificar sábados, fiestas ni días de ayuno.
  alternative_spanish_readings:
  - Interpretar como días santos judíos o sábados
  - Interpretar como días de ayuno o prácticas devocionales especiales
  rationale: El texto griego no identifica los días en cuestión. La traducción debe conservar esa generalidad y no resolver una cuestión interpretativa que el versículo deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Renderización del singular masculino
  english_pob_reading: Use 'his own mind' with representative generic force.
  chosen_spanish_reading: Usar «su propia mente» con fuerza genérica representativa.
  alternative_spanish_readings:
  - su propia mente
  - su propia convicción
  rationale: El singular masculino griego funciona de manera representativa o genérica. En español, «su propia mente» mantiene el referente personal sin forzar una neutralización artificial ni perder precisión.
  doctrine_reference: Precisión de género sobre neutralización de género.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la decisión POB en inglés: mantiene la comparación abierta entre días, conserva el valor distributivo de ἕκαστος y expresa πληροφορείσθω como una exhortación a la convicción plena. No se introdujeron cambios de sentido ni se especificó la clase de días en disputa.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene un registro formal, moderno y eclesialmente legible.
  - «Mente» traduce νοῦς de manera consistente con el uso POB de convicción interior.
  - La cláusula final conserva el imperativo personal sin convertirlo en una paráfrasis doctrinal.
