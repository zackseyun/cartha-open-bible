revisions:
- from: Uno juzga un día[a] por encima de otro día, mientras otro juzga cada día[b] igual. Que cada uno[c] esté plenamente convencido en su propia mente[d].
  to: Uno juzga un día[a] por encima de otro día, mientras otro juzga todos los días por igual[b]. Que cada uno esté plenamente convencido[c] en su propia mente.
  rationale: Se ajusta 'cada día igual' a 'todos los días por igual' para un español más natural que preserve el contraste implícito del griego. Se elimina la nota innecesaria sobre 'cada uno' y se traslada la nota de alternativas a 'esté plenamente convencido', siguiendo el expediente inglés para πληροφορείσθω. También se simplifica el cierre a 'en su propia mente', que es fiel y claro sin explicación adicional.
