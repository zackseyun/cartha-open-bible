    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «entre ustedes que creen»; el dativo puede señalar relación con ellos o el ámbito en que se manifestó la conducta.
    reason: lexical_alternative
  revision_rationale: Se revisa «de cuán» a «de cómo» para lograr un español natural y fiel al valor modal de ὡς en esta apelación a testigos. Se cambia «justamente» por «rectamente» para expresar con mayor claridad el matiz ético de δικαίως en español contemporáneo, evitando ambigüedad.
