translation:
  language: es
  text: Ustedes son testigos, y también Dios, de cómo devotamente, rectamente e irreprochablemente nos comportamos[a] con ustedes que creen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Nos comportamos» refleja el sentido contextual de ἐγενήθημεν; también puede entenderse como «nos condujimos».
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «entre ustedes que creen»; el dativo puede señalar relación con ellos o el ámbito en que se manifestó la conducta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς μάρτυρες καὶ ὁ θεός
  english_pob_choice: You are witnesses, and God also
  chosen_spanish: Ustedes son testigos, y también Dios
  alternatives_spanish:
  - Ustedes y Dios son testigos
  - Ustedes son testigos, y Dios también
  lexicon: BDAG
  rationale: La frase nominativa funciona como una apelación solemne a testigos. En español conviene explicitar el verbo copulativo «son» para una lectura natural, manteniendo primero a los tesalonicenses y luego a Dios, como en el contexto del juramento apelativo.
- source_word: ὡς
  english_pob_choice: how
  chosen_spanish: de cuán
  alternatives_spanish:
  - cómo
  - de qué manera
  lexicon: BDAG
  rationale: Aquí introduce el modo de la conducta. «De cuán» expresa en español el valor modal-intensivo de manera natural en una subordinada dependiente de la apelación a testigos.
- source_word: ὁσίως
  english_pob_choice: devoutly
  chosen_spanish: devotamente
  alternatives_spanish:
  - piadosamente
  - santamente
  lexicon: BDAG
  rationale: El término subraya una conducta piadosa delante de Dios. «Devotamente» comunica bien esa orientación hacia Dios sin caer en un arcaísmo fuerte.
- source_word: δικαίως
  english_pob_choice: righteously
  chosen_spanish: justamente
  alternatives_spanish:
  - rectamente
  - con justicia
  lexicon: BDAG
  rationale: El adverbio describe una conducta moralmente recta. «Justamente» conserva el campo de justicia/rectitud y armoniza con los otros adverbios.
- source_word: ἀμέμπτως
  english_pob_choice: blamelessly
  chosen_spanish: irreprochablemente
  alternatives_spanish:
  - sin culpa
  - sin reproche
  lexicon: BDAG
  rationale: El adverbio indica una conducta que no admite acusación válida. «Irreprochablemente» es el equivalente más directo y natural en español formal.
- source_word: ὑμῖν
  english_pob_choice: toward you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - hacia ustedes
  - entre ustedes
  - delante de ustedes
  lexicon: BDAG
  rationale: El dativo marca la relación o ámbito respecto de los destinatarios. «Con ustedes» fluye con naturalidad en español y preserva la orientación relacional sin forzar una preposición demasiado literal.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: who believe
  chosen_spanish: que creen
  alternatives_spanish:
  - los que creen
  - los creyentes
  lexicon: BDAG
  rationale: El participio presente funciona de manera substantiva. «Que creen» conserva el valor verbal y evita reducirlo demasiado pronto al sustantivo «creyentes».
- source_word: ἐγενήθημεν
  english_pob_choice: we behaved
  chosen_spanish: nos comportamos
  alternatives_spanish:
  - nos condujimos
  - actuamos
  lexicon: BDAG
  rationale: Aunque γίνομαι suele significar «llegar a ser/ser», en este contexto con adverbios de modo describe la manera de vivir o conducirse. «Nos comportamos» expresa esa idea de forma clara y formal en español.
theological_decisions:
- issue: Los tres adverbios describen la conducta apostólica sin implicar perfección moral absoluta
  english_pob_reading: The three adverbs describe the missionaries' actual manner of life before God and the believers, without importing a claim of sinless perfection.
  chosen_spanish_reading: Los tres adverbios describen la manera real de conducirse de los misioneros delante de Dios y de los creyentes, sin convertir el texto en una afirmación de impecabilidad absoluta.
  alternative_spanish_readings:
  - La frase es solo una defensa retórica sin contenido ético real
  - El texto afirma perfección moral sin pecado
  rationale: 'La combinación de adverbios presenta una apelación solemne a testigos humanos y divinos sobre la integridad del comportamiento. Conviene mantener la tensión bíblica: conducta irreprochable en el sentido ordinario del término, no perfección sin pecado.'
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: El audit trail inglés revisó «conducted ourselves» a «behaved» para acercarse más al valor contextual de ἐγενήθημεν. La versión española sigue esa misma decisión semántica con un verbo de conducta natural en español, sin perder el registro formal ni la apelación solemne a los testigos.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al estándar del proyecto.
  - Se mantiene un registro moderno y digno, evitando calcos innecesarios.
  - «Irreprochablemente» conserva la fuerza de ἀμέμπτως sin suavizarla.
  - «Que creen» preserva el participio presente con valor verbal.
  - No se introduce «SEÑOR» ni «Cristo», porque no aparecen en el versículo.
