review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: apelación a testigos humanos y divinos, seguido por la manera de la conducta apostólica. Conserva adecuadamente ὁσίως / δικαίως / ἀμέμπτως y la nota sobre ἐγενήθημεν. Sin embargo, «de cuán» suena poco natural en este contexto español y debilita la función de ὡς como introducción de modo; «cómo» expresa mejor el sentido. Además, «justamente» en español moderno puede sonar a ‘con razón’ o ‘equitativamente’, menos claro que «rectamente» para el matiz ético de δικαίως.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «de cuán devotamente...» resulta forzado. La secuencia mejora con «cómo». También «rectamente» empareja mejor con «devotamente» e «irreprochablemente» y evita una ambigüedad común de «justamente». El resto del versículo es natural y legible.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Dios» es correcto para θεός. Las decisiones sobre «devotamente», «irreprochablemente», «que creen» y «nos comportamos» son compatibles con el rastro POB. Se ajusta mejor δικαίως con «rectamente» en este contexto ético.
  issues:
  - severity: medium
    issue: «de cuán» suena antinatural para ὡς en este versículo
    rationale: Aunque intenta captar un matiz modal-intensivo, en español bíblico natural después de «son testigos» se prefiere «cómo», que refleja mejor la apelación a la manera de la conducta.
  - severity: medium
    issue: «justamente» es ambiguo para δικαίως
    rationale: En español actual puede entenderse como ‘con justicia’, ‘equitativamente’ o incluso ‘precisamente’. «Rectamente» comunica mejor la rectitud moral del contexto sin perder fidelidad.
