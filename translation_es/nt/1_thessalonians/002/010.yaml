revisions:
- from: Ustedes son testigos, y también Dios, de cuán devotamente, justamente e irreprochablemente nos comportamos[a] con ustedes que creen[b].
  to: Ustedes son testigos, y también Dios, de cómo devotamente, rectamente e irreprochablemente nos comportamos[a] con ustedes que creen[b].
  rationale: Se revisa «de cuán» a «de cómo» para lograr un español natural y fiel al valor modal de ὡς en esta apelación a testigos. Se cambia «justamente» por «rectamente» para expresar con mayor claridad el matiz ético de δικαίως en español contemporáneo, evitando ambigüedad.
