translation:
  language: es
  text: Porque nuestra exhortación[a] no viene de error[b], ni de impureza, ni de engaño.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «apelación». El griego παράκλησις puede significar exhortación, apelación o aliento, según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «engaño» para πλάνη; la frase siguiente con δόλος expresa más directamente el engaño deliberado.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράκλησις
  english_pob_choice: appeal
  chosen_spanish: apelación
  alternatives_spanish:
  - exhortación
  - llamamiento
  - animación
  lexicon: BDAG
  rationale: En este contexto Pablo defiende el origen y la integridad de su mensaje/impulso pastoral. «Apelación» conserva la idea de una exhortación dirigida a los oyentes sin reducir el término solo a consuelo ni volverlo demasiado técnico.
- source_word: πλάνης
  english_pob_choice: error
  chosen_spanish: error
  alternatives_spanish:
  - engaño
  - desvío
  - delirio
  lexicon: BDAG
  rationale: 'La preposición ἐκ marca origen: «no viene de error». «Error» preserva la idea de una falsedad o equivocación en el origen de la apelación y mantiene la distinción con δόλος, que expresa engaño deliberado.'
- source_word: ἀκαθαρσίας
  english_pob_choice: impurity
  chosen_spanish: impureza
  alternatives_spanish:
  - inmundicia
  - inmundicia moral
  - impureza moral
  lexicon: BDAG
  rationale: «Impureza» es la correspondencia natural en español moderno y conserva el sentido moral amplio sin especificar una clase particular de conducta que el texto no nombra.
- source_word: δόλῳ
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - dolo
  - astucia
  - fraude
  lexicon: BDAG
  rationale: Con ἐν, el término señala modo o esfera. «Engaño» comunica claramente la idea de maniobra deliberada. Aunque «dolo» es posible, suena más jurídico y menos transparente para lectura pública; el contexto ya distingue este elemento del «error» anterior.
- source_word: ἐκ ... ἐξ ... ἐν
  english_pob_choice: does not come from ... or from ... or with ...
  chosen_spanish: no viene de ... ni de ... ni de ...
  alternatives_spanish:
  - no procede de ... ni de ... ni de ...
  - no surge de ... ni de ... ni con ...
  lexicon: BDAG
  rationale: 'Se conservan las tres relaciones del griego de manera natural en español: origen/origen/modo. La repetición de «de» es idiomática en español y evita forzar un calco que oscurezca el paralelismo.'
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: «Porque» mantiene el enlace explicativo con el versículo anterior y funciona con fluidez al inicio de una oración en español.
theological_decisions:
- issue: Alcance de ἀκαθαρσία
  english_pob_reading: Render broadly as 'impurity' without specifying sexual misconduct in the main text.
  chosen_spanish_reading: Traducir de forma amplia como «impureza», sin concretar en inmoralidad sexual.
  alternative_spanish_readings:
  - inmundicia sexual
  - impureza sexual
  - inmundicia
  rationale: El griego presenta una tríada general sobre el origen y el modo del ministerio apostólico. Mantener un término amplio evita introducir una acusación más específica que la del texto.
  doctrine_reference: 'Translation philosophy: No importar al texto más de lo que el texto afirma.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y la auditoría inglesa: mantiene la triple negación con relaciones distintas («de ... ni de ... ni de ...»), distingue πλάνη de δόλος, y conserva ἀκαθαρσία en un sentido amplio. Se adoptó «apelación» como término principal por su valor exhortativo y su adecuación al contexto retórico de Pablo.'
  spanish_consistency_notes:
  - Se usa «apelación» para παράκλησις en coherencia con una lectura de exhortación dirigida.
  - «Error» y «engaño» se separan para respetar la distinción entre πλάνη y δόλος.
  - «Impureza» se mantiene amplia y no se especifica sexualmente en el texto principal.
  - La puntuación en español refleja la secuencia negativa del griego sin sobrecargarla con repeticiones innecesarias.
