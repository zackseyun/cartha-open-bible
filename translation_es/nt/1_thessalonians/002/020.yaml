lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre griego es enfático por su posición, pero en español la fuerza se comunica naturalmente con el sujeto explícito 'ustedes' sin añadir una intensificación que el contexto no exige.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: Aquí γάρ introduce la razón de la afirmación previa. 'Porque' preserva bien la relación explicativa y suena natural al inicio de la oración en español.
- source_word: ἐστε
  english_pob_choice: are
  chosen_spanish: son
  alternatives_spanish:
  - están
  lexicon: BDAG
  rationale: El verbo copulativo presente se traduce de forma directa con 'son', manteniendo la relación de identidad o designación que expresa el griego.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - orgullo
  - boato
  lexicon: BDAG
  rationale: '''Gloria'' conserva la conexión léxica con δόξα y reproduce mejor su peso retórico que una paráfrasis como ''orgullo''. En este contexto relacional, el término puede abarcar también la idea de honor, pero el español ''gloria'' es la opción principal más fiel.'
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestra
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: 'El genitivo posesivo de primera persona plural se expresa de modo natural con el posesivo femenino singular concordante con ''gloria'' y ''alegría'': ''nuestra''.'
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: alegría
  alternatives_spanish:
  - gozo
  - regocijo
  lexicon: BDAG
  rationale: '''Alegría'' es una traducción clara y digna para χαρά en español moderno. ''Gozo'' también sería posible, pero ''alegría'' resulta más transparente para lectores amplios sin perder el sentido.'
theological_decisions:
- issue: Sentido de δόξα en una afirmación interpersonal de Pablo
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - honor
  - orgullo
  rationale: La frase no presenta una afirmación doctrinal técnica, sino una expresión de valoración relacional. 'Gloria' mantiene la amplitud semántica de δόξα y evita reducir el texto a una simple autoexaltación o a una sola implicación secundaria como 'honor'.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo, sin revisiones aplicadas; la propuesta española sigue esa lectura estable, conservando la relación explicativa de γάρ y la doble designación 'gloria y alegría'.
  spanish_consistency_notes:
  - Se mantiene una traducción directa y natural del copulativo y del conector causal/explanativo.
  - '''Gloria'' se conserva como término principal para δόξα, con nota de alternativas léxicas ya documentadas por el POB en inglés.'
  - '''Alegría'' se usa para χαρά por claridad y fluidez en español contemporáneo, sin perder el valor nominal del sustantivo.'
