translation:
  language: es
  text: impidiéndonos hablar a los gentiles para que sean salvos, con lo cual siempre llenan la medida de sus pecados. Pero la ira[a] ha venido sobre ellos al fin[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Ira'' probablemente se refiere al juicio divino, pero Pablo no especifica aquí si piensa en un juicio histórico presente, en el juicio final, o en ambos.'
    reason: alternative_reading
  - marker: b
    text: 'O ''completamente'', ''plenamente'' o ''hasta el fin'' para ''al fin'' (griego: εἰς τέλος).'
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλυόντων
  english_pob_choice: by hindering
  chosen_spanish: impidiéndonos
  alternatives_spanish:
  - estorbándonos
  - impidiéndonos hablar
  lexicon: BDAG
  rationale: El participio genitivo expresa acción continua de obstaculizar; en español, un gerundio con objeto clítico comunica la relación de modo natural sin introducir una prohibición jurídica más fuerte que la del texto.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En el contexto paulino el referente es étnico-religioso, no político; 'gentiles' conserva ese valor mejor que 'naciones'.
- source_word: λαλῆσαι
  english_pob_choice: from speaking
  chosen_spanish: hablar
  alternatives_spanish:
  - anunciar
  - decir
  lexicon: BDAG
  rationale: El infinitivo depende de κωλυόντων y el español lo expresa de forma natural sin necesidad de añadir contenido evangelístico que ya aporta el contexto.
- source_word: ἵνα σωθῶσιν
  english_pob_choice: so that they may be saved
  chosen_spanish: para que sean salvos
  alternatives_spanish:
  - para que puedan salvarse
  - para que sean rescatados
  lexicon: BDAG
  rationale: '''Sean salvos'' preserva la forma pasiva y el peso teológico de σῴζω; ''salvos'' es una forma idiomática clara en español bíblico contemporáneo.'
- source_word: εἰς τὸ ἀναπληρῶσαι
  english_pob_choice: so as always to fill up
  chosen_spanish: de modo que siempre llenen
  alternatives_spanish:
  - para llenar siempre
  - así como para llenar siempre
  lexicon: BDAG
  rationale: La construcción puede expresar resultado o finalidad; 'de modo que' evita imponer una intención consciente de completar pecados, manteniendo la fuerza consecutiva del griego.
- source_word: ἀναπληρῶσαι
  english_pob_choice: fill up the measure of
  chosen_spanish: llenar la medida de
  alternatives_spanish:
  - colmatar la medida de
  - completar la medida de
  lexicon: BDAG
  rationale: '''Llenar la medida de'' reproduce la imagen idiomática de plenitud sin suavizar el lenguaje moral del pasaje.'
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  lexicon: BDAG
  rationale: Adverbio directo y natural; modifica la cláusula de aumento de pecados, como en el flujo del texto griego.
- source_word: ἔφθασεν
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - vino
  lexicon: BDAG
  rationale: El perfecto español comunica una acción completada con relevancia presente, equivalente al valor del aoristo en este contexto.
- source_word: ὀργή
  english_pob_choice: wrath
  chosen_spanish: la ira
  alternatives_spanish:
  - el furor
  - el juicio
  lexicon: BDAG
  rationale: '''Ira'' preserva el peso del término y es una opción bíblica comprensible en español; ''juicio'' sería interpretativo más que léxico.'
- source_word: εἰς τέλος
  english_pob_choice: at last
  chosen_spanish: al fin
  alternatives_spanish:
  - hasta el final
  - completamente
  - por fin
  lexicon: BDAG
  rationale: La frase es discutida; 'al fin' funciona como adverbio de culminación y mantiene la ambigüedad entre 'al final' y 'completamente'.
theological_decisions:
- issue: Referencia y alcance de 'ira'
  english_pob_reading: '''Wrath'' is preserved as a theologically weighty but not over-defined term, implying divine wrath/judgment without specifying whether Paul refers to a historical event, eschatological judgment, or both.'
  chosen_spanish_reading: '''La ira'' se deja como término teológicamente cargado, sin precisar si alude a un juicio histórico, escatológico o ambos.'
  alternative_spanish_readings:
  - el juicio
  - el castigo divino
  rationale: El texto afirma que la ira ha venido sobre ellos, pero no identifica el evento. La traducción conserva la tensión sin resolverla.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
- issue: Fuerza de εἰς τὸ ἀναπληρῶσαι
  english_pob_reading: Result rather than explicit purpose
  chosen_spanish_reading: Se expresa con una construcción consecutiva ('de modo que') en vez de una finalidad explícita ('para').
  alternative_spanish_readings:
  - para llenar la medida de sus pecados
  - con el fin de llenar la medida de sus pecados
  rationale: Así no se sugiere que los opositores pretendían conscientemente completar sus pecados; aun así, se conserva la relación de consecuencia del griego.
  doctrine_reference: 'Translation philosophy: optimal equivalence; conservar el sentido fuente sin importar afirmaciones que el texto no hace.'
translation_notes:
  revision_awareness: Se siguió el ajuste de la revisión más reciente al reflejar εἰς τὸ ἀναπληρῶσαι con una construcción más directa de resultado/finalidad contextual, y se mantuvo la ambigüedad de εἰς τέλος mediante una nota léxica. También se evitó una formulación que hiciera sonar deliberada la acumulación de pecados.
  spanish_consistency_notes:
  - '''gentiles'' se usa de forma consistente para ἔθνη en sentido paulino.'
  - '''salvos'' conserva la pasiva teológica de σῴζω sin introducir una paráfrasis.'
  - '''la ira'' mantiene la gravedad de ὀργή y deja abierta su referencia exacta.'
  - La nota [a] se ancla explícitamente en 'al fin' y [b] en 'pecados', para cumplir la trazabilidad de las alternativas.
