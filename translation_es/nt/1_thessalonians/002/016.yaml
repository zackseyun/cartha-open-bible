    text: 'Or ''fully,'' ''completely,'' or ''to the end'' for ''at last'' (Greek: εἰς τέλος).'
    reason: lexical_alternative
  - marker: b
    text: '''Wrath'' likely refers to divine judgment, but Paul does not specify here whether he means a present historical judgment, final judgment, or both.'
