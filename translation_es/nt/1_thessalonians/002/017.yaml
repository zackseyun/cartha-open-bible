translation:
  language: es
  text: Pero nosotros, hermanos[a], al haber sido arrancados de ustedes por un breve tiempo—en persona, no en corazón—, nos esforzamos aún más por ver su rostro, con gran anhelo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aunque ‘hermanos’ es la forma de dirección de Pablo, en este contexto probablemente se refiere a toda la comunidad creyente, incluidas las mujeres.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, ‘al haber quedado huérfanos de ustedes’; el griego usa una imagen vívida de duelo y orfandad para describir la separación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἡμεῖς δέ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Pero en cuanto a nosotros
  - Ahora nosotros
  lexicon: BDAG
  rationale: δέ introduce un contraste o transición suave; «Pero nosotros» conserva el énfasis del sujeto explícito Ἡμεῖς y suena natural en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - siblings
  lexicon: BDAG
  rationale: Mantengo el vocativo masculino plural como forma gramatical y de dirección paulina, sin expandirlo en el texto principal. En español, «hermanos» es la forma sobria y fiel para esta apelación comunitaria.
- source_word: ἀπορφανισθέντες
  english_pob_choice: having been torn away
  chosen_spanish: habiendo sido arrancados
  alternatives_spanish:
  - habiendo sido privados de ustedes
  - habiendo quedado huérfanos de ustedes
  - habiendo sido separados de ustedes
  lexicon: BDAG
  rationale: El verbo evoca una separación dolorosa, con imagen de despojo/bereavement. «Arrancados» comunica la fuerza afectiva y la pérdida forzada mejor que el más débil «separados»; la imagen de orfandad se preserva en nota.
- source_word: πρὸς καιρὸν ὥρας
  english_pob_choice: for a short time
  chosen_spanish: por un breve tiempo
  alternatives_spanish:
  - por una hora
  - por un momento
  - por un corto tiempo
  lexicon: BDAG
  rationale: La expresión idiomática señala duración breve, no una hora literal. «Breve tiempo» transmite ese valor sin forzar el español.
- source_word: προσώπῳ οὐ καρδίᾳ
  english_pob_choice: in person, not in heart
  chosen_spanish: en persona, no en corazón
  alternatives_spanish:
  - de vista, no de corazón
  - en presencia, no en corazón
  - en persona, no de ánimo
  lexicon: BDAG
  rationale: Conserva el contraste entre presencia física e interioridad afectiva. «En persona» es idiomático; «no en corazón» mantiene la forma del original y su tensión semítica/paulina.
- source_word: περισσοτέρως
  english_pob_choice: all the more
  chosen_spanish: con mucho más empeño
  alternatives_spanish:
  - aún más
  - con mayor empeño
  - mucho más
  lexicon: BDAG
  rationale: El adverbio intensifica la acción. «Con mucho más empeño» refleja la fuerza comparativa y el matiz de esfuerzo/eagerness que el contexto requiere.
- source_word: ἐσπουδάσαμεν
  english_pob_choice: were ... eager
  chosen_spanish: quisimos
  alternatives_spanish:
  - nos apresuramos
  - nos empeñamos
  - fuimos diligentes
  lexicon: BDAG
  rationale: En este contexto, el verbo expresa una fuerte disposición/ansia por actuar. «Quisimos ver» comunica con naturalidad la intención insistente, y el «con mucho más empeño» anterior sostiene la energía del verbo.
- source_word: τὸ πρόσωπον ὑμῶν ἰδεῖν
  english_pob_choice: to see your face
  chosen_spanish: ver su rostro
  alternatives_spanish:
  - ver su cara
  - verlos
  - ver su presencia
  lexicon: BDAG
  rationale: «Rostro» preserva la imagen concreta de πρόσωπον y su valor relacional. Aunque «verlos» sería más idiomático, perdería la fuerza figurativa que el texto repite con la idea de «rostro/presencia».
- source_word: ἐν πολλῇ ἐπιθυμίᾳ
  english_pob_choice: with great longing
  chosen_spanish: con gran anhelo
  alternatives_spanish:
  - con mucho deseo
  - con fuerte deseo
  - con gran deseo
  lexicon: BDAG
  rationale: ἐπιθυμία aquí es deseo intenso y no necesariamente negativo; «anhelo» expresa afecto profundo y encaja con el tono del pasaje. Se evita «deseo» para no sonar sexual o ambiguo en español.
theological_decisions:
- issue: Alcance comunitario de ἀδελφοί
  english_pob_reading: brothers; in context it likely refers to the whole believing community, including women.
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  - la comunidad creyente
  rationale: El texto principal conserva la forma masculina plural como equivalente directo del vocativo. La posible inclusión de mujeres se preserva como nota contextual, sin reemplazar la forma recibida por una expansión interpretativa en el cuerpo del versículo.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Imagen de separación dolorosa en ἀπορφανισθέντες
  english_pob_reading: having been torn away from you; the Greek uses a vivid image of bereavement to describe the separation.
  chosen_spanish_reading: habiendo sido arrancados de ustedes
  alternative_spanish_readings:
  - habiendo sido privados de ustedes
  - habiendo quedado huérfanos de ustedes
  - habiendo sido separados de ustedes
  rationale: La traducción evita suavizar la intensidad del participio. «Arrancados» mantiene el carácter traumático de la separación y permite explicar en nota la metáfora de orfandad que el griego sugiere.
  doctrine_reference: Lexical theology of suffering/separation in Pauline rhetoric
translation_notes:
  revision_awareness: 'Versión alineada con el audit trail inglés sin cambios sustantivos respecto del sentido revisado: se mantiene la separación forzada, la contraposición «en persona, no en corazón», y el deseo intenso de ver el rostro de los destinatarios.'
  spanish_consistency_notes:
  - Se conservó la repetición de la imagen de presencia/rostro mediante «en persona» y «rostro», siguiendo la coherencia interna del pasaje.
  - Se evitó «separados» como opción principal para no debilitar la imagen fuerte de ἀπορφανισθέντες.
  - «Anhelo» se eligió para ἐπιθυμία porque en español comunica mejor deseo intenso y afectivo sin cargar innecesariamente con connotaciones negativas.
  - Se mantuvo «hermanos» en el texto principal para respetar la forma vocativa paulina; la posible referencia inclusiva queda implícita en el contexto y documentada en la decisión teológica.
