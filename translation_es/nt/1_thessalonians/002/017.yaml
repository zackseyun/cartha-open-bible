base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/017.yaml
  text: But we[a], brothers, having been torn away from you for a short time—in person, not in heart—were all the more eager, with great longing[b], to see your face.
  footnotes:
  - marker: a
    text: Or more literally, 'having been orphaned from you'; the Greek uses a vivid image of bereavement to describe the separation.
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' is Paul''s form of address; in context it likely refers to the whole believing community, including women.'
