  to: Pero nosotros, hermanos[a], al haber sido arrancados de ustedes por un breve tiempo—en persona, no en corazón—, nos esforzamos aún más por ver su rostro, con gran anhelo[b].
  rationale: 'La revisión corrige la relación semántica entre περισσοτέρως, ἐσπουδάσαμεν y ἐν πολλῇ ἐπιθυμίᾳ: Pablo no solo ‘quiso’ verlos, sino que ‘se esforzó aún más’ por hacerlo, y lo hizo ‘con gran anhelo’. También se añade la nota contextual sobre ‘hermanos’ que el POB inglés conservó, y se suaviza ligeramente la sintaxis inicial para un español más natural sin perder la fuerza del original.'
