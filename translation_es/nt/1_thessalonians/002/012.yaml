translation:
  language: es
  text: animándolos[a], consolándolos y exhortándolos[c] a caminar[b] de una manera digna de Dios, que los llama a su propio reino y gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativamente: «exhortándolos ... y testificándoles»; los tres participios describen el ministerio paterno de Pablo con matices que se superponen: aliento, consuelo y apelación solemne.'
    reason: lexical_alternative
  - marker: b
    text: «Caminar» es una metáfora bíblica de la manera de vivir; alternativamente, «vivir» o «conducirse».
    reason: lexical_alternative
  - marker: c
    text: 'O: «animándolos y consolándolos y exhortándolos».'
    reason: previous_rendering
lexical_decisions:
- source_word: παρακαλοῦντες
  english_pob_choice: encouraging
  chosen_spanish: animándolos
  alternatives_spanish:
  - exhortándolos
  - alentándolos
  lexicon: BDAG
  rationale: El participio presenta una acción pastoral continua en coordinación con otros dos participios. «Animar» comunica bien el tono de aliento y cercanía, y evita volver demasiado duro el matiz que podría tener «exhortar» en español.
- source_word: παραμυθούμενοι
  english_pob_choice: comforting
  chosen_spanish: consolándolos
  alternatives_spanish:
  - comfortándolos
  - alentándolos
  lexicon: BDAG
  rationale: Este verbo expresa consuelo o alivio mediante la palabra. «Consolar» es la opción más natural en español y conserva una distinción útil frente a παρακαλοῦντες.
- source_word: μαρτυρόμενοι
  english_pob_choice: urging
  chosen_spanish: exhortándolos
  alternatives_spanish:
  - atestiguándoles
  - insistiendo
  lexicon: BDAG
  rationale: Aquí el verbo tiene fuerza de apelación solemne o insistencia. «Exhortar» transmite mejor esa presión pastoral y moral que «atestiguar», que sería más literal pero menos claro en esta secuencia.
- source_word: εἰς τὸ περιπατεῖν
  english_pob_choice: to walk
  chosen_spanish: a caminar
  alternatives_spanish:
  - a vivir
  - a conducirse
  lexicon: BDAG
  rationale: 'Se conserva la metáfora bíblica de «caminar» para no diluir la imagen ética del griego. La preposición final se vierte con una construcción natural en español de finalidad: «a caminar».'
- source_word: ἀξίως
  english_pob_choice: worthily
  chosen_spanish: de una manera digna
  alternatives_spanish:
  - dignamente
  - de modo digno
  lexicon: BDAG
  rationale: En español «dignamente» puede sonar más adverbial y breve, pero «de una manera digna» comunica con claridad el valor adverbial de ἀξίως y su relación con el verbo metafórico «caminar».
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - ante Dios
  lexicon: BDAG
  rationale: 'El genitivo indica la norma o referencia de dignidad: caminar de una manera digna «de Dios». No se añade una relación interpretativa como «ante Dios» que no está explícita en el sintagma.'
- source_word: τοῦ καλοῦντος
  english_pob_choice: who calls
  chosen_spanish: que los llama
  alternatives_spanish:
  - que los llamó
  - que los está llamando
  lexicon: BDAG
  rationale: El participio presente se refleja como presente relativo para conservar la acción en curso. «Que los llama» es natural y no fuerza un tiempo pasado o un aspecto demasiado puntual.
- source_word: εἰς τὴν ἑαυτοῦ βασιλείαν καὶ δόξαν
  english_pob_choice: into his own kingdom and glory
  chosen_spanish: a su propio reino y gloria
  alternatives_spanish:
  - en su propio reino y gloria
  - hacia su propio reino y gloria
  lexicon: BDAG
  rationale: La preposición εἰς admite en español una dirección hacia o ingreso en; «a» funciona bien en una frase de llamada. «Su propio» conserva el valor enfático de ἑαυτοῦ y se mantiene la coordinación entre «reino» y «gloria».
theological_decisions:
- issue: Mantener o interpretar la metáfora de περιπατεῖν
  english_pob_reading: Retain 'walk' as a biblical metaphor for manner of life
  chosen_spanish_reading: Conservar «caminar» como metáfora bíblica de la conducta
  alternative_spanish_readings:
  - vivir
  - conducirse
  rationale: La metáfora es ampliamente bíblica y ayuda a mantener continuidad intertextual. Las alternativas explicitan el sentido, pero pierden la imagen verbal presente en el griego.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor de la llamada divina en τοῦ καλοῦντος ὑμᾶς
  english_pob_reading: Present 'who calls you' without specifying doctrinal mechanics
  chosen_spanish_reading: 'Presente simple: «que los llama»'
  alternative_spanish_readings:
  - que los llamó
  - que los está llamando
  rationale: El presente conserva el matiz aspectual del participio sin imponer una lectura doctrinal sobre el momento exacto de la llamada. También mantiene la fluidez de la frase en español.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente no cambió el contenido. El ajuste aplicado en la audit trail fue estilístico: se condensó la repetición de «you» para reflejar mejor la coordinación de participios. En español, la coordinación ya queda natural con un solo objeto plural «los» después del primer participio, por lo que no se requiere ajuste adicional.'
  spanish_consistency_notes:
  - Se mantiene «Dios» en lugar de una forma enmascarada, conforme al estándar del proyecto.
  - Se conserva la metáfora de «caminar» para reflejar περιπατεῖν sin paráfrasis excesiva.
  - «Reino y gloria» se dejan coordinados sin expandir el sentido más allá del texto fuente.
