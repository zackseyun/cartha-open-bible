translation:
  language: es
  text: 'Porque ustedes recuerdan[a], hermanos, nuestro trabajo y nuestra fatiga: trabajando de noche y de día para no ser una carga para ninguno de ustedes, les proclamamos el evangelio de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse inclusivamente a toda la congregación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μνημονεύετε
  english_pob_choice: you remember
  chosen_spanish: ustedes recuerdan
  alternatives_spanish:
  - ustedes recuerdan
  - recuerdan
  lexicon: BDAG
  rationale: 'El presente indicativo segunda persona plural expresa un hecho presente: Pablo apela a la memoria de los destinatarios. En español, «ustedes recuerdan» conserva ese valor mejor que un imperativo o una paráfrasis.'
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego, como en el POB inglés, sin expandirla en el texto principal. En español «hermanos» puede funcionar como vocativo congregacional y mantiene la forma documentada.
- source_word: τὸν κόπον
  english_pob_choice: labor
  chosen_spanish: nuestro trabajo
  alternatives_spanish:
  - nuestro labor
  - nuestro esfuerzo
  - nuestro trabajo arduo
  lexicon: BDAG
  rationale: κόπος denota labor esforzada. «Trabajo» es natural en español y evita una repetición excesiva con «fatiga»; el posesivo «nuestro» refleja el genitivo plural.
- source_word: τὸν μόχθον
  english_pob_choice: hardship
  chosen_spanish: nuestra fatiga
  alternatives_spanish:
  - nuestra dificultad
  - nuestra penosa labor
  - nuestra aflicción
  lexicon: BDAG
  rationale: Se distingue de κόπος mediante «fatiga», que en español comunica desgaste, penosidad y cansancio. Así se conserva la doble idea de esfuerzo y carga sin colapsar ambos términos en uno solo.
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - noche y día
  - de noche y durante el día
  lexicon: BDAG
  rationale: La expresión genitiva es idiomática y significa continuidad. «De noche y de día» es natural en español y preserva el ritmo adverbial de la frase.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_spanish: trabajando
  alternatives_spanish:
  - laborando
  - esforzándonos trabajando
  lexicon: BDAG
  rationale: 'El participio expresa la circunstancia de la proclamación: una actividad continua de sostén propio. «Trabajando» es directo y no carga con matices eclesiásticos ajenos al verbo.'
- source_word: πρὸς τὸ μὴ ἐπιβαρῆσαί
  english_pob_choice: so as not to burden
  chosen_spanish: para no ser carga
  alternatives_spanish:
  - a fin de no cargar
  - para no gravar
  lexicon: BDAG
  rationale: La construcción de propósito se vierte de modo natural con «para». «Ser carga» comunica el sentido de ἐπιβαρέω como imposición o peso sobre los destinatarios, sin tecnicismos.
- source_word: τινα ὑμῶν
  english_pob_choice: any of you
  chosen_spanish: a ninguno de ustedes
  alternatives_spanish:
  - a cualquiera de ustedes
  - a nadie de ustedes
  lexicon: BDAG
  rationale: 'El singular indefinido τινα con el genitivo plural se expresa idiomáticamente como exclusión total: no haber gravado a ninguna persona del grupo. «A ninguno de ustedes» conserva esa fuerza distributiva.'
- source_word: ἐκηρύξαμεν
  english_pob_choice: we proclaimed
  chosen_spanish: les proclamamos
  alternatives_spanish:
  - les predicamos
  - anunciamos
  lexicon: BDAG
  rationale: κηρύσσω conserva el matiz de anuncio público y autorizado. «Proclamamos» evita reducir el verbo a jerga litúrgica, aunque «les predicamos» sigue siendo una alternativa posible por contexto.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - entre ustedes
  lexicon: BDAG
  rationale: En español, el dativo de destinatario ya queda expresado naturalmente por «les». La dirección personal de εἰς ὑμᾶς se integra en la construcción verbal sin añadir una preposición innecesaria.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_choice: the gospel of God
  chosen_spanish: el evangelio de Dios
  alternatives_spanish:
  - la buena noticia de Dios
  - el evangelio que es de Dios
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente establecido y fiel a εὐαγγέλιον. Se conserva el genitivo «de Dios» sin explicitar más de lo que el griego dice.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: Retain 'brothers' in the main text; inclusive sense may be noted in a footnote
  chosen_spanish_reading: Mantener «hermanos» en el texto principal; notar la posible inclusión de toda la congregación
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El griego usa un masculino plural; la línea editorial del POB preserva esa forma en el texto principal. En español, «hermanos» puede abarcar a la comunidad entera, y la inclusión se aclara con una nota si se desea.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión sigue de cerca el texto griego y el audit trail inglés del POB, sin cambios de sentido respecto del último pase revisado; se conserva la distinción entre κόπος y μόχθος, el valor de propósito de πρὸς τὸ μὴ ἐπιβαρῆσαί y el matiz de anuncio público de ἐκηρύξαμεν.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ, conforme al estándar del proyecto.
  - Se evita «Señor» o lenguaje eclesiástico añadido, porque no aparece en este versículo.
  - «Evangelio» se mantiene como término técnico ya asentado en español bíblico, pero sin sustituir el genitivo por una paráfrasis.
  - La nota [a] está anclada en «hermanos» para reflejar la alternativa inclusiva documentada.
