translation:
  language: es
  text: Porque ustedes mismos saben[a], hermanos, que nuestra llegada a ustedes no fue en vano,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y con frecuencia usa la forma masculina para dirigirse a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτοὶ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre intensivo griego refuerza el conocimiento de primera mano. «Ustedes mismos» conserva esa fuerza mejor que un simple «ustedes» y suena natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  - En efecto
  lexicon: BDAG
  rationale: Aquí introduce la base de lo dicho antes; «Porque» mantiene la conexión argumentativa de forma natural en español.
- source_word: οἴδατε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - saben
  - han sabido
  - conocen
  lexicon: BDAG
  rationale: 'El perfecto con sentido presente de οἶδα se expresa mejor con un presente natural en español: «saben».'
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - hermanos
  lexicon: BDAG
  rationale: Se conserva la forma masculina vocativa del griego, como en el texto fuente, en lugar de neutralizarla en el texto principal.
- source_word: εἴσοδον
  english_pob_choice: coming
  chosen_spanish: llegada
  alternatives_spanish:
  - entrada
  - venida
  - llegada
  lexicon: BDAG
  rationale: Aunque el sentido literal es «entrada», en este contexto alude a la llegada misionera de Pablo y sus compañeros; «llegada» comunica bien el hecho sin calcar de forma extraña.
- source_word: τὴν πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a ustedes
  - entre ustedes
  - con ustedes
  lexicon: BDAG
  rationale: La preposición indica dirección hacia los tesalonicenses; «a ustedes» reproduce esa relación de forma directa.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  - como
  lexicon: BDAG
  rationale: Introduce el contenido de lo que saben; «que» es el equivalente español más natural.
- source_word: οὐ κενὴ γέγονεν
  english_pob_choice: was not in vain
  chosen_spanish: no fue en vano
  alternatives_spanish:
  - no resultó vacía
  - no fue inútil
  - no quedó sin efecto
  lexicon: BDAG
  rationale: κενός expresa ausencia de resultado o valor; «en vano» conserva muy bien esa fuerza idiomática y evita una traducción demasiado literal como «vacía».
theological_decisions:
- issue: Traducción de ἀδελφοί como vocativo masculino plural en una comunidad mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - familia
  rationale: Se mantiene la forma vocativa masculina del texto fuente en el cuerpo principal, siguiendo la decisión auditada de no neutralizar el término principal; si se quisiera explicitar la inclusión de toda la congregación, eso correspondería a una nota, no al texto base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'El cotejo de revisión indica alta concordancia y no registra cambios: la decisión española sigue de cerca el texto griego y el audit trail inglés sin introducir modificaciones de sentido.'
  spanish_consistency_notes:
  - Se mantuvo un español moderno y digno, evitando calcado innecesario.
  - Se preservó el tono discursivo de apoyo con «Porque».
  - «A ustedes» conserva la dirección relacional de πρός ὑμᾶς sin sobreinterpretar como «entre ustedes».
  - La nota de inclusión de género se coloca solo en pie de página, conforme al criterio auditado.
