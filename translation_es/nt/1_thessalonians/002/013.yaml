translation:
  language: es
  text: Y por esta razón también nosotros damos gracias a Dios sin cesar, porque cuando recibieron[a] la palabra de Dios que oyeron de nosotros, la aceptaron no como palabra de hombres, sino, como en verdad es, palabra de Dios[b], que también actúa en ustedes los que creen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al haber recibido la palabra de Dios que oyeron de nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «no como palabra humana, sino, como en verdad es, la palabra de Dios». También puede traducirse «la palabra [de Dios] que oyeron de nosotros», porque la expresión griega es condensada y admite más de una manera natural de desglosarse.
    reason: lexical_alternative
  - marker: c
    text: 'El relativo también puede entenderse referido a Dios: «quien también actúa en ustedes los que creen».'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: por esta razón
  alternatives_spanish:
  - por eso
  - debido a esto
  - por este motivo
  lexicon: BDAG
  rationale: La expresión causal mantiene el enlace explícito con el contexto previo. «Por esta razón» suena natural en español y conserva el matiz de causa más que de mera inferencia.
- source_word: εὐχαριστοῦμεν ... ἀδιαλείπτως
  english_pob_choice: we also thank God continually
  chosen_spanish: damos gracias a Dios sin cesar
  alternatives_spanish:
  - agradecemos a Dios sin cesar
  - damos gracias a Dios continuamente
  - le damos gracias a Dios incesantemente
  lexicon: BDAG
  rationale: «Dar gracias» reproduce el valor verbal de εὐχαριστοῦμεν con dignidad idiomática. «Sin cesar» preserva ἀδιαλείπτως de manera clara y tradicional sin sonar arcaizante.
- source_word: παραλαβόντες
  english_pob_choice: received
  chosen_spanish: al haber recibido
  alternatives_spanish:
  - habiendo recibido
  - después de recibir
  - cuando recibieron
  lexicon: BDAG
  rationale: El participio se vierte con una construcción participial española que marca anterioridad y dependencia respecto de la acción principal.
- source_word: λόγον ἀκοῆς παρ’ ἡμῶν τοῦ θεοῦ
  english_pob_choice: the word of God that you heard from us
  chosen_spanish: la palabra de oída que oyeron de nosotros
  alternatives_spanish:
  - la palabra de Dios que oyeron de nosotros
  - el mensaje de Dios que oyeron de nosotros
  - la palabra que oyeron de nosotros, procedente de Dios
  lexicon: BDAG
  rationale: Se preserva la densidad de la construcción griega sin suavizarla excesivamente. «Palabra de oída» refleja el giro comprimido de λόγον ἀκοῆς; la explicación inmediata «que oyeron de nosotros» aclara la relación con la proclamación apostólica. En el contexto, el genitivo «de Dios» se expresa luego en la cláusula contrastiva para mantener el paralelismo retórico.
- source_word: ἐδέξασθε
  english_pob_choice: you accepted it
  chosen_spanish: la aceptaron
  alternatives_spanish:
  - la recibieron
  - la acogieron
  - la recibieron favorablemente
  lexicon: BDAG
  rationale: «Aceptar» comunica bien la aceptación favorable que contrasta con «no como palabra de hombres». Mantiene el énfasis en la respuesta valorativa, no solo en la recepción material.
- source_word: οὐ λόγον ἀνθρώπων
  english_pob_choice: not as the word of men
  chosen_spanish: no como palabra de hombres
  alternatives_spanish:
  - no como palabra humana
  - no como palabra de seres humanos
  - no como la palabra de los hombres
  lexicon: BDAG
  rationale: Se conserva el contraste retórico entre palabra humana y palabra divina. «Hombres» reproduce el plural genérico de ἀνθρώπων y mantiene el eco bíblico sin exigir una glosa.
- source_word: ἀλλὰ καθὼς ἀληθῶς ἐστὶν
  english_pob_choice: but, as it truly is,
  chosen_spanish: sino, como en verdad es,
  alternatives_spanish:
  - sino, como realmente es,
  - sino, como verdaderamente es,
  - sino, como ciertamente es,
  lexicon: BDAG
  rationale: La fórmula parentética conserva la afirmación enfática del griego. «Como en verdad es» reproduce el sentido de ἀληθῶς sin forzar una resonancia demasiado formal en español.
- source_word: λόγον θεοῦ
  english_pob_choice: as the word of God
  chosen_spanish: palabra de Dios
  alternatives_spanish:
  - como palabra de Dios
  - como la palabra de Dios
  - palabra divina
  lexicon: BDAG
  rationale: 'El español permite omitir la repetición de «como» en la segunda mitad para una fluidez mayor, sin perder el contraste central: la palabra aceptada es, en realidad, palabra de Dios. Se mantiene la reiteración léxica de «palabra de Dios» para respetar el énfasis del texto.'
- source_word: ὃς
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - el cual
  - quien
  lexicon: BDAG
  rationale: Se toma el antecedente más cercano, «palabra», por lo que «la cual» resulta la referencia natural en español. Conserva la opción más probable sin cerrar la alternativa personal que la POB inglesa preservó con nota.
- source_word: ἐνεργεῖται
  english_pob_choice: is also at work
  chosen_spanish: también actúa
  alternatives_spanish:
  - también está en acción
  - también obra
  - también está actuando
  lexicon: BDAG
  rationale: «Actúa» comunica la eficacia presente y continua de ἐνεργεῖται sin sobrecargar el español. La omisión de «está» evita una perífrasis innecesaria y conserva la fuerza verbal.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: in you who believe
  chosen_spanish: en ustedes los que creen
  alternatives_spanish:
  - en ustedes, los creyentes
  - en ustedes que creen
  - en ustedes los que están creyendo
  lexicon: BDAG
  rationale: El participio presente se vierte con relativo para mantener el carácter continuo de la fe. «Los que creen» es claro, natural y conserva el matiz aspectual.
theological_decisions:
- issue: Referente de ὃς
  english_pob_reading: The relative clause refers to 'the word of God,' yielding 'which is also at work in you who believe.'
  chosen_spanish_reading: 'La cláusula relativa se refiere a «palabra de Dios», dando: «la cual también actúa en ustedes los que creen».'
  alternative_spanish_readings:
  - «quien también actúa en ustedes los que creen» refiriéndose a Dios
  - «que también actúa en ustedes los que creen» con antecedente abierto
  rationale: El antecedente inmediato y gramatical más natural es «palabra». Sin embargo, la posibilidad de que se entienda como referencia a Dios existe por el género y la cercanía semántica; por eso se preserva en nota la alternativa sin resolver artificialmente la tensión.
  doctrine_reference: Mantener la ambigüedad textual donde el griego la permite; no imponer una lectura doctrinalmente cerrada.
- issue: Naturaleza de λόγος en la expresión apostólica
  english_pob_reading: The phrase is rendered straightforwardly as a claim that the apostolic message is God's word, without expanding the claim beyond the verse.
  chosen_spanish_reading: La frase se traduce como afirmación directa de que la proclamación apostólica es palabra de Dios.
  alternative_spanish_readings:
  - «mensaje de Dios»
  - «enseñanza de Dios»
  rationale: «Palabra de Dios» conserva el contraste verbal del pasaje y no diluye el peso del término λόγος. No se amplía a una doctrina más general de inspiración; se deja que el versículo hable con su propia precisión.
  doctrine_reference: Primacía del texto original sobre paráfrasis doctrinales; conservar el contraste humano/divino del pasaje.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail inglés al preferir una sintaxis que refleje mejor la estructura del griego, con coma interna en lugar de una pausa más fuerte y sin añadir un segundo «como» antes de «palabra de Dios». También conserva la tensión de la cláusula relativa y la alternativa de la construcción compacta de λόγον ἀκοῆς, según el contexto auditado.
  spanish_consistency_notes:
  - Se usa «Dios» de manera consistente para θεός.
  - Se conserva «palabra de Dios» para λόγος θεοῦ por su fuerza retórica y teológica.
  - «Sin cesar» mantiene el valor adverbial de ἀδιαλείπτως en registro bíblico claro.
  - «Los que creen» preserva el participio presente sin convertirlo en sustantivo técnico.
  - No se introduce «Cristo» ni vocabulario eclesiástico no presente en el versículo.
