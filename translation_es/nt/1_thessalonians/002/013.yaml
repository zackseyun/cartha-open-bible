    rationale: Aunque intenta reflejar la compresión de λόγον ἀκοῆς, en español no comunica con claridad y rompe la legibilidad. La POB inglesa decidió explicitar el sentido principal como «the word of God that you heard from us» y reservar la alternativa en nota.
  - severity: medium
