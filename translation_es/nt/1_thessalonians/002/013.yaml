  to: Y por esta razón también nosotros damos gracias a Dios sin cesar, porque cuando recibieron[a] la palabra de Dios que oyeron de nosotros, la aceptaron no como palabra de hombres, sino, como en verdad es, palabra de Dios[b], que también actúa en ustedes los que creen[c].
  rationale: Se reemplaza «la palabra de oída que oyeron de nosotros» por «la palabra de Dios que oyeron de nosotros» para reflejar la decisión principal del análisis fuente y producir un español natural y claro. Se mantiene la ambigüedad de la construcción griega en nota. También se suaviza la sintaxis con «cuando recibieron» y se usa «que» en lugar de «la cual» para mayor fluidez.
