  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: contrasta con «Pero», conserva la anterioridad de προπαθόντες, la apelación parentética «como saben», la noción relacional de «en nuestro Dios», y el marco adverso de ἐν πολλῷ ἀγῶνι. Sin embargo, «cobramos valor» para ἐπαρρησιασάμεθα desplaza ligeramente el foco desde la audacia/franqueza ejercida hacia un proceso interno de ánimo, y «ultrajados» suena algo menos claro y menos idiomático para un registro bíblico general que una formulación más transparente.'
  spanish_quality_summary: El español es claro y digno, pero puede mejorarse en naturalidad y precisión. «Después de haber padecido ya» es aceptable aunque algo pesado; «después de haber sufrido ya» fluye mejor en español general. «Maltratados vergonzosamente» comunica con más claridad el sentido de trato abusivo y deshonroso que «ultrajados». «Tuvimos valor» o «actuamos con valentía» encaja mejor que «cobramos valor» en contexto narrativo y teológico.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός se mantiene como «Dios» y εὐαγγέλιον como «evangelio». La decisión teológica «en nuestro Dios» está bien preservada. La revisión propuesta ajusta estilo y precisión léxica sin afectar el glosario doctrinal.'
  issues:
