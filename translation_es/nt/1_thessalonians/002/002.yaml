  to: Pero después de haber sufrido ya y de haber sido maltratados vergonzosamente[a], como saben, en Filipos, tuvimos valor[b] en nuestro Dios para hablarles el evangelio de Dios, en medio de mucho conflicto[c].
  rationale: 'La revisión conserva el contenido y las decisiones teológicas del POB inglés, pero mejora la legibilidad y la precisión léxica en español: «sufrido» suena más natural que «padecido», «maltratados vergonzosamente» explicita mejor la fuerza de ὑβρισθέντες, y «tuvimos valor» representa mejor ἐπαρρησιασάμεθα que «cobramos valor» sin perder la relación con el infinitivo «hablarles».'
