    issue: «cobramos valor» para ἐπαρρησιασάμεθα
    rationale: Aunque transmite valentía, en español sugiere más bien que reunieron ánimo, mientras que el verbo griego apunta a actuar/hablar con denuedo. «Tuvimos valor» preserva mejor la audacia ejercida y sigue evitando redundancia con «hablarles».
  - severity: medium
    issue: «ultrajados» como texto principal para ὑβρισθέντες
    rationale: Es defendible, pero menos transparente y menos natural para lectores amplios que «maltratados vergonzosamente», que reproduce mejor la mezcla de abuso y deshonra pública documentada en la auditoría inglesa.
  - severity: low
    issue: «padecido» suena algo más elevado y menos natural que «sufrido»
    rationale: «Sufrido» comunica con mayor claridad moderna el valor de προπαθόντες sin pérdida de dignidad.
