source:
  edition: SBLGNT
  text: ἀλλὰ προπαθόντες καὶ ὑβρισθέντες καθὼς οἴδατε ἐν Φιλίπποις ἐπαρρησιασάμεθα ἐν τῷ θεῷ ἡμῶν λαλῆσαι πρὸς ὑμᾶς τὸ εὐαγγέλιον τοῦ θεοῦ ἐν πολλῷ ἀγῶνι.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/002.yaml
  text: But after we had already suffered and been shamefully mistreated[a], as you know, in Philippi[c][b], we were bold in our God to speak the gospel of God to you amid much conflict.
  footnotes:
  - marker: a
    text: Or 'been insulted,' 'been outrageously treated,' or 'been abused.' The Greek verb includes the idea of being treated with insolence or public dishonor.
    reason: lexical_alternative
  - marker: b
    text: Or 'we spoke boldly in our God.' The Greek verb can itself include the act of bold speaking; the translation separates 'were bold' from 'to speak' to reflect the following infinitive.
    reason: lexical_alternative
  - marker: c
    text: Or 'in much struggle' or 'with much opposition.'
    reason: lexical_alternative
