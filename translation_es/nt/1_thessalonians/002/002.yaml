translation:
  language: es
  text: Pero después de haber sufrido ya y de haber sido maltratados vergonzosamente[a], como saben, en Filipos, tuvimos valor[b] en nuestro Dios para hablarles el evangelio de Dios, en medio de mucho conflicto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haber sido insultados», «haber sido tratados de forma ultrajante» o «haber sido abusados». El verbo griego incluye la idea de trato insolente o de deshonra pública.
    reason: lexical_alternative
  - marker: b
    text: O «hablamos con valentía en nuestro Dios». El verbo griego puede incluir por sí mismo el acto de hablar con franqueza; aquí se separa «tuvimos valor» de «hablarles» para reflejar el infinitivo siguiente.
    reason: lexical_alternative
  - marker: c
    text: O «en mucha lucha» o «con mucha oposición».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Introduce un fuerte contraste con lo anterior; «Pero» es natural en español y conserva el valor adversativo sin sobretraducción.
- source_word: προπαθόντες
  english_pob_choice: after we had already suffered
  chosen_spanish: después de haber padecido ya
  alternatives_spanish:
  - habiendo padecido antes
  - después de sufrir previamente
  lexicon: BDAG
  rationale: El prefijo προ- expresa anterioridad respecto de la acción principal; «después de haber padecido ya» comunica esa prioridad sin sonar forzado.
- source_word: ὑβρισθέντες
  english_pob_choice: been shamefully mistreated
  chosen_spanish: haber sido ultrajados
  alternatives_spanish:
  - haber sido insultados
  - haber sido maltratados vergonzosamente
  - haber sido abusados
  lexicon: BDAG
  rationale: «Ultrajados» recoge la idea de trato insolente, deshonroso y públicamente vejatorio, más fuerte que un simple «insultados» y más breve que una expansión explicativa.
- source_word: καθὼς οἴδατε
  english_pob_choice: as you know
  chosen_spanish: como saben
  alternatives_spanish:
  - como ustedes saben
  - tal como saben
  lexicon: BDAG
  rationale: Mantiene la apelación parentética al conocimiento de los tesalonicenses en un español fluido y natural.
- source_word: ἐν Φιλίπποις
  english_pob_choice: in Philippi
  chosen_spanish: en Filipos
  lexicon: BDAG
  rationale: Topónimo transliterado de forma estándar al español.
- source_word: ἐπαρρησιασάμεθα
  english_pob_choice: we were bold
  chosen_spanish: cobramos valor
  alternatives_spanish:
  - hablamos con valentía
  - actuamos con denuedo
  - fuimos osados
  lexicon: BDAG
  rationale: El verbo puede incluir audacia en el hablar; como aquí sigue el infinitivo «hablar», «cobramos valor» evita redundancia y conserva el componente de valentía ante la oposición.
- source_word: ἐν τῷ θεῷ ἡμῶν
  english_pob_choice: in our God
  chosen_spanish: en nuestro Dios
  alternatives_spanish:
  - por nuestro Dios
  - confiando en nuestro Dios
  - con la ayuda de nuestro Dios
  lexicon: BDAG
  rationale: Preserva la preposición y la relación esférica/relacional del griego, sin reducirla a una causalidad instrumental.
- source_word: λαλῆσαι πρὸς ὑμᾶς
  english_pob_choice: to speak ... to you
  chosen_spanish: para hablarles
  alternatives_spanish:
  - para decirles
  - para proclamarles
  lexicon: BDAG
  rationale: «Hablarles» reproduce la simplicidad de λαλέω y el valor direccional de πρός ὑμᾶς con naturalidad en español.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_choice: the gospel of God
  chosen_spanish: el evangelio de Dios
  alternatives_spanish:
  - la buena noticia de Dios
  - el evangelio procedente de Dios
  lexicon: BDAG
  rationale: Conserva la expresión paulina estable y la estructura genitiva del original sin paraphrasear.
- source_word: ἐν πολλῷ ἀγῶνι
  english_pob_choice: amid much conflict
  chosen_spanish: en medio de mucho conflicto
  alternatives_spanish:
  - con mucha lucha
  - en mucha lucha
  - con mucha oposición
  lexicon: BDAG
  rationale: «Conflicto» comunica bien la carga de ἀγών como lucha/oposición activa, y «en medio de» refleja el marco circunstancial.
theological_decisions:
- issue: Valor de ἐν τῷ θεῷ ἡμῶν
  english_pob_reading: Rendered as 'in our God' to preserve the relational/spherical sense of the Greek rather than making God merely the efficient cause.
  chosen_spanish_reading: «en nuestro Dios»
  alternative_spanish_readings:
  - «por nuestro Dios»
  - «confiando en nuestro Dios»
  - «con la ayuda de nuestro Dios»
  rationale: La frase mantiene el ámbito o base de la valentía apostólica sin convertirla en una mera instrumentalidad. El español «en nuestro Dios» conserva esa tensión.
  doctrine_reference: Translation philosophy §3, preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: The latest English revision pass left the verse unchanged, with high agreement and only minor issues flagged. The Spanish draft follows the audited English decisions while rendering the Greek directly and preserving the noted lexical tensions.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «evangelio» para εὐαγγέλιον, conforme al estándar POB en español.
  - Se usa «Filipos» como topónimo español estándar.
  - Se conserva la distinción entre el sufrimiento previo y la valentía posterior, explícita en el participio aoristo y el verbo principal.
  - Se evita traducir ἐν τῷ θεῷ ἡμῶν como una simple causalidad instrumental, para no borrar la ambigüedad relacional del griego.
