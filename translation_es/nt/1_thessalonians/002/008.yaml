translation:
  language: es
  text: Así, anhelándolos de esta manera, nos complacía compartir con ustedes no solo el evangelio de Dios, sino también nuestras propias vidas[a], porque llegaron a ser muy queridos para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestras propias almas» o «nuestros propios seres»; aquí «vidas» expresa que se entregaron personalmente y de manera sacrificial.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: So / In this way
  chosen_spanish: Así
  alternatives_spanish:
  - De esta manera
  - De este modo
  lexicon: BDAG
  rationale: οὕτως introduce la manera en que se desarrolla la acción; «Así» es natural en español y conserva la relación con lo anterior sin volverla causal.
- source_word: ὁμειρόμενοι
  english_pob_choice: longing for you in this way
  chosen_spanish: anhelándoos
  alternatives_spanish:
  - teniendo profundo afecto por ustedes
  - sintiendo un vivo anhelo por ustedes
  - apeteciendo verlos
  lexicon: BDAG
  rationale: El participio raro expresa deseo intenso y afecto personal. «Anhelándoos» conserva la fuerza afectiva y la relación directa con el objeto en una forma verbal compacta y digna; el giro con «de esa manera» refleja el adverbio inicial sin forzar una causalidad.
- source_word: εὐδοκοῦμεν
  english_pob_choice: we were pleased
  chosen_spanish: nos complació
  alternatives_spanish:
  - nos agradó
  - estuvimos dispuestos
  - nos deleitamos
  lexicon: BDAG
  rationale: El verbo expresa agrado voluntario y disposición favorable. En español, una construcción impersonal como «nos complació» comunica bien esa voluntad gozosa en un registro natural y formal.
- source_word: μεταδοῦναι
  english_pob_choice: to share
  chosen_spanish: compartir
  alternatives_spanish:
  - dar participación
  - impartir
  - comunicar
  lexicon: BDAG
  rationale: El verbo sugiere dar parte de algo propio. «Compartir» funciona tanto con «el evangelio de Dios» como con «nuestras propias vidas», y mantiene la idea de participación generosa.
- source_word: τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_choice: the gospel of God
  chosen_spanish: el evangelio de Dios
  alternatives_spanish:
  - las buenas noticias de Dios
  - el evangelio procedente de Dios
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente estable y fiel al uso paulino; el genitivo se conserva de forma directa como «de Dios».
- source_word: τὰς ἑαυτῶν ψυχάς
  english_pob_choice: our own lives
  chosen_spanish: nuestras propias vidas
  alternatives_spanish:
  - nuestras propias almas
  - nuestros propios seres
  - nuestras propias vidas mismas
  lexicon: BDAG
  rationale: ψυχή aquí apunta a vida/persona entregada, no a un «alma» separada en sentido técnico. «Nuestras propias vidas» expresa bien la autoentrega concreta y sacrificial, mientras «propias» conserva el énfasis de ἑαυτῶν.
- source_word: ἀγαπητοὶ ἡμῖν ἐγενήθητε
  english_pob_choice: you had become dear to us
  chosen_spanish: se hicieron queridos para nosotros
  alternatives_spanish:
  - llegaron a ser amados por nosotros
  - se volvieron amados para nosotros
  - llegaron a ser queridos para nosotros
  lexicon: BDAG
  rationale: La combinación de adjetivo predicativo con γίνομαι indica un estado resultante. «Se hicieron queridos para nosotros» preserva el proceso de llegada a esa relación afectiva; evita imponer un matiz doctrinal adicional que «amados» podría sugerir en español.
theological_decisions:
- issue: Sentido de ψυχάς en la auto-descripción apostólica
  english_pob_reading: Rendered as 'our own lives' rather than 'souls'
  chosen_spanish_reading: «nuestras propias vidas»
  alternative_spanish_readings:
  - nuestras propias almas
  - nuestros propios seres
  rationale: El contexto habla de entrega personal y sacrificial, no de una afirmación antropológica sobre la composición del ser humano. «Vidas» comunica la entrega concreta y evita una lectura dualista no exigida por el texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Valor relacional de ἀγαπητοὶ
  english_pob_reading: Rendered relationally as 'dear to us'
  chosen_spanish_reading: «queridos para nosotros»
  alternative_spanish_readings:
  - amados por nosotros
  - amados para nosotros
  rationale: «Queridos» preserva el calor afectivo sin cargar de inmediato el término con resonancias técnicas o litúrgicas que no son centrales aquí. La frase expresa la relación personal que resultó del ministerio apostólico.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción sigue el ajuste del último pase de revisión del inglés al colocar οὕτως con el participio de forma natural, sin convertirlo en causalidad. También conserva la decisión auditada de traducir ψυχάς como una entrega de la vida/persona, no como «alma» en sentido técnico.
  spanish_consistency_notes:
  - Se usa «Dios» de forma directa para θεοῦ, sin máscara litúrgica.
  - Se mantiene un registro bíblico contemporáneo y claro, evitando calcos innecesarios.
  - «Evangelio» se conserva por consistencia paulina y por la decisión auditada del inglés POB.
  - La apertura «Así, anhelándoos de esa manera» refleja la relación entre οὕτως y ὁμειρόμενοι sin crear una subordinación causal falsa.
