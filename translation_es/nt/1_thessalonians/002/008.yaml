revisions:
- from: Así, anhelándoos de esa manera, nos complació compartir con ustedes no solo el evangelio de Dios[a], sino también nuestras propias vidas[b], porque se hicieron queridos para nosotros.
  to: Así, anhelándolos de esta manera, nos complacía compartir con ustedes no solo el evangelio de Dios, sino también nuestras propias vidas[a], porque llegaron a ser muy queridos para nosotros.
  rationale: Se revisa para corregir la mezcla de registros («anhelándoos» → «anhelándolos»), alinear el verbo principal con εὐδοκοῦμεν («nos complacía»), y mejorar la naturalidad de la cláusula final («llegaron a ser muy queridos para nosotros»). Se elimina la nota [a] mal anclada sobre «evangelio de Dios», porque las alternativas del inglés corresponden al participio ὁμειρόμενοι y no requieren nota si no se preservan en el texto revisado; en cambio se conserva la nota léxica pertinente para ψυχάς en «vidas[a]». No se requiere adjudicación adicional porque los ajustes son claros, estilísticos y léxicamente bien documentados por la evidencia dada.
