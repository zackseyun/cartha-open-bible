    issue: '''que examina nuestros corazones'' debilita la conexión léxica con δεδοκιμάσμεθα'
    rationale: El mismo verbo δοκιμάζω aparece al inicio y al final del versículo. El English POB eligió 'approved' / 'tests' para conservar la relación evaluativa. En español, 'aprueba' ... 'prueba' o 'pone a prueba' conserva mejor el vínculo que 'examina'.
  revised_spanish_text: 'Pero, así como hemos sido aprobados por Dios para que se nos confíe el evangelio[a], así hablamos: no como quienes agradan a las personas, sino a Dios, que pone a prueba nuestros corazones.'
