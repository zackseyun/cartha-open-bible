translation:
  language: es
  text: 'Pero, así como hemos sido aprobados por Dios para que se nos confíe el evangelio[a], así hablamos: no como quienes agradan a las personas, sino a Dios, que pone a prueba nuestros corazones.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «no para agradar a las personas, sino para agradar a Dios». El griego es condensado y solo expresa explícitamente «agradando» en la primera mitad del contraste.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεδοκιμάσμεθα
  english_pob_choice: have been approved
  chosen_spanish: hemos sido aprobados
  alternatives_spanish:
  - hemos sido probados y aprobados
  - hemos sido hallados aprobados
  lexicon: BDAG
  rationale: El perfecto pasivo expresa una evaluación ya realizada con efecto vigente. "Hemos sido aprobados" conserva ese resultado sin añadir una idea más interpretativa como "hallados dignos".
- source_word: πιστευθῆναι
  english_pob_choice: to be entrusted with
  chosen_spanish: que se nos confíe
  alternatives_spanish:
  - que se nos encomiende
  - que se nos entregue en confianza
  lexicon: BDAG
  rationale: En esta construcción pasiva con τὸ εὐαγγέλιον, el sentido no es creer el evangelio sino ser depositarios de él. "Se nos confíe" comunica de forma natural y precisa esa comisión.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  lexicon: BDAG
  rationale: '"Evangelio" es el equivalente establecido en el contexto paulino y preserva su densidad teológica mejor que una paráfrasis más general.'
- source_word: οὕτως λαλοῦμεν
  english_pob_choice: so we speak
  chosen_spanish: así hablamos
  alternatives_spanish:
  - de este modo hablamos
  - por eso hablamos
  lexicon: BDAG
  rationale: '"Así hablamos" reproduce con naturalidad la conexión lógica con la aprobación y la comisión recibidas, sin forzar la sintaxis española.'
- source_word: οὐχ ὡς ἀνθρώποις ἀρέσκοντες
  english_pob_choice: not as pleasing people
  chosen_spanish: no como quienes agradan a las personas
  alternatives_spanish:
  - no para agradar a las personas
  - no como los que buscan agradar a las personas
  lexicon: BDAG
  rationale: La construcción participial griega se conserva mejor con una forma sustantivada en español. "Agradan a las personas" mantiene el contraste sin perder claridad.
- source_word: ἀλλὰ θεῷ
  english_pob_choice: but God
  chosen_spanish: sino a Dios
  alternatives_spanish:
  - sino Dios
  - sino para agradar a Dios
  lexicon: BDAG
  rationale: 'El griego es elíptico: en la segunda mitad se sobreentiende el verbo de complacencia. En español, "sino a Dios" conserva la fuerza contrastiva y deja implícito el sentido de agradar a Dios, sin recargar la frase principal.'
- source_word: τῷ δοκιμάζοντι
  english_pob_choice: who tests
  chosen_spanish: que examina
  alternatives_spanish:
  - que prueba
  - que escruta
  lexicon: BDAG
  rationale: '"Examina" comunica la acción continua de Dios sobre el interior humano y enlaza bien con el primer verbo de evaluación, sin endurecer el tono en exceso.'
- source_word: τὰς καρδίας ἡμῶν
  english_pob_choice: our hearts
  chosen_spanish: nuestros corazones
  alternatives_spanish:
  - nuestro interior
  - nuestras vidas interiores
  lexicon: BDAG
  rationale: '"Corazones" conserva el lenguaje bíblico antropológico tradicional y evita reemplazarlo por una explicación psicológica moderna.'
theological_decisions:
- issue: Mantener la elipsis del contraste entre agradar a personas y agradar a Dios
  english_pob_reading: 'Preserve the elliptical contrast in the main text: ''not as pleasing people, but God'''
  chosen_spanish_reading: 'Conservar el contraste elíptico en la frase principal: ''no como quienes agradan a las personas, sino a Dios'''
  alternative_spanish_readings:
  - no para agradar a las personas, sino para agradar a Dios
  - no como quienes agradan a las personas, sino como quienes agradan a Dios
  rationale: El griego no repite explícitamente el participio en la segunda mitad. La redacción española mantiene esa compresión, pero el sentido de agradar a Dios queda suficientemente claro por el contexto y por la preposición con dativo.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que destaca la elipsis en la segunda mitad del contraste y la entiende como «but [as pleasing] God». La versión española conserva esa compresión y la hace natural con «sino a Dios», sin convertirla en paráfrasis expansiva.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando el texto fuente lo requiera explícitamente; aquí no aparece.
  - Se prefirió «evangelio» por coherencia paulina y por el valor técnico del término.
  - Se mantuvo el léxico bíblico antropológico «corazones» para τὰς καρδίας.
  - La voz pasiva en «se nos confíe» evita trasladar al español un sujeto humano implícito que el griego no expresa.
