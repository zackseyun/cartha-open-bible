base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/004.yaml
  text: But just as we have been approved by God to be entrusted with the gospel[a], so we speak—not as pleasing people, but God, who tests our hearts.
  footnotes:
  - marker: a
    text: Or, more idiomatically, 'not to please people, but to please God.' The Greek is compressed, explicitly stating 'pleasing' only in the first half of the contrast.
    reason: lexical_alternative
