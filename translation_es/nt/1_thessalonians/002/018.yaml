translation:
  language: es
  text: Porque quisimos ir a verlos—yo, Pablo, una y otra vez[a]—pero Satanás nos impidió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una vez y dos»; es un modismo que significa «más de una vez» o «repetidas veces».
    reason: lexical_alternative
lexical_decisions:
- source_word: διότι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón de la afirmación anterior. «Porque» es la equivalencia más natural y directa en español, y conserva el valor explicativo sin añadir matices inferenciales que el griego no exige.
- source_word: ἠθελήσαμεν
  english_pob_choice: we wanted
  chosen_spanish: quisimos
  alternatives_spanish:
  - queríamos
  - deseamos
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo. En español, el aoristo de resumen se comunica bien con «quisimos», que mantiene el impulso volitivo concreto de la acción sin sonar forzado.
- source_word: ἐλθεῖν πρὸς ὑμᾶς
  english_pob_choice: to come to you
  chosen_spanish: ir a ustedes
  alternatives_spanish:
  - venir a ustedes
  - ir hacia ustedes
  - volver a ustedes
  lexicon: BDAG
  rationale: El griego enfatiza el movimiento hacia los destinatarios. «Ir a ustedes» es natural en español y preserva esa orientación sin introducir explícitamente «volver», que depende más del contexto amplio que de la frase misma.
- source_word: ἐγὼ μὲν Παῦλος
  english_pob_choice: I, Paul,
  chosen_spanish: yo, Pablo,
  alternatives_spanish:
  - yo mismo, Pablo,
  - yo, en efecto, Pablo,
  lexicon: BDAG
  rationale: La frase destaca a Pablo dentro del plural «nosotros». La apposición «yo, Pablo,» conserva ese énfasis de contraste sin forzar una traducción artificial de μέν.
- source_word: καὶ ἅπαξ καὶ δίς
  english_pob_choice: again and again
  chosen_spanish: una y otra vez
  alternatives_spanish:
  - más de una vez
  - repetidas veces
  lexicon: BDAG
  rationale: La expresión es un modismo que literalmente dice «una vez y dos». En español, «una y otra vez» comunica la repetición de manera natural y conserva el valor idiomático sin volver la frase opaca.
- source_word: ἐνέκοψεν
  english_pob_choice: hindered
  chosen_spanish: estorbó
  alternatives_spanish:
  - impidió
  - obstaculizó
  - truncó
  lexicon: BDAG
  rationale: ἐγκόπτω transmite la idea de poner un freno o interrumpir el avance. «Estorbó» es una forma clara y sobria en español que mantiene la noción de impedimento sin exagerar hasta la imposibilidad absoluta.
- source_word: ὁ Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se conserva el nombre/título personal tradicional del Nuevo Testamento. «Satanás» es el equivalente reconocido en español y preserva la referencia personal del texto.
theological_decisions:
- issue: Agencia de Satanás en el impedimento del viaje
  english_pob_reading: but Satan hindered us
  chosen_spanish_reading: pero Satanás nos estorbó
  alternative_spanish_readings:
  - pero Satanás nos impidió
  - pero el Adversario nos estorbó
  rationale: El texto atribuye de forma directa la obstrucción a Satanás. La traducción conserva esa agencia personal sin diluirla en una circunstancia impersonal ni intensificarla más allá del alcance léxico de ἐνέκοψεν.
  doctrine_reference: Affirmations; preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: 'El texto base inglés pasó por una revisión que ajustó la razón causal a «Because» y el modismo a «again and again». Esta versión española sigue ese mismo criterio de precisión: usa una causal directa para διότι y un modismo natural equivalente para καὶ ἅπαξ καὶ δίς, evitando una traducción rígida que oscurezca el sentido.'
  spanish_consistency_notes:
  - Se mantiene «Satanás» para ὁ Σατανᾶς, en continuidad con la terminología POB habitual.
  - Se prefiere «quisimos» para el aoristo volitivo, con tono claro y sobrio.
  - «A ustedes» conserva el registro latinoamericano neutral y evita ambigüedad formal excesiva.
  - La nota al pie preserva la tensión entre el valor literal y el sentido idiomático del griego.
