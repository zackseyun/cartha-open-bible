review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura retórica general, la conexión explicativa de γάρ, la identificación enfática de «ustedes» y el sentido escatológico de παρουσίᾳ como «venida». Sin embargo, falla en un punto léxico central: στέφανος καυχήσεως no significa «corona de gloria», sino algo como «corona de jactancia/gloria en que nos gloriamos». Ese cambio reemplaza una idea paulina explícita por otra distinta. Además, «¿No son ustedes precisamente eso?» introduce «eso», que no está en el griego y suena menos natural que una pregunta retórica más directa.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «corona de gloria» suaviza en exceso el texto y «¿No son ustedes precisamente eso?» resulta algo artificioso. Una redacción más fiel y más natural sería: «Porque ¿cuál es nuestra esperanza, o gozo, o corona de jactancia[a]? ¿No son ustedes, en efecto, delante de nuestro Señor Jesús en su venida?»'
  glossary_alignment: Alinea bien con «Señor Jesús» y «venida» para παρουσία, con nota léxica. No hay conflictos con Yahvé/Mesías. El principal desajuste es sustituir la decisión auditada «crown of boasting» por «corona de gloria», contrariando la justificación léxica y teológica del POB.
  issues:
  - severity: high
    issue: στέφανος καυχήσεως fue traducido como «corona de gloria»
    rationale: καυχήσεως corresponde a «jactancia / gloriarse / motivo de orgullo», no a «gloria». La versión española altera el significado y borra una decisión léxica explícita del audit trail inglés.
  - severity: medium
    issue: La frase «¿No son ustedes precisamente eso?» añade «eso» sin base textual
    rationale: Aunque intenta hacer natural la identificación retórica, el griego simplemente enfatiza «ustedes». En español puede mantenerse la fuerza afirmativa sin añadir un pronombre demostrativo interpretativo.
  - severity: low
    issue: La puntuación puede acercarse mejor al inciso del griego
    rationale: El original marca un inciso parentético con rayas. No es obligatorio reproducirlo exactamente, pero conviene reflejar mejor la interrupción retórica.
  revised_spanish_text: Porque ¿cuál es nuestra esperanza, o gozo, o corona de jactancia[a]—o no son también ustedes— delante de nuestro Señor Jesús en su venida?
  revised_footnotes:
  - marker: a
    text: O «corona para gloriarse». El griego puede expresar una corona caracterizada por la jactancia o el motivo de gloriarse; aquí Pablo se refiere a los creyentes como aquello en lo que se gloriará delante del Señor Jesús. παρουσίᾳ también puede traducirse «presencia» o «llegada», pero en este contexto se refiere a la venida futura del Señor Jesús.
    reason: lexical_alternative
  revision_rationale: Se corrige el error principal en καυχήσεως, restituyendo la idea de «jactancia/gloriarse» que el inglés auditado preservó. También se elimina «eso», que no está en el original, y se refleja mejor la forma parentética de la pregunta retórica. Se mantiene «venida» para παρουσία con alternativas en nota, según el audit trail.
