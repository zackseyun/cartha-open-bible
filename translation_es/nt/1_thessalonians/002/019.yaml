revisions:
- from: Porque ¿cuál es nuestra esperanza, o gozo, o corona de gloria[a]? ¿No son ustedes precisamente eso, delante de nuestro Señor Jesús, en su venida?
  to: Porque ¿cuál es nuestra esperanza, o gozo, o corona de jactancia[a]—o no son también ustedes— delante de nuestro Señor Jesús en su venida?
  rationale: Se corrige el error principal en καυχήσεως, restituyendo la idea de «jactancia/gloriarse» que el inglés auditado preservó. También se elimina «eso», que no está en el original, y se refleja mejor la forma parentética de la pregunta retórica. Se mantiene «venida» para παρουσία con alternativas en nota, según el audit trail.
