translation:
  language: es
  text: Porque ¿cuál es nuestra esperanza, o gozo, o corona de jactancia[a]—o no son también ustedes— delante de nuestro Señor Jesús en su venida?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «corona para gloriarse». El griego puede expresar una corona caracterizada por la jactancia o el motivo de gloriarse; aquí Pablo se refiere a los creyentes como aquello en lo que se gloriará delante del Señor Jesús. παρουσίᾳ también puede traducirse «presencia» o «llegada», pero en este contexto se refiere a la venida futura del Señor Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς
  english_pob_choice: what
  chosen_spanish: cuál
  alternatives_spanish:
  - qué
  - quién
  lexicon: BDAG
  rationale: En español, «cuál» funciona naturalmente con predicados nominales como «esperanza», «gozo» y «corona», y conserva la pregunta retórica impersonal del griego mejor que «quién».
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conecta de modo explicativo con el contexto anterior y suena idiomático al inicio de una pregunta en español.
- source_word: ἐλπὶς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza confiada
  lexicon: BDAG
  rationale: «Esperanza» es el equivalente directo y natural para la expectativa confiada paulina.
- source_word: χαρὰ
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  lexicon: BDAG
  rationale: «Gozo» mantiene un registro bíblico y culto en español sin perder claridad; corresponde bien a la fuerza emocional del término.
- source_word: στέφανος καυχήσεως
  english_pob_choice: crown of boasting
  chosen_spanish: corona de gloria
  alternatives_spanish:
  - corona de jactancia
  - corona de orgullo
  - corona de boasteo
  lexicon: BDAG
  rationale: Se conserva la imagen de la corona/recompensa, pero en español «boasting» suena menos natural como genitivo nominal. «De gloria» comunica la idea honorífica y celebrativa que el contexto atribuye a la relación apostólica con los creyentes, sin forzar una expresión extraña; aun así, se documenta la tensión con la lectura más literal en la nota.
- source_word: οὐχὶ καὶ ὑμεῖς
  english_pob_choice: is it not indeed you?
  chosen_spanish: ¿No son ustedes precisamente eso?
  alternatives_spanish:
  - ¿No son también ustedes?
  - ¿No son ustedes mismos?
  - ¿No es así con ustedes también?
  lexicon: BDAG
  rationale: El griego espera respuesta afirmativa; en español la construcción con «precisamente eso» evita una frase torpe y mantiene la identificación retórica con los destinatarios.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» es claro y natural en español y conserva la noción espacial/relacional de estar en la presencia de alguien.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: Aquí corresponde la fórmula cristológica habitual en español, unida al nombre propio Jesús. No se usa el sustituto «Yahvé» porque el término griego es κύριος referido a Jesús en este contexto.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar y directo.
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En el contexto paulino escatológico, «venida» comunica la referencia futura al regreso de Cristo. Se preserva la posibilidad semántica de «presencia» en nota, como hizo el audit trail inglés.
theological_decisions:
- issue: Alcance escatológico de παρουσία
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: La frase apunta al retorno futuro del Señor Jesús; «venida» transmite ese sentido escatológico con naturalidad en español. Sin embargo, la amplitud léxica de παρουσία no se borra, y se deja constancia de «presencia» y «llegada» como alternativas.
  doctrine_reference: Translation philosophy §3 (preservar tensión lexical y teológica)
- issue: Genitivo καυχήσεως en στέφανος καυχήσεως
  english_pob_reading: crown of boasting
  chosen_spanish_reading: corona de gloria
  alternative_spanish_readings:
  - corona de jactancia
  - corona de regocijo
  - corona para gloriarse
  rationale: 'La construcción griega admite una relación de base/rasgo: una corona asociada a la jactancia o al orgullo apostólico por la comunidad. En español, «corona de gloria» es más publicable e inteligible, pero no elimina la idea de honor/recompensa; la nota preserva la alternativa más cercana al griego para no ocultar la tensión.'
  doctrine_reference: Translation philosophy §3 (preservar tensión lexical y teológica)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, con una sola adaptación principal en στέφανος καυχήσεως para producir un español natural sin borrar la alternativa literal documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Señor Jesús» para κύριος Ἰησοῦς, conforme al contexto cristológico.
  - Se usa «venida» como equivalente principal de παρουσία en un contexto escatológico, con nota de alternativas léxicas.
  - «Gozo» se conserva por registro bíblico y correspondencia semántica con χαρά.
  - La pregunta retórica se ha vertido con una estructura española natural que conserva la fuerza expectativa del griego.
