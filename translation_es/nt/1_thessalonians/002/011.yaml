translation:
  language: es
  text: tal como saben[a], tratamos a cada uno de ustedes como un padre trata a sus propios hijos
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «tal como saben cómo a cada uno de ustedes, como un padre a sus propios hijos»; la cláusula griega es elíptica y depende de la oración circundante para completar su sentido verbal.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justamente como
  lexicon: BDAG
  rationale: La comparación introduce un paralelo apelando a lo que los tesalonicenses ya saben. «Tal como» conserva la fuerza comparativa de manera natural en español actual.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - ustedes saben
  - conocen
  lexicon: BDAG
  rationale: οἶδα suele tener sentido presente; en español, el presente indicativo expresa mejor ese valor de conocimiento compartido. Se omite el pronombre por naturalidad, aunque queda explícito en el contexto.
- source_word: ἕνα ἕκαστον ὑμῶν
  english_pob_choice: each one of you
  chosen_spanish: a cada uno de ustedes
  alternatives_spanish:
  - a cada uno de vosotros
  - a cada uno de ustedes individualmente
  lexicon: BDAG
  rationale: La expresión griega intensifica la distribución individual. «A cada uno de ustedes» preserva esa atención personal y suena natural en español neutro.
- source_word: ὡς πατὴρ τέκνα ἑαυτοῦ
  english_pob_choice: as a father with his own children
  chosen_spanish: como un padre a sus propios hijos
  alternatives_spanish:
  - como un padre con sus propios hijos
  - como un padre a sus hijos
  lexicon: BDAG
  rationale: La similitudo paternal se conserva con «como un padre». «Sus propios hijos» mantiene el matiz reflexivo de ἑαυτοῦ y la idea de relación personal, no genérica.
- source_word: '[elliptical verbal idea from context]'
  english_pob_choice: we dealt with
  chosen_spanish: tratamos
  alternatives_spanish:
  - nos comportamos con
  - nos ocupamos de
  lexicon: BDAG
  rationale: El griego es elíptico y depende del contexto amplio. «Tratamos» permite suplir la acción pastoral sin forzar un único verbo demasiado específico; mantiene la apertura del sentido que la versión inglesa auditada también preserva.
theological_decisions:
- issue: Cómo suplir la elipsis verbal sin cerrar indebidamente el sentido
  english_pob_reading: 'Use a broad supplied verb: ''we dealt with each one of you'''
  chosen_spanish_reading: 'Usar un verbo amplio: «tratamos a cada uno de ustedes»'
  alternative_spanish_readings:
  - «exhortamos a cada uno de ustedes»
  - dejar la cláusula más fragmentaria
  rationale: La sintaxis griega no es completa por sí sola y depende del contexto inmediato. Un verbo amplio evita introducir una acción pastoral única que podría estrechar indebidamente el alcance del pasaje, que en el contexto incluye varias acciones ministeriales.
  doctrine_reference: Principios de traducción POB §1, §3, §6
translation_notes:
  revision_awareness: El contexto de auditoría indica alta concordancia y ningún cambio necesario en la revisión más reciente; por eso se mantiene una solución breve, natural y fiel a la elipsis del griego.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y digno.
  - Se evita un calco rígido de la sintaxis griega, pero sin añadir contenido no sustentado por el texto.
  - Se conserva el énfasis distributivo de «cada uno» y el matiz relacional de «sus propios hijos».
