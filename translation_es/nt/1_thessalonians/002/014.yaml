  rationale: Se corrigió la relación agentiva de ὑπό con «de parte de» en ambos miembros del paralelo, y se ajustó «en Mesías Jesús» a «en el Mesías Jesús» para mejorar la naturalidad española sin perder la decisión doctrinal de traducir Χριστός como título.
