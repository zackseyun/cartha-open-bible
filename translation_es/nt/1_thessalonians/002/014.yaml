translation:
  language: es
  text: Porque ustedes llegaron a ser imitadores[a], hermanos, de las iglesias de Dios que están en Judea, en el Mesías Jesús, pues ustedes también padecieron las mismas cosas de parte de sus propios compatriotas[c], así como ellos de parte de los judíos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo Jesús». Se traduce Χριστός como «Mesías» aquí para preservar su sentido.
    reason: alternative_reading
  - marker: b
    text: O «los judeanos». El griego Ἰουδαίων puede significar «judíos» o «judeanos» según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «sus propios paisanos».
    reason: alternative_reading
lexical_decisions:
- source_word: μιμηταὶ ἐγενήθητε
  english_pob_choice: became imitators
  chosen_spanish: llegaron a ser imitadores
  alternatives_spanish:
  - se hicieron imitadores
  - vinieron a ser imitadores
  lexicon: BDAG
  rationale: μιμηταί expresa una imitación real y reconocible; ἐγενήθητε añade la idea de llegar a ser, no solo de estar. «Llegaron a ser imitadores» conserva ambas nociones en un español natural.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanas y hermanos
  - hermanos y hermanas
  lexicon: BDAG
  rationale: El vocativo plural masculino funciona como apelación congregacional. «Hermanos» mantiene la forma directa y es idiomático en español eclesial, sin forzar una expansión que el griego no explicita.
- source_word: ἐκκλησιῶν τοῦ θεοῦ
  english_pob_choice: churches of God
  chosen_spanish: las iglesias de Dios
  alternatives_spanish:
  - las congregaciones de Dios
  - las asambleas de Dios
  lexicon: BDAG
  rationale: «Iglesias» es la equivalencia más natural en el registro paulino; «de Dios» conserva el genitivo posesivo. «Congregaciones» o «asambleas» serían posibles, pero menos habituales aquí.
- source_word: τῶν οὐσῶν ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: that are in Judea
  chosen_spanish: que están en Judea
  alternatives_spanish:
  - que se hallan en Judea
  - que viven en Judea
  lexicon: BDAG
  rationale: El participio presente funciona descriptivamente y localiza a las iglesias geográficamente. «Que están en Judea» es claro y suficientemente literal.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva «Mesías» para Χριστός según la convención POB, manteniendo el valor titular y el enlace semántico con la promesa mesiánica. «En Mesías Jesús» suena inusual, pero es transparente y auditivamente fiel; «en Cristo Jesús» sería la alternativa más tradicional.
- source_word: τὰ αὐτὰ ἐπάθετε
  english_pob_choice: suffered the same things
  chosen_spanish: padecieron las mismas cosas
  alternatives_spanish:
  - sufrieron lo mismo
  - experimentaron las mismas cosas
  lexicon: BDAG
  rationale: πάσχω abarca padecer/sufrir. «Padecieron las mismas cosas» reproduce el paralelismo con el contexto y mantiene la repetición de «las mismas cosas» sin suavizar el dolor implicado.
- source_word: τῶν ἰδίων συμφυλετῶν
  english_pob_choice: your own countrymen
  chosen_spanish: sus propios compatriotas
  alternatives_spanish:
  - sus propios paisanos
  - sus propios connacionales
  - sus propios compatriotas
  lexicon: BDAG
  rationale: συμφυλετῶν apunta a personas del mismo pueblo/grupo étnico. «Compatriotas» recoge bien esa pertenencia compartida en español; «sus propios» conserva el énfasis de ἰδίων. «Paisanos» es más regional y menos neutral.
- source_word: τῶν Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: BDAG
  rationale: En este contexto, el contraste funciona con un uso étnico-religioso convencional. «Los judíos» es la lectura más directa y natural; no se expande ni se universaliza el referentе.
theological_decisions:
- issue: Rendición de Χριστός como título mesiánico
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La guía POB prioriza «Mesías» cuando Χριστός conserva fuerza titular. Aquí la frase es una designación cristológica, no un nombre fijo que obligue a «Cristo».
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός) y Translation philosophy §2'
- issue: Alcance de «los judíos» en el contraste persecutorio
  english_pob_reading: Retain 'the Jews' as the direct rendering of τῶν Ἰουδαίων without expanding or universalizing the referent
  chosen_spanish_reading: Mantener «los judíos» como traducción directa sin convertirlo en una categoría universal
  alternative_spanish_readings:
  - los judeanos
  rationale: El texto compara a los perseguidores de Tesalónica con los que persiguieron a las iglesias de Judea. La traducción conserva la forma léxica y deja la tensión interpretativa al lector y a las notas, sin suavizarla.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Original-language primacy'
translation_notes:
  revision_awareness: El audit trail inglés muestra una oscilación controlada entre «Messiah Jesus» y «Christ Jesus»; la última restauración doctrinal favorece «Messiah», por lo que se sigue esa decisión en español con «Mesías». También se registra una revisión estilística desde «your own fellow countrymen» a «your own countrymen»; en español se optó por «sus propios compatriotas» para mantener concisión y fuerza semántica.
  spanish_consistency_notes:
  - Se mantiene «Mesías» como renderización base de Χριστός en el texto principal, conforme a la política POB.
  - Se usa «iglesias» para ἐκκλησίαι por naturalidad en un contexto paulino.
  - «Compatriotas» se eligió por fidelidad al vínculo de pueblo/grupo que expresa συμφυλετῶν, evitando un matiz regional demasiado estrecho.
  - «Los judíos» se conserva en el texto principal sin expandir el referente; la nota ofrece la alternativa «judeanos».
