    rationale: 'En el griego, ὑπό + genitivo marca a los agentes de la acción sufrida: padecieron algo de parte de sus propios compatriotas, así como ellos de parte de los judíos. «A causa de» desplaza el énfasis desde los perpetradores hacia una causa abstracta.'
  - severity: low
