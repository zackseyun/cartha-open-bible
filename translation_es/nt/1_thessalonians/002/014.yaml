    rationale: 'Aunque sigue de cerca la secuencia griega y la política de traducir Χριστός como «Mesías», en español el título normalmente requiere artículo en este tipo de sintagma: «en el Mesías Jesús». Esto conserva el valor titular con mejor legibilidad.'
