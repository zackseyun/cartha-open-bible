  text: ὑμεῖς γὰρ μιμηταὶ ἐγενήθητε, ἀδελφοί, τῶν ἐκκλησιῶν τοῦ θεοῦ τῶν οὐσῶν ἐν τῇ Ἰουδαίᾳ ἐν Χριστῷ Ἰησοῦ, ὅτι τὰ αὐτὰ ἐπάθετε καὶ ὑμεῖς ὑπὸ τῶν ἰδίων συμφυλετῶν καθὼς καὶ αὐτοὶ ὑπὸ τῶν Ἰουδαίων
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/002/014.yaml
  text: For you became imitators[a], brothers, of the churches of God that are in Judea in Messiah Jesus, because you also suffered the same things from your own countrymen[c][b], just as they did from the Jews.
  footnotes:
  - marker: a
    text: Or 'Christ Jesus.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Or 'the Judeans.' The Greek Ἰουδαίων can denote either Jews or Judeans depending on context.
    reason: lexical_alternative
  - marker: c
    text: Or 'your own fellow countrymen'.
    reason: previous_rendering
