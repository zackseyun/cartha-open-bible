translation:
  language: es
  text: Porque nunca vinimos con discurso halagador[a], como ustedes saben, ni con pretexto de avaricia[b]—Dios es testigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con adulación»; literalmente, «en una palabra de adulación».
    reason: lexical_alternative
  - marker: b
    text: O «con un velo para la avaricia» o «con una apariencia de codicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὔτε γάρ ποτε
  english_pob_choice: For we never
  chosen_spanish: Porque nunca nos presentamos
  alternatives_spanish:
  - Porque jamás nos presentamos
  - Porque nunca llegamos a estar
  lexicon: BDAG
  rationale: γάρ se expresa naturalmente como «Porque» para enlazar la defensa con el contexto anterior. ποτέ con οὔτε intensifica la negación temporal; «nunca» la comunica bien en español. Para ἐγενήθημεν, «nos presentamos» refleja el modo en que se mostraron o condujeron entre los tesalonicenses sin forzar un valor ontológico de «llegar a ser».
- source_word: ἐν λόγῳ κολακείας
  english_pob_choice: with flattering speech
  chosen_spanish: con palabras de adulación
  alternatives_spanish:
  - con adulación
  - con discurso halagador
  - con una palabra de adulación
  lexicon: BDAG
  rationale: λόγος aquí apunta a habla/discurso, no a una sola «palabra»; por eso se pluraliza naturalmente como «palabras» o se vierte como «discurso». κολακεία es «adulación/halago». «Palabras de adulación» conserva el sentido instrumental de ἐν y suena natural en español.
- source_word: ἐγενήθημεν
  english_pob_choice: came
  chosen_spanish: nos presentamos
  alternatives_spanish:
  - vinimos a ser
  - nos condujimos
  - fuimos hallados
  lexicon: BDAG
  rationale: En este contexto missionario, el verbo describe la conducta o el modo en que se manifestaron entre ellos. «Nos presentamos» transmite esa idea relacional y pública sin sonar mecánico ni debilitar la fuerza de la afirmación.
- source_word: καθὼς οἴδατε
  english_pob_choice: as you know
  chosen_spanish: como ustedes saben
  alternatives_spanish:
  - tal como ustedes saben
  - como bien saben
  lexicon: BDAG
  rationale: Es una apelación directa al conocimiento de los destinatarios; «como ustedes saben» es claro, natural y mantiene el valor evidencial.
- source_word: ἐν προφάσει πλεονεξίας
  english_pob_choice: with a pretext for greed
  chosen_spanish: con pretexto de avaricia
  alternatives_spanish:
  - con un pretexto para la avaricia
  - con apariencia de codicia
  - con una excusa de codicia
  lexicon: BDAG
  rationale: πρόφασις es «pretexto» o «pretexto/apariencia»; πλεονεξία es literalmente «avaricia/codicia». «Avaricia» preserva la fuerza del término con un registro bíblico claro en español, sin suavizarlo a una noción más vaga.
- source_word: θεὸς μάρτυς
  english_pob_choice: God is witness
  chosen_spanish: Dios es testigo
  alternatives_spanish:
  - Dios es el testigo
  - Dios es mi testigo
  lexicon: BDAG
  rationale: La construcción griega carece de posesivo explícito; «Dios es testigo» reproduce la solemnidad y brevedad del juramento sin añadir «nuestro» o «mi».
theological_decisions:
- issue: Alcance de la negación moral en el versículo
  english_pob_reading: The verse denies both flattery in speech and greed concealed under a pretext, without expanding into broader doctrinal claims about ministry.
  chosen_spanish_reading: El versículo niega tanto la adulación en el habla como la avaricia encubierta bajo un pretexto, sin ampliar el sentido a una condena general de toda retórica o a una reducción exclusiva al dinero.
  alternative_spanish_readings:
  - Una condena general de toda ornamentación retórica
  - Una referencia exclusivamente a explotación económica
  rationale: 'El griego nombra dos abusos concretos: κολακεία y πλεονεξία. La traducción conserva ambos sin diluirlos ni exagerarlos. «Avaricia» puede incluir ganancias materiales, pero el texto no obliga a limitarlo solo a dinero.'
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el pasaje muestra alto acuerdo entre revisores y no requiere ajuste adicional en esta entrega.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «avaricia» para πλεονεξία, una opción que conserva la fuerza semántica de codicia/afán de poseer.
  - La frase «Dios es testigo» preserva la fórmula solemne y evita añadir posesivos no presentes en el griego.
  - «Palabras de adulación» intenta equilibrar la literalidad de λόγος con español natural; la nota a conserva la alternativa más cercana al giro griego.
