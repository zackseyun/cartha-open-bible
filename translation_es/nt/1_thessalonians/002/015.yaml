  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Señor Jesús», «Dios», «profetas». No hay conflictos con los glosarios principales. La única decisión léxica mejorable es ἐναντίων, que debe sonar más claramente a oposición hacia personas: «hostiles a todas las personas» o «opuestos a todas las personas», mejor que «contrarios a todos».'
