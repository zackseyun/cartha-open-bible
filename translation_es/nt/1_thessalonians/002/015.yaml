translation:
  language: es
  text: que también mataron al Señor Jesús y a los profetas[a], y nos expulsaron[b], y no agradan a Dios, y son hostiles a todas las personas[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pusieron a muerte al Señor Jesús».
    reason: lexical_alternative
  - marker: b
    text: O «nos echaron»; el verbo es más específico que la idea general de persecución.
    reason: lexical_alternative
  - marker: c
    text: La descripción continúa gramaticalmente al grupo identificado en el versículo anterior; no debe leerse como una afirmación general sobre todos los judíos en todo tiempo y lugar.
    reason: cultural_note
lexical_decisions:
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: BDAG
  rationale: En este contexto cristológico, κύριος funciona como título para Jesús. «Señor» es la equivalencia natural y estable en español para ese uso, sin perder la referencia titular.
- source_word: ἀποκτεινάντων
  english_pob_choice: killed
  chosen_spanish: mataron
  alternatives_spanish:
  - pusieron a muerte
  - asesinaron
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción de dar muerte. «Mataron» reproduce la fuerza verbal de forma directa y natural. «Pusieron a muerte» es posible, pero suena más formulado; «asesinaron» añade una intención moral no explicitada por el verbo.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: convención estándar
  rationale: Nombre propio transliterado según la forma española establecida.
- source_word: προφήτας
  english_pob_choice: the prophets
  chosen_spanish: los profetas
  alternatives_spanish:
  - profetas
  lexicon: BDAG
  rationale: 'Se conserva el artículo porque el griego presenta un grupo identificado: «los profetas». En español mantiene mejor la referencia a la línea reconocible de profetas de Dios.'
- source_word: ἐκδιωξάντων
  english_pob_choice: drove us out
  chosen_spanish: nos expulsaron
  alternatives_spanish:
  - nos echaron
  - nos persiguieron
  lexicon: BDAG
  rationale: El verbo indica expulsar o sacar fuera con fuerza. «Nos expulsaron» preserva mejor la concreción del verbo que «nos persiguieron», que sería más general. «Nos echaron» es más coloquial.
- source_word: θεῷ μὴ ἀρεσκόντων
  english_pob_choice: are not pleasing to God
  chosen_spanish: no agradan a Dios
  alternatives_spanish:
  - no son agradables a Dios
  - no complacen a Dios
  lexicon: BDAG
  rationale: El participio presente describe una cualidad continua. «No agradan a Dios» reproduce bien esa fuerza descriptiva en español y evita una formulación demasiado literal o pesada.
- source_word: πᾶσιν ἀνθρώποις ἐναντίων
  english_pob_choice: are hostile to all people
  chosen_spanish: son contrarios a todos
  alternatives_spanish:
  - son hostiles a todos los seres humanos
  - se oponen a toda la gente
  lexicon: BDAG
  rationale: ἐναντίος expresa oposición/hostilidad. «Son contrarios a todos» conserva la idea de oposición en español sin añadir una carga más fuerte de lo que el griego exige. «Hostiles» es posible, pero en español suena más marcado y menos flexible en este encadenamiento.
- source_word: τῶν ... ἀποκτεινάντων ... ἐκδιωξάντων ... ἀρεσκόντων ... ἐναντίων
  english_pob_choice: who also killed ... and drove us out ... are not pleasing ... and are hostile ...
  chosen_spanish: que también mataron ... y nos expulsaron ... no agradan ... y son contrarios ...
  alternatives_spanish:
  - los que también mataron ... y nos expulsaron ... y no agradan ... y son contrarios ...
  - que mataron ... y nos expulsaron ... no agradan ... y se oponen ...
  lexicon: gramática griega
  rationale: La cadena de participios en genitivo continúa la descripción del grupo del versículo anterior. En español, una relativa con «que» transmite mejor esa dependencia sintáctica que una enumeración plana.
- source_word: καὶ
  english_pob_choice: also / and
  chosen_spanish: también / y
  alternatives_spanish:
  - además / e
  lexicon: BDAG
  rationale: «También» marca la adición inicial dentro de la acusación; los demás «y» mantienen el encadenamiento acumulativo del griego sin sobrecargar el ritmo.
theological_decisions:
- issue: Alcance de la descripción del grupo acusado
  english_pob_reading: The verse continues Paul's description of 'the Jews' from the previous verse without expanding it into a timeless statement about all Jewish people everywhere.
  chosen_spanish_reading: El versículo continúa la descripción del grupo referido en el versículo anterior, sin convertirla en una afirmación universal sobre todos los judíos de todos los tiempos y lugares.
  alternative_spanish_readings:
  - Una condena universal de todos los judíos en cualquier época
  - Una generalización étnica permanente
  rationale: La sintaxis griega enlaza directamente esta cláusula con el antecedente inmediato. La traducción conserva esa relación con una relativa y evita añadir universalización que el texto no explicita. Esto preserva la tensión textual y la responsabilidad histórica del pasaje.
  doctrine_reference: Mantener la delimitación contextual del referente; no ampliar el alcance del texto más allá de su antecedente inmediato.
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el control cruzado reporta alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto original lo exige; aquí no aparece.
  - «Señor» se conserva para κύριος como título cristológico, en coherencia con el estándar POB.
  - Se mantiene el encadenamiento participial mediante una relativa en español para respetar la sintaxis del griego.
  - «Contrarios a todos» traduce la oposición de ἐναντίων sin intensificar más allá del dato léxico.
  - Las notas mantienen la advertencia contextual sobre el referente histórico del pasaje sin suavizar el contenido del texto.
