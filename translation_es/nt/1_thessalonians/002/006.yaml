lexical_decisions:
- source_word: ζητοῦντες
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - buscando
  - procurando
  - anhelando
  lexicon: BDAG
  rationale: El participio presente expresa una acción continua; «buscando» conserva ese matiz sin añadir una intensidad distinta a la del griego. «Procurando» o «anhelando» son posibles, pero «buscando» es más directo y natural en español.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from people
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de la gente
  - de seres humanos
  lexicon: BDAG
  rationale: Aquí ἄνθρωποι es genérico y masculino en forma, pero humano en referencia. «De los hombres» mantiene una correspondencia más cercana al sustantivo del griego y al mismo tiempo suena natural en un registro bíblico; en nota se puede reconocer la fuerza genérica como «personas».
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - alabanza
  - praise
  lexicon: BDAG
  rationale: La POB inglesa conserva «glory» y admite «honor» o «praise» como alternativas. En español, «gloria» mantiene la conexión léxica con el término neotestamentario, aunque aquí se trata de la gloria/elogio humano, no de la gloria de Dios.
- source_word: οὔτε ... οὔτε ... οὔτε
  english_pob_choice: nor ... neither ... nor
  chosen_spanish: ni ... ni ... ni
  alternatives_spanish:
  - ni ... ni ... ni
  - tampoco ... ni ... ni
  lexicon: LSJ
  rationale: La serie negativa se reproduce con la correlación natural en español «ni ... ni ... ni», que preserva la estructura de exclusión múltiple del original y evita sobreinterpretar la relación sintáctica.
- source_word: ἀφ’ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de parte de ustedes
  alternatives_spanish:
  - de ustedes
  - de ustedes mismos
  - por parte de ustedes
  lexicon: BDAG
  rationale: El griego marca procedencia o fuente. «De parte de ustedes» expresa con claridad esa procedencia y evita ambigüedad de mera pertenencia o separación espacial.
- source_word: ἀπ’ ἄλλων
  english_pob_choice: from others
  chosen_spanish: de otros
  alternatives_spanish:
  - de otras personas
  - de los demás
  - de otros más
  lexicon: BDAG
  rationale: «Otros» reproduce bien la referencia indeterminada del griego y mantiene la simetría con la frase anterior.
theological_decisions:
- issue: Naturaleza de la δόξα buscada
  english_pob_reading: human glory/acclaim, not divine glory
  chosen_spanish_reading: gloria humana, es decir, reconocimiento o aprobación de personas
  alternative_spanish_readings:
  - honor humano
  - alabanza humana
  rationale: La frase ἐξ ἀνθρώπων delimita la fuente de la δόξα. Por eso, aunque se traduce «gloria», se entiende explícitamente como gloria procedente de seres humanos, no como gloria de Dios. La redacción conserva la tensión léxica entre «gloria» y sus equivalentes contextuales.
  doctrine_reference: 1 Tesalonicenses 2:6; cf. la distinción bíblica entre la gloria de Dios y la alabanza humana
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo; no se reportan revisiones aplicadas. La versión española sigue de cerca la estructura negativa triple y conserva la ambigüedad léxica de δόξα con una nota de alternativas.
  spanish_consistency_notes:
  - Se usa «gloria» como término principal para δόξα, en continuidad con la decisión inglesa de mantener el vínculo léxico NT, pero la nota aclara las alternativas semánticas.
  - Se prefirió «de parte de ustedes» para hacer explícita la idea de procedencia que aporta ἀπό/ἐξ, aunque «de ustedes» también sería defendible.
  - La secuencia negativa se mantiene con «ni ... ni ... ni» para reflejar el triple οὔτε sin endurecer el español.
  - Se evitó «SEÑOR» o cualquier sustitución teológica no presente en el versículo; no aplica aquí, pero se preserva el principio de traducción transparente.
