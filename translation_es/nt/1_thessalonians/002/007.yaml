review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general del griego y mantiene correctamente «Mesías» para Χριστοῦ, así como la concesión inicial y la imagen maternal final. Sin embargo, dos elecciones debilitan el sentido fuente y el rastro auditado en inglés: «nos mostramos» atenúa el valor de ἐγενήθημεν (‘llegamos a ser / fuimos hechos’), y «acaricia» reduce θάλπῃ a contacto físico, mientras que el verbo expresa cuidado tierno y nutriente, literalmente ‘calentar’ y por extensión ‘abrigar/cuidar con ternura’.'
  spanish_quality_summary: El español es claro y legible, pero «madre lactante» suena algo clínico y «acaricia» no encaja tan bien con el registro bíblico-digno ni con la imagen de crianza. «Tiernos»/«apacibles» y «cuida tiernamente» o «abriga con ternura» leen mejor y preservan mejor la imagen. También conviene preferir una formulación más natural para ἐγενήθημεν que conserve el matiz de cambio.
  glossary_alignment: Buena alineación con la terminología del proyecto en «Mesías». No hay conflicto con otros términos doctrinales. La nota tradicional «apóstoles de Cristo» está bien preservada. La nota sobre τροφός también está bien enfocada, aunque el texto principal debería armonizar mejor con esa explicación.
  issues:
  - severity: medium
    issue: «nos mostramos» para ἐγενήθημεν
    rationale: El griego γίνομαι aquí conserva la idea de ‘llegar a ser / hacerse’, y el inglés auditado escogió ‘we became’. «Nos mostramos» desplaza el sentido hacia mera apariencia o manifestación externa.
  - severity: medium
    issue: «acaricia» para θάλπῃ
    rationale: θάλπῃ no significa principalmente ‘acariciar’, sino nutrir/cuidar tiernamente, con la imagen literal de dar calor. «Acaricia» estrecha demasiado el sentido y pierde el componente de cuidado sostenido.
  - severity: low
    issue: «madre lactante» suena clínico
    rationale: Aunque no es incorrecto, en una Biblia de registro digno y natural suena menos idiomático que «madre que amamanta» o, si se desea brevedad, puede mantenerse con un verbo mejorado.
  revised_spanish_text: aunque podíamos haber sido una carga como apóstoles del Mesías[a][b], sin embargo llegamos a ser tiernos[c] en medio de ustedes, como una madre que amamanta cuida tiernamente a sus propios hijos.
  revised_footnotes:
  - marker: a
    text: O «haber ejercido autoridad» o «haber hecho exigencias» como apóstoles del Mesías. El griego dice literalmente «haber sido pesados» o «haber estado en peso».
    reason: lexical_alternative
  - marker: b
    text: 'Tradición alternativa: «apóstoles de Cristo».'
    reason: alternative_reading
  - marker: c
    text: O «como una nodriza»; la imagen es de cuidado materno tierno.
    reason: lexical_alternative
  revision_rationale: Se revisa para alinear mejor el español con el valor verbal de ἐγενήθημεν (‘llegamos a ser’) y con el sentido de θάλπῃ como cuidado tierno sostenido, no simple caricia. También se mejora la naturalidad de la imagen en español con «madre que amamanta».
