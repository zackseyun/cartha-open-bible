translation:
  language: es
  text: aunque podíamos haber sido una carga como apóstoles del Mesías[a][b], sin embargo llegamos a ser tiernos[c] en medio de ustedes, como una madre que amamanta cuida tiernamente a sus propios hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «haber ejercido autoridad» o «haber hecho exigencias» como apóstoles del Mesías. El griego dice literalmente «haber sido pesados» o «haber estado en peso».
    reason: lexical_alternative
  - marker: b
    text: 'Tradición alternativa: «apóstoles de Cristo».'
    reason: alternative_reading
  - marker: c
    text: O «como una nodriza»; la imagen es de cuidado materno tierno.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνάμενοι
  english_pob_choice: though we could have been
  chosen_spanish: aunque podíamos haber
  alternatives_spanish:
  - aunque habíamos podido
  - si bien podíamos
  lexicon: BDAG
  rationale: El participio con valor concesivo se expresa de forma natural con «aunque» + imperfecto, manteniendo la idea de capacidad real anterior al contraste introducido por ἀλλά.
- source_word: ἐν βάρει εἶναι
  english_pob_choice: have been a burden
  chosen_spanish: haber sido una carga
  alternatives_spanish:
  - ser gravosos
  - haber ejercido peso/autoridad
  lexicon: BDAG
  rationale: La revisión inglesa favorece «a burden» por reflejar mejor la frase en contexto; en español, «ser una carga» conserva la metáfora sin endurecerla innecesariamente hacia «autoridad» o «exigir».
- source_word: ὡς Χριστοῦ ἀπόστολοι
  english_pob_choice: as apostles of the Messiah
  chosen_spanish: como apóstoles del Mesías
  alternatives_spanish:
  - como apóstoles de Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» según la preferencia doctrinal del proyecto cuando Χριστός funciona como título. «Del Mesías» reproduce el genitivo de pertenencia de manera natural en español.
- source_word: ἀλλὰ ἐγενήθημεν
  english_pob_choice: yet we became
  chosen_spanish: sin embargo nos mostramos
  alternatives_spanish:
  - pero llegamos a ser
  - pero fuimos
  lexicon: BDAG
  rationale: ἐγενήθημεν puede expresar llegar a ser o mostrarse como. En español, «nos mostramos» comunica bien el contraste conductual del contexto y evita un «ser» demasiado estático.
- source_word: ἤπιοι
  english_pob_choice: gentle
  chosen_spanish: amables
  alternatives_spanish:
  - mansos
  - gentiles
  lexicon: BDAG
  rationale: «Amables» funciona de modo digno y natural en español moderno para la actitud de trato suave; «mansos» podría sonar más marcado moralmente y menos relacional en este contexto.
- source_word: ἐν μέσῳ ὑμῶν
  english_pob_choice: among you
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - entre ustedes
  lexicon: BDAG
  rationale: «En medio de ustedes» conserva mejor la imagen espacial de la frase griega; «entre ustedes» también es viable, pero suaviza el matiz imagético.
- source_word: τροφός
  english_pob_choice: a nursing mother
  chosen_spanish: una madre lactante
  alternatives_spanish:
  - una nodriza
  - una madre que amamanta
  lexicon: BDAG
  rationale: La imagen es maternal y de crianza. «Madre lactante» evita el tecnicismo clínico de «nodriza» y refleja el cuidado nutriente del símil.
- source_word: θάλπῃ
  english_pob_choice: cherishes
  chosen_spanish: acaricia
  alternatives_spanish:
  - cuida tiernamente
  - alimenta con ternura
  lexicon: BDAG
  rationale: El verbo incluye la idea de calor y cuidado tierno. «Acaricia» transmite afecto visible y protección, aunque el sentido amplio de ternura queda también abierto a la imagen.
- source_word: τὰ ἑαυτῆς τέκνα
  english_pob_choice: her own children
  chosen_spanish: a sus propios hijos
  alternatives_spanish:
  - a sus propios niños
  - a sus propios hijos pequeños
  lexicon: BDAG
  rationale: «Hijos» es natural en español y cubre el plural neutro griego τέκνα en este símil. «Sus propios» reproduce el énfasis de ἑαυτῆς.
theological_decisions:
- issue: Rendering Χριστοῦ as a title
  english_pob_reading: apostles of the Messiah
  chosen_spanish_reading: apóstoles del Mesías
  alternative_spanish_readings:
  - apóstoles de Cristo
  rationale: Se sigue la convención del proyecto para Χριστός como título mesiánico. La alternativa tradicional se mantiene como opción semántica conocida, pero no se adopta en el texto principal.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (cuando funciona como título)'
- issue: Intensity of ἐν βάρει εἶναι
  english_pob_reading: have been a burden
  chosen_spanish_reading: haber sido una carga
  alternative_spanish_readings:
  - haber ejercido autoridad
  - haber sido gravosos
  rationale: La frase griega es metafórica y puede abarcar la idea de peso relacional o de imposición. «Una carga» preserva esa amplitud sin reducirla a una sola interpretación.
  doctrine_reference: English audit trail on ἐν βάρει εἶναι; revision note from latest pass
translation_notes:
  revision_awareness: La revisión más reciente del inglés cambió «weighty» por «a burden» para reflejar mejor ἐν βάρει εἶναι; la versión española adopta esa decisión con «una carga» y conserva el símil materno y el título mesiánico según el audit trail.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en sentido titular, en continuidad con la guía del proyecto.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni una cita del nombre divino.
  - Se mantiene el paralelismo de contraste con «aunque... sin embargo...».
  - El símil maternal se conserva con un registro comprensible y digno para público eclesial hispanohablante.
