revisions:
- from: aunque podíamos haber sido una carga como apóstoles del Mesías[a][b], sin embargo nos mostramos amables[c] en medio de ustedes, como una madre lactante acaricia a sus propios hijos.
  to: aunque podíamos haber sido una carga como apóstoles del Mesías[a][b], sin embargo llegamos a ser tiernos[c] en medio de ustedes, como una madre que amamanta cuida tiernamente a sus propios hijos.
  rationale: Se revisa para alinear mejor el español con el valor verbal de ἐγενήθημεν (‘llegamos a ser’) y con el sentido de θάλπῃ como cuidado tierno sostenido, no simple caricia. También se mejora la naturalidad de la imagen en español con «madre que amamanta».
  reviewer_model: gpt-5.4
