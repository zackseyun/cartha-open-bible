translation:
  language: es
  text: Porque ustedes mismos saben muy bien que el día de Yahvé viene como ladrón en la noche.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre intensivo refuerza al sujeto ya expresado por el verbo; «ustedes mismos» conserva ese énfasis de manera natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: La partícula introduce una explicación del enunciado anterior; «Porque» expresa bien esa fuerza causal/explanatoria en español contemporáneo.
- source_word: ἀκριβῶς
  english_pob_choice: very well
  chosen_spanish: muy bien
  alternatives_spanish:
  - exactamente
  - con precisión
  lexicon: BDAG
  rationale: El adverbio señala conocimiento exacto o preciso; con οἴδατε, «muy bien» comunica de forma natural ese conocimiento firme sin sonar rígido.
- source_word: οἴδατε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - saben
  lexicon: BDAG
  rationale: οἶδα significa «saber/conocer»; aquí «saben» es la opción más directa y idiomática en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Introduce el contenido del conocimiento; «que» es la conjunción complementante normal en español.
- source_word: ἡμέρα κυρίου
  english_pob_choice: the day of the Lord
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día del Señor
  - el día de Yahvé
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «Lord» por su convención doctrinal, en español la norma del proyecto es «Yahvé» para יהוה. La expresión conserva el valor escatológico profético de la frase bíblica sin ocultar el nombre divino.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: BDAG
  rationale: Aquí κυρίου corresponde al nombre divino en la fórmula «día de Yahvé»; se evita «Señor» como sustituto de máscara, conforme a la terminología española del proyecto.
- source_word: ὡς κλέπτης ἐν νυκτί
  english_pob_choice: like a thief in the night
  chosen_spanish: como ladrón en la noche
  alternatives_spanish:
  - como un ladrón en la noche
  - como ladrón de noche
  lexicon: BDAG
  rationale: La comparación es convencional en el NT y enfatiza la llegada inesperada; «como ladrón en la noche» sigue de cerca el griego y suena natural en español bíblico.
- source_word: οὕτως
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - así viene
  - viene
  lexicon: BDAG
  rationale: El adverbio marca la correspondencia con la comparación precedente; en español puede integrarse en el verbo sin añadir «así» para no sobrecargar la frase.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - llega
  lexicon: BDAG
  rationale: El presente griego con valor futuro se conserva bien con «viene», que mantiene la viveza del enunciado escatológico.
theological_decisions:
- issue: Expresión escatológica ἡμέρα κυρίου
  english_pob_reading: the day of the Lord
  chosen_spanish_reading: el día de Yahvé
  alternative_spanish_readings:
  - el día del Señor
  - el día de Yahvé
  rationale: El contexto habla de la llegada súbita del día escatológico de intervención y juicio divinos. En español se mantiene la referencia al nombre divino con «Yahvé», siguiendo la terminología del proyecto y evitando la sustitución por «Señor» sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md: terminology for יהוה / YHWH; preserve source-based name forms'
- issue: Símil «como ladrón en la noche»
  english_pob_reading: Retained as a simile of sudden, unexpected arrival without importing additional doctrinal detail
  chosen_spanish_reading: Retenido como símil de llegada inesperada y súbita, sin añadir detalles doctrinales
  alternative_spanish_readings:
  - como ladrón en la noche
  - como un ladrón en la noche
  rationale: El verso subraya la sorpresa y la súbita irrupción del día, no un sistema doctrinal sobre el modo exacto de su cumplimiento. La traducción conserva la imagen sin ampliarla.
  doctrine_reference: 'DOCTRINE.md: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo de revisión fue alto y no hubo ajustes pendientes. La versión española conserva esa estabilidad, adaptando solo la terminología divina al estándar español del proyecto.
  spanish_consistency_notes:
  - Se usó «Yahvé» para el nombre divino, conforme a los defaults del proyecto en español.
  - Se mantuvo el énfasis de αὐτοὶ con «ustedes mismos».
  - Se conservó el presente de valor futuro con «viene».
  - No se añadieron notas al pie porque el verso no presenta una variante textual o ambigüedad que requiera anclaje en esta traducción.
