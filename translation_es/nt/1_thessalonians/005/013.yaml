translation:
  language: es
  text: y tenerlos en muy alta estima con amor[a], a causa de su obra. Estén en paz entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "tenerlos por muy dignos de estima con amor". El adverbio griego es inusualmente intensivo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡγεῖσθαι
  english_pob_choice: to regard
  chosen_spanish: tenerlos en estima
  alternatives_spanish:
  - considerarlos
  - tenerlos por
  lexicon: BDAG
  rationale: El infinitivo se usa aquí en sentido evaluativo, no de gobierno. En español, 'tener en estima' comunica bien la idea de valorar a personas, manteniendo el matiz relacional y sin sugerir liderazgo.
- source_word: ὑπερεκπερισσοῦ
  english_pob_choice: very highly
  chosen_spanish: en muy alta estima
  alternatives_spanish:
  - sumamente
  - por encima de toda medida
  lexicon: BDAG
  rationale: El adverbio griego es intensivo y acumulativo. 'En muy alta estima' conserva la intensidad de manera natural en español; 'sumamente' es posible, pero aquí la combinación con 'estima' expresa mejor la valoración requerida.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - en el amor
  lexicon: BDAG
  rationale: Se mantiene ἀγάπη como 'amor' según el uso habitual del proyecto. 'En amor' reproduce la construcción griega y puede entenderse como la esfera o modo de la valoración.
- source_word: διὰ τὸ ἔργον αὐτῶν
  english_pob_choice: because of their work
  chosen_spanish: por causa de su obra
  alternatives_spanish:
  - a causa de su trabajo
  - porque trabajan
  lexicon: BDAG
  rationale: διά con acusativo expresa base o razón. 'Por causa de su obra' preserva la fuerza causal y conserva ἔργον como 'obra', que en este contexto suena suficientemente concreto y digno.
- source_word: εἰρηνεύετε
  english_pob_choice: Be at peace
  chosen_spanish: Estén en paz
  alternatives_spanish:
  - Vivan en paz
  - Sean pacíficos
  lexicon: BDAG
  rationale: El imperativo presente exige un estado continuo. 'Estén en paz' es una forma natural y fiel en español, cercana al valor estativo del verbo griego.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: BDAG
  rationale: El reflexivo plural señala paz dentro de la comunidad. 'Entre ustedes' es claro, inclusivo y natural en español moderno, y preserva el sentido comunitario.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: Conserva la continuidad exhortativa del versículo.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Retoma a los dirigentes mencionados en el contexto inmediato; el objeto directo clítico es lo más natural en español y evita redundancia.
