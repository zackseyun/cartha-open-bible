translation:
  language: es
  text: Fiel es el que los llama[a], el cual también lo hará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Confiable es el que los llama; él también lo cumplirá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: Faithful
  chosen_spanish: Fiel
  alternatives_spanish:
  - Fidedigno
  - Confiable
  lexicon: BDAG
  rationale: El adjetivo predicativo describe la confiabilidad de Dios; «Fiel» es la equivalencia más natural y teológicamente asentada en español, mientras que «confiable» o «fidedigno» suenan menos idiomáticos en este contexto.
- source_word: ὁ καλῶν
  english_pob_choice: the one who calls
  chosen_spanish: el que llama
  alternatives_spanish:
  - el que os llama
  - el que está llamando
  lexicon: BDAG
  rationale: El participio presente articular funciona sustantivamente. «El que llama» conserva esa fuerza verbal de manera natural en español; en este contexto, el complemento plural se expresa en el pronombre enclítico «los» para reflejar el destinatario comunitario.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: BDAG
  rationale: El griego indica segunda persona plural. En un español latinoamericano amplio, «los» permite reflejar el objeto plural sin marcar dialectalmente con «os»; «a ustedes» es posible, pero menos conciso y menos paralelo a la brevedad del griego.
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: el cual
  alternatives_spanish:
  - quien
  - y él
  lexicon: BDAG
  rationale: El relativo enlaza la segunda cláusula con «el que llama». «El cual» mantiene la relación sintáctica con claridad y evita una reestructuración excesiva.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: «También» reproduce la suma enfática/continuativa del καί sin sobreinterpretarlo.
- source_word: ποιήσει
  english_pob_choice: will do it
  chosen_spanish: lo hará
  alternatives_spanish:
  - lo cumplirá
  - lo realizará
  lexicon: BDAG
  rationale: El verbo futuro de ποιέω es amplio; el objeto queda elíptico en griego. En español, «lo hará» conserva la brevedad y deja implícito que Dios llevará a cabo lo pedido en el contexto inmediato, sin añadir un objeto explícito que el texto no da.
theological_decisions:
- issue: Objeto implícito de ποιήσει
  english_pob_reading: The clause refers to God carrying out what Paul has just prayed for in v. 23, rendered idiomatically as 'will do it.'
  chosen_spanish_reading: La cláusula refiere a que Dios realizará lo pedido en el versículo anterior; se expresa con «lo hará».
  alternative_spanish_readings:
  - lo cumplirá
  - lo realizará
  - lo llevará a cabo
  rationale: 'El griego omite el objeto, pero el contexto inmediato lo proporciona: la santificación y preservación pedidas en el v. 23. «Lo hará» es breve, natural y suficientemente abierto para no imponer una especificación mayor que la del texto.'
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide con la lectura estable del audit trail inglés: predicado de fidelidad, participio sustantivado para el que llama, relativo encadenado y futuro con objeto implícito. No se detectan revisiones textuales relevantes en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Fiel» para πιστός, coherente con el valor teológico y lexical del audit trail.
  - Se conserva el plural implícito de la comunidad con un pronombre de objeto plural en español.
  - Se evita añadir un objeto nominal a ποιήσει para respetar la elipsis griega.
  - La puntuación refleja la breve clausulación del original y la relación relativa entre las dos proposiciones.
