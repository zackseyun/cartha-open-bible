translation:
  language: es
  text: Absténganse de toda clase de mal[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de toda forma de mal»; tradicionalmente, «de toda apariencia de mal».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέχεσθε
  english_pob_choice: Abstain
  chosen_spanish: Apártense
  alternatives_spanish:
  - Absténganse
  - Aléjense
  - Manténganse alejados
  lexicon: BDAG
  rationale: El imperativo presente medio de segunda persona plural expresa una abstención continua. En español, «apártense» comunica con naturalidad la idea de mantenerse lejos o apartarse de algo, conservando el mandato colectivo y la fuerza exhortativa sin sonar rígido.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - lejos de
  lexicon: BDAG
  rationale: Con ἀπέχεσθε, el valor separativo de ἀπό se expresa de forma natural en español con «de», que introduce correctamente el objeto del que hay que apartarse.
- source_word: παντὸς
  english_pob_choice: every
  chosen_spanish: toda
  alternatives_spanish:
  - cada
  - todo tipo de
  lexicon: BDAG
  rationale: 'El genitivo con εἴδους forma la idea de totalidad distributiva: «every kind». En español, «toda» funciona de manera idiomática antes de «clase» y preserva esa amplitud distributiva.'
- source_word: εἴδους
  english_pob_choice: kind
  chosen_spanish: clase
  alternatives_spanish:
  - forma
  - tipo
  - apariencia
  lexicon: BDAG
  rationale: El contexto favorece «kind/sort» más que «appearance». «Clase» es una opción natural en español para expresar «every kind of evil» sin insinuar que el texto hable principalmente de mera apariencia externa.
- source_word: πονηροῦ
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - maldad
  - lo malo
  - lo perverso
  lexicon: BDAG
  rationale: El adjetivo sustantivado describe aquello que es moralmente malo. «Mal» es breve, directo y mantiene la referencia amplia a lo maligno o malo en general.
theological_decisions:
- issue: Sentido de εἴδους en la expresión ἀπὸ παντὸς εἴδους πονηροῦ
  english_pob_reading: every kind of evil; footnote notes traditional 'every appearance of evil'
  chosen_spanish_reading: de toda clase de mal
  alternative_spanish_readings:
  - de toda apariencia de mal
  - de toda forma de mal
  rationale: La evidencia léxica favorece «clase/forma» antes que «apariencia» como referencia principal. En español, «apariencia de mal» puede sugerir evitar solo lo que parece malo, lo cual no refleja bien el griego en este contexto. Se conserva la alternativa tradicional como nota para no borrar la tensión histórica de la traducción.
  doctrine_reference: Translation philosophy §1 (primacía del original); §3 (preservar tensiones léxicas reales)
- issue: Carácter exhortativo del mandato
  english_pob_reading: ongoing avoidance expressed by 'Abstain'
  chosen_spanish_reading: mandato continuo de apartarse
  alternative_spanish_readings:
  - mandato de abstenerse
  - exhortación a evitar
  rationale: El presente imperativo medio sugiere una conducta sostenida, no una acción puntual. «Apártense» comunica bien esa exhortación continua en español sin añadir contenido ajeno al texto.
  doctrine_reference: Translation philosophy §2 (equivalencia óptima sin perder fuerza verbal)
translation_notes:
  revision_awareness: El texto base en inglés fue revisado por última vez con estado de alta concordancia y sin cambios necesarios; el español sigue la misma decisión principal sobre εἴδους como 'kind/form' y mantiene la nota histórica sobre 'appearance' sin adoptarla como sentido primario.
  spanish_consistency_notes:
  - Se mantiene «mal» para πονηροῦ por claridad y amplitud semántica.
  - Se evita «apariencia» en el cuerpo principal porque en español puede desplazar el sentido hacia la mera percepción externa.
  - La puntuación y el tono son sobrios y publicables para un registro bíblico contemporáneo.
