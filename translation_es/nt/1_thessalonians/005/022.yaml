    rationale: Aunque «apártense» comunica evitación, puede sugerir alejarse físicamente o retirarse, mientras que ἀπέχεσθε con ἀπό en este mandato ético expresa mejor abstenerse o mantenerse alejado de participar en el mal. El expediente inglés eligió explícitamente «Abstain» por esa fuerza verbal.
  - severity: low
    issue: La nota del verbo da demasiada prominencia a alternativas menos adecuadas que la principal.
    rationale: Si el texto principal se corrige a «Absténganse», conviene que la nota preserve alternativas reales sin debilitar la opción más fiel al expediente.
  revised_spanish_text: Absténganse de toda clase de mal[a].
