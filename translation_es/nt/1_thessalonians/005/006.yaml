translation:
  language: es
  text: Así que no durmamos como hacen los demás, sino estemos despiertos[a] y seamos sobrios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seamos vigilantes». El verbo griego puede enfatizar tanto estar despiertos como estar alerta o vigilantes.
    reason: lexical_alternative
  - marker: b
    text: O «seamos dueños de nosotros mismos» o «tengamos la mente clara». El verbo griego lleva el sentido de sobriedad y, por extensión, de lucidez y dominio propio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα οὖν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Así pues
  lexicon: BDAG
  rationale: Los dos conectores inferenciales intensifican la conclusión. «Así que» es natural en español y conserva el paso exhortativo desde el contexto previo sin sonar rígido.
- source_word: μὴ καθεύδωμεν
  english_pob_choice: let us not sleep
  chosen_spanish: no durmamos
  alternatives_spanish:
  - no estemos dormidos
  - no sigamos durmiendo
  lexicon: BDAG
  rationale: El subjuntivo exhortativo negativo se expresa con claridad en español con «no durmamos». Mantiene la imagen literal del sueño, que en el contexto tiene fuerza moral y espiritual.
- source_word: ὡς οἱ λοιποί
  english_pob_choice: as the rest do
  chosen_spanish: como los demás
  alternatives_spanish:
  - como el resto
  - como los otros
  lexicon: BDAG
  rationale: «οἱ λοιποί» contrasta al grupo creyente con los demás. «Los demás» es idiomático y suficientemente inclusivo; evita la repetición innecesaria de un verbo implícito en español.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - antes bien
  lexicon: BDAG
  rationale: En español, después de una negación, «sino» expresa mejor el contraste correctivo de la cláusula siguiente que un simple «pero».
- source_word: γρηγορῶμεν
  english_pob_choice: let us stay awake
  chosen_spanish: mantengámonos despiertos
  alternatives_spanish:
  - estemos despiertos
  - seamos vigilantes
  - estemos vigilantes
  lexicon: BDAG
  rationale: El verbo puede enfatizar vigilia o vigilancia. «Mantengámonos despiertos» conserva la antítesis con «durmamos» y sigue siendo natural; la vigilancia queda implícita y puede explicitarse en nota.
- source_word: νήφωμεν
  english_pob_choice: be sober
  chosen_spanish: sobrios
  alternatives_spanish:
  - dueños de nosotros mismos
  - con la mente clara
  - sensatos
  lexicon: BDAG
  rationale: «νήφω» incluye sobriedad literal y, por extensión, lucidez y autocontrol. «Sobrios» preserva esa tensión mejor que una paráfrasis abstracta; en español, el adjetivo puede funcionar exhortativamente con valor verbal implícito.
theological_decisions:
- issue: Imagen metafórica de dormir/despertar
  english_pob_reading: Retain the sleep/awake imagery in the main text as an ethical-spiritual exhortation.
  chosen_spanish_reading: Conservar la imagen de dormir y estar despiertos en el texto principal como exhortación ética y espiritual.
  alternative_spanish_readings:
  - Parafrasear como descuido moral frente a vigilancia
  - Explicitar el contraste como conducta responsable frente a irresponsabilidad
  rationale: El contexto inmediato contrasta a los creyentes con «los demás» y mantiene una imaginería de luz y noche. La traducción debe preservar esa figura y no disolverla en una explicación abstracta.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Sentido de νήφω
  english_pob_reading: Translate as 'be sober' rather than a broader paraphrase like 'be self-controlled.'
  chosen_spanish_reading: Traducir con «sobrios» para mantener la imagen de sobriedad y su extensión a lucidez y autocontrol.
  alternative_spanish_readings:
  - ser autocontrolados
  - estar con la mente clara
  rationale: El término puede abarcar sobriedad literal y vigilancia mental. «Sobrios» conserva esa amplitud y deja visible la tensión lexical, en lugar de resolverla en una sola cualidad abstracta.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisiones adicionales; la versión española conserva la imagen metafórica, la relación inferencial y la tensión de νήφω entre sobriedad y lucidez.
  spanish_consistency_notes:
  - Se usó «sobrios» en forma adjetival exhortativa para evitar una paráfrasis más interpretativa y mantener la fuerza lexical del verbo griego.
  - Se evitó «SEÑOR» u otra terminología no pertinente; este versículo no contiene el tetragrámaton ni títulos cristológicos.
  - «Sino» se eligió por la estructura negativa-correlativa del español y la oposición marcada entre los dos miembros de la oración.
