revisions:
- from: Así que[a] no durmamos como los demás[b], sino mantengámonos despiertos y sobrios.
  to: Así que no durmamos como hacen los demás, sino estemos despiertos[a] y seamos sobrios[b].
  rationale: 'La revisión hace tres ajustes menores pero importantes: (1) completa la comparación con «como hacen los demás», que representa mejor el sentido de ὡς οἱ λοιποί en contexto; (2) sustituye «mantengámonos despiertos y sobrios» por dos exhortaciones verbales coordinadas, más fieles a γρηγορῶμεν καὶ νήφωμεν y más naturales en español; y (3) alinea las notas con las alternativas léxicas documentadas en el inglés POB para «stay awake» y «be sober».'
