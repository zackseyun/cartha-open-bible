translation:
  language: es
  text: Oren sin cesar[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘oren continuamente’ o ‘oren sin interrupción’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδιαλείπτως
  english_pob_choice: without ceasing
  chosen_spanish: sin cesar
  alternatives_spanish:
  - sin cesar continuamente
  - sin interrupción
  - sin cesar de manera continua
  lexicon: BDAG
  rationale: El adverbio expresa una acción persistente, ininterrumpida o regularmente continua. «Sin cesar» transmite bien esa fuerza en español natural y mantiene la idea de continuidad sin volverla una exigencia mecánica de cada segundo.
- source_word: προσεύχεσθε
  english_pob_choice: Pray
  chosen_spanish: Oren
  alternatives_spanish:
  - Sigan orando
  - Rueguen
  lexicon: BDAG
  rationale: El imperativo presente exhorta a una práctica habitual y continuada. «Oren» comunica con naturalidad la fuerza exhortativa en español; el matiz durativo ya queda expresado por «sin cesar».
theological_decisions:
- issue: Fuerza práctica del mandato
  english_pob_reading: Una exhortación general a la oración persistente, no un mandato de oración verbal ininterrumpida en cada momento.
  chosen_spanish_reading: Una exhortación general a la oración persistente, no una exigencia literal de oración verbal continua cada segundo.
  alternative_spanish_readings:
  - Una exigencia de oración ininterrumpida en todo momento
  - Una instrucción meramente litúrgica sin énfasis en la persistencia
  rationale: La combinación del imperativo presente con ἀδιαλείπτως pide continuidad y perseverancia en la oración. La traducción conserva esa tensión sin endurecerla en una lectura ascética o hiper-literal que el texto no obliga a adoptar.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El pasaje presenta muy alta concordancia con el control inglés; no se requieren revisiones textuales adicionales. La decisión principal es estilística y lexical: «sin cesar» para ἀδιαλείπτως y «Oren» para el imperativo plural.'
  spanish_consistency_notes:
  - Se mantuvo un tono bíblico moderno y digno, sin recurrir a «SEÑOR» u այլ lenguaje no presente en el verso.
  - Se preservó la fuerza exhortativa del plural en «Oren», acorde con el imperativo δεύτερο plural del griego.
  - La nota recoge alternativas válidas en español sin debilitar la elección principal.
