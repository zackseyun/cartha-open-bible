translation:
  language: es
  text: 'Cuando digan[a]: «Paz y seguridad», entonces vendrá sobre ellos una destrucción repentina, como dolores de parto[b] sobre una mujer embarazada, y de ningún modo escaparán[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Paz y tranquilidad».
    reason: lexical_alternative
  - marker: b
    text: O «dolores de nacimiento».
    reason: lexical_alternative
  - marker: c
    text: 'El griego tiene una negación enfática: «de ningún modo escaparán».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - Siempre que
  - Cada vez que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal indefinida con subjuntivo. «Cuando» es la equivalencia natural en español y mantiene el tono predictivo del contexto sin volver la frase excesivamente iterativa.
- source_word: λέγωσιν
  english_pob_choice: they say
  chosen_spanish: ellos digan
  alternatives_spanish:
  - ellos dicen
  - digan
  lexicon: BDAG
  rationale: El subjuntivo depende de la cláusula con ὅταν. En español, «ellos digan» conserva el valor temporal hipotético/futuro y el sujeto indefinido plural del griego.
- source_word: Εἰρήνη καὶ ἀσφάλεια
  english_pob_choice: Peace and security
  chosen_spanish: Paz y seguridad
  alternatives_spanish:
  - Paz y seguridad pública
  - Paz y tranquilidad
  lexicon: BDAG
  rationale: εἰρήνη se rinde con «paz». ἀσφάλεια se traduce mejor como «seguridad» que como «seguridad pública» o «tranquilidad», porque el sustantivo es abstracto y suena como consigna o proclamación en el contexto.
- source_word: αἰφνίδιος
  english_pob_choice: sudden
  chosen_spanish: repentina
  alternatives_spanish:
  - inesperada
  - súbita
  lexicon: BDAG
  rationale: Adjetivo predicativo que modifica ὄλεθρος. «Repentina» conserva la brusquedad del evento y es natural en español contemporáneo.
- source_word: ἐφίσταται
  english_pob_choice: comes upon
  chosen_spanish: vendrá sobre
  alternatives_spanish:
  - se cierne sobre
  - caerá sobre
  lexicon: BDAG
  rationale: En este contexto el verbo expresa irrupción o llegada de un juicio sobre alguien. «Vendrá sobre» reproduce bien la imagen direccional sin añadir matices más interpretativos como «se cierne».
- source_word: ὄλεθρος
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» es la equivalencia más clara y sobria. Evita cerrar la cuestión doctrinal del tipo exacto de juicio, manteniendo la gravedad del término griego.
- source_word: ὥσπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: Conduce la comparación de manera natural en español y conserva la función ilustrativa del símil.
- source_word: ἡ ὠδὶν
  english_pob_choice: labor pains
  chosen_spanish: dolores de parto
  alternatives_spanish:
  - pains of childbirth
  - contracciones del parto
  lexicon: BDAG
  rationale: «Dolores de parto» es la expresión idiomática y plenamente comprensible en español; mantiene la imagen de sufrimiento asociado al nacimiento.
- source_word: τῇ ἐν γαστρὶ ἐχούσῃ
  english_pob_choice: upon a pregnant woman
  chosen_spanish: sobre una mujer encinta
  alternatives_spanish:
  - sobre una mujer embarazada
  - sobre la que está encinta
  lexicon: BDAG
  rationale: La construcción participial literalmente refiere a la que tiene en el vientre. «Mujer encinta» conserva la imagen del griego y es una forma natural y digna en español bíblico contemporáneo.
- source_word: οὐ μὴ ἐκφύγωσιν
  english_pob_choice: they will certainly not escape
  chosen_spanish: de ningún modo escaparán
  alternatives_spanish:
  - ciertamente no escaparán
  - no escaparán de ninguna manera
  lexicon: BDAG
  rationale: La negación enfática οὐ μή exige un equivalente fuerte. «De ningún modo escaparán» comunica bien la imposibilidad enfática sin depender de una fórmula arcaica.
theological_decisions:
- issue: Fuerza de la negación enfática final
  english_pob_reading: 'Greek has an emphatic negation: “they will by no means escape.”'
  chosen_spanish_reading: «de ningún modo escaparán»
  alternative_spanish_readings:
  - «ciertamente no escaparán»
  - «no escaparán de ninguna manera»
  rationale: La estructura οὐ μή con subjuntivo aoristo expresa negación enfática de futuro. La traducción conserva esa fuerza sin suavizarla ni convertirla en una simple negación futura.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Alcance de ὄλεθρος en un anuncio escatológico
  english_pob_reading: Rendered as 'destruction' without specifying annihilation or eternal conscious punishment.
  chosen_spanish_reading: «destrucción» sin precisar la forma o duración del juicio
  alternative_spanish_readings:
  - «ruina»
  - «perdición»
  rationale: El sustantivo señala un juicio decisivo, pero no obliga a concluir aquí una doctrina particular sobre la modalidad exacta del castigo. La traducción preserva la tensión teológica del texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés y no requiere revisiones adicionales; se mantiene la equivalencia óptima con preservación de la tensión léxica y teológica documentada.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantiene «destrucción» para ὄλεθρος, evitando resolver la naturaleza del juicio.
  - Se conserva la fuerza del negativo enfático final con una formulación española natural.
  - «Paz y seguridad» se presenta como opción alternativa en nota, conforme al expediente inglés.
