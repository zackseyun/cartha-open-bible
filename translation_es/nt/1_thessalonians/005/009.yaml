translation:
  language: es
  text: Porque Dios no nos designó para la ira, sino para obtener[a] la salvación por medio de nuestro Señor Jesús Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para adquirir la salvación', 'para la posesión de la salvación' o, quizá, 'para la preservación hasta la salvación'; el sustantivo griego περιποίησις tiene un campo semántico más amplio que el español 'obtener'.
    reason: lexical_alternative
  - marker: b
    text: 'Forma tradicional: ''por medio de nuestro Señor Jesucristo''. Aquí Χριστός se ha rendido como ''Mesías'' para conservar su sentido titular.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la base de la afirmación anterior en un español natural y causal; 'Porque' conserva el valor explicativo de ὅτι sin sonar forzado.
- source_word: ἔθετο
  english_pob_choice: did not appoint
  chosen_spanish: no nos ha destinado
  alternatives_spanish:
  - no nos ha puesto
  - no nos ha designado
  - no nos ha destinado
  lexicon: BDAG
  rationale: τίθημι aquí expresa establecer un destino o asignación respecto del resultado. 'Ha destinado' comunica bien la idea de finalidad sin añadir una formulación doctrinal más fuerte que el griego.
- source_word: εἰς ὀργὴν
  english_pob_choice: for wrath
  chosen_spanish: para la ira
  alternatives_spanish:
  - para la ira de Dios
  - para el enojo
  - para el juicio
  lexicon: BDAG
  rationale: '''Ira'' preserva el peso escatológico y teológico de ὀργή. Se evita ''juicio'' porque es más interpretativo y no reproduce con precisión el término.'
- source_word: περιποίησιν σωτηρίας
  english_pob_choice: for obtaining salvation
  chosen_spanish: para obtener la salvación
  alternatives_spanish:
  - para la obtención de la salvación
  - para adquirir salvación
  - para la preservación para salvación
  lexicon: BDAG
  rationale: La construcción εἰς + acusativo indica resultado o destino; 'obtener la salvación' es idiomático en español y respeta el contraste con 'para la ira'. Se deja abierta la amplitud semántica de περιποίησις en la nota.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: la salvación
  alternatives_spanish:
  - la liberación
  - la salvación
  lexicon: BDAG
  rationale: En Pablo, σωτηρία normalmente tiene fuerza soteriológica plena. 'Salvación' es la equivalencia más directa y clara en español.
- source_word: διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: through our Lord Jesus Messiah
  chosen_spanish: por medio de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - por medio de nuestro Señor Jesús Cristo
  - por medio de nuestro Señor Jesucristo
  lexicon: BDAG
  rationale: διά con genitivo expresa medio; 'por medio de' lo comunica con claridad. Se conserva 'Señor' para κύριος. Χριστός se rinde como 'Mesías' por ser un título con sentido propio, manteniendo el nombre 'Jesús' separado para reflejar la estructura griega.
theological_decisions:
- issue: Si ἔθετο debe intensificarse con fuerza predestinaria
  english_pob_reading: did not appoint us for wrath
  chosen_spanish_reading: no nos ha destinado para la ira
  alternative_spanish_readings:
  - no nos ha predestinado para la ira
  - no nos ha designado para la ira
  rationale: '''Destinado'' expresa finalidad y asignación sin convertir el versículo en una afirmación sistematizada más amplia de predestinación. Así se preserva la tensión textual y el alcance exacto del verbo.'
  doctrine_reference: Preservar la tensión teológica sin resolver debates doctrinales más allá del texto.
- issue: Cómo verter Χριστοῦ al final de la frase
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός funciona como título cristológico; 'Mesías' conserva su sentido. Se evita sustituirlo por la forma tradicional sin una razón textual, aunque 'Cristo' sigue siendo una alternativa reconocible en español.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando es título.'
translation_notes:
  revision_awareness: 'El contexto inglés muestra dos cambios de revisión sobre Χριστοῦ: primero se cambió a ''Christ'' por registro convencional, y luego se restauró ''Messiah'' por política doctrinal del proyecto. La versión española sigue esa decisión restaurada y la explicita con una nota. También se toma en cuenta la nota léxica inglesa sobre περιποίησις para preservar su amplitud semántica en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto solo cuando aparezca el nombre divino; aquí el texto tiene θεός y κύριος, por lo que se traduce 'Dios' y 'Señor'.
  - '''Mesías'' se usa para Χριστός como título; no se fusiona con el nombre Jesús salvo en una nota de alternativa tradicional.'
  - '''Ira'' mantiene la fuerza escatológica de ὀργή sin suavizarla.'
  - La estructura 'por medio de nuestro Señor Jesús Mesías' sigue el orden del griego y conserva el valor de διά con genitivo.
