revisions:
- from: Porque Dios no nos ha destinado para la ira[a], sino para obtener la salvación por medio de nuestro Señor Jesús Mesías[b].
  to: Porque Dios no nos designó para la ira, sino para obtener[a] la salvación por medio de nuestro Señor Jesús Mesías[b].
  rationale: Se corrige la decisión léxica de ἔθετο a 'designó' para alinearla mejor con 'did not appoint' y evitar una fuerza predestinaria mayor que la documentada. También se mueve la nota léxica [a] desde 'ira' a 'obtener' porque explica περιποίησις, no ὀργή. Se mantiene 'Jesús Mesías' con nota tradicional por fidelidad al proyecto y al valor titular de Χριστός.
