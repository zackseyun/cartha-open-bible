review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal de ὅτι, el contraste entre εἰς ὀργὴν y εἰς περιποίησιν σωτηρίας, y la mediación de διὰ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ. Sin embargo, hay dos desajustes importantes con el expediente auditado: (1) el tiempo verbal español ''no nos ha destinado'' introduce un perfecto compuesto no marcado en el griego aoristo y menos directo que el inglés POB ''did not appoint''; (2) la nota [a] está anclada a ''ira'', pero su contenido explica περιποίησις, que corresponde a ''obtener la salvación''.'
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, 'Jesús Mesías' suena algo poco idiomático en español corriente; aun así, puede mantenerse por fidelidad al proyecto y al valor titular de Χριστός. La mejora principal es usar una formulación más natural y exacta para ἔθετο, como 'no nos ha puesto' o mejor 'no nos designó/no nos puso'. También debe corregirse la colocación de la nota léxica para evitar confusión.
  glossary_alignment: 'Alinea bien con los defaults del proyecto en ''Dios'', ''Señor'', ''Jesús'' y especialmente ''Mesías'' para Χριστός con nota tradicional a ''Jesucristo''. No hay términos en conflicto como Yahvé, esclavo, carne, etc. La única tensión terminológica real está en ἔθετο: ''destinó'' se acerca más a ''destined'' que a la decisión POB ''appoint''; en español ''designó'' o ''dispuso'' preservan mejor la cautela teológica documentada.'
  issues:
  - severity: high
    issue: La nota [a] está colocada en 'ira', pero explica περιποίησις ('obtener/adquirir/preservación'), no ὀργή.
    rationale: Esto induce al lector a pensar que las alternativas pertenecen a 'ira', cuando en realidad documentan el sustantivo griego περιποίησις dentro de 'obtener la salvación'.
  - severity: medium
    issue: '''no nos ha destinado'' no refleja de la mejor manera la decisión léxica auditada para ἔθετο.'
    rationale: El POB inglés eligió 'did not appoint' precisamente para evitar una fuerza predestinaria mayor. 'Destinó/ha destinado' en español puede sonar más fuerte doctrinalmente que 'designó' o 'dispuso'.
  - severity: low
    issue: El perfecto compuesto 'ha destinado' no está exigido por el aoristo griego y suena menos directo en este contexto.
    rationale: Un pasado simple como 'designó' o una formulación simple presente en estilo bíblico fluye mejor y se ajusta mejor al valor global del aoristo narrativo/gnómico en traducción.
  revised_spanish_text: Porque Dios no nos designó para la ira, sino para obtener[a] la salvación por medio de nuestro Señor Jesús Mesías[b].
  revised_footnotes:
  - marker: a
