    reason: lexical_alternative
  - marker: b
    text: 'Forma tradicional: ''por medio de nuestro Señor Jesucristo''. Aquí Χριστός se ha rendido como ''Mesías'' para conservar su sentido titular.'
    reason: alternative_reading
  revision_rationale: Se corrige la decisión léxica de ἔθετο a 'designó' para alinearla mejor con 'did not appoint' y evitar una fuerza predestinaria mayor que la documentada. También se mueve la nota léxica [a] desde 'ira' a 'obtener' porque explica περιποίησις, no ὀργή. Se mantiene 'Jesús Mesías' con nota tradicional por fidelidad al proyecto y al valor titular de Χριστός.
