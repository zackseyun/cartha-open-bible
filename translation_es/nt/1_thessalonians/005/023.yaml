    changes_summary: 'Replaced “the Messiah” with “Christ” to reflect the Greek Χριστοῦ in a formal, conventional rendering and maintain register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Que el Dios de paz mismo los santifique por completo[a], y que todo su espíritu, alma y cuerpo[b] sea guardado irreprensible en la venida de nuestro Señor Jesús Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «enteramente».'
    reason: alternative_reading
  - marker: b
    text: Pablo menciona «espíritu, alma y cuerpo»; los intérpretes discrepan sobre si esto enseña una división tripartita de la naturaleza humana o si simplemente enfatiza a la persona entera.
    reason: theological_note
  - marker: c
    text: 'Tradicionalmente: «en la venida de nuestro Señor Jesucristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - personalmente
  lexicon: BDAG
  rationale: El intensivo αὐτός subraya que Dios mismo actúa; «mismo» conserva ese énfasis de manera natural en español sin agregar información.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ marca transición hacia una oración de bendición; «Ahora» fluye bien en español moderno y mantiene el giro discursivo.
- source_word: ὁ θεὸς τῆς εἰρήνης
  english_pob_choice: the God of peace
  chosen_spanish: el Dios de paz
  alternatives_spanish:
  - el Dios que da paz
  - el Dios pacífico
  lexicon: BDAG
  rationale: 'Se conserva la expresión paulina estándar con el genitivo caracterizador: Dios como el que pertenece a la paz o la caracteriza.'
- source_word: ἁγιάσαι
  english_pob_choice: may ... sanctify
  chosen_spanish: santifique
  alternatives_spanish:
  - haga santo
  - consagre
  lexicon: BDAG
  rationale: «Santificar» conserva la conexión léxica y teológica con santidad/holiness mejor que una paráfrasis explicativa.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El objeto plural se expresa con el clítico de tercera persona plural en un estilo natural de español bíblico; el sentido es colectivo para los creyentes.
- source_word: ὁλοτελεῖς
  english_pob_choice: completely
  chosen_spanish: por completo
  alternatives_spanish:
  - totalmente
  - enteramente
  lexicon: BDAG
  rationale: El adjetivo/adverbio expresa totalidad en la santificación; «por completo» transmite bien la idea de plenitud en español sin endurecer la sintaxis.
- source_word: ὁλόκληρον
  english_pob_choice: whole
  chosen_spanish: su ...
  alternatives_spanish:
  - completo
  - íntegro
  lexicon: BDAG
  rationale: El término enfatiza integridad/entereza. En español la idea queda reforzada por la tríada y por «reprobable/irreprensible»; no se fuerza una repetición pesada.
- source_word: τὸ πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - aliento
  - espíritu humano
  lexicon: BDAG
  rationale: Se mantiene «espíritu» para preservar el término distintivo del texto, sin reducirlo a una sola interpretación antropológica.
- source_word: ἡ ψυχὴ
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - alma humana
  lexicon: BDAG
  rationale: En esta tríada, «alma» es la equivalencia más directa y reconocible para conservar la distinción léxica con πνεῦμα y σῶμα.
- source_word: τὸ σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: «Cuerpo» es la traducción estándar de σῶμα y encaja naturalmente en la lista triádica.
- source_word: ἀμέμπτως
  english_pob_choice: blameless
  chosen_spanish: irreprensibles
  alternatives_spanish:
  - sin culpa
  - sin reproche
  lexicon: BDAG
  rationale: El adverbio describe el estado en que han de ser mantenidos; «irreprensibles» conserva la idea de ausencia de reproche y suena natural en un contexto eclesial.
- source_word: ἐν τῇ παρουσίᾳ
  english_pob_choice: at the coming
  chosen_spanish: en la venida
  alternatives_spanish:
  - en la presencia
  - al venir
  lexicon: BDAG
  rationale: En contextos escatológicos, παρουσία suele referir la venida/arribo de Cristo. «Venida» preserva la referencia sin imponer «presencia».
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: of our Lord Jesus Messiah
  chosen_spanish: de nuestro Señor Jesús Mesías
  alternatives_spanish:
  - de nuestro Señor Jesucristo
  - de nuestro Señor Jesús Cristo
  lexicon: BDAG
  rationale: Se traduce κύριος como «Señor» y Χριστός como «Mesías» según la pauta del proyecto para títulos; «Jesús Mesías» mantiene la titulación sin depender de la forma litúrgica tradicional.
- source_word: τηρηθείη
  english_pob_choice: may ... be kept
  chosen_spanish: se mantengan
  alternatives_spanish:
  - sean guardados
  - sean preservados
  lexicon: BDAG
  rationale: El optativo pasivo expresa deseo/oración continua. «Se mantengan» transmite conservación en un estado sinculpa/reproche y funciona bien con «irreprensibles».
theological_decisions:
- issue: La tríada espíritu, alma y cuerpo
  english_pob_reading: Retain the threefold expression as written without collapsing terms or implying a formal doctrinal endorsement of trichotomy.
  chosen_spanish_reading: Se conserva «espíritu, alma y cuerpo» sin resolver si describe una antropología tripartita o simplemente a la persona entera.
  alternative_spanish_readings:
  - Interpretarlo como una enumeración retórica de la persona completa.
  - Leerlo como una enseñanza técnica sobre tres componentes humanos.
  rationale: El griego nombra explícitamente los tres términos, y la traducción debe preservar esa tensión interpretativa en vez de armonizarla prematuramente.
  doctrine_reference: Translation philosophy §3
- issue: Χριστοῦ como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  - el Cristo
  rationale: Se sigue la política del proyecto de traducir el título cuando el contexto lo permite. El español «Mesías» deja visible que se trata de un título, no de un apellido.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección de Χριστός entre «Christ» y «Messiah»; se adopta aquí la solución restaurada «Mesías» de acuerdo con la política documental del proyecto. También se conserva la tensión interpretativa sobre la tríada antropológica sin resolverla en la traducción.
  spanish_consistency_notes:
  - Se mantuvo «Dios de paz» como fórmula paulina estable.
  - Se tradujo παρουσία como «venida», no como «presencia», por el contexto escatológico.
  - Se usó «Mesías» para Χριστός conforme al estándar del proyecto, no «Cristo» como forma litúrgica automática.
  - «Irreprensibles» preserva el valor moral de ἀμέμπτως sin añadir una glosa extensa.
  - La puntuación separa claramente la cláusula de deseo y la cláusula de conservación pasiva.
