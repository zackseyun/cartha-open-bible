source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ὁ θεὸς τῆς εἰρήνης ἁγιάσαι ὑμᾶς ὁλοτελεῖς, καὶ ὁλόκληρον ὑμῶν τὸ πνεῦμα καὶ ἡ ψυχὴ καὶ τὸ σῶμα ἀμέμπτως ἐν τῇ παρουσίᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ τηρηθείη.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/005/023.yaml
  text: Now may the God of peace himself sanctify you completely[b][a], and may your whole spirit and soul and body be kept blameless at the coming of our Lord Jesus Messiah.
  footnotes:
  - marker: a
    text: Or, traditionally, “at the coming of our Lord Jesus Christ.”
    reason: alternative_reading
  - marker: b
    text: Paul’s wording names “spirit and soul and body”; interpreters differ on whether this teaches a three-part view of human nature or simply emphasizes the whole person.
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
