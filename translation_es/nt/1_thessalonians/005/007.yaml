translation:
  language: es
  text: Porque los que duermen, de noche duermen, y los que se embriagan, de noche se embriagan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: Introduce la explicación de la exhortación anterior. «Porque» mantiene el valor causal/explicativo de γάρ en un español natural y claro.
- source_word: οἱ καθεύδοντες ... καθεύδουσιν
  english_pob_choice: those who sleep, sleep
  chosen_spanish: los que duermen, duermen
  alternatives_spanish:
  - los que están durmiendo, duermen
  - los dormidos, duermen
  lexicon: BDAG
  rationale: El participio articular se vierte de manera genérica como «los que duermen». Repetir «duermen» conserva el paralelismo retórico y la imagen literal del original.
- source_word: νυκτός
  english_pob_choice: at night
  chosen_spanish: de noche
  alternatives_spanish:
  - por la noche
  - durante la noche
  lexicon: BDAG
  rationale: El genitivo funciona adverbialmente. «De noche» es idiomático en español y conserva la referencia temporal breve y paralela.
- source_word: οἱ μεθυσκόμενοι
  english_pob_choice: those who get drunk
  chosen_spanish: los que se embriagan
  alternatives_spanish:
  - los que se emborrachan
  - los que se van emborrachando
  lexicon: BDAG
  rationale: μεθυσκόμενοι describe el proceso de embriagarse. «Se embriagan» mantiene la fuerza verbal sin sonar forzado; «se emborrachan» es posible, pero menos sobrio para este registro.
- source_word: μεθύουσιν
  english_pob_choice: get drunk
  chosen_spanish: se embriagan
  alternatives_spanish:
  - están ebrios
  - se emborrachan
  lexicon: BDAG
  rationale: Aunque podría leerse de modo estativo, el paralelismo con el participio favorece un verbo de acción/proceso. «Se embriagan» preserva esa correspondencia y el matiz repetitivo.
- source_word: καί
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conjunción coordinante simple entre los dos miembros paralelos.
theological_decisions:
- issue: Imagen literal de dormir y embriagarse frente a una posible lectura metafórica
  english_pob_reading: Retain the literal imagery ('sleep,' 'get drunk') in the main text
  chosen_spanish_reading: Conservar la imagen literal de dormir y embriagarse en el texto principal
  alternative_spanish_readings:
  - Explicitar la idea de inconsciencia espiritual y disipación moral
  - Parafrasear con sentido moralizante
  rationale: En el contexto inmediato Pablo usa conductas nocturnas ordinarias para fundamentar la exhortación. Mantener la imagen evita introducir interpretación en la traducción y preserva el contraste retórico del versículo.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la lectura auditada en inglés; no se documentan revisiones aplicadas ni variantes textuales relevantes en el paquete proporcionado.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal del griego con dos miembros coordinados y repetición de «de noche» para reflejar νυκτός en ambos cola.
