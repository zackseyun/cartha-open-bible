translation:
  language: es
  text: No apaguen al Espíritu,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al espíritu». El término griego puede designar el espíritu de manera más general, pero aquí probablemente se refiere al Espíritu Santo, sobre todo a la luz de la mención siguiente de las profecías.
