lexical_decisions:
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: al Espíritu
  alternatives_spanish:
  - al espíritu
  - al Espíritu Santo
  lexicon: BDAG
  rationale: El griego con artículo en este contexto paulino apunta más naturalmente al Espíritu Santo que a una disposición humana. En español, la mayúscula en «Espíritu» conserva ese referente probable sin ocultar que el término griego también puede ser más general, lo cual se documenta en la nota.
- source_word: μὴ
  english_pob_choice: Do not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No ...
  lexicon: BDAG
  rationale: μή con imperativo presente expresa prohibición. En español, «No apaguen» comunica de forma natural esa prohibición sin añadir contenido interpretativo.
- source_word: σβέννυτε
  english_pob_choice: quench
  chosen_spanish: apaguen
  alternatives_spanish:
  - extingan
  - apaguen
  lexicon: BDAG
  rationale: σβέννυμι significa literalmente apagar/extinguir, sobre todo de fuego. «Apaguen» preserva la metáfora y suena natural en español. «Extingan» es posible, pero suele sonar más técnico o menos idiomático en este contexto.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu
  - el espíritu humano
  - el fervor espiritual
  rationale: 'La lectura principal sigue la decisión auditada de la POB inglesa: en el marco inmediato de vv. 20–21, la referencia más probable es la obra del Espíritu Santo en la comunidad, especialmente en relación con las profecías. Aun así, la nota conserva la alternativa léxica «el espíritu» para no borrar la tensión documentada.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document ambiguous readings and preserve alternatives in footnotes where warranted.'
translation_notes:
  revision_awareness: La revisión más reciente del pasaje no introdujo cambios; el acuerdo de auditoría es alto y la redacción sigue la lectura principal del inglés POB, conservando la alternativa documentada en nota.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula para reflejar el referente probable al Espíritu Santo.
  - Se usa un imperativo negativo natural en español sin sobreexplicar la imagen de fuego.
  - No se introduce terminología eclesiástica ajena al audit trail; la nota conserva la alternativa semántica de πνεῦμα.
