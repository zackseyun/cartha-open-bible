translation:
  language: es
  text: Pero, ya que somos del día[a], seamos sobrios, habiéndonos puesto la coraza de la fe[b] y del amor, y la esperanza de la salvación como casco.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pertenecemos al día». El griego ἡμέρας ὄντες expresa pertenencia o esfera, no solo tiempo del día.
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad». El griego πίστις puede significar «fe», «confianza» o «fidelidad»; aquí se mantiene «fe» en el texto principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡμεῖς δὲ
  english_pob_choice: But since we
  chosen_spanish: Pero, ya que somos
  alternatives_spanish:
  - Pero nosotros
  - Pero como somos
  lexicon: BDAG
  rationale: δέ introduce contraste con el contexto previo y también una conexión lógica. «Pero, ya que somos» conserva ambos matices con un español natural.
- source_word: ἡμέρας ὄντες
  english_pob_choice: are of the day
  chosen_spanish: somos del día
  alternatives_spanish:
  - pertenecemos al día
  - siendo del día
  lexicon: BDAG
  rationale: La expresión es metafórica y de esfera/pertenencia. «Del día» mantiene la imagen paulina sin explicarla en exceso.
- source_word: νήφωμεν
  english_pob_choice: let us be sober
  chosen_spanish: seamos sobrios
  alternatives_spanish:
  - mantengámonos sobrios
  - seamos vigilantes
  lexicon: BDAG
  rationale: νήφω puede ser sobriedad literal o autocontrol vigilante. «Seamos sobrios» conserva la metáfora y funciona bien en español bíblico moderno.
- source_word: ἐνδυσάμενοι
  english_pob_choice: having put on
  chosen_spanish: habiéndonos puesto
  alternatives_spanish:
  - después de habernos puesto
  - poniéndonos
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción asumida que acompaña la exhortación. «Habiéndonos puesto» es fiel y natural.
- source_word: θώρακα
  english_pob_choice: breastplate
  chosen_spanish: coraza
  alternatives_spanish:
  - peto
  - armadura del pecho
  lexicon: BDAG
  rationale: En español, «coraza» transmite el término militar con claridad. Es más idiomático que un calco pesado y conserva la imagen.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la fidelidad
  - la confianza
  lexicon: BDAG
  rationale: POB mantiene «faith» como opción principal para πίστις. En español, «la fe» es la correspondencia más directa; se preserva la alternativa «fidelidad» en nota.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: del amor
  alternatives_spanish:
  - de amor
  lexicon: BDAG
  rationale: ἀγάπη se rinde de forma estable como «amor». Aquí el genitivo coordinado con πίστις queda natural como «de la fe y del amor».
- source_word: περικεφαλαίαν
  english_pob_choice: helmet
  chosen_spanish: casco
  alternatives_spanish:
  - yelmo
  - helmeta
  lexicon: BDAG
  rationale: El término militar pide un equivalente claro. «Casco» es comprensible y natural en español contemporáneo; «yelmo» suena más arcaico.
- source_word: ἐλπίδα σωτηρίας
  english_pob_choice: the hope of salvation
  chosen_spanish: la esperanza de la salvación
  alternatives_spanish:
  - la esperanza de ser salvados
  - la esperanza que es salvación
  lexicon: BDAG
  rationale: La construcción genitiva se conserva de manera directa. «La esperanza de la salvación» es la forma más fiel e idiomática en español.
theological_decisions:
- issue: Valor de πίστις en la triada fe-amor-esperanza
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la fidelidad
  - la confianza
  rationale: La guía doctrinal del POB favorece «fe» como valor por defecto para πίστις. En esta lista de virtudes, «fe» mantiene la lectura tradicional y el paralelismo con amor y esperanza, sin borrar la posible matización de fidelidad, que queda registrada léxicamente.
  doctrine_reference: 'DOCTRINE.md contested terms: πίστις → faith; preserve alternatives where contested'
- issue: Relación entre «casco» y «la esperanza de la salvación»
  english_pob_reading: the hope of salvation as a helmet
  chosen_spanish_reading: y como casco la esperanza de la salvación
  alternative_spanish_readings:
  - y la esperanza de la salvación como casco
  - y la esperanza de la salvación, como casco
  rationale: El inglés revisado evita una inversión poco natural. En español, la colocación «y como casco la esperanza de la salvación» comunica la relación appositiva sin perder la imagen del armamento.
  doctrine_reference: POB revision on appositional armor imagery; preserve sense without over-literal inversion
translation_notes:
  revision_awareness: El texto sigue la revisión inglesa que prefirió una formulación más natural para la relación entre «helmet» y «the hope of salvation», evitando una inversión forzada. También conserva la decisión estable de la POB de traducir πίστις principalmente como «fe», dejando la alternativa «fidelidad» en nota.
  spanish_consistency_notes:
  - Se mantiene «la fe» para πίστις conforme al criterio doctrinal del proyecto.
  - Se traduce ἡμέρας ὄντες con una expresión de pertenencia/esfera («somos del día») y se documenta la alternativa.
  - 'La imagen militar se conserva con vocabulario claro y publicable: «coraza» y «casco».'
  - La puntuación respeta la fluidez del español, sin borrar la estructura exhortativa del griego.
