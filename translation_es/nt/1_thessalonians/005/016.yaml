lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: Always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - en todo momento
  lexicon: BDAG
  rationale: El adverbio expresa constancia o continuidad temporal. «Siempre» es la equivalencia natural y breve en español, y preserva el alcance absoluto sin sonar forzado.
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: regocíjense
  alternatives_spanish:
  - alégrense
  - sigan regocijándose
  lexicon: BDAG
  rationale: Es un imperativo presente de segunda persona plural. «Regocíjense» mantiene el mandato verbal relacionado con la alegría. «Sigan regocijándose» explicita el aspecto continuo, pero en español puede sonar más interpretativo; el presente imperativo ya permite ese matiz en contexto.
translation_notes:
  revision_awareness: 'El texto griego es breve y el informe inglés de POB coincide en sentido general: un mandato de alegría continua. La única corrección necesaria respecto al intento previo es anclar la nota al texto mediante [a]. No se observan revisiones textuales ni tensiones doctrinales en este versículo.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o lenguaje teológico no pertinente; el versículo no contiene términos divinos.
  - 'Se eligió un imperativo plural de cortesía bíblica y clara en español: «Regocíjense».'
  - La nota conserva la alternativa aspectual documentada por POB sin duplicar marcadores.
