translation:
  language: es
  text: Den gracias en todo[a], porque esto es la voluntad de Dios en Mesías Jesús[b] para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en toda circunstancia». El griego dice literalmente «en todo», refiriéndose a las circunstancias en las que los creyentes deben dar gracias, no necesariamente a dar gracias por el mal mismo.'
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «en Cristo Jesús».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν παντί
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en toda circunstancia
  - por todo
  lexicon: BDAG
  rationale: La preposición ἐν con παντί señala la esfera o circunstancia en la que debe darse la acción. «En todo» conserva la concisión del griego y permite la misma amplitud que la versión inglesa; «por todo» podría sonar como agradecimiento por la causa de todo, lo cual no refleja tan bien el valor contextual.
- source_word: εὐχαριστεῖτε
  english_pob_choice: Give thanks
  chosen_spanish: Den gracias
  alternatives_spanish:
  - Sean agradecidos
  - Sigan dando gracias
  lexicon: BDAG
  rationale: El imperativo presente plural pide una acción exhortativa dirigida a la comunidad. «Den gracias» es una forma natural, clara y fiel en español; mantiene el valor verbal del mandato sin volverlo meramente adjetival.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esto
  - esta práctica
  - este mandato
  lexicon: BDAG
  rationale: El demostrativo retoma directamente la exhortación anterior. En español, «esta» funciona bien porque concuerda con «voluntad» en la oración de razón implícita, pero el referente inmediato sigue siendo la acción de dar gracias.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce la base o razón del mandato. «Porque» expresa de manera natural la relación causal en español y mantiene la conexión argumentativa.
- source_word: θέλημα θεοῦ
  english_pob_choice: God's will
  chosen_spanish: la voluntad de Dios
  alternatives_spanish:
  - la voluntad de Dios
  - el querer de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de manera idiomática como «la voluntad de Dios». Esta opción conserva el sentido volitivo sin añadir matices no presentes en el texto.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene la decisión POB de traducir Χριστός como título «Mesías» cuando tiene fuerza titular. En español, «Mesías Jesús» preserva el valor semántico del título sin volverlo una mera transliteración tradicional.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - para vosotros
  - hacia ustedes
  - para su beneficio
  lexicon: BDAG
  rationale: ἐις con personas puede indicar dirección o referencia; aquí la relación es de destino o aplicación hacia los creyentes. «Para ustedes» expresa bien ese alcance en español neutro y mantiene la referencia comunitaria.
theological_decisions:
- issue: Χριστός como título traducido o forma tradicional transliterada
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La pauta del proyecto pide traducir Χριστός como «Mesías» cuando funciona como título. Aquí la expresión sigue siendo semánticamente transparente, así que la traducción mantiene el título y evita ocultar el sentido hebraico del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: 'Alcance de ἐν παντί: agradecimiento en toda circunstancia, no por el mal mismo'
  english_pob_reading: in everything
  chosen_spanish_reading: en todo
  alternative_spanish_readings:
  - en toda circunstancia
  - por todo
  rationale: «En todo» conserva la amplitud del griego y deja abierta la lectura contextual que limita el mandato a las circunstancias, no al mal en sí. El matiz evita una paráfrasis doctrinalmente cargada y respeta la tensión lexical documentada.
  doctrine_reference: BDAG on ἐν παντί; POB lexical note on circumstances
translation_notes:
  revision_awareness: La versión en inglés fue revisada y mantuvo su forma (sin cambios) tras la última pasada; el control cruzado reportó alta concordancia y veredicto de acuerdo. Esta propuesta sigue ese mismo alcance semántico, preservando las decisiones principales sobre ἐν παντί y Χριστός.
  spanish_consistency_notes:
  - Se usa «Mesías» de forma consistente para Χριστός cuando funciona como título, conforme al criterio del proyecto.
  - «Ustedes» mantiene un registro neutral latinoamericano y evita alternar con «vosotros».
  - La nota [a] conserva la tensión semántica entre dar gracias «en todo» y agradecer «por» todo, sin resolverla por paráfrasis.
