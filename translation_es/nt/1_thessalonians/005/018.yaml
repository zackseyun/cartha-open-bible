    rationale: El griego usa el demostrativo neutro τοῦτο, y el inglés POB lo mantiene como «this». En español, «esta» parece concordar con «voluntad» y desplaza el referente desde la exhortación previa hacia el sustantivo siguiente. «Esto» preserva mejor la referencia compacta del original.
  - severity: low
