revisions:
- from: Ahora les pedimos[a], hermanos, que reconozcan a los que trabajan entre ustedes y los dirigen en el Señor[c][b] y los amonestan.
  to: Ahora les pedimos[a], hermanos, que reconozcan a los que se esfuerzan entre ustedes y los guían en el Señor[b] y los amonestan.
  rationale: Se cambió «trabajan» por «se esfuerzan» para reflejar mejor κοπιῶντας, y «los dirigen» por «los guían» para alinearse con la decisión lexical auditada para προϊσταμένους. También se simplificaron las notas para que coincidan con las alternativas preservadas por el POB inglés y para evitar una nota española sintácticamente confusa. La nota sobre «los guían» se eliminó porque ahora esa es la lectura principal, no una alternativa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:35:12Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: una petición pastoral a la congregación para reconocer a quienes trabajan, ejercen liderazgo en el Señor y amonestan. Sin embargo, las notas b y c invierten el reparto documentado en la auditoría inglesa: en inglés la nota principal de alternativa para προϊσταμένους es «are over you in the Lord», mientras que el texto principal es «lead you in the Lord». El español puso «los dirigen» en el texto, pero nota c ofrece «los guían» y nota b mezcla «están sobre ustedes»/«los presiden» con una redacción algo confusa. Conviene alinear las notas con la lógica del POB inglés y mejorar levemente el peso de κοπιῶντας.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Ahora les pedimos, hermanos» funciona bien, y «reconozcan»/«amonestan» son adecuados. No obstante, «los dirigen» suena un poco más administrativo que «los guían», mientras que el inglés POB eligió una formulación menos rígida. Además, la nota b actual está sintácticamente torpe. Una pequeña revisión mejora fidelidad y fluidez.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Señor» para κύριος es correcto aquí. «Hermanos» con nota inclusiva sigue la política documentada. La principal cuestión es de alineación lexical con la decisión auditada sobre προϊσταμένους: conviene usar «los guían» en texto y reservar «están sobre ustedes» como alternativa más literal.'
  issues:
  - severity: medium
    issue: La alternativa principal para προϊσταμένους está desalineada con la auditoría inglesa.
    rationale: El inglés POB eligió «lead you» como texto principal y preservó «are over you» en nota. El español actual usa «los dirigen» en el texto, y además desplaza «los guían» a una nota separada, alterando la jerarquía de decisiones documentadas.
  - severity: medium
    issue: La nota b es confusa y no reproduce limpiamente la alternativa preservada.
    rationale: «O “están sobre ustedes” o “los presiden” los que trabajan entre ustedes» suena sintácticamente defectuoso y mezcla alternativas sin anclaje claro. Debe formularse de manera directa sobre la frase marcada.
  - severity: low
    issue: «Trabajan» atenúa el matiz de labor ardua en κοπιῶντας.
    rationale: Aunque es aceptable, «se esfuerzan» o «trabajan arduamente» reflejaría mejor el peso del participio. No es un error grave, pero puede mejorarse sin perder naturalidad.
  revised_spanish_text: Ahora les pedimos[a], hermanos, que reconozcan a los que se esfuerzan entre ustedes y los guían en el Señor[b] y los amonestan.
  revised_footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa «hermanos» como vocativo congregacional.
    reason: lexical_alternative
  - marker: b
    text: O «están sobre ustedes» en el Señor.
    reason: alternative_reading
  revision_rationale: Se cambió «trabajan» por «se esfuerzan» para reflejar mejor κοπιῶντας, y «los dirigen» por «los guían» para alinearse con la decisión lexical auditada para προϊσταμένους. También se simplificaron las notas para que coincidan con las alternativas preservadas por el POB inglés y para evitar una nota española sintácticamente confusa. La nota sobre «los guían» se eliminó porque ahora esa es la lectura principal, no una alternativa.
