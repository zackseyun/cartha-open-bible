translation:
  language: es
  text: Ahora les pedimos[a], hermanos, que reconozcan a los que se esfuerzan entre ustedes y los guían en el Señor[b] y los amonestan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa «hermanos» como vocativo congregacional.
    reason: lexical_alternative
  - marker: b
    text: O «están sobre ustedes» en el Señor.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐρωτῶμεν
  english_pob_choice: we ask
  chosen_spanish: les pedimos
  alternatives_spanish:
  - les rogamos
  - les pedimos encarecidamente
  - les solicitamos
  lexicon: BDAG
  rationale: El verbo introduce una súplica o exhortación pastoral, no una orden. «Les pedimos» conserva ese tono amable y natural en español sin endurecer el matiz.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  - Entonces
  lexicon: BDAG
  rationale: δέ marca transición discursiva suave. «Ahora» funciona bien para introducir la exhortación en español moderno.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, hermanas
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del vocativo como en el griego, con valor congregacional. En español «hermanos» es natural y puede abarcar a la congregación; la alternativa inclusiva se preserva como posibilidad interpretativa.
- source_word: εἰδέναι
  english_pob_choice: to acknowledge
  chosen_spanish: reconozcan
  alternatives_spanish:
  - reconocer
  - tomar en cuenta
  - valorar
  lexicon: BDAG
  rationale: En este contexto el verbo expresa reconocimiento relacional y apreciativo. «Reconozcan» comunica bien esa idea sin convertirla en simple conocimiento intelectual ni en obediencia explícita.
- source_word: κοπιῶντας
  english_pob_choice: those who labor
  chosen_spanish: a los que trabajan
  alternatives_spanish:
  - a los que se esfuerzan
  - a los que se afanan
  - a los que laboran
  lexicon: BDAG
  rationale: κοπιάω implica trabajo arduo. «Trabajan» es claro y natural en español; aunque pierde algo del matiz de fatiga, se compensa en la nota de decisión lexical al reconocer el sentido de esfuerzo.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en su medio
  - entre vosotros
  lexicon: BDAG
  rationale: La frase señala actividad dentro de la comunidad. «Entre ustedes» es el equivalente más natural en español latinoamericano y conserva la referencia congregacional.
- source_word: προϊσταμένους
  english_pob_choice: lead you
  chosen_spanish: los dirigen
  alternatives_spanish:
  - están sobre ustedes
  - los guían
  - los presiden
  lexicon: BDAG
  rationale: προΐστημι puede referirse a liderazgo u oversight. «Los dirigen» transmite autoridad funcional sin cargar una estructura eclesial rígida; se preserva la alternativa más literal en la nota.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - unidos al Señor
  - en la esfera del Señor
  lexicon: BDAG
  rationale: Se conserva la expresión estable «en el Señor», fiel al griego y comprensible en el registro eclesial. Aquí κύριος se traduce con el término doctrinal habitual «Señor».
- source_word: νουθετοῦντας
  english_pob_choice: admonish you
  chosen_spanish: los amonestan
  alternatives_spanish:
  - los exhortan
  - los advierten
  - los instruyen
  lexicon: BDAG
  rationale: νουθετέω incluye corrección y advertencia. «Amonestan» preserva mejor ese matiz que «aconsejan» o «exhortan».
theological_decisions:
- issue: Alcance de ἀδελφοί como vocativo congregacional
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: El texto griego usa la forma masculina plural, que puede funcionar como address congregacional inclusivo. Se mantiene la forma fuente en el texto principal y se deja abierta la lectura inclusiva sin sustituirla mecánicamente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Naturaleza del reconocimiento pedido a la iglesia
  english_pob_reading: to acknowledge
  chosen_spanish_reading: reconozcan
  alternative_spanish_readings:
  - respeten
  - tengan en cuenta
  - reconozcan y valoren
  rationale: La petición no formula obediencia absoluta ni veneración, sino reconocimiento apreciativo de quienes sirven. «Reconozcan» preserva esa tensión sin sobreinterpretarla.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
- issue: Sentido de προϊσταμένους ὑμῶν ἐν κυρίῳ
  english_pob_reading: lead you in the Lord
  chosen_spanish_reading: los dirigen en el Señor
  alternative_spanish_readings:
  - están sobre ustedes en el Señor
  - los guían en el Señor
  - los presiden en el Señor
  rationale: «Dirigen» mantiene la idea de liderazgo/oversight sin importar una terminología eclesiástica más específica de lo que exige el griego. La alternativa más literal «están sobre ustedes» queda preservada en la nota.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se reportaron cambios necesarios y el consenso de revisión fue alto/agregado. La redacción española conserva el tono pastoral de Ἐρωτῶμεν, el valor congregacional de ἀδελφοί, el reconocimiento relacional de εἰδέναι, y la combinación de liderazgo/corrección en προϊσταμένους y νουθετοῦντας.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, coherente con el defecto doctrinal del proyecto.
  - Se usa «hermanos» como vocativo congregacional, con nota inclusiva para evitar borrar el género gramatical del fuente.
  - Se conserva el orden y la acumulación de participios del griego mediante una sola oración coordinada en español, sin explicitar más de lo que el texto dice.
  - Se evita traducir προϊσταμένους con una terminología eclesiástica demasiado técnica; «dirigen» mantiene amplitud semántica.
  - El asterisco de corrección/apremio de νουθετοῦντας se expresa con «amonestan», que retiene el matiz correctivo.
