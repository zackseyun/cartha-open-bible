translation:
  language: es
  text: Saluden a todos los hermanos[a] con un beso santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todos los hermanos y hermanas», ya que «hermanos» puede referirse a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: El «beso santo» era una señal culturalmente reconocida de comunión y afecto cristianos.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Saluden
  alternatives_spanish:
  - Den saludos a
  - Saluden a
  lexicon: BDAG
  rationale: El imperativo exhortativo de ἀσπάζομαι aquí pide una fórmula breve y natural en español. «Saluden» conserva el valor social de la acción sin sobretraducirla.
- source_word: τοὺς ἀδελφοὺς πάντας
  english_pob_choice: all the brothers
  chosen_spanish: todos los hermanos
  alternatives_spanish:
  - todos los hermanos y hermanas
  - todos los creyentes
  lexicon: BDAG
  rationale: El griego usa el plural masculino ἀδελφοὺς con πάντας. En español, «hermanos» mantiene la forma del original; la posibilidad inclusiva se documenta en nota porque el referente puede abarcar a toda la comunidad creyente.
- source_word: ἐν φιλήματι ἁγίῳ
  english_pob_choice: with a holy kiss
  chosen_spanish: con un beso santo
  alternatives_spanish:
  - con un beso sagrado
  - con el beso santo
  lexicon: BDAG
  rationale: ἐν expresa aquí modo o medio, que en español se vierte naturalmente con «con». Φίλημα significa «beso», y ἅγιος califica ese beso como santo/consagrado dentro de la comunión cristiana; «beso santo» preserva la fuerza lexical sin caer en una perífrasis innecesaria.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en una instrucción congregacional
  english_pob_reading: brothers; possible inclusive sense preserved in footnote
  chosen_spanish_reading: hermanos, con nota sobre posible referencia inclusiva a la comunidad entera
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - creyentes
  rationale: La forma griega es masculina plural y la POB inglesa conserva esa precisión en el texto principal. En español, mantener «hermanos» respeta la forma fuente; la nota preserva la alternativa inclusiva porque el contexto probablemente abarca a toda la congregación.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Valor de ἐν φιλήματι ἁγίῳ como gesto cristiano reconocido
  english_pob_reading: holy kiss as culturally recognized sign of Christian fellowship and affection
  chosen_spanish_reading: beso santo como señal culturalmente reconocida de comunión y afecto cristianos
  alternative_spanish_readings:
  - beso sagrado
  - beso de santidad
  rationale: La expresión debe mantenerse concreta, no reinterpretarse como mera cordialidad. «Beso santo» conserva la expresión tradicional y también la dimensión de práctica reconocible dentro de la comunidad cristiana, tal como refleja el audit trail inglés.
  doctrine_reference: English POB cultural note on the holy kiss
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el pasaje quedó con alta concordancia y sin observaciones, por lo que el borrador español sigue directamente la lectura auditada del griego y del texto inglés POB.'
  spanish_consistency_notes:
  - Se mantiene la distinción entre «hermanos» en el texto principal y la alternativa inclusiva en nota, siguiendo la precisión morfológica del griego.
  - «Beso santo» conserva el paralelismo con el inglés POB «holy kiss» y evita suavizar el gesto a una simple fórmula de saludo.
  - Se usa «Saluden» como imperativo plural natural en español, equivalente funcional del exhortativo griego.
