translation:
  language: es
  text: Y les exhortamos[a], hermanos, amonesten a los desordenados[b], alienten a los desalentados[c], sostengan a los débiles[d], sean pacientes con todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; Pablo se dirige a la congregación como un todo.
    reason: alternative_reading
  - marker: b
    text: O «los ociosos» o «los indisciplinados» para «los desordenados».
    reason: lexical_alternative
  - marker: c
    text: O «consuelen a los desalentados».
    reason: lexical_alternative
  - marker: d
    text: O «apoyen a los débiles».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλοῦμεν
  english_pob_choice: we urge
  chosen_spanish: les exhortamos
  alternatives_spanish:
  - les rogamos
  - les animamos
  lexicon: BDAG
  rationale: En este contexto parenético, παρακαλέω introduce una exhortación apostólica seria. «Exhortamos» conserva mejor la fuerza de llamado pastoral que «animamos», y es más natural en español bíblico actual que una perífrasis como «les urgimos».
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ marca continuación de la serie exhortativa, no contraste fuerte. «Y» comunica la transición de forma natural en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermandad
  lexicon: BDAG
  rationale: La forma griega masculina plural se conserva como vocativo plural en español con «hermanos». En el contexto, Pablo se dirige a toda la congregación, pero el texto fuente mantiene la forma masculina; por eso se documenta la posible lectura inclusiva en nota.
- source_word: νουθετεῖτε
  english_pob_choice: admonish
  chosen_spanish: amonesten
  alternatives_spanish:
  - adviertan
  - corrijan
  lexicon: BDAG
  rationale: νουθετέω combina instrucción correctiva y amonestación pastoral. «Amonesten» preserva ese peso más fielmente que «adviertan», que puede sonar demasiado débil, y que «corrijan», que estrecha el sentido.
- source_word: ἀτάκτους
  english_pob_choice: the disorderly
  chosen_spanish: los desordenados
  alternatives_spanish:
  - los ociosos
  - los indisciplinados
  - los desordenados y rebeldes
  lexicon: BDAG
  rationale: Ἄτακτος sugiere estar fuera de orden o desalineado. «Desordenados» mantiene la amplitud semántica sin reducirlo de entrada a la idea de pereza; se conserva la alternativa contextual de «ociosos» en nota.
- source_word: παραμυθεῖσθε
  english_pob_choice: encourage
  chosen_spanish: animen
  alternatives_spanish:
  - consuelen
  - alienten
  lexicon: BDAG
  rationale: El verbo implica hablar con bondad para fortalecer o tranquilizar. «Animen» encaja bien en la lista exhortativa y puede cubrir el matiz de consuelo/ánimo sin sonar demasiado abstracto.
- source_word: ὀλιγοψύχους
  english_pob_choice: the fainthearted
  chosen_spanish: los desalentados
  alternatives_spanish:
  - los de poco ánimo
  - los apocados
  - los temerosos
  lexicon: BDAG
  rationale: Ὀλιγόψυχος designa a quienes tienen el ánimo pequeño o están decaídos. «Desalentados» comunica bien ese estado en español; «de poco ánimo» sería más literal, pero menos idiomático.
- source_word: ἀντέχεσθε
  english_pob_choice: help
  chosen_spanish: sostengan
  alternatives_spanish:
  - apóyense en
  - ayuden
  - adhiéranse a
  lexicon: BDAG
  rationale: Con genitivo, ἀντέχομαι puede implicar aferrarse a, sostener o apoyar a alguien. En este contexto pastoral, «sostengan» comunica apoyo práctico sin perder la idea relacional que «help» expresa en inglés.
- source_word: τῶν ἀσθενῶν
  english_pob_choice: the weak
  chosen_spanish: a los débiles
  alternatives_spanish:
  - a los flacos
  - a los enfermos
  - a los frágiles
  lexicon: BDAG
  rationale: ἀσθενής puede abarcar debilidad física, social o moral. «Débiles» conserva esa amplitud y es el equivalente español más directo y sobrio.
- source_word: μακροθυμεῖτε
  english_pob_choice: be patient
  chosen_spanish: sean pacientes
  alternatives_spanish:
  - tengan paciencia
  - sean longánimos
  lexicon: BDAG
  rationale: Μακροθυμέω denota paciencia perseverante hacia personas. «Sean pacientes» es la forma más clara y natural en español moderno, sin perder el matiz de perseverancia interpersonal.
- source_word: πρὸς πάντας
  english_pob_choice: with everyone
  chosen_spanish: con todos
  alternatives_spanish:
  - para con todos
  - hacia todos
  lexicon: BDAG
  rationale: Con πρός y acusativo, la orientación es hacia personas. «Con todos» es idiomático en español y conserva el alcance universal del mandato.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en la dirección congregacional
  english_pob_reading: Render as 'brothers' in the main text, preserving the likely mixed-gender audience in a footnote.
  chosen_spanish_reading: Mantener «hermanos» en el texto principal y documentar en nota que el sentido probablemente incluye a toda la congregación.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermandad
  rationale: La forma fuente es masculina plural vocativa. Para respetar la forma lingüística original sin borrar el carácter probablemente inclusivo del saludo, se conserva «hermanos» y se explica la posible inclusión de hombres y mujeres en una nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios y que el texto quedó estable; el presente borrador sigue de cerca el paquete fuente griego y el audit trail inglés, sin introducir ajustes doctrinales o textuales adicionales.
  spanish_consistency_notes:
  - Se conserva la secuencia imperativa plural para reflejar la serie de mandatos del griego.
  - «Hermanos» se usa como vocativo plural masculino, con nota de posible inclusión congregacional.
  - «Desordenados», «desalentados» y «débiles» mantienen la amplitud semántica de los adjetivos griegos sin estrecharlos indebidamente.
  - La última cláusula se traduce con una preposición interpersonal natural en español, «con todos», para comunicar el alcance universal de πρὸς πάντας.
