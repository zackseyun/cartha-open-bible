translation:
  language: es
  text: Hermanos[a], oren por nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hermanos y hermanas», pues el saludo probablemente incluye a toda la congregación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos y hermanas en la fe
  - Hermanos/as
  lexicon: BDAG
  rationale: El vocativo plural de ἀδελφός se refleja de manera directa con 'Hermanos'. En español, 'Hermanos' funciona de forma natural como apelativo congregacional masculino formal, mientras que la posible inclusión de mujeres se preserva en nota para no borrar la forma griega ni imponer una paráfrasis demasiado explícita en el texto principal.
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - sigan orando
  - praying
  lexicon: BDAG
  rationale: El imperativo presente de προσεύχομαι se traduce de forma natural con 'oren'. La idea aspectual de acción continua puede inferirse, pero no es necesario hacerla explícita en la línea principal dada la brevedad de la exhortación.
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - acerca de nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: Con genitivo de referencia/relación en contexto de oración, περί se expresa bien como 'por'. 'Por nosotros' es idiomático en español y mantiene el sentido de petición intercesora sin sobrecargar el texto.
- source_word: ἡμῶν
  english_pob_choice: us
  chosen_spanish: nosotros
  alternatives_spanish:
  - a nosotros
  - me y mis compañeros
  lexicon: BDAG
  rationale: El pronombre de primera persona plural se conserva simplemente como 'nosotros', sin especificar más allá del texto. Así se respeta la referencia a Pablo y sus compañeros de trabajo sin añadir contenido no expresado.
theological_decisions:
- issue: Posible referencia inclusiva de Ἀδελφοί en una congregación mixta
  english_pob_reading: Brothers, with a footnote allowing 'Brothers and sisters' as the likely inclusive sense.
  chosen_spanish_reading: Hermanos, con nota que permite 'Hermanos y hermanas' como sentido probablemente inclusivo.
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Hermanos y hermanas en la fe
  rationale: Se conserva en el texto principal la forma más cercana al griego y a la práctica POB de distinguir la forma masculina cuando está presente en el original, mientras la nota mantiene abierta la lectura inclusiva probable por el contexto congregacional.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Sin revisiones aplicadas; el pasaje presenta alta concordancia con el control cruzado y no requiere ajuste respecto del flujo auditado en inglés.
  spanish_consistency_notes:
  - Se mantiene el apelativo congregacional en plural con puntuación breve y directa, adecuada para una exhortación epistolar.
  - Se evita 'SEÑOR' u otras sustituciones no motivadas porque el versículo no contiene el nombre divino.
  - La combinación 'oren por nosotros' conserva el tono intercesor natural en español y corresponde al breve imperativo del griego.
