revisions:
- from: Ahora, en cuanto a los tiempos y los momentos[a], hermanos, no tienen necesidad de que se les escriba[b],
  to: En cuanto a los tiempos y los tiempos señalados[b], hermanos[a], no tienen necesidad de que se les escriba nada,
  rationale: Se ajusta καιροί a «tiempos señalados» para conservar mejor el valor del par escatológico χρόνων/καιρῶν; se mueve la nota cultural al lugar correcto; se simplifica la transición a un español más natural; y se explicita «nada» para reflejar con claridad la idea de que no hace falta escribirles ninguna instrucción adicional.
