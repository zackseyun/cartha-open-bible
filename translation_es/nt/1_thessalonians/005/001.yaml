translation:
  language: es
  text: En cuanto a los tiempos y los tiempos señalados[b], hermanos[a], no tienen necesidad de que se les escriba nada,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y probablemente se dirige a toda la comunidad creyente.
    reason: lexical_alternative
  - marker: b
    text: «Tiempos y tiempos señalados» es una expresión pareja para períodos y momentos fijados, especialmente en un contexto escatológico.
    reason: cultural_note
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora, en cuanto a
  alternatives_spanish:
  - Con respecto a
  - En cuanto a
  lexicon: περί
  rationale: Περὶ introduce el tema; δὲ marca transición discursiva. «Ahora, en cuanto a» conserva la apertura temática y suena natural en español, sin volverlo una oposición más fuerte de lo que exige el griego.
- source_word: τῶν χρόνων
  english_pob_choice: the times
  chosen_spanish: los tiempos
  alternatives_spanish:
  - los tiempos
  - los períodos
  lexicon: χρόνος
  rationale: χρόνος nombra el tiempo en su extensión o duración. «Los tiempos» reproduce bien el plural articulado y mantiene la resonancia escatológica del pasaje.
- source_word: τῶν καιρῶν
  english_pob_choice: the seasons
  chosen_spanish: los momentos
  alternatives_spanish:
  - los tiempos señalados
  - los períodos oportunos
  - las estaciones
  lexicon: καιρός
  rationale: καιρός suele señalar un momento oportuno, fijado o señalado. En español, «momentos» comunica mejor esa puntualidad que «estaciones», aunque se pierde la pareja tradicional inglesa; se conserva la distinción semántica frente a χρόνοι.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: ἀδελφός
  rationale: El vocativo plural masculino se conserva como «hermanos», siguiendo la forma griega y la decisión POB de no sustituirla por una redacción inclusiva en el texto principal; el sentido comunitario amplio queda implícito.
- source_word: οὐ χρείαν ἔχετε
  english_pob_choice: you have no need
  chosen_spanish: no tienen necesidad
  alternatives_spanish:
  - no necesitan
  - no les hace falta
  lexicon: χρεία
  rationale: La locución expresa falta de necesidad. En español, «no tienen necesidad» sigue de cerca la construcción griega y mantiene la fuerza idiomática sin añadir matices ajenos.
- source_word: ὑμῖν γράφεσθαι
  english_pob_choice: to have anything written to you
  chosen_spanish: de que se les escriba
  alternatives_spanish:
  - de que algo se les escriba
  - de recibir escritura
  lexicon: γράφω
  rationale: El infinitivo pasivo deja implícito al escritor. «De que se les escriba» conserva la pasiva impersonal y evita insertar un sujeto inexistente en el griego; la idea de «algo» queda sobrentendida por el contexto.
theological_decisions:
- issue: Alcance de ἀδελφοί en la congregación
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se preserva la forma masculina plural del vocativo, tal como en el griego y en la línea de la POB inglesa, mientras el posible alcance inclusivo del grupo se reconoce en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Par de términos escatológicos χρόνους / καιρούς
  english_pob_reading: the times and the seasons
  chosen_spanish_reading: los tiempos y los momentos
  alternative_spanish_readings:
  - los tiempos y las estaciones
  - los tiempos y los tiempos señalados
  rationale: La expresión griega es un par semántico para duración/época y momento señalado. «Tiempos y momentos» conserva la distinción sin forzar un tecnicismo poco natural en español, manteniendo la referencia escatológica.
  doctrine_reference: DOCTRINE.md lexical consistency notes
translation_notes:
  revision_awareness: Se tuvo en cuenta el pase de revisión inglés que ajustó la segunda cláusula para sonar más natural sin alterar el sentido; por eso el español evita una pasiva demasiado rígida y usa una impersonal natural («se les escriba») que conserva la pasiva del griego. También se mantuvo la distinción entre χρόνοι y καιροί con una pareja española que suena idiomática.
  spanish_consistency_notes:
  - Se conserva «hermanos» en el texto principal por fidelidad a ἀδελφοί y se añade nota inclusiva, siguiendo la práctica documentada.
  - «Momentos» se eligió para καιροί para diferenciarlo de χρόνοι y evitar calcar mecánicamente «estaciones» cuando suena menos natural en español.
  - La pasiva impersonal «se les escriba» mantiene el sujeto implícito del griego y evita introducir un agente no expresado.
