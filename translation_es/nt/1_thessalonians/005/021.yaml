lexical_decisions:
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto
  lexicon: BDAG
  rationale: El acusativo neutro plural tiene alcance amplio y no trae un sustantivo explícito; en español, «todo» comunica mejor esa amplitud de forma natural que una expresión más pesada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave con matiz adversativo respecto de las instrucciones previas. «Pero» conserva ese giro sin exagerarlo.
- source_word: δοκιμάζετε
  english_pob_choice: test
  chosen_spanish: examinen
  alternatives_spanish:
  - prueben
  - disciernan tras examinar
  lexicon: BDAG
  rationale: El imperativo presente pide evaluación continua. «Examinen» expresa bien la acción de poner a prueba para discernir la autenticidad o valor, y suena natural en español bíblico contemporáneo.
- source_word: τὸ καλὸν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo que es bueno
  - el bien
  lexicon: BDAG
  rationale: La expresión articular neutra funciona sustantivamente. «Lo bueno» mantiene la fuerza de aquello que ha sido evaluado como bueno, sin volverla abstracta o filosófica.
- source_word: κατέχετε
  english_pob_choice: hold fast to
  chosen_spanish: retengan
  alternatives_spanish:
  - aférrese a
  - conserven
  lexicon: BDAG
  rationale: El verbo pide adhesión firme y continua a lo que resulta bueno. «Retengan» comunica la idea de mantener y no soltar con claridad y naturalidad en plural imperativo.
theological_decisions:
- issue: Alcance de πάντα en relación con el contexto inmediato
  english_pob_reading: Rendered comprehensively as 'everything' while allowing the immediate context to guide application, especially the testing of prophetic utterances.
  chosen_spanish_reading: Traducido de manera amplia como «todo», dejando que el contexto inmediato oriente su aplicación, en particular respecto de las profecías mencionadas antes.
  alternative_spanish_readings:
  - examinen todas las profecías
  - examinen todo lo que se dice
  rationale: El griego usa un término general sin un sustantivo restringido. La traducción conserva esa amplitud y no reduce indebidamente el mandato, aunque el contexto cercano incluya la evaluación de profecías.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla interpretativamente.'
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con el cierre revisado del POB inglés; no se registran cambios posteriores que requieran ajuste adicional.
  spanish_consistency_notes:
  - Se mantiene un registro verbal en plural («examinen», «retengan») porque el griego manda a la comunidad.
  - Se evita «Cristo», «SEÑOR» o terminología doctrinal no presente en el versículo.
  - La nota al pie conserva la alternativa lexical amplia sin estrechar indebidamente el alcance de πάντα.
