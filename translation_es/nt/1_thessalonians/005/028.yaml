translation:
  language: es
  text: La gracia de nuestro Señor Jesús Mesías[a] sea con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, tradicionalmente: «La gracia de nuestro Señor Jesucristo sea con ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: En las bendiciones paulinas, χάρις nombra la realidad salvadora y benéfica de Dios; en español, «gracia» es el equivalente más preciso y natural, y conserva el valor teológico sin diluirlo en una idea meramente subjetiva de favor.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: κύριος funciona aquí como título cristológico. «Señor» conserva su peso reverencial y es el equivalente normal y claro en español para este contexto.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: convención estándar de nombres propios
  rationale: El nombre propio se vierte de manera estándar en español como «Jesús».
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Como título, Χριστός se traduce preferentemente «Mesías» para mantener visible el sentido mesiánico hebraico. En español, «Jesús Mesías» es comprensible y conserva esa fuerza titular; «Cristo» queda como alternativa tradicional.
- source_word: μεθ’ ὑμῶν
  english_pob_choice: be with you
  chosen_spanish: sea con ustedes
  alternatives_spanish:
  - esté con ustedes
  - con ustedes
  lexicon: BDAG
  rationale: El griego es una fórmula de bendición sin verbo explícito; en español conviene suplirlo con una construcción natural. «Sea con ustedes» reproduce mejor el tono de deseo/bendición que una simple frase nominal.
theological_decisions:
- issue: Título mesiánico de Χριστός en una bendición paulina
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La decisión del POB inglés privilegia el valor titular de Χριστός. En español, «Mesías» preserva ese contenido semántico y evita ocultarlo bajo el uso ya lexicalizado de «Cristo» como nombre religioso.
  doctrine_reference: 'DOCTRINE.md: contested terms; translate titles, preserve name-like forms when warranted'
- issue: Fórmula de cierre sin verbo explícito
  english_pob_reading: be with you
  chosen_spanish_reading: sea con ustedes
  alternative_spanish_readings:
  - esté con ustedes
  - con ustedes
  rationale: El griego presenta una bendición elíptica. Añadir «sea» es una suplencia idiomática en español para expresar el deseo implícito sin introducir contenido ajeno.
  doctrine_reference: Estructura benedictoria del griego koiné
translation_notes:
  revision_awareness: El control de revisión en el paquete inglés indica que no hubo cambios respecto del último pase. La presente propuesta mantiene esa estabilidad y solo adapta la formulación al español, preservando la decisión titular «Mesías» y la bendición elíptica del original.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio y «Mesías» como título, evitando la forma compuesta tradicional «Jesucristo» para no borrar la distinción lexical documentada.
  - Se mantiene el registro de bendición litúrgica en una frase breve y directa.
  - Se emplea «ustedes» como segunda persona plural neutra y ampliamente comprensible en español bíblico actual.
