revisions:
- from: Pero ustedes, hermanos, no están en tinieblas[a], para que el día los sorprenda como ladrón[b].
  to: Pero ustedes[a], hermanos, no están en tinieblas[b], de modo que el día los sorprenda como un ladrón.
  rationale: Se cambia «para que» por «de modo que» para reflejar mejor la función de ἵνα en contexto como resultado/circunstancia consecuente y evitar una lectura de propósito en español. Se añade el artículo en «como un ladrón» para una comparación más natural y clara. Se conservan las notas existentes, pero se reubican para que [a] ancle el pronombre enfático «ustedes» y [b] ancle «tinieblas», siguiendo el patrón de la auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T22:02:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: contraste enfático («Pero ustedes»), vocativo «hermanos», metáfora «en tinieblas», referencia contextual «el día» y comparación con ladrón. Sin embargo, «para que» en español suena más final que resultativo aquí, y «sorprenda como ladrón» desplaza levemente el griego, donde «como ladrón» modifica la manera en que el día los alcanza/sobreviene, no necesariamente describe al ladrón como agente de sorpresa separado. Una formulación más fiel y natural es «de modo que el día no los tome por sorpresa como un ladrón» o similar; pero dado que el griego no incluye explícitamente «no», conviene conservar la estructura con una expresión resultativa sin sobreexplicitar.'
  spanish_quality_summary: El español es claro y legible, con tono bíblico natural. No obstante, «para que el día los sorprenda» puede leerse en español como propósito indeseable, no como consecuencia evitada, y «como ladrón» sin artículo resulta algo brusco tras «sorprenda». Un ajuste menor mejora la fluidez y la precisión semántica.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Hermanos» respeta la decisión documentada para ἀδελφοί, con nota inclusiva adecuada. «Tinieblas» es una buena elección para σκότει. No aparecen términos de glosario mayor como Yahvé/Mesías.
  issues:
  - severity: medium
    issue: «para que» representa ἵνα de forma menos natural en este contexto español
    rationale: Aunque es una equivalencia posible, aquí ἵνα expresa una consecuencia/resultado vinculado a no estar en tinieblas. «Para que» en español suele oírse más como finalidad. «De modo que» preserva mejor la relación sin sobreinterpretar.
  - severity: medium
    issue: «los sorprenda como ladrón» suena algo ambiguo y menos fiel al alcance de καταλάβῃ + ὡς κλέπτης
    rationale: El griego expresa que el día no los alcance/overtome ‘como un ladrón’. «Sorprenda» es posible, pero combinado con «como ladrón» puede sonar a que el día actúa ‘disfrazado’ de ladrón. «los sorprenda como un ladrón» mejora algo; aun mejor, «los tome por sorpresa como un ladrón» sería más explícito pero más interpretativo.
  revised_spanish_text: Pero ustedes[a], hermanos, no están en tinieblas[b], de modo que el día los sorprenda como un ladrón.
  revised_footnotes:
  - marker: a
    text: O, con sentido inclusivo, «hermanos y hermanas».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el día del Señor en el contexto inmediato.
    reason: cross_reference
  revision_rationale: Se cambia «para que» por «de modo que» para reflejar mejor la función de ἵνα en contexto como resultado/circunstancia consecuente y evitar una lectura de propósito en español. Se añade el artículo en «como un ladrón» para una comparación más natural y clara. Se conservan las notas existentes, pero se reubican para que [a] ancle el pronombre enfático «ustedes» y [b] ancle «tinieblas», siguiendo el patrón de la auditoría inglesa.
