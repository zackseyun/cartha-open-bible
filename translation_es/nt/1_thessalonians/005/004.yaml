translation:
  language: es
  text: Pero ustedes[a], hermanos, no están en tinieblas[b], de modo que el día los sorprenda como un ladrón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, con sentido inclusivo, «hermanos y hermanas».
    reason: lexical_alternative
  - marker: b
    text: Es decir, el día del Señor en el contexto inmediato.
    reason: cross_reference
lexical_decisions:
- source_word: ὑμεῖς δέ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero ustedes mismos
  - Pero en cuanto a ustedes
  lexicon: BDAG
  rationale: δέ introduce contraste, y el pronombre explícito ὑμεῖς aporta énfasis. «Pero ustedes» conserva el contraste y la fuerza enfática sin resultar forzado en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El vocativo plural masculino se mantiene de forma literal y natural. En una nota puede expresarse el sentido inclusivo si se desea, pero el texto principal conserva la forma del original.
- source_word: ἐν σκότει
  english_pob_choice: in darkness
  chosen_spanish: en tinieblas
  alternatives_spanish:
  - en la oscuridad
  - a oscuras
  lexicon: BDAG
  rationale: La metáfora de σκότος se conserva con «tinieblas», que es bíblico y natural en español. «En la oscuridad» es posible, pero «tinieblas» mantiene mejor la resonancia teológica y figurada.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - con el fin de que
  lexicon: BDAG
  rationale: En este contexto ἵνα expresa la relación entre la condición de no estar en tinieblas y el hecho de que el día no sorprenda a los destinatarios. «Para que» es la equivalencia más directa y fluida en español.
- source_word: ἡ ἡμέρα
  english_pob_choice: the day
  chosen_spanish: el día
  alternatives_spanish:
  - aquel día
  - el Día
  lexicon: BDAG
  rationale: Se conserva el artículo sin imponer una mayor explicitación en el texto principal. El referente escatológico se entiende por el contexto inmediato.
- source_word: ὡς κλέπτης
  english_pob_choice: like a thief
  chosen_spanish: como ladrón
  alternatives_spanish:
  - como un ladrón
  - cual ladrón
  lexicon: BDAG
  rationale: El símil se mantiene con «como ladrón». La omisión del artículo indefinido es natural en español proverbial y reproduce con sobriedad el giro comparativo.
- source_word: καταλάβῃ
  english_pob_choice: would overtake
  chosen_spanish: sorprenda
  alternatives_spanish:
  - alcance
  - les tome por sorpresa
  - los sorprenda
  lexicon: BDAG
  rationale: καταλαμβάνω aquí tiene la idea de alcanzar de manera inesperada o tomar desprevenido. «Sorprenda» comunica bien ese efecto en español. Se evita «alcance» por ser menos explícito respecto de la inesperada irrupción del día.
theological_decisions:
- issue: Sentido inclusivo de ἀδελφοί en una congregación mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se mantiene la forma masculina plural del original en el texto principal, sin convertirla en una paráfrasis inclusiva. El posible alcance mixto puede anotarse aparte, siguiendo el criterio de conservar la forma fuente y la tensión documental.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Referente escatológico de ἡ ἡμέρα
  english_pob_reading: the day
  chosen_spanish_reading: el día
  alternative_spanish_readings:
  - aquel día
  - el Día del Señor
  rationale: El griego dice literalmente «el día»; la identificación con el contexto inmediato no requiere introducir el título completo en el cuerpo del texto. Así se preserva la economía del original y la aclaración puede quedar para nota.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés y no muestra revisiones aplicadas; se mantuvo la lectura óptima con ajuste de estilo español: «tinieblas» para σκότος y «sorprenda» para καταλάβῃ, preservando el contraste, el símil y el referente escatológico sin sobreatribución.'
  spanish_consistency_notes:
  - Se conservó el vocativo plural masculino «hermanos» como forma literal y de uso bíblico en el texto principal.
  - Se prefirió «tinieblas» frente a «oscuridad» para mantener la imagen metafórica y la terminología bíblica recurrente.
  - Se evitó capitalizar «día» en el cuerpo del texto para no sobreinterpretar la referencia escatológica.
  - El símil con ladrón se expresó con «como ladrón» y no con una formulación más explicativa.
  - La nota inclusiva en español refleja el mismo tipo de alternativa documentada en el audit trail inglés.
