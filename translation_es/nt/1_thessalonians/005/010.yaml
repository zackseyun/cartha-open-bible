translation:
  language: es
  text: quien murió por nosotros, para que, ya sea que estemos despiertos[a] o dormidos, vivamos juntamente con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea que estemos vigilantes o dormidos». La frase puede resonar con la exhortación a la vigilancia del contexto, aunque aquí probablemente alude a si los creyentes están vivos o han muerto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποθανόντος
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - habiendo muerto
  - que murió
  lexicon: BDAG
  rationale: El participio aoristo modifica al antecedente implícito de la frase anterior; en español, una cláusula relativa con pasado simple es natural y fiel. «Murió» conserva la acción concluida sin añadir una estructura más pesada como «habiendo muerto».
- source_word: περὶ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: En este contexto soteriológico, περί con genitivo expresa beneficio/representación. «Por nosotros» es una equivalencia natural en español y no especifica más de lo que el griego requiere.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad o resultado. «Para que» preserva bien la fuerza telica del griego y suena natural en español actual.
- source_word: γρηγορῶμεν
  english_pob_choice: we are awake
  chosen_spanish: estemos despiertos
  alternatives_spanish:
  - velamos
  - estemos vigilantes
  lexicon: BDAG
  rationale: La imagen se mantiene ambigua entre vigilia literal y vigilancia metafórica. En español, «estemos despiertos» conserva esa ambigüedad mejor que resolverla como «velamos» o «estemos vigilantes».
- source_word: καθεύδωμεν
  english_pob_choice: asleep
  chosen_spanish: dormidos
  alternatives_spanish:
  - durmamos
  - estemos dormidos
  lexicon: BDAG
  rationale: Para equilibrar el contraste con «despiertos», «dormidos» es idiomático y conserva la metáfora. Además permite mantener la posible referencia a la muerte sin explicitarla en el texto principal.
- source_word: ἅμα
  english_pob_choice: together
  chosen_spanish: juntamente
  alternatives_spanish:
  - a la vez
  - al mismo tiempo
  lexicon: BDAG
  rationale: ἅμα funciona adverbialmente con σύν para expresar vida compartida. «Juntamente» evita redundancia innecesaria y suena más natural que una doble equivalencia pesada.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: σύν marca unión o asociación. Dado que ἅμα ya aporta la idea de simultaneidad o unión, «con él» basta en español y preserva el sentido sin redundancia.
- source_word: ζήσωμεν
  english_pob_choice: we may live
  chosen_spanish: vivamos
  alternatives_spanish:
  - podamos vivir
  - vivamos con
  lexicon: BDAG
  rationale: El subjuntivo aoristo con ἵνα expresa finalidad o resultado. En español, «vivamos» es conciso y natural; la idea de vida compartida queda reforzada por «juntamente con él».
theological_decisions:
- issue: Sentido de «despiertos o dormidos»
  english_pob_reading: Se refiere principalmente a estar vivos o muertos, no solo a vigilancia moral.
  chosen_spanish_reading: Se mantiene la ambigüedad entre estar despiertos/dormidos y la posible referencia a vivos/muertos.
  alternative_spanish_readings:
  - Se refiere solo a vigilancia ética versus descuido espiritual.
  - Se traduce explícitamente como vivos o muertos.
  rationale: El contexto inmediato permite una lectura de vigilancia, pero el trasfondo de 1 Tesalonicenses 4:13–15 favorece también la metáfora de vida y muerte. La traducción conserva la imagen sin resolverla en el texto principal.
  doctrine_reference: Mantener la tensión interpretativa del pasaje; no forzar una sola glosa en el versículo.
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y concuerda con el juicio de alta concordancia del audit trail inglés; no se introdujeron revisiones adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino solo cuando aparezca; este versículo no lo contiene.
  - Se evita «Cristo» porque el texto fuente aquí no usa Χριστός en la forma dada; el antecedente implícito queda sin añadir título.
  - La coordinación «despiertos o dormidos» conserva la ambigüedad documentada en el audit trail inglés.
  - «Juntamente con él» refleja la combinación de ἅμα + σύν sin sobrecargar el castellano.
