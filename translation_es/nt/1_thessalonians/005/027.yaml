    text: O «por el Señor». La expresión griega puede significar que Pablo les hace este encargo solemne invocando al Señor como autoridad.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» probablemente se refiere a toda la congregación, incluidas las mujeres; el griego ἀδελφοῖς es masculino plural.
    reason: lexical_alternative
  revision_rationale: La revisión mantiene con más precisión la fuerza de ἐνορκίζω mediante «les pongo bajo juramento», evita el registro peninsular de «os conjuro», mejora la naturalidad sintáctica en español general, y alinea mejor la elección principal para τὸν κύριον con el audit trail inglés mediante «ante el Señor», conservando «por el Señor» como alternativa en nota. Se retiene «hermanos» con nota explicativa para respetar la decisión teológica documentada.
