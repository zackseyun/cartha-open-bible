revisions:
- from: Os conjuro por el Señor a que esta carta[a] sea leída a todos los hermanos[b].
  to: Les pongo bajo juramento ante el Señor[a] que esta carta sea leída a todos los hermanos[b].
  rationale: La revisión mantiene con más precisión la fuerza de ἐνορκίζω mediante «les pongo bajo juramento», evita el registro peninsular de «os conjuro», mejora la naturalidad sintáctica en español general, y alinea mejor la elección principal para τὸν κύριον con el audit trail inglés mediante «ante el Señor», conservando «por el Señor» como alternativa en nota. Se retiene «hermanos» con nota explicativa para respetar la decisión teológica documentada.
