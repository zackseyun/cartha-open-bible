  timestamp: '2026-05-07T21:15:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ἐνορκίζω conserva una carga solemne, ἀναγνωσθῆναι se mantiene en pasiva, y πᾶσιν τοῖς ἀδελφοῖς se traduce fielmente como «a todos los hermanos» con nota inclusiva. Sin embargo, «Os conjuro» suena peninsular/arcaizante para el español meta y no encaja bien con el encargo de español neutral latinoamericano. Además, la combinación «por el Señor» en el texto principal es posible, pero la nota inglesa presenta «by the Lord» como alternativa y «before the Lord» como elección principal; en español, «ante el Señor» comunica mejor esa solemnidad sin sugerir una fórmula de juramento menos clara.'
  spanish_quality_summary: La redacción actual es comprensible, pero «Os conjuro» y «a que» resultan poco naturales para el registro neutral latinoamericano. Una formulación como «Les pongo bajo juramento ante el Señor que esta carta sea leída...» preserva mejor la fuerza léxica y mejora la fluidez. También conviene evitar el voseo peninsular «os» para ajustarse al objetivo de neutralidad amplia.
  glossary_alignment: 'La terminología clave está mayormente alineada: κύριος como «Señor» es defendible aquí por tratarse de la fórmula griega y no de una cita del Tetragrámaton; ἀδελφοῖς como «hermanos» sigue la política de precisión de género con nota aclaratoria. La principal desalineación es estilística y de registro, no terminológica.'
  issues:
  - severity: medium
    issue: Registro peninsular y poco neutral en «Os conjuro»
    rationale: El proyecto pide español neutral latinoamericano/broadly church-readable. «Os» y «conjuro» suenan marcadamente peninsulares o literarios; «les pongo bajo juramento» comunica mejor ἐνορκίζω en español general.
  - severity: medium
    issue: Construcción poco natural «a que esta carta sea leída»
    rationale: Aunque entendible, suena forzada. Después de «poner bajo juramento» o «encargar solemnemente», una subordinada directa «que esta carta sea leída» es más natural y sigue preservando la pasiva del griego.
  - severity: low
    issue: La elección principal «por el Señor» puede ser menos clara que «ante el Señor»
    rationale: El inglés POB eligió «before the Lord» y dejó «by the Lord» como alternativa. En español, «ante el Señor» expresa mejor la solemnidad y evita ambigüedad sobre si se trata de un juramento formulado ‘por’ invocación.
  revised_spanish_text: Les pongo bajo juramento ante el Señor[a] que esta carta sea leída a todos los hermanos[b].
  revised_footnotes:
