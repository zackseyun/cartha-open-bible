translation:
  language: es
  text: Les pongo bajo juramento ante el Señor[a] que esta carta sea leída a todos los hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Señor». La expresión griega puede significar que Pablo les hace este encargo solemne invocando al Señor como autoridad.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» probablemente se refiere a toda la congregación, incluidas las mujeres; el griego ἀδελφοῖς es masculino plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνορκίζω
  english_pob_choice: I put you under oath
  chosen_spanish: os conjuro
  alternatives_spanish:
  - os pongo bajo juramento
  - os exhorto solemnemente
  - os obligo bajo juramento
  lexicon: BDAG
  rationale: El verbo expresa una imposición solemne ligada a un juramento o a una carga bajo juramento. «Os conjuro» conserva esa fuerza directa en español y mantiene la solemnidad sin añadir paráfrasis excesiva. «Os pongo bajo juramento» sería más explicativo, pero menos idiomático.
- source_word: τὸν κύριον
  english_pob_choice: before the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - ante el Señor
  - por Yahvé
  - bajo el Señor
  lexicon: BDAG
  rationale: El acusativo con ἐνορκίζω puede entenderse como la autoridad invocada en el juramento. En español, «por el Señor» comunica bien esa invocación solemne y es más natural que una glosa más literal. Se conserva «Señor» porque aquí el contexto es la fórmula de juramento con κύριος, no un reemplazo del nombre divino en una cita directa del Tetragrámaton.
- source_word: ἀναγνωσθῆναι
  english_pob_choice: to have this letter read
  chosen_spanish: a que esta carta sea leída
  alternatives_spanish:
  - a leer esta carta
  - a que esta carta sea leída en voz alta
  - para que se lea esta carta
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo requiere una construcción pasiva en español. «Sea leída» conserva la pasividad y expresa de modo natural la lectura pública implícita en el contexto.
- source_word: τὴν ἐπιστολήν
  english_pob_choice: this letter
  chosen_spanish: esta carta
  alternatives_spanish:
  - la carta
  - esta epístola
  lexicon: BDAG
  rationale: La referencia es al documento presente. «Carta» es más natural para el lector moderno que «epístola» y conserva el sentido deictico de «this».
- source_word: πᾶσιν τοῖς ἀδελφοῖς
  english_pob_choice: to all the brothers
  chosen_spanish: a todos los hermanos
  alternatives_spanish:
  - a todos los hermanos y hermanas
  - a todos los creyentes
  lexicon: BDAG
  rationale: Se mantiene el masculino plural griego como en la decisión inglesa, porque la forma del texto es masculina plural y el sentido congregacional se deja evidente por el contexto. «Hermanos» comunica el término sin neutralizarlo en una paráfrasis inclusiva.
theological_decisions:
- issue: Alcance de ἀδελφοῖς en una congregación probablemente mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: La forma griega es masculina plural. En Pablo suele abarcar a toda la comunidad, pero la traducción conserva la forma léxica documentada y deja la implicación inclusiva para una nota. Esto evita borrar la tensión entre forma gramatical y referente comunitario.
  doctrine_reference: DOCTRINE.md § Translation philosophy 4
- issue: Valor de la fórmula juramentaria con τὸν κύριον
  english_pob_reading: before the Lord
  chosen_spanish_reading: por el Señor
  alternative_spanish_readings:
  - ante el Señor
  - por Yahvé
  rationale: La lectura principal entiende a κύριος como la autoridad invocada en el juramento. En español, «por el Señor» conserva el carácter de invocación solemne. No se opta por «Yahvé» aquí porque la construcción refleja la fórmula griega de juramento y no una sustitución directa del nombre divino.
  doctrine_reference: BDAG; DOCTRINE.md § Yahvé / κύριος
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin cambios sustanciales: se mantuvo la fuerza juramentaria de ἐνορκίζω, se conservó el valor pasivo de ἀναγνωσθῆναι, y se respetó la forma masculina plural de ἀδελφοῖς con nota explicativa sobre su alcance congregacional. No se detectaron revisiones posteriores que alteraran la lectura de trabajo.'
  spanish_consistency_notes:
  - Se usa «Señor» en la fórmula juramentaria por la construcción con κύριος, mientras que «Yahvé» sigue siendo el equivalente por defecto para יהוה cuando el texto fuente lo requiere directamente.
  - «Carta» se eligió por claridad moderna; «epístola» queda como alternativa válida pero menos natural.
  - Se mantuvo un registro de la tensión entre forma masculina plural y referente mixto en «hermanos», conforme al enfoque de fidelidad morfológica del proyecto.
