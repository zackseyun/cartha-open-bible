translation:
  language: es
  text: Por tanto, anímense unos a otros y edifíquense unos a otros[a], así como también lo hacen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exhórtense unos a otros»; παρακαλεῖτε puede llevar aquí tanto la idea de animar como la de urgir, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica del contexto anterior; «Por tanto» es natural en español y conserva ese enlace argumentativo sin añadir énfasis extra.
- source_word: παρακαλεῖτε
  english_pob_choice: encourage
  chosen_spanish: anímense
  alternatives_spanish:
  - exhórtense
  - consuélense
  lexicon: BDAG
  rationale: παρακαλέω puede tener fuerza de exhortar, animar o consolar. En este contexto de edificación mutua, «anímense» comunica bien el impulso de fortalecerse y mantenerse firmes sin sonar demasiado duro como «exhórtense».
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre sí
  lexicon: BDAG
  rationale: Es el equivalente recíproco natural en español y expresa la acción mutua ordenada por el texto.
- source_word: οἰκοδομεῖτε
  english_pob_choice: build up
  chosen_spanish: edifíquense
  alternatives_spanish:
  - edifiquen
  - fortalézcanse
  lexicon: BDAG
  rationale: Conserva la metáfora de construcción presente en el griego. «Fortalézcanse» sería más explicativo, pero perdería la imagen verbal de edificar.
- source_word: εἷς τὸν ἕνα
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - cada uno al otro
  - uno al otro
  lexicon: BDAG
  rationale: La expresión intensifica la reciprocidad. En español, repetir «unos a otros» tras «edifíquense» mantiene esa mutualidad de manera idiomática y clara.
- source_word: καθὼς καὶ ποιεῖτε
  english_pob_choice: just as you are also doing
  chosen_spanish: así como también lo hacen
  alternatives_spanish:
  - tal como también lo hacen
  - como en efecto lo hacen
  lexicon: BDAG
  rationale: «καθώς» introduce comparación y «καί» añade el matiz de «también». «Así como también lo hacen» conserva la commendación implícita y el sentido de práctica actual en español natural.
translation_notes:
  revision_awareness: La revisión más reciente coincide con el texto base y no señala cambios; la redacción española sigue de cerca el griego y la decisión inglesa auditable de preservar la reciprocidad y la comparación final.
  spanish_consistency_notes:
  - Se prefirió «anímense» para evitar un tono excesivamente jerárquico de «exhórtense», pero se dejó nota de la alternativa porque el verbo griego admite ambas fuerzas.
  - «Edifíquense» mantiene la metáfora arquitectónica del original, coherente con el uso POB de «build up».
  - La fórmula final conserva el aspecto presente y el matiz comparativo con una sintaxis fluida para español.
