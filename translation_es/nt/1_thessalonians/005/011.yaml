review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: διὸ = «Por tanto», los dos imperativos presentes recíprocos, la repetición de la mutualidad, y la cláusula final de reconocimiento. Sin embargo, «anímense» para παρακαλεῖτε es algo estrecho frente al valor más amplio de «encourager/exhortar», y «edifíquense unos a otros» suena menos natural que «edifíquense mutuamente» o «edifíquense unos a otros» pero con mejor concordancia estilística. La revisión mantiene el sentido recíproco y la metáfora de οἰκοδομεῖτε.'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible. No obstante, la secuencia «anímense unos a otros y edifíquense unos a otros» repite una estructura reflexiva/recíproca un poco rígida. «Aliéntense» suena más natural y amplio en español bíblico actual que «anímense», y «edifíquense mutuamente» evita pesadez sin perder la repetición semántica del griego, ya que la mutualidad sigue explícita.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Edificar» preserva bien οἰκοδομεῖτε. La nota léxica para παρακαλεῖτε debe mantenerse; en español, «aliéntense» con alternativa «exhórtense» representa bien la documentación inglesa.
  issues:
  - severity: medium
    issue: «Anímense» para παρακαλεῖτε puede sonar demasiado coloquial o emocionalmente estrecho.
    rationale: El griego en este contexto parenético abarca alentar/exhortar más ampliamente que simplemente animar en sentido afectivo. «Aliéntense» conserva mejor el rango sin volverse áspero.
  - severity: low
    issue: La doble fórmula «unos a otros» en imperativos consecutivos suena algo pesada en español.
    rationale: Aunque el griego repite la mutualidad, el español puede conservarla de forma natural con «mutuamente» en la segunda instancia sin pérdida semántica relevante.
  revised_spanish_text: Por tanto, aliéntense unos a otros y edifíquense mutuamente[a], así como también lo hacen.
  revised_footnotes:
  - marker: a
    text: O «edifíquense unos a otros». El griego repite explícitamente la idea de reciprocidad aquí.
    reason: stylistic_literal_alternative
  - marker: b
    text: O «exhórtense unos a otros»; παρακαλεῖτε puede llevar aquí tanto la idea de alentar como la de urgir, según el contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta παρακαλεῖτε a «aliéntense» para un español más natural y semánticamente amplio. Se suaviza la segunda repetición con «mutuamente», manteniendo la mutualidad explícita mediante nota. También se preserva la alternativa léxica documentada para παρακαλεῖτε. Importante: al añadir una nota para la reciprocidad, los marcadores deben corresponder exactamente en el texto; por eso la nota léxica original se reasigna y debe anclarse si se incluye.'
