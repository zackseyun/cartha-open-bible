translation:
  language: es
  text: Asegúrense[a] de que nadie devuelva mal por mal a nadie, sino procuren siempre lo bueno[b] unos para con otros y para con todos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Tengan cuidado de que». El imperativo plural griego expresa vigilancia o responsabilidad comunitaria.
    reason: lexical_alternative
  - marker: b
    text: 'O «el bien». La expresión griega sustantiva el adjetivo: «lo bueno» o «lo que es bueno».'
    reason: lexical_alternative
  - marker: c
    text: La frase «unos para con otros ... para con todos» probablemente avanza desde los creyentes entre sí hacia todas las personas más ampliamente.
    reason: cross_reference
lexical_decisions:
- source_word: ὁρᾶτε
  english_pob_choice: See to it
  chosen_spanish: Ve[a] a que
  alternatives_spanish:
  - Tengan cuidado de que
  - Miren a que
  - Asegúrense de que
  lexicon: BDAG
  rationale: El imperativo plural de ὁράω aquí funciona como exhortación vigilante y responsable, no como simple percepción visual. En español, «ve a que» comunica bien la idea de tomar medidas para evitar algo, con tono natural y exhortativo.
- source_word: μή τις
  english_pob_choice: that no one
  chosen_spanish: nadie
  alternatives_spanish:
  - que nadie
  - para que nadie
  - no sea que alguien
  lexicon: BDAG
  rationale: Tras el mandato de vigilancia, la cláusula expresa la situación que debe evitarse. «Nadie» conserva el alcance general y es más fluido en español que una forma más rígida como «que nadie» dentro de esta construcción.
- source_word: κακὸν ἀντὶ κακοῦ
  english_pob_choice: evil for evil
  chosen_spanish: mal por mal
  alternatives_spanish:
  - mal por maldad
  - daño por daño
  - injuria por injuria
  lexicon: BDAG
  rationale: La fórmula de represalia es proverbial. En español, «mal por mal» preserva la repetición y el paralelismo sin forzar una terminología más técnica que podría sonar menos natural. Se mantiene el sentido moral amplio de κακός.
- source_word: τινι
  english_pob_choice: to anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a cualquiera
  - a alguien
  - a ninguna persona
  lexicon: BDAG
  rationale: El dativo indefinido marca el destinatario de la devolución. Aquí, como la cláusula ya está negativamente orientada, «a nadie» expresa con claridad la prohibición general y evita una redundancia pesada en español.
- source_word: ἀποδῷ
  english_pob_choice: repays
  chosen_spanish: devuelva
  alternatives_spanish:
  - pague
  - retribuya
  - recompense
  lexicon: BDAG
  rationale: El verbo indica devolver o corresponder una acción recibida, en contexto de represalia. «Devuelva» conserva el matiz de retribución sin sonar excesivamente técnico; además, encaja bien con la construcción prohibitiva del versículo.
- source_word: τὸ ἀγαθὸν
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - el bien
  - lo que es bueno
  - el bien moral
  lexicon: BDAG
  rationale: El artículo con el adjetivo sustantiva la idea. «Lo bueno» mantiene el valor sustantivado de τὸ ἀγαθόν y suena natural en español contemporáneo, sin perder la categoría moral.
- source_word: διώκετε
  english_pob_choice: pursue
  chosen_spanish: busquen
  alternatives_spanish:
  - persigan
  - sigan tras
  - procuren
  lexicon: BDAG
  rationale: διώκω aquí expresa una búsqueda activa y constante de lo bueno. «Busquen» comunica adecuadamente la exhortación en un español claro; se acompaña con «siempre» para reflejar la intensidad y continuidad del mandato. Aunque «persigan» reproduce mejor la energía del verbo, en español podría sonar más áspero o menos idiomático en este contexto.
- source_word: εἰς ἀλλήλους
  english_pob_choice: toward one another
  chosen_spanish: unos para con otros
  alternatives_spanish:
  - entre ustedes
  - unos a otros
  - hacia los demás
  lexicon: BDAG
  rationale: La preposición εἰς señala orientación relacional. «Unos para con otros» conserva el movimiento hacia el prójimo y es una fórmula clara y aceptable en español bíblico sin sonar arcaizante.
- source_word: καὶ εἰς πάντας
  english_pob_choice: and toward all people
  chosen_spanish: y para con todos
  alternatives_spanish:
  - y hacia todos
  - y para con todas las personas
  - y para con todos los hombres
  lexicon: BDAG
  rationale: El alcance se amplía de la comunidad inmediata a un grupo más amplio. «Para con todos» mantiene esa orientación relacional y conserva la amplitud de πάντας sin añadir una categoría interpretativa innecesaria como «personas».
theological_decisions:
- issue: Alcance de la obligación ética cristiana
  english_pob_reading: The verse distinguishes mutual conduct within the community ('one another') and conduct extending beyond it ('all people').
  chosen_spanish_reading: El versículo distingue entre la conducta mutua dentro de la comunidad («unos para con otros») y una conducta que se extiende a un ámbito más amplio («para con todos»).
  alternative_spanish_readings:
  - «todos» podría referirse solo a todos los creyentes
  - la expresión podría entenderse sin distinción de círculos
  rationale: La estructura doble εἰς ἀλλήλους καὶ εἰς πάντας sugiere un movimiento desde el círculo interno hacia uno más amplio. La traducción española conserva esa apertura sin resolverla de manera innecesaria ni restringirla a un solo grupo.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. No se detectaron revisiones aplicadas en la fuente inglesa más reciente; la formulación española prioriza claridad idiomática sin desplazar la fuerza exhortativa ni la amplitud del mandato.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como término por defecto para el nombre divino, aunque este versículo no lo contiene.
  - Se usa «mal» para κακόν/κακοῦ según la fórmula de represalia, en lugar de un calco más técnico.
  - Se conserva la distinción relacional entre «unos para con otros» y «para con todos», alineada con el alcance expansivo señalado en el audit trail inglés.
  - No se introduce vocabulario eclesiástico tradicional no atestiguado por la fuente; el estilo busca ser bíblico y moderno a la vez.
