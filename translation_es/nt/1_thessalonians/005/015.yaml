  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: vigilancia comunitaria para evitar represalias, seguida del mandato positivo de perseguir lo bueno hacia la comunidad y hacia todos. Sin embargo, «Ve a que» no corresponde al imperativo plural ὁρᾶτε y en español suena impropio aquí; además, «sino busquen» rompe la concordancia con el primer imperativo. También conviene fortalecer διώκετε con un verbo más enérgico que «busquen».'
  spanish_quality_summary: 'La redacción actual tiene problemas de naturalidad y gramática: «Ve a que» es singular y poco idiomático; «sino busquen» debería coordinarse con el mandato inicial; y la frase completa necesita una formulación más fluida y digna para lectura bíblica. El resto es claro, aunque «para con» suena algo pesado; se puede mantener por fidelidad relacional o simplificar con buena naturalidad.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. Las decisiones clave «mal por mal» y la distinción «unos a otros ... todos» están bien encaminadas. Para διώκετε, «procuren» o «persigan» preserva mejor la fuerza exhortativa que «busquen»; aquí «procuren» equilibra energía y naturalidad.
  issues:
  - severity: high
    issue: «Ve[a] a que» traduce mal ὁρᾶτε
    rationale: El griego es imperativo plural exhortativo («miren / asegúrense / tengan cuidado»). «Ve a que» es singular, coloquial y no idiomático en este contexto bíblico.
  - severity: high
    issue: Discordancia verbal en «sino busquen siempre»
    rationale: Tras un primer imperativo singular aparente, el segundo está en plural. El versículo requiere una exhortación coherente al mismo grupo plural.
  - severity: medium
    issue: «Busquen» debilita la fuerza de διώκετε
    rationale: διώκετε expresa perseguir activamente, esforzarse tras algo. «Busquen» es comprensible, pero menos enérgico que el valor documentado en el POB inglés.
  - severity: low
    issue: La nota sobre «Ve a que» defiende una formulación poco natural
    rationale: La nota lexical alternativa queda basada en una elección española defectuosa y debe reemplazarse por una explicación de una formulación idiomática y fiel.
  revised_spanish_text: Asegúrense[a] de que nadie devuelva mal por mal a nadie, sino procuren siempre lo bueno[b] unos para con otros y para con todos[c].
