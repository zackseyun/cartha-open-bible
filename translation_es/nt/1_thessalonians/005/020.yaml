translation:
  language: es
  text: No desprecien las profecías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expresiones proféticas».
    reason: lexical_alternative
lexical_decisions:
- source_word: προφητείας
  english_pob_choice: prophecies
  chosen_spanish: profecías
  alternatives_spanish:
  - manifestaciones proféticas
  - oráculos proféticos
  lexicon: BDAG
  rationale: El acusativo plural de προφητεία pide un plural concreto en español. «Profecías» conserva la pluralidad y el valor de expresiones proféticas sin reinterpretarlas como un concepto abstracto ni restringirlas a un mecanismo particular.
- source_word: μὴ
  english_pob_choice: Do not
  chosen_spanish: No desprecien
  alternatives_spanish:
  - No desprecien nunca
  - No menosprecien
  lexicon: BDAG
  rationale: La negación con imperativo presente se expresa de forma natural con «No». Se mantiene el tono exhortativo directo en plural; «No desprecien» comunica la fuerza del mandato sin exagerarla.
- source_word: ἐξουθενεῖτε
  english_pob_choice: despise
  chosen_spanish: desprecien
  alternatives_spanish:
  - traten con desprecio
  - menosprecien
  - rechacen
  lexicon: BDAG
  rationale: El verbo implica considerar como nada, mirar con desdén o tratar con desprecio. «Desprecien» es el equivalente más compacto y fuerte en español. «Rechacen» estrecha indebidamente el sentido, y «menosprecien» puede sonar un poco más débil en este contexto.
theological_decisions:
- issue: Alcance de «profecías» en la vida congregacional
  english_pob_reading: Retain the broad term 'prophecies' without narrowing it to a specific mechanism or later doctrinal category.
  chosen_spanish_reading: Conservar «profecías» sin aclararlo como un tipo específico de mecanismo, don o sistema doctrinal.
  alternative_spanish_readings:
  - manifestaciones proféticas
  - mensajes considerados de parte de Dios
  rationale: El griego nombra directamente las profecías; la traducción no debe cerrar la tensión teológica del pasaje ni importar una postura confesional sobre su funcionamiento. Mantener el término amplio deja intacta la advertencia apostólica.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El texto griego es breve y estable; la auditoría inglesa no introduce revisiones textuales ni cambios de sentido, y el acuerdo externo reporta alta concordancia. Se mantiene la fuerza imperativa y el plural de referencia sin añadir matices ajenos al original.
  spanish_consistency_notes:
  - Se usa «profecías» para mantener el plural del griego y la decisión inglesa de no singularizar.
  - Se evita «SEÑOR» u otra terminología no pertinente porque el versículo no contiene el nombre divino.
  - «No desprecien» conserva el mandato directo en plural y resulta idiomático en español bíblico contemporáneo.
