  - severity: medium
    issue: La nota al pie tiene redacción poco natural y problemas tipográficos
    rationale: Empieza con una comilla innecesaria y la frase 'un modo idiomático de decir' puede mejorarse para sonar más natural y preciso en español eclesial.
