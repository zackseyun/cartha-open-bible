translation:
  language: es
  text: Porque todos ustedes son hijos de la luz y hijos del día[a]. No somos de la noche ni de la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hijos de la luz e hijos del día». El griego literalmente dice «hijos», una expresión idiomática para quienes pertenecen a la luz y al día o se caracterizan por ellos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: ustedes todos
  alternatives_spanish:
  - todos ustedes
  - todos
  lexicon: BDAG
  rationale: Conserva la fuerza inclusiva del adjetivo plural y su vínculo con el pronombre de segunda persona, sin sonar forzado en español.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conector con el contexto anterior de manera natural en español.
- source_word: υἱοὶ
  english_pob_choice: sons
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos varones
  - niños
  - hijos e hijas
  lexicon: BDAG
  rationale: Aunque el griego usa literalmente un masculino plural, en español bíblico 'hijos' puede conservar la metáfora de pertenencia y caracterización sin la aspereza de 'hijos varones'; la nota aclara la alternativa literal.
- source_word: φωτός
  english_pob_choice: light
  chosen_spanish: de la luz
  alternatives_spanish:
  - de luz
  lexicon: BDAG
  rationale: 'Preserva la metáfora de pertenencia/sphere: no solo cualidad abstracta, sino procedencia o relación con la luz.'
- source_word: ἡμέρας
  english_pob_choice: day
  chosen_spanish: del día
  alternatives_spanish:
  - de día
  lexicon: BDAG
  rationale: Mantiene el paralelismo con 'luz' y el contraste con 'noche', usando una construcción natural en español.
- source_word: οὐκ ἐσμὲν
  english_pob_choice: We are not
  chosen_spanish: No somos
  alternatives_spanish:
  - No somos nosotros
  - No pertenecemos
  lexicon: BDAG
  rationale: Preserva el cambio deliberado a primera persona plural del griego, sin armonizarlo a segunda persona.
- source_word: νυκτός
  english_pob_choice: of night
  chosen_spanish: de la noche
  alternatives_spanish:
  - de noche
  - de la oscuridad
  lexicon: BDAG
  rationale: Respeta el genitivo de esfera/pertenencia y mantiene el contraste metafórico con 'día' y 'luz'.
- source_word: σκότους
  english_pob_choice: darkness
  chosen_spanish: de la oscuridad
  alternatives_spanish:
  - de tinieblas
  - de la oscuridad
  lexicon: BDAG
  rationale: '''Oscuridad'' comunica el contraste moral y espiritual de modo claro y contemporáneo; ''tinieblas'' es una alternativa más tradicional.'
theological_decisions:
- issue: Metáfora de identidad en υἱοὶ φωτός / υἱοὶ ἡμέρας
  english_pob_reading: sons of light and sons of day
  chosen_spanish_reading: hijos de la luz y hijos del día
  alternative_spanish_readings:
  - hijos de luz y hijos del día
  - hijos de la luz y del día
  rationale: La formulación conserva la metáfora relacional del griego. En español, 'hijos de la luz' comunica de forma idiomática pertenencia y carácter, sin borrar la imagen filial del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Cambio de persona de segunda a primera plural
  english_pob_reading: For you are all ... We are not ...
  chosen_spanish_reading: Porque ustedes todos son ... No somos ...
  alternative_spanish_readings:
  - Porque ustedes todos son ... No son ...
  - Porque todos ustedes son ... No somos ...
  rationale: Se preserva el cambio retórico del griego de 'ustedes' a 'nosotros', evitando la nivelación que eliminaría la inclusión de Pablo y sus compañeros en la afirmación negativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: La revisión previa fue aprobada sin cambios sustanciales; esta versión corrige la anclaje de la nota de pie para que el marcador [a] aparezca exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el contraste luz/día frente a noche/oscuridad como pares paralelos.
  - Se evitó traducir με un calco rígido de 'sons' como 'hijos varones' en el cuerpo, pero se documentó la alternativa literal en la nota.
  - 'Se conservó el cambio de persona del griego: ''ustedes'' en la primera cláusula y ''nosotros'' en la segunda.'
