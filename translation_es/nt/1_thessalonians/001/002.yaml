translation:
  language: es
  text: Siempre damos gracias a Dios por todos ustedes[a], haciendo mención de ustedes en nuestras oraciones, sin cesar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin cesar». El adverbio puede modificar específicamente «haciendo mención de ustedes en nuestras oraciones» o la afirmación completa de agradecimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστοῦμεν
  english_pob_choice: We always give thanks
  chosen_spanish: damos gracias
  alternatives_spanish:
  - agradecemos
  - damos las gracias
  lexicon: εὐχαριστέω
  rationale: En una fórmula paulina de acción de gracias, «dar gracias» comunica de modo natural y reverente la acción verbal dirigida a Dios. «Agradecemos» sería comprensible, pero suena algo más general y menos litúrgico. «Damos las gracias» es posible, aunque algo más pesado.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: θεός
  rationale: El dativo marca el destinatario de la acción de gracias; en español se expresa con «a Dios» sin necesidad de ampliación.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: πάντοτε
  rationale: «Siempre» reproduce con naturalidad el valor adverbial de continuidad habitual. «En todo tiempo» sería más literal pero menos fluido.
- source_word: περὶ πάντων ὑμῶν
  english_pob_choice: for all of you
  chosen_spanish: por todos ustedes
  alternatives_spanish:
  - acerca de todos ustedes
  - en favor de todos ustedes
  lexicon: περί
  rationale: Aquí περί con genitivo expresa referencia/interés. En español, «por todos ustedes» comunica bien la idea de agradecimiento e interés por toda la comunidad. «Acerca de» sería demasiado abstracto; «en favor de» podría sugerir beneficio más que referencia.
- source_word: μνείαν ποιούμενοι
  english_pob_choice: making mention of you
  chosen_spanish: haciendo memoria de ustedes
  alternatives_spanish:
  - mencionándolos
  - haciendo mención de ustedes
  lexicon: μνεία
  rationale: El giro participial tiene el sentido de traer a la mente o mencionar en oración. «Haciendo memoria de ustedes» conserva la idea de recuerdo activo y resulta idiomático en español bíblico. «Haciendo mención de ustedes» es muy cercano al griego, pero algo más formular y menos natural; «mencionándolos» pierde el matiz litúrgico de la expresión.
- source_word: ἐπὶ τῶν προσευχῶν ἡμῶν
  english_pob_choice: in our prayers
  chosen_spanish: en nuestras oraciones
  alternatives_spanish:
  - durante nuestras oraciones
  - al orar
  lexicon: προσευχή
  rationale: Con este sintagma, ἐπί + genitivo se entiende idiomáticamente como esfera o marco de la acción. «En nuestras oraciones» es claro y fiel. Se evita «en nuestras plegarias» por el registro más marcado y menos universal.
- source_word: ἀδιαλείπτως
  english_pob_choice: unceasingly
  chosen_spanish: sin cesar
  alternatives_spanish:
  - sin interrupción
  - constantemente
  lexicon: ἀδιαλείπτως
  rationale: '«Sin cesar» es la forma más establecida en español bíblico para expresar continuidad ininterrumpida y permite conservar la fuerza adverbial final del griego. También deja abierta la misma posibilidad de alcance que documenta el POB inglés: modificar la mención en oración o el agradecimiento en su conjunto.'
theological_decisions:
- issue: 'Alcance de ἀδιαλείπτως: ¿modifica solo «haciendo memoria de ustedes en nuestras oraciones» o toda la cláusula de agradecimiento?'
  english_pob_reading: The adverb may modify either 'making mention of you in our prayers' specifically or the broader thanksgiving statement as a whole.
  chosen_spanish_reading: «sin cesar» se deja al final, de modo que puede leerse con la mención en oración o con la acción de dar gracias en su conjunto.
  alternative_spanish_readings:
  - «siempre damos gracias... haciendo memoria... sin cesar» entendido solo con la mención en oración
  - «siempre damos gracias... sin cesar, haciendo memoria...» entendido con toda la acción de gracias
  rationale: El griego permite ambas lecturas sintácticas y el audit trail inglés conserva esa tensión. La puntuación española no debe cerrarla artificialmente; por eso se mantiene la adverbial final con ambigüedad controlada.
  doctrine_reference: Sintaxis griega; preservación de ambigüedad textual/funcional sin decidir indebidamente el alcance.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el estado revisado más reciente del texto fuente en inglés: no se requieren cambios mayores. Se preserva la ambigüedad reconocida sobre el alcance de ἀδιαλείπτως mediante la colocación final del adverbio y una nota alternativa.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεῷ conforme al estándar POB en español.
  - Se elige «sin cesar» para ἀδιαλείπτως, manteniendo la posibilidad de doble alcance documentada en el inglés.
  - Se evita «Cristo» o terminología no presente en el versículo.
  - «Haciendo memoria» conserva mejor el matiz formular de μνείαν ποιούμενοι que una mera traducción de diccionario.
