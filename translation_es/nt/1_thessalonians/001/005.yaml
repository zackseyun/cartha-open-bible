translation:
  language: es
  text: porque nuestro evangelio no llegó a ustedes en palabra solamente, sino también en poder y en el Espíritu Santo y con gran convicción[a], tal como saben qué clase de hombres resultamos ser entre ustedes por el bien de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con mucha certeza» o «con plena seguridad» para πληροφορίᾳ πολλῇ.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: En contexto paulino, εὐαγγέλιον funciona como término técnico para el mensaje apostólico; en español, «evangelio» conserva esa precisión y es el equivalente natural y tradicional sin volverlo genérico.
- source_word: ἐγενήθη εἰς ὑμᾶς
  english_pob_choice: did not come to you
  chosen_spanish: no llegó a ustedes
  alternatives_spanish:
  - no se manifestó entre ustedes
  - no se hizo presente entre ustedes
  lexicon: BDAG
  rationale: Con γίνομαι + εἰς, el sentido es idiomático de llegada/efecto del mensaje entre los tesalonicenses. «No llegó a ustedes» es natural en español y mantiene la idea de arribo y eficacia del evangelio.
- source_word: ἐν λόγῳ μόνον
  english_pob_choice: in word only
  chosen_spanish: en palabra solamente
  alternatives_spanish:
  - en discurso solamente
  - solo con palabras
  lexicon: BDAG
  rationale: La repetición de ἐν se conserva mejor con «en». «Palabra» refleja λόγος en contraste con una mera proclamación verbal; «solamente» reproduce μόνον sin añadir carga interpretativa.
- source_word: ἐν δυνάμει
  english_pob_choice: in power
  chosen_spanish: en poder
  alternatives_spanish:
  - con poder
  lexicon: BDAG
  rationale: «Poder» preserva el paralelo con las demás frases introducidas por ἐν y mantiene la fuerza del contraste con «en palabra solamente».
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en Espíritu Santo
  alternatives_spanish:
  - en el Espíritu Santo
  - en un espíritu santo
  lexicon: BDAG
  rationale: El texto griego carece de artículo, pero en este contexto πνεύματι ἁγίῳ se refiere al Espíritu Santo como agente divino. En español, la forma más natural y reverente es «Espíritu Santo»; el artículo puede omitirse por estilo si la construcción coordinada lo permite, sin cambiar el referente.
- source_word: πληροφορίᾳ πολλῇ
  english_pob_choice: with great conviction
  chosen_spanish: con gran convicción
  alternatives_spanish:
  - con gran plena seguridad
  - con mucha certeza
  - con plena seguridad
  lexicon: BDAG
  rationale: πληροφορία expresa plenitud de certeza/seguridad. La revisión inglesa prefirió «conviction» por naturalidad contextual; en español, «gran convicción» comunica bien esa fuerza interior sin forzar una construcción extraña como «plena seguridad» en este entorno.
- source_word: καθὼς οἴδατε
  english_pob_choice: just as you know
  chosen_spanish: tal como saben
  alternatives_spanish:
  - como saben
  - así como saben
  lexicon: BDAG
  rationale: καθώς introduce una apelación confirmatoria al conocimiento de los destinatarios. «Tal como saben» mantiene el matiz comparativo y suena natural en español contemporáneo.
- source_word: οἷοι ἐγενήθημεν
  english_pob_choice: what kind of men we proved to be
  chosen_spanish: qué clase de hombres nos mostramos
  alternatives_spanish:
  - qué clase de personas resultamos ser
  - qué tipo de hombres llegamos a ser
  lexicon: BDAG
  rationale: El griego pregunta por la calidad/caracter de Pablo y sus compañeros; la revisión inglesa corrigió hacia «proved to be». «Nos mostramos» conserva el sentido de manifestación de carácter sin introducir un «probar» demasiado técnico en español. Se mantiene «hombres» por la referencia concreta al grupo misionero masculino.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - con ustedes
  lexicon: BDAG
  rationale: En este contexto, la referencia es al comportamiento en la comunidad tesalonicense, no a ubicación interior. «Entre ustedes» es el equivalente español más natural.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - para su bien
  - por ustedes
  lexicon: BDAG
  rationale: διά con acusativo aquí expresa beneficio o finalidad. «Por causa de ustedes» conserva esa relación sin estrechar indebidamente el matiz pastoral del propósito beneficioso.
theological_decisions:
- issue: Referencia de «Espíritu Santo»
  english_pob_reading: The phrase refers to the Holy Spirit, the divine person, not merely a spiritual atmosphere or human spirit.
  chosen_spanish_reading: La frase se refiere al Espíritu Santo como persona divina, no a una mera atmósfera espiritual ni al espíritu humano.
  alternative_spanish_readings:
  - un espíritu santo
  - un poder espiritual
  rationale: En el uso paulino, πνεῦμα ἅγιον en esta construcción normalmente designa al Espíritu Santo. El contexto contrapone palabra sola con eficacia divina, por lo que la traducción debe preservar esa referencia personal.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Sentido de πληροφορίᾳ πολλῇ
  english_pob_reading: Rendered as ‘with great conviction,’ leaving the subject of the assurance somewhat open.
  chosen_spanish_reading: Se traduce como «con gran convicción», dejando igualmente abierto si la convicción caracteriza a los predicadores, a los oyentes o al modo en que vino el evangelio.
  alternative_spanish_readings:
  - con plena seguridad
  - con completa certeza
  rationale: El griego no especifica explícitamente el sujeto de la convicción/seguridad. «Gran convicción» conserva la amplitud semántica sin cerrar la ambigüedad que la fuente permite.
  doctrine_reference: Translation philosophy §3
- issue: Rendición de οἷοι ἐγενήθημεν
  english_pob_reading: Rendered with ‘men’ to refer to Paul and his companions specifically.
  chosen_spanish_reading: Se usa «hombres» para referirse específicamente a Pablo y sus compañeros como grupo masculino concreto.
  alternative_spanish_readings:
  - personas
  - seres humanos
  rationale: No se trata de un masculino genérico abstracto, sino del grupo misionero real. Mantener «hombres» conserva la referencia histórica concreta del pasaje.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y tiene en cuenta el archivo inglés POB, incluida la revisión más reciente que prefirió «with great conviction» y «we proved to be» sobre formulaciones más literales. En español, se optó por «con gran convicción» y «nos mostramos» para conservar la fuerza semántica y la naturalidad, sin perder la ambigüedad controlada del griego. También se mantuvo el contraste retórico entre «palabra solamente» y la tríada de eficacia divina.
  spanish_consistency_notes:
  - Se usa «evangelio» de manera consistente para εὐαγγέλιον, conforme a la terminología POB.
  - Se traduce εἰς ὑμᾶς y ἐν ὑμῖν con dos preposiciones distintas en español («a ustedes» / «entre ustedes») para reflejar el cambio de función sintáctica.
  - Se preserva la secuencia coordinada de ἐν + sustantivo con «en poder» y «en Espíritu Santo».
  - Se evita sustituir «Espíritu Santo» por una formulación genérica, dado el sentido teológico del contexto.
  - Se mantiene el matiz de finalidad/beneficio de δι’ ὑμᾶς con «por causa de ustedes», en continuidad con el sentido pastoral del texto.
