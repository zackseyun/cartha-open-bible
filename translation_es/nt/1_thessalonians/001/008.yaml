revisions:
- from: Porque desde ustedes la palabra del Señor[a] ha resonado, no solo en Macedonia y Acaya, sino en todo lugar su fe hacia Dios ha salido, de modo que no tenemos necesidad de decir nada.
  to: Porque desde ustedes ha resonado la palabra del Señor, no solo en Macedonia y Acaya, sino que en todo lugar su fe hacia Dios[a] ha salido, de modo que no tenemos necesidad de decir nada.
  rationale: Se corrige el anclaje de la nota para que recaiga sobre la frase pertinente y se ajusta levemente la sintaxis con «sino que» para clarificar la segunda cláusula principal sin apartarse del sentido ni de las decisiones léxicas auditadas. No se requiere adjudicación adicional.
