review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien las elecciones léxicas principales del griego: ἐξήχηται como «ha resonado», ἐν παντὶ τόπῳ como «en todo lugar», πίστις como «fe», y la cláusula final como resultado. También conserva adecuadamente la nota alternativa para πρὸς τὸν θεόν. Sin embargo, la sintaxis española actual une de forma torpe dos cláusulas coordinadas sin la pausa necesaria («sino en todo lugar su fe... ha salido»), lo que oscurece la estructura del original, donde «la palabra del Señor» y «su fe hacia Dios» son sujetos de verbos distintos. Además, el anclaje de la nota está puesto en «Señor[a]», pero la nota trata de «su fe hacia Dios / en Dios», por lo que no corresponde al lugar semántico correcto.'
  spanish_quality_summary: El texto es en general comprensible, pero necesita una reparación menor de puntuación/fluidez para sonar natural y digno en español. La frase queda más clara con una coma tras «Acaya» y otra tras «lugar», o con una reformulación mínima que haga evidente el paralelismo. También conviene mover la nota al sintagma «fe hacia Dios».
  glossary_alignment: No hay conflicto con el glosario del proyecto. κύριος como «Señor» es correcto aquí; θεός como «Dios» y πίστις como «fe» también. La opción «hacia Dios» sigue la decisión auditada, con «en Dios» correctamente preservado como alternativa en nota.
  issues:
  - severity: medium
    issue: Anclaje incorrecto de la nota al pie
    rationale: La nota explica la alternativa de «su fe hacia Dios», pero el marcador [a] está colocado en «Señor». Esto rompe la correspondencia requerida entre nota y palabra/frase anotada.
  - severity: medium
    issue: Sintaxis y puntuación insuficientes en la coordinación principal
    rationale: Sin una pausa después de «en todo lugar», la oración suena atropellada y puede inducir a leer «en todo lugar su fe hacia Dios» como una sola unidad adverbial mal ensamblada. El griego distingue claramente dos predicaciones paralelas.
  - severity: low
    issue: «No tenemos necesidad de decir nada» es fiel pero algo pesada
    rationale: La frase es correcta, pero «no necesitamos decir nada» sería más natural. Aun así, no es necesario cambiarla si se desea conservar de cerca la estructura auditada.
  revised_spanish_text: Porque desde ustedes ha resonado la palabra del Señor, no solo en Macedonia y Acaya, sino que en todo lugar su fe hacia Dios[a] ha salido, de modo que no tenemos necesidad de decir nada.
  revised_footnotes:
  - marker: a
    text: 'O: «su fe en Dios». El griego dice más literalmente: «su fe hacia Dios».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota para que recaiga sobre la frase pertinente y se ajusta levemente la sintaxis con «sino que» para clarificar la segunda cláusula principal sin apartarse del sentido ni de las decisiones léxicas auditadas. No se requiere adjudicación adicional.
