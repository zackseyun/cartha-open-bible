translation:
  language: es
  text: Porque desde ustedes ha resonado la palabra del Señor, no solo en Macedonia y Acaya, sino que en todo lugar su fe hacia Dios[a] ha salido, de modo que no tenemos necesidad de decir nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su fe en Dios». El griego dice más literalmente: «su fe hacia Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξήχηται
  english_pob_choice: has sounded forth
  chosen_spanish: ha resonado
  alternatives_spanish:
  - ha sonado
  - ha repercutido
  - ha resonado con fuerza
  lexicon: BDAG
  rationale: El verbo griego conserva una imagen auditiva de sonido que se propaga desde una fuente. «Ha resonado» mantiene esa metáfora en español sin reducirla a una idea meramente de difusión.
- source_word: ὁ λόγος τοῦ κυρίου
  english_pob_choice: the word of the Lord
  chosen_spanish: la palabra del Señor
  alternatives_spanish:
  - el mensaje del Señor
  - la palabra del Señor
  lexicon: BDAG
  rationale: Se conserva la expresión paulina formal y transparente. «Señor» sigue el valor doctrinal habitual de κύριος en este contexto; la frase mantiene el genitivo abierto entre palabra perteneciente a él y palabra acerca de él.
- source_word: Μακεδονίᾳ καὶ Ἀχαΐᾳ
  english_pob_choice: Macedonia and Achaia
  chosen_spanish: Macedonia y Acaya
  alternatives_spanish:
  - Macedonia y Grecia del sur
  - la Macedonia y la Acaya
  lexicon: transliteración estándar
  rationale: Los nombres geográficos se transliteran de forma habitual y reconocible en español bíblico.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - por todas partes
  lexicon: BDAG
  rationale: «En todo lugar» conserva el alcance distributivo de la expresión griega y suena natural en español.
- source_word: ἡ πίστις ὑμῶν ἡ πρὸς τὸν θεόν
  english_pob_choice: your faith toward God
  chosen_spanish: su fe hacia Dios
  alternatives_spanish:
  - su fe en Dios
  - su fe dirigida a Dios
  lexicon: BDAG
  rationale: Se mantiene el valor más literal de πρός con «hacia», como en el texto griego y la decisión inglesa. Aunque «fe en Dios» es una alternativa idiomática, suaviza la orientación espacial-relacional que el griego expresa.
- source_word: ἐξελήλυθεν
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - se ha difundido
  - ha llegado
  lexicon: BDAG
  rationale: El perfecto de ἐξέρχομαι conserva un movimiento de salida. «Ha salido» respeta esa imagen concreta mejor que una paráfrasis de difusión.
- source_word: ὥστε μὴ χρείαν ἔχειν ἡμᾶς
  english_pob_choice: so that we have no need
  chosen_spanish: de modo que no tenemos necesidad
  alternatives_spanish:
  - así que no tenemos necesidad
  - por lo cual no hace falta que
  lexicon: BDAG
  rationale: Se reproduce la relación de resultado con una construcción natural en español, manteniendo el sentido de carencia de necesidad expresado por χρεία.
- source_word: λαλεῖν τι
  english_pob_choice: to say anything
  chosen_spanish: de decir nada
  alternatives_spanish:
  - de hablar nada
  - de decir algo
  lexicon: BDAG
  rationale: En español idiomático, la negación con «nada» expresa con naturalidad el indefinido τι en este contexto de negación. «Decir» preserva el valor de hablar/decir sin volverlo demasiado técnico.
theological_decisions:
- issue: Traducción de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene «fe» como renderizado doctrinal por defecto, en línea con la decisión auditada de la POB inglesa. En este contexto el énfasis recae en la respuesta creyente hacia Dios, no primariamente en la fidelidad como rasgo moral.
  doctrine_reference: 'DOCTRINE.md: πίστις → faith'
- issue: Valor relacional de πρός con θεόν
  english_pob_reading: toward God
  chosen_spanish_reading: hacia Dios
  alternative_spanish_readings:
  - en Dios
  - para con Dios
  rationale: «Hacia Dios» conserva el matiz direccional-relacional del griego y evita cerrar prematuramente la frase en una formulación más interpretativa como «en Dios».
  doctrine_reference: BDAG / audit trail de πρὸς τὸν θεόν
translation_notes:
  revision_awareness: 'Se siguió el pass más reciente sin cambios necesarios (latest_revision_pass: unchanged=true). La versión española conserva la imaginería auditiva de ἐξήχηται y de ἐξελήλυθεν, además del matiz direccional de πρὸς τὸν θεόν documentado en el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en armonía con la decisión inglesa y el valor cristológico habitual del pasaje.
  - Se mantiene «fe» y no «fidelidad», siguiendo la decisión doctrinal auditada para πίστις.
  - La negación «no tenemos necesidad de decir nada» refleja de manera natural el griego sin añadir énfasis extra.
