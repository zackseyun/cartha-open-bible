  text: αὐτοὶ γὰρ περὶ ἡμῶν ἀπαγγέλλουσιν ὁποίαν εἴσοδον ἔσχομεν πρὸς ὑμᾶς, καὶ πῶς ἐπεστρέψατε πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων δουλεύειν θεῷ ζῶντι καὶ ἀληθινῷ,
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/009.yaml
  text: For they themselves report about us what kind of reception we had among you[a], and how you turned to God from idols to serve the living and true God[c][b],
