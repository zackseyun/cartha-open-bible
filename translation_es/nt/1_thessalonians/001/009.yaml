translation:
  language: es
  text: Porque ellos mismos informan acerca de nosotros qué clase de recepción tuvimos entre ustedes[a], y cómo se volvieron a Dios dejando los ídolos para servir al Dios vivo y verdadero[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'qué clase de entrada tuvimos hacia ustedes'; la expresión griega se refiere al carácter y al efecto de la llegada de Pablo entre ellos.
    reason: lexical_alternative
  - marker: b
    text: O 'se convirtieron a Dios dejando los ídolos'.
    reason: alternative_reading
  - marker: c
    text: La frase 'el Dios vivo y verdadero' contrasta a Dios con los ídolos sin vida; compárese Jer 10:10.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: they themselves
  chosen_spanish: ellos mismos
  alternatives_spanish:
  - ellos
  - por su propia cuenta
  lexicon: BDAG
  rationale: 'El pronombre intensivo se conserva con ''ellos mismos'' para reflejar el énfasis del griego: no es un testimonio indirecto ni provocado por Pablo.'
- source_word: ἀπαγγέλλουσιν
  english_pob_choice: report
  chosen_spanish: informan
  alternatives_spanish:
  - reportan
  - declaran
  - anuncian
  lexicon: BDAG
  rationale: '''Informan'' comunica bien el valor de relatar noticias o dar testimonio público en un registro natural de español, sin sonar demasiado técnico.'
- source_word: ὁποίαν εἴσοδον
  english_pob_choice: what kind of reception
  chosen_spanish: qué clase de entrada
  alternatives_spanish:
  - qué clase de recepción
  - qué tipo de ingreso
  - qué clase de llegada
  lexicon: BDAG
  rationale: Se mantiene lo más cerca posible de la imagen de 'entrada'. Aunque 'recepción' interpreta el efecto relacional, el griego literalmente habla de la naturaleza de su entrada; por eso 'entrada' preserva mejor la metáfora y la tensión lexical.
- source_word: ἔσχομεν πρὸς ὑμᾶς
  english_pob_choice: we had among you
  chosen_spanish: tuvimos entre ustedes
  alternatives_spanish:
  - tuvimos con ustedes
  - tuvimos hacia ustedes
  lexicon: BDAG
  rationale: '''Entre ustedes'' expresa de forma idiomática la presencia y el impacto de la llegada de Pablo entre la comunidad, sin perder el sentido relacional del giro preposicional.'
- source_word: ἐπεστρέψατε
  english_pob_choice: you turned
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se convirtieron
  - volvieron
  - se desviaron hacia
  lexicon: BDAG
  rationale: El verbo de giro/conversión se preserva con 'se volvieron', que mantiene la imagen de cambio de dirección sin imponer como texto principal el tecnicismo eclesiástico 'se convirtieron'.
- source_word: πρὸς τὸν θεὸν ἀπὸ τῶν εἰδώλων
  english_pob_choice: to God from idols
  chosen_spanish: a Dios desde los ídolos
  alternatives_spanish:
  - hacia Dios desde los ídolos
  - a Dios apartándose de los ídolos
  - a Dios desde las imágenes
  lexicon: BDAG
  rationale: La pareja de preposiciones conserva dirección y origen. En español, 'a Dios desde los ídolos' expresa el movimiento de conversión sin añadir explicaciones ajenas al texto.
- source_word: εἰδώλων
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - los falsos dioses
  lexicon: BDAG
  rationale: '''Ídolos'' es el equivalente directo y el más adecuado para el contraste cultual del pasaje.'
- source_word: δουλεύειν
  english_pob_choice: to serve
  chosen_spanish: para servir
  alternatives_spanish:
  - para esclavizarse a
  - para ser esclavos de
  - para rendir servicio a
  lexicon: BDAG
  rationale: En este contexto religioso, el infinitivo expresa dedicación al servicio de Dios. 'Para servir' reproduce la función sin exagerar el matiz de esclavitud que el uso contextual no exige en la línea principal.
- source_word: θεῷ ζῶντι καὶ ἀληθινῷ
  english_pob_choice: the living and true God
  chosen_spanish: al Dios vivo y verdadero
  alternatives_spanish:
  - al Dios que vive y es verdadero
  - al Dios viviente y verdadero
  lexicon: BDAG
  rationale: '''Dios vivo y verdadero'' es la formulación más natural y fiel en español; ''vivo'' conserva el contraste con ídolos inertes y ''verdadero'' mantiene la oposición a lo falso.'
theological_decisions:
- issue: Conversión como giro real desde la idolatría
  english_pob_reading: you turned to God from idols
  chosen_spanish_reading: se volvieron a Dios desde los ídolos
  alternative_spanish_readings:
  - se convirtieron a Dios desde los ídolos
  - se volvieron hacia Dios apartándose de los ídolos
  rationale: 'Se preserva la imagen de movimiento/conversión sin reemplazarla por un tecnicismo doctrinal. El texto afirma un cambio real de lealtad religiosa: de ídolos a Dios.'
  doctrine_reference: Conversión y arrepentimiento; mantener la metáfora bíblica de giro sin diluirla.
- issue: Valor de δουλεύειν respecto de Dios
  english_pob_reading: to serve the living and true God
  chosen_spanish_reading: para servir al Dios vivo y verdadero
  alternative_spanish_readings:
  - para ser esclavos del Dios vivo y verdadero
  - para adorar al Dios vivo y verdadero
  rationale: Aunque el verbo pertenece al campo de servicio/esclavitud, aquí el contexto es de lealtad y culto. 'Servir' conserva la entrega devocional sin introducir una dureza metafórica que el pasaje no explicita.
  doctrine_reference: Léxico de servicio a Dios; evitar sobrerrepresentar el matiz de esclavitud donde el contexto privilegia devoción.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el cotejo final indicó alta concordancia con observaciones menores. Se mantuvo la tensión léxica principal entre 'entrada' y la posible lectura contextual de 'recepción', así como entre 'servir' y la familia léxica de esclavitud, conforme al expediente auditado.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός de modo consistente, y 'ídolos' para εἰδώλων.
  - Se mantiene 'Yahvé' como convención del proyecto, pero este versículo no la requiere porque el texto griego usa θεός, no κύριος.
  - 'La frase principal conserva paralelismo de conversión: ''a Dios desde los ídolos''.'
  - Se evita el calco rígido de 'entrada' solo cuando el español lo exige; aquí se preserva por fidelidad al griego y por la nota explicativa.
