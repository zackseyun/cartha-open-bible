    text: O 'se convirtieron a Dios dejando los ídolos'.
    reason: alternative_reading
  - marker: c
    text: La frase 'el Dios vivo y verdadero' contrasta a Dios con los ídolos sin vida; compárese Jer 10:10.
    reason: cross_reference
  revision_rationale: La revisión corrige dos calcos poco naturales en español mientras preserva el sentido documentado por el expediente inglés. 'Recepción' comunica mejor el valor contextual de ὁποίαν εἴσοδον, y 'dejando los ídolos' expresa con claridad el alejamiento implícito en ἀπὸ τῶν εἰδώλων. Se mantienen las notas existentes, ajustando la alternativa de conversión para que también suene natural en español.
