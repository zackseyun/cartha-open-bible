revisions:
- from: Porque ellos mismos informan acerca de nosotros qué clase de entrada tuvimos entre ustedes[a], y cómo se volvieron a Dios desde los ídolos para servir al Dios vivo y verdadero[b][c].
  to: Porque ellos mismos informan acerca de nosotros qué clase de recepción tuvimos entre ustedes[a], y cómo se volvieron a Dios dejando los ídolos para servir al Dios vivo y verdadero[b][c].
  rationale: La revisión corrige dos calcos poco naturales en español mientras preserva el sentido documentado por el expediente inglés. 'Recepción' comunica mejor el valor contextual de ὁποίαν εἴσοδον, y 'dejando los ídolos' expresa con claridad el alejamiento implícito en ἀπὸ τῶν εἰδώλων. Se mantienen las notas existentes, ajustando la alternativa de conversión para que también suene natural en español.
