    rationale: Ἰησοῦν está en aposición explicativa a 'su Hijo'. Una raya larga refleja mejor la estructura y el énfasis del original y del POB inglés.
  revised_spanish_text: 'y esperar a su Hijo del cielo, a quien resucitó de entre los muertos: Jesús, que nos rescata[a] de la ira venidera.'
