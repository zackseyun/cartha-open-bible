translation:
  language: es
  text: 'y esperar a su Hijo del cielo, a quien resucitó de entre los muertos: Jesús, que nos rescata[a] de la ira venidera.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'que nos libra de la ira venidera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμένειν
  english_pob_choice: to wait for
  chosen_spanish: esperar a
  alternatives_spanish:
  - aguardar a
  - esperar por
  lexicon: BDAG
  rationale: En español, 'esperar a' comunica de forma natural la expectativa activa que expresa el infinitivo griego. 'Aguardar a' es posible pero más formal; 'esperar por' suena menos natural en este contexto.
- source_word: υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: su Hijo
  alternatives_spanish:
  - el Hijo de él
  - su Hijo
  lexicon: BDAG
  rationale: '''Su Hijo'' preserva el título filial cristológico de manera directa y reverente. En español no hace falta expansión adicional.'
- source_word: ἐκ τῶν οὐρανῶν
  english_pob_choice: from heaven
  chosen_spanish: desde el cielo
  alternatives_spanish:
  - desde los cielos
  - de los cielos
  lexicon: BDAG
  rationale: Aunque el griego usa plural, en español bíblico y actual 'el cielo' es la forma más natural para esta procedencia. Se evita el calco 'los cielos' cuando podría sonar menos idiomático, sin perder el sentido de procedencia celestial.
- source_word: ὃν ἤγειρεν ἐκ τῶν νεκρῶν
  english_pob_choice: whom he raised from the dead
  chosen_spanish: a quien resucitó de entre los muertos
  alternatives_spanish:
  - a quien levantó de entre los muertos
  - a quien despertó de entre los muertos
  lexicon: BDAG
  rationale: '''Resucitó'' es la forma más establecida y fiel en español para el acto de la resurrección. ''De entre los muertos'' conserva el valor de ἐκ τῶν νεκρῶν mejor que un simple ''de los muertos''.'
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español, sin añadir el título 'Cristo' donde el griego aquí solo dice 'Jesús'.
- source_word: τὸν ῥυόμενον
  english_pob_choice: who rescues
  chosen_spanish: quien nos rescata
  alternatives_spanish:
  - quien nos libra
  - quien nos salva
  lexicon: BDAG
  rationale: '''Rescata'' reproduce bien el sentido activo de liberación de ῥύομαι y suena natural en español contemporáneo. ''Libra'' es posible, pero puede sonar más tradicional; ''salva'' sería más amplio que el valor concreto del verbo.'
- source_word: ἐκ τῆς ὀργῆς
  english_pob_choice: from ... wrath
  chosen_spanish: de la ira
  alternatives_spanish:
  - de la cólera
  - de la indignación
  lexicon: BDAG
  rationale: '''Ira'' es el equivalente más directo y habitual para ὀργή en contexto teológico. Se mantiene el sustantivo fuerte del original, en vez de suavizarlo con ''juicio''.'
- source_word: τῆς ἐρχομένης
  english_pob_choice: the coming
  chosen_spanish: venidera
  alternatives_spanish:
  - que viene
  - futura
  - la que está por venir
  lexicon: BDAG
  rationale: '''Venidera'' conserva concisión, solemnidad y el valor de algo que se aproxima. Evita especificar más de lo que el participio permite.'
theological_decisions:
- issue: Naturaleza de 'la ira venidera'
  english_pob_reading: Retain the phrase 'the coming wrath' without specifying whether it refers to final judgment, eschatological tribulation, or God's wrath more generally.
  chosen_spanish_reading: Mantener 'la ira venidera' sin precisar si se trata del juicio final, de la tribulación escatológica o de la ira de Dios en sentido más general.
  alternative_spanish_readings:
  - el juicio venidero
  - la ira que ha de venir interpretada como tribulación final
  - la condenación venidera
  rationale: El griego es teológicamente cargado pero no define de manera estrecha el referente. Conservar 'ira' preserva la tensión doctrinal y evita imponer una interpretación escatológica particular.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Fuerza del participio presente ῥυόμενον
  english_pob_reading: Render as 'who rescues us' rather than a more temporally specific 'who will rescue us.'
  chosen_spanish_reading: Traducir con 'quien nos rescata' en vez de un futuro explícito como 'quien nos rescatará'.
  alternative_spanish_readings:
  - quien nos rescatará
  - quien nos está rescatando
  rationale: El participio presente caracteriza a Jesús como el que rescata; no obliga a un futuro gramatical. Dado que el objeto es una ira venidera, la formulación mantiene la orientación futura sin forzarla.
  doctrine_reference: Primacía del original sobre la tradición de traducción; preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios aplicados en la última pasada y que el acuerdo con la revisión es alto; por ello, el borrador español sigue de cerca el texto base y la auditoría inglesa sin introducir variantes innecesarias.
  spanish_consistency_notes:
  - Se mantuvo 'ira' para ὀργή, evitando sustituirlo por 'juicio'.
  - Se eligió 'desde el cielo' por naturalidad en español, aunque el griego sea plural.
  - Se conservó 'Jesús' sin añadir 'Cristo', ya que el nombre propio es suficiente en este versículo.
  - '''Quien'' se usa para la cláusula relativa sobre Jesús, con estilo bíblico actual y claro.'
