  spanish_quality_summary: El español es claro, digno y ampliamente legible. 'Esperar a su Hijo', 'de entre los muertos' y 'la ira venidera' funcionan bien. 'Quien' tras aposición con nombre propio no es incorrecto, pero 'que' suena un poco más natural en registro bíblico corriente; aun así, el punto principal a corregir es la mala colocación de la nota. 'Del cielo' mejora la naturalidad frente a 'desde el cielo' en este contexto.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: Ἰησοῦς = ''Jesús''; ὀργή = ''ira''; no aparece YHWH ni Χριστός. La elección ''rescata'' para ῥυόμενον es aceptable y coherente con la justificación auditada, manteniendo como alternativa en nota ''libra''.'
