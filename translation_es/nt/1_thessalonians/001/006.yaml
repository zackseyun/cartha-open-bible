translation:
  language: es
  text: Y ustedes llegaron a ser imitadores de nosotros y del Señor[a], habiendo recibido la palabra en mucha aflicción, con gozo del Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con gozo del Espíritu Santo», es decir, gozo producido por el Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μιμηταὶ
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: μιμηταί señala a quienes imitan o emulan un ejemplo. «Imitadores» conserva con precisión la relación de modelo y evita debilitar el término con «seguidores».
- source_word: ἐγενήθητε
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - se volvieron
  lexicon: BDAG
  rationale: El aoristo de γίνομαι indica un cambio de estado. «Llegaron a ser» conserva ese valor ingresivo y suena natural en español actual.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - maestro
  lexicon: BDAG
  rationale: κύριος aquí funciona como título cristológico referido a Jesús. En español, «Señor» es la forma adecuada y bíblicamente reconocible.
- source_word: δεξάμενοι
  english_pob_choice: having received
  chosen_spanish: habiendo recibido
  alternatives_spanish:
  - recibiendo
  - después de recibir
  lexicon: BDAG
  rationale: El participio aoristo se expresa bien como acción concomitante o instrumental. «Habiendo recibido» preserva el matiz verbal sin añadir interpretación innecesaria.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  lexicon: BDAG
  rationale: λόγος alude aquí al mensaje proclamado. «La palabra» mantiene la dicción paulina y la resonancia bíblica; «el mensaje» sería una alternativa interpretativa válida.
- source_word: ἐν θλίψει πολλῇ
  english_pob_choice: in much affliction
  chosen_spanish: en mucha aflicción
  alternatives_spanish:
  - en gran tribulación
  - en gran sufrimiento
  lexicon: BDAG
  rationale: θλῖψις designa presión, aflicción o angustia. «Aflicción» conserva el campo semántico sin cargar el término con connotaciones escatológicas que «tribulación» podría sugerir.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con gozo
  alternatives_spanish:
  - con alegría
  lexicon: BDAG
  rationale: La preposición con χαρά se traduce de forma directa. «Gozo» comunica un matiz más estable y bíblico que «alegría» en este contexto.
- source_word: πνεύματος ἁγίου
  english_pob_choice: of the Holy Spirit
  chosen_spanish: del Espíritu Santo
  alternatives_spanish:
  - del Espíritu Santo como fuente
  - producido por el Espíritu Santo
  lexicon: BDAG
  rationale: El genitivo con χαρά admite relación de origen o de cualidad. «Del Espíritu Santo» conserva la ambigüedad productiva del griego y permite leer el gozo como procedente del Espíritu sin explicitar de más.
theological_decisions:
- issue: Relación genitiva en «gozo del Espíritu Santo»
  english_pob_reading: joy of the Holy Spirit
  chosen_spanish_reading: gozo del Espíritu Santo
  alternative_spanish_readings:
  - gozo proveniente del Espíritu Santo
  - gozo producido por el Espíritu Santo
  - gozo propio del Espíritu Santo
  rationale: La construcción griega permite tanto un sentido de procedencia como de cualidad. Mantener «del Espíritu Santo» preserva la tensión sin resolverla artificialmente y deja abierto que el gozo sea Espíritu-dado.
  doctrine_reference: Preservar la ambigüedad significativa del texto cuando el griego no obliga a una sola relación genitiva.
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió evitar una expansión interpretativa explícita («from the Holy Spirit») y volver a una formulación más cercana al genitivo («of the Holy Spirit»). La redacción española sigue esa decisión al conservar «del Espíritu Santo» sin explicitar la relación genitiva en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según la convención cristológica del proyecto.
  - Se usa «Espíritu Santo» con mayúsculas por referencia personal divina.
  - Se preserva «la palabra» para λόγος, en línea con la dicción paulina y el audit trail inglés.
  - No se introduce «Cristo» porque el griego aquí dice κύριος y el contexto inmediato no exige el título mesiánico.
