lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Introduce el resultado de lo anterior. «De modo que» conserva la fuerza consecutiva sin sonar forzado en español.
- source_word: γενέσθαι
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - llegaron a convertirse en
  lexicon: BDAG
  rationale: El infinitivo aoristo con valor de resultado se expresa naturalmente en español con una perífrasis de ingreso a un estado. «Llegaron a ser» preserva el matiz sin volver la frase pesada.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El griego dirige el resultado a los destinatarios; en español, «ustedes» da una referencia natural y amplia para lectura eclesial latinoamericana.
- source_word: τύπον
  english_pob_choice: an example
  chosen_spanish: un ejemplo
  alternatives_spanish:
  - un modelo
  - un patrón
  lexicon: BDAG
  rationale: τύπος aquí denota una forma ejemplar para otros. «Ejemplo» es claro y fiel; mantiene abiertas las alternativas de «modelo» y «patrón» que el audit trail inglés preserva.
- source_word: πᾶσιν τοῖς πιστεύουσιν
  english_pob_choice: to all the believers
  chosen_spanish: para todos los creyentes
  alternatives_spanish:
  - para todos los que creen
  - ante todos los creyentes
  lexicon: BDAG
  rationale: El participio sustantivado se traduce de manera natural como «los creyentes». «Para» refleja la relación de tipo/beneficio implícita en el dativo con τύπον.
- source_word: ἐν τῇ Μακεδονίᾳ
  english_pob_choice: in Macedonia
  chosen_spanish: en Macedonia
  alternatives_spanish:
  - en la Macedonia
  lexicon: BDAG
  rationale: Se conserva el nombre geográfico y la preposición local directa del griego.
- source_word: Ἀχαΐᾳ
  english_pob_choice: Achaia
  chosen_spanish: Acaya
  alternatives_spanish:
  - Acaia
  lexicon: BDAG
  rationale: Nombre geográfico tradicional en español bíblico, con grafía más común y legible.
translation_notes:
  revision_awareness: La versión inglesa revisada quedó sin cambios y el cotejo final reportó alta concordancia; por eso la redacción española sigue de cerca el sentido resultante del griego, especialmente en la relación consecutiva de ὥστε y el valor ejemplar de τύπον.
  spanish_consistency_notes:
  - Se evitó traducir mecánicamente el inglés; «de modo que» y «llegaron a ser» intentan reflejar el resultado expresado por ὥστε + γενέσθαι.
  - Se prefirió «creyentes» para πᾶσιν τοῖς πιστεύουσιν por ser el sustantivo natural del participio en español.
  - «Acaya» mantiene el paralelismo con Macedonia y corresponde al topónimo bíblico habitual en español.
  - No hay decisiones doctrinales específicas en este versículo.
