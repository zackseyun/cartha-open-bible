    changes_summary: 'Changed “the Messiah” to “Christ” for more natural formal register and consistency with standard rendering of Χριστοῦ in this context; no other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: recordando su obra de fe[a] y labor de amor y perseverancia de esperanza en nuestro Señor Jesús Mesías[b] delante de nuestro Dios y Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fidelidad» o «confianza», para «fe».
    reason: lexical_alternative
  - marker: b
    text: O «Cristo», si se prefiere conservar la forma tradicional del título griego.
    reason: alternative_reading
lexical_decisions:
- source_word: μνημονεύοντες
  english_pob_choice: remembering
  chosen_spanish: recordando
  alternatives_spanish:
  - memorizando
  - teniendo presentes
  lexicon: BDAG
  rationale: El participio presente mantiene la idea de una acción continua vinculada con el verso anterior. «Recordando» comunica bien ese valor en español sin volverlo mecánico.
- source_word: ἔργου
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - hecho
  - actividad
  lexicon: BDAG
  rationale: «Obra» conserva el sustantivo concreto y encaja de manera natural con el genitivo «de fe», manteniendo el paralelismo paulino de la tríada.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se mantiene el valor principal de πίστις como «fe». La frase puede entenderse como obra producida por la fe o caracterizada por ella; no se resuelve artificialmente la tensión.
- source_word: κόπου
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - fatiga
  - esfuerzo
  lexicon: BDAG
  rationale: '«Trabajo» en español expresa el esfuerzo intenso del término, aunque «labor» también sería posible. Aquí se elige por claridad y fluidez junto a «obra». '
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se traduce con el término básico y más amplio «amor», conforme al valor habitual de ἀγάπη en el proyecto.
- source_word: ὑπομονῆς
  english_pob_choice: steadfastness
  chosen_spanish: perseverancia
  alternatives_spanish:
  - constancia
  - resistencia
  lexicon: BDAG
  rationale: «Perseverancia» expresa bien la firmeza paciente bajo presión. En español suena natural en una tríada de virtudes y conserva el sentido de resistencia duradera.
- source_word: ἐλπίδος
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - expectación
  lexicon: BDAG
  rationale: Equivale de forma directa a la esperanza confiada de Pablo; no requiere matiz adicional en la línea principal.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: in our Lord Jesus Messiah
  chosen_spanish: en nuestro Señor Jesús Mesías
  alternatives_spanish:
  - de nuestro Señor Jesús Mesías
  - en nuestro Señor Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título, no como mero nombre. «En» mantiene la relación de esfera/objeto de la esperanza con la misma naturalidad que el inglés auditado.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» expresa de manera clara la idea relacional de estar ante la presencia de Dios, sin perder la sencillez del griego.
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  english_pob_choice: our God and Father
  chosen_spanish: nuestro Dios y Padre
  alternatives_spanish:
  - Dios nuestro Padre
  lexicon: BDAG
  rationale: Se conserva la estructura estrecha del griego y la posesión común («nuestro») aplicada a ambos sustantivos, como en el audit trail inglés.
theological_decisions:
- issue: Renderización de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el título mesiánico en español para conservar el valor semántico de Χριστός. Esto sigue la directriz del proyecto de traducir títulos cuando el contexto los presenta como tales.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Sentido de πίστις en τῆς πίστεως
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se conserva «fe» como lectura principal, pero sin negar que la frase pueda describir una obra originada por la fe o marcada por ella. La ambigüedad se deja intacta porque el griego permite ambas posibilidades.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for πίστις; preserve theological tension where ambiguity is genuine'
translation_notes:
  revision_awareness: 'El texto sigue la última corrección doctrinal del paquete: Χριστοῦ vuelve a renderizarse con valor titular como «Mesías», no como nombre litúrgico fijo. También evita resolver de manera excesiva la relación genitiva de «obra de fe» y mantiene la sintaxis de la tríada paulina.'
  spanish_consistency_notes:
  - He usado un registro neutral y eclesialmente legible, sin calcos duros del inglés.
  - La puntuación preserva el paralelismo retórico del original mediante comas coordinadas.
  - «Nuestro Señor Jesús Mesías» se eligió para reflejar el valor titular de Χριστός y evitar el borrado del matiz mesiánico.
  - No se introdujo nota sobre «fe» porque el matiz alternativo puede mantenerse en las decisiones léxicas sin cargar el texto principal.
