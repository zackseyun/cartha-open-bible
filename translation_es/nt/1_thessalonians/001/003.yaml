review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura del participio «recordando» y la tríada paulina «obra… trabajo… perseverancia». También respeta correctamente la decisión del proyecto de traducir Χριστός como «Mesías» y de entender «en nuestro Señor Jesús Mesías» como modificando «esperanza». Sin embargo, omite la nota léxica del inglés sobre πίστις («fe / fidelidad / confianza»), y la puntuación con comas antes de cada «y» suena poco natural en español para esta coordinación simple.
  spanish_quality_summary: El texto es comprensible y fiel, pero necesita una reparación menor para mayor naturalidad y para preservar plenamente el aparato auditado. «Trabajo de amor» es aceptable, aunque «labor de amor» refleja mejor el matiz de κόπος y mantiene mejor la tríada retórica. La puntuación debe simplificarse. «Delante de nuestro Dios y Padre» es correcto y legible.
  glossary_alignment: 'Alineación general buena con la terminología del proyecto: «Jesús», «Mesías», «Dios», «fe», «amor», «esperanza». No hay conflicto con los glosarios principales. La principal falta es no conservar en notas la alternativa significativa para πίστις, que sí fue preservada en el audit trail inglés.'
  issues:
  - severity: medium
    issue: Falta la nota léxica sobre «fe».
    rationale: El English POB preserva explícitamente la alternativa «faithfulness / trust» para πίστις. Dado que el español también permite «fidelidad» o «confianza», debe conservarse esa alternativa en nota para mantener la decisión auditada.
  - severity: low
    issue: Puntuación poco natural con comas antes de cada «y».
    rationale: En español moderno, «obra de fe, y trabajo de amor, y perseverancia…» suena trabado y excesivamente calcado. La coordinación simple debe ir sin esas comas.
  - severity: low
    issue: «Trabajo de amor» es menos preciso que «labor de amor».
    rationale: κόπος connota esfuerzo intenso o fatiga. «Labor» en registro bíblico formal transmite mejor ese matiz y mantiene una tríada más pulida junto a «obra» y «perseverancia».
  revised_spanish_text: recordando su obra de fe[a] y labor de amor y perseverancia de esperanza en nuestro Señor Jesús Mesías[b] delante de nuestro Dios y Padre.
  revised_footnotes:
