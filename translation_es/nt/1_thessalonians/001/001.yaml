review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: remitentes, destinatario, la relación teológica expresada por ἐν, y el saludo de χάρις... καὶ εἰρήνη. También preserva correctamente «Mesías» para Χριστός, en línea con la política del proyecto y el rastro de auditoría inglés. Sin embargo, hay dos ajustes necesarios para mayor fidelidad y naturalidad: el griego tiene un solo ἐν antes de «Dios Padre y Señor Jesús Mesías», por lo que repetir «en» antes de «el Señor» sobretraduce levemente; y «gracia para ustedes» suena menos idiomático en un saludo epistolar que «gracia a ustedes».'
  spanish_quality_summary: El texto es claro y legible en español bíblico contemporáneo. «Pablo, Silvano y Timoteo» y «la iglesia de los tesalonicenses» son naturales. «Jesús Mesías» es comprensible, aunque marcado, pero adecuado al proyecto. La principal cuestión de estilo es «gracia para ustedes y paz», que resulta algo menos natural y menos cercano al dativo griego que «gracia a ustedes y paz». También conviene evitar la repetición de «en» para no cargar la frase sin necesidad.
  glossary_alignment: 'Buena alineación general con la glosa del proyecto: κύριος -> «Señor», Χριστός -> «Mesías», ἐκκλησία -> «iglesia» con nota alternativa «asamblea», χάρις -> «gracia», εἰρήνη -> «paz». No hay conflicto con «Yahvé», «Dios», «Espíritu» u otros términos por defecto. La única corrección relevante es ajustar la preposición para reflejar con más precisión la sintaxis de ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ.'
  issues:
  - severity: medium
    issue: Repetición de «en» antes de «el Señor»
    rationale: 'El griego tiene una sola preposición ἐν gobernando tanto «Dios Padre» como «Señor Jesús Mesías». En español puede mantenerse un solo «en» sin pérdida de claridad: «en Dios el Padre y el Señor Jesús Mesías». Repetirla no cambia drásticamente el sentido, pero añade una explicitación que el original no exige.'
  - severity: medium
    issue: «gracia para ustedes» es menos idiomático que «gracia a ustedes»
    rationale: El dativo ὑμῖν se expresa más naturalmente en este saludo como «a ustedes». «Para ustedes» no es incorrecto, pero suena menos directo y ligeramente menos fiel al giro epistolar tradicional del texto fuente.
  revised_spanish_text: 'Pablo, Silvano y Timoteo, a la iglesia de los tesalonicenses[a] en Dios el Padre y el Señor Jesús Mesías: gracia a ustedes y paz.'
  revised_footnotes:
