    text: O «asamblea» para ἐκκλησία. El griego se refiere a la comunidad reunida; «iglesia» es la forma más natural en este saludo.
    reason: lexical_alternative
  revision_rationale: 'Se hicieron dos reparaciones menores: (1) se eliminó la segunda «en» para reflejar mejor la única preposición griega que abarca ambos complementos, y (2) se cambió «para ustedes» por «a ustedes» para un español más idiomático y más cercano al dativo griego en este saludo paulino. Se mantiene «Mesías» conforme a la política doctrinal y al expediente de auditoría.'
