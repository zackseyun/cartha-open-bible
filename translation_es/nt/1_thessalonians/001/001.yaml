source:
  edition: SBLGNT
  text: Παῦλος καὶ Σιλουανὸς καὶ Τιμόθεος τῇ ἐκκλησίᾳ Θεσσαλονικέων ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ· χάρις ὑμῖν καὶ ⸀εἰρήνη.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/001/001.yaml
  text: 'Paul and Silvanus and Timothy[b][a], to the church of the Thessalonians in God the Father and the Lord Jesus Messiah: grace to you and peace.'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning; many English versions transliterate it as 'Christ.'
    reason: alternative_reading
  - marker: b
    text: Or 'assembly' for 'church.' The Greek ἐκκλησία refers to the gathered community.
    reason: lexical_alternative
