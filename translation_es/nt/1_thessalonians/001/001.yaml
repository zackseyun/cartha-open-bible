    unchanged: false
    changes_summary: 'Changed “the Messiah” to “Christ” for formal register and consistency with standard rendering of Χριστῷ in this epistolary greeting; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Pablo, Silvano y Timoteo, a la iglesia de los tesalonicenses[a] en Dios el Padre y el Señor Jesús Mesías: gracia a ustedes y paz.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asamblea» para ἐκκλησία. El griego se refiere a la comunidad reunida; «iglesia» es la forma más natural en este saludo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: BDAG
  rationale: Nombre propio ya asentado en español bíblico y totalmente natural para Παῦλος.
- source_word: Σιλουανὸς
  english_pob_choice: Silvanus
  chosen_spanish: Silvano
  alternatives_spanish:
  - Silas
  lexicon: BDAG
  rationale: El griego tiene Σιλουανός, por lo que «Silvano» sigue de cerca la forma fuente; «Silas» correspondería a otra forma griega y no conviene aquí.
- source_word: Τιμόθεος
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timotheo
  lexicon: BDAG
  rationale: Transliteración española normal del nombre Τιμόθεος.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: «Iglesia» es la equivalencia más natural y recibida en este saludo epistolar; «asamblea» expresa el sentido reunido, pero suena menos idiomático en español aquí.
- source_word: Θεσσαλονικέων
  english_pob_choice: of the Thessalonians
  chosen_spanish: de los tesalonicenses
  alternatives_spanish:
  - de la gente de Tesalónica
  lexicon: BDAG
  rationale: El genitivo plural refiere al grupo étnico/local; la forma breve «tesalonicenses» es clara y fiel.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - entre
  - dentro de
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» para conservar la relación/sfera expresada por el griego sin explicarla de más.
- source_word: θεῷ πατρὶ
  english_pob_choice: God the Father
  chosen_spanish: Dios el Padre
  alternatives_spanish:
  - Dios, el Padre
  - Dios nuestro Padre
  lexicon: BDAG
  rationale: El griego no añade posesivo; «Dios el Padre» conserva la construcción apposicional sin introducir «nuestro».
- source_word: κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente bíblico estándar de κύριος en español y preserva el registro cristológico.
- source_word: Ἰησοῦ Χριστῷ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús el Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» para conservar su sentido titular; en un saludo paulino, la lectura de título sigue siendo clara en español.
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - benevolencia
  lexicon: BDAG
  rationale: Término paulino estándar, con el sentido teológico habitual de χάρις.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - para vosotros
  lexicon: BDAG
  rationale: «Para ustedes» comunica bien el dativo de destinatario en español contemporáneo y mantiene tono reverente sin arcaísmo.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - shalom
  lexicon: BDAG
  rationale: «Paz» es la equivalencia directa y natural; «shalom» introduciría una transliteración innecesaria en este contexto.
theological_decisions:
- issue: Cómo traducir Χριστός en un saludo paulino
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se preserva el valor titular de Χριστός en lugar de fijarlo como nombre litúrgico; esto sigue la política del proyecto y evita perder el contenido semántico del término.
  doctrine_reference: 'DOCTRINE.md: Χριστός / Messiah language; traducir como Mesías cuando el título sigue activo.'
- issue: Relación expresada por ἐν θεῷ πατρὶ καὶ κυρίῳ Ἰησοῦ Χριστῷ
  english_pob_reading: the church exists 'in' God the Father and the Lord Jesus Messiah
  chosen_spanish_reading: la iglesia está 'en' Dios el Padre y en el Señor Jesús Mesías
  alternative_spanish_readings:
  - la iglesia pertenece a Dios el Padre y al Señor Jesús Mesías
  - la iglesia se reúne en la esfera de Dios el Padre y del Señor Jesús Mesías
  rationale: Se conserva «en» para no resolver interpretativamente la relación de pertenencia/ámbito; así se mantiene la tensión teológica y la paralela vinculación del Padre y del Hijo.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El contexto inglés muestra una oscilación editorial entre «Messiah» y «Christ» en la revisión, seguida de una corrección que restauró «Messiah». Para el español se siguió la forma más coherente con la política doctrinal del proyecto: traducir Χριστός como «Mesías» cuando funciona como título, manteniendo además el saludo paulino con el orden retórico del griego. Se evitó armonizar con traducciones eclesiásticas tradicionales donde ello borraría el sentido lexical.'
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia de nombres propia del saludo paulino: Pablo, Silvano y Timoteo.'
  - «Iglesia» se usó como término principal, con nota para la alternativa «asamblea».
  - «Señor» se reservó para κύριος y «Mesías» para Χριστός, en coherencia con la terminología del proyecto.
  - «Para ustedes» refleja el destinatario plural sin recurrir a un arcaísmo.
  - No se añadió posesivo a «Dios el Padre», porque no está en el griego.
