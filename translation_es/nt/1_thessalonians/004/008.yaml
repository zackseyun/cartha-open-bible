translation:
  language: es
  text: Por lo tanto[a], el que rechaza esto no rechaza a un hombre, sino a Dios[b], quien también les da su Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el que desestima esto no desestima a un hombre, sino a Dios». El verbo también puede significar «rechazar», «desestimar» o «desechar».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit. «hacia/para ustedes»; el griego usa εἰς, literalmente «hacia» o «dentro de», aunque en español aquí se expresa naturalmente como destinatario: «les da».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοιγαροῦν
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Así que
  - Entonces
  - Consecuentemente
  lexicon: BDAG
  rationale: Expresa con naturalidad la conclusión inferida del contexto previo y conserva el valor conclusivo de la partícula.
- source_word: ὁ ἀθετῶν / ἀθετεῖ
  english_pob_choice: whoever rejects ... rejects
  chosen_spanish: el que rechaza ... rechaza
  alternatives_spanish:
  - quien rechaza ... rechaza
  - el que desprecia ... desprecia
  - el que desecha ... desecha
  lexicon: BDAG
  rationale: El participio con artículo tiene fuerza genérica/representativa. 'El que' reproduce bien esa función en español, y 'rechaza' preserva el peso de oposición a una instrucción o autoridad establecida.
- source_word: οὐκ ἄνθρωπον ... ἀλλὰ τὸν θεόν
  english_pob_choice: not man but God
  chosen_spanish: no a hombre, sino a Dios
  alternatives_spanish:
  - no a un hombre, sino a Dios
  - no a un ser humano, sino a Dios
  lexicon: BDAG
  rationale: La contraposición breve del griego se mantiene en español. Se conserva el singular genérico 'hombre' para reflejar la concisión y el contraste directo con Dios.
- source_word: τὸν καὶ διδόντα
  english_pob_choice: who also gives
  chosen_spanish: quien también les da
  alternatives_spanish:
  - quien también está dando
  - quien además da
  - quien asimismo les da
  lexicon: BDAG
  rationale: El participio presente se vierte con una relativa natural en español. 'También' refleja καί y mantiene la acción continua o característica de Dios sin volverla forzada.
- source_word: τὸ πνεῦμα αὐτοῦ τὸ ἅγιον
  english_pob_choice: his Holy Spirit
  chosen_spanish: su Espíritu Santo
  alternatives_spanish:
  - su espíritu santo
  lexicon: BDAG
  rationale: En este contexto paulino la expresión designa al Espíritu Santo personal de Dios. Se usa mayúscula por referencia teológica, no por añadidura doctrinal, sino por la identificación del referente en el pasaje.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: El griego literalmente puede sugerir 'hacia/into', pero en español bíblico natural con δίδωμι resulta más idiomático expresar el destinatario con complemento indirecto. 'Les' evita una literalidad áspera y conserva el sentido de concesión del don.
theological_decisions:
- issue: Referente de 'su Espíritu Santo'
  english_pob_reading: The phrase refers to the personal Holy Spirit given by God to believers.
  chosen_spanish_reading: La frase se refiere al Espíritu Santo personal que Dios da a los creyentes.
  alternative_spanish_readings:
  - un espíritu santo como cualidad o disposición
  - el espíritu santo como don impersonal
  rationale: El sintagma τὸ πνεῦμα αὐτοῦ τὸ ἅγιον, en el contexto paulino, apunta de manera natural al Espíritu Santo como persona divina. La capitalización en español sirve para reflejar ese referente sin expandir el texto más allá de lo que el pasaje permite.
  doctrine_reference: Afirmaciones; filosofía de traducción §6
- issue: Fuerza genérica de ὁ ἀθετῶν
  english_pob_reading: Rendered as 'whoever rejects' rather than a masculine-specific expression.
  chosen_spanish_reading: 'Se traduce con un singular genérico: ''el que rechaza''.'
  alternative_spanish_readings:
  - quien rechaza
  - si alguno rechaza
  rationale: El masculino singular griego es representativo y no limita el sentido a varones. 'El que' conserva esa generalidad en español, con un registro claro y publicable.
  doctrine_reference: Filosofía de traducción §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el registro auditado de la POB en inglés, sin cambios revisionales necesarios frente al último pase; se mantiene la conclusión inferencial, la antítesis hombre/Dios y la identificación pneumatológica del don.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Espíritu Santo' para τὸ πνεῦμα αὐτοῦ τὸ ἅγιον.
  - Se conserva el singular genérico 'el que' para el participio articular ὁ ἀθετῶν.
  - Se evita 'SEÑOR' porque aquí no aparece κύριος en el texto fuente.
  - '''Rechaza'' reproduce la fuerza de ἀθετέω con un equivalente natural en español bíblico.'
