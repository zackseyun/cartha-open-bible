translation:
  language: es
  text: que nadie sobrepase ni explote[a] a su hermano[b] en este asunto, porque el Señor es vengador de todas estas cosas, como también ya se lo dijimos antes y se lo advertimos solemnemente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "defraude a su hermano en este asunto". El griego puede denotar aprovecharse de alguien, y algunos entienden la frase más específicamente como fraude; en contexto, la advertencia probablemente se refiere a una mala conducta sexual.'
    reason: lexical_alternative
  - marker: b
    text: '"Su hermano" traduce una expresión griega masculina singular. La redacción probablemente se enfoca en un compañero creyente, aunque la advertencia ética puede aplicarse más ampliamente dentro de la comunidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ μὴ ὑπερβαίνειν
  english_pob_choice: that no one should overstep
  chosen_spanish: que nadie sobrepase
  alternatives_spanish:
  - que nadie trasgreda
  - que nadie vaya más allá
  lexicon: BDAG
  rationale: El infinitivo articular negativo funciona como contenido exhortativo dependiente del contexto inmediato. Sobrepasar conserva la imagen de cruzar un límite moral y suena natural en español.
- source_word: πλεονεκτεῖν
  english_pob_choice: exploit
  chosen_spanish: explote
  alternatives_spanish:
  - se aproveche de
  - defraude
  lexicon: BDAG
  rationale: En este contexto de santidad sexual, el verbo apunta a sacar ventaja injusta de otro. 'Explotar' conserva la amplitud moral del término sin reducirlo solo a fraude económico; la alternativa tradicional se preserva como posibilidad interpretativa.
- source_word: ἐν τῷ πράγματι
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en este asunto
  - en este tema
  - en este caso
  lexicon: BDAG
  rationale: πρᾶγμα es general, pero el contexto inmediato delimita el referente. 'Este asunto' mantiene la referencia sin especificarla más allá de lo que permite el griego.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su hermano en la fe
  lexicon: BDAG
  rationale: Se conserva la forma masculina singular del griego. 'Hermano' refleja fielmente la expresión y evita neutralizar la forma fuente; la posible amplitud comunitaria queda implícita sin alterar el texto principal.
- source_word: ἔκδικος κύριος
  english_pob_choice: the Lord is an avenger
  chosen_spanish: el Señor es vengador
  alternatives_spanish:
  - el Señor es vengador de los agravios
  - el Señor es quien hace justicia
  lexicon: BDAG
  rationale: ἔκδικος expresa la función de quien vindica o castiga el mal. 'Vengador' conserva esa fuerza judicial; 'Señor' mantiene la equivalencia estándar para κύριος.
- source_word: περὶ πάντων τούτων
  english_pob_choice: concerning all these things
  chosen_spanish: de todas estas cosas
  alternatives_spanish:
  - respecto de todas estas cosas
  - sobre todas estas cosas
  lexicon: BDAG
  rationale: La preposición περί con genitivo puede expresarse naturalmente en español con 'de' en este contexto. 'Todas estas cosas' mantiene el alcance amplio del aviso apostólico.
- source_word: προείπαμεν
  english_pob_choice: told you beforehand
  chosen_spanish: ya se lo dijimos antes
  alternatives_spanish:
  - ya se lo habíamos dicho
  - ya se lo dijimos de antemano
  lexicon: BDAG
  rationale: El compuesto indica una comunicación previa; la construcción con pronombre dativo indirecto hace el español más natural. 'Antes' conserva la anterioridad sin redundancia.
- source_word: διεμαρτυράμεθα
  english_pob_choice: solemnly warned you
  chosen_spanish: se lo advertimos solemnemente
  alternatives_spanish:
  - se lo atestiguamos solemnemente
  - se lo exhortamos con seriedad
  lexicon: BDAG
  rationale: El verbo intensifica la advertencia previa. 'Advertimos solemnemente' comunica bien el tono enfático y judicial-pastoral del término en este contexto.
theological_decisions:
- issue: Alcance del abuso en "este asunto"
  english_pob_reading: The verse continues the sexual-ethics instruction of vv. 3–5, warning against violating and exploiting a fellow believer in sexual matters.
  chosen_spanish_reading: El versículo continúa la instrucción sobre santidad sexual de los vv. 3–5, advirtiendo contra violar y explotar a un hermano en ese ámbito.
  alternative_spanish_readings:
  - El versículo puede referirse más ampliamente al fraude interpersonal o comercial.
  - El asunto puede entenderse sin especificar el contexto sexual.
  rationale: El contexto inmediato trata sobre santificación, dominio propio y pureza sexual; por eso el español mantiene 'este asunto' sin precisar de más, pero con un verbo que conserva el daño moral. La nota permite la lectura alternativa de fraude sin desplazar la más probable.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Representación de ἀδελφός
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su hermano o hermana
  - otro creyente
  rationale: El griego usa masculino singular y el proyecto prioriza la fidelidad formal cuando no hay razón textual para neutralizar. La forma española mantiene ese dato, mientras que la nota puede recordar que el principio ético alcanza al ámbito comunitario.
  doctrine_reference: Translation philosophy §4
- issue: Sentido de ἔκδικος κύριος
  english_pob_reading: the Lord is an avenger
  chosen_spanish_reading: el Señor es vengador
  alternative_spanish_readings:
  - el Señor ejecuta justicia
  - el Señor toma venganza
  rationale: La expresión tiene fuerza judicial y retributiva. 'Vengador' conserva la tensión lexical que el texto no suaviza, evitando sustituirla por una paráfrasis más abstracta que podría diluir el matiz.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT, la tabla morfológica y el rastro auditado en inglés. No se requirieron cambios respecto del último pase de revisión; la decisión principal fue mantener un español natural sin perder el matiz judicial y el posible trasfondo de abuso sexual.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no pertinente aquí, ya que el texto usa κύριος y el contexto exige 'Señor'.
  - Se conservó un registro sobrio y bíblico, evitando términos demasiado técnicos o eclesiásticos cuando el griego es más general.
  - La nota a [a] preserva la alternativa 'defraude' para no cerrar la ambigüedad lexical del verbo.
  - No se añadió nota separada para 'hermano' porque el texto principal ya refleja el masculino singular y la amplitud comunitaria queda como observación teológica.
