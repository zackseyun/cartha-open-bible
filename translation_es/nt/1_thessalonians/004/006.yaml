base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/004/006.yaml
  text: that no one should overstep and exploit his brother in this matter[a], because the Lord is an avenger concerning all these things[b], just as we also told you beforehand and solemnly warned you.
  footnotes:
