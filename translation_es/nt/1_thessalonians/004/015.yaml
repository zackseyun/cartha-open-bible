translation:
  language: es
  text: 'Porque esto les decimos por una palabra del Señor[a]: que nosotros, los que vivimos, los que permanecemos hasta la venida del Señor[b], de ningún modo precederemos a los que se han dormido[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por la palabra del Señor». El griego puede referirse tanto a una palabra procedente del Señor Jesús como a una revelación dada con su autoridad.'
    reason: alternative_reading
  - marker: b
    text: O «presencia» o «llegada» para «venida» (griego παρουσία).
    reason: lexical_alternative
  - marker: c
    text: «Se han dormido» es una metáfora para los creyentes que han muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν λόγῳ κυρίου
  english_pob_choice: by a word from the Lord
  chosen_spanish: por palabra del Señor
  alternatives_spanish:
  - por una palabra del Señor
  - por la palabra del Señor
  - en palabra del Señor
  lexicon: BDAG
  rationale: 'Conserva el valor instrumental de ἐν y la ambigüedad auditada: puede ser una palabra procedente del Señor o una palabra dicha con su autoridad. Evité «la palabra» como forma única porque en español suena más determinada de lo que el griego exige aquí.'
- source_word: παρουσίαν
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto escatológico, παρουσία apunta al evento futuro de la llegada del Señor. «Venida» comunica ese sentido con naturalidad en español y mantiene el rango semántico señalado por la POB inglesa, sin fijarlo como «presencia» en el cuerpo principal.
- source_word: οἱ ζῶντες
  english_pob_choice: we who are living
  chosen_spanish: nosotros, los que vivimos
  alternatives_spanish:
  - nosotros, los que estamos vivos
  lexicon: BDAG
  rationale: La construcción participial se vierte de modo natural y directo. «Los que vivimos» mantiene el aspecto presente y evita una paráfrasis más interpretativa.
- source_word: οἱ περιλειπόμενοι
  english_pob_choice: who remain
  chosen_spanish: los que permanecemos
  alternatives_spanish:
  - los que quedamos
  - los que permanecemos hasta entonces
  lexicon: BDAG
  rationale: «Permanecemos» reproduce la idea de seguir todavía allí hasta el momento señalado. «Quedamos» sería posible, pero «permanecemos» mantiene un tono más sobrio y menos coloquial.
- source_word: οὐ μὴ φθάσωμεν
  english_pob_choice: will certainly not precede
  chosen_spanish: de ningún modo precederemos
  alternatives_spanish:
  - no precederemos en absoluto
  - ciertamente no precederemos
  - de ninguna manera iremos delante de
  lexicon: BDAG
  rationale: La negación enfática οὐ μή pide una fuerte negación en español. «Precederemos» refleja el valor de φθάνω aquí como ir delante de otros, y «de ningún modo» conserva la fuerza enfática sin sonar mecánico.
- source_word: τοὺς κοιμηθέντας
  english_pob_choice: those who have fallen asleep
  chosen_spanish: a los que han dormido
  alternatives_spanish:
  - a los que se durmieron
  - a los que han fallecido
  - a los muertos
  lexicon: BDAG
  rationale: Mantengo la metáfora de dormir para los creyentes muertos, como hace el griego y la POB inglesa. «Han dormido» suena un poco más natural que «han caído dormidos» y preserva la imagen sin explicarla en exceso.
- source_word: κύριος / κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor Jesús
  - el Señor
  lexicon: BDAG
  rationale: En este verso κύριος se refiere al Señor Jesús en contexto escatológico; «Señor» es el equivalente reverente y directo en español. No usé «Yahvé» porque aquí no se trata del tetragrámaton sino del título aplicado al Señor Jesucristo.
theological_decisions:
- issue: Alcance de ἐν λόγῳ κυρίου
  english_pob_reading: The statement is grounded in a word from the Lord, without deciding whether it is a direct dominical saying or a revelation given with the Lord's authority.
  chosen_spanish_reading: La frase queda como una apelación a la autoridad del Señor, sin decidir si Pablo cita una palabra directa de Jesús o una revelación con esa autoridad.
  alternative_spanish_readings:
  - cita explícita de una palabra de Jesús
  - revelación profética dada a Pablo
  rationale: El griego sostiene una ambigüedad real. La redacción española preserva esa tensión y evita cerrar la fuente exacta de la declaración.
  doctrine_reference: Preservar tensión teológica/documental sin resolverla
- issue: Metáfora de los creyentes muertos
  english_pob_reading: Retained the sleep metaphor for deceased believers.
  chosen_spanish_reading: Se conserva la metáfora del sueño para los creyentes muertos.
  alternative_spanish_readings:
  - los que han muerto
  - los difuntos
  rationale: «Han dormido» mantiene la imagen paulina y su carga de esperanza en la resurrección. Traducir simplemente «muertos» aclararía el referente, pero perdería la metáfora que el texto usa deliberadamente.
  doctrine_reference: Primacía del lenguaje original y de su textura teológica
- issue: Función de οὐ μὴ con φθάσωμεν
  english_pob_reading: Strong denial that the living will precede the dead.
  chosen_spanish_reading: «De ningún modo precederemos» expresa la negación enfática de que los vivos vayan delante de los que duermen.
  alternative_spanish_readings:
  - no precederemos
  - ciertamente no precederemos
  rationale: La combinación griega es enfática; la versión española debe sonar igualmente fuerte. Elegí una fórmula idiomática que preserve el énfasis sin añadir contenido doctrinal nuevo.
  doctrine_reference: Respeto del énfasis del original
- issue: παρουσία y expectativa escatológica
  english_pob_reading: Lexically rendered as 'coming,' with note that 'presence' or 'arrival' are possible.
  chosen_spanish_reading: «Venida» en el texto principal, con nota alternativa sobre «presencia» o «llegada».
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: «Venida» es la forma más transparente para el lector bíblico en español y comunica el evento futuro. La nota conserva la amplitud semántica del término griego.
  doctrine_reference: Mantener amplitud semántica sin diluir el sentido escatológico
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se requirieron cambios adicionales; la versión española conserva las decisiones léxicas y la ambigüedad teológica documentadas en el expediente más reciente.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en concordancia con el contexto cristológico del versículo.
  - Se usa «venida» para παρουσία en el cuerpo principal y se reserva la alternativa semántica para nota.
  - Se conserva la metáfora de «dormir» para los muertos creyentes, coherente con la POB inglesa.
  - La negación enfática de οὐ μή se refleja con «de ningún modo» para preservar la fuerza del original.
