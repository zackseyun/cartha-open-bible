    changes_summary: 'Revised ''an archangel’s voice'' to ''the voice of an archangel'' and ''God’s trumpet'' to ''the trumpet of God'' for closer lexical/formal correspondence; changed ''Messiah'' to ''Christ'' for standard rendering of ἐν Χριστῷ in this register. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque el Señor mismo descenderá del cielo con un mandato[a], con la voz de un arcángel y con la trompeta de Dios, y los muertos en Mesías[b] resucitarán primero,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un clamor de mando». El griego κέλευσμα puede denotar un llamado o una orden en voz alta.
    reason: lexical_alternative
  - marker: b
    text: 'Lectura tradicional: «los muertos en Cristo resucitarán primero».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Introduce la explicación de lo dicho antes; en español, «Porque» conserva bien el valor causal/explicativo sin sonar forzado.
- source_word: αὐτὸς ὁ κύριος
  english_pob_choice: the Lord himself
  chosen_spanish: el mismo Señor
  alternatives_spanish:
  - el Señor mismo
  - el propio Señor
  lexicon: BDAG
  rationale: La combinación enfática αὐτός + artículo + sustantivo pide marcar énfasis. «El mismo Señor» es natural en español y preserva esa fuerza.
- source_word: ἐν κελεύσματι
  english_pob_choice: with a command
  chosen_spanish: con un mandato
  alternatives_spanish:
  - con un clamor de mando
  - con una orden
  lexicon: BDAG
  rationale: κέλευσμα puede designar mandato, orden o llamado imperativo. «Mandato» mantiene brevedad y dignidad; la posible resonancia de voz o grito queda como alternativa en nota.
- source_word: ἐν φωνῇ ἀρχαγγέλου
  english_pob_choice: with the voice of an archangel
  chosen_spanish: con voz de arcángel
  alternatives_spanish:
  - con la voz de un arcángel
  - con voz de un arcángel
  lexicon: BDAG
  rationale: El genitivo puede expresarse naturalmente en español como complemento nominal («voz de arcángel»). Se evita introducir artículo no requerido por el griego y se conserva el tono elevado.
- source_word: ἐν σάλπιγγι θεοῦ
  english_pob_choice: with the trumpet of God
  chosen_spanish: con trompeta de Dios
  alternatives_spanish:
  - con la trompeta de Dios
  - con la trompeta divina
  lexicon: BDAG
  rationale: La construcción posesiva es fiel y clara en español. Se conserva «de Dios» para no suavizar la imagen apocalíptica del texto.
- source_word: καταβήσεται ἀπ’ οὐρανοῦ
  english_pob_choice: will descend from heaven
  chosen_spanish: descenderá del cielo
  alternatives_spanish:
  - bajará del cielo
  - descenderá desde el cielo
  lexicon: BDAG
  rationale: «Descenderá» mantiene el registro solemne y corresponde bien a καταβαίνω. «Del cielo» es la forma idiomática más natural en español; «cielo» traduce οὐρανός en este contexto.
- source_word: οἱ νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos
  - los fallecidos
  lexicon: BDAG
  rationale: El sustantivo/adjetivo sustantivado se vierte con el plural sustantivo común en español. «Muertos» conserva la concreción del grupo resucitado.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se mantiene el título mesiánico como decidió el POB en inglés, evitando sustituirlo por la forma devocional fija tradicional. En español, «Mesías» preserva el valor titular de Χριστός.
- source_word: ἀναστήσονται
  english_pob_choice: will rise
  chosen_spanish: resucitarán
  alternatives_spanish:
  - volverán a levantarse
  - serán levantados
  lexicon: BDAG
  rationale: Aunque el verbo puede traducirse literalmente «se levantarán / resucitarán», el contexto es claramente de resurrección escatológica. «Resucitarán» comunica el sentido sin perder precisión.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - primero
  - en primer lugar
  lexicon: BDAG
  rationale: Marca orden temporal respecto a lo que sigue en el contexto inmediato. «Primero» es breve y exacto.
theological_decisions:
- issue: Renderización de Χριστῷ en ἐν Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: 'El POB inglés documenta una decisión terminológica: traducir Χριστός como título («Messiah») en lugar de conservar la forma cristiana tradicional. En español se sigue la misma lógica con «Mesías», evitando aplanar el matiz titulativo. Se deja «en Cristo» como alternativa reconocible para lectores habituados a la fórmula tradicional.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'El borrador sigue la última revisión del POB inglés en los elementos de correspondencia más cercana: «the voice of an archangel» y «the trumpet of God» se reflejan como «voz de arcángel» y «trompeta de Dios». Se conserva además la restauración final de Χριστῷ como «Mesías», coherente con la política doctrinal documentada, y se evita volver a la forma tradicional inglesa/latina de Cristo como lectura principal.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según el uso habitual del proyecto, sin sustituirlo por «Maestro».
  - Se usa «Mesías» de modo consistente con la política del POB para Χριστός cuando actúa como título.
  - El tono general es solemne y apocalíptico, pero el español busca fluidez moderna sin arcaísmos innecesarios.
  - Los complementos preposicionales se naturalizan en español («voz de arcángel», «trompeta de Dios») sin alterar el contenido lexical.
  - La puntuación conserva la cadencia de enumeración del griego y del POB inglés.
