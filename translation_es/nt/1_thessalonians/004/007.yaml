translation:
  language: es
  text: Porque Dios no nos llamó a la inmundicia[a], sino en santidad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «impureza». El término griego puede denotar impureza moral, especialmente impureza sexual en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en santificación». El griego puede referirse a la santidad como estado o a la santificación como proceso de ser hecho santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκάλεσεν
  english_pob_choice: did not call
  chosen_spanish: no nos llamó
  alternatives_spanish:
  - no nos ha llamado
  - nos llamó
  lexicon: BDAG
  rationale: El aoristo indicativo se vierte mejor con pasado simple en español. «Llamó» conserva el vínculo léxico con καλέω sin añadir una precisión doctrinal que el versículo no explicita.
- source_word: ἐπὶ ἀκαθαρσίᾳ
  english_pob_choice: for uncleanness
  chosen_spanish: a la inmundicia
  alternatives_spanish:
  - para impureza
  - para la inmundicia
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo expresa aquí finalidad/esfera. «A la inmundicia» comunica con naturalidad el propósito o orientación contraria al llamado de Dios y mantiene el peso moral y cultual del término mejor que una abstracción más plana.
- source_word: ἀκαθαρσίᾳ
  english_pob_choice: uncleanness
  chosen_spanish: inmundicia
  alternatives_spanish:
  - impureza
  lexicon: BDAG
  rationale: ἀκαθαρσία puede denotar impureza moral, especialmente sexual, en este contexto. «Inmundicia» conserva un rango semántico bíblico más amplio y suena más natural en español eclesial que «impureza» en esta construcción.
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_spanish: en santificación
  alternatives_spanish:
  - en santidad
  - para santificación
  lexicon: BDAG
  rationale: ἁγιασμός puede significar tanto santidad como santificación. Aquí, en contraste con ἀκαθαρσία y con ἐν, la lectura más directa es la esfera o modo de vida de consagración; «santificación» preserva esa tensión y la conexión con el proceso/estado de ser apartado para Dios.
- source_word: ἁγιασμῷ
  english_pob_choice: holiness
  chosen_spanish: santificación
  alternatives_spanish:
  - santidad
  lexicon: BDAG
  rationale: Aunque «santidad» sería idiomática, el término griego admite también el matiz de proceso. «Santificación» mantiene esa amplitud y refleja mejor la decisión auditada en inglés de conservar la posible doble referencia.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la base lógica de la exhortación anterior. «Porque» es breve, natural y conserva con claridad el valor causal o explicativo.
theological_decisions:
- issue: El sentido del llamado de Dios
  english_pob_reading: A real divine calling of believers that grounds ethical exhortation, without specifying a denominational doctrine of effectual calling beyond what the text states.
  chosen_spanish_reading: Un llamado real de Dios a los creyentes que fundamenta la exhortación ética, sin definir mecánicamente la doctrina del llamado eficaz.
  alternative_spanish_readings:
  - una invitación general
  - un llamado eficaz en sentido técnico
  rationale: El texto presenta el llamado de Dios como base de una vida santa, pero no detalla el mecanismo de ese llamado. La traducción conserva el verbo «llamar» sin imponer una precisión doctrinal posterior.
  doctrine_reference: Afirmaciones; Filosofía de traducción §3
- issue: ἁγιασμῷ como estado o proceso
  english_pob_reading: The Greek can refer to holiness as a state or to sanctification as the process of being made holy.
  chosen_spanish_reading: «Santificación» como término que puede abarcar tanto el estado como el proceso de ser apartado para Dios.
  alternative_spanish_readings:
  - «santidad» como estado
  - «consagración» como énfasis práctico
  rationale: El contraste con ἀκαθαρσία deja abierta la tensión entre estado y proceso. En español, «santificación» permite preservar esa ambivalencia sin reducir el término a una sola dimensión.
  doctrine_reference: BDAG; relación léxica en 1 Tesalonicenses 4:3–8
translation_notes:
  revision_awareness: El pasaje muestra alto acuerdo y no requirió cambios en la última revisión; se mantuvo la lectura de ἀκαθαρσία como inmundicia/impureza moral y de ἁγιασμός como un término con posible doble matiz de santidad/santificación. La redacción española conserva esa tensión sin cargar el verso con precisión doctrinal ajena al texto.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se usa «llamó» para conservar el aoristo narrativo en español.
  - Se evita «SEÑOR» porque no aparece κύριος en el texto base.
  - «Santificación» se emplea como equivalente flexible de ἁγιασμός, en línea con el audito inglés.
  - La nota de «inmundicia» conserva el posible matiz sexual sin excluir la resonancia moral general.
