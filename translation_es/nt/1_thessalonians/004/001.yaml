translation:
  language: es
  text: Finalmente, pues, hermanos[a], les rogamos y los exhortamos en el Señor Jesús que, así como recibieron de nosotros cómo deben andar y agradar a Dios, tal como de hecho andan, abunden más y más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa el plural masculino y con frecuencia lo emplea para dirigirse a un grupo mixto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λοιπὸν οὖν
  english_pob_choice: Finally then
  chosen_spanish: Finalmente, pues
  alternatives_spanish:
  - Así que, finalmente
  - Por último, pues
  - En fin, pues
  lexicon: BDAG
  rationale: La combinación marca transición discursiva hacia la exhortación final. «Finalmente» reproduce λοιπὸν como cierre o cambio de sección, y «pues» recoge el valor inferencial de οὖν sin sonar forzado en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  - familia
  lexicon: BDAG
  rationale: Conserva el plural masculino como forma del texto griego y sigue la decisión de no neutralizar el vocativo en el cuerpo principal. En español «hermanos» puede dirigirse naturalmente a una comunidad mixta.
- source_word: ἐρωτῶμεν ... καὶ παρακαλοῦμεν
  english_pob_choice: we ask and urge
  chosen_spanish: les rogamos y les exhortamos
  alternatives_spanish:
  - les pedimos y les exhortamos
  - les suplicamos y les exhortamos
  - les pedimos y les animamos
  lexicon: BDAG
  rationale: «Rogamos» expresa la apelación respetuosa de ἐρωτῶμεν, y «exhortamos» conserva con más fuerza el matiz exhortativo de παρακαλοῦμεν que un simple «animamos».
- source_word: ἐν κυρίῳ Ἰησοῦ
  english_pob_choice: in the Lord Jesus
  chosen_spanish: en el Señor Jesús
  alternatives_spanish:
  - por el Señor Jesús
  - en el Señor Jesucristo
  - en Jesús, el Señor
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» y el título cristológico «Señor» para κύριος, conforme al patrón doctrinal y al sentido de esfera/autoridad de la exhortación.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la petición. «Que» suena natural en español y conserva la sintaxis sin imponer una finalidad más fuerte de la que exige el griego.
- source_word: καθὼς παρελάβετε παρ’ ἡμῶν
  english_pob_choice: just as you received from us
  chosen_spanish: así como recibieron de nosotros
  alternatives_spanish:
  - tal como recibieron de nosotros
  - como recibieron de nosotros
  - así como aprendieron de nosotros
  lexicon: BDAG
  rationale: «Recibieron de nosotros» conserva παραλαμβάνω en contexto de instrucción/tradición. Se evita explicitar «aprendieron» para no reducir el matiz de recepción formal.
- source_word: τὸ πῶς δεῖ ὑμᾶς περιπατεῖν
  english_pob_choice: how you ought to walk
  chosen_spanish: la manera en que deben andar
  alternatives_spanish:
  - cómo deben andar
  - la forma en que deben conducirse
  - cómo tienen que vivir
  lexicon: BDAG
  rationale: «Andar» preserva la metáfora paulina de περιπατεῖν. «La manera en que deben andar» mantiene el carácter instruccional de τὸ πῶς δεῖ sin sonar rígido.
- source_word: καὶ ἀρέσκειν θεῷ
  english_pob_choice: and to please God
  chosen_spanish: y agradar a Dios
  alternatives_spanish:
  - y ser agradables a Dios
  - y ser de agrado a Dios
  lexicon: BDAG
  rationale: «Agradar a Dios» es una equivalencia directa, clara y natural en español, y conserva el complemento infinitivo coordinado.
- source_word: καθὼς καὶ περιπατεῖτε
  english_pob_choice: just as you are also walking
  chosen_spanish: así como también andan
  alternatives_spanish:
  - tal como también viven
  - así como también están andando
  - como en efecto andan
  lexicon: BDAG
  rationale: Se conserva el presente progresivo de conducta con «andan», y «también» refleja καί. El sujeto sigue siendo la misma comunidad, por lo que el verbo puede mantenerse en tercera persona plural sin repetir el pronombre.
- source_word: ἵνα περισσεύητε μᾶλλον
  english_pob_choice: that you abound more and more
  chosen_spanish: abunden más y más
  alternatives_spanish:
  - abunden cada vez más
  - crezcan más y más
  - abunden todavía más
  lexicon: BDAG
  rationale: «Abunden» conserva la imagen de περισσεύω y su fuerza de incremento. «Más y más» reproduce bien μᾶλλον como intensificación continua.
theological_decisions:
- issue: Dirección inclusiva del vocativo ἀδελφοί
  english_pob_reading: Retain 'brothers' in the main text with an inclusivity footnote
  chosen_spanish_reading: Mantener «hermanos» en el texto principal con nota de posible inclusión amplia
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  - familia creyente
  rationale: La forma griega es masculina plural y el audit trail inglés preserva ese dato con nota. En español se mantiene la forma directa del vocativo y se aclara que puede abarcar a toda la comunidad.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Valor cristológico de κύριος en referencia a Jesús
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  - Dueño
  rationale: El término es un título cristológico y no una denominación atenuada. «Señor» es la opción doctrinalmente consistente en español y conserva la fuerza del original.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del texto inglés, que eliminó un segundo 'that' para mejorar la naturalidad. En español se reflejó esa fluidez sin duplicar conectores innecesarios, manteniendo la estructura de la exhortación y la secuencia de las cláusulas.
  spanish_consistency_notes:
  - Se conservó la metáfora paulina de περιπατέω con «andar», coherente con un registro bíblico moderno y estable.
  - «Señor Jesús» se mantuvo como título fijo para κύριος + Ἰησοῦ, sin recurrir a perífrasis interpretativas.
  - Se evitó traducir ἵνα con un doble «para que/que»; la frase queda natural en español y fiel al valor sintáctico del griego.
  - La nota [a] se ancla en «hermanos» porque ahí está la decisión lexical sensible de género.
