review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el griego y el rastro POB en la mayoría de las decisiones: «Porque, en verdad» refleja bien καὶ γὰρ; «ustedes hacen esto» comunica adecuadamente ποιεῖτε αὐτό; «a todos los hermanos» preserva ἀδελφούς con la nota inclusiva correspondiente; y «que abunden aún más» representa bien περισσεύειν μᾶλλον. La principal desviación está en παρακαλοῦμεν δὲ, donde el inglés auditado eligió «we urge» por fuerza exhortativa, pero el español «les rogamos» se inclina más hacia súplica que exhortación. También «que están en toda Macedonia» es fiel, pero menos idiomático y menos cercano al matiz distributivo de «throughout all Macedonia» que «por toda Macedonia» o «en toda Macedonia».'
  spanish_quality_summary: El texto es legible y digno, pero puede pulirse para sonar más natural y alineado con el tono exhortativo paulino. «Porque, en verdad» funciona, aunque algo marcado; no requiere cambio. El ajuste más importante es «les exhortamos» en lugar de «les rogamos». Además, «en toda Macedonia» mejora la fluidez frente a «que están en toda Macedonia» sin pérdida de sentido. El resto del texto es claro y publicable.
  glossary_alignment: Se mantiene correctamente «hermanos» para ἀδελφοί/ἀδελφούς, con nota aclaratoria inclusiva, en línea con la política POB. No hay términos del glosario mayor en disputa aquí. La revisión propuesta conserva la forma masculina representativa y la nota léxica.
  issues:
  - severity: medium
    issue: «les rogamos» debilita o desplaza la fuerza de παρακαλοῦμεν
    rationale: El expediente inglés documenta aquí un sentido exhortativo fuerte («we urge»), no principalmente suplicante. En español bíblico contemporáneo, «les exhortamos» corresponde mejor a ese valor semántico.
  - severity: low
    issue: «que están en toda Macedonia» suena más pesado y menos idiomático que la alternativa directa
    rationale: El griego identifica a los hermanos ubicados por toda Macedonia. «En toda Macedonia» preserva el sentido con mejor naturalidad; «por toda Macedonia» incluso refleja más claramente la extensión distributiva.
  revised_spanish_text: Porque, en verdad, ustedes hacen esto a todos los hermanos[a] en toda Macedonia. Pero les exhortamos, hermanos, a abundar aún más.
  revised_footnotes:
  - marker: a
    text: «Hermanos» aquí se refiere a los creyentes en general y probablemente incluye tanto a hombres como a mujeres en las iglesias.
    reason: lexical_alternative
  revision_rationale: Se revisa «les rogamos» a «les exhortamos» para reflejar mejor la fuerza exhortativa de παρακαλοῦμεν según el rastro léxico POB. También se simplifica «que están en toda Macedonia» a «en toda Macedonia» para mejorar la naturalidad del español sin perder el alcance geográfico del original. Se conserva la nota sobre «hermanos» por la misma razón documentada en inglés.
