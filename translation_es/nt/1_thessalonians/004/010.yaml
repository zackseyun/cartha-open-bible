translation:
  language: es
  text: Porque, en verdad, ustedes hacen esto a todos los hermanos[a] en toda Macedonia. Pero les exhortamos, hermanos, a abundar aún más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se refiere a los creyentes en general y probablemente incluye tanto a hombres como a mujeres en las iglesias.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque, en verdad
  alternatives_spanish:
  - Y en verdad
  - Pues en verdad
  lexicon: BDAG
  rationale: La combinación introduce una explicación enfática y enlaza con la alabanza anterior. «Porque» conserva el valor explicativo de γάρ; «en verdad» refleja el énfasis de καί/γάρ en un español natural y digno.
- source_word: ποιεῖτε
  english_pob_choice: you are doing
  chosen_spanish: ustedes hacen
  alternatives_spanish:
  - ustedes están haciendo
  - ustedes practican
  lexicon: BDAG
  rationale: El presente indica una práctica vigente. En español, «hacen» transmite la acción habitual sin forzar una perífrasis demasiado pesada, manteniendo el sentido durativo implícito.
- source_word: αὐτὸ
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - ello
  - eso
  lexicon: BDAG
  rationale: El pronombre retoma la idea inmediatamente anterior. «Esto» es la referencia anafórica más natural en español.
- source_word: εἰς πάντας τοὺς ἀδελφοὺς
  english_pob_choice: toward all the brothers
  chosen_spanish: a todos los hermanos
  alternatives_spanish:
  - para todos los hermanos
  - hacia todos los hermanos
  lexicon: BDAG
  rationale: Aquí εἰς con personas expresa la dirección del acto relacional. En español, «a» comunica bien el destinatario/objeto de la acción. «Hermanos» conserva la forma gramatical y el uso paulino representativo para la comunidad creyente.
- source_word: ἀδελφοὺς / ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - creyentes
  lexicon: BDAG
  rationale: Se conserva el plural masculino como forma del texto griego y del uso apostólico. En el contexto eclesial, puede incluir a hombres y mujeres; esto se señala en la nota, sin reemplazar la forma fuente por una reformulación más interpretativa.
- source_word: τοὺς ἐν ὅλῃ τῇ Μακεδονίᾳ
  english_pob_choice: throughout all Macedonia
  chosen_spanish: que están en toda Macedonia
  alternatives_spanish:
  - en toda Macedonia
  - dispersos por toda Macedonia
  lexicon: BDAG
  rationale: La frase identifica el alcance geográfico de los hermanos. «Que están en toda Macedonia» conserva de manera fiel la localización sin añadir una imagen distributiva que el griego no exige de forma explícita.
- source_word: παρακαλοῦμεν δὲ
  english_pob_choice: But we urge
  chosen_spanish: Pero les rogamos
  alternatives_spanish:
  - Pero les exhortamos
  - Ahora les pedimos
  lexicon: BDAG
  rationale: παρακαλέω aquí tiene fuerza exhortativa; «rogamos» comunica súplica/encarecimiento con dignidad en español. «Pero» refleja el cambio suave de δέ hacia una nueva exhortación.
- source_word: περισσεύειν μᾶλλον
  english_pob_choice: to abound still more
  chosen_spanish: que abunden aún más
  alternatives_spanish:
  - que sobreabunden todavía más
  - que crezcan más y más
  lexicon: BDAG
  rationale: περισσεύω expresa exceder, abundar o crecer más allá del nivel actual. «Que abunden aún más» preserva la imagen de abundancia y el comparativo de μᾶλλον en un español claro y publicable.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί/ἀδελφοὺς en una exhortación a la iglesia
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: Se mantiene la forma masculina plural del texto fuente, que en el uso paulino puede referirse a la comunidad creyente en conjunto. La inclusión de mujeres se deja implícita en el valor representativo del término, sin sustituirlo por una expansión interpretativa en el texto principal.
  doctrine_reference: DOCTRINE.md § Translation philosophy, punto 4
translation_notes:
  revision_awareness: El pasaje coincide con el último pase revisado del contexto inglés (sin cambios pendientes) y no presenta revisiones aplicadas; la redacción española sigue la misma lectura de alta concordancia, conservando el énfasis exhortativo y la referencia comunitaria de ἀδελφοί/ἀδελφοὺς.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo exija; aquí no aparece.
  - Se conserva «hermanos» para ἀδελφοί/ἀδελφοὺς, con nota de inclusión contextual.
  - «Porque, en verdad» mantiene la combinación explicativa y enfática de καὶ γάρ sin sobrerreformular.
  - «Que abunden aún más» refleja el infinitivo exhortativo con comparativo de μᾶλλον.
  - La puntuación divide naturalmente la alabanza previa implícita de la exhortación siguiente, siguiendo el flujo del griego.
