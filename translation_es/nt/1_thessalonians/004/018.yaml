translation:
  language: es
  text: Por tanto, aliéntense unos a otros[a] con estas palabras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «consuélense unos a otros con estas palabras». El verbo puede transmitir aliento, consuelo o exhortación; en este contexto, el sentido pastoral de aliento es especialmente adecuado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  - De modo que
  lexicon: BDAG
  rationale: La partícula introduce una conclusión inferida del argumento anterior; «Por tanto» conserva el valor conclusivo sin sonar pesado en español.
- source_word: παρακαλεῖτε
  english_pob_choice: encourage
  chosen_spanish: anímense
  alternatives_spanish:
  - consuélense
  - exhórtense
  - alienten
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar animar, consolar o exhortar. En este contexto de esperanza y consuelo sobre los creyentes fallecidos, «anímense» preserva bien el tono pastoral y recíproco.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - los unos a los otros
  lexicon: BDAG
  rationale: La reciprocidad del pronombre se expresa de manera natural y transparente en español con «unos a otros».
- source_word: ἐν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en
  - por medio de
  lexicon: BDAG
  rationale: Aunque ἐν es formalmente «en», con un verbo de exhortación/consuelo el español natural prefiere «con» para introducir el medio o contenido de la acción.
- source_word: τοῖς λόγοις τούτοις
  english_pob_choice: these words
  chosen_spanish: estas palabras
  alternatives_spanish:
  - estas cosas
  - este mensaje
  - estas expresiones
  lexicon: BDAG
  rationale: λόγοις aquí remite a las afirmaciones concretas recién pronunciadas; «palabras» mantiene la referencia textual directa mejor que una paráfrasis como «mensaje».
theological_decisions:
- issue: Alcance pastoral de παρακαλέω en el cierre de la sección
  english_pob_reading: encourage one another; footnote allows comfort/exhortation, with pastoral reassurance especially in view
  chosen_spanish_reading: anímense unos a otros
  alternative_spanish_readings:
  - consuélense unos a otros
  - exhórtense unos a otros
  - alíentense unos a otros
  rationale: La fórmula española elegida conserva la amplitud del verbo griego sin reducirlo solo a «consolar» o solo a «exhortar». En el contexto inmediato, el cierre funciona como aplicación pastoral de la enseñanza sobre la venida del Señor y la reunión con los creyentes.
  doctrine_reference: 1 Tesalonicenses 4:13-18; énfasis pastoral en la esperanza cristiana
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran consenso alto y no requieren corrección textual; la única tensión lexical relevante es παρακαλέω, que el inglés resuelve con una nota de alternativa. La versión española conserva esa amplitud con «anímense» y documenta la alternativa «consuélense» en nota.
  spanish_consistency_notes:
  - Se usa «Por tanto» para la inferencia conclusiva de ὥστε, coherente con el POB inglés.
  - Se mantiene la reciprocidad explícita de ἀλλήλους con «unos a otros».
  - Se traduce λόγοις con «palabras» para conservar la concreción del referirse a las afirmaciones precedentes.
  - La nota reproduce la alternativa semántica principal sin forzar un solo matiz.
  - La puntuación y el tono buscan ser bíblicos y modernos, sin arcaísmo innecesario.
