translation:
  language: es
  text: Pero no queremos que ustedes ignoren[a], hermanos[b], acerca de los que se han dormido[c], para que no se entristezcan como los demás, que no tienen esperanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que ustedes no sepan»; aquí la expresión significa no estar informados sobre este asunto.
    reason: lexical_alternative
  - marker: b
    text: «Hermanos» aquí se dirige a la congregación y probablemente incluye tanto a hombres como a mujeres.
    reason: cultural_note
  - marker: c
    text: O «los que duermen»; aquí Pablo usa «dormir» como metáfora de creyentes que han muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ θέλομεν δὲ
  english_pob_choice: But we do not want
  chosen_spanish: Pero no queremos
  alternatives_spanish:
  - Y no queremos
  - Ahora no queremos
  lexicon: BDAG
  rationale: δέ introduce una transición leve; en español, «Pero» comunica bien el cambio de tema sin exagerar contraste. θέλομεν + infinitivo se expresa de forma natural como «no queremos».
- source_word: ὑμᾶς ἀγνοεῖν
  english_pob_choice: you to be uninformed
  chosen_spanish: que ustedes estén sin información[a]
  alternatives_spanish:
  - que ustedes estén ignorantes
  - que ustedes no sepan
  lexicon: BDAG
  rationale: ἀγνοεῖν significa no saber o estar sin información. «Sin información» evita la connotación ofensiva de «ignorantes» y conserva el sentido informativo del pasaje. Se marcó con nota porque el español puede sonar menos natural que la paráfrasis inglesa y requiere aclaración del matiz.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - congregación
  lexicon: BDAG
  rationale: Se conserva el vocativo masculino plural como «hermanos», siguiendo el uso paulino y la decisión POB de mantener precisión gramatical con nota de inclusión congregacional.
- source_word: περὶ τῶν κοιμωμένων
  english_pob_choice: about those who have fallen asleep
  chosen_spanish: acerca de los que han muerto[b]
  alternatives_spanish:
  - acerca de los que duermen
  - acerca de los que han caído dormidos
  lexicon: BDAG
  rationale: κοιμωμένων es un eufemismo cristiano para los creyentes fallecidos. En español, «los que han muerto» comunica el referente con claridad; la nota preserva la metáfora de «dormir» que el griego y la auditoría inglesa retienen.
- source_word: ἵνα μὴ λυπῆσθε
  english_pob_choice: so that you may not grieve
  chosen_spanish: para que no se entristezcan
  alternatives_spanish:
  - para que no se aflijan
  - a fin de que no sufran tristeza
  lexicon: BDAG
  rationale: λυπέω expresa dolor/entristecimiento. «Se entristezcan» es natural en español y mantiene el sentido pastoral de la oración final sin implicar prohibición absoluta del duelo.
- source_word: καθὼς καὶ οἱ λοιποὶ
  english_pob_choice: as the rest do
  chosen_spanish: como los demás
  alternatives_spanish:
  - como también los otros
  - como el resto
  lexicon: BDAG
  rationale: οἱ λοιποί se refiere al resto fuera de la comunidad creyente. «Los demás» es idiomático y conserva el contraste de grupo.
- source_word: οἱ μὴ ἔχοντες ἐλπίδα
  english_pob_choice: who have no hope
  chosen_spanish: que no tienen esperanza
  alternatives_spanish:
  - que no poseen esperanza
  - que carecen de esperanza
  lexicon: BDAG
  rationale: La frase participial se vierte de modo directo y natural. «Esperanza» mantiene la fuerza escatológica del contraste paulino.
theological_decisions:
- issue: Metáfora de κοιμωμένων
  english_pob_reading: Retain the metaphor 'those who have fallen asleep' rather than interpretively replacing it with 'those who have died.'
  chosen_spanish_reading: Traducir el referente de forma clara en el texto principal y preservar en nota que el griego usa la metáfora de dormir para los creyentes fallecidos.
  alternative_spanish_readings:
  - acerca de los que duermen
  - acerca de los que se han dormido
  rationale: En español, la metáfora literal puede sonar ambigua o eufemística en exceso. La nota permite mantener auditablemente la tensión entre claridad y la imagen paulina de sueño/resurrección.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de ἀδελφοί
  english_pob_reading: Render as 'brothers' in the main text, with a footnote noting the likely mixed-gender congregational address.
  chosen_spanish_reading: Mantener «hermanos» en el texto principal y aclarar en nota que el vocativo probablemente incluye a toda la congregación.
  alternative_spanish_readings:
  - hermanos y hermanas
  - amigos
  rationale: Se conserva la forma gramatical masculina plural sin neutralizarla, pero la nota evita excluir a las mujeres del auditorio paulino.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se revisó el equilibrio entre la metáfora paulina y la claridad natural del español. La redacción final sigue de cerca el griego y el audit trail inglés, sin forzar una calca innecesaria.
  spanish_consistency_notes:
  - Se mantiene «hermanos» para ἀδελφοί, en coherencia con el criterio POB de precisión gramatical con nota inclusiva.
  - Se usa «esperanza» para ἐλπίδα, conservando el matiz escatológico del pasaje.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el texto.
  - La nota de κοιμωμένων conserva la imagen de dormir sin sacrificar la inteligibilidad del texto principal.
