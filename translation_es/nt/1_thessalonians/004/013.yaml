revisions:
- from: Pero no queremos que ustedes estén sin información[a], hermanos, acerca de los que han muerto[b], para que no se entristezcan como los demás, que no tienen esperanza.
  to: Pero no queremos que ustedes ignoren[a], hermanos[b], acerca de los que se han dormido[c], para que no se entristezcan como los demás, que no tienen esperanza.
  rationale: 'Se revisa para alinear el español con la evidencia griega y con la auditoría inglesa del POB: se reemplaza la formulación poco natural «estén sin información» por «ignoren», se restituye en el texto principal la metáfora de κοιμωμένων como «se han dormido», y se añade la nota requerida sobre el alcance congregacional de «hermanos».'
