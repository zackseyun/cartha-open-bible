review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo, pero no preserva plenamente dos decisiones auditadas clave del POB en inglés: ἀγνοεῖν se expresa con una formulación española poco natural («estén sin información») y περὶ τῶν κοιμωμένων se interpretó en el texto principal como «los que han muerto», aunque la auditoría inglesa decidió conservar la metáfora de ‘dormir/se han dormido’. También falta la nota de inclusión congregacional para ἀδελφοί que el POB inglés sí conserva.'
  spanish_quality_summary: El español es comprensible, pero «que ustedes estén sin información» suena torpe y poco idiomático en un registro bíblico natural. «Los que han muerto» es claro, pero reduce la textura teológica del original. Una redacción como «no queremos que ustedes ignoren» y «acerca de los que se han dormido» suena más natural y más fiel al original y a la auditoría. El resto del versículo es claro y digno.
  glossary_alignment: 'No hay conflicto con términos base del proyecto como Yahvé/Mesías. Sí hay desalineación metodológica con la política de preservar metáforas significativas cuando el POB inglés las retuvo: κοιμωμένων debe mantenerse como ‘se han dormido’ o similar en el texto principal, con nota aclaratoria. También debe reflejarse la nota de alcance congregacional para «hermanos».'
  issues:
  - severity: high
    issue: κοιμωμένων fue aplanado a «los que han muerto» en el texto principal.
    rationale: 'La decisión teológica y léxica inglesa retuvo explícitamente la metáfora ‘those who have fallen asleep’. El español debe preservar esa imagen, no relegarla solo a nota, salvo necesidad extrema; aquí una opción natural existe: «los que se han dormido».'
  - severity: medium
    issue: «que ustedes estén sin información» es español poco natural para ἀγνοεῖν.
    rationale: Aunque intenta reflejar ‘uninformed’, la expresión suena forzada. «No queremos que ustedes ignoren» o «que ustedes no sepan» comunica mejor el sentido en español moderno y digno.
  - severity: medium
    issue: Falta la nota sobre el alcance inclusivo de «hermanos».
    rationale: El POB inglés conserva ‘brothers’ con nota cultural indicando que probablemente incluye hombres y mujeres. La revisión española debe preservar esa decisión documentada.
  - severity: low
    issue: La nota actual sobre ἀγνοεῖν introduce griego en una nota al lector («aquí ἀγνοεῖν...»).
    rationale: Para notas de lectura española, conviene priorizar formulación orientada al lector y no depender de tecnicismo innecesario, salvo necesidad textual.
  revised_spanish_text: Pero no queremos que ustedes ignoren[a], hermanos[b], acerca de los que se han dormido[c], para que no se entristezcan como los demás, que no tienen esperanza.
