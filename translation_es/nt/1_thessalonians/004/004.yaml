translation:
  language: es
  text: para que cada uno de ustedes sepa poseer su propio vaso[a] en santidad y honor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saber cómo controlar su propio cuerpo»; alternativamente, «saber cómo tomar una esposa para sí». El griego dice literalmente «adquirir su propio vaso».
    reason: alternative_reading
lexical_decisions:
- source_word: εἰδέναι
  english_pob_choice: know how
  chosen_spanish: sepa
  alternatives_spanish:
  - sepa cómo
  - sepa cómo hacerlo
  - entienda
  lexicon: BDAG
  rationale: El infinitivo aquí expresa habilidad o saber práctico, no solo conocimiento mental. En español, «sepa» comunica naturalmente ese matiz sin volver la frase pesada; la idea de capacidad implícita queda reforzada por el contexto exhortativo.
- source_word: ἕκαστον ὑμῶν
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno de vosotros
  - cada uno
  lexicon: BDAG
  rationale: Se conserva el valor distributivo de ἕκαστον con el partitivo ὑμῶν mediante una fórmula natural en español latinoamericano y ampliamente eclesial.
- source_word: σκεῦος
  english_pob_choice: vessel
  chosen_spanish: vaso
  alternatives_spanish:
  - vasija
  - cuerpo
  - esposa
  lexicon: BDAG
  rationale: «Vaso» mantiene la imagen literal y la ambigüedad del griego con buena inteligibilidad en español. Aunque puede sonar inusual, preserva mejor el término fuente que resolverlo prematuramente como «cuerpo» o «esposa».
- source_word: κτᾶσθαι
  english_pob_choice: possess
  chosen_spanish: poseer
  alternatives_spanish:
  - adquirir
  - tener
  - controlar
  lexicon: BDAG
  rationale: El medio de κτάομαι puede significar adquirir o poseer para uno mismo. «Poseer» refleja bien el resultado/relación de posesión que la revisión inglesa adoptó, y en español funciona con naturalidad junto a «vaso».
- source_word: ἐν ἁγιασμῷ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en santificación
  - en consagración
  lexicon: BDAG
  rationale: «Santidad» es la opción más idiomática y conserva el sentido ético-consecratorio de ἁγιασμός sin introducir una abstracción técnica innecesaria.
- source_word: τιμῇ
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - respeto
  - dignidad
  lexicon: BDAG
  rationale: «Honor» corresponde de forma directa a τιμή y mantiene el peso moral y relacional del contexto.
theological_decisions:
- issue: Interpretación de τὸ ἑαυτοῦ σκεῦος κτᾶσθαι
  english_pob_reading: Retain the literal expression 'acquire/possess his own vessel' in the main text
  chosen_spanish_reading: Mantener «su propio vaso» en el texto principal
  alternative_spanish_readings:
  - controlar su propio cuerpo
  - tomar/contraer esposa para sí
  rationale: La expresión griega es un crux interpretativo real y el texto no obliga con claridad a una de las lecturas mayores. Por fidelidad audit-able a la fuente, el español conserva la metáfora literal y deja abiertas las interpretaciones principales mediante nota.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que cambió «acquire» por «possess» para κτᾶσθαι, pero conserva la misma decisión de mantener σκεῦος literalmente como imagen ambigua. El español refleja esa revisión con «poseer» y mantiene la nota para las lecturas alternativas.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y terminología eclesiástica no presente en el versículo.
  - Se preservó la ambigüedad de σκεῦος sin resolverla en el texto principal.
  - «Santidad» y «honor» siguen el registro ético del pasaje y son consistentes con el uso PO B de ἁγιασμός y τιμή.
