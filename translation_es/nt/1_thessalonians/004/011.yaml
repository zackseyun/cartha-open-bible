translation:
  language: es
  text: y a aspirar[a] a vivir tranquilamente, a ocuparse de sus propios asuntos[b], y a trabajar con sus propias manos, tal como les mandamos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer de ello su ambición»; es decir, «tener como ambición vivir tranquilamente».'
    reason: alternative_reading
  - marker: b
    text: 'O: «atender a sus propios asuntos».'
    reason: alternative_reading
lexical_decisions:
- source_word: φιλοτιμεῖσθαι
  english_pob_choice: to aspire
  chosen_spanish: a aspirar
  alternatives_spanish:
  - a hacer de esto su ambición
  - a esforzarse con empeño
  - a procurar con ahínco
  lexicon: BDAG
  rationale: El verbo expresa tratar algo como meta honorable o ambición; en español, «aspirar» conserva bien esa fuerza y encaja naturalmente con la serie de infinitivos. Las alternativas explicitan más el matiz, pero suenan más largas o menos fluidas.
- source_word: ἡσυχάζειν
  english_pob_choice: to live quietly
  chosen_spanish: a vivir en quietud
  alternatives_spanish:
  - a vivir tranquilamente
  - a estar en calma
  - a guardar silencio
  lexicon: BDAG
  rationale: Aquí no se trata de silencio absoluto, sino de una manera de vivir serena y apacible. «Vivir en quietud» mantiene el sentido de estilo de vida sin reducirlo solo a hablar poco.
- source_word: πράσσειν τὰ ἴδια
  english_pob_choice: to mind your own affairs
  chosen_spanish: a ocuparse de sus propios asuntos
  alternatives_spanish:
  - a atender a sus propios asuntos
  - a ocuparse de lo suyo
  - a atender a su propio negocio
  lexicon: BDAG
  rationale: La expresión idiomática apunta a atender lo que pertenece a cada uno. «Ocuparse de sus propios asuntos» comunica el sentido sin cargar con una frase moderna más áspera.
- source_word: ἐργάζεσθαι
  english_pob_choice: to work
  chosen_spanish: a trabajar
  alternatives_spanish:
  - a laborar
  - a esforzarse
  - a desempeñar trabajo
  lexicon: BDAG
  rationale: El verbo es amplio y aquí simplemente significa trabajar. «Trabajar» es la opción más natural y suficientemente precisa en español.
- source_word: ταῖς χερσὶν ὑμῶν
  english_pob_choice: with your own hands
  chosen_spanish: con sus propias manos
  alternatives_spanish:
  - con sus manos
  - por medio de sus manos
  - con las manos de ustedes mismos
  lexicon: BDAG
  rationale: La imagen enfatiza el trabajo manual y el autocuidado. «Sus propias manos» refleja el posesivo del griego y conserva la fuerza de autosustento manual.
- source_word: παρηγγείλαμεν
  english_pob_choice: we commanded
  chosen_spanish: les mandamos
  alternatives_spanish:
  - les ordenamos
  - les instruimos
  - les dimos esta orden
  lexicon: BDAG
  rationale: El verbo tiene fuerza de instrucción con autoridad. «Mandamos» reproduce bien esa carga en español sin sonar excesivamente formal, y mantiene el tono apostólico del pasaje.
theological_decisions:
- issue: Autoridad de la instrucción apostólica
  english_pob_reading: Rendered παραγγέλλω as 'commanded' to preserve the authoritative tone of Paul's exhortation.
  chosen_spanish_reading: les mandamos
  alternative_spanish_readings:
  - les instruimos
  - les ordenamos
  - les dirigimos
  rationale: La frase conserva el peso exhortativo y normativo del mandato apostólico. «Les mandamos» evita suavizar indebidamente el alcance moral de la exhortación.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego presenta una serie de infinitivos coordinados con sentido exhortativo; la redacción española conserva esa cadena y evita volverla más narrativa de lo que el original permite. Se mantuvo la tensión paradójica de «aspirar» a una vida quieta, ya documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ terminología no pertinente, porque el versículo no contiene referencias al nombre divino.
  - Se prefirió «mandamos» frente a «instruimos» para conservar la fuerza de παραγγέλλω en contexto apostólico.
  - «Con sus propias manos» se mantuvo literal en lo semántico, aunque se adaptó al orden natural del español.
  - La puntuación en serie con comas sigue el paralelismo del griego y la claridad de lectura en español.
