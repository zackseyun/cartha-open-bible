  revision_rationale: Se conserva intacto el texto principal, que es fiel y natural, pero se corrigen ambas notas para que reflejen con precisión las alternativas y cautelas del rastro de auditoría inglés sin introducir tecnicismos doctrinales ni repetir la lectura principal.
