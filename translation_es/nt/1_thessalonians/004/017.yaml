translation:
  language: es
  text: Entonces nosotros, los que vivimos[a], los que quedamos, seremos arrebatados juntamente con ellos en las nubes para encontrarnos con el Señor en el aire[b]; y así estaremos siempre con el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «seremos arrebatados de repente». El verbo griego subraya una acción súbita y enérgica.
    reason: lexical_alternative
  - marker: b
    text: O «para un encuentro con el Señor». La frase puede indicar salir al encuentro de alguien, pero el versículo no especifica la secuencia más amplia más allá de ese encuentro.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: BDAG
  rationale: Marca la secuencia temporal respecto del versículo anterior. «Entonces» es natural en español y conserva el valor de avance en la serie de acontecimientos.
- source_word: οἱ ζῶντες
  english_pob_choice: who are alive
  chosen_spanish: los que vivimos
  alternatives_spanish:
  - los que están vivos
  - los vivos
  lexicon: BDAG
  rationale: La forma participial identifica al grupo de creyentes que aún vive en ese momento. «Los que vivimos» suena vivo y claro en español, y mantiene la referencia personal del original.
- source_word: οἱ περιλειπόμενοι
  english_pob_choice: who remain
  chosen_spanish: los que quedamos
  alternatives_spanish:
  - los que permanecemos
  - los que somos dejados
  lexicon: BDAG
  rationale: El participio añade la idea de haber quedado hasta ese momento. «Los que quedamos» expresa bien la condición de estar todavía presentes sin introducir de más la idea de mera supervivencia.
- source_word: ἅμα σὺν αὐτοῖς
  english_pob_choice: together with them
  chosen_spanish: juntamente con ellos
  alternatives_spanish:
  - al mismo tiempo con ellos
  - junto con ellos
  lexicon: BDAG
  rationale: Conserva la simultaneidad y la compañía. «Juntamente con ellos» transmite ambos matices de forma fluida y solemne.
- source_word: ἁρπαγησόμεθα
  english_pob_choice: will be caught up
  chosen_spanish: seremos arrebatados
  alternatives_spanish:
  - seremos raptados
  - seremos llevados de repente
  lexicon: BDAG
  rationale: «Arrebatar» reproduce el sentido fuerte y repentino de ἁρπάζω mejor que un verbo más suave. En español bíblico también es comprensible y no oculta la fuerza del pasaje.
- source_word: ἐν νεφέλαις
  english_pob_choice: in the clouds
  chosen_spanish: en las nubes
  alternatives_spanish:
  - entre las nubes
  - dentro de las nubes
  lexicon: BDAG
  rationale: El plural con ἐν se expresa naturalmente como «en las nubes». Se mantiene la imagen concreta y teofánica sin explicarla en exceso.
- source_word: εἰς ἀπάντησιν τοῦ κυρίου
  english_pob_choice: to meet the Lord
  chosen_spanish: para encontrarnos con el Señor
  alternatives_spanish:
  - para ir al encuentro del Señor
  - para un encuentro con el Señor
  lexicon: BDAG
  rationale: La frase griega indica propósito y encuentro. «Para encontrarnos con el Señor» conserva el movimiento hacia ese encuentro y suena natural en español.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Soberano
  lexicon: BDAG
  rationale: En este contexto, κύριος se refiere a Jesús con fuerza titular. «Señor» es la forma usual y más adecuada en español bíblico para esta referencia.
- source_word: εἰς ἀέρα
  english_pob_choice: in the air
  chosen_spanish: en el aire
  alternatives_spanish:
  - al aire
  - hacia el aire
  lexicon: BDAG
  rationale: «En el aire» refleja el lugar/ámbito del encuentro de manera clara y directa. Evita sobretraducir la dirección que el griego puede sugerir.
- source_word: καὶ οὕτως
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - y de este modo
  - y de esa manera
  lexicon: BDAG
  rationale: Expresa el resultado o la manera que sigue de lo anterior. «Y así» es breve, natural y fiel al enlace lógico del original.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - para siempre
  - permanentemente
  lexicon: BDAG
  rationale: «Siempre» es el equivalente directo y más natural del adverbio. Mantiene la continuidad sin añadir matices no explícitos.
- source_word: σὺν κυρίῳ ἐσόμεθα
  english_pob_choice: we will always be with the Lord
  chosen_spanish: estaremos siempre con el Señor
  alternatives_spanish:
  - seremos siempre con el Señor
  - viviremos siempre con el Señor
  lexicon: BDAG
  rationale: Conserva la promesa culminante de comunión permanente con el Señor. El orden español coloca el adverbio donde suena más natural sin alterar el sentido.
theological_decisions:
- issue: ἁρπαγησόμεθα en un texto central para debates sobre el arrebatamiento
  english_pob_reading: will be caught up
  chosen_spanish_reading: seremos arrebatados
  alternative_spanish_readings:
  - seremos raptados
  - seremos llevados de repente
  rationale: «Arrebatar» comunica la acción repentina y enérgica del verbo sin resolver en la traducción el debate escatológico posterior. Mantiene la tensión doctrinal del pasaje en lugar de sobreexplicarla.
  doctrine_reference: Preservar la tensión teológica sin imponer un marco denominacional; primacía del texto original.
- issue: Sentido de εἰς ἀπάντησιν τοῦ κυρίου
  english_pob_reading: to meet the Lord
  chosen_spanish_reading: para encontrarnos con el Señor
  alternative_spanish_readings:
  - para ir al encuentro del Señor
  - para un encuentro con el Señor
  rationale: La traducción comunica claramente el encuentro sin introducir una secuencia escatológica más amplia que el versículo no explicita. Deja abierta la cuestión del desarrollo posterior.
  doctrine_reference: No ampliar más allá del alcance del verso; preservar la ambigüedad interpretativa legítima.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el trazado auditado en inglés. Se conservaron las dos tensiones principales del pasaje: el valor fuerte de ἁρπάζω y la ambigüedad de εἰς ἀπάντησιν, sin resolverlas doctrinalmente. No hubo revisiones previas aplicadas en el expediente inglés, y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος por coherencia con el español bíblico y con la referencia a Jesús en el contexto.
  - Se evitó «Cristo» porque el griego aquí dice κύριος y el expediente inglés también mantuvo «Lord».
  - Se eligió «en las nubes» y «en el aire» de forma literal y natural, sin convertir la imagen en explicación interpretativa.
  - Se empleó «siempre» para πάντοτε por fidelidad léxica y fluidez en español.
  - Se mantuvo un registro solemne pero moderno, apto para lectura eclesial amplia.
