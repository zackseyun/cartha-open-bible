translation:
  language: es
  text: 'Porque esta es la voluntad de Dios: su santificación[a]—abstenerse de la inmoralidad sexual[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «santidad».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego porneía: término amplio para conducta sexual ilícita. Tradicionalmente, «fornicación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλημα
  english_pob_choice: will
  chosen_spanish: voluntad
  alternatives_spanish:
  - deseo
  - propósito
  lexicon: BDAG
  rationale: «Voluntad» es el equivalente natural y preciso para θέλημα cuando se habla de la intención normativa de Dios. «Deseo» sería demasiado débil; «propósito» podría sugerir una idea más estrecha de designio.
- source_word: ὁ ἁγιασμὸς ὑμῶν
  english_pob_choice: your sanctification
  chosen_spanish: su santificación
  alternatives_spanish:
  - su santidad
  - su ser hechos santos
  lexicon: BDAG
  rationale: «Santificación» conserva el sentido paulino de consagración y vida santa como estado/proceso. Aunque «santidad» es posible, «santificación» enlaza mejor con la cláusula explicativa siguiente.
- source_word: ἀπέχεσθαι
  english_pob_choice: that you abstain
  chosen_spanish: que se abstengan
  alternatives_spanish:
  - abstenerse
  - que ustedes se abstengan
  lexicon: BDAG
  rationale: 'El infinitivo expresa en español de manera natural la explicación de en qué consiste esa santificación: en abstenerse. La forma con subjuntivo mantiene claridad y flujo idiomático.'
- source_word: πορνείας
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - conducta sexual ilícita
  - pecado sexual
  lexicon: BDAG
  rationale: «Inmoralidad sexual» reproduce la amplitud de πορνεία sin reducirla a «fornicación», que en español suele sonar más restringido y arcaico. Conserva el alcance general del término griego.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: «Porque» expresa bien la relación causal y de fundamento con el contexto anterior, de forma natural en español.
theological_decisions:
- issue: Sentido de ἁγιασμός en exhortación ética
  english_pob_reading: Rendered as 'sanctification' with ethical content specified by the following clause.
  chosen_spanish_reading: Se vierte como «santificación» y se concreta éticamente por la cláusula siguiente.
  alternative_spanish_readings:
  - «santidad» para enfatizar el estado resultante
  rationale: La frase no presenta una idea abstracta aislada, sino la voluntad de Dios definida por la conducta concreta de apartarse del pecado sexual. «Santificación» preserva esa amplitud teológica sin perder el vínculo con la exhortación práctica.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance de πορνεία
  english_pob_reading: Broadly rendered as 'sexual immorality.'
  chosen_spanish_reading: Se vierte como «inmoralidad sexual».
  alternative_spanish_readings:
  - «fornicación»
  rationale: El término griego abarca más que una sola conducta específica. «Inmoralidad sexual» comunica mejor esa amplitud y evita imponer una restricción que el texto no explicita.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Ajustado para corregir la validación anterior: los marcadores [a] y [b] aparecen ahora explícitamente en el texto español, y cada nota corresponde a un anclaje único.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí el texto dice θεοῦ y se traduce naturalmente como «Dios».
  - Se conserva el tono formal y eclesial sin recurrir a fórmulas arcaicas.
  - «Santificación» e «inmoralidad sexual» siguen la amplitud semántica documentada en el audit trail en lugar de estrechar el sentido.
