  spanish_quality_summary: La frase «no en pasión de lujuria» resulta rígida y poco natural en español eclesial contemporáneo. «Con pasión lujuriosa» expresa mejor el modo, mantiene la carga moral sexual y suena más claro. «Así como también los gentiles» es aceptable y fiel. La puntuación final debe seguir el versículo base, que termina en coma, no punto.
  glossary_alignment: 'No hay conflicto con la terminología del proyecto: θεόν = «Dios» está bien; ἔθνη = «los gentiles» concuerda con la decisión auditada. La revisión propuesta no altera la decisión teológica, solo mejora la naturalidad española para πάθει ἐπιθυμίας.'
