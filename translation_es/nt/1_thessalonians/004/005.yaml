translation:
  language: es
  text: no con pasión lujuriosa[a], así como también los gentiles[b] que no conocen a Dios,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «deseo apasionado». Lit. «pasión de lujuria».
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «los gentiles»; alternativamente, «las naciones» o, de manera más interpretativa, «los paganos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no...
  lexicon: BDAG
  rationale: Niega la conducta descrita y continúa la exhortación del versículo anterior.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - con
  - por
  lexicon: BDAG
  rationale: Marca esfera o modo de conducta; en español, «en» mantiene la relación preposicional sin forzar una paráfrasis.
- source_word: πάθει ἐπιθυμίας
  english_pob_choice: the passion of lust
  chosen_spanish: pasión de lujuria
  alternatives_spanish:
  - pasión lujuriosa
  - deseo apasionado
  lexicon: BDAG
  rationale: Conservo los dos sustantivos del griego y dejo claro que la pasión es de tipo sexual/desordenado mediante «lujuria», evitando suavizar la carga moral del texto.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - justamente como
  - tal como
  lexicon: BDAG
  rationale: Expresa comparación directa de manera natural y fiel en español.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: BDAG
  rationale: 'Refuerza la comparación: «así como también» refleja el valor aditivo del griego.'
- source_word: τὰ ἔθνη
  english_pob_choice: the Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  - los paganos
  lexicon: BDAG
  rationale: En el uso paulino, ἔθνη designa a los no judíos; «gentiles» es la equivalencia más precisa y evita la carga interpretativa de «paganos».
- source_word: τὰ μὴ εἰδότα
  english_pob_choice: who do not know
  chosen_spanish: que no conocen
  alternatives_spanish:
  - que no han conocido
  - no conociendo
  lexicon: BDAG
  rationale: El participio atributivo describe una condición vigente; en español, el presente «no conocen» comunica mejor ese estado continuo.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Como complemento directo de «conocer», el español requiere la preposición personal «a».
theological_decisions:
- issue: Rendering ἔθνη in a moral-exhortation context
  english_pob_reading: the Gentiles
  chosen_spanish_reading: los gentiles
  alternative_spanish_readings:
  - las naciones
  - los paganos
  rationale: Pablo usa ἔθνη para los no judíos; en este contexto moral, «gentiles» conserva la categoría étnico-religiosa sin añadir un desprecio no explicitado por el texto. «Paganos» interpreta más de la cuenta y «naciones» resulta demasiado amplio.
  doctrine_reference: Translation philosophy §1, §6
- issue: Force of πάθει ἐπιθυμίας
  english_pob_reading: the passion of lust
  chosen_spanish_reading: pasión de lujuria
  alternative_spanish_readings:
  - pasión lujuriosa
  - deseo apasionado
  rationale: La frase apunta a deseo sexual desordenado en este contexto. «Pasión de lujuria» conserva la estructura de dos sustantivos y mantiene visible la intensidad moral del griego.
  doctrine_reference: Translation philosophy §5, §6
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el auditoría inglesa (alta concordancia; revisión final sin cambios sustanciales). La principal decisión en español fue mantener la doble imagen de «pasión + lujuria» y traducir ἔθνη como «gentiles» por precisión paulina, sin ocultar las alternativas interpretativas registradas.
  spanish_consistency_notes:
  - Se mantiene el uso de «gentiles» para ἔθνη en sentido paulino.
  - Se usa «Dios» con preposición personal por exigencia gramatical del español.
  - 'La negación y la comparación quedan estructuradas de forma transparente: «no... así como también...».'
