translation:
  language: es
  text: para que anden de manera decorosa delante de los de afuera y no tengan necesidad de nada[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tengan necesidad de nadie». La frase también puede enfatizar no depender de otros.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la fuerza final de ἵνα y mantiene la relación de propósito con la exhortación anterior.
- source_word: περιπατῆτε
  english_pob_choice: you may walk
  chosen_spanish: anden
  alternatives_spanish:
  - vivan
  - se conduzcan
  lexicon: BDAG
  rationale: Conserva la metáfora paulina de 'andar' sin sonar forzado en español; en este contexto, 'anden' comunica el modo de vida.
- source_word: εὐσχημόνως
  english_pob_choice: properly
  chosen_spanish: de manera decorosa
  alternatives_spanish:
  - adecuadamente
  - honrosamente
  - decentemente
  lexicon: BDAG
  rationale: '''Decorosa'' recoge la idea de conducta conveniente, respetable y apropiada ante otros, sin estrechar el sentido a una sola cualidad moral.'
- source_word: πρὸς τοὺς ἔξω
  english_pob_choice: before outsiders
  chosen_spanish: delante de los de afuera
  alternatives_spanish:
  - ante los de afuera
  - en relación con los de afuera
  - hacia los de afuera
  lexicon: BDAG
  rationale: '''Delante de'' preserva la dimensión pública/social de la conducta en relación con quienes están fuera de la comunidad cristiana, y ''los de afuera'' mantiene la fórmula eclesial tradicional sin añadir un término interpretativo más fuerte.'
- source_word: τοὺς ἔξω
  english_pob_choice: outsiders
  chosen_spanish: los de afuera
  alternatives_spanish:
  - los externos
  - los que están fuera
  lexicon: BDAG
  rationale: Mantiene el contraste de grupo de la expresión griega y es una fórmula natural en español bíblico para referirse a quienes no pertenecen a la iglesia.
- source_word: μηδενὸς χρείαν ἔχητε
  english_pob_choice: have need of nothing
  chosen_spanish: no tengan necesidad de nadie
  alternatives_spanish:
  - no tengan necesidad de nada
  - no dependan de nadie
  lexicon: BDAG
  rationale: La construcción griega admite una lectura de necesidad de personas o de cosas. Siguiendo el audit trail inglés, se preserva en el texto principal la posibilidad de dependencia personal, muy coherente con el contexto de no ser carga para otros, y se deja abierta la alternativa material en nota.
theological_decisions:
- issue: Sentido de μηδενὸς χρείαν ἔχητε
  english_pob_reading: economic/material self-sufficiency expressed as 'have need of nothing' with an alternative 'have need of no one'
  chosen_spanish_reading: no tengan necesidad de nadie
  alternative_spanish_readings:
  - no tengan necesidad de nada
  - no dependan de nadie
  rationale: El contexto inmediato trata de vivir tranquilamente y no ser carga; la frase griega, sin embargo, no limita de manera inequívoca el complemento a cosas o a personas. Para no borrar esa tensión, el texto principal permite una lectura personal ('nadie') y la nota conserva la alternativa material, de acuerdo con la práctica del POB de mantener opciones plausibles.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El documento fuente indica alta concordancia y que no hubo cambios en la revisión más reciente; por ello no se aplicaron revisiones adicionales al borrador español.
  spanish_consistency_notes:
  - Se mantuvo 'los de afuera' para reflejar la expresión técnica de la comunidad cristiana sin traducirla como 'no creyentes', que sería más interpretativo.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; este versículo no contiene el nombre divino ni el título Cristo.
  - Se preservó la metáfora de 'andar' con un verbo español natural ('anden') en lugar de reemplazarla por una paráfrasis más abstracta.
