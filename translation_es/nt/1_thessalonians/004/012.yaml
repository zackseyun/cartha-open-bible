  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La revisión necesaria concierne a μηδενὸς χρείαν ἔχητε: debe mantenerse en el texto principal «no tengan necesidad de nada» y reservar «no tengan necesidad de nadie» como alternativa en nota, tal como documenta el POB inglés.'
