  - marker: b
    text: Literalmente, «no tienen necesidad de escribirles»; el griego deja implícito el sujeto del infinitivo «escribir», y aquí se lo explicita por claridad contextual como «les escribamos».
    reason: lexical_alternative
  revision_rationale: Se ajusta «han sido enseñados por Dios» a «son enseñados por Dios» para reflejar mejor el presente del griego (θεοδίδακτοί ἐστε) y se corrige la nota [b] para que explique con más precisión la construcción griega y la explicitación contextual del sujeto en español.
