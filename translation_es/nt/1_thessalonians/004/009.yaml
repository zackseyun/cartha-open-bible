translation:
  language: es
  text: Ahora bien, en cuanto al amor fraternal[a], no tienen necesidad de que les escribamos[b], porque ustedes mismos son enseñados por Dios para amarse unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «amor por los hermanos y hermanas»; el término griego lleva una imaginería familiar dentro de la comunidad cristiana.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no tienen necesidad de escribirles»; el griego deja implícito el sujeto del infinitivo «escribir», y aquí se lo explicita por claridad contextual como «les escribamos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora bien, en cuanto a
  alternatives_spanish:
  - En cuanto a
  - Ahora, en cuanto a
  lexicon: BDAG
  rationale: La expresión introduce un nuevo tema con continuidad suave respecto de la sección anterior. «Ahora bien, en cuanto a» conserva ese cambio discursivo de Περὶ δὲ con un español natural y digno.
- source_word: φιλαδελφίας
  english_pob_choice: brotherly love
  chosen_spanish: amor fraternal
  alternatives_spanish:
  - amor entre hermanos
  - amor por los hermanos y hermanas
  - afecto familiar entre creyentes
  lexicon: BDAG
  rationale: El término griego expresa afecto de tipo familiar dentro de la comunidad creyente. «Amor fraternal» preserva la imagen familiar y funciona bien en español bíblico contemporáneo sin borrar el matiz comunitario.
- source_word: οὐ χρείαν ἔχετε γράφειν ὑμῖν
  english_pob_choice: you have no need for us to write to you
  chosen_spanish: no tienen necesidad de que les escribamos
  alternatives_spanish:
  - no necesitan que les escribamos
  - no tienen necesidad de escribirles
  - no hay necesidad de que les escribamos
  lexicon: BDAG
  rationale: El infinitivo γράφειν deja implícito al escritor; el audit trail inglés decidió explicitar «us» por contexto. En español, «que les escribamos» conserva esa explicitación contextual y evita una formulación demasiado impersonal.
- source_word: αὐτοὶ γὰρ ὑμεῖς
  english_pob_choice: for you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes mismos, en efecto
  - ustedes mismos precisamente
  lexicon: BDAG
  rationale: Los pronombres dobles son enfáticos. «Ustedes mismos» transmite bien la fuerza enfática sin recargar la frase.
- source_word: θεοδίδακτοί
  english_pob_choice: taught by God
  chosen_spanish: han sido enseñados por Dios
  alternatives_spanish:
  - son enseñados por Dios
  - son instruidos por Dios
  - aprendieron de Dios
  lexicon: BDAG
  rationale: El adjetivo raro significa «enseñados por Dios». En español, la pasiva compuesta «han sido enseñados por Dios» suena natural y preserva la agencia divina indicada por el compuesto griego.
- source_word: εἰς τὸ ἀγαπᾶν ἀλλήλους
  english_pob_choice: to love one another
  chosen_spanish: para amarse unos a otros
  alternatives_spanish:
  - a fin de amarse unos a otros
  - para amar(se) unos a otros
  - a amar unos a otros
  lexicon: BDAG
  rationale: La construcción expresa propósito o resultado. «Para amarse unos a otros» es idiomática en español y mantiene el vínculo verbal con ἀγαπάω.
theological_decisions:
- issue: Diferencia entre φιλαδελφία y ἀγαπᾶν dentro del mismo versículo
  english_pob_reading: Render φιλαδελφία as 'brotherly love' and ἀγαπᾶν as 'love' to preserve Paul's lexical variation.
  chosen_spanish_reading: Traducir φιλαδελφία como «amor fraternal» y ἀγαπᾶν como «amar» para conservar la variación léxica de Pablo.
  alternative_spanish_readings:
  - Traducir ambos con «amor» para mayor fluidez
  - usar «amor entre creyentes» en ambos casos
  rationale: El verso pasa de un sustantivo con imaginería familiar a un verbo que expresa la acción de amar. Mantener «amor fraternal» y luego «amarse» evita aplanar esa transición y respeta la intención retórica del griego.
  doctrine_reference: 'Translation philosophy #5 (Consistency of key terms, or documented exception)'
- issue: Sujeto implícito de γράφειν
  english_pob_reading: Supply an indefinite English subject ('for anyone to write to you') rather than 'for us to write to you.'
  chosen_spanish_reading: Explicitar el sujeto implícito como «que les escribamos», porque el contexto muestra que Pablo y sus compañeros son los escritores.
  alternative_spanish_readings:
  - que alguien les escriba
  - que les escriban
  - que escribamos
  rationale: Aunque el infinitivo griego no nombra el sujeto, el contexto epistolar lo hace evidente. La forma «les escribamos» refleja de modo natural ese sujeto contextual sin introducir una precisión ajena al pasaje.
  doctrine_reference: 'Translation philosophy #1 (Original-language primacy over translation tradition)'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión inglesa, que decidió explicitar el sujeto implícito de γράφειν como «us» por contexto. En español se mantuvo esa decisión contextual con una formulación idiomática. También se preservó la distinción entre el sustantivo φιλαδελφία y el verbo ἀγαπᾶν, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «amor fraternal» para φιλαδελφία, manteniendo la imaginería familiar sin caer en una paráfrasis extensa.
  - Se usó «han sido enseñados por Dios» para θεοδίδακτοι, evitando el calco «Dios-enseñados» por claridad y naturalidad.
  - Se evitó «siervo» o vocabulario eclesiástico no pertinente, porque el versículo no contiene δοῦλος ni lenguaje cultual similar.
  - La frase final conserva el sentido de propósito con «para amarse unos a otros», en paralelo a la estructura del griego.
