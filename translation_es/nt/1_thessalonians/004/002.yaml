translation:
  language: es
  text: Porque ustedes saben qué instrucciones les dimos por medio del Señor Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por la autoridad del Señor Jesús».
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - saben
  - ustedes conocen
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento con sentido presente; en español, 'saben' comunica de manera natural ese estado de conocimiento sin forzar un pretérito perfecto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la base explicativa de lo anterior; 'Porque' mantiene esa relación causal/explicativa con naturalidad en español.
- source_word: τίνας
  english_pob_choice: what
  chosen_spanish: qué
  alternatives_spanish:
  - cuáles
  - qué clase de
  lexicon: BDAG
  rationale: Con παραγγελίας, la pregunta indirecta en español suena más natural con 'qué' que con un literal 'cuáles', sin perder el sentido interrogativo indefinido.
- source_word: παραγγελίας
  english_pob_choice: instructions
  chosen_spanish: instrucciones
  alternatives_spanish:
  - mandatos
  - órdenes
  - directivas
  lexicon: BDAG
  rationale: '''Instrucciones'' conserva el valor de enseñanza/encargo con autoridad sin endurecerlo a ''órdenes''; es coherente con el tono del POB en inglés y con el contexto inmediato.'
- source_word: ἐδώκαμεν
  english_pob_choice: we gave
  chosen_spanish: les dimos
  alternatives_spanish:
  - les entregamos
  - les impartimos
  lexicon: BDAG
  rationale: El aoristo de δίδωμι se vierte de modo directo con 'dimos'; se añade el objeto indirecto explícito 'les' para claridad natural en español.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma idiomática con clítico de objeto indirecto; 'ustedes' queda ya presente por el sujeto explícito.
- source_word: διὰ τοῦ κυρίου Ἰησοῦ
  english_pob_choice: through the Lord Jesus
  chosen_spanish: por medio del Señor Jesús
  alternatives_spanish:
  - por la autoridad del Señor Jesús
  - a través del Señor Jesús
  lexicon: BDAG
  rationale: διά con genitivo admite mediación o agencia. 'Por medio de' conserva la transparencia formal y sugiere la mediación/autoridad sin restringir el matiz a una sola opción.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el valor cristológico convencional de κύριος como 'Señor', acorde con el texto griego y con el uso eclesial en español.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español.
theological_decisions:
- issue: Fuerza de διὰ τοῦ κυρίου Ἰησοῦ
  english_pob_reading: through the Lord Jesus
  chosen_spanish_reading: por medio del Señor Jesús
  alternative_spanish_readings:
  - por la autoridad del Señor Jesús
  - a través del Señor Jesús
  rationale: La frase puede implicar mediación instrumental o autoridad delegada. 'Por medio de' preserva la ambigüedad productiva del griego y evita fijar prematuramente una lectura exclusiva; la autoridad sigue siendo una posibilidad contextual.
  doctrine_reference: 'Translation philosophy §3, §6; Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada explícitamente en el texto español con la misma marca en la frase correspondiente. La redacción mantiene la relación explicativa de γὰρ y la ambigüedad de διά con genitivo sin sobreinterpretarla.'
  spanish_consistency_notes:
  - Se usa 'Señor Jesús' de forma consistente con el título cristológico del griego.
  - Se prefiere 'instrucciones' por claridad y fidelidad al tono del POB inglés.
  - El clítico 'les' reproduce el dativo indirecto de ὑμῖν sin pesadez.
  - La puntuación y el orden de palabras buscan naturalidad en español sin perder la estructura argumentativa del versículo.
