translation:
  language: es
  text: Porque si creemos que Jesús murió y resucitó, así también Dios traerá con él a los que se durmieron[a] por medio de Jesús[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los que han muerto'; Pablo usa 'dormirse' como metáfora de la muerte de los creyentes en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O 'en Jesús'. La frase 'por medio de Jesús' (διὰ τοῦ Ἰησοῦ) puede entenderse de distintas maneras, incluyendo mediación ('por medio de Jesús') o asociación estrecha ('en Jesús').
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si en verdad
  - Pues si
  lexicon: BDAG
  rationale: Combina la fuerza inferencial de γάρ con la condición εἰ en un español natural, manteniendo la lógica de fundamento del versículo anterior sin volverlo más rígido de lo necesario.
- source_word: πιστεύομεν
  english_pob_choice: we believe
  chosen_spanish: creemos
  alternatives_spanish:
  - tenemos fe
  - confiamos
  lexicon: BDAG
  rationale: Conserva el sentido confesional y cognitivo de πιστεύω en este contexto comunitario sobre la muerte y resurrección de Jesús.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: Convención estándar
  rationale: Nombre propio transliterado de forma estándar y estable en español bíblico.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  lexicon: BDAG
  rationale: El aoristo se expresa con un pasado simple natural en español; 'murió' mantiene la afirmación histórica directa de la muerte de Jesús.
- source_word: ἀνέστη
  english_pob_choice: rose again
  chosen_spanish: resucitó
  alternatives_spanish:
  - volvió a la vida
  - se levantó
  lexicon: BDAG
  rationale: '''Resucitó'' expresa con claridad el evento pascual y evita la ambigüedad de ''se levantó'' en español. El inglés ''rose again'' se traduce aquí con el verbo teológicamente asentado.'
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de la misma manera también
  - igualmente también
  lexicon: BDAG
  rationale: Conserva la correlación entre la acción de Jesús y la acción de Dios respecto de los creyentes fallecidos, sin sobreespecificar el modo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa y clara del sujeto.
- source_word: τοὺς κοιμηθέντας
  english_pob_choice: those who have fallen asleep
  chosen_spanish: los que durmieron
  alternatives_spanish:
  - los que han caído dormidos
  - los que han muerto
  lexicon: BDAG
  rationale: Preserva el eufemismo/metáfora paulina de la muerte como sueño, sin aplanarla a 'murieron'. En español, 'los que durmieron' mantiene la imagen con suficiente naturalidad.
- source_word: διὰ τοῦ Ἰησοῦ
  english_pob_choice: through Jesus
  chosen_spanish: por medio de Jesús
  alternatives_spanish:
  - a través de Jesús
  - en Jesús
  - por causa de Jesús
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio/mediación; 'por medio de Jesús' suena natural en español y deja abierta la discusión sobre si el énfasis es agencia, mediación o asociación estrecha. La frase griega es genuinamente debatida, por lo que se conserva la tensión interpretativa en nota.
- source_word: ἄξει
  english_pob_choice: will bring
  chosen_spanish: traerá
  alternatives_spanish:
  - conducirá
  - llevará
  lexicon: BDAG
  rationale: El futuro de ἄγω se rinde bien con 'traerá' en este contexto de reunión con Cristo. En español, 'traerá con él' comunica de forma natural la idea de incorporación y acompañamiento.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - en compañía de él
  lexicon: BDAG
  rationale: σύν marca acompañamiento; 'con él' preserva la referencia pronominal y permite inferir, por el contexto, que el antecedente es Jesús.
theological_decisions:
- issue: La metáfora de κοιμηθέντας ('los que durmieron')
  english_pob_reading: Retain the metaphor 'fallen asleep' rather than flattening it to 'died.'
  chosen_spanish_reading: Conservar la metáfora como 'los que durmieron' en lugar de 'los que murieron'.
  alternative_spanish_readings:
  - los que han muerto
  - los dormidos
  rationale: La imagen de sueño es pastoral y teológicamente significativa en el pasaje sobre creyentes fallecidos antes de la venida del Señor. Mantenerla preserva tanto el lenguaje de Pablo como la tensión entre la muerte real y la esperanza futura de resurrección.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Interpretación de διὰ τοῦ Ἰησοῦ
  english_pob_reading: Render as 'through Jesus' in the main text and preserve alternatives in a footnote.
  chosen_spanish_reading: Traducir en el texto principal como 'por medio de Jesús' y mantener en nota las alternativas interpretativas.
  alternative_spanish_readings:
  - por medio de Jesús
  - en Jesús
  - por causa de Jesús
  - a través de Jesús
  rationale: 'La expresión es genuinamente ambigua: puede apuntar a mediación/instrumentalidad, o a una asociación muy estrecha. El texto principal adopta la lectura más natural de διά con genitivo en español, mientras la nota conserva la tensión exegética.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Pasaje revisado previamente sin cambios en el último pase; el presente borrador sigue la decisión de alto acuerdo del control cruzado y conserva la tensión semántica principal de κοιμηθέντας y διὰ τοῦ Ἰησοῦ.
  spanish_consistency_notes:
  - Se usa 'Jesús' de forma consistente para Ἰησοῦς.
  - Se conserva el paralelismo entre la resurrección de Jesús y la acción futura de Dios con los creyentes fallecidos.
  - '''Dios'' se mantiene sin paráfrasis para ὁ θεός.'
  - La metáfora de sueño se conserva en el cuerpo del texto y se explicita su alternativa en nota.
  - '''por medio de Jesús'' mantiene la ambigüedad del sintagma griego sin imponer una interpretación cerrada.'
