translation:
  language: es
  text: para que afirme sus corazones irreprochables en santidad delante de nuestro Dios y Padre, en la venida de nuestro Señor Jesús, con todos sus santos seres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con todos sus santos». El griego puede referirse a personas santas, ángeles, o ambos en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰς τὸ στηρίξαι
  english_pob_choice: so that he may establish
  chosen_spanish: para que él afirme
  alternatives_spanish:
  - para que él establezca
  - a fin de afirmar
  lexicon: BDAG
  rationale: El infinitivo articular con εἰς expresa propósito; en español, la cláusula final con «para que» comunica mejor esa función. «Afirme» conserva la idea de hacer firme/estable sin sonar tan técnico como «establezca», y encaja bien con «corazones».
- source_word: στηρίξαι
  english_pob_choice: establish
  chosen_spanish: afirme
  alternatives_spanish:
  - establezca
  - fortalezca
  - haga firmes
  lexicon: BDAG
  rationale: El verbo implica fortalecer o hacer firme. «Afirme» transmite estabilidad y firmeza en un español natural, manteniendo el valor paulino de consolidar el interior de los creyentes.
- source_word: καρδίας
  english_pob_choice: hearts
  chosen_spanish: corazones
  alternatives_spanish:
  - interior
  - mente
  - ser interior
  lexicon: BDAG
  rationale: «Corazones» conserva el valor bíblico de καρδία como centro de la persona interior, no solo de las emociones. Es la equivalencia más natural y reconocible en español bíblico actual.
- source_word: ἀμέμπτους
  english_pob_choice: blameless
  chosen_spanish: irreprochables
  alternatives_spanish:
  - sin culpa
  - sin mancha
  - blamables
  lexicon: BDAG
  rationale: «Irreprochables» recoge la idea moral/judicial de no poder ser acusados con fundamento. Es una opción más idiomática que una calca como «sin culpa», y preserva la tensión ética del término.
- source_word: ἐν ἁγιωσύνῃ
  english_pob_choice: in holiness
  chosen_spanish: en santidad
  alternatives_spanish:
  - en santificación
  - en consagración
  - en santidad de vida
  lexicon: BDAG
  rationale: ἁγιωσύνη nombra la cualidad o estado de santidad. «En santidad» es la forma más directa y natural en español, sin convertirlo en un proceso técnico que el griego no exige aquí.
- source_word: ἔμπροσθεν
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: «Delante de» expresa de modo claro la idea de estar a la vista de Dios. Conserva la orientación relacional y judicial del griego sin sonar forzado.
- source_word: τοῦ θεοῦ καὶ πατρὸς ἡμῶν
  english_pob_choice: our God and Father
  chosen_spanish: nuestro Dios y Padre
  alternatives_spanish:
  - Dios y Padre nuestro
  - nuestro Dios, el Padre
  lexicon: BDAG
  rationale: La estructura coordinada del griego se refleja mejor con «nuestro Dios y Padre», manteniendo un solo referente descrito por dos títulos. Es la forma más natural en español y respeta el paralelismo del texto.
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - venida
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto escatológico, παρουσία se refiere al evento futuro de la aparición/venida del Señor. «Venida» es la equivalencia tradicional y clara en español, y comunica bien el sentido de expectativa futura.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí el contexto cristológico favorece «Señor», que es la forma estándar y reverente para κύριος en el NT. En español sería menos natural sustituirlo por «Dueño» o «Maestro».
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Nombre propio según convención estándar española. No se introduce «Cristo» porque el griego aquí usa el nombre propio, no el título.
- source_word: μετὰ πάντων τῶν ἁγίων αὐτοῦ
  english_pob_choice: with all his holy ones
  chosen_spanish: con todos sus santos[a]
  alternatives_spanish:
  - con todos sus santos
  - con todos sus seres santos
  - con todos sus santos y santas
  lexicon: BDAG
  rationale: El sustantivo ἅγιοι puede referirse a santos humanos, ángeles, o ambos; en español «santos» es la equivalencia más natural y tradicional, pero puede sonar más restringida de lo que el griego permite. Se mantiene la ambigüedad con una nota, siguiendo el auditorial inglés que preserva «holy ones».
theological_decisions:
- issue: Referencia de «todos sus santos / holy ones»
  english_pob_reading: Kept as 'holy ones' without specifying whether these are angels, glorified believers, or both.
  chosen_spanish_reading: «con todos sus santos» se mantiene sin precisar si se trata de ángeles, creyentes glorificados, o ambos.
  alternative_spanish_readings:
  - con todos sus santos y ángeles
  - con todos sus santos, es decir, sus creyentes
  rationale: El griego ἁγίων es suficientemente amplio para no cerrar prematuramente el referente. La traducción conserva esa tensión y evita una decisión dogmática no explicitada por el verso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El inglés POB ya había fijado una lectura de alta concordancia y no requirió revisiones. La versión española sigue de cerca el audit trail: conserva el valor de propósito del infinitivo, la firmeza interior de καρδία, la cualidad moral de ἀμέμπτους, la santidad como estado, la localización relacional «delante de», la venida escatológica de παρουσία, y la ambigüedad de ἅγιοι mediante una nota.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος y «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se usa «santos» en el texto principal por naturalidad en español, pero la nota preserva la amplitud semántica de ἅγιοι.
  - «Santidad» se traduce de forma directa para ἁγιωσύνη, sin recargarla con explicaciones interpretativas.
  - «Delante de nuestro Dios y Padre» conserva el orden del griego y la relación de juicio/presencia divina.
