- from: Ahora, que nuestro Dios y Padre mismo[a], y nuestro Señor Jesús, dirijan nuestro camino hacia ustedes[b].
  to: Y que nuestro Dios y Padre mismo[a] y nuestro Señor Jesús dirijan nuestro camino hacia ustedes[b].
  rationale: Se ajusta el inicio para un español más natural en una oración de deseo, se mantiene el énfasis de αὐτός de manera idiomática, y se elimina una coma innecesaria. No se altera el sentido ni la nota teológica sobre el verbo singular griego.
