review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: transición a una oración-deseo, sujetos coordinados «nuestro Dios y Padre» y «nuestro Señor Jesús», y petición de que sea dirigido el camino hacia los tesalonicenses. También preserva mediante nota el dato importante de que el griego usa verbo singular con dos sujetos coordinados. Sin embargo, «Ahora» suena algo forzado al inicio de una oración desiderativa en español bíblico, y «nuestro Dios y Padre mismo» resulta poco natural; el énfasis de αὐτός se expresa mejor con «mismo» pospuesto al sintagma completo. Además, la coma antes de «y nuestro Señor Jesús» no es necesaria y entorpece el flujo.'
  spanish_quality_summary: La redacción actual es comprensible, pero no del todo idiomática. «Ahora, que...» no fluye bien en español; «Y que...» o simplemente «Que...» funciona mejor para una oración. «Nuestro Dios y Padre mismo» suena calcado; «nuestro Dios y Padre mismo» mejora algo, pero la formulación más natural y digna es «nuestro Dios y Padre mismo, y nuestro Señor Jesús» sin la pausa marcada por coma antes de «y». El resto es legible. «Hacia ustedes» es aceptable, aunque «a ustedes» también sería natural; no requiere cambio.
  glossary_alignment: 'La terminología clave está alineada con el proyecto: θεός = «Dios», πατήρ = «Padre», κύριος = «Señor», Ἰησοῦς = «Jesús». No hay conflicto con los glosarios por defecto. La nota léxica alternativa sobre κατευθύναι es válida. La principal mejora es estilística y de orden enfático en español, no de glosario.'
  issues:
  - severity: medium
    issue: Inicio con «Ahora, que...»
    rationale: Aunque δέ puede marcar transición, «Ahora» al comienzo de una oración de deseo suena poco natural en español bíblico contemporáneo. «Y que...» transmite mejor la continuidad discursiva sin rigidez.
  - severity: medium
    issue: Colocación poco natural de «mismo»
    rationale: «Nuestro Dios y Padre mismo» suena calcado y algo torpe. El intensivo αὐτός debe conservarse, pero con una colocación española más natural dentro del sintagma oracional.
  - severity: low
    issue: Coma innecesaria antes de «y nuestro Señor Jesús»
    rationale: La coordinación de los sujetos se lee mejor sin esa coma; la pausa no está motivada por el español normal y vuelve más pesada la frase.
  revised_spanish_text: Y que nuestro Dios y Padre mismo[a] y nuestro Señor Jesús dirijan nuestro camino hacia ustedes[b].
  revised_footnotes:
