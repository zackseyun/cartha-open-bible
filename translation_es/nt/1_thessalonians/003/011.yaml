translation:
  language: es
  text: Y que nuestro Dios y Padre mismo[a] y nuestro Señor Jesús dirijan nuestro camino hacia ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un verbo singular con los sujetos coordinados «nuestro Dios y Padre» y «nuestro Señor Jesús».
    reason: cross_reference
  - marker: b
    text: 'O: «enderecen nuestro camino hacia ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - él mismo
  - personalmente
  lexicon: BDAG
  rationale: El intensivo αὐτός enfatiza al sujeto. En español, «mismo» conserva de manera natural ese valor enfático en «nuestro Dios y Padre mismo», sin volver la frase pesada.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ introduce una transición a una expresión de deseo/oración. «Ahora» comunica bien ese giro discursivo en español.
- source_word: ὁ θεὸς καὶ πατὴρ ἡμῶν
  english_pob_choice: our God and Father
  chosen_spanish: nuestro Dios y Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - nuestro Dios, nuestro Padre
  lexicon: BDAG
  rationale: La construcción griega une ambos sustantivos para un solo referente. «Nuestro Dios y Padre» sigue de cerca el orden y mantiene ambas designaciones.
- source_word: ὁ κύριος ἡμῶν Ἰησοῦς
  english_pob_choice: our Lord Jesus
  chosen_spanish: nuestro Señor Jesús
  alternatives_spanish:
  - el Señor Jesús
  - nuestro Señor Jesús Cristo
  lexicon: BDAG
  rationale: «Señor» conserva el valor de κύριος según la terminología del proyecto, y «Jesús» traduce el nombre propio. Se mantiene «nuestro» por el posesivo del griego.
- source_word: κατευθύναι
  english_pob_choice: direct
  chosen_spanish: dirijan
  alternatives_spanish:
  - encaminen
  - enderecen
  - guíen
  lexicon: BDAG
  rationale: 'El optativo aoristo expresa un ruego: «que ... dirijan». En español, el plural verbal refleja de manera natural la coordinación de los sujetos («nuestro Dios y Padre» y «nuestro Señor Jesús») sin borrar la singularidad gramatical del griego en la nota.'
- source_word: τὴν ὁδὸν ἡμῶν
  english_pob_choice: our way
  chosen_spanish: nuestro camino
  alternatives_spanish:
  - nuestro sendero
  - nuestro camino/recorrido
  - nuestra ruta
  lexicon: BDAG
  rationale: ὁδός puede referirse a camino literal o a trayecto/jornada. «Camino» es natural en español y mantiene la amplitud semántica del término.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - a ustedes
  - para ustedes
  - hacia vosotros
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica dirección. «Hacia ustedes» preserva mejor esa orientación de movimiento que un simple «a ustedes».
theological_decisions:
- issue: Sujeto coordinado con verbo singular en el griego
  english_pob_reading: 'Retain both subjects plainly and translate the singular optative as a unified prayer: ''may our God and Father himself, and our Lord Jesus, direct...''.'
  chosen_spanish_reading: 'Mantener ambos sujetos de manera explícita y traducir el ruego con un verbo plural natural en español: «que nuestro Dios y Padre mismo, y nuestro Señor Jesús, dirijan...».'
  alternative_spanish_readings:
  - que nuestro Dios y Padre mismo, y nuestro Señor Jesús, dirija...
  - que nuestro Dios y Padre mismo, y nuestro Señor Jesús, enderece...
  rationale: El griego presenta a Dios Padre y al Señor Jesús como sujetos coordinados de un único verbo singular. El español requiere ajuste de concordancia si se mantienen ambos sujetos; por eso se usa plural verbal sin perder la tensión gramatical-teológica del original, que queda señalada en la nota.
  doctrine_reference: 'Nicene Creed (381 AD); Translation philosophy §3: preservar la tensión teológica sin resolverla artificialmente.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el análisis auditado en inglés. Se mantiene la transición discursiva de δέ, el énfasis de αὐτός, la coordinación teológica de los sujetos y la imagen de movimiento de ὁδός/πρός. No se aplicaron revisiones previas.
  spanish_consistency_notes:
  - Se usa «nuestro Señor» para κύριος conforme al estándar del proyecto.
  - Se usa «Dios» para θεός y no se sustituye por una forma litúrgica velada.
  - Se conserva «Jesús» sin añadir «Cristo», porque el griego aquí no lo incluye.
  - «Hacia ustedes» mantiene una dirección de movimiento coherente con πρός + acusativo.
  - Las notas al pie usan marcadores únicos y aparecen ancladas en el texto.
