translation:
  language: es
  text: orando noche y día con suma insistencia para ver sus rostros y suplir lo que falta[a] en su fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que está faltando de su fe». El griego también puede entenderse de manera más amplia como lo que todavía necesita fortalecerse o completarse en su fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυκτὸς καὶ ἡμέρας
  english_pob_choice: night and day
  chosen_spanish: noche y día
  alternatives_spanish:
  - de noche y de día
  - noche tras noche y día tras día
  lexicon: BDAG
  rationale: La expresión genitiva funciona adverbialmente para indicar actividad continua; en español, «noche y día» conserva esa continuidad de forma natural e idiomática.
- source_word: ὑπερεκπερισσοῦ
  english_pob_choice: most earnestly
  chosen_spanish: con mayor insistencia
  alternatives_spanish:
  - con suma insistencia
  - con extremo ahínco
  - en sumo grado
  lexicon: BDAG
  rationale: El adverbio intensifica fuertemente la acción. «Con mayor insistencia» preserva la intensidad sin sonar arcaico ni forzado en español moderno.
- source_word: δεόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - rogando
  - suplicando
  - haciendo súplica
  lexicon: BDAG
  rationale: El participio expresa petición ferviente; «orando» mantiene el sentido de oración implorante en contexto, especialmente con el adverbio intensivo.
- source_word: εἰς τὸ ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - a fin de ver
  - para poder ver
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa propósito. «Para ver» es la forma más natural y fiel en español.
- source_word: ὑμῶν τὸ πρόσωπον
  english_pob_choice: your face
  chosen_spanish: vuestro rostro
  alternatives_spanish:
  - vuestra cara
  - vuestra presencia
  - veros en persona
  lexicon: BDAG
  rationale: «Rostro» conserva la concreción del griego y su valor relacional. «Vuestro rostro» sigue de cerca el original sin perder naturalidad en español bíblico contemporáneo.
- source_word: καταρτίσαι
  english_pob_choice: to supply
  chosen_spanish: suplir
  alternatives_spanish:
  - completar
  - restaurar
  - equipar
  lexicon: BDAG
  rationale: En combinación con «lo que falta», «suplir» comunica bien la idea de proveer lo necesario; además evita sobrecargar el verbo con matices no seguros en este contexto.
- source_word: τὰ ὑστερήματα
  english_pob_choice: what is lacking
  chosen_spanish: lo que falta
  alternatives_spanish:
  - las carencias
  - las deficiencias
  - lo que está incompleto
  lexicon: BDAG
  rationale: El plural griego puede traducirse colectivamente. «Lo que falta» reproduce de forma idiomática la idea de deficiencia o carencia sin añadir interpretación excesiva.
- source_word: τῆς πίστεως ὑμῶν
  english_pob_choice: in your faith
  chosen_spanish: en vuestra fe
  alternatives_spanish:
  - de vuestra fe
  - en vuestra confianza
  - en vuestra fidelidad
  lexicon: BDAG
  rationale: «Fe» es la traducción doctrinal de πίστις. La preposición implícita en español puede expresarse como «en vuestra fe», indicando el ámbito en el que falta algo o necesita completarse.
theological_decisions:
- issue: Sentido de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se mantiene «fe» como lectura principal, conforme al criterio doctrinal y al contexto de crecimiento espiritual; las alternativas quedan como matices posibles pero no dominantes aquí.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Alcance de τὰ ὑστερήματα τῆς πίστεως
  english_pob_reading: what is lacking in your faith
  chosen_spanish_reading: lo que falta en vuestra fe
  alternative_spanish_readings:
  - lo que todavía necesita fortalecerse en vuestra fe
  - lo que aún está incompleto en vuestra fe
  rationale: 'La formulación principal conserva la ambigüedad productiva del griego: puede referirse a carencias, a elementos por completar o a fortalecimiento de la fe, sin resolverlo de manera más estrecha de lo que exige el texto.'
  doctrine_reference: Lexical ambiguity preserved; no doctrinal narrowing beyond source
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el audit trail inglés, manteniendo la ambigüedad de καταρτίσαι τὰ ὑστερήματα τῆς πίστεως ὑμῶν sin reducirla a una sola idea. Se optó por una formulación española natural, con «orando noche y día» y «con mayor insistencia» para preservar continuidad e intensidad.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις conforme al criterio doctrinal del proyecto.
  - Se mantiene «rostro» para πρόσωπον, conservando la concreción relacional del original.
  - Se evita «SEÑOR» o equivalentes no presentes; este versículo no contiene el nombre divino.
  - La nota al pie preserva la alternativa semántica documentada por el audit trail inglés.
