    timestamp: '2026-04-23T09:36:19Z'
    unchanged: false
    changes_summary: Changed 'become empty' to 'be in vain' for a more natural and accurate rendering of εἰς κενὸν γένηται. Kept the rest of the draft, which faithfully represents the Greek.
translation:
  language: es
  text: Por esta razón, cuando ya no podía soportarlo más, envié para saber de su fe[a], no sea que de algún modo el tentador los hubiera tentado y nuestra labor resultara en vano[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su fidelidad' o 'su confianza'. La palabra griega puede abarcar matices superpuestos según el contexto.
    reason: alternative_reading
  - marker: b
    text: O 'sin resultado' o 'por nada'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por tal motivo
  lexicon: BDAG
  rationale: Mantiene la relación causal-consecutiva con el contexto anterior en un español natural y digno.
- source_word: κἀγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo también
  - yo asimismo
  lexicon: BDAG
  rationale: El καί enfático queda implícito en el orden y en el contexto; en español no exige un 'también' explícito en el texto principal.
- source_word: μηκέτι στέγων
  english_pob_choice: when I could bear it no longer
  chosen_spanish: cuando ya no podía soportarlo más
  alternatives_spanish:
  - cuando ya no podía resistir más
  - al no poder soportarlo más
  lexicon: BDAG
  rationale: Expresa de manera idiomática la idea de una paciencia o resistencia llevada al límite sin perder el matiz de 'soportar'.
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - mandé
  - despaché
  lexicon: BDAG
  rationale: '''Envié'' es la manera más natural de decirlo en español; el destinatario concreto queda implícito, como en el griego y en el contexto inmediato.'
- source_word: εἰς τὸ γνῶναι
  english_pob_choice: to learn about
  chosen_spanish: para conocer
  alternatives_spanish:
  - para saber
  - para averiguar
  lexicon: BDAG
  rationale: '''Para conocer'' conserva el sentido de informarse acerca de algo/persona de manera breve y fluida, sin forzar una paráfrasis más interpretativa.'
- source_word: τὴν πίστιν ὑμῶν
  english_pob_choice: your faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su fidelidad
  - su confianza
  lexicon: BDAG
  rationale: Se mantiene 'fe' como rendición principal de πίστις, conforme al criterio del proyecto; la posible amplitud semántica se preserva en nota.
- source_word: μή πως
  english_pob_choice: lest somehow
  chosen_spanish: no sea que de algún modo
  alternatives_spanish:
  - por miedo a que de algún modo
  - quizá no
  lexicon: BDAG
  rationale: Reproduce el valor de precaución/aprehensión sin volverlo torpe en español.
- source_word: ὁ πειράζων
  english_pob_choice: the tempter
  chosen_spanish: el que tienta
  alternatives_spanish:
  - el tentador
  - el que pone a prueba
  lexicon: BDAG
  rationale: '''El que tienta'' comunica el sustantivo participial sin introducir una etiqueta más técnica o tradicional que el griego no nombra aquí por propio nombre.'
- source_word: ἐπείρασεν ὑμᾶς
  english_pob_choice: had tempted you
  chosen_spanish: los hubiera tentado
  alternatives_spanish:
  - los hubiera puesto a prueba
  - los hubiera sometido a tentación
  lexicon: BDAG
  rationale: En español la estructura 'no sea que...' pide un subjuntivo pluperfecto natural; 'tentar' preserva la repetición léxica con πειράζων y el matiz de seducción al pecado.
- source_word: εἰς κενὸν γένηται
  english_pob_choice: might be in vain
  chosen_spanish: resultara en vano
  alternatives_spanish:
  - fuera en vano
  - quedara en nada
  lexicon: BDAG
  rationale: '''En vano'' es la equivalencia idiomática natural de εἰς κενὸν; ''resultara'' recoge bien el valor de llegar a ser en la frase y evita una calca extraña.'
- source_word: ὁ κόπος ἡμῶν
  english_pob_choice: our labor
  chosen_spanish: nuestro trabajo
  alternatives_spanish:
  - nuestro esfuerzo
  - nuestra labor
  lexicon: BDAG
  rationale: Se eligió 'trabajo' para un español claro y ligeramente más amplio; 'labor' queda como alternativa válida, pero 'trabajo' no pierde el peso de esfuerzo implicado por κόπος en este contexto.
theological_decisions:
- issue: Alcance semántico de πίστις en 1 Tesalonicenses 3:5
  english_pob_reading: your faith
  chosen_spanish_reading: su fe
  alternative_spanish_readings:
  - su fidelidad
  - su confianza
  rationale: El contexto inmediato trata del estado espiritual de los tesalonicenses frente a la tentación; por eso 'fe' funciona como lectura principal. Se conserva, sin embargo, la tensión semántica de πίστις mediante nota, en línea con el audit trail inglés.
  doctrine_reference: 'DOCTRINE.md: Contested terms — πίστις'
- issue: Identidad y función de ὁ πειράζων
  english_pob_reading: the tempter
  chosen_spanish_reading: el que tienta
  alternative_spanish_readings:
  - el tentador
  - el que pone a prueba
  rationale: El griego usa un participio sustantivado descriptivo, no un nombre propio. 'El que tienta' evita sobreespecificar y preserva la referencia funcional al agente de la tentación, sin borrar la carga satánica que el contexto presupone.
  doctrine_reference: 'DOCTRINE.md: Satanic opposition in Pauline texts'
- issue: Valor de εἰς κενὸν γένηται
  english_pob_reading: our labor might be in vain
  chosen_spanish_reading: nuestro trabajo resultara en vano
  alternative_spanish_readings:
  - nuestra labor fuera en vano
  - nuestro trabajo quedara en nada
  rationale: La idea principal es la inutilidad o falta de resultado, no una imagen espacial literal. 'En vano' es la equivalencia idiomática correcta y mantiene la tensión retórica de un posible fracaso del ministerio.
  doctrine_reference: 'DOCTRINE.md: Idioms of futility'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, especialmente la corrección de εἰς κενὸν γένηται como 'in vain' en lugar de una imagen literal como 'empty'. También conserva la decisión de no introducir el objeto de 'envié', ya que el contexto lo suple, y mantiene la repetición semántica de πειράζω mediante 'el que tienta' / 'tentado'.
  spanish_consistency_notes:
  - Se usa 'fe' como equivalente principal de πίστις y se deja la posible amplitud semántica en nota.
  - Se evita 'SEÑOR' o formulaciones litúrgicas no presentes; el versículo no contiene el nombre divino.
  - '''En vano'' se preserva en la nota como alternativa léxica para el modismo εἰς κενόν.'
  - El sujeto del participio ὁ πειράζων se vierte como 'el que tienta' para conservar la forma descriptiva del griego.
