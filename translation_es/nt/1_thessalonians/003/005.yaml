  text: διὰ τοῦτο κἀγὼ μηκέτι στέγων ἔπεμψα εἰς τὸ γνῶναι τὴν πίστιν ὑμῶν, μή πως ἐπείρασεν ὑμᾶς ὁ πειράζων καὶ εἰς κενὸν γένηται ὁ κόπος ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/1_thessalonians/003/005.yaml
  text: For this reason[a], when I could bear it no longer, I sent to learn about your faith[b], lest somehow the tempter had tempted you and our labor might be in vain.
  footnotes:
  - marker: a
    text: Or 'your faithfulness' or 'your trust.' The Greek word can carry overlapping senses depending on context.
    reason: alternative_reading
  - marker: b
    text: Or 'in vain' or 'for nothing.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
