translation:
  language: es
  text: Por eso, cuando ya no podíamos soportarlo[a], nos pareció bien[b] ser dejados solos en Atenas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ya no podíamos aguantarlo más».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «pensamos que era mejor ser dejados en Atenas por nuestra cuenta».'
