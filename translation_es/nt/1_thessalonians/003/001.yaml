lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Διό marca una conclusión inferida del contexto anterior. «Por eso» mantiene la relación lógica con naturalidad en español y evita un tono excesivamente formal que «Por tanto» podría dar en lectura pública.
- source_word: μηκέτι στέγοντες
  english_pob_choice: when we could bear it no longer
  chosen_spanish: cuando ya no podíamos soportarlo
  alternatives_spanish:
  - cuando ya no lo podíamos aguantar
  - cuando ya no podíamos resistirlo
  lexicon: BDAG
  rationale: La idea es la de dejar de poder تحمل/endurecer una carga emocional o de preocupación. «Soportarlo» conserva el valor de resistencia/aguante de στέγω y la negación progresiva de μηκέτι sin volverlo mecánico.
- source_word: εὐδοκήσαμεν
  english_pob_choice: we were pleased
  chosen_spanish: nos complació
  alternatives_spanish:
  - nos agradó
  - nos pareció bien
  - decidimos de buen grado
  lexicon: BDAG
  rationale: El verbo puede expresar complacencia, buena disposición o una decisión favorable. «Nos complació» preserva el matiz positivo-volitivo del plural sin reducirlo solo a una decisión pragmática.
- source_word: καταλειφθῆναι
  english_pob_choice: to be left
  chosen_spanish: quedar
  alternatives_spanish:
  - ser dejados
  - quedarnos
  lexicon: BDAG
  rationale: El infinitivo pasivo indica ser dejados atrás o quedar en un lugar. En español, «quedar» comunica bien el resultado pasivo en contexto y suena natural; el pasivo explícito queda como alternativa si se quiere más formalidad.
- source_word: ἐν Ἀθήναις
  english_pob_choice: in Athens
  chosen_spanish: en Atenas
  alternatives_spanish:
  - en la ciudad de Atenas
  lexicon: BDAG
  rationale: Topónimo estándar sin ajuste especial.
- source_word: μόνοι
  english_pob_choice: alone
  chosen_spanish: solos
  alternatives_spanish:
  - solamente nosotros
  - por nuestra cuenta
  lexicon: BDAG
  rationale: «Solos» reproduce el predicativo plural y conserva la tensión del texto respecto a quiénes incluye el plural, sin resolverla en una paráfrasis singular.
theological_decisions:
- issue: Tensión entre el plural gramatical y posibles reconstrucciones históricas de quién quedó en Atenas
  english_pob_reading: Retain the plural 'we' and 'alone' as stated in the Greek without harmonizing to a singular paraphrase.
  chosen_spanish_reading: Conservar el plural «nos» y «solos» tal como está en el griego, sin convertirlo en una paráfrasis singular.
  alternative_spanish_readings:
  - «yo decidí quedarme solo»
  - «pensé que era mejor quedar solo»
  rationale: El griego usa formas de primera persona plural (εὐδοκήσαμεν, μόνοι). Aunque existan debates sobre el referente histórico o epistolar, la traducción debe preservar la forma gramatical y no resolver la cuestión en el texto principal.
  doctrine_reference: Preservar la tensión del texto sin armonizarla.
translation_notes:
  revision_awareness: Se revisó el pasaje frente al paquete fuente griego y el audit trail inglés. No hubo cambios aplicados en la revisión más reciente; esta versión mantiene la misma decisión exegética básica, con un español más natural y fiel al plural griego.
  spanish_consistency_notes:
  - Se mantiene «Atenas» como topónimo invariable.
  - Se conserva el plural de primera persona («podíamos», «nos») para respetar el griego.
  - Se evita usar «SEÑOR» u այլ terminología no presente en el versículo.
  - Los corchetes de nota se colocan solo donde hay alternativa léxica real.
