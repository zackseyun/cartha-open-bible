translation:
  language: es
  text: Pues ahora vivimos[a][b], si ustedes permanecen firmes en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Vivimos» puede entenderse como una expresión retórica de renovado ánimo o vitalidad, no solo como supervivencia física.
    reason: lexical_alternative
  - marker: b
    text: O «Porque ahora vivimos, si ustedes permanecen firmes en el Señor». La conjunción inicial también puede traducirse «porque» o dejarse implícita según el estilo del español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: ὅτι introduce aquí la explicación o consecuencia de lo anterior. En español, «Porque» expresa bien esa relación causal/explanatoria sin sonar forzado.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - por ahora
  lexicon: BDAG
  rationale: El adverbio temporal se conserva de forma directa. «Ahora» mantiene el énfasis en la vitalidad presente de Pablo y sus compañeros.
- source_word: ζῶμεν
  english_pob_choice: we live
  chosen_spanish: vivimos
  alternatives_spanish:
  - estamos vivos
  - realmente vivimos
  lexicon: BDAG
  rationale: «Vivimos» reproduce con naturalidad el presente indicativo y deja intacta la fuerza retórica de la expresión, sin añadir interpretación en el texto principal.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - con tal de que
  - si es que
  lexicon: BDAG
  rationale: La partícula condicional se vierte con la forma más directa y normal en español, preservando la estructura condicional del griego.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_spanish: permanecen firmes
  alternatives_spanish:
  - se mantienen firmes
  - están firmes
  - se sostienen firmes
  lexicon: BDAG
  rationale: στήκω expresa la idea de estar firmes o perseverar. «Permanecen firmes» comunica bien el estado continuo en español y suena natural en un registro bíblico moderno.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - unidos al Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina establecida. Aunque «κύριος» puede tener matiz más amplio, aquí la expresión idiomática «en el Señor» es la forma más fiel y reconocible en español cristiano.
theological_decisions:
- issue: Fuerza de «vivimos»
  english_pob_reading: A rhetorical expression of renewed encouragement or vitality, not merely physical survival.
  chosen_spanish_reading: Una expresión retórica de renovada vida o ánimo, no una afirmación biológica literal.
  alternative_spanish_readings:
  - vivimos de verdad
  - nos sentimos vivos
  - seguimos con vida
  rationale: La frase conserva su literalidad aparente, pero en contexto expresa el efecto de la firmeza de los tesalonicenses sobre la vitalidad pastoral de Pablo. No se resuelve la tensión en una paráfrasis explicativa dentro del texto.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica sin resolverla prematuramente)
- issue: Sentido de «en el Señor»
  english_pob_reading: Perseverance within the sphere of relationship to the Lord Jesus, without narrowing it doctrinally.
  chosen_spanish_reading: Permanecer en la esfera de relación y fidelidad al Señor, sin especificar más de lo que dice el texto.
  alternative_spanish_readings:
  - unión con el Señor
  - fieles al Señor
  rationale: La fórmula se deja amplia, como en el griego y en la traducción inglesa, para no cerrar una riqueza teológica que el contexto no explicita.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La pauta inglesa revisó «are standing firm» a «stand firm» por mayor naturalidad y fidelidad al presente de στήκετε. En español, «permanecen firmes» conserva ese sentido durativo sin sonar artificial; además, se mantuvo la relación causal de ὅτι con «Porque», acorde con el audit trail.
  spanish_consistency_notes:
  - Se usa «ustedes» para el plural de segunda persona en un registro neutral latinoamericano.
  - Se conserva «el Señor» como equivalente estable de κύριος en esta fórmula paulina.
  - No se añadió interpretación doctrinal sobre la perseverancia más allá de lo explícito en el verso.
  - La puntuación mantiene la cláusula condicional de forma clara y publicable.
