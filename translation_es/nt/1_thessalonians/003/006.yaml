translation:
  language: es
  text: Pero ahora que Timoteo ha llegado a nosotros de ustedes y nos ha traído la buena noticia de su fe[a] y de su amor, y que siempre tienen buen recuerdo de nosotros, anhelando vernos, así como también nosotros a ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «su fidelidad». El griego pistis puede denotar fe, confianza o fidelidad; el texto principal sigue la opción por defecto del proyecto: «fe».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - recién
  lexicon: BDAG
  rationale: Marca el giro temporal y discursivo hacia la noticia reciente; «ahora» es natural en español y conserva el valor de transición del adverbio.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: Expresa el contraste suave con la preocupación previa, como en el texto inglés, sin volverlo demasiado enfático.
- source_word: ἐλθόντος Τιμοθέου πρὸς ἡμᾶς ἀφ’ ὑμῶν
  english_pob_choice: that Timothy has come to us from you
  chosen_spanish: que Timoteo ha llegado a nosotros de parte de ustedes
  alternatives_spanish:
  - con Timoteo habiendo llegado a nosotros de parte de ustedes
  - desde ustedes
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte con una cláusula natural en español. «De parte de ustedes» preserva el origen relacional del envío sin sonar mecánico.
- source_word: εὐαγγελισαμένου
  english_pob_choice: has brought us the good news
  chosen_spanish: nos ha traído la buena noticia
  alternatives_spanish:
  - nos ha anunciado la buena noticia
  - nos ha reportado buenas noticias
  lexicon: BDAG
  rationale: Conserva la raíz de anuncio gozoso sin imponer un sentido técnico de «evangelizar» donde aquí Timoteo informa sobre la situación de la iglesia.
- source_word: τὴν πίστιν
  english_pob_choice: faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su fidelidad
  - su confianza
  lexicon: BDAG
  rationale: Se mantiene el valor principal de πίστις como «fe», según el patrón del proyecto. El posesivo «su» da naturalidad y deja abierta la posible resonancia de fidelidad.
- source_word: τὴν ἀγάπην
  english_pob_choice: love
  chosen_spanish: su amor
  alternatives_spanish:
  - su caridad
  - su afecto
  lexicon: BDAG
  rationale: «Amor» es la equivalencia estándar y más transparente para ἀγάπη en este contexto relacional.
- source_word: μνείαν ἡμῶν ἀγαθὴν
  english_pob_choice: a good remembrance of us
  chosen_spanish: buen recuerdo de nosotros
  alternatives_spanish:
  - buena memoria de nosotros
  - buenas menciones de nosotros
  lexicon: BDAG
  rationale: «Recuerdo» expresa bien μνεία en español actual; «buen recuerdo de nosotros» es claro y cercano al griego, y evita el giro más literal pero menos natural de «remembranza».
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  lexicon: BDAG
  rationale: Equivalente directo y idiomático para la frecuencia continua.
- source_word: ἐπιποθοῦντες ἡμᾶς ἰδεῖν
  english_pob_choice: longing to see us
  chosen_spanish: deseando vernos
  alternatives_spanish:
  - anhelando vernos
  - teniendo el deseo intenso de vernos
  lexicon: BDAG
  rationale: «Desear vernos» comunica el impulso afectivo de ἐπιποθέω en español natural; se conserva la fuerza relacional sin sobrecargar el estilo.
- source_word: καθάπερ καὶ ἡμεῖς ὑμᾶς
  english_pob_choice: just as we also long to see you
  chosen_spanish: así como también nosotros deseamos verlos a ustedes
  alternatives_spanish:
  - así como también nosotros deseamos verlos
  - igual que nosotros también deseamos verlos
  lexicon: BDAG
  rationale: Hace explícito el verbo implícito del segundo miembro, como en el inglés POB, y conserva la reciprocidad del anhelo mutuo.
theological_decisions:
- issue: πίστις como «fe» con posible matiz de «fidelidad»
  english_pob_reading: your faith
  chosen_spanish_reading: su fe
  alternative_spanish_readings:
  - su fidelidad
  rationale: El texto probablemente alude a la confianza perseverante de los tesalonicenses; sin embargo, el término griego admite también el matiz de constancia. Se mantiene «fe» en el cuerpo principal, siguiendo la preferencia doctrinal del proyecto, y se reserva la alternativa en nota.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para πίστις; Translation philosophy #3'
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas y el control de calidad final reporta alta concordancia; por ello, el borrador español sigue de cerca la solución inglesa aprobada, ajustándola a un español natural y transparente sin introducir cambios de sentido.
  spanish_consistency_notes:
  - Se mantiene «Timoteo» y no se translitera el nombre.
  - «Dios/Señor» no aparece en este versículo, por lo que no hay decisión terminológica adicional sobre el nombre divino.
  - El tono relacional de ἀγάπη y ἐπιποθέω se conserva con un español sobrio y eclesialmente claro.
  - Se usa el pronombre de segunda persona plural «ustedes/los» para una lectura hispana neutral latinoamericana.
