    issue: «deseando vernos» suaviza ἐπιποθοῦντες
    rationale: El participio ἐπιποθοῦντες expresa un deseo intenso y afectuoso. «Deseando» es comprensible pero menos fuerte que el inglés auditado «longing». «Anhelando vernos» preserva mejor la carga emocional.
  - severity: low
