revisions:
- from: Y que el Señor[a] los haga crecer y abundar en amor unos por otros y por todos[b], así como también nosotros por ustedes[c].
  to: Y que el Señor los haga crecer y abundar en amor unos hacia otros y hacia todos[a], así como también nosotros lo hacemos por ustedes[b].
  rationale: Se revisa para mejorar la naturalidad y claridad del español sin cambiar el sentido fuente ni las decisiones léxicas principales. 'hacia' expresa mejor la dirección relacional del amor que 'por' en este contexto, y 'lo hacemos por ustedes' completa de forma idiomática la elipsis griega documentada en el audit trail inglés. Se elimina la nota teológica sobre 'el Señor' por innecesaria para el lector y porque el texto principal ya preserva adecuadamente la ambigüedad del original.
