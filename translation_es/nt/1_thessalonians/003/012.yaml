translation:
  language: es
  text: Y que el Señor los haga crecer y abundar en amor unos hacia otros y hacia todos[a], así como también nosotros lo hacemos por ustedes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'unos por otros y por todos'. El griego usa εἰς, que puede expresar dirección o relación.
    reason: lexical_alternative
  - marker: b
    text: 'La cláusula final es elíptica en griego: literalmente, ''así como también nosotros hacia ustedes'', con el sentido tomado de la frase anterior.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: En este contexto paulino de oración/bendición, κύριος funciona como título reverente normal en español; 'Señor' conserva la lectura estándar sin añadir un glosa interpretativa. Se evita 'Yahvé' porque el texto griego presenta κύριος y el audit trail inglés mantiene 'the Lord' sin identificar explícitamente el referente.
- source_word: πλεονάσαι
  english_pob_choice: cause you to increase
  chosen_spanish: los haga crecer
  alternatives_spanish:
  - los haga aumentar
  - los haga incrementarse
  lexicon: BDAG
  rationale: 'El aoristo optativo expresa un ruego: ''que... haga''. En español, ''hacer crecer'' comunica bien el matiz causativo sin sonar mecánico. ''Crecer'' mantiene la imagen de aumento personal y relacional.'
- source_word: περισσεύσαι
  english_pob_choice: abound
  chosen_spanish: abundar
  alternatives_spanish:
  - sobreabundar
  - desbordar
  lexicon: BDAG
  rationale: La pareja πλεονάσαι / περισσεύσαι pide conservar dos verbos distintos. 'Abundar' reproduce la idea de superabundancia de modo natural en español y permite mantener la intensificación retórica.
- source_word: τῇ ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - en el amor
  lexicon: BDAG
  rationale: 'El dativo se expresa de forma natural como esfera: ''en amor''. Se evita añadir artículo para no cerrar innecesariamente el alcance y para conservar la construcción breve del griego.'
- source_word: εἰς ἀλλήλους
  english_pob_choice: for one another
  chosen_spanish: unos por otros
  alternatives_spanish:
  - unos a otros
  - hacia unos a otros
  lexicon: BDAG
  rationale: '''Por'' comunica bien la dirección benefactora del amor en español y suena más idiomático que un calco rígido. ''Unos por otros'' mantiene la reciprocidad de ἀλλήλους sin perder fluidez.'
- source_word: καὶ εἰς πάντας
  english_pob_choice: and for all
  chosen_spanish: y por todos
  alternatives_spanish:
  - y hacia todos
  - y para todos
  lexicon: BDAG
  rationale: El alcance de πάντας se preserva abierto. 'Por todos' mantiene la amplitud sin restringir a creyentes o a la comunidad interna. Se evita explicitar 'todas las personas' para no sobreinterpretar.
- source_word: καθάπερ καὶ ἡμεῖς εἰς ὑμᾶς
  english_pob_choice: just as we also do for you
  chosen_spanish: así como también nosotros por ustedes
  alternatives_spanish:
  - tal como también nosotros por ustedes
  - así como también nosotros para con ustedes
  lexicon: BDAG
  rationale: La cláusula es elíptica en griego y el inglés la completa con 'do'. En español, la elipsis puede mantenerse de modo natural repitiendo la relación 'por ustedes' desde la frase anterior, sin introducir un verbo no presente en el texto.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ aquí funciona como transición suave dentro de la oración de deseo. 'Y' preserva la continuidad del ruego sin cargarlo de contraste.
theological_decisions:
- issue: Referente de ὁ κύριος
  english_pob_reading: Rendered simply as 'the Lord' without specifying further in the translation.
  chosen_spanish_reading: Se traduce simplemente como 'el Señor', sin identificar explícitamente si el referente es el Señor Jesús o Dios.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego presenta κύριος sin expansión. La tradición paulina permite una lectura cristológica, pero el texto por sí solo no obliga a concretarla. Mantener 'el Señor' conserva la tensión y la sobriedad del original.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → ''Lord'''
- issue: Alcance de πάντας
  english_pob_reading: '''all'' left broad rather than narrowed to ''all people'' or ''all believers.'''
  chosen_spanish_reading: '''todos'' se deja amplio, sin precisar ''todas las personas'' ni ''todos los creyentes''.'
  alternative_spanish_readings:
  - todas las personas
  - todos los creyentes
  rationale: El adjetivo es deliberadamente amplio. La traducción debe preservar esa amplitud para no resolver una tensión textual en favor de una precisión interpretativa que el griego no exige.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El texto sigue de cerca la decisión de la revisión más reciente, que no requirió cambios, y mantiene la misma solución de equivalencia óptima: dos verbos distintos para πλεονάσαι / περισσεύσαι, un cierre elíptico para la última cláusula, y el alcance abierto de πάντας.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' como término consistente para κύριος en este versículo.
  - Se conserva la pareja verbal 'hacer crecer y abundar' para reflejar la intensificación del griego sin fusionar los dos verbos.
  - '''Por todos'' preserva la amplitud sin restringir el referente de πάντας.'
  - La puntuación y la sintaxis buscan sonar naturales en español bíblico contemporáneo, sin caer en formulación arcaizante.
