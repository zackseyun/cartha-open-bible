translation:
  language: es
  text: y enviamos a Timoteo[a], nuestro hermano y colaborador de Dios en el evangelio del Mesías[b], para fortalecerlos y animarlos respecto de su fe.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «colaborador con Dios». Algunos manuscritos y traducciones reflejan una redacción distinta, como «siervo de Dios».'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «Cristo»; se traduce «Mesías» aquí porque el sentido de título es prominente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέμψαμεν
  english_pob_choice: we sent
  chosen_spanish: enviamos
  alternatives_spanish:
  - mandamos
  - mandamos a
  lexicon: BDAG
  rationale: El aoristo de πέμπω se rinde naturalmente con un pasado simple. 'Enviamos' conserva la acción narrativa sin el matiz más administrativo de 'mandamos'.
- source_word: Τιμόθεον
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: Convención onomástica
  rationale: El nombre propio se translitera de forma estándar al español como 'Timoteo'.
- source_word: ἀδελφὸν ἡμῶν
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro hermano en la fe
  - nuestro creyente hermano
  lexicon: BDAG
  rationale: La expresión fraterna preserva el vínculo relacional entre creyentes sin expandir innecesariamente el sentido del griego.
- source_word: συνεργὸν τοῦ θεοῦ
  english_pob_choice: God's fellow worker
  chosen_spanish: colaborador de Dios
  alternatives_spanish:
  - cooperador de Dios
  - colaborador con Dios
  lexicon: BDAG
  rationale: En español, 'colaborador de Dios' comunica bien la relación genitiva sin sonar forzado. 'Cooperador de Dios' puede sonar más técnico; 'colaborador con Dios' introduce una matización relacional menos directa. La formulación mantiene la tensión del original sin resolverla hacia 'siervo de Dios'.
- source_word: ἐν τῷ εὐαγγελίῳ τοῦ Χριστοῦ
  english_pob_choice: in the gospel of the Messiah
  chosen_spanish: en el evangelio del Mesías
  alternatives_spanish:
  - en el evangelio de Cristo
  - en el evangelio acerca del Mesías
  lexicon: BDAG
  rationale: '''Evangelio del Mesías'' preserva tanto el título como la construcción genitiva con naturalidad en español. Se mantiene ''Mesías'' por la decisión de traducir Χριστός como título, no como nombre fijo.'
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título; por eso se traduce 'Mesías' para conservar el sentido original. 'Cristo' queda como alternativa tradicional, pero no es la opción principal salvo contexto litúrgico o fijo.
- source_word: εἰς τὸ στηρίξαι
  english_pob_choice: to strengthen
  chosen_spanish: para fortalecer
  alternatives_spanish:
  - para afirmar
  - para establecer
  lexicon: BDAG
  rationale: La construcción con εἰς + infinitivo articular expresa propósito; 'para fortalecer' es claro y fiel al valor pastoral del verbo στηρίζω.
- source_word: παρακαλέσαι
  english_pob_choice: to encourage
  chosen_spanish: animaros
  alternatives_spanish:
  - exhortaros
  - consolaros
  lexicon: BDAG
  rationale: En este contexto de apoyo pastoral junto a 'fortalecer', 'animaros' comunica bien el sentido de παρακαλέω. 'Exhortaros' sería más fuerte y directivo; 'consolaros' estrecha demasiado el campo semántico.
- source_word: ὑπὲρ τῆς πίστεως ὑμῶν
  english_pob_choice: concerning your faith
  chosen_spanish: en cuanto a vuestra fe
  alternatives_spanish:
  - respecto de vuestra fe
  - por vuestra fe
  - concerning vuestra fe
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede expresar 'acerca de' o 'en favor de'. En español, 'en cuanto a vuestra fe' suena natural y refleja el ámbito de la exhortación sin decidir prematuramente entre matices cercanos.
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este pasaje, πίστις se refiere al acto y realidad de creer de los tesalonicenses; 'fe' es la traducción base más fiel y reconocible.
theological_decisions:
- issue: Renderizar συνεργὸν τοῦ θεοῦ
  english_pob_reading: God's fellow worker
  chosen_spanish_reading: colaborador de Dios
  alternative_spanish_readings:
  - cooperador de Dios
  - siervo de Dios
  rationale: El texto griego presenta una expresión fuerte que conviene no rebajar. 'Colaborador de Dios' mantiene la relación marcada por el genitivo y evita sustituirla por 'siervo de Dios', que respondería más a una tradición textual o interpretativa diferente. Se preserva así la tensión del original.
  doctrine_reference: Primacía del texto original; conservar tensiones léxicas sin suavizarlas.
- issue: Renderizar Χριστοῦ en εὐαγγελίῳ τοῦ Χριστοῦ
  english_pob_reading: the gospel of the Messiah
  chosen_spanish_reading: el evangelio del Mesías
  alternative_spanish_readings:
  - el evangelio de Cristo
  - el evangelio acerca del Mesías
  rationale: Χριστός funciona aquí como título, no como mero nombre propio. 'Mesías' reproduce mejor ese valor titular en español, mientras que 'Cristo' se conserva como opción alternativa para lectores habituados a la formulación tradicional.
  doctrine_reference: Χριστός → Mesías cuando el contexto es titular; Cristo solo cuando el uso fijo lo justifica.
translation_notes:
  revision_awareness: 'Coincide con el contexto de revisión provisto: no se documentaron cambios aplicados en la última pasada y el acuerdo general fue alto. Se ha mantenido la decisión principal sobre συνεργὸν τοῦ θεοῦ y Χριστοῦ, con notas que preservan alternativas sin resolver la tensión del texto.'
  spanish_consistency_notes:
  - 'Se mantiene el tratamiento de YHWH/θεός conforme al sistema: aquí aparece θεοῦ, traducido como ''Dios''.'
  - Se usa 'Mesías' para Χριστοῦ, en continuidad con la política del proyecto y la auditoría inglesa.
  - '''Animaros'' se escogió por naturalidad en español, pero se anotan alternativas más literales para conservar la amplitud de παρακαλέω.'
  - La puntuación y el orden siguen de cerca la sintaxis griega sin forzar calcos innecesarios.
