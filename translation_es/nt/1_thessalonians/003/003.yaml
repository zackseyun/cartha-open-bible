translation:
  language: es
  text: para que nadie se tambalee[a] en estas aflicciones[b]. Porque ustedes mismos saben que para esto hemos sido designados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'se perturbe' o 'se inquiete'; este verbo raro también puede significar 'ser engañado' o 'ser ganado con halagos' en otros contextos.
    reason: lexical_alternative
  - marker: b
    text: O 'tribulaciones'.
    reason: lexical_alternative
  - marker: c
    text: O 'estamos destinados para esto' o 'estamos puestos para esto'.
    reason: alternative_reading
lexical_decisions:
- source_word: τὸ μηδένα σαίνεσθαι
  english_pob_choice: so that no one would be shaken
  chosen_spanish: para que nadie se tambalee
  alternatives_spanish:
  - para que nadie sea sacudido
  - para que nadie se perturbe
  - para que nadie se inquiete
  - para que nadie sea engañado / ganado con halagos
  lexicon: BDAG
  rationale: El infinitivo articular expresa finalidad o resultado en relación con la frase anterior. En español, 'para que' comunica bien esa función. Para σαίνεσθαι, 'tambalearse' conserva la imagen de inestabilidad y funciona naturalmente en español; también deja abierta la fuerza de 'ser sacudido' o 'perturbarse' sin volver el texto rígido.
- source_word: ἐν ταῖς θλίψεσιν ταύταις
  english_pob_choice: by these afflictions
  chosen_spanish: en estas aflicciones
  alternatives_spanish:
  - por estas aflicciones
  - en estas tribulaciones
  - por estas tribulaciones
  lexicon: BDAG
  rationale: θλίψεσιν designa presiones, angustias o aflicciones. 'Aflicciones' preserva el peso paulino del término. Con ἐν, el español más directo es 'en'; aunque el inglés opta por 'by' para expresar causa o medio, el castellano aquí puede mantener la relación textual sin perder claridad.
- source_word: αὐτοὶ
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes mismos en persona
  - ustedes mismos, precisamente
  - ustedes
  lexicon: BDAG
  rationale: El pronombre es enfático. 'Ustedes mismos' reproduce esa fuerza sin sobrecargar el estilo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γάρ introduce la base explicativa de lo anterior. 'Porque' es natural en español y mantiene la relación lógica con la exhortación precedente.
- source_word: οἴδατε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - están conscientes
  - saben bien
  lexicon: BDAG
  rationale: 'οἶδα funciona con sentido presente: ''saber''. ''Saben'' es la equivalencia más directa y clara en español actual.'
- source_word: εἰς τοῦτο
  english_pob_choice: for this
  chosen_spanish: para esto
  alternatives_spanish:
  - para este propósito
  - para esta misma cosa
  - a esto
  lexicon: BDAG
  rationale: La frase señala la realidad a la que se refiere el apóstol. 'Para esto' es breve, natural y suficientemente preciso.
- source_word: κείμεθα
  english_pob_choice: we are appointed
  chosen_spanish: hemos sido puestos
  alternatives_spanish:
  - somos destinados
  - hemos sido designados
  - somos puestos
  lexicon: BDAG
  rationale: κεῖμαι literalmente es 'yacer/estar puesto', pero aquí tiene el sentido de estar establecido o asignado para algo. 'Hemos sido puestos' conserva la pasiva y la idea de disposición ordenada sin adelantar más de lo que el texto dice. Se evita 'destinados' como única opción para no cerrar innecesariamente la tensión entre orden divino y experiencia cristiana.
theological_decisions:
- issue: Relación de los creyentes con el sufrimiento en εἰς τοῦτο κείμεθα
  english_pob_reading: we are appointed for this
  chosen_spanish_reading: para esto hemos sido puestos
  alternative_spanish_readings:
  - para esto estamos destinados
  - para esto hemos sido designados
  - para esto estamos puestos
  rationale: La afirmación comunica que las aflicciones forman parte esperable de la vocación cristiana. 'Hemos sido puestos' conserva el matiz de disposición/nombramiento sin imponer una formulación más cerrada de predestinación. Así se mantiene el peso teológico del texto y su aplicación pastoral.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el pasaje frente al audit trail inglés y el griego SBLGNT. No se detectaron revisiones pendientes en el conjunto fuente; la versión actual mantiene el sentido, la rareza léxica de σαίνεσθαι y la pasiva idiomática de κείμεθα sin neutralizar tensiones documentadas.
  spanish_consistency_notes:
  - Se mantuvo 'aflicciones' para θλίψεις, coherente con el valor paulino del término.
  - Se prefirió 'hemos sido puestos' para κείμεθα para conservar la pasiva y la idea de disposición ordenada.
  - Se respetó la referencia explícita al grupo con 'ustedes mismos' para αὐτοί.
  - El marcador [a] se colocó en 'tambalee' porque ahí recae la ambigüedad léxica de σαίνεσθαι; [b] en 'aflicciones' y [c] en la cláusula de destino/nombramiento.
