review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general: finalidad (''para que nadie…''), aflicciones presentes, énfasis en ''ustedes mismos'', y explicación con ''porque''. Sin embargo, dos decisiones requieren ajuste: (1) el anclaje de notas está desordenado y asociado a palabras equivocadas; y (2) ''hemos sido puestos'' suena poco natural en español para κείμεθα, donde el sentido idiomático es ''hemos sido designados/estamos destinados/hemos sido puestos para ello''.'
  spanish_quality_summary: El español es generalmente claro, pero '[a]tambalee[b]' y la distribución de notas dañan la legibilidad. 'Se tambalee' es defendible, aunque 'sea sacudido' o 'se inquiete' serían más transparentes; no obstante, puede mantenerse. 'Hemos sido puestos' es comprensible pero torpe; 'hemos sido designados' ofrece mejor español digno y conserva la voz pasiva sin sonar mecánico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Aflicciones' alinea bien con θλίψεις. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión teológica sobre κείμεθα debe conservar el matiz de designación sin cargarlo de fatalismo; 'hemos sido designados para esto' cumple mejor que 'hemos sido puestos'.
  issues:
  - severity: high
    issue: Los marcadores de notas no corresponden a las notas ni al lugar semántico adecuado.
    rationale: En el texto, [a] aparece antes de 'tambalee', pero la nota a habla de 'decepcionado/ganado con halagos'; [b] queda ligada visualmente al verbo aunque su contenido trata de θλίψεις; [c] aparece tras 'aflicciones' aunque su contenido corresponde a κείμεθα. Esto incumple la disciplina de anclaje y puede confundir al lector.
  - severity: medium
    issue: '''Hemos sido puestos'' para κείμεθα es poco idiomático en español bíblico actual.'
    rationale: Aunque refleja literalmente 'be placed', en este contexto idiomático paulino la idea es estar designados o destinados para sufrir tales aflicciones. 'Hemos sido designados para esto' suena natural, mantiene la pasiva y preserva la decisión teológica documentada.
  - severity: low
    issue: La nota lexical sobre σαίνεσθαι omite las alternativas principales más contextuales ('perturbado/inquieto').
    rationale: El inglés preserva primero 'disturbed/unsettled' y luego menciona el sentido menos probable 'deceived/flattered'. En español conviene reflejar el abanico contextual más directamente para ayudar al lector.
