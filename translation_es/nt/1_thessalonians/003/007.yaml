translation:
  language: es
  text: Por esta razón, hermanos[a], con respecto a ustedes, en toda nuestra angustia y aflicción, fuimos consolados por su fe[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» es la forma habitual de tratamiento de Pablo a la congregación y puede incluir a toda la comunidad creyente.
    reason: cultural_note
  - marker: b
    text: 'O: «por su fidelidad». El griego pistis puede significar fe, confianza o fidelidad; aquí probablemente incluye la idea de firmeza en la fe continua de los tesalonicenses.'
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  - Por consiguiente
  lexicon: BDAG
  rationale: Expresa la conexión inferencial del verso con lo anterior y suena natural en español sin perder el valor causal/discursivo del griego.
- source_word: παρεκλήθημεν
  english_pob_choice: we were comforted
  chosen_spanish: fuimos consolados
  alternatives_spanish:
  - fuimos animados
  - recibimos consuelo
  - fuimos alentados
  lexicon: BDAG
  rationale: En este contexto Pablo describe alivio emocional ante la noticia recibida; 'consolados' preserva mejor el efecto de consuelo que 'animados', aunque también puede implicar aliento.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  - hermanos y hermanas en la fe
  lexicon: BDAG
  rationale: Conserva el vocativo plural masculino del griego y la costumbre paulina de dirigirse así a la congregación, sin neutralizarlo en el texto principal.
- source_word: ἐφ’ ὑμῖν
  english_pob_choice: concerning you
  chosen_spanish: con respecto a ustedes
  alternatives_spanish:
  - acerca de ustedes
  - sobre ustedes
  - en cuanto a ustedes
  lexicon: BDAG
  rationale: Este giro refleja bien la referencia temática del alivio de Pablo, sin sugerir que los tesalonicenses fueran la causa de la angustia.
- source_word: ἀνάγκῃ
  english_pob_choice: distress
  chosen_spanish: angustia
  alternatives_spanish:
  - necesidad
  - apremio
  - tribulación
  lexicon: BDAG
  rationale: En combinación con θλίψει, el sentido es de presión o aflicción vivida; 'angustia' comunica esa carga interior de forma clara en español.
- source_word: θλίψει
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - opresión
  - aflicción
  lexicon: BDAG
  rationale: Mantiene el segundo término del par sufriendo/presión con un vocablo solemne y fiel al campo semántico de θλῖψις.
- source_word: διὰ τῆς ὑμῶν πίστεως
  english_pob_choice: through your faith
  chosen_spanish: por su fe
  alternatives_spanish:
  - a través de su fe
  - mediante su fe
  - por su fidelidad
  lexicon: BDAG
  rationale: '''διά'' con genitivo expresa medio/instrumento; ''por'' es natural en español. ''Fe'' sigue el valor principal de πίστις, mientras que la posible idea de fidelidad queda abierta en la nota.'
- source_word: πίστεως
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: Se conserva el término principal 'fe' conforme al valor doctrinal por defecto; la ambigüedad contextual hacia 'fidelidad' se documenta sin resolverla en el cuerpo del texto.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί como vocativo congregacional
  english_pob_reading: '''Brothers'' is Paul''s customary form of address to the congregation and may include the whole believing community.'
  chosen_spanish_reading: '''Hermanos'' conserva la forma paulina habitual de trato a la comunidad creyente y puede incluir a toda la congregación.'
  alternative_spanish_readings:
  - '''Hermanos y hermanas'' explicitaría la inclusión'
  - '''Hermanos'' podría leerse solo en sentido masculino literal'
  rationale: La forma principal preserva la correspondencia con el griego y el registro epistolar de Pablo; la posible inclusión de toda la comunidad se deja disponible en la nota.
  doctrine_reference: 'DOCTRINE.md: policy on gender-accurate rendering and congregational address'
- issue: Sentido de πίστις entre fe y fidelidad
  english_pob_reading: '''through your faith'' ... may include the sense of steadfastness in the Thessalonians'' continued belief.'
  chosen_spanish_reading: '''por su fe'' mantiene la lectura principal, con posible resonancia de firmeza o fidelidad.'
  alternative_spanish_readings:
  - '''por su fidelidad'' enfatizaría la perseverancia'
  - '''por su confianza'' desplazaría el matiz hacia confianza personal'
  rationale: El texto griego permite que la fe incluya firmeza perseverante; el español principal no elimina esa posibilidad y la nota la deja explícita.
  doctrine_reference: 'DOCTRINE.md: contested terms table for πίστις'
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del expediente inglés: ''concerning you'' modifica la referencia del consuelo y no la cláusula de ''distress and affliction''. Por eso se colocó ''con respecto a ustedes'' inmediatamente después de ''hermanos'', y luego ''en toda nuestra angustia y aflicción'' quedó como marco circunstancial del consuelo.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' fuera del verso porque no aparece el nombre divino en este texto.
  - Se preservó el par léxico 'angustia y aflicción' para reflejar la cercanía de ἀνάγκη y θλῖψις sin fusionarlos.
  - '''Por su fe'' conserva la opción principal del expediente y deja abierta la alternativa ''fidelidad'' solo en nota.'
  - La puntuación sigue el orden del griego y hace visible la relación de las frases sin añadir contenido interpretativo.
