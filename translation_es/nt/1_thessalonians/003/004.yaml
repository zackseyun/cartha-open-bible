revisions:
- from: Porque aun cuando estábamos con ustedes, les decíamos de antemano que íbamos a sufrir aflicción[a], tal como sucedió, y ustedes lo saben.
  to: Porque incluso cuando estábamos con ustedes, les decíamos de antemano que íbamos a sufrir aflicción[a], tal como sucedió, y ustedes lo saben.
  rationale: Se reemplaza «aun cuando» por «incluso cuando» para evitar una lectura concesiva y reflejar mejor el valor temporal de ὅτε, mientras se conserva el matiz enfático de καὶ. No se requieren más cambios.
