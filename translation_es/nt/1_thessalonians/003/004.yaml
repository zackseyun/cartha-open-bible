translation:
  language: es
  text: Porque incluso cuando estábamos con ustedes, les decíamos de antemano que íbamos a sufrir aflicción[a], tal como sucedió, y ustedes lo saben.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «ser afligidos» o «sufrir tribulación». El verbo griego puede denotar presión, angustia o persecución.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Pues aun
  - Porque incluso
  lexicon: BDAG
  rationale: γάρ introduce la explicación o razón, y καί añade énfasis. «Porque aun» conserva la conexión explicativa y la fuerza enfática sin sonar forzado en español.
- source_word: ὅτε πρὸς ὑμᾶς ἦμεν
  english_pob_choice: when we were with you
  chosen_spanish: cuando estábamos con ustedes
  alternatives_spanish:
  - cuando estábamos entre ustedes
  - mientras estábamos con ustedes
  lexicon: BDAG
  rationale: La expresión idiomática πρὸς ὑμᾶς ἦμεν indica presencia relacional. «Con ustedes» es natural en español y refleja esa cercanía sin perder el sentido.
- source_word: προελέγομεν
  english_pob_choice: we kept telling you beforehand
  chosen_spanish: les decíamos de antemano
  alternatives_spanish:
  - les avisábamos de antemano
  - les decíamos antes
  lexicon: BDAG
  rationale: El imperfecto sugiere acción repetida o continua durante la estancia de Pablo. «Les decíamos de antemano» conserva la repetición implícita y el valor de decir antes.
- source_word: ὅτι μέλλομεν θλίβεσθαι
  english_pob_choice: that we were going to suffer affliction
  chosen_spanish: que íbamos a sufrir aflicción
  alternatives_spanish:
  - que íbamos a ser afligidos
  - que íbamos a pasar por tribulación
  lexicon: BDAG
  rationale: μέλλομεν expresa cercanía/futuro esperado; «íbamos a» es idiomático. θλίβεσθαι tiene un rango de presión, angustia o persecución; «sufrir aflicción» preserva esa amplitud.
- source_word: θλίβεσθαι
  english_pob_choice: suffer affliction
  chosen_spanish: sufrir aflicción
  alternatives_spanish:
  - ser afligidos
  - sufrir tribulación
  lexicon: BDAG
  rationale: Se mantiene la fuerza verbal y el campo semántico de θλῖψις sin reducirlo de antemano a una sola forma de oposición.
- source_word: καθὼς καὶ ἐγένετο
  english_pob_choice: just as it happened
  chosen_spanish: tal como sucedió
  alternatives_spanish:
  - tal como ocurrió
  - como también pasó
  lexicon: BDAG
  rationale: καθώς indica correspondencia entre lo anunciado y lo realizado. «Tal como sucedió» comunica esa correspondencia de forma clara y natural.
- source_word: καὶ οἴδατε
  english_pob_choice: and you know
  chosen_spanish: y ustedes lo saben
  alternatives_spanish:
  - y ustedes saben
  - como ustedes saben
  lexicon: BDAG
  rationale: El objeto está implícito en griego; «lo saben» lo hace explícito en español y mantiene la referencia a la realización mencionada.
theological_decisions:
- issue: Naturaleza de la aflicción predicha por θλίβεσθαι
  english_pob_reading: general affliction/suffering, likely including persecution, without narrowing the term
  chosen_spanish_reading: aflicción general, posiblemente incluyendo persecución, sin precisar más de lo que el griego permite
  alternative_spanish_readings:
  - persecución específicamente
  - tribulación en sentido técnico o escatológico
  rationale: El contexto de la carta incluye oposición y sufrimiento, pero el término griego no obliga a limitarse a persecución ni a un sentido escatológico técnico. «Aflicción» deja abierta la tensión semántica.
  doctrine_reference: 'Principio de traducción POB: preservar la tensión lexical y teológica sin resolverla indebidamente.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en la palabra «aflicción» dentro del texto, manteniendo la equivalencia preferida por el audit trail inglés y evitando una glosa demasiado estrecha.
  spanish_consistency_notes:
  - Se mantiene «aflicción» para θλίβεσθαι, coherente con el inglés POB y con el uso de un término amplio en español.
  - Se usa «ustedes» en lugar de «vosotros» para español neutral latinoamericano.
  - «Tal como sucedió» refleja bien la correspondencia entre anuncio y cumplimiento sin añadir énfasis extra.
  - La nota [a] está anclada exactamente en el término con ambigüedad lexical relevante.
