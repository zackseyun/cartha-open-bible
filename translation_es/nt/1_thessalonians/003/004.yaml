review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego general: καὶ γὰρ como conexión explicativa con énfasis, ὅτε πρὸς ὑμᾶς ἦμεν como presencia con los tesalonicenses, προελέγομεν en imperfecto como acción repetida, y ὅτι μέλλομεν θλίβεσθαι como expectativa de sufrimiento/aflicción. También conserva adecuadamente la correspondencia de καθὼς… ἐγένετο y el cierre καὶ οἴδατε.'
  spanish_quality_summary: El español es claro y natural, pero «Porque aun cuando» puede sonar levemente concesivo en español, cuando aquí ὅτε es temporal, no concesivo. «Porque aun cuando estábamos con ustedes» puede entenderse como 'a pesar de estar con ustedes'. La reparación mínima es cambiar a «Porque incluso cuando» o «Porque cuando todavía estábamos con ustedes». El resto del versículo lee bien; «aflicción» es digno y comprensible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Aflicción» mantiene bien el campo semántico de θλίβεσθαι según la auditoría inglesa. La nota léxica también está alineada con las alternativas documentadas.
  issues:
  - severity: medium
    issue: «aun cuando» introduce una posible lectura concesiva en vez de temporal
    rationale: El griego ὅτε significa 'cuando', y καὶ γὰρ aporta explicación/enfasis, no concesión. En español, «aun cuando» frecuentemente se oye como 'aunque', lo que puede distorsionar la relación temporal del original.
  revised_spanish_text: Porque incluso cuando estábamos con ustedes, les decíamos de antemano que íbamos a sufrir aflicción[a], tal como sucedió, y ustedes lo saben.
  revised_footnotes:
  - marker: a
    text: También puede traducirse «ser afligidos» o «sufrir tribulación». El verbo griego puede denotar presión, angustia o persecución.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «aun cuando» por «incluso cuando» para evitar una lectura concesiva y reflejar mejor el valor temporal de ὅτε, mientras se conserva el matiz enfático de καὶ. No se requieren más cambios.
