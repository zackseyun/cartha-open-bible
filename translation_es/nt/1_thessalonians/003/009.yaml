    issue: «por ustedes» para περὶ ὑμῶν borra la distinción con δι’ ὑμᾶς
    rationale: El inglés POB documenta «concerning you» precisamente para no confundirlo con la causa posterior «because of you». En español, «por ustedes» en la primera instancia se superpone innecesariamente con «a causa de ustedes» en la segunda.
  - severity: medium
    issue: «con que nos gozamos» es poco natural en español actual
    rationale: Aunque intenta conservar el eco χαρά/χαίρομεν, la frase suena rígida y algo calcada. «Con la que nos alegramos» mantiene la relación semántica y mejora la lectura.
  - severity: low
    issue: «agradecimiento» es posible pero menos preciso que «acción de gracias» en un contexto dirigido a Dios
    rationale: εὐχαριστίαν aquí apunta a la idea de dar gracias a Dios. «Acción de gracias» expresa mejor ese matiz cultual/devocional sin volverse demasiado arcaico.
