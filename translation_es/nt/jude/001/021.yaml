translation:
  language: es
  text: manténganse en el amor de Dios[a], esperando la misericordia de nuestro Señor Jesús Mesías para la vida eterna[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el amor de Dios»; el griego también puede entenderse como «en amor por Dios».'
    reason: alternative_reading
  - marker: c
    text: 'O: «hacia la vida eterna» o «hasta la vida eterna».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τηρήσατε
  english_pob_choice: keep yourselves
  chosen_spanish: conservense
  alternatives_spanish:
  - guárdense
  - manténganse
  - custodiénse
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a una acción decisiva y continua como postura. En español, «conservarse» comunica bien la idea de mantenerse en una condición o esfera determinada sin añadir interpretaciones innecesarias. Se evita «guarden» por posible ambigüedad de objeto y se conserva el valor exhortativo.
- source_word: ἐν ἀγάπῃ θεοῦ
  english_pob_choice: in the love of God
  chosen_spanish: en el amor de Dios
  alternatives_spanish:
  - en el amor de Dios[a]
  - en el amor a Dios
  - en el amor de parte de Dios
  lexicon: BDAG
  rationale: 'La expresión griega deja una tensión real: puede leerse como amor de Dios o amor hacia Dios. La forma básica «el amor de Dios» preserva esa ambigüedad en español sin resolverla de antemano.'
- source_word: προσδεχόμενοι
  english_pob_choice: waiting for
  chosen_spanish: esperando
  alternatives_spanish:
  - aguardando
  - anhelando
  - esperando con expectativa
  lexicon: BDAG
  rationale: El participio presente expresa una postura concomitante y sostenida. «Esperando» es natural en español y mantiene el sentido de recepción confiada sin sobrecargar la intensidad.
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  - clemencia
  lexicon: BDAG
  rationale: «Misericordia» es el equivalente más estable en español bíblico y conserva el sentido de favor compasivo inmerecido.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título cristológico estándar «Señor» para κύριος en el uso neotestamentario.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Siguiendo la política del proyecto, Χριστός se traduce como título y no se deja como nombre-forma litúrgica. «Mesías» preserva el valor titular en español y evita diluir el matiz cristológico.
- source_word: εἰς ζωὴν αἰώνιον
  english_pob_choice: unto eternal life
  chosen_spanish: hasta la vida eterna
  alternatives_spanish:
  - para la vida eterna
  - hacia la vida eterna
  - unto la vida eterna
  lexicon: BDAG
  rationale: εἰς marca dirección o resultado. «Hasta la vida eterna» comunica con naturalidad esa orientación final sin introducir una expansión interpretativa como «que conduce a».
theological_decisions:
- issue: Ambigüedad de ἐν ἀγάπῃ θεοῦ
  english_pob_reading: Preserve the ambiguity with 'the love of God' rather than specifying either God's love for believers or believers' love for God.
  chosen_spanish_reading: Conservar «el amor de Dios» sin precisar si es el amor de Dios hacia los creyentes o el amor del creyente hacia Dios.
  alternative_spanish_readings:
  - el amor de Dios
  - el amor a Dios
  - el amor de parte de Dios
  rationale: El griego permite más de una lectura y el contexto inmediato no obliga a resolverla. La traducción española mantiene esa tensión interpretativa en vez de cerrarla.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Rendición de Χριστοῦ como título
  english_pob_reading: Translate Χριστός as 'Messiah' rather than 'Christ' because it functions as a title.
  chosen_spanish_reading: Traducir Χριστός como «Mesías» en «Jesús Mesías».
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: En español, «Mesías» comunica el valor titular con mayor claridad que «Cristo» y evita convertir el término en simple nombre fijo. Se mantiene la distinción entre nombre y título conforme a la política del proyecto.
  doctrine_reference: Translation philosophy §2 Translate titles; transliterate names; Contested terms table for Χριστός.
translation_notes:
  revision_awareness: El borrador sigue la lectura final del audit trail para εἰς ζωὴν αἰώνιον como una orientación directa hacia la vida eterna, pero en español se mantiene una formulación natural («hasta la vida eterna») que conserva el movimiento del griego sin expansión interpretativa. También se conserva la traducción titular de Χριστός como «Mesías», coherente con la política doctrinal restaurada tras la corrección de regresión.
  spanish_consistency_notes:
  - Se usa «Jesús Mesías» para preservar el título cristológico, no la forma litúrgica «Cristo».
  - «Misericordia» se mantiene para ἔλεος por consistencia bíblica y claridad teológica.
  - La ambigüedad de ἐν ἀγάπῃ θεοῦ se deja abierta en la nota, no en el cuerpo del texto.
  - Se prefiere una sintaxis fluida en español, pero sin suavizar el imperativo ni el participio de la fuente.
