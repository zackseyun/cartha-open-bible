    text: 'O: «en el amor de Dios»; el griego también puede entenderse como «en amor por Dios».'
    reason: alternative_reading
  - marker: c
    text: 'O: «hacia la vida eterna» o «hasta la vida eterna».'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «consérvense» por «manténganse» para mayor naturalidad y corrección estilística en español; se cambia «hasta la vida eterna» por «para la vida eterna» porque expresa mejor la meta de εἰς sin sugerir un límite temporal. Se ajusta la nota [a] para que presente una alternativa real y clara, manteniendo la ambigüedad del genitivo en «amor de Dios».
