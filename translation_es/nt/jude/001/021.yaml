  text: ἑαυτοὺς ἐν ἀγάπῃ θεοῦ τηρήσατε προσδεχόμενοι τὸ ἔλεος τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ εἰς ζωὴν αἰώνιον.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/021.yaml
  text: keep yourselves in the love of God[c][b][a], waiting for the mercy of our Lord Jesus Messiah unto eternal life.
