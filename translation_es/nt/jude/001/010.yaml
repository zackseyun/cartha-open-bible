review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien la estructura bipartita del griego y conserva el contraste entre lo que no comprenden y lo que conocen de modo natural. Sin embargo, en βλασφημοῦσιν se aparta innecesariamente del audit trail inglés, que justificó ‘slander’ por el objeto no explícitamente divino; en español ‘blasfeman de’ suena menos natural y más teológicamente estrecho. Además, φθείρονται queda mejor en voz media/reflexiva en español que con el pasivo ‘son corrompidos’, ya que el contexto apunta a autorruina/corrupción por aquello mismo que siguen.
  spanish_quality_summary: El texto es generalmente claro, pero ‘blasfeman de todo lo que no entienden’ suena forzado en español bíblico actual. ‘Calumnian’ o ‘injurian’ sería más idiomático; ‘calumnian’ además se alinea mejor con la decisión inglesa. También ‘por estas cosas son corrompidos’ es comprensible, pero ‘en esas mismas cosas se corrompen’ resulta más natural y refleja mejor la fuerza de ἐν τούτοις φθείρονται. El resto del verso lee bien.
  glossary_alignment: 'No hay conflicto con terminología mayor del proyecto. La principal divergencia es metodológica: el borrador eligió ‘blasfeman’ donde el POB inglés documentó ‘slander’. ‘Animales irracionales’ y ‘naturalmente’ están bien alineados. Para φθείρονται, ‘se corrompen’ preserva mejor la ambigüedad de corrupción/ruina sin imponer una pasiva externa.'
  issues:
