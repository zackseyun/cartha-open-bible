translation:
  language: es
  text: Pero estos calumnian todo lo que no entienden[a], y en esas mismas cosas en las que conocen naturalmente, como animales irracionales[b], se corrompen[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘blasfeman’ o ‘ultrajan’ todo lo que no entienden.
    reason: lexical_alternative
  - marker: b
    text: O ‘todo lo que conocen naturalmente, como animales sin razón’.
    reason: lexical_alternative
  - marker: c
    text: O ‘por estas cosas se corrompen’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι
  english_pob_choice: these people
  chosen_spanish: estos
  alternatives_spanish:
  - estas personas
  - estos hombres
  lexicon: BDAG
  rationale: El demostrativo plural basta para identificar a los intrusos del contexto sin añadir una explicitación que el griego no exige. En español, ‘estos’ suena natural y mantiene la referencia despectiva del pasaje.
- source_word: βλασφημοῦσιν
  english_pob_choice: slander
  chosen_spanish: blasfeman
  alternatives_spanish:
  - calumnian
  - ultrajan
  - murmuran contra
  lexicon: BDAG
  rationale: Aunque el contexto permite un abuso verbal general, el verbo griego conserva su fuerza de habla impía/ofensiva. Dado que el objeto aquí es ‘todo lo que no entienden’, ‘blasfeman’ preserva mejor la carga lexical que ‘calumnian’, sin resolver indebidamente la tensión entre ofensa contra personas y contra realidades sagradas.
- source_word: ὅσα μὲν οὐκ οἴδασιν
  english_pob_choice: whatever they do not understand
  chosen_spanish: todo lo que no entienden
  alternatives_spanish:
  - todo lo que no saben
  - todo aquello que no comprenden
  lexicon: BDAG
  rationale: En este contraste con el conocimiento instintivo, οἶδα apunta al comprender cognitivo. ‘No entienden’ comunica mejor esa idea en español que un simple ‘no saben’.
- source_word: φυσικῶς
  english_pob_choice: naturally
  chosen_spanish: naturalmente
  alternatives_spanish:
  - por instinto
  - instintivamente
  lexicon: BDAG
  rationale: El adverbio marca la esfera de la percepción no reflexiva en contraste con el entendimiento racional. ‘Naturalmente’ sigue de cerca el griego y evita fijar la imagen solo en ‘instinto’, aunque esa sea una alternativa válida.
- source_word: ἄλογα ζῷα
  english_pob_choice: irrational animals
  chosen_spanish: animales irracionales
  alternatives_spanish:
  - animales sin razón
  - bestias irracionales
  lexicon: BDAG
  rationale: La expresión subraya la falta de razón/logos. ‘Animales irracionales’ reproduce esa oposición con claridad y mantiene la correspondencia con el audit trail inglés.
- source_word: ἐπίστανται
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - saben
  - comprenden
  lexicon: BDAG
  rationale: El verbo describe el tipo limitado de conocimiento que poseen por naturaleza. ‘Entienden’ permite el paralelo con la primera cláusula y suena natural en español.
- source_word: ἐν τούτοις
  english_pob_choice: by these things
  chosen_spanish: por estas cosas
  alternatives_spanish:
  - en estas cosas
  - con estas cosas
  lexicon: BDAG
  rationale: La construcción puede ser instrumental o locativa. Aquí el sentido es que aquello mismo en lo que se mueven se convierte en medio de ruina; ‘por estas cosas’ recoge bien ese valor instrumental en español.
- source_word: φθείρονται
  english_pob_choice: are being destroyed / are corrupted
  chosen_spanish: son corrompidos
  alternatives_spanish:
  - son destruidos
  - se corrompen
  - quedan arruinados
  lexicon: BDAG
  rationale: φθείρω puede expresar corrupción moral y ruina efectiva. ‘Son corrompidos’ preserva la ambigüedad productiva entre corrupción y destrucción que el contexto deja abierta, sin forzar solo el matiz de juicio final ni solo el moral.
theological_decisions:
- issue: Sentido de βλασφημέω cuando el objeto no es explícitamente Dios
  english_pob_reading: Rendered as 'slander' rather than 'blaspheme'
  chosen_spanish_reading: Se traduce con ‘blasfeman’, manteniendo la gravedad religiosa y verbal del verbo griego sin limitarlo a una calumnia puramente interpersonal.
  alternative_spanish_readings:
  - calumnian
  - ultrajan
  - hablan impíamente contra
  rationale: El pasaje de Judas usa lenguaje de ofensa grave frente a lo no comprendido. En español, ‘blasfeman’ conserva la fuerza del término y deja abierta la tensión entre hablar contra personas y profanar con palabras, sin domesticar el verbo a un registro meramente legal o social.
  doctrine_reference: Principio de primacía del texto original y preservación de tensiones léxicas y teológicas.
- issue: Fuerza de φθείρονται
  english_pob_reading: 'Expressed as ongoing ruin: ''are being destroyed'' / revised to ''are corrupted'''
  chosen_spanish_reading: ‘Son corrompidos’ expresa un estado/resultante de ruina moral que también puede incluir destrucción.
  alternative_spanish_readings:
  - son destruidos
  - se corrompen
  - están siendo corrompidos
  rationale: El contexto de Judas une decadencia moral y juicio. ‘Son corrompidos’ mantiene ambas posibilidades sin cerrar el sentido en una sola dirección, preservando la tensión del pasaje.
  doctrine_reference: La traducción debe conservar el alcance semántico del juicio moral en el original sin sobreespecificarlo.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que ajustó φυσικῶς hacia ‘naturally’ y φθείρονται hacia ‘are corrupted’. La redacción española refleja esa decisión con ‘naturalmente’ y ‘son corrompidos’, manteniendo la ambigüedad moral/judicial del griego.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como norma general del proyecto, aunque no aparece en este versículo.
  - Se usa ‘blasfeman’ en lugar de ‘calumnian’ para no rebajar la fuerza lexical de βλασφημοῦσιν.
  - ‘Animales irracionales’ conserva la oposición con logos/razón que el griego enfatiza.
  - ‘Son corrompidos’ evita elegir prematuramente entre corrupción moral y destrucción final.
