revisions:
- from: Pero estos blasfeman de todo lo que no entienden[a], y todo lo que entienden naturalmente, como animales irracionales[b], por estas cosas son corrompidos[c].
  to: Pero estos calumnian todo lo que no entienden[a], y en esas mismas cosas en las que conocen naturalmente, como animales irracionales[b], se corrompen[c].
  rationale: Se cambió ‘blasfeman’ por ‘calumnian’ para seguir la decisión léxica del POB inglés y lograr un español más natural dado que el objeto no es explícitamente divino. Se reformuló la segunda mitad para que φθείρονται se exprese con voz reflexiva (‘se corrompen’), más idiomática y más cercana a la idea de autorruina moral. Se ajustaron las notas para que correspondan exactamente al texto revisado y preserven las alternativas significativas del audit trail.
