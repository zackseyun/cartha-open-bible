    rationale: Aunque léxicamente posible, el audit trail inglés justificó evitar ‘blaspheme’ por no haber objeto explícitamente divino. En español, ‘blasfemar de algo’ además suena menos natural que alternativas como ‘calumniar’ o ‘injuriar’.
  - severity: medium
    issue: ‘son corrompidos’ para φθείρονται suena demasiado pasivo
    rationale: El griego permite la idea de que por esas mismas cosas terminan arruinándose/corrompiéndose. En español, ‘se corrompen’ o ‘se arruinan’ comunica mejor esa fuerza sin perder la ambigüedad semántica.
  - severity: low
