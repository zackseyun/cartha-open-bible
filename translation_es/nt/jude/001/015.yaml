translation:
  language: es
  text: para ejecutar juicio contra todos y para declarar culpables[a] a todos los impíos, acerca de todas sus obras impías que cometieron en impiedad, y acerca de todas las palabras duras[b] que pecadores impíos hablaron contra él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «exponer» o «probar culpables». El verbo griego puede implicar sacar a luz una falta, pero aquí aparece en un contexto judicial junto con «ejecutar juicio».
    reason: lexical_alternative
  - marker: b
    text: O «cosas duras». El griego probablemente se refiere a palabras duras, desafiantes o insolentes dichas contra él.
    reason: lexical_alternative
  - marker: c
    text: «Él» se refiere contextualmente al Señor mencionado en el versículo anterior.
    reason: cross_reference
lexical_decisions:
- source_word: ποιῆσαι κρίσιν
  english_pob_choice: to execute judgment
  chosen_spanish: para ejecutar juicio
  alternatives_spanish:
  - para hacer juicio
  - para llevar a cabo juicio
  lexicon: BDAG
  rationale: La frase infinitiva expresa la realización de una acción judicial, no solo una decisión. «Ejecutar juicio» conserva el sentido formal y jurídico en español sin sonar tan extraño como una traducción literal rígida.
- source_word: κατὰ πάντων
  english_pob_choice: against all
  chosen_spanish: contra todos
  alternatives_spanish:
  - sobre todos
  - contra toda persona
  lexicon: BDAG
  rationale: Con el genitivo, κατά tiene sentido adversativo/judicial. «Contra todos» transmite bien la dirección del juicio y mantiene la concisión del griego.
- source_word: ἐλέγξαι
  english_pob_choice: to convict
  chosen_spanish: para convencer
  alternatives_spanish:
  - para exponer
  - para demostrar culpables
  - para reprochar
  lexicon: BDAG
  rationale: En contexto judicial, ἐλέγχω puede implicar exponer la culpa o dejarla establecida. «Convencer» conserva la idea de hacer patente la culpabilidad, aunque en español puede sonar menos forense que «condenar» o «declarar culpables»; se mantiene así el matiz de evidenciar culpa sin resolverlo demasiado.
- source_word: πάντας τοὺς ἀσεβεῖς
  english_pob_choice: all the ungodly
  chosen_spanish: a todos los impíos
  alternatives_spanish:
  - a todos los injustos
  - a todos los irreverentes
  - a todos los malvados
  lexicon: BDAG
  rationale: «Impíos» reproduce el campo semántico de ἀσεβής y preserva la repetición del grupo ἀσεβ- en todo el versículo. «Malvados» sería más general; «irreverentes» es posible, pero no recoge tan bien la carga religiosa del término.
- source_word: περὶ πάντων τῶν ἔργων ἀσεβείας αὐτῶν
  english_pob_choice: concerning all their ungodly deeds
  chosen_spanish: acerca de todas sus obras impías
  alternatives_spanish:
  - sobre todas sus obras de impiedad
  - acerca de todos sus hechos impíos
  - respecto de todas sus obras impías
  lexicon: BDAG
  rationale: «Obras impías» mantiene con naturalidad la relación genitiva de ἀσεβείας y deja visible el enlace léxico con «impíos/impiedad». Es más idiomático en español que «obras de impiedad», aunque esta última también sería posible.
- source_word: ὧν ἠσέβησαν
  english_pob_choice: that they committed in ungodliness
  chosen_spanish: que cometieron en impiedad
  alternatives_spanish:
  - en las que actuaron impíamente
  - que hicieron impíamente
  - que perpetraron en impiedad
  lexicon: BDAG
  rationale: El verbo cognado ἀσεβέω refuerza el motivo de la impiedad. «Cometieron en impiedad» conserva esa repetición léxica de forma clara en español y evita una paráfrasis excesiva.
- source_word: σκληρῶν
  english_pob_choice: harsh things
  chosen_spanish: cosas duras[b]
  alternatives_spanish:
  - palabras duras
  - cosas ásperas
  - expresiones duras
  lexicon: BDAG
  rationale: σκληρός literalmente significa «duro», y el contexto de habla injuriosa permite «cosas duras». Se conserva la amplitud del inglés POB, que también deja abierta la posibilidad de habla áspera o insolente.
- source_word: ἐλάλησαν κατ’ αὐτοῦ
  english_pob_choice: have spoken against him
  chosen_spanish: hablaron contra él
  alternatives_spanish:
  - han hablado contra él
  - dijeron contra él
  - hablaron en contra de él
  lexicon: BDAG
  rationale: El aoristo se vierte naturalmente con pasado simple en español. «Contra él» reproduce κατά con genitivo y mantiene el referente pronominal sin explicitarlo más allá del griego.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: él
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: BDAG
  rationale: Se conserva el pronombre porque el griego lo usa y el referente queda claro por el contexto inmediato. No se sustituye por un nombre explícito en el cuerpo del texto para no resolver innecesariamente la referencia.
- source_word: ἁμαρτωλοὶ ἀσεβεῖς
  english_pob_choice: ungodly sinners
  chosen_spanish: pecadores impíos
  alternatives_spanish:
  - impíos pecadores
  - pecadores irreverentes
  - pecadores malvados
  lexicon: BDAG
  rationale: La duplicación de calificativos es enfática. «Pecadores impíos» suena natural en español y conserva la acumulación de culpa; el orden se ajusta al español sin perder la fuerza del doble descriptor.
theological_decisions:
- issue: Sentido judicial de ἐλέγξαι en un contexto escatológico
  english_pob_reading: to convict
  chosen_spanish_reading: para convencer
  alternative_spanish_readings:
  - para declarar culpables
  - para exponer
  - para condenar
  rationale: El contexto es judicial y el verbo no significa solo reprender moralmente. «Convencer» mantiene la idea de dejar establecida la culpa y de traerla a la luz, sin adelantar más de lo que el griego dice. Se preserva así la tensión entre exposición y juicio formal.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
- issue: 'Referente de ἐλάνησαν/κατ’ αὐτοῦ: a quién se refiere «él»'
  english_pob_reading: '''Him'' refers contextually to the Lord mentioned in the previous verse.'
  chosen_spanish_reading: «él» se conserva como pronombre contextual, con referencia al Señor del versículo anterior.
  alternative_spanish_readings:
  - contra el Señor
  - contra Yahvé
  - contra Dios
  rationale: El texto griego mantiene el pronombre; por fidelidad al origen, el español también lo mantiene. La referencia queda clara por el contexto de la cita previa, pero no se expande en el texto principal para no sobreinterpretar.
  doctrine_reference: 'Translation philosophy #3: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El cotejo de revisión indica alto acuerdo y sin cambios necesarios en la base inglesa; por tanto, el borrador español sigue de cerca la lectura auditada, conservando el paralelismo judicial, la repetición de la familia léxica ἀσεβ-, y la referencia pronominal contextual.
  spanish_consistency_notes:
  - Se mantuvo Yahvé como norma project-level, pero este versículo usa un pronombre referencial; no hay necesidad de explicitar el nombre divino en el cuerpo del texto.
  - Se prefirió «impíos/impiedad» para preservar la familia léxica de ἀσεβής/ἀσέβεια/ἀσεβέω.
  - «Cosas duras» conserva la amplitud semántica de σκληρῶν y permite la nota alternativa sin forzar una sola interpretación.
  - No se sustituyó el pronombre «él» por un nombre explícito para respetar el griego y la decisión teológica del POB inglés.
