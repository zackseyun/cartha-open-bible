  text: ποιῆσαι κρίσιν κατὰ πάντων καὶ ἐλέγξαι ⸂πάντας τοὺς ἀσεβεῖς⸃ περὶ πάντων τῶν ἔργων ἀσεβείας αὐτῶν ὧν ἠσέβησαν καὶ περὶ πάντων τῶν σκληρῶν ὧν ἐλάλησαν κατ’ αὐτοῦ ἁμαρτωλοὶ ἀσεβεῖς.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/015.yaml
  text: to execute judgment against all and to convict all the ungodly concerning all their ungodly deeds that they committed in ungodliness[c][b][a], and concerning all the harsh things that ungodly sinners have spoken against him.
  footnotes:
