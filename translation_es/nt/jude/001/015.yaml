    text: '''Him'' refers contextually to the Lord mentioned in the previous verse.'
    reason: cross_reference
  - marker: c
    text: Or 'hard things.' The Greek likely refers to harsh, defiant, or insolent words spoken against him.
    reason: lexical_alternative
