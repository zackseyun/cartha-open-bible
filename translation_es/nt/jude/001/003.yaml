base_translation:
  language: en
  yaml_path: translation/nt/jude/001/003.yaml
  text: Beloved[a], although I was making every effort to write to you about our common salvation, I found it necessary to write[d][c][b], urging you to contend earnestly for the faith once for all delivered to the saints.
  footnotes:
