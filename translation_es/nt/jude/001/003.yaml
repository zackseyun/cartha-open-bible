translation:
  language: es
  text: Amados, aunque estaba haciendo todo lo posible por escribirles acerca de nuestra salvación común, vi que era necesario escribirles para exhortarlos a contender ardientemente por la fe[b] que fue entregada una vez para siempre[a] a los santos[c].[d]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «transmitida» o «entregada», destacando la transmisión de la enseñanza apostólica.
    reason: lexical_alternative
  - marker: b
    text: «La fe» aquí probablemente se refiere al cuerpo de la enseñanza cristiana confiada a los creyentes, no solo al acto personal de creer.
    reason: alternative_reading
  - marker: c
    text: «Los santos» significa el pueblo santo de Dios, es decir, los creyentes.
    reason: lexical_alternative
  - marker: d
    text: O «vi que era necesario escribirles, exhortándolos».
    reason: previous_rendering
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados míos
  lexicon: BDAG
  rationale: El vocativo plural comunica afecto pastoral. «Amados» conserva el vínculo con el campo semántico de amor y suena natural en español eclesial. Se mantiene el marcador de nota para aclarar el matiz vocativo/aﬁctivo sin forzar una equivalencia más larga.
- source_word: πᾶσαν σπουδὴν ποιούμενος
  english_pob_choice: although I was making every effort
  chosen_spanish: aunque me esforzaba mucho
  alternatives_spanish:
  - mientras ponía todo empeño
  - haciendo todo esfuerzo
  - aunque ponía todo empeño
  lexicon: BDAG
  rationale: 'La construcción participial tiene fuerza concesiva en contexto: la intención previa de escribir sobre otro tema quedó desplazada por una necesidad posterior. «Me esforzaba mucho» preserva el empeño intenso sin una calca demasiado pesada.'
- source_word: γράφειν ... γράψαι
  english_pob_choice: to write ... to write
  chosen_spanish: escribirles ... escribirles
  alternatives_spanish:
  - escribir ... escribir
  - redactarles ... escribirles
  lexicon: BDAG
  rationale: Se conserva la repetición verbal del griego para reflejar la distinción entre la acción planeada y la finalmente asumida, usando una construcción natural en español con el complemento de destinatario explícito.
- source_word: περὶ τῆς κοινῆς ἡμῶν σωτηρίας
  english_pob_choice: about our common salvation
  chosen_spanish: acerca de nuestra salvación común
  alternatives_spanish:
  - sobre la salvación que compartimos
  - acerca de la salvación común para todos nosotros
  lexicon: BDAG
  rationale: «Común» traduce bien κοινῆς como algo compartido por la comunidad. Se evita un giro que sugiera uniformidad abstracta; la frase mantiene el énfasis comunitario del original.
- source_word: ἀνάγκην ἔσχον
  english_pob_choice: I found it necessary
  chosen_spanish: tuve la necesidad
  alternatives_spanish:
  - me vi obligado
  - fue necesario para mí
  - consideré necesario
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con naturalidad en español. «Tuve la necesidad» preserva la idea de una necesidad surgida por las circunstancias sin volverla más fuerte de lo que el griego exige.
- source_word: παρακαλῶν
  english_pob_choice: urging
  chosen_spanish: exhortándolos
  alternatives_spanish:
  - rogándoles
  - animándolos
  - instándolos
  lexicon: BDAG
  rationale: En este contexto la exhortación es seria y orientada a la acción. «Exhortándolos» conserva el registro pastoral y la fuerza apelativa mejor que opciones más suaves.
- source_word: ἐπαγωνίζεσθαι
  english_pob_choice: to contend earnestly
  chosen_spanish: contender con empeño
  alternatives_spanish:
  - luchar con empeño
  - esforzarse intensamente
  - contender ardientemente
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de αγωνίζομαι. «Contender con empeño» transmite la idea de lucha/defensa activa sin sugerir necesariamente violencia física, y resulta comprensible en español contemporáneo.
- source_word: τῇ ἅπαξ παραδοθείσῃ
  english_pob_choice: the faith once for all delivered
  chosen_spanish: la fe que fue una vez entregada
  alternatives_spanish:
  - la fe entregada una vez para siempre
  - la fe que una vez fue transmitida
  lexicon: BDAG
  rationale: Se mantiene la secuencia temporal-definitiva de ἅπαξ con «una vez». «Entregada» traduce παραδοθείσῃ de manera directa; en español deja abierta la relación entre transmisión y entrega, que se aclara en la nota alternativa.
- source_word: τοῖς ἁγίοις
  english_pob_choice: to the saints
  chosen_spanish: a los santos
  alternatives_spanish:
  - a los creyentes
  - al pueblo santo de Dios
  lexicon: BDAG
  rationale: «Santos» es la equivalencia concisa y tradicional para el uso cristiano de ἅγιοι, sin introducir una glosa interpretativa en el texto principal. La nota puede precisar el referente comunitario.
theological_decisions:
- issue: Sentido de πίστις en «la fe»
  english_pob_reading: objective content of the Christian faith
  chosen_spanish_reading: la fe como contenido objetivo de la enseñanza cristiana
  alternative_spanish_readings:
  - la confianza personal de los creyentes
  - la fidelidad de los creyentes
  rationale: El contexto de «una vez entregada a los santos» apunta a un depósito de enseñanza confiado a la comunidad, no simplemente al acto subjetivo de creer. La redacción española mantiene «la fe» y la nota aclara el sentido doctrinal sin cerrarlo en una formulación denominacional.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3; Contested terms table for πίστις'
- issue: Fuerza de ἅπαξ παραδοθείσῃ
  english_pob_reading: a definitive once-for-all delivery of the faith
  chosen_spanish_reading: una entrega definitiva, hecha una vez
  alternative_spanish_readings:
  - entregada una vez para siempre
  - transmitida de una vez y para siempre
  rationale: «Una vez» conserva el valor de ἅπαξ y, en este contexto, comunica adecuadamente la irrepetibilidad del acto. La nota permite explicitar la posible resonancia de transmisión apostólica sin convertirla en paráfrasis.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
- issue: Sentido de τοῖς ἁγίοις
  english_pob_reading: God’s holy people, that is, believers
  chosen_spanish_reading: los santos como el pueblo santo de Dios, es decir, los creyentes
  alternative_spanish_readings:
  - los consagrados
  - los fieles
  rationale: En el uso cristiano primitivo, ἅγιοι designa a los miembros del pueblo de Dios. «Santos» se conserva en el texto por brevedad y tradición bíblica; la nota evita que el lector español lo entienda en sentido hagiográfico restringido.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y el expediente inglés POB. Se preserva la doble referencia a escribir y la fuerza concesiva de la primera cláusula. Se adopta la revisión inglesa que aligera la repetición innecesaria de «a ustedes», pero en español se mantiene una formulación fluida con dos complementos explícitos de destinatario sin perder precisión. También se conserva la tensión interpretativa de πίστις y παραδοθείσῃ mediante nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se conserva «fe» en el texto principal por la lectura objetiva documentada, no «fidelidad».
  - «Santos» se mantiene como término técnico bíblico; la aclaración queda en nota.
  - «Exhortando»/«exhortándolos» sigue el tono pastoral serio del verbo παρακαλέω.
  - La repetición de «escribirles» refleja el paralelismo del griego entre γράφειν y γράψαι.
