    text: Or 'handed down' for 'delivered,' emphasizing the transmission of apostolic teaching.
    reason: lexical_alternative
  - marker: b
    text: '''The faith'' here likely refers to the body of Christian teaching entrusted to believers, not merely the personal act of believing.'
    reason: alternative_reading
  - marker: c
    text: '''Saints'' means God''s holy people, that is, believers.'
    reason: lexical_alternative
  - marker: d
    text: Or 'I found it necessary to write to you, urging you'.
    reason: previous_rendering
