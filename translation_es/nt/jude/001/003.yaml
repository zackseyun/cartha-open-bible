review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: vocativo afectuoso, contraste concesivo entre la intención inicial de escribir sobre la salvación compartida y la necesidad posterior, y la exhortación a luchar por «la fe» como depósito doctrinal. Sin embargo, hay varios desajustes importantes con la evidencia fuente y con el rastro auditado del POB: (1) la nota [a] está anclada en «Amados», pero su contenido habla de «entregada/handed down»; esto es un error claro de correspondencia entre marcador y nota. (2) ἅπαξ se ha debilitado en el texto principal como «una vez» en lugar de la fuerza documentada «una vez para siempre». (3) ἀνάγκην ἔσχον como «tuve la necesidad» es comprensible, pero suena menos natural y menos fiel al matiz idiomático que «vi que era necesario» o «consideré necesario».'
  spanish_quality_summary: 'El español es mayormente claro y eclesial, pero presenta cierta rigidez: «tuve la necesidad» suena poco idiomático; «contender con empeño» es aceptable, aunque algo tieso; y la colocación de notas está mal resuelta por el error del marcador [a]. Una redacción más natural y fiel sería: «Amados, aunque estaba haciendo todo lo posible por escribirles acerca de nuestra salvación común, vi que era necesario escribirles para exhortarlos a contender ardientemente por la fe que fue entregada una vez para siempre a los santos».'
  glossary_alignment: 'La terminología clave está en general alineada: Ἀγαπητοί → «Amados», σωτηρίας → «salvación», πίστις → «la fe», ἅγιοι → «los santos». No aparecen términos del glosario mayor en conflicto. La principal divergencia terminológica es ἅπαξ, donde el proyecto documenta «once for all» y el español debería reflejarlo como «una vez para siempre». Además, la nota alternativa sobre παραδοθείσῃ debe anclarse allí, no en «Amados».'
  issues:
  - severity: high
    issue: La nota [a] está anclada al término equivocado.
    rationale: En el texto español, [a] aparece en «Amados[a]», pero la nota dice «O «entregada», destacando la transmisión de la enseñanza apostólica», que corresponde a παραδοθείσῃ, no a Ἀγαπητοί. Esto rompe la integridad del aparato de notas y debe corregirse.
  - severity: medium
    issue: «una vez entregada» debilita la fuerza de ἅπαξ documentada por el POB.
    rationale: La decisión inglesa auditada y la rationale teológica favorecen «once for all». En español, «una vez» por sí solo puede sonar meramente temporal, mientras que «una vez para siempre» preserva mejor la definitividad del depósito de la fe.
  - severity: medium
    issue: «tuve la necesidad» suena poco natural para ἀνάγκην ἔσχον.
    rationale: Aunque comunica necesidad, no es la forma más idiomática ni la mejor equivalente funcional en español. «Vi que era necesario» o «consideré necesario» refleja mejor el giro griego y mejora la legibilidad.
  - severity: low
    issue: La secuencia de notas heredada del inglés puede simplificarse o reordenarse con mayor claridad en español.
    rationale: No es obligatorio copiar la extraña secuencia [d][c][b] del inglés. En español conviene usar marcadores ordenados y anclados exactamente a las expresiones pertinentes, manteniendo las mismas informaciones relevantes.
