revisions:
- from: Amados[a], aunque me esforzaba mucho por escribirles acerca de nuestra salvación común, tuve la necesidad de escribirles[d][c][b], exhortándolos a contender con empeño por la fe que fue una vez entregada a los santos.
  to: Amados, aunque estaba haciendo todo lo posible por escribirles acerca de nuestra salvación común, vi que era necesario escribirles para exhortarlos a contender ardientemente por la fe[b] que fue entregada una vez para siempre[a] a los santos[c].[d]
  rationale: Se corrige un error grave de anclaje de nota, se fortalece ἅπαξ conforme a la decisión documentada del POB («una vez para siempre»), y se mejora la naturalidad idiomática de ἀνάγκην ἔσχον con «vi que era necesario». También se conserva el sentido exhortativo de παρακαλῶν y el valor objetivo de «la fe» con notas bien ubicadas.
