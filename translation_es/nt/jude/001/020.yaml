translation:
  language: es
  text: Pero ustedes, amados, edificándose en[a] su santísima[c] fe, orando en el Espíritu Santo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre su santísima fe». La construcción griega puede entenderse como edificar sobre un fundamento o como edificarse en relación con él.
    reason: lexical_alternative
  - marker: b
    text: O «por el Espíritu Santo». La frase puede expresar tanto la esfera de la oración como la agencia habilitadora del Espíritu.
    reason: alternative_reading
  - marker: c
    text: «Fe» también puede entenderse aquí como «fidelidad» o «confianza», aunque en Judas probablemente apunta a la fe cristiana compartida de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δέ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Pero ustedes mismos
  - Pero en cuanto a ustedes
  lexicon: BDAG
  rationale: δέ introduce contraste con los impíos del contexto anterior; ὑμεῖς añade énfasis. «Pero ustedes» conserva el contraste y la apelación directa en español natural.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  lexicon: BDAG
  rationale: Como vocativo plural, expresa afecto y peso pastoral. «Amados» mantiene esa solemnidad sin volverlo demasiado coloquial.
- source_word: ἐποικοδομοῦντες
  english_pob_choice: building ... up
  chosen_spanish: edificándose
  alternatives_spanish:
  - edificando
  - construyéndose sobre
  lexicon: BDAG
  rationale: El verbo conserva la metáfora de edificar sobre una base. En español, «edificándose» comunica la acción exhortativa y deja abierta la idea de construcción espiritual.
- source_word: ἑαυτοὺς
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - a ustedes mismos
  - a sí mismos
  lexicon: BDAG
  rationale: El reflexivo se integra de manera natural con el gerundio pronominal en español; la referencia recíproca/comunitaria queda implícita en el plural.
- source_word: τῇ ἁγιωτάτῃ ὑμῶν πίστει
  english_pob_choice: in your most holy faith
  chosen_spanish: sobre su santísima fe
  alternatives_spanish:
  - en su santísima fe
  - en su fe santísima
  lexicon: BDAG
  rationale: La dativa puede entenderse como base/fundamento u esfera. «Sobre» mantiene con claridad la imagen de edificar sobre un fundamento, como reconoce la nota inglesa, y «santísima» reproduce el superlativo.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: En Judas, el término apunta probablemente a la fe cristiana compartida. «Fe» preserva el valor lexical y doctrinal sin forzar una paráfrasis.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - bajo la guía del Espíritu Santo
  lexicon: BDAG
  rationale: La construcción se refiere más naturalmente a la Persona divina que a una disposición humana. «En el Espíritu Santo» conserva la preposición ἐν y la lectura pneumatológica ortodoxa.
- source_word: προσευχόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - orando constantemente
  - mientras oran
  lexicon: BDAG
  rationale: El participio presente coordina con el anterior y mantiene el flujo exhortativo. «Orando» es fluido en español bíblico contemporáneo y evita añadir temporalidad no explícita.
theological_decisions:
- issue: Sentido de ἐν πνεύματι ἁγίῳ
  english_pob_reading: A reference to the divine Holy Spirit
  chosen_spanish_reading: Referencia al Espíritu Santo divino
  alternative_spanish_readings:
  - en un espíritu santo humano
  - en una disposición espiritual santa
  rationale: En el contexto parenético cristiano, la frase se entiende más naturalmente del Espíritu Santo. La traducción evita reducirla a una actitud humana, pero deja la preposición «en» para no cerrar artificialmente la relación sintáctica.
  doctrine_reference: Credo Niceno (381 d. C.); principio POB de preservar tensiones teológicas y no resolverlas de antemano
- issue: Sentido de πίστις en τῇ ἁγιωτάτῃ ὑμῶν πίστει
  english_pob_reading: the believers' faith as the received Christian faith/belief
  chosen_spanish_reading: la fe de la comunidad como fe cristiana recibida
  alternative_spanish_readings:
  - su acto de confiar
  - su fidelidad
  rationale: En Judas, «la fe» apunta con probabilidad al contenido compartido de la fe cristiana. «Fe» evita sustituir el sustantivo por una explicación y conserva el posible sentido comunitario y doctrinal.
  doctrine_reference: 'Tabla de términos controvertidos: πίστις → fe; mantener alternativas cuando haya matiz textual'
- issue: Valor de la metáfora de edificación en ἐποικοδομοῦντες
  english_pob_reading: building yourselves up / building on a foundation
  chosen_spanish_reading: edificándose sobre su fe
  alternative_spanish_readings:
  - edificándose en su fe
  - edificando sobre su fe
  rationale: La nota inglesa preserva la tensión entre «edificar sobre» y «edificar en». El español «sobre» comunica mejor la imagen de fundamento sin perder la relación con la fe como esfera o base.
  doctrine_reference: Principio de equivalencia óptima con preservación de metáfora
translation_notes:
  revision_awareness: Se revisó el pasaje conforme al último pase de revisión, que indicó alto acuerdo y sin cambios requeridos; por ello se mantuvo la lectura principal con solo las alternativas léxicas y sintácticas pertinentes ya documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu Santo» con mayúsculas por referencia personal divina.
  - Se eligió «fe» en vez de «fidelidad» o «confianza» para respetar el uso lexical documentado de πίστις en Judas.
  - Se conservó la metáfora de construcción con «edificándose sobre» para reflejar la alternativa base/fundamento reconocida en la nota inglesa.
  - El registro es bíblico contemporáneo y no usa «SEÑOR» como máscara del nombre divino, aunque en este versículo no aparece el Tetragrámaton.
