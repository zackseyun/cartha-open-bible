    text: Or 'on your most holy faith.' The Greek construction can be understood as building on a foundation as well as building up in relation to it.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the Holy Spirit.' The phrase may emphasize either the sphere of prayer ('in') or the Spirit's enabling agency ('by').
    reason: alternative_reading
  - marker: c
    text: '''Faith'' could also be understood here as ''faithfulness'' or ''trust,'' though in Jude the sense likely points to the community''s shared Christian faith.'
    reason: lexical_alternative
