    rationale: El griego permite ambas lecturas, pero el rastro auditado del POB eligió «in your most holy faith» como traducción principal y reservó «on» para nota. El español debería seguir esa decisión salvo razón fuerte documentada, que aquí no se ha demostrado.
  - severity: medium
    issue: Falta la nota sobre las alternativas semánticas de «fe» (fidelidad/confianza).
    rationale: El POB inglés conservó explícitamente esta alternativa léxica en nota. Según las instrucciones, deben preservarse en español las alternativas significativas que el inglés mantuvo, especialmente cuando no crean torpeza en la meta.
  - severity: low
    issue: La nota [a] sobre «ustedes mismos» no corresponde a la nota inglesa y puede distraer del aparato auditado.
    rationale: Aunque el énfasis de ὑμεῖς está bien descrito en las decisiones léxicas, el POB inglés no puso una nota en el pronombre para este verso. Conviene no introducir una nota innecesaria cuando otras notas auditadas sí deben preservarse.
