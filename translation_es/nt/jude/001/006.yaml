translation:
  language: es
  text: Y a los ángeles que no guardaron su propio dominio[a], sino que abandonaron su propia morada[b], los ha guardado en cadenas eternas, bajo densa oscuridad[c], para el juicio del gran día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su propia posición» o «su propia autoridad» para «su propio dominio».
    reason: lexical_alternative
  - marker: b
    text: O «su propio lugar de habitación» para «su propia morada».
    reason: lexical_alternative
  - marker: c
    text: O «bajo tinieblas»; el término griego denota una oscuridad profunda.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: En este contexto de juicio y tradición judía sobre transgresión celestial, 'ángeles' es la lectura natural y coincide con la opción inglesa; 'mensajeros' no encaja bien aquí.
- source_word: τηρήσαντας / τετήρηκεν
  english_pob_choice: did not keep / he has kept
  chosen_spanish: no guardaron / los ha guardado
  alternatives_spanish:
  - no conservaron / ha conservado
  - no mantuvieron / ha mantenido
  lexicon: BDAG
  rationale: '''Guardar'' conserva la repetición verbal del griego y el contraste deliberado: ellos no guardaron lo suyo, pero él los ha guardado para juicio.'
- source_word: τὴν ἑαυτῶν ἀρχὴν
  english_pob_choice: their own domain
  chosen_spanish: su propio dominio
  alternatives_spanish:
  - su propia posición
  - su propio gobierno
  - su propio ámbito
  lexicon: BDAG
  rationale: ἀρχή puede expresar autoridad, posición o esfera. 'Dominio' mantiene la amplitud semántica sin forzar una lectura demasiado política o demasiado abstracta.
- source_word: ἀπολιπόντας
  english_pob_choice: abandoned
  chosen_spanish: abandonaron
  alternatives_spanish:
  - dejaron
  - desampararon
  - forsaron
  lexicon: BDAG
  rationale: '''Abandonaron'' comunica la fuerza culpable y deliberada del participio mejor que un simple ''dejaron''.'
- source_word: τὸ ἴδιον οἰκητήριον
  english_pob_choice: their proper dwelling
  chosen_spanish: su propia morada
  alternatives_spanish:
  - su propia vivienda
  - su propio lugar de habitación
  - su propia habitación
  lexicon: BDAG
  rationale: οἰκητήριον significa 'morada' o lugar de habitación; 'morada' suena natural y digna en español, y 'propia' refleja ἴδιον.
- source_word: εἰς κρίσιν μεγάλης ἡμέρας
  english_pob_choice: for the judgment of the great day
  chosen_spanish: para el juicio del gran día
  alternatives_spanish:
  - para el juicio del día grande
  - hasta el juicio del gran día
  lexicon: BDAG
  rationale: La preposición εἰς puede expresar finalidad/orientación. 'Para el juicio del gran día' es fiel, claro y mantiene el valor escatológico.
- source_word: δεσμοῖς ἀϊδίοις
  english_pob_choice: in eternal chains
  chosen_spanish: en cadenas eternas
  alternatives_spanish:
  - en lazos eternos
  - en cadenas perpetuas
  - con ataduras eternas
  lexicon: BDAG
  rationale: '''Cadenas'' es la manera más directa e idiomática de rendir δεσμοῖς; ''eternas'' traduce ἀΐδιοι sin añadir matices ajenos.'
- source_word: ὑπὸ ζόφον
  english_pob_choice: under gloom
  chosen_spanish: bajo oscuridad
  alternatives_spanish:
  - bajo tinieblas
  - bajo penumbra
  - bajo una oscuridad espesa
  lexicon: BDAG
  rationale: ζόφος denota oscuridad profunda, sombría o tenebrosa. En español, 'bajo oscuridad' mantiene la imagen breve del griego; la nota aclara que no se trata de oscuridad común.
- source_word: τε
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - También
  - Ahora bien
  lexicon: BDAG
  rationale: '''Y'' enlaza de manera natural este ejemplo con los anteriores sin introducir un matiz interpretativo adicional.'
theological_decisions:
- issue: Alcance de la caída angelical
  english_pob_reading: The verse is translated to state that angels failed to keep their assigned domain and abandoned their proper dwelling, without specifying beyond the Greek what that domain or dwelling precisely was.
  chosen_spanish_reading: El versículo se traduce diciendo que los ángeles no guardaron su propio dominio y abandonaron su propia morada, sin precisar más allá del griego qué eran exactamente ese dominio o esa morada.
  alternative_spanish_readings:
  - Referencia a la tradición de Génesis 6 sobre la rebelión de los ángeles
  - Referencia general a una caída primordial de los ángeles
  rationale: El texto griego no define de manera explícita el trasfondo; la traducción debe preservar esa tensión y no imponer una reconstrucción interpretativa en el cuerpo principal.
  doctrine_reference: Translation philosophy §3
- issue: Sentido de ἀΐδιος
  english_pob_reading: eternal
  chosen_spanish_reading: eternas
  alternative_spanish_readings:
  - perpetuas
  - everlasting
  - duraderas
  rationale: '''Eternas'' es la manera más clara y natural en español para expresar permanencia duradera, sin cargar el versículo con una discusión doctrinal que el texto no desarrolla.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios; esta versión sigue el texto inglés auditado y conserva la tensión léxica principal sin ampliarla interpretativamente.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - '''Ángeles'' se usa para ἀγγέλους en coherencia con el contexto de juicio celestial.'
  - '''Guardar'' reproduce la repetición verbal del griego entre τηρήσαντας y τετήρηκεν.'
  - '''Dominio'' y ''morada'' conservan la amplitud semántica sin resolver indebidamente la referencia histórica del pasaje.'
  - '''Bajo oscuridad'' refleja ζόφος con una nota aclaratoria para la imagen de tinieblas profundas.'
