  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: mantiene la repetición de τηρέω con «guardaron / ha guardado», conserva la ambigüedad deliberada de ἀρχή sin sobreinterpretarla, y traduce correctamente el propósito escatológico «para el juicio del gran día». También preserva adecuadamente «ángeles», «cadenas eternas» y la relación entre la falta de los ángeles y el juicio divino.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero hay dos puntos que conviene reparar para mejorar fidelidad y naturalidad. Primero, «bajo oscuridad» suena poco idiomático en español bíblico natural; «bajo densa oscuridad» o «bajo tinieblas» comunica mejor ζόφος sin perder concisión. Segundo, el orden de notas [c][b] del inglés no debe copiarse mecánicamente; en español basta anclar cada nota en su palabra correspondiente. Además, la alternativa de nota «su propio gobierno» para ἀρχή es menos feliz que «su propia autoridad» o «su propia esfera/posición».
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Ángeles», «juicio», «eternas» y «morada» son compatibles con el glosario y con la justificación léxica documentada. La decisión principal a ajustar es estilística y semántica en «bajo oscuridad», para representar mejor ζόφος en español natural.
  issues:
  - severity: medium
    issue: «bajo oscuridad» es poco idiomático y débil para ὑπὸ ζόφον
    rationale: Aunque intenta seguir de cerca «under gloom», en español «bajo oscuridad» suena forzado. ζόφος denota oscuridad profunda o lúgubre; «bajo densa oscuridad» preserva la imagen y mejora la legibilidad.
  - severity: low
    issue: La nota de ἀρχή usa «su propio gobierno» como alternativa
    rationale: «Gobierno» tiende a sugerir ejercicio de mando más que posición, esfera o autoridad asignada. «Su propia autoridad» o «su propia posición» representan mejor las alternativas documentadas.
  - severity: low
    issue: La nota de οἰκητήριον puede afinarse a «lugar de habitación»
    rationale: «Vivienda» es comprensible, pero algo doméstica; «lugar de habitación» o «morada» mantiene mejor el registro bíblico-digno y la amplitud del término.
