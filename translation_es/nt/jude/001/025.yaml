revisions:
- from: al único Dios, nuestro Salvador[a], por medio de Jesucristo nuestro Señor, sea la gloria, la majestad, el dominio y la autoridad, antes de todo tiempo y ahora y por todos los siglos[b]. Amén.
  to: al único Dios nuestro Salvador, por medio de Jesús el Mesías[a] nuestro Señor, sea la gloria, la majestad, el dominio y la autoridad, antes de todo tiempo y ahora y por todos los siglos[b]. Amén.
  rationale: Se revisa principalmente para ajustar Χριστός a la política terminológica del proyecto y al rastro auditado del inglés, que en este versículo exige «Mesías». Se conserva el resto de la redacción española, con leve mejora estilística en la puntuación. También se añade una nota que preserve la alternativa tradicional «Jesucristo», en paralelo con la nota inglesa.
  reviewer_model: gpt-5.4
