    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:48:13Z'
    unchanged: false
    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ in a natural, formal rendering and to match standard usage in this doxological context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: al único Dios nuestro Salvador, por medio de Jesús el Mesías[a] nuestro Señor, sea la gloria, la majestad, el dominio y la autoridad, antes de todo tiempo y ahora y por todos los siglos[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo». El griego Χριστός se traduce aquí como «Mesías» para preservar su sentido de título.'
    reason: alternative_reading
  - marker: b
    text: 'Literalmente: «antes de todo siglo ... y hacia todos los siglos». La traducción mantiene el sentido de duración sin forzar una forma más arcaica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μόνῳ θεῷ
  english_pob_choice: only God
  chosen_spanish: el único Dios
  alternatives_spanish:
  - solo Dios
  - el solo Dios
  lexicon: BDAG
  rationale: μόνῳ enfatiza exclusividad; en español, «el único Dios» expresa con naturalidad esa unicidad en un marco doxológico.
- source_word: σωτῆρι ἡμῶν
  english_pob_choice: our Savior
  chosen_spanish: nuestro Salvador
  alternatives_spanish:
  - nuestro Salvador y Libertador
  - nuestro libertador
  lexicon: BDAG
  rationale: σωτήρ en contexto teológico se traduce de manera natural como «Salvador», manteniendo el tono litúrgico y soteriológico del pasaje.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - por
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά expresa mediación; «por medio de» conserva esa mediación con claridad en español sin sonar demasiado rígido.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque Χριστός puede verterse «Mesías» en títulos, aquí la forma compuesta «Jesucristo» es el equivalente español más natural y establecido en doxologías, sin perder la referencia cristológica.
- source_word: τοῦ κυρίου ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  alternatives_spanish:
  - nuestro Dueño
  - nuestro Amo
  lexicon: BDAG
  rationale: κύριος se rinde como «Señor» en este título relacional y confesional; el genitivo funciona en aposición con «Jesucristo».
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: la gloria
  alternatives_spanish:
  - gloria
  lexicon: BDAG
  rationale: Término doxológico estándar; el artículo definido fluye bien en español dentro de la fórmula de alabanza.
- source_word: μεγαλωσύνη
  english_pob_choice: majesty
  chosen_spanish: la majestad
  alternatives_spanish:
  - la grandeza
  lexicon: BDAG
  rationale: «Majestad» reproduce el registro elevado de μεγαλωσύνη mejor que un término más general como «grandeza».
- source_word: κράτος
  english_pob_choice: dominion
  chosen_spanish: el dominio
  alternatives_spanish:
  - el poder
  - la potencia
  lexicon: BDAG
  rationale: κράτος denota fuerza soberana o poder efectivo; «dominio» distingue este matiz del siguiente término y encaja bien en la serie doxológica.
- source_word: ἐξουσία
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el poder
  - el derecho
  lexicon: BDAG
  rationale: ἐξουσία suele implicar autoridad legítima o facultad; «autoridad» preserva esa nuance mejor que repetir «poder».
- source_word: πρὸ παντὸς τοῦ αἰῶνος
  english_pob_choice: before all time
  chosen_spanish: antes de todo tiempo
  alternatives_spanish:
  - antes de toda era
  - antes de todos los siglos
  lexicon: BDAG
  rationale: La expresión apunta a una anterioridad absoluta y pretemporal; «antes de todo tiempo» comunica el sentido con claridad idiomática en español.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ahora mismo
  lexicon: BDAG
  rationale: Adverbio temporal directo, preserva el contraste temporal de la doxología.
- source_word: εἰς πάντας τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: por todos los siglos
  alternatives_spanish:
  - para siempre
  - por todas las edades
  lexicon: BDAG
  rationale: La idiomática griega expresa duración interminable; «por todos los siglos» mantiene mejor el eco bíblico y el valor semítico/helénico del plural.
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén
  lexicon: BDAG
  rationale: Se conserva la transliteración tradicional en español bíblico y litúrgico.
theological_decisions:
- issue: Mediación de Jesucristo en la doxología
  english_pob_reading: The doxology is directed to the only God our Savior, with praise offered through Jesus Messiah our Lord.
  chosen_spanish_reading: La doxología se dirige al único Dios, nuestro Salvador, y la alabanza se ofrece por medio de Jesucristo nuestro Señor.
  alternative_spanish_readings:
  - La doxología podría leerse con una unión más estrecha de la frase mediadora, pero sigue indicando mediación a través de Jesús.
  rationale: La sintaxis española mantiene la mediación de διὰ Ἰησοῦ Χριστοῦ sin desplazar el foco doxológico del único Dios; así se preservan el monoteísmo y la función mediadora de Jesús.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Traducción de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Cristo
  rationale: Aunque el proyecto inglés preserva «Messiah» por razón terminológica, en español la forma consagrada y más natural en este contexto doxológico es «Jesucristo». No se borra la identidad cristológica, y la fórmula evita una construcción menos idiomática.
  doctrine_reference: Translation philosophy §2; Contested terms table
translation_notes:
  revision_awareness: 'El borrador toma en cuenta el historial de revisiones del POB en inglés: la preferencia restaurada por «Messiah» en el texto inglés se reconoce en las decisiones léxicas, pero en español se opta por «Jesucristo» como equivalente idiomático y confesionalmente claro en esta doxología. La lectura mediadora de διὰ se mantiene explícita con «por medio de».'
  spanish_consistency_notes:
  - Se usa «Dios» y no una máscara reverencial como «SEÑOR» para θεῷ, conforme al esquema del proyecto.
  - Se mantiene «Señor» para κύριος como título cristológico.
  - 'La serie final conserva cuatro sustantivos coordinados: gloria, majestad, dominio y autoridad.'
  - 'El cierre temporal mantiene el triple movimiento: antes de todo tiempo / ahora / por todos los siglos.'
  - Se conserva el registro litúrgico con «Amén».
