id: JUD.1.25
reference: Jude 1:25
language:
  code: es
  name: Spanish
  variant: neutral Latin American
source:
  edition: SBLGNT
  text: ⸀μόνῳ θεῷ σωτῆρι ἡμῶν ⸂διὰ Ἰησοῦ Χριστοῦ τοῦ κυρίου ἡμῶν⸃ ⸀δόξα μεγαλωσύνη κράτος καὶ ἐξουσία ⸂πρὸ παντὸς τοῦ αἰῶνος⸃ καὶ νῦν καὶ εἰς πάντας τοὺς αἰῶνας· ἀμήν.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/025.yaml
  text: to the only God our Savior[a], through Jesus Messiah our Lord, be glory, majesty, dominion, and authority, before all time and now and forever[b]. Amen.
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Literally 'before every age ... unto all the ages.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
