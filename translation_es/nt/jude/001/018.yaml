translation:
  language: es
  text: 'que les decían: «En el último tiempo[a] habrá burladores[b], viviendo conforme a sus propios deseos impíos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En el tiempo final» o «Al final del tiempo». El griego está en singular, «tiempo», no «días».
    reason: lexical_alternative
  - marker: b
    text: O «escarnecedores».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: les decían
  alternatives_spanish:
  - estaban diciendo
  - decían
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción pasada reiterada o en curso. «Les decían» conserva ese valor aspectual de manera natural en español, sin volverlo un pretérito puntual.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de segunda persona plural se integra naturalmente como complemento indirecto en español. «Les» mantiene la referencia al destinatario sin cargar el texto con una fórmula más marcada.
- source_word: Ἐπ’ ἐσχάτου χρόνου
  english_pob_choice: In the last time
  chosen_spanish: En el último tiempo
  alternatives_spanish:
  - En el tiempo final
  - Al final del tiempo
  - En los últimos días
  lexicon: BDAG
  rationale: El singular χρόνος se preserva con «tiempo», no con «días». «Último» comunica la cualidad escatológica y evita importar una expresión más tradicional pero menos precisa.
- source_word: ἐμπαῖκται
  english_pob_choice: mockers
  chosen_spanish: burladores
  alternatives_spanish:
  - escarnecedores
  - sarcásticos
  lexicon: BDAG
  rationale: «Burladores» transmite la idea de ridiculizar con claridad en español moderno. «Escarnecedores» es una alternativa válida, pero más marcada y menos accesible.
- source_word: κατὰ τὰς ἑαυτῶν ἐπιθυμίας
  english_pob_choice: according to their own desires
  chosen_spanish: conforme a sus propios deseos
  alternatives_spanish:
  - según sus propios deseos
  - de acuerdo con sus propios deseos
  lexicon: BDAG
  rationale: Κατά con acusativo expresa conformidad o acuerdo. «Conforme a» reproduce bien esa relación. Se usa «deseos» en sentido amplio, no restringido a «pasiones» o «lujurias».
- source_word: πορευόμενοι
  english_pob_choice: going
  chosen_spanish: andarán
  alternatives_spanish:
  - irán
  - viven
  - se conducirán
  lexicon: BDAG
  rationale: El participio de πορεύομαι puede describir el modo de vida. «Andarán» conserva el matiz de caminar/ir como conducta continua, y funciona bien en español bíblico contemporáneo.
- source_word: τῶν ἀσεβειῶν
  english_pob_choice: ungodly
  chosen_spanish: impíos
  alternatives_spanish:
  - de impiedad
  - sin temor de Dios
  - malvados
  lexicon: BDAG
  rationale: El genitivo plural ἀσεβειῶν aporta el matiz de irreverencia o impiedad. En español, «impíos» comunica ese campo semántico de manera concisa y reconocible. Se evita «malvados» porque se aleja del matiz religioso de ἀσέβεια.
theological_decisions:
- issue: Expresión escatológica singular
  english_pob_reading: In the last time
  chosen_spanish_reading: En el último tiempo
  alternative_spanish_readings:
  - En los últimos días
  - Al final del tiempo
  rationale: Se mantiene el singular de χρόνος mediante «tiempo», sin armonizar el texto con fórmulas más conocidas de otras pasajes. Esto preserva la forma propia de la advertencia de Judas.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Carácter moral de los deseos
  english_pob_reading: ungodly desires
  chosen_spanish_reading: sus propios deseos impíos
  alternative_spanish_readings:
  - sus deseos de impiedad
  - sus deseos sin temor de Dios
  rationale: La frase se vuelve idiomática en español, pero conserva la valoración moral explícita de ἀσέβεια. No se reduce a deseos sexuales ni se neutraliza el juicio ético-religioso del texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el flujo fuente-inglés y quedó sin cambios sustantivos; esta versión española sigue de cerca el sentido auditado y conserva las dos decisiones clave del inglés POB: el imperfecto de decir y el singular de χρόνος.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque el versículo no incluye Χριστός.
  - «Impíos» se eligió como equivalente de ἀσέβεια por su fuerza religiosa y su uso estable en español bíblico.
  - Se mantuvo una sintaxis directa y publicable, sin expandir el participio más allá de lo que el griego permite.
