  text: ὁ δὲ Μιχαὴλ ὁ ἀρχάγγελος, ὅτε τῷ διαβόλῳ διακρινόμενος διελέγετο περὶ τοῦ Μωϋσέως σώματος, οὐκ ἐτόλμησεν κρίσιν ἐπενεγκεῖν βλασφημίας, ἀλλὰ εἶπεν· Ἐπιτιμήσαι σοι κύριος.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/009.yaml
  text: But Michael the archangel[a], when he was disputing with the devil and arguing about the body of Moses, did not dare to bring a slanderous judgment against him, but said[b], “May the Lord rebuke you.”
  footnotes:
  - marker: a
    text: Or, more traditionally, “did not dare to pronounce a reviling accusation against him.”
    reason: lexical_alternative
  - marker: b
    text: The wording echoes Zechariah 3:2, where the Lord rebukes Satan.
    reason: cross_reference
