translation:
  language: es
  text: 'Pero Miguel, el arcángel[a], cuando disputaba con el diablo y discutía acerca del cuerpo de Moisés, no se atrevió a emitir contra él una acusación injuriosa, sino que dijo[b]: «¡Que el Señor te reprenda!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más tradicional: «no se atrevió a pronunciar contra él una acusación injuriosa».'
    reason: lexical_alternative
  - marker: b
    text: La expresión recuerda Zacarías 3:2, donde el Señor reprende a Satanás.
    reason: cross_reference
lexical_decisions:
- source_word: ἀρχάγγελος
  english_pob_choice: archangel
  chosen_spanish: arcángel
  alternatives_spanish:
  - jefe de los ángeles
  - ángel principal
  lexicon: BDAG
  rationale: Título angélico ya establecido en español bíblico, directo y transparente. Conserva el valor titular sin añadir explicación innecesaria.
- source_word: διαβόλῳ
  english_pob_choice: the devil
  chosen_spanish: el diablo
  alternatives_spanish:
  - el acusador
  - el calumniador
  lexicon: BDAG
  rationale: Aquí διάβολος funciona como nombre del adversario personal, por lo que en español es natural y fiel decir «el diablo».
- source_word: διακρινόμενος
  english_pob_choice: was disputing
  chosen_spanish: disputaba
  alternatives_spanish:
  - contendía
  - sostenía una disputa
  lexicon: BDAG
  rationale: El participio expresa controversia o disputa en curso. «Disputaba» mantiene la idea de litigio verbal y evita volver redundante la frase con el verbo siguiente.
- source_word: διελέγετο
  english_pob_choice: arguing
  chosen_spanish: discutía
  alternatives_spanish:
  - debatía
  - hablaba
  lexicon: BDAG
  rationale: El imperfecto indica intercambio verbal continuo. «Discutía» conserva el matiz adversarial en español moderno sin sonar demasiado técnico.
- source_word: περὶ τοῦ Μωϋσέως σώματος
  english_pob_choice: about the body of Moses
  chosen_spanish: acerca del cuerpo de Moisés
  alternatives_spanish:
  - sobre el cuerpo de Moisés
  - respecto del cuerpo de Moisés
  lexicon: BDAG
  rationale: Reproduce con naturalidad la construcción preposicional y mantiene el orden formal del griego sin caer en una traducción calcada.
- source_word: οὐκ ἐτόλμησεν
  english_pob_choice: did not dare
  chosen_spanish: no se atrevió
  alternatives_spanish:
  - no osó
  - no se aventuró
  lexicon: BDAG
  rationale: «No se atrevió» expresa con claridad la fuerza de τολμάω en español actual y mantiene el sentido de abstención respetuosa o prudente.
- source_word: κρίσιν ἐπενεγκεῖν βλασφημίας
  english_pob_choice: to bring a slanderous judgment against him
  chosen_spanish: pronunciar contra él un juicio de blasfemia
  alternatives_spanish:
  - emitir contra él un juicio injurioso
  - formular contra él una acusación blasfema
  lexicon: BDAG
  rationale: La frase griega es sintácticamente difícil. Se conserva la tensión forense de κρίσις + ἐπιφέρω y el genitivo βλασφημίας sin resolverla demasiado. «Juicio de blasfemia» deja visible la ambigüedad documentada, en vez de reducirla a una sola paráfrasis interpretativa.
- source_word: Ἐπιτιμήσαι σοι κύριος
  english_pob_choice: May the Lord rebuke you
  chosen_spanish: ¡Que el Señor te reprenda!
  alternatives_spanish:
  - El Señor te reprenda
  - ¡Repréndate el Señor!
  lexicon: BDAG
  rationale: El optativo aoristo expresa deseo o invocación. «¡Que el Señor te reprenda!» comunica bien esa fuerza en español contemporáneo.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Yahvé
  - el Señor
  lexicon: BDAG
  rationale: En la fórmula citada, el uso de κύριος sigue la forma bíblica tradicional «el Señor»; en este contexto, la cita directa funciona como invocación y mantiene la resonancia intertextual. No se sustituye por Yahvé en la cita breve para no forzar la forma del eco veterotestamentario.
theological_decisions:
- issue: Naturaleza de la reserva de Miguel al dirigirse al diablo
  english_pob_reading: Michael refrains from issuing his own condemnatory denunciation and instead appeals to the Lord’s rebuke.
  chosen_spanish_reading: Miguel no emite por su propia autoridad una condena injuriosa, sino que apela a la reprensión del Señor.
  alternative_spanish_readings:
  - Miguel evita una acusación blasfema en sentido irreverente
  - Miguel se abstiene de un juicio de maldición
  rationale: 'El griego deja en tensión la naturaleza exacta de la frase, y la POB inglesa evita cerrar el debate. La redacción española preserva esa reserva: no define en exceso si se trata de blasfemia técnica, injuria o revile, pero sí deja claro el contraste entre la prudencia de Miguel y la autoridad del Señor.'
  doctrine_reference: Preservar la tensión interpretativa sin resolverla dogmáticamente.
- issue: Eco de Zacarías 3:2 en la reprensión
  english_pob_reading: The wording echoes Zechariah 3:2, where the Lord rebukes Satan.
  chosen_spanish_reading: La fórmula recuerda Zacarías 3:2, donde el Señor reprende a Satanás.
  alternative_spanish_readings:
  - La frase alude a Zacarías 3:2
  - La expresión evoca Zacarías 3:2, con una reprensión divina
  rationale: Aunque el eco no pertenece al texto base, sí forma parte del audit trail inglés. Conviene conservarlo en nota porque ayuda a leer la cita como alusión bíblica y no como una invención aislada de Judas.
  doctrine_reference: Intertextualidad bíblica explícita.
translation_notes:
  revision_awareness: La versión española sigue la revisión más reciente del inglés al conservar «el cuerpo de Moisés» con orden formal y registro elevado. También mantiene la decisión de no suavizar la frase difícil κρίσιν ἐπενεγκεῖν βλασφημίας, pero la vierte en un español publicable con una ambigüedad controlada en «juicio de blasfemia».
  spanish_consistency_notes:
  - Se usa «el diablo» para διάβολος, conforme al valor personal del término en este contexto.
  - Se mantiene «el Señor» en la cita breve de Ἐπιτιμήσαι σοι κύριος por resonancia bíblica y fluidez litúrgica en español.
  - «Arcángel» conserva el título sin explicaciones añadidas.
  - La frase «cuerpo de Moisés» sigue el orden del griego y la revisión inglesa reciente.
  - No se introduce «Cristo» ni «SEÑOR» en mayúsculas como sustitución automática; la cita refleja el eco bíblico con naturalidad española.
