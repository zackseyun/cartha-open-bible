translation:
  language: es
  text: ¡Ay de ellos![a], porque han ido por el camino de Caín, y se han lanzado[b] al error de Balaam por ganancia, y han perecido en la rebelión de Coré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y por ganancia se han lanzado al error de Balaam».'
    reason: alternative_reading
  - marker: b
    text: 'O: «se han precipitado»; el griego es más literal, «fueron derramados/vertidos», pero aquí funciona como imagen de arrojarse sin freno.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαὶ
  english_pob_choice: Woe
  chosen_spanish: ¡Ay!
  alternatives_spanish:
  - ¡Ay de ellos!
  - ¡Ay, desgracia!
  lexicon: BDAG
  rationale: El griego expresa una exclamación profética de juicio. En español, «¡Ay!» conserva la fuerza de denuncia sin volver el registro artificial; se completa con «de ellos» para hacer explícito el referente que el contexto ya señala.
- source_word: τῇ ὁδῷ τοῦ Κάϊν
  english_pob_choice: in the way of Cain
  chosen_spanish: en el camino de Caín
  alternatives_spanish:
  - en la senda de Caín
  - en la vía de Caín
  lexicon: BDAG
  rationale: ὁδός mantiene la imagen de un curso de conducta. «Camino» es el equivalente español más natural y conserva la alusión moral y bíblica a un modo de vivir, no solo a un trayecto físico.
- source_word: ἐπορεύθησαν
  english_pob_choice: have gone
  chosen_spanish: han andado
  alternatives_spanish:
  - han ido
  - han seguido
  lexicon: BDAG
  rationale: El verbo en este contexto es metafórico y acompaña a «camino». «Han andado» conserva la imagen de conducta sostenida mejor que un simple «han ido».
- source_word: τῇ πλάνῃ τοῦ Βαλαὰμ
  english_pob_choice: into Balaam’s error
  chosen_spanish: en el error de Balaam
  alternatives_spanish:
  - en el engaño de Balaam
  - en la desviación de Balaam
  lexicon: BDAG
  rationale: πλάνη puede abarcar error, engaño o extravío. Aquí la referencia moral es clara y «error» es suficientemente directo y sobrio en español; se mantiene la estructura con «en» para no forzar una lectura más interpretativa que el griego.
- source_word: μισθοῦ
  english_pob_choice: for pay
  chosen_spanish: por ganancia
  alternatives_spanish:
  - por paga
  - por salario
  - por lucro
  lexicon: BDAG
  rationale: μισθός significa compensación o paga. En esta cláusula el matiz es mercenario; «por ganancia» comunica bien la motivación interesada y evita sonar demasiado técnico o demasiado estrecho. La alternativa «por paga» se conserva como posibilidad más literal.
- source_word: ἐξεχύθησαν
  english_pob_choice: have rushed headlong
  chosen_spanish: se han lanzado
  alternatives_spanish:
  - se han precipitado
  - se han desbordado
  lexicon: BDAG
  rationale: El verbo es literalmente «fueron derramados/vertidos», pero el contexto pide una imagen de abandono impulsivo. «Se han lanzado» preserva el dinamismo y la idea de arrojarse sin cuidado, sin perder por completo la intensidad figurada.
- source_word: τῇ ἀντιλογίᾳ τοῦ Κόρε
  english_pob_choice: in Korah’s rebellion
  chosen_spanish: en la rebelión de Coré
  alternatives_spanish:
  - en la oposición de Coré
  - en la contradicción de Coré
  - en la rebelión de Coré
  lexicon: BDAG
  rationale: ἀντιλογία puede ser oposición, contradicción o rebelión. Dado el eco de Números 16, «rebelión» expresa mejor el episodio concreto y su carga teológica en español.
- source_word: ἀπώλοντο
  english_pob_choice: have perished
  chosen_spanish: han perecido
  alternatives_spanish:
  - han sido destruidos
  - han quedado perdidos
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí indica perecer o ser destruido. «Han perecido» conserva el tono solemne y el resultado consumado sin especificar de más el modo de la destrucción.
- source_word: Κάϊν
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Caín
  lexicon: BDAG
  rationale: Transliteración estándar en español para el nombre bíblico.
- source_word: Βαλαὰμ
  english_pob_choice: Balaam
  chosen_spanish: Balaam
  alternatives_spanish:
  - Balaán
  lexicon: BDAG
  rationale: Nombre propio bíblico de uso común en español.
- source_word: Κόρε
  english_pob_choice: Korah
  chosen_spanish: Coré
  alternatives_spanish:
  - Korah
  lexicon: BDAG
  rationale: Transliteración bíblica estándar en español para el nombre del personaje de Números 16.
theological_decisions:
- issue: Cómo preservar la fuerza de juicio en οὐαὶ αὐτοῖς sin volverlo excesivamente eclesiástico o suavizado
  english_pob_reading: Woe to them
  chosen_spanish_reading: ¡Ay de ellos!
  alternative_spanish_readings:
  - ¡Ay!
  - ¡Desgracia para ellos!
  rationale: La exclamación profética anuncia juicio, no mera tristeza. «¡Ay de ellos!» mantiene esa intensidad y hace explícito el destinatario, como en el inglés POB.
  doctrine_reference: Pronunciamiento profético de juicio
- issue: Cómo tratar la frase compacta y figurada τῇ πλάνῃ τοῦ Βαλαὰμ μισθοῦ ἐξεχύθησαν
  english_pob_reading: have rushed headlong into Balaam’s error for pay
  chosen_spanish_reading: se han lanzado por ganancia en el error de Balaam
  alternative_spanish_readings:
  - se han precipitado por ganancia en el error de Balaam
  - se han dejado arrastrar por ganancia al error de Balaam
  rationale: El griego combina una imagen de derramamiento/impulso con una motivación mercenaria. «Se han lanzado» conserva el movimiento vehemente; «por ganancia» expresa μισθοῦ sin neutralizar el motivo. Se mantiene «error» para no resolver la tensión semántica de πλάνη en una sola paráfrasis.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión léxica y teológica'
- issue: Cómo traducir τῇ ἀντιλογίᾳ τοῦ Κόρε a la luz de Números 16
  english_pob_reading: Korah’s rebellion
  chosen_spanish_reading: la rebelión de Coré
  alternative_spanish_readings:
  - la oposición de Coré
  - la contradicción de Coré
  rationale: Aunque ἀντιλογία puede significar «oposición» o «contradicción», el trasfondo narrativo de Números 16 apunta claramente a una rebelión contra la autoridad establecida. «Rebelión» comunica esa referencia bíblica y su gravedad doctrinal.
  doctrine_reference: Números 16; rebelión contra la autoridad de Dios
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del audit trail al preferir un verbo dinámico para ἐξεχύθησαν y mantener el paralelismo de las tres cláusulas. A la vez, conserva la tensión figurada del griego donde el inglés POB la resuelve parcialmente con «rushed headlong». Se optó por un español publicable que no aplana πλάνη ni ἀντιλογία en términos demasiado interpretativos.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantuvo «Caín», «Balaam» y «Coré» como transliteraciones bíblicas estándar en español.
  - «Error» para πλάνη preserva la amplitud semántica sin convertirla en un término doctrinal más estrecho.
  - «Rebelión» para ἀντιλογία refleja el trasfondo de Números 16 y la elección auditada del inglés POB.
  - La puntuación en español conserva las tres cláusulas coordinadas y el tono de denuncia profética.
