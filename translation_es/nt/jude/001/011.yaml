revisions:
- from: ¡Ay de ellos[a], porque han andado en el camino de Caín, y se han lanzado[b] por ganancia en el error de Balaam, y han perecido en la rebelión de Coré.
  to: ¡Ay de ellos![a], porque han ido por el camino de Caín, y se han lanzado[b] al error de Balaam por ganancia, y han perecido en la rebelión de Coré.
  rationale: Se ajustó el español para seguir mejor la decisión auditada final («han ido»), mejorar la naturalidad de la cláusula de Balaam («al error»), y corregir el alcance de la nota alternativa para que corresponda exactamente a la alternativa preservada por el POB inglés. Se mantuvo «se han lanzado» como texto principal, con la imagen más literal explicada en nota, y se conservó la estructura solemne del versículo.
