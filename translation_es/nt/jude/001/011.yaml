review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura triple de juicio y las alusiones a Caín, Balaam y Coré. Sin embargo, presenta dos desajustes con la auditoría inglesa y con la sintaxis del pasaje: ἐπορεύθησαν fue revisado en inglés a ''have gone'', por lo que «han andado» no es incorrecto pero ya no sigue la decisión auditada final; y la nota [a] actual mezcla toda la cláusula, cuando la única alternativa documentada en inglés corresponde a la colocación de μισθοῦ (''por ganancia/por lucro'') con ἐξεχύθησαν. Además, en español suena más natural «al error de Balaam» que «en el error de Balaam» después de «se han lanzado».'
  spanish_quality_summary: El texto es claro y digno, pero requiere una reparación menor de naturalidad y de anclaje de notas. «Se han lanzado por ganancia en el error de Balaam» resulta algo rígido; «se han lanzado al error de Balaam por ganancia» fluye mejor y refleja mejor el movimiento hacia el error. El resto del versículo es legible y de buen registro.
  glossary_alignment: No hay términos del glosario mayor en conflicto. Los nombres Caín, Balaam y Coré están bien en español. «¡Ay de ellos!» preserva οὐαί adecuadamente. «Rebelión» para ἀντιλογία y «han perecido» para ἀπώλοντο están bien alineados con la rationale documentada.
  issues:
  - severity: medium
    issue: La nota [a] no preserva fielmente la alternativa documentada en el POB inglés.
    rationale: 'La nota inglesa solo conserva la alternativa de orden/sintaxis: «and for profit they rushed headlong into Balaam’s error». La nota española actual empieza en «¡Ay de ellos...» y convierte en alternativa una porción mayor del versículo, lo que distorsiona el alcance de la variante.'
  - severity: low
    issue: «Han andado» no sigue la revisión auditada final a «have gone».
    rationale: Aunque «han andado» es semánticamente defendible, la pista auditada final cambió a una forma más simple. «Han ido» o «han seguido» evitarían alejarse de la decisión final; «han ido por el camino de Caín» conserva la imagen sin dureza.
  - severity: low
    issue: La preposición en la cláusula de Balaam suena menos natural en español.
    rationale: Después de «se han lanzado», lo más idiomático es «al error de Balaam», no «en el error de Balaam». Esto además refleja mejor el movimiento implícito reconocido en la auditoría inglesa.
  revised_spanish_text: ¡Ay de ellos![a], porque han ido por el camino de Caín, y se han lanzado[b] al error de Balaam por ganancia, y han perecido en la rebelión de Coré.
  revised_footnotes:
