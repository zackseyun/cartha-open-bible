    text: 'O: «y por ganancia se han lanzado al error de Balaam».'
    reason: alternative_reading
  - marker: b
    text: 'O: «se han precipitado»; el griego es más literal, «fueron derramados/vertidos», pero aquí funciona como imagen de arrojarse sin freno.'
    reason: lexical_alternative
  revision_rationale: Se ajustó el español para seguir mejor la decisión auditada final («han ido»), mejorar la naturalidad de la cláusula de Balaam («al error»), y corregir el alcance de la nota alternativa para que corresponda exactamente a la alternativa preservada por el POB inglés. Se mantuvo «se han lanzado» como texto principal, con la imagen más literal explicada en nota, y se conservó la estructura solemne del versículo.
