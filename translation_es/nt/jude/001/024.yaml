    rationale: El griego dice ἐν ἀγαλλιάσει, y el rastro POB inglés eligió «with rejoicing» precisamente para evitar añadir «great». En español, «con regocijo» o «con alegría» preserva mejor el sustantivo sin expansión.
  - severity: low
