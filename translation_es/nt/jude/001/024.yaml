translation:
  language: es
  text: Y ahora, al que puede guardarlos sin que tropiecen, y presentarlos sin mancha delante de su gloria con regocijo[c][b][a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin caer». El griego ἀπταίστους puede expresar la idea de no tropezar o no caer.'
    reason: lexical_alternative
  - marker: b
    text: La frase griega dice literalmente «delante de su gloria». La versión tradicional «ante su gloriosa presencia» amplía el sentido de δόξα.
    reason: alternative_reading
  - marker: c
    text: 'O: «sin defecto» o «irreprochables». El griego ἀμώμους puede evocar la idea de una ofrenda sin mancha.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τῷ δὲ δυναμένῳ
  english_pob_choice: Now to the one who is able
  chosen_spanish: Y al que puede
  alternatives_spanish:
  - Ahora, al que puede
  - Y al que es capaz
  lexicon: BDAG
  rationale: El dativo articular con participio funciona como introducción doxológica. En español, «al que puede» conserva la referencia a la persona capaz y mantiene el tono de alabanza sin sobrecargar la frase. «Y» refleja δέ como transición suave, no como contraste fuerte.
- source_word: φυλάξαι
  english_pob_choice: to keep
  chosen_spanish: guardarlos sin que tropiecen
  alternatives_spanish:
  - guardarlos
  - preservarlos
  - mantenerlos sin tropezar
  lexicon: BDAG
  rationale: φυλάσσω aquí implica guardar/proteger. Se eligió una construcción natural en español que conserva la imagen de protección y el resultado negativo de ἀπταίστους. «Sin que tropiecen» preserva el sentido de no tropezar/no caer sin volverlo meramente abstracto.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - los
  - a ustedes
  lexicon: BDAG
  rationale: El objeto directo plural se expresa con «los» en una construcción enclítica implícita, manteniendo fluidez española. El referente plural queda claro en el contexto y evita una repetición pesada de «a ustedes».
- source_word: ἀπταίστους
  english_pob_choice: from stumbling
  chosen_spanish: sin que tropiecen
  alternatives_spanish:
  - sin caer
  - sin tropezar
  - sin fallar
  lexicon: BDAG
  rationale: El adjetivo tiene la idea de no tropezar o no caer. En español, después de «guardar», la formulación natural es «sin que tropiecen». Esta opción conserva la metáfora de la marcha y no la reduce solo a inocencia jurídica.
- source_word: καὶ στῆσαι
  english_pob_choice: and to present
  chosen_spanish: y presentarlos
  alternatives_spanish:
  - y hacerlos estar en pie
  - y hacerlos permanecer de pie
  - y colocarlos
  lexicon: BDAG
  rationale: ἵστημι literalmente es hacer poner en pie. «Presentarlos» reproduce bien la función cultual/judicial de introducir a alguien ante una autoridad o presencia exaltada, sin perder solemnidad. La alternativa literal sería más pesada en español.
- source_word: κατενώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - ante
  - en presencia de
  lexicon: BDAG
  rationale: La preposición expresa estar frente a/en presencia de. «Delante de» es claro y elevado en español moderno, y encaja con la construcción de presentación.
- source_word: τῆς δόξης αὐτοῦ
  english_pob_choice: his glory
  chosen_spanish: su gloria
  alternatives_spanish:
  - su gloriosa presencia
  - la gloria de él
  lexicon: BDAG
  rationale: Se conserva «gloria» porque el griego dice δόξα y la auditableidad exige no expandirlo a «presencia». El posesivo «su» mantiene la relación textual sin introducir glosa interpretativa.
- source_word: ἀμώμους
  english_pob_choice: blameless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - irreprochables
  - sin defecto
  - blameless
  lexicon: BDAG
  rationale: El término puede evocar pureza sacrificial y falta de defecto. «Sin mancha» mantiene mejor la resonancia cultual y bíblica en español, sin perder la idea moral de integridad. Se evita «irreprochables» por sonar más jurídico que cultual.
- source_word: ἐν ἀγαλλιάσει
  english_pob_choice: with rejoicing
  chosen_spanish: con gran alegría
  alternatives_spanish:
  - con regocijo
  - en exultación
  lexicon: BDAG
  rationale: ἀγαλλίασις expresa alegría exultante. «Con gran alegría» es natural y digno en español, y comunica el matiz intensificado sin volverlo técnico. Aunque «gran» no está explícito como adjetivo, traduce adecuadamente la fuerza léxica del sustantivo.
theological_decisions:
- issue: Cómo traducir τῆς δόξης αὐτοῦ sin importar la frase tradicional «su gloriosa presencia»
  english_pob_reading: his glory
  chosen_spanish_reading: su gloria
  alternative_spanish_readings:
  - su gloriosa presencia
  rationale: El texto griego nombra la «gloria» de Dios, no usa παρουσία ni una expresión equivalente a «presencia gloriosa». Mantener «su gloria» preserva la tensión entre lenguaje doxológico y posible referencia a la manifestación de Dios, sin resolverla por expansión interpretativa.
  doctrine_reference: Translation philosophy §1
- issue: 'Cómo entender ἀπταίστους: preservación moral continua o perseverancia final'
  english_pob_reading: from stumbling
  chosen_spanish_reading: sin que tropiecen
  alternative_spanish_readings:
  - sin caer
  - sin apostatar
  rationale: La imagen básica es la de no tropezar. «Sin que tropiecen» mantiene la metáfora y deja abierta la cuestión doctrinal de si el énfasis es la preservación diaria, la perseverancia final o ambas. La traducción no debe cerrar esa tensión.
  doctrine_reference: Translation philosophy §3
- issue: Cómo reflejar ἀμώμους entre lo sacrificial y lo moral
  english_pob_reading: blameless
  chosen_spanish_reading: sin mancha
  alternative_spanish_readings:
  - sin defecto
  - irreprochables
  rationale: El término puede aludir tanto a un estado sin defecto como a pureza moral. «Sin mancha» conserva el trasfondo de ofrenda intachable y comunica adecuadamente la integridad esperada ante Dios.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se aplicaron cambios posteriores y el control cruzado informó alto acuerdo (1.0). Esta versión mantiene la preferencia por equivalencia óptima, evitando tanto el calco rígido como la ampliación interpretativa no sustentada.'
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα, en línea con el criterio de no sustituirlo por «presencia» sin base textual.
  - Se usó una solución idiomática para ἀπταίστους que conserva la metáfora del tropiezo.
  - «Sin mancha» se eligió por su resonancia bíblica/cultual y por compatibilidad con un registro litúrgico moderno.
  - El tono general es doxológico y fluido, con puntuación española estándar y sin arcaísmos innecesarios.
