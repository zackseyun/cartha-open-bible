  to: Estos son escollos ocultos en sus ágapes[a], participando juntos del banquete sin temor, apacentándose a sí mismos[b]; nubes sin agua, llevadas por los vientos; árboles de otoño, sin fruto, dos veces muertos, desarraigados.
  rationale: Se corrige la nota textual para que refleje de verdad las alternativas preservadas por el POB para σπιλάδες, y se mejora la naturalidad de συνευωχούμενοι en español con «participando juntos del banquete», sin perder el matiz de comida compartida ni añadir contenido ajeno al griego. El resto del versículo puede mantenerse.
