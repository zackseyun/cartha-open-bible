translation:
  language: es
  text: Estos son escollos ocultos en sus ágapes[a], participando juntos del banquete sin temor, apacentándose a sí mismos[b]; nubes sin agua, llevadas por los vientos; árboles de otoño, sin fruto, dos veces muertos, desarraigados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manchas» o «mancillas» en sus ágapes. El término griego puede entenderse moralmente, pero en la cadena de imágenes de Judas encaja mejor la idea de peligros ocultos.
    reason: alternative_reading
  - marker: b
    text: También puede traducirse «alimentándose a sí mismos», destacando su conducta egoísta.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπιλάδες
  english_pob_choice: hidden reefs
  chosen_spanish: escollos ocultos
  alternatives_spanish:
  - arrecifes ocultos
  - rocas ocultas
  - manchas
  lexicon: BDAG
  rationale: El griego puede referirse a peñascos o arrecifes peligrosos, y en el flujo de metáforas de Judas encaja mejor la imagen de un peligro oculto que la de un defecto moral. «Escollos ocultos» conserva la idea de obstáculo submarino o peligro encubierto sin forzar un tecnicismo náutico demasiado marcado.
- source_word: ἀγάπαις
  english_pob_choice: love feasts
  chosen_spanish: ágapes
  alternatives_spanish:
  - banquetes de amor
  - comidas de fraternidad
  - comidas de comunión
  lexicon: BDAG
  rationale: «Ágapes» es el término ya asentado en español para las comidas comunitarias cristianas de este tipo, y mantiene la conexión léxica con ἀγάπη. Otras opciones explicitan más el sentido, pero pierden la brevedad y el valor terminológico del sustantivo plural.
- source_word: συνευωχούμενοι
  english_pob_choice: feasting together
  chosen_spanish: que banquetean juntos
  alternatives_spanish:
  - que participan juntos del banquete
  - que comen con ustedes
  - que festejan juntos
  lexicon: BDAG
  rationale: El participio expresa compartir un banquete; «banquetean juntos» es natural en español y conserva el matiz de participación común en la comida sin introducir explícitamente un complemento que el griego no tiene.
- source_word: ἀφόβως
  english_pob_choice: without fear
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - sin reverencia
  - desvergonzadamente
  lexicon: BDAG
  rationale: «Sin temor» preserva la ambigüedad entre descaro e irreverencia que admite el adverbio. «Desvergonzadamente» interpreta con más fuerza, pero estrecha el sentido.
- source_word: ἑαυτοὺς ποιμαίνοντες
  english_pob_choice: shepherding themselves
  chosen_spanish: apacentándose a sí mismos
  alternatives_spanish:
  - pastoreándose a sí mismos
  - alimentándose a sí mismos
  - cuidándose a sí mismos
  lexicon: BDAG
  rationale: Se conserva la metáfora pastoral de ποιμαίνω con un español natural. «Apacentándose» mantiene la imagen de pastoreo/alimentación sin reducirla solo a comer, como ocurre con «alimentándose».
- source_word: νεφέλαι ἄνυδροι
  english_pob_choice: waterless clouds
  chosen_spanish: nubes sin agua
  alternatives_spanish:
  - nubes estériles
  - nubes sin lluvia
  - nubes secas
  lexicon: BDAG
  rationale: «Nubes sin agua» sigue de cerca el griego y mantiene la imagen concreta de promesa sin provisión.
- source_word: παραφερόμεναι
  english_pob_choice: carried along
  chosen_spanish: llevadas por los vientos
  alternatives_spanish:
  - arrastradas por los vientos
  - empujadas por los vientos
  - impulsadas por los vientos
  lexicon: BDAG
  rationale: La pasiva expresa que son conducidas por una fuerza externa. «Llevadas por los vientos» es idiomático en español y reproduce la imagen sin exagerar la violencia del movimiento.
- source_word: φθινοπωρινὰ
  english_pob_choice: autumn trees
  chosen_spanish: árboles de otoño
  alternatives_spanish:
  - árboles otoñales
  - árboles en otoño
  - árboles de la estación otoñal
  lexicon: BDAG
  rationale: La referencia temporal al otoño se conserva de forma clara. «Árboles de otoño» es breve y mantiene la fuerza visual del cuadro.
- source_word: ἄκαρπα
  english_pob_choice: without fruit
  chosen_spanish: sin fruto
  alternatives_spanish:
  - estériles
  - infructuosos
  - sin dar fruto
  lexicon: BDAG
  rationale: «Sin fruto» conserva la concreción de la imagen agrícola y evita abstraer el adjetivo en exceso.
- source_word: δὶς ἀποθανόντα
  english_pob_choice: twice dead
  chosen_spanish: dos veces muertos
  alternatives_spanish:
  - muertos dos veces
  - completamente muertos
  - muertos por segunda vez
  lexicon: BDAG
  rationale: La expresión es retóricamente fuerte y debe conservarse casi literalmente. «Dos veces muertos» es la forma más directa y natural en español.
- source_word: ἐκριζωθέντα
  english_pob_choice: uprooted
  chosen_spanish: desarraigados
  alternatives_spanish:
  - arrancados de raíz
  - desenraizados
  - arrancados
  lexicon: BDAG
  rationale: El participio comunica ser quitados de raíz; «desarraigados» es conciso y suficientemente vívido en español. «Arrancados de raíz» sería más explícito, pero algo más pesado.
theological_decisions:
- issue: Sentido de σπιλάδες aplicado a los falsos maestros
  english_pob_reading: dangerous hidden reefs within the community's shared meals
  chosen_spanish_reading: escollos ocultos en los ágapes de la comunidad
  alternative_spanish_readings:
  - manchas o blemas en sus ágapes
  - rocas peligrosas en sus ágapes
  rationale: La secuencia de imágenes de Judas favorece la idea de un peligro escondido entre los creyentes. «Escollos ocultos» conserva el valor amenazante de la metáfora sin perder la posibilidad de una lectura moral secundaria que el texto no excluye por completo.
  doctrine_reference: Principios de traducción POB §1, §3
- issue: Retención de la metáfora pastoral en ἑαυτοὺς ποιμαίνοντες
  english_pob_reading: retained the shepherd metaphor rather than reducing it to mere eating
  chosen_spanish_reading: apacentándose a sí mismos
  alternative_spanish_readings:
  - alimentándose a sí mismos
  - cuidándose a sí mismos
  rationale: El verbo ποιμαίνω es literalmente pastoril; la traducción debe conservar esa imagen porque sugiere liderazgo y auto-interés, no solo consumo. Esto mantiene también el eco de Ezequiel 34 sobre pastores que se apacientan a sí mismos.
  doctrine_reference: Principios de traducción POB §1, §5
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de SBLGNT y el auditorio inglés de POB. Se incorporó la decisión revisada de no añadir un complemento explícito como «con ustedes» en συνευωχούμενοι, porque no aparece en el griego; por eso se prefirió una formulación impersonal en español («que banquetean juntos»). También se conservó la tensión interpretativa de σπιλάδες mediante una nota alternativa, en vez de reducirla a una sola lectura moral.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - «Ágapes» se usa como término técnico coherente con el uso eclesial y con el plural del griego.
  - Se prefirió «sin temor» para ἀφόβως por ser menos interpretativo que «desvergonzadamente».
  - La cadena de participios se resolvió con puntuación semicolonial para conservar la acumulación retórica del original.
