source:
  edition: SBLGNT
  text: οὗτοί εἰσιν ⸀οἱ ἐν ταῖς ἀγάπαις ὑμῶν σπιλάδες συνευωχούμενοι, ἀφόβως ἑαυτοὺς ποιμαίνοντες, νεφέλαι ἄνυδροι ὑπὸ ἀνέμων παραφερόμεναι, δένδρα φθινοπωρινὰ ἄκαρπα δὶς ἀποθανόντα ἐκριζωθέντα,
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/012.yaml
  text: These are hidden reefs at your love feasts[a], feasting together without fear, shepherding themselves; waterless clouds carried along by winds; autumn trees without fruit, twice dead[c][b], uprooted.
  footnotes:
  - marker: a
    text: Or 'blemishes' or 'stains' at your love feasts.' The Greek word may be understood morally, but it can also denote dangerous hidden reefs; the latter best fits Jude's sequence of vivid metaphors.
    reason: alternative_reading
  - marker: b
    text: '''Shepherding themselves'' may also be rendered ''feeding themselves,'' highlighting their self-serving conduct.'
    reason: lexical_alternative
  - marker: c
    text: Compare Ezekiel 34 for the image of leaders who feed themselves instead of the flock.
    reason: cross_reference
