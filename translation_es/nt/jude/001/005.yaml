revisions:
- from: Ahora quiero recordarles[a], aunque ustedes saben todas las cosas una vez para siempre, que Jesús, habiendo salvado a un pueblo de la tierra de Egipto, después destruyó a los que no creyeron.
  to: Ahora quiero hacerles recordar[a], aunque ustedes saben todo de una vez para siempre, que Jesús, habiendo salvado a un pueblo de la tierra de Egipto, después destruyó a los que no creyeron.
  rationale: Se ajusta «recordarles» a «hacerles recordar» para reflejar mejor el sentido causativo de ὑπομνῆσαι ὑμᾶς en español natural. Se cambia «todas las cosas» por «todo» para evitar una calca poco idiomática, manteniendo el valor amplio de πάντα en el contexto. Se conserva «Jesús» en el texto principal y la nota de variante textual, de acuerdo con la evidencia griega y la decisión teológica documentada.
