review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: voluntad de recordar, concesión de conocimiento previo, sujeto cristológico «Jesús», salvación desde Egipto y juicio posterior sobre los incrédulos. También preserva correctamente la variante textual en nota. Sin embargo, dos decisiones requieren ajuste para mayor fidelidad y naturalidad: «recordarles» en español tiende a significar ‘recordar algo para ustedes’ más que ‘hacerles recordar’; y «todas las cosas» suena excesivamente literal y poco idiomático para πάντα en este contexto exhortativo.'
  spanish_quality_summary: El español es claro y comprensible, pero presenta cierta rigidez calca en «todas las cosas» y una formulación menos natural en «recordarles». Una redacción más idiomática y digna sería «hacerles recordar» o, mejor, «recordarles esto», pero como el POB inglés auditado decidió mantener «all things», conviene evitar reducir demasiado el alcance semántico. La mejor reparación menor es usar «hacerles recordar» y suavizar «todas las cosas» a «todo», que en español expresa amplitud sin sonar forzado.
  glossary_alignment: 'Alinea bien con la terminología del proyecto en los puntos relevantes: «Jesús» para Ἰησοῦς, «Dios/Señor» solo en nota para la variante, y lenguaje sobrio para juicio y fe. No hay conflicto con los glosarios principales. El ajuste propuesto no afecta terminología doctrinal, solo fidelidad idiomática al español.'
  issues:
  - severity: medium
    issue: «recordarles» no expresa con precisión el valor de Ὑπομνῆσαι ὑμᾶς
    rationale: En español, «recordarles» puede entenderse como ‘recordar algo perteneciente a ustedes’ o quedar ambiguo sin complemento directo explícito. El griego significa ‘hacerles recordar / traer a su memoria’. Conviene una formulación más precisa y natural.
  - severity: medium
    issue: «todas las cosas» es una calca poco natural para πάντα en este contexto
    rationale: Aunque el inglés auditado retuvo «all things», en español bíblico natural «saben todo» comunica mejor el alcance general sin la rigidez de «todas las cosas». Mantiene la amplitud semántica sin sonar artificial.
  revised_spanish_text: Ahora quiero hacerles recordar[a], aunque ustedes saben todo de una vez para siempre, que Jesús, habiendo salvado a un pueblo de la tierra de Egipto, después destruyó a los que no creyeron.
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Señor» o «Dios» en lugar de «Jesús».
    reason: textual_variant
  revision_rationale: Se ajusta «recordarles» a «hacerles recordar» para reflejar mejor el sentido causativo de ὑπομνῆσαι ὑμᾶς en español natural. Se cambia «todas las cosas» por «todo» para evitar una calca poco idiomática, manteniendo el valor amplio de πάντα en el contexto. Se conserva «Jesús» en el texto principal y la nota de variante textual, de acuerdo con la evidencia griega y la decisión teológica documentada.
