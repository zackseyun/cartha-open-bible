translation:
  language: es
  text: Ahora quiero hacerles recordar[a], aunque ustedes saben todo de una vez para siempre, que Jesús, habiendo salvado a un pueblo de la tierra de Egipto, después destruyó a los que no creyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Señor» o «Dios» en lugar de «Jesús».
    reason: textual_variant
lexical_decisions:
- source_word: Ὑπομνῆσαι
  english_pob_choice: to remind
  chosen_spanish: recordarles
  alternatives_spanish:
  - recordarles de nuevo
  - hacerles recordar
  lexicon: BDAG
  rationale: El infinitivo aoristo con βούλομαι expresa la intención de traer a la memoria lo ya sabido. En español, 'recordarles' comunica esa acción de forma natural y fiel, sin añadir repetición innecesaria.
- source_word: βούλομαι
  english_pob_choice: I want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - tengo la intención de
  lexicon: BDAG
  rationale: La primera persona de voluntad se expresa con naturalidad mediante 'quiero'. Mantiene el tono directo del texto y evita una formulación más fría o técnica.
- source_word: εἰδότας ὑμᾶς ἅπαξ πάντα
  english_pob_choice: though you know all things once for all
  chosen_spanish: aunque ustedes saben todas las cosas una vez para siempre
  alternatives_spanish:
  - aunque ustedes ya saben todo de una vez para siempre
  - puesto que ustedes saben todas las cosas una vez para siempre
  lexicon: BDAG
  rationale: Conservo la relación concesiva con 'aunque' y traduzco πάντα de manera amplia como 'todas las cosas', siguiendo el ajuste revisado del POB inglés. 'Una vez para siempre' refleja ἅπαξ con el valor de conocimiento plenamente poseído, no mera reiteración temporal.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - el Señor
  - Dios
  lexicon: NA28/SBLGNT textual tradition; BDAG
  rationale: El texto griego dado lee Ἰησοῦς, por lo que la traducción debe conservar 'Jesús' y no suavizar la afirmación cristológica. Así se mantiene la fuerza del testimonio textual principal.
- source_word: λαὸν
  english_pob_choice: a people
  chosen_spanish: un pueblo
  alternatives_spanish:
  - un pueblo-escogido
  - el pueblo
  lexicon: BDAG
  rationale: El acusativo sin artículo se expresa de manera natural como 'un pueblo'. En contexto remite a Israel como colectividad, sin necesidad de precisar más en el texto principal.
- source_word: ἐκ γῆς Αἰγύπτου
  english_pob_choice: out of the land of Egypt
  chosen_spanish: de la tierra de Egipto
  alternatives_spanish:
  - fuera de Egipto
  - de Egipto
  lexicon: BDAG
  rationale: Conservo la referencia bíblica completa a la 'tierra de Egipto', que reproduce mejor el eco del éxodo y evita perder la resonancia narrativa.
- source_word: σώσας
  english_pob_choice: having saved
  chosen_spanish: habiendo salvado
  alternatives_spanish:
  - después de salvar
  - al salvar
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y señala una acción previa. 'Habiendo salvado' mantiene ese orden temporal con claridad y sin rigidez.
- source_word: τὸ δεύτερον
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - posteriormente
  lexicon: BDAG
  rationale: Aunque el griego es idiomático, el sentido temporal es de acción posterior. 'Después' comunica ese valor de manera sobria y natural en español.
- source_word: τοὺς μὴ πιστεύσαντας
  english_pob_choice: those who did not believe
  chosen_spanish: a los que no creyeron
  alternatives_spanish:
  - a los que no creían
  - a los incrédulos
  lexicon: BDAG
  rationale: El participio aoristo con μή describe a un grupo definido por su falta de fe. 'No creyeron' es la forma más directa y conserva el contraste moral del pasaje.
- source_word: ἀπώλεσεν
  english_pob_choice: destroyed
  chosen_spanish: destruyó
  alternatives_spanish:
  - arruinó
  - llevó a destrucción
  lexicon: BDAG
  rationale: El verbo expresa juicio severo sobre la generación incrédula. 'Destruyó' es la equivalencia más clara y fuerte en español, sin atenuar la gravedad del acto.
theological_decisions:
- issue: Sujeto cristológico en la cláusula del éxodo
  english_pob_reading: Translate the subject as 'Jesus' in the main text, with a footnote for 'Lord' or 'God.'
  chosen_spanish_reading: Traducir el sujeto como 'Jesús' en el texto principal, con nota sobre las variantes 'el Señor' o 'Dios'.
  alternative_spanish_readings:
  - el Señor
  - Dios
  rationale: El testimonio griego provisto lee Ἰησοῦς, y el principio de primacía del original exige reflejarlo en el texto principal. La variante es textualmente y teológicamente significativa, por lo que se preserva en nota sin armonizarla.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés, que ajustó πάντα de «all this» a «all things». En español se refleja ese cambio con «todas las cosas». Se mantiene sin cambios la estructura semántica central: advertencia introductoria, conocimiento previo compartido, sujeto cristológico explícito, salvación del éxodo y destrucción de los incrédulos.'
  spanish_consistency_notes:
  - Se conserva «Jesús» para Ἰησοῦς, conforme a la fuente griega y a la nota textual.
  - Se usa «un pueblo» para λαὸν, evitando sobreespecificar el referente en el texto principal.
  - «Una vez para siempre» intenta representar ἅπαξ como conocimiento plenamente poseído, no como simple repetición temporal.
  - Se evita sustituir «creyeron» por «confiaron» para no desplazar el valor estándar del participio en este contexto de advertencia.
  - La nota al pie mantiene la variante textual sin resolverla, preservando la tensión cristológica documentada.
