lexical_decisions:
- source_word: ἔλεος
  english_pob_choice: mercy
  chosen_spanish: misericordia
  alternatives_spanish:
  - compasión
  lexicon: BDAG
  rationale: En una bendición epistolar, ἔλεος pide un término natural en español que conserve el matiz de favor compasivo y misericordioso. 'Misericordia' refleja mejor la amplitud semántica que 'compasión' y mantiene el registro eclesial sin sonar arcaico.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario en una fórmula de bendición se expresa con naturalidad en español mediante el clítico de destinatario 'les'. La construcción completa 'les sean...' mantiene la dirección del deseo sin forzar una calca.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: '''Paz'' es el equivalente directo y más reconocible en español para εἰρήνη, preservando tanto el sentido relacional como el resonar covenantal. ''Bienestar'' sería una ampliación interpretativa no exigida por el texto.'
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: '''Amor'' es la forma estándar y clara para ἀγάπη en español. ''Caridad'' introduce un matiz histórico/tradicional que podría ocultar la conexión léxica y sonar menos natural para lectores modernos.'
- source_word: πληθυνθείη
  english_pob_choice: be multiplied
  chosen_spanish: sean multiplicados
  alternatives_spanish:
  - aumenten
  - abunden
  lexicon: BDAG
  rationale: 'El optativo aoristo pasivo en una fórmula de bendición se traduce bien con una jussiva en español: ''sean multiplicados''. Esto conserva la imagen de aumento y el tono de súplica/deseo más de cerca que ''aumenten'' o ''abunden''.'
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - lista con comas
  lexicon: LSJ
  rationale: Se conserva la repetición de 'y' para reflejar el ritmo acumulativo solemne del original y evitar suavizar la cadencia de la bendición en una simple enumeración.
theological_decisions:
- issue: Force of the benedictory optative
  english_pob_reading: May mercy and peace and love be multiplied to you.
  chosen_spanish_reading: Que misericordia, paz y amor les sean multiplicados.
  alternative_spanish_readings:
  - Que misericordia, paz y amor aumenten para ustedes.
  - Misericordia, paz y amor les sean multiplicados.
  rationale: El griego expresa un deseo/bendición, no una afirmación descriptiva. 'Que ...' comunica bien el valor jussivo del optativo en español. 'Les sean multiplicados' mantiene la metáfora de incremento sin diluirla en un mero 'aumenten'.
  doctrine_reference: Forma benedictoria optativa; mantener el sentido de deseo y la imagen verbal del texto fuente.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene estable en esta revisión; no hay cambios relevantes que obliguen a modificar la solución española. Se conserva la misma estructura benedictoria y la metáfora de multiplicación del verbo griego.
  spanish_consistency_notes:
  - Se mantiene el uso de 'misericordia', 'paz' y 'amor' como equivalentes básicos de ἔλεος, εἰρήνη y ἀγάπη.
  - Se evita 'Cristo', 'SEÑOR' o vocabulario no presente en el versículo.
  - La fórmula 'Que ... les sean multiplicados' preserva un registro bíblico natural en español sin depender de una calca inglesa.
  - La nota al pie queda anclada solo en 'multiplicados[a]' para corresponder al aludido rango de alternativas del verbo griego.
