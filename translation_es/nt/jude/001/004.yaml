translation:
  language: es
  text: Porque ciertos hombres se han infiltrado sin ser notados[a], quienes desde antiguo fueron designados para este juicio[b], impíos, que convierten la gracia de nuestro Dios en desenfreno[c] y niegan a nuestro único Maestro y Señor[d], Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «han entrado furtivamente sin ser notados».
    reason: lexical_alternative
  - marker: b
    text: O «de quienes se escribió de antemano para este juicio» o «fueron designados de antemano para este juicio».
    reason: alternative_reading
  - marker: c
    text: O «lascivia» o «licenciosidad».
    reason: lexical_alternative
  - marker: d
    text: Griego «Jesús Cristo»; se traduce «Jesús Mesías» porque Χριστός se entiende aquí como título. También puede entenderse «nuestro único Maestro y Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεισέδυσαν
  english_pob_choice: have slipped in unnoticed
  chosen_spanish: se han infiltrado
  alternatives_spanish:
  - han entrado furtivamente
  - se han metido sin ser notados
  lexicon: BDAG
  rationale: El verbo griego expresa entrada sigilosa por infiltración. «Se han infiltrado» mantiene la idea de entrada oculta y funciona con naturalidad en español actual.
- source_word: τινες ἄνθρωποι
  english_pob_choice: certain men
  chosen_spanish: ciertos hombres
  alternatives_spanish:
  - algunos hombres
  - determinados hombres
  lexicon: BDAG
  rationale: «Ci ert os hombres» conserva el matiz indefinido y el referente masculino plural del griego, sin volverlo genérico de más.
- source_word: πάλαι
  english_pob_choice: long ago
  chosen_spanish: desde antiguo
  alternatives_spanish:
  - hace mucho
  - desde hacía mucho tiempo
  lexicon: BDAG
  rationale: La expresión indica un pasado remoto. «Desde antiguo» es idiomática en español y preserva la distancia temporal.
- source_word: προγεγραμμένοι
  english_pob_choice: designated for this judgment
  chosen_spanish: fueron designados para este juicio
  alternatives_spanish:
  - fueron escritos de antemano para este juicio
  - fueron señalados de antemano para este juicio
  lexicon: BDAG
  rationale: El participio admite la idea de haber sido escritos o señalados previamente, pero en este contexto unido a εἰς τοῦτο τὸ κρίμα la noción de designación previa es la más directa y mantiene la tensión teológica sin resolverla hacia una predestinación explícita.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condena
  - sentencia
  lexicon: BDAG
  rationale: «Juicio» conserva el campo judicial amplio de κρίμα sin estrecharlo de inmediato a condena definitiva.
- source_word: ἀσεβεῖς
  english_pob_choice: ungodly men
  chosen_spanish: impíos
  alternatives_spanish:
  - sin Dios
  - irreverentes
  lexicon: BDAG
  rationale: Como adjetivo sustantivado, describe su condición moral delante de Dios. «Impíos» es fiel, sobrio y natural en registro bíblico español.
- source_word: χάριτα
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En este contexto teológico, «gracia» es la equivalencia directa y tradicionalmente precisa para χάρις.
- source_word: μετατιθέντες εἰς
  english_pob_choice: turn ... into
  chosen_spanish: convierten ... en
  alternatives_spanish:
  - cambian ... por
  - transforman ... en
  lexicon: BDAG
  rationale: El participio expresa una alteración de dirección o carácter. «Convierten ... en» es claro y reproduce bien la relación de cambio.
- source_word: ἀσέλγειαν
  english_pob_choice: sensuality
  chosen_spanish: desenfreno
  alternatives_spanish:
  - lascivia
  - licenciosidad
  - sensualidad
  lexicon: BDAG
  rationale: El término apunta a conducta moral desatada e indecente, frecuentemente con matiz sexual. «Desenfreno» comunica bien la falta de freno moral sin sonar excesivamente técnico.
- source_word: τὸν μόνον δεσπότην καὶ κύριον
  english_pob_choice: our only Master and Lord
  chosen_spanish: nuestro único Soberano y Señor
  alternatives_spanish:
  - nuestro único Dueño y Señor
  - nuestro único Amo y Señor
  - nuestro único Maestro y Señor
  lexicon: BDAG
  rationale: Para δεσπότης, «Soberano» refleja la autoridad absoluta y evita la posible ambigüedad de «maestro» en español. «Señor» representa κύριος y conserva la distinción de títulos.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús, el Mesías
  lexicon: BDAG
  rationale: Aunque Χριστός puede rendirse como «Mesías» en muchos contextos, aquí la tradición española cristiana y la identificación nominal fija favorecen «Jesucristo», sin perder el referente cristológico del texto.
- source_word: ἀρνούμενοι
  english_pob_choice: deny
  chosen_spanish: niegan
  alternatives_spanish:
  - rechazan
  - reniegan de
  lexicon: BDAG
  rationale: El participio expresa repudiación o negación. «Niegan» es directo y fiel al sentido verbal básico.
theological_decisions:
- issue: Alcance de προγεγραμμένοι εἰς τοῦτο τὸ κρίμα
  english_pob_reading: prior marking out or prior scriptural notice for this judgment, without making an explicit claim about individual predestination in the English wording
  chosen_spanish_reading: fueron designados para este juicio, sin explicitar una doctrina de predestinación individual
  alternative_spanish_readings:
  - fueron escritos de antemano para este juicio
  - fueron destinados de antemano para esta condena
  rationale: La frase admite debate entre aviso previo, designación previa y predestinación. La redacción española conserva la fuerza judicial y el sentido de anterioridad, sin resolver la tensión doctrinal más allá del texto.
  doctrine_reference: Translation philosophy §3
- issue: Referencia de «nuestro único Soberano y Señor, Jesucristo»
  english_pob_reading: the titles refer to Jesus Messiah
  chosen_spanish_reading: ambos títulos se refieren a Jesucristo
  alternative_spanish_readings:
  - «Soberano» se refiere al Padre y «Señor» a Jesús
  - solo «Señor» se refiere a Jesús
  rationale: La sintaxis más natural une los dos títulos con Jesucristo. La traducción conserva esa lectura sin añadir separación interpretativa no indicada por el griego.
  doctrine_reference: Affirmations; Translation philosophy §2
- issue: Renderizado de Χριστός
  english_pob_reading: Jesus Messiah because Χριστός is treated here as a title
  chosen_spanish_reading: Jesucristo como forma cristológica fija en español
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús, el Mesías
  rationale: Aunque «Mesías» es válido cuando Cristo funciona claramente como título, aquí el uso nominal de la expresión está muy asentado en español eclesial. Se mantiene la forma tradicional sin negar el trasfondo titulario.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue la resolución más reciente del audit trail para προγεγραμμένοι como «designados», pero en español mantiene la cautela doctrinal al no explicitar predestinación individual. También recoge la restauración de Χριστός como forma cristológica fija en el flujo editorial, expresándola con la forma española tradicional «Jesucristo».
  spanish_consistency_notes:
  - Se usa «gracia» para χάρις y «impíos» para ἀσεβεῖς en línea con el léxico bíblico español.
  - «Señor» se reserva para κύριος; «Soberano» se emplea para δεσπότης por su matiz de autoridad.
  - La puntuación reproduce una sola cláusula larga con dos participios coordinados, como en el griego, pero con separación fluida en español.
  - No se añade nota textual porque no hay variante crítica relevante en el paquete fuente proporcionado.
