    text: O «han entrado furtivamente sin ser notados».
    reason: lexical_alternative
  - marker: b
    text: O «de quienes se escribió de antemano para este juicio» o «fueron designados de antemano para este juicio».
    reason: alternative_reading
  - marker: c
    text: O «lascivia» o «licenciosidad».
    reason: lexical_alternative
  - marker: d
    text: Griego «Jesús Cristo»; se traduce «Jesús Mesías» porque Χριστός se entiende aquí como título. También puede entenderse «nuestro único Maestro y Señor».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinearse con el rastro auditado del POB y con las decisiones léxicas documentadas: se explicita el matiz furtivo de παρεισέδυσαν, se mantiene la ambigüedad controlada de προγεγραμμένοι con nota, se preserva la doble designación δεσπότην/κύριον como «Maestro y Señor», y se restituye el valor titular de Χριστός como «Mesías». También se suaviza la sintaxis para un español más natural.'
