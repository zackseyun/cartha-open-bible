revisions:
- from: 'Porque se han infiltrado ciertos hombres, los cuales desde antiguo fueron designados para este juicio: impíos, que convierten la gracia de nuestro Dios en desenfreno y niegan a nuestro único[a] Soberano y Señor, Jesucristo.'
  to: Porque ciertos hombres se han infiltrado sin ser notados[a], quienes desde antiguo fueron designados para este juicio[b], impíos, que convierten la gracia de nuestro Dios en desenfreno[c] y niegan a nuestro único Maestro y Señor[d], Jesús Mesías.
  rationale: 'Se revisa para alinearse con el rastro auditado del POB y con las decisiones léxicas documentadas: se explicita el matiz furtivo de παρεισέδυσαν, se mantiene la ambigüedad controlada de προγεγραμμένοι con nota, se preserva la doble designación δεσπότην/κύριον como «Maestro y Señor», y se restituye el valor titular de Χριστός como «Mesías». También se suaviza la sintaxis para un español más natural.'
  reviewer_model: gpt-5.4
