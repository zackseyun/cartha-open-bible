source:
  edition: SBLGNT
  text: παρεισέδυσαν γάρ τινες ἄνθρωποι, οἱ πάλαι προγεγραμμένοι εἰς τοῦτο τὸ κρίμα, ἀσεβεῖς, τὴν τοῦ θεοῦ ἡμῶν χάριτα μετατιθέντες εἰς ἀσέλγειαν καὶ τὸν μόνον ⸀δεσπότην καὶ κύριον ἡμῶν Ἰησοῦν Χριστὸν ἀρνούμενοι.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/004.yaml
  text: For certain men have slipped in unnoticed[a], who long ago were designated for this judgment, ungodly men who turn the grace of our God into sensuality and deny our only Master and Lord[d][c][b], Jesus Messiah.
  footnotes:
  - marker: a
    text: Or 'have crept in unnoticed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'who long ago were written about beforehand for this judgment' or 'were designated beforehand for this judgment.'
    reason: alternative_reading
  - marker: c
    text: Or 'debauchery' or 'licentiousness.'
    reason: lexical_alternative
  - marker: d
    text: Greek 'Jesus Christ'; translated 'Jesus Messiah' because Χριστός is treated here as a title.
    reason: lexical_alternative
