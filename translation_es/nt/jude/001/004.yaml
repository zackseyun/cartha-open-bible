review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien la estructura principal del versículo: infiltración sigilosa, designación previa para juicio, impiedad, perversión de la gracia y negación de Jesús. Sin embargo, no preserva plenamente dos decisiones auditadas del POB: (1) δεσπότην καὶ κύριον debe mantenerse como doble título distinto con fuerza personal de autoridad; «Soberano y Señor» es posible, pero el rastro léxico del POB favorece «Maestro y Señor» para δεσπότης + κύριος. (2) Χριστόν fue restaurado en el inglés a valor titular («Messiah»), y el español «Jesucristo» neutraliza esa decisión documentada. También conviene reflejar mejor el matiz de παρεισέδυσαν como infiltración desapercibida.'
  spanish_quality_summary: El español es claro y legible, con registro bíblico natural. «Porque se han infiltrado ciertos hombres» y «desenfreno» funcionan bien. No obstante, «los cuales» y los dos puntos suenan algo más pesados de lo necesario, y la omisión de «sin ser notados» o equivalente atenúa el matiz furtivo. «Jesús Mesías» es menos habitual que «Jesucristo», pero en este proyecto es la forma más fiel a la justificación léxica y sigue siendo comprensible en español eclesial.
  glossary_alignment: Alineación parcial. «Dios», «gracia», «juicio», «impíos» y «niegan» están bien. Pero el valor titular de Χριστός debería seguir el default del proyecto como «Mesías» aquí, ya que no hay carve-out documentado para conservar «Cristo». Además, aunque δεσπότης no tiene un equivalente fijo de glosario, el expediente inglés documenta «Master and Lord»; en español «Maestro y Señor» preserva mejor la duplicidad sin fusionar autoridad política con «Soberano».
  issues:
  - severity: high
    issue: «Jesucristo» no preserva la decisión auditada de traducir Χριστός como título.
    rationale: El English POB y la revisión posterior establecen explícitamente «Jesus Messiah» para este versículo. «Jesucristo» vuelve la expresión más nombre fijo y pierde la fuerza titular que el expediente pidió conservar.
  - severity: medium
    issue: «Soberano y Señor» se aparta de la elección auditada «Master and Lord».
    rationale: Aunque «Soberano» puede representar δεσπότης, el expediente subraya la distinción personal entre δεσπότης y κύριος y prefiere «Master» sobre «Sovereign». En español, «Maestro y Señor» sigue mejor esa lógica y evita desplazar δεσπότης hacia un matiz principalmente político.
  - severity: medium
    issue: παρεισέδυσαν queda algo subrepresentado en «se han infiltrado».
    rationale: El verbo incluye no solo infiltración sino entrada furtiva/desapercibida. Añadir «sin ser notados» o «de manera encubierta» preserva mejor el matiz y además permite anclar la nota alternativa existente en español.
  - severity: low
    issue: La puntuación con dos puntos tras «juicio» suena menos natural que una coma en esta serie descriptiva.
    rationale: 'El griego encadena descripciones participiales y adjetivales; en español una coma mantiene mejor el flujo: «... para este juicio, impíos, que ...».'
  revised_spanish_text: Porque ciertos hombres se han infiltrado sin ser notados[a], quienes desde antiguo fueron designados para este juicio[b], impíos, que convierten la gracia de nuestro Dios en desenfreno[c] y niegan a nuestro único Maestro y Señor[d], Jesús Mesías.
  revised_footnotes:
