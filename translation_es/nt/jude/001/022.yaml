lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y además
  lexicon: BDAG
  rationale: Conecta de forma natural con el mandamiento anterior; en español, la conjunción simple «Y» conserva la coordinación sin añadir énfasis innecesario.
- source_word: οὓς μὲν
  english_pob_choice: those
  chosen_spanish: de los que
  alternatives_spanish:
  - a los que
  - a algunos
  lexicon: BDAG
  rationale: El relativo acusativo con μέν introduce un grupo dentro de una serie. En español, «de los que» permite expresar el grupo objetivo de la exhortación sin forzar una construcción artificial, dejando la correlación con el siguiente miembro para el contexto inmediato.
- source_word: ἐλεᾶτε
  english_pob_choice: have mercy on
  chosen_spanish: tengan misericordia de
  alternatives_spanish:
  - muestren misericordia a
  - sean misericordiosos con
  lexicon: BDAG
  rationale: «Tener misericordia de» es una forma natural y fiel en español para ἐλεάω. Mantiene el mandato ético y la fuerza pastoral del verbo sin diluirlo en una expresión demasiado general.
- source_word: διακρινομένους
  english_pob_choice: who are doubting
  chosen_spanish: los que están dudando
  alternatives_spanish:
  - los que están vacilando
  - los que están disputando
  - los que están divididos
  lexicon: BDAG
  rationale: El participio de διακρίνω admite varias matizaciones. «Están dudando» comunica bien la incertidumbre espiritual/pastoral que el contexto sugiere, pero se preservan alternativas porque el griego realmente permite más de un matiz.
theological_decisions:
- issue: Alcance de διακρινομένους en un contexto de exhortación pastoral
  english_pob_reading: those who are doubting
  chosen_spanish_reading: los que están dudando
  alternative_spanish_readings:
  - los que están vacilando
  - los que están disputando
  rationale: La lectura principal presenta al grupo como personas inestables o inseguras, no necesariamente como adversarios. Esa opción encaja con la orden de mostrar misericordia. Se conserva la ambigüedad del participio en nota, en lugar de resolverla de manera dogmática.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; el texto griego y el audit trail inglés muestran consenso alto y la redacción española sigue esa lectura con una nota que preserva la ambigüedad léxica.
  spanish_consistency_notes:
  - Se usa «misericordia» para ἐλεάω, conforme al valor léxico indicado en el audit trail.
  - Se prefiere «dudando» como lectura principal, pero se conserva la amplitud semántica de διακρίνω en la nota.
  - La puntuación con coma final refleja la continuación sintáctica del versículo hacia la siguiente cláusula en el contexto inmediato.
