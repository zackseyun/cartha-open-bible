  - marker: a
    text: O «los que vacilan»; posiblemente «los que disputan». El participio griego puede tener más de un matiz en este contexto.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad y fidelidad idiomática en español: ''tengan compasión de'' expresa bien ἐλεᾶτε en un mandato pastoral, y ''los que dudan'' suena más claro y directo que ''los que están dudando''. La nota conserva adecuadamente la ambigüedad léxica de διακρινομένους.'
