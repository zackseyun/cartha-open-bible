translation:
  language: es
  text: Sin embargo, de la misma manera, estos también, soñando[a], contaminan la carne, rechazan la autoridad e injurian a seres gloriosos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apoyándose en sueños». El participio griego puede expresarse de forma más interpretativa, y aquí posiblemente sugiere que apelan a sueños como justificación de su conducta.'
    reason: lexical_alternative
  - marker: b
    text: «Seres gloriosos» probablemente se refiere a seres celestiales exaltados, quizá ángeles; el griego dice literalmente «glorias».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὁμοίως μέντοι
  english_pob_choice: Yet in the same way
  chosen_spanish: Sin embargo, de la misma manera
  alternatives_spanish:
  - Asimismo, sin embargo
  - De igual modo, pero
  lexicon: BDAG
  rationale: Ὁμοίως expresa comparación (“de la misma manera”), mientras que μέντοι añade un matiz adversativo (“sin embargo”). En español, “Sin embargo, de la misma manera” conserva ambos valores sin forzar un orden poco natural.
- source_word: οὗτοι
  english_pob_choice: these people
  chosen_spanish: estos también
  alternatives_spanish:
  - estas personas también
  - estos hombres también
  lexicon: BDAG
  rationale: El demostrativo apunta a los intrusos del contexto. “Estos también” es natural en español y mantiene la referencia sin añadir género masculino explícito que el griego no exige aquí.
- source_word: ἐνυπνιαζόμενοι
  english_pob_choice: dreaming
  chosen_spanish: soñando
  alternatives_spanish:
  - soñadores
  - apoyándose en sueños
  - soñando con
  lexicon: BDAG
  rationale: La revisión inglesa prefirió la forma más directa “dreaming”. “Soñando” reproduce con sobriedad el participio, aunque en contexto puede insinuar que sus acciones están ligadas a sueños o visiones; esa posible implicación queda abierta.
- source_word: σάρκα
  english_pob_choice: the flesh
  chosen_spanish: la carne
  alternatives_spanish:
  - la carne humana
  - el cuerpo
  lexicon: BDAG
  rationale: Se mantiene el término bíblico “carne” para conservar la fuerza moral/ritual del griego y evitar reducirlo a “cuerpo” o explicarlo como “naturaleza pecaminosa”, lectura que el texto no explicita por sí mismo.
- source_word: μιαίνουσιν
  english_pob_choice: defile
  chosen_spanish: contaminan
  alternatives_spanish:
  - manchan
  - profanan
  lexicon: BDAG
  rationale: “Contaminan” expresa de modo claro la idea de manchar o volver impuro. Es fiel al tono acusatorio y permite un español actual sin perder el matiz de impureza.
- source_word: κυριότητα
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el señorío
  - el dominio
  lexicon: BDAG
  rationale: “Autoridad” preserva la amplitud de κυριότης, que puede abarcar señorío o dominio, sin resolver de antemano si la referencia es divina, angélica o institucional.
- source_word: ἀθετοῦσιν
  english_pob_choice: reject
  chosen_spanish: rechazan
  alternatives_spanish:
  - desprecian
  - anulan
  - repudian
  lexicon: BDAG
  rationale: “Rechazan” comunica la fuerza de repudiar o desechar algo que debería ser reconocido, con claridad y sin exceso interpretativo.
- source_word: δόξας
  english_pob_choice: glorious ones
  chosen_spanish: seres gloriosos
  alternatives_spanish:
  - glorias
  - seres de gloria
  - gloriosos
  lexicon: BDAG
  rationale: “Seres gloriosos” conserva la referencia probable a seres celestiales exaltados sin cerrar la ambigüedad del plural griego (“glorias”). Es más explicativo que “glorias” y más neutral que “ángeles” en el texto principal.
- source_word: βλασφημοῦσιν
  english_pob_choice: slander
  chosen_spanish: blasfeman contra
  alternatives_spanish:
  - maldicen a
  - hablan injuriosamente de
  - blasfeman de
  lexicon: BDAG
  rationale: El verbo griego implica hablar con desprecio o injuria. En español, “blasfeman contra” conserva la gravedad del acto; “slander” en inglés se volvió más amplio para evitar restringirlo solo a la ofensa directa contra Dios.
theological_decisions:
- issue: Referencia de δόξας
  english_pob_reading: an intentionally broad expression for exalted/glorious beings
  chosen_spanish_reading: seres gloriosos como expresión amplia de seres celestiales exaltados
  alternative_spanish_readings:
  - ángeles
  - glorias
  - majestades celestiales
  rationale: El contexto inmediato de Judas 1:9 sugiere seres angélicos, pero el sustantivo en sí es más amplio. El español mantiene esa amplitud con “seres gloriosos” en el texto principal y no cierra la identificación en la traducción misma.
  doctrine_reference: Preservar la tensión teológica y contextual en vez de resolverla de manera prematura.
- issue: Fuerza de ἐνυπνιαζόμενοι
  english_pob_reading: their conduct is connected to reliance on dreams
  chosen_spanish_reading: su conducta aparece asociada con el soñar
  alternative_spanish_readings:
  - están simplemente soñando
  - apoyándose en sueños
  - soñando mientras actúan
  rationale: La revisión inglesa volvió a la forma más directa “dreaming”. En español, “soñando” respeta esa literalidad y deja abierta la relación exacta entre sueños y conducta, sin introducir una explicación interpretativa que el griego no obliga a precisar.
  doctrine_reference: Primacía del idioma original; preservar la tensión interpretativa donde el texto la deja abierta.
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa, que prefirió “dreaming” sobre una expansión interpretativa como “relying on dreams”. La versión española refleja esa decisión con “soñando”, manteniendo el resto del enunciado alineado con el texto griego y con el audit trail inglés.
  spanish_consistency_notes:
  - Se mantuvo “la carne” para σάρξ y “la autoridad” para κυριότητα, evitando términos eclesiásticos más cargados sin base contextual.
  - “Blasfeman contra” conserva el vigor del verbo griego y funciona con el complemento personal implícito de seres gloriosos.
  - El orden de la cláusula inicial en español busca naturalidad sin perder el paralelismo del griego.
  - Las notas preservan la ambigüedad de δόξας y la alternativa formal para ἐνυπνιαζόμενοι.
