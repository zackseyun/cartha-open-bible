translation:
  language: es
  text: salven a otros, arrebatándolos del fuego[a]; y tengan misericordia de otros con temor[b], odiando hasta la túnica manchada por la carne[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rescaten a otros, arrebatándolos del fuego». La imagen puede aludir al juicio inminente o a un peligro espiritual grave.
    reason: alternative_reading
  - marker: b
    text: O «con reverencia»; también puede significar con cautela, para no quedar uno mismo contaminado.
    reason: lexical_alternative
  - marker: c
    text: 'O «la vestidura contaminada por la naturaleza pecaminosa». Griego: «carne».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σῴζετε
  english_pob_choice: save
  chosen_spanish: salven
  alternatives_spanish:
  - rescaten
  lexicon: BDAG
  rationale: El imperativo griego σῴζετε conserva una fuerza amplia de salvar/rescatar. «Salven» mantiene el peso soteriológico del verbo y funciona de modo natural en español; «rescaten» estrecha más la imagen inmediata pero puede perder el alcance del verbo.
- source_word: ἁρπάζοντες
  english_pob_choice: by snatching them out of the fire
  chosen_spanish: arrebatándolos del fuego
  alternatives_spanish:
  - arrancándolos del fuego
  - sacándolos del fuego con violencia
  lexicon: BDAG
  rationale: El participio expresa el modo en que se realiza la salvación, con urgencia y fuerza. «Arrebatar» conserva bien ese matiz de acción rápida y vigorosa; «arrancando» también es viable, pero «arrebatando» suena más sobrio y literario.
- source_word: ἐλεᾶτε
  english_pob_choice: have mercy
  chosen_spanish: tengan misericordia
  alternatives_spanish:
  - muestren misericordia
  - sean misericordiosos
  lexicon: BDAG
  rationale: El imperativo se vierte con una expresión bíblica clara y natural. «Tengan misericordia» conserva la fuerza verbal y evita una paráfrasis excesiva.
- source_word: ἐν φόβῳ
  english_pob_choice: with fear
  chosen_spanish: con temor
  alternatives_spanish:
  - con reverencia
  - con cautela
  lexicon: BDAG
  rationale: 'La frase mantiene la ambigüedad deliberada del griego: puede indicar temor reverente ante Dios o cautela por el riesgo de contaminación. «Con temor» preserva esa tensión sin resolverla en el texto principal.'
- source_word: μισοῦντες
  english_pob_choice: hating
  chosen_spanish: aborreciendo
  alternatives_spanish:
  - odiando
  - detestando
  lexicon: BDAG
  rationale: El participio adverbial debe expresar una actitud concomitante. «Aborreciendo» reproduce la intensidad moral de μισοῦντες y suena más adecuado en registro bíblico que el más directo «odiando».
- source_word: χιτῶνα
  english_pob_choice: tunic
  chosen_spanish: túnica
  alternatives_spanish:
  - túnica interior
  - vestidura
  lexicon: BDAG
  rationale: χιτών designa una prenda interior; en español, «túnica» es la equivalencia más transparente y comprensible, sin reducirlo a una prenda moderna como «camisa».
- source_word: ἐσπιλωμένον
  english_pob_choice: stained
  chosen_spanish: manchada
  alternatives_spanish:
  - contaminada
  - defileda
  - ensuciada
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado ya marcado por suciedad/contaminación. «Manchada» funciona bien con la metáfora de la ropa y conserva la idea de contaminación moral sin sobretraducir.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana pecaminosa
  - naturaleza pecaminosa
  lexicon: BDAG
  rationale: Se mantiene «carne» para conservar la metáfora del texto y no imponer en el cuerpo del versículo una glosa interpretativa. La tensión entre sentido literal y moral se documenta en la nota.
theological_decisions:
- issue: Alcance de la imagen del fuego
  english_pob_reading: Retain 'fire' as a metaphor without specifying hell/judgment in the main text.
  chosen_spanish_reading: Conservar «fuego» como imagen sin precisar en el texto principal si alude al juicio escatológico o a un peligro espiritual presente.
  alternative_spanish_readings:
  - fuego del juicio
  - fuego del infierno
  - peligro de destrucción
  rationale: El griego no define explícitamente el referente de la imagen. La traducción conserva la advertencia y deja abierta la tensión interpretativa, en vez de resolverla por anticipado.
  doctrine_reference: Preservar la tensión teológica cuando el texto fuente no la resuelve.
- issue: Sentido de σάρξ en la frase final
  english_pob_reading: Render σάρξ as 'flesh' in the main text.
  chosen_spanish_reading: Traducir σάρξ como «carne» en el texto principal.
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: Aunque el contexto apunta a contaminación moral, «carne» preserva la metáfora paulina/judeana sin convertirla en una glosa sistemática. La nota deja constancia de la alternativa interpretativa.
  doctrine_reference: 'Tabla de términos en tensión: σάρξ = «carne» / «naturaleza pecaminosa», según el contexto.'
- issue: Sentido de ἐν φόβῳ
  english_pob_reading: '''With fear'' may mean with reverent fear before God, or with cautious awareness lest one also be corrupted.'
  chosen_spanish_reading: «Con temor» mantiene la ambigüedad entre temor reverente delante de Dios y cautela para no contaminarse.
  alternative_spanish_readings:
  - con reverencia
  - con cautela
  rationale: El griego permite más de una lectura legítima. Es preferible conservar la ambigüedad en la redacción principal y explicarla en nota.
  doctrine_reference: No resolver en exceso cuando el texto admite más de una lectura plausible.
translation_notes:
  revision_awareness: 'El español se ajusta al último estado del audit trail: se conserva la fuerza de σῴζετε y ἁρπάζοντες, se mantiene la ambigüedad de ἐν φόβῳ, y se preserva «carne» para σάρξ en la línea final. La redacción evita una construcción demasiado rígida y busca una cadencia publicable en español sin perder la estructura exhortativa del griego.'
  spanish_consistency_notes:
  - Se mantiene el paralelo entre los dos grupos de destinatarios con dos imperativos coordinados.
  - «Con temor» se deja sin explicitar en el cuerpo para no colapsar las dos lecturas documentadas.
  - La frase final conserva la metáfora de la prenda y la tensión moral asociada a σάρξ.
  - El registro es bíblico, moderno y claramente comprensible en español latinoamericano.
