  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: identifica a los referidos por οὗτοί, mantiene el valor activo de οἱ ἀποδιορίζοντες como causantes de división, conserva el contraste de ψυχικοί con πνεῦμα, y traduce μὴ ἔχοντες de forma cercana. También preserva adecuadamente las alternativas del rastro POB en notas.'
  spanish_quality_summary: La frase es comprensible, pero «mundanos» puede sonar más moralizante o asociado a 'seculares' que al contraste técnico de ψυχικοί frente al Espíritu. Además, «no teniendo el Espíritu» es inteligible pero algo calcado; «que no tienen el Espíritu» suena más natural y digno en español bíblico actual sin perder fidelidad.
  glossary_alignment: No hay conflicto con los términos troncales del proyecto. «Espíritu» con mayúscula sigue la decisión contextual del POB. La principal mejora terminológica es ajustar ψυχικοί a «no espirituales», dejando «mundanos» y «naturales» como alternativas, porque esa opción expresa mejor el contraste semántico documentado con πνεῦμα en español.
  issues:
  - severity: medium
    issue: «mundanos» para ψυχικοί puede desviar el matiz principal
    rationale: Aunque es una opción posible por influencia del inglés 'worldly', en español «mundanos» puede sugerir principalmente conducta secular o frívola. El contexto y la nota inglesa subrayan el contraste con el Espíritu; «no espirituales» comunica ese núcleo con más precisión.
  - severity: low
    issue: «no teniendo el Espíritu» suena más literal que natural
    rationale: La construcción participial griega puede representarse en español de forma más idiomática como «que no tienen el Espíritu» sin pérdida semántica ni teológica.
  - severity: low
    issue: La nota a puede simplificarse ligeramente
    rationale: «Los que se separan de los demás» añade «de los demás», que no está explícito en el griego. «Los que se separan» preserva mejor la alternativa lexical documentada.
