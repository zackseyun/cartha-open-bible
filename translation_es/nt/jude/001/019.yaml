  to: Estos son los que causan divisiones[a], no espirituales[b][c], que no tienen el Espíritu.
  rationale: Se ajusta ψυχικοί a «no espirituales» para reflejar mejor el contraste contextual con πνεῦμα y el razonamiento léxico del POB en un español más preciso. Se cambia «no teniendo» por «que no tienen» para mejorar fluidez y naturalidad. Se depura la nota alternativa de ἀποδιορίζοντες para no añadir un complemento no explícito.
