translation:
  language: es
  text: Estos son los que causan divisiones[a], no espirituales[b][c], que no tienen el Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que se separan» / «los que hacen divisiones».
    reason: lexical_alternative
  - marker: b
    text: O «mundanos» o «naturales» para «no espirituales».
    reason: lexical_alternative
  - marker: c
    text: O «espíritu», aunque en este contexto probablemente se refiere al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: οὗτοί
  english_pob_choice: These
  chosen_spanish: Estos
  alternatives_spanish:
  - Estas personas
  - Estos mismos
  lexicon: BDAG
  rationale: El demostrativo apunta a los intrusos ya descritos en el contexto. «Estos» conserva la referencia deíctica con naturalidad en español y evita añadir un sustantivo que el griego no expresa.
- source_word: οἱ ἀποδιορίζοντες
  english_pob_choice: the ones who cause divisions
  chosen_spanish: los que causan divisiones
  alternatives_spanish:
  - los que se separan
  - los que provocan divisiones
  lexicon: BDAG
  rationale: El participio caracteriza a estas personas por su acción divisiva. «Causan divisiones» reproduce bien el valor activo que el contexto favorece, sin perder la posibilidad alternativa de «se separan», preservada en nota.
- source_word: ψυχικοί
  english_pob_choice: worldly people
  chosen_spanish: mundanos
  alternatives_spanish:
  - no espirituales
  - naturales
  lexicon: BDAG
  rationale: El contraste inmediato con «el Espíritu» permite traducir ψυχικοί como personas regidas por lo meramente humano o natural. «Mundanos» suena idiomático en español bíblico actual y comunica esa orientación sin suavizar el contraste; las alternativas se conservan porque el término admite matices.
- source_word: πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En este contexto polémico, la contraposición con ψυχικοί apunta de manera más natural al Espíritu Santo. En español, la mayúscula ayuda a marcar esa lectura, mientras que «espíritu» queda como alternativa lexical genuina.
- source_word: μὴ ἔχοντες
  english_pob_choice: not having
  chosen_spanish: no teniendo
  alternatives_spanish:
  - que no tienen
  - careciendo de
  lexicon: BDAG
  rationale: La forma participial negativa se conserva de manera cercana con «no teniendo», manteniendo la estructura descriptiva del griego y su enlace con los rasgos anteriores.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - el espíritu humano
  - un espíritu
  rationale: La lectura principal del contexto es que estas personas no poseen el Espíritu Santo, en contraste con los verdaderos creyentes. Aun así, el griego no fuerza por sí solo una explicitación, por lo que se preserva la alternativa «espíritu» en nota para no borrar la tensión léxica.
  doctrine_reference: Mantener la ambigüedad léxica cuando existe, pero reflejar la lectura contextual dominante en el texto principal.
- issue: Sentido de ψυχικοί
  english_pob_reading: worldly people
  chosen_spanish_reading: mundanos
  alternative_spanish_readings:
  - naturales
  - no espirituales
  rationale: En Jude, ψυχικός contrasta con vivir según el Espíritu. «Mundanos» comunica una orientación dominada por lo meramente humano sin introducir una categoría doctrinal ajena; las otras opciones quedan disponibles porque el término puede leerse también como «natural/no espiritual».
  doctrine_reference: No borrar el contraste entre vida natural y vida guiada por el Espíritu.
translation_notes:
  revision_awareness: Coincide con el estado de alta concordancia del control más reciente; no se introducen cambios sustantivos respecto del sentido auditado, solo una formulación española natural y fiel al contraste contextual.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula para reflejar la lectura contextual dominante del Espíritu Santo.
  - «Mundanos» se usa como equivalente idiomático de ψυχικοί sin eliminar las alternativas «no espirituales» y «naturales».
  - La estructura participial se conserva con «no teniendo» para respetar la sintaxis del griego.
  - Los marcadores de nota están anclados en los lugares pertinentes del texto principal y no se reutilizan.
