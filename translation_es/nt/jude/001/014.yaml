translation:
  language: es
  text: 'Y también Enoc, el séptimo desde Adán, profetizó a estos[a], diciendo: «¡He aquí![c] El Señor vino con sus santas miríadas[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra estos» o «acerca de estas personas». El dativo griego τούτοις puede entenderse como aquellos contra quienes o acerca de quienes habla la profecía; en contexto se refiere a los intrusos impíos.
    reason: lexical_alternative
  - marker: b
    text: O «con diez millares de sus santos». μυριάσιν puede significar ‘miríadas’ o ‘decenas de miles’; la frase apunta a una multitud santa inmensa.
    reason: lexical_alternative
  - marker: c
    text: La cita evoca 1 Enoc 1:9.
    reason: cross_reference
lexical_decisions:
- source_word: Προεφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - predijo
  - anunció proféticamente
  lexicon: BDAG
  rationale: El aoristo de προφητεύω expresa el acto de hablar proféticamente; «profetizó» conserva ese valor sin reducirlo a simple predicción futura.
- source_word: δὲ καὶ
  english_pob_choice: And ... also
  chosen_spanish: Y también
  alternatives_spanish:
  - Y además
  - También
  lexicon: BDAG
  rationale: La secuencia añade a Enoc como otro testigo; «Y también» reproduce el avance discursivo y el matiz aditivo de καί.
- source_word: τούτοις
  english_pob_choice: to these
  chosen_spanish: acerca de estos
  alternatives_spanish:
  - contra estos
  - para estos
  lexicon: BDAG
  rationale: El dativo con προφητεύω puede señalar referencia u objeto de la profecía. En el contexto de Judas, se refiere a los intrusos impíos; «acerca de estos» mantiene la referencia sin añadir palabras como «hombres» que no están explícitas.
- source_word: ἕβδομος ἀπὸ Ἀδὰμ
  english_pob_choice: the seventh from Adam
  chosen_spanish: el séptimo desde Adán
  alternatives_spanish:
  - el séptimo después de Adán
  lexicon: BDAG
  rationale: La fórmula genealógica se expresa de modo directo en español con «desde Adán», que es natural y fiel al orden relacional del griego.
- source_word: Ἑνὼχ
  english_pob_choice: Enoch
  chosen_spanish: Enoc
  alternatives_spanish:
  - Henoc
  lexicon: BDAG
  rationale: «Enoc» es la forma estándar en español bíblico y corresponde al nombre propio del original.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijo
  lexicon: BDAG
  rationale: El participio introduce la cita de manera concisa; «diciendo» es la equivalencia natural y transparente.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: ¡Mira!
  alternatives_spanish:
  - ¡He aquí!
  - ¡Miren!
  lexicon: BDAG
  rationale: La interjección profética requiere solemnidad, pero en español «¡Mira!» comunica mejor el impulso deíctico sin sonar arcaico; la alternativa tradicional se conserva como opción implícita en la nota.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - vino ya
  - ha venido
  lexicon: BDAG
  rationale: Aunque el aoristo puede verse como pasado profético, «vino» refleja la forma verbal sin forzar un futuro interpretativo.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Se sigue la convención española para κύριος como título divino/cristológico sin resolver aquí la identidad precisa del referente, tal como deja abierta el texto griego.
- source_word: ἐν ἁγίαις μυριάσιν αὐτοῦ
  english_pob_choice: with his holy myriads
  chosen_spanish: con sus santas miríadas
  alternatives_spanish:
  - con sus santos de miríadas
  - con sus santas decenas de miles
  lexicon: BDAG
  rationale: «Miríadas» conserva el valor lexical de μυριάς y mantiene la fuerza de cantidad innumerable; «santas» reproduce ἁγίαις sin especificar «ángeles», que el griego no dice.
theological_decisions:
- issue: Identidad de κύριος en la cita de Enoc
  english_pob_reading: Render simply as 'the Lord' without specifying whether Jude intends God generally or the Lord Jesus specifically.
  chosen_spanish_reading: Traducir simplemente «el Señor», sin precisar en el texto si Judas alude a Dios o al Señor Jesús.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios el Señor
  rationale: El griego dice solo κύριος. Para preservar la tensión teológica documentada, la traducción no resuelve el referente más allá de lo que expresa el texto.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; Contested terms table for κύριος → Lord'
- issue: Carácter de la cita de 1 Enoc
  english_pob_reading: Translate it as a prophetic quotation without commenting in the main text on canonical status.
  chosen_spanish_reading: Presentar el dicho como profecía de Enoc sin comentar en el texto principal sobre su estatus canónico.
  alternative_spanish_readings:
  - citar explícitamente 1 Enoc
  - introducir una nota sobre su trasfondo literario
  rationale: Judas presenta a Enoc profetizando; la traducción debe reflejar esa formulación sin importar al versículo una evaluación canónica que el griego no hace.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition; do not import doctrinal claims the text does not make'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del contexto en inglés, que prefirió «to these» sobre «about these men» para ceñirse más al dativo τούτοις y evitar añadir «men» no explícito. En español, por esa misma razón, se optó por «acerca de estos» en lugar de una formulación más interpretativa. También se mantuvo la cita como pasado profético sin convertirla en futuro, y se preservó la ambigüedad de κύριος.
  spanish_consistency_notes:
  - Se usa «Yahvé» para יהוה en otros pasajes, pero aquí el texto griego tiene κύριος, por lo que corresponde «el Señor».
  - Se conserva «santas miríadas» para reflejar la combinación de santidad y cantidad extrema sin sustituirla por una glosa interpretativa.
  - No se añadió «ángeles» porque el original no lo menciona explícitamente.
  - Se prefirió «Enoc» como forma española estable del nombre propio.
  - La interjección profética se vertió como «¡Mira!» por claridad actual, aunque «¡He aquí!» sería una alternativa más tradicional.
