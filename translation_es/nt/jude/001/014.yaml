    reason: lexical_alternative
  - marker: b
    text: O «con diez millares de sus santos». μυριάσιν puede significar ‘miríadas’ o ‘decenas de miles’; la frase apunta a una multitud santa inmensa.
    reason: lexical_alternative
  - marker: c
    text: La cita evoca 1 Enoc 1:9.
    reason: cross_reference
  revision_rationale: Se ajusta τούτοις a «a estos» para seguir la revisión auditada del POB y evitar volver a una paráfrasis de referencia. Se reemplaza «¡Mira!» por «¡He aquí!» para conservar mejor la fuerza solemne de ἰδού en español bíblico digno. Se elimina la nota teológica sobre «el Señor» porque el texto debe preservar la tensión de κύριος sin sobreespecificar referentes alternativos; en este versículo basta con el texto principal «el Señor». Se conserva «santas miríadas» con su alternativa en nota, que refleja bien μυριάσιν sin imponer «ángeles».
