  text: Προεφήτευσεν δὲ καὶ τούτοις ἕβδομος ἀπὸ Ἀδὰμ Ἑνὼχ λέγων· Ἰδοὺ ἦλθεν κύριος ἐν ἁγίαις μυριάσιν αὐτοῦ,
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/014.yaml
  text: And Enoch[a], the seventh from Adam, also prophesied to these, saying, “Behold[c][b], the Lord came with his holy myriads,”
  footnotes:
  - marker: a
    text: Or “against these” or “concerning these people.” The Greek dative τούτοις can be understood as indicating those about whom the prophecy speaks, and in context it refers to the ungodly intruders.
    reason: lexical_alternative
  - marker: b
    text: Or “with ten thousands of his holy ones.” μυριάσιν can denote ‘myriads’ or ‘tens of thousands’; the phrase refers to a vast holy host.
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes 1 Enoch 1:9.
    reason: cross_reference
