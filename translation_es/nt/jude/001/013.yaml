review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura metafórica del griego y mantiene correctamente ''estrellas errantes'', ''para quienes'', ''ha sido reservada'' y ''para siempre''. Sin embargo, debilita dos decisiones significativas del registro fuente/POB: ἐπαφρίζοντα queda reducido a ''que arrojan'', perdiendo explícitamente la imagen de espuma, y τὰς ἑαυτῶν αἰσχύνας se singulariza como ''su propia vergüenza'', atenuando el plural marcado ''vergüenzas'' que la auditoría inglesa procuró conservar. Además, la nota a/b está mal anclada: la nota sobre ''vergüenzas'' está puesta en ''mar'' en vez de en la frase pertinente, y la nota b se ancla en ''estrellas errantes'' aunque explica una alternativa para ''la negrura/la oscuridad''.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'olas salvajes del mar, que arrojan su propia vergüenza' suena algo inconexo y menos vívido que una formulación con 'espumeando' o 'arrojando espuma'. 'La negrura de la oscuridad' es comprensible, aunque algo pesada; aun así, puede mantenerse por fidelidad a la intensificación del griego y al rastro auditado. Conviene mejorar la fluidez y corregir la colocación de notas.
  glossary_alignment: No hay conflictos con terminología base del proyecto. La revisión propuesta preserva la opción auditada equivalente a 'wandering stars' con 'estrellas errantes' y mantiene el lenguaje judicial 'ha sido reservada para siempre'. Se ajusta mejor la decisión léxica para ἐπαφρίζοντα y se preserva mejor el plural de αἰσχύνας mediante 'vergüenzas' en el texto principal, como favorece la POB inglesa.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota [a] explica alternativas para ἐπαφρίζοντα + αἰσχύνας ('vergüenzas/deshonra/actos vergonzosos'), pero en el borrador aparece tras 'mar'. Debe anclarse en la frase correspondiente, no en 'mar'.
  - severity: high
    issue: La nota [b] está anclada en la frase equivocada.
    rationale: La nota [b] ofrece la alternativa 'la negrura de la tiniebla', que corresponde a ὁ ζόφος τοῦ σκότους, no a 'estrellas errantes'. El marcador debe ir junto a la expresión de oscuridad.
  - severity: medium
    issue: '''que arrojan'' no preserva explícitamente la imagen de espuma de ἐπαφρίζοντα.'
    rationale: El participio significa 'espumando/echando espuma/foaming up'. La versión actual permite una lectura demasiado general y pierde una imagen central del versículo.
  - severity: medium
    issue: '''su propia vergüenza'' singulariza αἰσχύνας y debilita el plural marcado.'
    rationale: La auditoría inglesa conserva deliberadamente el plural 'shames'. En español, 'sus propias vergüenzas' es viable y preserva mejor la extrañeza significativa del original.
  revised_spanish_text: olas salvajes del mar, espumeando sus propias vergüenzas[a]; estrellas errantes, para quienes la negrura de la oscuridad[b] ha sido reservada para siempre.
  revised_footnotes:
