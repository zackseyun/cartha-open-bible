translation:
  language: es
  text: olas salvajes del mar, espumeando sus propias vergüenzas[a]; estrellas errantes, para quienes la negrura de la oscuridad[b] ha sido reservada para siempre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'arrojando su propia deshonra' o 'expulsando sus propios actos vergonzosos'. El plural griego 'vergüenzas' puede referirse tanto a la deshonra misma como a acciones vergonzosas que la ponen al descubierto.
    reason: lexical_alternative
  - marker: b
    text: O 'la negrura de la tiniebla'.
    reason: lexical_alternative
lexical_decisions:
- source_word: κύματα ἄγρια θαλάσσης
  english_pob_choice: wild waves of the sea
  chosen_spanish: olas salvajes del mar
  alternatives_spanish:
  - olas bravas del mar
  - olas feroces del mar
  lexicon: BDAG
  rationale: κύματα son 'olas'; ἄγρια aporta la idea de salvaje, no domesticado o violento; θαλάσσης es genitivo, 'del mar'. 'Olas salvajes del mar' conserva la imagen con español natural y evita endurecer innecesariamente el matiz a 'feroces'.
- source_word: ἐπαφρίζοντα
  english_pob_choice: foaming up
  chosen_spanish: que arrojan
  alternatives_spanish:
  - que escupen espuma
  - que espumean
  lexicon: BDAG
  rationale: El participio describe la acción de producir o lanzar espuma. En español, 'arrojan' permite unir esa imagen con el objeto siguiente sin sonar forzado; 'espumean' sería posible, pero menos transparente aquí. La imagen completa queda reforzada por el contexto de olas.
- source_word: τὰς ἑαυτῶν αἰσχύνας
  english_pob_choice: their own shames
  chosen_spanish: su propia vergüenza
  alternatives_spanish:
  - sus propias vergüenzas
  - su propia deshonra
  lexicon: BDAG
  rationale: αἰσχύνη puede ser vergüenza, deshonra o conducta vergonzosa; el plural es llamativo. En español, el singular colectivo 'su propia vergüenza' conserva la fuerza de afrenta/deshonra, aunque el plural de la POB inglesa queda explicado en la nota para no borrar la tensión semántica.
- source_word: ἀστέρες πλανῆται
  english_pob_choice: wandering stars
  chosen_spanish: estrellas errantes
  alternatives_spanish:
  - estrellas vagabundas
  - astros errantes
  lexicon: BDAG
  rationale: πλανῆται remite a cuerpos errantes; 'estrellas errantes' preserva la metáfora sin introducir el tecnicismo moderno 'planetas', que desdibujaría el efecto literario.
- source_word: οἷς
  english_pob_choice: for whom
  chosen_spanish: para quienes
  alternatives_spanish:
  - para los cuales
  - a quienes
  lexicon: BDAG
  rationale: El relativo dativo plural se refiere a personas descritas metafóricamente como estrellas errantes. 'Para quienes' mantiene la referencia personal con naturalidad en español.
- source_word: ὁ ζόφος τοῦ σκότους
  english_pob_choice: the gloom of darkness
  chosen_spanish: la negrura de la oscuridad
  alternatives_spanish:
  - la penumbra de la oscuridad
  - la negrura tenebrosa
  lexicon: BDAG
  rationale: ζόφος intensifica la oscuridad como negrura o tenebrosidad profunda, y σκότος añade oscuridad. 'Negrura de la oscuridad' preserva la intensificación doble del griego; se evita suavizarla a una sola idea.
- source_word: εἰς αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: En este contexto judicial, la expresión comunica duración indefinida. 'Para siempre' es la forma más natural y fiel en español moderno.
- source_word: τετήρηται
  english_pob_choice: has been reserved
  chosen_spanish: ha sido reservada
  alternatives_spanish:
  - ha sido guardada
  - ha quedado reservada
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado resultante de una acción previa. 'Ha sido reservada' refleja mejor τηρέω en este contexto que 'ha sido guardada', y mantiene el registro formal.
theological_decisions:
- issue: Intensificación de la oscuridad final en ὁ ζόφος τοῦ σκότους
  english_pob_reading: the gloom of darkness
  chosen_spanish_reading: la negrura de la oscuridad
  alternative_spanish_readings:
  - la negrura tenebrosa
  - la penumbra de la oscuridad
  rationale: El griego apila dos términos de oscuridad para intensificar el juicio. La traducción española conserva esa redundancia expresiva en lugar de suavizarla, para no borrar la severidad del aviso.
  doctrine_reference: Preservar la tensión retórica y escatológica del texto sin armonizarla con formulaciones tradicionales externas.
- issue: Valor de εἰς αἰῶνα en contexto de juicio
  english_pob_reading: forever
  chosen_spanish_reading: para siempre
  alternative_spanish_readings:
  - eternamente
  - por siempre
  rationale: La frase comunica duración indefinida en el contexto del juicio; 'para siempre' transmite la fuerza sin añadir glosa doctrinal.
  doctrine_reference: Primacía del sentido textual original; no resolver ni ampliar más allá del griego.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que sustituyó 'has been kept forever' por 'has been reserved forever' para reflejar mejor τετήρηται. Por eso el español usa 'ha sido reservada para siempre' y evita una equivalencia más débil como 'ha sido guardada'.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como terminología por defecto del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se preservó la metáfora de 'estrellas errantes' en lugar de 'planetas' para no modernizar indebidamente el texto.
  - La nota sobre αἰσχύνας explica la tensión entre singular español y plural griego sin eliminarla.
