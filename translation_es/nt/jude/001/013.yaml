revisions:
- from: olas salvajes del mar[a], que arrojan su propia vergüenza; estrellas errantes[b], para quienes la negrura de la oscuridad ha sido reservada para siempre.
  to: olas salvajes del mar, espumeando sus propias vergüenzas[a]; estrellas errantes, para quienes la negrura de la oscuridad[b] ha sido reservada para siempre.
  rationale: La revisión corrige la colocación de las notas, restituye la imagen explícita de espuma en ἐπαφρίζοντα mediante 'espumeando', y conserva mejor el plural enfático de αἰσχύνας con 'sus propias vergüenzas'. Se mantienen 'estrellas errantes', 'para quienes', 'ha sido reservada' y 'para siempre' por su buena fidelidad y naturalidad. Aunque 'la negrura de la oscuridad' es algo pesada, sigue de cerca la intensificación poética del griego y del rastro POB; la alternativa queda en nota.
