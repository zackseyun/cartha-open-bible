  text: κύματα ἄγρια θαλάσσης ἐπαφρίζοντα τὰς ἑαυτῶν αἰσχύνας, ἀστέρες πλανῆται οἷς ὁ ζόφος τοῦ σκότους εἰς αἰῶνα τετήρηται.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/013.yaml
  text: wild waves of the sea[a], foaming up their own shames; wandering stars[b], for whom the gloom of darkness has been reserved forever.
  footnotes:
