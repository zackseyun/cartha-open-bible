revisions:
- from: Así como Sodoma y Gomorra y las ciudades alrededor de ellas[a], habiendo cometido inmoralidad sexual de la misma manera y yéndose tras otra carne[b], están puestas como ejemplo, sufriendo el castigo del fuego eterno.
  to: Así como Sodoma y Gomorra y las ciudades alrededor de ellas[a], que de igual modo cometieron inmoralidad sexual y fueron tras otra carne[b], son expuestas como ejemplo, sufriendo el castigo del fuego eterno.
  rationale: Se reordenó la cláusula participial para que la comparación ('de igual modo') suene natural en español y preserve mejor el alcance del griego. Se cambió 'yéndose tras' por 'fueron tras' para una expresión más idiomática. Se sustituyó 'están puestas como ejemplo' por 'son expuestas como ejemplo', que refleja mejor πρόκεινται δεῖγμα en español claro y digno. También se ajustó la redacción de la nota [a] para evitar un calco poco natural.
