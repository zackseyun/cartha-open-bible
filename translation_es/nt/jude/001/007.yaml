review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general el sentido del griego y sigue bien la línea del English POB: comparación con Sodoma y Gomorra, inmoralidad sexual, ir tras ''otra carne'', ejemplo de juicio y castigo de fuego eterno. Sin embargo, presenta dos desajustes importantes: (1) la nota [b] está anclada a ''otra carne'' pero su contenido en realidad explica la alternativa completa ''otra/diferente carne'', mientras que la nota inglesa [b] fue asociada a ''an example'' por un desliz editorial; en español conviene anclarla directamente a ''otra carne'' para evitar ambigüedad, lo cual ya hace el borrador y es correcto; (2) más significativamente, ''de la misma manera'' colocada después de ''habiendo cometido inmoralidad sexual'' suena menos natural y puede sugerir que modifica solo ese verbo. El griego τὸν ὅμοιον τρόπον τούτοις modifica el complejo participial, por lo que en español conviene una colocación más clara. Además, ''están puestas como ejemplo'' es gramatical
    pero algo torpe e impersonal para πρόκεινται δεῖγμα.'
  spanish_quality_summary: El texto es comprensible, digno y mayormente natural, pero puede mejorarse en fluidez y precisión idiomática. 'Habiendo cometido inmoralidad sexual de la misma manera' resulta algo rígido; 'que de igual modo cometieron inmoralidad sexual' o 'habiendo de igual modo cometido inmoralidad sexual' fluye mejor. 'Yéndose tras' no es incorrecto, pero 'fueron tras' o 'se fueron tras' evita una forma gerundial reflexiva algo forzada. 'Están puestas como ejemplo' es menos natural que 'han sido puestas como ejemplo' o 'son puestas como ejemplo/expuestas como ejemplo'. La nota [a] debería decir 'de la misma manera que estos' en vez de 'en la misma manera que estos', que suena calcado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Nombres propios bien en español. σάρξ se mantiene como 'carne', correctamente sin interpretarla en exceso. No aparecen términos sensibles del glosario mayor como Yahvé/Mesías/esclavo. La opción 'inmoralidad sexual' está alineada con la decisión del POB para ἐκπορνεύσασαι.
  issues:
