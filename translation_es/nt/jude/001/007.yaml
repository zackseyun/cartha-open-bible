source:
  edition: SBLGNT
  text: ὡς Σόδομα καὶ Γόμορρα καὶ αἱ περὶ αὐτὰς πόλεις, τὸν ὅμοιον ⸂τρόπον τούτοις⸃ ἐκπορνεύσασαι καὶ ἀπελθοῦσαι ὀπίσω σαρκὸς ἑτέρας, πρόκεινται δεῖγμα πυρὸς αἰωνίου δίκην ὑπέχουσαι.
base_translation:
  language: en
  yaml_path: translation/nt/jude/001/007.yaml
  text: just as Sodom and Gomorrah and the cities around them[a], having in like manner committed sexual immorality and gone after other flesh, are set forth as an example[b], undergoing the punishment of eternal fire.
  footnotes:
  - marker: a
    text: Or, more fully, 'in the same way as these'; the pronoun 'these' may refer to the angels mentioned in the previous verse or more generally to the preceding examples of rebellion and judgment.
    reason: alternative_reading
  - marker: b
    text: Or 'different flesh'; traditionally 'strange flesh.' The phrase is rendered literally and not narrowed in translation to one specific interpretation.
    reason: lexical_alternative
