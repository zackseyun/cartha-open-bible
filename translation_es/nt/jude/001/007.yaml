translation:
  language: es
  text: Así como Sodoma y Gomorra y las ciudades alrededor de ellas[a], que de igual modo cometieron inmoralidad sexual y fueron tras otra carne[b], son expuestas como ejemplo, sufriendo el castigo del fuego eterno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más plenamente, 'de la misma manera que estos'; el pronombre 'estos' puede referirse a los ángeles mencionados en el versículo anterior o, de modo más general, a los ejemplos precedentes de rebelión y juicio.
    reason: alternative_reading
  - marker: b
    text: O, 'carne diferente'; tradicionalmente, 'carne extraña'. La frase se vierte de manera literal y no se estrecha en la traducción a una interpretación específica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: Introduce la comparación de manera natural en español y conserva el valor comparativo directo del griego.
- source_word: Σόδομα καὶ Γόμορρα
  english_pob_choice: Sodom and Gomorrah
  chosen_spanish: Sodoma y Gomorra
  alternatives_spanish:
  - Sodoma y Gómorra
  lexicon: Tradición transliterada estándar
  rationale: Se conservan los nombres propios bíblicos en su forma española usual, sin explicar ni adaptar el referente.
- source_word: αἱ περὶ αὐτὰς πόλεις
  english_pob_choice: the cities around them
  chosen_spanish: las ciudades alrededor de ellas
  alternatives_spanish:
  - las ciudades circundantes
  - las ciudades que estaban alrededor de ellas
  lexicon: BDAG
  rationale: περί con acusativo expresa ubicación en torno a algo; 'alrededor de ellas' preserva el sentido espacial y mantiene la referencia femenina concordando con 'ciudades'.
- source_word: τὸν ὅμοιον τρόπον τούτοις
  english_pob_choice: having in like manner
  chosen_spanish: de la misma manera
  alternatives_spanish:
  - de modo semejante
  - en manera semejante
  - como estos
  lexicon: BDAG
  rationale: La frase adverbial se vuelve naturalmente 'de la misma manera' en español. No se especifica el antecedente de τούτοις en el texto principal, preservando la ambigüedad documentada.
- source_word: ἐκπορνεύσασαι
  english_pob_choice: having committed sexual immorality
  chosen_spanish: habiendo cometido inmoralidad sexual
  alternatives_spanish:
  - habiendo practicado inmoralidad sexual
  - habiendo caído en inmoralidad sexual
  lexicon: BDAG
  rationale: El verbo intensifica πορνεύω y se traduce de forma explícita pero sobria, evitando eufemismos y manteniendo el valor moral/sexual del término.
- source_word: ἀπελθοῦσαι ὀπίσω
  english_pob_choice: gone after
  chosen_spanish: yéndose tras
  alternatives_spanish:
  - yendo tras
  - siguiendo tras
  lexicon: BDAG
  rationale: La locución idiomática se expresa de forma natural en español con 'irse tras', conservando la idea de persecución o seguimiento.
- source_word: σαρκὸς ἑτέρας
  english_pob_choice: other flesh
  chosen_spanish: otra carne
  alternatives_spanish:
  - carne diferente
  - carne extraña
  lexicon: BDAG
  rationale: Se mantiene la literalidad de σάρξ como 'carne', porque el texto permite una amplitud semántica que no debe estrecharse interpretativamente. 'Otra carne' reproduce la tensión léxica sin resolverla.
- source_word: πρόκεινται
  english_pob_choice: are set forth
  chosen_spanish: están puestas
  alternatives_spanish:
  - están expuestas
  - quedan puestas
  lexicon: BDAG
  rationale: El verbo comunica una presentación visible o exhibición como caso de advertencia; 'están puestas' conserva el matiz de estar colocadas ante la vista en estilo natural.
- source_word: δεῖγμα
  english_pob_choice: an example
  chosen_spanish: como ejemplo
  alternatives_spanish:
  - como señal
  - como muestra
  lexicon: BDAG
  rationale: δεῖγμα designa algo exhibido como ejemplo. En español, 'como ejemplo' transmite el valor ejemplar sin añadir más que el griego.
- source_word: πυρὸς αἰωνίου
  english_pob_choice: of eternal fire
  chosen_spanish: del fuego eterno
  alternatives_spanish:
  - del fuego perpetuo
  - del fuego de eternidad
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de modo directo y solemne. 'Eterno' preserva la fuerza temporal/escatológica del adjetivo αἰώνιος.
- source_word: δίκην ὑπέχουσαι
  english_pob_choice: undergoing the punishment
  chosen_spanish: sufriendo el castigo
  alternatives_spanish:
  - soportando la pena
  - padeciendo el castigo
  lexicon: BDAG
  rationale: La expresión judicial se traduce con el sustantivo 'castigo', que en español comunica la carga penal de δίκη; 'sufriendo' mantiene el participio descriptivo.
theological_decisions:
- issue: Referente de τούτοις en la comparación
  english_pob_reading: Render the comparison non-specifically in the main text, without forcing a referent.
  chosen_spanish_reading: Se conserva la comparación sin identificar en el texto principal a quién refiere 'estos'.
  alternative_spanish_readings:
  - de la misma manera que estos, refiriéndose a los ángeles del versículo anterior
  - como estos, refiriéndose en general a los ejemplos previos de rebelión y juicio
  rationale: El griego permite una comparación clara, pero el antecedente de τούτοις es debatido. La traducción española evita resolver la ambigüedad en el cuerpo principal, siguiendo el principio de no borrar tensiones documentadas.
  doctrine_reference: 'Translation philosophy: preservar tensiones textuales y no imponer una resolución interpretativa donde el griego no la fija.'
- issue: Sentido de σαρκὸς ἑτέρας
  english_pob_reading: Translate literally as 'other flesh' without specifying the exact nature of the transgression.
  chosen_spanish_reading: Se mantiene 'otra carne' sin precisar en la traducción si se trata de una clase de transgresión concreta.
  alternative_spanish_readings:
  - carne extraña
  - práctica homosexual
  - transgresión de límites entre ángeles y humanos
  rationale: El texto griego es deliberadamente abierto y su trasfondo interpretativo es debatido. 'Otra carne' preserva la formulación literal y deja la interpretación al lector y a las notas, sin importar una lectura doctrinal no explicitada por el versículo.
  doctrine_reference: 'Translation philosophy: no importar una interpretación doctrinal que el texto no declare explícitamente.'
- issue: Fuerza de πυρὸς αἰωνίου
  english_pob_reading: Retain 'eternal fire' as the text's own expression.
  chosen_spanish_reading: Se conserva 'fuego eterno' como expresión propia del texto.
  alternative_spanish_readings:
  - fuego perpetuo
  - fuego sin fin
  rationale: La frase se traduce de manera directa, manteniendo la solemnidad y el alcance escatológico sin expandirla hacia una formulación sistemática más amplia que la del versículo.
  doctrine_reference: 'Translation philosophy: primacía del texto original; no ampliar ni suavizar el lenguaje de juicio.'
translation_notes:
  revision_awareness: La versión inglesa auditada mantuvo recientemente 'having in like manner committed sexual immorality' para alinearse más de cerca con τὸν ὅμοιον τρόπον y ἐκπορνεύσασαι. La redacción española sigue esa precisión al expresar 'habiendo cometido inmoralidad sexual de la misma manera', y conserva la literalidad de 'otra carne' para no resolver la ambigüedad interpretativa. También se mantiene la lectura de juicio con 'fuego eterno' y 'castigo'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' no aplica aquí, porque el versículo no contiene el Tetragrámaton ni una cita directa del nombre divino.
  - '''carne'' se conserva para σάρξ conforme al criterio léxico, sin sustituirlo por ''naturaleza humana'' u otra paráfrasis.'
  - '''castigo'' se emplea para δίκη/ὑπέχουσαι por su valor judicial, evitando suavizar la pena.'
  - La puntuación y el orden reflejan una sintaxis española fluida sin borrar la estructura participial del griego.
