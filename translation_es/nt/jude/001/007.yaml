    issue: Ubicación y formulación de 'de la misma manera' poco natural y potencialmente restrictiva
    rationale: τὸν ὅμοιον τρόπον τούτοις expresa la manera del conjunto participial. En el borrador, 'habiendo cometido inmoralidad sexual de la misma manera' suena rígido y puede hacer pensar que la comparación modifica solo 'cometido inmoralidad sexual'.
  - severity: medium
    issue: '''Están puestas como ejemplo'' suena torpe para πρόκεινται δεῖγμα'
    rationale: Aunque semánticamente cercano, en español bíblico-legible es más natural 'son expuestas como ejemplo' o 'han sido puestas como ejemplo'. El presente simple pasivo perifrástico del borrador resulta poco idiomático.
  - severity: low
    issue: 'Redacción de la nota [a]: ''en la misma manera que estos'''
    rationale: La expresión más natural y correcta en español es 'de la misma manera que estos' o 'de igual manera que estos'.
