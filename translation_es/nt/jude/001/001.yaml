revisions:
- from: Judas[a], esclavo de Jesús el Mesías y hermano de Jacobo, a los que, en Dios el Padre, son amados y guardados para Jesús el Mesías[b], llamados.
  to: Judas, esclavo de Jesús el Mesías y hermano de Jacobo, a los llamados, amados en Dios Padre[a] y guardados para Jesús el Mesías[b].
  rationale: 'Se reordena la frase para reflejar mejor el paralelismo del griego y producir un español más natural: «llamados, amados..., y guardados...». Se elimina la nota sobre «Jude» por ser una convención inglesa no necesaria en español, y se añade la variante textual importante sobre «santificados». Se mantiene «esclavo» y «Mesías» conforme a la política terminológica del proyecto, así como «guardados para» con nota alternativa «por» para preservar la ambigüedad del dativo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general bien la estructura griega: δοῦλος como «esclavo», Χριστός como título «Mesías», ἐν θεῷ πατρὶ como «en Dios el Padre», y τετηρημένοις con dativo como «guardados para» con nota alternativa «por». Sin embargo, omite una nota textual importante presente en la auditoría inglesa para ἠγαπημένοις/ἡγιασμένοις, y la apertura «Judas[a]» con nota «O ‘Jude’» no es la mejor solución en español, donde «Judas» es natural y la nota inglesa respondía a convención inglesa, no a una ambigüedad fuente que el español deba replicar.'
  spanish_quality_summary: El español es mayormente claro, pero «a los que, en Dios el Padre, son amados y guardados para Jesús el Mesías, llamados» suena algo forzado por el inciso y por «son amados». Una redacción más natural y fiel es «a los llamados, amados en Dios Padre[a] y guardados para Jesús el Mesías[b]». Esto preserva mejor el paralelismo de los tres modificadores dativos y mejora la legibilidad eclesial sin parafrasear. «Dios Padre» fluye mejor que «Dios el Padre» en esta línea epistolar.
  glossary_alignment: 'Alineación buena con la terminología POB en puntos clave: «Mesías» en vez de «Cristo», «esclavo» para δοῦλος, «Jesús» correcto. No hay asunto de Yahvé en este versículo. Debe añadirse la variante textual «santificados» en nota, y conviene eliminar la nota sobre «Jude», que no responde a una necesidad léxica del español.'
  issues:
  - severity: medium
    issue: Falta la nota textual sobre ἠγαπημένοις / ἡγιασμένοις
    rationale: La auditoría inglesa conserva esta variante significativa. El español debe preservarla también, especialmente porque afecta una palabra teológicamente importante del saludo.
  - severity: medium
    issue: La construcción principal suena poco natural en español
    rationale: «a los que, en Dios el Padre, son amados y guardados..., llamados» interrumpe el flujo y debilita el paralelismo griego entre «llamados», «amados» y «guardados».
  - severity: low
    issue: Nota innecesaria sobre «Jude»
    rationale: En español no hace falta importar la convención inglesa que distingue Jude/Judas. «Judas» representa bien Ἰούδας; la nota no preserva una alternativa fuente relevante para el lector hispano.
  revised_spanish_text: Judas, esclavo de Jesús el Mesías y hermano de Jacobo, a los llamados, amados en Dios Padre[a] y guardados para Jesús el Mesías[b].
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos dicen «santificados en Dios Padre» en lugar de «amados en Dios Padre».
    reason: textual_variant
  - marker: b
    text: O «guardados por Jesús el Mesías». El dativo griego puede entenderse como agencia («por») o dirección/beneficio («para»).
    reason: alternative_reading
  revision_rationale: 'Se reordena la frase para reflejar mejor el paralelismo del griego y producir un español más natural: «llamados, amados..., y guardados...». Se elimina la nota sobre «Jude» por ser una convención inglesa no necesaria en español, y se añade la variante textual importante sobre «santificados». Se mantiene «esclavo» y «Mesías» conforme a la política terminológica del proyecto, así como «guardados para» con nota alternativa «por» para preservar la ambigüedad del dativo.'
