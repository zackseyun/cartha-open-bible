translation:
  language: es
  text: Judas, esclavo de Jesús el Mesías y hermano de Jacobo, a los llamados, amados en Dios Padre[a] y guardados para Jesús el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos dicen «santificados en Dios Padre» en lugar de «amados en Dios Padre».
    reason: textual_variant
  - marker: b
    text: O «guardados por Jesús el Mesías». El dativo griego puede entenderse como agencia («por») o dirección/beneficio («para»).
    reason: alternative_reading
lexical_decisions:
- source_word: Ἰούδας
  english_pob_choice: Jude
  chosen_spanish: Judas
  alternatives_spanish:
  - Jude
  lexicon: BDAG
  rationale: En español, el nombre propio se conserva como Judas/Judas Tadeo según el contexto canónico; aquí el nombre del autor se rinde como Judas para seguir la forma del griego Ἰούδας. Se evita una sustitución no basada en el texto fuente.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - servidor
  lexicon: BDAG
  rationale: El término expresa pertenencia y sujeción vinculada; 'esclavo' preserva la fuerza lexical de δοῦλος y coincide con la decisión auditada del POB en inglés.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesús el Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona como título, no solo como parte fija del nombre; por eso se traduce 'Mesías' según la directriz doctrinal. 'Cristo' se evita aquí para no perder el valor titular.
- source_word: ἀδελφὸς δὲ Ἰακώβου
  english_pob_choice: and brother of James
  chosen_spanish: hermano de Jacobo
  alternatives_spanish:
  - y hermano de Jacobo
  - pero hermano de Jacobo
  lexicon: BDAG
  rationale: 'El δέ introduce una continuidad suave y no exige un adversativo fuerte. En español, la coordinación se vuelve natural con la pausa nominal: ''hermano de Jacobo''. ''Jacobo'' sigue la convención NT para Ἰάκωβος.'
- source_word: ἐν θεῷ πατρὶ
  english_pob_choice: in God the Father
  chosen_spanish: en Dios el Padre
  alternatives_spanish:
  - por Dios el Padre
  - para Dios el Padre
  lexicon: BDAG
  rationale: La preposición ἐν conserva mejor su sentido de esfera/ubicación relacional. 'En Dios el Padre' mantiene la cercanía teológica sin resolver en exceso la relación.
- source_word: ἠγαπημένοις
  english_pob_choice: loved
  chosen_spanish: amados
  alternatives_spanish:
  - amados desde siempre
  - amados y habiendo sido amados
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo señala un estado resultante de una acción pasada: son los que permanecen en condición de amados. ''Amados'' es idiomático en español y suficientemente transparente. Se evita ''amados'' como simple adjetivo devocional sin perder el sentido resultativo.'
- source_word: τετηρημένοις
  english_pob_choice: kept for
  chosen_spanish: guardados para
  alternatives_spanish:
  - guardados por
  - preservados para
  - custodiados para
  lexicon: BDAG
  rationale: La forma perfecta pasiva expresa conservación continua. El dativo con Ἰησοῦ Χριστῷ admite agencia o dirección; 'para' preserva la ambigüedad auditada del inglés POB entre 'by' y 'for', sin resolverla dogmáticamente.
- source_word: κλητοῖς
  english_pob_choice: called ones
  chosen_spanish: llamados
  alternatives_spanish:
  - los llamados
  - llamados por Dios
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente para los destinatarios. En español, 'llamados' mantiene la fuerza de participación en el llamado divino sin agregar un sustantivo innecesario.
- source_word: Ἰάκωβος
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: BDAG
  rationale: La tradición NT española admite 'Jacobo' y 'Santiago'; aquí 'Jacobo' refleja de manera más directa el nombre griego Ἰάκωβος y evita una forma tradicional más alejada del original.
theological_decisions:
- issue: Relación de τετηρημένοις con Ἰησοῦ Χριστῷ
  english_pob_reading: kept for Jesus the Messiah
  chosen_spanish_reading: guardados para Jesús el Mesías
  alternative_spanish_readings:
  - guardados por Jesús el Mesías
  rationale: El dativo tras τηρέω es genuinamente debatido. 'Para' conserva la lectura de preservación orientada a Cristo y no excluye la agencia de Cristo en otros textos. Se deja la tensión sin resolver de forma dogmática.
  doctrine_reference: 'Translation philosophy: preservar tensión lexical y teológica cuando el griego es ambiguo.'
- issue: Variación textual en ἠγαπημένοις / ἡγιασμένοις
  english_pob_reading: loved in God the Father
  chosen_spanish_reading: amados en Dios el Padre
  alternative_spanish_readings:
  - santificados en Dios el Padre
  rationale: Se sigue el texto base SBLGNT 'ἠγαπημένοις'. La variante 'santificados' se conserva como alternativa textual significativa, pero no reemplaza la lectura principal.
  doctrine_reference: Primacía del texto fuente; preservar variantes relevantes en notas.
- issue: Valor cristológico de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se traduce el título como 'Mesías' para mantener su sentido semántico y evitar que se opaque como mero elemento nominal.
  doctrine_reference: 'Terminología POB: traducir títulos cuando el contexto lo permite y el sentido se conserva mejor.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que eliminó el 'and' extra antes de 'called'; en español se refleja la estructura paralela con 'amados', 'guardados' y 'llamados' sin añadir una conjunción innecesaria. También se respetó la decisión auditada de traducir Χριστός como 'Mesías' y de mantener la ambigüedad del dativo en τετηρημένοις.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός, conforme a la terminología POB y a la función titular del término.
  - Se usó 'esclavo' para δοῦλος por su fuerza lexical y doctrinal, no 'siervo'.
  - Se empleó 'Jacobo' para Ἰάκωβος según convención NT española y cercanía al griego.
  - La puntuación reproduce la lista de autodescripción y la serie de participios sin añadir conectores no presentes en el griego.
  - Los marcadores de nota [a] y [b] aparecen exactamente en el texto español y se corresponden con notas realmente ancladas.
