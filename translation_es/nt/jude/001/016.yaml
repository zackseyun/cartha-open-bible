translation:
  language: es
  text: Estos son murmuradores, descontentos, andando conforme a sus propios deseos[a], y su boca habla cosas arrogantes[b], mostrando favoritismo[c] por sacar provecho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «siguiendo sus propias pasiones».'
    reason: alternative_reading
  - marker: b
    text: 'O: «su boca habla palabras infladas».'
    reason: alternative_reading
  - marker: c
    text: Literalmente, «admirando rostros»; un modismo para mostrar parcialidad o favor hacia personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: γογγυσταί
  english_pob_choice: grumblers
  chosen_spanish: murmuradores
  alternatives_spanish:
  - quejosos
  - murmuradores
  lexicon: BDAG
  rationale: El término describe a personas caracterizadas por quejarse en voz baja o murmurar. En español, «murmuradores» conserva el matiz verbal y el tono de reproche con naturalidad.
- source_word: μεμψίμοιροι
  english_pob_choice: malcontents
  chosen_spanish: descontentos
  alternatives_spanish:
  - malcontentos
  - quejosos de su suerte
  lexicon: BDAG
  rationale: El vocablo raro apunta a quienes están resentidos o insatisfechos con su condición. «Descontentos» comunica esa insatisfacción asentada sin sonar artificial; «malcontentos» sería posible, pero menos natural para lectura pública.
- source_word: κατὰ τὰς ἐπιθυμίας αὐτῶν πορευόμενοι
  english_pob_choice: walking according to their own desires
  chosen_spanish: andando conforme a sus propios deseos
  alternatives_spanish:
  - siguiendo sus propias pasiones
  - viviendo según sus propios deseos
  lexicon: BDAG
  rationale: πορεύομαι en participio expresa conducta o manera de vivir; «andando conforme a» mantiene la imagen de conducta continua. ἐπιθυμίαι puede abarcar deseos en general, y «deseos» permite que el contexto marque su carácter moralmente desordenado.
- source_word: τὸ στόμα αὐτῶν λαλεῖ ὑπέρογκα
  english_pob_choice: their mouth speaks arrogant things
  chosen_spanish: su boca habla cosas arrogantes
  alternatives_spanish:
  - su boca habla palabras infladas
  - su boca pronuncia palabras altivas
  lexicon: BDAG
  rationale: Se conserva el singular «su boca» como en el griego. ὑπέρογκα comunica habla inflada, excesiva y orgullosa; «cosas arrogantes» es claro en español moderno y mantiene el juicio moral del pasaje.
- source_word: θαυμάζοντες πρόσωπα
  english_pob_choice: showing favoritism
  chosen_spanish: mostrando favoritismo
  alternatives_spanish:
  - admirando rostros
  - adulando a las personas
  lexicon: BDAG
  rationale: 'La expresión es idiomática: literalmente «admirando rostros», pero el sentido es la parcialidad o preferencia interesada por personas. «Mostrando favoritismo» comunica el idiomático con claridad. Se conserva en nota la alternativa literal.'
- source_word: ὠφελείας χάριν
  english_pob_choice: for the sake of gain
  chosen_spanish: por ganancia
  alternatives_spanish:
  - por provecho
  - por interés
  lexicon: BDAG
  rationale: La frase expresa motivo de beneficio. «Por ganancia» es breve y transparente; en el contexto denunciatorio suena apropiadamente sospechoso y evita suavizar el interés egoísta.
- source_word: οὗτοί εἰσιν
  english_pob_choice: These are
  chosen_spanish: Estos son
  alternatives_spanish:
  - Estas personas son
  - Son estos
  lexicon: BDAG
  rationale: Es una identificación directa y tersa, bien reproducida por «Estos son».
theological_decisions:
- issue: Traducción de ἐπιθυμίαι en contexto moral
  english_pob_reading: desires in the main text, with the context supplying the negative moral sense
  chosen_spanish_reading: deseos en el texto principal, dejando que el contexto aporte el sentido moral negativo
  alternative_spanish_readings:
  - pasiones
  - deseos desordenados
  - codicias
  rationale: El griego puede significar deseos en general, pero aquí el contexto polémico indica impulso egoísta y desviado. «Deseos» evita restringir demasiado el alcance y mantiene la tensión moral mediante el contexto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido idiomático de θαυμάζοντες πρόσωπα
  english_pob_reading: showing favoritism
  chosen_spanish_reading: mostrando favoritismo
  alternative_spanish_readings:
  - haciendo acepción de personas
  - adulando a la gente
  - mostrando parcialidad
  rationale: La imagen literal «admirar rostros» no comunica bien en español moderno. El sentido ético del griego es parcialidad interesada; «favoritismo» la expresa con precisión sin perder la carga moral.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente solo eliminó el punto y coma para hacer más fluida la oración; no cambió el contenido. El borrador español refleja fielmente ese mismo contenido y conserva las tres unidades descriptivas principales del versículo: murmuración/descontento, conducta guiada por deseos propios, y habla arrogante con favoritismo interesado.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa lenguaje contemporáneo de registro eclesial sin arcaísmos innecesarios.
  - La nota a pie de página a conserva el modismo literal del griego porque el español necesita la equivalencia idiomática en el texto principal.
  - «Favoritismo» se eligió para no diluir la crítica moral con una expresión más débil como «simpatía» o «preferencia».
