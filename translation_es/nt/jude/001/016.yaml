review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: identifica a los falsos maestros, conserva la secuencia de participios, mantiene el singular idiomático «su boca» y traduce correctamente el modismo θαυμάζοντες πρόσωπα como parcialidad/favoritismo. Sin embargo, hay dos desajustes importantes con el expediente inglés y con la evidencia fuente: la nota [a] está anclada en «murmuradores», pero el literal «admirando rostros» corresponde a θαυμάζοντες πρόσωπα, no a γογγυσταί; y «por ganancia» suena menos natural e incompleto que una formulación motivacional como «por sacar provecho» o «por interés».'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible. «Descontentos» funciona bien para μεμψίμοιροι. «Andando conforme a sus propios deseos» es aceptable, aunque algo más natural sería «viviendo» o «andando según». «Mostrando favoritismo» es correcto. El principal problema de calidad es la mala colocación de la nota [a], que induce a error exegético, y una leve falta de naturalidad en «por ganancia».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, esclavo, etc. Las decisiones «deseos» para ἐπιθυμίαι y «favoritismo» para θαυμάζοντες πρόσωπα concuerdan con la racionalidad léxica y teológica documentada. Conviene mantener la nota literal en el lugar correcto del modismo.
  issues:
  - severity: high
    issue: La nota [a] está anclada en el término equivocado.
    rationale: La nota dice «Literalmente, “admirando rostros”», pero está puesta tras «murmuradores». Ese literal corresponde a θαυμάζοντες πρόσωπα, al final del versículo. Tal como está, el aparato confunde al lector sobre qué expresión griega se está aclarando.
  - severity: medium
    issue: «Por ganancia» es menos natural y menos preciso que una expresión motivacional en español.
    rationale: ὠφελείας χάριν expresa motivo o finalidad de provecho. En español bíblico-natural, «por sacar provecho», «por interés» o «por obtener beneficio» comunican mejor la idea de actuar por ventaja personal que el sintagma algo brusco «por ganancia».
  - severity: low
    issue: La correspondencia de notas con el expediente inglés no está bien conservada.
    rationale: El expediente inglés preserva la alternativa literal para θαυμάζοντες πρόσωπα y dos alternativas más para otras expresiones. El español sí las incluye, pero la reubicación y orden de marcadores deben corregirse para mantener trazabilidad limpia.
  revised_spanish_text: Estos son murmuradores, descontentos, andando conforme a sus propios deseos[a], y su boca habla cosas arrogantes[b], mostrando favoritismo[c] por sacar provecho.
