translation:
  language: es
  text: 'Y estas señales acompañarán a los que han creído: en mi nombre expulsarán demonios[b]; hablarán en lenguas[a] nuevas.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «idiomas». El griego puede referirse a lenguas o idiomas en general; «lenguas» conserva aquí la ambigüedad de la expresión.
    reason: lexical_alternative
  - marker: b
    text: La traducción tradicional suele tener «seguirán». El verbo griego también puede significar «acompañarán», destacando que estas señales van con los que han creído.
    reason: lexical_alternative
lexical_decisions:
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales attestativas
  lexicon: BDAG
  rationale: σήμεῖα designa señales que confirman o evidencian; en español, «señales» conserva el valor evidencial sin forzar «milagros», que sería más interpretativo.
- source_word: τοῖς πιστεύσασιν
  english_pob_choice: those who have believed
  chosen_spanish: a los que han creído
  alternatives_spanish:
  - a los que creen
  - a los creyentes
  lexicon: BDAG
  rationale: El participio aoristo admite un sentido de fe ya ingresada; «han creído» refleja ese matiz mejor que un presente puramente general, y sigue siendo natural en español.
- source_word: παρακολουθήσει
  english_pob_choice: will accompany
  chosen_spanish: acompañarán
  alternatives_spanish:
  - seguirán
  - irán detrás de
  lexicon: BDAG
  rationale: El verbo expresa acompañamiento más que mera secuencia. En español, «acompañarán» comunica esa cercanía funcional mejor que «seguirán».
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus impuros
  lexicon: BDAG
  rationale: δαιμόνια significa directamente «demonios»; «espíritus impuros» introduciría otra expresión distinta del griego.
- source_word: ἐκβαλοῦσιν
  english_pob_choice: will cast out
  chosen_spanish: expulsarán
  alternatives_spanish:
  - echarán fuera
  - arrojarán fuera
  lexicon: BDAG
  rationale: En castellano, «expulsarán» transmite bien la fuerza exorcística de ἐκβάλλω sin sonar artificial; mantiene la idea de sacar fuera con autoridad.
- source_word: γλώσσαις
  english_pob_choice: tongues
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - tongues
  lexicon: BDAG
  rationale: γλῶσσα puede referirse a lenguas o idiomas. «Lenguas» preserva la ambigüedad del término en un registro bíblico natural para el español, sin resolver de antemano si se trata de idiomas humanos o de habla carismática.
- source_word: καιναῖς
  english_pob_choice: new
  chosen_spanish: nuevas
  alternatives_spanish:
  - extrañas
  - recientes
  lexicon: BDAG
  rationale: καινός expresa novedad de clase o cualidad; «nuevas» es la equivalencia más directa y deja abierta la precisión del matiz.
theological_decisions:
- issue: Naturaleza de las «lenguas»
  english_pob_reading: Render as 'tongues' in the main text without specifying whether these are human languages or ecstatic utterances.
  chosen_spanish_reading: Mantener «lenguas» en el texto principal sin definir si son idiomas humanos o habla extática.
  alternative_spanish_readings:
  - idiomas
  - habla extática
  rationale: El griego γλώσσαις no especifica con total precisión la fenomenología. Traducir «lenguas» preserva la tensión interpretativa y evita imponer una lectura confesional o denominacional.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; se mantuvo la lectura auditada del texto inglés y se ajustó el español para una publicación natural sin perder la ambigüedad de γλώσσαις ni el valor de acompañamiento de παρακολουθέω.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «señales» y «milagros» para respetar el valor evidencial de σημεῖα.
  - Se evitó «seguirán» en el cuerpo principal porque podría sugerir mera sucesión temporal y no acompañamiento.
  - «Lenguas» se usa con nota para sostener la ambigüedad semántica del griego.
  - Se eligió un registro bíblico claro y contemporáneo, adecuado para lectura pública.
