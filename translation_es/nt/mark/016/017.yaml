  text: σημεῖα δὲ τοῖς πιστεύσασιν ⸂ταῦτα παρακολουθήσει⸃, ἐν τῷ ὀνόματί μου δαιμόνια ἐκβαλοῦσιν, γλώσσαις λαλήσουσιν ⸀καιναῖς,
base_translation:
  language: en
  yaml_path: translation/nt/mark/016/017.yaml
  text: 'And these signs will accompany those who have believed: in my name they will cast out demons[b][a]; they will speak in new tongues.'
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek can refer to languages more generally; 'tongues' preserves the ambiguity of the expression here.
    reason: lexical_alternative
  - marker: b
    text: Traditional English often has 'will follow.' The Greek verb can also mean 'will accompany,' emphasizing that these signs attend those who have believed.
    reason: lexical_alternative
