base_translation:
  language: en
  yaml_path: translation/nt/mark/016/007.yaml
  text: But go[a], tell his disciples and Peter, ‘He is going ahead of you into Galilee. There you will see him[b], just as he told you.’
  footnotes:
  - marker: a
    text: Peter is named separately from 'his disciples.' This may highlight his restoration after his denial, but the Greek does not explicitly say 'especially Peter.'
    reason: alternative_reading
  - marker: b
    text: Or 'to Galilee.' The Greek preposition can be rendered either 'into' or 'to' in this context.
    reason: lexical_alternative
