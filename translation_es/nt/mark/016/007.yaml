  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres y categorías principales están bien. La decisión teológica de no explicitar «especialmente Pedro» está correctamente preservada. La única corrección lexical importante es ajustar la forma verbal de comunicación y preferir «a Galilea» como texto principal, manteniendo la alternativa en nota.
