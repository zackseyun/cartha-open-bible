- from: Pero vayan[a] y díganle a sus discípulos y a Pedro que él va delante de ustedes hacia Galilea. Allí lo verán[b], tal como les dijo.
  to: Pero vayan[a] y digan a sus discípulos y a Pedro que él va delante de ustedes a Galilea. Allí lo verán[b], tal como les dijo.
  rationale: Se corrige un problema gramatical importante en español («díganle») para reflejar fielmente los destinatarios coordinados del griego sin introducir un clítico incorrecto. También se ajusta «hacia Galilea» a «a Galilea» como opción principal por mayor naturalidad y mejor correspondencia con el uso narrativo de εἰς, conservando la alternativa en nota.
