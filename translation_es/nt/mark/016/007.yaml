translation:
  language: es
  text: Pero vayan[a] y digan a sus discípulos y a Pedro que él va delante de ustedes a Galilea. Allí lo verán[b], tal como les dijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pedro aparece nombrado aparte de «sus discípulos». Esto puede resaltar su restauración después de su negación, pero el griego no dice explícitamente «especialmente Pedro».
    reason: alternative_reading
  - marker: b
    text: O «hacia Galilea». La preposición griega puede traducirse aquí como «a» o «hacia», según el matiz que se quiera resaltar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sino
  - Más bien
  lexicon: BDAG
  rationale: Marca contraste y transición. «Pero» conserva la fuerza adversativa de forma natural en español.
- source_word: ὑπάγετε
  english_pob_choice: go
  chosen_spanish: vayan
  alternatives_spanish:
  - vayan de camino
  - partan
  lexicon: BDAG
  rationale: Imperativo plural que ordena irse y ponerse en marcha; «vayan» es natural y mantiene la urgencia del mandato.
- source_word: εἴπατε
  english_pob_choice: tell
  chosen_spanish: díganle
  alternatives_spanish:
  - digan
  - avisen a
  lexicon: BDAG
  rationale: En contexto de mensaje directo a destinatarios concretos, «díganle» expresa bien la instrucción de comunicarlo.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: La relación posesiva se expresa de forma natural en español con «sus discípulos», sin perder la referencia a Jesús.
- source_word: καὶ τῷ Πέτρῳ
  english_pob_choice: and Peter
  chosen_spanish: y a Pedro
  alternatives_spanish:
  - y también a Pedro
  lexicon: BDAG
  rationale: La coordinación griega nombra a Pedro aparte de los discípulos; el español conserva esa separación sin añadir énfasis interpretativo en el texto principal.
- source_word: Προάγει
  english_pob_choice: He is going ahead of you
  chosen_spanish: él va delante de ustedes
  alternatives_spanish:
  - él va antes que ustedes
  - él los precede
  lexicon: BDAG
  rationale: El presente de προάγω indica ir delante/adelantarse. «Va delante de ustedes» es claro y fiel en español.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: hacia Galilea
  alternatives_spanish:
  - a Galilea
  - hasta Galilea
  lexicon: BDAG
  rationale: εἰς admite valor direccional; «hacia» evita forzar en español la imagen de entrada física y mantiene abierta la alternativa contextual de «a/para Galilea».
- source_word: ἐκεῖ
  english_pob_choice: There
  chosen_spanish: Allí
  alternatives_spanish:
  - Ahí
  - En ese lugar
  lexicon: BDAG
  rationale: Adverbio locativo simple; «Allí» es la correspondencia directa y natural.
- source_word: αὐτὸν ὄψεσθε
  english_pob_choice: you will see him
  chosen_spanish: lo verán
  alternatives_spanish:
  - lo verán a él
  - ustedes lo verán
  lexicon: BDAG
  rationale: Futuro de ver; el clítico directo «lo» comunica naturalmente el objeto masculino sin recargar la frase.
- source_word: καθὼς εἶπεν ὑμῖν
  english_pob_choice: just as he told you
  chosen_spanish: tal como les dijo
  alternatives_spanish:
  - tal como les había dicho
  - como les dijo
  lexicon: BDAG
  rationale: καθώς expresa correspondencia con la instrucción previa; «tal como» preserva esa equivalencia con estilo claro y sobrio.
theological_decisions:
- issue: La mención separada de Pedro después de «sus discípulos»
  english_pob_reading: Retain the plain coordinated wording 'his disciples and Peter' without making the implication explicit in the main text.
  chosen_spanish_reading: Conservar «sus discípulos y a Pedro» sin explicar en el texto principal si la mención subraya restauración o énfasis especial.
  alternative_spanish_readings:
  - sus discípulos, especialmente Pedro
  - sus discípulos, incluido Pedro
  rationale: El griego simplemente coordina a Pedro con los discípulos; no añade explícitamente «especialmente». La traducción mantiene la tensión narrativa sin resolverla interpretativamente.
  doctrine_reference: Preservar la tensión textual y narrativa sin sobreinterpretar.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado de alta concordancia se mantiene, sin ajustes necesarios respecto del texto fuente y del análisis inglés auditado.
  spanish_consistency_notes:
  - Se mantiene «Pedro» con mayúscula como nombre propio y «discípulos» en minúscula por uso común.
  - Se usa «ustedes» para el plural de segunda persona, coherente y neutral en español latinoamericano.
  - Se conserva el contraste inicial con «Pero» y el mandato doble con verbos en imperativo plural.
  - La ambigüedad direccional de εἰς se refleja en la nota para no cerrar innecesariamente el sentido entre «hacia» y «a».
