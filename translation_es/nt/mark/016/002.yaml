translation:
  language: es
  text: Y muy de madrugada, el primer día de la semana[a], ellas vienen[b] al sepulcro, cuando el sol había salido[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «en el primero de los sábados»; es un modismo que significa «el primer día de la semana».'
    reason: lexical_alternative
  - marker: b
    text: El presente histórico del griego, «vienen», se conserva para reflejar la vivacidad narrativa de Marcos; muchas traducciones usan pasado («vinieron»).
    reason: lexical_alternative
  - marker: c
    text: 'O: «cuando el sol había salido». El participio en genitivo absoluto señala el momento de su llegada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λίαν πρωῒ
  english_pob_choice: very early
  chosen_spanish: muy de madrugada
  alternatives_spanish:
  - muy temprano
  - muy de mañana
  - muy temprano por la mañana
  lexicon: BDAG
  rationale: La combinación intensifica el momento temprano del día. «Muy de madrugada» conserva la fuerza enfática de λίαν y πρωῒ sin sonar forzada en español.
- source_word: τῇ μιᾷ τῶν σαββάτων
  english_pob_choice: on the first day of the week
  chosen_spanish: el primer día de la semana
  alternatives_spanish:
  - el primero de los sábados
  - el primer día después del sábado
  lexicon: BDAG
  rationale: Se sigue el sentido idiomático semítico/greco del giro, no su literalidad. «El primer día de la semana» comunica el valor reconocido por el texto y mantiene la claridad natural en español.
- source_word: ἔρχονται
  english_pob_choice: they come
  chosen_spanish: ellas vienen
  alternatives_spanish:
  - ellas van
  - ellas llegan
  - vienen
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con una forma natural en español. «Vienen» refleja el movimiento hacia el lugar del relato y mantiene la vivacidad narrativa.
- source_word: ἐπὶ τὸ μνημεῖον
  english_pob_choice: to the tomb
  chosen_spanish: al sepulcro
  alternatives_spanish:
  - a la tumba
  - al sepulcro funerario
  lexicon: BDAG
  rationale: En este contexto de entierro, μνημεῖον se entiende como sepultura/tumba. «Sepulcro» es un equivalente digno y claro para el registro bíblico en español.
- source_word: ἀνατείλαντος τοῦ ἡλίου
  english_pob_choice: when the sun had risen
  chosen_spanish: cuando el sol ya había salido
  alternatives_spanish:
  - cuando había salido el sol
  - al haber salido el sol
  - después de que el sol hubo salido
  lexicon: BDAG
  rationale: El genitivo absoluto indica una circunstancia temporal concurrente o antecedente. «Cuando el sol ya había salido» preserva esa relación sin imponer una matiz más fuerte que el griego, siguiendo la revisión inglesa más cercana a la construcción original.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último ajuste del POB inglés, que prefirió «when the sun had risen» frente a «after the sun had risen» para no añadir un matiz temporal más fuerte que el griego. En español se reflejó con una cláusula temporal neutral («cuando el sol ya había salido»).
  spanish_consistency_notes:
  - Se mantuvo el presente histórico («vienen») como equivalente de ἔρχονται, en coherencia con la decisión inglesa.
  - Se eligió «sepulcro» para μνημεῖον por ser la opción natural y reverente en contexto funerario.
  - Se evitó «SEÑOR» u otras sustituciones no presentes, ya que este versículo no contiene el tetragrámaton ni κύριος con valor divino.
