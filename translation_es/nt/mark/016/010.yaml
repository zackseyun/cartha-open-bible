review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente la referencia anafórica («Ella»), la secuencia narrativa («fue») y el grupo destinatario («los que habían estado con él»). Sin embargo, la cláusula final en español usa «mientras estaban de luto y lloraban», que desplaza ligeramente la función atributiva de los participios πενθοῦσι καὶ κλαίουσιν. El inglés auditado corrigió precisamente «while they were» a «who were», y el griego modifica a «los que habían estado con él». Conviene reflejar eso con una relativa en español: «que estaban de luto y lloraban».'
  spanish_quality_summary: 'El español es claro y digno, pero «lo comunicó» suena algo menos natural y menos narrativo que «se lo comunicó» o «se lo contó». El problema principal es sintáctico: «mientras estaban...» introduce una circunstancia temporal más libre, cuando el texto identifica a los destinatarios como los que estaban en duelo. La frase revisada mejora fidelidad y fluidez.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. Las decisiones clave son adecuadas en general. «De luto» transmite bien πενθοῦσι, y «lloraban» transmite bien κλαίουσιν. Se recomienda ajustar la sintaxis para alinearse con la decisión inglesa documentada y con el valor atributivo de los participios.
  issues:
  - severity: medium
    issue: La cláusula «mientras estaban de luto y lloraban» no refleja con precisión la modificación atributiva del griego.
    rationale: πενθοῦσι καὶ κλαίουσιν describe a «los que habían estado con él». El historial de auditoría inglesa cambió explícitamente de «while they were» a «who were» por esta razón.
  - severity: low
    issue: «Lo comunicó» es comprensible, pero algo poco idiomático en este contexto narrativo.
    rationale: En español bíblico natural, «se lo comunicó» o «se lo contó» suele sonar más directo y fluido al transmitir una noticia a personas concretas. No es un error grave, pero una leve mejora estilística ayuda.
  - severity: low
    issue: La nota al pie conserva la alternativa inglesa previa con una puntuación algo forzada en español.
    rationale: La alternativa debe seguir siendo genuina y natural en español, reflejando la opción sintáctica sin crear ambigüedad innecesaria.
  revised_spanish_text: Ella fue y se lo comunicó a los que habían estado con él[a], que estaban de luto y lloraban.
  revised_footnotes:
  - marker: a
    text: 'O: «Ella fue y les contó a los que habían estado con él, que estaban de luto y lloraban.»'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «mientras estaban...» por «que estaban...» para reflejar la función atributiva de los participios griegos y alinearse con la revisión auditada del inglés. También se ajusta «lo comunicó» a «se lo comunicó» para un español más natural sin cambiar el sentido. La nota alternativa se conserva como opción léxica válida.
