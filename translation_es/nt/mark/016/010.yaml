translation:
  language: es
  text: Ella fue y se lo comunicó a los que habían estado con él[a], que estaban de luto y lloraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ella fue y les contó a los que habían estado con él, que estaban de luto y lloraban.»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκείνη
  english_pob_choice: She
  chosen_spanish: Ella
  alternatives_spanish:
  - Aquella
  - Esa
  lexicon: BDAG
  rationale: El demostrativo se refiere a María Magdalena del versículo anterior; en español, el pronombre personal femenino fluye mejor que un demostrativo literal y conserva la referencia anafórica.
- source_word: πορευθεῖσα
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - habiendo ido
  - fue y
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa de desplazarse antes del verbo principal. «Fue y» conserva la secuencia narrativa de manera natural en español.
- source_word: ἀπήγγειλεν
  english_pob_choice: reported it
  chosen_spanish: lo comunicó
  alternatives_spanish:
  - lo informó
  - lo anunció
  - lo contó
  lexicon: BDAG
  rationale: ἀπαγγέλλω implica comunicar o informar un mensaje. «Lo comunicó» mantiene el acto de transmitir una noticia; el objeto directo se sobreentiende por el contexto de la aparición/resurrección narrada en el versículo previo.
- source_word: τοῖς μετ’ αὐτοῦ γενομένοις
  english_pob_choice: to those who had been with him
  chosen_spanish: a los que habían estado con él
  alternatives_spanish:
  - a los que lo habían acompañado
  - a sus compañeros
  lexicon: BDAG
  rationale: La expresión identifica al grupo asociado con Jesús. «Habían estado con él» refleja bien la relación sin forzar un matiz más específico que el griego no exige.
- source_word: πενθοῦσι
  english_pob_choice: mourning
  chosen_spanish: estaban de luto
  alternatives_spanish:
  - estaban afligidos
  - estaban lamentándose
  - estaban en duelo
  lexicon: BDAG
  rationale: πενθέω denota luto o duelo, normalmente por pérdida o muerte. «De luto» conserva ese peso funerario con un registro natural y claro en español.
- source_word: κλαίουσιν
  english_pob_choice: weeping
  chosen_spanish: lloraban
  alternatives_spanish:
  - estaban llorando
  - sollozaban
  lexicon: BDAG
  rationale: κλαίω significa llorar o lamentarse con llanto. «Lloraban» es una traducción directa y sobria que mantiene el tono solemne.
theological_decisions:
- issue: Relación entre el participio modificado y el grupo destinatario
  english_pob_reading: who were mourning and weeping
  chosen_spanish_reading: mientras estaban de luto y lloraban
  alternative_spanish_readings:
  - que estaban de luto y lloraban
  - los cuales estaban de luto y lloraban
  rationale: El griego permite que los participios describan el estado concurrente del grupo. En español, «mientras estaban...» explicita la simultaneidad sin perder la referencia al mismo grupo, aunque también sería viable una relativa directa.
  doctrine_reference: Ninguna; decisión sintáctica y aspectual.
translation_notes:
  revision_awareness: La redacción sigue el patrón final del audit trail en inglés, que corrigió la relación de los participios para que modificaran directamente a «those who had been with him». En español, se mantuvo esa relación, pero se eligió una forma más natural («mientras estaban de luto y lloraban») para conservar la simultaneidad sin perder claridad.
  spanish_consistency_notes:
  - Se usa «él» para Jesús, coherente con el referente inmediato del contexto.
  - Se prefirió «comunicó» frente a «reportó» por naturalidad en español, sin rebajar el valor de anuncio/informe del verbo griego.
  - Se mantuvo «de luto» para preservar la fuerza funeraria de πενθέω.
  - La nota al pie ofrece una alternativa más literal con relativa directa, para dejar visible la posible construcción del griego.
