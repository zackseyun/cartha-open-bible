- from: Ella fue y lo comunicó a los que habían estado con él[a], mientras estaban de luto y lloraban.
  to: Ella fue y se lo comunicó a los que habían estado con él[a], que estaban de luto y lloraban.
  rationale: Se reemplaza «mientras estaban...» por «que estaban...» para reflejar la función atributiva de los participios griegos y alinearse con la revisión auditada del inglés. También se ajusta «lo comunicó» a «se lo comunicó» para un español más natural sin cambiar el sentido. La nota alternativa se conserva como opción léxica válida.
