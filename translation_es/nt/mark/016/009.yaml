translation:
  language: es
  text: Después de resucitar[a], muy temprano el primer día de la semana, apareció primero a María Magdalena, de quien había expulsado siete demonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Los versículos 9–20 faltan en algunos manuscritos antiguos de Marcos; otros manuscritos los incluyen, a veces con variaciones.
    reason: textual_variant
lexical_decisions:
- source_word: Ἀναστὰς
  english_pob_choice: after he had risen
  chosen_spanish: Después de haber resucitado
  alternatives_spanish:
  - habiendo resucitado
  - cuando resucitó
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente respecto del verbo principal. «Después de haber resucitado» expresa la secuencia con claridad natural en español sin perder la relación temporal del griego.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Pero
  lexicon: BDAG
  rationale: δὲ aporta una transición suave. En español, aquí puede omitirse para evitar un inicio artificial; la progresión narrativa queda clara por el resto de la frase.
- source_word: πρωῒ
  english_pob_choice: early
  chosen_spanish: temprano
  alternatives_spanish:
  - de madrugada
  - por la mañana temprano
  lexicon: BDAG
  rationale: La adverbio indica una hora temprana del día. «Temprano» es breve y natural; el contexto ya precisa el momento con «el primer día de la semana».
- source_word: πρώτῃ σαββάτου
  english_pob_choice: on the first day of the week
  chosen_spanish: el primer día de la semana
  alternatives_spanish:
  - el primer día después del sábado
  - el primer día de la semana judía
  lexicon: BDAG
  rationale: La expresión es un giro idiomático normal en el contexto judío-cristiano y se entiende mejor como «el primer día de la semana».
- source_word: ἐφάνη
  english_pob_choice: he appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: BDAG
  rationale: En contextos de aparición del Resucitado, el verbo se traduce de forma idiomática como «se apareció», que conserva el sentido eventivo sin sonar forzado.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  lexicon: BDAG
  rationale: Adverbio de secuencia; «primero» reproduce con naturalidad el orden de la aparición.
- source_word: Μαρίᾳ τῇ Μαγδαληνῇ
  english_pob_choice: to Mary Magdalene
  chosen_spanish: a María la Magdalena
  alternatives_spanish:
  - a María Magdalena
  - a Mariam la Magdalena
  lexicon: BDAG
  rationale: Se mantiene el nombre propio en forma estándar española y el apodo/título «la Magdalena». El dativo se expresa naturalmente con «a».
- source_word: παρ’ ἧς
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de la cual
  - de la que
  lexicon: BDAG
  rationale: Con ἐκβάλλω la preposición indica origen o procedencia de la expulsión. «De quien» es fluido y conserva la relación causal/originaria.
- source_word: ἐκβεβλήκει
  english_pob_choice: he had cast out
  chosen_spanish: había expulsado
  alternatives_spanish:
  - había echado fuera
  - había arrojado fuera
  lexicon: BDAG
  rationale: Para un contexto exorcístico, «expulsar» comunica con precisión la fuerza de ἐκβάλλω y suena más natural en español contemporáneo que una calca más áspera.
- source_word: ἑπτὰ δαιμόνια
  english_pob_choice: seven demons
  chosen_spanish: siete demonios
  alternatives_spanish:
  - siete espíritus malos
  lexicon: BDAG
  rationale: En el lenguaje de los evangelios, δαιμόνια se traduce con su equivalente directo «demonios»; no hay base aquí para suavizarlo.
theological_decisions:
- issue: Estado textual de Marcos 16:9 dentro del final largo de Marcos
  english_pob_reading: Translate the verse as given in the provided SBLGNT text, while noting its location within a bracketed/disputed passage.
  chosen_spanish_reading: Traducir el versículo tal como aparece en el texto griego provisto y señalar en nota su carácter textual discutido.
  alternative_spanish_readings:
  - Excluir el versículo por completo por la duda textual
  - Incorporarlo sin nota crítica
  rationale: El paquete fuente incluye el versículo y lo marca con corchetes, lo cual debe preservarse con transparencia. La traducción no debe silenciar la variante textual ni resolverla editorialmente sin base.
  doctrine_reference: Principio de transparencia textual; preservar la tensión documental en lugar de disimularla.
translation_notes:
  revision_awareness: No se detectaron revisiones previas aplicadas en el registro fuente; el pasaje se traduce conforme al texto griego proporcionado y a la nota crítica del POB en inglés.
  spanish_consistency_notes:
  - Se usa «María la Magdalena» para mantener un español claro y reverente, equivalente funcional de «Mary Magdalene».
  - Se traduce ἐκβάλλω en sentido exorcístico como «expulsar», consistente con el léxico de los evangelios.
  - Se conserva «demonios» para δαιμόνια, sin suavizar a «espíritus malos», porque el audit trail inglés retiene la fuerza lexical directa.
