  glossary_alignment: No hay conflictos con la terminología base del proyecto. «demonios» para δαιμόνια está bien; no aparecen términos sensibles como Yahvé/Mesías/δόυλος. La decisión de mantener la nota textual crítica está alineada con la filosofía del POB.
