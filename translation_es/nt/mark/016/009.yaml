  rationale: 'Se hicieron ajustes menores de estilo y naturalidad: «Después de resucitar» simplifica sin cambiar el sentido temporal; «muy temprano» refleja bien πρωῒ; «apareció» es la forma narrativa más idiomática para ἐφάνη; y «María Magdalena» sin artículo resulta más natural y ampliamente reconocible en español eclesial general. La nota textual se mantiene sin cambios sustanciales.'
