translation:
  language: es
  text: Y alzando la vista, vieron que la piedra había sido removida[a], pues era sumamente grande.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha sido removida». El verbo griego en perfecto enfatiza que, cuando ellas la vieron, la piedra ya estaba en estado de haber sido apartada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: Conserva la simple conexión narrativa del griego sin añadir una relación temporal más fuerte de la que exige el texto.
- source_word: ἀναβλέψασαι
  english_pob_choice: looking up
  chosen_spanish: alzando la vista
  alternatives_spanish:
  - mirando hacia arriba
  - levantando la vista
  lexicon: BDAG
  rationale: El participio aoristo describe la acción de dirigir la vista hacia arriba/levantarla. "Alzando la vista" es natural en español y mantiene el sentido gestual sin sobrecargarlo.
- source_word: θεωροῦσιν
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - observaron
  - advirtieron
  - miraron
  lexicon: BDAG
  rationale: En este contexto narrativo, el acto perceptivo se expresa con un pasado simple claro y directo. "Vieron" conserva la fuerza visual sin sonar rígido.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido de lo percibido; en español la subordinación con "que" es la forma normal y más transparente.
- source_word: ἀποκεκύλισται
  english_pob_choice: had been rolled away
  chosen_spanish: había sido rodada
  alternatives_spanish:
  - había sido removida
  - estaba rodada hacia un lado
  lexicon: BDAG
  rationale: 'El perfecto pasivo indica un estado resultante: la piedra ya estaba apartada cuando la vieron. "Había sido rodada" mantiene ese resultado con un pretérito pluscuamperfecto natural. Se prefiere el femenino por concordancia con "la piedra".'
- source_word: ὁ λίθος
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la roca
  - la piedra del sepulcro
  lexicon: BDAG
  rationale: Aunque el inglés usa "stone", en español "piedra" es la correspondencia más natural y clara en concordancia con el sustantivo femenino. No se añade "del sepulcro" porque el contexto ya identifica la piedra del sepulcro.
- source_word: ἦν γὰρ μέγας σφόδρα
  english_pob_choice: for it was extremely large
  chosen_spanish: pues era sumamente grande
  alternatives_spanish:
  - porque era muy grande
  - pues era extremadamente grande
  lexicon: BDAG
  rationale: '"γάρ" aporta explicación; "pues" lo refleja con buena fluidez. "μέγας σφόδρα" se intensifica como "sumamente grande", un español natural que conserva la fuerte énfasis del griego.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y el criterio del POB en inglés: mantiene el valor aspectual del perfecto pasivo de ἀποκεκύλισται como estado resultante y conserva el tono narrativo simple de καὶ. Se evita depender mecánicamente del inglés, pero se aprovecha su decisión auditada sobre la permanencia del estado de la piedra ya movida.'
  spanish_consistency_notes:
  - Se usó "piedra" en femenino para concordar naturalmente con el artículo y el participio en español; no se tradujo con un masculino por calco del inglés.
  - '"Había sido rodada" preserva la pasividad y el resultado completado; no se neutralizó a una forma simple de pretérito.'
  - '"Sumamente grande" mantiene la intensificación fuerte de σφόδρα sin sonar arcaico.'
