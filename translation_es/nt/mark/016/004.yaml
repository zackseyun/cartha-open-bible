revisions:
- from: Y alzando la vista[a], vieron que la piedra había sido rodada, pues era sumamente grande.
  to: Y alzando la vista, vieron que la piedra había sido removida[a], pues era sumamente grande.
  rationale: Se reemplaza «había sido rodada» por «había sido removida» para lograr un español natural y claro sin perder el sentido de la piedra ya apartada. También se mueve la nota al pie al verbo principal relevante para reflejar la decisión léxica documentada en inglés sobre el perfecto resultativo de ἀποκεκύλισται. No se requiere adjudicación adicional porque la corrección es local, clara y no doctrinal.
