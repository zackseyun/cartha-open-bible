  source_alignment_summary: 'El borrador sigue bien la estructura del griego: participio inicial («entrando»), lugar («sepulcro»), identificación descriptiva («un joven»), postura («sentado»), ubicación («a la derecha») y reacción intensa de las mujeres. También preserva correctamente la nota que aclara la posible identificación como ángel sin importarla al texto principal.'
  spanish_quality_summary: El principal problema es «vestido con una ropa blanca», que en español suena poco natural e impreciso para στολὴν λευκήν. «Ropa» debilita el valor de στολή como prenda distintiva/vestidura/ropa larga, y la frase resultante no alcanza la dignidad ni claridad esperadas. El resto del versículo es legible y natural; «quedaron alarmadas» funciona, aunque «se alarmaron» también sería válido.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión de mantener «un joven» en vez de «ángel» está bien alineada con la auditoría inglesa y la decisión teológica documentada. «Sepulcro» es aceptable en registro bíblico. La única desalineación relevante es léxica: στολή no debe reducirse a «ropa» cuando la auditoría inglesa documenta «robe» y el español dispone de «vestidura» o «túnica» con mejor precisión.'
  issues:
  - severity: medium
    issue: «vestido con una ropa blanca» traduce pobremente περιβεβλημένον στολὴν λευκήν
    rationale: «Ropa» es demasiado genérico y la expresión completa suena antinatural en español. στολή denota una prenda/vestidura distinguible, y el inglés auditado optó por «robe». En español, «vestidura blanca» refleja mejor el sentido y la dignidad del contexto.
  - severity: low
