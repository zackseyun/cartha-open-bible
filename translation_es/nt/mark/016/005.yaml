translation:
  language: es
  text: Y entrando en el sepulcro[a], vieron a un joven sentado a la derecha, vestido con una vestidura blanca, y quedaron alarmadas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ángel». Marcos lo describe aquí como «un joven», aunque el contexto más amplio y los relatos paralelos indican un mensajero angelical.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθοῦσαι
  english_pob_choice: entering
  chosen_spanish: Y entrando
  alternatives_spanish:
  - Y cuando entraron
  - Y habiendo entrado
  lexicon: BDAG
  rationale: El participio aoristo femenino plural se refiere a las mujeres del contexto. En español, «Y entrando» conserva la relación participial con el verbo principal y suena natural; «cuando entraron» explicita temporalidad pero añade una reconstrucción más libre.
- source_word: μνημεῖον
  english_pob_choice: tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - túmulo funerario
  lexicon: BDAG
  rationale: En contexto de resurrección, el referente es el lugar de entierro. «Sepulcro» es claro y reverente en español bíblico, sin perder el sentido de lugar funerario; «tumba» también sería posible, pero «sepulcro» encaja mejor en registro eclesial amplio.
- source_word: νεανίσκον
  english_pob_choice: young man
  chosen_spanish: un joven
  alternatives_spanish:
  - un muchacho
  - un joven varón
  lexicon: BDAG
  rationale: El griego describe literalmente a un varón joven. «Un joven» preserva la descripción narrativa sin introducir la identificación angelical en el texto principal.
- source_word: καθήμενον
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - sentándose
  - que estaba sentado
  lexicon: BDAG
  rationale: El participio de estado se expresa naturalmente en español con «sentado», que comunica postura sin sobrerrepresentar el aspecto verbal.
- source_word: ἐν τοῖς δεξιοῖς
  english_pob_choice: on the right
  chosen_spanish: a la derecha
  alternatives_spanish:
  - del lado derecho
  - a su derecha
  lexicon: BDAG
  rationale: La expresión locativa indica posición dentro del sepulcro. «A la derecha» es idiomática y fiel; evita sobrecargar con especificación no necesaria.
- source_word: περιβεβλημένον στολὴν λευκήν
  english_pob_choice: clothed in a white robe
  chosen_spanish: vestido con una ropa blanca
  alternatives_spanish:
  - vestido con un manto blanco
  - cubierto con una vestidura blanca
  lexicon: BDAG
  rationale: El participio perfecto y el sustantivo στολή indican estar vestido con una prenda larga/distintiva. «Ropa blanca» refleja el blanco de la prenda sin forzar una equivalencia litúrgica; «vestidura» o «manto» son posibles pero más interpretativos en español.
- source_word: στολή
  english_pob_choice: robe
  chosen_spanish: ropa
  alternatives_spanish:
  - vestidura
  - túnica
  - manto
  lexicon: BDAG
  rationale: Aunque «robe» en inglés apunta a una prenda larga, en español «ropa» evita una especificación demasiado eclesiástica o técnica. La combinación «ropa blanca» conserva el dato de vestimenta blanca de forma clara y sobria.
- source_word: ἐξεθαμβήθησαν
  english_pob_choice: they were alarmed
  chosen_spanish: quedaron alarmadas
  alternatives_spanish:
  - se alarmaron
  - quedaron atemorizadas
  - quedaron sobrecogidas
  lexicon: BDAG
  rationale: El verbo expresa fuerte conmoción o sobresalto. Dado que el sujeto femenino plural es claro por contexto, «quedaron alarmadas» transmite el impacto emocional con naturalidad y sin exagerar a terror pleno.
theological_decisions:
- issue: Identidad del νεανίσκος
  english_pob_reading: Render descriptively as 'young man' in the main text without identifying him as an angel.
  chosen_spanish_reading: Traducir descriptivamente «un joven» en el texto principal, sin identificarlo como ángel.
  alternative_spanish_readings:
  - ángel
  - mensajero angelical
  rationale: Aunque el contexto amplio y los relatos paralelos sugieren una figura angelical, Marcos 16:5 lo denomina aquí νεανίσκος. La traducción conserva la formulación del texto y deja la identificación a notas o comparación canónica, evitando importar una interpretación al cuerpo principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue el último ajuste del POB inglés: refleja más directamente el participio aoristo εἰσελθοῦσαι con una construcción participial en español («Y entrando») en lugar de una paráfrasis temporal. También conserva la decisión auditada de no identificar al νεανίσκος como ángel en el texto principal, aunque sí se anota la lectura alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Y entrando» para reflejar la estructura participial sin añadir un «cuando» no explícito en el griego.
  - «Sepulcro» se usa para μνημεῖον por claridad narrativa y registro bíblico; si el proyecto prefiere mayor neutralidad semántica, «tumba» sería la alternativa más cercana.
  - «Ropa blanca» evita una terminología demasiado tradicionalizada para στολή y conserva la sencillez del original.
  - El sujeto femenino plural queda implícito por el contexto, por lo que «quedaron alarmadas» concuerda con las mujeres mencionadas en el pasaje anterior.
