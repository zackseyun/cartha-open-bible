    rationale: El propio expediente inglés justifica «robe» por el valor de στολή. Decir que «ropa» evita una especificación excesiva rebaja innecesariamente la precisión semántica cuando «vestidura» ofrece una solución natural y fiel.
  revised_spanish_text: Y entrando en el sepulcro[a], vieron a un joven sentado a la derecha, vestido con una vestidura blanca, y quedaron alarmadas.
  revised_footnotes:
  - marker: a
    text: O «ángel». Marcos lo describe aquí como «un joven», aunque el contexto más amplio y los relatos paralelos indican un mensajero angelical.
    reason: alternative_reading
