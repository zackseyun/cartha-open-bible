  rationale: Se mantiene la estructura y el sentido general del borrador, pero se corrige «ropa blanca» a «vestidura blanca» para reflejar mejor στολή, alinearse con la auditoría inglesa («robe»), y producir un español más natural y digno. No se requieren otros cambios.
