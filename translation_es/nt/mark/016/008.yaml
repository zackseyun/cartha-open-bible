  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: salida, huida, causa por temblor y asombro, silencio total y miedo continuo. También sigue correctamente la decisión textual del POB de excluir el final corto del texto principal y conservarlo en nota. Sin embargo, hay un desajuste gramatical importante: el referente son mujeres y el texto dice «los habían sobrecogido» en vez de «las había sobrecogido» o una construcción equivalente. Además, la nota usa «reportaron», que suena anglicada y menos natural que «informaron» o «comunicaron».'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Y saliendo» suena algo participial y menos natural en lectura pública que «Ellas salieron y huyeron» o simplemente «Salieron y huyeron». El problema principal es la discordancia de género/pronombre en «los habían sobrecogido». «Sepulcro» es adecuado y eclesialmente legible. «Pues tenían miedo» cierra bien con cierta brusquedad marcana.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto en este versículo. «Jesús» en la nota es correcto. La exclusión del final corto del texto principal está en línea con la racionalidad textual documentada. Se recomienda mejorar la naturalidad léxica de la nota: «reportaron» no es la mejor opción en español bíblico general.'
  issues:
  - severity: high
    issue: Discordancia pronominal en «los habían sobrecogido»
    rationale: El sujeto referente son las mujeres; el pronombre de objeto debe ser femenino («las»), o bien debe recastarse la oración para evitar ambigüedad. Tal como está, el texto no preserva correctamente la referencia del original.
  - severity: medium
    issue: «Y saliendo» suena menos natural que una forma verbal finita coordinada
