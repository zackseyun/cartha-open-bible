translation:
  language: es
  text: Y salieron y huyeron del sepulcro[a], porque el temblor y el asombro se habían apoderado de ellas; y no dijeron nada a nadie, pues tenían miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden el llamado final corto: «Y comunicaron brevemente a los que estaban alrededor de Pedro todo lo que se les había mandado. Y después de estas cosas, Jesús mismo también envió por medio de ellas, desde el oriente hasta el occidente, la proclamación sagrada e imperecedera de la salvación eterna. Amén».'
    reason: textual_variant
lexical_decisions:
- source_word: ἐξελθοῦσαι
  english_pob_choice: they went out
  chosen_spanish: saliendo
  alternatives_spanish:
  - después de salir
  - cuando salieron
  lexicon: BDAG
  rationale: El participio aoristo femenino plural funciona de manera temporal con respecto al verbo principal. En español, «saliendo» conserva la secuencia sin sobreespecificar «después de», que el griego no exige.
- source_word: ἔφυγον
  english_pob_choice: they fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: BDAG
  rationale: «Huyeron» reproduce el valor fuerte de φεύγω con un registro natural y digno. «Salieron corriendo» sería más coloquial y menos preciso en estilo literario bíblico.
- source_word: μνημείου
  english_pob_choice: the tomb
  chosen_spanish: sepulcro
  alternatives_spanish:
  - tumba
  - monumento funerario
  lexicon: BDAG
  rationale: En contexto de resurrección, el campo semántico es el de una sepultura o lugar funerario. «Sepulcro» es claro en español bíblico y mantiene la referencia al lugar de entierro; evita la posible ambigüedad de «tumba» en algunos registros.
- source_word: εἶχεν αὐτὰς τρόμος καὶ ἔκστασις
  english_pob_choice: trembling and astonishment had seized them
  chosen_spanish: los habían sobrecogido el temblor y el asombro
  alternatives_spanish:
  - las había tomado el temblor y el asombro
  - las había invadido el temblor y el asombro
  lexicon: BDAG
  rationale: El griego expresa una situación que se apodera de ellas. «Sobrecoger» comunica bien esa idea de dominio repentino y mantiene juntos los dos sustantivos sin perder la fuerza idiomática.
- source_word: τρόμος
  english_pob_choice: trembling
  chosen_spanish: temblor
  alternatives_spanish:
  - temor
  - tremor
  lexicon: BDAG
  rationale: «Temblor» preserva el componente físico de la palabra y se ajusta mejor al paralelo con ἔκστασις. «Temor» duplicaría en exceso la idea de miedo que aparece después.
- source_word: ἔκστασις
  english_pob_choice: astonishment
  chosen_spanish: asombro
  alternatives_spanish:
  - estupor
  - desconcierto
  - éxtasis
  lexicon: BDAG
  rationale: «Asombro» expresa el estado de quedar sobrecogidas por lo ocurrido sin importar el sentido moderno de «éxtasis». «Estupor» o «desconcierto» serían posibles, pero menos transparentes para lectura pública.
- source_word: οὐδενὶ οὐδέν
  english_pob_choice: nothing to anyone
  chosen_spanish: nada a nadie
  alternatives_spanish:
  - nada a ninguno
  - no dijeron cosa alguna a nadie
  lexicon: BDAG
  rationale: La doble negación griega se naturaliza en español como «nada a nadie», que conserva la universalidad de la negación sin sonar forzado.
- source_word: ἐφοβοῦντο
  english_pob_choice: they were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - estaban asustadas
  - temían
  lexicon: BDAG
  rationale: El imperfecto indica un estado continuo. «Tenían miedo» es idiomático, claro y conserva la duración del estado emocional. Se elige «miedo» para evitar una intensificación no necesaria.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: «Pues» comunica la función causal/explanatoria de γάρ en un español fluido y permite cerrar la frase con una cadencia abrupta semejante a la del griego.
theological_decisions:
- issue: Tratamiento del final corto entre corchetes dobles
  english_pob_reading: Exclude the bracketed material from the main translation as a later textual addition, while preserving it in a footnote as a textual variant.
  chosen_spanish_reading: Excluir el material entre corchetes dobles del texto principal y conservarlo en nota como variante textual posterior.
  alternative_spanish_readings:
  - Incluir el final corto en el texto principal
  - Presentar ambos finales en el cuerpo del texto
  rationale: El texto base SBLGNT marca el añadido como material secundario. Para una traducción auditable, el cuerpo principal debe reflejar el texto establecido, y la expansión final debe quedar documentada como variante textual sin fusionarse con el versículo principal.
  doctrine_reference: Crítica textual del Nuevo Testamento; distinción entre texto principal y variante manuscrita
translation_notes:
  revision_awareness: 'La redacción sigue la línea revisada del audit trail inglés: se mantiene la secuencia directa de ἐξελθοῦσαι → ἔφυγον sin añadir una paráfrasis temporal excesiva, se conserva el matiz causal de γάρ y se excluye del texto principal el final corto señalado por SBLGNT como añadido textual. Se prioriza un español bíblico claro, con «sepulcro», «sobrecogido» y «pues» para reflejar el registro y la fuerza del original.'
  spanish_consistency_notes:
  - Se usa «sepulcro» para μνημεῖον en contexto pascual, consistente con el uso bíblico español y con el audit trail inglés 'tomb'.
  - Se mantiene el contraste entre «temblor y asombro» como par de sustantivos que refleja τρόμος καὶ ἔκστασις.
  - La negación enfática «nada a nadie» conserva οὐδενὶ οὐδέν sin forzar el orden español.
  - El cierre con «pues tenían miedo» reproduce el final abrupto del versículo y la segunda γάρ sin sobreexplicación.
