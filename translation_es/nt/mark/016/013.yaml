translation:
  language: es
  text: Y ellos se fueron y se lo contaron a los demás[a]; pero tampoco les creyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los otros».
    reason: lexical_alternative
lexical_decisions:
- source_word: κἀκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - aquellos
  - esos
  - ellos mismos
  lexicon: BDAG
  rationale: El griego usa un demostrativo compuesto que, en este contexto narrativo, remite a los dos discípulos mencionados antes. En español, «ellos» comunica con naturalidad el referente sin añadir una precisión inexistente en el griego ni sobrecargar el estilo con «aquellos».
- source_word: ἀπελθόντες
  english_pob_choice: went away
  chosen_spanish: fueron
  alternatives_spanish:
  - se fueron
  - partieron
  - habían ido
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y señala salida/desplazamiento previo. «Fueron» mantiene la secuencia narrativa en español de forma sobria; «se fueron» sería posible, pero aquí «fueron» conserva mejor la concisión del relato.
- source_word: ἀπήγγειλαν
  english_pob_choice: reported it
  chosen_spanish: lo informaron
  alternatives_spanish:
  - lo reportaron
  - lo contaron
  - lo anunciaron
  lexicon: BDAG
  rationale: ἀπαγγέλλω aquí significa comunicar o dar informe de lo ocurrido. «Lo informaron» expresa ese acto de comunicar una noticia/testimonio sin introducir un registro demasiado técnico; «lo reportaron» suena menos natural en español bíblico.
- source_word: τοῖς λοιποῖς
  english_pob_choice: to the rest
  chosen_spanish: a los demás
  alternatives_spanish:
  - a los otros
  - al resto
  - a los restantes
  lexicon: BDAG
  rationale: λοιποί puede significar «los demás» o «los otros». La opción «a los demás» es natural en español y conserva la referencia al grupo restante sin fijar indebidamente una traducción más cerrada que el griego.
- source_word: οὐδὲ ἐκείνοις
  english_pob_choice: but they did not believe them either
  chosen_spanish: pero a ellos tampoco
  alternatives_spanish:
  - ni a ellos
  - y tampoco a ellos
  - pero ni a ellos
  lexicon: BDAG
  rationale: 'οὐδέ aporta una negación añadida: «ni/tampoco». En español, la estructura «pero a ellos tampoco» transmite bien el giro adversativo y la continuidad de la incredulidad sin perder fluidez.'
- source_word: ἐπίστευσαν
  english_pob_choice: did not believe
  chosen_spanish: les creyeron
  alternatives_spanish:
  - creyeron
  - les tuvieron fe
  - les dieron crédito
  lexicon: BDAG
  rationale: En este contexto πιστεύω se refiere a creer el testimonio recibido. «Les creyeron» es el equivalente natural y directo en español; la negación ya está expresada por «tampoco» en la primera parte de la cláusula final, siguiendo la estructura del griego y del audit trail inglés.
theological_decisions:
- issue: πιστεύω en contexto de testimonio narrativo
  english_pob_reading: did not believe
  chosen_spanish_reading: tampoco les creyeron
  alternative_spanish_readings:
  - no creyeron en ellos
  - no les tuvieron fe
  rationale: Aquí πιστεύω no plantea una formulación doctrinal abstracta, sino rechazo de un testimonio. Por eso se mantiene «creer» en sentido de aceptar lo narrado, evitando desplazar el sentido hacia una confianza religiosa más amplia.
  doctrine_reference: 'DOCTRINE.md: Contested terms entry for πίστις; Translation philosophy #3'
translation_notes:
  revision_awareness: 'El español sigue el ajuste más reciente del audit trail inglés: el referente no se explicita como «those men», sino simplemente como un pronombre demostrativo/plural. Por eso se eligió «ellos» sin añadir masculinización interpretativa extra. También se preservó la estructura narrativa breve del griego: movimiento, informe y rechazo del testimonio.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o vocabulario de sustitución no pertinente; este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y narrativo, acorde con una declaración breve de informe y rechazo.
  - «A los demás» deja abierta la alternativa marginal «a los otros», en paralelo con el audit trail inglés sobre λοιποί.
