translation:
  language: es
  text: 'Y les dijo: «Vayan por todo el mundo y proclamen la buena noticia[a] a toda la creación[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el evangelio». El griego εὐαγγέλιον literalmente significa «buena noticia».
    reason: lexical_alternative
  - marker: b
    text: O «a toda criatura». La frase griega puede entenderse de manera distributiva o corporativa.
    reason: alternative_reading
lexical_decisions:
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les declaró
  lexicon: BDAG
  rationale: La fórmula narrativa normal en español es «les dijo». Mantiene el valor simple de λέγω con dativo de destinatario, sin añadir matices interpretativos.
- source_word: Πορευθέντες
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Id
  - Habiendo ido
  - Mientras van
  lexicon: BDAG
  rationale: El participio aoristo con valor de circunstancia acompañante funciona aquí como mandato encadenado al imperativo principal. En español, «Vayan» comunica de manera natural la fuerza comisionadora que el inglés POB expresó con «Go».
- source_word: κόσμον ἅπαντα
  english_pob_choice: all the world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - todo el universo
  lexicon: BDAG
  rationale: κόσμος designa la esfera habitada y ἅπας intensifica la totalidad. «Todo el mundo» conserva la amplitud universal con naturalidad en español.
- source_word: κηρύξατε
  english_pob_choice: proclaim
  chosen_spanish: proclamen
  alternatives_spanish:
  - prediquen
  - anuncien
  lexicon: BDAG
  rationale: κηρύσσω tiene el sentido de anunciar públicamente como heraldo. «Proclamen» preserva ese tono autoritativo y público mejor que un término más eclesiástico o más débil.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the good news
  chosen_spanish: la buena noticia
  alternatives_spanish:
  - el evangelio
  lexicon: BDAG
  rationale: Se sigue la decisión léxica de priorizar el sentido directo de εὐαγγέλιον como «buena noticia». «El evangelio» se conserva como alternativa de uso cristiano establecido, pero no como forma principal.
- source_word: πάσῃ τῇ κτίσει
  english_pob_choice: to all creation
  chosen_spanish: a toda la creación
  alternatives_spanish:
  - a toda criatura
  - a cada criatura
  - a toda la creación entera
  lexicon: BDAG
  rationale: κτίσις puede significar «creación» o «criatura». Se preserva la amplitud del griego con «toda la creación», evitando estrecharlo prematuramente a «cada criatura» y manteniendo la tensión entre lectura corporativa y distributiva.
theological_decisions:
- issue: Alcance de πάσῃ τῇ κτίσει
  english_pob_reading: Rendered broadly as 'to all creation' to preserve the universal scope of the Greek.
  chosen_spanish_reading: «a toda la creación» conserva el alcance universal y cosmológico del mandato.
  alternative_spanish_readings:
  - a cada criatura
  - a todos
  rationale: La frase griega admite una lectura distributiva («cada criatura») o corporativa/cósmica («toda la creación»). La forma elegida mantiene abierta la tensión del original y no reduce el horizonte del mandato a una sola opción interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El control de revisión indica que no se requirieron cambios en la última pasada; el presente borrador sigue esa decisión y mantiene la equivalencia óptima con la tensión semántica preservada.
  spanish_consistency_notes:
  - Se mantiene «buena noticia» como equivalente principal de εὐαγγέλιον, en línea con el criterio auditado del POB.
  - Se usa «crearción» en sentido amplio para κτίσις y se evita sustituirla por una reducción eclesiástica o antropocéntrica.
  - El mandato principal se expresa con verbo en subjuntivo exhortativo («Vayan», «proclamen»), que reproduce la fuerza imperativa del griego en español natural.
