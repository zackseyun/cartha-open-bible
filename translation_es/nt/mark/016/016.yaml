translation:
  language: es
  text: El que ha creído y ha sido bautizado será salvo[a], pero el que no ha creído[b] será condenado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «será salvado».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más idiomáticamente: «el que no cree».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιστεύσας
  english_pob_choice: the one who has believed
  chosen_spanish: el que ha creído
  alternatives_spanish:
  - quien cree
  - el que creyó
  lexicon: BDAG
  rationale: El participio aoristo con artículo funciona de modo sustantivo y describe a una persona caracterizada por la acción. En español, «el que ha creído» conserva bien la referencia representativa en singular y el valor de acción completada sin volver la frase excesivamente pesada.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: La conjunción coordina de manera simple los dos participios del primer miembro; «y» mantiene esa relación sin añadir énfasis.
- source_word: βαπτισθεὶς
  english_pob_choice: has been baptized
  chosen_spanish: ha sido bautizado
  alternatives_spanish:
  - es bautizado
  - habiendo sido bautizado
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa anterioridad respecto al resultado futuro. «Ha sido bautizado» conserva la voz pasiva y comunica una acción previa de forma natural en español.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será salvo
  - será rescatado
  - será librado
  lexicon: BDAG
  rationale: σῴζω aquí lleva el sentido soteriológico estándar. «Será salvado» es claro, directo y mantiene el contenido doctrinal sin explicitar más de lo que el texto dice.
- source_word: ὁ δὲ ἀπιστήσας
  english_pob_choice: but the one who has disbelieved
  chosen_spanish: pero el que ha rehusado creer
  alternatives_spanish:
  - pero el que no ha creído
  - pero el incrédulo
  lexicon: BDAG
  rationale: Para preservar el contraste léxico con πιστεύω, la idea negativa puede expresarse como rechazo a creer. «Ha rehusado creer» conserva el matiz verbal de ἀπιστέω sin aplanarlo a una mera negación idiomática; aun así, se reconoce que «no ha creído» es una alternativa válida y más literal.
- source_word: κατακριθήσεται
  english_pob_choice: will be condemned
  chosen_spanish: será condenado
  alternatives_spanish:
  - será declarado culpable
  - será sentenciado
  lexicon: BDAG
  rationale: El futuro pasivo de κατακρίνω expresa juicio adverso con resultado de condena. «Será condenado» es el equivalente español más directo y natural.
theological_decisions:
- issue: Relación entre creer, bautizarse y la salvación
  english_pob_reading: Render both participles straightforwardly without making baptism the explicit efficient cause of salvation or weakening its stated association with the saved person.
  chosen_spanish_reading: Traducir ambos participios de manera transparente, sin convertir el bautismo en causa eficiente explícita de la salvación ni debilitar su asociación textual con la persona que será salvada.
  alternative_spanish_readings:
  - Una traducción que hiciera del bautismo un requisito sacramental explícito
  - Una traducción que redujera el bautismo a un elemento meramente incidental
  rationale: El griego une «haber creído» y «haber sido bautizado» como descripción de la persona que será salvada, mientras que la segunda cláusula condena al que no cree, sin mencionar al no bautizado. La versión española debe dejar esa tensión visible y no resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Singular representativo masculino
  english_pob_reading: Use 'the one who' rather than a plural or gender-neutral paraphrase.
  chosen_spanish_reading: Usar «el que» como singular representativo, en vez de pluralizar o parafrasear de forma impersonal.
  alternative_spanish_readings:
  - los que creen ... los que no creen
  - quien cree ... quien no cree
  rationale: Los participios masculinos singulares tienen fuerza genérica en griego. «El que» conserva esa forma representativa con naturalidad en español y no limita la referencia a varones concretos.
  doctrine_reference: Precisión gramatical por encima de una neutralización innecesaria.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el audit trail inglés: la preferencia por mantener el singular representativo, la coordinación simple de los participios, la distinción entre fe y bautismo sin resolver su relación sacramental, y la nota textual/estilística que permite una alternativa más idiomática para el segundo miembro. La traducción española sigue esa línea sin depender mecánicamente del inglés, sino ajustando los valores aspectuales y pasivos al español natural.'
  spanish_consistency_notes:
  - Se mantiene «ha creído» para el participio aoristo sustantivado, evitando una simple forma presente que borre el matiz de acción completada.
  - Se conserva la voz pasiva en «ha sido bautizado» y «será salvado/será condenado».
  - Se usa «el que» para el valor genérico del singular masculino griego.
  - Se evita «SEÑOR» u otra terminología ajena, pues no aparece el nombre divino en este versículo.
  - Se eligió «salvado» en lugar de «rescatado» o «librado» porque el contexto es soteriológico y no meramente circunstancial.
