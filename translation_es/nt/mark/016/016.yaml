  spanish_quality_summary: El español es claro y legible. No obstante, «será salvado» suena menos natural y menos eclesialmente idiomático en este contexto que «será salvo», aunque ambos pueden defenderse. Dado que el borrador ya trata «será salvo» como alternativa, conviene llevar esa forma al texto principal y dejar «será salvado» como nota opcional. También mejora la fluidez coordinar «ha creído y ha sido bautizado» como «ha creído y ha sido bautizado» o incluso mantenerlo tal cual; no requiere cambio. El problema principal de naturalidad y precisión sigue siendo «ha rehusado creer».
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. Las decisiones clave son soteriológicas y de aspecto verbal. Se debe alinear mejor ἀπιστέω con su opuesto πιστεύω mediante «no ha creído» en vez de «ha rehusado creer».
