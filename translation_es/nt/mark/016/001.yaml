  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: temporalidad previa al verbo principal, los tres nombres, la compra de sustancias aromáticas y el propósito de ungirlo. Sin embargo, dos decisiones se apartan del rastro auditado del POB y de la claridad fuente-meta: «María la de Jacobo» conserva demasiado literalmente una elipsis que en español suena extraña y menos clara que la solución documentada por el POB («mother of James»), y «aromas» no comunica tan bien el referente funerario concreto de ἀρώματα como «especias aromáticas» o «especias».'
  spanish_quality_summary: El texto es legible, pero «María la de Jacobo» resulta poco natural en español bíblico contemporáneo y puede sonar coloquial o ambigua. «Aromas» también suena abstracto y menos idiomático para un contexto de sepultura. «Y pasado el sábado» es aceptable, aunque «Cuando pasó el sábado» fluye mejor. El resto del verso es claro y digno.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. Los nombres propios están bien. La principal cuestión es seguir la justificación léxica del POB para Μαρία ἡ τοῦ Ἰακώβου con una formulación española clara, y elegir para ἀρώματα una palabra que preserve mejor el uso funerario concreto.
  issues:
  - severity: high
    issue: «María la de Jacobo» para Μαρία ἡ τοῦ Ἰακώβου
    rationale: Aunque intenta reflejar la elipsis griega, en español esta formulación es poco natural y menos precisa. El English POB auditó explícitamente la decisión de explicitar la relación como «mother of James» por claridad idiomática; el español debería seguir esa racionalidad con «María, la madre de Jacobo», conservando la literalidad en nota.
  - severity: medium
    issue: «aromas» para ἀρώματα
    rationale: «Aromas» en español suele referirse al olor más que a las sustancias. En este contexto funerario, «especias aromáticas» o «especias» comunica mejor el objeto comprado sin paraprasear en exceso.
  - severity: low
    issue: Exceso de notas léxicas no necesarias
    rationale: Las notas c y d no añaden una ambigüedad que requiera preservación obligatoria en español. El POB inglés solo conserva una nota para la identificación de María; mantener demasiadas notas puede recargar innecesariamente el verso.
  revised_spanish_text: Cuando pasó el sábado, María Magdalena, María, la madre de Jacobo[a], y Salomé compraron especias aromáticas para ir a ungirlo.
