translation:
  language: es
  text: Cuando pasó el sábado, María Magdalena, María, la madre de Jacobo[a], y Salomé compraron especias aromáticas para ir a ungirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego literalmente, «María la de Jacobo»; es decir, María identificada en relación con Jacobo, tradicionalmente entendida como su madre.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαγενομένου τοῦ σαββάτου
  english_pob_choice: when the Sabbath was over
  chosen_spanish: y pasado el sábado
  alternatives_spanish:
  - cuando terminó el sábado
  - cuando el sábado hubo pasado
  lexicon: BDAG
  rationale: El participio genitivo absoluto marca anterioridad temporal respecto de la acción principal. «Pasado el sábado» conserva esa relación de tiempo de manera natural en español y evita una perífrasis demasiado explicativa.
- source_word: Μαρία ἡ Μαγδαληνὴ
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalena
  lexicon: BDAG
  rationale: Es la transliteración usual y reconocible del nombre y el epíteto, con ajuste natural al español.
- source_word: Μαρία ἡ τοῦ Ἰακώβου
  english_pob_choice: Mary the mother of James
  chosen_spanish: María la de Jacobo
  alternatives_spanish:
  - María, la madre de Jacobo
  - María de Jacobo
  lexicon: BDAG
  rationale: El griego dice literalmente «la [mujer] de Jacobo», una identificación relacional elíptica. En español se conserva esa relación sin imponer en el texto principal una especificación interpretativa que el griego no expresa de forma explícita; la nota explica la lectura tradicional.
- source_word: Σαλώμη
  english_pob_choice: Salome
  chosen_spanish: Salomé
  alternatives_spanish:
  - Salome
  lexicon: BDAG
  rationale: Forma habitual en español del nombre propio.
- source_word: ἠγόρασαν
  english_pob_choice: bought
  chosen_spanish: compraron
  alternatives_spanish:
  - adquirieron
  - compraron para sí
  lexicon: BDAG
  rationale: Aoristo narrativo simple; «compraron» es la equivalencia natural y directa en español.
- source_word: ἀρώματα
  english_pob_choice: spices
  chosen_spanish: aromas
  alternatives_spanish:
  - especias
  - ungüentos
  - perfumes
  lexicon: BDAG
  rationale: El término puede abarcar sustancias aromáticas usadas en preparación funeraria. «Aromas» mantiene amplitud semántica sin cerrar prematuramente el referente en español; el contexto de ungir aclara su función. Se evita sustituirlo por una palabra más interpretativa que reduzca la ambigüedad del original.
- source_word: ἵνα ἐλθοῦσαι ἀλείψωσιν αὐτόν
  english_pob_choice: so that they might come and anoint him
  chosen_spanish: para ir y ungirlo
  alternatives_spanish:
  - para que fueran y lo ungieran
  - a fin de ir y ungirlo
  - para, después de ir, ungirlo
  lexicon: BDAG
  rationale: ἵνα introduce finalidad. El participio ἐλθοῦσαι expresa la secuencia de ir/venir antes de ungir; en español, «para ir y ungirlo» comunica ese orden de forma fluida. «Ungirlo» conserva el sentido funerario de ἀλείφω sin paraphrasear como «prepararlo».
theological_decisions:
- issue: Relación de María con Jacobo expresada por la frase elíptica griega
  english_pob_reading: Mary the mother of James
  chosen_spanish_reading: María la de Jacobo
  alternative_spanish_readings:
  - María, la madre de Jacobo
  - María de Jacobo
  rationale: La tradición evangélica suele entender esta identificación como «la madre de Jacobo», pero el griego solo ofrece una relación genitiva elíptica. En el texto principal se conserva la forma más cercana al original; la nota documenta la lectura tradicional sin borrarla.
  doctrine_reference: Principio de equivalencia óptima; mantener tensiones textuales documentadas y aclararlas en nota, no en el cuerpo cuando el original es elíptico.
translation_notes:
  revision_awareness: Se siguió el estado más reciente sin cambios sustanciales del expediente en inglés; la redacción española adapta con naturalidad la secuencia temporal y mantiene documentadas las alternativas relevantes del genitivo relacional y del sustantivo ἀρώματα.
  spanish_consistency_notes:
  - Se preservó «Yahvé» como norma del proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «ungir» para ἀλείφω, coherente con el uso lexical del proyecto en contextos de preparación funeraria.
  - Se mantuvo una formulación cercana al griego para la identificación de María, evitando sobreinterpretar en el texto principal lo que la nota puede aclarar.
