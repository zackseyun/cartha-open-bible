    unchanged: false
    changes_summary: Replaced 'the signs that accompanied it' with 'the accompanying signs' to reflect the Greek more directly and avoid making 'it' explicitly refer to 'the message,' which is not stated in the source.
translation:
  language: es
  text: Y ellos salieron y proclamaron por todas partes, mientras el Señor trabajaba con ellos y confirmaba el mensaje[a] mediante las señales que acompañaban[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra». El griego λόγος puede significar «palabra», pero aquí se refiere al mensaje proclamado.
    reason: lexical_alternative
  - marker: b
    text: O «mediante las señales acompañantes» o «mediante las señales que seguían».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - esos
  - aquellos
  lexicon: BDAG
  rationale: El demostrativo retoma al grupo ya mencionado; en español, «ellos» comunica la referencia de manera natural sin sobrecargar con un demostrativo más marcado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ es continuativo; «Y» mantiene la progresión narrativa sin introducir contraste indebido.
- source_word: ἐξελθόντες
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - partieron
  lexicon: BDAG
  rationale: El participio aoristo funciona con valor de circunstancia acompañante; en español, el pretérito simple «salieron» es la forma más natural y fiel al movimiento indicado.
- source_word: ἐκήρυξαν
  english_pob_choice: proclaimed
  chosen_spanish: proclamaron
  alternatives_spanish:
  - predicaron
  - anunciaron
  - heraldaron
  lexicon: BDAG
  rationale: κηρύσσω expresa proclamación pública; «proclamaron» conserva esa fuerza sin restringirse a un registro eclesiástico más estrecho.
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: por todas partes
  alternatives_spanish:
  - en todo lugar
  - por doquier
  lexicon: BDAG
  rationale: «Por todas partes» es un equivalente idiomático y claro de la idea adverbial de ubicuidad.
- source_word: τοῦ κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el dueño
  - el Maestro
  lexicon: BDAG
  rationale: Dado el contexto inmediato de Marcos 16:19, κύριος continúa la referencia a Jesús exaltado; «el Señor» preserva el título reconocido en español.
- source_word: συνεργοῦντος
  english_pob_choice: worked with them
  chosen_spanish: trabajaba con ellos
  alternatives_spanish:
  - cooperaba con ellos
  - colaboraba con ellos
  - trabajaba junto con ellos
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción concurrente de apoyo; «trabajaba con ellos» mantiene el sentido de cooperación divina de modo idiomático en español.
- source_word: τὸν λόγον
  english_pob_choice: the message
  chosen_spanish: el mensaje
  alternatives_spanish:
  - la palabra
  - la proclamación
  lexicon: BDAG
  rationale: En este contexto λόγος se refiere al contenido proclamado, no a una sola «palabra» léxica; «el mensaje» comunica con claridad la referencia al anuncio apostólico.
- source_word: βεβαιοῦντος
  english_pob_choice: confirmed
  chosen_spanish: confirmaba
  alternatives_spanish:
  - establecía
  - validaba
  - hacía firme
  lexicon: BDAG
  rationale: βεβαιόω aquí significa dar confirmación o respaldo; «confirmaba» refleja bien la acción de autenticación divina.
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: mediante
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά expresa medio o instrumento; «mediante» es preciso y natural en español formal.
- source_word: τῶν ἐπακολουθούντων σημείων
  english_pob_choice: the accompanying signs
  chosen_spanish: las señales acompañantes
  alternatives_spanish:
  - las señales que acompañaban
  - las señales que seguían
  lexicon: BDAG
  rationale: El participio describe señales que acompañan al anuncio; «señales acompañantes» conserva la relación sin añadir un referente explícito no expresado en el griego.
theological_decisions:
- issue: Referente de «el Señor»
  english_pob_reading: Jesus, the risen Lord, is the one working with the disciples and confirming their proclamation.
  chosen_spanish_reading: Jesús resucitado es el Señor que trabaja con los discípulos y confirma su proclamación.
  alternative_spanish_readings:
  - Dios en sentido general es quien actúa con ellos
  rationale: El contexto inmediato ya había identificado a Jesús como «el Señor»; mantener «el Señor» en español preserva la continuidad referencial sin añadir glosas interpretativas al texto principal.
  doctrine_reference: 'Contested terms: κύριος → Señor'
- issue: Función de las señales
  english_pob_reading: The signs are presented as divine confirmation of the apostolic message.
  chosen_spanish_reading: Las señales se presentan como confirmación divina del mensaje apostólico.
  alternative_spanish_readings:
  - Las señales solo acompañaban a los predicadores sin función explícita de confirmación
  rationale: La sintaxis vincula la confirmación del mensaje con las señales; «mediante las señales acompañantes» conserva la relación de medio/acompañamiento sin exagerar más allá del texto.
  doctrine_reference: Señales como autentificación del testimonio
- issue: Valor de λόγος
  english_pob_reading: '''the word'' can mean ''word,'' but here it refers to the proclaimed message.'
  chosen_spanish_reading: λόγος se entiende aquí como el mensaje proclamado.
  alternative_spanish_readings:
  - la palabra
  - la Palabra
  rationale: «El mensaje» evita una ambigüedad en español que podría sonar más abstracta o escritural de lo que el contexto inmediato exige.
  doctrine_reference: 'Contested terms: λόγος → mensaje'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés al preferir una formulación que no añada un referente explícito para las señales. Por eso se traduce διὰ τῶν ἐπακολουθούντων σημείων como «mediante las señales acompañantes» y no como una frase que explicite «del mensaje» en el sustantivo correspondiente. También se conserva la continuidad narrativa simple de δέ con «Y».
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος siguiendo el patrón del contexto de Marcos 16:19-20.
  - Se usa «mensaje» para λόγος en línea con la decisión inglesa y con claridad en español.
  - «Señales acompañantes» conserva el matiz de acompañamiento sin forzar un pronombre o antecedente explícito.
  - El estilo es sobrio y publicable, con puntuación española estándar y sin calco excesivo del inglés.
