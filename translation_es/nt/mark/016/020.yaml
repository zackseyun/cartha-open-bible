  text: ἐκεῖνοι δὲ ἐξελθόντες ἐκήρυξαν πανταχοῦ, τοῦ κυρίου συνεργοῦντος καὶ τὸν λόγον βεβαιοῦντος διὰ τῶν ἐπακολουθούντων ⸀σημείων.⟧
base_translation:
  language: en
  yaml_path: translation/nt/mark/016/020.yaml
  text: And they went out and proclaimed everywhere[b][a], while the Lord worked with them and confirmed the message through the accompanying signs.
  footnotes:
  - marker: a
    text: Or 'the word.' Greek λόγον can mean 'word,' but here it refers to the proclaimed message.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the accompanying signs' or 'through the signs that followed.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
