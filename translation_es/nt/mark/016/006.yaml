  source_alignment_summary: 'El borrador sigue bien la estructura del griego y preserva aciertos importantes: presente histórico («les dice»), «el Nazareno», el perfecto pasivo de «ha sido crucificado», y la nota sobre la voz pasiva de ἠγέρθη. Sin embargo, «Ha sido levantado» para ἠγέρθη, aunque formalmente auditable, no suena natural ni es la mejor equivalencia española para el contexto de resurrección. Además, «lo pusieron» es demasiado plano para el contexto sepulcral frente a ἔθηκαν.'
  spanish_quality_summary: El español es claro en general, pero «Ha sido levantado» resulta torpe y poco idiomático en registro bíblico contemporáneo, y puede sonar físico/espacial más que pascual. «Lo pusieron» es comprensible, pero menos digno y menos preciso en contexto funerario que «lo depositaron» o «lo colocaron». Conviene también mantener el imperativo con naturalidad y dignidad.
  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. «Jesús» y «el Nazareno» están bien. La principal tensión está en la decisión verbal para ἠγέρθη: en español, «ha sido resucitado» preserva mejor la pasiva y comunica claramente el sentido de resurrección, mientras la nota puede seguir informando las alternativas «ha resucitado» y «se ha levantado».'
  issues:
  - severity: high
    issue: «Ha sido levantado» para ἠγέρθη es poco natural y potencialmente ambiguo en español.
    rationale: Aunque reproduce la idea de ἐγείρω, en español bíblico general no comunica con claridad inmediata la resurrección. «Ha sido resucitado» conserva la pasiva del griego y evita una lectura física de ser levantado del suelo o del lecho.
  - severity: medium
    issue: «Lo pusieron» rebaja el registro y pierde precisión contextual en la escena funeraria.
    rationale: El griego ἔθηκαν admite una formulación más digna y apropiada al entierro. «Lo depositaron» suena natural, claro y mejor ajustado al contexto del sepulcro que «lo pusieron».
  - severity: low
