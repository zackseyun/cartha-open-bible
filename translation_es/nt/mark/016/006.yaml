revisions:
- from: 'Pero él les dice: «No se alarmen. Ustedes buscan a Jesús el Nazareno[a], el que ha sido crucificado. Ha sido levantado; no está aquí[b]. Miren: el lugar donde lo pusieron»'
  to: 'Pero él les dice: «No se alarmen. Ustedes buscan a Jesús el Nazareno[a], el que ha sido crucificado. Ha sido resucitado; no está aquí[b]. Miren: el lugar donde lo depositaron».'
  rationale: Se revisa «Ha sido levantado» a «Ha sido resucitado» para conservar la voz pasiva de ἠγέρθη sin sacrificar naturalidad ni claridad en español. Se revisa «lo pusieron» a «lo depositaron» para un registro más digno y contextual en una escena de sepultura. Se mantienen el presente histórico, «el Nazareno» y la nota léxica correspondiente.
