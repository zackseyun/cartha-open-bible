translation:
  language: es
  text: 'Pero él les dice: «No se alarmen. Ustedes buscan a Jesús el Nazareno[a], el que ha sido crucificado. Ha sido resucitado; no está aquí[b]. Miren: el lugar donde lo depositaron».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el Nazoreo» o «el de Nazaret». El griego usa una designación derivada de Nazaret.
    reason: lexical_alternative
  - marker: b
    text: 'O, «Ha resucitado» o «Se ha levantado». El verbo griego es pasivo: «Ha sido resucitado».'
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει αὐταῖς
  english_pob_choice: he says to them
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: SBLGNT / narrativa de Marcos
  rationale: El presente histórico se conserva mejor con el presente en español para mantener la viveza narrativa de Marcos. 'Les dice' refleja directamente λέγει sin forzar un pretérito.
- source_word: Μὴ ἐκθαμβεῖσθε
  english_pob_choice: Do not be alarmed
  chosen_spanish: No se alarmen
  alternatives_spanish:
  - No se asusten
  - No teman
  - No estén alarmadas
  lexicon: BDAG
  rationale: ἐκθαμβεῖσθε expresa fuerte perturbación o sobresalto, no simple sorpresa. 'No se alarmen' es natural en español contemporáneo y conserva esa fuerza. Se evita 'asustarse' por ser algo más emocional y menos preciso.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - —
  lexicon: uso estándar
  rationale: Nombre propio fijado en español cristiano y en la tradición bíblica.
- source_word: τὸν Ναζαρηνὸν
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - el de Nazaret
  - el Nazoreo
  lexicon: BDAG
  rationale: El adjetivo designa a Jesús como epíteto. 'Nazareno' preserva la forma y la fuerza del griego mejor que suavizarlo a 'de Nazaret'. En español es claro y reconocible.
- source_word: τὸν ἐσταυρωμένον
  english_pob_choice: the one who has been crucified
  chosen_spanish: el que ha sido crucificado
  alternatives_spanish:
  - el crucificado
  - el que fue crucificado
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción cumplida con efecto presente. 'El que ha sido crucificado' mantiene la voz pasiva y la referencia al hecho consumado, sin perder legibilidad.
- source_word: ἠγέρθη
  english_pob_choice: He has been raised
  chosen_spanish: Ha sido levantado
  alternatives_spanish:
  - Ha resucitado
  - Ha sido resucitado
  - Se ha levantado
  lexicon: BDAG
  rationale: Se conserva la voz pasiva del griego. 'Levantado' reproduce con más transparencia la pasiva de ἐγείρω que 'resucitado', aunque en español suena menos idiomático; por eso se mantiene como forma más auditable. La lectura pasiva expresa claramente la acción divina implícita.
- source_word: οὐκ ἔστιν ὧδε
  english_pob_choice: he is not here
  chosen_spanish: no está aquí
  alternatives_spanish:
  - no se encuentra aquí
  - no está acá
  lexicon: BDAG
  rationale: Es la equivalencia natural y directa de la frase locativa. Se evita una construcción más pesada.
- source_word: ἴδε
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren esto
  - Vean
  lexicon: BDAG
  rationale: La exhortación enfática se adapta al plural del contexto. 'Miren' comunica la misma llamada a dirigir la atención sin arcaísmo.
- source_word: ὁ τόπος
  english_pob_choice: the place
  chosen_spanish: el lugar
  alternatives_spanish:
  - el sitio
  lexicon: BDAG
  rationale: '''Lugar'' es el equivalente estándar y suficientemente concreto en este contexto funerario.'
- source_word: ἔθηκαν αὐτόν
  english_pob_choice: they laid him
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo depositaron
  - lo colocaron
  - lo dejaron
  lexicon: BDAG
  rationale: El aoristo describe la acción de situar el cuerpo en la tumba. 'Pusieron' es simple y comprensible en español; 'lo pusieron' preserva el referente sin añadir solemnidad no requerida por el texto.
theological_decisions:
- issue: Forma pasiva de la resurrección
  english_pob_reading: He has been raised
  chosen_spanish_reading: Ha sido levantado
  alternative_spanish_readings:
  - Ha resucitado
  - Se ha levantado
  - Ha sido resucitado
  rationale: El griego ἠγέρθη es pasivo. La traducción conserva esa voz para no borrar la forma verbal del original ni convertirla automáticamente en una activa española. Aunque 'ha resucitado' es más idiomático, aquí se prefiere una forma pasiva más transparente al griego.
  doctrine_reference: Afirmación cristiana de la resurrección; fidelidad verbal al pasivo griego
- issue: Identificación de Jesús con el epíteto geográfico
  english_pob_reading: the Nazarene
  chosen_spanish_reading: el Nazareno
  alternative_spanish_readings:
  - el de Nazaret
  - el Nazoreo
  rationale: El texto presenta un título/designación, no solo una referencia geográfica. 'El Nazareno' conserva ese matiz titular y evita diluirlo en una frase explicativa.
  doctrine_reference: Cristología narrativa en Marcos; designación honorífica de Jesús
translation_notes:
  revision_awareness: Se siguió de cerca el paquete fuente griego y el rastro auditado en inglés. No hubo revisiones aplicadas en el inglés POB; por tanto, la redacción española conserva su estructura y decisiones léxicas principales, ajustándolas a un español natural sin perder la voz pasiva de ἠγέρθη ni el valor titular de Ναζαρηνὸν.
  spanish_consistency_notes:
  - Se mantuvo 'Jesús' como nombre propio estándar.
  - Se preservó la voz pasiva en la resurrección para ser transparente al griego.
  - '''Nazareno'' se eligió como equivalente titular y no como mera paráfrasis geográfica.'
  - Se usó el presente narrativo 'dice' para reflejar el histórico presente de Marcos.
  - '''Alarmen'' comunica mejor ἐκθαμβεῖσθε que un simple ''no teman''.'
