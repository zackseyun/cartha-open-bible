  yaml_path: translation/nt/mark/016/006.yaml
  text: But he says to them[a], “Do not be alarmed. You are looking for Jesus the Nazarene, the one who has been crucified. He has been raised; he is not here[b]. Look—the place where they laid him.”
  footnotes:
