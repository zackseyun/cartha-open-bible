translation:
  language: es
  text: Después de estas cosas, se apareció en otra forma[a] a dos de ellos, mientras iban de camino al campo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en una forma diferente'.
    reason: lexical_alternative
  - marker: b
    text: O 'a un campo'; aquí 'al campo' refleja el sentido probable de ἀγρός en este contexto, como zona rural.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μετὰ δὲ ταῦτα
  english_pob_choice: After these things
  chosen_spanish: Después de estas cosas
  alternatives_spanish:
  - Luego de estas cosas
  - Más tarde
  lexicon: SBLGNT / BDAG
  rationale: Conserva la secuencia temporal marcada por μετά + acusativo y el matiz de continuación de δέ sin convertirlo en una paráfrasis libre. 'Después de estas cosas' es natural en español bíblico y más cercano al griego que 'Más tarde'.
- source_word: δυσὶν ἐξ αὐτῶν
  english_pob_choice: to two of them
  chosen_spanish: a dos de ellos
  alternatives_spanish:
  - a dos de entre ellos
  - a dos de su grupo
  lexicon: BDAG
  rationale: La construcción identifica a dos miembros tomados del grupo mayor. 'A dos de ellos' es idiomático en español y mantiene esa relación inclusiva sin recargar la frase.
- source_word: περιπατοῦσιν
  english_pob_choice: as they were walking
  chosen_spanish: mientras iban de camino
  alternatives_spanish:
  - mientras caminaban
  - cuando caminaban
  lexicon: BDAG
  rationale: El participio expresa acción simultánea y continua. 'Mientras iban de camino' conserva el movimiento en curso y evita repetir de modo torpe la idea que ya sugiere el contexto con πορευομένοις.
- source_word: ἐφανερώθη
  english_pob_choice: he appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se manifestó
  lexicon: BDAG
  rationale: En este contexto, el pasivo de φανερόω funciona como aparición post-resurrección. 'Se apareció' es natural en español y comunica la acción sin introducir una explicación teológica adicional.
- source_word: ἐν ἑτέρᾳ μορφῇ
  english_pob_choice: in a different form
  chosen_spanish: en otra forma
  alternatives_spanish:
  - en una forma diferente
  - con otra apariencia
  lexicon: BDAG
  rationale: ἑτέρᾳ indica alteridad o diferencia, y μορφῇ se refiere a la forma/figura externa. 'En otra forma' preserva la afirmación del texto y deja intacta la tensión sobre cómo se produjo el cambio.
- source_word: πορευομένοις
  english_pob_choice: on their way
  chosen_spanish: iban de camino
  alternatives_spanish:
  - mientras iban
  - cuando iban
  lexicon: BDAG
  rationale: El participio sugiere desplazamiento con propósito. 'Iban de camino' es una expresión natural que comunica el avance hacia un destino sin redundancia excesiva.
- source_word: εἰς ἀγρόν
  english_pob_choice: into the countryside
  chosen_spanish: al campo
  alternatives_spanish:
  - al campo abierto
  - a un campo
  lexicon: BDAG
  rationale: Aunque ἀγρός puede significar 'campo', en este contexto probablemente alude a una zona rural. 'Al campo' mantiene la ambigüedad útil entre 'campo' como lugar rural y 'field' sin forzar un sentido más específico de lo que el texto asegura.
theological_decisions:
- issue: Cómo traducir la aparición del resucitado descrita por ἐν ἑτέρᾳ μορφῇ
  english_pob_reading: Render descriptively as 'in a different form' without explaining how the difference operated.
  chosen_spanish_reading: Traducir descriptivamente con 'en otra forma', sin explicar si se trata de apariencia, percepción u otro modo de reconocimiento.
  alternative_spanish_readings:
  - con otra apariencia
  - en una forma diferente
  rationale: El versículo afirma la aparición en una forma distinta, pero no especifica el mecanismo ni resuelve la tensión interpretativa. El español debe preservar esa ambigüedad y no suavizarla con una explicación doctrinal implícita.
  doctrine_reference: Preservar la tensión textual sobre la forma de la aparición del resucitado.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el auditable English POB. No hubo revisiones posteriores en el paquete, y se mantuvo la decisión de no explicar teológicamente ἐν ἑτέρᾳ μορφῇ.
  spanish_consistency_notes:
  - Se usa 'se apareció' para ἐφανερώθη, consistente con un relato de manifestación post-resurrección.
  - '''En otra forma'' mantiene la misma tensión semántica que el inglés ''in a different form'' y evita harmonizar el pasaje.'
  - '''Al campo'' conserva la naturalidad del español sin fijar indebidamente un ''campo'' agrícola individual.'
