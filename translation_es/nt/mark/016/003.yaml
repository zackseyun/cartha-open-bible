revisions:
- from: 'Y se decían unas a otras[a]: «¿Quién nos hará rodar la piedra desde la entrada del sepulcro?»'
  to: 'Y se decían unas a otras: «¿Quién nos removerá la piedra de la entrada[a] del sepulcro?»'
  rationale: 'Se corrige la expresión verbal para que el español sea natural y fiel al sentido de ἀποκυλίσει + ἡμῖν: alguien quitará/removerá la piedra en beneficio de ellas. Se conserva «entrada» en el texto principal por claridad contextual y se traslada la nota alternativa a θύρα, donde pertenece según el rastro inglés. Se elimina la nota sobre «a sí mismas» porque el sentido recíproco «unas a otras» ya está bien resuelto en el texto principal y no es la alternativa documentada que debe preservarse aquí.'
