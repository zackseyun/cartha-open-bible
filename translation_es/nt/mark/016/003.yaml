translation:
  language: es
  text: 'Y se decían unas a otras: «¿Quién nos removerá la piedra de la entrada[a] del sepulcro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la puerta del sepulcro».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: se decían
  alternatives_spanish:
  - decían
  - se estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o repetida; en español, «se decían» conserva bien ese valor aspectual sin sonar forzado.
- source_word: πρὸς ἑαυτάς
  english_pob_choice: to one another
  chosen_spanish: unas a otras
  alternatives_spanish:
  - entre sí
  - a sí mismas
  lexicon: BDAG
  rationale: El contexto presenta a varias mujeres hablando entre ellas. «Unas a otras» refleja mejor el sentido recíproco que una traducción literal «a sí mismas».
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Quién es el que
  - ¿Qué persona
  lexicon: BDAG
  rationale: Es la interrogativa natural en español para preguntar por la persona capaz de hacer la acción.
- source_word: ἀποκυλίσει
  english_pob_choice: will roll away
  chosen_spanish: hará rodar
  alternatives_spanish:
  - rodará
  - rodará fuera
  lexicon: BDAG
  rationale: El verbo describe quitar una piedra mediante rodarla. «Hará rodar» conserva la imagen concreta del movimiento y la idea de apartarla.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: 'En español, el dativo de ventaja suele expresarse de forma más natural con pronombre átono: «nos hará rodar».'
- source_word: λίθον
  english_pob_choice: the stone
  chosen_spanish: la piedra
  alternatives_spanish:
  - la gran piedra
  - el piedra
  lexicon: BDAG
  rationale: El sustantivo significa simplemente «piedra». No se añade «grande» porque no está explícito en el griego.
- source_word: ἐκ τῆς θύρας
  english_pob_choice: from the entrance
  chosen_spanish: desde la entrada
  alternatives_spanish:
  - de la puerta
  - desde la puerta
  lexicon: BDAG
  rationale: θύρα puede ser «puerta» o «entrada». En el contexto de un sepulcro, «entrada» comunica mejor la apertura del sepulcro sin imponer la imagen de una puerta física.
- source_word: τοῦ μνημείου
  english_pob_choice: of the tomb
  chosen_spanish: del sepulcro
  alternatives_spanish:
  - de la tumba
  - del monumento funerario
  lexicon: BDAG
  rationale: En el relato de la resurrección, μνημεῖον se refiere a un lugar de entierro. «Sepulcro» es claro, natural y fiel al contexto.
translation_notes:
  revision_awareness: El texto griego presenta un imperfecto de discurso y una expresión recíproca que la POB inglesa resolvió como progresiva e idiomática. La propuesta española sigue esa línea y mantiene la imagen concreta de rodar la piedra sin añadir información no explícita.
  spanish_consistency_notes:
  - Se usa «sepulcro» para μνημεῖον en coherencia con el registro narrativo de la resurrección.
  - Se evita «SEÑOR» o fórmulas litúrgicas no pertinentes; no hay vocabulario divino en este versículo.
  - La nota de pie conserva la alternativa literal de la expresión recíproca, ya que en español existe una tensión entre literalidad («a sí mismas») e idiomatismo («unas a otras»).
