review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: imperfecto iterativo/progresivo («se decían»), valor recíproco de πρὸς ἑαυτάς («unas a otras»), interrogativa simple («¿Quién...?»), imagen concreta de ἀποκυλίσει con la piedra, y «entrada del sepulcro» como buena opción para ἐκ τῆς θύρας τοῦ μνημείου. La nota alternativa para θύρας no se preservó; en cambio se añadió una nota en πρὸς ἑαυτάς, aunque el rastro inglés documenta la alternativa léxica en «door/entrance».'
  spanish_quality_summary: 'El español es claro y legible, pero «¿Quién nos hará rodar la piedra...?» suena poco natural y puede sugerir que alguien hará que ellas la rueden, no que la quitará en beneficio de ellas. En español idiomático y fiel al dativo de ventaja, «¿Quién nos quitará la piedra de la entrada del sepulcro?» o «¿Quién nos moverá la piedra de la entrada del sepulcro?» funciona mejor. Dado que el rastro inglés enfatiza la imagen de rodar, conviene mantenerla si es posible con una construcción natural: «¿Quién nos quitará la piedra de la entrada del sepulcro?» sacrifica algo de la imagen; «¿Quién nos hará rodar...» no es aceptable. Mejor: «¿Quién nos removerá[a] la piedra de la entrada del sepulcro?» con nota alternativa «O “de la puerta del sepulcro”».'
  glossary_alignment: No hay términos del glosario maestro especialmente disputados en este versículo. «Sepulcro» para μνημεῖον es apropiado. La principal corrección es alinear las notas con la decisión documentada sobre θύρα = «entrada/puerta», no sobre πρὸς ἑαυτάς.
  issues:
  - severity: medium
    issue: La construcción «nos hará rodar la piedra» es poco natural y semánticamente ambigua en español.
    rationale: Puede entenderse como causativa dirigida a «nosotros/nosotras» en vez de expresar que alguien quitará la piedra en favor de ellas. No representa bien el dativo de ventaja combinado con ἀποκυλίσει.
  - severity: medium
    issue: La nota al pie está anclada en la frase equivocada.
    rationale: El rastro inglés conserva la alternativa léxica en θύρα («entrance/door»), no en πρὸς ἑαυτάς. Aunque «a sí mismas» es una alternativa posible, aquí la nota documentada que debe preservarse es la de «puerta/entrada».
  - severity: low
    issue: «Desde la entrada» es menos natural que «de la entrada» después de un verbo de quitar/remover.
    rationale: Con verbos como «quitar» o «remover», el español idiomático normalmente usa «de la entrada», que además refleja bien ἐκ.
  revised_spanish_text: 'Y se decían unas a otras: «¿Quién nos removerá la piedra de la entrada[a] del sepulcro?»'
  revised_footnotes:
  - marker: a
    text: O «de la puerta del sepulcro».
    reason: lexical_alternative
  revision_rationale: 'Se corrige la expresión verbal para que el español sea natural y fiel al sentido de ἀποκυλίσει + ἡμῖν: alguien quitará/removerá la piedra en beneficio de ellas. Se conserva «entrada» en el texto principal por claridad contextual y se traslada la nota alternativa a θύρα, donde pertenece según el rastro inglés. Se elimina la nota sobre «a sí mismas» porque el sentido recíproco «unas a otras» ya está bien resuelto en el texto principal y no es la alternativa documentada que debe preservarse aquí.'
