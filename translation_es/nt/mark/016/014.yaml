  text: Ὕστερον ⸀δὲ ἀνακειμένοις αὐτοῖς τοῖς ἕνδεκα ἐφανερώθη, καὶ ὠνείδισεν τὴν ἀπιστίαν αὐτῶν καὶ σκληροκαρδίαν ὅτι τοῖς θεασαμένοις αὐτὸν ⸀ἐγηγερμένον οὐκ ἐπίστευσαν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/016/014.yaml
  text: Later[a], he appeared to the eleven themselves as they were reclining at the table, and he rebuked their unbelief and hardness of heart[c][b], because they had not believed those who had seen him after he had been raised.
  footnotes:
  - marker: a
    text: Or 'Afterward.'
    reason: lexical_alternative
  - marker: b
    text: Or 'as they were reclining'; the Greek refers to the customary posture for eating.
    reason: cultural_note
  - marker: c
    text: Or 'those who had seen him risen.' The Greek more literally says 'those who had seen him having been raised/raised.'
    reason: lexical_alternative
