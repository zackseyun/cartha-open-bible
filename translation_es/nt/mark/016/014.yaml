revisions:
- from: Después[a], se apareció a los once mismos mientras estaban reclinados a la mesa[b], y reprendió su incredulidad y dureza de corazón, porque no habían creído a los que lo habían visto resucitado[c].
  to: Más tarde[a], se apareció a los once mientras estaban reclinados a la mesa[b], y reprendió su incredulidad y dureza de corazón, porque no habían creído a los que lo habían visto después de haber sido resucitado[c].
  rationale: Se reemplaza «Después» por «Más tarde» para alinear el texto principal con la elección inglesa preferida, dejando «Después» como alternativa válida. Se elimina «mismos» por falta de naturalidad en español. Se revisa la cláusula final a «después de haber sido resucitado» para conservar mejor el valor pasivo de ἐγηγερμένον, conforme a la decisión lexical/theológica del POB. También se ajusta la nota c para que refleje de verdad la alternativa española más idiomática frente a la forma pasiva más explícita del texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:47:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue de cerca el sentido del griego en la secuencia temporal, la aparición a los once, la reprensión por incredulidad y dureza de corazón, y la referencia a los testigos que lo habían visto después de la resurrección. Sin embargo, hay dos desajustes relevantes: «los once mismos» suena poco idiomático en español y no refleja bien el énfasis leve de αὐτοῖς; y «resucitado» en el texto principal atenúa el matiz pasivo de ἐγηγερμένον que el rastro POB quiso conservar explícitamente como «had been raised».'
  spanish_quality_summary: El español es generalmente claro y eclesialmente legible, con buena elección de «reprendió», «incredulidad» y «dureza de corazón». No obstante, «los once mismos» es torpe y antinatural; «a los once» o «a los once mismos» no es la mejor solución en este contexto, y la omisión del matiz se tolera mejor que un giro extraño. También conviene ajustar la nota c, porque tal como está repite casi exactamente el texto principal y no explica con precisión la alternativa pasiva.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La metáfora «dureza de corazón» preserva bien σκληροκαρδία. La decisión sobre ἐγηγερμένον debe alinearse mejor con la racionalidad teológica/lexical documentada, prefiriendo una formulación principal que conserve el pasivo («después de haber sido resucitado») o, al menos, una nota que lo explicite con claridad. Dado el estilo español, esa perífrasis es aceptable aquí.
  issues:
  - severity: medium
    issue: «los once mismos» es poco idiomático
    rationale: Aunque busca reflejar αὐτοῖς, en español suena forzado y reduce la naturalidad. El griego añade un énfasis leve al grupo destinatario, pero no exige una reproducción literal torpe.
  - severity: medium
    issue: El texto principal «lo habían visto resucitado» debilita el pasivo de ἐγηγερμένον
    rationale: El expediente inglés justificó explícitamente «after he had been raised» para conservar la voz pasiva y la sensibilidad teológica del participio perfecto pasivo. «Resucitado» en español puede leerse de forma más activa o menos explícita.
  - severity: low
    issue: La nota c no aporta bien la alternativa respecto del texto principal
    rationale: La nota comienza con una formulación prácticamente igual al texto principal y luego ofrece una explicación literal poco pulida («habiendo sido levantado/resucitado»). Conviene reformularla para contrastar mejor «resucitado» con «después de haber sido resucitado» o «habiendo sido resucitado».
  revised_spanish_text: Más tarde[a], se apareció a los once mientras estaban reclinados a la mesa[b], y reprendió su incredulidad y dureza de corazón, porque no habían creído a los que lo habían visto después de haber sido resucitado[c].
  revised_footnotes:
