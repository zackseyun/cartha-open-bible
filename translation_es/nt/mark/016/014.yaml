translation:
  language: es
  text: Más tarde[a], se apareció a los once mientras estaban reclinados a la mesa[b], y reprendió su incredulidad y dureza de corazón, porque no habían creído a los que lo habían visto después de haber sido resucitado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Después».
    reason: lexical_alternative
  - marker: b
    text: O «mientras estaban reclinados»; el griego alude a la postura habitual para comer.
    reason: cultural_note
  - marker: c
    text: O «a los que lo habían visto resucitado». El griego dice más literalmente «a los que lo habían visto habiendo sido resucitado/levantado».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὕστερον
  english_pob_choice: Later
  chosen_spanish: Después
  alternatives_spanish:
  - Más tarde
  - Luego
  lexicon: BDAG
  rationale: El adverbio marca una aparición posterior; «Después» mantiene la secuencia temporal con naturalidad en español y sin añadir matiz innecesario.
- source_word: ἀνακειμένοις
  english_pob_choice: as they were reclining at the table
  chosen_spanish: mientras estaban reclinados a la mesa
  alternatives_spanish:
  - mientras estaban reclinados
  - mientras estaban sentados a la mesa
  lexicon: BDAG
  rationale: El participio alude a la postura habitual de comer en el mundo mediterráneo antiguo. «Reclinados a la mesa» conserva ese rasgo cultural y resulta inteligible; se evita reducirlo a una simple acción estática.
- source_word: τοῖς ἕνδεκα
  english_pob_choice: the eleven themselves
  chosen_spanish: los once mismos
  alternatives_spanish:
  - los once
  lexicon: BDAG
  rationale: «Los once» identifica el grupo apostólico tras la pérdida de Judas; «mismos» refleja levemente el valor enfático de αὐτοῖς, sin sobrecargar el español.
- source_word: ἐφανερώθη
  english_pob_choice: he appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - se hizo visible
  lexicon: BDAG
  rationale: En contexto de resurrección, «se apareció» es natural y fiel al valor de aparición de la forma pasiva, evitando una traducción demasiado técnica.
- source_word: ὠνείδισεν
  english_pob_choice: he rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprochó
  - amonestó
  lexicon: BDAG
  rationale: «Reprendió» comunica censura fuerte y clara en español moderno, equivalente al force of verbal blame del verbo griego.
- source_word: ἀπιστίαν
  english_pob_choice: unbelief
  chosen_spanish: incredulidad
  alternatives_spanish:
  - falta de fe
  lexicon: BDAG
  rationale: «Incredulidad» expresa de manera directa la negativa o incapacidad de creer el testimonio recibido; en español es más natural que «no creencia» o una paráfrasis excesiva.
- source_word: σκληροκαρδίαν
  english_pob_choice: hardness of heart
  chosen_spanish: dureza de corazón
  alternatives_spanish:
  - endurecimiento del corazón
  - terquedad
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de un corazón resistente, con una formulación clara y tradicional en español sin banalizarla como mera obstinación.
- source_word: θεασαμένοις
  english_pob_choice: those who had seen
  chosen_spanish: a los que lo habían visto
  alternatives_spanish:
  - a los que habían contemplado
  - a los testigos que lo habían visto
  lexicon: BDAG
  rationale: El participio enfatiza a los testigos oculares. «A los que lo habían visto» reproduce de forma sobria y directa la fuerza testimonial del griego.
- source_word: ἐγηγερμένον
  english_pob_choice: after he had been raised
  chosen_spanish: resucitado
  alternatives_spanish:
  - habiendo sido levantado
  - después de haber sido resucitado
  lexicon: BDAG
  rationale: En español, «resucitado» condensa el participio perfecto pasivo con naturalidad. Se evita una perífrasis pesada que podría sonar menos idiomática, aunque el valor pasivo subyace en el contexto.
- source_word: οὐκ ἐπίστευσαν
  english_pob_choice: they had not believed
  chosen_spanish: no habían creído
  alternatives_spanish:
  - no creyeron
  lexicon: BDAG
  rationale: 'El pluscuamperfecto español capta bien la relación temporal: antes de esta aparición, no habían dado crédito al testimonio previo.'
theological_decisions:
- issue: Forma de la aparición del Resucitado
  english_pob_reading: he appeared
  chosen_spanish_reading: se apareció
  alternative_spanish_readings:
  - apareció
  - se hizo visible
  rationale: La lectura mantiene la afirmación de una aparición real del Resucitado sin convertirla en una explicación interpretativa adicional. El pasivo griego se expresa de forma idiomática en español.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
- issue: Relación entre el testimonio y la incredulidad
  english_pob_reading: they had not believed those who had seen him after he had been raised
  chosen_spanish_reading: no habían creído a los que lo habían visto resucitado
  alternative_spanish_readings:
  - no habían creído a los que lo habían visto después de resucitar
  - no habían creído el testimonio de los que lo habían visto
  rationale: 'Se conserva el vínculo causal del texto: la reprensión se funda en que rechazaron el testimonio de los testigos oculares. «Resucitado» mantiene el contenido pascual sin debilitarlo.'
  doctrine_reference: Translation philosophy §§1, 6
- issue: Imagen de la dureza de corazón
  english_pob_reading: hardness of heart
  chosen_spanish_reading: dureza de corazón
  alternative_spanish_readings:
  - endurecimiento del corazón
  - terquedad
  rationale: La metáfora bíblica se preserva porque tiene peso teológico y literario. Evitar una simplificación ayuda a mantener la resonancia bíblica del reproche de Jesús.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del audit trail en inglés y conserva las opciones ya revisadas como de alta concordancia. Se mantiene la secuencia temporal, el matiz cultural de ἀνακειμένοις y la fuerza pasiva de ἐγηγερμένον, expresada en español de manera idiomática.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según contexto, pero aquí no aparecen.
  - «Mesías/Cristo» no entra en este versículo.
  - Se mantiene «incredulidad» para ἀπιστία y «dureza de corazón» para σκληροκαρδία, en línea con la terminología POB.
  - Se evita una calca demasiado literal de la sintaxis griega para conservar legibilidad pública en español.
