translation:
  language: es
  text: Tomarán serpientes[a], y si beben algo mortal[b], no les hará ningún daño; pondrán las manos sobre los enfermos, y se recuperarán[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos antiguos no incluyen Marcos 16:9–20; este versículo pertenece al final largo de Marcos.
    reason: textual_variant
  - marker: b
    text: 'O: «cualquier cosa mortal»; la frase es amplia y no se limita estrictamente al veneno.'
    reason: lexical_alternative
  - marker: c
    text: 'Lit.: «estarán bien».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄφεις
  english_pob_choice: snakes
  chosen_spanish: serpientes
  alternatives_spanish:
  - culebras
  lexicon: BDAG
  rationale: «ὄφεις» designa serpientes en general. Aunque «serpientes» es más formal que «culebras», conserva mejor el registro bíblico y evita reducir el término a una especie o a un matiz coloquial innecesario.
- source_word: ἀροῦσιν
  english_pob_choice: will pick up
  chosen_spanish: Tomarán
  alternatives_spanish:
  - Agarrarán
  - Levantarán
  lexicon: BDAG
  rationale: El verbo puede expresar tomar, levantar o alzar. En español, «tomarán serpientes» suena natural y mantiene la idea de manipulación física sin forzar un modismo menos usual.
- source_word: θανάσιμόν τι
  english_pob_choice: anything deadly
  chosen_spanish: algo mortal
  alternatives_spanish:
  - cualquier cosa mortal
  - algo letal
  lexicon: BDAG
  rationale: 'La frase griega es amplia: algo que cause muerte, no necesariamente veneno. «Algo mortal» conserva esa amplitud mejor que restringirlo a «veneno».'
- source_word: πίωσιν
  english_pob_choice: they drink
  chosen_spanish: bebieren
  alternatives_spanish:
  - beban
  - bebieren
  lexicon: BDAG
  rationale: En una cláusula condicional, el aoristo subjuntivo puede verterse con un futuro de sentido hipotético. «Bebieren» mantiene un tono bíblico formal y corresponde bien a la condición del griego.
- source_word: οὐ μὴ αὐτοὺς βλάψῃ
  english_pob_choice: it will certainly not harm them
  chosen_spanish: no les hará ningún daño
  alternatives_spanish:
  - ciertamente no les dañará
  - de ningún modo les dañará
  lexicon: BDAG
  rationale: La construcción οὐ μή es enfática. «No les hará ningún daño» reproduce la negación fuerte en español natural, sin perder la certeza del griego.
- source_word: ἐπὶ ἀρρώστους χεῖρας ἐπιθήσουσιν
  english_pob_choice: they will lay hands on the sick
  chosen_spanish: pondrán las manos sobre los enfermos
  alternatives_spanish:
  - impondrán las manos sobre los enfermos
  - pondrán sus manos sobre los enfermos
  lexicon: BDAG
  rationale: «ἐπιτίθημι χεῖρας» es un giro idiomático que en español puede expresarse como «poner las manos sobre». «Imponer las manos» es tradicional, pero «poner» refleja más directamente la imagen básica sin perder inteligibilidad.
- source_word: καλῶς ἕξουσιν
  english_pob_choice: they will recover
  chosen_spanish: se pondrán bien
  alternatives_spanish:
  - estarán bien
  - recobrarán la salud
  lexicon: BDAG
  rationale: La expresión literal significa algo como «tendrán bien» o «estarán bien». «Se pondrán bien» conserva la idea resultativa y evita añadir explícitamente «salud» donde el griego solo dice que estarán bien.
theological_decisions:
- issue: Naturaleza de las señales prometidas
  english_pob_reading: The verse is translated straightforwardly as describing signs accompanying believers, without adding interpretive qualifiers about whether these signs are universal, normative, symbolic, or limited to a particular period.
  chosen_spanish_reading: El versículo se traduce de manera directa como una descripción de acciones y resultados prometidos, sin añadir una postura interpretativa sobre su alcance universal, normativo, simbólico o restringido a una época.
  alternative_spanish_readings:
  - Estas señales son normativas para todos los creyentes en todo tiempo
  - Estas señales se limitaron a la era apostólica
  - El lenguaje es puramente simbólico
  rationale: El griego presenta la secuencia como futura y concreta. La traducción no debe resolver una tensión doctrinal que el texto, por sí solo, no resuelve.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Estado textual de Marcos 16:9–20
  english_pob_reading: Translate the verse as given in the provided SBLGNT text, while preserving the broader textual issue in a footnote.
  chosen_spanish_reading: Se traduce el versículo tal como aparece en el texto griego provisto, y se preserva la cuestión textual amplia en una nota.
  alternative_spanish_readings:
  - Omitir el versículo por considerarlo secundario
  - Marcar el versículo entre corchetes en el texto principal
  rationale: La tarea proporciona la redacción de SBLGNT para este versículo. Por transparencia, conviene señalar que algunos manuscritos antiguos no incluyen el final largo de Marcos, sin dejar de traducir el texto dado.
  doctrine_reference: Text-critical transparency policy; Mark 16:9–20 longer ending note.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior: ahora la marca [a] aparece explícitamente en el texto español, y cada nota está anclada a un marcador presente en la traducción.'
  spanish_consistency_notes:
  - Se mantuvo «serpientes» para ὄφεις, en coherencia con el valor léxico general y el registro de la POB en inglés.
  - Se evitó «impondrán las manos» para conservar la imagen verbal básica de ἐπιτίθημι sin perder el sentido idiomático.
  - «Algo mortal» preserva la amplitud semántica de θανάσιμόν τι sin especificar «veneno» como única posibilidad.
  - La clausula final se tradujo con «se pondrán bien» para reflejar καλῶς ἕξουσιν de forma natural y transparente.
