  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: transición conclusiva (μὲν οὖν), título cristológico «el Señor Jesús», secuencia temporal «después de hablarles», ascensión, y entronización «a la derecha de Dios». Sin embargo, «fue levantado» para ἀνελήμφθη no preserva tan fielmente como conviene el matiz pasivo de ascensión/recepción hacia arriba que el inglés auditado refleja con «was taken up»; en español bíblico natural, «fue llevado arriba» o «fue llevado al cielo» sería posible, pero la opción más sobria y común es «fue llevado al cielo» solo si no se quiere separar verbo y complemento. Dado que el griego ya añade εἰς τὸν οὐρανόν, conviene mantener el verbo como «fue llevado» y dejar «al cielo» como complemento. '
