translation:
  language: es
  text: Así pues, el Señor Jesús, después de hablarles, fue llevado al cielo y se sentó a la derecha de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: μὲν οὖν
  english_pob_choice: So then
  chosen_spanish: Así pues
  alternatives_spanish:
  - Entonces
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: La combinación de partículas marca transición y conclusión. «Así pues» conserva ese valor inferencial y resume bien la secuencia sin sonar forzada en español.
- source_word: κύριος Ἰησοῦς
  english_pob_choice: the Lord Jesus
  chosen_spanish: el Señor Jesús
  alternatives_spanish:
  - el Señor, Jesús
  - Señor Jesús
  lexicon: BDAG
  rationale: κύριος se vierte como «Señor» conforme al criterio del proyecto; Ἰησοῦς se conserva como nombre propio «Jesús». El artículo se expresa de manera natural en español con «el Señor Jesús».
- source_word: μετὰ τὸ λαλῆσαι αὐτοῖς
  english_pob_choice: after speaking to them
  chosen_spanish: después de hablarles
  alternatives_spanish:
  - después de haberles hablado
  - tras hablarles
  lexicon: BDAG
  rationale: La construcción μετά + infinitivo articular es temporal. «Después de hablarles» reproduce el orden temporal con naturalidad. El dativo αὐτοῖς se expresa de forma idiomática con el pronombre enclítico «les».
- source_word: ἀνελήμφθη
  english_pob_choice: was taken up
  chosen_spanish: fue levantado
  alternatives_spanish:
  - fue tomado
  - fue llevado arriba
  - fue asumido
  lexicon: BDAG
  rationale: El pasivo aoristo de ἀναλαμβάνω indica que Jesús fue alzado/recibido hacia arriba. En español, «fue levantado» comunica la pasiva y el movimiento ascendente sin añadir demasiado contenido explicativo; la dirección se completa con «al cielo».
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: into heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - al cielo de Dios
  - al cielo,
  - a los cielos
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «into heaven», en español «al cielo» es la formulación más natural para εἰς τὸν οὐρανόν. Se evita una traducción demasiado rígida de la preposición y se mantiene la referencia al ámbito celestial.
- source_word: ἐκάθισεν
  english_pob_choice: sat down
  chosen_spanish: se sentó
  alternatives_spanish:
  - tomó asiento
  - se sentó y quedó
  - se sentó allí
  lexicon: BDAG
  rationale: El aoristo activo expresa la acción completa de tomar asiento. En español, «se sentó» es la equivalencia más directa y natural; no es necesario añadir «abajo» como en «sat down» si el contexto ya indica el acto completo.
- source_word: ἐκ δεξιῶν τοῦ θεοῦ
  english_pob_choice: at the right hand of God
  chosen_spanish: a la derecha de Dios
  alternatives_spanish:
  - a la diestra de Dios
  - junto a la derecha de Dios
  lexicon: BDAG
  rationale: La locución es idiomática y expresa posición de honor/exaltación. «A la derecha de Dios» comunica claramente el sentido en español moderno; «a la diestra» queda como alternativa tradicional, pero no es necesaria para la fidelidad del texto.
theological_decisions:
- issue: Ascensión y entronización de Jesús sin sobreinterpretación
  english_pob_reading: was taken up into heaven and sat down at the right hand of God
  chosen_spanish_reading: fue levantado al cielo y se sentó a la derecha de Dios
  alternative_spanish_readings:
  - fue llevado al cielo y tomó su lugar a la derecha de Dios
  - fue recibido arriba al cielo y se sentó a la derecha de Dios
  rationale: El versículo afirma la ascensión y la exaltación de Jesús. La redacción española conserva ambas afirmaciones de modo sobrio, sin añadir comentario doctrinal, y mantiene la imagen bíblica de la entronización a la derecha de Dios.
  doctrine_reference: Afirmaciones cristológicas; Sal 110:1; Hch 7:55-56
- issue: Título cristológico κύριος
  english_pob_reading: the Lord Jesus
  chosen_spanish_reading: el Señor Jesús
  alternative_spanish_readings:
  - Jesús, el Señor
  - el Maestro Jesús
  rationale: Se mantiene «Señor» como traducción de κύριος por su peso cristológico y su uso estable en el NT. «Maestro» reduciría indebidamente el título.
  doctrine_reference: 'Términos controvertidos: κύριος → Señor'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés, sin cambios respecto de la última pasada revisada, que quedó marcada como unchanged con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al estándar del proyecto.
  - Se usa «Dios» para θεοῦ y no una perífrasis más interpretativa.
  - Se mantiene un registro sobrio y bíblico, apto para lectura eclesial amplia.
  - No se añaden notas al pie porque el versículo no presenta una variante textual o ambigüedad que requiera anclaje explícito en este borrador.
