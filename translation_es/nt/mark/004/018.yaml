translation:
  language: es
  text: Y otros son los sembrados entre espinos[a]; estos son los que han oído la palabra[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los espinos».
    reason: lexical_alternative
  - marker: b
    text: O «el mensaje».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλοι
  english_pob_choice: others
  chosen_spanish: otros
  alternatives_spanish:
  - los otros
  - otros más
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivamente para contrastar este grupo con los anteriores en la parábola. «Otros» conserva bien ese contraste y suena natural en español.
- source_word: εἰς τὰς ἀκάνθας
  english_pob_choice: among the thorns
  chosen_spanish: entre espinos
  alternatives_spanish:
  - en los espinos
  - entre las espinas
  lexicon: BDAG
  rationale: Aunque εἰς puede ser literalmente «hacia/entro en», en este contexto agrícola la idea es la de semilla en terreno con espinos. «Entre espinos» mantiene la imagen sin sonar forzado en español.
- source_word: ἀκάνθας
  english_pob_choice: thorns
  chosen_spanish: espinos
  alternatives_spanish:
  - espinas
  - zarzas
  lexicon: BDAG
  rationale: «Espinos» comunica bien la planta espinosa del contexto parabólico y funciona de manera natural en español bíblico contemporáneo. Se evita «zarzas» por ser más específico de otro arbusto y menos general aquí.
- source_word: σπειρόμενοι
  english_pob_choice: sown
  chosen_spanish: sembrados
  alternatives_spanish:
  - siendo sembrados
  - sembrados allí
  lexicon: BDAG
  rationale: El participio pasivo conserva la metáfora de la semilla. «Sembrados» reproduce esa imagen con fluidez; «siendo sembrados» sería más literal pero menos idiomático en español.
- source_word: οὗτοί εἰσιν
  english_pob_choice: these are
  chosen_spanish: estos son
  alternatives_spanish:
  - estos son los
  - éstos son
  lexicon: BDAG
  rationale: La fórmula de identificación de la explicación parabólica se traduce de forma directa y clara. «Estos son» preserva la estructura del griego y la función explicativa.
- source_word: οἱ ... ἀκούσαντες
  english_pob_choice: the ones who have heard
  chosen_spanish: los que han oído
  alternatives_spanish:
  - los que oyeron
  - los oyentes que han oído
  lexicon: BDAG
  rationale: El participio aoristo indica una acción de oír anterior a lo que sigue. «Han oído» refleja esa anterioridad con naturalidad en español, mientras que «oyeron» puede sonar más puntual y menos conectado con la explicación inmediata.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: En Marcos, λόγος puede abarcar la palabra proclamada o el mensaje. Se elige «la palabra» por su idiomaticidad bíblica en español y porque preserva la resonancia intertextual sin imponer una paráfrasis.
theological_decisions:
- issue: Mantener la metáfora de la explicación parabólica sin volverla paráfrasis interpretativa
  english_pob_reading: 'Retain the literal parabolic metaphor: ''those sown among the thorns'''
  chosen_spanish_reading: 'Conservar la imagen: «los sembrados entre espinos»'
  alternative_spanish_readings:
  - los que fueron sembrados entre espinos
  - los sembrados en terreno espinoso
  - los plantados entre espinos
  rationale: El griego continúa la metáfora de siembra, no la sustituye por una explicación no metafórica. En español conviene conservar esa imagen para respetar la estructura literaria y no añadir interpretación no presente en el texto.
  doctrine_reference: Principio de equivalencia óptima y respeto al sentido llano del texto parabólico.
translation_notes:
  revision_awareness: El pasaje coincide con el expediente inglés en su lectura y no requiere revisión adicional; se mantuvo la metáfora de la siembra y la identificación resumptiva, con una redacción española natural y fiel al griego.
  spanish_consistency_notes:
  - Se usó «espinos» de manera consistente con la imagen agrícola del pasaje.
  - Se mantuvo «la palabra» como traducción principal de λόγος, con «el mensaje» como alternativa anotada.
  - 'Se preservó el orden lógico del griego: grupo identificado primero, luego explicación resumptiva.'
  - El estilo busca ser publicable y bíblico sin depender de fórmulas eclesiásticas tradicionales ajenas al texto.
