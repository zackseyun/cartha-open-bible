revisions:
- from: 'Y sintieron un gran temor[a], y se decían unos a otros: «¿Quién es este, entonces, que aun el viento y el mar le obedecen?»'
  to: 'Y temieron con gran temor[a], y decían entre sí: «¿Quién es este, entonces, que hasta el viento y el mar le obedecen?»'
  rationale: Se revisa «sintieron un gran temor» a «temieron con gran temor» para acercarse más a la forma intensificada del griego sin caer en una calca demasiado extraña; la nota ahora sí preserva la alternativa más literal documentada. Se cambia «se decían unos a otros» por «decían entre sí» para evitar redundancia y mantener la reciprocidad. Se ajusta «aun» a «hasta» por mayor naturalidad en español sin alterar el énfasis. No se requiere adjudicación adicional, porque son ajustes claros de fidelidad y estilo.
