  glossary_alignment: No hay conflicto con la terminología base del proyecto. La cristología implícita se conserva sin expansión doctrinal. La elección de «obedecen» para ὑπακούει αὐτῷ es correcta. El ajuste principal es de fidelidad fraseológica y naturalidad española, no de glosario doctrinal.
