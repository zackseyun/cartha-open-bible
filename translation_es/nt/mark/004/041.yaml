translation:
  language: es
  text: 'Y temieron con gran temor[a], y decían entre sí: «¿Quién es este, entonces, que hasta el viento y el mar le obedecen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «temieron un gran temor». El griego usa una expresión intensificada con verbo y acusativo cognado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐφοβήθησαν φόβον μέγαν
  english_pob_choice: feared a great fear
  chosen_spanish: sintieron un gran temor
  alternatives_spanish:
  - tuvieron un gran temor
  - temieron con gran temor
  lexicon: BDAG
  rationale: El griego usa verbo con acusativo cognado para intensificar la idea. En español, una calca como «temieron un gran temor» resultaría extraña; «sintieron un gran temor» conserva la intensidad sin perder naturalidad, y no suaviza la fuerza del original.
- source_word: ἔλεγον
  english_pob_choice: they said
  chosen_spanish: se decían
  alternatives_spanish:
  - decían
  - iban diciendo
  lexicon: BDAG
  rationale: El imperfecto puede sugerir repetición o curso continuo. «Se decían» refleja bien la acción recíproca entre ellos y conserva el matiz aspectual sin volver la frase pesada.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: to one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - el uno al otro
  lexicon: BDAG
  rationale: La expresión recíproca se expresa con naturalidad en español como «unos a otros», equivalente idiomático de la relación mutua del griego.
- source_word: Τίς ἄρα οὗτός ἐστιν
  english_pob_choice: Who then is this
  chosen_spanish: ¿Quién es este, entonces?
  alternatives_spanish:
  - ¿Quién es, entonces, este?
  - ¿Quién es este, pues?
  lexicon: BDAG
  rationale: «ἄρα» añade inferencia o asombro. En español, colocar «entonces» al final mantiene ese matiz sin forzar la sintaxis. Se conserva la pregunta sorprendida del texto.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: 'Aquí introduce el contenido de la pregunta: la razón del asombro ante la obediencia del viento y del mar. «Que» es la conexión más natural en español.'
- source_word: καὶ ὁ ἄνεμος καὶ ἡ θάλασσα
  english_pob_choice: even the wind and the sea
  chosen_spanish: aun el viento y el mar
  alternatives_spanish:
  - incluso el viento y el mar
  - también el viento y el mar
  lexicon: BDAG
  rationale: El primer καί tiene valor adverbial enfático, cercano a «aun/even». «Aun el viento y el mar» preserva la sorpresa de que hasta esas fuerzas obedecen.
- source_word: ὑπακούει αὐτῷ
  english_pob_choice: obey him
  chosen_spanish: le obedecen
  alternatives_spanish:
  - lo obedecen
  - le hacen caso
  lexicon: BDAG
  rationale: «ὑπακούω» normalmente significa obedecer. El plural español concuerda con los dos sujetos coordinados, «el viento y el mar», y mantiene la personificación de la creación respondiendo a Jesús.
theological_decisions:
- issue: Autoridad de Jesús sobre la creación
  english_pob_reading: Retain the straightforward language of the disciples' astonishment without expanding it into an explicit doctrinal statement.
  chosen_spanish_reading: Conservar la pregunta asombrada de los discípulos sin convertirla en una explicación doctrinal explícita.
  alternative_spanish_readings:
  - Añadir una expansión interpretativa sobre la identidad divina de Jesús
  - Reformular la pregunta para hacerla más confesional
  rationale: El versículo muestra la autoridad de Jesús sobre el viento y el mar, pero la traducción debe dejar que el impacto teológico surja del propio texto. Por eso se conserva la pregunta sin añadir conclusiones doctrinales que el griego no formula aquí de manera explícita.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: El texto sigue la revisión final del inglés POB que volvió desde una paráfrasis más interpretativa a la expresión más cercana al griego («feared a great fear»), manteniendo la intensidad de φόβον μέγαν sin expansión doctrinal. La versión española refleja esa misma decisión al conservar la fuerza enfática mediante una formulación natural en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito por el contexto inmediato sin añadirlo, ya que el pronombre «le» remite claramente a él.
  - Se traduce el plural verbal «obedecen» para concordar con «el viento y el mar», respetando la coordinación del griego.
  - «Aun» conserva el matiz enfático del καί adverbial, evitando una lectura meramente aditiva.
