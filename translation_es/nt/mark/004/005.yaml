translation:
  language: es
  text: Y otra semilla cayó sobre la tierra rocosa[a], donde no tenía mucho suelo, y de inmediato brotó porque no tenía profundidad de suelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tierra pedregosa'. El griego describe un terreno rocoso con solo una capa delgada de suelo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  english_pob_choice: other seed
  chosen_spanish: y otro
  alternatives_spanish:
  - y otra semilla
  - y otro grano
  lexicon: BDAG
  rationale: El griego usa un neutro singular sustantivado que continúa la secuencia de la parábola y remite implícitamente a la semilla del contexto previo. En español, el contexto permite omitir 'semilla' sin perder referencia, manteniendo la concisión y evitando añadir un sustantivo no explicitado por el texto inmediato.
- source_word: πετρῶδες
  english_pob_choice: rocky ground
  chosen_spanish: tierra rocosa
  alternatives_spanish:
  - terreno rocoso
  - tierra pedregosa
  - suelo pedregoso
  lexicon: BDAG
  rationale: La expresión describe un terreno con roca y una capa delgada de suelo, no solo piedras sueltas. 'Tierra rocosa' es natural en español y conserva la imagen agrícola y topográfica sin desplazarla hacia una frase demasiado técnica o demasiado tradicional.
- source_word: γῆν πολλήν
  english_pob_choice: much soil
  chosen_spanish: mucha tierra
  alternatives_spanish:
  - mucho suelo
  - mucha tierra vegetal
  - tierra profunda
  lexicon: BDAG
  rationale: Aquí γῆ conserva el sentido de tierra/suelo apto para el crecimiento. 'Mucha tierra' funciona bien en español y mantiene la relación con 'profundidad de tierra' al final del versículo.
- source_word: εὐθὺς
  english_pob_choice: at once
  chosen_spanish: de inmediato
  alternatives_spanish:
  - enseguida
  - al instante
  - de pronto
  lexicon: BDAG
  rationale: La partícula marca prontitud súbita. 'De inmediato' expresa esa rapidez de forma clara y digna en español contemporáneo.
- source_word: ἐξανέτειλεν
  english_pob_choice: sprang up
  chosen_spanish: brotó
  alternatives_spanish:
  - salió
  - emergió
  - creció
  lexicon: BDAG
  rationale: En contexto agrícola el verbo describe el brote rápido de la planta. 'Brotó' transmite con naturalidad la imagen de salida/surgimiento súbito mejor que un simple 'creció'.
- source_word: διὰ τὸ μὴ ἔχειν βάθος γῆς
  english_pob_choice: because it had no depth of soil
  chosen_spanish: porque no tenía profundidad de tierra
  alternatives_spanish:
  - porque no tenía tierra profunda
  - porque el suelo no tenía profundidad
  - porque carecía de profundidad de tierra
  lexicon: BDAG
  rationale: La construcción causal se vierte con una cláusula finita en español. 'Profundidad de tierra' refleja de cerca βάθος γῆς y conserva la imagen de una capa superficial sobre la roca.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de SBLGNT y confirma las decisiones estables del tramo anterior en la auditoría inglesa: el referente elíptico de ἄλλο, el valor topográfico de πετρῶδες, el sentido agrícola de γῆν πολλήν, la prontitud de εὐθύς y la causalidad de la construcción con διὰ + infinitivo. No hubo revisiones aplicadas en el registro inglés, por lo que esta propuesta mantiene alta concordancia con el audit trail.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o terminología no pertinente, pues el versículo no contiene lenguaje divino.
  - '''Tierra'' se mantiene de forma coherente para γῆ en todo el verso, preservando la imagen agrícola.'
  - La nota[a] recoge la alternativa lexical principal preservada en la tradición de auditoría inglesa.
  - No se introduce 'semilla' en el cuerpo porque el español permite la elipsis con suficiente claridad en el contexto inmediato.
