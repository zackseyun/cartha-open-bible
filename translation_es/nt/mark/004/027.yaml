translation:
  language: es
  text: y duerme y se levanta noche y día, y la semilla brota y crece[a], aunque él mismo no sabe cómo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se alarga» o «se hace alta». El verbo sugiere crecimiento en longitud o estatura.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente, «como no sabe». El sentido es: «aunque él mismo no sabe cómo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθεύδῃ
  english_pob_choice: he sleeps
  chosen_spanish: duerme
  alternatives_spanish:
  - está durmiendo
  - duerma
  lexicon: BDAG
  rationale: En la secuencia parabólica, el presente de valor iterativo se expresa naturalmente en español con el presente simple «duerme». Mantiene la acción habitual sin forzar un matiz de mandato o subjuntivo.
- source_word: ἐγείρηται
  english_pob_choice: rises
  chosen_spanish: se levanta
  alternatives_spanish:
  - se pone de pie
  - se alza
  lexicon: BDAG
  rationale: La forma media/pasiva funciona aquí de manera intransitiva e idiomática para levantarse o despertarse. «Se levanta» es natural en español y evita sugerir resurrección.
- source_word: νύκτα καὶ ἡμέραν
  english_pob_choice: night and day
  chosen_spanish: de noche y de día
  alternatives_spanish:
  - noche y día
  - por la noche y por el día
  lexicon: BDAG
  rationale: La expresión acusa un merismo de continuidad temporal. «De noche y de día» suena natural en español y conserva la idea de ciclo continuo.
- source_word: σπόρος
  english_pob_choice: the seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - la simiente
  - el grano
  lexicon: BDAG
  rationale: Con artículo, el referente es la semilla de la parábola. «Semilla» es el término más claro y actual; «simiente» sería más tradicional pero menos natural.
- source_word: βλαστᾷ
  english_pob_choice: sprouts
  chosen_spanish: brota
  alternatives_spanish:
  - germina
  - reverdece
  lexicon: BDAG
  rationale: «Brota» comunica bien el inicio visible del crecimiento vegetal en español. Es equivalente a «sprouts» sin sobrerrepresentar el proceso técnico de germinación.
- source_word: μηκύνηται
  english_pob_choice: grows
  chosen_spanish: crece
  alternatives_spanish:
  - se alarga
  - se hace alto
  lexicon: BDAG
  rationale: El verbo puede sugerir hacerse más largo o alto, pero el contexto inmediato ya presenta el desarrollo de la semilla y el español «crece» fluye mejor. Se conserva, sin embargo, la tensión de desarrollo progresivo sin precisar más de lo que el texto exige.
- source_word: ὡς οὐκ οἶδεν αὐτός
  english_pob_choice: though he himself does not know how
  chosen_spanish: aunque él mismo no sabe cómo
  alternatives_spanish:
  - sin que él mismo sepa cómo
  - mientras él mismo no sabe cómo
  lexicon: BDAG
  rationale: 'La construcción es concesiva en contexto: el crecimiento ocurre aun cuando el hombre no entiende el modo. «Aunque él mismo no sabe cómo» reproduce bien esa relación y mantiene el énfasis de αὐτός con «él mismo».'
theological_decisions:
- issue: Agencia en el crecimiento de la semilla
  english_pob_reading: The wording leaves the mechanism of growth unexplained from the sower's perspective without explicitly naming divine agency in this verse.
  chosen_spanish_reading: La redacción deja sin explicar el mecanismo del crecimiento desde la perspectiva del sembrador, sin nombrar explícitamente la agencia divina en este versículo.
  alternative_spanish_readings:
  - Dios hace crecer la semilla
  - se trata solo de un proceso natural
  rationale: El versículo enfatiza la ignorancia del sembrador y el crecimiento independiente de la semilla dentro de la parábola. No conviene introducir una explicación que el texto no da ni reducirlo a un naturalismo cerrado.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El audit trail inglés revisó «grows long» a «grows» por mayor naturalidad y por el contexto; en español se siguió esa misma decisión con «crece», manteniendo abierta la posible idea de alargamiento sin forzarla en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no hay necesidad de nombre divino en este versículo.
  - Se evita «Cristo»/«Mesías» porque no aparece el vocabulario cristológico en el texto.
  - La frase final conserva la ignorancia del sembrador sin añadir explicaciones causales.
  - 'El ritmo español busca paralelismo sencillo: duerme / se levanta / brota / crece.'
