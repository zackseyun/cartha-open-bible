translation:
  language: es
  text: Y con muchas parábolas semejantes les comunicaba la palabra[a], según podían oír[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el mensaje' o 'la enseñanza' para 'la palabra'.
    reason: lexical_alternative
  - marker: b
    text: O 'hasta donde podían oír' o 'en la medida en que podían oír'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y además
  - Entonces
  lexicon: BDAG
  rationale: Coordina con la unidad anterior de manera natural en español y conserva la conexión narrativa simple del griego.
- source_word: τοιαύταις
  english_pob_choice: such
  chosen_spanish: semejantes
  alternatives_spanish:
  - tales
  - de ese tipo
  lexicon: BDAG
  rationale: Expresa referencia anafórica a las parábolas precedentes sin sonar rígido; mantiene la idea de tipo o clase similar.
- source_word: παραβολαῖς
  english_pob_choice: parables
  chosen_spanish: parábolas
  alternatives_spanish:
  - comparaciones
  - ilustraciones
  lexicon: BDAG
  rationale: Es el equivalente habitual y preciso para las enseñanzas narrativas de Jesús en Marcos.
- source_word: πολλαῖς
  english_pob_choice: many
  chosen_spanish: muchas
  alternatives_spanish:
  - numerosas
  lexicon: BDAG
  rationale: Reproduce la cantidad de forma directa y natural en español.
- source_word: ἐλάλει
  english_pob_choice: he was speaking
  chosen_spanish: les hablaba
  alternatives_spanish:
  - les estaba hablando
  - les seguía hablando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso; en español, 'les hablaba' comunica bien esa continuidad sin sobrecargar el estilo.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de forma natural con el clítico 'les' en español.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la enseñanza
  lexicon: BDAG
  rationale: Se preserva el valor léxico de λόγος como contenido proclamado. En español, 'la palabra' mantiene la resonancia bíblica y permite la nota alternativa sobre 'mensaje' o 'enseñanza'.
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: según
  alternatives_spanish:
  - como
  - a medida que
  lexicon: BDAG
  rationale: Aquí introduce una cláusula de medida/correspondencia; 'según' comunica bien la idea de acuerdo con la capacidad de ellos.
- source_word: ἠδύναντο
  english_pob_choice: they were able
  chosen_spanish: podían
  alternatives_spanish:
  - eran capaces de
  - tenían capacidad para
  lexicon: BDAG
  rationale: El imperfecto de capacidad se expresa de manera natural con 'podían', evitando una formulación excesivamente pesada.
- source_word: ἀκούειν
  english_pob_choice: to hear it
  chosen_spanish: escuchar
  alternatives_spanish:
  - oír
  - escucharla
  lexicon: BDAG
  rationale: En contexto, 'escuchar' funciona como verbo receptivo y fluido en español. La traducción conserva la tensión entre oír y captar el sentido, sin resolverla a 'entender'.
theological_decisions:
- issue: Sentido de τὸν λόγον en la enseñanza de Jesús
  english_pob_reading: Rendered as 'the word' rather than 'the message' in the main text.
  chosen_spanish_reading: Renderizado como 'la palabra' en el texto principal.
  alternative_spanish_readings:
  - el mensaje
  - la enseñanza
  rationale: '''La palabra'' reproduce el vocabulario de λόγος y mantiene la resonancia marcana y bíblica. Las alternativas se conservan en nota porque pueden aclarar el alcance comunicativo sin desplazar el término base.'
  doctrine_reference: Translation philosophy §1, §5
- issue: Alcance de ἀκούειν
  english_pob_reading: Rendered as 'hear it' rather than 'understand it.'
  chosen_spanish_reading: Renderizado como 'escuchar' en vez de 'entender'.
  alternative_spanish_readings:
  - oír
  - entender
  rationale: El texto habla de la capacidad para escuchar; traducir con 'escuchar' preserva el nivel léxico y deja abierta la implicación de comprensión sin imponerla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se revisó el borrador anterior para anclar explícitamente ambos marcadores en el texto español. La redacción final conserva el contenido semántico del griego y resuelve la validación de notas al incluir [a] y [b] donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo 'parábolas' para παραβολαῖς por coherencia con Marcos y con la terminología POB.
  - '''La palabra'' se eligió para λόγος por fidelidad léxica; las alternativas se documentan sin reemplazar el término base.'
  - '''Podían escuchar'' preserva la noción de capacidad sin convertirla en interpretación más fuerte.'
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en el verso ni en el flujo inmediato.
