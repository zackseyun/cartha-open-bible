translation:
  language: es
  text: 'Y les dice: «¿No entienden esta parábola[a]? Entonces, ¿cómo entenderán todas las parábolas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¿No conocen esta parábola? Entonces, ¿cómo conocerán todas las parábolas?» Los verbos griegos también pueden rendirse como «saber» o «conocer», pero aquí expresan el sentido de comprender.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico de Marcos con «dice», como en el audit trail inglés; en español suena natural y conserva la vivacidad narrativa.
- source_word: οἴδατε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - saben
  - conocen
  lexicon: BDAG
  rationale: En este contexto, con «parábola», el verbo expresa comprensión más que simple posesión de información. «Entienden» comunica mejor la reprensión que «saben».
- source_word: παραβολὴν
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: «Parábola» es el término español estándar y preciso para esta forma de enseñanza de Jesús.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esta
  lexicon: BDAG
  rationale: Demostrativo directo que señala la parábola inmediata anterior.
- source_word: πῶς
  english_pob_choice: Then how
  chosen_spanish: Entonces, ¿cómo
  alternatives_spanish:
  - Y cómo
  - ¿Cómo
  lexicon: BDAG
  rationale: «Entonces» explicita la inferencia implícita entre las dos preguntas sin añadir contenido ajeno al griego; reproduce el valor lógico del enlace.
- source_word: πάσας τὰς παραβολὰς
  english_pob_choice: all the parables
  chosen_spanish: todas las parábolas
  alternatives_spanish:
  - cada una de las parábolas
  lexicon: BDAG
  rationale: El plural con πᾶς se refleja de manera natural como «todas las parábolas», manteniendo el alcance general del dicho.
- source_word: γνώσεσθε
  english_pob_choice: will you understand
  chosen_spanish: entenderán
  alternatives_spanish:
  - sabrán
  - conocerán
  lexicon: BDAG
  rationale: Aunque γινώσκω puede traducirse «saber» o «conocer», aquí apunta a captar el sentido de las parábolas; «entenderán» preserva esa fuerza semántica y la paralela con οἴδατε.
theological_decisions:
- issue: Relación semántica entre οἴδατε y γνώσεσθε
  english_pob_reading: Both verbs are rendered with 'understand' in English for contextual coherence.
  chosen_spanish_reading: Ambos verbos se vierten con el campo de «entender» para conservar la acusación retórica sobre la incapacidad de captar el sentido de las parábolas.
  alternative_spanish_readings:
  - «¿No saben esta parábola? Entonces, ¿cómo sabrán todas las parábolas?»
  - «¿No conocen esta parábola? Entonces, ¿cómo conocerán todas las parábolas?»
  rationale: El pasaje trata de comprensión interpretativa, no de mera información. Traducir ambos verbos con vocabulario de entendimiento hace explícita la unidad conceptual que el griego sugiere en este contexto.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el audit trail inglés; este borrador sigue el pasaje griego y la decisión inglesa de reflejar οἶδα/γινώσκω como comprensión en contexto. El presente histórico de λέγει se conserva en español con «dice» para mantener la viveza narrativa.
  spanish_consistency_notes:
  - Se usa «parábola» de forma uniforme para παραβολή.
  - Se prefiere «entender»/«entienden» para el valor contextual de οἶδα y γινώσκω.
  - Se mantiene el presente histórico con «dice», coherente con el estilo narrativo de Marcos.
  - La puntuación interrogativa española se adapta al uso normativo con signos de apertura y cierre.
