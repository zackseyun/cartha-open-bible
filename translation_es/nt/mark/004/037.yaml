translation:
  language: es
  text: Y se levantó una gran tormenta de viento[a], y las olas se metían en la barca[b], de modo que la barca ya se estaba llenando[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «una gran tempestad de viento».
    reason: lexical_alternative
  - marker: b
    text: O «las olas golpeaban dentro de la barca». El imperfecto griego presenta una acción repetida.
    reason: lexical_alternative
  - marker: c
    text: O «la barca ya estaba siendo llenada».
    reason: lexical_alternative
lexical_decisions:
- source_word: γίνεται
  english_pob_choice: arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - surgió
  - se desató
  - apareció
  lexicon: BDAG
  rationale: El verbo griego en presente histórico expresa el comienzo vivo e inmediato del evento. «Se levantó» comunica bien el surgimiento repentino de la tormenta en español, sin perder el valor ingresivo.
- source_word: λαῖλαψ μεγάλη ἀνέμου
  english_pob_choice: a great windstorm
  chosen_spanish: una gran tormenta de viento
  alternatives_spanish:
  - una gran tempestad de viento
  - una violenta tormenta de viento
  - un gran vendaval
  lexicon: BDAG
  rationale: λαῖλαψ apunta a una tormenta violenta o borrasca; el genitivo ἀνέμου especifica que es de viento. «Tormenta de viento» conserva esa relación y «gran» refleja μέγαλη de forma directa.
- source_word: κύματα
  english_pob_choice: the waves
  chosen_spanish: las olas
  alternatives_spanish:
  - las ondas
  - las olas del mar
  lexicon: BDAG
  rationale: En este contexto narrativo, «olas» es el equivalente natural en español para κῦμα. Mantiene la escena concreta sin introducir un término más técnico o más literario de lo necesario.
- source_word: ἐπέβαλλεν εἰς τὸ πλοῖον
  english_pob_choice: were breaking into the boat
  chosen_spanish: golpeaban contra la barca
  alternatives_spanish:
  - rompían contra la barca
  - azotaban la barca
  - se lanzaban contra la barca
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o continua. En español, «golpeaban contra» transmite el embate reiterado de las olas y conserva el movimiento agresivo hacia la barca. «Rompían» sería posible, pero puede sugerir más específicamente el romperse de una ola que el impacto repetido del conjunto.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - bote
  - embarcación
  lexicon: BDAG
  rationale: Para el lago de Galilea, «barca» es el término español más natural y preciso; «barco» suena demasiado grande. «Barca» conserva el tamaño probable de la embarcación sin sonar arcaizante.
- source_word: ἤδη γεμίζεσθαι τὸ πλοῖον
  english_pob_choice: the boat was already filling
  chosen_spanish: ya la barca se llenaba
  alternatives_spanish:
  - la barca ya estaba siendo llenada
  - la barca ya se estaba llenando
  lexicon: BDAG
  rationale: El infinitivo presente pasivo/medio expresa el proceso resultante. «Se llenaba» comunica el avance del llenado de forma natural en español; «ya» traduce ἤδη. La pasiva más literal, «estaba siendo llenada», es correcta pero menos idiomática.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto inglés quedó sin modificaciones y el acuerdo de revisión fue alto. La redacción española sigue de cerca esa lectura auditada, manteniendo el valor ingresivo de γίνεται, el matiz repetitivo del imperfecto ἐπέβαλλεν y el resultado expresado por ὥστε + infinitivo.
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para reflejar la conexión narrativa del griego καὶ.
  - Se usa «barca» de forma consistente para πλοῖον en un contexto de navegación lacustre.
  - Se conserva «gran» para μέγαλη y «ya» para ἤδη.
  - No se introduce terminología eclesiástica ni interpretativa que no esté sustentada por el texto griego.
