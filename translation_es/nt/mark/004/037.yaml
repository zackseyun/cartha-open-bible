    issue: «golpeaban contra la barca» no refleja plenamente εἰς τὸ πλοῖον
    rationale: 'El griego indica que las olas se echaban/entraban en la barca, no meramente que chocaban contra ella. El detalle es importante porque explica el resultado inmediato: la barca ya se estaba llenando.'
  - severity: low
    issue: La nota [a] repite el texto principal
    rationale: La nota dice «una gran tormenta de viento», exactamente igual que el cuerpo del texto, por lo que no preserva una alternativa léxica útil como en el rastro inglés.
