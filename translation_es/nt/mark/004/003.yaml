review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: dos llamados de atención seguidos por la acción del sembrador. «Escuchen» para Ἀκούετε, «salió» para ἐξῆλθεν, «el sembrador» para ὁ σπείρων y «a sembrar» para σπεῖραι están bien alineados con la evidencia fuente y con el razonamiento del POB inglés.'
  spanish_quality_summary: La redacción es clara y natural, pero la puntuación y la marcación de notas pueden mejorarse. En español, conviene separar las dos exhortaciones como en el griego y evitar anclar una nota en «Escuchen» cuando el POB inglés solo documenta alternativa explícita para ἰδού. «¡Escuchen! Miren,[a] ...» fluye mejor y conserva la fuerza narrativa sin sobreanotar.
  glossary_alignment: No hay términos del glosario de alto impacto en este versículo. «Sembrador» corresponde bien al participio sustantivado; no hay conflicto terminológico con los estándares del proyecto.
  issues:
  - severity: medium
    issue: La primera nota al pie no está motivada por el rastro de auditoría inglés.
    rationale: El POB inglés solo incluye nota para ἰδού ('Behold' / 'Look'). Añadir una nota para Ἀκούετε no es imposible, pero aquí introduce sobreexplicación no requerida y rompe la correspondencia más cercana con el expediente auditado.
  - severity: low
    issue: La puntuación española puede reflejar mejor la segmentación del griego.
    rationale: 'El texto fuente tiene dos unidades breves: Ἀκούετε. ἰδού ... En español suena más natural y fiel: «¡Escuchen! Miren, ...» en vez de «¡Escuchen! Miren, ...» con nota en la primera palabra y sin concentrar la nota donde está la alternativa principal.'
  revised_spanish_text: ¡Escuchen! Miren,[a] el sembrador salió a sembrar.
  revised_footnotes:
  - marker: a
    text: O «Vean»; también, más literalmente, «He aquí».
    reason: lexical_alternative
