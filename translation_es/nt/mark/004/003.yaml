lexical_decisions:
- source_word: Ἀκούετε
  english_pob_choice: Listen!
  chosen_spanish: ¡Escuchen!
  alternatives_spanish:
  - ¡Oigan!
  - ¡Escuchen atentamente!
  lexicon: BDAG
  rationale: El imperativo plural presente pide atención inmediata. «Escuchen» conserva la fuerza exhortativa y suena natural en español moderno; «¡Oigan!» sería posible, pero menos preciso para un llamado deliberado a prestar atención.
- source_word: ἰδού
  english_pob_choice: Behold,
  chosen_spanish: Miren
  alternatives_spanish:
  - Vean
  - Miren, observen
  lexicon: BDAG
  rationale: La partícula deíctica introduce una escena y llama la atención sobre lo que sigue. En español, «Miren» reproduce bien esa fuerza discursiva sin sonar arcaico como «He aquí» o excesivamente literario como «Miren, he aquí».
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa movimiento hacia afuera. «Salió» es la equivalencia natural y directa en español para este contexto narrativo.
- source_word: ὁ σπείρων
  english_pob_choice: the sower
  chosen_spanish: el sembrador
  alternatives_spanish:
  - el que siembra
  - el que sembraba
  lexicon: BDAG
  rationale: El participio presente articular funciona sustantivamente como designación de rol. «El sembrador» es idiomático en español y preserva el valor nominal que el inglés POB resolvió como «the sower».
- source_word: σπεῖραι
  english_pob_choice: to sow
  chosen_spanish: a sembrar
  alternatives_spanish:
  - para sembrar
  - sembrar
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa propósito después de «salió». En español, «salió a sembrar» comunica de forma natural la finalidad sin añadir contenido ajeno.
translation_notes:
  revision_awareness: 'El inglés POB mantiene una estructura breve e imperativa: «Listen! Behold, the sower went out to sow.» No se registran revisiones textuales ni cambios de sentido relevantes en el audit trail, y la concordancia general fue alta/agreed, por lo que la versión española sigue de cerca esas decisiones léxicas sin introducir variantes interpretativas.'
  spanish_consistency_notes:
  - Se mantiene la imagen del «sembrador» como rol sustantivado, conforme al participio articular griego y al inglés POB.
  - Se evita «He aquí» por su tono más arcaico en español, aunque la función discursiva de ἰδού se preserva con «Miren».
  - La construcción «salió a sembrar» reproduce el propósito del infinitivo sin sobreexplicar la escena.
