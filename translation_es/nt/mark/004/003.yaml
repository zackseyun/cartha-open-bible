- from: ¡Escuchen![a] Miren[b], el sembrador salió a sembrar.
  to: ¡Escuchen! Miren,[a] el sembrador salió a sembrar.
  rationale: Se conserva el contenido del borrador, pero se ajusta la nota al pie para alinearla con la evidencia auditada del inglés, que documenta la alternativa de ἰδού, no de Ἀκούετε. También se simplifica la presentación para una lectura española más limpia y fiel a la secuencia del griego.
