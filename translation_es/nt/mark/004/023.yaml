translation:
  language: es
  text: Si alguien tiene oídos para oír[a], que oiga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: En español, el singular impersonal "que oiga" conserva mejor el singular del griego que un plural inclusivo como "que oigan".
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ τις
  english_pob_choice: If anyone
  chosen_spanish: Si alguien
  alternatives_spanish:
  - Si cualquiera
  - Quienquiera que
  lexicon: BDAG
  rationale: El griego usa una construcción condicional con indefinido singular. "Si alguien" conserva el valor general y la apertura del dicho sin volverlo más pesado en español.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: Verbo simple de posesión o capacidad; "tiene" es el equivalente natural en español y mantiene la forma directa del original.
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente "orejas/oídos" en plural, en español "oídos" suena más idiomático en esta expresión fija. Mantiene el plural y la imagen corporal del original.
- source_word: ἀκούειν
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para oír y obedecer
  lexicon: BDAG
  rationale: El infinitivo expresa capacidad o finalidad. "Para oír" preserva el paralelo verbal con el mandato final y evita sobrecargar el verso con una paráfrasis interpretativa.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: que oiga
  alternatives_spanish:
  - que escuche
  - que le preste atención
  lexicon: BDAG
  rationale: El imperativo singular de tercera persona se expresa de manera natural en español con "que oiga". Conserva el sentido exhortativo y el eco léxico de ἀκούειν.
theological_decisions:
- issue: Singular genérico frente a plural inclusivo en español
  english_pob_reading: let him hear; the Greek is singular
  chosen_spanish_reading: que oiga
  alternative_spanish_readings:
  - que oigan
  - que escuchen
  rationale: El griego usa un singular indefinido y un imperativo singular. En español, la forma más fiel y natural es mantener el singular impersonal con "que oiga", sin pluralizar el dicho.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios frente al contexto auditado en inglés; se mantiene la estructura breve, proverbial y el singular gramatical del griego.'
  spanish_consistency_notes:
  - Se mantiene el verbo de percepción como oír/oir en lugar de escuchar para conservar la repetición con el infinitivo griego.
  - No se introduce lenguaje eclesiástico adicional ni una interpretación expandida del dicho.
  - La puntuación reproduce el tono sentencioso breve del original.
