lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - También
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza con el discurso anterior; en español, «Y» mantiene la ligazón narrativa sin introducir matiz temporal o aditivo no explícito.
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en desarrollo. «Decía» conserva ese aspecto de manera natural en español, sin sobrecargar la idea de repetición.
- source_word: Ὃς ἔχει
  english_pob_choice: Whoever has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que tenga
  lexicon: BDAG
  rationale: La construcción relativa griega funciona con fuerza proverbial y genérica. «El que tiene» reproduce mejor la forma singular y la solemnidad del dicho que un plural genérico; «quien tiene» es posible, pero algo menos cercano al giro proverbial.
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  lexicon: BDAG
  rationale: «Oídos» es el equivalente más natural y digno en español para el plural griego, y encaja mejor con la formulación proverbial que «orejas».
- source_word: ἀκούειν
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para oír
  lexicon: BDAG
  rationale: «Para oír» conserva la relación idiomática con el imperativo siguiente y reproduce la repetición verbal del original mejor que «para escuchar», que introduce una matización más voluntaria.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - escuche
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa de forma natural con «oiga». Mantiene la fuerza exhortativa y la correspondencia léxica con ἀκούειν/ἀκουέτω.
theological_decisions:
- issue: Construcción genérica masculina en dicho proverbial
  english_pob_reading: Whoever has ears to hear, let him hear
  chosen_spanish_reading: El que tiene oídos para oír, oiga
  alternative_spanish_readings:
  - Quien tiene oídos para oír, oiga
  - El que tiene oídos para oír, que oiga
  rationale: El griego usa una relativa masculina singular con valor genérico. En español, «El que...» preserva la estructura singular proverbial sin imponer un plural que desdibuje la sintaxis; el imperativo «oiga» conserva la fuerza directa del mandato.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: La revisión más reciente indica que no se requirieron cambios y que hay alto acuerdo con el control de calidad; por eso el borrador sigue de cerca el sentido y la forma del texto griego y del audit trail en inglés, sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el estilo bíblico moderno y digno, evitando arcaísmos innecesarios.
  - Se preserva la estructura proverbial singular del griego.
  - «Oídos» y «oír» conservan la repetición léxica del original.
  - La puntuación con dos puntos y comillas angulares es apropiada para español editorial.
  - No se usa «Señor» ni terminología cristológica ajena al versículo.
