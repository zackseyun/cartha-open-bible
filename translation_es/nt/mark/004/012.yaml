translation:
  language: es
  text: para que, viendo, vean y no perciban[a], y oyendo, oigan y no entiendan[c], no sea que se vuelvan[b] y les sea perdonado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «disciernan».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se arrepientan»; o «vuelvan atrás».'
    reason: lexical_alternative
  - marker: c
    text: Jesús está evocando Isaías 6:9–10, conservando su tensión entre el juicio divino y la falta de respuesta del pueblo.
    reason: cross_reference
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Conserva la relación de finalidad o resultado sin añadir una explicación que suavice la tensión del pasaje. "Para que" es natural en español y mantiene el valor discursivo de ἵνα.
- source_word: βλέποντες βλέπωσι
  english_pob_choice: seeing they may see
  chosen_spanish: viendo, vean
  alternatives_spanish:
  - viendo, vean claramente
  - al ver, vean
  lexicon: BDAG
  rationale: La duplicación verbal se conserva en español con participio más verbo finito para mantener el énfasis retórico del griego y el eco de Isaías. No se introduce un adverbio explicativo que atenúe la forma.
- source_word: ἴδωσιν
  english_pob_choice: perceive
  chosen_spanish: perciban
  alternatives_spanish:
  - vean
  - disciernan
  lexicon: BDAG
  rationale: '"Perciban" diferencia este verbo de βλέπω, que ya quedó con "vean". Así se preserva la distinción entre ver físicamente y captar verdaderamente lo visto.'
- source_word: ἀκούοντες ἀκούωσι
  english_pob_choice: hearing they may hear
  chosen_spanish: oyendo, oigan
  alternatives_spanish:
  - escuchando, escuchen
  - oyendo, escuchen
  lexicon: BDAG
  rationale: Se mantiene la repetición enfática con una estructura paralela a la de "viendo, vean". "Oír" es el verbo más directo para ἀκούω en este contexto y conserva el paralelismo semítico.
- source_word: συνιῶσιν
  english_pob_choice: understand
  chosen_spanish: entiendan
  alternatives_spanish:
  - comprendan
  - capten
  lexicon: BDAG
  rationale: '"Entiendan" es claro y idiomático en español moderno. Preserva el sentido cognitivo de συνίημι sin sobrecargarlo con una lectura técnica.'
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - de no ser que
  lexicon: BDAG
  rationale: '"No sea que" reproduce el valor prospectivo y preventivo de μήποτε con un tono solemne en español. Evita convertirlo en una simple negación de resultado.'
- source_word: ἐπιστρέψωσιν
  english_pob_choice: turn back
  chosen_spanish: se vuelvan
  alternatives_spanish:
  - vuelvan atrás
  - regresen
  - se arrepientan
  lexicon: BDAG
  rationale: '"Se vuelvan" conserva la imagen verbal básica de volver/dirigirse de nuevo sin imponer de entrada el matiz técnico de arrepentimiento. En contexto bíblico puede abarcar ese matiz, por lo que se preserva la ambigüedad útil en el texto principal.'
- source_word: ἀφεθῇ αὐτοῖς
  english_pob_choice: it be forgiven them
  chosen_spanish: les sea perdonado
  alternatives_spanish:
  - se les perdone
  - les sea concedido el perdón
  lexicon: BDAG
  rationale: Se mantiene el pasivo impersonal/divino del griego con "les sea perdonado". La forma evita explicar más de lo que el texto dice y conserva la tensión de una acción de perdón atribuida implícitamente a Dios.
theological_decisions:
- issue: Tensión entre juicio divino y respuesta humana en la cita de Isaías
  english_pob_reading: Retain the Greek's purpose-like wording ('so that ... lest ...') without softening it into mere result or explanatory paraphrase.
  chosen_spanish_reading: Conservar "para que... no sea que..." sin explicarlo como mera consecuencia.
  alternative_spanish_readings:
  - de modo que...
  - con el resultado de que...
  rationale: La formulación española debe mantener la dureza y la tensión del pasaje, no resolverla en una explicación más suave. La estructura elegida deja intacta la posible dimensión de juicio y la falta de respuesta del pueblo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de ἐπιστρέφω en relación con la idea de arrepentimiento
  english_pob_reading: Translate as 'turn back' in the main text, preserving repentance as an interpretive possibility in a footnote.
  chosen_spanish_reading: Traducir con "se vuelvan" en el texto principal, y señalar la posibilidad de "arrepentirse" en nota.
  alternative_spanish_readings:
  - se arrepientan
  - vuelvan atrás
  rationale: El verbo griego puede implicar arrepentimiento en contexto profético, pero no lo nombra de forma técnica. "Se vuelvan" mantiene la imagen básica y deja abierta la lectura teológica sin cerrarla prematuramente.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve ambiguity where genuine.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión auditada del POB en inglés, que eliminó el "while" añadido antes de "seeing" y "hearing" para reflejar más directamente los participios griegos. En español se preserva esa misma concisión con "viendo, vean" y "oyendo, oigan", sin agregar marcadores temporales innecesarios. También se mantiene la tensión deliberada entre finalidad, juicio y respuesta humana, y se conserva la ambigüedad de ἐπιστρέψωσιν en el texto principal.
  spanish_consistency_notes:
  - Se usa "Dios" implícito solo en la voz pasiva de "les sea perdonado", coherente con el griego y con el estilo del POB.
  - Se evita "Cristo" y cualquier terminología eclesiástica no presente en el texto.
  - 'Se mantiene un paralelismo léxico fuerte: "viendo/vean" y "oyendo/oigan" para reflejar la duplicación enfática del griego.'
  - '"Se vuelvan" se deja como opción abierta entre giro físico/relacional y arrepentimiento, siguiendo la cautela lexical del audit trail inglés.'
