translation:
  language: es
  text: 'Y él les decía: «Presten atención a lo que oyen. Con la medida con que midan[a], se les medirá a ustedes[b], y se les añadirá más».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Con la medida con que midan, se les medirá a ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden «y se les añadirá más» como una referencia al aumento del entendimiento para quienes reciben la enseñanza de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les iba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego marca acción en curso o reiterada; el español “les decía” conserva esa duración de modo natural y sin forzar una perífrasis más pesada.
- source_word: Βλέπετε
  english_pob_choice: Pay attention
  chosen_spanish: Presten atención
  alternatives_spanish:
  - Miren
  - Tengan cuidado
  - Estén atentos
  lexicon: BDAG
  rationale: En este contexto exhortativo, el verbo no pide solo visión física sino atención cuidadosa. “Presten atención” expresa bien la advertencia y mantiene el tono directo.
- source_word: τί ἀκούετε
  english_pob_choice: what you hear
  chosen_spanish: a lo que oyen
  alternatives_spanish:
  - lo que oyen
  - qué oyen
  - lo que están oyendo
  lexicon: BDAG
  rationale: El griego tiene objeto directo introducido por τί; en español, la construcción más natural es “prestar atención a lo que oyen”. Mantiene la referencia al contenido escuchado sin armonizarlo con otros pasajes.
- source_word: ἐν ᾧ μέτρῳ
  english_pob_choice: With the measure
  chosen_spanish: Con la medida con que
  alternatives_spanish:
  - Con la medida con la que
  - Según la medida con que
  - Por la medida con que
  lexicon: BDAG
  rationale: La frase introduce el estándar o criterio de medición. “Con la medida con que” conserva la metáfora recíproca y suena idiomático en español.
- source_word: μετρεῖτε
  english_pob_choice: you use
  chosen_spanish: midan
  alternatives_spanish:
  - miden
  - ustedes midan
  - usen
  lexicon: BDAG
  rationale: El verbo “medir” preserva el campo léxico del griego mejor que “usar”. Aunque el inglés POB optó por “use” para fluidez, en español “midan” mantiene la imagen sin perder naturalidad.
- source_word: μετρηθήσεται ὑμῖν
  english_pob_choice: it will be measured to you
  chosen_spanish: se les medirá a ustedes
  alternatives_spanish:
  - les será medido
  - se les medirá
  - será medido para ustedes
  lexicon: BDAG
  rationale: La pasiva futura se expresa con “se les medirá”, que conserva la reciprocidad sin añadir “de vuelta” u otra inferencia no explicitada. “A ustedes” refuerza la segunda persona plural implícita.
- source_word: προστεθήσεται ὑμῖν
  english_pob_choice: more will be added to you
  chosen_spanish: se les añadirá más
  alternatives_spanish:
  - más les será añadido
  - se les agregará más
  - se les añadirá
  lexicon: BDAG
  rationale: “Añadir” reproduce con precisión προστίθημι. La colocación de “más” mantiene la idea de incremento expresada por el contexto, sin convertirla en una explicación interpretativa.
theological_decisions:
- issue: Sentido de la regla recíproca del dicho
  english_pob_reading: The saying is rendered as a general principle of reciprocal response to one's receptivity to Jesus' teaching, without specifying a narrower doctrinal application.
  chosen_spanish_reading: El dicho se presenta como un principio general de reciprocidad ligado a la manera en que se recibe la enseñanza de Jesús, sin precisar si se trata de juicio, generosidad o comprensión espiritual.
  alternative_spanish_readings:
  - Principio de juicio
  - Principio de generosidad
  - Principio de receptividad y entendimiento espiritual
  rationale: El contexto inmediato habla de oír y prestar atención; por eso la traducción conserva la amplitud del dicho sin resolverlo hacia una aplicación doctrinal única. Esto preserva la tensión documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y la auditoría inglesa POB, manteniendo el imperfecto narrativo, la exhortación de atención, la metáfora de la medida y la pasiva recíproca. Se evitó armonizar con Lucas 8:18 en la frase interrogativa, y se conservó la posibilidad interpretativa sobre «se les añadirá más».
  spanish_consistency_notes:
  - Se usó «les» y «a ustedes» para hacer explícita la segunda persona plural implícita en ὑμῖν sin perder naturalidad.
  - Se prefirió «midan» en español para conservar la metáfora de μέτρον / μετρεῖτε, aunque el inglés POB opta por «use» por fluidez idiomática.
  - Se mantuvo «Presten atención» como equivalente funcional de Βλέπετε en un contexto exhortativo, no como mera percepción visual.
  - Se conservó «más» en la cláusula final para reflejar el sentido de incremento de προστεθήσεται sin sobreinterpretar el alcance del aumento.
