translation:
  language: es
  text: Y otras[a] cayeron en la buena tierra, y daba fruto, creciendo y aumentando, y producía treinta por uno, sesenta por uno y cien por uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «otras semillas cayeron en la buena tierra», con «semillas» entendido por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλα
  english_pob_choice: other seed
  chosen_spanish: otras semillas
  alternatives_spanish:
  - otras
  - otras simientes
  lexicon: BDAG
  rationale: El griego neutro plural funciona de modo sustantivado en el contexto de la parábola y remite a la semilla mencionada antes. En español, 'semillas' hace explícito ese referente sin depender de una elipsis menos natural.
- source_word: γῆν τὴν καλήν
  english_pob_choice: the good soil
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - el buen suelo
  - la buena tierra fértil
  lexicon: BDAG
  rationale: Aquí γῆ se refiere al terreno apto para la siembra. 'Tierra' conserva la imagen agrícola y es muy natural en español; 'buena' corresponde a καλήν sin sobreinterpretar.
- source_word: ἐδίδου καρπὸν
  english_pob_choice: it was producing fruit
  chosen_spanish: daba fruto
  alternatives_spanish:
  - estaba produciendo fruto
  - estaba dando fruto
  - rendía fruto
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua. 'Daba fruto' es una forma breve y fiel en español; mantiene el aspecto progresivo sin forzar una perífrasis pesada.
- source_word: ἀναβαίνοντα
  english_pob_choice: growing up
  chosen_spanish: creciendo
  alternatives_spanish:
  - subiendo
  - brotando
  - levantándose
  lexicon: BDAG
  rationale: En contexto agrícola, el participio describe el crecimiento ascendente de la planta. 'Creciendo' comunica bien el proceso en español y evita una redundancia artificial con el siguiente participio.
- source_word: αὐξανόμενα
  english_pob_choice: increasing
  chosen_spanish: aumentando
  alternatives_spanish:
  - creciendo
  - incrementándose
  - progresando
  lexicon: BDAG
  rationale: Se conserva la distinción entre el crecimiento visible y el aumento cuantitativo/progresivo. 'Aumentando' reproduce ese matiz mejor que repetir 'creciendo'.
- source_word: ἔφερεν
  english_pob_choice: bearing
  chosen_spanish: producía
  alternatives_spanish:
  - daba
  - llevaba
  - rendía
  lexicon: BDAG
  rationale: El imperfecto continúa la idea de productividad. 'Producía' funciona de manera natural con 'fruto' y mantiene el sentido de rendimiento sostenido.
- source_word: ἓν τριάκοντα καὶ ἓν ἑξήκοντα καὶ ἓν ἑκατόν
  english_pob_choice: thirtyfold and sixtyfold and a hundredfold
  chosen_spanish: treinta, sesenta y ciento por uno
  alternatives_spanish:
  - treinta veces, sesenta veces y cien veces
  - treinta por uno, sesenta por uno y cien por uno
  - treinta, sesenta y cien veces
  lexicon: BDAG
  rationale: La frase expresa proporción de rendimiento. En español, 'por uno' comunica la relación de multiplicación de manera comprensible y sobria; se conserva la secuencia escalonada sin añadir 'veces' donde el idioma admite la construcción proporcional.
translation_notes:
  revision_awareness: 'Se revisó el pasaje para mantener el paralelismo del griego: semilla implícita/expresa, tierra buena, progresión del crecimiento y escala de rendimiento. No se adoptó una traducción más literal de ''daba'' como ''estaba dando'' porque en español no mejora claramente la lectura devocional ni la fidelidad aspectual.'
  spanish_consistency_notes:
  - Se usa 'tierra' para γῆ en sentido agrícola, en coherencia con el resto de la parábola.
  - '''Fruto'' se mantiene en singular como en el griego.'
  - La cadena participial 'creciendo y aumentando' conserva dos matices distintos sin sobrecargar el verso.
  - Se evita 'Cristo' y cualquier terminología no presente en el texto.
  - '''Ciento por uno'' preserva el patrón proporcional del original sin introducir una glosa interpretativa.'
