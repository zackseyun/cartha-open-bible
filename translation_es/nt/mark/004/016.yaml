translation:
  language: es
  text: 'Y estos son, asimismo, los que fueron sembrados sobre terreno rocoso: cuando oyen la palabra[a], enseguida la reciben con alegría,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en suelo rocoso» o «sobre los lugares rocosos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - de igual manera
  - igualmente
  lexicon: BDAG
  rationale: Expresa la conexión analógica con la explicación anterior sin sonar rígido. «Asimismo» conserva el enlace discursivo y funciona bien en español bíblico moderno.
- source_word: ἐπὶ τὰ πετρώδη
  english_pob_choice: on the rocky ground
  chosen_spanish: en la tierra rocosa
  alternatives_spanish:
  - sobre el terreno rocoso
  - en el suelo rocoso
  - en los lugares rocosos
  lexicon: BDAG
  rationale: La frase describe el lugar pedregoso de la parábola. «Tierra rocosa» comunica bien la imagen agrícola en español y evita una literalidad pesada.
- source_word: σπειρόμενοι
  english_pob_choice: sown
  chosen_spanish: fueron sembrados
  alternatives_spanish:
  - sembrados
  - siembrándose
  - siembran
  lexicon: BDAG
  rationale: El participio funciona adjetivalmente en la explicación parabólica. En español, la pasiva perifrástica «fueron sembrados» conserva el hecho de la siembra sin añadir interpretación sobre el corazón o la respuesta interior.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: «Palabra» mantiene la repetición terminológica y la resonancia bíblica de λόγος en Marcos. Aunque «mensaje» sería posible, debilita la continuidad verbal del pasaje.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: «Enseguida» transmite la rapidez del adverbio con naturalidad en español y conserva el énfasis marcano sin sonar demasiado técnico.
- source_word: μετὰ χαρᾶς
  english_pob_choice: with joy
  chosen_spanish: con alegría
  alternatives_spanish:
  - con gozo
  - gozosamente
  lexicon: BDAG
  rationale: El sintagma preposicional se vierte de forma directa. «Alegría» es natural en español contemporáneo y preserva el matiz de modo sin convertirlo en adverbio.
- source_word: λαμβάνουσιν αὐτόν
  english_pob_choice: receive it
  chosen_spanish: la reciben
  alternatives_spanish:
  - la aceptan
  - la acoguen
  - la reciben y la aceptan
  lexicon: BDAG
  rationale: «Recibir» reproduce el valor básico de λαμβάνω y evita sobreinterpretar la respuesta como aceptación perseverante. El pronombre femenino concuerda con «la palabra» en español, aunque el antecedente griego es masculino.
theological_decisions:
- issue: Referente de «los que fueron sembrados» en la explicación de la parábola
  english_pob_reading: Retain the parabolic wording 'the ones sown on the rocky ground' rather than interpretively replacing it with 'those whose hearts are like rocky ground.'
  chosen_spanish_reading: Conservar la formulación parabólica «los que fueron sembrados en la tierra rocosa» en vez de explicar interpretativamente que se trata de personas con un corazón rocoso.
  alternative_spanish_readings:
  - los que fueron sembrados sobre terreno rocoso
  - los que tienen un corazón como tierra rocosa
  rationale: La explicación de Jesús mantiene la imagen de la siembra para identificar a los representados; no conviene sustituirla por una paráfrasis psicológica que no está en el griego. La traducción preserva la tensión entre personas y semilla sin resolverla de forma interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no se requieren cambios respecto al estado auditado más reciente; se conserva la estructura parabólica, el adverbio de inmediatez y la recepción gozosa sin ampliaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantuvo «palabra» para λόγος por consistencia terminológica en Marcos.
  - Se evitó «Cristo» y terminología eclesiástica no presente en el versículo.
  - Se prefirió «Y estos son» para reflejar la continuidad explicativa del griego.
  - La concordancia femenina en «la reciben» sigue el español, aunque el referente griego inmediato es neutro/masculino por la personificación de «la palabra».
