    issue: La frase de rendimiento «treinta, sesenta y cien por uno» comprime en exceso el griego.
    rationale: ἓν τριάκοντα καὶ ἓν ἑξήκοντα καὶ ἓν ἑκατόν expresa tres rendimientos paralelos. El inglés auditado preserva la repetición coordinada (‘thirtyfold and sixtyfold and a hundredfold’). En español, la forma actual puede sonar como una lista resumida y hace menos explícita la relación de «por uno» con cada cifra.
