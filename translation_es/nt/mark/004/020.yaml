translation:
  language: es
  text: 'Y esos son los sembrados sobre la buena tierra: los que oyen la palabra y la reciben[a] y dan fruto: treinta por uno, y sesenta por uno, y cien por uno.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la aceptan» o «la acogen» para «la reciben» (παραδέχονται).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοί
  english_pob_choice: those
  chosen_spanish: esos
  alternatives_spanish:
  - aquellos
  - éstos
  lexicon: BDAG
  rationale: El demostrativo retoma la última clase descrita en la parábola. «Esos» mantiene la referencia anafórica natural en español sin volverla demasiado distante como «aquellos».
- source_word: οἱ ἐπὶ τὴν γῆν τὴν καλὴν σπαρέντες
  english_pob_choice: the ones sown on the good soil
  chosen_spanish: los sembrados sobre la buena tierra
  alternatives_spanish:
  - los sembrados en la buena tierra
  - los que fueron sembrados sobre la buena tierra
  lexicon: BDAG
  rationale: Se conserva la imagen pasiva de quienes han sido sembrados. «Buena tierra» refleja γῆν τὴν καλὴν de manera clara y fiel; «sobre» mantiene ἐπί con acusativo dentro de la metáfora agrícola del contexto.
- source_word: γῆν τὴν καλὴν
  english_pob_choice: the good soil
  chosen_spanish: la buena tierra
  alternatives_spanish:
  - el buen suelo
  - la buena tierra cultivable
  lexicon: BDAG
  rationale: γῆ puede ser tierra, suelo o terreno; aquí la metáfora de la parábola se expresa naturalmente como «tierra». «Buena» conserva el valor evaluativo contrastivo.
- source_word: οἵτινες
  english_pob_choice: they
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - tales que
  lexicon: BDAG
  rationale: Aunque el griego usa un relativo explicativo, en español la estructura más natural es una cláusula relativa con «los que», que conserva la descripción de esta clase de personas.
- source_word: ἀκούουσιν τὸν λόγον
  english_pob_choice: hear the word
  chosen_spanish: oyen la palabra
  alternatives_spanish:
  - escuchan la palabra
  - oyen el mensaje
  lexicon: BDAG
  rationale: «Palabra» preserva el término repetido en Marcos 4 y su resonancia bíblica. «Oyen» traduce ἀκούουσιν sin añadir matiz interpretativo.
- source_word: παραδέχονται
  english_pob_choice: receive it
  chosen_spanish: la reciben
  alternatives_spanish:
  - la aceptan
  - la acogen
  - la reciben con gusto
  lexicon: BDAG
  rationale: El verbo admite una gama de recepción favorable. «La reciben» mantiene la secuencia oír → recibir → dar fruto; la nota conserva las alternativas que el inglés documentó.
- source_word: καρποφοροῦσιν
  english_pob_choice: bear fruit
  chosen_spanish: dan fruto
  alternatives_spanish:
  - fructifican
  - producen fruto
  lexicon: BDAG
  rationale: «Dar fruto» es una equivalencia natural en español y conserva la metáfora agrícola y espiritual sin sobreexplicarla.
- source_word: ἓν τριάκοντα καὶ ἓν ἑξήκοντα καὶ ἓν ἑκατόν
  english_pob_choice: thirtyfold and sixtyfold and a hundredfold
  chosen_spanish: treinta, sesenta y cien por uno
  alternatives_spanish:
  - treinta veces, sesenta veces y cien veces
  - treinta y sesenta y cien por uno
  lexicon: BDAG
  rationale: En español, la expresión idiomática más natural para el rendimiento es «por uno». Se conserva la progresión numérica del griego sin forzar el giro «-fold»; «cien» mantiene el sentido de ἑκατόν de modo idiomático.
theological_decisions:
- issue: Naturaleza de la respuesta a la palabra en la buena tierra
  english_pob_reading: The verse describes genuine positive reception of the proclaimed word resulting in fruitfulness, without specifying a later doctrinal system about perseverance or apostasy.
  chosen_spanish_reading: El versículo describe una recepción real y positiva de la palabra que resulta en fruto, sin desarrollar un sistema doctrinal posterior sobre perseverancia o apostasía.
  alternative_spanish_readings:
  - La buena tierra implica necesariamente perseverancia final
  - La buena tierra solo describe una respuesta inicial
  rationale: El griego afirma que oyen, reciben y dan fruto. La traducción debe conservar esa tensión sin resolverla con una afirmación doctrinal que el texto no expresa.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: 'La versión coincide con el último pase revisado del texto fuente: no hubo cambios aplicados en la revisión más reciente, y el acuerdo de control cruzado fue alto. Se mantuvo la estructura básica del inglés auditado, ajustada a un español natural y fiel al griego.'
  spanish_consistency_notes:
  - Se usa «palabra» para λόγος de forma consistente con Marcos 4.
  - Se usa «dar fruto» para καρποφοροῦσιν, evitando un tecnicismo innecesario.
  - Se preserva la secuencia oír → recibir → dar fruto, que es central en el versículo.
  - «Buena tierra» mantiene el lenguaje agrícola de la parábola sin sustituirlo por una abstracción.
  - La expresión final se vierte en un español idiomático («por uno») para conservar el valor de rendimiento del griego.
