translation:
  language: es
  text: Y no les hablaba sin parábola[a], pero en privado a sus propios discípulos[c] les explicaba[b] todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede expresarse: «sin una parábola». El singular conserva de manera idiomática el sentido concreto del griego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «interpretaba» o «exponía». El verbo puede significar explicar, interpretar o exponer.'
    reason: lexical_alternative
  - marker: c
    text: «Sus propios discípulos» conserva el énfasis del adjetivo griego que subraya que eran suyos.
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς
  english_pob_choice: without
  chosen_spanish: sin
  alternatives_spanish:
  - sin la compañía de
  - aparte de
  lexicon: BDAG
  rationale: La preposición expresa exclusión directa; en español, «sin» comunica de forma natural que no hablaba a la gente fuera del marco de una parábola.
- source_word: παραβολῆς
  english_pob_choice: a parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - alegoría
  lexicon: BDAG
  rationale: El singular conserva el rasgo concreto del modo de hablar de Jesús. «Parábola» es el equivalente normal y preciso en español bíblico contemporáneo.
- source_word: ἐλάλει
  english_pob_choice: was speaking
  chosen_spanish: les hablaba
  alternatives_spanish:
  - les hablaba continuamente
  - les hablaba
  lexicon: BDAG
  rationale: El imperfecto en este resumen narrativo sugiere acción habitual o reiterada; «les hablaba» en español transmite esa continuidad sin sonar forzado. El auxiliar progresivo no es obligatorio en español y podría sonar pesado aquí.
- source_word: κατ’ ἰδίαν
  english_pob_choice: in private
  chosen_spanish: en privado
  alternatives_spanish:
  - privadamente
  - a solas
  lexicon: BDAG
  rationale: La expresión idiomática contrasta con la enseñanza pública. «En privado» es claro, natural y mantiene el contraste sin añadir matices no asegurados por el texto.
- source_word: τοῖς ἰδίοις μαθηταῖς
  english_pob_choice: to his own disciples
  chosen_spanish: a sus propios discípulos
  alternatives_spanish:
  - a sus discípulos
  - a los discípulos que eran suyos
  lexicon: BDAG
  rationale: «Propios» reproduce el énfasis del adjetivo ἰδίοις, que no es redundante en griego. En español, «sus propios discípulos» conserva esa fuerza posesiva mejor que simplemente «sus discípulos».
- source_word: ἐπέλυεν
  english_pob_choice: was explaining
  chosen_spanish: les explicaba
  alternatives_spanish:
  - les interpretaba
  - les exponía
  lexicon: BDAG
  rationale: El verbo puede significar explicar, interpretar o exponer. «Les explicaba» es el equivalente más claro y natural en español; mantiene el valor del imperfecto sin volver el texto demasiado técnico.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: BDAG
  rationale: El neutro plural tiene valor totalizador. «Todo» es idiomático en español y preserva la amplitud del original sin restringirla a las parábolas.
theological_decisions:
- issue: Alcance de lo que Jesús explicaba en privado
  english_pob_reading: Rendered πάντα as 'everything' without narrowing it to only the parables in translation.
  chosen_spanish_reading: «Todo» se mantiene amplio, sin limitarlo en la traducción solo a las parábolas.
  alternative_spanish_readings:
  - solo las parábolas
  - todo lo que había dicho
  - todas las cosas
  rationale: El griego dice simplemente πάντα. Aunque el contexto sugiere su enseñanza, la traducción no debe estrechar indebidamente el alcance. Se preserva así la tensión narrativa entre la enseñanza pública en parábolas y la explicación privada más amplia.
  doctrine_reference: Preservar la tensión textual sin resolverla por anticipado.
translation_notes:
  revision_awareness: Se mantiene el sentido habitual/imperfectivo de ἐλάλει y ἐπέλυεν, se conserva el énfasis posesivo de ἰδίοις, y no se restringe πάντα a una referencia más estrecha que la del griego. La redacción busca claridad publicable en español sin perder las decisiones auditadas del POB inglés.
  spanish_consistency_notes:
  - Se usa «parábola» para παραβολή, acorde con el registro bíblico estándar y con la terminología del proyecto.
  - Se usa «explicaba» para ἐπιλύω, reservando «interpretar» como alternativa anotada porque puede sonar más técnico en español.
  - «En privado» mantiene el contraste discursivo con la enseñanza pública.
  - «Sus propios discípulos» refleja el énfasis posesivo del original sin caer en redundancia innecesaria en el cuerpo principal.
