  text: Καὶ πάλιν ἤρξατο διδάσκειν παρὰ τὴν θάλασσαν. καὶ ⸀συνάγεται πρὸς αὐτὸν ὄχλος ⸀πλεῖστος, ὥστε αὐτὸν ⸂εἰς πλοῖον ἐμβάντα⸃ καθῆσθαι ἐν τῇ θαλάσσῃ, καὶ πᾶς ὁ ὄχλος πρὸς τὴν θάλασσαν ἐπὶ τῆς γῆς ⸀ἦσαν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/004/001.yaml
  text: And again he began to teach beside the sea[a]. And a very large crowd gathers to him, so that, getting into a boat, he sat on the sea[b], and the whole crowd was by the sea on the land.
  footnotes:
  - marker: a
    text: Or 'is gathering to him'; Mark frequently uses the historical present for vivid narration.
    reason: lexical_alternative
  - marker: b
    text: That is, on the water in a boat, while the crowd remained on land.
    reason: cultural_note
