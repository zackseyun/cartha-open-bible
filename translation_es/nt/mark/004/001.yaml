translation:
  language: es
  text: Y otra vez comenzó a enseñar junto al mar[a]. Y una multitud muy grande se reúne hacia él, de modo que, entrando en una barca, se sentó sobre el mar[b], y toda la multitud estaba junto al mar, en tierra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se está reuniendo hacia él»; Marcos usa con frecuencia el presente histórico para dar viveza a la narración.
    reason: lexical_alternative
  - marker: b
    text: Es decir, sobre el agua, en una barca, mientras la multitud permanecía en tierra.
    reason: cultural_note
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Indica repetición de la acción; «otra vez» es natural en español y conserva la sencillez de «again» sin añadir matiz innecesario.
- source_word: ἤρξατο διδάσκειν
  english_pob_choice: began to teach
  chosen_spanish: comenzó a enseñar
  alternatives_spanish:
  - empezó a enseñar
  - se puso a enseñar
  lexicon: BDAG
  rationale: Construcción ingresiva con infinitivo complementario; «comenzó a enseñar» conserva el inicio de la acción con estilo digno y claro.
- source_word: παρὰ τὴν θάλασσαν
  english_pob_choice: beside the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - al lado del mar
  - a la orilla del mar
  lexicon: BDAG
  rationale: παρά con acusativo expresa ubicación al lado de; «junto al mar» es idiomático en español. Se prefirió «mar» para θάλασσα, manteniendo la referencia literal del texto.
- source_word: συνάγεται
  english_pob_choice: gathers
  chosen_spanish: se reúne
  alternatives_spanish:
  - se congrega
  - se junta
  lexicon: BDAG
  rationale: El presente histórico de Marcos conserva viveza narrativa; «se reúne» mantiene esa fuerza sin volverlo un pasado plano.
- source_word: ὄχλος πλεῖστος
  english_pob_choice: a very large crowd
  chosen_spanish: una muchedumbre muy grande
  alternatives_spanish:
  - una multitud muy grande
  - una gran multitud
  lexicon: BDAG
  rationale: πλεῖστος intensifica el tamaño; «muchedumbre muy grande» reproduce la intensidad con un registro natural y evita perder el énfasis cuantitativo.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: ante él
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: En este contexto la multitud se agrupa frente a Jesús; «ante él» expresa la orientación relacional y espacial de πρός sin sugerir solo movimiento.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - hasta el punto de que
  - así que
  lexicon: BDAG
  rationale: Introduce el resultado de la multitud; «de modo que» conserva la relación consecutiva de manera clara y formal.
- source_word: εἰς πλοῖον ἐμβάντα
  english_pob_choice: getting into a boat
  chosen_spanish: subiendo a una barca
  alternatives_spanish:
  - al subir a una barca
  - entrando en una barca
  lexicon: BDAG
  rationale: El participio aoristo subordinado describe la acción previa de embarcarse. «Subiendo a una barca» es fluido en español y refleja el movimiento sin sobretraducir.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - lancha
  lexicon: BDAG
  rationale: En el contexto del lago y el ministerio de Jesús, «barca» es la forma más natural en español y preserva la imagen concreta del texto.
- source_word: καθῆσθαι
  english_pob_choice: sat
  chosen_spanish: se sentó
  alternatives_spanish:
  - estuvo sentado
  - tomó asiento
  lexicon: BDAG
  rationale: Infinitivo de resultado tras ὥστε; «se sentó» es conciso y narrativo.
- source_word: ἐν τῇ θαλάσσῃ
  english_pob_choice: on the sea
  chosen_spanish: sobre el mar
  alternatives_spanish:
  - en el mar
  - sobre el agua
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», el sentido en una barca es locativo sobre el agua. «Sobre el mar» conserva la imagen espacial y el contraste con la multitud en tierra.
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - todo el gentío
  - la multitud entera
  lexicon: BDAG
  rationale: El colectivo singular griego se expresa de forma natural en español como «toda la multitud», conservando el sentido totalizador.
- source_word: πρὸς τὴν θάλασσαν
  english_pob_choice: by the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - a la orilla del mar
  - frente al mar
  lexicon: BDAG
  rationale: Mantiene la ubicación de la multitud en la ribera o zona costera; «junto al mar» es claro y coherente con la primera ocurrencia de παρά.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: en tierra
  alternatives_spanish:
  - sobre la tierra
  - en el suelo
  lexicon: BDAG
  rationale: Aquí la oposición es entre Jesús en la barca y la multitud en tierra firme. «En tierra» preserva esa contraposición de forma breve y natural.
translation_notes:
  revision_awareness: 'La redacción española sigue el texto griego directamente y toma como guía el audit trail inglés: se mantuvo el presente histórico de συνάγεται, la subordinación participial de εἰς πλοῖον ἐμβάντα y el contraste espacial entre la barca y la multitud en tierra. También se conservó la referencia literal a θάλασσα como «mar», sin domesticarla a «lago».'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exija; aquí no aparece.
  - Se prefirió «barca» para πλοῖον en este contexto narrativo lacustre.
  - Se mantuvo «mar» para θάλασσα conforme al texto fuente.
  - Se conservó el presente histórico («se reúne») para reflejar el valor estilístico del griego.
  - «En tierra» refleja con brevedad la oposición espacial final del versículo.
