review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido general del griego y del POB inglés: repetición de la enseñanza, presente histórico en «se reúne», resultado introducido por ὥστε, Jesús en una barca y la multitud en tierra. Sin embargo, «ante él» para πρὸς αὐτόν debilita el matiz de movimiento hacia Jesús, y «subiendo a una barca» suena menos preciso que «entrando en una barca» o «al entrar en una barca» para ἐμβάντα.'
  spanish_quality_summary: 'El texto es legible y digno, pero hay dos puntos de naturalidad/fidelidad mejorables: «muchedumbre muy grande» suena algo pesado frente a «multitud muy grande», y «ante él» no es la mejor opción en español para el valor de πρός aquí. El resto fluye bien; las notas están bien formuladas y ancladas.'
  glossary_alignment: No hay términos del glosario principal en juego. «Mar» para θάλασσα y «barca» para πλοῖον son compatibles con el proyecto. El uso del presente histórico está correctamente conservado y explicado en nota.
  issues:
  - severity: medium
    issue: «ante él» para πρὸς αὐτόν
    rationale: πρὸς αὐτόν aquí expresa acercamiento/movimiento hacia Jesús. «Ante él» sugiere más bien posición enfrente o presencia delante de él, y pierde parte del matiz dinámico que el griego y el POB inglés preservan con «to him».
  - severity: low
    issue: «subiendo a una barca» para εἰς πλοῖον ἐμβάντα
    rationale: La idea central es entrar/embarcarse en la barca. «Subiendo a» puede funcionar, pero en español puede sonar menos exacto que «entrando en una barca» o «al entrar en una barca», especialmente porque el griego marca la acción de abordarla más que el simple ascenso.
  - severity: low
    issue: «muchedumbre muy grande» suena algo cargado
    rationale: Aunque es fiel, «multitud muy grande» es más natural y transparente en español general de lectura bíblica amplia, sin pérdida de intensidad para πλεῖστος.
