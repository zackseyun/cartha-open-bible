revisions:
- from: Y otra vez comenzó a enseñar junto al mar[a]. Y una muchedumbre muy grande se reúne ante él, de modo que, subiendo a una barca, se sentó sobre el mar[b], y toda la multitud estaba junto al mar, en tierra.
  to: Y otra vez comenzó a enseñar junto al mar[a]. Y una multitud muy grande se reúne hacia él, de modo que, entrando en una barca, se sentó sobre el mar[b], y toda la multitud estaba junto al mar, en tierra.
  rationale: Se ajustó πρὸς αὐτόν de «ante él» a «hacia él» para preservar mejor el matiz de movimiento hacia Jesús. Se cambió «muchedumbre» por «multitud» por mayor naturalidad. Se revisó «subiendo a una barca» a «entrando en una barca» para reflejar con más precisión ἐμβάντα. Se mantuvieron el presente histórico, «mar», y la nota explicativa sobre «sobre el mar».
