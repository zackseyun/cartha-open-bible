translation:
  language: es
  text: 'Y decía[c][b][a]: «El reino de Dios es así: como cuando un hombre siembra la semilla sobre la tierra»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El reino de Dios es como si un hombre sembrara semilla sobre la tierra». La comparación continúa en el versículo siguiente, y el griego es algo comprimido.'
    reason: alternative_reading
  - marker: b
    text: 'Griego: «un hombre»; se conserva la forma masculina porque el texto usa una figura representativa gramaticalmente masculina.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «Y estaba diciendo».'
    reason: previous_rendering
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: El imperfecto narrativo expresa acción continua o repetida; «estaba diciendo» conserva mejor ese valor aspectual que un pretérito simple como «decía» o «dijo», y mantiene el tono de la narración.
- source_word: Οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: Introduce el modo de la comparación. «Así» es natural en español y corresponde bien al enlace comparativo del dicho.
- source_word: βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: «Reino» es la forma más estable y comprensible en español bíblico para βασιλεία en las parábolas, y conserva el alcance de reino/reinado sin forzar una paráfrasis.
- source_word: ὡς
  english_pob_choice: as when
  chosen_spanish: como cuando
  alternatives_spanish:
  - como
  - tal como cuando
  lexicon: BDAG
  rationale: La comparación griega es comprimida y continúa en el versículo siguiente. «Como cuando» reproduce esa apertura comparativa en español sin cerrar prematuramente la construcción.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa un singular masculino gramatical, y la figura representativa de la parábola puede traducirse de forma directa como «un hombre», preservando esa referencia masculina documentada.
- source_word: βάλῃ
  english_pob_choice: casts
  chosen_spanish: siembra
  alternatives_spanish:
  - arroja
  - echa
  lexicon: BDAG
  rationale: Aunque βάλλω literalmente es «arrojar/echar», en este contexto agrícola el acto es sembrar. «Siembra» comunica la acción prevista por la imagen y evita una literalidad extraña en español.
- source_word: τὸν σπόρον
  english_pob_choice: the seed
  chosen_spanish: la semilla
  alternatives_spanish:
  - la semilla sembrada
  - el grano
  lexicon: BDAG
  rationale: En español, «semilla» es la forma más natural para σπόρος en este contexto agrícola. El artículo definido puede funcionar genéricamente, como en inglés, sin necesidad de forzarlo en la nota principal.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: upon the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  lexicon: BDAG
  rationale: γῆ aquí señala el terreno donde se siembra. «Sobre la tierra» es claro y fiel; «suelo» sería posible, pero «tierra» mantiene mejor la imagen agrícola y el registro bíblico.
theological_decisions:
- issue: Comparación sintácticamente abierta que continúa en el versículo siguiente
  english_pob_reading: Retain the open-ended comparison with a colon and 'as when' rather than smoothing it into a complete paraphrase.
  chosen_spanish_reading: Mantener la comparación abierta con dos puntos y «como cuando», sin completar el pensamiento dentro de este versículo.
  alternative_spanish_readings:
  - 'El reino de Dios es así: un hombre siembra la semilla sobre la tierra.'
  - El reino de Dios es como si un hombre sembrara semilla sobre la tierra.
  rationale: El griego está comprimido y la comparación se extiende al versículo 27. Mantener la apertura respeta la forma del texto y evita resolver una tensión literaria que el original deja en suspenso.
  doctrine_reference: Principio POB de preservar la tensión literaria y teológica cuando el texto la mantiene.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se eliminó la repetición redundante y se prefirió una construcción más idiomática para ὡς. En español, «como cuando» conserva esa naturalidad y la apertura sintáctica del dicho sin sobreexplicar la comparación.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «reino de Dios» como término estable para βασιλεία τοῦ θεοῦ en lugar de «reinado» o «realeza».
  - Se tradujo el presente progresivo inglés con imperfecto perifrástico («estaba diciendo») para conservar el valor aspectual del griego.
  - Se evitó suavizar la imagen agrícola de βάλλω, pero se usó «siembra» por ser la equivalencia natural en español en este contexto.
  - Se preservó la comparación abierta con nota, porque la frase queda incompleta hasta el versículo siguiente.
