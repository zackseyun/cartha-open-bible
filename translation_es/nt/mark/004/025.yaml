translation:
  language: es
  text: Porque al que tiene, se le dará[a]; y al que no tiene, aun lo que tiene se le quitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice simplemente «se le dará»; el aumento implícito se deduce del contraste del dicho y del contexto proverbial, pero no se expresa de manera explícita en la oración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: whoever
  chosen_spanish: al que
  alternatives_spanish:
  - quien
  - el que
  lexicon: BDAG
  rationale: El relativo indefinido tiene fuerza proverbial y general. «Al que» conserva el valor de persona genérica sin volver la frase demasiado rígida en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Marca explicación o fundamento del dicho anterior. «Porque» reproduce bien la conexión causal/explanatoria en español bíblico moderno.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - posee
  lexicon: BDAG
  rationale: Verbo simple de posesión. «Tiene» es natural, conciso y mantiene el tono proverbial.
- source_word: δοθήσεται αὐτῷ
  english_pob_choice: more will be given to him
  chosen_spanish: se le dará
  alternatives_spanish:
  - se le dará más
  - le será dado
  lexicon: BDAG
  rationale: El griego no expresa un objeto directo explícito. En español, la forma neutra «se le dará» conserva esa apertura y evita añadir «más» sin una marca textual visible; la idea de aumento queda sugerida por el paralelismo.
- source_word: ὃς οὐκ ἔχει
  english_pob_choice: whoever does not have
  chosen_spanish: al que no tiene
  alternatives_spanish:
  - quien no tiene
  - el que no tiene
  lexicon: BDAG
  rationale: Mantiene la misma construcción genérica que la primera mitad y preserva el paralelismo antitético del proverbio.
- source_word: ὃ ἔχει
  english_pob_choice: what he has
  chosen_spanish: lo que tiene
  alternatives_spanish:
  - aquello que tiene
  - lo que posee
  lexicon: BDAG
  rationale: El relativo neutro apunta a cualquier posesión en vista. «Lo que tiene» es idiomático y fiel, sin endurecer el sintagma.
- source_word: ἀρθήσεται ἀπ’ αὐτοῦ
  english_pob_choice: will be taken away from him
  chosen_spanish: se le quitará de él
  alternatives_spanish:
  - le será quitado
  - será quitado de él
  lexicon: BDAG
  rationale: Ἀρθήσεται con ἀπό indica remoción. «Se le quitará» expresa bien la pérdida; se añade «de él» para reflejar ἀπ’ αὐτοῦ y dejar explícito el origen/separación, aunque la preposición resulta algo redundante en español.
theological_decisions:
- issue: Objeto implícito en δοθήσεται
  english_pob_reading: The English POB supplies 'more' in the positive half of the proverb.
  chosen_spanish_reading: No se inserta 'más' en el texto principal; se deja la forma abierta 'se le dará'.
  alternative_spanish_readings:
  - se le dará más
  - más se le dará
  rationale: El griego no nombra un objeto. Aunque el contraste proverbial sugiere incremento, el español puede conservar esa implícita expectativa sin explicitarla en la línea principal. Esto evita cargar el verso con una palabra no dicha por el griego, manteniendo la tensión lexical visible.
  doctrine_reference: Translation philosophy §1, §6
- issue: Referencia masculina genérica
  english_pob_reading: Use 'whoever ... him' rather than gender-neutral recasting.
  chosen_spanish_reading: Se conserva el masculino genérico implícito de la forma relativa mediante 'al que ... se le'.
  alternative_spanish_readings:
  - a quien ... se le
  - quien ... se le
  rationale: El griego usa formas masculinas singulares con valor representativo. «Al que» reproduce esa generalidad sin reescritura inclusiva que atenúe la forma original.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'La revisión más reciente marcó el versículo como sin cambios necesarios (high_agreement; unchanged: true). Esta propuesta sigue el mismo sentido general que el texto inglés auditado, pero decide no suplir ''más'' en el cuerpo principal, preservando en español la ambigüedad gramatical del griego y señalando la inferencia en nota.'
  spanish_consistency_notes:
  - Se mantiene Yahvé como forma por defecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usa un español breve y proverbial, acorde con el paralelismo del original.
  - No se introduce vocabulario doctrinal ajeno al dicho; la elección central es la preservación de la elipsis en δοθήσεται.
