review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura proverbial del griego y conserva acertadamente la elipsis de δοθήσεται αὐτῷ mediante «se le dará». También mantiene el contraste entre «tiene» y «no tiene» y el valor amplio de ὃ ἔχει como «lo que tiene». Sin embargo, «se le quitará de él» no es una forma natural ni fielmente idiomática para ἀρθήσεται ἀπ’ αὐτοῦ en español; la preposición ya queda incorporada en «quitar ... a alguien / quitarle», por lo que la redacción actual suena calcada.
  spanish_quality_summary: El texto es claro en general, pero «se le quitará de él» resulta torpe y poco natural en español bíblico contemporáneo. «Se le quitará» o «le será quitado» expresa mejor el sentido. El resto del verso es legible, digno y apropiado para un registro eclesial amplio.
  glossary_alignment: No hay términos del glosario mayor en disputa en este versículo. La decisión de no añadir «más» en el texto principal es defendible y está bien documentada en nota. La sintaxis relativa «al que» es aceptable, aunque «al que tiene» es más natural que repetir una preposición final innecesaria en la segunda cláusula.
  issues:
  - severity: medium
    issue: Calco no idiomático en «se le quitará de él»
    rationale: Aunque ἀπ’ αὐτοῦ expresa separación/remoción, en español «se le quitará» ya comunica adecuadamente «taken away from him». Añadir «de él» produce una construcción forzada y redundante.
  revised_spanish_text: Porque al que tiene, se le dará[a]; y al que no tiene, aun lo que tiene se le quitará.
  revised_footnotes:
