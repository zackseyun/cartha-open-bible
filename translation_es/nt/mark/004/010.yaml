    issue: 'Expresión algo rígida: «los que estaban alrededor de él»'
    rationale: Aunque es fiel, en español suena más natural «los que estaban a su alrededor», sin perder el matiz de un grupo más amplio que los Doce.
  - severity: low
    issue: «los doce» en minúscula
    rationale: Dado que se refiere al grupo definido de discípulos/apóstoles, «los Doce» mejora la legibilidad y sigue el uso habitual en español bíblico moderno; además armoniza con la nota al pie ya existente.
