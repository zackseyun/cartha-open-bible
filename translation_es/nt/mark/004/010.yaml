translation:
  language: es
  text: Y cuando estaba solo[a], los que estaban a su alrededor, con los Doce, le preguntaban acerca de las parábolas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que estaban con él»; la frase se refiere a los seguidores que lo rodeaban, no necesariamente solo a los Doce.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ ὅτε
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Cuando
  lexicon: BDAG
  rationale: Conserva el valor coordinante de καί y el temporal de ὅτε. En español, «Y cuando» mantiene el flujo narrativo de Marcos sin sonar forzado.
- source_word: ἐγένετο κατὰ μόνας
  english_pob_choice: he was alone
  chosen_spanish: estaba solo
  alternatives_spanish:
  - estaba por sí solo
  - se hallaba solo
  lexicon: BDAG
  rationale: La expresión idiomática indica estar en privado o sin compañía. «Estaba solo» es natural en español y refleja la situación descrita sin añadir explicaciones no presentes en el texto.
- source_word: ἠρώτων
  english_pob_choice: were asking
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaban insistentemente
  - seguían preguntándole
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o repetida. «Le preguntaban» preserva ese aspecto de manera sobria y readable; «seguían preguntándole» sería más interpretativo.
- source_word: οἱ περὶ αὐτὸν
  english_pob_choice: those around him
  chosen_spanish: los que estaban alrededor de él
  alternatives_spanish:
  - los que estaban con él
  - su círculo cercano
  lexicon: BDAG
  rationale: La frase señala al grupo amplio que rodeaba a Jesús, no solo una proximidad física momentánea. «Los que estaban alrededor de él» mantiene esa amplitud y deja espacio para la distinción con «los doce».
- source_word: σὺν τοῖς δώδεκα
  english_pob_choice: with the Twelve
  chosen_spanish: con los doce
  alternatives_spanish:
  - junto con los doce
  lexicon: BDAG
  rationale: σύν expresa acompañamiento. «Con los doce» conserva la distinción entre el grupo más amplio y los Doce sin sobrecargar la frase.
- source_word: τὰς παραβολάς
  english_pob_choice: the parables
  chosen_spanish: las parábolas
  alternatives_spanish:
  - esas parábolas
  - las narraciones parabólicas
  lexicon: BDAG
  rationale: El plural está firmemente atestiguado en el texto griego proporcionado, por lo que debe reflejarse en español. «Parábolas» es el equivalente directo y claro.
theological_decisions:
- issue: Identidad del grupo que pregunta
  english_pob_reading: A broader group around Jesus, including the Twelve, asked him.
  chosen_spanish_reading: Un grupo más amplio alrededor de Jesús, junto con los doce, le preguntaba.
  alternative_spanish_readings:
  - Solo los doce le preguntaban.
  - Un círculo íntimo distinto de los doce le preguntaba.
  rationale: La sintaxis οἱ περὶ αὐτὸν σὺν τοῖς δώδεκα indica naturalmente a los que estaban alrededor de Jesús en compañía de los doce. La traducción conserva esa distinción sin reducir el sujeto a «los doce» בלבד.
  doctrine_reference: No doctrinal issue; textual-syntactic interpretation of the subject group.
translation_notes:
  revision_awareness: Coincide con el texto griego SBLGNT provisto y con la lectura auditada en inglés; no se introdujeron cambios de revisión respecto al contexto inglés, y se preservó el plural de «parábolas» y la distinción entre el grupo alrededor de Jesús y los Doce.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y se usó lenguaje directo y narrativo acorde con Marcos.
  - «Los doce» se mantiene en minúsculas por funcionar como grupo nominal descriptivo.
  - La nota al pie se ancla en «alrededor de él» para preservar la alternativa léxica documentada en el audit trail inglés.
