translation:
  language: es
  text: Y otra cayó entre las espinas[a], y las espinas brotaron y la ahogaron, y no dio fruto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “dentro de las espinas”. El griego usa literalmente “hacia/dentro de”, aunque en este contexto “entre las espinas” es más natural en español.
    reason: lexical_alternative
  - marker: b
    text: O “no llevó fruto”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλο
  english_pob_choice: other seed
  chosen_spanish: otra
  alternatives_spanish:
  - otra semilla
  - algo más
  lexicon: BDAG
  rationale: El griego neutro singular ἄλλο remite elípticamente a la semilla del contexto previo. En español, como el referente ya está claro en la parábola, “otra” reproduce la elipsis sin añadir una palabra que el texto griego no explicita.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se cayó
  - cayó al suelo
  lexicon: BDAG
  rationale: El aoristo de πίπτω se traduce de forma directa con “cayó”, que es natural y fiel al movimiento del texto.
- source_word: εἰς τὰς ἀκάνθας
  english_pob_choice: among the thorns
  chosen_spanish: entre las espinas
  alternatives_spanish:
  - en las espinas
  - dentro de las espinas
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente “a/into”, en este contexto agrícola el español natural es “entre las espinas”. “Espinas” mantiene la imagen vegetal; “entre” evita un calco poco idiomático y conserva el sentido de caer en una zona espinosa.
- source_word: ἀνέβησαν
  english_pob_choice: came up
  chosen_spanish: crecieron
  alternatives_spanish:
  - brotaron
  - subieron
  lexicon: BDAG
  rationale: El verbo griego significa literalmente “subieron/cayeron hacia arriba”, pero en contexto de plantas expresa el crecimiento. “Crecieron” comunica claramente el avance vegetativo en español sin perder el valor de desarrollo.
- source_word: συνέπνιξαν
  english_pob_choice: choked
  chosen_spanish: la ahogaron
  alternatives_spanish:
  - la sofocaron
  - la asfixiaron
  lexicon: BDAG
  rationale: Para vegetación que impide el crecimiento, “ahogó/ahogaron” es una imagen muy natural en español y conserva la fuerza metafórica de συμπνίγω. “La ahogaron” mantiene el objeto singular del pronombre αὐτό.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - la semilla
  lexicon: BDAG
  rationale: El pronombre singular remite a la semilla entendida por el contexto. En español, “la” concuerda con la semilla implícita y evita una repetición innecesaria; aunque el antecedente no está expresado, la referencia femenina es idiomática por semilla.
- source_word: καρπὸν οὐκ ἔδωκεν
  english_pob_choice: it yielded no fruit
  chosen_spanish: no dio fruto
  alternatives_spanish:
  - no produjo fruto
  - no produjo fruto alguno
  - no dio ningún fruto
  lexicon: BDAG
  rationale: La construcción literal “no dio fruto” conserva la brevedad del griego y la imagen agrícola. Es más directa que “produjo”, y en español bíblico es clara y fiel sin necesidad de expandir el sentido.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia: no hay cambios sustantivos ni variantes textuales relevantes para esta línea. La única decisión principal en español es idiomática: εἰς se vierte con una preposición natural en español (“entre”) y συνέπνιξαν se expresa con una imagen verbal equivalente (“la ahogaron”).'
  spanish_consistency_notes:
  - Se conserva el orden narrativo coordinado con tres miembros unidos por “y”, siguiendo la repetición del griego.
  - Se evita introducir “semilla” en el texto principal porque el referente ya está disponible por el contexto inmediato; la elipsis coincide con el griego.
  - “Espinas” se mantiene como término general y bíblicamente comprensible, sin sustituirlo por un tecnicismo agrícola.
  - El pronombre objeto singular se mantiene en singular (“la”), coherente con el referente implícito de la semilla.
