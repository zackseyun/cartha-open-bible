revisions:
- from: Porque nada está oculto sino para ser revelado, ni ha llegado a ser secreto[a] sino para llegar a la luz[b].
  to: Porque nada está oculto sino para ser revelado, ni ha llegado a ser encubierto sino para salir a la luz[b].
  rationale: Se reemplaza «secreto» por «encubierto» para reflejar mejor ἀπόκρυφον sin introducir la connotación de confidencialidad. Se cambia «llegar a la luz» por «salir a la luz» por mayor naturalidad en español, conservando la nota literal para la imagen griega subyacente. La nota [a] deja de ser necesaria al desaparecer la alternativa problemática.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:32:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: κρυπτόν/ἀπόκρυφον se distinguen, ἐὰν μὴ ἵνα se vierte con matiz final, y la segunda mitad mantiene la idea de pasar a lo manifiesto. Sin embargo, «secreto» para ἀπόκρυφον introduce con demasiada fuerza la idea de intencionalidad o confidencialidad, más allá de «concealed», y «llegar a la luz» suena menos idiomático en español que una opción establecida como «salir a la luz».'
  spanish_quality_summary: El texto es claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión léxica. «Nada está oculto» funciona bien; «ha llegado a ser» es fiel pero algo pesado. Mantenerlo es aceptable en un registro bíblico. El principal problema de legibilidad/precisión es «secreto», que en español no empareja tan bien con ἀπόκρυφον como «escondido» o «encubierto».
  glossary_alignment: 'No hay términos del glosario maestro especialmente implicados aquí. La decisión entre «oculto» y «secreto» sí toca la consistencia léxica interna del versículo: conviene preservar la ligera variación sin crear un matiz ajeno. «Encubierto» mantiene el paralelismo con distinción mejor que «secreto».'
  issues:
  - severity: medium
    issue: «secreto» para ἀπόκρυφον añade un matiz no ideal
    rationale: Aunque evita repetir «oculto», «secreto» en español suele sugerir algo reservado intencionalmente o confidencial, mientras que ἀπόκρυφον aquí se alinea mejor con «concealed/kept out of sight». «Encubierto» o «escondido» preservan mejor la imagen de ocultamiento.
  - severity: low
    issue: «llegar a la luz» es menos idiomático que «salir a la luz»
    rationale: La nota ya preserva la literalidad de εἰς φανερόν. En el texto principal, «salir a la luz» suena más natural en español y comunica bien el paso a lo manifiesto, aunque pierda algo de la imaginería de movimiento que la nota puede compensar.
  revised_spanish_text: Porque nada está oculto sino para ser revelado, ni ha llegado a ser encubierto sino para salir a la luz[b].
  revised_footnotes:
  - marker: b
    text: Lit. «llegar a lo visible» o «venir a lo abierto».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «secreto» por «encubierto» para reflejar mejor ἀπόκρυφον sin introducir la connotación de confidencialidad. Se cambia «llegar a la luz» por «salir a la luz» por mayor naturalidad en español, conservando la nota literal para la imagen griega subyacente. La nota [a] deja de ser necesaria al desaparecer la alternativa problemática.
