translation:
  language: es
  text: Porque nada está oculto sino para ser revelado, ni ha llegado a ser encubierto sino para salir a la luz[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: Lit. «llegar a lo visible» o «venir a lo abierto».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρυπτὸν
  english_pob_choice: hidden
  chosen_spanish: oculto
  alternatives_spanish:
  - escondido
  - encubierto
  lexicon: BDAG
  rationale: κρυπτός expresa algo que está oculto o tapado a la vista. «Oculto» es natural en español y preserva la idea básica sin sugerir necesariamente intención de secreto.
- source_word: ἐὰν μὴ ἵνα
  english_pob_choice: except to
  chosen_spanish: sino para
  alternatives_spanish:
  - excepto para
  - salvo para
  lexicon: BDAG
  rationale: La combinación funciona como una excepción con matiz final. «Sino para» transmite en español la exclusión y la orientación hacia el fin de ser revelado, sin volver la frase rígida o poco idiomática.
- source_word: φανερωθῇ
  english_pob_choice: be revealed
  chosen_spanish: ser revelado
  alternatives_spanish:
  - ser manifestado
  - ser dado a conocer
  lexicon: BDAG
  rationale: El pasivo de φανερόω indica volverse visible o conocido. «Ser revelado» es claro, idiomático y mantiene la voz pasiva.
- source_word: ἀπόκρυφον
  english_pob_choice: concealed
  chosen_spanish: secreto
  alternatives_spanish:
  - oculto
  - encubierto
  lexicon: BDAG
  rationale: ἀπόκρυφος añade la idea de estar apartada de la vista. En español, «secreto» evita repetir «oculto» y refleja una leve intensificación semántica, aunque el término puede sugerir más intencionalidad que el griego; por eso se mantiene la relación paralela con el primer miembro.
- source_word: ἐγένετο
  english_pob_choice: has become
  chosen_spanish: ha llegado a ser
  alternatives_spanish:
  - se ha vuelto
  - se ha hecho
  lexicon: BDAG
  rationale: γίνομαι aquí expresa entrada en un estado. «Ha llegado a ser» conserva el valor aspectual/resultativo con un registro digno y transparente en español.
- source_word: ἔλθῃ εἰς φανερόν
  english_pob_choice: come to light
  chosen_spanish: llegar a la luz
  alternatives_spanish:
  - salir a la luz
  - venir a la luz
  lexicon: BDAG
  rationale: La expresión literal apunta a entrar en lo visible o abierto. «Llegar a la luz» conserva la imagen espacial y corresponde bien al giro inglés «come to light», aunque con un sustantivo más natural en español bíblico contemporáneo.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ enlaza la sentencia con lo anterior como explicación. «Porque» es la conexión más directa y clara en español.
theological_decisions:
- issue: Matiz de propósito en las dos cláusulas con ἵνα
  english_pob_reading: Preserve purposive force while allowing the Koine result nuance to remain audible.
  chosen_spanish_reading: Mantener el matiz de finalidad con «para ser revelado» y «para llegar a la luz», sin resolverlo en una pura consecuencia.
  alternative_spanish_readings:
  - «sino que será revelado»
  - «sino que termina por ser revelado»
  rationale: El griego usa ἵνα en ambas mitades, lo que normalmente expresa propósito, aunque en koiné también puede sonar a resultado. El español conserva esa tensión al usar «para», evitando cerrar indebidamente el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB inglés, que prefirió «come to light» para φανερόν por ser más directo y natural que «come into the open». En español se reflejó ese ajuste con «llegar a la luz», manteniendo el paralelismo y el registro formal.
  spanish_consistency_notes:
  - Se siguió el uso de «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se eligió «oculto» para κρυπτός y «secreto» para ἀπόκρυφος a fin de conservar la distinción paralela del griego.
  - Se mantuvo «ser revelado» para φανερωθῇ, en línea con la elección auditada del inglés.
  - Se evitó «Cristo» y terminología no pertinente al versículo.
  - La construcción «sino para» busca sonar natural en español sin perder la relación semántica con ἵνα.
