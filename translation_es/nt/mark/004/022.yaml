base_translation:
  language: en
  yaml_path: translation/nt/mark/004/022.yaml
  text: For nothing is hidden except to be revealed[b][a], nor has anything become concealed except to come to light.
  footnotes:
  - marker: a
    text: Or 'For nothing is hidden except that it may be revealed … except that it may come to light.' The Greek ἵνα clauses can be heard with either purpose or result nuance.
    reason: alternative_reading
