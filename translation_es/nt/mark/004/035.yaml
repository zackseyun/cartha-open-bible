lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del narrador de Marcos con «dice», que suena natural en español y refleja el valor aspectual/narrativo del griego.
- source_word: ἐν ἐκείνῃ τῇ ἡμέρᾳ
  english_pob_choice: on that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: BDAG
  rationale: «En aquel día» reproduce con fidelidad la referencia temporal con deíctico lejano y mantiene el matiz de la construcción temporal griega.
- source_word: ὀψίας γενομένης
  english_pob_choice: when evening had come
  chosen_spanish: al caer la tarde
  alternatives_spanish:
  - cuando llegó la tarde
  - cuando fue la tarde
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte con una frase temporal natural en español que conserva el sentido de comienzo de la tarde/noche sin forzar un calco.
- source_word: Διέλθωμεν
  english_pob_choice: Let us go across
  chosen_spanish: Pasemos
  alternatives_spanish:
  - Crucemos
  - Pasemos al otro lado
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se expresa de forma natural con «Pasemos», que en contexto de navegación comunica la acción de cruzar sin perder el tono hortativo.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - a la otra orilla
  - al lado de allá
  lexicon: BDAG
  rationale: «Al otro lado» es la equivalencia contextual más clara en español para πέραν en un relato de cruce lacustre; preserva la ambigüedad útil entre lado/opuesta orilla sin añadir especificación no presente en el griego.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador de nota [a] ahora aparece explícitamente en el texto principal junto a «dice», de modo que la alternativa queda anclada en el versículo.'
  spanish_consistency_notes:
  - Se mantuvo el presente histórico («dice») para reflejar el estilo narrativo de Marcos.
  - Se evitó «SEÑOR» u այլ sustituciones porque el versículo no contiene el nombre divino ni títulos cristológicos.
  - «Al otro lado» conserva la referencia contextual a la otra orilla/siguiente margen sin sobredeterminar el término πέραν.
