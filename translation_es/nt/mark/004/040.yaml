translation:
  language: es
  text: 'Y les dijo: «¿Por qué están tan temerosos[a]? ¿Aún no tienen fe[b][c]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa más literal: «cobardes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Todavía no tienen fe?».'
