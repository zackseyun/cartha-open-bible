lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza con la escena anterior; en español, 'Y' reproduce la coordinación breve y natural sin añadir matices.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les respondió
  lexicon: BDAG
  rationale: El verbo introductorio de discurso directo en narrativa se expresa con 'les dijo'; el dativo αὐτοῖς queda bien reflejado con clítico de objeto indirecto.
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  - ¿Cómo es que
  lexicon: BDAG
  rationale: En esta construcción interrogativa de reprensión, el valor idiomático es causal/interpelativo; '¿Por qué' comunica mejor el sentido que un literal '¿Qué'.
- source_word: δειλοί
  english_pob_choice: fearful
  chosen_spanish: temerosos
  alternatives_spanish:
  - cobardes
  - miedosos
  - aterrorizados
  lexicon: BDAG
  rationale: δειλός puede implicar 'cobarde' y también 'temeroso'. En este contexto la reprensión apunta al miedo de los discípulos en la tormenta; 'temerosos' conserva la fuerza negativa sin convertirlo en un juicio de carácter más duro que el contexto inmediato exige.
- source_word: ἐστε
  english_pob_choice: are
  chosen_spanish: están
  alternatives_spanish:
  - son
  - están siendo
  lexicon: BDAG
  rationale: El presente de εἰμί se adapta naturalmente a la pregunta adjetival en español con 'están'.
- source_word: οὔπω
  english_pob_choice: still
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  - todavía
  lexicon: BDAG
  rationale: '''οὔπω'' significa ''no todavía''; en español, ''todavía no'' expresa con claridad la temporalidad incompleta y la fuerza retórica de la pregunta.'
- source_word: ἔχετε
  english_pob_choice: have
  chosen_spanish: tienen
  alternatives_spanish:
  - tienen todavía
  - poseen
  lexicon: BDAG
  rationale: El verbo de posesión/estado se traduce con 'tener'; en segunda persona plural de trato reverente implícito aquí, 'tienen' funciona con el sujeto omitido 'ustedes' en el discurso directo.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: BDAG
  rationale: Por defecto POB usa 'fe' para πίστις en contextos de confianza religiosa. 'Confianza' es una alternativa contextual válida, pero 'fe' mantiene consistencia terminológica y fidelidad al término lexical del griego.
theological_decisions:
- issue: Valor de πίστις entre 'fe' y 'confianza'
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  rationale: La frase interpela la respuesta de los discípulos a Jesús en medio del peligro; semánticamente hay un matiz de confianza en él, pero la tradición de traducción del proyecto reserva 'fe' como equivalente principal de πίστις y solo despliega 'confianza' como matiz secundario.
  doctrine_reference: 'DOCTRINE.md: πίστις → fe (alternativas: confianza, fidelidad)'
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando todos los marcadores de nota exactamente en el texto español y evitando notas no ancladas. Se mantuvo la lectura auditada del griego con una formulación natural en español.
  spanish_consistency_notes:
  - Se conserva el tono de reprensión directa sin suavizarlo excesivamente.
  - Se evita 'SEÑOR' u otras sustituciones no presentes; el versículo no contiene el nombre divino.
  - '''Fe'' se mantiene como término principal para πίστις, con ''confianza'' solo como alternativa anotada.'
  - La puntuación y el orden del discurso siguen el valor narrativo del griego y la pauta de lectura en español.
