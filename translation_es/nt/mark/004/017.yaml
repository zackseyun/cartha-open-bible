revisions:
- from: y no tienen raíz en sí mismos[a], sino que son temporales; luego, cuando sobreviene la aflicción o la persecución por causa de la palabra, inmediatamente se escandalizan.
  to: y no tienen raíz en sí mismos, sino que son temporales; entonces, cuando sobreviene la aflicción o la persecución por causa de la palabra, inmediatamente se apartan[a].
  rationale: 'Se revisa principalmente σκανδαλίζονται para reflejar el sentido contextual documentado por el POB inglés: bajo presión, estas personas no solo se ofenden sino que abandonan su respuesta inicial a la palabra. ''Se apartan'' comunica mejor ese resultado en español claro y eclesial. Se mantiene una nota con alternativas más literales para preservar la amplitud semántica del verbo. También se ajusta ''luego'' a ''entonces'' por fluidez natural.'
