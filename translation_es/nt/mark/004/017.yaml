review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego y el rastro de auditoría inglés: conserva la metáfora de ''raíz'', el reflexivo ''en sí mismos'', el valor temporal de πρόσκαιροί, la cláusula temporal de γενομένης θλίψεως ἢ διωγμοῦ, y la consistencia de ''la palabra''. Sin embargo, el punto clave σκανδαλίζονται no refleja la decisión contextual del POB inglés (''fall away'') ni el sentido predominante aquí de colapso/apostasía bajo presión. ''Se escandalizan'' en español moderno suele leerse como ''se ofenden/indignan'', demasiado débil y potencialmente engañoso en este contexto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'son temporales' suena algo rígido para personas; 'son de corta duración' sería posible, aunque 'temporales' sigue siendo aceptable. El problema principal de legibilidad/precisión es 'se escandalizan', que en español eclesial y general no comunica naturalmente 'caen' o 'se apartan' del camino. La nota también necesita limpieza tipográfica y mejor alineación con el texto principal.
  glossary_alignment: 'No hay conflictos con las pautas globales principales (Yahvé, Mesías, etc.). La cuestión relevante es la política contextual para σκανδαλίζονται: el inglés documentó ''fall away'' como lectura principal con alternativas en nota. En español conviene reflejar eso con ''se apartan'' o ''caen'', no con ''se escandalizan'' como texto principal. ''La palabra'' debe mantenerse, y se mantiene.'
  issues:
  - severity: high
    issue: σκανδαλίζονται está traducido como 'se escandalizan' en el texto principal.
    rationale: En Marcos 4:17 el contexto no describe solo ofensa emocional sino abandono bajo aflicción o persecución. El POB inglés escogió 'fall away' precisamente para preservar esa fuerza contextual. En español moderno, 'se escandalizan' suele significar 'se ofenden/indignan', por lo que no comunica fielmente el desenlace del verso.
  - severity: medium
    issue: La nota al pie no está bien formulada ni bien enfocada respecto del texto principal revisado.
    rationale: Si el texto principal usa 'se apartan', la nota debe ofrecer las alternativas literales relevantes ('tropiezan', 'son hechos tropezar') y explicar que el verbo también puede implicar tomar ofensa. La redacción actual incluye comillas y puntuación torpes y coloca 'se apartan' como alternativa a un texto principal distinto.
  - severity: low
    issue: '''Luego'' puede sonar un poco débil como conector discursivo aquí.'
    rationale: No es incorrecto, pero 'entonces' fluye un poco mejor en esta secuencia narrativa. Aun así, no es un error mayor.
  revised_spanish_text: y no tienen raíz en sí mismos, sino que son temporales; entonces, cuando sobreviene la aflicción o la persecución por causa de la palabra, inmediatamente se apartan[a].
