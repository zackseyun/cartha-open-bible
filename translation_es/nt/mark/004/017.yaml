translation:
  language: es
  text: y no tienen raíz en sí mismos, sino que son temporales; entonces, cuando sobreviene la aflicción o la persecución por causa de la palabra, inmediatamente se apartan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''tropiezan'' o ''son hechos tropezar''. El verbo griego también puede implicar tomar ofensa o quedar atrapados en un tropiezo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ῥίζαν
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - raíz profunda
  - raíz firme
  lexicon: BDAG
  rationale: Conserva la metáfora agrícola del pasaje sin añadir intensidad interpretativa no presente en el griego.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: in themselves
  chosen_spanish: en sí mismos
  alternatives_spanish:
  - dentro de sí mismos
  lexicon: BDAG
  rationale: Mantiene el sentido reflexivo de forma natural en español y evita una expansión explicativa innecesaria.
- source_word: πρόσκαιροί
  english_pob_choice: temporary
  chosen_spanish: temporales
  alternatives_spanish:
  - de corta duración
  - pasajeros
  lexicon: BDAG
  rationale: Expresa con claridad que duran solo por un tiempo, sin introducir una matiz psicológico que el término no exige.
- source_word: εἶτα
  english_pob_choice: then
  chosen_spanish: luego
  alternatives_spanish:
  - después
  - entonces
  lexicon: BDAG
  rationale: Marca la secuencia narrativa de modo natural en español.
- source_word: γενομένης θλίψεως ἢ διωγμοῦ
  english_pob_choice: when affliction or persecution arises
  chosen_spanish: cuando sobreviene la aflicción o la persecución
  alternatives_spanish:
  - cuando viene la aflicción o la persecución
  - cuando surge la tribulación o la persecución
  lexicon: BDAG
  rationale: La construcción temporal se expresa bien con 'cuando sobreviene'; 'aflicción' conserva la presión o angustia de θλῖψις, y 'persecución' mantiene el sentido específico de διωγμός.
- source_word: διὰ τὸν λόγον
  english_pob_choice: because of the word
  chosen_spanish: por causa de la palabra
  alternatives_spanish:
  - a causa de la palabra
  - debido a la palabra
  lexicon: BDAG
  rationale: En español, 'por causa de' comunica con naturalidad la relación causal y preserva el sustantivo 'palabra' del contexto del pasaje.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: Refleja la urgencia característica de Marcos y es un equivalente claro y estándar.
- source_word: σκανδαλίζονται
  english_pob_choice: fall away
  chosen_spanish: se escandalizan
  alternatives_spanish:
  - tropezan
  - son hechos tropezar
  - se apartan
  lexicon: BDAG
  rationale: 'En español, ''escandalizarse'' conserva la familia semántica de σκανδαλίζω: tropezar, tomar ofensa o ser desviado. Aquí se deja la tensión lexical abierta, en lugar de resolverla de forma interpretativa con ''se apartan''.'
theological_decisions:
- issue: Alcance de σκανδαλίζονται en un contexto de respuesta al mensaje
  english_pob_reading: fall away
  chosen_spanish_reading: se escandalizan
  alternative_spanish_readings:
  - se apartan
  - tropezan
  - son hechos tropezar
  rationale: La escena describe reacción bajo aflicción/persecución más que una afirmación explícita sobre apostasía final. 'Se escandalizan' mantiene la ambigüedad teológica y la fuerza del verbo, sin suavizar ni resolver el matiz por adelantado.
  doctrine_reference: Preservar la tensión lexical y teológica del texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota al marcador [a] en el texto español. La redacción principal se ajustó para que el pie de nota corresponda exactamente al verbo final elegido.
  spanish_consistency_notes:
  - '''Yahvé'' no aparece en este versículo.'
  - Se mantuvo 'palabra' para λόγος conforme al contexto inmediato de la parábola.
  - 'La secuencia verbal respeta el flujo narrativo: temporalidad, causa y reacción inmediata.'
