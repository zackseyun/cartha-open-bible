  - marker: a
    text: 'O: ''tropiezan'' o ''son hechos tropezar''. El verbo griego también puede implicar tomar ofensa o quedar atrapados en un tropiezo.'
    reason: lexical_alternative
  revision_rationale: 'Se revisa principalmente σκανδαλίζονται para reflejar el sentido contextual documentado por el POB inglés: bajo presión, estas personas no solo se ofenden sino que abandonan su respuesta inicial a la palabra. ''Se apartan'' comunica mejor ese resultado en español claro y eclesial. Se mantiene una nota con alternativas más literales para preservar la amplitud semántica del verbo. También se ajusta ''luego'' a ''entonces'' por fluidez natural.'
