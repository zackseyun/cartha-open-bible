translation:
  language: es
  text: y las preocupaciones de esta era[a], y el engaño de las riquezas[b], y los deseos de otras cosas que entran ahogan la palabra, y se vuelve infructuosa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mundo». El griego αἰών puede significar «era» o, por extensión, el orden presente del mundo; aquí se prefiere «esta era» para conservar el matiz temporal del término fuente.
    reason: lexical_alternative
  - marker: b
    text: O «el engaño de la riqueza». La expresión griega destaca el carácter engañoso de las riquezas.
    reason: lexical_alternative
  - marker: c
    text: O «la palabra se vuelve infructuosa» o «el oyente se vuelve infructuoso». El griego dice más directamente «se vuelve infructuosa», con «la palabra» como antecedente más cercano.
    reason: alternative_reading
lexical_decisions:
- source_word: μέριμναι
  english_pob_choice: cares
  chosen_spanish: preocupaciones
  alternatives_spanish:
  - afanes
  - cuidados
  - ansiedades
  lexicon: BDAG
  rationale: μέριμναι expresa cargas mentales y prácticas que distraen y absorben; en español, «preocupaciones» comunica bien esa presión sin sonar excesivamente técnico. «Afanes» sería posible pero más literario; «ansiedades» estrecha demasiado el sentido hacia lo psicológico.
- source_word: αἰῶνος
  english_pob_choice: age
  chosen_spanish: esta era
  alternatives_spanish:
  - este siglo
  - el mundo
  - esta época
  lexicon: BDAG
  rationale: La POB inglesa prefirió «age» para conservar el matiz temporal y de orden presente. «Esta era» mantiene ese valor y evita la sustitución por «mundo», que sería más interpretativa. «Este siglo» suena más restringido históricamente en español.
- source_word: ἀπάτη
  english_pob_choice: deceitfulness
  chosen_spanish: engaño
  alternatives_spanish:
  - decepción
  - falacia
  - engañosidad
  lexicon: BDAG
  rationale: ἀπάτη destaca la cualidad engañosa de las riquezas. En español, «engaño» es natural y fiel, aunque algo menos abstracto que «engañosidad»; preserva bien la idea de que las riquezas seducen y extravían.
- source_word: πλούτου
  english_pob_choice: riches
  chosen_spanish: las riquezas
  alternatives_spanish:
  - la riqueza
  - la fortuna
  - los bienes
  lexicon: BDAG
  rationale: El plural «las riquezas» corresponde bien al genitivo singular colectivo y mantiene la referencia amplia a abundancia material, no solo a dinero. «La riqueza» suena más abstracta y menos acorde con el tono proverbial.
- source_word: αἱ περὶ τὰ λοιπὰ ἐπιθυμίαι
  english_pob_choice: desires for other things
  chosen_spanish: los deseos de otras cosas
  alternatives_spanish:
  - los deseos por otras cosas
  - los deseos de lo demás
  - las demás apetencias
  lexicon: BDAG
  rationale: La POB inglesa preserva el alcance amplio de λοιπά. En español, «los deseos de otras cosas» es claro y conserva el carácter general del sintagma. «Por otras cosas» sonaría menos idiomático; «lo demás» puede resultar más vago de lo que el griego permite.
- source_word: εἰσπορευόμεναι
  english_pob_choice: entering in
  chosen_spanish: entrando
  alternatives_spanish:
  - que entran
  - al entrar
  - introduciéndose
  lexicon: BDAG
  rationale: El participio expresa la acción de irrumpir o penetrar en la persona/suelo. «Entrando» conserva el proceso verbal sin forzar una reestructuración mayor. «Que entran» sería más explicativo; «introduciéndose» suena más artificial.
- source_word: συμπνίγουσιν
  english_pob_choice: choke
  chosen_spanish: ahogan
  alternatives_spanish:
  - sofocan
  - estrangulan
  - aplastan
  lexicon: BDAG
  rationale: συμπνίγω comunica la imagen de asfixiar o sofocar. «Ahogan» mantiene la fuerza imagética en español y es natural en el contexto parabólico. «Sofocan» también serviría, pero «ahogan» conserva mejor la violencia de la metáfora.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  lexicon: BDAG
  rationale: En el marco de la parábola, λόγος remite a la palabra proclamada. «La palabra» preserva el eco bíblico y evita añadir «de Dios», que no está explícito aquí. «El mensaje» sería válido pero menos tradicional para este contexto.
- source_word: ἄκαρπος γίνεται
  english_pob_choice: it becomes unfruitful
  chosen_spanish: se vuelve infructuosa
  alternatives_spanish:
  - se hace infructuosa
  - queda sin fruto
  - se vuelve estéril
  lexicon: BDAG
  rationale: El adjetivo ἄκαρπος describe un estado resultante. «Se vuelve infructuosa» sigue de cerca la estructura del griego y permite que el referente implícito permanezca abierto, como en la POB inglesa. «Sin fruto» o «estéril» podrían ser más idiomáticos, pero cambian el registro o el matiz.
theological_decisions:
- issue: Referente implícito del final de la frase
  english_pob_reading: The nearest antecedent is 'the word,' so the main text says 'it becomes unfruitful.'
  chosen_spanish_reading: El texto principal dice «se vuelve infructuosa», dejando que el referente implícito siga siendo la palabra, como en el griego.
  alternative_spanish_readings:
  - la palabra se vuelve infructuosa
  - el oyente se vuelve infructuoso
  - la semilla queda sin fruto
  rationale: El griego termina con un predicado singular sin repetir el sustantivo. Mantener la forma impersonal o pronominal conserva la tensión textual y evita resolver en exceso el referente. La lectura más cercana sigue siendo «la palabra», pero no conviene imponerla dentro del texto principal si el griego no la repite.
  doctrine_reference: Preservar la tensión gramatical y metafórica sin resolver más allá de lo que el texto fuente exige.
translation_notes:
  revision_awareness: La redacción inglesa auditada pasó por una corrección para hacer explícito que el participio «entering in» modifica a todos los elementos de la lista. La versión española conserva esa relación con una estructura participial («entrando») que puede leerse unida a la serie completa, sin introducir verbos no presentes en el griego. También se tuvo en cuenta la preferencia revisada de mantener «the» antes de «desires»; en español esto queda reflejado naturalmente con «los deseos de otras cosas».
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiriera; aquí no aplica.
  - Se mantuvo «la palabra» en vez de «el mensaje» para conservar el eco marcano y la terminología POB.
  - «Esta era» traduce αἰών de forma temporal, coherente con la preferencia POB por «age».
  - Se evitó «SEÑOR» o «Cristo» porque el versículo no contiene esos términos.
  - El final se dejó como «se vuelve infructuosa» para no fijar de manera innecesaria si el sujeto implícito es la palabra, el oyente o la semilla.
