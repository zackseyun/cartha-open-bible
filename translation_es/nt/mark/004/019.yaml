  language: en
  yaml_path: translation/nt/mark/004/019.yaml
  text: and the cares of the age[a], and the deceitfulness of riches, and the desires for other things entering in choke the word[d][c][b], and it becomes unfruitful.
  footnotes:
  - marker: a
    text: Or 'the cares of the world.' The Greek word can mean 'age' or, by extension, the present world-order; 'age' is preferred here to preserve the source term's temporal nuance.
    reason: lexical_alternative
  - marker: b
    text: Or 'the deceit of wealth.'
    reason: lexical_alternative
  - marker: c
    text: Or 'the word becomes barren' or 'the hearer becomes unfruitful.' The Greek most directly says 'it becomes unfruitful,' with 'the word' as the nearest antecedent.
    reason: alternative_reading
  - marker: d
    text: Or 'and desires for other things entering in, choke the word'.
    reason: previous_rendering
