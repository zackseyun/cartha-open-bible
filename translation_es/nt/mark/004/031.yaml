translation:
  language: es
  text: Es como un grano de mostaza[a], que, cuando se siembra en la tierra, siendo más pequeño que todas las semillas que hay en la tierra[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una semilla de mostaza».
    reason: lexical_alternative
  - marker: b
    text: El griego usa el comparativo «más pequeño», no el superlativo «el más pequeño».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: It is like
  chosen_spanish: Es como
  alternatives_spanish:
  - Como
  lexicon: BDAG
  rationale: La frase introduce la comparación parabólica. En español, «Es como» conserva la función comparativa de ὡς y suena natural en este contexto, sin añadir contenido ajeno.
- source_word: κόκκῳ σινάπεως
  english_pob_choice: a mustard seed
  chosen_spanish: un grano de mostaza
  alternatives_spanish:
  - una semilla de mostaza
  - un grano de mostaza
  lexicon: BDAG
  rationale: κόκκος puede significar «grano» o «semilla». Se eligió «grano de mostaza» porque refleja bien el valor léxico y mantiene una expresión idiomática clara en español. «Semilla de mostaza» también sería posible, pero «grano» preserva mejor la amplitud de κόκκος y el eco del texto base.
- source_word: ὃς
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - la cual
  lexicon: BDAG
  rationale: El antecedente es una realidad vegetal; en español, «que» resulta la forma más natural y neutra para continuar la comparación sin cargar el giro con innecesaria solemnidad.
- source_word: ὅταν σπαρῇ
  english_pob_choice: when it is sown
  chosen_spanish: cuando se siembra
  alternatives_spanish:
  - cuando es sembrado
  - cuando haya sido sembrado
  lexicon: BDAG
  rationale: ὅταν con subjuntivo aoristo expresa un tiempo indefinido o general. «Cuando se siembra» comunica bien ese valor habitual/generativo en español y evita una pasiva forzada.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the ground
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre el suelo
  - en el suelo
  lexicon: BDAG
  rationale: Aquí γῆ se refiere al terreno agrícola, no a «la tierra» como planeta. «En la tierra» es la manera más natural y bíblica en español para el acto de sembrar, aunque «en el suelo» podría explicitar la imagen física.
- source_word: μικρότερον ὂν
  english_pob_choice: being smaller
  chosen_spanish: siendo menor
  alternatives_spanish:
  - siendo más pequeño
  - siendo menor de tamaño
  lexicon: BDAG
  rationale: Se conserva el participio con «siendo» para reflejar la construcción griega. «Menor» traduce el comparativo μικρότερον con precisión y evita convertirlo en superlativo.
- source_word: πάντων τῶν σπερμάτων
  english_pob_choice: than all the seeds
  chosen_spanish: que todas las semillas
  alternatives_spanish:
  - que todas las semillas
  - más pequeña que todas las semillas
  lexicon: BDAG
  rationale: El griego establece una comparación de tamaño con valor comparativo, no superlativo. En español, el giro comparativo queda más claro con «que todas las semillas»; el contexto de la frase previa permite entender la comparación implícita. También se conserva «semillas» para mantener el paralelo con el campo agrícola.
- source_word: τῶν ἐπὶ τῆς γῆς
  english_pob_choice: on the ground
  chosen_spanish: de la tierra
  alternatives_spanish:
  - de la tierra
  - que hay en la tierra
  lexicon: BDAG
  rationale: La repetición delimita las semillas comparadas a las que están en la misma esfera agrícola. «De la tierra» reproduce de modo breve y natural la referencia del genitivo con ἐπί + genitivo, sin sobreexplicar.
theological_decisions:
- issue: Comparativo μικρότερον frente a una lectura superlativa tradicional
  english_pob_reading: Greek has the comparative 'smaller,' not the superlative 'smallest.'
  chosen_spanish_reading: «menor» / «siendo menor», no «la más pequeña»
  alternative_spanish_readings:
  - la más pequeña de todas las semillas
  - la menor de todas las semillas
  rationale: El texto griego usa un comparativo, y el audit trail inglés insiste en no convertirlo en superlativo. Por eso la redacción española mantiene la forma comparativa para no borrar esa tensión lexical y para respetar la precisión del original.
  doctrine_reference: Principios de traducción §1, §5
- issue: Valor referencial de γῆ en contexto agrícola
  english_pob_reading: '''ground'' rather than ''earth'' as the world'
  chosen_spanish_reading: «tierra» como terreno de siembra
  alternative_spanish_readings:
  - suelo
  - tierra
  - terreno
  rationale: La imagen es agraria. Traducir γῆ como «tierra» comunica el espacio donde se siembra sin introducir el sentido cosmológico de «tierra» como mundo. Se mantiene la ambigüedad natural del español pero se orienta por el contexto.
  doctrine_reference: Principios de traducción §2
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del audit trail inglés, especialmente el ajuste de un predicado finito a un participio («being smaller»). En español se reflejó esa misma decisión con «siendo menor», manteniendo la construcción participial y la comparación no superlativa. También se respetó la repetición de la referencia a la tierra/ground, que el audit trail conserva por fidelidad al griego.
  spanish_consistency_notes:
  - Se mantiene «grano de mostaza» como equivalente idiomático del inglés POB, con la alternativa «semilla de mostaza» indicada en nota.
  - Se conserva la comparación como comparativo («menor») y no como superlativo, en coherencia con la observación gramatical del audit trail.
  - «Tierra» se usa en sentido agrícola; no se sustituye por una formulación más abstracta o cosmológica.
  - La cláusula participial se vierte con «siendo» para reflejar la forma griega y la revisión inglesa más reciente.
