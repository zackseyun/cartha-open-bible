review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: comparación parabólica, siembra en contexto agrícola y mantenimiento del comparativo «menor». También conserva la nota clave sobre comparativo vs. superlativo. Sin embargo, «de la tierra» en la segunda mención suena menos fiel al valor local repetido de τῶν ἐπὶ τῆς γῆς y puede leerse como origen/clase más que ubicación. Además, la combinación «siendo menor que todas las semillas» es comprensible, pero en español resulta más natural con «más pequeño que todas las semillas» o con una leve reestructuración.'
  spanish_quality_summary: El texto es legible y digno, pero tiene dos puntos mejorables de naturalidad. «Grano de mostaza» es posible y está respaldado por el audit trail, aunque «semilla de mostaza» sería más idiomático para muchos lectores; no es un error. El problema mayor de estilo es «todas las semillas de la tierra», que suena poco natural en español bíblico actual para esta imagen agrícola. «Todas las semillas que hay en la tierra» o «sobre la tierra» aclara el alcance sin paraphrase excesiva.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. No aparecen Yahvé/Mesías/Cristo ni otros términos sensibles del glosario. La decisión de mantener el comparativo está alineada con el rationale documentado.
  issues:
  - severity: medium
    issue: La segunda frase «de la tierra» no reproduce bien la repetición local de τῶν ἐπὶ τῆς γῆς.
    rationale: En griego se repite la idea locativa «sobre/en la tierra». En español, «las semillas de la tierra» puede entenderse como semillas terrenales o propias de la tierra, no necesariamente las sembradas en el suelo. Conviene explicitar la ubicación.
  - severity: low
    issue: «Siendo menor» es fiel, pero algo rígido en español en esta construcción.
    rationale: La revisión inglesa escogió «being smaller» para reflejar el participio. En español, puede conservarse el participio con mejor fluidez mediante «siendo más pequeña» o una frase equivalente, manteniendo el comparativo y sin volverlo superlativo.
  revised_spanish_text: Es como un grano de mostaza[a], que, cuando se siembra en la tierra, siendo más pequeño que todas las semillas que hay en la tierra[b]—
  revised_footnotes:
  - marker: a
    text: O «una semilla de mostaza».
    reason: lexical_alternative
  - marker: b
    text: El griego usa el comparativo «más pequeño», no el superlativo «el más pequeño».
    reason: lexical_alternative
