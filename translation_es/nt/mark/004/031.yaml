revisions:
- from: Es como un grano de mostaza[a], que, cuando se siembra en la tierra, siendo menor que todas las semillas de la tierra[b]—
  to: Es como un grano de mostaza[a], que, cuando se siembra en la tierra, siendo más pequeño que todas las semillas que hay en la tierra[b]—
  rationale: Se conserva «grano de mostaza» por fidelidad a κόκκος y al audit trail, junto con la alternativa en nota. Se ajusta «menor» a «más pequeño» para una comparación más natural en español, manteniendo el comparativo explícito. Se reemplaza «de la tierra» por «que hay en la tierra» para representar mejor la repetición locativa de τῶν ἐπὶ τῆς γῆς y evitar ambigüedad semántica.
