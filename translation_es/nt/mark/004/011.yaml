revisions:
- from: 'Y les decía: «A ustedes se les ha dado el misterio del reino de Dios, pero a los de afuera todo está en parábolas[a]»'
  to: 'Y les decía: «A ustedes se les ha dado el misterio del reino de Dios, pero a los de afuera todo les llega en parábolas[a]»'
  rationale: Se ajusta únicamente la expresión de γίνεται para mejorar la naturalidad del español sin perder el sentido del griego ni el contraste preservado en el inglés POB. «Todo les llega en parábolas» mantiene la orientación hacia «los de afuera» y suena más claro que «todo está en parábolas».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:30:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: imperfecto narrativo («les decía»), perfecto pasivo («se les ha dado»), μυστήριον como «misterio», y el contraste entre «ustedes» y «los de afuera». También conserva adecuadamente «reino de Dios» y la cautela teológica sobre «los de afuera». Sin embargo, «todo está en parábolas» suena poco idiomático en español y no expresa tan bien γίνεται como una formulación más natural como «todo les llega en parábolas» o «todo sucede en parábolas». Dado que el inglés auditado conserva una nota alternativa con «happens in parables», conviene ajustar el texto principal a una formulación española más clara.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «todo está en parábolas» resulta rígido y poco natural en español eclesial general. «A los de afuera» es comprensible, aunque «a los de fuera» sería algo más sobrio; no obstante, no es necesario cambiarlo. El resto del versículo es fluido y fiel.
  glossary_alignment: 'Se alinea con la terminología del proyecto: «Dios», «misterio», «reino». No hay conflicto con los términos teológicos por defecto. La decisión sobre «los de afuera» respeta la instrucción de no sobredefinir τοῖς ἔξω.'
  issues:
  - severity: medium
    issue: «todo está en parábolas» es poco idiomático en español
    rationale: Aunque intenta seguir de cerca la revisión inglesa «everything is in parables», en español esa construcción suena extraña y puede confundir. Una opción como «todo les llega en parábolas» preserva mejor el contraste dativo y la fuerza de γίνεται sin volverla demasiado interpretativa.
  - severity: low
    issue: La nota al pie ya preserva una alternativa válida, pero el texto principal queda menos natural que la propia alternativa
    rationale: Si la nota ofrece «todo sucede en parábolas», el lector percibe que la alternativa suena mejor que el texto base. Conviene que el texto principal sea la opción más natural y dejar otra posibilidad en nota.
  revised_spanish_text: 'Y les decía: «A ustedes se les ha dado el misterio del reino de Dios, pero a los de afuera todo les llega en parábolas[a]»'
  revised_footnotes:
  - marker: a
    text: O «pero a los de afuera todo sucede en parábolas».
    reason: alternative_reading
  revision_rationale: Se ajusta únicamente la expresión de γίνεται para mejorar la naturalidad del español sin perder el sentido del griego ni el contraste preservado en el inglés POB. «Todo les llega en parábolas» mantiene la orientación hacia «los de afuera» y suena más claro que «todo está en parábolas».
