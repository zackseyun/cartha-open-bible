translation:
  language: es
  text: 'Y les decía: «A ustedes se les ha dado el misterio del reino de Dios, pero a los de afuera todo les llega en parábolas[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pero a los de afuera todo sucede en parábolas».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les hablaba
  lexicon: BDAG
  rationale: El imperfecto griego expresa habla շարունակada o reiterada; en español, «les decía» comunica bien esa continuidad sin sonar forzado.
- source_word: Ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural con «a ustedes» en español latinoamericano neutral.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  - verdad oculta
  lexicon: BDAG
  rationale: «Misterio» preserva la carga bíblico-teológica de algo antes oculto y ahora revelado; «secreto» puede sonar trivial o meramente privado.
- source_word: δέδοται
  english_pob_choice: has been given
  chosen_spanish: se les ha dado
  alternatives_spanish:
  - les ha sido dado
  - les fue dado
  lexicon: BDAG
  rationale: El perfecto pasivo pide una forma que refleje acción completada con efecto presente; «se les ha dado» mantiene pasividad y resultado actual.
- source_word: βασιλείας
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - gobierno
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia directa y más estable en español; conserva la fórmula bíblica sin desplazar el sentido a una explicación interpretativa.
- source_word: ἐκείνοις δὲ τοῖς ἔξω
  english_pob_choice: but to those outside
  chosen_spanish: pero a los de afuera
  alternatives_spanish:
  - pero a los de fuera
  - pero a los de afuera, es decir, los de fuera
  lexicon: BDAG
  rationale: La expresión mantiene la oposición espacial-metafórica del griego sin definir más de lo que el texto dice sobre la identidad de los «de afuera».
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - por parábolas
  - mediante parábolas
  lexicon: BDAG
  rationale: «En parábolas» reproduce de modo directo la construcción ἐν + dativo y coincide con el uso evangélico normal en español.
- source_word: τὰ πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: «Todo» es la forma más natural y abarcadora en español para expresar la fuerza totalizante de τὰ πάντα.
- source_word: γίνεται
  english_pob_choice: is in parables
  chosen_spanish: está en parábolas
  alternatives_spanish:
  - se presenta en parábolas
  - les llega en parábolas
  lexicon: BDAG
  rationale: La revisión inglesa optó por «is in parables» para reflejar más de cerca γίνεται; en español, «está en parábolas» conserva esa presentación sin forzar un verbo de movimiento o acontecimiento.
theological_decisions:
- issue: Sentido de μυστήριον en relación con el reino
  english_pob_reading: Retain 'mystery' rather than interpretively expanding it to 'secret plan' or similar.
  chosen_spanish_reading: Conservar «misterio» sin ampliarlo a «plan secreto» u otra explicación interpretativa.
  alternative_spanish_readings:
  - secreto del reino de Dios
  - plan secreto del reino de Dios
  rationale: 'El término tiene peso teológico propio: algo oculto y ahora revelado. Mantener «misterio» preserva esa tensión sin resolverla prematuramente.'
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it.
- issue: Identidad de τοῖς ἔξω
  english_pob_reading: Render as 'those outside' rather than a more defined theological category.
  chosen_spanish_reading: Traducir «a los de afuera» sin precisar más su condición espiritual.
  alternative_spanish_readings:
  - a los outsiders
  - a los que no están entre los discípulos
  rationale: El griego marca contraste con los discípulos, pero no define aquí de manera exhaustiva el estado espiritual del grupo; la traducción no debe estrecharlo indebidamente.
  doctrine_reference: Affirmations; Translation philosophy §1 and §3.
translation_notes:
  revision_awareness: Se incorporó la revisión del POB inglés que prefirió «is in parables» frente a «comes in parables» para reflejar más de cerca γίνεται; por eso la línea española usa «está en parábolas» y no un verbo de acontecimiento. La nota alternativa se ancla correctamente en el texto con [a].
  spanish_consistency_notes:
  - Se mantuvo «reino de Dios» como fórmula estable y bíblicamente transparente.
  - Se evitó «Cristo» porque el pasaje no lo contiene ni lo requiere.
  - La oposición «a ustedes / a los de afuera» conserva la distinción relacional sin sobreinterpretar categorías eclesiales.
  - La puntuación con comillas angulares y dos puntos sigue el uso editorial español moderno y la división discursiva del griego.
