translation:
  language: es
  text: 'La tierra da fruto por sí misma: primero el tallo[a], luego la espiga, luego el grano bien formado en la espiga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la hoja», «el brote» o «la hierba». El griego se refiere a la primera etapa visible del crecimiento del cereal.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτομάτη
  english_pob_choice: by itself
  chosen_spanish: por sí misma
  alternatives_spanish:
  - automáticamente
  - por sí sola
  - de sí misma
  lexicon: BDAG
  rationale: El adjetivo expresa producción sin agencia humana visible. «Por sí misma» conserva esa idea de espontaneidad natural en un español claro y digno, sin introducir la connotación mecánica de «automáticamente».
- source_word: γῆ
  english_pob_choice: soil
  chosen_spanish: la tierra
  alternatives_spanish:
  - el suelo
  - la tierra cultivada
  - el terreno
  lexicon: BDAG
  rationale: En esta parábola agrícola, γῆ puede referirse al suelo o la tierra de cultivo. «La tierra» es natural en español y suficientemente precisa en el contexto, manteniendo el alcance agrícola sin sonar técnico.
- source_word: καρποφορεῖ
  english_pob_choice: bears fruit
  chosen_spanish: da fruto
  alternatives_spanish:
  - produce fruto
  - rinde fruto
  - da cosecha
  lexicon: BDAG
  rationale: El verbo expresa producir fruto o rendimiento. «Da fruto» es idiomático y conserva la imagen agrícola sin forzar una traducción más literal que suene pesada.
- source_word: χόρτον
  english_pob_choice: the stalk
  chosen_spanish: la hierba
  alternatives_spanish:
  - el tallo
  - el brote
  - la hoja
  lexicon: BDAG
  rationale: El término admite un abanico de equivalentes según el cultivo. Dado el registro del texto fuente y el interés por conservar la tensión lexical documentada por la alternativa inglesa, «la hierba» preserva la ambigüedad de la primera etapa visible del crecimiento, sin resolverla de manera más específica de lo que el griego exige.
- source_word: στάχυν
  english_pob_choice: the head
  chosen_spanish: la espiga
  alternatives_spanish:
  - la cabeza
  - la cabeza de grano
  - la panoja
  lexicon: BDAG
  rationale: στάχυς designa la espiga o cabeza de grano. «Espiga» es el término agrícola natural en español y comunica bien la etapa intermedia del crecimiento.
- source_word: πλήρης σῖτον
  english_pob_choice: the full grain
  chosen_spanish: el grano lleno
  alternatives_spanish:
  - el grano completo
  - el grano maduro
  - el grano en plenitud
  lexicon: BDAG
  rationale: La construcción describe el grano como lleno o completo. «Grano lleno» sigue de cerca la forma griega y conserva la idea de plenitud sin añadir la noción de madurez que no está explícita en el adjetivo.
- source_word: ἐν τῷ στάχυϊ
  english_pob_choice: in the head
  chosen_spanish: en la espiga
  alternatives_spanish:
  - en la cabeza
  - en la cabeza de grano
  lexicon: BDAG
  rationale: La frase localiza el grano dentro de la espiga. Para mantener consistencia terminológica con στάχυς, «en la espiga» es la solución más natural y clara en español.
translation_notes:
  revision_awareness: El texto griego presenta una secuencia de crecimiento agrícola en tres etapas. La versión inglesa POB optó por 'the stalk' para χόρτον y añadió una nota alternativa ('the blade, then the ear, then the full grain in the ear'). En español, se optó por «la hierba» para no cerrar innecesariamente la referencia de χόρτον y para mantener la tensión lexical documentada en la tradición de auditoría, mientras que στάχυς se tradujo consistentemente como «espiga».
  spanish_consistency_notes:
  - Se preserva la secuencia temporal con «primero... luego... luego...».
  - «Por sí misma» mantiene el matiz de ausencia de agencia humana visible.
  - Se usa «espiga» de manera consistente para στάχυς en ambos lugares.
  - «La tierra» conserva naturalidad bíblica y agrícola sin recurrir a una paráfrasis interpretativa.
