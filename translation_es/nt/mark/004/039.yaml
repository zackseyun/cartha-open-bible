    changes_summary: Replaced 'after waking up' with 'having awakened' for a more formal and direct rendering of the participle; changed 'Be muzzled!' to 'Be still!' for more natural English while preserving the force of πεφίμωσο in context.
translation:
  language: es
  text: 'Y, habiéndose despertado, reprendió al viento y dijo al mar[a]: «¡Calla! ¡Queda amordazado!»[b]. Y el viento cesó, y hubo una gran calma.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el mar de Galilea; el griego dice simplemente «el mar».
    reason: cultural_note
  - marker: b
    text: 'O, más tradicionalmente, «¡Paz! ¡Estate quieto!». El griego tiene dos imperativos; más literalmente: «¡Calla! ¡Sé amordazado!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεγερθεὶς
  english_pob_choice: having awakened
  chosen_spanish: habiéndose despertado
  alternatives_spanish:
  - despertándose
  - después de despertarse
  - habiendo despertado
  lexicon: BDAG
  rationale: El participio aoristo pasivo en contexto se refiere a Jesús al incorporarse del sueño después de que lo despertaran. «Habiéndose despertado» conserva la relación temporal del participio sin añadir más agencia de la necesaria, y resulta natural en español formal.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprendió severamente
  - amonestó
  - increpó
  lexicon: BDAG
  rationale: «Reprendió» conserva la fuerza de ἐπιτιμάω en Marcos y mantiene el tono autoritativo frente a fuerzas hostiles o caóticas. Es más preciso y más estable que una versión suavizada.
- source_word: ἀνέμῳ
  english_pob_choice: the wind
  chosen_spanish: el viento
  alternatives_spanish:
  - la tempestad
  - el viento de la tempestad
  lexicon: BDAG
  rationale: El objeto directo es literalmente «viento». Aunque el trasfondo es una tormenta, el texto menciona específicamente al viento; por eso se conserva la referencia directa.
- source_word: θαλάσσῃ
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el lago
  - el mar de Galilea
  lexicon: BDAG
  rationale: θάλασσα significa «mar»; mantenerlo respeta el texto griego y sugiere la resonancia narrativa más amplia. Se evita reducirlo a «lago» en el cuerpo principal.
- source_word: Σιώπα
  english_pob_choice: Be silent!
  chosen_spanish: ¡Calla!
  alternatives_spanish:
  - ¡Silencio!
  - ¡Guarda silencio!
  - ¡Cállate!
  lexicon: BDAG
  rationale: El imperativo presente pide silencio inmediato. «¡Calla!» es breve, directo y natural en español; conserva la urgencia del mandato.
- source_word: πεφίμωσο
  english_pob_choice: Be still!
  chosen_spanish: ¡Enmudece!
  alternatives_spanish:
  - ¡Sé enmudecido!
  - ¡Enmudece y calla!
  - ¡Calla!
  lexicon: BDAG
  rationale: El perfecto pasivo imperativo de φιμόω evoca literalmente el acto de amordazar o silenciar. «¡Enmudece!» preserva la fuerza de la imagen sin caer en una fórmula demasiado extraña para el español común.
- source_word: ἐκόπασεν
  english_pob_choice: ceased
  chosen_spanish: cesó
  alternatives_spanish:
  - amainó
  - se apaciguó
  - se calmó
  lexicon: BDAG
  rationale: κοπάζω significa disminuir, amainar o cesar, especialmente de viento o tormenta. «Cesó» es conciso y se ajusta directamente al sujeto «el viento».
- source_word: ἐγένετο
  english_pob_choice: there was
  chosen_spanish: hubo
  alternatives_spanish:
  - se produjo
  - llegó a haber
  - se hizo
  lexicon: BDAG
  rationale: En este contexto γίνομαι introduce el resultado. «Hubo» expresa de forma idiomática el estado resultante en español.
- source_word: γαλήνη μεγάλη
  english_pob_choice: a great calm
  chosen_spanish: una gran calma
  alternatives_spanish:
  - una gran quietud
  - una calma grande
  - una calma completa
  lexicon: BDAG
  rationale: «Una gran calma» reproduce literalmente la frase y conserva el adjetivo «grande», que enlaza con el contraste del contexto inmediato.
theological_decisions:
- issue: Si suavizar el doble imperativo de Jesús hacia el mar o preservar la aspereza léxica del griego
  english_pob_reading: Preserve the imperatives as 'Be silent! Be still!'
  chosen_spanish_reading: Preservar los imperativos como «¡Calla! ¡Enmudece!»
  alternative_spanish_readings:
  - «¡Paz! ¡Estate quieto!»
  - «¡Silencio! ¡Cálmate!»
  - «¡Calla! ¡Quédate quieto!»
  rationale: El griego no contiene un sustantivo equivalente a «paz»; usa dos imperativos, uno de silencio y otro de amordazar/silenciar. Mantener esa estructura evita importar una fórmula tradicional que no está en el texto y preserva la autoridad directa de Jesús sobre el caos.
  doctrine_reference: Translation philosophy §1, §5
- issue: Si traducir θαλάσσα como «mar» o contextualizarlo como «lago»
  english_pob_reading: Render as 'sea'
  chosen_spanish_reading: Render como «mar»
  alternative_spanish_readings:
  - lago
  - mar de Galilea
  rationale: El texto fuente dice «mar». Conservarlo respeta la primacía del original y no rebaja el valor narrativo-teológico de la escena a una mera precisión geográfica.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue el último estado del audit trail inglés, que conserva el valor formal de «having awakened» pero suaviza la segunda cláusula a «Be still!». En español se optó por mantener la fuerza del doble imperativo con una pareja natural («¡Calla! ¡Enmudece!»), sin introducir «paz» donde el griego no la expresa explícitamente.
  spanish_consistency_notes:
  - Se mantiene «mar» para θαλάσσῃ conforme al texto griego y al criterio POB de no sustituirlo por «lago» en el cuerpo principal.
  - «Reprendió» se usa de modo consistente con el valor marcano de ἐπιτιμάω.
  - Se evita «Cristo» y «SEÑOR» porque no corresponden a este versículo.
  - La partición verbal y el tono son formales pero naturales para lectura eclesial en español latinoamericano.
