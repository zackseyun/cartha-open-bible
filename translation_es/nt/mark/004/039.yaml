    issue: «¡Enmudece!» no refleja bien πεφίμωσο
    rationale: φιμόω evoca literalmente amordazar. «Enmudece» en español se entiende más naturalmente como volverse mudo o dejar de hablar, y diluye la imagen autoritativa que el expediente inglés quiso preservar.
  - severity: low
    issue: La nota a no coincide del todo con la mejor solución española disponible
    rationale: Si el texto principal se corrige hacia la imagen de amordazar, la nota debe seguir presentando la alternativa tradicional y la literalidad de manera coherente con el texto revisado.
