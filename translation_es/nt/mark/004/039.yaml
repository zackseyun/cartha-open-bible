  text: καὶ διεγερθεὶς ἐπετίμησεν τῷ ἀνέμῳ καὶ εἶπεν τῇ θαλάσσῃ· Σιώπα, πεφίμωσο. καὶ ἐκόπασεν ὁ ἄνεμος, καὶ ἐγένετο γαλήνη μεγάλη.
base_translation:
  language: en
  yaml_path: translation/nt/mark/004/039.yaml
  text: And having awakened[a], he rebuked the wind and said to the sea, “Be silent! Be still!” And the wind ceased[b], and there was a great calm.
  footnotes:
  - marker: a
    text: 'Or, more traditionally, “Peace! Be still!” The Greek more literally has two imperatives: “Be silent! Be muzzled!”'
    reason: lexical_alternative
  - marker: b
    text: 'That is, the Sea of Galilee; Greek: “the sea.”'
    reason: cultural_note
