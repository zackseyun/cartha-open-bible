translation:
  language: es
  text: Y mientras sembraba[a], parte de la semilla cayó junto al camino, y vinieron las aves y la devoraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al lado del camino'. La frase griega significa 'junto al camino' o 'al costado del sendero'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο ἐν τῷ σπείρειν
  english_pob_choice: as he was sowing
  chosen_spanish: mientras sembraba
  alternatives_spanish:
  - sucedió mientras sembraba
  - al estar sembrando
  lexicon: BDAG
  rationale: La construcción narrativa ἐγένετο ἐν + infinitivo articular introduce lo que ocurrió durante la acción. En español, 'mientras sembraba' comunica con naturalidad la simultaneidad sin volver literal el 'sucedió' como fórmula pesada; 'Y sucedió que' mantiene el matiz narrativo de inicio.
- source_word: ὃ μὲν
  english_pob_choice: some seed
  chosen_spanish: una parte
  alternatives_spanish:
  - algo de la semilla
  - cierta parte
  lexicon: BDAG
  rationale: El relativo neutro distributivo apunta a una porción de la semilla sembrada. 'Una parte' conserva el valor partitivo sin añadir 'semilla' de forma innecesaria, ya que el contexto agrícola ya la presupone.
- source_word: ἔπεσεν
  english_pob_choice: fell
  chosen_spanish: cayó
  alternatives_spanish:
  - se cayó
  - cayó al suelo
  lexicon: BDAG
  rationale: El aoristo de πίπτω se rinde de manera directa por 'cayó'. 'Se cayó' suena más coloquial y 'cayó al suelo' añade información no expresada explícitamente.
- source_word: παρὰ τὴν ὁδόν
  english_pob_choice: along the path
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto al sendero
  lexicon: BDAG
  rationale: παρά con acusativo expresa posición al lado de. En español, 'junto al camino' es natural y refleja la cercanía lateral mejor que una paráfrasis más amplia.
- source_word: τὰ πετεινὰ
  english_pob_choice: the birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las aves del cielo
  lexicon: BDAG
  rationale: πετεινά designa aves o pájaros. 'Aves' es sobrio y amplio; 'los pájaros' sería más coloquial, y 'aves del cielo' añade una expansión ausente del texto.
- source_word: κατέφαγεν
  english_pob_choice: devoured
  chosen_spanish: se la comieron
  alternatives_spanish:
  - la devoraron
  - se la tragaron
  lexicon: BDAG
  rationale: El compuesto intensifica la idea de comer por completo. En español, 'se la comieron' comunica bien el resultado total y mantiene un tono natural; 'devoraron' es posible, pero algo más marcado.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  - la semilla
  lexicon: BDAG
  rationale: El pronombre remite a la semilla colectiva implícita en el contexto. En español, la concordancia femenina de 'la' con 'una parte' / 'la semilla' hace el referente transparente sin redundancia.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece explícitamente en el texto español, anclado en ''mientras sembraba[a]''. La nota se limita a la alternativa léxica documentada por el audio textual en inglés.'
  spanish_consistency_notes:
  - Se usó 'camino' en lugar de 'ruta' o 'carretera' para conservar el campo semántico agrícola del pasaje.
  - Se prefirió 'aves' a 'pájaros' para un registro neutral y bíblico sin añadir solemnidad artificial.
  - La frase inicial mantiene la secuencia narrativa con 'Y sucedió que' sin convertirla en un calco rígido.
