translation:
  language: es
  text: Y dejando a la multitud, lo toman consigo, tal como estaba, en la barca, y otras barcas estaban con él.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀφέντες
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - habiendo dejado
  - despidiéndose de
  lexicon: BDAG
  rationale: El participio aoristo introduce una acción previa o concomitante al verbo principal. «Dejando» expresa con naturalidad el movimiento narrativo de apartarse de la multitud sin añadir una despedida formal que el griego no exige.
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος refiere aquí a un grupo reunido. «La multitud» es claro y fiel; «la gente» sería más general y «muchedumbre» suena más marcado o literario.
- source_word: παραλαμβάνουσιν
  english_pob_choice: they take him with them
  chosen_spanish: lo tomaron consigo
  alternatives_spanish:
  - lo tomaron con ellos
  - lo llevaron consigo
  lexicon: BDAG
  rationale: El verbo puede implicar tomar consigo o llevar junto a uno. «Lo tomaron consigo» mantiene esa idea sin volver demasiado pesado el español, aunque el inglés auditado explicita «with them».
- source_word: ὡς ἦν
  english_pob_choice: just as he was
  chosen_spanish: tal como estaba
  alternatives_spanish:
  - así como estaba
  - tal cual estaba
  lexicon: BDAG
  rationale: La frase señala que lo tomaron sin preparación adicional, en el estado en que ya se encontraba. «Tal como estaba» conserva ese sentido idiomático en español.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  - en la embarcación
  lexicon: BDAG
  rationale: En este contexto narrativo, πλοῖον se traduce mejor «barca» en español bíblico actual. Mantiene el registro adecuado y evita un término demasiado grande o moderno como «barco».
- source_word: ἄλλα πλοῖα
  english_pob_choice: other boats
  chosen_spanish: otras barcas
  alternatives_spanish:
  - otros barcos
  - otras embarcaciones
  lexicon: BDAG
  rationale: El plural neutro con ἄλλα indica simplemente otros barcos/barcas. Como el contexto no añade tamaño, «barcas» es suficiente y no introduce un matiz no explicitado en el griego.
- source_word: ἦν μετ’ αὐτοῦ
  english_pob_choice: were with him
  chosen_spanish: había ... con él
  alternatives_spanish:
  - estaban con él
  - lo acompañaban
  lexicon: BDAG
  rationale: El griego usa un singular con sujeto neutro plural, con sentido colectivo. En español, «había otras barcas con él» reproduce de manera natural el valor existencial/narrativo y evita una construcción forzada.
translation_notes:
  revision_awareness: La redacción sigue de cerca la estructura final del inglés auditado, preservando la distinción entre la acción de irse de la multitud, el acto de tomarlo consigo y la nota locativa «en la barca» sin fusionarlas. También conserva el carácter sobrio de la observación final sobre las otras barcas, sin añadir detalles ausentes del griego.
  spanish_consistency_notes:
  - Se emplea «barca» de forma consistente para πλοῖον en este pasaje narrativo.
  - Se evita introducir «Cristo», «SEÑOR» u otra terminología teológica no presente en el texto.
  - No se añadieron notas al pie porque no hay en español una ambigüedad relevante que el texto principal no pueda resolver con suficiente naturalidad.
