revisions:
- from: Y dejando a la multitud, lo tomaron consigo, tal como estaba, en la barca, y había otras barcas con él.
  to: Y dejando a la multitud, lo toman consigo, tal como estaba, en la barca, y otras barcas estaban con él.
  rationale: Se ajusta el verbo principal al presente histórico del griego y se cambia la cláusula final a una formulación más cercana a «were with him». Se conserva «tal como estaba, en la barca» para mantener tanto la lectura auditada como el orden griego sin introducir ambigüedad.
