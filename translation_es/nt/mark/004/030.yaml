translation:
  language: es
  text: 'Y él decía: «¿Cómo compararíamos el reino de Dios, o con qué parábola[a] lo presentaríamos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por qué parábola» o «mediante qué parábola». El griego ἐν τίνι παραβολῇ puede expresar el medio por el cual se presenta o describe el reino.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: él decía
  alternatives_spanish:
  - él estaba diciendo
  - él iba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego marca una acción en curso o reiterada; en español, «decía» comunica bien ese matiz sin sonar forzado. «Estaba diciendo» sería más explícito, pero menos natural en registro bíblico.
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo...?
  alternatives_spanish:
  - ¿De qué manera...?
  - ¿Con qué...?
  lexicon: BDAG
  rationale: «Cómo» reproduce de manera directa la pregunta de modo o manera. Es la opción más natural en español para esta pregunta deliberativa.
- source_word: ὁμοιώσωμεν
  english_pob_choice: should we compare
  chosen_spanish: compararemos
  alternatives_spanish:
  - comparemos
  - deberíamos comparar
  lexicon: BDAG
  rationale: La forma deliberativa del griego expresa una pregunta que propone una acción. En español, una pregunta con futuro de deliberación («¿Cómo compararemos...?») conserva esa fuerza mejor que un subjuntivo simple, y evita sonar demasiado interpretativa.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la soberanía de Dios
  lexicon: BDAG
  rationale: «Reino» es la equivalencia estable y transparente para βασιλεία en este contexto sinóptico. «Reinado» expresa la idea de gobierno, pero aquí el sustantivo tradicional y semánticamente pleno sigue siendo el más adecuado.
- source_word: ἐν τίνι ... παραβολῇ
  english_pob_choice: by what parable
  chosen_spanish: con qué parábola
  alternatives_spanish:
  - por qué parábola
  - mediante qué parábola
  - en qué parábola
  lexicon: BDAG
  rationale: La preposición ἐν con dativo puede tener sentido instrumental o asociativo. En español, «con qué parábola» comunica naturalmente el medio o recurso de la comparación, sin perder la ambigüedad reconocida en el audit trail inglés.
- source_word: παραβολῇ
  english_pob_choice: parable
  chosen_spanish: parábola
  alternatives_spanish:
  - comparación
  - ilustración
  lexicon: BDAG
  rationale: «Parábola» es el término técnico y literario adecuado en los Evangelios sinópticos; alternativas como «comparación» o «ilustración» diluyen la categoría narrativa.
- source_word: αὐτὴν ... θῶμεν
  english_pob_choice: should we present it
  chosen_spanish: lo presentaremos
  alternatives_spanish:
  - lo pondremos
  - la presentaremos
  - lo expondremos
  lexicon: BDAG
  rationale: El verbo τίθημι aquí funciona idiomáticamente con la idea de presentar o expresar algo mediante una parábola. Como «reino» es masculino en español, el pronombre correspondiente es «lo». «Presentaremos» reproduce bien la idea sin volverlo demasiado literal.
theological_decisions:
- issue: Título «reino de Dios»
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  - la soberanía de Dios
  rationale: Se conserva el lenguaje establecido del pasaje, que es central en la predicación de Jesús en los Evangelios. Aunque «reinado» subraya la acción soberana, aquí no hay razón textual suficiente para abandonar la forma tradicional y transparente «reino».
  doctrine_reference: Reinado de Dios en la teología del Reino; cf. Mc 1:15 y paralelos sinópticos.
- issue: Pregunta deliberativa con subjuntivo o futuro
  english_pob_reading: How should we compare... or by what parable should we present it?
  chosen_spanish_reading: ¿Cómo compararemos el reino de Dios, o con qué parábola lo presentaremos?
  alternative_spanish_readings:
  - ¿Cómo compararíamos...?
  - ¿Cómo comparemos...?
  rationale: La deliberación del griego aoristo subjuntivo puede expresarse en español con una pregunta en futuro deliberativo, que mantiene el tono de propuesta o búsqueda de formulación. Esto evita suavizar la fuerza retórica del dicho.
  doctrine_reference: Uso deliberativo de la pregunta retórica en narración evangélica.
translation_notes:
  revision_awareness: La versión inglesa pasó de «in what parable should we set it forth?» a «by what parable should we present it?». La redacción española sigue la revisión más reciente con «con qué parábola lo presentaremos», manteniendo el matiz instrumental de ἐν τίνι y la idea idiomática de τίθημι como ‘presentar’.
  spanish_consistency_notes:
  - Se mantiene «reino de Dios» por consistencia con el vocabulario sinóptico habitual del proyecto.
  - Se usa «parábola» de modo técnico, no como simple sinónimo de «comparación».
  - Se preserva el imperfecto narrativo con «decía» para reflejar el aspecto continuo del griego.
  - 'El pronombre objeto directo se ajusta al género gramatical español de «reino»: «lo».'
