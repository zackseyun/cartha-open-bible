translation:
  language: es
  text: 'Y les decía[a]: «¿No viene una lámpara para ser puesta debajo de un canasto o debajo de una cama[b]? ¿No es para ser puesta sobre el candelero?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Acaso viene la lámpara para ser puesta debajo del canasto o debajo de la cama?». El griego usa una expresión vívida y personificada.'
    reason: lexical_alternative
  - marker: b
    text: El griego μόδιος se refiere a un recipiente de medida; tradicionalmente, «celemín» o «bushel».
    reason: cultural_note
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les seguía diciendo
  alternatives_spanish:
  - les decía
  - iba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida; en español, “les seguía diciendo” conserva mejor ese valor aspectual que un simple pretérito “les dijo”, sin sonar forzado.
- source_word: Μήτι
  english_pob_choice: does not ... does it?
  chosen_spanish: ¿Acaso ...?, verdad?
  alternatives_spanish:
  - ¿No ...?
  - ¿Será que ...?
  lexicon: BDAG
  rationale: Μήτι introduce una pregunta que espera respuesta negativa. En español, una pregunta retórica con “¿Acaso ...?” y remate interrogativo preserva la fuerza esperada sin volverla demasiado analítica.
- source_word: ἔρχεται ὁ λύχνος
  english_pob_choice: a lamp does not come
  chosen_spanish: viene una lámpara
  alternatives_spanish:
  - viene la lámpara
  - se trae una lámpara
  lexicon: BDAG
  rationale: El griego personifica la lámpara con el verbo “venir”. En español, “viene una lámpara” conserva esa imagen viva y proverbial mejor que suavizarla a una pasiva más explicativa.
- source_word: λύχνος
  english_pob_choice: lamp
  chosen_spanish: lámpara
  alternatives_spanish:
  - lámpara de aceite
  - lámpara portátil
  lexicon: BDAG
  rationale: λύχνος designa una lámpara concreta, no “luz” abstracta. “Lámpara” es el equivalente natural y preciso en español; “de aceite” sería explicativo pero no requerido por el texto.
- source_word: μόδιον
  english_pob_choice: basket
  chosen_spanish: canasto
  alternatives_spanish:
  - celemín
  - cesta
  lexicon: BDAG
  rationale: μόδιος es una medida seca y, por extensión, el recipiente asociado. “Canasto” comunica bien la idea a lectores modernos y evita el término técnico “celemín”, que puede oscurecer el dicho.
- source_word: κλίνην
  english_pob_choice: bed
  chosen_spanish: cama
  alternatives_spanish:
  - lecho
  - sofá
  lexicon: BDAG
  rationale: κλίνη puede ser cama o diván. “Cama” es la opción más clara y natural en español para esta imagen doméstica.
- source_word: λυχνίαν
  english_pob_choice: lampstand
  chosen_spanish: candelero
  alternatives_spanish:
  - soporte para la lámpara
  - lámpara-stand
  lexicon: BDAG
  rationale: λυχνία es el soporte de la lámpara. “Candelero” es una solución tradicional y reconocible en español bíblico para el objeto que sostiene la luz; se mantiene por claridad y porque no introduce una explicación innecesaria.
- source_word: τεθῇ
  english_pob_choice: be put
  chosen_spanish: ser puesta
  alternatives_spanish:
  - ser colocada
  - ser colocada allí
  lexicon: BDAG
  rationale: El pasivo de τίθημι aquí se expresa de forma natural con “ser puesta”. Mantiene la sencillez del griego y el paralelismo del verso.
- source_word: ἵνα ... τεθῇ
  english_pob_choice: to be put
  chosen_spanish: para ser puesta
  alternatives_spanish:
  - a fin de ser puesta
  - para que sea puesta
  lexicon: BDAG
  rationale: En este dicho, ἵνα marca propósito/resultativo. “Para ser puesta” es una equivalencia clara y idiomática en español que conserva el sentido de finalidad.
theological_decisions:
- issue: Preservar la personificación proverbial de la lámpara
  english_pob_reading: A lamp does not come ...
  chosen_spanish_reading: ¿Acaso viene una lámpara ...?
  alternative_spanish_readings:
  - ¿Acaso se trae una lámpara ...?
  - ¿Viene una lámpara ...?
  rationale: El texto presenta una imagen deliberadamente vívida y proverbial. Mantener “viene una lámpara” conserva el efecto retórico y la tensión del enunciado sin convertirlo en una explicación prosaica.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tipo de pregunta en español para Μήτι
  english_pob_reading: does not ... does it?
  chosen_spanish_reading: ¿Acaso ...?, verdad?
  alternative_spanish_readings:
  - ¿No ...?
  - ¿Acaso ...?
  rationale: Μήτι espera una respuesta negativa. El añadido “verdad?” reproduce funcionalmente el matiz de confirmación esperada, ayudando a que la pregunta suene natural en español y conserve su fuerza retórica.
  doctrine_reference: Translation philosophy §6
- issue: Definitud de ὁ λύχνος en dicho proverbial
  english_pob_reading: a lamp
  chosen_spanish_reading: una lámpara
  alternative_spanish_readings:
  - la lámpara
  rationale: Aunque el griego usa artículo, el español proverbial suele expresar la referencia genérica con indefinido. “Una lámpara” comunica mejor la regla general que “la lámpara”.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis griego y el expediente inglés: conserva el imperfecto, la pregunta retórica de μήτι, la personificación de ἔρχεται ὁ λύχνος y el sentido de finalidad de ἵνα ... τεθῇ. Se optó por “canasto” y “candelero” por claridad pública en español, con nota para el valor cultural de μόδιος.'
  spanish_consistency_notes:
  - Se mantuvo “Yahvé” como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se evitó “SEÑOR” como sustituto no presente en el texto.
  - 'Se conservó el paralelismo doméstico del verso con vocabulario sencillo y natural: canasto / cama / candelero.'
  - La pregunta final se formuló en forma retórica para reflejar el griego y la lectura POB en inglés.
