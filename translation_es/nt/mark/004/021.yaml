  glossary_alignment: No hay conflictos con la terminología teológica principal del proyecto. «Lámpara» para λύχνος y «candelero» para λυχνία son aceptables en este contexto. «Canasto» para μόδιος es defendible como equivalente moderno, con nota cultural que conserva la alternativa tradicional.
