translation:
  language: es
  text: 'Y les enseñaba muchas cosas en parábolas[a], y les decía en su enseñanza:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: “y les enseñaba mucho en parábolas”. El griego πολλά admite tanto la idea de cantidad (“muchas cosas”) como la de intensidad o amplitud (“mucho”).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίδασκεν
  english_pob_choice: he was teaching
  chosen_spanish: enseñaba
  alternatives_spanish:
  - estaba enseñando
  - estuvo enseñando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida; en español, el imperfecto simple “enseñaba” comunica bien esa duración narrativa sin sonar forzado. Conserva el matiz aspectual que la POB inglesa marcó con “was teaching”.
- source_word: αὐτοὺς / αὐτοῖς
  english_pob_choice: them / to them
  chosen_spanish: a ellos / les
  alternatives_spanish:
  - los / les
  - a ellos / a ellos
  lexicon: BDAG
  rationale: El acusativo y el dativo griegos se reflejan con complemento directo e indirecto en español. “A ellos” mantiene explícito el objeto, y “les decía” conserva la relación dativa natural en español.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por parábolas
  lexicon: BDAG
  rationale: La construcción ἐν + dativo se preserva de manera directa. “En parábolas” es idiomático en español y sigue de cerca la forma griega sin perder naturalidad.
- source_word: πολλά
  english_pob_choice: many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - muchas
  lexicon: BDAG
  rationale: El neutro plural πολλά puede entenderse adverbialmente o como contenido de la enseñanza. La POB inglesa optó por “many things”; en español, “muchas cosas” transmite mejor esa amplitud de contenido que un simple “mucho”.
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: decía
  alternatives_spanish:
  - estaba diciendo
  - dijo
  lexicon: BDAG
  rationale: El imperfecto conserva la continuidad discursiva. En español, “decía” reproduce de forma natural el flujo narrativo sin necesidad de una perífrasis más pesada.
- source_word: ἐν τῇ διδαχῇ αὐτοῦ
  english_pob_choice: in his teaching
  chosen_spanish: en su enseñanza
  alternatives_spanish:
  - en su instrucción
  - al enseñar
  lexicon: BDAG
  rationale: διδαχή significa “enseñanza” o “instrucción”. “En su enseñanza” sigue de cerca la sintaxis griega y mantiene el vínculo entre lo que sigue y la instrucción de Jesús, tal como la POB inglesa.
translation_notes:
  revision_awareness: Se sigue de cerca el audit trail inglés POB y no se requieren revisiones textuales adicionales; la única tensión lexical relevante es πολλά, que en español se resuelve con una nota alternativa para preservar su amplitud semántica.
  spanish_consistency_notes:
  - Se mantiene “parábolas” como equivalente directo de παραβολαῖς, en línea con la terminología cristiana reconocible y fiel al griego.
  - Se usa el imperfecto español (“enseñaba”, “decía”) para reflejar la duratividad de los verbos imperfectos griegos.
  - No se introduce “Cristo”, “Señor” ni otros términos no presentes en el verso.
  - La nota sobre πολλά preserva la alternativa “mucho”/“muchas cosas”, como en la POB inglesa, sin perder la fluidez del texto principal.
