translation:
  language: es
  text: Y cuando es sembrado, brota y llega a ser mayor que todas las plantas de huerto, y echa ramas grandes, de modo que las aves del cielo[a] pueden anidar[b] bajo su sombra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «las aves del aire».
    reason: lexical_alternative
  - marker: b
    text: O «habitar» o «establecerse». La formulación puede evocar la imaginería del Antiguo Testamento sobre aves que hallan refugio en un gran árbol (por ejemplo, Ez 17:23; Dn 4:12).
    reason: cross_reference
lexical_decisions:
- source_word: σπαρῇ
  english_pob_choice: it is sown
  chosen_spanish: es sembrado
  alternatives_spanish:
  - ha sido sembrado
  - es plantado
  lexicon: BDAG
  rationale: El aoristo pasivo con ὅταν expresa una acción indefinida en futuro general; en español, «es sembrado» conserva la pasiva y la imagen agrícola de la siembra. «Plantado» es posible por contexto, pero debilita el enlace verbal con el motivo de la semilla.
- source_word: ἀναβαίνει
  english_pob_choice: it comes up
  chosen_spanish: brota
  alternatives_spanish:
  - sube
  - crece
  lexicon: BDAG
  rationale: En contexto agrícola, ἀναβαίνω describe la emergencia desde la tierra. «Brota» es natural en español y comunica mejor esa aparición ascendente que un calco como «sube».
- source_word: γίνεται
  english_pob_choice: becomes
  chosen_spanish: llega a ser
  alternatives_spanish:
  - se hace
  - se convierte en
  lexicon: BDAG
  rationale: γίνομαι aquí señala un cambio de estado. «Llega a ser» conserva ese proceso sin forzar una equivalencia demasiado libre.
- source_word: μεῖζον πάντων τῶν λαχάνων
  english_pob_choice: larger than all the garden plants
  chosen_spanish: mayor que todas las plantas de huerto
  alternatives_spanish:
  - más grande que todas las hortalizas
  - la mayor de todas las plantas de huerto
  lexicon: BDAG
  rationale: λαχάνα se refiere a plantas de huerto/jardín, no específicamente a árboles ni a la idea moderna estrecha de «verduras». «Plantas de huerto» preserva el campo semántico y la comparación de tamaño.
- source_word: ποιεῖ κλάδους μεγάλους
  english_pob_choice: it produces large branches
  chosen_spanish: echa ramas grandes
  alternatives_spanish:
  - produce ramas grandes
  - saca ramas grandes
  lexicon: BDAG
  rationale: Con κλάδους, ποιέω expresa la emisión o producción de ramas. «Echa ramas» es idiomático en español y mantiene la fuerza visual de la imagen.
- source_word: ὥστε δύνασθαι
  english_pob_choice: so that ... are able to
  chosen_spanish: de modo que ... pueden
  alternatives_spanish:
  - para que ... puedan
  - así que ... pueden
  lexicon: BDAG
  rationale: ὥστε con infinitivo expresa resultado. «De modo que» preserva la relación resultativa con una sintaxis natural en español.
- source_word: ὑπὸ τὴν σκιὰν αὐτοῦ
  english_pob_choice: under its shade
  chosen_spanish: bajo su sombra
  alternatives_spanish:
  - bajo su sombra protectora
  - debajo de su sombra
  lexicon: BDAG
  rationale: σκιά puede ser «sombra» o «sombra protectora»; aquí el contexto de refugio para las aves favorece «bajo su sombra», que suena natural y conserva la imagen.
- source_word: τὰ πετεινὰ τοῦ οὐρανοῦ
  english_pob_choice: the birds of the sky
  chosen_spanish: las aves del cielo
  alternatives_spanish:
  - las aves del aire
  - los pájaros del cielo
  lexicon: BDAG
  rationale: Se mantiene «cielo» para reflejar οὐρανός y el registro bíblico del texto. «Aves» es más digno y amplio que «pájaros» en este contexto.
- source_word: κατασκηνοῦν
  english_pob_choice: to nest
  chosen_spanish: anidar
  alternatives_spanish:
  - habitar
  - posarse
  lexicon: BDAG
  rationale: Con aves y ramas, κατασκηνόω comunica la idea de hacer nido o establecerse. «Anidar» expresa de forma natural el resultado de refugio en el árbol sin perder la imaginería.
theological_decisions:
- issue: Imagen intertextual de refugio de las aves en un árbol grande
  english_pob_reading: Retain the imagery straightforwardly without making the allusive background explicit in the main text.
  chosen_spanish_reading: Conservar la imagen de manera directa, sin explicitar en el cuerpo del texto la alusión veterotestamentaria.
  alternative_spanish_readings:
  - usar «habitar» para sugerir más fuertemente el eco de árbol-reino
  - añadir una explicación interpretativa en el texto principal
  rationale: El griego presenta la imagen sin interpretarla. Mantenerla intacta permite que la resonancia con el AT permanezca como tensión literaria y teológica, en vez de resolverla dentro de la traducción principal.
  doctrine_reference: Preservar la tensión bíblica e intertextual sin sobreinterpretarla.
translation_notes:
  revision_awareness: El borrador sigue el contexto de auditoría en inglés y no introduce cambios sustantivos respecto de la decisión revisada más reciente; mantiene la equivalencia óptima ya validada para la imagen agrícola y aviar.
  spanish_consistency_notes:
  - Se conserva «cielo» para οὐρανός, en coherencia con el registro bíblico y la decisión inglesa 'sky'.
  - Se usa «anidar» como equivalente contextual de κατασκηνόω, sin reintroducir «habitar» en el texto principal.
  - Se mantiene la pasiva «es sembrado» para reflejar la sintaxis del aoristo pasivo con ὅταν.
  - «Plantas de huerto» evita tanto la reducción a «verduras» como una expansión innecesaria.
  - El tono general es neutral latinoamericano y apto para lectura eclesial amplia.
