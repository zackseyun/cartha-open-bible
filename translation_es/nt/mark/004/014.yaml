translation:
  language: es
  text: El sembrador siembra la palabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje». El griego λόγος puede significar «palabra» o «mensaje» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ σπείρων
  english_pob_choice: The sower
  chosen_spanish: El sembrador
  alternatives_spanish:
  - El que siembra
  - El agricultor
  lexicon: BDAG
  rationale: El participio articular funciona como sustantivo. «El sembrador» conserva la imagen parabólica y es natural en español; «el que siembra» sería más literal pero menos fluido, y «el agricultor» interpretaría en exceso el oficio más allá del acto de sembrar.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  lexicon: BDAG
  rationale: λόγος puede significar «palabra» o «mensaje» según el contexto. Aquí el texto griego dice solo τὸν λόγον, y la explicación de la parábola no añade un complemento explícito. «La palabra» mantiene la abertura semántica sin anticipar una glosa interpretativa; «el mensaje» es posible pero más interpretativo, y «la palabra de Dios» excede lo explícito en este versículo.
- source_word: σπείρει
  english_pob_choice: sows
  chosen_spanish: siembra
  alternatives_spanish:
  - está sembrando
  lexicon: BDAG
  rationale: El presente indicativo expresa una acción general o proverbial. En español, el presente simple transmite bien ese valor gnómico y conserva el paralelismo con «sembrador».
theological_decisions:
- issue: Referencia de «la palabra» en la explicación de la parábola
  english_pob_reading: Rendered generically as 'the word' without specifying 'word of God' or 'gospel' in the main text.
  chosen_spanish_reading: Se mantiene genéricamente como «la palabra» sin añadir «de Dios» ni «el evangelio» en el texto principal.
  alternative_spanish_readings:
  - la palabra de Dios
  - el mensaje
  - el evangelio
  rationale: El griego solo dice τὸν λόγον. Aunque el contexto amplio apunta a la palabra proclamada por Jesús, ampliar la expresión en la traducción resolvería una tensión que el texto no resuelve explícitamente. La redacción española conserva esa precisión y evita sobreinterpretar.
  doctrine_reference: Principio de primacía del original y preservación de la tensión teológica cuando el texto la deja abierta.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el juicio auditado en inglés; no se requirieron revisiones respecto del pasaje base. Se mantuvo la ambigüedad léxica de λόγος sin expandirla interpretativamente.
  spanish_consistency_notes:
  - Se usa «sembrador/siembra» para conservar la repetición retórica del griego.
  - Se prefiere «palabra» como equivalente principal de λόγος, coherente con el criterio POB de no cerrar prematuramente su rango semántico.
  - No se introduce mayúscula teológica en «palabra», porque el griego carece de marcador explícito y el contexto no exige personificación.
