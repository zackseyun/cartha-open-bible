review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del griego y mantiene la secuencia temporal-causal del versículo. «Está listo» transmite adecuadamente παραδοῖ en su sentido contextual de estar listo para la cosecha, y la nota preserva la rareza activa del griego. Sin embargo, «el cultivo» no corresponde tan bien a ὁ καρπός como «la cosecha» o «el fruto/cosecha del campo»; «cultivo» nombra más bien lo sembrado o el campo cultivado, no el producto ya listo. Además, la nota «da fruto» no representa bien la alternativa inglesa «yields».
  spanish_quality_summary: El español es claro y legible, pero «el cultivo está listo» suena algo poco natural en este contexto parabólico. «La cosecha está lista» suena más idiomático y encaja mejor con la imagen inmediata de la hoz y la siega, aunque introduce cercanía léxica con «la siega» final; aun así, sigue siendo más natural que «cultivo». «Enseguida», «envía la hoz» y «porque ha llegado la siega» son aceptables y fluidos.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La principal cuestión léxica es ὁ καρπός: el borrador usa «el cultivo», pero el expediente inglés favorece «the crop», que en español aquí se representa mejor como «la cosecha» que como «el cultivo». La decisión para θερισμός como «la siega» es defendible por el vínculo con la hoz.'
  issues:
  - severity: medium
    issue: «el cultivo» no representa con precisión natural ὁ καρπός en este contexto
    rationale: ὁ καρπός aquí se refiere al producto del campo ya dispuesto para ser segado. «Cultivo» suele referirse a lo cultivado o al proceso/campo, no al rendimiento listo para la recolección. «La cosecha» expresa mejor el referente agrícola contextual.
  - severity: low
    issue: La nota al pie dice «da fruto» como alternativa de «yields»
    rationale: «Yields» en el expediente inglés apunta más a «cede», «se entrega» o «se deja cosechar» que a «da fruto», que cambia la imagen temporal hacia producir fruto en vez de quedar listo para la siega.
  revised_spanish_text: Pero cuando la cosecha[a] está lista, enseguida envía la hoz, porque ha llegado la siega.
  revised_footnotes:
  - marker: a
    text: O «madura» o, más literalmente, «se entrega». El griego usa una expresión activa inusual con la cosecha como sujeto.
    reason: lexical_alternative
  revision_rationale: Se sustituye «el cultivo» por «la cosecha» para reflejar mejor ὁ καρπός en un contexto de recolección con hoz. También se ajusta la nota para evitar la alternativa inexacta «da fruto» y conservar mejor la rareza del giro griego sin introducir una paráfrasis engañosa.
