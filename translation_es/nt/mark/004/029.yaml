translation:
  language: es
  text: Pero cuando la cosecha[a] está lista, enseguida envía la hoz, porque ha llegado la siega.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «madura» o, más literalmente, «se entrega». El griego usa una expresión activa inusual con la cosecha como sujeto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅταν introduce una cláusula temporal indefinida y δέ aporta un giro suave; en español, «Pero cuando» conserva el avance discursivo sin volverlo pesado.
- source_word: παραδοῖ
  english_pob_choice: is ready
  chosen_spanish: está listo
  alternatives_spanish:
  - madura
  - se entrega
  - se rinde
  lexicon: BDAG
  rationale: El griego usa una expresión activa inusual con el fruto como sujeto. «Está listo» comunica la idea de preparación para la cosecha sin borrar por completo la tensión del giro griego.
- source_word: ὁ καρπός
  english_pob_choice: the crop
  chosen_spanish: el cultivo
  alternatives_spanish:
  - el fruto
  - la cosecha
  - el grano
  lexicon: BDAG
  rationale: En la parábola agrícola, καρπός puede abarcar fruto/cosecha. «Cultivo» mantiene el campo semántico agrícola de manera amplia, sin estrecharlo a un tipo específico de producto.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» reproduce con naturalidad la urgencia característica de Marcos, sin sonar rígido en español contemporáneo.
- source_word: ἀποστέλλει τὸ δρέπανον
  english_pob_choice: sends in the sickle
  chosen_spanish: envía la hoz
  alternatives_spanish:
  - mete la hoz
  - pone la hoz
  - envía la hoz a cortar
  lexicon: BDAG
  rationale: El griego dice literalmente «envía la hoz», una forma idiomática para comenzar la siega. «Envía la hoz» conserva la personificación/metáfora; no se añade «en» para no sobrecargar la frase.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: ὅτι introduce la razón de la acción inmediata; «porque» es la opción clara y directa en español.
- source_word: παρέστηκεν
  english_pob_choice: has come
  chosen_spanish: ha llegado
  alternatives_spanish:
  - está presente
  - ha venido
  - está ya aquí
  lexicon: BDAG
  rationale: El perfecto de παρίστημι expresa que la siega ha venido y se encuentra ahora presente. «Ha llegado» capta bien ese valor resultativo en español.
- source_word: ὁ θερισμός
  english_pob_choice: the harvest
  chosen_spanish: la siega
  alternatives_spanish:
  - la cosecha
  - la recolección
  - la mies
  lexicon: BDAG
  rationale: θερισμός designa la siega/la cosecha. Dado que la imagen inmediata incluye la hoz y el acto de segar, «la siega» mantiene el vínculo con el gesto de la parábola.
theological_decisions:
- issue: Imagen agrícola de preparación sin fijar una interpretación teológica única
  english_pob_reading: Render παραδοῖ in a way that preserves the image of the crop becoming ready without over-interpreting the parable's theological referent.
  chosen_spanish_reading: Traducir la idea de preparación del cultivo sin convertirla en una explicación doctrinal cerrada.
  alternative_spanish_readings:
  - madura
  - se entrega
  - está maduro
  rationale: La parábola pertenece al discurso del reino y no obliga a resolver aquí si la imagen apunta a juicio, misión o consumación. «Está listo» preserva la tensión interpretativa y la metáfora agrícola.
  doctrine_reference: Preservar la tensión teológica en parábolas del reino.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «is ready» sobre «permits it» y simplificó «has arrived» a «has come». La versión española sigue esa línea y conserva la metáfora agrícola sin forzar una lectura explicativa.
  spanish_consistency_notes:
  - Se mantiene un registro moderno y digno, con vocabulario agrícola natural en español.
  - Se evita «Cristo» o terminología eclesiástica no presente en el texto.
  - La elección de «siega» y «hoz» conserva la imagen verbal del original griego.
  - Se deja visible la alternativa interpretativa sobre παραδοῖ mediante la nota al pie.
