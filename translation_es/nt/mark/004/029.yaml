revisions:
- from: Pero cuando el cultivo[a] está listo, enseguida envía la hoz, porque ha llegado la siega.
  to: Pero cuando la cosecha[a] está lista, enseguida envía la hoz, porque ha llegado la siega.
  rationale: Se sustituye «el cultivo» por «la cosecha» para reflejar mejor ὁ καρπός en un contexto de recolección con hoz. También se ajusta la nota para evitar la alternativa inexacta «da fruto» y conservar mejor la rareza del giro griego sin introducir una paráfrasis engañosa.
  reviewer_model: gpt-5.4
