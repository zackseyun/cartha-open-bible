- from: Y cuando salió el sol[a], se quemó, y porque no tenía raíz, se secó.
  to: Y cuando salió el sol, se marchitó, y por no tener raíz, se secó[a].
  rationale: Se ajusta ἐκαυματίσθη a «se marchitó» para una imagen agrícola más natural en español dentro del contexto parabólico; se mejora la causalidad con «por no tener raíz»; y se mueve la nota al término correcto, ἐξηράνθη, preservando la alternativa léxica documentada en el inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:32:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia y el sentido básico del griego: cláusula temporal, efecto del sol, causa por falta de raíz y resultado final. Sin embargo, «se quemó» para ἐκαυματίσθη tiende a sugerir ‘burned’ más que ‘was scorched/by the heat’, y suena algo más fuerte que el matiz agrícola del contexto. Además, la nota al pie está anclada en «sol», pero la alternativa léxica documentada corresponde a ἐξηράνθη, no a ἀνέτειλεν/«salió».'
  spanish_quality_summary: 'El texto es claro y legible, pero puede mejorarse con una formulación más natural y precisa para imaginería agrícola: «se marchitó» o «fue abrasado». En español bíblico general, «se marchitó» encaja mejor con una planta expuesta al sol, mientras que «se secó» puede reservarse como alternativa léxica en nota. También conviene evitar la repetición algo torpe «y porque»; «y por no tener raíz» fluye mejor y refleja bien el infinitivo articular causal.'
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son neutrales. El ajuste recomendado es de precisión semántica y de colocación natural en español, no de glosario teológico.
  issues:
  - severity: medium
    issue: «se quemó» para ἐκαυματίσθη es menos preciso que el matiz de ‘ser abrasado/quemado por el sol’.
    rationale: καυματίζω en este contexto describe daño por calor solar. «Se quemó» puede sonar demasiado general o más intenso, y menos propio de la imagen de una planta en la parábola.
  - severity: medium
    issue: La nota al pie está anclada en «sol[a]», pero la alternativa léxica corresponde a «se secó / se marchitó».
    rationale: La nota inglesa explica una alternativa para ἐξηράνθη, no para «salió el sol». El marcador debe colocarse junto al término español que traduce ese verbo.
  - severity: low
    issue: «y porque no tenía raíz» es comprensible, pero menos fluido que una construcción causal más natural en español.
    rationale: «Y por no tener raíz» reproduce bien la causalidad de διὰ τὸ μὴ ἔχειν y suena más idiomático en registro bíblico moderno.
  revised_spanish_text: Y cuando salió el sol, se marchitó, y por no tener raíz, se secó[a].
  revised_footnotes:
  - marker: a
    text: O «se marchitó». El verbo griego puede significar volverse seco o marchitarse.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐκαυματίσθη a «se marchitó» para una imagen agrícola más natural en español dentro del contexto parabólico; se mejora la causalidad con «por no tener raíz»; y se mueve la nota al término correcto, ἐξηράνθη, preservando la alternativa léxica documentada en el inglés.
