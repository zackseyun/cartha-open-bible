translation:
  language: es
  text: Y cuando salió el sol, se marchitó, y por no tener raíz, se secó[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se marchitó». El verbo griego puede significar volverse seco o marchitarse.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Conector narrativo simple; «Y» conserva la continuidad del relato sin añadir matiz temporal extra.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - después de que
  - al
  lexicon: BDAG
  rationale: Introduce la cláusula temporal de manera directa y natural en español.
- source_word: ἀνέτειλεν
  english_pob_choice: rose
  chosen_spanish: salió
  alternatives_spanish:
  - se levantó
  - apareció
  lexicon: BDAG
  rationale: Con ὁ ἥλιος, el sentido es el salir del sol; «salió» es idiomático en español y fiel al movimiento expresado.
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  alternatives_spanish:
  - el astro solar
  lexicon: BDAG
  rationale: Equivalencia directa del sujeto nominativo.
- source_word: ἐκαυματίσθη
  english_pob_choice: was scorched
  chosen_spanish: se quemó
  alternatives_spanish:
  - fue quemado
  - se chamuscó
  lexicon: BDAG
  rationale: 'Pasivo de καυματίζω: daño por el calor del sol. «Se quemó» comunica el efecto con naturalidad; no fuerza una intensidad mayor que la del griego.'
- source_word: διὰ τὸ μὴ ἔχειν
  english_pob_choice: because it had no
  chosen_spanish: porque no tenía
  alternatives_spanish:
  - ya que no tenía
  - puesto que no tenía
  lexicon: BDAG
  rationale: διά con infinitivo articular expresa causa; «porque no tenía» transmite esa relación causal con fluidez en español.
- source_word: ῥίζαν
  english_pob_choice: root
  chosen_spanish: raíz
  alternatives_spanish:
  - raíces
  lexicon: BDAG
  rationale: Singular griego; «raíz» mantiene la imagen agrícola y la singularidad del texto.
- source_word: ἐξηράνθη
  english_pob_choice: withered
  chosen_spanish: se secó
  alternatives_spanish:
  - se marchitó
  - se volvió seco
  lexicon: BDAG
  rationale: ξηραίνω puede significar volverse seco o marchitarse. «Se secó» conserva esa amplitud sin añadir «del todo» ni intensificar más de lo que el griego exige.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó «away» para no añadir énfasis no presente en el griego. La redacción española evita igualmente cualquier intensificación adicional y mantiene el cierre simple «se secó».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico contemporáneo y claro.
  - No se usa terminología eclesiástica tradicional donde el griego no la requiere.
  - La imagen agrícola se conserva con «raíz» y «se secó» sin expansión interpretativa.
