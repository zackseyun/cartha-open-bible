translation:
  language: es
  text: Y estos son los que están junto al camino, donde se siembra la palabra; y cuando la oyen, Satanás viene inmediatamente y quita la palabra que fue sembrada en ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la palabra que fue sembrada dentro de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὗτοι δέ εἰσιν
  english_pob_choice: And these are
  chosen_spanish: Y estos son
  alternatives_spanish:
  - Ahora estos son
  - Estos son
  lexicon: BDAG
  rationale: οὗτοι con εἰσιν introduce la identificación de los oyentes en la explicación de la parábola. δέ es conectivo leve; «Y» conserva el flujo discursivo sin forzar contraste.
- source_word: οἱ παρὰ τὴν ὁδόν
  english_pob_choice: the ones along the road
  chosen_spanish: los que están junto al camino
  alternatives_spanish:
  - los que están al lado del camino
  - los que están junto a la senda
  lexicon: BDAG
  rationale: παρά con acusativo indica posición junto a. ὁδός puede ser «camino», «ruta» o «sendero»; «camino» es natural en español y mantiene la imagen. Añadir «están» expresa bien el valor descriptivo del griego.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en el lugar donde
  lexicon: BDAG
  rationale: Adverbio relativo locativo simple; «donde» reproduce la relación espacial de manera natural.
- source_word: σπείρεται ὁ λόγος
  english_pob_choice: the word is sown
  chosen_spanish: se siembra la palabra
  alternatives_spanish:
  - la palabra es sembrada
  - se siembra el mensaje
  lexicon: BDAG
  rationale: λόγος en la parábola se refiere a la palabra/mensaje proclamado. En español, la pasiva refleja «se siembra» resulta más natural que la pasiva perifrástica, sin perder el sentido pasivo del griego.
- source_word: ὅταν ἀκούσωσιν
  english_pob_choice: when they hear
  chosen_spanish: y cuando la oyen
  alternatives_spanish:
  - y cuando la escuchan
  - cuando la oyen
  lexicon: BDAG
  rationale: ὅταν con aoristo subjuntivo expresa temporalidad general; «cuando la oyen» es idiomático en español. Se mantiene la referencia a «la palabra» mediante el pronombre átono «la».
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - de inmediato
  - al instante
  lexicon: BDAG
  rationale: Marca la rapidez característica de Marcos; «inmediatamente» conserva esa urgencia en un español claro y digno.
- source_word: ὁ Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se conserva el nombre/título personal usado en el texto, sin impersonalizarlo.
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: El presente narrativo se expresa naturalmente con «viene» en español.
- source_word: αἴρει
  english_pob_choice: takes away
  chosen_spanish: quita
  alternatives_spanish:
  - se lleva
  - arranca
  - retira
  lexicon: BDAG
  rationale: αἴρω puede significar levantar, quitar o remover. «Quita» es amplio, fiel y menos interpretativo que «arranca»; mantiene la acción de remover la palabra del oyente.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra proclamada
  lexicon: BDAG
  rationale: Se conserva la repetición temática de λόγος en la parábola. En español, «palabra» es el equivalente más directo y resonante.
- source_word: τὸν ἐσπαρμένον εἰς αὐτούς
  english_pob_choice: that was sown in them
  chosen_spanish: que fue sembrada en ellos
  alternatives_spanish:
  - que fue sembrada dentro de ellos
  - que fue sembrada en medio de ellos
  lexicon: BDAG
  rationale: El participio funciona adjetivalmente con «la palabra». εἰς αὐτούς se entiende mejor como «en ellos», reflejando la recepción interna de la palabra. «Dentro de ellos» es posible, pero más marcado en español.
theological_decisions:
- issue: Personal agency of Satan in the parable's explanation
  english_pob_reading: Render ὁ Σατανᾶς straightforwardly as the personal figure 'Satan' who comes and removes the word.
  chosen_spanish_reading: 'Traducir ὁ Σατανᾶς de forma directa como «Satanás», preservando su agencia personal: viene y quita la palabra.'
  alternative_spanish_readings:
  - el Adversario
  - una fuerza adversa
  rationale: El griego usa el nombre/título articular de manera que normalmente designa al ser personal maligno en la enseñanza de Jesús. No conviene desmitologizarlo ni volverlo una abstracción impersonal.
  doctrine_reference: Afirmaciones; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: 'La versión española sigue el acuerdo alto del repaso final y no introduce cambios sustantivos respecto del sentido auditado: mantiene la progresión discursiva, la repetición de λόγος como «palabra», la immediación de εὐθύς y la referencia personal a Satanás. Se optó por una pasiva refleja natural en español («se siembra») y por «en ellos» para εἰς αὐτούς, con nota de alternativa para conservar la tensión entre «en» y «dentro de» que el inglés POB documentó.'
  spanish_consistency_notes:
  - Se mantuvo «Satanás» como nombre/título personal, coherente con el tratamiento del griego articular.
  - «Palabra» se conserva en ambas apariciones de λόγος para reflejar la repetición temática del texto.
  - Se usó «camino» para ὁδός, alineado con la imagen parabólica y el español bíblico inteligible.
  - La nota a pie de página preserva la alternativa espacial de εἰς αὐτούς sin alterar el texto principal.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este verso.
