revisions:
- from: 'Pero él mismo estaba en la popa[a], dormido sobre el cojín; y lo despertaron y le dijeron: «Maestro, ¿no te importa que estamos pereciendo?»'
  to: 'Pero él mismo estaba en la popa[a], dormido sobre el cojín; y lo despertaron y le dijeron: «Maestro, ¿no te importa que perezcamos?»'
  rationale: Se ajusta únicamente la cláusula final para lograr un español más natural y eclesialmente legible, sin perder la fuerza urgente y acusatoria del griego. «¿No te importa que perezcamos?» preserva mejor el sentido de peligro inminente que la formulación progresiva previa.
