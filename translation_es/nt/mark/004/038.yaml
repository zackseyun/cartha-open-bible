review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: mantiene el énfasis de αὐτὸς ἦν con «él mismo», traduce πρύμνῃ con el preciso «popa», conserva el valor locativo de ἐπὶ τὸ προσκεφάλαιον y la fuerza acusatoria de οὐ μέλει σοι. También respeta adecuadamente los presentes históricos con pasado narrativo en español. La única desalineación significativa está en «que estamos pereciendo», que suena poco natural en español bíblico corriente y puede mejorarse sin perder la viveza de ἀπολλύμεθα.'
  spanish_quality_summary: 'El texto es claro y mayormente natural, con buen registro moderno y digno. Sin embargo, «¿no te importa que estamos pereciendo?» resulta menos idiomático en español que «¿no te importa que perezcamos?» o «¿no te importa que estemos pereciendo?». La primera opción suena más nítida y literaria sin caer en arcaísmo, y preserva bien la inminencia del peligro. También conviene corregir un error en las decisiones léxicas internas: «lo rousieron» no es español válido, aunque no afecta directamente el texto bíblico final.'
  glossary_alignment: No hay conflictos con la terminología marco del proyecto. «Maestro» para Διδάσκαλε está bien justificado; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota sobre προσκεφάλαιον está bien manejada con «cojín» / «almohada».
  issues:
  - severity: medium
    issue: «que estamos pereciendo» suena forzado en español
    rationale: Aunque es cercano al inglés auditado, en español la construcción con indicativo progresivo tras «¿no te importa que…?» es menos natural. «Que perezcamos» comunica mejor la urgencia y mantiene el sentido de ἀπολλύμεθα.
  - severity: low
    issue: 'Error léxico en alternativa interna: «lo rousieron»'
    rationale: Es una forma incorrecta en español; debería ser «lo despertaron» o «lo sacudieron / lo hicieron levantar», pero esto afecta solo la documentación interna, no el texto principal.
  revised_spanish_text: 'Pero él mismo estaba en la popa[a], dormido sobre el cojín; y lo despertaron y le dijeron: «Maestro, ¿no te importa que perezcamos?»'
  revised_footnotes:
  - marker: a
    text: O «sobre la almohada». El término griego puede referirse a un cojín o a una almohada para la cabeza.
    reason: lexical_alternative
  revision_rationale: Se ajusta únicamente la cláusula final para lograr un español más natural y eclesialmente legible, sin perder la fuerza urgente y acusatoria del griego. «¿No te importa que perezcamos?» preserva mejor el sentido de peligro inminente que la formulación progresiva previa.
