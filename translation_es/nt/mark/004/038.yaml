translation:
  language: es
  text: 'Pero él mismo estaba en la popa[a], dormido sobre el cojín; y lo despertaron y le dijeron: «Maestro, ¿no te importa que perezcamos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sobre la almohada». El término griego puede referirse a un cojín o a una almohada para la cabeza.
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς ἦν
  english_pob_choice: he himself was
  chosen_spanish: él mismo estaba
  alternatives_spanish:
  - estaba
  - él estaba
  lexicon: BDAG
  rationale: El pronombre enfático αὐτός con ἦν añade énfasis y contraste; «él mismo» conserva esa fuerza mejor que un simple «estaba». «Estaba» mantiene el aspecto narrativo natural del español.
- source_word: πρύμνῃ
  english_pob_choice: stern
  chosen_spanish: popa
  alternatives_spanish:
  - parte trasera de la barca
  - parte posterior de la barca
  lexicon: BDAG
  rationale: πρύμνα designa la parte de atrás de una embarcación; «popa» es el equivalente náutico preciso y natural en español.
- source_word: ἐπὶ τὸ προσκεφάλαιον
  english_pob_choice: on the cushion
  chosen_spanish: sobre el cojín
  alternatives_spanish:
  - sobre la almohada
  - con la cabeza en el cojín
  lexicon: BDAG
  rationale: προσκεφάλαιον puede referirse a un cojín o almohada para la cabeza. «Cojín» es suficientemente amplio y evita precisar más de lo que exige el griego. «Sobre» refleja bien ἐπὶ en este contexto.
- source_word: καθεύδων
  english_pob_choice: asleep
  chosen_spanish: dormido
  alternatives_spanish:
  - durmiendo
  lexicon: BDAG
  rationale: El participio describe el estado continuo de Jesús. «Dormido» es una forma natural en español después de un verbo de estado, y conserva el valor descriptivo del participio.
- source_word: ἐγείρουσιν
  english_pob_choice: woke
  chosen_spanish: lo despertaron
  alternatives_spanish:
  - lo despertaban
  - lo rousieron
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo prefiere el pretérito. «Lo despertaron» expresa con naturalidad la acción puntual de levantarlo del sueño.
- source_word: λέγουσιν
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dicen
  lexicon: BDAG
  rationale: Como presente histórico, se traduce con pasado narrativo en español. El dativo αὐτῷ se expresa de forma natural con «le».
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro y Señor
  lexicon: BDAG
  rationale: διδάσκαλος significa «maestro»/«docente». «Maestro» es la equivalencia más directa y mantiene el registro reverente sin introducir el matiz de «Señor».
- source_word: οὐ μέλει σοι
  english_pob_choice: do you not care
  chosen_spanish: ¿no te importa?
  alternatives_spanish:
  - ¿no te preocupa?
  - ¿no te importa a ti?
  lexicon: BDAG
  rationale: La idiomática griega expresa preocupación o interés. «¿No te importa?» es una forma natural en español que conserva el reproche implícito sin suavizarlo.
- source_word: ἀπολλύμεθα
  english_pob_choice: we are perishing
  chosen_spanish: estamos pereciendo
  alternatives_spanish:
  - nos estamos perdiendo
  - vamos a perecer
  lexicon: BDAG
  rationale: El verbo comunica ruina inminente o muerte. «Estamos pereciendo» preserva la urgencia y el carácter amenazante del griego, sin reducirlo a una simple probabilidad futura.
theological_decisions:
- issue: Fuerza acusatoria y urgente de la pregunta de los discípulos
  english_pob_reading: Rendered as a sharp question, 'do you not care that we are perishing?'
  chosen_spanish_reading: 'La pregunta queda como un reproche directo: «¿no te importa que estamos pereciendo?»'
  alternative_spanish_readings:
  - ¿no te preocupa que estamos pereciendo?
  - ¿no te importa que vayamos a perecer?
  rationale: El griego no es una consulta neutral, sino una queja urgente. La traducción mantiene la tensión emocional y no la resuelve con una paráfrasis más suave.
  doctrine_reference: Preservar la tensión narrativa y la reacción humana de los discípulos sin interpretarla de antemano.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; la presente redacción sigue el acuerdo alto del auditor y conserva la misma decisión léxica principal, adaptando el inglés auditado a un español natural y preciso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» para el nombre divino cuando corresponda; en este versículo no aparece.
  - Se usa «Maestro» para διδάσκαλε por fidelidad léxica y por consistencia con el audito inglés.
  - Se preserva la intensidad de οὐ μέλει σοι con una formulación idiomática española sin suavizar el reproche.
  - «Pereciendo» conserva la urgencia existencial de ἀπολλύμεθα y evita banalizarla como mero temor.
