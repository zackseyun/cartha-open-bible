translation:
  language: es
  text: 'Y ellos razonaban entre sí, diciendo: «¿Qué diremos? Si decimos: “Del cielo[a]”, él dirá: “¿Por qué, entonces, no le creyeron?”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Del cielo» es una forma reverencial judía de decir «de Dios» o «de origen divino».
    reason: cultural_note
lexical_decisions:
- source_word: διελογίζοντο
  english_pob_choice: were reasoning
  chosen_spanish: razonaban
  alternatives_spanish:
  - estaban razonando
  - deliberaban
  - discutían
  lexicon: BDAG
  rationale: El imperfecto medio describe una deliberación continua. «Razonaban» conserva el sentido cognitivo de διαλογίζομαι y su fluidez en español, sin reducirlo solo a conversación externa.
- source_word: πρὸς ἑαυτοὺς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos
  - consigo mismos
  - unos con otros
  lexicon: BDAG
  rationale: La expresión señala interacción recíproca dentro del grupo. «Entre sí» comunica ese matiz de mutua deliberación con naturalidad en español.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido de la deliberación. «Diciendo» conserva el flujo discursivo de manera directa y sobria.
- source_word: Τί εἴπωμεν;
  english_pob_choice: What should we say?
  chosen_spanish: ¿Qué diremos?
  alternatives_spanish:
  - ¿Qué debemos decir?
  - ¿Qué hemos de decir?
  lexicon: BDAG
  rationale: El valor deliberativo del subjuntivo aoristo pide una pregunta sobre qué respuesta dar. «¿Qué diremos?» es natural en español y mantiene el matiz deliberativo sin sonar forzado.
- source_word: ἐὰν εἴπωμεν
  english_pob_choice: If we say
  chosen_spanish: Si decimos
  alternatives_spanish:
  - Si dijéramos
  - Si llegamos a decir
  lexicon: BDAG
  rationale: La prótasis condicional es simple y directa. «Si decimos» reproduce adecuadamente la forma y la relación hipotética.
- source_word: Ἐξ οὐρανοῦ
  english_pob_choice: From heaven
  chosen_spanish: Del cielo
  alternatives_spanish:
  - Del cielo arriba
  - De los cielos
  - De Dios
  lexicon: BDAG
  rationale: «Del cielo» mantiene el giro literal y la reverencia judía del original. Evita explicitar «de Dios» en el cuerpo del texto, preservando la ambigüedad reverencial documentada.
- source_word: ἐρεῖ
  english_pob_choice: he will say
  chosen_spanish: él dirá
  alternatives_spanish:
  - dirá
  - él responderá
  lexicon: BDAG
  rationale: El futuro de λέγω introduce la respuesta esperada de Jesús. «Él dirá» es directo y conserva la construcción del original.
- source_word: Διὰ τί οὖν
  english_pob_choice: Why then
  chosen_spanish: ¿Por qué, entonces,
  alternatives_spanish:
  - ¿Por qué entonces
  - ¿Por qué, pues,
  lexicon: BDAG
  rationale: La combinación expresa inferencia lógica. La coma después de «entonces» ayuda a reflejar el tono conclusivo sin alterar el sentido.
- source_word: οὐκ ἐπιστεύσατε αὐτῷ
  english_pob_choice: did you not believe him
  chosen_spanish: no le creísteis
  alternatives_spanish:
  - no le creyeron
  - no confiaron en él
  - no creísteis en él
  lexicon: BDAG
  rationale: πιστεύω con dativo suele significar creer a alguien / creerle. «Le creísteis» conserva esa relación personal de aceptar su testimonio mejor que «creer en él».
theological_decisions:
- issue: Sentido reverencial de «del cielo»
  english_pob_reading: Retain the idiom 'From heaven' in the main text
  chosen_spanish_reading: Mantener «del cielo» en el texto principal
  alternative_spanish_readings:
  - «de Dios»
  - «de origen divino»
  rationale: La expresión es un eufemismo judío reverencial para hablar de la procedencia divina. En español, «del cielo» conserva tanto la forma como la carga cultural del dicho, sin introducir una explicación interpretativa en el texto principal.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y coincide con la decisión de la POB en inglés de mantener la expresión reverencial «from heaven» en el cuerpo del versículo. No se requieren revisiones adicionales respecto del auditoría inglesa provista.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo directo y sobrio.
  - Se evitó sustituir «del cielo» por una glosa explícita en el texto principal para preservar la ambigüedad reverencial.
  - «Creísteis» conserva el dativo de πίστευω como aceptación del testimonio, no como fórmula devocional.
