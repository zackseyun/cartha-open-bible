base_translation:
  language: en
  yaml_path: translation/nt/mark/011/031.yaml
  text: And they were reasoning among themselves[a], saying, “What should we say? If we say, ‘From heaven,’ he will say, ‘Why then did you not believe him?’”
  footnotes:
  - marker: a
    text: “From heaven” is a Jewish reverential way of saying “from God” or “of divine origin.”
    reason: cultural_note
