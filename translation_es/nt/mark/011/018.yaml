translation:
  language: es
  text: Y los principales sacerdotes y los escribas oyeron esto[a], y buscaban cómo destruirlo, porque le tenían miedo; pues toda la multitud estaba asombrada ante su enseñanza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «matarlo» o «ponerlo a muerte». El verbo griego puede significar «destruir» en un sentido más amplio, aunque el contexto sugiere una intención letal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: principales sacerdotes
  alternatives_spanish:
  - sumos sacerdotes
  - jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español, «sumos sacerdotes» puede sonar más técnico, pero «principales sacerdotes» reproduce mejor el valor de grupo dirigente que el POB fijó en inglés con «chief priests», sin sugerir un único cargo singular.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la Ley
  - expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente más directo y transparente para el grupo judío del relato. Las alternativas explicitan su función, pero estrechan el término más de lo que exige el griego.
- source_word: ἤκουσαν
  english_pob_choice: heard it
  chosen_spanish: lo oyeron
  alternatives_spanish:
  - oyeron eso
  - se enteraron
  lexicon: BDAG
  rationale: El griego dice simplemente que «oyeron»; en español, «lo oyeron» mantiene la referencia implícita al episodio anterior sin añadir contenido no expresado. No se opta por «se enteraron» porque introduce una mediación interpretativa que el verbo no requiere.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - andaban buscando
  - seguían buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o en desarrollo. «Buscaban» conserva esa duratividad de manera natural en español; «seguían buscando» la vuelve más explícita, pero menos sobria.
- source_word: ἀπολέσωσιν
  english_pob_choice: destroy him
  chosen_spanish: destruirlo
  alternatives_spanish:
  - matarlo
  - quitarlo de en medio
  lexicon: BDAG
  rationale: Se preserva el alcance léxico amplio de ἀπόλλυμι con «destruirlo», como en el POB inglés. Aunque el contexto sugiere intención letal, el texto griego no usa aquí un verbo más específico para «matar».
- source_word: ἐφοβοῦντο
  english_pob_choice: they feared him
  chosen_spanish: le tenían miedo
  alternatives_spanish:
  - le temían
  - lo temían
  lexicon: BDAG
  rationale: «Le tenían miedo» expresa de forma natural el miedo continuo del imperfecto. Se evita «le temían» porque en español puede sonar más literario o más abstracto; «lo temían» es posible, pero menos idiomático aquí.
- source_word: ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - la multitud entera
  - todo el gentío
  lexicon: BDAG
  rationale: «Multitud» comunica bien ὄχλος en español bíblico contemporáneo y preserva el sentido colectivo e intenso del grupo. «Toda» refleja el griego πᾶς con naturalidad.
- source_word: ἐξεπλήσσετο
  english_pob_choice: was astonished
  chosen_spanish: estaba asombrada
  alternatives_spanish:
  - estaba maravillada
  - quedaba asombrada
  lexicon: BDAG
  rationale: El imperfecto marca estado continuo. «Estaba asombrada» reproduce bien la reacción sostenida; «maravillada» es posible, pero puede suavizar la fuerza del asombro en algunos registros.
- source_word: διδαχῇ
  english_pob_choice: teaching
  chosen_spanish: enseñanza
  alternatives_spanish:
  - doctrina
  - instrucción
  lexicon: BDAG
  rationale: «Enseñanza» es el término más natural y fiel para διδαχή en este contexto. «Doctrina» podría sonar demasiado técnico o eclesial; «instrucción» es válida pero menos directa aquí.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  english_pob_choice: at his teaching
  chosen_spanish: de su enseñanza
  alternatives_spanish:
  - por su enseñanza
  - ante su enseñanza
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo puede indicar ocasión o base. En español, «de su enseñanza» expresa con fluidez el motivo del asombro sin forzar un giro preposicional menos natural como «ante» o «por».
theological_decisions:
- issue: Alcance del propósito contra Jesús en ἀπολέσωσιν
  english_pob_reading: Rendered as 'destroy him' rather than explicitly 'kill him.'
  chosen_spanish_reading: «destruirlo» en vez de explicitar «matarlo».
  alternative_spanish_readings:
  - matarlo
  - quitarlo de en medio
  rationale: Se conserva la amplitud semántica del verbo griego y la cautela del POB inglés. El contexto apunta a una intención mortal, pero el verbo por sí mismo no obliga a restringirlo a una traducción explícitamente homicida.
  doctrine_reference: 'Principio de primacía del texto original: no estrechar el alcance lexical más allá de lo que el griego expresa directamente.'
translation_notes:
  revision_awareness: El contexto revisado muestra alta concordancia y no requiere cambios; esta versión mantiene la decisión auditada del POB inglés de conservar «destroy him» como «destruirlo», con la nota alternativa correspondiente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita del nombre divino.
  - Se usa «principales sacerdotes» para reflejar el grupo dirigente sin introducir una terminología más interpretativa.
  - «Toda la multitud» conserva el valor colectivo enfático de πᾶς ὁ ὄχλος.
  - La nota [a] está anclada en «destruirlo» para preservar la alternativa léxica documentada en el POB inglés.
