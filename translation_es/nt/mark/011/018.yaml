    issue: «lo oyeron[a]» es ambiguo y poco natural en este contexto
    rationale: ἤκουσαν puede llevar objeto implícito, pero en español «lo oyeron» normalmente sugiere que oyeron a una persona/sonido directo. Aquí el sentido contextual es que oyeron del asunto anterior. «Oyeron esto» preserva la referencia sin crear ambigüedad innecesaria.
  - severity: low
    issue: «asombrada de su enseñanza» suena menos idiomático para ἐπὶ τῇ διδαχῇ αὐτοῦ
    rationale: La idea es que el asombro se producía ante/a causa de su enseñanza. «Ante su enseñanza» expresa mejor la base u ocasión del asombro en español bíblico natural.
