review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego y la línea del POB en inglés: condición abierta, pregunta idiomática, imperativo plural, κύριος como título, y ἀποστέλλει entendido con sentido prospectivo. Sin embargo, no preserva plenamente la evidencia auditada en dos puntos: αὐτοῦ se vierte como «de él», cuando el POB inglés documenta explícitamente el referente no personal «of it» por el pollino, y falta la nota alternativa sobre ἀποστέλλει («envía» / presente vívido) que el inglés conservó como nota significativa.'
  spanish_quality_summary: El texto es claro y natural, pero «tiene necesidad de él» suena poco idiomático en español para un animal/objeto y puede sugerir persona masculina. «En seguida» es aceptable, aunque «inmediatamente» refleja con más precisión la urgencia marcana y armoniza mejor con la nota inglesa. La frase final funciona mejor con «lo devolverá aquí inmediatamente» o equivalente, evitando la leve pesadez de «enviará de vuelta aquí».
  glossary_alignment: 'Buen alineamiento con el glosario al conservar «El Señor» para κύριος. No hay conflicto con Yahvé ni otros términos base. Sí conviene ajustar el pronombre al valor contextual de αὐτοῦ como referente al pollino: en español neutro y natural, la mejor solución es integrar el referente en el verbo («lo necesita») o usar «lo» en vez de «de él».'
  issues:
  - severity: medium
    issue: αὐτοῦ está traducido como «de él»
    rationale: El inglés auditado justifica «of it», no «of him», porque el referente es el pollino. En español, «de él» resulta ambiguo y menos natural; puede entenderse como persona. Conviene reformular a «lo necesita» o «tiene necesidad de él» solo con nota, pero la primera opción lee mejor.
  - severity: medium
    issue: Falta la nota alternativa correspondiente a ἀποστέλλει
    rationale: El POB inglés preserva como nota relevante la alternativa «and he sends it back here immediately», explicando el presente vívido. Esa decisión auditada debe mantenerse también en español.
  - severity: low
    issue: «enviará de vuelta aquí» es comprensible pero menos idiomático
    rationale: Aunque no es incorrecto, en español bíblico natural «lo devolverá aquí» o «lo enviará de regreso aquí» suena más fluido y comunica mejor πάλιν en contexto de retorno.
  revised_spanish_text: 'Y si alguien les dice[a]: «¿Por qué hacen esto?», digan: «El Señor tiene necesidad de él[b]», y en seguida lo devolverá aquí[c].'
