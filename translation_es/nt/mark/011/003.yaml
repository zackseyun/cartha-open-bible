- from: 'Y si alguien les dice: «¿Por qué hacen esto?», digan: «El Señor tiene necesidad de él», y en seguida lo enviará de vuelta aquí[a].'
  to: 'Y si alguien les dice[a]: «¿Por qué hacen esto?», digan: «El Señor tiene necesidad de él[b]», y en seguida lo devolverá aquí[c].'
  rationale: 'Se corrige la referencia pronominal y la fluidez española manteniendo el sentido auditado: κύριος sigue como «El Señor»; se conserva la formalidad de χρείαν ἔχει con una nota aclaratoria; y se añade la nota necesaria sobre el presente ἀποστέλλει. «Lo devolverá aquí» expresa mejor en español el retorno implícito en πάλιν.'
