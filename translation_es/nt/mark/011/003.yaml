  text: καὶ ἐάν τις ὑμῖν εἴπῃ· Τί ποιεῖτε τοῦτο; εἴπατε ⸀ὅτι Ὁ κύριος αὐτοῦ χρείαν ἔχει· καὶ ⸀εὐθὺς αὐτὸν ἀποστέλλει ⸀πάλιν ὧδε.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/003.yaml
  text: And if anyone says to you[a], ‘Why are you doing this?’ say[b], ‘The Lord has need of it,’ and he will send it back here immediately.
  footnotes:
  - marker: a
    text: Or, 'The master has need of it.' Greek κύριος can mean 'lord' or 'master,' but here it is rendered 'Lord' in keeping with the Gospel context and the project's default for κύριος.
    reason: alternative_reading
  - marker: b
    text: Or, 'and he sends it back here immediately.' The Greek present tense ἀποστέλλει may be understood as a vivid present; the translation renders the sense as future in English.
    reason: lexical_alternative
