translation:
  language: es
  text: 'Y si alguien les dice[a]: «¿Por qué hacen esto?», digan: «El Señor tiene necesidad de él[b]», y en seguida lo devolverá aquí[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el maestro tiene necesidad de él». El griego κύριος puede significar «señor» o «maestro/amo», pero aquí se mantiene «Señor» conforme al contexto del Evangelio y a la decisión terminológica del proyecto.'
    reason: alternative_reading
  - marker: b
    text: Lit. «tiene necesidad de él». El griego puede sonar más formal que un simple «lo necesita»; el referente es el pollino mencionado antes.
    reason: lexical_explanation
  - marker: c
    text: 'O: «y en seguida lo envía de vuelta aquí». El griego ἀποστέλλει está en presente y puede entenderse como presente vívido; aquí se traduce con futuro para expresar el sentido en contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις ὑμῖν εἴπῃ
  english_pob_choice: if anyone says to you
  chosen_spanish: si alguien les dice
  alternatives_spanish:
  - si alguno les dice
  - si una persona les dice
  lexicon: BDAG
  rationale: La condición abierta del griego se expresa naturalmente en español con 'si alguien'. Mantiene el valor general de τις y el futuro eventual de la construcción sin forzar una literalidad rígida.
- source_word: Τί ποιεῖτε τοῦτο;
  english_pob_choice: Why are you doing this?
  chosen_spanish: ¿Por qué hacen esto?
  alternatives_spanish:
  - ¿Qué hacen con esto?
  - ¿Qué están haciendo con esto?
  lexicon: BDAG
  rationale: En este contexto la pregunta funciona como reto a la acción, no como consulta sobre el objeto. '¿Por qué hacen esto?' reproduce bien la fuerza idiomática de la pregunta griega y su tono confrontativo.
- source_word: εἴπατε
  english_pob_choice: say
  chosen_spanish: digan
  alternatives_spanish:
  - digan esto
  - respondan
  lexicon: BDAG
  rationale: El imperativo aoristo plural se expresa de forma natural con 'digan'. Conserva el mandato directo dirigido a los discípulos.
- source_word: Ὁ κύριος
  english_pob_choice: The Lord
  chosen_spanish: El Señor
  alternatives_spanish:
  - el maestro
  - el dueño
  lexicon: BDAG
  rationale: Se conserva 'Señor' siguiendo la decisión del POB en inglés para κύριος. En este pasaje, la forma titulada encaja con el contexto evangélico y evita reducir el término a un simple propietario.
- source_word: αὐτοῦ
  english_pob_choice: of it
  chosen_spanish: de él
  alternatives_spanish:
  - de eso
  - del animal
  lexicon: BDAG
  rationale: El antecedente inmediato es el animal mencionado en el contexto, y el español permite el pronombre masculino singular 'él' para referirse al animal de manera natural. Otras opciones explícitas sonarían más interpretativas.
- source_word: χρείαν ἔχει
  english_pob_choice: has need of it
  chosen_spanish: tiene necesidad de él
  alternatives_spanish:
  - lo necesita
  - requiere de él
  lexicon: BDAG
  rationale: Se preserva la expresión semítica y más formal 'tener necesidad', que refleja mejor χρείαν ἔχει que un simple 'necesita'. 'de él' conserva el referente pronominal del objeto.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: en seguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: '''En seguida'' comunica con claridad la inmediatez marcada por εὐθύς y suena natural en español bíblico contemporáneo. Mantiene el énfasis narrativo de Marcos.'
- source_word: ἀποστέλλει
  english_pob_choice: will send
  chosen_spanish: lo enviará de vuelta
  alternatives_spanish:
  - lo manda de vuelta
  - lo enviará
  lexicon: BDAG
  rationale: El presente histórico/prospectivo griego se vierte con futuro en español, como hizo el POB en inglés. 'De vuelta' traduce la idea de πάλιν en contexto de restitución y evita una repetición plana.
- source_word: πάλιν
  english_pob_choice: back
  chosen_spanish: de vuelta
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: En combinación con ἀποστέλλει, πάλιν expresa retorno, no mera repetición. 'De vuelta' es la opción más idiomática y precisa en español.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - hasta aquí
  - a este lugar
  lexicon: BDAG
  rationale: ὧδε es un adverbio deíctico simple; 'aquí' es la equivalencia natural en español y preserva el punto de llegada indicado en el texto.
theological_decisions:
- issue: Sentido de κύριος en el encargo de los discípulos
  english_pob_reading: '''The Lord'' refers to Jesus and is translated as a title, not reduced to ''master.'''
  chosen_spanish_reading: '''El Señor'' se conserva como título y no se reduce a ''el dueño'' o ''el maestro''.'
  alternative_spanish_readings:
  - '''el maestro'''
  - '''el dueño'''
  rationale: 'Sigo la decisión auditada del POB en inglés: κύριος se traduce por ''Lord/Señor'' por defecto en el contexto del Evangelio. En español, ''Señor'' mantiene la ambigüedad reverente y la carga narrativa sin imponer una glosa más doméstica.'
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
translation_notes:
  revision_awareness: 'El pasaje fue revisado en la última pasada sin cambios sustantivos; la versión inglesa quedó estable. La redacción española sigue esa decisión estable y conserva las dos tensiones auditadas: κύριος como título y ἀποστέλλει como futuro de sentido a partir del presente griego.'
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος, en coherencia con el léxico POB.
  - Se optó por 'en seguida' como equivalente natural de εὐθύς, frecuente en Marcos.
  - La referencia pronominal 'de él' sigue el antecedente del animal sin añadir una explicación ajena al texto.
  - '''Lo enviará de vuelta'' refleja tanto ἀποστέλλει como πάλιν, evitando separar artificialmente el envío y el retorno.'
