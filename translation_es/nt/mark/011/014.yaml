translation:
  language: es
  text: 'Y respondiendo[a], le dijo a la higuera: «Que nadie coma fruto de ti nunca más[b]». Y sus discípulos lo oían[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Y respondiendo, le dijo». «Respondiendo» es un giro narrativo común en griego, aun cuando no se registre una pregunta previa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para siempre». La expresión griega dice, literalmente, «para/hacia la era».'
    reason: alternative_reading
  - marker: c
    text: 'El imperfecto griego también puede verterse «lo oyeron»: «Y sus discípulos lo oyeron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - contestando
  - respondiendo en respuesta
  - y respondió
  lexicon: BDAG
  rationale: La fórmula griega ἀποκριθεὶς es un giro narrativo frecuente que puede funcionar aun sin discurso previo explícito. En español, «respondiendo» conserva ese matiz idiomático y la textura narrativa sin forzar un diálogo anterior inexistente.
- source_word: αὐτῇ
  english_pob_choice: to it
  chosen_spanish: le
  alternatives_spanish:
  - a ella
  - a ello
  - al árbol
  lexicon: BDAG
  rationale: El griego usa un dativo femenino por la concordancia con «higuera», pero en español el referente natural es un árbol. «Le» mantiene el dativo de destinatario y evita personificar innecesariamente al árbol; la explicitación «al árbol» quedaría más interpretativa que el original.
- source_word: Μηκέτι
  english_pob_choice: no longer ... again
  chosen_spanish: nunca más
  alternatives_spanish:
  - ya no
  - no más
  - jamás
  lexicon: BDAG
  rationale: En esta imprecación, Μηκέτι lleva una fuerza de cese definitivo. «Nunca más» recoge bien el valor intensivo y encaja con el tono de juicio del dicho.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: ever
  chosen_spanish: nunca más
  alternatives_spanish:
  - para siempre
  - por los siglos
  - hasta la eternidad
  lexicon: BDAG
  rationale: La expresión idiomática literal es «hacia/para el siglo (la era)», con sentido de permanencia indefinida. En español, «nunca más» comunica ese alcance sin introducir una formulación más teológica de lo que el contexto exige.
- source_word: ἐκ σοῦ
  english_pob_choice: from you
  chosen_spanish: de ti
  alternatives_spanish:
  - de usted
  - de él
  - de esa higuera
  lexicon: BDAG
  rationale: El griego habla directamente al árbol en segunda persona. «De ti» conserva ese trato directo y la vividness del pronombre singular.
- source_word: μηδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no persona alguna
  lexicon: BDAG
  rationale: Como sujeto indefinido negativo en español, «nadie» es la forma más natural y precisa.
- source_word: καρπὸν
  english_pob_choice: fruit
  chosen_spanish: fruto
  alternatives_spanish:
  - fruta
  - fruto alguno
  - cosecha
  lexicon: BDAG
  rationale: «Fruto» conserva el sustantivo general del griego y evita restringirlo a «fruta» en sentido alimentario moderno.
- source_word: φάγοι
  english_pob_choice: may ... eat
  chosen_spanish: coma
  alternatives_spanish:
  - comiera
  - pueda comer
  - se alimente
  lexicon: BDAG
  rationale: 'El aoristo optativo expresa deseo/imprecación. En español, el presente de subjuntivo en una prohibición o maldición indirecta transmite mejor ese valor volitivo: «Que nadie coma…».'
- source_word: ἤκουον
  english_pob_choice: were listening
  chosen_spanish: lo estaban oyendo
  alternatives_spanish:
  - lo oían
  - estaban escuchando
  - lo escuchaban
  lexicon: BDAG
  rationale: El imperfecto griego marca acción en curso. «Lo estaban oyendo» reproduce ese aspecto progresivo y además permite conservar el posible sentido alterno de «oír», documentado en el POB inglés.
- source_word: μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: Es la equivalencia idiomática normal y directa del grupo posesivo griego.
theological_decisions:
- issue: Naturaleza de la palabra de Jesús sobre la higuera
  english_pob_reading: 'Render the statement as an imprecatory wish: ''May no one ever eat fruit from you again.'''
  chosen_spanish_reading: 'Renderizarla como una imprecación: «Que nadie coma fruto de ti nunca más».'
  alternative_spanish_readings:
  - «Nadie comerá fruto de ti nunca más»
  - «Que nadie jamás coma fruto de ti»
  rationale: El optativo φάγοι expresa deseo o imprecación, no un simple futuro. La traducción española debe preservar esa fuerza volitiva y no suavizarla a una predicción.
  doctrine_reference: Mantener la tensión del texto griego; no resolverla en una lectura meramente predictiva.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y conserva la lectura auditada del POB inglés: la fórmula narrativa de ''respondiendo'', el valor intensivo de εἰς τὸν αἰῶνα, la fuerza imprecatoria del optativo φάγοι y la ambigüedad aspectual de ἤκουον entre ''oyeron'' y ''estaban oyendo''. No se introducen lecturas doctrinales ajenas al pasaje.'
  spanish_consistency_notes:
  - Se usa «fruto» para καρπός y no «fruta», por consistencia léxica con el griego general.
  - Se mantiene el tratamiento directo de segunda persona («de ti») para ἐκ σοῦ, siguiendo el texto fuente.
  - «Nadie» y «nunca más» reproducen el alcance negativo total sin añadir explicaciones.
  - «Lo estaban oyendo» preserva el imperfecto y mantiene el tono narrativo continuo.
