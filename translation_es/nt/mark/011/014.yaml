revisions:
- from: 'Y respondiendo[a], le dijo: «Que nadie[b] coma fruto de ti nunca más». Y sus discípulos lo estaban oyendo[c].'
  to: 'Y respondiendo[a], le dijo a la higuera: «Que nadie coma fruto de ti nunca más[b]». Y sus discípulos lo oían[c].'
  rationale: La revisión mantiene todas las decisiones exegéticas del borrador, pero mejora la legibilidad y la fidelidad formal en español. Se explicita «a la higuera» para evitar una referencia dativa demasiado implícita, se cambia «lo estaban oyendo» por «lo oían» para un imperfecto más idiomático, y se ajusta el anclaje de la nota temporal.
