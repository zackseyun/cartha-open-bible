review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: mantiene los dos grupos participiales (''los que iban delante'' / ''los que seguían''), el imperfecto durativo de ἔκραζον mediante ''iban gritando'', la transliteración litúrgica ''Hosanna'', y la fórmula citacional de Salmo 118:26 sin añadir una identificación mesiánica explícita. La nota de cruce con Salmo 118:26 está bien justificada.'
  spanish_quality_summary: 'El texto es claro y natural en español eclesial moderno. Sin embargo, hay un ajuste importante de terminología del proyecto: ''κύριος'' en una cita de una fórmula veterotestamentaria ligada al nombre divino debe evaluarse a la luz de la política de usar ''Yahvé'' cuando κύριος cita o alude al nombre divino. Aquí, al eco directo de Salmo 118:26, ''en el nombre de Yahvé'' preserva mejor la referencia. Además, la nota sobre ''Hosanna'' puede alinearse mejor con el audit trail inglés indicando que aquí funciona como aclamación de alabanza.'
  glossary_alignment: Buen alineamiento general con las decisiones léxicas documentadas, salvo la excepción no suficientemente justificada en 'el Señor'. Dado que el propio instructivo pide explicar cuando κύριος cita o alude al nombre divino, y aquí se trata de una cita salmódica conocida, conviene usar 'Yahvé' en el texto principal. Las demás decisiones ('Hosanna', 'Bendito', 'el que viene') son sólidas.
  issues:
  - severity: medium
    issue: Uso de 'el Señor' en lugar de 'Yahvé' en 'en el nombre del Señor'
    rationale: Aunque el griego tiene κυρίου, la frase cita/evoca Salmo 118:26, donde el referente es el nombre divino. Según la política del proyecto, cuando κύριος cita o alude al nombre divino debe explicarse y, por defecto, reflejarse como 'Yahvé' en el texto principal salvo razón fuerte en contra. Aquí no se ofrece una razón suficiente para apartarse del estándar.
  - severity: low
    issue: La nota de 'Hosanna' omite que aquí funciona como aclamación de alabanza
    rationale: El audit trail inglés no solo da el sentido etimológico ('save, please/save now'), sino también aclara su función contextual como grito de alabanza. Incluirlo mejora la fidelidad exegética y evita que el lector entienda la palabra solo como súplica literal.
  revised_spanish_text: 'Y los que iban delante y los que seguían iban gritando[b][a]: «¡Hosanna! ¡Bendito el que viene en el nombre de Yahvé!»'
  revised_footnotes:
  - marker: a
    text: «Hosanna» es un clamor litúrgico hebreo/arameo que significa algo como «¡salva, por favor!» o «¡salva ahora!», aunque aquí funciona como una aclamación de alabanza.
    reason: lexical_alternative
  - marker: b
    text: Esta aclamación hace eco de Salmo 118:26.
    reason: cross_reference
  revision_rationale: Se conserva la redacción principal del borrador porque representa bien el griego y la alusión al Salmo, pero se corrige 'el Señor' a 'Yahvé' para ajustarse a la política terminológica del proyecto en una cita que remite al nombre divino. También se afina la nota de 'Hosanna' para reflejar no solo su sentido etimológico, sino su función contextual como aclamación de alabanza.
