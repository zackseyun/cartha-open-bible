revisions:
- from: 'Y los que iban delante y los que seguían iban gritando[b][a]: «¡Hosanna! ¡Bendito el que viene en el nombre del Señor!»'
  to: 'Y los que iban delante y los que seguían iban gritando[b][a]: «¡Hosanna! ¡Bendito el que viene en el nombre de Yahvé!»'
  rationale: Se conserva la redacción principal del borrador porque representa bien el griego y la alusión al Salmo, pero se corrige 'el Señor' a 'Yahvé' para ajustarse a la política terminológica del proyecto en una cita que remite al nombre divino. También se afina la nota de 'Hosanna' para reflejar no solo su sentido etimológico, sino su función contextual como aclamación de alabanza.
