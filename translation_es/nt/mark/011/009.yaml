translation:
  language: es
  text: 'Y los que iban delante y los que seguían iban gritando[b][a]: «¡Hosanna! ¡Bendito el que viene en el nombre de Yahvé!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hosanna» es un clamor litúrgico hebreo/arameo que significa algo como «¡salva, por favor!» o «¡salva ahora!», aunque aquí funciona como una aclamación de alabanza.
    reason: lexical_alternative
  - marker: b
    text: Esta aclamación hace eco de Salmo 118:26.
    reason: cross_reference
lexical_decisions:
- source_word: οἱ προάγοντες
  english_pob_choice: those going ahead
  chosen_spanish: los que iban delante
  alternatives_spanish:
  - los que van delante
  - los que iban delante del grupo
  lexicon: BDAG
  rationale: El participio presente sustantivado describe al grupo que iba al frente de la procesión. «Los que iban delante» preserva el movimiento continuo y suena natural en español.
- source_word: οἱ ἀκολουθοῦντες
  english_pob_choice: those following
  chosen_spanish: los que seguían
  alternatives_spanish:
  - los que iban detrás
  - los que venían siguiendo
  lexicon: BDAG
  rationale: Mantiene el paralelismo con el participio presente sustantivado y refleja el grupo que acompañaba detrás de Jesús.
- source_word: ἔκραζον
  english_pob_choice: were crying out
  chosen_spanish: iban gritando
  alternatives_spanish:
  - gritaban
  - seguían gritando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada o repetida. «Iban gritando» conserva esa duración y el tono público de la aclamación.
- source_word: Ὡσαννά
  english_pob_choice: Hosanna
  chosen_spanish: Hosanna
  alternatives_spanish:
  - ¡Sálvanos, por favor!
  - ¡Sálvanos ahora!
  lexicon: BDAG
  rationale: La transliteración conserva la expresión litúrgica reconocible y su resonancia bíblica. La posible fuerza semántica de ruego se preserva en nota.
- source_word: Εὐλογημένος
  english_pob_choice: Blessed
  chosen_spanish: Bendito
  alternatives_spanish:
  - Bendecido
  - Alabado
  lexicon: BDAG
  rationale: «Bendito» reproduce bien la fórmula benedictoria y la alusión a Salmo 118:26 en un español bíblico claro.
- source_word: ὁ ἐρχόμενος
  english_pob_choice: the one who comes
  chosen_spanish: el que viene
  alternatives_spanish:
  - el que llega
  - el que está viniendo
  lexicon: BDAG
  rationale: Expresa de forma idiomática el participio articular y conserva la referencia sin añadir explícitamente un título interpretativo que el griego no formula.
- source_word: ἐν ὀνόματι κυρίου
  english_pob_choice: in the name of the Lord
  chosen_spanish: en el nombre del Señor
  alternatives_spanish:
  - con la autoridad del Señor
  - en representación del Señor
  lexicon: BDAG
  rationale: Es el equivalente bíblico y natural en español para el modismo de venir bajo la autoridad o representación del Señor.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: Sigue la convención bíblica de κύριος en este dicho fijo, tal como aparece en la cita al Salmo 118. En este contexto no se usa «Yahvé» porque el texto griego cita la fórmula tradicional con κύριος.
theological_decisions:
- issue: Si explicitar el carácter mesiánico de la aclamación
  english_pob_reading: Retain the citation-like wording 'Blessed is the one who comes in the name of the Lord' without adding 'Messiah' or 'king.'
  chosen_spanish_reading: 'Mantener la fórmula de la cita: «Bendito el que viene en el nombre del Señor», sin añadir «Mesías» ni «rey».'
  alternative_spanish_readings:
  - «Bendito el Mesías que viene en el nombre del Señor»
  - «Bendito el que viene»
  rationale: El contexto es mesiánico, pero el griego no inserta un título explícito aquí. La traducción conserva la fuerza de la alusión sin resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior anclando ambos marcadores de nota en el texto español: [b][a].'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» en mayúsculas como sustituto automático de Yahvé; aquí κύριος forma parte de una fórmula citada y tradicional.
  - Se mantuvo el orden de la aclamación y el paralelismo entre los dos grupos para reflejar el griego.
  - Se preservó «Hosanna» como transliteración litúrgica, con nota explicativa para su sentido original.
  - La frase «el que viene en el nombre del Señor» conserva la alusión escritural sin añadir títulos no expresos en el verso.
