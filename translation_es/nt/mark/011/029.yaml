    rationale: En inglés el motivo es «previous_rendering»; en español figura «alternative_reading». No afecta el texto principal, pero conviene mantener la naturaleza de la nota como variante de redacción previa, no como lectura textual alternativa.
  revised_spanish_text: 'Pero Jesús les dijo: «Les haré una pregunta[a]. Respóndanme[b], y les diré con qué autoridad hago estas cosas».

