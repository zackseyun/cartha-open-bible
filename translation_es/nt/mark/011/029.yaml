translation:
  language: es
  text: 'Pero Jesús les dijo: «Les haré una pregunta[a]. Respóndanme[b], y les diré con qué autoridad hago estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «un asunto» o, más literalmente, «una palabra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Les haré una pregunta, y respóndanme, y les diré».'
    reason: previous_rendering
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca un giro narrativo suave y de contraste con la pregunta previa; “Pero” conserva bien ese cambio en español sin sonar forzado.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: convención onomástica estándar
  rationale: Nombre propio transliterado de forma estándar al español.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  lexicon: BDAG
  rationale: “Decirles” reproduce de manera natural la fórmula narrativa griega con dativo indirecto.
- source_word: Ἐπερωτήσω ὑμᾶς
  english_pob_choice: I will ask you
  chosen_spanish: Les haré una pregunta
  alternatives_spanish:
  - Los interrogaré
  - Les preguntaré
  lexicon: BDAG
  rationale: Aunque literalmente es “preguntaré/les haré una pregunta”, en español “haré una pregunta” refleja mejor el valor idiomático de un contra-cuestionamiento en el contexto inmediato.
- source_word: ἕνα λόγον
  english_pob_choice: one question
  chosen_spanish: una pregunta
  alternatives_spanish:
  - una palabra
  - un asunto
  lexicon: BDAG
  rationale: El sentido contextual de λόγος aquí no es “palabra” en sentido léxico, sino una cuestión a responder; “pregunta” comunica el valor pragmático sin perder la tensión documentada entre traducción literal e idiomática.
- source_word: ἀποκρίθητέ μοι
  english_pob_choice: answer me
  chosen_spanish: Respóndanme
  alternatives_spanish:
  - Contéstenme
  - Háganme una respuesta
  lexicon: BDAG
  rationale: El imperativo plural exige una respuesta directa; “Respóndanme” conserva la fuerza exhortativa y el tono breve del griego.
- source_word: ἐρῶ ὑμῖν
  english_pob_choice: I will tell you
  chosen_spanish: les diré
  alternatives_spanish:
  - les hablaré
  - les explicaré
  lexicon: BDAG
  rationale: En este contexto Jesús promete comunicarles algo en respuesta; “les diré” es la forma más directa y fiel en español.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: con qué autoridad
  alternatives_spanish:
  - por qué autoridad
  - en virtud de qué autoridad
  lexicon: BDAG
  rationale: La preposición ἐν con ποίᾳ ἐξουσίᾳ expresa la base o esfera de legitimidad. “Con qué autoridad” es la formulación natural en español para esa pregunta de legitimidad o mandato.
- source_word: ταῦτα ποιῶ
  english_pob_choice: I do these things
  chosen_spanish: hago estas cosas
  alternatives_spanish:
  - estoy haciendo estas cosas
  - realizo estas cosas
  lexicon: BDAG
  rationale: El presente indicativo en discurso directo se vierte con el presente simple español. “Estas cosas” mantiene la referencia deictica amplia a las acciones en disputa.
theological_decisions:
- issue: Sentido de ἐξουσία en un debate de autoridad religiosa
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - derecho
  - poder
  rationale: La cuestión no es mera capacidad sino legitimidad delegada o reconocida para actuar; “autoridad” preserva ese peso institucional y teológico en el choque con los líderes del templo.
  doctrine_reference: autoridad de Jesús / legitimidad de su ministerio
translation_notes:
  revision_awareness: 'El texto inglés revisado separa con claridad la promesa inicial y el mandato (“I will ask you one question. Answer me, and I will tell you…”). La versión española sigue esa misma fluidez con dos unidades cortas: una afirmación/pregunta inicial y un mandato seguido de promesa.'
  spanish_consistency_notes:
  - Se mantiene “Jesús” como nombre propio y “autoridad” para ἐξουσία, conforme al principio terminológico del proyecto.
  - Se evita “Señor” o una perífrasis eclesiástica innecesaria, porque aquí el término central es la legitimidad de acción, no un título litúrgico.
  - Se usa “Respóndanme” en imperativo plural para conservar el carácter directo del original.
  - La nota a preserva la tensión léxica de λόγος sin imponer una sola equivalencia cuando el contexto admite varias.
