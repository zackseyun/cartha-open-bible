translation:
  language: es
  text: 'Y le decían[a]: «¿Con qué autoridad haces estas cosas?[b] ¿O quién te dio esta autoridad[c] para hacer estas cosas?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «le estaban diciendo». El imperfecto puede expresar acción continua o repetida.
    reason: lexical_alternative
  - marker: b
    text: O, más formalmente, «¿En qué autoridad haces estas cosas?»
    reason: lexical_alternative
  - marker: c
    text: O, «para que hagas estas cosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le decían
  lexicon: BDAG
  rationale: El imperfecto indica una acción repetida o en curso; en español, «le preguntaban» comunica mejor esa iteración que un pasado simple y encaja con la escena de confrontación.
- source_word: Ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: By what authority
  chosen_spanish: ¿Con qué autoridad
  alternatives_spanish:
  - ¿En qué autoridad?
  - ¿Con qué derecho?
  lexicon: BDAG
  rationale: «Con qué autoridad» es la forma natural en español para preguntar por la base de la autorización. Conserva el sentido de ἐν + dativo sin sonar forzado.
- source_word: ἐξουσίᾳ / ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - derecho
  - poder
  lexicon: BDAG
  rationale: «Autoridad» refleja bien la idea de autorización, jurisdicción o legitimidad delegada, que es el punto de la pregunta de los líderes.
- source_word: ταῦτα ποιεῖς / ταῦτα ποιῇς
  english_pob_choice: are you doing these things / to do these things
  chosen_spanish: haces estas cosas / para hacer estas cosas
  alternatives_spanish:
  - estás haciendo estas cosas / para que hagas estas cosas
  - haces esto / para hacer esto
  lexicon: BDAG
  rationale: Se conserva el plural «estas cosas» para reflejar ταῦτα y la referencia amplia a las acciones recientes de Jesús. El infinitivo final se vierte de manera natural con «para hacer».
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  - ¿O bien
  lexicon: BDAG
  rationale: Introduce una segunda formulación de la misma impugnación; en español, «¿O» mantiene la relación alternativa y el tono interrogativo.
- source_word: τίς σοι ἔδωκεν
  english_pob_choice: who gave you
  chosen_spanish: quién te dio
  alternatives_spanish:
  - quién te ha dado
  lexicon: BDAG
  rationale: El aoristo ἔδωκεν se traduce de forma natural con pasado simple en español en una pregunta directa.
- source_word: ἵνα ταῦτα ποιῇς
  english_pob_choice: to do these things
  chosen_spanish: para hacer estas cosas
  alternatives_spanish:
  - para que hagas estas cosas
  - a fin de hacer estas cosas
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad; «para hacer estas cosas» preserva esa función sin volver la frase pesada. La alternativa con subjuntivo queda implícitamente abierta por el sentido final.
theological_decisions:
- issue: Fuente de la autoridad de Jesús
  english_pob_reading: Render the leaders' question neutrally as a challenge to Jesus' authority without importing an explicit divine-source answer into the translation.
  chosen_spanish_reading: La pregunta se presenta como desafío a la autoridad de Jesús, sin añadir en la traducción una respuesta explícita sobre su origen divino.
  alternative_spanish_readings:
  - Una formulación interpretativa podría sugerir más directamente autoridad divina.
  - Podría traducirse de forma más explicativa, pero eso resolvería la tensión del pasaje.
  rationale: El versículo es una acusación/pregunta de los dirigentes, no la respuesta narrativa. La redacción debe dejar abierta la tensión teológica que el contexto desarrolla después.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla en la traducción.
translation_notes:
  revision_awareness: Ajusté el texto para anclar explícitamente ambos marcadores de nota en la traducción, corrigiendo el fallo previo de validación. La redacción mantiene el paralelismo del griego y conserva la tensión sobre la autoridad sin interpretarla.
  spanish_consistency_notes:
  - Se mantiene «autoridad» como término técnico para ἐξουσία, coherente con el criterio POB en inglés.
  - Se conserva «estas cosas» para reflejar ταῦτα en ambos miembros de la pregunta.
  - El tono es neutral y bíblico, sin recurrir a un léxico eclesiástico que suavice el desafío del pasaje.
