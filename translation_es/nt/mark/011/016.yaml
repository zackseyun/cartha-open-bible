translation:
  language: es
  text: Y no permitía que nadie llevara un objeto[a][b] a través de los recintos del templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de los atrios del templo». El término griego se refiere al complejo del templo en sentido amplio, no al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «llevar un recipiente» o «llevar un utensilio». La palabra griega es amplia y no especifica qué clase de objeto era.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤφιεν
  english_pob_choice: would not allow
  chosen_spanish: no permitía
  alternatives_spanish:
  - no dejaba
  - no autorizaba
  lexicon: BDAG
  rationale: El imperfecto de ἀφίημι expresa acción continua o repetida; en español, «no permitía» reproduce bien la idea de impedir de manera sostenida sin sonar mecánico.
- source_word: ἵνα τις διενέγκῃ
  english_pob_choice: anyone to carry
  chosen_spanish: que nadie llevara
  alternatives_spanish:
  - que alguien transportara
  - que cualquiera pasara llevando
  lexicon: BDAG
  rationale: La construcción con ἵνα + subjuntivo después de ἤφιεν expresa lo que no dejaba que ocurriera. «Que nadie llevara» comunica con naturalidad la prohibición general.
- source_word: διενέγκῃ
  english_pob_choice: carry
  chosen_spanish: llevara
  alternatives_spanish:
  - transportara
  - pasara cargando
  lexicon: BDAG
  rationale: El verbo puede significar llevar o transportar de un lugar a otro, especialmente atravesando un espacio. «Llevara» es la opción más clara y amplia en español; el matiz direccional queda en «por».
- source_word: σκεῦος
  english_pob_choice: a vessel
  chosen_spanish: un objeto
  alternatives_spanish:
  - un recipiente
  - un utensilio
  - un recipiente u objeto
  lexicon: BDAG
  rationale: σκεῦος es un término amplio. Siguiendo la nota auditada en inglés, «objeto» evita precisar indebidamente el tipo de cosa; en español, «vessel» no sería natural y podría sonar demasiado técnico o ambiguo.
- source_word: διὰ τοῦ ἱεροῦ
  english_pob_choice: through the temple courts
  chosen_spanish: por los atrios del templo
  alternatives_spanish:
  - por el templo
  - por el recinto del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no el santuario interior (ναός). «Atrios del templo» comunica bien el espacio amplio y público al que se refiere el texto, manteniendo la precisión del audit trail inglés.
theological_decisions:
- issue: Alcance de ἱερόν en el templo de Jerusalén
  english_pob_reading: the broader temple complex, rendered 'temple courts'
  chosen_spanish_reading: el complejo/recinto amplio del templo, rendido como «atríos del templo»
  alternative_spanish_readings:
  - «el templo»
  - «el recinto del templo»
  rationale: No se trata de una diferencia doctrinal, sino de precisión contextual. La traducción evita sugerir el santuario interior y refleja que la acción de Jesús concernía el tránsito por el área exterior y pública del templo.
  doctrine_reference: No aplica; decisión léxica-contextual sobre el espacio del templo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no registran revisiones sustantivas; se mantiene la decisión de traducir ἱερόν como el complejo exterior del templo y σκεῦος con un término amplio, sin sobreespecificar el objeto.
  spanish_consistency_notes:
  - Se conserva la distinción de POB entre el santuario interior y el complejo exterior del templo.
  - Se mantiene un registro amplio para σκεῦος, en línea con la evidencia léxica, evitando términos demasiado concretos.
  - El imperfecto se refleja con una forma verbal durativa en español («no permitía»).
