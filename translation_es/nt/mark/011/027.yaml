translation:
  language: es
  text: Y vinieron de nuevo a Jerusalén. Y mientras caminaba en el templo[a], vinieron a él los principales sacerdotes, los escribas y los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en los atrios del templo' o 'en el recinto del templo'; el griego se refiere al complejo más amplio del templo, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: volvieron
  alternatives_spanish:
  - vinieron
  - regresaron
  lexicon: BDAG
  rationale: El griego usa presente histórico, pero en español narrativo natural conviene un pretérito que mantenga el avance del relato. 'Volvieron' comunica la idea de regreso implicada por πάλιν sin sonar forzado.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Se conserva la repetición de la llegada a Jerusalén. 'Otra vez' es claro y fluido en español bíblico contemporáneo.
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio estándar en español.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple courts
  chosen_spanish: en el templo
  alternatives_spanish:
  - en los atrios del templo
  - en el recinto del templo
  - en el área del templo
  lexicon: BDAG
  rationale: ἱερόν señala el complejo del templo, no el santuario interior (ναός). En español, 'en el templo' es fiel y natural; el matiz espacial más amplio queda señalado en nota porque el inglés POB también preservó esa alternativa.
- source_word: περιπατοῦντος αὐτοῦ
  english_pob_choice: as he was walking
  chosen_spanish: mientras él andaba
  alternatives_spanish:
  - mientras caminaba
  - cuando él andaba
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una acción en curso de fondo. 'Mientras él andaba' conserva el aspecto progresivo sin añadir interpretación.
- source_word: ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los jefes de los sacerdotes
  - los sumos sacerdotes
  lexicon: BDAG
  rationale: '''Principales sacerdotes'' refleja bien el grupo dirigente sacerdotal y evita una equivalencia demasiado técnica o litúrgica que podría oscurecer el plural institucional del griego.'
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los expertos en la ley
  - los doctores de la ley
  lexicon: BDAG
  rationale: '''Escribas'' es el equivalente léxico directo y se entiende bien en el contexto narrativo de los Evangelios.'
- source_word: πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los mayores
  lexicon: BDAG
  rationale: En este contexto institucional, el término designa a los dirigentes reconocidos. 'Ancianos' mantiene la equivalencia tradicional y el valor técnico del grupo.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - ante él
  lexicon: BDAG
  rationale: La preposición indica movimiento hacia Jesús; 'a él' es idiomático en español y suficiente para la relación espacial/direccional.
theological_decisions:
- issue: Alcance espacial de ἱερόν
  english_pob_reading: in the temple courts
  chosen_spanish_reading: en el templo
  alternative_spanish_readings:
  - en los atrios del templo
  - en el recinto del templo
  rationale: 'No se trata de una decisión doctrinal sino espacial: el griego se refiere al complejo del templo, no al santuario interior. En español, la forma base ''en el templo'' es clara; la nota preserva el matiz del complejo más amplio para no inducir una imagen demasiado restringida.'
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran acuerdo alto y sin revisiones aplicadas en la última pasada. La versión española sigue esa línea estable, manteniendo el presente histórico griego en una narrativa natural con pretérito y conservando el matiz espacial de ἱερόν mediante nota.
  spanish_consistency_notes:
  - Se mantiene 'Jerusalén' como topónimo estándar.
  - Se evita 'SEÑOR' u otras sustituciones innecesarias porque no aparece κύριος en este versículo.
  - '''Escribas'' y ''ancianos'' conservan el valor institucional del pasaje.'
  - '''Principales sacerdotes'' preserva el plural del griego y evita singularizar indebidamente el grupo.'
