  text: διὰ τοῦτο λέγω ὑμῖν, πάντα ὅσα ⸂προσεύχεσθε καὶ αἰτεῖσθε⸃, πιστεύετε ὅτι ⸀ἐλάβετε, καὶ ἔσται ὑμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/024.yaml
  text: For this reason I tell you[a], whatever you pray and ask for, believe that you have received it[b], and it will be yours.
  footnotes:
  - marker: a
    text: Some manuscripts/readings are understood or rendered as 'believe that you receive them' rather than 'believe that you have received them.' The Greek text used here reads 'have received,' preserving the completed-action sense.
    reason: alternative_reading
  - marker: b
    text: Or 'whatever things you pray and ask for'.
    reason: previous_rendering
