translation:
  language: es
  text: 'Por esta razón les digo: todo lo que[a] oren y pidan, crean que ya lo han recibido[b], y será suyo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. 'todas las cosas que'; también puede entenderse 'todo cuanto oren y pidan'.
    reason: previous_rendering
  - marker: b
    text: Algunas lecturas manuscritas se entienden o se traducen como 'crean que reciben' en vez de 'crean que ya lo han recibido'. El texto griego usado aquí dice 'han recibido', preservando el sentido de acción completa.
    reason: alternative_reading
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa la relación causal/inferencial con el contexto previo sin endurecer el estilo. 'Por esta razón' mantiene el tono explicativo y natural en español.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: Conserva la forma de dirección personal y autoridad. En español, 'les digo' es natural y fiel a la fórmula directa del griego.
- source_word: πάντα ὅσα
  english_pob_choice: whatever things
  chosen_spanish: todo cuanto
  alternatives_spanish:
  - todo lo que
  - cuanto
  lexicon: BDAG
  rationale: '''Todo cuanto'' preserva la amplitud y el carácter general de la construcción griega sin sonar forzado. Mantiene la apertura del alcance pedido en la oración.'
- source_word: προσεύχεσθε
  english_pob_choice: you pray
  chosen_spanish: oren
  alternatives_spanish:
  - estén orando
  - hagan oración
  lexicon: BDAG
  rationale: El verbo se refiere a la acción de orar en general. En español, 'oren' es claro y digno, y mantiene el aspecto general sin sobrecargar la frase.
- source_word: αἰτεῖσθε
  english_pob_choice: and ask for
  chosen_spanish: pidan
  alternatives_spanish:
  - soliciten
  - rueguen
  lexicon: BDAG
  rationale: '''Pidan'' conserva la petición explícita diferenciada de ''orar'', reflejando el par verbal del griego y la nuance de solicitud.'
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: crean
  alternatives_spanish:
  - tengan fe
  - confíen
  lexicon: BDAG
  rationale: '''Crean'' es la equivalencia directa y natural de πιστεύω en este contexto, apta para introducir la cláusula de contenido que sigue.'
- source_word: ὅτι ⸀ἐλάβετε
  english_pob_choice: that you have received it
  chosen_spanish: que ya lo han recibido
  alternatives_spanish:
  - que lo recibieron
  - que ya recibieron
  lexicon: BDAG
  rationale: Se conserva el valor de aoristo con fuerza de acción completada. 'Ya lo han recibido' comunica en español la anterioridad resultativa sin borrar la tensión temporal del texto griego.
- source_word: ἔσται ὑμῖν
  english_pob_choice: and it will be yours
  chosen_spanish: les será concedido
  alternatives_spanish:
  - será de ustedes
  - les pertenecerá
  lexicon: BDAG
  rationale: La cláusula final promete el resultado para los discípulos. 'Les será concedido' evita un calco rígido y expresa el carácter de don/otorgamiento implicado en el contexto de petición y respuesta.
theological_decisions:
- issue: Tensión temporal entre creer y recibir
  english_pob_reading: 'Retain the paradoxical sequence: believe that you have received them, and they will be yours.'
  chosen_spanish_reading: 'Conservar la secuencia paradójica: crean que ya lo han recibido, y les será concedido.'
  alternative_spanish_readings:
  - crean que lo reciben, y les será concedido
  - crean que lo recibirán, y les será concedido
  rationale: El griego usa ἐλάβετε (aoristo), no un presente ni un futuro. La traducción conserva la fuerza de acción completada en vez de suavizarla. Así se mantiene la tensión teológica del dicho sobre la fe y la oración.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el ajuste del inglés POB más reciente, que separa explícitamente ''pray'' y ''ask for'' y mantiene el valor completado de ''have received''. También se respetó la revisión que evita fusionar indebidamente los dos verbos, por lo que en español se conservaron ambos: ''oren y pidan''.'
  spanish_consistency_notes:
  - Se usó 'Yahvé' no porque aparezca en este versículo, sino por la política general del proyecto; aquí no aplica.
  - Se evitó 'tener fe' como traducción primaria de πιστεύετε para mantener la correspondencia directa con 'crean'.
  - Se optó por una cláusula final pasiva ('les será concedido') en lugar de una formulación posesiva más literal, para expresar con naturalidad el resultado prometido sin añadir un sujeto explícito que el griego no da.
