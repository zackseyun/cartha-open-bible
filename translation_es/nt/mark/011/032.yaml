translation:
  language: es
  text: 'Pero si decimos[a]: «¿De los hombres?»—tenían miedo de la multitud,[b] porque todos consideraban que Juan verdaderamente era un profeta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «De seres humanos»; o, más interpretativamente, «De origen humano».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego también puede traducirse: «todos tenían a Juan por un profeta de verdad» o «todos consideraban que Juan era realmente un profeta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Pero si
  lexicon: BDAG
  rationale: La conjunción adversativa introduce la rama alternativa del razonamiento; «Pero» conserva el contraste sin añadir elementos interpretativos. «Mas» es posible, pero menos natural en español moderno.
- source_word: εἴπωμεν
  english_pob_choice: if we say
  chosen_spanish: si decimos
  alternatives_spanish:
  - si dijéramos
  - si llegamos a decir
  lexicon: BDAG
  rationale: 'En este contexto deliberativo, el subjuntivo español expresa bien la hipótesis interna del discurso: «si decimos». Mantiene la apertura de la alternativa sin volverla una afirmación directa.'
- source_word: Ἐξ ἀνθρώπων
  english_pob_choice: From men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de seres humanos
  - de origen humano
  lexicon: BDAG
  rationale: La frase señala el origen humano frente al divino. «De los hombres» reproduce de cerca la forma y el contraste del griego; «de origen humano» es más interpretativo y por eso queda como alternativa.
- source_word: ἐφοβοῦντο
  english_pob_choice: they were afraid of
  chosen_spanish: temían a
  alternatives_spanish:
  - tenían miedo de
  - les temían
  lexicon: BDAG
  rationale: El imperfecto comunica una disposición continua o situacional de temor. «Temían a» es breve, natural y conserva el objeto directo personal en español.
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: En Marcos, ὄχλος designa al grupo reunido de personas; «multitud» es equivalente y solemne, mientras que «gente» sería demasiado general.
- source_word: ἅπαντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: ἅπαντες expresa totalidad distributiva. «Todos» es la manera más natural y directa de decirlo en español.
- source_word: εἶχον
  english_pob_choice: held
  chosen_spanish: tenían por cierto
  alternatives_spanish:
  - consideraban
  - lo tenían por
  lexicon: BDAG
  rationale: Aquí ἔχω con complemento predicativo expresa una opinión sostenida. «Tenían por cierto» transmite bien la fuerza de «held that» y su valor de convicción asentada.
- source_word: ὄντως ὅτι
  english_pob_choice: truly was
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - de veras
  lexicon: BDAG
  rationale: El adverbio intensifica la afirmación de que Juan era profeta. «Verdaderamente» conserva esa fuerza y, unido a «era un profeta», refleja el énfasis del texto sin sobrecargar la sintaxis.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: BDAG
  rationale: El predicado nominal anarthro en español requiere artículo indefinido para sonar natural y fiel. «Un profeta» expresa el estatus reconocido por la multitud.
theological_decisions:
- issue: Origen humano frente a divino en la pregunta implícita sobre Juan
  english_pob_reading: From men
  chosen_spanish_reading: de los hombres
  alternative_spanish_readings:
  - de seres humanos
  - de origen humano
  rationale: La frase funciona como contraste teológico entre autoridad humana y autoridad dada por Dios. «De los hombres» mantiene ese contraste de forma sobria y evita suavizar la oposición implícita.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 4
- issue: Fuerza de la afirmación sobre Juan como profeta
  english_pob_reading: everyone held that John truly was a prophet
  chosen_spanish_reading: todos tenían por cierto que Juan era verdaderamente un profeta
  alternative_spanish_readings:
  - todos consideraban que Juan era realmente un profeta
  - todos sostenían que Juan era un profeta de verdad
  rationale: El versículo reporta la percepción popular, no una declaración narrativa independiente. «Tenían por cierto» preserva el carácter de convicción colectiva y «verdaderamente» conserva el matiz enfático de ὄντως.
  doctrine_reference: DOCTRINE.md §Translation philosophy, item 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el estado de revisión más reciente: no se registraron cambios aplicados y el pase final indicó que el texto estaba sin cambios necesarios. La redacción española busca respetar ese equilibrio, manteniendo la alternativa deliberativa, el contraste humano/divino y el énfasis en la convicción popular sin añadir explicaciones ajenas al griego.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton ni un sustituto directo.
  - Se mantuvo «profeta» y no se introdujo terminología eclesiástica más fuerte.
  - La puntuación refleja el diálogo interior con guion largo y comillas para la alternativa, siguiendo el valor discursivo del griego.
  - «La multitud» corresponde al valor narrativo de ὄχλος y evita el registro demasiado general de «gente».
