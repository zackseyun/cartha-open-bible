translation:
  language: es
  text: Y muchos extendieron sus mantos[a] sobre el camino, y otros extendieron ramas[b] cortadas de los campos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'capas'; ἱμάτια designa prendas exteriores, aquí probablemente colocadas como muestra de honor.
    reason: lexical_alternative
  - marker: b
    text: O simplemente 'follaje cortado'; στιβάδας puede referirse de manera más amplia a ramas o masas de follaje cortado, no necesariamente a 'ramas de palma'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran cantidad de personas
  - muchísima gente
  lexicon: BDAG
  rationale: πολλοὶ es un adjetivo cuantitativo simple; 'muchos' es la equivalencia natural y directa en español, sin añadir énfasis que no está explícito en el griego.
- source_word: ἱμάτια
  english_pob_choice: cloaks
  chosen_spanish: mantos
  alternatives_spanish:
  - vestidos
  - prendas
  - capas
  lexicon: BDAG
  rationale: En este contexto narrativo, ἱμάτια se refiere a prendas exteriores colocadas sobre el camino. 'Mantos' comunica esa idea de manera clara y digna en español, con mayor especificidad que 'vestidos' o 'prendas'.
- source_word: ἔστρωσαν
  english_pob_choice: spread
  chosen_spanish: extendieron
  alternatives_spanish:
  - esparcieron
  - pusieron
  - tendieron
  lexicon: BDAG
  rationale: El verbo expresa la acción de tender o extender sobre una superficie. 'Extendieron' funciona de forma natural en español con los mantos y conserva la imagen de cubrir el camino.
- source_word: εἰς τὴν ὁδόν
  english_pob_choice: on the road
  chosen_spanish: sobre el camino
  alternatives_spanish:
  - en el camino
  - por el camino
  - sobre la vía
  lexicon: BDAG
  rationale: Con στρώννυμι, εἰς τὴν ὁδόν tiene sentido idiomático de colocar algo sobre la superficie. 'Sobre el camino' refleja mejor esa relación espacial que una traducción estrictamente literal de εἰς.
- source_word: ἄλλοι δὲ
  english_pob_choice: and others
  chosen_spanish: y otros
  alternatives_spanish:
  - pero otros
  - mientras otros
  lexicon: BDAG
  rationale: δέ introduce una transición suave y aditiva. 'Y otros' suena natural en español narrativo sin sobredimensionar el contraste.
- source_word: στιβάδας
  english_pob_choice: branches
  chosen_spanish: ramas
  alternatives_spanish:
  - ramas cortadas
  - follaje
  - matas de follaje
  lexicon: BDAG
  rationale: στιβάς puede referirse a material vegetal cortado, una masa de follaje o ramas. El texto inglés optó por 'branches' y la forma más sobria y fiel en español es 'ramas', dejando abierta la amplitud semántica sin importar 'palmas'.
- source_word: κόψαντες
  english_pob_choice: cut
  chosen_spanish: cortaron
  alternatives_spanish:
  - habiendo cortado
  - talando
  - recortaron
  lexicon: BDAG
  rationale: 'El participio aoristo antecede a la acción principal, pero en español puede naturalizarse como verbo finito dentro de la coordinación narrativa: ''y otros cortaron''. Mantiene la secuencia sin sonar forzado.'
- source_word: ἐκ τῶν ἀγρῶν
  english_pob_choice: from the fields
  chosen_spanish: de los campos
  alternatives_spanish:
  - de los campos cercanos
  - del campo
  - de las tierras
  lexicon: BDAG
  rationale: ἀγροί son campos o terreno abierto. 'De los campos' es directo, claro y acorde con el registro del pasaje.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego SBLGNT y el audit trail inglés de la POB, manteniendo la equivalencia óptima: se conserva la estructura narrativa, se evita importar ''palmas'' donde el griego no las menciona, y se ajustan ''cloaks'' y ''branches'' a opciones naturales y auditablemente fieles en español.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo exige; este versículo no contiene el nombre divino.
  - Se evita 'Cristo' porque no aparece ningún término Χριστός en el versículo.
  - Se mantiene el orden narrativo simple para reflejar la coordinación del griego y del inglés auditado.
  - Se preserva la ambigüedad de στιβάδας con una nota al pie, ya que el inglés POB también documenta la alternativa más amplia.
