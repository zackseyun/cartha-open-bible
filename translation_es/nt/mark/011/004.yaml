translation:
  language: es
  text: Y se fueron y encontraron un pollino atado junto a una puerta afuera en la calle[a], y lo desataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «junto a una puerta afuera sobre la calle». La frase griega admite un matiz espacial ligeramente distinto según cómo se entienda la relación de «en la calle» con la puerta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se alejaron
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa salida o alejamiento del lugar de instrucciones. «Se fueron» conserva bien ese movimiento y suena natural en español.
- source_word: εὗρον
  english_pob_choice: found
  chosen_spanish: encontraron
  alternatives_spanish:
  - hallaron
  - dieron con
  lexicon: BDAG
  rationale: En narrativa, εὑρίσκω se expresa de forma directa con «encontraron». Mantiene claridad y registro sobrio.
- source_word: πῶλον
  english_pob_choice: colt
  chosen_spanish: pollino
  alternatives_spanish:
  - potrillo
  - colt
  lexicon: BDAG
  rationale: πῶλος designa un animal joven. «Pollino» funciona bien en español para un asno joven y evita sobreespecificar más de lo que este versículo dice por sí solo.
- source_word: δεδεμένον
  english_pob_choice: tied
  chosen_spanish: atado
  alternatives_spanish:
  - amarrado
  - ligado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado ya establecido. «Atado» es la equivalencia más natural y concreta en este contexto.
- source_word: πρὸς θύραν
  english_pob_choice: at a door
  chosen_spanish: junto a una puerta
  alternatives_spanish:
  - por una puerta
  - al lado de una puerta
  lexicon: BDAG
  rationale: πρός con acusativo indica cercanía o ubicación próxima. «Junto a una puerta» refleja bien esa relación espacial sin forzar una precisión innecesaria.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: afuera
  alternatives_spanish:
  - fuera
  - al exterior
  lexicon: BDAG
  rationale: ἔξω señala exterioridad. «Afuera» es idiomático en español y mantiene el contraste con el interior.
- source_word: ἐπὶ τοῦ ἀμφόδου
  english_pob_choice: on the street
  chosen_spanish: sobre la calle
  alternatives_spanish:
  - en la calle
  - en la vía
  - sobre el camino
  lexicon: BDAG
  rationale: ἄμφοδον se refiere a una calle, callejón o paso abierto. Con ἐπί más genitivo, la escena ubica la puerta respecto de esa vía; «sobre la calle» conserva esa relación espacial, aunque en español también podría entenderse como 'en la calle'.
- source_word: λύουσιν αὐτόν
  english_pob_choice: they untied it
  chosen_spanish: lo desataron
  alternatives_spanish:
  - lo soltaron
  - lo desamarraron
  lexicon: BDAG
  rationale: El presente histórico λύουσιν se vierte naturalmente en pasado narrativo en español. «Desataron» reproduce la acción concreta con sencillez y precisión.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el audit trail inglés. La única tensión relevante es la localización de la puerta respecto de la calle/callejón; se conservó una redacción española clara y se dejó nota alternativa.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y otras sustituciones innecesarias porque el pasaje no contiene κύριος ni lenguaje divino.
  - «Pollino» mantiene la fuerza de un animal joven sin añadir la identificación explícita de «asno joven», que el contexto ampliará si corresponde en versículos adyacentes.
  - El verbo final se puso en pretérito simple para reflejar el presente histórico griego en un español narrativo natural.
