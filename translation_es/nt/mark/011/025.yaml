translation:
  language: es
  text: Y cuando estén de pie orando[a], perdonen, si tienen algo contra alguien, para que también su Padre, que está en los cielos, les perdone sus transgresiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando estén orando».
    reason: lexical_alternative
lexical_decisions:
- source_word: στήκετε
  english_pob_choice: stand
  chosen_spanish: estén
  alternatives_spanish:
  - estén de pie
  - permanezcan
  lexicon: BDAG
  rationale: El griego presenta una acción habitual con valor de costumbre bajo ὅταν. En español, «estén orando» comunica naturalmente la situación sin forzar una imagen corporal rígida; se conserva la relación con la oración y el carácter reiterado del mandato.
- source_word: προσευχόμενοι
  english_pob_choice: praying
  chosen_spanish: orando
  alternatives_spanish:
  - orando mientras están de pie
  - rezando
  lexicon: BDAG
  rationale: El participio es contemporáneo con στήκετε. «Orando» mantiene el paralelismo con el griego y suena más natural que una perífrasis pesada; «rezando» se evita por su registro más estrecho en español contemporáneo.
- source_word: ἀφίετε
  english_pob_choice: forgive
  chosen_spanish: perdonen
  alternatives_spanish:
  - absuelvan
  - dejen ir
  lexicon: BDAG
  rationale: En este contexto interpersonal, ἀφίημι significa perdonar o remitir una ofensa. «Perdonen» es la equivalencia española más clara e idiomática y enlaza bien con la segunda mitad del versículo.
- source_word: εἴ τι ἔχετε κατά τινος
  english_pob_choice: if you have anything against anyone
  chosen_spanish: si tienen algo contra alguien
  alternatives_spanish:
  - si tienen algo en contra de alguien
  - si guardan algo contra alguien
  lexicon: BDAG
  rationale: La construcción con κατά + genitivo expresa agravio u hostilidad contra una persona. «Tener algo contra alguien» es la fórmula española natural y conserva la amplitud indefinida de τι / τινος.
- source_word: ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: your Father who is in the heavens
  chosen_spanish: su Padre, que está en los cielos
  alternatives_spanish:
  - su Padre en los cielos
  - su Padre celestial
  lexicon: BDAG
  rationale: Se conserva el plural explícito de οὐρανοῖς mediante «los cielos». «Que está en los cielos» mantiene la forma del texto mejor que la frase tradicional singular «en el cielo».
- source_word: ἀφῇ
  english_pob_choice: may also forgive
  chosen_spanish: les perdone
  alternatives_spanish:
  - también les perdone
  - pueda perdonarles
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἵνα expresa finalidad o resultado. En español, el subjuntivo presente «perdone» reproduce bien esa dependencia sin debilitar la conexión causal del versículo.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - ofensas
  - tropiezos
  - faltas
  lexicon: BDAG
  rationale: παράπτωμα denota una falta, desliz u ofensa; «transgresiones» preserva con precisión el matiz de quebranto de un límite. Se evita «pecados» porque sería más general que el término griego.
theological_decisions:
- issue: Vínculo entre perdonar a otros y recibir perdón del Padre
  english_pob_reading: 'Rendered the clause straightforwardly as a purpose statement without softening the condition: believers are commanded to forgive so that the Father may forgive them.'
  chosen_spanish_reading: 'La cláusula se traduce de manera directa como finalidad: se manda perdonar para que también el Padre perdone. No se atenúa la relación textual entre ambas acciones.'
  alternative_spanish_readings:
  - una lectura meramente ejemplar o evidencial que haga del perdón humano solo una señal externa
  - una paráfrasis que suavice el nexo final para convertirlo en una observación general
  rationale: ἵνα ... ἀφῇ establece una conexión real en el texto. La traducción conserva esa tensión sin resolverla mediante explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Preservar la tensión teológica del pasaje sin diluir su fuerza condicional.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el auditorio inglés de la POB, sin cambios respecto del pass más reciente; conserva el plural explícito «los cielos» y el valor relacional de παράπτωμα mediante «transgresiones».
  spanish_consistency_notes:
  - Se mantiene «Padre» para ὁ πατὴρ ὑμῶν y no se introduce una fórmula eclesiástica más tradicional que el griego no exige.
  - «Los cielos» preserva el plural de οὐρανοῖς, coherente con la política POB de no ocultar esa forma.
  - «Transgresiones» se usa con valor lexical preciso; no se sustituye por «pecados» para no borrar el matiz de παράπτωμα.
  - El español conserva un tono bíblico claro y natural, evitando calcos innecesarios como «perdonando» o «haciendo oración».
