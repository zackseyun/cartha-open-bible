revisions:
- from: Y cuando estén orando[a], perdonen, si tienen algo contra alguien[b], para que también su Padre, que está en los cielos, les perdone sus transgresiones.
  to: Y cuando estén de pie orando[a], perdonen, si tienen algo contra alguien, para que también su Padre, que está en los cielos, les perdone sus transgresiones.
  rationale: Se restaura en el texto principal la imagen concreta de στήκετε ('de pie') conforme a la decisión fuente/POB, se añade 'también' para reflejar καί, y se simplifican las notas para evitar sobreexplicación e interpretación añadida. El resultado sigue siendo natural en español y más fiel al original y a la auditoría inglesa.
