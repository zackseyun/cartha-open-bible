review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mandato de perdonar al orar, queja indefinida contra cualquiera, y finalidad de que el Padre perdone. Sin embargo, omite en el texto principal la imagen concreta de στήκετε (''estar de pie''), que el English POB decidió preservar en la línea principal, y también omite ''también'' para καί antes de ''les perdone''.'
  spanish_quality_summary: 'El español es claro y digno, pero puede ajustarse para alinearse mejor con la filosofía POB. ''Y cuando estén orando'' suena natural, pero pierde un detalle concreto del original que sí conviene mantener en español con buena fluidez: ''Y cuando estén de pie orando''. El resto del verso lee bien. Las notas actuales introducen explicación innecesaria y una alternativa interpretativa (''guardan rencor'') que va más allá del texto.'
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. 'Padre ... en los cielos' está bien y preserva el plural. 'Transgresiones' es aceptable para παραπτώματα, aunque 'ofensas' o 'faltas' también serían posibles; no requiere cambio. El problema principal es de alineación con la decisión léxica documentada para στήκετε y con la conservación de καί ('también').
  issues:
  - severity: medium
    issue: Se omite 'de pie' en la línea principal para στήκετε.
    rationale: La evidencia fuente y la auditoría inglesa escogieron preservar la postura concreta 'stand'. El español puede hacerlo naturalmente con 'estén de pie orando' sin volverse torpe.
  - severity: medium
    issue: Falta 'también' antes de 'les perdone'.
    rationale: El griego tiene καὶ y la auditoría inglesa lo conservó ('may also forgive'). En español debe reflejarse para mantener la relación explícita entre el perdón humano y el divino.
  - severity: low
    issue: La nota [a] es demasiado explicativa y justifica una omisión del texto principal.
    rationale: Si se corrige el texto principal para incluir 'de pie', la nota puede reducirse a la alternativa más idiomática 'cuando estén orando' y a la aclaración sobre 'los cielos' no aquí sino en la cláusula siguiente si se desea, pero no hace falta explicar una pérdida ya corregida.
  - severity: low
    issue: La nota [b] incluye 'guardan rencor contra alguien', que interpreta más que traduce.
    rationale: εἴ τι ἔχετε κατά τινος expresa tener algo contra alguien; 'guardar rencor' estrecha y psicologiza el sentido.
  revised_spanish_text: Y cuando estén de pie orando[a], perdonen, si tienen algo contra alguien, para que también su Padre, que está en los cielos, les perdone sus transgresiones.
  revised_footnotes:
  - marker: a
    text: O «cuando estén orando».
    reason: lexical_alternative
  revision_rationale: Se restaura en el texto principal la imagen concreta de στήκετε ('de pie') conforme a la decisión fuente/POB, se añade 'también' para reflejar καί, y se simplifican las notas para evitar sobreexplicación e interpretación añadida. El resultado sigue siendo natural en español y más fiel al original y a la auditoría inglesa.
