- from: 'Y respondiendo a Jesús[a], dijeron: «No lo sabemos». Y Jesús les dice: «Ni yo les digo por qué autoridad hago estas cosas».'
  to: 'Y respondiendo a Jesús[a], dijeron: «No sabemos». Y Jesús les dice: «Ni yo les digo con qué autoridad hago estas cosas».'
  rationale: Se eliminó «lo» para no añadir un objeto ausente en el griego, y se cambió «por qué autoridad» por «con qué autoridad» para reflejar con precisión e idiomaticidad el sentido de ἐν ποίᾳ ἐξουσίᾳ en español. Se conservó la nota léxica alternativa y el resto de la estructura, incluido el presente histórico en la respuesta de Jesús.
