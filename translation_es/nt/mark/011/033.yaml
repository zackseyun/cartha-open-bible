translation:
  language: es
  text: 'Y respondiendo a Jesús[a], dijeron: «No sabemos». Y Jesús les dice: «Ni yo les digo con qué autoridad hago estas cosas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por qué autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθέντες
  english_pob_choice: answering
  chosen_spanish: respondiendo
  alternatives_spanish:
  - en respuesta
  - habiendo respondido
  lexicon: BDAG
  rationale: El participio introduce la réplica de los interlocutores antes del discurso directo. «Respondiendo» conserva esa relación participial y suena natural en español narrativo.
- source_word: λέγουσιν / λέγει / λέγω
  english_pob_choice: say / says / tell
  chosen_spanish: dijeron / dice / digo
  alternatives_spanish:
  - dicen / dice / les digo
  - hablan / habla
  lexicon: BDAG
  rationale: La narración histórica puede mantenerse con presente en el discurso, pero el español aquí fluye mejor con una transición a pasado para la respuesta inmediata y presente para la réplica de Jesús. En la última cláusula, «les digo» conserva la construcción de habla dirigida en lugar de un «decir» más abstracto.
- source_word: Οὐκ οἴδαμεν
  english_pob_choice: We do not know
  chosen_spanish: No lo sabemos
  alternatives_spanish:
  - No sabemos
  - No sabemos eso
  lexicon: BDAG
  rationale: La negación simple con el objeto implícito resulta natural en español. «Lo» reproduce el referente implícito de la pregunta anterior sin añadir contenido ajeno.
- source_word: Οὐδὲ ἐγώ
  english_pob_choice: Neither do I
  chosen_spanish: Ni yo
  alternatives_spanish:
  - Tampoco yo
  - Ni tampoco yo
  lexicon: BDAG
  rationale: «Ni yo» mantiene la simetría negativa y la brevedad retórica del griego. Es idiomático y fiel al contraste con la negativa previa de ellos.
- source_word: ἐν ποίᾳ ἐξουσίᾳ
  english_pob_choice: by what authority
  chosen_spanish: por qué autoridad
  alternatives_spanish:
  - con qué autoridad
  - en qué autoridad
  lexicon: BDAG
  rationale: En español, la pregunta de base o fundamento se expresa mejor con «por qué autoridad». Aunque «con qué autoridad» también es posible, «por qué» conserva la idea de causa/justificación que la preposición ἐν + dativo comunica en este contexto interrogativo.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas acciones
  lexicon: BDAG
  rationale: El plural neutro apunta a varias acciones o hechos recientes. «Estas cosas» preserva ese plural sin precisar de más el referente.
- source_word: ποιῶ
  english_pob_choice: I do
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - realizo
  lexicon: BDAG
  rationale: El presente simple es la equivalencia más directa y clara en español. «Hago estas cosas» conserva el valor amplio del verbo griego sin añadir matices no presentes en el texto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en «Jesús[a]» para que el marcador presente en el texto coincida exactamente con la nota correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio sin transliteración ni sustitución litúrgica.
  - Se conservó el plural de ταῦτα con «estas cosas», evitando singularizar el referente.
  - Se prefirió una construcción española natural para la pregunta de autoridad, sin perder la base interrogativa del griego.
