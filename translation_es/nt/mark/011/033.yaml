review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego y conserva la nota alternativa sobre ἐξουσίᾳ. Sin embargo, introduce dos desviaciones relevantes: añade un objeto explícito en «No lo sabemos» que no está en el griego, y usa «por qué autoridad», que en español normalmente significa causa/motivo («por qué») y no el sentido instrumental/base de «ἐν ποίᾳ ἐξουσίᾳ», mejor expresado como «con qué autoridad».'
  spanish_quality_summary: El texto es legible y digno, pero puede mejorarse para mayor naturalidad y precisión. «Respondiendo a Jesús» funciona, aunque «respondiendo a Jesús, dijeron» suena algo más pesado que una formulación más directa; aun así, no exige cambio. El principal problema de calidad es «por qué autoridad», que resulta poco idiomático y ambiguo en español. «No lo sabemos» también suena natural, pero sobretraduce el original.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Los nombres y títulos están bien. La decisión léxica para ἐξουσία debe ajustarse a «autoridad» con la preposición española adecuada («con» en el texto principal; alternativa «por» en nota si se desea), y Οὐκ οἴδαμεν debe quedar sin objeto añadido.
  issues:
  - severity: medium
    issue: «No lo sabemos» añade un objeto no expreso en Οὐκ οἴδαμεν.
    rationale: El griego dice simplemente «No sabemos». Aunque el referente se sobreentiende por el contexto, el «lo» español hace explícito algo no presente en esta línea y reduce la concisión retórica de la respuesta.
  - severity: high
    issue: «por qué autoridad» confunde valor semántico con «por qué = why».
    rationale: La frase griega ἐν ποίᾳ ἐξουσίᾳ pregunta por la clase/base de autoridad, no por la causa. En español general y eclesial, «con qué autoridad» es la formulación idiomática y fiel. La nota puede conservar «por qué autoridad» o mejor «por cuál autoridad» solo como alternativa si se justifica, pero no conviene como texto principal.
  - severity: low
    issue: Mezcla de tiempos narrativos en «dijeron ... Jesús les dice».
    rationale: La mezcla no es imposible en español, especialmente para reflejar el presente histórico, y el propio borrador la justifica. No obstante, puede sentirse algo irregular. Dado que el proyecto valora la fidelidad al presente histórico, no es necesario corregirlo aquí.
  revised_spanish_text: 'Y respondiendo a Jesús[a], dijeron: «No sabemos». Y Jesús les dice: «Ni yo les digo con qué autoridad hago estas cosas».'
  revised_footnotes:
  - marker: a
    text: O «por qué autoridad».
    reason: lexical_alternative
  revision_rationale: Se eliminó «lo» para no añadir un objeto ausente en el griego, y se cambió «por qué autoridad» por «con qué autoridad» para reflejar con precisión e idiomaticidad el sentido de ἐν ποίᾳ ἐξουσίᾳ en español. Se conservó la nota léxica alternativa y el resto de la estructura, incluido el presente histórico en la respuesta de Jesús.
