  verdict: revise
  source_alignment_summary: 'El borrador capta el sentido general del dicho, pero altera varios rasgos importantes del griego y del rastro POB en puntos clave: (1) la nota [a] está mal anclada, porque corresponde a «no duda», no a «les digo»; (2) «si alguien dice» debilita el valor más directo de ὃς ἂν εἴπῃ, mejor como «quien diga» o «cualquiera que diga»; (3) «Quítate y échate» cambia dos pasivos imperativos («sé quitado/removido» y «sé echado/arrojado») a reflejos activos, lo cual altera la imagen; (4) «le será concedido» sobretraduce ἔσται αὐτῷ, que es más abierto: «así será para él» / «será así para él».'
  spanish_quality_summary: El español es legible y digno, pero contiene decisiones poco fieles y una incoherencia formal en las notas. La redacción revisada mejora naturalidad y precisión sin caer en calcos pesados. «Monte» funciona bien; «mar» también. Conviene mantener una formulación clara y solemne, preservando el carácter algo abierto del cierre griego.
  glossary_alignment: 'No hay conflictos mayores con la terminología base del proyecto en este versículo. Las decisiones relevantes son sintácticas y semánticas: conservar mejor los pasivos imperativos, mantener el matiz de καρδία como «corazón», y no expandir ἔσται αὐτῷ a «le será concedido», que añade una idea de concesión no explícita en el griego ni en el POB inglés.'
