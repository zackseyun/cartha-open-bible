translation:
  language: es
  text: 'En verdad les digo: quien diga a este monte: «Sé quitado y sé arrojado al mar», y no duda[a] en su corazón, sino que cree que lo que dice sucederá[b], así será para él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no vacila» o «no se divide dentro de sí»; el verbo griego también puede expresar división interior además de duda.
    reason: lexical_alternative
  - marker: b
    text: O «que lo que dice sucede» o «que llega a suceder». El griego usa un presente («está sucediendo»/«sucede») antes de la cláusula de resultado futura.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - De cierto
  lexicon: BDAG
  rationale: Como fórmula solemne de introducción, 'En verdad' conserva el énfasis declarativo del griego en un español natural y digno. 'Amén' dejaría la forma sin explicar, y 'De cierto' suena más tradicional pero menos actual para este registro.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les hablo
  lexicon: BDAG
  rationale: '''Les digo'' reproduce la fórmula directa de habla sin sobretraducirla. ''Les aseguro'' intensifica el matiz, pero el griego no exige ese aumento explícito.'
- source_word: ὃς ἂν εἴπῃ
  english_pob_choice: whoever says
  chosen_spanish: si alguien dice
  alternatives_spanish:
  - quien diga
  - cualquiera que diga
  lexicon: BDAG
  rationale: La construcción indefinida general se expresa con naturalidad como 'si alguien dice'. 'Quien diga' también es posible, pero en español puede sonar más literario y menos inmediato.
- source_word: τῷ ὄρει τούτῳ
  english_pob_choice: to this mountain
  chosen_spanish: a este monte
  alternatives_spanish:
  - a esta montaña
  - a este cerro
  lexicon: BDAG
  rationale: El griego ὄρος significa 'monte/montaña'. 'Monte' mantiene la imagen bíblica con buena naturalidad en español; 'montaña' es igualmente posible, pero 'monte' suele sonar más solemne y conciso aquí.
- source_word: Ἄρθητι
  english_pob_choice: Be taken up
  chosen_spanish: Quítate
  alternatives_spanish:
  - Sé levantado
  - Anda arriba
  lexicon: BDAG
  rationale: El imperativo pasivo de αἴρω exige una imagen de ser removido o levantado. En español, 'Quítate' comunica con claridad la remoción ordenada al monte y evita una construcción pasiva pesada. Se conserva la fuerza imperativa sin forzar una pasiva artificial.
- source_word: βλήθητι
  english_pob_choice: be thrown
  chosen_spanish: échate
  alternatives_spanish:
  - sé echado
  - arroja
  lexicon: BDAG
  rationale: βάλλω en pasivo imperativo pide la imagen de ser arrojado. En español, 'échate' funciona como complemento del primer mandato y mantiene el paralelismo del dicho; 'sé echado' sería más literal pero menos idiomático.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - al mar
  - a la mar
  lexicon: BDAG
  rationale: Aunque θάλασσα es literalmente 'mar/sea', 'en el mar' suena más natural en español que 'en el mar' con matiz de destino. Se mantiene la imagen hiperbólica sin agregar precisión geográfica. Se prefirió 'mar' por claridad idiomática.
- source_word: μὴ διακριθῇ
  english_pob_choice: does not doubt
  chosen_spanish: no duda
  alternatives_spanish:
  - no vacila
  - no se divide
  lexicon: BDAG
  rationale: En este contexto, διακρίνω expresa duda o vacilación interior. 'No duda' es la opción más clara y directa en español; se conserva, sin embargo, la posibilidad de una división interior en la nota textual.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en lo íntimo
  lexicon: BDAG
  rationale: '''Corazón'' preserva la antropología bíblica del centro interior de pensamiento, decisión y voluntad. Se mantiene el poseedor masculino singular, siguiendo el valor gramatical del griego.'
- source_word: πιστεύῃ
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - tiene fe
  - confía
  lexicon: BDAG
  rationale: πιστεύω aquí se rinde mejor como 'cree' en español común y preciso. 'Tiene fe' es posible, pero en esta estructura la acción cognitiva/confiante queda más clara con 'cree'.
- source_word: ὅτι ὃ λαλεῖ γίνεται
  english_pob_choice: that what he says will happen
  chosen_spanish: que lo que dice sucederá
  alternatives_spanish:
  - que lo que dice acontece
  - que lo que habla llega a suceder
  lexicon: BDAG
  rationale: La cláusula griega une el contenido dicho con el resultado esperado. 'Sucederá' expresa bien el sentido resultativo en español sin perder la relación entre palabra y acontecimiento. 'Dice' comunica naturalmente λαλέω en este contexto.
- source_word: ἔσται αὐτῷ
  english_pob_choice: it will be so for him
  chosen_spanish: le será concedido
  alternatives_spanish:
  - así le será
  - le sucederá
  lexicon: BDAG
  rationale: El griego final deja el resultado algo abierto; la frase española debe ser clara sin imponer una mecánica extra. 'Le será concedido' comunica el efecto favorable para la persona, pero mantiene cierta apertura respecto del modo exacto en que se cumple.
theological_decisions:
- issue: Naturaleza de la promesa de Jesús sobre la fe y la palabra hablada
  english_pob_reading: Render the saying straightforwardly as a conditional promise tied to believing without importing later doctrinal qualifiers into the main text.
  chosen_spanish_reading: Traducir el dicho como una promesa condicional ligada a creer, sin añadir en el cuerpo del texto limitaciones doctrinales posteriores.
  alternative_spanish_readings:
  - Entenderlo solo como hipérbole y atenuarlo en la traducción
  - Convertirlo en una promesa absoluta sin matices
  rationale: El griego presenta una afirmación fuerte e imagística sobre creer y hablar; la traducción debe conservar esa tensión en vez de neutralizarla o absolutizarla. La redacción española deja abierta la fuerza del dicho sin explicarlo de más.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
- issue: Valor del pasivo en Ἄρθητι y βλήθητι
  english_pob_reading: Be taken up / be thrown
  chosen_spanish_reading: Usar imperativos directos que conserven la orden de desplazamiento sin forzar pasivas pesadas.
  alternative_spanish_readings:
  - Quítate y sé echado
  - Sé levantado y sé arrojado
  rationale: En español, una pasiva literal suena rígida; un imperativo directo puede conservar la imagen y la energía del mandato. Esta opción no niega la pasividad del griego, sino que la comunica de manera idiomática.
  doctrine_reference: Equivalencia funcional con fidelidad semántica.
- issue: Uso del masculino singular genérico en αὐτοῦ / αὐτῷ
  english_pob_reading: Use 'his' and 'him' in the main text.
  chosen_spanish_reading: Mantener 'su' y 'le' con referente masculino singular implícito en el español del texto.
  alternative_spanish_readings:
  - su corazón / les será concedido
  - su corazón / le será concedido (sin marcar género en la nota)
  rationale: El griego es masculino singular con fuerza genérica representativa. El español puede conservar ese valor con un posesivo y un dativo naturales, sin convertirlo en plural ni neutralizarlo innecesariamente.
  doctrine_reference: Precisión gramatical antes que neutralización estilística.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado del texto inglés auditado, que ajustó Ἄρθητι hacia 'Be taken up' y aclaró γίνεται con valor futuro/resultativo ('will happen'). En español se optó por una formulación idiomática que conserva el paralelismo imperativo y el resultado futuro sin sobrecargar la oración con pasivas literales. Se mantuvo la tensión semántica de διακριθῇ y del vínculo entre lo dicho y su cumplimiento.
  spanish_consistency_notes:
  - Se conservó el registro solemne y directo del dicho de Jesús.
  - '''Monte'' se prefirió a ''montaña'' por sonoridad bíblica y brevedad, sin cambiar el sentido.'
  - '''Mar'' se usó en lugar de ''sea'' por naturalidad en español.'
  - Las notas a y b preservan las alternativas léxicas relevantes del audit trail inglés.
  - No se introdujo 'Cristo' ni vocabulario eclesiástico ajeno al griego de este versículo.
