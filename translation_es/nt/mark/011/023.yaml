  text: ⸀ἀμὴν λέγω ὑμῖν ὅτι ὃς ἂν εἴπῃ τῷ ὄρει τούτῳ· Ἄρθητι καὶ βλήθητι εἰς τὴν θάλασσαν, καὶ μὴ διακριθῇ ἐν τῇ καρδίᾳ αὐτοῦ ἀλλὰ ⸀πιστεύῃ ὅτι ⸂ὃ λαλεῖ γίνεται, ἔσται αὐτῷ⸃.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/023.yaml
  text: Truly I tell you[a], whoever says to this mountain, ‘Be taken up and be thrown into the sea,’ and does not doubt in his heart but believes that what he says will happen[b], it will be so for him.
  footnotes:
  - marker: a
    text: Or 'does not waver' or 'is not divided within himself'; the Greek verb can carry the sense of inward division as well as doubt.
    reason: lexical_alternative
  - marker: b
    text: Or 'that what he says happens' or 'comes to pass.' The Greek uses a present tense ('is happening'/'happens') before the future result clause.
    reason: lexical_alternative
