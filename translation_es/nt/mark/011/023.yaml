  rationale: 'Se corrigió el anclaje de la nota [a] para que corresponda a μὴ διακριθῇ. Se cambió «si alguien dice» por «quien diga» para reflejar mejor la condición general indefinida. Se revisaron los mandatos al monte a «Sé quitado y sé arrojado al mar» para preservar los pasivos imperativos del griego sin introducir un reflexivo agentivo. Se sustituyó «le será concedido» por «así será para él» para mantener la apertura semántica de ἔσται αὐτῷ y alinearse con la lógica del POB inglés. No se requiere adjudicación adicional: son correcciones claras de fidelidad textual y aparato.'
