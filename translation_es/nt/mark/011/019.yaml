translation:
  language: es
  text: Y cuando llegaba la noche, salían de la ciudad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: al
  alternatives_spanish:
  - cuando
  - cada vez que
  lexicon: BDAG
  rationale: El inglés POB tomó el valor iterativo/habitual de la construcción. En español, «al anochecer» comunica con naturalidad el marco temporal repetido sin forzar una subordinada pesada; «cuando» o «cada vez que» también serían posibles, pero «al» mantiene la fluidez narrativa.
- source_word: ὀψὲ ἐγένετο
  english_pob_choice: evening came
  chosen_spanish: anochecer
  alternatives_spanish:
  - la tarde llegó
  - se hizo de noche
  - llegó la noche
  lexicon: BDAG
  rationale: La frase griega es idiomática y expresa el llegar de la tarde/noche. «Anochecer» es la forma más natural en español para ese cambio de hora y evita un calco poco idiomático.
- source_word: ἐξεπορεύοντο
  english_pob_choice: they would go out
  chosen_spanish: salían
  alternatives_spanish:
  - iban a salir
  - solían salir
  - iban saliendo
  lexicon: BDAG
  rationale: El imperfecto griego aquí sugiere acción habitual o repetida. «Salían» transmite esa iteración de manera simple y fiel; «solían salir» explicita el hábito, pero añade más interpretación que el texto no exige.
- source_word: ἔξω τῆς πόλεως
  english_pob_choice: out of the city
  chosen_spanish: de la ciudad
  alternatives_spanish:
  - fuera de la ciudad
  - hacia afuera de la ciudad
  lexicon: BDAG
  rationale: La preposición de movimiento y el adverbio ἔξω expresan salida desde el interior. «De la ciudad» es la forma más natural en español junto con «salían», y conserva el movimiento sin redundancia.
- source_word: πόλεως
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - Jerusalén
  lexicon: BDAG
  rationale: El griego dice simplemente «la ciudad»; aunque el contexto apunta a Jerusalén, no se debe introducir el nombre propio en el texto principal sin apoyo explícito del original.
translation_notes:
  revision_awareness: El pasaje no presenta cambios textuales ni notas previas en el audit trail; la redacción española sigue de cerca el valor iterativo del imperfecto y conserva el referente genérico «la ciudad» sin explicitar Jerusalén.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico claro y moderno, sin arcaísmos innecesarios.
  - Se preserva el valor habitual del imperfecto mediante «salían» en lugar de un perfecto simple.
  - No se introduce «Jerusalén» en el texto principal, porque el original solo dice «la ciudad».
