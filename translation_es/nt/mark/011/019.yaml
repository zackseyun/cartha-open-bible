review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente el sentido temporal y narrativo general del griego: la salida de la ciudad al caer la tarde. Sin embargo, ὅταν junto con el imperfecto ἐξεπορεύοντο expresa mejor una acción habitual/iterativa. «Y al anochecer, salían de la ciudad» es comprensible, pero atenúa ese matiz repetido que el English POB explicitó con «whenever» + «would go out».'
  spanish_quality_summary: El español es natural y claro, pero la construcción «Y al anochecer» suena algo más puntual que habitual. Una leve revisión a «Y cuando llegaba la noche» mejora la correspondencia con el valor iterativo sin perder fluidez ni dignidad. «Salían de la ciudad» sigue siendo una buena opción idiomática para ἐξεπορεύοντο ἔξω τῆς πόλεως.
  glossary_alignment: No hay términos del glosario doctrinal principal en este versículo. La decisión de mantener «la ciudad» en lugar de «Jerusalén» está bien alineada con la evidencia fuente y el audit trail inglés.
  issues:
  - severity: medium
    issue: El valor iterativo de ὅταν queda insuficientemente explicitado con «al».
    rationale: 'En griego, ὅταν combinado con el imperfecto narrativo favorece una lectura habitual: «cada vez que/cuando... solían». «Al anochecer» puede leerse como mero marco temporal de un evento puntual.'
  - severity: low
    issue: «Anochecer» como sustantivo verbal es natural, pero «cuando llegaba la noche» refleja mejor la cláusula verbal ὀψὲ ἐγένετο.
    rationale: La frase griega contiene un verbo finito («llegó/se hizo tarde»). La revisión propuesta preserva mejor esa dinámica verbal y el matiz repetido del conjunto.
  revised_spanish_text: Y cuando llegaba la noche, salían de la ciudad.
  revision_rationale: Se ajusta la cláusula temporal para reflejar con más fidelidad el valor iterativo/habitual de ὅταν con el imperfecto, manteniendo un español natural y sobrio. No se requieren notas al pie.
