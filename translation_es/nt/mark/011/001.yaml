translation:
  language: es
  text: Y cuando se acercan a Jerusalén, a Betfagé y Betania, hacia el Monte de los Olivos, envía[a] a dos de sus discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Marcos frecuentemente usa el presente histórico en la narración; por eso «envía» también puede traducirse «envió».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγγίζουσιν
  english_pob_choice: draw near
  chosen_spanish: se acercan
  alternatives_spanish:
  - se aproximan
  - llegan cerca
  lexicon: BDAG
  rationale: El presente histórico griego se conserva mejor en español con presente narrativo. «Se acercan» comunica el movimiento sin volver la frase pesada.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: El valor direccional de εἰς se expresa naturalmente con «a» en español, manteniendo la meta del movimiento.
- source_word: εἰς Βηθφαγὴ καὶ Βηθανίαν
  english_pob_choice: to Bethphage and Bethany
  chosen_spanish: a Betfagé y Betania
  alternatives_spanish:
  - hacia Betfagé y Betania
  - junto a Betfagé y Betania
  lexicon: BDAG
  rationale: La repetición de la preposición se refleja con «a» para conservar la secuencia espacial del griego, sin forzar una construcción menos idiomática.
- source_word: πρὸς τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: toward the Mount of Olives
  chosen_spanish: hacia el monte de los Olivos
  alternatives_spanish:
  - junto al monte de los Olivos
  - cerca del monte de los Olivos
  lexicon: BDAG
  rationale: πρός aquí indica orientación/proximidad; «hacia» preserva esa relación mejor que una simple localización estática.
- source_word: ἀποστέλλει
  english_pob_choice: he sends
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  - despacha
  lexicon: BDAG
  rationale: Se mantiene el presente histórico del relato. «Envía» es claro y conserva el matiz de comisión sin añadir interpretación.
- source_word: δύο τῶν μαθητῶν αὐτοῦ
  english_pob_choice: two of his disciples
  chosen_spanish: a dos de sus discípulos
  alternatives_spanish:
  - dos de sus discípulos
  lexicon: BDAG
  rationale: El partitivo griego se vuelve naturalmente con «a dos de», manteniendo el objeto directo y la pertenencia al grupo.
- source_word: Βηθφαγὴ
  english_pob_choice: Bethphage
  chosen_spanish: Betfagé
  alternatives_spanish:
  - Betfage
  lexicon: Transliteration convention
  rationale: Se adapta el topónimo a la ortografía española habitual, con acento final según la forma tradicional en español bíblico académico.
- source_word: Βηθανίαν
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Betanía
  lexicon: Transliteration convention
  rationale: Se usa la forma española estable del topónimo, clara para lectores bíblicos hispanohablantes.
- source_word: Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: Mount of Olives
  chosen_spanish: monte de los Olivos
  alternatives_spanish:
  - Monte de los Olivos
  - monte Olivar
  lexicon: BDAG
  rationale: Es el equivalente toponímico estándar en español; se conserva la mayúscula solo donde la convención editorial lo requiera.
theological_decisions:
- issue: Presente histórico en la narración
  english_pob_reading: Mark often uses the historical present in narration; thus 'he sends' may also be translated 'he sent.'
  chosen_spanish_reading: 'Se conserva el presente narrativo: «se acercan… envía».'
  alternative_spanish_readings:
  - se acercaban… envió
  - se acercaron… envió
  rationale: La tradición narrativa de Marcos usa presente histórico para vivacidad. Mantenerlo en español respeta el flujo y no impone una armonización temporal innecesaria.
  doctrine_reference: Estilo narrativo del Evangelio de Marcos; no afecta doctrina
- issue: Relación espacial de las preposiciones
  english_pob_reading: The Greek uses spatial prepositions that can be rendered more literally, but the main text gives the sense in natural English.
  chosen_spanish_reading: Se conserva la progresión espacial con «a… a… hacia…».
  alternative_spanish_readings:
  - en Jerusalén, en Betfagé y Betania, cerca del monte de los Olivos
  rationale: No se aplana la secuencia preposicional del griego; el español mantiene la orientación y la cercanía sin perder naturalidad.
  doctrine_reference: Precisión semántica y geográfica del texto; no afecta doctrina
translation_notes:
  revision_awareness: 'Se corrigió el problema anterior anclando la nota [a] directamente en el texto español y manteniendo una sola nota con marcador único. La redacción sigue de cerca el griego revisado en el audit trail inglés: presente narrativo, secuencia espacial y partitivo de los discípulos.'
  spanish_consistency_notes:
  - Se usa «Jesús» solo cuando aparezca en el contexto; aquí el sujeto implícito se mantiene como en el griego.
  - 'Se emplean topónimos españoles estables: Jerusalén, Betfagé, Betania, monte de los Olivos.'
  - Se preserva el presente histórico de Marcos para coherencia con el proyecto.
  - No se introducen notas sin anclaje visible en el texto.
