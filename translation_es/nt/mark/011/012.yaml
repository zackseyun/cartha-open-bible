translation:
  language: es
  text: Y al día siguiente, cuando habían salido de Betania, tuvo hambre.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  - Y
  lexicon: BDAG
  rationale: Conserva la simple continuidad narrativa del griego y el estilo paratáctico de Marcos sin sobrecargar el enlace temporal.
- source_word: τῇ ἐπαύριον
  english_pob_choice: on the next day
  chosen_spanish: al día siguiente
  alternatives_spanish:
  - en el día siguiente
  - el siguiente día
  - al siguiente día
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la referencia temporal adverbial del griego; evita un calco rígido como ‘en el siguiente día’.
- source_word: ἐξελθόντων αὐτῶν
  english_pob_choice: when they had gone out
  chosen_spanish: cuando habían salido
  alternatives_spanish:
  - después de que salieron
  - al salir ellos
  - cuando salían
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto indica una acción anterior al verbo principal; ‘habían salido’ conserva esa anterioridad y mantiene el plural del griego.
- source_word: ἀπὸ Βηθανίας
  english_pob_choice: from Bethany
  chosen_spanish: de Betania
  alternatives_spanish:
  - desde Betania
  - desde la Betania
  lexicon: BDAG
  rationale: ἀπό marca alejamiento de un lugar; ‘de Betania’ es la forma natural y fiel en español para el movimiento desde ese punto geográfico.
- source_word: ἐπείνασεν
  english_pob_choice: he became hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - empezó a tener hambre
  - se le abrió el apetito
  - se sintió hambriento
  lexicon: BDAG
  rationale: El aoristo de πεινάω puede presentar el inicio del hambre; en español, ‘tuvo hambre’ comunica con naturalidad ese estado sin perder la fuerza narrativa. ‘Se volvió hambriento’ sería poco idiomático.
theological_decisions:
- issue: Sujeto implícito de ἐπείνασεν
  english_pob_reading: The singular verb refers to Jesus, rendered as 'he' without adding the name 'Jesus' to the text.
  chosen_spanish_reading: El verbo singular se refiere a Jesús, expresado con ‘tuvo’ sin añadir ‘Jesús’ al texto.
  alternative_spanish_readings:
  - Jesús tuvo hambre
  - él tuvo hambre
  rationale: El contexto inmediato identifica al sujeto. Mantenerlo implícito respeta la economía del griego y conserva la fluidez narrativa, a la vez que afirma sin ambigüedad la verdadera humanidad de Jesús mediante su hambre.
  doctrine_reference: 'Concilio de Calcedonia (451 d. C.): verdadera humanidad y verdadera divinidad de Cristo'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió ‘was hungry’ por ‘became hungry’ para reflejar mejor el matiz ingresivo de ἐπείνασεν. En español se optó por ‘tuvo hambre’, que comunica de manera natural ese inicio del estado y evita una formulación menos idiomática.
  spanish_consistency_notes:
  - Se usa ‘Betania’ como transliteración del topónimo, siguiendo la práctica del POB para nombres de lugar.
  - Se preserva el sujeto implícito, coherente con la brevedad del original griego.
  - Se eligió ‘tuvo hambre’ como equivalencia funcional de un cambio de estado, manteniendo sobriedad y claridad en español.
