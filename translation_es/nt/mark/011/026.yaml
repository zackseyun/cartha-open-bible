translation:
  language: es
  text: Pero[a] si ustedes no perdonan, tampoco su Padre que está en los cielos perdonará sus transgresiones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo está ausente de los manuscritos griegos más antiguos (incluidos Sinaítico y Vaticano, del siglo IV) y de las primeras versiones coptas, pero está presente en la mayoría bizantina, la tradición latina y la mayoría de los testigos siríacos. Probablemente fue añadido por escribas posteriores para armonizarlo con las palabras de Jesús en Mateo 6:15.
    reason: textual_variant
lexical_decisions:
- source_word: ἀφίετε
  english_pob_choice: forgive
  chosen_spanish: perdonan / perdonará
  alternatives_spanish:
  - absuelven / absolverá
  - dejan pasar / dejará pasar
  - remiten / remitirá
  lexicon: BDAG
  rationale: En el contexto de ofensas interpersonales y del juicio de Dios, el verbo español natural y fiel es 'perdonar'. 'Absolver' suena más técnico-jurídico y 'dejar pasar' diluye la fuerza moral del término.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: ofensas
  alternatives_spanish:
  - faltas
  - transgresiones
  - pecados
  lexicon: BDAG
  rationale: '''Ofensas'' comunica bien la idea de desvío o agravio concreto entre personas sin colapsarlo del todo con el término más general ''pecados''. En español bíblico es claro y digno, y conserva una tensión semántica semejante a ''trespasses''.'
- source_word: ὁ πατὴρ ὑμῶν ὁ ἐν τοῖς οὐρανοῖς
  english_pob_choice: your Father who is in heaven
  chosen_spanish: su Padre que está en los cielos
  alternatives_spanish:
  - su Padre que está en el cielo
  - su Padre celestial
  lexicon: None
  rationale: La expresión griega articula 'el Padre de ustedes' con la localización 'en los cielos'. 'Que está en los cielos' mantiene la pluralidad idiomática del original y evita una paráfrasis teológica como 'celestial'.
theological_decisions:
- issue: Ausencia textual en los testigos más antiguos y presencia en la tradición bizantina
  english_pob_reading: The verse is marked with a textual-critical footnote noting absence from earliest manuscripts and probable harmonization with Matthew 6:15.
  chosen_spanish_reading: El versículo se mantiene en el texto con nota textual que indica su ausencia en manuscritos muy tempranos y su probable adición para armonizar con Mateo 6:15.
  alternative_spanish_readings:
  - Eliminar el versículo del texto principal
  - Colocarlo solo en nota sin traducirlo
  rationale: 'El encargo sigue la tradición editorial POB: conservar el texto recibido con advertencia crítica auditable. Eso respeta tanto la forma canónica transmitida como la evidencia textual documentada.'
  doctrine_reference: Crítica textual del Nuevo Testamento; armonización con Mateo 6:15
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la cláusula relativa de 'your Father in heaven' a 'your Father who is in heaven' para reflejar de manera más natural la sintaxis del original sin cambiar el contenido. La versión española sigue esa misma decisión con 'su Padre que está en los cielos'.
  spanish_consistency_notes:
  - Se mantuvo 'perdonar' en ambas ocurrencias para reflejar ἀφίημι de manera consistente.
  - Se eligió 'ofensas' para παράπτωματα para conservar un matiz más concreto que 'pecados'.
  - Se usó 'en los cielos' en lugar de 'celestial' para seguir de cerca la estructura del griego y la revisión inglesa.
