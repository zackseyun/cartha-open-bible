translation:
  language: es
  text: Y llegaron a Jerusalén. Y entrando en el templo[a], comenzó a expulsar a los que vendían y a los que compraban en el templo, y volcó las mesas de los cambistas y los asientos de los que vendían palomas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el recinto del templo' o 'los atrios del templo'; el término griego se refiere al complejo del templo en sentido amplio, no específicamente al santuario interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalem
  lexicon: BDAG
  rationale: Nombre propio geográfico estándar en español bíblico y actual; conserva el referente sin transliteración innecesaria.
- source_word: εἰσελθὼν
  english_pob_choice: entering
  chosen_spanish: entrando
  alternatives_spanish:
  - habiendo entrado
  - después de entrar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal, pero en español 'entrando' reproduce de manera natural la relación temporal sin añadir una causalidad o secuencia más fuerte que la del griego.
- source_word: τὸ ἱερὸν / ἐν τῷ ἱερῷ
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el templo
  - los atrios del templo
  - el recinto del templo
  lexicon: BDAG
  rationale: '''Templo'' es la forma breve y natural en español. Mantiene la referencia al complejo del templo; el sentido espacial amplio se preserva en nota, como en el audit trail inglés.'
- source_word: ἤρξατο ἐκβάλλειν
  english_pob_choice: he began to drive out
  chosen_spanish: comenzó a expulsar
  alternatives_spanish:
  - empezó a echar fuera
  - comenzó a echar fuera
  lexicon: BDAG
  rationale: '''Expulsar'' comunica con claridad la fuerza de ἐκβάλλω en este contexto. ''Echar fuera'' es posible, pero ''expulsar'' suena más natural y mantiene el valor enérgico del verbo.'
- source_word: τοὺς πωλοῦντας
  english_pob_choice: those who were selling
  chosen_spanish: los que vendían
  alternatives_spanish:
  - los vendedores
  - los que estaban vendiendo
  lexicon: BDAG
  rationale: La forma sustantivada se vierte con una relativa simple y natural. Conserva la acción en curso sin volverla excesivamente explicativa.
- source_word: τοὺς ἀγοράζοντας
  english_pob_choice: those who were buying
  chosen_spanish: los que compraban
  alternatives_spanish:
  - los compradores
  - los que estaban comprando
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con 'los que vendían' y la fuerza verbal del participio griego.
- source_word: κολλυβιστῶν
  english_pob_choice: money changers
  chosen_spanish: cambistas
  alternatives_spanish:
  - cambistas de moneda
  - cambiadores de dinero
  lexicon: BDAG
  rationale: '''Cambistas'' es la designación usual en español y expresa bien la función económica del término en el contexto del templo.'
- source_word: καθέδρας
  english_pob_choice: seats
  chosen_spanish: sillas
  alternatives_spanish:
  - asientos
  - bancos
  lexicon: BDAG
  rationale: Aunque el griego es más general, 'sillas' es un equivalente natural y concreto en español. Evita una abstracción que debilite la escena de acción.
- source_word: περιστερὰς
  english_pob_choice: doves
  chosen_spanish: palomas
  alternatives_spanish:
  - palomas
  - palomitas
  lexicon: BDAG
  rationale: '''Palomas'' es el equivalente natural en español. ''Doves'' puede sonar más litúrgico en inglés, pero en español el término común es más claro y no pierde el contexto sacrificial implícito.'
- source_word: κατέστρεψεν
  english_pob_choice: he overturned
  chosen_spanish: volcó
  alternatives_spanish:
  - derribó
  - volteó
  lexicon: BDAG
  rationale: '''Volcó'' reproduce la acción física de derribar y voltear las mesas y sillas con viveza y economía. ''Derribó'' sería posible, pero ''volcó'' conserva mejor la imagen de invertir objetos colocados.'
theological_decisions:
- issue: Alcance espacial de ἱερόν
  english_pob_reading: Rendered as 'temple' in the main text, referring to the temple complex rather than the inner sanctuary.
  chosen_spanish_reading: '''el templo'' en el texto principal, con nota que aclara que el término griego puede referirse al complejo o recinto del templo.'
  alternative_spanish_readings:
  - el templo
  - el recinto del templo
  - los atrios del templo
  rationale: 'No se debe hacer creer al lector que Jesús entró solo en el santuario interior. La nota preserva la tensión semántica: el español principal mantiene claridad, y el aparato explica el alcance más amplio del griego.'
  doctrine_reference: 'Translation philosophy: optimal equivalence; primacía del sentido original sobre la tradición eclesiástica.'
translation_notes:
  revision_awareness: El texto inglés fue revisado desde 'after entering' a 'entering' para reflejar más directamente el participio aoristo sin añadir una relación temporal extra. La redacción española sigue esa revisión y evita formas que impliquen una secuencia más explícita de la que da el griego.
  spanish_consistency_notes:
  - Se mantiene 'templo' para ἱερόν por coherencia con el registro bíblico y con la nota de alcance espacial.
  - Se usa 'expulsar' para ἐκβάλλειν y 'volcó' para κατέστρεψεν para sostener el tono enérgico de la escena.
  - Se prefieren relativas simples ('los que vendían', 'los que compraban') para conservar el paralelismo sintáctico del griego.
  - '''Palomas'' se deja sin tecnicismo adicional porque el contexto cultual ya queda suficientemente indicado por la acción en el templo.'
