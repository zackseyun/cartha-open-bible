  text: Καὶ ἔρχονται εἰς Ἱεροσόλυμα. καὶ ⸀εἰσελθὼν εἰς τὸ ἱερὸν ἤρξατο ἐκβάλλειν τοὺς πωλοῦντας καὶ ⸀τοὺς ἀγοράζοντας ἐν τῷ ἱερῷ, καὶ τὰς τραπέζας τῶν κολλυβιστῶν καὶ τὰς καθέδρας τῶν πωλούντων τὰς περιστερὰς κατέστρεψεν
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/015.yaml
  text: And they came to Jerusalem. And entering the temple[a], he began to drive out those who were selling and those who were buying in the temple, and he overturned the tables of the money changers and the seats of those who were selling doves.
  footnotes:
