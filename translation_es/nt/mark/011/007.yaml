translation:
  language: es
  text: Y trajeron el pollino[a] a Jesús, y pusieron sobre él sus mantos, y se sentó sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asno joven». El griego πῶλον significa «animal joven» o «cría»; en este contexto se refiere a un asno.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρουσιν
  english_pob_choice: brought
  chosen_spanish: llevaron
  alternatives_spanish:
  - trajeron
  - condujeron
  lexicon: BDAG
  rationale: El griego usa presente narrativo, pero en español el pretérito simple es la forma natural en relato. Elegí «llevaron» porque mantiene el sentido de traslado hacia Jesús sin introducir un matiz de conducción que el verbo no exige.
- source_word: πῶλον
  english_pob_choice: colt
  chosen_spanish: potrillo
  alternatives_spanish:
  - pollino joven
  - cría de asno
  lexicon: BDAG
  rationale: El término griego designa un animal joven; en este contexto se refiere a un asno. «Potrillo» comunica bien la idea de una cría joven y permite una nota aclaratoria sin volver mecánico el texto. Otras opciones son más explícitas, pero menos naturales en español.
- source_word: ἐπιβάλλουσιν
  english_pob_choice: put
  chosen_spanish: pusieron sobre
  alternatives_spanish:
  - echaron sobre
  - colocaron sobre
  lexicon: BDAG
  rationale: La acción es de poner ropa sobre el animal. «Pusieron sobre» sigue la revisión inglesa que prefirió un verbo más natural y formal que «threw», sin perder la imagen de preparación para montar.
- source_word: ἱμάτια
  english_pob_choice: cloaks
  chosen_spanish: mantos
  alternatives_spanish:
  - manto
  - ropas
  - vestiduras exteriores
  lexicon: BDAG
  rationale: ἱμάτια suele referirse a prendas exteriores. «Mantos» es una equivalencia natural y reverente en español bíblico, más precisa que «ropas» para el gesto de colocarlas sobre el animal.
- source_word: αὐτῷ / ἐπ’ αὐτόν
  english_pob_choice: on it
  chosen_spanish: sobre él
  alternatives_spanish:
  - sobre ello
  - encima de él
  lexicon: BDAG
  rationale: Ambas referencias apuntan al animal, pero en español «él» puede referirse al potrillo sin forzar un pronombre neutro poco natural. Mantengo la referencia al mismo referente para preservar la secuencia del relato.
translation_notes:
  revision_awareness: El auditable inglés POB pasó de «threw their cloaks on it» a «put their cloaks on it» para reflejar ἐπιβάλλουσιν con mayor naturalidad y formalidad. La versión española sigue esa revisión con «pusieron sobre», y evita exagerar el verbo de movimiento. También conserva la ambigüedad léxica de πῶλον mediante una nota, sin reemplazarla por una paráfrasis cerrada.
  spanish_consistency_notes:
  - Usé «Jesús» conforme al patrón del proyecto.
  - No apliqué «Cristo» ni «SEÑOR» porque este versículo no los contiene.
  - Mantuve el pronombre de referencia al animal de forma coherente en ambas cláusulas finales.
  - La construcción mantiene un tono bíblico moderno, claro y publicable sin calco innecesario.
