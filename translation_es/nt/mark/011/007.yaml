revisions:
- from: Y llevaron el potrillo[a] a Jesús, y pusieron sobre él sus mantos, y se sentó sobre él.
  to: Y trajeron el pollino[a] a Jesús, y pusieron sobre él sus mantos, y se sentó sobre él.
  rationale: Se ajusta πῶλον de «potrillo» a «pollino» para evitar la asociación primaria con caballo y reflejar mejor el contexto de asno. También se mejora la naturalidad de φέρουσιν con «trajeron». Se conserva la estructura, el ritmo narrativo y la referencia pronominal del original.
