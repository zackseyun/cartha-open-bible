review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la secuencia y el sentido del griego: llevaron el animal a Jesús, pusieron sus prendas sobre el animal, y Jesús se sentó sobre él. También refleja adecuadamente el presente histórico con pretérito narrativo y mantiene la referencia pronominal al πῶλον. Sin embargo, «potrillo» en español suele asociarse primero con un caballo joven y puede desalinear el referente contextual, ya que la nota y el contexto identifican un asno. Conviene explicitarlo en el texto principal.'
  spanish_quality_summary: La redacción es clara y natural, pero «llevaron ... a Jesús» suena algo menos idiomático que «trajeron ... a Jesús» en este contexto. «Mantos» funciona bien. El mayor problema de legibilidad/precisión es «potrillo», que puede inducir a imaginar un caballo. La solución «pollino» es bíblica, comprensible y más fiel al contexto; una nota puede preservar «asno joven» como alternativa más transparente.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Los nombres propios están bien. La decisión clave es léxica: para πῶλον, «pollino» se alinea mejor con la justificación auditada de ‘colt/young donkey’ que «potrillo», porque en español evita la asociación primaria con caballo y conserva el referente de asno del contexto.'
  issues:
  - severity: medium
    issue: «potrillo» puede sugerir un caballo joven en vez de un asno joven
    rationale: Aunque etimológicamente puede expresar un animal joven, en el uso común «potrillo» se entiende primero como cría de caballo. Dado que el propio expediente inglés aclara que aquí se trata de un donkey/asno, la traducción principal debería evitar esa ambigüedad innecesaria.
  - severity: low
    issue: «llevaron ... a Jesús» es menos natural que «trajeron ... a Jesús»
    rationale: Ambas opciones son posibles para φέρουσιν, pero en español narrativo «trajeron el pollino a Jesús» suena más directo para movimiento hacia la persona que recibe al animal.
  - severity: low
    issue: La nota actual usa «pollino joven», formulación algo rígida
    rationale: Una alternativa como «asno joven» comunica mejor al lector general el referente contextual preservado por la nota léxica.
  revised_spanish_text: Y trajeron el pollino[a] a Jesús, y pusieron sobre él sus mantos, y se sentó sobre él.
  revised_footnotes:
