translation:
  language: es
  text: Y al pasar temprano[a] por la mañana, vieron la higuera seca[b] desde las raíces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy de mañana».
    reason: lexical_alternative
  - marker: b
    text: O «seca por completo desde las raíces» o «marchita desde las raíces».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπορευόμενοι
  english_pob_choice: as they were passing by
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaban
  - cuando pasaban
  lexicon: BDAG
  rationale: El participio presente acompaña la acción principal y funciona mejor en español como complemento temporal breve. 'Al pasar' conserva la simultaneidad sin recargar la frase.
- source_word: πρωῒ
  english_pob_choice: early in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - temprano en la mañana
  - muy de mañana
  lexicon: BDAG
  rationale: La idea central es la referencia temporal de la mañana. En español, el matiz de 'temprano' no es indispensable para la fluidez del verso; se mantiene la indicación temporal sin artificio.
- source_word: εἶδον
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - se dieron cuenta
  - notaron
  lexicon: BDAG
  rationale: Es un aoristo de percepción directa; 'vieron' es la correspondencia más simple y fiel.
- source_word: συκῆν
  english_pob_choice: the fig tree
  chosen_spanish: la higuera
  alternatives_spanish:
  - la higuera de higos
  - el árbol de higos
  lexicon: BDAG
  rationale: El sustantivo designa la higuera en este contexto narrativo; 'higuera' es el equivalente natural y preciso en español.
- source_word: ἐξηραμμένην
  english_pob_choice: withered
  chosen_spanish: seca
  alternatives_spanish:
  - marchita
  - mustia
  - dried up
  lexicon: BDAG
  rationale: Para un árbol, 'seca' expresa el estado resultante de la desecación de manera clara y natural. 'Marchita' puede sonar más propio de flores; 'seca' mantiene la imagen de un árbol desecado.
- source_word: ἐκ ῥιζῶν
  english_pob_choice: from the roots
  chosen_spanish: desde las raíces
  alternatives_spanish:
  - de las raíces
  - desde la raíz
  lexicon: BDAG
  rationale: La frase señala el alcance del secamiento comenzando en la base radical. 'Desde las raíces' conserva mejor la imagen direccional que 'de las raíces'.
translation_notes:
  revision_awareness: 'El texto griego coincide plenamente con el testimonio auditado en inglés: la secuencia narrativa, el adverbio temporal y la imagen final de la higuera desecada desde las raíces se mantienen sin necesidad de ajustes de crítica textual.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' porque el versículo no contiene el nombre divino ni κύριος.
  - '''Higuera'' conserva el sentido literal del referente botánico sin añadir explicaciones.'
  - '''Seca desde las raíces'' mantiene la imagen resultativa del participio perfecto pasivo sin paraphrasear más allá de lo atestiguado.'
