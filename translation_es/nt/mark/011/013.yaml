translation:
  language: es
  text: Y viendo desde lejos una higuera con hojas, fue a ver si acaso encontraría algo en ella. Pero cuando llegó a ella, no encontró nada excepto hojas, porque no era tiempo[a] de higos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque no era la temporada de higos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - al ver
  - después de ver
  lexicon: BDAG
  rationale: El participio se reproduce mejor en español con un gerundio temporal/circunstancial. «Viendo» conserva la simultaneidad o antecedencia leve sin cargar de más la secuencia narrativa.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde cierta distancia
  lexicon: BDAG
  rationale: «Desde lejos» es natural en español y conserva con claridad el valor espacial de μακρόθεν sin sonar forzado.
- source_word: συκῆν
  english_pob_choice: a fig tree
  chosen_spanish: una higuera
  alternatives_spanish:
  - un árbol de higos
  - una planta de higos
  lexicon: BDAG
  rationale: El sustantivo común y directo en español es «higuera»; expresa el mismo referente botánico que «fig tree».
- source_word: ἔχουσαν φύλλα
  english_pob_choice: with leaves
  chosen_spanish: con hojas
  alternatives_spanish:
  - teniendo hojas
  - frondosa
  lexicon: BDAG
  rationale: El participio ἔχουσαν se vierte de modo idiomático como complemento de acompañamiento. «Con hojas» conserva la observación visible sin añadir interpretación.
- source_word: ἦλθεν εἰ ἄρα τι εὑρήσει ἐν αὐτῇ
  english_pob_choice: he went to see whether perhaps he would find anything on it
  chosen_spanish: fue a ver si acaso encontraría algo en ella
  alternatives_spanish:
  - fue a ver si quizá encontraría algo en ella
  - se acercó para ver si acaso encontraría algo en ella
  lexicon: BDAG
  rationale: La construcción expresa expectativa tentativa. «Fue a ver si acaso encontraría» reproduce bien εἰ ἄρα y mantiene la incertidumbre sin explicarla de más.
- source_word: ἐν αὐτῇ
  english_pob_choice: on it
  chosen_spanish: en ella
  alternatives_spanish:
  - sobre ella
  - de ella
  lexicon: BDAG
  rationale: Aunque el inglés opta por «on it» por idiomatismo, el griego dice literalmente «en ella». En español «en ella» conserva la forma más cercana y sigue siendo comprensible en contexto.
- source_word: ἐλθὼν ἐπ’ αὐτὴν
  english_pob_choice: when he came to it
  chosen_spanish: cuando llegó a ella
  alternatives_spanish:
  - al llegar a ella
  - cuando fue hacia ella
  lexicon: BDAG
  rationale: «Llegó a ella» reproduce naturalmente el participio de movimiento y la preposición hacia. Evita una repetición pesada y mantiene el avance narrativo.
- source_word: οὐδὲν εὗρεν εἰ μὴ φύλλα
  english_pob_choice: he found nothing except leaves
  chosen_spanish: no encontró nada excepto hojas
  alternatives_spanish:
  - no halló nada sino hojas
  - no encontró nada más que hojas
  lexicon: BDAG
  rationale: «No encontró nada excepto hojas» sigue de cerca el griego εἰ μὴ y mantiene la exclusividad del hallazgo sin suavizarla.
- source_word: ὁ γὰρ καιρὸς οὐκ ἦν σύκων
  english_pob_choice: for it was not the season for figs
  chosen_spanish: porque no era tiempo de higos
  alternatives_spanish:
  - porque no era la temporada de higos
  - pues no era tiempo de higos
  lexicon: BDAG
  rationale: καιρός aquí señala el tiempo oportuno o la temporada. «Tiempo de higos» conserva la lectura más directa y la tensión interpretativa que el texto presenta.
theological_decisions:
- issue: La cláusula explicativa sobre el tiempo de los higos y la tensión narrativa
  english_pob_reading: for it was not the season for figs
  chosen_spanish_reading: porque no era tiempo de higos
  alternative_spanish_readings:
  - porque no era la temporada de higos
  - pues no era tiempo de higos
  rationale: 'Se mantiene la observación del narrador sin resolverla ni ampliarla. La traducción conserva la tensión textual: Jesús busca fruto, pero Marcos aclara que no era el tiempo de higos.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste de la revisión inglesa que acercó el orden a «seeing from a distance a fig tree having leaves», pero en español se prioriza un orden natural: «viendo desde lejos una higuera con hojas». Se conservó además la tensión del cierre con «no era tiempo de higos» según el comentario explicativo del texto fuente.'
  spanish_consistency_notes:
  - Se usó «higuera» para συκῆν en concordancia con el valor léxico estándar y la claridad para lectores hispanohablantes.
  - Se mantuvo «tiempo de higos» en lugar de «temporada» como opción más breve y cercana a la formulación griega, preservando la tensión interpretativa.
  - «Con hojas» traduce el participio de manera natural en español y evita una calca pesada.
  - El pronombre «ella» mantiene el referente femenino de «higuera» y evita ambigüedad.
