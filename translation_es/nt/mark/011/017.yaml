  glossary_alignment: No hay conflictos con la terminología del proyecto. No aparecen términos sensibles como Yahvé/Mesías/esclavo. «Naciones» está bien justificado para ἔθνη. «Ladrones» es aceptable para λῃσταί dentro de la alusión a Jeremías; la mejora propuesta afecta a σπήλαιον, no al sustantivo principal.
