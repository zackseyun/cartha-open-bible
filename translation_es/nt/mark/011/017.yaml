  text: καὶ ἐδίδασκεν ⸂καὶ ἔλεγεν⸃ ⸀αὐτοῖς· Οὐ γέγραπται ὅτι Ὁ οἶκός μου οἶκος προσευχῆς κληθήσεται πᾶσιν τοῖς ἔθνεσιν; ὑμεῖς δὲ ⸀πεποιήκατε αὐτὸν σπήλαιον λῃστῶν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/017.yaml
  text: And he was teaching and saying to them[a], “Is it not written[b], ‘My house will be called a house of prayer for all the nations’? But you have made it a den of robbers.”
  footnotes:
  - marker: a
    text: Or “for all peoples.” The Greek says “for all the nations,” echoing Isaiah 56:7 and emphasizing the temple’s intended welcome beyond Israel.
    reason: lexical_alternative
  - marker: b
    text: “Den of robbers” echoes Jeremiah 7:11. The Greek word can also mean “bandits” or “brigands” in some contexts.
    reason: cross_reference
