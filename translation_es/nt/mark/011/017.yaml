translation:
  language: es
  text: 'Y les enseñaba y les decía[a]: «¿No está escrito: “Mi casa será llamada casa de oración para todas las naciones”? Pero ustedes la han convertido en guarida de ladrones[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para todos los pueblos». El griego dice «para todas las naciones», eco de Isaías 56:7, y subraya la bienvenida prevista para el templo más allá de Israel.
    reason: lexical_alternative
  - marker: b
    text: «Guarida de ladrones» evoca Jeremías 7:11. El término griego también puede significar «bandidos» o «salteadores» en algunos contextos.
    reason: cross_reference
lexical_decisions:
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - enseñaba
  - estaba enseñándoles
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso; el imperfecto español «enseñaba» reproduce ese valor de manera natural y digna en esta escena del templo.
- source_word: καὶ ἔλεγεν
  english_pob_choice: and saying
  chosen_spanish: y les decía
  alternatives_spanish:
  - y decía
  - y les estaba diciendo
  lexicon: BDAG
  rationale: También es imperfecto, por lo que «decía» mantiene la continuidad de la acción verbal junto con «enseñaba». Se conserva el dativo con «les» para explicitar a quién se dirige.
- source_word: Οὐ γέγραπται
  english_pob_choice: Is it not written
  chosen_spanish: ¿No está escrito
  alternatives_spanish:
  - ¿No ha sido escrito?
  - ¿Acaso no está escrito?
  lexicon: BDAG
  rationale: La fórmula bíblica de apelación a la Escritura se expresa de forma idiomática en español con «¿No está escrito?», preservando la autoridad del texto citado sin calco pesado.
- source_word: Ὁ οἶκός μου
  english_pob_choice: My house
  chosen_spanish: Mi casa
  alternatives_spanish:
  - Mi templo
  lexicon: BDAG
  rationale: «Casa» es el equivalente directo y mantiene la resonancia escrituraria de Isaías 56:7. «Templo» explicaría el referente, pero debilitaría la cita literal.
- source_word: οἶκος προσευχῆς
  english_pob_choice: a house of prayer
  chosen_spanish: casa de oración
  alternatives_spanish:
  - casa de plegaria
  - casa para la oración
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica estable «casa de oración»; en español suena natural y refleja la construcción nominal del griego.
- source_word: κληθήσεται
  english_pob_choice: will be called
  chosen_spanish: será llamada
  alternatives_spanish:
  - será nombrada
  - será conocida como
  lexicon: BDAG
  rationale: El futuro pasivo se vierte con «será llamada», que mantiene tanto el tiempo como la pasividad del griego.
- source_word: πᾶσιν τοῖς ἔθνεσιν
  english_pob_choice: for all the nations
  chosen_spanish: para todas las naciones
  alternatives_spanish:
  - para todos los pueblos
  - para todas las gentes
  lexicon: BDAG
  rationale: Se mantiene «naciones» para conservar ἔθνη y el eco de Isaías 56:7. «Pueblos» sería posible, pero suaviza la referencia intertextual y la fuerza de la universalidad geográfica/etnológica.
- source_word: ὑμεῖς δὲ
  english_pob_choice: But you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero vosotros
  lexicon: BDAG
  rationale: El contraste enfático se expresa con «Pero» y el pronombre explícito «ustedes», de registro general y neutral latinoamericano.
- source_word: πεποιήκατε
  english_pob_choice: have made
  chosen_spanish: han convertido
  alternatives_spanish:
  - han hecho
  - lo han vuelto
  lexicon: BDAG
  rationale: El perfecto griego señala un estado resultante. «Han convertido» comunica bien la transformación ya consumada del lugar en algo distinto; «han hecho» sería más literal, pero menos idiomático en español aquí.
- source_word: αὐτὸν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - lo
  lexicon: BDAG
  rationale: Aunque el griego usa pronombre neutro, en español se adapta al antecedente femenino «casa». Por eso se dice «la han convertido».
- source_word: σπήλαιον
  english_pob_choice: den
  chosen_spanish: cueva
  alternatives_spanish:
  - guarida
  - refugio
  lexicon: BDAG
  rationale: En la alusión a Jeremías 7:11, «cueva» reproduce el sentido concreto del griego y permite la imagen de lugar oculto o de escondite; en español bíblico también resuena con la tradición del pasaje.
- source_word: λῃστῶν
  english_pob_choice: robbers
  chosen_spanish: de ladrones
  alternatives_spanish:
  - de salteadores
  - de bandidos
  lexicon: BDAG
  rationale: «Ladrones» conserva la fuerza moral y la familiaridad de la expresión profética. En español, «salteadores» o «bandidos» podrían intensificar el matiz, pero «ladrones» es suficientemente amplio para la alusión a Jeremías sin sobreespecificar.
theological_decisions:
- issue: Alcance universal de la cita de Isaías
  english_pob_reading: for all the nations
  chosen_spanish_reading: para todas las naciones
  alternative_spanish_readings:
  - para todos los pueblos
  - para todas las gentes
  rationale: Se preserva la referencia a ἔθνη como «naciones» para mantener el eco de Isaías 56:7 y la apertura del templo más allá de Israel, sin diluir esa intertextualidad en una expresión más general.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve theological tension rather than resolve it.'
- issue: Imagen profética de λῃστῶν
  english_pob_reading: robbers
  chosen_spanish_reading: ladrones
  alternative_spanish_readings:
  - salteadores
  - bandidos
  rationale: La cita de Jeremías 7:11 gobierna el sentido. «Ladrones» reproduce la acusación en un español claro y no introduce un matiz político o militar que el versículo no exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence; do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la última pasada revisada, que quedó sin cambios y con alta concordancia. Se mantuvo la decisión principal de traducir ἔθνη como «naciones» y λῃστῶν como «ladrones», con el ajuste natural del español a «les enseñaba y les decía» para reflejar los imperfectos griegos.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como convención del proyecto cuando aparezca el nombre divino; aquí no aparece en el versículo.
  - Se mantiene «naciones» frente a «pueblos» para respetar el eco intertextual de Isaías.
  - Se usa «ladrones» en lugar de «bandidos» o «salteadores» para coherencia con la tradición auditada del versículo.
  - Se emplea «casa de oración» como fórmula bíblica estable y legible en español.
  - Se mantiene el registro neutral latinoamericano con «ustedes».
