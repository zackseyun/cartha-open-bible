translation:
  language: es
  text: ¿Fue el bautismo de Juan del cielo[a] o de los hombres[b]? Respóndanme.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de Dios». El griego dice «del cielo», conservando el modismo judío para origen o autoridad divina.
    reason: lexical_alternative
  - marker: b
    text: «De los hombres» significa «de seres humanos», es decir, de origen o autoridad meramente humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ βάπτισμα τὸ Ἰωάννου
  english_pob_choice: John's baptism
  chosen_spanish: el bautismo de Juan
  alternatives_spanish:
  - el bautismo de Juan el Bautista
  - el bautismo de Juan,
  - el bautismo perteneciente a Juan
  lexicon: BDAG
  rationale: En español, la construcción posesiva natural es «de Juan». Mantiene la referencia al bautismo asociado con Juan sin endurecer la frase con una calca innecesaria.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - de Dios
  - desde el cielo
  lexicon: BDAG
  rationale: Conservo la expresión literal «del cielo» porque el griego usa un giro reverencial que alude al origen o autoridad divina. «De Dios» explicita la interpretación, pero la forma fuente es más auditable y preserva la tensión idiomática.
- source_word: ἐξ ἀνθρώπων
  english_pob_choice: from men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los seres humanos
  - de origen humano
  lexicon: BDAG
  rationale: La contraposición con «del cielo» se conserva mejor con una expresión breve y paralela. «De los hombres» reproduce el contraste idiomático del griego; una opción más inclusiva se deja como alternativa.
- source_word: ἀποκρίθητέ μοι
  english_pob_choice: Answer me
  chosen_spanish: Respóndanme
  alternatives_spanish:
  - Contéstenme
  - Respóndanme a mí
  lexicon: BDAG
  rationale: El imperativo plural aoristo pide una respuesta directa y urgente. En español, «Respóndanme» comunica bien esa fuerza sin añadir matices ajenos.
- source_word: ἦν ἢ
  english_pob_choice: Was ... or ...?
  chosen_spanish: ¿Fue ... o ...?
  alternatives_spanish:
  - ¿Era ... o ...?
  - ¿Vino ... o ...?
  lexicon: BDAG
  rationale: Aunque el griego usa imperfecto con valor de origen/autoridad, en español una pregunta con «¿Fue... o...? » transmite la cuestión de procedencia con claridad y mantiene el paralelismo.
theological_decisions:
- issue: Sentido de «del cielo» como circunlocución divina
  english_pob_reading: Retain the idiom 'from heaven' in the main text as a statement of divine origin/authority without paraphrasing it.
  chosen_spanish_reading: Mantener «del cielo» en el texto principal como circunlocución de origen o autoridad divina, sin convertirlo en «de Dios» en la línea principal.
  alternative_spanish_readings:
  - de Dios
  - de origen divino
  rationale: La forma del griego preserva una expresión judía reverencial. En español, la traducción literal conserva la transparencia textual y deja visible el desafío retórico de Jesús, sin borrar la posible equivalencia interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas al pie no ancladas en el texto. La redacción actual evita marcadores footnote y mantiene el contraste semántico directamente en el cuerpo del versículo.
  spanish_consistency_notes:
  - Se mantuvo «del cielo» para reflejar la forma fuente y la circunlocución reverencial.
  - Se eligió «de los hombres» para sostener el paralelismo con la frase anterior.
  - Se usó un imperativo plural formal («Respóndanme») acorde con el griego y con español eclesial contemporáneo.
  - No se introdujo «Cristo» ni terminología no presente en el verso.
