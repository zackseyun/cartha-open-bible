    issue: Faltan las notas léxicas equivalentes a las del POB inglés.
    rationale: La auditoría inglesa conservó alternativas significativas para «from heaven» y «from men». Dado que en español «del cielo» y especialmente «de los hombres» pueden generar ambigüedad adicional, conviene preservar esas aclaraciones en notas.
  - severity: low
    issue: «De los hombres» puede leerse como masculino específico.
    rationale: Aunque la frase es defendible y paralela al griego, la auditoría inglesa ya aclaró que significa «de seres humanos», es decir, de origen o autoridad meramente humana. Esa aclaración debe mantenerse en español.
