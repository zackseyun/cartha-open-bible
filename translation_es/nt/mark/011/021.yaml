translation:
  language: es
  text: 'Y Pedro, al acordarse, le dice: «Rabí, mira, la higuera que maldijiste[a] se ha marchitado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se ha secado». El verbo griego puede denotar secarse o marchitarse; el perfecto subraya el estado resultante presente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναμνησθεὶς
  english_pob_choice: remembering
  chosen_spanish: al acordarse
  alternatives_spanish:
  - recordando
  - habiendo recordado
  lexicon: BDAG
  rationale: El participio aoristo se expresa naturalmente en español con una construcción adverbial que marca la acción previa sin volverla pesada; «al acordarse» conserva la relación temporal con la palabra de Pedro.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - va diciendo
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español «dice» mantiene vivacidad narrativa y sigue de cerca el valor aspectual del original.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre dativo se refleja de manera natural con «le»; se evita explicitar «Jesús» porque el griego conserva un pronombre y el contexto ya identifica al destinatario.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el vocativo semítico con una transliteración usual en español bíblico. «Rabí» mantiene mejor la forma de dirección del texto que «Maestro».
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira bien
  - ve
  lexicon: BDAG
  rationale: El imperativo deíctico se vierte con el imperativo español más natural y directo. «Mira» preserva la inmediatez de la exclamación.
- source_word: συκῆ
  english_pob_choice: fig tree
  chosen_spanish: higuera
  alternatives_spanish:
  - árbol de higos
  - higuera de higos
  lexicon: BDAG
  rationale: En español el referente natural es «higuera». La frase no alude solo al fruto sino al árbol, y «higuera» es la equivalencia estándar y más fiel.
- source_word: κατηράσω
  english_pob_choice: you cursed
  chosen_spanish: maldijiste
  alternatives_spanish:
  - proferiste una maldición contra
  - maldejiste
  lexicon: BDAG
  rationale: Se traduce el acto verbal de καταράομαι con un verbo español directo y reconocido. «Maldijiste» reproduce la fuerza de la acusación sin sobreexplicar la construcción.
- source_word: ἐξήρανται
  english_pob_choice: has withered
  chosen_spanish: se ha marchitado
  alternatives_spanish:
  - se ha secado
  - está marchita
  lexicon: BDAG
  rationale: El perfecto griego subraya un estado resultante presente. En español, «se ha marchitado» comunica bien el resultado visible en una planta, sin perder la idea de desecación implicada por el verbo.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura auditada del inglés POB sin cambios sustantivos: presente histórico en el verbo principal, vocativo transliterado y nota léxica sobre el alcance de ἐξήρανται. Se ajustó el español para que la secuencia suene natural y a la vez conserve la relación temporal del participio inicial.'
  spanish_consistency_notes:
  - Se usa «Rabí» como vocativo transliterado, en línea con el griego y con el registro bíblico.
  - Se eligió «higuera» para συκῆ porque en español es el nombre normal del árbol.
  - Se optó por «se ha marchitado» para reflejar el resultado presente del perfecto griego, manteniendo la alternativa «se ha secado» en nota.
