translation:
  language: es
  text: Y ellos les dijeron tal como Jesús había dicho, y los dejaron ir[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'les permitieron' o 'los soltaron'. El verbo griego puede significar permitir, soltar o dejar ir; aquí se refiere a que los presentes ya no impidieron que los discípulos se llevaran el pollino.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Ahora ellos
  - Entonces ellos
  lexicon: BDAG
  rationale: El artículo sustantivado retoma a los discípulos en el contexto, y δέ funciona como transición narrativa. En español, 'Y ellos' conserva esa continuidad sin sobrecargar el matiz adversativo.
- source_word: εἶπαν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijeron
  alternatives_spanish:
  - les respondieron
  - les hablaron
  lexicon: BDAG
  rationale: λέγω aquí es el verbo ordinario de decir. El dativo αὐτοῖς se expresa naturalmente con 'les' en español.
- source_word: καθὼς εἶπεν ὁ Ἰησοῦς
  english_pob_choice: just as Jesus had said
  chosen_spanish: justo como Jesús había dicho
  alternatives_spanish:
  - tal como Jesús había dicho
  - como Jesús dijo
  lexicon: BDAG
  rationale: καθώς expresa correspondencia exacta, por lo que 'justo como' conserva bien la idea de conformidad. El pluscuamperfecto 'había dicho' refleja que la palabra de Jesús es anterior a la réplica de los discípulos en la secuencia narrativa.
- source_word: ἀφῆκαν αὐτούς
  english_pob_choice: they let them go
  chosen_spanish: los dejaron ir
  alternatives_spanish:
  - los permitieron ir
  - los soltaron
  lexicon: BDAG
  rationale: 'ἀφίημι tiene un rango amplio: permitir, dejar, soltar, liberar. En este contexto, la idea es que dejan de impedirles tomar el pollino; ''los dejaron ir'' reproduce con claridad ese sentido idiomático sin forzar un matiz más técnico que el texto no exige.'
translation_notes:
  revision_awareness: El texto inglés POB fue revisado y quedó sin cambios; no se requieren notas de revisión adicionales para este versículo. La formulación española sigue el mismo sentido auditado, con ajuste natural al orden y la idiomaticidad del español.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' para Ἰησοῦς según el estándar del proyecto.
  - Se usa 'les' para el dativo indirecto αὐτοῖς en español natural.
  - Se evita 'SEÑOR' o perífrasis doctrinales porque el versículo no contiene lenguaje divino explícito.
  - No se introduce nota de pie porque la alternativa verbal ('dejar ir/soltar/releaser') puede resolverse en el texto principal sin ambigüedad doctrinal.
