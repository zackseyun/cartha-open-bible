translation:
  language: es
  text: 'Y Jesús les respondió[a]: «Tengan fe en Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Tengan la fe de Dios», lo cual también puede entenderse como «Tengan la fidelidad de Dios» o «Tengan fe que proviene de Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  lexicon: BDAG
  rationale: El participio introduce una réplica directa; en español, «respondió» comunica con naturalidad la función discursiva sin calcar la forma participial. «Contestó» sería posible, pero «respondió» encaja mejor con el tono narrativo y con la secuencia del relato.
- source_word: λέγει
  english_pob_choice: Jesus answered them
  chosen_spanish: les respondió
  alternatives_spanish:
  - les dice
  - les dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte aquí con pasado narrativo en español. Un presente como «les dice» sonaría menos natural en este contexto; «les respondió» integra el valor de ἀποκριθεὶς y conserva el flujo narrativo.
- source_word: Ἔχετε
  english_pob_choice: Have
  chosen_spanish: Tengan
  alternatives_spanish:
  - Tened
  - Tengan ustedes
  lexicon: BDAG
  rationale: El imperativo presente expresa una disposición continua. En español, el imperativo de trato plural formal/neutro «Tengan» es natural y digno para una lectura bíblica contemporánea.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  lexicon: BDAG
  rationale: «Fe» es la equivalencia más directa y estable para πίστις en este contexto exhortativo. «Confianza» es comprensible, pero pierde la fuerza terminológica y la conexión inmediata con el lenguaje bíblico habitual.
- source_word: θεοῦ
  english_pob_choice: in God
  chosen_spanish: en Dios
  alternatives_spanish:
  - de Dios
  - la fe de Dios
  - la fidelidad de Dios
  lexicon: BDAG
  rationale: La función objetiva del genitivo se expresa de forma natural en español con «en Dios». Como el griego admite también una lectura más literal («de Dios» / «la fe de Dios» / «la fidelidad de Dios»), esa tensión se preserva en una nota en lugar de resolverse silenciosamente.
theological_decisions:
- issue: Genitivo ambiguo en πίστιν θεοῦ
  english_pob_reading: 'objective genitive: ''faith in God'''
  chosen_spanish_reading: fe en Dios
  alternative_spanish_readings:
  - fe de Dios
  - fidelidad de Dios
  - fe procedente de Dios
  rationale: El contexto inmediato culmina en la enseñanza sobre creer y orar (11:23–24), por lo que la exhortación a confiar en Dios es la lectura más coherente. Aun así, la construcción griega sigue siendo ambigua, y la traducción mantiene esa tensión con una nota alternativa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3; Contested terms table for πίστις'
translation_notes:
  revision_awareness: El estado de revisión indica alta concordancia y sin cambios respecto de la última pasada; por eso la redacción mantiene la lectura objetiva principal y conserva la alternativa literal solo en nota.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς según el criterio base.
  - Se eligió «fe» para πίστις, coherente con el registro bíblico y con la decisión inglesa.
  - Se evitó «SEÑOR» para θεός, siguiendo el mapeo base a «Dios».
  - La nota preserva la ambigüedad genitiva sin imponer una sola interpretación.
