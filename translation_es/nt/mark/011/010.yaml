translation:
  language: es
  text: ¡Bendito es el reino venidero de nuestro padre David! ¡Hosanna en las alturas![a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Salva, por favor» o «Salva ahora», aunque aquí «Hosanna» funciona como una aclamación litúrgica de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐλογημένη
  english_pob_choice: Blessed
  chosen_spanish: ¡Bendito
  alternatives_spanish:
  - ¡Alabado
  - ¡Bendecida
  lexicon: BDAG
  rationale: El participio pasivo funciona aquí como aclamación exclamativa. «Bendito» reproduce el tono de bendición/aclamación de forma natural en español y preserva mejor la resonancia litúrgica que «alabado». Se usa en forma exclamativa para reflejar la fuerza del grito.
- source_word: ἡ ἐρχομένη βασιλεία
  english_pob_choice: the coming kingdom
  chosen_spanish: el reino venidero
  alternatives_spanish:
  - el reino que viene
  - el reino que está por venir
  lexicon: BDAG
  rationale: La construcción artículo + participio + sustantivo se vierte de manera atributiva. «Venidero» comunica bien la idea de algo que se acerca o llega, sin añadir una carga escatológica más fuerte que la del griego. Mantiene la naturalidad española y la referencia al reino.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - reinado
  - dominio real
  lexicon: BDAG
  rationale: «Reino» es la equivalencia más idiomática y corresponde al sentido concreto y dinástico del contexto davídico. «Reinado» o «dominio real» sonarían más abstractos y menos acordes con la aclamación de la multitud.
- source_word: τοῦ πατρὸς ἡμῶν Δαυίδ
  english_pob_choice: of our father David
  chosen_spanish: de nuestro padre David
  alternatives_spanish:
  - de David nuestro padre
  - de nuestro antepasado David
  lexicon: BDAG
  rationale: La frase genitiva modifica «reino». «Nuestro padre David» conserva el matiz honorífico y de ascendencia sin añadir explicación. Se mantiene el orden más natural en español, con David como núcleo de la referencia.
- source_word: Ὡσαννὰ
  english_pob_choice: Hosanna
  chosen_spanish: Hosanna
  alternatives_spanish:
  - Sálvanos, por favor
  - ¡Sálvanos ahora!
  lexicon: BDAG
  rationale: Se conserva la transliteración porque en el uso neotestamentario ya funciona como aclamación fija. La plegaria subyacente de salvación se refleja en la nota, no en el texto principal, para no perder el carácter litúrgico del grito.
- source_word: ἐν τοῖς ὑψίστοις
  english_pob_choice: in the highest
  chosen_spanish: en las alturas
  alternatives_spanish:
  - en lo más alto
  - en los cielos más altos
  lexicon: BDAG
  rationale: «En las alturas» es la fórmula española tradicional e inteligible para este modismo. Conserva la concisión del griego y deja abierta la referencia al ámbito celestial sin explicitarla en exceso.
theological_decisions:
- issue: Naturaleza del reino davídico en la aclamación
  english_pob_reading: Blessed is the coming kingdom of our father David!
  chosen_spanish_reading: ¡Bendito el reino venidero de nuestro padre David!
  alternative_spanish_readings:
  - ¡Bendito el reino mesiánico de nuestro padre David!
  rationale: El contexto apunta claramente a una expectativa mesiánica, pero el griego dice solo «el reino de nuestro padre David». La traducción conserva esa formulación directa para no resolver la tensión interpretativa en el texto, dejando que el lector perciba la alusión davídica y mesiánica sin añadirla como glosa.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicar el título real davídico.
translation_notes:
  revision_awareness: Se revisó la formulación para mantener el tono exclamativo y litúrgico del griego, con «reino venidero» como ajuste más natural que una calca literal. No se introdujo «mesiánico» en el texto principal para respetar la cautela del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita que lo requiera.
  - Se preserva «Hosanna» como transliteración en el texto principal, con nota explicativa sobre su fuerza de súplica y alabanza.
  - «Reino» se usa de manera consistente con el contexto davídico; no se reemplaza por «reinado» para no perder la concreción dinástica del pasaje.
