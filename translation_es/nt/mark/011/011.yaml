translation:
  language: es
  text: Y entró en Jerusalén[a], en el templo; y, después de mirar todo, como ya era tarde[b], salió hacia Betania con los doce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los atrios del templo» o, simplemente, «el templo»; el término griego se refiere al complejo del templo, no al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «porque ya era tarde» o «cuando ya era tarde en el día».
    reason: lexical_alternative
  - marker: c
    text: Es decir, los doce discípulos de Jesús.
    reason: cross_reference
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: BDAG
  rationale: El aoristo de εἰσέρχομαι indica entrada simple. «Entró» es natural y fiel al movimiento narrativo; se conserva con el complemento «en Jerusalén».
- source_word: Ἱεροσόλυμα
  english_pob_choice: Jerusalem
  chosen_spanish: Jerusalén
  alternatives_spanish:
  - Jerusalen
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y moderno.
- source_word: τὸ ἱερόν
  english_pob_choice: the temple courts
  chosen_spanish: el templo
  alternatives_spanish:
  - los atrios del templo
  - el recinto del templo
  - el templo y sus atrios
  lexicon: BDAG
  rationale: ἱερόν designa el complejo del templo, no el santuario interior (ναός). En español, «el templo» es la forma más natural y suficientemente amplia; se anota la alternativa más precisa para no perder el matiz espacial.
- source_word: περιβλεψάμενος
  english_pob_choice: after looking around
  chosen_spanish: después de mirar todo
  alternatives_spanish:
  - mirando alrededor
  - después de mirar alrededor
  lexicon: BDAG
  rationale: El participio expresa una mirada de reconocimiento/inspección. «Después de mirar todo» conserva la secuencia y la amplitud del objeto observado sin sonar forzado en español.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todo cuanto había
  lexicon: BDAG
  rationale: El neutro plural enfatiza totalidad. «Todo» es conciso y transmite el alcance de la observación.
- source_word: ὀψὲ ἤδη οὔσης τῆς ὥρας
  english_pob_choice: since it was already late
  chosen_spanish: como ya era tarde
  alternatives_spanish:
  - porque ya era tarde
  - puesto que ya era tarde
  - cuando ya era tarde
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia temporal-causal. «Como ya era tarde» reproduce esa relación de manera idiomática en español.
- source_word: ἐξῆλθεν
  english_pob_choice: he went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  - salió de allí
  lexicon: BDAG
  rationale: Ἐξέρχομαι indica salida; «salió» es la forma más directa y natural en español.
- source_word: Βηθανίαν
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Bethania
  lexicon: BDAG
  rationale: Nombre propio bíblico usual en español.
- source_word: μετὰ τῶν δώδεκα
  english_pob_choice: with the twelve
  chosen_spanish: con los doce
  alternatives_spanish:
  - con los Doce
  - con los doce discípulos
  lexicon: BDAG
  rationale: El griego menciona solo el número; «los doce» mantiene esa forma breve y reconocible. No se añade «discípulos» al texto principal para no explicitar más de lo que dice el original.
theological_decisions:
- issue: Alcance de τὸ ἱερόν
  english_pob_reading: the temple courts / temple precincts rather than the inner sanctuary
  chosen_spanish_reading: el templo como complejo/recinto, no el santuario interior
  alternative_spanish_readings:
  - los atrios del templo
  - el templo
  rationale: No es una diferencia doctrinal, sino espacial y léxica. En español, «el templo» es la traducción más fluida; la nota preserva la precisión de que ἱερόν se refiere al recinto completo, no a ναός.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia de «los doce»
  english_pob_reading: with the twelve
  chosen_spanish_reading: con los doce
  alternative_spanish_readings:
  - con los Doce
  - con sus doce discípulos
  rationale: El griego no marca mayúscula ni explicita «discípulos». Mantener «los doce» conserva la economía del texto y deja el referente claro por el contexto narrativo.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: No se registran revisiones posteriores en el paquete fuente; la versión inglesa auditada quedó sin cambios en el pase más reciente, con alta concordancia entre revisores. La propuesta española mantiene ese perfil estable y conserva las tensiones léxicas documentadas sin suavizarlas indebidamente.
  spanish_consistency_notes:
  - He mantenido «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece.
  - He preferido la forma breve «el templo» en el cuerpo, pero la nota explica el valor de ἱερόν como recinto templario.
  - «Los doce» conserva la referencia al grupo sin añadir contenido interpretativo al versículo principal.
  - La puntuación y el orden reflejan una cadencia narrativa natural en español sin alejarse del original griego.
