translation:
  language: es
  text: 'Y algunos de los que estaban allí les decían[a]: «¿Qué hacen, desatando el pollino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el joven asno». El griego πῶλος puede significar un animal joven; en este contexto se refiere a un asno.
    reason: lexical_alternative
lexical_decisions:
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unos cuantos
  lexicon: BDAG
  rationale: Expresa de manera natural el plural indefinido del griego sin añadir precisión no presente en el texto.
- source_word: τῶν ἐκεῖ ἑστηκότων
  english_pob_choice: of those standing there
  chosen_spanish: de los que estaban allí
  alternatives_spanish:
  - de los que estaban allí de pie
  - de los presentes allí
  - de los que se hallaban allí
  lexicon: BDAG
  rationale: Conserva la referencia a personas presentes y la idea de permanencia/estar de pie, pero en español «estaban allí» suena más natural y no fuerza una calca.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: les decían
  alternatives_spanish:
  - estaban diciendo a ellos
  - seguían diciéndoles
  lexicon: BDAG
  rationale: El imperfecto indica una acción en curso; en español, el imperfecto simple «decían» comunica esa continuidad sin sobrerrecalcar iteración.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: Pronombre dativo natural en español para el complemento indirecto.
- source_word: Τί ποιεῖτε
  english_pob_choice: What are you doing
  chosen_spanish: ¿Qué hacen?
  alternatives_spanish:
  - ¿Qué están haciendo?
  - ¿Qué hacen ustedes?
  lexicon: BDAG
  rationale: La pregunta se dirige a la acción presente de manera directa; en español, la forma interrogativa simple es natural y fiel, y el sujeto implícito plural está claro por la conjugación.
- source_word: λύοντες
  english_pob_choice: untying
  chosen_spanish: desatando
  alternatives_spanish:
  - soltando
  - desamarrando
  lexicon: BDAG
  rationale: En el contexto de un animal atado, «desatar» es la equivalencia más idiomática y precisa para λύω, mejor que «soltar» o «desamarrar».
- source_word: τὸν πῶλον
  english_pob_choice: the colt
  chosen_spanish: el pollino
  alternatives_spanish:
  - el potro
  - el joven asno
  lexicon: BDAG
  rationale: Se preserva el término general para un animal joven. «Pollino» es claro en español bíblico y, en este contexto, puede referirse a un asno joven sin cerrar el sentido a una glosa interpretativa.
translation_notes:
  revision_awareness: Se corrigió la anclaje de la nota al incluir [a] junto al destinatario indirecto, de modo que la nota quede vinculada explícitamente al grupo de hablantes/destinatarios en la línea de diálogo, como exige la validación.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero no aparece en este versículo.
  - «pollino» conserva el tono bíblico y el referente de πῶλος sin desplazarlo a una glosa demasiado explicativa.
  - El imperfecto español «decían» preserva el valor aspectual de ἔλεγον sin añadir repetición excesiva.
