translation:
  language: es
  text: 'Y les dice: «Vayan a la aldea que está enfrente de ustedes, y en cuanto entren en ella, encontrarán un pollino[a] atado, sobre el cual nadie[b] se ha sentado todavía; desátenlo y tráiganlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un animal joven». El griego πῶλον puede designar un animal joven; en este contexto se refiere al animal que Jesús montará.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el cual nadie de los hombres se ha sentado todavía». El griego explicita que ningún ser humano lo ha montado.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Diríjanse
  lexicon: BDAG
  rationale: Imperativo plural de movimiento; «Vayan» es natural y mantiene el tono de comisión sin añadir matices.
- source_word: κώμην
  english_pob_choice: village
  chosen_spanish: aldea
  alternatives_spanish:
  - pueblo
  - villa
  lexicon: BDAG
  rationale: κώμη denota una localidad pequeña; «aldea» comunica mejor ese tamaño que «pueblo» en este contexto.
- source_word: τὴν κατέναντι ὑμῶν
  english_pob_choice: opposite you
  chosen_spanish: que está enfrente de ustedes
  alternatives_spanish:
  - opuesta a ustedes
  - frente a ustedes
  lexicon: BDAG
  rationale: La frase ubica la aldea delante/enfrente de la posición de los discípulos; «que está enfrente de ustedes» suena natural en español y conserva la relación espacial.
- source_word: εὐθὺς εἰσπορευόμενοι εἰς αὐτήν
  english_pob_choice: as soon as you enter it
  chosen_spanish: en cuanto entren en ella
  alternatives_spanish:
  - tan pronto como entren en ella
  - apenas entren en ella
  lexicon: BDAG
  rationale: La construcción participial se vuelve una cláusula temporal idiomática en español; «en cuanto» refleja bien la inmediatez de εὐθύς.
- source_word: πῶλον
  english_pob_choice: colt
  chosen_spanish: potro
  alternatives_spanish:
  - pollino
  - jumento joven
  lexicon: BDAG
  rationale: πῶλος designa un animal joven; dado el contexto narrativo, «potro» conserva la idea de un animal joven sin forzar todavía la especie en la línea principal.
- source_word: δεδεμένον
  english_pob_choice: tied there
  chosen_spanish: atado
  alternatives_spanish:
  - amarrado
  - ligado
  lexicon: BDAG
  rationale: El participio perfecto pasivo describe un estado resultante; «atado» es la forma más directa y clara en español.
- source_word: ἐφ’ ὃν
  english_pob_choice: on which
  chosen_spanish: sobre el cual
  alternatives_spanish:
  - en el cual
  - encima del cual
  lexicon: BDAG
  rationale: La relación preposicional se mantiene de forma precisa con «sobre el cual».
- source_word: οὐδεὶς οὔπω ἀνθρώπων ἐκάθισεν
  english_pob_choice: no one among men has yet sat
  chosen_spanish: nadie de los hombres se ha sentado todavía
  alternatives_spanish:
  - ningún hombre se ha sentado todavía
  - ninguna persona se ha sentado todavía
  lexicon: BDAG
  rationale: La mención explícita de ἀνθρώπων se conserva con «de los hombres»; «todavía» reproduce bien οὔπω sin intensificarlo a «jamás».
- source_word: λύσατε
  english_pob_choice: Untie
  chosen_spanish: desátenlo
  alternatives_spanish:
  - desaten
  - suelten
  lexicon: BDAG
  rationale: En el contexto de un animal atado, «desatar» es el equivalente idiomático más claro para λύω.
- source_word: φέρετε
  english_pob_choice: bring
  chosen_spanish: tráiganlo
  alternatives_spanish:
  - llévenlo
  - conduzcanlo
  lexicon: BDAG
  rationale: «Traer» preserva el valor amplio de φέρω sin restringirlo a «llevar» en sentido de conducir físicamente el animal.
theological_decisions:
- issue: Referencia explícita a los seres humanos en la cláusula sobre nadie que se ha sentado en el animal
  english_pob_reading: The wording explicitly refers to no human having ridden it.
  chosen_spanish_reading: nadie de los hombres se ha sentado todavía
  alternative_spanish_readings:
  - nadie se ha sentado todavía
  - ninguna persona se ha sentado todavía
  rationale: Se conserva la fuerza de ἀνθρώπων sin volver la frase torpe; la formulación admite la precisión antropológica del griego y sigue siendo natural en español.
  doctrine_reference: Ninguno; precisión semántica del texto narrativo.
translation_notes:
  revision_awareness: El inglés auditado pasó de «no one among men» a «no one» por fluidez, pero el griego conserva ἀνθρώπων; la versión española mantiene esa referencia explícita sin sobrecargarla. También se tuvo en cuenta que πῶλον admite un sentido más general de animal joven, aunque el contexto narrativo apunta al animal de la entrada triunfal.
  spanish_consistency_notes:
  - Se usa «Vayan» para el imperativo plural, consistente con el tono narrativo de mandato.
  - Se preserva «potro» en el texto principal con nota para «pollino», a fin de reflejar la amplitud de πῶλος sin perder naturalidad.
  - «Todavía» se emplea para οὔπω, manteniendo la referencia temporal sin exagerarla.
  - Las notas usan marcadores únicos y están ancladas en los términos relevantes del texto.
