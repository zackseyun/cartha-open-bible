source:
  edition: SBLGNT
  text: καὶ λέγει αὐτοῖς· Ὑπάγετε εἰς τὴν κώμην τὴν κατέναντι ὑμῶν, καὶ ⸀εὐθὺς εἰσπορευόμενοι εἰς αὐτὴν εὑρήσετε πῶλον δεδεμένον ἐφ’ ὃν οὐδεὶς ⸀οὔπω ἀνθρώπων ⸀ἐκάθισεν· ⸂λύσατε αὐτὸν καὶ φέρετε⸃.
base_translation:
  language: en
  yaml_path: translation/nt/mark/011/002.yaml
  text: And he says to them[a], “Go into the village opposite you, and as soon as you enter it, you will find a colt tied there, on which no one has yet sat[b]. Untie it and bring it.”
  footnotes:
  - marker: a
    text: Or “a young donkey.” The Greek πῶλον can denote a young animal; in this context it refers to the animal Jesus will ride.
    reason: lexical_alternative
  - marker: b
    text: Literally, “on which no one of men has yet sat.” The wording explicitly refers to no human having ridden it.
    reason: lexical_alternative
