review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: mandato de ir, referencia a la aldea enfrente, hallazgo inmediato al entrar, animal atado, mandato de desatarlo y traerlo. Sin embargo, dos decisiones debilitan la fidelidad contextual: «potro» en español normalmente sugiere un caballo joven, no el animal de la entrada mesiánica; y «nadie de los hombres» es una reproducción demasiado literal y poco natural de οὐδεὶς οὔπω ἀνθρώπων ἐκάθισεν, cuya fuerza puede conservarse mejor en nota o con una formulación más idiomática.'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «potro» puede desorientar al lector hispanohablante hacia especie equivocada, y «nadie de los hombres» suena forzado en español bíblico natural. El resto del verso fluye bien. Una pequeña revisión produce mejor legibilidad sin perder precisión.
  glossary_alignment: No hay términos del glosario principal en juego salvo la expectativa contextual de πῶλον. Dado el contexto narrativo de Marcos 11, conviene especificar «pollino» o «burrito» antes que «potro». También conviene no calc ar «de los hombres» en el texto principal; la referencia humana explícita puede conservarse en nota, como ya hace el rastro inglés.
  issues:
  - severity: high
    issue: «potro» sugiere especie equivocada
    rationale: En español común, «potro» remite primariamente a un caballo joven. En este contexto, el animal es un asno joven; el propio pie de nota ofrece «pollino», que es más fiel y menos ambiguo.
  - severity: medium
    issue: «nadie de los hombres» es torpe en español
    rationale: Aunque intenta reflejar ἀνθρώπων, esta formulación no suena natural. El inglés auditado ya suavizó la frase principal a «no one has yet sat» y conservó la explicitud humana en nota; el español debe hacer algo equivalente.
  - severity: low
    issue: Pie de nota a necesita mejor correspondencia con el texto principal
    rationale: 'Si el texto principal usa «pollino», la alternativa puede invertirse: «O “un animal joven”» o similar. Mantener «pollino» solo en nota mientras el texto dice «potro» no es la mejor solución contextual.'
  revised_spanish_text: 'Y les dice: «Vayan a la aldea que está enfrente de ustedes, y en cuanto entren en ella, encontrarán un pollino[a] atado, sobre el cual nadie[b] se ha sentado todavía; desátenlo y tráiganlo».'
  revised_footnotes:
  - marker: a
    text: O «un animal joven». El griego πῶλον puede designar un animal joven; en este contexto se refiere al animal que Jesús montará.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sobre el cual nadie de los hombres se ha sentado todavía». El griego explicita que ningún ser humano lo ha montado.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «potro» por «pollino» para evitar una lectura equina y reflejar mejor el contexto de la entrada de Jesús. Se simplifica «nadie de los hombres» a «nadie» en el texto principal para lograr español natural, conservando la referencia explícita a seres humanos en una nota, en línea con la filosofía auditada. El resto del versículo se mantiene por ser fiel y legible.
