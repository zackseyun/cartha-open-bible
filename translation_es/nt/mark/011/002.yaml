revisions:
- from: 'Y les dice: «Vayan a la aldea que está enfrente de ustedes, y en cuanto entren en ella, encontrarán un potro[a] atado, sobre el cual nadie de los hombres[b] se ha sentado todavía; desátenlo y tráiganlo».'
  to: 'Y les dice: «Vayan a la aldea que está enfrente de ustedes, y en cuanto entren en ella, encontrarán un pollino[a] atado, sobre el cual nadie[b] se ha sentado todavía; desátenlo y tráiganlo».'
  rationale: Se reemplaza «potro» por «pollino» para evitar una lectura equina y reflejar mejor el contexto de la entrada de Jesús. Se simplifica «nadie de los hombres» a «nadie» en el texto principal para lograr español natural, conservando la referencia explícita a seres humanos en una nota, en línea con la filosofía auditada. El resto del versículo se mantiene por ser fiel y legible.
