translation:
  language: es
  text: 'Y, enojado[a], extendió la mano, lo tocó y le dijo: «Quiero; queda limpio»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «movido a compasión» en lugar de «enojado».
    reason: textual_variant
lexical_decisions:
- source_word: ὀργισθεὶς
  english_pob_choice: being angry
  chosen_spanish: estando enojado
  alternatives_spanish:
  - indignado
  - movido a compasión
  lexicon: BDAG
  rationale: La forma griega en el texto SBLGNT es ὀργισθείς, participio aoristo de ὀργίζομαι, cuyo sentido básico es estar/ponerse enojado. Por fidelidad al texto fuente se conserva ese valor en el cuerpo principal. Se evita suavizarlo con una lectura armonizadora. La nota mantiene la variante textual tradicional 'movido a compasión'.
- source_word: ἐκτείνας τὴν χεῖρα
  english_pob_choice: he stretched out his hand
  chosen_spanish: extendió la mano
  alternatives_spanish:
  - estiró la mano
  - alargó la mano
  lexicon: BDAG
  rationale: El participio aoristo se integra naturalmente en español como acción coordinada en pasado. 'Extendió la mano' conserva la imagen corporal concreta y suena idiomático en español contemporáneo.
- source_word: ἥψατο
  english_pob_choice: touched him
  chosen_spanish: lo tocó
  alternatives_spanish:
  - tocó a él
  - lo tomó
  lexicon: BDAG
  rationale: El verbo medio ἅπτομαι aquí expresa contacto físico directo. 'Lo tocó' reproduce la fuerza simple y clara del gesto sin añadir matices no presentes en el texto.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo es más natural el pretérito simple. 'Le dijo' mantiene claridad sin perder el valor narrativo.
- source_word: Θέλω
  english_pob_choice: I am willing
  chosen_spanish: Quiero
  alternatives_spanish:
  - Estoy dispuesto
  - Quiero hacerlo
  lexicon: BDAG
  rationale: En este contexto Jesús expresa voluntad eficaz y disposición inmediata. 'Quiero' es la forma más directa y fiel en español para la respuesta breve del original; 'estoy dispuesto' explicita la idea de disposición, pero resulta más interpretativa.
- source_word: καθαρίσθητι
  english_pob_choice: be cleansed
  chosen_spanish: sé limpio
  alternatives_spanish:
  - sé purificado
  - quedate limpio
  lexicon: BDAG
  rationale: El imperativo pasivo de καθαρίζω se refiere a limpieza ritual y física por lepra. 'Sé limpio' conserva la resonancia bíblica tradicional y la ambigüedad de limpieza/ pureza mejor que una paráfrasis explicativa. Se prefiere la forma verbal sin intensificar con 'purificado'.
theological_decisions:
- issue: Variante textual sobre la emoción de Jesús
  english_pob_reading: Translate the printed SBLGNT reading ὀργισθείς as 'being angry' in the main text
  chosen_spanish_reading: Traducir la lectura impresa como 'estando enojado' en el texto principal
  alternative_spanish_readings:
  - movido a compasión
  - indignado
  rationale: La traducción sigue la lectura griega proporcionada y conserva la tensión textual sin armonizarla con la variante más difundida. La nota informa al lector de la alternativa manuscrita importante.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar la tensión teológica/textual)
translation_notes:
  revision_awareness: Se mantuvo el texto principal conforme a la lectura impresa SBLGNT y al audit trail inglés, sin armonizar con la variante de compasión. No hubo revisiones aplicadas en el ciclo anterior.
  spanish_consistency_notes:
  - Se usó 'Yahvé' no aplicable en este versículo.
  - Se mantuvo 'limpio' para conservar la fuerza ritual y física de καθαρίσθητι.
  - Se evitó 'Cristo' y términos no presentes en el pasaje.
  - La puntuación y el orden siguen la sintaxis natural del español, sin perder la secuencia verbal del griego.
