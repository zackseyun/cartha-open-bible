  rationale: Se mantiene la lectura textual principal «enojado» con nota sobre la variante conocida. Se simplifica la construcción participial para mejorar la fluidez en español. Se reemplaza «sé limpio» por «queda limpio», que es más natural e inteligible en español moderno y representa mejor el valor imperativo pasivo/resultativo de καθαρίσθητι en este contexto de purificación/sanación.
