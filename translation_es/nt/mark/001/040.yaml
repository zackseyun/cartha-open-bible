translation:
  language: es
  text: 'Y viene a él un hombre con lepra[a], rogándole[b] y arrodillándose, y diciéndole: «Si quieres, puedes dejarme limpio[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un leproso».
    reason: lexical_alternative
  - marker: b
    text: O «suplicándole».
    reason: lexical_alternative
  - marker: c
    text: O «limpiarme». El verbo griego puede referirse tanto a limpieza ritual como a restauración física.
    reason: lexical_alternative
lexical_decisions:
- source_word: λεπρὸς
  english_pob_choice: a man with leprosy
  chosen_spanish: un hombre con lepra
  alternatives_spanish:
  - un leproso
  - un hombre leproso
  lexicon: BDAG
  rationale: Sigo la decisión de la POB en inglés de destacar a la persona antes que la condición. En español, 'un hombre con lepra' conserva ese enfoque y evita la etiqueta sustantivada 'leproso', que puede sonar más deshumanizante.
- source_word: παρακαλῶν
  english_pob_choice: pleading with him
  chosen_spanish: rogándole
  alternatives_spanish:
  - suplicándole
  - implorándole
  - pidiéndole con insistencia
  lexicon: BDAG
  rationale: παρακαλέω aquí expresa una súplica insistente. 'Rogándole' transmite bien esa apelación personal y mantiene un registro natural en español sin intensificar innecesariamente la desesperación.
- source_word: γονυπετῶν
  english_pob_choice: kneeling
  chosen_spanish: arrodillándose
  alternatives_spanish:
  - de rodillas
  - hincándose de rodillas
  - postrándose de rodillas
  lexicon: BDAG
  rationale: El participio describe la postura de rodillas. 'Arrodillándose' es la forma verbal más fluida en español para acompañar la serie de participios, sin añadir una caída o postración que el griego no exige.
- source_word: Ἐὰν θέλῃς
  english_pob_choice: If you are willing
  chosen_spanish: Si quieres
  alternatives_spanish:
  - Si estás dispuesto
  - Si eres de voluntad
  - Si lo deseas
  lexicon: BDAG
  rationale: θέλω puede expresar voluntad o disposición. Aquí la petición directa en español queda más natural como 'Si quieres', y mantiene la idea de disposición personal sin convertirla en una formulación más abstracta.
- source_word: δύνασαί
  english_pob_choice: you are able
  chosen_spanish: puedes
  alternatives_spanish:
  - eres capaz de
  - tienes poder para
  lexicon: BDAG
  rationale: En este contexto de petición al agente sanador, 'puedes' es la equivalencia más natural de δύναμαι en español. Conserva la afirmación de capacidad sin sobrecargar la frase.
- source_word: καθαρίσαι
  english_pob_choice: make me clean
  chosen_spanish: limpiarme
  alternatives_spanish:
  - purificarme
  - hacerme limpio
  - sanarme
  lexicon: BDAG
  rationale: 'Mantengo ''limpiarme'' para preservar la ambigüedad importante del verbo griego: limpieza ritual e incluso restauración física. ''Sanarme'' estrecharía el sentido; ''purificarme'' sonaría más técnico que el griego en esta súplica.'
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - se acerca
  lexicon: BDAG
  rationale: El presente histórico de Marcos se conserva bien con 'viene'. Es natural en español y mantiene el ritmo narrativo vívido del griego mejor que una simple traslación al pasado.
theological_decisions:
- issue: Cleansing versus healing in the leprosy request
  english_pob_reading: make me clean
  chosen_spanish_reading: limpiarme
  alternative_spanish_readings:
  - sanarme
  - purificarme
  rationale: La petición no usa un verbo estándar de curación, sino de limpieza. 'Limpiarme' conserva la tensión entre restauración física e impureza ritual sin reducir el pedido a una sola dimensión.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Person-first rendering for the afflicted man
  english_pob_reading: a man with leprosy
  chosen_spanish_reading: un hombre con lepra
  alternative_spanish_readings:
  - un leproso
  - un hombre leproso
  rationale: La gramática griega permite el uso sustantivado del adjetivo, pero el sentido no exige convertirlo en una etiqueta personal. La redacción española conserva la persona como sujeto principal y respeta la carga humana del relato.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego con presente histórico en español (“viene”), conserva la serie de participios con una coordinación natural (“rogándole y arrodillándose, y diciéndole”), y refleja la revisión inglesa reciente que buscó una secuencia más fluida de acciones sin alterar el contenido.
  spanish_consistency_notes:
  - Se mantuvo 'Y viene' para reflejar el presente histórico de Marcos, en vez de suavizarlo al pretérito.
  - '''Limpiarme'' preserva la ambigüedad ritual/física documentada por la POB en inglés.'
  - Se prefirió 'un hombre con lepra' por coherencia con el enfoque person-first de la POB.
  - La puntuación española conserva la progresión de acciones del griego y evita calcos torpes del inglés.
