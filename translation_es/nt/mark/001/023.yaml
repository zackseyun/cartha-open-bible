translation:
  language: es
  text: Y enseguida había en su sinagoga un hombre con un espíritu inmundo[a], y gritó[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «en un espíritu inmundo».'
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones lo vierten como «poseído por un espíritu inmundo», una expansión interpretativa de la expresión griega.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: El adverbio marca la rapidez narrativa característica de Marcos. «Enseguida» conserva esa inmediatez en español con naturalidad y sin endurecer el ritmo.
- source_word: ἦν
  english_pob_choice: there was
  chosen_spanish: había
  alternatives_spanish:
  - había allí
  - estaba
  lexicon: BDAG
  rationale: El uso existencial de εἰμί con sujeto indefinido se refleja naturalmente con «había» en español, manteniendo la presencia del hombre en el lugar.
- source_word: συναγωγῇ αὐτῶν
  english_pob_choice: their synagogue
  chosen_spanish: su sinagoga
  alternatives_spanish:
  - la sinagoga de ellos
  - su asamblea
  lexicon: BDAG
  rationale: «Sinagoga» es el equivalente directo y claro. El posesivo «su» conserva αὐτῶν como referencia al grupo local sin forzar una construcción más pesada.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - un ser humano
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y describe a un individuo concreto; «un hombre» es preciso y natural.
- source_word: ἐν πνεύματι ἀκαθάρτῳ
  english_pob_choice: with an unclean spirit
  chosen_spanish: con un espíritu impuro
  alternatives_spanish:
  - en un espíritu impuro
  - poseído por un espíritu impuro
  lexicon: BDAG
  rationale: La frase griega literalmente dice «en un espíritu impuro», pero el español idiomático puede expresar esa relación como «con». Se elige «espíritu impuro» para mantener el valor de ἀκάθαρτος y evitar la expansión interpretativa de «poseído por».
- source_word: ἀκαθάρτῳ
  english_pob_choice: unclean
  chosen_spanish: impuro
  alternatives_spanish:
  - inmundo
  - contaminado
  lexicon: BDAG
  rationale: «Impuro» comunica la dimensión ritual/moral de ἀκάθαρτος en un español comprensible y sobrio. «Inmundo» es posible, pero hoy puede sonar más marcado o arcaizante.
- source_word: ἀνέκραξεν
  english_pob_choice: he cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El verbo indica un grito fuerte. «Gritó» expresa con claridad la intensidad del acto sin introducir un matiz emocional adicional. En el contexto narrativo, es una traducción directa y natural.
theological_decisions:
- issue: Relación expresada por ἐν πνεύματι ἀκαθάρτῳ
  english_pob_reading: with an unclean spirit
  chosen_spanish_reading: con un espíritu impuro
  alternative_spanish_readings:
  - en un espíritu impuro
  - poseído por un espíritu impuro
  rationale: La construcción griega es idiomática y permite más de una forma de decirlo en español. «Con» comunica la presencia del espíritu sin añadir la explicación más interpretativa «poseído por», que el texto no formula explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa revisada permanece estable y el chequeo cruzado reporta alta concordancia; la redacción española sigue esa línea sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se mantiene el tratamiento de πνεῦμα como «espíritu» en sentido demonológico, no como «Espíritu» santo.
  - Se conserva la inmediatez marcana con «enseguida», evitando una paráfrasis más explicativa.
  - Se evita «poseído» para no convertir una relación gramatical en una inferencia teológica no explícita en esta frase.
