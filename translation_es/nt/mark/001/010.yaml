translation:
  language: es
  text: Y al instante, mientras subía del agua, vio [a]los cielos rasgándose y al Espíritu descendiendo como una paloma sobre él.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'los cielos siendo partidos'. El verbo es más fuerte que simplemente 'abiertos'.
    reason: lexical_alternative
  - marker: b
    text: O 'hacia él'. La preposición griega εἰς puede tener valor direccional, pero aquí 'sobre él' encaja mejor con la imagen del descenso del Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: BDAG
  rationale: Preserva la urgencia narrativa característica de Marcos con un español natural y digno. 'Al instante' mantiene la vivacidad sin sonar rígido.
- source_word: ἀναβαίνων ἐκ τοῦ ὕδατος
  english_pob_choice: as he was coming up out of the water
  chosen_spanish: mientras subía del agua
  alternatives_spanish:
  - mientras salía del agua
  - al subir del agua
  lexicon: BDAG
  rationale: El participio presente pide una acción concurrente con el verbo principal; 'mientras subía' refleja bien esa simultaneidad. 'Del agua' recoge ἐκ sin forzar una perífrasis más larga.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio claramente
  - alcanzó a ver
  lexicon: BDAG
  rationale: El aoristo de percepción se expresa de forma directa con 'vio', sin añadir matices no presentes en el texto.
- source_word: σχιζομένους τοὺς οὐρανούς
  english_pob_choice: the heavens being torn open
  chosen_spanish: los cielos siendo rasgados
  alternatives_spanish:
  - los cielos siendo partidos
  - los cielos abriéndose
  lexicon: BDAG
  rationale: '''Rasgados'' conserva la fuerza de σχίζω mejor que ''abiertos''. ''Cielos'' respeta el plural griego y mantiene el registro bíblico.'
- source_word: τοὺς οὐρανούς
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos del cielo
  lexicon: BDAG
  rationale: El plural es explícito en griego; 'los cielos' lo reproduce y evita reducir la imagen a un mero cielo físico.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto bautismal el referente es divino, pero el griego dice simplemente 'el Espíritu'. 'El Espíritu' conserva esa sobriedad sin sobreespecificar.
- source_word: ὡς περιστερὰν
  english_pob_choice: like a dove
  chosen_spanish: como paloma
  alternatives_spanish:
  - como una paloma
  - cual paloma
  lexicon: BDAG
  rationale: '''Como paloma'' es idiomático en español y reproduce la comparación sin decidir si se trata de forma, modo o apariencia. Se evita añadir un artículo que el griego no requiere.'
- source_word: καταβαῖνον
  english_pob_choice: descending
  chosen_spanish: descendiendo
  alternatives_spanish:
  - bajando
  - que descendía
  lexicon: BDAG
  rationale: '''Descendiendo'' mantiene el registro elevado y sigue de cerca el valor verbal de καταβαίνω.'
- source_word: εἰς αὐτόν
  english_pob_choice: upon him
  chosen_spanish: sobre él
  alternatives_spanish:
  - en él
  - hacia él
  lexicon: BDAG
  rationale: Aunque εἰς puede significar 'en/into', aquí la imagen de la llegada del Espíritu se expresa de modo natural y fiel con 'sobre él', como en la decisión auditada del inglés. 'Sobre' conserva la escena de posarse sin imponer una interiorización no explicitada.
theological_decisions:
- issue: Alcance de τὸ πνεῦμα
  english_pob_reading: the divine Spirit, rendered 'the Spirit'
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el Espíritu Santo
  - el espíritu
  rationale: La escena identifica claramente al Espíritu divino, pero el texto griego no dice explícitamente 'Santo'. Mantener 'el Espíritu' respeta la sobriedad del original y evita ampliar la formulación más allá de lo escrito.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Comparación de la paloma
  english_pob_reading: comparison preserved as 'like a dove' without specifying whether it describes form, motion, or gentleness
  chosen_spanish_reading: como paloma
  alternative_spanish_readings:
  - como una paloma
  - en forma de paloma
  - cual paloma
  rationale: ὡς περιστερὰν expresa comparación, no definición. En español conviene conservar esa apertura y no resolver si la semejanza es de forma, movimiento o modo de descender.
  doctrine_reference: Translation philosophy §3
- issue: Fuerza de σχίζω aplicada a los cielos
  english_pob_reading: the heavens being torn open
  chosen_spanish_reading: los cielos siendo rasgados
  alternative_spanish_readings:
  - los cielos siendo partidos
  - los cielos abriéndose
  rationale: La elección retiene la violencia imagética de σχίζω y evita suavizarla con 'abriéndose', que podría sonar demasiado neutro. 'Rasgados' comunica mejor la intensidad del evento.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el pasaje a la luz del texto griego SBLGNT y del aparato auditado en inglés. No hubo revisiones aplicadas en el último pase; la traducción española conserva esa estabilidad y solo adapta la formulación al español natural sin perder la fuerza de σχίζω ni la ambigüedad controlada de ὡς περιστερὰν y εἰς αὐτόν.
  spanish_consistency_notes:
  - Se mantiene 'los cielos' para reflejar el plural griego οὐρανούς.
  - Se usa 'el Espíritu' y no 'Espíritu Santo' para conservar la formulación del original.
  - '''Sobre él'' sigue la decisión contextual del inglés POB para εἰς αὐτόν, sin forzar ''en él''.'
  - '''Rasgados'' preserva el valor enfático de σχίζω mejor que un simple ''abiertos''.'
