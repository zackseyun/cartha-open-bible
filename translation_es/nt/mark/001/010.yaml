revisions:
- from: Y al instante[a], mientras subía[b] del agua, vio los cielos siendo rasgados y al Espíritu descendiendo como paloma sobre él.
  to: Y al instante, mientras subía del agua, vio [a]los cielos rasgándose y al Espíritu descendiendo como una paloma sobre él.[b]
  rationale: Se reubica la nota sobre la frase correcta, se mejora la naturalidad de la construcción participial con 'los cielos rasgándose', y se ajusta 'como una paloma' para un español más idiomático sin perder la ambigüedad comparativa del original. Se mantiene 'al instante', 'el Espíritu' y 'sobre él' por su buena fidelidad al griego y al rastro de auditoría en inglés.
