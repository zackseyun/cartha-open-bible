  text: καὶ ⸀εὐθὺς ἀναβαίνων ⸀ἐκ τοῦ ὕδατος εἶδεν σχιζομένους τοὺς οὐρανοὺς καὶ τὸ πνεῦμα ⸀ὡς περιστερὰν καταβαῖνον ⸀εἰς αὐτόν·
base_translation:
  language: en
  yaml_path: translation/nt/mark/001/010.yaml
  text: And immediately[a], as he was coming up out of the water[b], he saw the heavens being torn open and the Spirit descending like a dove upon him.
  footnotes:
  - marker: a
    text: Or 'the heavens being split apart.' The verb is stronger than simply 'opened.'
    reason: lexical_alternative
  - marker: b
    text: Or 'into him.' Greek εἰς can mean 'into,' but here 'upon him' best fits the idiom of the Spirit's descent.
    reason: lexical_alternative
