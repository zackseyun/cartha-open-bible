translation:
  language: es
  text: El comienzo de la buena noticia de Jesús el Mesías[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "evangelio". El griego εὐαγγέλιον puede verterse como "buena noticia" o, tradicionalmente, "evangelio".
    reason: lexical_alternative
  - marker: b
    text: O "Jesús Cristo". Χριστός significa "Mesías" cuando funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀρχὴ
  english_pob_choice: The beginning
  chosen_spanish: El comienzo
  alternatives_spanish:
  - El principio
  lexicon: BDAG
  rationale: Ἀρχή puede referirse al inicio de algo o funcionar como encabezado inaugural. En español, 'El comienzo' suena natural y conserva la idea de apertura narrativa sin cargar 'principio' con posibles matices más abstractos que el contexto inmediato no exige.
- source_word: εὐαγγελίου
  english_pob_choice: good news
  chosen_spanish: buena noticia
  alternatives_spanish:
  - evangelio
  lexicon: BDAG
  rationale: Se privilegia el sentido léxico de εὐαγγέλιον como 'buena noticia' para mantener transparencia semántica. 'Evangelio' es una alternativa tradicional válida, pero aquí la traducción directa comunica mejor el valor del término griego.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención del proyecto.
- source_word: χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como mero nombre fijo. Por eso se traduce 'Mesías', en línea con la guía del POB para traducir títulos. En español, 'Cristo' es una alternativa posible, pero 'Mesías' conserva mejor la fuerza titulativa y el trasfondo hebreo.
theological_decisions:
- issue: 'Cómo rendir Χριστοῦ: título mesiánico o forma nominal tradicional'
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La lectura auditada del POB entiende Χριστός como título en esta apertura del evangelio. En español, 'Jesús Mesías' mantiene esa decisión y evita convertir el término en un simple apellido religioso tradicional.
  doctrine_reference: 'DOCTRINE.md: ''Translate titles; transliterate names'' y tabla de términos debatidos para Χριστός'
- issue: Si εὐαγγέλιον debe transliterarse como 'evangelio' o traducirse como 'buena noticia'
  english_pob_reading: good news
  chosen_spanish_reading: buena noticia
  alternative_spanish_readings:
  - evangelio
  rationale: La opción 'buena noticia' refleja más directamente el contenido léxico del término griego. 'Evangelio' es históricamente asentado en la tradición cristiana, pero aquí la traducción semántica es más transparente para el lector moderno.
  doctrine_reference: 'DOCTRINE.md: preferir traducciones transparentes cuando no se pierde precisión'
- issue: Valor de ἀρχή en el incipit de Marcos
  english_pob_reading: The beginning
  chosen_spanish_reading: El comienzo
  alternative_spanish_readings:
  - El principio
  rationale: No se fuerza una interpretación teológica adicional; se conserva la apertura nominal del texto como inicio del relato o proclamación.
  doctrine_reference: BDAG sobre ἀρχή; principios de no sobreinterpretación del incipit
translation_notes:
  revision_awareness: El historial inglés muestra una oscilación entre 'the Messiah' y 'Christ', con restauración final de 'Messiah' por coherencia doctrinal. La presente versión española sigue esa decisión final y la expresa con 'Mesías' en el texto principal, conservando en nota la alternativa tradicional 'Cristo'.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio y 'Mesías' como título traducido, coherente con la política del POB.
  - Se evita 'SEÑOR' o equivalentes litúrgicos que no pertenecen a este verso.
  - La puntuación reproduce el carácter de incipit breve y directo del original griego.
