translation:
  language: es
  text: Y Juan estaba vestido con pelo de camello y un cinturón de cuero[a] alrededor de su cintura, y comía langostas y miel silvestre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Su vestimenta recuerda la descripción de Elías en 2 Reyes 1:8, lo que contribuye a la presentación de Juan como precursor profético.
    reason: cross_reference
lexical_decisions:
- source_word: ἐνδεδυμένος
  english_pob_choice: was clothed with
  chosen_spanish: estaba vestido con
  alternatives_spanish:
  - estaba revestido con
  - llevaba
  lexicon: BDAG
  rationale: 'El participio perfecto expresa un estado resultante: Juan aparece en condición de estar vestido. En español, «estaba vestido con» conserva ese valor estativo de manera natural; «llevaba» sería más fluido, pero puede debilitar el matiz de estado.'
- source_word: τρίχας καμήλου
  english_pob_choice: camel’s hair
  chosen_spanish: pelos de camello
  alternatives_spanish:
  - pelo de camello
  - lana de camello
  lexicon: BDAG
  rationale: La frase griega apunta al material capilar del camello, no a la piel. «Pelos de camello» reproduce el sustantivo concreto; «lana de camello» sería más idiomático en español, pero introduce una equivalencia material no explicitada por el texto.
- source_word: ζώνην δερματίνην
  english_pob_choice: a leather belt
  chosen_spanish: un cinturón de cuero
  alternatives_spanish:
  - un cinturón de piel
  - una faja de cuero
  lexicon: BDAG
  rationale: ζώνη designa una banda o cinturón; en español, «cinturón» es el equivalente más claro. «De cuero» expresa δερματίνην de forma directa y actual. «Faja» es posible, pero menos precisa para el contexto.
- source_word: περὶ τὴν ὀσφὺν αὐτοῦ
  english_pob_choice: around his waist
  chosen_spanish: alrededor de su cintura
  alternatives_spanish:
  - alrededor de sus lomos
  - en torno a su cintura
  lexicon: BDAG
  rationale: ὀσφύς se refiere a la zona de la cintura/lomos. «Cintura» es la forma más clara y natural en español moderno; «lomos» preservaría mayor literalidad, pero suena arcaico y menos transparente.
- source_word: ἔσθων
  english_pob_choice: he was eating
  chosen_spanish: comía
  alternatives_spanish:
  - estaba comiendo
  - iba comiendo
  lexicon: BDAG
  rationale: El participio presente describe acción habitual o en curso dentro del retrato narrativo. En español, el imperfecto «comía» comunica bien ese trasfondo descriptivo sin sobrecargar la frase. «Estaba comiendo» sería más explícito, pero menos sobrio.
- source_word: ἀκρίδας
  english_pob_choice: locusts
  chosen_spanish: langostas
  alternatives_spanish:
  - saltamontes
  - insectos
  lexicon: BDAG
  rationale: El término estándar es el insecto «langostas». Aunque «saltamontes» puede parecer más familiar, en este contexto bíblico el uso léxico tradicional y preciso es «langostas».
- source_word: μέλι ἄγριον
  english_pob_choice: wild honey
  chosen_spanish: miel silvestre
  alternatives_spanish:
  - miel salvaje
  - miel del monte
  lexicon: BDAG
  rationale: El adjetivo ἄγριος indica algo del campo o de lo silvestre. «Miel silvestre» suena natural en español y conserva la idea de miel hallada en estado salvaje; «miel salvaje» podría leerse como literalismo innecesario.
- source_word: καὶ ἦν
  english_pob_choice: Now ... was
  chosen_spanish: Y ... estaba
  alternatives_spanish:
  - Ahora ... estaba
  - Y ... era
  lexicon: BDAG
  rationale: La partícula enlaza el relato con continuidad narrativa. En español, «Y» mantiene esa conexión sin introducir una inferencia interpretativa adicional como «Ahora». La perífrasis con «estaba» conserva el valor descriptivo de estado.
theological_decisions:
- issue: Relación implícita con Elías/figura profética
  english_pob_reading: Translate the verse descriptively without importing an explicit identification with Elijah into the main text.
  chosen_spanish_reading: Traducir de modo descriptivo, sin insertar en el texto principal una identificación explícita con Elías.
  alternative_spanish_readings:
  - Añadir en el cuerpo «que recordaba a Elías»
  - Traducir de forma más literal y dejar la conexión solo para nota
  rationale: El texto griego describe la vestimenta y la dieta de Juan, pero no formula explícitamente la conexión con Elías. Mantener el verso descriptivo evita imponer una interpretación en la línea principal; la relación intertextual puede señalarse en nota sin convertirla en parte de la traducción.
  doctrine_reference: Principio de primacía del texto fuente; evitar importar al texto principal una lectura intertextual no explícita.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que indicó que no eran necesarios cambios y mantuvo alta concordancia; por ello, la redacción española sigue de cerca el audit trail inglés y conserva la decisión de no incorporar la alusión a Elías en el texto principal.
  spanish_consistency_notes:
  - Se preservó la descripción continua con imperfectos («estaba vestido», «comía») para reflejar el valor aspectual del participio griego.
  - Se usó «cinturón de cuero» como equivalente natural de ζώνην δερματίνην sin perder el matiz material.
  - Se eligió «miel silvestre» para mantener el sentido de ἄγριον sin añadir especificaciones ajenas al texto.
  - La nota al pie solo aparece donde hay un anclaje textual explícito en «cuero[a]».
