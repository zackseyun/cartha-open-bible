translation:
  language: es
  text: Y después de que Juan fue entregado[a], Jesús vino a Galilea, proclamando la buena noticia de Dios[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'después de que Juan fue arrestado'. El griego dice más literalmente 'después de que Juan fue entregado', una formulación que también anticipa el lenguaje de la pasión en Marcos.
    reason: lexical_alternative
  - marker: b
    text: O 'el evangelio de Dios'.
    reason: lexical_alternative
  - marker: c
    text: La frase 'de Dios' puede significar que la buena noticia proviene de Dios, le pertenece a Dios o está centrada en Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ τὸ παραδοθῆναι
  english_pob_choice: after ... was handed over
  chosen_spanish: después de que Juan fue entregado
  alternatives_spanish:
  - después de que Juan fue arrestado
  - después de que Juan fue entregado en manos de otros
  lexicon: BDAG
  rationale: La construcción temporal con μετά + infinitivo articular se rinde naturalmente como 'después de que'. παραδίδωμι conserva mejor su fuerza en 'fue entregado', que mantiene la posibilidad de entrega hostil o judicial sin reducir el sentido a 'arrestado'.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Juan el Bautista
  lexicon: Nombre propio estándar
  rationale: El nombre propio se traduce al español como 'Juan'. El contexto identifica al mismo Juan del marco narrativo sin necesidad de añadir el título.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: En español, con la preposición de movimiento siguiente ('a Galilea'), 'fue' expresa con naturalidad el desplazamiento sin perder el valor básico del aoristo de ἔρχομαι. 'Vino' sería posible, pero suena menos neutral en este contexto.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - en Galilea
  lexicon: BDAG
  rationale: Aunque εἰς suele indicar movimiento hacia/into, en español 'a Galilea' comunica bien la dirección con mayor naturalidad que un calco como 'dentro de Galilea'. Se conserva el impulso de entrada sin forzar la sintaxis.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: '''Proclamando'' reproduce el matiz de anuncio público y solemne de κηρύσσω, sin restringirlo al ámbito eclesial o homilético que puede sugerir ''predicando''.'
- source_word: εὐαγγέλιον
  english_pob_choice: good news
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  - buenas nuevas
  lexicon: BDAG
  rationale: Aquí se adopta 'evangelio' porque en español bíblico la expresión ya funciona como término técnico y comunicativamente claro. La nota deja visible la alternativa semántica 'buena noticia' para no perder la fuerza lexical del griego.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - acerca de Dios
  lexicon: BDAG
  rationale: 'La frase se mantiene formalmente amplia como ''de Dios'', preservando la ambigüedad del genitivo: puede ser el evangelio que pertenece a Dios, que procede de Dios o que tiene a Dios como centro.'
theological_decisions:
- issue: Retención de παραδοθῆναι como 'fue entregado'
  english_pob_reading: was handed over
  chosen_spanish_reading: fue entregado
  alternative_spanish_readings:
  - fue arrestado
  - fue puesto en manos de otros
  rationale: Se conserva el eco narrativo y teológico de παραδίδωμι en Marcos, que anticipa el vocabulario de la pasión. 'Fue entregado' evita especificar el mecanismo histórico más allá de lo que el texto afirma.
  doctrine_reference: Preservar la tensión y la interconexión narrativa del evangelio de Marcos.
- issue: Ambigüedad del genitivo en τὸ εὐαγγέλιον τοῦ θεοῦ
  english_pob_reading: the good news of God
  chosen_spanish_reading: el evangelio de Dios
  alternative_spanish_readings:
  - la buena noticia de Dios
  - el evangelio que viene de Dios
  - el evangelio acerca de Dios
  rationale: '''El evangelio de Dios'' mantiene la amplitud del genitivo y también la formulación más natural en la tradición bíblica española, sin cerrar la relación semántica que el griego deja abierta.'
  doctrine_reference: Preservar una ambigüedad legítima del texto original sin resolverla interpretativamente.
translation_notes:
  revision_awareness: 'Se siguió el registro auditado en inglés, pero se ajustó la sintaxis al español natural: ''fue entregado'' para παραδοθῆναι, ''fue a Galilea'' para εἰς τὴν Γαλιλαίαν y ''evangelio de Dios'' para conservar tanto el sentido tradicional como la ambigüedad del genitivo. No se introdujeron lecturas nuevas ni se resolvieron las tensiones documentadas.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'evangelio' para εὐαγγέλιον según el uso bíblico español, con nota que preserva la alternativa semántica.
  - Se evita 'SEÑOR' porque no aparece en este versículo; no hay necesidad de marcar el nombre divino aquí.
  - Se conserva la referencia a Juan sin añadir 'el Bautista', ya que el contexto inmediato basta y el original no lo explicita en este versículo.
