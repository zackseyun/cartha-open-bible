review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: πενθερά = ''suegra'', κατέκειτο = estado durativo, πυρέσσουσα = fiebre, εὐθύς = inmediatez, y περὶ αὐτῆς = ''sobre/de ella''. Sin embargo, ''le hablaron de ella'' debilita el valor de λέγουσιν en este contexto narrativo, donde el sentido es más bien ''le dijeron / le informaron'', no simplemente ''hablaron''.'
  spanish_quality_summary: El español es claro y natural, pero 'yacía con fiebre' suena algo literario/arcaizante y puede sugerir un matiz más solemne de lo necesario. 'Estaba acostada con fiebre' o 'estaba en cama con fiebre' suena más natural y conserva el imperfecto durativo. Además, 'le dijeron de ella' no sería natural, por lo que conviene ajustar ambos segmentos de forma idiomática.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. Las decisiones léxicas principales son adecuadas, salvo que 'le hablaron' no es la mejor correspondencia contextual para λέγουσιν aquí. No se requieren notas; la nota inglesa sobre el presente histórico no es necesaria en español si se usa una forma narrativa idiomática.
  issues:
  - severity: medium
    issue: '''le hablaron de ella'' es menos preciso que el griego contextual'
    rationale: λέγουσιν con περὶ αὐτῆς en este entorno narrativo significa que informaron a Jesús acerca de ella. 'Hablaron de ella' puede sonar a conversación general, no a aviso dirigido.
  - severity: low
    issue: '''yacía con fiebre'' suena algo rígido en español actual'
    rationale: Aunque defendible, 'yacía' es más literario y menos transparente para lectura eclesial general que 'estaba acostada', que conserva bien el aspecto imperfectivo de κατέκειτο.
  revised_spanish_text: La suegra de Simón estaba acostada con fiebre, y enseguida le dijeron acerca de ella.
  revision_rationale: Se reemplaza 'yacía' por 'estaba acostada' para un español más natural y fiel al imperfecto durativo de κατέκειτο, sin añadir el matiz más fuerte de 'encamada'. Se cambia 'le hablaron de ella' por 'le dijeron acerca de ella' para reflejar mejor el valor comunicativo de λέγουσιν περὶ αὐτῆς como informar a Jesús sobre ella.
