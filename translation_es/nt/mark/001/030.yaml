- from: La suegra de Simón yacía con fiebre, y enseguida le hablaron de ella.
  to: La suegra de Simón estaba acostada con fiebre, y enseguida le dijeron acerca de ella.
  rationale: Se reemplaza 'yacía' por 'estaba acostada' para un español más natural y fiel al imperfecto durativo de κατέκειτο, sin añadir el matiz más fuerte de 'encamada'. Se cambia 'le hablaron de ella' por 'le dijeron acerca de ella' para reflejar mejor el valor comunicativo de λέγουσιν περὶ αὐτῆς como informar a Jesús sobre ella.
