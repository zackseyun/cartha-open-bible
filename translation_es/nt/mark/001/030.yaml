translation:
  language: es
  text: La suegra de Simón estaba acostada con fiebre, y enseguida le dijeron acerca de ella.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πενθερά
  english_pob_choice: mother-in-law
  chosen_spanish: suegra
  alternatives_spanish:
  - madre política
  lexicon: BDAG
  rationale: El término normal de parentesco en este contexto es la suegra de Simón. 'Suegra' es la forma natural y exacta en español.
- source_word: Σίμωνος
  english_pob_choice: Simon’s
  chosen_spanish: de Simón
  alternatives_spanish:
  - de Simón el discípulo
  lexicon: SBLGNT context
  rationale: 'El genitivo marca posesión o relación: la suegra pertenece al círculo familiar de Simón. Mantengo la referencia simple al nombre propio sin añadir información no presente.'
- source_word: κατέκειτο
  english_pob_choice: was lying
  chosen_spanish: yacía
  alternatives_spanish:
  - estaba acostada
  - estaba tendida
  lexicon: BDAG
  rationale: El imperfecto indica estado durativo; 'yacía' conserva bien la idea de estar tendida o acostada sin sobrerrepresentar la gravedad con 'postrada' o 'encamada'.
- source_word: πυρέσσουσα
  english_pob_choice: sick with a fever
  chosen_spanish: con fiebre
  alternatives_spanish:
  - febril
  - enferma de fiebre
  lexicon: BDAG
  rationale: El participio expresa que padecía fiebre. 'Con fiebre' es una solución natural en español y comunica el estado de enfermedad de modo directo.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: En Marcos, εὐθύς marca rapidez narrativa. 'Enseguida' es muy natural en español y conserva la urgencia del relato.
- source_word: λέγουσιν
  english_pob_choice: they told
  chosen_spanish: le hablaron
  alternatives_spanish:
  - le dijeron
  - le contaron
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español la forma más idiomática es un pasado simple. 'Le hablaron de ella' preserva el sentido comunicativo de decirle algo acerca de la enferma.
- source_word: περὶ αὐτῆς
  english_pob_choice: about her
  chosen_spanish: de ella
  alternatives_spanish:
  - acerca de ella
  - sobre ella
  lexicon: BDAG
  rationale: La preposición περί con genitivo equivale aquí a 'acerca de'. 'De ella' resulta más natural en español tras 'hablaron'.
translation_notes:
  revision_awareness: La versión española sigue la lectura principal del texto griego y adopta el valor narrativo de εὐθύς como rapidez secuencial. Se evita un calco del presente histórico de λέγουσιν porque en español sonaría menos natural; la equivalencia se conserva en el verbo de comunicación y en la nota de decisión léxica. No se incluyen notas al pie porque no hay una alternativa textual necesaria que requiera marcador en el texto.
  spanish_consistency_notes:
  - Usé 'suegra' para πενθερά, en línea con el sentido kinship estándar.
  - Mantuve un registro sobrio y bíblico sin arcaísmos innecesarios.
  - '''Yacía'' y ''con fiebre'' juntos reflejan bien el aspecto durativo del griego.'
  - '''Enseguida'' reproduce la función narrativa de εὐθύς en Marcos.'
  - '''Le hablaron de ella'' es idiomático en español y evita un calco duro de ''le dijeron acerca de ella''.'
