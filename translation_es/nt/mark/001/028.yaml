revisions:
- from: Y la noticia acerca de él se difundió enseguida por toda la región circundante de Galilea[a][b].
  to: Y la noticia acerca de él se difundió enseguida en todas partes, por toda la región circundante de Galilea[a][b].
  rationale: Se añade 'en todas partes' para reflejar explícitamente πανταχοῦ, manteniendo a la vez una frase natural en español. Se ajusta la nota a para mejorar la alternativa léxica en español, y la nota b para conservar mejor la alternativa documentada sobre el alcance total de la difusión.
