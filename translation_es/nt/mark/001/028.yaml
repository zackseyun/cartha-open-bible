translation:
  language: es
  text: Y la noticia acerca de él se difundió enseguida en todas partes, por toda la región circundante de Galilea[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el informe acerca de él» o «su fama».
    reason: lexical_alternative
  - marker: b
    text: O «en todas partes por toda la región circundante».
    reason: previous_rendering
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: se difundió
  alternatives_spanish:
  - salió
  - fue publicada
  - se corrió
  lexicon: BDAG
  rationale: El verbo griego describe el movimiento hacia afuera de la noticia o del rumor. En español, «se difundió» comunica bien esa propagación sin perder naturalidad, aunque «salió» sería más literal. Se evita «se corrió» por ser demasiado coloquial.
- source_word: ἀκοὴ
  english_pob_choice: news
  chosen_spanish: la noticia
  alternatives_spanish:
  - el reporte
  - la fama
  - lo que se oía
  lexicon: BDAG
  rationale: ἀκοή puede significar lo oído, es decir, noticia o informe. «La noticia» funciona de modo claro en español y preserva el carácter de algo que circula entre la gente. «La fama» introduce un matiz de reputación que no es necesario aquí.
- source_word: αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - de él
  - sobre él
  - en cuanto a él
  lexicon: BDAG
  rationale: El genitivo con ἀκοή indica el contenido de la noticia. «Acerca de él» expresa bien ese referente en español sin convertirlo en posesión.
- source_word: εὐθὺς
  english_pob_choice: at once
  chosen_spanish: enseguida
  alternatives_spanish:
  - de inmediato
  - al instante
  - inmediatamente
  lexicon: BDAG
  rationale: «Enseguida» es una equivalencia natural y clara para la inmediatez marcada por εὐθύς en Marcos.
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: por toda
  alternatives_spanish:
  - en todas partes
  - por doquier
  - por todo
  lexicon: BDAG
  rationale: El adverbio griego expresa amplia difusión. En combinación con «la región circundante», «por toda» transmite la extensión del alcance sin sonar forzado.
- source_word: περίχωρον
  english_pob_choice: surrounding region
  chosen_spanish: región circundante
  alternatives_spanish:
  - distrito circundante
  - comarca circundante
  - región alrededor
  lexicon: BDAG
  rationale: περίχωρος se refiere al área o región alrededor de un lugar. «Región circundante» conserva el sentido geográfico y es inteligible en español contemporáneo.
- source_word: εἰς ὅλην τὴν περίχωρον τῆς Γαλιλαίας
  english_pob_choice: into the whole surrounding region of Galilee
  chosen_spanish: por toda la región circundante de Galilea
  alternatives_spanish:
  - a toda la región circundante de Galilea
  - en toda la región circundante de Galilea
  - por todo el entorno de Galilea
  lexicon: BDAG
  rationale: La combinación de εἰς con un alcance total se vierte de manera más natural en español con una expresión de difusión extensa. Se conserva «Galilea» como genitivo especificador y se evita un calco como «hacia el interior de» que sonaría artificial en este contexto.
theological_decisions:
- issue: Alcance de ἀκοὴ αὐτοῦ
  english_pob_reading: Rendered as 'the news about him' rather than 'his fame.'
  chosen_spanish_reading: «la noticia acerca de él» en lugar de «su fama»
  alternative_spanish_readings:
  - su fama
  - el reporte acerca de él
  - lo que se decía de él
  rationale: El pasaje habla de la difusión de lo que se había oído acerca de Jesús. «Su fama» es posible, pero añade un matiz de celebridad o prestigio que no exige el sustantivo griego. La opción elegida mantiene la tensión entre noticia e informe sin sobrerrepresentar el efecto social.
  doctrine_reference: Translation philosophy §1, §6
- issue: Relación espacial de εἰς con la difusión del rumor
  english_pob_reading: everywhere into the whole surrounding region
  chosen_spanish_reading: «por toda la región circundante de Galilea»
  alternative_spanish_readings:
  - en toda la región circundante de Galilea
  - a toda la región circundante de Galilea
  - por todo el entorno de Galilea
  rationale: Aunque εἰς puede conservar una idea de ingreso, en español la difusión de una noticia se expresa mejor con una fórmula de extensión. La elección evita forzar una imagen espacial demasiado literal y mantiene el sentido de propagación total.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'El audit trail inglés muestra dos ajustes de revisión: se prefirió mantener εἰς con una formulación natural, y luego se volvió a «into» frente a «throughout». En español, la solución más fiel y idiomática para la difusión de una noticia es una construcción de alcance extensivo («por toda la región circundante»), que conserva la propagación total sin un calco espacial artificial. No hay indicios textuales de variantes manuscritas relevantes para este versículo en el paquete provisto.'
  spanish_consistency_notes:
  - Se mantiene «noticia» para ἀκοή, en línea con la preferencia POB por un referente audible/circulante más que por «fama».
  - Se usa «Jesús» solo implícitamente por el pronombre; no se introduce el nombre porque el versículo no lo repite.
  - «Región circundante» conserva el valor geográfico de περίχωρος sin restringirlo a una zona rural.
  - La puntuación y el ritmo buscan ser publicables en español neutral, evitando un calco excesivo del orden griego.
