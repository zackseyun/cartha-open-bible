translation:
  language: es
  text: Y avanzando un poco más, vio a Jacobo, hijo de Zebedeo, y a Juan, su hermano, y ellos estaban en la barca remendando[a] las redes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reparando» o «preparando» las redes; el verbo griego puede significar poner algo en orden o restaurarlo a su estado adecuado.
    reason: lexical_alternative
lexical_decisions:
- source_word: προβὰς ὀλίγον
  english_pob_choice: going on a little farther
  chosen_spanish: avanzando un poco más
  alternatives_spanish:
  - habiendo avanzado un poco
  - después de avanzar un poco más
  lexicon: BDAG
  rationale: El participio aoristo con ὀλίγον expresa avance breve y circunstancial. «Avanzando un poco más» conserva la idea de movimiento continuo y corto en un español natural, sin añadir duración ni énfasis que el griego no exige.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - lo vio
  - se dio cuenta de
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω se expresa de forma directa con «vio». Mantiene la sencillez del relato y no introduce matices de percepción más fuertes que el texto original.
- source_word: Ἰάκωβον τὸν τοῦ Ζεβεδαίου
  english_pob_choice: James the son of Zebedee
  chosen_spanish: Jacobo, hijo de Zebedeo
  alternatives_spanish:
  - Santiago, hijo de Zebedeo
  - Jacobo, el hijo de Zebedeo
  lexicon: BDAG
  rationale: La construcción con artículo y genitivo identifica a Jacobo por filiación. Se mantiene «hijo de Zebedeo» como equivalente natural y fiel; se conserva «Jacobo» por coherencia con la tradición textual del proyecto y su nomenclatura auditada.
- source_word: Ἰωάννην τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: John his brother
  chosen_spanish: Juan, su hermano
  alternatives_spanish:
  - Juan, el hermano de él
  - Juan, hermano de Jacobo
  lexicon: BDAG
  rationale: El pronombre αὐτοῦ remite naturalmente a Jacobo en esta coordinación. «Su hermano» es breve, claro y conserva la relación fraterna sin sobreespecificar lo que el griego deja implícito.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  - dentro de la barca
  lexicon: BDAG
  rationale: Aunque el inglés POB dice «boat», en español «barca» es más natural en este contexto de pesca y mantiene la referencia concreta sin perder el valor definido del artículo griego.
- source_word: καταρτίζοντας
  english_pob_choice: mending
  chosen_spanish: remendando
  alternatives_spanish:
  - reparando
  - preparando
  - arreglando
  lexicon: BDAG
  rationale: καταρτίζω puede significar poner en orden, restaurar o preparar. En contexto de redes de pesca, «remendando» comunica de forma idiomática la acción concreta y preserva la posibilidad semántica de reparación; se mantiene la tensión léxica documentada sin reducirla a una sola idea abstracta.
- source_word: τὰ δίκτυα
  english_pob_choice: the nets
  chosen_spanish: las redes
  alternatives_spanish:
  - las mallas
  - las redes de pesca
  lexicon: BDAG
  rationale: δίκτυα son redes de pesca. «Redes» es el equivalente natural en español; el artículo definido se conserva con «las» sin añadir posesivo explícito que el griego no presenta.
- source_word: καὶ αὐτούς
  english_pob_choice: and they were
  chosen_spanish: y ellos estaban
  alternatives_spanish:
  - y estaban
  - y los vio
  lexicon: BDAG
  rationale: El griego presenta a los dos hombres como objeto de la visión, seguido de la acción que realizaban. En español, «y ellos estaban» permite expresar de forma fluida lo que se ve, sin forzar una construcción demasiado literal como «y los vio... remendando»; el referente queda claro por el contexto inmediato.
translation_notes:
  revision_awareness: 'Coincide sustancialmente con la última revisión auditada: no se requieren cambios doctrinales ni textuales. Se preserva la equivalencia óptima del POB inglés, ajustada a una formulación española natural y fiel al griego.'
  spanish_consistency_notes:
  - Se mantiene el nombre «Jacobo» para este relato, en coherencia con el criterio editorial del proyecto.
  - Se usa «barca» para el objeto de pesca por ser la opción más idiomática en español, sin alterar el referente definido del griego.
  - La nota léxica sobre καταρτίζω conserva la alternativa semántica documentada por el POB inglés.
