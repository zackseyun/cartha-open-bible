revisions:
- from: 'Y le dice a él: «Mira que no digas nada a nadie; más bien, ve, muéstrate al sacerdote y presenta por tu limpieza lo que Moisés ordenó, como testimonio para ellos».'
  to: 'Y le dice: «Mira que no digas nada a nadie; más bien, ve, muéstrate al sacerdote y ofrece por tu purificación lo que Moisés ordenó, como testimonio para ellos[a]».'
  rationale: Se ajusta «presenta» a «ofrece» para reflejar mejor el contexto cultual de προσένεγκε, y «limpieza» a «purificación» para un español más natural y digno en contexto ritual. Se añade una nota para preservar la ambigüedad documentada de εἰς μαρτύριον αὐτοῖς. También se elimina el «a él» redundante para mejorar la fluidez sin pérdida de sentido.
