translation:
  language: es
  text: 'Y le dice: «Mira que no digas nada a nadie; más bien, ve, muéstrate al sacerdote y ofrece por tu purificación lo que Moisés ordenó, como testimonio para ellos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por testimonio para ellos»; la frase puede significar evidencia presentada a los sacerdotes u otros, y algunos la entienden con un matiz más fuerte como testimonio contra ellos.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅρα
  english_pob_choice: See that
  chosen_spanish: Mira que
  alternatives_spanish:
  - Ten cuidado de que
  - Mira
  lexicon: BDAG
  rationale: El imperativo introductorio tiene fuerza de advertencia/exhortación; «Mira que» conserva esa función de forma natural en español sin endurecerse innecesariamente.
- source_word: μηδενὶ μηδὲν εἴπῃς
  english_pob_choice: you say nothing to anyone
  chosen_spanish: no digas nada a nadie
  alternatives_spanish:
  - no le digas nada a nadie
  - no hables con nadie de esto
  lexicon: BDAG
  rationale: La doble negación intensifica la prohibición. «No digas nada a nadie» reproduce bien el alcance completo del mandato en español.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - sino
  - en cambio
  lexicon: BDAG
  rationale: Marca contraste correctivo entre la prohibición y la acción exigida; «más bien» suena natural y preserva la transición.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: BDAG
  rationale: Imperativo de movimiento directo; «ve» es la forma más breve y fiel en español corriente.
- source_word: σεαυτὸν δεῖξον τῷ ἱερεῖ
  english_pob_choice: show yourself to the priest
  chosen_spanish: muéstrate al sacerdote
  alternatives_spanish:
  - preséntate al sacerdote
  - muéstrate ante el sacerdote
  lexicon: BDAG
  rationale: El reflexivo exige una forma en español que conserve la auto-presentación requerida por la inspección sacerdotal. «Muéstrate al sacerdote» sigue de cerca el griego y es claro.
- source_word: ἱερεῖ
  english_pob_choice: the priest
  chosen_spanish: el sacerdote
  alternatives_spanish:
  - un sacerdote
  lexicon: BDAG
  rationale: En contexto legal-cultual, el artículo señala la autoridad sacerdotal pertinente; en español, «el sacerdote» comunica naturalmente esa referencia.
- source_word: προσένεγκε
  english_pob_choice: offer
  chosen_spanish: presenta
  alternatives_spanish:
  - ofrece
  - trae
  lexicon: BDAG
  rationale: Aquí el contexto es el rito de purificación; aunque «ofrece» es posible por el trasfondo cultual, «presenta» evita sobreespecificar una ofrenda sacrificial si el énfasis es llevar lo prescrito para el acto de purificación.
- source_word: περὶ τοῦ καθαρισμοῦ σου
  english_pob_choice: for your cleansing
  chosen_spanish: por tu limpieza
  alternatives_spanish:
  - para tu limpieza
  - por tu purificación
  lexicon: BDAG
  rationale: «Limpieza» mantiene el sentido concreto y sencillo del sustantivo en este contexto de sanidad/purificación ritual; «purificación» también es posible, pero puede sonar más abstracto en español.
- source_word: ἃ προσέταξεν Μωϋσῆς
  english_pob_choice: what Moses commanded
  chosen_spanish: lo que Moisés ordenó
  alternatives_spanish:
  - lo que Moisés mandó
  - las cosas que Moisés ordenó
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte naturalmente como un colectivo singular en español. «Ordenó» conserva la fuerza normativa de la disposición mosaica.
- source_word: εἰς μαρτύριον αὐτοῖς
  english_pob_choice: as a testimony to them
  chosen_spanish: como testimonio para ellos
  alternatives_spanish:
  - como testimonio a ellos
  - como prueba para ellos
  lexicon: BDAG
  rationale: «Testimonio» conserva la carga de μαρτύριον; «para ellos» mantiene la ambigüedad del referente y evita decidir si el testimonio es solo probatorio o también confrontativo.
theological_decisions:
- issue: Fuerza y alcance de εἰς μαρτύριον αὐτοῖς
  english_pob_reading: 'Kept intentionally broad: the prescribed offering and priestly verification function as testimony to the relevant observers, likely the priests and/or the community, without specifying whether the testimony is merely evidentiary or implicitly confrontational.'
  chosen_spanish_reading: 'Se conserva en forma amplia: la presentación prescrita funciona como testimonio para los observadores pertinentes, sin precisar si es solo prueba o también testimonio contra ellos.'
  alternative_spanish_readings:
  - como prueba para los sacerdotes
  - como testimonio contra ellos
  rationale: El griego no dice explícitamente «contra», así que la traducción debe preservar la ambigüedad textual. «Para ellos» deja abierto el alcance del testimonio sin resolver la tensión interpretativa.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota no anclada; el texto ahora no incluye marcadores de nota, por lo que no hay desajuste entre español y aparato de notas.
  spanish_consistency_notes:
  - Se mantiene «sacerdote» para ἱερεύς conforme al contexto levítico.
  - Se evita «Cristo» porque no aparece en el versículo.
  - Se usa una sintaxis directa y publicable en español moderno, sin borrar la forma imperativa y la progresión del griego.
