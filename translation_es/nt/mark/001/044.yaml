  text: καὶ λέγει αὐτῷ· Ὅρα μηδενὶ μηδὲν εἴπῃς, ἀλλὰ ὕπαγε σεαυτὸν δεῖξον τῷ ἱερεῖ καὶ προσένεγκε περὶ τοῦ καθαρισμοῦ σου ἃ προσέταξεν Μωϋσῆς εἰς μαρτύριον αὐτοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/mark/001/044.yaml
  text: And he says to him[a], “See that you say nothing to anyone; rather, go, show yourself to the priest, and offer for your cleansing what Moses commanded, as a testimony to them.”
  footnotes:
