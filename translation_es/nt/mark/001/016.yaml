revisions:
- from: Y al pasar junto al mar de Galilea, vio a Simón y a Andrés, el hermano de Simón, echando una red en el mar, porque eran pescadores.
  to: Y al pasar junto al mar de Galilea, vio a Simón y a Andrés, hermano de Simón, echando una red al mar, porque eran pescadores.
  rationale: Se ajusta la aposición para que «hermano de Simón» identifique con claridad a Andrés, conforme al griego, y se sustituye «en el mar» por «al mar» para reflejar de manera más natural en español el acto de lanzar la red sin apartarse del sentido del original.
