translation:
  language: es
  text: Y al pasar junto al mar de Galilea, vio a Simón y a Andrés, hermano de Simón, echando una red al mar, porque eran pescadores.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: παράγων
  english_pob_choice: as he was passing along
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaba
  - pasando
  lexicon: BDAG
  rationale: El participio presente expresa acción simultánea con el verbo principal. En español, «al pasar» comunica de forma natural ese trasfondo narrativo sin perder el matiz de continuidad.
- source_word: παρὰ τὴν θάλασσαν
  english_pob_choice: beside the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - al lado del mar
  - por la orilla del mar
  lexicon: BDAG
  rationale: La preposición παρά con acusativo indica movimiento a lo largo de o junto a algo. «Junto al mar» conserva la proximidad espacial de manera idiomática en español.
- source_word: τὴν θάλασσαν τῆς Γαλιλαίας
  english_pob_choice: the Sea of Galilee
  chosen_spanish: el mar de Galilea
  alternatives_spanish:
  - el lago de Galilea
  - el mar de Galilea
  lexicon: BDAG
  rationale: El griego usa θάλασσα, aunque el referente geográfico sea el lago conocido como Galilea. «Mar de Galilea» sigue el término tradicionalmente identificable y respeta la forma del original mejor que «lago» en este contexto narrativo.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - notó
  lexicon: BDAG
  rationale: El aoristo de ὁράω se rinde de manera directa con «vio», sin añadir una matización interpretativa que el texto no exige.
- source_word: Σίμωνα καὶ Ἀνδρέαν
  english_pob_choice: Simon and Andrew
  chosen_spanish: a Simón y a Andrés
  alternatives_spanish:
  - Simón y Andrés
  lexicon: BDAG
  rationale: Los nombres propios se conservan en su forma habitual en español. Se mantiene la preposición personal para aclarar el objeto directo en una sintaxis fluida.
- source_word: τὸν ἀδελφὸν Σίμωνος
  english_pob_choice: Simon’s brother
  chosen_spanish: el hermano de Simón
  alternatives_spanish:
  - el hermano de Simón
  - Simón, su hermano
  lexicon: BDAG
  rationale: La construcción en genitivo identifica a Andrés por relación familiar. «El hermano de Simón» reproduce de manera transparente esa identificación sin forzar una paráfrasis.
- source_word: ἀμφιβάλλοντας
  english_pob_choice: casting a net
  chosen_spanish: echando una red
  alternatives_spanish:
  - lanzando una red
  - tirando una red
  lexicon: BDAG
  rationale: El verbo específico alude al acto de lanzar una red para pescar. En español, «echando una red» conserva la acción concreta con naturalidad; se evita un verbo genérico que debilitaría el sentido técnico.
- source_word: ἐν τῇ θαλάσσῃ
  english_pob_choice: into the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - al mar
  - dentro del mar
  lexicon: BDAG
  rationale: Aunque el inglés auditado usa «into the sea» por idiomática, el griego aquí dice literalmente «en el mar». En español, con el participio de acción, «en el mar» resulta natural y suficientemente fiel al marco espacial del acto de echar la red.
- source_word: ἦσαν γὰρ ἁλιεῖς
  english_pob_choice: for they were fishermen
  chosen_spanish: porque eran pescadores
  alternatives_spanish:
  - pues eran pescadores
  - ya que eran pescadores
  lexicon: BDAG
  rationale: γάρ introduce una explicación de fondo. «Porque» transmite bien esa relación explicativa en español y mantiene el tono narrativo sencillo del texto.
translation_notes:
  revision_awareness: El pasaje coincide con el sentido y la estructura del texto griego, y el audit trail inglés no registra revisiones ni notas textuales; por eso no se introducen notas críticas adicionales.
  spanish_consistency_notes:
  - Se mantiene «mar de Galilea» para la designación geográfica, coherente con el uso bíblico y con el valor de θάλασσα en el original.
  - Se conserva el progreso narrativo con un participio español inicial («al pasar») para reflejar la simultaneidad del griego.
  - No se introduce «Cristo», «SEÑOR» ni terminología teológica ajena al versículo.
  - La redacción evita calcos duros como «pasando por» o «en la sea» y prioriza una sintaxis bíblica clara en español.
