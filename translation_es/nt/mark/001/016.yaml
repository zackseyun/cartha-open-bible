review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: acción simultánea de παράγων, ubicación junto al mar de Galilea, identificación de Simón y Andrés, y la cláusula explicativa final. Sin embargo, dos puntos requieren ajuste para mayor fidelidad y naturalidad: (1) la aposición τὸν ἀδελφὸν Σίμωνος se refiere a Andrés, por lo que en español conviene evitar la posible ambigüedad de «Simón y Andrés, el hermano de Simón»; (2) ἐν τῇ θαλάσσῃ con ἀμφιβάλλοντας se expresa más naturalmente en español como dirección de lanzamiento («al mar») que como ubicación estática («en el mar»).'
  spanish_quality_summary: El español es claro y digno, pero «Simón y Andrés, el hermano de Simón» suena algo trabado y puede interpretarse momentáneamente como si ambos estuvieran en aposición. «Andrés, el hermano de Simón» resuelve esto con mejor legibilidad. También «echando una red en el mar» es comprensible, pero «echando una red al mar» suena más idiomático para el acto de lanzar una red.
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. «Mar de Galilea», «vio», y «pescadores» concuerdan con la terminología y con el razonamiento auditado. El cambio de «en el mar» a «al mar» no altera doctrina ni glosario; mejora la correspondencia semántica del acto de echar la red.
  issues:
  - severity: medium
    issue: Aposición potencialmente ambigua en «Simón y Andrés, el hermano de Simón».
    rationale: En griego, τὸν ἀδελφὸν Σίμωνος modifica a Ἀνδρέαν. El español actual puede aclararlo mejor reordenando a «Simón y a Andrés, hermano de Simón» o «Simón y Andrés, el hermano de Simón», pero la forma presente suena menos precisa y más pesada.
  - severity: low
    issue: «en el mar» es menos idiomático que «al mar» con «echando una red».
    rationale: Aunque ἐν es formalmente locativo, el propio razonamiento del POB inglés explica que con verbos de lanzar el español también favorece una expresión de dirección. «Al mar» conserva mejor la escena de acción.
  revised_spanish_text: Y al pasar junto al mar de Galilea, vio a Simón y a Andrés, hermano de Simón, echando una red al mar, porque eran pescadores.
  revision_rationale: Se ajusta la aposición para que «hermano de Simón» identifique con claridad a Andrés, conforme al griego, y se sustituye «en el mar» por «al mar» para reflejar de manera más natural en español el acto de lanzar la red sin apartarse del sentido del original.
