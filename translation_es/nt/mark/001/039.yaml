translation:
  language: es
  text: Y recorrió toda Galilea, predicando en sus sinagogas y expulsando demonios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἦλθεν
  english_pob_choice: he went throughout
  chosen_spanish: recorrió
  alternatives_spanish:
  - fue por
  - anduvo por
  - vino
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι puede expresar movimiento itinerante. En español, «recorrió» comunica bien el desplazamiento por toda la región sin forzar el sentido de «vino» en un contexto que describe actividad ministerial a través de Galilea.
- source_word: κηρύσσων
  english_pob_choice: preaching
  chosen_spanish: predicando
  alternatives_spanish:
  - proclamando
  - anunciando
  - heraldando
  lexicon: BDAG
  rationale: κηρύσσω denota proclamación pública. «Predicando» es el equivalente natural y eclesialmente claro en español, especialmente en el contexto de las sinagogas, y conserva la idea de proclamación.
- source_word: εἰς τὰς συναγωγὰς αὐτῶν
  english_pob_choice: in their synagogues
  chosen_spanish: en sus sinagogas
  alternatives_spanish:
  - a sus sinagogas
  - dentro de sus sinagogas
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente «a/into», aquí funciona idiomáticamente con el verbo de actividad para expresar el ámbito donde enseña. «En sus sinagogas» suena natural en español y conserva el posesivo αὐτῶν como referencia al pueblo de Galilea.
- source_word: εἰς ὅλην τὴν Γαλιλαίαν
  english_pob_choice: throughout all Galilee
  chosen_spanish: toda Galilea
  alternatives_spanish:
  - por toda Galilea
  - a lo largo de toda Galilea
  - por toda la región de Galilea
  lexicon: BDAG
  rationale: El segundo εἰς con ὅλην marca extensión geográfica. «Toda Galilea» expresa la totalidad del ámbito recorrido de forma compacta y natural; el matiz distributivo de movimiento queda implícito en «recorrió».
- source_word: τὰ δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  - espíritus inmundos
  lexicon: BDAG
  rationale: δαιμόνια se refiere directamente a seres demoníacos. «Demonios» es la correspondencia más directa y evita sustituir el término por una expresión más interpretativa como «espíritus inmundos».
- source_word: ἐκβάλλων
  english_pob_choice: casting out
  chosen_spanish: expulsando
  alternatives_spanish:
  - echando fuera
  - arrojando fuera
  - expulsando de
  lexicon: BDAG
  rationale: En contextos de exorcismo, ἐκβάλλω significa expulsar o echar fuera. «Expulsando» transmite la fuerza del acto en español contemporáneo y mantiene el sentido de autoridad sobre los demonios.
theological_decisions:
- issue: Naturaleza de δαιμόνια y alcance de la acción de Jesús
  english_pob_reading: Rendered as 'demons' in the ordinary personal-spiritual sense.
  chosen_spanish_reading: Demonios, entendidos como seres personales espirituales expulsados por Jesús.
  alternative_spanish_readings:
  - espíritus malignos
  - espíritus inmundos
  rationale: El texto presenta una confrontación real con agentes demoníacos. «Demonios» conserva la lectura más directa del griego sin cargar el versículo con explicaciones doctrinales ajenas al contexto.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota al pie no anclada. En esta versión no se incluyen marcadores de nota, de modo que el texto queda autosuficiente y conforme al verso griego y al audit trail inglés.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o fórmulas de sustitución no presentes en el texto fuente.
  - Se mantuvo un registro verbal natural en español, sin calco de «went throughout»; el matiz itinerante queda en «recorrió».
  - «Predicando» y «expulsando demonios» conservan la fuerza verbal continua de los participios griegos.
