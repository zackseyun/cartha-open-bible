revisions:
- from: Juan el Bautista apareció en el desierto[a], proclamando un bautismo de arrepentimiento para el perdón de pecados.
  to: Juan el Bautista apareció en la región desierta[a], proclamando un bautismo de arrepentimiento para el perdón de pecados.
  rationale: Se ajusta ἐν τῇ ἐρήμῳ de «en el desierto» a «en la región desierta» para reflejar mejor el valor de ἔρημος y alinearse con la decisión auditada «wilderness», evitando una imagen demasiado estrecha. Se actualiza la nota para mantener consistencia. El resto del texto es fiel, natural y teológicamente prudente.
