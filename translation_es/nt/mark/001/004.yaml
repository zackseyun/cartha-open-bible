translation:
  language: es
  text: Juan el Bautista apareció en la región desierta[a], proclamando un bautismo de arrepentimiento para el perdón de pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Juan el Bautizador apareció en la región desierta, proclamando...». El participio griego puede representarse de manera más explícita como un título.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - vino a ser
  - se presentó
  - apareció en escena
  lexicon: BDAG
  rationale: En Marcos, ἐγένετο con sujeto nominal funciona idiomáticamente para introducir al personaje en la narración. «Apareció» comunica esa entrada narrativa con naturalidad en español sin volverlo rígido.
- source_word: Ἰωάννης
  english_pob_choice: John
  chosen_spanish: Juan
  alternatives_spanish:
  - Johanan
  lexicon: Convención onomástica bíblica
  rationale: Los nombres propios se transcriben según la convención española establecida; «Juan» es la forma natural y reconocible en español.
- source_word: ὁ βαπτίζων
  english_pob_choice: the Baptist
  chosen_spanish: el Bautista
  alternatives_spanish:
  - el bautizador
  - el que bautiza
  - el bautizante
  lexicon: BDAG
  rationale: El participio identifica a Juan por su rasgo/función; en español, «el Bautista» es la forma breve y entendible que preserva esa identificación, como reflejo del valor titular que la revisión inglesa decidió explicitar.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto agreste
  - en la soledad
  - en la región desierta
  lexicon: BDAG
  rationale: «ἔρημος» puede designar un paraje deshabitado/árido. En español, «desierto» es la opción más natural y mantiene la resonancia bíblica, sin obligar a imaginar solo un desierto arenoso.
- source_word: κηρύσσων
  english_pob_choice: proclaiming
  chosen_spanish: proclamando
  alternatives_spanish:
  - predicando
  - anunciando
  lexicon: BDAG
  rationale: «Proclamando» conserva el tono heraldo de κηρύσσω y evita cargar el texto con un matiz eclesiástico más estrecho que «predicando».
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - lavamiento
  - inmersión
  lexicon: BDAG
  rationale: El término ya pertenece al vocabulario cristiano estable; «bautismo» es la equivalencia directa y más transparente en español.
- source_word: μετανοίας
  english_pob_choice: of repentance
  chosen_spanish: de arrepentimiento
  alternatives_spanish:
  - de cambio de mente
  - de conversión
  lexicon: BDAG
  rationale: Aquí el genitivo describe el bautismo como asociado a la respuesta moral/espiritual de arrepentimiento. «Arrepentimiento» preserva esa fuerza mejor que una paráfrasis cognitiva.
- source_word: εἰς ἄφεσιν ἁμαρτιῶν
  english_pob_choice: for the forgiveness of sins
  chosen_spanish: para el perdón de pecados
  alternatives_spanish:
  - para remisión de pecados
  - con miras al perdón de pecados
  - resultando en el perdón de pecados
  lexicon: BDAG
  rationale: «Para» expresa bien propósito o resultado sin decidir si el bautismo es instrumental, simbólico o declarativo. «Perdón» es el equivalente natural de ἄφεσις en este contexto.
- source_word: ἁμαρτιῶν
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - pecado
  lexicon: BDAG
  rationale: El plural está explícito en griego y debe conservarse en español.
theological_decisions:
- issue: Relación entre bautismo, arrepentimiento y perdón
  english_pob_reading: Rendered the phrase as 'a baptism of repentance for the forgiveness of sins' without specifying whether baptism is instrumental, symbolic, or declarative.
  chosen_spanish_reading: «un bautismo de arrepentimiento para el perdón de pecados», sin precisar si el bautismo es instrumental, simbólico o declarativo.
  alternative_spanish_readings:
  - un bautismo que significa arrepentimiento y conduce al perdón de pecados
  - un bautismo ligado al arrepentimiento para el perdón de pecados
  rationale: La construcción griega establece la relación entre los elementos, pero no obliga al traductor a resolver debates doctrinales posteriores. La redacción española conserva esa tensión.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla
translation_notes:
  revision_awareness: La revisión inglesa más reciente añadió «the Baptist» para representar ὁ βαπτίζων; la presente versión española lo refleja con «el Bautista». También se mantuvo la estructura general de la frase revisada y se adaptó el valor de ἐν τῇ ἐρήμῳ a una equivalencia natural en español.
  spanish_consistency_notes:
  - Se mantuvo «bautismo» y no «lavamiento» o «inmersión», siguiendo el uso asentado del término en español y la decisión inglesa.
  - Se eligió «perdón de pecados» en lugar de una formulación más técnica como «remisión», porque en español comunica con claridad el valor de ἄφεσις sin perder fidelidad.
  - «Desierto» se usó como equivalente de ἔρημος para conservar la resonancia bíblica y la naturalidad idiomática.
  - La nota al pie preserva la alternativa titular («Bautizador») que la tradición de revisión inglesa consideró al explicitar ὁ βαπτίζων.
