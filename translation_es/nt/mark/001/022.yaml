translation:
  language: es
  text: Y se asombraban[a] de su enseñanza, porque les enseñaba como quien tiene autoridad, y no como los escribas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «como quien tenía autoridad»; más idiomáticamente, «con autoridad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: se asombraban
  alternatives_spanish:
  - se maravillaban
  - quedaban asombrados
  lexicon: BDAG
  rationale: El imperfecto griego presenta una reacción en curso; «se asombraban» conserva ese matiz durativo y suena natural en español narrativo. Evita una forma demasiado estática y mantiene la intensidad de la reacción.
- source_word: ἐπὶ τῇ διδαχῇ αὐτοῦ
  english_pob_choice: at his teaching
  chosen_spanish: de su enseñanza
  alternatives_spanish:
  - por su enseñanza
  - ante su enseñanza
  lexicon: BDAG
  rationale: «διδαχή» aquí se refiere al contenido y al modo de enseñar de Jesús. En español, «de su enseñanza» expresa con naturalidad el objeto de la admiración, sin introducir «doctrina» como término más técnico de lo que exige el contexto.
- source_word: ἦν γὰρ διδάσκων
  english_pob_choice: for he was teaching
  chosen_spanish: porque les enseñaba
  alternatives_spanish:
  - pues estaba enseñándoles
  - porque estaba enseñándoles
  lexicon: BDAG
  rationale: La construcción perifrástica con ἦν + participio comunica acción continua. «Les enseñaba» reproduce ese valor aspectual de manera idiomática en español y evita una rigidez innecesaria.
- source_word: ὡς ἐξουσίαν ἔχων
  english_pob_choice: as one having authority
  chosen_spanish: como uno que tiene autoridad
  alternatives_spanish:
  - como uno con autoridad
  - como quien tiene autoridad
  lexicon: BDAG
  rationale: La estructura con ὡς mantiene una comparación directa. «Como uno que tiene autoridad» refleja con claridad esa forma y conserva la tensión lexical sin cerrar interpretativamente la frase con «autoridad divina».
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los doctores de la ley
  - los maestros de la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y tradicional para γραμματεῖς en este contexto judío. Las alternativas explicativas añaden interpretación y no son necesarias en el texto principal.
theological_decisions:
- issue: Origen y alcance de la autoridad de Jesús
  english_pob_reading: Render the statement descriptively without expanding the source into a doctrinal explanation of divine authority.
  chosen_spanish_reading: 'Traducir descriptivamente: Jesús enseña como uno que tiene autoridad, sin explicitar en el texto que esa autoridad sea «divina».'
  alternative_spanish_readings:
  - enseñaba con autoridad divina
  - enseñaba con plena autoridad
  rationale: El versículo contrasta la manera de enseñar de Jesús con la de los escribas, pero no define aquí la ontología o el origen de esa autoridad. La versión española preserva esa tensión teológica en lugar de resolverla con una expansión doctrinal.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el alcance de ἐξουσία en este versículo.
translation_notes:
  revision_awareness: Coincide con el pasaje griego y con la auditoría inglesa de alta concordancia; no se detectan revisiones aplicadas en el contexto de origen. La decisión principal es mantener el aspecto imperfectivo y la comparación con ὡς sin doctrinalizar la autoridad.
  spanish_consistency_notes:
  - «Escribas» se mantiene para γραμματεῖς en consonancia con el uso bíblico habitual y con la auditoría inglesa.
  - Se evita «doctrina» en el texto principal porque en español puede sonar más técnico que el griego διδαχή en este contexto narrativo.
  - «Se asombraban» conserva el aspecto durativo del imperfecto mejor que un perfecto puntual.
