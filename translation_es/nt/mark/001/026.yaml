translation:
  language: es
  text: Y el espíritu inmundo[a], después de convulsionarlo y dando un fuerte grito[b], salió de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de haberlo convulsionado»; el participio griego puede expresarse de manera más formal, pero la redacción elegida aclara mejor la secuencia.
    reason: lexical_alternative
  - marker: b
    text: O «clamando a gran voz»; el griego dice literalmente «habiendo clamado/sonado con voz grande».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπαράξαν
  english_pob_choice: after convulsing
  chosen_spanish: después de convulsionarlo
  alternatives_spanish:
  - habiéndolo convulsionado
  - después de sacudirlo violentamente
  - después de retorcerlo
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal y expresa una acción previa al salir del espíritu. «Convulsionarlo» conserva el sentido de un movimiento espasmódico o violento y encaja bien en el contexto de expulsión demoníaca, sin cargar el texto con un literalismo como «desgarrarlo».
- source_word: τὸ πνεῦμα τὸ ἀκάθαρτον
  english_pob_choice: the unclean spirit
  chosen_spanish: el espíritu inmundo
  alternatives_spanish:
  - el espíritu impuro
  - el espíritu contaminado
  lexicon: BDAG
  rationale: «Inmundo» conserva la cualidad ritual/moral de ἀκάθαρτος y reproduce la expresión estable del evangelio. «Impuro» sería posible, pero en español suaviza un poco la resonancia bíblica del término.
- source_word: φωνῆσαν
  english_pob_choice: crying out
  chosen_spanish: clamar
  alternatives_spanish:
  - gritando
  - dando un grito
  - exclamando
  lexicon: BDAG
  rationale: El participio indica una vocalización fuerte acompañando la salida. «Clamar» preserva la intensidad del acto y suena más digno y bíblico que «gritar», sin perder fuerza.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - con voz alta
  - con gran voz
  - con un gran grito
  lexicon: BDAG
  rationale: La frase dativa expresa manera y menciona explícitamente «voz». En español, «con voz fuerte» conserva el sustantivo y la idea de intensidad; «voz alta» es posible, pero menos natural para este contexto narrativo.
- source_word: ἐξῆλθεν ἐξ αὐτοῦ
  english_pob_choice: came out of him
  chosen_spanish: salió de él
  alternatives_spanish:
  - salió de dentro de él
  - se salió de él
  - salió fuera de él
  lexicon: BDAG
  rationale: Es una fórmula directa de exorcismo. «Salió de él» es la forma más natural y fiel al movimiento espacial del texto griego.
theological_decisions:
- issue: Naturaleza del ente que posee
  english_pob_reading: the phrase refers to a personal demonic spirit
  chosen_spanish_reading: la frase se refiere a un espíritu demoníaco personal
  alternative_spanish_readings:
  - una fuerza impersonal del mal
  - una influencia maligna impersonal
  rationale: El relato presenta al espíritu como agente que convulsiona, clama y sale. La traducción mantiene esa agencia personal sin añadir explicaciones doctrinales que el texto no da.
  doctrine_reference: Afirmaciones; preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la revisión más reciente; esta propuesta sigue esa línea, manteniendo el orden narrativo y las decisiones léxicas principales sin ampliar ni suavizar el contenido fuente.
  spanish_consistency_notes:
  - Se mantiene «espíritu inmundo» como término técnico coherente con el uso sinóptico.
  - Se evita traducir mecánicamente como «desgarrando» para no imponer una imagen más literal de la que el contexto español requiere.
  - «Con voz fuerte» preserva la mención explícita de «voz» frente a opciones más interpretativas.
  - 'La puntuación y el orden siguen la progresión del griego: acción previa, voz fuerte, salida del espíritu.'
