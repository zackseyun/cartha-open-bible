revisions:
- from: Y sanó a muchos que estaban enfermos[a] con diversas enfermedades, y expulsó a muchos demonios, y no les permitía hablar, porque lo conocían.
  to: Y sanó a muchos que estaban enfermos con diversas enfermedades, y expulsó a muchos demonios, y no permitía hablar a los demonios, porque lo conocían[a].
  rationale: Se corrige la ubicación de la nota para que corresponda a ᾔδεισαν αὐτόν y se explicita 'a los demonios' para reflejar mejor el griego y mejorar la claridad en español sin cambiar el sentido.
