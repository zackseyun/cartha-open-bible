translation:
  language: es
  text: Y sanó a muchos que estaban enfermos con diversas enfermedades, y expulsó a muchos demonios, y no permitía hablar a los demonios, porque lo conocían[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sabían quién era». El griego dice simplemente: «lo conocían».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθεράπευσεν
  english_pob_choice: he healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - sanó/curó
  lexicon: BDAG
  rationale: θεραπεύω puede expresar la acción de sanar o curar; en español, "sanó" es natural, digno y comunica bien la restauración física sin sonar mecánico.
- source_word: πολλοὺς κακῶς ἔχοντας
  english_pob_choice: many who were sick
  chosen_spanish: a muchos que estaban enfermos
  alternatives_spanish:
  - a muchos que estaban mal
  - a muchos muy afligidos
  lexicon: BDAG
  rationale: La expresión griega es idiomática para referirse a personas enfermas. "Estaban enfermos" conserva el sentido sin trasladar literalmente la construcción de "tener mal".
- source_word: ποικίλαις νόσοις
  english_pob_choice: with various diseases
  chosen_spanish: con diversas enfermedades
  alternatives_spanish:
  - con muchas clases de enfermedades
  - con enfermedades de toda clase
  lexicon: BDAG
  rationale: ποικίλος indica variedad; νόσος, enfermedad. "Diversas enfermedades" reproduce bien la amplitud del término y mantiene el paralelismo natural del español.
- source_word: δαιμόνια πολλὰ ἐξέβαλεν
  english_pob_choice: he cast out many demons
  chosen_spanish: expulsó a muchos demonios
  alternatives_spanish:
  - echó fuera a muchos demonios
  - arrojó fuera a muchos demonios
  lexicon: BDAG
  rationale: ἐκβάλλω en contexto de exorcismo comunica expulsión. "Expulsó" es claro en español y preserva la fuerza de sacar fuera a los demonios.
- source_word: οὐκ ἤφιεν
  english_pob_choice: he would not allow
  chosen_spanish: no les permitía
  alternatives_spanish:
  - no les permitía hacerlo
  - no los dejaba
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua o reiterada en la escena. "No les permitía" conserva ese matiz mejor que un simple pasado puntual.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir algo
  - hablar
  lexicon: BDAG
  rationale: λαλέω es el verbo ordinario de hablar; "hablar" es el equivalente más directo y natural en esta narración.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la causa de la prohibición. "Porque" expresa claramente la relación causal en español.
- source_word: ᾔδεισαν αὐτόν
  english_pob_choice: they knew him
  chosen_spanish: lo conocían
  alternatives_spanish:
  - lo sabían
  - sabían quién era
  lexicon: BDAG
  rationale: El griego dice simplemente que lo conocían; en español, "lo conocían" conserva la concisión y evita añadir explícitamente una identificación que el texto no formula aquí.
theological_decisions:
- issue: Si ampliar el conocimiento de los demonios a una confesión cristológica explícita
  english_pob_reading: they knew him
  chosen_spanish_reading: lo conocían
  alternative_spanish_readings:
  - sabían quién era
  - lo conocían como el Mesías / el Hijo de Dios
  rationale: El versículo solo afirma que lo conocían. Traducirlo de forma más amplia introduciría una aclaración interpretativa no presente en este enunciado y suavizaría la tensión del texto.
  doctrine_reference: 'POB translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'Se siguió el testimonio del griego SBLGNT y la audita inglesa: se mantuvo la concisión de ᾔδεισαν αὐτόν sin expandirla a una confesión cristológica, y se prefirió una formulación española natural que conserve el sentido narrativo y exorcístico del verso.'
  spanish_consistency_notes:
  - Se usa "sanó" para θεραπεύω, coherente con un registro bíblico claro y moderno.
  - Se usa "demonios" para δαιμόνια, siguiendo el término técnico del contexto exorcístico.
  - Se preserva "permitía" para el imperfecto ἤφιεν, respetando el valor aspectual de acción continua.
  - La nota a pie mantiene la alternativa lexical documentada sin introducir interpretación adicional.
