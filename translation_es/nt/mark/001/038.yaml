base_translation:
  language: en
  yaml_path: translation/nt/mark/001/038.yaml
  text: And he said to them[a], “Let us go elsewhere, to the neighboring towns, so that I may preach there also[b], for that is why I came out.”
  footnotes:
  - marker: a
    text: Or 'for this purpose I came out.' The phrase may refer simply to Jesus' leaving the present place, or more broadly to his purpose in going out to preach.
    reason: alternative_reading
  - marker: b
    text: The Greek term rendered 'towns' can denote smaller settlements, something between villages and towns.
    reason: lexical_alternative
