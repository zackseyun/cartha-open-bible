translation:
  language: es
  text: 'Y les dijo[a]: «Vayamos a otro lugar, a los pueblos vecinos, para que también allí predique, porque para eso salí[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les habla». El griego usa un presente histórico, pero el español narrativo suele verterlo en pasado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «para este propósito salí». La frase puede referirse simplemente a la salida del lugar presente, o más ampliamente al motivo de su salida para predicar.'
    reason: theological_note
lexical_decisions:
- source_word: λέγει αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  - les habló
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse naturalmente en pasado narrativo en español sin perder valor. «Les dijo» conserva la dirección del habla con estilo bíblico contemporáneo.
- source_word: Ἄγωμεν
  english_pob_choice: Let us go
  chosen_spanish: Vayamos
  alternatives_spanish:
  - Vamos
  - Iremos
  lexicon: BDAG
  rationale: Es un subjuntivo exhortativo en primera persona plural; «Vayamos» preserva la invitación conjunta con tono natural en español.
- source_word: ἀλλαχοῦ
  english_pob_choice: elsewhere
  chosen_spanish: a otro lugar
  alternatives_spanish:
  - en otra parte
  - a otra parte
  lexicon: BDAG
  rationale: «Elsewhere» se expresa de forma idiomática como «a otro lugar», manteniendo la idea de desplazamiento desde el sitio presente.
- source_word: ἐχομένας
  english_pob_choice: neighboring
  chosen_spanish: vecinos
  alternatives_spanish:
  - cercanos
  - próximos
  lexicon: BDAG
  rationale: El participio funciona aquí de modo espacial/geográfico; «vecinos» reproduce la proximidad entre asentamientos con naturalidad en español.
- source_word: κωμοπόλεις
  english_pob_choice: towns
  chosen_spanish: pueblos
  alternatives_spanish:
  - aldeas
  - poblados
  lexicon: BDAG
  rationale: El término denota asentamientos menores, entre aldea y ciudad. «Pueblos» comunica mejor esa amplitud en español que «ciudades» y evita sobreespecificar.
- source_word: ἵνα καὶ ἐκεῖ κηρύξω
  english_pob_choice: so that I may preach there also
  chosen_spanish: para que también allí predique
  alternatives_spanish:
  - para que allí también proclame
  - para predicar también allí
  lexicon: BDAG
  rationale: «Para que» expresa la finalidad de ἵνα; «predique» traduce κηρύξω de forma usual y fiel. Se mantiene el énfasis de καὶ ἐκεῖ con «también allí».
- source_word: εἰς τοῦτο
  english_pob_choice: for that is why
  chosen_spanish: porque para esto
  alternatives_spanish:
  - pues para esto
  - porque con este fin
  lexicon: BDAG
  rationale: La expresión idiomática se vierte de manera natural con valor causal/final. «Porque para esto» conserva la fuerza explicativa sin imponer una formulación más interpretativa.
- source_word: ἐξῆλθον
  english_pob_choice: I came out
  chosen_spanish: salí
  alternatives_spanish:
  - salí de aquí
  - he salido
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι puede referirse al acto de salir del lugar actual. «Salí» preserva la ambigüedad entre el sentido local y un posible matiz misional, como en el texto inglés.
theological_decisions:
- issue: Alcance de ἐξῆλθον
  english_pob_reading: Rendered generally as 'I came out' without specifying whether Jesus means leaving the house/current location or his broader mission.
  chosen_spanish_reading: Traducido de forma general como «salí», sin precisar si se trata de dejar el lugar inmediato o de una salida con sentido misional más amplio.
  alternative_spanish_readings:
  - salí de aquí
  - he salido para esto
  rationale: El griego admite ambas posibilidades; la traducción conserva la tensión sin resolverla. Así se evita imponer una interpretación doctrinal o narrativa que el texto no exige.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa cambió «into the neighboring towns» por «to the neighboring towns» para reflejar mejor el movimiento; en español se adoptó directamente «a los pueblos vecinos», que ya expresa esa relación direccional de manera natural. Se mantuvo intacta la ambigüedad de εἰς τοῦτο γὰρ ἐξῆλθον.
  spanish_consistency_notes:
  - Se preserva «Yahvé» en contextos donde el texto lo requiera; aquí no aparece.
  - «Predique» mantiene el registro de proclamación pública de κηρύσσω.
  - «Pueblos vecinos» evita una terminología eclesiástica más cargada y conserva la dimensión geográfica del texto.
  - La puntuación con comillas angulares sigue el estilo editorial del español bíblico moderno.
