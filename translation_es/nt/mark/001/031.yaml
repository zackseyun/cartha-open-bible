translation:
  language: es
  text: Y acercándose, la levantó, tomándola de la mano; y la fiebre la dejó, y les sirvió.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσελθὼν
  english_pob_choice: coming near
  chosen_spanish: acercándose
  alternatives_spanish:
  - acercándose a ella
  - al acercarse
  lexicon: BDAG
  rationale: El participio aoristo de προσέρχομαι expresa la aproximación previa a la acción principal. «Acercándose» mantiene la secuencia participial y suena natural en español sin añadir especificaciones innecesarias.
- source_word: ἤγειρεν
  english_pob_choice: raised her up
  chosen_spanish: la levantó
  alternatives_spanish:
  - la alzó
  - la hizo levantarse
  lexicon: BDAG
  rationale: ἐγείρω aquí describe el acto físico de ponerla en pie. En español, «la levantó» conserva la fuerza verbal de elevar/poner de pie sin volverlo demasiado explicativo.
- source_word: κρατήσας τῆς χειρός
  english_pob_choice: taking her by the hand
  chosen_spanish: tomándola de la mano
  alternatives_spanish:
  - tomándola por la mano
  - agarrándole la mano
  lexicon: BDAG
  rationale: La construcción idiomática griega con genitivo corresponde naturalmente a «de la mano». «Tomándola de la mano» refleja el medio/acompañamiento de la acción anterior con español claro y digno.
- source_word: ἀφῆκεν αὐτὴν
  english_pob_choice: left her
  chosen_spanish: la dejó
  alternatives_spanish:
  - la soltó
  - se apartó de ella
  lexicon: BDAG
  rationale: En este contexto ἀφίημι se refiere a la partida de la fiebre de ella. «La dejó» reproduce bien la formulación idiomática y evita sobreinterpretar el verbo como una acción de Jesús hacia ella.
- source_word: ὁ πυρετός
  english_pob_choice: the fever
  chosen_spanish: la fiebre
  alternatives_spanish:
  - fiebre
  lexicon: BDAG
  rationale: Con artículo, el griego señala la enfermedad concreta que la afligía. El español natural es «la fiebre», manteniendo la personificación o concreción del padecimiento.
- source_word: διηκόνει
  english_pob_choice: served them
  chosen_spanish: les servía
  alternatives_spanish:
  - les servía continuamente
  - les atendía
  - les ministraba
  lexicon: BDAG
  rationale: El imperfecto de διακονέω puede describir la acción en curso después de la sanidad. «Les servía» conserva el aspecto imperfectivo sin añadir un ingrésivo explícito que el texto griego no expresa.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - al grupo
  lexicon: BDAG
  rationale: El dativo plural se refiere al grupo presente. En español, el clítico «les» comunica de manera natural ese referente plural.
theological_decisions:
- issue: Posible resonancia de ἐγείρω con lenguaje de resurrección
  english_pob_reading: raised her up
  chosen_spanish_reading: la levantó
  alternative_spanish_readings:
  - la ayudó a levantarse
  - la alzó
  rationale: Aquí el verbo describe una sanidad física, no una resurrección. «La levantó» conserva el eco de «levantar/poner en pie» sin importar una lectura pascual que el contexto no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó «began» porque no está expresado en el griego; por eso el español evita cualquier equivalente ingresivo y deja simplemente el imperfecto natural «les servía».
  spanish_consistency_notes:
  - Se conserva un registro bíblico sobrio y moderno, sin reemplazar términos por fórmulas eclesiásticas innecesarias.
  - Se mantiene la distinción entre acción puntual (aoristos) y acción en curso (imperfecto) en la medida en que el español lo permite.
  - No se usó «Cristo», «Señor» ni otro título no presente en el versículo.
  - La traducción evita añadir matices de «comenzó a» o «empezó a» que no están en el griego.
  - El pronombre plural se mantiene implícito de forma natural con «les»; el contexto determina que el referente es el grupo presente.
