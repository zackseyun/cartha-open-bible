translation:
  language: es
  text: 'Así como está escrito en Isaías el profeta[a]: «He aquí, envío a mi mensajero delante de tu rostro[b][c], quien preparará tu camino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos dicen «en los profetas» en lugar de «en Isaías el profeta».
    reason: textual_variant
  - marker: b
    text: 'O: «delante de ti». Literalmente: «delante de tu rostro».'
    reason: lexical_alternative
  - marker: c
    text: La cita combina lenguaje de Malaquías 3:1 e Isaías 40:3.
    reason: cross_reference
lexical_decisions:
- source_word: Καθὼς
  english_pob_choice: Just as
  chosen_spanish: Así como
  alternatives_spanish:
  - Como
  - Tal como
  lexicon: BDAG
  rationale: Expresa la relación comparativa con naturalidad en español y conserva el valor de correspondencia del griego sin endurecer el estilo.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula bíblica en español se expresa con fluidez como estado escritural vigente; mantiene el tono autoritativo del perfecto pasivo sin sonar forzado.
- source_word: ἐν τῷ Ἠσαΐᾳ τῷ προφήτῃ
  english_pob_choice: in Isaiah the prophet
  chosen_spanish: en Isaías el profeta
  alternatives_spanish:
  - en el profeta Isaías
  - en el libro de Isaías
  lexicon: BDAG
  rationale: Sigue de cerca la referencia del texto griego y preserva la identificación nominal del profeta sin armonizar la cita compuesta.
- source_word: Ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: He aquí
  alternatives_spanish:
  - Mira
  - Vea
  lexicon: BDAG
  rationale: «He aquí» conserva el matiz profético y solemne de llamada de atención, más acorde con la cita escritural que una forma más coloquial.
- source_word: ἀποστέλλω
  english_pob_choice: I send
  chosen_spanish: envío
  alternatives_spanish:
  - estoy enviando
  - mando
  lexicon: BDAG
  rationale: El presente del griego se refleja directamente con el presente simple español, manteniendo la inmediatez profética sin añadir perífrasis.
- source_word: ἄγγελόν
  english_pob_choice: messenger
  chosen_spanish: mensajero
  alternatives_spanish:
  - ángel
  lexicon: BDAG
  rationale: Aquí el referente es un enviado humano, no un ser celestial; «mensajero» evita introducir una lectura angélica ajena al contexto de la cita.
- source_word: πρὸ προσώπου σου
  english_pob_choice: before your face
  chosen_spanish: delante de tu rostro
  alternatives_spanish:
  - delante de ti
  - ante tu presencia
  lexicon: BDAG
  rationale: Se mantiene la imagen literal de «rostro» para reflejar la formulación del griego y el giro idiomático de la cita, sin perder inteligibilidad en español.
- source_word: κατασκευάσει
  english_pob_choice: will prepare
  chosen_spanish: preparará
  alternatives_spanish:
  - alistará
  - preparará el camino para
  lexicon: BDAG
  rationale: «Preparará» reproduce con claridad el sentido de preparar o dejar listo, y funciona bien con el objeto directo que sigue.
- source_word: τὴν ὁδόν σου
  english_pob_choice: your way
  chosen_spanish: tu camino
  alternatives_spanish:
  - tu senda
  - el camino para ti
  lexicon: BDAG
  rationale: En español «camino» comunica bien la metáfora bíblica de ὁδός y mantiene la resonancia profética de la ruta que ha de ser preparada.
theological_decisions:
- issue: La cita atribuye la profecía a Isaías, aunque el contenido combina lenguaje asociado con Malaquías y con Isaías.
  english_pob_reading: Retain the text as 'in Isaiah the prophet' in the main text, while noting the composite quotation and manuscript variation.
  chosen_spanish_reading: Mantener «en Isaías el profeta» en el texto principal, con nota sobre la variante manuscrita y la cita compuesta.
  alternative_spanish_readings:
  - en los profetas
  - en el libro de Isaías
  rationale: El texto griego base nombra a Isaías; la traducción debe reflejar esa forma sin resolver la tensión por armonización. La nota preserva tanto la variante manuscrita como la observación intertextual.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar la tensión textual)
- issue: El sintagma προ προσώπου σου puede sonar literalmente como 'antes de tu rostro', pero en español puede leerse también como 'delante de ti'.
  english_pob_reading: Or 'before you.' Literally, 'before your face.'
  chosen_spanish_reading: Conservar «delante de tu rostro» en el texto principal y anotar la alternativa natural «delante de ti».
  alternative_spanish_readings:
  - delante de ti
  - ante ti
  rationale: La forma literal mantiene la correspondencia con el griego y con la opción auditada en inglés; la nota ofrece la equivalencia idiomática natural para el lector hispanohablante sin borrar la imagen corporal.
  doctrine_reference: Translation philosophy §2 (claridad con fidelidad)
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del contexto inglés: se prefirió el presente simple para ἀποστέλλω y una expresión más cercana a πρὸ προσώπου σου. También se conservó la tensión de la atribución a Isaías sin armonizarla, tal como exige el expediente auditado.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma predeterminada solo cuando el texto lo requiera explícitamente; este versículo no contiene el nombre divino.
  - Se mantuvo un registro bíblico digno, pero con español natural y no arcaizante.
  - «Mensajero» se emplea en sentido humano, coherente con la cita de Malaquías/Isaías y con el expediente inglés.
  - Se preservó la imagen metafórica de «camino» para ὁδός en lugar de sustituirla por una paráfrasis explicativa.
