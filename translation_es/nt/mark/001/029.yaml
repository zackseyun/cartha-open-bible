- from: Y enseguida, después de salir de la sinagoga, fueron a la casa de Simón y de Andrés, con Jacobo y Juan.
  to: Y enseguida, después de salir de la sinagoga, entraron en la casa de Simón y Andrés, con Jacobo y Juan.
  rationale: Se ajusta «fueron a la casa» a «entraron en la casa» para reflejar con mayor fidelidad la fuerza direccional de εἰς y el resultado del movimiento en el contexto narrativo, manteniendo un español natural y digno. También se simplifica «de Simón y de Andrés» a «de Simón y Andrés», que suena más fluido sin perder claridad.
