review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: inmediatez, salida de la sinagoga, desplazamiento a la casa de Simón y Andrés, y acompañamiento de Jacobo y Juan. Sin embargo, atenúa un matiz importante de εἰς τὴν οἰκίαν al traducir solo «a la casa» en vez de una forma que exprese entrada, y «fueron» es menos cercano que «entraron» o «vinieron» al doble movimiento ἐξελθόντες ἦλθον dentro del contexto narrativo con destino interior.'
  spanish_quality_summary: El español es natural y claro, pero puede mejorarse para reflejar mejor la fuerza direccional del griego sin volverse rígido. «Enseguida» y «después de salir de la sinagoga» funcionan bien. La frase suena más idiomática y más precisa con «entraron en la casa» que con «fueron a la casa».
  glossary_alignment: No hay términos del glosario teológico principal en juego. Los nombres propios están bien adaptados al español. «Jacobo» es defendible y coherente con la justificación dada. No se requieren notas.
  issues:
  - severity: medium
    issue: «a la casa» no preserva plenamente la fuerza de εἰς τὴν οἰκίαν
    rationale: El griego indica movimiento hacia el interior de la casa, no solo dirección general hacia ella. «Entraron en la casa» o «vinieron a la casa» conserva mejor ese matiz.
  - severity: medium
    issue: «fueron» debilita la relación entre ἐξελθόντες y ἦλθον en este contexto
    rationale: Aunque «fueron» es posible en español, aquí el texto no solo indica desplazamiento sino llegada/entrada a un lugar específico. «Entraron» expresa mejor el resultado del movimiento implícito en εἰς τὴν οἰκίαν y produce una frase más natural.
  revised_spanish_text: Y enseguida, después de salir de la sinagoga, entraron en la casa de Simón y Andrés, con Jacobo y Juan.
  revision_rationale: Se ajusta «fueron a la casa» a «entraron en la casa» para reflejar con mayor fidelidad la fuerza direccional de εἰς y el resultado del movimiento en el contexto narrativo, manteniendo un español natural y digno. También se simplifica «de Simón y de Andrés» a «de Simón y Andrés», que suena más fluido sin perder claridad.
