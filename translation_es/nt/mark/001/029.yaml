translation:
  language: es
  text: Y enseguida, después de salir de la sinagoga, entraron en la casa de Simón y Andrés, con Jacobo y Juan.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: εὐθύς funciona en Marcos como adverbio narrativo de rapidez. En español, «enseguida» transmite bien esa inmediatez con naturalidad actual, sin sonar excesivamente técnico o arcaico.
- source_word: ἐκ τῆς συναγωγῆς
  english_pob_choice: after leaving the synagogue
  chosen_spanish: después de salir de la sinagoga
  alternatives_spanish:
  - al salir de la sinagoga
  - después de dejar la sinagoga
  - desde la sinagoga
  lexicon: BDAG
  rationale: El griego indica salida desde la sinagoga; como el participio ἐξελθόντες ya expresa el acto de salir, el español fluye mejor con una cláusula temporal que preserve la secuencia sin duplicarla de forma pesada.
- source_word: ἐξελθόντες ἦλθον
  english_pob_choice: after leaving ... they came
  chosen_spanish: después de salir ... fueron
  alternatives_spanish:
  - habiendo salido ... vinieron
  - cuando salieron ... fueron
  - después de salir ... vinieron
  lexicon: BDAG
  rationale: La forma participio aoristo + verbo principal aoristo comunica acción antecedente seguida de desplazamiento. «Después de salir ... fueron» conserva esa relación temporal en español natural; «fueron» mantiene la dirección narrativa habitual en español bíblico sin forzar «vinieron».
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: Aunque ἔρχομαι puede renderizarse como «venir» o «ir», en esta construcción con destino explícito el español suele preferir «fueron» para mantener claridad y fluidez. «Llegaron» sería posible, pero pierde el matiz de movimiento en curso.
- source_word: εἰς τὴν οἰκίαν
  english_pob_choice: into the house
  chosen_spanish: a la casa
  alternatives_spanish:
  - a la vivienda
  - dentro de la casa
  - hacia la casa
  lexicon: BDAG
  rationale: El griego marca dirección hacia el interior. En español, «a la casa» suele bastar para indicar movimiento hacia ese lugar, sin recargar con «dentro de» cuando el contexto ya es claro.
- source_word: Σίμωνος καὶ Ἀνδρέου
  english_pob_choice: of Simon and Andrew
  chosen_spanish: de Simón y de Andrés
  alternatives_spanish:
  - de Simón y Andrés
  - perteneciente a Simón y Andrés
  - de Simón y Andrés
  lexicon: BDAG
  rationale: Los genitivos identifican de quién era la casa. En español, la repetición de la preposición «de» antes de cada nombre mantiene la relación posesiva clara y evita ambigüedad.
- source_word: μετὰ Ἰακώβου καὶ Ἰωάννου
  english_pob_choice: with James and John
  chosen_spanish: con Jacobo y Juan
  alternatives_spanish:
  - acompañado de Jacobo y Juan
  - junto con Jacobo y Juan
  lexicon: BDAG
  rationale: μετά con genitivo expresa acompañamiento. «Con» es la opción más directa y natural en español. Se conserva «Jacobo» como forma bíblica habitual en español para Ἰάκωβος, y «Juan» para Ἰωάννης.
- source_word: Σίμωνος / Ἀνδρέου / Ἰακώβου / Ἰωάννου
  english_pob_choice: Simon / Andrew / James / John
  chosen_spanish: Simón / Andrés / Jacobo / Juan
  alternatives_spanish:
  - Simón / Andrés / Santiago / Juan
  lexicon: standard transliteration practice
  rationale: Los nombres propios se adaptan a las formas españolas estándar. Para Ἰάκωβος, se prefiere «Jacobo» como equivalencia bíblica tradicional y transparente, en vez de sustituirlo por «Santiago», que corresponde a una tradición particular y no refleja de forma directa el nombre en este contexto.
theological_decisions:
- issue: Relación entre la salida de la sinagoga y la llegada a la casa
  english_pob_reading: 'The English POB keeps the temporal sequence explicit: after leaving the synagogue, they came into the house.'
  chosen_spanish_reading: 'El español mantiene la secuencia: primero salen de la sinagoga, luego van a la casa.'
  alternative_spanish_readings:
  - salieron de la sinagoga y fueron a la casa
  - al salir de la sinagoga, fueron a la casa
  rationale: 'No hay carga doctrinal especial, pero sí una tensión narrativa: el texto subraya la continuidad inmediata entre ambos lugares. La redacción conserva ese orden sin añadir interpretación.'
  doctrine_reference: Narrative sequencing / no doctrinal issue
- issue: Identificación del lugar como casa de Simón y Andrés
  english_pob_reading: into the house of Simon and Andrew
  chosen_spanish_reading: a la casa de Simón y de Andrés
  alternative_spanish_readings:
  - a la casa de Simón y Andrés
  - a su casa
  rationale: El griego especifica propiedad/adscripción de la casa. «A su casa» sería más fluido, pero borra la identificación explícita de los dos nombres que el texto preserva.
  doctrine_reference: Textual specificity / no doctrinal issue
translation_notes:
  revision_awareness: The latest English audit pass reports high agreement and no applied revisions; the Spanish draft therefore follows the source packet and English audit decisions without incorporating any later correction.
  spanish_consistency_notes:
  - 'Se mantuvieron nombres propios en formas españolas estándar: Simón, Andrés, Jacobo, Juan.'
  - Se evitó traducir mecánicamente ἦλθον como «vinieron» en un contexto donde el español narrativo natural prefiere «fueron».
  - No se introdujeron notas porque el versículo no presenta variantes textuales ni ambigüedades lexicográficas decisivas que requieran marca en el texto español.
