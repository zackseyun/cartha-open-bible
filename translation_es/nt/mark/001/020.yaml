translation:
  language: es
  text: Y enseguida los llamó[a]. Y dejando a su padre Zebedeo en la barca con los jornaleros, se fueron tras él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «detrás de él» o «siguiéndolo». El griego puede denotar tanto desplazamiento físico como el comienzo del discipulado.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Marca la urgencia característica de Marcos. «Enseguida» conserva la prontitud temporal con un español natural y digno; evita la rigidez de un calco más literal.
- source_word: ἐκάλεσεν
  english_pob_choice: called
  chosen_spanish: los llamó
  alternatives_spanish:
  - los convocó
  - los invitó
  lexicon: BDAG
  rationale: «Llamó» es el equivalente directo y más natural para καλέω en este contexto de discipulado. «Convocó» suena demasiado formal; «invitó» suaviza indebidamente el acto.
- source_word: ἀφέντες
  english_pob_choice: leaving
  chosen_spanish: dejando
  alternatives_spanish:
  - habiendo dejado
  - abandonando
  lexicon: BDAG
  rationale: El participio aoristo indica acción concomitante/anterior al verbo principal. «Dejando» expresa bien la secuencia sin forzar una forma perifrástica ni añadir el matiz más fuerte de «abandonando».
- source_word: πατέρα αὐτῶν
  english_pob_choice: their father
  chosen_spanish: a su padre
  alternatives_spanish:
  - a su propio padre
  - a su padre de ellos
  lexicon: BDAG
  rationale: El posesivo queda claro en el contexto por el referente inmediato; en español «a su padre» es natural y suficiente, sin redundancia innecesaria.
- source_word: Ζεβεδαῖον
  english_pob_choice: Zebedee
  chosen_spanish: Zebedeo
  alternatives_spanish:
  - Zebedíe
  lexicon: Convención de transliteración onomástica
  rationale: 'Se translitera el nombre propio con la forma habitual en español bíblico: «Zebedeo».'
- source_word: πλοίῳ
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En un contexto pesquero galileo, «barca» es la equivalencia más natural y precisa; «barco» puede sugerir mayor tamaño y «embarcación» resulta demasiado técnico.
- source_word: μισθωτῶν
  english_pob_choice: hired workers
  chosen_spanish: los jornaleros
  alternatives_spanish:
  - los trabajadores contratados
  - los asalariados
  lexicon: BDAG
  rationale: μισθωτός designa a quien trabaja por paga. «Jornaleros» comunica bien el matiz de trabajo remunerado en un contexto premoderno y evita el tono moderno/empresarial de «empleados»; mantiene además la fuerza social del término.
- source_word: ἀπῆλθον
  english_pob_choice: went after him
  chosen_spanish: se fueron tras él
  alternatives_spanish:
  - fueron detrás de él
  - lo siguieron
  lexicon: BDAG
  rationale: ἀπέρχομαι expresa irse o partir; aquí la relación con ὀπίσω αὐτοῦ pide una solución que mantenga el movimiento de seguirle. «Se fueron tras él» reproduce esa direccionalidad sin convertirlo de forma demasiado explícita en un verbo técnico de discipulado.
- source_word: ὀπίσω αὐτοῦ
  english_pob_choice: after him
  chosen_spanish: tras él
  alternatives_spanish:
  - detrás de él
  - siguiéndolo
  lexicon: BDAG
  rationale: La frase puede significar tanto ubicación espacial como seguimiento discipular. «Tras él» conserva ambas posibilidades en español sin resolver prematuramente la tensión entre movimiento físico y seguimiento de discípulos.
theological_decisions:
- issue: La tensión entre movimiento físico y discipulado en ὀπίσω αὐτοῦ
  english_pob_reading: after him
  chosen_spanish_reading: tras él
  alternative_spanish_readings:
  - detrás de él
  - siguiéndolo
  rationale: La frase griega puede aludir a ir físicamente detrás de Jesús y, al mismo tiempo, al inicio del seguimiento discipular. «Tras él» preserva esa ambigüedad productiva sin explicitar más de lo que el texto dice.
  doctrine_reference: Preservar la tensión léxica y narrativa en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: La revisión inglesa más reciente reemplazó una formulación menos natural por «went after him», acercándola al griego y reforzando la idea de seguimiento. La versión española refleja esa decisión con «se fueron tras él», manteniendo naturalidad y la ambigüedad discipular del original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «barca» para πλοίῳ por el contexto galileo pesquero.
  - Se preserva la ambigüedad de ὀπίσω αὐτοῦ mediante «tras él» y nota alternativa.
  - Los nombres propios se transliteran con formas estándar en español bíblico.
