translation:
  language: es
  text: Yo los bauticé con agua[a], pero él los bautizará con el Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en el Espíritu Santo». La preposición griega puede traducirse de ambas maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: Se conserva el pronombre explícito para mantener el contraste enfático con αὐτός; en español, «Yo» al inicio de la cláusula comunica mejor esa oposición que omitirlo.
- source_word: ἐβάπτισα
  english_pob_choice: baptized
  chosen_spanish: bauticé
  alternatives_spanish:
  - inmergí
  - sumergí
  lexicon: BDAG
  rationale: «Bauticé» mantiene la continuidad léxica con βαπτίσει y refleja el uso ritual del verbo en este contexto evangélico sin forzar el modo físico de la acción.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: os
  alternatives_spanish:
  - los
  - las
  - ustedes
  lexicon: BDAG
  rationale: El griego marca plural; se preserva con «os» para no perder la pluralidad explícita. Es una forma panhispánica literaria aunque menos usada en algunas zonas, y aquí evita ambigüedad.
- source_word: ὕδατι
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - en agua
  lexicon: BDAG
  rationale: El dativo instrumental se expresa naturalmente con «con» en español. Se mantiene además el paralelismo con la cláusula final, como en la lectura inglesa auditada.
- source_word: βαπτίσει
  english_pob_choice: will baptize
  chosen_spanish: bautizará
  alternatives_spanish:
  - sumergirá
  - inmergirá
  lexicon: BDAG
  rationale: Se conserva el futuro y la misma base verbal que en la primera cláusula, preservando la comparación entre el bautismo de Juan y el del que viene.
- source_word: ἐν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en
  lexicon: BDAG
  rationale: Siguiendo la decisión inglesa, «con» ofrece la equivalencia más natural en español y sostiene el paralelismo con «con agua». El valor alternativo de «en» se preserva en nota por su relevancia interpretativa.
- source_word: πνεύματι ἁγίῳ
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - espíritu santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En este contexto mesiánico y profético, la referencia es al Espíritu divino; la capitalización y el artículo definido en español expresan esa lectura personal y canónica. Se evita la minúscula para no debilitar el referente.
theological_decisions:
- issue: 'Referencia de πνεύματι ἁγίῳ: ¿Espíritu divino o un poder santo impersonal?'
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - espíritu santo
  - un espíritu santo
  rationale: El contraste con el bautismo con agua y la expectativa del que viene apuntan naturalmente al Espíritu Santo como sujeto divino, no a una fuerza indefinida. La traducción mantiene esa lectura sin añadir explicaciones extratextuales.
  doctrine_reference: 'Affirmations; Translation philosophy #6'
- issue: Valor de ἐν en la frase ἐν πνεύματι ἁγίῳ
  english_pob_reading: with the Holy Spirit
  chosen_spanish_reading: con el Espíritu Santo
  alternative_spanish_readings:
  - en el Espíritu Santo
  rationale: Como en el audit trail inglés, la preposición admite más de una equivalencia. «Con» preserva el paralelismo con «con agua» y suena natural en español, mientras que «en» queda reconocida como alternativa válida en la nota.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: El control de revisión más reciente indica que no hubo cambios necesarios; esta versión sigue de cerca la traducción inglesa auditada y conserva la tensión interpretativa de ἐν mediante nota.
  spanish_consistency_notes:
  - Se mantiene «bautizar» para la continuidad verbal entre ambas cláusulas.
  - Se usa «Espíritu Santo» con mayúsculas por la referencia personal divina en este contexto.
  - Se conserva el pronombre explícito «Yo» para reflejar el contraste con «él».
  - Se emplea «os» para respetar el plural del griego, aun cuando el español general moderno preferiría «los» o «ustedes» en algunos registros.
