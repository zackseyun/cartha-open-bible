translation:
  language: es
  text: Y enseguida el Espíritu[a] lo echa al desierto[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Espíritu Santo». El griego dice simplemente τὸ πνεῦμα; el contexto inmediato identifica al Espíritu ya mencionado en 1:10.
    reason: lexical_alternative
  - marker: b
    text: O «lo expulsa al desierto», «lo envía al desierto» o «a la región desierta». El verbo griego es fuerte; compárese el uso frecuente de Marcos del mismo verbo para expulsar demonios. ἔρημος designa un lugar desolado, no necesariamente un desierto arenoso.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la simple coordinación narrativa del griego. En español, «Y» conserva la continuidad inmediata sin añadir una relación temporal o causal que el texto no explicita.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» transmite bien la rapidez característica de Marcos con un registro natural en español moderno y conserva la urgencia narrativa.
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el Espíritu Santo
  lexicon: BDAG
  rationale: Se conserva la referencia definida al Espíritu ya introducido en el contexto inmediato. «El Espíritu» sigue de cerca el griego y evita explicitar «Santo» donde el texto no lo añade.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre objeto directo se expresa naturalmente con «lo» en español, manteniendo la referencia a Jesús sin sobrecargar la frase.
- source_word: ἐκβάλλει
  english_pob_choice: drives ... out
  chosen_spanish: empuja
  alternatives_spanish:
  - expulsa
  - lo echa
  - lo arroja
  lexicon: BDAG
  rationale: El verbo griego es vigoroso y no debe suavizarse. «Empuja» comunica una acción fuerte e impulsiva en español, aunque con menos carga técnica que «expulsa»; por eso se mantiene la tensión del verbo sin convertirlo en un término eclesiástico o demasiado interpretativo. La dirección («al desierto») completa el valor de salida del verbo.
- source_word: εἰς τὴν ἔρημον
  english_pob_choice: into the wilderness
  chosen_spanish: al desierto
  alternatives_spanish:
  - al lugar desierto
  - a la soledad
  lexicon: BDAG
  rationale: «Ἔρημος» aquí denota un lugar desolado e inhóspito. «Desierto» es la equivalencia más natural y reconocible en español bíblico, aunque no obliga a imaginar un desierto arenoso.
theological_decisions:
- issue: Fuerza de la acción del Espíritu sobre Jesús
  english_pob_reading: Rendered ἐκβάλλω with strong force as 'drives ... out' rather than a softer expression such as 'leads.'
  chosen_spanish_reading: Se mantiene una acción fuerte con «empuja» en vez de un verbo suavizado como «guía» o «lleva».
  alternative_spanish_readings:
  - el Espíritu lo guía al desierto
  - el Espíritu lo lleva al desierto
  - el Espíritu lo envía al desierto
  rationale: 'El griego ἐκβάλλω es vigoroso y el audit trail inglés insiste en preservar esa fuerza. En español, «empuja» conserva la impresión de impulsión fuerte y evita borrar la tensión teológica: el Espíritu actúa con iniciativa divina, pero la expresión no se suaviza para armonizar con otros relatos.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto sigue de cerca el estado revisado más reciente del inglés POB, que no requirió cambios. Se conservan la coordinación simple, la urgencia de εὐθύς, la referencia definida al Espíritu y la fuerza de ἐκβάλλω sin suavizarla.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia al Espíritu divino ya contextualizado.
  - Se evita «SEÑOR» u otro reemplazo de máscara; no aparece aquí ningún tetragrámaton.
  - «Desierto» se usa con el sentido bíblico de lugar inhóspito, no como imagen climatológica moderna.
  - La opción verbal «empuja» busca mantener la fuerza del original sin introducir una lectura explicativa adicional.
