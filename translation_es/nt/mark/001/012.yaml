revisions:
- from: Y enseguida el Espíritu[a] lo empuja al desierto[b].
  to: Y enseguida el Espíritu[a] lo echa al desierto[b].
  rationale: Se revisa «empuja» a «lo echa» para reflejar mejor la fuerza de ἐκβάλλει y conservar en español el matiz que el audit trail inglés destacó con «drives ... out». Se mantiene «el Espíritu» y «desierto», pero se amplía la nota para recoger tanto las alternativas léxicas del verbo como la aclaración semántica de ἔρημος.
