review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador acierta en la estructura básica: «Y/enseguida/el Espíritu/lo ... al desierto». Sin embargo, no preserva plenamente la fuerza y el matiz direccional de ἐκβάλλει. «Empuja» sugiere más un acto físico de empujar que el sentido de «echar/expulsar/sacar con fuerza», y además pierde el componente de «out» que el audit trail inglés quiso conservar explícitamente. La nota inglesa sobre alternativas léxicas para ἐκβάλλει tampoco fue reflejada en español.'
  spanish_quality_summary: El español es claro y natural, pero «lo empuja al desierto» suena algo concreto/físico y menos idiomático para esta escena. «Lo impulsa hacia el desierto» sería más natural, pero suaviza demasiado; para preservar la fuerza del griego y la decisión inglesa, «lo echa al desierto» o «lo expulsa al desierto» funcionan mejor. Entre ellas, «lo echa» suena más natural en lectura continua y mantiene fuerza verbal. Conviene también añadir nota léxica para explicar alternativas como «lo expulsa» o «lo envía».
  glossary_alignment: «El Espíritu» concuerda bien con la terminología del proyecto y con la decisión auditada. «Desierto» es aceptable en español bíblico, especialmente con nota aclaratoria, aunque el inglés prefirió «wilderness»; la nota existente mitiga la posible lectura demasiado arenosa. No hay conflicto con términos doctrinales mayores.
  issues:
  - severity: high
    issue: «empuja» no representa adecuadamente ἐκβάλλει
    rationale: El griego ἐκβάλλει es fuerte y suele expresar echar, expulsar o sacar. «Empuja» cambia el tipo de acción a un empujón físico y no conserva bien el valor léxico ni la tensión teológica señalada en el audit trail.
  - severity: medium
    issue: Se perdió el matiz de exterioridad/salida del prefijo ἐκ-
    rationale: El audit trail inglés eligió «drives him out» precisamente para reflejar la fuerza y el prefijo. «Lo empuja al desierto» comunica movimiento hacia un lugar, pero no la idea de echar/sacar con fuerza.
  - severity: medium
    issue: Falta una nota léxica española equivalente para ἐκβάλλει
    rationale: La traducción inglesa preservó alternativas importantes («casts him out», «sends him out») y explicó el uso fuerte del verbo en Marcos. El borrador español no trasladó esa información, aunque sí añadió notas útiles para «Espíritu» y «desierto».
  revised_spanish_text: Y enseguida el Espíritu[a] lo echa al desierto[b].
  revised_footnotes:
