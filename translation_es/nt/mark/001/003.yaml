translation:
  language: es
  text: 'Voz de uno que clama en el desierto[a]: «Preparen el camino de Yahvé[b]; enderecen sus sendas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, siguiendo otra puntuación de la cita de Isaías: «Voz de uno que clama: “En el desierto, preparen el camino de Yahvé…”»'
    reason: alternative_reading
  - marker: b
    text: «Yahvé» traduce el nombre divino del trasfondo de Isaías 40:3, correspondiente al hebreo YHWH; el griego de la cita dice κυρίου.
    reason: cross_reference
lexical_decisions:
- source_word: φωνὴ
  english_pob_choice: A voice
  chosen_spanish: Voz
  alternatives_spanish:
  - Una voz
  - La voz
  lexicon: BDAG
  rationale: φωνή introduce la cita como un anuncio profético. En español, «Voz» funciona de manera natural en este contexto poético y profético, y evita cargar el verso con un artículo innecesario al inicio.
- source_word: βοῶντος
  english_pob_choice: of one crying out
  chosen_spanish: de uno que clama
  alternatives_spanish:
  - que grita
  - de quien clama
  lexicon: BDAG
  rationale: El participio genitivo modifica a «voz» y expresa a la persona cuya voz se oye. «Clama» conserva el tono fuerte y proclamatorio mejor que alternativas más débiles como «dice» o «llama».
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto solitario
  - en la soledad
  lexicon: BDAG
  rationale: ἔρημος puede significar «desierto» o «desierto/wilderness». Aquí «desierto» es idiomático en español y mantiene bien la imagen geográfica y narrativa de Marcos.
- source_word: Ἑτοιμάσατε
  english_pob_choice: Prepare
  chosen_spanish: Preparen
  alternatives_spanish:
  - Preparen ustedes
  - Alisten
  lexicon: BDAG
  rationale: El imperativo plural aoristo exhorta a una acción decisiva. En español, «Preparen» expresa bien el mandato directo y claro sin añadir explicaciones.
- source_word: τὴν ὁδὸν
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - el sendero
  lexicon: BDAG
  rationale: ὁδός puede ser «camino» o «senda». «Camino» es la opción más natural y reconocible en español para la metáfora profética de preparar una ruta.
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  lexicon: BDAG
  rationale: Aunque el griego dice κυρίου, el contexto cita Isaías 40:3, donde el hebreo se refiere a YHWH. Conforme al criterio del proyecto, se traduce con el nombre divino «Yahvé» en el texto principal, preservando el trasfondo veterotestamentario.
- source_word: εὐθείας
  english_pob_choice: straight
  chosen_spanish: rectas
  alternatives_spanish:
  - derechas
  - llanas
  lexicon: BDAG
  rationale: En esta construcción, εὐθείας califica las sendas como no torcidas, es decir, rectas. «Rectas» es la forma más natural en español con «sendas».
- source_word: ποιεῖτε
  english_pob_choice: make
  chosen_spanish: enderecen
  alternatives_spanish:
  - hagan rectas
  - hagan derechas
  lexicon: BDAG
  rationale: El verbo junto con εὐθείας y τρίβους expresa la acción de enderezar los caminos. «Enderecen» transmite con precisión la imagen de allanar o alinear el recorrido.
- source_word: τὰς τρίβους αὐτοῦ
  english_pob_choice: his paths
  chosen_spanish: sus sendas
  alternatives_spanish:
  - sus caminos
  - sus huellas
  lexicon: BDAG
  rationale: τρίβος denota sendas o rutas transitadas. «Sendas» mantiene la imagen plural y la relación poética con «camino», a la vez que suena natural en español bíblico.
theological_decisions:
- issue: Renderizado de κύριος en una cita de Isaías que en hebreo alude a YHWH
  english_pob_reading: Lord, with the covenantal background preserved in a footnote
  chosen_spanish_reading: Yahvé en el texto principal, con nota sobre el origen en Isaías y el griego κύριος
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: La guía del proyecto fija «Yahvé» para יהוה. Aunque el griego de Marcos usa κυρίου, la cita remite a Isaías 40:3, donde el referente es el nombre divino. Traducir «Yahvé» hace visible ese trasfondo sin ocultarlo bajo un título genérico.
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé; κύριος → Lord/Señor depending on context'
- issue: Ubicación de «en el desierto» en la estructura de la cita
  english_pob_reading: attached to 'one crying out' with an alternative punctuation preserved in a footnote
  chosen_spanish_reading: anclado a «uno que clama en el desierto» con nota de puntuación alternativa
  alternative_spanish_readings:
  - '«Voz de uno que clama: En el desierto, preparen...»'
  - '«Voz de uno que clama en el desierto: Preparen...»'
  rationale: La sintaxis griega de Marcos favorece que «en el desierto» modifique a «clama». Sin embargo, la tradición de Isaías admite otra puntuación. Mantener la alternativa en nota preserva la tensión textual sin resolverla de forma silenciosa.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Revisado a partir del paquete fuente SBLGNT y del audit trail inglés. Se conservó la equivalencia óptima del texto inglés, pero se ajustó la terminología al criterio español del proyecto: κυρίου se traduce con «Yahvé» por el trasfondo de Isaías, y la ambigüedad sobre la puntuación de la cita se preserva en nota.'
  spanish_consistency_notes:
  - Se mantuvo el tono profético y breve del griego, sin añadir interpretaciones explicativas al cuerpo del versículo.
  - «Camino/sendas» conserva la duplicación imagética del texto fuente.
  - Se evitó «Señor» en el cuerpo principal para no ocultar el nombre divino del trasfondo isaiano.
  - La puntuación alternativa queda en nota para respetar la tensión documentada entre Marcos e Isaías.
