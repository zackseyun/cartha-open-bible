review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura temporal del griego y conserva correctamente la referencia a enfermedad y actividad demoníaca real. Sin embargo, «le llevaban a todos…» suena menos natural en español para ἔφερον πρὸς αὐτόν que «le traían a todos…» o «traían ante él…». Además, la nota [a] no corresponde bien a Ὀψίας… γενομένης, porque «Cuando llegó la noche» desplaza el sentido de ‘anochecer/tarde’ hacia ‘noche’ plena.
  spanish_quality_summary: El texto es claro y entendible, pero «le llevaban a todos los enfermos y a los endemoniados» resulta algo tosco en español e incluso puede sugerir alejamiento más que acercamiento, según el dialecto. «Al anochecer… le traían…» suena más natural y mantiene la dirección hacia Jesús. Las notas necesitan un ajuste menor para que la alternativa temporal sea más fiel y natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Endemoniados» es aceptable aquí como equivalente idiomático de δαιμονιζομένους, con alternativas bien preservadas en nota. No intervienen términos como Yahvé/Mesías. El uso de «enfermos» para τοὺς κακῶς ἔχοντας es adecuado.
  issues:
  - severity: medium
    issue: «Llevaban» es menos idiomático que «traían» en este contexto de llevar personas a Jesús
    rationale: Aunque ἔφερον admite ‘llevaban/traían’, con πρὸς αὐτὸν y en español narrativo bíblico neutral, «traían a él/le traían» expresa mejor el movimiento hacia el referente y mejora la fluidez.
  - severity: low
    issue: La nota [a] dice «Cuando llegó la noche»
    rationale: La alternativa desplaza ὀψία hacia ‘noche’ en lugar de ‘atardecer/anochecer/tarde’. Conviene una alternativa más cercana como «Cuando llegó el atardecer» o «Cuando cayó la tarde».
  revised_spanish_text: Al anochecer[a], cuando se puso el sol, le traían a todos los enfermos[b] y a los endemoniados[c].
  revised_footnotes:
  - marker: a
    text: 'O: «Cuando cayó la tarde».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que estaban enfermos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los poseídos por demonios» o «los demonizados».'
    reason: lexical_alternative
  revision_rationale: Se ajusta el verbo principal a «traían» para un español más natural y fiel al movimiento hacia Jesús, sin perder el matiz imperfectivo. También se corrige la alternativa de la nota temporal para que refleje mejor ‘anochecer/tarde’ en vez de ‘noche’.
