translation:
  language: es
  text: Al anochecer[a], cuando se puso el sol, le traían a todos los enfermos[b] y a los endemoniados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cuando cayó la tarde».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que estaban enfermos».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «los poseídos por demonios» o «los demonizados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὀψίας δὲ γενομένης
  english_pob_choice: When evening came
  chosen_spanish: Al anochecer
  alternatives_spanish:
  - Cuando llegó la noche
  - Cuando cayó la tarde
  lexicon: BDAG
  rationale: La expresión marca un cambio temporal general. «Al anochecer» es natural en español y conserva el valor de transición temporal sin sobrecargar la frase.
- source_word: ὅτε ἔδυ ὁ ἥλιος
  english_pob_choice: when the sun had set / when the sun set
  chosen_spanish: cuando se puso el sol
  alternatives_spanish:
  - cuando se había puesto el sol
  - cuando el sol se puso
  lexicon: BDAG
  rationale: La imagen griega señala el momento del ocaso como referencia temporal. «Se puso el sol» es una forma idiomática y fiel en español; evita la rigidez de un calco y conserva la secuencia narrativa.
- source_word: ἔφερον
  english_pob_choice: they brought
  chosen_spanish: les llevaban
  alternatives_spanish:
  - les trajeron
  - estaban llevando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida. «Llevaban» refleja mejor ese flujo de personas acercando a los enfermos y poseídos que un pretérito puntual.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él / le
  alternatives_spanish:
  - hasta él
  - a Jesús
  lexicon: BDAG
  rationale: El movimiento hacia una persona se expresa naturalmente con «a él»; en el texto se puede reflejar con el dativo de complemento indirecto «le» sin repetir innecesariamente el nombre de Jesús.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a cada uno
  lexicon: BDAG
  rationale: «Todos» conserva la fuerza inclusiva del griego. Se antepone la preposición por la sintaxis española del verbo de movimiento/traer.
- source_word: τοὺς κακῶς ἔχοντας
  english_pob_choice: those who were sick / the sick
  chosen_spanish: los enfermos
  alternatives_spanish:
  - los que estaban enfermos
  - los que se encontraban mal
  lexicon: BDAG
  rationale: La locución griega es un giro idiomático para personas que están mal de salud. «Los enfermos» es claro, natural y mantiene el sentido sin perder el matiz colectivo del participio sustantivado.
- source_word: τοὺς δαιμονιζομένους
  english_pob_choice: those who were demon-possessed
  chosen_spanish: los endemoniados
  alternatives_spanish:
  - los poseídos por demonios
  - los demonizados
  lexicon: BDAG
  rationale: El participio indica personas bajo influencia o dominio demoníaco. «Endemoniados» es la forma española tradicional y todavía inteligible; mantiene la fuerza del término sin reducirlo a mera opresión psicológica.
theological_decisions:
- issue: 'Valor de δαιμονιζομένους: posesión/dominio demoníaco real'
  english_pob_reading: those who were demon-possessed
  chosen_spanish_reading: los endemoniados
  alternative_spanish_readings:
  - los poseídos por demonios
  - los demonizados
  - los oprimidos por demonios
  rationale: La redacción conserva la referencia a actividad demoníaca real, como lo hace la POB en inglés, sin rebajarla a enfermedad solamente. «Endemoniados» mantiene esa fuerza semántica en español y es suficientemente claro para lectura pública.
  doctrine_reference: Affirmations; Translation philosophy §1 y §6
- issue: Imperfecto de ἔφερον y aspecto narrativo
  english_pob_reading: they brought
  chosen_spanish_reading: les llevaban
  alternative_spanish_readings:
  - les trajeron
  - los traían
  rationale: Aunque el inglés final optó por un pretérito más natural, el griego imperfecto sigue indicando acción continua o repetida. En español, el imperfecto «llevaban» comunica mejor la llegada sucesiva de personas a Jesús.
  doctrine_reference: Translation philosophy §1 y §5
translation_notes:
  revision_awareness: El texto inglés de referencia pasó por revisiones que oscilan entre «when the sun had set» y «when the sun set», y entre un imperfecto («they were bringing») y un pretérito («they brought»). La versión española adopta una solución que conserva el valor aspectual del imperfecto griego con «llevaban», a la vez que usa una forma idiomática para el ocaso y mantiene un paralelismo claro entre «los enfermos» y «los endemoniados».
  spanish_consistency_notes:
  - Se mantiene «endemoniados» para δαιμονιζομένους en coherencia con el valor demonológico ya documentado por la POB.
  - Se evita «SEÑOR» o equivalentes porque el versículo no contiene el Tetragrámaton ni κύριος en sentido divino.
  - «Al anochecer» funciona como encabezado temporal breve y natural en español bíblico contemporáneo.
