translation:
  language: es
  text: Pero después de salir[a], comenzó a proclamarlo ampliamente y a divulgar[b] la noticia[c], de modo que Jesús ya no podía entrar abiertamente en un pueblo, sino que estaba fuera, en lugares desiertos[d]; y acudían a él de todas partes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "después de irse". El participio griego indica una acción previa a la principal, sin precisar el lugar de salida.'
    reason: alternative_reading
  - marker: b
    text: 'O: "difundir". El verbo puede expresar dar a conocer ampliamente; "divulgar" conserva ese matiz de publicidad.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "el mensaje", "el asunto" o "la palabra". Aquí se refiere al informe sobre lo ocurrido con Jesús.'
    reason: lexical_alternative
  - marker: d
    text: '"Lugares desiertos" significa áreas deshabitadas o apartadas, no necesariamente un desierto de arena.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: after he went out
  chosen_spanish: después de salir
  alternatives_spanish:
  - después de irse
  - cuando salió
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. En español, 'después de salir' mantiene la secuencia sin añadir un destino que el griego no especifica.
- source_word: ἤρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: 'Conserva el valor ingresivo del verbo: no solo seguía, sino que inició esa acción.'
- source_word: κηρύσσειν πολλὰ
  english_pob_choice: to proclaim it widely
  chosen_spanish: a proclamar ampliamente
  alternatives_spanish:
  - a proclamar mucho
  - a proclamar muchas cosas
  lexicon: BDAG
  rationale: La combinación con πολλὰ funciona idiomáticamente como extensión/intensidad, no como muchas cosas separadas. 'Ampliamente' comunica bien la difusión extensa sin hacerla meramente cuantitativa.
- source_word: διαφημίζειν
  english_pob_choice: to spread
  chosen_spanish: a divulgar
  alternatives_spanish:
  - a difundir
  - a publicitar
  lexicon: BDAG
  rationale: Este verbo expresa dar a conocer ampliamente. 'Divulgar' preserva la idea de hacer público lo ocurrido, con registro natural en español bíblico moderno.
- source_word: τὸν λόγον
  english_pob_choice: the message
  chosen_spanish: la noticia
  alternatives_spanish:
  - el mensaje
  - la palabra
  - el asunto
  lexicon: BDAG
  rationale: En este contexto narrativo, λόγος se refiere al reporte sobre lo ocurrido, no al título teológico 'la Palabra'. 'La noticia' refleja bien ese sentido de informe divulgado.
- source_word: φανερῶς
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - públicamente
  lexicon: BDAG
  rationale: Conserva el contraste con estar fuera en lugares desiertos y con la imposibilidad de entrar de modo visible o público.
- source_word: εἰς πόλιν
  english_pob_choice: enter a town
  chosen_spanish: entrar abiertamente en una ciudad
  alternatives_spanish:
  - entrar en un pueblo
  - entrar en una localidad
  lexicon: BDAG
  rationale: '''Ciudad'' evita reducir indebidamente el referente y sigue la forma genérica del griego. ''Abiertamente'' expresa el adverbio y su contraste narrativo.'
- source_word: ἔξω ἐπ’ ἐρήμοις τόποις
  english_pob_choice: outside in deserted places
  chosen_spanish: fuera, en lugares desiertos
  alternatives_spanish:
  - fuera, en lugares apartados
  - fuera, en parajes desiertos
  lexicon: BDAG
  rationale: '''Lugares desiertos'' mantiene el sentido de ἔρημος como espacios deshabitados o apartados, no necesariamente un desierto de arena. ''Fuera'' conserva el contraste espacial con entrar en la ciudad.'
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - permanecía
  - era
  lexicon: BDAG
  rationale: Aunque el verbo es 'era/estaba', en español 'estaba' comunica de manera natural su estado o ubicación continua en el contexto.
- source_word: ἤρχοντο
  english_pob_choice: were coming
  chosen_spanish: acudían
  alternatives_spanish:
  - iban llegando
  - venían
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o continua. 'Acudían' captura la idea de acercarse a él como resultado persistente, con buen tono narrativo en español.
- source_word: πάντοθεν
  english_pob_choice: from everywhere
  chosen_spanish: de todas partes
  alternatives_spanish:
  - de todos lados
  - de todas direcciones
  lexicon: BDAG
  rationale: Es la forma idiomática más natural en español para el alcance geográfico amplio del adverbio.
theological_decisions:
- issue: Referente de αὐτὸν y claridad del sujeto en español
  english_pob_reading: The pronoun later refers to Jesus, made explicit once in English.
  chosen_spanish_reading: Jesús ya no podía entrar abiertamente en una ciudad... y acudían a él
  alternative_spanish_readings:
  - '...ya no podía entrar abiertamente en una ciudad... y acudían a él (sin nombrar a Jesús)'
  - '...ya no podía él entrar abiertamente en una ciudad...'
  rationale: El contexto inmediato identifica a Jesús como referente de αὐτόν; nombrarlo una vez evita ambigüedad en español sin alterar el sentido narrativo.
  doctrine_reference: Contexto narrativo inmediato de Marcos 1:45 y referencia pronominal de αὐτόν.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés auditado: mantiene el valor adverbial de πολλὰ mediante ''ampliamente'', conserva la ubicación continua de ἦν con ''estaba'', y refleja el sujeto implícito de ἤρχοντο con una forma impersonal natural en español. También respeta la distinción contextual entre el mensaje divulgado y la referencia a Jesús en la cláusula final.'
  spanish_consistency_notes:
  - Se conserva 'Jesús' como sujeto explícito donde el griego cambia de referente implícito a claro en el contexto.
  - '''Lugares desiertos'' se usa de forma consistente con el estándar POB para ἔρημος: deshabitado/apartado, no necesariamente arenoso.'
  - '''Proclamar'' se reserva para κηρύσσειν; ''divulgar'' para διαφημίζειν, evitando fusionar ambos verbos.'
  - '''La noticia'' traduce λόγος en sentido narrativo-referencial, no teológico, de acuerdo con el contexto.'
  - Se mantiene un registro bíblico moderno y publicable, sin calcos rígidos del inglés.
