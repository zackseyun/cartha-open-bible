translation:
  language: es
  text: Y de inmediato la lepra lo dejó, y fue limpiado[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue hecho limpio» o «fue purificado». El verbo también lleva el sentido de limpieza ritual, no solo de recuperación física.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: En Marcos, εὐθύς expresa prontitud narrativa. «De inmediato» conserva esa urgencia en un español natural y digno, sin caer en un calco rígido.
- source_word: ἀπῆλθεν
  english_pob_choice: left
  chosen_spanish: se apartó
  alternatives_spanish:
  - se fue
  - partió
  - salió
  lexicon: BDAG
  rationale: Como λέπρα es el sujeto, el sentido idiomático de «left him» en inglés se vuelve naturalmente «se apartó de él» en español, preservando la idea de alejamiento sin forzar la sintaxis.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de él mismo
  - de su cuerpo
  lexicon: BDAG
  rationale: El complemento preposicional griego queda explícito en «de él», manteniendo la relación de separación que el inglés POB integró idiomáticamente en «left him».
- source_word: λέπρα
  english_pob_choice: the leprosy
  chosen_spanish: la lepra
  alternatives_spanish:
  - la enfermedad de la lepra
  - la afección cutánea
  lexicon: BDAG
  rationale: «Lepra» es el equivalente conciso y eclesialmente inteligible en español. Aunque el término bíblico puede abarcar más que la lepra moderna, no conviene ampliar más allá del dato léxico del texto.
- source_word: ἐκαθαρίσθη
  english_pob_choice: he was cleansed
  chosen_spanish: quedó limpio
  alternatives_spanish:
  - fue limpiado
  - fue purificado
  - quedó purificado
  lexicon: BDAG
  rationale: El pasivo de καθαρίζω conserva en este contexto una resonancia ritual además de física. «Quedó limpio» comunica bien el resultado en español; «purificado» es posible, pero puede sonar más técnico y menos natural aquí.
theological_decisions:
- issue: Relación entre sanidad física y limpieza ritual en καθαρίζω
  english_pob_reading: he was cleansed rather than he was healed
  chosen_spanish_reading: quedó limpio
  alternative_spanish_readings:
  - fue purificado
  - fue sanado
  rationale: La frase no reduce el hecho a mejoría física. En el contexto de la lepra bíblica, la limpieza incluye la restauración de pureza ritual; «quedó limpio» preserva ese alcance sin introducir explicaciones ajenas al verso.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El audito inglés indica alta concordancia y no registra revisiones aplicadas. La presente redacción sigue esa lectura estable, conservando el matiz dual de καθαρίζω y la urgencia de εὐθύς sin añadir material interpretativo.
  spanish_consistency_notes:
  - Se mantiene «lepra» como término técnico-bíblico estándar.
  - Se evita «SEÑOR» o sustituciones litúrgicas, porque no hay aquí el nombre divino.
  - La puntuación reproduce el paralelismo simple del griego con una coordinación en español natural.
  - La nota de pie conserva la alternativa clave de καθαρίζω para no borrar la tensión entre limpieza ritual y sanidad física.
