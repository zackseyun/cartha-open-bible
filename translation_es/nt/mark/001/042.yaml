review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: εὐθύς = «de inmediato», λέπρα = «la lepra», y mantiene la doble acción de que la lepra se fue y el hombre fue limpiado. Sin embargo, «quedó limpio» debilita el matiz pasivo y cultual de ἐκαθαρίσθη frente al inglés auditado «he was cleansed».'
  spanish_quality_summary: El español es natural y claro, pero «se apartó de él» suena algo menos idiomático que «lo dejó» o «desapareció de él», y el anclaje de la nota en «él» no corresponde al punto léxico principal. «Fue limpiado» preserva mejor el valor verbal y la resonancia ritual que «quedó limpio».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la preferencia por conservar matices teológicos. Conviene alinear καθαρίζω con «fue limpiado» y conservar en nota la alternativa «fue hecho limpio» o «fue purificado», destacando la limpieza ritual.
  issues:
  - severity: medium
    issue: «quedó limpio» para ἐκαθαρίσθη
    rationale: Expresa el resultado, pero pierde parte del matiz pasivo y del campo semántico de καθαρίζω como limpieza/cleansing, especialmente su resonancia ritual documentada en el POB inglés.
  - severity: low
    issue: Ubicación de la nota [a] en «él»
    rationale: La nota explica ἐκαθαρίσθη, no ἀπ’ αὐτοῦ; por claridad editorial, el marcador debe anclarse en «limpiado» o frase equivalente.
  - severity: low
    issue: «se apartó de él» es aceptable pero algo rígido
    rationale: No es infiel, pero en español narrativo bíblico suena más natural «la lepra lo dejó» y sigue reflejando ἀπῆλθεν ἀπ’ αὐτοῦ de manera idiomática.
  revised_spanish_text: Y de inmediato la lepra lo dejó, y fue limpiado[a].
