revisions:
- from: Y de inmediato la lepra se apartó de él[a], y quedó limpio.
  to: Y de inmediato la lepra lo dejó, y fue limpiado[a].
  rationale: Se ajusta ἐκαθαρίσθη a «fue limpiado» para conservar mejor el pasivo y la dimensión ritual presente en el griego y en la decisión teológica auditada. También se mueve la nota al término pertinente y se hace más idiomática la primera cláusula con «la lepra lo dejó».
  reviewer_model: gpt-5.4
