base_translation:
  language: en
  yaml_path: translation/nt/mark/001/007.yaml
  text: And he was proclaiming[a], saying, “The one stronger than I is coming after me[c][b], of whom I am not worthy to stoop down and untie the strap of his sandals.”
  footnotes:
