translation:
  language: es
  text: 'Y él proclamaba[a], diciendo: «Viene el que es más fuerte que yo después de mí, de quien no soy digno[b] de agacharme[c] y desatar la correa de sus sandalias».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «El que es más poderoso que yo viene después de mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no soy apto» o «no soy suficiente»; la expresión comunica una profunda indignidad ante el que viene.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «inclinarme»; el participio aoristo puede entenderse como la acción de agacharse antes de desatar.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκήρυσσεν
  english_pob_choice: was proclaiming
  chosen_spanish: proclamaba
  alternatives_spanish:
  - predicaba
  - anunciaba
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; «proclamaba» conserva el tono de heraldo de κηρύσσω sin volverlo excesivamente eclesiástico. «Predicaba» sería posible, pero en español puede sonar más técnico o litúrgico que el griego aquí.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: Es el complemento participial normal de ἐκήρυσσεν. En español, «diciendo» introduce con naturalidad el discurso citado y mantiene la relación sintáctica del griego.
- source_word: Ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: Viene
  alternatives_spanish:
  - Está viniendo
  - Está por venir
  lexicon: BDAG
  rationale: El presente griego es vívido. En español, el presente simple «viene» reproduce bien la inmediatez sin forzar un progresivo menos natural.
- source_word: ὁ ἰσχυρότερός μου
  english_pob_choice: the one stronger than I
  chosen_spanish: el que es más fuerte que yo
  alternatives_spanish:
  - el más fuerte que yo
  - el que es más poderoso que yo
  lexicon: BDAG
  rationale: La construcción articular es sustantiva. «El que es más fuerte que yo» expresa con claridad el comparativo ἰσχυρότερός μου. Se evita «más poderoso» porque desplaza el matiz básico de fuerza/fortaleza.
- source_word: ὀπίσω μου
  english_pob_choice: after me
  chosen_spanish: tras de mí
  alternatives_spanish:
  - después de mí
  - detrás de mí
  lexicon: BDAG
  rationale: Aquí hay nuancia de sucesión y de venir detrás. «Tras de mí» conserva ambos valores con una forma sobria y relativamente transparente; «después de mí» podría sonar más temporal que espacial.
- source_word: ἱκανὸς
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - apto
  - suficiente
  - capaz
  lexicon: BDAG
  rationale: Aunque ἱκανός puede significar «suficiente/adecuado», en esta fórmula de humildad ante el que viene el sentido idiomático es de indignidad personal. «Digno» comunica mejor ese contraste y preserva la tensión teológica señalada por el texto.
- source_word: κύψας
  english_pob_choice: having stooped down
  chosen_spanish: agacharme
  alternatives_spanish:
  - inclinarme
  - agachándome
  - doblarme
  lexicon: BDAG
  rationale: El aoristo participial indica la acción previa o concomitante al desatar. En español, «agacharme» expresa de modo natural el gesto físico de bajar la postura. Se usa en infinitivo coordinado con «desatar» para una lectura fluida; la relación aspectual queda reflejada en la secuencia verbal.
- source_word: λῦσαι
  english_pob_choice: to untie
  chosen_spanish: desatar
  alternatives_spanish:
  - soltar
  - deshacer
  lexicon: BDAG
  rationale: En el contexto de la correa del calzado, «desatar» es la equivalencia natural de λύω. Es más preciso que «soltar» y más idiomático que una traducción demasiado literal.
- source_word: τὸν ἱμάντα
  english_pob_choice: the strap
  chosen_spanish: la correa
  alternatives_spanish:
  - la tira
  - la rienda
  lexicon: BDAG
  rationale: El ἱμάνς es la tira o correa de cuero del sandalia. «Correa» es claro en español y conserva la idea de una tira atada; «strap» en inglés se resolvió así por claridad similar.
- source_word: τῶν ὑποδημάτων αὐτοῦ
  english_pob_choice: of his sandals
  chosen_spanish: de sus sandalias
  alternatives_spanish:
  - de su calzado
  - de sus zapatos
  lexicon: BDAG
  rationale: ὑποδήματα se refiere al calzado antiguo y, en este contexto, específicamente a sandalias. «Sandalias» es históricamente preciso y culturalmente legible.
theological_decisions:
- issue: Grado de humildad e insuficiencia de Juan
  english_pob_reading: I am not worthy ... to untie the strap of his sandals
  chosen_spanish_reading: no soy digno de agacharme y desatar la correa de sus sandalias
  alternative_spanish_readings:
  - no soy apto ...
  - no soy suficiente ...
  rationale: La fórmula transmite una profunda indignidad ante el que viene, no mera incapacidad física. «No soy digno» preserva ese valor idiomático y el contraste de estatus sin añadir doctrina ajena al versículo.
  doctrine_reference: Humildad ante la superioridad del que viene; traducción que preserva el sentido pragmático y teológico del enunciado.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y toma como contexto auditado la solución inglesa de la POB: imperfecto iterativo/progresivo para ἐκήρυσσεν, presente vívido para Ἔρχεται, comparativo sustantivado para ὁ ἰσχυρότερός μου, y la fórmula de humildad para ἱκανός. También se refleja la revisión inglesa que suavizó el orden de «stoop down and untie»; en español se resolvió con una coordinación natural («agacharme y desatar») sin perder la secuencia de la acción.'
  spanish_consistency_notes:
  - Se usó «Y él» para mantener el sujeto explícito y claro en español, dado que el griego coordina la acción de Juan con la narración previa.
  - Se prefirió «Yahvé» en el proyecto general, pero este versículo no contiene el nombre divino.
  - Se mantuvo «Mesías/Cristo» fuera del texto porque no aparece en el versículo.
  - Se eligieron «sandalias» y «correa» por precisión cultural e histórica, evitando arcaísmos como «thong» o «zapatos».
  - La puntuación con comillas angulares puede ajustarse al estilo editorial del proyecto si se normaliza en composición final.
