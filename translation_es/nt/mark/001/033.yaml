translation:
  language: es
  text: Y toda la ciudad estaba reunida a la puerta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «junto a la puerta». La preposición griega puede traducirse de manera que destaque la cercanía espacial; en contexto se refiere a la multitud reunida en la entrada de la casa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Entonces
  lexicon: conjunción coordinante
  rationale: La conjunción abre la escena de forma narrativa y simple; en español, «Y» conserva mejor la continuidad del relato que una formulación más explicativa.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: estaba
  alternatives_spanish:
  - era
  - había estado
  lexicon: BDAG
  rationale: El imperfecto de εἰμί con participio describe el estado en progreso de la escena. «Estaba» preserva ese valor imperfectivo en español mejor que un perfecto o una perífrasis más pesada.
- source_word: ὅλη ἡ πόλις
  english_pob_choice: the whole city
  chosen_spanish: toda la ciudad
  alternatives_spanish:
  - la ciudad entera
  - toda la población
  lexicon: BDAG
  rationale: «Toda la ciudad» reproduce de manera natural la expresión griega y mantiene su fuerza retórica de generalización sin debilitarla ni convertirla en una paráfrasis sociológica.
- source_word: ἐπισυνηγμένη
  english_pob_choice: gathered
  chosen_spanish: reunida
  alternatives_spanish:
  - juntada
  - asamblea
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo de ἐπισυνάγω expresa un estado resultante: la gente ya se hallaba congregada. «Reunida» comunica bien ese resultado en español con naturalidad; «juntada» sería más áspera y «asamblea» cambia la forma verbal a un sustantivo.'
- source_word: πρὸς τὴν θύραν
  english_pob_choice: at the door
  chosen_spanish: junto a la puerta
  alternatives_spanish:
  - a la puerta
  - junto a la entrada
  - en la puerta
  lexicon: BDAG
  rationale: La preposición πρός con acusativo puede indicar relación espacial cercana o dirigida hacia un punto. En contexto, la escena es la multitud congregada en la entrada de la casa; «junto a la puerta» preserva esa cercanía espacial con español idiomático. «A la puerta» sería más literal, pero menos preciso en español actual.
- source_word: θύραν
  english_pob_choice: door
  chosen_spanish: puerta
  alternatives_spanish:
  - entrada
  - portal
  lexicon: BDAG
  rationale: θύρα significa literalmente «puerta». «Puerta» es la correspondencia directa y mantiene la imagen concreta del acceso a la casa.
theological_decisions:
- issue: Valor espacial de πρός en la escena
  english_pob_reading: at the door; the crowd gathered at the house entrance
  chosen_spanish_reading: junto a la puerta; la multitud estaba congregada en la entrada de la casa
  alternative_spanish_readings:
  - a la puerta
  - en la puerta
  - hacia la puerta
  rationale: 'No hay una cuestión doctrinal, pero sí una decisión de escena: el griego no requiere movimiento en curso, sino una localización resultante alrededor de la entrada. «Junto a la puerta» evita sugerir que la multitud se estaba moviendo hacia allí y conserva el sentido contextual de reunión en la entrada.'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El texto base en inglés y la revisión más reciente están en alto acuerdo y no muestran cambios necesarios. La versión española sigue ese estado estable, ajustando solo la preposición para que el matiz espacial suene natural y fiel en español.
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo sobrio y directo del POB.
  - Se conserva «puerta» en el texto principal y se explica la alternativa literal en nota.
  - No se introducen términos eclesiásticos técnicos que no estén en el griego.
  - El participio perfecto pasivo se ha vertido con un estado resultante en español («estaba reunida»).
