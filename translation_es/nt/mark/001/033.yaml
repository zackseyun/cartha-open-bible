    issue: «junto a la puerta» afina demasiado la relación espacial de πρὸς τὴν θύραν
    rationale: El griego y la auditoría inglesa apuntan a la multitud congregada en la entrada de la casa; «junto a» puede sugerir simplemente cercanía al lado de la puerta, mientras que «a la puerta» expresa mejor el punto de reunión.
  - severity: low
    issue: La nota al pie queda algo menos necesaria si el texto principal usa «a la puerta»
    rationale: Si el texto principal adopta la opción más literal e idiomática en español, la alternativa útil pasa a ser «junto a la puerta» o «en la entrada», no al revés.
