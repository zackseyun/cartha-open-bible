  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una escena estática/resultativa con ἦν + ἐπισυνηγμένη, y conserva la fuerza de «ὅλη ἡ πόλις». Sin embargo, «junto a la puerta» desplaza ligeramente πρὸς τὴν θύραν desde la idea idiomática de congregación en la entrada hacia una proximidad lateral más específica. La nota ya reconoce que «a la puerta» es la alternativa más literal y contextual.'
  spanish_quality_summary: El español es natural y claro. No obstante, «estaba reunida junto a la puerta» suena un poco menos idiomático para una multitud ante la entrada de una casa que «estaba reunida a la puerta». La revisión propuesta mejora fidelidad y fluidez sin perder dignidad ni claridad.
  glossary_alignment: No hay términos del glosario mayor en juego. «Toda la ciudad», «estaba reunida» y «puerta» son adecuados. La única corrección recomendada es al sintagma espacial para alinearlo mejor con la decisión auditada del POB.
  issues:
