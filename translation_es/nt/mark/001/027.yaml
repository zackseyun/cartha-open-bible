    reason: alternative_reading
  revision_rationale: Se ajustó «discutían entre sí» a «se preguntaban unos a otros» para reflejar mejor la reacción de asombro y la conversación mutua implícita en συζητεῖν πρὸς ἑαυτούς en este contexto. Se eliminó la coma entre «nueva» y «con autoridad» para mantener más unida la frase exclamativa, y se quitó la exclamación final para no intensificar más de lo que marca el griego. La nota alternativa se conserva sin cambios sustanciales porque sigue representando correctamente la ambigüedad de puntuación documentada en el English POB.
