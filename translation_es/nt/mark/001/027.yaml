translation:
  language: es
  text: 'Y todos quedaron asombrados[a], de modo que se preguntaban unos a otros, diciendo: «¿Qué es esto? ¡Una enseñanza nueva con autoridad! Hasta a los espíritus inmundos les manda, y le obedecen.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué es esto? ¿Una enseñanza nueva con autoridad?» El griego puede puntuarse de modo que «enseñanza nueva» se una más directamente con la pregunta.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐθαμβήθησαν
  english_pob_choice: were amazed
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se maravillaron
  - quedaron atónitos
  lexicon: BDAG
  rationale: El pasivo expresa una reacción intensa de sorpresa. «Quedaron asombrados» es natural en español moderno y mantiene el impacto sin exagerarlo más allá del contexto.
- source_word: ἅπαντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - la multitud entera
  lexicon: BDAG
  rationale: ἅπαντες enfatiza la totalidad de la reacción. «Todos» es conciso e idiomático en español.
- source_word: ὥστε συζητεῖν
  english_pob_choice: so that they discussed among themselves
  chosen_spanish: de modo que discutían entre sí
  alternatives_spanish:
  - de manera que comenzaron a discutir entre sí
  - así que conversaban entre sí
  lexicon: BDAG
  rationale: ὥστε con infinitivo expresa resultado. «Discutían entre sí» conserva el sentido de conversación conjunta sin añadir una etapa de inicio que el ajuste revisado del inglés eliminó.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre ellos
  - unos con otros
  lexicon: BDAG
  rationale: La frase indica conversación mutua dentro del grupo. «Entre sí» es idiomático y compacto en español.
- source_word: Τί ἐστιν τοῦτο;
  english_pob_choice: What is this?
  chosen_spanish: ¿Qué es esto?
  alternatives_spanish:
  - ¿Qué significa esto?
  - ¿Qué cosa es esta?
  lexicon: BDAG
  rationale: La pregunta directa y sorprendida se conserva mejor con una traducción literal y natural. No se explicita «qué significa» para no interpretar más de lo que dice el griego.
- source_word: διδαχὴ καινή
  english_pob_choice: A new teaching
  chosen_spanish: ¡Una enseñanza nueva!
  alternatives_spanish:
  - ¡Una doctrina nueva!
  - ¡Una nueva enseñanza!
  lexicon: BDAG
  rationale: διδαχή es «enseñanza»; «doctrina» sonaría demasiado técnico en esta escena. El orden «una enseñanza nueva» o «una nueva enseñanza» es posible, pero el exclamativo fragmentario queda más vivo en español con énfasis en la novedad.
- source_word: κατ’ ἐξουσίαν
  english_pob_choice: with authority
  chosen_spanish: con autoridad
  alternatives_spanish:
  - autoritativamente
  - con poder y autoridad
  lexicon: BDAG
  rationale: La expresión señala modo o calidad de la enseñanza/orden. «Con autoridad» es la equivalencia más clara y ya habitual, sin diluir la fuerza del término.
- source_word: τοῖς πνεύμασι τοῖς ἀκαθάρτοις
  english_pob_choice: the unclean spirits
  chosen_spanish: a los espíritus inmundos
  alternatives_spanish:
  - a los espíritus impuros
  - a los espíritus no limpios
  lexicon: BDAG
  rationale: «Inmundos» preserva mejor la carga ritual y moral de ἀκάθαρτος que «impuros», y encaja con el registro bíblico español sin sonar arcaico.
- source_word: ἐπιτάσσει
  english_pob_choice: he commands
  chosen_spanish: les manda
  alternatives_spanish:
  - les ordena
  - les da órdenes
  lexicon: BDAG
  rationale: ἐπιτάσσω expresa mando con autoridad. En español, «manda» comunica el acto verbal de forma directa y en una frase final encaja bien con el ritmo del versículo.
- source_word: ὑπακούουσιν αὐτῷ
  english_pob_choice: they obey him
  chosen_spanish: le obedecen
  alternatives_spanish:
  - le hacen caso
  - se someten a él
  lexicon: BDAG
  rationale: ὑπακούω aquí es obediencia a una orden. «Le obedecen» es la equivalencia más fuerte y clara.
theological_decisions:
- issue: Ambigüedad sintáctica de «διδαχὴ καινή» y su relación con la pregunta anterior
  english_pob_reading: The crowd exclaims, 'What is this? A new teaching with authority!' while the Greek can also be punctuated so that 'new teaching' is taken more directly with the question.
  chosen_spanish_reading: «¿Qué es esto? ¡Una enseñanza nueva, con autoridad!» mantiene la lectura exclamativa principal y deja visible la conexión entre la novedad de la enseñanza y la autoridad con que actúa Jesús.
  alternative_spanish_readings:
  - «¿Qué es esto? ¿Una enseñanza nueva con autoridad?»
  - «¿Qué es esto, una enseñanza nueva con autoridad?»
  rationale: El griego permite cierta flexibilidad de puntuación. La redacción elegida preserva el asombro del grupo y no resuelve en exceso la relación sintáctica, manteniendo la tensión del original.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y sintáctica en lugar de resolverla prematuramente.'
- issue: Relación entre la autoridad de la enseñanza y la autoridad sobre los espíritus
  english_pob_reading: Jesus teaches with authority and also commands unclean spirits, and they obey him.
  chosen_spanish_reading: La formulación conecta la autoridad tanto con la enseñanza como con el mandato a los espíritus inmundos, sin separar artificialmente ambas manifestaciones.
  alternative_spanish_readings:
  - Limitar «con autoridad» solo a «manda»
  - Aplicarla solo a «enseñanza»
  rationale: El verso presenta la autoridad como rasgo integral del ministerio de Jesús. La puntuación elegida permite que la frase breve resuene en ambos niveles sin añadir explicación doctrinal ajena al texto.
  doctrine_reference: Marcos 1:27; cf. la estructura del propio versículo en griego.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail inglés: se omite una expansión equivalente a «comenzaron» y no se añade «eso/it», manteniendo la brevedad del griego. También conserva la apertura sintáctica que deja cierta ambigüedad en la relación entre «enseñanza nueva» y la pregunta/interjección, tal como reconoce la nota auditada.'
  spanish_consistency_notes:
  - Se usa «Y» al inicio para corresponder al καί inicial narrativo.
  - Se prefiere «espíritus inmundos» por coherencia con la terminología POB y la carga semántica de ἀκάθαρτοι.
  - «Con autoridad» se mantiene como fórmula estable para κατ’ ἐξουσίαν.
  - Se emplea «obedecen» en presente narrativo, acorde con el griego y con la vivacidad del relato.
