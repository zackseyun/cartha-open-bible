translation:
  language: es
  text: 'Y vino una voz de los cielos[a]: «Tú eres mi Hijo amado; en ti me he complacido»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del cielo». El griego tiene el plural «de los cielos».
    reason: lexical_alternative
  - marker: b
    text: O «en ti me complazco» o «contigo estoy complacido».
    reason: alternative_reading
lexical_decisions:
- source_word: φωνὴ ἐγένετο
  english_pob_choice: a voice came
  chosen_spanish: salió una voz
  alternatives_spanish:
  - se oyó una voz
  - vino una voz
  - una voz llegó
  lexicon: BDAG
  rationale: En español, «salir una voz» comunica bien la irrupción narrativa del evento sin sonar forzado. Mantiene el sentido de que la voz se hizo presente desde los cielos, de manera idiomática y fiel al giro griego.
- source_word: ἐκ τῶν οὐρανῶν
  english_pob_choice: from the heavens
  chosen_spanish: del cielo[a]
  alternatives_spanish:
  - de los cielos
  - desde los cielos
  lexicon: BDAG
  rationale: El griego está en plural («los cielos»). En español, «del cielo» es la forma más natural y readable; se conserva la alternativa plural en nota para no borrar la tensión léxica documentada entre singular tradicional y plural del texto fuente.
- source_word: Σὺ εἶ
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Eres tú
  - Tú eres, ciertamente
  lexicon: BDAG
  rationale: La segunda persona explícita se conserva con «Tú eres», que transmite la dirección solemne del discurso divino sin añadir elementos no presentes.
- source_word: ὁ υἱός μου
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo
  - mi hijo
  lexicon: BDAG
  rationale: «Hijo» es la traducción directa de υἱός. Se capitaliza por tratarse de una designación cristológica directa en boca divina, siguiendo la función que el inglés POB marca con «Son».
- source_word: ὁ ἀγαπητός
  english_pob_choice: beloved
  chosen_spanish: amado[b]
  alternatives_spanish:
  - amado
  - querido
  - muy amado
  lexicon: BDAG
  rationale: «Amado» reproduce con sobriedad el valor de ἀγαπητός. En español, «amado» suena solemne y natural en una declaración divina; se evita «querido» por suavizar demasiado el registro.
- source_word: ἐν σοὶ
  english_pob_choice: in you
  chosen_spanish: en ti
  alternatives_spanish:
  - contigo
  - en tu presencia
  lexicon: BDAG
  rationale: Se mantiene la preposición «en» porque el griego dice ἐν y el español lo expresa con naturalidad. No se sustituye por «contigo» ya que eso desplaza la relación espacial/relacional del original.
- source_word: εὐδόκησα
  english_pob_choice: I am well pleased
  chosen_spanish: me he complacido[c]
  alternatives_spanish:
  - me complazco
  - he hallado agrado
  - estoy complacido
  lexicon: BDAG
  rationale: «Me he complacido» conserva el valor de aprobación divina de εὐδοκέω sin depender de la fórmula tradicional «estoy bien complacido», que en español suena menos natural. Se deja abierta la alternativa de agrado/delight en la nota.
theological_decisions:
- issue: Cómo traducir la declaración divina sin debilitar el sentido cristológico
  english_pob_reading: my beloved Son
  chosen_spanish_reading: mi Hijo amado
  alternative_spanish_readings:
  - mi Hijo, el amado
  - mi Hijo querido
  rationale: La fórmula mantiene la filiación única y el amor divino sin introducir terminología doctrinal ajena al versículo. «Hijo amado» conserva el paralelismo y la solemnidad del anuncio desde el cielo.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
- issue: Si conservar o suavizar el plural de οὐρανῶν
  english_pob_reading: from the heavens
  chosen_spanish_reading: del cielo
  alternative_spanish_readings:
  - de los cielos
  - desde los cielos
  rationale: El plural griego se reconoce en la nota, pero el singular es el equivalente más natural en español bíblico contemporáneo. La nota preserva la evidencia textual sin sacrificar inteligibilidad.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el audit trail inglés POB. Se preserva la diferencia entre el plural griego «los cielos» y el singular idiomático español «el cielo» mediante nota, y se mantiene la ambigüedad de εὐδόκησα con alternativas léxicas en nota, sin suavizar el registro cristológico del enunciado divino.
  spanish_consistency_notes:
  - Se usó «Hijo» con mayúscula para reflejar el uso cristológico directo del contexto.
  - Se prefirió «amado» sobre «querido» por registro y fidelidad al valor de ἀγαπητός.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, ya que el versículo no contiene el nombre divino.
  - La puntuación reproduce el flujo narrativo y la cita directa con dos puntos y comillas angulares, conforme al español editorial estándar.
