revisions:
- from: 'Y salió una voz del cielo[a]: «Tú eres mi Hijo amado[b]; en ti me he complacido»[c].'
  to: 'Y vino una voz de los cielos[a]: «Tú eres mi Hijo amado; en ti me he complacido»[b].'
  rationale: Se revisa para alinear el español con la decisión principal del POB de conservar el plural «los cielos» en el texto, no solo en nota. También se mejora la naturalidad narrativa con «vino una voz» y se depuran las notas para que reflejen alternativas significativas documentadas por el audit trail. Se mantiene «mi Hijo amado» y «en ti me he complacido» como formulaciones fieles, claras y de registro adecuado.
