translation:
  language: es
  text: Y entraron en Cafarnaúm, y enseguida, el sábado, enseñaba en la sinagoga.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰσπορεύονται
  english_pob_choice: they went into
  chosen_spanish: entraron en
  alternatives_spanish:
  - iban entrando en
  - entran en
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse naturalmente en pasado en español narrativo. «Entraron en» conserva el movimiento hacia el interior sin sonar artificial.
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  lexicon: convención toponímica española
  rationale: Se usa la forma española asentada y fácilmente reconocible del nombre propio.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» comunica la prontitud narrativa con un español fluido y moderno, manteniendo el énfasis de εὐθύς.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - el sábado
  - en el sábado
  lexicon: BDAG
  rationale: Aunque el griego está en plural idiomático, el sentido temporal es singular. «En sábado» preserva la referencia al día sabático sin forzar una repetición extraña en español.
- source_word: ἐδίδασκεν
  english_pob_choice: he was teaching
  chosen_spanish: estaba enseñando
  alternatives_spanish:
  - enseñaba
  - estaba enseñando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso; «estaba enseñando» la refleja de manera clara y fiel, sin añadir el matiz inceptivo que el texto revisado descartó.
- source_word: συναγωγήν
  english_pob_choice: the synagogue
  chosen_spanish: la sinagoga
  alternatives_spanish:
  - la asamblea
  lexicon: BDAG
  rationale: En este contexto judío concreto, la referencia es a la sinagoga local; «sinagoga» es la equivalencia específica y precisa.
translation_notes:
  revision_awareness: La traducción sigue la revisión inglesa más reciente, que prefirió «was teaching» frente a una lectura inceptiva. Por eso el español evita un equivalente como «comenzó a enseñar» y conserva el aspecto durativo del imperfecto con «estaba enseñando».
  spanish_consistency_notes:
  - Se mantiene el tono narrativo sobrio y directo.
  - Se evita el calco «sobre los sábados» porque el idioma idiomático español requiere una expresión temporal natural.
  - Se conserva la terminología eclesial básica sin introducir vocabulario tradicional no necesario.
