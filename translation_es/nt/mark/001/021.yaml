revisions:
- from: Y entraron en Capernaúm, y enseguida, en sábado, estaba enseñando en la sinagoga.
  to: Y entraron en Cafarnaúm, y enseguida, el sábado, enseñaba en la sinagoga.
  rationale: Se ajusta la expresión temporal a un español idiomático («el sábado»), se simplifica el imperfecto a «enseñaba» para reflejar mejor el aspecto griego en narrativa española, y se normaliza el topónimo a «Cafarnaúm». No hacen falta notas, porque las alternativas del inglés no generan aquí una ambigüedad nueva que deba preservarse obligatoriamente en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:29:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: entrada en Capernaúm, inmediatez, referencia al sábado y enseñanza en la sinagoga. Sin embargo, dos elecciones no preservan óptimamente el sentido ni la naturalidad: «en sábado» suena poco idiomático para τοῖς σάββασιν, cuyo valor temporal singular se expresa mejor como «en el sábado» o, más naturalmente, «el sábado»; y «estaba enseñando» es posible, pero en narrativa española «enseñaba» reproduce mejor el imperfecto sin perífrasis pesada.'
  spanish_quality_summary: El texto es comprensible, pero «en sábado» resulta extraño en español bíblico natural y «estaba enseñando» suena más cargado de lo necesario. «Y entraron en Cafarnaúm, y enseguida, el sábado, enseñaba en la sinagoga» mejora la fluidez y mantiene dignidad y claridad.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Sí conviene ajustar el topónimo a la forma española más asentada en este mismo expediente («Cafarnaúm» aparece como alternativa y es la forma de uso más extendido), y expresar τοῖς σάββασιν con singular temporal idiomático.
  issues:
  - severity: medium
    issue: «en sábado» para τοῖς σάββασιν
    rationale: Aunque intenta reflejar una referencia temporal singular, esta construcción suena poco natural en español general y eclesial. El griego plural idiomático normalmente se vierte «el sábado» o «en sábado» solo en usos muy marcados; aquí «el sábado» comunica mejor el valor temporal.
  - severity: low
    issue: «estaba enseñando» para ἐδίδασκεν
    rationale: Es fiel en sentido aspectual, pero más pesado que el imperfecto simple español. «Enseñaba» conserva mejor el flujo narrativo y el imperfecto durativo sin introducir una perífrasis innecesaria.
  - severity: low
    issue: Topónimo «Capernaúm»
    rationale: No es incorrecto, pero «Cafarnaúm» es la forma española más asentada y más natural para un texto bíblico ampliamente legible.
  revised_spanish_text: Y entraron en Cafarnaúm, y enseguida, el sábado, enseñaba en la sinagoga.
  revision_rationale: Se ajusta la expresión temporal a un español idiomático («el sábado»), se simplifica el imperfecto a «enseñaba» para reflejar mejor el aspecto griego en narrativa española, y se normaliza el topónimo a «Cafarnaúm». No hacen falta notas, porque las alternativas del inglés no generan aquí una ambigüedad nueva que deba preservarse obligatoriamente en español.
