base_translation:
  language: en
  yaml_path: translation/nt/mark/001/021.yaml
  text: And they went into Capernaum[c][b][a], and immediately on the Sabbath he was teaching in the synagogue.
  footnotes:
  - marker: a
    text: Or, 'they enter into Capernaum'—Mark frequently uses the historical present in vivid narration.
    reason: lexical_alternative
  - marker: b
    text: Greek 'on the Sabbaths,' an idiomatic expression meaning 'on the Sabbath.'
    reason: lexical_alternative
  - marker: c
    text: Or, 'he was teaching' or 'he taught'; the Greek imperfect may emphasize ongoing action or the beginning of the action.
    reason: lexical_alternative
