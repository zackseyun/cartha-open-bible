translation:
  language: es
  text: 'y diciendo: «El tiempo se ha cumplido, y el reino de Dios se ha acercado. Arrepiéntanse y crean en la buena noticia[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «crean en el evangelio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - diciendo
  lexicon: BDAG
  rationale: Conserva la continuidad narrativa del participio griego con una construcción coordinada natural en español, sin sobrerrepresentar el valor aspectual.
- source_word: Πεπλήρωται
  english_pob_choice: has been fulfilled
  chosen_spanish: ha sido cumplido
  alternatives_spanish:
  - se ha cumplido
  - ha llegado a su cumplimiento
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción completada con resultado presente. «Ha sido cumplido» mantiene la voz pasiva y la noción de cumplimiento consumado; «se ha cumplido» sería una alternativa idiomática válida, pero aquí se preserva mejor la correspondencia formal.
- source_word: ὁ καιρὸς
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento señalado
  - el tiempo señalado
  - el tiempo oportuno
  lexicon: BDAG
  rationale: «καιρός» apunta al momento decisivo o señalado, pero «el tiempo» es la forma más natural y amplia en español. La precisión escatológica queda en el contexto, como en el inglés POB.
- source_word: ἤγγικεν
  english_pob_choice: has drawn near
  chosen_spanish: se ha acercado
  alternatives_spanish:
  - ha llegado cerca
  - está cerca
  lexicon: BDAG
  rationale: El perfecto de ἐγγίζω sugiere cercanía resultante de una aproximación ya realizada. «Se ha acercado» conserva mejor esa fuerza verbal que un simple «está cerca».
- source_word: βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: Se mantiene la expresión bíblica amplia y reconocible «reino de Dios», que preserva el alcance semántico y la resonancia canónica sin reducirla a solo «reinado».
- source_word: μετανοεῖτε
  english_pob_choice: Repent
  chosen_spanish: Arrepiéntanse
  alternatives_spanish:
  - Arrepiéntanse de sus pecados
  - Cambien de mente
  lexicon: BDAG
  rationale: La revisión inglesa prefirió «Repent» por ser una orden más exacta y formal. En español, «arrepiéntanse» es la equivalencia directa, sobria y eclesialmente inteligible para μετανοέω en este contexto proclamativo.
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean en
  - crean a
  lexicon: BDAG
  rationale: El imperativo plural de πιστεύω se rinde naturalmente con «crean». Aunque el griego usa ἐν + dativo, en español la construcción normal es «creer en»; aquí se omite la preposición por fluidez después de «en la buena noticia», evitando redundancia.
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the good news
  chosen_spanish: en la buena noticia
  alternatives_spanish:
  - en el evangelio
  - sobre la buena noticia
  lexicon: BDAG
  rationale: Se preserva la opción léxica del POB inglés de traducir εὐαγγέλιον por «good news». «Buena noticia» comunica el sentido literal y evita imponer de entrada el tecnicismo «evangelio» en el texto principal.
theological_decisions:
- issue: βασιλεία τοῦ θεοῦ
  english_pob_reading: the kingdom of God
  chosen_spanish_reading: el reino de Dios
  alternative_spanish_readings:
  - el reinado de Dios
  rationale: La expresión se mantiene en su forma canónica más conocida y abarcadora. Aunque «reinado» subrayaría el ejercicio dinámico del gobierno divino, «reino» preserva mejor la tensión bíblica entre dominio, esfera y gobierno, sin estrechar el concepto.
  doctrine_reference: Translation philosophy §3, §5
- issue: εὐαγγέλιον
  english_pob_reading: good news
  chosen_spanish_reading: buena noticia
  alternative_spanish_readings:
  - evangelio
  rationale: Se sigue la decisión del POB inglés de priorizar el sentido semántico transparente de εὐαγγέλιον frente al tecnicismo heredado. «Evangelio» se conserva como posible alternativa de lectura, pero no como redacción principal.
  doctrine_reference: Translation philosophy §1, §6
- issue: μετανοεῖτε καὶ πιστεύετε
  english_pob_reading: Repent and believe
  chosen_spanish_reading: Arrepiéntanse y crean
  alternative_spanish_readings:
  - Sigan arrepintiéndose y creyendo
  rationale: En un anuncio proclamativo, el imperativo plural español transmite con claridad la urgencia y el llamado inmediato. No se introduce un matiz progresivo que exceda el valor del texto y que podría oscurecer la fuerza exhortativa.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'La redacción sigue el último pass inglés, que corrigió «Change your thinking» por «Repent» y «trust in» por «believe in». Para el español se mantuvo esa misma línea revisada: «Arrepiéntanse y crean». También se conservó la opción léxica del POB de expresar εὐαγγέλιον como «buena noticia», con «evangelio» como alternativa documentada y no como término principal.'
  spanish_consistency_notes:
  - Se usa «reino de Dios» de manera consistente con la terminología canónica del proyecto.
  - Se traduce εὐαγγέλιον como «buena noticia» en el texto principal para seguir el criterio POB de transparencia léxica.
  - Se evita «SEÑOR» para θεός; aquí corresponde «Dios».
  - El plural imperativo «Arrepiéntanse y crean» refleja el mandato general y conserva el registro público de la proclamación.
