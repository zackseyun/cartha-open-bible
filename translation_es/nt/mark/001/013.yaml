revisions:
- from: Y estuvo en el desierto cuarenta días[a], siendo tentado por Satanás; y estuvo con las fieras, y los ángeles le ministraban.
  to: Y estuvo en la región desierta cuarenta días[a], siendo tentado por Satanás; y estaba con los animales salvajes, y los ángeles lo atendían.
  rationale: Se ajusta «desierto» a «región desierta» para reflejar mejor el alcance de ἐρήμῳ y la decisión auditada «wilderness». Se cambia «con las fieras» a «con los animales salvajes» para alinearse con la claridad moderna del POB inglés. Se sustituye «le ministraban» por «lo atendían» para un español más natural y ampliamente legible, manteniendo el sentido de servicio continuo de los ángeles. También se mejora levemente la concordancia aspectual con «estaba con» en la cláusula intermedia, que suena más natural junto al imperfecto final.
