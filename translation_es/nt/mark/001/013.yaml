  spanish_quality_summary: El texto es mayormente claro y digno, pero «desierto» puede sugerir un terreno específicamente arenoso más de lo que exige el griego, y «ministraban» en español puede sonar eclesiástico-institucional o poco idiomático para ángeles atendiendo a Jesús. «La región desierta» y «lo atendían» mejoran precisión y legibilidad sin perder solemnidad.
  glossary_alignment: No hay conflictos con los términos de proyecto clave. «Satanás» y «ángeles» están bien. La principal cuestión de alineación es seguir mejor la decisión inglesa «wilderness» con una opción española menos estrecha que «desierto».
  issues:
  - severity: medium
    issue: «desierto» para ἐρήμῳ
    rationale: Aunque idiomático y tradicional, «desierto» puede especificar demasiado el paisaje respecto a «wilderness». El POB inglés documenta explícitamente la amplitud geográfica y la resonancia teológica de «wilderness». En español, «región desierta» o «soledad» preserva mejor esa amplitud.
  - severity: medium
    issue: «le ministraban» para διηκόνουν αὐτῷ
    rationale: «Ministrar» existe, pero en español general suele sonar técnico o eclesiástico. Para lectores amplios, «lo atendían» o «le servían» comunica mejor la acción de cuidado continuo de los ángeles. «Lo atendían» además encaja muy naturalmente tras la tentación y el ayuno sin perder dignidad.
  revised_spanish_text: Y estuvo en la región desierta cuarenta días[a], siendo tentado por Satanás; y estaba con los animales salvajes, y los ángeles lo atendían.
