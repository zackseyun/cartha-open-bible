translation:
  language: es
  text: Y estuvo en la región desierta cuarenta días[a], siendo tentado por Satanás; y estaba con los animales salvajes, y los ángeles lo atendían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siendo puesto a prueba por Satanás». El verbo griego puede significar tanto «tentar» como «probar», aunque «tentado» encaja mejor con la agencia explícita de Satanás aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐρήμῳ
  english_pob_choice: wilderness
  chosen_spanish: desierto
  alternatives_spanish:
  - yermo
  - lugar desolado
  lexicon: BDAG
  rationale: En español, «desierto» comunica de manera natural el ámbito bíblico de soledad y prueba. Aunque «wilderness» en inglés puede abarcar más que un desierto arenoso, aquí «desierto» es la opción más idiomática y suficientemente amplia para conservar el trasfondo narrativo sin añadir precisión geográfica innecesaria.
- source_word: τεσσεράκοντα ἡμέρας
  english_pob_choice: forty days
  chosen_spanish: cuarenta días
  alternatives_spanish:
  - por cuarenta días
  lexicon: BDAG
  rationale: La expresión griega indica duración y se traduce de forma directa. «Cuarenta días» mantiene la resonancia bíblica sin interpretarla ni expandirla.
- source_word: πειραζόμενος
  english_pob_choice: being tempted
  chosen_spanish: siendo tentado
  alternatives_spanish:
  - siendo probado
  - siendo puesto a prueba
  lexicon: BDAG
  rationale: El verbo admite tanto la idea de tentar como de probar. Dado que el agente explícito es Satanás, «siendo tentado» conserva mejor el sentido hostil y moral del pasaje, sin negar que el episodio también funcione como prueba.
- source_word: ὑπὸ τοῦ Σατανᾶ
  english_pob_choice: by Satan
  chosen_spanish: por Satanás
  alternatives_spanish:
  - por el Adversario
  lexicon: BDAG
  rationale: «Satanás» es el nombre/título ya establecido en español bíblico y refleja adecuadamente al agente personal del conflicto. «El Adversario» expresa el sentido subyacente, pero aquí suena menos natural.
- source_word: μετὰ τῶν θηρίων
  english_pob_choice: with the wild animals
  chosen_spanish: con las fieras
  alternatives_spanish:
  - con los animales salvajes
  - entre las fieras
  lexicon: BDAG
  rationale: «Fieras» conserva el matiz de animales salvajes y potencialmente peligrosos con una concisión natural en español bíblico. Aunque «animales salvajes» es más explícito, «fieras» sigue siendo claro y no exagera el texto.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto de tentación en el desierto y el contraste con Satanás favorecen claramente seres celestiales. «Ángeles» es la traducción normal y más precisa aquí; «mensajeros» no encaja tan bien en el pasaje.
- source_word: διηκόνουν αὐτῷ
  english_pob_choice: were ministering to him
  chosen_spanish: le ministraban
  alternatives_spanish:
  - le servían
  - lo atendían
  lexicon: BDAG
  rationale: «Ministraban» conserva el tono solemne y el aspecto continuo del imperfecto griego. «Servían» es posible, pero resulta más genérico; «atendían» suaviza demasiado la fuerza del verbo διακονέω.
- source_word: καὶ ἦν ... καὶ ἦν ... καὶ
  english_pob_choice: And he was ...; and he was ...; and ...
  chosen_spanish: Y estuvo ...; y estuvo ...; y ...
  alternatives_spanish:
  - Y estaba ...; y estaba ...; y ...
  lexicon: BDAG
  rationale: Se preserva la parataxis de Marcos con repeticiones de «y». En esta escena narrativa, el pretérito «estuvo» suena más natural en español que un calco imperfectivo continuo; aun así, el progresivo del segundo miembro se conserva con «siendo tentado».
theological_decisions:
- issue: Fuerza semántica de πειραζόμενος frente a la agencia de Satanás
  english_pob_reading: being tempted
  chosen_spanish_reading: siendo tentado
  alternative_spanish_readings:
  - siendo probado
  - siendo puesto a prueba
  rationale: 'La traducción mantiene la tensión léxica reconocida por el POB inglés: πειράζω puede significar «tentar» o «probar». Como Satanás es el agente explícito, la lectura más fuerte y moralmente cargada es «tentado», sin excluir que el evento también tenga función de prueba dentro del marco bíblico.'
  doctrine_reference: Translation philosophy §3 (preservar tensiones genuinas cuando el original es ambiguo)
translation_notes:
  revision_awareness: 'Se siguió el consenso alto del audit trail en inglés: sin cambios en la lectura principal del versículo y con la misma preferencia por «being tempted» frente a «being tested», manteniendo la tensión léxica en una nota. La única adaptación relevante fue idiomática en español: «desierto» y «fieras» para mayor naturalidad sin perder el sentido bíblico.'
  spanish_consistency_notes:
  - Se usó «Satanás» como nombre propio conforme al contexto del pasaje.
  - Se mantuvo la estructura paratáctica de Marcos con repeticiones de «y».
  - «Ministraban» se eligió para reflejar el aspecto continuo del imperfecto griego y el tono de servicio reverente.
  - La nota al pie preserva la alternativa «probar» para no borrar la ambigüedad léxica del verbo πειράζω.
