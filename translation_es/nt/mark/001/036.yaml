translation:
  language: es
  text: Y Simón y los que estaban con él lo persiguieron[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Persiguieron» conserva la fuerza del verbo griego; también puede entenderse como «buscaron» en un sentido idiomático más suave, pero esa opción atenúa el matiz de búsqueda enérgica que el POB inglés quiso preservar.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεδίωξεν
  english_pob_choice: pursued
  chosen_spanish: lo persiguieron
  alternatives_spanish:
  - lo buscaron
  - fueron tras él
  - lo siguieron
  lexicon: BDAG
  rationale: καταδιώκω expresa una persecución o búsqueda intensa; «lo persiguieron» conserva esa fuerza en español mejor que «lo buscaron», que suaviza el verbo. Se mantiene el tono narrativo natural sin perder intensidad.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre remite a Jesús en el contexto inmediato. En español, el clítico de objeto directo «lo» resulta la forma más natural y fiel en una narración continua.
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  lexicon: convention de nombre propio
  rationale: Se translitera el nombre propio con la forma española estándar «Simón», conforme al uso bíblico en español.
- source_word: οἱ μετ’ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: los que estaban con él
  alternatives_spanish:
  - los que estaban con él
  - sus acompañantes
  - los que iban con él
  lexicon: BDAG
  rationale: La expresión es literalmente «los que con él». En español, «los que estaban con él» comunica la relación de compañía de forma clara y fiel, sin añadir precisión interpretativa como «sus acompañantes».
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción enlaza de manera simple con el contexto previo. «Y» conserva la parataxis característica de Marcos mejor que una solución más explicativa.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y mantiene la decisión del POB inglés de preservar la fuerza de καταδιώκω. No se introducen cambios doctrinales ni expansiones interpretativas.
  spanish_consistency_notes:
  - Se usa «Simón» para el nombre propio y «lo» para el referente masculino singular, ambos coherentes con español bíblico actual.
  - Se evita «SEÑOR» u otras sustituciones teológicas porque el verso no contiene vocabulario divino.
  - La estructura breve y paratáctica refleja el estilo narrativo del original griego.
