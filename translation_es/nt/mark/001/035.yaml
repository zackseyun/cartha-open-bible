translation:
  language: es
  text: Y muy de madrugada[a], cuando todavía estaba oscuro, se levantó, salió y se fue a un lugar desolado, y allí estaba orando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a un lugar desierto» o «a un lugar solitario». El griego puede describir un sitio deshabitado, desolado o con rasgos de desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρωῒ
  english_pob_choice: very early
  chosen_spanish: muy de madrugada
  alternatives_spanish:
  - temprano en la mañana
  - muy temprano
  lexicon: BDAG
  rationale: La expresión griega sitúa la acción en la madrugada temprana; en español, «muy de madrugada» comunica naturalmente esa franja horaria y conserva el énfasis de πρωῒ junto con λίαν.
- source_word: ἔννυχα
  english_pob_choice: while it was still dark
  chosen_spanish: cuando todavía estaba oscuro
  alternatives_spanish:
  - de noche
  - antes del amanecer
  lexicon: BDAG
  rationale: El adverbio intensifica la referencia temporal indicando que la noche aún seguía vigente. «Cuando todavía estaba oscuro» mantiene ese valor sin forzar una literalidad poco natural en español.
- source_word: λίαν
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - extremadamente
  lexicon: BDAG
  rationale: Funciona como intensificador de la referencia temporal. «Muy» es el equivalente más breve y natural en español para acompañar «de madrugada».
- source_word: ἀναστὰς
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - habiéndose levantado
  - levantándose
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales e indica acción previa. «Se levantó» conserva la secuencia narrativa de forma idiomática en español.
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - se salió
  lexicon: BDAG
  rationale: Mantiene el movimiento concreto desde el lugar en que estaba. En español, «salió» es la manera más natural de reflejar ἐξῆλθεν sin añadir matices innecesarios.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se alejó
  lexicon: BDAG
  rationale: 'Distingue el segundo movimiento respecto de ἐξῆλθεν y conserva la narrativa de dos pasos: primero salir, luego alejarse. «Se fue» es natural y suficientemente distinto en español.'
- source_word: εἰς ἔρημον τόπον
  english_pob_choice: to a desolate place
  chosen_spanish: a un lugar desolado
  alternatives_spanish:
  - a un lugar desierto
  - a un lugar solitario
  - a un lugar desolado y apartado
  lexicon: BDAG
  rationale: ἔρημος puede implicar desierto, desolado, desierto de gente o solitario. «Lugar desolado» conserva el sentido de un sitio sin gente o inhóspito sin convertirlo automáticamente en un término técnico de «desierto» geográfico.
- source_word: κἀκεῖ
  english_pob_choice: and there
  chosen_spanish: y allí
  alternatives_spanish:
  - y ahí
  - y en ese lugar
  lexicon: BDAG
  rationale: La contracción καὶ ἐκεῖ se expresa de manera directa con «y allí», preservando el enlace narrativo y la localización.
- source_word: προσηύχετο
  english_pob_choice: he was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - oraba
  - seguía orando
  lexicon: BDAG
  rationale: El imperfecto indica una acción en desarrollo en el pasado. «Estaba orando» refleja mejor ese valor aspectual que el pretérito simple. Se prefiere «orar» por ser claro y plenamente español, sin desplazar el sentido de προσεύχομαι.
theological_decisions:
- issue: La retirada de Jesús para orar
  english_pob_reading: Render the verse straightforwardly as describing Jesus withdrawing for prayer without importing additional doctrinal interpretation.
  chosen_spanish_reading: Traducir el versículo como una narración directa de que Jesús se apartó para orar, sin añadir interpretaciones doctrinales al propio enunciado.
  alternative_spanish_readings:
  - Resaltar explícitamente su ejemplo de disciplina espiritual
  - Subrayar su dependencia cristológica en la oración
  rationale: El griego narra simplemente que Jesús salió a un lugar desolado y allí oraba. La traducción debe dejar esa observación en primer plano y no incorporar conclusiones teológicas que el texto no formula de manera explícita.
  doctrine_reference: 'Principios de equivalencia óptima: fidelidad al enunciado y sobriedad interpretativa'
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y recibió un veredicto de alta concordancia, sin cambios necesarios en el último pase. La presente redacción española sigue ese perfil estable, preservando la secuencia verbal, el valor aspectual del imperfecto y la amplitud semántica de ἔρημος mediante una nota alternativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «orar»/«orando» para προσεύχομαι por claridad y naturalidad en español, manteniendo el valor continuo del imperfecto.
  - «Lugar desolado» conserva la ambigüedad semántica de ἔρημος; la nota recoge las alternativas documentadas.
  - No se fusionan ἐξῆλθεν y ἀπῆλθεν, para respetar el doble movimiento narrativo del griego.
