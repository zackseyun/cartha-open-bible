translation:
  language: es
  text: Y, después de advertirle severamente[a], enseguida lo despidió[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de encargarle estrictamente»; el verbo griego también puede implicar una fuerte severidad o indignación, pero aquí probablemente expresa una advertencia enérgica más que una reprensión personal.
    reason: lexical_alternative
  - marker: b
    text: O «lo echó» / «lo expulsó»; el verbo griego es más fuerte que un simple «despedir».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβριμησάμενος
  english_pob_choice: after sternly warning
  chosen_spanish: después de reprenderlo
  alternatives_spanish:
  - después de amonestarlo severamente
  - después de darle una estricta advertencia
  - después de reprenderlo con severidad
  lexicon: BDAG
  rationale: El verbo griego puede expresar intensidad emocional y un hablar enérgico, no solo una simple reprimenda. En español, «reprenderlo» comunica una intervención fuerte y correctiva; el contexto narrativo de la orden que sigue favorece una advertencia severa sin añadir más de lo que el texto exige. Se evita una formulación demasiado literal que sonaría poco natural, pero se conserva la fuerza del original.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - le
  - a él
  lexicon: BDAG
  rationale: El pronombre dativo se integra de manera natural en el clítico de objeto directo en español tras «reprender». Aunque el griego no especifica caso de la misma forma que el español, la referencia sigue siendo el mismo hombre sanado.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: en seguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  - de inmediato
  lexicon: BDAG
  rationale: La partícula narrativa de inmediatez se conserva con una expresión clara y actual en español. «En seguida» mantiene el ritmo marciano y suena natural en lectura pública.
- source_word: ἐξέβαλεν
  english_pob_choice: sent him away
  chosen_spanish: lo despidió
  alternatives_spanish:
  - lo echó
  - lo expulsó
  - lo hizo salir
  lexicon: BDAG
  rationale: El verbo ἐκβάλλω es más fuerte que un mero «enviar». Como aquí el objeto no es un demonio, «despedir» comunica la separación o alejamiento con cierta fuerza, sin forzar el sentido a «expulsar» en un contexto que no es exorcístico. La nota preserva la tensión entre una traducción idiomática y la fuerza del verbo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Se refiere al mismo hombre sanado; el clítico español expresa de forma fluida la referencia personal directa.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la simple coordinación narrativa del griego, acorde con el estilo de Marcos.
theological_decisions:
- issue: Tono de la acción de Jesús hacia el hombre sanado
  english_pob_reading: Jesús habla y actúa con marcada severidad, sin implicar ira pecaminosa ni hostilidad hacia el hombre.
  chosen_spanish_reading: Jesús le habla con severidad y lo aparta de manera enérgica, sin sugerir hostilidad pecaminosa.
  alternative_spanish_readings:
  - Jesús solo le da una instrucción firme, sin color emocional especial
  - Jesús lo reprende personalmente con desaprobación
  rationale: Las expresiones griegas son fuertes y conviene conservar esa fuerza en español. Sin embargo, la traducción no debe cargar el texto con una conclusión doctrinal sobre ira o rechazo personal. La redacción mantiene la severidad y deja abierta la tensión interpretativa que el contexto siguiente ayuda a iluminar.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el audit trail inglés: mantiene la fuerza de ἐμβριμησάμενος y ἐξέβαλεν, pero opta por un español natural y publicable. No se registraron revisiones aplicadas en el ciclo más reciente; el acuerdo de revisión fue alto y el contenido quedó sin cambios sustantivos.'
  spanish_consistency_notes:
  - Se preserva la coordinación narrativa simple con «Y».
  - «Reprender» se usa aquí para reflejar la fuerza admonitiva del participio sin convertirlo en una lectura psicológica excesiva.
  - «Despedir» se entiende en sentido fuerte por el contexto y la nota, no como mera cortesía.
  - Los clíticos «lo» mantienen claridad referencial y fluidez en español.
