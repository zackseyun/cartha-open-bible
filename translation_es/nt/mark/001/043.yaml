  source_alignment_summary: El borrador capta bien la estructura básica del griego y preserva la inmediatez de εὐθύς y la fuerza relativa de ἐξέβαλεν mediante nota. Sin embargo, «después de reprenderlo» desplaza el sentido documentado de ἐμβριμησάμενος desde una advertencia severa hacia una censura personal del hombre, precisamente la lectura que el rastro inglés quiso evitar. Además, «lo despidió» resulta algo demasiado débil para ἐξέβαλεν si no va acompañado de una formulación principal más enérgica.
  spanish_quality_summary: El español es legible y natural, pero «reprenderlo» sugiere más desaprobación que advertencia, y «en seguida» hoy suele preferirse como «enseguida» o «de inmediato». Una formulación como «después de advertirle severamente» suena natural, digna y más fiel al matiz. Para ἐξέβαλεν, «lo hizo irse» sería más claro pero menos fuerte; «lo echó» en texto principal puede sonar brusco. «Lo despidió» puede mantenerse con nota, pero conviene reforzar el primer verbo para conservar la severidad global.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La principal alineación pendiente es con la decisión léxica documentada en inglés para ἐμβριμησάμενος: normalmente debe reflejar una advertencia severa, no una reprensión al hombre. La nota alternativa sobre ἐξέβαλεν está bien alineada con el rastro inglés.'
