translation:
  language: es
  text: 'diciendo: «¿Qué tienes que ver con nosotros[a], Jesús el Nazareno[b]? ¿Has venido para destruirnos? Sé quién eres: eres el Santo de Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tenemos nosotros contigo?» La expresión griega es un modismo de separación o de hostilidad.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Jesús de Nazaret». Griego: «Jesús el Nazareno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - mientras decía
  lexicon: BDAG
  rationale: El participio introductorio se conserva como gerundio en español para reflejar la conexión sintáctica con el contexto sin añadir un verbo narrativo nuevo que el griego no exige.
- source_word: Τί ἡμῖν καὶ σοί
  english_pob_choice: What have you to do with us
  chosen_spanish: ¿Qué tienes que ver con nosotros?
  alternatives_spanish:
  - ¿Qué tenemos nosotros contigo?
  - ¿Qué hay entre nosotros y tú?
  - ¿Qué tienes que ver tú con nosotros?
  lexicon: BDAG
  rationale: La expresión griega es idiomática y de separación/hostilidad. En español, «¿Qué tienes que ver con nosotros?» comunica de forma natural la confrontación sin diluir el matiz idiomático ni forzar una paráfrasis excesiva.
- source_word: Ἰησοῦ Ναζαρηνέ
  english_pob_choice: Jesus the Nazarene
  chosen_spanish: Jesús el Nazareno
  alternatives_spanish:
  - Jesús de Nazaret
  - Jesús, Nazareno
  lexicon: BDAG
  rationale: Se preserva el valor vocativo/titular de Ναζαρηνέ con «el Nazareno», que refleja mejor la forma griega que una frase geográfica más interpretativa. «Jesús de Nazaret» queda como alternativa semánticamente válida.
- source_word: ἦλθες ἀπολέσαι
  english_pob_choice: Have you come to destroy
  chosen_spanish: ¿Has venido para destruir
  alternatives_spanish:
  - ¿Viniste para destruir
  - ¿Has venido a destruir
  lexicon: BDAG
  rationale: El aoristo interrogativo se vierte naturalmente con el perfecto compuesto español «has venido», y el infinitivo final se expresa con «para destruir» para mantener claridad y la fuerza teleológica del griego.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nosotros / nos
  alternatives_spanish:
  - nosotros
  - nos
  lexicon: BDAG
  rationale: Se conserva el plural en primera persona, importante para mantener la confrontación plural del hablante. En la pregunta se traduce como complemento personal «con nosotros» y en el infinitivo como objeto directo «destruirnos».
- source_word: οἶδά σε τίς εἶ
  english_pob_choice: I know who you are
  chosen_spanish: Sé quién eres
  alternatives_spanish:
  - Conozco quién eres
  - Yo sé quién eres
  lexicon: BDAG
  rationale: La cláusula expresa reconocimiento directo. «Sé quién eres» es la forma más natural en español y conserva la identificación inmediata sin sobreexplicar la estructura griega.
- source_word: ὁ ἅγιος τοῦ θεοῦ
  english_pob_choice: the Holy One of God
  chosen_spanish: el Santo de Dios
  alternatives_spanish:
  - el Santo de Dios
  - el Santo que pertenece a Dios
  - el Santo de parte de Dios
  lexicon: BDAG
  rationale: Se mantiene el título cristológico tal como aparece en el griego. En español, «el Santo de Dios» preserva la relación genitiva sin añadir explicación doctrinal que el texto no explicita.
theological_decisions:
- issue: Título cristológico reconocido por un espíritu inmundo
  english_pob_reading: the Holy One of God
  chosen_spanish_reading: el Santo de Dios
  alternative_spanish_readings:
  - el Santo que pertenece a Dios
  - el Santo de parte de Dios
  rationale: 'La traducción conserva la fuerza titular del reconocimiento sin expandirlo a una confesión doctrinal más larga. Esto mantiene la tensión narrativa: incluso el enemigo reconoce la santidad y singularidad de Jesús.'
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió una formulación más literal de la expresión idiomática («What have you to do with us») sin cambiar el resto del versículo. La versión española sigue esa misma línea: conserva el tono formal e idiomático de confrontación, mantiene «Jesús el Nazareno» como reflejo estrecho del vocativo griego, y preserva el título «el Santo de Dios» sin expansión doctrinal.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se usa «Dios» para θεοῦ y se mantiene el genitivo con «de Dios».
  - Se conserva «el Santo» con mayúscula inicial por su fuerza titulativa en contexto.
  - Se evita «Cristo» porque el griego aquí no usa Χριστός.
  - Se mantiene el plural implícito en «nosotros/nos» para reflejar ἡμᾶς.
  - Se evita la traducción eclesiástica «Señor» para nombres divinos, ya que este versículo no contiene יהוה ni κύριος como equivalente del nombre divino.
