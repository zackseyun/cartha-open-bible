translation:
  language: es
  text: 'Y Jesús les dijo: «Vengan tras mí[a], y haré que lleguen a ser pescadores de personas[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Síganme». Literalmente, «Vengan tras mí».
    reason: alternative_reading
  - marker: b
    text: 'Griego: «pescadores de hombres», es decir, de seres humanos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: And Jesus said to them
  chosen_spanish: Y Jesús les dijo
  alternatives_spanish:
  - Y Jesús les dijo a ellos
  lexicon: BDAG
  rationale: Se conserva la introducción narrativa simple y directa. En español, el dativo αὐτοῖς se expresa de forma natural con les, sin añadir énfasis innecesario.
- source_word: Δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Vengan, síganme
  lexicon: BDAG
  rationale: Δεῦτε es un llamado imperatival plural. «Vengan» reproduce el impulso inmediato del llamado; el matiz de discipulado queda reforzado por la frase siguiente.
- source_word: ὀπίσω μου
  english_pob_choice: after me
  chosen_spanish: en pos de mí
  alternatives_spanish:
  - detrás de mí
  - después de mí
  lexicon: BDAG
  rationale: La expresión griega es literalmente espacial («detrás/tras de mí»), pero en contexto de discipulado el español «en pos de mí» preserva ese valor relacional y de seguimiento sin convertirlo en paráfrasis excesiva.
- source_word: ποιήσω
  english_pob_choice: I will make
  chosen_spanish: yo los haré
  alternatives_spanish:
  - yo los pondré
  - yo los haré ser
  lexicon: BDAG
  rationale: ποιήσω expresa acción eficaz de Jesús sobre los discípulos. «Los haré» mantiene la fuerza causal/transformadora del verbo y funciona de manera natural con el infinitivo siguiente.
- source_word: γενέσθαι
  english_pob_choice: become
  chosen_spanish: llegar a ser
  alternatives_spanish:
  - ser
  - convertirse en
  lexicon: BDAG
  rationale: El infinitivo aoristo de γίνομαι apunta a entrar en un nuevo estado. «Llegar a ser» comunica mejor ese proceso de cambio que un simple «ser».
- source_word: ἁλιεῖς
  english_pob_choice: fishers
  chosen_spanish: pescadores
  alternatives_spanish:
  - pescadores de peces
  - pescadores
  lexicon: BDAG
  rationale: En español, «pescadores» es el equivalente idiomático y natural del oficio/metáfora. Evita un calco extraño y conserva la imagen de captura.
- source_word: ἀνθρώπων
  english_pob_choice: of people
  chosen_spanish: de personas
  alternatives_spanish:
  - de hombres
  - de gente
  lexicon: BDAG
  rationale: El genitivo plural ἀνθρώπων designa seres humanos en general. Dado el ajuste revisado del POB inglés hacia «people», «personas» expresa con claridad el sentido inclusivo y evita una lectura genéricamente masculina en español.
theological_decisions:
- issue: Alcance humano del símbolo «pescadores de personas»
  english_pob_reading: fishers of people
  chosen_spanish_reading: pescadores de personas
  alternative_spanish_readings:
  - pescadores de hombres
  - pescadores de gente
  rationale: La revisión inglesa reciente privilegia el sentido genérico de ἀνθρώπων. En español, «personas» comunica ese alcance sin perder la metáfora de pesca ni introducir un sesgo masculino que el griego no exige aquí.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relación entre el llamado y el seguimiento de Jesús
  english_pob_reading: Come after me
  chosen_spanish_reading: Vengan en pos de mí
  alternative_spanish_readings:
  - Síganme
  - Vengan después de mí
  rationale: El POB inglés preserva la literalidad relativa de ὀπίσω μου mediante «after me» y una nota que admite «Follow me». En español, «en pos de mí» mantiene la imagen espacial y el sentido discipular sin reemplazar la metáfora por una equivalencia interpretativa más plana.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 (Source transparency)
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente en ἀνθρώπων: de «men» a «people» por mayor precisión y naturalidad. La versión española sigue esa revisión con «personas», manteniendo la imagen metafórica y la transparencia al griego. También conserva la tensión entre el imperativo Δεῦτε y la frase ὀπίσω μου mediante una formulación que no borra el matiz espacial de seguimiento.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio sin transliteración alternativa.
  - Se usa «personas» en lugar de «hombres» para reflejar el ajuste auditado hacia un sentido humano genérico.
  - «En pos de mí» se emplea como opción de registro bíblico claro y transparente; la nota ofrece la lectura alternativa «Síganme» para lectores que prefieran la equivalencia funcional.
  - La metáfora de pesca se conserva sin explicitar una interpretación fuera de lo que la nota ya indica.
