lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se conserva la coordinación simple del griego para mantener el flujo narrativo de Marcos sin añadir una relación temporal o causal que no esté explícita.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» comunica prontitud de manera natural en español y conserva la urgencia característica de εὐθύς en Marcos.
- source_word: ἀφέντες
  english_pob_choice: left
  chosen_spanish: dejaron
  alternatives_spanish:
  - habiendo dejado
  - abandonaron
  lexicon: BDAG
  rationale: El participio aoristo se vierte con un verbo finito coordinado en español para expresar la acción previa sin forzar una construcción participial pesada. «Abandonaron» intensifica indebidamente el matiz.
- source_word: τὰ δίκτυα
  english_pob_choice: the nets
  chosen_spanish: las redes
  alternatives_spanish:
  - sus redes
  lexicon: BDAG
  rationale: El artículo griego se refleja con artículo definido en español. «Sus» sería contextual, pero no está expresado en el griego.
- source_word: ἠκολούθησαν
  english_pob_choice: followed
  chosen_spanish: le siguieron
  alternatives_spanish:
  - lo siguieron
  - fueron tras él
  lexicon: BDAG
  rationale: «Seguir» conserva el sentido literal y discipular del verbo ἀκολουθέω sin expandirlo a una glosa interpretativa como «se hicieron sus discípulos».
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre griego se conserva pronominalmente en español. La referencia a Jesús queda clara por el contexto inmediato, sin sustituir el pronombre por el nombre.
theological_decisions:
- issue: Nuance de discipulado en ἠκολούθησαν
  english_pob_reading: Render as 'followed him' without expanding to 'became his disciples' or similar.
  chosen_spanish_reading: «le siguieron» sin añadir «se hicieron sus discípulos» ni una explicación similar.
  alternative_spanish_readings:
  - lo siguieron
  - se hicieron sus discípulos
  rationale: El verbo ya comunica la acción narrativa y deja emerger el sentido de discipulado por el contexto. Expandirlo introduciría interpretación no exigida por la frase.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión inglesa POB y su auditoría no presentan revisiones aplicadas; se mantiene la lectura directa de SBLGNT con equivalencia óptima y sin expansión interpretativa.
  spanish_consistency_notes:
  - Se usa «Y» para καὶ por coordinación narrativa directa.
  - «Enseguida» mantiene el valor de urgencia de εὐθύς en un español natural.
  - Se conserva el pronombre dativo con «le» para reflejar αὐτῷ sin nominalizarlo.
  - «Las redes» sigue el artículo griego; no se añade posesivo no expreso.
