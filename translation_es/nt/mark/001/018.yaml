review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja fielmente el griego: conserva la coordinación simple de καὶ, la prontitud de εὐθύς, el sentido no intensificado de ἀφέντες como «dejaron», el artículo definido en «las redes», y el valor narrativo-discipular de ἠκολούθησαν con pronombre para αὐτῷ. No añade interpretación indebida.'
  spanish_quality_summary: La redacción es clara y natural, pero «le siguieron» suena menos idiomático en español general moderno que «lo siguieron» para un referente masculino singular directo en este contexto. «Enseguida» es aceptable, pero «inmediatamente» alinea mejor con el inglés POB y con el registro bíblico digno. La nota alternativa debe mantenerse.
  glossary_alignment: No hay términos del glosario mayor implicados aquí. La decisión sobre ἀκολουθέω como «seguir» está bien alineada con la filosofía del proyecto, evitando expandir a una glosa discipular. Se mantiene el pronombre en lugar de «Jesús», conforme al griego.
  issues:
  - severity: medium
    issue: Uso de «le siguieron» en lugar de «lo siguieron».
    rationale: Aunque «seguir» admite variación regional, para español neutro ampliamente legible «lo siguieron» resulta más natural y directo aquí para el pronombre masculino singular referido a Jesús. Evita una formulación que algunos lectores perciben como menos estándar en registro escrito general.
  - severity: low
    issue: «Enseguida» frente a «inmediatamente».
    rationale: «Enseguida» es correcto, pero «inmediatamente» reproduce con más precisión el matiz fuerte y característico de εὐθύς en Marcos y coincide más estrechamente con la elección principal del inglés POB. Es un ajuste estilístico menor, no una corrección de sentido.
  revised_spanish_text: Y inmediatamente dejaron las redes y lo siguieron[a].
  revised_footnotes:
