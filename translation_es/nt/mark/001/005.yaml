translation:
  language: es
  text: Y de toda la región de Judea y de todos los habitantes de Jerusalén salían hacia él, y eran bautizados por él en el río Jordán, confesando sus pecados.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐξεπορεύετο
  english_pob_choice: were going out
  chosen_spanish: salía
  alternatives_spanish:
  - iban saliendo
  - seguían saliendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o repetida en pasado. En español, «salía» comunica bien ese movimiento recurrente sin sonar pesado, y mantiene el valor durativo del relato.
- source_word: πᾶσα ἡ Ἰουδαία χώρα
  english_pob_choice: all the Judean countryside
  chosen_spanish: toda la región de Judea
  alternatives_spanish:
  - todo el territorio de Judea
  - toda la campiña de Judea
  lexicon: BDAG
  rationale: χώρα puede referirse a región, distrito o campo/campiña. «Región de Judea» conserva el sentido geográfico amplio del texto y evita reducirlo indebidamente a solo zonas rurales.
- source_word: οἱ Ἱεροσολυμῖται πάντες
  english_pob_choice: all the people of Jerusalem
  chosen_spanish: todos los habitantes de Jerusalén
  alternatives_spanish:
  - todos los jerusalemitas
  - toda la gente de Jerusalén
  lexicon: BDAG
  rationale: Ἱεροσολυμῖται designa a los habitantes de Jerusalén. «Habitantes» preserva el sentido colectivo y resulta natural en español; «todos» refleja πάντες sin introducir un matiz meramente retórico distinto del griego.
- source_word: ἐβαπτίζοντο
  english_pob_choice: were being baptized
  chosen_spanish: eran bautizados
  alternatives_spanish:
  - estaban siendo bautizados
  - se bautizaban
  lexicon: BDAG
  rationale: El imperfecto pasivo requiere una forma que conserve la pasividad y la acción en curso. «Eran bautizados» es fluido en español y retiene mejor la fuerza narrativa que un perfecto simple.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Juan
  - de parte de él
  lexicon: BDAG
  rationale: El pronombre remite a Juan Bautista por el contexto inmediato. «Por él» sigue de cerca el griego y evita añadir el nombre donde el texto no lo repite.
- source_word: ἐν τῷ Ἰορδάνῃ ποταμῷ
  english_pob_choice: in the Jordan River
  chosen_spanish: en el río Jordán
  alternatives_spanish:
  - en el Jordán
  - en el río de Jordán
  lexicon: BDAG
  rationale: ποταμός significa «río», por lo que conviene explicitarlo. «Río Jordán» es la ordenación natural en español y preserva el referente geográfico conocido.
- source_word: ἐξομολογούμενοι
  english_pob_choice: confessing
  chosen_spanish: confesando
  alternatives_spanish:
  - reconociendo
  - haciendo confesión
  lexicon: BDAG
  rationale: El participio expresa una acción concomitante con el bautismo. «Confesando» es la equivalencia más directa y mantiene la relación lexical con ἁμαρτίας sin sobreexplicar el gesto.
- source_word: τὰς ἁμαρτίας αὐτῶν
  english_pob_choice: their sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - las pecados de ellos
  - sus transgresiones
  lexicon: BDAG
  rationale: «Pecados» es el equivalente normal de ἁμαρτία en este contexto moral y religioso. El posesivo «sus» reproduce el genitivo pronominal de manera natural en español.
theological_decisions:
- issue: Alcance de «all» respecto de Judea y Jerusalén
  english_pob_reading: Render with 'all' while allowing the idiomatic collective sense rather than mathematical universality
  chosen_spanish_reading: Conservar «toda» y «todos» como generalización narrativa colectiva, no como universalidad matemática
  alternative_spanish_readings:
  - muchos de Judea y Jerusalén
  - gran parte de Judea y Jerusalén
  rationale: El griego usa πᾶσα y πάντες, y la traducción debe conservar esa fuerza retórica. En español, «toda» y «todos» mantienen la amplitud del enunciado sin forzar una lectura de totalidad absoluta ajena al género narrativo.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Lenguaje del bautismo
  english_pob_reading: Retain 'baptized' rather than interpretively rendering mode or theological significance
  chosen_spanish_reading: Mantener «bautizados» sin interpretar el modo ritual
  alternative_spanish_readings:
  - inmersos
  - lavados
  rationale: El versículo describe la acción sin especificar el modo ni cargarla con una interpretación confesional posterior. «Bautizados» respeta el valor léxico reconocido del término en este contexto.
  doctrine_reference: Affirmations paragraph on not advocating denominational distinctives unless the Greek unambiguously supports one reading
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español sigue de cerca el pasaje griego y el juicio auditado en inglés, sin añadir notas textuales porque no se documentó ninguna variante ni tensión léxica que exija anotación adicional.
  spanish_consistency_notes:
  - 'Se mantuvo el orden natural del español sin perder la secuencia de acciones del griego: movimiento hacia Juan, bautismo, confesión.'
  - Se evitó «SEÑOR» u otras sustituciones no presentes; no hay tetragrámaton ni título cristológico en este versículo.
  - «Río Jordán» conserva el topónimo con la precisión geográfica de ποταμός.
  - No se introdujo el nombre de Juan en el texto principal porque el pronombre griego basta en el contexto inmediato.
