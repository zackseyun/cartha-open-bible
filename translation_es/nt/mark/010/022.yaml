translation:
  language: es
  text: Pero él[a], poniéndose sombrío ante estas palabras[b], se fue afligido, porque tenía muchas posesiones[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desalentado» o «abatido»; el griego sugiere un semblante visiblemente ensombrecido.
    reason: lexical_alternative
  - marker: b
    text: O «por estas palabras» o «ante lo dicho».
    reason: lexical_alternative
  - marker: c
    text: O «grandes posesiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: στυγνάσας
  english_pob_choice: becoming gloomy
  chosen_spanish: poniéndose sombrío
  alternatives_spanish:
  - desalentado
  - abatido
  - con el rostro ensombrecido
  lexicon: BDAG
  rationale: El participio aoristo describe una reacción visible y oscurecida ante lo dicho. «Poniéndose sombrío» conserva la imagen de un cambio perceptible en el semblante sin convertirlo en una explicación psicológica más amplia. «Con el rostro ensombrecido» es posible, pero añade una especificación que el griego no exige.
- source_word: ἐπὶ τῷ λόγῳ
  english_pob_choice: at the word
  chosen_spanish: por la palabra
  alternatives_spanish:
  - a la palabra
  - por este dicho
  - ante lo dicho
  lexicon: BDAG
  rationale: La construcción indica causa u ocasión. «Por la palabra» es breve y fiel, y en español comunica naturalmente que su reacción se debió a lo que oyó. Se evita forzar una paráfrasis más extensa que diluya la concisión del griego.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se alejó
  - partió
  - se marchó
  lexicon: BDAG
  rationale: «Se fue» reproduce el movimiento narrativo de manera natural en español moderno. «Partió» es más formal; «se marchó» es aceptable pero algo más marcado estilísticamente.
- source_word: λυπούμενος
  english_pob_choice: grieving
  chosen_spanish: entristecido
  alternatives_spanish:
  - apenado
  - afligido
  - dolido
  lexicon: BDAG
  rationale: El participio presente expresa un estado continuo de tristeza al irse. «Entristecido» mantiene ese matiz sin sobrecargar el verbo con un sustantivo de emoción más intenso. «Apenado» también funciona, pero puede sonar más leve según el registro.
- source_word: ἦν γὰρ ἔχων
  english_pob_choice: for he had
  chosen_spanish: porque tenía
  alternatives_spanish:
  - pues tenía
  - ya que tenía
  - porque poseía
  lexicon: BDAG
  rationale: 'La construcción perifrástica señala una condición continua: su posesión de bienes era una realidad estable. En español, «porque tenía» comunica de forma natural esa situación permanente sin necesidad de calco.'
- source_word: κτήματα πολλά
  english_pob_choice: many possessions
  chosen_spanish: muchas posesiones
  alternatives_spanish:
  - gran cantidad de bienes
  - mucha propiedad
  - grandes posesiones
  lexicon: BDAG
  rationale: «Posesiones» traduce κτήματα como bienes poseídos o propiedades. «Muchas» refleja directamente πολλά. Se evita «grandes posesiones» porque puede sugerir magnitud o estatus más que cantidad, aunque sigue siendo una alternativa viable.
theological_decisions:
- issue: La respuesta emocional del hombre ante la exigencia de Jesús
  english_pob_reading: The translation preserves the text's portrayal of visible gloom and ongoing grief without adding moral commentary.
  chosen_spanish_reading: La traducción conserva el gesto visible de tristeza y la pena continuada sin añadir juicio moral ni identificar una emoción no expresada explícitamente.
  alternative_spanish_readings:
  - se enojó
  - solo se decepcionó
  - se resistió interiormente
  rationale: El griego describe una reacción de abatimiento y tristeza, no nombra ira ni rebelión. La versión española debe mantener esa tensión narrativa sin resolverla ni intensificarla más allá del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Sin cambios aplicados respecto al último pase auditado; la presente redacción mantiene la misma lectura de reacción visible, causa por la palabra y posesiones abundantes, ajustada a un español natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «posesiones» para κτήματα, coherente con el valor de bienes/propiedad del término.
  - Se conserva el contraste entre el estado emocional visible y la posesión material, sin añadir interpretación psicológica.
  - Las notas al pie preservan las alternativas documentadas sin introducir marcadores no anclados en el texto.
