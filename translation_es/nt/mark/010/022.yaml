- from: Pero él[a], poniéndose sombrío por la palabra[b], se fue entristecido, porque tenía muchas posesiones[c].
  to: Pero él[a], poniéndose sombrío ante estas palabras[b], se fue afligido, porque tenía muchas posesiones[c].
  rationale: La revisión conserva la fidelidad al griego y a la auditoría inglesa, pero corrige una literalidad poco natural en español («por la palabra») y mejora la representación del participio presente λυπούμενος. También limpia la nota [b] para que sus alternativas sean idiomáticas y útiles.
