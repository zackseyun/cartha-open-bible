    rationale: ἐπὶ τῷ λόγῳ señala la reacción ante lo dicho. Aunque el sentido causal está presente, en español «por la palabra» suena opaco o forzado. «Ante estas palabras» conserva bien la ocasión/causa sin expandirse indebidamente.
  - severity: medium
    issue: La nota [b] ofrece «a la palabra», alternativa poco idiomática y potencialmente confusa.
