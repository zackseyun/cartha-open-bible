translation:
  language: es
  text: 'Pero Jesús les dijo: «Por la dureza de corazón[a] de ustedes, les escribió este mandamiento[b][c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «endurecimiento del corazón».
    reason: lexical_alternative
  - marker: b
    text: Es decir, Moisés, mencionado en el versículo anterior.
    reason: cross_reference
  - marker: c
    text: O «mandato».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La conjunción adversativa suavizada por el contexto dialogal se expresa naturalmente en español con «Pero», que conserva el contraste con la réplica de Jesús.
- source_word: Πρὸς
  english_pob_choice: Because of
  chosen_spanish: A causa de
  alternatives_spanish:
  - Con referencia a
  - En vista de
  - Por
  lexicon: BDAG
  rationale: Con acusativo, πρός expresa relación causal o motivación. «A causa de» transmite bien esa fuerza causal sin perder claridad en español.
- source_word: σκληροκαρδίαν
  english_pob_choice: hardness of heart
  chosen_spanish: la dureza de su corazón
  alternatives_spanish:
  - la dureza del corazón
  - la dureza de corazón
  - la obstinación de su corazón
  lexicon: BDAG
  rationale: «Dureza de corazón» preserva la metáfora bíblica y la carga moral del término. Se usa el posesivo para mantener la referencia al interlocutor plural del contexto.
- source_word: ἔγραψεν
  english_pob_choice: he wrote
  chosen_spanish: él les escribió
  alternatives_spanish:
  - les escribió
  - Moisés les escribió
  lexicon: BDAG
  rationale: El griego deja el sujeto implícito y el audit trail inglés conserva «he». En español, el pronombre explícito «él» mantiene esa referencia sin introducir el nombre en el texto principal; «les escribió» recoge el dativo destinatario.
- source_word: ἐντολήν
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - orden
  - precepto
  lexicon: BDAG
  rationale: Aunque «commandment» puede traducirse como «mandamiento», aquí suena más natural y sigue siendo suficientemente formal para la instrucción legal a la que se alude.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  lexicon: BDAG
  rationale: El demostrativo simple reproduce la referencia específica al precepto discutido y funciona de manera natural en español.
theological_decisions:
- issue: Sujeto implícito de «escribió» y referencia a Moisés
  english_pob_reading: Retain the implicit subject as 'he,' referring to Moses from the previous verse
  chosen_spanish_reading: Conservar el sujeto implícito en el pronombre «él», remitiendo a Moisés por el contexto inmediato
  alternative_spanish_readings:
  - «Moisés les escribió»
  - omitir el sujeto explícito
  rationale: El griego no repite «Moisés» en este versículo. El español puede mantener la referencia contextual con «él», evitando añadir un nombre que el texto aquí no expresa.
  doctrine_reference: Translation philosophy §1, §5
- issue: Cómo verter σκληροκαρδία sin debilitar su fuerza bíblica
  english_pob_reading: Render as 'hardness of heart'
  chosen_spanish_reading: «dureza de corazón»
  alternative_spanish_readings:
  - «dureza de corazón» con matiz de obstinación
  - «corazón endurecido»
  rationale: La expresión conserva la imagen antropológica y moral del original y evita reducirla a una mera descripción psicológica. El posesivo ayuda a mantener el vínculo con los interlocutores.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas al pie no ancladas en el texto. Esta versión mantiene el contenido fuente sin añadir marcadores de nota.
  spanish_consistency_notes:
  - Se conserva el registro bíblico formal pero idiomático.
  - Se evitó introducir «Moisés» en el texto principal porque el griego lo deja implícito en este versículo.
  - «Mandamiento» se mantiene como término legal-formal coherente con el contexto mosaico.
  - No se emplearon notas al pie para evitar desajustes entre marcadores y anclajes.
