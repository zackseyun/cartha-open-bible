review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite correctamente la estructura y el sentido general del griego: contraste con «Pero», causa con «A causa de», metáfora bíblica de σκληροκαρδία y referencia al mandato mosaico. Sin embargo, no preserva del todo bien dos matices del audit trail: 1) el pronombre explícito «él» en español suena innecesario y algo enfático frente al sujeto implícito del griego; 2) faltan las notas que el inglés conserva para el sujeto implícito («Moisés»), la alternativa léxica de «dureza de corazón / dureza de corazón endurecido / dureza de corazón» y la alternativa de ἐντολή como «mandato/comando».'
  spanish_quality_summary: 'El texto es legible y digno, pero «la dureza de su corazón» suena menos natural y potencialmente ambiguo en español que «la dureza de corazón de ustedes» o simplemente «su dureza de corazón». Además, «él les escribió» es gramatical, pero en español resulta marcado de forma innecesaria. Una redacción más natural y fiel sería: «Pero Jesús les dijo: “Por la dureza de corazón[a] de ustedes, les escribió este mandamiento[b]”.»'
  glossary_alignment: No hay conflictos con los términos doctrinales principales del proyecto. «Jesús» es correcto. «Mandamiento» encaja con ἐντολή. La mejor forma para σκληροκαρδία aquí es «dureza de corazón», preservando la metáfora bíblica; conviene evitar «su corazón» por menor naturalidad. El sujeto de ἔγραψεν debe mantenerse implícito en el texto principal, con nota que aclare que se refiere a Moisés, siguiendo el POB inglés.
  issues:
  - severity: medium
    issue: Pronombre explícito «él»
    rationale: El griego no expresa el sujeto con pronombre; el verbo basta. En español, «él les escribió» añade un énfasis no requerido y suena menos natural que «les escribió».
  - severity: medium
    issue: Faltan notas del audit trail inglés
    rationale: El POB inglés conserva notas para el sujeto implícito (Moisés) y para alternativas léxicas relevantes. Deben preservarse en español, con marcadores anclados en el texto.
  - severity: low
    issue: «la dureza de su corazón» es menos idiomático
    rationale: Aunque comprensible, en español bíblico moderno suena más natural «dureza de corazón» con complemento explícito «de ustedes» para reflejar ὑμῶν sin ambigüedad.
