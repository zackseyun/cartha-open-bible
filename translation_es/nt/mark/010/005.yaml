revisions:
- from: 'Pero Jesús les dijo: «A causa de la dureza de su corazón, él les escribió este mandamiento».'
  to: 'Pero Jesús les dijo: «Por la dureza de corazón[a] de ustedes, les escribió este mandamiento[b][c]».'
  rationale: 'Se ajusta el español para reflejar mejor el sujeto implícito del griego sin añadir énfasis artificial («les escribió» en lugar de «él les escribió»), se mejora la naturalidad de σκληροκαρδία con «dureza de corazón de ustedes», y se restauran las notas significativas presentes en el audit trail inglés: referencia a Moisés y alternativas léxicas para σκληροκαρδία y ἐντολή. También se prefiere «Por» frente a «A causa de» por mayor fluidez, sin pérdida del valor causal.'
