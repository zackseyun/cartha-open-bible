translation:
  language: es
  text: 'Pedro comenzó a decirle: «Mira[a], nosotros hemos dejado todo y te hemos seguido».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Miren» o «He aquí».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: El aoristo de ἄρχω con infinitivo complementario se expresa naturalmente en español con «comenzó»; conserva el valor inceptivo sin sonar forzado.
- source_word: λέγειν
  english_pob_choice: to say
  chosen_spanish: a decirle
  alternatives_spanish:
  - a hablarle
  lexicon: BDAG
  rationale: Con ἤρξατο, el infinitivo se vierte de forma directa como «a decir», que encaja mejor con la cita inmediata; el dativo se mantiene como clítico porque el griego no repite «Jesús».
- source_word: ὁ Πέτρος
  english_pob_choice: Peter
  chosen_spanish: Pedro
  lexicon: convention
  rationale: Nombre propio estándar en español; se conserva la referencia personal sin añadir explicaciones.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre apunta a Jesús por el contexto, pero el griego mantiene el pronombre sin repetir el nombre; el español lo refleja con «le».
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Véase
  - Mira, pues
  lexicon: BDAG
  rationale: «Mira» reproduce el marcador discursivo con naturalidad en español moderno. «Behold» sería demasiado arcaico; «ve» o «mira» comunican la misma llamada de atención.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito conserva el énfasis del griego, que en español se puede mantener sin recargar con una perífrasis.
- source_word: ἀφήκαμεν
  english_pob_choice: have left
  chosen_spanish: hemos dejado
  alternatives_spanish:
  - dejamos
  - hemos abandonado
  - hemos renunciado a
  lexicon: BDAG
  rationale: El perfecto griego se expresa con el presente perfecto español para conservar la acción pasada con relevancia presente. «Dejado» es más neutral que «abandonado» o «renunciado a», que añadirían matices no obligados por el texto.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo lo demás
  - todas las cosas
  - todo cuanto teníamos
  lexicon: BDAG
  rationale: «Todo» es una equivalencia idiomática y completa para el neutro plural intensivo del griego; evita una frase pesada sin perder el alcance comprehensivo.
- source_word: ἠκολουθήκαμέν
  english_pob_choice: followed
  chosen_spanish: te hemos seguido
  alternatives_spanish:
  - te seguimos
  - te habíamos seguido
  lexicon: BDAG
  rationale: El perfecto de ἀκολουθέω expresa una acción con vigencia continua; en español, el presente perfecto («hemos seguido») mantiene bien esa continuidad en una afirmación de discípulos.
- source_word: σοι
  english_pob_choice: you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  lexicon: BDAG
  rationale: El dativo de ἀκολουθέω se vierte naturalmente como objeto pronominal en español. «Te» conserva la relación directa y la cercanía de la forma griega.
theological_decisions:
- issue: Preservar la afirmación de sacrificio/discípulado sin suavizarla ni interpretarla
  english_pob_reading: Translate the statement straightforwardly as Peter's own claim without endorsing or softening it.
  chosen_spanish_reading: Traducir la afirmación de Pedro tal como está, sin añadir glosas como «lo hemos dejado todo por ti» ni anticipar la respuesta de Jesús.
  alternative_spanish_readings:
  - «hemos renunciado a todo»
  - «hemos abandonado todo»
  - parafrasear para enfatizar el costo del discipulado
  rationale: El versículo registra una declaración de Pedro, no una evaluación del narrador. «Hemos dejado todo» conserva la tensión retórica y el alcance de la afirmación sin resolverla interpretativamente.
  doctrine_reference: Conservar la tensión teológica del pasaje; no armonizar prematuramente con la enseñanza posterior.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el aparato auditado en inglés. No se detectan revisiones previas aplicadas; se preservó la estructura narrativa breve, el pronombre explícito de primera persona plural y el valor perfectivo del verbo compuesto en español.
  spanish_consistency_notes:
  - Se usa «Pedro» y no «Pablo» o una forma abreviada, conforme al nombre propio del texto.
  - Se mantiene el pronombre dativo en español con «le»/«te» para respetar la referencia pronominal sin suplir el nombre de Jesús.
  - Se evitó «Cristo», «Señor» o terminología doctrinal ajena al versículo.
  - La nota a pie de página está anclada en «Mira» porque el griego Ἰδοὺ admite varias equivalencias léxicas cercanas.
