translation:
  language: es
  text: Y arrojando a un lado su capa[a], se levantó de un salto y fue a Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su prenda»; también puede entenderse como «su vestidura exterior».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: δέ funciona aquí como un conector narrativo leve. «Y» mantiene la continuidad sin introducir contraste ni énfasis temporal excesivo.
- source_word: ἀποβαλών
  english_pob_choice: throwing off
  chosen_spanish: arrojando
  alternatives_spanish:
  - quitándose
  - echando a un lado
  - despojándose de
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción decidida y rápida de desprenderse de la prenda. «Arrojando» conserva la vivacidad del gesto; «quitándose» sería más neutral y menos abrupto.
- source_word: ἱμάτιον
  english_pob_choice: cloak
  chosen_spanish: capa
  alternatives_spanish:
  - manto
  - vestidura
  - prenda
  lexicon: BDAG
  rationale: ἱμάτιον suele referirse a una prenda exterior. «Capa» es breve, natural en español y comunica bien la idea de una pieza exterior sin sobrecargar el verso.
- source_word: ἀναπηδήσας
  english_pob_choice: sprang up
  chosen_spanish: saltó
  alternatives_spanish:
  - dio un salto
  - se levantó de un salto
  - brincó
  lexicon: BDAG
  rationale: El participio señala un movimiento súbito y enérgico. «Saltó» transmite la rapidez del gesto en español con sobriedad narrativa.
- source_word: ἦλθεν πρὸς τὸν Ἰησοῦν
  english_pob_choice: came to Jesus
  chosen_spanish: fue hacia Jesús
  alternatives_spanish:
  - vino a Jesús
  - se acercó a Jesús
  - llegó a Jesús
  lexicon: BDAG
  rationale: πρός con el verbo de venir indica movimiento dirigido hacia Jesús. «Fue hacia Jesús» preserva la dirección del movimiento y suena natural en español; «vino a Jesús» podría sonar más marcado por el punto de vista del narrador en algunos contextos.
translation_notes:
  revision_awareness: El texto griego y el contexto de auditoría inglesa están en alto acuerdo; no se registran revisiones aplicadas. La versión española sigue de cerca las decisiones léxicas del POB en inglés, ajustándolas a un español natural sin añadir matices no sustentados por el original.
  spanish_consistency_notes:
  - Se mantuvo un estilo narrativo breve y directo, acorde con el movimiento rápido de la escena.
  - Se eligió «Jesús» de forma consistente para Ἰησοῦς.
  - No se introdujeron términos eclesiásticos tradicionales que oscurezcan el gesto concreto del pasaje.
  - La frase verbal conserva la secuencia participial del griego mediante dos acciones coordinadas en español.
