revisions:
- from: Pero no será así entre ustedes[a]. Más bien, el que quiera hacerse grande entre ustedes, será su servidor[b],
  to: Pero no es así entre ustedes[a]. Más bien, el que quiera hacerse grande entre ustedes será su servidor[b],
  rationale: Se corrige «no será así» a «no es así» para alinear el español con el presente ἐστιν del texto griego y con la decisión auditada en inglés. Se mantiene «más bien», «hacerse grande», «entre ustedes» y «será su servidor» por fidelidad al sentido fuente y buena legibilidad en español. También se elimina la coma antes de «será» y se ajusta la nota [a] para que funcione como alternativa real al texto principal.
