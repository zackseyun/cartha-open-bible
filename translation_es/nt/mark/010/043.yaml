translation:
  language: es
  text: Pero no es así entre ustedes[a]. Más bien, el que quiera hacerse grande entre ustedes será su servidor[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero no es de esta manera entre ustedes»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «debe ser su servidor», ya que el futuro también puede tener fuerza exhortativa en este contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐχ οὕτως δέ ἐστιν ἐν ὑμῖν
  english_pob_choice: But it is not so among you
  chosen_spanish: Pero no será así entre ustedes
  alternatives_spanish:
  - Pero no es así entre ustedes
  - Sin embargo, no es así entre ustedes
  - Pero no será de esa manera entre ustedes
  lexicon: BDAG
  rationale: 'La construcción negativa de modo con contraste se vierte de forma natural en español como una negación del estado/patrón esperado: «no será así». «Entre ustedes» reproduce el sentido comunitario de ἐν ὑμῖν sin volverlo demasiado literal ni perder el matiz relacional.'
- source_word: ἀλλ’
  english_pob_choice: Instead
  chosen_spanish: Más bien
  alternatives_spanish:
  - Pero
  - En cambio
  - Antes bien
  lexicon: BDAG
  rationale: El griego introduce una corrección fuerte del patrón anterior. «Más bien» comunica el contraste normativo en español actual con claridad y sin excesiva rigidez.
- source_word: ὃς ἂν θέλῃ
  english_pob_choice: whoever wants
  chosen_spanish: el que quiera
  alternatives_spanish:
  - quien quiera
  - quien desee
  - el que quiera
  lexicon: BDAG
  rationale: La cláusula indefinida con subjuntivo expresa generalidad y voluntad. «El que quiera» preserva el valor volitivo de θέλῃ y suena natural en español bíblico contemporáneo.
- source_word: μέγας γενέσθαι
  english_pob_choice: to become great
  chosen_spanish: hacerse grande
  alternatives_spanish:
  - llegar a ser grande
  - volverse grande
  - hacerse importante
  lexicon: BDAG
  rationale: γενέσθαι es ingresivo, así que conviene expresar proceso/cambio, no solo estado. «Hacerse grande» conserva la literalidad funcional del giro y mantiene la categoría de μέγας sin desplazarla hacia fama o importancia moderna.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  - en ustedes
  lexicon: BDAG
  rationale: La referencia es social y comunitaria. «Entre ustedes» expresa bien el ámbito relacional del grupo, con registro natural para español latinoamericano.
- source_word: ἔσται ὑμῶν διάκονος
  english_pob_choice: will be your servant
  chosen_spanish: será su servidor
  alternatives_spanish:
  - será su siervo
  - será su servidor
  - deberá ser su servidor
  lexicon: BDAG
  rationale: διάκονος aquí apunta a servicio humilde, no a un oficio eclesiástico; «servidor» transmite el matiz de asistencia/servicio y evita la posible carga confesional de «ministro». Se conserva el futuro como en el griego («será»), manteniendo la forma verbal sin convertirla explícitamente en imperativo.
theological_decisions:
- issue: Fuerza exhortativa del futuro ἔσται
  english_pob_reading: Rendered as 'will be your servant' rather than an explicit imperative such as 'must be your servant'
  chosen_spanish_reading: «será su servidor» mantiene el futuro y deja implícita la fuerza normativa del dicho
  alternative_spanish_readings:
  - debe ser su servidor
  - tendrá que ser su servidor
  - será su servidor
  rationale: El futuro griego funciona con fuerza instructiva en este contexto, pero no exige convertirlo en un mandato explícito en español. Mantener el futuro respeta la forma del texto y preserva el tono sapiencial/aforístico de la enseñanza de Jesús.
  doctrine_reference: Principio de equivalencia óptima; preservar el valor verbal del texto fuente sin sobrerinterpretar la sintaxis.
- issue: Elección de διάκονος
  english_pob_reading: servant rather than minister
  chosen_spanish_reading: servidor
  alternative_spanish_readings:
  - siervo
  - ministro
  - ayudante
  rationale: El contexto trata de la grandeza en términos de servicio mutuo, no de una función eclesiástica posterior. «Servidor» expresa la idea de servicio personal y subordinado sin introducir una terminología institucional ajena al pasaje.
  doctrine_reference: 'Sensibilidad terminológica POB: evitar importar oficios eclesiásticos donde el griego describe relación de servicio.'
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión inglesa de mantener el futuro de ἔσται y la lectura relacional de ἐν ὑμῖν. Se evita una traducción mecánica y se privilegia una formulación española natural que conserve el contraste y la ética de servicio del pasaje. No se reportan revisiones aplicadas en el audit trail inglés, y el estado de concordancia es alto.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para un registro latinoamericano neutral y consistente.
  - Se traduce διάκονος como «servidor» para conservar el campo semántico de servicio sin cargar el texto con una connotación ministerial posterior.
  - Se conserva el paralelismo entre las dos ocurrencias de ἐν ὑμῖν mediante «entre ustedes» y se evita variar innecesariamente la preposición.
  - 'La puntuación refleja la oposición fuerte entre negación y corrección: punto y coma implícito por la pausa antes de «Más bien».'
