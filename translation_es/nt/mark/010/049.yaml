translation:
  language: es
  text: 'Y Jesús se detuvo[a] y dijo: «Llámenlo». Y llamaron al ciego, diciéndole: «Ánimo; levántate, te llama».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «habiéndose detenido»; idiomáticamente, «se detuvo» o «se quedó quieto».
    reason: lexical_alternative
lexical_decisions:
- source_word: στὰς
  english_pob_choice: stopped
  chosen_spanish: se detuvo
  alternatives_spanish:
  - se paró
  - habiéndose detenido
  lexicon: BDAG
  rationale: El participio aoristo de ἵστημι en este contexto narrativo comunica que Jesús interrumpió su avance. «Se detuvo» expresa la acción de forma natural en español y conserva el valor idiomático sin volverlo literal en exceso.
- source_word: Φωνήσατε αὐτόν
  english_pob_choice: Call him
  chosen_spanish: Llámenlo
  alternatives_spanish:
  - Llámelo
  - Háganlo venir
  lexicon: BDAG
  rationale: φωνέω aquí tiene el sentido de llamar o convocar a alguien. «Llámenlo» mantiene el mandato directo y corresponde al tono plural del griego.
- source_word: φωνοῦσι
  english_pob_choice: they called
  chosen_spanish: llamaron
  alternatives_spanish:
  - convocaron
  - lo llamaron
  lexicon: BDAG
  rationale: Se conserva la misma raíz léxica que en la orden de Jesús para reflejar la repetición del verbo y la continuidad narrativa. «Llamaron» es natural y fiel al movimiento del pasaje.
- source_word: τὸν τυφλὸν
  english_pob_choice: the blind man
  chosen_spanish: al ciego
  alternatives_spanish:
  - al hombre ciego
  - al ciego aquel
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. En español, «el ciego» es claro y directo; el acusativo con preposición en la narración se expresa naturalmente como «al ciego».
- source_word: Θάρσει
  english_pob_choice: Take courage
  chosen_spanish: Ten ánimo
  alternatives_spanish:
  - Ten valor
  - Ánimo
  lexicon: BDAG
  rationale: El imperativo expresa ánimo y consuelo. «Ten ánimo» conserva el registro exhortativo y es muy idiomático en español bíblico sin sonar anticuado.
- source_word: ἔγειρε
  english_pob_choice: get up
  chosen_spanish: levántate
  alternatives_spanish:
  - ponte de pie
  - sube
  lexicon: BDAG
  rationale: El imperativo pide incorporarse o ponerse en pie. «Levántate» es la equivalencia española más natural y mantiene la inmediatez de la orden.
- source_word: φωνεῖ σε
  english_pob_choice: he is calling you
  chosen_spanish: te llama
  alternatives_spanish:
  - te está llamando
  - te está convocando
  lexicon: BDAG
  rationale: El presente puede ser progresivo en inglés, pero en español «te llama» comunica con naturalidad la acción inmediata y mantiene la referencia al mismo verbo φωνέω.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el POB inglés: se mantiene la repetición de φωνέω con «llamar», se conserva el carácter imperativo de la exhortación y se evita suavizar la orden de ἔγειρε. La cadencia española busca ser publicable y natural sin perder la fuerza narrativa.'
  spanish_consistency_notes:
  - Se preserva la misma raíz léxica para φωνέω en «Llámenlo», «llamaron» y «te llama».
  - «Ten ánimo» mantiene la opción de aliento/valor reflejada en el inglés «Take courage».
  - «Se detuvo» traduce el participio de manera idiomática, como en la nota inglesa sobre el sentido de 'having stood' → 'stopped'.
  - Se usa «al ciego» como sustantivación natural de τυφλός en este contexto narrativo.
