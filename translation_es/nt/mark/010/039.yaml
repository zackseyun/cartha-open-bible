translation:
  language: es
  text: 'Y ellos le dijeron: «Podemos[a]». Pero Jesús les dijo: «La copa que yo bebo, ustedes la beberán; y el bautismo con el que soy bautizado[b], ustedes serán bautizados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Somos capaces».
    reason: lexical_alternative
  - marker: b
    text: «Copa» y «bautismo» son metáforas del sufrimiento y del destino que Jesús está a punto de atravesar, y que sus discípulos también compartirán.
    reason: cross_reference
lexical_decisions:
- source_word: Δυνάμεθα
  english_pob_choice: We are able
  chosen_spanish: Podemos
  alternatives_spanish:
  - Somos capaces
  - Podemos hacerlo
  lexicon: BDAG
  rationale: El griego expresa capacidad presente; en español, «Podemos» reproduce con naturalidad esa afirmación breve y solemne. «Somos capaces» sería más explícito, pero menos idiomático en este contexto.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  - vaso
  lexicon: BDAG
  rationale: Se conserva la imagen metafórica del recipiente. «Copa» es el equivalente más natural y público en español, sin interpretar de antemano la metáfora de sufrimiento.
- source_word: πίνω / πίεσθε
  english_pob_choice: I drink / you will drink
  chosen_spanish: yo bebo / ustedes la beberán
  alternatives_spanish:
  - yo estoy bebiendo / ustedes beberán
  - yo tomo / ustedes tomarán
  lexicon: BDAG
  rationale: Se mantiene el paralelo verbal entre lo que Jesús bebe y lo que sus discípulos beberán. El futuro en español preserva la fuerza prospectiva del griego; el pronombre objeto «la» retoma «la copa» con claridad.
- source_word: βάπτισμα
  english_pob_choice: baptism
  chosen_spanish: bautismo
  alternatives_spanish:
  - inmersión
  - bautizo
  lexicon: BDAG
  rationale: «Bautismo» es el término estándar y conserva la repetición léxica con el verbo asociado. Aunque la metáfora apunta a una experiencia de sufrimiento, no conviene sustituir el sustantivo por una interpretación en el texto principal.
- source_word: βαπτίζομαι / βαπτισθήσεσθε
  english_pob_choice: I am baptized / you will be baptized
  chosen_spanish: soy bautizado / serán bautizados
  alternatives_spanish:
  - estoy siendo bautizado / serán bautizados
  - recibo bautismo / recibirán bautismo
  lexicon: BDAG
  rationale: El pasivo griego se refleja directamente con «soy bautizado» y «serán bautizados», manteniendo la relación verbal con «bautismo». Esta elección preserva la forma verbal sin convertirla en paráfrasis interpretativa.
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  english_pob_choice: But Jesus said to them
  chosen_spanish: Y Jesús les dijo
  alternatives_spanish:
  - Pero Jesús les dijo
  - Entonces Jesús les dijo
  lexicon: BDAG
  rationale: El valor contrastivo de δέ puede expresarse en español con «Y» o «Pero» según el flujo. Aquí «Y» conserva la continuidad narrativa inmediata, mientras el contraste ya queda implícito por el contenido de la respuesta.
- source_word: τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι
  english_pob_choice: the baptism with which I am baptized
  chosen_spanish: el bautismo con que yo soy bautizado
  alternatives_spanish:
  - el bautismo con el cual yo soy bautizado
  - el bautismo que yo recibo
  lexicon: BDAG
  rationale: «Con que» expresa de forma natural la relación instrumental del griego y conserva la repetición de «bautismo» y «bautizado». Se evita explicitar la metáfora en el cuerpo del verso.
theological_decisions:
- issue: Metáfora de la copa y del bautismo como sufrimiento y destino compartidos
  english_pob_reading: Preserve both metaphors in the main text as references to the suffering and destiny Jesus will share with his disciples, without making the interpretation explicit in translation.
  chosen_spanish_reading: 'Conservar ambas metáforas en el texto principal: la «copa» y el «bautismo» indican, por el contexto, la experiencia de sufrimiento y destino que Jesús y sus discípulos compartirán, sin explicitar esa interpretación dentro del versículo.'
  alternative_spanish_readings:
  - Reemplazar la metáfora por «sufrimiento» o «prueba» en el texto principal
  - Explicar la metáfora directamente como «muerte» o «martirio»
  rationale: El texto griego presenta imágenes tradicionales de fuerte peso bíblico. La traducción debe preservar esa imaginería y dejar que el contexto teológico la aclare, en vez de convertirla en paráfrasis interpretativa.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación de βάπτισμα con el bautismo sacramental
  english_pob_reading: Translate βάπτισμα as “baptism” while allowing the context to indicate metaphorical suffering rather than explicitly sacramental baptism.
  chosen_spanish_reading: Traducir βάπτισμα como «bautismo», dejando que el contexto muestre que aquí funciona metafóricamente y no como una referencia directa al rito sacramental.
  alternative_spanish_readings:
  - «ordeal» / «prueba»
  - «inmersión»
  - «bautizo»
  rationale: El término griego es βάπτισμα, y la equivalencia más fiel en español es «bautismo». El contexto inmediato orienta al lector hacia el sentido metafórico; sustituirlo por una interpretación perdería la repetición léxica del pasaje.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje se mantiene en acuerdo alto con el control cruzado, con solo ajustes menores de estilo en la salida española para una lectura pública natural.
  spanish_consistency_notes:
  - Se mantuvo «bautismo» en todo el pasaje para conservar la repetición léxica de βάπτισμα/βαπτίζομαι.
  - Se optó por «copa» como equivalente natural de ποτήριον en español bíblico contemporáneo.
  - Se reflejó el pasivo del griego con «soy bautizado» y «serán bautizados», sin sustituirlo por una interpretación activa.
  - Se evitó el calco rígido de «con el cual» porque «con que» resulta más natural y fiel en español.
  - Se preservó la brevísima respuesta de los discípulos con «Podemos», que comunica capacidad presente de forma directa.
