    reason: lexical_alternative
  - marker: b
    text: «Copa» y «bautismo» son metáforas del sufrimiento y del destino que Jesús está a punto de atravesar, y que sus discípulos también compartirán.
    reason: cross_reference
  revision_rationale: 'La revisión alinea el español con el griego y con el audit trail inglés: se conserva «Podemos» como texto principal, pero se añade la alternativa léxica documentada; se cambia «Y Jesús» por «Pero Jesús» para reflejar mejor δέ; se simplifican las notas para que coincidan con las del POB auditado; y se mejora ligeramente la naturalidad de «con el que soy bautizado» sin perder la repetición metafórica de «bautismo/bautizado».'
