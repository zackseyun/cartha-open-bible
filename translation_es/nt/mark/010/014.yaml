translation:
  language: es
  text: 'Pero cuando Jesús lo vio, se indignó y les dijo: «Dejen que los niños vengan a mí; no se lo impidan, porque el reino de Dios pertenece a los que son como estos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «porque de tales es el reino de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: when Jesus saw it
  chosen_spanish: cuando Jesús lo vio
  alternatives_spanish:
  - al ver Jesús esto
  - cuando lo vio Jesús
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia de la reacción de Jesús. En español, “cuando Jesús lo vio” expresa con naturalidad el objeto implícito del contexto sin forzar una glosa excesiva.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: El valor adversativo suave se conserva mejor con “Pero”, en continuidad con el contraste respecto de la reprensión anterior.
- source_word: ἠγανάκτησεν
  english_pob_choice: was indignant
  chosen_spanish: se indignó
  alternatives_spanish:
  - estaba indignado
  - se molestó
  lexicon: BDAG
  rationale: “Se indignó” preserva la fuerza moral de la reacción sin rebajarla a simple enojo ni intensificarla indebidamente.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les respondió
  lexicon: BDAG
  rationale: Fórmula normal de habla; “les dijo” es fiel y natural en español.
- source_word: Ἄφετε
  english_pob_choice: Let
  chosen_spanish: Dejen que
  alternatives_spanish:
  - Permitan que
  - Déjenlos
  lexicon: BDAG
  rationale: El imperativo de ἀφίημι aquí significa permitir. “Dejen que” reproduce bien el mandato en español idiomático.
- source_word: τὰ παιδία
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los pequeños
  - los niños pequeños
  lexicon: BDAG
  rationale: παιδία designa niños; “los niños” evita añadir un matiz diminutivo que el sustantivo por sí solo no exige.
- source_word: ἔρχεσθαι πρός με
  english_pob_choice: come to me
  chosen_spanish: vengan a mí
  alternatives_spanish:
  - vengan hacia mí
  - se acerquen a mí
  lexicon: BDAG
  rationale: Aunque el griego usa infinitivo de movimiento hacia Jesús, el español exige una forma personal en el mandato indirecto; “vengan a mí” comunica la dirección con naturalidad.
- source_word: μὴ κωλύετε αὐτά
  english_pob_choice: do not hinder them
  chosen_spanish: no se lo impidan
  alternatives_spanish:
  - no los detengan
  - no los estorben
  lexicon: BDAG
  rationale: κωλύω implica impedir u obstaculizar el acceso. “No se lo impidan” mantiene la idea de bloqueo respecto de venir a Jesús, con referencia pronominal fluida en español.
- source_word: τῶν γὰρ τοιούτων
  english_pob_choice: for ... belongs to such as these
  chosen_spanish: porque de los que son como estos
  alternatives_spanish:
  - porque de tales es
  - porque de personas como estas
  lexicon: BDAG
  rationale: τοιοῦτος señala personas de esta clase, no solo a los niños literales presentes. “De los que son como estos” conserva esa fuerza representativa sin resolver la tensión teológica.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios y su gobierno
  - el reinado de Dios
  lexicon: BDAG
  rationale: “Reino de Dios” es la equivalencia estable y transparente para βασιλεία τοῦ θεοῦ en español bíblico contemporáneo.
theological_decisions:
- issue: Sentido de τῶν γὰρ τοιούτων ἐστὶν ἡ βασιλεία τοῦ θεοῦ
  english_pob_reading: The statement refers representatively to people like these children, not exclusively to the specific children present.
  chosen_spanish_reading: 'La frase se entiende de manera representativa: habla de personas como estos niños, no solo de los niños presentes.'
  alternative_spanish_readings:
  - El reino de Dios pertenece solo a los niños literales
  - 'Conservar una forma más literal: de tales es el reino de Dios'
  rationale: τοιούτων apunta a una categoría de personas semejantes. La traducción evita ampliar indebidamente a una doctrina sobre inocencia o salvación automática de los niños, pero también evita restringir la afirmación a los presentes inmediatos.
  doctrine_reference: Preservar la tensión teológica sin imponer conclusiones doctrinales ajenas al texto.
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial reciente; esta redacción corrige el problema de validación anterior incluyendo el marcador [a] exactamente en el texto de traducción.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «reino de Dios» para βασιλεία τοῦ θεοῦ.
  - Se usa «se indignó» para ἠγανάκτησεν, conservando la intensidad moral sin exageración.
  - 'Se traduce el imperativo plural con forma natural de tratamiento directo en español: «Dejen que».'
  - La nota [a] está anclada en el texto en el punto correspondiente y ofrece la alternativa más literal sin reemplazar la lectura principal.
