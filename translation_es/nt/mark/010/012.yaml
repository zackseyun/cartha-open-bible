    issue: La nota al pie traduce mal la alternativa literal de ἀπολύσασα.
    rationale: La nota actual dice 'la envía lejos de su esposo', pero el griego se refiere a que ella 'envía lejos a su esposo' o 'despide a su esposo'. La formulación actual invierte la relación y produce un sentido incorrecto y poco natural.
  revised_spanish_text: y si ella[a] divorcia a su esposo y se casa con otro hombre, comete adulterio.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, 'despide a su esposo' o 'envía lejos a su esposo'. En este contexto matrimonial, el sentido es 'divorcia'.
    reason: lexical_alternative
  revision_rationale: El texto principal puede conservarse. Solo hace falta corregir la nota para que refleje con precisión la alternativa más literal de ἀπολύω sin invertir el sentido ni introducir una construcción española anómala.
