  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: condición introducida por ἐὰν, sujeto femenino explícito, objeto masculino explícito, y μοιχᾶται como ''comete adulterio''. También mantiene correctamente el valor matrimonial de ἀπολύσασα como ''divorcia''. Sin embargo, la nota léxica alternativa no preserva fielmente el sentido literal documentado en el rastro inglés.'
  spanish_quality_summary: El texto principal es natural, claro y digno en español. 'y si ella divorcia a su esposo y se casa con otro hombre, comete adulterio' es legible y fiel. El único problema relevante está en la redacción de la nota, que es gramaticalmente incorrecta y semánticamente desviada en español.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'esposo', 'otro hombre' y 'comete adulterio' son adecuados. La elección 'divorcia' sigue correctamente la decisión léxica auditada para ἀπολύω en contexto matrimonial.
  issues:
