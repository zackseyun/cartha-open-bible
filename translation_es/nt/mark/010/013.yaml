translation:
  language: es
  text: Y le estaban llevando niños para que los tocara[a], pero los discípulos reprendieron a quienes los llevaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «niños pequeños». El griego παιδία puede referirse a niños en sentido amplio, incluidos los muy pequeños.'
    reason: lexical_alternative
lexical_decisions:
- source_word: προσέφερον
  english_pob_choice: were bringing
  chosen_spanish: le estaban llevando
  alternatives_spanish:
  - le llevaban
  - le estaban presentando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o reiterada; «le estaban llevando» conserva bien ese matiz. «Presentando» sería posible, pero en español suena más formal y puede debilitar la escena narrativa inmediata.
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niños pequeños
  - niñitos
  - críos
  lexicon: BDAG
  rationale: El término griego abarca niños de manera general. En español, «niños» es natural, amplio y fiel sin forzar el diminutivo. «Niños pequeños» sería una explicitación posible, pero no necesaria en el texto principal.
- source_word: ἵνα αὐτῶν ἅψηται
  english_pob_choice: so that he might touch them
  chosen_spanish: para que los tocara
  alternatives_spanish:
  - para que los tocara con la mano
  - para que les impusiera las manos
  - a fin de que los tocara
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito; «para que» lo comunica con naturalidad en español. ἅπτω aquí significa «tocar». No se introduce «imponer las manos» porque el griego de este versículo solo dice «tocar».
- source_word: ἐπετίμησαν
  english_pob_choice: rebuked
  chosen_spanish: reprendieron
  alternatives_spanish:
  - reprendieron severamente
  - los increparon
  - los reprendieron
  lexicon: BDAG
  rationale: «Reprendieron» transmite bien la fuerza de ἐπιτιμάω en español bíblico actual, sin sonar demasiado coloquial. «Reprendieron severamente» intensifica más de lo que el griego exige.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - a los que los llevaban
  lexicon: BDAG
  rationale: El pronombre se refiere naturalmente a los que llevaban a los niños, no a los niños mismos. En español, «los reprendieron» permite mantener la referencia implícita sin sobrecargar la frase.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: «Pero» expresa el contraste narrativo entre la acción de quienes llevaban a los niños y la reacción de los discípulos.
theological_decisions:
- issue: Referente de la reprensión de los discípulos
  english_pob_reading: The disciples rebuked the people who were bringing the children.
  chosen_spanish_reading: Los discípulos reprendieron a los que llevaban a los niños.
  alternative_spanish_readings:
  - Los discípulos reprendieron a los niños.
  rationale: El antecedente más cercano y coherente de αὐτοῖς es el sujeto implícito de προσέφερον, es decir, quienes traían a los niños. La siguiente escena confirma que el obstáculo de los discípulos recaía sobre esas personas.
  doctrine_reference: Narrative coherence and pronoun antecedent resolution in the Gospel text
translation_notes:
  revision_awareness: 'Se mantuvo la lectura del audit trail inglés sin cambios sustanciales: imperfecto continuo en «le estaban llevando», valor amplio de παιδία, propósito con ἵνα y referente de αὐτοῖς como quienes llevaban a los niños.'
  spanish_consistency_notes:
  - Se evita «SEÑOR»; aquí no hay reemplazo por nomenclatura divina.
  - Se conserva un español natural y bíblico, sin introducir «imposición de manos», porque el verbo fuente solo dice «tocar».
  - «Niños» se eligió como término amplio y publicable; la alternativa «niños pequeños» queda documentada en nota.
