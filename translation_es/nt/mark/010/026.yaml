translation:
  language: es
  text: 'Y estaban sumamente asombrados, diciendo entre sí[a]: «Entonces, ¿quién puede ser salvo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unos a otros» o, más literalmente, «a sí mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: And they
  chosen_spanish: Y ellos
  alternatives_spanish:
  - Pero ellos
  - Y ellos
  lexicon: BDAG
  rationale: El artículo con δέ retoma a los discípulos en el contexto inmediato. En español, «Y ellos» conserva la continuidad discursiva sin introducir una oposición que el griego aquí no exige de manera fuerte.
- source_word: περισσῶς
  english_pob_choice: exceedingly
  chosen_spanish: sumamente
  alternatives_spanish:
  - en gran manera
  - excesivamente
  - sumamente
  lexicon: BDAG
  rationale: El adverbio intensifica la reacción. «Sumamente» comunica el grado elevado de forma natural y digna en español, sin perder fuerza.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were ... astonished
  chosen_spanish: estaban asombrados
  alternatives_spanish:
  - estaban asombrados
  - quedaban asombrados
  - estaban maravillados
  lexicon: BDAG
  rationale: El imperfecto medio/pasivo expresa un estado o proceso continuo. «Estaban asombrados» refleja bien esa duración y mantiene el valor afectivo fuerte del verbo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - diciendo
  - y diciendo
  lexicon: BDAG
  rationale: El participio contemporáneo se vierte naturalmente con una construcción participial en español, enlazando el asombro con la խոսa expresada.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: to one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - entre sí
  - unos a otros
  - consigo mismos
  lexicon: BDAG
  rationale: Aunque literalmente es «a sí mismos», en este contexto plural el sentido idiomático es recíproco. «Entre sí» reproduce esa relación conversacional de modo idiomático en español.
- source_word: Καὶ
  english_pob_choice: Then
  chosen_spanish: Y
  alternatives_spanish:
  - Y
  - Entonces
  - Así
  lexicon: BDAG
  rationale: Aquí καί introduce directamente la pregunta dentro del discurso. En español, un simple «Y» mantiene la continuidad sin imponer un valor inferencial más fuerte del que el griego garantiza.
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: quién
  alternatives_spanish:
  - quién
  - qué persona
  lexicon: BDAG
  rationale: La pregunta busca una persona posible. «Quién» es la forma natural y precisa en español.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - puede
  - es capaz de
  lexicon: BDAG
  rationale: El verbo expresa capacidad o posibilidad. «Puede» es la equivalencia más natural y directa en español.
- source_word: σωθῆναι
  english_pob_choice: be saved
  chosen_spanish: ser salvo
  alternatives_spanish:
  - ser salvo
  - ser rescatado
  - ser librado
  lexicon: BDAG
  rationale: En este contexto de salvación, conviene conservar el lenguaje teológico de salvación. «Ser salvo» mantiene la fuerza doctrinal del pasivo de σῴζω sin reducirlo a rescate temporal.
theological_decisions:
- issue: Lenguaje de salvación en el contexto del Reino
  english_pob_reading: '''be saved'' retains the broader theological sense of entering God''s saving deliverance, not merely temporal rescue.'
  chosen_spanish_reading: «ser salvo» conserva el sentido amplio de la salvación de Dios, no solo un rescate circunstancial.
  alternative_spanish_readings:
  - ser rescatado
  - ser librado
  rationale: El contexto de la enseñanza sobre el reino de Dios exige mantener el peso soteriológico de σωθῆναι. «Ser salvo» evita minimizar el alcance teológico del dicho.
  doctrine_reference: 'Soteriology; translation philosophy: preserve theological weight without flattening.'
translation_notes:
  revision_awareness: Revisión alineada con el texto griego SBLGNT y con el audit trail inglés. Se preserva el matiz recíproco de πρὸς ἑαυτούς, y se mantiene el lenguaje de salvación de σωθῆναι sin atenuarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «ser salvo» conserva la terminología soteriológica preferida por el POB cuando el contexto lo exige.
  - La nota al pie marca la ambigüedad legítima de πρὸς ἑαυτούς sin introducir una paráfrasis extensa en el texto principal.
