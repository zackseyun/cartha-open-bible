translation:
  language: es
  text: Más fácil es que un camello[a] pase por el ojo de una aguja[b], que un rico[c] entre en el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos han propuesto «cuerda» en vez de «camello», pero aquí el texto griego lee «camello».
    reason: alternative_reading
  - marker: b
    text: 'O, más literalmente: «por el ojo de una aguja».'
    reason: lexical_alternative
  - marker: c
    text: «Rico» sigue la forma masculina singular del griego; el dicho tiene fuerza representativa.
    reason: cultural_note
lexical_decisions:
- source_word: εὐκοπώτερόν
  english_pob_choice: easier
  chosen_spanish: más fácil
  alternatives_spanish:
  - más posible
  - menos difícil
  lexicon: BDAG
  rationale: El comparativo expresa mayor facilidad o menor dificultad. «Más fácil» es natural en español y conserva el valor comparativo sin diluir la hipérbole.
- source_word: κάμηλον
  english_pob_choice: camel
  chosen_spanish: camello
  alternatives_spanish:
  - cable
  - soga
  lexicon: BDAG
  rationale: El texto griego lee κάμηλος, es decir, «camello». Mantenerlo preserva la imagen extrema del dicho y evita introducir una lectura ajena al testimonio textual.
- source_word: διὰ τῆς τρυμαλιᾶς τῆς ῥαφίδος
  english_pob_choice: through the eye of a needle
  chosen_spanish: por el ojo de una aguja
  alternatives_spanish:
  - a través del ojo de una aguja
  - por el ojo de una aguja de coser
  lexicon: BDAG
  rationale: La construcción griega alude literalmente a la abertura de una aguja de coser. «Por el ojo de una aguja» es claro, idiomático y fiel a la imagen.
- source_word: διελθεῖν
  english_pob_choice: to go through
  chosen_spanish: pase
  alternatives_spanish:
  - atravesar
  - pasar
  lexicon: BDAG
  rationale: El infinitivo de διέρχομαι expresa el acto de atravesar o pasar a través. «Pase» encaja con el subjuntivo de la comparación y suena natural en español.
- source_word: πλούσιον
  english_pob_choice: a rich man
  chosen_spanish: un rico
  alternatives_spanish:
  - un hombre rico
  - una persona rica
  lexicon: BDAG
  rationale: El griego es masculino singular y funciona sustantivado. «Un rico» conserva esa forma y la fuerza representativa del dicho; la nota explica que no limita el alcance a un individuo aislado.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: enter the kingdom of God
  chosen_spanish: entre en el reino de Dios
  alternatives_spanish:
  - entre en el reino de Dios mismo
  - entre al reino de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia estable de βασιλεία τοῦ θεοῦ. «Entre en» reproduce bien la entrada en ese ámbito real sin añadir explicaciones.
- source_word: εἰσελθεῖν
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ir dentro de
  - ingresar
  lexicon: BDAG
  rationale: El infinitivo aoristo de εἰσέρχομαι se traduce de manera directa como «entrar», que es conciso y plenamente idiomático.
theological_decisions:
- issue: Imagen del camello y la aguja
  english_pob_reading: Retain the literal hyperbolic image of a camel and a needle rather than interpreting it as a reference to a small gate or softening it into a mere proverb about difficulty.
  chosen_spanish_reading: Conservar la imagen literal e hiperbólica de un camello y el ojo de una aguja, sin reducirla a una dificultad genérica ni a una supuesta puerta estrecha.
  alternative_spanish_readings:
  - una puerta llamada 'Aguja'
  - un pasaje difícil para un camello
  rationale: El griego presenta una imagen de imposibilidad extrema. La traducción debe retener esa tensión, no resolverla mediante tradiciones explicativas posteriores que no están en el texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se requirieron cambios en la revisión más reciente; el texto mantiene el acuerdo alto del control cruzado y conserva la imagen literal de κάμηλος y τρυμαλιά.
  spanish_consistency_notes:
  - Se mantuvo «reino de Dios» para βασιλεία τοῦ θεοῦ, conforme al uso POB establecido.
  - Se eligió «camello» para κάμηλος y se evitó cualquier armonización con lecturas alternativas no atestiguadas en este texto.
  - «Un rico» conserva el singular masculino del griego y se aclara en nota su fuerza representativa.
  - La comparación se vertió con «Más fácil es que...», que suena natural en español y reproduce el valor comparativo del original.
