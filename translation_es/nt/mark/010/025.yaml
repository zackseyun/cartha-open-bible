    text: Or, more literally, 'through a needle's eye.'
    reason: lexical_alternative
  - marker: b
    text: Some have proposed 'rope' instead of 'camel,' but the Greek text here reads 'camel.'
    reason: alternative_reading
  - marker: c
    text: '''Rich man'' reflects the masculine singular form in Greek; the saying has representative force.'
    reason: cultural_note
