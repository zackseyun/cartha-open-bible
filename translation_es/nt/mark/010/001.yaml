    changes_summary: Changed 'after rising' to 'rising' for closer correspondence to the participle, and 'as he was accustomed' to 'as was his custom' for more natural formal English.
translation:
  language: es
  text: Y desde allí, al levantarse, viene a la región de Judea y más allá del Jordán[a], y otra vez multitudes acuden a él, y, como era su costumbre, de nuevo les enseñaba[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al otro lado del Jordán». El griego puede referirse a la región del lado opuesto del río Jordán.
    reason: lexical_alternative
  - marker: b
    text: La expresión también puede entenderse como «la región de Judea más allá del Jordán».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: desde allí
  alternatives_spanish:
  - de allí
  - desde ese lugar
  lexicon: BDAG
  rationale: Adverbio espacial de procedencia. «Desde allí» es natural en español y conserva con claridad el punto de partida narrativo.
- source_word: ἀναστὰς
  english_pob_choice: rising
  chosen_spanish: levantándose
  alternatives_spanish:
  - alzándose
  - habiéndose levantado
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y aquí expresa la acción previa de ponerse en marcha. «Levantándose» comunica el movimiento previo sin forzar una formulación más pesada.
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: va
  alternatives_spanish:
  - viene
  - llega
  lexicon: BDAG
  rationale: En español, el presente histórico literal «viene» puede sonar menos natural en esta secuencia de desplazamiento. «Va» transmite adecuadamente el movimiento hacia el destino sin perder el valor narrativo del presente griego.
- source_word: τὰ ὅρια τῆς Ἰουδαίας
  english_pob_choice: the region of Judea
  chosen_spanish: la región de Judea
  alternatives_spanish:
  - los límites de Judea
  - el territorio de Judea
  lexicon: BDAG
  rationale: Ὅρια puede significar bordes, límites o región/territorio. En este contexto de viaje, «la región de Judea» comunica el sentido geográfico amplio que reflejó la versión inglesa auditada.
- source_word: καὶ πέραν τοῦ Ἰορδάνου
  english_pob_choice: and beyond the Jordan
  chosen_spanish: y al otro lado del Jordán
  alternatives_spanish:
  - y más allá del Jordán
  - y al otro lado del río Jordán
  lexicon: BDAG
  rationale: πέραν con genitivo señala el lado opuesto del Jordán. «Al otro lado del Jordán» conserva esa orientación espacial de manera clara y idiomática en español.
- source_word: συμπορεύονται
  english_pob_choice: gather
  chosen_spanish: se le reúnen
  alternatives_spanish:
  - van con él
  - convergen hacia él
  - se juntan con él
  lexicon: BDAG
  rationale: Con ὄχλοι y πρὸς αὐτόν, el verbo no describe simple acompañamiento sino convergencia de multitudes hacia Jesús. «Se le reúnen» mantiene el matiz de acercamiento colectivo sin volverlo demasiado interpretativo.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Adverbio de repetición que aparece dos veces. «Otra vez» es natural en español y preserva el énfasis recurrente del relato.
- source_word: ὄχλοι
  english_pob_choice: crowds
  chosen_spanish: multitudes
  alternatives_spanish:
  - gente
  - muchedumbres
  - multitudes de personas
  lexicon: BDAG
  rationale: «Multitudes» conserva el plural colectivo y un tono digno. Aunque «gente» sería más simple, pierde parte de la fuerza del sustantivo griego.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: se le
  alternatives_spanish:
  - hacia él
  - a él
  lexicon: BDAG
  rationale: La construcción refleja movimiento/convergencia hacia la persona de Jesús. En español, el dativo de interés «se le» suena más natural con «se reúnen» y mantiene la dirección hacia él.
- source_word: ὡς εἰώθει
  english_pob_choice: as was his custom
  chosen_spanish: como era su costumbre
  alternatives_spanish:
  - como solía hacerlo
  - como acostumbraba
  lexicon: BDAG
  rationale: La forma idiomática expresa una acción habitual ya establecida. «Como era su costumbre» reproduce bien el valor de hábito y el tono formal del texto auditado.
- source_word: ἐδίδασκεν αὐτούς
  english_pob_choice: he taught them
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - los enseñaba
  - les estaba enseñando
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual o continuada en el pasado. «Les enseñaba» mantiene esa iteración y funciona de modo natural después de «como era su costumbre».
theological_decisions:
- issue: Presente histórico narrativo en ἔρχεται
  english_pob_reading: Retained present 'he comes' in English
  chosen_spanish_reading: Preservar el presente narrativo con «va» en vez de convertirlo sin más en pasado
  alternative_spanish_readings:
  - fue
  - llegó
  rationale: No es cuestión doctrinal, sino de transparencia estilística al griego. El español permite conservar la vivacidad narrativa sin sonar forzado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Construcción geográfica de καὶ πέραν τοῦ Ἰορδάνου
  english_pob_reading: Included as 'and beyond the Jordan' in the main text
  chosen_spanish_reading: Mantener la secuencia «y al otro lado del Jordán» sin resolver de forma excesiva la relación sintáctica
  alternative_spanish_readings:
  - en la región de Judea al otro lado del Jordán
  - en la región de Judea y al otro lado del Jordán como una sola zona
  rationale: El griego es sintácticamente compacto y permite más de una relación entre Judea y el Jordán. La redacción española conserva esa tensión geográfica sin sobreexplicarla.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa revisada ajustó «after rising» a «rising» y «as he was accustomed» a «as was his custom» para mayor naturalidad; la redacción española sigue esa misma preferencia por un participio breve y una expresión idiomática de costumbre. También se mantuvo la tensión geográfica de la frase final sin resolverla de manera interpretativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evita «SEÑOR» como sustituto de un nombre divino, porque el pasaje no lo contiene.
  - Se conserva el presente narrativo con «va» para reflejar el estilo vívido de Marcos.
  - «Multitudes» mantiene el plural colectivo de ὄχλοι y el tono de la versión auditada.
  - «Les enseñaba» conserva el imperfecto aspectual de acción habitual o continuada.
