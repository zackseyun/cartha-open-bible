lexical_decisions:
- source_word: ὁ δὲ
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Pero él
  - Entonces él
  lexicon: BDAG
  rationale: La combinación articule+δέ funciona de manera narrativa para continuar la escena. En español, «Y él» mantiene la fluidez sin forzar un contraste que el contexto inmediato no exige.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - preguntó
  lexicon: BDAG
  rationale: El verbo básico es «decir». Aunque el contenido es una pregunta, en español es más fiel conservar «dijo» y dejar que la interrogación del discurso directo exprese el acto de preguntar.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo plural se expresa naturalmente con el pronombre átono «les». Dado que el contexto identifica a los destinatarios, no hace falta explicitar «a ellos» en el texto principal.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál es la cosa que
  lexicon: BDAG
  rationale: «Qué» reproduce de forma directa e idiomática el interrogativo neutro griego.
- source_word: θέλετε
  english_pob_choice: do you want
  chosen_spanish: quieren
  alternatives_spanish:
  - desean
  - quisieran
  lexicon: BDAG
  rationale: La forma plural de θέλω se rinde con «quieren», que en español moderno comunica claramente deseo o voluntad. Mantiene la fuerza directa del pedido.
- source_word: ποιήσω
  english_pob_choice: me to do
  chosen_spanish: que haga
  alternatives_spanish:
  - que yo haga
  - que les haga
  lexicon: BDAG
  rationale: Después de θέλετε, el griego expresa la acción que desean que Jesús realice. En español, «que haga» es la forma natural y fiel de representar ese infinitivo de finalidad o contenido.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: 'El dativo tiene valor benefactivo: la acción se realiza en favor de ellos. «Por ustedes» conserva esa idea de beneficio o representación más que un simple destino espacial.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail en inglés, sin añadir elementos interpretativos ni suavizar la pregunta de Jesús.
  spanish_consistency_notes:
  - Se mantiene el sujeto explícito «él» para reflejar la continuidad narrativa del griego artículo+δέ.
  - Se usa «ustedes» por ser un registro neutral y amplio en español latinoamericano.
  - No se introduce «Cristo», «Señor» ni otras fórmulas no presentes en el versículo.
