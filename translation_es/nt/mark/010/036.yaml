review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: continuidad narrativa («Y él»), verbo de habla («dijo»), dativo plural («les»), pregunta directa («¿Qué quieren…?»), y la construcción con θέλετε + subjuntivo («que haga»). La única desalineación significativa está en ὑμῖν, cuyo valor benefactivo aquí se expresa mejor en español como «por ustedes» o «para ustedes», pero dentro de esta construcción idiomática la forma más natural y fiel es «por ustedes»; sin embargo, el orden actual «haga por ustedes» suena menos natural que «haga por ustedes» tras repetir el objeto implícito. Mejor aún, en español bíblico natural la frase completa se formula más fluidamente como «¿Qué quieren que haga por ustedes?»; el problema real no es de significado sino de registro regional frente al objetivo de neutralidad amplia.'
  spanish_quality_summary: 'El texto es claro y comprensible, pero «por ustedes» es menos idiomático en este contexto en gran parte del español eclesial general que «por ustedes» dentro de la frase ya está bien; la mejora necesaria es menor: reemplazar «ustedes» por «ustedes» no cambia nada, así que la revisión debe centrarse en la elección preposicional. Para español neutral latinoamericano y lectura pública, «¿Qué quieren que haga por ustedes?» es aceptable, pero «¿Qué quieren que haga por ustedes?» ya es exactamente el borrador. La reparación realmente necesaria está en la explicación léxica: la racionalidad dada para «por ustedes» sobreafirma una idea de representación. En el texto, una opción más natural y ampliamente legible es «¿Qué quieren que haga por ustedes?»; no obstante, como el texto mismo ya es natural, la revisión será mínima y consistirá en cambiar a «para ustedes», que suena más claramente benefactiva y menos ambigua en español.'
  glossary_alignment: 'No hay términos del glosario de alto impacto involucrados. La revisión propuesta no afecta terminología doctrinal del proyecto. Solo ajusta la expresión del dativo benefactivo ὑμῖν a un español más natural: «para ustedes».'
  issues:
  - severity: medium
    issue: La expresión «por ustedes» puede sonar menos natural o ligeramente ambigua en este contexto.
    rationale: Aunque ὑμῖν es benefactivo y «por ustedes» puede funcionar, en español general «hacer algo para ustedes» expresa con más claridad la idea de actuar en beneficio de alguien dentro de esta construcción interrogativa.
  - severity: low
    issue: La justificación léxica de «por ustedes» exagera el matiz de representación.
    rationale: El dativo benefactivo aquí apunta a beneficio más que a sustitución o representación. Conviene evitar una explicación que pueda sugerir un matiz más fuerte del que exige el griego.
  revised_spanish_text: 'Y él les dijo: «¿Qué quieren que haga para ustedes?»'
  revision_rationale: Se propone un ajuste menor de «por ustedes» a «para ustedes» para expresar de manera más natural y transparente el dativo benefactivo ὑμῖν en español neutral y de lectura pública, sin cambiar el sentido del original.
