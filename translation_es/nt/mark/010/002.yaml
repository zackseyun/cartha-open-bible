revisions:
- from: Y le preguntaban si es lícito para un hombre divorciarse de una mujer, tentándolo.
  to: Y le preguntaban si es lícito para un hombre divorciar a una mujer[a], poniéndolo a prueba.
  rationale: Se reemplaza 'divorciarse de' por 'divorciar a' para reflejar mejor la construcción transitiva de ἀπολῦσαι γυναῖκα y el enfoque legal del original. Se cambia 'tentándolo' por 'poniéndolo a prueba' para comunicar con claridad el sentido de πειράζοντες en español moderno. Se añade una nota con la alternativa marital específica, en línea con el rastro POB en inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:37:03Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en el imperfecto (''le preguntaban''), en el matiz jurídico de ἔξεστιν (''es lícito'') y en el masculino genérico ἀνδρὶ (''para un hombre''). Sin embargo, no preserva bien dos decisiones clave del griego y del rastro POB: ἀπολῦσαι en este contexto debe expresarse transitivamente como acto de divorciar/repudiar a una mujer o esposa, no como el reflexivo ''divorciarse'', que cambia la construcción; y πειράζοντες se entiende mejor como ''poniéndolo a prueba'' o ''probándolo'', no ''tentándolo'', que en español moderno suele sugerir incitación al pecado. Además, el español necesita una leve mejora idiomática para que la relación entre ''hombre'' y ''mujer'' suene natural sin imponer más especificidad de la fuente.'
  spanish_quality_summary: El texto es comprensible, pero 'divorciarse de una mujer' suena menos ajustado al griego que 'divorciar a una mujer' o 'repudiar a una mujer', porque el original enfoca la acción legal del varón sobre la mujer. 'Tentándolo' resulta poco natural y potencialmente engañoso en español bíblico moderno; 'poniéndolo a prueba' comunica mejor el sentido hostil. La frase revisada queda más clara y más fiel sin volverse acartonada.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto (Yahvé, Mesías, etc.). La corrección principal es léxico-sintáctica: ἀπολύω en contexto matrimonial debe reflejar ''divorciar/repudiar'', y πειράζω debe evitar el falso amigo ''tentar'' cuando el sentido es ''poner a prueba''.'
  issues:
  - severity: high
    issue: '''divorciarse'' no refleja bien la construcción de ἀπολῦσαι γυναῖκα'
    rationale: El infinitivo griego es transitivo ('despedir/divorciar a una mujer'), mientras que el reflexivo español desplaza el foco a la separación mutua o al estado civil del sujeto. Eso debilita la forma legal de la pregunta original.
  - severity: medium
    issue: '''tentándolo'' comunica un sentido inadecuado para πειράζοντες'
    rationale: En español actual, 'tentar' suele entenderse como inducir al mal. Aquí el sentido es examinar hostilmente o poner a prueba para atraparlo; 'poniéndolo a prueba' o 'probándolo' evita ambigüedad.
  - severity: low
    issue: Falta nota para la alternativa 'marido ... su esposa' preservada en el inglés POB
    rationale: El inglés auditado conservó una alternativa léxica relevante para ἀνδρὶ/γυναῖκα. Conviene mantenerla también en español mediante nota, ya que el español igualmente puede oscilar entre lectura genérica ('hombre/una mujer') y marital específica ('marido/su esposa').
  revised_spanish_text: Y le preguntaban si es lícito para un hombre divorciar a una mujer[a], poniéndolo a prueba.
  revised_footnotes:
  - marker: a
    text: 'O: ''si es lícito para un marido divorciar a su esposa''.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza 'divorciarse de' por 'divorciar a' para reflejar mejor la construcción transitiva de ἀπολῦσαι γυναῖκα y el enfoque legal del original. Se cambia 'tentándolo' por 'poniéndolo a prueba' para comunicar con claridad el sentido de πειράζοντες en español moderno. Se añade una nota con la alternativa marital específica, en línea con el rastro POB en inglés.
