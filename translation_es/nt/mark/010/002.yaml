translation:
  language: es
  text: Y le preguntaban si es lícito para un hombre divorciar a una mujer[a], poniéndolo a prueba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''si es lícito para un marido divorciar a su esposa''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y entonces
  lexicon: BDAG
  rationale: La conjunción simple preserva la conexión narrativa sin introducir matiz temporal no explícito en el griego.
- source_word: ἐπηρώτων
  english_pob_choice: were asking
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - le interrogaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; en español, el imperfecto 'preguntaban' reproduce mejor ese valor que un pretérito simple.
- source_word: ἔξεστιν
  english_pob_choice: it is lawful
  chosen_spanish: es lícito
  alternatives_spanish:
  - está permitido
  - es permitido
  lexicon: BDAG
  rationale: En una controversia sobre divorcio, el sentido es de legitimidad jurídica o normativa; 'es lícito' comunica bien ese matiz en español.
- source_word: ἀνδρὶ
  english_pob_choice: for a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para un marido
  lexicon: BDAG
  rationale: El sustantivo puede significar 'hombre' o 'marido'. Aquí, el griego usa una forma genérica masculina; 'hombre' conserva esa amplitud y evita añadir una precisión posesiva que no está en el texto.
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: de una mujer
  alternatives_spanish:
  - a una mujer
  - de la esposa
  lexicon: BDAG
  rationale: Sigo de cerca el griego sin imponer un posesivo implícito. Aunque el contexto es matrimonial, la forma anartrosa permite mantener 'una mujer' en español; el sentido de divorcio queda claro por el verbo.
- source_word: ἀπολῦσαι
  english_pob_choice: to divorce
  chosen_spanish: divorciarse
  alternatives_spanish:
  - repudiar
  - dejar
  lexicon: BDAG
  rationale: En este contexto legal-matrimonial, el verbo equivale idiomáticamente a 'divorciarse'. El español reflexivo expresa naturalmente la acción con el sujeto masculino genérico.
- source_word: πειράζοντες
  english_pob_choice: testing
  chosen_spanish: tentándolo
  alternatives_spanish:
  - poniéndolo a prueba
  - probándolo
  lexicon: BDAG
  rationale: El participio describe un hostigamiento con intención hostil. 'Tentándolo' conserva una opción tradicional y el valor de poner a prueba; aunque 'ponerlo a prueba' sería más explicativo, aquí se mantiene una forma concisa y fiel al matiz del término.
theological_decisions:
- issue: Valor del masculino genérico ἀνδρὶ en una pregunta legal sobre matrimonio
  english_pob_reading: for a man
  chosen_spanish_reading: para un hombre
  alternative_spanish_readings:
  - para un marido
  rationale: Se preserva el masculino genérico del griego sin convertirlo en una formulación más específica de lo que el texto dice. Esto mantiene la forma del argumento y evita cargar de antemano la relación posesiva.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §4 (Gender-accurate over gender-neutral)'
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de 'his wife' a 'a wife' para ajustarse mejor al artículo indefinido del griego; la versión española refleja esa misma cautela al usar 'de una mujer' sin añadir posesivo explícito. También se conserva el imperfecto narrativo y el matiz hostil de πειράζοντες.
  spanish_consistency_notes:
  - Se usa 'lícito' para ἔξεστιν, en coherencia con el registro jurídico del pasaje.
  - Se mantiene 'hombre' para ἀνδρὶ como masculino genérico, no 'marido', para no estrechar indebidamente el alcance.
  - Se evita 'esposa' porque el griego no aporta posesivo explícito en esta frase breve.
  - '''Tentándolo'' conserva una opción tradicional y el matiz de prueba hostil, sin desarrollar más allá de la fuente.'
