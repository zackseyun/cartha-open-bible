base_translation:
  language: en
  yaml_path: translation/nt/mark/010/038.yaml
  text: But Jesus said to them[a], “You do not know what you are asking. Are you able to drink the cup that I drink[b], or to be baptized with the baptism with which I am baptized?”
  footnotes:
