    text: The 'cup' is a biblical metaphor for the portion appointed to someone, here especially Jesus' coming suffering.
    reason: cross_reference
  - marker: b
    text: Or, more interpretively, 'to undergo the baptism that I undergo.' The Greek repeats the baptism word-group for emphasis.
    reason: lexical_alternative
