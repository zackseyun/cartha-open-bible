translation:
  language: es
  text: 'Pero Jesús les dijo: «No saben lo que piden. ¿Pueden beber la copa[a] que yo bebo, o ser bautizados con el bautismo[b] con que yo soy bautizado?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La 'copa' es una metáfora bíblica para la porción asignada a alguien, aquí especialmente el sufrimiento venidero de Jesús.
    reason: cross_reference
  - marker: b
    text: O, de manera más interpretativa, «ser bautizados con el bautismo que yo recibo». El griego repite el grupo léxico de bautismo para dar énfasis.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτοῖς
  english_pob_choice: But Jesus said to them
  chosen_spanish: Pero Jesús les dijo
  alternatives_spanish:
  - Y Jesús les dijo
  lexicon: BDAG
  rationale: «Pero» reproduce bien el matiz de contraste y corrección de δέ en el contexto. «Les dijo» es natural y fiel al dativo αὐτοῖς.
- source_word: Οὐκ οἴδατε
  english_pob_choice: You do not know
  chosen_spanish: No saben
  alternatives_spanish:
  - No conocen
  - No entienden
  lexicon: BDAG
  rationale: οἶδα expresa saber/conocer; «No saben» es la opción más directa y natural en español, sin forzar una interpretación más fuerte como «entienden».
- source_word: τί αἰτεῖσθε
  english_pob_choice: what you are asking
  chosen_spanish: lo que piden
  alternatives_spanish:
  - lo que están pidiendo
  - lo que solicitan
  lexicon: BDAG
  rationale: αἰτέω significa pedir/solicitar/ask. «Piden» conserva la fuerza inmediata de la reprensión de Jesús y suena natural en español.
- source_word: δύνασθε
  english_pob_choice: Are you able
  chosen_spanish: ¿Pueden
  alternatives_spanish:
  - ¿Son capaces de
  - ¿Tienen poder para
  lexicon: BDAG
  rationale: δύναμαι señala capacidad. En español, la pregunta directa «¿Pueden…?» comunica esa capacidad sin perder claridad.
- source_word: πιεῖν τὸ ποτήριον ὃ ἐγὼ πίνω
  english_pob_choice: to drink the cup that I drink
  chosen_spanish: beber la copa que yo bebo
  alternatives_spanish:
  - tomar la copa que yo tomo
  - beber el cáliz que yo bebo
  lexicon: BDAG
  rationale: Se conserva la metáfora de «copa»/ποτήριον, ya establecida bíblicamente. «Beber» corresponde al infinitivo πιεῖν y mantiene la imagen verbal.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  lexicon: BDAG
  rationale: «Copa» es el equivalente más natural y transparente en español actual. «Cáliz» puede sonar más litúrgico y menos directo; no se usa aquí para no desplazar el tono bíblico general.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y
  lexicon: BDAG
  rationale: La conjunción es disyuntiva en el texto griego; «o» preserva esa relación sin armonizarla.
- source_word: τὸ βάπτισμα ὃ ἐγὼ βαπτίζομαι βαπτισθῆναι
  english_pob_choice: to be baptized with the baptism with which I am baptized
  chosen_spanish: ser bautizados con el bautismo con que yo soy bautizado
  alternatives_spanish:
  - ser bautizados con el bautismo que yo recibo
  - pasar por el bautismo con que yo soy bautizado
  lexicon: BDAG
  rationale: Se mantiene la repetición cognada bautismo/bautizado para reproducir la fuerza retórica del griego. «Con que» conserva la relación instrumental/relativa sin añadir explicación interpretativa.
- source_word: βαπτίζομαι ... βαπτισθῆναι
  english_pob_choice: be baptized ... I am baptized
  chosen_spanish: soy bautizado ... bautizados
  alternatives_spanish:
  - recibo ... recibo
  - me someto a ... me someto a
  lexicon: BDAG
  rationale: Se evita sustituir el lenguaje de bautismo por una paráfrasis como «pasar por» o «someterse a», para preservar el paralelismo léxico y la resonancia intertextual.
theological_decisions:
- issue: Metaphorical language of 'cup' and 'baptism'
  english_pob_reading: Retain both metaphors literally in the main text without explicating them as suffering, death, or divine wrath.
  chosen_spanish_reading: Retener literalmente ambas metáforas en el texto principal, sin explicarlas como sufrimiento, muerte o ira divina.
  alternative_spanish_readings:
  - Interpretarlas como 'copa de sufrimiento' o 'pasar por el sufrimiento'
  - Explicitar solo el bautismo como 'pasar por una prueba'
  rationale: El pasaje usa metáforas bíblicas consolidadas. Mantenerlas en español preserva la tensión teológica y evita cerrar el sentido antes de tiempo.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió la anclaje de notas al incluir [a] en «les dijo[a]» y [b] en «yo bebo[b]», de modo que cada nota tenga su marcador exacto en el texto español.
  spanish_consistency_notes:
  - Se emplea «copa» y no «cáliz» como término base para mantener un español neutral y bíblicamente transparente.
  - Se conserva la repetición de bautismo/bautizado para reflejar la estructura retórica del griego.
  - «Piden» refleja el valor de αἰτεῖσθε sin sobreexplicación.
  - La puntuación y comillas siguen el uso habitual en español moderno.
  - El orden de la frase mantiene la secuencia del griego y la claridad en español.
