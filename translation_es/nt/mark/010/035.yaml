translation:
  language: es
  text: 'Y Santiago y Juan[a], los hijos de Zebedeo, vinieron a él y le dijeron: «Maestro, queremos que hagas por nosotros lo que te pidamos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se acercaron a él». El verbo griego también puede traducirse más literalmente como movimiento hacia Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσπορεύονται
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - fueron hacia él
  lexicon: BDAG
  rationale: El verbo griego expresa movimiento hacia Jesús. En español, «se acercaron a él» comunica ese avance de manera natural y mantiene la imagen espacial sin sonar rígido. «Vinieron a él» sería posible, pero algo más genérico.
- source_word: οἱ υἱοὶ Ζεβεδαίου
  english_pob_choice: the sons of Zebedee
  chosen_spanish: los hijos de Zebedeo
  alternatives_spanish:
  - los hijos de Zebedeo
  lexicon: BDAG
  rationale: La identificación genitiva se conserva de forma directa en español. No se reordena a una posesión idiomática porque la forma plena coincide bien con el griego y con el estilo narrativo.
- source_word: λέγοντες αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le decían
  lexicon: BDAG
  rationale: El participio narrativo se vuelve naturalmente un verbo finito en español. «Le dijeron» reproduce la función discursiva sin la pesadez de un gerundio.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Profesor
  lexicon: BDAG
  rationale: El vocativo se traduce como una forma de trato dirigida a quien enseña. «Maestro» es idiomático y fiel; «Profesor» sonaría moderno pero menos adecuado al registro bíblico.
- source_word: θέλομεν
  english_pob_choice: we want
  chosen_spanish: queremos
  alternatives_spanish:
  - deseamos
  - queremos
  lexicon: BDAG
  rationale: «Queremos» expresa la intención directa de la petición con claridad y naturalidad. En español, «queremos» es más sobrio y menos forzado que «deseamos» en este contexto.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - que
  lexicon: BDAG
  rationale: Después de «queremos», el español pide una subordinada con «que». Aunque el griego usa ἵνα, aquí la equivalencia funcional más natural es «queremos que...», preservando la relación de voluntad/pedido.
- source_word: ὃ ἐὰν αἰτήσωμέν σε
  english_pob_choice: whatever we ask of you
  chosen_spanish: lo que te pidamos
  alternatives_spanish:
  - cualquier cosa que te pidamos
  - todo lo que te pidamos
  lexicon: BDAG
  rationale: 'La combinación relativa con ἐάν expresa indefinición: «lo que» / «todo lo que». Se prefiere «lo que te pidamos» porque suena natural en español y conserva la amplitud de la petición sin sobreexplicar.'
- source_word: ποιήσῃς ἡμῖν
  english_pob_choice: to do for us
  chosen_spanish: hagas por nosotros
  alternatives_spanish:
  - hagas para nosotros
  - nos hagas
  lexicon: BDAG
  rationale: ποιέω aquí tiene sentido amplio de hacer en favor de alguien. «Hagas por nosotros» refleja la orientación benefactora y evita convertir prematuramente el verbo en «conceder», que ya interpretaría más el resultado que el texto griego.
theological_decisions:
- issue: Forma de dirigirse a Jesús
  english_pob_reading: Teacher
  chosen_spanish_reading: Maestro
  alternative_spanish_readings:
  - Rabí
  - Señor
  rationale: El pasaje presenta a Jesús como maestro, y el vocativo griego es directo. «Maestro» conserva la relación pedagógica sin introducir un título más cargado doctrinalmente.
  doctrine_reference: Cristología y discipulado en el evangelio de Marcos
- issue: Matiz de la petición
  english_pob_reading: whatever we ask of you
  chosen_spanish_reading: lo que te pidamos
  alternative_spanish_readings:
  - todo lo que te pidamos
  - lo que sea que te pidamos
  rationale: La petición mantiene su amplitud indefinida. «Lo que te pidamos» evita restringir el alcance del griego y no añade una intensificación que el texto no exige.
  doctrine_reference: Hermenéutica del discurso directo y petición implícita
- issue: Relación entre voluntariedad y finalidad en ἵνα
  english_pob_reading: to
  chosen_spanish_reading: que
  alternative_spanish_readings:
  - para que
  - a fin de que
  rationale: En español, después de «queremos» la forma natural es una subordinada con «que». Esto preserva la fuerza de voluntad/solicitud sin forzar una construcción finalista artificial.
  doctrine_reference: Sintaxis de complementación verbal
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego SBLGNT y se mantuvo la equivalencia óptima del POB inglés para los puntos de decisión léxica: movimiento hacia Jesús, vocativo de trato, objeto indefinido de la petición y valor amplio de ποιέω. No hubo revisiones aplicadas en el registro inglés de referencia; la redacción española conserva esa lectura estable, ajustando solo la sintaxis para sonar natural en español.'
  spanish_consistency_notes:
  - Se usa «Maestro» para Διδάσκαλε, coherente con el valor vocativo y con el patrón del POB inglés.
  - Se conserva «Jesús» mediante el pronombre implícito en el contexto; el referente queda claro por la narración.
  - Se eligió «los hijos de Zebedeo» en forma plena para mantener la identificación apposicional del griego.
  - La nota al pie marca solo la alternativa semántica principal de προσπορεύονται y no introduce lecturas no documentadas.
