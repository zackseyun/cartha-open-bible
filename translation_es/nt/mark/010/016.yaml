translation:
  language: es
  text: Y tomándolos en sus brazos, los bendecía[a][b], poniendo las manos sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «abrazándolos» / «tomándolos en sus brazos». El verbo griego se refiere de manera específica a recibir a alguien en los brazos.
    reason: lexical_alternative
  - marker: b
    text: 'El verbo griego está en imperfecto e intensificado, lo que sugiere que los bendecía de manera continua o repetida: «seguía bendiciéndolos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐναγκαλισάμενος
  english_pob_choice: took them in his arms
  chosen_spanish: tomándolos en sus brazos
  alternatives_spanish:
  - abrazándolos
  - tomándolos en sus brazos
  lexicon: BDAG
  rationale: El participio indica una acción corporal concreta de recibir a los niños en los brazos. En español, «tomándolos en sus brazos» conserva esa especificidad mejor que un simple «abrazándolos», que puede sonar más general.
- source_word: κατευλόγει
  english_pob_choice: blessed
  chosen_spanish: los bendecía
  alternatives_spanish:
  - los bendijo
  - los seguía bendiciendo
  - los bendecía repetidamente
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción continua o repetida. Por eso se eligió el imperfecto español «bendecía», que deja ver la duración sin sobrecargar el texto con una paráfrasis explicativa.
- source_word: τιθεὶς τὰς χεῖρας ἐπ’ αὐτά
  english_pob_choice: laying his hands on them
  chosen_spanish: poniendo sus manos sobre ellos
  alternatives_spanish:
  - imponiendo las manos sobre ellos
  - colocando sus manos sobre ellos
  lexicon: BDAG
  rationale: La frase describe el modo de la bendición. «Poniendo sus manos sobre ellos» es natural en español y conserva el gesto sin introducir un lenguaje más técnico o litúrgico que el griego no exige.
- source_word: αὐτὰ ... αὐτά
  english_pob_choice: them
  chosen_spanish: los / ellos
  alternatives_spanish:
  - los niños
  - a ellos
  lexicon: BDAG
  rationale: El pronombre retoma a los niños del contexto inmediato. En español, «los» evita repetir «los niños» y mantiene la fluidez narrativa.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción simple conserva el ritmo narrativo de Marcos sin añadir matices temporales o inferenciales no presentes en el griego.
theological_decisions:
- issue: Preservación del carácter concreto y afectuoso de la escena
  english_pob_reading: Retain the concrete physical and verbal actions ('took them in his arms,' 'blessed them,' 'laying his hands on them') without importing sacramental or ceremonial terminology.
  chosen_spanish_reading: Mantener las acciones concretas y afectuosas («tomándolos en sus brazos», «los bendecía», «poniendo sus manos sobre ellos») sin convertir el pasaje en una formulación sacramental o litúrgica.
  alternative_spanish_readings:
  - los abrazó y los bendijo
  - les impartió una bendición con la imposición de manos
  rationale: El versículo describe la recepción afectuosa de Jesús y su bendición sobre los niños. La traducción debe preservar esa escena sin resolverla hacia categorías doctrinales posteriores que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El texto sigue de cerca la revisión final aprobada del POB en inglés, sin cambios de fondo en el sentido ni en las decisiones léxicas principales. La adaptación al español conserva el gesto físico, la acción de bendecir en imperfecto y la colocación de las manos, manteniendo la misma lectura auditada.
  spanish_consistency_notes:
  - Se conserva «Y» inicial para reflejar la simple conexión narrativa.
  - «Tomándolos en sus brazos» mantiene el valor físico concreto de ἐναγκαλισάμενος.
  - «Los bendecía» refleja el imperfecto griego y deja abierta la idea de acción repetida o continua.
  - «Poniendo sus manos sobre ellos» conserva el gesto sin introducir terminología sacramental.
  - Los marcadores de nota se colocan en el orden del texto y corresponden a alternativas lexicales reales del audit trail.
