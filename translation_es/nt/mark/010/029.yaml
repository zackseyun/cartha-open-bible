    rationale: El griego usa un término amplio para descendencia/niños sin especificar sexo. Dado que el versículo distingue antes «hermanos» y «hermanas», mantener aquí una forma española que exprese claramente ambos sexos preserva mejor el contraste semántico del original y la decisión léxica del English POB ('children').
  revised_spanish_text: 'Jesús dijo: “En verdad les digo que no hay nadie que haya dejado casa, o hermanos, o hermanas, o madre, o padre, o hijos e hijas, o campos por causa de mí y por causa del evangelio,”'
