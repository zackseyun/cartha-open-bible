translation:
  language: es
  text: 'Jesús dijo: “En verdad les digo que no hay nadie que haya dejado casa, o hermanos, o hermanas, o madre, o padre, o hijos e hijas, o campos por causa de mí y por causa del evangelio,”'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - afirmó
  - declaró
  lexicon: BDAG
  rationale: El aoristo de φημί introduce el discurso de Jesús de manera simple. En español, «dijo» es la equivalencia más natural y directa sin añadir matices ajenos.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Ciertamente
  lexicon: BDAG
  rationale: En los evangelios sinópticos, ἀμήν al inicio de una sentencia funciona como fórmula solemne. «En verdad» conserva el carácter enfático y es idiomático en español; «Amén» resultaría menos natural aquí.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les aseguro
  lexicon: BDAG
  rationale: La fórmula mantiene la solemnidad del anuncio. En español, «les digo» comunica directamente el decir de Jesús; el plural «les» refleja el destinatario colectivo.
- source_word: οὐδείς ἐστιν ὃς
  english_pob_choice: there is no one who
  chosen_spanish: no hay nadie que
  alternatives_spanish:
  - nadie hay que
  - no existe quien
  lexicon: BDAG
  rationale: Es la construcción más natural en español para el negativo universal griego, preservando su alcance general.
- source_word: ἀφῆκεν
  english_pob_choice: has left
  chosen_spanish: haya dejado
  alternatives_spanish:
  - haya abandonado
  - haya renunciado a
  lexicon: BDAG
  rationale: El aoristo en esta sentencia general se vierte de modo natural con subjuntivo perfecto en la relativa española. «Haya dejado» mantiene el sentido de dejar algo sin cargarlo con un matiz más fuerte que el texto no exige.
- source_word: οἰκίαν
  english_pob_choice: house
  chosen_spanish: casa
  alternatives_spanish:
  - hogar
  - casa/hogar
  lexicon: BDAG
  rationale: Aunque «house» puede traducirse literalmente como «casa», en español «casa» funciona bien y no traslada indebidamente el sentido a una unidad familiar abstracta.
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos varones
  - hermanos
  lexicon: BDAG
  rationale: El griego usa el plural masculino para hermanos varones, pero en español «hermanos» es la forma natural y comprensible; la secuencia separada con «hermanas» conserva la distinción de sexo del original.
- source_word: ἀδελφὰς
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - hermanas
  lexicon: BDAG
  rationale: Equivalente léxico directo de ἀδελφάς.
- source_word: μητέρα
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: Equivalente directo, con registro digno y bíblico.
- source_word: πατέρα
  english_pob_choice: father
  chosen_spanish: padre
  alternatives_spanish:
  - papá
  lexicon: BDAG
  rationale: Equivalente directo, con registro digno y bíblico.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: Aunque τέκνα significa «hijos/descendencia» en sentido amplio, en esta lista relacional «hijos» es natural en español y corresponde al valor familiar general del término. La lista ya ha nombrado hermanos y hermanas, por lo que no se pierde claridad.
- source_word: ἀγρούς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - campos de cultivo
  lexicon: BDAG
  rationale: «Campos» reproduce con cercanía ἀγρούς como terrenos cultivados y mantiene el paralelismo con la lista de bienes y relaciones dejadas.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: for my sake
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - por mí
  - a causa de mí
  lexicon: BDAG
  rationale: La preposición y el genitivo expresan motivo/costo. «Por causa de mí» conserva esa relación causal y personal sin suavizarla en exceso.
- source_word: καὶ ἕνεκεν τοῦ εὐαγγελίου
  english_pob_choice: and for the sake of the gospel
  chosen_spanish: y por causa del evangelio
  alternatives_spanish:
  - y por el evangelio
  - y por causa de la buena noticia
  lexicon: BDAG
  rationale: Se mantiene el paralelo de ἕνεκεν con la primera cláusula. «Evangelio» es el equivalente establecido del término, y «por causa de» preserva la repetición retórica del griego.
- source_word: εὐαγγελίου
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es la forma establecida en español bíblico y comunica correctamente el término técnico del NT.
theological_decisions:
- issue: La lista de renuncias podría sonar como ruptura moral absoluta con la familia
  english_pob_reading: left house or brothers or sisters or mother or father or children or fields for my sake and for the sake of the gospel
  chosen_spanish_reading: haya dejado casa, o hermanos, o hermanas, o madre, o padre, o hijos, o campos por causa de mí y por causa del evangelio
  alternative_spanish_readings:
  - haya abandonado casa ...
  - haya renunciado a casa ...
  rationale: «Dejado»/«haya dejado» conserva el costo del discipulado sin convertir el texto en una afirmación de abandono total o de irresponsabilidad familiar. Así se preserva la tensión teológica presente en el pasaje.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y la solución inglesa auditada. No se introdujeron notas de variante textual porque el paquete fuente no documenta una variante relevante para este versículo ni la traducción inglesa usa notas.
  spanish_consistency_notes:
  - Se mantuvo «evangelio» para εὐαγγέλιον, coherente con la terminología del proyecto.
  - Se evitó «SEÑOR» porque no aparece aquí el tetragrámaton ni un uso que requiera esa convención.
  - Se usó «En verdad» para Ἀμὴν como fórmula sinóptica solemne, no como traducción litúrgica de «Amén».
  - Se preservó la repetición de «por causa de» para reflejar ἕνεκεν ... καὶ ἕνεκεν ... en el griego.
