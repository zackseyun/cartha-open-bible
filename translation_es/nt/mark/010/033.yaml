translation:
  language: es
  text: que[a], «Mira, subimos a Jerusalén, y el Hijo del Hombre será entregado a los sumos sacerdotes y a los escribas[b], y lo condenarán a muerte y lo entregarán a los gentiles.»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque»; el griego ὅτι aquí introduce el contenido de lo que se dice, no necesariamente una causa.
    reason: lexical_alternative
  - marker: b
    text: O «a las naciones» para «a los gentiles».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  - pues
  lexicon: BDAG
  rationale: En discurso indirecto en español, «que» introduce de manera natural el contenido de lo dicho. Mantiene la función completiva sin añadir valor causal que el griego aquí no exige.
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - He aquí
  - Miren
  lexicon: BDAG
  rationale: Es un marcador discursivo de atención. «Mira» conserva el tono exhortativo y resulta más natural en español actual que «He aquí», sin perder la fuerza de alerta.
- source_word: ἀναβαίνομεν
  english_pob_choice: we are going up
  chosen_spanish: subimos
  alternatives_spanish:
  - vamos subiendo
  - estamos subiendo
  lexicon: BDAG
  rationale: El presente de movimiento hacia Jerusalén se expresa con naturalidad en español con «subimos». La idea geográfica de ascenso queda implícita y es idiomática.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  lexicon: BDAG
  rationale: Con nombre de ciudad, el valor direccional de εἰς se traduce de forma natural como «a». Mantiene el destino sin sobretraducirlo.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva la fórmula tradicional y literal, que refleja la autodesignación y su resonancia daniélica sin parafrasearla.
- source_word: παραδοθήσεται
  english_pob_choice: will be handed over
  chosen_spanish: será entregado
  alternatives_spanish:
  - será entregado en manos de otros
  - será entregado / será traicionado
  lexicon: BDAG
  rationale: «Entregado» preserva el pasivo de παραδίδωμι y la amplia idea de poner a alguien en poder ajeno. En español suena más natural que una repetición rígida de «entregado/entregarán» en ambos casos, aunque se mantiene la misma raíz verbal.
- source_word: τοῖς ἀρχιερεῦσιν
  english_pob_choice: to the chief priests
  chosen_spanish: a los sumos sacerdotes
  alternatives_spanish:
  - a los principales sacerdotes
  - a los jefes de los sacerdotes
  lexicon: BDAG
  rationale: «Sumos sacerdotes» expresa el grupo de máxima autoridad sacerdotal con un término comprensible y eclesialmente estable, equivalente a «chief priests».
- source_word: τοῖς γραμματεῦσιν
  english_pob_choice: the scribes
  chosen_spanish: a los escribas
  alternatives_spanish:
  - a los maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo del sustantivo griego y mantiene la referencia al grupo reconocido por la tradición textual sin expandirlo interpretativamente.
- source_word: κατακρινοῦσιν
  english_pob_choice: they will condemn
  chosen_spanish: lo condenarán
  alternatives_spanish:
  - lo sentenciarán
  - dictarán condena contra él
  lexicon: BDAG
  rationale: El verbo expresa juicio desfavorable formal. «Condenarán» conserva el peso judicial y funciona de modo natural con el objeto pronominal anticipado por el español.
- source_word: θανάτῳ
  english_pob_choice: to death
  chosen_spanish: a muerte
  alternatives_spanish:
  - a la muerte
  - con pena de muerte
  lexicon: BDAG
  rationale: La construcción española fija con «condenar a muerte» comunica con precisión el complemento dativo del griego.
- source_word: παραδώσουσιν
  english_pob_choice: hand ... over
  chosen_spanish: lo entregarán
  alternatives_spanish:
  - lo pondrán en manos de
  - lo entregarán de nuevo
  lexicon: BDAG
  rationale: Se mantiene la misma familia léxica de «entregar» para reflejar la repetición de παραδίδωμι y la secuencia narrativa de transferencia de poder.
- source_word: τοῖς ἔθνεσιν
  english_pob_choice: to the Gentiles
  chosen_spanish: a los gentiles
  alternatives_spanish:
  - a las naciones
  lexicon: BDAG
  rationale: En este contexto, la referencia es a autoridades no judías. «Gentiles» preserva esa distinción histórica y covenantal mejor que «naciones», que en español puede sonar más abstracto.
theological_decisions:
- issue: Referencia al título ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hijo del ser humano
  rationale: Se conserva la fórmula cristológica tradicional y literal. Evita diluir el eco de Daniel 7 y respeta el valor titular del griego.
  doctrine_reference: Affirmations; Translation philosophy §§2–3
- issue: Sentido de τοῖς ἔθνεσιν en el relato de la pasión
  english_pob_reading: the Gentiles
  chosen_spanish_reading: a los gentiles
  alternative_spanish_readings:
  - a las naciones
  rationale: El contraste inmediato es entre autoridades judías y no judías. «Gentiles» mantiene ese límite histórico y narrativo sin ampliar indebidamente el alcance a «naciones» en abstracto.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés. Se conservan la secuencia narrativa, la repetición de παραδίδωμι con «entregar», la designación cristológica «Hijo del Hombre» y la distinción histórica de «gentiles».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene «gentiles» en sentido histórico-étnico, no como categoría teológica ampliada.
  - «Sumos sacerdotes» y «escribas» siguen la nomenclatura estable del registro POB en español.
  - La puntuación reproduce la apertura discursiva con comillas para el habla directa y conserva la cadencia del original.
