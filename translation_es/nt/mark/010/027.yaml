    text: 'O: «Para los hombres es imposible … para Dios todas las cosas son posibles». El griego ἄνθρωποι es masculino plural con fuerza genérica, referido a la humanidad y no solo a varones.'
    reason: lexical_alternative
  revision_rationale: Se ajusta ἄνθρωποι a «seres humanos» para una lectura española más natural y ampliamente comprensible, manteniendo en nota la alternativa más literal en forma gramatical. Se elimina «eso» por no estar explícito en el griego. Se conserva «porque» como español claro y digno para γάρ. Se reubica la nota al término pertinente y se corrige la puntuación.
