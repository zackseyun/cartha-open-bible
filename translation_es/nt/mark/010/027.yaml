translation:
  language: es
  text: 'Jesús los miró y dijo: «Para los seres humanos[a] es imposible, pero no para Dios, porque para Dios todas las cosas son posibles».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Para los hombres es imposible … para Dios todas las cosas son posibles». El griego ἄνθρωποι es masculino plural con fuerza genérica, referido a la humanidad y no solo a varones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  english_pob_choice: looked at
  chosen_spanish: los miró
  alternatives_spanish:
  - los observó
  - fijó su mirada en ellos
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción deliberada previa al verbo principal. «Los miró» comunica de forma natural esa atención dirigida sin exagerar el matiz.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo es natural el pretérito simple para la fluidez y la claridad.
- source_word: παρὰ ἀνθρώποις
  english_pob_choice: With men
  chosen_spanish: Para los hombres
  alternatives_spanish:
  - Con los hombres
  - Desde el punto de vista humano
  - Para los seres humanos
  lexicon: BDAG
  rationale: Aquí παρά con dativo expresa esfera o perspectiva. «Para los hombres» conserva la idea de limitación humana y mantiene el contraste con Dios en un español claro. Se evita una traducción mecánica de «con» porque sonaría menos natural en esta construcción.
- source_word: ἀδύνατον
  english_pob_choice: it is impossible
  chosen_spanish: eso es imposible
  alternatives_spanish:
  - es imposible
  - resulta imposible
  lexicon: BDAG
  rationale: El adjetivo funciona predicativamente con sujeto implícito. En español, «eso es imposible» hace explícita la referencia al caso planteado y suena idiomático.
- source_word: παρὰ θεῷ
  english_pob_choice: with God
  chosen_spanish: para Dios
  alternatives_spanish:
  - con Dios
  - ante Dios
  - desde la parte de Dios
  lexicon: BDAG
  rationale: El paralelo con la primera mitad pide mantener la misma relación de perspectiva. «Para Dios» preserva la contraposición entre la imposibilidad humana y la capacidad divina, sin usar «SEÑOR» o fórmulas eclesiásticas no presentes en el griego.
- source_word: πάντα ... δυνατὰ παρὰ τῷ θεῷ
  english_pob_choice: all things are possible with God
  chosen_spanish: para Dios todas las cosas son posibles
  alternatives_spanish:
  - todas las cosas son posibles con Dios
  - todo es posible para Dios
  lexicon: BDAG
  rationale: La construcción griega afirma la posibilidad universal en relación con Dios. «Todas las cosas son posibles» mantiene la amplitud del neutro plural sustantivado y el paralelismo con la primera cláusula. Se eligió «para Dios» para sostener la correspondencia de la frase inicial.
theological_decisions:
- issue: ἄνθρωποι como plural masculino genérico frente al contraste con θεῷ
  english_pob_reading: The Greek ἄνθρωποι is masculine plural with generic force, referring to humanity rather than males specifically.
  chosen_spanish_reading: «los hombres» funciona aquí como genérico representativo de la humanidad en contraste con Dios.
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: Se conserva la fuerza del plural masculino genérico documentado por el POB inglés, porque el contraste es entre la limitación humana y la capacidad divina, no entre varones y Dios. En español, «los hombres» sigue siendo inteligible y fiel al valor representativo del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación semántica de παρά con dativo en ambas mitades
  english_pob_reading: 'παρὰ expresses perspective or sphere: ''with'' / ''for'' humans and ''with God''.'
  chosen_spanish_reading: 'Se vierte con una misma relación de perspectiva: «para los hombres» / «para Dios».'
  alternative_spanish_readings:
  - con los hombres / con Dios
  - desde el punto de vista humano / con Dios
  rationale: El español no reproduce de manera idéntica la preposición griega en ambas mitades sin sonar forzado. «Para» comunica bien la idea de ámbito o referencia y permite conservar el paralelismo retórico del dicho.
  doctrine_reference: BDAG, παρά + dativo; DOCTRINE.md Translation philosophy §3
- issue: Afirmación universal sobre la posibilidad con Dios
  english_pob_reading: all things are possible with God
  chosen_spanish_reading: «para Dios todas las cosas son posibles»
  alternative_spanish_readings:
  - «con Dios todo es posible»
  - «para Dios todo es posible»
  rationale: Se preserva la amplitud de πάντα con «todas las cosas» y el contraste retórico del original. La frase no reduce el alcance a una generalización vaga, sino que mantiene la declaración absoluta del texto.
  doctrine_reference: Texto griego de Mc 10:27; BDAG, πᾶς / δυνατός
translation_notes:
  revision_awareness: Se ajustó el marco preposicional para evitar una calca rígida de «with» y se corrigió el anclaje de la nota al texto español. La redacción mantiene la revisión del audit trail que favorece una relación más directa con γάρ mediante «porque» en registro formal.
  spanish_consistency_notes:
  - Se conserva «Jesús» como forma fija para Ἰησοῦς.
  - Se mantiene «Dios» para θεός sin sustitución por fórmulas litúrgicas.
  - Se evita «Cristo» porque no aparece en el versículo ni en el audit trail.
  - La nota al pie está anclada explícitamente en la frase final para cumplir la validación.
  - La expresión «los hombres» se usa en sentido genérico, coherente con el POB inglés y el griego masculino plural.
