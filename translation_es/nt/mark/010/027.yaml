review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: Jesús mira a los discípulos, habla en pretérito narrativo, contrasta la imposibilidad humana con la posibilidad divina, y conserva la amplitud de πάντα con «todas las cosas». Sin embargo, la elección repetida de «para» para παρά debilita el sentido más natural en español del contraste «con los seres humanos / con Dios», y «eso es imposible» introduce un referente explícito no presente en el texto. Además, la nota al pie está mal anclada: el marcador [a] aparece al final de la cita, no sobre «hombres», que es donde pertenece la alternativa léxica.'
  spanish_quality_summary: El texto es legible, pero «Para los hombres… pero no para Dios» suena menos idiomático y menos proverbial en español bíblico que «Para los seres humanos… pero no para Dios» o «Humanamente… pero no para Dios». Dado el compromiso del proyecto con claridad e inteligibilidad eclesial amplia, «los seres humanos» funciona mejor que «los hombres» como español contemporáneo neutral sin perder el valor genérico explicado en nota. También conviene quitar el punto fuera de las comillas seguido de nota, y colocar el marcador junto al término anotado.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: Ἰησοῦς = «Jesús», θεός = «Dios». La decisión sobre ἄνθρωποι requiere ajuste estilístico-contextual: aunque el inglés documenta «men» por filosofía propia, en español actual la mejor equivalencia genérica y ampliamente legible es «seres humanos», dejando «los hombres» como alternativa en nota si se desea reflejar la forma masculina gramatical griega. Esto preserva mejor la fuerza semántica sin sonar excluyente o antinatural.'
  issues:
  - severity: medium
    issue: «Para los hombres / para Dios» suena menos natural para παρά en este dicho.
    rationale: En este contexto proverbial, el español idiomático favorece «Para los seres humanos es imposible, pero no para Dios» o «Con los seres humanos… con Dios». La repetición de «para» no es incorrecta, pero el borrador la fuerza de manera innecesaria y pierde naturalidad retórica.
  - severity: medium
    issue: «eso es imposible» añade un demostrativo no expreso en el griego.
    rationale: ἀδύνατον funciona predicativamente sin un referente explícito. En español basta «es imposible», que refleja mejor la concisión del original.
  - severity: low
    issue: El marcador de nota [a] está mal ubicado.
    rationale: La nota explica la alternativa para ἄνθρωποι, así que el anclaje debe ir sobre «seres humanos» o «hombres», no al final del versículo.
  - severity: low
    issue: La puntuación final puede mejorarse.
    rationale: En español, el punto final normalmente no debe quedar fuera de las comillas antes de un marcador final cuando la cita constituye toda la oración; además, al reubicar la nota, esto se resuelve naturalmente.
  revised_spanish_text: 'Jesús los miró y dijo: «Para los seres humanos[a] es imposible, pero no para Dios, porque para Dios todas las cosas son posibles».'
  revised_footnotes:
