revisions:
- from: 'Jesús los miró y dijo: «Para los hombres, eso es imposible, pero no para Dios; porque para Dios todas las cosas son posibles».[a]'
  to: 'Jesús los miró y dijo: «Para los seres humanos[a] es imposible, pero no para Dios, porque para Dios todas las cosas son posibles».'
  rationale: Se ajusta ἄνθρωποι a «seres humanos» para una lectura española más natural y ampliamente comprensible, manteniendo en nota la alternativa más literal en forma gramatical. Se elimina «eso» por no estar explícito en el griego. Se conserva «porque» como español claro y digno para γάρ. Se reubica la nota al término pertinente y se corrige la puntuación.
  reviewer_model: gpt-5.4
