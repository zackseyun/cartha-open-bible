translation:
  language: es
  text: 'Y les dice: «Quien divorcie a su esposa y se case con otra[a], comete adulterio contra ella».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «otra mujer».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos con «dice», que suena natural en español y refleja el valor narrativo actual del griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa de manera natural con el pronombre indirecto «les», sin perder el destinatario del dicho.
- source_word: Ὃς ἂν
  english_pob_choice: Whoever
  chosen_spanish: Quien
  alternatives_spanish:
  - El que
  - Cualquiera que
  lexicon: BDAG
  rationale: La construcción indefinida general se vierte de forma inclusiva y concisa con «Quien», adecuada para una norma general.
- source_word: ἀπολύσῃ
  english_pob_choice: divorces
  chosen_spanish: divorcie
  alternatives_spanish:
  - repudie
  - despida
  lexicon: BDAG
  rationale: En este contexto marital, ἀπολύω se refiere específicamente al divorcio; «divorcie» comunica ese sentido jurídico-relacional mejor que un simple «despida».
- source_word: τὴν γυναῖκα αὐτοῦ
  english_pob_choice: his wife
  chosen_spanish: a su mujer
  alternatives_spanish:
  - a su esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa»; aquí, con el contexto de divorcio, «su mujer» mantiene la correspondencia lexical del griego y sigue siendo claro en español.
- source_word: γαμήσῃ ἄλλην
  english_pob_choice: marries another
  chosen_spanish: se case con otra
  alternatives_spanish:
  - se case con otra mujer
  - tome otra mujer
  lexicon: BDAG
  rationale: El verbo γαμέω se expresa naturalmente con «casarse con» en español. «Otra» mantiene la forma femenina implícita del griego sin necesidad de explicitar «mujer» en el texto principal.
- source_word: μοιχᾶται
  english_pob_choice: commits adultery
  chosen_spanish: comete adulterio
  alternatives_spanish:
  - está cometiendo adulterio
  - adultera
  lexicon: BDAG
  rationale: Se conserva el sentido estándar y directo del verbo en este contexto legal-moral.
- source_word: ἐπ’ αὐτήν
  english_pob_choice: against her
  chosen_spanish: contra ella
  alternatives_spanish:
  - respecto de ella
  - contra su mujer
  lexicon: BDAG
  rationale: La preposición ἐπί con acusativo se mantiene con «contra» para preservar la idea de ofensa o agravio hacia la mujer repudiada, como en la decisión inglesa.
theological_decisions:
- issue: Mantener el matiz de agravio implícito en ἐπ’ αὐτήν
  english_pob_reading: Rendered 'commits adultery against her'
  chosen_spanish_reading: «comete adulterio contra ella»
  alternative_spanish_readings:
  - «comete adulterio»
  - «comete adulterio con otra»
  rationale: Se preserva la referencia explícita a la mujer ofendida, evitando aplanar el sentido de ἐπ’ αὐτήν. La formulación conserva la tensión textual de que el acto se comete contra la esposa divorciada.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Formulación genérica masculina
  english_pob_reading: Rendered 'Whoever' rather than 'Any man who'
  chosen_spanish_reading: «Quien»
  alternative_spanish_readings:
  - «El que»
  - «Cualquiera que»
  rationale: Aunque el referente inmediato es el esposo, el griego usa una construcción general. «Quien» comunica esa generalidad sin estrechar innecesariamente el alcance.
  doctrine_reference: Translation philosophy §4
- issue: Renderizar γυνή en un contexto de divorcio
  english_pob_reading: his wife
  chosen_spanish_reading: «su mujer»
  alternative_spanish_readings:
  - «su esposa»
  rationale: Se evita imponer una equivalencia demasiado domesticada si el proyecto desea mantener la proximidad al léxico griego; al mismo tiempo, el contexto hace inequívoco que se trata de la esposa.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: 'El pasaje coincide con el estado revisado más reciente del contexto inglés: no se documentan cambios posteriores ni conflictos textuales en la auditoría proporcionada, por lo que la versión española sigue la lectura estable sin añadir variantes no atestiguadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «mujer» y «esposa» según el contexto; aquí se privilegia «mujer» para reflejar el término griego γυνή en un marco de divorcio.
  - Se usa puntuación de cita española con comillas angulares.
  - La voz verbal en presente («dice») reproduce el presente histórico del griego.
  - No se introduce terminología eclesiástica tradicional ajena al texto, como «repudiar», sin necesidad contextual.
