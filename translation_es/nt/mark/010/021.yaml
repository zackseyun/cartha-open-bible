  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. «Jesús», «los pobres», «tesoro en el cielo» y «sígueme» están bien alineados. La nota sobre ὅσα ἔχεις conserva correctamente la alternativa léxica documentada por el POB en inglés.
