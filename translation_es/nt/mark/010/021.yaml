  to: 'Jesús, mirándolo, lo amó y le dijo: «Una cosa te falta: ve, vende todo lo que tienes[a] y da a los pobres, y tendrás tesoro en el cielo; y ven, sígueme».'
  rationale: Se quita «Entonces» para no introducir un matiz temporal no exigido por δέ, y se ajusta «mirándolo fijamente» a «mirándolo» para mantener la fuerza de ἐμβλέψας sin intensificarla más de lo documentado en la auditoría inglesa. Se conserva «todo lo que tienes» con nota porque refleja bien el alcance comprehensivo del mandato en contexto y mantiene la alternativa léxica preservada por el POB.
