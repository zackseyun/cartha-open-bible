translation:
  language: es
  text: 'Jesús, mirándolo, lo amó y le dijo: «Una cosa te falta: ve, vende todo lo que tienes[a] y da a los pobres, y tendrás tesoro en el cielo; y ven, sígueme».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuanto tienes». La expresión griega ὅσα ἔχεις puede entenderse como «todo lo que tienes» o «cuanto tienes»; el contexto indica el alcance completo de sus posesiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβλέψας
  english_pob_choice: looking at him
  chosen_spanish: mirándolo fijamente
  alternatives_spanish:
  - mirándolo
  - fijando su mirada en él
  lexicon: BDAG
  rationale: El participio indica una mirada dirigida y atenta. «Mirándolo fijamente» conserva esa intensidad sin exagerarla más allá del contexto narrativo.
- source_word: ἠγάπησεν
  english_pob_choice: loved him
  chosen_spanish: lo amó
  alternatives_spanish:
  - mostró amor por él
  - lo quiso
  lexicon: BDAG
  rationale: El verbo expresa amor de manera directa. «Lo amó» preserva la afirmación simple y fuerte del texto sin suavizarla.
- source_word: Ἕν
  english_pob_choice: One thing
  chosen_spanish: Una cosa
  alternatives_spanish:
  - Una
  - Un asunto
  lexicon: BDAG
  rationale: El neutro singular funciona sustantivado. En español, «una cosa» es la manera natural de expresar la idea sin perder la brevedad del original.
- source_word: ὑστερεῖ
  english_pob_choice: you lack
  chosen_spanish: te falta
  alternatives_spanish:
  - te hace falta
  - te está faltando
  lexicon: BDAG
  rationale: El presente indica una carencia actual. «Te falta» es idiomático y reproduce la dirección personal del reclamo.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: ve
  alternatives_spanish:
  - vete
  - anda
  lexicon: BDAG
  rationale: Imperativo de partida. «Ve» es breve, natural y fiel al mandato.
- source_word: ὅσα ἔχεις
  english_pob_choice: whatever you have
  chosen_spanish: todo lo que tienes
  alternatives_spanish:
  - lo que tienes
  - cuanto tienes
  lexicon: BDAG
  rationale: La expresión puede leerse como «todo lo que tienes» o «cuanto tienes». En contexto, la orden abarca sus posesiones de manera completa; por eso se opta por una formulación inclusiva y clara en español.
- source_word: πώλησον
  english_pob_choice: sell
  chosen_spanish: vende
  alternatives_spanish:
  - venda
  - pon en venta
  lexicon: BDAG
  rationale: Imperativo aoristo de sentido comercial directo. «Vende» conserva la sencillez y fuerza del mandato.
- source_word: δὸς τοῖς πτωχοῖς
  english_pob_choice: give to the poor
  chosen_spanish: da a los pobres
  alternatives_spanish:
  - dáselo a los pobres
  - da a los necesitados
  lexicon: BDAG
  rationale: «Los pobres» es la forma habitual y precisa de traducir el sustantivo adjetival plural. Mantiene la categoría social referida por el texto.
- source_word: θησαυρὸν ἐν οὐρανῷ
  english_pob_choice: treasure in heaven
  chosen_spanish: tesoro en el cielo
  alternatives_spanish:
  - tesoro en los cielos
  - un tesoro en el cielo
  lexicon: BDAG
  rationale: La expresión es idiomática y tradicionalmente clara en español. «En el cielo» conserva la idea de recompensa celestial sin forzar la construcción.
- source_word: δεῦρο
  english_pob_choice: come
  chosen_spanish: ven
  alternatives_spanish:
  - ven aquí
  - acércate
  lexicon: BDAG
  rationale: El adverbio imperativo invita al movimiento hacia el hablante. «Ven» comunica naturalmente la invitación.
- source_word: ἀκολούθει μοι
  english_pob_choice: follow me
  chosen_spanish: sígueme
  alternatives_spanish:
  - ven tras de mí
  - continúa siguiéndome
  lexicon: BDAG
  rationale: El imperativo presente expresa el llamado continuo del discipulado. «Sígueme» es la forma más natural y fiel en español.
theological_decisions:
- issue: Amor de Jesús hacia el hombre
  english_pob_reading: 'Rendered straightforwardly as a genuine expression of love: ''loved him.'''
  chosen_spanish_reading: 'Se traduce de forma directa como una expresión genuina de amor: «lo amó».'
  alternative_spanish_readings:
  - lo trató con bondad
  - lo miró con aprecio
  rationale: El texto dice explícitamente que Jesús lo amó. La traducción no debe rebajar eso a mera cortesía ni cargarlo con un sistema doctrinal ajeno al enunciado inmediato.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Alcance del mandato sobre las posesiones
  english_pob_reading: The wording preserves the comprehensive force of Jesus' command without paraphrastic expansion.
  chosen_spanish_reading: 'La redacción conserva la fuerza comprensiva del mandato: «todo lo que tienes».'
  alternative_spanish_readings:
  - vende todo lo que posees
  - vende tus bienes
  rationale: La expresión griega apunta en contexto a la totalidad de sus posesiones. Se mantiene esa amplitud sin sustituirla por una paráfrasis más interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se revisó el auditorio inglés de la POB y el pasaje griego; no se requirieron cambios de fondo respecto de la lectura previa. La formulación española conserva la tensión lexical de ὅσα ἔχεις y el tono directo de la escena.
  spanish_consistency_notes:
  - Se usó «Jesús» sin ajustes especiales, conforme al nombre propio del texto.
  - Se prefirió «el cielo» en singular por naturalidad española y porque el griego anarthro puede expresarse idiomáticamente así.
  - Se mantuvo el imperativo final en segunda persona singular, coherente con el llamado directo del pasaje.
