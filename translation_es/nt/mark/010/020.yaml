translation:
  language: es
  text: 'Y él le dijo: «Maestro, todas estas cosas las he guardado desde mi juventud».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - respondió
  - le dijo
  lexicon: BDAG
  rationale: Verbo narrativo simple. En español, «dijo» es la forma más natural y directa; con el complemento átono «le» conserva el destinatario explícito del griego αὐτῷ sin añadir intensidad no indicada por el texto.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Profesor
  - Rabino
  lexicon: BDAG
  rationale: El vocativo de διδάσκαλος designa a quien enseña. «Maestro» mantiene la referencia a la función docente y es más idiomático en español bíblico que «Profesor»; se evita «Rabino» porque introduciría una especificación cultural no presente en el lema griego.
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todo esto
  - todas estas
  lexicon: BDAG
  rationale: La combinación de demostrativo más πᾶς se expresa naturalmente como «todas estas cosas». «Cosas» hace explícito el objeto de lo guardado, es decir, los mandamientos mencionados antes, sin cambiar el alcance del griego.
- source_word: ἐφυλαξάμην
  english_pob_choice: have kept
  chosen_spanish: he guardado
  alternatives_spanish:
  - he observado
  - he cumplido
  - he obedecido
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar, observar o mantener. En el contexto de mandamientos, «he guardado» conserva bien la idea de cumplimiento sostenido y permite una correspondencia lexical cercana al griego; el perfecto español reproduce el valor retrospectivo del aoristo en este contexto.
- source_word: ἐκ νεότητός μου
  english_pob_choice: from my youth
  chosen_spanish: desde mi juventud
  alternatives_spanish:
  - desde mi niñez
  - desde joven
  lexicon: BDAG
  rationale: ἐκ con genitivo temporal marca punto de inicio. «Desde mi juventud» es la equivalencia más natural y fiel; «niñez» sería más restrictivo de lo que el griego exige, y «desde joven» pierde la referencia nominal al período de juventud.
- source_word: ὁ δὲ
  english_pob_choice: And he
  chosen_spanish: Y él
  alternatives_spanish:
  - Pero él
  - Entonces él
  lexicon: BDAG
  rationale: δέ funciona aquí como conector narrativo suave. «Y él» mantiene la continuidad del relato sin forzar un contraste que el griego no exige.
theological_decisions:
- issue: Tono y autoevaluación del hablante respecto de la ley/mandamientos
  english_pob_reading: I have kept all these things from my youth.
  chosen_spanish_reading: las he guardado desde mi juventud
  alternative_spanish_readings:
  - las he observado desde mi juventud
  - las he cumplido desde mi juventud
  rationale: No se añade ni se suaviza el reclamo del hablante. «He guardado» preserva la afirmación de observancia continua sin resolver la tensión implícita que continuará en el contexto inmediato.
  doctrine_reference: Contexto de la obediencia a los mandamientos en el evangelio de Marcos; lectura narrativa sin armonización doctrinal previa.
translation_notes:
  revision_awareness: La versión inglesa auditada no introdujo notas ni cambios de revisión; el griego y el texto inglés están en alta concordancia, así que la propuesta española sigue de cerca el sentido narrativo y lexical sin ampliar el contenido.
  spanish_consistency_notes:
  - 'Se mantiene la correspondencia de nombres propios y términos comunes: «Jesús» no aparece en este versículo, y «Maestro» se usa para διδάσκαλε conforme al valor docente del vocativo.'
  - Se usa «he guardado» para φυλάσσω en continuidad con la decisión inglesa «have kept», evitando un cambio semántico hacia «obedecido» salvo que el contexto lo exija.
  - La puntuación respeta el discurso directo en español con comillas angulares o estándar según publicación; aquí se opta por comillas españolas de estilo editorial.
  - «Desde mi juventud» conserva el inicio temporal sin interpretar de más la extensión exacta del período.
