translation:
  language: es
  text: 'Ellos le dijeron[a]: «Concédenos que uno se siente a tu derecha y otro a tu izquierda en tu gloria».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Concédenos que nos sentemos, uno a tu derecha y otro a tu izquierda, en tu gloria».'
    reason: alternative_reading
lexical_decisions:
- source_word: Δὸς
  english_pob_choice: Grant
  chosen_spanish: Concédenos
  alternatives_spanish:
  - Danos
  - Concédenoslo
  lexicon: BDAG
  rationale: El griego literal es «da», pero en una petición de favor o permiso el español natural y digno es «concédenos». Conserva el matiz de súplica sin reducirlo a un simple traspaso material.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  - nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario queda bien expresado con el clítico «nos» unido a «concédenos», que suena natural en español y mantiene el valor de la petición.
- source_word: ἵνα ... καθίσωμεν
  english_pob_choice: that ... may sit
  chosen_spanish: que ... se siente
  alternatives_spanish:
  - para que ... se siente
  - que ... podamos sentarnos
  lexicon: BDAG
  rationale: La cláusula con ἵνα introduce el contenido pedido. En español, «que uno se siente» comunica la finalidad solicitada sin sobreexplicar el subjuntivo ni introducir una idea de permiso no explicitada.
- source_word: εἷς ... καὶ εἷς
  english_pob_choice: one ... and one
  chosen_spanish: uno ... y otro
  alternatives_spanish:
  - uno ... y uno
  - el uno ... y el otro
  lexicon: BDAG
  rationale: El griego dice literalmente «uno ... y uno», pero en español «uno ... y otro» es la manera más natural de expresar la distribución entre dos personas, sin añadir información ajena al texto.
- source_word: ἐκ δεξιῶν / ἐξ ἀριστερῶν
  english_pob_choice: at your right / at your left
  chosen_spanish: a tu derecha / a tu izquierda
  alternatives_spanish:
  - a tu lado derecho / a tu lado izquierdo
  - a tu diestra / a tu siniestra
  lexicon: BDAG
  rationale: La expresión es locativa e idiomática; en español contemporáneo «a tu derecha» y «a tu izquierda» transmite con claridad las posiciones de honor sin arcaísmo ni ambigüedad.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor glorioso
  - honor
  lexicon: BDAG
  rationale: «Gloria» es el equivalente normal y teológicamente cargado de δόξα. Mantiene abierta la referencia a la exaltación real de Jesús sin convertirla en una paráfrasis interpretativa.
theological_decisions:
- issue: Sentido de «en tu gloria»
  english_pob_reading: A reference to Jesus' future exaltation/royal glory, left somewhat open rather than specifying a detailed eschatological scene.
  chosen_spanish_reading: Una referencia a la gloria/exaltación real futura de Jesús, sin precisar más el escenario.
  alternative_spanish_readings:
  - en tu reino
  - cuando seas glorificado
  rationale: El texto griego dice «en tu gloria», no «en tu reino». La traducción conserva esa forma para no cerrar la tensión teológica ni añadir una especificación que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que eliminó «to us» y «of us» por no ser explícitos en el griego; por eso el español usa una formulación natural sin añadir «a nosotros» ni explicitar pertenencia. También se preservó el registro formal y la estructura de petición del original.
  spanish_consistency_notes:
  - Se mantuvo «gloria» para δόξα, coherente con el uso teológico habitual y con el audit trail inglés.
  - Se evitó «Cristo» y «Señor» porque el versículo nombra a Jesús con pronombre referencial y no contiene esos títulos.
  - La distribución «uno ... y otro» reproduce el paralelismo de εἷς ... καὶ εἷς de manera natural en español.
  - La nota alternativa refleja la tensión gramatical del ἵνα + subjuntivo sin imponer una sola solución interpretativa.
