translation:
  language: es
  text: 'Y muchos lo reprendían para que se callara, pero él gritaba mucho más: «¡Hijo de David[a], ten misericordia de mí!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hijo de David» es un título real y mesiánico; alternativamente, su sentido podría expresarse como «Mesías», pero aquí se conserva la forma griega.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμων
  english_pob_choice: were rebuking
  chosen_spanish: lo reprendían
  alternatives_spanish:
  - lo amonestaban
  - lo increpaban
  - lo reprobaban
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o continua; «lo reprendían» comunica bien la fuerza de ἐπιτιμάω sin suavizarla demasiado, y suena natural en español bíblico actual.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - la multitud
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivado. «Muchos» sigue de cerca el griego sin introducir un colectivo más específico que el texto no dice.
- source_word: ἵνα σιωπήσῃ
  english_pob_choice: so that he would be silent
  chosen_spanish: para que se callara
  alternatives_spanish:
  - para que guardara silencio
  - para hacerlo callar
  lexicon: BDAG
  rationale: La finalidad del reprender es silenciarlo. «Para que se callara» conserva la idea de propósito y evita una paráfrasis excesiva.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: mucho más
  alternatives_spanish:
  - cada vez más
  - con mayor insistencia
  lexicon: BDAG
  rationale: La construcción comparativa se rinde de forma directa con «mucho más», sin añadir información sobre volumen que el griego no explicita.
- source_word: ἔκραζεν
  english_pob_choice: was crying out
  chosen_spanish: gritaba
  alternatives_spanish:
  - clamaba
  - seguía gritando
  lexicon: BDAG
  rationale: El imperfecto expresa continuidad. «Gritaba» reproduce la insistencia de κράζω con naturalidad en español, manteniendo el tono urgente del pasaje.
- source_word: Υἱὲ Δαυίδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - Mesías
  - Hijo davídico
  lexicon: BDAG
  rationale: Se conserva el título literal y su resonancia mesiánica, como en el POB inglés. «Mesías» sería interpretativo y resolvería la tensión que el griego deja abierta.
- source_word: ἐλέησόν με
  english_pob_choice: have mercy on me
  chosen_spanish: ten misericordia de mí
  alternatives_spanish:
  - apiádate de mí
  - compadécete de mí
  lexicon: BDAG
  rationale: La súplica idiomática se vierte con una fórmula natural y reverente en español. «Ten misericordia de mí» preserva el valor petitorio y la gravedad teológica de ἐλεάω.
theological_decisions:
- issue: Título mesiánico «Hijo de David»
  english_pob_reading: Retain the title as 'Son of David' without paraphrasing it as 'Messiah.'
  chosen_spanish_reading: Conservar «Hijo de David» sin sustituirlo por «Mesías».
  alternative_spanish_readings:
  - Mesías, ten misericordia de mí
  - Hijo davídico, ten misericordia de mí
  rationale: El griego presenta el título directamente. Traducirlo literalmente preserva la forma del texto y deja al lector percibir su carga mesiánica sin que la traducción la resuelva por adelantado.
  doctrine_reference: 'Translation philosophy: translate titles; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje mantiene alto acuerdo con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se conserva el nombre divino y la terminología cristológica según los lineamientos del proyecto.
  - Se mantiene el tiempo imperfecto en español con formas continuas o habituales cuando el griego lo sugiere.
  - La puntuación reproduce la división narrativa y el discurso directo con claridad para lectura pública.
