review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena general y conserva elementos importantes como «heredar» y «vida eterna», además de mantener la nota sobre εἰς ὁδόν. Sin embargo, varias decisiones no representan de la mejor manera el griego ni la línea auditada en inglés: εἷς se debilita en «uno» en vez de «un hombre»; «Maestro bueno» suena poco idiomático en español frente a «Buen Maestro»; «¿qué haré?» pierde la fuerza pragmática de τί ποιήσω en esta pregunta; y «le preguntaba» introduce una textura aspectual menos natural en español narrativo que aquí conviene resolver con pretérito simple.'
  spanish_quality_summary: 'El español es mayormente claro, pero presenta giros algo rígidos o poco naturales para un registro bíblico moderno y digno: «uno corrió hacia él», «Maestro bueno» y «le preguntaba» suenan menos fluidos que alternativas más naturales sin perder fidelidad. La frase puede mejorarse con una sintaxis más idiomática y directa.'
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. Se preserva «Maestro» para διδάσκαλε y «heredar» para κληρονομήσω. La revisión propuesta ajusta el fraseo para fidelidad y legibilidad, sin afectar términos teológicos base.
  issues:
  - severity: medium
    issue: εἷς se traduce como «uno»
    rationale: El griego introduce a un individuo masculino específico; la auditoría inglesa documenta «one man». En español, «uno» como sujeto desnudo suena más pobre y menos natural que «un hombre» en este contexto narrativo.
  - severity: medium
    issue: «Maestro bueno» es poco idiomático
    rationale: Aunque calca el orden griego, en español vocativo natural y digno «Buen Maestro» comunica mejor el mismo sentido sin alterar la teología del pasaje.
  - severity: medium
    issue: «¿qué haré?» no expresa bien la fuerza de τί ποιήσω
    rationale: En español suena a futuro simple más que a pregunta deliberativa sobre lo requerido. «¿Qué debo hacer?» representa mejor la intención pragmática reconocida en la auditoría inglesa.
  - severity: low
    issue: «le preguntaba» es menos natural aquí que «le preguntó»
    rationale: Aunque el imperfecto griego puede tener matiz durativo, la propia auditoría inglesa opta por una forma narrativa simple. En español, el pretérito simple resulta más natural en esta secuencia de acciones puntuales.
  - severity: low
    issue: La nota al pie no preserva la alternativa auditada más útil
    rationale: La alternativa inglesa incluye la idea idiomática de «setting out on the way». La nota española actual repite casi literalmente la frase principal en vez de ofrecer con claridad la posibilidad de «ponerse en camino» o «emprender el viaje».
  revised_spanish_text: 'Y mientras él salía al camino[a], un hombre corrió hacia él, se arrodilló ante él y le preguntó: «Buen Maestro, ¿qué debo hacer para heredar la vida eterna?»'
