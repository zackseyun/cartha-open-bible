- from: 'Y cuando él salía al camino[a], uno corrió hacia él y, arrodillándose ante él, le preguntaba: «Maestro bueno, ¿qué haré para heredar la vida eterna?»'
  to: 'Y mientras él salía al camino[a], un hombre corrió hacia él, se arrodilló ante él y le preguntó: «Buen Maestro, ¿qué debo hacer para heredar la vida eterna?»'
