translation:
  language: es
  text: 'Y mientras él salía al camino[a], un hombre corrió hacia él, se arrodilló ante él y le preguntó: «Buen Maestro, ¿qué debo hacer para heredar la vida eterna?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras se ponía en camino». La expresión griega puede referirse a salir al camino o a emprender un viaje.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένου αὐτοῦ εἰς ὁδόν
  english_pob_choice: as he was going out onto the road
  chosen_spanish: cuando él salía al camino
  alternatives_spanish:
  - cuando él estaba saliendo al camino
  - cuando se disponía a salir al camino
  lexicon: BDAG
  rationale: La frase griega en genitivo absoluto presenta una acción de fondo simultánea. En español, «cuando él salía al camino» conserva la escena y la progresión sin sonar demasiado literal. «Al camino» refleja bien εἰς ὁδόν como salida hacia la vía o inicio de una ruta.
- source_word: προσδραμὼν
  english_pob_choice: ran up
  chosen_spanish: corrió hacia él
  alternatives_spanish:
  - vino corriendo hacia él
  - corrió hasta él
  lexicon: BDAG
  rationale: El participio aoristo expresa una llegada urgente. «Corrió hacia él» mantiene la vividez y la dirección del movimiento sin forzar una expresión idiomática demasiado inglesa.
- source_word: εἷς
  english_pob_choice: one man
  chosen_spanish: uno
  alternatives_spanish:
  - un hombre
  - una persona
  lexicon: BDAG
  rationale: El griego usa εἷς de modo sustantivado para introducir a un individuo. En español, el sujeto explícito ya queda suficientemente determinado por el contexto narrativo; «uno» conserva la indefinición focal sin añadir más de lo que la escena pide.
- source_word: γονυπετήσας αὐτὸν
  english_pob_choice: knelt before him
  chosen_spanish: arrodillándose ante él
  alternatives_spanish:
  - se arrodilló ante él
  - cayó de rodillas ante él
  lexicon: BDAG
  rationale: El verbo denota ponerse de rodillas en gesto de respeto o súplica. «Arrodillándose ante él» preserva el participio y la postura reverente; evita intensificar innecesariamente la escena, aunque «se arrodilló» también sería viable.
- source_word: ἐπηρώτα αὐτόν
  english_pob_choice: asked him
  chosen_spanish: le preguntaba
  alternatives_spanish:
  - le preguntó
  - le iba preguntando
  lexicon: BDAG
  rationale: El imperfecto puede sugerir una acción en curso. «Le preguntaba» conserva ese trasfondo narrativo mejor que un simple pretérito puntual, aunque en español «le preguntó» sería más breve.
- source_word: Διδάσκαλε ἀγαθέ
  english_pob_choice: Good Teacher
  chosen_spanish: Maestro bueno
  alternatives_spanish:
  - Buen Maestro
  - Maestro bueno
  lexicon: BDAG
  rationale: διδάσκαλος se traduce naturalmente por «Maestro» en este contexto evangélico. Se mantiene «bueno» como adjetivo explícito para no importar el título «Señor». El orden «Maestro bueno» sigue de cerca la estructura griega, mientras que «Buen Maestro» es más idiomático; aquí se conserva la tensión del vocativo con el adjetivo pospuesto.
- source_word: τί ποιήσω
  english_pob_choice: what must I do
  chosen_spanish: ¿qué haré?
  alternatives_spanish:
  - ¿qué debo hacer?
  - ¿qué debo yo hacer?
  lexicon: BDAG
  rationale: La forma deliberativa pide una acción a realizar. En español, «¿qué haré?» transmite la misma búsqueda de qué hacer sin añadir una obligación modal que el griego aquí no expresa de manera explícita. «¿Qué debo hacer?» sería más interpretativo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: ἵνα introduce finalidad. En español, «para» permite una construcción más natural en esta pregunta directa, sin perder la relación de propósito.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - vida eterna
  - vida perpetua
  lexicon: BDAG
  rationale: La expresión establecida en español es «vida eterna». Se conserva el artículo por fluidez narrativa y porque el griego lo presenta como objeto concreto de búsqueda.
- source_word: κληρονομήσω
  english_pob_choice: I may inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir en herencia
  - obtener
  lexicon: BDAG
  rationale: κληρονομέω tiene el sentido de recibir como herencia. «Heredar» preserva la carga lexical y teológica de la imagen de herencia, mejor que «obtener», que la debilitaría.
theological_decisions:
- issue: Tratamiento del título dirigido a Jesús
  english_pob_reading: Good Teacher
  chosen_spanish_reading: Maestro bueno
  alternative_spanish_readings:
  - Buen Maestro
  rationale: Se evita convertir διδάσκαλε en un título más alto o más devocional que el texto. «Maestro» mantiene la relación pedagógica explícita y deja intacta la base para la respuesta de Jesús en el versículo siguiente.
  doctrine_reference: Principio de primacía del texto original; no importar títulos cristológicos no presentes en la escena.
- issue: Valor del imperfecto en la pregunta
  english_pob_reading: asked him
  chosen_spanish_reading: le preguntaba
  alternative_spanish_readings:
  - le preguntó
  rationale: El imperfecto griego puede presentar la acción como en desarrollo o insistente. «Le preguntaba» preserva mejor esa textura narrativa que una forma puntual, sin añadir un significado doctrinal.
  doctrine_reference: Atención al aspecto verbal del griego; evitar aplanar matices narrativos.
translation_notes:
  revision_awareness: Se siguió el audit trail inglés con concordancia alta y sin cambios revisados en la última pasada; la principal tensión fue conservar el matiz del genitivo absoluto y del imperfecto en español sin sobrerreformular. Se mantuvo la equivalencia óptima, con atención a la naturalidad y a la precisión léxica.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto no aplicable en este versículo.
  - Se evitó «Cristo» porque el texto dice διδάσκαλε, no Χριστός ni κύριος.
  - Se preservó «vida eterna» como fórmula establecida y reconocible.
  - Se mantuvo la imagen de «heredar» para κληρονομέω.
  - La nota a pie de página se ancló únicamente en la expresión con ambigüedad lexical de εἰς ὁδόν.
