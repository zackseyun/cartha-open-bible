translation:
  language: es
  text: 'Pero él les respondió: «¿Qué les mandó Moisés que hicieran?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave con matiz de contraste en el diálogo; «Pero» comunica bien ese giro conversacional en español sin sobreactuar el contraste.
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: he answered
  chosen_spanish: les respondió
  alternatives_spanish:
  - respondió
  - les contestó
  - les replicó
  lexicon: BDAG
  rationale: La fórmula griega responde a un hebraísmo frecuente. En español, «les respondió» conserva la relación con el pronombre dativo αὐτοῖς y suena natural en diálogo.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de modo idiomático con el clítico «les»; evita una perífrasis más pesada sin perder el destinatario de la respuesta.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Cuál cosa?
  - ¿Qué cosa?
  lexicon: BDAG
  rationale: La pregunta busca el contenido de la instrucción; «¿Qué…?» es la forma natural y precisa en español.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: Aunque el griego tiene «a ustedes» como dativo de destinatario, en español el doble dativo con «les» es idiomático en la pregunta indirecta de mandato. La referencia sigue siendo plural.
- source_word: ἐνετείλατο
  english_pob_choice: command
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - les prescribió
  - les dio mandato
  lexicon: BDAG
  rationale: ἐντέλλομαι denota una orden o mandato con autoridad; «mandó» preserva esa fuerza de manera natural y directa en español. «Ordenó» también sería posible, pero «mandó» encaja mejor con el registro de la escena.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés el legislador
  - Moisés
  lexicon: BDAG
  rationale: El nombre propio se translitera según el uso estándar del español bíblico.
theological_decisions:
- issue: Autoridad mosaica explícita sin ampliación interpretativa
  english_pob_reading: Retain 'Moses' as the named human mediator of the command without expanding to 'the Law' or 'God through Moses.'
  chosen_spanish_reading: Mantener a Moisés como el mediador humano nombrado, sin ampliar a «la Ley» ni a «Dios por medio de Moisés».
  alternative_spanish_readings:
  - «¿Qué les mandó la ley de Moisés?»
  - «¿Qué les mandó Dios por medio de Moisés?»
  rationale: El griego nombra explícitamente a Moisés y no introduce una expansión explicativa. La traducción conserva esa precisión y evita añadir una formulación teológica no presente en el versículo.
  doctrine_reference: Primacía del texto original; no importar explicaciones doctrinales ausentes del enunciado.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés: se mantiene la conectividad suave de δὲ, la fórmula responsiva ἀποκριθεὶς εἶπεν, el destinatario plural y la referencia directa a Moisés sin expansión interpretativa. No hubo revisiones aplicadas en el registro inglés, y la versión española sigue esa lectura de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el trato plural de segunda persona en el sentido de destinatarios, aunque el español no lo exprese morfológicamente de forma visible en la pregunta.
  - Se prefirió «Moisés» y «mandó» por claridad y fidelidad semántica, sin recurrir a formulaciones eclesiásticas más cargadas.
  - La puntuación con comillas angulares refleja el discurso directo de manera legible en español.
