translation:
  language: es
  text: 'Y cuando oyó que era Jesús el Nazareno[a], comenzó a gritar y a decir: «¡Jesús, Hijo de David, ten misericordia de mí!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús de Nazaret». El griego dice «Jesús el Nazareno», conservando un epíteto más que la expresión geográfica explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when he heard
  chosen_spanish: al oír
  alternatives_spanish:
  - cuando oyó
  - habiendo oído
  lexicon: BDAG
  rationale: El participio aoristo se vierte con valor temporal previo al verbo principal. «Al oír» conserva la secuencia de acción en español natural sin volverlo pesado o mecánico.
- source_word: Ναζαρηνός
  english_pob_choice: the Nazarene
  chosen_spanish: el Nazareno
  alternatives_spanish:
  - de Nazaret
  - el Nazareo
  lexicon: BDAG
  rationale: La forma griega funciona como epíteto/título, no como construcción geográfica explícita. «El Nazareno» preserva esa forma y suena natural en español bíblico; «de Nazaret» explica más, pero suaviza el matiz del original.
- source_word: ἤρξατο κράζειν καὶ λέγειν
  english_pob_choice: he began to cry out and say
  chosen_spanish: comenzó a gritar y a decir
  alternatives_spanish:
  - se puso a gritar y a decir
  - comenzó a clamar y a decir
  lexicon: BDAG
  rationale: Se mantiene el valor incoativo de ἤρξατο y la doble infinitiva, reflejando el estilo narrativo de Marcos. «Gritar» comunica bien κράζειν como voz fuerte y urgente; «decir» conserva el complemento discursivo.
- source_word: κράζειν
  english_pob_choice: to cry out
  chosen_spanish: gritar
  alternatives_spanish:
  - clamar
  - dar voces
  lexicon: BDAG
  rationale: En este contexto de petición pública insistente, «gritar» expresa la intensidad vocal sin añadir una carga emocional ajena. «Clamar» es posible, pero en español puede sonar más litúrgico o más interpretativo.
- source_word: Υἱὲ Δαυὶδ
  english_pob_choice: Son of David
  chosen_spanish: Hijo de David
  alternatives_spanish:
  - descendiente de David
  lexicon: BDAG
  rationale: Se conserva el título mesiánico reconocido en el contexto del evangelio. «Hijo de David» mantiene la forma literal y la resonancia teológica sin reducirlo a una descripción genealógica.
- source_word: ἐλέησόν με
  english_pob_choice: have mercy on me
  chosen_spanish: ten misericordia de mí
  alternatives_spanish:
  - ten compasión de mí
  - muéstrame misericordia
  lexicon: BDAG
  rationale: La súplica imperativa se traduce con una fórmula bíblica clara y digna en español. «Ten misericordia de mí» preserva el sentido de petición directa y evita un giro menos natural como «muéstrame misericordia».
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
theological_decisions:
- issue: Título mesiánico 'Hijo de David'
  english_pob_reading: Retain 'Son of David' in the main text as a title addressed to Jesus.
  chosen_spanish_reading: Mantener «Hijo de David» como título mesiánico dirigido a Jesús.
  alternative_spanish_readings:
  - descendiente de David
  - un hijo de David
  rationale: En Marcos, la expresión tiene fuerza real y mesiánica; traducirla literalmente preserva esa carga y evita diluirla en una mera referencia genealógica.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §§2–3
- issue: Epiteto Ναζαρηνός
  english_pob_reading: Translate as 'the Nazarene' rather than 'of Nazareth.'
  chosen_spanish_reading: Traducir como «el Nazareno» para reflejar el epíteto griego.
  alternative_spanish_readings:
  - Jesús de Nazaret
  - el de Nazaret
  rationale: La forma griega es adjetival/titulativa. «El Nazareno» conserva mejor la forma y el efecto del original; «Jesús de Nazaret» aclara el lugar, pero no reproduce tan de cerca el epíteto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la última revisión disponible: no se registran cambios aplicados y el consenso de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς conforme a la terminología estándar.
  - Se evita «SEÑOR» porque el texto griego aquí no usa κύριος.
  - Se conserva la estructura narrativa con una traducción directa de la secuencia participial e incoativa.
  - Se mantiene el título mesiánico «Hijo de David» sin explicarlo en el cuerpo del texto.
