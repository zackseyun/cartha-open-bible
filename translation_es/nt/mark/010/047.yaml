revisions:
- from: 'Y al oír que Jesús el Nazareno[a] estaba pasando, comenzó a gritar y a decir: «¡Jesús, Hijo de David, ten misericordia de mí!»'
  to: 'Y cuando oyó que era Jesús el Nazareno[a], comenzó a gritar y a decir: «¡Jesús, Hijo de David, ten misericordia de mí!»'
  rationale: Se corrige la expansión no sustentada «estaba pasando» para volver al significado explícito del griego. Se mantiene «el Nazareno» con nota, así como «Hijo de David» y «ten misericordia de mí». También se usa «cuando oyó» por mayor transparencia temporal y fluidez narrativa.
