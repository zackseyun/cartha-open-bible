translation:
  language: es
  text: Y se burlarán de él[a], y le escupirán, y lo azotarán, y lo matarán, y después de tres días resucitará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en tres días». El griego de Marcos dice «después de tres días», mientras que otros pasajes expresan el tiempo como «al tercer día».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐμπαίξουσιν
  english_pob_choice: will mock
  chosen_spanish: se burlarán de él
  alternatives_spanish:
  - lo ridiculizarán
  - se mofarán de él
  lexicon: BDAG
  rationale: El verbo expresa burla hostil y desprecio. «Se burlarán de él» suena natural en español y conserva la idea de humillación pública sin debilitar el matiz de contempto.
- source_word: ἐμπτύσουσιν αὐτῷ
  english_pob_choice: will spit on him
  chosen_spanish: le escupirán
  alternatives_spanish:
  - escupirán sobre él
  - le arrojarán saliva
  lexicon: BDAG
  rationale: La construcción indica escupir contra él como acto de insulto. «Le escupirán» es claro, idiomático y mantiene la violencia humillante del griego.
- source_word: μαστιγώσουσιν
  english_pob_choice: will flog
  chosen_spanish: lo azotarán
  alternatives_spanish:
  - lo flagelarán
  - lo fustigarán
  lexicon: BDAG
  rationale: «Azotar» comunica un castigo corporal infligido con látigo o vara en español actual. Es más transparente que «flagelar» y mantiene el sentido judicial del verbo.
- source_word: ἀποκτενοῦσιν
  english_pob_choice: will kill
  chosen_spanish: lo matarán
  alternatives_spanish:
  - le darán muerte
  - lo pondrán a muerte
  lexicon: BDAG
  rationale: El verbo significa simplemente matar. «Lo matarán» reproduce esa acción sin añadir matiz legal o moral que el griego no explicita.
- source_word: μετὰ τρεῖς ἡμέρας
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - al cabo de tres días
  - en tres días
  lexicon: BDAG
  rationale: Μετά con acusativo suele significar «después de». «Después de tres días» sigue de cerca el valor de la frase y evita armonizarla con otras formulaciones evangélicas.
- source_word: ἀναστήσεται
  english_pob_choice: he will rise
  chosen_spanish: resucitará
  alternatives_spanish:
  - se levantará
  - será levantado
  lexicon: BDAG
  rationale: Aunque el verbo puede traducirse literalmente «se levantará», en este contexto de anuncio pascual el español bíblico entiende mejor «resucitará». Se mantiene la voz intransitiva sin convertirla en pasiva.
theological_decisions:
- issue: Forma de la resurrección
  english_pob_reading: he will rise
  chosen_spanish_reading: resucitará
  alternative_spanish_readings:
  - se levantará
  - será levantado
  rationale: La forma griega ἀναστήσεται es intransitiva/futura media; por eso no se fuerza una pasiva en español. «Resucitará» comunica naturalmente el evento pascual y conserva la tensión teológica entre la acción divina y la formulación verbal del texto.
  doctrine_reference: Mantener la tensión textual sin resolverla artificialmente.
- issue: Cronología de la resurrección
  english_pob_reading: after three days / Or, 'in three days.'
  chosen_spanish_reading: después de tres días
  alternative_spanish_readings:
  - en tres días
  - al tercer día
  rationale: El griego de Marcos dice literalmente «después de tres días». Se conserva esa formulación en el texto principal y se deja abierta la relación con las expresiones paralelas de los otros Evangelios.
  doctrine_reference: Preservar la variación sinóptica sin armonización interpretativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y el rastro auditado en inglés. Se mantuvo la secuencia de acciones violentas, el valor temporal literal de μετά con acusativo, y la forma intransitiva de ἀναστήσεται, evitando armonizar Marcos con los pasajes paralelos.
  spanish_consistency_notes:
  - Se mantiene «resucitará» para ἀναστήσεται como forma bíblica natural en español, sin introducir pasiva.
  - «Despu[és] de tres días» conserva la lectura directa de Marcos; la nota ofrece la alternativa sinóptica.
  - Se usa «lo/le» de manera idiomática según el complemento directo/indirecto en español, sin alterar el referente masculino singular.
  - El tono es sobrio y narrativo, adecuado para un anuncio de pasión y resurrección.
