translation:
  language: es
  text: 'Y respondiéndole, Jesús dijo: «¿Qué quieres que haga por ti?». Y el ciego le dijo: «Rabboni[a], para que recobre la vista».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Rabboni es una forma aramea de tratamiento que significa «mi maestro» o «mi señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiéndole
  alternatives_spanish:
  - y respondió
  - respondiendo
  lexicon: BDAG
  rationale: El participio griego se conserva mejor en español con una forma participial que acompañe a «dijo», manteniendo la relación inmediata con el destinatario ('a él / le').
- source_word: Τί σοι θέλεις ποιήσω
  english_pob_choice: What do you want me to do for you?
  chosen_spanish: ¿Qué quieres que haga por ti?
  alternatives_spanish:
  - ¿Qué quieres que haga?
  - ¿Qué deseas que yo haga por ti?
  lexicon: BDAG
  rationale: La pregunta combina deseo/voluntad y el dativo σοι con sentido de beneficio. «Por ti» comunica naturalmente ese valor sin forzar una estructura extraña en español.
- source_word: τυφλὸς
  english_pob_choice: the blind man
  chosen_spanish: el ciego
  alternatives_spanish:
  - el hombre ciego
  - el invidente
  lexicon: BDAG
  rationale: El griego usa un adjetivo sustantivado; en español, «el ciego» es breve, natural y conserva la referencia individual sin añadir material innecesario.
- source_word: Ραββουνι
  english_pob_choice: Rabboni
  chosen_spanish: Rabuní
  alternatives_spanish:
  - Raboni
  - Rabboni
  lexicon: BDAG
  rationale: Se translitera el vocativo semítico para conservar la textura del original. La forma «Rabuní» refleja la pronunciación hispana común del término y mantiene la función de apelativo, en lugar de traducirlo directamente en el texto principal.
- source_word: ἵνα ἀναβλέψω
  english_pob_choice: that I may see again
  chosen_spanish: para que recobre la vista
  alternatives_spanish:
  - para que vea de nuevo
  - para que vuelva a ver
  lexicon: BDAG
  rationale: En contexto de sanidad, ἀναβλέπω significa recuperar la vista. «Recobre la vista» comunica el resultado de manera idiomática y clara en español, sin perder el matiz de restauración.
theological_decisions:
- issue: Tratamiento de Ραββουνι como apelativo reverencial semítico
  english_pob_reading: Rabboni retained in the main text with explanatory footnote
  chosen_spanish_reading: Rabuní retenido en el texto principal con nota explicativa
  alternative_spanish_readings:
  - mi maestro
  - maestro
  - señor
  rationale: El texto griego preserva la forma semítica transliterada en vez de sustituirla por un título griego o una paráfrasis. Mantenerla en el cuerpo del texto respeta esa huella histórica y afectiva; la nota aporta el significado para el lector.
  doctrine_reference: Translate titles; transliterate names; readable modern Spanish with explanatory annotation where needed.
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el audit trail inglés: se preserva la estructura participial inicial, la pregunta orientada al beneficio personal, el vocativo semítico transliterado y el sentido curativo de ἀναβλέπω. No se detectan revisiones textuales previas que requieran adaptación adicional.'
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio, sin traducción del vocativo.
  - Se mantiene «el ciego» como sustantivación natural del adjetivo griego.
  - «Para que recobre la vista» conserva el valor de restauración visual propio del contexto de sanidad.
  - La nota al pie explica el significado de «Rabuní» sin desplazar el término del texto principal.
