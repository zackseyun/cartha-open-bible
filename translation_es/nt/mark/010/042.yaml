review_pass:
  verdict: revise
  source_alignment_summary: 'La base griega está bien captada en la estructura general, pero hay dos desajustes importantes frente al sentido auditado: (1) οἱ δοκοῦντες ἄρχειν significa ''los que son considerados/tenidos por gobernantes'', no ''los que se consideran gobernantes'', que en español desplaza el reconocimiento público hacia autoevaluación; (2) el rastro POB documenta preferencia contextual por ''gentiles'' para τῶν ἐθνῶν en este dicho de Jesús, por lo que ''las naciones'' sin nota pierde ese matiz contextual preservado en inglés. El resto del versículo refleja bien προσκαλεσάμενος, Οἴδατε, κατακυριεύουσιν, οἱ μεγάλοι αὐτῶν y κατεξουσιάζουσιν.'
  spanish_quality_summary: El español es claro y legible, con buen registro bíblico moderno. 'Los llamó junto a sí' suena natural y fiel. 'Sus grandes' es comprensible aunque algo rígido, pero aceptable por conservar el paralelismo. La principal mejora necesaria es evitar 'se consideran', que en español introduce un matiz de autopercepción no presente en la decisión lexical auditada.
  glossary_alignment: No hay términos de glosario mayor comprometidos salvo la decisión contextual sobre ἔθνη. Dado que el English POB conserva 'Gentiles' con nota alternativa 'nations', la versión española debería reflejar 'gentiles' en texto principal y dejar 'naciones' como alternativa en nota para alinearse con la rationale documentada.
  issues:
  - severity: high
    issue: '''los que se consideran gobernantes'' traduce mal οἱ δοκοῦντες ἄρχειν'
    rationale: La construcción española sugiere que ellos mismos se tienen por gobernantes. El griego, y la decisión inglesa auditada, apuntan a quienes son considerados o tenidos por gobernantes por otros.
  - severity: medium
    issue: '''de las naciones'' no sigue la decisión contextual auditada para τῶν ἐθνῶν'
    rationale: Aunque léxicamente posible, el English POB documenta que aquí ἔθνη se entiende mejor como 'gentiles' por el marco judío del evangelio. En español conviene preservar ese matiz en el texto principal y dejar 'naciones' como alternativa en nota.
  revised_spanish_text: 'Y Jesús los llamó junto a sí y les dijo: «Ustedes saben que los que son tenidos por gobernantes de los gentiles[a] se enseñorean de ellos,[b] y sus grandes ejercen autoridad sobre ellos».'
  revised_footnotes:
  - marker: a
    text: O «de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «los que parecen gobernar a los gentiles».
    reason: alternative_reading
  revision_rationale: Se corrige 'se consideran' a 'son tenidos por' para reflejar la idea de reconocimiento público en δοκοῦντες. Se cambia 'naciones' por 'gentiles' en el texto principal para seguir la decisión contextual documentada, conservando 'naciones' en nota como alternativa léxica. También se fortalece κατακυριεύουσιν con 'se enseñorean de ellos', que refleja mejor el matiz de dominio abusivo y mantiene la distinción con 'ejercen autoridad sobre'.
