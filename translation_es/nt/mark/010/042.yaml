revisions:
- from: 'Y Jesús los llamó junto a sí y les dijo: «Ustedes saben que los que se consideran gobernantes de las naciones las dominan, y sus grandes ejercen autoridad sobre ellas».'
  to: 'Y Jesús los llamó junto a sí y les dijo: «Ustedes saben que los que son tenidos por gobernantes de los gentiles[a] se enseñorean de ellos,[b] y sus grandes ejercen autoridad sobre ellos».'
  rationale: Se corrige 'se consideran' a 'son tenidos por' para reflejar la idea de reconocimiento público en δοκοῦντες. Se cambia 'naciones' por 'gentiles' en el texto principal para seguir la decisión contextual documentada, conservando 'naciones' en nota como alternativa léxica. También se fortalece κατακυριεύουσιν con 'se enseñorean de ellos', que refleja mejor el matiz de dominio abusivo y mantiene la distinción con 'ejercen autoridad sobre'.
  reviewer_model: gpt-5.4
