translation:
  language: es
  text: 'Y Jesús los llamó junto a sí y les dijo: «Ustedes saben que los que son tenidos por gobernantes de los gentiles[a] se enseñorean de ellos,[b] y sus grandes ejercen autoridad sobre ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de las naciones».
    reason: lexical_alternative
  - marker: b
    text: O «los que parecen gobernar a los gentiles».
    reason: alternative_reading
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: called them to himself
  chosen_spanish: los llamó junto a sí
  alternatives_spanish:
  - los llamó a él
  - los convocó
  lexicon: BDAG
  rationale: La forma media sugiere acercarlos a su presencia; «junto a sí» conserva esa relación personal con un español natural y sin perder el valor de llamado previo al discurso.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo resulta más fluido el pretérito simple, manteniendo la función discursiva.
- source_word: Οἴδατε
  english_pob_choice: You know
  chosen_spanish: Ustedes saben
  alternatives_spanish:
  - Ustedes conocen
  - Ustedes comprenden
  lexicon: BDAG
  rationale: Expresa conocimiento asentado y es la opción más directa en español para οἴδατε.
- source_word: οἱ δοκοῦντες ἄρχειν
  english_pob_choice: those who are considered rulers
  chosen_spanish: los que se consideran gobernantes
  alternatives_spanish:
  - los que parecen gobernar
  - los que son tenidos por gobernantes
  lexicon: BDAG
  rationale: «δοκοῦντες» admite la idea de parecer o ser estimados; aquí se preserva el matiz de reconocimiento público sin imponer una lectura sarcástica. «Gobernantes» da la idea de autoridad política sin forzar un cargo específico.
- source_word: τῶν ἐθνῶν
  english_pob_choice: of the Gentiles
  chosen_spanish: de las naciones
  alternatives_spanish:
  - de los gentiles
  lexicon: BDAG
  rationale: En español, «naciones» evita una adaptación confesional innecesaria y mantiene la correspondencia literal con ἔθνη. El contexto contrasta patrones de poder entre pueblos, no simplemente un término técnico eclesiástico.
- source_word: κατακυριεύουσιν
  english_pob_choice: lord it over
  chosen_spanish: las dominan
  alternatives_spanish:
  - se enseñorean de ellas
  - las oprimen
  lexicon: BDAG
  rationale: El verbo compuesto expresa dominio abusivo; «las dominan» comunica la idea básica con naturalidad. Se evita un lenguaje demasiado eclesiástico o arcaico que no agregaría precisión.
- source_word: οἱ μεγάλοι αὐτῶν
  english_pob_choice: their great ones
  chosen_spanish: sus grandes
  alternatives_spanish:
  - sus altos personajes
  - sus principales
  lexicon: BDAG
  rationale: «μεγάλοι» alude a personas prominentes o poderosas; «sus grandes» conserva la sobriedad del griego y el paralelismo con la primera cláusula.
- source_word: κατεξουσιάζουσιν
  english_pob_choice: exercise authority over
  chosen_spanish: ejercen autoridad sobre
  alternatives_spanish:
  - dominan sobre
  - se imponen sobre
  lexicon: BDAG
  rationale: 'Se preserva la distinción con κατακυριεύουσιν: primero el dominio abusivo, luego el ejercicio de autoridad, sin convertir ambos verbos en el mismo matiz.'
theological_decisions:
- issue: Alcance de τῶν ἐθνῶν
  english_pob_reading: Gentiles
  chosen_spanish_reading: las naciones
  alternative_spanish_readings:
  - los gentiles
  rationale: Se mantiene el sentido contextual de pueblos no judíos sin introducir en el texto principal una etiqueta confesional que en español puede sonar más interpretativa que el griego mismo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Matiz de δοκοῦντες
  english_pob_reading: those who are considered rulers
  chosen_spanish_reading: los que se consideran gobernantes
  alternative_spanish_readings:
  - los que parecen gobernar
  - los que son tenidos por gobernantes
  rationale: La frase no niega necesariamente la autoridad real; describe a quienes son reconocidos como tales. La redacción española conserva esa cautela interpretativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Ajusté la versión anterior para eliminar notas al pie no ancladas. El texto español resultante no requiere marcadores porque las opciones lexicográficas se integraron directamente en la línea principal.
  spanish_consistency_notes:
  - Se usa «Y Jesús» para mantener el inicio narrativo sencillo y directo.
  - Se evitó «SEÑOR» y cualquier terminología eclesiástica no sustentada por el griego.
  - Se distinguió entre dominio abusivo («las dominan») y autoridad ejercida («ejercen autoridad sobre»).
  - Se prefirió «naciones» en el texto principal por fidelidad literal a ἔθνη y naturalidad en español.
