translation:
  language: es
  text: Pero muchos que son primeros serán últimos[a], y los últimos, primeros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «muchos que son primeros serán últimos, y los que son últimos, primeros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado y designa un grupo amplio, no a cada individuo. «Muchos» es natural en español y conserva la amplitud abierta del dicho sin añadir sustantivos no presentes en el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro de contraste o transición. «Pero» refleja bien la oposición respecto del contexto inmediato y conserva el tono proverbial de la sentencia.
- source_word: ἔσονται
  english_pob_choice: will be
  chosen_spanish: serán
  alternatives_spanish:
  - van a ser
  - estarán
  lexicon: BDAG
  rationale: El futuro de εἰμί funciona aquí como cópula simple. «Serán» es el equivalente directo y sobrio en español.
- source_word: πρῶτοι
  english_pob_choice: first
  chosen_spanish: primeros
  alternatives_spanish:
  - los primeros
  - los de primer lugar
  lexicon: BDAG
  rationale: πρῶτος expresa rango o posición. «Primeros» mantiene la antítesis con «últimos» y suena natural en una formulación proverbial.
- source_word: ἔσχατοι
  english_pob_choice: last
  chosen_spanish: últimos
  alternatives_spanish:
  - postreros
  - finales
  lexicon: BDAG
  rationale: ἔσχατος contrasta con πρῶτος en términos de posición o estatus. «Últimos» preserva el paralelismo y es la opción más transparente en español.
- source_word: οἱ ἔσχατοι
  english_pob_choice: the last
  chosen_spanish: los últimos
  alternatives_spanish:
  - los que son últimos
  - aquellos que son últimos
  lexicon: BDAG
  rationale: El artículo hace sustantiva la expresión. «Los últimos» reproduce esa función de manera compacta y equilibrada.
theological_decisions:
- issue: Alcance del dicho de reversión
  english_pob_reading: Render the statement as a general principle of eschatological reversal without specifying social, moral, or salvific categories beyond the text.
  chosen_spanish_reading: Presentar la sentencia como un principio general de inversión de posiciones, sin concretarla aquí en categorías sociales, morales o salvíficas que el versículo no explicita.
  alternative_spanish_readings:
  - Entender «primeros» y «últimos» como ricos y pobres
  - Entenderlo específicamente como discípulos y no discípulos
  - Convertirlo en una regla absoluta aplicada a cada caso individual
  rationale: El griego formula un dicho breve y abierto. La traducción debe conservar esa tensión interpretativa sin cerrar el sentido hacia una aplicación única que el texto no define.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto quedó sin cambios y con alto grado de acuerdo; no se requieren ajustes adicionales al sentido base ni a la estructura paralela del dicho.
  spanish_consistency_notes:
  - Se mantuvo «primeros/últimos» para conservar el paralelismo directo con πρῶτοι/ἔσχατοι.
  - Se evitó ampliar «muchos» a «muchos personas» para no introducir un sustantivo innecesario.
  - La nota al pie recoge la alternativa más explícita que el audit trail inglés preserva, sin sobreinterpretar el dicho.
