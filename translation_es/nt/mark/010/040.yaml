revisions:
- from: Pero sentarse a mi derecha o a mi izquierda no me corresponde darlo[a], sino para aquellos para quienes ha sido preparado.
  to: Pero sentarse a mi derecha o a mi izquierda no me corresponde concederlo[a], sino que es para aquellos para quienes ha sido preparado.
  rationale: Se conserva la fuerza verbal de καθίσαι con 'sentarse', el paralelismo espacial, y la tensión teológica de οὐκ ἔστιν ἐμὸν δοῦναι sin explicaciones añadidas. Se cambia 'darlo' por 'concederlo' para un español más natural en contexto de otorgar lugares de honor, y se completa la elipsis después de ἀλλά con 'sino que es para aquellos...' para reflejar con claridad el sentido del original y del POB inglés. No se requiere adjudicación especial.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:40:13Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: el infinitivo ''sentarse'', el paralelismo ''a mi derecha / a mi izquierda'', la limitación de prerrogativa en οὐκ ἔστιν ἐμὸν δοῦναι, y el perfecto pasivo ''ha sido preparado''. Sin embargo, ''sino para aquellos para quienes ha sido preparado'' queda elíptico de forma poco natural en español y no expresa con suficiente claridad el sentido de ''but for those for whom it has been prepared''.'
  spanish_quality_summary: El español es mayormente claro, pero 'no me corresponde darlo' combinado con 'sino para aquellos para quienes...' suena algo trabado. Además, el pronombre 'lo' introduce un objeto directo explícito que no está expresado en griego; en español puede mantenerse, pero la construcción alternativa del pie de nota y la frase principal quedan más naturales sin 'darlo' si se reestructura. Una redacción más fluida y fiel en español moderno sería 'no me toca concederlo, sino que es para aquellos para quienes ha sido preparado' o, más cerca del POB inglés, 'no me corresponde concederlo, sino que es para aquellos para quienes ha sido preparado'.
  glossary_alignment: No hay términos del glosario mayor que entren en conflicto. La decisión para δοῦναι debe seguir siendo una expresión de prerrogativa sin armonización doctrinal. 'Concederlo' comunica bien el acto de otorgar esos lugares; 'corresponde' preserva el matiz de competencia. Se mantiene 'ha sido preparado' para ἡτοίμασται.
  issues:
  - severity: medium
    issue: La cláusula 'sino para aquellos para quienes ha sido preparado' es incompleta o poco idiomática en español.
    rationale: El griego es elíptico, pero el inglés POB la resolvió explícitamente. En español conviene completar la elipsis para evitar una frase dura o ambigua.
  - severity: low
    issue: El uso de 'darlo' con 'sentarse ... a mi derecha o a mi izquierda' suena algo torpe.
    rationale: Aunque semánticamente se entiende que Jesús habla de otorgar esos puestos, en español 'concederlo' se ajusta mejor al contexto de prerrogativa y asientos de honor.
  - severity: low
    issue: La nota alternativa reproduce una formulación menos natural que la principal y conserva 'darlo'.
    rationale: La alternativa debe corresponder a una opción realmente viable y natural en español, paralela a 'is not for me to give'.
  revised_spanish_text: Pero sentarse a mi derecha o a mi izquierda no me corresponde concederlo[a], sino que es para aquellos para quienes ha sido preparado.
  revised_footnotes:
  - marker: a
    text: 'O: «no es para mí concederlo».'
    reason: lexical_alternative
  revision_rationale: Se conserva la fuerza verbal de καθίσαι con 'sentarse', el paralelismo espacial, y la tensión teológica de οὐκ ἔστιν ἐμὸν δοῦναι sin explicaciones añadidas. Se cambia 'darlo' por 'concederlo' para un español más natural en contexto de otorgar lugares de honor, y se completa la elipsis después de ἀλλά con 'sino que es para aquellos...' para reflejar con claridad el sentido del original y del POB inglés. No se requiere adjudicación especial.
