translation:
  language: es
  text: Pero sentarse a mi derecha o a mi izquierda no me corresponde concederlo[a], sino que es para aquellos para quienes ha sido preparado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no es para mí concederlo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ ... καθίσαι
  english_pob_choice: to sit
  chosen_spanish: sentarse
  alternatives_spanish:
  - el sentarse
  - tomar asiento
  lexicon: BDAG
  rationale: El infinitivo articular griego funciona como acción verbal sustantivada; en español, 'sentarse' conserva mejor la fuerza verbal y suena natural en una construcción de infinitivo dependiente de 'corresponde'. 'El sentarse' sería más nominal y pesado; 'tomar asiento' añade matiz idiomático no exigido por el texto.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi lado derecho
  - a mi derecha, a mi mano derecha
  lexicon: BDAG
  rationale: La expresión idiomática señala posición al lado derecho. 'A mi derecha' es la forma natural en español y evita introducir 'mano', que no aparece explícitamente en el griego, aunque a veces se sobreentiende idiomáticamente.
- source_word: ἢ ἐξ εὐωνύμων
  english_pob_choice: or at my left
  chosen_spanish: o a mi izquierda
  alternatives_spanish:
  - o a mi lado izquierdo
  - o a la izquierda
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con 'a mi derecha'. 'Izquierda' comunica el sentido direccional de εὐώνυμος sin sobretraducir ni desplazar la simetría retórica.
- source_word: οὐκ ἔστιν ἐμὸν δοῦναι
  english_pob_choice: is not mine to give
  chosen_spanish: no me corresponde darlo
  alternatives_spanish:
  - no es mío darlo
  - no es para mí darlo
  lexicon: BDAG
  rationale: En español, 'no me corresponde darlo' comunica la limitación de prerrogativa que el inglés POB deja explícita sin sonar forzado. 'No es mío darlo' sería más literal pero menos idiomático; 'no es para mí darlo' preserva mejor el matiz de competencia, aunque suena algo menos natural que la opción elegida.
- source_word: ἀλλ’ οἷς
  english_pob_choice: but for those for whom
  chosen_spanish: sino para aquellos para quienes
  alternatives_spanish:
  - sino a aquellos para quienes
  - pero para aquellos para quienes
  lexicon: BDAG
  rationale: '''ἀλλά'' marca contraste, y la elipsis se completa de forma natural en español con ''sino''. La repetición relativa ''para quienes'' conserva la distribución del griego y la claridad referencial.'
- source_word: ἡτοίμασται
  english_pob_choice: it has been prepared
  chosen_spanish: ha sido preparado
  alternatives_spanish:
  - ha sido dispuesto
  - está preparado
  lexicon: BDAG
  rationale: El perfecto pasivo expresa una preparación ya realizada con efecto vigente. 'Ha sido preparado' refleja bien ese aspecto sin añadir un sujeto explícito que el griego omite. 'Ha sido dispuesto' es posible, pero 'preparado' sigue más de cerca el verbo y el uso de la POB inglesa.
theological_decisions:
- issue: La limitación expresada por Jesús en 'no me corresponde darlo' no debe suavizarse ni armonizarse explícitamente con otra formulación teológica ausente del versículo.
  english_pob_reading: Render the clause straightforwardly as 'is not mine to give' without adding explanatory qualifiers.
  chosen_spanish_reading: no me corresponde darlo
  alternative_spanish_readings:
  - no es mío darlo
  - no es para mí darlo aparte de la voluntad del Padre
  rationale: La frase griega afirma una restricción real en el contexto narrativo. 'No me corresponde darlo' mantiene la tensión textual sin convertirla en una negación absoluta de autoridad ni agregar una aclaración doctrinal que el versículo no dice.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se siguió el pasaje tal como está en el texto fuente y la auditoría inglesa; no hubo revisiones aplicadas en la fuente de trabajo, y la redacción española busca conservar la misma tensión interpretativa observada en la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo el paralelo espacial 'a mi derecha / a mi izquierda' para reflejar la simetría del griego.
  - Se evitó 'SEÑOR' u otra sustitución no presente porque el texto no contiene el tetragrámaton ni una cita directa del nombre divino.
  - Se preservó el pasivo perfecto 'ha sido preparado' para reflejar ἡτοίμασται.
  - Se eligió 'sino' para marcar el contraste de ἀλλά con naturalidad española.
  - La nota a se ancla en 'no me corresponde darlo' para ofrecer la alternativa cercana sin alterar el cuerpo principal.
