revisions:
- from: 'quien no reciba[a] cien veces más ahora en este tiempo[b]: casas y hermanos y hermanas y madres y hijos y campos, con persecuciones; y en el siglo venidero[c], vida eterna.'
  to: quien no reciba[a] cien veces más ahora en este tiempo—casas y hermanos y hermanas y madres y hijos e hijas y campos, con persecuciones—; y en la era venidera[b], vida eterna.
  rationale: 'Se revisa para alinear mejor el español con el sentido del griego y la auditoría POB: se evita «hijos» como posible masculinización de τέκνα; se sustituye «siglo venidero» por «era venidera» para reflejar mejor αἰών; se simplifican las notas a alternativas realmente útiles; y se mejora la puntuación para una lectura más natural. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:40:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: recompensa presente contrastada con la era venidera, la lista concreta de bienes y relaciones, y la cláusula explícita «con persecuciones». Sin embargo, hay dos desajustes importantes con el sentido y la auditoría POB: (1) τέκνα se tradujo como «hijos», que en español puede sonar masculino/especificado, mientras el griego es inclusivo «children»; «hijos e hijas» o «niños» tampoco son ideales, y «hijos» no sigue la decisión documentada. (2) ἐν τῷ αἰῶνι τῷ ἐρχομένῳ se vertió «en el siglo venidero», comprensible pero menos fiel al matiz escatológico de αἰών como era/edad; «en la era venidera» comunica mejor el contraste con «este tiempo».'
  spanish_quality_summary: El español es generalmente claro y digno, pero la puntuación con dos puntos y punto y coma resulta algo rígida frente al fluir del original y del estilo POB; las rayas parentéticas funcionan mejor para la enumeración con «con persecuciones». «Cien veces más» es natural, aunque la nota alternativa debe reflejar de manera útil «centuplicado/cien veces tanto» más que repetir casi lo mismo. La legibilidad mejora sustituyendo «siglo venidero» por «era venidera» y «hijos» por «niños» o una forma inclusiva más precisa; aquí «hijos» debe evitarse.
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías/esclavo. Sí hay una cuestión de consistencia semántica: αἰών debe preferir «era» sobre «siglo» aquí, y τέκνα debe mantenerse inclusivo como «niños» o mejor «hijos e hijas» si se quisiera explicitar; para no sobretraducir, «niños» sigue siendo menos exacto que «hijos» en contexto familiar, pero puede sonar etariamente restringido. La opción más fiel y natural es «hijos[aquí no],» perdón: mejor «hijos e hijas» sería interpretativa; por eso conviene «hijos» no. En revisión propongo «hijos e hijas» no porque el griego lo especifique, sino porque en español evita la falsa restricción masculina. Aun así, para no añadir binarización no explícita, la mejor solución es «hijos» no; usaré «hijos e hijas» solo si la naturalidad lo exige. En este caso opto por «hijos e hijas» como reparación mínima de comprensión inclusiva en español eclesial.'
  issues:
  - severity: medium
    issue: «hijos» para τέκνα reduce o masculiniza un término inclusivo
    rationale: τέκνα significa «children», no específicamente varones. La decisión inglesa documentada preserva esa inclusividad. En español, «hijos» puede funcionar genéricamente, pero hoy crea ambigüedad evitable en una lista donde antes sí se distinguieron sexos explícitamente («hermanos y hermanas»).
  - severity: medium
    issue: «siglo venidero» no refleja tan bien αἰών como «era venidera»
    rationale: Aunque «siglo» tiene tradición bíblica, en español moderno suele denotar cien años y puede oscurecer el contraste escatológico entre «este tiempo» y «la era venidera». La auditoría inglesa subraya precisamente «age», no «world» ni un periodo de cien años.
  - severity: low
    issue: La puntuación con dos puntos y punto y coma suena menos natural que rayas
    rationale: El inglés POB usa incisos para la enumeración y la cláusula «with persecutions». En español, las rayas mantienen mejor la unidad de la oración y la legibilidad litúrgica.
  - severity: low
    issue: La nota [b] no añade valor real
    rationale: El texto ya dice «ahora en este tiempo», y la nota «O “en este tiempo”» solo omite «ahora» sin justificar una alternativa significativa. Puede eliminarse.
  revised_spanish_text: quien no reciba[a] cien veces más ahora en este tiempo—casas y hermanos y hermanas y madres y hijos e hijas y campos, con persecuciones—; y en la era venidera[b], vida eterna.
  revised_footnotes:
