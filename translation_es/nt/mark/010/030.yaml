    reason: lexical_alternative
  revision_rationale: 'Se revisa para alinear mejor el español con el sentido del griego y la auditoría POB: se evita «hijos» como posible masculinización de τέκνα; se sustituye «siglo venidero» por «era venidera» para reflejar mejor αἰών; se simplifican las notas a alternativas realmente útiles; y se mejora la puntuación para una lectura más natural. No se requiere adjudicación adicional porque los cambios son claros y de bajo riesgo doctrinal.'
