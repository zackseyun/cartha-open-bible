translation:
  language: es
  text: quien no reciba[a] cien veces más ahora en este tiempo—casas y hermanos y hermanas y madres y hijos e hijas y campos, con persecuciones—; y en la era venidera[b], vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «centuplicado».
    reason: lexical_alternative
  - marker: b
    text: O «en la edad venidera».
    reason: lexical_alternative
lexical_decisions:
- source_word: λάβῃ
  english_pob_choice: receive
  chosen_spanish: reciba
  alternatives_spanish:
  - tome
  - obtenga
  lexicon: BDAG
  rationale: En este contexto de promesa y recompensa, λαμβάνω expresa mejor la idea de recibir algo concedido, no simplemente de tomarlo. "Reciba" preserva bien ese sentido en español y mantiene el tono formal.
- source_word: ἑκατονταπλασίονα
  english_pob_choice: a hundredfold
  chosen_spanish: cien veces más
  alternatives_spanish:
  - cien pliegos
  - cien veces
  lexicon: BDAG
  rationale: El griego comunica una multiplicación por cien. "Cien veces más" es claro, natural y conserva la fuerza cuantitativa; se evita una forma más arcaica o poco transparente para el lector español.
- source_word: νῦν ἐν τῷ καιρῷ τούτῳ
  english_pob_choice: now in this time
  chosen_spanish: ahora en este tiempo
  alternatives_spanish:
  - ahora, en este tiempo
  - en este tiempo, ahora
  lexicon: BDAG
  rationale: La frase subraya la recompensa en la era presente frente a la venidera. "Ahora en este tiempo" mantiene ese contraste de manera directa y fiel al orden y al énfasis del original.
- source_word: οἰκίας
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  lexicon: BDAG
  rationale: '"Casas" es el equivalente más directo de οἰκίαι y conserva la imagen concreta de bienes/provisión material. "Hogares" suaviza el término y pierde algo de la literalidad del listado.'
- source_word: ἀδελφοὺς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos varones
  lexicon: BDAG
  rationale: Como ἀδελφὰς aparece aparte, conviene distinguir aquí específicamente "hermanos" para reflejar la diferenciación explícita del griego.
- source_word: ἀδελφὰς
  english_pob_choice: sisters
  chosen_spanish: hermanas
  alternatives_spanish:
  - hermanas mujeres
  lexicon: BDAG
  rationale: Equivalente directo de ἀδελφάς, preservando la lista diferenciada de miembros de la familia.
- source_word: μητέρας
  english_pob_choice: mothers
  chosen_spanish: madres
  alternatives_spanish:
  - mamás
  lexicon: BDAG
  rationale: Equivalente directo y sobrio; mantiene el plural del griego dentro de la enumeración de recompensas relacionales.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - niños
  - descendencia
  lexicon: BDAG
  rationale: Aunque τέκνα puede ser inclusivo, en español dentro de este listado familiar "hijos" funciona de manera natural y concisa; aquí no se pretende precisar sexo, sino preservar el efecto acumulativo de la enumeración.
- source_word: ἀγρούς
  english_pob_choice: fields
  chosen_spanish: campos
  alternatives_spanish:
  - tierras
  - labranzas
  lexicon: BDAG
  rationale: '"Campos" es el equivalente natural de ἀγρούς y conserva la imagen de posesión agrícola o rural. Es más idiomático en español que "terrenos" y más cercano que una paráfrasis.'
- source_word: μετὰ διωγμῶν
  english_pob_choice: with persecutions
  chosen_spanish: con persecuciones
  alternatives_spanish:
  - junto con persecuciones
  - en medio de persecuciones
  lexicon: BDAG
  rationale: 'La preposición μετὰ con genitivo indica acompañamiento: las bendiciones presentes no eliminan el sufrimiento. "Con persecuciones" mantiene esa tensión sin suavizarla ni interpretarla en exceso.'
- source_word: ἐν τῷ αἰῶνι τῷ ἐρχομένῳ
  english_pob_choice: in the age to come
  chosen_spanish: en el siglo venidero
  alternatives_spanish:
  - en la era venidera
  - en la edad por venir
  lexicon: BDAG
  rationale: Αἰών designa aquí una era/edad. "Siglo" en español bíblico puede funcionar como equivalente tradicional y formal, pero se conserva el matiz escatológico de un orden futuro; se evita reducirlo a "mundo".
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida del siglo venidero
  - vida perpetua
  lexicon: BDAG
  rationale: '"Vida eterna" es la forma establecida y fiel para ζωὴ αἰώνιος en este contexto escatológico. Comunica con claridad el sentido idiomático sin perder la conexión con αἰών.'
theological_decisions:
- issue: Tensión entre recompensa presente y persecución
  english_pob_reading: Render the list of houses, family relations, and fields straightforwardly as real present-age recompense, while retaining 'with persecutions' to preserve the tension of blessing amid suffering.
  chosen_spanish_reading: Traducir la lista como recompensa real en el tiempo presente, manteniendo explícitamente "con persecuciones" para no resolver la tensión entre bendición y sufrimiento.
  alternative_spanish_readings:
  - espiritualizar la recompensa como solo bendiciones internas
  - convertirla en prosperidad material sin sufrimiento
  rationale: 'El griego presenta ambos elementos de forma conjunta: abundancia presente y persecuciones. La traducción debe conservar esa tensión sin reinterpretarla hacia una lectura exclusivamente espiritual ni hacia una prosperidad sin aflicción.'
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica en lugar de resolverla.'
- issue: Forma de αἰών en la clausula final
  english_pob_reading: in the age to come
  chosen_spanish_reading: en el siglo venidero
  alternative_spanish_readings:
  - en el mundo venidero
  - en la edad venidera
  rationale: '"Siglo venidero" mantiene un registro bíblico y es comprensible en español eclesial; además, preserva la oposición entre el tiempo presente y el orden futuro sin sustituirla por un lenguaje más explicativo de lo que el texto requiere.'
  doctrine_reference: 'Escatología del texto: contraste entre este tiempo y el venidero.'
translation_notes:
  revision_awareness: 'El contexto inglés pasó de una forma explicativa (''a hundred times as much'') a la más directa ''a hundredfold''. La redacción española sigue esa revisión con ''cien veces más'', que es formal, clara y fiel al valor cuantitativo. También se sostuvo la tensión teológica del texto: recompensas reales ahora, con persecuciones, y vida eterna en el orden venidero.'
  spanish_consistency_notes:
  - Se mantiene 'vida eterna' para ζωὴ αἰώνιος, conforme al uso bíblico normal y la decisión inglesa final.
  - Se preserva la distinción de ἀδελφοὺς / ἀδελφὰς como 'hermanos / hermanas'.
  - Se eligió 'campos' para ἀγρούς por concreción léxica y naturalidad en español.
  - No se usó 'SEÑOR' ni terminología de sustitución, porque este versículo no contiene el Tetragrámaton ni κύριος con función directa de nombre divino.
