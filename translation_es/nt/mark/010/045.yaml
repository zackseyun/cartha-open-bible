translation:
  language: es
  text: Porque incluso el Hijo del Hombre no vino para ser servido, sino para servir, y para dar su vida en rescate por muchos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en lugar de muchos». La preposición detrás de «por» puede llevar el sentido de sustitución o intercambio.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque incluso
  alternatives_spanish:
  - Porque
  - Y también
  - Pues incluso
  lexicon: BDAG
  rationale: La secuencia introduce una explicación con énfasis; «porque» conserva el valor de γάρ, y «incluso» refleja el refuerzo de καί sin sonar forzado en español.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hijo del ser humano
  lexicon: BDAG
  rationale: Se conserva el título establecido y su resonancia daniélica; una paráfrasis interpretativa debilitaría la carga intertextual del griego.
- source_word: οὐκ ἦλθεν
  english_pob_choice: did not come
  chosen_spanish: no vino
  alternatives_spanish:
  - no llegó
  - no ha venido
  lexicon: BDAG
  rationale: El aoristo de ἔρχομαι se rinde de forma natural con «vino» en español, manteniendo la idea de venir con propósito en el contexto de los infinitivos siguientes.
- source_word: διακονηθῆναι
  english_pob_choice: to be served
  chosen_spanish: para ser servido
  alternatives_spanish:
  - para ser atendido
  - para que le sirvieran
  - para recibir servicio
  lexicon: BDAG
  rationale: «Servido» preserva la relación léxica con διακονῆσαι en la segunda mitad del versículo y mantiene el contraste verbal sin volverlo eclesiástico de más.
- source_word: ἀλλὰ διακονῆσαι
  english_pob_choice: but to serve
  chosen_spanish: sino para servir
  alternatives_spanish:
  - sino para ministrar
  - sino para prestar servicio
  lexicon: BDAG
  rationale: «Sino» reproduce mejor la oposición fuerte de ἀλλά en español, y «servir» conserva la repetición de la misma raíz verbal frente a «ser servido».
- source_word: δοῦναι
  english_pob_choice: to give
  chosen_spanish: para dar
  alternatives_spanish:
  - para entregar
  - para ofrecer
  lexicon: BDAG
  rationale: «Dar» es la equivalencia básica y suficientemente amplia; evita introducir una especificación más estrecha que el verbo no exige por sí mismo.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su propia vida
  - su ser
  lexicon: BDAG
  rationale: En este contexto ψυχή apunta a la vida entregada hasta la muerte, no a «alma» en sentido abstracto; «vida» es la opción más clara y fiel en español.
- source_word: λύτρον
  english_pob_choice: a ransom
  chosen_spanish: rescate
  alternatives_spanish:
  - precio de rescate
  - redención
  - rescate/liberación
  lexicon: BDAG
  rationale: «Rescate» comunica el valor de precio pagado para liberar, y en español puede cargar suficientemente la fuerza de λύτρον sin añadir perífrasis innecesaria.
- source_word: ἀντὶ πολλῶν
  english_pob_choice: for many
  chosen_spanish: por muchos
  alternatives_spanish:
  - en lugar de muchos
  - en vez de muchos
  - a favor de muchos
  lexicon: BDAG
  rationale: «Por muchos» es idiomático y corresponde al uso tradicional de la frase; la preposición ἀντί puede implicar intercambio o sustitución, pero el español debe conservar la fluidez sin ocultar esa tensión.
theological_decisions:
- issue: Fuerza sustitucionaria de ἀντί en la cláusula final
  english_pob_reading: Render idiomatically as 'for many' in the main text while preserving the more explicit substitutional nuance in a footnote.
  chosen_spanish_reading: «por muchos» en el texto principal, con nota que explicita «en lugar de muchos» como posibilidad léxica.
  alternative_spanish_readings:
  - en lugar de muchos
  - en vez de muchos
  - a favor de muchos
  rationale: ἀντί puede expresar intercambio o sustitución; el texto principal mantiene una formulación natural y reconocible, mientras la nota deja auditable la fuerza más precisa del preposición sin resolverla en exceso.
  doctrine_reference: Preservar la tensión léxica y teológica sin simplificarla.
translation_notes:
  revision_awareness: 'El pasaje coincide en alto grado con el audit trail inglés: se mantiene el orden retórico básico, el contraste «no vino… sino…», la relación léxica entre «ser servido» y «servir», y la tensión de ἀντί en la nota. No se observaron revisiones pendientes en el expediente de origen.'
  spanish_consistency_notes:
  - Se prefirió «Hijo del Hombre» como título establecido, coherente con el uso confesional y la resonancia del original.
  - Se mantuvo «rescate» para λύτρον por ser breve, fiel y naturalmente comprensible en español.
  - Se evitó «siervo» y «ministerio» para no debilitar el contraste verbal de διακονέω ni introducir un registro eclesiástico innecesario.
  - La nota usa «por» en el texto y explicita la alternativa «en lugar de» para conservar auditable la fuerza de ἀντί.
  - El estilo general es formal y readable, sin arcaísmos innecesarios.
