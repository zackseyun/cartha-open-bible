  to: Y en la casa, los discípulos le preguntaban de nuevo acerca de esto.
  rationale: Se reubica 'de nuevo' para que modifique claramente el verbo 'preguntaban', en línea con el análisis contextual de πάλιν en el expediente inglés, y se simplifica la puntuación para un español más natural sin alterar el sentido.
