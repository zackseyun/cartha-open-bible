translation:
  language: es
  text: Y en la casa, los discípulos le preguntaban de nuevo acerca de esto.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y luego
  - Entonces
  lexicon: BDAG
  rationale: La conjunción mantiene la continuidad narrativa simple sin añadir matices temporales que el griego no explicita.
- source_word: εἰς τὴν οἰκίαν
  english_pob_choice: when they were back in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - dentro de la casa
  - en casa
  lexicon: BDAG
  rationale: El griego dice literalmente 'hacia/into la casa', pero en este contexto narrativo funciona como localización de escena. 'En la casa' comunica naturalmente el nuevo ámbito privado sin expandir la frase.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Se conserva la repetición explícita del adverbio. 'De nuevo' suena natural y mantiene la idea de reiteración sin forzar el orden de la cláusula.
- source_word: οἱ μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - sus discípulos
  lexicon: BDAG
  rationale: El artículo identifica al grupo conocido; no hace falta añadir 'sus'. 'Los discípulos' es fiel y sobrio.
- source_word: περὶ τούτου
  english_pob_choice: about this
  chosen_spanish: acerca de esto
  alternatives_spanish:
  - sobre esto
  - con respecto a esto
  - acerca de este asunto
  lexicon: BDAG
  rationale: '''Acerca de esto'' reproduce bien el valor de περί con objeto pronominal, manteniendo la referencia al tema inmediato sin sobreespecificarlo.'
- source_word: ἐπηρώτων
  english_pob_choice: were asking
  chosen_spanish: preguntaban
  alternatives_spanish:
  - seguían preguntándole
  - le hacían preguntas
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso o repetida. 'Preguntaban' conserva esa imperfectividad de manera natural en español, sin introducir el comienzo de la acción que no está en el griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: En español, el dativo de objeto indirecto con 'preguntar' se expresa normalmente con 'le'. Aunque el griego tiene objeto directo, la construcción española más natural es 'le preguntaban'.
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de una expansión temporal (''when they were back'') y un inicio aspectual (''began'') a una formulación más cercana al griego (''were asking''). La redacción española sigue esa dirección: evita añadir ''cuando regresaron'' o ''empezaron'', y conserva solo la iteración implícita en ''de nuevo'' y el imperfecto ''preguntaban''.'
  spanish_consistency_notes:
  - Se mantiene 'discípulos' sin posesivo añadido, en armonía con el artículo definido del griego.
  - '''De nuevo'' se coloca al inicio por fluidez del español, aunque modifica el verbo de manera equivalente.'
  - No se crea una nota de pie porque no hay variantes textuales ni tensiones léxicas que requieran anclaje adicional en esta breve unidad.
