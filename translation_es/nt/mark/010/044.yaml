translation:
  language: es
  text: Y cualquiera que quiera ser el primero entre ustedes será esclavo de todos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo de todos». El griego usa δοῦλος, un término más fuerte que la palabra para «servidor/siervo» del versículo anterior, por eso aquí se traduce «esclavo» para conservar el contraste.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς ἂν θέλῃ
  english_pob_choice: whoever wants
  chosen_spanish: cualquiera que quiera
  alternatives_spanish:
  - quien quiera
  - todo el que quiera
  lexicon: BDAG
  rationale: La construcción relativa con ἄν y subjuntivo expresa una condición general e indefinida. «Cualquiera que quiera» conserva ese valor abierto y la voluntad implícita de θέλω sin volver la frase rígida o arcaica.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: En este contexto de jerarquía y relación dentro del grupo, la expresión significa pertenencia o rango dentro de la comunidad, no ubicación física. «Entre ustedes» es natural en español y preserva ese sentido relacional.
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: el primero
  alternatives_spanish:
  - el principal
  - el mayor
  lexicon: BDAG
  rationale: πρῶτος indica prioridad o rango. «El primero» es la traducción más directa y mantiene el paralelismo con la enseñanza sobre grandeza y precedencia.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - ha de ser
  lexicon: BDAG
  rationale: El futuro de εἰμί se traduce de manera directa como «será». En el contexto funciona con fuerza instructiva, pero el español puede conservar esa fuerza sin convertirlo en una paráfrasis normativa más fuerte.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de todas las personas
  - de todos ustedes
  lexicon: BDAG
  rationale: El genitivo plural con δοῦλος expresa relación o subordinación respecto de todos. «De todos» es conciso y conserva el alcance universal del dicho.
- source_word: δοῦλος
  english_pob_choice: the slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Se preserva la fuerza más fuerte del término. En contraste con διάκονος en el versículo anterior, δοῦλος intensifica el rebajamiento social. «Esclavo» mantiene esa tensión léxica mejor que «siervo».
theological_decisions:
- issue: Contraste entre διάκονος y δοῦλος en la enseñanza sobre la grandeza
  english_pob_reading: The English POB keeps 'slave' here to preserve the contrast with 'servant' in the previous verse.
  chosen_spanish_reading: «Esclavo» para δοῦλος, manteniendo el contraste con el «servidor/siervo» del versículo anterior según el contexto de la sección.
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: La diferencia entre ambos términos griegos tiene peso retórico y teológico en la enseñanza de Jesús. Traducir ambos con una sola palabra borraría la escalada deliberada del texto. «Esclavo» preserva mejor la humillación voluntaria y la inversión de valores.
  doctrine_reference: 'DOCTRINE.md: contested terms table for δοῦλος; translation philosophy on preserving lexical contrast'
translation_notes:
  revision_awareness: El control de revisión del contexto inglés añade el artículo «the» antes de slave para mayor naturalidad idiomática. En español, ese matiz se refleja de forma natural con el artículo definido implícito en «ser esclavo de todos», sin necesidad de marcarlo aparte.
  spanish_consistency_notes:
  - Se mantiene «ustedes» como forma neutral latinoamericana.
  - Se conserva «esclavo» para δοῦλος por la tensión léxica documentada frente a διάκονος.
  - No se usa «SEÑOR» ni otras fórmulas de máscara, porque este versículo no contiene el nombre divino.
  - La puntuación final sigue el estilo publicado en español bíblico contemporáneo.
