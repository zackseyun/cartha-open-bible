translation:
  language: es
  text: 'Y mirando alrededor, Jesús dice a sus discípulos: «¡Qué difícil es para los que tienen riquezas[a] entrar en el reino de Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «los que tienen dinero» o «los que poseen riquezas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  english_pob_choice: looking around
  chosen_spanish: mirando alrededor
  alternatives_spanish:
  - después de mirar alrededor
  - habiendo mirado alrededor
  - echando una mirada alrededor
  lexicon: BDAG
  rationale: El participio aoristo medio marca una acción previa y completa respecto del verbo principal; en español, «mirando alrededor» conserva la relación verbal sin volverla pesada. Evita añadir un «después» que no es necesario para la naturalidad del español y sigue el ajuste del auditable inglés POB hacia una forma más directa.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: BDAG
  rationale: El presente histórico de Marcos se conserva mejor con «dice», que mantiene vivacidad narrativa y refleja el valor aspectual del griego sin convertirlo en pasado simple.
- source_word: Πῶς δυσκόλως
  english_pob_choice: How difficult it is
  chosen_spanish: ¡Qué difícil es!
  alternatives_spanish:
  - ¡Con qué dificultad!
  - ¡Qué difícil será!
  - ¡Cuán difícil es!
  lexicon: BDAG
  rationale: La combinación expresa énfasis exclamativo en la dificultad. En español, «¡Qué difícil es!» comunica de forma natural la fuerza retórica del griego sin introducir una modalidad futura que el texto no exige.
- source_word: οἱ τὰ χρήματα ἔχοντες
  english_pob_choice: those who have wealth
  chosen_spanish: los que tienen riquezas
  alternatives_spanish:
  - los que tienen dinero
  - los que poseen riquezas
  - los ricos
  lexicon: BDAG
  rationale: La frase participial se conserva de manera transparente con «los que tienen riquezas». «Riquezas» mantiene la amplitud semántica de χρήματα mejor que «dinero» y evita convertir la descripción en una etiqueta social fija como «los ricos».
- source_word: χρήματα
  english_pob_choice: wealth
  chosen_spanish: riquezas
  alternatives_spanish:
  - dinero
  - bienes
  - fortuna
  lexicon: BDAG
  rationale: χρήματα puede abarcar dinero, bienes o recursos materiales. «Riquezas» reproduce bien ese campo semántico y mantiene la tensión del dicho sobre posesiones materiales en general.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - la realeza de Dios
  - el reinado de Dios
  lexicon: BDAG
  rationale: Se conserva la formulación bíblica directa «el reino de Dios», que es clara en español y fiel a la imagen concreta del sustantivo βασιλεία. Aunque «reinado» podría expresar el sentido dinámico, aquí el lenguaje de reino es el más transparente y tradicionalmente inteligible.
- source_word: εἰσελεύσονται
  english_pob_choice: to enter
  chosen_spanish: entrar
  alternatives_spanish:
  - ingresar
  - meterse
  - acceder
  lexicon: BDAG
  rationale: El verbo futuro medio indica «entrarán». En español, después de «es difícil», el infinitivo «entrar» expresa naturalmente esa idea sin perder la orientación futura del enunciado.
theological_decisions:
- issue: La dificultad del acceso al reino para quienes poseen bienes
  english_pob_reading: Rendered as severe difficulty, not impossibility.
  chosen_spanish_reading: Se expresa como gran dificultad, no como imposibilidad.
  alternative_spanish_readings:
  - Se expresa como imposibilidad práctica.
  - Se suaviza la advertencia a una simple complicación.
  rationale: El griego usa δυσκόλως, que señala dificultad intensa, no imposibilidad. La traducción mantiene la tensión teológica del dicho sin resolverla ni endurecerla más de lo que el texto afirma.
  doctrine_reference: Preservar la tensión teológica del texto.
translation_notes:
  revision_awareness: El inglés POB pasó de «How difficult it will be» a «How difficult it is» para ajustarse mejor al griego; por eso el español evita una futura innecesaria y usa una exclamación presente («¡Qué difícil es!»). También se respetó el valor del participio inicial con una construcción verbal directa («mirando alrededor») y se mantuvo la alternativa léxica de χρήματα con una nota breve.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se conserva «reino de Dios» como formulación bíblica clara y estable.
  - Se evita «los ricos» para no borrar la expresión participial del griego.
  - La nota al pie marca la ambigüedad de χρήματα sin desplazar la opción principal de «riquezas».
