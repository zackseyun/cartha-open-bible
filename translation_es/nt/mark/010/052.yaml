translation:
  language: es
  text: 'Y Jesús le dijo[a]: «Vete[b]; tu fe[c] te ha salvado». Y enseguida recobró la vista y lo siguió por el camino.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te ha hecho bien» o «te ha sanado». El verbo griego puede referirse tanto a sanidad como a salvación.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el camino».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «confianza» aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Vete
  alternatives_spanish:
  - Ve
  - Anda
  lexicon: BDAG
  rationale: El imperativo expresa salida o partida; en español, «Vete» comunica con naturalidad la orden de irse. Mantiene el movimiento implícito sin añadir matices posesivos o de destino que el griego no exige.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - creencia
  lexicon: BDAG
  rationale: Sigo la decisión léxica del POB en inglés de mantener «faith/fe» como término clave. «Confianza» es posible en este contexto, pero «fe» conserva mejor la consistencia terminológica del proyecto y la amplitud religiosa del término.
- source_word: σέσωκέν
  english_pob_choice: has saved
  chosen_spanish: te ha salvado
  alternatives_spanish:
  - te ha sanado
  - te ha curado
  - te ha hecho bien
  lexicon: BDAG
  rationale: «Ha salvado» preserva el rango semántico de σῴζω, que puede abarcar rescate, salvación y también sanidad. Dado que el contexto narra recuperación de la vista, pero la forma verbal es más amplia, la traducción conserva esa tensión en vez de reducirla a una mera curación física.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» reproduce la rapidez narrativa de Mark y suena natural en español moderno. Mantiene el impulso del relato sin sonar excesivamente técnico o forzado.
- source_word: ἀνέβλεψεν
  english_pob_choice: regained his sight
  chosen_spanish: recobró la vista
  alternatives_spanish:
  - recibió la vista
  - volvió a ver
  lexicon: BDAG
  rationale: En este contexto de sanidad de un ciego, «recobró la vista» expresa de forma idiomática la restauración visual. Evita el literalismo de «levantó la vista», que sería engañoso aquí.
- source_word: ἠκολούθει
  english_pob_choice: followed
  chosen_spanish: lo siguió
  alternatives_spanish:
  - iba siguiéndolo
  - lo seguía
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir continuidad, el castellano natural en este contexto narrativo funciona bien con «lo siguió». La acción queda claramente ligada al movimiento discipular sin sobrecargar el aspecto verbal.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - sobre el camino
  lexicon: BDAG
  rationale: «Por el camino» conserva la imagen concreta de desplazamiento y resulta más natural que un calco rígido. También deja abierto, como en Marcos, el posible eco de «camino» como modo de seguimiento, sin imponerlo.
- source_word: καὶ ὁ Ἰησοῦς
  english_pob_choice: And Jesus
  chosen_spanish: Y Jesús
  alternatives_spanish:
  - Entonces Jesús
  lexicon: BDAG
  rationale: Conservo la coordinación narrativa simple del griego con «Y» para reflejar el flujo del relato sin interpretar de más la secuencia.
theological_decisions:
- issue: Alcance de σῴζω en la declaración de Jesús
  english_pob_reading: Rendered broadly as 'has saved you' rather than narrowly as physical healing only.
  chosen_spanish_reading: «Te ha salvado» se mantiene como formulación amplia, no restringida a sanidad física.
  alternative_spanish_readings:
  - te ha sanado
  - te ha curado
  - te ha hecho bien
  rationale: La escena muestra restauración de la vista, pero el verbo griego permite una lectura más amplia que incluye salvación. Mantener «salvado» preserva la tensión entre sanidad corporal y rescate/salvación, en línea con la estrategia del POB de no resolver prematuramente el alcance teológico del término.
  doctrine_reference: 'Translation philosophy §3; contested terms: πίστις'
- issue: Relación entre la fe del hombre y la respuesta de Jesús
  english_pob_reading: '''Your faith has saved you'' with ''faith'' potentially also expressed as ''trust''.'
  chosen_spanish_reading: «Tu fe» se conserva como expresión principal, sin sustituirla por «confianza».
  alternative_spanish_readings:
  - tu confianza te ha salvado
  - tu confianza te ha sanado
  rationale: En español, «fe» es el equivalente más estable y reconocible para πίστις dentro del registro bíblico. «Confianza» aclara un aspecto relacional posible, pero debilita la consistencia terminológica del texto base y no es necesaria para la inteligibilidad.
  doctrine_reference: 'Contested terms: πίστις'
translation_notes:
  revision_awareness: 'Revisé la salida anterior para corregir el anclaje de notas: ahora cada marcador [a], [b] y [c] aparece exactamente en el texto español. También alineé la elección verbal final con la revisión inglesa más reciente, usando un pasado simple natural en español para la acción de seguir, mientras mantengo la amplitud semántica de σῴζω y la continuidad narrativa de Marcos.'
  spanish_consistency_notes:
  - Se mantiene «Y» para καί inicial, siguiendo el flujo narrativo del POB.
  - Se usa «Jesús» y no una sustitución litúrgica, conforme al nombre propio del griego.
  - «Fe» se conserva como término técnico consistente con el POB y con el léxico bíblico habitual en español.
  - «Salvado» preserva la amplitud de σῴζω; no se reduce a una sanidad física exclusiva.
  - «Por el camino» conserva la concreción espacial y el posible eco discipular sin forzarlo.
  - Las notas al pie están todas ancladas y no se reutiliza ningún marcador.
