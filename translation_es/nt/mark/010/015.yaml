translation:
  language: es
  text: 'En verdad les digo[a]: el que no reciba el reino de Dios como un niño, de ningún modo entrará en él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "como niño". La frase puede aludir a humildad, confianza o dependencia infantiles, pero el griego no especifica cuál matiz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De veras
  alternatives_spanish:
  - En verdad
  - Ciertamente
  lexicon: BDAG
  rationale: ἀμήν introduce una declaración solemne y autorizada. 'De veras' comunica esa solemnidad en español natural sin transliterar la forma hebrea/araméa ni volverla más enfática de lo que el griego indica aquí con un solo ἀμήν.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: El presente indicativo con el dativo plural se expresa de forma directa y natural con 'les digo'. Mantiene la transparencia del griego y su tono discursivo sin añadir matices ajenos.
- source_word: ὃς ἂν
  english_pob_choice: whoever
  chosen_spanish: el que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: La construcción relativa con ἄν tiene valor generalizador. 'El que' reproduce bien en español ese sentido abierto y universal, con un registro sobrio y fluido.
- source_word: μὴ δέξηται
  english_pob_choice: does not receive
  chosen_spanish: no reciba
  alternatives_spanish:
  - no acepte
  - no acoja
  lexicon: BDAG
  rationale: δέχομαι puede significar recibir, aceptar o acoger. 'Reciba' preserva mejor la imagen de receptividad ante 'el reino de Dios' y evita desplazar el foco hacia una decisión meramente intelectual o emocional.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' es la equivalencia más directa y reconocible para βασιλείαν τοῦ θεοῦ en los Evangelios. En español conserva tanto la dimensión de dominio como la de gobierno sin forzar una sola de ellas.'
- source_word: ὡς παιδίον
  english_pob_choice: like a child
  chosen_spanish: como un niño
  alternatives_spanish:
  - como un niño pequeño
  - como un niño[a]
  lexicon: BDAG
  rationale: παιδίον designa un niño; 'como un niño' es una comparación natural y fiel. Evita añadir 'pequeño' como énfasis no explicitado por el sustantivo, y deja abierta la tensión interpretativa sobre qué rasgo infantil está en vista.
- source_word: οὐ μὴ εἰσέλθῃ
  english_pob_choice: will certainly not enter
  chosen_spanish: de ningún modo entrará
  alternatives_spanish:
  - no entrará en absoluto
  - ciertamente no entrará
  lexicon: BDAG
  rationale: οὐ μή con subjuntivo aoristo expresa negación enfática. 'De ningún modo entrará' transmite con fuerza y naturalidad esa imposibilidad solemnemente afirmada en español contemporáneo.
- source_word: εἰς αὐτήν
  english_pob_choice: it
  chosen_spanish: en él
  alternatives_spanish:
  - en ella
  - dentro de él
  lexicon: BDAG
  rationale: El pronombre retoma 'el reino'. En español, 'reino' es masculino, por lo que 'en él' evita un calco discordante y mantiene la referencia sin redundancia.
theological_decisions:
- issue: Sentido de recibir el reino 'como un niño'
  english_pob_reading: Retain the simile without specifying which childlike quality is intended.
  chosen_spanish_reading: Mantener la comparación abierta, sin precisar si se trata de humildad, confianza o dependencia.
  alternative_spanish_readings:
  - como un niño en humildad
  - como un niño en confianza
  - como un niño en dependencia
  rationale: El griego presenta la comparación pero no define la cualidad exacta. La traducción conserva esa tensión teológica y evita importar una interpretación tradicional que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones recientes; el estado auditado más reciente indica que el texto en inglés quedó sin cambios y con acuerdo alto entre revisores.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se conserva 'reino de Dios' en vez de 'reinado de Dios' por fidelidad al uso sinóptico y a la claridad eclesial.
  - Se traduce la negación enfática οὐ μή con una forma natural en español ('de ningún modo') para preservar la fuerza sin arcaísmo.
  - La nota [a] se ancla en 'como un niño' para reflejar la alternativa lingüística documentada en el audit trail.
