    rationale: '''De veras'' puede comunicar verdad, pero en español neutro actual suena más conversacional que solemne. Dado el estilo meta ''moderno pero digno'' y la naturaleza formulaica de ἀμὴν λέγω ὑμῖν, ''En verdad'' es una opción más fiel al tono.'
