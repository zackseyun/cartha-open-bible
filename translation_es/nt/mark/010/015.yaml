    rationale: 'El texto de la nota dice ''O: “como un niño”'', que repite exactamente la redacción principal. Según el rastro inglés, la alternativa es ''como niño'' / ''como un niño'' según matiz de ὡς. En español conviene reflejar una alternativa real, por ejemplo ''O: “como niño”''.'
