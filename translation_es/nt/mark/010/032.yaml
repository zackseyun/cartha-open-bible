translation:
  language: es
  text: Iban por el camino[a], subiendo a Jerusalén, y Jesús iba delante de ellos[b]; y se asombraban, mientras los que seguían tenían miedo. Y tomando aparte otra vez a los Doce, comenzó a decirles las cosas que iban a sucederle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el camino».
    reason: lexical_alternative
  - marker: b
    text: O «yendo delante de ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - en el camino, de viaje
  lexicon: BDAG
  rationale: El griego usa una expresión idiomática de movimiento en ruta. «Por el camino» mantiene la escena concreta y suena natural en español, sin perder el valor espacial del itinerario.
- source_word: ἀναβαίνοντες εἰς Ἱεροσόλυμα
  english_pob_choice: going up to Jerusalem
  chosen_spanish: subiendo a Jerusalén
  alternatives_spanish:
  - yendo a Jerusalén
  - ascendiendo a Jerusalén
  lexicon: BDAG
  rationale: Conserva la imagen bíblica tradicional de subir a Jerusalén, que en español sigue siendo clara y fiel al matiz de elevación y peregrinación.
- source_word: προάγων αὐτοὺς
  english_pob_choice: going ahead of them
  chosen_spanish: iba delante de ellos
  alternatives_spanish:
  - los iba guiando
  - iba delante de ellos, abriéndoles paso
  lexicon: BDAG
  rationale: La participación describe posición y movimiento en frente del grupo. «Iba delante de ellos» refleja con transparencia el sentido sin añadir una interpretación como «guiando».
- source_word: ἐθαμβοῦντο
  english_pob_choice: they were astonished
  chosen_spanish: se asombraban
  alternatives_spanish:
  - estaban asombrados
  - quedaban atónitos
  lexicon: BDAG
  rationale: El verbo expresa fuerte sorpresa o desconcierto. «Se asombraban» mantiene ese matiz y la forma imperfectiva continua, sin exagerar hacia terror o escándalo.
- source_word: οἱ δὲ ἀκολουθοῦντες
  english_pob_choice: those who were following
  chosen_spanish: los que seguían
  alternatives_spanish:
  - los que iban siguiendo
  - sus seguidores
  lexicon: BDAG
  rationale: Se conserva la construcción participial de manera natural en español y sin precisar más de lo que dice el griego sobre el grupo.
- source_word: ἐφοβοῦντο
  english_pob_choice: were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - estaban atemorizados
  - sentían temor
  lexicon: BDAG
  rationale: La diferencia con «se asombraban» se conserva. «Tenían miedo» es una solución directa y clara para el imperfecto medio, apropiada al contexto narrativo.
- source_word: παραλαβὼν πάλιν τοὺς δώδεκα
  english_pob_choice: taking the Twelve aside again
  chosen_spanish: tomando aparte otra vez a los Doce
  alternatives_spanish:
  - tomando a los Doce aparte otra vez
  - volviendo a tomar aparte a los Doce
  lexicon: BDAG
  rationale: «Tomando aparte» expresa el valor contextual de separar al grupo para instrucción privada. «Otra vez» reproduce πάλιν con naturalidad, y «los Doce» mantiene el título establecido.
- source_word: ἤρξατο αὐτοῖς λέγειν
  english_pob_choice: he began to tell
  chosen_spanish: comenzó a decirles
  alternatives_spanish:
  - empezó a decirles
  - comenzó a hablarles
  lexicon: BDAG
  rationale: El español natural prefiere «comenzó a decirles» para la construcción inceptiva con contenido de discurso. Mantiene la iniciación de la enseñanza sin añadir matices.
- source_word: τὰ μέλλοντα αὐτῷ συμβαίνειν
  english_pob_choice: the things that were about to happen to him
  chosen_spanish: las cosas que iban a sucederle
  alternatives_spanish:
  - lo que estaba por sucederle
  - las cosas que estaban por acontecerle
  lexicon: BDAG
  rationale: La frase expresa eventos inminentes, no necesariamente destino técnico. «Iban a sucederle» conserva esa proximidad futura de modo claro y idiomático.
theological_decisions:
- issue: Diferencia emocional entre el grupo principal y los que seguían
  english_pob_reading: Render ἐθαμβοῦντο and ἐφοβοῦντο distinctly as 'were astonished' and 'were afraid.'
  chosen_spanish_reading: Se distinguen claramente «se asombraban» y «tenían miedo».
  alternative_spanish_readings:
  - unificar ambos con un solo término de temor
  - suavizar ambos como simple sorpresa
  rationale: El texto griego usa verbos distintos y parece contrastar dos reacciones. Mantener la distinción preserva la tensión narrativa en vez de armonizarla.
  doctrine_reference: Preservar la tensión narrativa sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se sigue de cerca el texto griego SBLGNT y el control auditado de la POB en inglés, conservando la distinción entre sorpresa y miedo, la inmediatez de la subida a Jerusalén y el valor inceptivo de ἤρξατο χωρίς calco excesivo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - «Jesús» y «los Doce» se conservan como formas establecidas y naturalizadas en español.
  - Se evita «Cristo» porque el versículo no contiene Χριστός ni exige esa formulación.
  - La puntuación reproduce el avance narrativo con pausas equivalentes a las del griego y al estilo POB en inglés.
