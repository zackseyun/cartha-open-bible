    text: O «yendo delante de ellos».
    reason: lexical_alternative
  revision_rationale: Se corrige el arranque narrativo para reflejar mejor δὲ, y se reubica la nota [b] al sintagma «iba delante de ellos», que es el lugar donde corresponde la alternativa documentada para προάγων αὐτούς. También se aligera la puntuación para un español más natural sin cambiar el sentido.
