    text: O «ningún ser humano» / «una persona». El griego usa el singular masculino de manera genérica.
    reason: lexical_alternative
  revision_rationale: Se corrige únicamente el sujeto divino de «Yahvé» a «Dios» para ajustarlo al griego ὁ θεός y al registro terminológico del proyecto. Se conserva el resto del texto porque refleja bien la estructura, el sentido y la nota inclusiva del original.
