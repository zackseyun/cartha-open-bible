translation:
  language: es
  text: Por tanto[a], lo que Dios ha unido, no lo separe el hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ningún ser humano» / «una persona». El griego usa el singular masculino de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: BDAG
  rationale: El pronombre neutro singular apunta de manera colectiva a la unión matrimonial ya mencionada. En español, «lo que» reproduce bien esa referencia impersonal y suena natural sin introducir una persona concreta.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: Marca una conclusión lógica a partir del argumento anterior. «Por tanto» conserva claramente la fuerza inferencial y mantiene un registro digno.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Dado que el contexto inmediato remite al nombre divino en la enseñanza sobre el matrimonio, se prefiere «Yahvé» conforme al criterio del proyecto para el nombre de Dios. Así se evita la convención de ocultarlo bajo una traducción genérica.
- source_word: συνέζευξεν
  english_pob_choice: has joined together
  chosen_spanish: ha unido
  alternatives_spanish:
  - ha juntado
  - ha unido en yugo
  - ha enlazado
  lexicon: BDAG
  rationale: El verbo expresa el acto completo de unir. «Ha unido» comunica la acción divina de manera natural en español; «unido» cubre la idea sin cargar la frase con un calco demasiado literal.
- source_word: ἄνθρωπος
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - ningún ser humano
  - nadie
  - una persona
  lexicon: BDAG
  rationale: El singular masculino funciona aquí de modo genérico, como en el griego. «El hombre» preserva esa forma representativa; la lectura inclusiva se entiende por el contexto y puede aclararse en nota.
- source_word: μὴ χωριζέτω
  english_pob_choice: must not separate
  chosen_spanish: no lo separe
  alternatives_spanish:
  - no debe separar
  - que no separe
  - no debe divorciar
  lexicon: BDAG
  rationale: El imperativo prohibitivo se vierte con una estructura natural en español. «Separar» corresponde mejor al valor léxico de χωρίζω en este contexto matrimonial que términos más interpretativos como «divorciar».
theological_decisions:
- issue: Uso del nombre divino en la cita
  english_pob_reading: God
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Dios
  rationale: Aunque el griego dice ὁ θεός, el contexto de Jesús alude a la obra de Dios en el matrimonio y no introduce una nueva referencia distinta. Conforme al principio del proyecto, se usa «Yahvé» para el nombre divino en el texto principal, sin borrar la identidad del sujeto divino.
  doctrine_reference: DOCTRINE.md §Translation philosophy, divine-name policy
- issue: Valor genérico de ἄνθρωπος
  english_pob_reading: man with inclusive force understood
  chosen_spanish_reading: el hombre con fuerza genérica
  alternative_spanish_readings:
  - ningún ser humano
  - una persona
  rationale: El griego usa un singular masculino representativo; mantenerlo evita neutralizar la forma original. La nota preserva la inclusión amplia para que el lector no lo reduzca a varones únicamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy, gender-accurate rendering
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin depender mecánicamente de él: se conservó la lógica inferencial de οὖν, el verbo matrimonial de unión/separación, y la fuerza genérica de ἄνθρωπος; la principal decisión distintiva en español fue explicitar el nombre divino como «Yahvé» según la política del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y sobrio.
  - «No lo separe» conserva el singular genérico y el objeto implícito de la unión matrimonial.
  - La nota a pie de página explica la alternativa inclusiva sin alterar el texto principal.
