- from: Por tanto[a], lo que Yahvé ha unido, no lo separe el hombre.
  to: Por tanto[a], lo que Dios ha unido, no lo separe el hombre.
  rationale: Se corrige únicamente el sujeto divino de «Yahvé» a «Dios» para ajustarlo al griego ὁ θεός y al registro terminológico del proyecto. Se conserva el resto del texto porque refleja bien la estructura, el sentido y la nota inclusiva del original.
