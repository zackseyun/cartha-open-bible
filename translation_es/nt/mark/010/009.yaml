review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador refleja bien el griego: «lo que» para ὃ, «Por tanto» para οὖν, «ha unido» para συνέζευξεν, y la prohibición con «no … separe» son fieles y naturales. También preserva adecuadamente la fuerza genérica de ἄνθρωπος mediante «el hombre» con nota. Sin embargo, el sujeto ὁ θεὸς en este versículo griego debe traducirse «Dios», no «Yahvé». La política del proyecto sobre el nombre divino no autoriza sustituir θεός por «Yahvé» sin evidencia textual específica; aquí el texto fuente dice explícitamente θεός.'
  spanish_quality_summary: El español es claro y digno. No obstante, «Yahvé» introduce una decisión no apoyada por la fuente y distorsiona la legibilidad teológica del versículo. Además, conviene conservar la nota léxica sobre «el hombre» porque ayuda a evitar una lectura masculina exclusiva. Fuera de eso, la sintaxis «Por tanto, lo que Dios ha unido, no lo separe el hombre» es natural y precisa.
  glossary_alignment: 'Alinea bien con los términos del proyecto en general, salvo una desviación importante: θεός / אֱלֹהִים -> «Dios». La preferencia por «Yahvé» aplica al nombre divino יהוה / YHWH, no a cada instancia de θεός en griego. «El hombre» para ἄνθρωπος es aceptable aquí con nota inclusiva, y «ha unido» / «separe» concuerdan con la rationale auditada.'
  issues:
  - severity: high
    issue: «Yahvé» traduce incorrectamente ὁ θεὸς
    rationale: 'El texto griego dice ὁ θεός, no κύριος en cita del nombre divino ni una forma que identifique directamente el tetragrámaton. Sustituirlo por «Yahvé» va más allá de la evidencia fuente y contradice la decisión léxica auditada del inglés: «God».'
  - severity: medium
    issue: La justificación teológica para «Yahvé» no está respaldada por la fuente inmediata
    rationale: La explicación apela al contexto y a la política del nombre divino, pero esa política no debe sobreextenderse a θεός. Esto puede crear un precedente inconsistente en el NT griego.
  revised_spanish_text: Por tanto[a], lo que Dios ha unido, no lo separe el hombre.
  revised_footnotes:
