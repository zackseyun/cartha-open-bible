translation:
  language: es
  text: 'Tú conoces los mandamientos: No asesines[a], no cometas adulterio, no robes, no des falso testimonio, no defraudes[b], honra a tu padre y a tu madre.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No mates». El verbo griego aquí denota más específicamente matar de manera ilícita u homicida, por eso se prefiere «No asesines».'
    reason: lexical_alternative
  - marker: b
    text: «No defraudes» también puede entenderse como «no prives» o «no robes». El término se refiere a privar a otro de lo que le corresponde, a menudo mediante explotación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντολὰς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - órdenes
  lexicon: BDAG
  rationale: ‘Mandamientos’ conserva el sentido de instrucciones normativas con peso covenantal y encaja bien con la alusión clara al Decálogo. ‘Mandatos’ u ‘órdenes’ suenan menos naturales en este contexto.
- source_word: οἶδας
  english_pob_choice: you know
  chosen_spanish: tú conoces
  alternatives_spanish:
  - tú sabes
  - conoces
  lexicon: BDAG
  rationale: El perfecto de οἶδα tiene valor presente. ‘Tú conoces’ suena natural en español y mantiene la relación directa con los mandamientos; ‘tú sabes’ también sería posible, pero ‘conoces’ evita una repetición excesiva con el objeto nominal.
- source_word: Μὴ φονεύσῃς
  english_pob_choice: Do not murder
  chosen_spanish: No mates
  alternatives_spanish:
  - No asesines
  - No cometas homicidio
  lexicon: BDAG
  rationale: Aunque el inglés POB opta por ‘murder’ por precisión léxica, en español ‘matar’ es la forma más directa y corriente para el mandamiento. ‘Asesinar’ puede sonar más técnico y ‘homicidio’ más jurídico; la nota explica que el verbo griego apunta a matar de forma ilícita o homicida.
- source_word: Μὴ μοιχεύσῃς
  english_pob_choice: do not commit adultery
  chosen_spanish: no cometas adulterio
  alternatives_spanish:
  - no seas adúltero
  - no adulteres
  lexicon: BDAG
  rationale: La fórmula usual y clara en español para μοιχεύω es ‘cometer adulterio’. ‘No seas adúltero’ es más interpretativa, y ‘no adulteres’ suena menos idiomático.
- source_word: Μὴ κλέψῃς
  english_pob_choice: do not steal
  chosen_spanish: no robes
  alternatives_spanish:
  - no hurtes
  - no sustraigas
  lexicon: BDAG
  rationale: ‘No robes’ reproduce bien el imperativo negativo breve del listado y corresponde al valor básico de κλέπτω. ‘Hurtar’ es más tradicional, pero ‘robar’ es más ampliamente entendible.
- source_word: Μὴ ψευδομαρτυρήσῃς
  english_pob_choice: do not bear false witness
  chosen_spanish: no des falso testimonio
  alternatives_spanish:
  - no testifiques falsamente
  - no mientas en tu testimonio
  lexicon: BDAG
  rationale: ‘Dar falso testimonio’ conserva la referencia legal-testimonial de ψευδομαρτυρέω mejor que una simple ‘mentira’.
- source_word: Μὴ ἀποστερήσῃς
  english_pob_choice: do not defraud
  chosen_spanish: no defraudes
  alternatives_spanish:
  - no prives
  - no robes
  - no despojes
  lexicon: BDAG
  rationale: ‘Defraudar’ comunica bien la idea de privar a otro de lo que le corresponde, especialmente por abuso o explotación, y sigue de cerca la decisión inglesa. ‘Privar’ es posible, pero más general; ‘robar’ estrecha demasiado el matiz.
- source_word: Τίμα
  english_pob_choice: honor
  chosen_spanish: honra
  alternatives_spanish:
  - honora
  - respeta
  lexicon: BDAG
  rationale: ‘Honra’ es el equivalente natural y tradicional del imperativo τιμάω en este contexto; ‘respeta’ reduce la fuerza del mandato.
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα
  english_pob_choice: your father and mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tu padre y madre
  - a tu padre y a tu madre
  lexicon: BDAG
  rationale: El dativo implícito del mandato en español se expresa naturalmente con ‘a’. La repetición de ‘tu’ mantiene la correspondencia del par y su claridad.
theological_decisions:
- issue: μὴ φονεύσῃς y el alcance del mandamiento
  english_pob_reading: Do not murder; the Greek verb specifically denotes murder or unlawful killing.
  chosen_spanish_reading: No mates; el verbo griego apunta a matar de manera ilícita o homicida.
  alternative_spanish_readings:
  - No asesines
  - No cometas homicidio
  rationale: La decisión inglesa preserva la precisión semántica sin perder el tono de mandamiento. En español, ‘no mates’ es la forma más natural y reconocible dentro de una lista de mandamientos, mientras la nota mantiene la restricción semántica del griego para no diluir la tensión lexical.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: ἀποστερέω y la idea de fraude/explotación
  english_pob_reading: Do not defraud; may also be rendered do not deprive or do not rob.
  chosen_spanish_reading: No defraudes; puede entenderse también como no prives o no robes.
  alternative_spanish_readings:
  - No prives
  - No robes
  - No despojes
  rationale: ‘Defraudar’ conserva la carga ética y relacional del verbo y evita reducirlo a mera sustracción. La nota admite alternativas válidas sin borrar la amplitud del término griego.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Serie de mandamientos y eco del Decálogo
  english_pob_reading: Use familiar commandment-style English while following the Greek's lexical specificity
  chosen_spanish_reading: Usar un estilo de mandamientos reconocible en español, pero con precisión léxica cuando el griego lo requiere
  alternative_spanish_readings:
  - Traducción más literal
  - Traducción más libre
  rationale: El verso funciona como lista de mandamientos; por eso conviene un español claro, memorisable y eclesialmente legible. Al mismo tiempo, se debe evitar que la familiaridad tradicional oculte matices como el de φονεύω y ἀποστερέω.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el estado inglés POB con acuerdo alto y sin revisiones pendientes. Se conserva la estructura del listado de mandamientos, la precisión de φονεύω y ἀποστερέω, y la lectura imperativa directa sin añadir explicaciones al cuerpo del verso.
  spanish_consistency_notes:
  - Se usa «mandamientos» para ἐντολάς, en continuidad con el Decálogo.
  - Se prefirió «No mates» en el texto principal por naturalidad en español, con nota que preserva la precisión de «matar de manera ilícita u homicida».
  - Se optó por «no defraudes» para ἀποστερήσῃς, manteniendo la amplitud semántica con nota.
  - «Honra» mantiene el valor imperativo de τιμάω.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
