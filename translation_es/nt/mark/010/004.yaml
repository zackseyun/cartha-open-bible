review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: respuesta de los fariseos, concesión de Moisés, documento legal de divorcio y acto de despedir/divorciar. Sin embargo, omite el complemento implícito ''nos'' que el inglés POB hizo explícito (''permitted us to write''), y la colocación de las notas al final de toda la cita no ancla con precisión cada alternativa al sintagma correspondiente.'
  spanish_quality_summary: El español es claro y natural, pero 'Ellos dijeron' suena un poco más pesado de lo necesario; 'Ellos' puede omitirse sin pérdida. Además, en español suena más natural y preciso 'nos permitió escribir' que 'permitió escribir'. Conviene mover las marcas de nota a los términos específicos. 'Despedirla' es defendible, pero en contexto matrimonial 'repudiarla' comunica mejor la imagen jurídica/social sin sonar tan laboral como 'despedirla'.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Moisés' y 'certificado de divorcio' concuerdan con la línea auditada. La decisión teológica clave sobre Ἐπέτρεψεν como permiso, no mandato, está correctamente preservada.
  issues:
  - severity: medium
    issue: Falta el complemento implícito 'nos' con 'permitió'.
    rationale: Aunque el griego no expresa explícitamente el objeto indirecto, el inglés POB lo suministra por claridad contextual ('permitted us to write'). En español, 'Moisés nos permitió escribir' suena más natural y deja claro quién recibe el permiso.
  - severity: medium
    issue: La elección 'despedirla' puede sonar impropia en español contemporáneo.
    rationale: Aunque preserva la imagen de 'send away', en español actual 'despedirla' suele asociarse primero con empleo. En contexto de divorcio, 'repudiarla' o 'divorciarla' evita esa distracción; 'repudiarla' conserva mejor la idea de apartar/despedir en ámbito matrimonial.
  - severity: low
    issue: Las marcas de nota no están ancladas en las palabras pertinentes.
    rationale: Cada nota debe aparecer junto al término o frase relevante dentro de `spanish_text`; poner ambas al final de la cita es menos preciso.
  - severity: low
    issue: El pronombre explícito 'Ellos' es innecesario.
    rationale: En español, 'Dijeron' transmite naturalmente la continuación del diálogo sin énfasis superfluo.
  revised_spanish_text: 'Dijeron: «Moisés nos permitió escribir un certificado de divorcio[a] y repudiarla[b]».'
