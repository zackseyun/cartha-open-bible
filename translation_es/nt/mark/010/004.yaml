revisions:
- from: 'Ellos dijeron: «Moisés permitió escribir un certificado de divorcio y despedirla»[a][b].'
  to: 'Dijeron: «Moisés nos permitió escribir un certificado de divorcio[a] y repudiarla[b]».'
  rationale: La revisión conserva el sentido del griego y del audit trail inglés, pero mejora la naturalidad del español, hace explícito el beneficiario implícito del permiso ('nos'), evita la posible ambigüedad laboral de 'despedirla', y coloca las notas exactamente donde corresponden.
