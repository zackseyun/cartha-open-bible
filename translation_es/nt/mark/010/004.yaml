translation:
  language: es
  text: 'Dijeron: «Moisés nos permitió escribir un certificado de divorcio[a] y repudiarla[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «acta de divorcio». La frase griega se refiere a un documento legal escrito de divorcio.
    reason: lexical_alternative
  - marker: b
    text: O «divorciarla». Literalmente, «y despedirla/enviarla», un giro usado aquí en el contexto del divorcio.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: They said
  chosen_spanish: Ellos dijeron
  alternatives_spanish:
  - Y dijeron
  - Pero dijeron
  lexicon: BDAG
  rationale: El artículo con valor sustantivo remite a los interlocutores ya introducidos; en español, «Ellos dijeron» expresa la continuación del diálogo sin forzar una conjunción adversativa que el contexto no exige de manera fuerte. Se mantiene el plural explícito por claridad.
- source_word: Ἐπέτρεψεν
  english_pob_choice: permitted
  chosen_spanish: permitió
  alternatives_spanish:
  - autorizó
  - permitió
  lexicon: BDAG
  rationale: ἐπιτρέπω expresa permiso o concesión, no mandato. «Permitió» conserva la idea jurídica de concesión que la POB inglesa subraya, especialmente en el contraste inmediato entre concesión y diseño original de Dios.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: βιβλίον ἀποστασίου
  english_pob_choice: a certificate of divorce
  chosen_spanish: un certificado de divorcio
  alternatives_spanish:
  - un acta de divorcio
  - un documento de divorcio
  - una carta de repudio
  lexicon: BDAG
  rationale: La expresión designa el documento legal escrito previsto en Deuteronomio 24:1. «Certificado de divorcio» comunica con claridad el valor formal y legal del sintagma; «carta de repudio» suena tradicional pero es menos transparente para el lector moderno.
- source_word: γράψαι
  english_pob_choice: to write
  chosen_spanish: escribir
  alternatives_spanish:
  - redactar
  - escribir
  lexicon: BDAG
  rationale: El infinitivo aoristo de γράφω significa simplemente «escribir». En español, «escribir» evita sobreespecificar la acción y sigue de cerca el alcance del griego.
- source_word: ἀπολῦσαι
  english_pob_choice: and send her away
  chosen_spanish: despedirla
  alternatives_spanish:
  - mandarla fuera
  - repudiarla
  - divorciarla
  lexicon: BDAG
  rationale: En contexto matrimonial, ἀπολύω puede significar despedir o divorciar. «Despedirla» conserva la imagen verbal del griego y deja que el documento de divorcio ya mencionado explicite el sentido legal; «divorciarla» sería más interpretativo y menos natural en español.
theological_decisions:
- issue: Naturaleza de la concesión de Moisés
  english_pob_reading: Moses permitted divorce rather than positively commanding it
  chosen_spanish_reading: Moisés permitió el divorcio en lugar de mandarlo
  alternative_spanish_readings:
  - Moisés mandó el divorcio
  - Moisés autorizó el divorcio
  rationale: El verbo Ἐπέτρεψεν afirma permiso, no mandato. La redacción española preserva esa tensión teológica y evita suavizar la distinción que el contexto inmediato desarrolla entre concesión por dureza del corazón y el propósito creador de Dios.
  doctrine_reference: Marcos 10:4; Deuteronomio 24:1; cf. Marcos 10:5-9
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y se mantuvo la lectura de la POB inglesa de ἐπιτρέπω como permiso/concesión. No hubo revisiones posteriores que alteraran el sentido, y el control cruzado indicó alta concordancia con objeciones menores.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque aquí no aparece el nombre divino.
  - Se prefirió «Moisés» y no una paráfrasis con el sujeto implícito para mantener la estructura del diálogo.
  - «Certificado de divorcio» conserva el carácter legal del sintagma sin recurrir a una formulación arcaica.
  - «Despedirla» refleja el valor idiomático de ἀπολῦσαι; la nota aclara la equivalencia contextual con «divorciarla».
