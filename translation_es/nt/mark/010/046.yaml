translation:
  language: es
  text: Y llegaron a Jericó[a]. Y mientras él salía de Jericó, junto con sus discípulos y una multitud considerable[b], Bartimeo, el hijo de Timeo, un ciego mendigo, estaba sentado junto al camino[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un presente histórico ('vienen'), rasgo narrativo que aquí se vierte al pasado para un estilo español natural.
    reason: lexical_alternative
  - marker: b
    text: O 'una multitud grande'.
    reason: lexical_alternative
  - marker: c
    text: O 'junto al camino'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - vinieron a Jericó
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español, el pasado simple conserva la secuencia narrativa con naturalidad y refleja el valor eventivo sin sonar forzado. 'Llegaron' es directo y adecuado para un relato.
- source_word: ἐκπορευομένου αὐτοῦ
  english_pob_choice: as he was going out
  chosen_spanish: mientras él salía
  alternatives_spanish:
  - cuando él salía
  - al salir él
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa acción contemporánea. 'Mientras él salía' conserva esa simultaneidad de forma clara en español, sin perder la imagen de movimiento.
- source_word: ὄχλου ἱκανοῦ
  english_pob_choice: a considerable crowd
  chosen_spanish: una multitud considerable
  alternatives_spanish:
  - una multitud grande
  - una multitud numerosa
  lexicon: BDAG
  rationale: ἱκανός indica aquí cantidad suficiente o abundante; 'considerable' mantiene el matiz del inglés POB y evita precisar más de lo que el texto dice.
- source_word: ὁ υἱὸς Τιμαίου Βαρτιμαῖος
  english_pob_choice: Bartimaeus, the son of Timaeus
  chosen_spanish: Bartimeo, el hijo de Timeo
  alternatives_spanish:
  - Bartimeo, hijo de Timeo
  - el hijo de Timeo, Bartimeo
  lexicon: BDAG
  rationale: Se conserva el nombre semítico y la aclaración explicativa del evangelista. El orden español más natural es primero el nombre propio y luego la identificación filial.
- source_word: τυφλὸς
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - sin vista
  lexicon: BDAG
  rationale: Es el equivalente directo y estándar del adjetivo, sin suavizar ni ampliar el sentido.
- source_word: προσαίτης
  english_pob_choice: beggar
  chosen_spanish: mendigo
  alternatives_spanish:
  - pordiosero
  lexicon: BDAG
  rationale: '''Mendigo'' es el equivalente claro y natural en español. Mantiene la fuerza social del término sin cargarlo con un registro demasiado coloquial.'
- source_word: παρὰ τὴν ὁδόν
  english_pob_choice: beside the road
  chosen_spanish: junto al camino
  alternatives_spanish:
  - al lado del camino
  - junto al camino
  lexicon: BDAG
  rationale: παρά con acusativo expresa ubicación al lado de algo. 'Junto al camino' es una solución transparente y natural en español, acorde con el valor espacial del griego.
- source_word: Ἰεριχώ
  english_pob_choice: Jericho
  chosen_spanish: Jericó
  alternatives_spanish:
  - Jericó
  lexicon: BDAG
  rationale: Se conserva la transliteración habitual al español del topónimo.
theological_decisions:
- issue: Identificación narrativa de Bartimeo
  english_pob_reading: Retain both the Semitic personal name and Mark's explanatory phrase 'the son of Timaeus' in the main text.
  chosen_spanish_reading: Conservar tanto el nombre Bartimeo como la explicación 'el hijo de Timeo' en el texto principal.
  alternative_spanish_readings:
  - Omitir la aclaración filial
  - Traducir solo la identificación como hijo de Timeo
  rationale: 'No hay tensión doctrinal, pero sí una decisión de fidelidad narrativa: el texto presenta el nombre y su explicación, y la versión española debe conservar ambos para no perder el detalle identificador.'
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y coincide con el audit trail inglés en la estructura narrativa, el nombre compuesto de Bartimeo y la escena de ubicación junto al camino. No se aplicaron revisiones posteriores al contenido base.
  spanish_consistency_notes:
  - Se mantiene 'Jericó' como topónimo usual en español.
  - Se usa 'mendigo' por claridad y fidelidad lexical, sin sustituirlo por un término eclesiástico o elevado.
  - La combinación 'ciego mendigo' reproduce la acumulación adjetival del griego de manera natural en español.
  - '''Junto al camino'' preserva la localización espacial sin reinterpretarla.'
