  language: en
  yaml_path: translation/nt/mark/010/046.yaml
  text: And they came to Jericho[a]. And as he was going out from Jericho, along with his disciples and a considerable crowd, Bartimaeus, the son of Timaeus, a blind beggar[c][b], was sitting beside the road.
  footnotes:
