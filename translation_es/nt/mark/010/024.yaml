translation:
  language: es
  text: 'Pero los discípulos estaban asombrados por sus palabras. Jesús respondió otra vez y les dijo[a]: «Muchachos, ¡qué difícil es entrar en el reino de Dios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «Muchachos, ¡qué difícil es para los que confían en las riquezas entrar en el reino de Dios!»'
    reason: textual_variant
lexical_decisions:
- source_word: ἐθαμβοῦντο
  english_pob_choice: were astonished
  chosen_spanish: estaban asombrados
  alternatives_spanish:
  - estaban atónitos
  - estaban sorprendidos
  lexicon: BDAG
  rationale: El imperfecto expresa una reacción en curso; «estaban asombrados» conserva ese matiz y comunica bien la intensidad de θαμβέομαι en español natural.
- source_word: ἐπὶ τοῖς λόγοις αὐτοῦ
  english_pob_choice: at his words
  chosen_spanish: por sus palabras
  alternatives_spanish:
  - ante sus palabras
  - a causa de sus palabras
  lexicon: BDAG
  rationale: La preposición con dativo marca la base del asombro. En español, «por sus palabras» es natural y mantiene la relación causal/objetiva sin añadir interpretación excesiva.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» comunica la repetición discursiva de manera clara y idiomática en español.
- source_word: ἀποκριθεὶς λέγει
  english_pob_choice: answered again and said
  chosen_spanish: respondió otra vez y les dijo
  alternatives_spanish:
  - respondió y dijo
  - les respondió y dijo
  lexicon: BDAG
  rationale: Se conserva la fórmula narrativa semítica con ambos verbos, pero con orden natural en español. «Les dijo» hace explícito el destinatario del discurso.
- source_word: Τέκνα
  english_pob_choice: Children
  chosen_spanish: Hijos
  alternatives_spanish:
  - Hijos míos
  - Niños
  lexicon: BDAG
  rationale: «Τέκνα» es un vocativo afectivo. «Hijos» preserva la cercanía familiar sin añadir el diminutivo ni una posesión que el griego no expresa.
- source_word: πῶς δύσκολόν ἐστιν
  english_pob_choice: how difficult it is
  chosen_spanish: ¡qué difícil es
  alternatives_spanish:
  - cuán difícil es
  - qué duro es
  lexicon: BDAG
  rationale: El exclamativo πῶς pide una solución exclamativa en español; «¡qué difícil es» mantiene la fuerza retórica del griego con naturalidad.
- source_word: εἰς τὴν βασιλείαν τοῦ θεοῦ εἰσελθεῖν
  english_pob_choice: to enter the kingdom of God
  chosen_spanish: entrar en el reino de Dios
  alternatives_spanish:
  - entrar al reino de Dios
  - entrar dentro del reino de Dios
  lexicon: BDAG
  rationale: «Entrar en» reproduce bien εἰς + infinitivo y mantiene la formulación estándar del reino de Dios sin sobrecargar el español con «dentro de».
theological_decisions:
- issue: 'Variante textual larga: «for those who trust in riches»'
  english_pob_reading: 'Follow the SBLGNT shorter reading: ''how difficult it is to enter the kingdom of God'''
  chosen_spanish_reading: 'Seguir la lectura corta: «¡qué difícil es entrar en el reino de Dios!»'
  alternative_spanish_readings:
  - «Hijos, ¡qué difícil es para los que confían en las riquezas entrar en el reino de Dios!»
  rationale: El texto fuente provisto sigue la lectura corta; la expansión larga se preserva solo como variante textual en nota para no incorporar al cuerpo una glosa interpretativa que no está en el griego principal.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar la tensión textual)
- issue: Tratamiento del vocativo τέκνα
  english_pob_reading: Children
  chosen_spanish_reading: Hijos
  alternative_spanish_readings:
  - Niños
  - Hijos míos
  rationale: La forma directa conserva el tono pastoral y afectivo del vocativo sin domesticarlo con añadidos que no están en el texto.
  doctrine_reference: BDAG, τέκνον
- issue: Presencia de la expresión semítica 'answered and said'
  english_pob_reading: answered again and said
  chosen_spanish_reading: respondió otra vez y les dijo
  alternative_spanish_readings:
  - respondió y dijo
  - les respondió
  rationale: Se conserva la estructura repetitiva del discurso semítico porque aporta el ritmo narrativo del evangelio y evita aplanarla a una sola fórmula.
  doctrine_reference: BDAG, ἀποκρίνομαι + λέγω
translation_notes:
  revision_awareness: Ajusté el texto para anclar la nota textual con el marcador [a] en el verbo de cita, corrigiendo el error de validación anterior. La redacción principal sigue la lectura corta del SBLGNT y la variante larga queda únicamente en la nota.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ y «reino de Dios» como fórmula estable.
  - Se conserva «Jesús» como nombre propio y «reino» para βασιλεία.
  - Se prefirió «asombrados» para ἐθαμβοῦντο frente a «atónitos», por ser más natural en español contemporáneo y aún fuerte.
  - El tono de «Hijos» mantiene el vocativo afectivo sin ampliar el contenido.
  - La puntuación exclamativa refleja el valor intensificador de πῶς en la frase final.
