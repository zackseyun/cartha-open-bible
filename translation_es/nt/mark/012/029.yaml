revisions:
- from: 'Jesús respondió[a]: «La primera es: Oye, Israel, Yahvé nuestro Dios[b], Yahvé uno es.»'
  to: 'Jesús respondió: «La primera es: Oye, Israel, Yahvé nuestro Dios[a], Yahvé es uno[b].»'
  rationale: Se eliminó la nota léxica menor sobre «respondió/contestó» para dar lugar a la nota exegéticamente importante que el English POB conserva sobre las lecturas alternativas de la Shemá. Además, se cambió «Yahvé uno es» por «Yahvé es uno» para un español más natural y eclesialmente legible, sin perder la fidelidad al griego ni la tensión teológica documentada.
