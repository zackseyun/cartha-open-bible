review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: respuesta de Jesús, referencia a «la primera», apertura de la Shemá, y preserva la decisión del proyecto de usar «Yahvé» en una cita donde κύριος refleja el nombre divino. Sin embargo, no conserva toda la auditabilidad del English POB, porque omite la nota alternativa importante sobre las posibles lecturas de la cláusula final de la Shemá.'
  spanish_quality_summary: El español es mayormente claro y digno, pero «Yahvé uno es» suena innecesariamente calcado y menos natural en español contemporáneo culto. «Oye, Israel» es aceptable, aunque «Oye, oh Israel» o «Escucha, Israel» serían más solemnes; no es un error. La mejora principal es hacer más natural la cláusula final sin perder la tensión teológica.
  glossary_alignment: 'Alinea bien con la terminología del proyecto al usar «Yahvé» para κύριος en esta cita de la Shemá. «Jesús», «Dios» y la construcción posesiva también están bien. La excepción relevante es estilística: conviene preferir «Yahvé es uno» sobre «Yahvé uno es» para legibilidad en español, sin abandonar la cercanía al original.'
  issues:
  - severity: medium
    issue: Falta la nota con lecturas alternativas de la Shemá preservada en el English POB.
    rationale: El English POB documenta explícitamente alternativas como «el Señor nuestro Dios es un solo Señor» / «el Señor es nuestro Dios, el Señor solo». Esa tensión exegética forma parte del rastro de auditoría y debe preservarse en español con una nota.
  - severity: medium
    issue: «Yahvé uno es» resulta forzado en español.
    rationale: Aunque intenta seguir el orden griego, en español moderno suena rígido y menos inteligible. «Yahvé es uno» mantiene el contenido y la densidad teológica con mejor naturalidad.
  - severity: low
    issue: La nota a) solo conserva una alternativa menor («contestó») en vez de la alternativa exegéticamente más significativa.
    rationale: La variante léxica de ἀπεκρίθη es secundaria aquí; la nota prioritaria en este versículo es la ambigüedad de la cláusula de la Shemá.
  revised_spanish_text: 'Jesús respondió: «La primera es: Oye, Israel, Yahvé nuestro Dios[a], Yahvé es uno[b].»'
  revised_footnotes:
  - marker: a
    text: Aquí κύριος reproduce la fórmula de la Shemá y refleja el uso de la Septuaginta para el nombre divino Yahvé.
    reason: cross_reference
  - marker: b
    text: 'O también: «Yahvé nuestro Dios es un solo Señor», o «Yahvé es nuestro Dios, Yahvé solo». El griego hace eco de Deuteronomio 6:4 y puede enfatizar la unidad de Dios y/o su exclusividad.'
    reason: alternative_reading
