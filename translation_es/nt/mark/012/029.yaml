translation:
  language: es
  text: 'Jesús respondió: «La primera es: Oye, Israel, Yahvé nuestro Dios[a], Yahvé es uno[b].»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí κύριος reproduce la fórmula de la Shemá y refleja el uso de la Septuaginta para el nombre divino Yahvé.
    reason: cross_reference
  - marker: b
    text: 'O también: «Yahvé nuestro Dios es un solo Señor», o «Yahvé es nuestro Dios, Yahvé solo». El griego hace eco de Deuteronomio 6:4 y puede enfatizar la unidad de Dios y/o su exclusividad.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En narración dialogal, ἀποκρίνομαι se expresa naturalmente como una respuesta verbal. «Respondió» conserva la fuerza de réplica sin añadir matices que el griego no exige; también es plenamente idiomático en español bíblico actual.
- source_word: Πρώτη
  english_pob_choice: The first
  chosen_spanish: La primera
  alternatives_spanish:
  - La primera mandamiento
  - Primera
  lexicon: BDAG
  rationale: El adjetivo aparece sustantivado y remite al mandamiento previo en el contexto inmediato. «La primera» deja que el contexto suministre «mandamiento» sin sobretraducción.
- source_word: Ἄκουε
  english_pob_choice: Hear
  chosen_spanish: Oye
  alternatives_spanish:
  - Escucha
  - Oye
  lexicon: BDAG
  rationale: Para el inicio de la Shemá, «Oye» reproduce la apelación directa y breve del imperativo. «Escucha» sería posible, pero «oye» mantiene mejor el tono litúrgico y la concisión del llamado bíblico.
- source_word: Ἰσραήλ
  english_pob_choice: Israel
  chosen_spanish: Israel
  alternatives_spanish:
  - Israel
  lexicon: BDAG
  rationale: Se conserva el nombre propio en vocativo. En español, la forma no requiere adaptación.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: BDAG
  rationale: Aquí κύριος cita la Shemá y refleja el uso de la Septuaginta para el nombre divino. Conforme al criterio del proyecto, se restaura «Yahvé» en lugar de enmascararlo como «Señor», para hacer visible la correspondencia con el tetragrámaton en la base hebrea.
- source_word: θεὸς ἡμῶν
  english_pob_choice: our God
  chosen_spanish: nuestro Dios
  alternatives_spanish:
  - nuestro Dios
  lexicon: BDAG
  rationale: La construcción posesiva es directa y natural en español. «Nuestro Dios» preserva tanto la relación de pertenencia/covenio como la fluidez sintáctica.
- source_word: κύριος εἷς ἐστιν
  english_pob_choice: the Lord is one
  chosen_spanish: Yahvé uno es
  alternatives_spanish:
  - Yahvé es uno
  - Yahvé es el único
  lexicon: BDAG
  rationale: La secuencia final del griego admite varias disposiciones idiomáticas. «Yahvé uno es» conserva la tersura bíblica del enunciado y la densidad confesional de la Shemá, sin decidir de más entre énfasis en unidad o exclusividad.
theological_decisions:
- issue: La forma de citar la Shemá y la tensión entre unidad y exclusividad divina
  english_pob_reading: the Lord our God, the Lord is one
  chosen_spanish_reading: Yahvé nuestro Dios, Yahvé uno es
  alternative_spanish_readings:
  - Yahvé nuestro Dios, Yahvé es uno
  - Yahvé nuestro Dios, Yahvé es el único
  rationale: El griego de Marcos 12:29 reproduce la forma deuteronómica y puede oírse como afirmación de unicidad, de exclusividad o de ambas. La redacción elegida sigue de cerca la secuencia del original y preserva esa tensión teológica sin resolverla con una paráfrasis explicativa.
  doctrine_reference: Deuteronomio 6:4; Shemá; monoteísmo bíblico
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «Hear, Israel» a «Hear, O Israel» para marcar el vocativo. En español ya está incorporado el vocativo con «Oye, Israel», manteniendo la función apelativa sin requerir una partícula adicional. También se adaptó el final para conservar el orden confesional del griego y la referencia al nombre divino según la convención del proyecto.
  spanish_consistency_notes:
  - 'Se respetó el criterio del proyecto para κύριος en contextos de la Shemá: «Yahvé» en vez de «Señor».'
  - «La primera» deja implícito «mandamiento» por exigencia del contexto inmediato, en línea con la estrategia del POB inglés.
  - Se mantuvo un español natural y digno, evitando calcos como «el Señor uno es» cuando el orden español puede ser más idiomático sin perder fidelidad.
  - El vocativo se expresó con «Oye, Israel», equivalente funcional del inglés revisado «Hear, O Israel».
