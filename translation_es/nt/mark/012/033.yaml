translation:
  language: es
  text: y amarle con todo el corazón, y con todo el entendimiento, y con toda la fuerza, y amar al prójimo como a uno mismo, es más que todos los holocaustos[a] y sacrificios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El término griego para «holocaustos» se refiere específicamente a ofrendas totalmente consumidas en el altar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶν
  english_pob_choice: to love
  chosen_spanish: amar
  alternatives_spanish:
  - querer
  - amar profundamente
  lexicon: BDAG
  rationale: El infinitivo articular se vierte mejor en español como infinitivo verbal simple, manteniendo la paralela estructura de los dos infinitivos del versículo sin volverlo nominal ni explicativo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: arle
  alternatives_spanish:
  - amar a Dios
  - amarlo
  lexicon: BDAG
  rationale: El pronombre remite a Dios por el contexto previo. En español, el enclítico 'arle' conserva la referencia pronominal sin introducir explícitamente el antecedente en el cuerpo del texto.
- source_word: ἐξ ὅλης τῆς καρδίας
  english_pob_choice: with all the heart
  chosen_spanish: con todo el corazón
  alternatives_spanish:
  - desde todo el corazón
  - de todo corazón
  lexicon: BDAG
  rationale: La frase expresa totalidad de entrega interior. 'Con todo el corazón' es natural y fiel; evita una calca como 'desde todo el corazón', que suena menos idiomática en español.
- source_word: συνέσεως
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - comprensión
  - discernimiento
  - mente
  lexicon: BDAG
  rationale: Mark usa σύνεσις, no διάνοια. 'Entendimiento' refleja comprensión/discernimiento sin reducir el matiz a mera facultad intelectual. 'Mente' sería posible, pero menos preciso.
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - vigor
  - poder
  lexicon: BDAG
  rationale: '''Fuerza'' comunica bien la idea de capacidad total en este contexto ético. ''Vigor'' y ''poder'' son posibles, pero menos naturales aquí.'
- source_word: πλησίον
  english_pob_choice: one’s neighbor
  chosen_spanish: al prójimo
  alternatives_spanish:
  - al vecino
  - al otro
  lexicon: BDAG
  rationale: Aunque el término es singular y genérico, en español bíblico 'prójimo' comunica con claridad la referencia ética general sin perder el alcance representativo.
- source_word: ὡς ἑαυτόν
  english_pob_choice: as oneself
  chosen_spanish: como a uno mismo
  alternatives_spanish:
  - como a ti mismo
  - como a sí mismo
  lexicon: BDAG
  rationale: La forma reflexiva es genérica, no un mandato en segunda persona directa. 'Como a uno mismo' preserva esa generalidad mejor que 'como a ti mismo'.
- source_word: περισσότερόν ἐστιν
  english_pob_choice: is more than
  chosen_spanish: es más que
  alternatives_spanish:
  - es mayor que
  - vale más que
  lexicon: BDAG
  rationale: La comparación expresa superioridad. 'Es más que' es breve y natural en español, manteniendo el sentido comparativo sin añadir matices interpretativos.
- source_word: πάντων τῶν ὁλοκαυτωμάτων καὶ θυσιῶν
  english_pob_choice: all burnt offerings and sacrifices
  chosen_spanish: todos los holocaustos y sacrificios
  alternatives_spanish:
  - todos los sacrificios quemados y sacrificios
  - todos los holocaustos y ofrendas
  lexicon: BDAG
  rationale: ὁλοκαυτώματα designa ofrendas totalmente consumidas por el fuego; 'holocaustos' conserva esa especificidad léxica tradicional en español bíblico. 'Sacrificios' traduce θυσίαι de forma directa.
theological_decisions:
- issue: Superioridad del amor sobre el culto sacrificial
  english_pob_reading: The verse states that loving God wholly and loving one's neighbor is superior to all whole burnt offerings and sacrifices, without abolishing the sacrificial system in explicit terms.
  chosen_spanish_reading: El versículo afirma que amar a Dios con todo el ser y amar al prójimo es más que todos los holocaustos y sacrificios, sin declarar explícitamente abolido el sistema sacrificial.
  alternative_spanish_readings:
  - El versículo implica la anulación total del sacrificio
  - El versículo solo pone el amor al mismo nivel que el culto sacrificial
  rationale: El comparativo περισσότερόν ἐστιν expresa claramente superioridad. Pero el texto no dice de forma explícita que el sistema sacrificial quede abolido; conviene conservar esa tensión hermenéutica.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La traducción española sigue el último estado revisado del POB en inglés, que retiró 'whole' antes de 'burnt offerings' por naturalidad, pero mantiene la especificidad léxica de ὁλοκαυτωμάτων mediante 'holocaustos' y una nota alternativa. También conserva la estructura paralela de los dos infinitivos y el comparativo de superioridad.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como convención general del proyecto, pero este versículo no nombra el Tetragrámaton en la forma griega transmitida; el referente divino queda implícito por contexto.
  - '''Prójimo'' se usa como equivalente estable de πλησίον en un sentido ético general.'
  - '''Holocaustos'' se reserva aquí por la especificidad del término griego, no por connotaciones modernas ajenas al texto.'
  - La nota al pie marca la alternativa lexical relevante sin sobrecargar el cuerpo principal del versículo.
