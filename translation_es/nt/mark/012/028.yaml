translation:
  language: es
  text: 'Y uno de los escribas se acercó, y al oírlos debatir, viendo que les había respondido bien, le preguntó: «¿Cuál es el mandamiento primero[a] de todos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el principal de todos» o «el más importante de todos».
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - expertos en la Ley
  - maestros de la Ley
  lexicon: BDAG
  rationale: γραμματεύς en el contexto evangélico designa a especialistas judíos en la Escritura y la Ley. «Escribas» es el equivalente directo y ampliamente reconocido en español, sin sobreespecificar su función.
- source_word: προσελθὼν
  english_pob_choice: came up
  chosen_spanish: acercándose
  alternatives_spanish:
  - se acercó
  - vino hacia
  lexicon: BDAG
  rationale: El participio de προσέρχομαι expresa movimiento hacia Jesús. «Acercándose» conserva la acción y suena natural en español narrativo.
- source_word: ἀκούσας αὐτῶν συζητούντων
  english_pob_choice: heard them debating
  chosen_spanish: oyendo que discutían
  alternatives_spanish:
  - oyendo que debatían
  - oyendo que conversaban
  lexicon: BDAG
  rationale: συζητέω puede abarcar discusión o debate. En español, «discutían» comunica intercambio argumentativo sin exigir una carga más dura como «peleaban»; mantiene la apertura semántica del griego.
- source_word: ἰδὼν ὅτι καλῶς ἀπεκρίθη αὐτοῖς
  english_pob_choice: seeing that he had answered them well
  chosen_spanish: viendo que les había respondido bien
  alternatives_spanish:
  - viendo que les respondía bien
  - viendo que les había contestado bien
  lexicon: BDAG
  rationale: La construcción participial con ὅτι señala la percepción del escriba. «Les había respondido bien» reproduce con claridad el sentido y conserva el valor evaluativo de καλῶς.
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le interrogó
  - le inquirió
  lexicon: BDAG
  rationale: ἐπερωτάω significa preguntar o interrogar. «Le preguntó» es la opción más natural y fiel en este contexto narrativo.
- source_word: Ποία
  english_pob_choice: Which
  chosen_spanish: Cuál
  alternatives_spanish:
  - Qué
  - Cuál de
  lexicon: BDAG
  rationale: ποῖος pide identificar entre opciones. «Cuál» es la forma natural en español para una pregunta de selección entre mandamientos.
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: BDAG
  rationale: En el contexto bíblico, ἐντολή se traduce con frecuencia «mandamiento». «Mandamiento» mantiene el registro escritural y la referencia a la Ley.
- source_word: πρώτη πάντων
  english_pob_choice: the first of all
  chosen_spanish: el primero de todos
  alternatives_spanish:
  - el primero entre todos
  - el más importante de todos
  - el más principal de todos
  lexicon: BDAG
  rationale: πρῶτος puede referirse a primer lugar o a primacía. «El primero de todos» permanece cercano al griego, preserva la tensión interpretativa y evita convertir la frase de inmediato en una paráfrasis explicativa.
theological_decisions:
- issue: Sentido de πρώτη en la pregunta sobre el mandamiento
  english_pob_reading: Rendered as 'the first of all' rather than an explicitly interpretive paraphrase such as 'the most important.'
  chosen_spanish_reading: «el primero de todos» en lugar de una paráfrasis interpretativa como «el más importante de todos»
  alternative_spanish_readings:
  - el más importante de todos
  - el más principal de todos
  - el más sobresaliente de todos
  rationale: El griego usa πρώτη, literalmente «primera», que puede implicar orden o rango. La redacción española conserva esa forma para no resolver prematuramente la cuestión semántica; la frase admite la primacía que el contexto posterior explicará.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó el artículo antes de «first» para reflejar más de cerca el griego. Por eso el español conserva la misma cercanía sintáctica con «el primero de todos», sin añadir explicaciones interpretativas en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo «escribas» como término técnico estable del POB para γραμματεύς.
  - Se evitó «SEÑOR» o lenguaje de nombre divino porque el versículo no contiene el Tetragrámaton ni κύριος.
  - «Mandamiento» conserva el registro bíblico esperado para ἐντολή.
  - «Discutían» se eligió por su amplitud semántica, con nota de alternativa para preservar la tensión lexical.
  - La puntuación y el orden buscan una lectura natural en español sin perder la secuencia participial del griego.
