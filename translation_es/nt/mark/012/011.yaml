translation:
  language: es
  text: Esto vino del Señor[a][b], y es maravilloso a nuestros ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "por el Señor". La frase griega puede expresar procedencia o agencia; aquí se eligió "del Señor" para reflejar más directamente la idea de origen.
    reason: lexical_alternative
  - marker: b
    text: Esta línea cita el Salmo 118:23.
    reason: cross_reference
lexical_decisions:
- source_word: παρὰ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: proviene de Yahvé
  alternatives_spanish:
  - viene del Señor
  - viene de Yahvé
  - procede de Yahvé
  lexicon: BDAG
  rationale: La preposición griega con genitivo expresa origen o procedencia. En español, "proviene de" comunica de manera natural esa fuente sin perder el matiz de origen. Se usa "Yahvé" según el criterio del proyecto para κύριος cuando el contexto cita el Salmo y remite al nombre divino.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  - el Señor
  - el Soberano
  lexicon: BDAG
  rationale: Aunque el griego lee κύριος, aquí la línea cita el Salmo 118:23 y el referente es el Dios de Israel. El proyecto pide "Yahvé" para el nombre divino en el texto español principal, por lo que se explicita esa referencia sin recurrir a una máscara tipográfica.
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: proviene
  alternatives_spanish:
  - vino
  - sucedió
  - se originó
  lexicon: BDAG
  rationale: γίνομαι aquí expresa origen o procedencia de algo ya mencionado. "Proviene" en español conserva ese sentido de procedencia con buena naturalidad; "vino" es menos preciso, y "sucedió" introduciría una idea accidental que no está en el contexto.
- source_word: αὕτη
  english_pob_choice: This
  chosen_spanish: Esto
  alternatives_spanish:
  - Esta
  - Esta cosa
  - Esto mismo
  lexicon: BDAG
  rationale: El demostrativo femenino apunta al dicho/cita anterior, pero en español "esto" mantiene la referencia global al enunciado previo sin forzar un sustantivo implícito. Es una solución natural y suficientemente fiel al griego.
- source_word: θαυμαστὴ
  english_pob_choice: marvelous
  chosen_spanish: maravilloso
  alternatives_spanish:
  - maravillosa
  - admirable
  - asombroso
  lexicon: BDAG
  rationale: El adjetivo griego expresa lo digno de admiración o maravilla. En español, "maravilloso" transmite bien el tono elevado de la cita bíblica; se evita "admirable" porque puede sonar más débil en este contexto.
- source_word: ἐν ὀφθαλμοῖς ἡμῶν
  english_pob_choice: in our eyes
  chosen_spanish: a nuestros ojos
  alternatives_spanish:
  - en nuestros ojos
  - en nuestra opinión
  - a nuestra vista
  lexicon: BDAG
  rationale: La expresión conserva la imagen semítica de percepción/valoración. "A nuestros ojos" es una fórmula idiomática clara en español y reproduce la metáfora mejor que una paráfrasis como "en nuestra opinión".
theological_decisions:
- issue: Referencia al nombre divino en una cita salmódica con κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el texto griego usa κύριος, el contexto cita el Salmo 118:23, donde el trasfondo es el nombre divino. La política del proyecto para el español principal es usar "Yahvé" para יהוה, por lo que se preserva explícitamente la referencia al Dios de Israel en vez de enmascararla con "Señor".
  doctrine_reference: 'DOCTRINE.md Contested terms: יהוה / YHWH → Yahvé; κύριος → Lord/Señor according to context'
translation_notes:
  revision_awareness: Se revisó el criterio auditado en inglés y no se introdujeron cambios sustanciales respecto de la decisión de origen/procedencia ni respecto del eco intertextual del Salmo 118:23. La versión española ajusta la terminología al estándar del proyecto para el nombre divino y conserva el sentido principal sin añadir paráfrasis.
  spanish_consistency_notes:
  - Se mantuvo el nombre divino como "Yahvé" conforme al estándar del proyecto.
  - Se conservó el valor de procedencia de παρὰ + genitivo mediante "proviene de".
  - La imagen idiomática de percepción se mantuvo con "a nuestros ojos".
  - El tono es bíblico-digno sin recurrir a formulaciones arcaizantes innecesarias.
