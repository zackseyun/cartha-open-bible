translation:
  language: es
  text: En la resurrección[a], cuando resuciten, ¿de quién será esposa? Porque los siete la tuvieron como esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando resuciten otra vez». El griego dice simplemente «cuando resuciten»; el contexto de la resurrección da ese sentido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνάστασις
  english_pob_choice: the resurrection
  chosen_spanish: la resurrección
  alternatives_spanish:
  - el levantamiento
  - la resurrección de entre los muertos
  lexicon: BDAG
  rationale: En este contexto es la resurrección escatológica discutida con los saduceos. En español, «la resurrección» es el equivalente natural y establecido; mantiene el artículo definido del griego y evita una expansión innecesaria.
- source_word: ὅταν ἀναστῶσιν
  english_pob_choice: when they rise
  chosen_spanish: cuando ellos resuciten
  alternatives_spanish:
  - cuando resuciten otra vez
  - cuando se levanten
  lexicon: BDAG
  rationale: La cláusula temporal apunta al futuro. «Resuciten» comunica mejor el sentido de ἀνίστημι en este marco de resurrección que un simple «se levanten», y evita añadir «otra vez», que no está explícito en el griego.
- source_word: τίνος αὐτῶν
  english_pob_choice: whose
  chosen_spanish: ¿de quién
  alternatives_spanish:
  - ¿de cuál de ellos
  - ¿de quién de ellos
  lexicon: BDAG
  rationale: La pregunta genitiva idiomática se expresa de manera natural en español como «¿de quién?». Esto preserva la relación posesiva sin forzar una construcción calcada.
- source_word: ἔσται γυνή
  english_pob_choice: will she be wife
  chosen_spanish: será esposa
  alternatives_spanish:
  - será la esposa
  - será mujer
  lexicon: BDAG
  rationale: En contexto matrimonial, γυνή significa «esposa». El predicado se naturaliza en español como «será esposa», que reproduce la relación marital sin sobreactuar el artículo que no aparece en el griego.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposo
  lexicon: BDAG
  rationale: Ambas ocurrencias son maritales, no genéricas. «Esposa» preserva la fuerza relacional y evita la ambigüedad de «mujer» en español.
- source_word: οἱ γὰρ ἑπτὰ
  english_pob_choice: for the seven
  chosen_spanish: porque los siete
  alternatives_spanish:
  - pues los siete
  - porque los siete hermanos
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la pregunta. «Porque los siete» es fiel y suficiente en español, ya que el contexto previo identifica a los hermanos; añadir «hermanos» sería explicativo, no textual.
- source_word: ἔσχον αὐτὴν γυναῖκα
  english_pob_choice: had her as wife
  chosen_spanish: la tuvieron por esposa
  alternatives_spanish:
  - la tomaron por esposa
  - se casaron con ella
  lexicon: BDAG
  rationale: La construcción griega ἔχω + acusativo + γυναῖκα expresa tener a alguien como esposa. «La tuvieron por esposa» conserva esa relación establecida mejor que «se casaron con ella», que desplaza el foco hacia el acto matrimonial.
theological_decisions:
- issue: Resurrección futura como trasfondo de la disputa
  english_pob_reading: the resurrection ... when they rise
  chosen_spanish_reading: la resurrección ... cuando ellos resuciten
  alternative_spanish_readings:
  - la resurrección de entre los muertos ... cuando resuciten otra vez
  rationale: La versión española mantiene el trasfondo escatológico sin ampliar el texto más allá de lo que dice el griego. Se conserva la tensión del debate con los saduceos y no se resuelve interpretativamente la pregunta.
  doctrine_reference: Primacía del texto original; preservar la tensión teológica del pasaje sin explicarla de más.
translation_notes:
  revision_awareness: No se aplicaron revisiones previas. La redacción se ajusta al contexto griego directo y al trail auditado en inglés, manteniendo la pregunta retórica y el valor relacional de γυνή sin ampliar innecesariamente el contenido.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no lo contiene.
  - Se mantiene «resurrección» como término técnico escatológico y «esposa» para γυνή en contexto marital.
  - Se evita «Cristo/Mesías» porque no aparecen en el versículo.
  - La puntuación sigue el ritmo interrogativo español con comillas de nota al pie solo en la alternativa.
  - «Resuciten» se eligió frente a «se levanten» para conservar la fuerza de ἀνίστημι en contexto de resurrección.
