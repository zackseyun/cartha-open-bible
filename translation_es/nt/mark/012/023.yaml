  spanish_quality_summary: 'El español es claro y comprensible, pero puede pulirse para sonar más natural y digno: «cuando resuciten» fluye mejor que «cuando ellos resuciten», y «la tuvieron como esposa» es más idiomático que «la tuvieron por esposa» en este contexto. La nota al pie necesita corregir comillas y redacción inicial para español natural.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Resurrección» y «esposa» están bien elegidos. No hay nombres divinos ni títulos mesiánicos en este versículo. La decisión de mantener «resuciten» en vez de «se levanten» concuerda con el razonamiento documentado.
  issues:
  - severity: medium
    issue: Sujeto explícito innecesario en «cuando ellos resuciten»
    rationale: El griego marca el sujeto en la forma verbal y el español natural no necesita «ellos» aquí. Mantenerlo no falsea el sentido, pero añade énfasis no presente y hace la frase más torpe.
  - severity: medium
    issue: «La tuvieron por esposa» suena menos natural para el modismo ἔσχον αὐτὴν γυναῖκα
    rationale: Aunque es entendible, en español bíblico actual «tenerla como esposa» refleja mejor una relación establecida sin desplazar el sentido al acto de casarse.
  - severity: low
    issue: Redacción de la nota al pie poco natural
    rationale: La nota comienza con una comilla sobrante y «aporta el sentido» suena algo calcado; «da el sentido» o «aclara el sentido» funciona mejor en español.
