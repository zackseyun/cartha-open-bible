translation:
  language: es
  text: '¿No han leído siquiera esta Escritura: «La piedra que desecharon los constructores ha llegado a ser esta, la piedra angular[a]»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cabeza del ángulo»; tradicionalmente, «la piedra angular principal».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: ni siquiera
  alternatives_spanish:
  - 'no'
  - ni
  lexicon: BDAG
  rationale: οὐδέ añade énfasis a la negación; en español, «ni siquiera» comunica mejor ese matiz que una simple negación.
- source_word: τὴν γραφὴν ταύτην
  english_pob_choice: this Scripture
  chosen_spanish: esta Escritura
  alternatives_spanish:
  - este pasaje de la Escritura
  - este escrito
  lexicon: BDAG
  rationale: γραφή en este contexto cita una autoridad bíblica concreta; «Escritura» conserva el sentido técnico reconocido en el NT y en la cita de Jesús.
- source_word: ἀνέγνωτε
  english_pob_choice: Have you not ... read
  chosen_spanish: han leído
  alternatives_spanish:
  - leyeron
  - han leído
  lexicon: BDAG
  rationale: En una pregunta retórica, el perfecto compuesto español resulta natural y mantiene la apelación a un texto ya disponible para los oyentes.
- source_word: Λίθον
  english_pob_choice: The stone
  chosen_spanish: La piedra
  alternatives_spanish:
  - Una piedra
  lexicon: BDAG
  rationale: Aunque en griego no lleva artículo, el referente es específico en la cita del Salmo 118; el español pide artículo definido para la imagen establecida.
- source_word: ἀπεδοκίμασαν
  english_pob_choice: rejected
  chosen_spanish: desecharon
  alternatives_spanish:
  - rechazaron
  - desaprobaron tras examinar
  lexicon: BDAG
  rationale: ἀποδοκιμάζω incluye la idea de rechazar tras evaluar. «Desecharon» comunica bien el acto de apartar y evita sobreinterpretar el matiz técnico en el texto principal.
- source_word: οἱ οἰκοδομοῦντες
  english_pob_choice: the builders
  chosen_spanish: los constructores
  alternatives_spanish:
  - los que construyen
  - los edificadores
  lexicon: BDAG
  rationale: El participio funciona sustantivamente; «constructores» es natural en español y conserva la metáfora sin forzar un giro más literal.
- source_word: ἐγενήθη εἰς κεφαλὴν γωνίας
  english_pob_choice: has become the cornerstone
  chosen_spanish: ha llegado a ser la piedra angular
  alternatives_spanish:
  - se ha convertido en la piedra angular
  - ha venido a ser la cabeza del ángulo
  lexicon: BDAG
  rationale: La expresión griega apunta al elemento principal de la esquina; «piedra angular» es la equivalencia española más clara y establecida, mientras «ha llegado a ser» conserva el valor resultativo de ἐγενήθη.
theological_decisions:
- issue: Imagen mesiánica del Salmo 118:22
  english_pob_reading: Retain the stone/builders/cornerstone metaphor without interpretive expansion in the main text.
  chosen_spanish_reading: Conservar la metáfora de la piedra, los constructores y la piedra angular sin explicitar «el Mesías» en el texto principal.
  alternative_spanish_readings:
  - explicitar que la piedra es el Mesías
  - glosar la imagen dentro del versículo
  rationale: La cita funciona primero como imagen escritural; el contexto narra su aplicación a Jesús, pero la traducción debe preservar la metáfora y no resolverla prematuramente dentro del versículo.
  doctrine_reference: Principio de primacía del texto fuente; mantener la tensión teológica y la intertextualidad.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca en el texto español exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo «Escritura» con mayúscula por su valor técnico en una cita bíblica.
  - Se evitó «Cristo» porque el griego aquí preserva la metáfora del Salmo y no nombra explícitamente al Mesías.
  - «Piedra angular» conserva la equivalencia española estándar para κεφαλὴν γωνίας sin perder la alternativa literal anotada.
