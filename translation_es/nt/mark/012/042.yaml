revisions:
- from: Y llegó una viuda pobre y echó dos leptas[a][b], que es un cuadrante[c].
  to: Y llegó una viuda pobre y echó dos leptas[a][b], que es un cuadrante romano[c].
  rationale: Se mantiene la traducción base porque refleja bien el griego, pero se ajusta κοδράντης a «cuadrante romano» para mayor precisión histórica y claridad en español. También se mejoran las notas para que suenen más naturales y expliquen mejor la equivalencia monetaria preservada por el POB inglés.
