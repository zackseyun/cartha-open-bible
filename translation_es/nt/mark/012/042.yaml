review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: una viuda pobre llega y deposita dos monedas mínimas, equivalentes a un κοδράντης. La estructura narrativa y la explicación de valor están preservadas. Sin embargo, hay un punto lexical importante: «cuadrante» no es la mejor forma española para κοδράντης/quadrans; conviene conservar el término histórico como «cuadrante romano» solo en nota o mejor «cuadrante» revisar a «cuadrante romano» no resuelve del todo. La forma más fiel y transparente al audit trail es «un cuadrante romano» o preferiblemente «un cuadrante» con nota, pero dado el inglés POB retiene quadrans, en español es más preciso «un cuadrante romano» en el texto o «un cuadrante» con nota aclaratoria. Además, la nota a mezcla singular/plural de lepton/leptas de manera algo extraña.'
  spanish_quality_summary: El español es claro y legible. «Y llegó una viuda pobre y echó…» suena natural, aunque «vino» también sería posible. «Echó» funciona bien en contexto de ofrendas. Las notas son comprensibles, pero la nota c necesita mejor precisión terminológica, y la nota a debería formular de modo más idiomático en español («un lepta era…» o «la lepta era…») en vez de encabezado tipo glosario «Lepton:».
  glossary_alignment: No hay términos teológicos sensibles aquí. La decisión de mantener «leptas» concuerda con el POB inglés y con la preferencia por transparencia histórica. La equivalencia con el κοδράντης debe conservar también el término histórico de forma más exacta; «cuadrante» a secas puede desorientar en español moderno por su uso no monetario. Las alternativas tradicionales («dos blancas», «cuarto de as») pueden mantenerse en nota como historial de traducción, no como texto principal.
  issues:
  - severity: medium
    issue: «un cuadrante» como texto principal es terminológicamente débil para κοδράντης
    rationale: Aunque busca transparentar quadrans, en español actual «cuadrante» se asocia sobre todo con objetos no monetarios. Añadir «romano» en el texto mejora la identificación histórica sin alejarse del original ni del audit trail inglés.
  - severity: low
    issue: Nota a formulada con «Lepton:»
    rationale: Suena menos natural en una nota española corriente. Conviene redactarla en oración completa y armonizar el singular/plural con el uso en el texto.
  - severity: low
    issue: Nota c puede explicarse con mayor precisión
    rationale: La explicación actual es aceptable, pero si el texto principal se ajusta, la nota debe reflejar con exactitud que se trata de la moneda romana mencionada en griego y que versiones antiguas la vertían de otra manera.
  revised_spanish_text: Y llegó una viuda pobre y echó dos leptas[a][b], que es un cuadrante romano[c].
  revised_footnotes:
