translation:
  language: es
  text: Y llegó una viuda pobre y echó dos leptas[a][b], que es un cuadrante romano[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Una lepta era una moneda muy pequeña; dos leptas equivalían a un cuadrante romano.
    reason: cultural_note
  - marker: b
    text: 'O: «dos pequeñas monedas de cobre». Tradicionalmente: «dos blancas».'
    reason: lexical_alternative
  - marker: c
    text: El griego nombra el quadrans, una moneda romana; versiones antiguas a menudo lo traducían como «cuarto de as».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθοῦσα
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - había venido
  lexicon: BDAG
  rationale: El participio aoristo de ἔρχομαι se integra naturalmente en español con un verbo finito que avance la narración. «Llegó» mantiene la secuencia narrativa sin volver pesado el giro participial.
- source_word: μία
  english_pob_choice: a
  chosen_spanish: una
  alternatives_spanish:
  - una sola
  - una cierta
  lexicon: BDAG
  rationale: Aquí funciona como introducción indefinida de un personaje en la escena. En español, «una viuda pobre» suena natural y conserva el valor narrativo de individuo.
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - viuda
  lexicon: BDAG
  rationale: Es el sentido lexical estándar y no hay razón contextual para variarlo.
- source_word: πτωχὴ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - necesitada
  - desvalida
  lexicon: BDAG
  rationale: «Pobre» reproduce de forma directa la pobreza material expresada por πτωχός y es claro en español. «Desvalida» o «necesitada» introducirían matices no explícitos en el griego.
- source_word: ἔβαλεν
  english_pob_choice: put in
  chosen_spanish: echó
  alternatives_spanish:
  - metió
  - puso
  lexicon: BDAG
  rationale: En el contexto de la ofrenda, el verbo español «echar» comunica bien el acto de depositar una moneda. Además, conserva mejor la fuerza concreta del griego que «poner» o «meter».
- source_word: λεπτὰ δύο
  english_pob_choice: two lepta
  chosen_spanish: dos leptas
  alternatives_spanish:
  - dos monedas pequeñas de cobre
  - dos mites
  lexicon: BDAG
  rationale: Se conserva el nombre de la moneda griega para mantener transparencia hacia el original. En español, «lepta» funciona como préstamo explicable; «mites» es arcaico y «monedas pequeñas de cobre» pierde precisión.
- source_word: ὅ ἐστιν
  english_pob_choice: which is
  chosen_spanish: que es
  alternatives_spanish:
  - es decir
  - lo cual es
  lexicon: BDAG
  rationale: La cláusula explica la equivalencia de valor y en español «que es» resulta natural y directo.
- source_word: κοδράντης
  english_pob_choice: a quadrans
  chosen_spanish: un cuadrante
  alternatives_spanish:
  - un cuadrans
  - un cuartillo
  lexicon: BDAG
  rationale: κοδράντης designa la moneda romana quadrans. En español, «cuadrante» es una forma comprensible y transparente para conservar el valor histórico sin recurrir a equivalencias modernas engañosas.
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa coinciden de manera alta; no se registran revisiones aplicadas. La redacción española sigue esa lectura estable, conservando el nombre de la moneda pequeña y la equivalencia explicativa final.
  spanish_consistency_notes:
  - Se mantiene el orden narrativo simple del griego con una coordinación fluida en español.
  - Se conserva el tecnicismo monetario 'lepta' con nota explicativa para no borrar la referencia histórica.
  - '''Cuadrante'' se usa como equivalente histórico del κοδράντης, evitando equivalencias monetarias modernas.'
  - No se introduce una carga interpretativa adicional sobre la pobreza de la viuda más allá de 'pobre'.
