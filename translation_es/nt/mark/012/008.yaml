translation:
  language: es
  text: Y lo tomaron[a], lo mataron y lo echaron fuera de la viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos lectores podrían esperar el orden 'lo echaron fuera de la viña y lo mataron' por la tradición paralela de la parábola, pero el griego de Marcos aquí dice 'lo mataron y lo echaron fuera de la viña'.
    reason: cross_reference
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: they took him
  chosen_spanish: lo tomaron
  alternatives_spanish:
  - habiéndolo tomado
  - lo گرفتaron
  - lo agarraron
  lexicon: BDAG
  rationale: El participio aoristo de λαμβάνω encadena la acción en una secuencia narrativa rápida. En español, 'lo tomaron' reproduce esa progresión sin volver la frase pesada; 'lo agarraron' añade una fuerza no exigida por el verbo en este contexto.
- source_word: ἀπέκτειναν
  english_pob_choice: killed
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo dieron de muerte
  - lo asesinaron
  lexicon: BDAG
  rationale: ἀποκτείνω expresa matar o dar muerte de manera directa. 'Lo mataron' es el equivalente más claro y sobrio en español moderno; 'asesinaron' introduciría una intención que el verbo griego por sí solo no precisa.
- source_word: ἐξέβαλον
  english_pob_choice: threw him out
  chosen_spanish: lo echaron fuera
  alternatives_spanish:
  - lo expulsaron
  - lo arrojaron fuera
  - lo echaron
  lexicon: BDAG
  rationale: ἐκβάλλω tiene la fuerza de expulsar o echar fuera. 'Lo echaron fuera' conserva esa imagen verbal y suena natural en español; 'expulsaron' es posible, pero menos narrativo y menos concreto aquí.
- source_word: ἔξω τοῦ ἀμπελῶνος
  english_pob_choice: out of the vineyard
  chosen_spanish: fuera de la viña
  alternatives_spanish:
  - fuera del viñedo
  - afuera de la viña
  - fuera de la viña
  lexicon: BDAG
  rationale: ἔξω con genitivo indica ubicación/movimiento hacia fuera. 'Fuera de la viña' refleja bien la relación espacial y mantiene el orden del griego, sin recurrir a una paráfrasis más explicativa.
- source_word: ἀμπελῶνος
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  - plantío de uvas
  lexicon: BDAG
  rationale: ἀμπελών designa una viña o viñedo; 'viña' es la forma más natural y bíblicamente reconocible en español, sin perder precisión referencial.
theological_decisions:
- issue: Orden de matar y expulsar
  english_pob_reading: 'The translation follows the Greek sequence: they killed him and then threw him out of the vineyard.'
  chosen_spanish_reading: 'La traducción sigue la secuencia griega: lo mataron y luego lo echaron fuera de la viña.'
  alternative_spanish_readings:
  - lo echaron fuera de la viña y luego lo mataron
  - lo mataron al echarlo fuera de la viña
  rationale: Se conserva el orden del texto griego de Marcos, aun si una tradición paralela podría hacer esperar otro orden. Esto preserva la tensión textual y evita armonizar el pasaje.
  doctrine_reference: Primacía del original sobre la armonización con paralelos; conservar la tensión textual cuando el griego la presenta.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el consenso de auditoría mantiene la secuencia griega y la equivalencia léxica propuesta.'
  spanish_consistency_notes:
  - Se usó 'viña' para ἀμπελών, en coherencia con el registro bíblico en español y con la imaginería de la parábola.
  - Se evitó 'Cristo' o vocabulario litúrgico no presente en el texto.
  - La nota [a] se ancla en 'lo tomaron' para señalar la expectativa de orden en la tradición paralela sin alterar la secuencia de Marcos.
