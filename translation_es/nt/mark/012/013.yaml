translation:
  language: es
  text: Y le envían a algunos de los fariseos y a algunos de los herodianos[a], para que lo atraparan por una palabra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo atraparan por lo que dijera». El verbo griego usa una metáfora de caza, y la frase final indica que le tenderían una trampa por medio de lo que dijera.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλουσιν
  english_pob_choice: they send
  chosen_spanish: envían
  alternatives_spanish:
  - mandan
  - despachan
  lexicon: BDAG
  rationale: Conserva el presente histórico del griego y suena natural en español narrativo sin perder la acción de enviar.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  - para él
  lexicon: BDAG
  rationale: La preposición πρός con persona destinataria se expresa de forma directa en español con 'a él', evitando sobrecargar la frase.
- source_word: τινας τῶν Φαρισαίων καὶ τῶν Ἡρῳδιανῶν
  english_pob_choice: some of the Pharisees and some of the Herodians
  chosen_spanish: a algunos de los fariseos y de los herodianos
  alternatives_spanish:
  - a algunos fariseos y herodianos
  - a ciertos fariseos y herodianos
  lexicon: BDAG
  rationale: Mantiene la construcción partitiva de τινας + genitivo y la simetría entre ambos grupos, sin insinuar que se trate de la totalidad de cada grupo.
- source_word: Φαρισαίων
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo judío, conservando la referencia histórica y religiosa.
- source_word: Ἡρῳδιανῶν
  english_pob_choice: Herodians
  chosen_spanish: herodianos
  alternatives_spanish:
  - herodianos
  lexicon: BDAG
  rationale: Transliteración estándar del grupo político/religioso vinculado con Herodes.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Expresa la cláusula de propósito con naturalidad en español y preserva la subordinación intencional.
- source_word: ἀγρεύσωσιν
  english_pob_choice: might trap
  chosen_spanish: lo atraparan
  alternatives_spanish:
  - lo emboscaran
  - lo enredaran
  lexicon: BDAG
  rationale: El verbo tiene metáfora de caza; 'atrapar' conserva la idea de tender una trampa sin imponer una paráfrasis excesiva.
- source_word: λόγῳ
  english_pob_choice: by a word
  chosen_spanish: con una palabra
  alternatives_spanish:
  - por una palabra
  - con algo que dijera
  - mediante una palabra
  lexicon: BDAG
  rationale: En español, 'con una palabra' reproduce bien el valor instrumental de λόγῳ y mantiene el singular, como hace el texto griego.
theological_decisions:
- issue: Sujeto tácito del verbo plural
  english_pob_reading: they
  chosen_spanish_reading: envían
  alternative_spanish_readings:
  - ellos envían
  - los líderes envían
  rationale: Se conserva el sujeto implícito del griego sin introducir una identificación explícita que el versículo no repite, manteniendo el enlace contextual sin sobreinterpretar.
  doctrine_reference: Preservar la tensión narrativa y no importar especificaciones ajenas al enunciado inmediato.
- issue: Tensión semántica de λόγῳ y la metáfora de caza de ἀγρεύσωσιν
  english_pob_reading: trap him by a word
  chosen_spanish_reading: lo atraparan con una palabra
  alternative_spanish_readings:
  - lo atraparan por lo que dijera
  - lo enredaran en su խոս
  rationale: Se conserva la imagen hostil de una trampa verbal y el singular de λόγῳ. 'Con una palabra' mantiene el vínculo entre el medio y la respuesta verbal de Jesús sin diluir la metáfora.
  doctrine_reference: Mantener la fuerza lexical del texto y su metáfora sin suavizarla innecesariamente.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión más reciente del POB en inglés: conserva el presente histórico de ἀποστέλλουσιν, mantiene la partícula de propósito con naturalidad y refleja el matiz instrumental de λόγῳ sin perder el singular ni la metáfora de caza.'
  spanish_consistency_notes:
  - Se usó 'fariseos' y 'herodianos' como transliteraciones estables de nombres de grupo.
  - Se prefirió el presente histórico 'envían' para alinearse con el griego y con el estilo narrativo del POB.
  - '''Con una palabra'' mantiene la ambigüedad productiva entre medio verbal y contenido de lo dicho, sin convertirla en explicación interpretativa en el texto principal.'
