revisions:
- from: Y envían a él a algunos de los fariseos y de los herodianos[a], para que lo atraparan con una palabra.
  to: Y le envían a algunos de los fariseos y a algunos de los herodianos[a], para que lo atraparan por una palabra.
  rationale: 'Se ajusta el español para que sea más idiomático y más fiel al griego auditado: «le envían» evita un calco torpe; la doble partitiva se explicita con simetría; «por una palabra» refleja mejor el instrumental singular de λόγῳ en este contexto; y la nota al pie se pule para mayor naturalidad. No hace falta adjudicación adicional porque los cambios son locales y claros.'
