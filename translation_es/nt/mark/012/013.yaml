review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: mantiene el presente histórico con «envían», conserva el sujeto implícito, identifica correctamente a fariseos y herodianos, y expresa la finalidad de tender una trampa verbal. Sin embargo, no representa con suficiente fidelidad la construcción partitiva doble τινας τῶν Φαρισαίων καὶ τῶν Ἡρῳδιανῶν, que en el rastro inglés se explicitó como «some of the Pharisees and some of the Herodians». Además, «a él» suena poco natural en español en este contexto narrativo; «a Jesús» importaría información no repetida en el versículo, pero el clítico «le» preserva mejor el sentido.'
  spanish_quality_summary: El texto es legible, pero «Y envían a él» suena calcado y poco idiomático. También «a algunos de los fariseos y de los herodianos» deja menos clara la distribución entre ambos grupos que una formulación simétrica. «Con una palabra» es comprensible, pero «por una palabra» suena más natural aquí y preserva bien el instrumental singular ya preferido en la auditoría inglesa («by a word»). La nota al pie necesita pulirse levemente para sonar más natural en español.
  glossary_alignment: 'La terminología principal está alineada con el proyecto: «fariseos», «herodianos» y el resto de términos no presentan conflictos con el glosario. No hay nombres divinos ni títulos mesiánicos en juego. La elección de «atrapar» es aceptable para ἀγρεύσωσιν, especialmente con nota que preserve la metáfora de caza.'
  issues:
  - severity: medium
    issue: Construcción partitiva incompleta en «a algunos de los fariseos y de los herodianos»
    rationale: 'El griego y la auditoría inglesa distinguen representantes de ambos grupos. En español conviene reflejarlo con simetría explícita: «a algunos de los fariseos y a algunos de los herodianos».'
  - severity: medium
    issue: «Y envían a él» suena poco natural en español
    rationale: Aunque formalmente posible, es un calco de πρὸς αὐτόν. «Le envían» expresa de manera idiomática el destinatario sin añadir información ajena al versículo.
  - severity: low
    issue: «con una palabra» es menos natural que «por una palabra» en este contexto
    rationale: Ambas pueden funcionar, pero «por una palabra» reproduce mejor la idea instrumental de λόγῳ en una trampa basada en lo dicho, en línea con el inglés auditado «by a word».
  - severity: low
    issue: Redacción de la nota al pie mejorable
    rationale: «Lo tenderían una trampa» es menos natural que «le tenderían una trampa», y «mediante su propia respuesta verbal» puede simplificarse sin pérdida.
  revised_spanish_text: Y le envían a algunos de los fariseos y a algunos de los herodianos[a], para que lo atraparan por una palabra.
  revised_footnotes:
  - marker: a
    text: 'O: «lo atraparan por lo que dijera». El verbo griego usa una metáfora de caza, y la frase final indica que le tenderían una trampa por medio de lo que dijera.'
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para que sea más idiomático y más fiel al griego auditado: «le envían» evita un calco torpe; la doble partitiva se explicita con simetría; «por una palabra» refleja mejor el instrumental singular de λόγῳ en este contexto; y la nota al pie se pule para mayor naturalidad. No hace falta adjudicación adicional porque los cambios son locales y claros.'
