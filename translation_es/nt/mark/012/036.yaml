base_translation:
  language: en
  yaml_path: translation/nt/mark/012/036.yaml
  text: David himself said in the Holy Spirit[a], ‘The Lord said to my Lord[b], “Sit at my right hand until I put your enemies under your feet.”’
  footnotes:
  - marker: a
    text: The quotation is from Psalm 110:1. In the Hebrew text, the first 'Lord' represents the divine name (YHWH, traditionally rendered 'the LORD'), while the second refers to David's lord.
    reason: cross_reference
  - marker: b
    text: Or 'by the Holy Spirit.'
    reason: alternative_reading
