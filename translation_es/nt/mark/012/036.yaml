translation:
  language: es
  text: 'David mismo dijo en el Espíritu Santo[a]: «Yahvé[b] dijo a mi Señor: “Siéntate a mi derecha hasta que ponga a tus enemigos debajo de tus pies”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por el Espíritu Santo».
    reason: alternative_reading
  - marker: b
    text: La cita procede de Salmo 110:1. En el texto hebreo, el primer término corresponde al nombre divino (YHWH, tradicionalmente transliterado «Yahvé»), mientras que el segundo se refiere al señor de David.
    reason: cross_reference
lexical_decisions:
- source_word: αὐτὸς Δαυὶδ
  english_pob_choice: David himself
  chosen_spanish: David mismo
  alternatives_spanish:
  - David personalmente
  - el mismo David
  lexicon: BDAG
  rationale: αὐτός añade énfasis a David como sujeto hablante. En español, «David mismo» conserva bien ese valor intensivo sin sonar forzado.
- source_word: ἐν τῷ πνεύματι τῷ ἁγίῳ
  english_pob_choice: in the Holy Spirit
  chosen_spanish: en el Espíritu Santo
  alternatives_spanish:
  - por el Espíritu Santo
  - en el Espíritu, el Santo
  lexicon: BDAG
  rationale: La preposición ἐν con dativo se rinde de manera directa con «en», manteniendo el vínculo con la acción del Espíritu. «Espíritu Santo» expresa con naturalidad la referencia al Espíritu Santo sin decidir más de lo que el griego dice sobre el modo exacto de inspiración.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  - Señor
  lexicon: BDAG
  rationale: En la cita de Salmo 110:1, el primer κύριος corresponde al nombre divino en el texto hebreo subyacente. Conforme al criterio del proyecto, se usa «Yahvé» en el texto principal para hacer visible esa referencia, mientras que el segundo κύριος queda como «mi Señor».
- source_word: τῷ κυρίῳ μου
  english_pob_choice: to my Lord
  chosen_spanish: a mi Señor
  alternatives_spanish:
  - a mi amo
  - a mi maestro
  lexicon: BDAG
  rationale: «Señor» conserva la fuerza del título y la argumentación cristológica del pasaje. «Amo» o «maestro» no captan tan bien el valor reverencial y resultan menos aptos en este contexto bíblico.
- source_word: Κάθου
  english_pob_choice: Sit
  chosen_spanish: Siéntate
  alternatives_spanish:
  - Siéntate aquí
  - Toma asiento
  lexicon: BDAG
  rationale: El imperativo tiene sentido de entronización; «Siéntate» transmite con naturalidad la orden sin añadir matices ajenos.
- source_word: ἐκ δεξιῶν μου
  english_pob_choice: at my right hand
  chosen_spanish: a mi derecha
  alternatives_spanish:
  - a mi diestra
  - a mi lado derecho
  lexicon: BDAG
  rationale: La expresión es idiomática y denota posición de honor. En español, «a mi derecha» comunica de forma clara y natural la imagen sin necesidad de calco rígido.
- source_word: ἕως ἂν θῶ
  english_pob_choice: until I put
  chosen_spanish: hasta que ponga
  alternatives_spanish:
  - hasta que coloque
  - hasta que yo ponga
  lexicon: BDAG
  rationale: La construcción de límite temporal futuro se expresa bien con «hasta que ponga», que conserva la fuerza prospectiva del griego.
- source_word: τοὺς ἐχθρούς σου
  english_pob_choice: your enemies
  chosen_spanish: a tus enemigos
  alternatives_spanish:
  - tus enemigos
  - a los enemigos tuyos
  lexicon: BDAG
  rationale: El acusativo se vierte naturalmente con objeto directo en español; el sentido es el de oposición personal dirigida contra el destinatario.
- source_word: ὑποκάτω τῶν ποδῶν σου
  english_pob_choice: under your feet
  chosen_spanish: debajo de tus pies
  alternatives_spanish:
  - bajo tus pies
  - a tus pies
  lexicon: BDAG
  rationale: «Debajo de tus pies» conserva la imagen de sometimiento sin introducir la forma ampliada de Salmo 110:1 («como estrado»), que Mark no incluye aquí.
theological_decisions:
- issue: Referencia divina del primer κύριος en la cita del Salmo
  english_pob_reading: The Lord said to my Lord
  chosen_spanish_reading: Yahvé dijo a mi Señor
  alternative_spanish_readings:
  - El Señor dijo a mi Señor
  - El Señor dijo a mi Señor
  rationale: El texto griego cita la fórmula del Salmo 110:1 con κύριος para ambos términos, pero el trasfondo hebreo del primer término es el nombre divino. La traducción principal hace visible esa tensión con «Yahvé», mientras conserva «mi Señor» para el segundo término, manteniendo el argumento del pasaje y la claridad para el lector español.
  doctrine_reference: Salmo 110:1; criterio terminológico del proyecto para יהוה/YHWH
- issue: Modo de la palabra profética de David
  english_pob_reading: David himself said in the Holy Spirit
  chosen_spanish_reading: David mismo dijo en el Espíritu Santo
  alternative_spanish_readings:
  - David mismo dijo por el Espíritu Santo
  - David habló en el Espíritu Santo
  rationale: La frase afirma la participación del Espíritu Santo en la declaración de David sin precisar una teoría de inspiración más estrecha que la del griego. «En el Espíritu Santo» preserva la lectura base y deja abierta la tensión interpretativa documentada en el inglés.
  doctrine_reference: Pneumatología ortodoxa; filosofía de traducción §3
- issue: Imagen de sujeción final
  english_pob_reading: under your feet
  chosen_spanish_reading: debajo de tus pies
  alternative_spanish_readings:
  - bajo tus pies
  - como estrado de tus pies
  rationale: Mark conserva la forma más breve de la imagen de Salmo 110:1. «Debajo de tus pies» mantiene el acto de sometimiento sin importar la expansión del Salmo a la main text.
  doctrine_reference: Marcos 12:36; Salmo 110:1
translation_notes:
  revision_awareness: 'Se revisó la coherencia con el texto griego de Marcos 12:36 y con el expediente inglés: se mantuvo el énfasis de αὐτός, la referencia al Espíritu Santo, la doble ocurrencia de κύριος en la cita del Salmo y la forma breve «debajo de tus pies» sin introducir «estrado». Se aplicó además el criterio terminológico del proyecto para יהוה/YHWH con «Yahvé» en el texto principal.'
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «Yahvé» y «mi Señor» para reflejar la tensión del Salmo 110:1.
  - «Espíritu Santo» se usa con mayúsculas por tratarse de la referencia personal al Espíritu Santo, no de un uso genérico de espíritu.
  - La cita se cerró con comillas españolas y puntuación natural para lectura pública.
  - Se evitó el calco «a la diestra» porque «a mi derecha» resulta más natural en español y conserva el sentido idiomático.
