    rationale: Aunque léxicamente posible, es más general que el contexto inmediato de ἀμπελών. El expediente POB en inglés prefirió la especificidad contextual («vine-growers»). En español, «viñadores» transmite mejor esa relación con la viña sin imponer el matiz legal de «arrendatarios».
  - severity: low
