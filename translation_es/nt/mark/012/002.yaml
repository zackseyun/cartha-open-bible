translation:
  language: es
  text: Y al tiempo oportuno envió a un esclavo[a] a los viñadores[b], para que recibiera de los viñadores parte del fruto de la viña.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para δοῦλος.
    reason: alternative_reading
  - marker: b
    text: O «labradores» o «arrendatarios» para γεωργοί. El término griego designa a quienes trabajan la tierra; en el contexto de una viña, «viñadores» expresa mejor ese sentido específico.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: ἀποστέλλω en este relato narrativo pide un verbo natural y directo; «envió» conserva la acción sin añadir matices de urgencia o formalidad que el griego no exige.
- source_word: τῷ καιρῷ
  english_pob_choice: at the proper time
  chosen_spanish: al tiempo oportuno
  alternatives_spanish:
  - en el momento adecuado
  - a su debido tiempo
  - cuando llegó el tiempo
  lexicon: BDAG
  rationale: καιρός señala el momento apropiado o señalado. «Al tiempo oportuno» mantiene esa idea de oportunidad/aptitud temporal sin precisar más de lo que el texto dice.
- source_word: δοῦλον
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - criado
  - servidor
  lexicon: BDAG
  rationale: En este contexto parabólico, el estatus dependiente del enviado es real y socialmente cargado; «esclavo» conserva la fuerza lexical de δοῦλος. Se evita «siervo» como equivalente principal porque suaviza el término.
- source_word: γεωργοὺς / γεωργῶν
  english_pob_choice: vine-growers
  chosen_spanish: labradores
  alternatives_spanish:
  - viñadores
  - agricultores
  - arrendatarios
  lexicon: BDAG
  rationale: γεωργός designa a quien trabaja la tierra. En español, «labradores» es amplio, natural y suficientemente agrícola; «viñadores» sería más específico pero puede sonar menos idiomático, y «arrendatarios» introduce una relación legal no expresada por la palabra misma.
- source_word: ἵνα ... λάβῃ
  english_pob_choice: so that he might receive
  chosen_spanish: para que recibiera
  alternatives_spanish:
  - a fin de que recibiera
  - para recibir
  - para que obtuviera
  lexicon: BDAG
  rationale: La cláusula de ἵνα expresa propósito; «para que recibiera» mantiene el valor final y el subjuntivo de manera natural en español.
- source_word: παρὰ τῶν γεωργῶν
  english_pob_choice: from the vine-growers
  chosen_spanish: de los labradores
  alternatives_spanish:
  - por parte de los labradores
  - de parte de los labradores
  lexicon: BDAG
  rationale: παρά con genitivo indica procedencia o fuente. En español, «de los labradores» es la forma más directa; el contexto ya hace claro que la recepción proviene de ellos.
- source_word: ἀπὸ ⸂τῶν καρπῶν⸃
  english_pob_choice: some of the fruit
  chosen_spanish: parte del fruto
  alternatives_spanish:
  - algo del fruto
  - una porción del fruto
  - de los frutos
  lexicon: BDAG
  rationale: La construcción con ἀπό sugiere extracción parcial de un conjunto. «Parte del fruto» expresa bien la porción sin añadir la idea de «su parte» o «su cuota», que el griego no formula explícitamente.
- source_word: τοῦ ἀμπελῶνος
  english_pob_choice: the vineyard
  chosen_spanish: de la viña
  alternatives_spanish:
  - del viñedo
  - de la plantación de uvas
  lexicon: BDAG
  rationale: ἀμπελών se refiere a una viña o viñedo; «viña» es claro, bíblico y natural en español contemporáneo. «Viñedo» también sería correcto, pero «viña» mantiene mejor el registro narrativo bíblico.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego SBLGNT y coincide con la línea de lectura del POB en inglés: envío en tiempo oportuno, propósito con ἵνα, y preservación de la fuerza de δοῦλος. Se ajusta la metáfora agrícola a un español natural, usando «labradores» y «viña» como equivalentes idiomáticos. No se introducen cambios textuales ni interpretativos respecto del audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo «de los labradores» para reflejar tanto πρὸς τοὺς γεωργοὺς como παρὰ τῶν γεωργῶν sin crear confusión.
  - «Fruto» se conserva en singular colectivo, coherente con el griego plural τῶν καρπῶν y con el sentido partitivo del contexto.
  - Se usa minúscula en «esclavo» porque designa un rol común dentro de la parábola, no un título propio.
