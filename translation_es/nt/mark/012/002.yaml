    rationale: Si el texto principal usa «labradores», la nota ofrece «viñadores» solo como alternativa, pero la evidencia contextual favorece precisamente esa especificidad. Conviene promoverla al texto principal y dejar «labradores» y «arrendatarios» como alternativas.
