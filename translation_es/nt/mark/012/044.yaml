- from: Porque todos ellos dieron de su abundancia[a]; pero ella, de su pobreza, echó todo lo que tenía, todo su sustento.
  to: Porque todos ellos dieron de su abundancia; pero ella, de su pobreza, echó todo lo que tenía, todo su sustento[a].
  rationale: Se conserva el texto principal casi intacto porque traduce bien el griego y el razonamiento léxico-teológico del POB. La única corrección necesaria es mover la nota al pie al sintagma que traduce ὅλον τὸν βίον αὐτῆς y hacer que la nota refleje con precisión la alternativa auditada en inglés.
