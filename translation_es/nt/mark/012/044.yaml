translation:
  language: es
  text: Porque todos ellos dieron de su abundancia; pero ella, de su pobreza, echó todo lo que tenía, todo su sustento[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que tenía para vivir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos ellos
  alternatives_spanish:
  - todos
  - ellos todos
  lexicon: BDAG
  rationale: El plural nominativo se refiere al grupo de oferentes. «Todos ellos» conserva la totalidad enfática y suena natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: La partícula introduce explicación del contraste anterior; «Porque» mantiene la relación explicativa de forma clara y directa.
- source_word: ἐκ τοῦ περισσεύοντος αὐτοῖς
  english_pob_choice: out of their abundance
  chosen_spanish: de su abundancia
  alternatives_spanish:
  - de lo que les sobraba
  - de su sobrante
  - de su excedente
  lexicon: BDAG
  rationale: El participio con ἐκ expresa dar desde lo que sobra. «Abundancia» reproduce la idea de excedente con un español natural y digno.
- source_word: ἔβαλον
  english_pob_choice: gave
  chosen_spanish: dieron
  alternatives_spanish:
  - pusieron
  - echaron
  lexicon: BDAG
  rationale: En el contexto de ofrenda, el sentido es aportar/donar; «dieron» evita una literalidad áspera y conserva el acto de contribución.
- source_word: αὕτη δὲ
  english_pob_choice: but she
  chosen_spanish: pero ella
  alternatives_spanish:
  - pero esta mujer
  - pero ella misma
  lexicon: BDAG
  rationale: La oposición marcada por δέ contrasta a la viuda con los demás. «Pero ella» mantiene el contraste sin añadir más de lo necesario.
- source_word: ἐκ τῆς ὑστερήσεως αὐτῆς
  english_pob_choice: out of her poverty
  chosen_spanish: de su pobreza
  alternatives_spanish:
  - de su necesidad
  - de su carencia
  - de su falta
  lexicon: BDAG
  rationale: ὑστέρησις denota escasez o carencia real; «pobreza» comunica mejor la situación económica concreta en este pasaje.
- source_word: πάντα ὅσα εἶχεν
  english_pob_choice: everything she had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todo cuanto tenía
  - todo cuanto poseía
  - todo lo que poseía
  lexicon: BDAG
  rationale: La construcción es totalizante; «todo lo que tenía» es idiomático y preserva la amplitud del griego sin sonar forzado.
- source_word: ἔβαλεν
  english_pob_choice: put in
  chosen_spanish: echó
  alternatives_spanish:
  - puso
  - metió
  - depositó
  lexicon: BDAG
  rationale: Aquí βάλλω conserva el matiz físico de introducir monedas en la ofrenda. «Echó» mantiene ese gesto concreto y el paralelismo con el verbo anterior.
- source_word: ὅλον τὸν βίον αὐτῆς
  english_pob_choice: her whole livelihood
  chosen_spanish: todo su sustento
  alternatives_spanish:
  - toda su subsistencia
  - todo lo que tenía para vivir
  - su sustento entero
  lexicon: BDAG
  rationale: βίος aquí designa medios de vida, no vida biológica. «Sustento» preserva la carga económica y evita leer literalmente «vida».
theological_decisions:
- issue: Sentido de βίος en la conclusión del dicho
  english_pob_reading: economic means of life ('livelihood'), not her life itself
  chosen_spanish_reading: medios de sustento / subsistencia, no su vida biológica
  alternative_spanish_readings:
  - su vida
  - su existencia
  - su vida entera
  rationale: El contexto trata de una ofrenda monetaria. Traducir βίος como «sustento» mantiene la fuerza de la entrega total sin sugerir que la viuda ofreció su vida física en ese momento.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del audit trail: no se documentan revisiones aplicadas y el pasaje mantiene alto acuerdo en la revisión cruzada.'
  spanish_consistency_notes:
  - Se mantiene «abundancia» para περισσεύοντος y «pobreza» para ὑστέρησις, preservando el contraste económico del original.
  - Se evita «Cristo» o terminología eclesiástica ajena; el versículo no la requiere.
  - «Dieron» y «echó» reflejan el doble uso de βάλλω sin mecanizar el verbo inglés ni perder el gesto de ofrenda.
  - «Sustento» representa βίος de manera semánticamente precisa y compatible con el sentido auditado de livelihood.
