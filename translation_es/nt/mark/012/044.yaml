    rationale: La nota inglesa alternativa («all she had to live on») corresponde a «ὅλον τὸν βίον αὐτῆς», no a «abundancia». En español, el marcador debe aparecer en el segmento final relacionado con «su sustento» o equivalente.
  - severity: low
    issue: La nota al pie añade una segunda alternativa no presente en la auditoría inglesa.
    rationale: '«También: “toda su subsistencia”» no es erróneo, pero la nota auditada solo preserva la alternativa principal. Conviene mantener la nota más ceñida al rastro documentado.'
  revised_spanish_text: Porque todos ellos dieron de su abundancia; pero ella, de su pobreza, echó todo lo que tenía, todo su sustento[a].
