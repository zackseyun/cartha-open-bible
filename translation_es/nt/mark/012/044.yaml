review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: el contraste entre los muchos que dieron de lo que les sobraba y la viuda que dio desde su carencia está preservado, y βίος se entiende correctamente como medios de vida, no vida biológica. Sin embargo, la nota al pie está anclada en «abundancia[a]» cuando en realidad comenta «ὅλον τὸν βίον αὐτῆς / todo su sustento», por lo que no preserva fielmente la ubicación ni la función de la nota del rastro inglés.'
  spanish_quality_summary: El español es claro, natural y digno. «Porque todos ellos dieron de su abundancia; pero ella, de su pobreza, echó...» se lee bien. No obstante, conviene mover la nota al segmento final y simplificarla para que explique la alternativa exacta sin sobrecargar el texto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «abundancia», «pobreza», «echó» y «sustento» son compatibles con el análisis léxico documentado. «Sustento» comunica bien βίος como medio de subsistencia.
  issues:
