revisions:
- from: 'Y el escriba le dijo[a]: «Bien dicho, Maestro. Has hablado con verdad, que uno es, y no hay otro fuera de él».'
  to: 'Y el escriba le dijo[a]: «Bien dicho, Maestro. Has hablado en verdad, que él es uno, y no hay otro fuera de él».'
  rationale: 'Revisión menor para mejorar la naturalidad y fidelidad del español: se cambia «con verdad» por «en verdad» y «uno es» por «él es uno». Esto preserva la decisión documentada de no explicitar «Dios» en el texto principal, pero evita una formulación española demasiado forzada. La nota también se ajusta para corresponder exactamente al texto revisado.'
