translation:
  language: es
  text: 'Y el escriba le dijo[a]: «Bien dicho, Maestro. Has hablado en verdad, que él es uno, y no hay otro fuera de él».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente en el contexto: «Dios es uno». El griego dice simplemente «él es uno», y el referente se obtiene del contexto anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: γραμματεύς
  english_pob_choice: scribe
  chosen_spanish: escriba
  alternatives_spanish:
  - doctor de la ley
  - experto en la Ley
  lexicon: BDAG
  rationale: «Escriba» es el equivalente directo y transparente para γραμματεύς en los Evangelios. Mantiene el valor de oficio/grupo reconocido sin añadir una explicación interpretativa que el griego no exige.
- source_word: Καλῶς
  english_pob_choice: Well said
  chosen_spanish: Bien dicho
  alternatives_spanish:
  - Bien
  - Correcto
  lexicon: BDAG
  rationale: La expresión de aprobación funciona adverbialmente y conviene verterla con una fórmula idiomática en español. «Bien dicho» conserva la valoración positiva dirigida a la respuesta de Jesús.
- source_word: διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro de la Ley
  - Rabino
  lexicon: BDAG
  rationale: En el contexto de los Evangelios, el vocativo διδάσκαλε se dirige a Jesús como maestro. «Maestro» es natural en español bíblico contemporáneo y evita «rabino», que introduciría un matiz no explícito aquí.
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: truly
  chosen_spanish: con verdad
  alternatives_spanish:
  - verdaderamente
  - en verdad
  lexicon: BDAG
  rationale: La frase adverbial afirma la veracidad de lo dicho. «Con verdad» mantiene el sentido y suena más natural en español que un calco más rígido; «verdaderamente» también sería posible.
- source_word: εἶπες
  english_pob_choice: You have spoken
  chosen_spanish: has hablado
  alternatives_spanish:
  - has dicho
  - dijiste
  lexicon: BDAG
  rationale: El aoristo en diálogo se expresa con un perfecto natural en español. «Has hablado» conserva el énfasis en la declaración pronunciada, como en el audit trail inglés.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la afirmación, no una causa. «Que» es la subordinación correcta en español para introducir la proposición citada.
- source_word: εἷς ἐστιν
  english_pob_choice: he is one
  chosen_spanish: uno es
  alternatives_spanish:
  - él es uno
  - Dios es uno
  lexicon: BDAG
  rationale: El griego es elíptico y no repite explícitamente «Dios». «Uno es» conserva esa compresión y permite que el referente lo aporte el contexto inmediato; en español, esta inversión suena más natural que «él es uno».
- source_word: ἄλλος
  english_pob_choice: other
  chosen_spanish: otro
  alternatives_spanish:
  - ningún otro
  - uno más
  lexicon: BDAG
  rationale: '«Otro» es el equivalente directo de ἄλλος. En la negación siguiente, el español completa naturalmente la idea: «no hay otro».'
- source_word: πλὴν αὐτοῦ
  english_pob_choice: besides him
  chosen_spanish: fuera de él
  alternatives_spanish:
  - además de él
  - excepto él
  lexicon: BDAG
  rationale: La preposición πλήν con genitivo expresa exclusión/excepción. «Fuera de él» preserva bien la exclusividad en español y corresponde al giro natural de la frase.
theological_decisions:
- issue: Sujeto implícito en εἷς ἐστιν
  english_pob_reading: Render the clause as "he is one" rather than explicitly inserting "God" in the main text.
  chosen_spanish_reading: «uno es» en el texto principal, sin añadir «Dios» de forma explícita.
  alternative_spanish_readings:
  - «Dios es uno»
  - «hay un solo Dios»
  rationale: El contexto previo deja claro que se habla del único Dios, pero el griego de este versículo no repite θεός. Mantener la elipsis en español preserva la transparencia al original y evita resolver en el texto principal una tensión que el versículo mismo no verbaliza.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva la elipsis de εἷς ἐστιν, mantiene el valor exclusivo de πλὴν αὐτοῦ y evita ampliar el sujeto a «Dios» en el texto principal. No hay revisiones aplicadas en el paquete inglés más allá de la estabilidad final del texto.'
  spanish_consistency_notes:
  - Se mantiene «Maestro» para διδάσκαλε, consistente con el uso evangélico y con español bíblico claro.
  - «Escriba» conserva el término de oficio sin expansión interpretativa.
  - La nota al pie marca la única alternativa teológica relevante, equivalente a la del audit trail inglés.
  - La puntuación de comillas y el orden sintáctico buscan un español natural sin perder la estructura del griego.
