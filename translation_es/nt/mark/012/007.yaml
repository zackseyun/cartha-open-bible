translation:
  language: es
  text: 'Pero aquellos arrendatarios[a] se dijeron unos a otros: «Este es el heredero. Vamos, matémoslo, y la herencia será nuestra[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se dijeron entre sí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la herencia nos pertenecerá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκεῖνοι δὲ
  english_pob_choice: But those
  chosen_spanish: Pero aquellos
  alternatives_spanish:
  - Y aquellos
  - Ahora aquellos
  lexicon: BDAG
  rationale: δέ lleva un matiz adversativo suave que en español se expresa naturalmente con «Pero». ἐκεῖνοι se conserva con el demostrativo «aquellos» para mantener la referencia contrastiva del relato.
- source_word: γεωργοὶ
  english_pob_choice: tenant farmers
  chosen_spanish: labradores
  alternatives_spanish:
  - campesinos
  - arrendatarios de la viña
  - viñadores
  lexicon: BDAG
  rationale: El contexto de la parábola exige una expresión que aluda a los encargados de trabajar la tierra o la viña ajena. «Labradores» es una opción natural y amplia en español; evita una paráfrasis excesiva como «arrendatarios de la viña», pero mantiene la idea de trabajadores responsables del terreno de otro. «Viñadores» puede sonar más tradicional pero es menos transparente para el lector moderno.
- source_word: πρὸς ἑαυτοὺς εἶπαν
  english_pob_choice: said to one another
  chosen_spanish: se dijeron unos a otros
  alternatives_spanish:
  - se dijeron entre sí
  - se dijeron a sí mismos
  lexicon: BDAG
  rationale: La expresión griega describe una conversación dentro del grupo. «Se dijeron unos a otros» reproduce bien el valor recíproco y evita interpretar el giro como un monólogo interior.
- source_word: Οὗτός ἐστιν ὁ κληρονόμος
  english_pob_choice: This is the heir
  chosen_spanish: Este es el heredero
  alternatives_spanish:
  - Este es el heredero legítimo
  - Éste es el heredero
  lexicon: BDAG
  rationale: «Heredero» es el equivalente natural de κληρονόμος en sentido legal y familiar. «Heredero legítimo» añade un matiz no explícito en el griego, por lo que queda fuera del texto principal.
- source_word: δεῦτε
  english_pob_choice: Come
  chosen_spanish: Vamos
  alternatives_spanish:
  - Venid
  - Vamos ahora
  lexicon: BDAG
  rationale: En español, la exhortación colectiva encaja mejor con «Vamos» que con un simple imperativo de invitación. Conserva el tono de propuesta urgente que introduce el plan.
- source_word: ἀποκτείνωμεν
  english_pob_choice: let us kill
  chosen_spanish: matémoslo
  alternatives_spanish:
  - matémosle
  - demos muerte
  lexicon: BDAG
  rationale: El verbo expresa una resolución homicida. «Matémoslo» es la forma más directa y natural en español, sin añadir la carga legal de «asesinémoslo» ni la solemnidad de «demos muerte».
- source_word: καὶ ἡμῶν ἔσται ἡ κληρονομία
  english_pob_choice: and the inheritance will be ours
  chosen_spanish: y la herencia será nuestra
  alternatives_spanish:
  - y la herencia nos pertenecerá
  - y la herencia será de nosotros
  lexicon: BDAG
  rationale: La cláusula expresa la expectativa de posesión futura. «La herencia será nuestra» reproduce con naturalidad el sentido posesivo de ἡμῶν sin introducir «pertenecerá», que sería más explicativo.
theological_decisions:
- issue: Valor de γεωργοὶ en la parábola
  english_pob_reading: tenant farmers
  chosen_spanish_reading: labradores
  alternative_spanish_readings:
  - arrendatarios
  - viñadores
  - campesinos
  rationale: No hay una disputa doctrinal, pero sí una decisión de precisión contextual. «Labradores» mantiene la relación laboral con la propiedad del dueño sin sobrecargar el verso con una explicación sociológica.
  doctrine_reference: Translation philosophy §1, §5
- issue: Formulación de la posesión final de la herencia
  english_pob_reading: the inheritance will be ours
  chosen_spanish_reading: la herencia será nuestra
  alternative_spanish_readings:
  - la herencia nos pertenecerá
  - la herencia será de nosotros
  rationale: El griego expresa posesión resultante; no introduce explícitamente al hijo o al dueño en la cláusula. La traducción conserva esa ambición posesiva de manera sobria y fiel.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail en inglés, manteniendo el contraste narrativo de δέ, el sentido recíproco de πρὸς ἑαυτοὺς εἶπαν, y la cláusula posesiva final sin añadir elementos no presentes en el original. Se optó por una expresión española natural y publicable, con notas breves donde hay alternativas léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «heredero» para κληρονόμος, coherente con el uso legal/familiar estándar.
  - Se evita «Cristo» u otra terminología teológica no presente en el verso.
  - «Labradores» funciona aquí como equivalente contextual de γεωργοὶ sin introducir una glosa explicativa en el texto principal.
  - La puntuación reproduce el discurso directo de forma clara y sobria en español.
