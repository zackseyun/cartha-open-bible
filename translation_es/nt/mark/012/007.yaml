  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: contraste narrativo («Pero aquellos»), deliberación interna del grupo («se dijeron unos a otros»), identificación del heredero, exhortación homicida y expectativa de apropiación de la herencia. Sin embargo, no preserva del todo la decisión léxica auditada para γεωργοί, donde el POB inglés especifica «tenant farmers» por la relación de arrendamiento dentro de la parábola. «Labradores» comunica trabajadores del campo, pero debilita esa relación de tenencia que el expediente inglés quiso explicitar.'
  spanish_quality_summary: 'El español es claro, natural y de registro bíblico moderno-digno. La sintaxis y la puntuación funcionan bien. La principal mejora necesaria es léxica: sustituir «labradores» por una expresión que haga visible la condición de arrendatarios sin volverse demasiado pesada. El resto del versículo suena idiomático y fiel.'
  glossary_alignment: 'No hay conflicto con los términos doctrinales globales principales. La desviación relevante está en γεωργοί: el proyecto inglés documentó «tenant farmers», y en español conviene algo como «arrendatarios» en este contexto parabólico. Las demás decisiones («heredero», «Vamos, matémoslo», «la herencia será nuestra») están alineadas con el expediente.'
