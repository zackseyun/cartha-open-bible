    rationale: El expediente inglés justifica explícitamente «tenant farmers» para resaltar que no son solo trabajadores agrícolas, sino tenedores responsables de tierra ajena. «Labradores» suena natural, pero puede reducirse a «campesinos/farmers» y perder la relación de arriendo que sostiene la parábola.
  - severity: low
