translation:
  language: es
  text: ¿Qué hará el dueño de la viña? Vendrá y destruirá a los arrendatarios[a], y dará la viña a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «los labradores»; griego: «los geōrgoús». El término puede referirse a cultivadores o agricultores, pero aquí, dentro de la parábola, se refiere a quienes trabajaban la viña ajena como arrendatarios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Qué entonces?
  lexicon: BDAG
  rationale: Interrogativo directo que introduce la pregunta retórica sin añadir una partícula discursiva que no está explícita en el griego.
- source_word: ποιήσει
  english_pob_choice: will do
  chosen_spanish: hará
  alternatives_spanish:
  - va a hacer
  lexicon: BDAG
  rationale: El futuro de ποιέω se expresa de forma natural con «hará», manteniendo el valor futuro del verbo griego.
- source_word: ὁ κύριος τοῦ ἀμπελῶνος
  english_pob_choice: the owner of the vineyard
  chosen_spanish: el dueño de la viña
  alternatives_spanish:
  - el señor de la viña
  - el amo de la viña
  lexicon: BDAG
  rationale: Aquí κύριος designa al propietario dentro de la parábola, no un título divino. «Dueño» comunica con naturalidad esa relación de posesión, como en el audit trail inglés.
- source_word: ἀμπελῶνος / ἀμπελῶνα
  english_pob_choice: vineyard
  chosen_spanish: viña
  alternatives_spanish:
  - viñedo
  lexicon: BDAG
  rationale: ἀμπελών en este contexto agrícola/parabólico se vierte de forma estándar como «viña», término claro y bíblicamente reconocible en español.
- source_word: ἐλεύσεται
  english_pob_choice: He will come
  chosen_spanish: Vendrá
  alternatives_spanish:
  - Llegará
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι se expresa de manera idiomática con «vendrá», conservando la inmediatez de la intervención del dueño.
- source_word: ἀπολέσει
  english_pob_choice: destroy
  chosen_spanish: destruirá
  alternatives_spanish:
  - hará perecer
  - arruinará
  lexicon: BDAG
  rationale: ἀπόλλυμι aquí señala una acción de juicio decisiva contra los labradores; «destruirá» preserva esa severidad sin restringirla indebidamente a «matar».
- source_word: τοὺς γεωργούς
  english_pob_choice: the tenant farmers
  chosen_spanish: a los labradores
  alternatives_spanish:
  - a los agricultores
  - a los viñadores
  - a los arrendatarios
  lexicon: BDAG
  rationale: γεωργός puede significar agricultor/labrador; en esta parábola se trata de quienes trabajan la viña ajena. «Labradores» mantiene el oficio rural sin sobre-especificar la forma legal de tenencia.
- source_word: δώσει
  english_pob_choice: give
  chosen_spanish: dará
  alternatives_spanish:
  - entregará
  - confiará
  lexicon: BDAG
  rationale: El verbo δίδωμι es amplio; «dará» sigue de cerca el griego sin introducir la idea más específica de arrendar o encomendar.
- source_word: τὸν ἀμπελῶνα
  english_pob_choice: the vineyard
  chosen_spanish: la viña
  alternatives_spanish:
  - el viñedo
  lexicon: BDAG
  rationale: Se mantiene la misma elección léxica que en la primera mención para cohesión textual y naturalidad en español.
- source_word: ἄλλοις
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a otras personas
  - a otros labradores
  lexicon: BDAG
  rationale: El dativo plural de ἄλλος se vierte de modo abierto como «a otros», respetando que el referente queda indeterminado en el griego.
theological_decisions:
- issue: κύριος en un contexto parabólico sin referencia divina inmediata
  english_pob_reading: owner
  chosen_spanish_reading: dueño
  alternative_spanish_readings:
  - señor
  - amo
  rationale: La POB inglesa evita «Lord» aquí para no cargar el término con un matiz teológico que el contexto inmediato no requiere. «Dueño» preserva la referencia al propietario de la viña dentro de la parábola y deja que la implicación teológica emerja del relato, no de una glosa interpretativa.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §2; Contested terms table for κύριος'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el inglés POB y la verificación cruzada coinciden en alta medida, así que esta versión española sigue de cerca la decisión auditada sin introducir reinterpretaciones.
  spanish_consistency_notes:
  - Se mantiene «viña» de forma uniforme para ἀμπελών en ambas ocurrencias.
  - Se conserva «a otros» como expresión abierta, sin especificar más al referente.
  - «Dueño» evita un traslado automático de κύριος como «Señor» en un contexto no divino inmediato.
  - «Labradores» conserva el campo semántico rural y la fuerza narrativa de la parábola.
