    issue: «labradores» no refleja la dimensión de arrendamiento presente en el contexto parabólico de γεωργούς
    rationale: El audit trail inglés eligió «tenant farmers» precisamente para conservar tanto el aspecto agrícola como el de tenencia. «Labradores» suena natural, pero deja fuera un matiz semántico que la documentación considera significativo. «arrendatarios» en este contexto es claro y suficientemente natural en español bíblico moderno.
