revisions:
- from: ¿Qué hará el dueño de la viña? Vendrá y destruirá a los labradores[a], y dará la viña a otros.
  to: ¿Qué hará el dueño de la viña? Vendrá y destruirá a los arrendatarios[a], y dará la viña a otros.
  rationale: Se recomienda una reparación menor para alinear mejor γεωργούς con la decisión léxica auditada en inglés. «Arrendatarios» preserva el dato narrativo clave de que la viña pertenece a otro, sin afectar la fluidez del español. La nota se ajusta para reflejar la alternativa española relevante; la nota original sobre κύριος ya no necesita anclaje adicional porque «dueño» es una elección adecuada y no problemática en español.
