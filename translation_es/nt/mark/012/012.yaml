revisions:
- from: Y buscaban prenderlo[a], pero temieron a la multitud, porque sabían que había dicho la parábola contra ellos. Y dejándolo, se fueron.
  to: Y buscaban prenderlo[a], pero temieron a la multitud, porque sabían que había dicho la parábola contra ellos. Así que lo dejaron y se fueron.
  rationale: 'Se ajusta únicamente la cláusula final para reflejar con mejor español y mayor claridad la decisión documentada para ἀφέντες αὐτὸν: no un gerundio adverbial algo rígido, sino una acción plena coordinada (''lo dejaron''). También se usa ''Así que'' para reproducir con naturalidad la transición inferencial del inglés POB (''So'').'
  reviewer_model: gpt-5.4
