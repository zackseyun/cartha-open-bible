translation:
  language: es
  text: Y buscaban prenderlo[a], pero temieron a la multitud, porque sabían que había dicho la parábola contra ellos. Así que lo dejaron y se fueron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que había dicho la parábola acerca de ellos» o «en referencia a ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - estaban buscando
  - seguían buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o intentada; en español, «buscaban» comunica bien esa duración sin sonar forzado. Mantiene el matiz de proceso que la POB inglesa preserva con «were seeking».
- source_word: κρατῆσαι
  english_pob_choice: to seize
  chosen_spanish: prenderlo
  alternatives_spanish:
  - aprehenderlo
  - asirlo
  - capturarlo
  lexicon: BDAG
  rationale: En este contexto hostil, el verbo apunta a tomarlo por la fuerza. «Prenderlo» conserva la fuerza de «seize» y sugiere captura o detención sin añadir un procedimiento legal más explícito que el griego.
- source_word: ἐφοβήθησαν τὸν ὄχλον
  english_pob_choice: they feared the crowd
  chosen_spanish: temieron a la multitud
  alternatives_spanish:
  - les temieron a la multitud
  - estuvieron atemorizados por la multitud
  lexicon: BDAG
  rationale: «Temieron a la multitud» es natural y reproduce el objeto directo del griego. «Multitud» comunica mejor que «gente» el carácter colectivo y amenazante del ὄχλος en este pasaje.
- source_word: ἔγνωσαν
  english_pob_choice: they knew
  chosen_spanish: sabían
  alternatives_spanish:
  - comprendieron
  - se dieron cuenta
  lexicon: BDAG
  rationale: El aoristo expresa reconocimiento ya establecido. «Sabían» conserva esa certeza adquirida y suena fluido en español; «se dieron cuenta» es más interpretativo.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - acerca de ellos
  - en referencia a ellos
  - para ellos
  lexicon: BDAG
  rationale: En el contexto de confrontación, πρός con acusativo se entiende adversativamente. «Contra ellos» refleja la lectura principal de la POB inglesa y mantiene la fuerza polémica del dicho.
- source_word: τὴν παραβολὴν
  english_pob_choice: the parable
  chosen_spanish: la parábola
  alternatives_spanish:
  - esta parábola
  lexicon: BDAG
  rationale: Se conserva el artículo de manera natural en español. «La parábola» es la forma más directa y fiel; el contexto ya identifica cuál es.
- source_word: εἶπεν
  english_pob_choice: he had spoken
  chosen_spanish: había dicho
  alternatives_spanish:
  - habló
  - había pronunciado
  lexicon: BDAG
  rationale: El pluscuamperfecto español reproduce bien la relación temporal que la POB inglesa resolvió con «had spoken», señalando que el decir de la parábola fue anterior a su reconocimiento.
- source_word: ἀφέντες αὐτὸν
  english_pob_choice: they left him
  chosen_spanish: dejándolo
  alternatives_spanish:
  - abandonándolo
  - soltándolo
  lexicon: BDAG
  rationale: El participio aoristo se vierte de forma adverbial para enlazar con la acción principal. «Dejándolo» puede implicar dejar de intentar prenderlo o simplemente abandonarlo; la ambigüedad se conserva sin forzar el sentido.
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - se alejaron
  - partieron
  lexicon: BDAG
  rationale: «Se fueron» es idiomático y claro en español contemporáneo, equivalente a «went away» sin tono arcaico.
theological_decisions:
- issue: Relación adversativa de la parábola con los oyentes
  english_pob_reading: they knew that he had spoken the parable against them
  chosen_spanish_reading: sabían que había dicho la parábola contra ellos
  alternative_spanish_readings:
  - sabían que había dicho la parábola acerca de ellos
  - sabían que había dicho la parábola en referencia a ellos
  rationale: La formulación principal conserva la lectura hostil que la POB inglesa decidió explicitar. A la vez, el griego πρός + acusativo admite matices menos confrontativos, por lo que la tradición textual y la semántica quedan preservadas sin borrar la tensión.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se necesitaban cambios; por eso el borrador sigue de cerca el audit trail inglés y mantiene la misma decisión interpretativa principal, con la alternativa semántica preservada en nota.
  spanish_consistency_notes:
  - Se usó «Y» inicial para corresponder al arranque narrativo coordinado del griego.
  - Se prefirió «multitud» por coherencia con el valor narrativo de ὄχλος en los Evangelios.
  - Se mantuvo el pluscuamperfecto «había dicho» para reflejar la anterioridad relativa del acto de hablar.
  - El participio final se integró como gerundio («dejándolo») para conservar la fluidez española y la secuencia de acciones.
