translation:
  language: es
  text: y los mejores asientos[a] en las sinagogas y los lugares de honor[b] en los banquetes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los asientos principales» / «los asientos de honor».
    reason: lexical_alternative
  - marker: b
    text: O «los mejores lugares» o, más literalmente en el contexto antiguo de la comida, «los puestos principales para reclinarse».
    reason: lexical_alternative
lexical_decisions:
- source_word: πρωτοκαθεδρίας
  english_pob_choice: the best seats
  chosen_spanish: los mejores asientos
  alternatives_spanish:
  - los asientos principales
  - los asientos de honor
  - los primeros asientos
  lexicon: BDAG
  rationale: El término expresa lugares de mayor prestigio o precedencia. «Los mejores asientos» comunica bien esa idea en español moderno sin perder el matiz de honor social; «asientos de honor» también es posible, pero suena un poco más interpretativo.
- source_word: συναγωγαῖς
  english_pob_choice: the synagogues
  chosen_spanish: las sinagogas
  alternatives_spanish:
  - las asambleas de la sinagoga
  lexicon: BDAG
  rationale: Aquí se refiere a los lugares de reunión judíos. «Sinagogas» es preciso, natural y fiel al uso contextual del término.
- source_word: πρωτοκλισίας
  english_pob_choice: the places of honor
  chosen_spanish: los lugares de honor
  alternatives_spanish:
  - los mejores lugares
  - los puestos de honor
  - los lugares de mayor honor
  lexicon: BDAG
  rationale: El término alude a los sitios más honrosos en una comida, especialmente en el contexto antiguo de reclinarse. «Lugares de honor» conserva el sentido social sin imponer una imagen cultural demasiado específica.
- source_word: δείπνοις
  english_pob_choice: banquets
  chosen_spanish: los banquetes
  alternatives_spanish:
  - las cenas
  - los festines
  lexicon: BDAG
  rationale: «Banquetes» reproduce bien la idea de una comida formal y socialmente importante, que es el matiz que destaca el contexto.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - e ... e
  lexicon: BDAG
  rationale: Se conserva la repetición del griego para reflejar la acumulación de elementos en la descripción.
- source_word: ἐν ταῖς συναγωγαῖς ... ἐν τοῖς δείπνοις
  english_pob_choice: in the synagogues ... at banquets
  chosen_spanish: en las sinagogas ... en los banquetes
  alternatives_spanish:
  - en las sinagogas ... a los banquetes
  lexicon: BDAG
  rationale: En español, «en» funciona naturalmente para ambos complementos. Aunque en eventos sociales a veces se usa «en» o «a», aquí la forma repetida mantiene la estructura del original sin sonar forzada.
translation_notes:
  revision_awareness: Coincide con el audit trail inglés en filosofía de equivalencia óptima y en las dos alternativas léxicas principales; no se detectaron revisiones aplicadas en el pasaje fuente. La redacción española mantiene la acumulación del original y ajusta las preposiciones al uso natural del español.
  spanish_consistency_notes:
  - Se mantuvo «sinagogas» para συναγωγαῖς por precisión contextual.
  - Se eligió «banquetes» para δείπνοις siguiendo el valor social formal del contexto.
  - Se preservó la coordinación repetida con «y ... y» para reflejar la acumulación retórica del griego.
  - Se usó «lugares de honor» en vez de una explicación más extensa para conservar fluidez y transparencia traductora.
