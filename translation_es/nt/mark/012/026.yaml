translation:
  language: es
  text: 'Y acerca de los muertos[a], que son levantados, ¿no han leído en el libro de Moisés, en el pasaje de la zarza, cómo Dios le habló, diciendo: «Yo soy el Dios de Abraham y el Dios de Isaac y el Dios de Jacob»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la zarza»; la expresión griega puede identificar el pasaje por el episodio de la zarza ardiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: περὶ δὲ τῶν νεκρῶν
  english_pob_choice: And concerning the dead
  chosen_spanish: Y acerca de los muertos
  alternatives_spanish:
  - Ahora, acerca de los muertos
  - Pero acerca de los muertos
  lexicon: BDAG
  rationale: περὶ con genitivo introduce el tema tratado; en español, «acerca de» comunica bien ese marco temático. Conservé la conjunción con «Y» para reflejar δὲ como enlace discursivo leve, sin cargarlo con contraste fuerte.
- source_word: ὅτι ἐγείρονται
  english_pob_choice: that they are raised
  chosen_spanish: que son resucitados
  alternatives_spanish:
  - que resucitan
  - que están siendo resucitados
  lexicon: BDAG
  rationale: El verbo pasivo se refiere aquí a la resurrección de los muertos. «Son resucitados» preserva la pasividad y el sentido teológico de una acción recibida, con un español natural y digno.
- source_word: οὐκ ἀνέγνωτε
  english_pob_choice: have you not read
  chosen_spanish: ¿no han leído
  alternatives_spanish:
  - ¿no leyeron
  - ¿acaso no han leído
  lexicon: BDAG
  rationale: La forma interrogativa retórica de Jesús en español suena más natural con el perfecto compuesto. Mantiene la apelación a la Escritura sin endurecer el valor aspectual del aoristo.
- source_word: ἐν τῇ βίβλῳ Μωϋσέως
  english_pob_choice: in the book of Moses
  chosen_spanish: en el libro de Moisés
  alternatives_spanish:
  - en el rollo de Moisés
  - en el libro mosaico
  lexicon: BDAG
  rationale: βίβλος puede ser libro o rollo; «libro de Moisés» es la forma más clara y natural en español para referirse al corpus mosaico.
- source_word: ἐπὶ τοῦ βάτου
  english_pob_choice: in the passage about the bush
  chosen_spanish: en el pasaje de la zarza
  alternatives_spanish:
  - en el pasaje sobre la zarza
  - junto a la zarza
  lexicon: BDAG
  rationale: La expresión funciona como referencia a la perícopa del arbusto ardiente, no solo a un lugar físico. «Pasaje de la zarza» reproduce esa función citacional y mantiene la imagen bíblica.
- source_word: πῶς εἶπεν αὐτῷ ὁ θεὸς
  english_pob_choice: how God spoke to him
  chosen_spanish: cómo Dios le habló
  alternatives_spanish:
  - cómo Dios le dijo
  - cómo Dios se dirigió a él
  lexicon: BDAG
  rationale: «Habló» es la forma más natural para introducir la cita directa y conserva el valor comunicativo general de εἶπεν en este contexto.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - al decir
  - cuando dijo
  lexicon: BDAG
  rationale: El participio introduce la cita inmediata; «diciendo» es la equivalencia española directa y sobria.
- source_word: Ἐγὼ ὁ θεὸς Ἀβραὰμ καὶ ὁ θεὸς Ἰσαὰκ καὶ ὁ θεὸς Ἰακώβ
  english_pob_choice: I am the God of Abraham and the God of Isaac and the God of Jacob
  chosen_spanish: Yo soy el Dios de Abraham, y el Dios de Isaac, y el Dios de Jacob
  alternatives_spanish:
  - Yo soy el Dios de Abraham y el Dios de Isaac y el Dios de Jacob
  - Yo soy el Dios de Abraham, Isaac y Jacob
  lexicon: BDAG
  rationale: Conservo el presente «Yo soy» porque es central para el argumento de Jesús. También mantengo la repetición de «el Dios de» para reflejar la estructura enfática del griego y su fuerza retórica, evitando compactarla indebidamente.
theological_decisions:
- issue: Lenguaje de resurrección en ὅτι ἐγείρονται
  english_pob_reading: that they are raised
  chosen_spanish_reading: que son resucitados
  alternative_spanish_readings:
  - que resucitan
  - que están siendo resucitados
  rationale: La pasiva preserva que la resurrección es obra de Dios y evita convertir el dicho en una mera afirmación intransitiva. Así se mantiene la tensión teológica del texto sin añadir explicación ajena.
  doctrine_reference: optimal equivalence; resurrección como acto divino
- issue: Cita en presente de la autodeclaración divina
  english_pob_reading: I am the God of Abraham and the God of Isaac and the God of Jacob
  chosen_spanish_reading: Yo soy el Dios de Abraham, y el Dios de Isaac, y el Dios de Jacob
  alternative_spanish_readings:
  - Soy el Dios de Abraham y de Isaac y de Jacob
  - Yo soy el Dios de Abraham, Isaac y Jacob
  rationale: El presente es clave para el argumento de Jesús sobre la continuidad de la relación de Dios con los patriarcas. La traducción conserva el tiempo verbal y la repetición estructural para no suavizar ese punto.
  doctrine_reference: primacía del original; preservación del argumento bíblico
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el expediente inglés; la propuesta sigue el texto griego SBLGNT y mantiene las decisiones auditadas del POB en inglés, adaptadas a un español natural y transparente.
  spanish_consistency_notes:
  - Usé «Yahvé» solo cuando la fuente exigiera el nombre divino explícito; aquí el texto griego dice ὁ θεός, por lo que corresponde «Dios».
  - Conservé la repetición de «el Dios de» en la cita para reflejar la estructura del griego y la fuerza argumentativa del pasaje.
  - Elegí «resucitados» en voz pasiva para no diluir el énfasis en la acción recibida por los muertos.
  - Mantuve «pasaje de la zarza» con nota porque el giro puede referir la perícopa, no solo la ubicación física.
  - La puntuación de la cita sigue uso español moderno, con comillas angulares evitadas para mantener claridad editorial en el registro POB.
