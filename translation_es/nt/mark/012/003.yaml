translation:
  language: es
  text: Y tomándolo, lo golpearon y lo mandaron de vuelta con las manos vacías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo mandaron de vuelta vacío' o 'sin nada'. El adjetivo griego κενόν significa literalmente 'vacío'; aquí indica que lo enviaron de regreso sin recibir lo que buscaba.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβόντες
  english_pob_choice: took
  chosen_spanish: tomándolo
  alternatives_spanish:
  - lo tomaron
  - lo llevaron
  lexicon: λαμβάνω
  rationale: El participio aoristo funciona de manera secuencial antes de los verbos principales. 'Tomándolo' conserva esa secuencia narrativa con español natural; 'lo tomaron' también es posible, pero el participio ayuda a reflejar la construcción griega sin añadir interpretación.
- source_word: ἔδειραν
  english_pob_choice: beat
  chosen_spanish: lo golpearon
  alternatives_spanish:
  - lo apalearon
  - lo azotaron
  lexicon: δέρω
  rationale: '''Golpearon'' comunica la violencia de δέρω con claridad y sin especificar un castigo formal. ''Azotaron'' podría sugerir flagelación legal o ritual, que el griego no exige.'
- source_word: ἀπέστειλαν
  english_pob_choice: sent ... away
  chosen_spanish: lo despidieron
  alternatives_spanish:
  - lo enviaron lejos
  - lo mandaron
  lexicon: ἀποστέλλω
  rationale: En este contexto, 'despidieron' expresa el acto de enviarlo de vuelta o fuera de su presencia. 'Lo enviaron lejos' suena más explicativo; 'lo mandaron' es posible, pero menos preciso en español contemporáneo.
- source_word: κενόν
  english_pob_choice: empty-handed
  chosen_spanish: vacío[a]
  alternatives_spanish:
  - sin nada
  - con las manos vacías
  lexicon: κενός
  rationale: 'El adjetivo κενός literalmente significa ''vacío''. La nota preserva la alternativa interpretativa de sentido: que fue devuelto sin recibir nada. En el texto principal, ''vacío'' mantiene la cercanía al griego; la nota aclara el valor idiomático.'
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: Y ... y
  alternatives_spanish:
  - Entonces ... y
  - Y ... también
  lexicon: καί
  rationale: Se conserva la parataxis del griego con coordinación simple en español. El arranque con 'Y' refleja la secuencia narrativa sin añadir suavización estilística.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el audit trail inglés: λαβόντες se mantiene como acción previa secuencial; ἔδειραν se vierte con violencia general, no como flagelación técnica; ἀπέστειλαν conserva el sentido de despachar o despedir; κενόν se deja literalmente en el texto con nota de alternativa idiomática para no perder la tensión entre ''vacío'' y ''sin nada''.'
  spanish_consistency_notes:
  - Se usó 'vacío' en el texto principal porque el proyecto prefiere mantener el valor léxico del adjetivo cuando la nota puede aclarar la implicación idiomática.
  - No se introdujo 'Cristo', 'Señor' ni otro término teológico ajeno al versículo.
  - La coordinación simple con 'Y ... y' preserva el tono narrativo terso del griego.
