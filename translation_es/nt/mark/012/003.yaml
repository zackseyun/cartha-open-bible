- from: Y tomándolo, lo golpearon y lo despidieron vacío[a].
  to: Y tomándolo, lo golpearon y lo mandaron de vuelta con las manos vacías[a].
  rationale: Se ajusta ἀπέστειλαν a 'lo mandaron de vuelta' para expresar con mayor naturalidad y precisión el sentido de enviarlo de regreso. Se reemplaza 'vacío' en el texto principal por 'con las manos vacías', que comunica claramente el valor contextual de κενόν en español, mientras la nota conserva la alternativa más literal.
