review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia griega: ''tomándolo'' para λαβόντες y ''lo golpearon'' para ἔδειραν son adecuados. Sin embargo, ''lo despidieron vacío'' no preserva bien el sentido de ἀπέστειλαν κενόν. En español, ''despedir'' suele sugerir despedida o despido, no simplemente enviar de vuelta, y ''vacío'' aplicado a una persona aquí suena poco natural y ambiguo. El sentido fuente es que lo mandaron de regreso sin nada.'
  spanish_quality_summary: La frase es mayormente clara, pero 'lo despidieron vacío' resulta poco idiomática y puede entenderse de manera extraña. Una formulación como 'lo mandaron de vuelta con las manos vacías' comunica el sentido con naturalidad y dignidad. La nota puede conservar la alternativa más literal 'vacío' o 'sin nada'.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales están en línea con el proyecto, salvo que conviene ajustar ἀπέστειλαν κενόν a un español más natural y fiel al sentido documentado.
  issues:
  - severity: medium
    issue: '''lo despidieron'' para ἀπέστειλαν'
    rationale: Aunque posible en ciertos contextos, en español contemporáneo suele sugerir 'despedir' a alguien o decirle adiós, más que enviarlo de vuelta tras maltratarlo. 'Lo mandaron de vuelta' o 'lo enviaron de vuelta' refleja mejor ἀπέστειλαν.
  - severity: high
    issue: '''vacío'' en el texto principal para κενόν'
    rationale: Literalmente cercano, pero en español aplicado a una persona aquí suena extraño y no comunica con claridad la idea contextual de 'sin nada / con las manos vacías', que el inglés POB ya documenta como el sentido.
  revised_spanish_text: Y tomándolo, lo golpearon y lo mandaron de vuelta con las manos vacías[a].
  revised_footnotes:
  - marker: a
    text: O 'lo mandaron de vuelta vacío' o 'sin nada'. El adjetivo griego κενόν significa literalmente 'vacío'; aquí indica que lo enviaron de regreso sin recibir lo que buscaba.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀπέστειλαν a 'lo mandaron de vuelta' para expresar con mayor naturalidad y precisión el sentido de enviarlo de regreso. Se reemplaza 'vacío' en el texto principal por 'con las manos vacías', que comunica claramente el valor contextual de κενόν en español, mientras la nota conserva la alternativa más literal.
