translation:
  language: es
  text: El mismo David lo llama Señor[b][a], así que, ¿cómo es su hijo? Y la numerosa multitud lo escuchaba con gusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿de dónde es su hijo?»'
    reason: lexical_alternative
  - marker: b
    text: «Hijo» aquí evoca el título mesiánico «hijo de David»; también puede tener el sentido más amplio de «descendiente».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: himself
  chosen_spanish: mismo
  alternatives_spanish:
  - David mismo
  - él mismo
  lexicon: BDAG
  rationale: 'El intensivo antes del nombre propio debe conservar el énfasis personal: no solo David, sino David mismo. En español, «David mismo» o «David lo llama Señor» con «mismo» preserva esa fuerza sin sonar forzado.'
- source_word: λέγει αὐτὸν κύριον
  english_pob_choice: calls him Lord
  chosen_spanish: lo llama Señor
  alternatives_spanish:
  - dice que es Señor
  - lo nombra Señor
  lexicon: BDAG
  rationale: La construcción expresa predicación o designación, no solo habla general. «Lo llama Señor» reproduce mejor la relación gramatical y mantiene la fuerza tituladora de κύριος; «Señor» conserva el valor cristológico y escritural del título.
- source_word: πόθεν
  english_pob_choice: how
  chosen_spanish: cómo entonces
  alternatives_spanish:
  - de dónde
  - por qué
  lexicon: BDAG
  rationale: 'Aunque el sentido literal es «de dónde», aquí la pregunta funciona lógicamente como cuestionamiento del fundamento o posibilidad: «cómo entonces». En español esta opción comunica mejor la objeción argumentativa sin borrar la tensión del griego, y la alternativa literal queda señalada en nota.'
- source_word: αὐτοῦ ἐστιν υἱός
  english_pob_choice: is he his son
  chosen_spanish: es su hijo
  alternatives_spanish:
  - es su descendiente
  - es entonces su hijo
  lexicon: BDAG
  rationale: Se conserva «hijo» para mantener el eco del título mesiánico y la paradoja retórica del dicho. «Descendiente» explica el sentido dinástico, pero atenúa la formulación concreta que Jesús usa.
- source_word: ὁ πολὺς ὄχλος
  english_pob_choice: the large crowd
  chosen_spanish: la gran multitud
  alternatives_spanish:
  - la multitud grande
  - la multitud numerosa
  lexicon: BDAG
  rationale: «Gran multitud» comunica naturalmente el tamaño del grupo y mantiene el tono narrativo. «Multitud» es preferible a una expresión más interpretativa o arcaizante.
- source_word: ἤκουεν αὐτοῦ
  english_pob_choice: was listening to him
  chosen_spanish: lo escuchaba
  alternatives_spanish:
  - lo oía
  - estaba escuchándolo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continua; «lo escuchaba» refleja esa continuidad de mejor manera que un perfecto simple. Se evita sobrecargar la frase con una perífrasis menos natural.
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: con gusto
  alternatives_spanish:
  - alegremente
  - con deleite
  lexicon: BDAG
  rationale: «Con gusto» expresa placer o agrado al oírlo en un español claro y digno. Mantiene la idea de deleite sin sonar excesivamente coloquial, y evita un término más marcado como «alegremente».
theological_decisions:
- issue: Fuerza mesiánica de que David llame a Jesús «Señor»
  english_pob_reading: Retained the direct title 'Lord' and the rhetorical question without explanatory expansion.
  chosen_spanish_reading: Se mantiene el título «Señor» y la pregunta retórica sin añadir explicación doctrinal al texto.
  alternative_spanish_readings:
  - David mismo lo llama «Señor»; entonces, ¿en qué sentido es su hijo?
  - David mismo lo llama «Señor»; por tanto, ¿cómo puede ser su hijo?
  rationale: El pasaje contribuye a la presentación de Jesús como más que un simple descendiente davídico, pero la traducción no debe resolver la argumentación dentro del versículo. Mantener la tensión retórica permite que el lector reciba el golpe del texto tal como está.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Sentido de υἱός en contexto mesiánico
  english_pob_reading: son
  chosen_spanish_reading: hijo
  alternative_spanish_readings:
  - descendiente
  - vástago
  rationale: Aunque el trasfondo dinástico puede incluir la idea de descendiente, «hijo» preserva el título mesiánico reconocido y el contraste retórico de la pregunta de Jesús. «Descendiente» aclara demasiado y debilita el eco verbal.
  doctrine_reference: Translation philosophy §5
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y coincide en sustancia con el audit trail inglés: se preserva el énfasis de αὐτός, la designación tituladora de κύριος, la pregunta retórica de πόθεν, y el imperfecto narrativo de ἤκουεν. No hubo revisiones aplicadas en el pass más reciente; por tanto, esta versión mantiene alta concordancia con el expediente auditado.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al marco POB y al valor titulado del término.
  - Se usa «hijo» y no «descendiente» en el texto principal para conservar el eco mesiánico; la alternativa queda en nota.
  - Se prefiere «lo escuchaba» para reflejar el aspecto imperfectivo.
  - Se evita «multitud»/«gente» como sustitución interpretativa; «gran multitud» traduce ὁ πολὺς ὄχλος de forma directa y natural.
  - Se evita introducir «Mesías» en el texto porque el versículo no lo contiene explícitamente, aunque el trasfondo sea mesiánico.
