review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el griego en la mayor parte: ἰδὼν → «al ver», νουνεχῶς ἀπεκρίθη → «había respondido con sensatez», Οὐ μακρὰν εἶ ἀπὸ → «No estás lejos de», y conserva bien la tensión teológica de cercanía al reino sin implicar entrada. La cláusula final, sin embargo, no refleja con suficiente naturalidad y precisión la combinación οὐδεὶς οὐκέτι ἐτόλμα... porque «nadie se atrevía ya» suena aspectualmente extraña en español para esta afirmación sumaria; «ya nadie se atrevía» o «nadie se atrevió más» lo expresa mejor.'
  spanish_quality_summary: 'El español es claro y digno. «Con sensatez» funciona bien y «reino de Dios» está bien establecido. La principal mejora necesaria es el orden y fuerza temporal de «ya» en la última cláusula. Además, la nota alternativa actual («No estás cerca...») no es una alternativa adecuada, porque en español invierte el sentido de «no estás lejos»; la alternativa correcta es afirmativa: «Estás cerca del reino de Dios».'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: Ἰησοῦς → «Jesús», θεοῦ → «Dios», βασιλεία → «reino». No hay conflictos con Yahvé/Mesías u otros términos sensibles. La decisión sobre «interrogarlo» es defendible por el matiz de ἐπερωτῆσαι en contexto de prueba/disputa.'
  issues:
  - severity: medium
    issue: La nota al pie alternativa dice «No estás cerca del reino de Dios»
    rationale: Esa formulación no es equivalente a οὐ μακρὰν εἶ ἀπὸ; en español significa lo contrario de la afirmación de cercanía. La alternativa correcta es «Estás cerca del reino de Dios» o similar.
  - severity: low
    issue: «Y nadie se atrevía ya a interrogarlo» suena menos natural que otras opciones
    rationale: Aunque no es incorrecto, el adverbio temporal οὐκέτι se oye mejor en español como «ya nadie...» en esta construcción sumaria; así se preserva mejor el sentido de cesación a partir de ese momento.
  revised_spanish_text: 'Y Jesús[a], al ver que había respondido con sensatez, le dijo: «No estás lejos del reino de Dios». Y ya nadie se atrevía a interrogarlo.'
