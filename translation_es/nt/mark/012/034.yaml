translation:
  language: es
  text: 'Y Jesús[a], al ver que había respondido con sensatez, le dijo: «No estás lejos del reino de Dios». Y ya nadie se atrevía a interrogarlo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Estás cerca del reino de Dios». El griego expresa proximidad, no entrada explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  lexicon: BDAG
  rationale: El participio se expresa de forma natural en español con una construcción temporal-causal breve; 'al ver' conserva la observación inmediata sin rigidizar la sintaxis.
- source_word: νουνεχῶς
  english_pob_choice: wisely
  chosen_spanish: con sensatez
  alternatives_spanish:
  - con sabiduría
  - prudencialmente
  - inteligentemente
  lexicon: BDAG
  rationale: El adverbio apunta a buen juicio, prudencia y respuesta razonable. 'Con sensatez' comunica esa cualidad sin imponer una carga demasiado sapiencial que el contexto no exige.
- source_word: ἀπεκρίθη
  english_pob_choice: had answered
  chosen_spanish: había respondido
  alternatives_spanish:
  - respondió
  - había contestado
  lexicon: BDAG
  rationale: El pluscuamperfecto español refleja bien la relación temporal con la observación de Jesús; 'responder' es más formal y preciso que 'contestar' en este registro.
- source_word: Οὐ μακρὰν εἶ ἀπὸ
  english_pob_choice: You are not far from
  chosen_spanish: No estás lejos de
  alternatives_spanish:
  - No estás a mucha distancia de
  - Estás cerca de
  lexicon: BDAG
  rationale: La metáfora espacial se conserva de manera idiomática. 'No estás lejos de' evita convertir el dicho en una afirmación más fuerte o distinta, como entrada efectiva al reino.
- source_word: βασιλείας τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Yahvé
  - el reinado de Dios
  lexicon: BDAG
  rationale: '''Reino de Dios'' es la expresión natural en español bíblico y preserva la imagen tradicional de reino, sin necesitar una paráfrasis interpretativa aquí.'
- source_word: οὐκέτι
  english_pob_choice: any longer
  chosen_spanish: ya
  alternatives_spanish:
  - ya no
  - no más
  lexicon: BDAG
  rationale: En esta clausula negativa, 'ya' reproduce la idea de que desde entonces cesó la conducta; junto con la negación verbal, mantiene el valor temporal de οὐκέτι.
- source_word: ἐτόλμα
  english_pob_choice: dared
  chosen_spanish: se atrevía
  alternatives_spanish:
  - osaba
  - se animaba
  lexicon: BDAG
  rationale: El imperfecto se vierte con una forma habitual/progresiva en español. 'Se atrevía' conserva la idea de falta de osadía para continuar.
- source_word: ἐπερωτῆσαι
  english_pob_choice: to question
  chosen_spanish: interrogarlo
  alternatives_spanish:
  - preguntarle
  - cuestionarlo
  lexicon: BDAG
  rationale: En el contexto de debate con intención de poner a prueba, 'interrogarlo' transmite mejor que 'preguntarle' la fuerza de ἐπερωτάω. 'Cuestionarlo' es posible, pero menos directo en español bíblico.
theological_decisions:
- issue: Proximidad al reino de Dios sin afirmar entrada o posesión
  english_pob_reading: '''You are not far from the kingdom of God'' without implying that he has already entered it.'
  chosen_spanish_reading: '''No estás lejos del reino de Dios'' sin sugerir que ya ha entrado en él.'
  alternative_spanish_readings:
  - Estás cerca del reino de Dios
  - Estás próximo al reino de Dios
  rationale: 'El griego expresa cercanía espacial/metafórica, no inclusión ni salvación consumada. El español conserva esa tensión: Jesús elogia la respuesta del hombre, pero no declara explícitamente su entrada en el reino.'
  doctrine_reference: Preservar la tensión teológica entre cercanía al reino y pertenencia al reino.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado más reciente del tramo fuente: no se reportan cambios pendientes y el control cruzado indicó alta concordancia con observaciones menores בלבד.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, siguiendo el criterio del proyecto.
  - Se conserva 'reino de Dios' como forma bíblica estándar en español, sin sustituirla por una paráfrasis como 'reinado de Dios'.
  - '''No estás lejos de'' preserva la metáfora espacial y la tensión doctrinal sobre la pertenencia al reino.'
  - '''Interrogarlo'' refleja el matiz de pregunta con propósito de examen en el contexto polémico del pasaje.'
