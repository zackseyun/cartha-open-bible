translation:
  language: es
  text: 'Todavía tenía uno[a][b], un hijo amado. Se lo envió por último a ellos, diciendo[c]: «Respetarán a mi hijo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un hijo muy amado».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Todavía tenía uno más, un hijo amado».'
    reason: lexical_alternative
  - marker: c
    text: El verbo también puede llevar el sentido de «avergonzarse ante» o «mostrar deferencia a»; aquí el contexto favorece «respetarán».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: Todavía
  alternatives_spanish:
  - Aún
  - Todavía tenía
  lexicon: BDAG
  rationale: 'ἔτι expresa continuidad: después de haber enviado a los demás, el dueño conserva todavía a uno más para enviar. «Todavía» comunica esa continuidad de forma natural en español.'
- source_word: ἕνα εἶχεν
  english_pob_choice: He still had one
  chosen_spanish: tenía uno
  alternatives_spanish:
  - todavía tenía uno
  - le quedaba uno
  lexicon: BDAG
  rationale: La idea es la de una sola persona restante en posesión del dueño. «Tenía uno» mantiene la sencillez narrativa; el adverbio inicial «Todavía» ya conserva el matiz de resto pendiente.
- source_word: υἱὸν ἀγαπητόν
  english_pob_choice: a beloved son
  chosen_spanish: un hijo amado
  alternatives_spanish:
  - un hijo amado entrañablemente
  - un hijo muy amado
  - un hijo querido
  lexicon: BDAG
  rationale: ἀγαπητός se traduce de manera directa como «amado». En español, «hijo amado» suena natural y conserva el peso del título sin añadir paráfrasis. Se evita sustituirlo por un lenguaje más interpretativo.
- source_word: ἀπέστειλεν
  english_pob_choice: He sent
  chosen_spanish: Lo envió
  alternatives_spanish:
  - Lo mandó
  - Lo despachó
  lexicon: BDAG
  rationale: ἀποστέλλω en este contexto narrativo se expresa con «enviar». «Lo envió» es directo y mantiene el vínculo con el motivo de envío del relato.
- source_word: ἔσχατον
  english_pob_choice: last
  chosen_spanish: al final
  alternatives_spanish:
  - por último
  - como último
  lexicon: BDAG
  rationale: Aquí ἔσχατον funciona adverbialmente en el sentido de la última acción de la serie. «Al final» comunica bien la posición culminante sin sonar forzado.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - hacia ellos
  - contra ellos
  lexicon: BDAG
  rationale: En español, el movimiento hacia un destinatario se expresa con «a ellos». Se conserva el valor de envío sin introducir una dirección distinta.
- source_word: λέγων ὅτι
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decía
  - al decir
  lexicon: BDAG
  rationale: La introducción del discurso directo con «diciendo» reproduce la transición narrativa de forma clara y natural en español.
- source_word: Ἐντραπήσονται
  english_pob_choice: They will respect
  chosen_spanish: Respetarán
  alternatives_spanish:
  - Tendrán respeto por
  - Se avergonzarán delante de
  lexicon: BDAG
  rationale: El verbo puede significar «sentir vergüenza ante» o «mostrar deferencia/respeto». En este contexto de la parábola, el sentido favorecido por el POB inglés es «respetar», que en español se expresa con claridad mediante «Respetarán».
- source_word: τὸν υἱόν μου
  english_pob_choice: my son
  chosen_spanish: a mi hijo
  alternatives_spanish:
  - mi hijo
  - a mi hijo amado
  lexicon: BDAG
  rationale: La frase posesiva se conserva de manera simple y directa. «A mi hijo» corresponde al objeto del verbo «respetarán» y mantiene el énfasis en la relación filial.
theological_decisions:
- issue: Sentido de Ἐντραπήσονται en la parábola
  english_pob_reading: They will respect my son.
  chosen_spanish_reading: Respetarán a mi hijo.
  alternative_spanish_readings:
  - Se avergonzarán delante de mi hijo.
  - Tendrán respeto por mi hijo.
  rationale: El POB inglés opta por el sentido de deferencia en el contexto narrativo. En español, «Respetarán a mi hijo» conserva ese valor sin cargar el texto con una explicación interpretativa. Se mantiene la tensión semántica del verbo, pero con una lectura contextual coherente.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Resonancia cristológica de «hijo amado»
  english_pob_reading: a beloved son
  chosen_spanish_reading: un hijo amado
  alternative_spanish_readings:
  - un hijo muy amado
  - un hijo querido
  rationale: La expresión preserva la resonancia con el marco mayor de Marcos sin expandirla en el cuerpo del versículo. Se mantiene la literalidad suficiente para que la alusión teológica permanezca abierta.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se revisó el registro griego y el audit trail inglés. No se detectaron revisiones posteriores que alteren la base léxica; se mantiene la decisión de traducir Ἐντραπήσονται con el sentido contextual de respeto/deferencia y de conservar «hijo amado» sin expansión interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usó «hijo» y no «Hijo» porque el texto griego no articula aquí una designación formal cristológica explícita en mayúscula española.
  - Se prefirió «Respetarán» por claridad actual en español, sin perder la nota de posible vergüenza/deferencia documentada en el verbo griego.
