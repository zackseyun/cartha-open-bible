revisions:
- from: 'Y llegaron y le dijeron: «Maestro, sabemos que eres veraz y no te importa nadie[a], porque no miras la apariencia de los hombres, sino que enseñas con verdad el camino de Dios. ¿Es lícito pagar el impuesto[b] a César, o no? ¿Lo pagamos, o no lo pagamos?»'
  to: 'Y llegaron y le dijeron: «Maestro, sabemos que eres veraz y no te importa nadie[a], porque no miras el rostro de los hombres, sino que enseñas en verdad el camino de Dios. ¿Es lícito pagar el impuesto de capitación[b] a César, o no? ¿Lo pagamos, o no lo pagamos?»'
  rationale: Se ajusta el modismo a «no miras el rostro de los hombres» para seguir más de cerca la imagen griega y la decisión documentada en inglés, manteniendo la nota con el sentido idiomático. Se cambia «impuesto» por «impuesto de capitación» para reflejar mejor la especificidad de κῆνσος («poll tax») en el texto principal. También se afina «con verdad» a «en verdad», que suena más natural como modificador adverbial de «enseñas» y refleja bien ἐπ’ ἀληθείας.
