translation:
  language: es
  text: 'Y llegaron y le dijeron: «Maestro, sabemos que eres veraz y no te importa nadie[a], porque no miras el rostro de los hombres, sino que enseñas en verdad el camino de Dios. ¿Es lícito pagar el impuesto de capitación[b] a César, o no? ¿Lo pagamos, o no lo pagamos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «no muestras parcialidad a las personas» o «no te dejas llevar por las apariencias».
    reason: lexical_alternative
  - marker: b
    text: El griego κῆνσος se refiere al impuesto romano de censo o capitación.
    reason: cultural_note
lexical_decisions:
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Profesor
  lexicon: BDAG
  rationale: En los Evangelios, διδάσκαλος funciona como un título de trato para Jesús. «Maestro» es el equivalente natural en español, conserva el valor de autoridad instructiva y evita una calca menos idiomática como «Profesor».
- source_word: ἀληθὴς
  english_pob_choice: truthful
  chosen_spanish: veraz
  alternatives_spanish:
  - verdadero
  - honesto
  lexicon: BDAG
  rationale: Como predicado aplicado a una persona, «veraz» comunica que Jesús habla conforme a la verdad. «Verdadero» en español puede sonar más ontológico que personal, y «honesto» reduce el alcance semántico.
- source_word: οὐ μέλει σοι περὶ οὐδενός
  english_pob_choice: do not care about anyone
  chosen_spanish: no te importa nadie
  alternatives_spanish:
  - no te preocupas por nadie
  - no te importa nada de nadie
  lexicon: BDAG
  rationale: La expresión es idiomática y en el contexto apunta a no dejarse influir por personas. «No te importa nadie» conserva la fuerza del original y su tono directo; evita suavizarlo demasiado, aunque en español suena más natural que una construcción literal de la preposición.
- source_word: οὐ γὰρ βλέπεις εἰς πρόσωπον ἀνθρώπων
  english_pob_choice: you do not look at the face of men
  chosen_spanish: no miras la apariencia de los hombres
  alternatives_spanish:
  - no miras el rostro de los hombres
  - no muestras parcialidad a las personas
  - no te dejas llevar por las apariencias
  lexicon: BDAG
  rationale: El griego usa un modismo de «mirar el rostro» para señalar favoritismo o juicio por apariencias. En español, «la apariencia de los hombres» mantiene la imagen subyacente y comunica el sentido idiomático con mayor fluidez que una literalidad rígida.
- source_word: ἐπ’ ἀληθείας
  english_pob_choice: truly
  chosen_spanish: con verdad
  alternatives_spanish:
  - verdaderamente
  - en verdad
  lexicon: BDAG
  rationale: La frase adverbial modifica «enseñas». «Con verdad» conserva el valor adverbial y vincula de modo natural la acción de enseñar con la verdad, sin cargar la frase con una redundancia innecesaria.
- source_word: τὴν ὁδὸν τοῦ θεοῦ
  english_pob_choice: the way of God
  chosen_spanish: el camino de Dios
  alternatives_spanish:
  - la senda de Dios
  - el camino de Dios
  lexicon: BDAG
  rationale: Se preserva la expresión bíblica tradicional sin sustituirla por una paráfrasis. «Camino de Dios» mantiene la imagen de ruta/conducta y su resonancia en el discurso de Jesús.
- source_word: ἔξεστιν
  english_pob_choice: Is it lawful
  chosen_spanish: ¿Es lícito
  alternatives_spanish:
  - ¿Está permitido
  - ¿Se puede
  lexicon: BDAG
  rationale: En este conflicto, la pregunta tiene un matiz legal y moral. «Lícito» conserva el registro formal de la discusión y corresponde bien al valor de ἔξεστιν.
- source_word: δοῦναι κῆνσον Καίσαρι
  english_pob_choice: to pay the poll tax to Caesar
  chosen_spanish: pagar el impuesto a César
  alternatives_spanish:
  - pagar el tributo a César
  - pagar el impuesto de capitación a César
  - pagar el censo a César
  lexicon: BDAG
  rationale: κῆνσος alude al impuesto romano personal; en español, «impuesto» comunica la obligación fiscal sin requerir tecnicismo excesivo. Se evita «dar» por resultar menos natural en español, y se conserva «a César» como destinatario político del tributo.
- source_word: Καίσαρι
  english_pob_choice: Caesar
  chosen_spanish: César
  alternatives_spanish:
  - el César
  - el emperador
  lexicon: BDAG
  rationale: La forma hispana convencional del nombre/título es «César». Se conserva la referencia histórica y política con la naturalidad idiomática esperable en español bíblico.
- source_word: δῶμεν ἢ μὴ δῶμεν
  english_pob_choice: Should we pay it, or should we not pay it?
  chosen_spanish: ¿Lo pagamos, o no lo pagamos?
  alternatives_spanish:
  - ¿Debemos pagarlo, o no?
  - ¿Lo daremos, o no lo daremos?
  lexicon: BDAG
  rationale: 'El griego repite el verbo de modo enfático. En español, la pregunta se vuelve más natural con pronombres explícitos: «lo pagamos» mantiene la referencia al impuesto y conserva el carácter tajante de la trampa retórica.'
theological_decisions:
- issue: Idioma de parcialidad o influencia humana en «no miras el rostro de los hombres»
  english_pob_reading: The main text keeps the concrete image, while a footnote preserves the idiomatic sense of not showing partiality or being swayed by appearances.
  chosen_spanish_reading: Se mantiene la imagen concreta de «no miras la apariencia de los hombres», con una nota que explica que el modismo apunta a no mostrar parcialidad ni dejarse llevar por apariencias.
  alternative_spanish_readings:
  - no muestras parcialidad a las personas
  - no te dejas llevar por las apariencias
  rationale: No hay tensión doctrinal, pero sí una tensión léxica entre imagen literal y sentido idiomático. La redacción principal conserva la metáfora y la nota aclara el valor reconocido por el audit trail inglés.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de κῆνσος en el contexto de tributo romano
  english_pob_reading: poll tax
  chosen_spanish_reading: impuesto
  alternative_spanish_readings:
  - tributo
  - impuesto de capitación
  - censo
  rationale: El término designa un gravamen romano concreto. En español, «impuesto» es suficiente para la línea principal y evita una explicación demasiado técnica en el cuerpo; la nota documenta la especificidad histórica.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El draft sigue la revisión más reciente del audit trail inglés al reflejar con más cercanía οὐ μέλει σοι περὶ οὐδενός mediante «no te importa nadie», sin perder el tono formal. También conserva la imaginería idiomática de «mirar el rostro» en una forma española más natural, y mantiene la pregunta retórica final con el verbo repetido y objeto explícito.
  spanish_consistency_notes:
  - Se usa «Maestro» como vocativo para διδάσκαλε, coherente con el uso evangélico y con el estilo POB.
  - Se usa «César» como forma estable del nombre/título, no «emperador», para respetar la referencia histórica del texto.
  - Se evita «SEÑOR» para θεός; aquí aparece «Dios» dentro de la expresión fija «camino de Dios».
  - La nota de pie a explica la tensión idiomática sin borrar la imagen concreta del texto.
  - La nota de pie b preserva la precisión cultural del impuesto romano sin sobrecargar el cuerpo del versículo.
