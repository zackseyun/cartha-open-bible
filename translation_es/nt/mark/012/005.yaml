translation:
  language: es
  text: Y envió a otro[a]; y a aquel lo mataron, y a muchos otros—[a] a unos los golpearon, y a otros los mataron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «muchos otros, a unos golpeando y a otros matando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - un distinto
  lexicon: BDAG
  rationale: ἄλλος aquí introduce a un nuevo enviado dentro de la serie. En español, «otro» es la opción natural y fiel; mantiene el valor de adición sin recargar el estilo.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo narra una acción puntual. «Envió» expresa con claridad la acción de enviar y conserva bien el tono narrativo.
- source_word: κἀκεῖνον
  english_pob_choice: that one
  chosen_spanish: a aquel
  alternatives_spanish:
  - a él también
  - a ese también
  lexicon: BDAG
  rationale: 'La forma contraída añade un sentido de inclusión: «también a aquel». En español, «a aquel» conserva el demostrativo y el valor anafórico; el matiz aditivo queda claro en la secuencia.'
- source_word: ἀπέκτειναν
  english_pob_choice: they killed
  chosen_spanish: lo mataron
  alternatives_spanish:
  - lo dieron muerte
  - lo ejecutaron
  lexicon: BDAG
  rationale: ἀποκτείνω significa matar. «Lo mataron» es el equivalente más natural y directo en español moderno, sin atenuar la violencia del relato.
- source_word: πολλοὺς ἄλλους
  english_pob_choice: many others
  chosen_spanish: a muchos otros
  alternatives_spanish:
  - muchos otros
  - a varios otros
  lexicon: BDAG
  rationale: El grupo es adicional respecto del enviado anterior. En español, la preposición «a» se mantiene por el régimen del verbo implícito y por la naturalidad del objeto directo animado.
- source_word: οὓς μὲν ... οὓς δὲ
  english_pob_choice: some ... and some
  chosen_spanish: a unos ... y a otros
  alternatives_spanish:
  - unos ... y otros
  - a algunos ... y a otros
  lexicon: BDAG
  rationale: La construcción distributiva se expresa con naturalidad en español mediante «a unos ... y a otros». Conserva el contraste sin volverlo rígidamente literal.
- source_word: δέροντες
  english_pob_choice: they beat
  chosen_spanish: los golpeaban
  alternatives_spanish:
  - los azotaban
  - los apaleaban
  lexicon: BDAG
  rationale: δέρω indica golpear con violencia. «Golpeaban» es suficientemente amplio y fiel; evita precisar un castigo judicial que el griego no exige. «Azotaban» sería posible, pero más específico.
- source_word: ἀποκτέννοντες
  english_pob_choice: they killed
  chosen_spanish: los mataban
  alternatives_spanish:
  - los daban muerte
  - los mataban a muerte
  lexicon: BDAG
  rationale: Aunque la forma participial es presente, aquí funciona de modo resumidor y distributivo junto con δέροντες. En español, un imperfecto («mataban») comunica el patrón repetido y la simultaneidad narrativa.
theological_decisions:
- issue: Valor aspectual de los participios finales en la lista distributiva
  english_pob_reading: 'Convert the Greek participles into finite verbs: ''some they beat, and some they killed.'''
  chosen_spanish_reading: 'Convertir los participios en imperfectos distributivos: «a unos los golpeaban, y a otros los mataban».'
  alternative_spanish_readings:
  - a unos golpeándolos y a otros matándolos
  - unos siendo golpeados y otros siendo muertos
  rationale: La cláusula no busca una descripción sintácticamente técnica, sino resumir repetidas agresiones contra muchos enviados. Los imperfectos en español expresan bien la acción reiterada y la distribución entre grupos, manteniendo la fuerza narrativa.
  doctrine_reference: Translation philosophy §6 (Readable modern Spanish) and §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia y no indican revisiones textuales; la única cuestión relevante es la forma española de reflejar la cláusula participial distributiva sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «otro / otros» para ἄλλος en sentido aditivo y secuencial.
  - Se usó lenguaje directo de violencia («golpeaban», «mataban») acorde con ἀποκτείνω y δέρω.
  - La nota al pie preserva la alternativa más literal para la secuencia participial, como en el audit trail inglés.
  - Se evitó «siervos» o vocabulario eclesiástico no justificado por el contexto; el texto trata de enviados en una parábola.
