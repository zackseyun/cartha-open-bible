translation:
  language: es
  text: Maestro, Moisés escribió para nosotros que, si el hermano de alguien muere y deja esposa y no deja descendencia[a][c], su hermano debe tomar a la esposa y levantar descendencia[b] para su hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «no deja hijo» o «no deja hijo alguno»; el griego dice singular «hijo/niño», usado aquí de forma general para referirse a descendencia.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «levantar semilla para su hermano», un modismo que alude a la descendencia producida en cumplimiento de las obligaciones del matrimonio de levirato.
    reason: lexical_alternative
  - marker: c
    text: Véase Deuteronomio 25:5 para la ley mosaica a la que se refiere este pasaje.
    reason: cross_reference
lexical_decisions:
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro
  - Rabí
  lexicon: BDAG
  rationale: Vocativo dirigido a Jesús. En español, "Maestro" expresa con claridad el trato respetuoso de διδάσκαλος y evita la carga de autoridad absoluta que puede sugerir "Señor" o un calco más rígido.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés
  lexicon: Nombre propio estándar
  rationale: Nombre propio bíblico estándar en español.
- source_word: ἔγραψεν ἡμῖν
  english_pob_choice: wrote for us
  chosen_spanish: escribió para nosotros
  alternatives_spanish:
  - escribió a nosotros
  - escribió para nuestro beneficio
  lexicon: BDAG
  rationale: El dativo ἡμῖν aquí expresa referencia/beneficio legislativo; "para nosotros" comunica de forma idiomática la pretensión de que la ley fue dada en favor de Israel.
- source_word: ἐάν τινος ἀδελφὸς ἀποθάνῃ
  english_pob_choice: if someone's brother dies
  chosen_spanish: si el hermano de alguien muere
  alternatives_spanish:
  - si el hermano de una persona muere
  - si muere el hermano de alguien
  lexicon: BDAG
  rationale: τινος es un genitivo indefinido; "de alguien" preserva la generalidad sin introducir un sujeto más específico de lo que exige el griego.
- source_word: καταλίπῃ γυναῖκα
  english_pob_choice: leaves behind a wife
  chosen_spanish: deja una esposa
  alternatives_spanish:
  - deja atrás una esposa
  - deja a su esposa
  lexicon: BDAG
  rationale: En este contexto legal y funerario, καταλείπω expresa dejar a la viuda al morir. "Deja una esposa" suena natural en español y mantiene la referencia a la mujer superviviente sin sobrecargar el verbo.
- source_word: μὴ ἀφῇ τέκνον
  english_pob_choice: leaves no child
  chosen_spanish: no deja hijo
  alternatives_spanish:
  - no deja ningún hijo
  - no deja hijos
  lexicon: BDAG
  rationale: τέκνον es singular; "hijo" mantiene la precisión formal del singular, mientras que en español puede entenderse genéricamente. Se conserva la tensión entre singular gramatical y sentido inclusivo de descendencia.
- source_word: ἵνα λάβῃ ὁ ἀδελφὸς αὐτοῦ τὴν γυναῖκα
  english_pob_choice: his brother should take the wife
  chosen_spanish: su hermano debe tomar a la esposa
  alternatives_spanish:
  - su hermano debe tomar a la mujer
  - su hermano debe casarse con la viuda
  lexicon: BDAG
  rationale: λάβῃ con γυναῖκα en contexto de levirato señala tomarla en matrimonio. "Tomar a la esposa" conserva la cercanía léxica al griego sin perder inteligibilidad; "casarse con la viuda" es más interpretativo.
- source_word: ἐξαναστήσῃ σπέρμα
  english_pob_choice: raise up offspring
  chosen_spanish: levantar descendencia
  alternatives_spanish:
  - levantar semilla
  - producir descendencia
  lexicon: BDAG
  rationale: Se preserva el paralelismo idiomático con la ley de levirato. "Descendencia" comunica el sentido de σπέρμα sin el posible tropiezo de "semilla" en español moderno, mientras que "levantar" conserva la metáfora verbal.
- source_word: τῷ ἀδελφῷ αὐτοῦ
  english_pob_choice: for his brother
  chosen_spanish: para su hermano
  alternatives_spanish:
  - por su hermano
  - en favor de su hermano
  lexicon: BDAG
  rationale: El dativo indica finalidad/beneficio. "Para su hermano" es conciso y fiel; el matiz de hermano fallecido ya está implícito en la condición anterior.
theological_decisions:
- issue: Ley de levirato sin añadir explicación interpretativa al cuerpo del versículo
  english_pob_reading: Rendered the legal requirement in clear modern English while preserving the idiom 'take the wife and raise up offspring for his brother.'
  chosen_spanish_reading: 'Se conservó la formulación legal en español claro: ''tomar a la esposa y levantar descendencia para su hermano''.'
  alternative_spanish_readings:
  - '''casarse con la viuda y darle descendencia a su hermano'''
  - '''tomar a la mujer y producir descendencia para su hermano'''
  rationale: El texto cita una obligación mosaica alusiva a Deuteronomio 25:5. La traducción mantiene el lenguaje legal e idiomático del griego sin expandirlo con explicación dentro del versículo.
  doctrine_reference: Translation philosophy §§1, 5, 6
- issue: Preservación del lenguaje de parentesco masculino-femenino
  english_pob_reading: Retained masculine kinship terms 'brother' and 'wife.'
  chosen_spanish_reading: Se conservaron 'hermano' y 'esposa' como términos de parentesco explícitos.
  alternative_spanish_readings:
  - '''hermano o hermana'''
  - '''cónyuge'''
  rationale: El griego usa ἀδελφός y γυνή en un caso legal matrimonial específico. No se neutraliza el género porque pertenece al contenido normativo del pasaje.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se siguió de cerca el tramo auditado en inglés, que ya resolvía el modismo de levirato con equivalencias óptimas. La versión española conserva esa decisión, ajustando solo la sintaxis para que suene natural en español y manteniendo la tensión lexical entre la literalidad de σπέρμα y una comprensión idiomática de 'descendencia'. No se introdujeron cambios textuales respecto del acuerdo alto del control previo.
  spanish_consistency_notes:
  - Se usó 'Moisés' como nombre propio estándar.
  - Se evitó 'SEÑOR' o máscaras similares porque el texto no contiene el tetragrámaton.
  - Se mantuvo 'esposa'/'hermano' para conservar la estructura jurídica del pasaje.
  - La nota b preserva la imagen de 'semilla' como alternativa literal, aunque el cuerpo usa 'descendencia' por claridad.
  - El marcador [a] se coloca en 'Maestro' porque el vocativo admite esa alternativa lexical; [b] y [c] corresponden a la expresión idiomática y la referencia cruzada, respectivamente.
