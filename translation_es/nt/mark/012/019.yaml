    issue: La nota [a] está mal anclada y no refleja la decisión léxica auditada.
    rationale: En el POB inglés, la nota [a] corresponde a ‘leaves no child’, no a ‘Teacher’. En español, [a] aparece en «Maestro» con una explicación sobre «Rabí» que no proviene del expediente y además duplica innecesariamente la decisión léxica ya resuelta.
  - severity: high
    issue: «No deja hijo» introduce una especificación masculina que el griego τέκνον no exige.
    rationale: τέκνον es singular y genérico (‘child’), no ‘son’. En español, «hijo» suele entenderse como varón, de modo que el borrador estrecha el sentido fuente.
  - severity: medium
