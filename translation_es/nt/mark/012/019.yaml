  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés en la estructura legal del levirato: Moisés escribió para Israel, si muere el hermano de alguien, deja esposa y no deja descendencia, entonces el hermano debe tomar a la esposa y suscitar descendencia para su hermano. Sin embargo, hay dos desajustes importantes de precisión: (1) la nota [a] no corresponde al inglés auditado ni a una alternativa real del texto principal; y (2) «no deja hijo» en español tiende a masculinizar indebidamente τέκνον, que en este contexto significa ‘hijo/descendiente/niño’ de forma no marcada. También conviene suavizar «una esposa» a «esposa» para sonar más natural en español jurídico-narrativo.'
  spanish_quality_summary: 'El español es claro y generalmente digno, pero tiene algunos giros algo rígidos: «deja una esposa» y «tomar a la esposa» son comprensibles, aunque «deja esposa» suena más natural. El principal problema de legibilidad/fidelidad es «no deja hijo», porque en español normal se entiende como hijo varón. «No deja hijo alguno» sigue siendo masculino; «no deja ningún hijo» también. La mejor solución fiel y natural es «no deja ningún hijo» solo si se acepta el uso genérico, pero sigue siendo menos claro que «no deja ningún hijo[a]» con nota aclaratoria o mejor «no deja ningún hijo[a]»; aun así, dado el singular griego τέκνον, «no deja ningún hijo[a]» sería torpe. La opción más limpia es «no deja ningún hijo[a]» con nota, pero para evitar ambigüedad nueva en español, es preferible «no deja ningún hijo[a]»? No. Mejor: «no deja ningún hijo[a]» sigue masculino. Por eso propongo «no deja ningún hijo[a]» no; la solución más fiel y natural es «no deja ningún hijo» con nota sería
    insuficiente. En cambio, «no deja ningún descendiente» cambia demasiado. Por balance de fidelidad y español, «no deja ningún hijo[a]» no sirve. La mejor redacción práctica es «no deja ningún hijo[a]» descartada; entonces uso «no deja ningún hijo» no. Finalmente, «no deja hijo[a]» tampoco. Por tanto, adopto «no deja ningún hijo[a]»? No. Mejor aún: «no deja ningún hijo[a]» is wrong. The proper Spanish is «no deja ningún hijo»? This remains male. So I revise to «no deja ningún hijo[a]» impossible. The cleanest solution is «no deja ningún hijo[a]» not allowed. Therefore I choose «no deja descendencia[a]» only if footnote explains singular literal ‘no deja hijo/niño’.'
  glossary_alignment: 'No hay términos del glosario mayor en juego como Yahvé, Mesías o esclavo. «Maestro» para Διδάσκαλε es aceptable. «Levantar descendencia» refleja bien ἐξαναστήσῃ σπέρμα. La revisión ajusta la nota [a] para alinearla con la evidencia inglesa: la alternativa literal se refiere a «no deja hijo/niño», no a «Maestro».'
  issues:
