revisions:
- from: Maestro[a], Moisés escribió para nosotros que, si el hermano de alguien muere y deja una esposa y no deja hijo[c][b], su hermano debe tomar a la esposa y levantar descendencia para su hermano.
  to: Maestro, Moisés escribió para nosotros que, si el hermano de alguien muere y deja esposa y no deja descendencia[a][c], su hermano debe tomar a la esposa y levantar descendencia[b] para su hermano.
  rationale: Se corrige la nota [a] para que coincida con el punto léxico real preservado por el POB inglés. Se reemplaza «no deja hijo» por «no deja descendencia» porque evita la falsa implicación de ‘hijo varón’ en español; la nota conserva el dato formal importante de que el griego usa el singular. También se mejora la naturalidad con «deja esposa». No hace falta adjudicación adicional porque el sentido fuente es claro y la reparación es local.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:42:48Z'
