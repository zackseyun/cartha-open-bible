translation:
  language: es
  text: Él no es Dios de los muertos[a], sino de los vivos. Ustedes están muy equivocados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Dios no es Dios de los muertos, sino de los vivos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Están muy equivocados»; también puede entenderse como «están en gran error» o «se engañan mucho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - un dios
  lexicon: BDAG
  rationale: En esta construcción predicativa anartrosa, el sentido contextual apunta al Dios único y no a 'un dios'. En español, 'Dios' comunica con naturalidad la referencia al Dios de Abraham, Isaac y Jacob sin introducir un artículo indefinido ajeno al contexto.
- source_word: νεκρῶν
  english_pob_choice: of the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de los que han muerto
  - de personas muertas
  lexicon: BDAG
  rationale: El genitivo plural funciona de modo sustantivado. 'De los muertos' preserva el contraste directo con 'de los vivos' y suena natural en español bíblico contemporáneo.
- source_word: ζώντων
  english_pob_choice: of the living
  chosen_spanish: de los vivos
  alternatives_spanish:
  - de los que viven
  - de personas vivas
  lexicon: BDAG
  rationale: El participio presente tiene valor sustantivo y nombra a quienes viven. 'Los vivos' mantiene la antítesis con 'los muertos' con buena fluidez en español.
- source_word: πολὺ
  english_pob_choice: greatly
  chosen_spanish: muy
  alternatives_spanish:
  - grandemente
  - mucho
  lexicon: BDAG
  rationale: Aquí intensifica πλανᾶσθε. 'Muy' es la forma más natural en español para reforzar el adverbio sin sonar arcaico o rebuscado.
- source_word: πλανᾶσθε
  english_pob_choice: are mistaken
  chosen_spanish: están equivocados
  alternatives_spanish:
  - están en error
  - se engañan
  - andan extraviados
  lexicon: BDAG
  rationale: En este contexto de reprensión, el verbo expresa error doctrinal o de juicio. 'Están equivocados' reproduce la fuerza de la corrección sin desplazar el sentido hacia un autoextraviarse o una engañación externa específica.
- source_word: οὐκ ἔστιν
  english_pob_choice: He is not
  chosen_spanish: Él no es
  alternatives_spanish:
  - No es
  - Dios no es
  lexicon: BDAG
  rationale: El griego omite el sujeto explícito; el español requiere suplirlo. 'Él' conecta con el sujeto inmediato del discurso y conserva la naturalidad de la frase.
theological_decisions:
- issue: Relación entre la afirmación y la doctrina de la resurrección
  english_pob_reading: Render the statement straightforwardly as a contrast between 'the dead' and 'the living' without expanding it into a doctrinal paraphrase about resurrection or the intermediate state.
  chosen_spanish_reading: Traducir la afirmación como un contraste directo entre 'los muertos' y 'los vivos', sin ampliar el texto en una paráfrasis doctrinal sobre la resurrección o el estado intermedio.
  alternative_spanish_readings:
  - Él no es Dios de personas muertas, sino de personas vivas.
  - Dios no es Dios de los muertos, sino de los vivos.
  rationale: La frase sostiene el argumento de Jesús sobre la resurrección, pero la traducción no debe resolver ni explicar más de lo que el griego dice. Mantener el contraste simple preserva la tensión teológica del texto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto grado de acuerdo entre los controles de revisión; por eso se mantiene una solución directa y estable para el verso.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός, no 'SEÑOR', porque el contexto habla del Dios de los patriarcas.
  - Se conserva el paralelismo 'los muertos' / 'los vivos' para reflejar el contraste sustantivado del griego.
  - '''Muy equivocados'' reproduce la intensificación de πολὺ con un español natural y digno.'
