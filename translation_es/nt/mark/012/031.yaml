translation:
  language: es
  text: 'El segundo es este: «Amarás a tu prójimo como a ti mismo». No hay otro mandamiento mayor que estos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Ningún otro mandamiento es mayor que estos», donde «estos» se refiere a los dos mandamientos juntos en el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δευτέρα αὕτη
  english_pob_choice: The second is this
  chosen_spanish: El segundo es este
  alternatives_spanish:
  - Esta es la segunda
  - El segundo mandamiento es este
  lexicon: BDAG
  rationale: Conservo la elipsis del sustantivo implícito como en el griego y la prioridad enfática de «el segundo». En español, «es este» reproduce de manera natural la identificación inmediata del mandamiento citado sin añadir material interpretativo.
- source_word: Ἀγαπήσεις
  english_pob_choice: You shall love
  chosen_spanish: Amarás
  alternatives_spanish:
  - Debes amar
  - Ama
  lexicon: BDAG
  rationale: El futuro en cita bíblica funciona con valor imperatival. «Amarás» mantiene el tono escriturario y la fuerza de mandato sin volverlo demasiado coloquial.
- source_word: τὸν πλησίον σου
  english_pob_choice: your neighbor
  chosen_spanish: tu prójimo
  alternatives_spanish:
  - tu vecino
  - la persona cercana a ti
  lexicon: BDAG
  rationale: «Prójimo» es el equivalente bíblico establecido para πλησίον y conserva el vínculo intertextual con Levítico 19:18. «Vecino» sería más cotidiano, pero estrecha indebidamente el sentido.
- source_word: ὡς σεαυτόν
  english_pob_choice: as yourself
  chosen_spanish: como a ti mismo
  alternatives_spanish:
  - como tú mismo
  - tal como a ti
  lexicon: BDAG
  rationale: La comparación breve del griego se expresa con una fórmula natural en español. «Como a ti mismo» es idiomática y fiel, y evita añadir una explicación que el texto no tiene.
- source_word: μείζων τούτων ἄλλη ἐντολὴ οὐκ ἔστιν
  english_pob_choice: There is no other commandment greater than these
  chosen_spanish: No hay otro mandamiento mayor que estos
  alternatives_spanish:
  - No existe otro mandamiento mayor que estos
  - No hay ningún otro mandamiento mayor que estos
  lexicon: BDAG
  rationale: Mantengo la comparación y el plural de τούτων como en la lectura inglesa auditada. «Mandamiento» preserva el registro legal-covenantal de ἐντολή, y «estos» deja abierta la referencia plural del contexto sin resolverla artificialmente.
- source_word: ἐντολή
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - precepto
  - orden
  lexicon: BDAG
  rationale: «Mandamiento» es la opción más fiel en un contexto de Torá y de jerarquía de preceptos. «Precepto» sería posible, pero menos transparente para la audiencia bíblica general.
theological_decisions:
- issue: Referencia de τούτων ('these') en la comparación final
  english_pob_reading: plural reference to the two commandments together in context
  chosen_spanish_reading: referencia plural a los dos mandamientos en conjunto
  alternative_spanish_readings:
  - referencia solo al mandamiento inmediatamente anterior en un sentido general
  rationale: Conservar «estos» mantiene la tensión textual del plural griego y permite que el lector vea la referencia conjunta a los dos mandamientos del contexto. No se debe estrechar el sentido a un singular sin base textual suficiente.
  doctrine_reference: Preservar la tensión del texto original; primacía del griego sobre la armonización traductora
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría más reciente; la lectura se mantiene estable y en alta concordancia con el control cruzado.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se eligió «prójimo» para mantener la terminología bíblica y evitar restringir el alcance a un mero vecino literal.
  - Se conservó el plural «estos» para reflejar la referencia contextual a los dos mandamientos, como en el audit trail en inglés.
