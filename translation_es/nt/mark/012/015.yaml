translation:
  language: es
  text: 'Pero, al conocer su hipocresía, les dijo[a]: «¿Por qué me ponen a prueba[b]? Tráiganme un denario[c] para verlo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué me tientan?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «¿Por qué me tientan?»'
    reason: lexical_alternative
  - marker: c
    text: Un denario era una moneda romana de plata comúnmente usada como salario de un día.
    reason: cultural_note
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: al conocer
  alternatives_spanish:
  - sabiendo
  - al saber
  lexicon: BDAG
  rationale: El participio expresa conciencia previa de Jesús ante la situación; «al conocer» conserva el valor cognitivo sin sonar rígido en español.
- source_word: ὑπόκρισιν
  english_pob_choice: hypocrisy
  chosen_spanish: hipocresía
  alternatives_spanish:
  - pretexto
  - insinceridad
  lexicon: BDAG
  rationale: «Hipocresía» mantiene la fuerza moral del griego y la lectura hostil del contexto, mejor que suavizarlo a «pretexto».
- source_word: Τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué razón?
  - ¿Con qué fin?
  lexicon: BDAG
  rationale: En esta construcción con πειράζετε, la función es adverbial; «¿Por qué?» expresa con naturalidad la recriminación de Jesús.
- source_word: πειράζετε
  english_pob_choice: are you testing
  chosen_spanish: me ponen a prueba
  alternatives_spanish:
  - me están tentando
  - me prueban
  lexicon: BDAG
  rationale: «Ponen a prueba» conserva el sentido de prueba hostil o desafío, sin restringirlo a la acepción moderna más estrecha de «tentar».
- source_word: φέρετέ
  english_pob_choice: Bring
  chosen_spanish: Tráiganme
  alternatives_spanish:
  - Traigan
  - Llévenme
  lexicon: BDAG
  rationale: La forma imperativa plural requiere un mandato directo; «Tráiganme» comunica con claridad la acción de llevar el denario hasta Jesús.
- source_word: δηνάριον
  english_pob_choice: a denarius
  chosen_spanish: un denario
  alternatives_spanish:
  - una moneda romana
  - un denario romano
  lexicon: BDAG
  rationale: Se conserva el nombre de la moneda por precisión histórica y porque el término existe y es entendible en español.
- source_word: ἵνα ἴδω
  english_pob_choice: so that I may see it
  chosen_spanish: para verlo
  alternatives_spanish:
  - para que yo lo vea
  - a fin de verlo
  lexicon: BDAG
  rationale: La cláusula de propósito se vuelve natural en español con «para verlo», manteniendo el objeto implícito del denario sin recargar la frase.
theological_decisions:
- issue: Sentido de πειράζετε en boca de Jesús
  english_pob_reading: hostile testing rather than mere questioning
  chosen_spanish_reading: me ponen a prueba como intento hostil
  alternative_spanish_readings:
  - me tientan
  - me examinan
  rationale: El contexto muestra una trampa; «poner a prueba» preserva la tensión histórica y retórica sin resolverla en un tecnicismo doctrinal.
  doctrine_reference: Mantener la intención adversarial del texto y evitar suavizar la acusación de Jesús.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el audit trail inglés: conserva la acusación de hipocresía, el matiz hostil de πειράζετε y el referente monetario específico, sin depender de una traducción intermedia.'
  spanish_consistency_notes:
  - Se usa «hipocresía» como término moral fuerte, consistente con el registro bíblico.
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino.
  - «Denario» se mantiene sin explicación en el texto principal, con nota cultural breve para lectores no familiarizados.
  - La frase final «para verlo» deja claro el referente implícito del denario y fluye mejor en español que una estructura más literal.
