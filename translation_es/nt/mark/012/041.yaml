revisions:
- from: Y sentado frente al tesoro[a], observaba cómo la multitud echaba dinero en el tesoro; y muchos ricos echaban mucho.
  to: Y sentado frente a la caja de las ofrendas[a], observaba cómo la multitud echaba dinero en la caja de las ofrendas; y muchos ricos echaban mucho.
  rationale: Se revisa γαζοφυλάκιον en el texto principal a «caja de las ofrendas» para mejorar la naturalidad y precisión referencial en español, dado el contexto de depositar dinero. La nota conserva la alternativa más amplia «el tesoro» y una opción concreta adicional, con terminología unificada. El resto del versículo está bien alineado con el griego y el audit trail inglés.
