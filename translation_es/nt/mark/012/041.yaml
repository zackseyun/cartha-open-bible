translation:
  language: es
  text: Y sentado frente a la caja de las ofrendas[a], observaba cómo la multitud echaba dinero en la caja de las ofrendas; y muchos ricos echaban mucho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el tesoro» / «arca de las ofrendas»; el término griego puede referirse al tesoro del templo o a los recipientes asociados con él.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθίσας
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - habiéndose sentado
  - después de sentarse
  lexicon: BDAG
  rationale: El participio aoristo introduce la escena; «sentado» conserva el valor de estado resultante de manera natural en español y evita una construcción pesada.
- source_word: κατέναντι
  english_pob_choice: opposite
  chosen_spanish: frente a
  alternatives_spanish:
  - enfrente de
  - opuesto a
  lexicon: BDAG
  rationale: La idea es de posición directa ante algo. «Frente a» suena natural en español y comunica la relación espacial con claridad.
- source_word: γαζοφυλάκιον
  english_pob_choice: treasury
  chosen_spanish: el tesoro
  alternatives_spanish:
  - la tesorería
  - la caja de ofrendas
  - el arca de ofrendas
  lexicon: BDAG
  rationale: El término puede referirse al tesoro del templo o a los receptáculos asociados. «Tesoro» sigue de cerca la opción inglesa y mantiene la amplitud semántica sin decidir de más entre lugar y recipiente.
- source_word: ἐθεώρει
  english_pob_choice: was watching
  chosen_spanish: observaba
  alternatives_spanish:
  - miraba
  - estaba observando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua; «observaba» lo conserva de forma natural y digna en español.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: Aquí introduce el modo en que la gente daba, no solo el hecho de dar; «cómo» es la opción más directa en español.
- source_word: ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: «Multitud» corresponde bien al conjunto colectivo en narración y mantiene un tono más formal que «gente».
- source_word: βάλλει / ἔβαλλον
  english_pob_choice: was putting / were putting in
  chosen_spanish: echaba / echaban
  alternatives_spanish:
  - ponía / ponían
  - depositaba / depositaban
  lexicon: BDAG
  rationale: βάλλω literalmente es «echar/lanzar/poner». En este contexto de ofrenda al tesoro, «echar» conserva mejor la imagen verbal de depositar algo en un receptáculo que un verbo más interpretativo.
- source_word: χαλκόν
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - monedas de cobre
  - monedas
  lexicon: BDAG
  rationale: El contexto monetario exige explicitar el valor funcional. «Dinero» refleja la revisión inglesa que prefirió el sentido general, sin forzar una especificación material excesiva en el texto principal.
- source_word: πολλοὶ πλούσιοι
  english_pob_choice: many rich people
  chosen_spanish: muchos ricos
  alternatives_spanish:
  - muchas personas ricas
  - muchos hombres ricos
  lexicon: BDAG
  rationale: El plural masculino funciona de manera genérica; «muchos ricos» es breve, natural y conserva el referente social del original.
- source_word: πολλά
  english_pob_choice: much
  chosen_spanish: mucho
  alternatives_spanish:
  - en abundancia
  - muchas cosas
  lexicon: BDAG
  rationale: En este contexto de aporte monetario, el neutro plural expresa cantidad abundante; «mucho» es la manera más idiomática de reflejarlo en español.
theological_decisions:
- issue: Sentido de γαζοφυλάκιον (lugar/recipiente del templo)
  english_pob_reading: treasury; footnote allows offering box / treasury chest
  chosen_spanish_reading: 'el tesoro; nota: también puede entenderse como caja de ofrendas o arca del tesoro'
  alternative_spanish_readings:
  - tesorería
  - caja de ofrendas
  - arca de ofrendas
  rationale: El griego admite más de una referencia concreta. La traducción principal conserva la amplitud del término; la nota recoge las opciones sin fijar indebidamente una sola imagen física.
  doctrine_reference: Sin referencia doctrinal directa; cuestión léxica y de contexto del templo.
translation_notes:
  revision_awareness: La revisión inglesa ajustó χαλκόν desde «copper coins» a «money» para reflejar con más naturalidad el valor monetario general. En español, «dinero» sigue esa decisión revisada y evita una concreción innecesaria sobre el material de las monedas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo verbal entre «echaba» y «echaban» para reflejar el imperfecto continuo en ambas cláusulas.
  - Se usa «el tesoro» de manera consistente con la nota léxica, sin sustituirlo por lenguaje eclesiástico tradicional que ocultaría la amplitud del griego.
  - El estilo evita arcaísmos y conserva un tono bíblico sobrio y publicable.
