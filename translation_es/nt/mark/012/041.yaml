  text: Καὶ ⸀καθίσας ⸀κατέναντι τοῦ γαζοφυλακίου ἐθεώρει πῶς ὁ ὄχλος βάλλει χαλκὸν εἰς τὸ γαζοφυλάκιον· καὶ πολλοὶ πλούσιοι ἔβαλλον πολλά·
base_translation:
  language: en
  yaml_path: translation/nt/mark/012/041.yaml
  text: And sitting opposite the treasury[a], he was watching how the crowd was putting money into the treasury; and many rich people were putting in much.
