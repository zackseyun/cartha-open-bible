    issue: «el tesoro» para γαζοφυλάκιον suena poco natural y potencialmente ambiguo en español
    rationale: Aunque léxicamente posible, en español bíblico actual «tesoro» evoca más el contenido o riqueza que el lugar/receptáculo. Dado que el contexto inmediato describe echar dinero en él, una formulación como «la caja de las ofrendas» comunica mejor el referente sin apartarse del campo semántico documentado.
  - severity: low
    issue: Inconsistencia menor entre alternativas de nota y decisiones léxicas
    rationale: La nota dice «arca del tesoro» mientras las decisiones léxicas incluyen «arca de ofrendas». Conviene unificar la terminología alternativa para evitar confusión editorial.
  revised_spanish_text: Y sentado frente a la caja de las ofrendas[a], observaba cómo la multitud echaba dinero en la caja de las ofrendas; y muchos ricos echaban mucho.
  revised_footnotes:
