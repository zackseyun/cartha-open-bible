translation:
  language: es
  text: 'Jesús les dijo[a]: «¿No es esta la razón por la que ustedes están equivocados: porque no conocen ni las Escrituras ni el poder de Dios?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿No andan ustedes extraviados por esta razón: porque no conocen ni las Escrituras ni el poder de Dios?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: Jesus said to them
  chosen_spanish: Jesús les dijo
  alternatives_spanish:
  - Jesús les respondió
  - Jesús les habló
  lexicon: BDAG
  rationale: φημί introduce discurso directo con el sentido simple de 'decir'. En español, 'les dijo' comunica de manera natural la función narrativa sin añadir la idea de respuesta que no exige el contexto.
- source_word: Οὐ διὰ τοῦτο
  english_pob_choice: Is this not why you are mistaken
  chosen_spanish: ¿No es por esto que ustedes se equivocan
  alternatives_spanish:
  - ¿No es esta la razón por la que ustedes se equivocan
  - ¿No se equivocan ustedes por esto
  lexicon: BDAG
  rationale: La construcción interrogativa con οὐ + διὰ τοῦτο expresa una pregunta retórica de causa. '¿No es por esto que...' conserva el valor causal y el tono de corrección sin forzar una formulación demasiado literal.
- source_word: πλανᾶσθε
  english_pob_choice: you are mistaken
  chosen_spanish: se equivocan
  alternatives_spanish:
  - están equivocados
  - son desviados
  lexicon: BDAG
  rationale: Aquí el contexto es la corrección de un error de comprensión. 'Se equivocan' es una expresión natural en español y mantiene la amplitud semántica entre error y extravío sin decidir excesivamente por una lectura más fuerte.
- source_word: μὴ εἰδότες
  english_pob_choice: because you know
  chosen_spanish: porque no conocen
  alternatives_spanish:
  - porque no saben
  - ya que no conocen
  lexicon: BDAG
  rationale: El participio negativo explica la causa del error. En español, una cláusula causal con 'porque no conocen' expresa con claridad la relación lógica del griego y mantiene el peso de la negación.
- source_word: τὰς γραφὰς
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - las escrituras
  - los escritos sagrados
  lexicon: BDAG
  rationale: En plural, γραφή en este contexto designa el cuerpo reconocido de textos sagrados. 'Las Escrituras' es la traducción más clara y estable en español, y preserva el referente canónico.
- source_word: μηδὲ τὴν δύναμιν τοῦ θεοῦ
  english_pob_choice: nor the power of God
  chosen_spanish: ni el poder de Dios
  alternatives_spanish:
  - ni el poder de Dios
  - ni la fuerza de Dios
  lexicon: BDAG
  rationale: δύναμις aquí significa 'poder'. 'Ni el poder de Dios' reproduce con fidelidad la forma y el contenido, manteniendo el paralelo con 'las Escrituras'.
theological_decisions:
- issue: Alcance de πλανᾶσθε
  english_pob_reading: Jesus rebukes them as being in error or mistaken, without specifying whether the emphasis is intellectual misunderstanding or moral/spiritual deception.
  chosen_spanish_reading: Jesús los corrige como personas que están en error, sin precisar si el énfasis recae en una confusión intelectual o en un engaño espiritual.
  alternative_spanish_readings:
  - ustedes son engañados
  - ustedes andan extraviados
  rationale: El griego admite un rango entre error y extravío. La traducción española conserva esa tensión con una forma que no cierra indebidamente la interpretación hacia una sola opción.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se incorporó una nota solo en la medida en que el marcador aparece anclado en el texto. La redacción sigue la revisión más reciente del POB en inglés, que prefiere 'why' para διὰ τοῦτο, representado aquí como 'por esto'.
  spanish_consistency_notes:
  - Se usa 'Dios' sin mascaramiento para θεός, de acuerdo con las directrices del proyecto.
  - '''Las Escrituras'' mantiene el valor canónico del plural griego.'
  - '''Ni el poder de Dios'' preserva el paralelismo con la cláusula negativa previa.'
  - Se evitó 'Cristo' porque el versículo nombra a Jesús y no emplea Χριστός.
