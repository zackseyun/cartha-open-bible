review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el sentido global del griego: Jesús habla a los saduceos, formula una pregunta retórica, los reprende por estar en error y da la causa en su desconocimiento de las Escrituras y del poder de Dios. Sin embargo, la nota alternativa no refleja con fidelidad la alternativa inglesa/auditada para πλανᾶσθε; ''son ustedes desviados'' suena poco natural y además puede sugerir una pasiva externa más fuerte de lo que exige el griego. Conviene ajustar la nota a una alternativa española idiomática que preserve ''ser extraviados/andar extraviados'' o ''ser llevados al error''.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial contemporáneo. 'Jesús les dijo' y 'las Escrituras' están bien. '¿No es por esto que ustedes se equivocan...?' es entendible, pero en español más natural resulta '¿No es por esto por lo que ustedes están equivocados...?' o, mejor, '¿No es esta la razón por la que ustedes están equivocados...?' Aun así, el problema principal es menor y puede resolverse con una mejora de fluidez. También la puntuación funciona, aunque la construcción con dos 'porque/por' seguidos puede afinarse.
  glossary_alignment: 'Alinea correctamente con la terminología del proyecto: Ἰησοῦς -> ''Jesús'', γραφαί -> ''las Escrituras'', θεοῦ -> ''Dios''. No hay conflictos con términos teológicos por defecto. La elección ''se equivocan'' para πλανᾶσθε es aceptable en el contexto, siempre que la nota alternativa exprese bien la otra posibilidad léxica.'
  issues:
  - severity: medium
    issue: La nota léxica alternativa para πλανᾶσθε es poco idiomática y semánticamente imprecisa.
    rationale: El inglés auditado ofrece 'Are you not led astray...?' como alternativa. '¿No son ustedes desviados...?' no es español natural en este contexto y 'desviados' no comunica bien la idea de extravío/error interpretativo. Una alternativa como '¿No andan ustedes extraviados...?' o '¿No son ustedes llevados al error...?' refleja mejor el rango semántico.
  - severity: low
    issue: La formulación principal con '¿No es por esto que ustedes se equivocan...?' suena algo forzada en español.
    rationale: Aunque fiel al sentido, la combinación 'por esto que' es menos natural en español bíblico actual. Una leve reformulación puede mejorar la legibilidad sin alterar el significado.
  revised_spanish_text: 'Jesús les dijo[a]: «¿No es esta la razón por la que ustedes están equivocados: porque no conocen ni las Escrituras ni el poder de Dios?»'
  revised_footnotes:
