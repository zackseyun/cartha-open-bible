    text: 'O: «¿No andan ustedes extraviados por esta razón: porque no conocen ni las Escrituras ni el poder de Dios?»'
    reason: lexical_alternative
  revision_rationale: Se suaviza una construcción algo forzada en español ('¿No es por esto que...?') a una forma más natural y clara que conserva la pregunta retórica causal del griego. También se corrige la nota alternativa para que exprese de manera idiomática y fiel la opción léxica de πλανᾶσθε como extravío, sin introducir una pasiva extraña en español.
