translation:
  language: es
  text: Había siete hermanos; y el primero tomó esposa, y al morir no dejó descendencia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «semilla». El griego usa σπέρμα de manera idiomática para referirse a la descendencia o los descendientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑπτὰ ἀδελφοὶ ἦσαν
  english_pob_choice: There were seven brothers
  chosen_spanish: Había siete hermanos
  alternatives_spanish:
  - Siete hermanos había
  - Existían siete hermanos
  lexicon: BDAG
  rationale: La construcción existencial en español se expresa con naturalidad como 'había'. Mantiene el dato numérico y el masculino plural específico del contexto, sin neutralizarlo.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer hermano
  - el primero de ellos
  lexicon: BDAG
  rationale: πρῶτος indica orden dentro del grupo. 'El primero' reproduce ese valor de secuencia sin introducir la idea de edad que 'el mayor' podría sugerir.
- source_word: ἔλαβεν γυναῖκα
  english_pob_choice: took a wife
  chosen_spanish: tomó esposa
  alternatives_spanish:
  - se casó con una mujer
  - tomó una mujer por esposa
  lexicon: BDAG
  rationale: La expresión griega es idiomática para contraer matrimonio. 'Tomó esposa' conserva el giro y suena natural en español bíblico contemporáneo; 'tomó una mujer por esposa' explicita más la relación, pero es más pesada.
- source_word: ἀποθνῄσκων
  english_pob_choice: when he died
  chosen_spanish: al morir
  alternatives_spanish:
  - cuando murió
  - y muriendo
  lexicon: BDAG
  rationale: El participio temporal se vierte mejor con una cláusula breve y natural. 'Al morir' preserva la relación temporal sin forzar una forma verbal poco idiomática.
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: he left no
  chosen_spanish: no dejó
  alternatives_spanish:
  - no dejó atrás
  - no dejó nada de
  lexicon: BDAG
  rationale: ἀφίημι aquí significa dejar atrás al morir. 'No dejó' es la forma más directa y reproduce la negación completa del resultado.
- source_word: σπέρμα
  english_pob_choice: offspring
  chosen_spanish: descendencia
  alternatives_spanish:
  - hijos
  - prole
  - semilla
  lexicon: BDAG
  rationale: En este contexto legal y familiar, σπέρμα se usa idiomáticamente para progenie o descendientes. 'Descendencia' comunica bien esa idea en español y evita la literalidad de 'semilla', que podría sonar extraña.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se registran revisiones textuales o de sentido que requieran ajuste especial. La única tensión léxica relevante es σπέρμα, donde el español debe escoger entre la literalidad de 'semilla' y el sentido idiomático de 'descendencia'.
  spanish_consistency_notes:
  - Se mantuvo un español sobrio y publicable, evitando calcos como 'había siete hermanos' en orden invertido innecesariamente.
  - Se preservó el valor masculino plural de 'hermanos' por fidelidad al contexto de los siete varones.
  - '''Tomó esposa'' conserva el idiomatismo matrimonial sin modernizar en exceso ni perder precisión.'
  - '''Descendencia'' se eligió como equivalente funcional de σπέρμα en este contexto, con nota de alternativa literal.'
