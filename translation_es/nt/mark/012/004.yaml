translation:
  language: es
  text: Y de nuevo les envió otro siervo[a], y a él le golpearon en la cabeza[b] y lo deshonraron[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “otro esclavo”. El griego doulos puede significar “siervo” o “esclavo”, según el contexto.
    reason: alternative_reading
  - marker: b
    text: Este verbo raro aquí se refiere a violencia dirigida a la cabeza; probablemente significa “le golpearon en la cabeza” o “le hirieron en la cabeza”, no “lo decapitaron”.
    reason: lexical_alternative
  - marker: c
    text: O “lo trataron vergonzosamente”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: nuevamente
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: BDAG
  rationale: Expresa la repetición de la acción en un relato parabólico con naturalidad en español; mantiene el valor iterativo sin agregar matiz innecesario.
- source_word: ἀπέστειλεν
  english_pob_choice: he sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - despachó
  lexicon: BDAG
  rationale: El aoristo narrativo pide un pasado simple; 'envió' es claro y sobrio para un acto de envío dirigido a los destinatarios.
- source_word: πρὸς αὐτοὺς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - hacia ellos
  lexicon: BDAG
  rationale: Con verbos de envío, el complemento indirecto en español comunica de forma natural la dirección hacia los destinatarios.
- source_word: ἄλλον δοῦλον
  english_pob_choice: another servant
  chosen_spanish: otro esclavo
  alternatives_spanish:
  - otro siervo
  - otro servidor
  lexicon: BDAG
  rationale: Se conserva la fuerza léxica de δοῦλος con 'esclavo', como en la decisión POB inglesa alternativa preservada en nota. En esta parábola la relación de sujeción real es pertinente y no conviene atenuarla con 'siervo' sin razón contextual.
- source_word: κἀκεῖνον
  english_pob_choice: him
  chosen_spanish: a ese
  alternatives_spanish:
  - y a él
  - a aquel también
  lexicon: BDAG
  rationale: 'La crasis intensifica la continuidad: ''también a ese''. En español, ''a ese'' conserva la referencia inmediata y permite que el ''y'' previo sostenga la conexión narrativa.'
- source_word: ἐκεφαλίωσαν
  english_pob_choice: struck him on the head
  chosen_spanish: le golpearon en la cabeza
  alternatives_spanish:
  - le hirieron en la cabeza
  - le dieron un golpe en la cabeza
  lexicon: BDAG
  rationale: El verbo es raro y no significa 'decapitar' aquí. 'Le golpearon en la cabeza' conserva el sentido de violencia dirigida a la cabeza con la mayor claridad idiomática en español.
- source_word: ἠτίμασαν
  english_pob_choice: dishonored him
  chosen_spanish: lo deshonraron
  alternatives_spanish:
  - lo trataron vergonzosamente
  - lo humillaron
  lexicon: BDAG
  rationale: '''Deshonrar'' reproduce bien el campo de honor/vergüenza del verbo y mantiene la brevedad del original. La alternativa dinámica se conserva implícitamente en el matiz de humillación pública.'
translation_notes:
  revision_awareness: 'El texto español sigue el acuerdo alto del control de calidad y conserva las tres notas auditables del POB inglés: la alternancia léxica de δοῦλος, el valor raro de ἐκεφαλίωσαν y la posibilidad alternativa de ἠτίμασαν. No se registraron revisiones textuales posteriores en el paquete de auditoría.'
  spanish_consistency_notes:
  - Se usó 'esclavo' para δοῦλος por consistencia con la decisión léxica documentada y para no diluir la fuerza social del término.
  - Se evitó 'SEÑOR' u otros reemplazos no pertinentes, ya que el verso no contiene el nombre divino.
  - '''Le golpearon en la cabeza'' preserva el objeto de la violencia sin sugerir erróneamente decapitación.'
  - '''Deshonraron'' mantiene el eje honor/vergüenza presente en ἠτίμασαν.'
