- from: Y nuevamente les envió otro esclavo[a], y a ese[b] le golpearon en la cabeza y lo deshonraron[c].
  to: Y de nuevo les envió otro siervo[a], y a él le golpearon en la cabeza[b] y lo deshonraron[c].
  rationale: Se corrige la elección principal de δοῦλος para reflejar la decisión contextual del POB en este versículo ('siervo' principal, 'esclavo' en nota), se reubican las notas en sus palabras correspondientes, y se suaviza 'a ese' a 'a él' para una lectura más natural y digna en español.
