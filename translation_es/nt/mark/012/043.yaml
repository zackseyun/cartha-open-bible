translation:
  language: es
  text: 'Y llamando a sus discípulos hacia sí, les dijo: «En verdad les digo que esta viuda pobre ha echado más que todos los que están echando en la tesorería[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caja de ofrendas» o «cofre del tesoro». El término griego se refiere al receptáculo o área de la tesorería del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: calling his disciples to himself
  chosen_spanish: llamando a sus discípulos a sí
  alternatives_spanish:
  - después de llamar a sus discípulos a sí
  - convocando a sus discípulos
  lexicon: BDAG
  rationale: El participio aoristo medio presenta la acción previa de llamar a los discípulos hacia sí antes de hablar. En español, «llamando... a sí» conserva la secuencia y el matiz reflexivo sin añadir «después de», que el ajuste revisado del inglés también evitó por fidelidad al participio.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - aprendices
  lexicon: BDAG
  rationale: Es el equivalente natural y establecido para μαθητής en el contexto de Jesús y mantiene la relación de seguimiento y formación.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén les digo
  - Ciertamente les digo
  lexicon: BDAG
  rationale: «En verdad» comunica la fuerza solemne de ἀμήν sin dejar la fórmula sin aclarar en el cuerpo principal. Se conserva el registro reverente y directo del dicho de Jesús.
- source_word: χήρα
  english_pob_choice: widow
  chosen_spanish: viuda
  alternatives_spanish:
  - mujer viuda
  lexicon: BDAG
  rationale: Es el sentido directo y estándar del sustantivo, sin necesidad de expansión.
- source_word: πτωχὴ
  english_pob_choice: poor
  chosen_spanish: pobre
  alternatives_spanish:
  - indigente
  - empobrecida
  lexicon: BDAG
  rationale: «Pobre» es la equivalencia más transparente y natural; no intensifica más de lo que el griego permite.
- source_word: πλεῖον πάντων
  english_pob_choice: more than all
  chosen_spanish: más que todos
  alternatives_spanish:
  - más que todos los demás
  - más que todo
  lexicon: BDAG
  rationale: La comparación se mantiene en forma breve e idiomática, sin resolver en la traducción la tensión interpretativa sobre si la comparación es cuantitativa o valorativa.
- source_word: ἔβαλεν
  english_pob_choice: has put in
  chosen_spanish: ha echado
  alternatives_spanish:
  - ha puesto
  - ha arrojado
  lexicon: BDAG
  rationale: En el contexto de ofrendas, βάλλω puede expresar «echar/poner dentro». «Ha echado» conserva el verbo de movimiento y el valor idiomático de depositar una cantidad en el receptáculo.
- source_word: τῶν βαλλόντων
  english_pob_choice: those who are putting
  chosen_spanish: los que están echando
  alternatives_spanish:
  - los que ponen
  - los que depositan
  lexicon: BDAG
  rationale: El participio presente comunica acción en curso; «están echando» lo refleja en español y evita volverlo estático.
- source_word: γαζοφυλάκιον
  english_pob_choice: treasury
  chosen_spanish: tesoro
  alternatives_spanish:
  - arca del tesoro
  - cofre del tesoro
  - tesorería
  lexicon: BDAG
  rationale: El término apunta al lugar o receptáculo del tesoro del templo. «Tesoro» mantiene la concisión del texto principal; el pie de nota preserva la alternativa receptáculo/área, como hizo el inglés POB.
theological_decisions:
- issue: Sentido de «más que todos» respecto a la ofrenda de la viuda
  english_pob_reading: Jesus states that the widow put in more than all the others in a qualitative sense, not merely a larger monetary amount.
  chosen_spanish_reading: Jesús afirma que la viuda echó más que todos, dejando abierta la relación entre cantidad y valoración del sacrificio.
  alternative_spanish_readings:
  - Jesús afirma que dio una suma numéricamente mayor que la de todos los demás.
  - Jesús afirma que su ofrenda fue mayor en valor ante Dios, no necesariamente en monto.
  rationale: 'La frase española conserva la comparación literal sin explicarla de más. Así se mantiene la tensión teológica señalada por el audit trail: el contexto inmediato sugiere una valoración cualitativa, pero la traducción principal no debe resolverla interpretativamente.'
  doctrine_reference: Preservar la tensión textual y contextual sin sobreinterpretar.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés POB al omitir una idea equivalente a «después de» para reflejar con mayor cercanía el participio griego, y se mantuvo la comparación «más que todos» sin expansión interpretativa. También se preservó la alternativa léxica sobre γαζοφυλάκιον mediante una nota al pie, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no aplica.
  - Se mantiene «discípulos» como término estable para μαθηταί.
  - «En verdad les digo» sigue el registro solemne y evita la fórmula eclesiástica fija cuando no es necesaria.
  - «Tesoro» en el texto principal conserva naturalidad; la nota aclara la alternativa receptáculo/área del templo.
  - No se introduce puntuación ni glosa que resuelva la comparación de la viuda más allá de lo que exige el griego.
