translation:
  language: es
  text: 'Y los saduceos vinieron a Jesús, que dicen que no hay resurrección, y le preguntaron, diciendo:'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y además
  lexicon: BDAG
  rationale: Conserva la conexión narrativa simple del griego y la parataxis propia de Marcos. En español, 'Y' es la opción más natural y transparente para abrir la nueva escena sin añadir matiz interpretativo.
- source_word: ἔρχονται
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vienen
  - llegaron
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo puede reflejarse de modo natural con pretérito simple. 'Vinieron' mantiene el movimiento hacia Jesús sin sonar demasiado abstracto.
- source_word: Σαδδουκαῖοι
  english_pob_choice: Sadducees
  chosen_spanish: los saduceos
  alternatives_spanish:
  - saduceos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado; en español el artículo definido ayuda a la fluidez narrativa. No se traduce por un equivalente funcional porque el texto identifica una secta histórica concreta.
- source_word: οἵτινες
  english_pob_choice: who
  chosen_spanish: los que
  alternatives_spanish:
  - quienes
  - que
  lexicon: BDAG
  rationale: La relativa descriptiva en español suena más natural con 'los que', que conserva el valor caracterizador del griego sin volverlo excesivamente solemne.
- source_word: λέγουσιν
  english_pob_choice: say
  chosen_spanish: dicen
  alternatives_spanish:
  - afirman
  - sostienen
  lexicon: BDAG
  rationale: Preserva el presente gnómico o habitual del grupo, marcando una postura doctrinal constante. 'Dicen' evita cargar el verbo con una valoración polémica que el griego no exige.
- source_word: ἀνάστασιν
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - levantarse de nuevo
  lexicon: BDAG
  rationale: Término teológico establecido en español para la creencia en el levantamiento de entre los muertos. Se mantiene el sustantivo tradicional y preciso porque el contexto no pide una paráfrasis.
- source_word: μὴ εἶναι
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: BDAG
  rationale: Reproduce de forma idiomática la negación existencial del enunciado doctrinal. 'No hay resurrección' comunica el contenido sin añadir una formulación filosófica ajena al texto.
- source_word: ἐπηρώτων
  english_pob_choice: questioned
  chosen_spanish: lo interrogaron
  alternatives_spanish:
  - lo cuestionaron
  - le preguntaron
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso; 'lo interrogaron' refleja una pregunta insistente o formal, coherente con el contexto polémico. En español evita la ambigüedad de un simple 'preguntaron'.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: Mantiene la subordinación al verbo de interrogación y prepara la cita directa del versículo siguiente. 'Diciendo' conserva la función participial sin añadir una conjunción que no está explícita.
theological_decisions:
- issue: Negación saducea de la resurrección
  english_pob_reading: there is no resurrection
  chosen_spanish_reading: no hay resurrección
  alternative_spanish_readings:
  - la resurrección no existe
  - no hay levantamiento de los muertos
  rationale: 'La formulación conserva la afirmación doctrinal exacta del texto: los saduceos niegan la resurrección como realidad. No se amplía ni se reduce el alcance del término; se preserva la tensión teológica sin resolverla con explicaciones externas.'
  doctrine_reference: Marcos 12:18; preservar la afirmación doctrinal del grupo sin armonización interpretativa.
translation_notes:
  revision_awareness: El draft sigue la revisión más reciente del inglés POB, que prefirió un imperfecto directo ('questioned') en lugar de un valor inceptivo ('began questioning'). Por eso el español usa un pretérito simple natural ('lo interrogaron') sin añadir aspecto inceptivo.
  spanish_consistency_notes:
  - Se mantiene 'saduceos' con artículo plural para fluidez narrativa en español.
  - '''Resurrección'' se conserva como término técnico estable, sin sustituirlo por una paráfrasis.'
  - El verbo de interrogación se eligió para reflejar el tono insistente del contexto, no para exagerar el matiz más allá del griego.
  - No se añadieron notas al pie porque no hay variante textual ni alternativa lexical que requiera anclaje en este versículo.
