revisions:
- from: 'Y los saduceos vinieron a él, los que dicen que no hay resurrección, y lo interrogaron, diciendo:'
  to: 'Y los saduceos vinieron a Jesús, que dicen que no hay resurrección, y le preguntaron, diciendo:'
  rationale: 'Se ajusta el texto para un español más natural y una correspondencia semántica más precisa: ''a Jesús'' mejora la fluidez narrativa, y ''le preguntaron'' evita el exceso de fuerza de ''lo interrogaron'' sin perder el sentido del griego. Se mantiene ''dicen que no hay resurrección'' por fidelidad a la cláusula doctrinal caracterizadora.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:42:18Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: llegada de los saduceos, cláusula caracterizadora sobre su negación de la resurrección, y acción de preguntar a Jesús introduciendo el discurso directo. Sin embargo, ''a él'' suena menos natural en español que ''a Jesús'', y ''lo interrogaron'' añade un matiz algo más fuerte y forense que ἐπηρώτων exige aquí; ''le preguntaron'' refleja mejor el valor básico del verbo sin sobrecargarlo.'
  spanish_quality_summary: El texto es claro y legible, pero puede sonar más natural y eclesialmente fluido con 'se acercaron a Jesús' o 'vinieron a Jesús' y con 'le preguntaron'. La relativa 'los que dicen' es entendible, pero 'quienes dicen' o 'que dicen' suena algo más limpio; aun así, no es un problema grave.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Resurrección' está bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión principal es estilística y de precisión verbal en español.
  issues:
  - severity: medium
    issue: '''lo interrogaron'' es demasiado fuerte para ἐπηρώτων en este contexto.'
    rationale: El verbo griego aquí introduce una pregunta doctrinal que continúa en el v. 19. 'Interrogar' en español suele sugerir examen formal, policial o agresivo. 'Le preguntaron' preserva mejor el sentido sin añadir tono no exigido por la fuente ni por la auditoría inglesa final ('questioned' como ajuste no-inceptivo, no necesariamente forense).
  - severity: low
    issue: '''a él'' es gramatical pero menos natural que ''a Jesús'' en español narrativo.'
    rationale: πρὸς αὐτόν significa 'a él', pero en español bíblico moderno repetir el referente explícito puede mejorar la fluidez y evitar una resonancia calcada del inglés. No cambia el sentido.
  - severity: low
    issue: La relativa 'los que dicen' es aceptable, pero algo pesada.
    rationale: οἵτινες introduce una caracterización del grupo. En español, 'quienes dicen' o simplemente 'que dicen' puede sonar más natural. No obstante, esto es una mejora estilística menor, no un error de fidelidad.
  revised_spanish_text: 'Y los saduceos vinieron a Jesús, que dicen que no hay resurrección, y le preguntaron, diciendo:'
  revision_rationale: 'Se ajusta el texto para un español más natural y una correspondencia semántica más precisa: ''a Jesús'' mejora la fluidez narrativa, y ''le preguntaron'' evita el exceso de fuerza de ''lo interrogaron'' sin perder el sentido del griego. Se mantiene ''dicen que no hay resurrección'' por fidelidad a la cláusula doctrinal caracterizadora.'
