translation:
  language: es
  text: 'Y en su enseñanza decía: «Cuídense[a] de los escribas que quieren andar con túnicas largas y recibir saludos en los mercados»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Estén alerta contra» o «Guárdense de».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῇ διδαχῇ αὐτοῦ
  english_pob_choice: in his teaching
  chosen_spanish: en su enseñanza
  alternatives_spanish:
  - cuando enseñaba
  - en su instrucción
  lexicon: BDAG
  rationale: La frase preposicional señala el marco de la palabra de Jesús. «En su enseñanza» conserva la estructura y es natural en español; evita volverla una simple nota temporal y mantiene el énfasis en el acto de enseñar.
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: decía
  alternatives_spanish:
  - iba diciendo
  - solía decir
  lexicon: BDAG
  rationale: El imperfecto expresa habla continuada o reiterada. En español, el pretérito imperfecto simple «decía» reproduce ese valor de manera natural sin sonar forzado.
- source_word: Βλέπετε ἀπὸ
  english_pob_choice: Beware of
  chosen_spanish: Cuídense[a] de
  alternatives_spanish:
  - Estén alerta de
  - Guárdense de
  lexicon: BDAG
  rationale: El imperativo con ἀπό tiene fuerza de advertencia preventiva. «Cuídense de» comunica bien la idea de estar en guardia contra personas o conductas, y en español suena idiomático y serio. Se deja nota por la alternativa de matiz equivalente.
- source_word: γραμματέων
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la ley
  - los expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente más directo y tradicionalmente reconocible para γραμματεῖς en el contexto evangélico. Mantiene la referencia histórica sin explicar de más.
- source_word: τῶν θελόντων
  english_pob_choice: who want to
  chosen_spanish: que quieren
  alternatives_spanish:
  - que desean
  - a quienes les gusta
  lexicon: BDAG
  rationale: El participio expresa voluntad o deseo característico. «Que quieren» es la forma más clara y directa en español, y conserva el matiz de preferencia habitual.
- source_word: ἐν στολαῖς περιπατεῖν
  english_pob_choice: to walk around in long robes
  chosen_spanish: andar con largas túnicas
  alternatives_spanish:
  - andar con túnicas largas
  - pasearse con largas túnicas
  lexicon: BDAG
  rationale: στολή alude a una prenda larga y distinguida. «Largas túnicas» comunica la idea de vestidura conspicua asociada con honor público; «andar» da el sentido de conducta habitual y evita un calco rígido de «caminar alrededor».
- source_word: ἀσπασμοὺς
  english_pob_choice: greetings
  chosen_spanish: saludos
  alternatives_spanish:
  - salutaciones
  - reverencias
  lexicon: BDAG
  rationale: En este contexto, ἀσπασμούς refiere a los saludos honoríficos recibidos en público. «Saludos» es claro y natural; el matiz social de honor queda en el contexto.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los mercados
  - en las plazas de mercado
  lexicon: BDAG
  rationale: ἀγορά designa el espacio público de reunión y comercio. «Plazas» funciona bien en español para el ámbito público abierto; evita restringir el término solo a un mercado comercial moderno. La nota anterior sobre saludos honoríficos cubre la dimensión cultural.
theological_decisions:
- issue: Alcance de la advertencia contra los escribas
  english_pob_reading: A moral warning against scribes characterized by public-status seeking, not a blanket condemnation of every individual scribe.
  chosen_spanish_reading: Una advertencia moral contra los escribas definidos por su búsqueda de prestigio público, no una condena indiscriminada de todo escriba.
  alternative_spanish_readings:
  - Una condena de todos los escribas como grupo
  - Una crítica exclusiva a un subgrupo sin referencia al resto
  rationale: 'El participio calificativo restringe el alcance de la advertencia. El español conserva la mención del grupo y la cláusula restrictiva para no borrar la tensión: el texto denuncia un tipo de conducta dentro del grupo nombrado, no necesariamente a cada individuo sin excepción.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el último estado revisado del inglés, especialmente la cláusula restrictiva sin coma antes de «que quieren», para evitar leerla como explicativa. Se preserva además el valor imperfectivo de ἔλεγεν mediante «decía».
  spanish_consistency_notes:
  - Se mantiene «escribas» de forma consistente con el término técnico del contexto evangélico.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias porque aquí no aparece el nombre divino ni κύριος.
  - «Saludos» y «plazas» conservan el matiz público y honorífico sin sobreinterpretar el texto.
  - La nota al pie marca la alternativa verbal de advertencia sin alterar el texto principal.
