review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: el marco «en su enseñanza», el imperfecto «decía», la advertencia «Βλέπετε ἀπὸ», la cláusula restrictiva sobre los escribas caracterizados por deseo de honor público, y los elementos «largas túnicas», «saludos» y el ámbito público. Sin embargo, «andar con largas túnicas» suena menos natural que «andar con túnicas largas», y «en las plazas» debilita el matiz comercial/público de ἀγοραῖς que el inglés auditado preserva como «marketplaces».'
  spanish_quality_summary: El español es claro y digno, pero necesita un ajuste menor para mayor naturalidad y precisión contextual. «Cuídense de» es idiomático; la nota alternativa es aceptable. La frase mejora con «andar con túnicas largas» y «en los mercados», que suenan más naturales y se alinean mejor con el campo semántico del original.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Escribas» está bien para γραμματεῖς. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión clave es léxica: ἀγοραῖς se representa mejor como «mercados» que como «plazas» en este contexto.'
  issues:
  - severity: medium
    issue: «en las plazas» para ἐν ταῖς ἀγοραῖς
    rationale: ἀγοραί son áreas de mercado y reunión pública. «Plazas» conserva lo público, pero pierde el componente de mercado que el inglés POB documenta como significativo. «En los mercados» o similar es más fiel.
  - severity: low
    issue: Orden poco natural en «andar con largas túnicas»
    rationale: Aunque comprensible, en español suena más idiomático «andar con túnicas largas». El cambio no altera el sentido y mejora la fluidez.
  revised_spanish_text: 'Y en su enseñanza decía: «Cuídense[a] de los escribas que quieren andar con túnicas largas y recibir saludos en los mercados»'
