translation:
  language: es
  text: Y los siete no dejaron descendencia. Por último[a], también la mujer murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, 'no dejaron semilla', es decir, no dejaron descendientes.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ ἑπτὰ
  english_pob_choice: the seven
  chosen_spanish: los siete
  alternatives_spanish:
  - los siete hermanos
  - todos los siete
  lexicon: BDAG
  rationale: El artículo con el numeral funciona de modo sustantivo y remite a los siete hermanos del contexto previo. 'Los siete' conserva esa referencia de manera breve y natural en español, sin añadir 'hermanos' que el versículo no repite.
- source_word: οὐκ ἀφῆκαν σπέρμα
  english_pob_choice: left no offspring
  chosen_spanish: no dejaron descendencia
  alternatives_spanish:
  - no dejaron semilla
  - no dejaron hijos
  lexicon: BDAG
  rationale: La expresión griega significa literalmente 'no dejaron semilla', es decir, no dejaron descendientes. 'Descendencia' comunica con claridad el valor idiomático en español sin introducir una imagen biológica extraña. 'Semilla' se reserva para nota por ser demasiado literal y menos transparente.
- source_word: ἔσχατον πάντων
  english_pob_choice: Last of all
  chosen_spanish: Al final de todos
  alternatives_spanish:
  - Por último
  - Finalmente
  lexicon: BDAG
  rationale: La frase marca secuencia temporal. 'Al final de todos' conserva el orden idiomático del griego y la idea de que ella vino después de todos los demás. Se evita una expresión demasiado interpretativa.
- source_word: καὶ ἡ γυνή
  english_pob_choice: the woman also
  chosen_spanish: también la mujer
  alternatives_spanish:
  - y la mujer
  - la mujer también
  lexicon: BDAG
  rationale: Aquí καί añade a la mujer a la secuencia de muertes. 'También la mujer' reproduce ese valor aditivo de forma natural en español y mantiene el referente definido.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  - expiró
  lexicon: BDAG
  rationale: El verbo aoristo expresa de manera directa que murió. 'Murió' es la equivalencia más simple y fiel; 'falleció' suaviza el enunciado y sería menos transparente.
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el texto griego y con el audit trail en inglés: la secuencia ''los siete'' + ''no dejaron offspring'' + ''Last of all'' + ''the woman also died'' se ha vertido con equivalencia óptima y sin añadir contenido no atestiguado. Se preserva la tensión léxica de σπέρμα mediante una nota que explica la opción literal sin imponerla en el cuerpo del texto.'
  spanish_consistency_notes:
  - Se usa 'descendencia' para σπέρμα, en armonía con el valor idiomático documentado por la traducción inglesa 'offspring'.
  - '''Los siete'' es una solución breve y referencialmente clara; el contexto inmediato identifica a los siete como hermanos.'
  - '''Al final de todos'' conserva la idea secuencial de ἔσχατον πάντων y suena natural en español bíblico contemporáneo.'
  - Se mantiene el orden del relato con 'también la mujer' para reflejar el añadido de καί.
