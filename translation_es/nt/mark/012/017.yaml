translation:
  language: es
  text: 'Pero Jesús les dijo[a]: «Devuelvan al César lo que es del César, y a Dios lo que es de Dios». Y quedaron totalmente asombrados por él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Paguen», «restituyan» o «rindan». El verbo griego puede significar «devolver», «pagar de vuelta» o «dar lo que se debe».'
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce aquí una transición con contraste leve frente al intercambio anterior; «Pero» conserva ese matiz natural en español sin volver enfática la oposición.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: BDAG
  rationale: La fórmula breve «les dijo» es natural en español y mantiene la introducción del discurso sin añadir énfasis interpretativo.
- source_word: ἀπόδοτε
  english_pob_choice: Give back
  chosen_spanish: Devuelvan
  alternatives_spanish:
  - Den de vuelta
  - Paguen
  - Rindan
  lexicon: BDAG
  rationale: ἀπόδοτε, imperativo aoristo de ἀποδίδωμι, puede significar devolver, pagar o rendir lo debido. «Devuelvan» conserva la idea de devolver lo que corresponde, sin restringir el sentido a un pago monetario ni cargar con un calco poco natural en español.
- source_word: Τὰ Καίσαρος ... Καίσαρι
  english_pob_choice: the things that are Caesar’s ... to Caesar
  chosen_spanish: al César lo que es del César
  alternatives_spanish:
  - las cosas que son del César ... al César
  - lo que pertenece al César ... al César
  lexicon: BDAG
  rationale: El plural neutro con genitivo expresa aquello que pertenece a César. La formulación española tradicional y transparente «al César lo que es del César» preserva el paralelismo y la posesión sin sonar forzada.
- source_word: τὰ τοῦ θεοῦ ... τῷ θεῷ
  english_pob_choice: the things that are God’s ... to God
  chosen_spanish: a Dios lo que es de Dios
  alternatives_spanish:
  - las cosas que son de Dios ... a Dios
  - lo que pertenece a Dios ... a Dios
  lexicon: BDAG
  rationale: Se mantiene el paralelo de la primera cláusula y el referente de θεός como «Dios», en consonancia con el uso del texto y con la terminología base del proyecto.
- source_word: ἐξεθαύμαζον
  english_pob_choice: were utterly amazed
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - se quedaron muy admirados
  - quedaron estupefactos
  - se maravillaron
  lexicon: BDAG
  rationale: ἐκθαυμάζω intensifica θαυμάζω. En español, «quedaron asombrados» comunica la reacción fuerte y mantiene un registro digno; el adverbio «utterly» no exige una sobrecarga que resulte artificial.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: at him
  chosen_spanish: de él
  alternatives_spanish:
  - por él
  - ante él
  - a causa de él
  lexicon: BDAG
  rationale: La preposición ἐπί con dativo puede expresar el objeto o base del asombro. En español, «de él» en esta construcción transmite naturalmente la fuente del asombro; «quedaron asombrados de él» es idiomático y evita una precisión que el griego no obliga a decidir.
theological_decisions:
- issue: Relación entre obligación civil y obligación divina
  english_pob_reading: Translate the parallel clauses straightforwardly without importing a theory of church-state relations.
  chosen_spanish_reading: Traducir las dos cláusulas en paralelo, sin convertir el dicho en una tesis completa sobre la relación entre Estado e iglesia.
  alternative_spanish_readings:
  - una afirmación fuerte de obediencia civil
  - una desautorización radical de la autoridad de César
  rationale: El versículo afirma que hay cosas debidas al César y cosas debidas a Dios, pero no desarrolla una teología política exhaustiva. La traducción conserva la tensión y la simetría del dicho sin resolverla doctrinalmente.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El texto coincide con la última revisión auditada del POB inglés, que no registró cambios adicionales y mantuvo un acuerdo alto con la evaluación externa; por ello no se introducen ajustes interpretativos nuevos.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «César» como nombre propio sin artículo indebido.
  - 'Se conserva el paralelismo retórico del dicho: César / Dios; lo que es del uno / lo que es de Dios.'
  - Se evita «SEÑOR» por el nombre divino, ya que aquí el griego usa θεός en ambos miembros de la frase.
  - El cierre en español refleja el asombro intenso sin forzar una equivalencia excesivamente literal con el imperfecto griego.
