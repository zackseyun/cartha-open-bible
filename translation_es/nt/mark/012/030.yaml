translation:
  language: es
  text: Y amarás al Señor tu Dios con todo tu corazón, y con toda tu alma[a], y con toda tu mente[b], y con toda tu fuerza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con toda tu vida» por «con toda tu alma» (ψυχῆς).
    reason: lexical_alternative
  - marker: b
    text: O «con todo tu entendimiento» por «con toda tu mente» (διανοίας).
    reason: lexical_alternative
  - marker: c
    text: O «con todo tu poder» por «con toda tu fuerza» (ἰσχύος).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπήσεις
  english_pob_choice: you shall love
  chosen_spanish: amarás
  alternatives_spanish:
  - deberás amar
  - amar
  lexicon: BDAG
  rationale: El futuro griego funciona con fuerza imperativa en la cita del mandamiento. «Amarás» preserva esa forma bíblica y su valor de mandato sin volver el español artificialmente arcaico.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - el Amo
  - el Dueño
  lexicon: BDAG
  rationale: Sigo el valor convencional de κύριος como título reverencial. En español, «el Señor» mantiene la fórmula establecida y suena natural en una cita bíblica; no se usa «Yahvé» aquí porque el texto griego cita κύριος y el audit trail inglés preserva «the Lord».
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - divinidad
  lexicon: BDAG
  rationale: «Dios» es el equivalente directo y normal para θεόν en esta confesión de pacto. La forma con artículo no es necesaria en español por la estructura posesiva «tu Dios».
- source_word: ἐξ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - desde
  - de
  lexicon: BDAG
  rationale: Aunque ἐξ literalmente puede significar «de» o «desde», en esta enumeración idiomática de facultades la equivalencia natural en español es «con», como medio de devoción total, igual que en la traducción inglesa auditable.
- source_word: ὅλης
  english_pob_choice: all
  chosen_spanish: todo / toda
  alternatives_spanish:
  - todo el
  - la totalidad de
  lexicon: BDAG
  rationale: 'La repetición de ὅλης expresa totalidad en cada miembro. En español se ajusta concordando con cada sustantivo: «todo tu corazón», «toda tu alma», etc., conservando la distribución enfática.'
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - centro
  lexicon: BDAG
  rationale: «Corazón» conserva el término antropológico clásico y el centro de voluntad y afecto sin explicarlo en exceso.
- source_word: ψυχῆς
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  - persona
  lexicon: BDAG
  rationale: «Alma» es el equivalente más natural y tradicional de ψυχή en español bíblico. Mantiene la distinción respecto de «corazón», «mente» y «fuerza» sin resolver la tensión semántica hacia «vida» o «persona» en el texto principal.
- source_word: διανοίας
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: BDAG
  rationale: «Mente» expresa la facultad de pensar/entender y suena natural en español contemporáneo. Preserva la diferencia con «corazón» y «alma», como hace el inglés con «mind».
- source_word: ἰσχύος
  english_pob_choice: strength
  chosen_spanish: fuerza
  alternatives_spanish:
  - mucha fuerza
  - poder
  - músculo
  lexicon: BDAG
  rationale: «Fuerza» comunica bien ἰσχύς en español moderno y mantiene el patrón cuádruple de la lista. No se reduce a «poder», que podría sonar más abstracto que el término griego aquí.
- source_word: καὶ ... καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and ... and
  chosen_spanish: y ... y ... y ... y
  alternatives_spanish:
  - e ... e ... e ... e
  lexicon: Greek grammar
  rationale: Se conserva la repetición de καὶ para reflejar la acumulación enfática del griego y la cadencia del mandamiento, igual que en el texto inglés auditado.
theological_decisions:
- issue: Título divino κύριος en una cita del mandamiento
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  - Yahvé
  - el Amo
  rationale: El griego de Marcos cita κύριος, no el nombre escrito del Tetragrámaton. La traducción mantiene el título reverencial «el Señor» para reflejar el testimonio del texto griego y el eco bíblico de la confesión de Israel sin introducir una sustitución no presente en el manuscrito base.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: 'Enumeración antropológica: corazón / alma / mente / fuerza'
  english_pob_reading: heart / soul / mind / strength
  chosen_spanish_reading: corazón / alma / mente / fuerza
  alternative_spanish_readings:
  - corazón / vida / entendimiento / fuerza
  - corazón / ser / pensamiento / poder
  rationale: Se preservan los cuatro términos distintos en vez de condensarlos en una sola idea de amor total. Así se mantiene la tensión teológica y retórica del pasaje, permitiendo que cada facultad aporte su matiz propio.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente del audit trail inglés, que no registra cambios pendientes y mantiene alta concordancia entre revisiones y verificación cruzada.
  spanish_consistency_notes:
  - Se evitó «Yahvé» porque el texto fuente inmediato es κύριος en una cita del mandamiento; «el Señor» conserva el valor reverencial y la correspondencia con el griego.
  - Se eligió «alma» para ψυχῆς y «mente» para διανοίας para mantener la distinción léxica, sin desplazar la tensión semántica hacia una paráfrasis explicativa.
  - La lista conserva la repetición de «y» para reflejar la estructura acumulativa del griego.
  - El registro es bíblico y publicación-readable, sin calco mecánico ni vocabulario eclesiástico no sustentado por la fuente.
