    changes_summary: 'Made the opening more complete by reflecting ἀποκριθεὶς ... ἔλεγεν (''answered and said''), retained the participial teaching context, and rendered Πῶς as ''How do'' rather than ''How can'' for closer lexical accuracy. Also used ''Christ'' for χριστός. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y Jesús respondió y dijo[a], mientras enseñaba en el templo: «¿Cómo dicen los escribas que el Mesías es el hijo de David?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo». El término griego es Χριστός, usado aquí con sentido mesiánico.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio introduce una respuesta en el flujo narrativo. En español, «respondió» conserva esa relación sin sonar forzado; se completa con «y dijo» para reflejar la fórmula narrativa del griego y la audición inglesa del POB.
- source_word: ἔλεγεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir duración, en esta pregunta directa el español natural es «dijo». El contexto de enseñanza ya comunica la acción en curso.
- source_word: διδάσκων
  english_pob_choice: as he was teaching
  chosen_spanish: mientras enseñaba
  alternatives_spanish:
  - enseñando
  - cuando enseñaba
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante. «Mientras enseñaba» conserva la relación temporal y suena natural en español bíblico moderno.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «Templo» es la forma clara y estándar en español, sin añadir explicación no requerida por el texto.
- source_word: Πῶς
  english_pob_choice: How do
  chosen_spanish: ¿Cómo dicen
  alternatives_spanish:
  - ¿Cómo pueden decir
  - ¿Con qué derecho dicen
  lexicon: BDAG
  rationale: La pregunta es retórica y cuestiona la afirmación de los escribas. «¿Cómo dicen…?» conserva la fuerza del griego sin sobrecargarla con una expansión interpretativa como «¿Cómo pueden…?».
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la Ley
  - doctores de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente histórico estándar para γραμματεῖς en los Evangelios. Mantiene el término técnico sin sustitución interpretativa.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título mesiánico. En español, «Mesías» preserva el sentido judío del debate y sigue la decisión doctrinal del POB de no transliterar como «Cristo» en este contexto.
- source_word: υἱὸς Δαυίδ
  english_pob_choice: the son of David
  chosen_spanish: hijo de David
  alternatives_spanish:
  - el hijo de David
  - descendiente de David
  lexicon: BDAG
  rationale: La frase de identificación mesiánica puede expresarse naturalmente como «hijo de David». Se omite el artículo por fluidez en español, sin alterar el referente reconocido por el contexto.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto es una discusión judía sobre la identidad del Mesías, no un nombre propio fijo. Por eso se traduce como título y no se translitera.
  doctrine_reference: 'DOCTRINE.md — Contested terms: Χριστός → Mesías (cuando es título)'
- issue: Valor retórico de Πῶς
  english_pob_reading: How do the scribes say
  chosen_spanish_reading: ¿Cómo dicen los escribas…?
  alternative_spanish_readings:
  - ¿Cómo pueden decir los escribas…?
  - ¿De qué manera dicen los escribas…?
  rationale: La pregunta interpela la afirmación de los escribas y deja la objeción implícita. El español elegido conserva la fuerza retórica sin añadir modalización que no está explícita en el griego.
  doctrine_reference: 'Principio de equivalencia óptima: mantener la fuerza discursiva sin amplificación innecesaria'
translation_notes:
  revision_awareness: 'El borrador español se ajusta al último estado del audit trail: mantiene la estructura narrativa de «respondió y dijo», conserva el participio circunstancial de enseñanza y sigue la decisión final de traducir Χριστός como «Mesías» en el texto principal, con la alternativa «el Cristo» señalada en nota.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en el cuerpo del texto, conforme al criterio doctrinal del proyecto.
  - Se conserva «escribas» para γραμματεῖς como término técnico establecido.
  - Se evita «SEÑOR» o perífrasis innecesaria, ya que el pasaje no contiene κύριος ni el tetragrámaton.
  - La puntuación española cierra la cita directa con comillas angulares, apropiadas para un registro bíblico publicable.
