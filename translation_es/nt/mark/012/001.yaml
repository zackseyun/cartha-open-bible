revisions:
- from: 'Y comenzó a hablarles en parábolas: «Un hombre plantó una viña[a], y la rodeó con una cerca, cavó un lagar[b], edificó una torre, y la arrendó[c] a labradores[d], y se fue».'
  to: 'Y comenzó a hablarles en parábolas: «Un hombre plantó una viña, y la rodeó con una cerca[a], cavó un pozo para el lagar[b], edificó una torre, y la arrendó a labradores arrendatarios[c][d], y se fue».'
  rationale: La revisión corrige el anclaje de notas, recupera la precisión de ὑπολήνιον mediante «pozo para el lagar», y hace explícita la relación arrendaticia de γεωργοῖς de acuerdo con la lógica del contexto y el expediente POB. También separa correctamente la nota léxica de la nota intertextual.
  reviewer_model: gpt-5.4
