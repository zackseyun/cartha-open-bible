translation:
  language: es
  text: 'Y comenzó a hablarles en parábolas: «Un hombre plantó una viña, y la rodeó con una cerca[a], cavó un pozo para el lagar[b], edificó una torre, y la arrendó a labradores arrendatarios[c][d], y se fue».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la cercó con un seto». El griego φραγμός puede significar una cerca, un seto o una barrera de cierre.
    reason: lexical_alternative
  - marker: b
    text: O «cavó el pozo del lagar». El griego ὑπολήνιον se refiere específicamente al receptáculo inferior o pozo asociado al lagar.
    reason: lexical_alternative
  - marker: c
    text: O «la alquiló a labradores» o «la arrendó a viñadores».
    reason: lexical_alternative
  - marker: d
    text: La imagen evoca Isaías 5:1–2, donde una viña es plantada, cercada y equipada.
    reason: cross_reference
lexical_decisions:
- source_word: ἤρξατο ... λαλεῖν
  english_pob_choice: began to speak
  chosen_spanish: comenzó a hablarles
  alternatives_spanish:
  - empezó a hablarles
  - comenzó a decirles
  lexicon: BDAG
  rationale: La construcción inceptiva con infinitivo se vierte de modo natural con «comenzó a hablarles». Mantiene el arranque de un discurso prolongado y suena idiomático en español.
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por medio de parábolas
  lexicon: BDAG
  rationale: La preposición y el plural se conservan de forma directa; «en parábolas» es claro y respeta el valor literario del modo de enseñanza.
- source_word: Ἀμπελῶνα
  english_pob_choice: a vineyard
  chosen_spanish: una viña
  alternatives_spanish:
  - un viñedo
  - una huerta de vides
  lexicon: BDAG
  rationale: «Ἀμπελῶνα» designa una plantación de vides; en español bíblico y actual «viña» es la forma más natural y precisa, sin perder el referente agrícola.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El relato presenta a un propietario masculino; «un hombre» reproduce esa referencia concreta sin neutralizar innecesariamente el género del referente.
- source_word: ἐφύτευσεν
  english_pob_choice: planted
  chosen_spanish: plantó
  alternatives_spanish:
  - sembró
  - estableció
  lexicon: BDAG
  rationale: Verbo agrícola estándar y directo. «Plantó» corresponde con precisión al acto de establecer la viña.
- source_word: περιέθηκεν φραγμόν
  english_pob_choice: put a fence around it
  chosen_spanish: la rodeó con una cerca
  alternatives_spanish:
  - la cercó
  - le puso una cerca
  lexicon: BDAG
  rationale: «Φραγμός» puede ser cerca, seto o barrera; en español «la rodeó con una cerca» conserva la idea de protección/enclosure sin forzar una imagen vegetal específica que no está exigida por el griego.
- source_word: ὤρυξεν ὑπολήνιον
  english_pob_choice: dug a winepress pit
  chosen_spanish: cavó un lagar
  alternatives_spanish:
  - cavó un pozo para el lagar
  - cavó un estanque para el lagar
  lexicon: BDAG
  rationale: «Ὑπολήνιον» nombra el receptáculo inferior vinculado al lagar. En español, «lagar» es la opción breve y tradicional que comunica el elemento de prensado del fruto; el matiz de «pozo/pit» puede explicitarse en nota.
- source_word: ᾠκοδόμησεν πύργον
  english_pob_choice: built a tower
  chosen_spanish: edificó una torre
  alternatives_spanish:
  - construyó una torre
  - levantó una torre
  lexicon: BDAG
  rationale: «Edificó» reproduce bien el verbo de construcción y conserva el tono formal de la secuencia narrativa.
- source_word: ἐξέδετο
  english_pob_choice: leased it
  chosen_spanish: la arrendó
  alternatives_spanish:
  - la alquiló
  - la cedió en arriendo
  lexicon: BDAG
  rationale: El verbo en contexto económico-jurídico se vierte con el término preciso «arrendó», que expresa cesión de uso a cambio de renta y preserva la relación propietaria del relato.
- source_word: γεωργοῖς
  english_pob_choice: tenant farmers
  chosen_spanish: a labradores
  alternatives_spanish:
  - a campesinos arrendatarios
  - a viñadores
  lexicon: BDAG
  rationale: «Γεωργοῖς» refiere a quienes trabajan la tierra; «labradores» mantiene el sentido amplio sin introducir una especificación que el griego no exige. La condición de arrendatarios queda ya sugerida por «la arrendó».
- source_word: ἀπεδήμησεν
  english_pob_choice: went away
  chosen_spanish: y se fue
  alternatives_spanish:
  - y partió
  - y se ausentó
  lexicon: BDAG
  rationale: La fórmula narrativa simple «y se fue» es natural en español y suficiente para expresar la partida del propietario.
theological_decisions:
- issue: Especificidad social de γεωργοῖς dentro de la parábola
  english_pob_reading: tenant farmers
  chosen_spanish_reading: labradores arrendatarios implícitos por el contexto
  alternative_spanish_readings:
  - labradores
  - campesinos arrendatarios
  - viñadores
  rationale: 'El griego no introduce un término técnico distinto para «arrendatarios» en esta palabra, pero el verbo precedente ἐξέδετο sí crea la relación jurídica de arriendo. En español se preserva la tensión: el texto dice «labradores», mientras el lector entiende por contexto que son quienes reciben la viña en arriendo.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, puntos 1 y 6
- issue: Imagen profética de la viña
  english_pob_reading: The imagery echoes Isaiah 5:1–2, where a vineyard is planted, enclosed, and equipped.
  chosen_spanish_reading: La imagen evoca Isaías 5:1–2, donde una viña es plantada, cercada y equipada.
  alternative_spanish_readings:
  - La imagen recuerda Isaías 5:1–2.
  - La parábola alude a Isaías 5:1–2.
  rationale: Aunque el eco intertextual no está explícito en el versículo, es teológicamente relevante mantenerlo en la documentación porque el pasaje se apoya claramente en esa imagen profética.
  doctrine_reference: DOCTRINE.md §Intertextualidad y lectura canónica
translation_notes:
  revision_awareness: La versión inglesa auditada mantiene la lectura de alta concordancia y no registra revisiones aplicadas; esta propuesta sigue esa línea, conservando la secuencia narrativa, la relación jurídica del arriendo y el eco de Isaías 5:1–2 sin añadir contenido interpretativo innecesario.
  spanish_consistency_notes:
  - Se usa «viña» para Ἀμπελῶνα, término estándar y natural en español bíblico.
  - Se preserva la diferencia entre la cerca física de φραγμός y el lagar de ὑπολήνιον mediante términos distintos y notas alternativas.
  - «Labradores» mantiene la literalidad de γεωργοῖς; la noción de arriendo queda expresada por el verbo «arrendó».
  - Se evita «Cristo», «SEÑOR» u otras convenciones no presentes en este versículo.
  - La puntuación conserva el inicio narrativo y el discurso directo con comillas angulares según norma española.
