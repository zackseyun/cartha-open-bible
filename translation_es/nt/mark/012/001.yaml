review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la secuencia del griego: comienzo del discurso en parábolas, plantación de la viña, cerco, excavación del receptáculo del lagar, construcción de la torre, arriendo a cultivadores y partida del propietario. Sin embargo, no preserva del todo dos decisiones importantes del expediente POB: 1) la especificidad de ὑπολήνιον como receptáculo inferior o pozo del lagar queda demasiado reducida en «cavó un lagar»; 2) la relación socioeconómica explicitada por el inglés «tenant farmers» se debilita en «labradores», aunque el verbo «arrendó» ayuda algo.'
  spanish_quality_summary: 'El español es claro y digno, pero conviene afinarlo para mayor precisión léxica y coherencia interna de notas. «Cavó un lagar» suena algo impreciso porque normalmente se construye o se hace un lagar, mientras que aquí el griego destaca excavar el depósito inferior. Además, las notas están desalineadas: la nota [a] en el texto ancla «viña» pero habla de φραγμός; [c] y [d] también están asociadas a palabras no correspondientes. Eso debe corregirse para cumplir la disciplina de marcadores.'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé/Mesías. Las decisiones principales son léxicas narrativas. Se recomienda conservar «viña», «un hombre», «en parábolas», «edificó una torre». Para ὑπολήνιον, una forma como «cavó un pozo para el lagar» o «cavó el pozo del lagar» refleja mejor el expediente. Para γεωργοῖς, «labradores arrendatarios» o «arrendatarios de la viña» preserva mejor la lógica del arriendo que el POB quiso explicitar.
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están mal anclados en el texto.
    rationale: La nota [a] aparece tras «viña» pero trata φραγμός; [b] tras «lagar» sí corresponde; [c] tras «arrendó» trata ἐξέδετο pero falta reflejar la alternativa sobre γεωργοῖς; [d] tras «labradores» mezcla una alternativa léxica con la referencia a Isaías. El proyecto exige que cada marcador aparezca en la palabra o frase pertinente y no se reutilice ni se desplace.
  - severity: medium
    issue: «cavó un lagar» no preserva suficientemente la especificidad de ὑπολήνιον.
    rationale: El griego se refiere al receptáculo inferior o pozo del lagar, no al lagar en general. El inglés POB hizo explícita esa precisión; en español debe reflejarse en el texto principal o al menos de forma más fiel.
  - severity: medium
    issue: «a labradores» debilita la fuerza de γεωργοῖς en contexto de arriendo.
    rationale: Aunque γεωργοῖς por sí solo puede ser amplio, el contexto con ἐξέδετο hace importante la condición arrendataria. El expediente inglés la explicitó para preservar la lógica social de la parábola.
  - severity: low
    issue: La nota de referencia a Isaías 5:1–2 está fusionada con una alternativa léxica de forma poco clara.
    rationale: Conviene separar la alternativa de traducción de γεωργοῖς de la nota de eco intertextual, como hace el expediente inglés.
