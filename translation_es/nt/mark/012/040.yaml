translation:
  language: es
  text: los que devoran las casas de las viudas y, para aparentar[a], hacen largas oraciones—estos recibirán mayor condenación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como pretexto» o «por aparentar».
    reason: lexical_alternative
  - marker: b
    text: O «mayor juicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατεσθίοντες
  english_pob_choice: devour
  chosen_spanish: devoran
  alternatives_spanish:
  - consumen
  - se comen
  - explotan
  lexicon: BDAG
  rationale: 'El verbo griego es metafórico y de fuerte carga moral: no se trata de comer literalmente, sino de arrasar o absorber abusivamente lo ajeno. «Devoran» conserva esa imagen vívida en español y mantiene la fuerza acusatoria mejor que un término más explicativo como «explotan».'
- source_word: τὰς οἰκίας
  english_pob_choice: houses
  chosen_spanish: las casas
  alternatives_spanish:
  - los hogares
  - las propiedades
  - las haciendas
  lexicon: BDAG
  rationale: «Casas» reproduce de manera directa la imagen concreta del griego. Aunque el sentido puede abarcar la casa como patrimonio o sustento familiar, el texto no obliga a explicitar más. «Hogares» suavizaría la expresión y «propiedades» interpretaría demasiado.
- source_word: τῶν χηρῶν
  english_pob_choice: widows’
  chosen_spanish: de las viudas
  alternatives_spanish:
  - de viudas
  - de las viudas pobres
  lexicon: BDAG
  rationale: El genitivo plural identifica a las víctimas como viudas, un grupo social vulnerable. En español, «de las viudas» expresa con claridad la relación posesiva sin añadir matices no presentes en el texto.
- source_word: προφάσει
  english_pob_choice: for appearance’s sake
  chosen_spanish: bajo apariencia
  alternatives_spanish:
  - como pretexto
  - con pretexto
  - por pura apariencia
  lexicon: BDAG
  rationale: El sustantivo indica pretexto o apariencia externa. «Bajo apariencia» comunica el carácter hipócrita de la acción de manera natural y breve; la alternativa «como pretexto» queda recogida en la nota para conservar la ambigüedad lexical del griego.
- source_word: μακρὰ προσευχόμενοι
  english_pob_choice: pray at length
  chosen_spanish: oran largamente
  alternatives_spanish:
  - oran por largo tiempo
  - hacen largas oraciones
  - practican largas oraciones
  lexicon: BDAG
  rationale: La construcción adverbial describe oración prolongada. «Oran largamente» es fiel y fluido en español; evita una paráfrasis excesiva y conserva la observación de duración, no necesariamente de contenido.
- source_word: λήμψονται
  english_pob_choice: will receive
  chosen_spanish: recibirán
  alternatives_spanish:
  - obtendrán
  - tendrán
  - les tocará
  lexicon: BDAG
  rationale: El futuro medio de λαμβάνω en este contexto se traduce naturalmente como «recibirán». Es una forma sobria y solemne para un anuncio de retribución.
- source_word: περισσότερον
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más severa
  - más grande
  - más pesada
  lexicon: BDAG
  rationale: El comparativo modifica el sustantivo siguiente y expresa un grado superior de severidad. «Mayor» es formalmente cercano y evita decidir por adelantado la cualidad exacta del aumento.
- source_word: κρίμα
  english_pob_choice: condemnation
  chosen_spanish: condenación
  alternatives_spanish:
  - juicio
  - sentencia
  lexicon: BDAG
  rationale: En este contexto de advertencia contra abuso e hipocresía religiosa, el término tiene fuerza punitiva. «Condenación» reproduce mejor esa severidad que el más amplio «juicio», aunque este sigue siendo una alternativa viable.
theological_decisions:
- issue: Alcance punitivo de κρίμα
  english_pob_reading: condemnation
  chosen_spanish_reading: condenación
  alternative_spanish_readings:
  - juicio
  - sentencia
  rationale: La frase final no describe solo evaluación, sino una advertencia de retribución más severa. «Condenación» comunica ese matiz sin desarrollar una doctrina más amplia de juicio final que el versículo no explicita.
  doctrine_reference: Preservar la tensión teológica y el tono admonitorio del texto; no suavizar el juicio implícito.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el trazado auditado del inglés POB y conserva las dos tensiones léxicas principales: προφάσει como apariencia/pretexto y κρίμα como condenación/juicio. No se introdujeron cambios textuales respecto del expediente auditado.'
  spanish_consistency_notes:
  - Se mantiene «viudas» y no se expande a «viudas pobres» porque el griego no lo dice explícitamente.
  - Se usa «casas» en lugar de «hogares» para preservar la imaginería concreta del original.
  - Se conserva el orden retórico del reproche y la conclusión sentenciosa para reflejar la estructura del griego.
  - Se prefiere «condenación» por coherencia con el valor punitivo documentado de κρίμα en este contexto.
