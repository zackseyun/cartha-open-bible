translation:
  language: es
  text: Porque cuando resuciten de entre los muertos[a], ni se casan ni son entregados en matrimonio, sino que son como ángeles en el cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los cielos». El griego está en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν γὰρ
  english_pob_choice: For when
  chosen_spanish: Porque cuando
  alternatives_spanish:
  - cuando
  - pues cuando
  - porque cuando
  lexicon: BDAG
  rationale: γάρ aporta una relación explicativa con lo anterior, y ὅταν introduce una condición temporal general. «Porque cuando» conserva ambos valores con naturalidad en español.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - desde los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La expresión española idiomática para el ámbito de resurrección es «de entre los muertos», que mantiene el valor de salida desde el conjunto de los muertos sin sonar forzada.
- source_word: ἀναστῶσιν
  english_pob_choice: they rise
  chosen_spanish: resuciten
  alternatives_spanish:
  - se levanten
  - sean levantados
  - resuciten
  lexicon: BDAG
  rationale: Aunque el griego es activo, en español «resuciten» expresa con claridad el evento de la resurrección y evita una formulación ambigua. Se conserva el sentido verbal sin imponer un pasivo inexistente en el texto.
- source_word: οὔτε γαμοῦσιν
  english_pob_choice: they neither marry
  chosen_spanish: ni se casan
  alternatives_spanish:
  - ni se casan
  - ni contraen matrimonio
  lexicon: BDAG
  rationale: «γαμέω» aquí refiere a entrar en matrimonio. En español, «casarse» comunica mejor la acción que una calca más técnica.
- source_word: οὔτε γαμίζονται
  english_pob_choice: nor are given in marriage
  chosen_spanish: ni se dan en matrimonio
  alternatives_spanish:
  - ni son dados en matrimonio
  - ni son casados
  lexicon: BDAG
  rationale: El pasivo de γαμίζω conserva la distinción lexical respecto de γαμέω. «Se dan en matrimonio» reproduce la pasiva sin borrar esa diferencia.
- source_word: ὡς ἄγγελοι
  english_pob_choice: like angels
  chosen_spanish: como ángeles
  alternatives_spanish:
  - como los ángeles
  - igual que ángeles
  lexicon: BDAG
  rationale: ὡς expresa comparación, no identidad. «Como ángeles» evita sugerir que los resucitados se convierten en ángeles.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in heaven
  chosen_spanish: en el cielo
  alternatives_spanish:
  - en los cielos
  - en el cielo
  lexicon: BDAG
  rationale: Aunque el griego usa plural, en español «en el cielo» es la equivalencia natural y clara. El plural «en los cielos» queda como alternativa posible, pero menos idiomática aquí.
theological_decisions:
- issue: Comparación con los ángeles
  english_pob_reading: Resurrected people are like angels with respect to not marrying, not transformed into angels.
  chosen_spanish_reading: Los resucitados son como ángeles en cuanto a que no se casan, no que se convierten en ángeles.
  alternative_spanish_readings:
  - Los resucitados se vuelven ángeles.
  - Los resucitados son ángeles.
  rationale: La partícula comparativa ὡς indica semejanza. La traducción conserva la comparación y evita resolver la afirmación en una identidad ontológica que el griego no dice.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla; la gramática favorece comparación, no identidad.'
translation_notes:
  revision_awareness: Se corrige la validación previa anclando la nota al texto español mediante [a] en «de entre los muertos[a]». No se introducen notas sin ancla.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero aquí no aparece el nombre divino.
  - Se usa «ángeles» y no un equivalente interpretativo que borre la comparación.
  - Se conserva la distinción entre los dos verbos matrimoniales griegos.
  - «Cielo» se emplea como forma natural para el plural griego οὐρανοί, con nota sobre la alternativa literal.
