  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y del POB inglés: conserva la fuerza explicativa de γάρ, la idea de resurrección, la correlación «ni... ni...», la distinción teológica de comparación en «como ángeles», y la nota sobre el plural «cielos». Sin embargo, «ni se dan en matrimonio» suena poco natural en español y no reproduce de manera idiomática el pasivo de γαμίζονται.'
  spanish_quality_summary: El texto es claro y mayormente natural, pero una frase resulta forzada para un español eclesial amplio. «Ni se dan en matrimonio» parece reflexivo y puede sonar impropio; «ni son dados en matrimonio» es demasiado literal y poco idiomático. Una formulación como «ni son entregados en matrimonio» conserva mejor la distinción léxica frente a «se casan» y mejora la legibilidad.
  glossary_alignment: No hay conflictos con los términos base del proyecto. «Ángeles», «resuciten», y «cielo»/«cielos» están bien manejados. La comparación con los ángeles se preserva correctamente. No intervienen términos sensibles como Yahvé, Mesías, esclavo, carne, gracia, etc.
  issues:
  - severity: medium
    issue: «ni se dan en matrimonio» es una construcción poco natural
    rationale: Aunque intenta reflejar el pasivo de γαμίζονται, en español neutro suena reflexiva y poco idiomática. Puede dificultar la comprensión y no comunica con claridad la idea de ser dado/entregado en matrimonio.
  - severity: low
    issue: Ligera asimetría estilística entre «se casan» y la segunda cláusula
    rationale: El griego distingue dos verbos; la traducción debe conservar esa diferencia sin volverse torpe. «Ni son entregados en matrimonio» mantiene la distinción y fluye mejor que la redacción actual.
  revised_spanish_text: Porque cuando resuciten de entre los muertos[a], ni se casan ni son entregados en matrimonio, sino que son como ángeles en el cielo.
  revised_footnotes:
