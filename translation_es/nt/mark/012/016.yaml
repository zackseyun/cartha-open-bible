- from: 'Y trajeron uno. Y él les dice[a]: «¿De quién es esta imagen y esta inscripción?». Y ellos le respondieron: «De César».'
  to: 'Y trajeron una[a]. Y él les dice: «¿De quién es esta imagen y esta inscripción?». Y ellos le dijeron: «De César».'
  rationale: Se corrigió la nota al pie para alinearla con la alternativa léxica documentada en ἤνεγκαν, y se ajustó «uno» a «una» para un español más natural con referente implícito «moneda», sin sobretraducir. También se suavizó la narración final a «le dijeron», que es natural para εἶπαν. No se requiere adjudicación adicional.
