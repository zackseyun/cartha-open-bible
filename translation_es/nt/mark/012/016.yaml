    text: 'O: «la trajeron», con el objeto entendido por el contexto previo como la moneda (un denario).'
    reason: lexical_alternative
  revision_rationale: Se corrigió la nota al pie para alinearla con la alternativa léxica documentada en ἤνεγκαν, y se ajustó «uno» a «una» para un español más natural con referente implícito «moneda», sin sobretraducir. También se suavizó la narración final a «le dijeron», que es natural para εἶπαν. No se requiere adjudicación adicional.
