translation:
  language: es
  text: 'Y trajeron una[a]. Y él les dice: «¿De quién es esta imagen y esta inscripción?». Y ellos le dijeron: «De César».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la trajeron», con el objeto entendido por el contexto previo como la moneda (un denario).'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  english_pob_choice: they brought one
  chosen_spanish: trajeron uno
  alternatives_spanish:
  - trajeron eso
  - trajeron el denario
  - lo trajeron
  lexicon: BDAG (φέρω)
  rationale: El verbo σημαίνει ‘traer/llevar’. En español conviene suplir el objeto implícito con «uno», como hace el inglés POB, porque el contexto inmediato ya había presentado la moneda sin añadir más especificación de la necesaria.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: él les dice
  alternatives_spanish:
  - él les dijo
  - les decía
  lexicon: BDAG (λέγω)
  rationale: El presente histórico de Marcos se conserva mejor con presente en español. «Les dice» mantiene la viveza narrativa sin forzar un pretérito.
- source_word: Τίνος
  english_pob_choice: Whose
  chosen_spanish: ¿De quién es...?
  alternatives_spanish:
  - ¿De quién pertenece...?
  - ¿A quién pertenece...?
  lexicon: BDAG (τίς, genitivo interrogativo)
  rationale: En español, la pregunta posesiva natural es «¿De quién es...?»; conserva la fuerza posesiva del genitivo interrogativo sin sonar artificial.
- source_word: εἰκών
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - imagen grabada
  - semblanza
  - representación
  lexicon: BDAG (εἰκών)
  rationale: «Imagen» es el equivalente más directo y claro en el contexto de una moneda, y además mantiene el uso bíblico habitual sin introducir una interpretación adicional.
- source_word: ἐπιγραφή
  english_pob_choice: inscription
  chosen_spanish: inscripción
  alternatives_spanish:
  - leyenda
  - escritura
  - título
  lexicon: BDAG (ἐπιγραφή)
  rationale: En una moneda, ἐπιγραφή designa la leyenda escrita. «Inscripción» es preciso y comprensible en español, y evita el término técnico «leyenda» que puede sonar menos inmediato para lectores generales.
- source_word: Καίσαρος
  english_pob_choice: Caesar’s
  chosen_spanish: De César
  alternatives_spanish:
  - De César
  - de César
  lexicon: BDAG (Καῖσαρ)
  rationale: El genitivo responde a la posesión/identificación. En la respuesta breve, «De César» es natural en español y conserva la concisión del original.
translation_notes:
  revision_awareness: El texto griego presenta un objeto implícito en ἤνεγκαν; la versión inglesa POB opta por suplirlo con «one» y nota la alternativa «it»/«the coin (a denarius)». En español, se resuelve con «uno» para mantener la misma economía y no añadir una especificación no expresada en el verso. También se conserva el presente histórico de λέγει, y la estructura repetida de la pregunta («¿De quién es... y ...?») refleja mejor el paralelismo griego y la revisión inglesa que añadió el segundo «whose».
  spanish_consistency_notes:
  - Se usa «imagen» y «inscripción» de forma consistente con el campo semántico numismático del pasaje.
  - Se mantiene «César» sin artículo en la respuesta para reflejar el genitivo posesivo breve del griego.
  - La puntuación sigue el español actual con comillas angulares y signos de interrogación de apertura y cierre.
