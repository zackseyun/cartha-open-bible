translation:
  language: es
  text: 'Pero Jesús dijo: «Déjenla en paz[b]. ¿Por qué la están molestando[a]? Ha hecho una obra hermosa para mí[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué le causan molestias?»'
    reason: alternative_reading
  - marker: b
    text: 'O: «Déjenla».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en mí»; aquí se expresa idiomáticamente como «para mí».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἄφετε αὐτήν
  english_pob_choice: Leave her alone
  chosen_spanish: Déjenla en paz
  alternatives_spanish:
  - Dejen que siga
  - Déjenla
  - Déjenla sola
  lexicon: BDAG
  rationale: El imperativo aoristo pide cesar de inmediato la interferencia. «Déjenla en paz» transmite en español la idea de no seguirla perturbando y conserva el tono protector y reprensor del dicho de Jesús.
- source_word: τί αὐτῇ κόπους παρέχετε;
  english_pob_choice: Why are you troubling her?
  chosen_spanish: ¿Por qué la están molestando?
  alternatives_spanish:
  - ¿Por qué la perturban?
  - ¿Por qué le causan molestias?
  - ¿Por qué la están inquietando?
  lexicon: BDAG
  rationale: κόπους παρέχετε expresa la idea de causar dificultad, molestia o carga. «Molestando» mantiene el reproche directo y natural en español, sin debilitar la fuerza de la reprensión.
- source_word: καλὸν ἔργον
  english_pob_choice: a beautiful work
  chosen_spanish: una obra hermosa
  alternatives_spanish:
  - una buena obra
  - una obra buena
  - una obra noble
  lexicon: BDAG
  rationale: καλός abarca bueno, hermoso, noble o apropiado. «Obra hermosa» conserva la valoración positiva y la nota de belleza/fittingness que el contexto de devoción sugiere, sin reducirla a utilidad moral.
- source_word: ἠργάσατο
  english_pob_choice: has done
  chosen_spanish: ha hecho
  alternatives_spanish:
  - ha realizado
  - ha obrado
  - ha efectuado
  lexicon: BDAG
  rationale: El verbo medio se comunica con naturalidad como «ha hecho». En español es la opción más sobria y fiel, y evita un tono artificial.
- source_word: ἐν ἐμοί
  english_pob_choice: for me
  chosen_spanish: para mí
  alternatives_spanish:
  - en mí
  - hacia mí
  - a mí
  lexicon: BDAG
  rationale: Aunque la forma griega dice literalmente «en mí», el contexto exige una equivalencia idiomática. «Para mí» expresa que la acción estuvo dirigida a Jesús personalmente, sin sobreespecificar la imagen espacial o física.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce un giro contrastivo en la narración; «Pero» reproduce bien ese movimiento en español.
theological_decisions:
- issue: Valor de καλὸν ἔργον en la acción de la mujer
  english_pob_reading: Rendered as 'a beautiful work'
  chosen_spanish_reading: Renderizado como «una obra hermosa»
  alternative_spanish_readings:
  - una buena obra
  - una obra noble
  rationale: La frase elogia la acción sin introducir lenguaje sacramental ni de mérito. «Obra hermosa» preserva la valoración positiva y el matiz de conveniencia/beleza del acto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de ἐν ἐμοί
  english_pob_reading: Rendered idiomatically as 'for me'
  chosen_spanish_reading: Renderizado idiomáticamente como «para mí»
  alternative_spanish_readings:
  - en mí
  - a mí
  - hacia mí
  rationale: La traducción evita forzar una lectura espacial literal que podría sonar extraña en español. Mantiene, no obstante, que el acto fue realizado en relación directa con Jesús.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje revisado del auditorio inglés: se mantuvo la forma directa de la reprensión («troubling her») y la cláusula final conserva la valoración de «beautiful work» y el giro idiomático de ἐν ἐμοί, ahora explicitado en nota. También se refleja el cierre de la cita en español.'
  spanish_consistency_notes:
  - Se usa «Jesús» según el nombre propio en español.
  - Se prefirió el pronombre enclítico «la» para mantener fluidez y referencia directa a la mujer.
  - «Obra» se conserva para reflejar ἔργον sin sustituirlo por un término más técnico o litúrgico.
  - La nota de ἐν ἐμοί preserva la tensión entre literalidad y equivalencia idiomática.
  - La puntuación y las comillas siguen normas españolas de publicación.
