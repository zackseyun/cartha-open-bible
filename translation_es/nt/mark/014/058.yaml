translation:
  language: es
  text: 'que[a] «Nosotros le oímos decir: “Yo destruiré este templo hecho con manos[b], y en tres días edificaré otro no hecho con manos”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dentro de tres días». La expresión griega διὰ τριῶν ἡμερῶν aquí indica más naturalmente el lapso dentro del cual ocurriría la acción.
    reason: lexical_alternative
  - marker: b
    text: «Hecho con manos» y «no hecho con manos» conservan el contraste griego entre χειροποίητον y ἀχειροποίητον.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido del testimonio en estilo declarativo. En este contexto es mejor que 'porque', que sería causal y alteraría la relación sintáctica.
- source_word: Ἡμεῖς
  english_pob_choice: We
  chosen_spanish: Oímos
  alternatives_spanish:
  - Nosotros oímos
  lexicon: BDAG
  rationale: El pronombre explícito griego se entiende en español por la forma verbal. Mantener 'nosotros' sonaría forzado; el énfasis queda suficientemente reflejado por la frase testimonial.
- source_word: ἠκούσαμεν αὐτοῦ λέγοντος
  english_pob_choice: we heard him saying
  chosen_spanish: Oímos que él decía
  alternatives_spanish:
  - Oímos a él decir
  - Oímos decirlo
  lexicon: BDAG
  rationale: La construcción participial se expresa de manera natural con 'oímos que él decía', conservando el sentido de testimonio oído sin volverlo una paráfrasis más fuerte de lo que permite el griego.
- source_word: καταλύσω
  english_pob_choice: I will destroy
  chosen_spanish: destruiré
  alternatives_spanish:
  - derribaré
  - demoleré
  lexicon: BDAG
  rationale: En el contexto del templo, el verbo comunica destrucción o desmantelamiento. 'Destruiré' es claro y suficientemente fuerte en español, como la acusación reportada por los testigos.
- source_word: ναὸν
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: '''Templo'' es el equivalente natural y reconocido en español para el edificio del templo de Jerusalén.'
- source_word: χειροποίητον
  english_pob_choice: made with hands
  chosen_spanish: hecho con manos
  alternatives_spanish:
  - hecho por manos humanas
  - man-made
  lexicon: BDAG
  rationale: Se conserva el paralelismo transparente con ἀχειροποίητον. 'Hecho con manos' suena menos idiomático, pero reproduce con fidelidad la contraposición léxica del texto fuente.
- source_word: διὰ τριῶν ἡμερῶν
  english_pob_choice: in three days
  chosen_spanish: en tres días
  alternatives_spanish:
  - dentro de tres días
  - al cabo de tres días
  lexicon: BDAG
  rationale: La preposición διά con genitivo temporal se traduce aquí de forma directa y natural como 'en tres días', siguiendo la revisión inglesa que prefirió esta opción por ser más directa.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno diferente
  - uno más
  lexicon: BDAG
  rationale: Equivale de modo simple y fiel a 'another', manteniendo la idea de un segundo templo en contraste con el primero.
- source_word: ἀχειροποίητον
  english_pob_choice: not made with hands
  chosen_spanish: no hecho con manos
  alternatives_spanish:
  - no hecho por manos humanas
  - no manoseado
  lexicon: BDAG
  rationale: Se preserva el contraste verbal con χειροποίητον. La forma literal es la más apta para mantener la tensión teológica sin interpretarla en exceso.
- source_word: οἰκοδομήσω
  english_pob_choice: I will build
  chosen_spanish: edificaré
  alternatives_spanish:
  - construiré
  - levantaré
  lexicon: BDAG
  rationale: '''Edificaré'' comunica bien la acción de construir y encaja con el registro bíblico sin desplazar el sentido básico de οἰκοδομέω.'
theological_decisions:
- issue: Cómo marcar que se trata de una acusación/testimonio reportado, no de una afirmación narrativa corregida por el traductor
  english_pob_reading: Retain the accusation as reported speech without interpretive expansion
  chosen_spanish_reading: Conservar el discurso referido de los testigos sin añadir aclaraciones armonizadoras
  alternative_spanish_readings:
  - Añadir una nota interpretativa que diga que se trata de una tergiversación
  - Parafrasear para sugerir que los testigos citan de forma incompleta
  rationale: El versículo presenta lo que los testigos declaran haber oído. El texto español debe dejar esa acusación tal como se reporta, sin resolverla con explicaciones tomadas de otros pasajes.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo rendir la oposición 'hecho con manos' / 'no hecho con manos'
  english_pob_reading: Use 'made with hands' / 'not made with hands' in the main text
  chosen_spanish_reading: Usar 'hecho con manos' / 'no hecho con manos' en el texto principal
  alternative_spanish_readings:
  - '''hecho por hombres'' / ''no hecho por hombres'''
  - '''hecho por manos humanas'' / ''no hecho por manos humanas'''
  rationale: La contraposición debe permanecer visible en español para respetar el contraste del griego. Una versión más interpretativa podría borrar o domesticar la resonancia lexical y teológica del pasaje.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó 'within three days' por 'in three days' para reflejar de forma más directa διὰ τριῶν ἡμερῶν. La versión española sigue esa decisión con 'en tres días', sin introducir una interpretación temporal más fuerte que el texto base.
  spanish_consistency_notes:
  - Se mantiene el registro de cita/testimonio indirecto con comillas anidadas estándar en español.
  - '''Templo'' se conserva de forma consistente para ναός en este contexto concreto.'
  - Se preserva el paralelo léxico 'hecho con manos' / 'no hecho con manos' para no diluir el contraste del original.
