revisions:
- from: 'que[a]: «Oímos que él decía: “Yo destruiré este templo hecho con manos[b], y en tres días edificaré otro no hecho con manos”».'
  to: 'que[a] «Nosotros le oímos decir: “Yo destruiré este templo hecho con manos[b], y en tres días edificaré otro no hecho con manos”».'
  rationale: Se ajustó la nota [a] para que ofrezca una alternativa real al texto principal; se restauró el énfasis del pronombre Ἡμεῖς con «Nosotros»; se mejoró la naturalidad y fidelidad de la construcción verbal con «le oímos decir»; y se suavizó la puntuación introductoria para un español más natural sin alterar el sentido.
