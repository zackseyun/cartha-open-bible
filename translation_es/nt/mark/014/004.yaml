translation:
  language: es
  text: 'Pero algunos se indignaban entre sí: «¿Por qué ha ocurrido este desperdicio del perfume?»[a][b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «unos a otros» o «dentro de sí mismos». La frase griega puede indicar una queja mutua dentro del grupo o una reacción interior.
    reason: lexical_alternative
  - marker: b
    text: O «ungüento». El griego μύρον designa aceite perfumado o ungüento aromático.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δέ
  english_pob_choice: But ... were
  chosen_spanish: Pero ... se indignaban
  alternatives_spanish:
  - Y ... se indignaban
  - Entonces ... se indignaban
  lexicon: SBLGNT; BDAG
  rationale: δέ introduce un giro de contraste respecto del acto de la mujer; «Pero» conserva ese cambio de escena de modo natural en español. El verbo perifrástico «se indignaban» transmite el participio durativo ἀγανακτοῦντες como estado de reacción continua.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: BDAG
  rationale: El indefinido plural es inespecífico; «algunos» es breve, natural y conserva la falta de identificación.
- source_word: ἀγανακτοῦντες
  english_pob_choice: were indignant
  chosen_spanish: se indignaban
  alternatives_spanish:
  - estaban indignados
  - se irritaban
  lexicon: BDAG
  rationale: La idea es una fuerte molestia moralizada, no simple enojo. «Se indignaban» preserva el matiz de indignación con buen registro bíblico en español.
- source_word: πρὸς ἑαυτούς
  english_pob_choice: among themselves
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos a otros
  - para sí mismos
  lexicon: BDAG
  rationale: La frase puede señalar reacción grupal interna o quejarse unos a otros; en este contexto, «entre sí» conserva la ambigüedad útil del griego y suena idiomático en español.
- source_word: Εἰς τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Para qué
  - ¿Con qué fin?
  lexicon: BDAG
  rationale: Es una pregunta de motivo o resultado; «¿Por qué» es la equivalencia más natural y clara en español.
- source_word: ἡ ἀπώλεια αὕτη
  english_pob_choice: this waste
  chosen_spanish: este desperdicio
  alternatives_spanish:
  - esta pérdida
  - esta ruina
  lexicon: BDAG
  rationale: En el contexto de perfume costoso derramado, ἀπώλεια expresa desperdicio o pérdida inútil. «Desperdicio» reproduce mejor la queja concreta que «pérdida».
- source_word: τοῦ μύρου
  english_pob_choice: of the perfume
  chosen_spanish: del perfume
  alternatives_spanish:
  - del ungüento
  - del aceite perfumado
  lexicon: BDAG
  rationale: μύρον designa ungüento perfumado o aceite aromático. «Perfume» es claro y acorde con el contexto del frasco precioso; se mantiene la alternativa más tradicional en nota.
- source_word: γέγονεν
  english_pob_choice: has ... happened
  chosen_spanish: se hizo
  alternatives_spanish:
  - ha sucedido
  - ha ocurrido
  lexicon: BDAG
  rationale: El perfecto de γίνομαι pregunta cómo llegó a darse este hecho. «Se hizo» conserva la idea de acontecer/venir a ser, aunque en español suene algo más literal; la nota permite ver la alternativa más natural.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el audit trail inglés de la POB. Se mantuvo el contraste de δέ con «Pero», la indefinición de τινες con «algunos», y la ambigüedad de πρὸς ἑαυτούς mediante «entre sí». Se eligió «desperdicio» para ἀπώλεια por el contexto de una unción costosa, y «perfume» para μύρον, dejando «ungüento» como alternativa documentada en nota.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o términos de sustitución no aplicables aquí.
  - Se mantuvo un español moderno y eclesialmente legible sin calcos innecesarios.
  - La puntuación conserva el diálogo directo con comillas españolas.
  - No hay decisiones teológicas adicionales en este versículo; el foco es léxico y sintáctico.
