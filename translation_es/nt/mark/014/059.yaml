lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y además
  lexicon: BDAG
  rationale: Conecta la cláusula con el relato previo sin añadir énfasis extra; en español, 'Y' preserva el enlace narrativo de manera natural.
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: ni aun
  alternatives_spanish:
  - ni siquiera
  - ni aun así
  lexicon: BDAG
  rationale: La negación enfática se expresa de forma idiomática con 'ni aun', que conserva el valor de refuerzo de οὐδὲ en este contexto judicial.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - en esta forma
  lexicon: BDAG
  rationale: Recupera la referencia al modo inmediatamente anterior de la acusación/testimonio, con una frase natural en español.
- source_word: ἴση
  english_pob_choice: consistent
  chosen_spanish: concorde
  alternatives_spanish:
  - igual
  - de acuerdo
  - coherente
  lexicon: BDAG
  rationale: El sentido literal es 'igual', pero en un contexto de testimonios la idea es de concordancia o ajuste mutuo; 'concorde' mantiene esa fuerza relacional sin perder el matiz de comparación.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  lexicon: BDAG
  rationale: El imperfecto se vierte naturalmente con imperfecto español para reflejar el estado descrito en curso o como valoración narrativa.
- source_word: ἡ μαρτυρία
  english_pob_choice: their testimony
  chosen_spanish: su testimonio
  alternatives_spanish:
  - el testimonio
  - su declaración
  lexicon: BDAG
  rationale: En el marco forense, μαρτυρία es 'testimonio'; el singular con valor colectivo se conserva en español como 'su testimonio', que suena natural y mantiene el carácter judicial.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellas
  lexicon: BDAG
  rationale: El genitivo plural posesivo se expresa de modo natural con 'su', cuyo referente plural queda claro por el contexto inmediato.
translation_notes:
  revision_awareness: Traducción revisada a partir del texto griego SBLGNT y del audit trail inglés POB; se mantiene el sentido forense de la frase y la tensión semántica de ἴση entre 'igualdad' literal y 'concordancia' contextual.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otra terminología no pertinente; el versículo no contiene léxico teológico que requiera ajuste doctrinal.
  - '''Testimonio'' conserva el registro jurídico del pasaje y corresponde al uso contextual de μαρτυρία.'
  - La nota al pie preserva la alternativa literal 'igual' para no borrar la tensión lexical documentada por el POB inglés.
