translation:
  language: es
  text: Y Pedro le siguió desde lejos[a], hasta el patio del sumo sacerdote, y estaba sentado con los guardias y calentándose junto al fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “junto a la luz”. El griego dice literalmente “hacia/junto a la luz”, probablemente refiriéndose a la luz del fuego en el patio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde una distancia
  lexicon: BDAG
  rationale: Conserva la distancia espacial y el matiz narrativo de seguimiento cauteloso con un giro natural en español.
- source_word: ἠκολούθησεν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: le siguió
  alternatives_spanish:
  - lo siguió
  - iba siguiéndolo
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa con pasado simple; 'le siguió' es fluido y fiel al movimiento de persecución discreta.
- source_word: αὐλήν
  english_pob_choice: courtyard
  chosen_spanish: patio
  alternatives_spanish:
  - patio interior
  - atrio
  lexicon: BDAG
  rationale: En este contexto, αὐλή designa el recinto abierto de la residencia del sumo sacerdote. 'Patio' es claro y natural en español; 'atrio' puede sonar más eclesiástico o menos transparente.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: the high priest
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del jefe de los sacerdotes
  lexicon: BDAG
  rationale: '''Sumo sacerdote'' es la equivalencia estándar y precisa para ἀρχιερεύς en el relato de la pasión.'
- source_word: συγκαθήμενος
  english_pob_choice: sitting
  chosen_spanish: estaba sentado
  alternatives_spanish:
  - se sentaba
  - estaba recostado
  lexicon: BDAG
  rationale: El participio perifrástico imperfectivo se vierte como acción en curso en español. Se mantiene la escena sin sobreinterpretar la postura.
- source_word: μετὰ τῶν ὑπηρετῶν
  english_pob_choice: with the officers
  chosen_spanish: con los oficiales
  alternatives_spanish:
  - con los guardias
  - con los servidores
  lexicon: BDAG
  rationale: Siguiendo el sentido funcional de ὑπηρέται en este contexto de arresto y comparecencia, 'oficiales' preserva su carácter de personal con autoridad/función oficial; 'guardias' es posible, pero menos amplio.
- source_word: θερμαινόμενος
  english_pob_choice: warming himself
  chosen_spanish: calentándose
  alternatives_spanish:
  - entrando en calor
  - calentándose a sí mismo
  lexicon: BDAG
  rationale: Participio medio que describe la acción de Pedro frente al fuego. 'Calentándose' comunica bien la acción sin añadir elementos ajenos al texto.
- source_word: πρὸς τὸ φῶς
  english_pob_choice: by the fire
  chosen_spanish: junto al fuego
  alternatives_spanish:
  - junto a la luz
  - hacia la luz
  lexicon: BDAG
  rationale: Aunque φῶς significa literalmente 'luz', el contexto del patio sugiere la luz del fuego. En español, 'junto al fuego' transmite la escena de manera directa y evita una formulación extraña.
theological_decisions:
- issue: El valor de πρὸς τὸ φῶς en la escena
  english_pob_reading: Or 'by the light.' The Greek reads literally 'toward/by the light,' likely referring to the firelight in the courtyard.
  chosen_spanish_reading: junto al fuego
  alternative_spanish_readings:
  - junto a la luz
  - hacia la luz
  rationale: La nota inglesa preserva la tensión entre la literalidad ('luz') y el referente contextual probable (el fuego del patio). En español se opta por el referente narrativo más claro, sin perder la posibilidad literal mediante la nota.
  doctrine_reference: Ninguno; es una decisión lexicográfica y contextual, no doctrinal.
translation_notes:
  revision_awareness: La redacción sigue la revisión del inglés POB que unificó la escena en una sola oración y prefirió una formulación más natural para el ámbito del patio. Se retuvo el sentido de distancia, acceso al patio del sumo sacerdote, compañía con los oficiales y la acción de calentarse al fuego, evitando una traducción demasiado literal de πρὸς τὸ φῶς que oscureciera la escena.
  spanish_consistency_notes:
  - Se usa 'sumo sacerdote' para ἀρχιερεύς, en coherencia con el registro bíblico y el resto del proyecto.
  - Se usa 'oficiales' para ὑπηρέται siguiendo la función contextual en un relato de arresto/interrogatorio, no 'siervos'.
  - Se conserva 'fuego' como referente contextual de φῶς, pero la nota mantiene la alternativa literal 'luz' para auditar la decisión.
  - El estilo mantiene un español sobrio y narrativo, acorde con una traducción pública y transparente.
