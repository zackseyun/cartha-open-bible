translation:
  language: es
  text: 'Y les dice: «Mi alma está profundamente afligida, hasta la muerte[a][b]. Quédense aquí y velen[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy afligida» o «sobremanera triste».
    reason: lexical_alternative
  - marker: b
    text: O «hasta el punto de la muerte».
    reason: lexical_alternative
  - marker: c
    text: O «estén despiertos»; la orden puede incluir tanto la vigilia literal como la vigilancia atenta.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego y del POB inglés con «dice», más natural en español narrativo que un pasado simple.
- source_word: Περίλυπός
  english_pob_choice: deeply grieved
  chosen_spanish: profundamente afligida
  alternatives_spanish:
  - muy triste
  - muy afligida
  - sobremanera triste
  lexicon: BDAG
  rationale: El adjetivo expresa pena intensa; «profundamente afligida» transmite esa carga emocional con dignidad y sin sonar arcaico.
- source_word: ψυχή
  english_pob_choice: soul
  chosen_spanish: alma
  alternatives_spanish:
  - vida
  - ser
  lexicon: BDAG
  rationale: «Alma» conserva la densidad antropológica y teológica del término, y permite reflejar la angustia interior de Jesús sin reducirla a «vida» o «ser».
- source_word: ἕως θανάτου
  english_pob_choice: even to death
  chosen_spanish: hasta la muerte
  alternatives_spanish:
  - hasta morir
  - al punto de la muerte
  lexicon: BDAG
  rationale: La locución comunica un límite extremo; «hasta la muerte» reproduce bien la intensidad idiomática en español.
- source_word: μείνατε
  english_pob_choice: Remain
  chosen_spanish: Quédense
  alternatives_spanish:
  - Permanezcan
  - Queden
  lexicon: BDAG
  rationale: El imperativo pide quedarse en el lugar; «Quédense» es claro y natural en español, sin perder el sentido de permanencia situacional.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: Adverbio locativo simple, mejor rendido por «aquí».
- source_word: γρηγορεῖτε
  english_pob_choice: keep watch
  chosen_spanish: velen
  alternatives_spanish:
  - estén alerta
  - permanezcan despiertos
  - vigilen
  lexicon: BDAG
  rationale: «Velen» puede abarcar tanto la vigilia física como la vigilancia atenta del contexto, preservando la tensión entre estar despiertos y estar vigilantes.
theological_decisions:
- issue: Rendering of ψυχή in Jesus’ statement
  english_pob_reading: soul
  chosen_spanish_reading: alma
  alternative_spanish_readings:
  - vida
  - ser
  rationale: Se mantiene «alma» para conservar la fuerza antropológica y emocional del pasaje sin resolver la tensión cristológica; Jesús expresa verdadera angustia humana.
  doctrine_reference: Chalcedon (451 AD) sobre las dos naturalezas de Cristo
- issue: Force of γρηγορεῖτε
  english_pob_reading: keep watch
  chosen_spanish_reading: velen
  alternative_spanish_readings:
  - estén despiertos
  - estén alerta
  rationale: La orden incluye despierto físico y vigilancia espiritual; «velen» preserva ambas posibilidades sin reducir el mandato a solo no dormir.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: No hay cambios aplicados en la revisión más reciente; el juicio de alta concordancia se mantiene, así que este borrador sigue de cerca el texto griego y el audit trail inglés sin introducir ajustes no documentados.
  spanish_consistency_notes:
  - Se mantuvo el presente histórico con «dice» para conservar el tono narrativo del evangelio.
  - Se eligió «alma» en lugar de «vida» para respetar la carga teológica y antropológica ya documentada.
  - «Velen» fue preferido a «permanezcan despiertos» porque en español puede abarcar vigilancia y vigilia, reflejando la tensión señalada en el audit trail.
  - Los corchetes de notas aparecen en el texto exactamente donde el lector necesita ver las alternativas lexicales o de lectura.
