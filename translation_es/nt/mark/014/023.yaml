  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Copa' para ποτήριον y 'dar gracias' para εὐχαριστήσας concuerdan con la evidencia y con la decisión teológica documentada de evitar lenguaje litúrgico importado.
