translation:
  language: es
  text: Y tomando una copa[a], después de dar gracias, se la dio, y todos bebieron de ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la copa». El griego dice «copa» sin artículo, aunque el contexto de la comida puede implicar una copa específica.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  - tomó
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal expresa acción previa. «Tomando» mantiene esa secuencia en español natural; «habiendo tomado» es más formal, y «tomó» convertiría la acción subordinada en verbo principal.
- source_word: ποτήριον
  english_pob_choice: a cup
  chosen_spanish: una copa
  alternatives_spanish:
  - la copa
  - un vaso
  lexicon: BDAG
  rationale: El griego carece de artículo. «Una copa» conserva el valor anarthrous sin forzar especificidad; elegí «copa» porque en este contexto bíblico comunica mejor el recipiente ritual que «vaso».
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - dando gracias
  lexicon: BDAG
  rationale: La idea central es la acción de agradecer antes del siguiente acto. «Después de dar gracias» expresa con claridad la relación temporal sin importar terminología litúrgica ajena al texto.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: he gave it to them
  chosen_spanish: se la dio a ellos
  alternatives_spanish:
  - la dio a ellos
  - se la dio
  lexicon: BDAG
  rationale: El pronombre retoma «copa». En español, «se la dio» es la forma más natural; añadí «a ellos» para reflejar explícitamente el dativo plural del griego y conservar la referencia distributiva del destinatario.
- source_word: ἔπιον
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - tomaron
  - bebieron de ella
  lexicon: BDAG
  rationale: «Bebieron» es la equivalencia directa y digna para el verbo aoristo. Evita arcaísmos como «bebieron de» salvo que el complemento lo requiera.
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from it
  chosen_spanish: de ella
  alternatives_spanish:
  - de ello
  - de la copa
  lexicon: BDAG
  rationale: El pronombre neutro remite a la copa, femenina en español. «De ella» preserva la referencia sin repetir innecesariamente el sustantivo.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los que estaban allí
  lexicon: BDAG
  rationale: «Todos» basta en español y mantiene el énfasis colectivo del griego sin redundancia.
theological_decisions:
- issue: Posible resonancia eucarística de εὐχαριστήσας
  english_pob_reading: Rendered as 'after giving thanks' rather than a liturgical term such as 'blessed it' or 'gave Eucharist.'
  chosen_spanish_reading: «después de dar gracias» en lugar de un giro litúrgico como «bendijo» o una paráfrasis sacramental.
  alternative_spanish_readings:
  - después de bendecirla
  - después de pronunciar la acción de gracias
  rationale: El verbo griego significa agradecer. La traducción mantiene la tensión entre el sentido léxico inmediato y la relevancia sacramental posterior sin adelantar interpretaciones eclesiales que el texto no expresa explícitamente.
  doctrine_reference: 'Translation philosophy: primacía del idioma original; conservar la tensión teológica sin resolverla prematuramente.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión inglesa: no hubo cambios pendientes; el español sigue la misma decisión de no liturgizar εὐχαριστήσας y de respetar el artículo ausente en ποτήριον.'
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la coordinación narrativa del griego.
  - Se evita «SEÑOR»/«Cristo» porque no aparecen en este versículo.
  - «copa» se usa de forma consistente para ποτήριον y su referente pronominal femenino en español.
  - La nota al pie se ancla solo en «una copa» porque es el punto donde existe la alternativa léxica documentada.
