translation:
  language: es
  text: Y él mismo les mostrará un gran aposento alto[a], dispuesto y listo; prepárenlo allí para nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un gran aposento alto, arreglado y listo». El participio ἐστρωμένον puede denotar una habitación dispuesta o preparada, no solo amueblada.'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático por su posición y forma; «él mismo» conserva ese énfasis mejor que un simple «él».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: El dativo de segunda persona plural se expresa naturalmente en español con pronombre de objeto indirecto plural; «les» mantiene la relación indirecta sin recargar la frase.
- source_word: δείξει
  english_pob_choice: will show
  chosen_spanish: mostrará
  alternatives_spanish:
  - les indicará
  - les mostrará
  lexicon: BDAG
  rationale: El futuro de δείκνυμι se rinde de forma natural con «mostrará»; comunica la acción de señalar o enseñar el lugar.
- source_word: ἀνάγαιον
  english_pob_choice: upper room
  chosen_spanish: aposento alto
  alternatives_spanish:
  - cuarto alto
  - habitación alta
  - cuarto de arriba
  lexicon: BDAG
  rationale: «Aposento alto» es una equivalencia española tradicionalmente comprensible y fiel a la referencia a un cuarto en la parte superior de la casa; evita la ambigüedad de una traducción demasiado literal o demasiado moderna.
- source_word: μέγα
  english_pob_choice: large
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - espacioso
  lexicon: BDAG
  rationale: «Gran» funciona de manera natural antes del sustantivo y conserva la fuerza descriptiva de μέγα.
- source_word: ἐστρωμένον
  english_pob_choice: furnished
  chosen_spanish: dispuesto
  alternatives_spanish:
  - arreglado
  - preparado
  - tendido
  lexicon: BDAG
  rationale: El participio de στρώννυμι puede indicar algo «extendido», «arreglado» o «dispuesto»; «dispuesto» evita limitar indebidamente el sentido a muebles y refleja una estancia ya preparada.
- source_word: ἕτοιμον
  english_pob_choice: ready
  chosen_spanish: listo
  alternatives_spanish:
  - preparado
  - pronto
  lexicon: BDAG
  rationale: «Listo» es el equivalente natural de ἕτοιμος y se distingue de ἐστρωμένον para no duplicar exactamente la misma idea en español.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí mismo
  lexicon: BDAG
  rationale: «Allí» es el adverbio locativo más neutro y natural en español para ἐκεῖ.
- source_word: ἑτοιμάσατε
  english_pob_choice: prepare
  chosen_spanish: preparen
  alternatives_spanish:
  - prepárenlo
  - alisten
  lexicon: BDAG
  rationale: El imperativo plural de ἑτοιμάζω se traduce con «preparen»; conserva el mandato de hacer los arreglos necesarios para la Pascua sin añadir un objeto explícito inexistente en el griego.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - para nosotros allí
  - para nosotros mismos
  lexicon: BDAG
  rationale: La dativa de interés se expresa con «para nosotros», que reproduce de forma clara el beneficio del acto pedido.
theological_decisions:
- issue: 'ἕτοιμος y ἐστρωμένον: si la sala ya está preparada o simplemente amueblada/ordenada'
  english_pob_reading: The participle ἐστρωμένον can denote a room set out or prepared, not merely containing furniture.
  chosen_spanish_reading: «dispuesto y listo» mantiene abierta la tensión entre una sala amueblada y una sala ya arreglada para recibirlos.
  alternative_spanish_readings:
  - amueblado y listo
  - arreglado y listo
  - preparado y listo
  rationale: El español «dispuesto» permite conservar la amplitud semántica del participio sin forzar la imagen a muebles únicamente; «listo» traduce ἕτοιμον sin absorber el matiz de ἐστρωμένον.
  doctrine_reference: No aplica; decisión léxica y narrativa.
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de SBLGNT y refleja la revisión inglesa que eliminó la segunda conjunción antes del imperativo. En español se omite también una conjunción innecesaria para conservar la secuencia natural: descripción del lugar seguida del mandato.'
  spanish_consistency_notes:
  - Se conserva «Y él mismo» para reflejar el énfasis de αὐτός.
  - «Aposento alto» mantiene continuidad con el término narrativo clásico y es compatible con el matiz de ἀνάγαιον.
  - Se evita traducir ἐστρωμένον como «amueblado» en el texto principal para no reducir el alcance del participio.
  - El imperativo plural «preparen» mantiene la forma exhortativa directa del griego.
  - Se usa «para nosotros» para ἡμῖν sin expandir el referente más allá del texto.
