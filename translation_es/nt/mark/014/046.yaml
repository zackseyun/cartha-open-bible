translation:
  language: es
  text: Entonces le echaron las manos encima[a] y lo agarraron[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le pusieron las manos encima». La expresión griega es un modismo para apoderarse de alguien, a menudo con intención de arrestarlo.
    reason: lexical_alternative
  - marker: b
    text: O «lo arrestaron» o «lo apresaron».
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: Then they
  chosen_spanish: Entonces ellos
  alternatives_spanish:
  - Pero ellos
  - Y ellos
  lexicon: BDAG
  rationale: οἱ funciona aquí de manera sustantiva como sujeto narrativo, y δέ marca avance de la acción. «Entonces» conserva la progresión narrativa natural sin volver adversativa la frase más de lo que pide el griego.
- source_word: ἐπέβαλαν τὰς χεῖρας αὐτῷ
  english_pob_choice: laid hands on him
  chosen_spanish: le echaron mano
  alternatives_spanish:
  - pusieron las manos sobre él
  - le pusieron las manos encima
  lexicon: BDAG
  rationale: La expresión griega es idiomática y sugiere tomar físicamente a alguien con intención hostil. En español, «echaron mano» comunica ese gesto de aprehensión de forma natural y breve, sin perder el valor idiomático del acto.
- source_word: ἐκράτησαν αὐτόν
  english_pob_choice: seized him
  chosen_spanish: lo apresaron
  alternatives_spanish:
  - lo sujetaron
  - lo tomaron preso
  lexicon: BDAG
  rationale: κρατέω aquí describe una toma firme y coercitiva en un contexto de detención. «Lo apresaron» recoge bien el sentido de arresto/aprehensión que el contexto ya hace explícito, con buen registro narrativo en español.
translation_notes:
  revision_awareness: 'El texto inglés auditado mantiene una traducción dinámica óptima: distingue entre el idiomatismo de «laid hands on him» y el acto culminante de «seized him». La versión española conserva esa distinción mediante un modismo natural («le echaron mano») seguido de un verbo de aprehensión más explícito («lo apresaron»), sin introducir notas porque no se documentó una alternativa semánticamente decisiva que requiera anclaje en el texto.'
  spanish_consistency_notes:
  - Se usa «ellos» implícito y el clítico «le/lo» conforme a la sintaxis natural del español; no se introduce «Jesús» porque el versículo lo refiere anafóricamente.
  - «Apresaron» permite mantener el matiz de arresto presente en el contexto inmediato sin cargar el verso con un tecnicismo policial excesivo.
  - No se emplea un calco como «pusieron sus manos sobre él» porque en español sonaría menos idiomático y menos cercano al valor narrativo del griego.
