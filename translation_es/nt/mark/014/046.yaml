review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: una acción narrativa seguida de una aprehensión física. «Entonces» para οἱ δὲ es adecuado. Sin embargo, «le echaron mano» en singular suena algo fijado pero menos transparente que el plural implícito del griego/inglés auditado, y el texto español omitió las notas que preservan las alternativas idiomáticas y semánticas del POB inglés.'
  spanish_quality_summary: La frase es natural y legible, pero puede mejorarse para mayor claridad e idiomaticidad panhispánica y para ajustarse mejor al doble movimiento del original. «Le echaron las manos encima» suena más claro y ampliamente comprensible que «le echaron mano», y «lo agarraron» conserva la viveza de «seized» sin reducirlo demasiado a término procesal.
  glossary_alignment: 'No hay términos del glosario mayor en juego. La decisión principal es idiomática: preservar el modismo de ἐπέβαλαν τὰς χεῖρας αὐτῷ y mantener para ἐκράτησαν αὐτόν un verbo de aprehensión física más que uno estrictamente jurídico. Conviene además conservar en notas las alternativas del audit trail inglés.'
  issues:
  - severity: medium
    issue: Faltan las notas al pie presentes en el audit trail inglés.
    rationale: 'El POB inglés conserva dos alternativas significativas: una para el modismo «laid hands on him» y otra para «seized/arrested him». Deben preservarse también en español si se revisa el texto.'
  - severity: low
    issue: «Le echaron mano» es algo menos claro y menos paralelo al plural de «hands» que otras opciones idiomáticas.
    rationale: Aunque es comprensible, puede sonar más localizado o algo más opaco para lectura eclesial amplia. «Le echaron las manos encima» expresa mejor el gesto físico hostil.
  - severity: medium
    issue: «Lo apresaron» inclina el verbo hacia un matiz más procedimental que el elegido por el POB inglés.
    rationale: El griego κρατέω aquí es aprehensión forzosa. «Lo agarraron» o «lo sujetaron» mantienen mejor la vividez de «seized him», dejando «lo arrestaron/apresaron» como nota alternativa.
  revised_spanish_text: Entonces le echaron las manos encima[a] y lo agarraron[b].
  revised_footnotes:
  - marker: a
    text: O «le pusieron las manos encima». La expresión griega es un modismo para apoderarse de alguien, a menudo con intención de arrestarlo.
    reason: lexical_alternative
  - marker: b
    text: O «lo arrestaron» o «lo apresaron».
    reason: alternative_reading
