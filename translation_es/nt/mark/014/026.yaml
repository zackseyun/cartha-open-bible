translation:
  language: es
  text: Y después de cantar un himno[a], salieron al Monte de los Olivos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «habiendo cantado». El participio griego indica una acción anterior a la salida.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: La conjunción simplemente conecta la acción siguiente en la secuencia narrativa. «Y» conserva la coordinación directa del griego sin añadir matiz interpretativo.
- source_word: ὑμνήσαντες
  english_pob_choice: after singing a hymn
  chosen_spanish: después de cantar un himno
  alternatives_spanish:
  - habiendo cantado
  - después de cantar alabanzas
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa a la salida. «Después de cantar un himno» reproduce esa anterioridad de manera natural en español y conserva el posible sentido litúrgico de ὑμνέω.
- source_word: ἐξῆλθον
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - fueron fuera
  lexicon: BDAG
  rationale: El verbo expresa la salida física normal del relato. «Salieron» es la forma más natural y fiel en español para ese valor narrativo básico.
- source_word: εἰς
  english_pob_choice: to
  chosen_spanish: al
  alternatives_spanish:
  - a
  - hacia
  lexicon: BDAG
  rationale: Con destino, εἰς se expresa idiomáticamente en español con «a»; ante artículo definido y nombre propio del lugar, la contracción «al» resulta natural.
- source_word: τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: the Mount of Olives
  chosen_spanish: Monte de los Olivos
  alternatives_spanish:
  - monte de las aceitunas
  - montaña de los olivos
  lexicon: BDAG
  rationale: Es un topónimo establecido. Aunque ὄρος puede significar «monte» o «montaña», en español bíblico y geográfico «Monte de los Olivos» es la designación habitual y precisa; el genitivo plural se refleja naturalmente con «de los Olivos».
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y ninguna revisión aplicada; por eso la versión española sigue de cerca la sintaxis narrativa simple y conserva la anterioridad del participio con una construcción natural en español.
  spanish_consistency_notes:
  - Se mantiene «Monte de los Olivos» como topónimo tradicional y transparente, evitando «Señor» u այլ sustituciones irrelevantes.
  - «Himno» preserva el sentido probable de canto de alabanza sin añadir contenido no atestado.
  - La secuencia verbal española refleja bien la relación participial anterior al verbo principal.
