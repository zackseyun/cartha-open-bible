translation:
  language: es
  text: 'Y les dijo[a]: «Esta es mi sangre del pacto[c], que es vertida[b] por muchos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos y pasajes paralelos leen: «mi sangre del nuevo pacto». El texto griego de Marcos aquí se lee mejor como «mi sangre del pacto».'
    reason: textual_variant
  - marker: b
    text: 'O: «que está siendo vertida»; tradicionalmente, «que es derramada».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a favor de muchos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτό ἐστιν
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Esto significa
  - Esto representa
  lexicon: BDAG
  rationale: La cópula directa preserva la estructura griega sin introducir una interpretación explicativa que el texto no exige. En español, «Esta es» comunica con naturalidad la identificación formulada por Jesús.
- source_word: τὸ αἷμά μου
  english_pob_choice: my blood
  chosen_spanish: mi sangre
  alternatives_spanish:
  - mi sangre derramada
  lexicon: BDAG
  rationale: Se conserva el sustantivo «sangre» para mantener la imagen sacrificial y pactal del pasaje. Añadir «derramada» aquí sería redundante porque el participio siguiente ya lo expresa.
- source_word: τῆς διαθήκης
  english_pob_choice: of the covenant
  chosen_spanish: del pacto
  alternatives_spanish:
  - del pacto nuevo
  - de la alianza
  lexicon: BDAG
  rationale: «διαθήκη» se rinde como «pacto» para reflejar el sentido contextual de pacto establecido por sangre. Se evita «nuevo» porque no está en el griego de Marcos 14:24; «alianza» es posible, pero «pacto» mantiene mejor la resonancia bíblica sin sonar extra-litúrgico.
- source_word: ἐκχυννόμενον
  english_pob_choice: which is poured out
  chosen_spanish: que es derramada
  alternatives_spanish:
  - que está siendo derramada
  - que es vertida
  lexicon: BDAG
  rationale: El participio pasivo presente se naturaliza en una oración relativa en español. «Derramada» conserva la imagen sacrificial tradicional y la fuerza de un acto dirigido sobre la sangre, sin perder la referencia literal del verbo.
- source_word: ὑπὲρ πολλῶν
  english_pob_choice: for many
  chosen_spanish: por muchos
  alternatives_spanish:
  - a favor de muchos
  - en favor de muchos
  lexicon: BDAG
  rationale: «Por muchos» reproduce con sobriedad el valor de ὑπέρ con genitivo en este contexto y mantiene el alcance verbal del dicho de Jesús sin resolver debates atonales. «A favor de» explicita más de lo que el griego dice.
theological_decisions:
- issue: Si traducir διαθήκη como «pacto» o «nuevo pacto»
  english_pob_reading: of the covenant
  chosen_spanish_reading: del pacto
  alternative_spanish_readings:
  - del nuevo pacto
  rationale: El texto griego de Marcos no incluye καινῆς ('nuevo'); por tanto, la traducción debe evitar armonizarlo con pasajes paralelos. «Del pacto» conserva la referencia bíblica al pacto de sangre sin añadir contenido ausente en el original.
  doctrine_reference: Primacía del texto original; evitar armonización intratextual no atestiguada.
- issue: Cómo reflejar ὑπὲρ πολλῶν sin resolver la extensión de la expiación
  english_pob_reading: for many
  chosen_spanish_reading: por muchos
  alternative_spanish_readings:
  - por todos
  - en favor de muchos
  rationale: «Por muchos» preserva la formulación de Jesús y no sustituye «muchos» por una universalización interpretativa. La traducción deja intacta la tensión teológica para que sea tratada en el comentario, no en el texto.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el alcance expiatorio.
- issue: Relación entre sangre y pacto en el contexto de la cena
  english_pob_reading: my blood of the covenant
  chosen_spanish_reading: mi sangre del pacto
  alternative_spanish_readings:
  - mi sangre del nuevo pacto
  - mi sangre del testamento
  rationale: «Pacto» refleja mejor el trasfondo de Éxodo 24:8 y el lenguaje de establecimiento de pacto por sangre. «Testamento» no encaja bien en este contexto ceremonial y podría oscurecer el eco veterotestamentario.
  doctrine_reference: Eco pactal veterotestamentario; sentido ceremonial de la última cena.
translation_notes:
  revision_awareness: 'Concordamos con la última revisión: no se requerían cambios. La redacción española sigue la lectura principal del griego de SBLGNT, mantiene ''pacto'' sin añadir ''nuevo'', y conserva ''muchos'' sin universalizarlo.'
  spanish_consistency_notes:
  - Se mantiene «pacto» como equivalente principal de διαθήκη en este versículo, coherente con la terminología pactal de la obra.
  - Se usa «derramada» para ἐκχυννόμενον en este contexto sacrificial, en línea con la tradición bíblica pero sin perder la alternativa literal «que está siendo derramada».
  - Se conserva «por muchos» para ὑπὲρ πολλῶν, evitando una expansión interpretativa.
  - La puntuación y comillas siguen la convención española; el marcador [a] se coloca en el discurso introductorio y [b], [c] en el segmento correspondiente.
