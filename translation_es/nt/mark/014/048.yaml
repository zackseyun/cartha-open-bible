translation:
  language: es
  text: 'Y Jesús les respondió y dijo: «¿Han salido como contra un ladrón[a], con espadas y palos, para arrestarme?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandido», «salteador» o «rebelde»; el griego λῃστής puede referirse a un asaltante violento o a un insurgente, no solo a un ladrón.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: El participio introductorio de respuesta en español suena natural como 'respondió'; conserva la fórmula narrativa sin volverla pesada. Dado que el verbo siguiente ya es 'dijo', la secuencia completa mantiene el giro idiomático griego.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - habló
  - expresó
  lexicon: BDAG
  rationale: '''Dijo'' es la forma directa y más fiel para el verbo introductorio de discurso en esta construcción con ''respondió''.'
- source_word: Ὡς ἐπὶ λῃστὴν
  english_pob_choice: as against a robber
  chosen_spanish: como contra un ladrón
  alternatives_spanish:
  - como contra un bandido
  - como si fuera un rebelde
  lexicon: BDAG
  rationale: La construcción expresa que lo trataban como a alguien contra quien se sale armado. 'Como contra' preserva el valor de ὡς ἐπί mejor que un simple 'como a'. 'Ladrón' es la opción más directa en español para λῃστής, aunque el contexto puede abarcar algo más que hurto.
- source_word: λῃστὴν
  english_pob_choice: robber
  chosen_spanish: ladrón
  alternatives_spanish:
  - bandido
  - salteador
  - rebelde
  lexicon: BDAG
  rationale: '''Ladrón'' comunica el sentido básico y es comprensible para lectores amplios. En esta escena también puede implicar un criminal violento o insurgente; esa amplitud se documenta en la nota para no forzar una sola etiqueta.'
- source_word: ἐξήλθατε
  english_pob_choice: have you come out
  chosen_spanish: salieron
  alternatives_spanish:
  - han salido
  - vinieron
  lexicon: BDAG
  rationale: 'En español, la pregunta retórica se expresa con naturalidad con un perfecto simple en contexto narrativo: ''salieron''. La referencia es al acto de salir armados hacia Jesús.'
- source_word: μετὰ μαχαιρῶν
  english_pob_choice: with swords
  chosen_spanish: con espadas
  alternatives_spanish:
  - con cuchillos
  - con dagas
  lexicon: BDAG
  rationale: '''Espadas'' es la equivalencia natural y tradicional para μάχαιραι en este contexto de arresto armado.'
- source_word: καὶ ξύλων
  english_pob_choice: and clubs
  chosen_spanish: y palos
  alternatives_spanish:
  - y garrotes
  - y bastones
  lexicon: BDAG
  rationale: ξύλα son literalmente piezas de madera o palos; 'palos' preserva mejor la materialidad del griego que 'garrotes', sin perder inteligibilidad. 'Clubs' en inglés se traduce aquí de manera más literal que funcional.
- source_word: συλλαβεῖν
  english_pob_choice: to arrest
  chosen_spanish: para prenderme
  alternatives_spanish:
  - para arrestarme
  - para apresarme
  lexicon: BDAG
  rationale: En español bíblico, 'prender' transmite bien el acto de detener/aprehender en un contexto policial o de captura. Se mantiene la primera persona 'me' explícita, como en el griego.
theological_decisions:
- issue: Alcance semántico de λῃστής en relación con Jesús
  english_pob_reading: robber in the main text, with broader 'bandit/rebel' nuance preserved in a footnote
  chosen_spanish_reading: ladrón en el texto principal, con la amplitud de bandido/salteador/rebelde preservada en una nota
  alternative_spanish_readings:
  - bandido
  - salteador
  - rebelde
  rationale: 'El pasaje no define una doctrina, pero sí una carga histórica: λῃστής puede ir más allá de ''ladrón'' y abarcar a un asaltante violento o insurgente. Mantener ''ladrón'' en el texto principal favorece la claridad, mientras la nota evita perder la tensión semántica documentada por el POB inglés.'
  doctrine_reference: Lexical transparency; translation philosophy §§1, 3, 6
- issue: Modo de traducir la construcción Ὡς ἐπὶ
  english_pob_reading: as against a robber
  chosen_spanish_reading: como contra un ladrón
  alternative_spanish_readings:
  - como si fuera un ladrón
  - como contra un bandido
  rationale: Traducir solo con 'como a' suavizaría demasiado la fuerza de la construcción. 'Como contra' conserva la idea de una expedición armada dirigida contra alguien tratado como peligroso.
  doctrine_reference: Formal correspondence with idiomatic clarity
translation_notes:
  revision_awareness: El texto sigue el pasaje griego SBLGNT y el expediente auditado del POB inglés, manteniendo la fórmula narrativa 'respondió y dijo' y conservando la amplitud semántica de λῃστής mediante una nota. No hubo revisiones aplicadas en la pasada más reciente; esta propuesta está alineada con el estado de alta concordancia reportado.
  spanish_consistency_notes:
  - Se usa 'Jesús' como forma fija del nombre propio.
  - Se evita 'SEÑOR' porque no aparece en el versículo.
  - '''Espadas'' y ''palos'' reflejan el instrumental plural del griego sin intensificar indebidamente el armamento.'
  - '''Prenderme'' mantiene el matiz de detención/captura del contexto judicial.'
  - La nota de λῃστής se ancla en 'ladrón' para preservar la tensión semántica sin sobrecargar el texto principal.
