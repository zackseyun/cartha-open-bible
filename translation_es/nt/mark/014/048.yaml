revisions:
- from: 'Y Jesús les respondió y dijo: «¿Como contra un ladrón[a] salieron con espadas y palos para prenderme?»'
  to: 'Y Jesús les respondió y dijo: «¿Han salido como contra un ladrón[a], con espadas y palos, para arrestarme?»'
  rationale: La revisión corrige el error ortográfico, mejora la naturalidad de la construcción que representa ὡς ἐπί sin abandonar su fuerza, y usa «han salido»/«arrestarme» para reflejar mejor la pregunta retórica y el contexto de detención del original y del POB inglés. La nota léxica se conserva intacta porque está bien justificada.
