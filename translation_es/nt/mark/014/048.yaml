review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: Jesús responde a la multitud que ha salido armada para capturarlo, y conserva la pregunta retórica con armas y palos. También preserva correctamente la nota sobre λῃστής. Sin embargo, hay un problema ortográfico en la interrogativa («Como» debe ser «Cómo» o, mejor aquí, una reformulación más natural), y la secuencia «como contra un ladrón» suena forzada en español aunque intenta seguir ὡς ἐπί. Conviene ajustar la redacción para mantener la fuerza del original con español más natural.'
  spanish_quality_summary: 'La frase es generalmente clara y digna, pero presenta dos detalles de calidad: 1) falta tilde en «Como»; 2) «¿Como contra un ladrón... salieron...?» resulta poco idiomático en español actual. «¿Han salido como contra un ladrón...?» preserva mejor el matiz de reproche y la correspondencia con «have you come out». También «para arrestarme» comunica con más claridad contemporánea el valor de συλλαβεῖν, aunque «prenderme» no es incorrecto.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús» está correcto. La decisión de mantener «ladrón» en el texto principal y documentar «bandido/salteador/rebelde» en nota sigue fielmente la auditoría inglesa. No intervienen términos sensibles como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: 'Ortografía y puntuación interrogativa: «Como» sin tilde'
    rationale: En una interrogativa directa debe llevar tilde si se mantiene la forma «cómo». El texto actual contiene un error visible de español estándar.
  - severity: medium
    issue: «como contra un ladrón» es poco natural en español
    rationale: Aunque intenta calcar la fuerza de ὡς ἐπί, la construcción suena rígida y extraña. Una redacción como «¿Han salido como contra un ladrón...?» o «¿Han salido ustedes contra mí como contra un ladrón...?» transmite mejor el sentido sin perder fidelidad.
  - severity: low
    issue: «salieron» puede mejorarse a «han salido»
    rationale: El perfecto compuesto reproduce bien la pregunta retórica del POB inglés («have you come out») y suena natural en registro bíblico contemporáneo panhispánico.
  - severity: low
    issue: «prenderme» es correcto pero menos transparente para lectores amplios
    rationale: «Arrestarme» comunica más claramente el contexto de detención formal indicado por συλλαβεῖν y coincide con la decisión del POB inglés.
  revised_spanish_text: 'Y Jesús les respondió y dijo: «¿Han salido como contra un ladrón[a], con espadas y palos, para arrestarme?»'
