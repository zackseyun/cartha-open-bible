translation:
  language: es
  text: 'Y cuando llegó, se le acercó enseguida y le dijo: «Rabí», y lo besó repetidamente[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo besó con insistencia»; el verbo griego es más enfático que un simple «besó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: when he came
  chosen_spanish: cuando llegó
  alternatives_spanish:
  - cuando vino
  - después de llegar
  lexicon: BDAG
  rationale: El participio aoristo se usa temporalmente. «Cuando llegó» comunica la secuencia narrativa de manera natural en español y conserva el sentido de llegada sin calcado.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Marca rapidez narrativa. «Enseguida» suena natural en español y mantiene la fuerza de inmediatez que el griego usa con frecuencia en Marcos.
- source_word: προσελθὼν αὐτῷ
  english_pob_choice: went up to him
  chosen_spanish: se le acercó
  alternatives_spanish:
  - se acercó a él
  - fue hacia él
  lexicon: BDAG
  rationale: El participio indica aproximación física a Jesús. «Se le acercó» evita redundar con «llegó» y preserva el movimiento hacia la persona designada.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte con pasado natural en español. El dativo implícito de destinatario se expresa con «le» para fluidez y claridad.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título semítico transliterado en forma usual en español bíblico. «Rabí» mantiene la textura histórica del saludo y la ironía del pasaje.
- source_word: κατεφίλησεν
  english_pob_choice: kissed him repeatedly
  chosen_spanish: lo besó repetidamente
  alternatives_spanish:
  - lo besó con insistencia
  - lo besó efusivamente
  lexicon: BDAG
  rationale: El compuesto καταφιλέω intensifica el beso simple. «Repetidamente» refleja mejor la decisión revisada del POB inglés sin añadir una carga interpretativa como «efusivamente» o «ardorosamente».
theological_decisions:
- issue: Tratamiento del saludo «Ῥαββί» dirigido a Jesús
  english_pob_reading: Rabbi
  chosen_spanish_reading: Rabí
  alternative_spanish_readings:
  - Maestro
  rationale: Se preserva el título histórico usado en la escena. Traducirlo por «Maestro» explicaría el sentido, pero perdería la forma concreta del discurso y la ironía narrativa.
  doctrine_reference: 'Translation philosophy: Translate titles; transliterate names.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que prefirió «kissed him repeatedly» frente a opciones interpretativas más intensas. Por eso el español sigue la lectura revisada y evita añadir adverbios de intensidad no explicitados por el griego.
  spanish_consistency_notes:
  - Se usa «Rabí» como transliteración del título, en coherencia con la política de preservar formas semíticas transparentes.
  - «Lo besó repetidamente» refleja la fuerza del verbo καταφιλέω sin convertirla en una interpretación emocional excesiva.
  - La puntuación reproduce el flujo narrativo de una sola oración con discurso directo breve, adecuado al registro del pasaje.
