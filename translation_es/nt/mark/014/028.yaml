review_pass:
  verdict: revise
  source_alignment_summary: El borrador transmite correctamente el contraste ('Pero'), la secuencia temporal y la promesa de ir antes que los discípulos a Galilea. Sin embargo, en ἐγερθῆναί με el griego usa una forma pasiva de 'levantar', y el inglés POB decidió conservar esa pasividad en el texto principal. El español principal 'yo haya resucitado' cambia a una formulación activa/intransitiva; aunque es comprensible y teológicamente válida, no preserva tan fielmente la elección documentada. También conviene ajustar 'delante de ustedes' a una expresión más natural para el sentido de preceder hacia un destino.
  spanish_quality_summary: El español es claro y natural, pero 'iré delante de ustedes a Galilea' suena algo rígido. 'Iré antes que ustedes a Galilea' o 'iré delante de ustedes hacia Galilea' serían más naturales; de esas, 'antes que ustedes a Galilea' expresa bien el valor de preceder. La frase temporal con subjuntivo compuesto es adecuada y digna.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La principal cuestión léxica es mantener la pasividad de ἐγερθῆναί en el texto principal, en línea con el audit trail inglés, usando 'después de que yo haya sido resucitado[a]' o una formulación equivalente. La nota puede preservar la alternativa más idiomática 'haya resucitado'.
  issues:
  - severity: medium
    issue: La voz pasiva de ἐγερθῆναί no se conserva en el texto principal.
    rationale: El source griego y la decisión inglesa enfatizan 'after I am raised'. 'Yo haya resucitado' cambia la forma a activa/intransitiva y se aparta de la racionalidad documentada, aunque la nota la mencione.
  - severity: low
    issue: '''Iré delante de ustedes a Galilea'' suena algo poco idiomático en español para expresar precedencia a un destino.'
    rationale: προάξω ὑμᾶς indica ir antes que ellos hacia el lugar. 'Iré antes que ustedes a Galilea' suena más natural en español general sin perder el sentido.
  revised_spanish_text: Pero después de que yo haya sido resucitado[a], iré antes que ustedes a Galilea.
  revised_footnotes:
  - marker: a
    text: 'O: «después de que yo haya resucitado». El griego usa un infinitivo pasivo de ἐγείρω, expresión habitual para la resurrección.'
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto principal para conservar la voz pasiva de ἐγερθῆναί, conforme al source griego y a la decisión documentada del POB inglés. También se mejora la naturalidad de προάξω con 'iré antes que ustedes', que comunica bien la idea de preceder hacia Galilea en español eclesial moderno.
