translation:
  language: es
  text: Pero después de que yo haya sido resucitado[a], iré antes que ustedes a Galilea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de que yo haya resucitado». El griego usa un infinitivo pasivo de ἐγείρω, expresión habitual para la resurrección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: La conjunción adversativa introduce contraste con la dispersión anunciada antes; 'Pero' es la equivalencia española natural y breve.
- source_word: μετὰ τὸ ἐγερθῆναί με
  english_pob_choice: after I am raised
  chosen_spanish: después de que yo haya resucitado[a]
  alternatives_spanish:
  - después de que yo haya sido resucitado
  - después de mi resurrección
  lexicon: BDAG
  rationale: La construcción temporal μετά + infinitivo articular se vierte con 'después de que'. En español, 'resucitar' comunica el valor pascual del pasivo de ἐγείρω con claridad y naturalidad; el auxiliar de subjuntivo compuesto conserva anterioridad futura.
- source_word: ἐγερθῆναί
  english_pob_choice: am raised
  chosen_spanish: haya resucitado
  alternatives_spanish:
  - haya sido resucitado
  - sea levantado
  lexicon: BDAG
  rationale: El pasivo griego en contexto de resurrección admite una voz menos marcada en español. 'Haya resucitado' mantiene el evento de resurrección sin volver rígida la frase; la alternativa pasiva se preserva en nota.
- source_word: προάξω
  english_pob_choice: I will go ahead of
  chosen_spanish: iré delante de
  alternatives_spanish:
  - iré antes que
  - os precederé
  lexicon: BDAG
  rationale: '''Iré delante de'' reproduce la idea de ir primero al frente o por delante de otros sin sonar técnico. En español es más idiomático que ''precederé'' y conserva la dirección hacia el destino.'
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - a ustedes
  lexicon: BDAG
  rationale: El plural de segunda persona se explicita con 'ustedes' para claridad en español latinoamericano; el complemento directo está implícito en la forma verbal.
- source_word: εἰς τὴν Γαλιλαίαν
  english_pob_choice: into Galilee
  chosen_spanish: a Galilea
  alternatives_spanish:
  - hacia Galilea
  - a la Galilea
  lexicon: BDAG
  rationale: Con topónimos en español, 'a' expresa naturalmente el movimiento de destino que marca εἰς. 'A Galilea' es más fluido que 'hacia Galilea' y suficiente para el matiz direccional.
theological_decisions:
- issue: Voz pasiva/resurrección en ἐγερθῆναί με
  english_pob_reading: after I am raised
  chosen_spanish_reading: después de que yo haya resucitado
  alternative_spanish_readings:
  - después de que yo haya sido resucitado
  - después de mi resurrección
  rationale: La forma griega es pasiva y pertenece al lenguaje usual de la resurrección. En español, 'resucitar' expresa de modo natural la misma realidad sin oscurecer la acción divina implícita; la opción pasiva queda como alternativa viable para lectores que prefieran marcar más explícitamente la voz.
  doctrine_reference: Affirmations; resurrección corporal de Jesús
translation_notes:
  revision_awareness: La base inglesa revisó 'raised up' a 'raised' por mayor naturalidad, pero el audit trail conserva la tensión de traducir un pasivo de resurrección; la redacción española opta por una forma idiomática equivalente que sigue dejando visible la referencia pasiva en la nota.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como término por defecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - '''Galilea'' conserva el topónimo usual en español.'
  - Se evita 'Cristo' porque el texto no lo emplea.
  - No se añade mayúscula a 'resucitado' por tratarse del verbo común, no de un título.
