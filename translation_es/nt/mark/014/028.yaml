revisions:
- from: Pero después de que yo haya resucitado[a], iré delante de ustedes a Galilea.
  to: Pero después de que yo haya sido resucitado[a], iré antes que ustedes a Galilea.
  rationale: Se ajusta el texto principal para conservar la voz pasiva de ἐγερθῆναί, conforme al source griego y a la decisión documentada del POB inglés. También se mejora la naturalidad de προάξω con 'iré antes que ustedes', que comunica bien la idea de preceder hacia Galilea en español eclesial moderno.
  reviewer_model: gpt-5.4
