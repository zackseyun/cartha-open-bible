translation:
  language: es
  text: 'Y dondequiera que entre, díganle al dueño de la casa: “El Maestro dice: ‘¿Dónde está mi cuarto de huéspedes[a] donde pueda comer la Pascua con mis discípulos?’”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “alojamiento” o “habitación”; el término griego se refiere a un lugar donde quedarse, aquí probablemente un cuarto de huéspedes en una casa privada más que una posada comercial.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν εἰσέλθῃ
  english_pob_choice: wherever he enters
  chosen_spanish: dondequiera que entre
  alternatives_spanish:
  - adondequiera que entre
  - donde sea que entre
  lexicon: BDAG
  rationale: La combinación indefinida ὅπου ἐάν + subjuntivo expresa un sentido general de “en cualquier lugar donde”. En español, “dondequiera que entre” reproduce bien esa apertura sin sonar forzado.
- source_word: εἴπατε
  english_pob_choice: say
  chosen_spanish: díganle
  alternatives_spanish:
  - digan
  - háblenle
  - díganle al
  lexicon: BDAG
  rationale: El imperativo aoristo plural dirige a los discípulos a comunicar un mensaje. “Díganle” conserva el valor directo del discurso reportado y el destinatario explícito del dativo.
- source_word: τῷ οἰκοδεσπότῃ
  english_pob_choice: master of the house
  chosen_spanish: al dueño de la casa
  alternatives_spanish:
  - al señor de la casa
  - al jefe de la casa
  - al cabeza de familia
  lexicon: BDAG
  rationale: οἰκοδεσπότης designa al responsable de la casa. “Dueño de la casa” es natural en español y comunica la autoridad doméstica; “señor” podría sonar más arcaico o ambiguo.
- source_word: Ὁ διδάσκαλος
  english_pob_choice: The Teacher
  chosen_spanish: El Maestro
  alternatives_spanish:
  - El Maestro de enseñanza
  - El Rabí
  lexicon: BDAG
  rationale: Aquí funciona como título reconocido de Jesús. En español, “Maestro” es el equivalente titular más natural y fiel; “Rabí” añadiría un matiz semítico no presente en el griego.
- source_word: κατάλυμά
  english_pob_choice: guest room
  chosen_spanish: cuarto de huéspedes
  alternatives_spanish:
  - alojamiento
  - habitación
  - pieza de huéspedes
  lexicon: BDAG
  rationale: κατάλυμα puede referirse a un lugar donde alojarse; en este contexto, el auditable POB inglés entiende un cuarto de huéspedes en una casa privada, no una posada comercial. “Cuarto de huéspedes” preserva esa lectura y evita “posada”.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: BDAG
  rationale: El posesivo está presente en el texto griego y debe conservarse. “Mi” es la forma natural en español.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de liberación
  - el Pascua
  lexicon: BDAG
  rationale: πάσχα puede referirse a la fiesta o a la comida pascual. En español, “la Pascua” es la forma más reconocible y suficientemente precisa en este contexto, sin sobreespecificar.
- source_word: μετὰ τῶν μαθητῶν μου
  english_pob_choice: with my disciples
  chosen_spanish: con mis discípulos
  alternatives_spanish:
  - con mis seguidores
  - con mis alumnos
  lexicon: BDAG
  rationale: μαθηταί en los Evangelios se traduce normalmente como “discípulos”. Mantiene el vínculo relacional y formativo sin rebajarlo a “alumnos”.
- source_word: φάγω
  english_pob_choice: I may eat
  chosen_spanish: comeré
  alternatives_spanish:
  - pueda comer
  - coma
  lexicon: BDAG
  rationale: El subjuntivo aoristo en la cláusula final puede expresar finalidad o acción contemplada; en español, una futura formulación fluida en estilo directo (“comeré”) comunica la intención sin añadir perífrasis pesada. La opción alternativa “pueda comer” también sería posible, pero aquí se prioriza naturalidad textual.
theological_decisions:
- issue: Título de Jesús en Ὁ διδάσκαλος
  english_pob_reading: The Teacher
  chosen_spanish_reading: El Maestro
  alternative_spanish_readings:
  - El Rabí
  - El Señor
  rationale: El griego presenta un título descriptivo, no una formulación doctrinal más cargada. “El Maestro” conserva la designación narrativa sin importar un título cristológico distinto ni elevarlo a una forma litúrgica no exigida por el texto.
  doctrine_reference: Translation philosophy §§1, 2, 6
- issue: Sentido de τὸ πάσχα
  english_pob_reading: the Passover
  chosen_spanish_reading: la Pascua
  alternative_spanish_readings:
  - la cena pascual
  - la fiesta de la Pascua
  rationale: El contexto permite tanto la festividad como la comida; el inglés POB mantiene “the Passover” con el matiz contextual de comida. En español, “la Pascua” conserva esa ambigüedad controlada y evita forzar una especificación que el griego no exige.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB, que unió la cláusula relativa final a “guest room” sin coma intermedia. En español se ha reflejado como una sola cláusula restrictiva: “mi cuarto de huéspedes, donde comeré...”, evitando una pausa que rompería la relación estrecha del griego.'
  spanish_consistency_notes:
  - Se mantiene “Pascua” en vez de “Pascua” capitalizada por consistencia estilística del español bíblico moderno; el artículo y el contexto bastan para identificar la fiesta.
  - Se usa “discípulos” por coherencia con el vocabulario evangélico estándar del proyecto.
  - “Maestro” se reserva aquí como título de Jesús, alineado con el valor titular del griego.
  - El marcador [a] aparece en el texto exactamente donde se desarrolla la alternativa léxica de κατάλυμα.
