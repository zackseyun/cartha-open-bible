review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura general del griego: cláusula indefinida de lugar, mandato a los discípulos, destinatario doméstico, título de Jesús, posesivo ''mi'', y referencia a la Pascua con sus discípulos. Sin embargo, no preserva bien el matiz de φάγω, que en el POB inglés se documentó como subjuntivo de acción contemplada (''where I may eat''), no como futuro simple. Además, ''el Pascua'' en el texto español es incorrecto; debe ser ''la Pascua''.'
  spanish_quality_summary: 'El texto es generalmente legible, pero presenta varios problemas de calidad: el corchete ''[n]'' en ''entre[n]'' es ajeno al texto bíblico final; ''comeré la Pascua'' suena menos fiel al matiz buscado y menos natural que ''pueda comer la Pascua''; y ''cuarto de huéspedes'' es comprensible, aunque ''habitación de huéspedes'' o ''cuarto de huéspedes'' ambas funcionan. La puntuación puede mantenerse sin coma antes de la cláusula restrictiva, en línea con la revisión inglesa.'
  glossary_alignment: 'No hay conflicto con la glosa principal del proyecto. ''El Maestro'' para Ὁ διδάσκαλος está bien justificado. ''La Pascua'' alinea con πάσχα. La nota léxica sobre κατάλυμα está bien orientada. La principal desviación es verbal: φάγω no debe aplanarse a futuro indicativo.'
  issues:
  - severity: medium
    issue: Uso de 'comeré' para φάγω
    rationale: El expediente inglés documenta explícitamente 'I may eat' para preservar el subjuntivo aoristo en una cláusula de propósito o acción contemplada. 'Comeré' convierte la búsqueda de un lugar adecuado en mera afirmación futura.
  - severity: high
    issue: Forma incorrecta 'el Pascua' en el texto
    rationale: En español estándar es 'la Pascua'. La forma actual es un error gramatical claro en el texto principal.
  - severity: low
    issue: Marcado editorial 'entre[n]' en el texto final
    rationale: Ese corchete parece nota de edición o inseguridad redaccional, no forma parte de una traducción final publicable. Debe quedar simplemente 'entre'.
  revised_spanish_text: 'Y dondequiera que entre, díganle al dueño de la casa: “El Maestro dice: ‘¿Dónde está mi cuarto de huéspedes[a] donde pueda comer la Pascua con mis discípulos?’”'
  revised_footnotes:
