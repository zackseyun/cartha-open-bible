translation:
  language: es
  text: 'Y el primer día de los panes sin levadura[a], cuando estaban sacrificando el cordero de la Pascua, sus discípulos le dijeron: «¿Dónde quieres que vayamos y preparemos, para que comas la Pascua?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuando sacrificaban la Pascua». El griego dice «la Pascua», que en este contexto probablemente se refiere al cordero pascual que era sacrificado.
    reason: alternative_reading
lexical_decisions:
- source_word: τῇ πρώτῃ ἡμέρᾳ τῶν ἀζύμων
  english_pob_choice: on the first day of Unleavened Bread
  chosen_spanish: en el primer día de los Panes sin levadura
  alternatives_spanish:
  - en el primer día de la fiesta de los Panes sin levadura
  - en el primer día de los panes sin levadura
  lexicon: BDAG
  rationale: La expresión griega designa el primer día de la festividad asociada con los panes sin levadura. «Panes sin levadura» mantiene el sentido festivo sin añadir explícitamente «fiesta» al texto principal, mientras que la mayúscula no es necesaria en español.
- source_word: ὅτε τὸ πάσχα ἔθυον
  english_pob_choice: when they were sacrificing the Passover lamb
  chosen_spanish: cuando estaban sacrificando el cordero de la Pascua
  alternatives_spanish:
  - cuando sacrificaban la Pascua
  - cuando se sacrificaba la Pascua
  lexicon: BDAG
  rationale: Con θύω, πάσχα se refiere aquí al animal sacrificado. En español, «cordero de la Pascua» hace explícita esa referencia cultual y conserva la tensión lexical señalada por el POB en inglés.
- source_word: λέγουσιν
  english_pob_choice: said
  chosen_spanish: le dijeron
  alternatives_spanish:
  - le dicen
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente al pasado narrativo en español, siguiendo el ritmo fluido del relato.
- source_word: Ποῦ θέλεις
  english_pob_choice: Where do you want
  chosen_spanish: ¿Dónde quieres
  alternatives_spanish:
  - ¿Dónde deseas
  - ¿Dónde estás dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa deseo o intención; «quieres» es la equivalencia más natural y directa en español moderno.
- source_word: ἀπελθόντες ἑτοιμάσωμεν
  english_pob_choice: us to go and prepare
  chosen_spanish: que vayamos y preparemos
  alternatives_spanish:
  - que vayamos para preparar
  - que nos vayamos y preparemos
  lexicon: BDAG
  rationale: El participio ἀπελθόντες queda bien integrado en una construcción verbal española natural con dos verbos coordinados. Así se preserva el sentido de desplazamiento + preparación sin forzar una traducción mecánica.
- source_word: ἵνα φάγῃς τὸ πάσχα
  english_pob_choice: so that you may eat the Passover
  chosen_spanish: para que comas la Pascua
  alternatives_spanish:
  - a fin de que comas la Pascua
  - para que participes de la Pascua
  lexicon: BDAG
  rationale: ἵνα expresa propósito. Aquí πάσχα apunta al banquete pascual, por lo que «la Pascua» es suficiente y más natural en español que repetir «cordero» en esta cláusula.
theological_decisions:
- issue: Doble referencia de πάσχα en el versículo
  english_pob_reading: First occurrence rendered as 'Passover lamb' in the sacrificial clause; second occurrence rendered as 'the Passover' for the meal.
  chosen_spanish_reading: La primera ocurrencia se entiende como el animal sacrificado («el cordero de la Pascua»), y la segunda como la comida/celebración pascual («la Pascua»).
  alternative_spanish_readings:
  - Traducir ambas veces simplemente como «la Pascua»
  - Traducir ambas veces como «el cordero de la Pascua»
  rationale: 'El contexto verbal determina el matiz: con θύω se trata del sacrificio; con φάγῃς, del acto de comer. Mantener esa diferencia en español preserva la precisión cultual del relato.'
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto principal junto al sintagma correspondiente.
  spanish_consistency_notes:
  - Se usa «Pascua» para πάσχα en la cláusula final, conforme al contexto de comida/celebración.
  - Se mantiene «cordero de la Pascua» en la cláusula sacrificial para reflejar la tensión lexical documentada por el POB inglés.
  - El estilo general es bíblico pero natural para lectores de español latinoamericano, evitando calcos innecesarios.
