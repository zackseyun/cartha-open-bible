  to: 'Y el primer día de los panes sin levadura[a], cuando estaban sacrificando el cordero de la Pascua, sus discípulos le dijeron: «¿Dónde quieres que vayamos y preparemos, para que comas la Pascua?»'
  rationale: Se ajusta la expresión temporal a un español más natural («el primer día» en vez de «en el primer día») y se normaliza la capitalización de «panes sin levadura». El resto del versículo preserva bien el sentido del griego y las decisiones léxicas/auditadas del POB en inglés.
