    issue: 'Calco poco natural: «en el primer día»'
    rationale: Aunque comprensible, reproduce demasiado de cerca la preposición inglesa/gramatical y no es la formulación española más natural para una referencia temporal. «El primer día» o «en el primer día de la fiesta» serían mejores; dado que «fiesta» no está explícito, «el primer día de los panes sin levadura» preserva mejor el alcance del griego.
  - severity: low
    issue: Mayúscula innecesaria en «Panes sin levadura»
    rationale: 'En español general y bíblico moderno, la expresión se lee con mayor naturalidad en minúscula: «panes sin levadura». No afecta el sentido, pero mejora estilo y convenciones ortográficas.'
