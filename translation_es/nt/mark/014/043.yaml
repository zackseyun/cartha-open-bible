  text: Καὶ ⸀εὐθὺς ἔτι αὐτοῦ λαλοῦντος παραγίνεται ⸀Ἰούδας ⸀εἷς τῶν δώδεκα καὶ μετ’ αὐτοῦ ⸀ὄχλος μετὰ μαχαιρῶν καὶ ξύλων παρὰ τῶν ἀρχιερέων καὶ τῶν γραμματέων καὶ τῶν πρεσβυτέρων.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/043.yaml
  text: And immediately[a], while he was still speaking, Judas arrived, one of the Twelve, and with him a crowd with swords and clubs[d][c][b], from the chief priests and the scribes and the elders.
  footnotes:
  - marker: a
    text: Or 'came' for 'arrived'; the Greek uses a historical present ('comes') for vividness.
    reason: lexical_alternative
  - marker: b
    text: Or 'mob' for 'crowd'; the Greek word itself means 'crowd,' though the context is hostile.
    reason: lexical_alternative
  - marker: c
    text: Literally 'wood'; here it refers to clubs or cudgels used as weapons.
    reason: lexical_alternative
  - marker: d
    text: Or 'sent by'; the Greek more literally says the crowd came 'from' the chief priests, scribes, and elders, indicating source or authorization.
    reason: alternative_reading
