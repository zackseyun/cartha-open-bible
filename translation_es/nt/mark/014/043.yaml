translation:
  language: es
  text: Y enseguida[a], mientras todavía estaba hablando, llegó Judas, uno de los Doce, y con él una multitud[b] con espadas y garrotes[c], de parte de[d] los principales sacerdotes, los escribas y los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vino' para 'llegó'; el griego usa un presente histórico para dar viveza a la narración.
    reason: lexical_alternative
  - marker: b
    text: O 'turba' para 'multitud'; el término griego significa 'multitud', aunque el contexto es hostil.
    reason: lexical_alternative
  - marker: c
    text: Literalmente 'madera'; aquí se refiere a garrotes o palos usados como armas.
    reason: lexical_alternative
  - marker: d
    text: O 'enviado por'; el griego dice más literalmente que la multitud vino 'de parte de' las autoridades, indicando origen o autorización.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Conserva la rapidez súbita del adverbio en un español natural y digno. 'Enseguida' comunica bien la urgencia narrativa de Marcos sin sonar tan abstracto como 'inmediatamente'.
- source_word: ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: while he was still speaking
  chosen_spanish: mientras todavía estaba hablando
  alternatives_spanish:
  - mientras seguía hablando
  - cuando aún hablaba
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa simultaneidad. 'Todavía' mantiene el valor de ἔτι, y 'estaba hablando' suena más fluido en español contemporáneo que una forma más literal como 'aún hablaba'.
- source_word: παραγίνεται
  english_pob_choice: arrived
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - apareció
  - arribó
  lexicon: BDAG
  rationale: El presente histórico griego puede verterse en pretérito para una narración natural en español. 'Llegó' comunica la irrupción en la escena sin añadir matices no presentes en el verbo.
- source_word: Ἰούδας
  english_pob_choice: Judas
  chosen_spanish: Judas
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar.
- source_word: εἷς τῶν δώδεκα
  english_pob_choice: one of the Twelve
  chosen_spanish: uno de los Doce
  alternatives_spanish:
  - uno de los doce discípulos
  lexicon: BDAG
  rationale: Se conserva la designación compacta casi titulada 'los Doce'. Añadir 'discípulos' sería explicativo e iría más allá del texto.
- source_word: ὄχλος
  english_pob_choice: a crowd
  chosen_spanish: una multitud
  alternatives_spanish:
  - una muchedumbre
  - una turba
  lexicon: BDAG
  rationale: El término básico es 'multitud'/'crowd'. Elegí 'multitud' por su naturalidad en español bíblico; 'turba' o 'muchedumbre' cargarían más negativamente el término de lo que exige la palabra sola.
- source_word: ξύλων
  english_pob_choice: clubs
  chosen_spanish: garrotes
  alternatives_spanish:
  - palos
  - cachiporras
  - bastones
  lexicon: BDAG
  rationale: ξύλον es literalmente 'madera', pero aquí designa un arma de madera. 'Garrotes' expresa el sentido contextual de arma contundente con mayor precisión que 'palos'.
- source_word: παρὰ τῶν ἀρχιερέων καὶ τῶν γραμματέων καὶ τῶν πρεσβυτέρων
  english_pob_choice: from the chief priests and the scribes and the elders
  chosen_spanish: de parte de los principales sacerdotes, los escribas y los ancianos
  alternatives_spanish:
  - procedente de los principales sacerdotes, los escribas y los ancianos
  - enviado por los principales sacerdotes, los escribas y los ancianos
  lexicon: BDAG
  rationale: La preposición con genitivo indica procedencia o respaldo/autoridad. 'De parte de' preserva esa relación institucional sin convertirla en un explícito 'enviado por', que sería más interpretativo. 'Principales sacerdotes' refleja bien ἀρχιερεῖς como liderazgo sacerdotal plural.
- source_word: ἀρχιερέων
  english_pob_choice: chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  lexicon: BDAG
  rationale: Aunque 'sumos sacerdotes' es posible, 'principales sacerdotes' evita sugerir un único cargo supremo y mantiene el valor plural institucional del término en los Evangelios.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los doctores de la ley
  - los maestros de la ley
  lexicon: BDAG
  rationale: '''Escribas'' es la equivalencia directa y tradicionalmente adecuada al término griego, sin expansión interpretativa.'
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los líderes
  - los presbíteros
  lexicon: BDAG
  rationale: '''Ancianos'' preserva el sentido de líderes respetados del pueblo dentro del marco institucional judío; ''presbíteros'' sonaría más técnico e intratextual en español moderno.'
theological_decisions:
- issue: Sentido de παρὰ con autoridad institucional
  english_pob_reading: from the chief priests and the scribes and the elders
  chosen_spanish_reading: de parte de los principales sacerdotes, los escribas y los ancianos
  alternative_spanish_readings:
  - enviado por los principales sacerdotes, los escribas y los ancianos
  - procedente de los principales sacerdotes, los escribas y los ancianos
  rationale: El griego señala origen/respaldo desde esas autoridades, pero no especifica mecánicamente que ellas emitieran una orden explícita en la frase. 'De parte de' conserva la vinculación y la posible autorización sin sobretraducir el texto.
  doctrine_reference: Principio de equivalencia óptima y de no añadir detalles no expresados por el texto fuente.
- issue: Presente histórico de παραγίνεται
  english_pob_reading: arrived
  chosen_spanish_reading: llegó
  alternative_spanish_readings:
  - viene
  - arriba
  rationale: El presente histórico aporta viveza narrativa, pero en español un pretérito simple reproduce mejor el avance del relato sin perder contenido semántico. Es una decisión estilística, no doctrinal.
  doctrine_reference: Principio de legibilidad narrativa fiel al valor aspectual y discursivo del original.
translation_notes:
  revision_awareness: Se revisó el contexto auditado en inglés y no se aplicaron cambios sustanciales adicionales respecto del sentido original; la redacción española busca equivalencia óptima, manteniendo la urgencia de εὐθὺς, el valor simultáneo del genitivo absoluto y la relación de autoridad implícita en παρά.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' únicamente cuando el texto lo requiera; aquí no aparece.
  - Se usó 'los Doce' como designación estable para εἷς τῶν δώδεκα, sin expansión a 'discípulos'.
  - '''Escribas'' y ''ancianos'' conservan el registro institucional judío del pasaje.'
  - Se prefirió 'de parte de' para la procedencia/autorización sin convertirla en una explicitación excesiva de envío.
