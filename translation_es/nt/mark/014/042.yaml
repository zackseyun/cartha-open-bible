- from: Levántense; vámonos. Miren[a], el que me está entregando ha llegado cerca.
  to: Levántense; vámonos. Miren[a], el que me entrega se ha acercado.
  rationale: Se corrige una expresión no idiomática («ha llegado cerca») por «se ha acercado», que transmite naturalmente el valor de ἤγγικεν. Se simplifica «me está entregando» a «me entrega» para reflejar mejor el participio sustantivado sin añadir progresividad. Se rehace la nota para que preserve la alternativa contextual documentada por el POB en vez de duplicar el texto principal.
