translation:
  language: es
  text: Levántense; vámonos. Miren[a], el que me entrega se ha acercado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, contextualmente, «el que me traiciona se ha acercado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγείρεσθε
  english_pob_choice: Get up
  chosen_spanish: Levántense
  alternatives_spanish:
  - Pónganse de pie
  - Levántense de una vez
  - Despiértense
  lexicon: BDAG
  rationale: Es un imperativo plural dirigido a los discípulos para ponerse en acción. "Levántense" comunica bien la urgencia y la acción física inmediata en español sin sonar forzado ni sugerir solo despertar del sueño.
- source_word: ἄγωμεν
  english_pob_choice: let us go
  chosen_spanish: vámonos
  alternatives_spanish:
  - vamos
  - partamos
  - sigamos
  lexicon: BDAG
  rationale: La forma hortatoria de primera plural se expresa de manera natural en español con "vámonos". Conserva la invitación a iniciar el movimiento, como en el inglés POB.
- source_word: ἰδού
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - Observen
  lexicon: BDAG
  rationale: La interjección deíctica llama la atención sobre lo que sigue. "Miren" es una equivalencia directa, natural y reverente en español actual.
- source_word: ὁ παραδιδούς
  english_pob_choice: the one betraying
  chosen_spanish: el que me está entregando
  alternatives_spanish:
  - el que me traiciona
  - el que me entrega
  - mi traidor
  lexicon: BDAG
  rationale: En el contexto de la pasión, el POB inglés mantiene la fuerza participial con "the one betraying" pero documenta la alternativa más literal "handing over". En español, "entregar" conserva mejor la relación con παραδίδωμι y evita imponer de entrada el matiz moral de "traicionar"; la perífrasis "me está entregando" mantiene el participio como acción en curso.
- source_word: ἤγγικεν
  english_pob_choice: has come near
  chosen_spanish: ha llegado cerca
  alternatives_spanish:
  - está cerca
  - se ha acercado
  - ha venido cerca
  lexicon: BDAG
  rationale: El perfecto de ἐγγίζω expresa una cercanía ya alcanzada con relevancia presente. "Ha llegado cerca" reproduce esa idea sin borrar el matiz de proceso/completud que el inglés POB quiso preservar con "has come near".
theological_decisions:
- issue: παραδίδωμι en el contexto de la pasión
  english_pob_reading: betraying / handing over
  chosen_spanish_reading: entregar / el que me está entregando
  alternative_spanish_readings:
  - traicionar / el que me traiciona
  - entregarme
  - ponerme en manos de
  rationale: 'Se preserva la tensión lexical documentada: el griego puede leerse con el peso narrativo de "entregar" y, en el contexto de Judas, también con la resonancia moral de "traicionar". La traducción principal conserva el verbo más cercano al sentido básico y deja abierta la interpretación contextual sin resolverla artificialmente.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El contexto auditado muestra alto acuerdo y sin cambios en la última revisión; no se reportan revisiones aplicadas. La redacción española sigue la decisión inglesa de preservar la fuerza participial de παραδιδούς y el valor perfectivo de ἤγγικεν.
  spanish_consistency_notes:
  - Se usa "Yahvé" en el proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene "entregar" como equivalente base de παραδίδωμι en vez de sustituirlo automáticamente por "traicionar"; la nota conserva la alternativa documentada.
  - La puntuación breve con punto y coma refleja dos mandatos seguidos por una llamada de atención y la cláusula final.
