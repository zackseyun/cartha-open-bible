translation:
  language: es
  text: 'Pero él seguía insistiendo todavía más[a]: «Si tengo que morir contigo[b], ciertamente no te negaré[c]». Y todos decían lo mismo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «insistía con mayor vehemencia».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «morir juntamente contigo».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «nunca te negaré». El griego usa una negación muy fuerte.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπερισσῶς
  english_pob_choice: all the more
  chosen_spanish: mucho más
  alternatives_spanish:
  - todavía más
  - cada vez más
  - con mayor insistencia
  lexicon: BDAG
  rationale: El adverbio intensifica la manera de hablar de Pedro. «Mucho más» conserva la idea de aumento e insistencia sin volver la frase pesada en español. La nota permite recordar la alternativa más explicativa de la POB inglesa.
- source_word: ἐλάλει
  english_pob_choice: kept insisting
  chosen_spanish: seguía insistiendo
  alternatives_spanish:
  - seguía hablando
  - seguía diciendo
  - insistía
  lexicon: BDAG
  rationale: El imperfecto marca acción continuada o repetida. En este contexto no basta «decía»; «seguía insistiendo» comunica mejor la repetición y la fuerza del reclamo.
- source_word: Ἐὰν δέῃ με
  english_pob_choice: If I must
  chosen_spanish: Si tengo que
  alternatives_spanish:
  - Si debo
  - Si fuera necesario que yo
  - Si me toca
  lexicon: BDAG
  rationale: δέῃ expresa necesidad o compulsión. «Si tengo que» es natural en español y preserva la obligación implícita sin suavizarla.
- source_word: συναποθανεῖν σοι
  english_pob_choice: die together with you
  chosen_spanish: morir contigo
  alternatives_spanish:
  - morir junto contigo
  - morir con usted
  - morir contigo mismo
  lexicon: BDAG
  rationale: El compuesto subraya morir junto con otra persona. «Morir contigo» es idiomático en español y, en este contexto, comunica la solidaridad personal; la nota conserva la lectura más literal «morir juntos».
- source_word: οὐ μή σε ἀπαρνήσομαι
  english_pob_choice: I will certainly not deny you
  chosen_spanish: ciertamente no te negaré
  alternatives_spanish:
  - nunca te negaré
  - de ningún modo te negaré
  - no te negaré en absoluto
  lexicon: BDAG
  rationale: οὐ μή expresa una negación enfática. «Ciertamente no» preserva el tono fuerte sin sonar arcaico. «Negar» mantiene el uso narrativo de la negación de Jesús por Pedro.
- source_word: ὡσαύτως
  english_pob_choice: the same thing
  chosen_spanish: lo mismo
  alternatives_spanish:
  - de la misma manera
  - igualmente
  - esas mismas palabras
  lexicon: BDAG
  rationale: Aquí la referencia es al contenido de lo que decían los discípulos, no solo a la manera. «Lo mismo» lo hace claro y natural en español.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - los doce
  - cada uno
  lexicon: BDAG
  rationale: El sujeto ya está claro en el contexto narrativo. «Todos» es la forma más directa y fluida.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - estaban diciendo
  - venían diciendo
  lexicon: BDAG
  rationale: El imperfecto indica reiteración o continuidad. En español, «decían» puede abarcar ese valor sin recargar la frase; el contexto ya sugiere la repetición.
theological_decisions:
- issue: Fuerza de la negación de Pedro
  english_pob_reading: Rendered οὐ μή with emphatic future as 'I will certainly not deny you'
  chosen_spanish_reading: «ciertamente no te negaré»
  alternative_spanish_readings:
  - «nunca te negaré»
  - «de ningún modo te negaré»
  - «no te negaré»
  rationale: La escena depende de la seguridad exagerada de Pedro antes de su caída. «Ciertamente no» conserva el énfasis de οὐ μή sin convertirlo en una paráfrasis interpretativa. Se mantiene la tensión narrativa para que el contraste posterior siga siendo evidente.
  doctrine_reference: Preservar la tensión narrativa sin atenuar la afirmación enfática del hablante.
translation_notes:
  revision_awareness: 'Se siguió el auditable sentido del griego SBLGNT y el tratamiento inglés de la POB: intensificación de ἐκπερισσῶς, imperfecto continuo en ἐλάλει y ἔλεγον, necesidad en δέῃ, compuesto solidario en συναποθανεῖν, y negación enfática en οὐ μή. No se introdujeron lecturas alternativas no atestiguadas; solo se expresaron en español las alternativas documentadas por la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» y «Dios/Yahvé» según norma general del proyecto; este versículo no los contiene.
  - Se usa «negar» para ἀπαρνέομαι, coherente con el lenguaje narrativo del pasaje.
  - Se eligió «mucho más» en el texto principal y se dejó la vehemencia en nota para no sobrecargar la línea principal.
  - Los pronombres enclíticos y el orden verbal se ajustaron a español natural sin perder el énfasis del griego.
