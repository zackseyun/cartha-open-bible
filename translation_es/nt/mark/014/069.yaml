translation:
  language: es
  text: 'Y la sirvienta, al verlo, comenzó otra vez a decir a los que estaban cerca[a]: «Este hombre es uno de ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los presentes» para τοῖς παρεστῶσιν.
    reason: lexical_alternative
lexical_decisions:
- source_word: παιδίσκη
  english_pob_choice: servant girl
  chosen_spanish: muchacha
  alternatives_spanish:
  - sirvienta
  - esclava
  - criada
  lexicon: BDAG
  rationale: El término griego puede referirse a una joven sirvienta o criada. En español, «muchacha» comunica la referencia a una joven mujer en escena sin cargar innecesariamente la relación jurídica de esclavitud, que no es el foco narrativo inmediato. «Sirvienta» y «criada» son posibles, pero «muchacha» resulta más natural y menos marcadamente regional; «esclava» sería demasiado fuerte para el énfasis de este versículo.
- source_word: ἰδοῦσα
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - habiéndolo visto
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural en español con una construcción circunstancial breve. «Al verlo» conserva la secuencia narrativa y la relación de causa inmediata sin sonar rígido.
- source_word: ἤρξατο πάλιν λέγειν
  english_pob_choice: began again to say
  chosen_spanish: comenzó otra vez a decir
  alternatives_spanish:
  - volvió a decir
  - empezó de nuevo a decir
  lexicon: BDAG
  rationale: La combinación verbal debe conservar tanto el inicio de la acción como la repetición marcada por πάλιν. «Comenzó otra vez a decir» mantiene ambos matices con claridad y estilo bíblico moderno. «Volvió a decir» es más breve, pero pierde algo del valor ingrésivo de ἤρξατο.
- source_word: τοῖς παρεστῶσιν
  english_pob_choice: to those standing nearby
  chosen_spanish: a los que estaban cerca
  alternatives_spanish:
  - a los presentes
  - a los que estaban allí
  lexicon: BDAG
  rationale: El participio describe a personas que estaban presentes y al alcance inmediato de la situación. «A los que estaban cerca» reproduce la cercanía espacial del contexto sin forzar una traducción técnica como «bystanders».
- source_word: Οὗτος
  english_pob_choice: This man
  chosen_spanish: Este hombre
  alternatives_spanish:
  - Este
  - Este sujeto
  lexicon: BDAG
  rationale: El demostrativo apunta directamente a Jesús/Pedro en la acusación. En español, añadir «hombre» evita la ambigüedad de «este» a secas y reproduce bien la referencia personal del inglés POB sin introducir un matiz despectivo innecesario.
- source_word: ἐξ αὐτῶν
  english_pob_choice: is one of them
  chosen_spanish: es uno de ellos
  alternatives_spanish:
  - es de ellos
  - pertenece a ellos
  lexicon: BDAG
  rationale: La frase idiomática indica pertenencia al grupo. «Es uno de ellos» es la equivalencia natural en español y conserva la fuerza de identificación grupal del griego.
translation_notes:
  revision_awareness: El pasaje coincide con el texto griego SBLGNT y con la lectura auditada en inglés; no se observan revisiones aplicadas en el registro base, y la versión española preserva el mismo flujo narrativo y la misma relación entre el participio inicial, la repetición de la acción y la identificación grupal final.
  spanish_consistency_notes:
  - Se mantiene la forma directa y narrativa del versículo sin añadir glosas interpretativas.
  - «Y» al inicio refleja la continuidad con el contexto anterior.
  - Se evitó «SEÑOR» o lenguaje eclesiástico no pertinente, ya que el versículo no contiene léxico divino.
  - La nota al pie cubre una alternativa natural para τοῖς παρεστῶσιν sin multiplicar variantes innecesarias.
