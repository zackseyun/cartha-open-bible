translation:
  language: es
  text: Y llevaron a Jesús ante el sumo sacerdote, y se reunieron[a] todos los principales sacerdotes, los ancianos y los escribas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «se reúnen», presente histórico, una forma vívida dentro de una narración en pasado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπήγαγον
  english_pob_choice: led ... away
  chosen_spanish: llevaron
  alternatives_spanish:
  - se llevaron
  - condujeron
  lexicon: BDAG
  rationale: El verbo ἀπάγω indica llevar o conducir aparte. En español, «llevaron a Jesús» comunica bien el traslado bajo custodia; en este contexto, el complemento «ante el sumo sacerdote» ya aporta la dirección del movimiento, por lo que no conviene sobrecargar con una perífrasis más pesada.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: Lema propio del nombre
  rationale: El nombre propio se traduce de forma directa y estable como «Jesús».
- source_word: ἀρχιερέα
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el principal sacerdote
  - el sumo pontífice
  lexicon: BDAG
  rationale: Ἀρχιερεύς en singular designa al funcionario principal, no al grupo. «Sumo sacerdote» es la forma natural y fiel en español bíblico contemporáneo, y preserva con claridad la referencia al cargo singular.
- source_word: συνέρχονται
  english_pob_choice: gathered together
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se juntan
  - se congregan
  lexicon: BDAG
  rationale: El griego usa presente histórico dentro de la narración. En español, un presente narrativo («se reúnen») conserva mejor esa vivacidad que un pasado llano, sin alterar el sentido del evento. También mantiene el matiz de reunión deliberada del liderazgo.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los
  - la totalidad de
  lexicon: BDAG
  rationale: «Todos» reproduce de forma directa el énfasis en la totalidad de los grupos reunidos.
- source_word: ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los sumos sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  lexicon: BDAG
  rationale: En plural, ἀρχιερεῖς se refiere al grupo sacerdotal de alto rango. «Sumos sacerdotes» es transparente en español y mantiene el vínculo léxico con el singular «sumo sacerdote» ya mencionado.
- source_word: πρεσβύτεροι
  english_pob_choice: the elders
  chosen_spanish: los ancianos
  alternatives_spanish:
  - los mayores
  - los líderes
  lexicon: BDAG
  rationale: En este contexto institucional, πρεσβύτεροι señala a los dirigentes del pueblo. «Ancianos» es la equivalencia bíblica habitual y precisa, sin reducirlo a edad biológica.
- source_word: γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los escribas de la ley
  - los maestros de la ley
  lexicon: BDAG
  rationale: γραμματεῖς denota escribas; «escribas» conserva la designación histórica del grupo y evita añadir una interpretación más estrecha que el término griego no exige.
theological_decisions:
- issue: Presente histórico en συνέρχονται
  english_pob_reading: 'Rendered with English past tense: ''gathered together'''
  chosen_spanish_reading: 'Se conserva con presente narrativo: «se reúnen»'
  alternative_spanish_readings:
  - «se reunieron»
  - «se juntaron»
  rationale: La decisión afecta al ritmo narrativo más que a una cuestión doctrinal. En español, el presente histórico comunica la vivacidad del griego y mantiene el efecto literario sin oscurecer el contenido teológico del episodio.
  doctrine_reference: Translación narrativa; no implica diferencia doctrinal
- issue: Título singular ἀρχιερέα frente al plural ἀρχιερεῖς
  english_pob_reading: '''to the high priest'' / ''the chief priests'''
  chosen_spanish_reading: «al sumo sacerdote» / «los sumos sacerdotes»
  alternative_spanish_readings:
  - «al principal sacerdote» / «los principales sacerdotes»
  rationale: Conviene distinguir claramente entre el funcionario singular y el grupo dirigente plural. Mantener «sumo sacerdote» y «sumos sacerdotes» evita confusión y respeta la estructura del griego.
  doctrine_reference: Precisión institucional del texto evangélico
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y toma como guía el audit trail en inglés, pero ajusta la narración al español natural. Se conserva la diferencia entre el singular ἀρχιερέα y el plural ἀρχιερεῖς, y se refleja el presente histórico de συνέρχονται mediante presente narrativo en español.
  spanish_consistency_notes:
  - Se usa «Jesús» como nombre propio estándar.
  - Se mantiene «sumo sacerdote» para el singular y «sumos sacerdotes» para el plural, evitando una mezcla con «principales sacerdotes».
  - «Escribas» se conserva como término técnico bíblico.
  - «Ancianos» traduce πρεσβύτεροι en sentido de liderazgo, no de edad biológica.
