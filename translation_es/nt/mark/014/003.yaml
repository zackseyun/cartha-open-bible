revisions:
- from: Y estando él en Betania, en casa de Simón el leproso, sentado a la mesa, vino una mujer con un alabastro[a] de perfume[b] de nardo genuino[c], muy costoso; y quebró el alabastro y lo derramó sobre su cabeza.
  to: Y mientras él estaba en Betania, recostado a la mesa en casa de Simón el leproso, vino una mujer con un frasco de alabastro de perfume de nardo puro[a], muy costoso; rompió el frasco y lo derramó sobre su cabeza.
  rationale: Se ajusta el participio κατακειμένου a 'recostado a la mesa' para preservar la imagen de la comida reclinada; se reemplaza 'un alabastro' por 'un frasco de alabastro' para claridad natural en español sin perder el referente del original; y se alinea πιστικῆς con la decisión principal auditada ('puro'), manteniendo en nota la alternativa 'genuino'. Las demás decisiones centrales del borrador se conservan.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:44:17Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena, mantiene ''Simón el leproso'' correctamente y conserva la secuencia de romper y derramar. Sin embargo, hay dos desajustes relevantes con el griego y con el rastro de auditoría inglés: κατακειμένου αὐτοῦ se refiere a estar reclinado/a la mesa, no simplemente ''sentado a la mesa''; y el texto principal inglés eligió ''pure nard'', mientras que el español principal cambió a ''genuino'', dejando de seguir la decisión base sin necesidad. Además, ''un alabastro'' en español suena opaco; el griego se refiere al recipiente, y en español conviene explicitarlo en el texto.'
  spanish_quality_summary: El español es legible, pero 'un alabastro' y 'quebró el alabastro' resultan poco naturales para lectores contemporáneos. 'Recostado a la mesa' o 'reclinado a la mesa' comunica mejor el contexto de comida antigua que 'sentado a la mesa'. 'Frasco de alabastro' ofrece claridad sin paráfrasis excesiva.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La principal cuestión léxica es alinear πιστικῆς con la decisión auditada 'pure', que en español se expresa mejor como 'puro', manteniendo nota con alternativa 'genuino'.
  issues:
  - severity: medium
    issue: '''sentado a la mesa'' no refleja con precisión κατακειμένου'
    rationale: El participio describe la postura de reclinarse en la comida; 'sentado' neutraliza un matiz contextual preservado por el inglés POB ('reclining').
  - severity: medium
    issue: '''genuino'' en el texto principal se aparta de la decisión auditada ''pure'''
    rationale: Aunque la nota reconoce el debate de πιστικῆς, el inglés POB fijó 'pure' como elección principal. El español debería seguir esa decisión salvo razón fuerte, que aquí no se documenta.
  - severity: medium
    issue: '''un alabastro'' / ''quebró el alabastro'' suena antinatural en español'
    rationale: En español moderno eclesial, 'alabastro' nombra ante todo el material. El referente contextual es el recipiente; 'frasco de alabastro' comunica fielmente ἀλάβαστρον.
  revised_spanish_text: Y mientras él estaba en Betania, recostado a la mesa en casa de Simón el leproso, vino una mujer con un frasco de alabastro de perfume de nardo puro[a], muy costoso; rompió el frasco y lo derramó sobre su cabeza.
  revised_footnotes:
  - marker: a
    text: O «nardo genuino». El adjetivo griego πιστικῆς es debatido.
    reason: lexical_alternative
  revision_rationale: Se ajusta el participio κατακειμένου a 'recostado a la mesa' para preservar la imagen de la comida reclinada; se reemplaza 'un alabastro' por 'un frasco de alabastro' para claridad natural en español sin perder el referente del original; y se alinea πιστικῆς con la decisión principal auditada ('puro'), manteniendo en nota la alternativa 'genuino'. Las demás decisiones centrales del borrador se conservan.
