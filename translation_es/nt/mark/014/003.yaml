  text: Καὶ ὄντος αὐτοῦ ἐν Βηθανίᾳ ἐν τῇ οἰκίᾳ Σίμωνος τοῦ λεπροῦ κατακειμένου αὐτοῦ ἦλθεν γυνὴ ἔχουσα ἀλάβαστρον μύρου νάρδου πιστικῆς πολυτελοῦς· ⸀συντρίψασα ⸀τὴν ἀλάβαστρον κατέχεεν ⸀αὐτοῦ τῆς κεφαλῆς.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/003.yaml
  text: And while he was in Bethany[a], reclining at the house of Simon the leper, a woman came with an alabaster jar of very expensive pure nard perfume; she broke the jar and poured it on his head.
  footnotes:
