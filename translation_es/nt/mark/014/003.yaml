translation:
  language: es
  text: Y mientras él estaba en Betania, recostado a la mesa en casa de Simón el leproso, vino una mujer con un frasco de alabastro de perfume de nardo puro[a], muy costoso; rompió el frasco y lo derramó sobre su cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nardo genuino». El adjetivo griego πιστικῆς es debatido.
    reason: lexical_alternative
lexical_decisions:
- source_word: Βηθανίᾳ
  english_pob_choice: Bethany
  chosen_spanish: Betania
  alternatives_spanish:
  - Bethania
  lexicon: BDAG
  rationale: Nombre propio geográfico normalizado en español bíblico; 'Betania' conserva la forma más reconocible y estándar.
- source_word: οἰκίᾳ Σίμωνος τοῦ λεπροῦ
  english_pob_choice: the house of Simon the leper
  chosen_spanish: en casa de Simón el leproso
  alternatives_spanish:
  - en la casa de Simón el leproso
  - en casa de Simón, el leproso
  lexicon: BDAG
  rationale: Se preserva la designación directa 'el leproso' sin suavizarla a 'ex leproso', porque el texto griego no lo dice. 'En casa de' es idiomático en español y mantiene la ubicación.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una mujer determinada
  - una mujer
  lexicon: BDAG
  rationale: Valor indefinido natural del sustantivo en contexto narrativo.
- source_word: ἀλάβαστρον
  english_pob_choice: an alabaster jar
  chosen_spanish: un alabastro
  alternatives_spanish:
  - un frasco de alabastro
  - un recipiente de alabastro
  lexicon: BDAG
  rationale: En español, 'alabastro' puede funcionar como abreviación del recipiente en contextos bíblicos, pero para mayor claridad se añadió 'de perfume' y luego se retomó como objeto quebrado. La forma evita forzar un sustantivo menos seguro del original.
- source_word: μύρου
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - aceite aromático
  lexicon: BDAG
  rationale: '''Perfume'' comunica bien la sustancia aromática costosa en español moderno sin especificar más de lo que el término griego exige.'
- source_word: νάρδου
  english_pob_choice: nard
  chosen_spanish: nardo
  alternatives_spanish:
  - espicanardo
  - nardo
  lexicon: BDAG
  rationale: '''Nardo'' es la forma usual y clara en español para el aroma/planta mencionados.'
- source_word: πιστικῆς
  english_pob_choice: pure
  chosen_spanish: genuino
  alternatives_spanish:
  - puro
  - auténtico
  lexicon: BDAG
  rationale: La lectura es debatida; 'genuino' preserva la idea de autenticidad/calidad sin cerrar indebidamente el sentido a 'puro' en un sentido químico. Esto mantiene visible la tensión lexical documentada por la tradición de traducción.
- source_word: πολυτελοῦς
  english_pob_choice: very expensive
  chosen_spanish: muy costoso
  alternatives_spanish:
  - muy caro
  - de gran precio
  lexicon: BDAG
  rationale: Expresa el valor económico elevado de forma natural y fiel.
- source_word: συντρίψασα τὴν ἀλάβαστρον
  english_pob_choice: she broke the jar
  chosen_spanish: quebró el alabastro
  alternatives_spanish:
  - rompió el recipiente
  - quebró el frasco
  lexicon: BDAG
  rationale: El texto enfatiza la acción de romper antes de derramar. 'Quebró el alabastro' sigue la economía del griego, donde el sustantivo puede referirse al recipiente; se conserva la repetición del término sin añadir una explicación no presente en el pasaje.
- source_word: κατέχεεν
  english_pob_choice: poured it
  chosen_spanish: lo derramó
  alternatives_spanish:
  - lo vertió
  - lo echó
  lexicon: BDAG
  rationale: '''Derramó'' es el equivalente natural en español para la acción de verter sobre la cabeza.'
- source_word: τῆς κεφαλῆς
  english_pob_choice: on his head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: Preposición idiomática para el destino del derramamiento.
theological_decisions:
- issue: Designación de Simón como 'el leproso'
  english_pob_reading: Retain 'Simon the leper' in the main text
  chosen_spanish_reading: Mantener 'Simón el leproso'
  alternative_spanish_readings:
  - Simón el ex leproso
  - Simón, que había sido leproso
  rationale: No se debe importar una inferencia histórica no expresada en el versículo. La traducción conserva la tensión del texto fuente y evita normalizarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el estado final del audit trail inglés: conserva Bethany/Simón el leproso, mantiene la ambigüedad de πιστικῆς mediante una nota, y refleja la secuencia narrativa ''vino... quebró... derramó''. No se registran revisiones aplicadas en el expediente inglés, por lo que no se introducen cambios de última hora.'
  spanish_consistency_notes:
  - Se usa 'Betania' por coherencia con el uso bíblico hispano y con el nombre propio del lugar.
  - Se evita 'SEÑOR' porque el versículo no contiene κύριος ni una alusión directa al nombre divino.
  - Se conserva la designación 'Simón el leproso' sin agregar 'ex-' para no borrar la tensión documentada.
  - '''Genuino'' se eligió para πιστικῆς como solución española que mantiene la duda lexical sin forzar una equivalencia única.'
  - Se evita calcar 'jarra' si el griego puede referir el envase; en español se deja 'alabastro' con nota para no perder la relación con el sustantivo original.
