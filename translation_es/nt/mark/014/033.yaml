translation:
  language: es
  text: Y toma consigo a Pedro, a Santiago y a Juan, y comenzó a angustiarse mucho[a] y a turbarse,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a alarmarse grandemente». El primer verbo puede denotar alarma intensa, conmoción o angustia en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma consigo
  alternatives_spanish:
  - toma
  - lleva consigo
  - toma con él
  lexicon: BDAG
  rationale: El verbo griego indica que Jesús incorpora a estos discípulos a su compañía en el trayecto. «Toma consigo» conserva la idea de asumirlos con él y resulta natural en español bíblico contemporáneo.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: consigo
  alternatives_spanish:
  - con él
  - junto con él
  lexicon: BDAG
  rationale: «Consigo» expresa de manera compacta la compañía personal de Jesús sin sonar mecánico. Mantiene la relación acompañante que el contexto requiere.
- source_word: ἤρξατο
  english_pob_choice: he began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: 'Se conserva el valor ingresivo del aoristo con infinitivo: no solo el estado, sino el inicio de la reacción emocional.'
- source_word: ἐκθαμβεῖσθαι
  english_pob_choice: greatly distressed / greatly alarmed
  chosen_spanish: a sentirse profundamente angustiado
  alternatives_spanish:
  - a sentirse profundamente alarmado
  - a quedar profundamente sobrecogido
  - a sentirse grandemente afligido
  lexicon: BDAG
  rationale: El verbo puede denotar alarma intensa, conmoción o angustia. En este contexto de Getsemaní, «profundamente angustiado» comunica la fuerza emocional sin reducirla a mera sorpresa ni imponer una paráfrasis excesiva.
- source_word: ἀδημονεῖν
  english_pob_choice: troubled
  chosen_spanish: turbado
  alternatives_spanish:
  - angustiado
  - abrumado
  - desasosegado
  lexicon: BDAG
  rationale: «Turbado» preserva el segundo matiz del texto, distinto de ἐκθαμβεῖσθαι. En español puede abarcar inquietud, desasosiego y perturbación interior, manteniendo la duplicidad expresiva del griego.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  lexicon: N/A
  rationale: Se conserva la coordinación repetida para reflejar el estilo paratáctico de Marcos y el avance acumulativo de la escena.
theological_decisions:
- issue: Cómo expresar el estado emocional de Jesús en Getsemaní sin suavizarlo ni exagerarlo
  english_pob_reading: Translate the two verbs straightforwardly as real, intense human distress, preserving the tension of the scene.
  chosen_spanish_reading: 'Traducir ambos verbos de manera directa como una angustia humana real e intensa: «profundamente angustiado y turbado».'
  alternative_spanish_readings:
  - «grandemente alarmado y turbado»
  - «sobrecogido y angustiado»
  - «horrorizado y turbado»
  rationale: La traducción debe reflejar la humanidad verdadera de Jesús y la intensidad del momento, sin resolver la tensión teológica con un lenguaje más débil ni con una interpretación más fuerte de lo que el texto exige. La combinación elegida conserva el peso emocional del pasaje y sigue siendo lexicográficamente defendible.
  doctrine_reference: Definición de Calcedonia (451 d. C.); principio de la POB de preservar la tensión teológica sin resolverla por paráfrasis
- issue: Relación entre la reacción de Jesús y su obediencia narrativa en Marcos
  english_pob_reading: The verse narrates a genuine emotional response without speculative explanation.
  chosen_spanish_reading: El versículo narra una reacción emocional genuina sin explicación especulativa.
  alternative_spanish_readings:
  - El versículo describe solo sorpresa externa.
  - El versículo describe un temor extremo explícito.
  rationale: No se debe diluir el dramatismo ni añadir categorías ajenas al texto. La redacción propuesta mantiene la sobriedad narrativa y la seriedad de la escena.
  doctrine_reference: Cristología clásica; principio de fidelidad semántica al texto fuente
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB inglés, que afinó la fuerza de ἐκθαμβεῖσθαι hacia «greatly distressed» sin abandonar la naturalidad. En español se opta por una solución equivalente de alta intensidad («profundamente angustiado») para reflejar esa misma actualización, manteniendo además la distinción con ἀδημονεῖν mediante «turbado».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva la secuencia narrativa con dos verbos coordinados para no borrar la intensificación del griego.
  - «Santiago» se prefiere por el uso bíblico estándar en español para Ἰάκωβος.
  - La nota al pie marca la alternativa léxica principal del primer verbo, siguiendo el patrón de la POB inglesa.
