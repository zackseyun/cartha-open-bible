review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador representa bien los elementos principales del griego: Jesús toma a Pedro, Santiago y Juan con él, y se preserva el valor ingresivo de ἤρξατο. También mantiene la doble descripción del estado emocional. Sin embargo, «a sentirse» añade un matiz reflexivo no expresado en ἐκθαμβεῖσθαι καὶ ἀδημονεῖν y debilita la inmediatez narrativa; además, el punto y coma rompe innecesariamente la parataxis de Marcos, donde basta una coma.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorar en naturalidad y fidelidad con una formulación más directa: «comenzó a angustiarse mucho y a turbarse». Esto evita el giro algo interpretativo «a sentirse profundamente angustiado» y refleja mejor dos infinitivos coordinados. También conviene sustituir el punto y coma por coma para conservar mejor el flujo narrativo.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los nombres propios están bien. La decisión sobre el estado emocional de Jesús es teológicamente sobria y fiel; la mejora propuesta es principalmente lexical y sintáctica, no doctrinal.
  issues:
  - severity: medium
    issue: «a sentirse» añade un matiz no presente en el griego
    rationale: Los infinitivos ἐκθαμβεῖσθαι y ἀδημονεῖν describen directamente el estado/reacción de Jesús. «Comenzó a sentirse» introduce una mediación subjetiva reflexiva que no está en el texto fuente ni en la auditoría inglesa.
  - severity: medium
    issue: «profundamente angustiado» no refleja tan bien la fuerza y forma verbal del primer infinitivo
    rationale: La auditoría inglesa ajustó a «greatly distressed». En español, una forma verbal como «angustiarse mucho» o «quedar muy angustiado» preserva mejor el carácter dinámico e ingresivo junto con ἤρξατο que el adjetival «sentirse ... angustiado».
  - severity: low
    issue: El punto y coma debilita el estilo paratáctico de Marcos
    rationale: El original enlaza la acción con καὶ ... καὶ. En español, una coma mantiene mejor la continuidad narrativa que un punto y coma en este contexto.
  revised_spanish_text: Y toma consigo a Pedro, a Santiago y a Juan, y comenzó a angustiarse mucho[a] y a turbarse,
  revised_footnotes:
  - marker: a
    text: O «a alarmarse grandemente». El primer verbo puede denotar alarma intensa, conmoción o angustia en este contexto.
    reason: lexical_alternative
  revision_rationale: Se revisa para eliminar el añadido interpretativo «a sentirse», reflejar con más precisión el valor dinámico de ἤρξατο + infinitivos, y conservar mejor la parataxis del griego. La nota alternativa se mantiene, ajustada al nuevo anclaje verbal en español.
