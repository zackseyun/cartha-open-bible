revisions:
- from: Y toma consigo a Pedro, a Santiago y a Juan; y comenzó a sentirse[a] profundamente angustiado y turbado.
  to: Y toma consigo a Pedro, a Santiago y a Juan, y comenzó a angustiarse mucho[a] y a turbarse,
  rationale: Se revisa para eliminar el añadido interpretativo «a sentirse», reflejar con más precisión el valor dinámico de ἤρξατο + infinitivos, y conservar mejor la parataxis del griego. La nota alternativa se mantiene, ajustada al nuevo anclaje verbal en español.
