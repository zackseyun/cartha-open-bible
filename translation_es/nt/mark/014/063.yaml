translation:
  language: es
  text: 'Entonces el sumo sacerdote rasgó[a] sus vestiduras y dijo[b]: «¿Qué más necesidad tenemos de testigos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “desgarró” o, más específicamente, “rasgó sus túnicas”.
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa un presente histórico: literalmente, “dice”.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀρχιερεὺς
  english_pob_choice: the high priest
  chosen_spanish: el sumo sacerdote
  alternatives_spanish:
  - el jefe de los sacerdotes
  lexicon: BDAG
  rationale: En este contexto singular designa al titular principal del cargo; “sumo sacerdote” es la equivalencia española natural y precisa, y conserva el peso institucional del término.
- source_word: διαρρήξας
  english_pob_choice: tore
  chosen_spanish: rasgó
  alternatives_spanish:
  - rompió
  - desgarró
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción de rasgar la ropa en un gesto abrupto. “Rasgó” transmite bien la fuerza física sin sonar forzado en español.
- source_word: τοὺς χιτῶνας αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestiduras
  alternatives_spanish:
  - sus ropas
  - sus túnicas
  lexicon: BDAG
  rationale: El inglés POB opta por un término amplio para no sobreespecificar. En español, “vestiduras” conserva esa amplitud y el matiz solemne, mientras “túnicas” podría restringir demasiado el sentido plural del griego.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo fluye mejor con pasado simple. Se conserva el valor narrativo sin trasladar de forma rígida el tiempo verbal griego.
- source_word: Τί ἔτι χρείαν ἔχομεν
  english_pob_choice: What further need do we have
  chosen_spanish: ¿Qué más necesidad tenemos
  alternatives_spanish:
  - ¿Qué necesidad tenemos todavía?
  - ¿Para qué necesitamos todavía?
  lexicon: BDAG
  rationale: La expresión española reproduce la pregunta retórica y el sentido de ἔτι como “más/todavía/further”. “Qué más necesidad” mantiene la fuerza idiomática y la urgencia del dicho.
- source_word: μαρτύρων
  english_pob_choice: of witnesses
  chosen_spanish: de testigos
  alternatives_spanish:
  - de testigos oculares
  lexicon: BDAG
  rationale: El genitivo tras χρείαν ἔχομεν se expresa naturalmente con “de testigos”. Se conserva el término general sin añadir precisión no presente en el texto.
theological_decisions:
- issue: El sentido de rasgar las vestiduras del sumo sacerdote
  english_pob_reading: The verse narrates the action without explicitly interpreting it as outrage, grief, or a verdict of blasphemy.
  chosen_spanish_reading: La traducción describe el gesto sin añadir una explicación interpretativa.
  alternative_spanish_readings:
  - Lo rasgó en señal de indignación.
  - Lo rasgó como reacción a una supuesta blasfemia.
  rationale: El griego presenta la acción y la palabra, pero no explica su significado. Mantener la neutralidad narrativa preserva la tensión del pasaje y evita resolverla con una glosa que el versículo no exige.
  doctrine_reference: Preservar la tensión narrativa y teológica sin sobreinterpretar el gesto.
translation_notes:
  revision_awareness: El inglés POB actual no requiere cambios; la versión española sigue su lectura óptima-equivalente, manteniendo la neutralidad interpretativa sobre el gesto del sumo sacerdote y reflejando el presente histórico griego con una nota breve.
  spanish_consistency_notes:
  - Se mantiene “sumo sacerdote” para ἀρχιερεύς, coherente con el uso bíblico español estándar y con la precisión del contexto judicial.
  - “Vestiduras” preserva el plural y la amplitud de χιτῶνες sin forzar un matiz ceremonial que el texto no explicita.
  - Se traduce la pregunta retórica de modo natural en español, evitando un calco excesivo de la sintaxis griega.
  - No se introduce lenguaje doctrinal adicional sobre blasfemia o indignación; el texto queda narrativamente abierto como en el griego.
