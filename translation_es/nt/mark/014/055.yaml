  timestamp: '2026-05-07T20:48:19Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general: los principales sacerdotes y todo el consejo/concilio buscan testimonio contra Jesús con propósito de muerte, y no lo encuentran. Sin embargo, «para entregarlo a muerte» no representa fielmente θανατῶσαι («dar muerte / matar / poner a muerte»), porque introduce la idea de ‘entregar’ que no está en el griego. Además, la nota al pie está anclada en la frase equivocada: la alternativa «Sanedrín» corresponde a «todo el consejo», no a «muerte».'
  spanish_quality_summary: El español es legible, pero «entregarlo a muerte» suena poco natural y algo opaco en español general eclesial. «Con el fin de darle muerte» o «para darle muerte» conserva el tono judicial y mejora la naturalidad. También conviene reubicar la nota para que el lector entienda qué palabra explica.
  glossary_alignment: No hay conflicto con los términos de proyecto principales. «Jesús» está bien. «Consejo» es aceptable para συνέδριον, con nota para «Sanedrín». «Principales sacerdotes» es una opción bíblicamente reconocible. La principal desviación léxica está en θανατῶσαι, que debe reflejar muerte/ejecución, no ‘entrega’.
  issues:
  - severity: high
    issue: «para entregarlo a muerte» traduce inadecuadamente εἰς τὸ θανατῶσαι αὐτόν
    rationale: θανατῶσαι significa ‘dar muerte, matar, poner a muerte’. El verbo «entregar» añade un paso procesal no expresado por el griego y debilita la finalidad directa del infinitivo de propósito.
  - severity: medium
    issue: La nota [a] está colocada sobre «muerte» en vez de sobre «todo el consejo»
    rationale: La nota explica una alternativa para συνέδριον («Sanedrín»), así que debe anclarse donde aparece «todo el consejo», no en la frase de muerte.
  - severity: low
    issue: «pero no lo encontraban» es entendible, pero puede sonar algo ambiguo
    rationale: El pronombre singular «lo» retoma «testimonio», que es gramaticalmente posible. No requiere cambio si el resto se corrige, aunque «ninguno» haría más explícita la referencia.
  revised_spanish_text: Ahora los principales sacerdotes y todo el consejo[a] buscaban testimonio contra Jesús con el fin de darle muerte, pero no lo encontraban.
  revised_footnotes:
  - marker: a
    text: O, más específicamente, «todo el Sanedrín».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «para entregarlo a muerte» por «con el fin de darle muerte» para reflejar con mayor fidelidad θανατῶσαι y mantener un tono judicial natural en español. Se reubica la nota [a] para que explique correctamente «todo el consejo», que es donde corresponde la alternativa «Sanedrín». No se requiere adjudicación adicional porque la corrección es léxica y estilística, no doctrinal ni textualmente incierta.
