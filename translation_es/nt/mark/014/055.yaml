revisions:
- from: Ahora los principales sacerdotes y todo el consejo buscaban testimonio contra Jesús para entregarlo a muerte[a], pero no lo encontraban.
  to: Ahora los principales sacerdotes y todo el consejo[a] buscaban testimonio contra Jesús con el fin de darle muerte, pero no lo encontraban.
  rationale: Se reemplaza «para entregarlo a muerte» por «con el fin de darle muerte» para reflejar con mayor fidelidad θανατῶσαι y mantener un tono judicial natural en español. Se reubica la nota [a] para que explique correctamente «todo el consejo», que es donde corresponde la alternativa «Sanedrín». No se requiere adjudicación adicional porque la corrección es léxica y estilística, no doctrinal ni textualmente incierta.
