translation:
  language: es
  text: Ahora los principales sacerdotes y todo el consejo[a] buscaban testimonio contra Jesús con el fin de darle muerte, pero no lo encontraban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más específicamente, «todo el Sanedrín».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce avance narrativo con leve matiz de contraste. «Ahora» comunica transición de escena en español natural sin forzar una adversativa fuerte.
- source_word: ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los sacerdotes principales
  lexicon: BDAG
  rationale: En español bíblico «principales sacerdotes» es una forma clara y reconocible para el plural de la élite sacerdotal, y evita sugerir un solo sumo sacerdote.
- source_word: ὅλον τὸ συνέδριον
  english_pob_choice: the whole council
  chosen_spanish: todo el consejo
  alternatives_spanish:
  - todo el Sanedrín
  - todo el concilio
  lexicon: BDAG
  rationale: συνέδριον designa el consejo gobernante. «Consejo» traduce el sentido sin transliteración; «todo» conserva ὅλον. Se deja la opción histórica «Sanedrín» fuera del texto principal por transparencia.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - andaban buscando
  - seguían buscando
  - estaban buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada. «Buscaban» mantiene esa continuidad de forma natural en español, sin necesidad de una perífrasis más pesada.
- source_word: κατὰ τοῦ Ἰησοῦ
  english_pob_choice: against Jesus
  chosen_spanish: contra Jesús
  alternatives_spanish:
  - en contra de Jesús
  - para acusar a Jesús
  lexicon: BDAG
  rationale: La preposición con genitivo tiene fuerza adversativa/hostil. «Contra Jesús» es el equivalente más directo y sobrio.
- source_word: μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - evidencia
  - declaración
  - prueba
  lexicon: BDAG
  rationale: En contexto judicial, μαρτυρία es «testimonio» más que «prueba». «Testimonio» preserva el marco legal y la voz de testigos.
- source_word: εἰς τὸ θανατῶσαι αὐτόν
  english_pob_choice: in order to put him to death
  chosen_spanish: para entregarlo a muerte
  alternatives_spanish:
  - para matarlo
  - para condenarlo a muerte
  - con el fin de darle muerte
  lexicon: BDAG
  rationale: El infinitivo articular indica propósito. Se opta por una formulación española natural que conserve el sentido de finalidad letal y el tono jurídico del pasaje. «Entregarlo a muerte» refleja la intención de llevarlo a una sentencia mortal sin endurecer más allá del flujo narrativo. No obstante, «para matarlo» sigue siendo una alternativa semántica cercana.
- source_word: καὶ οὐχ ηὕρισκον
  english_pob_choice: but they were not finding any
  chosen_spanish: pero no lo encontraban
  alternatives_spanish:
  - y no encontraban ninguna
  - pero no hallaban ninguna
  - y no hallaban
  lexicon: BDAG
  rationale: El imperfecto continúa la acción en curso. En español, «no lo encontraban» es idiomático y fluido; el pronombre retoma el «testimonio» implícito. El giro adversativo «pero» refleja bien la relación marcada en el audit trail inglés.
theological_decisions:
- issue: Identificación de συνέδριον
  english_pob_reading: the whole council
  chosen_spanish_reading: todo el consejo
  alternative_spanish_readings:
  - todo el Sanedrín
  - el consejo completo
  rationale: La elección principal traduce el nombre funcional del órgano sin imponer una transliteración. «Sanedrín» es posible como glosa cultural, pero el texto griego por sí mismo dice «consejo»; por eso se preserva la transparencia en el cuerpo principal.
  doctrine_reference: 'Principio de traducción: traducir el referente del término cuando el griego lo permite claramente, manteniendo la referencia histórica sin oscurecerla.'
- issue: Intención de muerte en εἰς τὸ θανατῶσαι αὐτόν
  english_pob_reading: in order to put him to death
  chosen_spanish_reading: para entregarlo a muerte
  alternative_spanish_readings:
  - para matarlo
  - para ponerlo a muerte
  - para condenarlo a muerte
  rationale: La frase expresa propósito letal y encaja con un entorno judicial. La opción elegida conserva la finalidad de muerte sin convertir prematuramente el proceso en un mero homicidio físico, respetando la tensión del relato de juicio.
  doctrine_reference: Marco narrativo del juicio de Jesús en Marcos 14; fidelidad al desarrollo del proceso hostil sin introducir especificaciones no dichas.
translation_notes:
  revision_awareness: 'La redacción sigue el patrón revisado del inglés auditado: δέ se vuelve una transición suave en español («Ahora»), καί final se hace adversativa con «pero», y el aspecto imperfectivo de ἐζήτουν / ηὕρισκον se conserva con formas continuas («buscaban», «no lo encontraban»). Se evita depender de una transliteración innecesaria de συνέδριον, aunque se preserva la alternativa histórica en nota.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - «Consejo» se usa para συνέδριον en el texto principal; la nota preserva la lectura más histórica «Sanedrín».
  - Se conserva un tono judicial y narrativo sobrio, acorde con el contexto de proceso.
  - La clausula final usa «pero» para reflejar mejor la relación adversativa indicada en el audit trail inglés, sin añadir contenido extra.
