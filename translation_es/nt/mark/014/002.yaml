translation:
  language: es
  text: 'Porque decían: «No durante la fiesta, no sea que haya un alboroto del pueblo[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre el pueblo». El genitivo griego τοῦ λαοῦ puede indicar que el alboroto surgiría de la multitud o que ocurriría dentro de ella.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o repetida; en español, «decían» comunica esa continuidad sin volverse pesado. «Seguían diciendo» y «estaban diciendo» son posibles, pero menos sobrias para esta breve cláusula.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva el valor explicativo de γάρ y funciona con naturalidad al inicio de la frase en español.
- source_word: Μὴ
  english_pob_choice: Not
  chosen_spanish: 'No'
  alternatives_spanish:
  - No...
  - No se
  lexicon: BDAG
  rationale: La negación elíptica introduce la decisión o advertencia implícita. «No durante la fiesta» preserva la brevedad del griego.
- source_word: ἐν τῇ ἑορτῇ
  english_pob_choice: during the feast
  chosen_spanish: durante la fiesta
  alternatives_spanish:
  - en la fiesta
  - en el festival
  lexicon: BDAG
  rationale: ἐν con sentido temporal se expresa naturalmente con «durante». «Fiesta» refleja ἑορτή como el período festivo, con el sentido contextual de la Pascua y los Panes sin levadura.
- source_word: μήποτε
  english_pob_choice: lest
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por si
  lexicon: BDAG
  rationale: «No sea que» reproduce bien la idea de prevención ante un posible resultado temido, con un registro natural en español.
- source_word: ἔσται
  english_pob_choice: there be
  chosen_spanish: haya
  alternatives_spanish:
  - habrá
  - pudiera haber
  lexicon: BDAG
  rationale: En una construcción con «no sea que», el subjuntivo español «haya» comunica adecuadamente el resultado potencial sin forzar una forma literal.
- source_word: θόρυβος
  english_pob_choice: an uproar
  chosen_spanish: un alboroto
  alternatives_spanish:
  - una agitación
  - un disturbio
  - un tumulto
  lexicon: BDAG
  rationale: θόρυβος denota ruido y desorden público. «Alboroto» transmite bien la turbulencia social sin intensificarla más de lo que el contexto exige.
- source_word: τοῦ λαοῦ
  english_pob_choice: from the people
  chosen_spanish: del pueblo
  alternatives_spanish:
  - de la gente
  - entre el pueblo
  - por el pueblo
  lexicon: BDAG
  rationale: El genitivo permite la idea de procedencia o de ámbito. «Del pueblo» mantiene esa ambigüedad útil en español, como la nota inglesa sobre el posible origen o ubicación del alboroto.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el pasaje quedó aprobado sin modificaciones, y la versión española sigue esa lectura estable del texto griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología no presente en el versículo.
  - «Fiesta» conserva el referente contextual sin añadir precisión litúrgica que el griego no explicita.
  - «Alboroto» mantiene el tono de θόρυβος sin traducirlo de manera más fuerte como «motín» o «revuelta».
  - La nota al pie preserva la ambigüedad del genitivo, alineada con el aparato inglés.
