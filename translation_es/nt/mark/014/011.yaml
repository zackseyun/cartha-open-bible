translation:
  language: es
  text: Al oírlo, se alegraron y le prometieron dar dinero[a]. Y él buscaba cómo traicionarlo[b] en un momento oportuno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘plata’. El término griego puede referirse literalmente a la plata o, de manera más general, al dinero.
    reason: lexical_alternative
  - marker: b
    text: O ‘entregarlo’ o ‘ponerlo en manos de’. El verbo griego puede significar ‘entregar’ o ‘poner en manos de’; aquí ‘traicionarlo’ refleja el contexto de Judas.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ ἀκούσαντες
  english_pob_choice: When they heard it
  chosen_spanish: Al oírlo
  alternatives_spanish:
  - Cuando lo oyeron
  - Y al oírlo
  lexicon: BDAG
  rationale: El participio articular con δέ introduce la reacción de los principales sacerdotes ante la propuesta de Judas. En español, 'Al oírlo' comunica con naturalidad la relación temporal sin añadir más contenido que el suministrado por el contexto.
- source_word: ἐχάρησαν
  english_pob_choice: they rejoiced
  chosen_spanish: se alegraron
  alternatives_spanish:
  - se regocijaron
  - estuvieron contentos
  lexicon: BDAG
  rationale: El aoristo de χαίρω expresa una reacción real de gozo o alegría. 'Se alegraron' conserva esa fuerza verbal en español moderno; 'regocijaron' sería más intenso pero menos natural.
- source_word: ἐπηγγείλαντο αὐτῷ ἀργύριον δοῦναι
  english_pob_choice: promised to give him money
  chosen_spanish: le prometieron dar dinero
  alternatives_spanish:
  - acordaron darle dinero
  - le prometieron plata
  lexicon: BDAG
  rationale: ἐπαγγέλλομαι significa prometer o comprometerse a dar. 'Le prometieron dar' refleja esa acción de compromiso. Para ἀργύριον, 'dinero' comunica el sentido idiomático en español; 'plata' preserva la referencia literal al metal.
- source_word: ἀργύριον
  english_pob_choice: money
  chosen_spanish: dinero
  alternatives_spanish:
  - plata
  - moneda
  lexicon: BDAG
  rationale: Aunque el término puede significar literalmente 'plata', en este contexto no se especifica cantidad ni tipo de pago. 'Dinero' evita una literalidad excesiva y sigue el valor contextual indicado en el audit trail inglés.
- source_word: ἐζήτει
  english_pob_choice: he began seeking
  chosen_spanish: buscaba
  alternatives_spanish:
  - comenzó a buscar
  - seguía buscando
  lexicon: BDAG
  rationale: El imperfecto señala una acción en curso. 'Buscaba' conserva ese matiz progresivo de manera natural en español; la idea de inicio queda implícita por el cambio narrativo.
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  - la forma de
  lexicon: BDAG
  rationale: La pregunta indirecta pide el modo o medio de ejecutar la traición. 'Cómo' es la correspondencia más directa y transparente.
- source_word: εὐκαίρως
  english_pob_choice: at an opportune time
  chosen_spanish: en un momento oportuno
  alternatives_spanish:
  - cuando hubiera oportunidad
  - en una ocasión favorable
  lexicon: BDAG
  rationale: El adverbio describe una ocasión favorable o adecuada. 'En un momento oportuno' mantiene el valor de oportunidad estratégica sin añadir detalles no presentes en el versículo.
- source_word: παραδοῖ
  english_pob_choice: he might betray him
  chosen_spanish: entregarlo
  alternatives_spanish:
  - traicionarlo
  - ponerlo en sus manos
  lexicon: BDAG
  rationale: παραδίδωμι puede significar 'entregar', 'poner en manos de' o, por el contexto, 'traicionar'. En el cuerpo del texto se eligió 'entregarlo' para conservar la base semántica del verbo griego; el contexto deja claro el carácter traicionero, y se documenta la alternativa 'traicionarlo'.
theological_decisions:
- issue: Valor contextual de παραδίδωμι en la acción de Judas
  english_pob_reading: betray
  chosen_spanish_reading: entregarlo
  alternative_spanish_readings:
  - traicionarlo
  - entregarlo
  rationale: El contexto narrativo muestra que Judas actúa en connivencia con los adversarios de Jesús, por lo que el acto es traicionero. Sin embargo, para evitar borrar la amplitud semántica del verbo griego, el texto principal usa 'entregarlo' y la nota registra que el sentido contextual incluye traición.
  doctrine_reference: Principio de primacía del idioma original; preservar la tensión entre el valor básico de παραδίδωμι y su fuerza contextual en la pasión.
translation_notes:
  revision_awareness: El texto inglés auditado se mantiene sin cambios sustantivos en la revisión más reciente. Esta versión española sigue la decisión del POB inglés de conservar la alternancia entre el sentido literal y el contextual en ἀργύριον/παραδίδωμι, ajustándola a un español natural y transparente.
  spanish_consistency_notes:
  - Se mantiene 'Y' al inicio de la segunda oración para reflejar la secuencia narrativa del griego.
  - '''Dinero'' se usa en el cuerpo principal; la nota preserva ''plata'' como alternativa lexical relevante.'
  - '''Entregarlo'' se eligió por transparencia semántica; la nota explica explícitamente el matiz de traición para no perder la tensión léxica documentada.'
  - El registro evita fórmulas eclesiásticas tradicionales no requeridas por el original y conserva un español sobrio y publicable.
