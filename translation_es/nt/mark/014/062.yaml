translation:
  language: es
  text: 'Y Jesús dijo[a]: «Yo soy[c][b], y veréis al Hijo del Hombre sentado a la derecha del Poder y viniendo con las nubes del cielo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Yo soy él». El griego dice simplemente «Yo soy».
    reason: alternative_reading
  - marker: b
    text: «Poder» es una manera reverencial de referirse a Dios.
    reason: cultural_note
  - marker: c
    text: Eco de Salmo 110:1 y Daniel 7:13.
    reason: cross_reference
lexical_decisions:
- source_word: Ἐγώ εἰμι
  english_pob_choice: I am
  chosen_spanish: Yo soy
  alternatives_spanish:
  - Soy yo
  - Yo soy él
  lexicon: BDAG
  rationale: El griego es una afirmación enfática simple; en español, «Yo soy» conserva la fuerza directa y solemne sin añadir un predicado que el texto no expresa. «Soy yo» suena más idiomático en respuestas de identificación, pero desplaza el énfasis; «Yo soy él» introduce un pronombre inexistente en el griego.
- source_word: ὄψεσθε
  english_pob_choice: you will see
  chosen_spanish: verán
  alternatives_spanish:
  - contemplarán
  - percibirán
  lexicon: BDAG
  rationale: El futuro de ὁράω se expresa naturalmente con «verán». Mantiene la inmediatez profética de la declaración sin volverla más literaria o interpretativa de lo que permite el griego.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo de Hombre
  - el Ser humano
  lexicon: BDAG
  rationale: Conviene conservar el título fijo y su eco daniélico. «El Hijo del Hombre» es la forma española estable que preserva el idiomismo y la carga cristológica del texto.
- source_word: ἐκ δεξιῶν
  english_pob_choice: at the right hand of
  chosen_spanish: a la derecha de
  alternatives_spanish:
  - a la diestra de
  - a su derecha
  lexicon: BDAG
  rationale: La expresión griega alude al lugar de honor y autoridad. En español, «a la derecha de» comunica la relación espacial y honorífica con naturalidad; «a la diestra de» es más tradicional, pero menos neutral para este registro.
- source_word: τῆς δυνάμεως
  english_pob_choice: Power
  chosen_spanish: del Poder
  alternatives_spanish:
  - de Poder
  - de la Poder
  lexicon: BDAG
  rationale: Se conserva la circunlocución reverencial del griego en vez de sustituirla directamente por «Dios». «Poder» con mayúscula refleja la referencia divina implícita y mantiene la tensión del original.
- source_word: καθήμενον
  english_pob_choice: seated
  chosen_spanish: sentado
  alternatives_spanish:
  - entronizado
  - sentándose
  lexicon: BDAG
  rationale: El participio describe la posición de honor del Hijo del Hombre. «Sentado» es fiel y natural en español; «entronizado» explicita más de lo que dice el griego.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - llegando
  lexicon: BDAG
  rationale: «Viniendo» conserva mejor la forma participial coordinada del griego y sugiere acción en curso. «Que viene» suaviza la construcción, pero cambia el perfil sintáctico; «llegando» pierde el eco apocalíptico.
- source_word: μετὰ τῶν νεφελῶν τοῦ οὐρανοῦ
  english_pob_choice: with the clouds of heaven
  chosen_spanish: con las nubes del cielo
  alternatives_spanish:
  - con las nubes del cielo
  - sobre las nubes del cielo
  lexicon: BDAG
  rationale: La frase reproduce la alusión a Daniel 7:13 sin forzar un giro más interpretativo. «Cielo» mantiene el registro bíblico y apocalíptico mejor que «cielo/firmamento»; aquí «con» sigue el griego μετὰ.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - tanto ... como
  - y también ...
  lexicon: BDAG
  rationale: La repetición de «y» conserva el paralelismo acumulativo entre entronización y venida. Otras soluciones suavizan la estructura y atenúan la intensidad del dicho.
theological_decisions:
- issue: Cómo traducir Ἐγώ εἰμι sin resolver del todo su posible resonancia teológica
  english_pob_reading: Simple 'I am' in the main text
  chosen_spanish_reading: «Yo soy» en el texto principal
  alternative_spanish_readings:
  - «Soy yo»
  - «Yo soy él»
  rationale: Se mantiene una afirmación simple y abierta, tal como en el griego. Esto preserva la tensión entre una respuesta inmediata de identificación y un posible trasfondo más profundo, sin imponer una paráfrasis aclaratoria.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Cómo representar τῆς δυνάμεως, una circunlocución reverencial para Dios
  english_pob_reading: Render as 'Power' rather than substituting 'God'
  chosen_spanish_reading: «del Poder»
  alternative_spanish_readings:
  - «de Dios»
  - «del Poder divino»
  rationale: La traducción conserva la circunlocución del texto fuente y evita reemplazarla por una explicación. La mayúscula en «Poder» ayuda a percibir que no se trata de un poder abstracto, sino de una referencia reverencial a Dios.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje se mantiene en alto acuerdo con la auditoría inglesa y con el texto griego SBLGNT. La decisión principal fue conservar en español la afirmación simple «Yo soy» y la circunlocución reverencial «el Poder» sin resolverlas en favor de una paráfrasis más explícita.
  spanish_consistency_notes:
  - Se mantuvo «Hijo del Hombre» para conservar el título fijo y su resonancia bíblica.
  - Se usó «Poder» con mayúscula como circunlocución reverencial, en paralelo con la auditoría inglesa.
  - La puntuación y el orden de cláusulas siguen de cerca el griego para preservar el paralelismo entre entronización y venida.
  - No se sustituyó la referencia divina por «SEÑOR», conforme al criterio de traducir Yahvé solo cuando el origen textual lo requiera explícitamente.
