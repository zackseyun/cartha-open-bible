  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro auditado en inglés: conserva «Yo soy», mantiene «el Hijo del Hombre», preserva la circunlocución reverencial «Poder», y refleja bien la doble escena de entronización y venida con eco de Salmo 110:1 y Daniel 7:13. La única desalineación relevante está en ὄψεσθε, que es segunda persona plural y, en contexto, va dirigido al sumo sacerdote y al consejo presente; en español conviene mantener «veréis» para reflejar la segunda persona plural, no «verán», que cambia a tercera persona.'
  spanish_quality_summary: El español es claro y digno, pero «verán» rompe la concordancia pragmática del discurso directo y suena como si Jesús hablara de terceros ausentes. Además, en una Biblia eclesial panhispánica, «veréis» es natural y comprensible en citas solemnes. El resto del verso fluye bien y no requiere cambios mayores.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: «Jesús», «Hijo del Hombre», «Poder» y la preservación de «Yo soy» responden correctamente a las decisiones léxicas y teológicas auditadas. No hay conflicto con los glosarios base.'
