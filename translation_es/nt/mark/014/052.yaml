translation:
  language: es
  text: Pero él, dejando atrás la sábana de lino, huyó desnudo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «paño de lino» o «lienzo de lino» para σινδόνα.
    reason: lexical_alternative
  - marker: b
    text: «Desnudo» (γυμνός) puede, en otros contextos, significar «poco vestido»; aquí el sentido inmediato es que escapó sin la prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: BDAG
  rationale: δέ introduce una transición narrativa con leve contraste; en español, 'Pero' comunica bien ese giro sin volver la frase artificial.
- source_word: καταλιπὼν
  english_pob_choice: left ... behind
  chosen_spanish: dejando atrás
  alternatives_spanish:
  - dejando
  - abandonando
  lexicon: BDAG
  rationale: El participio aoristo de καταλείπω expresa la acción de dejar algo al huir. 'Dejando atrás' conserva la idea de abandonar la prenda para escapar y suena natural en español.
- source_word: σινδόνα
  english_pob_choice: linen cloth
  chosen_spanish: sábana de lino
  alternatives_spanish:
  - paño de lino
  - lienzo de lino
  lexicon: BDAG
  rationale: σινδών designa una tela de lino amplia, a veces tipo sábana o lienzo. 'Sábana de lino' comunica la materialidad y la forma amplia sin fijar más de lo que el texto dice.
- source_word: γυμνὸς
  english_pob_choice: naked
  chosen_spanish: desnudo
  alternatives_spanish:
  - naked
  - sin ropa
  lexicon: BDAG
  rationale: γυμνός aquí apunta a estar sin la prenda al escapar. 'Desnudo' es la traducción directa y más natural; mantiene la fuerza del episodio.
- source_word: ἔφυγεν
  english_pob_choice: fled
  chosen_spanish: huyó
  alternatives_spanish:
  - escapó
  - corrió
  lexicon: BDAG
  rationale: φεύγω significa huir o escapar. 'Huyó' preserva la urgencia narrativa y el valor verbal simple del aoristo.
translation_notes:
  revision_awareness: El pasaje griego y el juicio textual auditado coinciden en alta concordancia; no hay revisiones aplicadas ni cambios respecto del estado previo. La redacción española mantiene la secuencia narrativa breve del original y conserva la tensión léxica en σινδόνα y γυμνός mediante notas.
  spanish_consistency_notes:
  - Se usa 'Pero' para δὲ, siguiendo el matiz de contraste/continuación suave del original.
  - '''sábana de lino'' se emplea como equivalente amplio de σινδών, sin decidir indebidamente entre ''sábana'', ''paño'' o ''lienzo''.'
  - '''desnudo'' preserva la lectura principal de γυμνός y queda matizado por la nota.'
  - La frase es breve y narrativamente ágil, acorde con el aoristo griego.
