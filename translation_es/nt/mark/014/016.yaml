translation:
  language: es
  text: Y salieron los discípulos y entraron en la ciudad, y hallaron tal como él les había dicho, y prepararon la Pascua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la comida de Pascua». El griego τὸ πάσχα puede referirse tanto a la Pascua en general como, en este contexto, a la comida que se preparaba.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - partieron
  - salieron afuera
  lexicon: BDAG
  rationale: Ἐξέρχομαι aquí denota salida de un lugar previo. «Salieron» es natural en español, conserva el matiz de partida y evita una calca innecesaria.
- source_word: μαθηταὶ
  english_pob_choice: the disciples
  chosen_spanish: los discípulos
  alternatives_spanish:
  - los aprendices
  lexicon: BDAG
  rationale: En los Evangelios, μαθηταί es el término técnico para los seguidores de Jesús. «Discípulos» preserva ese valor relacional e instruccional.
- source_word: ἦλθον εἰς τὴν πόλιν
  english_pob_choice: came into the city
  chosen_spanish: entraron en la ciudad
  alternatives_spanish:
  - fueron a la ciudad
  - llegaron a la ciudad
  lexicon: BDAG
  rationale: El griego expresa movimiento hacia adentro de la ciudad. «Entraron en la ciudad» reproduce bien ese valor direccional y suena natural en español.
- source_word: πόλιν
  english_pob_choice: the city
  chosen_spanish: la ciudad
  alternatives_spanish:
  - la población
  - el pueblo
  lexicon: BDAG
  rationale: πόλις normalmente significa «ciudad». En este contexto pascual, la referencia a Jerusalén queda suficientemente clara sin añadirla al texto.
- source_word: εὗρον
  english_pob_choice: found it
  chosen_spanish: hallaron
  alternatives_spanish:
  - encontraron
  - hallaron eso
  lexicon: BDAG
  rationale: 'El verbo está usado de forma elíptica: el objeto se entiende por el contexto inmediato. En español, «hallaron» conserva esa elipsis sin forzar un objeto explícito.'
- source_word: καθὼς εἶπεν αὐτοῖς
  english_pob_choice: just as he had told them
  chosen_spanish: tal como él les había dicho
  alternatives_spanish:
  - como les había dicho
  - exactamente como él les había dicho
  lexicon: BDAG
  rationale: καθώς marca correspondencia exacta. «Tal como» transmite esa conformidad; el pluscuamperfecto «había dicho» expresa la anterioridad respecto al hallazgo.
- source_word: ἡτοίμασαν
  english_pob_choice: they prepared
  chosen_spanish: prepararon
  alternatives_spanish:
  - hicieron los preparativos de
  - dejaron listo
  lexicon: BDAG
  rationale: ἑτοιμάζω significa preparar o dejar listo. «Prepararon» es la opción más directa y fiel, sin agregar especificaciones que el griego no da.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - la Pascua de la cena
  - la comida de Pascua
  lexicon: BDAG
  rationale: El sustantivo πάσχα puede referirse a la fiesta de Pascua o, por el contexto, a la cena preparada. «La Pascua» mantiene la amplitud del término y evita restringir indebidamente el sentido.
theological_decisions:
- issue: Alcance de τὸ πάσχα
  english_pob_reading: The Passover, with a footnote allowing 'the Passover meal.'
  chosen_spanish_reading: La Pascua, con nota que permite la lectura de la comida pascual.
  alternative_spanish_readings:
  - la Pascua
  - la comida de Pascua
  - la cena pascual
  rationale: El griego permite tanto la referencia general a la Pascua como, en contexto, al alimento preparado. Conservar «la Pascua» en el texto principal mantiene la amplitud semántica y la nota explica la alternativa contextual sin cerrarla prematuramente.
  doctrine_reference: Ninguna doctrina en disputa; decisión de alcance léxico-contextual.
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del audit trail: no se registran revisiones aplicadas y la evaluación de concordancia fue de alta acuerdo, sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «discípulos» como término técnico estable en los Evangelios.
  - Se evita traducir πάσχα por una expresión más estrecha que el griego no obliga a adoptar.
  - 'La frase verbal conserva la secuencia narrativa: salieron → entraron → hallaron → prepararon.'
