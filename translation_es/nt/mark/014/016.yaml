  glossary_alignment: No hay conflictos con la terminología del proyecto. «Discípulos» para μαθηταί y «la Pascua» para τὸ πάσχα concuerdan con la evidencia y con el razonamiento auditado. La nota alternativa «la comida de Pascua» también está bien como alternativa contextual.
