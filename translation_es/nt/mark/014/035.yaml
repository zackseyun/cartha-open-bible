translation:
  language: es
  text: Y avanzando un poco[a], cayó al suelo y estaba orando para que, si fuera posible, la hora se apartara de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «habiendo avanzado un poco» o «yendo un poco más adelante».'
    reason: alternative_reading
lexical_decisions:
- source_word: προελθὼν μικρὸν
  english_pob_choice: going a little farther
  chosen_spanish: avanzando un poco
  alternatives_spanish:
  - habiendo avanzado un poco
  - yendo un poco más adelante
  lexicon: BDAG
  rationale: El participio con μικρόν indica desplazamiento breve antes de la oración. «Avanzando un poco» conserva el avance breve con naturalidad en español; «un poco más adelante» resalta la idea de distancia, pero puede sonar más interpretativo.
- source_word: ἔπιπτεν ἐπὶ τῆς γῆς
  english_pob_choice: he fell to the ground
  chosen_spanish: se postró en tierra
  alternatives_spanish:
  - cayó al suelo
  - se cayó en tierra
  lexicon: BDAG
  rationale: El imperfecto permite una escena descriptiva, pero en español «se postró en tierra» comunica con dignidad y fidelidad el gesto de abatirse sobre el suelo. «Cayó al suelo» sería más literal, aunque menos natural para el contexto reverente.
- source_word: προσηύχετο
  english_pob_choice: was praying
  chosen_spanish: estaba orando
  alternatives_spanish:
  - oraba
  - seguía orando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada; «estaba orando» preserva ese aspecto durativo. «Oraba» también es posible, pero puede sonar más puntual en español.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  - a fin de que
  lexicon: BDAG
  rationale: En español, dentro de una oración de súplica o contenido volitivo, «para que» refleja con naturalidad la relación introducida por ἵνα. «Que» sería más breve, pero pierde algo de la orientación de finalidad/objeto de la petición.
- source_word: εἰ δυνατόν ἐστιν
  english_pob_choice: if it were possible
  chosen_spanish: si era posible
  alternatives_spanish:
  - si fuera posible
  - si es posible
  lexicon: BDAG
  rationale: Aunque el inglés opta por una forma subjuntiva reportada, en español «si era posible» reproduce bien la contingencia dentro del discurso indirecto y evita una formulación demasiado artificiosa. «Si fuera posible» también sería viable, pero desplaza más al plano hipotético.
- source_word: παρέλθῃ ἀπ’ αὐτοῦ ἡ ὥρα
  english_pob_choice: the hour might pass from him
  chosen_spanish: la hora pasara de él
  alternatives_spanish:
  - la hora pasara de sí
  - la hora pasara de él
  lexicon: BDAG
  rationale: Se conserva «la hora» de manera literal, como expresión cargada teológicamente en Marcos. «Pasara de él» sigue de cerca el griego ἀπ’ αὐτοῦ sin resolver la imagen; aunque suena algo duro en español, mantiene la tensión del texto mejor que una paráfrasis como «se alejara de él».
theological_decisions:
- issue: La expresión «la hora»
  english_pob_reading: Retain 'the hour' as a literal expression for the appointed time of Jesus' suffering and impending death, without paraphrasing it.
  chosen_spanish_reading: Mantener «la hora» literalmente como designación del tiempo señalado de sufrimiento y muerte inminente de Jesús.
  alternative_spanish_readings:
  - el tiempo
  - el momento del sufrimiento
  rationale: En Marcos, «la hora» tiene peso narrativo y teológico propio. Traducirla literalmente preserva esa carga sin diluirla en una explicación interpretativa.
  doctrine_reference: Preservar la tensión teológica del texto en lugar de resolverla.
translation_notes:
  revision_awareness: 'El texto coincide con el último estado revisado: no hubo cambios posteriores según el control de revisión, y el veredicto de concordancia fue alto.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como convención del proyecto cuando corresponde, pero aquí el pasaje no lo requiere.
  - Se prefirió «estaba orando» para reflejar el imperfecto griego y conservar el carácter durativo de la acción.
  - Se evitó convertir «la hora» en una paráfrasis explicativa para respetar la tensión narrativa y teológica del evangelio.
