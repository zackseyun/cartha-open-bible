revisions:
- from: Y avanzando un poco[a], se postró en tierra y estaba orando para que, si era posible, la hora pasara de él.
  to: Y avanzando un poco[a], cayó al suelo y estaba orando para que, si fuera posible, la hora se apartara de él.
  rationale: 'Se corrigen dos puntos principales: 1) «cayó al suelo» reproduce mejor ἔπιπτεν ἐπὶ τῆς γῆς que el más interpretativo «se postró en tierra»; 2) «se apartara de él» ofrece un español natural para παρέλθῃ ἀπ’ αὐτοῦ sin perder el sentido de que ''la hora'' dejara de venir sobre él. Además, «si fuera posible» refleja mejor la contingencia solemne de la petición. Se mantiene «la hora» literalmente por su peso teológico en Marcos, y se conserva la nota de alternativa para προελθὼν μικρὸν.'
