translation:
  language: es
  text: Y al volver, los encontró durmiendo, porque sus ojos estaban cargados[a] de sueño, y no sabían qué responderle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque sus ojos estaban pesados». La imagen griega es que sus ojos estaban siendo cargados o apesadumbrados por el sueño.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Expresa la repetición narrativa de manera natural en español sin añadir matiz interpretativo.
- source_word: ἐλθὼν
  english_pob_choice: coming
  chosen_spanish: volviendo
  alternatives_spanish:
  - habiendo venido
  - cuando volvió
  lexicon: BDAG
  rationale: El participio aoristo encaja bien como acción concomitante; 'volviendo' mantiene la conexión verbal y suena más natural que una forma demasiado literal en español.
- source_word: εὗρεν αὐτοὺς καθεύδοντας
  english_pob_choice: he found them sleeping
  chosen_spanish: los encontró durmiendo
  alternatives_spanish:
  - los encontró dormidos
  lexicon: BDAG
  rationale: '''Durmiendo'' conserva el valor verbal del participio griego y la acción en progreso, como en la decisión inglesa de la POB.'
- source_word: ἦσαν ... καταβαρυνόμενοι
  english_pob_choice: were weighed down
  chosen_spanish: estaban cargados
  alternatives_spanish:
  - estaban pesados
  - estaban siendo agobiados
  lexicon: BDAG
  rationale: La imagen de ser 'pesados' o 'cargados' por el sueño se puede decir en español con 'cargados'; mantiene la metáfora corporal sin forzar un giro raro.
- source_word: οἱ ὀφθαλμοὶ
  english_pob_choice: eyes
  chosen_spanish: ojos
  alternatives_spanish:
  - vista
  - mirada
  lexicon: BDAG
  rationale: Se conserva el referente corporal literal del texto griego, que explica el estado de sueño.
- source_word: οὐκ ᾔδεισαν
  english_pob_choice: they did not know
  chosen_spanish: no sabían
  alternatives_spanish:
  - no conocían
  - no entendían
  lexicon: BDAG
  rationale: '''Saber'' reproduce bien οἶδα aquí como falta de conocimiento para responder, sin convertirlo en una mera dificultad de comprensión.'
- source_word: τί ἀποκριθῶσιν αὐτῷ
  english_pob_choice: what they should answer him
  chosen_spanish: qué responderle
  alternatives_spanish:
  - qué contestarle
  - qué decirle en respuesta
  lexicon: BDAG
  rationale: En español, el infinitivo indirecto 'qué responderle' expresa de manera clara la pregunta indirecta y la dirección de la respuesta hacia Jesús.
translation_notes:
  revision_awareness: 'El texto sigue de cerca la estructura del griego y la auditoría inglesa: πάλιν como repetición narrativa, ἐλθὼν como participio concomitante, εὗρεν αὐτοὺς καθεύδοντας como acción verbal continua, y καταβαρυνόμενοι como imagen de pesadez/carga por el sueño. No se observaron revisiones aplicadas en el expediente inglés; se mantiene el acuerdo alto del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene 'ojos' en sentido literal para οἱ ὀφθαλμοί.
  - Se usa 'responderle' con pronombre enclítico para conservar la relación con αὐτῷ.
  - '''Estaban cargados'' intenta preservar la metáfora de peso sin recurrir a una paráfrasis devocional más libre.'
