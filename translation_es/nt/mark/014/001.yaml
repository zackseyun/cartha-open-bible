base_translation:
  language: en
  yaml_path: translation/nt/mark/014/001.yaml
  text: Now the Passover and Unleavened Bread were two days away[a]. And the chief priests and the scribes were seeking how, by deceit, they might arrest him and kill him[c][b],
  footnotes:
  - marker: a
    text: Or, more literally, 'after two days.' The phrase refers to the Passover and the Feast of Unleavened Bread as imminent.
    reason: lexical_alternative
  - marker: b
    text: Greek 'the unleavened [things],' a customary way of referring to the Feast of Unleavened Bread.
    reason: cultural_note
  - marker: c
    text: Or 'seize him' or 'take him by stealth.'
    reason: alternative_reading
