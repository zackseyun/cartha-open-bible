revisions:
- from: La Pascua y los Panes sin levadura estaban[a] a dos días. Y los principales sacerdotes y los escribas buscaban cómo, con engaño, arrestarlo y matarlo.
  to: Faltaban[a] dos días para la Pascua y los panes sin levadura.[b] Y los principales sacerdotes y los escribas buscaban cómo, con engaño, prenderlo[c] y matarlo.
  rationale: Se ajusta la frase temporal a un español más natural ('Faltaban dos días para...'), se añade la nota cultural que el audit trail inglés preserva para τὰ ἄζυμα, y se cambia 'arrestarlo' por 'prenderlo' para un registro más bíblico y menos administrativo, manteniendo el sentido de captura hostil. También se normaliza la capitalización.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:43:40Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: distingue ''la Pascua'' y ''los Panes sin levadura'', mantiene el imperfecto de ἐζήτουν, expresa ἐν δόλῳ con fuerza moral adecuada y conserva la secuencia de capturarlo y matarlo. Sin embargo, ''estaban[a] a dos días'' suena poco natural en español bíblico general, y ''arrestarlo'' es comprensible pero algo administrativo/moderno frente a un contexto narrativo donde ''prenderlo'' o ''apresarlo'' suena más idiomático y fiel al matiz de κρατήσαντες.'
  spanish_quality_summary: 'La redacción es mayormente clara, moderna y digna. Los puntos a reparar son principalmente de naturalidad: ''a dos días'' no es una formulación ampliamente natural en español neutro, y conviene una expresión temporal más idiomática como ''faltaban dos días'' o ''estaban a dos días de distancia''; la primera es más limpia. También ''Panes'' no necesita mayúscula interna aquí. ''Principales sacerdotes'' y ''escribas'' funcionan bien.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. ''Pascua'' es correcto para πάσχα; ''los panes sin levadura'' preserva el valor de τὰ ἄζυμα sin sobreexpandirlo; ''con engaño'' sigue adecuadamente la decisión documentada para ἐν δόλῳ. El único ajuste lexical recomendado es κρατήσαντες: ''prenderlo'' encaja mejor en registro bíblico natural que ''arrestarlo'', sin perder la idea de captura hostil.'
  issues:
  - severity: medium
    issue: 'Expresión temporal poco natural: ''estaban a dos días'''
    rationale: Aunque intenta reflejar 'were two days away', en español neutro amplio esa construcción resulta extraña. 'Faltaban dos días' comunica con naturalidad la inminencia de μετὰ δύο ἡμέρας y sigue siendo fiel al sentido explicado en la nota.
  - severity: low
    issue: Registro algo moderno/burocrático en 'arrestarlo'
    rationale: κρατήσαντες significa prender, aprehender, agarrar. 'Arrestarlo' no es incorrecto, pero en narrativa evangélica 'prenderlo' suena más idiomático, menos administrativo y mejor integrado al registro bíblico en español.
  - severity: low
    issue: Mayúscula innecesaria en 'Panes sin levadura'
    rationale: En español no hace falta capitalizar 'panes' dentro del nombre descriptivo en este contexto. 'los panes sin levadura' mantiene claridad y mejor conformidad ortográfica.
  revised_spanish_text: Faltaban[a] dos días para la Pascua y los panes sin levadura.[b] Y los principales sacerdotes y los escribas buscaban cómo, con engaño, prenderlo[c] y matarlo.
