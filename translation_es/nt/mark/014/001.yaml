translation:
  language: es
  text: Faltaban[a] dos días para la Pascua y los panes sin levadura.[b] Y los principales sacerdotes y los escribas buscaban cómo, con engaño, prenderlo[c] y matarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de dos días». La expresión señala la cercanía de la Pascua y de los panes sin levadura.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «los sin levadura», una manera acostumbrada de referirse a los panes sin levadura o a la fiesta asociada con ellos.'
    reason: cultural_note
  - marker: c
    text: 'O: «apresarlo» o «capturarlo a escondidas».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἦν δὲ
  english_pob_choice: Now ... were
  chosen_spanish: estaban
  alternatives_spanish:
  - era
  - estaba
  lexicon: BDAG
  rationale: El griego introduce la escena con valor de marco temporal, y el sujeto compuesto en español funciona naturalmente en plural con "estaban". Se evita forzar un calco con "ahora" si no aporta claridad adicional en español.
- source_word: τὸ πάσχα
  english_pob_choice: the Passover
  chosen_spanish: la Pascua
  alternatives_spanish:
  - el Pascua
  - la fiesta de Pascua
  lexicon: BDAG
  rationale: '"Pascua" es el equivalente normal y fiel en español para la festividad judía. Mantiene el referente festivo del contexto sin añadir explicación innecesaria.'
- source_word: τὰ ἄζυμα
  english_pob_choice: Unleavened Bread
  chosen_spanish: los Panes sin levadura
  alternatives_spanish:
  - los ázimos
  - la fiesta de los Panes sin levadura
  lexicon: BDAG
  rationale: El griego dice literalmente "las cosas sin levadura" y, en contexto festivo, alude a la celebración. En español, "los Panes sin levadura" conserva la referencia tradicional al período/fiesta sin expandirlo a "fiesta de..." más de lo que exige el texto.
- source_word: μετὰ δύο ἡμέρας
  english_pob_choice: were two days away
  chosen_spanish: a dos días
  alternatives_spanish:
  - después de dos días
  - en dos días
  lexicon: BDAG
  rationale: La expresión española "a dos días" comunica una proximidad temporal equivalente a la construcción griega, de manera natural y breve. Evita el calco más rígido de "después de dos días" cuando el contexto apunta a inminencia.
- source_word: ἐζήτουν
  english_pob_choice: were seeking
  chosen_spanish: buscaban
  alternatives_spanish:
  - andaban buscando
  - seguían buscando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o reiterada; "buscaban" conserva esa idea sin sonar forzado. En este contexto, el verbo introduce su intento persistente de encontrar la manera de actuar.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: '"Principales sacerdotes" comunica bien el plural del grupo dirigente sacerdotal y evita reducirlo a una sola figura. Es una forma clara y digna en español bíblico contemporáneo.'
- source_word: οἱ γραμματεῖς
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la Ley
  lexicon: BDAG
  rationale: '"Escribas" es el equivalente lexical directo y suficientemente comprensible en español. Se conserva el término tradicional sin reemplazarlo por una glosa interpretativa.'
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: Se mantiene la pregunta de modo directa y natural en español.
- source_word: ἐν δόλῳ
  english_pob_choice: by deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - por engaño
  - con astucia
  - a traición
  lexicon: BDAG
  rationale: '"δόλος" implica engaño, fraude o astucia engañosa. "Con engaño" preserva la fuerza moral del término sin desplazarlo hacia una mera idea de secreto; eso coincide con la decisión inglesa de mantener explícito el carácter deceptivo.'
- source_word: κρατήσαντες
  english_pob_choice: arrest him
  chosen_spanish: arrestarlo
  alternatives_spanish:
  - aprehenderlo
  - prenderlo
  - tomarlo preso
  lexicon: BDAG
  rationale: En este contexto hostil y de autoridades, el verbo apunta a una captura con intención de custodia. "Arrestarlo" comunica bien esa acción en español contemporáneo, manteniendo el sentido de tomarlo bajo control.
- source_word: ἀποκτείνωσιν
  english_pob_choice: kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - darle muerte
  - hacerlo morir
  lexicon: BDAG
  rationale: El verbo significa quitar la vida; "matarlo" es directo, claro y fiel al texto. No se introduce una formulación más jurídica o solemne que el griego no requiere.
theological_decisions:
- issue: Relación entre Pascua y Panes sin levadura
  english_pob_reading: 'Render both terms distinctly: ''the Passover and the Feast of Unleavened Bread'' / later revised to ''the Passover and Unleavened Bread'''
  chosen_spanish_reading: 'Mantener ambos términos de forma distinta: "la Pascua y los Panes sin levadura"'
  alternative_spanish_readings:
  - '"la Pascua" como nombre global de la fiesta'
  - '"la Pascua y la fiesta de los Panes sin levadura"'
  rationale: El griego enumera dos expresiones relacionadas pero distintas. El español conserva esa distinción sin fusionarlas en un solo nombre festivo, y tampoco añade "fiesta de" porque el último audit trail inglés revisado se acercó más al griego al omitirlo.
  doctrine_reference: Translation philosophy §1, §5
- issue: Carácter moral de la trama de los líderes
  english_pob_reading: Explicitly render ἐν δόλῳ as 'by deceit'
  chosen_spanish_reading: Expresar ἐν δόλῳ como "con engaño"
  alternative_spanish_readings:
  - '"en secreto"'
  - '"con astucia"'
  rationale: El texto no solo habla de ocultamiento, sino de intención engañosa. "Con engaño" conserva esa carga ética y no diluye el juicio implícito en el término griego.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'He seguido el estado revisado más cercano al griego en el audit trail inglés: "Unleavened Bread" sin expandir a "Feast of". En español, la formulación "los Panes sin levadura" conserva ese ajuste y mantiene la referencia festiva implícita del contexto. También he reflejado el valor durativo del imperfecto con un verbo en pasado progresivo natural en español.'
  spanish_consistency_notes:
  - Se usa "Pascua" para πάσχα, conforme al uso bíblico normal en español.
  - Se usa "Panes sin levadura" para τὰ ἄζυμα, evitando una expansión interpretativa excesiva.
  - Se mantiene "escribas" y no "maestros de la Ley" para seguir el valor léxico directo.
  - '"Con engaño" conserva la fuerza moral de δόλῳ y armoniza con la lectura inglesa auditada.'
  - Se evita "SEÑOR" u otra sustitución que no corresponde en este versículo.
