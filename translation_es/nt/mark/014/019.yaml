  rationale: Se revisa solo la pregunta final para preservar mejor el valor de μήτι como partícula que espera una respuesta negativa, en línea con la evidencia griega y la auditoría inglesa. «¿No seré yo?» es natural en español, mantiene el tono de inquietud de los discípulos y evita la ambigüedad pragmática de «¿Acaso yo?». La nota se ajusta para ofrecer la alternativa más literal.
