translation:
  language: es
  text: 'Comenzaron a entristecerse y a decirle[a], uno por uno: «¿No seré yo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «¿No soy yo?». La pregunta griega usa μήτι, que espera una respuesta negativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντο
  english_pob_choice: They began
  chosen_spanish: Comenzaron
  alternatives_spanish:
  - Empezaron
  lexicon: BDAG
  rationale: El aoristo medio de ἄρχω con infinitivos complementarios expresa el inicio de la acción; «comenzaron» conserva ese valor inceptivo con naturalidad en español.
- source_word: λυπεῖσθαι
  english_pob_choice: to be grieved
  chosen_spanish: entristecerse
  alternatives_spanish:
  - afligirse
  - ponerse tristes
  - sentir tristeza
  lexicon: BDAG
  rationale: El infinitivo pasivo/incoativo pide un verbo de volverse triste o afligido. «Entristecerse» mantiene esa dinámica sin forzar una formulación demasiado interpretativa.
- source_word: καὶ λέγειν
  english_pob_choice: and to say
  chosen_spanish: y a decir
  alternatives_spanish:
  - y a preguntar
  lexicon: BDAG
  rationale: λέγω significa primariamente «decir / hablar»; aunque el contenido es interrogativo, traducirlo como «preguntar» haría más específico al verbo que el griego. La construcción con infinitivo se conserva en español con «a decir».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El griego usa un pronombre dativo y no nombra a Jesús; «le» mantiene la referencia discursiva implícita sin explicitar innecesariamente el referente.
- source_word: εἷς κατὰ εἷς
  english_pob_choice: one by one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - uno tras otro
  - cada uno por turno
  lexicon: BDAG
  rationale: La expresión distributiva indica respuestas individuales y sucesivas. «Uno por uno» es idiomático y fiel al valor distributivo.
- source_word: Μήτι ἐγώ;
  english_pob_choice: Surely not I?
  chosen_spanish: ¿Acaso yo?
  alternatives_spanish:
  - ¿No seré yo?
  - ¿Soy yo acaso?
  lexicon: BDAG
  rationale: μήτι espera una respuesta negativa. En español, una pregunta breve como «¿Acaso yo?» puede transmitir la inquietud y la expectativa de negación sin añadir elementos ajenos al griego. Se evita una paráfrasis más explícita que cierre demasiado el matiz interrogativo.
theological_decisions:
- issue: Fuerza de la pregunta de los discípulos
  english_pob_reading: 'Render the question as expecting a negative answer: ''Surely not I?'''
  chosen_spanish_reading: 'La pregunta se traduce de modo que implique una respuesta negativa esperada: «¿Acaso yo?»'
  alternative_spanish_readings:
  - ¿Soy yo?
  - ¿Soy yo acaso?
  - ¿No seré yo?
  rationale: El partícula μήτι presupone una respuesta negativa. «¿Acaso yo?» preserva la inquietud y el valor implícito de rechazo sin convertir la pregunta en una fórmula demasiado explicativa.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto traducido junto al verbo correspondiente.
  spanish_consistency_notes:
  - Se mantiene el registro sobrio y bíblico, sin recurrir a la fórmula eclesiástica tradicional «¿Seré yo, Señor?» porque el griego aquí no incluye «Señor» ni el texto auditado lo documenta.
  - «Uno por uno» conserva el valor distributivo de εἷς κατὰ εἷς.
  - Se evita explicitar «a Jesús» para respetar el pronombre αὐτῷ del original.
