translation:
  language: es
  text: 'Y llega y los encuentra durmiendo[a], y le dice a Pedro: «Simón, ¿estás durmiendo? ¿No pudiste mantenerte despierto una hora?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿No pudiste velar una hora?»
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: llega
  alternatives_spanish:
  - viene
  - se acerca
  lexicon: BDAG
  rationale: En español, «llega» comunica con naturalidad el presente histórico de Marcos y conserva la vividez narrativa sin sonar forzado.
- source_word: εὑρίσκει
  english_pob_choice: finds
  chosen_spanish: los encuentra
  alternatives_spanish:
  - los halla
  - los ve
  lexicon: BDAG
  rationale: «Encuentra» mantiene el matiz de hallar a los discípulos en cierto estado, sin perder claridad en español.
- source_word: καθεύδοντας
  english_pob_choice: sleeping
  chosen_spanish: durmiendo
  alternatives_spanish:
  - dormidos
  - asleep
  lexicon: BDAG
  rationale: El participio describe una acción en curso; «durmiendo» conserva mejor ese valor verbal que un adjetivo como «dormidos».
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - dice
  - les dice
  lexicon: BDAG
  rationale: Se mantiene el presente narrativo. En el discurso directo, «le dice» refleja de forma natural que la reprensión va dirigida a Pedro.
- source_word: τῷ Πέτρῳ
  english_pob_choice: to Peter
  chosen_spanish: a Pedro
  alternatives_spanish:
  - a Petros
  lexicon: BDAG
  rationale: Se usa la forma establecida en español, Pedro, por claridad y uso eclesial amplio.
- source_word: Σίμων
  english_pob_choice: Simon
  chosen_spanish: Simón
  lexicon: BDAG
  rationale: Se conserva el nombre distinto con el que Jesús lo llama aquí, separado de «Pedro», como en el griego.
- source_word: καθεύδεις
  english_pob_choice: are you sleeping
  chosen_spanish: ¿estás durmiendo?
  alternatives_spanish:
  - ¿duermes?
  - ¿estás dormido?
  lexicon: BDAG
  rationale: El presente interrogativo directo se expresa de modo natural con «estás durmiendo», preservando el tono de reproche inmediato.
- source_word: οὐκ ἴσχυσας
  english_pob_choice: were you not able
  chosen_spanish: ¿No pudiste
  alternatives_spanish:
  - ¿No fuiste capaz de
  - ¿No lograste
  lexicon: BDAG
  rationale: «Ἰσχύω» aquí expresa incapacidad o falta de fuerza para sostener la vigilia; «pudiste» refleja bien esa imposibilidad sin introducir una idea de fuerza física más pesada.
- source_word: μίαν ὥραν
  english_pob_choice: one hour
  chosen_spanish: una hora
  alternatives_spanish:
  - una sola hora
  lexicon: BDAG
  rationale: La expresión temporal se vierte de forma directa y natural en español.
- source_word: γρηγορῆσαι
  english_pob_choice: to stay awake
  chosen_spanish: mantenerte despierto
  alternatives_spanish:
  - velar
  - permanecer despierto
  lexicon: BDAG
  rationale: En este contexto inmediato, el contraste es con dormir; «mantenerte despierto» comunica con claridad la vigilia requerida, sin perder la nota de alerta.
theological_decisions:
- issue: Presente histórico en la narración
  english_pob_reading: Kept the main narrative verbs in the present tense ('comes,' 'finds,' 'says').
  chosen_spanish_reading: Se conservan los verbos principales en presente («llega», «encuentra», «dice»).
  alternative_spanish_readings:
  - Pasarlos al pretérito («llegó», «encontró», «dijo»).
  rationale: 'No es una cuestión doctrinal, pero sí estilística: el presente histórico de Marcos aporta viveza y cercanía. El español puede reflejarlo de manera natural.'
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de γρηγορέω en este contexto
  english_pob_reading: Translated as 'stay awake.'
  chosen_spanish_reading: Se traduce como «mantenerte despierto».
  alternative_spanish_readings:
  - «velar»
  - «vigilar»
  - «estar alerta»
  rationale: Aunque el trasfondo de vigilancia está presente en el pasaje, aquí la oposición inmediata es con el sueño. «Mantenerte despierto» hace explícita esa relación sin borrar el matiz de vigilancia.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que prefirió 'were you not able' frente a 'were you not strong enough'. Por eso la pregunta española usa «¿No pudiste…?» y evita una formulación centrada en la fuerza física.
  spanish_consistency_notes:
  - Se mantiene la distinción entre «Pedro» como referencia narrativa y «Simón» como vocativo.
  - Se conserva el presente histórico en los verbos principales para reflejar el estilo de Marcos.
  - «Durmiendo» se eligió para representar mejor el participio verbal griego.
  - La nota al pie ofrece la alternativa «velar», que en español puede acercarse al valor de vigilancia del verbo griego.
