  text: καὶ ἔρχεται τὸ τρίτον καὶ λέγει αὐτοῖς· Καθεύδετε ⸀τὸ λοιπὸν καὶ ἀναπαύεσθε· ἀπέχει· ἦλθεν ἡ ὥρα, ἰδοὺ παραδίδοται ὁ υἱὸς τοῦ ἀνθρώπου εἰς τὰς χεῖρας τῶν ἁμαρτωλῶν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/041.yaml
  text: And he comes the third time and says to them[a], “Are you still sleeping and resting? It is enough; the hour has come. Look[c][b], the Son of Man is being handed over into the hands of sinners.”
  footnotes:
  - marker: a
    text: Or, 'Are you still sleeping and resting?' The Greek wording can be taken either as an ironic statement/permission or as a rhetorical question.
    reason: alternative_reading
  - marker: b
    text: Or, more literally, 'for the rest' after 'Sleep on'; the phrase is idiomatic and difficult in context.
    reason: lexical_alternative
  - marker: c
    text: '''It is enough'' translates a difficult expression. Other proposals include ''Enough!'' or, less likely here, a commercial sense such as ''the payment is received in full.'''
    reason: lexical_alternative
