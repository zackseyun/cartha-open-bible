translation:
  language: es
  text: 'Y él viene por tercera vez y les dice[a]: “¿Siguen durmiendo y descansando[b]? Basta[c]; ha llegado la hora. Miren, el Hijo del Hombre está siendo entregado en manos de pecadores.”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “¿Siguen durmiendo y descansando?”. El griego puede leerse como una pregunta de reproche o como una concesión irónica.'
    reason: alternative_reading
  - marker: b
    text: O, más literalmente, “para el resto” después de “duermen”. La frase griega es idiomática y difícil en este contexto.
    reason: lexical_alternative
  - marker: c
    text: “Basta” traduce una expresión difícil. Otras propuestas incluyen “¡Basta!” o, menos probablemente aquí, un sentido comercial como “el pago se ha recibido por completo”.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται τὸ τρίτον
  english_pob_choice: he comes the third time
  chosen_spanish: viene por tercera vez
  alternatives_spanish:
  - viene una tercera vez
  - vino por tercera vez
  lexicon: BDAG
  rationale: Conservo el presente narrativo con viene para mantener vividez, y τὸ τρίτον se expresa naturalmente como por tercera vez. La alternativa una tercera vez es posible, pero por tercera vez es más directa y estándar en español.
- source_word: Καθεύδετε
  english_pob_choice: Are you still sleeping? / Sleep on
  chosen_spanish: ¿Siguen durmiendo
  alternatives_spanish:
  - ¿Aún están durmiendo?
  - Duerman
  lexicon: BDAG
  rationale: Sigo la lectura auditada que entiende la forma como pregunta/reproche más que como mandato simple. En español, siguen durmiendo comunica el presente progresivo y conserva la fuerza retórica sin forzar un imperativo que el contexto hace incierto.
- source_word: τὸ λοιπὸν καὶ ἀναπαύεσθε
  english_pob_choice: and resting
  chosen_spanish: y descansando
  alternatives_spanish:
  - y reposando
  - y tómense su descanso
  lexicon: BDAG
  rationale: ἀναπαύεσθε se rinde como descansando para sostener el paralelismo con durmiendo. Evito hacer explícito el matiz idiomático de τὸ λοιπὸν en el texto principal porque la frase es difícil y el audit trail lo reconoce como debatido.
- source_word: ἀπέχει
  english_pob_choice: It is enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - ¡Basta!
  lexicon: BDAG
  rationale: Basta reproduce bien el valor idiomático e imperativo/exclamativo que mejor encaja en el contexto. Es una solución natural en español y conserva la dificultad lexical sin resolverla de manera excesivamente explicativa.
- source_word: ἦλθεν ἡ ὥρα
  english_pob_choice: the hour has come
  chosen_spanish: ha llegado la hora
  alternatives_spanish:
  - ha venido la hora
  - ha llegado el momento
  lexicon: BDAG
  rationale: Hora se mantiene para conservar la resonancia teológica del momento señalado. Ha llegado la hora es la forma más natural y fiel en español.
- source_word: ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  lexicon: BDAG
  rationale: Miren transmite la fuerza deíctica de ἰδοὺ en un español actual y comunitario, sin el arcaísmo de he aquí o mirad.
- source_word: παραδίδοται
  english_pob_choice: is being handed over
  chosen_spanish: está siendo entregado
  alternatives_spanish:
  - está siendo entregado en manos de
  - es entregado
  - está siendo traicionado
  lexicon: BDAG
  rationale: Elijo entregar/ser entregado para preservar el alcance de παραδίδωμι sin reducirlo a traición solamente. La perífrasis está siendo entregado mantiene el valor pasivo actual y narrativo; en contexto la frase se completa con en manos de pecadores.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Mantengo la designación tradicional como título, porque la frase funciona de modo establecido en el marco sinóptico y el audit trail la preserva como referencia titular.
- source_word: εἰς τὰς χεῖρας
  english_pob_choice: into the hands of
  chosen_spanish: en manos de
  alternatives_spanish:
  - a manos de
  - en poder de
  lexicon: BDAG
  rationale: En manos de conserva la imagen concreta de transferencia al poder de otro mejor que a manos de, y es natural en español bíblico contemporáneo.
- source_word: τῶν ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - hombres pecadores
  - malvados
  lexicon: BDAG
  rationale: Pecadores reproduce el sustantivo con precisión y evita añadir una especificación de género o un matiz moral más fuerte que el griego no exige.
theological_decisions:
- issue: Force of Καθεύδετε ... καὶ ἀναπαύεσθε
  english_pob_reading: A rhetorical question / rebuke rather than a simple imperative.
  chosen_spanish_reading: 'Una pregunta de reproche: “¿Siguen durmiendo y descansando?”'
  alternative_spanish_readings:
  - 'Un permiso irónico: “Duerman ahora y descansen.”'
  - 'Un mandato simple: “Sigan durmiendo y descansando.”'
  rationale: La puntuación y la sintaxis griegas no cierran el sentido. La lectura interrogativa encaja con la revisión auditada y con el giro dramático que introduce ἀπέχει; por eso la reflejo en español, preservando la tensión sin resolverla artificialmente.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Meaning of ἀπέχει
  english_pob_reading: Idiomatic 'It is enough.'
  chosen_spanish_reading: ‘Basta’ como expresión idiomática de suficiencia o corte decisivo.
  alternative_spanish_readings:
  - ‘Es suficiente’
  - ‘¡Basta!’ con matiz exclamativo
  rationale: La frase es difícil y el contexto sugiere una interrupción decisiva. Basta comunica esa suficiencia sin introducir una explicación comercial o una paráfrasis ajena al texto.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Rendering παραδίδοται
  english_pob_reading: '''is being handed over'' rather than ''is betrayed'''
  chosen_spanish_reading: '''está siendo entregado'' en lugar de ''es traicionado'''
  alternative_spanish_readings:
  - '''es entregado'''
  - '''está siendo traicionado'''
  rationale: Sostengo el sentido amplio de παραδίδωμι, evitando reducir la acción al acto de Judas. Así se conserva la dimensión narrativa y teológica de la pasión.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se atendió la revisión más reciente que favorece una lectura interrogativa de Καθεύδετε τὸ λοιπὸν καὶ ἀναπαύεσθε; por eso la traducción principal usa pregunta de reproche y conserva ἀπέχει como Basta. También se mantuvo la distinción entre entregar y traicionar para no estrechar παραδίδοται.
  spanish_consistency_notes:
  - Se usa Hijo del Hombre como título establecido, de acuerdo con el audit trail.
  - Se evita SEÑOR y Cristo porque el versículo no los contiene.
  - Se conserva la imagen concreta de manos para χεῖρας.
  - Los marcadores de nota [a], [b] y [c] aparecen exactamente en el texto principal y corresponden a notas ancladas.
