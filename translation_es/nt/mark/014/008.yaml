translation:
  language: es
  text: Ella hizo lo que pudo[a]; ungió mi cuerpo de antemano para la sepultura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Lo que tenía, lo hizo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: BDAG
  rationale: El relativo neutro funciona sustantivado; «lo que» reproduce bien el sentido idiomático de «lo que tenía / podía hacer» en un español natural.
- source_word: ἔσχεν
  english_pob_choice: could
  chosen_spanish: pudo
  alternatives_spanish:
  - tenía
  - había
  lexicon: BDAG
  rationale: Aunque el sentido literal es «tenía», en la unidad idiomática «ὃ ἔσχεν ἐποίησεν» el valor comunicado es capacidad/posibilidad; «pudo» conserva esa fuerza sin volver la frase artificial.
- source_word: ἐποίησεν
  english_pob_choice: she did
  chosen_spanish: hizo
  alternatives_spanish:
  - ha hecho
  - hizo ella
  lexicon: BDAG
  rationale: El aoristo resume una acción completa; «hizo» es la equivalencia directa y idiomática en español.
- source_word: προέλαβεν
  english_pob_choice: beforehand
  chosen_spanish: de antemano
  alternatives_spanish:
  - antes
  - previamente
  lexicon: BDAG
  rationale: La forma verbal expresa que la acción ocurrió antes de lo esperado; «de antemano» comunica ese matiz adverbial con naturalidad en español.
- source_word: μυρίσαι
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - perfumó
  - aplicó ungüento a
  lexicon: BDAG
  rationale: En el contexto funerario, el gesto de aplicar perfume/ungüento se expresa bien con «ungió», que mantiene la referencia material sin perder la asociación tradicional del acto.
- source_word: τὸ σῶμά μου
  english_pob_choice: my body
  chosen_spanish: mi cuerpo
  alternatives_spanish:
  - mi cuerpo muerto
  - mi cadáver
  lexicon: BDAG
  rationale: La frase es directa y literal; «mi cuerpo» preserva el objeto del verbo sin introducir una especificación no presente en el griego.
- source_word: εἰς τὸν ἐνταφιασμόν
  english_pob_choice: for burial
  chosen_spanish: para la sepultura
  alternatives_spanish:
  - para el entierro
  - para el sepulcro
  lexicon: BDAG
  rationale: El sustantivo ἐνταφιασμός se refiere al acto de sepultar; «sepultura» es natural, reverente y precisa en español, sin volverlo más técnico de lo necesario.
theological_decisions:
- issue: Suministro del sujeto implícito en la cláusula
  english_pob_reading: She did what she could; she anointed my body beforehand for burial.
  chosen_spanish_reading: Ella hizo lo que pudo; ungió mi cuerpo de antemano para la sepultura.
  alternative_spanish_readings:
  - Lo que pudo, lo hizo; ungió mi cuerpo de antemano para la sepultura.
  rationale: El griego presenta verbos en tercera persona singular sin sujeto explícito en esta cláusula, pero el contexto inmediato identifica a la mujer. Añadir «Ella» hace la oración natural en español y no altera el contenido teológico.
  doctrine_reference: Principio POB de primacía del texto original y claridad idiomática
- issue: Valor de προέλαβεν en relación con la unción funeraria
  english_pob_reading: she anointed my body beforehand for burial.
  chosen_spanish_reading: ungió mi cuerpo de antemano para la sepultura.
  alternative_spanish_readings:
  - ungió mi cuerpo antes para la sepultura
  - se anticipó a ungir mi cuerpo para la sepultura
  rationale: El verbo apunta a la acción realizada antes del entierro, no a un desplazamiento. Por eso se conserva el matiz temporal con «de antemano» sin expandir indebidamente el verbo.
  doctrine_reference: Transparencia semántica y precisión aspectual
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora aparece anclada en el texto español exacto en el lugar correspondiente. La redacción mantiene la fuerza idiomática del griego y conserva la alternativa literal documentada por el POB inglés.'
  spanish_consistency_notes:
  - Se eligió «Yahvé» como estándar general, pero este versículo no contiene el nombre divino.
  - «Ungió» conserva el campo semántico funerario de μυρίσαι sin sobrecargar la frase.
  - «Sepultura» transmite mejor el acto de enterramiento que un tecnicismo como «entombment».
  - La nota al pie usa una alternativa literal útil sin duplicar marcadores ni dejar notas sin ancla.
