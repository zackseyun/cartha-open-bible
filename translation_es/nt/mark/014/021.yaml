revisions:
- from: Porque el Hijo del Hombre va[a] tal como está escrito acerca de él; pero ¡ay de aquel hombre por medio de quien el Hijo del Hombre es entregado! Mejor le sería a ese hombre no haber nacido.
  to: Porque el Hijo del Hombre va tal como está escrito acerca de él, pero ¡ay de aquel hombre por medio de quien el Hijo del Hombre es traicionado[a]! Mejor le sería a aquel hombre no haber nacido.
  rationale: Se reubica la nota al verbo correcto y se ajusta παραδίδοται a «es traicionado» para seguir la decisión principal del POB inglés en este contexto pasional, conservando «es entregado» como alternativa más literal en nota. También se mantiene «aquel hombre» en la segunda referencia para reflejar mejor la repetición enfática del demostrativo griego.
