    reason: lexical_alternative
  revision_rationale: Se reubica la nota al verbo correcto y se ajusta παραδίδοται a «es traicionado» para seguir la decisión principal del POB inglés en este contexto pasional, conservando «es entregado» como alternativa más literal en nota. También se mantiene «aquel hombre» en la segunda referencia para reflejar mejor la repetición enfática del demostrativo griego.
