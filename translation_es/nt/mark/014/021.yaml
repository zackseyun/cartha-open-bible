  text: ⸀ὅτι ὁ μὲν υἱὸς τοῦ ἀνθρώπου ὑπάγει καθὼς γέγραπται περὶ αὐτοῦ, οὐαὶ δὲ τῷ ἀνθρώπῳ ἐκείνῳ δι’ οὗ ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται· ⸀καλὸν αὐτῷ εἰ οὐκ ἐγεννήθη ὁ ἄνθρωπος ἐκεῖνος.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/021.yaml
  text: For the Son of Man goes just as it is written about him[a], but woe to that man through whom the Son of Man is betrayed. It would have been good for him if that man had not been born.
  footnotes:
