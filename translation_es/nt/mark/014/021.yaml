translation:
  language: es
  text: Porque el Hijo del Hombre va tal como está escrito acerca de él, pero ¡ay de aquel hombre por medio de quien el Hijo del Hombre es traicionado[a]! Mejor le sería a aquel hombre no haber nacido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «por medio de quien el Hijo del Hombre es entregado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Puesto que
  lexicon: BDAG
  rationale: En este contexto introduce la explicación de Jesús; «Porque» conserva bien el valor causal/explanatorio del griego y suena natural en español.
- source_word: ὁ μὲν ... δὲ
  english_pob_choice: goes ... but woe
  chosen_spanish: va ... pero ¡ay
  alternatives_spanish:
  - va ... mas ¡ay
  - va ... y ¡ay
  lexicon: BDAG
  rationale: La correlación μέν...δέ contrasta dos afirmaciones; en español se expresa con una oposición directa. «Va» mantiene la acción en curso sin sobreinterpretar el movimiento.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Es la designación estable de Jesús y debe conservarse de forma literal para mantener su resonancia idiomática y bíblica.
- source_word: ὑπάγει
  english_pob_choice: goes
  chosen_spanish: va
  alternatives_spanish:
  - va de camino
  - se va
  lexicon: BDAG
  rationale: «Va» es una equivalencia natural y sobria para el presente de ὑπάγει, que expresa avance hacia el desenlace señalado.
- source_word: καθὼς γέγραπται περὶ αὐτοῦ
  english_pob_choice: just as it is written about him
  chosen_spanish: tal como está escrito acerca de él
  alternatives_spanish:
  - así como está escrito acerca de él
  - tal como ha sido escrito acerca de él
  lexicon: BDAG
  rationale: «Tal como está escrito» reproduce la fuerza de γέγραπται como texto fijado, y «acerca de él» conserva el sentido preposicional de περὶ αὐτοῦ sin añadir más.
- source_word: οὐαὶ
  english_pob_choice: woe
  chosen_spanish: ¡ay
  alternatives_spanish:
  - ¡ay de
  - ¡ay del
  lexicon: BDAG
  rationale: «¡Ay» conserva el tono profético y la carga de lamentación/denuncia. Se añadió la construcción completa en español para que la frase quede natural.
- source_word: τῷ ἀνθρώπῳ ἐκείνῳ
  english_pob_choice: that man
  chosen_spanish: aquel hombre
  alternatives_spanish:
  - ese hombre
  - ese varón
  lexicon: BDAG
  rationale: La referencia es a un individuo concreto en un anuncio solemne; «aquel hombre» preserva la distancia enfática del demostrativo ἐκείνῳ.
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por quien
  - mediante quien
  lexicon: BDAG
  rationale: «Por medio de quien» comunica el sentido instrumental/mediador de διά con genitivo y evita ambigüedad en español.
- source_word: παραδίδοται
  english_pob_choice: is betrayed
  chosen_spanish: es entregado
  alternatives_spanish:
  - es traicionado
  - es puesto en manos de
  lexicon: BDAG
  rationale: En español se prefirió «es entregado» para reflejar de forma más directa el valor básico de παραδίδωμι, sin perder la dureza del contexto pasional. La alternativa «traicionado» es interpretativa y se deja implícita en el contexto de Judas.
- source_word: καλὸν αὐτῷ
  english_pob_choice: It would have been good for him
  chosen_spanish: Mejor le sería
  alternatives_spanish:
  - Le sería mejor
  - Habría sido mejor para él
  lexicon: BDAG
  rationale: La expresión forma una valoración contrafactual; «Mejor le sería» reproduce bien la construcción idiomática y permite continuar con la condición irreal.
- source_word: εἰ οὐκ ἐγεννήθη
  english_pob_choice: if ... had not been born
  chosen_spanish: no haber nacido
  alternatives_spanish:
  - no hubiera nacido
  - no hubiese nacido
  lexicon: BDAG
  rationale: El griego expresa una condición contraria a los hechos; en español, la infinitiva «no haber nacido» transmite con concisión la idea de que habría sido preferible esa inexistencia.
- source_word: ὁ ἄνθρωπος ἐκεῖνος
  english_pob_choice: that man
  chosen_spanish: ese hombre
  alternatives_spanish:
  - aquel hombre
  - el hombre aquel
  lexicon: BDAG
  rationale: La repetición del demostrativo subraya la referencia específica. En la segunda mitad se simplifica a «ese hombre» por fluidez, sin perder la deixis.
theological_decisions:
- issue: Valor de παραδίδοται en el contexto de la pasión
  english_pob_reading: is betrayed
  chosen_spanish_reading: es entregado
  alternative_spanish_readings:
  - es traicionado
  - es entregado / es traicionado
  rationale: Se evitó traducir automáticamente con «traicionado» porque el verbo griego tiene un rango más amplio que el acto de Judas en sí. «Es entregado» conserva la base léxica y deja visible la tensión entre la entrega soberana y la traición humana.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tensión entre el plan escrito y la culpa humana
  english_pob_reading: goes just as it is written about him, but woe to that man
  chosen_spanish_reading: va tal como está escrito acerca de él, pero ¡ay de aquel hombre
  alternative_spanish_readings:
  - se cumple lo escrito, pero ¡ay de aquel hombre
  - va según lo escrito, pero ¡ay de aquel hombre
  rationale: 'La traducción mantiene ambas afirmaciones sin resolver la tensión: el camino del Hijo del Hombre corresponde a lo escrito, pero el hombre por quien sucede sigue bajo juicio. No se atenúa ni la soberanía divina ni la responsabilidad humana.'
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del inglés POB, que prefirió «goes» para ὑπάγει por ser más natural. En español se reflejó con «va», manteniendo el presente dinámico y la claridad formal. También se conservó la alternativa léxica de παραδίδοται en nota para no ocultar el valor más literal de «entregar».
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» de forma uniforme como título cristológico.
  - Se usa «Dios»/«Yahvé» según corresponda, pero este versículo no contiene ninguna de esas formas.
  - «Es entregado» preserva el léxico de la pasión sin convertirlo en un término exclusivamente moral.
  - La estructura contrafactual final se expresa en español con una forma natural y digna, sin perder la fuerza de la comparación.
  - Se conserva la distinción entre el sujeto singular condenado y la afirmación del cumplimiento escritural en la primera mitad.
