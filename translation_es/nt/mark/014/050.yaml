translation:
  language: es
  text: Y dejándolo[a], todos huyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'dejándolo: también puede entenderse como “abandonándolo”; el griego ἀφέντες puede llevar esa fuerza en este contexto de huida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción coordinante mantiene el flujo narrativo simple del griego. En español, 'Y' conserva la conexión directa con la escena anterior sin añadir matiz temporal o inferencial no expresado en el texto.
- source_word: ἀφέντες
  english_pob_choice: leaving
  chosen_spanish: dejándolo
  alternatives_spanish:
  - abandonándolo
  - dejándolo atrás
  lexicon: BDAG
  rationale: El participio aoristo de ἀφίημι aquí expresa dejar a Jesús atrás al huir. 'Dejándolo' es natural en español y refleja la acción participial sin intensificarla más de lo que exige el griego; 'abandonándolo' es posible, pero añade un tono más enfático.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre objeto se refiere a Jesús. En español, 'lo' mantiene la referencia directa y evita una repetición innecesaria del nombre, que el contexto ya identifica claramente.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: BDAG
  rationale: El aoristo de φεύγω comunica huida ante el peligro. 'Huyeron' preserva la gravedad del acto y es idiomático en español; 'escaparon' puede sugerir éxito, y 'salieron corriendo' es más coloquial.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los discípulos
  lexicon: BDAG
  rationale: El énfasis recae en la totalidad de los que estaban con él. 'Todos' conserva ese alcance total de forma natural en español; el sujeto ya está claro por el verbo.
theological_decisions:
- issue: Deserción total de los discípulos
  english_pob_reading: they all fled
  chosen_spanish_reading: todos huyeron
  alternative_spanish_readings:
  - huyeron todos
  - todos ellos huyeron
  rationale: La frase debe transmitir la totalidad del abandono sin suavizarla. 'Todos huyeron' conserva el sentido pleno del griego y la lectura auditada de la POB en inglés.
  doctrine_reference: 'Principio de traducción: mantener el sentido llano del texto fuente sin introducir explicaciones doctrinales o atenuaciones.'
translation_notes:
  revision_awareness: La validación previa falló porque el marcador de nota no aparecía en el texto. Se corrigió anclando [a] directamente en la palabra correspondiente de la traducción.
  spanish_consistency_notes:
  - Se usó 'Y' para conservar la coordinación simple del griego καὶ.
  - '''Huyeron'' mantiene el registro sobrio y la gravedad narrativa de φεύγω.'
  - '''Todos'' preserva la totalidad de πάντες sin añadir un sujeto explícito innecesario.'
  - La nota [a] está anclada exactamente en 'dejándolo' para cumplir con el formato requerido.
