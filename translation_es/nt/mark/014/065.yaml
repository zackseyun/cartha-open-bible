translation:
  language: es
  text: 'Y algunos comenzaron a escupirle, y a cubrirle el rostro[a], y a golpearlo con los puños, y a decirle: «¡Profetiza!». Y los oficiales lo recibieron con golpes[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vendarle los ojos». El griego dice literalmente «cubrirle el rostro».
    reason: lexical_alternative
  - marker: b
    text: O «los oficiales lo trataron a golpes» / «lo tomaron con golpes». La expresión griega dice literalmente «los oficiales lo recibieron con golpes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξαντό
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: El valor ingesivo del aoristo con infinitivo se expresa naturalmente en español con «comenzaron», manteniendo el avance narrativo sin añadir matices no sustentados por el texto.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - unas personas
  lexicon: BDAG
  rationale: Designa un grupo no identificado dentro del conjunto presente; «algunos» es natural y conserva la indefinición.
- source_word: ἐμπτύειν αὐτῷ
  english_pob_choice: to spit on him
  chosen_spanish: escupirle
  alternatives_spanish:
  - escupir sobre él
  - escupirle encima
  lexicon: BDAG
  rationale: En español, el dativo de persona se expresa con el objeto indirecto «le». «Escupirle» comunica el ultraje directo con naturalidad; «sobre él» queda como alternativa más literal.
- source_word: περικαλύπτειν αὐτοῦ τὸ πρόσωπον
  english_pob_choice: to cover his face
  chosen_spanish: cubrirle el rostro
  alternatives_spanish:
  - cubrirle la cara
  - vendarle los ojos
  lexicon: BDAG
  rationale: El griego dice literalmente «cubrir su rostro». «Cubrirle el rostro» sigue de cerca la forma sin sonar forzado en español; «vendarle los ojos» sería una interpretación funcional que se reserva implícitamente en el texto principal y puede sugerirse solo como alternativa.
- source_word: κολαφίζειν αὐτὸν
  english_pob_choice: to strike him with their fists
  chosen_spanish: golpearlo con los puños
  alternatives_spanish:
  - golpearlo
  - darle puñetazos
  lexicon: BDAG
  rationale: κολαφίζω implica golpear con el puño. «Golpearlo con los puños» preserva esa especificidad mejor que el genérico «golpearlo», sin depender de una expresión demasiado coloquial.
- source_word: λέγειν αὐτῷ· Προφήτευσον
  english_pob_choice: to say to him, “Prophesy!”
  chosen_spanish: 'a decirle: «¡Profetiza!».'
  alternatives_spanish:
  - 'a decirle: «¡Profetiza tú!»'
  - 'a decirle: «¡Profetiza para nosotros!»'
  lexicon: BDAG
  rationale: Se conserva la súplica burlona en forma de mandato breve. «Profetiza» reproduce el imperativo sin expandir la burla con aclaraciones interpretativas no presentes en el griego.
- source_word: ὑπηρέται
  english_pob_choice: the officers
  chosen_spanish: los oficiales
  alternatives_spanish:
  - los guardias
  - los servidores
  lexicon: BDAG
  rationale: En este contexto judicial, ὑπηρέται alude a funcionarios subordinados o guardias del proceso. «Oficiales» mantiene esa función institucional en español más claramente que «servidores».
- source_word: ῥαπίσμασιν
  english_pob_choice: with blows
  chosen_spanish: con golpes
  alternatives_spanish:
  - con bofetadas
  - con azotes
  lexicon: BDAG
  rationale: El sustantivo puede referir golpes dados con la mano u otro instrumento. «Con golpes» conserva amplitud semántica y evita precisar más de lo que el griego garantiza.
- source_word: ἔλαβον
  english_pob_choice: received him
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo tomaron
  - lo trataron
  lexicon: BDAG
  rationale: Se mantiene la construcción española cercana al giro auditado «recibieron... con golpes», preservando el carácter idiomático e irónico de la frase.
theological_decisions:
- issue: La burla imperativa «Προφήτευσον» y la identidad de Jesús
  english_pob_reading: Prophesy!
  chosen_spanish_reading: ¡Profetiza!
  alternative_spanish_readings:
  - ¡Profetiza para nosotros!
  - ¡Demuestra que eres profeta!
  rationale: El texto presenta una burla durante el abuso, pero no desarrolla la intención de los agresores. Mantener el imperativo breve conserva la ironía narrativa sin añadir interpretación doctrinal o explicativa.
  doctrine_reference: Preservar la tensión teológica sin resolverla explícitamente.
- issue: 'ῥαπίσμασιν αὐτὸν ἔλαβον: si el sujeto «recibió» o «tomó»'
  english_pob_reading: the officers received him with blows
  chosen_spanish_reading: los oficiales lo recibieron con golpes
  alternative_spanish_readings:
  - los oficiales lo tomaron con golpes
  - lo trataron a golpes
  rationale: La opción principal sigue el giro tradicional del audit trail y mantiene el matiz irónico del verbo en una escena judicial. La alternativa más idiomática no es necesaria en el texto principal porque la frase ya es comprensible en español.
  doctrine_reference: No aplica; decisión léxica/narrativa.
translation_notes:
  revision_awareness: El borrador sigue de cerca el audit trail inglés de la POB y no introduce cambios por revisión adicional; la redacción se ajusta al griego para mantener el valor ingesivo, la literalidad de «cubrir el rostro» y la construcción idiomática final con ῥαπίσμασιν αὐτὸν ἔλαβον.
  spanish_consistency_notes:
  - Se mantiene «profetiza» como imperativo breve para conservar la burla sin explicitarla.
  - Se eligió «oficiales» para ὑπηρέται por coherencia con el contexto judicial y con la terminología POB.
  - «Con golpes» evita sobreespecificar el tipo de golpe, respetando la amplitud de ῥαπίσμασιν.
  - El objeto indirecto enclítico («escupirle», «cubrirle») hace el español más natural sin perder la relación con el original griego.
