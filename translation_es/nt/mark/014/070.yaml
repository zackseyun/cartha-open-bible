translation:
  language: es
  text: 'Pero él de nuevo lo negaba. Y al poco tiempo, los que estaban cerca volvían a decirle a Pedro: «Ciertamente tú eres uno de ellos, porque también eres galileo, y tu manera de hablar[a] se parece[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La palabra griega λαλιά puede referirse al modo de hablar, al dialecto o al acento.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten «y tu manera de hablar se parece».
    reason: textual_variant
lexical_decisions:
- source_word: ἠρνεῖτο
  english_pob_choice: denied it
  chosen_spanish: lo negaba
  alternatives_spanish:
  - lo negó
  - seguía negándolo
  lexicon: BDAG
  rationale: El imperfecto griego expresa negación repetida o en curso. En español, «lo negaba» conserva ese valor imperfectivo de continuidad mejor que un pretérito simple. El objeto implícito se explicita con «lo» por claridad narrativa.
- source_word: μετὰ μικρὸν
  english_pob_choice: after a little while
  chosen_spanish: después de un poco de tiempo
  alternatives_spanish:
  - después de un rato
  - un poco después
  - al poco tiempo
  lexicon: BDAG
  rationale: La expresión indica un lapso breve. «Después de un poco de tiempo» es natural y mantiene la idea de brevedad sin añadir matices no presentes en el griego.
- source_word: οἱ παρεστῶτες
  english_pob_choice: those standing nearby
  chosen_spanish: los que estaban allí de pie
  alternatives_spanish:
  - los presentes
  - los que estaban cerca
  - los que estaban alrededor
  lexicon: BDAG
  rationale: El participio señala a los que estaban presentes/de pie junto a la escena. «Los que estaban allí de pie» conserva tanto la presencia como la postura, sin perder el matiz espacial.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere habla repetida o continuada. En español, «decían» es una forma natural que puede llevar ese valor imperfectivo en contexto sin sonar forzada.
- source_word: Ἀληθῶς
  english_pob_choice: Surely
  chosen_spanish: Ciertamente
  alternatives_spanish:
  - De veras
  - Verdaderamente
  - Seguro
  lexicon: BDAG
  rationale: El adverbio introduce una afirmación enfática y segura. «Ciertamente» comunica bien esa certeza en español formal y directo.
- source_word: ἐξ αὐτῶν εἶ
  english_pob_choice: you are one of them
  chosen_spanish: tú eres uno de ellos
  alternatives_spanish:
  - eres de ellos
  - perteneces a ellos
  - eres de los suyos
  lexicon: BDAG
  rationale: La expresión identifica a Pedro como perteneciente al grupo. «Uno de ellos» es la forma idiomática más clara en español para esa relación de pertenencia.
- source_word: καὶ γὰρ Γαλιλαῖος εἶ
  english_pob_choice: for you are also a Galilean
  chosen_spanish: porque también eres galileo
  alternatives_spanish:
  - pues también eres galileo
  - ya que también eres galileo
  - porque eres también galileo
  lexicon: BDAG
  rationale: El griego aporta la razón de su afirmación. «Porque también eres galileo» reproduce la causalidad con sencillez y mantiene el valor identificador del gentilicio.
- source_word: ἡ λαλιά σου
  english_pob_choice: your speech
  chosen_spanish: tu manera de hablar
  alternatives_spanish:
  - tu habla
  - tu acento
  - tu modo de hablar
  lexicon: BDAG
  rationale: λαλιά puede referirse al modo de hablar, dialecto o acento. «Tu manera de hablar» preserva esa amplitud semántica mejor que reducirlo solo a «acento».
- source_word: ὁμοιάζει
  english_pob_choice: is similar
  chosen_spanish: es similar
  alternatives_spanish:
  - se parece
  - es parecida
  - suena igual
  lexicon: BDAG
  rationale: El verbo indica semejanza sin exigir que se especifique el objeto comparado. «Es similar» sigue de cerca el texto griego y evita añadir un objeto implícito no expresado.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que prefirió «your speech is similar» frente a una formulación que añadía un objeto implícito. Por eso la versión española evita explicitar ese objeto y conserva una comparación general en la última cláusula. También mantiene el imperfecto narrativo con un valor de repetición o continuidad en «lo negaba» y «decían».
  spanish_consistency_notes:
  - Se usa «galileo» como gentilicio sustantivado/adjetival, en paralelo con el inglés auditado.
  - Se prefirió «manera de hablar» para λαλιά, porque «acento» estrecharía demasiado el campo semántico.
  - No se incorporó terminología eclesiástica tradicional innecesaria; el registro busca transparencia y claridad narrativa.
