translation:
  language: es
  text: 'Pero Pedro le dijo: «Aun si todos se apartan[a], yo no».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tropiezan» o «son hechos tropezar». El verbo griego puede referirse a tropezar, a escandalizarse o a apartarse/fallar.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca contraste con la declaración previa de Jesús; «Pero» expresa con naturalidad la oposición de Pedro en español.
- source_word: ἔφη
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - le dijo
  lexicon: BDAG
  rationale: Verbo narrativo estándar; «dijo» es natural y fiel al registro del pasaje.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El dativo pronominal se refiere a Jesús por el contexto; el clítico «le» conserva el pronombre sin sustituirlo por el nombre.
- source_word: Εἰ καὶ
  english_pob_choice: Even if
  chosen_spanish: Aunque
  alternatives_spanish:
  - Aun si
  - Si bien
  lexicon: BDAG
  rationale: Introduce una concesión hipotética. «Aunque» comunica de forma idiomática y natural la fuerza concesiva del griego en este contexto.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos ustedes
  lexicon: BDAG
  rationale: Se refiere al conjunto de discípulos; «todos» preserva la amplitud del griego sin añadir especificación innecesaria.
- source_word: σκανδαλισθήσονται
  english_pob_choice: fall away
  chosen_spanish: se aparten
  alternatives_spanish:
  - tropecen
  - se escandalicen
  - caigan
  lexicon: BDAG
  rationale: En este contexto de deserción y fracaso discipular, «se aparten» comunica la idea relacional y práctica de abandonar a Jesús. Conserva la tensión del verbo sin reducirlo a un tropiezo meramente físico.
- source_word: ἀλλ’ οὐκ ἐγώ
  english_pob_choice: I will not
  chosen_spanish: yo no
  alternatives_spanish:
  - yo no lo haré
  - pero yo no
  lexicon: BDAG
  rationale: La cláusula es elíptica en griego. En español, «yo no» mantiene la brevedad y el contraste enfático con el resto del grupo, sin añadir un verbo que el texto no expresa.
theological_decisions:
- issue: Alcance de σκανδαλισθήσονται en el anuncio de la posible infidelidad de los discípulos
  english_pob_reading: fall away
  chosen_spanish_reading: se aparten
  alternative_spanish_readings:
  - tropecen
  - se escandalicen
  - caigan
  rationale: La escena trata del fracaso y posible deserción de los discípulos frente a la presión. «Se aparten» evita una lectura demasiado ligera de «tropezar» y, al mismo tiempo, no resuelve la tensión hacia un juicio doctrinal más fuerte de lo que el contexto inmediato exige.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; optimal equivalence'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: se mantuvo la concesión de «Even if», el valor contraposicional de δὲ y la elipsis final de ἀλλ’ οὐκ ἐγώ. La nota léxica inglesa sobre σκανδαλίζω se reflejó en español con una alternativa de sentido que no reduce el verbo a un tropiezo físico.'
  spanish_consistency_notes:
  - Se prefirió «Pero» para δὲ por su contraste natural en español.
  - Se conservó el pronombre dativo con «le» en lugar de nombrar a Jesús, siguiendo el griego.
  - La elipsis final quedó breve («yo no») para reproducir el énfasis del original sin sobreexplicarlo.
  - La nota a pie de página usa un marcador único y aparece anclada en el texto en el punto pertinente.
