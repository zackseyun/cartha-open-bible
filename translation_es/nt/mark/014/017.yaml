lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Y luego
  lexicon: BDAG
  rationale: Conserva la conexión narrativa paratáctica propia de Marcos sin añadir matiz interpretativo.
- source_word: ὀψίας γενομένης
  english_pob_choice: when evening came
  chosen_spanish: cuando llegó la noche
  alternatives_spanish:
  - cuando vino la tarde
  - cuando anocheció
  lexicon: BDAG
  rationale: La construcción genitiva absoluta expresa circunstancia temporal; 'llegó la noche' comunica esa referencia de manera natural en español sin perder el valor temporal.
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: vino
  alternatives_spanish:
  - viene
  - llegó
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español 'vino' resulta más natural y readable; el valor narrativo presente del original queda compensado por el contexto inmediato y la fluidez del relato.
- source_word: μετὰ τῶν δώδεκα
  english_pob_choice: with the twelve
  chosen_spanish: con los doce
  alternatives_spanish:
  - con los Doce
  lexicon: BDAG
  rationale: μετά con genitivo indica acompañamiento. 'Los doce' mantiene la referencia al grupo apostólico sin añadir términos no explicitados en el texto.
theological_decisions:
- issue: Referencia de 'los doce'
  english_pob_reading: the phrase refers to Jesus' inner apostolic group, including Judas at this point in the narrative
  chosen_spanish_reading: la frase se refiere al grupo apostólico de Jesús, incluido Judas en este momento del relato
  alternative_spanish_readings:
  - con los Doce como designación casi titulada
  rationale: La traducción conserva la expresión breve y deja su referencia narrativa implícita, sin expandirla a 'discípulos' o 'apóstoles' en el texto principal.
  doctrine_reference: Narrative context / apostolic circle
