translation:
  language: es
  text: Porque este perfume[a] podía haberse vendido por más de trescientos denarios y darse a los pobres, y la reprendían[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Perfume» conserva la idea de una sustancia aromática valiosa; también puede entenderse como «ungüento» o «aceite aromático».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego puede llevar el matiz de «reprender» con fuerte desaprobación; también puede traducirse «la censuraban» o «se indignaban contra ella».
    reason: lexical_alternative
lexical_decisions:
- source_word: μύρον
  english_pob_choice: perfume
  chosen_spanish: perfume
  alternatives_spanish:
  - ungüento
  - aceite aromático
  lexicon: BDAG
  rationale: μύρον designa una sustancia aromática aplicada como ungüento o aceite perfumado. «Perfume» conserva bien en español la idea de un producto aromático valioso y resulta natural en el contexto.
- source_word: πραθῆναι
  english_pob_choice: been sold
  chosen_spanish: haberse vendido
  alternatives_spanish:
  - ser vendido
  - haberse puesto a la venta
  lexicon: BDAG
  rationale: El infinitivo aoristo pasivo expresa una venta posible no realizada. En español, «haberse vendido» comunica esa posibilidad pasada de manera idiomática.
- source_word: ἐπάνω
  english_pob_choice: for more than
  chosen_spanish: por más de
  alternatives_spanish:
  - sobre
  - encima de
  lexicon: BDAG
  rationale: Con un genitivo de cantidad, la idea es de excedencia. «Por más de» expresa con naturalidad el sentido cuantitativo de ἐπάνω.
- source_word: δηναρίων τριακοσίων
  english_pob_choice: three hundred denarii
  chosen_spanish: trescientos denarios
  alternatives_spanish:
  - trescientos denares
  lexicon: BDAG
  rationale: Se conserva la moneda histórica como unidad de peso cultural e histórico, sin convertirla a una moneda moderna. «Denarios» es la forma estándar en español.
- source_word: δοθῆναι τοῖς πτωχοῖς
  english_pob_choice: given to the poor
  chosen_spanish: haberse dado a los pobres
  alternatives_spanish:
  - darse a los pobres
  - ser dado a los pobres
  lexicon: BDAG
  rationale: πτωχοῖς nombra a los pobres como grupo social. La pasiva infinitiva se refleja con «haberse dado», manteniendo la relación verbal con la acción potencial anterior.
- source_word: ἐνεβριμῶντο αὐτῇ
  english_pob_choice: they scolded her
  chosen_spanish: la reprendían
  alternatives_spanish:
  - la reprendieron
  - se indignaban contra ella
  - la censuraban
  lexicon: BDAG
  rationale: ἐμβριμάομαι expresa fuerte desaprobación o censura severa. «La reprendían» mantiene ese tono de amonestación seria sin forzar un registro demasiado coloquial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón del reproche. En español, «Porque» preserva la conexión explicativa de manera clara y directa.
- source_word: ἠδύνατο
  english_pob_choice: could have been
  chosen_spanish: podía haberse
  alternatives_spanish:
  - habría podido
  - podría haberse
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι indica una posibilidad no realizada en el pasado. «Podía haberse» reproduce bien esa potencialidad frustrada.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que cada nota de pie tenga su marcador visible en el texto español. Además, se mantuvo el valor semántico de μύρον y ἐνεβριμῶντο sin suavizar la censura del contexto.
  spanish_consistency_notes:
  - Se usó «denarios» para la moneda antigua, en continuidad con la decisión inglesa y con uso histórico habitual en español.
  - Se mantuvo el imperfecto «podía haberse vendido» para reflejar una posibilidad pasada no realizada.
  - La secuencia verbal conserva la pasiva infinitiva y la censura final sin añadir elementos interpretativos ajenos al griego.
