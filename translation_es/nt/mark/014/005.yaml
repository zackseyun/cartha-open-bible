    issue: La construcción «y haberse dado a los pobres» es poco natural en español.
    rationale: Aunque calca la simetría de los infinitivos griegos, en español suena más idiomático «y darse a los pobres» después de «podía haberse vendido». Preserva el mismo contenido sin rigidez innecesaria.
  - severity: medium
    issue: 'La nota b tiene un error gramatical: «les recriminaban».'
    rationale: 'El contexto exige una forma dirigida a la mujer singular: «la recriminaban» o mejor otra alternativa como «la censuraban». Tal como está, la nota introduce confusión.'
  - severity: low
    issue: La puntuación «; y la reprendían» suena algo pesada.
    rationale: Una coma antes de la cláusula final mantiene mejor la fluidez en español contemporáneo sin pérdida de fuerza.
  revised_spanish_text: Porque este perfume[a] podía haberse vendido por más de trescientos denarios y darse a los pobres, y la reprendían[b].
