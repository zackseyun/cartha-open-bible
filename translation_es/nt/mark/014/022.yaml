revisions:
- from: 'Y mientras ellos estaban comiendo, tomó pan, lo bendijo, lo partió, se lo dio, y dijo: «Tomen; esto es mi cuerpo»[a].'
  to: 'Y mientras comían, tomó pan, lo bendijo, lo partió, se lo dio a ellos, y dijo: «Tomen; esto es[a] mi cuerpo»'
  rationale: 'Se hacen ajustes menores para mejorar naturalidad y precisión: «mientras comían» fluye mejor en español; «a ellos» refleja explícitamente αὐτοῖς; y la nota se ancla en «esto es», que es donde recae la alternativa interpretativa documentada. No hay cambio doctrinal ni de sentido principal.'
