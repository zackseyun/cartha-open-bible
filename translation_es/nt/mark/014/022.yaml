review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia verbal griega y preserva correctamente la declaración central «esto es mi cuerpo» con la nota alternativa, en línea con el POB inglés. Sin embargo, hay dos desajustes menores: (1) la nota [a] está anclada al final de la cita en vez de junto a «esto es mi cuerpo», donde pertenece la alternativa; y (2) «se lo dio» omite explícitamente «a ellos», presente en αὐτοῖς y conservado en el inglés, por lo que conviene explicitarlo para fidelidad plena.'
  spanish_quality_summary: El español es natural y claro, pero «mientras ellos estaban comiendo» suena algo pesado; «mientras comían» es más idiomático y mantiene el valor simultáneo. También conviene mover la nota al sintagma pertinente dentro de la cita. La puntuación general es buena.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «cuerpo» para σῶμα, «pan» para ἄρτον y la formulación no interpretativa «esto es» están bien alineadas con las decisiones léxicas y teológicas documentadas.
  issues:
  - severity: medium
    issue: La nota [a] está colocada al final de la cita, no en la frase «esto es mi cuerpo».
    rationale: La alternativa documentada («representa / significa») corresponde específicamente a τοῦτό ἐστιν τὸ σῶμά μου, no a toda la oración. El anclaje debe aparecer en la expresión relevante dentro de `spanish_text`.
  - severity: low
    issue: «se lo dio» no explicita el dativo «a ellos».
    rationale: Aunque es idiomático, αὐτοῖς está presente en el griego y el inglés POB lo conserva con «to them». «Se lo dio a ellos» o «se lo dio» con contexto podrían funcionar, pero explicitarlo mejora la correspondencia fuente-meta.
  - severity: low
    issue: «mientras ellos estaban comiendo» es menos natural de lo necesario.
    rationale: El genitivo absoluto con participio presente se puede representar de forma más fluida en español como «mientras comían» sin pérdida semántica.
  revised_spanish_text: 'Y mientras comían, tomó pan, lo bendijo, lo partió, se lo dio a ellos, y dijo: «Tomen; esto es[a] mi cuerpo»'
  revised_footnotes:
  - marker: a
    text: 'O: «esto representa mi cuerpo» / «esto significa mi cuerpo». El griego dice literalmente: «esto es mi cuerpo».'
    reason: alternative_reading
  revision_rationale: 'Se hacen ajustes menores para mejorar naturalidad y precisión: «mientras comían» fluye mejor en español; «a ellos» refleja explícitamente αὐτοῖς; y la nota se ancla en «esto es», que es donde recae la alternativa interpretativa documentada. No hay cambio doctrinal ni de sentido principal.'
