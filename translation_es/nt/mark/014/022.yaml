translation:
  language: es
  text: 'Y mientras comían, tomó pan, lo bendijo, lo partió, se lo dio a ellos, y dijo: «Tomen; esto es[a] mi cuerpo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «esto representa mi cuerpo» / «esto significa mi cuerpo». El griego dice literalmente: «esto es mi cuerpo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐσθιόντων αὐτῶν
  english_pob_choice: as they were eating
  chosen_spanish: mientras ellos estaban comiendo
  alternatives_spanish:
  - mientras comían
  - cuando estaban comiendo
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto indica acción simultánea. «Mientras ellos estaban comiendo» conserva ese trasfondo progresivo en español con naturalidad y sin perder la simultaneidad.
- source_word: λαβὼν ἄρτον
  english_pob_choice: he took bread
  chosen_spanish: tomó pan
  alternatives_spanish:
  - tomó un pan
  - tomando pan
  lexicon: BDAG
  rationale: El participio aoristo funciona narrativamente como verbo principal. «Pan» es suficiente en el contexto de la cena y evita sobreespecificar «un pan» o «una hogaza» sin apoyo explícito.
- source_word: εὐλογήσας
  english_pob_choice: blessed it
  chosen_spanish: lo bendijo
  alternatives_spanish:
  - pronunció una bendición sobre él
  - dijo una bendición
  lexicon: BDAG
  rationale: En el contexto de la comida, εὐλογέω puede referirse a bendecir el pan. «Lo bendijo» mantiene el sentido directo y la forma breve que presenta el texto.
- source_word: ἔκλασεν
  english_pob_choice: broke it
  chosen_spanish: lo partió
  alternatives_spanish:
  - lo quebró
  - partió el pan
  lexicon: BDAG
  rationale: En español, «partió» comunica el acto de dividir el pan para repartirlo con fluidez y sin perder el gesto descrito por el verbo griego.
- source_word: ἔδωκεν αὐτοῖς
  english_pob_choice: gave it to them
  chosen_spanish: se lo dio
  alternatives_spanish:
  - lo dio a ellos
  - se lo entregó
  lexicon: BDAG
  rationale: El objeto está implícito por el contexto. «Se lo dio» conserva la relación de beneficio y distribución de manera idiomática en español.
- source_word: Λάβετε
  english_pob_choice: Take
  chosen_spanish: Tomen
  alternatives_spanish:
  - Reciban
  - Tomen esto
  lexicon: BDAG
  rationale: El imperativo plural en español se expresa de forma natural con «Tomen». Es directo y adecuado para el discurso de Jesús a los discípulos.
- source_word: τοῦτό ἐστιν
  english_pob_choice: this is
  chosen_spanish: esto es
  alternatives_spanish:
  - esto significa
  - esto representa
  lexicon: BDAG
  rationale: La cópula se rinde de modo llano. Se evita introducir una explicación interpretativa que el griego no expresa en la forma verbal misma.
- source_word: τὸ σῶμά μου
  english_pob_choice: my body
  chosen_spanish: mi cuerpo
  alternatives_spanish:
  - mi cuerpo físico
  - mi organismo
  lexicon: BDAG
  rationale: σῶμα significa de manera directa «cuerpo». «Mi cuerpo» es la equivalencia natural y conserva el peso literal de la frase.
theological_decisions:
- issue: La declaración de Jesús sobre el pan y su relación con su cuerpo
  english_pob_reading: Renderized as 'this is my body' without interpretive qualification.
  chosen_spanish_reading: «esto es mi cuerpo» sin glosa interpretativa en el texto principal.
  alternative_spanish_readings:
  - «esto representa mi cuerpo»
  - «esto significa mi cuerpo»
  rationale: El griego usa la cópula ordinaria ἐστιν. La traducción preserva la formulación directa y deja la tensión teológica para notas, sin resolver el debate sacramental dentro del cuerpo principal.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca exactamente en el texto principal al final de la cita, donde la nota alternativa corresponde.
  spanish_consistency_notes:
  - Se mantuvo el nombre propio Jesús implícito por contexto y el discurso directo en forma plural («Tomen»).
  - Se evitó añadir «el» antes de «pan» porque el griego no lo exige y el español fluye naturalmente sin él.
  - Se preservó la literalidad de la cópula («esto es mi cuerpo») para no cerrar la tensión teológica del pasaje.
