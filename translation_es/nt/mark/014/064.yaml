translation:
  language: es
  text: Ustedes han oído la blasfemia. ¿Qué les parece[a]? Y todos lo condenaron como digno de muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «¿Qué piensan?»'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo condenaron como merecedor de muerte», «lo juzgaron sujeto a muerte» o «lo condenaron como culpable de muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠκούσατε
  english_pob_choice: You have heard
  chosen_spanish: Ustedes han oído
  alternatives_spanish:
  - Ustedes oyeron
  lexicon: BDAG
  rationale: El aoristo en discurso directo puede expresarse en español con perfecto compuesto para dar inmediatez retórica; también es posible el pretérito simple. Mantengo el valor de apelación inmediata del sumo sacerdote sin alejarme del griego.
- source_word: τῆς βλασφημίας
  english_pob_choice: the blasphemy
  chosen_spanish: la blasfemia
  alternatives_spanish:
  - esta blasfemia
  - habla blasfema
  lexicon: BDAG
  rationale: Conservo el término formal y jurídico-religioso "blasfemia", que corresponde a la acusación del contexto. En español, el genitivo con artículo se refleja naturalmente como "la blasfemia".
- source_word: τί ὑμῖν φαίνεται
  english_pob_choice: What does it seem to you?
  chosen_spanish: ¿Qué les parece?
  alternatives_spanish:
  - ¿Qué piensan?
  - ¿Cuál es su juicio?
  lexicon: BDAG
  rationale: La pregunta griega pide opinión o veredicto; en español, "¿Qué les parece?" transmite esa función de manera natural y pública. Se preserva la fuerza interrogativa sin volverla más interpretativa de lo que requiere el texto.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  lexicon: BDAG
  rationale: El adjetivo plural refuerza la unanimidad del consejo. En español, "todos" ya comunica ese énfasis en el sujeto colectivo sin necesidad de añadir redundancia.
- source_word: κατέκριναν
  english_pob_choice: condemned
  chosen_spanish: lo condenaron
  alternatives_spanish:
  - lo sentenciaron
  - fallaron contra él
  lexicon: BDAG
  rationale: '"Condenaron" es el equivalente jurídico más directo de κατακρίνω. Mantiene el sentido de pronunciar culpa o sentencia, sin debilitarlo con una paráfrasis genérica.'
- source_word: ἔνοχον εἶναι θανάτου
  english_pob_choice: as deserving death
  chosen_spanish: como digno de muerte
  alternatives_spanish:
  - como merecedor de muerte
  - como culpable de muerte
  - como sujeto a muerte
  lexicon: BDAG
  rationale: La construcción expresa estar sujeto a la pena de muerte o merecerla. "Digno de muerte" conserva la tensión entre culpabilidad y sentencia de forma sobria y familiar en español bíblico, sin añadir términos que el griego no exige.
theological_decisions:
- issue: La acusación de blasfemia en un contexto judicial
  english_pob_reading: blasphemy
  chosen_spanish_reading: blasfemia
  alternative_spanish_readings:
  - habla blasfema
  - blasfemia contra Dios
  rationale: Se mantiene el término técnico de la acusación para no resolver la tensión teológica del pasaje. El narrador presenta el cargo tal como fue formulado por el consejo, no como una validación de su justicia.
  doctrine_reference: Preservar la tensión teológica y judicial del relato, sin suavizar la acusación.
translation_notes:
  revision_awareness: 'La versión inglesa más reciente no requirió cambios. El español sigue de cerca la decisión auditada de la POB: mantiene el lenguaje jurídico de βλασφημία, conserva la pregunta de veredicto con una formulación natural en español y refleja la unanimidad y la condena sin suavizar el juicio.'
  spanish_consistency_notes:
  - Se usó "blasfemia" como término técnico coherente con el registro jurídico-religioso del pasaje.
  - Se prefirió "digno de muerte" para conservar la ambigüedad judicial de ἔνοχον εἶναι θανάτου sin forzar una única paráfrasis.
  - '"Ustedes" y "les" mantienen la segunda persona plural clara y neutral para lectura pública en español latinoamericano.'
