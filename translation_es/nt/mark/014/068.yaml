translation:
  language: es
  text: 'Pero él lo negó[a], diciendo: «No sé ni entiendo lo que dices». Y salió al atrio exterior, y cantó un gallo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos omiten: «y cantó un gallo».'
    reason: textual_variant
lexical_decisions:
- source_word: ἠρνήσατο
  english_pob_choice: denied it
  chosen_spanish: lo negó
  alternatives_spanish:
  - lo negó
  - lo rehusó
  lexicon: BDAG
  rationale: El verbo medio aquí expresa negar o desmentir una afirmación. En español, «lo negó» comunica de forma natural la acción y conserva el objeto implícito de la negación, como en el inglés POB «denied it», sin identificar de más el referente.
- source_word: Οὔτε οἶδα οὔτε ἐπίσταμαι
  english_pob_choice: I neither know nor understand
  chosen_spanish: No sé ni entiendo
  alternatives_spanish:
  - No sé ni comprendo
  - No sé ni estoy enterado
  lexicon: BDAG
  rationale: La duplicación verbal intensifica la negación de Pedro. «No sé ni entiendo» preserva ese paralelismo con un español claro y digno; «entiendo» capta bien el matiz de ἐπίσταμαι en este contexto de habla.
- source_word: σὺ τί λέγεις
  english_pob_choice: what you are saying
  chosen_spanish: lo que dices
  alternatives_spanish:
  - lo que estás diciendo
  - lo que quieres decir
  lexicon: BDAG
  rationale: La forma más directa y natural en español es «lo que dices». Mantiene la relación verbal con λέγων/λέγεις y evita añadir una explicación interpretativa que el griego no exige.
- source_word: ἐξῆλθεν ἔξω εἰς τὸ προαύλιον
  english_pob_choice: he went out into the forecourt
  chosen_spanish: salió afuera, al patio exterior
  alternatives_spanish:
  - salió al forecourt
  - salió al atrio exterior
  - salió al patio delantero
  lexicon: BDAG
  rationale: προαύλιον designa el espacio exterior anterior al patio interior. «Patio exterior» comunica ese valor espacial de manera comprensible en español; «afuera» conserva el énfasis de ἔξω sin volver la frase pesada.
- source_word: ἀλέκτωρ ἐφώνησεν
  english_pob_choice: a rooster crowed
  chosen_spanish: cantó un gallo
  alternatives_spanish:
  - cantó el gallo
  - un gallo cantó
  lexicon: BDAG
  rationale: La equivalencia idiomática natural en español es «cantó un gallo». Conserva el valor narrativo normal del evento sin mecanizar la imagen, y respeta el carácter indefinido del sustantivo griego.
theological_decisions:
- issue: Inclusión de la cláusula final sobre el gallo
  english_pob_reading: Included in the main text; some manuscripts omit it, noted in a footnote.
  chosen_spanish_reading: Incluida en el texto principal, con nota sobre la variante textual.
  alternative_spanish_readings:
  - Omitirla del texto principal por la variante manuscrita
  rationale: La base griega dada (SBLGNT) incluye la cláusula, aunque marcada como variante. Siguiendo el texto base, se traduce en el cuerpo principal y se preserva la incertidumbre textual en nota.
  doctrine_reference: Crítica textual del Nuevo Testamento
- issue: Negación de Jesús por parte de Pedro
  english_pob_reading: But he denied it
  chosen_spanish_reading: Pero él lo negó
  alternative_spanish_readings:
  - Pero él negó
  - Pero lo desmintió
  rationale: El pasaje describe la negativa de Pedro a la acusación inmediata. «Lo negó» mantiene la referencia implícita sin forzar la identificación nominal, en línea con el audit trail inglés.
  doctrine_reference: Narrativa de la pasión en los Evangelios
translation_notes:
  revision_awareness: Se siguió el texto base griego SBLGNT y su auditoría inglesa sin cambios relevantes; la variante final se conservó en nota, y no hubo revisiones aplicadas en el registro de referencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - Se mantiene un registro narrativo sobrio y directo, apto para lectura pública.
  - «Patio exterior» traduce προαύλιον con claridad contextual, evitando anglicismos o tecnicismos innecesarios.
