  rationale: Se mantiene la fidelidad semántica general del borrador, pero se elimina la redundancia de «salió afuera» y se mejora la representación de προαύλιον con «atrio exterior», que es más natural y más preciso en español bíblico actual. La nota textual se conserva sin cambios porque refleja correctamente la variante documentada.
