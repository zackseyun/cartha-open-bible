translation:
  language: es
  text: 'Y llegan a un lugar cuyo nombre era Getsemaní[a], y les dice a sus discípulos: «Siéntense aquí hasta que yo ore».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «llegan ... y les dice», preservando el presente histórico de Marcos para dar viveza.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: llegan
  alternatives_spanish:
  - vinieron
  - iban llegando
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español puede mantenerse con un presente narrativo natural (“llegan”) sin caer en calco rígido. “Vinieron” suaviza la viveza del texto; “iban llegando” añade progresividad no exigida.
- source_word: χωρίον
  english_pob_choice: place
  chosen_spanish: lugar
  alternatives_spanish:
  - sitio
  - paraje
  - terreno
  lexicon: BDAG
  rationale: “Lugar” es la equivalencia más amplia y natural para χωρίον aquí, sin imponer la idea de propiedad, terreno o finca.
- source_word: οὗ τὸ ὄνομα Γεθσημανί
  english_pob_choice: whose name was Gethsemane
  chosen_spanish: cuyo nombre era Getsemaní
  alternatives_spanish:
  - llamado Getsemaní
  - de nombre Getsemaní
  lexicon: BDAG
  rationale: La construcción posesiva relativa se vuelve con naturalidad en español con “cuyo nombre era”. Se conserva el nombre propio transliterado, como en el POB inglés.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se preserva el presente histórico de Marcos con un presente narrativo en español. “Les dijo” sería idiomático pero perdería parte de la vividez marcada en el audit trail.
- source_word: μαθηταῖς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: “Discípulos” es el término técnico y relacional más preciso para μαθηταί en los Evangelios; “seguidores” debilita la relación maestro-discípulo.
- source_word: Καθίσατε
  english_pob_choice: Sit
  chosen_spanish: Siéntense
  alternatives_spanish:
  - Séntense
  - Permanezcan sentados
  lexicon: BDAG
  rationale: El imperativo plural se expresa de forma natural en español con “Siéntense”. “Séntense” es también posible, pero menos extendido en el uso general latinoamericano.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: “Aquí” reproduce el deíctico de manera directa y natural.
- source_word: ἕως προσεύξωμαι
  english_pob_choice: until I pray
  chosen_spanish: hasta que yo ore
  alternatives_spanish:
  - mientras oro
  - hasta que haya orado
  lexicon: BDAG
  rationale: “Hasta que yo ore” conserva el límite temporal del griego con subjuntivo, sin convertirlo en duración (“mientras”) ni explicitar un resultado perfecto no expresado explícitamente.
translation_notes:
  revision_awareness: 'Se siguió el texto griego de SBLGNT y el audit trail inglés: se mantuvo el presente histórico de Marcos en español (llegan / dice) como opción transparente y viable, pero con sintaxis natural para lectura pública. No se detectaron tensiones doctrinales relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantiene Getsemaní como transliteración fija del topónimo.
  - Se usa “discípulos” de manera consistente con el léxico evangélico.
  - Se preserva el presente histórico mediante verbos en presente narrativo, coherente con el POB inglés cuando opta por esa transparencia.
