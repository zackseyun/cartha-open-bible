translation:
  language: es
  text: 'En verdad les digo[a]: dondequiera que se proclame la buena noticia en todo el mundo[b], también se hablará de lo que esta mujer ha hecho, en memoria de ella.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el evangelio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como memorial de ella».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: ἀμήν introduce una afirmación solemne y autoritativa. En español, «En verdad» comunica ese tono con naturalidad; «Amén» dejaría la forma sin explicar, y «Verdaderamente» sería más pesado en este contexto.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les declaro
  lexicon: BDAG
  rationale: La expresión mantiene el trato directo de Jesús a sus oyentes. «Les digo» es idiomático y conserva la solemnidad sin sonar artificial.
- source_word: ὅπου ἐὰν
  english_pob_choice: wherever
  chosen_spanish: dondequiera que
  alternatives_spanish:
  - en cualquier lugar donde
  - allí donde
  lexicon: BDAG
  rationale: La combinación griega expresa generalidad e indefinición espacial. «Dondequiera que» la refleja con precisión y fluidez en español.
- source_word: κηρυχθῇ
  english_pob_choice: is proclaimed
  chosen_spanish: se proclame
  alternatives_spanish:
  - se predique
  - se anuncie
  lexicon: BDAG
  rationale: κηρύσσω denota proclamación pública. «Se proclame» preserva ese valor de anuncio formal y evita limitarlo a la idea más estrecha de «predicar» en algunos usos modernos.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the good news
  chosen_spanish: la buena noticia
  alternatives_spanish:
  - el evangelio
  lexicon: BDAG
  rationale: εὐαγγέλιον significa literalmente «buena noticia». Esa opción mantiene la primacía del texto fuente; «el evangelio» se conserva como alternativa tradicional, pero no como forma principal.
- source_word: εἰς ὅλον τὸν κόσμον
  english_pob_choice: in the whole world
  chosen_spanish: en todo el mundo
  alternatives_spanish:
  - por todo el mundo
  - en el mundo entero
  lexicon: BDAG
  rationale: La frase señala alcance universal. «En todo el mundo» es natural en español y conserva la amplitud del griego sin sobrecargar la expresión.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - además
  lexicon: BDAG
  rationale: Aquí καί añade algo que acompañará a la proclamación del evangelio. «También» hace explícito ese valor aditivo en español.
- source_word: ὃ ἐποίησεν αὕτη
  english_pob_choice: what this woman has done
  chosen_spanish: lo que esta mujer ha hecho
  alternatives_spanish:
  - lo que ella hizo
  - lo que esta ha hecho
  lexicon: BDAG
  rationale: El demostrativo femenino apunta a la mujer del contexto inmediato. Añadir «mujer» clarifica el referente en español sin introducir una interpretación ajena al pasaje.
- source_word: λαληθήσεται
  english_pob_choice: will be spoken of
  chosen_spanish: se hablará de
  alternatives_spanish:
  - será contado
  - será mencionado
  lexicon: BDAG
  rationale: El futuro pasivo de λαλέω indica que su acción entrará en el discurso público. «Se hablará de» es natural en español y conserva la idea de que el hecho será transmitido oralmente.
- source_word: εἰς μνημόσυνον αὐτῆς
  english_pob_choice: in memory of her
  chosen_spanish: en memoria de ella
  alternatives_spanish:
  - como memorial de ella
  - para recuerdo de ella
  lexicon: BDAG
  rationale: μνημόσυνον designa memoria, recordación o memorial. «En memoria de ella» mantiene la fuerza con claridad; «como memorial de ella» queda como alternativa más formal y cercana al sustantivo.
theological_decisions:
- issue: Cómo verter εὐαγγέλιον sin perder el término cristiano tradicional ni la primacía semántica del griego
  english_pob_reading: the good news
  chosen_spanish_reading: la buena noticia
  alternative_spanish_readings:
  - el evangelio
  rationale: No hay conflicto doctrinal, pero sí una decisión terminológica. Se privilegia el sentido léxico directo de εὐαγγέλιον, mientras que «el evangelio» queda como alternativa reconocible para lectores eclesiales.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Cómo expresar εἰς μνημόσυνον αὐτῆς sin reducirlo a una simple nota conmemorativa
  english_pob_reading: in memory of her
  chosen_spanish_reading: en memoria de ella
  alternative_spanish_readings:
  - como memorial de ella
  - para recuerdo de ella
  rationale: La frase apunta a permanencia en el recuerdo público de la acción de la mujer. «En memoria de ella» conserva esa idea sin introducir una lectura sacrificial o litúrgica no exigida por el texto.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La redacción sigue de cerca el audit trail inglés y no introduce revisiones textuales adicionales; se mantiene la lectura estable confirmada por el pase más reciente, con adaptación idiomática al español y preservación de las alternativas léxicas principales.
  spanish_consistency_notes:
  - Se usa «buena noticia» para εὐαγγέλιον conforme a la preferencia POB de priorizar el sentido léxico fuente, reservando «evangelio» como alternativa notada.
  - «En todo el mundo» conserva el alcance universal de εἰς ὅλον τὸν κόσμον sin sobreinterpretar el movimiento preposicional.
  - «Se hablará de» mantiene la voz pasiva futura de λαληθήσεται con naturalidad en español.
  - «En memoria de ella» sigue el valor de μνημόσυνον como recordación pública, no solo recuerdo interior.
