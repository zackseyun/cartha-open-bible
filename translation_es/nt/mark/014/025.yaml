translation:
  language: es
  text: 'En verdad les digo[a][b][c]: ya no beberé jamás del fruto de la vid hasta aquel día en que lo beba nuevo en el reino de Dios.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Amén». La fórmula griega ἀμὴν λέγω ὑμῖν puede conservarse con ese préstamo, pero aquí se prefiere una equivalencia española transparente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ya no volveré a beber del fruto de la vid». La negación griega es enfática.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «beberlo de nuevo». El griego puede significar «nuevo» y también implicar la idea de beberlo nuevamente.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De veras
  alternatives_spanish:
  - En verdad
  - Amén
  lexicon: BDAG
  rationale: En la fórmula solemne ἀμὴν λέγω ὑμῖν, “De veras” comunica con naturalidad la afirmación enfática sin perder el carácter declarativo. Se evita “Amén” como arranque directo porque en español puede sonar menos transparente para lectura pública.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les aseguro
  - les digo a ustedes
  lexicon: BDAG
  rationale: “Les digo” mantiene el habla directa y solemne de la fórmula sin volverla rígida. El dativo plural se refleja de forma natural en español.
- source_word: οὐκέτι οὐ μὴ πίω
  english_pob_choice: I will certainly not drink again
  chosen_spanish: no volveré a beber
  alternatives_spanish:
  - nunca más beberé
  - ya no beberé
  lexicon: BDAG
  rationale: La doble negación griega expresa una prohibición/futuro muy enfático. En español, “no volveré a beber” conserva la idea de repetición cesada; el énfasis queda reforzado por el contexto y por las notas, sin introducir una redundancia poco natural en la línea principal.
- source_word: ἐκ τοῦ γενήματος τῆς ἀμπέλου
  english_pob_choice: from the fruit of the vine
  chosen_spanish: del fruto de la vid
  alternatives_spanish:
  - del producto de la vid
  - del fruto de la parra
  lexicon: BDAG
  rationale: Se mantiene la expresión idiomática “fruto de la vid” porque el griego nombra el producto de la vid, no “vino” de manera explícita. “Fruto” reproduce el campo léxico sin especificar más de lo que el texto dice.
- source_word: ἕως τῆς ἡμέρας ἐκείνης
  english_pob_choice: until that day
  chosen_spanish: hasta aquel día
  alternatives_spanish:
  - hasta ese día
  - hasta el día aquel
  lexicon: BDAG
  rationale: “Aquel día” conserva el valor demostrativo y la expectativa escatológica del griego.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cada vez que
  lexicon: BDAG
  rationale: En esta cláusula futura singular, “cuando” comunica mejor el evento esperado que una forma iterativa.
- source_word: αὐτὸ πίνω
  english_pob_choice: I drink it
  chosen_spanish: lo beba
  alternatives_spanish:
  - lo bebo
  - lo beba de nuevo
  lexicon: BDAG
  rationale: El pronombre neutro se refiere naturalmente a la bebida mencionada; en español el complemento directo “lo” resulta claro. El subjuntivo futuro tras “cuando” refleja la referencia temporal del griego.
- source_word: καινὸν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nuevamente
  - de nuevo
  - fresco
  lexicon: BDAG
  rationale: '“Nuevo” conserva la ambigüedad productiva de καινός: puede sugerir novedad cualitativa o la idea de hacerlo de nuevo. Se evita resolver el alcance semántico más allá del texto.'
- source_word: ἐν τῇ βασιλείᾳ τοῦ θεοῦ
  english_pob_choice: in the kingdom of God
  chosen_spanish: en el reino de Dios
  alternatives_spanish:
  - dentro del reino de Dios
  - en el reinado de Dios
  lexicon: BDAG
  rationale: “Reino de Dios” es la forma más directa y reconocible para la expresión βασιλεία τοῦ θεοῦ; preserva el peso teológico y la referencia habitual del NT.
theological_decisions:
- issue: Fuerza de la negación en οὐκέτι οὐ μὴ
  english_pob_reading: I will certainly not drink again
  chosen_spanish_reading: no volveré a beber
  alternative_spanish_readings:
  - nunca más beberé
  - no beberé jamás
  rationale: La construcción griega es enfática y expresa una negativa fuerte. Se eligió una línea principal natural y publicable en español, mientras que el énfasis se conserva en la combinación del contexto y las notas. No se suaviza a una simple futura negativa.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión y la fuerza del original sin recargar artificialmente la sintaxis.'
- issue: Sentido de καινὸν
  english_pob_reading: new
  chosen_spanish_reading: nuevo
  alternative_spanish_readings:
  - anuevamente
  - de nuevo
  rationale: Se mantiene la amplitud semántica del adjetivo sin decidir entre “nuevo” cualitativo o “de nuevo” adverbial. Esto preserva la tensión escatológica del pasaje tal como queda abierta en el griego y en el POB inglés.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla en exceso.'
- issue: Expresión eucarística/banquete escatológico implícito
  english_pob_reading: fruit of the vine
  chosen_spanish_reading: fruto de la vid
  alternative_spanish_readings:
  - vino
  rationale: Aunque el contexto alude al contenido de la copa, la formulación griega conserva el giro idiomático. Se evita reemplazarlo por “vino” para no añadir especificidad que el texto no da explícitamente.
  doctrine_reference: 'Translation philosophy §1: primacía del lenguaje fuente sobre la tradición de traducción.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior colocando los marcadores de nota directamente en el texto español, y se mantuvo una sola instancia de cada marcador [a], [b] y [c] exactamente donde corresponde.
  spanish_consistency_notes:
  - Se mantuvo «reino de Dios» para βασιλεία τοῦ θεοῦ, coherente con el POB inglés.
  - Se evitó traducir μη con una negación simple que borrara la intensidad del original; la nota a explica la alternativa más fuerte.
  - Se conservó «fruto de la vid» en vez de «vino» para respetar el giro idiomático griego.
  - Se eligió «nuevo» para καινόν, dejando abierta la tensión entre novedad cualitativa y repetición escatológica.
  - La puntuación española usa dos puntos tras la fórmula solemne para reflejar el arranque discursivo.
