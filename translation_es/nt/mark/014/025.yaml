  text: ἀμὴν λέγω ὑμῖν ὅτι οὐκέτι οὐ μὴ πίω ἐκ τοῦ γενήματος τῆς ἀμπέλου ἕως τῆς ἡμέρας ἐκείνης ὅταν αὐτὸ πίνω καινὸν ἐν τῇ βασιλείᾳ τοῦ θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/025.yaml
  text: Truly I tell you[c][b][a], I will certainly not drink again from the fruit of the vine until that day when I drink it new in the kingdom of God.
  footnotes:
  - marker: a
    text: Or 'I will never again drink from the fruit of the vine.' The Greek uses an emphatic negation.
    reason: lexical_alternative
  - marker: b
    text: '''Fruit of the vine'' is the Greek expression here; that is, the drink from the vine used at the meal.'
    reason: lexical_alternative
  - marker: c
    text: Or 'drink it anew.' The Greek adjective can mean 'new' and may imply eschatological newness.
    reason: alternative_reading
