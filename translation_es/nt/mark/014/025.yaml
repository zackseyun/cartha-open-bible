review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura general: fórmula solemne introductoria, negación futura fuerte, mantenimiento de «fruto de la vid», referencia a «aquel día», y cierre «en el reino de Dios». Sin embargo, hay dos desajustes relevantes con la evidencia y con el rastro POB: (1) «cuando» después de «hasta aquel día» suena menos natural que «en que» en español bíblico moderno; no es error de sentido, pero sí de idiomaticidad. (2) La nota [b] está en inglés y además no refleja correctamente la alternativa documentada en el POB inglés; debe darse en español como «nunca más beberé...» o equivalente. También conviene reforzar en la línea principal la negación enfática con «ya no beberé jamás» o «ciertamente no volveré a beber» para acercarse mejor a οὐκέτι οὐ μὴ.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero «De veras les digo» suena algo coloquial para el registro buscado; «En verdad les digo» o «Les aseguro la verdad» sería más eclesial y natural. «Hasta aquel día cuando» es un giro poco natural en español; «hasta aquel día en que» fluye mejor. «Lo beba nuevo» es comprensible pero algo rígido; se puede mantener por fidelidad a la ambigüedad de καινόν, aunque la nota debe explicarla bien. Hay además errores de calidad en notas y metadatos léxicos (p. ej., una nota en inglés y «anuevamente»).
  glossary_alignment: Se mantiene correctamente «Dios» y «reino de Dios». No hay términos de glosario mayor en conflicto. La preservación de «fruto de la vid» coincide con la decisión POB. La principal mejora es estilística y de exactitud de notas, no de glosario.
  issues:
  - severity: medium
    issue: Registro de «De veras les digo»
    rationale: Aunque fiel a ἀμὴν λέγω ὑμῖν, «De veras» suena más coloquial que el estilo moderno-digno solicitado. «En verdad les digo» preserva solemnidad y legibilidad eclesial.
  - severity: medium
    issue: «hasta aquel día cuando» es poco natural en español
    rationale: El griego ἕως... ὅταν se traduce mejor en español con «hasta aquel día en que», evitando una secuencia poco idiomática sin pérdida de sentido.
  - severity: high
    issue: La nota [b] está en inglés y no corresponde al POB auditado
    rationale: Las notas deben estar en español y reflejar la alternativa del POB inglés. «I never again drink...» es un error claro de lengua/meta y de calidad editorial.
  - severity: medium
    issue: La negación enfática puede reflejarse mejor en el texto principal
    rationale: «No volveré a beber» comunica repetición cesada, pero atenúa la fuerza de οὐκέτι οὐ μὴ. Añadir «ya» y/o «jamás» acerca mejor el énfasis sin perder naturalidad.
  - severity: low
    issue: Detalles menores en metadatos léxicos
    rationale: Hay formas defectuosas como «anuevamente», que no afectan el texto principal pero muestran necesidad de ajuste editorial.
  revised_spanish_text: 'En verdad les digo[a][b][c]: ya no beberé jamás del fruto de la vid hasta aquel día en que lo beba nuevo en el reino de Dios.'
  revised_footnotes:
  - marker: a
    text: 'O: «Amén». La fórmula griega ἀμὴν λέγω ὑμῖν puede conservarse con ese préstamo, pero aquí se prefiere una equivalencia española transparente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Ya no volveré a beber del fruto de la vid». La negación griega es enfática.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «beberlo de nuevo». El griego puede significar «nuevo» y también implicar la idea de beberlo nuevamente.'
    reason: alternative_reading
  revision_rationale: 'Se revisa para mejorar la fidelidad funcional y la publicabilidad en español: «En verdad» eleva el registro sin perder transparencia; «ya no beberé jamás» representa mejor la negación enfática οὐκέτι οὐ μὴ; «hasta aquel día en que» corrige un giro poco idiomático; y las notas se normalizan al español y al contenido real del POB auditado, manteniendo la ambigüedad de καινόν sin resolverla en exceso.'
