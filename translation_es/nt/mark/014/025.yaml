revisions:
- from: 'De veras les digo[a][b][c]: no volveré a beber del fruto de la vid hasta aquel día cuando lo beba nuevo en el reino de Dios.'
  to: 'En verdad les digo[a][b][c]: ya no beberé jamás del fruto de la vid hasta aquel día en que lo beba nuevo en el reino de Dios.'
  rationale: 'Se revisa para mejorar la fidelidad funcional y la publicabilidad en español: «En verdad» eleva el registro sin perder transparencia; «ya no beberé jamás» representa mejor la negación enfática οὐκέτι οὐ μὴ; «hasta aquel día en que» corrige un giro poco idiomático; y las notas se normalizan al español y al contenido real del POB auditado, manteniendo la ambigüedad de καινόν sin resolverla en exceso.'
