translation:
  language: es
  text: 'Y envía a dos de sus discípulos y les dice: «Vayan a la ciudad, y les saldrá al encuentro un hombre que lleva un cántaro de agua[a]; síganlo»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un cántaro de barro con agua» para κεράμιον ὕδατος.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποστέλλει
  english_pob_choice: sends
  chosen_spanish: envía
  alternatives_spanish:
  - manda
  lexicon: BDAG
  rationale: Conserva el presente histórico del narrativo griego y su fuerza inmediata; en español, "envía" comunica con naturalidad la acción presente sin perder el matiz narrativo.
- source_word: δύο τῶν μαθητῶν αὐτοῦ
  english_pob_choice: two of his disciples
  chosen_spanish: dos de sus discípulos
  alternatives_spanish:
  - dos de sus seguidores
  lexicon: BDAG
  rationale: '"Discípulos" es el correlato más preciso de μαθηταί en este contexto; la construcción partitiva se expresa de forma idiomática con "dos de sus discípulos".'
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos con "dice", manteniendo el ritmo narrativo del griego.
- source_word: Ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan ustedes
  - Vayan allá
  lexicon: BDAG
  rationale: El imperativo plural se expresa de manera natural y directa con "Vayan"; "ir" reproduce el valor de desplazamiento sin calco forzado.
- source_word: εἰς τὴν πόλιν
  english_pob_choice: into the city
  chosen_spanish: a la ciudad
  alternatives_spanish:
  - hacia la ciudad
  - dentro de la ciudad
  lexicon: BDAG
  rationale: Aunque εἰς puede indicar movimiento hacia adentro, en español "a la ciudad" comunica mejor el destino del movimiento y suena más natural que un literal "dentro de la ciudad".
- source_word: ἀπαντήσει ὑμῖν
  english_pob_choice: will meet you
  chosen_spanish: los encontrará
  alternatives_spanish:
  - se les acercará
  - se les aparecerá
  lexicon: BDAG
  rationale: El futuro de ἀπαντάω en este contexto puede traducirse naturalmente como "encontrará"; el sujeto implícito del griego se mantiene en español con "los" para claridad narrativa.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El griego nombra a un varón específico; "un hombre" conserva el rasgo masculino y el valor referencial concreto.
- source_word: κεράμιον ὕδατος
  english_pob_choice: a jar of water
  chosen_spanish: un cántaro de agua
  alternatives_spanish:
  - un jarro de agua
  - una vasija de agua
  lexicon: BDAG
  rationale: '"Cántaro" es una equivalencia natural en español para un recipiente de agua transportable; evita la torpeza de una traducción demasiado técnica, sin ocultar que se trata de un recipiente de barro o cerámica. La alternativa de recipiente de barro queda preservada en la nota.'
- source_word: βαστάζων
  english_pob_choice: carrying
  chosen_spanish: que lleva
  alternatives_spanish:
  - cargando
  - portando
  lexicon: BDAG
  rationale: El participio presente se vuelve una relativa natural en español; "que lleva" es más fluido que un gerundio pesado y mantiene la acción simultánea.
- source_word: ἀκολουθήσατε αὐτῷ
  english_pob_choice: Follow him
  chosen_spanish: síganlo
  alternatives_spanish:
  - síganle
  - vayan tras él
  lexicon: BDAG
  rationale: El imperativo aoristo se traduce con un mandato directo y natural; "síganlo" conserva el objeto directo masculino singular y el sentido de adherirse al hombre indicado.
translation_notes:
  revision_awareness: No se introdujeron cambios doctrinales ni variantes textuales; se siguió el presente histórico de Marcos y se respetó la equivalencia contextual de κεράμιον ὕδατος con una alternativa preservada en nota.
  spanish_consistency_notes:
  - Se mantuvo el presente histórico con "envía" y "dice" para concordar con el estilo narrativo de Marcos.
  - Se prefirió "a la ciudad" por naturalidad española, sin perder el valor direccional de εἰς.
  - '"Síganlo" conserva el imperativo breve y directo del griego.'
  - El término "cántaro" evita un tecnicismo innecesario en el texto principal, mientras la nota preserva la alternativa material más literal.
