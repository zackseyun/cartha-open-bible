translation:
  language: es
  text: 'Pero él comenzó a invocar maldiciones[a] y a jurar: «No conozco a este hombre del que ustedes hablan».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a maldecir»; posiblemente «a invocar una maldición sobre sí mismo». El griego no indica de manera explícita el objeto de la maldición.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤρξατο
  english_pob_choice: began
  chosen_spanish: comenzó
  alternatives_spanish:
  - empezó
  lexicon: BDAG
  rationale: El valor ingesivo de ἄρχω con infinitivo complementario se expresa naturalmente con «comenzó». «Empezó» también es posible, pero «comenzó» suena más solemne en este contexto narrativo.
- source_word: ἀναθεματίζειν
  english_pob_choice: to call down curses
  chosen_spanish: a maldecir
  alternatives_spanish:
  - a lanzar maldiciones
  - a invocar maldiciones
  - a maldecir contra sí mismo
  lexicon: BDAG
  rationale: El verbo apunta a invocar maldiciones, no solo a decir groserías. En español, «a maldecir» conserva la fuerza verbal y la ambigüedad del objeto de la maldición. No se especifica «contra sí mismo» porque el griego no lo dice explícitamente.
- source_word: ὀμνύναι
  english_pob_choice: to swear
  chosen_spanish: a jurar
  alternatives_spanish:
  - a prestar juramento
  - a jurar un juramento
  lexicon: BDAG
  rationale: «Jurar» comunica con claridad el lenguaje formal de juramento y mantiene el paralelismo con el verbo anterior.
- source_word: οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: No conozco
  alternatives_spanish:
  - No sé
  - No reconozco
  lexicon: BDAG
  rationale: Aunque la forma más literal es «no sé», en este contexto de negación relacional «no conozco» comunica mejor el rechazo de relación o reconocimiento y suena natural en español.
- source_word: τὸν ἄνθρωπον τοῦτον
  english_pob_choice: this man
  chosen_spanish: a este hombre
  alternatives_spanish:
  - a este hombre este
  - a este hombre de aquí
  lexicon: BDAG
  rationale: El demostrativo τοῦτον añade deixis; en español, «este hombre» conserva esa cercanía referencial. Se mantiene «hombre» en lugar de opciones más coloquiales para no bajar el tono del texto.
- source_word: ὃν λέγετε
  english_pob_choice: you are talking about
  chosen_spanish: de quien hablan
  alternatives_spanish:
  - de quien ustedes hablan
  - a quien ustedes mencionan
  - de quien dicen
  lexicon: BDAG
  rationale: λέγετε aquí remite al hombre que los presentes están mencionando. «De quien hablan» es idiomático y fiel, y evita una construcción demasiado rígida como «de quien ustedes hablan» salvo que el contexto requiera enfatizar el plural.
theological_decisions:
- issue: Sentido de ἀναθεματίζειν y posible autoimprecación
  english_pob_reading: Render the action as invoking curses without specifying that Peter cursed Jesus or explicitly cursed himself.
  chosen_spanish_reading: «a maldecir» deja abierta la posibilidad de maldición invocada sin afirmar el objeto ni precisar que fuera contra sí mismo.
  alternative_spanish_readings:
  - a maldecir contra sí mismo
  - a invocar una maldición sobre sí mismo
  - a maldecir a Jesús
  rationale: La escena muestra una negación intensificada, pero el griego no indica de forma explícita el objeto de la maldición. La traducción principal preserva esa tensión y no resuelve más de lo que el texto dice.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el estado de revisión más reciente: no se requerían cambios; se mantuvo el sentido del borrador auditado y su tensión lexical en ἀναθεματίζειν.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como convención general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se prefirió «maldecir» sobre fórmulas eclesiásticas más tradicionales para conservar la fuerza léxica de ἀναθεματίζειν.
  - «Jurar» se mantiene como verbo formal de juramento, no como simple énfasis coloquial.
  - La negación se traduce con «No conozco»/«No conozco a este hombre» en un registro natural y reverente, sin suavizar la dureza del rechazo.
