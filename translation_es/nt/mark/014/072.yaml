translation:
  language: es
  text: 'Y al instante cantó el gallo por segunda vez. Y Pedro recordó la palabra, lo que Jesús le había dicho: «Antes de que el gallo cante dos veces, me negarás tres veces». Y, quebrándose[a], lloró.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «cuando pensó en ello, lloró»; el participio ἐπιβαλών es difícil y se ha entendido de varias maneras, incluso como un giro mental interior o como un gesto físico exterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: BDAG
  rationale: La expresión marca urgencia narrativa en Marcos. "Al instante" comunica esa inmediatez con naturalidad en español y conserva el tono rápido del relato.
- source_word: ἐκ δευτέρου
  english_pob_choice: a second time
  chosen_spanish: por segunda vez
  alternatives_spanish:
  - una segunda vez
  - por segunda ocasión
  lexicon: BDAG
  rationale: La locución idiomática expresa repetición numerada. "Por segunda vez" es la forma más natural en español y mantiene el número explícito.
- source_word: ἀλέκτωρ
  english_pob_choice: rooster
  chosen_spanish: gallo
  alternatives_spanish:
  - gallo de corral
  lexicon: BDAG
  rationale: En español, el ave se nombra de manera corriente como "gallo" en este contexto narrativo. Es claro, dignificado y equivalente al referente zoológico.
- source_word: ἐφώνησεν
  english_pob_choice: crowed
  chosen_spanish: cantó
  alternatives_spanish:
  - cantó el gallo
  - graznó
  lexicon: BDAG
  rationale: Con ἀλέκτωρ, el verbo natural en español es "cantar". Aunque el griego literalmente dice "hizo sonar/clamó", el sentido idiomático del ave es el canto del gallo.
- source_word: ἀνεμνήσθη
  english_pob_choice: remembered
  chosen_spanish: recordó
  alternatives_spanish:
  - se acordó
  - rememoró
  lexicon: BDAG
  rationale: Ambos sentidos son posibles; "recordó" es sobrio y formal. Mantiene la reacción interior de Pedro sin coloquializarla demasiado.
- source_word: τὸ ῥῆμα
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - la declaración
  - lo dicho
  lexicon: BDAG
  rationale: ῥῆμα puede significar palabra, dicho o declaración. "La palabra" conserva la cercanía formal con la opción inglesa y deja que la cláusula siguiente concrete su contenido.
- source_word: ὡς εἶπεν αὐτῷ ὁ Ἰησοῦς
  english_pob_choice: how Jesus had said to him
  chosen_spanish: cómo le había dicho Jesús
  alternatives_spanish:
  - lo que Jesús le había dicho
  - tal como Jesús le había dicho
  lexicon: BDAG
  rationale: Aquí ὡς introduce el contenido recordado. "Cómo" reproduce bien esa conexión en español y el pluscuamperfecto refleja anterioridad respecto del recuerdo.
- source_word: Πρὶν ἀλέκτορα φωνῆσαι δὶς
  english_pob_choice: Before a rooster crows twice
  chosen_spanish: Antes de que el gallo cante dos veces
  alternatives_spanish:
  - Antes de que cante el gallo dos veces
  - Antes de que el gallo cante por segunda vez
  lexicon: BDAG
  rationale: πρίν con infinitivo pide una cláusula temporal. En español, la construcción con "antes de que" es natural y fiel, y "cante" conserva el verbo idiomático del gallo.
- source_word: τρίς με ἀπαρνήσῃ
  english_pob_choice: you will deny me three times
  chosen_spanish: me negarás tres veces
  alternatives_spanish:
  - me repudiarás tres veces
  - me renegarás tres veces
  lexicon: BDAG
  rationale: ἀπαρνέομαι significa negar, repudiar o desentenderse de. "Negarás" es la equivalencia más estable y clara en español, preservando el sentido relacional sin sobrerrepresentarlo.
- source_word: ἐπιβαλών
  english_pob_choice: breaking down
  chosen_spanish: derrumbándose
  alternatives_spanish:
  - echándose a llorar
  - deshaciéndose
  - abatiéndose
  lexicon: BDAG
  rationale: El participio es difícil y admite varias lecturas. "Derrumbándose" intenta conservar la imagen de quiebre emocional que la POB inglesa expresó con "breaking down", sin fijar indebidamente un gesto físico concreto.
- source_word: ἔκλαιεν
  english_pob_choice: he wept
  chosen_spanish: lloraba
  alternatives_spanish:
  - lloró
  - se puso a llorar
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso. "Lloraba" preserva mejor esa continuidad que un pasado simple, y encaja con la intensidad del cierre narrativo.
theological_decisions:
- issue: Valor del participio difícil ἐπιβαλών en la escena del llanto de Pedro
  english_pob_reading: Rendered idiomatically as 'breaking down' before 'he wept.'
  chosen_spanish_reading: Traducido idiomáticamente como "derrumbándose" antes de "lloraba".
  alternative_spanish_readings:
  - '"cuando pensó en ello, lloró"'
  - '"echándose a llorar"'
  - '"cubriéndose la cabeza, lloró"'
  rationale: La cuestión es principalmente léxica y sintáctica, pero afecta cómo se percibe el quiebre emocional de Pedro. La opción elegida preserva la fuerza del pasaje sin imponer una acción corporal específica que el griego no exige con claridad.
  doctrine_reference: Principio de transparencia y tensión documentada; mantener lecturas alternativas cuando la expresión griega es debatida.
translation_notes:
  revision_awareness: 'El texto sigue la decisión inglesa reciente sin cambios sustantivos: mantiene la secuencia narrativa, conserva la alusión explícita al canto del gallo por segunda vez y preserva la ambigüedad del participio ἐπιβαλών mediante una equivalencia idiomática en español. No se introdujeron revisiones textuales nuevas respecto del audit trail proporcionado.'
  spanish_consistency_notes:
  - Se usó "gallo" y "cantar" como equivalente idiomático estable para ἀλέκτωρ/ἐφώνησεν en español.
  - '"La palabra" sigue la decisión inglesa para τὸ ῥῆμα y evita reducirlo de antemano a "la frase" o "el dicho".'
  - Se mantuvo el imperfecto "lloraba" para reflejar ἔκλαιεν como acción continua.
  - La nota al pie conserva la alternativa interpretativa documentada para ἐπιβαλών sin cerrar el debate.
