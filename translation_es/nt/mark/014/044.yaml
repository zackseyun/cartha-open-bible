base_translation:
  language: en
  yaml_path: translation/nt/mark/014/044.yaml
  text: Now the one betraying him had given them a signal[a], saying, “The one I kiss is he[c][b]. Seize him and lead him away securely.”
  footnotes:
  - marker: a
    text: Or “a sign”; the Greek term refers to an agreed identifying signal.
    reason: lexical_alternative
  - marker: b
    text: A kiss was a customary greeting and here serves as Judas’s identifying signal.
    reason: cultural_note
  - marker: c
    text: Or “lead him away safely.” Here “securely” likely means making sure he is kept under firm control.
    reason: alternative_reading
