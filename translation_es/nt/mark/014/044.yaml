revisions:
- from: 'Ahora el que lo entregaba les había dado una señal[a], diciendo: «Aquel a quien yo bese, ese es[b]. Préndanlo y llévenlo lejos con seguridad[c]».'
  to: 'Ahora el que lo entregaba les había dado una señal[a], diciendo: «Aquel a quien yo bese, ese es[b]. Préndanlo y llévenselo bien asegurado[c]».'
  rationale: Se corrige la adición no sustentada de «lejos» y se reemplaza «con seguridad» por una formulación más natural y fiel al contexto de custodia. También se ajusta la nota alternativa para reflejar mejor el valor de ἀσφαλῶς según la evidencia griega y la auditoría inglesa.
