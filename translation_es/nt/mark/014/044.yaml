translation:
  language: es
  text: 'Ahora el que lo entregaba les había dado una señal[a], diciendo: «Aquel a quien yo bese, ese es[b]. Préndanlo y llévenselo bien asegurado[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un signo»; el término griego se refiere a una señal identificatoria previamente convenida.
    reason: lexical_alternative
  - marker: b
    text: Un beso era un saludo habitual y aquí servía como señal de identificación de Judas.
    reason: cultural_note
  - marker: c
    text: O «llévenselo de manera segura». Aquí el adverbio probablemente significa que debían asegurarse de mantenerlo bien sujeto o bajo control.
    reason: alternative_reading
lexical_decisions:
- source_word: δεδώκει
  english_pob_choice: had given
  chosen_spanish: había dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El pluscuamperfecto español expresa bien que la acción de dar la señal ya estaba realizada antes del momento de la traición/arresto, conservando el valor temporal del griego.
- source_word: ὁ παραδιδοὺς αὐτὸν
  english_pob_choice: the one betraying him
  chosen_spanish: el que lo entregaba
  alternatives_spanish:
  - el traidor que lo entregaba
  - su traidor
  - el que lo traicionaba
  lexicon: BDAG
  rationale: ‘παραδίδωμι’ en este contexto narrativo puede significar ‘entregar’; en español ‘entregaba’ mantiene la acción en desarrollo y evita sobrecargar con una interpretación exclusivamente moral. Se conserva la tensión entre ‘entregar’ y ‘traicionar’ sin anularla.
- source_word: σύσσημον
  english_pob_choice: a signal
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - una señal convenida
  lexicon: BDAG
  rationale: ‘Señal’ es el equivalente natural en español para el valor de marca identificadora previamente acordada. ‘Signo’ es posible, pero menos idiomático aquí.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - al decir
  lexicon: BDAG
  rationale: El participio se vierte de forma directa con ‘diciendo’, manteniendo la relación inmediata entre la señal y el contenido que la explicita.
- source_word: Ὃν ἂν φιλήσω
  english_pob_choice: The one I kiss
  chosen_spanish: Aquel a quien yo bese
  alternatives_spanish:
  - El que yo bese
  - Quien yo bese
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν pide una formulación abierta en español; ‘aquel a quien yo bese’ conserva el valor identificador sin perder naturalidad.
- source_word: φιλήσω
  english_pob_choice: kiss
  chosen_spanish: bese
  alternatives_spanish:
  - dé un beso a
  - salude con un beso
  lexicon: BDAG
  rationale: Se conserva el verbo ‘besar’ porque el griego no añade una glosa explícita; la función de saludo puede explicitarse en una nota sin expandir el texto principal.
- source_word: αὐτός ἐστιν
  english_pob_choice: is he
  chosen_spanish: ese es
  alternatives_spanish:
  - ese mismo es
  - ese es el hombre
  lexicon: BDAG
  rationale: ‘Ese es’ reproduce la identificación enfática y resulta natural en el discurso directo del español. Evita añadir ‘el hombre’, que no está explícito en el griego.
- source_word: κρατήσατε
  english_pob_choice: Seize
  chosen_spanish: Préndanlo
  alternatives_spanish:
  - Apresenlo
  - Agárrenlo
  - Deténganlo
  lexicon: BDAG
  rationale: En este contexto de arresto, ‘prender’ comunica bien la captura forzosa con un matiz judicial/policial claro en español. ‘Seize’ no se traduce mecánicamente por ‘agarrar’, que sería demasiado débil.
- source_word: ἀπάγετε
  english_pob_choice: lead him away
  chosen_spanish: llévenlo lejos
  alternatives_spanish:
  - llévenlo
  - arrástrenlo afuera
  - sáquenlo
  lexicon: BDAG
  rationale: La idea básica es sacarlo del lugar y conducirlo aparte; ‘llévenlo lejos’ mantiene ese movimiento. Se evita introducir ‘guardado’ o ‘custodia’ que no aparecen aquí.
- source_word: ἀσφαλῶς
  english_pob_choice: securely
  chosen_spanish: con seguridad
  alternatives_spanish:
  - seguramente
  - sin que escape
  - bajo custodia
  lexicon: BDAG
  rationale: La adverbial puede entenderse como ‘con seguridad’ en el sentido de asegurar que no escape. En español este giro preserva la ambigüedad entre seguridad del traslado y firmeza del control, sin forzar una sola lectura.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura auditada de la POB inglesa: pluscuamperfecto para δεδώκει, participio sustantivado para ὁ παραδιδοὺς αὐτόν, ‘señal’ para σύσσημον, y una traducción natural del mandato final que preserve la posible ambigüedad de ἀσφαλῶς. No se detectaron revisiones posteriores que alteren la decisión base.'
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantiene ‘entregaba’ en vez de ‘traicionaba’ para no borrar la tensión léxica de παραδίδωμι; el contexto narrativo sigue haciendo claro el carácter traicionero de la acción.
  - Se evita ‘Cristo’ porque este versículo no lo contiene.
  - La puntuación y el orden de la cita directa se adaptan a uso editorial en español sin alterar el contenido del griego.
