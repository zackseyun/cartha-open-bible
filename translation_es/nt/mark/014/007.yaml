translation:
  language: es
  text: Porque siempre tienen a los pobres con ustedes, y cuando quieran, pueden hacerles bien[a]; pero a mí no siempre me tienen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pueden hacerles bien». El giro griego εὖ ποιέω es idiomático y significa actuar de manera beneficiosa hacia ellos, no meramente sentir buena voluntad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: «πάντοτε» expresa continuidad o habitualidad. «Siempre» es la opción natural en español y preserva el contraste repetido del versículo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La partícula introduce la explicación de la afirmación anterior. «Porque» conserva esa relación causal/explicativa sin forzarla.
- source_word: τοὺς πτωχοὺς
  english_pob_choice: the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los pobres personas
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a personas pobres. En español, «los pobres» es claro e idiomático; el marcador preposicional «a» se requiere por el objeto directo animado.
- source_word: ἔχετε μεθ’ ἑαυτῶν
  english_pob_choice: have with you
  chosen_spanish: tienen con ustedes
  alternatives_spanish:
  - tienen entre ustedes
  - tienen en su compañía
  lexicon: BDAG
  rationale: La expresión señala presencia continua o disponibilidad cercana. «Tienen con ustedes» reproduce de forma natural la idea relacional de cercanía sin añadir matices ajenos.
- source_word: ὅταν θέλητε
  english_pob_choice: whenever you want
  chosen_spanish: cuando quieran
  alternatives_spanish:
  - cuando deseen
  - siempre que quieran
  lexicon: BDAG
  rationale: «ὅταν» con subjuntivo expresa una ocasión indefinida/repetible. «Cuando quieran» suena natural en español y mantiene la amplitud temporal.
- source_word: δύνασθε
  english_pob_choice: you are able
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - pueden ustedes
  lexicon: BDAG
  rationale: El verbo de capacidad permite una traducción verbal simple en español. Aquí «pueden» conserva la fuerza de posibilidad/capacidad de manera fluida.
- source_word: αὐτοῖς εὖ ποιῆσαι
  english_pob_choice: to do good to them
  chosen_spanish: hacerles bien
  alternatives_spanish:
  - hacerles el bien
  - obrar bien con ellos
  lexicon: BDAG
  rationale: La locución griega εὖ ποιέω es idiomática y significa beneficiar/hacer bien a alguien. «Hacerles bien» preserva el sentido benefactivo sin reducirlo solo a dar limosna o prestar ayuda.
- source_word: ἐμὲ δὲ οὐ πάντοτε ἔχετε
  english_pob_choice: but you do not always have me
  chosen_spanish: pero a mí no siempre me tienen
  alternatives_spanish:
  - pero no siempre me tienen con ustedes
  - pero no siempre me tienen
  lexicon: BDAG
  rationale: Se conserva el contraste temporal entre la presencia constante de los pobres y la presencia no permanente de Jesús. La reordenación responde a la sintaxis española y mantiene el énfasis en «a mí».
theological_decisions:
- issue: Posible lectura de que Jesús desprecia a los pobres
  english_pob_reading: The verse contrasts the continual presence of the poor with Jesus' limited bodily presence, without denying the obligation or opportunity to do good to the poor.
  chosen_spanish_reading: El versículo contrasta la presencia continua de los pobres con la presencia limitada de Jesús, sin negar la obligación ni la oportunidad de hacerles bien.
  alternative_spanish_readings:
  - Jesús descarta la preocupación por los pobres a favor de sí mismo
  - Jesús relativiza el valor de ayudar a los pobres
  rationale: La frase «cuando quieran, pueden hacerles bien» afirma explícitamente la oportunidad permanente de benevolencia. El contraste es temporal y situacional, no una descalificación de los pobres ni de la misericordia hacia ellos.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla artificialmente; no introducir afirmaciones doctrinales que el pasaje no formula.
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el rastro auditado en inglés: se mantiene la explicación de γάρ, el contraste temporal, y el sentido idiomático de εὖ ποιῆσαι como acción benefactora. No se introducen lecturas ajenas ni se atenúa la referencia a la presencia limitada de Jesús.'
  spanish_consistency_notes:
  - Se usa «pobres» para πτωχούς, manteniendo la referencia a una clase de personas.
  - Se usa «hacerles bien» para εὖ ποιῆσαι, evitando reducir el sentido a mera ayuda material.
  - Se conserva «siempre»/«no siempre» para reproducir el contraste temporal del original.
  - Se mantiene «Jesús» en la primera persona implícita por naturalidad española, sin alterar el foco del contraste.
