review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: πολλοὶ como «muchos», ἐψευδομαρτύρουν como acción imperfectiva de testificar falsamente, κατ’ αὐτοῦ como «contra él», y la segunda cláusula comunica correctamente que los testimonios no concordaban entre sí. Sin embargo, la nota al pie no preserva bien la alternativa inglesa documentada, porque «no estaban en acuerdo» es poco natural y no representa bien el valor forense de ἴσαι/μαρτυρίαι.'
  spanish_quality_summary: El texto principal es claro y legible en español eclesial moderno. «Porque muchos daban falso testimonio contra él» suena natural. «Sus testimonios no estaban de acuerdo» es comprensible, pero «sus testimonios no concordaban» o «no coincidían» suena más idiomático en registro narrativo-jurídico. La nota al pie necesita corrección de naturalidad.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto en este versículo. «Testimonio» preserva bien el registro legal; no se introducen términos problemáticos. La alternativa formal debe mantenerse como «dar falso testimonio» / «los testimonios no concordaban» o «no estaban de acuerdo», evitando el calco «en acuerdo».
  issues:
  - severity: medium
    issue: La nota al pie usa «no estaban en acuerdo».
    rationale: Es una expresión poco natural en español y no cumple bien la meta de ofrecer una alternativa formal clara y fiel. La nota inglesa dice «the testimonies were not in agreement», que en español se expresa mejor como «los testimonios no concordaban» o «no estaban de acuerdo».
  - severity: low
    issue: La cláusula principal «sus testimonios no estaban de acuerdo» puede mejorarse estilísticamente.
    rationale: Aunque es entendible y fiel, «no concordaban» suena más natural y directo para testimonios en contexto judicial, y refleja mejor la idea de ἴσαι ... οὐκ ἦσαν.
  revised_spanish_text: Porque muchos daban falso testimonio contra él[a], y sus testimonios no concordaban.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «daban falso testimonio contra él, y los testimonios no estaban de acuerdo».'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad al griego y al POB inglés, pero se mejora la naturalidad jurídica del español cambiando «no estaban de acuerdo» por «no concordaban» en el texto principal y corrigiendo la nota al pie para eliminar el calco poco idiomático «en acuerdo».
