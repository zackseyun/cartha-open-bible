translation:
  language: es
  text: Porque muchos daban falso testimonio contra él[a], y sus testimonios no concordaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «daban falso testimonio contra él, y los testimonios no estaban de acuerdo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - muchos testigos
  lexicon: BDAG
  rationale: El adjetivo funciona de manera sustantiva y se refiere a varias personas. «Muchos» es natural y conciso en español; no se añade «testigos» porque no está explícito en el griego, aunque se sobreentiende por el verbo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación o apoyo narrativo. «Porque» mantiene esa relación causal/explicativa de forma clara en español.
- source_word: ἐψευδομαρτύρουν
  english_pob_choice: were giving false testimony
  chosen_spanish: daban falso testimonio
  alternatives_spanish:
  - estaban dando falso testimonio
  - atestiguaban falsamente
  - daban falso testimonio bajo juramento
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. «Daban falso testimonio» comunica bien la práctica reiterada y conserva el sentido forense de ψευδομαρτυρέω sin volverlo demasiado técnico.
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en su contra
  - contra él mismo
  lexicon: BDAG
  rationale: La preposición con genitivo tiene sentido hostil y adversativo en este contexto legal. «Contra él» reproduce de forma directa ese matiz.
- source_word: ἴσαι
  english_pob_choice: consistent
  chosen_spanish: de acuerdo
  alternatives_spanish:
  - coincidentes
  - iguales
  - en acuerdo
  lexicon: BDAG
  rationale: Literalmente significa «iguales», pero aplicado a testimonios expresa que concuerdan entre sí. «De acuerdo» transmite esa idea de armonía o concordancia de manera natural en español.
- source_word: αἱ μαρτυρίαι
  english_pob_choice: their testimonies
  chosen_spanish: sus testimonios
  alternatives_spanish:
  - los testimonios
  - las declaraciones
  lexicon: BDAG
  rationale: El contexto ya ha presentado esos testimonios, y el posesivo español ayuda a identificarlos sin añadir contenido. «Testimonios» preserva el registro judicial mejor que «declaraciones».
- source_word: οὐκ ἦσαν
  english_pob_choice: were not
  chosen_spanish: no estaban
  alternatives_spanish:
  - no eran
  - no resultaban
  lexicon: BDAG
  rationale: Con ἴσαι, la frase expresa que no había concordancia. «No estaban de acuerdo» conserva la estructura simple del griego y su sentido resultativo en español natural.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran alta concordancia, sin revisiones pendientes; la redacción española sigue la misma lectura forense y la equivalencia óptima del POB, evitando añadir «testigos» en el cuerpo principal y preservando la idea de concordancia en los testimonios.
  spanish_consistency_notes:
  - Se mantuvo el registro forense con «falso testimonio» y «testimonios».
  - Se evitó traducir mecánicamente «equal» por «iguales» en el cuerpo principal, porque en español sonaría menos idiomático aquí.
  - El posesivo «sus» hace explícito el referente implícito, como en la decisión inglesa «their testimonies».
