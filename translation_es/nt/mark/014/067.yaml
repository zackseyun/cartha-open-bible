translation:
  language: es
  text: 'Y al ver a Pedro calentándose, le miró fijamente[a] y le dijo: «Tú también estabas con Jesús el Nazareno».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le miró atentamente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Tú también estabas con el Nazareno, Jesús», reflejando más de cerca el orden de palabras griego.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοῦσα
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vio
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia de la acción de hablar; «al ver» conserva esa relación participial en español natural sin volverla más interpretativa de lo necesario.
- source_word: θερμαινόμενον
  english_pob_choice: warming himself
  chosen_spanish: calentándose
  alternatives_spanish:
  - calentándose junto al fuego
  - tratando de calentarse
  lexicon: BDAG
  rationale: El griego indica que Pedro estaba en proceso de calentarse. «Calentándose» preserva la idea sin añadir «junto al fuego», que no aparece en este versículo aunque sea inferible del contexto inmediato.
- source_word: ἐμβλέψασα αὐτῷ
  english_pob_choice: she looked at him
  chosen_spanish: le miró fijamente
  alternatives_spanish:
  - fijó la mirada en él
  - lo miró atentamente
  lexicon: BDAG
  rationale: ἐμβλέπω suele implicar una mirada directa o intensa. En español, «le miró fijamente» comunica mejor esa fuerza que un simple «lo miró», sin exagerarla más allá del texto.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  - dijo
  lexicon: BDAG
  rationale: Aunque el presente histórico de Marcos puede conservarse con «dice», aquí «le dijo» fluye con naturalidad en español narrativo y sigue el ajuste ya reflejado en la auditoría inglesa a un pasado más idiomático.
- source_word: Καὶ σὺ
  english_pob_choice: You also
  chosen_spanish: Tú también
  alternatives_spanish:
  - Y tú también
  - Tú asimismo
  lexicon: BDAG
  rationale: La partícula καὶ con σύ añade énfasis. «Tú también» reproduce bien ese valor enfático en español.
- source_word: μετὰ τοῦ Ναζαρηνοῦ
  english_pob_choice: with Jesus the Nazarene
  chosen_spanish: con el Nazareno
  alternatives_spanish:
  - con el Nazareno, Jesús
  - con Jesús el Nazareno
  lexicon: BDAG
  rationale: μετά con genitivo expresa asociación/acompañamiento. «Con el Nazareno» conserva el apelativo designativo de Ναζαρηνός de forma breve y natural; el nombre propio se explicita después.
- source_word: ἦσθα
  english_pob_choice: were
  chosen_spanish: estabas
  alternatives_spanish:
  - eras
  - habías estado
  lexicon: BDAG
  rationale: El imperfecto de εἰμί encaja aquí con un pasado simple en español. «Estabas» funciona naturalmente en la acusación y mantiene la referencia a una condición pasada en curso o situación asociada.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - de Jesús
  lexicon: BDAG
  rationale: 'El genitivo es apposicional o explicativo con «el Nazareno». En español, el nombre propio se coloca naturalmente después del apelativo: «el Nazareno, Jesús». '
theological_decisions:
- issue: Tratamiento de Ναζαρηνός en relación con Jesús
  english_pob_reading: Jesus the Nazarene
  chosen_spanish_reading: el Nazareno, Jesús
  alternative_spanish_readings:
  - Jesús el Nazareno
  - Jesús de Nazaret
  rationale: No se trata aquí de un título cristológico doctrinal, sino de una designación identificadora. «El Nazareno, Jesús» conserva la estructura del griego con el apelativo primero y el nombre propio en aposición, sin sustituirlo por una forma más interpretativa.
  doctrine_reference: Principio de primacía del texto original y de preservación de la designación identificadora sin sobrecarga doctrinal
- issue: Uso del presente histórico en λέγει
  english_pob_reading: said
  chosen_spanish_reading: le dijo
  alternative_spanish_readings:
  - le dice
  rationale: Aunque Marcos emplea presente histórico, el español suele preferir pasado en narración continua. «Le dijo» mantiene fidelidad semántica y evita una rigidez estilística innecesaria.
  doctrine_reference: Estilo narrativo bíblico en español; equivalencia funcional del tiempo verbal
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «says» a «said» por naturalidad narrativa; esa misma preferencia se ha reflejado en español con «le dijo». También se mantuvo la cautela de no añadir «junto al fuego» en el texto principal, ya que ese detalle no aparece explícitamente en este versículo.
  spanish_consistency_notes:
  - Se usa «Nazareno» para Ναζαρηνός, conforme al valor designativo señalado en el expediente inglés y a la convención del proyecto de no ocultar el nombre divino ni los apelativos con formulaciones tradicionales innecesarias.
  - Se mantiene «Jesús» como nombre propio y se evita reordenar el sintagma a una forma más eclesiástica si ello desdibujaría el orden griego.
  - «Le miró fijamente» preserva la intensidad de ἐμβλέπω sin convertirla en una interpretación excesiva.
  - La puntuación con comillas angulares y el uso de «al ver» buscan un español bíblico moderno y legible, sin arcaísmos gratuitos.
