translation:
  language: es
  text: 'Y Jesús les dice: «Todos ustedes se apartarán[a], porque está escrito: “Heriré al pastor, y las ovejas serán esparcidas”».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «todos ustedes tropezarán» o «todos ustedes serán hechos tropezar».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego en español con «dice», que suena natural y mantiene el efecto narrativo vivido del original.
- source_word: σκανδαλισθήσεσθε
  english_pob_choice: will all fall away
  chosen_spanish: tropezarán
  alternatives_spanish:
  - se apartarán
  - caerán
  - serán hechos tropezar
  lexicon: BDAG
  rationale: El griego puede expresar tropiezo, escándalo o caída moral/relacional. Aquí, para no perder la tensión lexical, se eligió «tropezarán» como equivalente más literal y aún inteligible en español, dejando abiertas las implicaciones de deserción sugeridas por el contexto y por la nota textual/lexical.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - está escrito en las Escrituras
  - se ha escrito
  lexicon: BDAG
  rationale: «Está escrito» es la fórmula española estándar para introducir una cita bíblica y preserva la autoridad escritural del perfecto pasivo griego.
- source_word: Πατάξω
  english_pob_choice: I will strike
  chosen_spanish: Heriré
  alternatives_spanish:
  - golpearé
  - daré un golpe a
  lexicon: BDAG
  rationale: «Heriré» transmite la acción fuerte del verbo sin caer en arcaísmo; en español mantiene mejor el tono bíblico que una forma demasiado coloquial.
- source_word: ποιμένα
  english_pob_choice: the shepherd
  chosen_spanish: al pastor
  alternatives_spanish:
  - al pastor de las ovejas
  - al pastor
  lexicon: BDAG
  rationale: Se usa «pastor» en español por ser el equivalente natural de ποιμήν y porque el contexto de la cita y su referencia a Jesús hacen transparente la imagen.
- source_word: τὰ πρόβατα
  english_pob_choice: the sheep
  chosen_spanish: las ovejas
  alternatives_spanish:
  - el rebaño
  lexicon: BDAG
  rationale: «Ovejas» conserva la metáfora plural del griego y su relación directa con «pastor»; «rebaño» sería más interpretativo y menos literal.
- source_word: διασκορπισθήσονται
  english_pob_choice: will be scattered
  chosen_spanish: serán dispersadas
  alternatives_spanish:
  - se dispersarán
  - serán esparcidas
  lexicon: BDAG
  rationale: «Serán dispersadas» reproduce el pasivo futuro y el movimiento de separación del rebaño. En español, «dispersar» mantiene bien la fuerza de la imagen y su eco escritural.
theological_decisions:
- issue: Sentido de σκανδαλισθήσεσθε en el contexto del abandono de los discípulos
  english_pob_reading: fall away
  chosen_spanish_reading: tropezarán
  alternative_spanish_readings:
  - se apartarán
  - caerán
  - serán hechos tropezar
  rationale: 'La forma griega admite un campo semántico que incluye tropiezo, escándalo y caída. Se eligió una forma más literal para no resolver demasiado pronto la tensión: el versículo anuncia una caída real de los discípulos, vinculada a la cita sobre el pastor herido y las ovejas dispersas. La nota conserva la alternativa más interpretativa, sin imponerla en el texto principal.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no hubo cambios necesarios y la versión sigue el alto acuerdo del control cruzado.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς y la cita bíblica en estilo directo con comillas españolas.
  - Se conserva la secuencia narrativa del griego con presente histórico («dice») y cita introducida por fórmula escritural.
  - La metáfora pastor/ovejas se traduce de modo uniforme y sin sustituirla por lenguaje eclesiástico menos directo.
  - Se prefirió una solución literal en el verbo problemático σκανδαλισθήσεσθε para preservar la tensión lexical documentada en el expediente inglés.
