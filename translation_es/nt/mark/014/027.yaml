revisions:
- from: 'Y Jesús les dice[a]: «Todos ustedes tropezarán, porque está escrito: “Heriré al pastor, y las ovejas serán dispersadas”».'
  to: 'Y Jesús les dice: «Todos ustedes se apartarán[a], porque está escrito: “Heriré al pastor, y las ovejas serán esparcidas”».'
  rationale: Se revisa σκανδαλισθήσεσθε a «se apartarán» para reflejar mejor la decisión contextual documentada por el POB inglés («fall away») en un español natural y claro, mientras la nota conserva las alternativas más literales del griego. También se ajusta «serán dispersadas» a «serán esparcidas» para una imagen más idiomática con «ovejas» sin perder el pasivo futuro. Se elimina el anclaje de nota en «dice», ya que la nota existente no corresponde a λέγει sino a σκανδαλισθήσεσθε.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:46:28Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: conserva el presente histórico («dice»), la fórmula escritural («está escrito»), la imagen del pastor y las ovejas, y el pasivo futuro de la dispersión. Sin embargo, la nota al pie no preserva la alternativa principal documentada por el POB inglés para σκανδαλισθήσεσθε («fall away»), porque repite el mismo texto principal («tropezarán») en vez de ofrecer una opción española que comunique deserción/apartamiento en contexto.'
  spanish_quality_summary: El español es claro y digno. «Y Jesús les dice» suena natural en registro bíblico moderno. No obstante, «serán dispersadas» aplicado a ovejas resulta algo menos idiomático que «serán esparcidas» o «se dispersarán». Además, si se mantiene «tropezarán» en el texto principal, la nota debe aportar alternativas útiles y no redundantes.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Jesús», «pastor» y «ovejas» están bien. La principal cuestión es semántica: σκανδαλισθήσεσθε en el POB inglés se resolvió como «fall away» con nota para las alternativas más literales; en español conviene reflejar ese mismo razonamiento mejor en la nota o, preferiblemente, en el texto principal.'
  issues:
  - severity: medium
    issue: La nota al pie repite el texto principal en vez de preservar la alternativa contextual principal.
    rationale: El inglés POB traduce σκανδαλισθήσεσθε como «will all fall away» y deja «stumble / be caused to stumble» en nota. El borrador español pone «tropezarán» en el texto y luego la nota vuelve a decir «todos ustedes tropezarán», lo cual no añade información y pierde la opción contextual de deserción/apartamiento.
  - severity: medium
    issue: «Tropezarán» en el texto principal puede sonar demasiado débil o ambiguo en este contexto de abandono de Jesús.
    rationale: Aunque es una opción más literal, el contexto inmediato y la decisión teológica auditada favorecen expresar la caída relacional/deserción. En español «se apartarán» o «caerán» comunica mejor esa fuerza sin sobreinterpretar.
  - severity: low
    issue: «Serán dispersadas» es comprensible, pero menos natural para ovejas que otras opciones.
    rationale: «Serán esparcidas» conserva bien la imagen pasiva del rebaño; «se dispersarán» es más idiomático, aunque menos formalmente pasivo.
  revised_spanish_text: 'Y Jesús les dice: «Todos ustedes se apartarán[a], porque está escrito: “Heriré al pastor, y las ovejas serán esparcidas”».'
