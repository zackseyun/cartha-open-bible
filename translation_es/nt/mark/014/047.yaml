translation:
  language: es
  text: Pero uno de los que estaban cerca desenvainó la espada y golpeó al esclavo[a] del sumo sacerdote, y le cortó la oreja.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervo» para «esclavo» (griego δοῦλος).
    reason: lexical_alternative
lexical_decisions:
- source_word: εἷς δέ τις
  english_pob_choice: But one
  chosen_spanish: Pero uno
  alternatives_spanish:
  - Y uno
  - Pero un hombre
  lexicon: BDAG
  rationale: La combinación griega introduce a una persona no identificada dentro del grupo; en español, «Pero uno» conserva esa indefinición y el matiz de contraste suave de δέ sin añadir información. Se evita explicitar «hombre» porque el griego no lo dice.
- source_word: τῶν παρεστηκότων
  english_pob_choice: of those standing nearby
  chosen_spanish: de los que estaban allí
  alternatives_spanish:
  - de los presentes
  - de los que estaban cerca
  lexicon: BDAG
  rationale: El participio perfecto indica a quienes estaban de pie/presentes. «Estaban allí» es natural en español y mantiene la referencia espacial sin volverla más interpretativa de lo que requiere el griego.
- source_word: σπασάμενος τὴν μάχαιραν
  english_pob_choice: drew his sword
  chosen_spanish: desenvainó la espada
  alternatives_spanish:
  - sacó la espada
  - sacó su espada
  lexicon: BDAG
  rationale: Con μάχαιρα, el sentido contextual es sacar un arma para atacar. «Desenvainó la espada» expresa bien la acción en español natural. Aunque el griego dice literalmente «la espada», el poseedor se infiere del sujeto; por eso no es necesario forzar un posesivo.
- source_word: ἔπαισεν
  english_pob_choice: struck
  chosen_spanish: hirió
  alternatives_spanish:
  - golpeó
  - le pegó
  lexicon: BDAG
  rationale: En este contexto violento, el verbo describe un golpe agresivo con herida. «Hirió» comunica mejor el efecto de la acción en español bíblico moderno que «golpeó», que puede sonar menos preciso para este ataque.
- source_word: τὸν δοῦλον
  english_pob_choice: the high priest’s slave
  chosen_spanish: al esclavo
  alternatives_spanish:
  - al siervo
  - al servidor
  lexicon: BDAG
  rationale: Se mantiene «esclavo» conforme a la preferencia del proyecto para δοῦλος cuando el estatus subordinado es saliente. «Siervo» suaviza demasiado el término y pierde fuerza social.
- source_word: τοῦ ἀρχιερέως
  english_pob_choice: the high priest’s
  chosen_spanish: del sumo sacerdote
  alternatives_spanish:
  - del sacerdote principal
  - del jefe de los sacerdotes
  lexicon: BDAG
  rationale: «Sumo sacerdote» es la equivalencia española estándar de ἀρχιερεύς en este contexto y transmite adecuadamente el cargo sin ambigüedad.
- source_word: ἀφεῖλεν αὐτοῦ τὸ ὠτάριον
  english_pob_choice: cut off his ear
  chosen_spanish: le cortó la oreja
  alternatives_spanish:
  - le arrancó la oreja
  - le quitó la oreja
  lexicon: BDAG
  rationale: Aunque ἀφαιρέω significa literalmente «quitar/retirar», aquí el resultado violento exige una equivalencia idiomática. «Le cortó la oreja» expresa con claridad el daño producido sin importar un detalle que el texto no especifica explícitamente.
theological_decisions:
- issue: δοῦλος en una escena narrativa de violencia y subordinación
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: El término apunta a la relación de dependencia institucional del empleado/cortesano del sumo sacerdote. En español, «esclavo» conserva la dureza social del término griego y evita suavizar la escena.
  doctrine_reference: 'DOCTRINE.md Contested terms: δοῦλος'
translation_notes:
  revision_awareness: La versión inglesa auditada quedó sin cambios en la última revisión y presenta alta concordancia en el control cruzado; esta propuesta sigue ese perfil estable, manteniendo la misma decisión léxica central para δοῦλος y una equivalencia española idiomática para la acción violenta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» para el tetragrámaton como norma del proyecto, aunque este versículo no lo contiene.
  - Se usó «sumo sacerdote» como término fijo y natural en español bíblico para ἀρχιερεύς.
  - La nota al pie marca únicamente la alternativa documentada para δοῦλος, sin introducir otras variantes no sustentadas por el audit trail.
  - El texto principal conserva el tono narrativo sobrio y la secuencia de acciones del griego sin añadir detalles como «mano derecha» u otras precisiones ajenas a Marcos 14:47.
