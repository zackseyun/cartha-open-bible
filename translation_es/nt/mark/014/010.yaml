translation:
  language: es
  text: Y Judas Iscariote[a], uno de los Doce, fue a los principales sacerdotes para entregarlo a ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “traicionarlo”. El verbo griego puede significar “entregar” o “poner en manos de”, y en el caso de Judas esa entrega es un acto de traición.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Entonces
  lexicon: BDAG
  rationale: Conecta la escena con la narración anterior sin añadir matiz interpretativo; en español, 'Y' conserva ese flujo narrativo simple.
- source_word: Ἰούδας Ἰσκαριὼθ
  english_pob_choice: Judas Iscariot
  chosen_spanish: Judas Iscariote
  alternatives_spanish:
  - Judas Iscariot
  lexicon: BDAG
  rationale: Se translitera el nombre propio y el epíteto al uso español común. 'Iscariote' es la forma natural y reconocible en español bíblico.
- source_word: ὁ εἷς τῶν δώδεκα
  english_pob_choice: one of the Twelve
  chosen_spanish: uno de los Doce
  alternatives_spanish:
  - uno de los doce
  lexicon: BDAG
  rationale: '''Los Doce'' funciona como designación estable del grupo apostólico; se mantiene la mayúscula para reflejar ese valor de nombre colectivo.'
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo narrativo de movimiento se expresa de manera natural con 'fue' en español, sin sobrecargar el matiz de separación.
- source_word: πρὸς τοὺς ἀρχιερεῖς
  english_pob_choice: to the chief priests
  chosen_spanish: a los principales sacerdotes
  alternatives_spanish:
  - a los jefes de los sacerdotes
  - a los sumos sacerdotes
  lexicon: BDAG
  rationale: '''ἀρχιερεῖς'' en plural alude al liderazgo sacerdotal de Jerusalén. ''Principales sacerdotes'' reproduce ese valor institucional sin reducirlo a un solo sumo sacerdote.'
- source_word: ἵνα
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: Introduce finalidad. En español, 'para' expresa de forma clara y natural la relación de propósito.
- source_word: παραδοῖ
  english_pob_choice: hand ... over
  chosen_spanish: entregar
  alternatives_spanish:
  - poner en manos de
  - traicionar
  lexicon: BDAG
  rationale: El verbo griego significa literalmente 'entregar/poner en manos de'. Se eligió 'entregar' para preservar ese sentido básico sin resolver prematuramente la carga de traición en el cuerpo principal.
- source_word: αὐτὸν ... αὐτοῖς
  english_pob_choice: him ... to them
  chosen_spanish: se lo
  alternatives_spanish:
  - a él ... a ellos
  - lo ... a ellos
  lexicon: BDAG
  rationale: En español, el clítico 'se lo' evita una repetición pesada y expresa con claridad la relación de objeto indirecto y directo, manteniendo la referencia a Jesús y a los destinatarios implícitos en el contexto.
theological_decisions:
- issue: Tensión entre 'entregar' y la lectura de traición en παραδίδωμι
  english_pob_reading: 'hand him over; footnote: Or "betray him to them."'
  chosen_spanish_reading: entregarlo
  alternative_spanish_readings:
  - traicionarlo
  - ponerlo en sus manos
  rationale: Se preserva en el texto principal el sentido verbal amplio de παραδίδωμι. La traición queda como lectura implícita por el contexto narrativo, sin cerrarla de antemano en la línea principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla demasiado pronto.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y el consenso de revisión fue de alta concordancia. Se conservó la decisión del POB inglés de mantener en el texto principal el sentido de ''hand over/entregar'', dejando la lectura de traición para la nota.'
  spanish_consistency_notes:
  - Se mantiene el uso de 'los Doce' como grupo definido y capitalizado.
  - Se evita 'SEÑOR' o fórmulas litúrgicas ajenas al término del pasaje.
  - La nota a pie de página reproduce la alternativa léxica preservada por el POB inglés.
  - El pronombre clítico 'se lo' es idiomático en español y conserva la referencia al objeto y destinatarios del griego.
