revisions:
- from: Y Judas Iscariote[a], uno de los Doce, fue a los principales sacerdotes para entregárselo.
  to: Y Judas Iscariote[a], uno de los Doce, fue a los principales sacerdotes para entregarlo a ellos.
  rationale: Se reemplaza 'entregárselo' por 'entregarlo a ellos' para hacer explícito el destinatario plural αὐτοῖς, en línea con el griego y el POB inglés. Se mantiene 'entregar' en el texto principal para conservar el valor léxico de παραδίδωμι y se retiene la alternativa de 'traicionarlo' en la nota.
