    text: Recostarse era la postura habitual en una comida formal del mundo antiguo.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «Amén, les digo».
    reason: lexical_alternative
  - marker: c
    text: O, «me entregará». El verbo griego puede significar entregar, poner en manos de otro o traicionar; aquí se refiere a la entrega traicionera por parte de uno de los propios compañeros de Jesús.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el texto principal para seguir de cerca las decisiones auditadas del POB: «En verdad les digo» como fórmula idiomática principal con «Amén, les digo» en nota, y «me traicionará» como lectura principal de παραδώσει con «me entregará» en nota. También se reubica la nota cultural al término «recostados» y se aligera la sintaxis para un español más natural.'
