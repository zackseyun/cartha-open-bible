base_translation:
  language: en
  yaml_path: translation/nt/mark/014/018.yaml
  text: And while they were reclining and eating[a], Jesus said, “Truly I tell you[c][b], one of you will betray me—one who is eating with me.”
  footnotes:
  - marker: a
    text: Or, more literally, “Amen, I say to you.”
    reason: lexical_alternative
  - marker: b
    text: Or, “will hand me over.” The Greek verb can mean hand over, deliver up, or betray; here it refers to treacherous handing over by one of Jesus' own companions.
    reason: lexical_alternative
  - marker: c
    text: Reclining was the customary posture for a formal meal.
    reason: cultural_note
