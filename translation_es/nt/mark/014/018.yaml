review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la escena y la sintaxis básica del griego: el marco temporal con dos participios simultáneos, la fórmula introductoria de Jesús, el partitivo «uno de ustedes», y el participio articular final «el que come conmigo». Sin embargo, se aparta del rastro auditado del POB en dos puntos importantes: (1) παραδώσει fue documentado en inglés como «will betray» en el texto principal, con «hand me over» solo en nota; el español principal «me entregará» invierte esa jerarquía. (2) Las notas están desalineadas con el contenido y el anclaje del POB: la nota sobre la postura de reclinarse debe anclar en «recostados», y la alternativa «Amén, les digo» debe ser nota solo si el texto principal usa la formulación idiomática equivalente a «Truly I tell you».'
  spanish_quality_summary: El español es claro y digno, pero puede mejorar en naturalidad y coherencia interna. «Y mientras ellos estaban recostados y comiendo» es comprensible, aunque «Mientras estaban recostados y comían» suena más natural. «Amén, les digo» es posible pero menos idiomático en español contemporáneo como texto principal; «En verdad les digo» comunica mejor la fuerza solemne, dejando «Amén, les digo» en nota. El uso de dos notas actuales también mezcla razón cultural y alternativa léxica de manera poco precisa.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto (Jesús, etc.). El punto clave es la alineación con la decisión auditada para παραδώσει: debe preferirse «traicionará» en el texto principal, con «me entregará» como alternativa léxica en nota. La fórmula Ἀμὴν λέγω ὑμῖν puede expresarse idiomáticamente como «En verdad les digo», preservando «Amén, les digo» como alternativa documentada. «Recostados» para ἀνακειμένων y «comiendo» para ἐσθιόντων/ἐσθίων están bien.'
  issues:
  - severity: high
    issue: El texto principal usa «me entregará» para παραδώσει en vez de reflejar la elección principal auditada «will betray».
    rationale: El POB inglés documentó explícitamente «will betray» como lectura principal por la fuerza relacional del contexto, dejando «hand me over» en nota. El español actual invierte esa decisión sin necesidad textual suficiente.
  - severity: medium
    issue: La fórmula Ἀμὴν λέγω ὑμῖν está en el texto principal como «Amén, les digo», cuando el POB auditado privilegia una formulación idiomática equivalente a «Truly I tell you».
    rationale: Aunque «Amén, les digo» es defendible, el rastro auditado favorece una expresión idiomática moderna en el texto principal, preservando la forma más literal en nota.
  - severity: medium
    issue: Las notas no siguen bien la correspondencia entre anclaje, contenido y razón.
    rationale: La nota [a] aparece en «comiendo» pero habla de «estando recostados» y de la postura cultural; debe anclarse en «recostados». Además falta una nota para la alternativa de παραδώσει si el texto principal se corrige a «traicionará».
  - severity: low
    issue: «Mientras ellos estaban recostados y comiendo» es algo más pesado de lo necesario.
    rationale: Una formulación como «Mientras estaban recostados y comían» suena más natural en español neutral sin perder precisión.
  revised_spanish_text: 'Mientras estaban recostados[a] y comían, Jesús dijo: «En verdad les digo[b] que uno de ustedes me traicionará[c], uno que está comiendo conmigo».'
  revised_footnotes:
