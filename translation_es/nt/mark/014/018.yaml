translation:
  language: es
  text: 'Mientras estaban recostados[a] y comían, Jesús dijo: «En verdad les digo[b] que uno de ustedes me traicionará[c], uno que está comiendo conmigo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Recostarse era la postura habitual en una comida formal del mundo antiguo.
    reason: cultural_note
  - marker: b
    text: O, más literalmente, «Amén, les digo».
    reason: lexical_alternative
  - marker: c
    text: O, «me entregará». El verbo griego puede significar entregar, poner en manos de otro o traicionar; aquí se refiere a la entrega traicionera por parte de uno de los propios compañeros de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνακειμένων
  english_pob_choice: were reclining
  chosen_spanish: estaban recostados
  alternatives_spanish:
  - estaban reclinados
  - estaban a la mesa
  lexicon: BDAG
  rationale: El participio describe la postura habitual en una comida formal. «Recostados» conserva esa imagen histórica sin sonar tan técnico como una calca literal, y resulta natural en español.
- source_word: ἐσθιόντων / ἐσθίων
  english_pob_choice: eating / is eating
  chosen_spanish: comiendo / está comiendo
  alternatives_spanish:
  - cenando
  - participando de la comida
  lexicon: BDAG
  rationale: El verbo significa simplemente «comer». «Comiendo» mantiene la acción directa; en la cláusula final, «está comiendo conmigo» conserva el participio sustantivado sin forzar una formulación más interpretativa.
- source_word: Ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I tell you
  chosen_spanish: Amén, les digo
  alternatives_spanish:
  - En verdad les digo
  - Ciertamente les digo
  lexicon: BDAG
  rationale: Se preserva la fórmula solemne de Jesús con «Amén», tal como permite el griego. «Les digo» refleja el presente de λέγω de manera directa; la alternativa más idiomática se registra en nota para auditabilidad.
- source_word: εἷς ἐξ ὑμῶν
  english_pob_choice: one of you
  chosen_spanish: uno de ustedes
  alternatives_spanish:
  - uno entre ustedes
  - uno de vosotros
  lexicon: BDAG
  rationale: Es la forma española natural del partitivo y comunica con claridad que el traidor pertenece al grupo presente.
- source_word: παραδώσει
  english_pob_choice: will betray
  chosen_spanish: me entregará
  alternatives_spanish:
  - me traicionará
  - me entregará / me traicionará
  lexicon: BDAG
  rationale: En este contexto el verbo puede expresar tanto «entregar» como el acto traicionero de hacerlo. Se elige «entregará» para mantener la amplitud lexical del griego sin perder la carga narrativa, reservando «traicionará» como alternativa semántica.
- source_word: μετ’ ἐμοῦ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - junto conmigo
  lexicon: BDAG
  rationale: Equivalente simple y natural para la idea de acompañamiento en la comida.
theological_decisions:
- issue: Cómo renderizar παραδώσει en la predicción de la pasión
  english_pob_reading: will betray
  chosen_spanish_reading: me entregará
  alternative_spanish_readings:
  - me traicionará
  - me entregará / me traicionará
  rationale: El POB inglés opta por «betray» por la fuerza relacional del contexto, pero también documenta el sentido más literal «hand over». En español, «entregar» conserva el valor léxico básico de παραδίδωμι y evita cerrar demasiado pronto la interpretación, mientras que el contexto de un comensal cercano deja clara la traición implícita. Así se mantiene la tensión entre literalidad y sentido contextual.
  doctrine_reference: Translation philosophy §1, §3
- issue: La fórmula solemne de Ἀμὴν λέγω ὑμῖν
  english_pob_reading: Truly I tell you
  chosen_spanish_reading: Amén, les digo
  alternative_spanish_readings:
  - En verdad les digo
  - Ciertamente les digo
  rationale: La nota auditiva del POB muestra que la fórmula puede expresarse literalmente como «Amén, digo». En español, conservar «Amén» preserva la huella semítica y la solemnidad del dicho de Jesús sin oscurecer el sentido; «les digo» mantiene la función declarativa del presente griego.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el expediente inglés POB. No se requirieron revisiones respecto del estado auditado más reciente; se mantuvieron las decisiones contextuales sobre la postura en la comida, la fórmula solemne de Jesús y el sentido de παραδίδωμι en este anuncio de traición.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς y no se introduce ninguna sustitución litúrgica innecesaria.
  - «Amén» se conserva en el cuerpo del texto por coherencia con la fórmula semítica, con la alternativa idiomática documentada en nota.
  - «Entregará» mantiene la amplitud de παραδώσει sin perder el tono de traición implícito por el contexto.
  - «Recostados» evita el calco de «reclining» pero preserva la escena de mesa formal propia del trasfondo mediterráneo antiguo.
