- from: 'Y mientras ellos estaban recostados y comiendo[a], Jesús dijo: «Amén, les digo[b] que uno de ustedes me entregará: uno que está comiendo conmigo».'
  to: 'Mientras estaban recostados[a] y comían, Jesús dijo: «En verdad les digo[b] que uno de ustedes me traicionará[c], uno que está comiendo conmigo».'
  rationale: 'Se ajusta el texto principal para seguir de cerca las decisiones auditadas del POB: «En verdad les digo» como fórmula idiomática principal con «Amén, les digo» en nota, y «me traicionará» como lectura principal de παραδώσει con «me entregará» en nota. También se reubica la nota cultural al término «recostados» y se aligera la sintaxis para un español más natural.'
