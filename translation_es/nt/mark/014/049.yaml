revisions:
- from: Día tras día estuve con ustedes en el templo[a], enseñando, y no me arrestaron[b]. Pero que se cumplan las Escrituras[c].
  to: Día tras día estuve con ustedes en el templo[a], enseñando, y no me prendieron[b]. Pero que se cumplan las Escrituras[c].
  rationale: Se reemplaza «arrestaron» por «prendieron» para preservar mejor el matiz amplio de ἐκρατήσατέ y alinearse con la preferencia del POB por una expresión menos técnica que mantenga tanto la idea física como la jurídica. Se conservan la nota cultural sobre ἱερόν y la nota sobre la elipsis final, y se ajusta la nota léxica de acuerdo con el nuevo texto principal.
