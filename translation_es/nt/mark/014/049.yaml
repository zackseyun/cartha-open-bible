translation:
  language: es
  text: Día tras día estuve con ustedes en el templo[a], enseñando, y no me prendieron[b]. Pero que se cumplan las Escrituras[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Templo» aquí se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: cultural_note
  - marker: b
    text: O «no me arrestaron».
    reason: lexical_alternative
  - marker: c
    text: 'Más literalmente: «Pero para que se cumplan las Escrituras». El griego es elíptico y deja implícito el verbo principal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  english_pob_choice: Day after day
  chosen_spanish: Día tras día
  alternatives_spanish:
  - Cada día
  - Día a día
  lexicon: BDAG
  rationale: La expresión distributiva comunica repetición continua. «Día tras día» conserva ese matiz iterativo de forma natural en español.
- source_word: ἤμην πρὸς ὑμᾶς
  english_pob_choice: I was with you
  chosen_spanish: estuve con ustedes
  alternatives_spanish:
  - estaba con ustedes
  - estuve entre ustedes
  lexicon: BDAG
  rationale: La relación personal y la presencia pública se expresan bien con «con ustedes». El perfecto simple español («estuve») da fluidez narrativa y encaja con el marco de la declaración retrospectiva.
- source_word: ἐν τῷ ἱερῷ
  english_pob_choice: in the temple
  chosen_spanish: en el templo
  alternatives_spanish:
  - en el recinto del templo
  - en los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν se refiere al complejo del templo, no al santuario interior. «En el templo» es la forma más clara y estándar; la nota explica la referencia más amplia del recinto.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñaba
  lexicon: BDAG
  rationale: El participio presente indica una acción en curso. «Enseñando» reproduce esa actividad sin añadir más de lo que el griego dice.
- source_word: οὐκ ἐκρατήσατέ με
  english_pob_choice: you did not seize me
  chosen_spanish: no me arrestaron
  alternatives_spanish:
  - no me prendieron
  - no me sujetaron
  lexicon: BDAG
  rationale: En este contexto la idea es la de tomar a Jesús bajo custodia. «Arrestaron» expresa bien el sentido jurídico-práctico que el contexto exige; la alternativa más literal «prender» también sería posible, pero menos neutra para lectores amplios.
- source_word: ἀλλ’ ἵνα
  english_pob_choice: But let the Scriptures be fulfilled
  chosen_spanish: Pero que se cumplan las Escrituras[c].
  alternatives_spanish:
  - Pero que las Escrituras se cumplan.
  - Pero para que se cumplan las Escrituras.
  lexicon: BDAG
  rationale: El griego es elíptico y deja implícito el verbo principal tras ἀλλ’ ἵνα. La forma imperativa-jussiva en español («Que se cumplan») mantiene la tersura y la fuerza sentenciosa sin explicitar de más la elipsis.
- source_word: πληρωθῶσιν
  english_pob_choice: might be fulfilled
  chosen_spanish: se cumplan
  alternatives_spanish:
  - sean cumplidas
  - lleguen a cumplirse
  lexicon: BDAG
  rationale: En español, «cumplirse» transmite naturalmente la pasiva divina de las Escrituras y evita una formulación pesada. Conserva la tensión entre acontecimiento y propósito sin resolverla con una paráfrasis más explicativa.
- source_word: αἱ γραφαί
  english_pob_choice: the Scriptures
  chosen_spanish: las Escrituras
  alternatives_spanish:
  - los Escritos
  - los escritos sagrados
  lexicon: BDAG
  rationale: En plural, γραφαί remite al conjunto reconocido de escritos sagrados. «Las Escrituras» es el equivalente reverente y comprensible en español.
theological_decisions:
- issue: Cláusula final elíptica y propósito divino
  english_pob_reading: But let the Scriptures be fulfilled
  chosen_spanish_reading: Pero que se cumplan las Escrituras
  alternative_spanish_readings:
  - Pero para que se cumplan las Escrituras
  - Pero que las Escrituras se cumplan
  rationale: La versión española conserva la brevedad del griego y la idea de cumplimiento de las Escrituras sin añadir un sujeto o verbo explicativo que el texto no expresa. La forma jussiva evita imponer una lectura más determinista que la del original, manteniendo la tensión teológica entre la acción humana y el cumplimiento escritural.
  doctrine_reference: Translation philosophy §3, Preservar la tensión teológica en vez de resolverla.
- issue: Sentido de ἱερόν
  english_pob_reading: Temple refers to the temple complex or precincts, not specifically the inner sanctuary.
  chosen_spanish_reading: templo = complejo o recinto del templo, no el santuario interior
  alternative_spanish_readings:
  - templo
  - atrios del templo
  - recinto del templo
  rationale: La nota evita que el lector entienda «templo» en sentido demasiado restringido. En español, el término principal sigue siendo natural, y la aclaración conserva la precisión histórica del referente griego.
  doctrine_reference: Precisión histórica y cultural del texto bíblico
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió una versión tersa de ἀλλ’ ἵνα («But let the Scriptures be fulfilled») en lugar de explicitar la elipsis. En español se mantiene esa brevedad con una construcción jussiva natural («Pero que se cumplan las Escrituras»), evitando una ampliación interpretativa innecesaria.
  spanish_consistency_notes:
  - 'Se mantiene «escrituras» en forma reverente y plural como término técnico bíblico: «las Escrituras».'
  - Se evita «SEÑOR» porque no aparece el tetragrámaton en este versículo.
  - «Arrestaron» interpreta κρατέω en su contexto de detención; se conserva la alternativa más literal en nota.
  - El registro es formal pero contemporáneo, apto para lectura litúrgica y estudio.
