translation:
  language: es
  text: Y de nuevo se fue y oró[a], diciendo las mismas palabras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mismo dicho».
    reason: previous_rendering
  - marker: b
    text: El griego dice literalmente «la misma palabra» o «el mismo dicho». Aquí se refiere al contenido repetido de la oración de Jesús; por eso se vierte «las mismas palabras» para evitar un singular engañoso en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y otra vez
  alternatives_spanish:
  - Y de nuevo
  - Y nuevamente
  lexicon: BDAG
  rationale: πάλιν expresa repetición secuencial; «otra vez» es natural en español y conserva el avance narrativo sin añadir énfasis indebido.
- source_word: ἀπελθὼν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - se apartó
  - habiéndose ido
  lexicon: BDAG
  rationale: El participio aoristo señala una acción previa de retirada. En español, «se fue» comunica con claridad el movimiento de apartarse sin recargar la frase con una construcción demasiado rígida.
- source_word: προσηύξατο
  english_pob_choice: prayed
  chosen_spanish: oró
  alternatives_spanish:
  - hizo oración
  - estuvo orando
  lexicon: BDAG
  rationale: El verbo προσεύχομαι se vierte normalmente como «orar» en español bíblico contemporáneo. Mantiene el sentido de la acción sin perder naturalidad.
- source_word: τὸν αὐτὸν λόγον
  english_pob_choice: the same words
  chosen_spanish: las mismas palabras
  alternatives_spanish:
  - la misma palabra
  - lo mismo que había dicho
  - el mismo dicho
  lexicon: BDAG
  rationale: Aunque λόγος es singular en griego, el contexto indica el contenido verbal de la oración repetida; por eso «las mismas palabras» expresa con fidelidad y claridad la repetición de la súplica, siguiendo la revisión inglesa que evitó la ambigüedad de «word».
- source_word: εἰπών
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - habiendo dicho
  - al decir
  lexicon: BDAG
  rationale: El participio aoristo de λέγω funciona de modo concomitante y explicativo. «Diciendo» enlaza de forma natural con la oración precedente en español.
translation_notes:
  revision_awareness: La revisión inglesa más reciente mantuvo la lectura de referencia sin cambios sustanciales, pero el audit trail registró una corrección importante previa de «the same word» a «the same words». La versión española refleja esa decisión y evita una traducción singular que podría inducir a error.
  spanish_consistency_notes:
  - Se conserva un registro sobrio y narrativo acorde con el resto del evangelio.
  - No se usa «SEÑOR» ni otros sustitutos divinos, pues el verso no contiene el nombre divino ni una referencia explícita al título κύριος.
  - «Oró» y «diciendo» mantienen un estilo bíblico claro y contemporáneo sin arcaísmo innecesario.
