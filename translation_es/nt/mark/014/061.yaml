translation:
  language: es
  text: 'Pero él guardaba silencio y no respondía nada[a]. De nuevo, el sumo sacerdote lo interrogaba y le dice: «¿Eres tú el Mesías, el Hijo del Bendito[b]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no respondió nada».
    reason: alternative_reading
  - marker: b
    text: «El Bendito» es una manera judía reverencial de referirse a Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ἐσιώπα
  english_pob_choice: kept silent
  chosen_spanish: guardaba silencio
  alternatives_spanish:
  - seguía callado
  - permanecía en silencio
  lexicon: BDAG
  rationale: El imperfecto expresa una acción շարունակada; en español, «guardaba silencio» comunica mejor la duración que un pretérito puntual y evita un calco rígido.
- source_word: ἀπεκρίνατο οὐδέν
  english_pob_choice: answered nothing
  chosen_spanish: no respondía nada
  alternatives_spanish:
  - no dio respuesta alguna
  - no contestó nada
  lexicon: BDAG
  rationale: La construcción negada subraya la total ausencia de respuesta. «No respondía nada» conserva esa fuerza y suena natural en español actual.
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: De nuevo
  alternatives_spanish:
  - Otra vez
  - Nuevamente
  lexicon: BDAG
  rationale: Marca repetición inmediata de la pregunta del sumo sacerdote; «De nuevo» es claro, idiomático y breve.
- source_word: ἀρχιερεὺς
  english_pob_choice: high priest
  chosen_spanish: sumo sacerdote
  alternatives_spanish:
  - el sumo sacerdote
  - el pontífice
  lexicon: BDAG
  rationale: Es el término estándar y preciso para el funcionario judío en el contexto del juicio. «Sumo sacerdote» evita formulaciones eclesiásticas ajenas al pasaje.
- source_word: ἐπηρώτα
  english_pob_choice: questioned
  chosen_spanish: lo interrogaba
  alternatives_spanish:
  - lo preguntaba
  - le hacía preguntas
  lexicon: BDAG
  rationale: El imperfecto indica insistencia o repetición. «Lo interrogaba» conserva el matiz judicial más fuertemente que un simple «preguntaba».
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos para reflejar la vivacidad narrativa del original, como en el audit trail inglés.
- source_word: χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí λειτουργa como título en un contexto judío de juicio; «Mesías» preserva mejor el sentido hebraico que «Cristo» en español.
- source_word: ὁ υἱὸς τοῦ εὐλογητοῦ
  english_pob_choice: the Son of the Blessed One
  chosen_spanish: el Hijo del Bendito
  alternatives_spanish:
  - el Hijo del Bendito Uno
  - el Hijo de Dios
  lexicon: BDAG
  rationale: «Del Bendito» mantiene la circunlocución reverencial del griego y evita reemplazarla por una explicitación que el texto no ofrece. En español, la frase suena natural y conserva el valor indirecto del apelativo.
theological_decisions:
- issue: Χριστός como título mesiánico en una escena de juicio
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El término funciona como título, no como nombre propio litúrgico. Traducirlo como «Mesías» preserva el trasfondo judío y la tensión del interrogatorio.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default ''Messiah'' where title; Translation philosophy §2'
- issue: τοῦ εὐλογητοῦ como circunlocución reverencial para Dios
  english_pob_reading: the Blessed One
  chosen_spanish_reading: el Bendito
  alternative_spanish_readings:
  - Dios
  - el Bendito Uno
  rationale: La expresión griega es una forma reverencial indirecta. Mantenerla como «el Bendito» permite que el lector perciba la circunlocución sin sustituirla por una explicación interpretativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §1, §6'
translation_notes:
  revision_awareness: El borrador sigue de cerca el último pasaje en inglés, manteniendo el presente histórico de λέγει y la distinción entre el silencio continuo y la respuesta nula. No se incorporaron cambios de revisión adicionales porque el audit trail indica acuerdo alto y sin modificaciones recientes.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en concordancia con el criterio doctrinal del proyecto cuando el término actúa como título.
  - Se usa «sumo sacerdote» como denominación estable y transparente del cargo judío.
  - Se preserva la circunlocución reverencial «el Bendito» sin sustituirla por «Dios» en el texto principal.
  - La puntuación y el uso de comillas angulares siguen la convención española y facilitan la lectura pública.
