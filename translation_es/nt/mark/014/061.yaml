base_translation:
  language: en
  yaml_path: translation/nt/mark/014/061.yaml
  text: But he kept silent and answered nothing[a]. Again the high priest questioned him and says to him, “Are you the Messiah[b], the Son of the Blessed One?”
  footnotes:
  - marker: a
    text: Or “Christ.” The Greek title is Χριστός (Christos), here rendered “Messiah” because it functions as a title in a Jewish messianic context.
    reason: alternative_reading
  - marker: b
    text: “The Blessed One” is a reverential Jewish way of referring to God.
    reason: cultural_note
