review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: conserva el presente histórico («dice»), mantiene ambos marcadores temporales («hoy» y «esta misma noche»), preserva la secuencia numérica «dos veces / tres veces» y traduce correctamente με ἀπαρνήσῃ como «me negarás». La estructura general es fiel a la evidencia fuente y al rastro de auditoría inglés.'
  spanish_quality_summary: El español es claro, natural y digno. Sin embargo, «antes que el gallo cante» suena menos estándar en español general que «antes de que el gallo cante». Además, el pronombre explícito «tú» es posible, pero en esta colocación («que tú, hoy...») resulta algo marcado y menos fluido; el énfasis del griego puede conservarse sin esa rigidez en español. También conviene reflejar la nota alternativa del inglés sobre la formulación más literal.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Jesús», «En verdad», «hoy», «esta misma noche» y «me negarás» están bien alineados. No intervienen aquí términos sensibles como Yahvé, Mesías/Cristo, espíritu, esclavo, etc.
  issues:
  - severity: medium
    issue: «antes que» suena menos natural que «antes de que»
    rationale: Aunque «antes que» es posible, «antes de que» es la construcción más ampliamente natural y clara en español contemporáneo para esta subordinada temporal con subjuntivo.
  - severity: low
    issue: El pronombre «tú» produce una sintaxis algo rígida
    rationale: El griego explicita σὺ para énfasis, pero en español no siempre conviene calcarlo. La frase fluye mejor sin «tú» y no pierde el sentido central ni la inmediatez del anuncio.
  - severity: low
    issue: Falta la nota de alternativa literal preservada en el POB inglés
    rationale: El inglés documenta una alternativa más literal para la construcción con πρὶν ἢ + infinitivo. Conviene mantener una nota equivalente en español para preservar la trazabilidad lexical.
  revised_spanish_text: 'Y Jesús le dice: «En verdad te digo que hoy, esta misma noche, antes de que el gallo[a] cante dos veces, me negarás tres veces»'
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «antes de que un gallo cante dos veces, me negarás tres veces».
    reason: lexical_alternative
  revision_rationale: Se ajusta «antes que» a «antes de que» por naturalidad y amplitud de uso en español contemporáneo, se elimina «tú» para evitar un calco enfático algo rígido, y se añade una nota que conserva la alternativa más literal documentada en la auditoría inglesa. No se requiere una revisión doctrinal o textual compleja.
