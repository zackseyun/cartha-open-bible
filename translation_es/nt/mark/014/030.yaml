translation:
  language: es
  text: 'Y Jesús le dice: «En verdad te digo que hoy, esta misma noche, antes de que el gallo[a] cante dos veces, me negarás tres veces»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «antes de que un gallo cante dos veces, me negarás tres veces».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «dice», en lugar de normalizarlo al pasado. Así se mantiene visible el estilo narrativo de Marcos.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar y directo en español.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - De cierto
  lexicon: BDAG
  rationale: En el inicio solemne de una declaración de Jesús, «En verdad» transmite la fuerza afirmativa de ἀμήν con naturalidad en español, sin dejarlo como transliteración litúrgica.
- source_word: λέγω σοι
  english_pob_choice: I tell you
  chosen_spanish: te digo
  alternatives_spanish:
  - les digo
  - te afirmo
  lexicon: BDAG
  rationale: «Te digo» conserva la dirección personal y la declaración solemne sin volver la frase artificial.
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  lexicon: BDAG
  rationale: El pronombre explícito griego se refleja con «tú» para mantener el énfasis personal. Se añade junto al verbo para dar peso al sujeto expreso.
- source_word: σήμερον
  english_pob_choice: today
  chosen_spanish: hoy
  alternatives_spanish:
  - este día
  lexicon: BDAG
  rationale: «Hoy» es la equivalencia natural y directa de σήμερον en español contemporáneo.
- source_word: ταύτῃ τῇ νυκτί
  english_pob_choice: this very night
  chosen_spanish: esta misma noche
  alternatives_spanish:
  - esta noche
  - en esta noche
  lexicon: BDAG
  rationale: La combinación demostrativa + sustantivo es enfática; «esta misma noche» reproduce mejor esa intensificación que «esta noche» a secas.
- source_word: πρὶν ἢ
  english_pob_choice: before
  chosen_spanish: antes que
  alternatives_spanish:
  - antes de que
  lexicon: BDAG
  rationale: Introduce correctamente el evento previo en español; «antes que» encaja bien antes de una proposición con subjuntivo/valor temporal.
- source_word: δὶς
  english_pob_choice: twice
  chosen_spanish: dos veces
  alternatives_spanish:
  - dos
  lexicon: BDAG
  rationale: Renderiza el adverbio numérico de manera transparente y idiomática.
- source_word: ἀλέκτορα φωνῆσαι
  english_pob_choice: a rooster crows
  chosen_spanish: el gallo cante
  alternatives_spanish:
  - cante el gallo
  - el gallo cante dos veces
  lexicon: BDAG
  rationale: En español, la expresión idiomática natural es con «gallo». Se usa subjuntivo después de «antes que», y el contexto de «dos veces» deja claro el número de cantos.
- source_word: τρίς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres
  lexicon: BDAG
  rationale: Equivalencia directa del adverbio, preservando la simetría numérica con «dos veces».
- source_word: με ἀπαρνήσῃ
  english_pob_choice: will deny me
  chosen_spanish: me negarás
  alternatives_spanish:
  - me repudiarás
  - me renegarás
  lexicon: BDAG
  rationale: «Negar» es la traducción estándar y más clara en este anuncio de Peter negando a Jesús. «Renegar» o «repudiar» introducen matices menos directos.
theological_decisions:
- issue: Presencia simultánea de σήμερον y ταύτῃ τῇ νυκτί
  english_pob_reading: 'Both expressions are retained: ''today, this very night'''
  chosen_spanish_reading: 'Se mantienen ambas expresiones: «hoy, esta misma noche»'
  alternative_spanish_readings:
  - Reducir a solo «esta misma noche»
  - suavizar a «hoy, ya esta noche»
  rationale: El griego contiene ambos marcadores temporales y su acumulación refuerza la inmediatez de la profecía. Conviene conservar ambos para no perder el énfasis textual.
  doctrine_reference: Translation philosophy §1, §5
- issue: Presente histórico de λέγει
  english_pob_reading: Preserve present tense with 'Jesus says'
  chosen_spanish_reading: Se conserva con «Jesús dice»
  alternative_spanish_readings:
  - «Jesús dijo»
  rationale: El presente histórico en Marcos forma parte del estilo narrativo. Mantenerlo en español deja visible esa característica del texto fuente.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando cualquier nota al pie no anclada en el texto. La redacción final no requiere notas porque el sentido de ἀλέκτορα φωνῆσαι y la estructura temporal se expresan de forma directa en español.
  spanish_consistency_notes:
  - Se mantuvo un español neutral, claro y apto para lectura eclesial.
  - Se prefirió «gallo» en lugar de «gallo/canto del gallo» o «gallo cantará» para ajustarse al uso natural con «antes que».
  - Se conservó el presente histórico con «dice» para reflejar el griego sin sobrecargar la frase.
  - No se usó «Cristo», «Señor» ni otras formas teológicas no presentes en el verso.
