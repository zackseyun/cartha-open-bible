revisions:
- from: 'Y Jesús le dice: “En verdad te digo que tú, hoy, esta misma noche, antes que el gallo cante dos veces, me negarás tres veces.”'
  to: 'Y Jesús le dice: «En verdad te digo que hoy, esta misma noche, antes de que el gallo[a] cante dos veces, me negarás tres veces»'
  rationale: Se ajusta «antes que» a «antes de que» por naturalidad y amplitud de uso en español contemporáneo, se elimina «tú» para evitar un calco enfático algo rígido, y se añade una nota que conserva la alternativa más literal documentada en la auditoría inglesa. No se requiere una revisión doctrinal o textual compleja.
