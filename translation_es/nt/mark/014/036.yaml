  text: καὶ ἔλεγεν· Αββα ὁ πατήρ, πάντα δυνατά σοι· παρένεγκε τὸ ποτήριον ⸂τοῦτο ἀπ’ ἐμοῦ⸃· ἀλλ’ οὐ τί ἐγὼ θέλω ἀλλὰ τί σύ.
base_translation:
  language: en
  yaml_path: translation/nt/mark/014/036.yaml
  text: And he was saying[a], “Abba, Father, all things are possible for you. Take this cup away from me. Yet not what I will[c][b], but what you will.”
  footnotes:
  - marker: a
    text: 'Or, ''he said.'' The Greek imperfect may suggest repeated or continued speech: ''he was saying.'''
    reason: lexical_alternative
  - marker: b
    text: '''Abba'' is an Aramaic form of address for father, retained here alongside the Greek ''Father.'''
    reason: cultural_note
  - marker: c
    text: '''Cup'' is a biblical metaphor for the suffering appointed to him; compare Mark 10:38.'
    reason: cross_reference
