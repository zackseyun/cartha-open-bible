- from: 'Y decía[a]: «¡Abba, Padre! Todo es posible para ti. Aparta de mí[b] esta copa[c]. Pero no lo que yo quiero, sino lo que tú quieres».'
  to: 'Y decía[a]: «Abba[b], Padre, todo es posible para ti. Aparta esta copa[c] de mí. Pero no lo que yo quiero, sino lo que tú quieres».'
  rationale: 'La revisión es menor pero necesaria para alinear el español con la pista de auditoría inglesa y la evidencia fuente: se restituye la nota importante sobre «Abba», se elimina una nota menos esencial sobre «de mí», se suaviza la puntuación para no añadir dramatización no marcada en el griego, y se ajusta ligeramente el orden de la frase para una lectura más natural y fiel.'
