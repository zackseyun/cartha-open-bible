review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego y sigue de cerca las decisiones del English POB: imperfecto «decía», doble apelación «Abba, Padre», preservación de «copa» como metáfora, y contraste de voluntades al final. Sin embargo, hay dos desajustes relevantes con la evidencia y la pista de auditoría inglesa: (1) falta la nota cultural sobre «Abba», que el English POB preserva explícitamente; y (2) la colocación de la nota [b] en «de mí» documenta una explicación menos necesaria, mientras que el matiz principal del verso en la auditoría es la retención de «Abba».'
  spanish_quality_summary: El español es claro, natural y digno. No obstante, «¡Abba, Padre!» con signos de exclamación no corresponde a ninguna fuerza especial del griego y suena algo dramatizado; una cita directa con coma resulta más sobria y fiel. «Aparta de mí esta copa» es comprensible, pero «aparta esta copa de mí» se alinea mejor con el orden y alcance semántico del original y evita que la nota quede anclada en un punto secundario. También conviene conservar la nota de aspecto verbal en «decía» y la de la metáfora de «copa».
  glossary_alignment: No hay conflictos con la glosa base del proyecto. «Abba» se conserva correctamente; «Padre» traduce ὁ πατήρ con naturalidad. «Copa» mantiene la metáfora. «Quiero» para θέλω es aceptable en español moderno, aunque «voluntad» sería más tradicional; aquí la forma verbal respeta mejor la estructura fuente. No intervienen términos sensibles como Yahvé/Mesías/esclavo.
  issues:
  - severity: medium
    issue: Falta la nota sobre «Abba» presente en la auditoría inglesa
    rationale: El English POB conserva una nota cultural/lexical que explica que «Abba» es una forma aramea de dirigirse al padre, retenida junto al griego «Father». Esa decisión forma parte de la justificación auditada y debe preservarse en español.
  - severity: low
    issue: Uso de signos de exclamación en «¡Abba, Padre!»
    rationale: El griego no exige exclamación. En español bíblico legible y sobrio, «Abba, Padre» dentro de comillas basta y evita un tono interpretativo añadido.
  - severity: low
    issue: La nota [b] actual sobre «de mí» enfatiza un punto secundario
    rationale: La explicación de la preposición no es errónea, pero no es la alternativa/nota más significativa según la auditoría inglesa. Es preferible dedicar esa nota a «Abba» y dejar la construcción verbal sin nota adicional.
  revised_spanish_text: 'Y decía[a]: «Abba[b], Padre, todo es posible para ti. Aparta esta copa[c] de mí. Pero no lo que yo quiero, sino lo que tú quieres».'
