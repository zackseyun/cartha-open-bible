translation:
  language: es
  text: 'Y decía[a]: «Abba[b], Padre, todo es posible para ti. Aparta esta copa[c] de mí. Pero no lo que yo quiero, sino lo que tú quieres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y dijo». El imperfecto griego puede sugerir habla continuada o repetida: «decía».'
    reason: lexical_alternative
  - marker: b
    text: «Abba» es una forma aramea de dirigirse al padre, retenida aquí junto con el griego «Padre».
    reason: cultural_note
  - marker: c
    text: «Copa» conserva la metáfora bíblica del sufrimiento asignado a él; compárese Marcos 10:38.
    reason: cross_reference
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: y decía
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El imperfecto griego puede sugerir habla շարունակada o repetida; «decía» conserva ese aspecto mejor que un simple pretérito, y suena natural en español.
- source_word: Αββα ὁ πατήρ
  english_pob_choice: Abba, Father
  chosen_spanish: ¡Abba, Padre!
  alternatives_spanish:
  - ¡Abba, mi Padre!
  lexicon: BDAG
  rationale: Se retiene la forma aramea «Abba» y se traduce la apposición griega como vocativo directo «Padre». No se añade «mi», porque no está explícito en el griego.
- source_word: πάντα δυνατά σοι
  english_pob_choice: all things are possible for you
  chosen_spanish: Todo es posible para ti
  alternatives_spanish:
  - Todas las cosas son posibles para ti
  lexicon: BDAG
  rationale: La construcción expresa que nada excede el poder de Dios; «Todo es posible para ti» comunica de manera natural la amplitud de πάντα δυνατά σοι sin perder el sentido.
- source_word: παρένεγκε
  english_pob_choice: Take ... away
  chosen_spanish: Aparta de mí
  alternatives_spanish:
  - Quita de mí
  - Lleva de mí
  lexicon: BDAG
  rationale: En este contexto oracional, la petición pide que la copa sea retirada. «Aparta de mí» comunica con claridad la acción pedida y mantiene la fuerza imperativa.
- source_word: τὸ ποτήριον τοῦτο
  english_pob_choice: this cup
  chosen_spanish: esta copa
  alternatives_spanish:
  - este cáliz
  lexicon: BDAG
  rationale: Se conserva la metáfora bíblica de la «copa» en vez de interpretarla como sufrimiento a secas. «Copa» es la opción más natural y transparente en español.
- source_word: ἀπ’ ἐμοῦ
  english_pob_choice: away from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartada de mí
  lexicon: BDAG
  rationale: Con el imperativo «aparta», la preposición se expresa naturalmente con «de mí»; el desplazamiento fuera de la esfera del hablante queda implícito sin redundancia.
- source_word: οὐ τί ἐγὼ θέλω ἀλλὰ τί σύ
  english_pob_choice: Yet not what I will, but what you will
  chosen_spanish: Pero no lo que yo quiero, sino lo que tú quieres
  alternatives_spanish:
  - Pero no lo que yo quiera, sino lo que tú quieras
  - Sino tu voluntad, no la mía
  lexicon: BDAG
  rationale: «θέλω» expresa voluntad/deseo; en español «quiero» es el equivalente más natural aquí. Se mantiene la tensión teológica entre la voluntad de Jesús y la del Padre sin resolverla en una paráfrasis.
theological_decisions:
- issue: 'Mantener la doble forma de dirección a Dios: aramea y griega'
  english_pob_reading: Abba, Father
  chosen_spanish_reading: ¡Abba, Padre!
  alternative_spanish_readings:
  - ¡Abba, mi Padre!
  rationale: La fuente conserva tanto la forma aramea como la explicación griega. Mantener ambas en español respeta el texto y su efecto de cercanía, sin añadir posesión no explícita.
  doctrine_reference: 'Principio POB: primacía del original, con transparencia frente a la tradición devocional'
- issue: Conservar la metáfora de la copa
  english_pob_reading: this cup
  chosen_spanish_reading: esta copa
  alternative_spanish_readings:
  - este sufrimiento
  - este destino
  rationale: La metáfora debe permanecer visible en español para conservar la resonancia bíblica e intertextual. El contexto la carga de sufrimiento, pero el texto no la reemplaza por una explicación.
  doctrine_reference: 'Principio POB: preservar la tensión teológica en vez de resolverla'
- issue: Reproducción del contraste de voluntad
  english_pob_reading: Yet not what I will, but what you will
  chosen_spanish_reading: Pero no lo que yo quiero, sino lo que tú quieres
  alternative_spanish_readings:
  - Pero no mi voluntad, sino la tuya
  rationale: El contraste entre la voluntad de Jesús y la del Padre se mantiene explícito. «Quiero» refleja el valor verbal de θέλω con claridad moderna, sin convertirlo en una formulación litúrgica tradicional.
  doctrine_reference: Cristología y sumisión filial en la oración de Getsemaní
translation_notes:
  revision_awareness: 'Coincide con la evaluación de alta concordancia: no hubo revisiones aplicadas en el pasaje base, y la versión española conserva el imperfecto, la invocación semítica, la metáfora de la copa y el contraste de voluntades.'
  spanish_consistency_notes:
  - Se mantiene «Abba» sin transliterarlo ni sustituirlo por una fórmula devocional equivalente.
  - Se usa «copa» de manera consistente para preservar la imagen bíblica, no una explicación interpretativa.
  - «Quiero» se emplea para θέλω por naturalidad y fidelidad semántica; no se reemplaza por «voluntad» en el cuerpo del texto, aunque se alude a ello en la nota teológica.
  - La puntuación reproduce una lectura fluida en español y conserva la progresión súplica–renuncia del griego.
