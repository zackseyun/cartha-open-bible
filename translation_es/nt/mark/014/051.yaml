translation:
  language: es
  text: Y cierto joven lo seguía, envuelto solo en una tela[a] de lino sobre su cuerpo desnudo, y lo agarran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una sábana de lino». El griego σινδών puede referirse a una tela de lino o a una prenda similar a una sábana.
    reason: lexical_alternative
lexical_decisions:
- source_word: νεανίσκος τις
  english_pob_choice: a certain young man
  chosen_spanish: un cierto joven
  alternatives_spanish:
  - un joven
  - un joven cierto
  lexicon: BDAG
  rationale: νεανίσκος designa a un joven; τις aporta indefinición con un matiz de singularización narrativa. «Un cierto joven» conserva ese valor sin sobreespecificar la identidad.
- source_word: συνηκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - lo estaba siguiendo
  - seguía detrás de él
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado. «Lo seguía» mantiene esa duración de forma natural en español.
- source_word: αὐτῷ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se refiere a Jesús en el contexto; en español, con «seguir» es natural usar objeto directo pronominal «lo».
- source_word: περιβεβλημένος
  english_pob_choice: wearing
  chosen_spanish: cubierto
  alternatives_spanish:
  - envuelto
  - vestido
  lexicon: BDAG
  rationale: El participio de περιβάλλω puede implicar estar vestido o envuelto. «Cubierto» comunica la situación física sin forzar una prenda específica.
- source_word: σινδόνα
  english_pob_choice: a linen cloth
  chosen_spanish: una sábana de lino
  alternatives_spanish:
  - un lienzo de lino
  - una tela de lino
  lexicon: BDAG
  rationale: σινδών puede referirse a una tela, sábana o prenda de lino. «Sábana de lino» preserva la amplitud semántica y resulta natural en español, sin cerrar la referencia a una forma concreta de vestidura o tela.
- source_word: ἐπὶ γυμνοῦ
  english_pob_choice: over his naked body
  chosen_spanish: sobre su cuerpo desnudo
  alternatives_spanish:
  - sobre su desnudez
  - sobre su cuerpo desnudo
  lexicon: BDAG
  rationale: La expresión indica que la tela iba directamente sobre el cuerpo sin otra ropa. «Sobre su cuerpo desnudo» conserva el sentido explícito de γυμνοῦ con claridad en español.
- source_word: κρατοῦσιν
  english_pob_choice: they seize
  chosen_spanish: lo sujetan
  alternatives_spanish:
  - lo agarran
  - lo apresan
  lexicon: BDAG
  rationale: κρατέω aquí expresa agarrar con fuerza o sujetar. «Lo sujetan» mantiene la acción física inmediata del presente histórico sin introducir una lectura más jurídica que el griego no exige.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Objeto directo del verbo; en español el referente queda claro por contexto.
translation_notes:
  revision_awareness: La versión española sigue de cerca el audit trail inglés y el griego, manteniendo el imperfecto de acción continua, la indefinición de «τις», y la amplitud semántica de σινδών sin convertirla en una prenda más específica de lo que el texto permite.
  spanish_consistency_notes:
  - Se usa «joven» para νεανίσκος y no «muchacho», por ser más neutro y acorde con el registro narrativo.
  - Se evita «Cristo/Señor» porque el versículo no contiene títulos cristológicos ni el nombre divino.
  - Se mantiene un presente histórico en «lo sujetan» para reflejar κρατοῦσιν, como hace el inglés POB con «they seize».
