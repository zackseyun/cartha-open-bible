  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: introduce a un personaje no identificado, conserva el imperfecto de seguimiento, expresa que llevaba solo una tela de lino directamente sobre el cuerpo, y mantiene el presente histórico final. Sin embargo, dos elecciones debilitan la fidelidad fina: «un cierto joven» suena poco natural en español bíblico actual, y «lo sujetan» queda algo más débil que κρατοῦσιν en este contexto narrativo de aprehensión física.'
  spanish_quality_summary: El texto es mayormente claro, pero «un[a] cierto joven» presenta un anclaje de nota incorrecto y una formulación poco idiomática. Además, la nota al pie está colocada sobre «un» cuando en realidad explica σινδών. «Cubierto solo con» es entendible, pero «envuelto solo en» o «llevando solo» suena más natural con una tela. Conviene pulir la frase para fluidez y precisión narrativa.
  glossary_alignment: 'No hay términos teológicos sensibles del glosario global en este versículo. La decisión sobre σινδών debe seguir la documentación POB: mantener una opción principal amplia y una alternativa en nota. En español, «tela de lino» preserva mejor esa amplitud que «sábana de lino» como texto principal.'
  issues:
