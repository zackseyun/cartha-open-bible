- from: Y un[a] cierto joven lo seguía, cubierto solo con una sábana de lino sobre su cuerpo desnudo, y lo sujetan.
  to: Y cierto joven lo seguía, envuelto solo en una tela[a] de lino sobre su cuerpo desnudo, y lo agarran.
  rationale: Se reubica la nota al término que realmente comenta, se reemplaza «un cierto joven» por «cierto joven» para un español más natural que aún preserve la fuerza narrativa de τις, se amplía el texto principal a «tela de lino» para reflejar mejor σινδών según la auditoría inglesa, y se ajusta el verbo final a «lo agarran» para acercarse más al vigor de κρατοῦσιν sin introducir una lectura jurídica adicional.
