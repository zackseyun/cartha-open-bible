    rationale: La nota explica σινδών, no νεανίσκος τις. El marcador debe colocarse en la palabra o frase correspondiente a la tela de lino.
  - severity: medium
    issue: «Un cierto joven» es poco natural en español
    rationale: Aunque intenta reflejar τις, en español moderno y eclesial suena forzado. «Cierto joven» conserva mejor la particularización narrativa sin torpeza.
  - severity: medium
    issue: «Sábana de lino» como texto principal estrecha demasiado σινδών
    rationale: La evidencia léxica y la auditoría inglesa prefieren una expresión amplia; «tela de lino» o «lienzo de lino» representan mejor el rango semántico, dejando «sábana» como alternativa en nota.
  - severity: low
    issue: «Lo sujetan» es algo más débil que el valor de aprehensión de κρατοῦσιν
    rationale: En este contexto de arresto de Jesús y forcejeo, «lo agarran» transmite mejor la acción inmediata sin sobreinterpretar como «lo arrestan».
  revised_spanish_text: Y cierto joven lo seguía, envuelto solo en una tela[a] de lino sobre su cuerpo desnudo, y lo agarran.
