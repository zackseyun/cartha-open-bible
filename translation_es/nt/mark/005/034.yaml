    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica alternativas para σέσωκέν («te ha salvado / te ha sanado / te ha hecho bien»), pero en el texto está puesta tras «le dijo», lo que induce a pensar que comenta el verbo «dijo» o la frase introductoria.
  - severity: high
    issue: La nota [b] no corresponde al segmento donde está anclada.
    rationale: Está colocada tras «en paz», pero su contenido («sé bien» o «sé íntegra») comenta ἴσθι ὑγιὴς, no εἰς εἰρήνην. Esto contradice el audit trail inglés y confunde al lector.
