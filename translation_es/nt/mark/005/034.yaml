review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español conserva bien la estructura básica del griego: vocativo «Hija», πίστις como «fe», σέσωκέν σε como «te ha salvado», y μάστιγός σου como «tu aflicción». También mantiene la distinción teológica entre «te ha salvado» y la cláusula posterior sobre salud. Sin embargo, el anclaje de la nota [a] está mal ubicado en «le dijo[a]» cuando la nota explica σέσωκέν, no αὐτῇ/εἶπεν. Además, la nota [b] está asociada a «en paz» pero su contenido actual comenta ἴσθι ὑγιὴς; eso desaline­a texto y nota con el audit trail inglés. Conviene reanclar las notas y ajustar levemente la redacción final para una equivalencia más natural de ἴσθι ὑγιής.'
  spanish_quality_summary: La redacción es clara y digna. «Hija, tu fe te ha salvado» suena natural y fiel. «Vete en paz» es idiomático, aunque «Ve en paz» es más sobrio y se acerca mejor al imperativo simple sin el matiz de alejamiento de «vete». «Sé sana» es comprensible, pero en español moderno suena algo menos natural que «queda sana» o «sé sana» según contexto; aquí «queda sana de tu aflicción» refleja mejor el estado resultante sin perder el sentido estativo de ἴσθι ὑγιής.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: πίστις → «fe»; σῴζω → «salvar»; no hay conflictos con Yahvé/Mesías/etc. El problema principal no es terminológico sino de notas y de una mejora de naturalidad en la cláusula final.'
  issues:
