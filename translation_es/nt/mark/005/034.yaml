translation:
  language: es
  text: 'Pero él le dijo: «Hija, tu fe te ha salvado[a]. Ve en paz, y queda sana[b] de tu aflicción».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tu fe te ha sanado» o «tu fe te ha hecho bien». El verbo griego puede referirse a rescate, salvación o sanidad.
    reason: alternative_reading
  - marker: b
    text: O «sé sana» o «sé íntegra».
    reason: lexical_alternative
lexical_decisions:
- source_word: Θυγάτηρ
  english_pob_choice: Daughter
  chosen_spanish: Hija
  alternatives_spanish:
  - Hija mía
  - Querida hija
  lexicon: BDAG
  rationale: Se conserva el vocativo literal y afectuoso sin añadir posesivo que no está en el griego. "Hija" transmite cercanía y tono personal de manera natural en español.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Se mantiene el término bíblico estándar "fe" para πίστις, coherente con el valor de respuesta confiada a Jesús. "Confianza" sería posible, pero atenúa la consistencia terminológica.
- source_word: σέσωκέν
  english_pob_choice: has saved
  chosen_spanish: te ha salvado
  alternatives_spanish:
  - te ha sanado
  - te ha hecho bien
  lexicon: BDAG
  rationale: '"Ha salvado" preserva el alcance de σῴζω y mantiene la tensión entre salvación y curación física que el contexto no resuelve al fusionarla. El perfecto se refleja con "ha".'
- source_word: ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Vete
  alternatives_spanish:
  - Ve
  - Anda
  lexicon: BDAG
  rationale: En español, el imperativo pronominal "vete" suena más natural que "ve" para un mandato de despedida, sin alterar el valor simple del verbo.
- source_word: εἰς εἰρήνην
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - con paz
  - hacia la paz
  lexicon: BDAG
  rationale: La expresión idiomática se naturaliza como "en paz", que comunica estado de paz y bienestar al partir, de modo equivalente al inglés POB.
- source_word: ἴσθι ὑγιὴς
  english_pob_choice: be well
  chosen_spanish: sé sana
  alternatives_spanish:
  - sé bien
  - mantente sana
  - sé íntegra
  lexicon: BDAG
  rationale: Se refleja el valor estativo de ὑγιής con "sé sana", opción clara y digna en español. "Sé bien" sería menos idiomático; "sé íntegra" no expresa tan directamente la recuperación de salud.
- source_word: μάστιγός
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - azote
  - dolencia
  - enfermedad
  lexicon: BDAG
  rationale: '"Aflicción" reproduce la amplitud metafórica de μάστιξ sin reducirla a un diagnóstico médico ni cargarla con "azote" como metáfora más dura. Preserva el sufrimiento grave indicado por el contexto.'
theological_decisions:
- issue: Preservación del doble valor de σῴζω frente a la sanidad física
  english_pob_reading: has saved you
  chosen_spanish_reading: te ha salvado
  alternative_spanish_readings:
  - te ha sanado
  - te ha hecho bien
  rationale: Se mantiene la posibilidad de lectura salvífica y no se colapsa el verbo en simple curación; esto respeta la tensión documentada por la POB en el texto inglés y deja la segunda cláusula para la restauración corporal.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3, preserve theological tension rather than resolve it'
- issue: Distinción entre fe y curación
  english_pob_reading: your faith has saved you ... be well
  chosen_spanish_reading: tu fe te ha salvado ... sé sana
  alternative_spanish_readings:
  - tu fe te ha sanado ... sé bien
  rationale: 'Se conserva la separación de funciones: la fe como medio de salvación/total restauración, y el segundo mandato como estado de salud. Esto evita fusionar ambas ideas en una sola frase.'
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
translation_notes:
  revision_awareness: La redacción sigue el último pase de revisión del POB en inglés, que mantuvo «has saved you» para σέσωκέν σε y ajustó la segunda cláusula para reflejar de manera más directa el valor estativo de ὑγιής. En español se conserva esa distinción con «te ha salvado» y «sé sana», evitando fusionar salvación y sanidad en una sola expresión.
  spanish_consistency_notes:
  - Se usa «fe» para πίστις, conforme al término doctrinal habitual del proyecto.
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - La puntuación y el orden buscan sonar naturales en español sin perder el paralelismo del griego.
  - Los corchetes de notas aparecen exactamente en el texto para anclar las alternativas léxicas.
