    rationale: No es una infidelidad grave, pero «Ve» es más neutro, más sobrio y suficiente para el imperativo simple.
  - severity: low
    issue: «Sé sana» es algo rígido en español actual.
    rationale: Aunque posible, «queda sana» suena más natural y expresa bien el resultado de estar libre de la aflicción, en línea con el inglés auditado «be well».
