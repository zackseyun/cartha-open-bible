base_translation:
  language: en
  yaml_path: translation/nt/mark/005/019.yaml
  text: And he did not permit him[a], but said to him, “Go to your home, to your own people[c][b], and report to them how much the Lord has done for you and has shown mercy to you.”
  footnotes:
  - marker: a
    text: Or, 'all that the Lord has done for you.'
    reason: lexical_alternative
  - marker: b
    text: Greek literally, 'to your own.' The phrase may refer broadly to his own people, including family and close associates.
    reason: lexical_alternative
  - marker: c
    text: Some interpreters understand 'the Lord' here specifically as God; others see Mark intentionally preserving a link between God's mercy and Jesus' own authority and action.
    reason: alternative_reading
