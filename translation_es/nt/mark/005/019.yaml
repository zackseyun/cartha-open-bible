translation:
  language: es
  text: 'Y no le permitió, sino que le dijo: «Vete a tu casa, a los tuyos[b], y cuéntales cuántas cosas[a] ha hecho por ti el Señor[c] y cómo ha tenido misericordia de ti».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «todo lo que el Señor ha hecho por ti».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego literalmente: «a los tuyos». La expresión puede referirse en sentido amplio a su propia gente, incluidos familia y allegados.'
    reason: lexical_alternative
  - marker: c
    text: Algunos intérpretes entienden aquí «el Señor» como Dios; otros ven que Marcos conserva deliberadamente un vínculo entre la misericordia de Dios y la autoridad y acción de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀφῆκεν
  english_pob_choice: did not permit
  chosen_spanish: no le permitió
  alternatives_spanish:
  - no le dejó
  - no le permitió irse
  lexicon: BDAG
  rationale: ἀφίημι aquí significa permitir o dejar, no perdonar ni abandonar. «No le permitió» preserva bien el valor de permiso y suena natural en español bíblico actual.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: le dijo
  alternatives_spanish:
  - le dice
  lexicon: BDAG
  rationale: El presente histórico griego se vierte normalmente al pasado narrativo en español. «Le dijo» mantiene la fluidez sin cambiar el sentido.
- source_word: Ὕπαγε
  english_pob_choice: Go
  chosen_spanish: Vete
  alternatives_spanish:
  - Ve
  - Sal
  lexicon: BDAG
  rationale: El imperativo indica salida con destino. «Vete» comunica mejor el matiz de partir de allí hacia otro lugar que un simple «ve».
- source_word: εἰς τὸν οἶκόν σου
  english_pob_choice: to your home
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu hogar y casa
  - a tu vivienda
  lexicon: BDAG
  rationale: οἶκος puede referirse a casa u hogar. En este contexto, «a tu casa» es la forma más natural y fiel; «hogar» sería más interpretativo.
- source_word: πρὸς τοὺς σούς
  english_pob_choice: to your own people
  chosen_spanish: a los tuyos
  alternatives_spanish:
  - a tu gente
  - a tus propios
  lexicon: BDAG
  rationale: La frase griega es literalmente «a los tuyos», con un alcance que puede incluir familia y allegados. «A los tuyos» conserva esa amplitud mejor que estrecharlo a «familia».
- source_word: ἀπάγγειλον
  english_pob_choice: report
  chosen_spanish: cuéntales
  alternatives_spanish:
  - repórtales
  - declárales
  - anúnciales
  lexicon: BDAG
  rationale: ἀπαγγέλλω puede significar informar o contar de nuevo. En español, «cuéntales» transmite bien el acto de relatar lo ocurrido sin sonar burocrático.
- source_word: ὅσα
  english_pob_choice: how much
  chosen_spanish: cuántas cosas
  alternatives_spanish:
  - todo lo que
  - cuánto
  lexicon: BDAG
  rationale: Aquí ὅσα introduce el contenido/extensión de lo que hizo Jesús. «Cuántas cosas» refleja el plural neutro y la idea de magnitud; también permite una lectura cercana a «todo lo que» sin perder la forma del griego.
- source_word: ὁ κύριός σοι
  english_pob_choice: the Lord has done for you
  chosen_spanish: el Señor ha hecho por ti
  alternatives_spanish:
  - el Señor ha hecho para ti
  - tu Señor ha hecho por ti
  - Dios ha hecho por ti
  lexicon: BDAG
  rationale: Se mantiene «Señor» como equivalente de κύριος, conforme al criterio doctrinal del proyecto. La construcción «ha hecho por ti» conserva el dativo de beneficio y evita resolver la tensión contextual entre una referencia a Dios y la acción de Jesús.
- source_word: ἠλέησέν σε
  english_pob_choice: has shown mercy to you
  chosen_spanish: ha tenido misericordia de ti
  alternatives_spanish:
  - te ha mostrado misericordia
  - te ha compadecido
  - ha sido misericordioso contigo
  lexicon: BDAG
  rationale: ἐλεάω expresa mostrar misericordia/compasión. «Ha tenido misericordia de ti» es una fórmula clara, reverente y plenamente fiel al campo semántico.
theological_decisions:
- issue: Valor de κύριος en una frase donde el sanado debe contar lo que «el Señor» ha hecho
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Dios
  - el dueño
  rationale: 'Se conserva «el Señor» para no borrar la tensión textual documentada: la expresión puede leerse como referencia a Dios y, a la vez, el contexto narrativo vincula la misericordia con la autoridad y acción de Jesús. Traducirlo como «Dios» resolvería demasiado pronto esa tensión; «el dueño» no corresponde al uso doctrinal normal de κύριος aquí.'
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → ''Lord''); Translation philosophy #3 preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no se requieren cambios respecto del pasaje base. Se mantuvo la tensión en κύριος y la amplitud de πρὸς τοὺς σούς.'
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al criterio doctrinal del proyecto.
  - Se prefirió «a tu casa» y «a los tuyos» para reflejar el contraste entre hogar y personas cercanas sin estrechar el sentido.
  - Se evitó una paráfrasis interpretativa de ὅσα; la formulación conserva el carácter de relato de lo hecho.
  - La puntuación de diálogo sigue el uso editorial español con comillas angulares implícitas en la cita bíblica.
