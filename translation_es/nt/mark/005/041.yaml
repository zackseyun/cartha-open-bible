translation:
  language: es
  text: 'Y tomando la mano de la niña[a], le dice: «Talita koum, que se traduce: “Niña, a ti te digo, ¡levántate!”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunas versiones escriben la frase aramea como «Talita cum», siguiendo una transliteración tradicional. El texto griego aquí lee κουμ, lo que respalda «koum».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρατήσας
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - tomando de la mano
  - tomando la mano
  - agarrando
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción concomitante previa al dicho de Jesús. «Tomando» mantiene la secuencia narrativa y suena natural en español; «agarrando» sería más fuerte de lo que el contexto sugiere.
- source_word: τῆς χειρὸς
  english_pob_choice: the hand
  chosen_spanish: la mano
  alternatives_spanish:
  - de la mano
  - la mano de
  lexicon: BDAG
  rationale: Con κρατέω, el giro expresa tomar la mano como gesto concreto. En español, «tomando la mano de la niña» conserva la acción física sin forzar una construcción demasiado pesada.
- source_word: τοῦ παιδίου
  english_pob_choice: the child's
  chosen_spanish: de la niña
  alternatives_spanish:
  - de la niña pequeña
  - de la muchacha
  - del niño
  lexicon: BDAG
  rationale: Aunque παιδίον es un diminutivo de «niño/niña», el versículo mismo aclara después con κοράσιον que se trata de una muchacha. «Niña» evita redundancia y armoniza con la interpretación inmediata del texto.
- source_word: λέγει αὐτῇ
  english_pob_choice: he says to her
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  - le habla
  lexicon: BDAG
  rationale: El presente histórico λέγει se conserva mejor con «dice»/«le dice», que mantiene el estilo vívido de Marcos.
- source_word: Ταλιθα κουμ
  english_pob_choice: Talitha koum
  chosen_spanish: Talita cum
  alternatives_spanish:
  - Talita koum
  - Talitha cum
  - Talita, levántate
  lexicon: BDAG
  rationale: Se translitera la expresión aramea preservada en el griego. Se adopta «cum» para reflejar la forma tradicional castellana y la recepción eclesial, sin perder la nota de extranjería del dicho original; se mantiene la glosa explicativa inmediata.
- source_word: μεθερμηνευόμενον
  english_pob_choice: which is translated
  chosen_spanish: que significa
  alternatives_spanish:
  - que se traduce
  - que es traducido
  - es decir
  lexicon: BDAG
  rationale: El participio señala la equivalencia explicativa del arameo. En español, «que significa» comunica con claridad la función interpretativa del inciso sin sonar técnico ni forzado.
- source_word: Τὸ κοράσιον
  english_pob_choice: Little girl
  chosen_spanish: «Niña»
  alternatives_spanish:
  - «Muchacha»
  - «Niña pequeña»
  - «Chiquilla»
  lexicon: BDAG
  rationale: κοράσιον designa a una chica joven; en este contexto de ternura y mando, «niña» es natural y fiel. Se omite el diminutivo explícito para no sobrecargar la línea, ya que el tono afectivo ya está presente.
- source_word: σοὶ λέγω
  english_pob_choice: I say to you
  chosen_spanish: a ti te digo
  alternatives_spanish:
  - te digo
  - yo te digo
  lexicon: BDAG
  rationale: La construcción enfática del griego se conserva con «a ti te digo», que reproduce la fuerza directa e insistente del mandato.
- source_word: ἔγειρε
  english_pob_choice: get up
  chosen_spanish: ¡levántate!
  alternatives_spanish:
  - ¡despierta!
  - ¡surge!
  - ¡ponte de pie!
  lexicon: BDAG
  rationale: El imperativo de ἐγείρω aquí pide levantarse físicamente. «¡Levántate!» es la opción más natural y clara en español para el contexto inmediato.
theological_decisions:
- issue: Retención del dicho arameo de Jesús en el texto principal
  english_pob_reading: Preserve the transliterated Aramaic 'Talitha koum' and include Mark's own translation immediately after.
  chosen_spanish_reading: Conservar «Talita cum» y añadir de inmediato la glosa explicativa «que significa…».
  alternative_spanish_readings:
  - 'Traducir directamente: «Niña, a ti te digo, ¡levántate!»'
  - Usar solo transliteración sin glosa
  rationale: El texto griego preserva la expresión semítica y luego la interpreta. Mantenerla en español conserva la textura narrativa y la solemnidad del momento, mientras la glosa evita opacidad para el lector.
  doctrine_reference: Prioridad del testimonio original; transliteración de expresiones no griegas preservadas por el texto; claridad pastoral sin borrar la forma original.
- issue: Valor de κοράσιον en la interpretación de Marcos
  english_pob_reading: Little girl
  chosen_spanish_reading: «Niña» como traducción interpretativa del término griego.
  alternative_spanish_readings:
  - «Muchacha»
  - «Niña pequeña»
  - «Chiquilla»
  rationale: Marcos ofrece su propia traducción del arameo en griego, y el término debe sonar natural en español sin perder ternura ni dirección imperativa. «Niña» equilibra precisión y legibilidad.
  doctrine_reference: Principio de equivalencia semántica con atención al diminutivo y al tono afectivo del discurso.
translation_notes:
  revision_awareness: El testimonio inglés auditado no fue revisado en la última pasada y quedó en acuerdo alto; esta propuesta conserva su decisión principal de mantener la frase aramea en transliteración y la glosa explicativa, adaptándola a un castellano natural y publicable.
  spanish_consistency_notes:
  - Se mantiene la distinción entre la frase aramea preservada y la glosa interpretativa en español.
  - «Niña» y «levántate» conservan la naturalidad del mandato sin perder la fuerza del original.
  - La nota al pie explica la variante transliterativa sin duplicar el significado principal en el cuerpo del texto.
