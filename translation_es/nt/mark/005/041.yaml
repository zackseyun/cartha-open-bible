  to: 'Y tomando la mano de la niña[a], le dice: «Talita koum, que se traduce: “Niña, a ti te digo, ¡levántate!”»'
  rationale: Se corrige la transliteración aramea para alinearla con κουμ en el texto griego y con la decisión lexical documentada por el POB; se corrige la nota al pie porque el borrador afirmaba lo contrario de la evidencia; y se ajusta «que significa» a «que se traduce» para reflejar mejor μεθερμηνευόμενον sin afectar la fluidez del español.
