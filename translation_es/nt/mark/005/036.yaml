    text: Or “ignoring/disregarding what was said,” taking παρακούσας in the sense of refusing to heed the report rather than overhearing it.
    reason: alternative_reading
  - marker: b
    text: Or “only have faith” or “only trust.” The Greek verb is πιστεύω.
    reason: lexical_alternative
