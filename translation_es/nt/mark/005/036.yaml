translation:
  language: es
  text: 'Pero Jesús[a], al oír lo que estaban diciendo, le dice al líder de la sinagoga: «No temas[b]; solo cree».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desatendiendo/ignorando lo que se dijo», tomando παρακούσας en el sentido de no prestar atención al informe más bien que de oírlo casualmente.
    reason: alternative_reading
  - marker: b
    text: O «solo ten fe» o «solo confía». El verbo griego es πιστεύω.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακούσας
  english_pob_choice: overhearing
  chosen_spanish: al oír
  alternatives_spanish:
  - oyendo por casualidad
  - al escuchar
  lexicon: BDAG
  rationale: El participio admite la idea de oír lo dicho o de desatenderlo. En español, «al oír» conserva la posibilidad de que Jesús perciba el reporte sin forzar la interpretación, y deja espacio para la alternativa interpretativa documentada en nota.
- source_word: τὸν λόγον λαλούμενον
  english_pob_choice: the word being spoken
  chosen_spanish: la palabra que se estaba diciendo
  alternatives_spanish:
  - lo que se estaba diciendo
  - el mensaje que se estaba diciendo
  lexicon: BDAG
  rationale: La construcción participial se mantiene de forma transparente en español. «La palabra que se estaba diciendo» refleja el matiz formal del original sin convertirlo en una paráfrasis más libre.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: le dice
  alternatives_spanish:
  - dice
  - dijo
  lexicon: BDAG
  rationale: El presente histórico de Marcos se conserva con el presente «dice». Se añade el dativo explícito «le» para naturalidad sintáctica en español y para señalar el destinatario del discurso.
- source_word: ἀρχισυναγώγῳ
  english_pob_choice: the synagogue leader
  chosen_spanish: líder de la sinagoga
  alternatives_spanish:
  - jefe de la sinagoga
  - principal de la sinagoga
  lexicon: BDAG
  rationale: «Líder de la sinagoga» comunica el cargo con claridad y evita un arcaísmo. Se prefiere frente a «jefe» o «principal» por ser más transparente para lector moderno, sin perder el sentido funcional del título.
- source_word: Μὴ φοβοῦ
  english_pob_choice: Do not be afraid
  chosen_spanish: No temas
  alternatives_spanish:
  - No tengas miedo
  - No temas tú
  lexicon: BDAG
  rationale: «No temas» es la forma natural y digna en español para el imperativo de ánimo. Mantiene la fuerza exhortativa del griego sin añadir explicación.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: «Solo» reproduce la restricción del adverbio con concisión y registro bíblico contemporáneo.
- source_word: πίστευε
  english_pob_choice: believe
  chosen_spanish: cree
  alternatives_spanish:
  - ten fe
  - confía
  lexicon: BDAG
  rationale: El imperativo griego πιστεύεω se vierte aquí con «cree», que es la correspondencia más directa y sobria en español. «Ten fe» y «confía» son alternativas posibles, pero «cree» preserva mejor la relación lexical con el verbo de creer sin sobreinterpretar el matiz.
theological_decisions:
- issue: 'Valor de παρακούσας: oír vs. desatender'
  english_pob_reading: Jesus overheard the report and then addressed the synagogue leader.
  chosen_spanish_reading: Jesús oyó el reporte mientras se estaba diciendo y luego se dirigió al líder de la sinagoga.
  alternative_spanish_readings:
  - Jesús desatendió lo que se dijo y se dirigió al líder de la sinagoga.
  rationale: El griego permite ambas posibilidades. La redacción principal conserva la lectura de oír/percibir lo dicho, pero no elimina la alternativa de desatender; por eso se documenta en nota para mantener la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (preserve theological/interpretive tension where genuine ambiguity exists)
- issue: 'Alcance de πιστεύε: creer, tener fe, confiar'
  english_pob_reading: only believe
  chosen_spanish_reading: solo cree
  alternative_spanish_readings:
  - solo ten fe
  - solo confía
  rationale: «Cree» es la equivalencia verbal más directa para πιστεύω en este mandato. Las alternativas «ten fe» y «confía» son semánticamente legítimas, pero la forma principal evita desplazar el énfasis hacia una abstracción nominal o hacia una sola connotación psicológica.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives faithfulness, trust preserved where contested'
translation_notes:
  revision_awareness: Sin cambios respecto del último pase revisado; el texto puede publicarse sin ajustes adicionales según el resumen de revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se evita «Cristo» porque el texto nombra a Jesús y no usa Χριστός como título aquí.
  - Se conserva el presente narrativo («dice») para reflejar el estilo de Marcos.
  - El tratamiento de «líder de la sinagoga» sigue la elección auditada del inglés POB, adaptada a español natural.
