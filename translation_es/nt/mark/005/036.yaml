- from: 'Pero Jesús[a], al oír la palabra que se estaba diciendo, le dice al líder de la sinagoga: «No temas[b]; solo cree».'
  to: 'Pero Jesús[a], al oír lo que estaban diciendo, le dice al líder de la sinagoga: «No temas[b]; solo cree».'
  rationale: Se reemplaza «la palabra que se estaba diciendo» por «lo que estaban diciendo» para expresar de manera natural y fiel τὸν λόγον λαλούμενον en español, evitando un calco innecesario sin perder el vínculo con el reporte recién pronunciado. Se conservan las notas del POB inglés y el resto de la redacción, que ya refleja bien el presente histórico y la exhortación de Jesús.
