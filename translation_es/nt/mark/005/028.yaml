translation:
  language: es
  text: 'Porque ella decía[a]: «Si aunque solo toque sus ropas, seré sanada».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «seré salvada». El verbo puede significar «ser salvada», «ser sanada» o «ser puesta a salvo»; aquí el contexto apunta a sanidad física.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: she was saying
  chosen_spanish: se decía
  alternatives_spanish:
  - decía
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa una acción continua o reiterada en el pasado. En español, «se decía» comunica ese trasfondo interno o discursivo sin forzar que la frase fuera necesariamente pronunciada en voz alta continuamente.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la explicación de la acción anterior; «Porque» funciona de modo natural en español y conserva la relación explicativa.
- source_word: ὅτι
  english_pob_choice: quotation marker rendered with opening quotation
  chosen_spanish: dos puntos y comillas de cita directa
  alternatives_spanish:
  - que
  - cita indirecta
  lexicon: BDAG
  rationale: En español, la cita directa es la forma más natural para introducir el contenido de lo que ella decía.
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - Cuando
  lexicon: BDAG
  rationale: Introduce una condición simple y mantiene el sentido hipotético del subjuntivo griego.
- source_word: ἅψωμαι
  english_pob_choice: I touch
  chosen_spanish: toque
  alternatives_spanish:
  - llegue a tocar
  - toque con la mano
  lexicon: BDAG
  rationale: El verbo medio de ἅπτω en este contexto se refiere a un contacto físico breve. «Toque» es natural en español y no añade matices innecesarios.
- source_word: κἂν
  english_pob_choice: even
  chosen_spanish: tan solo
  alternatives_spanish:
  - aunque sea
  - ni siquiera
  lexicon: BDAG
  rationale: 'La forma contraída añade sentido de minimización: «aunque solo / aun apenas». «Tan solo» comunica bien esa restricción mínima en español y evita una redundancia dura con «si».'
- source_word: τῶν ἱματίων αὐτοῦ
  english_pob_choice: his garments
  chosen_spanish: sus vestidos
  alternatives_spanish:
  - sus ropas
  - sus vestiduras
  - sus prendas
  lexicon: BDAG
  rationale: ἱμάτια es plural y designa prendas de vestir de manera general. «Vestidos» mantiene formalidad, es suficientemente amplio y evita especificar una sola prenda como «manto» o «capa».
- source_word: σωθήσομαι
  english_pob_choice: I will be healed
  chosen_spanish: seré sanada
  alternatives_spanish:
  - seré salvada
  - seré curada
  - seré puesta a salvo
  lexicon: BDAG
  rationale: En este contexto inmediato la referencia es a la sanidad física. «Seré sanada» expresa ese sentido sin ocultar que el verbo griego puede abarcar también «ser salvada».
theological_decisions:
- issue: Sentido de σωθήσομαι en un relato de sanidad
  english_pob_reading: I will be healed
  chosen_spanish_reading: seré sanada
  alternative_spanish_readings:
  - seré salvada
  - seré curada
  rationale: El contexto narrativo es la expectativa de curación de la mujer que padece hemorragia. Se preserva el sentido físico principal, pero sin negar el trasfondo semántico más amplio de σῴζω.
  doctrine_reference: Conservar la tensión lexical del original; contexto inmediato determina la traducción principal.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «clothes» a «garments» para reflejar mejor ἱματίων y mantener un registro más formal. La versión española sigue esa decisión de registro sin volver a una especificación más estrecha que el plural griego no exige.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «sanada» en el cuerpo principal para reflejar el sentido contextual de σῴζω, y la nota conserva la alternativa «salvada» por la tensión semántica documentada.
  - «Vestidos» traduce el plural amplio ἱμάτια sin imponer una prenda única; es consistente con un registro bíblico digno y natural.
  - La cita directa con comillas españolas evita calco sintáctico del inglés y mantiene claridad narrativa.
