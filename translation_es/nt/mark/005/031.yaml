review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: imperfecto narrativo («le decían»), apelación directa («Ves»), compresión física de la multitud, y la pregunta «¿Quién me tocó?». Sin embargo, la nota al pie no expresa con precisión la alternativa inglesa ni su explicación, porque «apretando contra ti» es poco natural y la frase «comprimía físicamente el entorno alrededor de Jesús» desplaza el foco desde la multitud presionando a Jesús hacia el entorno.'
  spanish_quality_summary: El texto principal es natural y legible en español bíblico moderno. «La multitud apretándote» suena bien y comunica la escena. La única reparación necesaria está en la nota al pie, para mejorar naturalidad y exactitud semántica.
  glossary_alignment: No hay términos del glosario mayor en juego. «Discípulos», «multitud» y «me tocó» están bien elegidos. «Apretándote» es aceptable para συνθλίβοντά σε y mantiene el matiz físico sin exagerar.
  issues:
  - severity: medium
    issue: 'La nota al pie usa una alternativa poco natural: «apretando contra ti».'
    rationale: La alternativa documentada en inglés es «pressing against you», que en español se expresa mejor como «presionando contra ti» o «apretándose contra ti». La forma actual suena torpe y menos idiomática.
  - severity: medium
    issue: La explicación de la nota al pie reformula imprecisamente el referente de la compresión física.
    rationale: Decir que la multitud «comprimía físicamente el entorno alrededor de Jesús» cambia el foco. El participio describe a la multitud apretando físicamente a Jesús/contra Jesús, no el entorno en abstracto.
  revised_spanish_text: 'Y sus discípulos le decían[a]: «Ves a la multitud apretándote, y dices: “¿Quién me tocó?”»'
  revised_footnotes:
  - marker: a
    text: O «presionando contra ti». El participio griego transmite que la multitud se comprimía físicamente alrededor de Jesús y contra él.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural. Se corrige únicamente la nota al pie para que la alternativa léxica sea idiomática en español y para que la explicación describa con más precisión la presión física de la multitud sobre Jesús.
