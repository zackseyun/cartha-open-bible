translation:
  language: es
  text: 'Y le rogaba con insistencia, diciendo: «Mi hijita está al borde de la muerte. Ven y pon tus manos sobre ella, para que sea sanada[a] y viva».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sea salvada» o «sea curada». El verbo griego puede significar salvar, rescatar o sanar; aquí el contexto inmediato apunta a sanación física.
    reason: alternative_reading
lexical_decisions:
- source_word: παρακαλεῖ
  english_pob_choice: begged
  chosen_spanish: le rogaba mucho
  alternatives_spanish:
  - le suplicaba
  - le rogaba con insistencia
  - le imploraba
  lexicon: BDAG
  rationale: En este contexto de petición urgente por sanidad, παρακαλέω expresa súplica insistente. En español, «le rogaba mucho» conserva la intensidad sin sonar demasiado literal o dura.
- source_word: πολλὰ
  english_pob_choice: earnestly
  chosen_spanish: mucho
  alternatives_spanish:
  - insistentemente
  - ardientemente
  - con mucha insistencia
  lexicon: BDAG
  rationale: El adverbio intensifica la súplica. «Mucho» funciona de modo natural con «rogaba» y mantiene la fuerza del griego sin añadir una interpretación más específica de la necesaria.
- source_word: θυγάτριόν
  english_pob_choice: little daughter
  chosen_spanish: hijita
  alternatives_spanish:
  - hija pequeña
  - niñita
  - mi pequeña hija
  lexicon: BDAG
  rationale: El diminutivo griego comunica ternura y/o juventud. «Hijita» preserva ese matiz afectivo de forma natural en español y evita sonar clínico o excesivamente explicativo.
- source_word: ἐσχάτως ἔχει
  english_pob_choice: is at the point of death
  chosen_spanish: está al borde de la muerte
  alternatives_spanish:
  - está a punto de morir
  - está en sus últimos momentos
  - está gravemente enferma
  lexicon: BDAG
  rationale: La expresión idiomática indica una condición extrema, aquí claramente cercana a la muerte. «Al borde de la muerte» es fiel, claro y idiomático en español.
- source_word: ἐλθὼν
  english_pob_choice: Come
  chosen_spanish: Ven
  alternatives_spanish:
  - Acércate
  - Ven aquí
  lexicon: BDAG
  rationale: Aunque el participio es literalmente «habiendo venido», en una petición directa el español natural usa el imperativo coordinado. «Ven» reproduce la función comunicativa del original.
- source_word: ἐπιθῇς τὰς χεῖρας αὐτῇ
  english_pob_choice: lay your hands on her
  chosen_spanish: pon tus manos sobre ella
  alternatives_spanish:
  - impón tus manos sobre ella
  - apoya tus manos sobre ella
  - extiende tus manos sobre ella
  lexicon: BDAG
  rationale: La frase describe el gesto de sanidad con manos en plural. «Pon tus manos sobre ella» es claro y conserva el plural sin depender de una fórmula eclesiástica más marcada.
- source_word: σωθῇ
  english_pob_choice: be saved / be healed
  chosen_spanish: sea sanada
  alternatives_spanish:
  - sea salvada
  - sea curada
  - sea sanada o salvada
  lexicon: BDAG
  rationale: El verbo σῴζω puede significar salvar, rescatar o sanar. Aquí el contexto inmediato es la petición por la salud de la niña, y «sea sanada» refleja bien ese sentido sin borrar la amplitud del verbo.
- source_word: ζήσῃ
  english_pob_choice: live
  chosen_spanish: viva
  alternatives_spanish:
  - siga viviendo
  - permanezca con vida
  - recupere la vida
  lexicon: BDAG
  rationale: El verbo significa simplemente «vivir». «Viva» conserva la brevedad y el paralelismo final del texto griego.
theological_decisions:
- issue: Sentido de σωθῇ en un relato de sanidad
  english_pob_reading: be saved / be healed
  chosen_spanish_reading: sea sanada
  alternative_spanish_readings:
  - sea salvada
  - sea curada
  rationale: El griego permite una lectura más amplia de salvación, pero el contexto inmediato habla de una intervención física para una niña al borde de la muerte. En español, «sea sanada» recoge el sentido contextual sin ignorar que σῴζω tiene alcance mayor en otros pasajes.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: La auditoría inglesa muestra una revisión desde «be saved» hacia «be healed» para reflejar mejor el contexto inmediato. La versión española sigue esa revisión y la expresa como «sea sanada», manteniendo la amplitud semántica de σῴζω sin imponer una lectura exclusivamente soteriológica.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto griego lo requiera por κύριος; este versículo no contiene ese término.
  - Se mantuvo un español sobrio y público, con un registro reverente pero natural.
  - No se optó por «impones» porque el pedido está dirigido a Jesús con tono de súplica directa y el gesto de las manos se expresa mejor como una acción solicitada simple.
  - «Hijita» preserva el diminutivo afectivo del griego mejor que una mera repetición de «hija».
