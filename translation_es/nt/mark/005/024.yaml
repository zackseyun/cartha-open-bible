- from: Y fue con él. Y lo seguía una gran multitud, y lo apretaban alrededor de él.
  to: Y fue con él. Y una gran multitud lo seguía, y lo apretaba[a].
  rationale: Se corrige la última cláusula para dar un español natural y fiel al valor de συνέθλιβον αὐτόν. «Lo apretaba» conserva la compresión física del gentío sin el calco poco idiomático «alrededor de él». También se suaviza el orden de la segunda oración para mejorar la legibilidad.
