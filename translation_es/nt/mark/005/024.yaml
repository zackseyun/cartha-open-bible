translation:
  language: es
  text: Y fue con él. Y una gran multitud lo seguía, y lo apretaba[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo apretaba por todos lados», «se agolpaba alrededor de él» o «lo apretaba contra sí». El verbo griego expresa la presión física de la multitud alrededor de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: went
  chosen_spanish: fue
  alternatives_spanish:
  - se fue
  - partió
  - fue con él
  lexicon: BDAG
  rationale: El aoristo narra el movimiento de Jesús en respuesta a la petición de Jairo. «Fue» es natural y fiel al desplazamiento; en español no hace falta forzar un equivalente más marcado como «partió».
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañándolo
  lexicon: BDAG
  rationale: La preposición μετά con genitivo expresa acompañamiento. «Con él» es la forma más clara y directa en español.
- source_word: ἠκολούθει
  english_pob_choice: was following
  chosen_spanish: lo seguía
  alternatives_spanish:
  - le seguía
  - lo iba siguiendo
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso. «Lo seguía» conserva bien ese valor progresivo en español sin sonar pesado.
- source_word: ὄχλος πολύς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud grande
  lexicon: BDAG
  rationale: ὄχλος es «multitud» o «muchedumbre»; πολύς intensifica el tamaño. «Una gran multitud» es natural y mantiene la amplitud del grupo.
- source_word: συνέθλιβον
  english_pob_choice: pressing around him
  chosen_spanish: lo apretaban alrededor de él
  alternatives_spanish:
  - lo rodeaban apretándose
  - lo apretaban
  - se apiñaban alrededor de él
  lexicon: BDAG
  rationale: συνθλίβω comunica una presión física de aglomeración o compresión. «Lo apretaban alrededor de él» conserva esa fuerza y sigue de cerca la solución auditada en inglés («pressing around him»).
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo / de él
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre se refiere a Jesús como objeto directo de la presión de la multitud. En español, el clítico «lo» y la repetición «de él» ayudan a mantener claridad referencial en una oración larga.
translation_notes:
  revision_awareness: El audit trail inglés revisó la última cláusula de «pressing in on him» a «pressing around him» por mayor naturalidad y cercanía al sentido de συνέθλιβον; el español adopta una opción equivalente con «lo apretaban alrededor de él».
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u այլ masking terminology porque este versículo no contiene el nombre divino ni κύριος con referencia al tetragrámaton.
  - Se prefirió «multitud» sobre «gente» para reflejar el sustantivo ὄχλος.
  - La construcción con objeto clítico («lo seguía», «lo apretaban») mantiene a Jesús como referente claro sin añadir interpretación.
