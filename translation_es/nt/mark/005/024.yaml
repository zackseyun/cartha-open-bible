review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la secuencia básica del griego: Jesús fue con Jairo, una gran multitud lo seguía, y la multitud ejercía presión física sobre Jesús. Sin embargo, la cláusula final «lo apretaban alrededor de él» no representa bien la sintaxis ni el sentido idiomático de συνέθλιβον αὐτόν en español; introduce una construcción redundante y poco natural.'
  spanish_quality_summary: 'La primera oración es clara y fiel. «Y lo seguía una gran multitud» es comprensible, aunque el orden marcado puede suavizarse. El principal problema es de naturalidad y claridad: «lo apretaban alrededor de él» suena antinatural en español y duplica innecesariamente el referente («lo» / «de él»). Una formulación como «lo apretaba» o «lo apretaba por todos lados» transmite mejor la compresión física del gentío.'
  glossary_alignment: No hay términos teológicos sensibles en este versículo. El borrador mantiene bien las equivalencias narrativas básicas. La única decisión léxica que requiere ajuste es συνέθλιβον, que debe expresarse con un español idiomático que conserve la presión física del gentío sin calcar el inglés auditado.
  issues:
  - severity: high
    issue: «lo apretaban alrededor de él» es una construcción no idiomática en español.
    rationale: El griego συνέθλιβον αὐτόν significa que la multitud lo comprimía o apretaba físicamente. En español, «apretar alrededor de él» no suena natural y mezcla de forma torpe objeto directo con complemento redundante.
  - severity: medium
    issue: Redundancia referencial en «lo ... de él».
    rationale: El objeto directo «lo» ya identifica a Jesús como quien recibe la presión; añadir «de él» no aporta claridad y entorpece la lectura.
  - severity: low
    issue: El orden «Y lo seguía una gran multitud» es aceptable pero algo marcado.
    rationale: «Y una gran multitud lo seguía» suena más natural en español general y mantiene el mismo sentido progresivo del imperfecto.
  revised_spanish_text: Y fue con él. Y una gran multitud lo seguía, y lo apretaba[a].
  revised_footnotes:
  - marker: a
    text: O «lo apretaba por todos lados», «se agolpaba alrededor de él» o «lo apretaba contra sí». El verbo griego expresa la presión física de la multitud alrededor de Jesús.
    reason: lexical_alternative
