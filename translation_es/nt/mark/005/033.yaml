translation:
  language: es
  text: Pero la mujer[a], temiendo y temblando, sabiendo lo que le había sucedido, vino y cayó ante él[b], y le dijo toda la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «asustada y temblando».
    reason: lexical_alternative
  - marker: b
    text: O «se postró ante él» o «se arrojó ante él».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: El conector marca un giro narrativo suave desde la pregunta anterior. «Pero» conserva la oposición o transición sin sobrecargar el verso.
- source_word: γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - mujer
  lexicon: BDAG
  rationale: El referente ya está identificado en el relato. El artículo definido mantiene la continuidad narrativa y evita una generalización impersonal.
- source_word: φοβηθεῖσα καὶ τρέμουσα
  english_pob_choice: fearing and trembling
  chosen_spanish: temiendo y temblando
  alternatives_spanish:
  - asustada y temblando
  - con temor y temblando
  lexicon: BDAG
  rationale: Conservo la fuerza verbal de los participios con dos gerundios coordinados. «Temiendo» mantiene el matiz participial y evita reducirlo a un adjetivo estático.
- source_word: εἰδυῖα
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - sabiendo bien
  - conociendo
  lexicon: BDAG
  rationale: El participio expresa conocimiento concomitante; «sabiendo» es natural en español y preserva la relación circunstancial sin añadir causalidad explícita.
- source_word: ὃ γέγονεν αὐτῇ
  english_pob_choice: what had happened to her
  chosen_spanish: lo que le había sucedido
  alternatives_spanish:
  - lo que le había pasado
  - lo que había ocurrido en ella
  lexicon: BDAG
  rationale: La construcción idiomática en español pide una formulación natural. «Le había sucedido» conserva el sentido de acontecimiento experimentado por ella sin forzar un giro más interpretativo.
- source_word: ἦλθεν
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: BDAG
  rationale: «Vino» es una traducción narrativa simple y fiel al aoristo de movimiento. Mantiene la secuencia de acciones sin añadir matiz direccional no explicitado.
- source_word: προσέπεσεν αὐτῷ
  english_pob_choice: fell down before him
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - cayó a sus pies
  - se echó delante de él
  lexicon: BDAG
  rationale: El verbo puede describir una caída reverente o postración. «Se postró ante él» comunica la postura de humildad y reverencia, aunque en español puede sonar algo más fuerte que «fell down before him»; se conserva así la tensión reverencial sin resolverla en adoración.
- source_word: εἶπεν αὐτῷ
  english_pob_choice: told him
  chosen_spanish: le dijo
  alternatives_spanish:
  - le contó
  - le habló
  lexicon: BDAG
  rationale: Con el complemento final, «le dijo» es la forma más directa y fiel. Evita expandir el contenido del habla más allá de lo indicado por el texto.
- source_word: πᾶσαν τὴν ἀλήθειαν
  english_pob_choice: the whole truth
  chosen_spanish: toda la verdad
  alternatives_spanish:
  - la verdad completa
  - la verdad entera
  lexicon: BDAG
  rationale: «Toda la verdad» reproduce bien el énfasis totalizador de πᾶσαν τὴν ἀλήθειαν y resulta natural en español contemporáneo.
theological_decisions:
- issue: Postura de προσέπεσεν αὐτῷ
  english_pob_reading: fell down before him
  chosen_spanish_reading: se postró ante él
  alternative_spanish_readings:
  - cayó a sus pies
  - se arrodilló ante él
  rationale: El griego permite una postura de reverencia, ruego o rendición. «Se postró ante él» mantiene esa amplitud y no impone por sí sola la categoría de adoración; conserva la tensión documentada por la POB inglesa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: Coincide con el pasaje griego SBLGNT y con el expediente inglés de la POB. No hay revisiones aplicadas en el historial más reciente; se mantiene la lectura de equivalencia óptima y la cautela teológica respecto de προσέπεσεν αὐτῷ.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma general en este proyecto, pero este versículo no contiene el nombre divino.
  - Se mantiene «toda la verdad» en vez de una paráfrasis expansiva para reflejar πᾶσαν τὴν ἀλήθειαν.
  - «Se postró ante él» conserva la posibilidad de reverencia sin definir el acto como adoración explícita.
