translation:
  language: es
  text: Y después de que Jesús cruzó de nuevo en la barca al otro lado[a], una gran multitud se reunió alrededor de él, y Jesús estaba junto al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, el mar de Galilea, llamado «mar» de forma habitual en los Evangelios aunque es un lago.
    reason: cultural_note
lexical_decisions:
- source_word: διαπεράσαντος
  english_pob_choice: after ... had crossed over
  chosen_spanish: después que ... hubo cruzado
  alternatives_spanish:
  - cuando ... cruzó
  - habiendo cruzado
  lexicon: BDAG
  rationale: El participio aoristo en genitivo absoluto expresa una acción anterior a la principal. «Después que ... hubo cruzado» conserva bien esa secuencia temporal en español sin volverla mecánica.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el bote
  - por barca
  lexicon: BDAG
  rationale: «Barca» es natural en el contexto narrativo de Marcos y corresponde al medio de transporte indicado por el griego. Mantiene el valor locativo de la preposición ἐν.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: El adverbio marca repetición. «De nuevo» es fluido y preciso en español, equivalente funcional de «again».
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - a la otra orilla
  - al lado opuesto
  lexicon: BDAG
  rationale: En este contexto lacustre, la expresión idiomática señala la orilla opuesta. «Al otro lado» reproduce la idea con naturalidad y sin explicitar más de lo que el texto dice.
- source_word: συνήχθη
  english_pob_choice: gathered
  chosen_spanish: se reunió
  alternatives_spanish:
  - se congregó
  - se juntó
  lexicon: BDAG
  rationale: Aunque el verbo es pasivo en forma, en español resulta natural expresar el evento con un verbo intransitivo/reflexivo. «Se reunió» comunica la convergencia de la multitud sin añadir matiz eclesiástico no presente en el griego.
- source_word: ὄχλος πολὺς
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud numerosa
  - un gran gentío
  lexicon: BDAG
  rationale: «Gran multitud» transmite con claridad el tamaño del grupo y mantiene el tono narrativo. Evita la posible ambigüedad de «gran» como cualidad moral.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: around him
  chosen_spanish: alrededor de él
  alternatives_spanish:
  - hacia él
  - sobre él
  lexicon: BDAG
  rationale: Con συνάγω, ἐπί con acusativo expresa convergencia hacia Jesús. En español, «alrededor de él» capta bien la idea espacial de la gente que se agrupa en torno a Jesús.
- source_word: παρὰ τὴν θάλασσαν
  english_pob_choice: beside the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - a la orilla del mar
  - junto a la orilla
  lexicon: BDAG
  rationale: παρά con acusativo indica ubicación al lado de algo. «Junto al mar» es claro y estilísticamente natural. Se evita «orilla» en el texto principal porque el griego dice «mar», no «playa» u «orilla».
- source_word: θάλασσαν
  english_pob_choice: sea
  chosen_spanish: mar
  alternatives_spanish:
  - lago
  lexicon: BDAG
  rationale: Se conserva «mar» para respetar el término griego θάλασσα y la decisión del POB inglés de mantener «sea» en el texto principal. La identificación geográfica con el mar de Galilea puede quedar en nota.
theological_decisions:
- issue: Naturaleza de la masa de gente y ausencia de lectura eclesial
  english_pob_reading: a large crowd gathered around him
  chosen_spanish_reading: se reunió una gran multitud alrededor de él
  alternative_spanish_readings:
  - se congregó una gran multitud alrededor de él
  - se juntó una gran multitud alrededor de él
  rationale: No hay indicio de reunión cultual o eclesiástica; el movimiento es puramente narrativo. «Multitud» evita trasladar connotaciones religiosas que no están en el texto.
  doctrine_reference: Narrative context; no doctrinal development
translation_notes:
  revision_awareness: 'Se siguió el cierre de revisión más reciente sin cambios sustantivos: la decisión inglesa de mantener la referencia al ‘sea’ en el texto principal se trasladó al español como ‘mar’, con nota cultural para aclarar la identificación geográfica. No se registran revisiones aplicadas en el expediente.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se usa «mar» en el texto principal y se aclara en nota la referencia al mar de Galilea.
  - Se conserva un registro temporal natural en español para el participio aoristo.
  - La puntuación y el orden de las cláusulas buscan legibilidad moderna sin perder la secuencia del griego.
