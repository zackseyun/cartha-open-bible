- from: Y les ordenó con insistencia que nadie se enterara de esto, y dijo que se le diera de comer[a][b].
  to: Y les ordenó con insistencia que nadie se enterara de esto, y dijo que se le diera algo de comer[a][b].
  rationale: Se conserva la traducción principal casi intacta, pero se mejora la naturalidad española con «algo de comer» y se corrige la nota léxica para que describa con mayor precisión la construcción griega y su sentido idiomático.
