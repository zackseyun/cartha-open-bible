translation:
  language: es
  text: Y les ordenó con insistencia que nadie se enterara de esto, y dijo que se le diera algo de comer[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «con muchas cosas»; el griego usa un intensificador que aquí da fuerza a la orden.
    reason: lexical_alternative
  - marker: b
    text: Lit. «darle de comer» o «dar a ella comer»; idiomáticamente, «darle algo de comer».
    reason: lexical_alternative
lexical_decisions:
- source_word: διεστείλατο
  english_pob_choice: strictly ordered
  chosen_spanish: les ordenó con insistencia
  alternatives_spanish:
  - les dio órdenes estrictas
  - les mandó severamente
  - les encargó con firmeza
  lexicon: BDAG
  rationale: El verbo medio de διαστέλλομαι expresa una orden o advertencia fuerte; «ordenó» conserva la fuerza imperativa, y «con insistencia» recoge el valor intensificador de πολλὰ sin sonar artificial en español.
- source_word: πολλὰ
  english_pob_choice: strictly
  chosen_spanish: con insistencia
  alternatives_spanish:
  - mucho
  - repetidamente
  - con severidad
  lexicon: BDAG
  rationale: Literalmente significa «mucho/muchas cosas», pero aquí funciona adverbialmente como intensificador del mandato. «Con insistencia» comunica ese énfasis de manera natural en español.
- source_word: ἵνα μηδεὶς γνοῖ τοῦτο
  english_pob_choice: that no one should know this
  chosen_spanish: que nadie se enterara de esto
  alternatives_spanish:
  - que nadie supiera esto
  - para que nadie llegara a saber esto
  - que nadie conociera esto
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἵνα expresa finalidad o propósito. En español, «se enterara de esto» transmite bien la idea de llegar a saberlo, sin perder la restricción del mandato.
- source_word: γνοῖ
  english_pob_choice: should know
  chosen_spanish: se enterara
  alternatives_spanish:
  - supiera
  - llegara a saber
  - conociera
  lexicon: BDAG
  rationale: γινώσκω aquí apunta a llegar a conocer o saber de algo. «Enterarse» es idiomático y conserva el matiz de descubrir o llegar a saber.
- source_word: δοθῆναι
  english_pob_choice: should be given
  chosen_spanish: que se le diera
  alternatives_spanish:
  - que le dieran
  - que fuera dada
  - que se le sirviera
  lexicon: BDAG
  rationale: El infinitivo pasivo se representa con una pasiva impersonal natural en español. «Se le diera» conserva el sentido de recepción de la acción sin forzar la estructura.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: se le
  alternatives_spanish:
  - a ella
  - a la niña
  - para ella
  lexicon: BDAG
  rationale: El dativo indirecto se expresa de modo natural con el dativo redundante español «se le», manteniendo la referencia a la niña sin redundancia pesada.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - para comer
  - algo de comer
  - que comer
  lexicon: BDAG
  rationale: El infinitivo «comer» en este contexto pide un complemento implícito en español. «De comer» refleja el uso idiomático de dar comida sin añadir más contenido del que el griego exige.
theological_decisions:
- issue: Mandato de silencio / motivo de secreto en Marcos
  english_pob_reading: Jesus strongly ordered them that no one should know this, without expanding the verse into a broader theological explanation.
  chosen_spanish_reading: Jesús da una orden fuerte para que el hecho no se divulgue, sin convertir el versículo en una explicación del motivo del secreto.
  alternative_spanish_readings:
  - Jesús les prohíbe hablar del hecho como parte de un motivo literario más amplio
  - Jesús intenta ocultar el milagro por razones teológicas desarrolladas
  rationale: El versículo únicamente afirma el mandato de no dar a conocer el hecho. La traducción conserva esa tensión sin resolverla ni añadir una interpretación externa al texto.
  doctrine_reference: Preservar la tensión narrativa y teológica sin sobreexplicación.
translation_notes:
  revision_awareness: 'Se tomó como referencia la última revisión inglesa que mantiene «he said that she should be given something to eat», pero la redacción española sigue directamente el griego: la primera cláusula preserva el mandato enfático y la segunda conserva la pasiva con dativo indirecto en una construcción natural para el español.'
  spanish_consistency_notes:
  - Se mantiene «ordenó» para διαστέλλομαι en el sentido de mandato fuerte, coherente con el POB inglés.
  - Se evita «Cristo» o lenguaje eclesiástico no presente en el versículo.
  - «De comer» se usa como equivalente idiomático de la construcción griega, sin añadir contenido ajeno al texto.
