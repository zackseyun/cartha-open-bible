translation:
  language: es
  text: 'Y le preguntaba: «¿Cómo te llamas?». Y le dice: «Mi nombre es Legión[a], porque somos muchos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Legión» es un término militar latino adoptado por el griego; aquí funciona como el nombre declarado por el demonio e implica multitud.
    reason: cultural_note
lexical_decisions:
- source_word: ἐπηρώτα
  english_pob_choice: was asking
  chosen_spanish: le preguntaba
  alternatives_spanish:
  - le preguntó
  - le estaba preguntando
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción շարունակada o iterativa; en español, «le preguntaba» conserva ese aspecto mejor que un pretérito simple.
- source_word: Τί ὄνομά σοι
  english_pob_choice: What is your name?
  chosen_spanish: ¿Cómo te llamas?
  alternatives_spanish:
  - ¿Cuál es tu nombre?
  - ¿Qué nombre tienes?
  lexicon: BDAG
  rationale: La pregunta es idiomática en griego. En español, «¿Cómo te llamas?» es natural, directo y conserva la función de identificación personal sin volverla mecánica.
- source_word: λέγει αὐτῷ
  english_pob_choice: he says to him
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  - le está diciendo
  lexicon: BDAG
  rationale: El presente histórico de λέγει se refleja bien con «le dice», que preserva el vigor narrativo de Marcos.
- source_word: Λεγιών
  english_pob_choice: Legion
  chosen_spanish: Legión
  alternatives_spanish:
  - una legión
  lexicon: BDAG
  rationale: Se trata de un nombre/designación tomado del latín y usado aquí como autoidentificación. Se mantiene como nombre propio transliterado/castellanizado.
- source_word: ὄνομά μοι
  english_pob_choice: My name is
  chosen_spanish: Mi nombre es
  alternatives_spanish:
  - Se me llama
  - El nombre para mí es
  lexicon: BDAG
  rationale: La construcción nominal griega se vierte con una fórmula natural en español sin perder el carácter de autoidentificación.
- source_word: ὅτι πολλοί ἐσμεν
  english_pob_choice: because we are many
  chosen_spanish: porque somos muchos
  alternatives_spanish:
  - pues somos muchos
  - ya que somos muchos
  lexicon: BDAG
  rationale: «Porque» expresa la relación causal de ὅτι con claridad. Se conserva el plural «somos» para no borrar el cambio significativo de singular a plural en la respuesta.
theological_decisions:
- issue: Tensión entre el singular del nombre y el plural de la explicación
  english_pob_reading: Retain both the singular 'My name is Legion' and the plural 'we are many' without harmonizing them.
  chosen_spanish_reading: Mantener «Mi nombre es Legión» junto con «porque somos muchos», sin armonizar el número.
  alternative_spanish_readings:
  - Nuestro nombre es Legión, porque somos muchos
  - Mi nombre es Legión, porque soy muchos
  rationale: El griego conserva intencionalmente el contraste entre la autoidentificación singular y la explicación plural. La traducción debe preservar esa tensión dramática y teológica, no resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El pasaje coincide en alta medida con el audit trail inglés. No se requirieron revisiones textuales respecto al sentido básico ni a la tensión singular/plural.
  spanish_consistency_notes:
  - Se usa «le» como clítico dativo natural para αὐτῷ.
  - Se mantiene el presente histórico «dice» para λέγει, coherente con el estilo narrativo de Marcos.
  - Se evita «Señor» u სხვა terminología no presente en este versículo.
  - La mayúscula en «Legión» refleja su función como designación propia en el relato.
