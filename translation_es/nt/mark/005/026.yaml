translation:
  language: es
  text: y después de haber sufrido mucho bajo muchos médicos[a], y después de gastar todo lo que tenía[b], sin obtener ningún beneficio, sino más bien empeorando,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por parte de muchos médicos» o «a manos de muchos médicos». El griego puede subrayar tanto la agencia de los médicos como el sometimiento de ella a sus tratamientos.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «todo lo de ella», es decir, todo lo que tenía.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ παθοῦσα
  english_pob_choice: after suffering much
  chosen_spanish: después de haber sufrido mucho
  alternatives_spanish:
  - habiendo sufrido mucho
  - después de padecer mucho
  lexicon: BDAG
  rationale: El participio aoristo marca una circunstancia previa dentro de la cadena narrativa. «Después de haber sufrido mucho» conserva el valor temporal y la intensidad de πάσχω con español natural y digno.
- source_word: ὑπὸ πολλῶν ἰατρῶν
  english_pob_choice: under many physicians
  chosen_spanish: bajo muchos médicos
  alternatives_spanish:
  - por parte de muchos médicos
  - a manos de muchos médicos
  lexicon: BDAG
  rationale: ὑπό con genitivo puede sugerir agencia o situación de sometimiento. «Bajo muchos médicos» mantiene esa ambigüedad productiva y refleja que estuvo sometida a su atención/tratamiento sin escoger una sola paráfrasis interpretativa.
- source_word: δαπανήσασα
  english_pob_choice: after spending
  chosen_spanish: después de gastar
  alternatives_spanish:
  - habiendo gastado
  - después de haber gastado
  lexicon: BDAG
  rationale: El participio continúa la secuencia de acciones previas. «Gastar» comunica el sentido económico sin añadir más fuerza que la del texto griego.
- source_word: τὰ παρ’ αὐτῆς πάντα
  english_pob_choice: all that she had
  chosen_spanish: todo lo que tenía
  alternatives_spanish:
  - todas sus posesiones
  - todo lo que estaba a su disposición
  lexicon: BDAG
  rationale: La frase griega alude a todo lo que le pertenecía o estaba a su disposición. «Todo lo que tenía» es la equivalencia más natural en español y preserva la idea de agotamiento total.
- source_word: μηδὲν ὠφεληθεῖσα
  english_pob_choice: benefiting nothing
  chosen_spanish: sin obtener ningún beneficio
  alternatives_spanish:
  - sin ser ayudada en nada
  - sin aprovecharle nada
  lexicon: BDAG
  rationale: El pasivo de ὠφελέω expresa que no recibió provecho alguno. En español, la formulación negativa «sin obtener ningún beneficio» resulta clara y evita la dureza literal de «beneficiando nada».
- source_word: ἀλλὰ μᾶλλον
  english_pob_choice: but rather
  chosen_spanish: sino más bien
  alternatives_spanish:
  - pero más bien
  - sino al contrario
  lexicon: BDAG
  rationale: 'La construcción adversativa intensifica el contraste: no solo no mejoró, sino que ocurrió lo opuesto. «Sino más bien» reproduce bien esa corrección/contraposición en español.'
- source_word: εἰς τὸ χεῖρον ἐλθοῦσα
  english_pob_choice: becoming worse
  chosen_spanish: empeorando
  alternatives_spanish:
  - habiendo llegado a peor estado
  - volviéndose peor
  lexicon: BDAG
  rationale: La expresión idiomática indica transición a una condición peor. El gerundio «empeorando» expresa de manera natural el resultado progresivo sin sobrecargar la frase.
translation_notes:
  revision_awareness: El texto coincide con la última pasada revisada del inglés POB, que no introdujo cambios; por eso se mantiene la misma línea de sentido, trasladando al español la secuencia participial y las dos notas léxicas sobre ὑπό y τὰ παρ’ αὐτῆς πάντα.
  spanish_consistency_notes:
  - Se conserva el orden narrativo causal/secuencial del griego con participios previos al resultado final.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay decisiones teológicas específicas en este versículo.
  - Se mantiene «médicos» para ἰατροί, en lugar de un término eclesiástico o interpretativo.
  - La nota sobre el griego de «todo lo que tenía» se conserva como alternativa útil para el lector español.
