translation:
  language: es
  text: el cual tenía su morada entre los sepulcros[a], y nadie podía ya atarlo, ni siquiera con una cadena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «que tenía su morada en los sepulcros».
    reason: lexical_alternative
lexical_decisions:
- source_word: κατοίκησιν
  english_pob_choice: dwelling
  chosen_spanish: morada
  alternatives_spanish:
  - habitación
  - residencia
  - lugar de habitación
  lexicon: BDAG
  rationale: κατοίκησις expresa el lugar o condición de habitar. «Morada» conserva el sentido concreto de residencia sin sonar tan técnico como «lugar de habitación» ni tan moderno como «residencia». En este contexto, también encaja bien con la escena narrativa.
- source_word: εἶχεν
  english_pob_choice: had
  chosen_spanish: tenía
  alternatives_spanish:
  - había tenido
  - poseía
  - vivía
  lexicon: BDAG
  rationale: El imperfecto de ἔχω aquí señala una situación continua del pasado. «Tenía su morada» reproduce la construcción con naturalidad en español y conserva la idea de estado habitual mejor que un simple «vivía».
- source_word: ἐν τοῖς μνήμασιν
  english_pob_choice: among the tombs
  chosen_spanish: entre los sepulcros
  alternatives_spanish:
  - en los sepulcros
  - entre las tumbas
  - en las tumbas
  lexicon: BDAG
  rationale: μνῆμα designa un sepulcro o lugar de entierro. «Sepulcros» es preciso y bíblicamente comprensible en español. «Entre» refleja bien la presencia en ese entorno, como en el inglés auditado «among».
- source_word: οὐδὲ ἁλύσει οὐκέτι
  english_pob_choice: not even with a chain
  chosen_spanish: ni aun con una cadena
  alternatives_spanish:
  - ni siquiera con una cadena
  - ni con una cadena
  - ni aun mediante una cadena
  lexicon: BDAG
  rationale: ἁλύς/ἁλύσει es singular, por eso se mantiene «una cadena». La combinación con οὐδέ intensifica la negación; «ni aun» conserva ese énfasis. «Ya» traduce bien οὐκέτι como cese de una capacidad previa, en paralelo con el inglés «anymore».
- source_word: ἐδύνατο
  english_pob_choice: could
  chosen_spanish: podía
  alternatives_spanish:
  - era capaz de
  - lograba
  - le era posible
  lexicon: BDAG
  rationale: δύναμαι en imperfecto expresa incapacidad pasada y continua. «Podía» es la equivalencia más natural en español y mantiene la fuerza narrativa de la imposibilidad.
- source_word: δῆσαι
  english_pob_choice: bind
  chosen_spanish: atar
  alternatives_spanish:
  - sujetar
  - ligar
  - encadenar
  lexicon: BDAG
  rationale: δέω significa atar o sujetar con ligaduras. En español, «atar» es el verbo más directo y natural en combinación con «cadena», sin perder la idea de restricción física. Se evita «encadenar» porque el texto ya menciona la cadena como instrumento, no como verbo principal.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y el rastro auditado en inglés. Se preservan las correspondencias léxicas clave: κατοίκησις → «morada», ἐν τοῖς μνήμασιν → «entre los sepulcros», οὐκέτι → «ya», y δῆσαι → «atar». No se identificaron revisiones previas ni cambios textuales en la fuente auditada.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología teológica no pertinente, porque este versículo no contiene el nombre divino ni un título cristológico.
  - «Sepulcros» mantiene un registro bíblico claro y neutral en español; «tumbas» sería posible, pero «sepulcros» refleja mejor el matiz de μνήμα en este contexto.
  - Se conserva la intensificación negativa con «ni aun», que corresponde al énfasis de οὐδὲ y se alinea con el audit trail inglés.
