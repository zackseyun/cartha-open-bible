review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: presente histórico (''llegan''), casa del principal de la sinagoga, percepción singular de Jesús (''ve''), y la escena de duelo con ruido y llanto. Sin embargo, la nota al pie está mal anclada: la nota léxica sobre θόρυβον fue colocada junto a ''líder'' en vez de junto a ''bullicio''. Además, ''mucho'' para πολλά es comprensible pero menos natural y menos preciso en español para intensificar ἀλαλάζοντας que ''fuertemente'' o ''en voz alta''.'
  spanish_quality_summary: El español es claro y legible, pero 'del [a] líder' es puntuación anómala y rompe la fluidez; el marcador debe ir en 'bullicio[a]'. También conviene evitar 'mucho' con 'se lamentan', porque en español suena más a cantidad que a volumen/intensidad auditiva. 'Lloran y se lamentan en voz alta' o 'lloran y lanzan fuertes lamentos' suena más natural y fiel al contexto de duelo.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. ''Líder de la sinagoga'' está alineado con la decisión auditada. La principal cuestión léxica es θόρυβον y ἀλαλάζοντας πολλά: ''bullicio'' es aceptable, con nota alternativa ''alboroto''; para ἀλαλάζοντας πολλά, el español debe reflejar lamento sonoro, no solo intensidad vaga.'
  issues:
  - severity: high
    issue: La nota al pie [a] está anclada en el lugar equivocado.
    rationale: La nota explica θόρυβον ('bullicio/alboroto'), pero en el texto aparece junto a 'líder'. Esto desinforma al lector y viola la disciplina de anclar la nota al término relevante.
  - severity: medium
    issue: '''Se lamentan mucho'' no refleja con suficiente naturalidad ni precisión el valor adverbial de πολλά en esta escena.'
    rationale: En este contexto πολλά intensifica el lamento como fuerte/ruidoso. En español, 'mucho' con 'lamentarse' suena menos idiomático y puede sugerir cantidad o grado emocional más que volumen audible.
  - severity: low
    issue: El uso de 'personas que lloran' es correcto pero algo pesado.
    rationale: No es infiel, pero 'los que lloraban' o simplemente 'gente llorando' sería más fluido. Aun así, no requiere cambio obligatorio si se mantiene la claridad.
  revised_spanish_text: Y llegan a la casa del líder de la sinagoga, y ve un bullicio[a], y personas que lloran y se lamentan en voz alta.
  revised_footnotes:
  - marker: a
    text: O «alboroto»; el término griego puede denotar ruido desordenado o tumulto.
    reason: lexical_alternative
  revision_rationale: Se reubica la nota al pie en 'bullicio' para que corresponda al término griego θόρυβον, y se ajusta 'se lamentan mucho' a 'se lamentan en voz alta' para reflejar mejor el sentido adverbial de πολλά con ἀλαλάζοντας en un español más natural y fiel al contexto de duelo.
