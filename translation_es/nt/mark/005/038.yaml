translation:
  language: es
  text: Y llegan a la casa del líder de la sinagoga, y ve un bullicio[a], y personas que lloran y se lamentan en voz alta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alboroto»; el término griego puede denotar ruido desordenado o tumulto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they come
  chosen_spanish: llegan
  alternatives_spanish:
  - vienen
  - entran
  lexicon: BDAG
  rationale: El presente histórico se conserva en español con un verbo de movimiento natural en la escena. 'Llegan' comunica la entrada al lugar con claridad; 'vienen' es posible, pero menos preciso para el movimiento hacia la casa.
- source_word: τὸν οἶκον
  english_pob_choice: house
  chosen_spanish: la casa
  alternatives_spanish:
  - el hogar
  - la vivienda
  lexicon: BDAG
  rationale: '''Casa'' es el equivalente directo de οἶκος en este contexto narrativo. ''Hogar'' añadiría una carga afectiva no exigida por el griego.'
- source_word: τοῦ ἀρχισυναγώγου
  english_pob_choice: the synagogue leader
  chosen_spanish: del líder de la sinagoga
  alternatives_spanish:
  - del jefe de la sinagoga
  - del oficial de la sinagoga
  lexicon: BDAG
  rationale: La expresión señala al funcionario principal de la sinagoga. 'Líder de la sinagoga' conserva el sentido funcional con español claro y evita el arcaísmo de 'ruler'.
- source_word: θεωρεῖ
  english_pob_choice: he sees
  chosen_spanish: ve
  alternatives_spanish:
  - observa
  - nota
  lexicon: BDAG
  rationale: El verbo se refiere a la percepción de Jesús en la escena. 'Ve' es la forma más directa y natural en español.
- source_word: θόρυβον
  english_pob_choice: a commotion
  chosen_spanish: un bullicio
  alternatives_spanish:
  - una conmoción
  - un alboroto
  - un tumulto
  lexicon: BDAG
  rationale: θόρυβος denota ruido con desorden, no solo sonido. 'Bullicio' expresa bien el carácter ruidoso y agitado del lamento; 'alboroto' sería también posible, pero puede sonar más conflictivo que funerario.
- source_word: κλαίοντας
  english_pob_choice: people weeping
  chosen_spanish: personas que lloran
  alternatives_spanish:
  - los que lloran
  - llorando
  lexicon: BDAG
  rationale: El participio funciona de manera sustantiva en la descripción. 'Personas que lloran' hace el español fluido y mantiene el sentido de grupo en acción.
- source_word: ἀλαλάζοντας
  english_pob_choice: wailing
  chosen_spanish: se lamentan
  alternatives_spanish:
  - gimen
  - claman
  - se lamentan en voz alta
  lexicon: BDAG
  rationale: ἀλαλάζω en contexto de duelo expresa lamento fuerte o clamor. 'Se lamentan' es natural en español; el contexto queda reforzado por el adverbial siguiente.
- source_word: πολλά
  english_pob_choice: loudly
  chosen_spanish: mucho
  alternatives_spanish:
  - fuertemente
  - en gran manera
  - en voz alta
  lexicon: BDAG
  rationale: Aunque literalmente 'mucho', aquí intensifica el llorar y lamentarse. 'Mucho' mantiene la fuerza del original sin introducir una paráfrasis excesiva; en español se entiende como intensidad del lamento.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: conserva la secuencia narrativa con dos ''y'', refleja el título funcional ἀρχισυναγώγου con una expresión natural en español, y mantiene la tensión léxica de θόρυβος sin reducirlo solo a ''ruido''. También respeta la revisión inglesa que añadió la segunda conjunción antes de ''personas que lloran y se lamentan mucho''.'
  spanish_consistency_notes:
  - Se usa 'líder de la sinagoga' de manera consistente con la decisión inglesa documentada.
  - '''Bullicio'' mantiene la mezcla de ruido y desorden asociada a θόρυβος.'
  - '''Se lamentan mucho'' conserva la intensidad adverbial de πολλά sin sobretraducirla.'
