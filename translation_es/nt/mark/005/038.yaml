revisions:
- from: Y llegan a la casa del [a] líder de la sinagoga, y ve un bullicio, y personas que lloran y se lamentan mucho.
  to: Y llegan a la casa del líder de la sinagoga, y ve un bullicio[a], y personas que lloran y se lamentan en voz alta.
  rationale: Se reubica la nota al pie en 'bullicio' para que corresponda al término griego θόρυβον, y se ajusta 'se lamentan mucho' a 'se lamentan en voz alta' para reflejar mejor el sentido adverbial de πολλά con ἀλαλάζοντας en un español más natural y fiel al contexto de duelo.
