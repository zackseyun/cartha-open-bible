translation:
  language: es
  text: Y se fue y comenzó a proclamar en la Decápolis todo lo que Jesús había hecho por él[a], y todos se maravillaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuántas cosas había hecho Jesús por él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι expresa salida o alejamiento del lugar; «se fue» transmite ese movimiento de manera natural y fiel en español contemporáneo.
- source_word: ἤρξατο κηρύσσειν
  english_pob_choice: began to proclaim
  chosen_spanish: comenzó a proclamar
  alternatives_spanish:
  - empezó a proclamar
  - comenzó a predicar
  lexicon: BDAG
  rationale: La construcción con ἄρχω + infinitivo tiene valor ingresivo; «comenzó a proclamar» conserva ese inicio. «Proclamar» evita restringir indebidamente el acto a un contexto litúrgico de «predicar».
- source_word: ἐν τῇ Δεκαπόλει
  english_pob_choice: in the Decapolis
  chosen_spanish: en la Decápolis
  alternatives_spanish:
  - por la Decápolis
  - en la región de la Decápolis
  lexicon: BDAG
  rationale: ἐν significa primariamente «en»; mantener «en la Decápolis» sigue de cerca el texto y conserva la referencia geográfica.
- source_word: ὅσα
  english_pob_choice: how much
  chosen_spanish: cuántas cosas
  alternatives_spanish:
  - todo lo que
  - todo cuanto
  lexicon: BDAG
  rationale: ὅσα con ἐποίησεν puede referirse a la totalidad/cantidad de lo hecho. En español, «cuántas cosas» expresa de forma idiomática esa amplitud sin añadir valoración que el griego no explicita.
- source_word: ἐποίησεν αὐτῷ
  english_pob_choice: had done for him
  chosen_spanish: había hecho por él
  alternatives_spanish:
  - le había hecho
  - había hecho para él
  lexicon: BDAG
  rationale: El dativo αὐτῷ indica beneficio en este contexto; «por él» refleja bien esa idea en español. El pluscuamperfecto español es una solución natural para la relación temporal relativa al relato.
- source_word: πάντες
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - toda la gente
  lexicon: BDAG
  rationale: πάντες significa literalmente «todos»; en español la forma simple «todos» es suficiente y más cercana al plural del original.
- source_word: ἐθαύμαζον
  english_pob_choice: was amazed
  chosen_spanish: se maravillaban
  alternatives_spanish:
  - estaban asombrados
  - quedaban maravillados
  lexicon: BDAG
  rationale: El imperfecto señala una reacción continua o repetida. «Se maravillaban» conserva ese matiz y el verbo de asombro sin forzar un solo instante puntual.
- source_word: ὁ Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: Nombre propio estándar en español para Ἰησοῦς.
theological_decisions:
- issue: Alcance de la proclamación del hombre en relación con la obra de Jesús
  english_pob_reading: The verse is rendered straightforwardly as the man proclaiming what Jesus had done for him, without adding interpretive explanation.
  chosen_spanish_reading: 'El verso se traduce de manera directa: el hombre proclama lo que Jesús había hecho por él, sin añadir explicación doctrinal.'
  alternative_spanish_readings:
  - Una paráfrasis que subraye explícitamente la autoridad divina de Jesús
  rationale: El texto narra el testimonio del hombre y la admiración de todos; la traducción debe preservar esa afirmación narrativa sin resolver ni ampliar la implicación teológica más allá de lo que dice el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie; por eso no hay marcadores en el texto ni notas huérfanas. La redacción mantiene la correspondencia con el griego y con la opción inglesa de ὅσα mediante una solución idiomática española.
  spanish_consistency_notes:
  - Se mantiene «Jesús» como nombre propio estándar.
  - Se usa «Decápolis» como topónimo transliterado habitual en español.
  - «Se fue» y «comenzó a proclamar» conservan el movimiento y el inicio ingresivo del griego.
  - «Se maravillaban» refleja el imperfecto y evita un presente interpretativo.
