    text: O «cuántas cosas había hecho Jesús por él».
    reason: lexical_alternative
  revision_rationale: Se ajusta ὅσα a una expresión española más natural y fluida («todo lo que») sin perder el matiz de amplitud, y se conserva la alternativa auditada mediante nota. El resto del versículo es fiel al griego, claro en español y consistente con las decisiones léxicas documentadas.
