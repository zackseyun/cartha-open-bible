translation:
  language: es
  text: Y empezaron a rogarle que se fuera de su región[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que se fuera de su territorio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conserva la simple conexión narrativa del griego sin añadir una relación temporal que no está explícita en la conjunción.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: empezaron
  alternatives_spanish:
  - comenzaron
  - se pusieron a
  lexicon: BDAG
  rationale: El valor ingresivo de ἄρχω con infinitivo se expresa con naturalidad en español como 'empezaron', manteniendo el inicio de la acción.
- source_word: παρακαλεῖν
  english_pob_choice: to beg
  chosen_spanish: rogarle
  alternatives_spanish:
  - suplicarle
  - pedirle con insistencia
  - implorarle
  lexicon: BDAG
  rationale: Aquí el contexto es una petición urgente y apremiante después del exorcismo; 'rogarle' comunica bien la intensidad sin sonar artificial.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre de objeto directo/indirecto en español se ajusta a la construcción con infinitivo dependiente de 'rogar'; el referente es Jesús.
- source_word: ἀπελθεῖν
  english_pob_choice: to leave
  chosen_spanish: que se fuera
  alternatives_spanish:
  - que partiera
  - que se marchara
  - que se alejara
  lexicon: BDAG
  rationale: El infinitivo expresa el contenido de la súplica; 'que se fuera' es natural en español y mantiene el sentido de irse/partir sin añadir matiz extra.
- source_word: ἀπὸ τῶν ὁρίων αὐτῶν
  english_pob_choice: their region
  chosen_spanish: de su región
  alternatives_spanish:
  - de su territorio
  - de su distrito
  - de sus fronteras
  lexicon: BDAG
  rationale: ὅρια literalmente puede ser 'límites/fronteras', pero en este giro se refiere al ámbito territorial de ellos; 'región' comunica el sentido idiomático con claridad en español.
translation_notes:
  revision_awareness: El texto griego y la audición en inglés coinciden estrechamente; la única decisión relevante es cómo reproducir en español el giro idiomático de ἀπὸ τῶν ὁρίων αὐτῶν sin volverlo demasiado literal.
  spanish_consistency_notes:
  - Se mantiene 'Y' para καί, como enlace narrativo breve.
  - Se conserva el registro moderno y digno; 'rogarle' evita la rigidez de un calco.
  - '''Región'' sigue la solución del inglés POB para ὅρια en este contexto, con nota alternativa para ''territorio''.'
