review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: introduce a una nueva participante («una mujer»), conserva la idea de una condición continua y expresa correctamente la duración de doce años. Sin embargo, «que padecía de flujo de sangre» suena algo forzado en español y no representa de la forma más natural la construcción ἐν ῥύσει αἵματος como estado/condición. Una formulación como «que había estado sufriendo de un flujo de sangre» o «que sufría de un flujo de sangre» preserva mejor tanto el matiz durativo como la legibilidad.'
  spanish_quality_summary: El español es comprensible, pero la frase queda incompleta y algo abrupta por terminar con punto siendo un segmento conectado al versículo siguiente. Además, «padecía de flujo de sangre» suena menos idiomático que «sufría de un flujo de sangre» o «había estado sufriendo de un flujo de sangre». La revisión mejora naturalidad y dignidad sin apartarse del original.
  glossary_alignment: No hay términos del glosario mayor en disputa. La nota léxica sobre ῥύσις está bien encaminada y conviene mantenerla. «Flujo de sangre» es aceptable y fiel; las alternativas «hemorragia» y «sangrado» siguen siendo útiles en nota.
  issues:
  - severity: medium
    issue: 'Expresión española algo poco natural: «padecía de flujo de sangre»'
    rationale: Aunque es entendible, en español eclesial general suena más natural «sufría de un flujo de sangre» o «había estado sufriendo de un flujo de sangre». Esto representa mejor la condición continua sin rigidez innecesaria.
  - severity: low
    issue: Falta el artículo en «flujo de sangre»
    rationale: Después de «de» con verbo como «sufrir/padecer», «de un flujo de sangre» suena más idiomático y claro en español que la forma desnuda.
  - severity: low
    issue: Puntuación final potencialmente abrupta
    rationale: El griego es un segmento dependiente del desarrollo narrativo, y el español con punto puede sentirse truncado. Sin ver el versículo siguiente no es un error grave, pero la revisión del segmento interno ya mitiga la aspereza.
