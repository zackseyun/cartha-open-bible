translation:
  language: es
  text: Y una mujer que había estado sufriendo[a] de un flujo de sangre desde hacía doce años
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un flujo de sangre», «con hemorragia» o «con sangrado».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Entonces
  lexicon: BDAG
  rationale: Conserva la coordinación simple y el estilo paratáctico de Marcos sin añadir una transición interpretativa.
- source_word: γυνὴ
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: Es un sustantivo introduciendo un participante nuevo; en español la forma natural y fiel es con artículo indefinido.
- source_word: οὖσα
  english_pob_choice: who had been suffering
  chosen_spanish: que padecía
  alternatives_spanish:
  - que estaba
  - que venía padeciendo
  lexicon: BDAG
  rationale: El participio expresa una condición continua. «Padecía» comunica una situación durativa y evita una traducción demasiado literal de «siendo».
- source_word: ἐν ῥύσει αἵματος
  english_pob_choice: from a flow of blood
  chosen_spanish: de flujo de sangre
  alternatives_spanish:
  - con un flujo de sangre
  - con hemorragia
  - con sangrado
  lexicon: BDAG
  rationale: La preposición ἐν con dativo aquí expresa estado o condición. En español, «padecer de» reproduce bien esa relación sin forzar un calco preposicional; «flujo de sangre» conserva la imagen nominal del griego.
- source_word: ῥύσει
  english_pob_choice: flow
  chosen_spanish: flujo
  alternatives_spanish:
  - descarga
  - hemorragia
  lexicon: BDAG
  rationale: «Flujo» preserva el sentido básico de ῥύσις y mantiene la correspondencia con el complemento «de sangre».
- source_word: αἵματος
  english_pob_choice: blood
  chosen_spanish: de sangre
  alternatives_spanish:
  - de sangre derramada
  lexicon: BDAG
  rationale: Complemento genitivo directo de ῥύσις; «de sangre» es la forma más natural y precisa en español.
- source_word: δώδεκα ἔτη
  english_pob_choice: for twelve years
  chosen_spanish: desde hacía doce años
  alternatives_spanish:
  - por doce años
  - doce años
  lexicon: BDAG
  rationale: El acusativo de extensión temporal en español se expresa de modo más natural con «desde hacía», que comunica duración pasada continua sin alterar el sentido.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés están en alta concordancia; no se registran revisiones sustanciales. La opción española mantiene la misma lectura durativa y la misma ambigüedad léxica controlada que el original y el POB inglés.
  spanish_consistency_notes:
  - Se conserva el orden narrativo simple de Marcos con una coordinación inicial.
  - «Padecía de» se usa para expresar la condición continua sin introducir lenguaje médico excesivo.
  - «Desde hacía doce años» refleja duración continua pasada y evita una lectura estática.
  - Se mantiene «flujo de sangre» como imagen primaria, con nota de alternativas médicas o idiomáticas.
