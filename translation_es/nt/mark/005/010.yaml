translation:
  language: es
  text: Y le rogaba insistentemente que no los enviara fuera de la región[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «le imploraba muchas veces que no los enviara fuera del territorio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλει
  english_pob_choice: begged
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le suplicaba
  - le imploraba
  - le pedía insistentemente
  lexicon: BDAG
  rationale: En este contexto de exorcismo, παρακαλέω expresa una súplica urgente. «Rogaba» conserva la intensidad sin sonar demasiado coloquial, y encaja bien con el tono bíblico español.
- source_word: πολλὰ
  english_pob_choice: repeatedly
  chosen_spanish: mucho
  alternatives_spanish:
  - repetidamente
  - insistentemente
  - muchas veces
  lexicon: BDAG
  rationale: Como acusativo adverbial con παρεκάλει, intensifica la acción. En español, «le rogaba mucho» transmite esa insistencia de manera natural; «repetidamente» sería más explícito, pero menos idiomático aquí.
- source_word: ἵνα μὴ
  english_pob_choice: not to
  chosen_spanish: que no
  alternatives_spanish:
  - para que no
  - a fin de que no
  - que no fuera a
  lexicon: BDAG
  rationale: La construcción introduce el contenido de la súplica. «Que no» es la forma más directa y natural en español para esta subordinada negativa sin añadir matices no requeridos.
- source_word: αὐτὰ
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - las
  - ellos
  - a esos
  lexicon: BDAG
  rationale: El pronombre neutro plural se refiere a los espíritus inmundos/demonios considerados colectivamente. En español, «los» preserva el referente plural personal sin forzar una singularización artificial.
- source_word: ἀποστείλῃ
  english_pob_choice: send
  chosen_spanish: enviara
  alternatives_spanish:
  - mandara
  - despidiera
  - expulsara
  lexicon: BDAG
  rationale: ἀποστέλλω significa «enviar / mandar fuera». «Enviara» mantiene la relación lexical básica sin introducir la fuerza expulsiva de «expulsara», que no está explícita en el verbo.
- source_word: ἔξω τῆς χώρας
  english_pob_choice: out of the region
  chosen_spanish: fuera de la región
  alternatives_spanish:
  - fuera del territorio
  - fuera de la comarca
  - fuera del lugar
  lexicon: BDAG
  rationale: χώρα aquí designa un distrito o territorio local, no un país moderno. «Región» comunica adecuadamente esa extensión geográfica para el lector contemporáneo.
theological_decisions:
- issue: 'Desajuste de número: un hablante singular frente a un objeto plural'
  english_pob_reading: And he begged him repeatedly not to send them out of the region.
  chosen_spanish_reading: Y le rogaba mucho que no los enviara fuera de la región.
  alternative_spanish_readings:
  - Y le rogaba mucho que no lo enviara fuera de la región.
  - Y le rogaban mucho que no los enviara fuera de la región.
  rationale: El griego mantiene la tensión entre el portavoz singular y la pluralidad de los espíritus. La traducción conserva ese contraste con «le rogaba» y «los», sin armonizar la oscilación numérica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios aplicados y el control cruzado indicó alto acuerdo.'
  spanish_consistency_notes:
  - Se mantiene «región» para χώρα, en línea con la decisión inglesa de no modernizar a «país».
  - Se conserva la referencia plural «los» para αὐτά, evitando resolver la tensión entre el portavoz singular y los muchos demonios.
  - «Rogaba» equilibra dignidad y urgencia; no se sustituyó por «imploraba» en el texto principal para no volverlo excesivamente enfático.
