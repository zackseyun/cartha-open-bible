review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la inmediatez de εὐθὺς, la cesación del sangrado con ἐξηράνθη, la percepción corporal de ἔγνω τῷ σώματι, el perfecto de ἴαται y el sentido no literal de μάστιξ como padecimiento. Sin embargo, «la fuente de su sangre» suena poco natural y puede malentenderse en español; una formulación como «el flujo de su sangre» comunica mejor el evento descrito en contexto, aunque la nota puede preservar la imagen de «fuente/manantial».
  spanish_quality_summary: El español es mayormente claro y digno, pero «fuente de su sangre» resulta rígido y extraño para lectura eclesial general. También la nota b sobre «sanada/curada» no corresponde a una alternativa preservada por el inglés ni resuelve una ambigüedad nueva del español; conviene eliminarla para evitar sobreanotar donde el texto principal ya funciona bien.
  glossary_alignment: No hay conflictos con la terminología troncal del proyecto. «Sanada» es aceptable para ἴαται en este contexto. «Aflicción» alinea bien con la decisión POB para μάστιξ. La revisión propuesta mantiene la fidelidad al griego y mejora la naturalidad del español sin perder la nota léxica sobre πηγή.
  issues:
  - severity: medium
    issue: «la fuente de su sangre» es demasiado literal y poco idiomático en español
    rationale: Aunque πηγή significa literalmente «fuente/manantial», en español esa expresión corporal suena extraña y puede distraer. El contexto narrativo describe el cese del sangrado; «el flujo de su sangre» es más natural en español, mientras la nota puede conservar la imagen de la fuente.
  - severity: low
    issue: La nota [b] sobre «curada» es innecesaria
    rationale: El inglés POB no conserva una nota sobre «healed» aquí, y el español principal ya refleja adecuadamente el perfecto con «había sido sanada». La nota añade información aspectual más propia de decisiones léxicas internas que de una nota al lector.
  revised_spanish_text: Y enseguida se secó el flujo de su sangre[a], y ella supo en su cuerpo que había sido sanada de la aflicción.
  revised_footnotes:
  - marker: a
    text: O «la fuente de su sangre». El griego usa una imagen vívida de fuente o manantial.
    reason: lexical_alternative
