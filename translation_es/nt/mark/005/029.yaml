translation:
  language: es
  text: Y enseguida se secó el flujo de su sangre[a], y ella supo en su cuerpo que había sido sanada de la aflicción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuente de su sangre». El griego usa una imagen vívida de fuente o manantial.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: εὐθὺς marca la rapidez narrativa propia de Marcos. «Enseguida» comunica inmediación en español natural sin endurecer el ritmo con un calco demasiado literal.
- source_word: ἐξηράνθη
  english_pob_choice: dried up
  chosen_spanish: se secó
  alternatives_spanish:
  - se agotó
  - quedó seca
  lexicon: BDAG
  rationale: El verbo pasivo de ξηραίνω expresa que algo se secó o quedó sin humedad/flujo. «Se secó» conserva la imagen vívida y funciona bien con la metáfora corporal.
- source_word: πηγὴ τοῦ αἵματος αὐτῆς
  english_pob_choice: the flow of her blood
  chosen_spanish: la fuente de su sangre
  alternatives_spanish:
  - el manantial de su sangre
  - el flujo de su sangre
  lexicon: BDAG
  rationale: πηγή significa literalmente «fuente» o «manantial». El contexto señala el origen corporal del sangrado, por lo que «fuente de su sangre» conserva el valor imagético mejor que una reducción a «flujo».
- source_word: ἔγνω τῷ σώματι
  english_pob_choice: she knew in her body
  chosen_spanish: ella supo en su cuerpo
  alternatives_spanish:
  - ella sintió en su cuerpo
  - ella reconoció en su cuerpo
  lexicon: BDAG
  rationale: ἔγνω expresa conocimiento o reconocimiento, no solo sensación. «Supo en su cuerpo» mantiene la percepción corporal y el componente cognitivo que el texto griego combina.
- source_word: ἴαται
  english_pob_choice: she had been healed
  chosen_spanish: había sido sanada
  alternatives_spanish:
  - había sido curada
  - estaba sanada
  lexicon: BDAG
  rationale: El perfecto de ἰάομαι enfatiza una sanidad completada con resultado presente. «Había sido sanada» refleja bien ese valor aspectual en español.
- source_word: ἀπὸ τῆς μάστιγος
  english_pob_choice: of the affliction
  chosen_spanish: de la aflicción
  alternatives_spanish:
  - del azote
  - de la plaga
  lexicon: BDAG
  rationale: μάστιξ puede designar azote, plaga o aflicción. Aquí describe su padecimiento, no un látigo literal; «aflicción» comunica el sentido con claridad y sin sobrecargar el texto.
theological_decisions:
- issue: Naturaleza de la curación relatada
  english_pob_reading: Describe an immediate, real bodily healing without adding interpretive explanation about mechanism or source beyond the text.
  chosen_spanish_reading: Describe una sanidad corporal inmediata y real, sin añadir explicación sobre el mecanismo o la causa más allá del texto.
  alternative_spanish_readings:
  - Una formulación más subjetiva centrada solo en la sensación corporal
  - Una paráfrasis que explicara el proceso de sanidad
  rationale: El griego presenta tanto la cesación objetiva del flujo como el reconocimiento corporal de la sanidad. La traducción preserva ambas dimensiones sin introducir elementos ajenos.
  doctrine_reference: 'Principios de traducción POB: fidelidad textual, transparencia y conservación de tensiones léxicas'
translation_notes:
  revision_awareness: La versión inglesa revisó de «source of her bleeding» a «flow of her blood» para acercarse más al léxico griego, y ajustó la relación aspectual de la sanidad. En español se ha optado por mantener la metáfora de πηγή con «fuente» y por reflejar el perfecto con «había sido sanada».
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reproducir la progresión narrativa breve de Marcos sin forzar solemnidad excesiva.
  - Se eligió «aflicción» para μάστιξ conforme al contexto de padecimiento y no de azote literal.
  - Se conservó la referencia corporal explícita con «en su cuerpo» para reflejar τῷ σώματι.
