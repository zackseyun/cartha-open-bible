revisions:
- from: Y enseguida se secó la fuente de su sangre[a], y ella supo en su cuerpo que había sido sanada[b] de la aflicción.
  to: Y enseguida se secó el flujo de su sangre[a], y ella supo en su cuerpo que había sido sanada de la aflicción.
  rationale: Se reemplaza «la fuente de su sangre» por «el flujo de su sangre» para lograr un español más natural y claramente comprensible, manteniendo en nota la imagen léxica de πηγή. Se elimina la nota sobre «sanada/curada» porque no preserva una alternativa necesaria del POB inglés ni resuelve una ambigüedad relevante en español. No se requieren cambios doctrinales ni de fondo.
