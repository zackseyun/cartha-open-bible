translation:
  language: es
  text: 'Y clamando con voz fuerte, dice: «¿Qué tengo yo contigo[a], Jesús, Hijo del Dios Altísimo? Te conjuro por Dios[b], no me atormentes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tengo yo contigo?». La expresión griega es un modismo que puede indicar distancia, conflicto o falta de participación entre las partes.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Te imploro por Dios» o «Te pongo bajo juramento ante Dios». El verbo griego expresa una carga solemne o una adjuración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράξας
  english_pob_choice: crying out
  chosen_spanish: clamando
  alternatives_spanish:
  - gritando
  - dando un grito
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal expresa una exclamación fuerte e inmediata. «Clamando» conserva el carácter urgente y sonoro sin sonar tan mecánico como un calco.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con gran voz
  lexicon: BDAG
  rationale: La frase dativa/instrumental se vierte naturalmente como «con voz fuerte», manteniendo la intensidad auditiva del original.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos para mantener vivacidad narrativa, como en el audit trail inglés.
- source_word: Τί ἐμοὶ καὶ σοί
  english_pob_choice: What have I to do with you?
  chosen_spanish: ¿Qué tengo yo contigo?
  alternatives_spanish:
  - ¿Qué hay entre tú y yo?
  - ¿Qué tengo que ver contigo?
  lexicon: BDAG
  rationale: La expresión es un modismo de distancia o rechazo relacional. «¿Qué tengo yo contigo?» preserva la fuerza idiomática y la concisión del griego sin sobreexplicar.
- source_word: υἱὲ τοῦ θεοῦ τοῦ ὑψίστου
  english_pob_choice: Son of the Most High God
  chosen_spanish: Hijo del Dios Altísimo
  alternatives_spanish:
  - Hijo de Dios Altísimo
  - Hijo del Dios, el Altísimo
  lexicon: BDAG
  rationale: Se conserva el título filial y el epíteto divino en un orden natural del español. «Dios Altísimo» refleja bien τοῦ θεοῦ τοῦ ὑψίστου sin necesidad de invertir el sintagma.
- source_word: ὁρκίζω σε τὸν θεόν
  english_pob_choice: I adjure you by God
  chosen_spanish: Te conjuro por Dios
  alternatives_spanish:
  - Te imploro por Dios
  - Te pongo bajo juramento ante Dios
  lexicon: BDAG
  rationale: «Conjuro» mantiene la solemnidad y la fuerza de un acto verbal de apremio u obligación, comparable a «adjure» en inglés. «Por Dios» conserva el dativo/invocación de la fórmula.
- source_word: μή με βασανίσῃς
  english_pob_choice: do not torment me
  chosen_spanish: no me atormentes
  alternatives_spanish:
  - no me tortures
  - no me afligas
  lexicon: BDAG
  rationale: «Atormentes» reproduce bien la intensidad de βασανίζω sin especificar indebidamente el tipo de sufrimiento; «tortures» sería más fuerte pero más restringido.
theological_decisions:
- issue: Reconocimiento demoníaco de la identidad de Jesús
  english_pob_reading: Son of the Most High God
  chosen_spanish_reading: Hijo del Dios Altísimo
  alternative_spanish_readings:
  - Hijo de Dios Altísimo
  rationale: La traducción mantiene explícita la identificación elevada de Jesús sin suavizarla ni ampliarla más allá del verso. Se preserva así la tensión cristológica presente en la escena.
  doctrine_reference: Affirmations; preserve theological tension rather than resolve it
- issue: Fuerza de ὁρκίζω en una súplica dirigida a Jesús
  english_pob_reading: I adjure you by God
  chosen_spanish_reading: Te conjuro por Dios
  alternative_spanish_readings:
  - Te imploro por Dios
  - Te pongo bajo juramento ante Dios
  rationale: «Conjuro» conserva el carácter solemne, casi legal/juramentario, del verbo. Esto permite que permanezca visible la extraña tensión de un espíritu impuro apelando a Dios ante Jesús.
  doctrine_reference: 'Translation philosophy #3; #6'
translation_notes:
  revision_awareness: El audit trail inglés mantiene el presente histórico («he says») y refina el modismo Τί ἐμοὶ καὶ σοί hacia una forma más concisa; la versión española sigue esa revisión al usar «dice» y una fórmula idiomática breve. También conserva la solemnidad de ὁρκίζω sin diluirla en una mera petición.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «Altísimo» para ὑψίστου, siguiendo el uso POB.
  - Se evitó «SEÑOR» para el nombre divino porque aquí el griego usa θεός, no κύριος.
  - Se eligió «no me atormentes» para preservar la intensidad de βασανίσῃς sin convertirla en una explicación.
  - El orden del vocativo en español se ajustó a la sintaxis natural sin perder el sentido del original.
