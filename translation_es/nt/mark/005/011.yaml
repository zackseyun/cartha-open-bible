translation:
  language: es
  text: Y había allí, junto al monte, una gran piara de cerdos[a] alimentándose.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al lado del monte». La expresión griega πρὸς τῷ ὄρει indica cercanía o ubicación junto al monte.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now there was
  chosen_spanish: Y estaba
  alternatives_spanish:
  - Ahora había
  - Y había
  lexicon: BDAG
  rationale: El griego introduce una escena con valor existencial y conectivo suave. En español, «y estaba» conserva la continuidad narrativa de δέ sin añadir un «ahora» que puede sonar más enfático que el original. "Había" también sería posible, pero aquí la construcción con "estaba" funciona bien con la escena localizada.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allí
  lexicon: BDAG
  rationale: Adverbio locativo simple. «Allí» es natural y mantiene la referencia espacial directa.
- source_word: πρὸς τῷ ὄρει
  english_pob_choice: near the mountain
  chosen_spanish: junto al monte
  alternatives_spanish:
  - cerca del monte
  - al lado del monte
  - junto al monte
  lexicon: BDAG
  rationale: La preposición πρός con dativo aquí expresa cercanía o ubicación junto a. «Junto al monte» es idiomático en español y conserva la proximidad sin sobreespecificar la relación espacial. «Monte» comunica mejor la topografía que «montaña» en este contexto narrativo.
- source_word: ἀγέλη
  english_pob_choice: herd
  chosen_spanish: piara
  alternatives_spanish:
  - rebaño
  - manada
  - piara
  lexicon: BDAG
  rationale: ἀγέλη es un grupo de animales. Para cerdos, «piara» es el término español más preciso y natural; «rebaño» suena más propio de ovejas y cabras, y «manada» es más general. Se mantiene el valor colectivo del sustantivo.
- source_word: χοίρων
  english_pob_choice: of pigs
  chosen_spanish: de cerdos
  alternatives_spanish:
  - de puercos
  - de cerdos
  - de cochinos
  lexicon: BDAG
  rationale: χοῖρος designa cerdos o puercos. «Cerdos» es la forma estándar y clara en español bíblico contemporáneo. Se evita «puercos/cochinos» por registro regional o coloquial.
- source_word: μεγάλη
  english_pob_choice: large
  chosen_spanish: gran
  alternatives_spanish:
  - grande
  - gran
  lexicon: BDAG
  rationale: El adjetivo califica el tamaño o número de la piara. En español, «gran» antepuesto es natural y solemne, y equivale bien a la idea de gran tamaño o gran cantidad sin sonar forzado.
- source_word: βοσκομένη
  english_pob_choice: feeding
  chosen_spanish: paciendo
  alternatives_spanish:
  - pastando
  - alimentándose
  - paciendo
  lexicon: BDAG
  rationale: El participio presente expresa la acción en curso de alimentarse/pastorear. Para cerdos, «paciendo» refleja el matiz de estar comiendo en el campo; «pastando» puede sonar más restringido a herbívoros, y «alimentándose» es más explicativo pero menos vívido.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura auditada de la edición inglesa: una escena narrativa simple con valor existencial de ἦν, proximidad local de πρὸς τῷ ὄρει, y el sentido de un grupo numeroso de cerdos en acción continua con βοσκομένη. No se detectaron cambios revisionales en el pasaje inglés de referencia.'
  spanish_consistency_notes:
  - Se prefirió «monte» en lugar de «montaña» por fluidez y porque el contexto narrativo admite una referencia topográfica general.
  - Se usó «piara» por ser el sustantivo más preciso para un grupo de cerdos, preservando el valor colectivo de ἀγέλη.
  - Se mantuvo un estilo sobrio y publicable, sin ampliar el texto más allá de lo que el griego exige.
