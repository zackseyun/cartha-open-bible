  verdict: revise
  source_alignment_summary: 'El borrador capta bien la escena básica: existencia de un grupo grande de cerdos allí, cerca del monte, en acto de alimentarse. Sin embargo, «Y estaba ... una gran piara» suena menos fiel al valor existencial natural de ἦν que «había», y «paciendo» para cerdos resulta poco idiomático en español general, aunque intenta reflejar βοσκομένη.'
  spanish_quality_summary: El texto es comprensible, pero «Y estaba allí, junto al monte, una gran piara de cerdos paciendo» suena forzado en español. «Había» mejora la fluidez y el valor existencial; «alimentándose» evita una formulación extraña para cerdos y mantiene el sentido participial en curso. También conviene simplificar la puntuación.
  glossary_alignment: No hay términos teológicos sensibles aquí. «Cerdos» concuerda bien con χοίρων y con la preferencia por español moderno legible. «Monte» es aceptable para ὄρει. La nota léxica sobre πρὸς τῷ ὄρει debe conservarse; la alternativa inglesa sobre «swine» no necesita reproducirse en español porque «cerdos» ya es la opción natural sin ambigüedad relevante.
  issues:
  - severity: medium
    issue: «Y estaba» no refleja de la manera más natural el valor existencial de ἦν
    rationale: En esta construcción, el griego presenta la existencia/presencia de algo en el escenario; en español bíblico natural, «había» comunica mejor ese valor que «estaba» con sujeto pospuesto.
  - severity: medium
    issue: «Paciendo» es poco idiomático para cerdos en español general
    rationale: Aunque intenta conservar el participio de alimentación, en español amplio suena raro aplicado a cerdos. «Alimentándose» o «comiendo» serían más naturales; «alimentándose» preserva mejor el sentido amplio de βοσκομένη.
  - severity: low
    issue: La puntuación con comas interrumpe innecesariamente la frase
    rationale: Una redacción más lineal mejora la legibilidad sin perder información espacial.
