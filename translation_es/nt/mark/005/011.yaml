- from: Y estaba allí, junto al monte, una gran piara de cerdos[a] paciendo.
  to: Y había allí, junto al monte, una gran piara de cerdos[a] alimentándose.
  rationale: Se cambia «estaba» por «había» para reflejar mejor la construcción existencial griega ἦν. Se reemplaza «paciendo» por «alimentándose» porque es más natural y ampliamente comprensible en español para cerdos, sin perder el sentido de βοσκομένη como acción en curso de alimentarse. Se conserva «junto al monte» y la nota alternativa correspondiente, ya que representan bien πρὸς τῷ ὄρει.
