translation:
  language: es
  text: Y cuando salió de la barca[a], al instante un hombre con un espíritu inmundo[b] le salió al encuentro de los sepulcros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando salió de la embarcación». El griego dice más literalmente «cuando salió» del bote/barca.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «poseído por un espíritu inmundo». El griego dice más literalmente «con un espíritu inmundo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντος αὐτοῦ
  english_pob_choice: when he got out
  chosen_spanish: cuando salió
  alternatives_spanish:
  - cuando bajó
  - al salir
  lexicon: BDAG
  rationale: El participio genitivo aoristo se vierte naturalmente como cláusula temporal en español. «Salió» conserva la acción de salir de la barca sin volverla innecesariamente literal ni explicativa.
- source_word: πλοίου
  english_pob_choice: boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el bote
  - la nave
  lexicon: BDAG
  rationale: En el contexto narrativo de Marcos y del mar de Galilea, «barca» es la equivalencia española más natural y precisa; «nave» sería demasiado solemne y «bote» menos idiomático en este registro.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: «Al instante» comunica la urgencia narrativa de εὐθύς con fluidez en español y mantiene el marcador marcano de inmediatez.
- source_word: ὑπήντησεν αὐτῷ
  english_pob_choice: came out from the tombs to meet him
  chosen_spanish: le salió al encuentro
  alternatives_spanish:
  - lo encontró
  - lo fue a encontrar
  lexicon: BDAG
  rationale: ὑπαντάω significa «salir al encuentro» / «encontrarse con». En español, «le salió al encuentro» expresa el movimiento hacia Jesús sin añadir más interpretación que la que ya sugiere la construcción griega.
- source_word: ἐκ τῶν μνημείων
  english_pob_choice: from the tombs
  chosen_spanish: desde los sepulcros
  alternatives_spanish:
  - de entre los sepulcros
  - desde las tumbas
  lexicon: BDAG
  rationale: «Sepulcros» comunica bien el lugar funerario y su tono macabro en español bíblico contemporáneo. «Tumbas» también sería viable, pero «sepulcros» conserva mejor el peso del escenario.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y se refiere a un individuo concreto; «hombre» es la traducción directa y natural.
- source_word: ἐν πνεύματι ἀκαθάρτῳ
  english_pob_choice: with an unclean spirit
  chosen_spanish: con un espíritu inmundo
  alternatives_spanish:
  - en un espíritu inmundo
  - poseído por un espíritu inmundo
  lexicon: BDAG
  rationale: La preposición ἐν aquí puede expresar condición o asociación. «Con un espíritu inmundo» sigue de cerca la forma griega y preserva la tensión lexical que el propio POB inglés señaló al notar la alternativa «poseído por».
theological_decisions:
- issue: Lenguaje de aflicción demoníaca
  english_pob_reading: with an unclean spirit
  chosen_spanish_reading: con un espíritu inmundo
  alternative_spanish_readings:
  - poseído por un espíritu inmundo
  - en un espíritu inmundo
  rationale: Se mantiene la formulación cercana al griego para no resolver prematuramente la relación entre la persona y el espíritu. «Poseído» interpreta más de lo que el versículo dice por sí solo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El texto inglés más reciente no requirió cambios; esta versión española sigue de cerca la decisión auditada de mantener la expresión literal «with an unclean spirit» y adapta a un español natural la secuencia temporal y el desplazamiento del hombre desde los sepulcros.
  spanish_consistency_notes:
  - Se usó «barca» para πλοῖον, coherente con el contexto galileo.
  - Se prefirió «espíritu inmundo» y no una paráfrasis demonológica más amplia.
  - Se mantuvo «sepulcros» para μνημεῖα por su tono bíblico y funerario.
  - El marcador de inmediatez se tradujo con «al instante» para reflejar εὐθύς.
