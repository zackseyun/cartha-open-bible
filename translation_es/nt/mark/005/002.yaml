  to: Y cuando salió de la barca[a], al instante un hombre con un espíritu inmundo[b] le salió al encuentro de los sepulcros.
  rationale: Se ajusta ἐκ τῶν μνημείων a «de los sepulcros» para reflejar mejor la procedencia/movimiento en español natural. También se simplifica la nota a para evitar formulaciones confusas, manteniendo la alternativa léxica esencial. Se conserva «con un espíritu inmundo» por fidelidad al griego y a la decisión teológica documentada.
