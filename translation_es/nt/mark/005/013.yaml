revisions:
- from: Y le permitió[a]. Y, al salir los espíritus inmundos, entraron en los cerdos; y la manada, como de dos mil, se precipitó por el barranco hacia el mar[b], y se ahogaban en el mar.
  to: Y les permitió. Entonces los espíritus inmundos salieron y entraron en los cerdos, y la manada—como dos mil—se precipitó por el barranco al mar[a], y se ahogaron en el mar.
  rationale: Se corrige «le permitió» a «les permitió» para reflejar fielmente el plural αὐτοῖς. Se cambia «hacia el mar» por «al mar» para representar mejor εἰς τὴν θάλασσαν. Se sustituye «como de dos mil» por «como dos mil» por mayor naturalidad. Se ajusta «se ahogaban» a «se ahogaron» para un español narrativo más natural y en línea con la revisión final inglesa. La nota se rehace para evitar justificar el singular y para conservar la información cultural sobre «el mar» junto con las alternativas léxicas de κρημνός.
  reviewer_model: gpt-5.4
