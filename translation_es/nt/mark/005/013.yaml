review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia básica del griego: Jesús concede permiso, los espíritus inmundos salen, entran en los cerdos, la manada desciende violentamente y termina en el mar. Sin embargo, hay dos desajustes importantes con el original y con la auditoría inglesa: (1) αὐτοῖς es plural, por lo que «le permitió» no es fiel; debe ser «les permitió». (2) εἰς τὴν θάλασσαν expresa entrada al mar, y «hacia el mar» debilita el movimiento ingresivo; conviene «al mar» o «en el mar». Además, la nota [a] está mal anclada conceptualmente: el contenido de la nota habla de alternativas para «les permitió», no de otra expresión.'
  spanish_quality_summary: El español es generalmente claro y legible, con tono digno. «Espíritus inmundos», «cerdos» y «manada» funcionan bien. No obstante, «como de dos mil» suena algo forzado en español contemporáneo; «como dos mil» o «unos dos mil» sería más natural. También «se ahogaban» preserva el aspecto imperfectivo, pero en narrativa española aquí suena menos natural y menos alineado con la revisión final inglesa, que optó por un resultado global; «se ahogó» sería incorrecto por número, y «se ahogaron» comunica mejor el desenlace sin distorsionar el sentido. La puntuación puede simplificarse para mayor fluidez.
  glossary_alignment: 'La terminología clave está mayormente alineada con los lineamientos del proyecto: πνεύματα ἀκάθαρτα → «espíritus inmundos» está bien; χοίρους → «cerdos» es natural; θάλασσα → «mar» respeta la primacía del original y la nota cultural lo aclara. El principal problema terminológico es pronominal: αὐτοῖς no debe reducirse a singular en español. No hay conflictos con términos teológicos mayores del glosario.'
  issues:
  - severity: high
    issue: «le permitió» traduce un dativo plural como singular
    rationale: El griego αὐτοῖς es inequívocamente plural y refiere a los espíritus inmundos. El singular español no preserva fielmente la referencia gramatical ni la decisión documentada en inglés ('he permitted them').
  - severity: medium
    issue: «hacia el mar» debilita εἰς τὴν θάλασσαν
    rationale: εἰς indica movimiento de entrada/dirección hasta el interior o contacto resultante. «Hacia» solo marca orientación general. «Al mar» o «en el mar» refleja mejor el sentido narrativo.
  - severity: medium
    issue: «como de dos mil» suena poco natural
    rationale: Aunque intenta reflejar ὡς con aproximación, en español bíblico contemporáneo «como dos mil» o «unos dos mil» resulta más idiomático sin perder fidelidad.
  - severity: low
    issue: «se ahogaban» es posible pero poco natural en esta narración
    rationale: El imperfecto griego puede reflejar proceso, pero la auditoría inglesa ya revisó a un resultado narrativo simple ('they drowned'). En español, «se ahogaron» fluye mejor y comunica adecuadamente el desenlace.
  - severity: low
    issue: La nota [a] mezcla alternativa correcta con una forma incorrecta en el texto
    rationale: Si el texto principal se corrige a «les permitió», la nota debe reestructurarse para ofrecer alternativas reales como «les dejó» o «les dio permiso», no para justificar un singular no fiel.
  revised_spanish_text: Y les permitió. Entonces los espíritus inmundos salieron y entraron en los cerdos, y la manada—como dos mil—se precipitó por el barranco al mar[a], y se ahogaron en el mar.
  revised_footnotes:
