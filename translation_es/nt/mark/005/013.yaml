    text: 'Griego: «el mar». Se refiere al mar de Galilea. O «por el precipicio» o «por la ladera escarpada» para la expresión «por el barranco».'
    reason: cultural_note_and_lexical_alternative
  revision_rationale: Se corrige «le permitió» a «les permitió» para reflejar fielmente el plural αὐτοῖς. Se cambia «hacia el mar» por «al mar» para representar mejor εἰς τὴν θάλασσαν. Se sustituye «como de dos mil» por «como dos mil» por mayor naturalidad. Se ajusta «se ahogaban» a «se ahogaron» para un español narrativo más natural y en línea con la revisión final inglesa. La nota se rehace para evitar justificar el singular y para conservar la información cultural sobre «el mar» junto con las alternativas léxicas de κρημνός.
