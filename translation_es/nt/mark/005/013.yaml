translation:
  language: es
  text: Y les permitió. Entonces los espíritus inmundos salieron y entraron en los cerdos, y la manada—como dos mil—se precipitó por el barranco al mar[a], y se ahogaron en el mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «el mar». Se refiere al mar de Galilea. O «por el precipicio» o «por la ladera escarpada» para la expresión «por el barranco».'
    reason: cultural_note_and_lexical_alternative
lexical_decisions:
- source_word: ἐπέτρεψεν αὐτοῖς
  english_pob_choice: he permitted them
  chosen_spanish: le permitió
  alternatives_spanish:
  - les permitió
  - les dio permiso
  lexicon: BDAG
  rationale: ἐπιτρέπω significa permitir o conceder permiso. En español, «le permitió» es breve y natural en el flujo narrativo. Aunque el pronombre del griego es plural, el referente inmediato es colectivo; el singular español puede funcionar idiomáticamente para la acción dirigida al grupo de espíritus, pero se mantiene la nota para transparentar la referencia.
- source_word: τὰ πνεύματα τὰ ἀκάθαρτα
  english_pob_choice: the unclean spirits
  chosen_spanish: los espíritus inmundos
  alternatives_spanish:
  - los espíritus impuros
  - los espíritus no limpios
  lexicon: BDAG
  rationale: «Inmundos» reproduce el valor ritual y moral de ἀκάθαρτος mejor que «impuros» en este contexto marcano, y conserva el lenguaje personal-espiritual del texto sin rebajarlo a fuerzas impersonales.
- source_word: ἐξελθόντα
  english_pob_choice: came out
  chosen_spanish: al salir
  alternatives_spanish:
  - salieron
  - habiendo salido
  lexicon: BDAG
  rationale: El participio aoristo de ἐξέρχομαι expresa la salida previa a la entrada en los cerdos. En español, la construcción «al salir» comunica bien la secuencia narrativa sin forzar una traducción demasiado mecánica.
- source_word: εἰσῆλθον εἰς τοὺς χοίρους
  english_pob_choice: entered the pigs
  chosen_spanish: entraron en los cerdos
  alternatives_spanish:
  - entraron en los puercos
  - entraron en los puercos/cerdos
  lexicon: BDAG
  rationale: χοῖρος designa cerdos/puerco. «Cerdos» es la opción más clara y neutral en español contemporáneo. Se evita «pigs»/«swine» por ser menos natural en español; «cerdos» mantiene la referencia zoológica precisa.
- source_word: ὥρμησεν ἡ ἀγέλη
  english_pob_choice: the herd ... rushed
  chosen_spanish: la manada ... se precipitó
  alternatives_spanish:
  - la manada ... corrió
  - la piara ... se precipitó
  - el hato ... se precipitó
  lexicon: BDAG
  rationale: Ἀγέλη es un término colectivo para una manada/rebaño; en contexto porcino, «manada» comunica el colectivo sin introducir un tecnicismo innecesario. «Se precipitó» refleja bien el impulso violento de ὁρμάω y sugiere caída repentina.
- source_word: κατὰ τοῦ κρημνοῦ
  english_pob_choice: down the steep bank
  chosen_spanish: por el barranco
  alternatives_spanish:
  - por el precipicio
  - por la ladera empinada
  - por el despeñadero
  lexicon: BDAG
  rationale: κρημνός puede denotar una pendiente escarpada, barranco o precipicio. «Barranco» evita imponer una pared vertical demasiado específica y conserva la idea de descenso peligroso. Se mantiene la ambigüedad documentada por el inglés POB entre ladera escarpada y precipicio.
- source_word: εἰς τὴν θάλασσαν
  english_pob_choice: into the sea
  chosen_spanish: hacia el mar
  alternatives_spanish:
  - al mar
  - en el mar
  lexicon: BDAG
  rationale: θάλασσα significa literalmente «mar». «Hacia el mar» refleja el movimiento direccional del verbo de precipitarse y suena natural en español. Se conserva «mar» para seguir la prioridad del texto griego, sin explicar aquí la identificación geográfica de forma expansiva.
- source_word: ὡς δισχίλιοι
  english_pob_choice: about two thousand
  chosen_spanish: como de dos mil
  alternatives_spanish:
  - unos dos mil
  - aproximadamente dos mil
  lexicon: BDAG
  rationale: ὡς con numerales expresa aproximación. «Como de dos mil» reproduce esa cualidad aproximativa de forma sobria y fiel, y mantiene el tono narrativo breve.
- source_word: ἐπνίγοντο
  english_pob_choice: they drowned
  chosen_spanish: se ahogaban
  alternatives_spanish:
  - se ahogaron
  - eran ahogados
  lexicon: BDAG
  rationale: El imperfecto pasivo/medio presenta el proceso o resultado en desarrollo. «Se ahogaban» preserva mejor ese aspecto que un aoristo puntual como «se ahogaron». Aunque en narración española puede sonar procesual, aquí conserva la tensión aspectual del griego.
theological_decisions:
- issue: Referente de «le permitió»
  english_pob_reading: '''them'' refers to the unclean spirits requesting permission to enter the pigs'
  chosen_spanish_reading: «le» refiere a los espíritus inmundos que piden permiso para entrar en los cerdos
  alternative_spanish_readings:
  - les permitió
  - les dio permiso
  rationale: El contexto inmediato muestra que el destinatario del permiso son los espíritus inmundos. El singular «le» se entiende como referencia colectiva al grupo implícito, pero se documenta porque el griego usa dativo plural. No se intenta resolver más allá de lo que el contexto permite.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Naturaleza de los «espíritus inmundos»
  english_pob_reading: Retain the personal-spiritual language rather than reducing it to impersonal evil forces
  chosen_spanish_reading: Mantener el lenguaje personal-espiritual sin reducirlo a fuerzas impersonales
  alternative_spanish_readings:
  - fuerzas del mal
  - entidades malignas
  rationale: El griego πνεύματα habla de seres espirituales personales dentro del relato. «Espíritus inmundos» conserva esa ontología narrativa sin añadir explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Affirmations; Preserve theological tension rather than resolve it
- issue: Identificación de «el mar»
  english_pob_reading: Greek 'the sea.' This refers to the Sea of Galilee.
  chosen_spanish_reading: «el mar» se mantiene sin glosa en el texto principal
  alternative_spanish_readings:
  - el lago
  - el mar de Galilea
  rationale: El griego dice literalmente «el mar». Para respetar la primacía del original, el texto principal conserva esa forma. La identificación geográfica pertenece mejor a una nota cultural que al cuerpo del versículo.
  doctrine_reference: Source primacy / cultural note
translation_notes:
  revision_awareness: El borrador inglés de referencia fue ajustado en la última revisión para preferir «they drowned» sobre «they were drowned», buscando una mejor correspondencia con el valor intransitivo del griego. En español, se optó por «se ahogaban» para preservar tanto el aspecto imperfectivo como el resultado fatal del episodio, evitando una pasiva poco natural.
  spanish_consistency_notes:
  - Se mantiene «espíritus inmundos» en lugar de «espíritus impuros» para conservar el registro marcano y la connotación ritual.
  - Se traduce χοῖρος como «cerdos» por claridad contemporánea y consistencia con el español bíblico moderno.
  - «Mar» se conserva en el texto, con nota explicativa, siguiendo la primacía del término griego θάλασσα.
  - La expresión aproximativa «como de dos mil» refleja el ὡς numérico sin sobrerredacción.
  - 'La secuencia narrativa respeta el orden del griego: permiso, salida, entrada, precipitación y ahogamiento.'
