revisions:
- from: Y mientras él subía a la barca, el endemoniado le seguía rogando que le permitiera estar con él.
  to: Y mientras él entraba en la barca, el hombre que había estado endemoniado[a] le seguía rogando que estuviera con él.
  rationale: La revisión elimina una expansión no presente en el griego («permitiera»), afina el valor progresivo de ἐμβαίνοντος con «entraba en la barca», y hace explícito en español que se trata del hombre previamente liberado, manteniendo la alternativa más breve en nota como en el audit trail inglés.
