translation:
  language: es
  text: Y mientras él entraba en la barca, el hombre que había estado endemoniado[a] le seguía rogando que estuviera con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el endemoniado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμβαίνοντος αὐτοῦ
  english_pob_choice: as he was getting into
  chosen_spanish: y mientras él subía a la barca
  alternatives_spanish:
  - cuando subía a la barca
  - al subir a la barca
  lexicon: BDAG
  rationale: El participio en genitivo absoluto expresa acción simultánea en progreso. «Mientras él subía» conserva esa simultaneidad y suena natural en español; «a la barca» sigue el contexto narrativo sin sobrecargar el texto.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - lancha
  lexicon: BDAG
  rationale: En el contexto del mar de Galilea, «barca» comunica bien una embarcación pequeña y evita la impresión de una nave grande que podría sugerir «barco».
- source_word: παρεκάλει
  english_pob_choice: kept begging
  chosen_spanish: le seguía rogando
  alternatives_spanish:
  - le rogaba insistentemente
  - continuaba suplicándole
  lexicon: BDAG
  rationale: El imperfecto indica acción continua o reiterada. «Le seguía rogando» preserva esa insistencia sin sonar demasiado literal o rígido en español.
- source_word: ὁ δαιμονισθεὶς
  english_pob_choice: the man who had been demon-possessed
  chosen_spanish: el endemoniado
  alternatives_spanish:
  - el hombre que había sido endemoniado
  - el hombre poseído por demonios
  lexicon: BDAG
  rationale: El participio sustantivado señala al hombre ya liberado. «El endemoniado» es una forma breve y comprensible en español; conserva la referencia a la aflicción demoníaca sin introducir una perífrasis innecesaria.
- source_word: ἵνα ⸂μετ’ αὐτοῦ ᾖ⸃
  english_pob_choice: that he might be with him
  chosen_spanish: que le permitiera estar con él
  alternatives_spanish:
  - para estar con él
  - que pudiera estar con él
  lexicon: BDAG
  rationale: 'La cláusula expresa el contenido de la súplica. En español, el sentido implícito del pedido se vuelve natural al explicitar el permiso: «que le permitiera estar con él», manteniendo la relación personal de μετ’ αὐτοῦ.'
theological_decisions:
- issue: Cómo expresar δαιμονισθείς sin diluir la realidad de la aflicción demoníaca
  english_pob_reading: demon-possessed
  chosen_spanish_reading: endemoniado
  alternative_spanish_readings:
  - demonizado
  - poseído por demonios
  rationale: «Endemoniado» es un término asentado en español bíblico y conserva la fuerza narrativa de una persona bajo opresión demoníaca. Evita tanto el lenguaje clínico como una expansión excesivamente explicativa.
  doctrine_reference: Affirmations; Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota [a]; ahora la traducción no incluye marcas de nota sin anclaje. Se mantuvo la equivalencia óptima con atención a la simultaneidad del participio, la imperfectividad de παρεκάλει y la súplica implícita de la cláusula con ἵνα.
  spanish_consistency_notes:
  - Se usó «barca» para πλοῖον por consistencia con el contexto evangélico marítimo.
  - Se mantuvo la relación pronominal natural en español («le... con él») sin perder el referente de Jesús implícito en el contexto.
  - No se introdujeron notas al pie porque el texto español no necesitó una alternativa obligatoria anclada.
