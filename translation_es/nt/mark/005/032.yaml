translation:
  language: es
  text: Y siguió mirando alrededor para ver a la que había hecho esto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego usa un participio femenino sustantivado ('la que había hecho esto'); por eso la traducción señala explícitamente que se trata de una mujer, pero sin añadir un sustantivo que el texto no expresa.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción simplemente enlaza con la acción anterior; en español, 'Y' conserva la continuidad narrativa sin introducir una inferencia que no está explícita en el griego.
- source_word: περιεβλέπετο
  english_pob_choice: he kept looking around
  chosen_spanish: siguió mirando alrededor
  alternatives_spanish:
  - estuvo mirando alrededor
  - miraba alrededor
  lexicon: BDAG
  rationale: El imperfecto medio expresa una acción continua o reiterada en pasado. 'Siguió mirando alrededor' comunica bien esa duración y mantiene un español natural.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: para ver
  alternatives_spanish:
  - para mirar
  - para encontrar
  lexicon: BDAG
  rationale: Después de un verbo de búsqueda visual, el infinitivo de propósito se vierte de forma directa con 'para ver', que es natural y fiel al valor complementario.
- source_word: τὴν ... ποιήσασαν
  english_pob_choice: the one who had done
  chosen_spanish: a la que había hecho
  alternatives_spanish:
  - a la mujer que había hecho
  - a la que lo había hecho
  lexicon: BDAG
  rationale: El participio femenino sustantivado señala a una persona femenina sin añadir un sustantivo explícito en el griego. En español, 'a la que' preserva esa falta de sustantivo y evita imponer 'mujer' donde el texto no lo dice de forma explícita.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta cosa
  - ello
  lexicon: BDAG
  rationale: El demostrativo retoma el acto inmediato anterior; 'esto' reproduce de manera idiomática la referencia anafórica sin sobreexplicar.
translation_notes:
  revision_awareness: El borrador sigue la revisión auditada que prefirió 'the one who had done this' frente a 'the woman who had done this', porque el griego contiene un participio femenino sustantivado sin un sustantivo explícito. La versión española conserva esa precisión con 'a la que', y la nota aclara la referencia femenina sin sobredeterminar el sustantivo.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando el texto fuente lo exige; aquí no aparece el nombre divino.
  - Se evita 'Cristo'/'Mesías' porque el versículo no contiene esa terminología.
  - Se conserva el valor aspectual del imperfecto con una expresión durativa natural en español.
  - La nota al pie preserva la tensión entre la ausencia de sustantivo explícito y la referencia femenina implícita.
