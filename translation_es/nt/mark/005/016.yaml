revisions:
- from: Y los que lo habían visto les contaron cómo había sucedido[a] al endemoniado[b] y acerca de los cerdos.
  to: Y los que lo habían visto les contaron qué le había sucedido al endemoniado[a] y acerca de los cerdos.
  rationale: Se reemplaza «cómo había sucedido al endemoniado» por «qué le había sucedido al endemoniado» para producir un español natural y preciso que exprese correctamente la relación de ἐγένετο con el dativo τῷ δαιμονιζομένῳ. Se elimina la nota sobre «cómo había ocurrido» porque ya no responde al principal problema y no es necesaria. Se conserva la nota léxica para δαιμονιζομένῳ con una forma ortográfica española normalizada.
