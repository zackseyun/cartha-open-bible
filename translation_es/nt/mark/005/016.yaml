lexical_decisions:
- source_word: διηγήσαντο
  english_pob_choice: told
  chosen_spanish: contaron
  alternatives_spanish:
  - relataron
  - narraron
  - contaron detalladamente
  lexicon: BDAG
  rationale: El verbo comunica el acto de informar o relatar un hecho. «Contaron» es natural en español y mantiene el valor narrativo sin endurecer el estilo; «relataron» o «narraron» serían más formales, y «contaron detalladamente» añade más explicitación de la que exige el griego.
- source_word: οἱ ἰδόντες
  english_pob_choice: those who had seen it
  chosen_spanish: los que lo habían visto
  alternatives_spanish:
  - los que vieron aquello
  - los testigos oculares
  lexicon: BDAG
  rationale: La construcción participial identifica a quienes fueron testigos del hecho. «Los que lo habían visto» preserva la referencia participial y la secuencia narrativa; «testigos oculares» sería una nominalización más interpretativa, aunque válida como alternativa contextual.
- source_word: πῶς ἐγένετο
  english_pob_choice: how it had happened
  chosen_spanish: cómo había sucedido
  alternatives_spanish:
  - cómo había ocurrido
  - cómo pasó
  - qué había sucedido
  lexicon: BDAG
  rationale: La frase introduce la manera en que ocurrió el hecho. «Cómo había sucedido» conserva bien el valor explicativo y el tiempo relativo pasado del relato; «cómo había ocurrido» también es posible, pero algo más abstracto.
- source_word: τῷ δαιμονιζομένῳ
  english_pob_choice: the demon-possessed man
  chosen_spanish: al endemoniado
  alternatives_spanish:
  - al hombre poseído por un demonio
  - al poseído por un demonio
  - al endemoniado
  lexicon: BDAG
  rationale: El participio describe a una persona bajo influencia demoníaca. «Endemoniado» es una solución española breve, tradicional y fiel al referente personal del texto. «Al hombre poseído por un demonio» explicita más el sentido, pero alarga innecesariamente la frase; «endemoniado» conserva la tensión lexicográfica sin sustituirla por una categoría psicológica.
- source_word: περὶ τῶν χοίρων
  english_pob_choice: about the pigs
  chosen_spanish: acerca de los cerdos
  alternatives_spanish:
  - sobre los cerdos
  - respecto de los cerdos
  - acerca de los puercos
  lexicon: BDAG
  rationale: La preposición con genitivo introduce el asunto del que hablan. «Acerca de» es idiomático y claro en español; «cerdos» es la equivalencia moderna más natural para χοίροι. «Puercos» sería comprensible, pero menos neutral para un registro bíblico amplio.
theological_decisions:
- issue: Cómo rendir δαιμονιζομένῳ sin suavizar la realidad de la posesión/dominación demoníaca
  english_pob_reading: the demon-possessed man
  chosen_spanish_reading: al endemoniado
  alternative_spanish_readings:
  - al hombre poseído por un demonio
  - al poseído por un demonio
  - al demonizado
  rationale: La narración de Marcos presenta una aflicción demoníaca real dentro de su propio marco de referencia. «Endemoniado» mantiene esa fuerza sin reducir el fenómeno a mera metáfora ni reemplazarlo por un tecnicismo ajeno al registro bíblico. Se evita «demonizado» por su posible asociación moderna con lenguaje sociológico o figurado.
  doctrine_reference: Affirmations; Translation philosophy 6
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés y no requiere revisión textual adicional; la formulación española sigue la misma decisión de no perder la referencia personal del participio ni la función explicativa de πῶς ἐγένετο.
  spanish_consistency_notes:
  - Se mantiene «cerdos» para χοίρων, en línea con el inglés POB «pigs» y con el registro moderno.
  - Se evita «SEÑOR» o terminología no pertinente; el versículo no contiene κύριος ni términos cristológicos.
  - La nota sobre el endemoniado preserva la alternativa lexical documentada sin convertirla en glosa excesiva dentro del texto principal.
