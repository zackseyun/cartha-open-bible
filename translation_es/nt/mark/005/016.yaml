translation:
  language: es
  text: Y los que lo habían visto les contaron qué le había sucedido al endemoniado[a] y acerca de los cerdos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al hombre poseído por un demonio» o «al demoníaco».'
