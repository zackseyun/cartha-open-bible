- from: Y los que los cuidaban huyeron y lo anunciaron en la ciudad y en el campo[a], y fueron a ver qué había sucedido.
  to: Y los que los cuidaban huyeron y lo informaron en la ciudad y en el campo[a], y vinieron a ver qué había sucedido.
  rationale: Se corrige 'fueron' por 'vinieron' para reflejar con fidelidad ἦλθον, y se ajusta 'lo anunciaron' a 'lo informaron' para alinearse mejor con el valor narrativo de ἀπήγγειλαν. Se conserva el resto, incluida la nota sobre 'en los campos', porque el texto sigue siendo claro y fiel al contraste ciudad/zona rural.
  reviewer_model: gpt-5.4
