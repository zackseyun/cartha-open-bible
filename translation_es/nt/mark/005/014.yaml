translation:
  language: es
  text: Y los que los cuidaban huyeron y lo informaron en la ciudad y en el campo[a], y vinieron a ver qué había sucedido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en los campos'. El griego puede traducirse de forma más literal así, pero aquí probablemente se refiere a las zonas rurales alrededor de la ciudad.
    reason: lexical_alternative
lexical_decisions:
- source_word: βόσκοντες
  english_pob_choice: were tending
  chosen_spanish: los cuidaban
  alternatives_spanish:
  - los apacentaban
  - los pastoreaban
  - los atendían
  lexicon: BDAG
  rationale: El participio describe a quienes estaban a cargo de los animales. En español, 'cuidaban' comunica la actividad de atenderlos sin forzar una imagen exclusiva de pastoreo o alimentación.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los mismos
  - a los puercos
  - a ellos
  lexicon: BDAG
  rationale: El pronombre retoma a los cerdos del contexto inmediato. 'Los' preserva la referencia pronominal sin añadir explícitamente el referente dentro del versículo.
- source_word: ἔφυγον
  english_pob_choice: fled
  chosen_spanish: huyeron
  alternatives_spanish:
  - escaparon
  - salieron corriendo
  lexicon: BDAG
  rationale: '''Huyeron'' reproduce bien la salida repentina y narrativa del aoristo, con fuerza natural en español.'
- source_word: ἀπήγγειλαν
  english_pob_choice: reported it
  chosen_spanish: lo anunciaron
  alternatives_spanish:
  - lo reportaron
  - lo contaron
  - lo divulgaron
  lexicon: BDAG
  rationale: '''Anunciar'' recoge la idea de comunicar la noticia en un sentido público. En este contexto de difusión entre varios lugares, suena más natural que un calco técnico como ''reportaron''.'
- source_word: εἰς τὴν πόλιν
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - a la ciudad
  - hacia la ciudad
  lexicon: BDAG
  rationale: Aunque εἰς normalmente expresa movimiento hacia/into, el contexto del anuncio favorece el lugar donde se difundió la noticia. 'En la ciudad' sigue la equivalencia óptima del POB inglés.
- source_word: εἰς τοὺς ἀγρούς
  english_pob_choice: in the countryside
  chosen_spanish: en el campo[a]
  alternatives_spanish:
  - en los campos
  - en la zona rural
  - en el campo y sus alrededores
  lexicon: BDAG
  rationale: ἀγροί puede significar 'campos', pero aquí contrasta con 'la ciudad' y apunta al ámbito rural circundante. 'En el campo' comunica ese sentido de manera natural; la nota conserva la alternativa más literal.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El verbo expresa movimiento para acercarse y ver. 'Fueron' mantiene el sujeto implícito del griego sin añadir 'la gente' ni otro sujeto explícito.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: a ver
  alternatives_spanish:
  - para ver
  - para mirar
  lexicon: BDAG
  rationale: La construcción de propósito se expresa con naturalidad en español mediante 'a ver' después de un verbo de movimiento.
- source_word: τί ἐστιν τὸ γεγονός
  english_pob_choice: what had happened
  chosen_spanish: qué había sucedido
  alternatives_spanish:
  - qué era lo ocurrido
  - qué había pasado
  lexicon: BDAG
  rationale: La frase pregunta por el evento ocurrido. 'Había sucedido' reproduce el valor retrospectivo del perfecto griego en un español claro y sobrio.
translation_notes:
  revision_awareness: 'Seguí la revisión final del POB inglés al unir en una sola cláusula el cierre narrativo: quienes cuidaban huyeron, anunciaron la noticia y fueron a ver qué había sucedido. También evité introducir un sujeto explícito como ''la gente'', manteniendo el sujeto implícito del griego.'
  spanish_consistency_notes:
  - Conservé un registro sobrio y narrativo, adecuado para una traducción de lectura pública.
  - Usé 'Y' inicial para reflejar la continuidad narrativa del griego.
  - Mantuve 'ciudad' y 'campo' para respetar el contraste espacial del texto, con nota para la lectura más literal de 'campos'.
