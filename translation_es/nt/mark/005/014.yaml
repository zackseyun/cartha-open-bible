review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: los que cuidaban a los cerdos huyeron, comunicaron la noticia en la ciudad y en la zona rural, y luego otros vinieron para ver lo ocurrido. Sin embargo, ''fueron a ver'' no refleja bien ἦλθον (''vinieron/llegaron''), y ''lo anunciaron'' se inclina un poco hacia proclamación más que hacia ''informaron/dieron aviso'' de ἀπήγγειλαν.'
  spanish_quality_summary: El español es claro y natural, pero 'fueron a ver' suena desde la perspectiva opuesta al relato y debilita la alineación con el original. 'En el campo' es aceptable, aunque 'en el campo' puede sonar algo singular/abstracto; la nota resuelve bien la alternativa literal. Una leve mejora en el verbo de comunicación da un tono más narrativo y menos público-formal.
  glossary_alignment: No hay términos teológicos de proyecto en juego. Las decisiones léxicas son en general adecuadas. Conviene ajustar βόσκοντες de 'los cuidaban' a una formulación más idiomática con relativo ('los que los cuidaban'), conservar 'en la ciudad', mantener 'en el campo[a]' con nota, cambiar ἀπήγγειλαν a 'lo informaron' o 'dieron aviso', y corregir ἦλθον a 'vinieron'.
  issues:
  - severity: high
    issue: '''fueron a ver'' no traduce fielmente ἦλθον'
    rationale: El griego dice 'vinieron/llegaron para ver', no 'fueron a ver'. En español cambia la orientación del movimiento y se aparta del flujo narrativo del original.
  - severity: medium
    issue: '''lo anunciaron'' sobretraduce ligeramente ἀπήγγειλαν'
    rationale: En contexto narrativo, ἀπαγγέλλω aquí es más bien 'informar/dar aviso/contar'. 'Anunciar' puede sugerir proclamación pública más marcada que el simple reporte de lo sucedido.
  revised_spanish_text: Y los que los cuidaban huyeron y lo informaron en la ciudad y en el campo[a], y vinieron a ver qué había sucedido.
  revised_footnotes:
  - marker: a
    text: O 'en los campos'. El griego puede traducirse de forma más literal así, pero aquí probablemente se refiere a las zonas rurales alrededor de la ciudad.
    reason: lexical_alternative
