translation:
  language: es
  text: 'Y le rogaban[a], diciendo: «Mándanos a los cerdos, para que entremos en ellos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los cerdos».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρεκάλεσαν
  english_pob_choice: begged
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le suplicaban
  - le imploraban
  - le pedían con insistencia
  lexicon: BDAG
  rationale: παρακαλέω aquí expresa una petición urgente e insistente. En español, «rogaban» conserva esa fuerza sin sonar tan coloquial como «le pedían» ni tan intensivo como «imploraban».
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - lo
  lexicon: Pronombre de objeto indirecto/dativo de cortesía narrativa
  rationale: 'En español, el verbo «rogar» se construye naturalmente con objeto indirecto: «le rogaban». El referente es Jesús, ya claro por el contexto.'
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  - mientras decían
  lexicon: BDAG
  rationale: El participio introduce el contenido de la súplica. «Diciendo» reproduce de manera directa y natural la relación participial sin añadir información.
- source_word: Πέμψον
  english_pob_choice: Send
  chosen_spanish: Mándanos
  alternatives_spanish:
  - Envíanos
  - Despáchanos
  - Permítenos ir
  lexicon: BDAG
  rationale: Aunque el sentido básico de πέμπω es «enviar», en español «mándanos» comunica mejor la idea de orden/permiso implícita en el contexto narrativo, sin perder el valor del mandato dirigido a Jesús. «Envíanos» sería más literal, pero menos natural en esta escena.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: Pronombre de objeto directo
  rationale: Pronombre objeto directo natural en español con «mandar/enviar».
- source_word: εἰς τοὺς χοίρους
  english_pob_choice: into the pigs
  chosen_spanish: a los cerdos
  alternatives_spanish:
  - entre los cerdos
  - en los cerdos
  - a los puercos
  lexicon: BDAG
  rationale: χοῖρος puede renderizarse como «cerdos» o «puercos». «Cerdos» es el término más neutral y comprensible en español moderno. Se evita «pigs» o una transliteración, y «a» funciona de forma idiomática con el movimiento implícito hacia ellos.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la equivalencia más natural y clara en español.
- source_word: εἰς αὐτοὺς εἰσέλθωμεν
  english_pob_choice: we may enter them
  chosen_spanish: entremos en ellos
  alternatives_spanish:
  - entremos dentro de ellos
  - podamos entrar en ellos
  - nos metamos en ellos
  lexicon: BDAG
  rationale: εἰσέρχομαι significa «entrar / ir dentro». «Entremos en ellos» mantiene la imagen de entrada sin sobreexplicar ni suavizar la formulación demoníaca del texto.
theological_decisions:
- issue: Relación de los espíritus con la autoridad de Jesús
  english_pob_reading: They begged him and asked to be sent, reflecting submission to Jesus' authority without adding doctrinal claims.
  chosen_spanish_reading: Le rogaban y le piden ser enviados a los cerdos, reflejando que están sujetos a la autoridad de Jesús sin añadir interpretación extratextual.
  alternative_spanish_readings:
  - Le suplicaban, enfatizando más la intensidad emocional.
  - Le pedían, una formulación más neutral pero menos fuerte.
  rationale: La escena presenta una súplica urgente a Jesús. «Le rogaban» conserva la intensidad del verbo griego y el marco narrativo de autoridad, sin convertir la petición en una afirmación doctrinal adicional.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: El contexto auditado en inglés no muestra revisiones aplicadas; el texto se mantiene en alta concordancia con la decisión léxica establecida, preservando la intensidad de παρακαλέω y la imagen concreta de χοίρους/cerdos.
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo sobrio y directo.
  - «Cerdos» se usa como equivalente moderno y claro de χοίρους; no se empleó «puercos» por tono regional.
  - «Le rogaban» conserva la fuerza de la súplica sin caer en un calco rígido.
  - La cláusula final reproduce la finalidad con «para que» y el movimiento de entrada con «entremos en ellos».
