review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: los demonios ruegan a Jesús, le piden ser enviados a los cerdos, y expresan el propósito de entrar en ellos. Sin embargo, la nota al pie no preserva correctamente la alternativa léxica del inglés POB, porque repite «a los cerdos» en vez de ofrecer el equivalente alternativo de «swine».'
  spanish_quality_summary: El español es natural y legible. «Le rogaban» y «diciendo» funcionan bien, y «Mándanos» transmite adecuadamente la petición imperativa. «Entremos en ellos» también es claro. La única reparación necesaria es la nota al pie, que actualmente no aporta una alternativa real.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Cerdos» es una buena opción principal para χοίρους; la alternativa apropiada en nota sería «puercos» o «ganado porcino», pero «puercos» es la más breve y léxicamente paralela a «swine».
  issues:
  - severity: medium
    issue: La nota al pie léxica es incorrecta y redundante.
    rationale: El texto principal ya dice «a los cerdos», pero la nota dice «O «a los cerdos»». Esto no preserva la alternativa documentada en el audit trail inglés («into the swine»). La nota debe ofrecer una opción distinta y válida en español.
  revised_spanish_text: 'Y le rogaban[a], diciendo: «Mándanos a los cerdos, para que entremos en ellos».'
  revised_footnotes:
  - marker: a
    text: O «a los puercos».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel al sentido griego y natural en español. Solo se corrige la nota al pie para que preserve una alternativa léxica real para χοίρους, en línea con el audit trail inglés.
