translation:
  language: es
  text: 'Porque le decía: «Sal del hombre, espíritu inmundo».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: le decía
  alternatives_spanish:
  - decía
  - estaba diciéndole
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción en curso o repetida en el pasado; en español, «le decía» transmite ese valor narrativo de fondo de manera natural y sin forzar una perífrasis pesada.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o trasfondo respecto del contexto previo; «Porque» conserva bien esa relación explicativa en español.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El dativo se refiere al hombre en el marco narrativo inmediato. El clítico «le» reproduce con naturalidad la dirección del habla sin recargar la frase.
- source_word: Ἔξελθε
  english_pob_choice: Come out
  chosen_spanish: Sal
  alternatives_spanish:
  - Sal fuera
  - Vete
  lexicon: BDAG
  rationale: El imperativo aoristo funciona como orden directa de expulsión. «Sal» es idiomático en español para este contexto y evita un calco menos natural.
- source_word: τὸ πνεῦμα τὸ ἀκάθαρτον
  english_pob_choice: unclean spirit
  chosen_spanish: espíritu inmundo
  alternatives_spanish:
  - espíritu impuro
  - espíritu inmundo, tú
  lexicon: BDAG
  rationale: El griego usa el sintagma articular τὸ πνεῦμα τὸ ἀκάθαρτον. En español, «espíritu inmundo» preserva el término técnico del evangelio y el matiz ritual/moral de ἀκάθαρτος sin sustituirlo por «espíritu malo».
- source_word: ἐκ τοῦ ἀνθρώπου
  english_pob_choice: out of the man
  chosen_spanish: del hombre
  alternatives_spanish:
  - fuera del hombre
  - de este hombre
  lexicon: BDAG
  rationale: ἐκ expresa salida desde dentro; «del hombre» es una forma natural y fiel que conserva el punto de origen implícito en el mandato.
theological_decisions:
- issue: Naturaleza de πνεῦμα ἀκάθαρτον en un exorcismo
  english_pob_reading: unclean spirit
  chosen_spanish_reading: espíritu inmundo
  alternative_spanish_readings:
  - espíritu malo
  rationale: La formulación griega es literal y tradicional en los evangelios. Mantener «espíritu inmundo» conserva la carga de impureza ritual y moral del texto, sin interpretarlo como «malo».
  doctrine_reference: Primacía del texto original; preservación del sentido léxico y del lenguaje evangélico de impureza.
- issue: Posible valor vocativo del sintagma nominal tras el imperativo
  english_pob_reading: direct address without 'you'
  chosen_spanish_reading: dirección implícita sin pronombre expreso
  alternative_spanish_readings:
  - espíritu inmundo, sal del hombre
  - tú, espíritu inmundo, sal del hombre
  rationale: El griego puede leerse como dirección directa al espíritu aunque formalmente el sintagma sea nominativo. En español, no hace falta añadir un pronombre vocativo; la orden ya queda clara en el verbo imperativo y en el contexto.
  doctrine_reference: Decisión sintáctica y discursiva; respeto a la función de habla directa del texto griego.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota al pie no anclada en el texto. La traducción mantiene el sentido del griego y del audit trail inglés sin introducir marcadores no presentes en el español.
  spanish_consistency_notes:
  - Se preservó «espíritu inmundo» como término técnico y no se sustituyó por «espíritu malo».
  - Se tradujo γάρ con una conexión explicativa («Porque») acorde al contexto narrativo.
  - Se evitó añadir un vocativo explícito o pronombre innecesario para no cargar el mandato más allá del griego.
  - Se mantuvo un registro digno y bíblico, pero con sintaxis natural en español.
