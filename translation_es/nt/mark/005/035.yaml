translation:
  language: es
  text: 'Mientras todavía estaba hablando[a], llegaron unos mensajeros de la casa del líder de la sinagoga[b] y dijeron: «Tu hija ha muerto. ¿Por qué sigues molestando al Maestro?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras aún hablaba».
    reason: lexical_alternative
  - marker: b
    text: O «del líder de la sinagoga».
    reason: previous_rendering
lexical_decisions:
- source_word: Ἔτι αὐτοῦ λαλοῦντος
  english_pob_choice: While he was still speaking
  chosen_spanish: Mientras todavía estaba hablando
  alternatives_spanish:
  - Mientras seguía hablando
  - Cuando todavía estaba hablando
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa simultaneidad; en español, «Mientras todavía estaba hablando» conserva el valor temporal de ἔτι y suena natural y digno.
- source_word: ἔρχονται
  english_pob_choice: came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - venían
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el pasado simple es la opción natural en español narrativo y preserva la secuencia de los hechos.
- source_word: ἀπὸ τοῦ ἀρχισυναγώγου
  english_pob_choice: from the synagogue leader
  chosen_spanish: de la casa del líder de la sinagoga
  alternatives_spanish:
  - del líder de la sinagoga
  - de la casa del jefe de la sinagoga
  lexicon: BDAG
  rationale: 'El contexto narrativo exige el sentido idiomático señalado en el expediente: no proceden de la persona presente con Jesús, sino de su casa o entorno. «Líder de la sinagoga» traduce ἀρχισυνάγωγος de manera clara y contemporánea; «casa» resuelve la implicación contextual sin perder el vínculo con el original.'
- source_word: λέγοντες ὅτι
  english_pob_choice: saying, “
  chosen_spanish: 'diciendo: «'
  alternatives_spanish:
  - 'y diciendo: «'
  - 'al decir: «'
  lexicon: BDAG
  rationale: La frase introduce discurso directo; «diciendo» mantiene la relación sintáctica y el estilo narrativo sin sobrecargar la oración.
- source_word: Ἡ θυγάτηρ σου
  english_pob_choice: Your daughter
  chosen_spanish: Tu hija
  alternatives_spanish:
  - Su hija
  - La hija tuya
  lexicon: BDAG
  rationale: El posesivo directo en español es suficiente y natural. No se requiere explicitar más que el texto griego.
- source_word: ἀπέθανεν
  english_pob_choice: has died
  chosen_spanish: ha muerto
  alternatives_spanish:
  - murió
  - está muerta
  lexicon: BDAG
  rationale: El perfecto español comunica el evento completado con relevancia inmediata, igual que el valor aspectual que el POB inglés intenta preservar.
- source_word: τί ἔτι σκύλλεις
  english_pob_choice: Why do you still trouble
  chosen_spanish: ¿Por qué sigues molestando
  alternatives_spanish:
  - ¿Por qué sigues perturbando
  - ¿Por qué sigues inquietando
  lexicon: BDAG
  rationale: σκύλλω aquí significa molestar/trastornar con una carga insistente. «Molestando» conserva el tono de súplica o reproche sin exagerar hacia «acosando» o «hostigando».
- source_word: τὸν διδάσκαλον
  english_pob_choice: the Teacher
  chosen_spanish: al Maestro
  alternatives_spanish:
  - al Maestro/Instructor
  - al Teacher
  lexicon: BDAG
  rationale: Aunque el sentido léxico básico es «maestro/teacher», en español «Maestro» funciona como título reverente y natural en boca de los hablantes. Se evita «doctor» o «rabí» porque no están sustentados por el texto base.
theological_decisions:
- issue: Referencia de «el Maestro»
  english_pob_reading: Render διδάσκαλον as 'the Teacher,' referring to Jesus without expanding the title.
  chosen_spanish_reading: Conservar un título, no el nombre propio, y entenderlo como referencia a Jesús sin explicitación adicional.
  alternative_spanish_readings:
  - al Maestro = Jesús
  - al maestro
  rationale: El griego presenta un título funcional en la voz de los mensajeros. En español, «al Maestro» preserva la misma distancia reverente y evita resolver demasiado pronto la referencia con el nombre de Jesús.
  doctrine_reference: Preservar la perspectiva del hablante y no añadir una identificación explícita que el texto no formula.
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión posterior que añadió «house» para resolver la ambigüedad de ἀπὸ τοῦ ἀρχισυναγώγου. La versión española incorpora ese ajuste contextual de manera explícita, manteniendo la lectura auditada más reciente y la solución lógica del pasaje.
  spanish_consistency_notes:
  - Se usa «líder de la sinagoga» para ἀρχισυνάγωγος, consistente con el valor léxico documentado.
  - Se conserva «Maestro» como título y no se sustituye por un nombre propio.
  - Se mantiene el perfecto compuesto «ha muerto» para reflejar el evento recién reportado con relevancia inmediata.
  - La traducción evita «SEÑOR» y otras formas de máscara no presentes en el versículo.
