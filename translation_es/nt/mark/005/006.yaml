translation:
  language: es
  text: Y al ver a Jesús desde lejos, corrió y se postró ante él[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo adoró' o 'le rindió homenaje'. El verbo griego puede denotar adoración o un acto de postración u obeisancia, según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Luego
  lexicon: BDAG
  rationale: Conserva la coordinación narrativa simple del griego y el estilo paratáctico de Marcos.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al verlo
  alternatives_spanish:
  - viendo
  - cuando lo vio
  lexicon: BDAG
  rationale: El participio aoristo se expresa de forma natural en español como una circunstancia temporal breve; 'al verlo' mantiene el orden narrativo sin sobreexplicar.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: de lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: BDAG
  rationale: '''De lejos'' es idiomático y claro en español, conservando la idea espacial de distancia sin elevar el tono más de lo que exige el contexto.'
- source_word: ἔδραμεν
  english_pob_choice: he ran
  chosen_spanish: corrió
  alternatives_spanish:
  - se apresuró
  - echó a correr
  lexicon: BDAG
  rationale: El aoristo de τρέχω se vierte con el verbo directo 'correr', que preserva la acción simple y puntual del relato.
- source_word: προσεκύνησεν αὐτόν
  english_pob_choice: bowed down before him
  chosen_spanish: se postró ante él
  alternatives_spanish:
  - lo adoró
  - le rindió homenaje
  - se inclinó ante él
  lexicon: BDAG
  rationale: προσκυνέω puede expresar adoración, homenaje o postración según el contexto. 'Se postró ante él' conserva el gesto físico sin resolver prematuramente si aquí se trata de adoración plena o de homenaje/obeisancia.
- source_word: τὸν Ἰησοῦν / αὐτόν
  english_pob_choice: Jesus / him
  chosen_spanish: lo / él
  alternatives_spanish:
  - a Jesús / a él
  lexicon: BDAG
  rationale: En español, el nombre propio se integra de manera natural en la primera mención y luego se retoma con pronombre objeto y complemento preposicional conforme al uso idiomático.
theological_decisions:
- issue: Cómo renderizar προσκυνέω sin perder su tensión entre adoración y postración
  english_pob_reading: Rendered as 'bowed down before him' in the main text; footnote preserves worship/homage alternatives
  chosen_spanish_reading: se postró ante él
  alternative_spanish_readings:
  - lo adoró
  - le rindió homenaje
  - se inclinó ante él
  rationale: 'La escena admite más de una lectura: el gesto corporal es claro, pero su alcance religioso no queda resuelto solo por el verbo. Mantener ''se postró'' preserva esa tensión y deja abierta la interpretación que el contexto más amplio pueda exigir.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente y con el último pase de revisión: no se requieren cambios de sentido ni ajustes textuales adicionales.'
  spanish_consistency_notes:
  - Se emplea ‘Jesús’ como nombre propio sin artículo, conforme al uso normal del español.
  - Se conserva la tensión de προσκυνέω con ‘se postró’ en el texto principal y una nota con alternativas lexicales.
  - El tono es moderno y digno, sin depender de fórmulas tradicionales de máscara como ‘SEÑOR’.
