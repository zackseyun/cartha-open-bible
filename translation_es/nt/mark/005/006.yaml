review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia griega: καὶ ἰδὼν = ''al verlo'', ἀπὸ μακρόθεν = ''de lejos'', ἔδραμεν = ''corrió'', y προσεκύνησεν αὐτόν = ''se postró ante él''. Sin embargo, omite explícitamente el referente τὸν Ἰησοῦν en el texto principal; en el griego el objeto es ''a Jesús'', no un pronombre implícito sin antecedente en el mismo versículo.'
  spanish_quality_summary: 'El español es natural y claro, pero ''Y al verlo de lejos'' suena ligeramente menos preciso que una formulación que nombre a Jesús y mantenga la distancia respecto de él: ''Y al ver a Jesús desde lejos''. Esto mejora la legibilidad autónoma del versículo y evita una referencia pronominal sin antecedente inmediato.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. 'Jesús' está bien; 'se postró ante él' respeta la decisión auditada para προσκυνέω y la nota conserva las alternativas 'lo adoró' / 'le rindió homenaje'.
  issues:
  - severity: medium
    issue: Falta 'Jesús' en el texto principal.
    rationale: El source text dice τὸν Ἰησοῦν. El español 'al verlo' presupone un antecedente fuera del versículo, mientras que la traducción auditada mantiene 'Jesus'. Conviene explicitarlo para fidelidad y claridad.
  - severity: low
    issue: '''de lejos'' puede interpretarse como modificando la manera de verlo más que la ubicación relativa.'
    rationale: Aunque idiomático, 'desde lejos' o 'a la distancia' vincula con más claridad ἀπὸ μακρόθεν a la separación espacial respecto de Jesús.
