review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: después de oír acerca de Jesús, la mujer se acerca por detrás entre la multitud y toca su prenda. Sin embargo, hay un problema en la nota al pie: el texto principal ya dice "su manto", pero la nota ofrece como alternativa "su manto", lo cual no preserva correctamente el expediente inglés ni aporta una alternativa real. Además, en español suena más natural y fiel al conjunto ἐν τῷ ὄχλῳ ὄπισθεν expresarlo como "por detrás, entre la multitud" o "entre la multitud, por detrás" que "en la multitud por detrás".'
  spanish_quality_summary: El español es claro y digno, pero "se acercó en la multitud por detrás" resulta algo trabado. Una leve reordenación mejora la fluidez sin perder precisión. También conviene corregir la nota léxica para que las alternativas sean reales y coherentes con ἱμάτιον.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: "Jesús" está bien; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección "manto" puede mantenerse como principal si la nota conserva las alternativas amplias "capa" o "ropa/vestidura" conforme al expediente inglés.'
  issues:
  - severity: medium
    issue: La nota al pie repite la lectura principal en vez de ofrecer una alternativa real.
    rationale: El texto principal usa "su manto", pero la nota dice "O 'su manto' o 'su ropa'". Esto no reproduce fielmente la nota inglesa, que da alternativas a "garment" como 'cloak' o 'clothing'. La nota española debe ofrecer alternativas distintas, p. ej. "su capa" o "su ropa"/"su vestidura".
  - severity: low
    issue: La frase "se acercó en la multitud por detrás" suena poco natural en español.
    rationale: Aunque entendible, la combinación de complementos queda rígida. El griego permite una expresión más fluida en español como "se acercó por detrás, entre la multitud" o "vino por detrás entre la multitud".
  revised_spanish_text: Habiendo oído acerca de Jesús, se acercó por detrás, entre la multitud, y tocó su manto[a].
  revised_footnotes:
