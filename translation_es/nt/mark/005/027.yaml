translation:
  language: es
  text: Habiendo oído acerca de Jesús, se acercó por detrás, entre la multitud, y tocó su manto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "su capa" o "su ropa". El griego ἱμάτιον se refiere de manera amplia a una prenda, a menudo una vestidura exterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσασα
  english_pob_choice: having heard
  chosen_spanish: Habiendo oído
  alternatives_spanish:
  - Después de oír
  - Al oír
  lexicon: BDAG
  rationale: El participio aoristo femenino singular expresa una acción previa a la del verbo principal; "Habiendo oído" conserva esa secuencia temporal sin convertirla en una paráfrasis amplia.
- source_word: περὶ τοῦ Ἰησοῦ
  english_pob_choice: about Jesus
  chosen_spanish: acerca de Jesús
  alternatives_spanish:
  - sobre Jesús
  - con respecto a Jesús
  lexicon: BDAG
  rationale: περί con genitivo comunica el contenido de lo oído; "acerca de" es natural en español y mantiene el matiz informativo sin añadir intención interpretativa.
- source_word: ἐλθοῦσα
  english_pob_choice: she came up
  chosen_spanish: se acercó
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: El participio aoristo de ἔρχομαι introduce el movimiento hacia Jesús; en español, "se acercó" expresa mejor el avance narrativo que un calco más rígido.
- source_word: ἐν τῷ ὄχλῳ
  english_pob_choice: in the crowd
  chosen_spanish: en la multitud
  alternatives_spanish:
  - entre la multitud
  - dentro de la multitud
  lexicon: BDAG
  rationale: ὄχλος puede ser "multitud" o "muchedumbre"; "multitud" suena más natural y bíblicamente claro en español, manteniendo el sentido locativo de ἐν.
- source_word: ὄπισθεν
  english_pob_choice: behind him
  chosen_spanish: por detrás
  alternatives_spanish:
  - detrás de él
  - desde atrás
  lexicon: BDAG
  rationale: La idea espacial es posterior/rearward. En español, junto con el contexto, "por detrás" comunica bien la aproximación sin sobrecargar el sintagma.
- source_word: ἥψατο
  english_pob_choice: touched
  chosen_spanish: tocó
  alternatives_spanish:
  - rozó
  - agarró
  lexicon: BDAG
  rationale: El aoristo medio de ἅπτω aquí significa tocar; "tocó" reproduce el acto sin añadir fuerza o duración que el texto no exige.
- source_word: τοῦ ἱματίου αὐτοῦ
  english_pob_choice: his garment
  chosen_spanish: su manto
  alternatives_spanish:
  - su vestido
  - su ropa
  lexicon: BDAG
  rationale: ἱμάτιον designa un vestido externo o manto/cloak; "manto" es una equivalencia española digna y más concreta que el genérico "ropa", sin cerrarse a una prenda moderna.
theological_decisions:
- issue: El sentido de ἱμάτιον en un relato de sanidad puede oscilar entre prenda general y vestidura exterior.
  english_pob_reading: Or 'his cloak' or 'his clothing.' The Greek ἱμάτιον refers broadly to a garment, often an outer garment.
  chosen_spanish_reading: '"manto" como traducción principal, con la amplitud semántica reconocida implícitamente por el término griego.'
  alternative_spanish_readings:
  - su vestidura
  - su ropa
  rationale: No se documenta una tensión doctrinal; la decisión es lexical. "Manto" conserva la idea de prenda exterior sugerida por ἱμάτιον, mientras que las alternativas amplían demasiado o son menos precisas en español.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El control de revisión indica que no hubo cambios necesarios respecto al estado auditado más reciente; se mantiene la equivalencia óptima y la lectura léxica de ἱμάτιον como prenda amplia, con ajuste natural al español.
  spanish_consistency_notes:
  - Se conserva Jesús como nombre propio establecido por la pauta del proyecto.
  - Se usa "manto" en el texto principal para reflejar la amplitud de ἱμάτιον, coherente con la nota léxica.
  - La secuencia participial griega se mantiene en español con gerundio inicial y verbo principal en pretérito, sin añadir elementos no presentes en el original.
