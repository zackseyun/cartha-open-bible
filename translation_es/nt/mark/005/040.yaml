translation:
  language: es
  text: Y se estaban burlando de él[a]. Pero él, después de echarlos a todos fuera, toma al padre de la criatura, a la madre y a los que estaban con él[b], y entra donde estaba la criatura.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘se reían de él’. El verbo griego puede denotar risa burlona o mofa despectiva.
    reason: lexical_alternative
  - marker: b
    text: Es decir, los discípulos que iban con él.
    reason: cross_reference
lexical_decisions:
- source_word: κατεγέλων
  english_pob_choice: were laughing at
  chosen_spanish: se estaban burlando de
  alternatives_spanish:
  - se reían de
  - se burlaban de
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción continua o repetida; en español, 'se estaban burlando de' conserva ese valor durativo y el matiz despectivo. 'Se reían de' es posible, pero puede sonar menos claramente hostil; 'se burlaban de' también es válido, pero la perífrasis ayuda a reflejar la continuidad del relato.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: de él
  alternatives_spanish:
  - de sí mismo
  lexicon: BDAG
  rationale: 'Con καταγελάω, el complemento es idiomático: ''burlarse de él''. ''De sí mismo'' no corresponde al sentido aquí.'
- source_word: ἐκβαλὼν πάντας
  english_pob_choice: after putting them all outside
  chosen_spanish: después de echarlos a todos fuera
  alternatives_spanish:
  - habiéndolos echado a todos fuera
  - después de sacarlos a todos
  lexicon: BDAG
  rationale: El participio antecede a los verbos principales y expresa acción previa. 'Echarlos a todos fuera' conserva la fuerza del griego sin sugerir exorcismo. 'Sacarlos' suaviza demasiado el verbo; la perífrasis temporal mantiene la relación sintáctica.
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - lleva consigo
  - toma consigo
  lexicon: BDAG
  rationale: El presente histórico de Marcos puede mantenerse con un presente narrativo en español. 'Toma' es natural y breve; el contexto ya aclara que los lleva consigo como testigos.
- source_word: παιδίου / παιδίον
  english_pob_choice: child
  chosen_spanish: la niña
  alternatives_spanish:
  - el niño
  - el pequeño
  - la criatura
  lexicon: BDAG
  rationale: Aunque el sustantivo griego es neutro y por sí solo significa 'niño/niña, niño pequeño, child', el contexto inmediato de Marcos identifica a la hija de Jairo. En español, 'la niña' evita ambigüedad y corresponde al referente narrativo ya establecido. No se traduce mecánicamente como 'el niño' porque eso chocaría con el contexto.
- source_word: τοὺς μετ’ αὐτοῦ
  english_pob_choice: those with him
  chosen_spanish: a los que estaban con él
  alternatives_spanish:
  - a los que iban con él
  - a sus acompañantes
  lexicon: BDAG
  rationale: La expresión griega es transparente y no nombra explícitamente a los discípulos en esta cláusula. 'Los que estaban con él' preserva la referencia sin sobreespecificar. Se evita 'acompañantes' por sonar más interpretativo.
- source_word: εἰσπορεύεται
  english_pob_choice: goes in
  chosen_spanish: entra
  alternatives_spanish:
  - va adentro
  - penetra
  lexicon: BDAG
  rationale: El presente histórico se expresa de manera natural con 'entra'. Es más idiomático que 'va adentro' y más exacto que un término solemne como 'penetra'.
- source_word: ὅπου ἦν τὸ παιδίον
  english_pob_choice: where the child was
  chosen_spanish: donde estaba la niña
  alternatives_spanish:
  - donde estaba el niño
  - donde se hallaba la niña
  lexicon: BDAG
  rationale: El griego dice simplemente 'donde estaba el niño/niña'. Dado el contexto narrativo, 'la niña' es la referencia correcta y más clara para el lector español. 'Se hallaba' es posible, pero añade matiz estilístico innecesario.
theological_decisions:
- issue: Identificación del referente de παιδίον en el contexto narrativo
  english_pob_reading: child
  chosen_spanish_reading: la niña
  alternative_spanish_readings:
  - el niño
  - el pequeño
  rationale: Aunque el término griego es genérico, el pasaje de Marcos 5 trata de la hija de Jairo. Traducir con 'la niña' mantiene fidelidad contextual y evita una ambigüedad que el lector español no necesita cargar.
  doctrine_reference: Contextual referent within Mark 5; translation accuracy
- issue: Conservar la tensión entre burla y risa despectiva
  english_pob_reading: were laughing at him; Or 'mocked him.' The Greek verb can denote derisive laughter.
  chosen_spanish_reading: se estaban burlando de él
  alternative_spanish_readings:
  - se reían de él
  - lo ridiculizaban
  rationale: La forma elegida conserva tanto la idea de risa como la de desprecio, reflejando la nota inglesa que reconoce la posibilidad de burla o mofa. 'Ridiculizaban' sería correcto, pero menos directo y menos cercano al matiz verbal del griego.
  doctrine_reference: Lexical transparency / narrative force
translation_notes:
  revision_awareness: Se revisó el orden narrativo para conservar el valor temporal del participio aoristo y el presente histórico del griego. También se atendió la decisión auditada del inglés de mantener la tensión léxica entre risa y burla, pero expresándola en un español natural y sin perder el matiz despectivo. No se introdujeron ampliaciones no sustentadas por el texto, salvo la identificación contextual de 'la niña', ya apoyada por el pasaje inmediato.
  spanish_consistency_notes:
  - Se mantiene 'Y' inicial para corresponder al flujo narrativo del griego.
  - '''Entra'' y ''toma'' conservan el presente histórico en español, como el inglés auditado.'
  - No se usa 'SEÑOR' ni terminología eclesiástica añadida; el texto permanece estrictamente narrativo.
  - '''Echarlos fuera'' evita confundir el verbo con expulsión demoníaca en otros contextos.'
  - La nota sobre los que iban con él aclara la referencia sin sobretraducir el griego.
