lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conserva la parataxis narrativa propia de Marcos sin suavizar el encadenamiento de acciones. En español, 'Y' es natural al inicio de relato y refleja bien el valor conectivo del griego.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  lexicon: BDAG
  rationale: El griego expresa movimiento de llegada en plural. 'Llegaron' comunica con naturalidad el arribo al destino y mantiene el sujeto plural implícito del contexto previo, sin añadir especificaciones no presentes en el texto.
- source_word: εἰς τὸ πέραν τῆς θαλάσσης
  english_pob_choice: to the other side of the sea
  chosen_spanish: al otro lado del mar
  alternatives_spanish:
  - a la otra orilla del mar
  - al otro lado del lago
  lexicon: BDAG
  rationale: La expresión es idiomática de cruce hacia el lado opuesto. 'Al otro lado del mar' conserva la referencia literal de θαλάσσης y funciona de modo natural en español. Se evita 'lago' porque el griego dice 'mar'.
- source_word: τῆς θαλάσσης
  english_pob_choice: of the sea
  chosen_spanish: del mar
  alternatives_spanish:
  - del lago
  lexicon: BDAG
  rationale: Se mantiene 'mar' porque el texto griego usa θάλασσα. Aunque el referente geográfico sea el lago de Galilea, la traducción sigue el vocabulario del fuente y la auditoría inglesa.
- source_word: εἰς τὴν χώραν
  english_pob_choice: to the region
  chosen_spanish: a la región
  alternatives_spanish:
  - al territorio
  - al país
  lexicon: BDAG
  rationale: χώρα aquí indica distrito, zona o región, no 'país' en sentido moderno. 'Región' es el equivalente español más claro y preciso.
- source_word: τῶν Γερασηνῶν
  english_pob_choice: of the Gerasenes
  chosen_spanish: de los gerasenos
  alternatives_spanish:
  - de los gerasenos de Gerasa
  lexicon: BDAG
  rationale: El gentilicio plural se vierte de forma natural como 'gerasenos'. Se conserva la transliteración del nombre propio colectivo, en línea con la lectura base griega y la decisión inglesa.
theological_decisions:
- issue: Variante textual del nombre del lugar en la narrativa de los endemoniados
  english_pob_reading: Gerasenes
  chosen_spanish_reading: gerasenos
  alternative_spanish_readings:
  - gadarenos
  - gergesenos
  rationale: El texto base griego leído por la POB dice Γερασηνῶν. Como el topónimo presenta variación manuscrita antigua y relevante, se mantiene la lectura base en el texto principal y se documentan las alternativas principales en nota.
  doctrine_reference: Principio de primacía del texto fuente y preservación de variantes significativas para auditoría textual.
translation_notes:
  revision_awareness: Se siguió la lectura base SBLGNT/POB en griego y la decisión inglesa de mantener 'Gerasenes', conservando la variante textual principal en nota. No hubo revisiones previas en el paquete; el draft se alinea con el estado más reciente sin cambios.
  spanish_consistency_notes:
  - Se usa 'mar' para θαλάσσης conforme al texto griego, aunque el referente geográfico sea el lago de Galilea.
  - Se prefirió 'región' para χώρα por claridad moderna y fidelidad semántica.
  - El gentilicio plural 'gerasenos' mantiene consistencia con la transliteración del nombre de lugar.
  - La puntuación y capitalización siguen el español estándar; la nota al pie se ancla en 'mar' como en el texto inglés auditado.
