translation:
  language: es
  text: porque muchas veces había sido atado con grilletes y cadenas, y las cadenas habían sido arrancadas por él y los grilletes hechos pedazos, y nadie era lo suficientemente fuerte para subyugarlo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'domarlo'. El verbo griego puede significar 'domar' o, más ampliamente, 'subyugar, poner bajo control'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τὸ αὐτὸν
  english_pob_choice: because he had
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La construcción con διά y el infinitivo articula causa; en español, 'porque' expresa de manera natural la razón del estado descrito sin forzar una estructura demasiado literal.
- source_word: πολλάκις
  english_pob_choice: often
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - frecuentemente
  lexicon: BDAG
  rationale: '''Muchas veces'' conserva la idea de repetición frecuente y suena natural en español narrativo.'
- source_word: πέδαις
  english_pob_choice: shackles
  chosen_spanish: grilletes
  alternatives_spanish:
  - fierros
  - argollas
  lexicon: BDAG
  rationale: πέδη refiere a ataduras para los pies; 'grilletes' comunica con claridad la idea de restricción física específica y mantiene el contraste con 'cadenas'.
- source_word: ἁλύσεσι / τὰς ἁλύσεις
  english_pob_choice: chains
  chosen_spanish: cadenas
  alternatives_spanish:
  - eslabones
  - cadenas metálicas
  lexicon: BDAG
  rationale: ἅλυσις significa 'cadena'; 'cadenas' preserva el término común y distingue esta atadura de πέδαι.
- source_word: δεδέσθαι
  english_pob_choice: been bound
  chosen_spanish: había sido atado
  alternatives_spanish:
  - había estado atado
  - había quedado atado
  lexicon: BDAG
  rationale: El perfecto infinitivo expresa un estado resultante de haber sido atado repetidamente; 'había sido atado' comunica bien ese estado en español.
- source_word: διεσπάσθαι
  english_pob_choice: had been torn apart
  chosen_spanish: habían sido arrancadas
  alternatives_spanish:
  - habían sido desgarradas
  - habían sido rotas
  lexicon: BDAG
  rationale: διασπάω implica ruptura violenta; para las cadenas, 'arrancadas' transmite la fuerza del desgarro de manera idiomática y en paralelo con el contexto de liberación violenta.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por su fuerza
  - de su parte
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agente; 'por él' reproduce esa agencia sin añadir explicación causal ajena al texto.
- source_word: συντετρῖφθαι
  english_pob_choice: smashed to pieces
  chosen_spanish: hechos pedazos
  alternatives_spanish:
  - hechos añicos
  - destrozados
  lexicon: BDAG
  rationale: συντρίβω expresa fractura violenta; 'hechos pedazos' es natural y conserva la intensidad de la imagen.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: '''Nadie'' es la forma más natural en español para el indefinido negativo.'
- source_word: ἴσχυεν
  english_pob_choice: was strong enough
  chosen_spanish: era lo suficientemente fuerte
  alternatives_spanish:
  - tenía la fuerza suficiente
  - podía
  lexicon: BDAG
  rationale: ἰσχύω destaca fuerza/capacidad; 'era lo suficientemente fuerte' conserva explícitamente el matiz de fuerza que el POB inglés también preserva.
- source_word: δαμάσαι
  english_pob_choice: to subdue
  chosen_spanish: para subyugarlo
  alternatives_spanish:
  - para domarlo
  - para dominarlo
  lexicon: BDAG
  rationale: δαμάζω puede ser 'domar' o 'subyugar'; en este contexto violento, 'subyugar' evita la connotación de entrenamiento animal y mantiene el sentido de someter bajo control.
theological_decisions:
- issue: Alcance de la acción de domar/subyugar
  english_pob_reading: The Greek verb can mean 'to tame' or more broadly 'to subdue, bring under control.'
  chosen_spanish_reading: '''Subyugarlo'' mantiene el sentido amplio de someterlo bajo control y evita restringir el verbo a una imagen de domesticación animal.'
  alternative_spanish_readings:
  - '''domarlo'''
  - '''domesticarlo'''
  rationale: El contexto describe a un hombre violentamente incontrolable, no a un animal; por eso 'subyugar' comunica mejor la amplitud semántica del verbo sin perder la nota de control externo.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el razonamiento léxico del POB inglés: mantiene dos términos distintos para las ataduras (''grilletes'' y ''cadenas''), conserva la fuerza del perfecto con formas compuestas en español y refleja la nota de alternativa en δαμάζω sin reducirla a una sola imagen.'
  spanish_consistency_notes:
  - Se preserva la distinción entre πέδαις ('grilletes') y ἁλύσεσι ('cadenas').
  - Se evita 'SEÑOR' o vocabulario litúrgico no pertinente; el texto es puramente narrativo.
  - '''Subyugar'' se usa por la amplitud semántica de δαμάζω en este contexto, con nota alternativa anclada en el texto.'
  - La secuencia verbal compuesta ('había sido atado', 'habían sido arrancadas', 'hechos pedazos') reproduce el valor resultante del perfecto griego en estilo natural de español.
