translation:
  language: es
  text: Y vinieron a Jesús y vieron al endemoniado, sentado, vestido y en su sano juicio, al que había tenido[a] la legión[b]; y tuvieron miedo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que había tenido».
    reason: previous_rendering
  - marker: b
    text: O «Legión». Muchas traducciones capitalizan el término porque evoca la autodesignación anterior de los demonios como nombre.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El presente histórico griego se vierte con un pasado natural en español narrativo. «Vinieron» conserva el movimiento hacia Jesús sin sonar forzado.
- source_word: θεωροῦσιν
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron
  - observaban
  - contemplaron
  lexicon: BDAG
  rationale: También es un presente histórico. «Vieron» es la opción narrativa más directa y adecuada al registro.
- source_word: δαιμονιζόμενον
  english_pob_choice: the demon-possessed man
  chosen_spanish: al endemoniado
  alternatives_spanish:
  - al hombre endemoniado
  - al poseído por un demonio
  lexicon: BDAG
  rationale: El participio funciona sustantivamente y remite al mismo hombre ya conocido en el contexto. «Endemoniado» es breve, claro y conserva la fuerza de la aflicción demoníaca; en español suena más natural que una perífrasis pesada.
- source_word: καθήμενον
  english_pob_choice: sitting there
  chosen_spanish: sentado
  alternatives_spanish:
  - sentado allí
  - estando sentado
  lexicon: BDAG
  rationale: El participio describe su estado visible. En español, «sentado» basta y evita añadir un equivalente adverbial que el griego no exige de forma explícita.
- source_word: ἱματισμένον
  english_pob_choice: clothed
  chosen_spanish: vestido
  alternatives_spanish:
  - vestido
  - cubierto con ropa
  lexicon: BDAG
  rationale: «Vestido» comunica con naturalidad la condición restaurada del hombre. Mantiene el contraste con su estado anterior sin tecnicismo innecesario.
- source_word: σωφρονοῦντα
  english_pob_choice: in his right mind
  chosen_spanish: en su sano juicio
  alternatives_spanish:
  - en su juicio cabal
  - pensando con claridad
  lexicon: BDAG
  rationale: La expresión griega apunta a cordura y autocontrol restaurados. «En su sano juicio» es el equivalente idiomático más transparente en español moderno.
- source_word: ἐσχηκότα
  english_pob_choice: who had had
  chosen_spanish: al que había tenido
  alternatives_spanish:
  - al que había tenido
  - que había tenido
  lexicon: BDAG
  rationale: El participio perfecto identifica retrospectivamente al hombre por la condición previa de posesión. «Había tenido» conserva esa referencia pasada sin forzar la sintaxis del español.
- source_word: λεγιῶνα
  english_pob_choice: the legion
  chosen_spanish: la legión
  alternatives_spanish:
  - la legión
  - Legión
  lexicon: BDAG
  rationale: Se traduce el sustantivo común como «legión», manteniendo la alusión al grupo demoníaco nombrado antes. La mayúscula queda como alternativa si se prefiere tratarlo como designación casi propia, pero el texto principal conserva la lectura descriptiva.
- source_word: ἐφοβήθησαν
  english_pob_choice: they were afraid
  chosen_spanish: tuvieron miedo
  alternatives_spanish:
  - tuvieron miedo
  - se asustaron
  - temieron
  lexicon: BDAG
  rationale: El aoristo se expresa con una reacción simple y natural en español. «Tuvieron miedo» conserva el sentido sin intensificarlo ni volverlo demasiado técnico.
theological_decisions:
- issue: Naturaleza de la aflicción demoníaca
  english_pob_reading: the demon-possessed man
  chosen_spanish_reading: al endemoniado
  alternative_spanish_readings:
  - al hombre endemoniado
  - al poseído por un demonio
  rationale: El pasaje afirma posesión/aflicción demoníaca real. «Endemoniado» preserva esa afirmación sin rebajarla a una mera enfermedad ni introducir explicaciones ajenas al texto.
  doctrine_reference: Affirmations; Translation philosophy §1, §6
- issue: Referencia de «legión» como designación
  english_pob_reading: the legion
  chosen_spanish_reading: la legión
  alternative_spanish_readings:
  - Legión
  rationale: El texto mira hacia atrás al nombre dado por los demonios en el contexto inmediato. En español, la minúscula funciona como designación descriptiva; la mayúscula se mantiene como alternativa de lectura para reflejar la posibilidad de tratarlo casi como nombre propio.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El inglés auditado pasó por una revisión menor: se simplificó «who had had» a «who had» por naturalidad estilística, sin cambiar el sentido del participio perfecto. La presente versión española refleja ese mismo valor retrospectivo con «al que había tenido», evitando el calco pesado y manteniendo la identificación del hombre por su condición anterior. El consenso de revisión fue alto y no introdujo cambios sustantivos adicionales.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» como forma estable del nombre propio.
  - «Legión» se traduce como «legión» en el texto principal, con alternativa capitalizada en nota por la tensión designativa/nombre propio.
  - Se usa «endemoniado» para preservar la fuerza sobrenatural del participio griego, en línea con la política POB de no suavizar la posesión demoníaca.
