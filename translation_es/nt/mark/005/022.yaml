revisions:
- from: Y llegó uno de los jefes de la sinagoga[a], llamado Jairo, y al verlo[b] se postró a sus pies.
  to: Y llegó uno de los jefes de la sinagoga[a], llamado Jairo, y al verlo cayó a sus pies.
  rationale: Se cambia «se postró» por «cayó» para seguir más de cerca la acción física de πίπτει sin introducir una intensidad reverencial adicional. Se mantiene «al verlo» como español natural para el participio temporal. Se conserva la nota léxica sobre ἀρχισυνάγωγος y se elimina la nota [b] porque no añade una alternativa necesaria en español ni refleja la principal variante documentada en la auditoría inglesa.
