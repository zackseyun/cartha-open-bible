translation:
  language: es
  text: Y llegó uno de los jefes de la sinagoga[a], llamado Jairo, y al verlo cayó a sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «uno de los dirigentes de la sinagoga».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: llegó
  alternatives_spanish:
  - vino
  - se acercó
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo fluido, el pretérito simple expresa mejor la sucesión de la acción sin forzar un calco del tiempo verbal. «Llegó» conserva el sentido de arribo al encuentro.
- source_word: εἷς τῶν ἀρχισυναγώγων
  english_pob_choice: one of the synagogue rulers
  chosen_spanish: uno de los jefes de la sinagoga
  alternatives_spanish:
  - uno de los dirigentes de la sinagoga
  - uno de los gobernantes de la sinagoga
  lexicon: BDAG
  rationale: La construcción partitiva requiere «uno de». Para ἀρχισυνάγωγος, «jefes de la sinagoga» mantiene el valor de autoridad/responsabilidad local de forma clara y natural en español, sin debilitar la fuerza del término.
- source_word: ὀνόματι Ἰάϊρος
  english_pob_choice: named Jairus
  chosen_spanish: llamado Jairo
  alternatives_spanish:
  - de nombre Jairo
  - cuyo nombre era Jairo
  lexicon: BDAG
  rationale: La dativa ὀνόματι funciona como fórmula idiomática de identificación. «Llamado Jairo» es breve, natural y transparente en español.
- source_word: ἰδὼν αὐτὸν
  english_pob_choice: when he saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vio
  - viéndolo
  lexicon: BDAG
  rationale: El participio aoristo se expresa de manera natural con una construcción temporal breve. «Al verlo» comunica la anterioridad inmediata sin añadir matices interpretativos.
- source_word: πίπτει πρὸς τοὺς πόδας αὐτοῦ
  english_pob_choice: he fell at his feet
  chosen_spanish: se postró a sus pies
  alternatives_spanish:
  - cayó a sus pies
  - se echó a sus pies
  lexicon: BDAG
  rationale: El verbo y la preposición describen una caída/prosternación ante Jesús. «Se postró a sus pies» conserva la intensidad reverente y la postura física sin afirmar explícitamente «adoró», que el griego aquí no dice de forma directa.
theological_decisions:
- issue: La postura de Jairo ante Jesús
  english_pob_reading: Rendered the action as 'he fell at his feet' without expanding it to explicit worship.
  chosen_spanish_reading: Se traduce como una postración física reverente, sin convertirla en una afirmación explícita de adoración.
  alternative_spanish_readings:
  - lo adoró
  - se arrodilló ante él
  rationale: El texto griego describe un gesto corporal de humillación/súplica. En español, «se postró a sus pies» conserva esa ambigüedad significativa y evita resolver la tensión teológica entre reverencia, petición urgente y posible adoración implícita.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el gesto.
translation_notes:
  revision_awareness: La redacción española sigue la unidad sintáctica del sujeto compuesto, evitando separar innecesariamente el complemento explicativo del nombre. También preserva el valor narrativo del presente histórico con un pretérito natural en español.
  spanish_consistency_notes:
  - Se usó «Jairo» como transliteración estándar de Ἰάϊρος.
  - Se mantuvo «pies» en plural, como en el griego.
  - «Se postró» preserva la fuerza del gesto sin introducir vocabulario técnico de culto.
  - La puntuación mantiene la apposición del nombre en una sola frase fluida.
