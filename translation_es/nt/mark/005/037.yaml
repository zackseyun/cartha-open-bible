translation:
  language: es
  text: Y no permitió que nadie lo acompañara, excepto Pedro, Jacobo y Juan, el hermano de Jacobo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐκ ἀφῆκεν
  english_pob_choice: allowed no one
  chosen_spanish: no permitió
  alternatives_spanish:
  - no dejó
  - no autorizó
  lexicon: BDAG
  rationale: ἀφίημι en esta construcción con infinitivo expresa permiso o autorización; en español, «no permitió» comunica con naturalidad esa restricción sin perder la fuerza del negativo total.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - ninguna persona
  lexicon: BDAG
  rationale: El objeto negado se expresa naturalmente en español con «nadie». Mantiene la exclusión total que marca el griego.
- source_word: συνακολουθῆσαι
  english_pob_choice: to accompany
  chosen_spanish: acompañara
  alternatives_spanish:
  - fuera con él
  - lo siguiera
  lexicon: BDAG
  rationale: El verbo compuesto indica ir junto con alguien. «Acompañara» es el equivalente más idiomático en español y evita una calca rígida.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - con él
  - junto a él
  lexicon: BDAG
  rationale: La idea de compañía ya está incluida en «acompañara», por lo que el pronombre objeto en español evita redundancia y conserva la economía del sentido.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - a no ser
  lexicon: BDAG
  rationale: Aquí introduce una excepción, no una condición. «Excepto» es claro, natural y fiel al valor exceptivo de la partícula.
- source_word: τὸν Πέτρον καὶ Ἰάκωβον καὶ Ἰωάννην
  english_pob_choice: Peter and James and John
  chosen_spanish: Pedro, Jacobo y Juan
  alternatives_spanish:
  - Pedro, Santiago y Juan
  lexicon: N/A
  rationale: Se conserva la secuencia de nombres propios. «Jacobo» sigue el criterio POB de transliteración bíblica consistente, aunque «Santiago» es la forma tradicional española más común.
- source_word: τὸν ἀδελφὸν Ἰακώβου
  english_pob_choice: the brother of James
  chosen_spanish: el hermano de Jacobo
  alternatives_spanish:
  - el hermano de Santiago
  - hermano de Jacobo
  lexicon: BDAG
  rationale: La frase appositiva identifica a cuál Juan se refiere el texto. Se mantiene la relación fraterna de manera transparente y se armoniza con el nombre elegido para Ἰάκωβος.
translation_notes:
  revision_awareness: El texto base en inglés y el control cruzado reportan alta concordancia y ninguna revisión aplicada; por eso la versión española sigue de cerca el sentido del griego sin introducir matices interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Jacobo» de forma coherente para Ἰάκωβος en todo el versículo.
  - Se prefirió una estructura verbal natural en español («no permitió que nadie lo acompañara») para reflejar la prohibición total del griego.
  - No se añadieron notas al pie porque no hay variantes textuales ni alternativas de traducción que requieran anclaje específico en este versículo.
