translation:
  language: es
  text: Y continuamente[a], de noche y de día, entre los sepulcros y en los montes, estaba clamando y cortándose con piedras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguía clamando y se hacía heridas con piedras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ παντὸς νυκτὸς καὶ ἡμέρας
  english_pob_choice: continually, night and day
  chosen_spanish: y continuamente, de noche y de día
  alternatives_spanish:
  - todo el tiempo, de noche y de día
  - sin cesar, de noche y de día
  lexicon: BDAG
  rationale: La expresión idiomática comunica duración continua a lo largo del tiempo. «Continuamente» mantiene el valor aspectual, y «de noche y de día» conserva la fórmula temporal completa sin hacerla más rígida de lo necesario.
- source_word: μνήμασιν
  english_pob_choice: tombs
  chosen_spanish: sepulcros
  alternatives_spanish:
  - tumbas
  - graves
  lexicon: BDAG
  rationale: «μνῆμα» designa un lugar de sepultura. «Sepulcros» es natural en español bíblico y conserva mejor el sentido de lugar funerario que «graves»; «tumbas» también sería posible.
- source_word: ὄρεσιν
  english_pob_choice: mountains
  chosen_spanish: montes
  alternatives_spanish:
  - montañas
  - cerros
  lexicon: BDAG
  rationale: El término griego es «montes / montañas». «Montes» es una forma sobria y bíblicamente reconocible en español, sin perder el referente geográfico.
- source_word: ἦν κράζων
  english_pob_choice: he was crying out
  chosen_spanish: estaba clamando
  alternatives_spanish:
  - estaba gritando
  - seguía clamando
  lexicon: BDAG
  rationale: El imperfecto con participio presenta una acción continua en el pasado. «Estaba clamando» preserva esa duración; «clamar» comunica un grito intenso sin reducirlo simplemente a conversación o voz alta.
- source_word: κατακόπτων ἑαυτὸν
  english_pob_choice: cutting himself
  chosen_spanish: golpeándose
  alternatives_spanish:
  - hiriéndose
  - cortándose
  lexicon: BDAG
  rationale: El verbo puede implicar golpearse o herirse con violencia. Dado el complemento instrumental «con piedras» y la posible tensión entre golpear y cortar, «golpeándose» es una opción española directa que no fuerza de más una acción específica de corte; «hiriéndose» y «cortándose» quedan como alternativas.
- source_word: λίθοις
  english_pob_choice: with stones
  chosen_spanish: con piedras
  alternatives_spanish:
  - con guijarros
  - con piedras de arrojar
  lexicon: BDAG
  rationale: El dativo instrumental se expresa naturalmente con «con piedras». Mantiene la imagen concreta del daño autoinfligido.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto español junto a la forma que admite la alternativa lexical. No se añadieron notas sin anclaje.'
  spanish_consistency_notes:
  - Se mantiene «Y» inicial para corresponder al enlace narrativo del griego.
  - «Sepulcros» y «montes» conservan un registro bíblico claro y transparente.
  - No se introdujo lenguaje doctrinal adicional; la escena se traduce de forma descriptiva.
  - La nota [a] está anclada en la expresión principal para evitar discrepancia entre texto y aparato crítico.
