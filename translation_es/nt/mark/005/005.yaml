  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura temporal continua, los lugares («sepulcros», «montes») y la acción durativa de «estaba clamando». Sin embargo, «golpeándose con piedras» no preserva adecuadamente el sentido de κατακόπτων ἑαυτὸν λίθοις, que en este contexto apunta a cortarse/herirse severamente con piedras, no solo a golpearse.
  spanish_quality_summary: 'El texto es legible y digno. «Sepulcros» y «montes» funcionan bien en registro bíblico moderno. La principal mejora necesaria es léxica: «golpeándose» debilita y desplaza la imagen concreta de autolesión por corte o desgarro. También conviene ajustar la nota para reflejar una alternativa realmente cercana al sentido fuente.'
  glossary_alignment: Sin conflictos con la terminología base del proyecto. La revisión propuesta mantiene un español natural y más fiel al valor léxico de κατακόπτω mediante «cortándose».
  issues:
  - severity: high
    issue: «golpeándose con piedras» para κατακόπτων ἑαυτὸν λίθοις
    rationale: κατακόπτω denota cortar, herir gravemente, desgarrar o lacerar; «golpearse» puede implicar solo pegarse y no preserva el matiz de corte/autolesión penetrante que el inglés POB documenta como «cutting himself», con alternativa «gashing himself».
  - severity: medium
    issue: La nota alternativa repite el mismo problema léxico
    rationale: «seguía clamando y golpeándose con piedras» no ofrece una alternativa fiel al matiz documentado; la nota debe conservar una opción como «hiriéndose» o «haciéndose cortes»/«lacerándose» según naturalidad española.
