revisions:
- from: Y en seguida la niña se levantó y comenzó a caminar[a], porque tenía doce años[b]. Y enseguida quedaron llenos de gran asombro.
  to: Y enseguida la niña se levantó y comenzó a caminar[a], porque tenía doce años. Y enseguida quedaron completamente asombrados[b].
  rationale: Se corrige la colocación de las notas para que correspondan a las palabras adecuadas del texto, se elimina «resucitó» como alternativa impropia según la decisión teológica y léxica documentada, se uniforma «enseguida» para ambas ocurrencias de εὐθύς, y se suaviza la cláusula final a un español más natural que sigue transmitiendo la intensidad del original, dejando la explicación del cognado griego en nota.
