translation:
  language: es
  text: Y enseguida la niña se levantó y comenzó a caminar[a], porque tenía doce años. Y enseguida quedaron completamente asombrados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se puso de pie». El verbo griego también puede traducirse «se levantó» o «se alzó».
    reason: lexical_alternative
  - marker: b
    text: O «quedaron con gran asombro». El griego usa una expresión cognada, literalmente algo como «se asombraron con gran asombro», para intensificar la reacción.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: en seguida / enseguida
  alternatives_spanish:
  - de inmediato
  - al instante
  lexicon: BDAG
  rationale: εὐθύς marca la rapidez narrativa característica de Marcos. «En seguida» y «enseguida» conservan ese ritmo natural en español sin sonar forzados; se mantiene la repetición en ambas cláusulas como rasgo estilístico del griego.
- source_word: ἀνέστη
  english_pob_choice: stood up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  - resucitó
  lexicon: BDAG
  rationale: El verbo puede traducirse como ‘se levantó’ en un contexto físico y visible. En esta escena milagrosa, el español así conserva la acción sin cargar la redacción principal con una terminología de resurrección más explícita de la que exige el verbo aislado.
- source_word: κοράσιον
  english_pob_choice: the girl
  chosen_spanish: la niña
  alternatives_spanish:
  - la muchacha
  - la joven
  lexicon: BDAG
  rationale: κοράσιον denota una niña o muchacha joven. Dado que el texto aclara que tenía doce años, «la niña» es claro, natural y suficiente en español.
- source_word: περιεπάτει
  english_pob_choice: began walking
  chosen_spanish: comenzó a caminar
  alternatives_spanish:
  - empezó a andar
  - iba caminando
  - caminaba
  lexicon: BDAG
  rationale: El imperfecto presenta una acción en desarrollo tras levantarse. «Comenzó a caminar» reproduce bien ese inicio visible y su continuidad, con un español idiomático.
- source_word: ἦν γὰρ ἐτῶν δώδεκα
  english_pob_choice: for she was twelve years old
  chosen_spanish: porque tenía doce años
  alternatives_spanish:
  - pues tenía doce años
  - porque era de doce años
  lexicon: BDAG
  rationale: El giro explica la mención anterior. En español, la edad se expresa de forma más natural con «tener»; se conserva el valor explicativo de γάρ con «porque».
- source_word: ἐξέστησαν
  english_pob_choice: they were overcome
  chosen_spanish: quedaron llenos de gran asombro
  alternatives_spanish:
  - quedaron atónitos
  - se quedaron pasmados
  - quedaron sobrecogidos
  lexicon: BDAG
  rationale: ἐξίστημι aquí expresa quedar profundamente impactados por la sorpresa. «Quedaron llenos de gran asombro» transmite el efecto resultante en un español claro y permite mantener la conexión con el sustantivo cognado siguiente.
- source_word: ἐκστάσει μεγάλῃ
  english_pob_choice: with great amazement
  chosen_spanish: de gran asombro
  alternatives_spanish:
  - con gran asombro
  - en gran estupor
  - con gran admiración
  lexicon: BDAG
  rationale: La construcción griega usa un cognado para reforzar la intensidad del asombro. En español, «gran asombro» conserva el sentido sin recurrir a un falso amigo como «éxtasis».
theological_decisions:
- issue: Matiz de resurrección en ἀνέστη
  english_pob_reading: Translate as physical rising ('stood up') within the miracle narrative without making the wording more explicitly resurrection-laden than the Greek requires.
  chosen_spanish_reading: Traducir «se levantó» como elevación física dentro del relato del milagro, sin convertir el verbo en una afirmación doctrinal más explícita de resurrección de la que el griego del verbo exige por sí solo.
  alternative_spanish_readings:
  - resucitó
  - se puso de pie
  rationale: El contexto narra una restauración a la vida, pero la forma verbal por sí sola puede describir simplemente levantarse. La traducción mantiene la fuerza del acontecimiento sin sobreinterpretar el verbo aislado.
  doctrine_reference: 'Principio de traducción: no introducir en la redacción principal afirmaciones doctrinales que el texto no formula explícitamente.'
- issue: Repetición cognada en ἐξέστησαν ... ἐκστάσει μεγάλῃ
  english_pob_reading: The Greek uses a cognate expression for intense amazement.
  chosen_spanish_reading: Se conserva la idea de intensidad con «gran asombro», sin forzar una repetición cognada poco natural en español.
  alternative_spanish_readings:
  - quedaron atónitos con gran aturdimiento
  - fueron sobrecogidos por gran asombro
  rationale: El español no reproduce con naturalidad un cognado directo equivalente a «astonished with astonishment». La redacción evita un calco torpe y mantiene la fuerza enfática del griego.
  doctrine_reference: 'Principio de equivalencia óptima: preservar el efecto retórico sin sacrificar la naturalidad del receptor.'
translation_notes:
  revision_awareness: El texto base en inglés ya había optado por «stood up», «began walking» y «great amazement», y el repaso final no registró cambios. La presente versión sigue ese perfil semántico, pero ajusta el español para evitar calcos duros y para preservar la repetición de εὐθύς en la cadencia narrativa.
  spanish_consistency_notes:
  - Se mantiene «en seguida/enseguida» para reproducir la doble ocurrencia de εὐθύς en el versículo.
  - Se evita «SEÑOR» o lenguaje de paráfrasis devocional; no hay términos divinos en este versículo.
  - «La niña» y «tenía doce años» reflejan el registro natural del español sin añadir diminutivos no exigidos por κοράσιον.
  - «Gran asombro» conserva la fuerza del sustantivo cognado ἐκστάσει sin introducir «éxtasis», que sería engañoso en español.
