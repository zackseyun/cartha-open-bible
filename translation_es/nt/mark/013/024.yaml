  rationale: Se ajusta únicamente la traducción de σκοτισθήσεται de «será oscurecido» a «se oscurecerá» para lograr un español más natural y ampliamente legible, sin alterar el sentido apocalíptico ni las decisiones léxicas fundamentales del POB. La nota léxica sobre θλῖψις se mantiene.
