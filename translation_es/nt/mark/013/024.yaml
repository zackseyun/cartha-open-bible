translation:
  language: es
  text: Pero en aquellos días[a], después de aquella tribulación, el sol se oscurecerá, y la luna no dará su luz,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «después de aquella angustia» o «después de aquella aflicción».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce un contraste o transición fuerte con lo anterior; en español, 'Pero' suena natural y conserva la fuerza adversativa breve del griego.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - durante aquellos días
  lexicon: BDAG
  rationale: La expresión temporal se mantiene con la misma estructura y tono escatológico. 'Aquellos' conserva la deixis enfática de ἐκείναις.
- source_word: μετὰ τὴν θλῖψιν ἐκείνην
  english_pob_choice: after that tribulation
  chosen_spanish: después de aquella tribulación
  alternatives_spanish:
  - después de aquella angustia
  - después de aquella aflicción
  lexicon: BDAG
  rationale: 'μετά con acusativo es temporal: ''después de''. Para θλῖψις, ''tribulación'' preserva el peso apocalíptico e intertextual del término; ''aquella'' retiene la referencia específica del griego.'
- source_word: ὁ ἥλιος
  english_pob_choice: the sun
  chosen_spanish: el sol
  lexicon: BDAG
  rationale: Equivalente directo y natural.
- source_word: σκοτισθήσεται
  english_pob_choice: will be darkened
  chosen_spanish: será oscurecido
  alternatives_spanish:
  - será eclipsado
  - se pondrá oscuro
  lexicon: BDAG
  rationale: El futuro pasivo se conserva con 'será'. 'Oscurecido' reproduce la idea de quedar hecho oscuro sin convertirlo en un simple cambio intransitivo.
- source_word: ἡ σελήνη
  english_pob_choice: the moon
  chosen_spanish: la luna
  lexicon: BDAG
  rationale: Equivalente directo.
- source_word: οὐ δώσει
  english_pob_choice: will not give
  chosen_spanish: no dará
  alternatives_spanish:
  - no emitirá
  - no ofrecerá
  lexicon: BDAG
  rationale: δίδωμι significa 'dar'. En español, 'no dará su luz' conserva la personificación del astro y suena idiomático.
- source_word: τὸ φέγγος αὐτῆς
  english_pob_choice: its light
  chosen_spanish: su luz
  alternatives_spanish:
  - su resplandor
  - su brillo
  lexicon: BDAG
  rationale: φέγγος denota luz/resplandor. 'Su luz' es la opción más directa y natural, y mantiene la imagen poética del griego.
theological_decisions:
- issue: θλῖψις en un discurso apocalíptico
  english_pob_reading: tribulation
  chosen_spanish_reading: tribulación
  alternative_spanish_readings:
  - angustia
  - aflicción
  rationale: En este contexto escatológico, 'tribulación' preserva la densidad apocalíptica que el texto sugiere. No se especifica un sistema final de interpretación; se mantiene la tensión del pasaje.
  doctrine_reference: 'Principio de traducción: conservar la gravedad teológica sin resolver interpretativamente más de lo que el texto permite.'
translation_notes:
  revision_awareness: El control de revisión indica alta concordancia y ausencia de cambios necesarios; el borrador sigue de cerca el texto griego y las decisiones léxicas auditadas en inglés.
  spanish_consistency_notes:
  - Se usa 'tribulación' de modo consistente con el valor apocalíptico de θλῖψις en el contexto.
  - Se mantiene el paralelismo astronómico con 'el sol' / 'la luna' y el futuro pasivo en 'será oscurecido'.
  - La nota textual-léxica preserva alternativas reales sin diluir el término principal.
