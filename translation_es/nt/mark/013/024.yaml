review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue fielmente el griego y el rastro POB en la mayor parte: Ἀλλὰ = «Pero», ἐν ἐκείναις ταῖς ἡμέραις = «en aquellos días», μετὰ τὴν θλῖψιν ἐκείνην = «después de aquella tribulación», y «la luna no dará su luz» preserva bien la personificación de οὐ δώσει τὸ φέγγος αὐτῆς. La única desviación importante está en σκοτισθήσεται: «será oscurecido» es comprensible pero suena poco natural en español para un astro; «será oscurecido» además puede sentirse más forzado que «se oscurecerá», que comunica el mismo evento con mejor legibilidad en español.'
  spanish_quality_summary: El texto es claro y digno, pero «el sol será oscurecido» resulta rígido y poco idiomático en español bíblico actual. «El sol se oscurecerá» es mucho más natural y sigue siendo fiel al sentido. El resto del verso fluye bien y la nota al pie está bien formulada.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Tribulación» coincide con la decisión teológica y léxica del POB para θλῖψις en este contexto apocalíptico. No aparecen términos sensibles del glosario mayor como Yahvé, Mesías, esclavo, etc.
  issues:
  - severity: medium
    issue: «será oscurecido» suena antinatural en español
    rationale: Aunque refleja formalmente el pasivo de σκοτισθήσεται, en español contemporáneo y eclesial «el sol se oscurecerá» comunica mejor el mismo sentido sin pérdida semántica. La forma actual suena calcada del inglés y disminuye la legibilidad.
  revised_spanish_text: Pero en aquellos días[a], después de aquella tribulación, el sol se oscurecerá, y la luna no dará su luz,
  revised_footnotes:
  - marker: a
    text: O «después de aquella angustia» o «después de aquella aflicción».
