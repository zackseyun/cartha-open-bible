source:
  edition: SBLGNT
  text: ἐγερθήσονται γὰρ ψευδόχριστοι καὶ ψευδοπροφῆται καὶ δώσουσιν σημεῖα καὶ τέρατα πρὸς τὸ ἀποπλανᾶν εἰ ⸀δυνατὸν τοὺς ἐκλεκτούς·
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/022.yaml
  text: For false messiahs and false prophets will arise and will give signs and wonders in order to lead astray[a], if possible[c][b], the elect.
  footnotes:
  - marker: a
    text: Or 'false Christs.' The Greek term is built on Christos, here used as a title meaning 'Messiah.'
    reason: alternative_reading
  - marker: b
    text: Or 'if it were possible.' The Greek wording does not explicitly settle whether the elect can in fact be led astray; it states the deceivers' aim.
    reason: lexical_alternative
  - marker: c
    text: Or 'in order to lead astray, if possible, the elect'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: 4d598e2b42b910bb4fd69e37d2cb86cacc5a0caccea4a8465cab073125a42ed3
    timestamp: '2026-04-18T20:21:26Z'
    output_hash: 3fbb18a52906cd4b49e1685020908fd1f08c64fcf596bd5bbe48b4a88494c8e6
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:54:07Z'
    unchanged: false
    changes_summary: 'Reordered the final phrase to reflect the Greek more closely: ''lead astray, if possible, the elect'' rather than attaching ''if possible'' after ''the elect.'''
translation:
  language: es
  text: Porque se levantarán falsos mesías[a] y falsos profetas, y darán señales y prodigios para extraviar, si es posible[b], a los elegidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falsos Cristos». El término griego se forma sobre Christos y aquí funciona como título con sentido de «Mesías».
    reason: alternative_reading
  - marker: b
    text: O «si fuera posible». El griego no especifica por sí mismo si el engaño de los elegidos llegará a ser realmente posible; expresa el propósito de los engañadores.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθήσονται
  english_pob_choice: will arise
  chosen_spanish: se levantarán
  alternatives_spanish:
  - aparecerán
  - serán levantados
  lexicon: BDAG
  rationale: En este contexto, el futuro pasivo funciona idiomáticamente para indicar la aparición o surgimiento de personas. «Se levantarán» conserva ese valor de surgimiento y suena natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - En efecto
  lexicon: BDAG
  rationale: La partícula introduce explicación de la advertencia previa. «Porque» preserva bien la conexión causal o explicativa en español.
- source_word: ψευδόχριστοι
  english_pob_choice: false messiahs
  chosen_spanish: falsos mesías
  alternatives_spanish:
  - falsos Cristos
  - falsos ungidos
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», coherente con el uso contextual y con la terminología proyectual. «Falsos mesías» comunica con claridad el sentido sin depender de la forma tradicional «Cristos».
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: falsos profetas
  alternatives_spanish:
  - profetas falsos
  lexicon: BDAG
  rationale: Es la equivalencia directa y natural del compuesto, sin añadir matices interpretativos.
- source_word: δώσουσιν
  english_pob_choice: will give
  chosen_spanish: darán
  alternatives_spanish:
  - harán
  - producirán
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «darán», en español «darán señales y prodigios» es una construcción natural y fiel. «Harán» sería más interpretativo.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: BDAG
  rationale: «Señales» es el equivalente claro y bíblico de σημεῖα. Se evita añadir «milagrosas» para no interpretar más allá del texto.
- source_word: τέρατα
  english_pob_choice: wonders
  chosen_spanish: prodigios
  alternatives_spanish:
  - maravillas
  - portentos
  lexicon: BDAG
  rationale: «Prodigios» refleja bien el par bíblico «señales y prodigios» y mantiene el matiz de hechos extraordinarios. «Maravillas» sería posible, pero menos técnico en registro bíblico.
- source_word: πρὸς τὸ ἀποπλανᾶν
  english_pob_choice: in order to lead astray
  chosen_spanish: para extraviar
  alternatives_spanish:
  - con el fin de desviar
  - para engañar
  lexicon: BDAG
  rationale: La construcción expresa propósito. «Extraviar» conserva la imagen de apartar del camino, muy cercana a ἀποπλανάω. Se evita «engañar» porque reduce la fuerza de «hacer perder el rumbo».
- source_word: εἰ δυνατόν
  english_pob_choice: if possible
  chosen_spanish: si es posible
  alternatives_spanish:
  - si fuera posible
  lexicon: BDAG
  rationale: La frase griega es concisa y deja abierta la cuestión de si la acción podría consumarse realmente. «Si es posible» preserva esa tensión sin resolverla.
- source_word: τοὺς ἐκλεκτούς
  english_pob_choice: the elect
  chosen_spanish: a los elegidos
  alternatives_spanish:
  - a los escogidos
  - a los electos
  lexicon: BDAG
  rationale: «Elegidos» es claro y natural en español, y conserva el peso teológico del término. Se opta por esta forma en lugar de «electos», que suena más técnico y menos fluido.
theological_decisions:
- issue: Título Χριστός en ψευδόχριστοι
  english_pob_reading: false messiahs
  chosen_spanish_reading: falsos mesías
  alternative_spanish_readings:
  - falsos Cristos
  rationale: La forma española sigue el criterio proyectual de traducir Χριστός como título por «Mesías» cuando el sentido es claramente titular. Así se evita la expresión más tradicional pero menos transparente «Cristos».
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where title; Christ where name-like)'
- issue: Alcance de εἰ δυνατόν respecto de la posibilidad real de engañar a los elegidos
  english_pob_reading: if possible
  chosen_spanish_reading: si es posible
  alternative_spanish_readings:
  - si fuera posible
  rationale: 'La traducción conserva la ambigüedad del griego: expresa la intención o alcance del engaño sin decidir si en última instancia podría lograrse. No se resuelve la tensión doctrinal que el texto deja abierta.'
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §3, Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto español sigue el último reajuste del audit trail al colocar la idea final como «para extraviar, si es posible, a los elegidos», manteniendo el orden cercano al griego y la ambigüedad sobre εἰ δυνατόν. También refleja la decisión del proyecto de traducir ψευδόχριστοι como «falsos mesías» en lugar de «falsos Cristos».
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός cuando funciona como título, conforme al criterio del proyecto.
  - «Elegidos» se usa para ἐκλεκτούς por claridad y por su carga teológica estándar.
  - «Señales y prodigios» preserva el par semántico de σημεῖα καὶ τέρατα sin sobreinterpretar.
  - No se introduce «SEÑOR» ni otras sustituciones ajenas al texto, porque aquí no aparece el nombre divino.
