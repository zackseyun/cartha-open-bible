translation:
  language: es
  text: Y entonces verán al Hijo del Hombre viniendo en las nubes[a] con gran poder y gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con las nubes». El griego dice literalmente «en nubes», pero la alternativa destaca mejor el eco probable de Daniel 7:13.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὄψονται
  english_pob_choice: they will see
  chosen_spanish: verán
  alternatives_spanish:
  - mirarán
  - contemplarán
  lexicon: BDAG
  rationale: El futuro de ὁράω aquí expresa una percepción pública y visible. «Verán» es natural en español moderno y conserva ese sentido sin añadir matices interpretativos.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su resonancia apocalíptica y daniélica. «Hijo del Hombre» es la forma más transparente y fiel al valor titular de la expresión.
- source_word: ἐρχόμενον
  english_pob_choice: coming
  chosen_spanish: viniendo
  alternatives_spanish:
  - que viene
  - llegando
  lexicon: BDAG
  rationale: El participio presente se mantiene como acción en curso. «Viniendo» conserva el movimiento verbal y el tono apocalíptico del original.
- source_word: ἐν νεφέλαις
  english_pob_choice: in the clouds
  chosen_spanish: en las nubes
  alternatives_spanish:
  - con las nubes
  - en nubes
  lexicon: BDAG
  rationale: La preposición ἐν se refleja mejor con «en». El plural anarthrous νεφέλαις se traduce de forma natural como «las nubes», manteniendo la imagen sin forzar una explicación en el texto principal.
- source_word: μετὰ δυνάμεως πολλῆς
  english_pob_choice: with great power
  chosen_spanish: con gran poder
  alternatives_spanish:
  - con mucho poder
  - con gran fuerza
  lexicon: BDAG
  rationale: Μετά con genitivo indica acompañamiento. «Con gran poder» comunica bien la magnitud de δύναμις πολλή en español bíblico contemporáneo.
- source_word: καὶ δόξης
  english_pob_choice: and glory
  chosen_spanish: y gloria
  alternatives_spanish:
  - y esplendor
  - y majestad
  lexicon: BDAG
  rationale: δόξα conserva aquí su sentido bíblico de gloria manifiesta, no mera fama. «Gloria» es la opción más estable y fiel en español eclesial.
theological_decisions:
- issue: Alusión a Daniel 7:13 y lenguaje de las nubes
  english_pob_reading: Preserve 'in the clouds' and avoid explaining the allusion in the main text.
  chosen_spanish_reading: Preservar «en las nubes» en el texto principal, con posibilidad de nota sobre la eco de Daniel 7:13.
  alternative_spanish_readings:
  - con las nubes
  - entre las nubes
  - en la nube
  rationale: La frase griega conserva la imagen sin explicitarla. El español debe mantener esa tensión intertextual sin convertirla en paráfrasis explicativa.
  doctrine_reference: Daniel 7:13; afirmaciones cristológicas y escatológicas
- issue: Título cristológico apocalíptico
  english_pob_reading: Retain 'the Son of Man' without interpretive expansion.
  chosen_spanish_reading: Mantener «el Hijo del Hombre» como título cristológico reconocido.
  alternative_spanish_readings:
  - el Hombre
  - el Hijo humano
  rationale: La expresión funciona como título y no debe diluirse en una formulación genérica. Así se preserva la tensión teológica y la referencia escritural.
  doctrine_reference: Evangelios sinópticos; Daniel 7
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del material auditado. Se adoptó una solución más transparente para el español: «en las nubes» conserva la preposición y el plural del griego, mientras la nota ofrece la alternativa «con las nubes» para reflejar el eco daniélico destacado en el audito inglés.'
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» conforme al uso bíblico asentado del título.
  - Se traduce δύναμις como «poder» en coherencia con el léxico bíblico usual del proyecto.
  - Se usa «gloria» para δόξα, evitando sustituciones como «esplendor» que debilitarían la intertextualidad bíblica.
