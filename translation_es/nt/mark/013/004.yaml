translation:
  language: es
  text: Dinos cuándo sucederán estas cosas, y cuál será la señal cuando todas estas cosas estén a punto de cumplirse[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando todas estas cosas se cumplan». El griego usa μέλλῃ con infinitivo, lo cual puede expresar más específicamente «estar a punto de».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰπὸν
  english_pob_choice: Tell
  chosen_spanish: Dinos
  alternatives_spanish:
  - Háblanos
  - Dínoslo
  lexicon: BDAG
  rationale: El imperativo aoristo de λέγω se expresa de modo natural en español con una petición directa en imperativo. «Dinos» conserva el tono de solicitud dirigida a Jesús y evita la rigidez de «di a nosotros».
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de persona funciona como complemento indirecto; en español, el pronombre enclítico en «Dinos» comunica esa relación de forma natural y concisa.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - en qué momento
  - a qué tiempo
  lexicon: BDAG
  rationale: Interrogativo temporal estándar; «cuándo» es la equivalencia más natural y fiel en español.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estos acontecimientos
  lexicon: BDAG
  rationale: El plural neutro se conserva con «estas cosas», manteniendo la referencia discursiva a los eventos ya anunciados.
- source_word: ἔσται
  english_pob_choice: will be
  chosen_spanish: sucederán
  alternatives_spanish:
  - serán
  - tendrán lugar
  lexicon: BDAG
  rationale: Aunque el griego usa el futuro de εἰμί, en este contexto una versión idiomática en español como «sucederán» comunica con claridad la llegada de los acontecimientos. Evita la dureza de «serán» y no añade más interpretación que la requerida por el contexto.
- source_word: τί τὸ σημεῖον
  english_pob_choice: what will be the sign
  chosen_spanish: cuál será la señal
  alternatives_spanish:
  - qué señal será
  - cuál es la señal
  lexicon: BDAG
  rationale: «Señal» traduce adecuadamente σημεῖον en el discurso escatológico. La formulación española más natural es «cuál será la señal», que mantiene la pregunta paralela sin forzar un giro literal poco idiomático.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - en el momento en que
  lexicon: BDAG
  rationale: Introducción temporal de cláusula con matiz de contingencia; «cuando» es la forma más clara y natural en español.
- source_word: μέλλῃ
  english_pob_choice: are about to
  chosen_spanish: estén a punto de
  alternatives_spanish:
  - vayan a
  - estén por
  lexicon: BDAG
  rationale: La perífrasis «estar a punto de» preserva la noción de inminencia de μέλλω con infinitivo, como señaló el POB en inglés, sin convertirla en un simple futuro.
- source_word: συντελεῖσθαι
  english_pob_choice: be accomplished
  chosen_spanish: cumplirse
  alternatives_spanish:
  - acabar
  - llevarse a término
  - ser completadas
  lexicon: BDAG
  rationale: El pasivo infinitivo de συντελέω apunta a la culminación de los acontecimientos. «Cumplirse» es una opción española bíblica y precisa para eventos que llegan a su consumación, sin introducir de manera innecesaria la idea específica de profecía cumplida.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todas
  alternatives_spanish:
  - todo
  - completamente
  lexicon: BDAG
  rationale: 'Concorde con «estas cosas», se traduce como «todas» para preservar el sentido de conjunto completo: «todas estas cosas».'
theological_decisions:
- issue: Matiz de inminencia en μέλλῃ + infinitivo
  english_pob_reading: Retain the prospective/imminent nuance with 'are about to be accomplished' rather than flattening to simple future.
  chosen_spanish_reading: Mantener la inminencia con «estén a punto de cumplirse» en vez de reducirlo a un futuro simple.
  alternative_spanish_readings:
  - cuando todas estas cosas se cumplirán
  - cuando todas estas cosas van a cumplirse
  rationale: La construcción griega con μέλλω añade un matiz de inmediatez o cercanía. «Estén a punto de» conserva ese valor prospectivo sin resolver la tensión cronológica del pasaje ni sobreinterpretar el texto.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alta concordancia del texto fuente y el audit trail inglés: no hubo revisiones aplicadas en el último pase, y la versión española preserva el matiz de inminencia señalado por el POB en inglés mediante una perífrasis equivalente en español.'
  spanish_consistency_notes:
  - Se conserva la terminología escatológica con «señal» para σημεῖον y «cumplirse» para la culminación de los eventos.
  - Se evita calcar la sintaxis inglesa donde el español natural exige reordenamiento, pero sin perder el paralelismo de las dos preguntas.
  - Se usó «Dinos» como equivalente idiomático del imperativo aoristo dirigido a Jesús.
