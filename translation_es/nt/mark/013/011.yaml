review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: mantiene la contingencia futura («Y cuando»), el doble movimiento de arresto y entrega, la prohibición de preocuparse anticipadamente, el pasivo implícito en «se les dé», la solemnidad de «en aquella hora» y el contraste entre el habla humana y la agencia del Espíritu Santo. Sin embargo, la nota b está mal planteada: presenta como alternativa exactamente la misma redacción del texto principal y además no corresponde al tipo de nota preservada en el inglés, que señalaba una alternativa de estructura para la secuencia inicial, no para «los que hablan».'
  spanish_quality_summary: 'El español es claro, natural y digno. «Y cuando los lleven y los entreguen» funciona bien. «Eso hablen» suena algo marcado, pero es defendible por la fuerza enfática de τοῦτο. La principal deficiencia no está en el texto principal sino en el aparato de notas: la nota b es redundante y confusa. Conviene reemplazarla por una nota que refleje de verdad una alternativa pertinente y documentada.'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: «Espíritu Santo» para τὸ πνεῦμα τὸ ἅγιον, sin despersonalizarlo; no hay conflictos con Yahvé/Mesías u otros términos de glosario. El uso de «hablen» preserva razonablemente la repetición de λαλέω frente a «decir».'
  issues:
  - severity: medium
    issue: La nota b no aporta una alternativa real y no coincide con la evidencia auditada en inglés.
    rationale: 'La nota dice «O: “porque no son ustedes los que hablan”», que es idéntico al texto principal. Además, la nota inglesa b documenta una alternativa de estructura para la cláusula inicial («lead you away, handing you over»), no una variante para la cláusula final.'
  revised_spanish_text: Y cuando los lleven y los entreguen[a], no se preocupen de antemano por lo que hayan de decir; pero lo que se les dé en aquella hora, eso hablen. Porque no son ustedes los que hablan, sino el Espíritu Santo.
  revised_footnotes:
