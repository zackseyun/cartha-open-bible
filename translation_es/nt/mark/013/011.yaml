translation:
  language: es
  text: Y cuando los lleven y los entreguen[a], no se preocupen de antemano por lo que hayan de decir; pero lo que se les dé en aquella hora, eso hablen. Porque no son ustedes los que hablan, sino el Espíritu Santo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando los lleven, entregándolos». El griego puede reflejar la acción inicial con un verbo finito y la relacionada con un participio; aquí se coordinan los verbos en español para mayor fluidez.'
    reason: previous_rendering
lexical_decisions:
- source_word: καὶ ὅταν
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Y siempre que
  lexicon: BDAG
  rationale: La construcción introduce una circunstancia futura y contigua al relato. «Y cuando» conserva la ligazón narrativa y la eventualidad sin volver la frase más rígida de lo necesario.
- source_word: ἄγωσιν
  english_pob_choice: they lead you away
  chosen_spanish: los lleven
  alternatives_spanish:
  - los conduzcan
  - los lleven fuera
  lexicon: BDAG
  rationale: En este contexto de persecución, el verbo implica ser llevados por la fuerza ante autoridades. «Los lleven» comunica el movimiento coercitivo de manera natural en español; el complemento «y los entreguen» completa la escena.
- source_word: παραδιδόντες
  english_pob_choice: and hand you over
  chosen_spanish: y los entreguen
  alternatives_spanish:
  - y los entreguen en manos de otros
  - y los pasen a manos de ellos
  lexicon: BDAG
  rationale: El participio expresa la acción de poner a alguien en poder de otros, con fuerza jurídica. «Entreguen» conserva ese valor sin recurrir a un calco arcaico como «entregar en manos».
- source_word: μὴ προμεριμνᾶτε
  english_pob_choice: do not worry beforehand
  chosen_spanish: no se preocupen de antemano
  alternatives_spanish:
  - no se inquieten de antemano
  - no se angustien antes
  lexicon: BDAG
  rationale: El compuesto incluye la idea de preocupación anticipada. «No se preocupen de antemano» refleja bien el sentido temporal y emocional en un español claro y digno.
- source_word: τί λαλήσητε
  english_pob_choice: what you should say
  chosen_spanish: por lo que hayan de decir
  alternatives_spanish:
  - por lo que deban decir
  - por qué decir
  lexicon: BDAG
  rationale: El griego usa un verbo amplio de hablar/decir. La frase «por lo que hayan de decir» conserva la fuerza del subjuntivo y evita sonar demasiado coloquial, mientras mantiene la distinción con el imperativo posterior «hablen».
- source_word: ὃ ἐὰν δοθῇ ὑμῖν
  english_pob_choice: whatever is given to you
  chosen_spanish: lo que se les dé
  alternatives_spanish:
  - lo que les sea dado
  - cualquier cosa que se les dé
  lexicon: BDAG
  rationale: El pasivo deja implícito al dador. «Lo que se les dé» preserva esa pasividad abierta y el carácter indefinido de ὃ ἐὰν sin introducir un agente explícito.
- source_word: ἐν ἐκείνῃ τῇ ὥρᾳ
  english_pob_choice: in that hour
  chosen_spanish: en aquella hora
  alternatives_spanish:
  - en ese momento
  - a esa hora
  lexicon: BDAG
  rationale: «Aquella hora» mantiene la expresión bíblica solemne y la referencia al momento decisivo mejor que una paráfrasis más plana.
- source_word: τοῦτο λαλεῖτε
  english_pob_choice: speak that
  chosen_spanish: eso hablen
  alternatives_spanish:
  - hablen eso
  - digan eso
  lexicon: BDAG
  rationale: 'El demostrativo es enfático: hablen precisamente lo que se les da. «Eso hablen» preserva la correspondencia con el verbo de hablar y la reiteración del original, aunque sea una construcción algo marcada en español.'
- source_word: οὐ γάρ ἐστε ὑμεῖς οἱ λαλοῦντες
  english_pob_choice: For it is not you who are speaking
  chosen_spanish: Porque no son ustedes los que hablan
  alternatives_spanish:
  - Porque no son ustedes quienes hablan
  - Porque no están hablando ustedes
  lexicon: BDAG
  rationale: La estructura enfatiza a los oyentes con ὑμεῖς y la construcción participial. «No son ustedes los que hablan» reproduce esa focalización de forma natural.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu de Dios
  lexicon: BDAG
  rationale: Título personal y teológico estándar. «Espíritu Santo» conserva la referencia personal y divina sin neutralizarla como simple influencia.
theological_decisions:
- issue: Agencia del Espíritu Santo en el habla inspirada
  english_pob_reading: The disciples truly speak, yet the Holy Spirit is identified as the ultimate speaker; the translation preserves that tension.
  chosen_spanish_reading: Los discípulos siguen siendo los que hablan, pero la fuente última del hablar es el Espíritu Santo; la traducción mantiene esa tensión sin convertirla en dictado mecánico ni en mera inspiración vaga.
  alternative_spanish_readings:
  - Un modelo de dictado casi mecánico
  - Una inspiración general sin agencia personal clara
  rationale: El griego contrapone la acción humana de hablar con la identificación explícita del Espíritu Santo como sujeto último. Mantener ambos polos evita resolver prematuramente la relación entre inspiración divina y testimonio humano.
  doctrine_reference: Inspiración del Espíritu Santo sin anular la participación humana.
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al preferir una forma más natural para la primera cláusula verbal y conservar la distinción entre el verbo de hablar del mandamiento y el del cierre. También mantiene el pasivo abierto de «lo que se les dé» y la identificación final con el Espíritu Santo sin suavizar la tensión teológica.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» de manera consistente para τὸ πνεῦμα τὸ ἅγιον.
  - Se mantiene «hablen» para reflejar λαλεῖτε y su eco con λαλήσητε.
  - «Aquella hora» preserva el tono bíblico del momento decisivo.
  - El giro «no se preocupen de antemano» refleja προμεριμνᾶτε sin volverse artificioso.
