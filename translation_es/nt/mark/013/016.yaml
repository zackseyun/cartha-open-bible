translation:
  language: es
  text: Y el que está en el campo no debe volver atrás para recoger su manto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'prenda exterior'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ εἰς τὸν ἀγρόν
  english_pob_choice: the one in the field
  chosen_spanish: el que está en el campo
  alternatives_spanish:
  - la persona que está en el campo
  - el hombre que está en el campo
  lexicon: BDAG
  rationale: La construcción articular funciona de modo sustantivo y designa de forma genérica a una persona caracterizada por estar en el campo. En español, 'el que está en el campo' conserva ese valor singular y genérico con naturalidad.
- source_word: ἀγρός
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - campo de cultivo
  - terreno
  - hacienda
  lexicon: BDAG
  rationale: ἀγρός puede referirse a campo o terreno agrícola. 'Campo' es la equivalencia más directa y natural en este contexto de huida urgente.
- source_word: μὴ ἐπιστρεψάτω
  english_pob_choice: must not turn back
  chosen_spanish: no debe volver atrás
  alternatives_spanish:
  - no debe regresar
  - no vuelva atrás
  - no ha de volver
  lexicon: BDAG
  rationale: El aoristo imperativo con μή expresa prohibición urgente. 'No debe volver atrás' comunica bien esa fuerza prohibitiva en español moderno y mantiene la idea direccional del verbo.
- source_word: εἰς τὰ ὀπίσω
  english_pob_choice: back
  chosen_spanish: atrás
  alternatives_spanish:
  - hacia atrás
  - al retroceso
  - a lo que queda detrás
  lexicon: BDAG
  rationale: El modismo significa retroceder. En español, 'volver atrás' ya incorpora esa dirección, por lo que 'atrás' evita redundancia y conserva el sentido idiomático.
- source_word: ἆραι
  english_pob_choice: to get
  chosen_spanish: llevarse
  alternatives_spanish:
  - ir a buscar
  - tomar
  - recoger
  lexicon: BDAG
  rationale: '''ἆραι'' expresa la acción de tomar o llevar consigo algo en el contexto de regresar por una prenda. ''Llevarse'' resulta natural en español y refleja la finalidad de recuperar el objeto.'
- source_word: ἱμάτιον
  english_pob_choice: cloak
  chosen_spanish: manto
  alternatives_spanish:
  - capa
  - manto exterior
  - vestidura
  lexicon: BDAG
  rationale: ἱμάτιον designa una prenda exterior. 'Manto' es una opción digna y comprensible en español bíblico, cercana al valor de 'outer garment' sin sonar arcaica en exceso.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su propio
  - de él
  lexicon: BDAG
  rationale: El pronombre es masculino singular en griego, pero el español permite un genérico natural con 'su'. Así se conserva la referencia singular sin forzar el género en la superficie del texto.
theological_decisions:
- issue: Referencia singular genérica
  english_pob_reading: Retain singular generic reference with 'the one ... his cloak' rather than pluralizing or neutralizing.
  chosen_spanish_reading: 'Mantener una referencia singular genérica: ''el que ... su manto''.'
  alternative_spanish_readings:
  - los que están en el campo no deben volver atrás para llevarse sus mantos
  - la persona que está en el campo no debe volver atrás para llevarse su manto
  rationale: El griego usa una construcción singular articulada con pronombre singular masculino. La traducción conserva esa forma y su valor representativo, sin pluralizar ni borrar la singularidad del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió 'pick up' por 'get' para hacer más natural ἆραι; por eso el español usa 'llevarse' en lugar de un giro más mecánico como 'recoger'. El resto del sentido se mantiene conforme al audit trail y al griego.
  spanish_consistency_notes:
  - Conservé el singular genérico con 'el que' para reflejar la construcción griega.
  - Usé 'campo' y no un término más técnico, porque ἀγρός aquí es directo y contextual.
  - '''Manto'' comunica la prenda exterior con dignidad; la nota permite la alternativa semántica documentada.'
  - '''Volver atrás'' reproduce la prohibición urgente sin introducir explicaciones adicionales.'
