    text: «De repente» también puede traducirse «inesperadamente».
    reason: lexical_alternative
  - marker: b
    text: «Durmiendo» conserva el valor verbal del participio; otra posibilidad es «dormidos».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «para que, cuando venga ... no los encuentre» por «no sea que venga ... y los encuentre» para reflejar con más fidelidad y naturalidad la fuerza precautoria de μή y la relación del participio ἐλθὼν con el verbo principal, sin afectar las decisiones léxicas válidas de «de repente» y «durmiendo».
