review_pass:
  verdict: revise
  source_alignment_summary: El borrador comunica bien la advertencia de μὴ ... εὕρῃ ὑμᾶς καθεύδοντας y preserva adecuadamente «de repente» / «durmiendo». Sin embargo, «para que, cuando venga de repente, no los encuentre...» introduce una subordinación final + temporal más expansiva y menos directa que la cautela compacta de μή. La opción española más fiel y natural aquí es «no sea que venga de repente y los encuentre durmiendo».
  spanish_quality_summary: El español es claro y legible, pero la secuencia «para que, cuando venga de repente, no los encuentre» suena algo armada y menos idiomática en una advertencia independiente dependiente del imperativo previo. «No sea que» suena más natural, sobrio y cercano a la fuerza exhortativa del texto. También conviene mantener los marcadores de nota exactamente anclados en las palabras pertinentes.
  glossary_alignment: No hay términos del glosario mayor en juego. Las decisiones «de repente» para ἐξαίφνης y «durmiendo» para καθεύδοντας concuerdan con el expediente inglés y con un español natural. El ajuste principal es sintáctico para representar mejor μή.
  issues:
  - severity: medium
    issue: La expresión de μή como «para que ... no» debilita y complica la advertencia.
    rationale: En este contexto exhortativo, μή depende del mandato anterior con sentido precautorio. En español bíblico natural, «no sea que» refleja mejor la advertencia que «para que ... no», especialmente cuando el borrador además añade «cuando venga».
  - severity: low
    issue: «Cuando venga» sobretraduce el participio ἐλθὼν en una construcción más interpretativa.
    rationale: El griego usa participio adverbial ligado a «encuentre». En español, coordinar «venga ... y encuentre» conserva mejor la fluidez y evita una subordinada temporal innecesaria.
  revised_spanish_text: no sea que venga de repente[a] y los encuentre durmiendo[b].
  revised_footnotes:
