translation:
  language: es
  text: no sea que venga de repente[a] y los encuentre durmiendo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «De repente» también puede traducirse «inesperadamente».
    reason: lexical_alternative
  - marker: b
    text: «Durmiendo» conserva el valor verbal del participio; otra posibilidad es «dormidos».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ
  english_pob_choice: lest
  chosen_spanish: para que no
  alternatives_spanish:
  - no sea que
  - de modo que no
  lexicon: BDAG
  rationale: En español, la finalidad negativa de advertencia se expresa con naturalidad mediante «para que no» o «no sea que». Aquí se prefiere «para que no» para conservar la fuerza cautelar compacta del griego y el valor dependiente de μή sin volver la frase pesada.
- source_word: ἐλθὼν
  english_pob_choice: coming
  chosen_spanish: venga
  alternatives_spanish:
  - habiendo venido
  - cuando venga
  lexicon: BDAG
  rationale: 'El participio aoristo adverbial de ἔρχομαι se vierte de forma natural con un verbo finito en español dentro de la subordinada temporal: «cuando venga». Integrado en la cláusula, «venga» transmite bien la llegada del sujeto sin forzar un gerundio menos idiomático.'
- source_word: ἐξαίφνης
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - inesperadamente
  lexicon: BDAG
  rationale: El adverbio indica irrupción súbita. «De repente» es una equivalencia directa, clara y ampliamente inteligible en español; «inesperadamente» desplaza el matiz hacia la expectativa del receptor más que hacia la brusquedad del evento.
- source_word: εὕρῃ
  english_pob_choice: he find
  chosen_spanish: los encuentre
  alternatives_spanish:
  - los hallare
  - los hallé
  lexicon: BDAG
  rationale: 'El subjuntivo aoristo tras la construcción de advertencia se expresa naturalmente en español con subjuntivo: «encuentre». Se mantiene el objeto plural explícito («los») por el destinatario colectivo del discurso.'
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: Aunque el griego marca segunda persona plural, en español la forma verbal ya lo sostiene; el clítico «los» hace explícito el plural directo y resulta idiomático en una versión de lectura amplia. «A ustedes» es posible, pero menos fluido en esta construcción.
- source_word: καθεύδοντας
  english_pob_choice: sleeping
  chosen_spanish: durmiendo
  alternatives_spanish:
  - dormidos
  lexicon: BDAG
  rationale: El participio presente de καθεύδω conserva la idea de una acción en curso o estado al ser hallados. «Durmiendo» preserva mejor ese valor verbal que el adjetivo «dormidos», que suena más estático.
theological_decisions:
- issue: Si hacer explícito el antecedente del sujeto que viene
  english_pob_reading: Retain the pronoun 'he'
  chosen_spanish_reading: Mantener un sujeto implícito en la cláusula principal; el antecedente queda en el contexto inmediato.
  alternative_spanish_readings:
  - para que, cuando el Hijo del Hombre venga de repente, no los encuentre durmiendo
  - para que, cuando él venga de repente, no los encuentre durmiendo
  rationale: El griego no repite el antecedente en este versículo; solo usa el participio y el verbo. En español se conserva esa economía discursiva sin introducir una identificación nueva en el texto del versículo.
  doctrine_reference: Contexto narrativo inmediato de Marcos 13; coherencia discursiva y no adición interpretativa
- issue: Cómo reproducir la advertencia negativa de μή en una oración final
  english_pob_reading: lest he come suddenly and find you sleeping
  chosen_spanish_reading: «para que no» como marcador de prevención/advertencia
  alternative_spanish_readings:
  - no sea que venga de repente y los encuentre durmiendo
  - para que no venga de repente y los encuentre durmiendo
  rationale: La construcción española elegida preserva el matiz de prevención sin convertir la frase en una paráfrasis. «No sea que» también es válida, pero «para que no» encaja mejor con el estilo sobrio y directo del pasaje.
  doctrine_reference: Sintaxis de advertencia en textos exhortativos; correspondencia funcional de μή
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego de Marcos 13:36 y el audit trail inglés: se conservó la advertencia compacta de μή, el matiz súbito de ἐξαίφνης y el participio presente de καθεύδω como acción en curso. Se evitó expandir el sujeto de ‘venir’ porque el original no lo repite en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo «durmiendo» para reflejar el participio presente, en línea con el tratamiento verbal del original.
  - No se usó «SEÑOR» ni «Cristo», porque este versículo no contiene esos términos.
  - La puntuación busca una sola cláusula final fluida, equivalente al tono exhortativo del griego.
