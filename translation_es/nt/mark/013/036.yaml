  rationale: Se reemplaza «para que, cuando venga ... no los encuentre» por «no sea que venga ... y los encuentre» para reflejar con más fidelidad y naturalidad la fuerza precautoria de μή y la relación del participio ἐλθὼν con el verbo principal, sin afectar las decisiones léxicas válidas de «de repente» y «durmiendo».
