    rationale: Es comprensible y fiel al genitivo absoluto, pero suena algo rígida. «Mientras estaba sentado» conserva el valor circunstancial en español más natural.
  - severity: low
    issue: «aparte» frente a «en privado»
    rationale: «Aparte» es posible, pero «en privado» representa con mayor precisión κατ’ ἰδίαν en un registro más natural y eclesialmente claro.
