    issue: Tiempo verbal principal «le preguntaban»
    rationale: Aunque el inglés auditado originalmente consideró el imperfectivo, la revisión final adoptó «asked», y en español narrativo aquí el pretérito «le preguntaron» preserva mejor la acción principal sin crear una impresión de duración innecesaria.
  - severity: low
