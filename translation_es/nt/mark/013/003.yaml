translation:
  language: es
  text: Y mientras estaba sentado en el Monte de los Olivos, enfrente del templo[a], Pedro, Santiago, Juan y Andrés le preguntaron en privado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior (ναός).
    reason: lexical_alternative
lexical_decisions:
- source_word: καθημένου αὐτοῦ
  english_pob_choice: as he was sitting
  chosen_spanish: estando él sentado
  alternatives_spanish:
  - mientras él estaba sentado
  - cuando estaba sentado
  lexicon: BDAG
  rationale: El participio genitivo con valor circunstancial expresa una acción en curso; en español, «estando él sentado» conserva ese trasfondo aspectual sin sonar forzado.
- source_word: εἰς τὸ Ὄρος τῶν Ἐλαιῶν
  english_pob_choice: on the Mount of Olives
  chosen_spanish: en el Monte de los Olivos
  alternatives_spanish:
  - sobre el Monte de los Olivos
  - en el monte de los Olivos
  lexicon: BDAG
  rationale: Es el nombre geográfico habitual. Aunque εἰς puede ser literalmente «a/ hacia», aquí funciona idiomáticamente para ubicación; «en el Monte de los Olivos» es natural y fiel.
- source_word: κατέναντι τοῦ ἱεροῦ
  english_pob_choice: opposite the temple
  chosen_spanish: enfrente del templo
  alternatives_spanish:
  - frente al templo
  - al otro lado del templo
  lexicon: BDAG
  rationale: κατέναντι indica posición opuesta o de frente. «Templo» reproduce bien ἱερόν como complejo del templo, sin restringirlo indebidamente al santuario interior.
- source_word: ἐπηρώτα
  english_pob_choice: asked
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntó
  - le estaba preguntando
  lexicon: BDAG
  rationale: El imperfecto aporta acción en desarrollo. En español, el imperfecto «preguntaban» conserva mejor ese matiz que un pretérito simple; el objeto directo indirecto se expresa con claridad mediante «le».
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - privadamente
  lexicon: BDAG
  rationale: La expresión significa en privado o sin otros presentes. «Aparte» es breve, natural y comunica bien la separación respecto de la multitud.
- source_word: Πέτρος καὶ Ἰάκωβος καὶ Ἰωάννης καὶ Ἀνδρέας
  english_pob_choice: Peter and James and John and Andrew
  chosen_spanish: Pedro, Santiago, Juan y Andrés
  alternatives_spanish:
  - Pedro y Santiago y Juan y Andrés
  lexicon: N/A
  rationale: Los nombres se transliteran con las formas españolas usuales. En español, la repetición de «y» en serie extensa suele sonar menos natural que en griego, por lo que se usa la coordinación estándar.
theological_decisions:
- issue: Sentido de ἱερόν
  english_pob_reading: Greek ἱερόν refers to the temple complex or precincts, not specifically the inner sanctuary (ναός).
  chosen_spanish_reading: «Templo» se entiende como el complejo o recinto del templo, no como el santuario interior.
  alternative_spanish_readings:
  - «santuario»
  - «recinto del templo»
  rationale: El griego distingue ἱερόν del espacio más interno, ναός. Mantener «templo» evita una restricción injustificada y conserva la amplitud semántica documentada en el audit trail.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: El inglés auditado pasó de «were asking» a «asked» para reflejar mejor el aoristo griego, pero el texto griego de base en esta ficha es el imperfecto ἐπηρώτα. Por eso la versión española conserva el imperfectivo con «le preguntaban», manteniendo fidelidad al texto fuente proporcionado y sin seguir mecánicamente la última revisión inglesa cuando esta no coincide con el griego aquí presentado.
  spanish_consistency_notes:
  - Se mantuvo «Y» inicial para reproducir la conexión narrativa del griego.
  - Se prefirió «Monte de los Olivos» como topónimo tradicional y claro en español.
  - «Le preguntaban aparte» conserva el imperfecto y la idea de privacidad sin introducir explicaciones ajenas al texto.
