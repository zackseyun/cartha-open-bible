  to: Y mientras estaba sentado en el Monte de los Olivos, enfrente del templo[a], Pedro, Santiago, Juan y Andrés le preguntaron en privado.
  rationale: Se ajusta el verbo principal a pretérito narrativo («le preguntaron») para una mejor correspondencia con la revisión inglesa auditada y con el flujo natural del español. Se suaviza la apertura circunstancial a «mientras estaba sentado» y se cambia «aparte» por «en privado» para mayor claridad y dignidad estilística, sin alterar el sentido fuente.
