revisions:
- from: Pero estén alerta ustedes mismos. Los entregarán a concilios[a], y serán golpeados en las sinagogas, y estarán delante de gobernadores y reyes por causa de mí, como testimonio para ellos.
  to: Pero estén alerta ustedes mismos. Los entregarán a consejos[a], y serán golpeados en las sinagogas, y comparecerán ante gobernadores y reyes por causa de mí, como testimonio[b] para ellos.
  rationale: 'La revisión hace ajustes menores pero importantes: reemplaza «concilios» por «consejos» para evitar una connotación eclesiástica no exigida por συνέδρια; cambia «estarán delante de» por «comparecerán ante» para expresar con más naturalidad la comparecencia formal implícita en σταθήσεσθε; y añade una nota al testimonio para preservar la alternativa «contra ellos» documentada en la auditoría inglesa, manteniendo el texto principal en la lectura menos interpretativamente cargada.'
