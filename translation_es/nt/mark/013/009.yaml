review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: advertencia a vigilarse, entrega a autoridades, golpiza en sinagogas, comparecencia ante gobernadores y reyes por causa de Jesús, y propósito de testimonio. Sin embargo, dos elecciones requieren ajuste para mayor fidelidad y naturalidad: «concilios» suena eclesiástico en español y no comunica bien los cuerpos judiciales locales de συνέδρια; y «como testimonio para ellos» es menos idiomático que una formulación con «de testimonio ante/a ellos», preservando mejor la ambigüedad documentada.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «concilios» puede inducir una lectura anacrónica o eclesiástica, y «estarán delante de» resulta menos preciso que «comparecerán ante» o «serán llevados ante» para el contexto judicial. Conviene una leve pulida para mejorar inteligibilidad y registro sin alejarse del texto fuente.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave «sinagogas», «gobernadores», «reyes» y «testimonio» están alineados. La principal corrección léxica es sustituir «concilios» por «consejos» o «tribunales» para συνέδρια en este contexto.
  issues:
  - severity: medium
    issue: «concilios» para συνέδρια
    rationale: En español bíblico contemporáneo «concilio» suele evocar un concilio eclesiástico o, en singular, el Sanedrín. El plural griego aquí apunta más ampliamente a consejos o tribunales locales; «consejos» o «tribunales» evita sobrelectura.
  - severity: low
    issue: «estarán delante de» para σταθήσεσθε ἐπὶ ...
    rationale: Aunque no es incorrecto, suena estático. En contexto de comparecencia judicial, «comparecerán ante» comunica mejor el valor de ser puestos/presentados ante autoridades.
  - severity: low
    issue: «como testimonio para ellos»
    rationale: Es comprensible, pero menos natural en español que «como testimonio ante ellos» o «para dar testimonio a ellos». Además, conviene reflejar en nota la alternativa «contra ellos» documentada en el inglés.
  revised_spanish_text: Pero estén alerta ustedes mismos. Los entregarán a consejos[a], y serán golpeados en las sinagogas, y comparecerán ante gobernadores y reyes por causa de mí, como testimonio[b] para ellos.
  revised_footnotes:
  - marker: a
    text: O «tribunales»; el plural griego puede referirse a cuerpos locales de juicio o gobierno, no sólo al Sanedrín de Jerusalén.
    reason: alternative_reading
  - marker: b
    text: O «para dar testimonio a ellos»; la frase también puede entenderse como «como testimonio contra ellos».
    reason: alternative_reading
  revision_rationale: 'La revisión hace ajustes menores pero importantes: reemplaza «concilios» por «consejos» para evitar una connotación eclesiástica no exigida por συνέδρια; cambia «estarán delante de» por «comparecerán ante» para expresar con más naturalidad la comparecencia formal implícita en σταθήσεσθε; y añade una nota al testimonio para preservar la alternativa «contra ellos» documentada en la auditoría inglesa, manteniendo el texto principal en la lectura menos interpretativamente cargada.'
