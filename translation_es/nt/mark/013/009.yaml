translation:
  language: es
  text: Pero estén alerta ustedes mismos. Los entregarán a consejos[a], y serán golpeados en las sinagogas, y comparecerán ante gobernadores y reyes por causa de mí, como testimonio[b] para ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tribunales»; el plural griego puede referirse a cuerpos locales de juicio o gobierno, no sólo al Sanedrín de Jerusalén.
    reason: alternative_reading
  - marker: b
    text: O «para dar testimonio a ellos»; la frase también puede entenderse como «como testimonio contra ellos».
    reason: alternative_reading
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: watch
  chosen_spanish: estén alerta
  alternatives_spanish:
  - vigilen
  - estén atentos
  - cuiden de sí mismos
  lexicon: BDAG
  rationale: El imperativo presente pide vigilancia continua. «Estén alerta» transmite la advertencia con naturalidad en español y conserva el sentido de atención constante sin sonar arcaico.
- source_word: ὑμεῖς ἑαυτούς
  english_pob_choice: yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - a ustedes mismos
  - por ustedes mismos
  - ustedes
  lexicon: BDAG
  rationale: El griego añade énfasis reflexivo. «Ustedes mismos» conserva ese refuerzo y mantiene el sujeto explícito en español.
- source_word: παραδώσουσιν
  english_pob_choice: hand ... over
  chosen_spanish: los entregarán
  alternatives_spanish:
  - los pondrán en manos de
  - los remitirán
  - los traicionarán
  lexicon: BDAG
  rationale: En este contexto judicial/persecutorio, παραδίδωμι significa ser puesto en manos de autoridades. «Entregarán» reproduce ese valor jurídico de forma idiomática en español.
- source_word: συνέδρια
  english_pob_choice: councils
  chosen_spanish: concilios
  alternatives_spanish:
  - consejos
  - tribunales
  - asambleas judiciales
  lexicon: BDAG
  rationale: El plural indica cuerpos locales de juicio o gobierno, no necesariamente el Sanedrín de Jerusalén únicamente. «Concilios» conserva la idea de consejos judiciales sin restringir indebidamente el referente.
- source_word: συναγωγὰς
  english_pob_choice: synagogues
  chosen_spanish: las sinagogas
  alternatives_spanish:
  - sinagogas
  - reuniones judías
  - casas de reunión
  lexicon: BDAG
  rationale: Es el término institucional normal en español y preserva el lugar concreto donde ocurriría el castigo.
- source_word: δαρήσεσθε
  english_pob_choice: you will be beaten
  chosen_spanish: serán golpeados
  alternatives_spanish:
  - serán azotados
  - serán flagelados
  - serán castigados a golpes
  lexicon: BDAG
  rationale: El verbo denota golpiza física. «Serán golpeados» es claro y amplio; evita especificar una forma de castigo más precisa de lo que exige el griego.
- source_word: ἐπὶ ἡγεμόνων καὶ βασιλέων
  english_pob_choice: before governors and kings
  chosen_spanish: delante de gobernadores y reyes
  alternatives_spanish:
  - ante gobernadores y reyes
  - en presencia de gobernadores y reyes
  - frente a gobernadores y reyes
  lexicon: BDAG
  rationale: Con verbos de comparecer, ἐπί con genitivo expresa comparecencia ante autoridades. «Delante de» comunica bien la escena formal y solemne en español.
- source_word: σταθήσεσθε
  english_pob_choice: you will stand before
  chosen_spanish: estarán
  alternatives_spanish:
  - comparecerán
  - serán puestos en pie
  - se presentarán
  lexicon: BDAG
  rationale: El futuro pasivo de ἵστημι puede implicar ser puestos de pie o comparecer ante autoridades. En español, «estarán delante de» incorpora la idea de comparecencia sin recargar la frase.
- source_word: ἕνεκεν ἐμοῦ
  english_pob_choice: because of me
  chosen_spanish: por causa de mí
  alternatives_spanish:
  - a causa de mí
  - por mi causa
  - debido a mí
  lexicon: BDAG
  rationale: La expresión causal indica que la razón de la persecución es su lealtad a Jesús. «Por causa de mí» es natural y fiel, y evita la carga más tradicional de «por amor de mí».
- source_word: εἰς μαρτύριον αὐτοῖς
  english_pob_choice: as a testimony to them
  chosen_spanish: como testimonio para ellos
  alternatives_spanish:
  - como testimonio ante ellos
  - como testimonio contra ellos
  - para dar testimonio a ellos
  lexicon: BDAG
  rationale: μαρτύριον puede ser testimonio o testimonio/witness. «Para ellos» conserva la dirección del testimonio sin imponer una lectura condenatoria que el griego no exige explícitamente.
theological_decisions:
- issue: Fuerza de εἰς μαρτύριον αὐτοῖς
  english_pob_reading: The disciples' compelled appearances before rulers function as testimony to those rulers.
  chosen_spanish_reading: Las comparecencias forzadas ante autoridades funcionan como testimonio dirigido a ellas.
  alternative_spanish_readings:
  - funcionan como testimonio contra ellas
  - sirven como testimonio en su contra
  rationale: El texto destaca que la persecución se convierte en ocasión de testimonio. La frase puede implicar oposición, pero no la exige de forma explícita; por eso se preserva la amplitud del sentido.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla de antemano.
translation_notes:
  revision_awareness: Se siguió el estado más reciente del archivo, que indica ausencia de cambios sustanciales en la última revisión y alta concordancia entre revisores. La redacción española se ajusta al griego y al trazado auditado en inglés sin introducir paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió una formulación neutral y pública para «concilios» en lugar de «sanedrines», porque el plural griego es más amplio.
  - Se conservó el valor relacional de μαρτύριον como «testimonio» sin forzar el matiz adversativo.
