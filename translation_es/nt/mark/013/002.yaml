base_translation:
  language: en
  yaml_path: translation/nt/mark/013/002.yaml
  text: And Jesus said to him[c][b][a], “Do you see these great buildings? Not one stone will be left here upon another that will not be torn down.”
  footnotes:
  - marker: a
    text: Or 'these great temple buildings.' The context is the temple complex, though the Greek simply says 'buildings.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'not one stone ... upon another' is an idiom for complete destruction.
    reason: cultural_note
  - marker: c
    text: Or 'be destroyed' or 'be thrown down.'
    reason: lexical_alternative
