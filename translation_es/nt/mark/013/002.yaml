translation:
  language: es
  text: 'Y Jesús le dijo: «¿Ves estos grandes edificios?[a] No quedará aquí piedra sobre piedra que no sea derribada.[b][c]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas grandes construcciones». El contexto es el complejo del templo, aunque el griego dice simplemente «edificios».
    reason: lexical_alternative
  - marker: b
    text: La expresión «piedra sobre piedra» es un modismo que indica destrucción total.
    reason: cultural_note
  - marker: c
    text: O «sea destruida» o «sea demolida».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ ὁ Ἰησοῦς εἶπεν αὐτῷ
  english_pob_choice: And Jesus said to him
  chosen_spanish: Y Jesús le dijo
  alternatives_spanish:
  - Entonces Jesús le dijo
  - Jesús le respondió
  lexicon: BDAG
  rationale: Se conserva la introducción narrativa simple de καί + εἶπεν αὐτῷ sin añadir una implicación de respuesta que el griego no exige. El clítico «le» refleja el dativo de destinatario.
- source_word: Βλέπεις
  english_pob_choice: Do you see
  chosen_spanish: ¿Ves
  alternatives_spanish:
  - ¿Estás viendo
  - ¿Miras
  lexicon: BDAG
  rationale: El presente interrogativo se vierte de forma natural con «¿Ves?», manteniendo la fuerza directa de la pregunta sin volverla imperativa.
- source_word: ταύτας τὰς μεγάλας οἰκοδομάς
  english_pob_choice: these great buildings
  chosen_spanish: estos grandes edificios
  alternatives_spanish:
  - estas grandes construcciones
  - estos grandes edificios del templo
  lexicon: BDAG
  rationale: «Edificios» reproduce de manera clara y sobria οἰκοδομάς. Se evita añadir «del templo» en el texto principal porque el griego dice simplemente «edificios», aunque el contexto inmediato lo sugiera. «Grandes» conserva tanto tamaño como imponencia.
- source_word: οὐ μὴ ἀφεθῇ
  english_pob_choice: will be left
  chosen_spanish: No quedará
  alternatives_spanish:
  - No será dejado
  - No quedará de pie
  lexicon: BDAG
  rationale: En español, la negación enfática οὐ μή se comunica con naturalidad mediante «No quedará». Así se preserva la certeza de la negación sin una construcción artificial en pasiva.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - en este lugar
  lexicon: BDAG
  rationale: «Aquí» es la equivalencia más directa y natural para el adverbio locativo, manteniendo la inmediatez espacial del gesto verbal de Jesús.
- source_word: λίθος ἐπὶ λίθον
  english_pob_choice: stone ... upon another
  chosen_spanish: piedra sobre piedra
  alternatives_spanish:
  - una piedra sobre otra
  - piedra encima de piedra
  lexicon: BDAG
  rationale: Se conserva el modismo de destrucción total con una expresión natural en español. La forma compacta «piedra sobre piedra» comunica la imagen idiomática sin sobreexplicarla.
- source_word: ὃς οὐ μὴ καταλυθῇ
  english_pob_choice: that will not be torn down
  chosen_spanish: que no sea derribada
  alternatives_spanish:
  - que no sea destruida
  - que no sea demolida
  lexicon: BDAG
  rationale: «Derribada» traduce bien καταλυθῇ en el contexto de una estructura y sugiere el desmantelamiento físico del edificio. Se mantiene el sentido futuro negativo enfático mediante una subordinada relativa natural en español.
theological_decisions:
- issue: Alcance de la predicción sobre el complejo del templo
  english_pob_reading: Render οἰκοδομάς generically as 'buildings' rather than explicitly 'temple buildings' in the main text.
  chosen_spanish_reading: Traducir οἰκοδομάς como «edificios» sin añadir «del templo» en el cuerpo principal.
  alternative_spanish_readings:
  - «estos grandes edificios del templo»
  - «estas grandes construcciones del templo»
  rationale: La escena deja claro que el referente es el templo, pero el griego no lo explicita en esta palabra. Mantener el sustantivo general evita introducir una precisión interpretativa ausente del texto fuente y conserva la tensión entre la literalidad de la forma y la claridad del contexto.
  doctrine_reference: §1, primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'No se requirieron cambios respecto del último pase de revisión: se mantuvo la lectura de alta concordancia y se corrigió la inserción de las marcas de nota para que cada una aparezca anclada en el texto español.'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio y no «Cristo», conforme al griego Ἰησοῦς.
  - Se usó «edificios» para οἰκοδομάς, evitando la explicitación de «templo» en el texto principal.
  - Se prefirió «derribada» para καταλυθῇ por su naturalidad en español al hablar de una estructura.
  - La negación enfática οὐ μή se vertió de forma idiomática en español sin perder certeza.
  - Las notas al pie quedan ancladas exactamente en las expresiones correspondientes del texto.
