translation:
  language: es
  text: 'Ahora aprendan la parábola[a] de la higuera: cuando su rama ya se ha vuelto tierna y echa hojas, saben que el verano está cerca.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lección» o «ilustración» para παραβολή.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀπὸ δὲ τῆς συκῆς
  english_pob_choice: Now learn ... from the fig tree
  chosen_spanish: Ahora aprendan ... de la higuera
  alternatives_spanish:
  - Aprendan ... de la higuera
  - Aprendan la lección de la higuera
  lexicon: BDAG
  rationale: ἀπό con genitivo indica procedencia o punto de partida; en español, «de la higuera» reproduce naturalmente esa relación. δέ aporta transición discursiva ligera, y «Ahora» ayuda a marcar el cambio de enseñanza sin forzar contraste.
- source_word: μάθετε
  english_pob_choice: learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - aprendan a entender
  - tomen una lección
  lexicon: BDAG
  rationale: El imperativo aoristo de μανθάνω pide recibir instrucción. «Aprendan» es directo, claro y conserva el valor instructivo del verbo.
- source_word: τὴν παραβολήν
  english_pob_choice: the parable
  chosen_spanish: la parábola
  alternatives_spanish:
  - la lección
  - la ilustración
  lexicon: BDAG
  rationale: παραβολή en los Evangelios suele ser «parábola» o comparación ilustrativa. Mantener «parábola» conserva la terminología del texto griego y la continuidad con el uso evangélico, aunque el sentido aquí sea el de una lección ejemplar.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - cada vez que
  lexicon: BDAG
  rationale: ὅταν introduce una condición temporal general. «Cuando» expresa bien la observación proverbial en español sin añadir matices innecesarios.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - para entonces
  lexicon: BDAG
  rationale: ἤδη señala que el proceso está en marcha o ha comenzado. «Ya» preserva ese matiz de anterioridad o estado ya alcanzado.
- source_word: ὁ κλάδος αὐτῆς
  english_pob_choice: its branch
  chosen_spanish: su rama
  alternatives_spanish:
  - su rama
  - su rama principal
  - su rama/brote
  lexicon: BDAG
  rationale: κλάδος puede ser «rama» o «ramaje/brote». «Rama» es transparente en español y mantiene la imagen vegetal sin sobreespecificarla.
- source_word: ἁπαλὸς γένηται
  english_pob_choice: has already become tender
  chosen_spanish: se ha vuelto tierna
  alternatives_spanish:
  - se vuelve tierna
  - se hace tierna
  - se ha hecho tierna
  lexicon: BDAG
  rationale: ἁπαλός describe suavidad o ternura de un crecimiento nuevo. En español, «se ha vuelto tierna» comunica bien el estado alcanzado tras el proceso y evita un calco rígido.
- source_word: ἐκφύῃ τὰ φύλλα
  english_pob_choice: puts out leaves
  chosen_spanish: echa hojas
  alternatives_spanish:
  - brota hojas
  - saca hojas
  - da hojas
  lexicon: BDAG
  rationale: ἐκφύω significa brotar o producir. «Echa hojas» es una expresión natural en español para el brote de la planta y refleja con precisión la imagen.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - reconocen
  - comprenden
  lexicon: BDAG
  rationale: 'La forma griega aquí funciona como indicativo presente: afirma el conocimiento resultante del signo. «Saben» conserva esa fuerza declarativa mejor que un imperativo en español.'
- source_word: ἐγγὺς
  english_pob_choice: near
  chosen_spanish: cerca
  alternatives_spanish:
  - próximo
  - a la mano
  lexicon: BDAG
  rationale: ἐγγύς indica proximidad espacial o temporal. «Cerca» es la opción más natural y directa en español.
- source_word: τὸ θέρος
  english_pob_choice: summer
  chosen_spanish: el verano
  alternatives_spanish:
  - la estación del verano
  - la época de la siega
  lexicon: BDAG
  rationale: θέρος normalmente significa «verano». Aunque en algunos contextos puede asociarse con la cosecha, aquí la imagen de la higuera favorece el sentido estacional simple.
theological_decisions:
- issue: Sentido de παραβολή en este contexto
  english_pob_reading: Rendered as 'parable' in the main text while allowing the sense of an illustrative lesson to be carried by context.
  chosen_spanish_reading: Se mantiene «parábola» en el texto principal, con el sentido de una comparación instructiva implícito en el contexto.
  alternative_spanish_readings:
  - lección
  - ilustración
  rationale: El texto usa terminología evangélica estándar y no exige una distinción técnica adicional. Conservar «parábola» preserva la continuidad léxica y no introduce detalles allegóricos ajenos al pasaje.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave, o excepción documentada)
translation_notes:
  revision_awareness: El estado de revisión más reciente indica que no hubo cambios necesarios; el borrador se alinea con el texto inglés POB y el griego SBLGNT, sin revisiones aplicadas en el historial inmediato.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene la distinción natural entre «parábola» como término evangélico y su valor explicativo en contexto.
  - 'El orden y la imaginería siguen de cerca el griego, pero con español idiomático: «echa hojas», «se ha vuelto tierna», «el verano está cerca».'
