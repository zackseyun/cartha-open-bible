    rationale: El audit trail documenta una decisión deliberada por el sentido literal de εὐαγγέλιον. En español, «la buena noticia» preserva mejor esa decisión; «evangelio» debe quedar como alternativa tradicional en nota.
  - severity: low
    issue: Ubicación de «primero» puede mejorarse
    rationale: «Sea proclamado primero» es aceptable, pero «primero es necesario que...» refleja con más naturalidad en español la prioridad temporal de πρῶτον ligada a toda la necesidad/proclamación antes del fin.
  revised_spanish_text: Y primero es necesario que la buena noticia[a] sea proclamada a todas las naciones[b].
