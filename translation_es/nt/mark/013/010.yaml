translation:
  language: es
  text: Y primero es necesario que la buena noticia[a] sea proclamada a todas las naciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el evangelio». El griego εὐαγγέλιον significa literalmente «buena noticia».
    reason: lexical_alternative
  - marker: b
    text: O «entre todas las naciones»; ἔθνη también puede significar «gentiles» en algunos contextos.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y también
  alternatives_spanish:
  - Y
  - Y además
  lexicon: BDAG
  rationale: καὶ continúa el discurso; en español, «Y» mantiene la conexión. «También» refuerza la continuidad narrativa sin alterar el sentido.
- source_word: εἰς πάντα τὰ ἔθνη
  english_pob_choice: to all the nations
  chosen_spanish: a todas las naciones
  alternatives_spanish:
  - entre todas las naciones
  - a todos los pueblos
  - a los gentiles
  lexicon: BDAG
  rationale: εἰς con κηρυχθῆναι puede indicar dirección o alcance. «A todas las naciones» preserva el alcance universal y la amplitud étnico-geográfica de ἔθνη sin estrecharlo prematuramente a «gentiles».
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: πρῶτον expresa prioridad temporal. «Primero» es la forma más natural y fiel para indicar secuencia.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario que
  alternatives_spanish:
  - debe
  - tiene que
  - es menester que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. «Es necesario que» conserva el matiz de necesidad sin agregar explícitamente una formulación doctrinal ajena al texto.
- source_word: κηρυχθῆναι
  english_pob_choice: be proclaimed
  chosen_spanish: sea proclamado
  alternatives_spanish:
  - sea predicado
  - sea anunciado
  - sea pregonado
  lexicon: BDAG
  rationale: κηρύσσω denota proclamación pública. «Sea proclamado» reproduce bien ese carácter formal y público, más cerca de «be proclaimed» que de «predicado» en algunos contextos eclesiales.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the good news
  chosen_spanish: el evangelio
  alternatives_spanish:
  - las buenas nuevas
  - la buena noticia
  lexicon: BDAG
  rationale: Aunque εὐαγγέλιον literalmente significa «buena noticia», en español «evangelio» es el término más asentado y también conserva la tensión entre sentido literal y término eclesial. El contexto permite su uso sin perder claridad.
theological_decisions:
- issue: Alcance de ἔθνη
  english_pob_reading: all the nations
  chosen_spanish_reading: a todas las naciones
  alternative_spanish_readings:
  - entre todas las naciones
  - a los gentiles
  - a todas las etnias
  rationale: La frase mantiene la amplitud universal del anuncio sin resolver la posible referencia más estrecha a «gentiles». «A todas las naciones» preserva la tensión interpretativa y sigue de cerca el audit trail inglés.
  doctrine_reference: Preservar la tensión lexical sin imponer una reducción doctrinal o etnográfica.
- issue: Fuerza de δεῖ
  english_pob_reading: must
  chosen_spanish_reading: es necesario que
  alternative_spanish_readings:
  - debe
  - tiene que
  rationale: La necesidad expresada por δεῖ puede implicar necesidad divina o escatológica en Marcos, pero aquí no se explicita. «Es necesario que» conserva la fuerza del verbo sin añadir una explicación no dada por el texto.
  doctrine_reference: No importar afirmaciones doctrinales que el texto no formula explícitamente.
translation_notes:
  revision_awareness: 'El texto inglés y las decisiones auditadas muestran estabilidad: no hubo revisiones aplicadas y el último pase marcó el contenido como sin cambios. La versión española sigue ese mismo perfil, manteniendo las dos tensiones documentadas: εὐαγγέλιον como término eclesial frente a su sentido literal, y ἔθνη como «naciones» con posible lectura de «gentiles».'
  spanish_consistency_notes:
  - Se conserva «evangelio» en el cuerpo principal por inteligibilidad y tradición recibida, pero se documenta la alternativa literal en nota.
  - Se usa «a todas las naciones» para reflejar el alcance universal, evitando una traducción que cierre prematuramente la posible lectura de «gentiles».
  - «Es necesario que» reproduce el valor de necesidad de δεῖ sin intensificarlo innecesariamente.
  - «Sea proclamado» mantiene el matiz público y formal de κηρύσσω.
