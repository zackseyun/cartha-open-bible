  rationale: Se corrige la colocación de notas para cumplir la disciplina editorial y se ajusta πλανήσῃ a «desvíe» para preservar mejor la combinación de engaño y extravío presente en el griego y documentada en la auditoría inglesa. La alternativa «engañe» se mantiene en nota, ya que también es un sentido léxico válido. «Tengan cuidado de que...» mejora la naturalidad del español sin apartarse del imperativo de vigilancia de βλέπετε.
