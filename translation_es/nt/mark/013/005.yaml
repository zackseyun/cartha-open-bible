review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la progresión narrativa de δέ («Entonces»), conserva «comenzó a decirles» para ἤρξατο λέγειν αὐτοῖς, y mantiene el destinatario pronominal sin añadir «discípulos». Sin embargo, la traducción principal de μή τις ὑμᾶς πλανήσῃ como «nadie los engañe» estrecha un poco el sentido de πλανήσῃ, que en el contexto y según la auditoría inglesa incluye no solo engaño sino desvío/extravío. Además, el uso de marcadores [a] en el texto actual es defectuoso: uno aparece al inicio de la cita sin anclar una palabra concreta, y el segundo se repite indebidamente.'
  spanish_quality_summary: El español es legible y natural, pero «Cuídense de que...» suena menos directo y menos idiomático que una advertencia como «Tengan cuidado de que...» o «Estén atentos para que...». También hay un problema formal serio con la colocación y reutilización del marcador de nota. Una leve revisión mejora naturalidad, fidelidad semántica y disciplina editorial.
  glossary_alignment: 'No hay términos del glosario mayor en juego salvo «Jesús», correctamente usado. La principal cuestión léxica es πλανήσῃ: conviene reflejar mejor la idea de extraviar/desviar además de engañar. La nota léxica inglesa preserva la alternativa «deceive you», por lo que en español es apropiado mantener una nota con «engañe» como alternativa si el texto principal usa «desvíe».'
  issues:
  - severity: high
    issue: Los marcadores de nota [a] están mal usados en el texto español.
    rationale: Hay un [a] al inicio de la cita sin anclaje léxico claro y otro [a] repetido en «los[a]». Las instrucciones exigen marcadores únicos y anclados exactamente donde corresponde.
  - severity: medium
    issue: «nadie los engañe» reduce parcialmente el alcance de πλανήσῃ.
    rationale: Según la evidencia fuente y la decisión teológica inglesa, πλανάω incluye la idea de desviar/extraviar, no solo engañar intelectualmente. Conviene que el texto principal conserve esa amplitud.
  - severity: low
    issue: «Cuídense de que...» no es la opción más natural para este tipo de advertencia en español bíblico contemporáneo.
    rationale: Aunque comprensible, «Tengan cuidado de que...» o «Estén atentos para que...» suenan más idiomáticos y encajan mejor con una advertencia continua.
  revised_spanish_text: 'Entonces Jesús comenzó a decirles: «Tengan cuidado de que nadie los desvíe[a]».'
  revised_footnotes:
