translation:
  language: es
  text: 'Entonces Jesús comenzó a decirles: «Tengan cuidado de que nadie los desvíe[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los engañe».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ es un conector leve de transición. «Entonces» comunica bien el avance narrativo en español sin cargar una oposición que el griego no exige.
- source_word: ἤρξατο λέγειν
  english_pob_choice: began to say
  chosen_spanish: comenzó a decir
  alternatives_spanish:
  - empezó a decir
  - comenzó a hablar
  lexicon: BDAG
  rationale: La perífrasis narrativa se conserva de manera natural en español. «Comenzó a decir» sigue de cerca la construcción griega sin introducir elementos ausentes.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a sus discípulos
  lexicon: BDAG
  rationale: El pronombre se mantiene pronominal en español; el contexto identifica a los destinatarios, pero el griego dice simplemente «a ellos». No se añade «discípulos» al texto principal.
- source_word: Βλέπετε
  english_pob_choice: See to it
  chosen_spanish: Cuídense
  alternatives_spanish:
  - Estén atentos
  - Vigilen
  lexicon: BDAG
  rationale: El imperativo de vigilancia pide una forma natural en español que exprese atención continua. «Cuídense» transmite la advertencia y funciona bien con la cláusula siguiente sin sonar arcaico.
- source_word: μή τις ὑμᾶς πλανήσῃ
  english_pob_choice: that no one leads you astray
  chosen_spanish: de que nadie los engañe
  alternatives_spanish:
  - para que nadie los desvíe
  - de que nadie los haga errar
  lexicon: BDAG
  rationale: 'πλανήσῃ incluye la idea de extraviar, hacer errar y engañar. «Engañe» conserva con claridad el sentido de fraude y desviación; «los» refleja el plural de ὑμᾶς. La construcción con «de que» es idiomática tras «Cuídense». '
theological_decisions:
- issue: Alcance de πλανήσῃ
  english_pob_reading: A warning against deception that results in being led off the right path
  chosen_spanish_reading: Una advertencia contra el engaño que puede apartarlos del camino correcto
  alternative_spanish_readings:
  - Una advertencia solo contra falsedad intelectual
  - Una advertencia meramente informativa
  rationale: El verbo πλανάω no se limita a una mentira verbal; también implica desvío o extravío. El español «engañe» permite conservar esa amplitud sin debilitar la advertencia moral y espiritual del pasaje.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase: no hubo cambios de revisión y el acuerdo del control cruzado fue alto. Se mantuvo la transición narrativa de δέ, la perífrasis iniciada por ἤρξατο λέγειν y el matiz de advertencia amplia en πλανήσῃ.'
  spanish_consistency_notes:
  - Se preservó el pronombre de segunda persona plural en «los» para reflejar ὑμᾶς.
  - No se añadió «discípulos» en el cuerpo principal, aunque el contexto lo sugiera.
  - Se evitó «sean engañados» porque el griego enfatiza la acción de extraviar/engañar más que un estado pasivo abstracto.
