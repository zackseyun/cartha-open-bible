translation:
  language: es
  text: Y las estrellas estarán cayendo del cielo[a], y los poderes[b] en los cielos serán sacudidos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del firmamento». El griego οὐρανός puede significar «cielo» o «firmamento/cielo visible» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Los poderes en los cielos» puede referirse a poderes celestiales, fuerzas cósmicas o a las estructuras de los cielos; el griego no es más específico.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀστέρες
  english_pob_choice: stars
  chosen_spanish: estrellas
  alternatives_spanish:
  - astros
  - estrellas del cielo
  lexicon: BDAG
  rationale: El sentido ordinario y cósmico de ἀστέρες se conserva con «estrellas». «Astros» sería posible, pero menos natural y algo más técnico en español general.
- source_word: ἔσονται ... πίπτοντες
  english_pob_choice: will be falling
  chosen_spanish: caerán
  alternatives_spanish:
  - estarán cayendo
  - caerán cayendo
  lexicon: BDAG
  rationale: El griego expresa una acción futura con participio presente; en español, «caerán» comunica con claridad el movimiento futuro sin forzar una perífrasis poco natural. La idea de proceso queda implícita por el contexto apocalíptico.
- source_word: ἐκ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo
  - de los cielos
  lexicon: BDAG
  rationale: Aquí «οὐρανός» admite «cielo» o «cielos». En español, «del cielo» resulta natural y mantiene bien la imagen cósmica; «cielos» sonaría más literal al plural griego, pero menos idiomático en esta frase.
- source_word: δυνάμεις
  english_pob_choice: powers
  chosen_spanish: potestades
  alternatives_spanish:
  - poderes
  - fuerzas
  - huestes
  lexicon: BDAG
  rationale: «Potestades» conserva el sentido de poderes/autoridades celestiales sin decidir si son seres angelicales, fuerzas cósmicas o estructuras celestes. «Poderes» sería más directo, pero en español puede sonar más abstracto y menos marcado como entidad.
- source_word: αἱ ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: que están en los cielos
  alternatives_spanish:
  - en los cielos
  - celestiales
  lexicon: BDAG
  rationale: Se mantiene el plural con «los cielos» para reflejar τοῖς οὐρανοῖς. La relativa «que están en» ayuda a unir naturalmente el sustantivo con su localización sin introducir interpretación adicional.
- source_word: σαλευθήσονται
  english_pob_choice: will be shaken
  chosen_spanish: serán sacudidas
  alternatives_spanish:
  - serán conmovidas
  - temblarán
  lexicon: BDAG
  rationale: «Serán sacudidas» reproduce bien el futuro pasivo y la imagen de inestabilidad/convulsión. «Conmovidas» es posible, pero menos concreto; «temblarán» cambia ligeramente el matiz pasivo.
theological_decisions:
- issue: Sentido de «las potestades que están en los cielos»
  english_pob_reading: Rendered generically as 'the powers in the heavens' without specifying whether these are angelic beings, celestial bodies, or cosmic structures.
  chosen_spanish_reading: «Las potestades que están en los cielos» se deja igualmente abierto, sin precisar si son seres celestiales, fuerzas cósmicas o estructuras del firmamento.
  alternative_spanish_readings:
  - las potestades celestiales
  - las fuerzas de los cielos
  - los poderes del cielo
  rationale: El griego es deliberadamente amplio, y el contexto apocalíptico no obliga a resolver la referencia. La redacción española conserva esa tensión interpretativa en lugar de cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el audit trail inglés, sin cambios de revisión relevantes; se conserva la ambigüedad semántica de οὐρανός y δυνάμεις.
  spanish_consistency_notes:
  - Se usó «cielo/cielos» de manera coherente con el valor cosmológico de οὐρανός en este contexto apocalíptico.
  - Se evitó «SEÑOR» u otras sustituciones no pertinentes, dado que no aparece el nombre divino en este versículo.
  - Se preservó la ambigüedad de δυνάμεις con una solución española que no fuerza una interpretación angelológica exclusiva.
