revisions:
- from: Y las estrellas caerán del cielo[a], y las potestades[b] que están en los cielos serán sacudidas.
  to: Y las estrellas estarán cayendo del cielo[a], y los poderes[b] en los cielos serán sacudidos.
  rationale: La revisión preserva mejor la perífrasis futura griega con «estarán cayendo», usa «poderes» para mantener la amplitud semántica de δυνάμεις sin sobreinterpretar, simplifica la frase preposicional a «en los cielos», y corrige las notas para reflejar con más precisión las alternativas léxicas y la ambigüedad documentadas en el POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:40:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: estrellas, procedencia del cielo, y sacudimiento de las potencias/poderes celestiales. Sin embargo, no preserva suficientemente la fuerza aspectual de ἔσονται ... πίπτοντες, que el audit trail inglés documenta como perífrasis futura vívida (''will be falling''). Además, la nota a sobre οὐρανός introduce una alternativa incorrecta en este lugar al contrastar «cielo» con «cielos» en vez de la distinción pertinente «cielo»/«firmamento» o «cielo»/«cielos» según contexto semántico; y «potestades» suena más interpretativo y eclesiástico que el más amplio y transparente «poderes».'
  spanish_quality_summary: El español es claro y digno, pero «potestades» resulta menos natural para lectura general y puede sugerir seres angelicales más que conservar la ambigüedad. «Que están en los cielos» es comprensible, aunque más cercano y limpio es «en los cielos». Para reproducir mejor la vividez apocalíptica sin sonar torpe, «estarán cayendo» funciona bien en español bíblico contemporáneo.
  glossary_alignment: 'No hay conflictos con términos del glosario principal. La principal decisión léxica a ajustar es δύναμεις: «poderes» alinea mejor con el POB inglés y preserva la amplitud semántica; «potestades» estrecha innecesariamente la lectura. También conviene conservar la nota de ambigüedad de οὐρανός de forma correcta en español.'
  issues:
  - severity: medium
    issue: Se aplanó la perífrasis futura ἔσονται ... πίπτοντες como «caerán».
    rationale: El audit trail inglés justifica explícitamente «will be falling» para preservar la acción futura en curso/vívida. «Caerán» es posible, pero pierde ese matiz aspectual documentado.
  - severity: medium
    issue: «Potestades» introduce una connotación más específica que «poderes».
    rationale: δύναμεις en este contexto debe quedar abierto entre poderes celestiales, fuerzas cósmicas o estructuras del cielo. «Potestades» en español eclesial suele inclinar hacia seres o rangos espirituales.
  - severity: low
    issue: La nota [a] formula de manera imprecisa la alternativa léxica de οὐρανός.
    rationale: El contraste relevante del inglés es 'heaven/sky', no simplemente «cielo/cielos». La nota española debe reflejar esa ambigüedad semántica, no solo una variación de número.
  - severity: low
    issue: La nota [b] define δύναμις en singular aunque el texto tiene plural δυνάμεις.
    rationale: No afecta mucho el sentido, pero conviene precisión gramatical en una nota léxica.
  revised_spanish_text: Y las estrellas estarán cayendo del cielo[a], y los poderes[b] en los cielos serán sacudidos.
  revised_footnotes:
  - marker: a
    text: O «del firmamento». El griego οὐρανός puede significar «cielo» o «firmamento/cielo visible» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Los poderes en los cielos» puede referirse a poderes celestiales, fuerzas cósmicas o a las estructuras de los cielos; el griego no es más específico.
    reason: alternative_reading
  revision_rationale: La revisión preserva mejor la perífrasis futura griega con «estarán cayendo», usa «poderes» para mantener la amplitud semántica de δυνάμεις sin sobreinterpretar, simplifica la frase preposicional a «en los cielos», y corrige las notas para reflejar con más precisión las alternativas léxicas y la ambigüedad documentadas en el POB inglés.
