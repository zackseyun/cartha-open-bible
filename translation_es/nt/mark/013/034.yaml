revisions:
- from: Es como un hombre ausente en un viaje[a], que dejó su casa y dio autoridad a sus esclavos, a cada uno su trabajo, y mandó al portero que velara.
  to: Es como un hombre de viaje,[a] que dejó su casa y dio autoridad a sus esclavos,[b] a cada uno su trabajo, y mandó al portero que velara.
  rationale: Se ajusta ἀπόδημος a una expresión más natural en español («de viaje») sin perder el sentido de ausencia implícito en el griego, y se añade la nota alternativa para δοῦλος a fin de preservar el expediente lexical del English POB mientras se mantiene «esclavos» en el texto principal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:43:21Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido del griego: comparación parabólica, hombre ausente, salida de la casa, delegación de autoridad, distribución de trabajo y mandato al portero. También preserva correctamente δοῦλος como «esclavos» y ἐξουσία como «autoridad». Sin embargo, «ausente en un viaje» suena poco idiomático en español y atenúa la naturalidad de ἀπόδημος; además, la nota al pie actual no refleja la alternativa inglesa «servants/servants» vinculada a δοῦλος, que sí conviene conservar en español por el expediente auditado.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «ausente en un viaje» resulta torpe en español natural. «De viaje» expresa mejor la idea sin perder el sentido de ausencia. El resto del verso fluye bien. «Que velara» es aceptable y natural en este discurso, aunque no reproduce tan literalmente «estar despierto»; aun así encaja con el matiz de vigilancia.
  glossary_alignment: Hay buena alineación con la terminología del proyecto en «esclavos» para δοῦλος. No hay términos doctrinales mayores en disputa aparte de esa elección, que está bien preservada. La excepción necesaria es añadir en nota la alternativa española «siervos» o «sirvientes», porque el audit trail inglés preservó la alternativa de lectura.
  issues:
  - severity: medium
    issue: «ausente en un viaje» es poco idiomático para ἀπόδημος
    rationale: Aunque semánticamente apunta en la dirección correcta, en español suena forzado. «De viaje» o «que está de viaje» comunica mejor la idea de estar fuera de casa/ausente por viaje, en línea con el griego y con la nota.
  - severity: medium
    issue: Falta una nota que preserve la alternativa de δοῦλος
    rationale: El English POB conservó explícitamente la alternativa «servants» frente a «slaves». Dado que el español principal usa correctamente «esclavos», conviene mantener una nota alternativa como «siervos» o «sirvientes» para reflejar el expediente lexical auditado.
  revised_spanish_text: Es como un hombre de viaje,[a] que dejó su casa y dio autoridad a sus esclavos,[b] a cada uno su trabajo, y mandó al portero que velara.
  revised_footnotes:
  - marker: a
    text: O «ausente de casa»; el griego ἀπόδημος señala a alguien que está fuera de su propio lugar, especialmente de viaje.
    reason: alternative_reading
  - marker: b
    text: O «siervos» o «sirvientes»; el griego «esclavos» (douloi) se refiere a personas de la casa bajo la autoridad del amo.
    reason: alternative_reading
  revision_rationale: Se ajusta ἀπόδημος a una expresión más natural en español («de viaje») sin perder el sentido de ausencia implícito en el griego, y se añade la nota alternativa para δοῦλος a fin de preservar el expediente lexical del English POB mientras se mantiene «esclavos» en el texto principal.
