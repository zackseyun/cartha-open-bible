translation:
  language: es
  text: Es como un hombre de viaje,[a] que dejó su casa y dio autoridad a sus esclavos,[b] a cada uno su trabajo, y mandó al portero que velara.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ausente de casa»; el griego ἀπόδημος señala a alguien que está fuera de su propio lugar, especialmente de viaje.
    reason: alternative_reading
  - marker: b
    text: O «siervos» o «sirvientes»; el griego «esclavos» (douloi) se refiere a personas de la casa bajo la autoridad del amo.
    reason: alternative_reading
lexical_decisions:
- source_word: ὡς
  english_pob_choice: It is like
  chosen_spanish: Es como
  alternatives_spanish:
  - Es igual a
  - Como
  lexicon: BDAG
  rationale: El griego introduce una comparación parabólica; 'Es como' expresa de forma natural esa relación sin añadir contenido interpretativo.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El sustantivo es singular masculino y en la imagen se refiere a una figura masculina concreta; 'un hombre' conserva esa referencia.
- source_word: ἀπόδημος
  english_pob_choice: away on a journey
  chosen_spanish: ausente en un viaje
  alternatives_spanish:
  - de viaje
  - que viaja fuera de casa
  - lejos de casa
  lexicon: BDAG
  rationale: La idea incluye ausencia y desplazamiento. 'Ausente en un viaje' recoge ambas facetas con naturalidad en español, sin reducirlo solo a 'viajando' ni solo a 'lejos de casa'.
- source_word: ἀφεὶς τὴν οἰκίαν αὐτοῦ
  english_pob_choice: who left his house
  chosen_spanish: que dejó su casa
  alternatives_spanish:
  - habiendo dejado su casa
  - después de dejar su casa
  lexicon: BDAG
  rationale: El participio aoristo se subordina bien en español con 'que dejó'. 'Casa' es el sentido directo de οἰκία en este contexto de hogar/propiedad.
- source_word: δοὺς
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - habiendo dado
  - entregó
  lexicon: BDAG
  rationale: δίδωμι aquí se expresa con el verbo simple 'dio', que mantiene la relación directa con el original y suena natural en la oración.
- source_word: τοῖς δούλοις αὐτοῦ
  english_pob_choice: to his slaves
  chosen_spanish: a sus esclavos
  alternatives_spanish:
  - a sus siervos
  - a sus siervos esclavos
  lexicon: BDAG
  rationale: Se preserva la fuerza lexical de δοῦλος como relación de propiedad y subordinación. 'Esclavos' evita suavizar el término, coherente con la decisión POB en inglés.
- source_word: τὴν ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - encargo
  - facultad
  - poder
  lexicon: BDAG
  rationale: ἐξουσία designa autoridad o derecho delegado. 'Autoridad' es la correspondencia más directa y conserva el peso de la delegación del amo.
- source_word: ἑκάστῳ τὸ ἔργον αὐτοῦ
  english_pob_choice: to each one his work
  chosen_spanish: a cada uno su trabajo
  alternatives_spanish:
  - a cada uno su tarea
  - a cada uno su obra
  lexicon: BDAG
  rationale: La fuerza distributiva de ἑκάστῳ se expresa con 'a cada uno'. ἔργον puede ser 'trabajo' o 'tarea'; aquí 'trabajo' es claro y conserva la concreción del término sin sobreinterpretarlo.
- source_word: τῷ θυρωρῷ
  english_pob_choice: doorkeeper
  chosen_spanish: al portero
  alternatives_spanish:
  - al guardián de la puerta
  - al doorkeeper
  lexicon: BDAG
  rationale: θυρωρός es quien cuida la puerta. 'Portero' es un equivalente natural en español bíblico contemporáneo y comunica la función sin arcaísmo.
- source_word: ἐνετείλατο
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - encargó
  lexicon: BDAG
  rationale: El verbo expresa una orden con autoridad. 'Mandó' es directo y plenamente idiomático en español.
- source_word: ἵνα γρηγορῇ
  english_pob_choice: to stay awake
  chosen_spanish: que velara
  alternatives_spanish:
  - que se mantuviera despierto
  - que estuviera alerta
  lexicon: BDAG
  rationale: γρηγορέω literalmente remite a estar despierto, pero en este discurso tiene el sentido vigilante de permanecer atento. 'Que velara' comunica esa vigilia de forma natural y respeta el matiz exhortativo.
theological_decisions:
- issue: δοῦλος en una parábola doméstica con relación de autoridad
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - sirvientes
  rationale: La escena presenta un amo que delega autoridad dentro de su casa. El rasgo relacional de dependencia y pertenencia es parte de la imagen, por lo que 'esclavos' conserva mejor la tensión lexical que una domesticación eufemística.
  doctrine_reference: 'DOCTRINE.md: término controvertido δοῦλος; filosofía de traducción §1'
- issue: γρηγορέω como vigilia metafórica en el discurso escatológico
  english_pob_reading: to stay awake
  chosen_spanish_reading: que velara
  alternative_spanish_readings:
  - que estuviera alerta
  - que permaneciera despierto
  rationale: En el contexto del capítulo, la idea no es solo no dormir físicamente, sino mantenerse vigilante ante el retorno del señor. 'Velara' preserva la metáfora de vigilancia y su fuerza exhortativa en español.
  doctrine_reference: 'Marco 13: vigilancia/alerta en el discurso del monte de los Olivos'
translation_notes:
  revision_awareness: El pasaje no muestra revisiones textuales relevantes en el paquete auditado; se sigue el texto griego SBLGNT y la lectura inglesa POB estable, manteniendo la decisión lexical sobre δοῦλοι y γρηγορῇ sin cambios sustanciales.
  spanish_consistency_notes:
  - Se conservó 'esclavos' para δοῦλοι, en línea con la terminología POB y sin suavizar la relación de subordinación.
  - '''Portero'' se eligió por claridad contemporánea y coherencia con el entorno doméstico de la parábola.'
  - '''Velara'' funciona como equivalente idiomático de la vigilancia de γρηγορέω y evita una traducción demasiado literal o demasiado interpretativa.'
  - Se evitó 'SEÑOR' porque aquí no aparece κύριος en el versículo; no hay necesidad de convención de sustitución del nombre divino.
