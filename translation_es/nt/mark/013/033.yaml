review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien los dos imperativos distintos de βλέπετε y ἀγρυπνεῖτε, así como la cláusula causal. Sin embargo, «cuándo es el tiempo» suena poco natural en español y no comunica con la misma claridad idiomática la idea de πότε ὁ καιρός ἐστιν. La nota sobre καιρός preserva correctamente las alternativas del inglés auditado.
  spanish_quality_summary: El español es mayormente claro y fiel, pero «cuándo es el tiempo» resulta torpe y poco idiomático en un registro bíblico natural. «Cuándo será el tiempo» o «cuándo llegará el tiempo» serían más naturales; «será» mantiene cercanía formal con ἐστιν sin añadir demasiado. El resto del verso es legible y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La distinción entre «Estén alerta» y «manténganse despiertos» está bien lograda. La elección de «el tiempo» para καιρός concuerda con el POB inglés, con alternativas útiles en nota.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: «cuándo es el tiempo»'
    rationale: Aunque formalmente cercana al griego, en español suena forzada. Para una traducción fiel y legible, debe ajustarse a una formulación idiomática que conserve la referencia temporal de καιρός.
  - severity: low
    issue: Matiz de «designado» en la nota
    rationale: La nota dice «designado» donde el inglés auditado usa «appointed». No es incorrecto, pero «señalado» o «fijado» suena más natural y eclesial en español. Puede mejorarse sin afectar el sentido.
  revised_spanish_text: Estén alerta; manténganse despiertos[a], porque no saben cuándo será el tiempo.
  revised_footnotes:
  - marker: a
    text: O «el momento señalado» o «la temporada». El griego καιρός suele referirse a un tiempo decisivo o señalado.
    reason: lexical_alternative
