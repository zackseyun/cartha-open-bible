translation:
  language: es
  text: Estén alerta; manténganse despiertos[a], porque no saben cuándo será el tiempo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el momento señalado» o «la temporada». El griego καιρός suele referirse a un tiempo decisivo o señalado.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: Be on guard
  chosen_spanish: Estén alerta
  alternatives_spanish:
  - Estén en guardia
  - Tengan cuidado
  - Vigilen
  lexicon: BDAG
  rationale: El imperativo plural de βλέπω aquí funciona como advertencia de vigilancia y cautela, no como mera percepción visual. «Estén alerta» comunica esa actitud de guardia en un español natural y distingue este mandato del siguiente ἀγρυπνεῖτε.
- source_word: ἀγρυπνεῖτε
  english_pob_choice: stay awake
  chosen_spanish: manténganse despiertos
  alternatives_spanish:
  - permanezcan despiertos
  - sigan despiertos
  - velen
  lexicon: BDAG
  rationale: ἀγρυπνέω expresa permanecer despierto o vigilante. «Manténganse despiertos» conserva la imagen de la vigilia y evita repetir exactamente la idea ya expresada por βλέπετε.
- source_word: οὐκ οἴδατε
  english_pob_choice: you do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no conocen
  - no saben con certeza
  lexicon: BDAG
  rationale: Se mantiene el valor simple del verbo de conocimiento en segunda persona plural. La expansión «con certeza» no aparece en el griego y no es necesaria.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón de las exhortaciones previas. «Porque» es claro y natural en español.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - en qué momento
  lexicon: BDAG
  rationale: Adverbio interrogativo de tiempo; «cuándo» es la equivalencia más natural en español.
- source_word: ὁ καιρός
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el momento señalado
  - el tiempo designado
  - la temporada
  lexicon: BDAG
  rationale: καιρός puede referirse a un tiempo decisivo o señalado. «El tiempo» mantiene la amplitud del término sin sobreespecificarlo; las alternativas explicitan matices posibles pero no se imponen en el texto principal.
- source_word: ἐστιν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: La cópula se conserva de forma directa en español para completar la cláusula sin añadir matiz.
theological_decisions:
- issue: Matiz escatológico de καιρός
  english_pob_reading: the time
  chosen_spanish_reading: el tiempo
  alternative_spanish_readings:
  - el momento señalado
  - el tiempo designado
  - la temporada
  rationale: En el discurso escatológico, καιρός puede sugerir un momento decisivo o fijado. El texto principal conserva «el tiempo» para no especificar más allá de lo que el griego exige, mientras que las alternativas se dejan como posibilidades léxicas legítimas.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un alto grado de acuerdo y no requieren revisión sustantiva; la principal decisión en español es conservar dos imperativos distintos con una diferenciación natural («Estén alerta» / «manténganse despiertos») y reflejar el matiz de καιρός sin sobreinterpretarlo.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exige; aquí no aparece.
  - Se prefirió «el tiempo» para καιρός, coherente con la opción principal inglesa y con el carácter abierto del término en contexto.
  - Se mantuvo un registro sobrio y eclesialmente legible, evitando calcos rígidos como «miren» o duplicar «vigilen» en ambos imperativos.
