translation:
  language: es
  text: Pero oren para que no ocurra en invierno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más explícita según el contexto, «que su huida no ocurra en invierno». El griego de Marcos es más elíptico que el paralelo de Mateo 24:20.
    reason: alternative_reading
lexical_decisions:
- source_word: προσεύχεσθε
  english_pob_choice: pray
  chosen_spanish: oren
  alternatives_spanish:
  - oren continuamente
  - recen
  lexicon: BDAG
  rationale: Es un imperativo presente plural; en español, «oren» comunica de manera natural la exhortación directa al grupo. «Recen» sería posible, pero «oren» es más amplio y neutral para una audiencia eclesial general. No se explicita el aspecto continuo, como tampoco en el inglés auditado.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave con matiz de contraste respecto de la advertencia anterior; «Pero» conserva mejor ese giro que una simple copulativa.
- source_word: ἵνα μὴ
  english_pob_choice: that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: En español, tras un verbo de súplica, «para que no» expresa con naturalidad el contenido/propósito de la oración. Mantiene la negación sin volver arcaico el registro.
- source_word: γένηται
  english_pob_choice: it may not happen
  chosen_spanish: ocurra
  alternatives_spanish:
  - suceda
  - llegue a pasar
  lexicon: BDAG
  rationale: γίνομαι aquí aparece de manera elíptica; el texto griego no menciona explícitamente «su huida». Siguiendo el POB inglés, se conserva la impersonalidad con «ocurra», sin importar de Marcos 13:18 lo que Mateo explicita.
- source_word: χειμῶνος
  english_pob_choice: in winter
  chosen_spanish: en invierno
  alternatives_spanish:
  - durante el invierno
  - en tiempo de invierno
  lexicon: BDAG
  rationale: El genitivo λειτουργa como referencia temporal/estacional. «En invierno» es la solución más natural en español y preserva la sencillez del original.
theological_decisions:
- issue: Sujeto elíptico de γένηται
  english_pob_reading: The clause refers generally to the anticipated event/circumstance of the disciples' flight or the crisis just described, rendered impersonally as 'it may not happen.'
  chosen_spanish_reading: 'La cláusula se mantiene impersonal: «no ocurra en invierno».'
  alternative_spanish_readings:
  - que su huida no ocurra en invierno
  - que no les toque huir en invierno
  rationale: Marcos no añade el objeto «su huida» que sí aparece en Mateo 24:20. Para no armonizar de forma indebida, se conserva la elipsis del griego y la tensión textual documentada por el POB inglés.
  doctrine_reference: Transparencia textual y primacía del original; preservar la diferencia entre pasajes paralelos sin resolverla por armonización.
translation_notes:
  revision_awareness: El pasaje coincide con el audit trail inglés de alta concordancia; no se requieren revisiones adicionales. Se preserva la elipsis de Marcos y no se importa el complemento explícito de Mateo.
  spanish_consistency_notes:
  - Se usa «Yahvé» en el proyecto cuando corresponde al nombre divino, pero este versículo no lo contiene.
  - Se mantiene un español neutral y eclesialmente legible, con terminología simple y no arcaizante.
  - La elección de «oren» respeta el plural implícito del griego, aunque el español no lo marque morfológicamente de forma distinta al singular formal.
