revisions:
- from: Y un hermano entregará a otro hermano[a] para muerte, y un padre a su hijo, y los hijos se levantarán contra los padres y los harán morir[b].
  to: Y un hermano entregará a otro hermano[a] a muerte, y un padre a su hijo o hija, y los hijos se levantarán contra los padres y los matarán[b].
  rationale: 'Se corrigen tres puntos: (1) εἰς θάνατον pasa de ''para muerte'' a ''a muerte'' por naturalidad y fidelidad idiomática; (2) τέκνον se amplía de ''hijo'' a ''hijo o hija'' para no perder el valor inclusivo del singular neutro griego; (3) θανατώσουσιν αὐτούς se vuelve ''los matarán'', que es español más natural y directo, dejando ''los harán morir'' como alternativa léxica posible en nota. Se conservan ''hermano'' y ''padre'' por fidelidad a los masculinos específicos del griego.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:44:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: mantiene ''hermano ... hermano'', ''padre ... hijo'', ''hijos ... padres'' y la progresión de traición familiar y muerte. También conserva correctamente παραδώσει como ''entregará'' con nota alternativa. Sin embargo, ''para muerte'' no es español natural para εἰς θάνατον; ''a muerte'' o ''a la muerte'' comunica mejor el resultado. Además, τέκνον se estrecha indebidamente a ''hijo'' cuando el griego es más amplio (''child''), y θανατώσουσιν αὐτούς se expresa mejor como ''los matarán'' o ''los condenarán a muerte'' que como ''los harán morir'', que suena menos idiomático y menos directo que el griego.'
  spanish_quality_summary: 'La redacción es generalmente clara, pero ''para muerte'' y ''los harán morir'' suenan poco naturales en español bíblico actual. ''Su hijo'' también limita innecesariamente el sentido de τέκνον. Una revisión mínima mejora fidelidad y legibilidad: ''a muerte'', ''a su hijo o hija'' / ''a su hijo[a]? no, mejor evitar nota innecesaria'', y ''los matarán''. Para mantener la amplitud del griego y la lectura fluida, ''a su propio hijo'' no resuelve el problema de género; ''a su hijo o hija'' sería explícito pero más pesado. La mejor solución principal es ''a su hijo o hija'' o ''a su propio hijo'', pero dado que el griego singular neutro significa ''su hijo/hija'', conviene explicitar amplitud en español principal.'
  glossary_alignment: 'No hay términos del glosario global en juego como Yahvé o Mesías. La decisión principal relevante del proyecto es no neutralizar indebidamente los masculinos específicos: ''hermano'' y ''padre'' deben mantenerse, lo cual el borrador hace bien. Pero también debe preservarse la amplitud de τέκνον/τέκνα; por eso ''hijo'' en singular es demasiado estrecho, mientras que ''hijos'' para τέκνα es aceptable en español común, aunque menos exacto que ''hijos e hijas'' o ''los hijos''.'
  issues:
  - severity: medium
    issue: '''para muerte'' es poco natural para εἰς θάνατον'
    rationale: El griego expresa resultado/destino; en español bíblico natural 'a muerte' comunica mejor el sentido sin sonar forzado.
  - severity: medium
    issue: '''su hijo'' estrecha indebidamente τέκνον'
    rationale: τέκνον significa 'child', no específicamente varón. El español debe procurar preservar esa amplitud, especialmente porque el inglés auditado la preserva explícitamente.
  - severity: medium
    issue: '''los harán morir'' suena menos idiomático y menos directo que θανατώσουσιν αὐτούς'
    rationale: Aunque semánticamente cercano, en español natural de este contexto 'los matarán' es más claro y fiel. Además coincide con la nota alternativa inglesa ya documentada.
  revised_spanish_text: Y un hermano entregará a otro hermano[a] a muerte, y un padre a su hijo o hija, y los hijos se levantarán contra los padres y los matarán[b].
  revised_footnotes:
  - marker: a
    text: O 'traicionará'; el verbo griego puede significar 'entregar', 'poner en manos de' o, en contexto, 'traicionar'.
    reason: lexical_alternative
  - marker: b
    text: O 'los harán morir'.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen tres puntos: (1) εἰς θάνατον pasa de ''para muerte'' a ''a muerte'' por naturalidad y fidelidad idiomática; (2) τέκνον se amplía de ''hijo'' a ''hijo o hija'' para no perder el valor inclusivo del singular neutro griego; (3) θανατώσουσιν αὐτούς se vuelve ''los matarán'', que es español más natural y directo, dejando ''los harán morir'' como alternativa léxica posible en nota. Se conservan ''hermano'' y ''padre'' por fidelidad a los masculinos específicos del griego.'
