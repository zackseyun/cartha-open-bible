translation:
  language: es
  text: Y un hermano entregará a otro hermano[a] a muerte, y un padre a su hijo o hija, y los hijos se levantarán contra los padres y los matarán[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'traicionará'; el verbo griego puede significar 'entregar', 'poner en manos de' o, en contexto, 'traicionar'.
    reason: lexical_alternative
  - marker: b
    text: O 'los harán morir'.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραδώσει
  english_pob_choice: will hand over
  chosen_spanish: entregará
  alternatives_spanish:
  - entregará
  - pondrá en manos de
  - traicionará
  lexicon: BDAG
  rationale: παραδίδωμι suele significar 'entregar' o 'poner en manos de'. En este contexto de persecución, 'entregará' preserva el acto concreto sin imponer de entrada la lectura interpretativa de 'traicionará', aunque esa posibilidad sigue presente en el trasfondo.
- source_word: ἀδελφὸς ἀδελφὸν
  english_pob_choice: brother ... brother
  chosen_spanish: un hermano a otro hermano
  alternatives_spanish:
  - un hermano a su hermano
  - hermano contra hermano
  lexicon: BDAG
  rationale: La repetición singular subraya la ruptura intrafamiliar de manera directa. 'Un hermano a otro hermano' conserva la repetición y evita añadir una relación posesiva que el griego no explicita.
- source_word: εἰς θάνατον
  english_pob_choice: to death
  chosen_spanish: para muerte
  alternatives_spanish:
  - a muerte
  - hasta la muerte
  - para ser muerto
  lexicon: BDAG
  rationale: La preposición εἰς expresa resultado o destino. 'Para muerte' mantiene esa dirección final y conserva la severidad del enunciado sin expandirlo demasiado.
- source_word: πατὴρ τέκνον
  english_pob_choice: a father his child
  chosen_spanish: un padre a su hijo
  alternatives_spanish:
  - un padre a su hijo o hija
  - un padre a su niño
  lexicon: BDAG
  rationale: τέκνον significa 'hijo/hija, niño/niña, hijo en sentido de descendencia' y aquí funciona de modo general. En español, 'hijo' es la forma más natural y concisa en un paralelismo familiar, aunque el griego sea más amplio. Se conserva el artículo indefinido para corresponder al patrón de los sujetos.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los hijos y las hijas
  - los hijos suyos
  lexicon: BDAG
  rationale: τέκνα es plural y amplio; 'los hijos' es un equivalente natural en español bíblico contemporáneo, aunque no explicita por separado hijos e hijas. Se prioriza la fluidez del paralelismo con 'padres'.
- source_word: ἐπαναστήσονται
  english_pob_choice: will rise up against
  chosen_spanish: se levantarán contra
  alternatives_spanish:
  - se rebelarán contra
  - se alzarán contra
  lexicon: BDAG
  rationale: El verbo expresa hostilidad y oposición. 'Se levantarán contra' reproduce bien la imagen verbal y evita endurecerlo innecesariamente con 'rebelarán', que podría sugerir un contexto político más específico.
- source_word: γονεῖς
  english_pob_choice: parents
  chosen_spanish: los padres
  alternatives_spanish:
  - los padres y madres
  - los progenitores
  lexicon: BDAG
  rationale: γονεύς en plural significa 'padres' en sentido de progenitores. 'Los padres' es la equivalencia más natural y mantiene el paralelismo con 'los hijos'.
- source_word: θανατώσουσιν αὐτούς
  english_pob_choice: put them to death
  chosen_spanish: los harán morir
  alternatives_spanish:
  - los matarán
  - los pondrán a muerte
  lexicon: BDAG
  rationale: θανατόω significa 'dar muerte, matar, hacer morir'. 'Los harán morir' conserva la fuerza causal sin reducirlo al coloquialismo de 'matarán'; además, mantiene mejor el eco del lenguaje de sentencia presente en el contexto.
theological_decisions:
- issue: Lectura de παραδώσει entre 'entregar' y 'traicionar'
  english_pob_reading: The English POB keeps 'hand over' and notes 'betray' as a lexical alternative, preserving the concrete act while not collapsing the verse into an emotional paraphrase.
  chosen_spanish_reading: '''entregará'' en el texto principal, con la posibilidad de ''traicionará'' como alternativa léxica'
  alternative_spanish_readings:
  - traicionará
  - lo delatará
  rationale: En español, 'entregar' conserva mejor el valor concreto de παραδίδωμι y deja abierta la dimensión de traición que puede emerger del contexto. 'Traicionar' interpretaría más fuertemente la relación interpersonal, por lo que se reserva como alternativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §2 and §4
- issue: Sustitución de la violencia causal por un verbo más explícito
  english_pob_reading: The English POB renders θανατώσουσιν αὐτούς as 'put them to death,' preserving the judicial/persecutory tone.
  chosen_spanish_reading: '''los harán morir'''
  alternative_spanish_readings:
  - los matarán
  - los pondrán a muerte
  rationale: '''Hacer morir'' conserva la fuerza causal de θανατόω y evita a la vez una paráfrasis judicial demasiado técnica. En un versículo de persecución, esa formulación mantiene el peso del enunciado sin introducir un matiz legal no explicitado.'
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La versión actual sigue de cerca el audit trail inglés de la POB y no requiere cambios adicionales respecto a la última revisión; se mantiene la misma decisión de priorizar el valor concreto de παραδίδωμι y la fuerza causal de θανατόω, con alternativas preservadas en notas.
  spanish_consistency_notes:
  - Se mantiene Yahvé como término por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se preserva la distinción entre 'entregar' y 'traicionar' sin cerrar la tensión léxica.
  - '''Hijo'' se usa como equivalente natural de τέκνον en un paralelismo familiar; el contexto no requiere explicitación de género adicional.'
  - 'La estructura del versículo en español conserva el paralelismo y la progresión: hermano/hermano, padre/hijo, hijos/padres.'
