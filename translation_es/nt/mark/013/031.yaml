translation:
  language: es
  text: El cielo y la tierra pasarán, pero mis palabras no pasarán jamás[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «nunca pasarán» o «de ningún modo pasarán». El griego usa una negación enfática.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐρανὸς
  english_pob_choice: heaven
  chosen_spanish: el cielo
  alternatives_spanish:
  - los cielos
  lexicon: BDAG
  rationale: En este par fijo con 'tierra', οὐρανός señala el ámbito celestial/cósmico, no solo el cielo visible. 'El cielo' es la forma natural y fiel en español para este merismo.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - el mundo
  - el suelo
  - el país
  lexicon: BDAG
  rationale: En la expresión estable 'cielo y tierra', γῆ designa la tierra como parte del orden creado, no una región específica. 'La tierra' conserva el merismo y la amplitud cósmica.
- source_word: παρελεύσονται
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán de largo
  - desaparecerán
  - llegarán a su fin
  lexicon: BDAG
  rationale: παρέρχομαι aquí comunica el paso o desaparición del orden creado. 'Pasarán' es idiomático en español y, con el contexto, mantiene la idea de transitoriedad sin añadir explicación extra.
- source_word: οἱ δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - y
  lexicon: BDAG
  rationale: δέ marca contraste entre la creación transitoria y la permanencia de las palabras de Jesús. 'Pero' expresa bien ese contraste en español contemporáneo.
- source_word: λόγοι μου
  english_pob_choice: my words
  chosen_spanish: mis palabras
  alternatives_spanish:
  - mis dichos
  - mis declaraciones
  - mis enseñanzas
  lexicon: BDAG
  rationale: λόγοι μου se refiere a las palabras pronunciadas por Jesús. 'Mis palabras' es la opción más directa y natural en español, sin suavizar el alcance de su autoridad.
- source_word: οὐ μὴ παρελεύσονται
  english_pob_choice: will certainly not pass away
  chosen_spanish: de ninguna manera pasarán
  alternatives_spanish:
  - nunca pasarán
  - de ningún modo pasarán
  - no pasarán jamás
  lexicon: BDAG
  rationale: La construcción οὐ μή con futuro expresa negación enfática. 'De ninguna manera' hace audible esa fuerza en español moderno y evita una simple negación débil.
theological_decisions:
- issue: Fuerza de la negación enfática sobre la permanencia de las palabras de Jesús
  english_pob_reading: '''my words will certainly not pass away'''
  chosen_spanish_reading: '''mis palabras de ninguna manera pasarán'''
  alternative_spanish_readings:
  - '''mis palabras nunca pasarán'''
  - '''mis palabras no pasarán jamás'''
  - '''mis palabras de ningún modo pasarán'''
  rationale: El versículo contrasta la transitoriedad del cielo y la tierra con la permanencia de la palabra de Jesús. La traducción conserva esa tensión y hace explícita la negación enfática de οὐ μή sin volverla arcaica.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: 'Coincide con el consenso del audit trail inglés: se mantiene el merismo ''cielo y tierra'', se conserva ''palabras'' para λόγοι, y se refuerza en español la negación enfática de οὐ μή sin introducir una paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque el texto no usa κύριος ni un ocultamiento del nombre divino.
  - Se prefirió 'el cielo' frente a 'los cielos' para reflejar el merismo fijo 'cielo y tierra' en español.
  - La nota del marcador a preserva la alternativa tradicional sin reemplazar la lectura principal.
  - No se añadió puntuación o explicación doctrinal ajena al dicho de Jesús.
