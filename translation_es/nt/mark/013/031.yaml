review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta correctamente el merismo cósmico «el cielo y la tierra», el contraste de δέ con «pero», y el sentido básico de παρελεύσονται como «pasarán». También preserva bien «mis palabras» para λόγοι μου. Sin embargo, la expresión española «de ninguna manera pasarán» suena menos natural y algo forzada para la negación enfática οὐ μὴ; una forma como «ciertamente no pasarán» o «no pasarán jamás» comunica mejor la fuerza griega en español idiomático. Además, las notas actuales no reflejan fielmente la nota inglesa: la nota [a] está anclada en el lugar equivocado y dice algo confuso, y la nota [b] sobre «mis palabras» no es necesaria porque no responde a una ambigüedad nueva ni a una nota preservada del inglés.'
  spanish_quality_summary: La frase es mayormente clara y legible, pero la colocación y contenido de las notas necesitan corrección. «De ninguna manera pasarán» es comprensible, aunque poco natural en registro bíblico español contemporáneo. «No pasarán jamás» mantiene dignidad, claridad y fuerza enfática. El texto resultante queda más fluido y plenamente natural para una audiencia eclesial amplia.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «El cielo», «la tierra» y «mis palabras» están bien alineados. La principal mejora es estilístico-lexical en la representación de οὐ μὴ, donde el español debe reflejar la negación enfática sin sonar calco.
  issues:
  - severity: medium
    issue: La negación enfática «de ninguna manera pasarán» es poco idiomática en este contexto.
    rationale: Aunque comunica énfasis, en español bíblico general suena rígida. «No pasarán jamás» o «ciertamente no pasarán» reflejan mejor οὐ μὴ con mayor naturalidad.
  - severity: high
    issue: La nota [a] está mal anclada y su contenido no corresponde a la evidencia fuente.
    rationale: La nota inglesa comenta la negación enfática de la segunda cláusula, no «la tierra[a]» ni «pasarán» en general. En español debe anclarse en la segunda cláusula y explicar alternativas como «nunca pasarán» o «de ningún modo pasarán».
  - severity: low
    issue: La nota [b] sobre «mis palabras» es innecesaria.
    rationale: No hay ambigüedad relevante en español ni una nota correspondiente en el rastro inglés que deba preservarse.
  revised_spanish_text: El cielo y la tierra pasarán, pero mis palabras no pasarán jamás[a].
  revised_footnotes:
