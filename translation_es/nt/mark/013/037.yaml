translation:
  language: es
  text: 'Y lo que les digo a ustedes se lo digo a todos: permanezcan despiertos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «velen» o «estén alerta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - eso que
  lexicon: BDAG
  rationale: El relativo neutro sustantivado se naturaliza en español con 'lo que', que conserva el valor resumptivo sin volver la frase rígida.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ funciona como enlace discursivo suave; 'y' reproduce esa continuidad mejor que una oposición fuerte.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ti
  lexicon: BDAG
  rationale: El dativo plural se expresa de modo natural con 'a ustedes', manteniendo el destinatario inmediato del discurso.
- source_word: λέγω ... λέγω
  english_pob_choice: I say ... I say
  chosen_spanish: les digo ... lo digo
  alternatives_spanish:
  - les digo ... les digo
  - les hablo ... les hablo
  lexicon: BDAG
  rationale: La repetición se conserva para reflejar el énfasis retórico. En español, el segundo 'les' puede sonar pesado; por eso se usa 'lo' con referencia anafórica a 'lo que' dicho, manteniendo la estructura sin forzar la sintaxis.
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todas las personas
  - a todos ustedes
  lexicon: BDAG
  rationale: '''A todos'' conserva la amplitud universal breve del griego sin añadir ''personas'', que no está explícito.'
- source_word: γρηγορεῖτε
  english_pob_choice: stay awake
  chosen_spanish: permanezcan despiertos
  alternatives_spanish:
  - manténganse despiertos
  - velen
  - estén alerta
  lexicon: BDAG
  rationale: El imperativo presente plural pide vigilancia continua. 'Permanezcan despiertos' conserva la imagen de vigilia y su continuidad; 'velen' o 'estén alerta' son alternativas válidas, pero menos directas para esta imagen.
theological_decisions:
- issue: Alcance de la exhortación de Jesús
  english_pob_reading: The saying addressed to the disciples is explicitly extended to all.
  chosen_spanish_reading: La palabra dirigida a ustedes se extiende explícitamente a todos.
  alternative_spanish_readings:
  - La exhortación queda limitada a los oyentes inmediatos.
  - Todos queda absorbido dentro de los discípulos sin una ampliación real.
  rationale: El griego contrapone 'a ustedes' con 'a todos'; la traducción debe preservar esa ampliación sin restringirla al círculo inmediato de los discípulos.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en lugar de resolverla)
translation_notes:
  revision_awareness: Se siguió la revisión inglesa que eliminó la coma tras 'you' para una fluidez mayor; en español se mantuvo la continuidad sin coma fuerte entre los dos miembros repetidos, preservando el paralelismo retórico y la ampliación final a todos.
  spanish_consistency_notes:
  - Se usó 'a ustedes' para el plural explícito y 'a todos' para πᾶσιν, manteniendo la distinción de alcance.
  - '''Despiertos'' conserva la metáfora de vigilancia del griego; no se sustituyó por una equivalencia más interpretativa como ''alertas'' en el texto principal.'
