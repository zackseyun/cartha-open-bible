translation:
  language: es
  text: Y cuando oigan de guerras y de informes[a] de guerras, no se alarmen; estas cosas tienen que suceder, pero todavía no es el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rumores de guerras». El griego puede referirse a informes, noticias o rumores que se oyen acerca de guerras.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Pero cuando
  - Ahora bien, cuando
  lexicon: BDAG
  rationale: ὅταν introduce una condición temporal futura, y δέ aporta un enlace suave. En español, "Y cuando" conserva la relación discursiva sin forzar un contraste más fuerte del que el griego exige.
- source_word: ἀκούσητε
  english_pob_choice: you hear
  chosen_spanish: oigan
  alternatives_spanish:
  - escuchen
  - oyeren
  lexicon: BDAG
  rationale: El verbo βασcula sobre el acto de oír/percibir noticias. "Oigan" es natural en español moderno y mantiene la orientación futura de la cláusula temporal.
- source_word: πολέμους
  english_pob_choice: wars
  chosen_spanish: guerras
  alternatives_spanish:
  - conflictos armados
  - batallas
  lexicon: BDAG
  rationale: πόλεμος corresponde de manera directa a "guerra"; el plural se conserva con claridad en español.
- source_word: ἀκοὰς πολέμων
  english_pob_choice: reports of wars
  chosen_spanish: informes de guerras
  alternatives_spanish:
  - noticias de guerras
  - rumores de guerras
  lexicon: BDAG
  rationale: ἀκοή puede significar noticia, informe, reporte o lo escuchado. "Informes" refleja bien el rango semántico amplio y evita reducir de antemano el sentido a rumores no verificados. Se preserva la posibilidad tradicional en nota.
- source_word: μὴ θροεῖσθε
  english_pob_choice: do not be alarmed
  chosen_spanish: no se alarmen
  alternatives_spanish:
  - no se turben
  - no se asusten
  lexicon: BDAG
  rationale: θροέομαι expresa inquietarse, alarmarse o quedar perturbado. "No se alarmen" es idiomático, comunica bien la reacción emocional y mantiene el tono exhortativo.
- source_word: δεῖ γενέσθαι
  english_pob_choice: these things must happen
  chosen_spanish: estas cosas tienen que suceder
  alternatives_spanish:
  - esto debe suceder
  - es necesario que estas cosas sucedan
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. "Tienen que suceder" preserva la fuerza obligatoria/inevitable sin añadir un sistema doctrinal ajeno. "Suceder" comunica adecuadamente γενέσθαι en este contexto.
- source_word: ἀλλ’ οὔπω τὸ τέλος
  english_pob_choice: but the end is not yet
  chosen_spanish: pero el fin todavía no es
  alternatives_spanish:
  - pero el fin no ha llegado aún
  - pero todavía no es el fin
  lexicon: BDAG
  rationale: τὸ τέλος apunta al fin escatológico. "Todavía no es" reproduce la negación con énfasis y suena natural en español; se mantiene el orden contrastivo de ἀλλά.
theological_decisions:
- issue: Necesidad en δεῖ γενέσθαι
  english_pob_reading: Render δεῖ as 'must' to preserve the sense of divine or prophetic necessity without specifying a detailed theological system.
  chosen_spanish_reading: Traducir δεῖ con "tienen que" para conservar la necesidad/providencia implícita sin explicarla más allá del griego.
  alternative_spanish_readings:
  - deben
  - es necesario que
  rationale: El griego afirma necesidad, pero no desarrolla su mecanismo. "Tienen que" conserva la fuerza del enunciado y evita suavizarlo hasta un mero consejo o convertirlo en una explicación teológica más amplia de la que el texto ofrece.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Coincide con el último pase revisado como sin cambios; no hay revisiones aplicadas en el paquete auditado. La redacción española sigue de cerca las decisiones léxicas validadas en inglés, especialmente el matiz amplio de ἀκοαί/ἀκοή y la necesidad de δεῖ.
  spanish_consistency_notes:
  - Se mantuvo "guerras" para πόλεμος y no se introdujeron equivalentes más interpretativos.
  - '"informes" se eligió para reflejar el rango de ἀκοή; la nota conserva la alternativa tradicional "rumores".'
  - '"no se alarmen" reproduce el valor de θροεῖσθε sin intensificarlo artificialmente.'
  - '"tienen que suceder" conserva la necesidad de δεῖ sin especificar un marco escatológico.'
  - '"el fin" mantiene el referente escatológico de τὸ τέλος con español natural y claro.'
