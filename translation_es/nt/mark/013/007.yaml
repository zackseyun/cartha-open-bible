    issue: La cláusula final «pero el fin todavía no es» es poco natural en español.
    rationale: Aunque intenta reflejar literalmente ἀλλ’ οὔπω τὸ τέλος, en español esa formulación queda incompleta/forzada. El sentido se expresa mejor como «pero todavía no es el fin» o «pero el fin aún no ha llegado». La primera conserva más de cerca la estructura del griego y de la auditoría inglesa.
