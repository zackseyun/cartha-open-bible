  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: la cláusula temporal futura, la mención de guerras y noticias/reportes de guerras, la exhortación a no alarmarse, la necesidad de que eso ocurra y la afirmación de que el fin aún no ha llegado. También preserva correctamente la nota léxica sobre ἀκοὰς πολέμων.'
  spanish_quality_summary: La mayor parte del español es clara y digna, pero la frase final «pero el fin todavía no es» no es natural ni idiomática en español bíblico contemporáneo. Además, «oigan de guerras» suena menos natural que «oigan hablar de guerras» u «oigan de guerras»; sin embargo, es aceptable. El ajuste principal necesario es la cláusula final para que sea fiel y legible.
  glossary_alignment: No hay términos de glosario mayor en conflicto. La decisión «informes» para ἀκοὰς es defendible, aunque «noticias» sonaría algo más natural en español; no requiere cambio porque la nota preserva «rumores». «tienen que suceder» comunica adecuadamente δεῖ γενέσθαι.
  issues:
