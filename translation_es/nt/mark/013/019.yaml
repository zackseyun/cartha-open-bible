  text: ἔσονται γὰρ αἱ ἡμέραι ἐκεῖναι θλῖψις οἵα οὐ γέγονεν τοιαύτη ἀπ’ ἀρχῆς κτίσεως ⸀ἣν ἔκτισεν ὁ θεὸς ἕως τοῦ νῦν καὶ οὐ μὴ γένηται.
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/019.yaml
  text: For those days will be a tribulation such as has not been from the beginning of the creation that God created until now[a], and never will be.
  footnotes:
