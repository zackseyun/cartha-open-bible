translation:
  language: es
  text: Porque aquellos días serán una tribulación[a] tal que no la ha habido desde el principio de la creación que Dios creó hasta ahora, ni la habrá.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tal que nunca la ha habido desde el principio de la creación que Dios creó hasta ahora, ni la habrá».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θλῖψις
  english_pob_choice: tribulation
  chosen_spanish: tribulación
  alternatives_spanish:
  - angustia
  - aflicción
  lexicon: BDAG
  rationale: En este contexto escatológico, θλῖψις designa una aflicción extraordinaria y severa. «Tribulación» conserva ese peso y también su resonancia bíblica sin volver la frase oscura en español.
- source_word: οἵα οὐ γέγονεν τοιαύτη
  english_pob_choice: such as has not been
  chosen_spanish: tal que no la ha habido
  alternatives_spanish:
  - tal que no ha existido
  - como no ha habido ninguna
  lexicon: BDAG
  rationale: La construcción comparativa intensifica la singularidad del sufrimiento venidero. «No la ha habido» comunica bien la fuerza de γέγονεν sin añadir un matiz innecesario de acontecimiento puntual o de repetición.
- source_word: ἀπ’ ἀρχῆς κτίσεως
  english_pob_choice: from the beginning of the creation
  chosen_spanish: desde el principio de la creación
  alternatives_spanish:
  - desde el comienzo de la creación
  - desde el principio de lo creado
  lexicon: BDAG
  rationale: Se mantiene explícita la referencia a la creación. «Principio de la creación» refleja de cerca la forma griega y preserva el alcance creacional del pasaje.
- source_word: ἣν ἔκτισεν ὁ θεὸς
  english_pob_choice: that God created
  chosen_spanish: que Dios creó
  alternatives_spanish:
  - la cual Dios creó
  - que fue creada por Dios
  lexicon: BDAG
  rationale: La cláusula relativa se conserva de manera directa y natural en español. Mantiene el énfasis explícito en Dios como creador, como en el griego.
- source_word: ἕως τοῦ νῦν
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  - todavía
  lexicon: BDAG
  rationale: Es la equivalencia temporal más natural y precisa en español para un marcador de extensión hasta el momento presente.
- source_word: οὐ μὴ γένηται
  english_pob_choice: never will be
  chosen_spanish: ni la habrá
  alternatives_spanish:
  - nunca habrá otra
  - de ningún modo sucederá
  lexicon: BDAG
  rationale: La negación enfática se expresa con naturalidad en español mediante «ni la habrá». Conserva la idea de imposibilidad futura sin agregar «otra vez» ni restringir el alcance del griego.
theological_decisions:
- issue: Alcance de la referencia a la creación
  english_pob_reading: Retained 'the creation that God created' as a reference to the created order without narrowing it to a merely local or covenantal beginning.
  chosen_spanish_reading: Se mantiene «la creación que Dios creó» como referencia al orden creado en su conjunto.
  alternative_spanish_readings:
  - el mundo
  - la creación del mundo
  rationale: El griego usa κτίσις y κτίζω con Dios como sujeto, por lo que conviene conservar el alcance creacional explícito. No se reduce a una fórmula más idiomática que atenúe la referencia al acto creador.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que ajustó la primera mitad para reflejar más directamente γέγονεν y simplificó la clausula final para no añadir «again». En español se evitó igualmente introducir una idea de repetición que el griego no expresa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» en general como norma del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se eligió «tribulación» para θλῖψις por coherencia con la decisión inglesa auditada y por su adecuación apocalíptica.
  - La negación final se expresó sin reforzarla con «otra vez» para no exceder οὐ μὴ γένηται.
