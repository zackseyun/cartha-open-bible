    issue: La nota b ofrece 'desde el principio de la creación del mundo'.
    rationale: Esa alternativa añade 'mundo' y reformula la expresión de un modo no sustentado por el griego ni por la auditoría inglesa, que explícitamente preserva 'the creation that God created' y evita estrechar o idiomatizar de más el lenguaje de creación.
  - severity: low
    issue: Puntuación algo rígida en 'que Dios creó, hasta ahora, ni la habrá'.
    rationale: Las comas alrededor de 'hasta ahora' no son necesarias y entorpecen el flujo natural en español. Sin ellas, la oración suena más idiomática sin perder precisión.
