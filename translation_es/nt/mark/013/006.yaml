translation:
  language: es
  text: 'Muchos vendrán en mi nombre, diciendo: «Yo soy él[a]», y extraviarán a muchos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Más literalmente: «Yo soy». El griego no expresa el predicado de manera explícita.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: Many
  chosen_spanish: Muchos
  alternatives_spanish:
  - Mucha gente
  lexicon: BDAG
  rationale: El adjetivo plural funciona sustantivamente y expresa una cantidad indefinida de personas. «Muchos» es natural, conciso y conserva la correspondencia con el inicio y el cierre del versículo.
- source_word: ἐλεύσονται
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán hacia
  - se acercarán
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι aquí conserva el matiz de venir o presentarse. «Vendrán» es idiomático en español y mantiene la referencia a personas que se presentan activamente.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - bajo mi nombre
  - con mi nombre
  lexicon: BDAG
  rationale: La expresión idiomática se traduce de forma estable en español como «en mi nombre», que comunica adecuadamente la idea de autoridad o asociación con Jesús sin volverla más interpretativa de lo que permite el griego.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - afirmando
  - declarando
  lexicon: BDAG
  rationale: El participio presente expresa una acción concomitante; «diciendo» preserva esa función sin intensificar indebidamente el sentido.
- source_word: ὅτι Ἐγώ εἰμι
  english_pob_choice: I am he
  chosen_spanish: Yo soy él[b]
  alternatives_spanish:
  - Yo soy
  - Yo soy el que soy
  lexicon: BDAG
  rationale: En español, «Yo soy él» comunica la elipsis del predicado implícito que el griego no expresa explícitamente. Se conserva en nota la opción más literal «Yo soy», porque el texto griego no añade un complemento nominal.
- source_word: πλανήσουσιν
  english_pob_choice: will lead astray
  chosen_spanish: extraviarán
  alternatives_spanish:
  - desviarán
  - engañarán
  lexicon: BDAG
  rationale: πλανάω tiene la idea de hacer desviar o errar. «Extraviarán» conserva bien la imagen de apartar del camino correcto, con un tono sobrio y bíblico en español. Se evita «engañarán» como única opción porque centra más el fraude que el extravío resultante.
theological_decisions:
- issue: Predicado implícito en Ἐγώ εἰμι
  english_pob_reading: I am he
  chosen_spanish_reading: Yo soy él
  alternative_spanish_readings:
  - Yo soy
  rationale: El griego carece de predicado explícito. Siguiendo el audit trail inglés, se hace explícita la identidad implícita para que el español suene natural, pero se preserva la tensión textual en nota con la alternativa más literal.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el consenso del audit trail inglés y no requiere revisiones respecto del pasaje base; se mantiene la opción interpretativa ya documentada para Ἐγώ εἰμι, pero en español se opta por una formulación natural con nota de literalidad conservada.
  spanish_consistency_notes:
  - Se mantiene «en mi nombre» como terminología POB estable para ἐπὶ τῷ ὀνόματί μου.
  - Se conserva el futuro simple en español para ambas acciones futuras del versículo.
  - «Extraviarán» evita una paráfrasis excesiva y refleja el valor resultativo de πλανάω.
  - Se usa «él» en la cita para reflejar el complemento implícito que el español suele requerir, sin cerrar la ambigüedad del griego.
