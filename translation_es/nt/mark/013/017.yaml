revisions:
- from: Pero ¡ay de las que están encintas y de las que amamantan en aquellos días[a][b]!
  to: ¡Pero ay de las que están encintas[a] y de las que amamantan a sus bebés[b] en aquellos días!
  rationale: Se ajusta la puntuación para español idiomático, se mejora la naturalidad de la nota alternativa para el modismo de embarazo, y se explicita el objeto de «amamantan» para mayor claridad y mejor correspondencia con la decisión auditada en inglés, sin añadir contenido sustancial nuevo.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:39:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: οὐαί como lamento/advertencia, el grupo femenino plural de las embarazadas y las que están amamantando, y la referencia temporal «en aquellos días». Sin embargo, la colocación de los signos de exclamación en español deja «Pero» fuera de la exclamación principal, y la nota a para «con niño» no suena natural en español bíblico actual; el equivalente documentado para the English alternative «with child» debe ajustarse.'
  spanish_quality_summary: La redacción es clara y digna. «Encintas» es comprensible, pero menos panhispánica que «embarazadas»; aun así puede mantenerse. La mejora necesaria es de puntuación exclamativa para español natural («¡Pero ay de ...!») y de naturalidad en la nota alternativa. También conviene hacer explícito el objeto en «amamantan» para corresponder mejor a la aclaración del inglés y evitar una leve aspereza estilística.
  glossary_alignment: 'No hay términos del glosario mayor en juego. Las decisiones léxicas principales son coherentes con el POB: οὐαί → «ay de», ἐν γαστρὶ ἐχούσαις → «están encintas/embarazadas», θηλαζούσαις → «amamantan / amamantan a bebés», ἐν ἐκείναις ταῖς ἡμέραις → «en aquellos días».'
  issues:
  - severity: medium
    issue: Puntuación exclamativa española incompleta
    rationale: 'En español, si «Pero» forma parte de la exclamación que traduce οὐαὶ δὲ, debe ir dentro de los signos: «¡Pero ay de ...!». La forma actual «Pero ¡ay de ...!» es menos natural y separa indebidamente el conector de la exclamación.'
  - severity: medium
    issue: 'Nota alternativa a poco natural: «las que están con niño»'
    rationale: Aunque intenta reflejar «with child», «con niño» no es una expresión natural ni suficientemente clara en español general. «Encinta(s)» o «embarazada(s)» funcionan mejor como alternativa idiomática.
  - severity: low
    issue: «las que amamantan» puede sonar algo abrupto sin objeto explícito
    rationale: El griego deja implícito el objeto, pero el inglés POB lo explicitó («infants»). En español, «las que amamantan a sus bebés» o «las que están amamantando» suena más natural y claro.
  revised_spanish_text: ¡Pero ay de las que están encintas[a] y de las que amamantan a sus bebés[b] en aquellos días!
  revised_footnotes:
  - marker: a
    text: 'O: «las que están embarazadas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las que están amamantando».'
    reason: lexical_alternative
  revision_rationale: Se ajusta la puntuación para español idiomático, se mejora la naturalidad de la nota alternativa para el modismo de embarazo, y se explicita el objeto de «amamantan» para mayor claridad y mejor correspondencia con la decisión auditada en inglés, sin añadir contenido sustancial nuevo.
