translation:
  language: es
  text: ¡Pero ay de las que están encintas[a] y de las que amamantan a sus bebés[b] en aquellos días!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las que están embarazadas».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «las que están amamantando».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐαί
  english_pob_choice: woe
  chosen_spanish: ¡ay de!
  alternatives_spanish:
  - ¡ay!
  - ¡ay de ellos/ellas!
  lexicon: BDAG
  rationale: En español, «¡ay de!» conserva el tono profético de lamentación y advertencia de οὐαί. Es más natural que un calco como «aflicción» y mantiene la fuerza exclamativa del original.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición discursiva suave. «Pero» reproduce bien el giro del contexto sin exagerar el contraste.
- source_word: ταῖς ἐν γαστρὶ ἐχούσαις
  english_pob_choice: those who are pregnant
  chosen_spanish: las que están encintas
  alternatives_spanish:
  - las que están embarazadas
  - las que están con niño
  lexicon: BDAG
  rationale: La idiomática griega significa estar embarazada. «Encintas» conserva el sentido y el registro sobrio; se evita una paráfrasis más larga que no añade contenido.
- source_word: γαστρί
  english_pob_choice: pregnant
  chosen_spanish: encintas
  alternatives_spanish:
  - embarazadas
  - con niño
  lexicon: BDAG
  rationale: Aunque literalmente alude al vientre, en esta construcción el valor es idiomático. El español debe expresar el estado, no la parte del cuerpo.
- source_word: θηλαζούσαις
  english_pob_choice: those who are nursing infants
  chosen_spanish: las que amamantan
  alternatives_spanish:
  - las que están dando pecho
  - las que están lactando
  lexicon: BDAG
  rationale: θηλάζω refiere al acto de amamantar/sucrar. En español, «amamantan» es claro y fiel; «lactando» suena más técnico, y «dando pecho» es más coloquial.
- source_word: ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: in those days
  chosen_spanish: en aquellos días
  alternatives_spanish:
  - en esos días
  - durante aquellos días
  lexicon: BDAG
  rationale: «En aquellos días» es la equivalencia idiomática natural y preserva el enlace temporal/escatológico del pasaje.
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el griego de SBLGNT y el criterio de la POB en inglés: mantener el tono de advertencia profética, verter el giro discursivo con naturalidad y preservar la ambigüedad idiomática principal de ἐν γαστρὶ ἔχειν sin sobreexplicarla en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento femenino plural implícito en los participios griegos con «las que».
  - Se evita «Señor»/«Cristo» porque no aparecen en este versículo.
  - «Encintas» y «amamantan» son formas publicables y de registro bíblico comprensible en español neutral.
  - Las notas conservan alternativas relevantes sin duplicar el sentido principal.
