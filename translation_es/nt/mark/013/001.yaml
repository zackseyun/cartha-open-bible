translation:
  language: es
  text: 'Y al salir él del templo[a], uno de sus discípulos le dice: «Maestro[b], mira: ¡qué admirables piedras y qué admirables edificios!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego ἱερόν se refiere al complejo o recinto del templo, no específicamente al santuario interior.
    reason: lexical_alternative
  - marker: b
    text: O «¡qué grandes piedras y qué grandes edificios!». El adjetivo griego expresa asombro o admiración.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκπορευομένου αὐτοῦ
  english_pob_choice: as he was going out
  chosen_spanish: al salir él
  alternatives_spanish:
  - mientras salía
  - cuando salía
  lexicon: BDAG
  rationale: El genitivo absoluto expresa acción en desarrollo contemporánea con el verbo principal. «Al salir él» conserva esa simultaneidad de modo natural en español sin volver la frase pesada.
- source_word: τοῦ ἱεροῦ
  english_pob_choice: the temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del recinto del templo
  - de los atrios del templo
  lexicon: BDAG
  rationale: ἱερόν designa el complejo o recinto del templo, no el santuario interior. «Templo» es la equivalencia más clara y natural; la nota explica el alcance más amplio.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico de Marcos para conservar la viveza narrativa, en vez de suavizarlo al pasado.
- source_word: εἷς τῶν μαθητῶν αὐτοῦ
  english_pob_choice: one of his disciples
  chosen_spanish: uno de sus discípulos
  alternatives_spanish:
  - uno de los discípulos de él
  lexicon: BDAG
  rationale: Expresión partitiva directa y transparente; no requiere expansión ni paráfrasis.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Maestro mío
  - Profesor
  lexicon: BDAG
  rationale: En vocativo, «Maestro» comunica con fidelidad el valor de trato y evita el matiz jerárquico o devocional que «Señor» podría introducir aquí.
- source_word: ἴδε
  english_pob_choice: look
  chosen_spanish: mira
  alternatives_spanish:
  - mira aquí
  - ve
  lexicon: BDAG
  rationale: Imperativo de atención. «Mira» es el equivalente natural y sobrio en español; conserva el gesto de señalar sin arcaísmo.
- source_word: ποταποὶ ... καὶ ποταπαὶ
  english_pob_choice: what wonderful ... and what wonderful ...
  chosen_spanish: ¡qué ... y qué ... tan admirables!
  alternatives_spanish:
  - ¡qué ... y qué ... tan grandes!
  - ¡qué ... y qué ... tan impresionantes!
  lexicon: BDAG
  rationale: ποταπός expresa asombro o admiración por la calidad o naturaleza de algo. En español, la exclamación «¡qué ... tan admirables!» transmite esa admiración sin perder el énfasis del original. Se aplica a ambos sustantivos para reflejar la repetición.
- source_word: λίθοι
  english_pob_choice: stones
  chosen_spanish: piedras
  alternatives_spanish:
  - piedras del templo
  - bloques de piedra
  lexicon: BDAG
  rationale: «Piedras» es la equivalencia natural en español para λίθοι; el contexto del templo ya delimita la referencia.
- source_word: οἰκοδομαί
  english_pob_choice: buildings
  chosen_spanish: edificios
  alternatives_spanish:
  - construcciones
  - estructuras
  lexicon: BDAG
  rationale: οἰκοδομαί designa las construcciones del recinto. «Edificios» es claro y digno en español, y conserva el plural concreto del texto.
translation_notes:
  revision_awareness: 'Se siguió de cerca el texto griego y el criterio auditado de la POB en inglés: presente histórico para λέγει, alcance amplio de ἱερόν, y valor exclamativo de ποταπός. No se detectaron revisiones textuales o divergencias significativas en el pasaje.'
  spanish_consistency_notes:
  - Se mantuvo «templo» con nota explicativa para reflejar el alcance de ἱερόν.
  - Se preservó el presente narrativo «dice» para concordar con el estilo de Marcos.
  - Se evitó «Cristo/Señor» porque no aparecen en el versículo ni corresponden al vocativo Διδάσκαλε.
  - La exclamación española intenta conservar el tono de admiración sin forzar un calco como «de qué clase».
