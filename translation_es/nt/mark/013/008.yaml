translation:
  language: es
  text: Porque se levantará nación contra nación, y reino contra reino. Habrá terremotos en diversos lugares; habrá hambrunas. Estas son el comienzo de los dolores de parto[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «dolores del parto» o «trabajos de parto». La imagen griega alude al dolor asociado con el nacimiento, usado metafóricamente para sufrimientos que preceden a lo que sigue.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγερθήσεται
  english_pob_choice: will rise
  chosen_spanish: se levantará
  alternatives_spanish:
  - surgirá
  - se alzará
  lexicon: BDAG
  rationale: El futuro pasivo de ἐγείρω se usa idiomáticamente para el estallido o levantamiento de un conflicto. «Se levantará» mantiene ese valor dinámico en español y conserva la idea de una acción que emerge, sin volverlo demasiado literal con una pasiva pesada.
- source_word: ἔθνος ... ἐπ’ ἔθνος
  english_pob_choice: nation ... against nation
  chosen_spanish: nación ... contra nación
  alternatives_spanish:
  - pueblo ... contra pueblo
  - grupo étnico ... contra grupo étnico
  lexicon: BDAG
  rationale: En este contexto apocalíptico y en paralelo con βασιλεία, ἔθνος apunta mejor a una entidad colectiva o política. «Nación ... contra nación» reproduce el giro idiomático y el sentido de conflicto entre colectivos.
- source_word: βασιλεία ... ἐπὶ βασιλείαν
  english_pob_choice: kingdom ... against kingdom
  chosen_spanish: reino ... contra reino
  alternatives_spanish:
  - dominio ... contra dominio
  lexicon: BDAG
  rationale: βασιλεία aquí designa una esfera o dominio político. «Reino ... contra reino» preserva el paralelismo con «nación ... contra nación» y suena natural en español bíblico actual.
- source_word: σεισμοὶ
  english_pob_choice: earthquakes
  chosen_spanish: terremotos
  alternatives_spanish:
  - sismos
  - temblores
  lexicon: BDAG
  rationale: σεισμός en este contexto denota terremotos. «Terremotos» es claro, estándar y suficientemente preciso para lectura pública.
- source_word: κατὰ τόπους
  english_pob_choice: in various places
  chosen_spanish: en diversos lugares
  alternatives_spanish:
  - en distintos lugares
  - en varios lugares
  lexicon: BDAG
  rationale: La preposición distributiva κατά con plural indica ocurrencia en múltiples sitios. «En diversos lugares» conserva esa distribución con buen español.
- source_word: λιμοί
  english_pob_choice: famines
  chosen_spanish: hambrunas
  alternatives_spanish:
  - famines
  - escasez de alimentos
  lexicon: BDAG
  rationale: λιμός significa hambre severa o escasez extrema; «hambrunas» transmite mejor la magnitud que un simple «hambre» y mantiene el tono del texto.
- source_word: ἀρχὴ
  english_pob_choice: the beginning
  chosen_spanish: el comienzo
  alternatives_spanish:
  - el principio
  - el inicio
  lexicon: BDAG
  rationale: Aunque el griego no lleva artículo, en español la expresión resulta natural con artículo definido. «El comienzo» comunica que estos hechos marcan la etapa inicial de lo que sigue.
- source_word: ὠδίνων
  english_pob_choice: of birth pains
  chosen_spanish: de los dolores de parto
  alternatives_spanish:
  - de los trabajos de parto
  - de las contracciones del parto
  lexicon: BDAG
  rationale: ὠδίν alude a los dolores del parto y funciona como metáfora apocalíptica de sufrimientos previos a algo nuevo. «Dolores de parto» conserva la imagen y es idiomático en español.
- source_word: ταῦτα
  english_pob_choice: These are
  chosen_spanish: estas son
  alternatives_spanish:
  - esto es
  - estas cosas son
  lexicon: BDAG
  rationale: El demostrativo neutro plural se expresa de forma natural en español como «estas». La concordancia con el plural de referencia mantiene claridad sin forzar la sintaxis.
theological_decisions:
- issue: Metáfora apocalíptica en ἀρχὴ ὠδίνων
  english_pob_reading: These events are the beginning of birth pains, indicating preliminary distress rather than the end itself.
  chosen_spanish_reading: Estos hechos son el comienzo de los dolores de parto, es decir, señalan una aflicción preliminar y no el desenlace final.
  alternative_spanish_readings:
  - Estos son solo problemas generales.
  - Estos son el comienzo de trabajos de parto en sentido escatológico más técnico.
  rationale: La traducción debe conservar la tensión metafórica sin aplanarla en mera dificultad genérica ni imponer un sistema escatológico más amplio que el del versículo. «Dolores de parto» mantiene la imagen de sufrimiento previo a algo que viene.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el control de revisión más reciente: no hubo cambios aplicados y el consenso de auditoría fue de alta concordancia. La redacción española sigue la decisión óptima del inglés POB y conserva la metáfora de los «birth pains» sin neutralizarla.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo porque no aparecen en el texto.
  - «Nación contra nación» y «reino contra reino» conservan el paralelismo del griego y la elección auditada en inglés.
  - «Dolores de parto» se usa de manera consistente con el valor metafórico documentado; la nota amplía alternativas sin romper la lectura principal.
  - 'La puntuación separa los miembros como en el original: dos cláusulas con conflicto, luego dos anuncios con estructura repetida, y finalmente la conclusión interpretativa.'
