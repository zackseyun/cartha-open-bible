    text: O ‘ningún ser humano’ / ‘nadie’. Literalmente, ‘toda carne’.
    reason: lexical_alternative
  revision_rationale: Se corrige ‘Yahvé’ a ‘el Señor’ para reflejar fielmente κύριος en este contexto del NT y alinearse con el audit trail inglés y la evidencia fuente. Se conserva el resto, incluida la expresión bíblica ‘toda carne’ con nota aclaratoria, porque preserva mejor el modismo del original sin perder inteligibilidad.
