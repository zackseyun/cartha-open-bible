translation:
  language: es
  text: Y si el Señor no hubiera acortado los días[a], no se habría salvado toda carne. Pero, por causa de los escogidos, a quienes eligió, acortó los días.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘ningún ser humano’ / ‘nadie’. Literalmente, ‘toda carne’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκολόβωσεν
  english_pob_choice: cut short
  chosen_spanish: acortado / acortó
  alternatives_spanish:
  - abreviado
  - reducido
  - recortado
  lexicon: BDAG
  rationale: κολοβόω significa ‘acortar’ o ‘cortar’. En español, ‘acortar’ comunica de manera natural la acción concreta y preserva la fuerza verbal mejor que opciones más abstractas. Se mantiene la misma raíz en ambos casos por coherencia.
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - el Señor
  lexicon: BDAG
  rationale: Aunque el inglés POB usa ‘the Lord’, en el marco de la política terminológica del proyecto, κύριος que refiere al nombre divino se vierte como ‘Yahvé’ en el texto principal. Aquí el sujeto del verbo es el agente de la providencia divina, por lo que la referencia es a Dios y no a un simple título honorífico.
- source_word: τὰς ἡμέρας
  english_pob_choice: the days
  chosen_spanish: los días
  alternatives_spanish:
  - esos días
  - aquellos días
  lexicon: BDAG
  rationale: La expresión es directa y temporal; ‘los días’ conserva el plural y la referencia al período de angustia sin sobreespecificarlo.
- source_word: οὐκ ἂν ἐσώθη
  english_pob_choice: would have been saved
  chosen_spanish: no se habría salvado
  alternatives_spanish:
  - no habría sobrevivido
  - no habría sido preservada
  lexicon: BDAG
  rationale: σῴζω en este contexto apunta a preservación de la vida, pero el valor léxico de ‘salvar’ se conserva en el español principal. La perífrasis condicional contrafactual ‘se habría salvado’ refleja bien el sentido de ἂν.
- source_word: πᾶσα σάρξ
  english_pob_choice: no flesh
  chosen_spanish: toda carne
  alternatives_spanish:
  - ningún ser humano
  - nadie
  lexicon: BDAG
  rationale: σάρξ aquí funciona como idioma bíblico para la humanidad viviente. ‘Toda carne’ reproduce el giro semítico con solemnidad; la alternativa más llana se reserva para una nota.
- source_word: διὰ τοὺς ἐκλεκτούς
  english_pob_choice: for the sake of the elect
  chosen_spanish: por causa de los escogidos
  alternatives_spanish:
  - por el bien de los escogidos
  - a favor de los escogidos
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o beneficio. ‘Por causa de’ es natural en español y mantiene la idea de que el acortamiento ocurre en atención a los elegidos.
- source_word: ἐκλεκτούς
  english_pob_choice: the elect
  chosen_spanish: los escogidos
  alternatives_spanish:
  - los elegidos
  - los electos
  lexicon: BDAG
  rationale: ἐκλεκτός puede traducirse como ‘escogido’ o ‘elegido’. Se opta por ‘escogidos’ para conservar la relación verbal con ‘eligió’ en la cláusula siguiente y evitar un tecnicismo eclesiástico innecesario.
- source_word: οὓς ἐξελέξατο
  english_pob_choice: whom he chose
  chosen_spanish: a quienes eligió
  alternatives_spanish:
  - a quienes escogió
  - a quienes seleccionó
  lexicon: BDAG
  rationale: ἐκλέγομαι se vierte de forma transparente como ‘elegir’. La relativa se adapta al español con ‘a quienes’ para marcar correctamente el complemento humano.
theological_decisions:
- issue: Sentido de σῴζω en el contexto
  english_pob_reading: Physical preservation of human life during the tribulation is the immediate sense, while retaining the lexical rendering 'saved' in English.
  chosen_spanish_reading: La idea inmediata es de preservación física en medio de la tribulación, aunque el verbo se mantenga como ‘salvarse’ en el texto principal.
  alternative_spanish_readings:
  - puramente salvación espiritual
  - simple supervivencia física sin matiz de salvación
  rationale: El contexto habla de días acortados para que no perezca toda la humanidad. Por eso la lectura inmediata es física; sin embargo, el verbo bíblico conserva su fuerza léxica de ‘salvar’, y no conviene diluirlo en una mera paráfrasis.
  doctrine_reference: 'Principio de traducción: no importar al texto afirmaciones doctrinales que el contexto no exige.'
- issue: Referente teológico de κύριος
  english_pob_reading: Retain 'the Lord' as the text's designation for the divine actor, without specifying a denominational doctrine.
  chosen_spanish_reading: Se traduce como ‘Yahvé’ para reflejar el nombre divino cuando κύριος remite al Dios de Israel en este contexto.
  alternative_spanish_readings:
  - el Señor
  - el Dueño
  rationale: La política terminológica del proyecto pide ‘Yahvé’ para el nombre divino. Aquí la acción corresponde claramente al sujeto soberano que determina los días, por lo que se evita oscurecer el referente con una máscara honorífica.
  doctrine_reference: Defaults terminológicos del proyecto para יהוה / κύριος.
- issue: Naturaleza de 'los escogidos'
  english_pob_reading: Retain 'the elect' as the text's designation for those on whose behalf the days are shortened, without specifying a denominational doctrine of election.
  chosen_spanish_reading: Se mantiene ‘los escogidos’ sin precisar una doctrina particular de elección.
  alternative_spanish_readings:
  - los elegidos con sentido corporativo explícito
  - los elegidos con sentido individual predestinacionista explícito
  rationale: El versículo afirma que hay un pueblo escogido y que los días se acortan por su causa, pero no resuelve aquí el debate más amplio sobre el modo de la elección. La traducción preserva esa tensión.
  doctrine_reference: Preservar tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue el pasaje fuente y el auditorio inglés de referencia sin introducir cambios doctrinales adicionales. Se conserva la tensión entre el idiomático bíblico ‘toda carne’ y el sentido contextual de humanidad viviente, igual que en el expediente inglés. No se requieren revisiones posteriores según el último pase auditado.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ de acuerdo con el estándar del proyecto para el nombre divino.
  - Se mantiene la repetición de ‘acortó/acortado’ para conservar la unidad léxica de κολοβόω.
  - ‘Los escogidos’ y ‘a quienes eligió’ reflejan el paralelismo entre ἐκλεκτούς y ἐξελέξατο.
  - La nota al pie se ancla en ‘toda carne’ para preservar la alternativa semántica sin recargar el texto principal.
