revisions:
- from: Y si Yahvé no hubiera acortado los días[a], no se habría salvado toda carne. Pero, por causa de los escogidos, a quienes eligió, acortó los días.
  to: Y si el Señor no hubiera acortado los días[a], no se habría salvado toda carne. Pero, por causa de los escogidos, a quienes eligió, acortó los días.
  rationale: Se corrige ‘Yahvé’ a ‘el Señor’ para reflejar fielmente κύριος en este contexto del NT y alinearse con el audit trail inglés y la evidencia fuente. Se conserva el resto, incluida la expresión bíblica ‘toda carne’ con nota aclaratoria, porque preserva mejor el modismo del original sin perder inteligibilidad.
