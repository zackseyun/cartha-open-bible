review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca el griego: mantiene la estructura condicional contrafactual, repite el verbo para ambas ocurrencias de ἐκολόβωσεν, conserva ‘salvado’ para ἐσώθη y refleja la relativa ‘a quienes eligió’. También preserva el modismo πᾶσα σάρξ con nota alternativa. Sin embargo, la decisión de verter κύριος como ‘Yahvé’ aquí no está suficientemente sustentada por el contexto inmediato ni por una cita explícita del nombre divino; en este pasaje del NT la referencia natural es ‘el Señor’.'
  spanish_quality_summary: El español es claro y digno. No obstante, ‘toda carne’ con ‘no se habría salvado’ suena algo rígido; funciona si se preserva por fidelidad idiomática bíblica, pero conviene ajustar la nota para aclarar que el sentido es ‘ningún ser humano’ o ‘nadie’. El resto fluye bien. ‘Por causa de los escogidos’ y ‘a quienes eligió’ son naturales.
  glossary_alignment: Buena alineación general con los defaults del proyecto para ‘salvar’, ‘carne’ y términos de elección. La principal divergencia problemática es usar ‘Yahvé’ para κύριος en un texto griego del NT sin evidencia clara de que funcione como sustituto directo del Tetragrámaton en este versículo. Dado el propio material inglés auditado, aquí debe mantenerse ‘el Señor’.
  issues:
  - severity: high
    issue: κύριος fue traducido como ‘Yahvé’
    rationale: En Marcos 13:20 el texto griego dice κύριος, y el audit trail inglés justificó ‘the Lord’. Aunque el proyecto usa ‘Yahvé’ para el nombre divino, no toda instancia de κύριος en el NT debe convertirse automáticamente en ‘Yahvé’. Aquí no hay cita explícita de YHWH ni evidencia inmediata que exija reemplazar el título por el nombre propio.
  - severity: low
    issue: La nota de ‘toda carne’ puede afinarse
    rationale: 'El texto principal puede conservar ‘toda carne’ por fidelidad al idiomático bíblico, pero la nota conviene formularla como equivalencia de sentido más natural en español: ‘ningún ser humano’ / ‘nadie’. El anclaje actual ya es correcto.'
  revised_spanish_text: Y si el Señor no hubiera acortado los días[a], no se habría salvado toda carne. Pero, por causa de los escogidos, a quienes eligió, acortó los días.
  revised_footnotes:
