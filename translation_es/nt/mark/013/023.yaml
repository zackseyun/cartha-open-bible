revisions:
- from: Pero ustedes, estén alerta[a]; les he dicho[b] todas las cosas de antemano.
  to: Pero ustedes, estén alerta[a]; les he dicho de antemano[b] todas las cosas.
  rationale: Se conserva la traducción principal porque es fiel al griego y al rastro POB, pero se mueve la nota [b] a «de antemano» para que el lector vea correctamente que la variación afecta la expresión verbal completa de προείρηκα, no solo «he dicho». También se coloca «de antemano» junto al verbo, que es la posición más natural en español para este matiz.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:44:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: contraste adversativo (δὲ), exhortación de vigilancia (βλέπετε) y declaración de aviso previo con vigencia actual (προείρηκα). Sin embargo, la ubicación de la nota [b] en «les he dicho» no corresponde bien a las alternativas inglesas, que afectan la expresión completa del verbo con el matiz anticipatorio, no solo «he dicho».'
  spanish_quality_summary: El español es claro y legible, pero «todas las cosas» suena algo calcado y poco natural en español bíblico actual. «Todas estas cosas» sería demasiado interpretativo; «todo» sería más natural pero perdería la correspondencia formal que el rastro inglés quiso conservar. La redacción mejora si se mantiene «todas las cosas» pero se ajusta la nota [b] al lugar correcto. «Pero ustedes, estén alerta» es natural y digno.
  glossary_alignment: No hay términos del glosario mayor en juego aquí. «Estén alerta» corresponde bien a βλέπετε en contexto. «Les he dicho de antemano» preserva adecuadamente προείρηκα + ὑμῖν. La revisión propuesta solo corrige la anclación de la nota lexical y mejora la fidelidad al razonamiento documentado.
  issues:
  - severity: medium
    issue: La nota [b] está anclada en «he dicho» en vez de en la expresión completa con sentido anticipatorio.
    rationale: Las alternativas documentadas («les he advertido de antemano», «les he hablado de antemano») comparan la cláusula verbal completa que traduce προείρηκα, no solo el núcleo «he dicho». El anclaje actual puede confundir al lector sobre qué parte varía.
  - severity: low
    issue: «Todas las cosas» suena menos idiomático en español contemporáneo.
    rationale: Aunque es una opción defendible por cercanía a πάντα y al ajuste inglés revisado a «all things», en español resulta más rígido. Aun así, no llega a justificar una reescritura más libre como «todo», dado el objetivo formal del proyecto.
  revised_spanish_text: Pero ustedes, estén alerta[a]; les he dicho de antemano[b] todas las cosas.
  revised_footnotes:
  - marker: a
    text: 'O: «estén en guardia» o «vigilen».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les he advertido de antemano» o «les he hablado de antemano».'
    reason: lexical_alternative
