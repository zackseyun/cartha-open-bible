translation:
  language: es
  text: Pero ustedes, estén alerta[a]; les he dicho de antemano[b] todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estén en guardia» o «vigilen».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «les he advertido de antemano» o «les he hablado de antemano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - vosotros
  lexicon: BDAG
  rationale: El pronombre griego es explícito y enfático. En español, "ustedes" comunica de forma natural el plural de segunda persona y conserva el contraste enfático sin forzar una estructura menos usual.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca transición o contraste con lo anterior; "Pero" reproduce bien el matiz adversativo en un contexto de advertencia.
- source_word: βλέπετε
  english_pob_choice: watch out
  chosen_spanish: estén alerta
  alternatives_spanish:
  - vigilen
  - estén en guardia
  - miren
  lexicon: BDAG
  rationale: El imperativo presente plural funciona como exhortación a mantenerse atentos. "Estén alerta" es idiomático en español moderno y conserva el sentido de vigilancia continua sin caer en un calco rígido.
- source_word: προείρηκα
  english_pob_choice: I have told beforehand
  chosen_spanish: les he dicho de antemano
  alternatives_spanish:
  - les he dicho antes
  - les he advertido de antemano
  - les he hablado de antemano
  lexicon: BDAG
  rationale: El perfecto indica una acción previa con vigencia actual. "Les he dicho de antemano" conserva el valor de haber hablado antes y mantiene la fuerza pastoral de la advertencia.
- source_word: ὑμῖν
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo indirecto tras un verbo de decir se expresa naturalmente con "les" en español, evitando duplicación innecesaria aunque el sujeto ya esté explícito.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo esto
  - todo lo demás
  lexicon: BDAG
  rationale: El neutro plural abarca una totalidad de asuntos. "Todas las cosas" sigue de cerca la forma griega y conserva la amplitud sin resolverla en una exclusividad más estrecha de lo que el contexto exige.
theological_decisions:
- issue: Alcance de "todas las cosas"
  english_pob_reading: Jesus emphasizes that the disciples must remain alert because he has already disclosed all necessary matters in advance.
  chosen_spanish_reading: Jesús insiste en que los discípulos permanezcan alerta porque ya les ha comunicado de antemano lo necesario para este aviso.
  alternative_spanish_readings:
  - Jesús afirma haberles revelado absolutamente cada detalle del futuro.
  - Jesús se refiere solo a las advertencias inmediatamente anteriores.
  rationale: La frase debe leerse como advertencia pastoral y no como una pretensión de exhaustividad absoluta. "Todas las cosas" conserva la amplitud del griego sin cerrar la tensión interpretativa que el contexto deja abierta.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del texto inglés POB, que pasó de «everything» a «all things» para corresponder más literalmente a πάντα sin perder naturalidad. En español, se mantuvo esa amplitud con «todas las cosas» y se optó por un imperativo idiomático («estén alerta») equivalente a «watch out».
  spanish_consistency_notes:
  - Se usa «ustedes» para la segunda persona plural, en registro neutral latinoamericano.
  - Se conserva el valor aspectual de perfectivo con «les he dicho de antemano».
  - «Todas las cosas» mantiene la correspondencia formal con πάντα y evita reducir el alcance sin justificación contextual.
