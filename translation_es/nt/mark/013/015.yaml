translation:
  language: es
  text: El que esté en la azotea no baje[a], ni entre para sacar nada de su casa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el que esté en el techo». El griego alude a una azotea plana, a menudo usada como espacio de actividad o estancia.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ ἐπὶ τοῦ δώματος
  english_pob_choice: the one on the housetop
  chosen_spanish: el que esté en la azotea
  alternatives_spanish:
  - el que esté en el techo
  - quien esté en la azotea
  lexicon: BDAG
  rationale: La frase articular funciona de manera sustantiva y designa a una persona situada allí. «Azotea» comunica mejor en español el espacio alto y transitable de una casa del entorno mediterráneo, equivalente funcional de «housetop», y evita un «techo» demasiado genérico.
- source_word: δώματος
  english_pob_choice: housetop
  chosen_spanish: azotea
  alternatives_spanish:
  - techo
  - terrado
  lexicon: BDAG
  rationale: En este contexto arquitectónico, el sentido es el de una superficie accesible y usada como espacio habitable o de actividad. «Azotea» transmite mejor esa realidad que «techo», que en español puede sonar a la cubierta estructural solamente.
- source_word: μὴ καταβάτω
  english_pob_choice: not go down
  chosen_spanish: no baje
  alternatives_spanish:
  - no debe bajar
  - no descienda
  lexicon: BDAG
  rationale: El griego expresa una prohibición en tercera persona. En español, «no baje» reproduce con naturalidad la orden negativa y mantiene el sentido de movimiento desde la azotea hacia abajo.
- source_word: μηδὲ εἰσελθάτω
  english_pob_choice: nor enter
  chosen_spanish: ni entre
  alternatives_spanish:
  - ni ingrese
  - ni vaya a entrar
  lexicon: BDAG
  rationale: «Ni entre» conserva la coordinación negativa de μηδέ y el valor de εἰσέρχομαι sin añadir información no presente en el texto.
- source_word: τι ἆραι
  english_pob_choice: to take anything
  chosen_spanish: para sacar nada
  alternatives_spanish:
  - para llevarse nada
  - para tomar nada
  lexicon: BDAG
  rationale: 'La construcción expresa finalidad: entrar con el propósito de tomar algo. En este contexto, la dirección implícita es sacar algo de la casa; «sacar nada» refleja el sentido de urgencia y la amplitud de la prohibición. Se usa «nada» para conservar el matiz negativo de la prohibición general.'
- source_word: ἐκ τῆς οἰκίας αὐτοῦ
  english_pob_choice: out of his house
  chosen_spanish: de su casa
  alternatives_spanish:
  - de su hogar
  - de su vivienda
  lexicon: BDAG
  rationale: «De su casa» es la forma más natural en español para expresar procedencia/remoción desde el interior. El posesivo singular masculino se mantiene como en el griego, siguiendo la decisión de preservar la singularidad representativa.
theological_decisions:
- issue: Singular masculino representativo en una instrucción de alcance general
  english_pob_reading: his house
  chosen_spanish_reading: su casa
  alternative_spanish_readings:
  - su hogar
  - la casa
  rationale: El griego usa singular masculino con valor genérico. En español, «su casa» mantiene ese rasgo sin neutralizarlo artificialmente. No se pluraliza ni se impersonaliza, porque el texto presenta una instrucción ejemplar y concreta.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Coincide con el control inglés de alta concordancia; no se documentan revisiones textuales ni cambios de lectura relevantes para este versículo. La traducción española sigue directamente el griego SBLGNT y conserva la fuerza imperativa y el contexto arquitectónico.
  spanish_consistency_notes:
  - Se usa «azotea» para reflejar el valor cultural de δώμα en el contexto judeo-mediterráneo.
  - Se mantiene la tercera persona de mandato negativa con «no baje» y «ni entre».
  - «Su casa» conserva el singular masculino representativo del griego.
  - La nota al pie ofrece la alternativa «techo» sin borrar el matiz cultural del texto.
