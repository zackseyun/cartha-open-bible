translation:
  language: es
  text: En verdad les digo que esta generación ciertamente no pasará hasta que sucedan todas estas cosas[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'este pueblo' o 'esta raza'; γενεά puede abarcar sentidos más amplios, aunque aquí 'generación' es la opción más natural.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'ciertamente no pasará' reproduce la negación enfática del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: De verdad
  alternatives_spanish:
  - Amén
  - En verdad
  lexicon: BDAG
  rationale: Como marcador solemne de una declaración autoritativa en los Evangelios, 'De verdad' comunica el peso discursivo de ἀμὴν sin dejarlo sin traducir ni sonar excesivamente litúrgico.
- source_word: λέγω ὑμῖν
  english_pob_choice: I say to you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les digo a ustedes
  lexicon: BDAG
  rationale: La fórmula directa se conserva con un español natural y reverente. 'Les digo' mantiene la cercanía del original sin forzar el orden sintáctico.
- source_word: οὐ μὴ παρέλθῃ
  english_pob_choice: will certainly not pass away
  chosen_spanish: ciertamente no pasará
  alternatives_spanish:
  - de ningún modo pasará
  - no pasará en absoluto
  lexicon: BDAG
  rationale: La negación enfática οὐ μή con subjuntivo aoristo pide una negación reforzada. 'Ciertamente no pasará' expresa esa fuerza en español claro, sin volverlo mecánico.
- source_word: ἡ γενεὰ αὕτη
  english_pob_choice: this generation
  chosen_spanish: esta generación
  alternatives_spanish:
  - este pueblo
  - esta raza
  - esta época
  lexicon: BDAG
  rationale: '''Generación'' es el sentido más natural en este contexto discursivo y debe conservarse para no resolver la tensión interpretativa que el griego deja abierta.'
- source_word: μέχρις οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta
  - mientras no
  lexicon: BDAG
  rationale: '''Hasta que'' expresa con naturalidad el límite temporal introducido por la cláusula griega.'
- source_word: ταῦτα πάντα
  english_pob_choice: all these things
  chosen_spanish: todo esto
  alternatives_spanish:
  - todas estas cosas
  - estas cosas, todas
  lexicon: BDAG
  rationale: En español, la referencia deíctica ya está clara en el contexto inmediato; 'todo esto' mantiene la suma de ταῦτα πάντα con una frase más fluida y natural.
- source_word: γένηται
  english_pob_choice: happen
  chosen_spanish: suceda
  alternatives_spanish:
  - acontezca
  - tenga lugar
  - ocurra
  lexicon: BDAG
  rationale: En este marco escatológico, γίνομαι apunta a la ocurrencia de eventos. 'Suceda' conserva ese valor de acontecimiento en español contemporáneo.
theological_decisions:
- issue: Sentido de ἡ γενεὰ αὕτη en un discurso escatológico
  english_pob_reading: Rendered straightforwardly as 'this generation' without interpretive expansion.
  chosen_spanish_reading: Se traduce literalmente como 'esta generación', sin ampliar a 'este pueblo' ni a otra solución interpretativa.
  alternative_spanish_readings:
  - este pueblo
  - esta raza
  - una generación futura
  rationale: El texto griego favorece el sentido ordinario 'generación'. Dado que el pasaje es debatido, la traducción debe preservar la tensión interpretativa en vez de resolverla en una sola dirección.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se detectaron cambios necesarios y la evaluación de concordancia fue alta.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó 'generación' para no suavizar la ambigüedad exegética del término griego.
  - Se eligió un español moderno y digno, evitando calcos como 'pasará away' o fórmulas excesivamente arcaizantes.
