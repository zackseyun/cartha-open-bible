translation:
  language: es
  text: 'Y entonces, si alguien les dice: «Miren, aquí está el Mesías[a]» o: «Miren, allí está», no lo crean.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ τότε
  english_pob_choice: And then
  chosen_spanish: Y entonces
  alternatives_spanish:
  - Entonces
  - Y luego
  - Y en ese momento
  lexicon: BDAG
  rationale: La combinación enlaza la advertencia con el discurso anterior y marca un avance temporal. «Y entonces» conserva tanto el enlace καὶ como el valor temporal de τότε en español natural.
- source_word: ἐάν τις ὑμῖν εἴπῃ
  english_pob_choice: if anyone says to you
  chosen_spanish: si alguien les dice
  alternatives_spanish:
  - si cualquiera les dice
  - si alguien les dijera
  - si alguno les dice
  lexicon: BDAG
  rationale: Es una condición general. «Alguien» expresa bien el indefinido τις y «les dice» conserva la dirección a los oyentes en forma natural en español.
- source_word: Ἴδε
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Miren aquí
  - Vean
  - Miren,
  lexicon: BDAG
  rationale: Ἴδε funciona como interjección de atención. «Miren» es claro, directo y de registro moderno; mantiene el impulso exhortativo sin arcaísmo.
- source_word: ὧδε
  english_pob_choice: here
  chosen_spanish: aquí
  alternatives_spanish:
  - aquí mismo
  - aquí está
  - en este lugar
  lexicon: BDAG
  rationale: ὧδε es el adverbio proximal «aquí». En la construcción española, «aquí está» expresa con naturalidad la deíxis de presencia.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título en un anuncio de pretendientes escatológicos. Según la política terminológica, se traduce «Mesías» para conservar el valor titulado y hebraizante; «Cristo» queda como alternativa tradicional.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - allá
  lexicon: BDAG
  rationale: ἐκεῖ es el correlato distal de ὧδε. «Allí» preserva bien el contraste espacial con «aquí».
- source_word: μὴ πιστεύετε
  english_pob_choice: do not believe it
  chosen_spanish: no lo crean
  alternatives_spanish:
  - no crean en eso
  - no le crean
  - no lo acepten
  lexicon: BDAG
  rationale: πιστεύετε aquí se refiere a aceptar la afirmación o el aviso. «No lo crean» es natural y conserva el objeto implícito de la advertencia sin precisar de más.
theological_decisions:
- issue: Renderización de Χριστός como título en un contexto de falsos pretendientes
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: El contexto no presenta a Cristo como nombre litúrgico fijo, sino como título mesiánico reclamado por falsos anuncios. «Mesías» preserva mejor la carga histórica y semítica del término y evita una lectura más eclesializada que el griego no exige aquí.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto al término al que remite. Se mantuvo la decisión terminológica POB para Χριστός como «Mesías», con la alternativa tradicional preservada en nota.
  spanish_consistency_notes:
  - Usar «Mesías» para Χριστός en esta unidad, no «Cristo», salvo nota alternativa.
  - Mantener el contraste deíctico «aquí / allí» para ὧδε / ἐκεῖ.
  - Conservar el imperativo plural «Miren» y la negación «no lo crean» como español natural y fiel al mandato.
