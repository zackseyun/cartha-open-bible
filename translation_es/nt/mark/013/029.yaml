translation:
  language: es
  text: Así también ustedes[a], cuando vean que estas cosas suceden, sepan que está cerca, a las puertas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él está cerca». El griego no expresa el sujeto de forma explícita.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: So also you
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - De la misma manera, ustedes
  - Así ustedes también
  lexicon: BDAG
  rationale: οὕτως enlaza esta afirmación con la comparación anterior; καὶ ὑμεῖς añade énfasis a los discípulos como observadores correspondientes. «Así también ustedes» conserva esa conexión discursiva y el énfasis sin sonar forzado en español.
- source_word: ὅταν ἴδητε
  english_pob_choice: when you see
  chosen_spanish: cuando vean
  alternatives_spanish:
  - cuando ustedes vean
  - siempre que vean
  lexicon: BDAG
  rationale: ὅταν con subjuntivo aoristo expresa una contingencia futura. En español, «cuando» transmite bien ese valor predictivo en este contexto; el sujeto explícito puede omitirse por naturalidad, manteniendo el sentido plural de segunda persona.
- source_word: ταῦτα γινόμενα
  english_pob_choice: these things happening
  chosen_spanish: suceder estas cosas
  alternatives_spanish:
  - estar ocurriendo estas cosas
  - tener lugar estas cosas
  lexicon: BDAG
  rationale: ταῦτα debe conservarse como «estas cosas». γινόμενα expresa cosas que llegan a ocurrir o suceder; «suceder» es natural en español y preserva la idea de acontecimientos en curso sin añadir matices ajenos.
- source_word: γινώσκετε
  english_pob_choice: know
  chosen_spanish: sepan
  alternatives_spanish:
  - reconozcan
  - tengan por seguro
  lexicon: BDAG
  rationale: El imperativo presente pide que los discípulos saquen la conclusión correcta de las señales. «Sepan» es directo y adecuado en español para ese mandato inferencial.
- source_word: ὅτι ἐγγύς ἐστιν
  english_pob_choice: that it is near
  chosen_spanish: que está cerca
  alternatives_spanish:
  - que él está cerca
  - que se acerca
  lexicon: BDAG
  rationale: El griego no explicita sujeto con ἐστιν. En español, «está cerca» permite una traducción impersonal y conserva la tensión interpretativa sin forzar un referente concreto en el texto principal.
- source_word: ἐπὶ θύραις
  english_pob_choice: at the doors
  chosen_spanish: a las puertas
  alternatives_spanish:
  - en las puertas
  - junto a las puertas
  lexicon: BDAG
  rationale: El plural θύραις se refleja con «puertas», siguiendo de cerca la forma griega y la imagen de extrema cercanía. «A las puertas» es una expresión natural en español y mantiene la intensidad idiomática.
theological_decisions:
- issue: Sujeto implícito de ἐστιν en «ἐγγύς ἐστιν»
  english_pob_reading: Render the clause impersonally as 'it is near' in the main text.
  chosen_spanish_reading: «está cerca» en forma impersonal, sin explicitar sujeto.
  alternative_spanish_readings:
  - «él está cerca»
  - «eso está cerca»
  rationale: El griego deja el sujeto sin expresar. Dado el contexto inmediato, la cercanía apunta al cumplimiento anunciado, pero la identidad exacta del referente sigue abierta. La forma impersonal en español preserva esa tensión interpretativa en lugar de resolverla.
  doctrine_reference: Conservar la ambigüedad textual donde el griego no especifica el sujeto.
translation_notes:
  revision_awareness: 'Coincide con el estado revisado del audit trail: no hay revisiones aplicadas y el análisis final indica alta concordancia, sin cambios necesarios.'
  spanish_consistency_notes:
  - Se mantiene «ustedes» como tratamiento plural neutro y reverente.
  - Se conserva la imagen plural de θύραις con «puertas», evitando singularizarla.
  - Se evita introducir «Cristo» o «Señor» porque el griego no lo expresa en este versículo.
