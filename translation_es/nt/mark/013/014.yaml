translation:
  language: es
  text: Pero cuando vean la abominación de la desolación de pie donde no debe estar[a], el que lee, entienda; entonces los que estén en Judea huyan a los montes[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «de pie donde él no debe estar». El participio griego es masculino, lo que puede sugerir un referente personal detrás de «la abominación».
    reason: alternative_reading
  - marker: b
    text: «La abominación de la desolación» hace eco del lenguaje de Daniel (véase Dan. 9:27; 11:31; 12:11).
    reason: cross_reference
lexical_decisions:
- source_word: Ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: Ὅταν introduce una condición temporal; δέ funciona como transición suave. «Pero» mantiene el avance discursivo sin exagerar oposición, y «cuando» conserva la subordinación temporal natural en español.
- source_word: ἴδητε
  english_pob_choice: you see
  chosen_spanish: vean
  alternatives_spanish:
  - vean claramente
  - perciban
  lexicon: BDAG
  rationale: El aoristo subjuntivo en una cláusula temporal se expresa de forma natural en español con presente subjuntivo tras «cuando». «Vean» es directo y fiel al valor perceptivo de ὁράω.
- source_word: τὸ βδέλυγμα τῆς ἐρημώσεως
  english_pob_choice: the abomination of desolation
  chosen_spanish: la abominación de la desolación
  alternatives_spanish:
  - el sacrilegio desolador
  - la abominación que causa desolación
  lexicon: BDAG
  rationale: Se conserva la fórmula apocalíptica tradicional y cercana al texto griego. «Abominación de la desolación» mantiene la resonancia intertextual con Daniel sin resolver el referente ni expandir el sentido.
- source_word: ἑστηκότα
  english_pob_choice: standing
  chosen_spanish: de pie
  alternatives_spanish:
  - estando
  - erigida
  lexicon: BDAG
  rationale: El participio perfecto de ἵστημι expresa un estado presente. «De pie» es idiomático en español y conserva la imagen de presencia fija mejor que una paráfrasis más explicativa.
- source_word: ὅπου οὐ δεῖ
  english_pob_choice: where it ought not to be
  chosen_spanish: donde no debe
  alternatives_spanish:
  - donde no debe estar
  - donde él no debe estar
  lexicon: BDAG
  rationale: δεῖ expresa necesidad o conveniencia. La forma breve «donde no debe» suena natural en español y conserva la ambigüedad del texto, dejando abierta la posible referencia personal sugerida por el participio masculino.
- source_word: ὁ ἀναγινώσκων νοείτω
  english_pob_choice: let the reader understand
  chosen_spanish: el que lee, entienda
  alternatives_spanish:
  - el lector entienda
  - el que lee, comprenda
  lexicon: BDAG
  rationale: Se mantiene el carácter parentético e imperativo. «El que lee» reproduce con naturalidad el participio sustantivado, y «entienda» sigue de cerca νοέω sin endurecer el registro.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  - luego
  lexicon: BDAG
  rationale: Marca la consecuencia inmediata del signo anunciado.
- source_word: οἱ ἐν τῇ Ἰουδαίᾳ
  english_pob_choice: those in Judea
  chosen_spanish: los que estén en Judea
  alternatives_spanish:
  - los de Judea
  - los que se hallen en Judea
  lexicon: BDAG
  rationale: La construcción sustantiva se vierte de modo natural con una relativa en español. Se preserva la especificidad geográfica de Ἰουδαία.
- source_word: φευγέτωσαν
  english_pob_choice: let ... flee
  chosen_spanish: huyan
  alternatives_spanish:
  - que huyan
  - deben huir
  lexicon: BDAG
  rationale: El imperativo de tercera persona plural expresa urgencia. «Huyan» comunica la fuerza exhortativa de forma más fluida que una perífrasis con «que» o «deben».
- source_word: εἰς τὰ ὄρη
  english_pob_choice: to the mountains
  chosen_spanish: a los montes
  alternatives_spanish:
  - a las montañas
  - hacia los montes
  lexicon: BDAG
  rationale: ὄρη puede traducirse por «montes» o «montañas». «Montes» es bíblico y natural en español, y conserva el sentido topográfico directo sin añadir matices interpretativos.
theological_decisions:
- issue: βδέλυγμα τῆς ἐρημώσεως como expresión daniélica cargada de ambigüedad
  english_pob_reading: Retain the source-near phrase 'the abomination of desolation' without specifying its historical referent in the translation.
  chosen_spanish_reading: Conservar «la abominación de la desolación» sin identificar en el texto principal si se trata de objeto, acto o persona.
  alternative_spanish_readings:
  - el sacrilegio desolador
  - la abominación que causa desolación
  rationale: La expresión alude a Daniel y su referencia histórica y escatológica es debatida. La traducción debe preservar la tensión teológica y la ambigüedad del signo en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Participio masculino ἑστηκότα con sustantivo neutro βδέλυγμα
  english_pob_reading: Main text uses 'standing where it ought not to be' with neuter agreement in English, while preserving the more personal 'where he ought not to be' in a footnote.
  chosen_spanish_reading: Traducir de forma neutra en el cuerpo («donde no debe») y documentar la posibilidad de una referencia personal en nota.
  alternative_spanish_readings:
  - donde él no debe estar
  - donde no debe estar
  rationale: La concordancia gramatical griega sugiere una tensión real. El texto principal en español mantiene la lectura más fluida y deja constancia de la alternativa más personal sin cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Sin cambios respecto del último pase revisado: el texto fuente y el audit trail inglés muestran alto acuerdo, y no se registraron revisiones aplicadas.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Mesías/Cristo» solo cuando el contexto lo exige; aquí no aparece.
  - Se preserva la tensión interpretativa de la frase daniélica y del participio masculino, en línea con la filosofía POB de no resolver ambigüedades del original.
  - Se eligió «montes» para mantener el registro bíblico natural en español, sin perder el sentido de εἰς τὰ ὄρη.
