  text: Ὅταν δὲ ἴδητε τὸ βδέλυγμα τῆς ἐρημώσεως ⸀ἑστηκότα ὅπου οὐ δεῖ, ὁ ἀναγινώσκων νοείτω, τότε οἱ ἐν τῇ Ἰουδαίᾳ φευγέτωσαν εἰς τὰ ὄρη,
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/014.yaml
  text: But when you see the abomination of desolation standing where it ought not to be (let the reader understand)[a], then let those in Judea flee to the mountains[b],
  footnotes:
