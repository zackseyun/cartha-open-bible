    text: Or, 'standing where he ought not to be.' The Greek participle is masculine, which may suggest a personal referent behind 'the abomination.'
    reason: alternative_reading
  - marker: b
    text: '''The abomination of desolation'' echoes Daniel''s language (see Dan. 9:27; 11:31; 12:11).'
    reason: cross_reference
