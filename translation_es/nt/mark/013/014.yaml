revisions:
- from: Pero cuando vean la abominación de la desolación[a] de pie donde no debe, el que lee, entienda; entonces los que estén en Judea huyan a los montes[b],
  to: Pero cuando vean la abominación de la desolación de pie donde no debe estar[a], el que lee, entienda; entonces los que estén en Judea huyan a los montes[b],
  rationale: 'La revisión conserva el sentido y las decisiones del POB, pero corrige tres detalles: reubica la nota [a] en la frase que realmente comenta, explicita «estar» para un español más natural sin perder la ambigüedad, y mejora la redacción de la nota [b].'
