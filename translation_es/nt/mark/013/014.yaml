review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB en casi todos los elementos clave: la cláusula temporal («Pero cuando vean»), la expresión daniélica («la abominación de la desolación»), la exhortación parentética, y la orden de huir a Judea. También preserva correctamente la ambigüedad del participio masculino mediante nota. Sin embargo, el anclaje de la nota [a] está mal colocado sobre «desolación» en vez de sobre la frase relevante «de pie donde no debe estar», y «donde no debe» queda demasiado elíptico frente al inglés auditado y al griego. Además, la nota [b] contiene un uso no estándar: «ecoa» debe corregirse.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero requiere un ajuste menor para mejorar naturalidad y precisión: «de pie donde no debe estar» suena más completo y natural que «de pie donde no debe». La frase parentética «el que lee, entienda» es aceptable, aunque «que el lector entienda» sería también natural; no es necesario cambiarla. La nota [b] necesita corrección idiomática a «hace eco del lenguaje de Daniel» o similar.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé/Mesías/etc. «La abominación de la desolación» concuerda con la decisión léxica documentada y preserva la tensión teológica. «Judea» y «montes» son adecuados.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica la alternativa de ἑστηκότα / ὅπου οὐ δεῖ («de pie donde él no debe estar»), no la frase «la desolación». Según las instrucciones, el marcador debe aparecer en la palabra o frase pertinente dentro del texto.
  - severity: medium
    issue: «donde no debe» es demasiado elíptico en español.
    rationale: Aunque intenta conservar la ambigüedad, el español queda algo abrupto. «donde no debe estar» mantiene mejor la legibilidad y sigue siendo compatible con la nota alternativa personal («donde él no debe estar»).
  - severity: low
    issue: La nota [b] usa «ecoa», forma no recomendable en este registro.
    rationale: Para un español neutral y eclesialmente legible, «hace eco del lenguaje de Daniel» o «evoca el lenguaje de Daniel» es preferible.
  revised_spanish_text: Pero cuando vean la abominación de la desolación de pie donde no debe estar[a], el que lee, entienda; entonces los que estén en Judea huyan a los montes[b],
  revised_footnotes:
  - marker: a
    text: O, «de pie donde él no debe estar». El participio griego es masculino, lo que puede sugerir un referente personal detrás de «la abominación».
    reason: alternative_reading
  - marker: b
    text: «La abominación de la desolación» hace eco del lenguaje de Daniel (véase Dan. 9:27; 11:31; 12:11).
    reason: cross_reference
  revision_rationale: 'La revisión conserva el sentido y las decisiones del POB, pero corrige tres detalles: reubica la nota [a] en la frase que realmente comenta, explicita «estar» para un español más natural sin perder la ambigüedad, y mejora la redacción de la nota [b].'
