    issue: «el señor de la casa» para ὁ κύριος τῆς οἰκίας
    rationale: 'La evidencia y la decisión teológica inglesa favorecen un sentido doméstico no titular: «master of the house». En español, «señor de la casa» suena más ambiguo y puede leerse como título o calco innecesario. «El dueño de la casa» preserva mejor la función contextual.'
  - severity: low
    issue: 'Nota a: «permanezcan vigilantes» no corresponde del todo al matiz más cercano de «keep watch»'
    rationale: No es grave, porque la nota explica alerta y vigilancia. Pero una alternativa como «velen» o «permanezcan atentos» estaría algo más cerca del campo semántico de γρηγορεῖτε/‘keep watch’.
