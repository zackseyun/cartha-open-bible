  text: γρηγορεῖτε οὖν, οὐκ οἴδατε γὰρ πότε ὁ κύριος τῆς οἰκίας ἔρχεται, ⸀ἢ ὀψὲ ἢ ⸀μεσονύκτιον ἢ ἀλεκτοροφωνίας ἢ πρωΐ,
base_translation:
  language: en
  yaml_path: translation/nt/mark/013/035.yaml
  text: 'Therefore stay awake[a], for you do not know when the master of the house is coming: whether in the evening, or at midnight, or at cockcrow[b], or in the morning.'
  footnotes:
  - marker: a
    text: Or 'keep watch.' The command carries the sense of remaining alert and vigilant.
    reason: lexical_alternative
  - marker: b
    text: '''Cockcrow'' refers to the night watch associated with the rooster''s crowing.'
    reason: cultural_note
  ai_draft:
