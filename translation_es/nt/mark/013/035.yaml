translation:
  language: es
  text: 'Por tanto, manténganse despiertos[a], porque no saben cuándo viene el dueño de la casa: si al atardecer, o a la medianoche, o al canto del gallo[b], o por la mañana.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «velen». El mandato incluye permanecer alerta y vigilantes.'
    reason: lexical_alternative
  - marker: b
    text: «El canto del gallo» señala la vigilia nocturna asociada con el canto del gallo.
    reason: cultural_note
lexical_decisions:
- source_word: γρηγορεῖτε
  english_pob_choice: stay awake
  chosen_spanish: manténganse despiertos
  alternatives_spanish:
  - estén vigilantes
  - permanezcan alertas
  - vigilen
  lexicon: BDAG
  rationale: El mandato exige alerta constante ante un momento incierto. En español, «manténganse despiertos» comunica bien la vigilancia continua sin sonar rígido ni perder el valor imperativo.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una conclusión lógica desde el contexto inmediato. «Por tanto» conserva el enlace inferencial con tono natural y digno.
- source_word: οὐκ οἴδατε
  english_pob_choice: you do not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no saben con certeza
  - ignoran
  lexicon: BDAG
  rationale: La negación simple del verbo saber basta aquí. El plural de segunda persona mantiene el carácter exhortativo directo del discurso.
- source_word: πότε
  english_pob_choice: when
  chosen_spanish: cuándo
  alternatives_spanish:
  - a qué hora
  lexicon: BDAG
  rationale: La interrogativa temporal indirecta se expresa de forma natural con «cuándo» sin añadir precisión no presente en el griego.
- source_word: ὁ κύριος τῆς οἰκίας
  english_pob_choice: the master of the house
  chosen_spanish: el señor de la casa
  alternatives_spanish:
  - el dueño de la casa
  - el amo de la casa
  - el jefe de la casa
  lexicon: BDAG
  rationale: Conservo «señor» porque κύριος en este dicho doméstico puede sonar a autoridad del hogar sin forzar una reinterpretación. «Señor de la casa» reproduce el sintagma de manera transparente y mantiene la posible resonancia del término sin convertirlo en un título litúrgico.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - llega
  lexicon: BDAG
  rationale: El presente con valor futuro se traduce con un presente natural en español. «Viene» es breve, vivo y suficiente para la expectativa de llegada.
- source_word: ὀψὲ
  english_pob_choice: in the evening
  chosen_spanish: al atardecer
  alternatives_spanish:
  - por la tarde
  - en la tarde
  - en la noche
  lexicon: BDAG
  rationale: En la secuencia de vigilias nocturnas, este término apunta al tramo inicial de la noche. «Al atardecer» comunica ese inicio temporal con naturalidad en español y evita una vaguedad excesiva.
- source_word: μεσονύκτιον
  english_pob_choice: at midnight
  chosen_spanish: a la medianoche
  alternatives_spanish:
  - a medianoche
  - en la medianoche
  lexicon: BDAG
  rationale: Es la equivalencia temporal directa y precisa para el segundo punto de la lista.
- source_word: ἀλεκτοροφωνίας
  english_pob_choice: at cockcrow
  chosen_spanish: al canto del gallo
  alternatives_spanish:
  - al cantar el gallo
  - a la madrugada del canto del gallo
  lexicon: BDAG
  rationale: Mantengo la referencia idiomática a la señal tradicional de tiempo. «Al canto del gallo» es natural en español y conserva el marcador horario técnico sin explicitar de más.
- source_word: πρωΐ
  english_pob_choice: in the morning
  chosen_spanish: por la mañana
  alternatives_spanish:
  - al amanecer
  - de mañana
  - en la mañana
  lexicon: BDAG
  rationale: El término final amplía la lista hacia el tramo matutino. «Por la mañana» es claro, sobrio y no sobreespecifica la hora exacta.
theological_decisions:
- issue: 'κύριος en una imagen parabólica doméstica: posible resonancia titulada vs. función de dueño/autoridad del hogar'
  english_pob_reading: master of the house
  chosen_spanish_reading: señor de la casa
  alternative_spanish_readings:
  - dueño de la casa
  - amo de la casa
  - Señor de la casa
  rationale: 'La POB inglesa documenta que aquí κύριος se entiende por el contexto como autoridad doméstica, no como uso directo del título divino. En español, «señor de la casa» conserva la ambigüedad controlada: es comprensible como cabeza del hogar y, a la vez, no obliga a sustituir el término por un equivalente más interpretativo como «dueño» o «amo».'
  doctrine_reference: 'DOCTRINE.md: Contested terms (κύριος → Lord by default); documented contextual exception for parabolic household language'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa muestran acuerdo alto y no registran revisiones aplicadas; por eso la redacción española sigue de cerca la decisión inglesa principal, pero ajusta el primer mandato a un español natural y conserva la nota cultural para el marcador horario.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma de proyecto cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó «señor» para κύριος dentro de la imagen doméstica, conforme a la excepción contextual documentada, sin convertirlo en «SEÑOR» en mayúsculas.
  - 'La secuencia temporal se conserva con cuatro hitos claros: atardecer, medianoche, canto del gallo y mañana.'
  - La nota al pie [a] marca una alternativa lexical real, no una paráfrasis libre.
