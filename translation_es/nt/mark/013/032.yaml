    rationale: El original presenta una sola cadena negativa enfática («nadie sabe, ni... ni... sino...»). El punto y coma rompe demasiado la unidad argumentativa y debilita el efecto climáctico que el inglés POB marcó con raya.
  - severity: low
    issue: Combinación de «ni siquiera» seguida de «ni el Hijo» tras el corte fuerte
    rationale: 'No es incorrecta, pero en español fluye mejor como serie continua después de una raya: «ni siquiera... ni el Hijo...». El ajuste mejora naturalidad y cercanía al ritmo del original sin cambiar sentido.'
