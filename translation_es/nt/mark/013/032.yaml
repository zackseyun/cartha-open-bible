translation:
  language: es
  text: Pero respecto a aquel día o aquella hora[a], nadie sabe—ni siquiera los ángeles en el cielo, ni el Hijo, sino solo el Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos intérpretes entienden «ni el Hijo» como referido a la misión encarnada del Hijo o a su naturaleza humana; la traducción conserva el texto griego sin incorporar esa explicación en la línea principal.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: But concerning
  chosen_spanish: Pero respecto a
  alternatives_spanish:
  - Ahora bien, respecto a
  - Pero acerca de
  lexicon: BDAG
  rationale: περί con genitivo introduce el tema, y δέ marca transición. «Pero respecto a» conserva el matiz de cambio discursivo sin sonar forzado en español.
- source_word: τῆς ἡμέρας ἐκείνης ἢ τῆς ὥρας
  english_pob_choice: that day or hour
  chosen_spanish: aquel día o aquella hora
  alternatives_spanish:
  - ese día o esa hora
  - aquel día o la hora
  lexicon: BDAG
  rationale: La pareja día/hora distingue un tiempo más amplio y uno más preciso. En español conviene repetir el demostrativo para mantener la estructura y la fuerza del contraste.
- source_word: οὐδεὶς οἶδεν
  english_pob_choice: no one knows
  chosen_spanish: nadie sabe
  alternatives_spanish:
  - nadie conoce
  - no hay nadie que sepa
  lexicon: BDAG
  rationale: οἶδα suele tener valor presente de 'saber'. «Nadie sabe» es natural y fiel; «conoce» sería posible pero menos idiomático aquí.
- source_word: οὐδὲ οἱ ἄγγελοι ἐν οὐρανῷ
  english_pob_choice: not even the angels in heaven
  chosen_spanish: ni siquiera los ángeles en el cielo
  alternatives_spanish:
  - ni aun los ángeles en el cielo
  - ni los ángeles del cielo
  lexicon: BDAG
  rationale: οὐδέ añade negación enfática. «Ni siquiera» comunica mejor la fuerza climática que una simple repetición de «ni». «En el cielo» mantiene el sentido locativo de ἐν οὐρανῷ.
- source_word: οὐδὲ ὁ υἱός
  english_pob_choice: nor the Son
  chosen_spanish: ni el Hijo
  alternatives_spanish:
  - ni siquiera el Hijo
  - ni el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva «el Hijo» como título cristológico. «Ni el Hijo» mantiene la brevedad y la dureza del griego sin añadir explicación interpretativa al texto principal.
- source_word: εἰ μὴ ὁ πατήρ
  english_pob_choice: but only the Father
  chosen_spanish: sino solo el Padre
  alternatives_spanish:
  - excepto el Padre
  - salvo el Padre
  lexicon: BDAG
  rationale: εἰ μή después de una negación introduce la única excepción. «Sino solo el Padre» expresa bien esa exclusividad en español.
theological_decisions:
- issue: La afirmación de que el Hijo no sabe el día ni la hora
  english_pob_reading: Retain the plain wording 'nor the Son' without softening or explanatory expansion.
  chosen_spanish_reading: Mantener «ni el Hijo» sin añadir en el texto principal aclaraciones como «en su humanidad».
  alternative_spanish_readings:
  - Añadir «en su humanidad» en el texto principal
  - Omitir «ni el Hijo» para armonizar con otras tradiciones textuales
  rationale: El griego incluye explícitamente οὐδὲ ὁ υἱός. La traducción debe preservar esa tensión cristológica sin resolverla dentro de la línea del versículo; la explicación doctrinal pertenece a las notas, no al texto base.
  doctrine_reference: Cristología nicena y calcedonense; primacía del texto original
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alta concordancia con la evaluación previa y con el audit trail inglés.
  spanish_consistency_notes:
  - Se usó «YHWH»/«Yahvé» no aplica aquí; no hay nombre divino en el versículo.
  - Se mantuvo «el Hijo» como título cristológico, no como perífrasis.
  - «Ni siquiera» refleja el valor enfático de οὐδέ, y «sino solo» expresa la excepción exclusiva de εἰ μή.
  - La puntuación con punto y coma tras «sabe» y las comas posteriores refleja bien la serie negativa del griego.
