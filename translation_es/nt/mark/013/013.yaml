translation:
  language: es
  text: Y ustedes serán odiados por todos a causa de mi nombre[a][b][c]. Pero el que persevere hasta el fin será salvo[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de mi nombre».
    reason: lexical_alternative
  - marker: b
    text: O «el que persevera» o «el que permanece firme hasta el fin».
    reason: lexical_alternative
  - marker: c
    text: O «será librado». El griego puede denotar rescate o salvación; el contexto deja abierta la amplitud del sentido.
    reason: alternative_reading
  - marker: d
    text: Lit. «el que persevere hasta el fin, este será salvo».
    reason: previous_rendering
lexical_decisions:
- source_word: μισούμενοι
  english_pob_choice: hated
  chosen_spanish: odiados
  alternatives_spanish:
  - siendo odiados
  - objeto del odio
  lexicon: BDAG
  rationale: El participio perifrástico con ἔσεσθε expresa una idea futura pasiva; en español, «serán odiados» comunica con naturalidad la misma fuerza. «Siendo odiados» sería más pegado a la forma griega, pero menos idiomático.
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos los hombres
  - por toda la gente
  lexicon: BDAG
  rationale: La construcción con ὑπό y genitivo mantiene el alcance universal. «Por todos» conserva esa amplitud sin añadir restricciones ni suavizar el enunciado.
- source_word: διὰ τὸ ὄνομά μου
  english_pob_choice: because of my name
  chosen_spanish: a causa de mi nombre
  alternatives_spanish:
  - por mi nombre
  - por causa de mi nombre
  - por el bien de mi nombre
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o motivo. «A causa de mi nombre» es claro en español y conserva el valor bíblico de «nombre» como referencia a la persona, autoridad y lealtad a Jesús.
- source_word: ὁ δὲ ὑπομείνας
  english_pob_choice: the one who endures
  chosen_spanish: el que persevere
  alternatives_spanish:
  - el que resista
  - el que permanezca firme
  - el que enduré
  lexicon: BDAG
  rationale: Aunque el griego usa un participio aoristo sustantivado, en español la relativa con subjuntivo futuro o de generalidad expresa bien al sujeto caracterizado por la perseverancia. «Persevere» comunica la idea de seguir bajo presión con continuidad y firmeza.
- source_word: εἰς τέλος
  english_pob_choice: to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: 'La frase indica continuidad hasta el punto final. «Hasta el fin» es natural en español bíblico y preserva la posible amplitud del final: la prueba, la vida o el cierre escatológico.'
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - esa persona
  - él
  lexicon: BDAG
  rationale: El pronombre resumptivo enfatiza al individuo que persevera. En español, «este» permite conservar esa resonancia enfática sin volver la frase pesada.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvo
  alternatives_spanish:
  - será librado
  - será rescatado
  lexicon: BDAG
  rationale: σῴζω puede significar rescatar/liberar o salvar en sentido pleno. En este contexto de discipulado bajo persecución, «será salvo» mantiene la amplitud teológica sin resolverla de antemano hacia una liberación meramente temporal.
theological_decisions:
- issue: Alcance de σωθήσεται en un contexto de persecución y perseverancia
  english_pob_reading: will be saved
  chosen_spanish_reading: será salvo
  alternative_spanish_readings:
  - será librado
  - será rescatado
  rationale: La frase vincula la perseverancia con la salvación final, pero no obliga a reducir σῴζω a rescate momentáneo. «Será salvo» preserva la tensión entre rescate y salvación plena, siguiendo el principio de no resolver más de lo que el griego permite.
  doctrine_reference: Preservar la tensión teológica del texto sin estrecharla a una sola lectura doctrinal.
- issue: Universo del odio expresado por πάντων
  english_pob_reading: by all
  chosen_spanish_reading: por todos
  alternative_spanish_readings:
  - por todo el mundo
  - por toda la gente
  rationale: El texto habla en términos absolutos y retóricos. La traducción conserva esa universalidad sin corregirla ni mitigarla, dejando que el contexto delimite su alcance.
  doctrine_reference: Mantener la fuerza retórica del enunciado.
translation_notes:
  revision_awareness: 'La traducción sigue el último pase de revisión: se conservó la estructura naturalizada frente a un calco más rígido, pero se mantuvo el pronombre resumptivo («este») porque refleja el énfasis del griego. El ajuste principal fue evitar una formulación demasiado literal en español y preservar la tensión semántica de σῴζω.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como forma reservada para el nombre divino cuando aparezca explícitamente; este versículo no lo requiere.
  - Se traduce el verbo pasivo con una construcción natural en español («serán odiados»).
  - Se preserva «nombre» sin expandirlo, porque el texto ya deja inferir el trasfondo de autoridad y pertenencia.
  - «Será salvo» mantiene el campo semántico amplio de σῴζω y evita decidir entre rescate temporal y salvación escatológica.
