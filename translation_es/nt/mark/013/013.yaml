revisions:
- from: Y ustedes serán odiados por todos a causa de mi nombre[a][b][c][d]. Pero el que persevere hasta el fin, este será salvo.
  to: Y ustedes serán odiados por todos a causa de mi nombre[a][b][c]. Pero el que persevere hasta el fin será salvo[d].
  rationale: Se elimina «este» del texto principal para lograr un español más natural y alineado con la revisión ya aceptada en el POB inglés, sin pérdida de sentido. La presencia enfática de οὗτος puede preservarse suficientemente en una nota literal. También se reubican las notas para que anclen donde corresponde y la nota d se clasifica como formulación previa/literal, no como alternativa semántica.
