translation:
  language: es
  text: 'Y le dijo[a]: «Por lo que has dicho, vete; el demonio ha salido de tu hija».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por esta palabra», o «Por este dicho».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτῇ
  english_pob_choice: And he said to her
  chosen_spanish: Y le dijo
  alternatives_spanish:
  - Entonces le dijo
  - Y le habló
  lexicon: BDAG
  rationale: La narración griega usa una introducción simple con καί + εἶπεν. En español, «Y le dijo» conserva la secuencia narrativa sin añadir matices no presentes. Se evita especificar «a ella» dentro del verbo para no duplicar el referente ya claro por el contexto, aunque el sentido sigue siendo femenino por el dativo αὐτῇ.
- source_word: Διὰ τοῦτον τὸν λόγον
  english_pob_choice: Because of this word
  chosen_spanish: Por esta palabra
  alternatives_spanish:
  - A causa de esta palabra
  - Por este dicho
  - Por este dicho
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o razón. «Por esta palabra» mantiene el valor causal y el singular de λόγος, como en el audit trail inglés. En español, «por esta palabra» suena más natural que un calco más rígido y conserva la relación con la respuesta previa de la mujer.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - anda
  lexicon: BDAG
  rationale: El imperativo presente de ὑπάγω aquí funciona como despido o autorización para retirarse. «Vete» transmite mejor esa función en español que un simple «ve», y no añade la paráfrasis «por tu camino» que no está en el griego.
- source_word: ἐξελήλυθεν
  english_pob_choice: has gone out
  chosen_spanish: ha salido
  alternatives_spanish:
  - ha salido de
  - se ha ido
  lexicon: BDAG
  rationale: El perfecto expresa una acción completada con resultado vigente. «Ha salido» conserva ese valor y el verbo de salida de ἐξέρχομαι. En español, la frase se completa naturalmente con «de tu hija» para reflejar el complemento de salida.
- source_word: ἐκ τῆς θυγατρός σου
  english_pob_choice: of your daughter
  chosen_spanish: de tu hija
  alternatives_spanish:
  - desde tu hija
  - fuera de tu hija
  lexicon: BDAG
  rationale: Aunque ἐκ literalmente marca procedencia o salida «de», en español la combinación natural con «ha salido» es «de tu hija». Esto mantiene la imagen espacial sin sonar forzado.
- source_word: τὸ δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el demon
  - el espíritu maligno
  lexicon: BDAG
  rationale: δαιμόνιον se refiere aquí a un ser demoníaco personal. «El demonio» es el equivalente más directo y claro en español. Se evita suavizarlo a una enfermedad o influencia impersonal para conservar la afirmación sobrenatural del texto.
theological_decisions:
- issue: Lenguaje de exorcismo y realidad demoníaca
  english_pob_reading: the demon has gone out of your daughter
  chosen_spanish_reading: el demonio ha salido de tu hija
  alternative_spanish_readings:
  - el espíritu maligno ha salido de tu hija
  - el demonio se ha ido de tu hija
  rationale: El griego nombra explícitamente a un δαιμόνιον y afirma su salida. La traducción española mantiene ese referente personal y la acción de expulsión sin reducirla a lenguaje figurado o sanitario. Esto preserva la lectura cristiana histórica y la fuerza semántica del pasaje.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparece exactamente en el texto principal y corresponde a una nota única y anclada. Se mantuvo la lectura auditada del inglés, pero con español más natural y fiel al valor causal de Διὰ τοῦτον τὸν λόγον.
  spanish_consistency_notes:
  - Se usa «demonio» de manera consistente para δαιμόνιον, sin sustituirlo por un término más genérico.
  - «Ha salido» preserva el perfecto griego y el resultado continuado.
  - Se evita «SEÑOR» o terminología litúrgica no presente en el versículo.
  - La puntuación y la cita dialogal siguen el uso normal del español bíblico moderno.
