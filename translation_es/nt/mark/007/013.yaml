translation:
  language: es
  text: anulando la palabra de Dios por su tradición que han transmitido[a][b]. Y hacen muchas otras cosas semejantes[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: "invalidando" o "dejando sin efecto" la palabra de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'También: "que ustedes pasaron".'
    reason: lexical_alternative
  - marker: c
    text: 'También: "muchas cosas semejantes como estas".'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκυροῦντες
  english_pob_choice: nullifying
  chosen_spanish: anulando
  alternatives_spanish:
  - invalidando
  - dejando sin efecto
  - anulando
  lexicon: BDAG
  rationale: El participio expresa hacer ineficaz o sin validez la palabra de Dios. "Anulando" comunica la fuerza de cancelación o invalidación en un español natural, sin perder el tono acusatorio del contexto.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la Palabra de Dios
  lexicon: BDAG
  rationale: '"Palabra" reproduce con precisión λόγος en este contexto de autoridad divina y mandamiento. Se conserva la construcción completa para mantener el contraste con "su tradición".'
- source_word: τῇ παραδόσει ὑμῶν
  english_pob_choice: by your tradition
  chosen_spanish: por su tradición
  alternatives_spanish:
  - mediante su tradición
  - con su tradición
  lexicon: BDAG
  rationale: El dativo tiene valor instrumental; en español, "por" expresa con naturalidad el medio por el cual anulan la palabra de Dios. Se usa "su" como equivalente reverente y directo del posesivo plural.
- source_word: παραδόσει
  english_pob_choice: tradition
  chosen_spanish: tradición
  alternatives_spanish:
  - enseñanza transmitida
  - lo transmitido
  lexicon: BDAG
  rationale: '"Tradición" es la equivalencia normal y fiel en este contexto polémico. Mantiene la referencia a prácticas heredadas por transmisión humana sin añadir calificativos que el texto griego no incluye.'
- source_word: ᾗ παρεδώκατε
  english_pob_choice: that you have handed down
  chosen_spanish: que ustedes han transmitido
  alternatives_spanish:
  - que ustedes pasaron
  - que ustedes entregaron
  lexicon: BDAG
  rationale: El relativo explica la tradición como algo transmitido por ellos. "Han transmitido" conserva la relación con παράδοσις y suena natural en español; evita una calca rígida de "han entregado".
- source_word: παρόμοια τοιαῦτα πολλὰ
  english_pob_choice: many other similar things
  chosen_spanish: muchas otras cosas semejantes
  alternatives_spanish:
  - muchas cosas similares como estas
  - muchas otras cosas parecidas
  lexicon: BDAG
  rationale: La acumulación griega es enfática y algo redundante. "Muchas otras cosas semejantes" preserva la idea de repetición y semejanza sin volver la frase torpe en español.
- source_word: ποιεῖτε
  english_pob_choice: you do
  chosen_spanish: hacen
  alternatives_spanish:
  - ustedes hacen
  - están haciendo
  lexicon: BDAG
  rationale: El presente indica práctica habitual. En español, "hacen" es claro y natural; el sujeto se sobreentiende por el contexto y puede expresarse con "ustedes" en una lectura más explícita.
theological_decisions:
- issue: Relación entre tradición humana y palabra de Dios
  english_pob_reading: Rendered neutrally as 'tradition' while allowing the context to show that this specific human tradition stands opposed to God's word.
  chosen_spanish_reading: Se mantiene "tradición" sin añadir "humana", dejando que el contraste del pasaje muestre que es una tradición de origen humano en oposición a la palabra de Dios.
  alternative_spanish_readings:
  - tradición humana
  - tradición de los hombres
  rationale: El griego de este versículo dice "su tradición"; no añade el calificativo "humana". La traducción conserva la tensión teológica sin resolverla con una ampliación interpretativa.
  doctrine_reference: 'Principio POB: no paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El audit trail inglés ajustó una redacción previa demasiado pesada (''many similar things like these'') a una forma más idiomática (''many other similar things''). La versión española sigue esa misma lógica: conserva la reiteración enfática del griego, pero en una formulación natural para el español.'
  spanish_consistency_notes:
  - Se usa "Yahvé" como forma preferida para el nombre divino en el proyecto, pero aquí el texto tiene θεοῦ y se traduce con "Dios" conforme al uso normal del sintagma "palabra de Dios".
  - Se evita "Cristo" porque no aparece en el versículo.
  - Se mantiene el paralelismo entre "tradición" y "palabra de Dios" sin suavizar la oposición.
  - '"Hacen" conserva el presente habitual del verbo griego ποιεῖτε.'
