translation:
  language: es
  text: Dejando el mandamiento de Dios, ustedes se aferran a la tradición de los hombres[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» / «seres humanos». El griego dice «hombres», en contraste con lo que es humano frente a lo que procede de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀφέντες
  english_pob_choice: Leaving
  chosen_spanish: Dejando
  alternatives_spanish:
  - Habiendo dejado
  - Abandonando
  lexicon: ἀφίημι
  rationale: El participio aoristo expresa una acción previa o simultánea respecto del verbo principal. «Dejando» comunica con naturalidad la idea de apartar o dejar a un lado el mandamiento, sin volver la frase excesivamente interpretativa como podría hacerlo «abandonando».
- source_word: τὴν ἐντολὴν τοῦ θεοῦ
  english_pob_choice: the commandment of God
  chosen_spanish: el mandamiento de Dios
  alternatives_spanish:
  - el mandato de Dios
  - el precepto de Dios
  lexicon: ἐντολή
  rationale: «Mandamiento» conserva el matiz formal y religioso de ἐντολή en una discusión sobre la obligación divina. «Mandato» es posible, pero suena algo más administrativo; «precepto» es correcto, pero menos natural en este contexto.
- source_word: κρατεῖτε
  english_pob_choice: hold fast to
  chosen_spanish: aferran
  alternatives_spanish:
  - se aferran a
  - mantienen firmemente
  - se mantienen fieles a
  lexicon: κρατέω
  rationale: El verbo expresa adhesión fuerte y tenaz. «Aferran» recoge esa intensidad; en español, el complemento implícito en la construcción permite entender «aferran la tradición» como una adhesión obstinada. Si se quisiera mayor claridad idiomática, «se aferran a» sería una alternativa válida, pero aquí se preserva la fuerza del original.
- source_word: τὴν παράδοσιν
  english_pob_choice: the tradition
  chosen_spanish: la tradición
  alternatives_spanish:
  - la tradición transmitida
  - la tradición heredada
  lexicon: παράδοσις
  rationale: «Tradición» es la equivalencia estándar y suficiente para παράδοσις. Las ampliaciones explicitan la idea de transmisión, pero no son necesarias en el texto principal.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de los seres humanos
  lexicon: ἄνθρωπος
  rationale: Se mantiene «hombres» para preservar la oposición fuerte entre lo humano y lo que procede de Dios, siguiendo la decisión auditada del inglés. En español contemporáneo también puede entenderse como genérico humano; «personas» o «seres humanos» suavizan demasiado el contraste retórico del pasaje.
theological_decisions:
- issue: Contraste entre el mandamiento divino y la tradición humana
  english_pob_reading: 'Preserve the sharp opposition: ''the commandment of God'' versus ''the tradition of men.'''
  chosen_spanish_reading: Conservar la oposición tajante entre «el mandamiento de Dios» y «la tradición de los hombres».
  alternative_spanish_readings:
  - «la tradición humana»
  - «la tradición de las personas»
  rationale: La fuerza teológica del dicho está en que la tradición humana no puede desplazar el mandamiento de Dios. La redacción española mantiene ese contraste sin convertirlo en una generalización contra toda tradición.
  doctrine_reference: DOCTRINE.md Translation philosophy §4; §3
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; no hubo cambios necesarios respecto del análisis previo. Se preserva la tensión léxica de ἀνθρώπων como contraste humano/divino, y la equivalencia de κρατέω con adhesión firme.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se evitó «Señor» porque el pasaje no usa κύριος ni una cita explícita del nombre divino.
  - Se eligió «mandamiento» en vez de «mandato» para conservar el registro bíblico-jurídico.
  - Se conservó el plural genérico «hombres» como decisión auditada, con nota alternativa para lectura inclusiva.
