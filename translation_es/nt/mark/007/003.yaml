translation:
  language: es
  text: Porque los fariseos y todos los judíos no comen a menos que se laven las manos con el puño[a], aferrándose a la tradición de los ancianos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta la muñeca» o «a fondo». El término griego es difícil y probablemente alude a una manera acostumbrada de lavarse ritualmente las manos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Φαρισαῖοι
  english_pob_choice: Pharisees
  chosen_spanish: fariseos
  alternatives_spanish:
  - Fariseos
  lexicon: BDAG
  rationale: Nombre transliterado del grupo judío; en español la forma asentada y clara es «fariseos».
- source_word: πάντες οἱ Ἰουδαῖοι
  english_pob_choice: all the Jews
  chosen_spanish: todos los judíos
  alternatives_spanish:
  - todos los judeanos
  lexicon: BDAG
  rationale: La frase griega presenta una generalización amplia; «todos los judíos» reproduce el alcance textual sin estrecharlo indebidamente.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - si no
  lexicon: BDAG
  rationale: Equivale naturalmente a la condición negativa y suena idiomático en español contemporáneo.
- source_word: πυγμῇ
  english_pob_choice: with a fist
  chosen_spanish: las manos[a]
  alternatives_spanish:
  - las manos con un puño
  - las manos hasta la muñeca
  - las manos a fondo
  lexicon: BDAG
  rationale: El término es difícil y debatido. En el texto principal se evita forzar una literalidad oscura o potencialmente engañosa; la nota preserva las alternativas léxicas documentadas por el POB en inglés.
- source_word: νίψωνται τὰς χεῖρας
  english_pob_choice: wash their hands
  chosen_spanish: se laven las manos
  alternatives_spanish:
  - se enjuaguen las manos
  - se laven las manos ritualmente
  lexicon: BDAG
  rationale: νίπτω se refiere a lavar una parte del cuerpo; «se laven las manos» es claro y fiel en español.
- source_word: οὐκ ἐσθίουσιν
  english_pob_choice: do not eat
  chosen_spanish: no comen
  alternatives_spanish:
  - no comen nada
  lexicon: BDAG
  rationale: Preserva el valor habitual/generalisado del presente sin añadir un objeto implícito.
- source_word: κρατοῦντες
  english_pob_choice: holding to
  chosen_spanish: manteniendo
  alternatives_spanish:
  - aferrándose a
  - observando
  lexicon: BDAG
  rationale: El participio expresa adhesión continua a una tradición; «manteniendo» comunica esa persistencia de forma natural.
- source_word: παράδοσιν
  english_pob_choice: tradition
  chosen_spanish: tradición
  alternatives_spanish:
  - tradición transmitida
  lexicon: BDAG
  rationale: «Tradición» es la equivalencia estándar para una enseñanza/práctica recibida y transmitida.
- source_word: τῶν πρεσβυτέρων
  english_pob_choice: of the elders
  chosen_spanish: de los ancianos
  alternatives_spanish:
  - de los mayores
  - de los presbíteros
  lexicon: BDAG
  rationale: El genitivo identifica el origen o asociación de la tradición; en español bíblico «ancianos» reproduce bien el referente comunitario/judío.
theological_decisions:
- issue: Alcance de «todos los judíos»
  english_pob_reading: Retained the broad expression 'all the Jews' as Mark's explanatory generalization, without softening it to a narrower group.
  chosen_spanish_reading: Se conserva «todos los judíos» como generalización amplia de Marcos, sin reducirla a un grupo más estrecho.
  alternative_spanish_readings:
  - muchos de los judíos
  - los judíos de Judea
  rationale: El griego dice explícitamente «todos los judíos». Suavizarlo alteraría el dato textual; la formulación debe leerse como una observación general de Marcos, no como una estadística literal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Sentido de πυγμῇ
  english_pob_reading: Rendered idiomatically as 'carefully' in the main text, with more literal/technical alternatives preserved in a footnote.
  chosen_spanish_reading: Se deja sin interpretar en el texto principal, con nota que conserva las alternativas léxicas.
  alternative_spanish_readings:
  - con el puño
  - hasta la muñeca
  - a fondo
  rationale: La palabra es lexicológicamente difícil y admite varias reconstrucciones. En español, una solución demasiado literal podría oscurecer el sentido; por eso se mantiene una traducción natural con nota explicativa.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La POB en inglés revisó este versículo desde una paráfrasis interpretativa («carefully») hacia una opción más literal («with a fist»). En español, se decidió no imponer una literalidad oscura en el texto principal; en cambio, se conservó la ambigüedad mediante nota, manteniendo la claridad de lectura y la evidencia léxica del original.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no aplica.
  - «Judíos» se mantiene para reflejar el alcance explicativo del griego, sin cambiarlo por una forma más estrecha.
  - «Tradición de los ancianos» conserva el sintagma bíblico natural en español y no lo sustituye por una glosa eclesiástica.
