review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura básica del griego: explicación parentética con «Porque», generalización amplia «todos los judíos», condición negativa «a menos que», y referencia a la tradición de los ancianos. Sin embargo, no preserva suficientemente la dificultad léxica de πυγμῇ en el texto principal. Dado que el rastro auditado en inglés fue revisado a la opción más literal («with a fist»), el español no debería omitir por completo ese elemento y relegarlo solo a nota, porque así pierde un componente semántico presente en la fuente.'
  spanish_quality_summary: El español es claro y natural, pero «manteniendo la tradición» suena algo menos idiomático que «aferrándose a la tradición» o «siguiendo la tradición» para κρατοῦντες. La frase principal es legible y digna. La mejor reparación es introducir una formulación española que refleje πυγμῇ sin volverse ininteligible; «con el puño» funciona con nota aclaratoria, aunque siga siendo algo oscura, porque la nota ya explica la dificultad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Fariseos», «judíos», «tradición» y «ancianos» están alineados. La cuestión principal no es de glosario sino de fidelidad léxica a πυγμῇ y de coherencia con la revisión auditada del inglés.
  issues:
  - severity: high
    issue: Se omite πυγμῇ del texto principal
    rationale: El griego incluye un término difícil pero real («πυγμῇ»). El borrador español lo elimina del texto principal y lo deja solo en nota. Dado que la auditoría inglesa final optó por la representación más literal en el texto, el español debería conservar algún reflejo textual del término.
  - severity: medium
    issue: La decisión léxica documentada para πυγμῇ no coincide con el texto español
    rationale: Los metadatos dicen que la elección inglesa auditada es «with a fist», pero la decisión española escogida termina siendo simplemente «las manos[a]». Esto crea desalineación interna entre fuente, auditoría y texto meta.
  - severity: low
    issue: «manteniendo la tradición» es menos preciso para κρατοῦντες
    rationale: Aunque comprensible, «manteniendo» puede sonar como conservar una tradición en abstracto. «aferrándose a» comunica mejor la adhesión activa implícita en κρατοῦντες.
  revised_spanish_text: Porque los fariseos y todos los judíos no comen a menos que se laven las manos con el puño[a], aferrándose a la tradición de los ancianos.
  revised_footnotes:
  - marker: a
    text: O «hasta la muñeca» o «a fondo». El término griego es difícil y probablemente alude a una manera acostumbrada de lavarse ritualmente las manos.
    reason: lexical_alternative
  revision_rationale: Se revisa para reflejar explícitamente πυγμῇ en el texto principal, en consonancia con la revisión auditada del inglés y con la presencia inequívoca del término en el griego. Se conserva la incertidumbre semántica en la nota. También se mejora «manteniendo» a «aferrándose a» para expresar mejor la adhesión continua a la tradición.
