  source_alignment_summary: 'El borrador capta bien el sentido básico del griego: Jesús habla de dejar sin efecto el mandamiento de Dios para mantener la tradición humana. También refleja adecuadamente el imperfecto de ἔλεγεν y el propósito de ἵνα. Sin embargo, la formulación española actual «Bien están ustedes anulando...» es poco natural y demasiado calcada; además, el anclaje de nota [s] en medio de la palabra es impropio. El matiz irónico de Καλῶς debe conservarse de una manera más idiomática en español.'
  spanish_quality_summary: La legibilidad necesita ajuste menor. «Y él les iba diciendo» es aceptable, pero «Bien están ustedes anulando» suena forzado en español general. Una solución como «Qué bien dejan de lado...» conserva la ironía y suena más natural en registro bíblico moderno. «Dejan de lado» también empata mejor con el contraste posterior «guardar» que «anulando», aunque «anular» no es incorrecto. Debe corregirse la colocación de la nota al pie para cumplir el formato requerido.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεοῦ = «Dios», ἐντολή = «mandamiento», παράδοσις = «tradición». La decisión sobre Καλῶς debe seguir la justificación inglesa de ironía; en español conviene evitar un simple «Bien» sin apoyo sintáctico natural. No hay términos teológicos sensibles adicionales.'
  issues:
