revisions:
- from: 'Y él les iba diciendo[a]: «Bien[s] están ustedes anulando el mandamiento de Dios para guardar su tradición».'
  to: 'Y él les iba diciendo[a]: «¡Qué bien dejan de lado[b] el mandamiento de Dios para guardar su tradición!»'
  rationale: Se ajusta la oración para que el español suene natural y conserve explícitamente la ironía documentada en el POB inglés. «Qué bien dejan de lado» comunica el reproche sarcástico mejor que «Bien están ustedes anulando», y «dejan de lado» refleja con más claridad el sentido de ἀθετεῖτε en contraste con «guardar su tradición». También se corrige el uso y anclaje de las notas al pie.
