translation:
  language: es
  text: 'Y él les iba diciendo[a]: «¡Qué bien dejan de lado[b] el mandamiento de Dios para guardar su tradición!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y él seguía diciéndoles». El imperfecto griego expresa acción en curso o repetida.'
    reason: lexical_alternative
  - marker: b
    text: 'Aquí «qué bien» traduce irónicamente καλῶς; no expresa aprobación real. También puede entenderse: «Ustedes hacen muy bien en dejar de lado el mandamiento de Dios para guardar su tradición».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: iba diciendo
  alternatives_spanish:
  - decía
  - les decía
  - les iba repitiendo
  lexicon: BDAG
  rationale: El imperfecto griego sugiere una acción discursiva en curso o reiterada. «Iba diciendo» conserva ese valor aspectual en español con naturalidad, sin reducirlo a un pasado puntual.
- source_word: Καλῶς
  english_pob_choice: neatly
  chosen_spanish: Bien[s]
  alternatives_spanish:
  - Bien
  - Qué bien
  - Llevan muy bien
  lexicon: BDAG
  rationale: Aquí καλῶς es irónico. Un simple «bien» puede sonar aprobatorio en español; por eso se marca con nota para evitar una lectura de elogio. Se conserva la ambigüedad retórica del original, sin suavizar la reprensión.
- source_word: ἀθετεῖτε
  english_pob_choice: set aside
  chosen_spanish: anulando
  alternatives_spanish:
  - dejando de lado
  - rechazando
  - invalidando
  - poniendo a un lado
  lexicon: BDAG
  rationale: ἀθετέω puede expresar rechazar, dejar de lado o anular. «Anular» transmite con fuerza la idea de invalidar el mandamiento en la práctica, algo acorde con la acusación de Jesús en este contexto.
- source_word: ἐντολήν
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - comando
  - precepto
  - mandato
  lexicon: BDAG
  rationale: «Mandamiento» conserva el peso religioso formal de ἐντολή y es el equivalente bíblico más natural en español en este debate sobre la autoridad divina.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de manera directa. «De Dios» mantiene el contraste claro con «su tradición» y el énfasis de autoridad.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  - con el fin de
  lexicon: BDAG
  rationale: 'En este contexto final, ἵνα expresa propósito. «Para» ofrece una formulación breve y natural en español: «para guardar su tradición».'
- source_word: παράδοσιν
  english_pob_choice: tradition
  chosen_spanish: tradición
  alternatives_spanish:
  - tradición
  - tradición transmitida
  - enseñanza transmitida
  lexicon: BDAG
  rationale: παράδοσις aquí significa la tradición heredada por los hombres. «Tradición» es preciso, claro y mantiene el contraste con el mandamiento de Dios.
- source_word: τηρήσητε
  english_pob_choice: keep
  chosen_spanish: guardar
  alternatives_spanish:
  - observar
  - mantener
  - cumplir
  lexicon: BDAG
  rationale: τηρέω aquí es «guardar» en el sentido de preservar o mantener una tradición. Además, el paralelo con «anulando» refuerza la ironía del dicho.
theological_decisions:
- issue: Tono irónico de καλῶς
  english_pob_reading: An ironic rebuke rather than straightforward commendation
  chosen_spanish_reading: Una reprensión irónica, no un elogio real
  alternative_spanish_readings:
  - Un elogio literal de su proceder
  - Una observación neutral
  rationale: El contexto muestra que Jesús no aprueba su conducta; la frase denuncia que, al aferrarse a la tradición, están invalidando el mandamiento de Dios. Por eso se preserva la ironía sin volverla una simple condena explicativa fuera del texto.
  doctrine_reference: Translation philosophy §3 (preserve the source's tension without importing doctrine)
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y la lectura auditada en inglés. Se mantuvieron el imperfecto narrativo, la ironía de καλῶς, el contraste entre el mandamiento de Dios y la tradición humana, y el propósito expresado por ἵνα. La única adaptación importante es la naturalidad española de «para guardar» frente a una calca menos idiomática.
  spanish_consistency_notes:
  - Se usó «mandamiento» para ἐντολή, coherente con el registro bíblico y con el contraste legal del pasaje.
  - Se mantuvo «tradición» para παράδοσις, sin explicitar «transmitida», porque el contexto ya la caracteriza como posesión de ellos.
  - «Anular» refleja con fuerza ἀθετέω y evita debilitar la acusación.
  - Se preservó el valor aspectual de ἔλεγεν con una perífrasis imperfectiva española.
  - La nota sobre καλῶς protege la lectura irónica documentada en el audit trail inglés.
