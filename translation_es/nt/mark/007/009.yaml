    issue: La expresión «Bien están ustedes anulando» es poco idiomática en español.
    rationale: Aunque intenta preservar la ironía de Καλῶς, la frase resultante suena antinatural y puede distraer del sentido. El español requiere una construcción más fluida para expresar reproche irónico.
  - severity: low
    issue: El marcador de nota «[s]» está incrustado en la palabra «Bien[s]».
    rationale: El formato exigido pide marcadores claros en el texto; además, el anclaje actual empeora la lectura.
  - severity: low
    issue: «Anulando» es posible, pero «dejando de lado» refleja mejor el valor idiomático de ἀθετεῖτε en este contexto.
    rationale: El inglés auditado eligió «set aside» por claridad e idiomaticidad. En español, «dejar de lado» comunica mejor el desprecio deliberado sin sonar técnico-jurídico.
