revisions:
- from: Pero en vano me rinden culto[a], enseñando como doctrinas mandamientos de hombres.
  to: Pero en vano me rinden culto[a], enseñando como doctrinas mandamientos humanos.
  rationale: Se mantiene la estructura y fuerza del original, pero se reemplaza ‘de hombres’ por ‘humanos’ para expresar con mejor español actual el contraste entre autoridad humana y divina. La nota alternativa preserva la opción más literal cercana al inglés auditado y al griego.
