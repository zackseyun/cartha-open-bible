translation:
  language: es
  text: Pero en vano me rinden culto[a], enseñando como doctrinas mandamientos humanos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “enseñando los mandamientos de los hombres como doctrinas.”'
    reason: lexical_alternative
lexical_decisions:
- source_word: μάτην
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - vanamente
  - sin provecho
  lexicon: BDAG
  rationale: μάτην significa ‘sin resultado / sin propósito’. ‘En vano’ es la equivalencia más natural y estable en español bíblico sin volver arcaico el registro; conserva el tono de la cita profética.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δώ marca contraste con el contexto previo. ‘Pero’ transmite mejor el giro adversativo en español que una simple adición.
- source_word: σέβονταί
  english_pob_choice: they worship
  chosen_spanish: rinden culto
  alternatives_spanish:
  - adoran
  - veneran
  lexicon: BDAG
  rationale: σέβομαι puede abarcar reverencia o culto. ‘Rinden culto’ comunica el acto religioso con dignidad y evita limitarlo a ‘adorar’ en un sentido demasiado estrecho o a ‘reverenciar’ en un sentido más débil.
- source_word: με
  english_pob_choice: me
  chosen_spanish: me
  lexicon: BDAG
  rationale: El pronombre directo se conserva sin cambio; en la cita divina el referente debe mantenerse explícito.
- source_word: διδάσκοντες
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - al enseñar
  - mientras enseñan
  lexicon: BDAG
  rationale: El participio presente expresa la manera acompañante de su culto vano. ‘Enseñando’ reproduce bien esa relación verbal en español.
- source_word: διδασκαλίας
  english_pob_choice: as doctrines
  chosen_spanish: como doctrinas
  alternatives_spanish:
  - por doctrinas
  - en calidad de doctrinas
  lexicon: BDAG
  rationale: 'El término apunta a enseñanzas presentadas con rango doctrinal. ‘Como doctrinas’ conserva la tensión del griego: se está dando a mandamientos humanos el estatus de doctrina.'
- source_word: ἐντάλματα
  english_pob_choice: the commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - preceptos
  - órdenes
  lexicon: BDAG
  rationale: ἔνταλμα denota mandamiento o precepto con fuerza normativa. ‘Mandamientos’ preserva el tono formal y religioso del texto.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de hombres
  alternatives_spanish:
  - humanos
  - de personas
  lexicon: BDAG
  rationale: 'El genitivo expresa origen: mandamientos procedentes de seres humanos. ‘De hombres’ mantiene la fórmula tradicional y el contraste implícito entre autoridad divina y autoridad humana.'
theological_decisions:
- issue: Cómo expresar el contraste entre culto verdadero y normas humanas elevadas a doctrina
  english_pob_reading: teaching as doctrines the commandments of men
  chosen_spanish_reading: enseñando como doctrinas mandamientos de hombres
  alternative_spanish_readings:
  - enseñando doctrinas, mandamientos de hombres
  - enseñando mandamientos de hombres como doctrinas
  rationale: El griego condensa la acusación de que el culto se vacía cuando se enseña norma humana con estatus doctrinal. La redacción elegida mantiene esa crítica sin explicarla de más ni suavizarla.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés; no hay revisiones textuales aplicadas. Se conserva la fuerza contrastiva del δέ y la ambigüedad teológica de elevar mandamientos humanos al nivel de doctrina.
  spanish_consistency_notes:
  - Se usa ‘Yahvé’ solo cuando el nombre divino está explícito; aquí la cita mantiene la primera persona sin necesidad de expandir el nombre.
  - ‘Rinden culto’ se eligió para σέβονται por su equilibrio entre reverencia y acto litúrgico, acorde con el contexto de cita profética.
  - ‘Mandamientos de hombres’ conserva la formulación tradicional equivalente al genitivo griego y la oposición entre origen divino y humano.
