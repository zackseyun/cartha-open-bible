translation:
  language: es
  text: adulterios, avaricia, maldades, engaño, sensualidad, ojo malo[a], calumnia[b], soberbia, insensatez.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «envidia» o «ojo malicioso»; literalmente «ojo malo», un modismo para una mirada envidiosa o malintencionada.
    reason: lexical_alternative
  - marker: b
    text: O «blasfemia». El término griego puede referirse tanto a habla injuriosa contra personas como a blasfemia contra Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: μοιχεῖαι
  english_pob_choice: adulteries
  chosen_spanish: adulterios
  alternatives_spanish:
  - adulterio
  - actos de adulterio
  lexicon: BDAG
  rationale: El plural griego conviene mantenerlo en español para conservar la serie de vicios concretos; «adulterios» comunica mejor varios actos o manifestaciones que el singular abstracto.
- source_word: πλεονεξίαι
  english_pob_choice: greed
  chosen_spanish: avaricia
  alternatives_spanish:
  - codicia
  - deseo de más
  lexicon: BDAG
  rationale: «Avaricia» expresa bien el impulso de querer más con tono moral claro y es natural en una lista de vicios. Se evita un calco demasiado moderno que pudiera sonar débil o impreciso.
- source_word: πονηρίαι
  english_pob_choice: wickedness
  chosen_spanish: maldades
  alternatives_spanish:
  - maldad
  - perversidades
  - maldades morales
  lexicon: BDAG
  rationale: El griego va en plural, y en español «maldades» conserva mejor esa pluralidad de expresiones del mal que un singular abstracto. La forma es natural y mantiene la fuerza del listado.
- source_word: δόλος
  english_pob_choice: deceit
  chosen_spanish: engaño
  alternatives_spanish:
  - astucia
  - dolo
  - fraude
  lexicon: BDAG
  rationale: «Engaño» es claro y actual; comunica la intención de manipular mediante falsedad. «Dolo» sería más técnico o jurídico, y «astucia» podría suavizar el sentido.
- source_word: ἀσέλγεια
  english_pob_choice: sensuality
  chosen_spanish: sensualidad
  alternatives_spanish:
  - libertinaje
  - lascivia
  - desenfreno
  lexicon: BDAG
  rationale: El término griego apunta a conducta desvergonzada y sin freno, a menudo sexual. «Sensualidad» sigue la opción inglesa de lectura moderna y no exagera hacia un registro más antiguo o más específico que el texto no exige.
- source_word: ὀφθαλμὸς πονηρός
  english_pob_choice: an evil eye
  chosen_spanish: un ojo malo
  alternatives_spanish:
  - ojo malo
  - ojo envidioso
  - mirada envidiosa
  lexicon: BDAG
  rationale: Se conserva la imagen idiomática de manera transparente. «Un ojo malo» refleja la metáfora de forma directa; otras opciones explicitan la idea, pero perderían la transparencia del dicho.
- source_word: βλασφημία
  english_pob_choice: slander
  chosen_spanish: blasfemia
  alternatives_spanish:
  - calumnia
  - maldición
  - habla injuriosa
  lexicon: BDAG
  rationale: Aunque en este contexto el término puede abarcar habla injuriosa contra personas, se conserva «blasfemia» porque es la forma más reconocible y mantiene la tensión documentada por el texto fuente y la nota inglesa. La posible extensión a calumnia se deja abierta para no borrar la ambigüedad lexical.
- source_word: ὑπερηφανία
  english_pob_choice: pride
  chosen_spanish: soberbia
  alternatives_spanish:
  - orgullo
  - arrogancia
  - altivez
  lexicon: BDAG
  rationale: «Soberbia» comunica mejor la autoexaltación orgullosa y el tono moral fuerte del término griego. «Orgullo» puede sonar más amplio o incluso neutro en español, mientras que «soberbia» conserva el matiz vicioso.
- source_word: ἀφροσύνη
  english_pob_choice: foolishness
  chosen_spanish: insensatez
  alternatives_spanish:
  - necedad
  - falta de juicio
  - locura
  lexicon: BDAG
  rationale: El término no se limita a baja inteligencia, sino a falta moral de sentido y juicio. «Insensatez» expresa bien esa carencia práctica y ética en un registro digno y contemporáneo.
theological_decisions:
- issue: βλασφημία en una lista de vicios principalmente interpersonales
  english_pob_reading: slander, with possible blasphemy against God preserved as an alternative
  chosen_spanish_reading: blasfemia, manteniendo abierta la posibilidad de habla injuriosa contra personas o contra Dios
  alternative_spanish_readings:
  - calumnia
  - habla injuriosa
  - blasfemia contra Dios
  rationale: 'La lista inmediata contiene vicios morales y relacionales, por lo que en español «blasfemia» debe leerse sin cerrar el rango semántico. Se preserva la tensión del griego: puede tratarse de habla injuriosa en general y, según el contexto, también de blasfemia propiamente dicha. No se resuelve artificialmente a favor de una sola acepción.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El inglés POB revisó «wickednesses» a «wickedness» para mayor naturalidad, pero el griego conserva un plural. En español se optó por «maldades» para mantener la pluralidad sin sonar forzado. También se siguió la decisión auditada de preservar la ambigüedad de βλασφημία mediante nota, aunque el texto principal use una sola forma.
  spanish_consistency_notes:
  - 'Se mantuvo una lista de sustantivos en plural o de valor colectivo donde el griego lo sugiere: «adulterios» y «maldades».'
  - Se evitó «SEÑOR» u otros equivalentes no pertinentes; el pasaje no contiene el nombre divino.
  - Se conservó la imagen idiomática de «un ojo malo» con nota explicativa para transparencia textual.
  - «Blasfemia» queda como término principal por fidelidad y reconocimiento eclesial, con la alternativa contextual en nota.
