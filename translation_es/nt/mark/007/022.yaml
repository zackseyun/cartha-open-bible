review_pass:
  verdict: revise
  source_alignment_summary: 'La lista española refleja casi todos los elementos del griego con buen orden y fuerza semántica: μοιχεῖαι→«adulterios», πλεονεξίαι→«avaricia», πονηρίαι→«maldades», δόλος→«engaño», ἀσέλγεια→«sensualidad», ὀφθαλμὸς πονηρός→«ojo malo», ὑπερηφανία→«soberbia», ἀφροσύνη→«insensatez». Sin embargo, el tratamiento de βλασφημία no sigue fielmente la decisión auditada del POB inglés, que eligió «slander» como lectura principal en este contexto y reservó «blasphemy» como alternativa en nota. El borrador invierte esa prioridad.'
  spanish_quality_summary: El español es legible y digno. «Maldades», «engaño», «soberbia» e «insensatez» funcionan bien. «Un ojo malo» es comprensible, pero en español suena menos idiomático que «ojo malo»; aun así puede mantenerse si la nota explica el modismo. El problema principal de calidad/claridad está en «blasfemia», que en español se oye mucho más restringido a ofensa contra Dios que el alcance contextual probable del griego aquí.
  glossary_alignment: 'Sin conflictos con la terminología base del proyecto (no aparecen Yahvé, Mesías, etc.). La principal desalineación es contextual/lexical: βλασφημία debería representarse en español con una opción equivalente a «calumnia» o «habla injuriosa» en el texto principal, preservando «blasfemia» como alternativa en nota, para seguir el razonamiento lexical y teológico documentado por el POB inglés.'
  issues:
  - severity: high
    issue: βλασφημία está renderizado como «blasfemia» en el texto principal en vez de una opción equivalente a «slander».
    rationale: La auditoría inglesa resolvió la lectura principal como «slander» por el contexto de lista de vicios interpersonales y conservó «blasphemy» como alternativa. El español actual invierte esa decisión y estrecha indebidamente el sentido para la mayoría de lectores hispanos.
  - severity: medium
    issue: Las notas al pie están ancladas a palabras equivocadas.
    rationale: La nota [a] explica «ojo malo», pero está colocada tras «adulterios». La nota [b] explica βλασφημία/calumnia y sí corresponde semánticamente a «blasfemia», pero al revisarse el término principal debe conservarse el anclaje sobre la palabra corregida.
  - severity: low
    issue: «Un ojo malo» es algo rígido en español.
    rationale: No es incorrecto, pero el modismo suena más natural como «ojo malo» o podría mantenerse literalmente con nota explicativa. Dado el deseo de transparencia con el modismo, basta un ajuste menor.
  revised_spanish_text: adulterios, avaricia, maldades, engaño, sensualidad, ojo malo[a], calumnia[b], soberbia, insensatez.
  revised_footnotes:
  - marker: a
    text: O «envidia» o «ojo malicioso»; literalmente «ojo malo», un modismo para una mirada envidiosa o malintencionada.
    reason: lexical_alternative
  - marker: b
    text: O «blasfemia». El término griego puede referirse tanto a habla injuriosa contra personas como a blasfemia contra Dios.
    reason: alternative_reading
  revision_rationale: Se corrige βλασφημία a «calumnia» en el texto principal para seguir la decisión contextual del POB inglés y se preserva «blasfemia» como alternativa en nota. También se reubica correctamente la nota del modismo «ojo malo» y se elimina el artículo en esa expresión para una forma más natural en español sin perder transparencia.
