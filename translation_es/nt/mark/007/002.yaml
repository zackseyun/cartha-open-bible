translation:
  language: es
  text: y vieron que algunos de sus discípulos comían el pan con manos impuras[a]—es decir, con manos sin lavar—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con manos profanas’, ‘con manos comunes’ o ‘con manos contaminadas’; el griego dice literalmente ‘con manos comunes’, aludiendo a impureza ritual y no solo a suciedad física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδόντες
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - estuvieron viendo
  - habían visto
  - notaron
  lexicon: BDAG
  rationale: El participio aoristo funciona de manera adverbial con el sujeto implícito del contexto. En español, un verbo finito simple mantiene la fluidez narrativa y la fuerza de observación sin sonar forzado.
- source_word: τινὰς τῶν μαθητῶν αὐτοῦ
  english_pob_choice: some of his disciples
  chosen_spanish: algunos de sus discípulos
  alternatives_spanish:
  - ciertos de sus discípulos
  - unos de sus discípulos
  lexicon: BDAG
  rationale: La combinación partitiva expresa naturalmente ‘algunos de sus discípulos’. ‘Ciertos’ es posible, pero menos natural en español actual.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo visto, no una causa. ‘Que’ es la forma normal en español para esta subordinación.
- source_word: κοιναῖς χερσίν
  english_pob_choice: with defiled hands
  chosen_spanish: con manos impuras
  alternatives_spanish:
  - con manos profanas
  - con manos comunes
  - con manos contaminadas
  lexicon: BDAG
  rationale: En este contexto ritual, κοινός no describe suciedad física sino impureza ceremonial. ‘Impuras’ comunica ese valor en español de manera clara y relativamente sobria, sin perder la tensión cultual que Mark explica enseguida.
- source_word: ἀνίπτοις
  english_pob_choice: unwashed hands
  chosen_spanish: con manos sin lavar
  alternatives_spanish:
  - con manos no lavadas
  - con manos no lavadas ritualmente
  lexicon: BDAG
  rationale: 'Mark ofrece una glosa explicativa. En español, repetir ‘manos’ hace clara la aposición: no lavadas. Se evita un giro demasiado técnico que sobrecargue el texto principal.'
- source_word: ἐσθίουσιν
  english_pob_choice: were eating
  chosen_spanish: comían
  alternatives_spanish:
  - estaban comiendo
  - comían de
  lexicon: BDAG
  rationale: El presente narrativo puede expresarse con el imperfecto español para conservar la escena en desarrollo observada por los testigos, con naturalidad idiomática.
- source_word: τοὺς ἄρτους
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - los panes
  - el alimento
  lexicon: BDAG
  rationale: ἄρτος puede significar pan o panes. En español, ‘el pan’ es la opción idiomática más natural para el alimento que estaban comiendo, sin forzar una especificación cuantitativa innecesaria.
theological_decisions:
- issue: Impureza ritual en κοινός
  english_pob_reading: Rendered 'defiled hands' in the main text, with explanatory gloss 'unwashed hands' retained.
  chosen_spanish_reading: ‘manos impuras’ en el texto principal, con ‘manos sin lavar’ como glosa explicativa.
  alternative_spanish_readings:
  - manos contaminadas
  - manos profanas
  - manos inmundas
  rationale: El pasaje trata de pureza ritual judía, no de higiene solamente. ‘Impuras’ preserva el sentido religioso sin exagerar la explicación. La glosa mantiene el dato literal de ‘sin lavar’ para el lector.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Relación entre impureza ceremonial y lavado físico
  english_pob_reading: The Greek literally says 'with common hands,' referring to ritual impurity rather than merely physical dirt.
  chosen_spanish_reading: La glosa ‘es decir, con manos sin lavar’ deja claro que la impureza es ritual y que el lavado físico es el signo externo.
  alternative_spanish_readings:
  - es decir, con manos ritualmente no lavadas
  - es decir, con manos ritualmente impuras
  rationale: 'No conviene borrar la tensión entre la palabra de impureza y la explicación concreta del lavado. La formulación mantiene ambas capas: estado ritual y acción visible.'
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: El último pasaje auditado en inglés cambió de ‘common hands’ a ‘defiled hands’, manteniendo la glosa ‘unwashed hands’. La versión española refleja ese ajuste con ‘manos impuras’ y conserva la explicación literal ‘manos sin lavar’.
  spanish_consistency_notes:
  - Se mantiene ‘discípulos’ para μαθηταί, coherente con el uso estándar de la serie.
  - ‘Pan’ traduce ἄρτους con naturalidad en español y evita una sobreespecificación innecesaria.
  - La nota al pie preserva la alternativa lexical principal y la tensión entre impureza ritual y lavado físico.
  - La puntuación con raya conserva la función explicativa del inciso de Marcos.
