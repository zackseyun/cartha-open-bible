review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: mantiene el conector narrativo, la entrada en una casa anartrosa, los discípulos como sujeto explícito y ''la parábola'' para παραβολή. Sin embargo, ''separado de la multitud'' suena algo forzado como modificador de ''entró'' y desplaza levemente el matiz locativo de ἀπὸ τοῦ ὄχλου, que en el POB inglés se expresa mejor como un entorno apartado de la multitud. También la nota al pie está anclada en ''casa'', pero la variante/explicación corresponde a la frase sobre la multitud.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'entró en una casa separado de la multitud' resulta menos natural que 'entró en una casa, lejos de la multitud' o 'apartado de la multitud'. Además, el uso de una nota para ἀπὸ τοῦ ὄχλου no es necesario si el texto principal ya lo expresa con claridad; y si se conserva una nota, debe anclarse en la frase correcta, no en 'casa'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Parábola' preserva correctamente παραβολή, y 'sus discípulos' es natural y fiel. La revisión propuesta mejora la naturalidad sin alterar decisiones léxicas esenciales.
  issues:
  - severity: medium
    issue: La expresión 'separado de la multitud' es poco natural en esta sintaxis.
    rationale: En español, pospuesto a 'entró en una casa', 'separado de la multitud' puede sonar como predicativo forzado del sujeto. 'Lejos de la multitud' o 'apartado de la multitud' comunica mejor el valor de ἀπὸ τοῦ ὄχλου en este contexto narrativo.
  - severity: medium
    issue: La nota al pie está anclada en 'casa' pero comenta ἀπὸ τοῦ ὄχλου.
    rationale: El marcador [a] debe aparecer en la palabra o frase relevante. Aquí la observación léxica corresponde a la expresión sobre la multitud, no a 'una casa'.
  - severity: low
    issue: La nota al pie es innecesaria si el texto principal se formula claramente.
    rationale: El inglés conserva nota para παραβολή, no para 'away from the crowd'. En español no se crea una ambigüedad nueva que exija nota si se redacta naturalmente la frase principal.
  revised_spanish_text: Y cuando entró en una casa, lejos de la multitud, sus discípulos le preguntaban acerca de la parábola.
  revision_rationale: Se ajusta ἀπὸ τοῦ ὄχλου a una formulación más natural en español ('lejos de la multitud') que conserva la separación espacial del original y del POB inglés. También se elimina la nota mal anclada e innecesaria.
