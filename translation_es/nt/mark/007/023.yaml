translation:
  language: es
  text: Todas estas cosas malas salen de dentro y contaminan al hombre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la persona»; el griego usa el singular «el hombre» con valor genérico para un ser humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα ταῦτα τὰ πονηρά
  english_pob_choice: All these evil things
  chosen_spanish: Todas estas cosas malas
  alternatives_spanish:
  - Todas estas cosas perversas
  - Todos estos males
  lexicon: BDAG
  rationale: La frase griega es enfática y resumidora, refiriéndose a los vicios enumerados antes. En español, «cosas malas» comunica bien la concreción plural y conserva el valor abarcador sin volverlo demasiado abstracto. «Males» sería posible, pero suena más nominal y menos ligado a la lista inmediata.
- source_word: ἔσωθεν
  english_pob_choice: from within
  chosen_spanish: de dentro
  alternatives_spanish:
  - desde dentro
  - del interior
  lexicon: BDAG
  rationale: El adverbio señala origen interior. «De dentro» es natural en español y mantiene el contraste moral con lo externo. «Desde dentro» también es posible, pero algo más marcado en estilo.
- source_word: ἐκπορεύεται
  english_pob_choice: come out
  chosen_spanish: salen
  alternatives_spanish:
  - proceden
  - vienen
  lexicon: BDAG
  rationale: Aunque el verbo es singular, el sujeto neutro plural funciona como colectivo en griego. En español, el plural «salen» refleja mejor la concordancia con «Todas estas cosas» y conserva la idea de salida desde una fuente interior. «Proceden» sería más literal, pero menos natural aquí.
- source_word: κοινοῖ
  english_pob_choice: defile
  chosen_spanish: contaminan
  alternatives_spanish:
  - manchan
  - hacen impuro
  lexicon: BDAG
  rationale: En este contexto marcano de pureza, κοινόω apunta a contaminación ritual/moral. «Contaminan» comunica esa idea en español actual sin perder la fuerza de impureza. «Hacen impuro» es más explicativo pero menos idiomático; «manchan» es posible, aunque menos preciso para pureza ritual.
- source_word: τὸν ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al ser humano
  lexicon: BDAG
  rationale: El griego usa el singular masculino con valor representativo/generic. Se mantiene «al hombre» para conservar la forma del original y la repetición del contexto inmediato. En español, el lector puede entenderlo genéricamente; las alternativas neutralizadas son viables pero atenúan la huella formal del texto.
theological_decisions:
- issue: Alcance genérico de ἄνθρωπον en una sentencia antropológica
  english_pob_reading: the man
  chosen_spanish_reading: al hombre
  alternative_spanish_readings:
  - a la persona
  - al ser humano
  rationale: La declaración es general sobre la condición humana, pero el griego emplea ἄνθρωπον en singular masculino. Se conserva la forma marcada del original en el texto principal, sin neutralizarla, para no borrar la señal gramatical y retórica del pasaje. El sentido inclusivo queda implícito para el lector de español.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no se registran revisiones posteriores, y la elección española sigue de cerca la solución inglesa aprobada, ajustándola a la concordancia y naturalidad del español.'
  spanish_consistency_notes:
  - 'Se preserva la secuencia semántica del griego: origen interior → salida → efecto de contaminación.'
  - «Contaminan» se usa para κοινόω en sentido de pureza, sin sustituirlo por un término eclesiástico tradicional ajeno al contexto.
  - La nota mantiene la tensión entre la forma masculina singular del griego y su valor genérico sin borrar la ambigüedad productiva.
