base_translation:
  language: en
  yaml_path: translation/nt/mark/007/035.yaml
  text: And his ears were opened[a], and the bond of his tongue was released[c][b], and he spoke plainly.
  footnotes:
  - marker: a
    text: Or 'his hearing was opened.' The Greek ἀκοαί can refer to hearing as a faculty as well as to ears.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'the bond of his tongue was released'; that is, his speech impediment was removed.
    reason: lexical_alternative
  - marker: c
    text: Or 'correctly' or 'distinctly.'
    reason: lexical_alternative
