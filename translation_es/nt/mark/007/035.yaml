translation:
  language: es
  text: Y se le abrieron los oídos[a], y se desató el lazo[b] de su lengua, y habló claramente[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su audición se abrió». El griego ἀκοαί puede referirse tanto a los oídos como a la facultad de oír.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «el lazo de su lengua fue desatado»; es decir, se le quitó el impedimento para hablar.
    reason: lexical_alternative
  - marker: c
    text: O «correctamente» o «distintamente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠνοίγησαν
  english_pob_choice: were opened
  chosen_spanish: se le abrieron
  alternatives_spanish:
  - fueron abiertos
  - se abrieron
  lexicon: BDAG
  rationale: El aoristo pasivo plural de ἀνοίγω pide una construcción pasiva/reflexiva en español. «Se le abrieron» conserva el cambio súbito y la pasividad del sujeto, y suena natural en español bíblico moderno.
- source_word: αἱ ἀκοαί
  english_pob_choice: his ears
  chosen_spanish: los oídos
  alternatives_spanish:
  - su oído
  - su audición
  lexicon: BDAG
  rationale: En este contexto de sanidad, ἀκοαί puede referirse tanto a los órganos como a la facultad de oír. La opción concreta «los oídos» sigue la lectura corporal implícita en la curación y evita una abstracción que el griego no exige.
- source_word: ἐλύθη
  english_pob_choice: was released
  chosen_spanish: se desató
  alternatives_spanish:
  - fue soltado
  - se aflojó
  lexicon: BDAG
  rationale: El pasivo de λύω comunica liberación/aflojamiento de una atadura. «Se desató» preserva la imagen de deshacer un nudo o vínculo, manteniendo la metáfora de un impedimento real.
- source_word: ὁ δεσμὸς τῆς γλώσσης αὐτοῦ
  english_pob_choice: the bond of his tongue
  chosen_spanish: el lazo de su lengua
  alternatives_spanish:
  - la atadura de su lengua
  - el impedimento de su lengua
  lexicon: BDAG
  rationale: δεσμός es «vínculo, lazo, atadura». «Lazo» conserva la imagen concreta del texto mejor que una paráfrasis como «impedimento», sin perder inteligibilidad en español.
- source_word: ἐλάλει
  english_pob_choice: he spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - habló
  - empezó a hablar
  lexicon: BDAG
  rationale: El imperfecto de λαλέω puede sugerir acción en curso. «Hablaba» respeta ese aspecto y permite leer que, ya sanado, su habla quedó funcionando normalmente.
- source_word: ὀρθῶς
  english_pob_choice: plainly
  chosen_spanish: claramente
  alternatives_spanish:
  - correctamente
  - distintamente
  lexicon: BDAG
  rationale: ὀρθῶς significa «rectamente/correctamente», pero en este contexto la idea es que hablaba de manera normal e inteligible. «Claramente» comunica bien esa restauración del habla sin sonar moralizante.
theological_decisions:
- issue: Cómo reflejar la sanidad del habla sin convertir la metáfora griega en lenguaje clínico excesivo
  english_pob_reading: Retain the metaphor 'the bond of his tongue was released' in the main text
  chosen_spanish_reading: 'Conservar la imagen: «se desató el lazo de su lengua»'
  alternative_spanish_readings:
  - se quitó el impedimento de su lengua
  - su lengua quedó libre
  rationale: El griego usa una imagen concreta de vínculo/atadura. Mantenerla evita suavizar la fuerza narrativa del milagro y conserva la tensión entre metáfora corporal y resultado funcional.
  doctrine_reference: 'Principio de equivalencia óptima: conservar la imaginería del original sin sobreexplicar.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no requirió cambios sustanciales; esta versión mantiene la solución metafórica del vínculo de la lengua y la lectura clara de ὀρθῶς como habla normal e inteligible.
  spanish_consistency_notes:
  - Se mantiene la referencia concreta a los oídos en vez de una abstracción única como «audición», aunque la nota reconoce la alternativa.
  - «Lazo» y «se desató» conservan el campo semántico de δεσμός/λύω de forma coherente con el texto griego.
  - «Claramente» evita introducir una carga moral o técnica que ὀρθῶς no exige en este contexto.
  - El registro es bíblico moderno, no arcaizante, pero respeta la imaginería del original.
