base_translation:
  language: en
  yaml_path: translation/nt/mark/007/031.yaml
  text: And again[a], after departing from the region of Tyre, he came through Sidon to the Sea of Galilee[b], through the midst of the region of the Decapolis.
  footnotes:
  - marker: a
    text: Or 'by way of Sidon.' The Greek phrase can describe travel through or via Sidon.
    reason: lexical_alternative
  - marker: b
    text: Or 'between the region(s) of the Decapolis.' The Greek expression ἀνὰ μέσον can be rendered more literally as 'between/in the midst of,' and the route description is geographically difficult.
    reason: lexical_alternative
