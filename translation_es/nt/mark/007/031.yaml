translation:
  language: es
  text: Y otra vez, después de salir del territorio de Tiro, fue por Sidón[a] hasta el mar de Galilea, por en medio del territorio de la Decápolis[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'vía Sidón'. La frase griega puede describir viaje por Sidón o por medio de Sidón.
    reason: lexical_alternative
  - marker: b
    text: O 'entre los territorios de la Decápolis'. La expresión griega ἀνὰ μέσον puede traducirse más literalmente como 'entre' o 'en medio de', y la descripción de la ruta es geográficamente difícil.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: Expresa la reiteración narrativa de manera natural en español sin añadir matiz interpretativo.
- source_word: ἐξελθὼν
  english_pob_choice: after departing
  chosen_spanish: después de salir
  alternatives_spanish:
  - habiendo salido
  - después de partir
  lexicon: BDAG
  rationale: El participio aoristo antecedente se rinde con una secuencia temporal clara en español, manteniendo la idea de salida previa al verbo principal.
- source_word: ἐκ τῶν ὁρίων Τύρου
  english_pob_choice: from the region of Tyre
  chosen_spanish: del territorio de Tiro
  alternatives_spanish:
  - de la región de Tiro
  - de los límites de Tiro
  lexicon: BDAG
  rationale: ὅρια aquí señala un ámbito territorial, no una línea fronteriza estricta; 'territorio' preserva ese sentido y suena natural en español.
- source_word: ἦλθεν
  english_pob_choice: he came
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: En una descripción de ruta, 'fue' comunica mejor el movimiento geográfico en español, aunque el griego literal sea 'vino/ha llegado'.
- source_word: διὰ Σιδῶνος
  english_pob_choice: through Sidon
  chosen_spanish: por Sidón
  alternatives_spanish:
  - a través de Sidón
  - vía Sidón
  lexicon: BDAG
  rationale: διά con genitivo puede indicar paso por un lugar; 'por Sidón' conserva la idea de ruta sin sobrecargar la frase.
- source_word: τὴν θάλασσαν τῆς Γαλιλαίας
  english_pob_choice: the Sea of Galilee
  chosen_spanish: el mar de Galilea
  alternatives_spanish:
  - el lago de Galilea
  - el mar de Galilea
  lexicon: BDAG
  rationale: θάλασσα es literalmente 'mar'; se conserva la denominación geográfica con 'mar de Galilea' para corresponder al griego.
- source_word: ἀνὰ μέσον
  english_pob_choice: through the midst of
  chosen_spanish: por en medio de
  alternatives_spanish:
  - entre
  - en medio de
  - a través de
  lexicon: BDAG
  rationale: La expresión enfatiza el tránsito por la zona intermedia; 'por en medio de' reproduce ese valor espacial y mantiene la dificultad del pasaje.
- source_word: τῶν ὁρίων Δεκαπόλεως
  english_pob_choice: the region of the Decapolis
  chosen_spanish: el territorio de la Decápolis
  alternatives_spanish:
  - la región de la Decápolis
  - los límites de la Decápolis
  lexicon: BDAG
  rationale: Se mantiene el valor territorial de ὅρια y se translitera el nombre propio como 'Decápolis', conforme al uso español culto.
theological_decisions:
- issue: Lectura espacial de la ruta frente a armonización geográfica
  english_pob_reading: The route description is geographically difficult, so the English preserves the Greek spatial wording without trying to smooth it out.
  chosen_spanish_reading: La redacción conserva la secuencia espacial y no intenta resolver la dificultad geográfica.
  alternative_spanish_readings:
  - Se puede reordenar la ruta para hacerla más clara
  - Se puede simplificar a 'volvió por Sidón a Galilea'
  rationale: No hay base textual para corregir la ruta; conviene mantener la tensión geográfica del original y del POB inglés.
  doctrine_reference: Principio de fidelidad textual y no armonización especulativa
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado del POB en inglés: no hay cambios aplicados y el pasaje permanece en alto acuerdo. La traducción española conserva la misma decisión clave de ruta y las mismas alternativas léxicas relevantes.'
  spanish_consistency_notes:
  - Se usa 'territorio' para ὅρια en ambos casos, manteniendo la coherencia territorial.
  - Se conserva 'mar de Galilea' por correspondencia directa con θάλασσαν τῆς Γαλιλαίας.
  - Se mantiene la dificultad geográfica sin suavizarla, en línea con la nota inglesa.
  - Los pies de nota usan letras únicas y aparecen anclados exactamente en el texto.
  - Se evita 'SEÑOR' o cualquier terminología no pertinente; no hay términos cristológicos o teológicos adicionales en este versículo.
