translation:
  language: es
  text: Y la mujer era griega[a], sirofenicia de origen[b], y seguía pidiéndole que expulsara al demonio de su hija.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gentil»; el griego dice «griega», que en este contexto probablemente también indica que no era judía, además de su identidad cultural griega.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «sirofenicia por linaje/origen»; es decir, de ascendencia sirofenicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑλληνίς
  english_pob_choice: a Greek
  chosen_spanish: griega
  alternatives_spanish:
  - gentil
  lexicon: BDAG
  rationale: El griego dice literalmente «griega», y en este contexto también puede implicar que no era judía. Mantener «griega» conserva la forma del texto; «gentil» expresa la implicación social/religiosa, pero es menos preciso como equivalente léxico principal.
- source_word: Συροφοινίκισσα τῷ γένει
  english_pob_choice: a Syrophoenician by birth
  chosen_spanish: sirofenicia de origen
  alternatives_spanish:
  - sirofenicia por nacimiento
  - sirofenicia por descendencia
  lexicon: BDAG
  rationale: La expresión identifica procedencia étnico-geográfica. «De origen» comunica bien τῷ γένει en español natural y evita una formulación demasiado técnica o biologizante; «por nacimiento» y «por descendencia» son posibles, pero menos fluidas aquí.
- source_word: ἠρώτα
  english_pob_choice: she kept asking
  chosen_spanish: le rogaba
  alternatives_spanish:
  - le pedía
  - seguía pidiéndole
  lexicon: BDAG
  rationale: El imperfecto marca acción continuada o repetida. «Le rogaba» conserva esa insistencia y suena natural en español bíblico contemporáneo. «Le pedía» es más neutro; «seguía pidiéndole» explicita más el aspecto, pero resulta más pesado.
- source_word: ἵνα ... ἐκβάλῃ
  english_pob_choice: to cast ... out
  chosen_spanish: que expulsara
  alternatives_spanish:
  - que echara fuera
  - para expulsar
  lexicon: BDAG
  rationale: En contexto de exorcismo, «expulsara» comunica bien ἐκβάλλω sin perder claridad. «Echara fuera» es válido y más tradicional, pero «expulsara» mantiene un registro claro y moderno. «Para expulsar» vuelve demasiado finalista la construcción.
- source_word: τὸ δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: al demonio
  alternatives_spanish:
  - al espíritu demoníaco
  - al demonio
  lexicon: BDAG
  rationale: Se preserva la referencia directa a δαιμόνιον como «demonio». En español, el acusativo con verbo de expulsión se expresa naturalmente con «al demonio»; «espíritu demoníaco» suaviza demasiado el sustantivo griego y añade interpretación.
- source_word: ἐκ τῆς θυγατρὸς αὐτῆς
  english_pob_choice: out of her daughter
  chosen_spanish: de su hija
  alternatives_spanish:
  - de dentro de su hija
  - fuera de su hija
  lexicon: BDAG
  rationale: Aunque ἐκ puede sugerir «fuera de», en español la fórmula más natural es «de su hija» después de «expulsar al demonio». El verbo ya lleva la idea de salida; repetir «fuera de» sonaría forzado.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: «Ahora» reproduce bien la transición narrativa suave de δέ sin cargar contraste fuerte. En español también ayuda a situar la escena con fluidez.
theological_decisions:
- issue: Identificación étnica y religiosa de la mujer
  english_pob_reading: 'The verse preserves both descriptors: ''a Greek, a Syrophoenician by birth.'''
  chosen_spanish_reading: 'El versículo conserva ambos rasgos: «griega» y «sirofenicia de origen».'
  alternative_spanish_readings:
  - «gentil, sirofenicia de origen»
  - «griega, de origen sirofenicio»
  rationale: Conviene mantener ambas designaciones sin fusionarlas. «Griega» reproduce el término del texto; «sirofenicia de origen» conserva la procedencia. La combinación deja visible la tensión entre identidad cultural y origen étnico-geográfico que el griego parece querer retener.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Naturaleza de la afección de la hija
  english_pob_reading: The text states that she asked Jesus to cast 'the demon' out of her daughter.
  chosen_spanish_reading: El texto afirma que pidió la expulsión del demonio de su hija.
  alternative_spanish_readings:
  - «espíritu maligno»
  - «espíritu inmundo»
  rationale: La lectura sigue el sustantivo δαιμόνιον y conserva la afirmación sobrenatural del pasaje. No se sustituye por expresiones más suaves o más amplias, para no borrar el contenido explícito del texto.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y concuerda con el audit trail inglés: conserva el doble marcador identitario de la mujer, respeta el imperfecto de petición continua y mantiene «demonio» para δαιμόνιον. No se registran revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantuvo un español neutral y publicable, evitando calcos innecesarios.
  - «Ahora» funciona como transición narrativa suave para δὲ.
  - «Le rogaba» conserva la insistencia del imperfecto sin exagerar el tono.
  - Se usó «de origen» para τῷ γένει por claridad y naturalidad en español.
  - La nota de pie para «griega» conserva la alternativa semántica «gentil» sin imponerla en el texto principal.
