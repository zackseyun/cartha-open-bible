  - severity: medium
    issue: «Contaminar» atenúa o desplaza el campo semántico de pureza
    rationale: Aunque «contaminar» puede funcionar, κοινόω en este contexto trata específicamente de volver impuro/impuro en sentido de pureza. «Hacer impura» o «volver impura» comunica mejor el eje ritual, y la alternativa «contaminar» puede quedar en nota por su resonancia moral.
  - severity: low
