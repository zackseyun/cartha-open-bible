translation:
  language: es
  text: Nada hay fuera de una persona[a] que, al entrar en ella, pueda hacerla impura[b]; sino que las cosas que salen de la persona son las que hacen impura a la persona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Gr. ἄνθρωπος en singular genérico, es decir, «ser humano» o «persona».
    reason: lexical_alternative
  - marker: b
    text: O «contaminarla». El verbo griego puede expresar volver ritualmente impuro; «hacerla impura» se usa aquí para conservar con claridad ese sentido de pureza, aunque el contexto también le da fuerza moral.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδέν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - ninguna cosa
  - nada en absoluto
  lexicon: BDAG
  rationale: οὐδέν es un neutro indefinido absoluto; «nada» es la equivalencia natural y precisa en español.
- source_word: ἔξωθεν
  english_pob_choice: outside
  chosen_spanish: fuera de
  alternatives_spanish:
  - desde fuera de
  - exterior a
  lexicon: BDAG
  rationale: La idea contrasta con lo que «sale de» la persona; «fuera de» preserva la oposición espacial/origenal sin sonar artificial.
- source_word: τοῦ ἀνθρώπου / τὸν ἄνθρωπον
  english_pob_choice: a person / the person
  chosen_spanish: una persona / la persona
  alternatives_spanish:
  - un hombre / el hombre
  - un ser humano / el ser humano
  lexicon: BDAG
  rationale: ἄνθρωπος aquí funciona de manera genérica; en español, «persona» comunica mejor el valor inclusivo y evita una lectura masculina no obligatoria, manteniendo el singular genérico del paralelo retórico.
- source_word: εἰσπορευόμενον εἰς αὐτόν
  english_pob_choice: by going into him
  chosen_spanish: al entrar en ella
  alternatives_spanish:
  - que entra en ella
  - entrando en ella
  lexicon: BDAG
  rationale: El participio expresa la acción de ingresar como circunstancia de la frase; «al entrar en ella» conserva la fuerza verbal y suena idiomático en español.
- source_word: δύναται
  english_pob_choice: is able to
  chosen_spanish: pueda
  alternatives_spanish:
  - puede
  - sea capaz de
  lexicon: BDAG
  rationale: En español, la subordinada con «pueda» reproduce bien la idea de capacidad dentro de la estructura relativa sin volver la frase pesada.
- source_word: κοινῶσαι / κοινοῦντα
  english_pob_choice: defile / defile
  chosen_spanish: contaminar / contaminan
  alternatives_spanish:
  - hacer impuro / hacen impuro
  - hacer inmundo / hacen inmundo
  lexicon: BDAG
  rationale: En este contexto de pureza, κοινόω puede indicar volver impuro; «contaminar» es una opción española sobria que puede abarcar la dimensión ritual y la resonancia moral sin introducir un tecnicismo eclesiástico menos transparente.
- source_word: ἀλλὰ
  english_pob_choice: rather
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Después de una negación, «sino que» expresa con mayor naturalidad la corrección contrastiva que en inglés se resolvió con «rather».
- source_word: τὰ ἐκ τοῦ ἀνθρώπου ἐκπορευόμενα
  english_pob_choice: the things that come out from the person
  chosen_spanish: las cosas que salen de la persona
  alternatives_spanish:
  - lo que sale de la persona
  - las cosas que proceden de la persona
  lexicon: BDAG
  rationale: El participio plural sustantivado se vierte bien como «las cosas que salen»; «salen» preserva el movimiento de salida y el contraste con «al entrar».
theological_decisions:
- issue: Sentido de κοινόω en un contexto de pureza
  english_pob_reading: defile
  chosen_spanish_reading: contaminar
  alternative_spanish_readings:
  - hacer impuro
  - hacer inmundo
  rationale: El pasaje trata de categorías de pureza, pero el dicho también tiene fuerza moral en su contexto inmediato. «Contaminar» mantiene la gravedad del efecto causado sobre la persona sin restringirlo solo a una etiqueta ritual.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: ἄνθρωπος como genérico singular
  english_pob_reading: person
  chosen_spanish_reading: persona
  alternative_spanish_readings:
  - hombre
  - ser humano
  rationale: La forma griega es singular y genérica. «Persona» conserva esa genericidad en español y evita una masculinización innecesaria del enunciado, en coherencia con la revisión inglesa más reciente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La versión inglesa auditada fue revisada de «man» a «person» por claridad e inclusividad, y se suavizó la puntuación de la cláusula participial. La presente redacción española sigue esa revisión, pero evita calcar el inglés y opta por una sintaxis natural en español («al entrar en ella»).
  spanish_consistency_notes:
  - Se mantiene «persona» para ἄνθρωπος con el fin de conservar el genérico singular sin sesgo de género.
  - Se prefirió «contaminar» para κοινόω por su capacidad de abarcar la dimensión ritual y moral del contexto.
  - «Sino que» refleja mejor el giro correctivo tras la negación que un simple «pero».
