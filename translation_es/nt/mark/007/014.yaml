  rationale: Se ajusta la redacción para un español más natural y fluido, se representa πάλιν con «de nuevo» en posición más clara, se adopta «les dijo» conforme a la revisión auditada del inglés y se mejora la puntuación del vocativo sin alterar el sentido del original.
