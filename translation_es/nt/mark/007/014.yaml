translation:
  language: es
  text: 'Y, llamando de nuevo a la multitud, les dijo: «Escúchenme, todos ustedes, y entiendan».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: calling the crowd to him
  chosen_spanish: llamando otra vez a la multitud
  alternatives_spanish:
  - convocando a la multitud
  - llamando a la multitud a su lado
  lexicon: BDAG
  rationale: El participio aoristo medio introduce una acción previa al verbo principal. «Llamando» conserva la relación verbal sin volver pesado el español; «a la multitud» refleja ὄχλον de manera natural. La idea de acercarlos está implícita en el llamado, sin necesidad de explicitarla en el texto principal.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: El adverbio marca una reanudación del discurso. «Otra vez» es idiomático en español y conserva la repetición del llamado.
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος designa un grupo reunido. «Multitud» mantiene el valor colectivo y evita una banalización demasiado coloquial.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  - seguía diciéndoles
  lexicon: BDAG
  rationale: El imperfecto sugiere habla en curso o enmarcada como discurso directo. «Decía» conserva esa imperfectividad mejor que el perfecto simple; el pronombre «les» retoma el dativo αὐτοῖς de forma natural en español.
- source_word: Ἀκούσατέ
  english_pob_choice: Listen
  chosen_spanish: Escúchenme
  alternatives_spanish:
  - Oiganme
  - Atiéndanme
  lexicon: BDAG
  rationale: El imperativo aoristo exige atención inmediata. En español, el mandamiento se expresa de forma natural como «Escúchenme», que comunica la fuerza directiva y mantiene el objeto pronominal del griego.
- source_word: μου
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  lexicon: BDAG
  rationale: Con ἀκούω, el genitivo de la primera persona señala a la persona a quien se escucha. En español, el clítico «me» es la forma más natural y directa en este mandato.
- source_word: πάντες
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - cada uno de ustedes
  lexicon: BDAG
  rationale: El plural con valor vocativo enfatiza que el llamado incluye a todo el grupo. «Todos ustedes» preserva esa dirección explícita al auditorio en español latinoamericano.
- source_word: σύνετε
  english_pob_choice: understand
  chosen_spanish: entiendan
  alternatives_spanish:
  - comprendan
  - disciernan
  lexicon: BDAG
  rationale: El imperativo de συνίημι pide captar el sentido de lo que Jesús dice. «Entiendan» es claro y natural en español, y mantiene la diferencia con el mero oír.
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura final del POB inglés (con el ajuste de 'he said' desde el imperfecto inglés inicial), pero conserva en español el matiz imperfectivo de ἔλεγεν con «decía», que es el modo más natural de reflejar el discurso en curso sin perder legibilidad.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo en segunda persona plural con «Escúchenme» y «entiendan», acorde con un llamado público a la multitud.
  - Se opta por «multitud» y no por «gente» para conservar la densidad colectiva de ὄχλος.
  - No se añade comillas internas extensas ni cambios de registro que desplacen la concisión imperativa del versículo.
