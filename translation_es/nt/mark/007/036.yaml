  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: Jesús dio una orden real de no decirlo a nadie, y la estructura correlativa ὅσον… μᾶλλον περισσότερον queda reflejada correctamente. Sin embargo, «no se lo dijeran a nadie» introduce un «lo» más específico de lo que el griego expresa, donde λέγωσιν deja el contenido implícito. También conviene reflejar mejor la fuerza intensiva de μᾶλλον περισσότερον.'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse para sonar más idiomático y preciso: «que no se lo dijeran a nadie» es comprensible, aunque «que no le dijeran nada a nadie» o «que no dijeran nada a nadie» evita un referente implícito innecesariamente cargado. Asimismo, «tanto más lo proclamaban» es correcto, pero «con mayor insistencia» o «aún más» comunica mejor la intensificación sin rigidez.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ordenó» y «proclamaban» concuerdan bien con las decisiones léxicas del POB. La revisión propuesta mantiene esas elecciones y ajusta solo el grado de explicitud y la intensificación adverbial.
  issues:
  - severity: medium
    issue: «no se lo dijeran a nadie» explicita con «lo» un objeto implícito en el griego
    rationale: ἵνα μηδενὶ λέγωσιν significa literalmente que no dijeran nada a nadie / no contaran a nadie, sin objeto expreso. El «lo» español es posible por contexto, pero añade especificidad no presente en la forma fuente.
  - severity: medium
    issue: «tanto más» atenúa la doble intensificación de μᾶλλον περισσότερον
    rationale: La pareja adverbial griega enfatiza que proclamaban todavía más. «Tanto más» funciona en la correlación, pero no representa tan claramente el aumento enfático como una formulación del tipo «con mayor insistencia» o una nota alternativa mejor ajustada.
  - severity: low
    issue: La nota al pie puede pulirse para corresponder mejor a las alternativas del audit trail inglés
    rationale: La nota actual mezcla una paráfrasis interpretativa y una alternativa abreviada. Conviene conservar la alternativa de fuerza léxica («encargaba con firmeza») y una opción más literal para la segunda mitad («aún más» / «tanto más»).
  revised_spanish_text: Y les ordenó que no le dijeran nada a nadie. Pero cuanto más les ordenaba[a], con mayor insistencia lo proclamaban.
