translation:
  language: es
  text: Y les ordenó que no le dijeran nada a nadie. Pero cuanto más les ordenaba[a], con mayor insistencia lo proclamaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «cuanto más les encargaba con firmeza, aún más lo proclamaban»; también: «tanto más lo proclamaban».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διεστείλατο
  english_pob_choice: ordered
  chosen_spanish: les ordenó
  alternatives_spanish:
  - les mandó
  - les encargó con firmeza
  - les dio una orden estricta
  lexicon: BDAG
  rationale: El medio de διαστέλλομαι aquí expresa una orden o mandato firme. «Les ordenó» conserva esa fuerza de modo natural en español y evita suavizarla con «instruyó».
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - les
  lexicon: BDAG
  rationale: El dativo plural se expresa de forma natural con el complemento indirecto español «les», manteniendo el referente plural sin recargar la frase.
- source_word: ἵνα μηδενὶ λέγωσιν
  english_pob_choice: to tell no one
  chosen_spanish: que no se lo dijeran a nadie
  alternatives_spanish:
  - que no dijeran nada a nadie
  - para no decírselo a nadie
  lexicon: BDAG
  rationale: La cláusula de propósito/contenido expresa la sustancia del mandato. En español, «que no se lo dijeran a nadie» conserva la referencia implícita a lo sucedido y suena idiomático en contexto narrativo.
- source_word: ὅσον ... διεστέλλετο
  english_pob_choice: the more he ordered them
  chosen_spanish: cuanto más les ordenaba
  alternatives_spanish:
  - mientras más les ordenaba
  - cuanto más les seguía ordenando
  lexicon: BDAG
  rationale: La correlación con imperfecto expresa incremento iterativo. «Cuanto más... tanto más...» reproduce bien la estructura comparativa sin perder naturalidad.
- source_word: μᾶλλον περισσότερον
  english_pob_choice: the more abundantly
  chosen_spanish: tanto más
  alternatives_spanish:
  - aún más
  - más y más
  - con mayor abundancia
  lexicon: BDAG
  rationale: Los dos adverbios intensifican la respuesta. «Tanto más» preserva el incremento enfático y permite que la segunda parte de la correlación complete la idea sin forzar un giro pesado.
- source_word: ἐκήρυσσον
  english_pob_choice: they proclaimed it
  chosen_spanish: lo proclamaban
  alternatives_spanish:
  - lo anunciaban
  - lo pregonaban
  - lo predicaban
  lexicon: BDAG
  rationale: κηρύσσω significa proclamar públicamente. «Lo proclamaban» conserva el matiz de proclamación pública mejor que «anunciaban» y evita el tono técnico de «predicaban».
theological_decisions:
- issue: Mandato de silencio / tensión narrativa
  english_pob_reading: Render the command straightforwardly as a real prohibition without importing a theory about why Jesus gave it.
  chosen_spanish_reading: Traducir la prohibición de forma directa, sin añadir explicación sobre el motivo del silencio.
  alternative_spanish_readings:
  - usar «les ordenó estrictamente» para intensificar la severidad
  - añadir una nota interpretativa sobre el llamado «secreto mesiánico»
  rationale: 'El versículo presenta una orden real y luego muestra la reacción contraria: proclamaban más. La traducción debe preservar esa tensión sin resolverla interpretativamente.'
  doctrine_reference: Preservar la tensión teológica/narrativa en lugar de explicarla o suavizarla.
translation_notes:
  revision_awareness: Se corrigió la validación previa anclando la nota [a] en el verbo comparativo de la segunda oración y manteniendo una sola nota con marcador presente en el texto.
  spanish_consistency_notes:
  - Se usó «ordenó» para διεστείλατο conforme al valor de mandato firme documentado en el audit trail.
  - Se mantuvo la correlación comparativa «cuanto más... tanto más...» para reflejar ὅσον ... μᾶλλον περισσότερον.
  - Se evitó «predicaban» para κηρύσσω por posible carga eclesiástica; «proclamaban» conserva el sentido público.
  - La nota al pie solo ofrece una alternativa léxica realmente paralela y no introduce interpretación añadida.
