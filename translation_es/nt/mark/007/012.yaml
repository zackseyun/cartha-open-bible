translation:
  language: es
  text: ya no le permiten hacer nada por su padre o su madre[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacer nada para ayudar a su padre o a su madre». La expresión griega más amplia puede incluir apoyo práctico o financiero en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - ya no más
  - no le permiten ya
  lexicon: BDAG
  rationale: Expresa la cesación de una acción previa con naturalidad en español y conserva el valor temporal de la forma griega.
- source_word: ἀφίετε
  english_pob_choice: allow
  chosen_spanish: le permiten
  alternatives_spanish:
  - le permiten
  - le dejan
  - le autorizan
  lexicon: BDAG
  rationale: Aquí ἀφίημι tiene el sentido de permitir o dejar, no de perdonar ni abandonar. 'Le permiten' mantiene el sentido práctico y relacional del contexto.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: le
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: El pronombre español se ajusta mejor como dativo de afectación en esta construcción; el referente masculino singular se conserva sin sobrecargar la frase.
- source_word: οὐδὲν
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: En español, 'nada' comunica bien la negación del infinitivo y evita una formulación pesada. Aunque el inglés POB usó 'anything' por idiomática, el español natural pide una negación directa.
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - hacer algo
  - realizar
  lexicon: BDAG
  rationale: Infinitivo básico de acción. 'Hacer' preserva la amplitud del verbo griego sin añadir una interpretación más estrecha.
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  english_pob_choice: for his father or mother
  chosen_spanish: por su padre o por su madre
  alternatives_spanish:
  - para su padre o su madre
  - en favor de su padre o de su madre
  lexicon: BDAG
  rationale: El dativo de beneficio puede expresarse en español con 'por' en este contexto, especialmente al hablar de hacer algo a favor de los padres. 'Para' también sería posible, pero 'por' suena más natural y mantiene la idea de beneficio sin especificar aún el tipo exacto de ayuda.
theological_decisions:
- issue: Si hacer explícita la ayuda material/financiera implícita en el contexto de Corbán
  english_pob_reading: Keep the wording general as 'do anything for his father or mother'
  chosen_spanish_reading: 'Mantener una formulación general: ''hacer nada por su padre o por su madre'''
  alternative_spanish_readings:
  - hacer nada para ayudar a su padre o a su madre
  - hacer nada para el sustento de su padre o de su madre
  rationale: El griego inmediato dice de modo amplio 'hacer nada por' sus padres. El contexto más amplio sugiere ayuda práctica o económica, pero el versículo por sí solo no la especifica. La traducción conserva esa amplitud y deja que el contexto determine la implicación.
  doctrine_reference: Principio de fidelidad al alcance inmediato del texto; no resolver una tensión contextual por paráfrasis.
translation_notes:
  revision_awareness: El borrador sigue de cerca la decisión auditada del POB inglés de mantener una formulación amplia sin explicitar apoyo material en el texto principal. Se adapta al español con 'hacer nada por' como equivalente natural del dativo de beneficio y con una nota que preserva la alternativa interpretativa.
  spanish_consistency_notes:
  - Se conserva 'por' para el beneficio relacional del dativo, evitando estrechar el sentido a una ayuda exclusivamente económica.
  - Se usa 'ya no' para οὐκέτι, una equivalencia idiomática estable en español.
  - Se evita 'permiten' en singular/plural confuso; el sujeto implícito plural de la acusación se mantiene por el verbo en plural.
  - Se mantiene el referente masculino singular con 'su padre o su madre' sin repetir posesivos innecesariamente.
