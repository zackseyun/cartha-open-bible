translation:
  language: es
  text: 'Y le decía[a]: «Deja que primero se alimenten los niños, porque no es bueno tomar el pan de los niños y echarlo a los perritos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perritos de casa» o simplemente «perros». El griego usa un diminutivo, que sugiere perros pequeños o domésticos más que carroñeros salvajes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: le decía
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continua o iterativa; en español, «le decía» conserva mejor ese aspecto que el pretérito simple «le dijo», sin sonar forzado.
- source_word: Ἄφες
  english_pob_choice: Let
  chosen_spanish: Deja
  alternatives_spanish:
  - Permite
  - Déjalo
  lexicon: BDAG
  rationale: 'Aquí el imperativo aoristo de ἀφίημι funciona idiomáticamente como permiso: «deja» es natural en español y refleja bien el sentido de permitir que ocurra la acción.'
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - ante todo
  lexicon: BDAG
  rationale: «Primero» preserva la prioridad/secuencia del griego y mantiene abierta la tensión teológica de prioridad sin exclusión necesariamente permanente.
- source_word: χορτασθῆναι
  english_pob_choice: be fed
  chosen_spanish: sean saciados
  alternatives_spanish:
  - sean alimentados
  - queden satisfechos
  lexicon: BDAG
  rationale: El pasivo infinitivo puede implicar quedar alimentados hasta la saciedad. «Sean saciados» conserva la idea de satisfacción/nutrición; «alimentados» sería más literal, pero menos pleno en español.
- source_word: τὰ τέκνα
  english_pob_choice: the children
  chosen_spanish: los niños
  alternatives_spanish:
  - los hijos
  - los pequeños
  lexicon: BDAG
  rationale: τέκνα nombra a los niños/hijos en general. En este contexto metafórico, «los niños» suena natural en español y preserva la imagen doméstica sin añadir interpretación explícita.
- source_word: καλόν ἐστιν
  english_pob_choice: it is not good
  chosen_spanish: no es bueno
  alternatives_spanish:
  - no es correcto
  - no es apropiado
  lexicon: BDAG
  rationale: La revisión inglesa optó por «good» para καλόν ἐστιν; en español, «no es bueno» reproduce con claridad esa valoración de conveniencia/propriedad sin cargar una matización moral más fuerte de la que pide el contexto.
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: tomar
  alternatives_spanish:
  - llevarse
  - quitar
  lexicon: BDAG
  rationale: «Tomar» es el equivalente natural para λαβεῖν y mantiene la sencillez del verbo griego; el contexto ya comunica el desplazamiento de lo que se toma.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el alimento
  - la comida
  lexicon: BDAG
  rationale: «Pan» es el equivalente directo de ἄρτος y conserva la imagen concreta del texto, mejor que generalizar a «alimento» o «comida».
- source_word: κυναρίοις
  english_pob_choice: little dogs
  chosen_spanish: los perritos
  alternatives_spanish:
  - los perros pequeños
  - los perrillos
  lexicon: BDAG
  rationale: El diminutivo κυνάριον se refleja mejor con «perritos», que preserva la idea de tamaño/atenuación lexical sin borrar la dureza del contraste. «Perritos» evita el exceso de dulzura de «cachorros» y mantiene la referencia doméstica sugerida por el término.
- source_word: βαλεῖν
  english_pob_choice: throw it to
  chosen_spanish: echarlo a
  alternatives_spanish:
  - arrojarlo a
  - tirarlo a
  lexicon: BDAG
  rationale: βάλλω significa lanzar/arrojar; «echarlo a» es idiomático en español y conserva el gesto de dar mediante un acto brusco, más que un simple «dar».
theological_decisions:
- issue: Metáfora doméstica de «los niños» y «los perritos»
  english_pob_reading: Retain the household metaphor without explicating its referents in the main text.
  chosen_spanish_reading: Mantener la metáfora doméstica sin explicitar en el texto principal a qué grupos se refiere.
  alternative_spanish_readings:
  - Parafrasear como Israel/Judíos y gentiles
  - Explicar la metáfora dentro del versículo
  rationale: El griego presenta una metáfora hablada, no una glosa interpretativa. Conservarla en español respeta la tensión narrativa y evita introducir explicación exegética en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de πρῶτον
  english_pob_reading: Preserve 'first' in the main text.
  chosen_spanish_reading: Conservar «primero» en el texto principal.
  alternative_spanish_readings:
  - Omitir la prioridad para mayor fluidez
  - Reformular como «antes que nada»
  rationale: «Primero» preserva la prioridad temporal o de orden y no resuelve indebidamente la tensión entre prioridad y posible inclusión posterior.
  doctrine_reference: Translation philosophy §3
- issue: Matiz de καλόν ἐστιν
  english_pob_reading: it is not good
  chosen_spanish_reading: no es bueno
  alternative_spanish_readings:
  - no es correcto
  - no es conveniente
  rationale: La redacción española debe reflejar la evaluación de conveniencia/propriedad sin endurecer el juicio. «No es bueno» sigue de cerca la revisión inglesa y mantiene la ambigüedad productiva del griego.
  doctrine_reference: BDAG; applied revision pass 2026-04-23
translation_notes:
  revision_awareness: La versión inglesa revisada cambió “right” por “good” para reflejar más directamente καλόν ἐστιν. La propuesta española sigue esa revisión con «no es bueno», y también conserva el imperfecto iterativo con «le decía».
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «niños» para τέκνα y «perritos» para κυναρίοις, preservando la metáfora sin explicitarla.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el versículo.
  - La puntuación y las comillas siguen el uso estándar del español; el pronombre enclítico «echarlo» recupera el objeto implícito de ἄρτον.
