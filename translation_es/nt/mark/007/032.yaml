  to: Y le trajeron un hombre sordo y con dificultad para hablar[a], y le rogaron que pusiera su mano sobre él.
  rationale: Se conserva la fidelidad del borrador, pero se mejora la naturalidad y precisión de la cláusula final al cambiar «le pusiera la mano encima» por «pusiera su mano sobre él», que comunica mejor el gesto de imposición de la mano en español claro y digno. También se pule levemente la nota al pie.
