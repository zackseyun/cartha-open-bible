translation:
  language: es
  text: Y le trajeron un hombre sordo y con dificultad para hablar[a], y le rogaron que pusiera su mano sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «un sordo y uno que hablaba con dificultad».
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρουσιν
  english_pob_choice: brought
  chosen_spanish: le trajeron
  alternatives_spanish:
  - lo estaban trayendo
  - le llevaban
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado simple en español narrativo. «Le trajeron» mantiene la secuencia del relato sin perder el valor de evento puntual.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El dativo se refiere a Jesús; en español, el clítico dativo «le» es natural y mantiene la referencia sin recargar la frase.
- source_word: κωφὸν
  english_pob_choice: a man who was deaf
  chosen_spanish: sordo
  alternatives_spanish:
  - un hombre sordo
  - un hombre que era sordo
  lexicon: BDAG
  rationale: El adjetivo κωφός aquí denota sordera; el contexto siguiente distingue además la dificultad del habla. «Sordo» preserva esa distinción sin añadir mutismo.
- source_word: μογιλάλον
  english_pob_choice: had difficulty speaking
  chosen_spanish: con dificultad para hablar
  alternatives_spanish:
  - de habla dificultosa
  - que hablaba con dificultad
  - mudo
  lexicon: BDAG
  rationale: El término no implica silencio total. La frase española expresa impedimento del habla de forma clara y evita sobretraducirlo como «mudo».
- source_word: παρακαλοῦσιν
  english_pob_choice: begged
  chosen_spanish: le rogaron
  alternatives_spanish:
  - le suplicaron
  - le imploraron
  - le pidieron
  lexicon: BDAG
  rationale: En un contexto de sanidad, παρακαλέω comunica una petición intensa. «Le rogaron» conserva la urgencia y suena natural en español bíblico contemporáneo.
- source_word: ἵνα ἐπιθῇ αὐτῷ τὴν χεῖρα
  english_pob_choice: to lay his hand on him
  chosen_spanish: que le pusiera la mano encima
  alternatives_spanish:
  - que le impusiera la mano
  - que le colocara la mano sobre él
  - para poner su mano sobre él
  lexicon: BDAG
  rationale: La construcción final expresa el contenido de la petición. «Pusiera la mano encima» conserva la imagen concreta de una mano singular sobre el hombre, sin introducir el lenguaje eclesial más técnico de «imponer» si no es necesario.
theological_decisions:
- issue: 'La condición del hombre: sordera e impedimento del habla, no mudez absoluta'
  english_pob_reading: The man is described as deaf and as having impaired speech, not as completely mute.
  chosen_spanish_reading: El hombre es «sordo y con dificultad para hablar», no «mudo».
  alternative_spanish_readings:
  - sordo y mudo
  - sordo y tartamudo
  rationale: El griego separa κωφός de μογιλάλος; la segunda palabra describe habla dificultosa, no ausencia total de habla. La traducción evita borrar esa tensión lexical.
  doctrine_reference: Precisión lexical del texto griego; evita confundir impedimento físico con otra categoría médica.
translation_notes:
  revision_awareness: La versión española sigue de cerca la decisión del POB en inglés de distinguir κωφός y μογιλάλος, evitando «mudo» y preservando el matiz de habla impedida. También mantiene el gesto singular de la mano sobre él, en paralelo con la nota léxica del original.
  spanish_consistency_notes:
  - Se mantiene el clítico dativo «le» para la referencia a Jesús, acorde con un español fluido y reverente.
  - «Mano» va en singular para reflejar τὴν χεῖρα.
  - La nota al pie conserva la alternativa literal, porque la distinción entre sordera y habla dificultosa es teológicamente y léxicamente relevante.
