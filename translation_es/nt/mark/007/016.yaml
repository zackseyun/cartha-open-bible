translation:
  language: es
  text: '[a]Si alguno tiene oídos para oír, oiga.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos Sinaítico y Vaticano, del siglo IV) y en versiones coptas tempranas, pero está presente en la tradición mayoritaria bizantina, en la tradición latina y en la mayoría de los testigos siríacos. Probablemente sea una adición posterior de un escriba que repite la frase idéntica de Marcos 4:9 y 4:23.
    reason: textual_variant
lexical_decisions:
- source_word: ὦτα
  english_pob_choice: ears
  chosen_spanish: oídos
  alternatives_spanish:
  - orejas
  - oído
  lexicon: BDAG
  rationale: Mantengo la imagen corporal literal del órgano auditivo, pero en español bíblico natural 'oídos' comunica mejor la capacidad de percibir y entender que 'orejas'. Preserva la fuerza metafórica de receptividad espiritual que el POB inglés señaló.
- source_word: ἀκούειν
  english_pob_choice: to hear
  chosen_spanish: para oír
  alternatives_spanish:
  - para escuchar
  - para entender
  lexicon: BDAG
  rationale: El infinitivo de propósito expresa la capacidad destinada a la audición/comprensión. 'Oír' es más neutral y cercano al griego que 'escuchar' si se quiere conservar el valor básico de percibir con el oído.
- source_word: ἀκουέτω
  english_pob_choice: let him hear
  chosen_spanish: oiga
  alternatives_spanish:
  - que oiga
  - que escuche
  lexicon: BDAG
  rationale: El imperativo de tercera persona singular en español se vierte con 'oiga', que conserva la exhortación breve y jussiva. 'Que oiga' es posible, pero menos compacto; 'escuche' introduce un matiz más voluntario en español moderno.
theological_decisions:
- issue: Sentido metafórico de la fórmula de escucha
  english_pob_reading: The physical organ is used metaphorically here to denote spiritual receptivity and comprehension.
  chosen_spanish_reading: La expresión conserva el órgano físico ('oídos') como metáfora de receptividad y comprensión espiritual.
  alternative_spanish_readings:
  - La frase alude simplemente a oír físicamente.
  - 'La frase significa: quien pueda entender, que entienda.'
  rationale: No suavizo la metáfora. El texto griego y la nota inglesa muestran que la referencia no es meramente auditiva, sino exhortativa y receptiva; por eso conviene mantener la imagen de los 'oídos' y el mandato 'oiga'.
  doctrine_reference: Hermenéutica de la receptividad en los dichos de Jesús; no se introduce una doctrina adicional.
- issue: Variación textual del versículo
  english_pob_reading: Absent from the earliest Greek manuscripts... likely a later scribal addition echoing Mark 4:9 and 4:23.
  chosen_spanish_reading: Se incluye el versículo en el texto principal, con nota textual sobre su ausencia en testigos antiguos y su presencia en la tradición mayoritaria bizantina.
  alternative_spanish_readings:
  - Omitir el versículo del cuerpo principal.
  - Incluirlo sin advertencia textual.
  rationale: Dado que el POB inglés lo traduce y documenta críticamente, el español debe reflejar la misma transparencia textual. No se elimina del texto porque pertenece a la tradición bizantina del pasaje recibido, pero sí se señala su estatus crítico.
  doctrine_reference: Crítica textual del Nuevo Testamento; tradición manuscrita.
translation_notes:
  revision_awareness: El texto inglés revisado eliminó un artículo innecesario sin cambiar el sentido. En español no había artículo que ajustar; la fórmula ya queda natural y fiel con 'Si alguno tiene oídos para oír, oiga'.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones innecesarias porque el versículo no contiene vocabulario divino.
  - Se prefiere 'oídos' sobre 'orejas' por naturalidad y por la imagen metafórica habitual en español bíblico.
  - La puntuación reproduce la brevedad exhortativa del griego.
  - La nota textual se conserva para reflejar el mismo compromiso de transparencia del POB inglés.
