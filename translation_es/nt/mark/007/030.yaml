translation:
  language: es
  text: Y fue a su casa y halló a la niña acostada en la cama[a], y el demonio ya había salido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el demonio habiendo salido».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπελθοῦσα
  english_pob_choice: when she went away
  chosen_spanish: fue
  alternatives_spanish:
  - cuando fue
  - habiendo ido
  lexicon: BDAG
  rationale: 'El participio aoristo marca una acción previa al verbo principal. En español, la secuencia narrativa queda natural con un verbo simple coordinado por contexto: «fue». La alternativa «habiendo ido» sería más formal, pero más pesada; «cuando fue» añade una relación temporal explícita que el griego ya deja implícita en la secuencia.'
- source_word: εἰς τὸν οἶκον αὐτῆς
  english_pob_choice: to her house
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - dentro de su casa
  lexicon: BDAG
  rationale: «A su casa» refleja de forma transparente el movimiento hacia la vivienda y evita una idiomatización excesiva. «Hogar» es posible, pero añade una carga afectiva no expresada por el griego; «dentro de su casa» especifica más de lo que el texto exige.
- source_word: εὗρεν
  english_pob_choice: she found
  chosen_spanish: halló
  alternatives_spanish:
  - encontró
  - descubrió
  lexicon: BDAG
  rationale: «Halló» y «encontró» son equivalentes; se eligió «halló» por su tono más sobrio y bíblico sin caer en arcaísmo excesivo. Conserva el sentido narrativo de εὑρίσκω sin reinterpretarlo.
- source_word: παιδίον
  english_pob_choice: the child
  chosen_spanish: al niño
  alternatives_spanish:
  - al niño pequeño
  - a la niña
  lexicon: BDAG
  rationale: El griego usa un término neutro para «niño/niña pequeña»; el contexto inmediato ya identifica que se trata de la hija de la mujer. En español, «al niño» funciona como equivalente genérico del referente infantil del relato y evita añadir una especificación de género que el versículo no expresa aquí.
- source_word: βεβλημένον
  english_pob_choice: lying
  chosen_spanish: acostado
  alternatives_spanish:
  - tendido
  - echado
  lexicon: BDAG
  rationale: El participio perfecto pasivo de βάλλω describe el estado resultante del niño en la cama. En español, «acostado» comunica ese estado con naturalidad; «tendido» o «echado» también podrían servir, pero «acostado» resulta más claro y menos ambiguo en este contexto.
- source_word: ἐπὶ τὴν κλίνην
  english_pob_choice: on the bed
  chosen_spanish: en la cama
  alternatives_spanish:
  - sobre la cama
  - en el lecho
  lexicon: BDAG
  rationale: Aunque la preposición puede traducirse literalmente como «sobre», en español «en la cama» es natural para un estado de reposo y evita un calco rígido. «Lecho» sería más elevado o literario; «sobre la cama» sería más literal, pero menos idiomático.
- source_word: δαιμόνιον
  english_pob_choice: the demon
  chosen_spanish: el demonio
  alternatives_spanish:
  - el espíritu demoníaco
  - el espíritu inmundo
  lexicon: BDAG
  rationale: Se mantiene «demonio» para reflejar el término específico del texto. La elección conserva la distinción lexical frente a «espíritu inmundo», que es la designación usada en el contexto previo, pero no en esta cláusula.
- source_word: ἐξεληλυθός
  english_pob_choice: gone
  chosen_spanish: ya había salido
  alternatives_spanish:
  - había salido
  - había salido ya
  lexicon: BDAG
  rationale: 'El participio perfecto expresa una acción completada con estado resultante: el demonio ya no estaba allí. «Ya había salido» comunica bien esa anterioridad y ausencia presente. Se evita traducir solo «salido» para que el resultado quede claro en español.'
theological_decisions:
- issue: Resultado de la expulsión del demonio
  english_pob_reading: the demon gone
  chosen_spanish_reading: ya había salido
  alternative_spanish_readings:
  - el demonio salió
  - el demonio había salido
  rationale: 'El perfecto griego subraya el hecho consumado y su efecto presente: el demonio ya no estaba en la niña. «Ya había salido» preserva ese matiz sin introducir comentarios interpretativos. «El demonio salió» suena más abrupto y menos claramente resultativo.'
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió el último ajuste del inglés POB, que retiró un equivalente temporal explícito de «when» para reflejar la simple secuencia del griego. En español, la coordinación narrativa con «Y ella fue... y halló...» mantiene esa secuencia sin sobrecargarla.
  spanish_consistency_notes:
  - Se conservó «demonio» para δαιμόνιον, en continuidad con el criterio léxico del POB.
  - Se usó «Y» inicial por el valor narrativo de καὶ, sin forzar una subordinación temporal que el griego no exige.
  - La nota al pie preserva la alternativa más literal del participio perfecto sin hacerla principal en el texto.
  - No se introdujo «Cristo», «SEÑOR» ni otras máscaras terminológicas; este versículo no las requiere.
