revisions:
- from: Y ella fue a su casa y halló al niño acostado en la cama[a], y el demonio ya había salido.
  to: Y fue a su casa y halló a la niña acostada en la cama[a], y el demonio ya había salido.
  rationale: Se corrige «al niño» a «a la niña» para evitar una lectura masculina impropia en español y ajustarla al referente contextual. También se simplifica «Y ella fue» a «Y fue» para una narración más natural. Se mantiene «halló», «acostada en la cama» y «el demonio ya había salido» como soluciones fieles y claras, conservando la nota de alternativa más literal para el participio perfecto.
