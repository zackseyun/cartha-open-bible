translation:
  language: es
  text: 'Y decía[a]: «Lo que sale del hombre, eso hace impuro al hombre»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo hace inmundo». El verbo griego pertenece al lenguaje de pureza usado para describir a alguien como impuro o contaminado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: estaba diciendo
  alternatives_spanish:
  - decía
  lexicon: BDAG
  rationale: El imperfecto griego marca discurso en desarrollo o repetido; «estaba diciendo» conserva ese aspecto mejor que un pasado simple y suena natural en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector narrativo leve. «Y» mantiene la continuidad sin cargar un matiz adversativo que el contexto no exige.
- source_word: Τὸ ἐκ τοῦ ἀνθρώπου ἐκπορευόμενον
  english_pob_choice: What comes out of the man
  chosen_spanish: Lo que sale del hombre
  alternatives_spanish:
  - La cosa que sale del hombre
  - Lo que procede del hombre
  lexicon: BDAG
  rationale: La construcción participial articular es sustantiva; en español, «lo que sale» expresa con naturalidad la idea sin añadir explicación. Se conserva el singular representativo «el hombre» porque el griego lo usa así.
- source_word: ἐκπορευόμενον
  english_pob_choice: comes out
  chosen_spanish: sale
  alternatives_spanish:
  - procede
  - sale hacia afuera
  lexicon: BDAG
  rationale: «Sale» comunica de forma clara y directa el movimiento figurado del verbo sin volver la frase pesada o demasiado técnica.
- source_word: ἀνθρώπου / ἄνθρωπον
  english_pob_choice: the man
  chosen_spanish: del hombre / al hombre
  alternatives_spanish:
  - de la persona / a la persona
  - del ser humano / al ser humano
  lexicon: BDAG
  rationale: Se conserva «el hombre» para reflejar la forma singular del griego y la fuerza representativa del dicho, en lugar de neutralizarlo con un plural o un genérico menos fiel a la estructura.
- source_word: ἐκεῖνο
  english_pob_choice: that
  chosen_spanish: eso
  alternatives_spanish:
  - aquello
  - esa cosa
  lexicon: BDAG
  rationale: El demostrativo enfatiza que precisamente esa realidad es la que contamina. «Eso» mantiene el énfasis en español sin sonar forzado.
- source_word: κοινοῖ
  english_pob_choice: defiles
  chosen_spanish: contamina
  alternatives_spanish:
  - hace inmundo
  - mancha
  lexicon: BDAG
  rationale: En este contexto de pureza, κοινόω remite a impureza ritual/moral. «Contamina» comunica la fuerza de la acción de modo entendible para el lector moderno y preserva el campo semántico de impurificación; «hace inmundo» queda como alternativa lexical más explícita.
theological_decisions:
- issue: Lenguaje de pureza/impureza en κοινόω
  english_pob_reading: defiles
  chosen_spanish_reading: contamina
  alternative_spanish_readings:
  - hace inmundo
  - lo vuelve impuro
  rationale: La escena trata de pureza ritual y sus implicaciones morales. «Contamina» mantiene el efecto de impurificación sin convertir el versículo en una paráfrasis doctrinal, y deja abierta la referencia al trasfondo judío de pureza.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado en el audit trail inglés: «what comes out of the man» (no «from the man») y conserva el énfasis del demostrativo sin sobrecargar la sintaxis española. La decisión léxica principal en español fue optar por «contamina» para κοινόω, manteniendo el campo de pureza/impureza señalado en la nota inglesa.'
  spanish_consistency_notes:
  - Se mantiene el estilo narrativo continuo con «estaba diciendo» para reflejar el imperfecto.
  - Se conserva «el hombre» por coherencia con el enfoque del proyecto frente al singular representativo del griego.
  - La nota al pie usa un equivalente alternativo, no una paráfrasis doctrinal, para preservar la tensión léxica de κοινόω.
