translation:
  language: es
  text: 'Porque de dentro, del corazón de los hombres[a], salen los malos pensamientos: inmoralidades sexuales[b], robos, homicidios,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas» o «seres humanos» para «hombres» (ἀνθρώπων); el griego usa un plural masculino genérico para los seres humanos en general.
    reason: lexical_alternative
  - marker: b
    text: O «inmoralidad sexual»; el griego πορνεῖαι está en plural y se refiere de manera amplia a actos sexuales ilícitos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσωθεν
  english_pob_choice: from within
  chosen_spanish: de dentro
  alternatives_spanish:
  - desde adentro
  - del interior
  lexicon: BDAG
  rationale: ἔσωθεν marca procedencia interior. «De dentro» conserva el contraste espacial/metafórico con la impureza externa del contexto y suena natural en español bíblico actual.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  lexicon: BDAG
  rationale: Introduce la explicación de lo dicho antes. «Porque» funciona con claridad en español y mantiene la relación causal/explanatoria.
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - centro interior
  lexicon: BDAG
  rationale: En español bíblico, «corazón» reproduce el término antropológico para el centro interior moral y volitivo mejor que una paráfrasis interpretativa.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de los seres humanos
  lexicon: BDAG
  rationale: El griego usa un plural genérico masculino. Se conserva con «los hombres» para reflejar la forma representativa del original, tal como hace la auditoría inglesa, sin introducir una neutralización no requerida por el texto.
- source_word: διαλογισμοὶ
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - reflexiones
  lexicon: BDAG
  rationale: El término apunta a pensamientos o razonamientos internos. «Pensamientos» es la equivalencia más clara y natural; «malos» conserva el matiz moral de κακοὶ.
- source_word: κακοὶ
  english_pob_choice: evil
  chosen_spanish: malos
  alternatives_spanish:
  - malvados
  - perversos
  lexicon: BDAG
  rationale: Aunque el inglés opta por «evil», en español «malos pensamientos» comunica la valoración moral de manera idiomática y evita una formulación demasiado abstracta o pesada en una lista viciosa.
- source_word: ἐκπορεύονται
  english_pob_choice: come out
  chosen_spanish: salen
  alternatives_spanish:
  - proceden
  - brotan
  lexicon: BDAG
  rationale: El verbo expresa salida/procedencia desde dentro. «Salen» es breve, natural y conserva la imagen de emergencia desde el interior.
- source_word: πορνεῖαι
  english_pob_choice: sexual immoralities
  chosen_spanish: inmoralidades sexuales
  alternatives_spanish:
  - inmoralidad sexual
  - fornicaciones
  lexicon: BDAG
  rationale: El plural griego enumera actos sexuales ilícitos. «Inmoralidades sexuales» refleja el plural y mantiene la amplitud del término sin restringirlo a una categoría moderna más específica.
- source_word: κλοπαί
  english_pob_choice: thefts
  chosen_spanish: robos
  alternatives_spanish:
  - hurtos
  - actos de robo
  lexicon: BDAG
  rationale: En una lista de vicios, el plural concreto se puede expresar con «robos», que es natural y directo en español y preserva la idea de actos múltiples.
- source_word: φόνοι
  english_pob_choice: murders
  chosen_spanish: homicidios
  alternatives_spanish:
  - asesinatos
  - muertes
  lexicon: BDAG
  rationale: «Homicidios» mantiene la seriedad jurídica y moral del término sin forzar «asesinatos», que puede sonar más interpretativo en algunos contextos. Conserva bien la lista de actos graves.
theological_decisions:
- issue: Genérico masculino ἀνθρώπων
  english_pob_reading: Rendered as 'men' in keeping with gender-accurate representative usage
  chosen_spanish_reading: «de los hombres» como plural representativo genérico
  alternative_spanish_readings:
  - de las personas
  - de los seres humanos
  rationale: La frase griega es masculina plural genérica. Se conserva esa forma representativa en español, en continuidad con la auditoría inglesa y sin borrar la marca gramatical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Pluralidad de πορνεῖαι
  english_pob_reading: Translated as 'sexual immoralities'
  chosen_spanish_reading: «inmoralidades sexuales» en plural
  alternative_spanish_readings:
  - inmoralidad sexual
  - fornicación(es)
  rationale: El plural del griego apunta a actos diversos de conducta sexual ilícita. El plural español preserva esa amplitud y evita reducir el término a una sola categoría doctrinal o cultural.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: La auditoría inglesa reporta alta concordancia y sin cambios en la última revisión; el presente borrador sigue esa lectura, ajustando únicamente la formulación al español natural sin alterar las decisiones léxicas ni las tensiones documentadas del original.
  spanish_consistency_notes:
  - 'Se mantiene el orden y la secuencia de la lista de vicios del griego: pensamientos, inmoralidades sexuales, robos, homicidios.'
  - Se conserva el contraste interno/exterior con «de dentro» y «salen».
  - Se traduce καρδία con «corazón» por su valor antropológico bíblico estándar en español.
  - El plural de πορνεῖαι se refleja con un plural español.
  - El marcador de nota [a] aparece en el texto donde corresponde a «hombres».
