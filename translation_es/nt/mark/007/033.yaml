translation:
  language: es
  text: Y tomándolo aparte de entre la multitud, en privado[a], le puso los dedos en los oídos y, después de escupir[b], le tocó la lengua.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a solas».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego dice: «y después de escupir, tocó su lengua»; no especifica que Jesús pusiera saliva sobre la lengua del hombre.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολαβόμενος
  english_pob_choice: taking him aside
  chosen_spanish: tomándolo aparte
  alternatives_spanish:
  - tomándolo a un lado
  - llevándolo aparte
  - tomándolo aparte en privado
  lexicon: BDAG
  rationale: El participio señala separación del hombre respecto de los demás. «Tomándolo aparte» conserva ese movimiento de apartarlo sin añadir más de lo que el griego afirma. «A un lado» es posible, pero menos preciso en este contexto narrativo.
- source_word: ἀπὸ τοῦ ὄχλου
  english_pob_choice: from the crowd
  chosen_spanish: de la multitud
  alternatives_spanish:
  - de la gente
  - de la muchedumbre
  lexicon: BDAG
  rationale: ὄχλος puede significar multitud o multitud reunida; en español «multitud» mantiene el registro narrativo y evita la banalidad de «gente».
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: en privado
  alternatives_spanish:
  - a solas
  - en secreto
  - privadamente
  lexicon: BDAG
  rationale: La frase expresa que el hecho ocurrió fuera de la vista pública. «En privado» comunica bien ese valor adverbial. Se conserva la posibilidad de entenderlo como «a solas» en la nota.
- source_word: ἔβαλεν
  english_pob_choice: he put
  chosen_spanish: le puso
  alternatives_spanish:
  - le colocó
  - le metió
  lexicon: BDAG
  rationale: En este contexto corporal βάλλω funciona idiomáticamente como «poner». «Le puso» es natural y fiel; «meter» suena más brusco y «colocar» más técnico de lo que el relato requiere.
- source_word: τοὺς δακτύλους αὐτοῦ εἰς τὰ ὦτα αὐτοῦ
  english_pob_choice: his fingers into his ears
  chosen_spanish: los dedos en los oídos
  alternatives_spanish:
  - sus dedos en sus oídos
  - los dedos en sus orejas
  lexicon: BDAG
  rationale: Se mantiene la imagen concreta. En español, el poseedor se sobreentiende por el contexto y por el dativo implícito en «le puso»; por eso «los dedos en los oídos» fluye mejor que repetir pronombres. «Oídos» es preferible a «orejas» por el foco funcional del órgano auditivo.
- source_word: πτύσας
  english_pob_choice: after spitting
  chosen_spanish: después de escupir
  alternatives_spanish:
  - y escupiendo
  - habiendo escupido
  lexicon: BDAG
  rationale: El participio aoristo indica una acción acompañante o previa. «Después de escupir» deja claro el orden sin añadir que el saliva fue aplicada sobre la lengua, cosa que el griego no dice explícitamente.
- source_word: ἥψατο
  english_pob_choice: he touched
  chosen_spanish: le tocó
  alternatives_spanish:
  - tocó
  - tomó contacto con
  lexicon: BDAG
  rationale: ἅπτομαι con genitivo expresa tocar. «Le tocó» es idiomático en español y evita la rigidez de «tocó su lengua», que podría sonar menos natural en lectura pública.
- source_word: τῆς γλώσσης αὐτοῦ
  english_pob_choice: his tongue
  chosen_spanish: la lengua
  alternatives_spanish:
  - su lengua
  - la lengua del hombre
  lexicon: BDAG
  rationale: El contexto identifica la lengua del hombre sanado. «La lengua» funciona con el posesivo ya presente en el verbo pronominal «le tocó»; evita redundancia sin perder claridad.
theological_decisions:
- issue: Si el texto dice que Jesús aplicó saliva a la lengua del hombre
  english_pob_reading: The Greek states, 'and after spitting, he touched his tongue'; it does not explicitly say that Jesus put saliva on the man's tongue.
  chosen_spanish_reading: Y, después de escupir, le tocó la lengua.
  alternative_spanish_readings:
  - Y escupió sobre su lengua.
  - Y, después de escupir, puso saliva sobre su lengua.
  rationale: 'La formulación española sigue la contención del griego y del POB inglés: reporta la secuencia de acciones sin añadir el objeto ni el destino de la saliva. Así se preserva la restricción textual y la tensión narrativa.'
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; Never import doctrinal claims the text does not make.'
- issue: 'Valor de κατ’ ἰδίαν: privacidad o aislamiento'
  english_pob_reading: privately / in private
  chosen_spanish_reading: en privado
  alternative_spanish_readings:
  - a solas
  - aparte
  rationale: El texto describe una acción apartada del público, pero no especifica un motivo ritual o secreto. «En privado» conserva la ambigüedad funcional del griego sin cargarla de interpretación.
  doctrine_reference: Narrative restraint consistent with source wording
translation_notes:
  revision_awareness: This draft follows the latest revision pass marked unchanged and the high-agreement cross-check; no applied revisions were recorded, so the Spanish keeps the source-level restraint of the audited English POB rendering while adapting it idiomatically to publication-readable Spanish.
  spanish_consistency_notes:
  - Se usa «multitud» para ὄχλος y no «muchedumbre», por ser más natural en español contemporáneo y suficientemente formal.
  - Se mantiene «oídos» por el sentido funcional del órgano, evitando cambiar el foco a «orejas».
  - 'Se conserva el orden narrativo del griego: apartar, colocar los dedos, escupir, tocar la lengua.'
  - No se añade explicación sobre mecanismos de sanación o significado simbólico del gesto.
  - La puntuación con comas refleja la cadena de participios sin forzar subordinación excesiva.
