translation:
  language: es
  text: 'Pero ustedes dicen: ‘Si un hombre dice a su padre o a su madre: “Corbán”[a] (es decir, una ofrenda[b]), todo aquello de que pudieras beneficiarte de mí—’'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Corbán es un término para algo dedicado como ofrenda a Dios y, por eso, retenido fuera del uso ordinario de la familia.
    reason: cultural_note
  - marker: b
    text: O ‘es decir, un don’.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς δὲ λέγετε
  english_pob_choice: But you say
  chosen_spanish: Pero ustedes dicen
  alternatives_spanish:
  - Pero ustedes están diciendo
  - Y ustedes dicen
  lexicon: BDAG
  rationale: δὲ introduce contraste, y el presente λέγετε funciona naturalmente en español como presente general en discurso directo. ‘Pero’ conserva la oposición, y ‘ustedes’ refleja el plural enfático del griego sin necesidad de marcarlo con calco excesivo.
- source_word: Ἐὰν εἴπῃ
  english_pob_choice: If ... says
  chosen_spanish: Si ... dice
  alternatives_spanish:
  - Si ... llegara a decir
  - Si ... dijere
  lexicon: BDAG
  rationale: La construcción condicional con ἐάν + subjuntivo aoristo introduce un caso hipotético/prospectivo. En español, ‘Si ... dice’ comunica con claridad la situación hipotética sin sonar forzado.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El griego usa un singular masculino con valor representativo. ‘Un hombre’ conserva la forma y el alcance genérico del original, como hizo la POB inglesa.
- source_word: τῷ πατρὶ ἢ τῇ μητρί
  english_pob_choice: to his father or his mother
  chosen_spanish: a su padre o a su madre
  alternatives_spanish:
  - a su padre o madre
  - a su padre o a su madre
  lexicon: BDAG
  rationale: El dativo indica el destinatario del dicho. En español, ‘a su padre o a su madre’ mantiene la simetría de los dos miembros y el sentido relacional del original.
- source_word: Κορβᾶν
  english_pob_choice: Corban
  chosen_spanish: Corbán
  alternatives_spanish:
  - Corban
  lexicon: BDAG
  rationale: Se conserva el préstamo semítico transliterado, siguiendo el texto griego y la decisión de la POB inglesa. La acentuación adapta el nombre a la ortografía española sin perder su carácter técnico-cultural.
- source_word: ὅ ἐστιν Δῶρον
  english_pob_choice: that is, a gift
  chosen_spanish: es decir, un don
  alternatives_spanish:
  - es decir, un regalo
  - es decir, una ofrenda
  lexicon: BDAG
  rationale: δῶρον puede ser ‘don’, ‘regalo’ u ‘ofrenda’. ‘Don’ es una opción sobria y cercana al valor léxico básico, mientras que el contexto de dedicación cultual queda preservado por la explicación y la nota.
- source_word: ὃ ἐὰν ἐξ ἐμοῦ ὠφεληθῇς
  english_pob_choice: whatever you might have benefited from me
  chosen_spanish: todo aquello de que pudieras beneficiarte de mí
  alternatives_spanish:
  - todo lo que pudieras recibir de mí
  - cualquier provecho que pudieras obtener de mí
  lexicon: BDAG
  rationale: La relativa indefinida con ἐὰν expresa ‘todo aquello que/lo que’. ὠφεληθῇς se traduce con ‘beneficiarte’ para conservar el sentido de ayuda o ventaja recibida, sin especificar más de lo que el griego dice. El giro ‘de mí’ refleja el origen del beneficio y mantiene la pendiente sintáctica que se completa en el versículo siguiente.
theological_decisions:
- issue: Conservación del término Corbán en una denuncia de tradición religiosa que anula la obligación hacia los padres
  english_pob_reading: Retain the transliteration 'Corban' in the main text and explain it as 'that is, a gift.'
  chosen_spanish_reading: Retener ‘Corbán’ en el texto principal y explicarlo como ‘es decir, un don’.
  alternative_spanish_readings:
  - Traducir directamente como ‘ofrenda’ o ‘don dedicado a Dios’ en el texto principal
  - usar ‘ofrenda’ en la explicación
  rationale: El griego preserva el término semítico y luego lo glosa; la traducción española debe conservar esa señal histórica y discursiva. Traducirlo del todo en el cuerpo del texto borraría la particularidad del ejemplo de Jesús y la estrategia explicativa de Marcos.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Tratamiento del valor genérico de ἄνθρωπος
  english_pob_reading: a man
  chosen_spanish_reading: un hombre
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: La forma masculina singular del griego tiene fuerza genérica representativa. Mantener ‘un hombre’ evita neutralizar innecesariamente el género del original y sigue la práctica auditada de la POB inglesa.
  doctrine_reference: BDAG; Translation philosophy on lexical accuracy and gender-accurate rendering
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y concuerda con la decisión auditada de la POB inglesa de conservar Corban/Corbán con glosa explicativa. No se detectaron cambios recientes en la revisión más allá de confirmar la lectura existente.
  spanish_consistency_notes:
  - Se mantiene ‘Corbán’ como transliteración del término semítico, en paralelo con la decisión inglesa y con explicación en nota.
  - ‘Don’ se eligió para δῶρον en la línea principal, con ‘ofrenda’ preservada como alternativa para reflejar la ambigüedad cultual sin imponerla como única lectura.
  - La construcción final queda en suspensión con raya, como en la POB inglesa, para reflejar que el enunciado continúa en el versículo siguiente.
  - Se usa ‘ustedes’ para el plural enfático de ὑμεῖς, con español natural y respetuoso.
  - No se introducen términos eclesiásticos ajenos al pasaje ni se sustituye el vocabulario del texto por una paráfrasis interpretativa.
