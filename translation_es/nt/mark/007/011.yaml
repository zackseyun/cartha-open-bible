  source_alignment_summary: 'El borrador español sigue bien el griego y el rastro auditado inglés: conserva el contraste de ὑμεῖς δὲ λέγετε, mantiene la estructura condicional, retiene el préstamo semítico Κορβᾶν y preserva la suspensión sintáctica final que continúa en el v. 12. Sin embargo, la colocación de las notas altera el referente: la nota cultural está anclada a ‘dicen’ aunque explica ‘Corbán’, y la nota léxica está anclada a ‘Corbán’ aunque en realidad ofrece una alternativa para ‘un don’.'
  spanish_quality_summary: El español es mayormente natural y digno. No obstante, ‘un don’ en este contexto suena menos idiomático y menos claro que ‘una ofrenda’ o ‘un regalo’; dado que el inglés POB eligió ‘a gift’ con nota alternativa ‘an offering’, en español ‘un regalo’ sería demasiado coloquial y ‘un don’ puede sugerir capacidad o carisma. ‘Una ofrenda’ comunica mejor el sentido cultual de δῶρον dentro de la glosa de Marcos y mejora la legibilidad eclesial. También conviene reubicar las notas para que sus anclas correspondan exactamente a lo explicado.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. ‘Corbán’ como transliteración está bien justificado. La revisión propuesta ajusta δῶρον a ‘ofrenda’ por claridad contextual en español, manteniendo la nota con la alternativa ‘regalo’/'don' implícita en el expediente inglés. Esto es una excepción contextual legítima, no un apartamiento indebido.
