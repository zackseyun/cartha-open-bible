translation:
  language: es
  text: 'Porque Moisés dijo: «Honra a tu padre y a tu madre», y: «Quien habla mal[a] de padre o madre debe morir ciertamente[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien maldice a padre o madre». El verbo puede significar hablar mal de, insultar, injuriar o maldecir.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «debe ser puesto a muerte». El griego usa una fórmula legal literalmente: «debe morir de muerte».'
    reason: alternative_reading
lexical_decisions:
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - Moisés (transliteración mantenida)
  lexicon: nombre propio
  rationale: Nombre propio transliterado de forma estándar al español, siguiendo el valor referencial del texto griego y el uso bíblico común.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: conector causal/explanatorio
  rationale: El griego introduce la cita como fundamento explicativo; en español «Porque» conserva bien esa relación causal y argumentativa.
- source_word: εἶπεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - declaró
  - habló
  lexicon: λέγω
  rationale: Verbo de cita simple y natural para introducir la formulación mosaica.
- source_word: Τίμα
  english_pob_choice: Honor
  chosen_spanish: Honra
  alternatives_spanish:
  - Honra con respeto
  - Ten en honor
  lexicon: τιμάω
  rationale: Imperativo del mandamiento; «Honra» conserva la forma tradicional y la fuerza ética del precepto sin perder naturalidad en español.
- source_word: τὸν πατέρα σου καὶ τὴν μητέρα σου
  english_pob_choice: your father and your mother
  chosen_spanish: a tu padre y a tu madre
  alternatives_spanish:
  - a tu padre y madre
  - a tu padre y a tu madre
  lexicon: parentesco/directo objeto
  rationale: El español requiere la preposición «a» con objetos personales definidos; se mantiene la doble mención explícita del griego.
- source_word: Ὁ κακολογῶν
  english_pob_choice: Whoever speaks evil of
  chosen_spanish: El que habla mal de
  alternatives_spanish:
  - El que maldice
  - El que injuria
  - Quien habla mal de
  lexicon: κακολογέω
  rationale: El verbo puede abarcar hablar mal, injuriar o maldecir. «El que habla mal de» reproduce el sentido amplio sin restringirlo solo a una maldición formal.
- source_word: πατέρα ἢ μητέρα
  english_pob_choice: father or mother
  chosen_spanish: padre o madre
  alternatives_spanish:
  - su padre o su madre
  - padre o madre
  lexicon: paralelismo de parentesco
  rationale: El griego no expresa posesivo en esta cláusula; el español puede omitirlo para mantener concisión y el paralelismo legal.
- source_word: θανάτῳ τελευτάτω
  english_pob_choice: must surely die
  chosen_spanish: debe morir sin falta
  alternatives_spanish:
  - debe morir ciertamente
  - debe morir de muerte
  - debe ser condenado a muerte
  lexicon: fórmula legal hebraizante
  rationale: La fórmula griega es un modismo legal que expresa pena segura. «Debe morir sin falta» comunica la obligatoriedad y el énfasis de certeza sin añadir el mecanismo de ejecución.
theological_decisions:
- issue: Fórmula penal θανάτῳ τελευτάτω
  english_pob_reading: must surely die
  chosen_spanish_reading: debe morir sin falta
  alternative_spanish_readings:
  - debe ser puesto a muerte
  - debe morir ciertamente
  - debe morir la muerte
  rationale: Se preserva el carácter jurídico solemne de la cita de la Torá sin especificar más de lo que exige el griego. La opción evita sobreinterpretar la forma verbal como si describiera el procedimiento y mantiene la gravedad del mandato.
  doctrine_reference: Éxodo 21:17; Levítico 20:9
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con el audit trail inglés en sentido y decisión retórica general. Se mantiene la equivalencia óptima: cita introductoria causal, mandamiento en forma tradicional breve, y la fórmula jurídica con un español natural que conserva la severidad del hebraísmo legal.'
  spanish_consistency_notes:
  - Se mantiene «Moisés» como nombre propio estándar y «Honra» para el imperativo del mandamiento.
  - Se conserva el artículo distributivo «El que» para reflejar el participio sustantivado griego.
  - La preposición «a» delante de «tu padre y a tu madre» responde a la gramática del español con objetos personales.
  - Se usa «padre o madre» sin posesivo explícito en la cláusula legal para no sobrecargar el paralelismo.
  - La nota sobre la pena legal preserva la tensión entre traducción idiomática y fórmula literal, sin neutralizar el sentido forense del griego.
