  language: en
  yaml_path: translation/nt/mark/007/004.yaml
  text: 'And when they come from the marketplace[a], they do not eat unless they wash themselves[b], and there are many other things that they have received to keep: washings of cups and pitchers and copper vessels and dining couches—'
