translation:
  language: es
  text: 'Y cuando vienen del mercado, no comen a menos que se laven[a]; y hay muchas otras cosas que han recibido para guardar: lavamientos de copas y de jarros y de recipientes de cobre y de divanes de mesa[b]—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se sumerjan»; el griego usa una forma del verbo a menudo traducido «bautizar», pero aquí alude a un lavado ritual en el contexto de pureza.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten «y divanes de mesa».
    reason: textual_variant
lexical_decisions:
- source_word: ἀγορᾶς
  english_pob_choice: marketplace
  chosen_spanish: mercado
  alternatives_spanish:
  - mercado público
  - plaza de mercado
  lexicon: BDAG
  rationale: ἀγορά designa el lugar de compraventa o plaza de comercio. En español, «mercado» es natural y comunica bien el espacio de donde regresan.
- source_word: βαπτίσωνται
  english_pob_choice: wash themselves
  chosen_spanish: se laven
  alternatives_spanish:
  - se bañen ritualmente
  - se sumerjan
  lexicon: BDAG
  rationale: En este contexto de pureza ritual, el sentido es lavarse antes de comer, no aludir al bautismo cristiano. «Se laven» conserva la acción concreta y permite la fuerza media/reflexiva del verbo.
- source_word: παρέλαβον κρατεῖν
  english_pob_choice: they have received to keep
  chosen_spanish: han recibido para guardar
  alternatives_spanish:
  - han recibido para observar
  - han recibido y retienen
  lexicon: BDAG
  rationale: La construcción expresa prácticas tradicionales recibidas y mantenidas. «Para guardar» refleja la idea de observar o mantener sin desplazar el foco a la transmisión.
- source_word: βαπτισμοὺς
  english_pob_choice: washings
  chosen_spanish: lavamientos
  alternatives_spanish:
  - lavados
  - purificaciones rituales
  lexicon: BDAG
  rationale: «Lavamientos» conserva el carácter plural y ritual de βαπτισμοί. «Lavados» es posible, pero menos técnico; «purificaciones rituales» explicita demasiado.
- source_word: ξεστῶν
  english_pob_choice: pitchers
  chosen_spanish: jarros
  alternatives_spanish:
  - jarras
  - pitchers
  lexicon: BDAG
  rationale: ξέστης es un recipiente, probablemente una jarra o jarro. «Jarros» es claro y idiomático en español.
- source_word: χαλκίων
  english_pob_choice: copper vessels
  chosen_spanish: recipientes de cobre
  alternatives_spanish:
  - vasos de cobre
  - utensilios de cobre
  lexicon: BDAG
  rationale: χαλκίον se refiere a un recipiente hecho de cobre o aleación semejante. «Recipientes de cobre» comunica la materialidad sin precisar de más.
- source_word: κλινῶν
  english_pob_choice: dining couches
  chosen_spanish: lechos
  alternatives_spanish:
  - camas
  - divanes de comedor
  lexicon: BDAG
  rationale: κλίνη puede significar cama o diván/lecho. Aunque el contexto sugiere lechos de comida, «lechos» preserva la amplitud semántica sin forzar una explicación cultural en el cuerpo del texto.
- source_word: ἄλλα πολλά
  english_pob_choice: many other things
  chosen_spanish: muchas otras cosas
  alternatives_spanish:
  - muchas otras prácticas
  - muchas otras tradiciones
  lexicon: BDAG
  rationale: El griego es amplio e indefinido. «Cosas» reproduce esa amplitud sin interpretar demasiado.
theological_decisions:
- issue: βαπτίζω en un contexto de pureza judía
  english_pob_reading: Render with 'wash' / 'washings' rather than 'baptize' / 'baptisms.'
  chosen_spanish_reading: Traducir con «lavarse» / «lavamientos» y no con «bautizarse» / «bautismos».
  alternative_spanish_readings:
  - bautizarse / bautismos
  - sumergirse / inmersiones
  rationale: El pasaje trata de prácticas de pureza antes de comer, no del bautismo cristiano. «Lavarse» evita una carga sacramental ajena al contexto y sigue el valor ritual del texto.
  doctrine_reference: Primacía del texto original y claridad del sentido ritual; evitar anacronismos doctrinales en traducción.
translation_notes:
  revision_awareness: La versión inglesa auditada fue ajustada para explicitar «themselves» en βαπτίσωνται, manteniendo el resto del sentido estable. En español se reflejó ese matiz con el reflexivo «se laven». También se preservó la enumeración de objetos rituales y la amplitud de ἄλλα πολλά sin añadir interpretaciones ajenas al griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o términos litúrgicos no presentes porque no hay aquí nombres divinos ni fórmula sacramental.
  - Se mantuvo un registro bíblico sobrio y moderno, con concordancia plural en «lavamientos» para βαπτισμούς.
  - La frase final conserva el guion largo para reflejar la apertura del inciso en el texto fuente.
