translation:
  language: es
  text: 'Pero él les dijo: «Isaías profetizó bien acerca de ustedes, hipócritas, como está escrito: “Este pueblo[a] me honra con sus labios, pero su corazón está lejos de mí”»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Este pueblo me honra con los labios, pero el corazón de este pueblo está lejos de mí». El griego usa sustantivos singulares colectivos («pueblo», «corazón»); en español puede expresarse con posesivos («sus», «su») o repitiendo el sustantivo para mayor explicitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Mas
  lexicon: BDAG
  rationale: Marca transición con contraste suave en la respuesta de Jesús; «Pero» conserva el giro argumentativo natural en español sin exagerarlo.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les contó
  lexicon: BDAG
  rationale: En español, el dativo indirecto se expresa de forma natural con «les dijo»; mantiene la relación directa del verbo de decir sin introducir matices ajenos.
- source_word: Καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - con razón
  lexicon: BDAG
  rationale: «Bien» reproduce el valor evaluativo adverbial de manera directa y natural, sin decidir de antemano si el énfasis es moral o de exactitud.
- source_word: ἐπροφήτευσεν
  english_pob_choice: prophesied
  chosen_spanish: profetizó
  alternatives_spanish:
  - habló proféticamente
  lexicon: BDAG
  rationale: Verbo estándar para el acto profético; conserva la fuerza de la cita y la referencia a Isaías.
- source_word: περὶ ὑμῶν
  english_pob_choice: about you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - sobre ustedes
  - en cuanto a ustedes
  lexicon: BDAG
  rationale: «Acerca de» traduce la referencia de περί con naturalidad en español y mantiene el alcance del reproche dirigido al auditorio.
- source_word: τῶν ὑποκριτῶν
  english_pob_choice: you hypocrites
  chosen_spanish: hipócritas
  alternatives_spanish:
  - simuladores
  - pretendientes
  lexicon: BDAG
  rationale: Se conserva el término moral-religioso establecido en español. El vocativo se entiende por el contexto; no es necesario añadir un pronombre explícito que endurecería la frase.
- source_word: ὡς γέγραπται ὅτι
  english_pob_choice: 'as it is written:'
  chosen_spanish: 'como está escrito:'
  alternatives_spanish:
  - 'tal como está escrito:'
  - 'según está escrito:'
  lexicon: BDAG
  rationale: Fórmula de citación bíblica estándar en español, con dos puntos para introducir la cita textual.
- source_word: Οὗτος ὁ λαὸς
  english_pob_choice: This people
  chosen_spanish: Este pueblo
  alternatives_spanish:
  - Esta gente
  - Este pueblo de ellos
  lexicon: BDAG
  rationale: Se mantiene el singular colectivo del griego y el tono profético de la cita de Isaías. «Pueblo» conserva mejor la solemnidad que una formulación más coloquial.
- source_word: τοῖς χείλεσίν με τιμᾷ
  english_pob_choice: honors me with their lips
  chosen_spanish: me honra con los labios
  alternatives_spanish:
  - me honra con sus labios
  - me rinde honra con los labios
  lexicon: BDAG
  rationale: Se preserva el singular colectivo del griego con «los labios», evitando forzar un posesivo plural donde el español puede expresar la misma idea de modo más natural y fiel.
- source_word: ἡ δὲ καρδία αὐτῶν
  english_pob_choice: but their heart
  chosen_spanish: pero su corazón
  alternatives_spanish:
  - pero su corazón colectivo
  - pero el corazón de ellos
  lexicon: BDAG
  rationale: El griego usa καρδία en singular para el centro interior del pueblo; en español, «su corazón» conserva ese valor colectivo y la referencia grupal sin sonar artificial.
- source_word: πόρρω ἀπέχει ἀπ’ ἐμοῦ
  english_pob_choice: is far from me
  chosen_spanish: está lejos de mí
  alternatives_spanish:
  - se mantiene lejos de mí
  - está muy lejos de mí
  lexicon: BDAG
  rationale: «Está lejos de mí» refleja la distancia relacional/espiritual del giro griego, más que una mera separación espacial.
theological_decisions:
- issue: Aplicación de Isaías 29:13 a los interlocutores presentes de Jesús
  english_pob_reading: Retained the direct prophetic indictment 'This people' and 'you hypocrites' without softening, preserving Jesus' application of Isaiah to the present audience.
  chosen_spanish_reading: 'Se mantiene la acusación profética directa: «Este pueblo...», dirigida a los oyentes como «hipócritas», sin atenuarla.'
  alternative_spanish_readings:
  - generalizar la denuncia para evitar la confrontación directa
  - suavizar «hipócritas» por una expresión menos fuerte
  rationale: El texto presenta a Jesús aplicando explícitamente la profecía a sus opositores. La traducción debe conservar esa tensión retórica y teológica sin resolverla mediante paráfrasis conciliadoras.
  doctrine_reference: Preservar la aplicación profética directa y la tensión del pasaje; prioridad del texto original sobre la tradición suavizada.
translation_notes:
  revision_awareness: El cotejo con la revisión más reciente indica que no se requirieron cambios sustantivos; la presente redacción conserva el sentido auditado en el inglés POB y ajusta la formulación a un español bíblico natural.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como terminología por defecto del proyecto, pero este versículo no contiene el nombre divino en el texto base; por eso no aparece aquí.
  - Se conserva el singular colectivo de la cita bíblica con «este pueblo» y «su corazón», evitando una pluralización innecesaria.
  - «Hipócritas» se deja sin equivalentes más suaves para respetar la fuerza del juicio profético.
