  glossary_alignment: No hay conflictos con la terminología del proyecto en este versículo. «Isaías», «hipócritas», «pueblo», «corazón» y «honra» están bien. No aparecen términos sensibles como Yahvé, Mesías/Cristo, Espíritu, esclavo, etc.
