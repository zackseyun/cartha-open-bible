translation:
  language: es
  text: 'Y les dijo: «¿Así que también ustedes son faltos de entendimiento? ¿No entienden que todo lo que entra en el hombre desde afuera no puede contaminarlo[a],»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hacerlo impuro». El verbo griego tiene aquí resonancias de impureza ritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: le dijo
  alternatives_spanish:
  - les dijo
  - dijo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente al pasado en español narrativo. Mantengo el complemento indirecto explícito para reflejar αὐτοῖς y la fluidez del discurso.
- source_word: Οὕτως καὶ ὑμεῖς
  english_pob_choice: So are you also
  chosen_spanish: ¿Así que también ustedes
  alternatives_spanish:
  - ¿Así también ustedes
  - ¿También ustedes así
  lexicon: BDAG
  rationale: Busca reproducir la fuerza retórica y de reproche de la pregunta en un español natural. 'Así que' recoge el valor discursivo de οὕτως con καί, y 'también ustedes' preserva el énfasis sobre los discípulos.
- source_word: ἀσύνετοί
  english_pob_choice: without understanding
  chosen_spanish: faltos de entendimiento
  alternatives_spanish:
  - sin entendimiento
  - insensatos
  - incapaces de entender
  lexicon: BDAG
  rationale: '''Faltos de entendimiento'' comunica la carencia cognitiva sin cargar el término con connotaciones más duras de ''insensatos''. Conserva la cercanía semántica con νοεῖτε en la frase siguiente.'
- source_word: νοεῖτε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - perciben
  - comprenden
  lexicon: BDAG
  rationale: '''Entienden'' es la forma más natural y mantiene la repetición verbal con ἀσύνετοι. En pregunta directa, el español exige la segunda persona plural de cortesía no aplica aquí; se usa ''ustedes'' por claridad universal.'
- source_word: πᾶν τὸ ἔξωθεν εἰσπορευόμενον
  english_pob_choice: everything that enters ... from outside
  chosen_spanish: todo lo que entra ... desde afuera
  alternatives_spanish:
  - todo lo que entra desde fuera
  - cualquier cosa que entra desde afuera
  lexicon: BDAG
  rationale: El participio sustantivado se naturaliza como relativa en español. 'Desde afuera' expresa ἔξωθεν con un matiz espacial claro y idiomático. 'Todo lo que' mantiene el valor genérico de πᾶν.
- source_word: εἰς τὸν ἄνθρωπον
  english_pob_choice: into the man
  chosen_spanish: en el hombre
  alternatives_spanish:
  - dentro del hombre
  - al hombre
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento hacia el interior, en español 'en el hombre' suena más natural y sigue comunicando la idea de entrada al interior humano. Se conserva 'el hombre' para reflejar el singular genérico de ἄνθρωπον, siguiendo la pauta de fidelidad lexical del proyecto.
- source_word: κοινῶσαι
  english_pob_choice: defile
  chosen_spanish: contaminarlo
  alternatives_spanish:
  - hacerlo impuro
  - mancharlo ritualmente
  - contaminarlo ritualmente
  lexicon: BDAG
  rationale: En este contexto de pureza ritual, κοινόω puede expresarse como 'contaminar'. En español, 'contaminarlo' es comprensible y comunica el efecto de volver impuro, aunque no agota el matiz cultual; por eso se añade nota para explicitar la alternativa ritual.
theological_decisions:
- issue: Sentido ritual de κοινόω en un contexto de pureza
  english_pob_reading: defile
  chosen_spanish_reading: contaminar
  alternative_spanish_readings:
  - hacer impuro
  - volver impuro
  rationale: El pasaje trata de la discusión sobre pureza ritual, no de simple suciedad moral. 'Contaminar' funciona como equivalente leído en clave de impureza ritual en español, pero la nota preserva la alternativa 'hacer impuro' para no perder la tensión léxica del verbo griego.
  doctrine_reference: Translation philosophy §§3, 6
- issue: Referencia genérica de ἄνθρωπον
  english_pob_reading: the man
  chosen_spanish_reading: el hombre
  alternative_spanish_readings:
  - la persona
  - el ser humano
  rationale: Se mantiene el singular genérico masculino del original, que en este contexto representa al ser humano en general. En español, 'el hombre' conserva mejor la forma del texto y la continuidad con la tradición exegética sin negar el alcance universal.
  doctrine_reference: 'Project terminology default: ἄνθρωπος -> hombre (generic singular)'
translation_notes:
  revision_awareness: La redacción española toma en cuenta la revisión más reciente del audit trail, especialmente la preferencia por expresar εἰς con una formulación que sugiera entrada real al interior. Aun así, se priorizó un español más natural y publicable ('en el hombre') frente a un calco más duro ('dentro del hombre'), manteniendo el sentido de movimiento/ingreso mediante el verbo 'entra' y la nota lexical sobre la impureza ritual.
  spanish_consistency_notes:
  - Se mantiene 'hombre' para ἄνθρωπος como singular genérico, coherente con la pauta del proyecto.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes; no aparece ninguna referencia al nombre divino en este versículo.
  - '''Contaminar'' se usa por el contexto de pureza, pero la nota conserva la alternativa ''hacer impuro'' para auditar la decisión léxica.'
  - La puntuación y la mayúscula de apertura siguen el estilo bíblico en español con comillas angulares y pregunta retórica directa.
