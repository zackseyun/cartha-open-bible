translation:
  language: es
  text: 'Y, alzando la vista al cielo, suspiró[a] y le dijo: «Efatá»[b], es decir: «Ábrete».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «gimió»; el verbo puede expresar un suspiro o un gemido profundo.
    reason: lexical_alternative
  - marker: b
    text: 'Arameo: «Efatá» significa «Ábrete».'
    reason: cultural_note
lexical_decisions:
- source_word: ἀναβλέψας
  english_pob_choice: looking up
  chosen_spanish: alzando la vista
  alternatives_spanish:
  - levantando los ojos
  - mirando hacia arriba
  lexicon: BDAG
  rationale: El participio aoristo indica una acción concomitante y preparatoria; en español, «alzando la vista» conserva el movimiento hacia arriba con naturalidad idiomática, sin perder el gesto físico del verbo griego.
- source_word: εἰς τὸν οὐρανόν
  english_pob_choice: to heaven
  chosen_spanish: al cielo
  alternatives_spanish:
  - hacia el cielo
  - al cielo
  lexicon: BDAG
  rationale: En este contexto οὐρανός puede referirse al cielo como ámbito elevado, con tono de oración o invocación. «Al cielo» mantiene la dirección del gesto en español y evita sobreespecificar «cielo» como metáfora doctrinal donde el griego no exige esa precisión explícita.
- source_word: ἐστέναξεν
  english_pob_choice: he sighed
  chosen_spanish: suspiró
  alternatives_spanish:
  - gimió
  - suspiró profundamente
  lexicon: BDAG
  rationale: στενάζω puede abarcar un suspiro o un gemido. «Suspiró» comunica bien la carga emocional sin forzar una intensidad mayor que la que el texto necesariamente exige; la alternativa más fuerte sigue siendo posible, pero no obligatoria.
- source_word: λέγει αὐτῷ
  english_pob_choice: said to him
  chosen_spanish: le dijo
  alternatives_spanish:
  - dice a él
  - le dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo fluye mejor en pasado. «Le dijo» conserva el destinatario personal del dativo αὐτῷ y mantiene la naturalidad estilística.
- source_word: Εφφαθα
  english_pob_choice: Ephphatha
  chosen_spanish: Efatá
  alternatives_spanish:
  - Ephphatha
  - Efatá
  lexicon: BDAG
  rationale: Se preserva la voz aramea como transliteración, pero adaptada a una forma española publicable y reconocible. «Efatá» respeta la textura del vocablo preservado por Marcos y evita introducir una grafía demasiado ajena al lector español.
- source_word: Διανοίχθητι
  english_pob_choice: Be opened
  chosen_spanish: Ábrete
  alternatives_spanish:
  - Sé abierto
  - Ábrase
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo exige una glosa que preserve la idea de apertura sin explicar de más. «Ábrete» funciona bien en español como mandato breve y directo, manteniendo la fuerza performativa del dicho de Jesús; «sé abierto» sería más literal, pero menos idiomático.
theological_decisions:
- issue: Alcance del mandato «Ábrete»
  english_pob_reading: Be opened
  chosen_spanish_reading: Ábrete
  alternative_spanish_readings:
  - Sé abierto
  - Ábrase
  rationale: El griego presenta una orden dirigida a la realidad impedida por la sordera/mudez, sin necesidad de identificar explícitamente el órgano en la glosa. «Ábrete» preserva el carácter directo y milagroso del mandato, y sigue siendo compatible con la comprensión tradicional de que el efecto alcanza las facultades del hombre.
  doctrine_reference: Milagros de Jesús; curación mediante palabra autoritativa (Marcos 7:34-35).
- issue: Referente implícito de la dirección del gesto
  english_pob_reading: looking up to heaven
  chosen_spanish_reading: alzando la vista al cielo
  alternative_spanish_readings:
  - levantando la vista al cielo
  - mirando al cielo
  rationale: La escena conserva el gesto de elevación de la mirada sin convertirlo en una explicación teológica añadida. «Al cielo» mantiene la ambigüedad reverente del griego entre el espacio visible y la referencia religiosa implícita, sin imponer una paráfrasis doctrinal.
  doctrine_reference: Piedad y oración en la narrativa evangélica; respeto al registro narrativo de Marcos.
translation_notes:
  revision_awareness: 'Esta versión sigue de cerca el texto griego y el audit trail inglés, con adaptación al español natural: mantiene el gesto de mirar hacia arriba, conserva la voz aramea transliterada, y deja visible la tensión léxica de στενάζω mediante una nota alternativa. No se registran revisiones aplicadas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usa «Efatá» como transliteración española de la exclamación aramea, con glosa inmediata en nota.
  - Se prefirió «Ábrete» por su concisión e imperatividad, evitando una glosa más pesada como «sé abierto».
  - «Al cielo» conserva la direccionalidad de εἰς τὸν οὐρανόν sin obligar a una formulación más interpretativa.
  - Se mantuvo un registro reverente pero moderno, apto para lectura eclesial amplia.
