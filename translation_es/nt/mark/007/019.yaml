translation:
  language: es
  text: porque no entra en su corazón, sino en su estómago, y sale a la letrina; quedando así purificados[a] todos los alimentos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «así, limpiando todos los alimentos»; la cláusula final puede entenderse como comentario narrativo de Marcos o como referencia al proceso digestivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - mente
  - interior
  - ser
  lexicon: BDAG
  rationale: Se mantiene la imagen antropológica interna frente al órgano digestivo. En español, «corazón» es el equivalente natural y tradicional para el centro interior de la persona, sin diluir el contraste del texto.
- source_word: κοιλίαν
  english_pob_choice: stomach
  chosen_spanish: estómago
  alternatives_spanish:
  - vientre
  - barriga
  lexicon: BDAG
  rationale: «Estómago» expresa con claridad y naturalidad el sentido fisiológico en español moderno. «Vientre» o «barriga» suenan menos precisos en este contraste con «corazón».
- source_word: ἀφεδρῶνα
  english_pob_choice: latrine
  chosen_spanish: letrina
  alternatives_spanish:
  - retrete
  - baño
  - sanitario
  lexicon: BDAG
  rationale: «Letrina» comunica el lugar de evacuación de manera concreta y digna, sin introducir una especificidad doméstica moderna que el griego no exige.
- source_word: καθαρίζων
  english_pob_choice: thus cleansing
  chosen_spanish: así, purificando
  alternatives_spanish:
  - así, limpiando
  - así, depurando
  - así, declarando limpios
  lexicon: BDAG
  rationale: 'Se conserva la ambigüedad del participio: puede leerse como comentario narrativo o como referencia al proceso fisiológico. «Purificando» mantiene la fuerza resultativa sin resolver indebidamente la disputa interpretativa.'
- source_word: βρώματα
  english_pob_choice: foods
  chosen_spanish: los alimentos
  alternatives_spanish:
  - los alimentos
  - las comidas
  - la comida
  lexicon: BDAG
  rationale: El plural griego se refleja mejor con «los alimentos», que preserva la referencia a categorías de cosas comestibles y suena más natural que un singular colectivo.
- source_word: εἰσπορεύεται / ἐκπορεύεται
  english_pob_choice: enter / goes out
  chosen_spanish: entra / sale
  alternatives_spanish:
  - ingresa / sale
  - entra / sale hacia afuera
  lexicon: BDAG
  rationale: Se conservan los verbos simples y el movimiento contrastivo del griego en español claro y directo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su propia
  - de él
  lexicon: BDAG
  rationale: El posesivo español reproduce de manera natural el pronombre genitivo singular referido al ser humano en discusión, sin necesidad de explicitar un antecedente.
theological_decisions:
- issue: 'Sentido de la cláusula participial final: καθαρίζων πάντα τὰ βρώματα'
  english_pob_reading: 'The English POB preserves the ambiguity: it can be read as a narratorial explanatory aside or as a physiological statement about cleansing/purging foods.'
  chosen_spanish_reading: «así, purificando todos los alimentos» mantiene abierta la ambigüedad entre comentario narrativo y proceso fisiológico.
  alternative_spanish_readings:
  - «así, declarando limpios todos los alimentos»
  - «así, limpiando todos los alimentos»
  - «así, depurando todos los alimentos»
  rationale: El griego es sintácticamente discutido y la tradición textual/puntuacional permite más de una lectura. La versión española evita resolver la tensión doctrinal sobre las leyes alimentarias y conserva el alcance del debate, como exige el expediente POB.
  doctrine_reference: Marcos 7:19; tensión sobre la pureza ritual y las leyes alimentarias
- issue: Relación entre el acto de salir del cuerpo y la pureza ritual
  english_pob_reading: The digestive process is mentioned without collapsing the text into a simple hygienic statement; the phrase may summarize Jesus' teaching's implication for food laws.
  chosen_spanish_reading: La traducción conserva el contraste entre corazón, estómago y letrina sin moralizarlo ni convertirlo en una mera observación higiénica.
  alternative_spanish_readings:
  - interpretarlo solo como proceso digestivo
  - entenderlo como declaración doctrinal explícita
  rationale: El versículo funciona dentro de la discusión de pureza. En español se mantiene la tensión entre descripción fisiológica e implicación legal/religiosa, sin suavizarla.
  doctrine_reference: Marcos 7:15-23; pureza ritual y alimentos
translation_notes:
  revision_awareness: 'El inglés POB fue revisado desde una lectura más interpretativa («thus declaring all foods clean») a otra más transparente («thus cleansing all foods»). La versión española sigue esa revisión: evita «declarando limpios» y preserva la ambigüedad del participio con «purificando».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, pero aquí no aparece el Tetragrámaton.
  - Se prefiere vocabulario fisiológico claro y registro sobrio; no se usa lenguaje eclesiástico tradicional que no esté exigido por el griego.
  - La puntuación intenta reflejar el inciso final debatido con un giro fluido en español y una nota que preserve la variante interpretativa.
