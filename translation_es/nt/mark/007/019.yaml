    rationale: La alternativa documentada en el expediente POB se refiere a καθαρίζων πάντα τὰ βρώματα, no a κοιλίαν. La ancla actual puede confundir al lector sobre qué elemento es debatido.
  - severity: medium
    issue: «así, purificando todos los alimentos» suena poco natural en español.
    rationale: Aunque es formalmente cercano al griego, el giro con gerundio tras punto y coma resulta algo tosco. «quedando así purificados todos los alimentos» preserva la ambigüedad resultativa y mejora la fluidez.
