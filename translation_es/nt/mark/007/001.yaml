translation:
  language: es
  text: Y los fariseos y algunos de los escribas, que habían venido de Jerusalén, se reúnen a su alrededor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se reúnen hacia él». La expresión griega es más literalmente «se reúnen hacia él», pero «a su alrededor» es más natural en español en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: Conserva la simple conexión narrativa del griego sin añadir matiz explicativo. En español, 'Y' mantiene el avance secuencial de Marcos de manera natural.
- source_word: συνάγονται
  english_pob_choice: gather around
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se juntan
  - se congregan
  - se reúnen alrededor
  lexicon: BDAG
  rationale: El verbo griego expresa que se reúnen en relación con Jesús. 'Se reúnen' es natural en español y preserva la idea de reunión; el complemento siguiente 'junto a él' recupera la relación espacial sin forzar una perífrasis pesada.
- source_word: πρὸς αὐτὸν
  english_pob_choice: around him
  chosen_spanish: junto a él
  alternatives_spanish:
  - a él
  - hacia él
  - alrededor de él
  lexicon: BDAG
  rationale: La combinación con συνάγονται apunta a una reunión en torno a Jesús. 'Junto a él' comunica cercanía y relación contextual en español sin sonar tan artificial como 'alrededor de él', pero evita borrar la orientación hacia su persona.
- source_word: Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Se conserva el nombre del grupo religioso tal como está lexicalizado en español bíblico, sin sustituirlo por una descripción interpretativa.
- source_word: τινες τῶν γραμματέων
  english_pob_choice: some of the scribes
  chosen_spanish: algunos de los escribas
  alternatives_spanish:
  - algunos escribas
  - ciertos escribas
  lexicon: BDAG
  rationale: La forma partitiva queda bien reflejada con 'algunos de los escribas', que explicita que se trata de un subconjunto y sigue de cerca la relación genitiva del griego.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: '''Escribas'' es la equivalencia directa y establecida para γραμματεῖς en los Evangelios. Las alternativas explican su función, pero se alejan del término léxico.'
- source_word: ἐλθόντες
  english_pob_choice: who had come
  chosen_spanish: que habían venido
  alternatives_spanish:
  - habiendo venido
  - tras haber venido
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y marca acción previa. 'Que habían venido' preserva la relación temporal y suena natural en español, siguiendo la revisión inglesa que prefirió la relativa.
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  lexicon: BDAG
  rationale: '''De Jerusalén'' es la forma directa y suficiente para la procedencia indicada por ἀπό. ''Desde Jerusalén'' enfatiza origen espacial, pero aquí no es necesario.'
translation_notes:
  revision_awareness: La redacción española sigue de cerca el texto griego y toma en cuenta la revisión inglesa más reciente, que prefirió una cláusula relativa ('who had come') frente al participio más literal. En español se reflejó esa misma relación temporal con 'que habían venido', manteniendo la secuencia anterior a 'se reúnen'.
  spanish_consistency_notes:
  - Se conserva 'escribas' como término técnico estable en los Evangelios.
  - No se usó 'SEÑOR' ni 'Cristo' porque el versículo no contiene vocabulario divino ni cristológico específico.
  - La puntuación separa adecuadamente la cláusula relativa descriptiva ('que habían venido de Jerusalén') del verbo principal.
