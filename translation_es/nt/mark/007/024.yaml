translation:
  language: es
  text: Desde allí se levantó y se fue a la región de Tiro[a]. Al entrar en una casa, no quería que nadie lo supiera[b], pero no pudo permanecer oculto[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al territorio de Tiro»; el griego puede referirse al distrito o zona fronteriza asociada con Tiro, no solo a una línea de límite.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «no quería que nadie conociera»; en griego el objeto es implícito y se refiere a su presencia o paradero.
    reason: lexical_alternative
  - marker: c
    text: O «pero no pudo pasar inadvertido».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐκεῖθεν δὲ
  english_pob_choice: From there
  chosen_spanish: Desde allí
  alternatives_spanish:
  - Y desde allí
  - Ahora desde allí
  lexicon: BDAG
  rationale: Ἐκεῖθεν indica movimiento desde el lugar anterior; δέ funciona como enlace suave. «Desde allí» conserva el valor direccional sin añadir un matiz más fuerte de contraste que el griego no exige.
- source_word: ἀναστὰς
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - habiéndose levantado
  - levantándose
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción siguiente en la narración. «Se levantó» mantiene el movimiento concreto y suena natural en español.
- source_word: ἀπῆλθεν
  english_pob_choice: went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se marchó
  lexicon: BDAG
  rationale: ἀπέρχομαι expresa salida o partida desde un lugar. «Se fue» comunica bien ese desplazamiento en español contemporáneo sin perder la dirección del movimiento.
- source_word: εἰς τὰ ὅρια Τύρου
  english_pob_choice: to the region of Tyre
  chosen_spanish: a la región de Tiro
  alternatives_spanish:
  - al territorio de Tiro
  - a los límites de Tiro
  lexicon: BDAG
  rationale: ὅρια puede significar bordes, territorio o región. En este contexto narrativo apunta al área asociada con Tiro, no solo a una línea fronteriza; por eso «región» expresa mejor el alcance espacial.
- source_word: καὶ εἰσελθὼν εἰς οἰκίαν
  english_pob_choice: After entering a house
  chosen_spanish: Y, al entrar en una casa
  alternatives_spanish:
  - Y entrando en una casa
  - Cuando entró en una casa
  lexicon: BDAG
  rationale: El participio tiene valor temporal/secuencial. «Al entrar» preserva esa relación y «una casa» refleja el carácter indefinido de οἰκίαν.
- source_word: οὐδένα ἤθελεν γνῶναι
  english_pob_choice: he wanted no one to know it
  chosen_spanish: no quería que nadie lo supiera
  alternatives_spanish:
  - no quería que nadie supiera de él
  - no quería que nadie lo conociera
  lexicon: BDAG
  rationale: El griego implica que nadie llegara a saber de su presencia o paradero; el objeto queda implícito. «No quería que nadie lo supiera» evita especificar en exceso y conserva la ambigüedad auditada por la POB inglesa.
- source_word: καὶ οὐκ ἠδυνήθη λαθεῖν
  english_pob_choice: yet he could not remain hidden
  chosen_spanish: pero no pudo permanecer oculto
  alternatives_spanish:
  - y no pudo escapar de ser notado
  - y no pudo ocultarse
  lexicon: BDAG
  rationale: λανθάνω aquí significa quedar oculto o pasar inadvertido. «Permanecer oculto» capta el valor resultativo y, con «pero», expresa bien el contraste con su intención anterior.
theological_decisions:
- issue: Relación entre el deseo de ocultarse y la imposibilidad de permanecer oculto
  english_pob_reading: he wanted no one to know it, yet he could not remain hidden
  chosen_spanish_reading: no quería que nadie lo supiera, pero no pudo permanecer oculto
  alternative_spanish_readings:
  - no quería que nadie supiera de él, pero no pudo pasar inadvertido
  - no quería que nadie lo conociera, pero no pudo ocultarse
  rationale: 'El versículo presenta una tensión narrativa: intención de ocultamiento y fracaso de ese ocultamiento. La traducción conserva esa tensión sin resolverla con un lenguaje más interpretativo que el griego.'
  doctrine_reference: Narrative transparency; no doctrinal expansion beyond the text
translation_notes:
  revision_awareness: El texto español sigue de cerca el griego SBLGNT y el audit trail inglés de la POB, manteniendo el valor narrativo de los participios, la ambigüedad del objeto implícito en οὐδένα ἤθελεν γνῶναι, y la tensión entre el deseo de ocultamiento y la imposibilidad de permanecer oculto. No se aplicaron revisiones adicionales respecto del acuerdo alto registrado en el contexto inglés.
  spanish_consistency_notes:
  - Se usó «Y» para mantener la coordinación narrativa del griego, pero sin cargarla con un valor adversativo fuerte.
  - «Región de Tiro» conserva la elección POB de un área territorial amplia y natural en español.
  - «Casa» se dejó en forma indefinida, coherente con οἰκίαν.
  - «Supiera» expresa en español la cognición implícita de γνῶναι sin añadir un complemento explícito no presente en el texto.
  - «Permanecer oculto» mantiene el matiz de permanecer fuera de la vista o del conocimiento público, alineado con λανθάνω.
