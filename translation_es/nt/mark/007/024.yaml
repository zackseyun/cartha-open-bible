base_translation:
  language: en
  yaml_path: translation/nt/mark/007/024.yaml
  text: From there he got up and went away to the region of Tyre[a]. After entering a house, he wanted no one to know it[c][b], yet he could not remain hidden.
  footnotes:
  - marker: a
    text: Or "to the territory of Tyre"; the Greek can refer to the district or border-region associated with Tyre, not necessarily only its boundary line.
    reason: lexical_alternative
  - marker: b
    text: Literally, "he wanted no one to know"; the object is implicit in Greek, referring to his presence or whereabouts.
    reason: lexical_alternative
  - marker: c
    text: Or "he could not escape notice."
    reason: lexical_alternative
