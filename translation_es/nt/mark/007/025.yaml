translation:
  language: es
  text: Pero una mujer, cuya hijita tenía un espíritu inmundo[a][b], al oír hablar de él[c], fue y cayó a sus pies.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «niñita». El griego θυγάτριον es un diminutivo de «hija».
    reason: lexical_alternative
  - marker: b
    text: O «espíritu impuro»; tradicionalmente también se entiende como un demonio.
    reason: alternative_reading
  - marker: c
    text: O «Pero inmediatamente una mujer cuya hijita tenía un espíritu inmundo oyó hablar de él, vino y cayó a sus pies».
    reason: previous_rendering
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: Conserva el matiz adversativo/continuativo de transición narrativa. En español, «Pero» suena natural al enlazar con el contexto previo sin endurecer el registro.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - al instante
  - enseguida
  lexicon: BDAG
  rationale: Preserva la urgencia narrativa característica de Marcos. «Inmediatamente» es directo, formal y transparente.
- source_word: ἀκούσασα ... περὶ αὐτοῦ
  english_pob_choice: heard about him
  chosen_spanish: habiendo oído hablar de él
  alternatives_spanish:
  - después de oír acerca de él
  - habiendo oído acerca de él
  lexicon: BDAG
  rationale: El participio aoristo con περί + genitivo expresa que recibió noticia sobre Jesús; «habiendo oído hablar de él» reproduce bien esa relación sin sonar mecánico.
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - la mujer
  lexicon: BDAG
  rationale: El sustantivo anartro introduce a la persona en la escena como nueva e indefinida.
- source_word: ἧς εἶχεν τὸ θυγάτριον αὐτῆς πνεῦμα ἀκάθαρτον
  english_pob_choice: whose little daughter had an unclean spirit
  chosen_spanish: cuya hijita tenía un espíritu inmundo
  alternatives_spanish:
  - cuya pequeña hija tenía un espíritu inmundo
  - cuya hija pequeña tenía un espíritu inmundo
  lexicon: BDAG
  rationale: «Hijita» conserva el matiz diminutivo de θυγάτριον y mantiene el vínculo familiar. «Espíritu inmundo» sigue de cerca la fórmula de Marcos y respeta la terminología recurrente del pasaje.
- source_word: θυγάτριον
  english_pob_choice: little daughter
  chosen_spanish: hijita
  alternatives_spanish:
  - niñita
  - hija pequeña
  lexicon: BDAG
  rationale: El diminutivo pide una equivalencia natural en español. «Hijita» transmite ternura y pequeñez sin perder el sentido filial; «niñita» desplazaría el foco familiar.
- source_word: πνεῦμα ἀκάθαρτον
  english_pob_choice: unclean spirit
  chosen_spanish: espíritu inmundo
  alternatives_spanish:
  - espíritu impuro
  - demonio
  lexicon: BDAG
  rationale: Se mantiene la expresión léxica de Marcos. «Inmundo» reproduce la connotación ritual/moral del término sin convertirlo interpretativamente en «demonio».
- source_word: ἐλθοῦσα
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - se acercó
  lexicon: BDAG
  rationale: El participio se integra en la secuencia narrativa. «Vino» conserva el movimiento hacia Jesús y suena más sobrio que «llegó» en este contexto.
- source_word: προσέπεσεν πρὸς τοὺς πόδας αὐτοῦ
  english_pob_choice: fell at his feet
  chosen_spanish: cayó a sus pies
  alternatives_spanish:
  - se postró a sus pies
  - cayó delante de él
  lexicon: BDAG
  rationale: «Cayó a sus pies» preserva la imagen física de προσπίπτω y expresa humildad y súplica sin sobredeterminar la postura.
theological_decisions:
- issue: Rendering of πνεῦμα ἀκάθαρτον
  english_pob_reading: unclean spirit
  chosen_spanish_reading: espíritu inmundo
  alternative_spanish_readings:
  - espíritu impuro
  - demonio
  rationale: Se mantiene la formulación literal para respetar la terminología de Marcos y su resonancia ritual/moral. «Demonio» sería una interpretación legítima en algunos contextos, pero aquí la transparencia lexical es preferible.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión: se mantuvo el orden griego de «inmediatamente» con «habiendo oído hablar de él», conservando la secuencia narrativa y la relación de participio. La decisión española evita el desajuste sintáctico detectado en el historial y mantiene el diminutivo y la terminología demonológica tal como los documenta el POB inglés.'
  spanish_consistency_notes:
  - Se usó «espíritu inmundo» de forma consistente con la terminología del evangelio y del audit trail.
  - Se optó por «hijita» para preservar el diminutivo de θυγάτριον en español natural.
  - Se mantuvo «inmediatamente» como adverbio de urgencia narrativa marcana.
  - La estructura participial «habiendo oído hablar de él» refleja la secuencia del griego sin forzar un orden poco natural.
