revisions:
- from: Pero inmediatamente una mujer, cuya hijita tenía un espíritu inmundo[a][b], habiendo oído hablar de él[c], vino y cayó a sus pies.
  to: Pero una mujer, cuya hijita tenía un espíritu inmundo[a][b], al oír hablar de él[c], fue y cayó a sus pies.
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del sentido del griego ni del rastro auditado en inglés. «Al oír hablar de él» expresa de forma más idiomática el participio ἀκούσασα, y «fue y cayó a sus pies» fluye mejor en español que «vino y cayó». La urgencia de εὐθύς queda suficientemente representada en la alternativa documentada de la nota c; dado que el propio historial inglés muestra vacilación de orden y alcance, este ajuste español prioriza claridad y fidelidad narrativa. También se normalizó la razón de la nota c a «previous_rendering».
