    issue: «lo había encadenado» sobretraduce ἔδησεν
    rationale: El griego dice literalmente «ató»/«ligó»/«amarró». «Encadenó» añade cadenas, detalle que el texto no especifica y que el propio expediente inglés evitó.
  - severity: high
    issue: «la mujer de Felipe su hermano» no refleja bien el valor específico de γυναῖκα
    rationale: En esta construcción y contexto, γυνή significa «esposa», no simplemente «mujer». La nota actual defiende una literalidad innecesaria contra la decisión léxica documentada del POB.
  - severity: medium
    issue: La nota [b] contradice la mejor decisión léxica documentada
    rationale: La nota afirma que se conserva «mujer» por matiz literal, pero el expediente fuente considera claro que aquí debe traducirse «wife/esposa».
  - severity: low
    issue: «en la prisión» es menos natural en español bíblico actual
    rationale: «En la cárcel» o «en prisión» suenan más idiomáticos y conservan el sentido de ἐν φυλακῇ.
  revised_spanish_text: Porque el mismo Herodes había enviado y arrestado a Juan[a], y lo había atado en la cárcel, por causa de Herodías, la esposa de Felipe, su hermano, porque se había casado con ella.
