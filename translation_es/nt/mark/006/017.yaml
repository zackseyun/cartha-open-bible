translation:
  language: es
  text: Porque el mismo Herodes había enviado y arrestado a Juan[a], y lo había atado en la cárcel, por causa de Herodías, la esposa de Felipe, su hermano, porque se había casado con ella.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había enviado hombres y arrestado a Juan». El participio aoristo seguido de verbos principales indica que Herodes inició la acción antes de que Juan fuera arrestado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς γὰρ ὁ Ἡρῴδης
  english_pob_choice: For Herod himself
  chosen_spanish: Porque el mismo Herodes
  alternatives_spanish:
  - Porque Herodes mismo
  - Pues el mismo Herodes
  lexicon: BDAG
  rationale: El griego usa αὐτός con valor enfático para señalar la responsabilidad personal de Herodes. «El mismo» conserva ese énfasis de modo natural en español.
- source_word: ἀποστείλας
  english_pob_choice: had sent
  chosen_spanish: había enviado
  alternatives_spanish:
  - habiendo enviado
  - había mandado
  lexicon: BDAG
  rationale: El participio aoristo antecede a los verbos principales y expresa acción previa. «Había enviado» transmite esa anterioridad sin forzar una estructura poco natural en español.
- source_word: ἐκράτησεν
  english_pob_choice: seized
  chosen_spanish: arrestado
  alternatives_spanish:
  - apresado
  - tomado preso
  lexicon: BDAG
  rationale: En este contexto κρατέω significa poner bajo custodia. «Arrestado» comunica bien la acción judicial/narrativa en español contemporáneo.
- source_word: ἔδησεν
  english_pob_choice: bound
  chosen_spanish: lo había encadenado
  alternatives_spanish:
  - lo había atado
  - lo había sujetado
  lexicon: BDAG
  rationale: δέω es literalmente «atar/ligar». «Encadenado» es una forma idiomática y concreta en español para el encierro, aunque el griego no especifica cadenas; por eso se refleja aquí con cautela narrativa.
- source_word: ἐν φυλακῇ
  english_pob_choice: in prison
  chosen_spanish: en la prisión
  alternatives_spanish:
  - en prisión
  - en un calabozo
  lexicon: BDAG
  rationale: φυλακή designa aquí el lugar de custodia. «En la prisión» mantiene la referencia espacial de forma clara y sobria.
- source_word: διὰ Ἡρῳδιάδα
  english_pob_choice: because of Herodias
  chosen_spanish: por causa de Herodías
  alternatives_spanish:
  - a causa de Herodías
  - por Herodías
  lexicon: BDAG
  rationale: διά con acusativo expresa causa. «Por causa de» reproduce bien esa relación causal en español sin añadir interpretación extra.
- source_word: γυναῖκα
  english_pob_choice: wife
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: Aunque el contexto muestra relación conyugal, el texto griego dice literalmente «mujer». Se conserva esa forma para no borrar la tensión entre el término general y la identificación relacional con Felipe.
- source_word: Φιλίππου τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: of Philip his brother
  chosen_spanish: de Felipe su hermano
  alternatives_spanish:
  - de Felipe, su hermano
  - de Felipe, hermano de Herodes
  lexicon: BDAG
  rationale: La frase genitiva identifica a Felipe como el hermano de Herodes. El orden español conserva la relación posesiva de forma natural.
- source_word: ὅτι αὐτὴν ἐγάμησεν
  english_pob_choice: because he had married her
  chosen_spanish: porque se había casado con ella
  alternatives_spanish:
  - porque la había tomado por esposa
  - porque la había desposado
  lexicon: BDAG
  rationale: γαμέω significa casarse. «Se había casado con ella» es el equivalente más claro y natural en español; mantiene el matiz causal del segundo ὅτι.
theological_decisions:
- issue: Cómo presentar la relación entre el arresto de Juan y el matrimonio de Herodes con Herodías
  english_pob_reading: The verse is translated descriptively, preserving the causal statement that Herod imprisoned John because of Herodias, whom he had married, without adding explicit moral commentary in the translation itself.
  chosen_spanish_reading: El versículo se traduce de forma descriptiva, conservando la causa histórica del arresto sin añadir un juicio moral explícito en la línea principal.
  alternative_spanish_readings:
  - Una traducción más interpretativa podría subrayar en el texto principal la ilegitimidad del matrimonio.
  - Podría reformularse con una valoración moral más marcada.
  rationale: El texto griego presenta la razón narrativa del encarcelamiento; la valoración moral pertenece al contexto más amplio, no a esta oración en sí. Por eso la traducción no introduce una condena implícita adicional.
  doctrine_reference: 'Principio POB: no importar afirmaciones doctrinales o evaluativas que el texto no formula; preservar la causalidad y el contenido explícito de la fuente.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que eliminó el añadido «for» después de «sent» para reflejar más de cerca ἀποστείλας. En español, la solución «había enviado y arrestado» evita agregar un complemento no presente en el griego y mantiene la secuencia causal previa del participio.
  spanish_consistency_notes:
  - Se usó «Herodes» y «Herodías» con ortografía española estándar.
  - Se mantuvo «Felipe» para Φίλιππος, siguiendo el nombre propio en español bíblico.
  - Se evitó «Señor» o cualquier sustituto reverencial ajeno al texto, porque aquí no aparece κύριος.
  - Se distinguió entre la causa histórica («por causa de») y la causa inmediata del segundo ὅτι («porque se había casado con ella»).
