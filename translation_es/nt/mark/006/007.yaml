translation:
  language: es
  text: Y llamó a los Doce y comenzó a enviarlos de dos en dos[a], y les iba dando autoridad sobre los espíritus inmundos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en pares».
    reason: lexical_alternative
  - marker: b
    text: O «poder sobre los espíritus inmundos».
    reason: alternative_reading
lexical_decisions:
- source_word: προσκαλεῖται
  english_pob_choice: calls
  chosen_spanish: llamó
  alternatives_spanish:
  - llama
  - convocó
  - llamaba
  lexicon: BDAG
  rationale: El presente histórico griego admite una narración en pasado en español para mayor fluidez. «Llamó» conserva la acción directa de προσκαλεῖται sin sobretraducir el matiz medio como «llamó hacia sí», que no es necesario en este contexto.
- source_word: τοὺς δώδεκα
  english_pob_choice: the Twelve
  chosen_spanish: los Doce
  alternatives_spanish:
  - los doce discípulos
  - los doce
  lexicon: BDAG
  rationale: Es un grupo titular reconocido en el relato. En español, la mayúscula interna en «Doce» preserva ese valor designativo y evita una lectura meramente numeral.
- source_word: ἤρξατο ... ἀποστέλλειν
  english_pob_choice: began to send them out
  chosen_spanish: comenzó a enviarlos
  alternatives_spanish:
  - empezó a enviarlos
  - comenzó a mandarlos
  lexicon: BDAG
  rationale: La construcción con ἄρχομαι + infinitivo se vierte naturalmente como «comenzó a». «Enviar» reproduce ἀποστέλλειν en sentido misional sin introducir un término técnico adicional.
- source_word: δύο δύο
  english_pob_choice: two by two
  chosen_spanish: de dos en dos
  alternatives_spanish:
  - en pares
  - dos a dos
  lexicon: BDAG
  rationale: «De dos en dos» es la equivalencia idiomática natural en español y conserva el valor distributivo de la repetición griega. También mantiene el ritmo narrativo sin forzar una glosa.
- source_word: ἐδίδου
  english_pob_choice: he was giving
  chosen_spanish: les iba dando
  alternatives_spanish:
  - les daba
  - les seguía dando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso. «Les iba dando» comunica mejor la continuidad que un pretérito simple, y suena más natural que un calco de «estaba dando» en esta secuencia narrativa.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - facultad
  lexicon: BDAG
  rationale: «Autoridad» preserva la idea de potestad delegada, no mera fuerza. En este contexto Jesús concede a los Doce capacidad autorizada para actuar contra los espíritus.
- source_word: τῶν πνευμάτων τῶν ἀκαθάρτων
  english_pob_choice: the unclean spirits
  chosen_spanish: los espíritus inmundos
  alternatives_spanish:
  - los espíritus impuros
  - los demonios inmundos
  lexicon: BDAG
  rationale: «Espíritus inmundos» reproduce de cerca la terminología marcana y conserva la tensión lexical de ἀκάθαρτος. «Inmundos» es un equivalente bíblico comprensible y evita estrechar el sentido solo a «demonios».
theological_decisions:
- issue: Naturaleza de la autoridad concedida a los Doce sobre los espíritus inmundos
  english_pob_reading: delegated authority over the unclean spirits
  chosen_spanish_reading: autoridad sobre los espíritus inmundos
  alternative_spanish_readings:
  - poder sobre los espíritus inmundos
  rationale: La traducción mantiene la idea de autoridad delegada implícita en ἐξουσίαν. «Autoridad» es preferible a «poder» porque preserva mejor la relación de comisión entre Jesús y los Doce, sin diluir el valor de la concesión.
  doctrine_reference: Translation philosophy §5; principio general de preservar el matiz léxico de ἐξουσία
translation_notes:
  revision_awareness: 'La redacción sigue el consenso alto del audit trail inglés, pero ajusta el tiempo narrativo y la naturalidad del español: se armoniza el presente histórico de προσκαλεῖται con un pasado narrativo fluido («llamó»), se conserva la progresión imperfectiva de ἐδίδου con «les iba dando», y se mantiene la terminología de comisión y pureza ritual («autoridad», «espíritus inmundos») sin sustituirla por glosas más interpretativas.'
  spanish_consistency_notes:
  - Se usa «los Doce» como designación titular, con mayúscula en «Doce».
  - Se mantiene «espíritus inmundos» para conservar la terminología marcana y la tensión semántica de ἀκάθαρτος.
  - Se prefiere «autoridad» sobre «poder» para ἐξουσίαν, de acuerdo con el audit trail inglés.
  - La locución «de dos en dos» se usa como equivalente idiomático de δύο δύο.
