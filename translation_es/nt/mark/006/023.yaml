translation:
  language: es
  text: 'Y juró[a] a ella: «Todo lo que me pidas, te lo daré[b], hasta la mitad de mi reino».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cualquier cosa que me pidas».
    reason: alternative_reading
  - marker: b
    text: 'Griego: «hasta la mitad de mi reino», una oferta real convencional y exagerada.'
    reason: cultural_note
lexical_decisions:
- source_word: ὤμοσεν
  english_pob_choice: he swore
  chosen_spanish: juró
  alternatives_spanish:
  - hizo un juramento
  - prestó juramento
  lexicon: BDAG
  rationale: El aoristo de ὀμνύω expresa el acto de hacer un juramento. En español, «juró» comunica con naturalidad la solemnidad del acto y conserva la fuerza del compromiso sin añadir matices ajenos.
- source_word: αὐτῇ
  english_pob_choice: to her
  chosen_spanish: a ella
  alternatives_spanish:
  - a la muchacha
  - a la joven
  lexicon: BDAG
  rationale: El dativo femenino singular se refiere a la destinataria del discurso. «A ella» es directo y transparente; evita precisar más de lo que el texto griego exige en esta cláusula.
- source_word: Ὅ τι ἐάν
  english_pob_choice: Whatever
  chosen_spanish: Todo lo que
  alternatives_spanish:
  - Cualquier cosa que
  - Lo que sea que
  lexicon: BDAG
  rationale: La construcción relativa con ἐάν introduce una promesa abierta e indefinida. «Todo lo que» preserva bien esa amplitud en español y suena natural en una declaración jurada.
- source_word: με αἰτήσῃς
  english_pob_choice: you ask me
  chosen_spanish: me pidas
  alternatives_spanish:
  - me pidas a mí
  - me solicites
  lexicon: BDAG
  rationale: αἰτέω suele significar «pedir/solicitar» y aquí lleva un objeto personal. «Me pidas» reproduce el valor de solicitud directa en una forma idiomática del español contemporáneo.
- source_word: δώσω σοι
  english_pob_choice: I will give you
  chosen_spanish: te lo daré
  alternatives_spanish:
  - te daré
  - te lo concederé
  lexicon: BDAG
  rationale: δίδωμι se traduce con el verbo común «dar». Se añade «lo» porque el objeto está sobreentendido por el contexto y el español lo pide para una expresión fluida en esta frase promesiva.
- source_word: ἕως ἡμίσους
  english_pob_choice: up to half
  chosen_spanish: hasta la mitad
  alternatives_spanish:
  - hasta medio
  - como máximo la mitad
  lexicon: BDAG
  rationale: Aquí ἕως marca límite de cantidad, no tiempo. «Hasta la mitad» conserva la medida y la naturalidad del español, sin perder el carácter de oferta extrema.
- source_word: τῆς βασιλείας μου
  english_pob_choice: of my kingdom
  chosen_spanish: de mi reino
  alternatives_spanish:
  - de mi reino real
  - de mi soberanía
  lexicon: BDAG
  rationale: βασιλεία puede referir al reino como dominio real. En este contexto cortesano, «reino» comunica con claridad la promesa hiperbólica sin desplazar el sentido hacia un abstracto teológico.
theological_decisions:
- issue: Sentido de βασιλεία en el juramento de Herodes
  english_pob_reading: kingdom
  chosen_spanish_reading: reino
  alternative_spanish_readings:
  - reinado
  - soberanía
  rationale: En esta escena narrativo-cortesana, βασιλεία no funciona como término técnico del Reino de Dios, sino como el dominio real de Herodes. «Reino» mantiene esa concreción y la tonalidad hiperbólica del juramento.
  doctrine_reference: Uso narrativo de βασιλεία; no implica una afirmación doctrinal sobre el Reino de Dios
translation_notes:
  revision_awareness: 'Se mantiene el sentido del texto griego sin depender mecánicamente del inglés: se traduce ὤμοσεν con un verbo juramentario natural en español, Ὅ τι ἐάν con una cláusula abierta equivalente, y ἕως ἡμίσους como límite cuantitativo. La nota cultural conserva la observación del POB inglés sobre el carácter hiperbólico de la promesa real.'
  spanish_consistency_notes:
  - Se usa «reino» para βασιλεία en sentido cortesano, no «Reino» con mayúscula ni un equivalente eclesial.
  - Se evita «SEÑOR» o formulaciones litúrgicas porque no corresponden al pasaje.
  - La puntuación y el encierro de comillas siguen un registro bíblico moderno y legible.
