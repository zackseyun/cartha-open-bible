translation:
  language: es
  text: 'Y el rey Herodes oyó de esto, porque su nombre se había hecho público, y decían: «Juan el Bautizador[a] ha resucitado de entre los muertos[b], y por esto actúan en él estos poderes[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, «Juan el Bautista». El participio griego significa literalmente «el que bautiza».
    reason: lexical_alternative
  - marker: b
    text: 'O «ha sido levantado de entre los muertos». El verbo griego está en pasivo: «ha sido levantado».'
    reason: alternative_reading
  - marker: c
    text: O «poderes milagrosos» o «obras poderosas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ βασιλεὺς Ἡρῴδης
  english_pob_choice: King Herod
  chosen_spanish: el rey Herodes
  alternatives_spanish:
  - Herodes el rey
  lexicon: βασιλεύς
  rationale: βασιλεύς significa de manera directa 'rey'. En español, 'el rey Herodes' suena natural y conserva el título real sin añadir interpretación.
- source_word: ἤκουσεν
  english_pob_choice: heard of it
  chosen_spanish: oyó de esto
  alternatives_spanish:
  - oyó
  - llegó a oír
  lexicon: ἀκούω
  rationale: El verbo es simplemente 'oyó'. Como el objeto está implícito por el contexto anterior, 'de esto' hace explícita la referencia sin introducir contenido nuevo; mantiene la naturalidad del español.
- source_word: φανερὸν γὰρ ἐγένετο τὸ ὄνομα αὐτοῦ
  english_pob_choice: for his name had become well known
  chosen_spanish: porque su nombre se había hecho público
  alternatives_spanish:
  - porque su nombre se había hecho conocido
  - porque su nombre se había vuelto notorio
  lexicon: φανερός / ὄνομα
  rationale: Conservo 'nombre' para reflejar la expresión griega, donde 'nombre' incluye fama o reputación. 'Se había hecho público' comunica bien el valor de φανερὸν ἐγένετο sin forzar un giro idiomático excesivo.
- source_word: ἔλεγον
  english_pob_choice: people were saying
  chosen_spanish: decían
  alternatives_spanish:
  - la gente decía
  - unos decían
  lexicon: λέγω
  rationale: El plural es indefinido; 'decían' reproduce esa forma impersonal en español de manera breve y natural.
- source_word: Ἰωάννης ὁ βαπτίζων
  english_pob_choice: John the Baptizer
  chosen_spanish: Juan el Bautizador
  alternatives_spanish:
  - Juan el Bautista
  - Juan que bautiza
  lexicon: βαπτίζω
  rationale: El participio presente literalmente significa 'el que bautiza'. 'Bautizador' conserva el matiz verbal que el inglés POB quiso resguardar con 'Baptizer', en vez del título tradicional 'Bautista', que ya suena más fijo y menos transparente.
- source_word: ἐγήγερται ἐκ νεκρῶν
  english_pob_choice: has been raised from the dead
  chosen_spanish: ha resucitado de entre los muertos
  alternatives_spanish:
  - ha sido levantado de entre los muertos
  - ha sido resucitado de entre los muertos
  lexicon: ἐγείρω
  rationale: El griego es pasivo perfecto, y el POB inglés preserva ese pasivo con 'has been raised'. En español, 'ha resucitado' es la forma más natural y fiel para expresar la resurrección; la nota conserva la posibilidad más literal de 'ha sido levantado'.
- source_word: διὰ τοῦτο
  english_pob_choice: because of this
  chosen_spanish: y por esto
  alternatives_spanish:
  - por esta razón
  - por lo cual
  lexicon: διά + τοῦτο
  rationale: La frase introduce la inferencia atribuida por la multitud. 'Y por esto' mantiene la relación causal de forma fluida en español.
- source_word: ἐνεργοῦσιν
  english_pob_choice: are at work
  chosen_spanish: actúan
  alternatives_spanish:
  - están obrando
  - están en acción
  lexicon: ἐνεργέω
  rationale: El verbo indica actividad efectiva en curso. 'Actúan' es conciso y natural, aunque en notas se preserva la posibilidad de 'obran' o 'están en acción' si se quiere matizar más.
- source_word: αἱ δυνάμεις
  english_pob_choice: these powers
  chosen_spanish: estas obras poderosas
  alternatives_spanish:
  - estos poderes
  - estas fuerzas
  - estos milagros
  lexicon: δύναμις
  rationale: Aquí δύναμις puede referirse a poderes o a obras milagrosas. El inglés POB deja la tensión abierta con 'these powers' y su nota. En español, 'obras poderosas' mantiene esa ambigüedad entre poder activo y hechos poderosos sin decidirse por 'milagros' de forma demasiado interpretativa.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por medio de él
  lexicon: ἐν + dativo
  rationale: 'La preposición con dativo es directa: ''en él''. Mantiene la localización/operación interna del texto griego.'
theological_decisions:
- issue: Pasivo de ἐγήγερται en contexto de resurrección
  english_pob_reading: has been raised from the dead
  chosen_spanish_reading: ha resucitado de entre los muertos
  alternative_spanish_readings:
  - ha sido levantado de entre los muertos
  - ha sido resucitado de entre los muertos
  rationale: El griego expresa voz pasiva. El inglés POB preserva esa pasividad. En español, la construcción pasiva literal suena menos natural; 'ha resucitado' comunica claramente la resurrección, y la nota conserva la alternativa más cercana al pasivo para no borrar la tensión textual.
  doctrine_reference: Preservar la tensión gramatical sin sacrificar claridad española.
- issue: αἱ δυνάμεις y su alcance semántico
  english_pob_reading: these powers
  chosen_spanish_reading: estas obras poderosas
  alternative_spanish_readings:
  - estos poderes
  - estas fuerzas
  - estos milagros
  rationale: El término puede apuntar a poderes, obras de poder o hechos milagrosos. Como el POB inglés evita cerrarlo con 'miraculous powers' en el texto principal, el español también evita definirlo demasiado; 'obras poderosas' preserva la ambigüedad entre poder y acto poderoso.
  doctrine_reference: No resolver demasiado pronto el alcance de δύναμις.
translation_notes:
  revision_awareness: Se mantuvo la lectura principal del pasivo griego en la nota, pero se optó por una formulación española más natural en el cuerpo del texto. También se reforzó la ambigüedad semántica de δύναμις con una expresión que no cierra la interpretación a 'milagros' exclusivamente. La tradición 'Bautista' quedó reservada a nota, siguiendo el audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'Yahvé' por defecto solo donde corresponda; aquí no aparece.
  - Se evitó 'Cristo' porque no interviene en este versículo.
  - Se mantuvo 'en él' para ἐν αὐτῷ y no se interpretó como 'por medio de él'.
  - Se preservó la estructura narrativa del griego con dos cláusulas causales e informativas claramente separadas.
