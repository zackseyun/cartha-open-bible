translation:
  language: es
  text: Y expulsaban muchos demonios[a], y ungían con aceite a muchos enfermos y los sanaban.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con aceite de oliva’.
    reason: lexical_alternative
lexical_decisions:
- source_word: δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus inmundos
  lexicon: BDAG
  rationale: δαιμόνια nombra seres demoníacos; ‘demonios’ es el equivalente directo y natural en español. ‘Espíritus inmundos’ sería una armonización con otros pasajes, pero aquí el griego no usa ese término.
- source_word: ἐξέβαλλον
  english_pob_choice: were casting out
  chosen_spanish: expulsaban
  alternatives_spanish:
  - echaban fuera
  - expulsaban continuamente
  lexicon: BDAG
  rationale: El imperfecto indica acción reiterada o en curso. ‘Expulsaban’ conserva ese aspecto narrativo sin sonar tan anglicado como una perífrasis progresiva en español.
- source_word: ἤλειφον
  english_pob_choice: were anointing
  chosen_spanish: ungían
  alternatives_spanish:
  - ungían con aceite
  - untaban
  lexicon: BDAG
  rationale: ἀλείφω puede significar ungir o aplicar/untar con aceite. ‘Ungían’ es la forma más natural y bíblica en español, y el contexto queda aclarado con ‘con aceite’.
- source_word: ἐλαίῳ
  english_pob_choice: with oil
  chosen_spanish: con aceite
  alternatives_spanish:
  - con aceite de oliva
  lexicon: BDAG
  rationale: ἔλαιον significa aceite; en el mundo mediterráneo antiguo suele ser aceite de oliva, pero el griego aquí solo dice ‘aceite’. Por eso la traducción principal no especifica más de lo que el texto dice.
- source_word: ἀρρώστους
  english_pob_choice: sick people
  chosen_spanish: enfermos
  alternatives_spanish:
  - personas enfermas
  - los enfermos
  lexicon: BDAG
  rationale: El adjetivo sustantivado se traduce naturalmente como ‘enfermos’ en español. Es más fluido que ‘personas enfermas’ y mantiene el valor colectivo del griego.
- source_word: ἐθεράπευον
  english_pob_choice: healing them
  chosen_spanish: los sanaban
  alternatives_spanish:
  - los curaban
  - los estaban sanando
  lexicon: BDAG
  rationale: θεραπεύω significa sanar/curar. ‘Los sanaban’ transmite bien la acción continuada del imperfecto y evita hacer demasiado clínica la expresión.
theological_decisions:
- issue: Relación entre la unción con aceite y la sanidad
  english_pob_reading: Translate descriptively as a historical action without implying a sacramental mechanism.
  chosen_spanish_reading: Traducir como una acción histórica de ministerio, sin convertir el aceite en un mecanismo sacramental ni vaciarlo de su función narrativa.
  alternative_spanish_readings:
  - el aceite sanaba por sí mismo
  - la unción fue solo simbólica
  rationale: El versículo presenta la unción con aceite y la sanidad en secuencia, pero no explica el mecanismo teológico. La traducción mantiene esa tensión y no añade una doctrina que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: Se ha verificado el pasaje contra el griego SBLGNT y el audit trail en inglés. La formulación española sigue la lectura revisada sin cambios sustantivos y conserva el aspecto imperfectivo con verbos en pretérito imperfecto.
  spanish_consistency_notes:
  - Se mantiene ‘demonios’ para δαιμόνια, coherente con el valor léxico directo.
  - Se evita ‘SEÑOR’ u otras sustituciones no pertinentes; no aparece el nombre divino en este versículo.
  - ‘Ungían con aceite’ conserva el matiz de ἀλείφω y explicita el instrumento.
  - ‘Los sanaban’ enlaza naturalmente con ‘muchos enfermos’ sin añadir sujetos implícitos ajenos al griego.
