translation:
  language: es
  text: Y muchos los vieron yéndose, y los reconocieron; y a pie[a], desde todos los pueblos[b], corrieron allí y llegaron antes que ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por tierra», destacando el contraste con el viaje en barca.
    reason: lexical_alternative
  - marker: b
    text: O «desde todas las ciudades»; el griego πόλις puede referirse a pueblos o ciudades según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶδον
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - vieron
  - alcanzaron a ver
  - divisaron
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω se expresa de forma natural con «vieron» sin añadir matices no presentes en el griego.
- source_word: ὑπάγοντας
  english_pob_choice: going
  chosen_spanish: iban
  alternatives_spanish:
  - iban
  - se alejaban
  - se marchaban
  lexicon: BDAG
  rationale: El participio describe a Jesús y los discípulos en el acto de irse; «iban» es fluido en español y no especifica más de lo que el contexto inmediato permite.
- source_word: ἐπέγνωσαν
  english_pob_choice: recognized
  chosen_spanish: los reconocieron
  alternatives_spanish:
  - los identificaron
  - se dieron cuenta de quiénes eran
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí significa reconocer a las personas; «los reconocieron» conserva ese sentido relacional y concreto.
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - mucha gente
  - muchos de ellos
  lexicon: BDAG
  rationale: Es un adjetivo sustantivado; «muchos» reproduce su fuerza de manera concisa y natural en español.
- source_word: πεζῇ
  english_pob_choice: on foot
  chosen_spanish: a pie
  alternatives_spanish:
  - por tierra
  - caminando
  lexicon: BDAG
  rationale: «A pie» es la forma idiomática en español y mantiene el contraste con el viaje por barca implícito en el contexto.
- source_word: ἀπὸ πασῶν τῶν πόλεων
  english_pob_choice: from all the towns
  chosen_spanish: desde todos los pueblos[b]
  alternatives_spanish:
  - desde todas las ciudades
  - de todos los pueblos
  lexicon: BDAG
  rationale: πόλις puede referirse a pueblos o ciudades; en el contexto galileo, «pueblos» comunica mejor en español moderno, sin excluir «ciudades».
- source_word: συνέδραμον
  english_pob_choice: they ran there together
  chosen_spanish: corrieron allí
  alternatives_spanish:
  - corrieron allá juntos
  - acudieron corriendo
  lexicon: BDAG
  rationale: El verbo compuesto expresa convergencia y rapidez; en español, el plural «muchos» ya aporta la idea colectiva, por lo que «corrieron allí» evita una repetición pesada y conserva el movimiento.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - allá
  - en ese lugar
  lexicon: BDAG
  rationale: Adverbio deíctico simple; «allí» es idiomático y adecuado al relato.
- source_word: προῆλθον αὐτούς
  english_pob_choice: got there ahead of them
  chosen_spanish: llegaron antes que ellos
  alternatives_spanish:
  - se les adelantaron
  - arribaron antes que ellos
  lexicon: BDAG
  rationale: La expresión señala precedencia en la llegada; «llegaron antes que ellos» conserva la comparación sin sonar artificial en español.
translation_notes:
  revision_awareness: El borrador sigue el estado sin cambios del audit trail inglés más reciente, manteniendo las mismas decisiones semánticas generales y resolviendo en español la naturalidad de participios y deícticos sin alterar el sentido del texto base.
  spanish_consistency_notes:
  - Se conservó el contraste implícito con el viaje en barca mediante «a pie».
  - Se prefirió «pueblos» como término más natural en español latinoamericano, con nota alternativa para «ciudades».
  - 'Se mantuvo el orden narrativo del griego: ver/reconocer, luego correr, luego llegar antes.'
  - No se introdujeron términos eclesiásticos o interpretativos no presentes en el pasaje.
