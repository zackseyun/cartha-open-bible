translation:
  language: es
  text: Y después de despedirse de ellos[a], se fue al monte a orar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de tomar leave de ellos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποταξάμενος
  english_pob_choice: after saying goodbye
  chosen_spanish: después de despedirse
  alternatives_spanish:
  - después de tomar leave
  - después de tomar licencia
  - después de despedirse de ellos
  lexicon: BDAG
  rationale: El participio medio expresa la acción de tomar leave o despedirse. En español, «despedirse» comunica con naturalidad esa separación interpersonal sin introducir la idea de una orden formal que no está explicitada.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: de ellos
  alternatives_spanish:
  - a ellos
  - de parte de ellos
  lexicon: BDAG
  rationale: El dativo se integra bien en la construcción verbal española «despedirse de ellos». Mantiene el referente cercano del contexto sin forzar una traducción más pesada.
- source_word: ἀπῆλθεν
  english_pob_choice: he went away
  chosen_spanish: se fue
  alternatives_spanish:
  - partió
  - se apartó
  - se marchó
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι marca salida o partida. «Se fue» es idiomático y conserva el movimiento de alejamiento que el inglés POB quiso reflejar con «went away».
- source_word: εἰς τὸ ὄρος
  english_pob_choice: to the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - al cerro
  - a la montaña
  lexicon: BDAG
  rationale: «Ὄρος» puede ser «montaña» o «monte». Dado el registro bíblico en español y la concreción narrativa del artículo definido, «al monte» es una solución natural y fiel, sin añadir simbolismo.
- source_word: προσεύξασθαι
  english_pob_choice: to pray
  chosen_spanish: a orar
  alternatives_spanish:
  - para orar
  - a rezar
  lexicon: BDAG
  rationale: El infinitivo de propósito se expresa con naturalidad en español como «a orar». Se evita «rezar» por su posible restricción confesional y porque «orar» transmite de forma más general y directa la acción de orar.
theological_decisions:
- issue: Referencia de «el monte»
  english_pob_reading: Render as 'the mountain' without attaching symbolic or theological significance.
  chosen_spanish_reading: Traducir «al monte» sin cargarlo de simbolismo teológico.
  alternative_spanish_readings:
  - a una montaña
  - al monte santo
  - al lugar de oración
  rationale: El texto griego usa el artículo y presenta un detalle narrativo concreto. La traducción debe conservar esa concreción sin importar asociaciones devocionales que el versículo no explicita.
  doctrine_reference: 'Translation philosophy: Never import doctrinal claims the text does not make; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El contexto auditado coincide en alta medida con el inglés POB: ἀποταξάμενος se entiende como despedida o toma de leave, εἰς τὸ ὄρος se mantiene literal como referencia concreta al monte, y προσεύξασθαι expresa propósito con «orar». No se detectaron revisiones que obliguen a alterar la línea base.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y moderno, evitando calcos innecesarios.
  - «Monte» conserva la forma tradicional y natural en español para ὄρος, sin ampliar el sentido.
  - La nota textual preserva la alternativa lexical del POB inglés para ἀποταξάμενος.
  - Se usa «orar» como equivalente estable de προσεύξασθαι en estilo eclesial amplio.
