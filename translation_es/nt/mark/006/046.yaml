review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente el sentido básico del griego: despedida de ellos, partida, destino al monte y propósito de orar. También conserva bien la falta de simbolismo añadido en «τὸ ὄρος». El único problema sustancial está en la nota léxica, que introduce inglés sin traducir y por eso no preserva adecuadamente la alternativa auditada en el POB inglés.'
  spanish_quality_summary: 'El texto principal es natural, fiel y de buena legibilidad en español neutro: «Y después de despedirse de ellos, se fue al monte a orar». La construcción «despedirse de ellos» refleja bien ἀποταξάμενος αὐτοῖς. «Al monte» es una opción bíblicamente natural y clara. La nota al pie, sin embargo, contiene el anglicismo crudo «leave», que resulta impropio y poco legible.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión «al monte» concuerda con la documentación inglesa para τὸ ὄρος. «Orar» es adecuada para προσεύξασθαι.
  issues:
  - severity: medium
    issue: 'La nota al pie contiene inglés sin adaptar: «tomar leave».'
    rationale: La alternativa inglesa auditada es «after taking leave of them». En español debe expresarse naturalmente, por ejemplo «después de apartarse de ellos» o mejor «después de tomar licencia de ellos» si se quisiera literalizar, pero esa opción suena menos natural. La nota actual no es aceptable para una edición española.
  - severity: low
    issue: Una alternativa léxica propuesta en metadatos, «tomar licencia», suena poco idiomática en español bíblico actual.
    rationale: No afecta el texto principal, pero confirma que la alternativa debe reformularse en español más natural. La mejor equivalencia para la nota inglesa es «después de despedirse de ellos» o «después de separarse de ellos»; como nota alternativa, «después de apartarse de ellos» evita repetir exactamente el texto principal.
  revised_spanish_text: Y después de despedirse de ellos[a], se fue al monte a orar.
  revised_footnotes:
  - marker: a
    text: 'O: «después de apartarse de ellos».'
    reason: lexical_alternative
  revision_rationale: Se conserva intacto el texto principal porque es fiel al griego y natural en español. Solo se corrige la nota al pie para eliminar el anglicismo «leave» y ofrecer una alternativa española legible y semánticamente cercana a la nota del POB inglés («after taking leave of them»).
