translation:
  language: es
  text: Pero Herodías le guardaba rencor y quería matarlo[a], pero no podía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Le guardaba rencor» refleja el giro idiomático griego de hostilidad continua; también podría traducirse «mantenía resentimiento contra él» o «lo tenía atravesado».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Y
  lexicon: BDAG
  rationale: En este contexto adversativo, «Pero» refleja el contraste con lo anterior de manera natural en español y conserva la fuerza de desarrollo narrativo que el inglés POB marcó con «But».
- source_word: Ἡρῳδιὰς
  english_pob_choice: Herodias
  chosen_spanish: Herodías
  alternatives_spanish:
  - Herodias
  lexicon: Convención onomástica
  rationale: Se translitera el nombre propio con la forma usual en español bíblico, manteniendo la identificación directa del personaje sin añadir interpretación.
- source_word: ἐνεῖχεν αὐτῷ
  english_pob_choice: held a grudge against him
  chosen_spanish: le guardaba rencor
  alternatives_spanish:
  - mantenía resentimiento contra él
  - lo tenía atravesado
  lexicon: BDAG
  rationale: El giro griego expresa hostilidad persistente y no solo oposición puntual. «Le guardaba rencor» conserva el valor durativo del imperfecto y sugiere una animadversión continua, cercana a la nota auditada del inglés POB.
- source_word: ἤθελεν
  english_pob_choice: wanted
  chosen_spanish: quería
  alternatives_spanish:
  - deseaba
  - quería matar
  lexicon: BDAG
  rationale: El imperfecto de θέλω se vierte de modo directo con «quería», manteniendo la intención continua sin recargar el texto.
- source_word: αὐτὸν ἀποκτεῖναι
  english_pob_choice: to kill him
  chosen_spanish: matarlo
  alternatives_spanish:
  - quitarle la vida
  - hacerlo morir
  lexicon: BDAG
  rationale: «Matarlo» es la forma más natural y directa en español para ἀποκτεῖναι. No se añade «asesinarlo», porque el verbo no exige esa precisión legal-moral.
- source_word: καὶ οὐκ ἠδύνατο
  english_pob_choice: but she could not
  chosen_spanish: pero no podía
  alternatives_spanish:
  - y no podía
  - pero no era capaz
  lexicon: BDAG
  rationale: Aunque καὶ es coordinante, el sentido en contexto es concesivo/adversativo, como en el inglés auditado. «Pero no podía» comunica bien la imposibilidad sin sobreexplicar la causa.
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: el valor adversativo de δὲ, el sentido idiomático de ἐνέχω, el imperfecto de deseo de θέλω y la negación final de incapacidad. No se detectaron revisiones aplicadas en el expediente más reciente, y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y narrativo, compatible con el estilo de la serie.
  - Se evitó el uso de «SEÑOR» u otras sustituciones no presentes en el versículo.
  - La puntuación reproduce la estructura de dos miembros unidos por contraste, conforme al griego y al inglés auditado.
