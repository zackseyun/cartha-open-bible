translation:
  language: es
  text: Y se maravillaba[a] por su incredulidad. Y recorría las aldeas de alrededor[b], enseñando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se asombraba por su incredulidad».
    reason: lexical_alternative
  - marker: b
    text: O «iba por las aldeas vecinas» o «iba en circuito entre las aldeas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμαζεν
  english_pob_choice: was amazed
  chosen_spanish: se maravillaba
  alternatives_spanish:
  - se asombraba
  - maravillaba
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción continua o durativa en el pasado. «Se maravillaba» comunica bien ese matiz y mantiene la fuerza de θαυμάζω sin suavizarla. En español, esta forma es natural y digna; «se asombraba» también sería posible, pero «maravillaba» conserva mejor el eco tradicional sin volverlo arcaico.
- source_word: διὰ τὴν ἀπιστίαν αὐτῶν
  english_pob_choice: because of their unbelief
  chosen_spanish: de la incredulidad de ellos
  alternatives_spanish:
  - por su incredulidad
  - a causa de la incredulidad de ellos
  - por su falta de fe
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; en español, «de la incredulidad de ellos» funciona de manera natural tras «se maravillaba». «Incredulidad» mantiene con claridad el sentido de ἀπιστία como rechazo a creer, y evita suavizarlo con «falta de fe».
- source_word: περιῆγεν
  english_pob_choice: went around
  chosen_spanish: recorría
  alternatives_spanish:
  - andaba alrededor
  - iba de un lugar a otro
  - andaba recorriendo
  lexicon: BDAG
  rationale: El imperfecto indica movimiento continuado. «Recorría» transmite bien el ir de lugar en lugar con fluidez en español y preserva la idea itinerante sin volverla pesada.
- source_word: τὰς κώμας
  english_pob_choice: the villages
  chosen_spanish: las aldeas
  alternatives_spanish:
  - los pueblos
  - las villas
  lexicon: BDAG
  rationale: κώμη se refiere a asentamientos rurales o aldeas. «Aldeas» es una equivalencia precisa y clara en español; «pueblos» es posible, pero puede sonar más amplio de lo que el término griego sugiere.
- source_word: κύκλῳ
  english_pob_choice: among
  chosen_spanish: alrededor
  alternatives_spanish:
  - en derredor
  - en círculo
  - por la zona
  lexicon: BDAG
  rationale: κύκλῳ tiene fuerza adverbial de circundancia o circuito. «Alrededor» expresa bien la idea de desplazamiento por el entorno sin introducir una paráfrasis excesiva. Se evita «entre» porque no reproduce la noción espacial de circunferencia.
- source_word: διδάσκων
  english_pob_choice: teaching
  chosen_spanish: enseñando
  alternatives_spanish:
  - mientras enseñaba
  - y enseñaba
  lexicon: BDAG
  rationale: El participio presente contemporáneo se vierte naturalmente como gerundio en español. «Enseñando» conserva la simultaneidad con «recorría» y mantiene el perfil narrativo del texto.
theological_decisions:
- issue: Jesús se maravilla ante la incredulidad sin diluir la tensión cristológica
  english_pob_reading: And he was amazed because of their unbelief.
  chosen_spanish_reading: Y se maravillaba de la incredulidad de ellos.
  alternative_spanish_readings:
  - Y se asombraba de la incredulidad de ellos.
  - Y se maravilló de la incredulidad de ellos.
  rationale: La traducción conserva de forma directa el dato narrativo de que Jesús reacciona con admiración/asombro ante la incredulidad, sin añadir explicaciones que atenúen la tensión. Se mantiene el imperfecto para reflejar el tiempo verbal del griego y la observación narrativa continua.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente; cristología narrativa
translation_notes:
  revision_awareness: 'El contexto auditado en inglés confirma una lectura estable y sin revisiones sustantivas: se mantiene la equivalencia óptima con el imperfecto durativo de ἐθαύμαζεν, la causalidad de διά + acusativo, y el valor adverbial de κύκλῳ sin forzar una glosa mecánica. No hay cambios aplicados en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene «incredulidad» para ἀπιστία, en línea con el valor lexical fuerte del término y con el registro bíblico español claro.
  - Se usa «enseñando» como gerundio narrativo para reflejar la contemporaneidad del participio presente.
  - No se emplea una convención de mayúsculas para el nombre divino porque el versículo no contiene un referente explícito al tetragrama ni una cita directa de κύριος como nombre divino.
