- from: Y no pudo hacer allí ningún milagro[a], excepto que sanó a unos pocos enfermos, poniendo sobre ellos las manos.
  to: Y no pudo hacer allí ningún milagro[a], excepto que les impuso las manos a unos pocos enfermos y los sanó.
  rationale: Se conserva la fuerza teológica y lexical de «no pudo» y «ningún milagro», junto con la nota sobre δύναμις, pero se mejora la naturalidad y fidelidad sintáctica del español al reformular la cláusula final con la secuencia idiomática «les impuso las manos ... y los sanó».
