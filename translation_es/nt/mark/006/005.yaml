translation:
  language: es
  text: Y no pudo hacer allí ningún milagro[a], excepto que les impuso las manos a unos pocos enfermos y los sanó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ninguna obra de poder» o «ningún acto de poder»; el griego dice literalmente «ningún poder», una expresión de Marcos para hechos milagrosos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδύνατο
  english_pob_choice: was not able
  chosen_spanish: no pudo
  alternatives_spanish:
  - no era capaz de
  - no le fue posible
  lexicon: BDAG
  rationale: El imperfecto de δύναμαι expresa incapacidad real. «No pudo» comunica con naturalidad esa imposibilidad sin suavizarla ni convertirla en mera falta de voluntad.
- source_word: ποιῆσαι
  english_pob_choice: to do
  chosen_spanish: hacer
  alternatives_spanish:
  - realizar
  - efectuar
  lexicon: BDAG
  rationale: ποιέω es amplio; «hacer» conserva la sencillez del griego y funciona bien con el sustantivo δύναμιν en español.
- source_word: οὐδεμίαν δύναμιν
  english_pob_choice: any mighty work
  chosen_spanish: ningún milagro
  alternatives_spanish:
  - ninguna obra de poder
  - ninguna obra poderosa
  - ningún acto de poder
  lexicon: BDAG
  rationale: En Marcos, δύναμις en este giro alude a hechos milagrosos o de poder. «Milagro» hace explícita esa fuerza de sentido para el lector español, pero se conserva la nota para no borrar la relación lexical con «poder».
- source_word: εἰ μὴ
  english_pob_choice: except that
  chosen_spanish: excepto que
  alternatives_spanish:
  - salvo que
  - excepto
  lexicon: BDAG
  rationale: Introduce la excepción al enunciado negativo. «Excepto que» mantiene clara la sintaxis del griego y enlaza naturalmente con la cláusula siguiente.
- source_word: ὀλίγοις
  english_pob_choice: a few
  chosen_spanish: unos pocos
  alternatives_spanish:
  - unos cuantos
  - un pequeño número de
  lexicon: BDAG
  rationale: «Unos pocos» reproduce la cuantificación reducida de forma idiomática y precisa.
- source_word: ἀρρώστοις
  english_pob_choice: sick people
  chosen_spanish: enfermos
  alternatives_spanish:
  - personas enfermas
  - los enfermos
  lexicon: BDAG
  rationale: El adjetivo sustantivado se vierte naturalmente como «enfermos»; el contexto ya indica que se trata de personas.
- source_word: ἐπιθεὶς τὰς χεῖρας
  english_pob_choice: he laid his hands on
  chosen_spanish: poniendo sobre ellos las manos
  alternatives_spanish:
  - al imponerles las manos
  - después de ponerles las manos
  lexicon: BDAG
  rationale: El participio aoristo con el objeto expresa la acción de imponer/poner las manos. «Poniendo sobre ellos las manos» conserva el gesto físico sin introducir un registro más eclesiástico que el texto no exige.
- source_word: ἐθεράπευσεν
  english_pob_choice: healed
  chosen_spanish: sanó
  alternatives_spanish:
  - curó
  - los sanó
  lexicon: BDAG
  rationale: «Sanó» es natural en español y mantiene el sentido de θεραπεύω en contexto de curación/restauración. «Curó» también sería posible, pero «sanó» suena más amplio y digno.
theological_decisions:
- issue: La posible tensión teológica en «no pudo» respecto de Jesús
  english_pob_reading: 'Retain the plain sense: ''he was not able to do any mighty work there'''
  chosen_spanish_reading: 'Conservar el sentido directo: «no pudo hacer allí ningún milagro»'
  alternative_spanish_readings:
  - «no quiso hacer allí ningún milagro»
  - «no hizo allí ningún milagro»
  rationale: El griego afirma incapacidad con δύναμαι bajo negación. La traducción debe preservar esa tensión textual sin resolverla anticipando una explicación teológica externa. La cláusula de excepción y el contexto inmediato ayudan a la lectura narrativa, pero este versículo no debe reescribirse como simple falta de voluntad.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El control cruzado informó acuerdo alto y la revisión más reciente no introdujo cambios; por eso se mantiene la decisión principal y solo se adapta al español con una equivalencia óptima que preserva la tensión del original.
  spanish_consistency_notes:
  - Se usa «milagro» en el texto principal por naturalidad comunicativa, pero la nota conserva la alternativa literal ligada a δύναμις.
  - Se mantiene «sanó» para θεραπεύω y no «curó», siguiendo un español bíblico claro sin perder precisión.
  - No se sustituye la negación de capacidad por una formulación de voluntad, para no diluir la afirmación del griego.
