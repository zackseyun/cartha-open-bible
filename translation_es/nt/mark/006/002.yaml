translation:
  language: es
  text: 'Y cuando llegó el sábado, comenzó a enseñar en la sinagoga. Y muchos que lo oyeron se quedaban asombrados, diciendo: «¿De dónde saca éste estas cosas? ¿Y qué es esta sabiduría que le ha sido dada, y tales obras poderosas[a] que se realizan por medio de sus manos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obras de poder» o «milagros». El plural griego δυνάμεις puede designar hechos milagrosos o manifestaciones de poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: γενομένου σαββάτου
  english_pob_choice: when the Sabbath came
  chosen_spanish: cuando llegó el sábado
  alternatives_spanish:
  - cuando vino el sábado
  - cuando el sábado llegó
  - al llegar el sábado
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia temporal. «Llegó el sábado» conserva el valor temporal de inicio del día sagrado en un español natural, sin volverlo demasiado literal ni perder el matiz narrativo.
- source_word: ἤρξατο διδάσκειν
  english_pob_choice: he began to teach
  chosen_spanish: comenzó a enseñar
  alternatives_spanish:
  - empezó a enseñar
  - comenzó a instruir
  lexicon: BDAG
  rationale: La perífrasis de incepción se vierte con un verbo natural en español. «Enseñar» mantiene el sentido amplio de instrucción pública en contexto sin añadir contenido doctrinal.
- source_word: ἐν τῇ συναγωγῇ
  english_pob_choice: in the synagogue
  chosen_spanish: en la sinagoga
  alternatives_spanish:
  - en la asamblea
  - en la sinagoga judía
  lexicon: BDAG
  rationale: En este contexto judío, «sinagoga» es el equivalente directo y claro, sin necesidad de expansión.
- source_word: οἱ πολλοὶ ἀκούοντες
  english_pob_choice: many who heard him
  chosen_spanish: muchos que lo oyeron
  alternatives_spanish:
  - muchos al oírlo
  - los muchos que lo oían
  lexicon: BDAG
  rationale: El participio queda bien en una relativa simple en español. «Lo oyeron» hace explícito el objeto implícito del contexto y evita una formulación forzada.
- source_word: ἐξεπλήσσοντο
  english_pob_choice: were astonished
  chosen_spanish: quedaban asombrados
  alternatives_spanish:
  - estaban asombrados
  - quedaron asombrados
  lexicon: BDAG
  rationale: El imperfecto sugiere una reacción continua. «Quedaban asombrados» preserva esa duración mejor que un pretérito puntual.
- source_word: Πόθεν τούτῳ ταῦτα
  english_pob_choice: Where did this man get these things?
  chosen_spanish: ¿De dónde saca éste estas cosas?
  alternatives_spanish:
  - ¿De dónde obtuvo éste estas cosas?
  - ¿De dónde le vienen a éste estas cosas?
  lexicon: BDAG
  rationale: «De dónde» expresa origen; «saca» es un equivalente idiomático que comunica con naturalidad la idea de obtener/recibir. «Éste» conserva el matiz distante del demostrativo griego.
- source_word: τίς ἡ σοφία ἡ δοθεῖσα τούτῳ
  english_pob_choice: what is this wisdom given to him
  chosen_spanish: ¿Y qué es esta sabiduría que le ha sido dada?
  alternatives_spanish:
  - ¿Y cuál es esta sabiduría que le fue dada?
  - ¿Y qué sabiduría es ésta que le fue dada?
  lexicon: BDAG
  rationale: La pregunta griega es exclamativa/interrogativa. «Le ha sido dada» refleja bien el pasivo con perfecto de resultado implícito en español natural; «sabiduría» mantiene el término abstracto sin reinterpretarlo.
- source_word: δυνάμεις
  english_pob_choice: mighty works
  chosen_spanish: obras de poder
  alternatives_spanish:
  - obras poderosas
  - hechos poderosos
  - milagros
  lexicon: BDAG
  rationale: «Δυνάμεις» en Marcos puede referirse a manifestaciones poderosas o milagrosas. Se eligió «obras de poder» para conservar la fuerza semántica de la palabra griega sin reducirla automáticamente a «milagros».
- source_word: τοιαῦται
  english_pob_choice: such
  chosen_spanish: tales
  alternatives_spanish:
  - tan grandes
  - semejantes
  lexicon: BDAG
  rationale: «Tales» reproduce el valor cualitativo y demostrativo de τοιαῦται de forma breve y fiel.
- source_word: διὰ τῶν χειρῶν αὐτοῦ γινόμεναι
  english_pob_choice: happening through his hands
  chosen_spanish: que se realizan por sus manos
  alternatives_spanish:
  - que suceden por sus manos
  - que obran por sus manos
  - que acontecen por sus manos
  lexicon: BDAG
  rationale: La preposición διά con genitivo e imagen de las manos sugiere instrumento/medio. «Se realizan por sus manos» conserva la metáfora instrumental sin sonar extraña en español, y respeta el participio presente pasivo/neutro plural.
theological_decisions:
- issue: Alcance de δυνάμεις en el contexto de Marcos
  english_pob_reading: Rendered as 'mighty works' referring to miraculous works associated with Jesus' ministry.
  chosen_spanish_reading: «obras de poder» alude a acciones extraordinarias vinculadas con el ministerio de Jesús sin imponer de forma inmediata una etiqueta técnica como «milagros».
  alternative_spanish_readings:
  - milagros
  - obras poderosas
  - actos de poder
  rationale: El contexto sugiere hechos extraordinarios, pero el término griego mantiene amplitud semántica. La redacción elegida conserva esa amplitud y deja abierta la relación entre poder y milagro sin borrar la tensión lexical.
  doctrine_reference: Translation philosophy §1, §6
- issue: Tono despectivo del demostrativo τούτῳ
  english_pob_reading: Rendered with 'this man' in the first question to reflect the crowd's distancing or dismissive tone.
  chosen_spanish_reading: «éste» conserva la cercanía-despectiva del demostrativo sin añadir una categoría nominal que no está en el griego.
  alternative_spanish_readings:
  - este hombre
  - él
  - este
  rationale: En español, «éste» como sustantivado puede transmitir mejor el gesto de señalamiento/extrañeza del griego. Se evita «este hombre» porque introduce una expansión interpretativa no obligatoria.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del POB en inglés, que prefirió «mighty works» frente a «miracles» para reflejar δυνάμεις con mayor formalidad y menor carga interpretativa. En español, «obras de poder» sigue esa línea: conserva la amplitud semántica y evita cerrar prematuramente el término en «milagros». También se mantuvo la distinción entre la reacción continua del imperfecto y una acción puntual en la narración.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al texto base; este versículo no lo requiere.
  - Se mantiene «sinagoga» como término institucional estable.
  - Se conserva el tono distante del demostrativo con «éste», acorde con el matiz observado en el audit trail.
  - La estructura de la última cláusula intenta preservar la imagen instrumental de «por sus manos» sin volverla una paráfrasis generalizante.
