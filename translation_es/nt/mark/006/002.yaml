  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La decisión sobre δυνάμεις debe seguir la auditoría inglesa revisada hacia «mighty works»; en español, «obras poderosas» alinea mejor con esa decisión que «obras de poder», sin cerrarlo a «milagros».
