  yaml_path: translation/nt/mark/006/002.yaml
  text: And when the Sabbath came[a], he began to teach in the synagogue. And many who heard him were astonished, saying, “Where did this man get these things? And what is this wisdom given to him, and such mighty works happening through his hands?”
  footnotes:
