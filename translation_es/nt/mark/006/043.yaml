translation:
  language: es
  text: Y recogieron doce cestas[a] llenas de fragmentos[b], y de los peces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Cestas» traduce κόφινοι con un término ampliamente natural en español; otras opciones posibles son «cestos», «canastos» o «canastas».
    reason: lexical_alternative
  - marker: b
    text: O «trozos». El griego combina literalmente la idea de «fragmentos/piezas partidas», el número de los recipientes y la plenitud de ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦραν
  english_pob_choice: they picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  - juntaron
  lexicon: BDAG
  rationale: El aoristo de αἴρω aquí describe la acción de reunir lo que quedó después de la alimentación. «Recogieron» es natural en español moderno y conserva la idea concreta de reunir los restos sin sonar forzado.
- source_word: κλάσματα
  english_pob_choice: broken pieces
  chosen_spanish: trozos
  alternatives_spanish:
  - fragmentos
  - pedazos
  - restos
  lexicon: BDAG
  rationale: κλάσματα son piezas rotas o partidas. «Trozos» comunica bien la idea en español y evita la sonoridad más técnica de «fragmentos». Se mantiene el sentido de restos partidos sin sobreexplicar.
- source_word: δώδεκα κοφίνων πληρώματα
  english_pob_choice: twelve baskets full
  chosen_spanish: doce canastos llenos
  alternatives_spanish:
  - doce canastos repletos
  - doce canastos completos
  - el contenido de doce canastos
  lexicon: BDAG
  rationale: La construcción griega combina número, recipiente y la idea de plenitud. «Doce canastos llenos» refleja de forma transparente esa combinación en español y conserva la relación entre los canastos y su contenido sin forzar un calco como «canastos de llenura».
- source_word: κόφινος
  english_pob_choice: basket
  chosen_spanish: canasto
  alternatives_spanish:
  - cesto
  - canasta
  - cesta
  lexicon: BDAG
  rationale: κόφινος designa un recipiente para cargar alimentos o provisiones. «Canasto» es claro y natural en español bíblico contemporáneo; además evita la posible ambigüedad regional de «canasta» y mantiene un registro sobrio.
- source_word: πληρώματα
  english_pob_choice: basketfuls / full amounts
  chosen_spanish: llenos
  alternatives_spanish:
  - llenos hasta el borde
  - colmados
  - de lleno
  lexicon: BDAG
  rationale: πλήρωμα expresa la condición de lleno o la cantidad que llena. En esta frase, «llenos» comunica de modo idiomático la idea de recipientes llenos y conserva la tensión entre el recipiente y su contenido.
- source_word: ἀπὸ τῶν ἰχθύων
  english_pob_choice: from the fish
  chosen_spanish: y de los peces
  alternatives_spanish:
  - y de parte de los peces
  - y procedentes de los peces
  - y de los pescados
  lexicon: BDAG
  rationale: ἀπό tiene aquí matiz de procedencia o parte del total reunido. «De los peces» sigue de cerca el griego y evita añadir «algunos»; en español, la preposición ya comunica la procedencia/relación partitiva. Se usa «peces» para mantener el referente literal del texto.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión inglesa más reciente en su cautela: evita añadir «algunos» en la frase final y conserva una estructura breve que refleje la secuencia simple del griego. También toma en cuenta que el audit trail inglés pasó de una expresión más idiomática («basketfuls») a una más cercana a la construcción griega («baskets full»), por lo que el español mantiene «canastos llenos» en vez de una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
  - Se usa «canasto» como término general claro; no se introduce una distinción de tamaño que el contexto no exige.
  - 'Se conserva el paralelismo breve del griego: acción + cantidad + procedencia final.'
  - No se añade «algunos» en la segunda cláusula para respetar el ajuste de la revisión inglesa.
  - «Peces» se mantiene literal; no se sustituye por «pescados», ya que el referente es zoológico/narrativo, no culinario.
