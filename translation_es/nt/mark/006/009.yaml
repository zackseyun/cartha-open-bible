translation:
  language: es
  text: pero lleven sandalias[a], y no se pongan dos túnicas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vayan calzados con sandalias». El griego puede expresarse como el estado de estar calzados o, en traducción más dinámica, como la instrucción de llevar sandalias; el texto principal expresa la orden de forma natural en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - más bien
  lexicon: BDAG
  rationale: Marca contraste con las instrucciones anteriores de envío; en español, «pero» expresa de forma natural y concisa la oposición inmediata sin añadir matiz no sustentado.
- source_word: ὑποδεδεμένους
  english_pob_choice: wear
  chosen_spanish: con sandalias
  alternatives_spanish:
  - calzados con sandalias
  - llevando sandalias
  lexicon: BDAG
  rationale: El participio perfecto funciona de modo imperatival con el objeto «sandalias». En español, la construcción más fluida y fiel es «con sandalias», que conserva el estado resultante de estar calzados sin forzar una perífrasis pesada.
- source_word: σανδάλια
  english_pob_choice: sandals
  chosen_spanish: sandalias
  alternatives_spanish:
  - calzado
  - sandalias de cuero
  lexicon: BDAG
  rationale: Término directo y preciso para el plural griego; no requiere ampliación.
- source_word: μὴ ἐνδύσησθε
  english_pob_choice: do not put on
  chosen_spanish: no se pongan
  alternatives_spanish:
  - no se vistan con
  - no se revistan de
  lexicon: BDAG
  rationale: El aoristo medio subjuntivo con μή expresa prohibición. «No se pongan» preserva el acto de vestirse con la prenda, de manera semejante al valor verbal de «put on» en la traducción inglesa auditada.
- source_word: δύο
  english_pob_choice: two
  chosen_spanish: dos
  lexicon: BDAG
  rationale: Numeral simple, conservado sin cambio.
- source_word: χιτῶνας
  english_pob_choice: tunics
  chosen_spanish: túnicas
  alternatives_spanish:
  - prendas
  - camisas
  lexicon: BDAG
  rationale: χιτών designa la prenda básica usada junto al cuerpo. «Túnicas» es el equivalente más preciso y natural en español para este contexto.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador de nota [a] directamente en el texto principal junto a «pero», de modo que toda nota tenga anclaje explícito en la traducción.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o formulaciones de estilo eclesiástico no presentes en el texto.
  - «Túnicas» mantiene el sentido de χιτῶνας sin modernizarlo a «camisas», que sería anacrónico.
  - La estructura breve respeta el paralelismo y la prohibición del original griego.
