    issue: La nota [a] está colocada en el lugar equivocado.
    rationale: En el borrador, [a] aparece en «lo oyó», pero el contenido de la nota explica el imperfecto de ἔλεγεν («seguía diciendo»). Debe anclarse a «dijo».
  - severity: medium
    issue: La nota [b] está anclada a «decapité» pero explica ἠγέρθη.
    rationale: El contenido de la nota trata las alternativas de «ha sido levantado / ha resucitado» y la voz pasiva del verbo final. Debe anclarse a la frase final, no al verbo «decapité».
  - severity: low
