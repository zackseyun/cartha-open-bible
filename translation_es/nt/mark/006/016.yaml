    rationale: El inglés auditado privilegia «has been raised» para preservar la voz pasiva y la transparencia léxica de ἐγείρω. En español, «ha sido levantado» reproduce mejor ese matiz, mientras «ha resucitado» puede dejarse como alternativa.
  revised_spanish_text: 'Pero cuando Herodes lo oyó, dijo[a]: «Juan, a quien yo decapité, ha sido levantado[b]»'
