review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἀκούσας δὲ ὁ Ἡρῴδης = «Pero cuando Herodes lo oyó», ἔλεγεν = «dijo», Ὃν ἐγὼ ἀπεκεφάλισα Ἰωάννην = «Juan, a quien yo decapité», y ἠγέρθη se mantiene en voz pasiva. Sin embargo, hay un desajuste en las notas: la nota [a] está anclada a «lo oyó» pero habla del imperfecto de ἔλεγεν, no de ἀκούσας. Además, «ha sido resucitado» es aceptable, pero «ha sido levantado» refleja con más transparencia la base léxica de ἐγείρω y armoniza mejor con la explicación auditada, sin perder la voz pasiva.'
  spanish_quality_summary: 'El español es claro y natural. La frase principal suena bien en registro bíblico moderno. La mejora necesaria es principalmente de precisión editorial: mover la nota del imperfecto al verbo «dijo» y ajustar la otra nota para que corresponda al verbo final. «Resucitado» puede sonar un poco más interpretativo que «levantado»; una formulación principal más literal y una nota con alternativas mejora la fidelidad y la legibilidad.'
  glossary_alignment: No hay conflicto con la terminología de proyecto principal. «Juan», «Herodes» y la ausencia de términos sensibles como Yahvé/Mesías están bien. La decisión sobre ἠγέρθη debería favorecer una forma pasiva transparente; «levantado» como texto principal, con «resucitado» como alternativa, sigue mejor la rationale léxica y teológica documentada.
  issues:
