translation:
  language: es
  text: 'Pero cuando Herodes lo oyó, dijo[a]: «Juan, a quien yo decapité, ha sido levantado[b]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seguía diciendo», reflejando el tiempo imperfecto del verbo griego.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha sido resucitado» o «ha resucitado». El verbo griego es pasivo: «fue/ha sido levantado».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: when ... heard
  chosen_spanish: cuando ... lo oyó
  alternatives_spanish:
  - habiendo oído
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente en español para mostrar la relación con la acción principal. «Lo oyó» mantiene el objeto implícito del contexto y suena natural en la narración.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un desarrollo narrativo con matiz leve de contraste; «Pero» comunica bien el giro hacia la reacción de Herodes.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto puede sugerir habla repetida o continuada, pero en español narrativo «dijo» es la opción más fluida. La alternativa durativa queda implícita en la nota textual si se desea.
- source_word: Ὃν ἐγὼ ἀπεκεφάλισα Ἰωάννην
  english_pob_choice: John, whom I beheaded
  chosen_spanish: Juan, a quien yo decapité
  alternatives_spanish:
  - Juan, a quien yo había decapitado
  - El Juan a quien yo decapité
  lexicon: BDAG
  rationale: Se conserva el sentido directo de ἀποκεφαλίζω con «decapitar», que es el valor léxico específico. El orden español se normaliza poniendo primero «Juan» para una lectura natural, sin perder la relativa enfática del griego.
- source_word: ἀπεκεφάλισα
  english_pob_choice: beheaded
  chosen_spanish: decapité
  alternatives_spanish:
  - corté la cabeza a
  - había decapitado
  lexicon: BDAG
  rationale: El verbo significa específicamente «decapitar». En español, el pretérito simple encaja bien en el discurso directo de Herodes y mantiene la fuerza del acto.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - ha sido levantado
  - ha resucitado
  lexicon: BDAG
  rationale: Aunque οὗτος es demostrativo y enfático, en español una versión literal como «este» o «éste» resultaría poco natural en este contexto. La carga enfática se conserva por el choque de la afirmación completa, mientras la nota de traducción mantiene abierta la posibilidad del pasivo griego.
- source_word: ἠγέρθη
  english_pob_choice: has been raised
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - ha sido levantado
  - ha resucitado
  - fue resucitado
  lexicon: BDAG
  rationale: 'Se preserva la voz pasiva del verbo ἐγείρω: no se suaviza a una forma activa. «Ha sido resucitado» refleja con claridad que el griego dice literalmente «fue/ha sido levantado», sin resolver de más la implicación teológica.'
theological_decisions:
- issue: Voz pasiva de ἠγέρθη y lenguaje de resurrección
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido resucitado
  alternative_spanish_readings:
  - ha sido levantado
  - ha resucitado
  - fue resucitado
  rationale: El griego es pasivo y conviene conservar esa forma en español para no borrar la tensión textual. «Ha sido resucitado» mantiene la referencia a una acción recibida y evita convertir la frase en una formulación activa más interpretativa.
  doctrine_reference: Primacía del texto original; mantener la tensión léxica sin resolverla excesivamente.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó la expresión equivalente a «this one» por naturalidad, aunque conservó el matiz de οὗτος. En español se evita una calca como «este» y se mantiene la fluidez con una pasiva natural, preservando la voz pasiva del griego y el efecto narrativo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Jesús» no aparece en el versículo.
  - Se prefiere «decapitar» para ἀποκεφαλίζω por su precisión léxica.
  - Se conserva el pasivo de ἐγείρω con «ha sido resucitado» para no borrar la tensión del texto.
