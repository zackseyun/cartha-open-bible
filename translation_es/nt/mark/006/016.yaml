  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras correctas del griego y se ajusta la traducción principal de ἠγέρθη a «ha sido levantado», que preserva mejor la voz pasiva y la rationale léxica auditada. El resto del texto se mantiene porque es fiel y natural en español.
