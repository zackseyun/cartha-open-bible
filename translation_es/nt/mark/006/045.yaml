translation:
  language: es
  text: Y enseguida obligó a sus discípulos a subir a la barca y adelantarse al otro lado, rumbo a Betsaida[a], hasta que él mismo despidió[b] a la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Betsaida». La preposición griega puede expresarse de manera más general como dirección («rumbo a»/«hacia») o más específicamente como destino («a»).
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «hasta que despide a la multitud», con un verbo en presente dentro de una cláusula temporal; el español idiomático normalmente lo expresa en pasado en este contexto narrativo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - enseguida
  lexicon: BDAG
  rationale: εὐθύς marca urgencia narrativa en Marcos. «Al instante» conserva esa rapidez con un español natural y solemne, sin perder el valor temporal inmediato.
- source_word: ἠνάγκασεν
  english_pob_choice: compelled
  chosen_spanish: obligó
  alternatives_spanish:
  - forzó
  - compelió
  - hizo que
  lexicon: BDAG
  rationale: ἀναγκάζω indica presión fuerte o necesidad impuesta. «Obligó» transmite mejor la fuerza del verbo que un simple «hizo que», sin requerir violencia física explícita.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente directo y estable en los Evangelios, y conserva la relación maestro-discípulo del contexto.
- source_word: ἐμβῆναι εἰς τὸ πλοῖον
  english_pob_choice: to get into the boat
  chosen_spanish: subir a la barca
  alternatives_spanish:
  - embarcarse en la barca
  - entrar en la barca
  lexicon: BDAG
  rationale: La expresión describe entrar en la embarcación. «Subir a la barca» es idiomático en español bíblico contemporáneo y comunica el movimiento de embarque con naturalidad.
- source_word: προάγειν
  english_pob_choice: go ahead
  chosen_spanish: adelantarse
  alternatives_spanish:
  - ir delante
  - preceder
  lexicon: BDAG
  rationale: προάγω aquí implica ir por delante de otro. «Adelantarse» preserva la relación de precedencia entre los discípulos y Jesús, y suena natural en español.
- source_word: εἰς τὸ πέραν
  english_pob_choice: to the other side
  chosen_spanish: al otro lado
  alternatives_spanish:
  - a la otra orilla
  - al lado opuesto
  lexicon: BDAG
  rationale: La expresión es un giro idiomático para cruzar al lado opuesto del lago. «Al otro lado» es la forma más natural y fiel al sentido contextual.
- source_word: πρὸς Βηθσαϊδάν
  english_pob_choice: toward Bethsaida
  chosen_spanish: rumbo a Betsaida
  alternatives_spanish:
  - hacia Betsaida
  - en dirección a Betsaida
  - a Betsaida
  lexicon: BDAG
  rationale: πρός con acusativo expresa dirección. «Rumbo a» conserva esa orientación sin convertirla en una llegada segura; por eso evita «a Betsaida», que puede sonar más definitivo.
- source_word: ἕως
  english_pob_choice: until
  chosen_spanish: mientras
  alternatives_spanish:
  - hasta que
  - hasta el momento en que
  lexicon: BDAG
  rationale: Aquí ἕως introduce un límite temporal relativo a la acción de Jesús. «Mientras» funciona bien en español narrativo para indicar simultaneidad con el trasfondo de duración, aunque la cláusula subyacente tenga valor de límite temporal.
- source_word: ἀπολύει
  english_pob_choice: dismissed
  chosen_spanish: despedía
  alternatives_spanish:
  - despidió
  - dejaba ir
  - soltaba
  lexicon: BDAG
  rationale: ἀπολύω significa despedir o dejar ir. En el marco de una narración pasada, «despedía» refleja adecuadamente la acción de enviar al pueblo lejos de manera ordenada y mantiene la fluidez con «mientras».
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «gente». «La multitud» conserva mejor el matiz colectivo y el tono narrativo de los Evangelios.
theological_decisions:
- issue: La cláusula temporal con ἕως y el verbo ἀπολύει
  english_pob_reading: until he himself dismissed the crowd
  chosen_spanish_reading: mientras él mismo despedía a la multitud
  alternative_spanish_readings:
  - hasta que él mismo despidió a la multitud
  - hasta que él mismo despedía a la multitud
  rationale: El griego usa un verbo en presente dentro de una cláusula temporal que, en contexto narrativo, funciona de manera temporal-limítrofe. En español, «mientras» permite expresar la simultaneidad en curso sin ocultar que Jesús personalmente realiza la acción. Se evita forzar un pasado simple que haga perder la relación aspectual del original.
  doctrine_reference: Aspecto verbal griego y equivalencia funcional en cláusulas temporales narrativas
translation_notes:
  revision_awareness: Se tuvo en cuenta que la auditoría inglesa ya había resuelto sin cambios la redacción base y que el único punto especialmente sensible es la cláusula temporal con ἕως y ἀπολύει. La propuesta española mantiene la misma decisión direccional de la nota inglesa (dirección, no llegada) y preserva la fuerza de ἠνάγκασεν sin sobredimensionarla.
  spanish_consistency_notes:
  - Se mantuvo «barca» para πλοῖον por consistencia con español bíblico natural en contextos de navegación lacustre.
  - Se eligió «Betsaida» con ortografía española estándar y sin añadir artículo innecesario.
  - «Al instante» conserva la cadencia marcana de urgencia sin sonar coloquial en exceso.
  - La nota sobre «rumbo a» protege la distinción entre dirección y destino ya documentada en el audit trail inglés.
