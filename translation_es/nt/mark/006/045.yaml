  spanish_quality_summary: 'El español es claro y digno, pero la combinación «mientras ... despedía» suena interpretativa más que fiel al original. Además, las notas al pie están invertidas respecto del audit trail inglés: la nota [a] debería explicar la alternativa de «rumbo a/hacia Betsaida» frente a «a Betsaida», y la nota [b] debería explicar el presente griego «ἀπολύει» en una cláusula temporal, no «al otro lado».'
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. Las decisiones «discípulos», «barca», «multitud» son aceptables. La principal corrección es sintáctico-semántica: ἕως debe representarse como «hasta que», y conviene conservar la nota sobre el presente griego en la cláusula temporal, siguiendo el POB inglés.'
