  text: Καὶ ⸀εὐθὺς ἠνάγκασεν τοὺς μαθητὰς αὐτοῦ ἐμβῆναι εἰς τὸ πλοῖον καὶ προάγειν ⸂εἰς τὸ πέραν⸃ πρὸς Βηθσαϊδάν, ἕως αὐτὸς ⸀ἀπολύει τὸν ὄχλον.
base_translation:
  language: en
  yaml_path: translation/nt/mark/006/045.yaml
  text: And immediately he compelled his disciples to get into the boat and go ahead to the other side[a], toward Bethsaida[b], until he himself dismissed the crowd.
  footnotes:
  - marker: a
    text: Or 'to Bethsaida.' The Greek preposition can be rendered more generally as direction ('toward') or more specifically as destination ('to').
    reason: lexical_alternative
  - marker: b
    text: Greek 'until he dismisses the crowd,' with a present-tense verb in a temporal clause; English idiom commonly renders it as past in this narrative context.
    reason: lexical_alternative
