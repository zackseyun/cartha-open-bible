    changes_summary: Removed 'them' after 'blessed' to avoid implying he blessed the loaves and fish directly rather than offering a blessing; kept the rest essentially unchanged. Also retained the implicit object 'them' after 'set before' to match the Greek.
translation:
  language: es
  text: Y tomando los cinco panes y los dos peces, mirando al cielo, bendijo y partió los panes, y seguía dándolos a sus discípulos para ponerlos delante de ellos, y repartió los dos peces entre todos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: tomando
  alternatives_spanish:
  - habiendo tomado
  lexicon: BDAG
  rationale: El participio aoristo introduce la secuencia de acciones; en español, ‘tomando’ conserva la relación participial y fluye de manera natural.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - loaves
  lexicon: BDAG
  rationale: En este contexto de alimentación, ἄρτος alude a panes concretos. ‘Panes’ es claro y natural en español; ‘hogazas’ sería más específico pero menos neutral.
- source_word: ἰχθύας
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescados
  lexicon: BDAG
  rationale: El plural de ἰχθύς se expresa naturalmente como ‘peces’ en español.
- source_word: ἀναβλέψας εἰς τὸν οὐρανὸν
  english_pob_choice: looking up to heaven
  chosen_spanish: mirando al cielo
  alternatives_spanish:
  - levantando la vista al cielo
  - mirando hacia el cielo
  lexicon: BDAG
  rationale: ‘Cielo’ comunica bien οὐρανός en español y mantiene el gesto de dirigir la vista hacia arriba. ‘Al cielo’ evita una fórmula demasiado literal que sonaría pesada.
- source_word: εὐλόγησεν
  english_pob_choice: blessed
  chosen_spanish: los bendijo
  alternatives_spanish:
  - bendijo
  - dio gracias
  lexicon: BDAG
  rationale: Se conserva el verbo ‘bendecir’ para εὐλογέω, siguiendo la primacía del dato léxico. El objeto se entiende por el contexto, pero en español la construcción con objeto explícito resulta natural.
- source_word: κατέκλασεν
  english_pob_choice: broke the loaves
  chosen_spanish: partió los panes
  alternatives_spanish:
  - quebró los panes
  - los partió
  lexicon: BDAG
  rationale: ‘Partió’ es una forma idiomática y clara para el acto de romper el pan en contexto de comida; mantiene el objeto explícito como en griego.
- source_word: ἐδίδου
  english_pob_choice: kept giving
  chosen_spanish: seguía dándolos
  alternatives_spanish:
  - iba dándolos
  - seguía entregándolos
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida. ‘Seguía dándolos’ preserva esa iteración de manera natural en español.
- source_word: μαθηταῖς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  lexicon: BDAG
  rationale: Se representa el posesivo explícito αὐτοῦ con ‘sus discípulos’, forma natural y fiel al texto.
- source_word: ἵνα παρατιθῶσιν αὐτοῖς
  english_pob_choice: to set before them
  chosen_spanish: para que los pusieran delante de ellos
  alternatives_spanish:
  - para presentárselos
  - para servirles
  lexicon: BDAG
  rationale: ‘Pusieran delante de ellos’ conserva la imagen concreta de παρατίθημι en contexto de comida. ‘Ellos’ se refiere a la multitud/pueblo presente, de acuerdo con el contexto narrativo.
- source_word: ἐμέρισεν
  english_pob_choice: divided
  chosen_spanish: repartió
  alternatives_spanish:
  - dividió
  - distribuyó
  lexicon: BDAG
  rationale: ‘Repartió’ expresa bien el sentido de distribuir o asignar porciones en español y suena más natural que ‘dividió’ en este contexto.
- source_word: πᾶσιν
  english_pob_choice: among them all
  chosen_spanish: entre todos
  alternatives_spanish:
  - para todos
  - a todos
  lexicon: BDAG
  rationale: La idea distributiva del dativo plural se expresa bien con ‘entre todos’, que refleja la participación de la totalidad del grupo.
theological_decisions:
- issue: Renderización de εὐλόγησεν en contexto de comida
  english_pob_reading: he blessed
  chosen_spanish_reading: los bendijo
  alternative_spanish_readings:
  - dio gracias
  - bendijo
  rationale: Se evita sustituir εὐλόγησεν por un verbo de otra familia léxica. ‘Bendijo’ preserva la tensión documentada entre bendecir y dar gracias, sin borrar el dato textual.
  doctrine_reference: Principio de primacía del texto original; conservar tensiones léxicas donde el griego las permite
- issue: Referencia de αὐτοῖς en la cláusula final de propósito
  english_pob_reading: to set before them
  chosen_spanish_reading: para que los pusieran delante de ellos
  alternative_spanish_readings:
  - para presentárselos
  - para servirles
  rationale: El contexto apunta a la multitud, no a los discípulos. Se explicita ‘de ellos’ para evitar ambigüedad en español, manteniendo la relación de propósito y el gesto concreto de colocar la comida delante de los comensales.
  doctrine_reference: Claridad referencial sin añadir contenido ajeno al contexto inmediato
- issue: Valor aspectual del imperfecto ἐδίδου
  english_pob_reading: kept giving
  chosen_spanish_reading: seguía dándolos
  alternative_spanish_readings:
  - iba dándolos
  - daba
  rationale: El imperfecto sugiere acción continuada o reiterada. ‘Seguía dándolos’ mantiene ese matiz mejor que un pretérito simple.
  doctrine_reference: Respeto del aspecto verbal griego en la medida que el español lo permite
translation_notes:
  revision_awareness: Se ajustó el texto español para evitar notas sin anclaje y se optó por una redacción continua, sin marcas de nota al pie, porque las decisiones léxicas clave ya quedan integradas en la traducción publicada.
  spanish_consistency_notes:
  - Se mantuvo ‘Y’ inicial para reflejar la coordinación narrativa del griego.
  - Se prefirió ‘panes’ y ‘peces’ por naturalidad y transparencia, sin introducir tecnicismos innecesarios.
  - Se conservó la secuencia verbal con participios y aoristos de modo fluido en español.
  - No se usaron ‘SEÑOR’, ‘Cristo’ ni otras sustituciones no requeridas por este versículo.
