source:
  edition: SBLGNT
  text: καὶ λαβὼν τοὺς πέντε ἄρτους καὶ τοὺς δύο ἰχθύας ἀναβλέψας εἰς τὸν οὐρανὸν εὐλόγησεν καὶ κατέκλασεν τοὺς ἄρτους καὶ ἐδίδου τοῖς μαθηταῖς ⸀αὐτοῦ ἵνα ⸀παρατιθῶσιν αὐτοῖς, καὶ τοὺς δύο ἰχθύας ἐμέρισεν πᾶσιν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/006/041.yaml
  text: And taking the five loaves and the two fish[a], looking up to heaven, he blessed and broke the loaves, and kept giving them to his disciples to set before them[b], and he divided the two fish among them all.
  footnotes:
  - marker: a
    text: Or, 'he gave thanks.' The Greek verb is 'blessed' (εὐλόγησεν), which in meal contexts can overlap in sense with giving thanks.
    reason: lexical_alternative
  - marker: b
    text: Or 'to set before them'.
    reason: previous_rendering
