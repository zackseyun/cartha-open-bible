translation:
  language: es
  text: Y llevó su cabeza en una bandeja y la dio a la muchacha[a], y la muchacha la dio a su madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Bandeja» traduce aquí el objeto de servicio del griego πίναξ; también podría entenderse como «plato» o «fuente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκεν
  english_pob_choice: brought
  chosen_spanish: llevó
  alternatives_spanish:
  - trajo
  - condujo
  lexicon: BDAG
  rationale: En este contexto narrativo, φέρω describe el acto concreto de llevar o traer la cabeza ya cortada al lugar del banquete. «Llevó» conserva la acción física sin añadir matices no presentes; «trajo» también sería posible, pero «llevó» encaja mejor con el movimiento hacia el destinatario en español.
- source_word: τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: his head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - la cabeza de él
  - su propia cabeza
  lexicon: BDAG
  rationale: El posesivo español «su» reproduce de forma natural la referencia a Juan el Bautista, ya establecida por el contexto inmediato. «La cabeza de él» es más explícita pero menos idiomática; «su propia cabeza» añade énfasis que el griego no exige.
- source_word: ἐπὶ πίνακι
  english_pob_choice: on a platter
  chosen_spanish: en una bandeja
  alternatives_spanish:
  - en un plato
  - en una fuente
  lexicon: BDAG
  rationale: πίναξ puede referirse a una pieza de servicio para comida, como plato, bandeja o fuente. En español, «bandeja» comunica bien el objeto de servicio y evita una imagen demasiado moderna o demasiado específica; mantiene la alternativa léxica sin forzar «platter» como calco.
- source_word: ἔδωκεν
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - entregó
  - le pasó
  lexicon: BDAG
  rationale: δίδωμι se traduce de manera directa como «dar». Repetir «dio» en ambas cláusulas conserva la repetición narrativa del griego y evita suavizar el gesto violento mediante verbos más interpretativos.
- source_word: τῷ κορασίῳ / τὸ κοράσιον
  english_pob_choice: the girl
  chosen_spanish: la muchacha
  alternatives_spanish:
  - la niña
  - la joven
  lexicon: BDAG
  rationale: κοράσιον designa a una muchacha o chica joven. «Muchacha» preserva la referencia a una joven sin infantilizarla demasiado con «niña» ni introducir una valoración más adulta con «joven».
- source_word: τῇ μητρὶ αὐτῆς
  english_pob_choice: to her mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre de ella
  lexicon: BDAG
  rationale: La dativo español natural es «a su madre». Esta forma conserva la cadena de entrega del relato con claridad y fluidez, sin necesidad de la construcción más pesada «a la madre de ella».
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y coincide en sustancia con la solución inglesa auditada: movimiento físico de la cabeza, recipiente de servicio, y repetición de «dar» en ambas cláusulas. No se detectaron revisiones aplicadas en el expediente inglés; por eso la elección española mantiene la misma línea semántica sin introducir cambios interpretativos.'
  spanish_consistency_notes:
  - Se mantiene «muchacha» para κοράσιον a fin de conservar uniformidad con el matiz de joven mujer y evitar alternancias innecesarias dentro del versículo.
  - Se conserva la repetición de «dio» en ambas cláusulas para reflejar el paralelismo verbal del griego.
  - Se usa «su» para el posesivo de la cabeza porque el referente es claro por el contexto y la frase resulta idiomática en español.
