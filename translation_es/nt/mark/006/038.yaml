translation:
  language: es
  text: 'Pero él les dice: «¿Cuántos panes[a] tienen? Vayan y vean». Y después de averiguarlo, dicen: «Cinco, y dos peces».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «Cinco, y dos peces», con «panes» implícito por la pregunta precedente.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: El griego usa presente histórico. En español, "dice" conserva mejor ese valor narrativo que un pasado simple, y mantiene la vivacidad del diálogo sin sonar forzado.
- source_word: Πόσους ἔχετε ἄρτους
  english_pob_choice: How many loaves do you have?
  chosen_spanish: ¿Cuántos panes tienen?
  alternatives_spanish:
  - ¿Cuántos panes de pan tienen?
  - ¿Cuántas hogazas tienen?
  lexicon: BDAG
  rationale: ἄρτους designa panes/loaves concretos, no "pan" abstracto. "Panes" es el conteo natural en español y refleja la pregunta por cantidad.
- source_word: ὑπάγετε
  english_pob_choice: Go
  chosen_spanish: Vayan
  alternatives_spanish:
  - Vayan allá
  - Vayan y miren
  lexicon: BDAG
  rationale: El imperativo pide que se dirijan a verificar. "Vayan" es la forma idiomática y directa; evita sobretraducir con matices no presentes en el griego.
- source_word: ἴδετε
  english_pob_choice: see
  chosen_spanish: vean
  alternatives_spanish:
  - miren
  - comprueben
  lexicon: BDAG
  rationale: En combinación con ὑπάγετε, el sentido es "vayan y vean"; "vean" conserva la brevedad y la fuerza del mandato.
- source_word: γνόντες
  english_pob_choice: when they found out
  chosen_spanish: cuando lo averiguan
  alternatives_spanish:
  - después de saberlo
  - cuando se enteran
  lexicon: BDAG
  rationale: El participio aoristo marca anterioridad respecto del verbo principal. "Cuando lo averiguan" refleja esa secuencia y mantiene el presente histórico de la narración.
- source_word: Πέντε, καὶ δύο ἰχθύας
  english_pob_choice: Five, and two fish
  chosen_spanish: Cinco, y dos peces
  alternatives_spanish:
  - Cinco, y dos pescados
  - Cinco, y dos peces de pescado
  lexicon: BDAG
  rationale: El griego expresa literalmente "cinco, y dos peces", con "panes" implícito desde la pregunta anterior. En español puede conservarse la misma elipsis sin añadir la palabra implícita en el texto principal.
- source_word: ἰχθύας
  english_pob_choice: fish
  chosen_spanish: peces
  alternatives_spanish:
  - pescados
  - peces
  lexicon: BDAG
  rationale: '"Peces" es el plural más directo y neutral en español. "Pescados" suena más culinario y se aparta del valor léxico básico del término.'
translation_notes:
  revision_awareness: La revisión inglesa reciente volvió a los verbos históricos presentes ("says", "say") para reflejar mejor el estilo narrativo de Marcos. Esta versión española conserva ese efecto con presentes ("dice", "averiguan", "dicen") y mantiene la elipsis del cierre para respetar el relieve léxico del original.
  spanish_consistency_notes:
  - Se mantiene el presente histórico en el discurso directo y en la narración inmediata.
  - '"Panes" se usa para ἄρτους, no "pan" abstracto, por tratarse de unidades contables.'
  - La respuesta final conserva la elipsis del griego y la aclara con nota.
  - '"Peces" se eligió por valor léxico neutral frente a "pescados".'
