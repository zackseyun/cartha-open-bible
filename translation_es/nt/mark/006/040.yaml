translation:
  language: es
  text: Y se recostaron en grupos de cien y de cincuenta[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «canteros, canteros», una imagen que sugiere filas o secciones ordenadas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέπεσαν
  english_pob_choice: reclined
  chosen_spanish: se recostaron
  alternatives_spanish:
  - se reclinaron
  - tomaron su lugar para comer
  lexicon: BDAG
  rationale: En el contexto de una comida multitudinaria, ἀναπίπτω describe tomar la postura de comer recostado. En español, «se recostaron» comunica esa acción con naturalidad y conserva mejor el matiz de banquete/comida que «se sentaron».
- source_word: πρασιαὶ πρασιαὶ
  english_pob_choice: in groups
  chosen_spanish: en grupos
  alternatives_spanish:
  - en filas
  - en secciones
  - como canteros
  lexicon: BDAG
  rationale: La repetición de πρασιά es literalmente algo como «canteros» o «cuadros de jardín», pero aquí funciona de modo idiomático para expresar disposición ordenada. «En grupos» transmite el sentido principal en español sin forzar una imagen agrícola que el contexto ya no exige en el cuerpo principal.
- source_word: κατὰ ἑκατὸν
  english_pob_choice: of hundreds
  chosen_spanish: de cientos
  alternatives_spanish:
  - por cientos
  - en grupos de cien
  lexicon: BDAG
  rationale: La preposición κατά con numerales tiene valor distributivo. «De cientos» mantiene la coordinación breve y paralela del griego y expresa que los grupos estaban organizados por centenas.
- source_word: κατὰ πεντήκοντα
  english_pob_choice: of fifties
  chosen_spanish: de cincuenta
  alternatives_spanish:
  - por cincuenta
  - en grupos de cincuenta
  lexicon: BDAG
  rationale: Como en la frase anterior, κατά señala distribución. «De cincuenta» preserva la paralelidad con «de cientos» y es idiomático en español.
translation_notes:
  revision_awareness: El texto griego no presenta variantes textuales significativas que afecten la traducción en este versículo; la decisión principal es lexical e imagética, especialmente respecto de πρασιαὶ πρασιαὶ y del valor distributivo de κατά con numerales.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología litúrgica innecesaria porque el versículo no contiene el nombre divino ni vocabulario cristológico.
  - «Se recostaron» mantiene la escena de comida con naturalidad en español y conserva mejor el matiz de mesa que «se sentaron».
  - La nota al pie preserva la imagen literal de πρασιαὶ πρασιαὶ, como hace el contexto auditado en inglés, sin desplazar el sentido principal del cuerpo del texto.
