review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: ἀνέπεσαν se entiende correctamente como postura de comida, πρασιαὶ πρασιαὶ se vierte de forma idiomática como agrupación ordenada, y κατὰ ἑκατὸν / κατὰ πεντήκοντα conserva la distribución numérica. Sin embargo, «de cincuenta» queda elíptico de manera menos natural en español que el paralelo pleno «de cincuenta», y «de cientos» también suena menos preciso que «de cien».'
  spanish_quality_summary: La redacción es clara, pero «en grupos de cientos y de cincuenta» no suena del todo idiomática en español bíblico natural. La formulación «en grupos de cien y de cincuenta» es más fluida, precisa y ampliamente legible. La nota al pie es adecuada, aunque «canteros» puede entenderse; se puede mantener porque ya explica la imagen.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones «se recostaron» y «en grupos» son defendibles. El ajuste recomendado afecta la naturalidad y precisión numérica del español, no la terminología teológica.
  issues:
  - severity: medium
    issue: «en grupos de cientos y de cincuenta» suena poco natural e internamente asimétrico en español
    rationale: El griego expresa distribución por unidades de 100 y 50. En español, «grupos de cien y de cincuenta» o «de cien y de cincuenta personas» comunica mejor esa estructura. «De cientos» puede sugerir cantidades indeterminadas en centenas, no necesariamente grupos de exactamente cien.
  revised_spanish_text: Y se recostaron en grupos de cien y de cincuenta[a].
  revised_footnotes:
  - marker: a
    text: Lit. «canteros, canteros», una imagen que sugiere filas o secciones ordenadas.
    reason: lexical_alternative
