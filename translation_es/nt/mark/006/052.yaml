translation:
  language: es
  text: porque no entendieron lo de los panes[a], sino que su corazón estaba endurecido[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no captaron el significado de los panes».
    reason: lexical_alternative
  - marker: b
    text: O «su corazón estaba calloso».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνῆκαν
  english_pob_choice: did not understand
  chosen_spanish: no habían entendido
  alternatives_spanish:
  - no comprendían
  - no habían captado
  lexicon: BDAG / συνίημι
  rationale: συνίημι expresa entender, comprender o captar el sentido. «No habían entendido» es natural en español, mantiene el fracaso cognitivo y deja abierta la dimensión espiritual del contexto sin añadir explicación extratextual.
- source_word: ἐπὶ τοῖς ἄρτοις
  english_pob_choice: about the loaves
  chosen_spanish: lo de los panes
  alternatives_spanish:
  - acerca de los panes
  - sobre los panes
  - el significado de los panes
  lexicon: BDAG / ἐπί + dativo
  rationale: Aquí ἐπί con dativo es idiomático y apunta a lo que los panes significaban en el episodio de la alimentación. «Lo de los panes» comunica en español, de forma natural, el referente narrativo y su alcance interpretativo sin forzar una paráfrasis explicativa.
- source_word: ἄρτοις
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - panes de trigo
  - bollos
  - hogazas
  lexicon: BDAG / ἄρτος
  rationale: ἄρτος puede significar pan o hogaza. En este contexto narrativo, el plural alude a los panes del milagro; «panes» es la equivalencia más directa y clara en español.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - mente
  - interior
  lexicon: BDAG / καρδία
  rationale: En el uso bíblico, καρδία designa el centro interior de la persona, incluyendo percepción y disposición. «Corazón» conserva ese alcance tradicional y es plenamente inteligible en español.
- source_word: πεπωρωμένη
  english_pob_choice: hardened
  chosen_spanish: endurecido
  alternatives_spanish:
  - endurecido
  - insensibilizado
  - lleno de callos
  lexicon: BDAG / πωρόω
  rationale: πωρόω sugiere dureza o insensibilidad metafórica. «Endurecido» reproduce bien la imagen y evita una expresión demasiado clínica o extraña; «calloso» en español sería menos natural aquí y podría sonar demasiado corporal.
- source_word: ἀλλ’ ἦν
  english_pob_choice: but was
  chosen_spanish: sino que ... estaba
  alternatives_spanish:
  - pero ... estaba
  - más bien ... estaba
  lexicon: BDAG
  rationale: La construcción adversativa introduce contraste con la cláusula anterior. «Sino que» en español enlaza con naturalidad la negación previa y preserva el giro contrastivo del griego.
- source_word: αὐτῶν ἡ καρδία
  english_pob_choice: their hearts
  chosen_spanish: su corazón
  alternatives_spanish:
  - su corazón
  - sus corazones
  lexicon: BDAG / καρδία
  rationale: El griego usa un singular colectivo («su corazón»). Mantener el singular refleja mejor la forma del texto y conserva la idea de una condición compartida. En español, el singular suena natural y permite esa lectura colectiva.
theological_decisions:
- issue: Alcance de la incomprensión respecto de los panes
  english_pob_reading: they did not understand about the loaves / did not grasp the significance of the loaves
  chosen_spanish_reading: no habían entendido lo de los panes
  alternative_spanish_readings:
  - no habían entendido acerca de los panes
  - no habían captado el significado de los panes
  rationale: 'La frase española mantiene la tensión del texto: los discípulos no solo no recordaron el hecho, sino que no percibieron su significado. No se explicita más de lo que el contexto inmediato exige, preservando el peso interpretativo de la escena.'
  doctrine_reference: 'Transparencia textual: conservar la incomprensión narrativa sin resolverla en una formulación doctrinal más fuerte.'
- issue: Naturaleza de la condición en πεπωρωμένη
  english_pob_reading: their hearts were hardened
  chosen_spanish_reading: su corazón estaba endurecido
  alternative_spanish_readings:
  - sus corazones estaban endurecidos
  - su corazón estaba calloso
  rationale: La traducción conserva la metáfora de dureza e insensibilidad sin afirmar aquí una causa judicial o una condena más específica. «Endurecido» deja intacta la tensión teológica del pasaje, tal como lo hace el inglés POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el sentido confirmado por el griego: una negación de comprensión respecto de los panes y una condición interna de dureza. Se prefirió una formulación española idiomática («no habían entendido lo de los panes») para reflejar el valor idiomático de ἐπὶ τοῖς ἄρτοις sin convertirlo en paráfrasis interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «corazón» para καρδία, en coherencia con el uso bíblico estándar y con el alcance interior del término.
  - Se usa «endurecido» para πεπωρωμένη, en línea con la metáfora de dureza espiritual sin sobreinterpretarla.
  - Se conserva el singular colectivo «su corazón» para reflejar la forma griega y la unidad de la condición descrita.
  - «Panes» se prefiere a una traducción más explicativa para preservar el referente narrativo concreto del milagro.
