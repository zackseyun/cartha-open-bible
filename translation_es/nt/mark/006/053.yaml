    issue: La expresión 'a la tierra' es demasiado literal y menos idiomática que 'a tierra' en contexto náutico.
    rationale: El griego γῆν se conserva correctamente como 'land/tierra', pero en español de navegación 'llegar a tierra' comunica la misma idea con mayor naturalidad sin perder la nota de literalidad, que puede mantenerse en la nota al pie.
  - severity: medium
    issue: '''Amarraron allí'' no reproduce de la mejor manera el matiz náutico de προσωρμίσθησαν.'
    rationale: El verbo griego describe llevar la embarcación a amarre/atraco. 'Atracaron allí' suena más náutico y menos ambiguo; si se mantiene 'amarraron', sería mejor explicitar 'la barca'.
  revised_spanish_text: Y después de haber cruzado a tierra[a], llegaron a Genesaret y atracaron allí[b].
