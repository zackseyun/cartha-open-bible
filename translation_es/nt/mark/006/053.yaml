translation:
  language: es
  text: Y después de haber cruzado a tierra[a], llegaron a Genesaret y atracaron allí[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la orilla»; el griego dice literalmente «a la tierra», en un contexto de llegada desde la barca.
    reason: lexical_alternative
  - marker: b
    text: O «amarraron allí», «anclaron allí» o «arribaron»; el verbo tiene un sentido náutico específico de llevar la barca al amarre.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαπεράσαντες
  english_pob_choice: after crossing over
  chosen_spanish: después de haber cruzado
  alternatives_spanish:
  - habiendo cruzado
  - después de cruzar
  lexicon: BDAG
  rationale: El participio aoristo indica una acción anterior al verbo principal. En español, «después de haber cruzado» conserva claramente la anterioridad sin sonar mecánico.
- source_word: ἐπὶ τὴν γῆν ... ἦλθον εἰς Γεννησαρὲτ
  english_pob_choice: to the land, they came to Gennesaret
  chosen_spanish: a la tierra, llegaron a Genesaret
  alternatives_spanish:
  - a la orilla, llegaron a Genesaret
  - a tierra, llegaron a Genesaret
  lexicon: BDAG
  rationale: γῆ puede significar «tierra», «suelo» o «tierra firme». En este contexto náutico, «a la tierra» conserva el sentido literal del griego y evita definir más de lo que el texto dice; «orilla» queda como alternativa contextual.
- source_word: Γεννησαρὲτ
  english_pob_choice: Gennesaret
  chosen_spanish: Genesaret
  alternatives_spanish:
  - Genezaret
  lexicon: transliteration
  rationale: Es un nombre propio geográfico y se translitera al español. «Genesaret» es la forma usual y clara en español bíblico moderno.
- source_word: προσωρμίσθησαν
  english_pob_choice: moored there
  chosen_spanish: amarraron allí
  alternatives_spanish:
  - anclaron allí
  - arribaron allí
  - encallaron allí
  lexicon: BDAG
  rationale: El verbo tiene un matiz náutico de llevar la barca al amarre. «Amarraron allí» comunica ese sentido en español natural sin reducirlo simplemente a «llegaron».
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se mantiene la simple unión narrativa del griego sin añadir fuerza interpretativa.
