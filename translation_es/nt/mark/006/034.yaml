translation:
  language: es
  text: Y al desembarcar, vio una gran multitud, y tuvo compasión de ellos[a], porque eran como ovejas sin pastor[b]. Y comenzó a enseñarles muchas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue movido a compasión por ellos».'
    reason: lexical_alternative
  - marker: b
    text: La imagen de «ovejas sin pastor» evoca el lenguaje bíblico sobre un pueblo sin liderazgo fiel; compárese Núm. 27:17; 1 Rey. 22:17; Eze. 34:5.
    reason: cross_reference
lexical_decisions:
- source_word: ἐξελθὼν
  english_pob_choice: when he went ashore
  chosen_spanish: al desembarcar
  alternatives_spanish:
  - cuando salió
  - cuando bajó a tierra
  lexicon: BDAG
  rationale: El participio aoristo expresa la salida de un lugar; en el contexto narrativo de Marcos 6:32–33, el sentido situacional es que Jesús sale de la barca y llega a tierra. «Al desembarcar» reproduce ese valor contextual de manera natural en español sin explicitar más de lo que el griego exige.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - observó
  - miró
  lexicon: BDAG
  rationale: El aoristo de ὁράω es directo y no requiere matiz especial. «Vio» conserva la sencillez y la correspondencia semántica del original.
- source_word: πολὺν ὄχλον
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una multitud numerosa
  lexicon: BDAG
  rationale: ὄχλος significa «multitud» o «muchedumbre»; el adjetivo intensifica el tamaño. «Una gran multitud» conserva el valor cuantitativo y suena natural en español bíblico contemporáneo.
- source_word: ἐσπλαγχνίσθη
  english_pob_choice: he had compassion
  chosen_spanish: tuvo compasión
  alternatives_spanish:
  - se compadeció
  - fue movido con compasión
  lexicon: BDAG
  rationale: El verbo expresa una compasión profunda y visceral. «Tuvo compasión» es claro y fiel; mantiene la fuerza del verbo sin convertirlo en una paráfrasis explicativa.
- source_word: ἐπ’ αὐτούς
  english_pob_choice: on them
  chosen_spanish: de ellos
  alternatives_spanish:
  - sobre ellos
  - por ellos
  lexicon: BDAG
  rationale: En español, con «tener compasión», la preposición más idiomática es «de». Aunque el griego usa ἐπί + acusativo, traducir «de ellos» comunica de manera natural el objeto de la compasión sin perder la referencia.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  lexicon: BDAG
  rationale: Introduce la razón de la compasión de Jesús. «Porque» es la forma más directa y transparente en español.
- source_word: ὡς πρόβατα μὴ ἔχοντα ποιμένα
  english_pob_choice: like sheep without a shepherd
  chosen_spanish: como ovejas sin pastor
  alternatives_spanish:
  - como ovejas que no tenían pastor
  - como ovejas sin un pastor
  lexicon: BDAG
  rationale: La imagen se ha conservado sin explicitarla en el texto principal. «Pastor» mantiene el paralelismo bíblico y la metáfora pastoral; «ovejas» es la forma natural en español para πρόβατα en este contexto.
- source_word: ἤρξατο διδάσκειν
  english_pob_choice: he began to teach
  chosen_spanish: comenzó a enseñar
  alternatives_spanish:
  - empezó a enseñar
  - se puso a enseñar
  lexicon: BDAG
  rationale: La construcción incoativa se rinde con «comenzó a». «Enseñar» traduce adecuadamente διδάσκειν y evita una suavización innecesaria.
- source_word: αὐτοὺς πολλά
  english_pob_choice: them many things
  chosen_spanish: muchas cosas
  alternatives_spanish:
  - mucho
  - largamente
  lexicon: BDAG
  rationale: πολλά aquí indica amplitud o abundancia del contenido enseñado. «Muchas cosas» conserva la literalidad comunicativa del griego y reproduce el valor objeto-cantidad sin forzar un adverbio interpretativo.
theological_decisions:
- issue: Imagen pastoral de ovejas sin pastor
  english_pob_reading: Retain the metaphor 'like sheep without a shepherd' without explicating its Old Testament background in the main text.
  chosen_spanish_reading: Conservar la metáfora «como ovejas sin pastor» sin ampliarla en el cuerpo del texto.
  alternative_spanish_readings:
  - como ovejas sin liderazgo espiritual
  - como ovejas sin guía
  rationale: El griego presenta una comparación figurada que apunta a la falta de guía fiel, pero no la desarrolla explícitamente. La traducción debe preservar esa tensión bíblica y dejar abierta la resonancia intertextual, en lugar de resolverla con una explicación interpretativa.
  doctrine_reference: Preservar la metáfora y su carga bíblica sin expandirla en el texto principal.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego de SBLGNT y el audit trail inglés; no se identificaron revisiones textuales o de traducción que requirieran ajuste adicional. La elección principal fue contextualizar ἐξελθὼν como «al desembarcar» por el marco narrativo inmediato.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» implícito en el sujeto del versículo, coherente con el contexto inmediato de Marcos.
  - Se usó «pastor» para ποιμήν y «ovejas» para πρόβατα, preservando la metáfora pastoral bíblica.
  - «Tuvo compasión» se emplea de forma consistente como equivalente de ἐσπλαγχνίσθη en tono digno y moderno.
  - «Comenzó a enseñar» conserva la construcción incoativa de ἤρξατο διδάσκειν sin añadir contenido no presente en el texto.
