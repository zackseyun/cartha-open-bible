translation:
  language: es
  text: Y al anochecer, la barca estaba en medio del mar, y él estaba solo en tierra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la orilla». El griego dice «en la tierra», en contraste con la posición de la barca en el mar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀψίας γενομένης
  english_pob_choice: when evening had come
  chosen_spanish: al anochecer
  alternatives_spanish:
  - cuando llegó la noche
  - cuando había caído la tarde
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto marca circunstancia temporal concluida. «Al anochecer» comunica de manera natural en español el paso ya completado a la noche, sin añadir explicación innecesaria.
- source_word: τὸ πλοῖον
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el barco
  - la nave
  lexicon: BDAG
  rationale: En este contexto galileo, «barca» es la opción más natural y precisa en español; «barco» suena más grande y menos acorde con la escena.
- source_word: ἐν μέσῳ τῆς θαλάσσης
  english_pob_choice: in the middle of the sea
  chosen_spanish: en medio del mar
  alternatives_spanish:
  - en medio del mar
  - en medio de la mar
  - en medio de la laguna
  lexicon: BDAG
  rationale: Se conserva la imagen de ubicación central y alejada de la orilla. Se prefiere «mar» como correspondencia directa y estable de θάλασσα en la tradición de traducción, sin sustituirlo por un término geográfico más interpretativo.
- source_word: θάλασσης
  english_pob_choice: the sea
  chosen_spanish: el mar
  alternatives_spanish:
  - el lago
  - el mar
  lexicon: BDAG
  rationale: Aunque geográficamente se trata del mar/lago de Galilea, el griego dice θάλασσα. Se mantiene el término del original para respetar la primacía del texto fuente.
- source_word: αὐτὸς μόνος
  english_pob_choice: he was alone
  chosen_spanish: él estaba solo
  alternatives_spanish:
  - él mismo estaba solo
  - él solo estaba
  lexicon: BDAG
  rationale: El pronombre y μόνος resaltan la soledad de Jesús. En español, «él estaba solo» transmite bien el énfasis sin forzar una formulación rígida.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the land
  chosen_spanish: en la tierra
  alternatives_spanish:
  - en la tierra
  - en la orilla
  - en tierra
  lexicon: BDAG
  rationale: Se conserva el contraste directo con «mar». «En la tierra» refleja de forma fiel y clara la localización del original, mientras que «orilla» sería más interpretativo.
translation_notes:
  revision_awareness: El pasaje presenta alto acuerdo en el audit trail inglés; no se identificaron revisiones textuales ni cambios pendientes. La versión española sigue de cerca las decisiones léxicas ya validadas, ajustándolas a un español natural y fiel al contraste espacial del verso.
  spanish_consistency_notes:
  - 'Se mantuvo la secuencia temporal y espacial del griego: anochecer → barca en medio del mar → Jesús solo en la tierra.'
  - Se preservó el contraste entre 'mar' y 'tierra' para reproducir la oposición del original.
  - La nota al pie recoge la alternativa 'en la orilla' como equivalente contextual posible, sin imponerla en el texto principal.
