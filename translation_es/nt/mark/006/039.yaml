translation:
  language: es
  text: Y les mandó hacer que todos se recostaran por grupos sobre la hierba verde[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grupo por grupo»; la expresión griega repetida tiene un sentido distributivo, subrayando grupos organizados para la comida.
    reason: lexical_alternative
  - marker: b
    text: O «a todos recostarse»; el griego distingue entre el destinatario del mandato («les») y quienes debían recostarse («todos»).
    reason: grammatical_clarification
lexical_decisions:
- source_word: ἐπέταξεν
  english_pob_choice: commanded
  chosen_spanish: mandó
  alternatives_spanish:
  - ordenó
  - mandó con autoridad
  lexicon: BDAG
  rationale: ἐπιτάσσω expresa una orden con autoridad. En español, «mandó» comunica bien ese impulso directivo en un registro natural y digno; «ordenó» también sería posible, pero «mandó» suena menos técnico y conserva el carácter imperativo del verbo.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a los discípulos
  lexicon: BDAG
  rationale: El dativo indica a quienes Jesús dirige la instrucción. «Les» conserva el referente indirecto sin añadir explícitamente «los discípulos», que el griego no dice aquí.
- source_word: ἀνακλῖναι
  english_pob_choice: to recline
  chosen_spanish: recostarse
  alternatives_spanish:
  - reclinarse
  - sentarse
  lexicon: BDAG
  rationale: El verbo describe la postura para una comida. «Recostarse» transmite esa acción en español actual de forma natural; «reclinarse» es más literal, pero menos común. Se evita «sentarse» porque pierde la imagen de comedor implícita.
- source_word: πάντας
  english_pob_choice: them all
  chosen_spanish: a todos
  alternatives_spanish:
  - a todos ellos
  - a todos los presentes
  lexicon: BDAG
  rationale: πάντας señala la totalidad del grupo que debía ser acomodado. En español, «a todos» conserva el alcance total sin confundirlo con el destinatario del mandato, que son los discípulos indicados por αὐτοῖς.
- source_word: συμπόσια συμπόσια
  english_pob_choice: in groups
  chosen_spanish: por grupos
  alternatives_spanish:
  - grupo por grupo
  - en grupos
  lexicon: BDAG
  rationale: La repetición griega tiene valor distributivo. «Por grupos» es una solución natural en español que mantiene ese sentido organizado; «grupo por grupo» podría usarse en una nota como alternativa más explícita.
- source_word: ἐπὶ τῷ χλωρῷ χόρτῳ
  english_pob_choice: on the green grass
  chosen_spanish: sobre la hierba verde
  alternatives_spanish:
  - sobre el pasto verde
  - sobre la hierba fresca
  lexicon: BDAG
  rationale: χλωρός aquí significa verde/fresco y χόρτος es hierba o pasto. «Hierba verde» sigue de cerca el original y es comprensible en español general; «pasto verde» sería más regional.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión que corrigió la relación sintáctica entre αὐτοῖς y πάντας: el mandato va dirigido a ellos, mientras que el recostarse recae sobre todos. Por eso el español distingue «les mandó a todos recostarse» en vez de fundir los dos referentes en una sola expresión.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «recostarse» para conservar la imagen de comida sin introducir una expresión demasiado moderna o demasiado eclesiástica.
  - La frase «por grupos» preserva el valor distributivo de la repetición griega sin volverla pesada.
  - No se añadieron personajes ni explicaciones contextuales que no estén en el versículo.
