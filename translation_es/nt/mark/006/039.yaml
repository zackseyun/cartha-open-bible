- from: Y les mandó a todos recostarse por grupos sobre la hierba verde[a][b].
  to: Y les mandó hacer que todos se recostaran por grupos sobre la hierba verde[a][b].
  rationale: Se revisa la sintaxis principal para reflejar mejor la distinción griega entre αὐτοῖς («les») y πάντας («todos»), evitando la posible lectura de que Jesús mandó directamente a todo el grupo. También se corrige la clasificación funcional de la nota b para que describa una aclaración gramatical, no una variante textual.
