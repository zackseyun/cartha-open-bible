review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: Jesús da una orden, el mandato va dirigido indirectamente a «les» (αὐτοῖς), el grupo total es «a todos» (πάντας), la disposición es distributiva («por grupos»), y el lugar es «sobre la hierba verde». Sin embargo, la nota b corrige una tensión sintáctica real mejor que el texto principal: en griego, Jesús manda a los discípulos que hagan recostar a todos, no manda directamente a todos que se recuesten. En español, «les mandó a todos recostarse» puede leerse como si «les» y «a todos» fueran prácticamente el mismo conjunto, o como una construcción algo forzada.'
  spanish_quality_summary: El español es claro y bastante natural, pero la sintaxis «les mandó a todos recostarse» resulta ambigua y menos elegante que una formulación causativa explícita. «Recostarse por grupos» y «sobre la hierba verde» son plenamente legibles. La nota b está bien motivada, pero su razón está mal etiquetada como textual_variant; no se trata de variante textual sino de aclaración traductológica/gramatical.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mandó» para ἐπέταξεν, «les» para αὐτοῖς, «recostarse» para ἀνακλῖναι, «por grupos» para συμπόσια συμπόσια, y «hierba verde» para ἐπὶ τῷ χλωρῷ χόρτῳ son decisiones defendibles. La revisión propuesta solo ajusta la sintaxis para reflejar mejor la relación entre αὐτοῖς y πάντας.
  issues:
  - severity: medium
    issue: La construcción principal «les mandó a todos recostarse» es sintácticamente ambigua respecto de quién recibe la orden y quién debe recostarse.
    rationale: El griego distingue el dativo αὐτοῖς (destinatarios del mandato) del acusativo πάντας (los que debían ser acomodados). En español, una construcción causativa como «les mandó hacer que todos se recostaran» o «les mandó que hicieran recostar a todos» preserva mejor esa diferencia.
  - severity: low
    issue: La razón de la nota b está clasificada como textual_variant, pero no trata de una variante textual.
    rationale: La nota explica una alternativa de traducción y una aclaración gramatical, no una diferencia de manuscritos ni de texto fuente.
  revised_spanish_text: Y les mandó hacer que todos se recostaran por grupos sobre la hierba verde[a][b].
  revised_footnotes:
  - marker: a
    text: O «grupo por grupo»; la expresión griega repetida tiene un sentido distributivo, subrayando grupos organizados para la comida.
    reason: lexical_alternative
  - marker: b
    text: O «a todos recostarse»; el griego distingue entre el destinatario del mandato («les») y quienes debían recostarse («todos»).
    reason: grammatical_clarification
