translation:
  language: es
  text: 'Pues todos lo vieron y se turbaron. Pero él enseguida habló con ellos y les dice: «Tengan valor; soy yo[a]; no tengan miedo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo soy». El griego dice simplemente «yo soy».'
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες γὰρ
  english_pob_choice: For they all
  chosen_spanish: Porque todos
  alternatives_spanish:
  - Pues todos
  - Porque ellos todos
  lexicon: BDAG
  rationale: γάρ expresa conexión explicativa con el contexto anterior; en español, «porque» comunica con naturalidad esa relación. πάντες se rinde como «todos» sin añadir un sujeto explícito innecesario en la primera posición.
- source_word: αὐτὸν εἶδον
  english_pob_choice: saw him
  chosen_spanish: lo vieron
  alternatives_spanish:
  - lo alcanzaron a ver
  - vieron a él
  lexicon: BDAG
  rationale: El aoristo de ὁράω se traduce de forma directa como «vieron». El objeto pronominal enclítico «lo» conserva la referencia a Jesús con naturalidad en español.
- source_word: ἐταράχθησαν
  english_pob_choice: were troubled
  chosen_spanish: quedaron turbados
  alternatives_spanish:
  - se turbaron
  - quedaron trastornados
  - se agitaron
  lexicon: BDAG
  rationale: ταράσσω expresa perturbación o turbación más que terror pleno. «Quedaron turbados» mantiene ese matiz y refleja bien el resultado del impacto visual.
- source_word: ὁ δὲ εὐθὺς
  english_pob_choice: But he immediately
  chosen_spanish: Pero él, inmediatamente
  alternatives_spanish:
  - Y él, al instante
  - Pero él enseguida
  lexicon: BDAG
  rationale: δέ introduce contraste y εὐθύς subraya inmediatez. La coma marca en español la inserción adverbial sin forzar el orden. Se conserva el contraste narrativo de Marcos.
- source_word: ἐλάλησεν μετ’ αὐτῶν
  english_pob_choice: spoke with them
  chosen_spanish: habló con ellos
  alternatives_spanish:
  - les habló
  - conversó con ellos
  lexicon: BDAG
  rationale: μετά con genitivo puede sugerir asociación o cercanía; «habló con ellos» refleja esa cercanía de manera idiomática en español y evita hacer el giro más direccional de lo que exige el griego.
- source_word: καὶ λέγει αὐτοῖς
  english_pob_choice: and says to them
  chosen_spanish: y les dice
  alternatives_spanish:
  - y les dijo
  lexicon: BDAG
  rationale: El presente histórico de λέγει se conserva con «les dice», manteniendo el vigor narrativo característico de Marcos.
- source_word: Θαρσεῖτε
  english_pob_choice: Take courage
  chosen_spanish: Tengan valor
  alternatives_spanish:
  - Tengan ánimo
  - Cobren ánimo
  lexicon: BDAG
  rationale: El imperativo pide firmeza ante el miedo. «Tengan valor» expresa bien la exhortación sin sonar demasiado arcaico; «cobren ánimo» sería posible, pero menos directo.
- source_word: ἐγώ εἰμι
  english_pob_choice: it is I
  chosen_spanish: soy yo
  alternatives_spanish:
  - yo soy
  - soy el que soy
  lexicon: BDAG
  rationale: En este contexto, la frase funciona como autoidentificación normal y también puede conservar resonancias mayores. «Soy yo» es la forma natural en español para responder a la presencia reconocida, mientras que la tensión teológica queda preservada en la nota.
- source_word: μὴ φοβεῖσθε
  english_pob_choice: do not be afraid
  chosen_spanish: no tengan miedo
  alternatives_spanish:
  - no teman
  - no se asusten
  lexicon: BDAG
  rationale: φοβέομαι en esta exhortación se traduce de manera clara y contemporánea. «No tengan miedo» comunica el sentido sin perder la fuerza imperativa.
theological_decisions:
- issue: Sentido de ἐγώ εἰμι en la boca de Jesús
  english_pob_reading: it is I
  chosen_spanish_reading: soy yo
  alternative_spanish_readings:
  - yo soy
  - soy el que soy
  rationale: Se privilegia la lectura idiomática española para la identificación inmediata de Jesús por sus discípulos. A la vez, la formulación no cierra por completo la posible resonancia más amplia de la expresión, que el texto griego puede dejar abierta.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica sin resolverla por completo.'
translation_notes:
  revision_awareness: 'El texto inglés fue revisado desde «I am» a «it is I» para naturalidad idiomática, pero la nota mantuvo la literalidad del griego. La versión española sigue esa misma tensión: usa una identificación natural («soy yo») y preserva en la nota la lectura más literal («Yo soy»).'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrama ni una cita explícita del nombre divino.
  - Se conservó el presente histórico de Marcos con «les dice», coherente con el audit trail inglés.
  - «Turbados» traduce el campo semántico de ταράσσω sin sobrerrepresentarlo como pánico.
  - No se usó «Cristo», ya que el versículo no contiene Χριστός.
  - La nota a distingue la lectura idiomática de la literal, siguiendo la tensión documentada en el audit trail inglés.
