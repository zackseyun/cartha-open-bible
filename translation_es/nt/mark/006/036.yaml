translation:
  language: es
  text: Despídelos[a], para que vayan al campo y a las aldeas de alrededor y se compren algo para comer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Despídelos, para que, después de irse al campo y a las aldeas de alrededor, compren para sí lo que puedan comer».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλυσον
  english_pob_choice: Send them away
  chosen_spanish: Despídelos
  alternatives_spanish:
  - Envíalos lejos
  - Déjalos ir
  lexicon: BDAG
  rationale: ἀπολύω en este contexto funciona como mandato para dar por terminada la reunión y dejarlos ir. «Despídelos» conserva la fuerza imperativa y el matiz de desconvocar, sin volverlo demasiado coloquial.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es la equivalencia más natural en español y conserva claramente el sentido purposivo.
- source_word: ἀπελθόντες
  english_pob_choice: they may go
  chosen_spanish: al irse
  alternatives_spanish:
  - después de irse
  - habiéndose ido
  lexicon: BDAG
  rationale: El participio aoristo expresa la acción previa al comprar. En español, «al irse» comunica de forma natural la secuencia sin perder el valor temporal de antecedencia.
- source_word: τοὺς κύκλῳ ἀγροὺς καὶ κώμας
  english_pob_choice: the surrounding countryside and villages
  chosen_spanish: los campos y aldeas de alrededor
  alternatives_spanish:
  - la campiña y las aldeas cercanas
  - los alrededores rurales y las aldeas
  lexicon: BDAG
  rationale: κύκλῳ marca cercanía circundante; ἀγροί puede ser «campos» o zonas rurales, y κῶμαι son aldeas/pueblos pequeños. «Campos y aldeas de alrededor» mantiene la estructura doble y el matiz geográfico cercano sin forzar un término más técnico.
- source_word: ἀγοράσωσιν
  english_pob_choice: buy
  chosen_spanish: se compren
  alternatives_spanish:
  - compren
  - adquieran
  lexicon: BDAG
  rationale: El verbo indica comprar para obtener provisiones. «Se compren» conserva el beneficio para sí mismos expresado por el dativo reflexivo y suena natural en español.
- source_word: ἑαυτοῖς
  english_pob_choice: themselves / for themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - para ellos mismos
  - por su cuenta
  lexicon: BDAG
  rationale: El dativo reflexivo indica beneficio propio. «Para sí» es breve y fiel, y evita una redundancia innecesaria.
- source_word: τί φάγωσιν
  english_pob_choice: something to eat
  chosen_spanish: algo para comer
  alternatives_spanish:
  - qué comer
  - algo que comer
  lexicon: BDAG
  rationale: La expresión pide alimento en sentido indefinido. «Algo para comer» es idiomático en español y conserva el valor de τί sin añadir precisión inexistente en el griego.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada concuerdan estrechamente; se conservó la estructura de mandato + finalidad + movimiento + compra de alimento, sin cambios textuales ni variantes relevantes.
  spanish_consistency_notes:
  - Se usó «Despídelos» para mantener el tono imperativo breve del griego.
  - Se prefirió «campos y aldeas de alrededor» por fidelidad al doble referente ἀγρούς/κώμας y al marcador espacial κύκλῳ.
  - «Algo para comer» reproduce el sentido indefinido de τί φάγωσιν y resulta más natural que «qué comer».
  - La nota al pie conserva la alternativa más formal del audit trail inglés sin introducir una lectura doctrinal nueva.
