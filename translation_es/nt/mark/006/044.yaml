translation:
  language: es
  text: Y los que comieron los panes eran cinco mil hombres[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los panes». El término griego puede significar «pan» o «panes», pero aquí se refiere a los panes concretos del relato de la alimentación.
    reason: lexical_alternative
  - marker: b
    text: Griego «hombres», específicamente varones adultos, no un término genérico para personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν
  english_pob_choice: were
  chosen_spanish: eran
  alternatives_spanish:
  - fueron
  - había
  lexicon: BDAG
  rationale: El imperfecto de εἰμί aquí funciona como cópula para expresar el total de los que comieron. «Eran» transmite ese valor copulativo de forma natural en español sin añadir la idea de conteo explícito que no está en el griego.
- source_word: οἱ φαγόντες
  english_pob_choice: those who ate
  chosen_spanish: los que comieron
  alternatives_spanish:
  - los que habían comido
  - los que comieron
  lexicon: BDAG
  rationale: El participio aoristo articular identifica al grupo por la acción completada de comer. «Los que comieron» es idiomático en español y refleja bien la construcción sin sobretraducirla como pluscuamperfecto.
- source_word: τοὺς ἄρτους
  english_pob_choice: the loaves
  chosen_spanish: los panes
  alternatives_spanish:
  - los panes de pan
  - el pan
  lexicon: BDAG
  rationale: ἄρτος puede significar «pan» o «panes/loaves». Aquí, en el relato de la alimentación, el plural apunta a las piezas concretas repartidas por Jesús. «Los panes» preserva esa concreción narrativa en español; «el pan» sería más genérico.
- source_word: πεντακισχίλιοι
  english_pob_choice: five thousand
  chosen_spanish: cinco mil
  alternatives_spanish:
  - cinco mil
  lexicon: BDAG
  rationale: Número cardinal directo; no requiere ajuste idiomático.
- source_word: ἄνδρες
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - varones
  - personas
  lexicon: BDAG
  rationale: ἀνήρ refiere específicamente a hombres adultos, no a personas en general. «Hombres» mantiene esa especificidad y evita neutralizar el término.
theological_decisions:
- issue: Término de conteo específico por sexo
  english_pob_reading: Render ἄνδρες as 'men' in the main text.
  chosen_spanish_reading: Mantener «hombres» en el texto principal.
  alternative_spanish_readings:
  - personas
  - varones
  rationale: El griego usa ἀνήρ, un término masculino específico. La traducción debe conservar esa precisión léxica en vez de generalizarla como si dijera «personas».
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas; el estado más reciente indica que el texto quedó sin cambios y con alto grado de acuerdo entre revisores.
  spanish_consistency_notes:
  - Se mantiene «hombres» para ἄνδρες por la especificidad masculina del término.
  - Se elige «los panes» en el texto principal por el contexto narrativo de la alimentación, con nota alternativa para la ambigüedad léxica de ἄρτος.
  - La formulación conserva un estilo natural en español sin perder la estructura básica del griego.
