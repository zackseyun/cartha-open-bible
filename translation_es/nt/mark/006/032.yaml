translation:
  language: es
  text: Y se fueron en la barca a un lugar desolado[a], ellos solos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'a un lugar desierto' o 'a un lugar desértico'.
    reason: lexical_alternative
  - marker: b
    text: O 'en privado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: La conjunción narrativa simple en griego se conserva mejor con una coordinación directa en español. 'Y' mantiene el flujo paratáctico de Marcos sin añadir causalidad o consecuencia implícita.
- source_word: ἀπῆλθον
  english_pob_choice: went away
  chosen_spanish: se fueron
  alternatives_spanish:
  - partieron
  - se alejaron
  lexicon: BDAG
  rationale: El aoristo de ἀπέρχομαι indica salida o alejamiento del lugar previo. 'Se fueron' es natural en español moderno y conserva el movimiento sin volverlo demasiado formal.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el bote
  - por barca
  lexicon: BDAG
  rationale: El griego dice literalmente 'en la barca/embarcación'. 'Barca' es el término más natural y transparente en español bíblico para el contexto de Marcos, y conserva la imagen física mejor que una paráfrasis como 'por barca'.
- source_word: εἰς ἔρημον τόπον
  english_pob_choice: to a desolate place
  chosen_spanish: a un lugar desolado
  alternatives_spanish:
  - a un lugar desierto
  - a un lugar apartado
  - a un lugar de soledad
  lexicon: BDAG
  rationale: ἔρημος con τόπος denota un sitio aislado, deshabitado o sin presencia humana. 'Desolado' conserva esa amplitud semántica y evita restringirlo demasiado a 'desierto' en sentido geográfico.
- source_word: κατ’ ἰδίαν
  english_pob_choice: by themselves
  chosen_spanish: aparte[b]
  alternatives_spanish:
  - por su cuenta
  - en privado
  - solos
  lexicon: BDAG
  rationale: El modismo expresa separación del resto, con el matiz de privacidad o de estar apartados. En español, 'aparte' resume bien ese sentido y mantiene abierta la posibilidad de 'en privado', que se explicita en la nota.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: se mantiene la lectura del texto griego y la equivalencia óptima del borrador inglés, con ajustes naturales al español.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque el versículo no contiene vocabulario divino.
  - '''Barca'' se prefiere aquí a ''barco'' por la naturalidad del registro narrativo bíblico en español.'
  - '''Desolado'' conserva mejor la ambigüedad de ἔρημος que una sola opción estrecha.'
  - Se conserva la posibilidad de lectura 'en privado' mediante la nota, porque κατ’ ἰδίαν no equivale solo a separación física.
