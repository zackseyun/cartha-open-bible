  to: Y se fueron en la barca a un lugar desolado[a], ellos solos[b].
  rationale: Se ajusta únicamente la expresión final para que el español suene más natural y refleje mejor el plural implícito en el sujeto de κατ’ ἰδίαν. También se corrige una alternativa de nota que era poco idiomática.
