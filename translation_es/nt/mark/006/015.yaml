translation:
  language: es
  text: 'Pero otros decían[a]: «Él es Elías», y otros decían: «Es un profeta, como uno de los profetas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos probable: «el Profeta», si se toma como una figura escatológica específica; el griego se lee más naturalmente como «un profeta» porque continúa: «como uno de los profetas».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλοι δὲ
  english_pob_choice: But others
  chosen_spanish: Pero otros
  alternatives_spanish:
  - Y otros
  - Otros
  lexicon: BDAG
  rationale: ἄλλοι introduce un grupo distinto dentro de la reacción del pueblo, y δέ marca una transición suave. «Pero otros» conserva ese matiz de contraste/continuación de modo natural en español.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa repetición o curso continuo del habla. En español, el pretérito imperfecto «decían» transmite bien ese valor sin recargar la frase.
- source_word: ὅτι Ἠλίας ἐστίν
  english_pob_choice: He is Elijah
  chosen_spanish: Él es Elías
  alternatives_spanish:
  - que él es Elías
  lexicon: BDAG
  rationale: La cita directa es natural tras un verbo de decir. «Elías» conserva el nombre propio bíblico en su forma habitual en español.
- source_word: προφήτης
  english_pob_choice: a prophet
  chosen_spanish: un profeta
  alternatives_spanish:
  - profeta
  lexicon: BDAG
  rationale: El griego carece de artículo y funciona con sentido indefinido en este contexto. Por eso se vierte «un profeta», evitando convertirlo en un título técnico no apoyado por el texto inmediato.
- source_word: ὡς εἷς τῶν προφητῶν
  english_pob_choice: like one of the prophets
  chosen_spanish: como uno de los profetas
  alternatives_spanish:
  - como uno entre los profetas
  - igual que uno de los profetas
  lexicon: BDAG
  rationale: ὡς expresa comparación; «como uno de los profetas» reproduce el paralelismo del griego y deja claro que Jesús es comparado con la línea profética anterior.
theological_decisions:
- issue: Si προφήτης debe entenderse como «el Profeta» escatológico o como un profeta genérico
  english_pob_reading: a prophet
  chosen_spanish_reading: un profeta
  alternative_spanish_readings:
  - el Profeta
  rationale: El griego no lleva artículo y la frase siguiente («como uno de los profetas») favorece la lectura genérica. Se preserva así la tensión interpretativa sin resolverla artificialmente.
  doctrine_reference: Primacía del texto original; mantener la ambigüedad donde el griego la permite.
translation_notes:
  revision_awareness: 'Se siguió el estado más reciente del auditor de inglés: no hubo revisiones aplicadas y el consenso de revisión fue de alta concordancia. La redacción española conserva la misma decisión clave sobre προφήτης y el valor comparativo de ὡς εἷς τῶν προφητῶν.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no la requiere.
  - Se prefirió el imperfecto «decían» para reflejar el valor aspectual de ἔλεγον.
  - Se evitó «Cristo» porque el versículo no contiene Χριστός ni una equivalencia funcional necesaria.
  - La nota al pie se ancla en «decían[a]» para señalar la alternativa interpretativa sin interrumpir la lectura principal.
