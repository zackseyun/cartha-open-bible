translation:
  language: es
  text: Y subió a la barca con ellos, y el viento cesó. Y quedaron sumamente asombrados en sí mismos[a],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'quedaron sobremanera asombrados en sí mismos'; literalmente, el griego acumula intensificadores, 'muy por encima de medida'. También puede entenderse como 'quedaron fuera de sí', expresando la fuerza abrumadora de su asombro.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέβη πρὸς αὐτοὺς εἰς τὸ πλοῖον
  english_pob_choice: got into the boat with them
  chosen_spanish: subió a la barca con ellos
  alternatives_spanish:
  - entró en la barca con ellos
  - subió a la barca hacia ellos
  lexicon: BDAG
  rationale: ἀνέβη significa literalmente 'subió', y con εἰς τὸ πλοῖον en este contexto narrativo se entiende que Jesús entra en la barca. En español, 'subió a la barca' conserva el movimiento expresado por el griego sin forzar un calco de 'entró', y 'con ellos' refleja la proximidad/comunión que el texto inglés POB captó como 'with them'.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - bote
  - barco
  lexicon: BDAG
  rationale: En el contexto de los relatos del mar de Galilea, 'barca' es la opción natural y de escala adecuada en español. 'Barco' suena demasiado grande; 'bote' puede sonar más genérico o coloquial.
- source_word: ἐκόπασεν ὁ ἄνεμος
  english_pob_choice: the wind stopped
  chosen_spanish: el viento cesó
  alternatives_spanish:
  - el viento se calmó
  - el viento dejó de soplar
  lexicon: BDAG
  rationale: κοπάζω expresa que el viento o la tormenta amainan o cesan. 'Cesó' es una forma sobria y fiel, muy cercana al valor semántico del verbo sin añadir una imagen no explícita.
- source_word: λίαν ⸂ἐκ περισσοῦ⸃
  english_pob_choice: utterly
  chosen_spanish: totalmente
  alternatives_spanish:
  - sobremanera
  - excesivamente
  - en gran manera
  lexicon: BDAG
  rationale: La combinación intensifica fuertemente la reacción. En español, 'totalmente' comunica el grado extremo con naturalidad, aunque no reproduce por sí sola toda la acumulación enfática; por eso se mantiene en una nota la posibilidad de 'sobremanera' u otra expansión intensiva.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: within themselves
  chosen_spanish: dentro de sí
  alternatives_spanish:
  - en sí mismos
  - dentro de ellos mismos
  lexicon: BDAG
  rationale: La expresión refleja la interioridad de la reacción. 'Dentro de sí' suena natural en español y conserva el sentido reflexivo sin sobrecargar la frase.
- source_word: ἐξίσταντο
  english_pob_choice: were astonished
  chosen_spanish: quedaron asombrados
  alternatives_spanish:
  - estaban asombrados
  - quedaron fuera de sí
  lexicon: BDAG
  rationale: El imperfecto medio/intransitivo puede expresar asombro intenso. 'Quedaron asombrados' preserva el carácter resultante y narrativo del pasaje; se mantiene en nota la alternativa más fuerte 'fuera de sí' para reflejar la posibilidad semántica de gran conmoción.
theological_decisions:
- issue: Intensidad de la reacción de los discípulos ante la autoridad de Jesús sobre el viento
  english_pob_reading: 'A strong but readable rendering: ''they were utterly astonished within themselves'''
  chosen_spanish_reading: 'Una redacción fuerte pero natural: ''quedaron totalmente asombrados dentro de sí'''
  alternative_spanish_readings:
  - quedaron sobremanera asombrados dentro de sí
  - quedaron fuera de sí
  rationale: El pasaje describe una reacción narrativa de asombro extremo, no una conclusión doctrinal adicional. La traducción conserva la intensidad acumulada del griego sin diluirla, pero evita una expresión demasiado idiomática que pudiera sonar a interpretación libre.
  doctrine_reference: 'Translation philosophy #3, #6'
translation_notes:
  revision_awareness: El paquete fuente muestra alta concordancia y ninguna revisión aplicada en la última pasada. Se mantuvo la lectura fuerte del asombro y la cesación del viento, ajustando al español natural sin perder la acumulación enfática del griego.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el nombre divino ni una cita explícita del tetragrámaton en este versículo.
  - Se prefirió 'barca' por coherencia con el registro evangélico en el mar de Galilea.
  - Se mantuvo la fuerza de λίαν ⸂ἐκ περισσοῦ⸃ mediante 'totalmente' y una nota alternativa más enfática.
  - La cláusula final se tradujo con imperfecto/resultativo narrativo en español ('quedaron') para reflejar el cambio de estado del original.
