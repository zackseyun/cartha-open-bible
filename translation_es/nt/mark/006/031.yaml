  rationale: Se simplifica «ustedes solos, aparte» a «ustedes solos» para lograr un español más natural sin perder el énfasis de separación, ya suficientemente apoyado por el contexto y el destino a un lugar desolado. Además, se corrige la nota [b] para que exprese la alternativa completa y útil en español.
