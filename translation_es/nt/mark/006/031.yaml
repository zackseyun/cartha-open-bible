review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca las decisiones del POB en cuanto a retiro, descanso y falta de oportunidad para comer. Sin embargo, hay dos ajustes menores: la colocación de «aparte» con «solos» suena algo redundante en español, y la nota [b] no preserva adecuadamente la alternativa inglesa completa («no tenían ni tiempo para comer»), ya que «O ‘tiempo’» queda demasiado elíptico.'
  spanish_quality_summary: El texto es claro, natural y digno. «Vengan ustedes solos, aparte» comunica la idea, pero «Vengan ustedes solos a un lugar desolado» o «Vengan aparte ustedes solos» sería más fluido; dado el contexto, puede comprimirse sin pérdida. El resto del verso lee bien en español moderno.
  glossary_alignment: No hay términos del glosario teológicamente sensibles en este versículo. «Lugar desolado» respeta bien la decisión de ἔρημον τόπον sin caer en «desierto» como único sentido. «Descansen» y «oportunidad de comer» están alineados con el POB.
  issues:
  - severity: medium
    issue: Redundancia y ligera torpeza en «ustedes solos, aparte»
    rationale: El griego combina ὑμεῖς αὐτοὶ y κατ’ ἰδίαν, pero en español no hace falta duplicar tan explícitamente ambas ideas en esa posición. «Ustedes solos» ya comunica bien la separación, y el destino a un lugar desolado completa la idea de apartarse.
  - severity: medium
    issue: La nota [b] es demasiado abreviada
    rationale: La nota inglesa ofrece la alternativa completa «they did not even have time to eat». En español, «O ‘tiempo’» no reproduce el sentido alternativo de forma suficientemente clara ni autónoma.
  revised_spanish_text: 'Y les dijo: «Vengan ustedes solos a un lugar desolado[a] y descansen un poco». Porque muchos iban y venían, y ni siquiera tenían oportunidad[b] de comer.'
  revised_footnotes:
  - marker: a
    text: O «un lugar desierto» o «un lugar solitario». El griego se refiere a un sitio aislado o deshabitado, no necesariamente a un desierto en el sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: O «ni siquiera tenían tiempo para comer».
    reason: lexical_alternative
  revision_rationale: Se simplifica «ustedes solos, aparte» a «ustedes solos» para lograr un español más natural sin perder el énfasis de separación, ya suficientemente apoyado por el contexto y el destino a un lugar desolado. Además, se corrige la nota [b] para que exprese la alternativa completa y útil en español.
