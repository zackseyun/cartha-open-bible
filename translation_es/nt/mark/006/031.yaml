translation:
  language: es
  text: 'Y les dijo: «Vengan ustedes solos a un lugar desolado[a] y descansen un poco». Porque muchos iban y venían, y ni siquiera tenían oportunidad[b] de comer.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un lugar desierto» o «un lugar solitario». El griego se refiere a un sitio aislado o deshabitado, no necesariamente a un desierto en el sentido moderno.
    reason: lexical_alternative
  - marker: b
    text: O «ni siquiera tenían tiempo para comer».
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: El presente histórico griego puede conservarse, pero en español narrativo natural la forma pasada comunica mejor el avance del relato sin perder la función discursiva.
- source_word: Δεῦτε
  english_pob_choice: Come away
  chosen_spanish: Vengan
  alternatives_spanish:
  - Vengan acá
  - Vengan apartándose
  lexicon: BDAG
  rationale: Es una invitación imperativa a acercarse para retirarse con él; «Vengan» mantiene el impulso exhortativo y el contexto añade la idea de apartarse.
- source_word: ὑμεῖς αὐτοὶ / κατ’ ἰδίαν
  english_pob_choice: by yourselves
  chosen_spanish: ustedes solos, aparte
  alternatives_spanish:
  - ustedes mismos, aparte
  - solos
  - aparte, por su cuenta
  lexicon: BDAG
  rationale: La combinación enfatiza separación y exclusividad. «Ustedes solos, aparte» conserva tanto el énfasis personal como la retirada a un lugar separado.
- source_word: ἔρημον τόπον
  english_pob_choice: a desolate place
  chosen_spanish: un lugar desolado
  alternatives_spanish:
  - un lugar desierto
  - un lugar solitario
  - un lugar aislado
  lexicon: BDAG
  rationale: ἔρημος describe un sitio aislado o deshabitado, no necesariamente un desierto arenoso. «Desolado» refleja bien la soledad del lugar sin introducir una imagen geográfica demasiado específica.
- source_word: ἀναπαύσασθε
  english_pob_choice: rest
  chosen_spanish: descansen
  alternatives_spanish:
  - reposen
  - tomen descanso
  - refresqúense
  lexicon: BDAG
  rationale: El imperativo medio llama a cesar la actividad y recuperar fuerzas. «Descansen» es claro, natural y apropiado para una invitación directa.
- source_word: ὀλίγον
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - por un poco
  - brevemente
  - por un rato
  lexicon: BDAG
  rationale: El valor adverbial indica breve duración; «un poco» es la equivalencia más natural en español.
- source_word: οἱ ἐρχόμενοι καὶ οἱ ὑπάγοντες
  english_pob_choice: were coming and going
  chosen_spanish: iban y venían
  alternatives_spanish:
  - venían y se iban
  - andaban y venían
  - iban llegando y saliendo
  lexicon: BDAG
  rationale: La expresión describe un flujo continuo de personas. «Iban y venían» es idiomático en español y preserva la idea de movimiento incesante.
- source_word: πολλοί
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de personas
  - muchísima gente
  lexicon: BDAG
  rationale: Adjetivo cuantitativo simple; «muchos» reproduce con naturalidad el sentido del griego.
- source_word: οὐδὲ φαγεῖν εὐκαίρουν
  english_pob_choice: they did not even have an opportunity to eat
  chosen_spanish: ni siquiera tenían oportunidad de comer
  alternatives_spanish:
  - ni siquiera tenían tiempo para comer
  - ni aun podían comer
  lexicon: BDAG
  rationale: εὐκαιρέω expresa tener oportunidad o disponibilidad. «Oportunidad» refleja mejor ese matiz que «tiempo», y «ni siquiera» corresponde a οὐδέ.
translation_notes:
  revision_awareness: Se siguió de cerca el audit trail inglés, manteniendo la misma lectura óptima para Δεῦτε, ὑμεῖς αὐτοὶ / κατ’ ἰδίαν, ἔρημον τόπον y εὐκαίρουν, sin cambios de sentido respecto del texto griego. No hubo revisiones aplicadas en el paso inglés final, y la concordancia general fue alta.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usó «descansen» en vez de una fórmula eclesiástica más arcaica para conservar claridad y naturalidad.
  - «Lugar desolado» conserva el valor de ἔρημος como sitio aislado, evitando la falsa precisión de «desierto».
  - «Ni siquiera tenían oportunidad de comer» preserva la idea de falta de ocasión, no solo de falta de tiempo.
