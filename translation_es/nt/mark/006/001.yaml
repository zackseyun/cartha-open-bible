revisions:
- from: Y salió de allí, y viene a su patria[a], y lo siguen sus discípulos.
  to: Y salió de allí, y viene a su pueblo[a], y lo siguen sus discípulos.
  rationale: Se reemplaza «patria» por «pueblo» para evitar una lectura nacional o abstracta y reflejar mejor el sentido contextual de πατρίς en Marcos 6:1. Se conserva el presente histórico en el texto principal por su naturalidad en español, pero se ajusta la nota para que presente como alternativa la traducción en pasado, paralela a la decisión documentada en el English POB.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:30:35Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: salida desde el lugar anterior, llegada al lugar de origen y seguimiento por parte de los discípulos. También justifica de manera aceptable la conservación del presente histórico en español. Sin embargo, «patria» no reproduce bien aquí el sentido contextual de πατρίδα, que en Marcos 6:1 apunta al pueblo o lugar natal de Jesús, no a la patria en sentido nacional o abstracto.'
  spanish_quality_summary: La frase es comprensible, pero «su patria» suena poco natural y potencialmente equívoca en español contemporáneo eclesial general. «Su pueblo» o «su pueblo natal» es más idiomático y fiel al contexto inmediato. Además, con ἀκολουθοῦσιν αὐτῷ, en español es más natural «lo siguen» que «le siguen» en gran parte del ámbito latinoamericano, por lo que puede mantenerse.
  glossary_alignment: No hay conflicto con los términos teológicos principales del proyecto. «Discípulos» está bien. La principal desviación léxica es «patria», que no se ajusta al valor contextual de πατρίς aquí ni a la preferencia por español claro y natural.
  issues:
  - severity: medium
    issue: «su patria» para πατρίδα
    rationale: Aunque πατρίς puede tener un rango semántico amplio, en este contexto narrativo de Marcos 6 se refiere al lugar de origen de Jesús, equivalente práctico a «su pueblo» o «su pueblo natal». «Patria» en español moderno suele sugerir nación o patria cívica, y por eso introduce una resonancia inadecuada.
  - severity: low
    issue: La nota al pie ya no corresponde a una verdadera alternativa léxica si se mantiene el presente histórico en el texto principal
    rationale: La nota inglesa preserva la alternativa de traducir los presentes históricos explícitamente como presentes. Si el español principal también usa presentes, la nota debe reformularse para señalar la alternativa en pasado, o bien omitirse. Conviene conservar una nota breve para reflejar la documentación del English POB.
  revised_spanish_text: Y salió de allí, y viene a su pueblo[a], y lo siguen sus discípulos.
  revised_footnotes:
  - marker: a
    text: 'O: «vino a su pueblo, y sus discípulos lo siguieron». El griego usa presentes históricos para dar viveza al relato.'
    reason: lexical_alternative
  revision_rationale: Se reemplaza «patria» por «pueblo» para evitar una lectura nacional o abstracta y reflejar mejor el sentido contextual de πατρίς en Marcos 6:1. Se conserva el presente histórico en el texto principal por su naturalidad en español, pero se ajusta la nota para que presente como alternativa la traducción en pasado, paralela a la decisión documentada en el English POB.
