translation:
  language: es
  text: Y salió de allí, y viene a su pueblo[a], y lo siguen sus discípulos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vino a su pueblo, y sus discípulos lo siguieron». El griego usa presentes históricos para dar viveza al relato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - se fue
  - partió
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι marca salida o partida desde un lugar anterior. En español, «salió» comunica ese movimiento de manera natural y directa, sin añadir matices que el texto no exige.
- source_word: ἐκεῖθεν
  english_pob_choice: from there
  chosen_spanish: de allí
  alternatives_spanish:
  - desde allí
  - de ese lugar
  lexicon: BDAG
  rationale: La forma adverbial señala el punto de procedencia. «De allí» es breve, idiomático y fiel al valor locativo del término.
- source_word: ἔρχεται
  english_pob_choice: came
  chosen_spanish: viene
  alternatives_spanish:
  - llega
  - vino
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego con «viene», porque la narración usa ἔρχεται para dar viveza. En español, el presente narrativo es natural y mantiene mejor el efecto del original que un pasado liso.
- source_word: πατρίδα
  english_pob_choice: hometown
  chosen_spanish: patria
  alternatives_spanish:
  - pueblo natal
  - lugar natal
  - ciudad natal
  lexicon: BDAG
  rationale: En este contexto el término se refiere al lugar propio de origen de Jesús. «Patria» conserva una amplitud semántica compatible con el griego πατρίς, sin reducirlo necesariamente a una aldea o ciudad específica; el contexto narrativo identifica el lugar en los versos siguientes.
- source_word: ἀκολουθοῦσιν
  english_pob_choice: followed
  chosen_spanish: lo siguen
  alternatives_spanish:
  - lo acompañan
  - le siguen
  lexicon: BDAG
  rationale: El presente de ἀκολουθέω también se mantiene con presente narrativo. «Lo siguen» preserva el verbo habitual de discipulado y la dirección personal del seguimiento.
- source_word: μαθηταὶ
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente establecido para μαθηταί en los Evangelios y conserva la relación de aprendizaje y seguimiento propia del grupo.
theological_decisions:
- issue: Presente histórico en ἔρχεται y ἀκολουθοῦσιν
  english_pob_reading: 'The English POB renders these as simple past for readability: ''came'' and ''followed.'''
  chosen_spanish_reading: 'Se conservan presentes narrativos: «viene» y «lo siguen».'
  alternative_spanish_readings:
  - «vino» y «lo siguieron»
  - «llega» y «lo acompañan»
  rationale: El español admite con naturalidad el presente histórico. Mantenerlo refleja con mayor fidelidad la vividez narrativa del griego y evita perder una señal estilística observable en el texto fuente.
  doctrine_reference: Decisión estilística, no doctrinal; cf. filosofía de traducción de la POB sobre equivalencia óptima y respeto por el efecto narrativo.
translation_notes:
  revision_awareness: El texto griego presentado y el expediente inglés coinciden de manera alta; no se documentan revisiones sustantivas aplicables a esta línea. La versión española sigue esa unanimidad y solo ajusta la estrategia de tiempo verbal para reflejar mejor el presente histórico del griego en español.
  spanish_consistency_notes:
  - 'Se mantiene el orden narrativo básico del griego: salida, llegada, seguimiento.'
  - «Patria» se usa aquí con sentido de lugar propio de origen, no con sentido político moderno.
  - Se conserva el presente narrativo para reflejar el estilo del original, en contraste con la decisión del inglés POB de pasar a pasado simple.
  - «Discípulos» mantiene la terminología estable del proyecto para μαθηταί.
