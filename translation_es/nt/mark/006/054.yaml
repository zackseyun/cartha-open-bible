translation:
  language: es
  text: Y al salir de la barca[a], enseguida lo reconocieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Y al salir de la barca, enseguida reconociéndolo»; el griego deja implícito el sujeto de «reconocieron», aunque el contexto indica que se trata de la gente del lugar.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξελθόντων αὐτῶν
  english_pob_choice: when they got out
  chosen_spanish: cuando ellos salieron
  alternatives_spanish:
  - al salir ellos
  - después de que salieron
  lexicon: BDAG
  rationale: El genitivo absoluto expresa una acción temporal previa o concomitante; en español, una cláusula temporal con «cuando» es natural y fiel. «Salieron» refleja ἐξέρχομαι sin sobrecargar el texto, y «ellos» mantiene la referencia implícita del griego de forma clara pero sobria.
- source_word: τοῦ πλοίου
  english_pob_choice: the boat
  chosen_spanish: la barca
  alternatives_spanish:
  - el barco
  - la embarcación
  lexicon: BDAG
  rationale: En el contexto evangélico del mar de Galilea, πλοῖον suele designar una embarcación pequeña. «Barca» es la opción más natural en español bíblico actual y comunica mejor el tamaño y contexto que «barco».
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» preserva la fuerza adverbial de εὐθύς con un español fluido y digno. «Inmediatamente» es correcto, pero suena más técnico; «al instante» es posible, aunque menos estable en estilo narrativo.
- source_word: ἐπιγνόντες
  english_pob_choice: recognized
  chosen_spanish: lo reconocieron
  alternatives_spanish:
  - lo identificaron
  - sintieron quién era
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí expresa reconocimiento perceptivo de Jesús al verlo. «Lo reconocieron» es la equivalencia más natural y precisa en español; conserva el matiz de identificación sin añadir interpretación.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El pronombre retoma a Jesús; en español, el objeto directo pronominal «lo» es la forma idiomática y concisa. «A él» sería más enfático, pero menos natural en esta oración.
theological_decisions:
- issue: Sujeto implícito de «reconocieron»
  english_pob_reading: they recognized him, leaving the subject implicit
  chosen_spanish_reading: lo reconocieron, dejando el sujeto implícito
  alternative_spanish_readings:
  - ellos lo reconocieron
  - las personas lo reconocieron
  rationale: El participio nominativo plural griego no introduce explícitamente un sustantivo; la lectura más sobria en español es conservar el sujeto implícito, como en la revisión inglesa final. El contexto inmediato identifica a quienes reconocen a Jesús sin necesidad de añadir «las personas».
  doctrine_reference: Sintaxis del texto y contexto narrativo; no implica decisión doctrinal.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión final del POB inglés, que eliminó la inserción explicativa «the people» y dejó el sujeto implícito. También refleja la preferencia por una equivalencia óptima: claridad natural en español sin introducir un sujeto no expresado en el griego.'
  spanish_consistency_notes:
  - Se mantiene «barca» para πλοῖον en contexto evangélico.
  - Se mantiene «enseguida» para εὐθύς, coherente con el estilo marcano.
  - Se conserva el sujeto implícito en la traducción, conforme a la decisión revisada del POB inglés.
  - Se usa «lo» para el pronombre objeto directo singular referido a Jesús, de acuerdo con el español estándar.
