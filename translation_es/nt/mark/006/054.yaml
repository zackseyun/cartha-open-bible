review_pass:
  verdict: revise
  source_alignment_summary: La propuesta española refleja bien la estructura temporal de ἐξελθόντων αὐτῶν, el sentido de πλοίου como embarcación pequeña y el valor de ἐπιγνόντες como ‘reconocer’. Sin embargo, «ellos» antes de «salieron» introduce un sujeto explícito innecesario y luego «lo reconocieron» deja ambiguo en español quiénes reconocieron a Jesús; además, el rastro inglés conservó una nota sobre la construcción griega y la ambigüedad del sujeto implícito que conviene preservar en español.
  spanish_quality_summary: El borrador es claro y natural, pero puede sonar más limpio y más cercano al griego con «al salir de la barca». También conviene conservar la nota explicativa porque en español, como en inglés, la relación entre el genitivo absoluto y el participio nominativo puede no resultar evidente para el lector.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Barca» para πλοῖον y «reconocieron» para ἐπιγνόντες están bien elegidos. No hay términos teológicos sensibles en este versículo.
  issues:
  - severity: medium
    issue: Sujeto explícito «ellos» en la primera cláusula
    rationale: El griego tiene un genitivo absoluto («cuando salieron»), y el español no necesita enfatizar «ellos». Incluirlo no es incorrecto, pero vuelve la frase más pesada sin aportar fidelidad adicional.
  - severity: medium
    issue: Falta una nota sobre la construcción y el sujeto implícito de «reconocieron»
    rationale: El expediente inglés preserva explícitamente que el griego literalmente suena como ‘al salir..., reconociéndolo inmediatamente’ y que el sujeto de ‘reconocer’ queda implícito. Esa información sigue siendo útil en español y ayuda a evitar una falsa precisión interpretativa.
  revised_spanish_text: Y al salir de la barca[a], enseguida lo reconocieron.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «Y al salir de la barca, enseguida reconociéndolo»; el griego deja implícito el sujeto de «reconocieron», aunque el contexto indica que se trata de la gente del lugar.
    reason: alternative_reading
