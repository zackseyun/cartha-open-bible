translation:
  language: es
  text: Y enseguida el rey envió a un verdugo y le ordenó que trajera su cabeza[a]. Y fue y lo decapitó en la cárcel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un guardia», o «un soldado de la guardia»; el griego usa un préstamo del latín (spekoulátōr) para un miembro de la guardia del gobernante, aquí funcionando como verdugo.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» comunica con naturalidad la rapidez característica de Marcos sin sonar tan rígido como «inmediatamente»; conserva el valor temporal inmediato del adverbio griego.
- source_word: ὁ βασιλεὺς
  english_pob_choice: the king
  chosen_spanish: el rey
  alternatives_spanish:
  - el gobernante
  - Herodes
  lexicon: BDAG
  rationale: Se preserva la designación narrativa del griego («el rey») en vez de armonizarla con precisión histórica o identificarlo explícitamente como Herodes.
- source_word: σπεκουλάτορα
  english_pob_choice: executioner
  chosen_spanish: un verdugo
  alternatives_spanish:
  - un guardia
  - un soldado de la guardia
  - un guardaespaldas
  lexicon: BDAG
  rationale: Aunque el préstamo latino puede significar miembro de la guardia del gobernante, en este contexto funciona como agente de ejecución; «verdugo» comunica mejor esa función en español sin perder la tensión léxica documentada.
- source_word: ἐπέταξεν ἐνέγκαι
  english_pob_choice: ordered him to bring
  chosen_spanish: le ordenó que trajera
  alternatives_spanish:
  - le mandó que trajera
  - ordenó traer
  lexicon: BDAG
  rationale: El español natural expresa esta construcción con verbo de mandato + subjuntivo. Se mantiene la relación personal implícita del objeto indirecto («le») y el contenido del mandato («que trajera»).
- source_word: τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: his head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - la cabeza de él
  lexicon: BDAG
  rationale: «Su cabeza» es la forma idiomática en español y mantiene la referencia contextual a Juan sin sobrecargar el texto.
- source_word: ἀπεκεφάλισεν
  english_pob_choice: beheaded
  chosen_spanish: lo decapitó
  alternatives_spanish:
  - lo degolló
  - lo beheadó
  lexicon: BDAG
  rationale: «Decapitó» es el equivalente claro y directo en español para ἀποκεφαλίζω. Se evita «degolló» por desplazar el matiz a corte de garganta, no de cabeza.
- source_word: ἐν τῇ φυλακῇ
  english_pob_choice: in the prison
  chosen_spanish: en la cárcel
  alternatives_spanish:
  - en la prisión
  - en el calabozo
  lexicon: BDAG
  rationale: «Cárcel» preserva bien el lugar concreto y es plenamente natural en español moderno. Se mantiene la concreción del artículo griego sin forzar un registro demasiado técnico.
translation_notes:
  revision_awareness: El texto inglés auditado ya fijó el sentido de σπεκουλάτορα como ‘executioner’ y revisó solo la puntuación final; la versión española sigue esa decisión funcional y mantiene el cierre narrativo con punto.
  spanish_consistency_notes:
  - Se conserva la designación narrativa «el rey» como en el texto griego y el POB en inglés.
  - Se mantiene la equivalencia funcional de σπεκουλάτορα con «verdugo», pero se documenta la alternativa literal/semiliteral en nota.
  - La frase final usa una construcción verbal natural en español para el mandato indirecto, sin perder el contenido de orden del griego.
