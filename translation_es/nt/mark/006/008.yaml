translation:
  language: es
  text: 'Y les mandó que no llevaran nada para el camino, sino solo un bastón: ni pan, ni bolsa[a], ni cobre[b] en el cinturón.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bolsa de viaje» para provisiones.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «cobre»; es decir, monedas de cobre o dinero llevado en el cinturón.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρήγγειλεν
  english_pob_choice: instructed
  chosen_spanish: les mandó
  alternatives_spanish:
  - les instruyó
  - les ordenó
  - les dio instrucciones
  lexicon: BDAG
  rationale: El verbo expresa una orden o indicación con autoridad. «Mandó» conserva bien ese tono directivo en español y es natural en un contexto de envío y preparación para el viaje.
- source_word: μηδὲν αἴρωσιν
  english_pob_choice: to take nothing
  chosen_spanish: que no llevaran nada
  alternatives_spanish:
  - que no tomaran nada
  - que no cargaran nada
  lexicon: BDAG
  rationale: Aquí αἴρω se entiende como llevar o tomar consigo para el trayecto. «Llevaran nada» transmite la prohibición de ir provistos de cosas para el camino.
- source_word: εἰς ὁδὸν
  english_pob_choice: for the journey
  chosen_spanish: para el camino
  alternatives_spanish:
  - para el viaje
  - para la jornada
  - para el trayecto
  lexicon: BDAG
  rationale: La expresión es idiomática de preparación para desplazarse. «Para el camino» es natural y conserva la referencia concreta al viaje.
- source_word: ῥάβδον μόνον
  english_pob_choice: a staff only
  chosen_spanish: solo un bastón
  alternatives_spanish:
  - solo una vara
  - solo un cayado
  lexicon: BDAG
  rationale: ῥάβδος designa un bastón o vara de viaje. «Bastón» es claro y actual; «solo» conserva el valor enfático de μόνον.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - alimento
  - un pan
  lexicon: BDAG
  rationale: El sustantivo concreto se mantiene como «pan», sin generalizarlo a «alimento».
- source_word: πήραν
  english_pob_choice: bag
  chosen_spanish: bolsa
  alternatives_spanish:
  - morral
  - bolsa de viaje
  - alforja
  lexicon: BDAG
  rationale: πήρα es una bolsa para provisiones. «Bolsa» es breve y comprensible; la nota preserva la opción más específica de bolsa de viaje.
- source_word: ζώνην
  english_pob_choice: belt
  chosen_spanish: cinturón
  alternatives_spanish:
  - faja
  - ceñidor
  - cinturón de dinero
  lexicon: BDAG
  rationale: ζώνη puede referirse al cinturón o banda donde se guardaba dinero. «Cinturón» es la equivalencia más clara y estándar en español.
- source_word: χαλκόν
  english_pob_choice: copper
  chosen_spanish: cobre
  alternatives_spanish:
  - moneda de cobre
  - dinero
  - bronce
  lexicon: BDAG
  rationale: El término es literalmente «cobre» y por extensión moneda de cobre o dinero. Se mantiene el valor literal en el texto principal, con la aclaración monetaria en nota.
translation_notes:
  revision_awareness: El inglés auditado ajustó la redacción para evitar una construcción redundante y para reflejar mejor μόνον con «only a staff». La versión española sigue esa misma economía, usando «solo un bastón» y manteniendo la serie negativa sin añadir elementos no presentes en el griego.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque el pasaje no contiene el nombre divino ni κύριος.
  - 'Se mantuvo el orden de prohibiciones del griego: bastón, pan, bolsa, cobre.'
  - «Cobre» se dejó en el texto principal para conservar la fuerza léxica; la nota aclara el sentido monetario.
  - El registro es sobrio y publicable, sin caer en calcos innecesarios.
