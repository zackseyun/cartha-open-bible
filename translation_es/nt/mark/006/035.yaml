translation:
  language: es
  text: 'Y cuando ya era muy tarde[b], sus discípulos se acercaron a él y le decían: «Este lugar está desierto[a], y ya es muy tarde».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es un lugar desierto».'
    reason: lexical_alternative
  - marker: b
    text: Lit. «cuando ya había llegado una hora muy avanzada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - de antemano
  lexicon: BDAG
  rationale: ἤδη marca que el tiempo ya había avanzado; «ya» es el equivalente más natural y directo en español para ambas ocurrencias.
- source_word: ὥρας πολλῆς γενομένης
  english_pob_choice: when it was already very late
  chosen_spanish: cuando ya era muy tarde
  alternatives_spanish:
  - cuando había llegado una hora muy avanzada
  - cuando la hora ya se había hecho muy tarde
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa que había llegado una hora avanzada del día. En español, una cláusula idiomática como «cuando ya era muy tarde» comunica el sentido sin calcar la sintaxis griega.
- source_word: προσελθόντες αὐτῷ
  english_pob_choice: came to him
  chosen_spanish: se acercaron a él
  alternatives_spanish:
  - vinieron a él
  - se le acercaron
  lexicon: BDAG
  rationale: El participio de προσέρχομαι puede expresar acercarse o venir a alguien. «Se acercaron a él» conserva la idea de movimiento hacia Jesús y suena natural en español narrativo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  lexicon: BDAG
  rationale: El posesivo español «sus discípulos» reproduce de manera idiomática el sentido relacional de αὐτοῦ.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - decían
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto señala acción en curso o repetida. «Le decían» preserva ese aspecto sin sonar forzado en español.
- source_word: Ἔρημός ἐστιν ὁ τόπος
  english_pob_choice: This place is deserted
  chosen_spanish: Este lugar está desierto
  alternatives_spanish:
  - Este lugar es desierto
  - Este es un lugar desierto
  lexicon: BDAG
  rationale: ἔρημος aquí describe un lugar deshabitado o aislado. «Está desierto» es una forma natural de expresar ese estado en español y mantiene la fuerza descriptiva del griego.
- source_word: καὶ ἤδη ὥρα πολλή
  english_pob_choice: and it is already very late
  chosen_spanish: y ya es muy tarde
  alternatives_spanish:
  - y ya es una hora muy avanzada
  - y ya es tarde
  lexicon: BDAG
  rationale: La repetición enfatiza la tardanza. «Ya es muy tarde» reproduce esa insistencia con un español claro y idiomático.
translation_notes:
  revision_awareness: Se siguió el sentido del paquete griego SBLGNT y el audit trail inglés; no se detectaron revisiones aplicadas posteriores en el contexto proporcionado.
  spanish_consistency_notes:
  - Se mantuvo «discípulos» y el referente de Jesús implícito en «él», como en el griego y la traducción inglesa auditada.
  - Se usó «ya» para ambos ἤδη a fin de conservar la repetición enfática del original.
  - «Lugar» se prefirió a «sitio» por registro bíblico más amplio y claro, sin introducir arcaísmo.
