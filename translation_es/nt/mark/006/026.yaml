    reason: lexical_alternative
  - marker: b
    text: Or 'deny her' or 'reject her.' The sense is that he did not want to set aside what he had promised her.
    reason: lexical_alternative
  - marker: c
    text: Or 'And the king, becoming deeply grieved, because of his oaths and those reclining at the table,'.
    reason: previous_rendering
