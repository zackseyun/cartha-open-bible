revisions:
- from: Y el rey, estando profundamente afligido[a], a causa de sus juramentos y de los que estaban recostados en la mesa, no quiso rechazarla[b].
  to: Y el rey, poniéndose profundamente afligido[a], a causa de sus juramentos y de los que estaban reclinados a la mesa, no quiso negárselo[b].
  rationale: Se ajustó «estando» a «poniéndose» para reflejar mejor el matiz de cambio de estado de γενόμενος. Se cambió «recostados en la mesa» por «reclinados a la mesa» para una expresión española más natural que conserva la imagen cultural del texto. Se reemplazó «rechazarla» por «negárselo» para expresar con mayor precisión que el rey no quiso negar la petición ni invalidar lo prometido, en línea con el sentido contextual de ἀθετέω.
