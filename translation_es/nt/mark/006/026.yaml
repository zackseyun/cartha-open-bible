translation:
  language: es
  text: Y el rey, poniéndose profundamente afligido[a], a causa de sus juramentos y de los que estaban reclinados a la mesa, no quiso negárselo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «muy triste» o «profundamente angustiado». El griego expresa una aflicción intensa.
    reason: lexical_alternative
  - marker: b
    text: O «rehusarle su petición» o «dejar sin efecto lo que le había prometido». El sentido es que no quiso retractarse de lo comprometido.
    reason: lexical_alternative
lexical_decisions:
- source_word: περίλυπος
  english_pob_choice: deeply grieved
  chosen_spanish: profundamente afligido
  alternatives_spanish:
  - muy triste
  - profundamente apenado
  - profundamente angustiado
  lexicon: BDAG
  rationale: El griego expresa una tristeza intensa; «profundamente afligido» conserva esa fuerza emocional en español natural y digno, sin suavizarla ni volverla excesivamente interpretativa.
- source_word: γενόμενος
  english_pob_choice: becoming
  chosen_spanish: estando
  alternatives_spanish:
  - habiendo llegado a estar
  - al llegar a estar
  - volviéndose
  lexicon: BDAG
  rationale: El participio indica un cambio o estado resultante, pero en español una construcción participial más fluida comunica mejor la relación temporal/estativa sin forzar la sintaxis.
- source_word: βασιλεὺς
  english_pob_choice: king
  chosen_spanish: el rey
  alternatives_spanish:
  - el soberano
  - el monarca
  lexicon: BDAG
  rationale: «El rey» es la equivalencia directa y contextual para Herodes en este relato, y mantiene la referencia narrativa del texto griego.
- source_word: διὰ τοὺς ὅρκους
  english_pob_choice: because of his oaths
  chosen_spanish: a causa de sus juramentos
  alternatives_spanish:
  - por sus juramentos
  - debido a sus juramentos
  - a causa de los juramentos
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; «a causa de» preserva esa relación. «Juramentos» es más preciso que «votos» para ὅρκους, y el posesivo se entiende por el contexto del rey.
- source_word: τοὺς ⸀ἀνακειμένους
  english_pob_choice: those reclining at the table
  chosen_spanish: los que estaban recostados en la mesa
  alternatives_spanish:
  - los comensales
  - los convidados recostados
  - los que estaban presentes en la comida
  lexicon: BDAG
  rationale: ἀνακειμένους refiere literalmente a los que estaban reclinados para comer. «Recostados en la mesa» conserva la imagen cultural del banquete sin reducirla a una paráfrasis como «comensales».
- source_word: οὐκ ἠθέλησεν
  english_pob_choice: did not want to
  chosen_spanish: no quiso
  alternatives_spanish:
  - no quiso hacerlo
  - no deseó
  - no estaba dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa voluntad; «no quiso» es breve, idiomático y conserva la idea de falta de voluntad más que de incapacidad.
- source_word: ἀθετῆσαι αὐτήν
  english_pob_choice: refuse her
  chosen_spanish: rechazarla
  alternatives_spanish:
  - negarle
  - desatenderla
  - repudiarla
  lexicon: BDAG
  rationale: Aquí ἀθετέω tiene el sentido de dejar de lado o desestimar lo que se le había concedido/prometido. «Rechazarla» comunica esa negativa en español; «negarle» o «desatenderla» serían más ambiguas o menos naturales en este contexto.
theological_decisions:
- issue: 'Sentido de ἀθετῆσαι αὐτήν: negativa a revocar lo prometido, no rechazo personal absoluto'
  english_pob_reading: The sense is that he did not want to set aside what he had promised her.
  chosen_spanish_reading: no quiso rechazarla
  alternative_spanish_readings:
  - no quiso negárselo
  - no quiso dejar sin efecto lo que le había prometido
  - no quiso desestimar su petición
  rationale: El contexto narrativo apunta a la presión de su juramento y de los invitados; la negativa no debe leerse como rechazo personal en abstracto, sino como resistencia a retractarse de lo comprometido. La formulación española mantiene esa tensión sin borrarla.
  doctrine_reference: Narrative semantics; lexical context of ἀθετέω in BDAG
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa que ajustó el orden para hacer más natural la relación entre el estado emocional del rey y la acción principal. En español se reflejó esa misma relación con una cláusula inicial participial fluida («estando profundamente afligido») y con la causa introducida por «a causa de», manteniendo la dependencia del rechazo final respecto de los juramentos y de la presencia de los comensales. También se preservó la tensión léxica de ἀθετέω sin convertirla en un rechazo personal más fuerte de lo que el contexto exige.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando corresponda; este versículo no contiene el tetragrámaton.
  - «Rey» se usa como equivalente directo de βασιλεύς en contexto narrativo.
  - «Juramentos» se eligió para ὅρκους en continuidad con el valor legal/obligacional del término.
  - «Los que estaban recostados en la mesa» conserva la imagen del banquete y evita perder el matiz cultural de ἀνακειμένους.
  - La frase final evita ampliar el verbo a una condena moral; solo expresa la negativa a ceder, conforme al griego y al audit trail.
