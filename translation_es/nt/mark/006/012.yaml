    issue: Ambigüedad del sujeto implícito en «que se arrepintieran»
    rationale: Aunque gramaticalmente posible, en español esta formulación puede percibirse como elíptica y menos clara que el inglés auditado, que explicitó «people» para evitar que «they» pareciera referirse a los discípulos.
  - severity: medium
    issue: La nota al pie repite la redacción principal en vez de ofrecer una alternativa significativa
    rationale: La nota dice «más literalmente, 'que se arrepintieran'», pero esa es exactamente la forma del texto principal. Para cumplir la función documentada, la nota debe dar una alternativa como «que ellos se arrepintieran», explicando que «ellos» se refiere a los oyentes.
  revised_spanish_text: Y salieron y proclamaron que la gente se arrepintiera[a].
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «que ellos se arrepintieran», donde «ellos» se refiere a los que oían su proclamación.
