review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Καὶ = «Y», ἐξελθόντες = «salieron», ἐκήρυξαν = «proclamaron», ἵνα + subjuntivo = contenido/propósito expresado con «que», y μετανοῶσιν = «se arrepintieran». Sin embargo, el español «que se arrepintieran» deja el sujeto demasiado implícito y puede sonar algo suspendido o ambiguo en español; la clarificación mínima «que la gente se arrepintiera» preserva mejor el sentido que el inglés POB documentó explícitamente: los oyentes, no los discípulos.'
  spanish_quality_summary: 'El texto es mayormente natural y digno. La principal mejora es de claridad idiomática: en español eclesial general, «proclamaron que se arrepintieran» suena menos completo que «proclamaron que la gente se arrepintiera» o «proclamaron que debían arrepentirse». Además, la nota actual no funciona como alternativa léxica real, porque repite exactamente la redacción principal; conviene que la nota preserve la alternativa más literal con «ellos».'
  glossary_alignment: 'La terminología clave está bien alineada con el proyecto: μετανοέω se traduce correctamente por «arrepentirse», no como mero cambio cognitivo. No hay conflictos con Yahvé/Mesías/espíritu/etc. «Proclamaron» concuerda con la decisión auditada para κηρύσσω.'
  issues:
