translation:
  language: es
  text: Y salieron y proclamaron que la gente se arrepintiera[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «que ellos se arrepintieran», donde «ellos» se refiere a los que oían su proclamación.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción coordinante simple conserva el flujo narrativo sin añadir matiz temporal no explicitado en el griego.
- source_word: ἐξελθόντες
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo de ἐξέρχομαι se vierte de forma natural en español con un verbo finito para mantener la fluidez narrativa, preservando la acción previa o concurrente al verbo principal.
- source_word: ἐκήρυξαν
  english_pob_choice: proclaimed
  chosen_spanish: proclamaron
  alternatives_spanish:
  - predicaron
  - anunciaron
  - heraldaron
  lexicon: BDAG
  rationale: κηρύσσω expresa proclamación pública; 'proclamaron' conserva ese valor sin cargar el texto con una tonalidad eclesiástica posterior que no está explícita en el contexto inmediato.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: En este contexto introduce el contenido de la proclamación. 'Que' es la forma española más natural y evita una reescritura innecesaria de la relación sintáctica.
- source_word: μετανοῶσιν
  english_pob_choice: should repent
  chosen_spanish: se arrepintieran
  alternatives_spanish:
  - se arrepintieran y cambiaran de mente
  - cambiaran de pensamiento
  - se volvieran
  lexicon: BDAG
  rationale: μετανοέω en el contexto evangélico denota arrepentimiento real, no solo cambio cognitivo. 'Se arrepintieran' conserva la fuerza moral y religiosa del término mejor que una paráfrasis más débil.
theological_decisions:
- issue: Contenido de la proclamación y sujeto implícito de μετανοῶσιν
  english_pob_reading: that people should repent
  chosen_spanish_reading: que se arrepintieran
  alternative_spanish_readings:
  - que la gente se arrepintiera
  - que ellos se arrepintieran
  rationale: El griego usa un verbo plural con sujeto implícito entendido por el auditorio de la proclamación, no por los discípulos. El español puede mantener esa misma apertura sin especificar 'gente' para no añadir un referente que el texto no expresa, aunque 'la gente' sería una clarificación posible si el contexto inmediato lo requiriera.
  doctrine_reference: Principio de equivalencia óptima; preservar el alcance del llamado al arrepentimiento sin introducir contenido adicional.
translation_notes:
  revision_awareness: Se siguió la revisión del inglés POB que prefirió 'repent' frente a una paráfrasis cognitiva. En español se evitó 'cambiar de pensamiento/mente' para conservar la precisión de μετανοῶσιν y su peso exhortativo.
  spanish_consistency_notes:
  - Se usa 'proclamaron' para κηρύσσω en coherencia con el valor público de la acción.
  - Se evita 'predicaron' por su posible carga confesional posterior, aunque sigue siendo una alternativa válida en contexto eclesial.
  - Se mantiene 'se arrepintieran' como forma verbal que refleja el llamado exhortativo del subjuntivo dependiente de 'que'.
