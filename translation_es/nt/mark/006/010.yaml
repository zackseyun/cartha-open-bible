  yaml_path: translation/nt/mark/006/010.yaml
  text: And he was saying to them[a], “Wherever you enter a house, stay there until you leave that place.”
  footnotes:
  - marker: a
    text: 'Or: “until you go out from there.” The Greek is more literally “until you leave from there,” which could be taken more woodenly, but here likely refers to leaving that locality.'
