translation:
  language: es
  text: 'Y les decía: «Dondequiera que entren en una casa, quédense allí[a] hasta que salgan de ese lugar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «permanezcan allí hasta que salgan de allí». El griego, más literalmente, dice «hasta que salgan de allí», pero en este contexto probablemente se refiere a salir de ese lugar/localidad.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  - seguía diciéndoles
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continuada o repetida; «les decía» conserva ese valor aspectual con naturalidad en español sin perder el tono narrativo.
- source_word: Ὅπου ἐὰν
  english_pob_choice: Wherever
  chosen_spanish: Dondequiera que
  alternatives_spanish:
  - En cualquier lugar donde
  - Adondequiera que
  lexicon: BDAG
  rationale: La combinación introduce una relativa indefinida; «Dondequiera que» comunica bien la generalidad y suena natural en español bíblico contemporáneo.
- source_word: εἰσέλθητε εἰς οἰκίαν
  english_pob_choice: you enter a house
  chosen_spanish: entren en una casa
  alternatives_spanish:
  - entren en una vivienda
  - entren en un hogar
  lexicon: BDAG
  rationale: εἰσέρχομαι con εἰς marca entrada en un lugar; en español, «entren en una casa» conserva la dirección sin sobrecargar la frase. «Casa» refleja mejor el lugar de hospedaje que «hogar».
- source_word: οἰκίαν
  english_pob_choice: a house
  chosen_spanish: una casa
  alternatives_spanish:
  - un hogar
  - una vivienda
  lexicon: BDAG
  rationale: El contexto es el alojamiento concreto en el que se hospedan los enviados; «casa» es la equivalencia más directa y menos interpretativa.
- source_word: ἐκεῖ μένετε
  english_pob_choice: stay there
  chosen_spanish: quédense allí
  alternatives_spanish:
  - permanezcan allí
  - alójense allí
  lexicon: BDAG
  rationale: μένω puede traducirse por «quedarse/permanecer». «Quédense allí» suena natural en una instrucción directa y mantiene la idea de permanecer en el mismo lugar.
- source_word: ἕως ἂν ἐξέλθητε ἐκεῖθεν
  english_pob_choice: until you leave that place
  chosen_spanish: hasta que salgan de ese lugar
  alternatives_spanish:
  - hasta que salgan de allí
  - hasta que partan de ese lugar
  lexicon: BDAG
  rationale: La frase griega puede entenderse como salida de ese lugar/localidad. «De ese lugar» evita la literalidad opaca de «de allí» y preserva la fuerza locativa del cierre, en línea con la nota auditada en inglés.
theological_decisions:
- issue: Alcance de ἐκεῖθεν
  english_pob_reading: The disciples are to remain in the same house until they leave the locality/place, not merely until they step out of the house.
  chosen_spanish_reading: Los discípulos deben permanecer en la misma casa hasta que salgan de ese lugar, no simplemente hasta cruzar el umbral de la casa.
  alternative_spanish_readings:
  - hasta que salgan de la casa
  - hasta que salgan de allí
  rationale: En contexto, Jesús regula la conducta misionera y la permanencia en una sola hospitalidad. «Ese lugar» conserva la posibilidad de una referencia más amplia que la pura salida física de la casa, sin forzar el texto ni diluir la instrucción.
  doctrine_reference: No doctrinal; decisión contextual de alcance semántico.
translation_notes:
  revision_awareness: La revisión inglesa más reciente eliminó un «into» innecesario para mayor naturalidad sin alterar el sentido; en español no hacía falta un equivalente problemático, así que se mantuvo una formulación natural y fiel al griego y a la decisión auditada sobre el alcance de ἐκεῖθεν.
  spanish_consistency_notes:
  - Se emplea «casa» y no «hogar» para reflejar el contexto de hospedaje concreto.
  - Se traduce el imperfecto con «les decía» para preservar el valor durativo/reiterativo.
  - Se evita «SEÑOR» u otras sustituciones no presentes, ya que el versículo no contiene el nombre divino ni κύριος.
  - La nota al pie conserva la alternativa literal del griego y aclara el posible alcance de ἐκεῖθεν.
