base_translation:
  language: en
  yaml_path: translation/nt/mark/006/011.yaml
  text: And whatever place does not receive you or listen to you[a], as you leave there[b], shake off the dust that is under your feet as a testimony to them.
  footnotes:
  - marker: a
    text: Or 'as a testimony to them' or 'as a witness to them.' The Greek can be read more literally this way, though the context suggests a testimony against those who reject the message.
    reason: alternative_reading
  - marker: b
    text: Shaking off dust from one's feet was a symbolic act of dissociation and warning in response to rejection.
    reason: cultural_note
