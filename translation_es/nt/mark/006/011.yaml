translation:
  language: es
  text: Y cualquier lugar que no los reciba ni los escuche[a], al salir de allí, sacudan el polvo de debajo de sus pies como testimonio para ellos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los oiga». El griego puede entenderse más literalmente como «los oigan», pero el contexto favorece la idea de prestar atención a su mensaje.
    reason: alternative_reading
  - marker: b
    text: El gesto de sacudir el polvo de los pies era una acción simbólica de separación y advertencia ante el rechazo.
    reason: cultural_note
lexical_decisions:
- source_word: ὃς ἂν τόπος
  english_pob_choice: whatever place
  chosen_spanish: cualquier lugar
  alternatives_spanish:
  - todo lugar
  - dondequiera que
  lexicon: BDAG
  rationale: La construcción es indefinida y general. «Cualquier lugar» preserva el valor abierto de τόπος sin volver la frase artificial en español. «Dondequiera que» suena natural, pero desplaza el sustantivo explícito «lugar».
- source_word: δέξηται
  english_pob_choice: does not receive
  chosen_spanish: no los reciba
  alternatives_spanish:
  - no los acoja
  - no los acepte
  lexicon: BDAG
  rationale: δώ/δέχομαι aquí apunta a recibir con hospitalidad a los enviados. «Reciba» es amplio y fiel; «acoja» explicita demasiado la hospitalidad, y «acepte» suena más abstracto que el griego.
- source_word: ἀκούσωσιν ὑμῶν
  english_pob_choice: listen to you
  chosen_spanish: les escuche
  alternatives_spanish:
  - los oiga
  - les haga caso
  lexicon: BDAG
  rationale: Con genitivo, ἀκούω puede significar oír o escuchar con atención. «Les escuche» conserva la idea de prestar atención sin llegar a «hacer caso», que ya interpreta el rechazo.
- source_word: ἐκπορευόμενοι ἐκεῖθεν
  english_pob_choice: as you leave there
  chosen_spanish: al salir de allí
  alternatives_spanish:
  - cuando salgan de allí
  - saliendo de allí
  lexicon: BDAG
  rationale: El participio tiene valor circunstancial/temporal. «Al salir de allí» es natural y mantiene la secuencia de acciones sin añadir matices inexistentes.
- source_word: ἐκτινάξατε
  english_pob_choice: shake off
  chosen_spanish: sacudan
  alternatives_spanish:
  - sacudan el polvo
  - quiten sacudiendo
  lexicon: BDAG
  rationale: El verbo expresa sacudir para desprender. En español, «sacudan el polvo» transmite mejor el gesto que un calco como «sacudan fuera» o «sacudan de sí».
- source_word: τὸν χοῦν τὸν ὑποκάτω τῶν ποδῶν ὑμῶν
  english_pob_choice: the dust that is under your feet
  chosen_spanish: el polvo de debajo de sus pies
  alternatives_spanish:
  - el polvo bajo sus pies
  - el polvo de sus pies
  lexicon: BDAG
  rationale: «Debajo de sus pies» refleja ὑποκάτω con claridad y suena natural en español. «Polvo» conserva el sustantivo concreto de χοῦς, aunque en castellano también pudiera decirse «tierra»; se mantiene «polvo» por fidelidad al griego y al audit trail inglés.
- source_word: εἰς μαρτύριον αὐτοῖς
  english_pob_choice: as a testimony to them
  chosen_spanish: como testimonio para ellos
  alternatives_spanish:
  - como testimonio contra ellos
  - como testimonio a ellos
  lexicon: BDAG
  rationale: El audit trail inglés preservó la literalidad de αὐτοῖς con «to them», aunque reconoció la fuerza contextual adversa. En español, «para ellos» mantiene esa literalidad sin imponer «contra ellos»; «como testimonio» conserva μαρτύριον como acto/resultado de testimonio.
theological_decisions:
- issue: Fuerza del gesto de sacudir el polvo
  english_pob_reading: A symbolic testimony of judgment against those who reject the messengers.
  chosen_spanish_reading: Un testimonio simbólico dirigido a quienes rechazan el mensaje, sin fijar de antemano la carga adversa en la traducción principal.
  alternative_spanish_readings:
  - Un testimonio contra ellos
  - Un signo de separación más que de juicio
  rationale: El contexto sugiere rechazo y el gesto tiene carga profética, pero el griego dice literalmente «para ellos». Siguiendo el revision-aware audit trail, la redacción principal mantiene la dirección formal del texto y evita resolver en la línea principal una tensión que el original deja abierta.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica con alternativa en nota cuando persiste la ambigüedad)
- issue: Relación entre «escuchen» y la respuesta al mensaje
  english_pob_reading: listen to you
  chosen_spanish_reading: les escuche
  alternative_spanish_readings:
  - los oiga
  - les haga caso
  rationale: La misión presupone una escucha obediente, pero ἀκούω no exige en sí misma la idea de obediencia. Por eso se evita «hacer caso» en el texto principal y se conserva una forma más amplia y auditable.
  doctrine_reference: Principio POB de no sobredeterminar el verbo con una interpretación que el griego no obliga
translation_notes:
  revision_awareness: El audit trail inglés pasó de «against them» a «to them» para reflejar más de cerca εἰς μαρτύριον αὐτοῖς. La versión española sigue esa revisión, evitando introducir «contra ellos» en el texto principal, aunque conserva la tensión contextual en la nota y en la formulación «como testimonio para ellos».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma POB para el Tetragrámaton, aunque este versículo no lo contiene.
  - Se usa «polvo» para χοῦς en continuidad con el audit trail inglés y con el gesto ritual descrito.
  - «Escuche» conserva el tono de atención al mensaje sin convertirlo en una parapráfrasis de obediencia.
