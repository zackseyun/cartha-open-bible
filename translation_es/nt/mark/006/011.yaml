  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en la mayor parte: «cualquier lugar», «no los reciba», «al salir de allí», «sacudan el polvo...», y «como testimonio para ellos» reflejan adecuadamente ὃς ἂν τόπος, δέξηται, ἐκπορευόμενοι ἐκεῖθεν, ἐκτινάξατε, y εἰς μαρτύριον αὐτοῖς. Sin embargo, la nota [a] no corresponde bien al griego ἀκούσωσιν ὑμῶν: propone «oigan ustedes» y una glosa confusa «escuchen/oíganles», cuando el sentido es «oírlos / escucharlos / prestarles atención».'
  spanish_quality_summary: El español principal es claro, natural y digno. Solo requiere un ajuste menor de estilo y precisión en la nota [a]. En la línea principal, «ni los escuche[a]» suena más natural y gramaticalmente paralelo a «no los reciba» que «ni les escuche[a]». El resto lee bien y es ampliamente eclesialmente comprensible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La elección «testimonio para ellos» respeta el audit trail revisado, y «polvo» conserva bien χοῦν.
  issues:
  - severity: medium
    issue: La nota [a] explica incorrectamente ἀκούσωσιν ὑμῶν
    rationale: El genitivo ὑμῶν con ἀκούω aquí corresponde a «oírlos / escucharlos / escucharles» en el sentido de prestar atención a los mensajeros. «Oigan ustedes» cambia la persona y no representa el objeto del verbo.
  - severity: low
    issue: «ni les escuche» es menos natural que «ni los escuche» en esta construcción
    rationale: Aunque «escucharle(s)» existe, en español general el paralelismo con «recibirlos» favorece «escucharlos». Esto además evita que el lector entienda un dativo poco natural en una frase breve de instrucción.
