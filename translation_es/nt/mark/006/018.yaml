translation:
  language: es
  text: 'Porque Juan le decía a Herodes: «No te es lícito[a] tener la mujer de tu hermano».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No te está permitido tener la mujer de tu hermano».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: had been saying
  chosen_spanish: había estado diciéndole
  alternatives_spanish:
  - decía
  - venía diciéndole
  - había dicho
  lexicon: BDAG
  rationale: El imperfecto griego comunica acción pasada continua o repetida; en español, «había estado diciéndole» conserva esa duración mejor que un pretérito simple.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: Mantiene el valor explicativo/conectivo de γάρ en un español natural al inicio de la oración.
- source_word: τῷ Ἡρῴδῃ
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - a Herodes
  - para Herodes
  lexicon: Nombre propio transliterado
  rationale: Se translitera el nombre propio según la convención del proyecto; el dativo se expresa con «a» en español por naturalidad sintáctica.
- source_word: Οὐκ ἔξεστίν σοι
  english_pob_choice: It is not lawful for you
  chosen_spanish: No te es lícito
  alternatives_spanish:
  - No te está permitido
  - No te es permitido
  - No te corresponde
  lexicon: BDAG
  rationale: «Lícito» preserva la fuerza jurídico-moral de ἔξεστιν sin sobrecargar la frase ni debilitarla a mera conveniencia.
- source_word: ἔχειν
  english_pob_choice: to have
  chosen_spanish: tener
  alternatives_spanish:
  - poseer
  - tomar
  - tener por esposa
  lexicon: BDAG
  rationale: En este contexto matrimonial, «tener» reproduce de forma sobria el verbo del original sin añadir paráfrasis.
- source_word: τὴν γυναῖκα
  english_pob_choice: your brother’s wife
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la mujer de
  lexicon: BDAG
  rationale: Se conserva «mujer» porque el griego usa γυναῖκα; el contexto y el genitivo siguiente aclaran el sentido matrimonial.
- source_word: τοῦ ἀδελφοῦ σου
  english_pob_choice: your brother’s
  chosen_spanish: de tu hermano
  alternatives_spanish:
  - de tu hermano mayor
  - de tu hermano carnal
  lexicon: BDAG
  rationale: El genitivo se expresa de forma directa en español; «de tu hermano» conserva la relación familiar sin ampliar el texto.
theological_decisions:
- issue: Matiz de la prohibición
  english_pob_reading: 'Rendered as a statement of legal/moral prohibition: ''It is not lawful for you'''
  chosen_spanish_reading: «No te es lícito»
  alternative_spanish_readings:
  - No te está permitido
  - No debes
  rationale: La frase mantiene el valor jurídico-moral de ἔξεστιν y no lo reduce a una mera costumbre o preferencia personal.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español y esté anclado al nombre propio «Herodes».
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; aquí no aparece.
  - Se mantiene «lícito» para la fuerza legal/moral de ἔξεστιν.
  - «Mujer» se conserva por fidelidad al sustantivo griego, aunque el contexto obligue a entender «esposa».
  - El dativo griego se naturaliza con «a Herodes» en español, sin perder el destinatario del discurso.
