    text: Or “buy loaves for two hundred denarii.” The Greek ἄρτους can mean “bread” or “loaves.”
    reason: lexical_alternative
  - marker: b
    text: A denarius was a standard daily wage for a laborer or soldier.
    reason: cultural_note
