base_translation:
  language: en
  yaml_path: translation/nt/mark/006/037.yaml
  text: But he answered and said to them[a], “You yourselves give them something to eat.” And they said to him[b], “Should we go and buy bread for two hundred denarii and give it to them to eat?”
  footnotes:
