revisions:
- from: 'Pero él les respondió y les dijo[a]: «Denles ustedes mismos de comer». Y ellos le dijeron[b]: «¿Iremos y compraremos doscientos denarios de pan y se lo daremos para que coman?».'
  to: 'Pero él les respondió y les dijo: «Denles ustedes mismos de comer». Y ellos le dijeron: «¿Iremos a comprar pan[a] por doscientos denarios[b] y les daremos de comer?»'
  rationale: Se corrigieron los anclajes de notas para que correspondan al término pertinente en el texto. Se ajustó «doscientos denarios de pan» a «pan por doscientos denarios» para reflejar con más precisión la idea de costo. Se reemplazó «se lo daremos para que coman» por «les daremos de comer» para conservar mejor el paralelismo con el mandato de Jesús y mejorar la naturalidad del español. También se suavizó «Iremos y compraremos» a «Iremos a comprar», que suena más idiomático sin perder la fuerza deliberativa.
