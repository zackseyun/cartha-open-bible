translation:
  language: es
  text: 'Pero él les respondió y les dijo: «Denles ustedes mismos de comer». Y ellos le dijeron: «¿Iremos a comprar pan[a] por doscientos denarios[b] y les daremos de comer?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panes». El griego ἄρτους puede significar «pan» o «panes».
    reason: lexical_alternative
  - marker: b
    text: Un denario era el jornal estándar de un trabajador o soldado.
    reason: cultural_note
lexical_decisions:
- source_word: ἀποκριθεὶς εἶπεν
  english_pob_choice: answered and said
  chosen_spanish: respondió y dijo
  alternatives_spanish:
  - respondió
  - dijo en respuesta
  lexicon: BDAG
  rationale: Conserva la fórmula narrativa semítica/griega de respuesta seguida de discurso, sin reducirla indebidamente a un solo verbo, y suena natural en español bíblico moderno.
- source_word: Δότε
  english_pob_choice: give
  chosen_spanish: Den
  alternatives_spanish:
  - Provean
  - Entréguenles
  lexicon: BDAG
  rationale: El imperativo de δίδωμι se conserva como un mandato directo. «Den» refleja mejor la fuerza breve e inmediata del original que una paráfrasis como «provean».
- source_word: ὑμεῖς
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - ustedes mismos mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático; por eso se mantiene con «ustedes mismos» para reflejar la insistencia de Jesús.
- source_word: φαγεῖν
  english_pob_choice: something to eat
  chosen_spanish: de comer
  alternatives_spanish:
  - algo de comer
  - para comer
  lexicon: BDAG
  rationale: Después de un verbo de dar, el infinitivo funciona idiomáticamente como complemento de finalidad o resultado. «De comer» comunica la idea sin sobrerrepresentar un sustantivo inexistente en el griego.
- source_word: Ἀπελθόντες
  english_pob_choice: go
  chosen_spanish: Iremos
  alternatives_spanish:
  - Habiendo ido
  - Vamos a ir
  lexicon: BDAG
  rationale: En la pregunta deliberativa, el participio tiene valor de movimiento previo/subordinado. En español, la pregunta se expresa con naturalidad mediante «Iremos» dentro del planteamiento retórico.
- source_word: ἀγοράσωμεν
  english_pob_choice: should we ... buy
  chosen_spanish: compraremos
  alternatives_spanish:
  - compremos
  - debemos comprar
  lexicon: BDAG
  rationale: Aunque el griego es deliberativo, el español puede reflejar esa deliberación en forma interrogativa con futuro. «Compraremos» evita una lectura demasiado exhortativa y mantiene el tono de reflexión práctica.
- source_word: δηναρίων διακοσίων
  english_pob_choice: for two hundred denarii
  chosen_spanish: doscientos denarios
  alternatives_spanish:
  - por doscientos denarios
  - con doscientos denarios
  lexicon: BDAG
  rationale: La construcción genitiva expresa precio/costo. El español normaliza la relación cuantitativa con «doscientos denarios», que resulta claro y fiel.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - loaves
  lexicon: BDAG
  rationale: «Pan» es la forma más natural y reverente en español para ἄρτος en este contexto. La alternativa «panes» podría sonar demasiado literal y marcar pluralidad material innecesaria.
- source_word: δώσομεν αὐτοῖς φαγεῖν
  english_pob_choice: give it to them to eat
  chosen_spanish: se lo daremos para que coman
  alternatives_spanish:
  - les daremos de comer
  - se lo daremos de comer
  lexicon: BDAG
  rationale: Se conserva el paralelo con el mandato de Jesús mediante «daremos»/«darles», pero el español requiere explicitar el complemento pronominal con naturalidad. «Para que coman» evita la extrañeza de un infinitivo desnudo y mantiene el sentido resultativo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego de SBLGNT y el criterio de la POB inglesa: conservar la respuesta narrativa («respondió y dijo»), mantener el énfasis de ὑμεῖς, y preservar la alternativa léxica de ἄρτους mediante nota. No se detectaron revisiones posteriores que alteren la lectura base.'
  spanish_consistency_notes:
  - Se usa «Jesús» implícito por el contexto y no se introduce un nombre ausente.
  - Se mantiene «denarios» como moneda histórica sin normalización cultural.
  - Se evita «Cristo» o terminología teológica no presente en el versículo.
  - El estilo busca equilibrio óptimo entre literalidad y español público legible.
