review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego y conserva el énfasis de «ustedes mismos». Sin embargo, en la pregunta final pierde precisión en dos puntos: omite la preposición de costo implícita en δηναρίων διακοσίων, y «se lo daremos para que coman» resulta menos natural y menos paralelo al mandato previo que una formulación como «les daremos de comer». Además, los anclajes de notas están invertidos respecto al contenido: la nota léxica sobre ἄρτους debe ir con «pan», y la nota cultural sobre «denarios» debe ir con «denarios».'
  spanish_quality_summary: El español es generalmente claro y digno, pero la puntuación de notas no está bien ubicada y la segunda mitad de la pregunta suena algo forzada. «¿Iremos y compraremos…?» puede funcionar, pero «¿vamos a ir a comprar…?» o «¿iremos a comprar…?» sería más idiomático; aun así, el ajuste principal necesario es la frase final para mejorar naturalidad y fidelidad verbal.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. Las decisiones principales («respondió y dijo», «Den», «ustedes mismos», «pan») son compatibles con el audit trail. Conviene mantener «pan» en texto principal y preservar «panes» en nota léxica.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en lugares incorrectos.
    rationale: La nota a trata sobre ἄρτους («pan/panes»), pero está anclada tras «dijo»; la nota b explica «denario», pero está anclada tras «dijeron». Deben aparecer junto a «pan» y «denarios», respectivamente.
  - severity: medium
    issue: «doscientos denarios de pan» expresa peor la relación de precio/costo que el griego.
    rationale: 'δηναρίων διακοσίων modifica la compra por costo: «por doscientos denarios» o equivalente. «de pan» puede sonar como cantidad o contenido, no precio.'
  - severity: medium
    issue: «se lo daremos para que coman» es menos natural y rompe el paralelo con «Denles… de comer».
    rationale: El griego repite δίδωμι + φαγεῖν; en español, «les daremos de comer» conserva mejor el paralelismo y fluye con más naturalidad.
  - severity: low
    issue: «Iremos y compraremos» es comprensible, pero algo rígido para una pregunta deliberativa en español.
    rationale: No es infiel, pero «¿iremos a comprar…?» o «¿vamos a ir a comprar…?» suena más natural. Puede mejorarse sin necesidad de una reformulación extensa.
  revised_spanish_text: 'Pero él les respondió y les dijo: «Denles ustedes mismos de comer». Y ellos le dijeron: «¿Iremos a comprar pan[a] por doscientos denarios[b] y les daremos de comer?»'
  revised_footnotes:
