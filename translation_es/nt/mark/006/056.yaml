translation:
  language: es
  text: Y por dondequiera que entraba en aldeas, ciudades o zonas rurales[a], en las plazas de mercado ponían a los enfermos, y le rogaban que siquiera tocaran el borde de su manto[b]; y cuantos lo tocaban eran sanados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la campiña». El griego ἀγρούς puede referirse a distritos o zonas rurales, no necesariamente a parcelas individuales.
    reason: lexical_alternative
  - marker: b
    text: O «el dobladillo de su manto» o «la orla/fleco de su vestido». El griego κράσπεδον puede referirse al borde de una prenda y, en contexto judío, también sugerir sus flecos rituales.
    reason: lexical_alternative
  - marker: c
    text: Griego «eran salvados» (ἐσῴζοντο); en este contexto, el verbo se refiere a sanidad o restauración física.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἂν
  english_pob_choice: wherever
  chosen_spanish: por dondequiera que
  alternatives_spanish:
  - dondequiera que
  - por cualquier lugar donde
  lexicon: BDAG
  rationale: La combinación expresa una generalización indefinida sobre el lugar. En español, «por dondequiera que» conserva bien esa amplitud narrativa sin sonar mecánico.
- source_word: εἰσεπορεύετο
  english_pob_choice: he entered
  chosen_spanish: entraba
  alternatives_spanish:
  - entraba
  - ingresaba
  - iba entrando
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida o habitual. «Entraba» comunica naturalidad narrativa en español y conserva el valor iterativo.
- source_word: κώμας ... πόλεις ... ἀγρούς
  english_pob_choice: villages or cities or countryside
  chosen_spanish: aldeas o ciudades o campos
  alternatives_spanish:
  - aldeas o ciudades o la campiña
  - pueblos o ciudades o campos
  lexicon: BDAG
  rationale: «κώμαι» son aldeas/villas; «πόλεις» son ciudades; «ἀγροί» aquí apunta a zonas rurales abiertas. «Campos» mantiene el contraste espacial sin sobreinterpretar como campos agrícolas individuales.
- source_word: ἐν ταῖς ἀγοραῖς
  english_pob_choice: in the marketplaces
  chosen_spanish: en las plazas
  alternatives_spanish:
  - en los mercados
  - en las plazas de mercado
  lexicon: BDAG
  rationale: «ἀγορά» puede ser mercado o plaza pública. En español, «plazas» recoge la idea de espacio público donde se reunía la gente; el contexto de enfermos colocados públicamente permite esta opción, aunque «mercados» también es posible.
- source_word: ἐτίθεσαν
  english_pob_choice: they laid
  chosen_spanish: ponían
  alternatives_spanish:
  - colocaban
  - ponían
  - dejaban
  lexicon: BDAG
  rationale: El imperfecto plural marca acción repetida. «Ponían» es natural en español y conserva el acto de colocar a los enfermos.
- source_word: τοὺς ἀσθενοῦντας
  english_pob_choice: the sick
  chosen_spanish: a los enfermos
  alternatives_spanish:
  - a los enfermos
  - a los que estaban enfermos
  - a los débiles
  lexicon: BDAG
  rationale: El participio designa a los que estaban enfermos o débiles. «A los enfermos» es idiomático y claro en español.
- source_word: παρεκάλουν
  english_pob_choice: begging him
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le suplicaban
  - le imploraban
  - le rogaban
  lexicon: BDAG
  rationale: En este contexto de sanidad, el verbo expresa súplica insistente. «Le rogaban» mantiene la intensidad sin volverse demasiado coloquial.
- source_word: ἵνα κἂν ... ἅψωνται
  english_pob_choice: that they might even touch
  chosen_spanish: que, aun con solo tocar
  alternatives_spanish:
  - que incluso tocaran
  - que al menos tocaran
  - que con tocar
  lexicon: BDAG
  rationale: 'κἄν comunica una petición mínima: «aunque sea / aun con solo». «Aun con solo tocar» preserva la idea de un acto mínimo y suficiente.'
- source_word: τοῦ κρασπέδου τοῦ ἱματίου αὐτοῦ
  english_pob_choice: the fringe of his garment
  chosen_spanish: el borde de su manto[b]
  alternatives_spanish:
  - la orla de su manto
  - el borde de su manto
  - la franja de su manto
  lexicon: BDAG
  rationale: «κράσπεδον» puede ser borde, orla o borla/franja. «Borde de su manto» es claro y no fuerza una lectura técnica en el texto principal; la nota preserva la posibilidad de ‘franja/orla’ en contexto judío.
- source_word: ἥψαντο αὐτοῦ
  english_pob_choice: touched him
  chosen_spanish: tocaban
  alternatives_spanish:
  - lo tocaban
  - tocaban
  - tocaban su manto
  lexicon: BDAG
  rationale: El griego dice literalmente que lo tocaban, con referencia inmediata al borde del manto. En español, «lo tocaban» sería más literal, pero «tocaban» dentro del contexto anterior evita redundancia; la nota explica el referente implícito.
- source_word: ἐσῴζοντο
  english_pob_choice: were being healed
  chosen_spanish: eran sanados
  alternatives_spanish:
  - eran sanados
  - eran salvados
  - eran curados
  lexicon: BDAG
  rationale: En este contexto inmediato de enfermedad y contacto sanador, σῴζω remite a sanidad/restauración física. «Eran sanados» refleja bien el sentido contextual sin eliminar la amplitud del verbo.
theological_decisions:
- issue: Sentido de σῴζω en el cierre del versículo
  english_pob_reading: were being healed
  chosen_spanish_reading: eran sanados
  alternative_spanish_readings:
  - eran salvados
  - eran curados
  rationale: Aunque σῴζω puede tener peso soteriológico, aquí el contexto inmediato es la curación de enfermos por contacto. «Eran sanados» evita importar una lectura doctrinal no explicitada por la escena, a la vez que conserva la relación entre salvación y restauración física en el verbo griego.
  doctrine_reference: Principio de primacía del contexto inmediato; preservar la tensión semántica sin sobredeterminación doctrinal.
translation_notes:
  revision_awareness: 'Tomé en cuenta la revisión inglesa más reciente: mantuve el valor narrativo iterativo del imperfecto, opté por una formulación española natural para la súplica mínima expresada por κἄν, y preservé la referencia implícita al manto en vez de forzarla dentro del verbo final.'
  spanish_consistency_notes:
  - Se usa «Dios/Yahvé» y no aplica aquí.
  - Se conservó un registro bíblico moderno y digno, sin calcos innecesarios.
  - «Sanados» se emplea para reflejar el sentido contextual de σῴζω en una escena de curación física.
  - La nota sobre κράσπεδον preserva la tensión entre borde general y posible alusión a flecos rituales.
