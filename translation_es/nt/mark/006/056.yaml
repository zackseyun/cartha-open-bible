revisions:
- from: Y por dondequiera que entraba en aldeas o ciudades o campos, ponían[a] a los enfermos en las plazas y le rogaban que, aun con solo tocar el borde de su manto[b], bastara; y cuantos lo tocaban, eran sanados[c].
  to: Y por dondequiera que entraba en aldeas, ciudades o zonas rurales[a], en las plazas de mercado ponían a los enfermos, y le rogaban que siquiera tocaran el borde de su manto[b]; y cuantos lo tocaban eran sanados[c].
  rationale: Se eliminó «bastara» porque añade una idea no explicitada por el griego. Se cambió «campos» por «zonas rurales» para reflejar mejor ἀγρούς, y «plazas» por «plazas de mercado» para representar con mayor precisión ἀγοραῖς. Se mantuvo «eran sanados» por fidelidad al sentido contextual de ἐσῴζοντο, conservando la alternativa en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:36:57Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del versículo y varias decisiones léxicas clave: «por dondequiera que», «entraba», «a los enfermos», «le rogaban» y «eran sanados» corresponden adecuadamente al griego y al rastro de auditoría inglés. Sin embargo, la cláusula «que, aun con solo tocar el borde de su manto, bastara» introduce una idea no expresada en el original: «bastara». El griego ἵνα κἂν ... ἅψωνται expresa el contenido de la súplica, que pudieran siquiera tocar; no dice explícitamente «que eso bastara». Además, el cierre «y cuantos lo tocaban» está bien alineado con αὐτοῦ, pero conviene ajustar la frase previa para mantener la relación entre tocar el borde del manto y tocarlo a él sin ambigüedad artificial.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la frase con «bastara» suena forzada y menos natural que una construcción directa como «que siquiera tocaran». También «campos» puede sonar demasiado a parcelas o terrenos agrícolas individuales; en este contexto distributivo «zonas rurales» o «la campiña» refleja mejor ἀγρούς. «Plazas» es posible para ἀγοραῖς, pero «plazas de mercado» o «mercados» comunica mejor la función pública/comercial del lugar. La revisión propuesta mejora fidelidad y naturalidad sin perder sobriedad.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión de traducir ἐσῴζοντο como «eran sanados» concuerda con la rationale contextual del POB. «Borde de su manto» con nota léxica es aceptable para κράσπεδον. La principal desalineación no es terminológica sino semántica: «bastara» añade una inferencia no documentada.'
  issues:
  - severity: high
    issue: La expresión «bastara» añade sentido no presente en el griego.
    rationale: ἵνα κἂν ... ἅψωνται significa que rogaban para que pudieran siquiera tocar el borde de su manto. El texto no declara explícitamente que ese toque «bastara»; eso se infiere por el resultado posterior, pero no debe introducirse en la cláusula de petición.
  - severity: medium
    issue: «Campos» no refleja con suficiente precisión ἀγρούς en este contexto.
    rationale: Según la auditoría inglesa, ἀγροί aquí se refiere a distritos rurales/campiña, no a campos individuales. «Campos» en español puede estrechar indebidamente el referente.
  - severity: medium
    issue: «Plazas» queda algo subespecificado para ἀγοραῖς.
    rationale: ἀγοραί son plazas de mercado/mercados públicos. «Plazas» no es incorrecto, pero puede perder el matiz de mercado que el griego sí sugiere.
  - severity: low
    issue: La nota b usa «manto», mientras el matiz más general del griego es «vestido/ropa/garment».
    rationale: No exige cambio mayor, pero conviene que la nota no estreche innecesariamente ἱμάτιον a «manto» cuando la explicación léxica habla del borde de la prenda.
  revised_spanish_text: Y por dondequiera que entraba en aldeas, ciudades o zonas rurales[a], en las plazas de mercado ponían a los enfermos, y le rogaban que siquiera tocaran el borde de su manto[b]; y cuantos lo tocaban eran sanados[c].
  revised_footnotes:
  - marker: a
    text: O «la campiña». El griego ἀγρούς puede referirse a distritos o zonas rurales, no necesariamente a parcelas individuales.
    reason: lexical_alternative
  - marker: b
    text: O «el dobladillo de su manto» o «la orla/fleco de su vestido». El griego κράσπεδον puede referirse al borde de una prenda y, en contexto judío, también sugerir sus flecos rituales.
    reason: lexical_alternative
  - marker: c
    text: Griego «eran salvados» (ἐσῴζοντο); en este contexto, el verbo se refiere a sanidad o restauración física.
    reason: lexical_alternative
  revision_rationale: Se eliminó «bastara» porque añade una idea no explicitada por el griego. Se cambió «campos» por «zonas rurales» para reflejar mejor ἀγρούς, y «plazas» por «plazas de mercado» para representar con mayor precisión ἀγοραῖς. Se mantuvo «eran sanados» por fidelidad al sentido contextual de ἐσῴζοντο, conservando la alternativa en nota.
