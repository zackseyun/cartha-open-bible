translation:
  language: es
  text: 'Y Jesús les decía: «Un profeta no carece de honra sino en su tierra natal[a], entre sus parientes[b] y en su hogar[c]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lugar de origen» o «patria». El griego πατρίς se refiere al propio lugar natal; aquí «tierra natal» encaja bien con el contexto local de Nazaret.
    reason: lexical_alternative
  - marker: b
    text: O «familiares» o «consanguíneos». El término griego designa a los parientes o miembros del mismo grupo de parentesco.
    reason: lexical_alternative
  - marker: c
    text: O «casa». El griego puede referirse tanto a la casa física como a la unidad doméstica o familiar; «hogar» se elige aquí para expresar mejor la idea de «household» y distinguirla de «parientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les estaba diciendo
  alternatives_spanish:
  - les decía
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o repetida; «les estaba diciendo» conserva ese aspecto mejor que un pretérito simple y suena natural en español.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - mensajero profético
  lexicon: BDAG
  rationale: «Profeta» es el equivalente directo y estándar, sin necesidad de expansión interpretativa.
- source_word: ἄτιμος
  english_pob_choice: without honor
  chosen_spanish: sin honor
  alternatives_spanish:
  - deshonrado
  - despreciado
  lexicon: BDAG
  rationale: La construcción negativa del griego se refleja de manera más transparente con «sin honor»; mantiene el matiz de honor/vergüenza del dicho.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En una oración negativa, «εἰ μὴ» funciona como excepción; «sino» reproduce bien esa relación en español y evita una lectura condicional.
- source_word: πατρίδι
  english_pob_choice: hometown
  chosen_spanish: su tierra natal
  alternatives_spanish:
  - su pueblo
  - su lugar de origen
  - su patria chica
  lexicon: BDAG
  rationale: Aquí πατρίς se refiere al lugar de origen local, no a una patria nacional; «su tierra natal» comunica esa referencia con naturalidad en español y deja abierto el ámbito local de Nazaret.
- source_word: συγγενεῦσιν
  english_pob_choice: relatives
  chosen_spanish: sus parientes
  alternatives_spanish:
  - sus familiares
  - sus deudos
  - sus parientes cercanos
  lexicon: BDAG
  rationale: «Parientes» transmite el grupo de parentesco y preserva la distinción respecto de «su casa», tal como lo hace el audit trail en inglés.
- source_word: οἰκίᾳ
  english_pob_choice: household
  chosen_spanish: su casa
  alternatives_spanish:
  - su hogar
  - su familia
  - su casa doméstica
  lexicon: BDAG
  rationale: El griego puede referirse a la casa física o a la unidad doméstica. Dado que ya se mencionan los parientes, «su casa» mantiene la ambigüedad útil del original y evita redundancia; además, es la opción más cercana al texto griego sin sobreinterpretar.
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - así como ... y ... y
  - tanto ... como ... y
  lexicon: BDAG
  rationale: La repetición de καί se conserva con cada «y» para reflejar el encadenamiento retórico del griego y la acumulación de ámbitos de deshonra.
theological_decisions:
- issue: Alcance del dicho sobre el honor del profeta
  english_pob_reading: Render the saying as a general proverb applied by Jesus to himself, without adding interpretive explanation about his messianic identity or rejection beyond the text.
  chosen_spanish_reading: Traducir el proverbio tal como está, sin añadir una explicación interpretativa sobre la identidad mesiánica de Jesús ni sobre el rechazo más allá de lo que dice el versículo.
  alternative_spanish_readings:
  - Parafrasear explícitamente para decir que Jesús se está identificando como el Mesías rechazado
  - Hacerlo más interpretativo como una afirmación general sobre la incredulidad
  rationale: El versículo presenta una sentencia proverbial sobre el honor del profeta en ámbitos familiares. La traducción debe preservar esa tensión sin resolverla con explicaciones doctrinales no explicitadas en el griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: Los datos de revisión muestran alta concordancia y ningún cambio aplicado; este borrador sigue de cerca el audit trail inglés, pero ajusta las decisiones léxicas al español para conservar aspecto verbal, contraste honor/vergüenza y la progresión espacial-social del dicho.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς.
  - Se mantiene «profeta» y no se introduce «Mesías» porque el versículo no lo explicita.
  - La secuencia «su tierra natal... sus parientes... su casa» conserva la gradación del griego.
  - Las notas al pie distinguen alternativas léxicas reales sin duplicar marcadores.
