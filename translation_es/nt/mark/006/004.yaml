base_translation:
  language: en
  yaml_path: translation/nt/mark/006/004.yaml
  text: And Jesus was saying to them[c][b][a], “A prophet is not without honor except in his hometown and among his relatives and in his household.”
  footnotes:
  - marker: a
    text: Or 'native place' or 'homeland.' The Greek πατρίς refers to one's own place of origin; here 'hometown' fits the local Nazareth setting.
    reason: lexical_alternative
  - marker: b
    text: Or 'kinsmen.' The Greek term refers to relatives or members of one's kin group.
    reason: lexical_alternative
  - marker: c
    text: Or 'house.' The Greek can refer either to the physical house or to the household/family within it; 'household' is chosen here to distinguish it from 'relatives.'
    reason: lexical_alternative
