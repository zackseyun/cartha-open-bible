translation:
  language: es
  text: Corrieron por toda aquella región y comenzaron a llevar sobre esteras[a] a los que estaban enfermos, adonde oían que él estaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobre camillas', 'sobre catres' o 'sobre lechos portátiles'; el término griego se refiere a un tendido sencillo y transportable.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιέδραμον
  english_pob_choice: ran throughout
  chosen_spanish: Recorrieron
  alternatives_spanish:
  - Corrieron por toda
  - Anduvieron por toda
  lexicon: BDAG
  rationale: El verbo compuesto expresa movimiento rápido a través de una zona. En español, 'recorrieron' conserva el sentido distributivo sobre toda la región con un registro natural; 'corrieron' sonaría más literal pero menos idiomático como acción extendida sobre el territorio.
- source_word: ὅλην τὴν χώραν ἐκείνην
  english_pob_choice: that whole region
  chosen_spanish: toda aquella región
  alternatives_spanish:
  - todo aquel territorio
  - toda aquella zona
  lexicon: BDAG
  rationale: '''χώρα'' aquí designa el distrito o territorio circundante, no un país moderno. ''Región'' comunica bien ese ámbito geográfico, y ''aquella'' conserva el énfasis demostrativo de ἐκείνην.'
- source_word: ἤρξαντο ... περιφέρειν
  english_pob_choice: began carrying
  chosen_spanish: comenzaron a llevar
  alternatives_spanish:
  - empezaron a transportar
  - comenzaron a traer
  lexicon: BDAG
  rationale: La construcción ingresiva marca el inicio de la acción. 'Comenzaron a llevar' expresa ese comienzo de forma natural en español y mantiene el movimiento físico implícito en el contexto.
- source_word: ἐπὶ τοῖς κραβάττοις
  english_pob_choice: on mats
  chosen_spanish: en camillas[a]
  alternatives_spanish:
  - sobre esteras
  - sobre catres
  lexicon: BDAG
  rationale: '''κράβαττος'' puede referirse a una cama sencilla, camilla, catre o lecho portátil. ''Camillas'' comunica el soporte portátil para transportar enfermos; se añade nota porque el griego también admite ''esteras'', ''catres'' o ''lechos portátiles'' según contexto.'
- source_word: τοὺς κακῶς ἔχοντας
  english_pob_choice: those who were sick
  chosen_spanish: a los que estaban enfermos
  alternatives_spanish:
  - a los que estaban mal
  - a los que estaban enfermos o débiles
  lexicon: BDAG
  rationale: La expresión idiomática significa los que se hallaban enfermos o en mal estado. 'Estaban enfermos' es la equivalencia clara y natural en español, sin añadir una interpretación más específica que el texto no exige.
- source_word: περιφέρειν
  english_pob_choice: carrying
  chosen_spanish: llevar
  alternatives_spanish:
  - transportar
  - cargar
  lexicon: BDAG
  rationale: En el contexto de personas en camillas, el verbo describe el acto de moverlas de un lugar a otro. 'Llevar' es suficientemente literal y fluido; 'cargar' podría sonar demasiado técnico o pesado en español según el contexto.
- source_word: ὅπου ἤκουον ὅτι ἐστίν
  english_pob_choice: to wherever they heard he was
  chosen_spanish: adonde oían que él estaba
  alternatives_spanish:
  - adonde oían que estaba
  - a donde escuchaban que él estaba
  lexicon: BDAG
  rationale: '''ὅπου'' funciona aquí con sentido de destino/lugar al que se dirige la acción. ''Adonde oían que él estaba'' preserva el movimiento hacia el lugar reportado y mantiene la referencia indirecta a Jesús sin redundancia innecesaria.'
translation_notes:
  revision_awareness: 'El pasaje presenta alta concordancia con la auditoría inglesa existente; no se registran revisiones aplicadas en el paquete actual, y la redacción española sigue de cerca la decisión léxica principal: movimiento rápido por toda la región, transporte físico de enfermos y destino basado en informes sobre la presencia de Jesús.'
  spanish_consistency_notes:
  - Se mantiene 'región' para χώρα, evitando 'país' por ser demasiado moderno y geopolítico.
  - Se usa 'camillas' como equivalente funcional de κράβαττος, con nota para preservar la alternativa léxica documentada en inglés.
  - Se evita 'Cristo' porque el versículo no contiene el título; el referente implícito en 'él' es Jesús según el contexto inmediato.
  - La estructura 'adonde oían que él estaba' conserva el valor direccional de ὅπου sin forzar una perífrasis más larga.
