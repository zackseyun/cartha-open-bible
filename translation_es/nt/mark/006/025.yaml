revisions:
- from: 'Y ella entró[a] enseguida, con prisa, al rey, y le pidió, diciendo: «Quiero que me des[b] ahora mismo, en una bandeja, la cabeza de Juan el Bautizador»[c].'
  to: 'Y ella fue enseguida, con prisa, ante el rey y le pidió, diciendo: «Quiero que me des ahora mismo, en una bandeja, la cabeza de Juan el Bautizador[a]».'
  rationale: Se corrige la frase inicial para un español natural que conserve tanto εἰσελθοῦσα como πρὸς τὸν βασιλέα sin el giro poco idiomático «entró ... al rey». Se eliminan notas mal ancladas o innecesarias y se conserva únicamente la alternativa léxica significativa documentada por el POB para βαπτιστοῦ.
