translation:
  language: es
  text: 'Y ella fue enseguida, con prisa, ante el rey y le pidió, diciendo: «Quiero que me des ahora mismo, en una bandeja, la cabeza de Juan el Bautizador[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O tradicionalmente, «Juan el Bautista».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσελθοῦσα
  english_pob_choice: went in
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - pasó adentro
  lexicon: BDAG
  rationale: El participio aoristo narra su movimiento hacia el espacio del banquete o la presencia del rey. En español, «entró» es natural y fiel; evita la rigidez de un calco y conserva la acción narrativa.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Marca la rapidez de la acción en estilo marcano. «Enseguida» comunica bien la inmediatez en español moderno sin sonar excesivamente técnico.
- source_word: μετὰ σπουδῆς
  english_pob_choice: with haste
  chosen_spanish: con prisa
  alternatives_spanish:
  - apresuradamente
  - con premura
  lexicon: BDAG
  rationale: La expresión enfatiza rapidez y urgencia más que entusiasmo. «Con prisa» conserva ese valor sin introducir una tonalidad afectiva no requerida por el contexto.
- source_word: πρὸς τὸν βασιλέα
  english_pob_choice: to the king
  chosen_spanish: al rey
  alternatives_spanish:
  - ante el rey
  - hacia el rey
  lexicon: BDAG
  rationale: El texto presenta a Herodes como βασιλεύς. En español, «al rey» refleja la forma del original y mantiene la referencia narrativa sin corregirla históricamente.
- source_word: ᾐτήσατο
  english_pob_choice: asked
  chosen_spanish: le pidió
  alternatives_spanish:
  - le solicitó
  - le rogó
  lexicon: BDAG
  rationale: El verbo expresa una petición; el tono insistente queda reforzado por el discurso directo. «Le pidió» es natural y suficientemente preciso en español.
- source_word: Θέλω
  english_pob_choice: I want
  chosen_spanish: Quiero
  alternatives_spanish:
  - Deseo
  - Quisiera
  lexicon: BDAG
  rationale: Θέλω expresa voluntad de manera directa. «Quiero» preserva esa franqueza, que en el contexto suena deliberadamente tajante.
- source_word: ἵνα ... δῷς μοι
  english_pob_choice: you to give me
  chosen_spanish: que me des
  alternatives_spanish:
  - para que me des
  - que tú me des
  lexicon: BDAG
  rationale: La cláusula expresa el contenido de lo que ella desea. En español, «quiero que me des» reproduce con naturalidad la estructura volitiva del griego.
- source_word: ἐξαυτῆς
  english_pob_choice: at once
  chosen_spanish: ahora mismo
  alternatives_spanish:
  - de inmediato
  - al instante
  lexicon: BDAG
  rationale: Este adverbio intensifica la exigencia de prontitud. Como ya hay otra marca de rapidez en la escena, «ahora mismo» conserva la urgencia sin confundirla con el «enseguida» de la entrada.
- source_word: ἐπὶ πίνακι
  english_pob_choice: on a platter
  chosen_spanish: en una bandeja
  alternatives_spanish:
  - sobre una bandeja
  - en un plato
  lexicon: BDAG
  rationale: πίναξ designa una fuente o bandeja de servicio. «En una bandeja» resulta claro en español y mantiene el marco del banquete; «en un plato» sería posible, pero menos preciso en este contexto.
- source_word: κεφαλὴν
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza cortada
  lexicon: BDAG
  rationale: Debe conservarse la crudeza del hecho narrado. «La cabeza» es literal y suficiente; no se suaviza ni se añade una especificación que el griego no dice.
- source_word: Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_choice: John the Baptizer
  chosen_spanish: Juan el Bautizador
  alternatives_spanish:
  - Juan el Bautista
  lexicon: BDAG
  rationale: El título βαπτιστής es descriptivo y conviene traducirlo, no fijarlo automáticamente en la forma tradicional. «Bautizador» refleja el valor lexical del griego; la alternativa tradicional se reserva como posibilidad conocida, pero no preferida aquí.
theological_decisions:
- issue: Tratamiento del título βαπτιστής en Ἰωάννου τοῦ βαπτιστοῦ
  english_pob_reading: John the Baptizer
  chosen_spanish_reading: Juan el Bautizador
  alternative_spanish_readings:
  - Juan el Bautista
  rationale: 'No es una cuestión doctrinal, sino de filosofía de traducción: preservar el sentido descriptivo del título griego. En español, «Bautizador» transmite la función del término mejor que la forma tradicionalizada.'
  doctrine_reference: Translation philosophy §2 (traducir títulos; no depender de formas tradicionales cuando el griego es transparente)
translation_notes:
  revision_awareness: Se mantuvo la tensión entre la rapidez de la entrada (εὐθύς / μετὰ σπουδῆς) y la urgencia separada de la demanda (ἐξαυτῆς), sin fusionarlas en una sola idea. También se preservó la fuerza descriptiva del título βαπτιστής mediante una traducción lexicalmente transparente.
  spanish_consistency_notes:
  - Se usó «Yahvé» en el proyecto como norma para el tetragrámaton, pero este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y narrativo, con discurso directo claro y sin añadir explicaciones ajenas al texto.
  - Se tradujo el participio aoristo inicial con un verbo finito natural en español para conservar fluidez sin perder la secuencia de acciones.
