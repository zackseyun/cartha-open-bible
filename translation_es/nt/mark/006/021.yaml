  text: Καὶ γενομένης ἡμέρας εὐκαίρου ὅτε Ἡρῴδης τοῖς γενεσίοις αὐτοῦ δεῖπνον ⸀ἐποίησεν τοῖς μεγιστᾶσιν αὐτοῦ καὶ τοῖς χιλιάρχοις καὶ τοῖς πρώτοις τῆς Γαλιλαίας,
base_translation:
  language: en
  yaml_path: translation/nt/mark/006/021.yaml
  text: And when an opportune day came[a], Herod gave a banquet on his birthday for his nobles and military commanders and the leading men of Galilee[d][c][b],
