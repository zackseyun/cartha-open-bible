revisions:
- from: Y cuando llegó un día oportuno, Herodes dio un banquete por su cumpleaños[a] para sus nobles, sus jefes militares y los principales de Galilea[c][b][d],
  to: Y cuando llegó un día oportuno, Herodes dio un banquete por su cumpleaños[a] para sus nobles, sus jefes militares y los hombres principales de Galilea[c][b],
  rationale: Se elimina la nota d porque ya no corresponde al texto final y se ajusta la frase final a ‘los hombres principales de Galilea’ para preservar mejor la referencia masculina explícita de πρῶτοι, en línea con la decisión léxica auditada en inglés. El resto del versículo puede mantenerse tal como está.
