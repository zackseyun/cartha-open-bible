translation:
  language: es
  text: Y cuando llegó un día oportuno, Herodes dio un banquete por su cumpleaños[a] para sus nobles, sus jefes militares y los hombres principales de Galilea[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘con ocasión de su cumpleaños’ o ‘en su cumpleaños’. El griego señala la celebración del nacimiento.
    reason: lexical_alternative
  - marker: b
    text: O ‘hizo una cena’. El griego dice literalmente ‘hizo una cena’, pero en español ‘dio un banquete’ comunica mejor el contexto formal.
    reason: lexical_alternative
  - marker: c
    text: O ‘los hombres prominentes de Galilea’ o ‘los hombres más destacados de Galilea’. La frase se refiere a los varones líderes destacados de la región.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  lexicon: BDAG
  rationale: Se conserva la conexión narrativa simple de Marcos; ‘Y’ refleja la parataxis sin añadir matiz innecesario.
- source_word: γενομένης ἡμέρας εὐκαίρου
  english_pob_choice: when an opportune day came
  chosen_spanish: cuando llegó un día oportuno
  alternatives_spanish:
  - cuando llegó un día conveniente
  - cuando llegó un día favorable
  lexicon: BDAG
  rationale: ‘Oportuno’ comunica la idea de una ocasión adecuada o estratégicamente propicia. Mantiene el tono narrativo y la tensión implícita del griego mejor que ‘conveniente’.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - en el momento en que
  lexicon: BDAG
  rationale: Conjunción temporal directa; en español natural evita la repetición pesada de dos marcadores temporales.
- source_word: Ἡρῴδης
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - Herodés
  lexicon: BDAG
  rationale: Transliteración estándar del nombre propio en español bíblico.
- source_word: τοῖς γενεσίοις αὐτοῦ
  english_pob_choice: on his birthday
  chosen_spanish: por su cumpleaños
  alternatives_spanish:
  - en su cumpleaños
  - con ocasión de su cumpleaños
  lexicon: BDAG
  rationale: γενέσια denota la celebración del nacimiento; ‘por su cumpleaños’ es idiomático en español y conserva la referencia a la ocasión festiva.
- source_word: δεῖπνον ἐποίησεν
  english_pob_choice: gave a banquet
  chosen_spanish: dio un banquete
  alternatives_spanish:
  - hizo una cena
  - celebró un banquete
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente ‘hizo una cena’, ‘dio un banquete’ expresa mejor en español la formalidad del convite y el contexto de élite sin perder el sentido del acto hospedado.
- source_word: τοῖς μεγιστᾶσιν αὐτοῦ
  english_pob_choice: for his nobles
  chosen_spanish: para sus nobles
  alternatives_spanish:
  - para sus grandes hombres
  - para sus cortesanos
  - para sus altos funcionarios
  lexicon: BDAG
  rationale: ‘Nobles’ transmite bien a los magnates o personajes de alto rango asociados a la corte de Herodes.
- source_word: τοῖς χιλιάρχοις
  english_pob_choice: military commanders
  chosen_spanish: sus jefes militares
  alternatives_spanish:
  - sus comandantes militares
  - sus tribunos
  lexicon: BDAG
  rationale: La expresión griega indica oficiales militares de alto rango; ‘jefes militares’ es natural y no fuerza un tecnicismo romano específico.
- source_word: τοῖς πρώτοις τῆς Γαλιλαίας
  english_pob_choice: the leading men of Galilee
  chosen_spanish: los principales de Galilea
  alternatives_spanish:
  - los primeros de Galilea
  - los líderes de Galilea
  - los hombres prominentes de Galilea
  lexicon: BDAG
  rationale: ‘Principales’ conserva la idea de personas prominentes o de primer rango. Se mantiene el matiz masculino explícito del griego con ‘los’.
translation_notes:
  revision_awareness: 'El auditable inglés revisó la apertura desde una duplicación incómoda de ‘when... when’ a una forma más natural (‘when an opportune day came’). El español sigue esa misma solución sintáctica: ‘cuando llegó un día oportuno’, sin perder la relación entre la ocasión propicia y el banquete de Herodes. También se mantuvo la lista de invitados de alto rango y la referencia explícita al cumpleaños como celebración.'
  spanish_consistency_notes:
  - Se preserva la cadencia narrativa de Marcos con una coordinación inicial simple.
  - ‘Oportuno’ se usa como equivalente principal de εὔκαιρος; no se neutraliza a ‘conveniente’ para conservar la fuerza narrativa.
  - ‘Banquete’ se prefiere a ‘cena’ por la naturalidad y el rango social del contexto.
  - ‘Principales’ mantiene el matiz de prominencia y liderazgo de πρῶτοι sin volverlo genérico.
