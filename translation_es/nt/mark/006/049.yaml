translation:
  language: es
  text: Pero cuando lo vieron caminando sobre el mar, pensaron que era un fantasma[a], y gritaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una aparición» o «un espectro». El griego φάντασμα se refiere a una aparición fantasmal.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Ahora ellos
  lexicon: BDAG
  rationale: δέ tiene aquí una fuerza adversativa/continuativa suave. En español, «Pero» marca bien el giro narrativo hacia la reacción de los discípulos sin añadir énfasis indebido.
- source_word: ἰδόντες
  english_pob_choice: when they saw
  chosen_spanish: cuando lo vieron
  alternatives_spanish:
  - al verlo
  - viendo
  lexicon: BDAG
  rationale: El participio aoristo se vierte con valor temporal natural en español. «Cuando lo vieron» preserva la secuencia narrativa y evita una construcción demasiado literal.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo masculino singular se expresa de manera natural como «lo», refiriéndose a Jesús.
- source_word: ἐπὶ τῆς θαλάσσης περιπατοῦντα
  english_pob_choice: walking on the sea
  chosen_spanish: caminando sobre el mar
  alternatives_spanish:
  - caminando sobre el agua
  - caminando sobre el lago
  lexicon: BDAG
  rationale: ἐπί con genitivo aquí indica ubicación sobre la superficie; θάλασσα se mantiene como «mar» para seguir de cerca el término griego y conservar el carácter sorprendente del milagro. «Sobre el mar» es idiomático y fiel.
- source_word: ἔδοξαν
  english_pob_choice: they thought
  chosen_spanish: pensaron
  alternatives_spanish:
  - supusieron
  - imaginaron
  lexicon: BDAG
  rationale: δοκέω expresa aquí una apreciación mental o suposición. «Pensaron» es la opción más natural y directa en español.
- source_word: ὅτι φάντασμά ἐστιν
  english_pob_choice: that it was a ghost
  chosen_spanish: que era un fantasma
  alternatives_spanish:
  - que era una aparición
  - que era un espectro
  lexicon: BDAG
  rationale: φάντασμα designa una aparición fantasmal o espectral. «Fantasma» es el equivalente moderno más claro y comunica la percepción errónea sin perder la fuerza del término.
- source_word: καὶ ἀνέκραξαν
  english_pob_choice: and they cried out
  chosen_spanish: y gritaron
  alternatives_spanish:
  - y clamaron
  - y dieron un grito
  lexicon: BDAG
  rationale: ἀνακράζω implica un grito fuerte. «Gritaron» transmite la intensidad de manera natural en español; «clamaron» sería menos espontáneo en este contexto de temor.
theological_decisions:
- issue: Lectura de ἐπὶ τῆς θαλάσσης
  english_pob_reading: walking on the sea
  chosen_spanish_reading: caminando sobre el mar
  alternative_spanish_readings:
  - caminando junto al mar
  - caminando por el mar
  rationale: En este contexto narrativo, la frase describe a Jesús moviéndose sobre la superficie del agua, no simplemente al lado de ella. «Sobre el mar» mantiene la lectura del milagro conforme al sentido más directo del griego y al audit trail inglés.
  doctrine_reference: Translation philosophy §1, §3
- issue: Valor de φάντασμα
  english_pob_reading: ghost / apparition / phantom
  chosen_spanish_reading: fantasma
  alternative_spanish_readings:
  - aparición
  - espectro
  rationale: El griego φάντασμα se refiere a una presencia o figura fantasmal. «Fantasma» es la forma más inteligible para el lector actual y conserva la idea de una aparición aterradora percibida erróneamente.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado de alta concordancia: no se registran revisiones aplicadas en el último pase, y la redacción española sigue la decisión inglesa estable de leer la escena como Jesús caminando sobre la superficie del agua. La única nota preserva la alternativa léxica relevante para φάντασμα.'
  spanish_consistency_notes:
  - Se usa «mar» para θάλασσα, siguiendo el griego y la tradición descriptiva del milagro.
  - Se mantiene «fantasma» como equivalente principal de φάντασμα por claridad contemporánea.
  - La voz narrativa conserva un tono sobrio y bíblico sin recurrir a calcos rígidos.
