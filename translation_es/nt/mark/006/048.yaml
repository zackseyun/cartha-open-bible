revisions:
- from: Y al verlos[a] fatigados al remar, porque el viento les era contrario, cerca de la cuarta vigilia de la noche viene hacia ellos, caminando sobre el mar[b][c]; y quería pasar junto a ellos.
  to: Y al verlos forcejeando al remar, porque el viento les era contrario, cerca de la cuarta vigilia de la noche[a] viene hacia ellos, caminando sobre el mar[b]; y quería pasar junto a ellos[c].
  rationale: Se mueve la nota cultural al sintagma temporal correcto para cumplir la disciplina de anclaje. Se reemplaza «fatigados al remar» por «forcejeando al remar» para reflejar mejor la intensidad de βασανιζομένους en contexto, manteniendo un español natural. Se conserva «viene» por el presente histórico, «sobre el mar» por θάλασσα, y «quería pasar junto a ellos» con nota explicativa para preservar la tensión teológica documentada.
  reviewer_model: gpt-5.4
