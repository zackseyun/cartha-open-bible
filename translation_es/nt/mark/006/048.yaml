translation:
  language: es
  text: Y al verlos forcejeando al remar, porque el viento les era contrario, cerca de la cuarta vigilia de la noche[a] viene hacia ellos, caminando sobre el mar[b]; y quería pasar junto a ellos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La "cuarta vigilia de la noche" es el período tardío, aproximadamente entre las 3:00 y las 6:00 a. m., en el conteo romano.
    reason: cultural_note
  - marker: b
    text: O "caminando sobre el agua". El griego dice "sobre el mar".
    reason: lexical_alternative
  - marker: c
    text: O "quería pasar de largo junto a ellos". La frase puede significar simplemente que pensaba pasar junto a ellos, pero también puede evocar escenas del Antiguo Testamento donde Dios "pasa" en una auto-revelación (por ejemplo, Éx 33:19, 22; 34:6; 1 Re 19:11).
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: al verlos
  alternatives_spanish:
  - cuando los vio
  - viéndolos
  lexicon: BDAG
  rationale: El participio aoristo se refleja con una construcción participial temporal en español para conservar la secuencia narrativa sin añadir una relación temporal más fuerte de la que exige el griego.
- source_word: βασανιζομένους
  english_pob_choice: straining
  chosen_spanish: fatigados
  alternatives_spanish:
  - atormentados
  - luchando con dificultad
  lexicon: BDAG
  rationale: El campo léxico básico puede expresar aflicción intensa; sin embargo, en el contexto de remar contra el viento, 'fatigados' comunica la severidad de la lucha sin introducir una imagen demasiado forzada en español. Se conserva la tensión entre el sentido más fuerte y la lectura contextual más natural.
- source_word: ἐν τῷ ἐλαύνειν
  english_pob_choice: at the oars / in rowing
  chosen_spanish: al remar
  alternatives_spanish:
  - mientras remaban
  - en remar
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa acción simultánea. 'Al remar' suena natural en español y mantiene la idea de la actividad concomitante.
- source_word: ἄνεμος ἐναντίος
  english_pob_choice: the wind was against them
  chosen_spanish: el viento les era contrario
  alternatives_spanish:
  - el viento estaba en contra de ellos
  - el viento les soplaba en contra
  lexicon: BDAG
  rationale: '''Les era contrario'' reproduce bien la fuerza adversativa de ἐναντίος con un giro idiomático y sobrio en español.'
- source_word: περὶ τετάρτην φυλακὴν τῆς νυκτός
  english_pob_choice: about the fourth watch of the night
  chosen_spanish: cerca de la cuarta vigilia de la noche
  alternatives_spanish:
  - alrededor de la cuarta vigilia de la noche
  - cerca de la cuarta guardia de la noche
  lexicon: BDAG
  rationale: Se preserva la expresión de tiempo antigua en vez de convertirla a una hora moderna en el texto principal. 'Vigilia' es el equivalente castellano más transparente para el sistema romano de guardias nocturnas.
- source_word: ἔρχεται
  english_pob_choice: he comes
  chosen_spanish: viene hacia ellos
  alternatives_spanish:
  - viene a ellos
  - se acerca a ellos
  lexicon: BDAG
  rationale: El presente histórico se conserva con un presente narrativo en español. 'Viene hacia ellos' mantiene el movimiento y el carácter vívido de la escena.
- source_word: περιπατῶν ἐπὶ τῆς θαλάσσης
  english_pob_choice: walking on the sea
  chosen_spanish: caminando sobre el mar
  alternatives_spanish:
  - andando sobre el mar
  - caminando sobre el agua
  lexicon: BDAG
  rationale: '''Mar'' reproduce θάλασσα; ''sobre'' refleja ἐπί. Se evita ''agua'' porque sería una aclaración interpretativa que el griego no dice en este punto.'
- source_word: ἤθελεν παρελθεῖν αὐτούς
  english_pob_choice: he intended to pass by them
  chosen_spanish: quería pasar junto a ellos
  alternatives_spanish:
  - intentaba pasar junto a ellos
  - tenía la intención de pasar junto a ellos
  lexicon: BDAG
  rationale: El imperfecto de θέλω expresa intención o voluntad continuada; en español 'quería' mantiene esa intención sin sonar demasiado técnico. 'Pasar junto a ellos' conserva la apertura semántica del griego para no resolver de antemano el posible eco teofánico.
theological_decisions:
- issue: Sentido de 'pasar junto a ellos'
  english_pob_reading: He intended to pass by them, with possible Old Testament passing-by resonance left open.
  chosen_spanish_reading: Quería pasar junto a ellos, dejando abierta la posible resonancia con escenas veterotestamentarias de revelación divina.
  alternative_spanish_readings:
  - quería pasar de largo
  - quería pasar por delante de ellos con una intención teofánica
  rationale: El griego permite tanto una referencia simple al movimiento como un eco de revelación divina. La redacción española conserva esa ambigüedad sin forzar una interpretación en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La base auditada en inglés pasó de una redacción más literal y áspera a una formulación más natural ('straining at the oars'); la presente versión española refleja esa decisión con una solución idiomática, pero sigue manteniendo el enlace con el participio griego y la actividad de remar. También conserva el presente histórico ('viene') y la ambigüedad interpretativa de 'pasar junto a ellos'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo exija; aquí no aparece.
  - '''Mar'' se mantiene para θάλασσα, no ''agua'', salvo en nota textual.'
  - '''Vigilia'' preserva el referente histórico romano.'
  - No se introduce 'Cristo' ni terminología eclesiástica no presente en el verso.
  - La construcción narrativa mantiene el tono bíblico moderno y legible sin calco excesivo.
