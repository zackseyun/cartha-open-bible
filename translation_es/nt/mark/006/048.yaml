review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura del griego y conserva varios aciertos clave: el presente histórico «viene», «sobre el mar», y la ambigüedad de «pasar junto a ellos». Sin embargo, hay un problema de anclaje de nota al pie: la nota [a] trata sobre «la cuarta vigilia de la noche», pero está colocada en «verlos». Además, «fatigados» atenúa más de la cuenta la fuerza de βασανιζομένους; una opción como «forcejeando al remar» o «angustiados al remar» refleja mejor la dureza contextual sin sonar antinatural.'
  spanish_quality_summary: El español es claro y eclesialmente legible, con buen registro narrativo. «Les era contrario» y «caminando sobre el mar» funcionan bien. La principal reparación necesaria es mover la nota cultural a la frase temporal correspondiente. También conviene ajustar «fatigados al remar», que suena algo débil frente al griego y frente al razonamiento léxico documentado.
  glossary_alignment: No hay conflicto con la terminología troncal del proyecto. Se preserva «mar» por θάλασσα y no se resuelve en el texto principal el matiz teológico de «pasar junto a ellos». La revisión propuesta mantiene esas decisiones y mejora la representación de βασανιζομένους.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica «la cuarta vigilia de la noche», pero el marcador aparece tras «verlos». Las instrucciones requieren que el marcador exacto aparezca en la palabra o frase pertinente del texto español.
  - severity: medium
    issue: «Fatigados» debilita la fuerza de βασανιζομένους.
    rationale: El participio puede expresar aflicción intensa o una lucha severa. En este contexto de remar contra viento contrario, «fatigados» resulta posible pero demasiado suave. Una expresión como «forcejeando al remar» conserva mejor la dureza contextual sin caer en un calco extraño.
  revised_spanish_text: Y al verlos forcejeando al remar, porque el viento les era contrario, cerca de la cuarta vigilia de la noche[a] viene hacia ellos, caminando sobre el mar[b]; y quería pasar junto a ellos[c].
  revised_footnotes:
  - marker: a
    text: La "cuarta vigilia de la noche" es el período tardío, aproximadamente entre las 3:00 y las 6:00 a. m., en el conteo romano.
    reason: cultural_note
  - marker: b
    text: O "caminando sobre el agua". El griego dice "sobre el mar".
    reason: lexical_alternative
  - marker: c
    text: O "quería pasar de largo junto a ellos". La frase puede significar simplemente que pensaba pasar junto a ellos, pero también puede evocar escenas del Antiguo Testamento donde Dios "pasa" en una auto-revelación (por ejemplo, Éx 33:19, 22; 34:6; 1 Re 19:11).
    reason: alternative_reading
  revision_rationale: Se mueve la nota cultural al sintagma temporal correcto para cumplir la disciplina de anclaje. Se reemplaza «fatigados al remar» por «forcejeando al remar» para reflejar mejor la intensidad de βασανιζομένους en contexto, manteniendo un español natural. Se conserva «viene» por el presente histórico, «sobre el mar» por θάλασσα, y «quería pasar junto a ellos» con nota explicativa para preservar la tensión teológica documentada.
