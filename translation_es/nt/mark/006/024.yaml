translation:
  language: es
  text: 'Y ella salió y dijo a su madre: «¿Qué debo pedir?» Y ella dijo: «La cabeza de Juan el Bautizador[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo el uso tradicional en español, «Juan el Bautista».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθοῦσα
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El participio aoristo antecede a ‘dijo’; en español, ‘salió’ expresa de forma natural la secuencia previa sin sobrecargar la frase con una construcción perifrástica.
- source_word: Τί αἰτήσωμαι
  english_pob_choice: What should I ask for?
  chosen_spanish: ¿Qué debo pedir?
  alternatives_spanish:
  - ¿Qué he de pedir?
  - ¿Qué debería pedir?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo pide una formulación que exprese decisión o conveniencia. ‘Debo pedir’ conserva el matiz deliberativo con español natural; ‘pedir’ cubre bien αἰτέω aquí.
- source_word: μητρὶ αὐτῆς
  english_pob_choice: her mother
  chosen_spanish: a su madre
  alternatives_spanish:
  - a la madre de ella
  - a su mamá
  lexicon: BDAG
  rationale: La relación posesiva es simple y directa. ‘A su madre’ reproduce el dativo de destinatario sin añadir formalidad innecesaria.
- source_word: κεφαλὴν
  english_pob_choice: head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - la cabeza cortada
  - la cabeza de
  lexicon: BDAG
  rationale: Se conserva el objeto literal y crudo de la petición. No se atenúa la especificidad del término.
- source_word: τοῦ βαπτίζοντος
  english_pob_choice: the Baptizer
  chosen_spanish: el Bautizador
  alternatives_spanish:
  - el Bautista
  - el que bautiza
  lexicon: BDAG
  rationale: El participio presente sustantivado se vierte por sentido como título identificador. ‘Bautizador’ refleja más directamente el valor verbal de βαπτίζων que ‘Bautista’, mientras se evita imponer una forma tradicional sin base en el griego.
theological_decisions:
- issue: Tratamiento del epíteto de Juan (βαπτίζων)
  english_pob_reading: the Baptizer
  chosen_spanish_reading: el Bautizador
  alternative_spanish_readings:
  - el Bautista
  rationale: No hay una disputa doctrinal aquí, pero sí una decisión de traducción de título. Se privilegia la transparencia morfológica del participio presente y su valor descriptivo, manteniendo la identificación de Juan por su actividad característica.
  doctrine_reference: Translation philosophy §1, §2
translation_notes:
  revision_awareness: La revisión inglesa reciente simplificó ‘after going out’ a ‘went out’ para reflejar mejor el participio aoristo. En español se sigue esa misma prioridad de secuencia natural con ‘salió’, sin introducir una perífrasis de anterioridad.
  spanish_consistency_notes:
  - Se mantiene el tratamiento directo de los posesivos y el orden narrativo simple del griego.
  - ‘Bautizador’ se usa de manera consistente con la decisión del proyecto de traducir el participio sustantivado por sentido, no por la forma eclesiástica tradicional.
  - Se conserva el tono breve y abrupto del intercambio, acorde con la concisión del original.
