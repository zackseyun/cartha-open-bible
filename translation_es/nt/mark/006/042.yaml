lexical_decisions:
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - comieron alimentos
  - comieron y se alimentaron
  lexicon: BDAG
  rationale: El aoristo activo de ἐσθίω expresa el acto ordinario de comer. «Comieron» es el equivalente natural y directo en español, sin añadir objetos ni matices que el griego no requiere.
- source_word: πάντες
  english_pob_choice: they all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos y cada uno
  lexicon: BDAG
  rationale: El adjetivo plural funciona sustantivamente y se refiere al conjunto completo. En español, «todos» conserva la amplitud inclusiva sin volver la frase pesada.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were satisfied
  chosen_spanish: quedaron satisfechos
  alternatives_spanish:
  - fueron saciados
  - quedaron saciados
  - quedaron llenos
  lexicon: BDAG
  rationale: El pasivo de χορτάζω puede significar quedar plenamente alimentado o satisfecho. «Quedaron satisfechos» comunica bien el resultado en español contemporáneo; «fueron saciados» conserva más literalidad pero suena más técnico o religioso, y «quedaron llenos» es más coloquial.
- source_word: καὶ ... καὶ
  english_pob_choice: And ... and ...
  chosen_spanish: Y ... y ...
  alternatives_spanish:
  - Entonces ... y ...
  - Así que ... y ...
  lexicon: BDAG
  rationale: Se mantiene la coordinación simple del griego y el estilo paratáctico de Marcos, sin introducir una relación lógica más específica que la del texto fuente.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa auditada están en alto acuerdo, sin revisiones aplicadas; el borrador español sigue esa misma lectura directa y estable.
  spanish_consistency_notes:
  - Se preserva la coordinación repetida de καί con «Y ... y ...» para reflejar el ritmo narrativo.
  - «Satisfechos» se eligió como equivalente idiomático de ἐχορτάσθησαν, manteniendo el resultado de quedar plenamente alimentados sin añadir énfasis interpretativo.
  - No se añadieron notas textuales ni variantes porque el paquete fuente no documenta tensiones relevantes en este versículo.
