translation:
  language: es
  text: Y los apóstoles se reunieron[a] con Jesús, y le contaron todo lo que habían hecho y enseñado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron a Jesús». El griego dice literalmente «se reúnen hacia Jesús», con sentido de acercarse a él; «se reunieron con Jesús» mantiene la naturalidad del español, aunque «fueron a Jesús» expresa más directamente el movimiento.
    reason: Preservar la alternativa más ceñida a πρὸς τὸν Ἰησοῦν y evitar pérdida del matiz direccional en español.
lexical_decisions:
- source_word: συνάγονται
  english_pob_choice: gathered
  chosen_spanish: se reunieron
  alternatives_spanish:
  - se juntaron
  - se congregaron
  lexicon: BDAG
  rationale: El presente narrativo griego expresa acción pasada de forma vívida. En español, «se reunieron» comunica con naturalidad la reunión del grupo y preserva el valor colectivo de συνάγω sin sonar demasiado técnico.
- source_word: οἱ ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: los apóstoles
  alternatives_spanish:
  - los enviados
  - los mensajeros
  lexicon: BDAG
  rationale: En Marcos, ἀπόστολοι funciona como designación reconocible del grupo comisionado. «Apóstoles» mantiene ese valor de título/rol y evita diluir la referencia en un término genérico.
- source_word: πρὸς τὸν Ἰησοῦν
  english_pob_choice: to Jesus
  chosen_spanish: con Jesús
  alternatives_spanish:
  - hacia Jesús
  - ante Jesús
  lexicon: BDAG
  rationale: Aunque πρός con acusativo puede señalar movimiento hacia una persona, en español «se reunieron con Jesús» resulta más natural y expresa bien el acercamiento del grupo a él en este contexto narrativo. Se evita forzar un calco espacial en una escena de encuentro.
- source_word: ἀπήγγειλαν αὐτῷ
  english_pob_choice: they reported to him
  chosen_spanish: le informaron
  alternatives_spanish:
  - le reportaron
  - le contaron
  lexicon: BDAG
  rationale: El verbo indica presentar un informe o relatar de vuelta. «Le informaron» conserva el matiz de reporte sin perder fluidez en español bíblico contemporáneo.
- source_word: πάντα ὅσα ἐποίησαν καὶ ὅσα ἐδίδαξαν
  english_pob_choice: all that they had done and taught
  chosen_spanish: de todo lo que habían hecho y enseñado
  alternatives_spanish:
  - todo lo que habían hecho y enseñado
  - todo cuanto habían hecho y enseñado
  lexicon: BDAG
  rationale: La estructura griega presenta dos relativas paralelas que especifican el alcance de πάντα. «De todo lo que…» mantiene la fuerza comprehensiva y preserva el paralelismo sin introducir una repetición torpe en español.
theological_decisions:
- issue: Traducción de ἀπόστολοι como título ministerial en contexto marcano
  english_pob_reading: Render as 'apostles' as a role/title in context
  chosen_spanish_reading: «apóstoles» como título reconocido del grupo comisionado
  alternative_spanish_readings:
  - «enviados»
  - «mensajeros»
  rationale: El pasaje no describe mensajeros genéricos, sino a los discípulos enviados que regresan de su misión. Mantener «apóstoles» conserva la lectura narrativa y el peso del término en Marcos.
  doctrine_reference: Uso neotestamentario de ἀπόστολος en los Evangelios sinópticos
translation_notes:
  revision_awareness: El texto base inglés fue ajustado en una revisión reciente para reflejar mejor el paralelismo de πάντα ὅσα ἐποίησαν καὶ ὅσα ἐδίδαξαν. La presente versión española sigue esa estructura con una formulación natural y no necesita nota alternativa separada.
  spanish_consistency_notes:
  - Se evita «SEÑOR» como sustituto del nombre divino porque el versículo no lo contiene.
  - Se mantiene «Jesús» como forma estable para Ἰησοῦς.
  - No aparece χριστός/mesías ni vocabulario teológico adicional que requiera decisión terminológica especial.
  - «Le informaron» conserva el valor de reporte de ἀπήγγειλαν sin introducir un tono excesivamente administrativo.
