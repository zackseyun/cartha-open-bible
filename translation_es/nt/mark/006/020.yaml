translation:
  language: es
  text: Porque Herodes temía a Juan[a], sabiendo que era un hombre justo y santo, y lo mantenía a salvo. Y, cuando lo oía, quedaba muy perplejo, y, sin embargo, lo escuchaba con gusto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «hacía muchas cosas» en lugar de «quedaba muy perplejo».
    reason: textual_variant
lexical_decisions:
- source_word: ἐφοβεῖτο
  english_pob_choice: feared
  chosen_spanish: temía
  alternatives_spanish:
  - tenía miedo de
  - temía continuamente
  lexicon: BDAG
  rationale: El imperfecto expresa una actitud continua. «Temía» conserva la fuerza directa de φοβέομαι sin suavizarla a «respetaba», y en español suena natural con el matiz de temor reverente o político que el contexto deja ver.
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sabía
  - reconociendo
  lexicon: BDAG
  rationale: El participio aporta la razón de la conducta de Herodes. «Sabiendo» mantiene esa relación causal sin explicitarla más de lo que permite el griego.
- source_word: ἄνδρα δίκαιον καὶ ἅγιον
  english_pob_choice: a righteous and holy man
  chosen_spanish: un hombre justo y santo
  alternatives_spanish:
  - un hombre recto y santo
  - un hombre justo y piadoso
  lexicon: BDAG
  rationale: «Justo» comunica bien δίκαιος en sentido moral y relacional; «santo» conserva ἅγιος como cualidad de consagración o carácter apartado para Dios. Se evita «recto» por ser menos transparente aquí, y «piadoso» por desplazar el énfasis.
- source_word: συνετήρει
  english_pob_choice: kept him safe
  chosen_spanish: lo mantenía a salvo
  alternatives_spanish:
  - lo protegía
  - lo conservaba
  lexicon: BDAG
  rationale: El verbo sugiere que Herodes lo preservaba de daño. «Lo mantenía a salvo» expresa esa protección de forma clara y dinámica en español, sin perder la idea de custodia continua.
- source_word: ἀκούσας αὐτοῦ
  english_pob_choice: when he heard him
  chosen_spanish: cuando lo oía
  alternatives_spanish:
  - al oírlo
  - después de oírlo
  lexicon: BDAG
  rationale: El participio aoristo marca una acción temporal previa o concomitante. «Cuando lo oía» suena natural y conserva la relación temporal con lo que sigue.
- source_word: πολλὰ ἠπόρει
  english_pob_choice: he was greatly perplexed
  chosen_spanish: se quedaba muy perplejo
  alternatives_spanish:
  - estaba muy perplejo
  - quedaba sumido en gran perplejidad
  lexicon: BDAG
  rationale: Se preserva el sentido de estar en duda o perplejidad. «Se quedaba muy perplejo» refleja el estado reiterado/continuado que el imperfecto sugiere, y «muy» traduce la intensificación de πολλὰ.
- source_word: ἡδέως αὐτοῦ ἤκουεν
  english_pob_choice: yet he listened to him gladly
  chosen_spanish: lo escuchaba con gusto
  alternatives_spanish:
  - y lo oía de buena gana
  - y lo escuchaba gustosamente
  lexicon: BDAG
  rationale: Ἡδέως expresa placer o disposición favorable. «Con gusto» es una equivalencia natural y clara, y conserva el contraste con la perplejidad anterior.
theological_decisions:
- issue: Tensión entre temor, custodia y agrado ante la predicación de Juan
  english_pob_reading: Herod feared John, kept him safe, was greatly perplexed, and yet listened to him gladly
  chosen_spanish_reading: Herodes temía a Juan, lo mantenía a salvo, se quedaba muy perplejo y, aun así, lo escuchaba con gusto
  alternative_spanish_readings:
  - Herodes respetaba a Juan y lo protegía
  - Herodes estaba confundido pero lo oía con agrado
  rationale: 'Se conserva la tensión del versículo: Herodes no solo reacciona con temor, sino que también protege a Juan y disfruta oírlo, aunque queda perplejo. No se suaviza el temor a un simple respeto, porque eso borraría la ambivalencia del texto.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Variante textual en la cláusula final de la tradición manuscrita
  english_pob_reading: 'Follow the SBLGNT/critical text: ''he was greatly perplexed'' (ἠπόρει)'
  chosen_spanish_reading: 'Seguir el texto crítico: «se quedaba muy perplejo»'
  alternative_spanish_readings:
  - «hacía muchas cosas»
  - «hacía muchas»
  rationale: La lectura crítica ἠπόρει da el sentido de perplejidad interna; la variante ἐποίει cambia notablemente el significado. Se mantiene la lectura crítica en el texto principal y se registra la variante en nota.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el expediente auditado en inglés. Se conserva la lectura crítica ἠπόρει, la intensificación de πολλὰ y el contraste interno del versículo sin armonizarlo. No se introdujeron revisiones adicionales respecto del último paso de revisión registrado.
  spanish_consistency_notes:
  - Se mantiene «Herodes» y «Juan» como nombres propios en forma estable.
  - «Temía» se usa para φοβέομαι según el valor documentado del término, sin rebajarlo a simple respeto.
  - «Justo» y «santo» conservan la doble caracterización moral y religiosa de ἄνδρα δίκαιον καὶ ἅγιον.
  - «Lo mantenía a salvo» conserva la función protectora de συνετήρει sin volverla demasiado abstracta.
  - La nota textual se ancla en el punto de decisión sobre ἠπόρει, como en el expediente inglés.
