    text: Algunos manuscritos leen «hacía muchas cosas» en lugar de «quedaba muy perplejo».
    reason: textual_variant
  revision_rationale: Se hace una corrección menor para ajustar mejor el aspecto verbal de ἠπόρει y para reflejar con más precisión la tensión concesiva destacada en el POB inglés. La nota se actualiza para concordar exactamente con la redacción revisada del texto principal.
