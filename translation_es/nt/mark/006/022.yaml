base_translation:
  language: en
  yaml_path: translation/nt/mark/006/022.yaml
  text: And when Herodias's daughter came in and danced[a], and pleased Herod and those reclining at the table with him, the king said to the girl, “Ask me for whatever you want[b], and I will give it to you.”
  footnotes:
  - marker: a
    text: Some manuscripts/traditions are understood as 'his daughter Herodias' rather than 'Herodias's daughter.' The Greek text followed here reads 'Herodias's daughter.'
    reason: textual_variant
  - marker: b
    text: Or 'those dining with him'; the Greek refers to fellow banquet guests reclining at table.
    reason: cultural_note
