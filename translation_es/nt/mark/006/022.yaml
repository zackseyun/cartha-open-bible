translation:
  language: es
  text: 'Y cuando entró la hija de Herodías y bailó[a], y agradó al rey y a los que estaban reclinados a la mesa con él[b], el rey dijo a la muchacha: «Pídeme lo que quieras, y te lo daré».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos/tradiciones se entienden como «su hija Herodías» en vez de «la hija de Herodías». El texto griego seguido aquí lee «la hija de Herodías».
    reason: textual_variant
  - marker: b
    text: O «a los que estaban comiendo con él»; el griego se refiere a los compañeros de banquete reclinados a la mesa.
    reason: cultural_note
lexical_decisions:
- source_word: εἰσελθούσης
  english_pob_choice: when ... came in
  chosen_spanish: cuando entró
  alternatives_spanish:
  - cuando vino
  - al entrar
  lexicon: BDAG
  rationale: La forma de participio genitivo absoluto se vierte naturalmente en español como una cláusula temporal. «Entró» conserva el movimiento hacia el interior del banquete sin una paráfrasis excesiva.
- source_word: τῆς θυγατρὸς αὐτῆς τῆς Ἡρῳδιάδος
  english_pob_choice: Herodias's daughter
  chosen_spanish: la hija de Herodías
  alternatives_spanish:
  - la hija de ella, Herodías
  - su hija, Herodías
  lexicon: BDAG
  rationale: El genitivo identifica de manera más natural a la joven como hija de Herodías. En español, la posesión se expresa con claridad mediante «la hija de Herodías», manteniendo el mismo valor relacional que en el texto griego.
- source_word: ὀρχησαμένης
  english_pob_choice: danced
  chosen_spanish: bailó
  alternatives_spanish:
  - danzó
  - habiendo bailado
  lexicon: BDAG
  rationale: «Bailó» comunica de forma natural el hecho puntual del participio aoristo. «Danzó» es posible pero más marcado; la forma compuesta sería demasiado rígida para este contexto.
- source_word: ἀρεσάσης
  english_pob_choice: pleased
  chosen_spanish: agradó
  alternatives_spanish:
  - gustó
  - complació
  lexicon: BDAG
  rationale: «Agradó» reproduce bien el sentido de ἀρέσκω como causar agrado o aprobación. «Complació» podría sonar más formal y «gustó» sería menos exacto en este contexto relacional.
- source_word: τοῖς συνανακειμένοις
  english_pob_choice: those reclining at the table with him
  chosen_spanish: a los que estaban reclinados con él a la mesa
  alternatives_spanish:
  - a los que comían con él
  - a sus comensales
  lexicon: BDAG
  rationale: La expresión conserva la imagen concreta del banquete con invitados reclinados. Se evita reducirla solo a «comensales» para no perder el rasgo cultural del trasfondo grecorromano.
- source_word: εἶπεν ὁ βασιλεὺς
  english_pob_choice: the king said
  chosen_spanish: el rey dijo
  alternatives_spanish:
  - dijo el rey
  - el rey habló
  lexicon: BDAG
  rationale: Se mantiene «rey» porque el griego dice βασιλεύς y el POB inglés siguió ese dato sin armonizarlo con el título histórico técnico. En español, «rey» es directo y fiel al texto narrativo.
- source_word: τῷ κορασίῳ
  english_pob_choice: to the girl
  chosen_spanish: a la muchacha
  alternatives_spanish:
  - a la niña
  - a la joven
  lexicon: BDAG
  rationale: κοράσιον designa a una muchacha/joven. «Muchacha» conserva el matiz de edad y condición sin sonar infantilizado como «niña» ni demasiado interpretativo como «joven».
- source_word: Αἴτησόν με
  english_pob_choice: Ask me for
  chosen_spanish: Pídeme
  alternatives_spanish:
  - Pregúntame
  - Solicítame
  lexicon: BDAG
  rationale: El imperativo de αἰτέω aquí expresa una petición de un regalo o favor. «Pídeme» es la manera más natural de reflejar esa solicitud en español; el complemento posterior completa el sentido.
- source_word: ὃ ἐὰν θέλῃς
  english_pob_choice: whatever you want
  chosen_spanish: lo que quieras
  alternatives_spanish:
  - lo que desees
  - cualquier cosa que quieras
  lexicon: BDAG
  rationale: La construcción expresa amplitud e indefinición. «Lo que quieras» es idiomático en español y preserva la apertura total de la oferta sin sobreexplicar la sintaxis griega.
- source_word: δώσω σοι
  english_pob_choice: I will give it to you
  chosen_spanish: te lo daré
  alternatives_spanish:
  - te daré eso
  - te daré
  lexicon: BDAG
  rationale: El objeto es implícito en «lo que quieras». «Te lo daré» evita repetición pesada y conserva el futuro promisor con naturalidad en español.
theological_decisions:
- issue: Títulación de Herodes como rey
  english_pob_reading: the king
  chosen_spanish_reading: el rey
  alternative_spanish_readings:
  - Herodes el tetrarca
  - el gobernante
  rationale: Se sigue la forma narrativa de Marcos y la decisión auditable del POB inglés de no corregir el título con precisión histórica externa. Esto preserva la voz del texto fuente.
  doctrine_reference: Translation philosophy §1 (primacía del texto original sobre armonización histórica)
translation_notes:
  revision_awareness: El texto inglés de referencia no requirió revisiones sustanciales en su último pase; la presente redacción española sigue de cerca el análisis auditado y conserva las mismas decisiones clave sobre el sujeto, el contexto de banquete y el título de βασιλεύς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «el rey» para βασιλεύς de manera coherente con la decisión auditada del inglés POB.
  - Se traduce κοράσιον como «muchacha» para conservar un registro neutral y bíblico sin arcaísmo.
  - Se conserva la imagen cultural de los invitados reclinados a la mesa, no solo una referencia genérica a «comensales».
