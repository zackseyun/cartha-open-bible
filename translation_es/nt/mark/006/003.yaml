translation:
  language: es
  text: ¿No es este el carpintero, el hijo de María y hermano[a] de Jacobo y Joses y Judas y Simón? ¿Y no están aquí con nosotros sus hermanas[a]? Y se ofendieron por causa de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘pariente(s)’ para ‘hermano’ y ‘hermanas’; los términos griegos normalmente significan hermanos, pero algunas tradiciones cristianas los entienden aquí en sentido más amplio como parientes o como hermanastros.
    reason: alternative_reading
lexical_decisions:
- source_word: τέκτων
  english_pob_choice: carpenter
  chosen_spanish: carpintero
  alternatives_spanish:
  - artesano
  - constructor
  lexicon: BDAG
  rationale: En este contexto narrativo, el sentido más probable y natural es el de un trabajador manual de la construcción o la madera. 'Carpintero' conserva la fuerza tradicional y es claro para el lector en español; 'artesano' o 'constructor' son posibles, pero más amplios o menos precisos para la escena.
- source_word: ὁ υἱὸς τῆς Μαρίας
  english_pob_choice: the son of Mary
  chosen_spanish: el hijo de María
  alternatives_spanish:
  - el hijo de María
  - María su hijo
  lexicon: BDAG
  rationale: Se mantiene la formulación directa y formal del griego. 'El hijo de María' preserva el rasgo social de la identificación hecha por los habitantes del pueblo sin explicarlo ni suavizarlo.
- source_word: ἀδελφὸς
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - pariente
  - familiar
  lexicon: BDAG
  rationale: El sentido léxico ordinario es 'hermano'. Se conserva ese valor en el texto principal y se deja abierta la posibilidad de un parentesco más amplio en nota, sin resolver la cuestión interpretativa dentro del versículo.
- source_word: Ἰάκωβου
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: BDAG
  rationale: Se usa 'Jacobo' como transliteración tradicional y suficientemente reconocible en español para el nombre griego Ἰάκωβος. 'Santiago' es la forma más usual en muchos contextos, pero aquí la forma más cercana al nombre del texto fuente evita una normalización innecesaria.
- source_word: Ἰωσῆτος
  english_pob_choice: Joses
  chosen_spanish: Joses
  alternatives_spanish:
  - José
  lexicon: BDAG
  rationale: Se conserva la forma específica del nombre en griego mediante transliteración. No se normaliza a 'José' para no borrar la forma distinta que presenta el texto.
- source_word: Ἰούδα
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Jude
  lexicon: BDAG
  rationale: '''Judas'' reproduce fielmente la forma del nombre en el texto fuente y coincide con el uso bíblico usual en español.'
- source_word: Σίμωνος
  english_pob_choice: Simon
  chosen_spanish: Simón
  alternatives_spanish:
  - Simón
  lexicon: BDAG
  rationale: Se usa la forma española estándar 'Simón', la transliteración habitual del nombre griego.
- source_word: αἱ ἀδελφαὶ αὐτοῦ
  english_pob_choice: his sisters
  chosen_spanish: sus hermanas
  alternatives_spanish:
  - sus parientes femeninas
  - sus familiares
  lexicon: BDAG
  rationale: El término ordinario es 'hermanas'. Se preserva el plural femenino literal porque el griego no fuerza otra lectura; la nota puede reconocer la alternativa de parentesco amplio si se desea mantener la tensión interpretativa.
- source_word: ὧδε πρὸς ἡμᾶς
  english_pob_choice: here with us
  chosen_spanish: aquí con nosotros
  alternatives_spanish:
  - aquí entre nosotros
  - aquí cerca de nosotros
  lexicon: BDAG
  rationale: La expresión indica presencia local en relación con los hablantes. 'Aquí con nosotros' suena natural en español y conserva la cercanía social implicada por la frase griega.
- source_word: ἐσκανδαλίζοντο ἐν αὐτῷ
  english_pob_choice: they took offense at him
  chosen_spanish: se escandalizaban de él
  alternatives_spanish:
  - se ofendían por él
  - tropezaban por causa de él
  lexicon: BDAG
  rationale: '''Se escandalizaban de él'' mantiene el valor de reacción de tropiezo/ofensa que el verbo puede expresar en este contexto. También conserva el imperfecto narrativo. ''Se ofendían por él'' es posible, pero menos fuerte; ''tropezaban por causa de él'' sería demasiado explicativo para la línea principal.'
theological_decisions:
- issue: Relación familiar de los 'hermanos' y 'hermanas' de Jesús
  english_pob_reading: Retain the ordinary familial terms 'brother' and 'sisters' in the main text without resolving whether they are uterine siblings, step-siblings, or broader relatives.
  chosen_spanish_reading: Mantener 'hermano' y 'hermanas' en el texto principal, sin resolver si se trata de hermanos biológicos, hermanastros o parientes cercanos.
  alternative_spanish_readings:
  - parientes cercanos
  - familiares
  - hermanastros
  rationale: Los términos griegos ἀδελφός y ἀδελφή normalmente significan hermano y hermana. Como la tradición cristiana ofrece distintas explicaciones del parentesco, la traducción debe conservar la tensión lexical sin imponer una solución doctrinal que el griego no explicita.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it
- issue: Sentido social de 'el hijo de María'
  english_pob_reading: Translate directly as a social identifier used by the townspeople, without adding interpretive commentary in the main text.
  chosen_spanish_reading: Traducir directamente como identificación social, sin añadir en el texto principal una nota interpretativa sobre posible matiz despectivo.
  alternative_spanish_readings:
  - el hijo de María (como designación neutral)
  - el hijo de María (posiblemente despectivo)
  rationale: El griego presenta la expresión como identificación de los pobladores. Puede insinuar un matiz social, pero el texto no lo explica de forma explícita; por eso conviene preservarlo sin sobreinterpretar en la línea principal.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition; §3 Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La versión inglesa revisada cambió 'were offended at him' por 'took offense at him' para reflejar mejor el valor de ἐσκανδαλίζοντο ἐν αὐτῷ. En español se optó por 'se escandalizaban de él', que conserva el matiz de tropiezo/ofensa y el aspecto imperfectivo narrativo. También se preservó la distinción de nombres propios del texto griego, especialmente Joses, sin normalizarlo a José.
  spanish_consistency_notes:
  - Se usa 'Yahvé' como norma general, pero este versículo no contiene el nombre divino.
  - Se mantiene 'carpintero' como rendering principal de τέκτων por claridad y coherencia con el contexto narrativo.
  - '''Jacobo'' se conserva por consistencia interna con una transliteración cercana al griego; ''Santiago'' podría usarse en otros contextos según la tradición del libro, pero aquí se prioriza la proximidad al texto fuente.'
  - La puntuación conserva la pregunta retórica y la coordinación final del griego.
  - La nota de parentesco se ancla solo en 'hermano' para no duplicar el mismo marcador en 'hermanas' dentro del mismo registro.
