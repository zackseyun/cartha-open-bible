  spanish_quality_summary: 'El español es generalmente claro y digno, pero presenta dos problemas de calidad: el anclaje de la nota es confuso y puede inducir a pensar que comenta ''carpintero''; y ''se escandalizaban de él'' suena algo acartonado y menos idiomático para lectores modernos. Conviene ajustar la frase final a una formulación más natural sin perder el sentido de tropiezo/ofensa.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. ''Carpintero'', ''el hijo de María'', ''hermano/hermanas'', ''Joses'', ''Judas'' y ''Simón'' están bien alineados. ''Jacobo'' es defendible por cercanía al griego. La decisión discutible es ἐσκανδαλίζοντο: mejor español principal sería ''se ofendieron por causa de él'', con nota opcional sobre ''se escandalizaban'' o ''tropezaban''.'
