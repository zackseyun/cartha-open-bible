base_translation:
  language: en
  yaml_path: translation/nt/mark/006/003.yaml
  text: Is this not the carpenter[b][a], the son of Mary and brother of James and Joses and Judas and Simon? And are not his sisters here with us? And they took offense at him.
  footnotes:
