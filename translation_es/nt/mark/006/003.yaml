    rationale: ἐσκανδαλίζοντο ἐν αὐτῷ en este contexto no describe principalmente 'escandalizarse' en sentido moral moderno, sino ofenderse/tropezar por causa de Jesús. Una redacción más natural mejora legibilidad y precisión contextual.
