revisions:
- from: Y cuando sus discípulos se enteraron, fueron y tomaron el cuerpo[a] y lo pusieron en un sepulcro.
  to: Cuando sus discípulos oyeron esto, fueron, recogieron su cuerpo[a] y lo pusieron en un sepulcro.
  rationale: Se ajusta ἀκούσαντες a «oyeron» para reflejar de manera más directa el verbo fuente y la auditoría inglesa; se añade «esto» para naturalidad española; se cambia «tomaron» por «recogieron» para representar mejor ἦραν en contexto funerario; y se explicita «su cuerpo» para conservar αὐτοῦ sin perder fluidez.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:36:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: al oír, los discípulos vinieron/fueron, recogieron el cuerpo y lo colocaron en un sepulcro. También mantiene correctamente que «sus discípulos» se refiere a los de Juan el Bautista. Sin embargo, «se enteraron» debilita el vínculo directo con ἀκούσαντες («al oír / cuando oyeron») y «tomaron» no expresa tan bien el matiz físico de ἦραν («recogieron / levantaron / se llevaron») en contexto funerario.'
  spanish_quality_summary: 'El español es claro y natural, con buen registro bíblico moderno. No obstante, «cuando sus discípulos se enteraron» suena un poco más interpretativo que el original, y «tomaron el cuerpo» resulta algo plano. Una leve revisión mejora la fidelidad y la naturalidad: «Cuando sus discípulos oyeron esto, fueron, recogieron su cuerpo[a] y lo pusieron en un sepulcro».'
  glossary_alignment: No hay términos del glosario mayor en juego como Yahvé, Mesías, Espíritu, etc. «Discípulos», «cuerpo» y «sepulcro» están bien alineados con las decisiones POB. La nota léxica sobre πτῶμα como «cadáver» está bien preservada y conviene mantenerla.
  issues:
  - severity: medium
    issue: «se enteraron» para ἀκούσαντες
    rationale: El participio significa literalmente «habiendo oído / al oír». «Se enteraron» introduce una interpretación secundaria de recepción de noticia, posible por contexto, pero menos ceñida al verbo fuente y a la decisión auditada en inglés.
  - severity: medium
    issue: Falta de objeto explícito en «oyeron» si se corrige literalmente
    rationale: En español, «Cuando sus discípulos oyeron» queda algo abrupto sin complemento. Añadir «esto» hace natural la frase sin apartarse del sentido contextual del original.
  - severity: low
    issue: «tomaron» suaviza el matiz físico de ἦραν
    rationale: Aunque posible, «tomaron» no transmite tan bien la acción de recoger/levantar el cadáver. «Recogieron» funciona mejor en español narrativo y encaja con el contexto de recuperación del cuerpo para sepultura.
  - severity: low
    issue: «el cuerpo» omite el posesivo presente en αὐτοῦ
    rationale: El posesivo no es indispensable en español si el referente es claro, pero «su cuerpo» preserva mejor la forma del original y suena natural en este contexto.
  revised_spanish_text: Cuando sus discípulos oyeron esto, fueron, recogieron su cuerpo[a] y lo pusieron en un sepulcro.
  revised_footnotes:
  - marker: a
    text: O «el cadáver». El término griego se refiere específicamente a un cuerpo muerto.
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀκούσαντες a «oyeron» para reflejar de manera más directa el verbo fuente y la auditoría inglesa; se añade «esto» para naturalidad española; se cambia «tomaron» por «recogieron» para representar mejor ἦραν en contexto funerario; y se explicita «su cuerpo» para conservar αὐτοῦ sin perder fluidez.
