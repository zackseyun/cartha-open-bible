translation:
  language: es
  text: Cuando sus discípulos oyeron esto, fueron, recogieron su cuerpo[a] y lo pusieron en un sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cadáver». El término griego se refiere específicamente a un cuerpo muerto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: cuando se enteraron
  alternatives_spanish:
  - después de oír
  - al oír
  lexicon: BDAG
  rationale: El participio aoristo expresa anterioridad temporal en la narración. En español, «cuando se enteraron» comunica esa secuencia de manera natural y fluida, sin perder el valor temporal del evento previo.
- source_word: οἱ μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - sus seguidores
  lexicon: BDAG
  rationale: μαθηταί denota discípulos en sentido propio, no solo seguidores. Se conserva el vínculo relacional del término y el pronombre posesivo se mantiene conforme al referente de Juan el Bautista en el contexto inmediato.
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: fueron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: En español narrativo, «fueron» comunica el desplazamiento hacia el lugar del hecho con naturalidad. Aquí el foco está en la acción de ir al lugar para recoger el cuerpo, por lo que «fueron» resulta idiomático.
- source_word: ἦραν
  english_pob_choice: took up
  chosen_spanish: tomaron
  alternatives_spanish:
  - levantaron
  - llevaron
  lexicon: BDAG
  rationale: αἴρω puede significar tomar, levantar o llevarse. «Tomaron» preserva la acción de recoger el cadáver sin forzar una imagen innecesariamente literal en español; el contexto funerario ya determina el sentido físico.
- source_word: τὸ πτῶμα αὐτοῦ
  english_pob_choice: his body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  - su cuerpo
  lexicon: BDAG
  rationale: πτῶμα designa específicamente un cuerpo muerto. En el texto principal, «el cuerpo» mantiene la lectura sobria y natural; se evita suavizar el referente. «Cadáver» sigue siendo una alternativa válida si se quisiera explicitar más el matiz léxico.
- source_word: ἔθηκαν αὐτὸ
  english_pob_choice: laid it
  chosen_spanish: lo pusieron
  alternatives_spanish:
  - lo depositaron
  - lo colocaron
  lexicon: BDAG
  rationale: τίθημι en un contexto de sepultura puede rendirse como poner, colocar o depositar. «Lo pusieron» es claro, digno y acorde con el registro narrativo español.
- source_word: ἐν μνημείῳ
  english_pob_choice: in a tomb
  chosen_spanish: en un sepulcro
  alternatives_spanish:
  - en una tumba
  - en una tumba sepulcral
  lexicon: BDAG
  rationale: μνημεῖον en este contexto refiere a un lugar de entierro. «Sepulcro» es un equivalente bíblico claro y natural en español, más preciso que «tumba» para este pasaje narrativo.
theological_decisions:
- issue: Referencia de «sus discípulos»
  english_pob_reading: John the Baptist's disciples
  chosen_spanish_reading: los discípulos de Juan el Bautista
  alternative_spanish_readings:
  - los discípulos de Jesús
  rationale: El contexto inmediato narra la muerte de Juan el Bautista; por eso, el posesivo «sus» se entiende en referencia a él. La traducción no explicita el nombre en el texto principal, pero la lectura teológica e histórica queda alineada con el marco narrativo.
  doctrine_reference: Contexto narrativo inmediato de Marcos 6:27-29
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego SBLGNT y el audit trail en inglés sin copiar mecánicamente su sintaxis. Se preserva el matiz temporal del participio aoristo, el referente funerario de πτῶμα y el valor sepulcral de μνημεῖον. No se observaron revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se mantiene «discípulos» para μαθηταί, conforme al uso bíblico estándar y al POB inglés.
  - Se evita la sustitución por «SEÑOR» u otras convenciones de ocultamiento del nombre divino, ya que no aparecen en este versículo.
  - «Sepulcro» conserva el registro bíblico y evita la ambigüedad de «memorial» o «monumento» para μνημεῖον.
  - La nota al pie se ancla en «cuerpo[a]» para preservar la alternativa léxica señalada por el audit trail inglés.
