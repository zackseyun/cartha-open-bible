translation:
  language: es
  text: Y no pudiendo llevarlo hasta él[a] a causa de la multitud, quitaron el techo donde estaba, y, después de abrir un boquete en él, bajan la camilla[b] en la que yacía el paralítico.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «llevarlo a él», con el primer «lo» refiriéndose al paralítico y «él» a Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «descuelgan la camilla». El verbo griego puede expresarse como «bajar» o «descolgar».
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ δυνάμενοι
  english_pob_choice: not being able
  chosen_spanish: no pudiendo
  alternatives_spanish:
  - no siendo capaces de
  - como no podían
  lexicon: BDAG
  rationale: El participio expresa la circunstancia que impide la acción siguiente. «No pudiendo» conserva el valor circunstancial sin volverlo una explicación más libre.
- source_word: προσενέγκαι αὐτῷ
  english_pob_choice: to bring him to him
  chosen_spanish: llevarlo a él
  alternatives_spanish:
  - presentarlo a él
  - traerlo a él
  lexicon: BDAG
  rationale: En español, la doble referencia pronominal del griego suena innecesariamente repetitiva. «Llevarlo a él» comunica de forma natural que querían acercar al paralítico a Jesús, sin ocultar el movimiento implícito.
- source_word: διὰ τὸν ὄχλον
  english_pob_choice: because of the crowd
  chosen_spanish: a causa de la multitud
  alternatives_spanish:
  - por la multitud
  - debido a la multitud
  lexicon: BDAG
  rationale: «Multitud» es el equivalente natural de ὄχλος en este contexto narrativo. «A causa de» preserva con claridad el valor causal de διά con acusativo.
- source_word: ἀπεστέγασαν τὴν στέγην
  english_pob_choice: they removed the roof
  chosen_spanish: quitaron el techo
  alternatives_spanish:
  - removieron el techo
  - descubrieron el techo
  lexicon: BDAG
  rationale: El verbo raro ἀποστεγάζω indica quitar o abrir la cubierta del techo. En español, «quitaron el techo» es claro y fiel, sin forzar un calco como «des-techaron».
- source_word: ἐξορύξαντες
  english_pob_choice: after digging through it
  chosen_spanish: después de cavar a través de él
  alternatives_spanish:
  - después de abrir un boquete
  - tras excavar en él
  lexicon: BDAG
  rationale: El participio describe la acción concreta de perforar o excavar la cubierta para abrir paso. «Cavar a través de él» mantiene la imagen física del texto sin especificar un material que el griego no nombra.
- source_word: χαλῶσι
  english_pob_choice: they lower
  chosen_spanish: descolgaron
  alternatives_spanish:
  - lo bajaron
  - lo hicieron descender
  lexicon: BDAG
  rationale: El presente histórico griego da viveza a la escena. En español, el pretérito narrativo es natural; «descolgaron» refleja el descenso desde el techo y preserva el movimiento vertical sugerido.
- source_word: κράβαττον
  english_pob_choice: the mat
  chosen_spanish: la camilla
  alternatives_spanish:
  - el catre
  - la estera
  lexicon: BDAG
  rationale: κράβαττος designa una especie de lecho simple, cama portátil o camilla/paleto. «Camilla» funciona bien en español contemporáneo para un soporte transportable; «estera» podría sonar demasiado liviana o ambigua en este contexto.
- source_word: ὅπου ὁ παραλυτικὸς κατέκειτο
  english_pob_choice: on which the paralyzed man was lying
  chosen_spanish: en la que yacía el paralítico
  alternatives_spanish:
  - donde yacía el paralítico
  - en la que estaba tendido el paralítico
  lexicon: BDAG
  rationale: La relativa modifica naturalmente a la camilla. «Yacía» conserva el sentido de estar echado/recostado, y «el paralítico» mantiene el término nominal del griego, aunque en español suene más sustantivado que «el hombre paralizado».
theological_decisions:
- issue: Término nominal παραλυτικός
  english_pob_reading: the paralyzed man
  chosen_spanish_reading: el paralítico
  alternative_spanish_readings:
  - el hombre paralizado
  - el enfermo paralítico
  rationale: El inglés POB suaviza el adjetivo sustantivado por naturalidad, pero el griego usa literalmente «el paralítico». En español, conservar «el paralítico» evita diluir el dato léxico y respeta el sustantivo contextual.
  doctrine_reference: Precisión léxica del texto narrativo; sin implicación doctrinal.
translation_notes:
  revision_awareness: El contexto inglés revisado cambió de una formulación causal («since they were not able») a la participial más directa («not being able»). La versión española sigue esa estructura con «Y no pudiendo», manteniendo la relación de causa o circunstancia sin añadir interpretación. También se conservó la escena concreta del techo y el descenso del lecho, sin expandir el texto más allá de lo que el griego y el audit trail justifican.
  spanish_consistency_notes:
  - Se usó «Yahvé» por defecto en el proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» y «Mesías» porque el versículo no los contiene.
  - «Paralítico» se conserva como sustantivo contextual, coherente con la decisión auditada en inglés y con la forma del griego.
  - La imagen de «descolgar» mantiene la verticalidad implícita del contexto narrativo sin añadir elementos no presentes en el texto.
