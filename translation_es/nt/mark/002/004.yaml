    text: O, más literalmente, «llevarlo a él», con el primer «lo» refiriéndose al paralítico y «él» a Jesús.
    reason: lexical_alternative
  - marker: b
    text: O «descuelgan la camilla». El verbo griego puede expresarse como «bajar» o «descolgar».
    reason: lexical_alternative
  revision_rationale: La revisión restituye la decisión léxica documentada para προσενέγκαι αὐτῷ mediante una formulación natural en español ('llevarlo hasta él') y una nota que conserva explícitamente los dos referentes. También mejora la naturalidad de ἐξορύξαντες con 'abrir un boquete en él' y acerca χαλῶσι al presente histórico griego con 'bajan'. Se elimina la nota redundante sobre 'el paralítico' y se conservan las opciones léxicas realmente relevantes para el lector.
