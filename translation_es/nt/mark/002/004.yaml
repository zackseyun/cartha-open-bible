  timestamp: '2026-05-07T20:26:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: incapacidad por la multitud, remoción del techo, apertura adicional y descenso del soporte donde yacía el hombre. Sin embargo, omite en el texto principal el segundo referente de προσενέγκαι αὐτῷ (''llevarlo a él''), que el rastro POB quiso conservar explícitamente, y cambia innecesariamente el presente histórico χαλῶσι a un pretérito sin compensación. También falta la nota equivalente a la alternativa inglesa sobre la doble referencia pronominal.'
  spanish_quality_summary: El español es generalmente claro, pero 'cavar a través de él' suena algo calcado y poco idiomático. 'Descolgaron la camilla' es natural, pero en esta revisión conviene usar presente histórico ('bajan') para acercarse mejor al griego y al POB inglés. 'Llevarlo hasta él' suena más natural que 'llevarlo a él' y preserva los dos referentes.
  glossary_alignment: No hay términos del glosario mayor en disputa. 'El paralítico' es aceptable en español y puede mantenerse sin nota, pues no crea ambigüedad. 'Camilla' para κράβαττον es defendible y legible. La principal cuestión léxica es preservar explícitamente los dos pronombres en προσενέγκαι αὐτῷ mediante una nota o formulación que no suene torpe.
  issues:
  - severity: medium
    issue: Se pierde en el texto y en las notas la doble referencia de προσενέγκαι αὐτῷ.
    rationale: El griego distingue al paralítico y a Jesús ('llevarlo a él'). El rastro POB inglés documenta esta decisión y la nota correspondiente; el borrador español la reduce a 'llevarlo a él', que no conserva ambos referentes.
  - severity: medium
    issue: '''Después de cavar a través de él'' suena poco natural en español.'
    rationale: Aunque intenta reflejar ἐξορύξαντες, la expresión resulta calcada. 'Después de abrir un boquete en él' o 'después de excavar en él' expresa mejor la acción física en español sin sobreinterpretar materiales.
  - severity: low
    issue: Se vierte χαλῶσι con pretérito ('descolgaron') en vez de presente histórico.
    rationale: El inglés POB preserva la viveza narrativa con presente. En español también es perfectamente natural en narrativa bíblica usar 'bajan'/'descuelgan' aquí.
  - severity: low
    issue: La nota b es innecesaria y no refleja una ambigüedad real en español.
    rationale: Si el texto principal mantiene 'el paralítico', no hace falta una nota que diga que el griego dice literalmente lo mismo. La nota útil faltante es la de la doble referencia pronominal.
  revised_spanish_text: Y no pudiendo llevarlo hasta él[a] a causa de la multitud, quitaron el techo donde estaba, y, después de abrir un boquete en él, bajan la camilla[b] en la que yacía el paralítico.
  revised_footnotes:
