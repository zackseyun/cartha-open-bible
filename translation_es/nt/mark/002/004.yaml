revisions:
- from: Y no pudiendo llevarlo a él a causa de la multitud, quitaron el techo donde estaba, y, después de cavar a través de él, descolgaron la camilla[a] en la que yacía el paralítico[b].
  to: Y no pudiendo llevarlo hasta él[a] a causa de la multitud, quitaron el techo donde estaba, y, después de abrir un boquete en él, bajan la camilla[b] en la que yacía el paralítico.
  rationale: La revisión restituye la decisión léxica documentada para προσενέγκαι αὐτῷ mediante una formulación natural en español ('llevarlo hasta él') y una nota que conserva explícitamente los dos referentes. También mejora la naturalidad de ἐξορύξαντες con 'abrir un boquete en él' y acerca χαλῶσι al presente histórico griego con 'bajan'. Se elimina la nota redundante sobre 'el paralítico' y se conservan las opciones léxicas realmente relevantes para el lector.
