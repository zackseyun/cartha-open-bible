  text: καὶ μὴ δυνάμενοι ⸀προσενέγκαι αὐτῷ διὰ τὸν ὄχλον ἀπεστέγασαν τὴν στέγην ὅπου ἦν, καὶ ἐξορύξαντες χαλῶσι τὸν κράβαττον ⸀ὅπου ὁ παραλυτικὸς κατέκειτο.
base_translation:
  language: en
  yaml_path: translation/nt/mark/002/004.yaml
  text: And not being able to bring him to him because of the crowd[a], they removed the roof where he was, and after digging through it[c][b], they lower the mat on which the paralyzed man was lying.
  footnotes:
  - marker: a
    text: Or, more literally, 'to bring him to him,' with the first 'him' referring to the paralyzed man and the second to Jesus.
    reason: lexical_alternative
  - marker: b
    text: Or 'they let down the mat.' The Greek verb can be rendered either 'lower' or 'let down.'
    reason: lexical_alternative
  - marker: c
    text: Greek 'the paralytic.' The translation renders the term as 'the paralyzed man' for natural English.
    reason: lexical_alternative
