translation:
  language: es
  text: ¿Cómo entró en la casa de Dios en el tiempo de Abiatar el sumo sacerdote[a], y comió los panes de la Presencia, que no es lícito comer excepto los sacerdotes[b], y también dio de ellos a los que estaban con él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «durante el sumo sacerdocio de Abiatar». La expresión también puede entenderse de modo más amplio como una referencia al tiempo o al marco narrativo asociado con Abiatar el sumo sacerdote.
    reason: alternative_reading
  - marker: b
    text: «Panes de la Presencia» se refiere al pan consagrado puesto delante de Dios en el santuario; tradicionalmente, «panes de la proposición».
    reason: cultural_note
lexical_decisions:
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  lexicon: BDAG
  rationale: En español, «¿Cómo…?» reproduce de manera natural la introducción interrogativa del relato y conserva el tono de recapitulación del dicho de Jesús.
- source_word: εἰσῆλθεν εἰς τὸν οἶκον τοῦ θεοῦ
  english_pob_choice: entered into the house of God
  chosen_spanish: entró en la casa de Dios
  alternatives_spanish:
  - entró en la casa de Dios
  lexicon: BDAG
  rationale: «Casa de Dios» mantiene el sustantivo culto del griego y suena natural en español. Se evita añadir «into» de forma rígida, porque «entró en» ya expresa bien el movimiento.
- source_word: ἐπὶ Ἀβιαθὰρ ἀρχιερέως
  english_pob_choice: in the time of Abiathar the high priest
  chosen_spanish: en el tiempo de Abiatar el sumo sacerdote
  alternatives_spanish:
  - durante el sumo sacerdocio de Abiatar
  - en la época de Abiatar el sumo sacerdote
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo admite valor temporal. «En el tiempo de» conserva esa amplitud y deja visible la tensión cronológica sin resolverla por paráfrasis interpretativa.
- source_word: τοὺς ἄρτους τῆς προθέσεως
  english_pob_choice: the bread of the Presence
  chosen_spanish: los panes de la Presencia
  alternatives_spanish:
  - el pan de la Presencia
  - los panes de la proposición
  lexicon: BDAG
  rationale: Se conserva el sentido cultual con «Presencia», más transparente que «proposición» para lectores actuales. El plural «panes» refleja el plural griego ἄρτους.
- source_word: ἔφαγεν
  english_pob_choice: ate
  chosen_spanish: comió
  alternatives_spanish:
  - comió de
  lexicon: BDAG
  rationale: El aoristo narrativo se expresa de forma simple con «comió». No se añade objeto explícito porque ya está dado en el contexto.
- source_word: οὓς οὐκ ἔξεστιν φαγεῖν
  english_pob_choice: which it is not lawful to eat
  chosen_spanish: que no es lícito comer
  alternatives_spanish:
  - que no está permitido comer
  - que no se puede comer lícitamente
  lexicon: BDAG
  rationale: «No es lícito» preserva el registro jurídico-sacral de ἔξεστιν mejor que una mera prohibición general.
- source_word: εἰ μὴ ⸂τοὺς ἱερεῖς⸃
  english_pob_choice: except for the priests
  chosen_spanish: sino a los sacerdotes
  alternatives_spanish:
  - excepto a los sacerdotes
  - salvo a los sacerdotes
  lexicon: BDAG
  rationale: En español, la construcción idiomática con «sino a» comunica con claridad la excepción normativa. Se conserva «sacerdotes» para el referente concreto del culto israelita.
- source_word: ἔδωκεν καὶ τοῖς σὺν αὐτῷ οὖσιν
  english_pob_choice: and also gave some to those who were with him
  chosen_spanish: y también dio a los que estaban con él
  alternatives_spanish:
  - y también dio de ello a los que estaban con él
  - y también dio a sus compañeros
  lexicon: BDAG
  rationale: El griego no explicita el objeto en la frase final; en español puede omitirse igual que en el texto fuente, preservando la elipsis. «Los que estaban con él» traduce con sobriedad τοῖς σὺν αὐτῷ οὖσιν.
theological_decisions:
- issue: Referencia temporal de Abiatar y tensión con el paralelo veterotestamentario
  english_pob_reading: Render ἐπὶ Ἀβιαθὰρ ἀρχιερέως as 'in the time of Abiathar the high priest' in the main text.
  chosen_spanish_reading: «en el tiempo de Abiatar el sumo sacerdote»
  alternative_spanish_readings:
  - «durante el sumo sacerdocio de Abiatar»
  - «en la época de Abiatar el sumo sacerdote»
  rationale: La formulación española conserva la amplitud temporal del griego y, como en el audit trail inglés, no intenta resolver la tensión histórica o narrativa con 1 Samuel 21. La traducción debe dejar visible el punto para el lector.
  doctrine_reference: Preservar la tensión textual en lugar de armonizarla por traducción.
translation_notes:
  revision_awareness: El audit trail inglés indica estado de alta concordancia y sin cambios en la última pasada; por ello no se introducen modificaciones de fondo, solo se traslada con precisión la decisión temporal sobre Abiatar y la denominación cultual del pan.
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando aparezca el nombre divino, pero aquí el texto griego dice θεοῦ y por eso corresponde «Dios».
  - «Sumo sacerdote» mantiene la función cultual del griego ἀρχιερεύς sin convertirla en un título eclesiástico.
  - Se conserva «Presencia» como mayúscula reverente en la expresión cultual, siguiendo la transparencia del original.
  - La elipsis del objeto en la última cláusula es válida en español y evita sobreexplicar lo que el griego también deja implícito.
