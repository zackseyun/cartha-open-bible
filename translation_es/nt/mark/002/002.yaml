- from: Y se reunieron muchos, de modo que ya no cabía nadie, ni aun junto a la puerta, y les estaba hablando la palabra[a].
  to: Y se reunieron muchos, de modo que ya no había lugar, ni siquiera junto a la puerta, y les hablaba la palabra[a].
  rationale: Se ajusta el texto para evitar la adición no explícita de «nadie», mejorar la naturalidad del español con «ni siquiera», y suavizar la construcción verbal manteniendo el imperfecto y la transparencia de λόγος como «la palabra».
