translation:
  language: es
  text: Y se reunieron muchos, de modo que ya no había lugar, ni siquiera junto a la puerta, y les hablaba la palabra[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el mensaje». El griego dice «la palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνήχθησαν
  english_pob_choice: were gathered together
  chosen_spanish: se reunieron
  alternatives_spanish:
  - fueron reunidos
  - se juntaron
  lexicon: BDAG
  rationale: El aoristo pasivo expresa que llegaron a quedar reunidos muchos. «Se reunieron» conserva la idea de congregación sin volver la frase pesada en español; el pasivo queda implícito de manera natural.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - una multitud
  - muchas personas
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente. «Muchos» es breve y fiel, y deja que el contexto determine que se trata de personas.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - de tal manera que
  - así que
  lexicon: BDAG
  rationale: Introduce la cláusula de resultado. «De modo que» expresa con claridad la relación resultativa sin forzar la sintaxis española.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - ya no había
  lexicon: BDAG
  rationale: Comunica que la capacidad estaba agotada. En español, «ya no» suena más natural que una repetición más literal de «no más».
- source_word: χωρεῖν
  english_pob_choice: there was no longer room
  chosen_spanish: cabía nadie
  alternatives_spanish:
  - había lugar
  - entraba alguien
  lexicon: BDAG
  rationale: Aquí χωρέω indica tener espacio o caber. La forma idiomática «ya no cabía nadie» comunica la falta total de espacio de manera natural, preservando el sentido del griego.
- source_word: μηδὲ τὰ πρὸς τὴν θύραν
  english_pob_choice: not even at the door
  chosen_spanish: ni aun junto a la puerta
  alternatives_spanish:
  - ni siquiera en la puerta
  - ni aun en la puerta
  lexicon: BDAG
  rationale: La construcción griega se refiere al área hacia la puerta. «Junto a la puerta» evita una literalidad rígida y mantiene la idea espacial; «ni aun» refuerza la exclusión total.
- source_word: ἐλάλει
  english_pob_choice: he was speaking
  chosen_spanish: les estaba hablando
  alternatives_spanish:
  - les hablaba
  - les estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto señala acción en curso. «Les estaba hablando» preserva mejor la duratividad que un pasado simple y suena natural en español.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo se expresa de forma natural con el clítico indirecto en español. «Les» mantiene la referencia a los reunidos sin añadir especificación.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - la palabra de Dios
  lexicon: BDAG
  rationale: Se conserva el valor lexical de λόγος con un término igualmente básico en español. «La palabra» reproduce la formulación del texto sin importar «de Dios», que no aparece explícitamente aquí.
theological_decisions:
- issue: Sentido de τὸν λόγον en la enseñanza de Jesús
  english_pob_reading: the word
  chosen_spanish_reading: la palabra
  alternative_spanish_readings:
  - el mensaje
  - la palabra de Dios
  rationale: La frase griega dice simplemente que Jesús les hablaba «la palabra». Mantener «la palabra» conserva la transparencia del original y evita ampliar indebidamente el contenido doctrinal del enunciado.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La fuente inglesa y el aparato de revisión muestran acuerdo alto y no registran cambios aplicados; por ello la redacción española sigue de cerca la lectura ya establecida, manteniendo la opción lexical de λόγος como «la palabra» y la relación resultativa de ὥστε.
  spanish_consistency_notes:
  - Se mantuvo un registro verbal natural en español sin perder el imperfecto aspectual de ἐλάλει.
  - No se añadió «de Dios», porque el griego no lo expresa en este versículo.
  - Se evitó «Cristo» o terminología eclesiástica no requerida por el texto.
  - 'La expresión espacial de la clausula negativa se adaptó a un español idiomático: «ni aun junto a la puerta».'
