  source_alignment_summary: El borrador español refleja fielmente el griego y la decisión auditada en inglés. Conserva la pregunta retórica con expectativa negativa, traduce idiomáticamente οἱ υἱοὶ τοῦ νυμφῶνος como «los invitados a la boda», mantiene la imagen del «novio» y preserva correctamente la distinción del segundo miembro con «tienen al novio con ellos», en línea con ἔχουσιν.
  spanish_quality_summary: El español es natural, claro y digno, adecuado para una Biblia de lectura eclesial amplia. La sintaxis fluye bien y evita calcos opacos. «¿Acaso pueden ayunar…?» funciona bien como pregunta retórica, y la repetición de «con ellos» mantiene cohesión y claridad.
  glossary_alignment: No hay términos del glosario de proyecto en disputa en este versículo. «Novio» para νυμφίος es una elección contextual válida y bien justificada en español; «invitados a la boda» sigue correctamente la racionalidad documentada para el modismo οἱ υἱοὶ τοῦ νυμφῶνος.
