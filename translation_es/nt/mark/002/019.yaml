translation:
  language: es
  text: 'Y Jesús les dijo: «¿Acaso pueden ayunar los invitados a la boda[a] mientras el novio está con ellos? Mientras tienen al novio con ellos, no pueden ayunar».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «los hijos de la boda» o «los hijos de la cámara nupcial», un modismo para quienes participan en la celebración matrimonial.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ εἶπεν αὐτοῖς ὁ Ἰησοῦς
  english_pob_choice: And Jesus said to them
  chosen_spanish: Y Jesús les dijo
  alternatives_spanish:
  - Y Jesús les habló
  - Y Jesús les dijo a ellos
  lexicon: SBLGNT; English POB audit trail
  rationale: Conservo la fórmula narrativa directa y natural en español. «Les dijo» refleja bien εἶπεν αὐτοῖς sin añadir matiz interpretativo.
- source_word: Μὴ δύνανται ... νηστεύειν;
  english_pob_choice: cannot fast ... can they?
  chosen_spanish: ¿Acaso pueden ayunar ...?
  alternatives_spanish:
  - ¿No pueden ayunar ...?
  - ¿Ciertamente no pueden ayunar ...?
  lexicon: SBLGNT; BDAG
  rationale: La pregunta con μή y el indicativo funciona retóricamente esperando respuesta negativa. En español, «¿Acaso pueden ...?» conserva el valor interrogativo-retórico sin volverla una simple negación declarativa.
- source_word: οἱ υἱοὶ τοῦ νυμφῶνος
  english_pob_choice: the wedding guests
  chosen_spanish: los invitados a la boda
  alternatives_spanish:
  - los hijos de la sala nupcial
  - los hijos del tálamo nupcial
  - los asistentes a la boda
  lexicon: BDAG
  rationale: Sigo la decisión auditada de traducir el modismo de manera idiomática. «Invitados a la boda» comunica la participación en la celebración con naturalidad en español, evitando un calco opaco.
- source_word: νυμφῶνος
  english_pob_choice: wedding
  chosen_spanish: boda
  alternatives_spanish:
  - salón de bodas
  - cámara nupcial
  lexicon: BDAG
  rationale: Dentro del modismo, el sustantivo apunta al contexto nupcial/celebrativo. «Boda» es la forma más natural en español para el conjunto del modismo.
- source_word: ἐν ᾧ ὁ νυμφίος μετ’ αὐτῶν ἐστιν
  english_pob_choice: while the bridegroom is with them
  chosen_spanish: mientras el novio está con ellos
  alternatives_spanish:
  - mientras el esposo está con ellos
  - durante el tiempo que el novio está con ellos
  lexicon: BDAG
  rationale: La relación es temporal, no espacial. «Mientras» transmite la duración de manera clara, y «con ellos» refleja μετ’ αὐτῶν de forma directa.
- source_word: ὁ νυμφίος / τὸν νυμφίον
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: En español contemporáneo, «novio» es el equivalente más natural y comprensible para νυμφίος en este contexto. Conserva la imagen nupcial sin sonar arcaico.
- source_word: ὅσον χρόνον
  english_pob_choice: As long as
  chosen_spanish: Mientras
  alternatives_spanish:
  - Tanto tiempo como
  - Durante todo el tiempo que
  lexicon: BDAG
  rationale: La expresión marca duración. En español, «Mientras» es la opción más concisa y natural para expresar el valor temporal reiterado del segundo miembro.
- source_word: ἔχουσιν τὸν νυμφίον μετ’ αὐτῶν
  english_pob_choice: they have the bridegroom with them
  chosen_spanish: tienen al novio con ellos
  alternatives_spanish:
  - tienen al novio entre ellos
  - tienen al novio a su lado
  lexicon: BDAG
  rationale: Conservo el verbo «tener», como en el griego, y el complemento «con ellos», que mantiene la idea de presencia acompañante. El artículo personal «al» es natural con objeto animado.
theological_decisions:
- issue: Metáfora nupcial aplicada a Jesús
  english_pob_reading: Retain the metaphor without making its theological implication explicit in the main text.
  chosen_spanish_reading: Mantener la metáfora sin explicitar en el texto principal su implicación teológica.
  alternative_spanish_readings:
  - Traducir de modo interpretativo para subrayar la imagen mesiánica
  - Añadir una glosa explicativa en el cuerpo del versículo
  rationale: El texto presenta a Jesús usando la figura del novio; la traducción debe preservar esa imagen sin anticipar la interpretación. Así se mantiene la tensión teológica documentada.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión auditada de la POB inglesa: pregunta retórica con respuesta negativa implícita, modismo nupcial traducido idiomáticamente, y preservación de la metáfora del novio sin explicación doctrinal añadida. No se registran revisiones posteriores en el expediente inglés, y el estado de concordancia del control cruzado fue alto.'
  spanish_consistency_notes:
  - Se mantuvo «Jesús» como nombre propio estándar.
  - Se prefirió un registro digno y moderno, sin arcaísmos innecesarios.
  - «Novio» se usa de manera consistente para νυμφίος en este contexto nupcial.
  - La nota de pie conserva la alternativa literal para no borrar el modismo original.
