translation:
  language: es
  text: Pero vendrán días cuando les sea quitado el novio, y entonces ayunarán en aquel día[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «en ese día». El griego usa el singular: «en aquel día», no «en aquellos días».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύσονται δὲ ἡμέραι
  english_pob_choice: But days will come
  chosen_spanish: Pero vendrán días
  alternatives_spanish:
  - Pero vendrán los días
  - Y vendrán días
  lexicon: BDAG
  rationale: Se conserva el giro idiomático futuro y la contraposición de δέ con «Pero». En español, «vendrán días» suena natural y mantiene el carácter proverbial de la expresión sin añadir artículos que el griego no exige.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - siempre que
  lexicon: BDAG
  rationale: Con el aoristo subjuntivo, la relación es de contingencia futura; «cuando» comunica mejor ese sentido en español que una forma iterativa.
- source_word: ἀπαρθῇ
  english_pob_choice: is taken away
  chosen_spanish: sea quitado
  alternatives_spanish:
  - sea removido
  - sea llevado
  lexicon: BDAG
  rationale: «Ser quitado» conserva la pasiva y la idea de remoción forzosa o abrupta sin especificar agente. «Quitado» es natural en español y no resuelve indebidamente la tensión sobre quién actúa.
- source_word: ἀπ’ αὐτῶν
  english_pob_choice: from them
  chosen_spanish: de entre ellos
  alternatives_spanish:
  - de ellos
  - lejos de ellos
  lexicon: BDAG
  rationale: «De entre ellos» expresa mejor la separación relacional implícita en ἀπό y fluye de manera más natural en español que un simple «de ellos».
- source_word: ὁ νυμφίος
  english_pob_choice: the bridegroom
  chosen_spanish: el novio
  alternatives_spanish:
  - el esposo
  - el desposado
  lexicon: BDAG
  rationale: Aunque «novio» es menos técnico que «novio»/«esposo» en algunas tradiciones, en español moderno comunica claramente la imagen nupcial. Se evita «esposo» porque puede desplazar el matiz de desposorio que tiene νυμφίος.
- source_word: νηστεύσουσιν
  english_pob_choice: they will fast
  chosen_spanish: ayunarán
  alternatives_spanish:
  - guardarán ayuno
  - se abstendrán de comer
  lexicon: BDAG
  rationale: «Ayunarán» es la forma establecida y clara en español para νηστεύω, y conserva el sentido religioso del verbo sin perífrasis innecesarias.
- source_word: ἐν ⸂ἐκείνῃ τῇ ἡμέρᾳ⸃
  english_pob_choice: in that day
  chosen_spanish: en aquel día
  alternatives_spanish:
  - en ese día
  - aquel día
  lexicon: BDAG
  rationale: 'Se mantiene el singular marcado del griego: ἐκείνῃ τῇ ἡμέρᾳ. «Aquel día» es idiomático y solemne en español; se prefiere «en aquel día» para reflejar con claridad el ἐν + dativo del texto.'
theological_decisions:
- issue: Identificación metafórica del novio con Jesús
  english_pob_reading: Retain 'the bridegroom' as a metaphor without making the identification explicit in the translation.
  chosen_spanish_reading: Se conserva «el novio» como metáfora sin explicitar «yo».
  alternative_spanish_readings:
  - cuando yo sea quitado de entre ellos
  - cuando el Mesías sea quitado de entre ellos
  rationale: El texto griego preserva la metáfora nupcial y no explicita la autoidentificación en la frase. Mantenerla evita sobreinterpretar y conserva la fuerza literaria y teológica del dicho.
  doctrine_reference: Translation philosophy §1, §3
- issue: Naturaleza de la remoción del novio
  english_pob_reading: Use the passive 'is taken away' without specifying by whom or explicitly naming the crucifixion.
  chosen_spanish_reading: «Sea quitado» mantiene la pasiva sin nombrar al agente ni definir aquí el modo de la remoción.
  alternative_spanish_readings:
  - sea quitado por la fuerza
  - sea llevado a la muerte
  rationale: La frase puede aludir a la muerte de Jesús, pero el texto no lo formula de manera explícita. La traducción conserva esa apertura en vez de resolverla anticipadamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego de SBLGNT y el audit trail inglés sin cambios de revisión aplicados; la principal decisión de estilo es mantener la singularidad de «en aquel día» y la metáfora de «el novio» sin explicaciones añadidas.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se mantiene el registro bíblico sobrio y contemporáneo, evitando calcos duros.
  - «Novio» se usa como término estable para νυμφίος en esta línea nupcial, en coherencia con el contexto del pasaje.
  - «Ayunarán» conserva el término religioso tradicional sin perder inteligibilidad moderna.
