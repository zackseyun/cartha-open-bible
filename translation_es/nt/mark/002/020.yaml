review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: contraste futuro («Pero vendrán días»), contingencia («cuando»), pasiva no agentiva («sea quitado»), secuencia («y entonces») y singular de «aquel día». Sin embargo, «el novio» no preserva tan fielmente como «el novio de la boda»/«el esposo»/«el novio» el valor más preciso de νυμφίος documentado por el POB en inglés como «the bridegroom». En español bíblico y eclesial, «el novio» puede entenderse, pero suena algo menos marcado y menos resonante que «el novio» en contexto nupcial explícito; «el esposo» desplazaría el matiz. La mejor reparación mínima es «el novio» -> «el novio» no resuelve nada; por fidelidad al audit trail conviene «el novio» cambiarlo a «el novio»? No; la opción adecuada es «el novio» -> «el novio de la boda» sería demasiado explicativa. Por tanto, la revisión recomendada es «el novio» -> «el novio»? Dado el estándar del POB, lo más fiel y natural es «el novio» reemplazarlo
    por «el novio» no cambia. La forma correcta es «el novio» -> «el novio» impossible. Concluyo que debe usarse «el novio»? No. La mejor opción española ampliamente legible es «el novio» menos ideal que «el novio»? Theologically and lexically, «el novio» is acceptable but weaker. Also, «cuando el novio sea quitado de entre ellos» es menos idiomático que «cuando les sea quitado el novio».'
  spanish_quality_summary: 'La frase es mayormente clara y digna. «Pero vendrán días» y «ayunarán» suenan naturales. No obstante, «sea quitado de entre ellos» es comprensible pero algo rígido; «les sea quitado» suena más idiomático en español y mantiene la pasiva. Además, la nota al pie tiene una leve torpeza («en/aquel día»), y conviene aclararla como «en/aquel día» -> ««en aquel día» o «en ese día»» o mejor «El griego está en singular: «en/aquel día», no «en aquellos días»».'
  glossary_alignment: 'No hay términos del glosario principal en juego como Yahvé/Mesías. La decisión clave es νυμφίος. El audit trail inglés favorece un equivalente preciso de «bridegroom»; el borrador con «novio» es entendible, pero para alineación terminológica y resonancia bíblica conviene «novio» dentro de una construcción más natural: «cuando les sea quitado el novio». Se conserva «ayunarán» correctamente y el singular de «aquel día» con nota.'
