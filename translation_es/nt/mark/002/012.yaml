translation:
  language: es
  text: 'Y se levantó[a], y enseguida tomó la camilla y salió delante de todos, de modo que todos quedaron asombrados y glorificaron a Dios, diciendo: «Nunca hemos visto nada así»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue levantado». En este contexto de sanidad, la frase se entiende como que el hombre se puso en pie; no se expresa aquí una referencia a resurrección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγέρθη
  english_pob_choice: he got up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso en pie
  - se alzó
  lexicon: BDAG
  rationale: En este relato de sanidad, el aoristo pasivo/intransitivo se entiende naturalmente como la acción de ponerse de pie en respuesta a la orden de Jesús. «Se levantó» comunica ese sentido de manera idiomática y evita introducir aquí una lectura de resurrección no destacada por el contexto inmediato.
- source_word: εὐθύς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: La secuencia narrativa de Marcos pide una expresión clara de inmediatez. «Enseguida» es natural en español y conserva el ritmo urgente del texto.
- source_word: ἄρας
  english_pob_choice: picked up
  chosen_spanish: tomó
  alternatives_spanish:
  - levantó
  - alzó
  lexicon: BDAG
  rationale: El participio de αἴρω aquí describe que el hombre recoge o toma la camilla para llevarla. «Tomó» resulta fluido en español y no fuerza una imagen más pesada que la del griego.
- source_word: κράβαττον
  english_pob_choice: the mat
  chosen_spanish: la camilla
  alternatives_spanish:
  - el lecho
  - la estera
  - el camastro
  lexicon: BDAG
  rationale: El término designa un lecho simple, portátil. En este contexto narrativo, «camilla» comunica bien el objeto que el hombre llevaba; «lecho» o «camastro» serían posibles, pero menos naturales para el lector actual.
- source_word: ἔμπροσθεν πάντων
  english_pob_choice: before them all
  chosen_spanish: delante de todos
  alternatives_spanish:
  - ante todos
  - en presencia de todos
  lexicon: BDAG
  rationale: La frase subraya la visibilidad pública del milagro. «Delante de todos» es una rendición clara y solemne en español, equivalente al valor público de la expresión griega.
- source_word: ἐξίστασθαι πάντας
  english_pob_choice: they were all amazed
  chosen_spanish: todos quedaron asombrados
  alternatives_spanish:
  - todos se asombraron
  - todos quedaron atónitos
  lexicon: BDAG
  rationale: El infinitivo medio/pasivo expresa asombro intenso. «Quedaron asombrados» comunica bien el impacto repentino y evita una formulación demasiado coloquial.
- source_word: δοξάζειν τὸν θεόν
  english_pob_choice: glorified God
  chosen_spanish: glorificaron a Dios
  alternatives_spanish:
  - dieron gloria a Dios
  - alabaron a Dios
  lexicon: BDAG
  rationale: «Glorificar a Dios» preserva la dicción bíblica de δοξάζω sin rebajarla a un mero «alabar». Mantiene la respuesta dirigida a Dios con el peso teológico del verbo.
- source_word: Οὕτως οὐδέποτε εἴδομεν
  english_pob_choice: We have never seen anything like this
  chosen_spanish: ¡Nunca habíamos visto algo así!
  alternatives_spanish:
  - ¡Nunca vimos algo así!
  - ¡Jamás habíamos visto tal cosa!
  lexicon: BDAG
  rationale: El griego es idiomático y literalmente expresa algo como «Así nunca vimos». En español, «Nunca habíamos visto algo así» transmite mejor la idea de experiencia sin precedentes, que es precisamente la fuerza del original y la nota auditada en inglés.
theological_decisions:
- issue: Posible resonancia de resurrección en ἠγέρθη
  english_pob_reading: Rendered as 'he got up' in the immediate healing context
  chosen_spanish_reading: «se levantó» en el contexto inmediato de sanidad
  alternative_spanish_readings:
  - «fue levantado»
  - «se alzó»
  rationale: Aunque ἐγείρω puede tener connotaciones de resurrección en otros pasajes, aquí el contexto narra al paralítico obedeciendo la orden de Jesús. Por eso se evita una formulación que sugiera resurrección y se mantiene el sentido físico inmediato.
  doctrine_reference: Philosophy §1, §3; cf. uso contextual de ἐγείρω en narrativas de curación
- issue: Respuesta pública de la multitud
  english_pob_reading: they were all amazed and glorified God
  chosen_spanish_reading: «todos quedaron asombrados y glorificaron a Dios»
  alternative_spanish_readings:
  - «todos se admiraron y alabaron a Dios»
  - «todos quedaron atónitos y dieron gloria a Dios»
  rationale: 'La doble reacción debe conservarse: asombro y doxología. «Glorificaron a Dios» mantiene una respuesta teológica más fuerte que una simple admiración humana, en línea con el valor del griego.'
  doctrine_reference: Respuesta humana adecuada ante la obra manifiesta de Dios
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste final del audit trail inglés que prefirió una formulación más formal para ἔμπροσθεν πάντων («before them all»). En español se optó por «delante de todos», que mantiene la visibilidad pública del milagro con registro natural y digno. También se mantuvo la decisión inglesa de evitar una lectura resurreccional de ἠγέρθη y de reproducir el carácter idiomático de la última cláusula.
  spanish_consistency_notes:
  - Se conserva «Dios» como traducción de τὸν θεόν, sin artículo visible en español.
  - Se mantuvo la secuencia aspectual del griego con una narración fluida en pretérito perfecto simple y perífrasis de inmediatez.
  - «Camilla» se eligió por claridad contemporánea, aunque el objeto es más bien un lecho portátil; la nota[a] resguarda la alternativa más literal.
