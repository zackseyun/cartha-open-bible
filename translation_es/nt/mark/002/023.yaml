translation:
  language: es
  text: Y sucedió que, un sábado, él iba pasando por los sembrados[a], y sus discípulos comenzaron a abrirse paso[b], arrancando las espigas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los campos de grano» o «por el grano en pie».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «comenzaron a hacer camino»; es un giro idiomático que aquí significa que avanzaban por el campo mientras arrancaban las espigas.
    reason: lexical_alternative
  - marker: c
    text: O «las cabezas de grano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: it happened
  chosen_spanish: Y sucedió que
  alternatives_spanish:
  - Y aconteció que
  - Y pasó que
  lexicon: BDAG
  rationale: La fórmula narrativa pide en español una apertura natural que conserve el valor introductorio del aoristo sin sonar arcaica. «Sucedió que» reproduce bien el giro eventivo y encaja con el estilo bíblico moderno.
- source_word: ἐν τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - en el sábado
  - durante el sábado
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en koiné funciona idiomáticamente como singular en este contexto. En español, «en sábado» expresa con naturalidad el día señalado sin imponer una forma más pesada.
- source_word: παραπορεύεσθαι
  english_pob_choice: was passing through
  chosen_spanish: iba pasando
  alternatives_spanish:
  - pasaba por
  - iba atravesando
  lexicon: BDAG
  rationale: El infinitivo con αὐτόν después de ἐγένετο describe la acción en curso. «Iba pasando» mantiene el movimiento continuo y el matiz procesual mejor que un perfecto simple.
- source_word: διὰ τῶν σπορίμων
  english_pob_choice: through the grainfields
  chosen_spanish: por los sembrados
  alternatives_spanish:
  - por los campos de grano
  - por los sembradíos
  lexicon: BDAG
  rationale: σπόριμος puede referirse a terreno sembrado o a campos de grano. «Sembrados» es claro, natural y suficientemente cercano al valor agrícola del término sin sobredetallar el tipo exacto de cultivo.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: Es el equivalente narrativo normal de ἄρχομαι con infinitivo complementario. «Comenzaron» conserva el inicio de la acción sin cargar el estilo.
- source_word: ὁδὸν ποιεῖν
  english_pob_choice: to make their way
  chosen_spanish: a ir abriendo camino
  alternatives_spanish:
  - a hacerse paso
  - a abrirse paso
  lexicon: BDAG
  rationale: El giro es idiomático y no describe construcción literal de un camino. En español, «ir abriendo camino» conserva la idea de avanzar atravesando el campo mientras ocurre la acción siguiente.
- source_word: τίλλοντες
  english_pob_choice: plucking
  chosen_spanish: arrancando
  alternatives_spanish:
  - desgranando
  - pellizcando
  lexicon: BDAG
  rationale: τίλλω significa arrancar o desprender con la mano. «Arrancando» comunica la acción manual directa sobre las espigas con buena naturalidad en español.
- source_word: τοὺς στάχυας
  english_pob_choice: the heads of grain
  chosen_spanish: las espigas
  alternatives_spanish:
  - las espigas de grano
  - las mazorcas
  lexicon: BDAG
  rationale: στάχυς designa la espiga o espiga/espiga de cereal. «Espigas» es el término español más preciso y natural; evita una explicación más larga y mantiene la imagen agrícola.
- source_word: αὐτὸν
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - Jesús
  lexicon: BDAG
  rationale: La construcción exige en español un sujeto nominativo explícito. El antecedente inmediato es Jesús, pero el pronombre mantiene la forma sobria del relato y respeta la referencia del griego.
theological_decisions:
- issue: Sabbath terminology
  english_pob_reading: on the Sabbath
  chosen_spanish_reading: en sábado
  alternative_spanish_readings:
  - en el sábado
  rationale: La forma plural griega no introduce una diferencia doctrinal aquí; es un plural idiomático. En español, «en sábado» sitúa correctamente la escena en el día de reposo sin oscurecer el contexto de controversia.
  doctrine_reference: Uso idiomático del plural en koiné; consistencia narrativa
- issue: Idiomatic force of ὁδὸν ποιεῖν
  english_pob_reading: to make their way
  chosen_spanish_reading: a ir abriendo camino
  alternative_spanish_readings:
  - a abrirse paso
  rationale: La traducción evita sugerir que los discípulos estuvieran construyendo un camino físico. El sentido es que avanzaban por el campo mientras arrancaban espigas, preparando el escenario del conflicto sabático.
  doctrine_reference: Fidelidad idiomática al griego; claridad narrativa
- issue: Agricultural imagery
  english_pob_reading: grainfields / heads of grain
  chosen_spanish_reading: sembrados / espigas
  alternative_spanish_readings:
  - campos de grano / espigas de grano
  rationale: La imagen agrícola debe sonar natural en español y permanecer suficientemente abierta para el contexto. «Sembrados» y «espigas» conservan el referente sin forzar tecnicismos innecesarios.
  doctrine_reference: Claridad semántica y adecuación de registro
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés y conserva sus decisiones clave: fórmula narrativa introductoria, singular idiomático para el sábado, valor procesual de la perífrasis de movimiento, sentido idiomático de ὁδὸν ποιεῖν, y la imagen agrícola de espigas/grano. No se detectaron cambios de última revisión que obliguen a ajustar el español.'
  spanish_consistency_notes:
  - Se mantiene «Y sucedió que» para la fórmula narrativa introductoria, en línea con un estilo bíblico moderno y legible.
  - Se usa «en sábado» como equivalente idiomático del plural griego sin introducir una lectura doctrinal distinta.
  - Se conserva la diferencia entre el movimiento continuo («iba pasando») y la acción simultánea («arrancando»).
  - Se evita «Cristo» porque el versículo no lo requiere; el referente pronominal se deja implícito como en el relato griego.
  - Se prefiere vocabulario agrícola transparente («sembrados», «espigas») para que el lector perciba la escena con claridad.
