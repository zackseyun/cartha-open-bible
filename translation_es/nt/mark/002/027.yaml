translation:
  language: es
  text: 'Y les decía[a]: «El sábado fue hecho para el hombre, y no el hombre para el sábado».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para la humanidad» / «para el ser humano». El griego usa ἄνθρωπος en singular de manera representativa para las personas en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción de decir en curso o repetida; «les decía» conserva mejor ese matiz que el pretérito simple «les dijo», sin sonar forzado en español.
- source_word: σάββατον
  english_pob_choice: Sabbath
  chosen_spanish: el sábado
  alternatives_spanish:
  - el día de reposo
  - el Sabbat
  lexicon: BDAG
  rationale: En español bíblico, «sábado» comunica de forma natural la institución/día del reposo aquí aludido. Se evita una expansión interpretativa como «día de reposo».
- source_word: διὰ τὸν ἄνθρωπον
  english_pob_choice: for man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - para la humanidad
  - para el ser humano
  - por causa del hombre
  lexicon: BDAG
  rationale: διά con acusativo indica finalidad o beneficio. Se mantiene «el hombre» porque el singular ἄνθρωπος funciona representativamente, en paralelo con la cláusula final.
- source_word: ἐγένετο
  english_pob_choice: came into being
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - fue hecho
  - vino a existir
  lexicon: BDAG
  rationale: γίνομαι puede expresar llegar a ser, ser hecho o venir a existir. «Llegó a ser» evita restringir el verbo a una fabricación puntual y conserva el sentido de origen/propósito de la institución.
- source_word: οὐχ ὁ ἄνθρωπος διὰ τὸ σάββατον
  english_pob_choice: and not man for the Sabbath
  chosen_spanish: y no el hombre para el sábado
  alternatives_spanish:
  - y no la humanidad para el sábado
  - y no el ser humano para el sábado
  lexicon: BDAG
  rationale: La cláusula es antitética y elíptica. Se preserva la simetría con la primera mitad y el valor representativo del singular masculino ἄνθρωπος.
theological_decisions:
- issue: Uso representativo de ἄνθρωπος en una afirmación general
  english_pob_reading: Render as 'man' in the main text, with an inclusive alternative footnoted.
  chosen_spanish_reading: Mantener «el hombre» en el texto principal.
  alternative_spanish_readings:
  - la humanidad
  - el ser humano
  rationale: El dicho establece un principio general sobre el propósito del sábado para los seres humanos. La forma singular masculina del griego se conserva para no aplanar el paralelismo retórico ni borrar la tensión lexical documentada.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: No se introdujeron cambios textuales respecto del contexto inglés salvo la adaptación natural al español y la recuperación del valor representativo de ἄνθρωπος en una nota. La nota se ancla explícitamente en [a] para cumplir la validación.
  spanish_consistency_notes:
  - Se mantuvo la simetría sintáctica entre ambas mitades del dicho.
  - «sábado» se usa como equivalente natural de σάββατον en este contexto.
  - Se preservó el masculino singular representativo «el hombre» en el texto principal y se aclaró su alcance inclusivo en la nota.
  - El imperfecto se reflejó con «decía» para conservar el aspecto durativo/reiterativo.
