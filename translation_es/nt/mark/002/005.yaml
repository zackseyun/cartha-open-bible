translation:
  language: es
  text: 'Y al ver Jesús la fe de ellos, dice al paralítico: «Niño[a], tus pecados son perdonados».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Hijo»; griego τέκνον, un vocativo afectuoso que significa «niño» o «hijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - al ver
  - cuando vio
  lexicon: BDAG
  rationale: El participio aoristo de ὁράω se mantiene como acción concomitante en español con «viendo», que conserva la relación con el verbo principal sin sobreexplicar la secuencia narrativa.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: «Fe» es el equivalente normal y preciso de πίστις en este contexto; aquí se refiere a la confianza evidente del grupo que trae al paralítico a Jesús.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: de ellos
  alternatives_spanish:
  - su
  - de la gente
  lexicon: BDAG
  rationale: El genitivo plural se expresa de forma natural con «de ellos», conservando que la fe pertenece al grupo presente.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  - está diciendo
  lexicon: BDAG
  rationale: El presente histórico del griego se conserva bien con «dice», que mantiene la viveza narrativa del relato de Marcos.
- source_word: παραλυτικῷ
  english_pob_choice: the paralyzed man
  chosen_spanish: al paralítico
  alternatives_spanish:
  - al hombre paralítico
  - al hombre postrado
  lexicon: BDAG
  rationale: El adjetivo sustantivado se vierte con el sustantivo español breve y natural «el paralítico», que reproduce el referente sin añadir información no presente en el griego.
- source_word: Τέκνον
  english_pob_choice: Child
  chosen_spanish: Hijo[a]
  alternatives_spanish:
  - Hijo mío
  - Niño
  lexicon: BDAG
  rationale: El término de cariño τέκνον permite «Hijo» como vocativo tradicional y comprensible en español; se conserva la tensión entre el valor afectivo general («child») y una posible lectura vocativa más específica mediante nota.
- source_word: ἀφίενταί σου αἱ ἁμαρτίαι
  english_pob_choice: your sins are forgiven
  chosen_spanish: tus pecados son perdonados
  alternatives_spanish:
  - tus pecados han sido perdonados
  - tus pecados están perdonados
  lexicon: BDAG
  rationale: 'La pasiva presente se traduce de manera directa como estado/acción declarada en presente: «son perdonados». Esto preserva la fuerza declarativa sin añadir mecanismo ni matiz temporal ajeno al texto.'
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: «Pecados» es la equivalencia estándar y adecuada para ἁμαρτίαι; mantiene el plural y la carga moral-teológica del término.
theological_decisions:
- issue: Forma de la declaración de perdón
  english_pob_reading: 'Render as a direct declaration: ''your sins are forgiven'''
  chosen_spanish_reading: «tus pecados son perdonados» como declaración directa y presente
  alternative_spanish_readings:
  - tus pecados han sido perdonados
  - tus pecados están perdonados
  rationale: La pasiva presente griega presenta el perdón como realidad pronunciada en el momento. La traducción no resuelve el trasfondo teológico del agente del perdón, sino que conserva la declaración tal como aparece en el texto.
  doctrine_reference: Preservar la tensión teológica sin explicitar un mecanismo no dicho por el pasaje.
- issue: Sentido de τέκνον
  english_pob_reading: Or “Son”; Greek τέκνον, a tender address meaning “child.”
  chosen_spanish_reading: «Hijo[a]» con nota sobre el matiz afectivo de τέκνον
  alternative_spanish_readings:
  - hijo
  - niño
  - hijo mío
  rationale: El griego permite un vocativo afectuoso de parentesco o cercanía; en español, «Hijo» comunica cercanía y puede sonar natural en la escena, mientras la nota preserva el matiz más amplio de «child» y la posible alternativa tradicional «Son».
  doctrine_reference: Mantener el valor afectivo del vocativo sin forzar una lectura exclusivamente filial o masculina.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el paquete fuente griego y el audit trail inglés: conserva el participio con valor concomitante («viendo»), el presente histórico («dice»), el vocativo afectuoso τέκνον y la pasiva presente de perdón sin explicitar más de lo que el griego expresa. No se introdujeron revisiones adicionales respecto al último pase, que quedó sin cambios.'
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς.
  - Se mantiene «fe» para πίστις según el criterio doctrinal del proyecto.
  - Se traduce la pasiva presente con una fórmula directa y no se convierte en perífrasis explicativa.
  - Se evita «SEÑOR» y no hay referencia al nombre divino en este versículo.
  - El vocativo se marca con nota para conservar la tensión entre «hijo» y el matiz tierno de τέκνον.
