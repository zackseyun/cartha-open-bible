revisions:
- from: 'Y viendo Jesús la fe de ellos, dice al paralítico: «Hijo[a], tus pecados son perdonados».'
  to: 'Y al ver Jesús la fe de ellos, dice al paralítico: «Niño[a], tus pecados son perdonados».'
  rationale: Se ajusta Τέκνον para reflejar mejor la decisión léxica documentada en el English POB, manteniendo «Hijo» como alternativa en nota. También se mejora la naturalidad del participio con «al ver» y se corrige el formato del marcador de nota según las reglas del proyecto.
