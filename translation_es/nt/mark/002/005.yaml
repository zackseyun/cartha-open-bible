review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Jesús ve la fe de ellos, se dirige al paralítico y declara el perdón de sus pecados. También conserva adecuadamente el presente histórico «dice» y la declaración directa «tus pecados son perdonados». Sin embargo, el punto principal a corregir es Τέκνον, que el inglés POB fijó como «Child» con nota alternativa «Son». El español principal «Hijo» invierte esa prioridad léxica y añade un matiz masculino/filiativo más fuerte que el griego no exige.'
  spanish_quality_summary: 'El español es claro y legible, pero «Y viendo Jesús...» suena algo más forzado que una formulación natural como «Y al ver Jesús...». Además, el anclaje «Hijo[a]» es impropio: el marcador de nota debe ir fuera de la palabra o frase anclada, y la nota misma no debe repetir como alternativa exactamente la misma palabra del texto principal. Una ligera revisión mejora naturalidad y fidelidad.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Jesús», «fe» y «pecados» están bien. La cuestión clave es τέκνον: por la justificación documentada en el audit trail, el español debería privilegiar «Hijo mío»/«Niño»/«Querido niño» solo si se justificara, pero lo más alineado con la decisión inglesa es una forma no marcada por sexo. En español eclesial amplio, «Hijo» es tradicional, pero aquí requiere relegarse a nota como alternativa, no como texto principal.'
  issues:
  - severity: medium
    issue: Τέκνον se tradujo como «Hijo» en el texto principal.
    rationale: El griego τέκνον significa «niño/hijo» como vocativo afectuoso, y el English POB eligió explícitamente «Child» para evitar especificidad masculina innecesaria. «Hijo» es comprensible, pero no preserva la prioridad léxica documentada.
  - severity: low
    issue: «Y viendo Jesús...» resulta menos natural en español actual.
    rationale: Aunque gramaticalmente posible, «Y al ver Jesús...» o «Y cuando Jesús vio...» fluye mejor y sigue representando el participio sin sobreexplicarlo.
  - severity: low
    issue: El marcador de nota está mal integrado en «Hijo[a]».
    rationale: Según las reglas del proyecto, el marcador debe aparecer en el texto como `[a]` junto a la palabra o frase pertinente, y la nota debe corresponder exactamente a ese anclaje.
  - severity: low
    issue: La nota alternativa no está bien formulada.
    rationale: Dice «O “Hijo”» cuando el texto principal ya usa «Hijo». La nota debe preservar la alternativa significativa y explicar el matiz léxico, no duplicar el texto principal.
  revised_spanish_text: 'Y al ver Jesús la fe de ellos, dice al paralítico: «Niño[a], tus pecados son perdonados».'
  revised_footnotes:
