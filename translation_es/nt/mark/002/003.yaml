translation:
  language: es
  text: Y llegaron[a], trayéndole a un hombre paralítico llevado por cuatro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘por cuatro hombres’; el griego dice simplemente ‘por cuatro’.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción enlaza de forma paratáctica con la escena anterior. En español, ‘Y’ conserva mejor la acumulación narrativa de Marcos que ‘Entonces’, que añade una relación temporal más interpretativa.
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - están viniendo
  lexicon: BDAG
  rationale: El presente histórico griego se vierte naturalmente en pasado simple en español narrativo. ‘Llegaron’ comunica el avance de la escena de manera fluida y sin perder el movimiento hacia Jesús.
- source_word: φέροντες
  english_pob_choice: bringing
  chosen_spanish: trayendo
  alternatives_spanish:
  - llevando
  - cargando
  lexicon: BDAG
  rationale: El participio expresa acción concomitante con ‘llegaron’. ‘Trayendo’ reproduce bien la relación de acompañamiento y encaja con ‘a él’ en español.
- source_word: πρὸς αὐτὸν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  lexicon: BDAG
  rationale: La preposición indica movimiento dirigido a una persona concreta. ‘A él’ es la forma más natural en español para señalar que lo llevan hasta Jesús, sin añadir interpretación extra en el texto principal.
- source_word: παραλυτικὸν
  english_pob_choice: a paralyzed man
  chosen_spanish: a un hombre paralítico
  alternatives_spanish:
  - a un paralítico
  - a un hombre que estaba paralizado
  lexicon: BDAG
  rationale: El adjetivo está sustantivado. ‘Un hombre paralítico’ conserva el valor descriptivo sin reducir la persona a su condición, y resulta claro y digno en español.
- source_word: αἰρόμενον
  english_pob_choice: carried
  chosen_spanish: llevado
  alternatives_spanish:
  - cargado
  - siendo llevado
  lexicon: BDAG
  rationale: El participio pasivo describe al hombre como objeto de la acción de otros. ‘Llevado’ es una forma natural y breve en español; ‘cargado’ podría sonar más mecánico y ‘siendo llevado’ resulta más pesado.
- source_word: ὑπὸ τεσσάρων
  english_pob_choice: by four
  chosen_spanish: por cuatro
  alternatives_spanish:
  - por cuatro hombres
  lexicon: BDAG
  rationale: El griego dice literalmente ‘por cuatro’ sin explicitar ‘hombres’. En el texto principal se conserva la elipsis, como en el inglés POB, para no añadir lo que el griego no expresa de manera directa.
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés están en alto acuerdo. La revisión inglesa reciente solo eliminó una coma por fluidez; en español no se requiere una pausa equivalente. Se preservó la elipsis de ὑπὸ τεσσάρων sin añadir ‘hombres’ al texto principal.
  spanish_consistency_notes:
  - Se mantuvo ‘Y’ para la coordinación narrativa propia de Marcos.
  - Se evitó ‘SEÑOR’ y no había nombre divino en este versículo.
  - Se eligió ‘hombre paralítico’ en lugar de ‘paralítico’ para conservar la referencia personal.
  - Se preservó la elipsis de ‘por cuatro’ y se aclaró en nota.
  - 'La estructura general sigue el movimiento del griego: llegada + acción concomitante + destino + modo de transporte.'
