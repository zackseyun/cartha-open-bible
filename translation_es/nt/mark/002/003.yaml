- from: Y llegaron[a], trayendo a él a un hombre paralítico, llevado por cuatro.
  to: Y llegaron[a], trayéndole a un hombre paralítico llevado por cuatro.
  rationale: Se ajusta únicamente la sintaxis española para evitar un calco poco natural ('trayendo a él' > 'trayéndole') y se elimina la coma innecesaria antes de 'llevado por cuatro'. El resto del contenido, incluida la elipsis de 'por cuatro', se mantiene fiel al griego y al rastro de auditoría inglés.
  reviewer_model: gpt-5.4
