translation:
  language: es
  text: Y al entrar de nuevo en Capernaúm, después de algunos días, se oyó que estaba en casa[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «en la casa».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y
  lexicon: N/A
  rationale: Conserva la simple coordinación narrativa sin sobrecargar el inicio de la cláusula.
- source_word: εἰσελθὼν
  english_pob_choice: when he entered
  chosen_spanish: al entrar
  alternatives_spanish:
  - cuando entró
  - habiendo entrado
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente en español de manera natural; 'al entrar' preserva la secuencia sin forzar una subordinada pesada.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: Mantiene el sentido de retorno/repetición con un adverbio idiomático en español.
- source_word: εἰς Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: en Capernaúm
  alternatives_spanish:
  - a Capernaúm
  lexicon: N/A
  rationale: El movimiento implícito de εἰς se integra naturalmente con 'al entrar en'; el topónimo se translitera según uso estándar en español bíblico.
- source_word: δι’ ἡμερῶν
  english_pob_choice: after some days
  chosen_spanish: después de algunos días
  alternatives_spanish:
  - tras algunos días
  - al cabo de algunos días
  lexicon: BDAG
  rationale: Reproduce el intervalo temporal indefinido de la expresión griega sin concretarlo en exceso.
- source_word: ἠκούσθη
  english_pob_choice: it was heard
  chosen_spanish: se oyó
  alternatives_spanish:
  - se supo
  - se reportó
  lexicon: BDAG
  rationale: La pasiva impersonal se expresa de forma natural en español y conserva el matiz de noticia que circula sin agente explícito.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - que
  lexicon: N/A
  rationale: Introduce la oración de contenido de modo directo y natural en español.
- source_word: ἐν οἴκῳ
  english_pob_choice: at home
  chosen_spanish: en casa
  alternatives_spanish:
  - en la casa
  lexicon: BDAG
  rationale: '''En casa'' es la opción idiomática que mejor comunica el valor contextual elegido por la POB; se mantiene la alternativa más literal en la nota.'
- source_word: ἐστίν
  english_pob_choice: he was
  chosen_spanish: estaba
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: En discurso indirecto español, el imperfecto 'estaba' refleja de manera natural la referencia temporal pasada, equivalente al retroceso temporal que hace la POB en inglés.
theological_decisions:
- issue: 'Valor de ἐν οἴκῳ: ubicación general (''en la casa'') versus sentido idiomático (''en casa'')'
  english_pob_reading: at home
  chosen_spanish_reading: en casa
  alternative_spanish_readings:
  - en la casa
  rationale: La POB opta por un valor idiomático natural en contexto, pero reconoce la lectura más literal. En español, 'en casa' comunica mejor la referencia posible al hogar/base de residencia sin cerrar la ambigüedad del griego.
  doctrine_reference: Translation philosophy §3, preservar tensiones léxicas cuando el contexto no exige resolverlas
translation_notes:
  revision_awareness: Se incorporó la revisión que prefiere una fluidez temporal más natural, manteniendo el intervalo vago ('después de algunos días') y el valor idiomático de ἐν οἴκῳ como 'en casa'.
  spanish_consistency_notes:
  - Se usa 'Capernaúm' como transliteración estándar consistente con el topónimo en español bíblico.
  - La pasiva impersonal 'se oyó' conserva el matiz informativo de ἠκούσθη sin introducir un agente no expresado.
  - No se traduce ἐν οἴκῳ de manera rígida como 'en la casa' en el texto principal para respetar la decisión contextual documentada por la POB.
