translation:
  language: es
  text: 'Y los fariseos le decían: «Mira, ¿por qué hacen[a] en sábado lo que no está permitido?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «¿qué hacen en sábado que no está permitido?». El griego puede leerse con τί como «qué», aunque en contexto el sentido probablemente sea «por qué».
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: Conector narrativo simple; «Y» mantiene el flujo del relato sin añadir matiz temporal no explícito en el griego.
- source_word: οἱ Φαρισαῖοι
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - los fariseos
  lexicon: BDAG
  rationale: Nombre de grupo transliterado de forma estable; el artículo plural natural en español conserva la referencia definida.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: le decían
  alternatives_spanish:
  - decían
  - seguían diciéndole
  lexicon: BDAG
  rationale: El imperfecto indica habla en curso o repetida. En español, «le decían» conserva ese valor aspectual de manera natural y evita una simpleza excesiva de pretérito perfecto simple.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Dativo indirecto natural en español clítico; el referente es Jesús.
- source_word: Ἴδε
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Ve
  lexicon: BDAG
  rationale: Imperativo de atención. «Mira» es idiomático y transmite el llamado directo sin arcaísmo.
- source_word: τί
  english_pob_choice: why
  chosen_spanish: qué
  alternatives_spanish:
  - por qué
  lexicon: BDAG
  rationale: 'Se preserva la ambigüedad del griego: formalmente τί puede ser «qué», aunque en contexto la queja probablemente funcione como «por qué». El texto principal mantiene «qué» para no resolver la tensión lexical de modo demasiado interpretativo.'
- source_word: ποιοῦσιν
  english_pob_choice: are they doing
  chosen_spanish: hacen
  alternatives_spanish:
  - están haciendo
  - van haciendo
  lexicon: BDAG
  rationale: El presente griego en discurso directo puede expresarse de forma natural en español con presente simple. Aquí se integra con τί sin forzar una perífrasis innecesaria.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en el sábado
  alternatives_spanish:
  - en el día de reposo
  - en los sábados
  lexicon: BDAG
  rationale: El plural griego funciona como un semitismo para el día de reposo singular. Se opta por «en el sábado» como forma breve y comprensible, manteniendo la referencia cultual sin introducir «día de reposo» como glosa interpretativa principal.
- source_word: ὃ οὐκ ἔξεστιν
  english_pob_choice: what is not permitted
  chosen_spanish: lo que no está permitido
  alternatives_spanish:
  - lo que no es lícito
  - lo que no se permite
  lexicon: BDAG
  rationale: ἔξεστιν expresa permiso/licitud. «No está permitido» preserva la fuerza legal/religiosa del reproche en español actual sin volverlo excesivamente técnico.
theological_decisions:
- issue: 'Ambigüedad de τί: «qué» o «por qué»'
  english_pob_reading: The Greek can be read with τί as “what,” though the sense in context is likely “why.”
  chosen_spanish_reading: Mantener «qué» en el texto principal y anotar la lectura contextual «por qué» como alternativa.
  alternative_spanish_readings:
  - ¿por qué hacen...?
  rationale: La POB inglesa preserva la tensión entre forma y sentido. En español, «qué» mantiene la literalidad del interrogativo griego; la opción contextual «por qué» queda abierta sin cerrarla en el cuerpo principal.
  doctrine_reference: Preservar la tensión léxica/documental sin resolverla artificialmente.
- issue: Naturaleza de la objeción sobre el sábado
  english_pob_reading: what is not permitted on the Sabbath
  chosen_spanish_reading: «lo que no está permitido en el sábado» sin especificar si la prohibición procede de la Ley bíblica, tradición farisea o interpretación halájica.
  alternative_spanish_readings:
  - lo que no es lícito en el sábado
  - lo que no se permite en el sábado
  rationale: El griego solo afirma falta de permiso. La traducción debe conservar el carácter legal-religioso de la acusación sin imponer una resolución doctrinal o histórica que el versículo no explicita.
  doctrine_reference: Mantener la tensión teológica y contextual del texto.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión auditada del inglés, que reordenó la cláusula para hacerla más natural y mantuvo el imperfecto («were saying»). En español se conservó el valor imperfectivo con «decían» y se colocó la cláusula de restricción legal de forma natural al final: «lo que no está permitido».'
  spanish_consistency_notes:
  - Se mantuvo «fariseos» como transliteración estable y no se sustituyó por un equivalente interpretativo.
  - Se prefirió «sábado» como equivalente idiomático de σάββατον en este contexto; no se introdujo «sábados».
  - Se conservó el matiz legal de ἔξεστιν con «está permitido», evitando «lícito» en el texto principal por estilo, aunque queda como alternativa válida.
  - El pronombre indirecto «le» refleja directamente αὐτῷ y mantiene la naturalidad del español.
  - La puntuación con comillas angulares respeta la cita directa en estilo editorial claro y moderno.
