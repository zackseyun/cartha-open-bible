    text: O, «¿qué hacen en sábado que no está permitido?». El griego puede leerse con τί como «qué», aunque en contexto el sentido probablemente sea «por qué».
    reason: alternative_reading
  revision_rationale: Se revisa para reflejar la decisión principal auditada por la POB inglesa sobre τί («por qué» en el texto, «qué» en nota), corregir una construcción española poco natural y usar una expresión más idiomática para τοῖς σάββασιν («en sábado»). Se conserva «le decían» por el imperfecto y «lo que no está permitido» por la fuerza legal-religiosa de ὃ οὐκ ἔξεστιν.
