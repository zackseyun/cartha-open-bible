review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: conector narrativo, imperfecto («le decían»), vocativo de atención («Mira»), referencia al sábado y fuerza de permisibilidad en «lo que no está permitido». Sin embargo, la formulación principal en español con «¿qué hacen … lo que no está permitido?» resulta sintácticamente poco natural y no comunica bien la relación entre τί y ὃ οὐκ ἔξεστιν. Además, la nota invierte indebidamente la relación auditada en inglés: la POB inglesa adopta «why» en el texto principal y conserva «what» como alternativa, mientras que el borrador español pone «qué» en el texto principal. También «en el sábado» suena menos idiomático que «en sábado» o «en el día de descanso».'
  spanish_quality_summary: La redacción actual es comprensible pero torpe en español. «¿Qué hacen en el sábado lo que no está permitido?» no es una pregunta natural; en español eclesial general se esperaría «¿por qué hacen …?» o, si se preserva la alternativa formal, «¿qué hacen … que no está permitido?». También conviene mejorar «en el sábado» a «en sábado», que es más idiomático y ampliamente entendible. El resto del registro y tono son adecuados.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «fariseos», «sábado» y «permitido»/«lícito» encajan bien. La mejor alineación con el rastro de auditoría POB es usar en el texto principal «¿por qué…?» con una nota que preserve la alternativa «¿qué…?», y mantener la acusación en términos de permisibilidad sin especificar la fuente legal.
  issues:
  - severity: high
    issue: La pregunta principal en español es poco natural y semánticamente defectuosa
    rationale: «¿Qué hacen … lo que no está permitido?» no expresa con claridad la queja de los fariseos; en español parece faltar un nexo o una estructura distinta. El griego y la POB auditada comunican una objeción del tipo «¿por qué hacen lo no permitido en sábado?».
  - severity: high
    issue: La decisión principal sobre τί no sigue la auditoría inglesa
    rationale: La POB inglesa adoptó «why» en el texto principal y dejó «what» en nota como alternativa léxica. El borrador español hizo lo contrario sin una razón suficiente, y eso debilita la fidelidad al expediente auditado.
  - severity: medium
    issue: «en el sábado» suena poco idiomático en español general
    rationale: Aunque comprensible, la expresión más natural es «en sábado» o «en el sábado» solo en contextos más marcados. Aquí «en sábado» preserva bien el sentido adverbial de τοῖς σάββασιν.
  revised_spanish_text: 'Y los fariseos le decían: «Mira, ¿por qué hacen[a] en sábado lo que no está permitido?»'
  revised_footnotes:
