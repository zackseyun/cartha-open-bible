  - severity: medium
    issue: «estaban recostados con Jesús» no expresa bien la asociación de mesa
    rationale: συνανέκειντο incluye la idea de compartir la mesa/reclinarse juntos. En español, añadir «a la mesa» mejora claridad y fidelidad semántica sin caer en paráfrasis interpretativa como «comiendo con».
  - severity: low
