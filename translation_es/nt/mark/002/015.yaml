translation:
  language: es
  text: Y sucedió que él estaba reclinado a la mesa en su casa[a], y muchos recaudadores de impuestos y pecadores estaban reclinados a la mesa con Jesús y sus discípulos, pues eran muchos y lo seguían.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la casa de Leví»; algunos entienden «en la casa de Jesús». El griego dice solo «en su casa».
    reason: alternative_reading
lexical_decisions:
- source_word: γίνεται
  english_pob_choice: it happened
  chosen_spanish: y sucedió que
  alternatives_spanish:
  - y aconteció que
  - y pasó que
  lexicon: SBLGNT / BDAG
  rationale: El presente histórico griego se vierte con un pasado narrativo natural en español. «Sucedió que» conserva el valor de avance narrativo sin sonar mecánico.
- source_word: κατακεῖσθαι
  english_pob_choice: was reclining at table
  chosen_spanish: estaba recostado a la mesa
  alternatives_spanish:
  - estaba recostado
  - estaba reclinado a la mesa
  lexicon: BDAG
  rationale: La imagen es la postura de comer recostado. «A la mesa» explicita el contexto de comida; «recostado» conserva la postura sin imponer una paráfrasis demasiado libre.
- source_word: ἐν τῇ οἰκίᾳ αὐτοῦ
  english_pob_choice: in his house
  chosen_spanish: en su casa
  alternatives_spanish:
  - en su casa misma
  - en la casa de él
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del posesivo del griego, sin resolver en el texto principal si la casa es de Leví o de Jesús.
- source_word: τελῶναι
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - cobradores de impuestos
  - publicanos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» es claro y actual en español. Se evita «publicanos» por ser más eclesiástico/tradicional y menos transparente para lectores modernos.
- source_word: ἁμαρτωλοὶ
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - gente pecadora
  - personas pecadoras
  lexicon: BDAG
  rationale: La etiqueta del texto es directa; «pecadores» conserva esa designación sin suavizarla en una perífrasis.
- source_word: συνανέκειντο
  english_pob_choice: were reclining with
  chosen_spanish: estaban recostados con
  alternatives_spanish:
  - estaban comiendo con
  - estaban sentados a la mesa con
  lexicon: BDAG
  rationale: Se conserva la misma imagen de comer recostados y la asociación implícita del verbo compuesto, evitando convertirlo en una mera idea de convivencia.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesucristo
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico.
- source_word: μαθηταῖς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» mantiene el sentido relacional y de aprendizaje propio del término en el NT.
- source_word: ἦσαν γὰρ πολλοὶ
  english_pob_choice: for there were many
  chosen_spanish: porque eran muchos
  alternatives_spanish:
  - pues eran muchos
  - porque había muchos
  lexicon: BDAG
  rationale: El griego explica la escena con una cláusula causal. «Porque eran muchos» reproduce esa causalidad de forma natural en español.
- source_word: ἠκολούθουν αὐτῷ
  english_pob_choice: they were following him
  chosen_spanish: y lo seguían
  alternatives_spanish:
  - y lo estaban siguiendo
  - y le seguían
  lexicon: BDAG
  rationale: El imperfecto comunica acción continua o habitual. «Lo seguían» mantiene esa duración sin sobrecargar el verso con una perífrasis más pesada.
theological_decisions:
- issue: Ambigüedad del antecedente de «su» en «su casa»
  english_pob_reading: Left as 'his house' without specifying the owner in the main text.
  chosen_spanish_reading: Se deja «su casa» sin identificar al dueño en el texto principal.
  alternative_spanish_readings:
  - la casa de Leví
  - la casa de Jesús
  rationale: El griego presenta la misma ambigüedad que el inglés auditado. Mantenerla en español preserva la tensión interpretativa documentada en la tradición textual y evita resolverla por cuenta propia.
  doctrine_reference: Preservar la ambigüedad textual cuando el original no la resuelve.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final coincide con el texto auditado de alta concordancia, sin revisiones aplicadas.
  spanish_consistency_notes:
  - Se mantiene «Jesús» y «discípulos» como formas estándar y consistentes.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni una cita directa del Tetragrámaton.
  - Se conserva la imagen de recostarse a la mesa en lugar de simplificarla a «comer», para no perder el matiz del verbo griego.
  - «Recaudadores de impuestos» y «pecadores» se usan de manera directa, siguiendo la fuerza lexical del griego.
