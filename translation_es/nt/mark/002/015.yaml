revisions:
- from: Y sucedió que estaba recostado a la mesa en su casa[a], y muchos recaudadores de impuestos y pecadores estaban recostados con Jesús y sus discípulos, porque eran muchos, y lo seguían.
  to: Y sucedió que él estaba reclinado a la mesa en su casa[a], y muchos recaudadores de impuestos y pecadores estaban reclinados a la mesa con Jesús y sus discípulos, pues eran muchos y lo seguían.
  rationale: Se propone una revisión menor para mejorar la naturalidad y precisión del español en la escena de comida. «Reclinado a la mesa» y «reclinados a la mesa con Jesús» preservan mejor la imagen de κατακεῖσθαι / συνανέκειντο que «recostado». La ambigüedad de «su casa» y la nota correspondiente se mantienen intactas. El cambio de «porque» a «pues» solo suaviza el estilo sin alterar el sentido.
  reviewer_model: gpt-5.4
