translation:
  language: es
  text: De modo que el Hijo del Hombre es señor[a] aun del sábado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por tanto, el Hijo del Hombre es señor también del sábado». La conjunción griega puede traducirse simplemente «y/también», pero aquí probablemente tiene sentido ascendente, «aun/e incluso», para destacar el alcance de su autoridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: De modo que
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: ὥστε introduce una conclusión a partir del argumento anterior. «De modo que» conserva el valor inferencial en un español natural y sobrio, sin sonar demasiado técnico.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: κύριος aquí expresa autoridad soberana; «Señor» mantiene esa fuerza cristológica en español y coincide con el uso eclesial más claro, mientras que «amo» o «dueño» rebajarían el tono del enunciado.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el ser humano
  - el hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional porque funciona como auto-designación de Jesús y mantiene su resonancia teológica e intertextual; una traducción más explicativa borraría esa tensión.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - también
  - y
  lexicon: BDAG
  rationale: 'En este contexto καὶ es ascendente: no solo «y» o «también», sino «aun/e incluso», subrayando el alcance sorprendente de la autoridad del Hijo del Hombre.'
- source_word: τοῦ σαββάτου
  english_pob_choice: the Sabbath
  chosen_spanish: del sábado
  alternatives_spanish:
  - del día de reposo
  - del reposo
  lexicon: BDAG
  rationale: «Sábado» es la forma natural y precisa en español para la institución aquí en disputa. «Día de reposo» explicita la función, pero puede sonar menos directo y más interpretativo.
theological_decisions:
- issue: Alcance de la autoridad de Jesús sobre el sábado
  english_pob_reading: Render the statement straightforwardly as a claim that the Son of Man is Lord over the Sabbath.
  chosen_spanish_reading: La frase se traduce como una afirmación directa de señorío sobre el sábado, sin suavizarla a mera competencia o permiso.
  alternative_spanish_readings:
  - tiene autoridad respecto al sábado
  - está por encima del sábado
  rationale: El predicado «Señor» comunica con mayor fidelidad la fuerza del griego κύριος. Atenuarlo perdería el peso de la afirmación en el contexto de la controversia sabática.
  doctrine_reference: Affirmations; Contested terms table for κύριος
- issue: Referencia y conservación del título 'Hijo del Hombre'
  english_pob_reading: Retain 'the Son of Man' as Jesus' title rather than paraphrasing it generically.
  chosen_spanish_reading: Se conserva «el Hijo del Hombre» como título, no como simple «ser humano».
  alternative_spanish_readings:
  - el hombre
  - el humano
  rationale: En Marcos, la expresión no se reduce a una designación genérica; preservarla mantiene la tensión teológica y la posible resonancia daniélica señalada en el audit trail inglés.
  doctrine_reference: Translation philosophy §3; §4
translation_notes:
  revision_awareness: Se siguió el último pase de revisión, que marcó el texto como sin cambios necesarios y con alto grado de acuerdo; por eso no se introducen variantes textuales adicionales ni se amplía el alcance exegético más allá del griego y del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título fijo en español para coherencia con el proyecto.
  - «Señor» se conserva en mayúscula inicial por su fuerza cristológica, acorde con el uso del inglés POB.
  - «sábado» se deja en minúscula por norma ortográfica en español cuando no inicia frase.
