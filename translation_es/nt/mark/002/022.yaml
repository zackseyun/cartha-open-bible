translation:
  language: es
  text: Y nadie pone vino nuevo en odres viejos; si no, el vino romperá los odres, y el vino se pierde[a], y también los odres. Pero el vino nuevo es para odres nuevos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se arruina».
    reason: lexical_alternative
  - marker: b
    text: Griego «odres nuevos»; se traduce «odres nuevos» en el texto principal por naturalidad en español, aunque καινούς resalta una cualidad nueva o fresca en contraste con «viejos».
    reason: lexical_alternative
lexical_decisions:
- source_word: βάλλει
  english_pob_choice: puts
  chosen_spanish: pone
  alternatives_spanish:
  - echa
  - mete
  lexicon: BDAG
  rationale: En este contexto, βάλλει expresa colocar o introducir el vino en los odres. «Pone» es natural en español y conserva el sentido general sin volverlo demasiado coloquial ni sugerir con más fuerza un acto de vertido.
- source_word: οἶνον νέον
  english_pob_choice: new wine
  chosen_spanish: vino nuevo
  alternatives_spanish:
  - vino fresco
  - vino reciente
  lexicon: BDAG
  rationale: «Vino nuevo» reproduce de manera directa la combinación sustantivo-adjetivo y mantiene la imagen de vino recién hecho o en fermentación.
- source_word: ἀσκοὺς
  english_pob_choice: wineskins
  chosen_spanish: odres
  alternatives_spanish:
  - pieles
  - bolsas de vino
  lexicon: BDAG
  rationale: «Odres» es el equivalente español natural para los recipientes de piel usados para vino. Es más conciso que «odres de vino» y preserva el referente cultural.
- source_word: παλαιούς
  english_pob_choice: old
  chosen_spanish: viejos
  alternatives_spanish:
  - antiguos
  - gastados
  lexicon: BDAG
  rationale: «Viejos» traduce directamente el adjetivo y conserva el contraste con el cierre del versículo. «Gastados» interpretaría la consecuencia en vez de traducir el término.
- source_word: ῥήξει
  english_pob_choice: will burst
  chosen_spanish: rompe
  alternatives_spanish:
  - reventará
  - rasga
  lexicon: BDAG
  rationale: El griego presenta una consecuencia cierta. En español, el presente histórico «rompe» comunica con fuerza esa certeza proverbial sin perder naturalidad; «reventará» también sería posible, pero suena más específico y menos sobrio.
- source_word: ἀπόλλυται
  english_pob_choice: is ruined
  chosen_spanish: se pierde
  alternatives_spanish:
  - se arruina
  - perece
  lexicon: BDAG
  rationale: «Se pierde» conserva el matiz amplio de pérdida o inutilización que el griego permite y deja abierta la lectura del daño práctico al vino. «Se arruina» explicita más el resultado, pero con menos amplitud semántica.
- source_word: καινούς
  english_pob_choice: fresh
  chosen_spanish: nuevos
  alternatives_spanish:
  - frescos
  - nuevos en calidad
  lexicon: BDAG
  rationale: Aunque el inglés POB distingue la cualidad de καινούς con «fresh», en español «nuevos» suena más natural junto a «viejos» y mantiene el paralelismo léxico explícito del griego. La posible cualidad innovadora queda implícita en el contraste.
- source_word: ἀλλὰ οἶνον νέον εἰς ἀσκοὺς καινούς
  english_pob_choice: But new wine is for fresh wineskins
  chosen_spanish: Pero vino nuevo en odres nuevos.
  alternatives_spanish:
  - Pero el vino nuevo va en odres nuevos.
  - Pero el vino nuevo se pone en odres nuevos.
  lexicon: BDAG
  rationale: El griego final es elíptico y carece de verbo. En español, una formulación breve y proverbial preserva mejor la concisión del original que una expansión verbal; la omisión del verbo en la segunda cláusula es viable y natural en este contexto.
theological_decisions:
- issue: Forma del enunciado final elíptico
  english_pob_reading: Rendered as a general principle rather than an explicit command.
  chosen_spanish_reading: 'Se conserva como una máxima general: «Pero vino nuevo en odres nuevos».'
  alternative_spanish_readings:
  - Pero el vino nuevo debe ponerse en odres nuevos.
  - Pero el vino nuevo va en odres nuevos.
  rationale: El griego no expresa un mandato explícito en la clausula final; por eso conviene mantener un giro sentencioso y no añadir obligación que no está en el texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Matiz de ἀπόλλυται
  english_pob_reading: is ruined / or, 'the wine is lost.'
  chosen_spanish_reading: «Se pierde» conserva el campo semántico de pérdida, inutilización o ruina sin forzar una sola implicación.
  alternative_spanish_readings:
  - se arruina
  - perece
  rationale: La forma española debe dejar abierta la tensión léxica que permite el griego entre pérdida y destrucción práctica.
  doctrine_reference: Lexical equivalence; auditable source-based rendering
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: la cláusula final se trató como máxima elíptica, y ἀπόλλυται se mantuvo con un español que conserve su ambigüedad entre pérdida y ruina. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «odres» de manera consistente para ἀσκοὺς, en línea con el referente cultural de recipientes de piel.
  - Se preserva el paralelismo viejo/nuevo con «viejos» y «nuevos», priorizando transparencia y naturalidad en español.
  - La puntuación reproduce el contraste proverbial del griego y mantiene la cadencia de dos enunciados breves.
