base_translation:
  language: en
  yaml_path: translation/nt/mark/002/022.yaml
  text: And no one puts new wine into old wineskins[a]. Otherwise, the wine will burst the wineskins, and the wine is ruined, and the wineskins too[b]. But new wine is for fresh wineskins.
  footnotes:
