    text: Or, 'the wine is lost.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'new wineskins'; rendered 'fresh wineskins' to reflect the qualitative nuance of καινούς in contrast to 'old' (παλαιούς).
    reason: lexical_alternative
