  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: nadie pone vino nuevo en odres viejos; si no, el vino rompe los odres; el vino se pierde y también los odres. Sin embargo, dos puntos no siguen fielmente el expediente POB: (1) las notas al pie están invertidas respecto de los lugares y contenidos del inglés auditado; la nota [a] del POB pertenece al verbo ἀπόλλυται (''se pierde'' / ''se arruina''), no a ''odres viejos''; y (2) la cláusula final elíptica en español queda demasiado abrupta y menos natural que el principio general documentado en el POB. Conviene suplir mínimamente el verbo para conservar la fuerza proverbial sin convertirla en mandato.'
  spanish_quality_summary: El español es en general claro y digno. 'Vino nuevo', 'odres' y 'viejos' funcionan bien. No obstante, 'Pero vino nuevo en odres nuevos' suena truncado en español más de lo que exige la elipsis griega. 'Pero el vino nuevo es para odres nuevos' o 'va en odres nuevos' sería más natural; la primera refleja mejor la solución inglesa auditada ('is for'). También hay un problema formal serio de anclaje y contenido de notas al pie.
  glossary_alignment: No hay conflicto con la terminología doctrinal principal del proyecto. Las decisiones léxicas 'odres', 'vino nuevo', 'viejos' y 'se pierde' son defendibles. Para καινούς, 'nuevos' es aceptable en español aunque el inglés use 'fresh' para resaltar el matiz cualitativo; ese matiz puede preservarse en nota. La revisión propuesta mantiene esa explicación.
  issues:
  - severity: high
    issue: Las notas al pie no corresponden a los lugares ni contenidos del expediente inglés.
    rationale: La nota [a] del POB inglés explica la alternativa de ἀπόλλυται ('the wine is lost'), pero en el borrador [a] aparece anclada en 'odres viejos'. La nota [b] inglesa explica καινούς ('fresh wineskins'), pero en el borrador [b] comenta ἀπόλλυται. Esto rompe la trazabilidad auditada y la disciplina de notas.
  - severity: medium
    issue: La cláusula final 'Pero vino nuevo en odres nuevos' es poco natural en español.
    rationale: Aunque el griego es elíptico, el español requiere una completación mínima para sonar proverbial y claro. 'Es para' reproduce bien la solución POB y evita introducir un mandato ('debe ponerse').
  - severity: low
