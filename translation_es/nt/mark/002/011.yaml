review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia de mandatos y el tono autoritativo del griego: Σοὶ λέγω, ἔγειρε, ἆρον, ὕπαγε. Sin embargo, dos decisiones se alejan del rastro auditado y de la mejor equivalencia léxica en español: (1) el anclaje [a] sobre «Te digo» añade una nota de énfasis que el inglés no preservó como nota y que suena explicativa de más para el texto principal; (2) «camilla» para κράβαττος introduce en español una connotación médica/de traslado que no corresponde tan bien al lecho sencillo o estera portátil del contexto. «Lecho» o «estera» serían posibles, pero «camilla» es menos fiel al matiz de sleeping mat/pallet del expediente inglés.'
  spanish_quality_summary: La frase es clara y natural, pero «vete a tu casa» puede sonar algo brusco en español en comparación con el simple ὕπαγε; «ve a tu casa» mantiene mejor el mandato sin añadir un matiz de despedida áspera. Asimismo, los dos puntos tras «Te digo» no son incorrectos, pero la coma refleja más de cerca la cadencia del original y del POB inglés. En conjunto, una revisión menor mejora fidelidad y registro.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. La principal cuestión léxica es κράβαττος: el POB inglés optó por «mat» con nota alternativa «bed». En español, «camilla» no encaja bien con esa racionalidad; «estera» comunica mejor un soporte sencillo y portátil, con nota que preserve «lecho/cama» como alternativas. «Te digo» y «a tu casa» son adecuados; «ve» es preferible a «vete» aquí.'
  issues:
  - severity: medium
    issue: «camilla» para κράβαττος
    rationale: En español neutral, «camilla» suele evocar una camilla médica o mesa de examen/traslado. El griego y el expediente inglés apuntan a un lecho sencillo, estera o pallet portátil, no a un artefacto médico.
  - severity: low
    issue: Nota [a] innecesaria sobre el dativo enfático
    rationale: El inglés POB documenta el énfasis en las decisiones léxicas, pero su nota [a] corresponde a una alternativa de traducción distinta. En español, la nota propuesta explica gramática más que ofrecer una alternativa relevante para el lector.
  - severity: low
    issue: «vete» añade un matiz ligeramente más fuerte que «ve»
    rationale: ὕπαγε aquí es un simple mandato de ir. «Vete» puede oírse más brusco o expulsivo en español; «ve» preserva mejor la sencillez del mandato.
  revised_spanish_text: Te digo, levántate, toma tu estera[a] y ve a tu casa.[b]
