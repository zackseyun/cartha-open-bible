- from: 'Te digo[a]: levántate, toma tu camilla[b] y vete a tu casa.'
  to: Te digo, levántate, toma tu estera[a] y ve a tu casa.[b]
  rationale: Se corrige principalmente κράβαττος a «estera» para ajustarse mejor al sentido de un lecho sencillo y portátil, en línea con el expediente inglés. Se elimina la nota gramatical no esencial sobre Σοὶ, se suaviza «vete» a «ve» para reflejar mejor ὕπαγε, y se añade la nota alternativa correspondiente a «a tu casa» según el POB inglés. La revisión es menor y no requiere adjudicación adicional.
