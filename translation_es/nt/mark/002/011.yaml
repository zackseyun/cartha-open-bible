translation:
  language: es
  text: Te digo, levántate, toma tu estera[a] y ve a tu casa.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «tu lecho» o «tu cama». El griego κράβαττος designa un lecho sencillo y portátil.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ve a casa». Griego: «ve a tu casa».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σοὶ
  english_pob_choice: to you
  chosen_spanish: te
  alternatives_spanish:
  - a ti
  - para ti
  lexicon: BDAG
  rationale: El dativo de segunda persona va al frente para dar énfasis y en español queda natural como clítico de objeto indirecto. Mantiene la dirección personal de la palabra de Jesús sin sobrecargar la frase.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - te digo
  - afirmo
  lexicon: BDAG
  rationale: La forma verbal presente mantiene la fórmula solemne y directa. En español, 'te digo' integra bien el dativo enfático y conserva el tono autoritativo.
- source_word: ἔγειρε
  english_pob_choice: get up
  chosen_spanish: levántate
  alternatives_spanish:
  - levántate ahora
  - ponte de pie
  lexicon: BDAG
  rationale: El imperativo de ἐγείρω pide una orden física inmediata. 'Levántate' es idiomático y fiel en español, sin el tono algo más arcaico de 'resucita' o la rigidez de 'ponte de pie'.
- source_word: ἆρον
  english_pob_choice: pick up
  chosen_spanish: toma
  alternatives_spanish:
  - recoge
  - levanta
  lexicon: BDAG
  rationale: αἴρω expresa tomar/coger y llevar consigo el objeto. 'Toma' funciona de modo natural antes del complemento directo 'tu camilla' y preserva la acción concreta sin añadir matices innecesarios.
- source_word: κράβαττόν
  english_pob_choice: mat
  chosen_spanish: camilla
  alternatives_spanish:
  - colchón
  - estera
  - catre
  lexicon: BDAG
  rationale: El contexto sugiere el lecho portátil del enfermo. En español 'camilla' comunica mejor la idea de un soporte portátil para ser cargado; 'estera' o 'catre' pueden sonar menos precisos o más regionales. Se conserva la tensión lexical con la nota que permite 'lecho/cama' como alternativa interpretativa.
- source_word: ὕπαγε
  english_pob_choice: go
  chosen_spanish: vete
  alternatives_spanish:
  - ve
  - retírate
  lexicon: BDAG
  rationale: El mandato consecutivo pide salida inmediata. 'Vete' expresa bien el movimiento hacia afuera con naturalidad imperativa en español.
- source_word: εἰς τὸν οἶκόν σου
  english_pob_choice: to your house
  chosen_spanish: a tu casa
  alternatives_spanish:
  - a tu hogar
  - a tu hogar/casa
  lexicon: BDAG
  rationale: εἰς con acusativo indica dirección. 'A tu casa' preserva la concreción de οἶκος y, en español, es la forma más natural; no se opta por 'hogar' porque suaviza el sustantivo concreto que el griego conserva.
theological_decisions:
- issue: Tono autoritativo e inmediato del mandato de Jesús
  english_pob_reading: 'A direct, authoritative personal command: ''I say to you, get up, pick up your mat, and go to your house.'''
  chosen_spanish_reading: 'Un mandato directo y personal: ''Te digo: levántate, toma tu camilla y vete a tu casa.'''
  alternative_spanish_readings:
  - '''Te digo: levántate, toma tu lecho y vete a tu casa.'''
  - '''Te digo: levántate, toma tu cama y vete a tu casa.'''
  rationale: La frase reproduce la secuencia imperativa y la autoridad inmediata de Jesús sin añadir interpretación doctrinal. Se evita un registro excesivamente arcaico para conservar claridad pública, pero se mantiene la fuerza del mandato.
  doctrine_reference: Cristología narrativa; autoridad verbal de Jesús en los Evangelios.
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego SBLGNT y el audit trail inglés POB. La decisión principal fue conservar la secuencia imperativa y el matiz concreto de κράβαττος, pero en español se prefirió 'camilla' por claridad contemporánea, manteniendo en nota la alternativa 'lecho/cama' para no ocultar la tensión lexical. No hubo revisiones aplicadas en el paquete inglés reciente, y el consenso de revisión fue alto.
  spanish_consistency_notes:
  - Se mantiene «Jesús» implícito en el contexto, sin añadirlo al texto porque el versículo no lo contiene.
  - Se usa «casa» para οἶκος siguiendo la dirección concreta del griego; no se sustituye por «hogar» en el texto principal.
  - El tono de mandato se conserva con imperativos breves en serie, en paralelo al griego.
