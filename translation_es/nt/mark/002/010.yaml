translation:
  language: es
  text: Pero para que sepan que el Hijo del Hombre[a] tiene autoridad en la tierra para perdonar pecados—le dice al paralítico[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "el Ser Humano". El título griego "el Hijo del Hombre" puede llevar tanto un sentido idiomático de humanidad como una alusión a Daniel 7.
    reason: alternative_reading
  - marker: b
    text: O "le dice al hombre paralizado".
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα δὲ
  english_pob_choice: But so that
  chosen_spanish: Pero para que
  alternatives_spanish:
  - Mas para que
  - Y para que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad, y δέ añade una leve transición o contraste. En español, "Pero para que" conserva ambas funciones de manera natural y publica­ble, sin endurecer el tono.
- source_word: εἰδῆτε
  english_pob_choice: you may know
  chosen_spanish: sepan
  alternatives_spanish:
  - conozcan
  - lleguen a saber
  lexicon: BDAG
  rationale: El subjuntivo de finalidad exige una forma natural en español. "Sepan" comunica el sentido evidencial de certeza buscada por la señal y mantiene el valor cognitivo directo de οἶδα.
- source_word: ἐξουσίαν ἔχει
  english_pob_choice: has authority
  chosen_spanish: tiene autoridad
  alternatives_spanish:
  - tiene poder
  - tiene el derecho
  lexicon: BDAG
  rationale: ἐξουσία en este contexto apunta a autoridad legítima, no solo capacidad. "Tiene autoridad" preserva mejor el alcance jurídico-teológico del dicho sobre el perdón de pecados.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Ser Humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional y su posible resonancia con Daniel 7. No se resuelve la tensión entre sentido idiomático, humanidad y carga mesiánica.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - aquí en la tierra
  lexicon: BDAG
  rationale: '"En la tierra" reproduce con naturalidad la oposición implícita entre el ámbito terrenal y una esfera celestial, y evita una perífrasis innecesaria.'
- source_word: ἀφιέναι ἁμαρτίας
  english_pob_choice: to forgive sins
  chosen_spanish: para perdonar pecados
  alternatives_spanish:
  - para remitir pecados
  - para absolver pecados
  lexicon: BDAG
  rationale: ἀφίημι aquí significa perdonar/remitir. "Perdonar pecados" es la equivalencia clara y fiel en español, sin añadir matices sacramentales que el contexto no exige.
- source_word: λέγει τῷ παραλυτικῷ
  english_pob_choice: he says to the paralyzed man
  chosen_spanish: les dice al paralítico
  alternatives_spanish:
  - le dice al paralítico
  - dice al paralítico
  lexicon: BDAG
  rationale: Se conserva el presente histórico de λέγει con "dice"/"les dice"; sin embargo, en este versículo la referencia pragmática parece dirigirse al entorno presente del relato mientras se cita el habla inmediata. El sustantivado παραλυτικός se traduce como "paralítico" para mantener concisión y naturalidad, y el artículo definido en español es idiomático.
theological_decisions:
- issue: Título ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hombre
  rationale: Se preserva el título como forma reconocible y teológicamente densa, sin convertirlo en una paráfrasis que elimine su ambigüedad bíblica. Así se mantiene abierta la posible alusión a Daniel 7 y la autoidentificación de Jesús.
  doctrine_reference: Translation philosophy §2 translate titles; §3 preserve tension
- issue: ἐξουσίαν ἔχει en relación con el perdón de pecados
  english_pob_reading: has authority
  chosen_spanish_reading: tiene autoridad
  alternative_spanish_readings:
  - tiene poder
  - tiene el derecho
  rationale: El milagro funciona como señal de una prerrogativa legítima para perdonar pecados. "Autoridad" expresa mejor esa legitimidad que un simple "poder", y evita reducir la afirmación a capacidad milagrosa.
  doctrine_reference: Translation philosophy §1 original-language primacy
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete original griego y el análisis auditado en inglés. No se observan revisiones aplicadas en el contexto inglés; por eso se mantiene la lectura de alta concordancia y se conservan las tensiones del título cristológico y de ἐξουσία sin suavizarlas.
  spanish_consistency_notes:
  - Se usa "Hijo del Hombre" de forma consistente como título cristológico, no como descripción genérica.
  - '"Autoridad" se mantiene para ἐξουσία en contextos jurídicos o teológicos.'
  - '"Perdonar pecados" se conserva como la expresión española más natural y fiel para ἀφιέναι ἁμαρτίας.'
  - El presente histórico de λέγει se refleja con "dice"; la nota permite la alternativa con "le dice al paralítico" si se desea mayor literalidad pragmática.
  - Se evita "SEÑOR" como sustituto de Yahvé porque este versículo no contiene el tetragrámaton ni una cita directa del nombre divino.
