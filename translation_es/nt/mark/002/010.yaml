  to: Pero para que sepan que el Hijo del Hombre[a] tiene autoridad en la tierra para perdonar pecados—le dice al paralítico[b],
  rationale: 'Se corrige el error principal de alineación fuente-meta cambiando ''les dice'' por ''le dice'', en conformidad con λέγει τῷ παραλυτικῷ. También se reubican las notas para anclarlas a las expresiones pertinentes en el texto español: la nota del título en ''Hijo del Hombre'' y la nota léxica en ''paralítico''. Se mantiene ''paralítico'' como texto principal porque es fiel al sustantivo griego y natural en español bíblico contemporáneo.'
