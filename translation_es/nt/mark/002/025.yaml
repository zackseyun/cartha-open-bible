    issue: «¿Nunca leyeron...?» suena menos natural para una pregunta retórica sobre lectura de la Escritura
    rationale: 'El griego ἀνέγνωτε en esta construcción retórica se vierte mejor en español con presente perfecto: «¿Nunca han leído...?», que comunica familiaridad esperada con la Escritura y suena más idiomático en registro bíblico moderno.'
  - severity: low
    issue: Repetición de «tuvo» en «tuvo necesidad y tuvo hambre»
    rationale: 'Aunque no es incorrecta, la segunda repetición puede omitirse en español para una frase más fluida: «tuvo necesidad y hambre», sin pérdida del sentido de ἐπείνασεν en este contexto.'
  revised_spanish_text: 'Y les dijo: «¿Nunca han leído lo que hizo David cuando tuvo necesidad y hambre, él y los que estaban con él?»'
