  text: 'Y les dijo: «¿Nunca han leído lo que hizo David cuando tuvo necesidad y hambre, él y los que estaban con él?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les dice
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de manera natural en pasado simple en español narrativo, sin perder la fuerza discursiva.
- source_word: Οὐδέποτε
  english_pob_choice: never
  chosen_spanish: ¿Nunca... ?
  alternatives_spanish:
  - ¿En ningún momento...?
  lexicon: BDAG
  rationale: «Nunca» reproduce con claridad la fuerza enfática de la negación absoluta en la pregunta retórica.
- source_word: ἀνέγνωτε
  english_pob_choice: have you ... read
  chosen_spanish: leyeron
  alternatives_spanish:
  - han leído
  - leyeron ustedes
  lexicon: BDAG
  rationale: En español, la pregunta retórica funciona mejor en pretérito simple; conserva la referencia a la lectura de la Escritura sin sonar forzada.
- source_word: τί ἐποίησεν
  english_pob_choice: what ... did
  chosen_spanish: lo que hizo
  alternatives_spanish:
  - qué hizo
  - lo que realizó
  lexicon: BDAG
  rationale: «Hizo» expresa de forma directa y natural la acción de David; «lo que» mantiene la interrogación indirecta del griego.
- source_word: Δαυὶδ
  english_pob_choice: David
  chosen_spanish: David
  lexicon: standard proper-name rendering
  rationale: Nombre propio transliterado de manera estándar y reconocible en español.
- source_word: ὅτε
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - al tiempo que
  lexicon: BDAG
  rationale: Conjunción temporal directa y natural en español.
- source_word: χρείαν ἔσχεν
  english_pob_choice: was in need
  chosen_spanish: tuvo necesidad
  alternatives_spanish:
  - estaba en necesidad
  - careció
  lexicon: BDAG
  rationale: La locución griega «tener necesidad» se puede verter literalmente en español; «tuvo necesidad» conserva el matiz de carencia sin sobreadaptarlo.
- source_word: ἐπείνασεν
  english_pob_choice: was hungry
  chosen_spanish: tuvo hambre
  alternatives_spanish:
  - estuvo hambriento
  - sintió hambre
  lexicon: BDAG
  rationale: «Tuvo hambre» es idiomático en español y reproduce el estado de hambre sin introducir un matiz incoativo innecesario.
- source_word: αὐτὸς καὶ οἱ μετ’ αὐτοῦ
  english_pob_choice: he and those with him
  chosen_spanish: él y los que estaban con él
  alternatives_spanish:
  - él y sus compañeros
  - él y los suyos
  lexicon: BDAG
  rationale: La frase mantiene la cercanía al griego y evita una interpretación más específica que «compañeros»; «los que estaban con él» expresa bien el grupo asociado a David.
theological_decisions:
- issue: Retórica de la pregunta sobre la Escritura
  english_pob_reading: Translate the statement straightforwardly as a rhetorical appeal to Scripture without importing interpretive conclusions into the verse itself.
  chosen_spanish_reading: Se traduce como una pregunta retórica centrada en la lectura de la Escritura, sin añadir la explicación del argumento de Jesús.
  alternative_spanish_readings:
  - «¿No han leído nunca...?»
  - «¿Acaso nunca leyeron...?»
  rationale: El verso solo introduce el ejemplo de David; la traducción no debe anticipar la aplicación al sábado ni expandir el argumento más allá de lo que dice el griego.
  doctrine_reference: Preservar la tensión literaria del texto sin importación explicativa
translation_notes:
  revision_awareness: 'La versión sigue el texto griego SBLGNT y concuerda con la auditoría inglesa: mantiene el presente histórico como pasado narrativo, conserva la pregunta retórica absoluta de Οὐδέποτε y reproduce de forma natural la frase idiomática de necesidad y hambre sin duplicaciones innecesarias.'
  spanish_consistency_notes:
  - Se usó «les dijo» para un español narrativo natural, sin perder el valor del presente histórico griego.
  - «Tuvo necesidad» y «tuvo hambre» conservan el paralelismo semántico del original sin forzar una calca.
  - «Los que estaban con él» mantiene la amplitud del grupo referido por οἱ μετ’ αὐτοῦ sin añadir contenido interpretativo.
