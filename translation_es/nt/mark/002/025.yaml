review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente la estructura y el sentido básico del griego: Jesús habla a sus interlocutores, formula una pregunta retórica sobre la lectura de la Escritura, y apela al ejemplo de David cuando estaba en necesidad y con hambre, junto con los que estaban con él. Sin embargo, «¿Nunca leyeron...?» suena menos natural en español bíblico y eclesial que «¿Nunca han leído...?» o «¿Nunca leyeron ustedes...?» para este tipo de pregunta retórica sobre familiaridad con la Escritura. Además, «tuvo necesidad» es comprensible pero algo rígido; «estaba en necesidad» sería poco natural, mientras que «estaba necesitado» altera el matiz. La combinación más natural y fiel en español es mantener «tuvo necesidad» o mejorar a «estaba en necesidad» no conviene; por eso se conserva el primero. El otro punto mejorable es la repetición «tuvo necesidad y tuvo hambre», que en español puede aligerarse sin pérdida semántica.'
  spanish_quality_summary: La redacción es clara y entendible, pero puede pulirse para sonar más natural y digna en español general de iglesia. «¿Nunca leyeron...?» resulta algo brusco; «¿Nunca han leído...?» encaja mejor con una apelación retórica a un texto conocido. También conviene eliminar la repetición innecesaria del segundo «tuvo» antes de «hambre», siguiendo la mejora ya documentada en inglés. El resto del verso es legible y cercano al original.
  glossary_alignment: No hay términos del glosario maestro especialmente controvertidos en este versículo. Los nombres y categorías teológicas están bien manejados. «David» y la formulación no introducen conflictos con Yahvé/Mesías/Cristo/Espíritu/etc. La decisión de mantener la referencia simple a «los que estaban con él» se alinea bien con la filosofía del proyecto.
  issues:
