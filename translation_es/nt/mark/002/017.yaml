translation:
  language: es
  text: 'Y al oírlo[a], Jesús les dice: «Los fuertes no tienen necesidad de médico, sino los que están enfermos. No vine a llamar a justos[b], sino a pecadores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando lo oyó»; el griego usa un participio («habiendo oído» / «al oír») y no explicita el objeto, que se suple por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «a los justos»; el griego simplemente dice «justos». En el contexto puede oírse irónicamente, pero el texto no lo explicita.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀκούσας
  english_pob_choice: hearing it
  chosen_spanish: al oírlo[a]
  alternatives_spanish:
  - habiéndolo oído
  - cuando lo oyó
  lexicon: BDAG
  rationale: El participio aoristo se vuelve naturalmente temporal en español con una construcción breve y fluida. «Oírlo» mantiene el objeto implícito del contexto, como en el inglés auditado, sin añadir una paráfrasis extensa.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: Jesús les dice
  alternatives_spanish:
  - Jesús les dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico del griego para reflejar el estilo narrativo vivo de Marcos. En español, «les dice» suena natural y preserva esa vivacidad mejor que el pasado.
- source_word: οἱ ἰσχύοντες
  english_pob_choice: those who are strong
  chosen_spanish: los que están fuertes
  alternatives_spanish:
  - los fuertes
  - los que están sanos
  lexicon: BDAG
  rationale: «Ἰσχύοντες» apunta a fuerza/fortaleza; por eso «fuertes» es la correspondencia más directa. «Están fuertes» mantiene el matiz descriptivo y evita deslizar de inmediato a una interpretación médica que el término griego no exige por sí mismo.
- source_word: χρείαν ἔχουσιν
  english_pob_choice: have no need
  chosen_spanish: no tienen necesidad
  alternatives_spanish:
  - no necesitan
  lexicon: BDAG
  rationale: La locución idiomática se expresa con una fórmula sobria y formal en español. «No tienen necesidad» conserva el tono proverbial y la estructura de necesidad del original.
- source_word: ἰατροῦ
  english_pob_choice: physician
  chosen_spanish: de médico
  alternatives_spanish:
  - de doctor
  - de médico cirujano
  lexicon: BDAG
  rationale: «Médico» comunica bien el oficio sin sonar demasiado contemporáneo ni demasiado técnico. En español natural, es la opción más clara para el contraste de la metáfora.
- source_word: οἱ κακῶς ἔχοντες
  english_pob_choice: those who are sick
  chosen_spanish: los que están enfermos
  alternatives_spanish:
  - los que están mal
  - los que están enfermos de salud
  lexicon: BDAG
  rationale: El giro idiomático literalmente dice quienes «están mal»; en este contexto médico, «los que están enfermos» transmite el sentido previsto sin perder la fuerza de la imagen.
- source_word: οὐκ ἦλθον
  english_pob_choice: I did not come
  chosen_spanish: No he venido
  alternatives_spanish:
  - No vine
  lexicon: BDAG
  rationale: En español, el pretérito perfecto compuesto puede expresar una venida con vigencia en la misión de Jesús. Se eligió para sonar natural y mantener el valor actual de la declaración, sin forzar una calca del inglés.
- source_word: καλέσαι
  english_pob_choice: to call
  chosen_spanish: a llamar
  alternatives_spanish:
  - a convocar
  - a invitar
  lexicon: BDAG
  rationale: «Llamar» conserva la amplitud semántica del verbo y su enlace con el llamado al discipulado. «Convocar» o «invitar» serían más específicos de lo que permite el griego en este contexto.
- source_word: δικαίους
  english_pob_choice: the righteous
  chosen_spanish: a justos[b]
  alternatives_spanish:
  - a los justos
  - a los rectos
  lexicon: BDAG
  rationale: «Justos» respeta el valor moral-religioso de δίκαιος y evita reemplazarlo por una palabra más interpretativa. Se omitió el artículo para seguir el patrón de la cita en español y porque la sustantivación funciona bien en este contraste.
- source_word: ἁμαρτωλούς
  english_pob_choice: sinners
  chosen_spanish: a pecadores
  alternatives_spanish:
  - a los pecadores
  - a personas pecadoras
  lexicon: BDAG
  rationale: «Pecadores» es la equivalencia estándar y conserva la designación moral-religiosa del original. Se mantuvo la forma breve para reflejar la contundencia de la declaración.
theological_decisions:
- issue: Si ἀκούσας debe explicitar un objeto en español
  english_pob_reading: Supplied 'it' in English from context
  chosen_spanish_reading: Se deja implícito en «al oírlo»
  alternative_spanish_readings:
  - al oír aquello
  - cuando Jesús oyó
  rationale: El griego no expresa el objeto y el contexto inmediato lo suple. En español puede mantenerse igualmente implícito, evitando una expansión innecesaria y preservando la misma cautela interpretativa que el audit trail inglés.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si debe preservarse el presente histórico de λέγει
  english_pob_reading: Preserved as 'he says'
  chosen_spanish_reading: Se mantiene «dice»
  alternative_spanish_readings:
  - dijo
  rationale: Conservar el presente refleja la textura narrativa del griego sin afectar el contenido doctrinal. La elección sigue la misma decisión del texto inglés auditado.
  doctrine_reference: Translation philosophy §1, §6
- issue: Si δικαίους debe matizarse como irónico
  english_pob_reading: Retained the literal phrase 'the righteous' without signaling irony in the main text
  chosen_spanish_reading: Se conserva «justos» sin explicitar ironía
  alternative_spanish_readings:
  - los que se creen justos
  - los considerados justos
  rationale: El contexto puede sugerir ironía, pero el texto griego simplemente dice «justos». Para no borrar la tensión documentada, el texto principal permanece literal y la posible lectura irónica queda sin imponerse en la traducción principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: se prefirió un participio temporal directo para ἀκούσας, se mantuvo el presente histórico de λέγει y se conservó la literalidad de δικαίους/ἁμαρτωλούς sin añadir interpretación en la línea principal. La versión española refleja esas mismas decisiones con equivalencias naturales en español.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo exigiría; aquí no aparece.
  - «Jesús» se conserva como nombre propio estándar.
  - Se prefirió «médico» por registro y claridad, en paralelo con el inglés «physician».
  - No se introdujeron términos eclesiásticos ajenos al griego; «justos» y «pecadores» mantienen el contraste moral del pasaje.
  - La puntuación de la cita sigue el uso español con comillas de apertura y cierre y mantiene el tono directo del dicho.
