review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego y preserva decisiones clave del audit trail: presente histórico («dice»), contraste médico, y la literalidad de «justos». Sin embargo, hay dos desajustes menores pero significativos: la nota [a] no refleja correctamente la alternativa inglesa, porque presenta como alternativa la misma formulación ya usada en el texto; y «No he venido» se aparta innecesariamente de la elección auditada «I did not come» y del aoristo puntual, cuando en este contexto español «No vine» resulta más alineado y natural.'
  spanish_quality_summary: El español es claro y eclesialmente legible. No obstante, «los que están fuertes» suena algo menos idiomático en este contexto proverbial que «los fuertes», y la nota [a] está formulada de manera confusa. La frase principal necesita una leve pulida para mayor naturalidad y mejor correspondencia con la documentación léxica.
  glossary_alignment: No hay conflictos con la terminología de proyecto. «Jesús», «justos», «pecadores», «médico» y «enfermos» son adecuados. No aplica terminología especial como Yahvé/Mesías. La decisión sobre δικαίους debe seguir literal; conviene mantener «justos» con nota contextual.
  issues:
  - severity: medium
    issue: La nota [a] no preserva bien la alternativa documentada para ἀκούσας
    rationale: El texto usa «al oírlo[a]», pero la nota dice «O «al oírlo» puede entenderse también como «cuando lo oyó»», repitiendo la misma formulación del texto como si fuera alternativa. La nota inglesa contrasta el participio con una cláusula temporal y además explica que el objeto está implícito.
  - severity: medium
    issue: «No he venido» debilita la alineación con el aoristo οὐκ ἦλθον y con el audit trail
    rationale: Aunque el perfecto compuesto puede funcionar en español, aquí el inglés auditado eligió pasado simple y el griego presenta una declaración de misión expresada con aoristo. «No vine» es más directo y mejor alineado con la evidencia y la decisión documentada.
  - severity: low
    issue: «Los que están fuertes» es comprensible pero algo menos idiomático
    rationale: Preserva bien la fuerza léxica de ἰσχύοντες, pero en español proverbial «los fuertes» suena más natural sin perder el contraste con «los que están enfermos». Además armoniza mejor con una nota que explique la alternativa «sanos».
  revised_spanish_text: 'Y al oírlo[a], Jesús les dice: «Los fuertes no tienen necesidad de médico, sino los que están enfermos. No vine a llamar a justos[b], sino a pecadores».'
  revised_footnotes:
  - marker: a
    text: O «cuando lo oyó»; el griego usa un participio («habiendo oído» / «al oír») y no explicita el objeto, que se suple por el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «a los justos»; el griego simplemente dice «justos». En el contexto puede oírse irónicamente, pero el texto no lo explicita.
    reason: alternative_reading
  revision_rationale: Se ajustó el verbo principal de misión a «No vine» para reflejar mejor el aoristo griego y la decisión auditada en inglés. Se mejoró la naturalidad de «οἱ ἰσχύοντες» con «Los fuertes», manteniendo una posible lectura médica en nota implícita. Se corrigió la nota [a] para que presente una alternativa real y explique con precisión que el objeto de «oír» no está expreso en griego.
