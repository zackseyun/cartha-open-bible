  text: καὶ ἀκούσας ὁ Ἰησοῦς λέγει αὐτοῖς ⸀ὅτι Οὐ χρείαν ἔχουσιν οἱ ἰσχύοντες ἰατροῦ ἀλλ’ οἱ κακῶς ἔχοντες· οὐκ ἦλθον καλέσαι δικαίους ἀλλὰ ⸀ἁμαρτωλούς.
base_translation:
  language: en
  yaml_path: translation/nt/mark/002/017.yaml
  text: And hearing it[a], Jesus says to them, “Those who are strong have no need of a physician, but those who are sick. I did not come to call the righteous[b], but sinners.”
  footnotes:
  - marker: a
    text: Or 'those who are healthy' for 'those who are strong'; the Greek literally refers to those who are strong or well.
    reason: lexical_alternative
  - marker: b
    text: '''The righteous'' may be heard ironically in context, that is, those regarded as righteous or who consider themselves righteous; the Greek text itself simply says ''the righteous.'''
    reason: alternative_reading
