revisions:
- from: 'Y al oírlo[a], Jesús les dice: «Los que están fuertes no tienen necesidad de médico, sino los que están enfermos. No he venido a llamar a justos[b], sino a pecadores».'
  to: 'Y al oírlo[a], Jesús les dice: «Los fuertes no tienen necesidad de médico, sino los que están enfermos. No vine a llamar a justos[b], sino a pecadores».'
  rationale: Se ajustó el verbo principal de misión a «No vine» para reflejar mejor el aoristo griego y la decisión auditada en inglés. Se mejoró la naturalidad de «οἱ ἰσχύοντες» con «Los fuertes», manteniendo una posible lectura médica en nota implícita. Se corrigió la nota [a] para que presente una alternativa real y explique con precisión que el objeto de «oír» no está expreso en griego.
