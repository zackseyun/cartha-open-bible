translation:
  language: es
  text: '¿Qué es más fácil: decirle al paralítico: «Tus pecados son perdonados[a]», o decir: «Levántate, toma tu estera y anda»?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Tus pecados han sido perdonados». El verbo griego puede entenderse como una forma que destaca el estado resultante del perdón.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί ἐστιν εὐκοπώτερον
  english_pob_choice: Which is easier
  chosen_spanish: ¿Qué es más fácil?
  alternatives_spanish:
  - ¿Cuál es más fácil?
  - ¿Qué cosa es más fácil?
  lexicon: BDAG
  rationale: El neutro comparativo con τί pide una pregunta sobre relativa facilidad. «¿Qué es más fácil?» suena natural en español y conserva el contraste comparativo sin añadir explicación.
- source_word: εἰπεῖν
  english_pob_choice: to say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - manifestar
  lexicon: BDAG
  rationale: En ambas cláusulas introduce discurso directo; «decir» es la equivalencia más directa y clara en español.
- source_word: τῷ παραλυτικῷ
  english_pob_choice: to the paralyzed man
  chosen_spanish: al paralítico
  alternatives_spanish:
  - al hombre paralizado
  - al lisiado
  lexicon: BDAG
  rationale: παραλυτικός designa a una persona con parálisis. «Al paralítico» conserva el referente de manera breve y natural en español, sin perder el matiz descriptivo del término griego.
- source_word: Ἀφίενταί σου αἱ ἁμαρτίαι
  english_pob_choice: Your sins are forgiven
  chosen_spanish: Tus pecados son perdonados
  alternatives_spanish:
  - Tus pecados han sido perdonados
  - Se te perdonan tus pecados
  lexicon: BDAG
  rationale: El presente pasivo se vierte con una pasiva declarativa en español. «Son perdonados» preserva la fuerza afirmativa inmediata del dicho y evita resolver la cuestión aspectual que el texto deja abierta.
- source_word: ἁμαρτίαι
  english_pob_choice: sins
  chosen_spanish: pecados
  alternatives_spanish:
  - faltas
  - ofensas
  lexicon: BDAG
  rationale: «Pecados» es la forma normal y contextualmente adecuada en este anuncio de perdón; mantiene el sentido moral/religioso del término sin expansión innecesaria.
- source_word: Ἔγειρε
  english_pob_choice: Get up
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Despierta
  lexicon: BDAG
  rationale: El imperativo llama al hombre a incorporarse. «Levántate» es natural en español y mantiene el valor de mandato.
- source_word: ἆρον
  english_pob_choice: pick up
  chosen_spanish: toma
  alternatives_spanish:
  - recoge
  - levanta
  lexicon: BDAG
  rationale: αἴρω aquí implica levantar y llevar consigo el objeto. «Toma» funciona en español como imperativo de recoger/cargar y encaja bien con «camilla».
- source_word: τὸν κράβαττόν σου
  english_pob_choice: your mat
  chosen_spanish: tu camilla
  alternatives_spanish:
  - tu estera
  - tu lecho
  lexicon: BDAG
  rationale: κράβαττος se refiere a una cama sencilla y portátil. En español, «camilla» comunica un soporte transportable, aunque en uso moderno puede sugerir un matiz médico; se conserva por su cercanía funcional al objeto descrito.
- source_word: περιπάτει
  english_pob_choice: walk
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - anda por ahí
  lexicon: BDAG
  rationale: El imperativo presente se expresa bien con «anda» en español bíblico contemporáneo, manteniendo la secuencia de mandatos en un registro natural y digno.
theological_decisions:
- issue: Declaración de perdón en presente pasivo
  english_pob_reading: Your sins are forgiven
  chosen_spanish_reading: Tus pecados son perdonados
  alternative_spanish_readings:
  - Tus pecados han sido perdonados
  - Se te perdonan tus pecados
  rationale: 'La redacción conserva la declaración sin explicar de más la relación entre la palabra dicha y el estado resultante. Mantiene la tensión narrativa: la autoridad de Jesús para perdonar está en debate, no resuelta por la traducción.'
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español, anclado en la frase correspondiente. No se añadieron notas sin ancla.
  spanish_consistency_notes:
  - Se mantiene «pecados» para ἁμαρτίαι, en línea con el uso estable del proyecto en contextos de perdón.
  - Se evita sustituir la camilla por «lecho» o «cama» para no debilitar la portabilidad del objeto griego κράβαττος.
  - Se conserva un estilo sobrio y publicable, con imperativos claros y sin calco excesivo del inglés.
