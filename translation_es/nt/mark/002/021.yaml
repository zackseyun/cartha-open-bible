review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: nadie cose un parche de tela no encogida en una prenda vieja; si lo hace, el parche nuevo se separa del material viejo y el desgarro empeora. Sin embargo, hay dos puntos que requieren ajuste para mayor fidelidad y naturalidad: «vestido viejo» restringe indebidamente ἱμάτιον a una clase de ropa en español moderno, y «el parche tira de él» no expresa con suficiente claridad la idea contextual de separación/desprendimiento que el POB inglés explicó para αἴρει.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «vestido viejo» suena marcado y potencialmente equívoco para lectores actuales, porque suele entenderse como prenda femenina específica, no como ‘garment’ general. Además, la construcción con raya y «lo nuevo de lo viejo» puede mantenerse, pero conviene que el verbo principal ya deje clara la imagen física: el parche nuevo se desprende del viejo. «Se produce una rotura peor» es aceptable, aunque «resulta un desgarro peor» suena algo más natural en este contexto textil.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones léxicas principales son adecuadas: «parche» para ἐπίβλημα y «tela sin encoger» para ῥάκους ἀγνάφου funcionan bien. La principal corrección léxica necesaria es ἱμάτιον παλαιόν -> «prenda vieja» en vez de «vestido viejo».'
  issues:
  - severity: medium
    issue: «vestido viejo» para ἱμάτιον παλαιόν
    rationale: ἱμάτιον es un término general para prenda/vestido exterior, pero en español moderno «vestido» suele referirse a una prenda femenina específica. «Prenda vieja» conserva la amplitud semántica y evita una lectura innecesariamente restringida.
  - severity: medium
    issue: «el parche tira de él» debilita el sentido contextual de αἴρει
    rationale: 'Aunque la nota explica la literalidad, en el texto principal conviene reflejar el sentido contextual ya documentado por el POB: el parche nuevo se separa o se desprende del material viejo, agravando la rotura. «Tira de él» puede sonar ambiguo o insuficiente.'
  - severity: low
    issue: «rotura peor» es menos idiomático en contexto textil
    rationale: No es incorrecto, pero «desgarro peor» o «una rotura aún peor» suena más natural para una tela o prenda rasgada. Es una mejora estilística menor.
