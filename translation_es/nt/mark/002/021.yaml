translation:
  language: es
  text: Nadie cose un parche de tela sin encoger sobre una prenda vieja[a]; de lo contrario[b], el parche se desprende de ella —lo nuevo de lo viejo—, y resulta un desgarro peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de tela no afullada». El griego describe una tela que aún no ha sido procesada para encoger, de modo que se encogería si se usara como parche.
    reason: lexical_alternative
  - marker: b
    text: Lit., «quita de él la plenitud, lo nuevo de lo viejo». El sentido es que la pieza nueva se separa de la prenda vieja y hace peor el desgarro.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐδεὶς
  english_pob_choice: No one
  chosen_spanish: Nadie
  alternatives_spanish:
  - Ninguna persona
  - No hay quien
  lexicon: BDAG
  rationale: «Nadie» expresa con naturalidad la negación absoluta del sujeto y mantiene el alcance universal del griego.
- source_word: ἐπίβλημα
  english_pob_choice: patch
  chosen_spanish: parche
  alternatives_spanish:
  - remiendo
  - pieza
  lexicon: BDAG
  rationale: En español, «parche» es claro y directo en este contexto de reparación de ropa; conserva la imagen concreta del texto.
- source_word: ῥάκους ἀγνάφου
  english_pob_choice: of unshrunk cloth
  chosen_spanish: de tela sin encoger
  alternatives_spanish:
  - de tela no encogida
  - de tela sin afullar
  lexicon: BDAG
  rationale: La idea no es que la tela sea simplemente nueva, sino que no ha sido tratada para encoger. «Sin encoger» comunica el valor práctico del adjetivo griego.
- source_word: ἐπιράπτει
  english_pob_choice: sews ... onto
  chosen_spanish: cose ... sobre
  alternatives_spanish:
  - cose ... a
  - remienda ... sobre
  lexicon: BDAG
  rationale: «Cose ... sobre» mantiene la acción física y el movimiento de aplicación del parche, con español natural.
- source_word: ἱμάτιον παλαιόν
  english_pob_choice: an old garment
  chosen_spanish: un vestido viejo
  alternatives_spanish:
  - una prenda vieja
  - un manto viejo
  lexicon: BDAG
  rationale: «ἱμάτιον» puede referirse de forma amplia a una prenda exterior; «vestido» aquí se usa en sentido general de prenda/ropa, pero se reconoce la posibilidad de «prenda» o «manto». La elección evita restringir innecesariamente el término griego.
- source_word: εἰ δὲ μή
  english_pob_choice: otherwise
  chosen_spanish: de lo contrario
  alternatives_spanish:
  - si no
  - o si no
  lexicon: BDAG
  rationale: «De lo contrario» reproduce bien la consecuencia adversativa compacta del griego y fluye naturalmente en español.
- source_word: αἴρει τὸ πλήρωμα
  english_pob_choice: the patch pulls away
  chosen_spanish: el parche tira de él
  alternatives_spanish:
  - el parche se desprende
  - el parche arranca de él
  lexicon: BDAG
  rationale: El griego sugiere que la pieza nueva separa o arrastra parte del tejido viejo; «tira de él» conserva la dinámica de tensión sin perder naturalidad.
- source_word: τὸ καινὸν τοῦ παλαιοῦ
  english_pob_choice: the new from the old
  chosen_spanish: lo nuevo de lo viejo
  alternatives_spanish:
  - la pieza nueva de la vieja
  - lo nuevo del vestido viejo
  lexicon: BDAG
  rationale: La frase griega es difícil y mantiene la oposición nuevo/viejo. «Lo nuevo de lo viejo» reproduce esa tensión de manera breve, y la guionada en el texto ayuda a señalar la explicación literal.
- source_word: χεῖρον σχίσμα γίνεται
  english_pob_choice: a worse tear results
  chosen_spanish: se produce una rotura peor
  alternatives_spanish:
  - resulta una rotura peor
  - se hace una rotura peor
  - el desgarrón empeora
  lexicon: BDAG
  rationale: «Schisma» es una rotura, abertura o desgarro; «rotura peor» conserva el comparativo del griego («peor») y comunica el resultado final sin recargar la frase.
translation_notes:
  revision_awareness: 'La versión sigue el sentido y las decisiones léxicas del auditable texto inglés POB, pero vuelve a anclar cada opción en el griego: ἐπίβλημα como parche/remiendo; ῥάκους ἀγνάφου como tela sin encoger; ἱμάτιον παλαιόν como prenda/vestido viejo; y la cláusula final como consecuencia de un desgarro agravado. No se introducen cambios doctrinales ni amplificaciones interpretativas.'
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y de lectura pública, evitando calcos excesivos.
  - «Lo nuevo de lo viejo» conserva la tensión literal del griego sin resolverla en paráfrasis.
  - «Vestido viejo» se usa en sentido amplio de prenda; podría equivaler a «prenda vieja» si se necesitara mayor neutralidad terminológica.
