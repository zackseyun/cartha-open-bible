  text: ⸀Οὐδεὶς ἐπίβλημα ῥάκους ἀγνάφου ἐπιράπτει ἐπὶ ⸂ἱμάτιον παλαιόν⸃· εἰ δὲ μή, αἴρει τὸ πλήρωμα ⸀ἀπ’ αὐτοῦ τὸ καινὸν τοῦ παλαιοῦ, καὶ χεῖρον σχίσμα γίνεται.
base_translation:
  language: en
  yaml_path: translation/nt/mark/002/021.yaml
  text: No one sews a patch of unshrunk cloth onto an old garment[a]; otherwise[b], the patch pulls away from it—the new from the old—and a worse tear results.
  footnotes:
  - marker: a
    text: Or 'of unfulled cloth.' The Greek describes cloth not yet processed so that it would shrink if used as a patch.
    reason: lexical_alternative
  - marker: b
    text: Literally, 'it takes away the fullness from it, the new from the old.' The sense is that the new patch pulls away from the old garment, making the tear worse.
    reason: lexical_alternative
