translation:
  language: es
  text: 'Y enseguida Jesús[a], al percibir en su espíritu que así razonaban dentro de sí mismos, les dijo: «¿Por qué piensan estas cosas en sus corazones?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al saber en su espíritu» o «al reconocer dentro de sí». El griego no define explícitamente el modo de la percepción de Jesús.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: «Enseguida» conserva la viveza narrativa de Marcos y suena natural en español moderno, sin perder la fuerza de inmediatez del griego.
- source_word: ἐπιγνοὺς
  english_pob_choice: perceiving
  chosen_spanish: al percibir
  alternatives_spanish:
  - al conocer
  - al reconocer
  - al darse cuenta
  lexicon: BDAG
  rationale: La forma participial pide una solución breve y verbal. «Al percibir» transmite discernimiento o captación de la situación sin especificar demasiado el mecanismo de conocimiento.
- source_word: τῷ πνεύματι αὐτοῦ
  english_pob_choice: in his spirit
  chosen_spanish: en su espíritu
  alternatives_spanish:
  - por su espíritu
  - dentro de sí
  lexicon: BDAG
  rationale: Se mantiene la referencia directa al «espíritu» para no diluir el texto ni resolver prematuramente si se trata del espíritu humano de Jesús o de una percepción espiritual más amplia.
- source_word: οὕτως
  english_pob_choice: this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esa manera
  lexicon: BDAG
  rationale: «Así» reproduce con naturalidad el adverbio de manera y corresponde al sentido contextual de cómo estaban razonando.
- source_word: διαλογίζονται
  english_pob_choice: were reasoning
  chosen_spanish: razonaban
  alternatives_spanish:
  - reflexionaban
  - pensaban
  - deliberaban
  lexicon: BDAG
  rationale: En este contexto el verbo apunta al proceso interno de razonamiento; «razonaban» conserva ese matiz mental sin convertirlo en simple opinión o conversación.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: within themselves
  chosen_spanish: dentro de sí mismos
  alternatives_spanish:
  - entre sí
  - en sí mismos
  lexicon: BDAG
  rationale: La expresión se entiende aquí como pensamiento interno, no como diálogo mutuo. «Dentro de sí mismos» lo hace explícito en español.
- source_word: Τί ταῦτα διαλογίζεσθε
  english_pob_choice: Why are you reasoning about these things
  chosen_spanish: ¿Por qué razonáis estas cosas?
  alternatives_spanish:
  - ¿Por qué pensáis estas cosas?
  - ¿Por qué deliberáis sobre estas cosas?
  lexicon: BDAG
  rationale: El interrogativo τί en este giro funciona idiomáticamente como «por qué»; «estas cosas» refleja ταῦτα sin añadir un matiz ajeno. Se mantiene el trato directo plural del griego.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en vuestros corazones
  alternatives_spanish:
  - en vuestras mentes
  - dentro de vuestros corazones
  lexicon: BDAG
  rationale: «Corazón» en lenguaje bíblico abarca el interior de la persona, incluyendo pensamiento e intención. «Corazones» preserva ese campo semántico mejor que reducirlo a «mente».
theological_decisions:
- issue: Naturaleza del conocimiento de Jesús en «al percibir en su espíritu»
  english_pob_reading: Retain the wording 'in his spirit' and present Jesus as perceiving their inner reasoning without specifying the mechanism.
  chosen_spanish_reading: Mantener «en su espíritu» y presentar a Jesús como quien percibe su razonamiento interno, sin precisar el mecanismo.
  alternative_spanish_readings:
  - como un acto de omnisciencia divina
  - como mera intuición humana aguda
  rationale: La frase griega no obliga a definir si se trata de omnisciencia divina, percepción por el Espíritu Santo o discernimiento interior humano. La traducción conserva esa tensión y evita sobreinterpretar el texto.
  doctrine_reference: Translation philosophy §3; DOCTRINE.md (límites calcedonianos y preservación de la tensión teológica)
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio; por tanto, esta versión sigue de cerca el texto fuente y el audit trail inglés, manteniendo la tensión sobre la forma del conocimiento de Jesús sin resolverla de antemano.
  spanish_consistency_notes:
  - Se usó «Jesús» sin artículo, conforme al uso narrativo normal en español bíblico.
  - Se preservó «espíritu» y «corazones» para respetar el léxico antropológico bíblico y evitar una simplificación psicológica.
  - Se mantuvo el plural reverencial/dirigido en «razonáis» para reflejar el griego δεύτερο plural.
  - La puntuación abre la cita directa con dos puntos y comillas españolas, según norma editorial en español.
