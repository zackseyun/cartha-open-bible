revisions:
- from: 'Y enseguida Jesús[a], al percibir en su espíritu que así razonaban dentro de sí mismos, les dijo: «¿Por qué razonáis estas cosas en vuestros corazones?»'
  to: 'Y enseguida Jesús[a], al percibir en su espíritu que así razonaban dentro de sí mismos, les dijo: «¿Por qué piensan estas cosas en sus corazones?»'
  rationale: Se conserva la fidelidad al griego y al audit trail, pero se corrige el español hacia un registro neutral latinoamericano y una construcción más natural en la pregunta final. «Piensan estas cosas» refleja adecuadamente el razonamiento interno en este contexto sin introducir una paráfrasis teológica; también evita la forma peninsular «razonáis».
