review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: mantiene «enseguida», «en su espíritu», el carácter interno de διαλογίζονται/ἐν ἑαυτοῖς, y «en vuestros corazones». También preserva correctamente la cautela teológica sobre el modo del conocimiento de Jesús mediante la nota. Sin embargo, en la pregunta final «¿Por qué razonáis estas cosas...?» no representa con naturalidad el valor de ταῦτα con διαλογίζεσθε; el inglés auditado lo resolvió mejor como «about these things».'
  spanish_quality_summary: La redacción es generalmente clara y digna, pero «razonáis / vuestros» suena marcadamente peninsular y menos neutral para el objetivo latinoamericano amplio. Además, «razonáis estas cosas» resulta poco idiomático en español; «piensan estas cosas» o «razonan sobre estas cosas» serían más naturales. Conviene ajustar el registro a «ustedes / sus» y mejorar la construcción verbal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «espíritu» y «corazones» están bien. La retención de «en su espíritu» concuerda con la decisión léxica y teológica documentada.
  issues:
  - severity: medium
    issue: Uso de formas peninsulares «razonáis», «vuestros»
    rationale: El estilo objetivo es español neutral latinoamericano y ampliamente legible en iglesia. Las formas de vosotros no son el mejor ajuste para ese estándar.
  - severity: medium
    issue: Construcción poco natural «razonáis estas cosas»
    rationale: Aunque intenta seguir de cerca ταῦτα, en español suena forzado. El sentido contextual se expresa mejor como «piensan estas cosas» o «razonan sobre estas cosas», en línea con el audit trail inglés «about these things».
  revised_spanish_text: 'Y enseguida Jesús[a], al percibir en su espíritu que así razonaban dentro de sí mismos, les dijo: «¿Por qué piensan estas cosas en sus corazones?»'
  revised_footnotes:
