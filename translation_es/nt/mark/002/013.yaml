translation:
  language: es
  text: Y salió otra vez junto al mar[a], y toda la multitud[b] venía a él[c], y les enseñaba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a la orilla del mar».
    reason: lexical_alternative
  - marker: b
    text: O «todo el gentío».
    reason: lexical_alternative
  - marker: c
    text: Los verbos «venía» y «enseñaba» reflejan imperfectos griegos, que pueden sugerir acción continua en tiempo pasado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - salió afuera
  - salió de allí
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι se expresa de manera natural con «salió». Mantiene la salida sin añadir un lugar no explícito en el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  lexicon: BDAG
  rationale: «Otra vez» reproduce con claridad la repetición indicada por πάλιν y suena natural en español bíblico moderno.
- source_word: παρὰ τὴν θάλασσαν
  english_pob_choice: beside the sea
  chosen_spanish: junto al mar
  alternatives_spanish:
  - junto al mar
  - al lado del mar
  - por el mar
  lexicon: BDAG
  rationale: παρά con acusativo señala cercanía o ubicación al borde de la costa. «Junto al mar» conserva ese valor espacial de manera idiomática y clara en español.
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - toda la gente
  - toda la muchedumbre
  lexicon: BDAG
  rationale: El griego usa el giro idiomático πᾶς ὁ + sustantivo colectivo. En español, «toda la multitud» comunica el sentido colectivo sin sonar forzado como «todo el pueblo» o «todo el gentío».
- source_word: ἤρχετο
  english_pob_choice: was coming
  chosen_spanish: iba llegando
  alternatives_spanish:
  - venía
  - estaba viniendo
  - seguía llegando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso o repetida en pasado. «Iba llegando» conserva ese matiz progresivo sin endurecerlo con un simple pretérito.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - hacia él
  lexicon: BDAG
  rationale: En este contexto, πρός con acusativo expresa movimiento hacia una persona. «A él» es natural en español y conserva la dirección del movimiento.
- source_word: ἐδίδασκεν
  english_pob_choice: he was teaching
  chosen_spanish: les enseñaba
  alternatives_spanish:
  - les estaba enseñando
  - seguía enseñándoles
  lexicon: BDAG
  rationale: El imperfecto muestra actividad continua. «Les enseñaba» preserva ese valor aspectual en español de forma fluida; se prefiere «enseñaba» sobre una traducción demasiado literal de la progresiva inglesa.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El objeto directo/indirecto en español se expresa aquí con clítico dativo por la construcción con «enseñar a alguien». «Les» refleja de modo natural el destinatario de la enseñanza.
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con el texto griego SBLGNT y con la auditoría inglesa: no hay variantes textuales ni revisiones aplicadas. Se conserva el valor aspectual de los imperfectos mediante formas progresivas naturales en español.'
  spanish_consistency_notes:
  - Se mantiene «mar» en lugar de «mar»/«lago» porque el contexto del texto fuente y la auditoría inglesa apuntan a θάλασσα; no hay base en este versículo para precisar más.
  - Se usa «multitud» para ὄχλος, coherente con el tono bíblico y sin cargarlo con matices no presentes.
  - No se introduce «Cristo», «Señor» ni terminología teológica adicional, porque el versículo no contiene esos elementos.
