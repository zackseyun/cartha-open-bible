- from: Y salió otra vez junto al mar[a], y toda la multitud[b] iba llegando a él[c], y les enseñaba.
  to: Y salió otra vez junto al mar[a], y toda la multitud[b] venía a él[c], y les enseñaba.
  rationale: Se ajusta ἤρχετο a «venía» para reflejar el imperfecto de manera más natural y fiel en español, sin el matiz adicional de «iba llegando». También se corrige la alternativa de la nota [a] para que exprese cercanía espacial al mar en español idiomático.
