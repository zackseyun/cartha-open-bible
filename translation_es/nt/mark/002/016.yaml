translation:
  language: es
  text: 'Y los escribas de los fariseos[a], al ver que comía con pecadores y recaudadores de impuestos, decían a sus discípulos: “¿Por qué come con recaudadores de impuestos y pecadores?”'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más dinámicamente: «comparte mesa con recaudadores de impuestos y pecadores». El griego dice literalmente «come con», lo cual en este contexto implica comunión a la mesa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la Ley
  - expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente directo y ya reconocible en el contexto de los Evangelios para γραμματεῖς. Conserva la referencia a especialistas religiosos y legales sin sobreexplicar su función.
- source_word: τῶν Φαρισαίων
  english_pob_choice: of the Pharisees
  chosen_spanish: de los fariseos
  alternatives_spanish:
  - que eran fariseos
  - escribas fariseos
  lexicon: BDAG
  rationale: El genitivo se conserva como pertenencia o asociación. «De los fariseos» reproduce la relación del griego sin convertirla en una paráfrasis interpretativa.
- source_word: ἰδόντες
  english_pob_choice: seeing
  chosen_spanish: al ver
  alternatives_spanish:
  - viendo
  - cuando vieron
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de manera natural como circunstancia temporal: «al ver». Es idiomático en español y mantiene la relación con la acción principal.'
- source_word: ὅτι ἐσθίει
  english_pob_choice: that he was eating
  chosen_spanish: que comía
  alternatives_spanish:
  - que estaba comiendo
  - que come
  lexicon: BDAG
  rationale: 'El imperfecto griego se expresa de forma natural en español con pasado imperfecto: «comía». Esto conserva el valor aspectual sin sonar forzado.'
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  lexicon: BDAG
  rationale: Aquí μετά con genitivo indica compañía o asociación en la mesa. «Con» es la equivalencia básica y deja que el contexto sugiera la implicación social de la escena.
- source_word: ἁμαρτωλῶν
  english_pob_choice: sinners
  chosen_spanish: pecadores
  alternatives_spanish:
  - personas pecadoras
  lexicon: BDAG
  rationale: «Pecadores» preserva el rótulo social y religioso del texto. Una versión más suave diluiría la fuerza de la acusación.
- source_word: τελωνῶν
  english_pob_choice: tax collectors
  chosen_spanish: recaudadores de impuestos
  alternatives_spanish:
  - cobradores de impuestos
  - publicanos
  lexicon: BDAG
  rationale: «Recaudadores de impuestos» es claro en español moderno y evita el término tradicional «publicanos», que puede ser menos transparente para lectores actuales.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o repetida. En español, «decían» conserva ese valor sin recargar el estilo.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» mantiene la relación formal maestro-discípulo que el griego presupone y que el texto de los Evangelios usa de manera estándar.
- source_word: Ὅτι
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Cómo es que
  - ¿Acaso
  lexicon: BDAG
  rationale: En este contexto interrogativo, ὅτι introduce la queja en forma idiomática. «¿Por qué» comunica el reproche con naturalidad en español.
- source_word: ἐσθίει
  english_pob_choice: does he eat
  chosen_spanish: come
  alternatives_spanish:
  - está comiendo
  lexicon: BDAG
  rationale: En la pregunta indirecta, el presente español simple («come») es la forma más natural para reflejar el valor imperfectivo/actual del griego.
theological_decisions:
- issue: Fuerza social y religiosa de la comida compartida
  english_pob_reading: Render the accusation plainly as eating 'with sinners and tax collectors' without adding interpretive explanation in the main text.
  chosen_spanish_reading: Mantener «come con pecadores y recaudadores de impuestos» sin ampliar la frase principal.
  alternative_spanish_readings:
  - comparte mesa con pecadores y recaudadores de impuestos
  - toma alimentos con pecadores y recaudadores de impuestos
  rationale: El griego dice literalmente «come con». En español, conservar esa forma permite que el lector perciba la carga de la acusación sin introducir una explicación que no está en el texto base.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y conserva la observación de la auditoría inglesa: la pregunta reprocha la comida compartida, pero el texto principal mantiene el verbo simple «come» para no sobreinterpretar. No se aplicaron revisiones posteriores.'
  spanish_consistency_notes:
  - Se usa «Yahvé» como término por defecto cuando corresponda, pero este versículo no lo contiene.
  - Se mantiene «discípulos» por ser el término técnico estable en el contexto de los Evangelios.
  - «Recaudadores de impuestos» se eligió por claridad contemporánea y para evitar un falso amigo litúrgico.
  - La nota al pie conserva la alternativa dinámica documentada por la auditoría inglesa sin desplazar el texto principal.
