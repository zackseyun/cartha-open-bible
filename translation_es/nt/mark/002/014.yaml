review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Jesús ve a Leví hijo de Alfeo, sentado en el lugar de cobro, le dirige el mandato «Sígueme», y Leví responde siguiéndolo. También preserva correctamente el presente histórico en «le dice». Sin embargo, «oficina de impuestos» introduce una imagen demasiado moderna e institucional para τελώνιον, que en contexto se refiere más concretamente a un puesto/caseta/lugar de cobro; además, «levantándose» suena menos natural aquí que una secuencia finita en español.'
  spanish_quality_summary: El español es claro y mayormente natural, pero puede mejorarse para sonar más idiomático y a la vez más preciso. «Al pasar» funciona bien para παράγων. «En la oficina de impuestos» es comprensible pero poco vívido y algo anacrónico. «Y levantándose, le siguió» es gramatical, pero «Y se levantó y lo siguió» o «Y él se levantó y lo siguió» fluye mejor en español bíblico moderno. También conviene evitar el leísmo en referente masculino directo con «lo siguió».
  glossary_alignment: 'No hay conflictos con la terminología doctrinal principal del proyecto. Los nombres propios «Leví» y «Alfeo» están bien. «Sígueme» corresponde fielmente a Ἀκολούθει μοι. El punto léxico principal es τελώνιον: mejor «puesto de cobro» en el texto, con nota que preserve «caseta de cobro» como alternativa; esto sigue mejor la justificación léxica documentada que una «oficina».'
  issues:
  - severity: medium
    issue: «oficina de impuestos» para ἐπὶ τὸ τελώνιον
    rationale: Aunque comunica la función general, suena demasiado moderna y administrativa. El griego se refiere al lugar concreto donde se cobraban impuestos o peajes; «puesto de cobro» preserva mejor la imagen narrativa y el rango semántico documentado.
  - severity: low
    issue: «levantándose» como renderización de ἀναστὰς
    rationale: 'Es posible, pero en esta secuencia narrativa el español suena más natural con verbo finito: «se levantó». Esto mantiene la anterioridad/secuencia sin rigidez.'
  - severity: medium
    issue: «le siguió»
    rationale: En español neutro y en referencia a objeto directo masculino personal, «lo siguió» evita depender del leísmo y refleja con mayor amplitud panhispánica la lectura eclesial buscada.
  revised_spanish_text: 'Y al pasar, vio a Leví, el hijo de Alfeo, sentado en el puesto de cobro[a], y le dice: «Sígueme». Y se levantó y lo siguió.'
