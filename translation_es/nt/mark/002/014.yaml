translation:
  language: es
  text: 'Y al pasar, vio a Leví, el hijo de Alfeo, sentado en el puesto de cobro[a], y le dice: «Sígueme». Y se levantó y lo siguió.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la caseta de cobro». El término griego puede referirse al lugar donde se cobraban impuestos o derechos de aduana.
    reason: lexical_alternative
lexical_decisions:
- source_word: παράγων
  english_pob_choice: as he was passing by
  chosen_spanish: al pasar
  alternatives_spanish:
  - mientras pasaba
  - cuando iba pasando
  lexicon: BDAG
  rationale: El participio presente con valor de escena continua se expresa de forma natural con un gerundio o construcción equivalente en español. «Al pasar» conserva la simultaneidad sin alargar innecesariamente la frase.
- source_word: εἶδεν
  english_pob_choice: he saw
  chosen_spanish: vio
  alternatives_spanish:
  - vio claramente
  - notó
  lexicon: BDAG
  rationale: El aoristo de ὁράω se traduce de manera directa con «vio», sin añadir matices interpretativos como «notó».
- source_word: Λευὶν
  english_pob_choice: Levi
  chosen_spanish: Leví
  alternatives_spanish:
  - Levi
  lexicon: Transliteración nominal
  rationale: Se conserva el nombre propio en forma española habitual «Leví», adecuada para lectura eclesial en español.
- source_word: τὸν τοῦ Ἁλφαίου
  english_pob_choice: the son of Alphaeus
  chosen_spanish: el hijo de Alfeo
  alternatives_spanish:
  - hijo de Alfeo
  lexicon: BDAG
  rationale: El genitivo identifica a Leví por filiación. En español, «el hijo de Alfeo» explicita la relación con naturalidad y sin añadir más de lo que dice el griego.
- source_word: καθήμενον
  english_pob_choice: sitting
  chosen_spanish: sentado
  alternatives_spanish:
  - estando sentado
  - ocupado sentado
  lexicon: BDAG
  rationale: El participio describe su postura/estado al momento de ser visto. «Sentado» es la forma más directa y natural en español.
- source_word: ἐπὶ τὸ τελώνιον
  english_pob_choice: at the tax booth
  chosen_spanish: en la oficina de impuestos
  alternatives_spanish:
  - en el puesto de cobro
  - en la caseta de impuestos
  - en la caseta de peaje
  lexicon: BDAG
  rationale: τελώνιον designa el lugar donde se cobraban impuestos o derechos. «Oficina de impuestos» comunica bien la función del lugar en español amplio; se preserva en nota la alternativa más concreta del campo semántico.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos con «dice», siguiendo el valor narrativo vivo del griego.
- source_word: Ἀκολούθει μοι
  english_pob_choice: Follow me
  chosen_spanish: Sígueme
  alternatives_spanish:
  - Ven, sígueme
  lexicon: BDAG
  rationale: El imperativo presente expresa llamado a seguimiento continuo. «Sígueme» es breve, natural y fiel, sin añadir «ven» que no está explícito en el griego.
- source_word: ἀναστὰς
  english_pob_choice: he rose
  chosen_spanish: levantándose
  alternatives_spanish:
  - se levantó
  - poniéndose de pie
  lexicon: BDAG
  rationale: 'Como participio aoristo que antecede al verbo principal, puede expresarse en español con una construcción participial que marque secuencia: «levantándose».'
- source_word: ἠκολούθησεν αὐτῷ
  english_pob_choice: followed him
  chosen_spanish: le siguió
  alternatives_spanish:
  - le siguió obedientemente
  - lo siguió
  lexicon: BDAG
  rationale: Se mantiene el enlace verbal con el mandato previo y la referencia pronominal natural en español. «Le siguió» conserva el sentido sin parafrasear.
theological_decisions:
- issue: Preservación del presente histórico de Marcos
  english_pob_reading: Preserve λέγει as present ('he says') while keeping surrounding aorists in past narration.
  chosen_spanish_reading: Conservar «dice» en presente histórico dentro de una narración mayormente en pasado.
  alternative_spanish_readings:
  - 'regularizar todo al pasado: «dijo»'
  rationale: No es una cuestión doctrinal, pero sí de estilo y fidelidad narrativa. El presente histórico mantiene la vivacidad del relato y corresponde al griego de Marcos.
  doctrine_reference: Translation philosophy §6 (readable modern Spanish) y §5 (consistencia de términos clave o excepción documentada)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT y el trazado auditado del POB en inglés. Se preservó el presente histórico de λέγει, la secuencia participial de ἀναστὰς, y la ambigüedad léxica de τελώνιον mediante una nota alternativa en español. No se observaron revisiones editoriales previas que obliguen a ajustar la base traducida.
  spanish_consistency_notes:
  - Se mantuvo «Leví» como forma española del nombre propio, evitando alternar con «Levi».
  - «Dice» conserva el presente histórico de Marcos; no se normalizó a pasado.
  - «Sígueme» refleja el imperativo breve del griego sin añadir contenido no explícito.
  - La construcción «levantándose, le siguió» preserva la relación temporal entre el participio aoristo y el verbo principal.
  - Se prefirió «oficina de impuestos» como equivalente general de τελώνιον, con nota para la alternativa concreta de cobro.
