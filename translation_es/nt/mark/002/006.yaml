translation:
  language: es
  text: 'Pero algunos de los escribas estaban sentados allí[a], razonando en sus corazones:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pensando dentro de sí mismos' o 'razonando en sus mentes'. El griego dice literalmente 'en sus corazones', un modismo bíblico para el pensamiento interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦσαν δέ
  english_pob_choice: But ... were
  chosen_spanish: Pero ... estaban
  alternatives_spanish:
  - Y ... estaban
  - Entonces ... estaban
  lexicon: BDAG
  rationale: δέ introduce aquí un giro narrativo y una ligera oposición; 'Pero' conserva ese contraste de forma natural en español. 'Eran' sonaría menos idiomático que 'estaban' para el estado situado en la escena.
- source_word: τινες τῶν γραμματέων
  english_pob_choice: some of the scribes
  chosen_spanish: algunos de los escribas
  alternatives_spanish:
  - unos escribas
  - ciertos escribas
  lexicon: BDAG
  rationale: El partitivo τινες τῶν γραμματέων indica un subconjunto, no el grupo completo. 'Algunos de los escribas' reproduce bien ese valor sin volverlo más impreciso de lo necesario.
- source_word: ἐκεῖ
  english_pob_choice: there
  chosen_spanish: allí
  alternatives_spanish:
  - ahí
  - en ese lugar
  lexicon: BDAG
  rationale: '''Allí'' mantiene la función locativa y encaja con el tono narrativo del pasaje.'
- source_word: καθήμενοι
  english_pob_choice: sitting
  chosen_spanish: sentados
  alternatives_spanish:
  - sentándose
  - estando sentados
  lexicon: BDAG
  rationale: El participio describe la postura en la escena; 'sentados' es la forma más natural y fiel en español. 'Estaban sentados' se entiende bien, pero la construcción participial es más concisa y cercana al griego.
- source_word: διαλογιζόμενοι
  english_pob_choice: reasoning
  chosen_spanish: razonando
  alternatives_spanish:
  - pensando
  - meditando
  - discutiendo consigo mismos
  lexicon: BDAG
  rationale: En este contexto, διαλογίζομαι expresa deliberación interna antes de que la objeción se verbalice. 'Razonando' conserva mejor esa actividad mental reflexiva que 'pensando', sin adelantar una conclusión interpretativa.
- source_word: ἐν ταῖς καρδίαις αὐτῶν
  english_pob_choice: in their hearts
  chosen_spanish: en sus corazones
  alternatives_spanish:
  - dentro de sí mismos
  - en sus mentes
  lexicon: BDAG
  rationale: Se preserva el idiomatismo bíblico de la 'corazón' como sede del pensamiento interior. 'Corazones' evita sustituir el lenguaje del texto por una equivalencia moderna que aplane la antropología bíblica.
theological_decisions:
- issue: Idiomático bíblico de καρδίαις como sede del pensamiento interior
  english_pob_reading: in their hearts
  chosen_spanish_reading: en sus corazones
  alternative_spanish_readings:
  - dentro de sí mismos
  - en sus mentes
  rationale: La POB inglesa preserva el idioma bíblico del corazón, no una glosa psicológica moderna. El español 'corazones' mantiene esa imagen antropológica y deja intacta la tensión entre interioridad y pensamiento expresada por el griego.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El cotejo con el paquete de fuente griego, la tabla morfológica y la auditoría inglesa muestra alta concordancia; no se requirieron revisiones respecto del sentido base. Se mantuvo la imagen bíblica de 'corazones' y la deliberación interna de διαλογιζόμενοι sin suavizarla a una formulación psicológica moderna.
  spanish_consistency_notes:
  - Se usó 'escribas' para γραμματέων, conforme al uso estándar en los Evangelios.
  - Se prefirió 'razonando' para διαλογιζόμενοι por su valor de deliberación interna, en continuidad con la decisión inglesa.
  - Se mantuvo la construcción locativa 'allí' para ἐκεῖ y el orden narrativo natural del español.
  - La nota a pie de página conserva la alternativa 'pensando dentro de sí mismos' como equivalente interpretativo permitido por la auditoría inglesa.
