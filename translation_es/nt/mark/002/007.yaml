translation:
  language: es
  text: ¿Por qué habla este hombre así? ¡Está blasfemando! ¿Quién puede perdonar pecados sino solo Dios?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «¿Qué habla este hombre así?». El modismo griego aquí significa: «¿Por qué habla este hombre así?»'
    reason: lexical_alternative
  - marker: b
    text: O «sino el único Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: Τί ... λαλεῖ;
  english_pob_choice: Why does this man speak like this?
  chosen_spanish: ¿Por qué habla este hombre así?
  alternatives_spanish:
  - ¿Qué habla este hombre así?
  - ¿Por qué dice este hombre así?
  lexicon: BDAG
  rationale: El griego admite un valor idiomático de pregunta de motivo más que de contenido. En español, '¿Por qué habla...?' comunica mejor la objeción de fondo que un literal '¿Qué habla...?', que sonaría antinatural.
- source_word: οὗτος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este
  - este sujeto
  lexicon: BDAG
  rationale: '''Este hombre'' conserva la referencia despectiva a Jesús sin intensificarla más allá de lo que exige el griego. ''Este'' solo sería demasiado elíptico; ''este sujeto'' aumentaría el desprecio sin base suficiente.'
- source_word: οὕτως
  english_pob_choice: like this
  chosen_spanish: así
  alternatives_spanish:
  - de esta manera
  - de ese modo
  lexicon: BDAG
  rationale: '''Así'' es el equivalente natural y breve en español para el adverbio que modifica el verbo de hablar. Mantiene el reproche sobre el modo de hablar.'
- source_word: λαλεῖ
  english_pob_choice: speak
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - habla de
  lexicon: BDAG
  rationale: '''Habla'' conserva el verbo de comunicación general que corresponde a λαλέω en este contexto. ''Dice'' haría más estrecha la referencia al contenido puntual; ''habla de'' introduce algo ajeno al texto.'
- source_word: βλασφημεῖ
  english_pob_choice: He is blaspheming!
  chosen_spanish: ¡Está blasfemando!
  alternatives_spanish:
  - ¡Blasfema!
  - ¡Dice blasfemias!
  lexicon: BDAG
  rationale: El presente progresivo en español comunica bien la acusación inmediata. '¡Blasfema!' también sería posible, pero '¡Está blasfemando!' mantiene mejor la vivacidad del momento y la carga acusatoria.
- source_word: τίς δύναται
  english_pob_choice: Who can
  chosen_spanish: ¿Quién puede
  alternatives_spanish:
  - ¿Quién es capaz de
  - ¿Quién tiene poder para
  lexicon: BDAG
  rationale: La forma breve y natural en español para una pregunta de capacidad/autoridad es '¿Quién puede...?'.
- source_word: ἀφιέναι ἁμαρτίας
  english_pob_choice: forgive sins
  chosen_spanish: perdonar pecados
  alternatives_spanish:
  - remitir pecados
  - dejar ir los pecados
  lexicon: BDAG
  rationale: En este contexto ἀφίημι con ἁμαρτίας significa claramente 'perdonar'. 'Remitir' es correcto pero menos transparente para el lector general; 'dejar ir' sería demasiado literal y opaco.
- source_word: εἰ μὴ εἷς ὁ θεός
  english_pob_choice: except God alone
  chosen_spanish: sino solo Dios
  alternatives_spanish:
  - excepto Dios solo
  - más que solo Dios
  lexicon: BDAG
  rationale: '''Sino solo Dios'' expresa con naturalidad la exclusividad del griego. Mantiene la fuerza del argumento sin forzar un giro más técnico que en español suena menos fluido.'
theological_decisions:
- issue: Fuerza de la acusación βλασφημεῖ
  english_pob_reading: He is blaspheming!
  chosen_spanish_reading: ¡Está blasfemando!
  alternative_spanish_readings:
  - ¡Blasfema!
  - ¡Eso es blasfemia!
  rationale: La traducción conserva la condena teológica de los escribas sin atenuarla ni resolverla. El presente progresivo en español reproduce la acusación inmediata y narrativa del pasaje.
  doctrine_reference: Translation philosophy §3
- issue: Exclusividad divina en εἰ μὴ εἷς ὁ θεός
  english_pob_reading: except God alone / except the one God
  chosen_spanish_reading: sino solo Dios
  alternative_spanish_readings:
  - excepto Dios solo
  - excepto el único Dios
  rationale: 'La formulación mantiene la exclusividad afirmada por los escribas: el perdón de pecados pertenece únicamente a Dios. ''Sino solo Dios'' es natural en español y no diluye el punto teológico.'
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: 'Coincide con la lectura del paquete auditado en inglés: se mantiene la pregunta idiomática como cuestión de motivo, la acusación inmediata de blasfemia y la exclusividad divina en la cláusula final. No se aplicaron revisiones adicionales respecto del último pase.'
  spanish_consistency_notes:
  - Se conserva «Dios» para θεός, sin sustitución por una fórmula de máscara.
  - Se usa un registro bíblico moderno y claro, evitando arcaísmos innecesarios.
  - La acusación se mantiene en presente progresivo («está blasfemando») para reflejar la vividez narrativa del griego y del audit trail inglés.
