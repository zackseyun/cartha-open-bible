translation:
  language: es
  text: Pero ellos no entendían la declaración[a], y tenían miedo de preguntarle.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el dicho». El griego ῥῆμα puede referirse a una palabra hablada, un dicho o una declaración.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Ahora ellos
  lexicon: BDAG
  rationale: δέ es una conexión suave con matiz de contraste; en español, «Pero» conserva bien ese giro frente a la declaración anterior. «Ellos» explicita el sujeto implícito de modo natural.
- source_word: ἠγνόουν
  english_pob_choice: did not understand
  chosen_spanish: no entendían
  alternatives_spanish:
  - no comprendían
  - ignoraban
  lexicon: BDAG
  rationale: ἀγνοέω aquí expresa incomprensión de lo que Jesús dijo. «No entendían» reproduce la idea cognitiva de manera natural en español y preserva el imperfecto como estado continuo en el pasado.
- source_word: τὸ ῥῆμα
  english_pob_choice: the statement
  chosen_spanish: la palabra
  alternatives_spanish:
  - la declaración
  - el dicho
  - el dicho pronunciado
  lexicon: BDAG
  rationale: ῥῆμα puede referirse a palabra, dicho, o declaración. Como en este contexto se trata de la afirmación de Jesús, «la palabra» mantiene la amplitud semántica y suena natural en español; se deja constancia de la alternativa «la declaración» para el matiz discursivo.
- source_word: ἐφοβοῦντο
  english_pob_choice: they were afraid
  chosen_spanish: tenían miedo
  alternatives_spanish:
  - temían
  - estaban temerosos
  lexicon: BDAG
  rationale: φοβέομαι en imperfecto indica una disposición continua; «tenían miedo» es una equivalencia idiomática clara que conserva ese estado prolongado mejor que una forma más rígida.
- source_word: ἐπερωτῆσαι
  english_pob_choice: to ask
  chosen_spanish: preguntarle
  alternatives_spanish:
  - hacerle una pregunta
  - interrogarlo
  lexicon: BDAG
  rationale: 'ἐπερωτάω significa preguntar o pedir información. Con el verbo de temor, en español resulta natural el infinitivo compuesto con enclítico: «preguntarle». Mantiene el objeto referido a Jesús sin redundancia.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el juicio auditado en inglés: δέ como contraste suave, ἀγνοέω como incomprensión, ῥῆμα como referencia al enunciado de Jesús, y φοβέομαι como estado continuo de miedo. Se ajustó la expresión final para sonar natural en español sin perder el contenido semántico.'
  spanish_consistency_notes:
  - Se mantiene «ellos» para el sujeto implícito, en coherencia con el contexto narrativo.
  - Se conserva un tono sobrio y bíblico, pero con español contemporáneo legible.
  - La nota de pie de página preserva la alternativa léxica documentada para ῥῆμα.
