translation:
  language: es
  text: 'Y le preguntaban[a], diciendo: «¿Por qué dicen los escribas que Elías debe venir primero?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo es que los escribas dicen que Elías debe venir primero?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτων
  english_pob_choice: were asking
  chosen_spanish: le preguntaban
  alternatives_spanish:
  - le preguntaron
  - le interrogaban
  lexicon: BDAG
  rationale: El imperfecto griego indica acción շարունակada o repetida; en español, el imperfecto «preguntaban» comunica mejor esa continuidad que un pretérito puntual. El complemento clítico «le» mantiene el objeto directo/indirecto del contexto narrativo.
- source_word: λέγοντες
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y decían
  - al decir
  lexicon: BDAG
  rationale: El participio introduce el contenido de la pregunta. «Diciendo» conserva la relación sintáctica con la pregunta sin añadir interpretación.
- source_word: Ὅτι
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Cómo es que
  - ¿Cómo pueden decir
  lexicon: BDAG
  rationale: En este contexto interrogativo, Ὅτι funciona idiomáticamente como introducción de una pregunta de causa o motivo. «¿Por qué» refleja mejor esa fuerza que una traducción literal como «que».
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» es el equivalente histórico y lexical más directo para γραμματεῖς, y preserva el término técnico del relato sin explicitar una paráfrasis.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elías el profeta
  lexicon: BDAG
  rationale: Nombre propio bíblico estándar en español. No requiere transliteración adicional.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - tiene que
  - es necesario que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad u obligación. «Debe» conserva esa fuerza con naturalidad en español.
- source_word: ἐλθεῖν
  english_pob_choice: come
  chosen_spanish: venir
  alternatives_spanish:
  - llegar
  - aparecer
  lexicon: BDAG
  rationale: Tras δεῖ, el infinitivo aoristo se traduce de forma natural con «venir», que mantiene la expectativa de movimiento o llegada sin añadir matices no presentes.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - antes
  - en primer lugar
  lexicon: BDAG
  rationale: Adverbio de prioridad temporal; «primero» reproduce el orden temporal de manera directa y natural.
theological_decisions:
- issue: Fuerza interrogativa de Ὅτι
  english_pob_reading: Rendered as a direct 'Why' question about scribal teaching
  chosen_spanish_reading: 'Se traduce como una pregunta directa: «¿Por qué…?»'
  alternative_spanish_readings:
  - «¿Cómo es que…?»
  - «¿Por qué razón…?»
  rationale: El griego no obliga a una formulación literal con «que» en español. La opción directa comunica con claridad la sorpresa o discrepancia de la pregunta sin interpretar más allá del texto.
  doctrine_reference: Translation philosophy §1, §6
- issue: Naturaleza de la venida de Elías
  english_pob_reading: Left as 'Elijah must come first' without interpretive expansion
  chosen_spanish_reading: Se mantiene «Elías debe venir primero» sin añadir «de nuevo» ni precisar el marco profético.
  alternative_spanish_readings:
  - «Elías debe venir otra vez primero»
  - «Elías debe venir primero antes del Mesías»
  rationale: El versículo afirma solo la necesidad de la venida primera de Elías. Añadir «otra vez» o explicitar «antes del Mesías» introduciría contenido interpretativo no expreso en esta línea.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador de nota [a] aparezca explícitamente en el texto principal, anclado en la frase interrogativa.
  spanish_consistency_notes:
  - Se mantuvo el imperfecto narrativo con «preguntaban» para reflejar la acción continua del griego.
  - Se evitó «Cristo» porque este versículo no lo menciona; la referencia queda implícita en el contexto narrativo.
  - «Escribas» conserva el término técnico bíblico sin sustituirlo por una paráfrasis explicativa.
  - La puntuación española usa comillas angulares y signo de interrogación de apertura conforme a norma.
