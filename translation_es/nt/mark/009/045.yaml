    rationale: «Mejor es que entres… que, teniendo ambos pies, ser arrojado…» no forma una comparación fluida ni plenamente gramatical en español. El segundo miembro debe coordinarse con una forma verbal equivalente, por ejemplo «a que… seas arrojado».
  - severity: low
    issue: Forma española de γέεννα
    rationale: Aunque «Gehenna» reproduce la transliteración inglesa, en español bíblico y eclesial es más natural «Gehena», que sigue representando el término específico sin recurrir a «infierno».
  - severity: low
    issue: Alternativa de nota para χωλός poco precisa
    rationale: La nota ofrece «manco», pero χωλός se refiere a lamedad/cojera, no a falta de mano o brazo. Esa alternativa puede confundir el campo semántico.
