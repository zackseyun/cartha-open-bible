translation:
  language: es
  text: Y si tu pie te hace tropezar[a], córtatelo. Es mejor que entres en la vida cojo[b] que, teniendo ambos pies, seas arrojado a la Gehena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te hace pecar». El término griego es σκανδαλίζῃ, con la idea de hacer tropezar, caer o incurrir en pecado.'
    reason: alternative_reading
  - marker: b
    text: 'O: «rengo» o «lisiado». El griego χωλός se refiere a la lamedad, especialmente en la marcha; aquí contrasta con tener ambos pies.'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίζῃ
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace caer
  - te hace pecar
  lexicon: BDAG
  rationale: Conserva la metáfora de tropiezo del verbo griego sin reducirla solo a ‘pecar’. En español, ‘hacer tropezar’ comunica bien la imagen física y moral implícita en el contexto.
- source_word: ἀπόκοψον
  english_pob_choice: cut it off
  chosen_spanish: córtatelo
  alternatives_spanish:
  - córtalo
  - extírpalo
  lexicon: BDAG
  rationale: ‘Córtatelo’ expresa el imperativo fuerte y concreto del griego con naturalidad en español, manteniendo la dureza retórica del mandato.
- source_word: καλόν ἐστίν
  english_pob_choice: It is better
  chosen_spanish: Mejor es
  alternatives_spanish:
  - Es mejor
  - Es preferible
  lexicon: BDAG
  rationale: La comparación con ἢ pide un valor comparativo; ‘Mejor es’ reproduce de manera fiel y digna el sentido idiomático de καλόν ἐστίν.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  english_pob_choice: to enter into life
  chosen_spanish: entres en la vida
  alternatives_spanish:
  - entres en la vida eterna
  - entres en la vida
  lexicon: BDAG
  rationale: Se preserva la expresión directa ‘entrar en la vida’ sin expandirla a ‘vida eterna’, ya que el griego dice simplemente ζωή. El subjuntivo español en la comparación es natural y fiel.
- source_word: χωλὸν
  english_pob_choice: lame
  chosen_spanish: cojo
  alternatives_spanish:
  - rengo
  - lisiado
  lexicon: BDAG
  rationale: ‘Cojo’ expresa de forma clara y reconocible la lamedad asociada al pie y a la marcha. Aunque ‘lame’ sería más literal en algunos contextos, en español actual ‘cojo’ comunica mejor la imagen.
- source_word: βληθῆναι
  english_pob_choice: to be thrown
  chosen_spanish: ser arrojado
  alternatives_spanish:
  - ser echado
  - ser lanzado
  lexicon: BDAG
  rationale: ‘Ser arrojado’ mantiene la pasividad y el carácter violento del verbo βάλλω en este contexto de juicio, con un registro digno y comprensible.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: la Gehenna
  alternatives_spanish:
  - el infierno
  - el Gehena
  lexicon: BDAG
  rationale: Se conserva el término técnico ‘Gehenna’ para respetar la especificidad del texto fuente y la política de primacía del idioma original. En español, el artículo ayuda a la fluidez natural.
- source_word: τοὺς δύο πόδας ἔχοντα
  english_pob_choice: having both feet
  chosen_spanish: teniendo ambos pies
  alternatives_spanish:
  - con ambos pies
  - habiendo ambos pies
  lexicon: BDAG
  rationale: La construcción participial se vierte de manera natural como ‘teniendo ambos pies’, preservando el contraste explícito con ‘cojo’.
theological_decisions:
- issue: γέεννα como término de juicio final
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehenna
  alternative_spanish_readings:
  - infierno
  rationale: El griego usa γέεννα, un término histórico y escatológico específico. Mantener ‘Gehenna’ preserva esa precisión y evita sustituirla por un equivalente tradicional más amplio que borra su concreción bíblica.
  doctrine_reference: Translation philosophy §1 (primacía del término original)
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con la auditoría en inglés: se conserva la metáfora de tropezar, el imperativo fuerte de cortar, la comparación ‘mejor’, la entrada en ‘la vida’ sin ampliar a ‘vida eterna’, y el término técnico ‘Gehenna’ en el texto principal.'
  spanish_consistency_notes:
  - Se usó ‘Gehenna’ con artículo por naturalidad española, manteniendo el término técnico del original.
  - Se evitó ‘infierno’ en el cuerpo del texto para no perder la especificidad de γέεννα; queda solo como alternativa en nota.
  - ‘Cojo’ se eligió por fluidez y porque mantiene la oposición con ‘ambos pies’; la nota conserva alternativas más literales o regionalmente marcadas.
  - La sintaxis intenta ser sobria y publicable, sin suavizar el tono severo del dicho de Jesús.
