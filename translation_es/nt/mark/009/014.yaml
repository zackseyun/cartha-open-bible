translation:
  language: es
  text: Y al llegar a los discípulos, vieron una gran multitud alrededor de ellos, y escribas discutiendo[a] con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «disputando con ellos». El verbo griego puede denotar discusión o debate, pero en este contexto probablemente implica una discusión polémica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθόντες
  english_pob_choice: when they came
  chosen_spanish: al llegar
  alternatives_spanish:
  - cuando llegaron
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio aoristo funciona temporalmente con el verbo principal. En español, «al llegar» conserva la secuencia sin sonar forzado como «habiendo llegado».
- source_word: πρὸς τοὺς μαθητάς
  english_pob_choice: to the disciples
  chosen_spanish: a los discípulos
  alternatives_spanish:
  - hacia los discípulos
  - junto a los discípulos
  lexicon: BDAG
  rationale: πρός con acusativo expresa movimiento hacia personas; «a los discípulos» es natural en español y mantiene el valor direccional.
- source_word: εἶδον
  english_pob_choice: they saw
  chosen_spanish: vieron
  alternatives_spanish:
  - ellos vieron
  - miraron y vieron
  lexicon: BDAG
  rationale: Aoristo narrativo simple de ὁράω; el español directo «vieron» conserva la sobriedad del texto.
- source_word: ὄχλον πολύν
  english_pob_choice: a large crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - una gran gente
  lexicon: BDAG
  rationale: ὄχλος es «multitud» o «muchedumbre»; «gran multitud» refleja bien el énfasis cuantitativo de πολύς sin perder fluidez.
- source_word: περὶ αὐτούς
  english_pob_choice: around them
  chosen_spanish: alrededor de ellos
  alternatives_spanish:
  - rodeándolos
  - en torno a ellos
  lexicon: BDAG
  rationale: περί con acusativo indica posición espacial circundante; «alrededor de ellos» es transparente y natural.
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - maestros de la ley
  lexicon: BDAG
  rationale: «Escribas» preserva la designación lexical del grupo en los evangelios, sin sustituirla por una explicación interpretativa.
- source_word: συζητοῦντας
  english_pob_choice: arguing
  chosen_spanish: discutiendo
  alternatives_spanish:
  - disputando
  - argumentando
  lexicon: BDAG
  rationale: συζητέω puede significar discutir, debatir o disputar. En este contexto de conflicto, el sentido es polémico; «discutiendo» mantiene esa tensión sin forzar un matiz demasiado específico.
- source_word: πρὸς αὐτούς
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - contra ellos
  - a ellos
  lexicon: BDAG
  rationale: Después de συζητέω, πρός con personas marca interacción dirigida a/ con alguien. «Con ellos» expresa bien la escena de controversia y deja abierta la ambigüedad entre debate y disputa que el griego permite.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando la nota al pie no anclada. La traducción ahora no usa marcadores de nota, de modo que el texto español queda limpio y compatible con la regla de anclaje exacto.
  spanish_consistency_notes:
  - Se mantuvo «escribas» como término técnico del grupo.
  - Se eligió «multitud» para ὄχλος y no «gente», porque el griego subraya masa/conjunto.
  - No se introdujo una nota textual porque el versículo no presenta una variante relevante en el paquete fuente.
