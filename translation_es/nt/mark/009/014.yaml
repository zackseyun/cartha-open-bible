  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Escribas' alinea bien con γραμματεῖς. No aparecen términos sensibles del glosario principal como Yahvé, Mesías, esclavo, etc. La decisión 'discutiendo' es aceptable, pero debe acompañarse de nota para reflejar la alternativa 'disputando' ya documentada por el POB.
