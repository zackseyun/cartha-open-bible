revisions:
- from: Y sus ropas se volvieron brillantes[a], muy blancas, como ningún batanero en la tierra puede blanquearlas.
  to: Y sus ropas se volvieron brillantes, muy blancas, como ningún lavandero[a] en la tierra puede blanquear así.
  rationale: Se reemplaza «batanero» por «lavandero» para seguir la racionalidad del POB inglés de preferir una designación funcional y comprensible al lector moderno. Se elimina el objeto explícito en «blanquearlas» para respetar mejor el infinitivo griego sin objeto expreso y la revisión inglesa auditada. La nota se traslada a γναφεύς para preservar la alternativa tradicional relevante documentada por el audit trail.
