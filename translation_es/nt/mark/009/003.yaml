translation:
  language: es
  text: Y sus ropas se volvieron brillantes, muy blancas, como ningún lavandero[a] en la tierra puede blanquear así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «batanero» o «fullero», términos tradicionales para quien limpia y blanquea telas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱμάτια
  english_pob_choice: clothes
  chosen_spanish: ropas
  alternatives_spanish:
  - vestidos
  - prendas
  - ropa
  lexicon: BDAG
  rationale: ἱμάτια es un término general para ropa o vestimenta. En español, «ropas» comunica bien el sentido colectivo y suena natural en un contexto narrativo; evita la rigidez de «vestidos» y la ambigüedad de un singular genérico como «ropa».
- source_word: ἐγένετο
  english_pob_choice: became
  chosen_spanish: se volvieron
  alternatives_spanish:
  - se hicieron
  - llegaron a ser
  - se convirtieron
  lexicon: BDAG
  rationale: El verbo marca un cambio de estado. «Se volvieron» conserva esa transición de manera clara y natural en español, sin cargarla con una explicación interpretativa.
- source_word: στίλβοντα
  english_pob_choice: gleaming
  chosen_spanish: brillantes
  alternatives_spanish:
  - resplandecientes
  - fulgurantes
  - relucientes
  lexicon: BDAG
  rationale: El participio describe un brillo vívido. «Brillantes» es una solución sobria y natural en español; las alternativas añaden matices más intensos o literarios que no son necesarios para el griego.
- source_word: λευκὰ
  english_pob_choice: white
  chosen_spanish: muy blancas
  alternatives_spanish:
  - blancas
  - de blanco intenso
  - blanquísimas
  lexicon: BDAG
  rationale: Aunque λευκά por sí solo significa «blancas», en el verso la intensidad queda reforzada por λίαν. En español, «muy blancas» reproduce bien esa intensificación sin sobretraducción.
- source_word: λίαν
  english_pob_choice: very
  chosen_spanish: muy
  alternatives_spanish:
  - sumamente
  - en extremo
  - excesivamente
  lexicon: BDAG
  rationale: λίαν intensifica de forma directa. «Muy» es la correspondencia más natural y fiel en español; evita tanto el arcaísmo como una exageración estilística.
- source_word: οἷα
  english_pob_choice: such as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - igual que
  - así como
  lexicon: BDAG
  rationale: Introduce una comparación de grado o calidad. «Como» mantiene la comparación de manera breve y fluida en español, sin añadir elementos ajenos al texto.
- source_word: γναφεύς
  english_pob_choice: launderer
  chosen_spanish: batanero
  alternatives_spanish:
  - fullero
  - lavador de paños
  - lavandero
  lexicon: BDAG
  rationale: El término designa a quien limpia y trabaja los paños. En español, «batanero» conserva con mayor precisión la función técnica de procesar y blanquear telas; aunque es menos común, es el equivalente más cercano y evita reducir indebidamente el oficio a un simple lavado doméstico.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on earth
  chosen_spanish: en la tierra
  alternatives_spanish:
  - sobre la tierra
  - en el mundo
  - aquí en la tierra
  lexicon: BDAG
  rationale: La expresión sitúa la comparación en el ámbito terrestre/humano. «En la tierra» sigue de cerca el griego y resulta plenamente comprensible en español.
- source_word: οὐ δύναται
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - puede llegar a
  - logra
  lexicon: BDAG
  rationale: El griego expresa capacidad. «Puede» es la forma más directa y natural en español, y conserva bien el contraste de incapacidad del comparativo.
- source_word: οὕτως λευκᾶναι
  english_pob_choice: to whiten
  chosen_spanish: blanquearlas
  alternatives_spanish:
  - hacerlas blancas
  - blanquear
  - dejarlas blancas
  lexicon: BDAG
  rationale: El infinitivo expresa la acción de hacer blancas las ropas. En español, «blanquearlas» reproduce el valor verbal y el objeto implícito del contexto, manteniendo la concisión del original.
theological_decisions:
- issue: Naturaleza de la descripción en la transfiguración
  english_pob_reading: Render the verse as a vivid description of Jesus' clothes becoming supernaturally brilliant without adding explanatory theological language.
  chosen_spanish_reading: Presentar el versículo como una descripción vívida de la transformación visible de las ropas de Jesús, sin añadir una glosa doctrinal como «gloria» o «transfiguración gloriosa».
  alternative_spanish_readings:
  - sus ropas resplandecieron con gloria
  - sus ropas quedaron llenas de gloria
  - sus ropas se volvieron gloriosamente blancas
  rationale: El versículo describe el efecto visible, no una explicación doctrinal. Mantener la descripción evita importar al texto una interpretación que no está expresada explícitamente en la frase griega.
  doctrine_reference: 'Translation philosophy: no añadir afirmaciones doctrinales que el texto no hace por sí mismo; preservar la tensión y dejar que el contexto teológico surja del conjunto narrativo.'
translation_notes:
  revision_awareness: La revisión inglesa más reciente ajustó λίαν para reflejarlo con un simple intensificador («very») y eliminó el objeto implícito de «whiten». Por eso el español usa «muy blancas» sin añadir pronombres explícitos innecesarios, y conserva la comparación sobria con un oficio textil concreto, siguiendo el audit trail y sin sobreinterpretar el pasaje.
  spanish_consistency_notes:
  - Se mantuvo «Y sus ropas» para reflejar el cambio de estado con un sujeto claro y natural.
  - Se evitó «Cristo» o cualquier lenguaje doctrinal añadido, porque el versículo se limita a la descripción de las ropas.
  - «Batanero» preserva el matiz técnico del oficio y corresponde bien al lexical choice de la POB inglesa.
  - La comparación final conserva la estructura de incapacidad humana frente a la blancura extrema, sin ampliar el referente.
