review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: las ropas de Jesús cambian de estado, quedan brillantes y muy blancas, en una comparación que subraya que ningún trabajador humano puede blanquearlas así. Sin embargo, introduce dos desajustes relevantes frente a la evidencia y al rastro POB: (1) «batanero» es demasiado técnico y poco legible para un español eclesial general, mientras que el POB inglés justificó una opción funcional y accesible («launderer»); (2) «blanquearlas» añade el objeto explícito que el inglés auditado decidió omitir para seguir más de cerca el griego, donde el infinitivo no lleva objeto expreso.'
  spanish_quality_summary: 'La frase es clara y natural en casi todo: «sus ropas se volvieron brillantes, muy blancas» funciona bien. El principal problema de legibilidad es «batanero», que suena arcaico o especializado en muchas variedades del español. «Lavandero» comunica con más claridad la función comparativa sin volver doméstica en exceso la imagen. También conviene evitar el objeto añadido en «blanquearlas» para mantener la concisión del original y del texto inglés auditado.'
  glossary_alignment: No hay conflicto con los términos doctrinales del proyecto en este versículo. Las decisiones léxicas principales son adecuadas salvo γναφεύς, donde «batanero» no sigue bien la racionalidad documentada de preferir un término funcional y comprensible; y οὕτως λευκᾶναι, donde el español debería evitar añadir un objeto no expreso si no es necesario.
  issues:
  - severity: medium
    issue: «batanero» para γναφεύς
    rationale: Aunque etimológicamente cercano al oficio textil tradicional, en español general es poco transparente. El POB inglés documentó una preferencia por accesibilidad moderna («launderer») sobre el tecnicismo tradicional («fuller»). «Lavandero» preserva mejor esa racionalidad para lectores hispanohablantes amplios.
  - severity: medium
    issue: «blanquearlas» añade un objeto no explícito
    rationale: 'El griego solo tiene λευκᾶναι, y el inglés auditado eliminó deliberadamente «them». En español no hace falta suplir el objeto para que la comparación siga siendo natural: «puede blanquear así» conserva mejor la forma de la fuente.'
  - severity: low
    issue: Nota al pie en «brillantes» no refleja la alternativa preservada para γναφεύς
    rationale: La nota actual sobre στίλβοντα no es incorrecta, pero el rastro POB preservó explícitamente una alternativa tradicional para γναφεύς («fuller»). En español conviene trasladar esa alternativa con una nota en «lavandero» que mencione «batanero» o «fullero», no crear una nota innecesaria en «brillantes».
  revised_spanish_text: Y sus ropas se volvieron brillantes, muy blancas, como ningún lavandero[a] en la tierra puede blanquear así.
  revised_footnotes:
  - marker: a
    text: O «batanero» o «fullero», términos tradicionales para quien limpia y blanquea telas.
    reason: lexical_alternative
  revision_rationale: Se reemplaza «batanero» por «lavandero» para seguir la racionalidad del POB inglés de preferir una designación funcional y comprensible al lector moderno. Se elimina el objeto explícito en «blanquearlas» para respetar mejor el infinitivo griego sin objeto expreso y la revisión inglesa auditada. La nota se traslada a γναφεύς para preservar la alternativa tradicional relevante documentada por el audit trail.
