review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura general del griego: γάρ como «Porque», ποτίσῃ ὑμᾶς como «les dé a beber», ποτήριον ὕδατος como «un vaso de agua», la fórmula solemne «en verdad les digo», y la negación enfática con «no perderá... su recompensa». Sin embargo, el segmento clave ἐν ὀνόματι ὅτι χριστοῦ ἐστε no está fielmente resuelto en español con «en nombre de que ustedes son de Mesías», porque esa construcción no funciona idiomáticamente y oscurece la relación semántica entre «en nombre» y «porque/que son del Mesías».'
  spanish_quality_summary: 'La principal falla es de legibilidad y naturalidad: «en nombre de que ustedes son de Mesías» suena antinatural y gramaticalmente deficiente en español. Además, «de Mesías» sin artículo resulta poco idiomático; en español eclesial amplio se entiende mejor «del Mesías». El resto del versículo es claro y digno. Se necesita una reparación pequeña pero importante para que el texto sea fiel y plenamente legible.'
  glossary_alignment: 'El borrador acierta al usar «Mesías» en vez de «Cristo» como forma principal para Χριστοῦ, con nota alternativa. No hay términos del glosario mayor en conflicto. La mejora necesaria es expresar la pertenencia con español natural: «del Mesías» y no «de Mesías».'
  issues:
  - severity: high
    issue: 'Construcción no idiomática: «en nombre de que ustedes son de Mesías»'
    rationale: No reproduce de manera legible la relación de ἐν ὀνόματι + ὅτι. En español, «en nombre de que» aquí resulta torpe y confuso; el lector no entiende con claridad si es causal, explicativo o formulístico.
  - severity: medium
    issue: Pertenencia expresada como «son de Mesías»
    rationale: Aunque intenta reflejar literalmente χριστοῦ ἐστε, en español natural y digno la forma esperable es «son del Mesías» o «pertenecen al Mesías». La ausencia del artículo vuelve la frase poco natural.
  - severity: low
    issue: La nota al pie no refleja la alternativa semántica principal
    rationale: El inglés auditado conserva una nota sobre «Christ's». En español conviene mantener la alternativa tradicional «Cristo», pero anclada al sintagma corregido para evitar ambigüedad.
  revised_spanish_text: 'Porque cualquiera que les dé a beber un vaso de agua en nombre de que ustedes son del[a] Mesías, en verdad les digo: no perderá de ningún modo su recompensa.'
  revised_footnotes:
  - marker: a
    text: 'O: «Cristo».'
    reason: alternative_reading
  revision_rationale: Se conserva la decisión formal de no suplir «mi nombre» y de mantener la relación estrecha entre «en nombre» y «que ustedes son...», pero se corrige la gramática y la idiomaticidad del español con «del Mesías». Es una reparación menor, no una reinterpretación. No requiere adjudicación adicional.
