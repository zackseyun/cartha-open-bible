    changes_summary: 'Revised “in my name” to reflect the Greek text more closely, which reads “in [the] name, because you are Christ’s,” not explicitly “my name.” Also adjusted “because you belong to the Messiah” to the more literal “that you are Christ’s,” preserving the source wording and formal register. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Porque cualquiera que les dé a beber un vaso de agua en nombre de que ustedes son del[a] Mesías, en verdad les digo: no perderá de ningún modo su recompensa.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὃς γὰρ ἂν
  english_pob_choice: For whoever
  chosen_spanish: Porque cualquiera que
  alternatives_spanish:
  - Porque quien
  - Pues cualquiera que
  lexicon: BDAG
  rationale: La construcción indefinida relativa se rinde de modo natural con «cualquiera que»; «Porque» conserva la conexión discursiva de γάρ sin volver la frase forzada en español.
- source_word: ποτίσῃ ὑμᾶς
  english_pob_choice: gives you ... to drink
  chosen_spanish: les dé a beber
  alternatives_spanish:
  - les dé de beber
  - les haga beber
  lexicon: BDAG
  rationale: ποτίζω significa dar de beber o hacer beber. «Les dé a beber» es idiomático en español y preserva la idea de proveer agua para beber sin añadir una paráfrasis innecesaria.
- source_word: ποτήριον ὕδατος
  english_pob_choice: a cup of water
  chosen_spanish: un vaso de agua
  alternatives_spanish:
  - una copa de agua
  - un recipiente de agua
  lexicon: BDAG
  rationale: Aunque ποτήριον es literalmente «copa» o «vaso», en español «un vaso de agua» comunica con claridad el gesto simple de ofrecer agua para beber; «copa» puede sonar más marcado o menos natural en este contexto.
- source_word: ἐν ὀνόματι
  english_pob_choice: in the name
  chosen_spanish: en nombre de
  alternatives_spanish:
  - en el nombre de
  - por causa del nombre
  lexicon: BDAG
  rationale: La frase preposicional se conserva de manera directa como fórmula de referencia a la identificación o lealtad asociada al nombre. En español, «en nombre de» es la equivalencia natural y suficientemente precisa.
- source_word: ὅτι χριστοῦ ἐστε
  english_pob_choice: because you are Messiah's
  chosen_spanish: de que ustedes son de Mesías
  alternatives_spanish:
  - porque ustedes son de Mesías
  - que ustedes son de Cristo
  lexicon: BDAG
  rationale: El griego admite lectura causal o explicativa; aquí se mantiene con «de que» para reflejar el encadenamiento tras «en nombre de». «De Mesías» conserva el valor titular de Χριστός según la preferencia del proyecto, y la construcción posesiva/semitizante «ser de» expresa pertenencia sin sobrecargar el texto.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: truly I say to you
  chosen_spanish: en verdad les digo
  alternatives_spanish:
  - amén, les digo
  - les aseguro
  lexicon: BDAG
  rationale: La fórmula solemne se vierte con «en verdad les digo», que mantiene el peso de ἀμήν y su tono declarativo en un español claro y digno.
- source_word: οὐ μὴ ἀπολέσῃ
  english_pob_choice: will certainly not lose
  chosen_spanish: no perderá de ningún modo
  alternatives_spanish:
  - ciertamente no perderá
  - de ninguna manera perderá
  lexicon: BDAG
  rationale: La doble negación enfática οὐ μή con subjuntivo aoristo exige una fuerza mayor que una negación simple. «No perderá de ningún modo» comunica bien la certeza enfática sin sonar arcaico.
- source_word: τὸν μισθὸν αὐτοῦ
  english_pob_choice: his reward
  chosen_spanish: su recompensa
  alternatives_spanish:
  - su salario
  - la recompensa de él
  lexicon: BDAG
  rationale: μισθός puede ser salario, paga o recompensa. En este contexto de recompensa por un acto de apoyo, «recompensa» es la equivalencia más natural y teológicamente clara en español.
theological_decisions:
- issue: Χριστός como título frente a forma tradicional 'Cristo'
  english_pob_reading: because you are Messiah's
  chosen_spanish_reading: de que ustedes son de Mesías
  alternative_spanish_readings:
  - porque ustedes son de Cristo
  - de que ustedes son de Cristo
  rationale: El contexto expresa pertenencia a Jesús mediante Χριστός como título. Conforme a la pauta del proyecto, se prefiere «Mesías» cuando la palabra funciona como título; la forma tradicional «Cristo» queda como alternativa posible, pero no es la primera opción aquí.
  doctrine_reference: 'DOCTRINE.md: contested terms — Χριστός normalmente ''Mesías'' como título; ''Cristo'' sólo cuando la idiomática o una decisión documentada lo requiera'
- issue: Alcance de ἐν ὀνόματι unido a ὅτι χριστοῦ ἐστε
  english_pob_reading: in the name that you are Messiah's
  chosen_spanish_reading: en nombre de que ustedes son de Mesías
  alternative_spanish_readings:
  - en nombre porque ustedes son de Mesías
  - en nombre de que son de Cristo
  rationale: La frase griega vincula la acción de dar agua con la identificación de los destinatarios como pertenecientes a Mesías. En español, «en nombre de que» conserva la relación formal sin introducir un sujeto posesivo no explícito como «mi nombre».
  doctrine_reference: 'DOCTRINE.md: no suplir pronombres posesivos del hablante sin base textual; conservar la relación causal/explicativa del ὅτι'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego de SBLGNT y toma en cuenta el historial auditado en inglés: se evitó añadir «mi» a ἐν ὀνόματι, se conservó el valor causal/explicativo de ὅτι χριστοῦ ἐστε, y se mantuvo la negación enfática de οὐ μή. También se respetó la restauración de Mesías frente a Cristo conforme a la política del proyecto.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» como término principal para Χριστός, con nota alternativa para «Cristo».
  - «Recompensa» se eligió para μισθός por coherencia con el contexto de retribución prometida.
  - La negación enfática se expresó con «no perderá de ningún modo» para reflejar οὐ μὴ.
  - «En nombre de» evita introducir un posesivo no presente en el griego y conserva la referencia relacional del texto.
