translation:
  language: es
  text: 'Juan le dijo[a]: «Maestro, vimos a alguien expulsando demonios en tu nombre, y tratamos de impedírselo porque no nos seguía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «intentamos prohibírselo». El imperfecto griego puede expresar una acción repetida o intentada; por eso «tratamos de impedírselo» comunica bien el matiz.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔφη αὐτῷ ὁ Ἰωάννης
  english_pob_choice: John said to him
  chosen_spanish: Juan le dijo
  alternatives_spanish:
  - Juan le estaba diciendo
  - Juan le respondió
  lexicon: BDAG
  rationale: ἔφη es un verbo narrativo de decir; en español, el pasado simple «dijo» comunica de forma natural la secuencia del relato. Se mantiene el destinatario con «le», y el sujeto explícito «Juan» conserva la referencia del griego.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - Profesor
  lexicon: BDAG
  rationale: El vocativo διδάσκαλε significa literalmente «maestro/enseñante». «Maestro» es claro, reverente y natural en español bíblico, sin trasladar el título a una forma más interpretativa o eclesial.
- source_word: εἴδομέν τινα
  english_pob_choice: we saw someone
  chosen_spanish: vimos a alguien
  alternatives_spanish:
  - vimos a una persona
  - vimos a cierto hombre
  lexicon: BDAG
  rationale: 'τινα es indefinido; «alguien» preserva esa indefinición sin especificar género ni identidad. El aoristo narrativo se vierte con pasado simple: «vimos».'
- source_word: ἐν τῷ ὀνόματί σου
  english_pob_choice: in your name
  chosen_spanish: en tu nombre
  alternatives_spanish:
  - por tu nombre
  - usando tu nombre
  lexicon: BDAG
  rationale: La expresión idiomática se conserva como «en tu nombre», que en español bíblico comunica correctamente la acción realizada bajo la autoridad de Jesús sin necesidad de paráfrasis.
- source_word: ἐκβάλλοντα δαιμόνια
  english_pob_choice: casting out demons
  chosen_spanish: expulsando demonios
  alternatives_spanish:
  - echando fuera demonios
  - arrojando demonios fuera
  lexicon: BDAG
  rationale: ἐκβάλλω con δαιμόνια describe actividad exorcística. «Expulsando demonios» es fiel y natural en español; evita una calca pesada y mantiene el sentido de expulsión efectiva.
- source_word: καὶ ἐκωλύομεν αὐτόν
  english_pob_choice: and we tried to stop him
  chosen_spanish: y tratamos de impedírselo
  alternatives_spanish:
  - y lo estábamos impidiendo
  - y se lo prohibíamos
  lexicon: BDAG
  rationale: El imperfecto ἐκωλύομεν puede sugerir acción intentada o reiterada. «Tratamos de impedírselo» conserva esa idea de intento, con un español idiomático más preciso que un simple pasado terminado.
- source_word: ὅτι οὐκ ἠκολούθει ἡμῖν
  english_pob_choice: because he was not following us
  chosen_spanish: porque no nos seguía
  alternatives_spanish:
  - porque no iba con nosotros
  - porque no nos acompañaba
  lexicon: BDAG
  rationale: ἀκολουθέω se traduce de forma básica como «seguir». «No nos seguía» preserva el referente a «nosotros» del griego y mantiene la tensión narrativa sobre la pertenencia al grupo, sin suavizarla.
theological_decisions:
- issue: 'Tensión del final: pertenencia al grupo versus seguimiento a Jesús'
  english_pob_reading: Render ἡμῖν straightforwardly as 'us' rather than smoothing to 'you/us' or 'our group.'
  chosen_spanish_reading: Mantener «no nos seguía» en vez de suavizar a «no te seguía» o «no era de los nuestros».
  alternative_spanish_readings:
  - porque no te seguía
  - porque no era de los nuestros
  rationale: 'El griego dice ἡμῖν, «a nosotros». Conservar «nos» deja visible la tensión narrativa: Juan mide la legitimidad del hombre en relación con el grupo de los discípulos. Eso prepara la corrección de Jesús en el contexto inmediato sin introducirla en la traducción.'
  doctrine_reference: Philosophy items 1 and 3
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y concuerda con el audit trail inglés; no se documentaron revisiones textuales ni cambios posteriores relevantes en el expediente. La decisión clave se mantuvo en el imperfecto ἐκωλύομεν, que en español conviene expresar como intento más que como prohibición consumada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se usa «Maestro» para διδάσκαλε, en línea con la precisión léxica del griego.
  - Se conserva la referencia plural «nos» para ἡμῖν, evitando interpretar el sujeto colectivo como «los suyos» o «los discípulos» en el texto principal.
  - «Expulsando demonios» preserva el sentido exorcístico sin reemplazarlo por terminología menos directa.
  - La nota al pie marca la alternativa verbal del imperfecto sin alterar el texto principal.
