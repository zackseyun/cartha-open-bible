source:
  edition: SBLGNT
  text: καὶ ἔλεγεν αὐτοῖς· Ἀμὴν λέγω ὑμῖν ὅτι εἰσίν τινες ⸂τῶν ὧδε⸃ ἑστηκότων οἵτινες οὐ μὴ γεύσωνται θανάτου ἕως ἂν ἴδωσιν τὴν βασιλείαν τοῦ θεοῦ ἐληλυθυῖαν ἐν δυνάμει.
base_translation:
  language: en
  yaml_path: translation/nt/mark/009/001.yaml
  text: And he was saying to them[a], “Truly I say to you[d][c][b], there are some standing here who will certainly not taste death until they see the kingdom of God having come in power.”
  footnotes:
  - marker: a
    text: Or, more formally, 'some of those standing here.'
    reason: lexical_alternative
  - marker: b
    text: The expression 'taste death' is an idiom meaning 'experience death' or 'die.'
    reason: lexical_alternative
  - marker: c
    text: '''Having come in power'' may be understood in connection with the transfiguration, resurrection, Pentecost, Jerusalem''s judgment, or the kingdom''s future consummation; the text itself does not specify which event is in view.'
    reason: alternative_reading
  - marker: d
    text: Or 'the kingdom of God having come in power'.
    reason: previous_rendering
