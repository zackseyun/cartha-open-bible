    changes_summary: Removed 'that' before 'the kingdom of God' to avoid an unnecessary English construction not present in the Greek, and rendered ἐληλυθυῖαν more directly as 'having come' rather than 'has come' for closer correspondence to the participial form.
translation:
  language: es
  text: 'Y les decía[a]: «En verdad les digo: hay algunos de los que están aquí que de ningún modo probarán la muerte[b] hasta que vean el reino de Dios que ha venido[c] con poder[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «les estaba diciendo».'
    reason: lexical_alternative
  - marker: b
    text: El giro «probar la muerte» es un modismo que significa «experimentar la muerte» o simplemente «morir».
    reason: lexical_alternative
  - marker: c
    text: El griego usa un participio perfecto («habiendo venido»), que expresa un estado resultante; en español se vierte como «que ha venido» para mantener el sentido con mayor naturalidad. El texto no especifica cuál acontecimiento histórico es la referencia.
    reason: theological_note
  - marker: d
    text: También puede traducirse «en poder». «Con poder» se usa aquí por claridad idiomática en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción discursiva en curso o reiterada; «les decía» conserva ese valor aspectual mejor que el pretérito simple, sin sonar forzado en español.
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: Amén
  alternatives_spanish:
  - En verdad
  - Ciertamente
  lexicon: BDAG
  rationale: En esta fórmula sinóptica, ἀμήν funciona como introito solemne. Mantener «Amén» preserva su forma marcada y auditabilidad; en español eclesial es inteligible y evita suavizar la solemnidad del dicho.
- source_word: τινες τῶν ὧδε ἑστηκότων
  english_pob_choice: some standing here
  chosen_spanish: algunos de los que están aquí
  alternatives_spanish:
  - algunos aquí que están de pie
  - algunos de estos que están aquí
  lexicon: BDAG
  rationale: 'La frase tiene sentido partitivo: no todos los presentes, sino un subconjunto. «Algunos de los que están aquí» refleja ese matiz con naturalidad; «están» comunica el estado presente de ἑστηκότων sin introducir una imagen demasiado literal de postura.'
- source_word: οὐ μὴ γεύσωνται θανάτου
  english_pob_choice: will certainly not taste death
  chosen_spanish: no probarán de ningún modo la muerte
  alternatives_spanish:
  - no conocerán la muerte
  - no morirán
  lexicon: BDAG
  rationale: Se conserva el modismo «probar la muerte» para no borrar la metáfora, y se refuerza la negación enfática de οὐ μή con «de ningún modo». «Morirán» es más llano, pero pierde la fuerza idiomática documentada por la POB inglesa.
- source_word: ἕως ἂν ἴδωσιν
  english_pob_choice: until they see
  chosen_spanish: hasta que vean
  alternatives_spanish:
  - hasta ver
  - hasta el momento en que vean
  lexicon: BDAG
  rationale: La construcción temporal se vierte de manera directa y natural en español. «Hasta que vean» mantiene la referencia al futuro contingente sin añadir explicaciones que el texto no da.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: «Reino de Dios» es la equivalencia estable y adecuada para βασιλεία en los evangelios, preservando tanto la dimensión dinámica como la escatológica sin forzar una paráfrasis interpretativa.
- source_word: ἐληλυθυῖαν
  english_pob_choice: having come
  chosen_spanish: habiendo venido
  alternatives_spanish:
  - venida
  - que ha venido
  lexicon: BDAG
  rationale: El participio perfecto femenino acusativo modifica a «reino». «Habiendo venido» mantiene la idea de un estado resultante de la venida con cercanía formal al griego. Se evita resolverlo con una cláusula explicativa que podría estrechar indebidamente el texto.
- source_word: ἐν δυνάμει
  english_pob_choice: in power
  chosen_spanish: en poder
  alternatives_spanish:
  - con poder
  - poderosamente
  lexicon: BDAG
  rationale: «En poder» reproduce de forma sobria la preposición griega y conserva la referencia a la manifestación del poder divino sin especificar el modo de esa manifestación.
theological_decisions:
- issue: Identidad del evento al que alude «el reino de Dios habiendo venido en poder»
  english_pob_reading: Render the phrase without specifying whether it refers to the transfiguration, resurrection, Pentecost, Jerusalem's fall, or the consummation.
  chosen_spanish_reading: 'Traducir la expresión sin identificar el acontecimiento concreto: transfiguración, resurrección/exaltación, Pentecostés, juicio sobre Jerusalén o consumación final.'
  alternative_spanish_readings:
  - la transfiguración
  - la resurrección/exaltación
  - Pentecostés
  - la caída de Jerusalén
  - la consumación final del reino
  rationale: El griego no nombra el evento, y la tradición exegética ofrece varias propuestas mayores. La traducción debe preservar esa tensión sin resolverla por adelantado.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción española sigue la última revisión inglesa al conservar la forma participial («having come») sin introducir una cláusula explicativa («que ha venido»). También toma en cuenta la decisión auditada de mantener la tensión interpretativa sobre el evento referido, evitando concretarlo en la traducción.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto base lo requiera; aquí no aparece.
  - Se mantiene «reino de Dios» por coherencia con el estándar POB para βασιλεία.
  - Se conserva el modismo «probar la muerte» para reflejar el griego y la elección inglesa.
  - «Amén» se deja sin traducir como marca solemne de discurso, coherente con el valor fórmula de ἀμήν en los evangelios.
