revisions:
- from: 'Y les decía[a]: «Amén[b] les digo[c]: hay algunos de los que están aquí que no probarán de ningún modo la muerte[d] hasta que vean el reino de Dios habiendo venido[e] en poder».'
  to: 'Y les decía[a]: «En verdad les digo: hay algunos de los que están aquí que de ningún modo probarán la muerte[b] hasta que vean el reino de Dios que ha venido[c] con poder[d]».'
  rationale: Se ajusta la fórmula solemne a un español más natural («En verdad les digo»), se conserva la negación enfática y el modismo «probar la muerte», y se reemplaza el calco poco idiomático «habiendo venido» por «que ha venido», que comunica mejor en español el valor resultativo del participio perfecto sin resolver la ambigüedad teológica del texto. También se mejora «en poder» a «con poder» por legibilidad.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:37:41Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego en la estructura principal: imperfecto narrativo («les decía»), dicho solemne introductorio, sentido partitivo de «algunos de los que están aquí», negación enfática, y preservación de la tensión interpretativa sobre la venida del reino. Sin embargo, dos elecciones españolas no son las más fieles ni naturales: «Amén les digo» suena transliterativo y poco idiomático en español en este contexto, y «habiendo venido» produce una construcción muy forzada después de «vean».'
  spanish_quality_summary: 'La redacción es mayormente clara, pero tiene varios roces de naturalidad: la doble nota en torno a «Amén» es redundante; «probarán de ningún modo la muerte» es comprensible, aunque algo pesado; y sobre todo «vean el reino de Dios habiendo venido en poder» resulta poco legible en español. Una reformulación más idiomática puede conservar el valor del participio perfecto sin resolver la referencia teológica.'
  glossary_alignment: 'No hay conflicto con los términos base del proyecto: «Dios», «reino», etc. El punto principal es discursivo y estilístico: para Ἀμὴν, aunque el inglés auditado justificó «Truly», en español eclesial moderno la mejor equivalencia aquí es «En verdad», no «Amén», porque la transliteración en esta fórmula sinóptica suena menos natural. También conviene verter ἐν δυνάμει como «con poder» en lugar de «en poder» por claridad española, sin pérdida de sentido.'
  issues:
  - severity: medium
    issue: «Amén les digo» es poco idiomático en español para la fórmula Ἀμὴν λέγω ὑμῖν.
    rationale: Aunque puede defenderse por cercanía formal, en español bíblico actual «En verdad les digo» o «Les aseguro» comunica mejor la función solemne de ἀμήν. El propio audit trail inglés prefirió una equivalencia funcional («Truly»), no transliteración.
  - severity: medium
    issue: «vean el reino de Dios habiendo venido en poder» es demasiado forzado en español.
    rationale: La cercanía formal al participio perfecto griego no compensa la falta de naturalidad. En español, una relativa o una completiva preserva mejor el sentido resultativo sin imponer una construcción extraña. La traducción debe ser fiel al significado, no al calco sintáctico.
  - severity: low
    issue: Las notas b y c sobre «Amén» son en parte redundantes.
    rationale: Ambas explican prácticamente la misma decisión discursiva. Puede simplificarse a una sola nota si se mantiene una observación lexical relevante.
  - severity: low
    issue: «en poder» suena menos natural que «con poder» en español.
    rationale: Ambas pueden defenderse, pero «con poder» es más claro y habitual en español general y eclesial, mientras sigue reflejando ἐν δυνάμει sin sobreinterpretación.
  revised_spanish_text: 'Y les decía[a]: «En verdad les digo: hay algunos de los que están aquí que de ningún modo probarán la muerte[b] hasta que vean el reino de Dios que ha venido[c] con poder[d]».'
  revised_footnotes:
