  text: καὶ ὅπου ⸀ἐὰν αὐτὸν καταλάβῃ ῥήσσει αὐτόν, καὶ ἀφρίζει καὶ τρίζει τοὺς ⸀ὀδόντας καὶ ξηραίνεται· καὶ εἶπα τοῖς μαθηταῖς σου ἵνα αὐτὸ ἐκβάλωσιν, καὶ οὐκ ἴσχυσαν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/009/018.yaml
  text: And wherever it seizes him[a], it throws him down, and he foams and grinds his teeth and becomes rigid. And I told your disciples to cast it out, but they were not able.
