translation:
  language: es
  text: Y cada vez que se apodera de él, lo derriba, y echa espuma, y rechina los dientes y se queda rígido[a]. Y les dije a tus discípulos que lo echaran fuera, pero no pudieron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se marchita», «se va consumiendo» o, más literalmente, «se seca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπου ἐὰν
  english_pob_choice: wherever
  chosen_spanish: dondequiera que
  alternatives_spanish:
  - dondequiera que
  - cada vez que
  lexicon: BDAG
  rationale: La combinación griega expresa una condición indefinida y repetida; en español, «dondequiera que» comunica bien esa fuerza sin perder naturalidad.
- source_word: καταλάβῃ
  english_pob_choice: seizes
  chosen_spanish: lo toma
  alternatives_spanish:
  - lo agarra
  - se apodera de él
  lexicon: BDAG
  rationale: «Toma» conserva la idea de capturar o sujetar con fuerza, aunque en español el verbo «seize» no tiene un equivalente único tan idiomático en este contexto.
- source_word: ῥήσσει
  english_pob_choice: throws him down
  chosen_spanish: lo derriba
  alternatives_spanish:
  - lo arroja al suelo
  - lo tira al suelo
  lexicon: BDAG
  rationale: El contexto de exorcismo describe una acción violenta que lo hace caer; «derriba» reproduce bien el efecto físico sin introducir más detalle del que ofrece el griego.
- source_word: ἀφρίζει
  english_pob_choice: foams
  chosen_spanish: echa espuma
  alternatives_spanish:
  - echa espuma por la boca
  - babea con espuma
  lexicon: BDAG
  rationale: «Echa espuma» es una forma natural en español para el síntoma descrito; no se añadió «por la boca» porque el griego no lo explicita.
- source_word: τρίζει τοὺς ὀδόντας
  english_pob_choice: grinds his teeth
  chosen_spanish: rechina los dientes
  alternatives_spanish:
  - cruje los dientes
  - aprienta los dientes
  lexicon: BDAG
  rationale: «Rechina los dientes» es la equivalencia española más natural para el rozamiento o fricción dental descritos por el verbo griego.
- source_word: ξηραίνεται
  english_pob_choice: becomes rigid
  chosen_spanish: se queda rígido
  alternatives_spanish:
  - se seca
  - se marchita
  - se pone tieso
  lexicon: BDAG
  rationale: El POB inglés opta por «becomes rigid» por el contexto sintomático; en español, «se queda rígido» comunica esa interpretación clínica sin borrar que el verbo también puede significar «se seca» o «se marchita».
- source_word: εἶπα
  english_pob_choice: I told
  chosen_spanish: les dije
  alternatives_spanish:
  - les hablé
  - les dije a
  lexicon: BDAG
  rationale: «Les dije» preserva el habla directa y la relación con los discípulos de una manera natural en español.
- source_word: ἐκβάλωσιν
  english_pob_choice: to cast it out
  chosen_spanish: lo echaran fuera
  alternatives_spanish:
  - lo expulsaran
  - lo sacaran
  lexicon: BDAG
  rationale: En contexto exorcístico, ἐκβάλλω se expresa bien con «echar fuera»; se mantiene el pronombre neutro/objetal del griego con «lo».
- source_word: οὐκ ἴσχυσαν
  english_pob_choice: they were not able
  chosen_spanish: no pudieron
  alternatives_spanish:
  - no fueron capaces
  - no tuvieron fuerza
  lexicon: BDAG
  rationale: «No pudieron» reproduce la incapacidad sin añadir una explicación causal que el texto no da.
theological_decisions:
- issue: Referente de αὐτό en «cast it out»
  english_pob_reading: The pronoun refers to the unclean spirit/demon afflicting the boy, not to the sickness abstractly.
  chosen_spanish_reading: El pronombre se refiere al espíritu inmundo/demonio que aflige al muchacho, no a la enfermedad en abstracto.
  alternative_spanish_readings:
  - El pronombre podría entenderse de manera más general como la aflicción.
  - Podría traducirse como «expulsarlo» sin especificar el referente.
  rationale: La escena es de expulsión de un espíritu hostil; mantener el objeto con «lo» y la frase exorcística «echar fuera» respeta el contexto narrativo y la lectura del POB en inglés.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando la nota [a] directamente en la traducción, sin cambiar el contenido auditado del verso. No hubo cambios sustantivos respecto al último pase revisado en inglés.
  spanish_consistency_notes:
  - Se mantuvo «echar fuera» para el lenguaje exorcístico, coherente con el POB inglés.
  - Se conservó el pronombre objeto «lo» para reflejar el griego αὐτό y su referente espiritual implícito.
  - Se evitó «Cristo»/«Señor» porque no aparecen en este versículo.
  - Se eligió «dondequiera que» para el valor indefinido-repetido de ὅπου ἐὰν.
  - La nota [a] está anclada al verbo ambiguo «rígido» para reflejar la tensión léxica del griego.
