    rationale: La nota explica alternativas de ξηραίνεται («se seca», «se marchita», etc.), no del pronombre objeto. Debe anclarse donde aparece «rígido» o la expresión equivalente.
  - severity: medium
    issue: Contenido de la nota al pie redundante e impreciso.
    rationale: 'La nota actual dice «se seca» dos veces y no refleja limpiamente las alternativas del rastro inglés: «becomes withered», «wastes away», o más literalmente «dries up».'
  - severity: low
    issue: «Dondequiera que» no es la mejor opción contextual para ὅπου ἐὰν.
    rationale: Aunque posible, en este contexto de ataques repetidos del espíritu suena más natural y fiel en español una construcción temporal/eventual como «cada vez que» o «cuando sea que».
