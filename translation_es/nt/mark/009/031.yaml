translation:
  language: es
  text: 'Porque estaba enseñando a sus discípulos y les decía: «El Hijo del Hombre va a ser entregado en manos de hombres[a], y lo matarán, y después de que lo maten, después de tres días resucitará[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en manos humanas». El griego dice literalmente «en manos de hombres».
    reason: lexical_alternative
  - marker: b
    text: O «en tres días». Aquí el griego dice «después de tres días», una formulación que también aparece en otros lugares junto con «al tercer día».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐδίδασκεν
  english_pob_choice: was teaching
  chosen_spanish: estaba enseñando
  alternatives_spanish:
  - enseñaba
  - seguía enseñando
  lexicon: BDAG
  rationale: El imperfecto expresa acción en curso en el trasfondo narrativo; «estaba enseñando» conserva ese aspecto de manera natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del contexto anterior; «Porque» conserva la fuerza conectiva sin agregar inferencia extra.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - alumnos
  - seguidores
  lexicon: BDAG
  rationale: Término estándar en los evangelios; mantiene la relación de aprendizaje y seguimiento.
- source_word: ἔλεγεν
  english_pob_choice: telling
  chosen_spanish: les decía
  alternatives_spanish:
  - les estaba diciendo
  - les hablaba
  lexicon: BDAG
  rationale: Otro imperfecto que expresa continuidad; «les decía» es natural y conserva la reiteración o continuidad de la enseñanza.
- source_word: Ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: The Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del Hombre
  lexicon: BDAG
  rationale: Se conserva la forma titulativa tradicional y el posible trasfondo daniélico sin parafrasear.
- source_word: παραδίδοται
  english_pob_choice: is being handed over
  chosen_spanish: es entregado
  alternatives_spanish:
  - es entregado en manos de
  - es puesto en manos de
  lexicon: BDAG
  rationale: El pasivo presente indica una acción en curso o inminente; «es entregado» mantiene la amplitud semántica del verbo sin restringirlo a «traicionado». La nota [a] preserva la alternativa idiomática del griego literal.
- source_word: εἰς χεῖρας ἀνθρώπων
  english_pob_choice: into the hands of men
  chosen_spanish: en manos de hombres
  alternatives_spanish:
  - en manos humanas
  - a manos de hombres
  lexicon: BDAG
  rationale: Conserva la imagen concreta de poder/control. «Hombres» reproduce ἀνθρώπων y el contraste retórico con «el Hijo del Hombre»; por eso se evita neutralizarlo sin base textual.
- source_word: ἀποκτενοῦσιν
  english_pob_choice: they will kill
  chosen_spanish: lo matarán
  alternatives_spanish:
  - lo darán muerte
  - lo pondrán a muerte
  lexicon: BDAG
  rationale: Verbo futuro activo plural; «matarán» es directo, claro y fiel al sentido básico.
- source_word: ἀποκτανθεὶς
  english_pob_choice: after he is killed
  chosen_spanish: después de haber sido muerto
  alternatives_spanish:
  - después de ser muerto
  - cuando haya sido muerto
  lexicon: BDAG
  rationale: El participio aoristo pasivo expresa una acción previa al verbo principal; «después de haber sido muerto» conserva esa secuencia. Se mantiene la pasiva para no suavizar la formulación del griego.
- source_word: μετὰ τρεῖς ἡμέρας
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - en tres días
  - al cabo de tres días
  lexicon: BDAG
  rationale: Μετά con acusativo normalmente significa «después de»; se traduce según el griego de este versículo, sin armonizarlo con otras formulaciones de resurrección.
- source_word: ἀναστήσεται
  english_pob_choice: he will rise
  chosen_spanish: resucitará
  alternatives_spanish:
  - se levantará
  - será levantado
  lexicon: BDAG
  rationale: El futuro medio funciona de manera intransitiva; en español bíblico «resucitará» comunica con naturalidad la idea de levantarse de entre los muertos.
theological_decisions:
- issue: Contraste entre ὁ υἱὸς τοῦ ἀνθρώπου y ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - seres humanos
  - humanos
  rationale: «Hombres» conserva el contraste léxico y retórico entre el título «el Hijo del Hombre» y los agentes humanos ordinarios. No se neutraliza la referencia sin necesidad textual.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Alcance de παραδίδοται
  english_pob_reading: is being handed over
  chosen_spanish_reading: es entregado
  alternative_spanish_readings:
  - es traicionado
  - es puesto en manos de
  rationale: El pasivo griego no identifica al agente y puede abarcar entrega, arresto, traición y permiso divino. «Es entregado» preserva esa tensión teológica sin resolverla de antemano.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Secuencia temporal de ἀποκτανθεὶς ... μετὰ τρεῖς ἡμέρας
  english_pob_reading: after he is killed, after three days
  chosen_spanish_reading: después de haber sido muerto, después de tres días
  alternative_spanish_readings:
  - al ser muerto, al cabo de tres días
  - muerto, a los tres días
  rationale: 'El orden español sigue el orden del griego: primero la muerte, luego el intervalo de tres días, y finalmente la resurrección. Se evita armonizarlo con otras variantes bíblicas que dicen «al tercer día».'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Se incorporó la corrección de la revisión inglesa que reordenó la cláusula final para reflejar con más naturalidad la secuencia del griego: primero «después de haber sido muerto», luego «después de tres días resucitará». La redacción española mantiene esa secuencia y evita armonizar indebidamente con otras formulaciones.'
  spanish_consistency_notes:
  - Se conservó «el Hijo del Hombre» como título fijo.
  - Se prefirió «hombres» en vez de una abstracción neutral para reproducir el contraste del griego con el título mesiánico.
  - Se mantuvo la voz pasiva en «es entregado» y «después de haber sido muerto» para no borrar la ambigüedad agente/permiso presente en el original.
  - Se usó «resucitará» como equivalente natural del futuro intransitivo de ἀναστήσεται.
  - Las notas al pie están ancladas exactamente en el texto mediante [a] y [b].
