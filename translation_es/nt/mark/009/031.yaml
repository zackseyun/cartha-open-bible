  text: ἐδίδασκεν γὰρ τοὺς μαθητὰς αὐτοῦ καὶ ἔλεγεν αὐτοῖς ὅτι Ὁ υἱὸς τοῦ ἀνθρώπου παραδίδοται εἰς χεῖρας ἀνθρώπων, καὶ ἀποκτενοῦσιν αὐτόν, καὶ ἀποκτανθεὶς ⸂μετὰ τρεῖς ἡμέρας⸃ ἀναστήσεται.
base_translation:
  language: en
  yaml_path: translation/nt/mark/009/031.yaml
  text: For he was teaching his disciples and telling them[a], “The Son of Man is being handed over into the hands of men, and they will kill him, and after he is killed[b], after three days he will rise.”
  footnotes:
  - marker: a
    text: Or “into human hands.” The Greek literally says “into the hands of men.”
    reason: lexical_alternative
  - marker: b
    text: Or “in three days.” Here the Greek reads “after three days,” a phrasing also used elsewhere alongside “on the third day.”
    reason: alternative_reading
