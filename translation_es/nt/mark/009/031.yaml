revisions:
- from: 'Porque estaba enseñando a sus discípulos y les decía: «El Hijo del Hombre es entregado[a] en manos de hombres, y lo matarán; y después de haber sido muerto[b], después de tres días resucitará».'
  to: 'Porque estaba enseñando a sus discípulos y les decía: «El Hijo del Hombre va a ser entregado en manos de hombres[a], y lo matarán, y después de que lo maten, después de tres días resucitará[b]».'
  rationale: Se ajusta la redacción para que suene natural en español sin perder el sentido del griego ni las decisiones del POB. «Va a ser entregado» expresa bien el presente pasivo con matiz de inminencia; «en manos de hombres» conserva el contraste con «el Hijo del Hombre»; «después de que lo maten» reemplaza una pasiva forzada por una construcción temporal clara y fiel. La nota [a] se ancla donde realmente recae la alternativa léxica, y la nota [b] se conserva para la variante «en tres días».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:40:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: imperfectos de trasfondo («estaba enseñando», «les decía»), título «el Hijo del Hombre», pasivo de παραδίδοται, contraste con «hombres», y la secuencia muerte → después de tres días → resurrección. También conserva adecuadamente la nota sobre «después de tres días».'
  spanish_quality_summary: 'La principal dificultad es de naturalidad y exactitud idiomática en dos puntos: «es entregado en manos de hombres» suena poco natural en español; «es entregado en manos de» o «es entregado a manos de» no es la mejor solución. Además, «después de haber sido muerto» es gramaticalmente posible pero muy forzado y poco legible en español bíblico actual. Una formulación más natural y fiel es «va a ser entregado en manos de hombres ... y después de que lo maten, después de tres días resucitará».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hijo del Hombre», «hombres» y «resucitará» están alineados con el expediente inglés y la racionalidad léxica. La revisión propuesta mantiene la tensión semántica de παραδίδοται sin reducirla a «traicionado».
  issues:
  - severity: medium
    issue: «es entregado[a] en manos de hombres»
    rationale: Aunque transmite la idea general, en español suena poco idiomático. La expresión establecida es «ser entregado en manos de ...», y además el presente griego con valor inminente puede expresarse mejor como «va a ser entregado» para sonar natural sin perder el pasivo ni la tensión del original.
  - severity: medium
    issue: «después de haber sido muerto[b]»
    rationale: Es una construcción demasiado pesada y poco natural en español. El participio aoristo pasivo se puede reflejar fielmente con una subordinada temporal pasiva/activa impersonal equivalente, como «después de que lo maten», que preserva la anterioridad respecto de «resucitará» y mejora mucho la legibilidad.
  - severity: low
    issue: Ubicación de la nota [a]
    rationale: La nota alternativa corresponde mejor a la frase completa «en manos de hombres» que solo a «entregado», porque la alternativa inglesa contrasta «hands of men» con «human hands».
  revised_spanish_text: 'Porque estaba enseñando a sus discípulos y les decía: «El Hijo del Hombre va a ser entregado en manos de hombres[a], y lo matarán, y después de que lo maten, después de tres días resucitará[b]».'
  revised_footnotes:
  - marker: a
    text: O «en manos humanas». El griego dice literalmente «en manos de hombres».
    reason: lexical_alternative
  - marker: b
    text: O «en tres días». Aquí el griego dice «después de tres días», una formulación que también aparece en otros lugares junto con «al tercer día».
    reason: alternative_reading
  revision_rationale: Se ajusta la redacción para que suene natural en español sin perder el sentido del griego ni las decisiones del POB. «Va a ser entregado» expresa bien el presente pasivo con matiz de inminencia; «en manos de hombres» conserva el contraste con «el Hijo del Hombre»; «después de que lo maten» reemplaza una pasiva forzada por una construcción temporal clara y fiel. La nota [a] se ancla donde realmente recae la alternativa léxica, y la nota [b] se conserva para la variante «en tres días».
