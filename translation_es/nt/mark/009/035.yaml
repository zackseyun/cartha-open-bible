review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: «sentándose», «llamó a los doce», la condición «Si alguien quiere ser el primero», y el futuro resultativo «será el último de todos». También es adecuado suavizar el presente histórico λέγει a pasado en español narrativo. El único desajuste significativo con el sentido fuente y con la auditoría inglesa está en διάκονος: el griego significa ‘servidor/siervo/servidor de mesa’, no ‘esclavo’.'
  spanish_quality_summary: El español es claro, natural y digno. La sintaxis funciona bien y la nota sobre «los Doce» está correctamente anclada. Sin embargo, «esclavo de todos» suena léxica y teológicamente demasiado fuerte para διάκονος y además introduce una precisión equivocada donde el texto habla de servicio, no de esclavitud.
  glossary_alignment: 'El borrador sigue bien las convenciones del proyecto en general, pero incumple un principio léxico importante: «esclavo» se reserva normalmente para δοῦλος, mientras que διάκονος aquí debe representarse con «servidor» o «siervo». Dado que la auditoría inglesa documenta explícitamente ‘servant’ para evitar un matiz eclesiástico de ‘minister’, la mejor correspondencia española es «servidor de todos»; «siervo de todos» también sería posible, pero «servidor» es más claro y moderno en español neutral.'
  issues:
  - severity: high
    issue: διάκονος fue traducido como «esclavo».
    rationale: διάκονος no equivale a δοῦλος. «Esclavo» sobretraduce el término, altera el contraste semántico del original y contradice la rationale auditada del inglés, que escogió ‘servant’ precisamente por fidelidad léxica.
  - severity: medium
    issue: La rationale léxica española para «esclavo» apela a intensificar el dicho más allá del valor del término fuente.
    rationale: La política del proyecto permite fuerza léxica cuando el original la tiene, pero aquí la intensidad se logra por la inversión ‘primero/último’ y por ‘de todos’, no por cambiar διάκονος a un término más fuerte.
  revised_spanish_text: 'Y sentándose,[a] llamó a los doce y les dijo: «Si alguien quiere ser el primero, será el último de todos y servidor de todos».'
  revised_footnotes:
  - marker: a
    text: O «los Doce».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «esclavo» por «servidor» para reflejar con precisión διάκονος y alinearse con la decisión léxica auditada del inglés (‘servant of all’). Se mantiene el resto del versículo porque representa fielmente el griego y suena natural en español narrativo.
