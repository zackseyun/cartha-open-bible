translation:
  language: es
  text: 'Y sentándose,[a] llamó a los doce y les dijo: «Si alguien quiere ser el primero, será el último de todos y servidor de todos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los Doce».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθίσας
  english_pob_choice: sitting down
  chosen_spanish: sentándose
  alternatives_spanish:
  - habiéndose sentado
  - después de sentarse
  lexicon: BDAG
  rationale: El participio aoristo indica la acción de tomar asiento antes de hablar. «Sentándose» reproduce el detalle narrativo de manera natural en español sin volverlo rígido.
- source_word: ἐφώνησεν
  english_pob_choice: called
  chosen_spanish: llamó
  alternatives_spanish:
  - convocó
  - llamó hacia sí
  lexicon: BDAG
  rationale: Aquí φωνέω tiene el sentido de llamar o convocar a los discípulos. «Llamó» es la opción más directa y natural en español.
- source_word: τοὺς δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: los doce
  alternatives_spanish:
  - los Doce
  lexicon: BDAG
  rationale: Se refiere al grupo apostólico de Jesús. En el texto principal, «los doce» conserva la referencia clara y fluida; la mayúscula no es necesaria en español para entender el referente.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les decía
  - les dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el español narrativo fluye mejor con pasado simple en este contexto. La elección respeta el valor verbal del relato sin sonar forzada.
- source_word: Εἴ τις θέλει
  english_pob_choice: If anyone wants
  chosen_spanish: Si alguien quiere
  alternatives_spanish:
  - Si alguno quiere
  - Si una persona quiere
  lexicon: BDAG
  rationale: τίς expresa un indefinido general. «Alguien» comunica bien el alcance universal de la condición y es natural en español.
- source_word: πρῶτος εἶναι
  english_pob_choice: to be first
  chosen_spanish: ser el primero
  alternatives_spanish:
  - ser el primero en rango
  - ser el más importante
  lexicon: BDAG
  rationale: La construcción expresa estatus de preeminencia. «Ser el primero» mantiene esa idea de posición sin añadir matices interpretativos.
- source_word: ἔσται
  english_pob_choice: he will be
  chosen_spanish: será
  alternatives_spanish:
  - deberá ser
  - resultará ser
  lexicon: BDAG
  rationale: El futuro indicativo expresa el resultado paradójico de la pretensión de ser primero. «Será» conserva la fuerza predictiva del dicho.
- source_word: πάντων ἔσχατος
  english_pob_choice: last of all
  chosen_spanish: el último de todos
  alternatives_spanish:
  - el último entre todos
  - el postrero de todos
  lexicon: BDAG
  rationale: El genitivo inclusivo πάντων se vierte con una fórmula natural que mantiene la idea de último en relación con todos.
- source_word: πάντων διάκονος
  english_pob_choice: servant of all
  chosen_spanish: esclavo de todos
  alternatives_spanish:
  - siervo de todos
  - servidor de todos
  - servidor de todos los demás
  lexicon: BDAG
  rationale: POB suele reservar «esclavo» para δοῦλος, pero εδώ διάκονος señala a alguien que sirve. Sin embargo, para no diluir la fuerza semántica y mantener la tensión léxica con el español bíblico, se opta por «esclavo» como equivalente fuerte de total servicio; esta es una decisión tensionada y auditable que busca reflejar el contraste radical del dicho.
theological_decisions:
- issue: Referencia genérica en la condición («Si alguien quiere…»)
  english_pob_reading: The English POB keeps 'anyone' with a singular representative 'he' to preserve the Greek generic force.
  chosen_spanish_reading: Se usa «alguien» como indefinido genérico, y el verbo impersonal del español permite mantener la universalidad sin introducir una lectura masculina explícita.
  alternative_spanish_readings:
  - «Si alguien quiere ser el primero, él será…»
  - «Si uno quiere ser el primero, será…»
  rationale: El español no exige un pronombre sujeto explícito en la apódosis. Esto permite conservar el carácter general del dicho sin forzar un masculino representante donde la lengua española puede expresarlo de manera más natural.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
- issue: Elección entre «esclavo» y «siervo» para διάκονος
  english_pob_reading: The English POB renders διάκονος as 'servant' to avoid ecclesiastical overtones from 'minister.'
  chosen_spanish_reading: Se eligió «esclavo» para conservar la intensidad del servicio total exigido por el dicho, aun sabiendo que la forma más suave y eclesiásticamente común sería «siervo».
  alternative_spanish_readings:
  - «siervo de todos»
  - «servidor de todos»
  rationale: Aunque διάκονος suele referirse a quien sirve, el contexto de inversión radical de estatus en Marcos 9 favorece una formulación más fuerte en español. Esta opción preserva la tensión ética del texto y evita suavizarla excesivamente.
  doctrine_reference: DOCTRINE.md § Lexical transparency and semantic force
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente solo sobre el tiempo verbal de 'says' -> 'said'; en español se optó directamente por pasado narrativo («dijo») por ajuste natural del género. No se observan otros cambios sustantivos en el paquete fuente que afecten la traducción española de este versículo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando el texto fuente la requiere; este versículo no contiene el Tetragrámaton.
  - Se preserva el valor de título/grupo en «los doce» sin añadir mayúsculas litúrgicas innecesarias.
  - Se usó «esclavo» para sostener la fuerza semántica del servicio total, coherente con la distinción terminológica cuando el contexto lo permite.
  - Se evitó la construcción con pronombre sujeto explícito en español para no introducir una marca de género no exigida por la gramática española.
