review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: prohibición de impedirlo, razón introducida por γάρ, acción hecha en el nombre de Jesús y la improbabilidad de hablar mal de él poco después. Sin embargo, añade un matiz no explícito con «luego» y la elección «hecho poderoso» suena poco idiomática para δύναμιν en español bíblico actual; «obra poderosa» refleja mejor el campo semántico y el historial POB. También conviene anclar la nota léxica al término relevante, no separar artificialmente el cierre de cita con una nota final.'
  spanish_quality_summary: El español es comprensible, pero «haga un hecho poderoso» resulta torpe y poco natural. La secuencia «luego pueda pronto» es redundante y menos fiel que simplemente «pronto pueda». «No lo impidan» es aceptable, aunque «No se lo impidan» sería más coloquial; no es necesario cambiarlo. La puntuación y el registro general son adecuados.
  glossary_alignment: Sin conflictos con la terminología base del proyecto. «Jesús», «en mi nombre» y «hablar mal de mí» están alineados. La principal mejora terminológica es sustituir «hecho poderoso» por «obra poderosa» para δύναμιν, manteniendo la alternativa «milagro» en nota.
  issues:
  - severity: medium
    issue: «hecho poderoso» para δύναμιν
    rationale: Aunque intenta preservar la amplitud semántica, en español suena poco idiomático y menos claro que «obra poderosa», que además coincide mejor con la decisión inglesa auditada («mighty work»).
  - severity: medium
    issue: Adición de «luego»
    rationale: El griego no expresa «then/luego»; la revisión inglesa incluso eliminó ese matiz. «Pronto» basta para representar ταχὺ.
  - severity: low
    issue: Ubicación de la nota [b] al final de la cita
    rationale: La nota léxica sobre κακολογῆσαί debe anclarse en «hablar mal de mí», no en el signo de cierre, para mayor claridad editorial.
  revised_spanish_text: 'Pero Jesús dijo: «No lo impidan, porque no hay nadie que haga una [a]obra poderosa en mi nombre y pronto pueda [b]hablar mal de mí».'
  revised_footnotes:
  - marker: a
    text: También podría traducirse «milagro» o «obra poderosa»; el griego dice literalmente «un hecho/poder» (δύναμιν).
    reason: lexical_alternative
  - marker: b
    text: O «hablar contra mí», «injuriarme» o «calumniarme»; el griego expresa la idea de «hablar mal de mí».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «hecho poderoso» por «obra poderosa» para lograr una expresión natural y fiel a δύναμιν, se elimina «luego» porque no está en el griego y ya fue descartado en la auditoría inglesa, y se reubica la nota léxica sobre κακολογῆσαί en la frase correspondiente.
