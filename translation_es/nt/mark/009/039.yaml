translation:
  language: es
  text: 'Pero Jesús dijo: «No lo impidan, porque no hay nadie que haga una [a]obra poderosa en mi nombre y pronto pueda [b]hablar mal de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También podría traducirse «milagro» o «obra poderosa»; el griego dice literalmente «un hecho/poder» (δύναμιν).
    reason: lexical_alternative
  - marker: b
    text: O «hablar contra mí», «injuriarme» o «calumniarme»; el griego expresa la idea de «hablar mal de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: κωλύετε
  english_pob_choice: stop
  chosen_spanish: impidan
  alternatives_spanish:
  - detengan
  - estorben
  - prohíban
  lexicon: BDAG
  rationale: En este contexto, el imperativo con μή funciona como prohibición. «No lo impidan» comunica la acción de evitar que siga actuando sin sonar tan coloquial como «detenerlo», y conserva la fuerza negativa del mandato.
- source_word: δύναμιν
  english_pob_choice: a mighty work
  chosen_spanish: hecho poderoso
  alternatives_spanish:
  - milagro
  - obra poderosa
  - obra de poder
  lexicon: BDAG
  rationale: La palabra griega puede referirse a poder/obra poderosa y no obliga a traducirla como «milagro». «Hecho poderoso» mantiene la amplitud semántica y deja visible la tensión entre acto extraordinario y manifestación de poder, sin cerrar el sentido demasiado pronto.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - sobre la base de mi nombre
  - bajo mi nombre
  - por mi nombre
  lexicon: BDAG
  rationale: La fórmula de agencia/autoridad en este contexto se expresa de manera natural y fiel con «en mi nombre» en español, que conserva el valor de actuar bajo la autoridad invocada de Jesús.
- source_word: ταχὺ
  english_pob_choice: soon
  chosen_spanish: luego... pronto
  alternatives_spanish:
  - pronto
  - rápidamente
  - de inmediato
  lexicon: BDAG
  rationale: El adverbio expresa cercanía temporal. La combinación «luego... pronto» intenta reflejar el orden y la inmediatez relativa del griego sin convertirlo en un adverbio meramente de manera.
- source_word: κακολογῆσαί
  english_pob_choice: to speak evil of
  chosen_spanish: hablar mal
  alternatives_spanish:
  - hablar mal de
  - injuriar
  - calumniar
  - maldecir
  lexicon: BDAG
  rationale: El verbo significa hablar contra alguien de forma injuriosa o negativa. «Hablar mal de mí» es una equivalencia idiomática clara y suficientemente amplia; no restringe el sentido a la calumnia formal ni lo intensifica indebidamente a «maldecir».
- source_word: οὐδεὶς γάρ ἐστιν ὃς
  english_pob_choice: for there is no one who
  chosen_spanish: porque no hay nadie que
  alternatives_spanish:
  - pues no existe quien
  - porque nadie
  - ya que no hay quien
  lexicon: BDAG
  rationale: La estructura exclamativa/negativa se vierte de modo natural en español con «porque no hay nadie que», conservando el énfasis universal del original sin forzar el orden griego.
- source_word: δυνήσεται
  english_pob_choice: be able to
  chosen_spanish: pueda
  alternatives_spanish:
  - podrá
  - ser capaz de
  - pueda llegar a
  lexicon: BDAG
  rationale: El futuro de δύναμαι expresa capacidad futura. En español, «pueda» dentro de la subordinada con «nadie que...» suena natural y conserva la idea de posibilidad/capacidad futura sin sobrecargar con perífrasis.
theological_decisions:
- issue: Naturaleza de δύναμιν en este versículo
  english_pob_reading: Rendered as 'a mighty work' rather than 'a miracle.'
  chosen_spanish_reading: Se traduce como «hecho poderoso» y no como «milagro».
  alternative_spanish_readings:
  - milagro
  - obra portentosa
  - miráculo
  rationale: El griego dice literalmente «poder/fuerza» en singular acusativo, y el contexto de ministerio en el nombre de Jesús permite una acción poderosa sin obligar a la categoría técnica «milagro». «Hecho poderoso» preserva la amplitud del término y evita estrechar el texto más de lo que el original requiere.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre obrar en el nombre de Jesús y luego hablar mal de él
  english_pob_reading: The verse is rendered descriptively without implying full discipleship or doctrinal approval beyond the text.
  chosen_spanish_reading: 'La traducción mantiene el argumento práctico de Jesús sin inferir más de lo que afirma: quien actúa poderosamente en su nombre no será presentado como alguien que inmediatamente lo desacredita.'
  alternative_spanish_readings:
  - Una paráfrasis que insinuara verdadero discipulado
  - Una paráfrasis que insinuara oportunismo puro
  rationale: El dicho de Jesús establece una improbabilidad retórica, no una clasificación exhaustiva de la persona. La redacción española conserva esa prudencia y no añade juicios doctrinales que el versículo no expresa.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El inglés POB pasó de «a work of power» a «a mighty work» para naturalidad y cercanía al griego, y eliminó «then» por no estar explícito. La versión española sigue esa revisión al evitar una paráfrasis excesiva, conservar la referencia a δύναμις con un sintagma amplio y no añadir un conector temporal que no esté en el original. También adopta una formulación idiomática para κωλύετε y κακολογῆσαί, manteniendo la tensión léxica sin normalizarla en exceso.
  spanish_consistency_notes:
  - Se usa «Jesús» sin artículo, conforme al estilo del pasaje.
  - «En mi nombre» mantiene la fórmula estable de autoridad/invocación.
  - No se introduce «Cristo» ni «Señor», porque el griego no los usa aquí.
  - «Hablar mal de mí» conserva la amplitud semántica de κακολογέω y evita una traducción demasiado jurídica o demasiado fuerte.
