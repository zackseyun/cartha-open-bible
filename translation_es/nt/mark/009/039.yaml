revisions:
- from: 'Pero Jesús dijo: «No lo impidan, porque no hay nadie que haga un [a]hecho poderoso en mi nombre y luego pueda pronto hablar mal de mí»[b].'
  to: 'Pero Jesús dijo: «No lo impidan, porque no hay nadie que haga una [a]obra poderosa en mi nombre y pronto pueda [b]hablar mal de mí».'
  rationale: Se reemplaza «hecho poderoso» por «obra poderosa» para lograr una expresión natural y fiel a δύναμιν, se elimina «luego» porque no está en el griego y ya fue descartado en la auditoría inglesa, y se reubica la nota léxica sobre κακολογῆσαί en la frase correspondiente.
