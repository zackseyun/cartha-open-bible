translation:
  language: es
  text: 'Y tomando a un niño[a], lo puso en medio de ellos, y tomándolo en sus brazos[b], les dijo:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Niño» traduce παιδίον sin obligar el diminutivo de «niñito» o «pequeño niño», que podrían sonar más interpretativos que el griego aquí.
    reason: lexical_alternative
  - marker: b
    text: También puede entenderse «abrazándolo». El verbo griego permite tanto la idea de tomar en brazos como la de abrazar; aquí se opta por la imagen más concreta.
    reason: lexical_alternative
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: taking
  chosen_spanish: y tomando
  alternatives_spanish:
  - habiendo tomado
  - después de tomar
  lexicon: BDAG
  rationale: El participio aoristo introduce la acción previa a la principal. «Tomando» conserva la secuencia verbal natural en español sin añadir explicitación ajena al griego.
- source_word: παιδίον
  english_pob_choice: a child
  chosen_spanish: a un niño
  alternatives_spanish:
  - a un pequeño niño
  - a un niño pequeño
  lexicon: BDAG
  rationale: παιδίον nombra a un niño; en español, «niño» es claro y digno. El diminutivo puede sugerir afecto o edad muy pequeña, pero no es necesario forzarlo aquí.
- source_word: ἔστησεν
  english_pob_choice: he set him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo hizo estar
  lexicon: BDAG
  rationale: El verbo es causativo de ἵστημι, con la idea de poner o hacer que esté de pie. En español, «lo puso» comunica el acto de situarlo sin sonar artificial; «lo colocó» también es posible, pero menos directo.
- source_word: ἐν μέσῳ αὐτῶν
  english_pob_choice: in their midst
  chosen_spanish: en medio de ellos
  alternatives_spanish:
  - entre ellos
  - en su medio
  lexicon: BDAG
  rationale: La expresión es idiomática y espacial. «En medio de ellos» mantiene la imagen céntrica y es natural en español.
- source_word: ἐναγκαλισάμενος
  english_pob_choice: taking him in his arms
  chosen_spanish: tomándolo en sus brazos
  alternatives_spanish:
  - abrazándolo
  - teniéndolo en sus brazos
  lexicon: BDAG
  rationale: El verbo puede significar tomar en brazos o abrazar. «Tomándolo en sus brazos» preserva la concreción física del gesto y evita reducirlo solo a un abrazo.
- source_word: εἶπεν αὐτοῖς
  english_pob_choice: he said to them
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo a ellos
  lexicon: BDAG
  rationale: La construcción normal con dativo indirecto se expresa de forma natural con «les dijo». Mantiene el sentido directo y sobrio del original.
translation_notes:
  revision_awareness: El texto griego de esta versión presenta una secuencia simple de participio aoristo + verbo principal + complemento locativo + participio aoristo; la redacción española sigue esa progresión sin depender mecánicamente del inglés auditado. Se tuvo en cuenta la revisión inglesa que prefirió «set him» frente a «stood him», pero en español se eligió «lo puso» por ser el equivalente natural de ἔστησεν en este contexto.
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según corresponda en otros pasajes; aquí no aparece terminología divina.
  - Se conserva un registro sobrio y eclesial, evitando arcaísmos innecesarios.
  - «Tomando» y «tomándolo» mantienen la relación participial del griego sin convertirla en una paráfrasis narrativa.
