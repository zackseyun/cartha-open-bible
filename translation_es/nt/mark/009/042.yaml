revisions:
- from: Y cualquiera que haga tropezar a uno de estos pequeños que creen en mí, mejor le sería que le colgaran al cuello una piedra de molino de asno[a] y que lo arrojaran al mar.
  to: Y cualquiera que haga tropezar a uno de estos pequeños que creen en mí, más le valdría que le pusieran al cuello una gran piedra de molino[a] y lo arrojaran al mar.
  rationale: Se revisa para mejorar la naturalidad del español sin perder el sentido del griego ni la trazabilidad con el POB inglés. «Gran piedra de molino» comunica claramente el referente; la nota conserva la especificación de μύλος ὀνικός. «Más le valdría» suena más idiomático en español para esta advertencia fuerte.
