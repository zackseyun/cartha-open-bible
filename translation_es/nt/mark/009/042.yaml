review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: mantiene la metáfora de σκανδαλίσῃ con «haga tropezar», conserva el alcance amplio de «estos pequeños que creen en mí», y comunica adecuadamente la severidad de la comparación. Sin embargo, «piedra de molino de asno» suena poco idiomático en español y no expresa con claridad que se trata de la piedra grande movida por un asno. También conviene acercar «al mar» a «al mar/la sea» del griego con «al mar» es aceptable, pero la formulación global puede hacerse más natural sin perder precisión.'
  spanish_quality_summary: La redacción es comprensible y digna, pero «mejor le sería que le colgaran...» y especialmente «piedra de molino de asno» suenan algo forzadas. Una formulación más natural y fiel en español eclesial moderno es «más le valdría que le pusieran al cuello una gran piedra de molino[a] y lo arrojaran al mar», dejando en nota la especificación lexical de que era movida por un asno.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Haga tropezar» sigue bien la decisión para σκανδαλίζω. «Pequeños» preserva la amplitud teológica. La principal mejora es lexical/estilística en μύλος ὀνικός: en español conviene texto principal claro («gran piedra de molino») con nota que preserve «específicamente, una movida por un asno».'
  issues:
  - severity: medium
    issue: «piedra de molino de asno» es poco natural en español
    rationale: Aunque intenta calcar μύλος ὀνικός, la expresión resulta extraña y puede confundir al lector. El inglés auditado ya preserva la especificidad en nota; en español, una forma más idiomática en el texto principal mejora la legibilidad sin perder la precisión lexical.
  - severity: low
    issue: «mejor le sería» suena menos natural que «más le valdría» en este contexto de advertencia severa
    rationale: Ambas opciones son fieles, pero «más le valdría» es una formulación española más fluida y plenamente equivalente para καλόν ἐστιν αὐτῷ μᾶλλον en una advertencia proverbial.
  revised_spanish_text: Y cualquiera que haga tropezar a uno de estos pequeños que creen en mí, más le valdría que le pusieran al cuello una gran piedra de molino[a] y lo arrojaran al mar.
  revised_footnotes:
