translation:
  language: es
  text: Y cualquiera que haga tropezar a uno de estos pequeños que creen en mí, más le valdría que le pusieran al cuello una gran piedra de molino[a] y lo arrojaran al mar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una piedra de molino movida por un asno».
    reason: lexical_alternative
lexical_decisions:
- source_word: σκανδαλίσῃ
  english_pob_choice: causes ... to stumble
  chosen_spanish: haga tropezar
  alternatives_spanish:
  - haga pecar
  - haga caer
  lexicon: BDAG
  rationale: σκανδαλίζω conserva la imagen de hacer tropezar, caer o apartarse; «haga tropezar» mantiene la metáfora sin reducirla a una sola interpretación moral.
- source_word: ἕνα τῶν μικρῶν τούτων
  english_pob_choice: one of these little ones
  chosen_spanish: uno de estos pequeños
  alternatives_spanish:
  - uno de estos niños pequeños
  - uno de estos humildes
  lexicon: BDAG
  rationale: «Pequeños» preserva la amplitud del grupo señalado por μικροί sin limitarlo a edad física; en el contexto incluye vulnerabilidad y condición humilde.
- source_word: τῶν πιστευόντων εἰς ἐμέ
  english_pob_choice: who believe in me
  chosen_spanish: que creen en mí
  alternatives_spanish:
  - que confían en mí
  - que tienen fe en mí
  lexicon: BDAG
  rationale: La frase participial identifica a los pequeños como creyentes en Jesús. «Creen en mí» es directo y fiel a πιστεύω εἰς con objeto personal.
- source_word: μύλος ὀνικός
  english_pob_choice: a donkey millstone
  chosen_spanish: una piedra de molino de asno
  alternatives_spanish:
  - una gran piedra de molino
  - una piedra de molino movida por un asno
  lexicon: BDAG
  rationale: La expresión designa la piedra de molino grande movida por un asno. «De asno» comunica la referencia específica de forma compacta; la alternativa más explicativa queda implícita en la nota.
- source_word: περίκειται ... περὶ τὸν τράχηλον
  english_pob_choice: is put around his neck
  chosen_spanish: le colgaran al cuello
  alternatives_spanish:
  - le pusieran alrededor del cuello
  - le colgaran alrededor del cuello
  lexicon: BDAG
  rationale: El giro describe algo colocado alrededor del cuello. En español, la pasiva impersonal con «le colgaran al cuello» resulta natural y conserva la imagen violenta.
- source_word: βέβληται εἰς τὴν θάλασσαν
  english_pob_choice: he is thrown into the sea
  chosen_spanish: lo arrojaran al mar
  alternatives_spanish:
  - lo echaran al mar
  - fuera arrojado al mar
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un resultado vívido; en español, la construcción impersonal con subjuntivo en contexto comparativo suena natural y mantiene la fuerza del castigo.
theological_decisions:
- issue: Alcance de «estos pequeños»
  english_pob_reading: Rendered broadly enough to include vulnerable believers, not restricted to children alone.
  chosen_spanish_reading: «Estos pequeños» queda abierto a creyentes vulnerables, sin limitarlo solo a niños.
  alternative_spanish_readings:
  - estos niños pequeños
  - estos discípulos humildes
  rationale: La frase posterior «que creen en mí» muestra que el alcance no debe estrecharse a la niñez biológica. La traducción conserva la tensión interpretativa sin resolverla de antemano.
  doctrine_reference: Preservar la tensión interpretativa del texto.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión final del inglés POB, que ajustó la expresión a «donkey millstone» por precisión léxica. La versión española refleja esa precisión con «piedra de molino de asno», evitando una paráfrasis excesiva y manteniendo la imagen concreta del griego.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se prefirió «que creen en mí» por fidelidad al participio presente πιστευόντων y por naturalidad en español.
  - La nota al pie preserva la alternativa léxica relevante para μύλος ὀνικός sin introducir terminología eclesiástica ajena al texto.
