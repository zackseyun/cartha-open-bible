revisions:
- from: 'Pero cuando Jesús vio que la multitud se agolpaba rápidamente[a], reprendió al espíritu inmundo, diciéndole: «Espíritu mudo y sordo, yo te mando: sal de él y no vuelvas a entrar en él jamás».'
  to: 'Pero cuando Jesús vio que una multitud se estaba reuniendo rápidamente[a], reprendió al espíritu inmundo, diciéndole: «Espíritu sordo y mudo, yo te mando: sal de él y no vuelvas a entrar en él jamás».'
  rationale: Se ajusta ἐπισυντρέχει ὄχλος a una formulación española que expresa mejor la convergencia rápida del gentío, preservando en nota una alternativa más gráfica y cercana al valor de ‘correr juntos’. También se mejora levemente la naturalidad del vocativo en español con «sordo y mudo», sin alterar el sentido ni la teología del pasaje. No se requieren cambios doctrinales ni una adjudicación adicional.
