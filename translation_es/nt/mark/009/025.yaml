translation:
  language: es
  text: 'Pero cuando Jesús vio que una multitud se estaba reuniendo rápidamente[a], reprendió al espíritu inmundo, diciéndole: «Espíritu sordo y mudo, yo te mando: sal de él y no vuelvas a entrar en él jamás».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una multitud estaba corriendo a juntarse». El verbo griego sugiere personas que convergen con rapidez.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: But when ... saw
  chosen_spanish: Pero cuando ... vio
  alternatives_spanish:
  - Y cuando ... vio
  - Ahora bien, cuando ... vio
  lexicon: BDAG
  rationale: El participio aoristo introduce la circunstancia del verbo principal; δέ aporta una transición narrativa leve. «Pero cuando» mantiene esa relación temporal y el giro narrativo de forma natural en español.
- source_word: ἐπισυντρέχει ὄχλος
  english_pob_choice: a crowd was quickly gathering
  chosen_spanish: la multitud se agolpaba rápidamente
  alternatives_spanish:
  - la multitud se reunía rápidamente
  - la multitud corría a juntarse
  lexicon: BDAG
  rationale: ἐπισυντρέχω expresa convergencia rápida, incluso con matiz de correr juntos. «Se agolpaba rápidamente» comunica la rapidez y el movimiento convergente sin sonar forzado en español.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - recriminó
  - amonestó con severidad
  lexicon: BDAG
  rationale: En los Evangelios, ἐπιτιμάω es el verbo de reprensión autoritativa de Jesús. «Reprendió» conserva ese tono de autoridad; «reprendió al espíritu» es idiomático y fiel.
- source_word: τῷ πνεύματι τῷ ἀκαθάρτῳ
  english_pob_choice: the unclean spirit
  chosen_spanish: al espíritu inmundo
  alternatives_spanish:
  - al espíritu impuro
  lexicon: BDAG
  rationale: ἀκάθαρτος en contexto de exorcismo es el término técnico de impureza ritual/moral. «Inmundo» mantiene la fuerza tradicional y el valor de categoría espiritual del texto; «impuro» es posible, pero menos marcado.
- source_word: Τὸ ἄλαλον καὶ κωφὸν πνεῦμα
  english_pob_choice: You mute and deaf spirit
  chosen_spanish: Espíritu mudo y sordo
  alternatives_spanish:
  - Espíritu sin habla y sordo
  - Espíritu mudo y que no oye
  lexicon: BDAG
  rationale: 'Aunque el griego usa artículo nominativo en vocativo de dirección, el español requiere un vocativo natural. Se conservan ambos adjetivos: ἄλαλος = «mudo»; κωφός = «sordo». No se suaviza a «sin habla» porque se perdería la paridad léxica.'
- source_word: ἐγὼ ἐπιτάσσω σοι
  english_pob_choice: I command you
  chosen_spanish: yo te mando
  alternatives_spanish:
  - yo te ordeno
  - yo mismo te mando
  lexicon: BDAG
  rationale: ἐπιτάσσω denota un mandato con autoridad. «Mando» es natural en español bíblico y conserva el peso imperativo; el pronombre explícito «yo» retiene el énfasis del griego.
- source_word: ἔξελθε ἐξ αὐτοῦ
  english_pob_choice: come out of him
  chosen_spanish: sal de él
  alternatives_spanish:
  - sal fuera de él
  - sal de dentro de él
  lexicon: BDAG
  rationale: En lenguaje de exorcismo, «sal de él» transmite con claridad el imperativo de salida. «Come out» en inglés suele equivaler a «sal» en español, que es más idiomático y directo.
- source_word: μηκέτι εἰσέλθῃς εἰς αὐτόν
  english_pob_choice: never enter him again
  chosen_spanish: no vuelvas a entrar en él jamás
  alternatives_spanish:
  - no entres en él nunca más
  - no entres más en él
  lexicon: BDAG
  rationale: μηκέτι expresa «ya no / no más» y la construcción prohibitiva apunta a una exclusión futura definitiva. «No vuelvas a entrar en él jamás» mantiene el énfasis de prohibición total y el matiz de reingreso.
theological_decisions:
- issue: Terminología demonológica y autoridad de Jesús
  english_pob_reading: Translate πνεῦμα ἀκάθαρτον straightforwardly as 'unclean spirit' and ἐπιτάσσω/ἐπετίμησεν with strong authority language ('rebuked,' 'I command you')
  chosen_spanish_reading: Traducir πνεῦμα ἀκάθαρτον de manera directa como «espíritu inmundo» y ἐπετίμησεν/ἐπιτάσσω con lenguaje de autoridad («reprendió», «yo te mando»).
  alternative_spanish_readings:
  - espíritu malo
  - espíritu impuro
  - le habló con severidad
  rationale: El pasaje presenta un ser personal al que Jesús dirige una orden autoritativa. La traducción no debe diluirlo en lenguaje de enfermedad ni convertir la reprensión en mera dureza verbal. «Espíritu inmundo» conserva la categoría bíblica del texto y su trasfondo de impureza; el mandato verbal refleja la autoridad de Jesús sin añadir explicación doctrinal.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 6
- issue: Vocativo nominativo con artículo en ἄλαλον καὶ κωφὸν πνεῦμα
  english_pob_reading: You mute and deaf spirit
  chosen_spanish_reading: «Espíritu mudo y sordo» como vocativo natural en español, sin reproducir mecánicamente el artículo griego.
  alternative_spanish_readings:
  - «Oh espíritu mudo y sordo»
  - «Espíritu, tú que eres mudo y sordo»
  rationale: El griego usa artículo con nominativo en una forma de dirección o apelación. En español, el vocativo se expresa mejor con la sola frase nominal. No se introduce «oh» ni una paráfrasis explicativa porque el texto no lo exige.
  doctrine_reference: Gramática del vocativo; filosofía de traducción §§1, 2
translation_notes:
  revision_awareness: El texto griego y el expediente inglés muestran alta concordancia y no requieren enmiendas sustantivas. Se mantuvieron la fuerza de ἐπισυντρέχει y la reprensión autoritativa de Jesús, con adaptación natural al español.
  spanish_consistency_notes:
  - Se usó «Yahvé» no aplicable en este versículo.
  - Se conservó «espíritu inmundo» para ἀκάθαρτος, en continuidad con la terminología bíblica de exorcismo.
  - Se eligió «mudo» para ἄλαλος y «sordo» para κωφός para no aplanar la distinción léxica.
  - «Yo te mando» preserva el énfasis del pronombre explícito ἐγώ.
  - La nota [a] marca la alternativa lexical de ἐπισυντρέχει sin alterar el flujo principal del versículo.
