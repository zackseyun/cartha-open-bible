translation:
  language: es
  text: 'Y Pedro respondió y dijo a Jesús: «Rabí, es bueno que estemos aquí, y hagamos tres refugios[a]: uno para ti, uno para Moisés y uno para Elías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tiendas» o «tabernáculos». El griego σκηνάς se refiere a estructuras temporales de cobijo y puede tener asociaciones con tiendas o tabernáculos, pero el versículo no hace explícitas esas asociaciones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió y dijo
  lexicon: BDAG
  rationale: La forma participial narrativa se expresa de modo natural en español con un verbo de respuesta. 'Respondió' conserva el vínculo formal con el griego; se integra con 'y dijo' para reflejar la secuencia narrativa del texto fuente sin volverlo pesado.
- source_word: λέγει
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, el pasado narrativo es más natural y fiel en español sin perder el sentido. 'Dijo' evita una sonoridad artificiosa.
- source_word: Ῥαββί
  english_pob_choice: Rabbi
  chosen_spanish: Rabí
  alternatives_spanish:
  - Rabbi
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título semítico como forma de tratamiento respetuosa. 'Rabí' es el equivalente usual en español bíblico y mantiene la transparencia cultural del término.
- source_word: καλόν ἐστιν ἡμᾶς ὧδε εἶναι
  english_pob_choice: it is good for us to be here
  chosen_spanish: bueno es que nosotros estemos aquí
  alternatives_spanish:
  - es bueno que estemos aquí
  - bueno es para nosotros estar aquí
  lexicon: BDAG
  rationale: Se preserva la valoración impersonal de καλόν ἐστιν y la idea de presencia local. La construcción con subjuntivo en español fluye de manera natural y mantiene el tono evaluativo de Pedro.
- source_word: ποιήσωμεν
  english_pob_choice: let us make
  chosen_spanish: hagamos
  alternatives_spanish:
  - construyamos
  - levantemos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se traduce con una forma inclusiva equivalente. 'Hagamos' mantiene la intención de propuesta inmediata sin añadir el matiz interpretativo de 'construir'.
- source_word: σκηνάς
  english_pob_choice: shelters
  chosen_spanish: refugios
  alternatives_spanish:
  - tiendas
  - chozas
  - tabernáculos
  lexicon: BDAG
  rationale: '''Refugios'' comunica la idea básica de estructuras temporales para cobijo en español claro y digno. Se evita ''tabernáculos'' por su fuerte carga litúrgica y ''tiendas'' por posibles ambigüedades modernas; el término no pretende fijar connotaciones festivas ausentes del verso.'
- source_word: σοὶ μίαν καὶ Μωϋσεῖ μίαν καὶ Ἠλίᾳ μίαν
  english_pob_choice: one for you, one for Moses, and one for Elijah
  chosen_spanish: uno para ti, uno para Moisés y uno para Elías
  alternatives_spanish:
  - uno para ti, uno para Moisés y uno para Elías
  lexicon: BDAG
  rationale: Se conserva la repetición distributiva de μίαν y el paralelismo del griego. 'Para ti' refleja el dativo de destinatario sin sobrecargar la sintaxis.
theological_decisions:
- issue: Posibles connotaciones cultuales o festivas de σκηνάς
  english_pob_reading: Use the neutral main-text rendering 'shelters'
  chosen_spanish_reading: Usar 'refugios' en el texto principal
  alternative_spanish_readings:
  - tiendas
  - chozas
  - tabernáculos
  rationale: El verso no explicita una alusión a la Fiesta de los Tabernáculos ni a la tienda sagrada. Para no importar una asociación teológica no marcada por el texto, el principal opta por un término neutral y claro; las alternativas se conservan en la nota.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el pasaje griego SBLGNT y coincide con el sentido auditado de la POB inglesa; no se registran revisiones posteriores que alteren la lectura base.
  spanish_consistency_notes:
  - Se usa 'Jesús' en el texto principal y 'Rabí' como tratamiento respetuoso semítico.
  - Se mantiene 'Moisés' y 'Elías' con la ortografía española estándar.
  - El verbo de respuesta y el presente histórico griego se acomodan a una narración natural en español sin perder precisión.
  - La nota de pie preserva las alternativas léxicas tradicionales sin trasladarlas al texto principal.
