translation:
  language: es
  text: Pero les digo que Elías también ha venido[a], y le hicieron todo lo que quisieron, tal como está escrito acerca de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, Elías ya ha venido en la persona y el ministerio de Juan el Bautista; véanse Marcos 9:11–12 y compárese Mateo 11:14; 17:12–13.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce contraste de forma natural en español y conserva la oposición con la expectativa previa sin endurecer innecesariamente el tono.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - yo les digo
  - les afirmo
  lexicon: BDAG
  rationale: Reproduce la fórmula directa de habla de manera idiomática en español, manteniendo la dirección personal a los oyentes.
- source_word: ὅτι καὶ Ἠλίας ἐλήλυθεν
  english_pob_choice: that Elijah also has come
  chosen_spanish: que Elías también ha venido
  alternatives_spanish:
  - que Elías también vino
  - que incluso Elías ha venido
  lexicon: BDAG
  rationale: El perfecto griego se vierte con 'ha venido' para conservar el valor de acción completada con relevancia presente; 'también' refleja καὶ en el sentido de 'además / asimismo'.
- source_word: ἐποίησαν αὐτῷ
  english_pob_choice: they did to him
  chosen_spanish: le hicieron
  alternatives_spanish:
  - lo trataron
  - le hicieron a él
  lexicon: BDAG
  rationale: '''Hicieron'' con dativo indirecto conserva la amplitud del verbo griego antes de ser precisado por la cláusula siguiente, y suena natural en español.'
- source_word: ὅσα ἤθελον
  english_pob_choice: whatever they wanted
  chosen_spanish: todo lo que quisieron
  alternatives_spanish:
  - cuanto quisieron
  - todo cuanto quisieron
  lexicon: BDAG
  rationale: La construcción expresa extensión sin límite; en español, 'todo lo que quisieron' comunica bien esa idea y mantiene el alcance absoluto del texto.
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justamente como está escrito
  lexicon: BDAG
  rationale: La fórmula escritural se expresa con una equivalencia natural y reverente, preservando el carácter de cita autorizada.
- source_word: ἐπ’ αὐτόν
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - contra él
  lexicon: BDAG
  rationale: En contexto de cita con γράφω, ἐπί + acusativo puede significar 'acerca de / concerniente a'; 'acerca de él' evita la lectura polémica de 'contra él' que aquí no es la más probable.
theological_decisions:
- issue: Identidad de Elías en el contexto de Marcos 9
  english_pob_reading: Retain 'Elijah' in the main text without interpretive expansion.
  chosen_spanish_reading: Conservar 'Elías' en el texto principal y explicar la identificación interpretativa en nota.
  alternative_spanish_readings:
  - incluir 'es decir, Juan el Bautista' en el texto principal
  - omitir cualquier aclaración interpretativa
  rationale: El versículo nombra a Elías explícitamente; la identificación con Juan el Bautista pertenece al razonamiento contextual y no debe incorporarse al cuerpo del texto como si fuera parte del enunciado mismo. La nota preserva la tensión exegética sin resolverla por adelantado.
  doctrine_reference: Marcos 9:11–13; Mateo 11:14; 17:12–13
translation_notes:
  revision_awareness: 'Coincide con la decisión revisada del POB en inglés: mantener la afirmación sobre Elías sin expandirla en el texto principal, y explicar la identificación tipológica en una nota de referencia cruzada.'
  spanish_consistency_notes:
  - Usa 'Elías' en lugar de 'Elijah' y conserva el nombre propio bíblico estándar en español.
  - Mantiene 'ha venido' para reflejar el perfecto griego, no un simple pasado narrativo.
  - '''Acerca de él'' conserva la apertura semántica de ἐπ’ αὐτόν en contexto escritural.'
  - La nota al pie marca la tensión interpretativa sin introducirla en el texto principal.
