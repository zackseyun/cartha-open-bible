translation:
  language: es
  text: 'Y llegaron a Capernaúm. Y cuando estaba en la casa, les preguntó: «¿Qué conversaban[a] en el camino?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué discutían en el camino?». El verbo puede referirse a conversación, debate o disputa; el versículo siguiente muestra que el tema era cuál de ellos era el mayor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦλθον
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - fueron
  - arribaron
  lexicon: BDAG
  rationale: El aoristo narrativo de ἔρχομαι en este contexto expresa llegada al destino. En español, «llegaron» comunica de manera natural ese movimiento con εἰς + lugar.
- source_word: Καφαρναούμ
  english_pob_choice: Capernaum
  chosen_spanish: Capernaúm
  alternatives_spanish:
  - Cafarnaúm
  lexicon: Convención bíblica castellana / transliteración
  rationale: Se conserva el topónimo en forma reconocible para lectura eclesial en español, ajustando la acentuación gráfica al uso habitual en castellano bíblico.
- source_word: ἐν τῇ οἰκίᾳ
  english_pob_choice: in the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - en el hogar
  - en la vivienda
  lexicon: BDAG
  rationale: La presencia del artículo y el sustantivo concreto requieren reflejar un lugar específico. «La casa» conserva el escenario físico sin volverlo interpretativo.
- source_word: γενόμενος
  english_pob_choice: when he was
  chosen_spanish: cuando estaba
  alternatives_spanish:
  - después de haber entrado
  - una vez que estuvo allí
  - habiendo llegado
  lexicon: BDAG
  rationale: El participio de γίνομαι funciona temporalmente con el verbo principal siguiente. «Cuando estaba» mantiene la relación temporal en español sin forzar el participio.
- source_word: ἐπηρώτα
  english_pob_choice: he asked
  chosen_spanish: les preguntó
  alternatives_spanish:
  - les estaba preguntando
  - les interpeló
  lexicon: BDAG
  rationale: Aunque el imperfecto sugiere acción en desarrollo, en narración española «les preguntó» resulta natural y suficientemente flexible para el valor imperfectivo en contexto.
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Sobre qué?
  lexicon: BDAG
  rationale: El interrogativo neutro se vierte con el equivalente idiomático español «qué», sin añadir una restricción que el griego no exige.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - de camino
  lexicon: BDAG
  rationale: Para español, «en el camino» transmite el valor locativo/idiomático de la expresión en un contexto de viaje. «Camino» evita el calco duro de «la vía».
- source_word: διελογίζεσθε
  english_pob_choice: were you discussing
  chosen_spanish: estaban discutiendo
  alternatives_spanish:
  - estaban hablando
  - estaban debatiendo
  - estaban argumentando
  lexicon: BDAG
  rationale: διαλογίζομαι puede abarcar discusión, debate o disputa. Dado el contexto inmediato, «discutiendo» conserva la amplitud y permite la posible tensión sin cerrarla prematuramente con una lectura demasiado intensa.
theological_decisions:
- issue: Cambio de sujeto implícito tras el plural de ἦλθον
  english_pob_reading: 'Translate the plural arrival as ''they came'' and the singular subsequent action as Jesus speaking: ''when he was in the house, he asked them.'''
  chosen_spanish_reading: 'Se mantiene el plural en la llegada y se deja claro el sujeto singular implícito en la pregunta: «cuando estaba en la casa, les preguntó».'
  alternative_spanish_readings:
  - «cuando él entró en la casa, les preguntó»
  - «después de entrar en la casa, les preguntó»
  rationale: La gramática griega cambia naturalmente de plural a singular, con Jesús como sujeto implícito. El español elegido evita ambigüedad sin agregar información no presente en el texto.
  doctrine_reference: Narrativa y gramática del texto; no implica cuestión doctrinal.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del contexto inglés, que prefirió una forma narrativa más natural para ἐπηρώτα sin perder su valor imperfectivo. En español se optó por una solución igualmente natural: «les preguntó».'
  spanish_consistency_notes:
  - Se conserva «Capernaúm» como topónimo bíblico estándar en español.
  - Se usa «casa» y no «hogar» para mantener el escenario concreto con el artículo definido del griego.
  - Se prefirió «discutiendo» para no cerrar de antemano la gama semántica de διαλογίζομαι.
