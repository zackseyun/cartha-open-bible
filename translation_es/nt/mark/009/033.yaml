    text: O «¿Qué discutían en el camino?». El verbo puede referirse a conversación, debate o disputa; el versículo siguiente muestra que el tema era cuál de ellos era el mayor.
    reason: lexical_alternative
  revision_rationale: Se cambió «estaban discutiendo» por «conversaban» para preservar mejor la amplitud semántica de διελογίζεσθε sin adelantar un tono de disputa. Se movió la nota al verbo/pregunta pertinente y se reescribió para que corresponda exactamente a la alternativa léxica documentada en la auditoría inglesa. El resto del texto puede mantenerse.
