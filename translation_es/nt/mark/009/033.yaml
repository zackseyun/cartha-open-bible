review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: llegada plural a Capernaúm, cambio natural al sujeto singular implícito para la acción de Jesús en la casa, y la pregunta sobre lo ocurrido durante el trayecto. «Llegaron», «en la casa» y «les preguntó» son fieles al sentido fuente y coherentes con el rastro POB. Sin embargo, «estaban discutiendo» estrecha demasiado διελογίζεσθε hacia disputa/pelea, mientras que el griego y la auditoría inglesa prefieren un término más amplio que deje abierta la matización, reservando la nota para la alternativa más fuerte.'
  spanish_quality_summary: 'El español es claro y natural. La sintaxis fluye bien y suena eclesialmente legible. La principal mejora necesaria es léxica: en español bíblico general, «discutir» suele percibirse más conflictivo que «discussing» en inglés, por lo que conviene una opción más amplia como «conversando» o «discutiendo entre ustedes» con nota. Además, la nota actual no corresponde exactamente al anclaje: está puesta sobre «la casa», pero su contenido trata del verbo final.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El topónimo «Capernaúm» es aceptable, aunque «Cafarnaúm» también sería tradicional; no hace falta cambiarlo. La decisión clave es mantener la amplitud semántica de διελογίζεσθε en español. «Conversaban» preserva mejor el rango de conversación/debate/disputa, mientras la nota puede señalar «discutían» o «debatían» como alternativas.
  issues:
  - severity: medium
    issue: «estaban discutiendo» sobredetermina διελογίζεσθε
    rationale: El verbo griego puede denotar conversación, deliberación, debate o disputa. En este versículo todavía no se explicita el tono; la auditoría inglesa escogió «were you discussing» precisamente para no adelantar una lectura más áspera.
  - severity: high
    issue: La nota al pie está anclada en «la casa[a]», pero su contenido explica el verbo final
    rationale: Las instrucciones exigen que el marcador aparezca en la palabra o frase pertinente. La nota actual crea una asociación incorrecta entre «la casa» y una explicación léxica sobre διελογίζεσθε.
  - severity: low
    issue: La redacción de la nota alternativa no está del todo ajustada a la alternativa inglesa
    rationale: La nota propone una reformulación truncada de toda la pregunta. Es mejor dar una alternativa directa al verbo o a la cláusula relevante, por ejemplo «O “¿Qué discutían en el camino?”».
  revised_spanish_text: 'Y llegaron a Capernaúm. Y cuando estaba en la casa, les preguntó: «¿Qué conversaban[a] en el camino?»'
  revised_footnotes:
