revisions:
- from: 'Y llegaron a Capernaúm. Y cuando estaba en la casa[a], les preguntó: «¿Qué estaban discutiendo en el camino?»'
  to: 'Y llegaron a Capernaúm. Y cuando estaba en la casa, les preguntó: «¿Qué conversaban[a] en el camino?»'
  rationale: Se cambió «estaban discutiendo» por «conversaban» para preservar mejor la amplitud semántica de διελογίζεσθε sin adelantar un tono de disputa. Se movió la nota al verbo/pregunta pertinente y se reescribió para que corresponda exactamente a la alternativa léxica documentada en la auditoría inglesa. El resto del texto puede mantenerse.
