translation:
  language: es
  text: 'Y le preguntó a su padre: «¿Desde cuándo le sucede esto?». Y él dijo: «Desde niño[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Desde la niñez».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπηρώτησεν
  english_pob_choice: asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le pidió información
  - le interrogó
  lexicon: BDAG
  rationale: El verbo introduce una pregunta directa y en español natural se expresa mejor con «le preguntó». Mantiene el valor simple del aoristo sin añadir intensidad o formalidad excesiva.
- source_word: τὸν πατέρα αὐτοῦ
  english_pob_choice: his father
  chosen_spanish: a su padre
  alternatives_spanish:
  - al padre de él
  - al padre del muchacho
  lexicon: BDAG
  rationale: El referente de αὐτοῦ se entiende por el contexto como el padre del muchacho afligido. «A su padre» suena idiomático y conserva esa referencia sin sobreexplicarla en el texto principal.
- source_word: Πόσος χρόνος ἐστὶν ὡς
  english_pob_choice: How long has
  chosen_spanish: ¿Desde cuándo
  alternatives_spanish:
  - ¿Cuánto tiempo hace que
  - ¿Desde hace cuánto
  lexicon: BDAG
  rationale: La pregunta griega pide duración desde un punto inicial hasta el presente. En español, «¿Desde cuándo…?» comunica con claridad ese sentido temporal y evita una estructura poco natural.
- source_word: τοῦτο γέγονεν αὐτῷ
  english_pob_choice: this been happening to him
  chosen_spanish: le sucede esto
  alternatives_spanish:
  - le ha pasado esto
  - esto le ha estado ocurriendo
  lexicon: BDAG
  rationale: El perfecto de γίνομαι señala una condición o situación que llega hasta el presente. «Le sucede esto» transmite la continuidad de la afección; «ha estado ocurriendo» es posible, pero más pesado para el español de lectura pública.
- source_word: ὁ δὲ εἶπεν
  english_pob_choice: And he said
  chosen_spanish: Y él dijo
  alternatives_spanish:
  - Pero él dijo
  - Entonces él dijo
  lexicon: BDAG
  rationale: δέ marca progresión narrativa simple. «Y él dijo» conserva esa fluidez sin cargar un contraste que el contexto no exige.
- source_word: Ἐκ παιδιόθεν
  english_pob_choice: From childhood
  chosen_spanish: Desde la niñez
  alternatives_spanish:
  - Desde la infancia
  - Desde niño
  lexicon: BDAG
  rationale: La expresión indica origen temporal desde la etapa infantil. «Desde la niñez» es claro, natural y mantiene la idea de inicio temprano; la nota recoge que también puede leerse «desde la infancia».
translation_notes:
  revision_awareness: 'Corregido para anclar la nota al texto: el marcador [a] aparece ahora en «niñez[a]», de modo que la alternativa textual queda validamente vinculada al versículo. No se realizaron otros cambios sustantivos respecto del sentido fuente.'
  spanish_consistency_notes:
  - Se conservó el tratamiento narrativo directo y sencillo del griego.
  - Se mantuvo una solución verbal natural en español para la pregunta temporal, evitando calco sintáctico.
  - El pronombre posesivo se resolvió de forma contextual como en la POB inglesa, sin añadir el sustantivo «muchacho» en el texto principal.
  - La nota de alternativa se ancló únicamente a la expresión temporal, donde el español crea una ambigüedad léxica legítima.
