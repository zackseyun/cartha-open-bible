translation:
  language: es
  text: donde su gusano no muere[a][b], y el fuego no se apaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «su gusano no llega a su fin, y el fuego no es apagado».'
    reason: lexical_alternative
  - marker: b
    text: Esta línea hace eco de Isaías 66:24.
    reason: cross_reference
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - en el lugar donde
  lexicon: BDAG
  rationale: ὅπου introduce un marco locativo; 'donde' transmite de forma natural y fiel esa relación en español sin añadir material innecesario.
- source_word: σκώληξ
  english_pob_choice: worm
  chosen_spanish: gusano
  alternatives_spanish:
  - gusano larval
  - maggot
  lexicon: BDAG
  rationale: El inglés POB eligió 'worm' para mantener la imagen bíblica tradicional y no sobreespecificar la especie. En español, 'gusano' es el equivalente más directo y natural; 'larva' o 'maggot' estrecharían indebidamente el campo semántico.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: su
  alternatives_spanish:
  - de ellos
  - de ellos mismos
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa con 'su' para conservar la asociación personal con quienes están en vista. Aunque español no marca aquí número con total transparencia, el contexto plural sostiene el sentido de 'de ellos'.
- source_word: οὐ τελευτᾷ
  english_pob_choice: does not die
  chosen_spanish: no muere
  alternatives_spanish:
  - no llega a su fin
  - no termina
  - no perece
  lexicon: BDAG
  rationale: Con sujeto animado ('gusano'), 'muere' reproduce mejor el valor idiomático que 'llega a su fin'. Esta elección conserva la fuerza de la imagen y evita una paráfrasis más explicativa que el texto no exige.
- source_word: πῦρ
  english_pob_choice: fire
  chosen_spanish: fuego
  alternatives_spanish:
  - llama
  - brasas
  lexicon: BDAG
  rationale: Término literal y transparente; no hay razón contextual para reemplazarlo por otra imagen.
- source_word: οὐ σβέννυται
  english_pob_choice: is not quenched
  chosen_spanish: no se apaga
  alternatives_spanish:
  - no se extingue
  - no es apagado
  lexicon: BDAG
  rationale: El pasivo presente se vierte de modo natural en español con 'no se apaga'. Conserva la idea de un fuego que permanece inextinguible sin recargar la frase con un pasivo menos idiomático.
theological_decisions:
- issue: Imaginería de juicio y su alcance doctrinal
  english_pob_reading: Retain the concrete imagery of worm and fire without interpreting it in the translation as annihilation, torment, or metaphor only.
  chosen_spanish_reading: Mantener la imagen concreta de gusano y fuego sin decidir en la traducción si describe aniquilación, tormento consciente o un símbolo exclusivo de vergüenza y corrupción.
  alternative_spanish_readings:
  - Leerla como énfasis en castigo consciente continuo
  - Leerla como énfasis en destrucción irreversible
  - Leerla como metáfora primaria de vergüenza y corrupción
  rationale: El versículo presenta una imagen vívida de juicio y eco de Isaías 66:24, pero no obliga al traductor a resolver el debate doctrinal más amplio. La redacción española conserva esa tensión en vez de imponer una síntesis teológica.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La revisión más reciente indicó que no se requerían cambios; la versión española sigue de cerca la solución inglesa aprobada, pero ajusta naturalmente el léxico al español. Se preserva la doble nota: la alternativa léxica para τελευτάω/σβέννυμι y la alusión intertextual a Isaías 66:24.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' cuando corresponda al tetragrámaton, pero aquí no aparece.
  - '''gusano'' conserva la amplitud semántica de ''worm'' sin forzar ''larva'' o ''maggot''.'
  - '''no se apaga'' mantiene el valor pasivo de σβέννυμι en un español natural y publicable.'
  - Se evita resolver en la traducción el alcance escatológico de la imagen, conforme al enfoque POB.
