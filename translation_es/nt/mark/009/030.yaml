review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el movimiento continuo de παρεπορεύοντο con «iban pasando» y mantiene correctamente el sujeto singular implícito de «no quería» referido a Jesús. Sin embargo, añade un objeto explícito en «lo supiera» donde el griego deja el complemento de γνοῖ sin expresar; la nota b reconoce precisamente esa elipsis, así que el texto principal debería preservarla. También la nota a no funciona como verdadera alternativa porque repite exactamente la misma frase del texto.
  spanish_quality_summary: El español es claro y natural, de registro digno y legible. «Y saliendo de allí, iban pasando por Galilea» suena aceptable, aunque algo más directo sería «Después de salir de allí, iban pasando por Galilea»; no es necesario forzar ese cambio. El problema principal de calidad/fidelidad está en «lo supiera», que hace más específico el enunciado de lo que permite el original.
  glossary_alignment: 'No hay conflictos con la terminología proyectual principal. Los términos geográficos y narrativos están bien. La única decisión léxica que conviene ajustar es ἵνα τις γνοῖ: en español debe quedar «que nadie supiera», preservando la elipsis del original y apoyándose en la nota contextual.'
  issues:
  - severity: medium
    issue: Se explicita indebidamente el objeto de «supiera» con «lo».
    rationale: El griego dice ἵνα τις γνοῖ, sin objeto expreso. El inglés POB mantuvo esa omisión en el texto principal y la explicó en nota. Añadir «lo» en español reduce la ambigüedad intencional del original y hace redundante la nota b.
  - severity: low
    issue: La nota a no ofrece una alternativa real.
    rationale: Dice «O ‘saliendo de allí’», pero esa es exactamente la forma usada en el texto. Una nota de alternativa debe presentar una opción distinta o eliminarse.
  revised_spanish_text: Y saliendo de allí, iban pasando por Galilea[a], y no quería que nadie supiera.
  revised_footnotes:
  - marker: a
    text: El griego deja implícito qué no quería que nadie supiera; por el contexto, se refiere a su presencia o a su paso por Galilea.
    reason: lexical_alternative
