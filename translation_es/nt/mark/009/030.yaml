- from: Y saliendo de allí[a], iban pasando por Galilea[b], y no quería que nadie lo supiera.
  to: Y saliendo de allí, iban pasando por Galilea[a], y no quería que nadie supiera.
  rationale: Se quitó «lo» para conservar la elipsis del griego en ἵνα τις γνοῖ y alinearse con la práctica del English POB, que deja implícito el objeto y lo aclara solo en nota. También se eliminó la nota redundante sobre «saliendo de allí», porque no ofrecía una alternativa distinta del texto principal.
  reviewer_model: gpt-5.4
