translation:
  language: es
  text: Y saliendo de allí, iban pasando por Galilea[a], y no quería que nadie supiera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego deja implícito qué no quería que nadie supiera; por el contexto, se refiere a su presencia o a su paso por Galilea.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀκεῖθεν
  english_pob_choice: And from there
  chosen_spanish: Y saliendo de allí
  alternatives_spanish:
  - Y de allí
  - Y desde allí
  lexicon: BDAG
  rationale: κἀκεῖθεν une continuidad narrativa con movimiento fuera del lugar anterior. En español, «saliendo de allí» hace explícita la salida que en el griego está en el participio aoristo ἐξελθόντες, manteniendo a la vez la conexión espacial de «de allí».
- source_word: ἐξελθόντες
  english_pob_choice: from there they went on
  chosen_spanish: saliendo de allí
  alternatives_spanish:
  - habiendo salido de allí
  - después de salir de allí
  lexicon: BDAG
  rationale: El participio aoristo expresa una salida anterior al movimiento principal. «Saliendo de allí» conserva el valor de partida sin volver la frase rígida en español.
- source_word: παρεπορεύοντο
  english_pob_choice: they were passing through
  chosen_spanish: iban pasando
  alternatives_spanish:
  - pasaban
  - iban recorriendo
  lexicon: BDAG
  rationale: El imperfecto marca acción continua o en curso. «Iban pasando» refleja bien esa duratividad y suena natural en español actual.
- source_word: διὰ τῆς Γαλιλαίας
  english_pob_choice: through Galilee
  chosen_spanish: por Galilea
  alternatives_spanish:
  - a través de Galilea
  - por la región de Galilea
  lexicon: BDAG
  rationale: διά con genitivo indica desplazamiento por una zona. «Por Galilea» es idiomático en español y preserva la idea de tránsito regional.
- source_word: οὐκ ἤθελεν
  english_pob_choice: he did not want
  chosen_spanish: no quería
  alternatives_spanish:
  - no deseaba
  - no estaba dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo. «No quería» comunica la intención negativa de manera clara y natural.
- source_word: ἵνα τις γνοῖ
  english_pob_choice: anyone to know
  chosen_spanish: que nadie lo supiera
  alternatives_spanish:
  - que nadie llegara a saberlo
  - que nadie supiera
  lexicon: BDAG
  rationale: La cláusula ἵνα + subjuntivo expresa finalidad/preventiva. En contexto, el objeto omitido de «saber» se entiende como su presencia o su recorrido; por eso el español puede decirlo explícitamente como «lo» sin añadir contenido ajeno al pasaje.
theological_decisions:
- issue: Sujeto implícito de «no quería»
  english_pob_reading: The subject is rendered as 'he,' referring to Jesus.
  chosen_spanish_reading: Se deja el sujeto implícito en el verbo, como en el griego; el referente sigue siendo Jesús por el contexto inmediato.
  alternative_spanish_readings:
  - él no quería
  - Jesús no quería
  rationale: El griego usa una forma verbal singular cuyo sujeto se sobreentiende por el contexto narrativo. El español puede omitir el pronombre para mantener naturalidad y no introducir énfasis innecesario.
  doctrine_reference: Narrative context and grammatical subject continuity
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que explícitamente preservó el imperfecto de παρεπορεύοντο («were passing through») y el matiz de salida de ἐξελθόντες («departing from there»). La versión española incorpora ambos valores con «saliendo de allí» e «iban pasando».
  spanish_consistency_notes:
  - Se mantiene «Galilea» sin artículo, conforme al uso español natural para topónimos.
  - Se evita «Cristo» o terminología teológica no presente en el verso.
  - Se conserva un registro bíblico moderno y sobrio, sin calcos excesivos.
