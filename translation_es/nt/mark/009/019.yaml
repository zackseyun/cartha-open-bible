translation:
  language: es
  text: 'Y respondiéndoles, les dice: «¡Generación incrédula[a]! ¿Hasta cuándo estaré con ustedes? ¿Hasta cuándo los soportaré[b]? Tráiganlo a mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «generación sin fe» o «generación infiel». El griego ἄπιστος puede denotar falta de creencia o falta de fidelidad.
    reason: lexical_alternative
  - marker: b
    text: O «¿Hasta cuándo los aguantaré?» o «¿Hasta cuándo los toleraré?».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀποκριθεὶς αὐτοῖς
  english_pob_choice: answering them
  chosen_spanish: respondiéndoles
  alternatives_spanish:
  - y les responde
  - respondiendo a ellos
  lexicon: BDAG
  rationale: El participio introduce la respuesta de Jesús. «Respondiéndoles» conserva el valor participial y el vínculo directo con el dativo αὐτοῖς sin sonar forzado en español.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico de Marcos con «dice», que da vividez narrativa en español.
- source_word: γενεὰ ἄπιστος
  english_pob_choice: unbelieving generation
  chosen_spanish: generación incrédula
  alternatives_spanish:
  - generación sin fe
  - generación infiel
  lexicon: BDAG
  rationale: ἄπιστος puede significar falta de fe o falta de fidelidad. En este contexto de reproche por no confiar, «incrédula» comunica el sentido inmediato en español actual sin cerrar la posible resonancia de «infiel».
- source_word: ἕως πότε
  english_pob_choice: how long
  chosen_spanish: ¿Hasta cuándo?
  alternatives_spanish:
  - ¿Por cuánto tiempo?
  lexicon: BDAG
  rationale: Es la equivalencia idiomática natural en español y preserva el tono de impaciencia del original.
- source_word: πρὸς ὑμᾶς ἔσομαι
  english_pob_choice: will I be with you
  chosen_spanish: estaré con ustedes
  alternatives_spanish:
  - permaneceré con ustedes
  - estaré entre ustedes
  lexicon: BDAG
  rationale: El giro griego expresa presencia continuada en relación con los oyentes. «Estaré con ustedes» es natural y fiel a esa idea.
- source_word: ἀνέξομαι ὑμῶν
  english_pob_choice: will I put up with you
  chosen_spanish: los soportaré
  alternatives_spanish:
  - los toleraré
  - los aguantaré
  - los sobrellevaré
  lexicon: BDAG
  rationale: ἀνέχομαι expresa soportar/tolerar. «Soportaré» conserva la fuerza del reproche sin caer en una expresión demasiado coloquial.
- source_word: φέρετε αὐτὸν πρός με
  english_pob_choice: Bring him to me
  chosen_spanish: Tráiganlo a mí
  alternatives_spanish:
  - Traigan a él hasta mí
  - Llévenlo a mí
  lexicon: BDAG
  rationale: «Traer» es el mandato natural en español para acercar a alguien a Jesús. «A mí» refleja πρός με de manera directa y sobria.
theological_decisions:
- issue: Alcance de ἄπιστος en el reproche de Jesús
  english_pob_reading: unbelieving; footnote preserves faithless as an alternative
  chosen_spanish_reading: incrédula
  alternative_spanish_readings:
  - infiel
  - sin fe
  rationale: 'Se preserva la tensión léxica: el texto acusa falta de fe activa y receptiva, pero no se fuerza una conclusión doctrinal más estrecha sobre apostasia o infidelidad de pacto. La nota mantiene la alternativa posible.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Valor del presente histórico λέγει
  english_pob_reading: he says
  chosen_spanish_reading: les dice
  alternative_spanish_readings:
  - les dijo
  rationale: Se conserva el estilo narrativo vivo de Marcos sin alterar el contenido teológico del relato.
  doctrine_reference: Markan narrative style / historical present
translation_notes:
  revision_awareness: 'Concorda con el audit trail inglés: se conservan el participio introductorio, el presente histórico, la ambigüedad de ἄπιστος y la fuerza de ἀνέχομαι sin suavizar el reproche. No se reportan revisiones aplicadas en el paquete fuente; la redacción sigue el estado estable más reciente.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene «ustedes» para el plural de segunda persona, coherente con español neutral latinoamericano.
  - «Tráiganlo» conserva el imperativo plural y la referencia directa al muchacho.
  - No se introduce terminología eclesiástica tradicional que atenúe la intensidad del dicho de Jesús.
