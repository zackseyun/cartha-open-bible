  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y el rastro auditado en inglés: mantiene el presente histórico («les dice»), la reprensión a la «generación» y las dos preguntas paralelas seguidas del mandato final. Sin embargo, hay un desajuste de anclaje de notas: la nota [a] está colocada sobre «generación incrédula», pero su contenido corresponde al alternativo de ἄπιστος; la nota [b] está colocada sobre «los soportaré», lo cual sí corresponde. Conviene además suavizar «¡Oh...!» a una exclamación más natural en español eclesial moderno.'
  spanish_quality_summary: El español es claro y digno, pero «¡Oh generación incrédula!» suena algo calcado; «¡Generación incrédula!» es más natural. «Respondiéndoles, les dice» es aceptable, aunque algo pesado; aun así preserva bien la estructura. El resto fluye bien y conserva el tono de reproche sin caer en coloquialismo excesivo.
  glossary_alignment: No hay términos del glosario mayor en juego salvo el manejo de ἄπιστος, que está bien resuelto como «incrédula» con alternativa en nota. No hay conflictos con Yahvé/Mesías/Cristo/etc. La decisión «soportaré» para ἀνέξομαι es adecuada y más digna que «aguantaré» en texto principal.
  issues:
  - severity: medium
    issue: Las notas al pie están mal alineadas con los marcadores y el contenido auditado.
    rationale: La nota [a] debería explicar la alternativa léxica de «incrédula / sin fe / infiel», y debe anclarse exactamente en esa frase. La nota [b] debe anclarse en «soportaré» para la alternativa de ἀνέξομαι. Además, el resumen inglés parece haber invertido letras entre traducción y notas; el español debe seguir la lógica léxica real del texto fuente, no esa inversión accidental.
  - severity: low
    issue: «¡Oh generación incrédula!» suena innecesariamente calcado.
    rationale: El vocativo griego Ὦ puede representarse en español con exclamación directa sin «Oh», que aquí resulta menos natural. «¡Generación incrédula!» mantiene el tono solemne y es más idiomático.
