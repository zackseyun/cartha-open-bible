translation:
  language: es
  text: Quien reciba a uno de tales niños en mi nombre, a mí me recibe[a]; y quien me reciba, no me recibe a mí[b], sino al que me envió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un niño de esta clase». El griego dice literalmente «uno de tales niños», subrayando un niño de ese tipo más que una referencia estricta a niños concretos presentes.
    reason: lexical_alternative
  - marker: b
    text: O «acoge» para «recibe» en todo el versículo; el mismo verbo griego se repite en cada cláusula.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃς ἂν
  english_pob_choice: Whoever
  chosen_spanish: Quien
  alternatives_spanish:
  - Quienquiera que
  - El que
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν expresa generalidad. En español, «Quien» transmite esa apertura de modo natural y sobrio, sin perder el valor indefinido.
- source_word: ἓν τῶν τοιούτων παιδίων
  english_pob_choice: one of these children
  chosen_spanish: uno de estos niños
  alternatives_spanish:
  - uno de tales niños
  - un niño de este tipo
  - uno de esos niños
  lexicon: BDAG
  rationale: Se conserva el partitivo («uno de») y el matiz cualitativo de τοιούτων con «estos niños», siguiendo el audit trail inglés que prefirió una formulación más natural sin forzar «tal» en español. «Niños» es la equivalencia directa de παιδίων en este contexto.
- source_word: δέξηται / δέχεται / δέχηται
  english_pob_choice: receives
  chosen_spanish: reciba / recibe
  alternatives_spanish:
  - acoge / acoge
  - recibe / recibe
  - acepta / acepta
  lexicon: BDAG
  rationale: Se mantiene «recibir» en toda la cláusula para preservar la repetición visible del verbo griego. «Acoger» sería posible, pero «recibir» refleja mejor la cadena verbal y la relación teológica entre recibir al niño, a Jesús y al Enviado.
- source_word: ἐπὶ τῷ ὀνόματί μου
  english_pob_choice: in my name
  chosen_spanish: en mi nombre
  alternatives_spanish:
  - por mi nombre
  - con referencia a mi nombre
  - en virtud de mi nombre
  lexicon: BDAG
  rationale: La expresión idiomática se vierte con la equivalencia española estándar «en mi nombre», que conserva la referencia a la autoridad y persona de Jesús.
- source_word: ἐμὲ
  english_pob_choice: me
  chosen_spanish: a mí / me
  alternatives_spanish:
  - me
  - a mí
  lexicon: BDAG
  rationale: Se respeta el énfasis del pronombre personal con una formulación natural en español. La repetición de «me» mantiene el paralelismo enfático del griego.
- source_word: οὐκ ἐμὲ δέχεται ἀλλὰ
  english_pob_choice: receives not me, but
  chosen_spanish: no me recibe a mí, sino
  alternatives_spanish:
  - no me recibe, sino
  - no me acoge a mí, sino
  lexicon: BDAG
  rationale: Se conserva el contraste fuerte de οὐκ... ἀλλὰ sin suavizarlo. El orden español mantiene la negación y la oposición, pero con sintaxis natural. Se añade «a mí» para hacer audible la repetición enfática del acusativo.
- source_word: τὸν ἀποστείλαντά με
  english_pob_choice: the one who sent me
  chosen_spanish: al que me envió
  alternatives_spanish:
  - al que me mandó
  - al que me ha enviado
  - al que me mandó enviar
  lexicon: BDAG
  rationale: El participio articular se traduce sustantivamente como «al que me envió», natural en español y fiel a la relación de envío. «Mandó» sería posible, pero «envió» conserva mejor el lenguaje misional del texto.
theological_decisions:
- issue: Relación entre recibir a Jesús y recibir al que lo envió
  english_pob_reading: The contrast is literal but relational, not an exclusion of Jesus; receiving Jesus entails relation to the Father who sent him.
  chosen_spanish_reading: 'La oposición se mantiene literal: recibir a Jesús no lo excluye, sino que enlaza con el que lo envió.'
  alternative_spanish_readings:
  - recibe no solo a Jesús, sino también al que lo envió
  - no me recibe a mí solamente, sino al que me envió
  rationale: La frase griega dice «no me recibe, sino al que me envió». La traducción conserva esa tensión sin explicarla de más en el cuerpo del texto. Así se evita diluir el contraste y, a la vez, no se introduce una lectura doctrinal ajena al enunciado.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Valor de τοιούτων en la frase sobre los niños
  english_pob_reading: one of these children / one of such children, emphasizing a child of this kind rather than pointing specifically to these children.
  chosen_spanish_reading: «estos niños» se usa como equivalente natural de la lectura contextual, sin convertirlo en un deíctico más fuerte de lo que exige el griego.
  alternative_spanish_readings:
  - uno de tales niños
  - uno de niños de esta clase
  rationale: El texto griego subraya la cualidad del niño, no solo la referencia deíctica. «Estos niños» comunica bien el contexto y evita una formulación extraña en español, pero sin borrar el matiz cualitativo.
  doctrine_reference: Principio de mantener la tensión léxica sin resolverla prematuramente
translation_notes:
  revision_awareness: La base inglesa más reciente pasó de «one of such children» a «one of these children» por naturalidad y cercanía al contexto. En español se siguió esa revisión con «uno de estos niños», manteniendo el carácter partitivo y la repetición de δέχομαι en toda la frase.
  spanish_consistency_notes:
  - Se preservó «recibir» como equivalente fijo de δέχομαι para conservar la repetición verbal.
  - Se optó por «en mi nombre» como traducción idiomática estable de ἐπὶ τῷ ὀνόματί μου.
  - Se evitó «Cristo» o terminología eclesiástica no motivada por el texto; el foco permanece en Jesús y en el que lo envió.
  - Se usó «al que me envió» para mantener el lenguaje de envío con claridad y naturalidad en español.
