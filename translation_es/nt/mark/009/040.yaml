translation:
  language: es
  text: Porque el que no está contra nosotros está por nosotros[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de nuestro lado». La expresión griega ὑπὲρ ἡμῶν también puede significar «en favor de nosotros» o «por causa de nosotros», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς
  english_pob_choice: whoever
  chosen_spanish: el que
  alternatives_spanish:
  - quien
  - quienquiera que
  lexicon: BDAG
  rationale: El relativo griego funciona de manera genérica y sustantiva. En español, «el que» comunica bien esa fuerza general sin sonar forzado.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí γάρ introduce explicación de la afirmación anterior; «Porque» es natural en español y mantiene el enlace argumentativo.
- source_word: οὐκ ἔστιν
  english_pob_choice: is not
  chosen_spanish: no está
  alternatives_spanish:
  - no es
  - no se encuentra
  lexicon: BDAG
  rationale: Aunque la cópula literal sería «no es», en esta construcción con πρός/κατά la idea relacional se expresa con naturalidad en español mediante «no está». Preserva el sentido de posición o alineación sin sobrecargar el verso.
- source_word: καθ’ ἡμῶν
  english_pob_choice: against us
  chosen_spanish: contra nosotros
  alternatives_spanish:
  - opuesto a nosotros
  - en contra de nosotros
  lexicon: BDAG
  rationale: κατά con genitivo expresa oposición. «Contra nosotros» es la equivalencia más directa y clara en español.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: a favor de nosotros
  alternatives_spanish:
  - por nosotros
  - de nuestro lado
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede significar «por, en favor de». En contraste con «contra nosotros», «a favor de nosotros» mantiene la antítesis en un español idiomático y evita reducir el matiz a una sola lectura institucional o bélica.
theological_decisions:
- issue: Alcance relacional de la afirmación («contra nosotros» / «a favor de nosotros»).
  english_pob_reading: Retain the relational language 'against us' and 'for us' without expanding it to 'against God' or 'for the kingdom.'
  chosen_spanish_reading: Conservar el lenguaje relacional «contra nosotros» y «a favor de nosotros» sin ampliarlo a «contra Dios» ni a «a favor del reino».
  alternative_spanish_readings:
  - El que no está contra Dios está con Dios
  - El que no se opone a nuestra misión está de nuestro lado
  rationale: El griego habla explícitamente en primera persona plural. La traducción mantiene esas palabras y deja que el contexto interprete el alcance, sin introducir una paráfrasis doctrinal más amplia que el texto no exige.
  doctrine_reference: Primacía del texto original; preservar la tensión interpretativa en vez de resolverla por tradición.
translation_notes:
  revision_awareness: La versión inglesa POB usa «for us» y anota que ὑπὲρ ἡμῶν también puede entenderse como «on our behalf» o «on our side». En español, se optó por «a favor de nosotros» para conservar esa amplitud semántica con un giro natural, manteniendo la nota como alternativa léxica.
  spanish_consistency_notes:
  - Se mantuvo «nosotros» para reflejar el plural de primera persona del griego.
  - No se usó «Señor» ni terminología eclesiástica no presente en el versículo.
  - La puntuación reproduce la cadencia explicativa del griego y el inglés auditado.
