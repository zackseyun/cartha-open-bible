  to: 'Y después de gritar y sacudirlo violentamente[a], salió; y quedó como muerto, de modo que muchos decían[b]: «Está muerto».'
  rationale: Se ajusta «clamar» a «gritar» para una lectura más natural y contextual de κράζω, y «sacudirlo mucho» a «sacudirlo violentamente» para reflejar mejor la intensidad de πολλὰ σπαράξας en un contexto de convulsión demoníaca. Se conservan intactos el matiz de apariencia en «quedó como muerto» y la nota explicativa correspondiente.
