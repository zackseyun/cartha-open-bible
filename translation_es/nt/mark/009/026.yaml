review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia del griego: el espíritu grita, provoca una fuerte sacudida/convulsión y sale; luego el muchacho queda con apariencia de muerto, de modo que muchos dicen que está muerto. También preserva correctamente la tensión teológica de ὡσεὶ νεκρός como apariencia y no muerte afirmada por el narrador. Sin embargo, «clamar» suena menos natural aquí que «gritar», y «sacudirlo mucho» es algo débil frente al sentido exorcístico de σπαράσσω, donde convulsionar/retorcer violentamente comunica mejor la fuerza del original y del rastro léxico auditado.'
  spanish_quality_summary: 'El español es claro y digno, pero puede mejorarse en naturalidad y precisión. «Después de clamar» suena algo literario y menos idiomático en esta escena narrativa; «después de gritar» o «tras gritar» lee mejor. Además, «sacudirlo mucho» puede sonar coloquial y subrepresenta el matiz de convulsión violenta. El resto de la frase está bien logrado: «quedó como muerto» y «de modo que muchos decían: “Está muerto”» son naturales y fieles.'
  glossary_alignment: No hay términos del glosario principal en disputa en este versículo. La decisión teológica sobre apariencia de muerte está bien alineada con el expediente inglés. La nota [b] preserva adecuadamente el matiz de ὡσεὶ. La nota [a] existe, pero conviene que el texto principal ya refleje mejor el valor de σπαράσσω.
  issues:
  - severity: medium
    issue: «después de clamar» es menos natural que «después de gritar» en este contexto narrativo
    rationale: κράζω aquí describe un grito fuerte del espíritu; en español narrativo general «gritar» comunica eso con más claridad que «clamar», que puede sonar más solemne o cultual.
  - severity: medium
    issue: «sacudirlo mucho» queda corto para πολλὰ σπαράξας
    rationale: σπαράσσω en contexto exorcístico apunta a convulsiones o retorcimientos violentos, no solo a una sacudida genérica. «Sacudirlo violentamente» o una formulación con convulsiones representa mejor la fuerza léxica sin sobreinterpretar.
  revised_spanish_text: 'Y después de gritar y sacudirlo violentamente[a], salió; y quedó como muerto, de modo que muchos decían[b]: «Está muerto».'
