translation:
  language: es
  text: 'Y después de gritar y sacudirlo violentamente[a], salió; y quedó como muerto, de modo que muchos decían[b]: «Está muerto».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «provocándole fuertes convulsiones».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «como si estuviera muerto», lo que indica que a los observadores les parecía muerto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κράξας
  english_pob_choice: after crying out
  chosen_spanish: después de clamar
  alternatives_spanish:
  - después de gritar
  - tras clamar
  - habiendo clamado
  lexicon: BDAG
  rationale: «Clamar» conserva el valor verbal de un grito fuerte sin introducir un tono demasiado específico. El participio aoristo se vierte como acción previa al verbo principal, como en el análisis inglés.
- source_word: πολλὰ σπαράξας
  english_pob_choice: convulsing him greatly
  chosen_spanish: sacudirlo mucho
  alternatives_spanish:
  - sacudirlo violentamente
  - provocarle fuertes convulsiones
  - retorcerlo mucho
  lexicon: BDAG
  rationale: En este contexto de expulsión demoníaca, σπαράσσω describe convulsión o sacudida intensa, no «desgarrar» en sentido literal. «Sacudirlo mucho» conserva la fuerza adverbial de πολλὰ sin volver la frase más técnica de lo necesario. La nota permite una alternativa más explícita.
- source_word: ἐξῆλθεν
  english_pob_choice: it came out
  chosen_spanish: salió
  alternatives_spanish:
  - salió de él
  - se fue
  - salió afuera
  lexicon: BDAG
  rationale: El verbo de salida en contexto de expulsión se expresa naturalmente como «salió». El sujeto implícito se entiende por el contexto narrativo, sin necesidad de explicitarlo en el texto principal.
- source_word: ἐγένετο ὡσεὶ νεκρός
  english_pob_choice: he became like a dead man
  chosen_spanish: quedó como muerto
  alternatives_spanish:
  - se volvió como muerto
  - pareció muerto
  - quedó como si estuviera muerto
  lexicon: BDAG
  rationale: «Quedó como muerto» mantiene el sentido comparativo de ὡσεὶ y evita afirmar muerte real. En español suena natural y preserva la tensión observacional del pasaje.
- source_word: ὥστε τοὺς πολλοὺς λέγειν
  english_pob_choice: so that many were saying
  chosen_spanish: de modo que muchos decían
  alternatives_spanish:
  - de manera que muchos decían
  - así que muchos estaban diciendo
  - con lo cual muchos decían
  lexicon: BDAG
  rationale: La construcción resultativa ὥστε se rinde bien con «de modo que». «Muchos» conserva τοὺς πολλοὺς sin forzar el sentido a «la mayoría».
- source_word: ὅτι ἀπέθανεν
  english_pob_choice: He is dead
  chosen_spanish: «Está muerto»
  alternatives_spanish:
  - «Ha muerto»
  - «Murió»
  - «Es muerto»
  lexicon: BDAG
  rationale: En discurso directo, «Está muerto» comunica de manera inmediata la conclusión de los presentes. Evita resolver la frase como una afirmación narratorial de muerte efectiva, manteniendo el matiz de apariencia señalado por ὡσεὶ.
theological_decisions:
- issue: Si el texto afirma muerte real o apariencia de muerte
  english_pob_reading: The boy appeared dead but was not stated to be actually dead.
  chosen_spanish_reading: El muchacho pareció muerto, pero el versículo no afirma de forma directa que estuviera muerto de verdad.
  alternative_spanish_readings:
  - El muchacho murió temporalmente.
  - El versículo deja abierta la posibilidad de muerte real.
  rationale: La comparación ὡσεὶ νεκρός exige preservar la apariencia, no cerrarla como hecho. La traducción mantiene la tensión teológica y narrativa sin añadir una interpretación que el texto no formula explícitamente.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa que prefirió una equivalencia más directa de πολλὰ y cambió la cita final a «He is dead» para reflejar mejor el sentido observacional del contexto. Por eso elegí «mucho» y un dicho directo en presente («Está muerto»), sin convertirlo en una afirmación narratorial de muerte real.
  spanish_consistency_notes:
  - Se mantiene «mucho» para reflejar la fuerza intensiva de πολλὰ, en lugar de «fuertemente» o «severamente» como adverbio interpretativo.
  - Se evita «Cristo», «SEÑOR» y otras terminologías no presentes en el versículo.
  - Se conserva la distinción entre salida del espíritu/demonio y el estado aparente del muchacho, sin explicitar más de lo que el contexto inmediato exige.
