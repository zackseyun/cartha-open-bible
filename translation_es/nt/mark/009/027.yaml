translation:
  language: es
  text: Pero Jesús, tomándolo de la mano[a], lo levantó[b], y se levantó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al tomarlo de la mano»; el griego expresa un contacto físico concreto con el muchacho.
    reason: lexical_alternative
  - marker: b
    text: O «lo alzó»; el verbo griego también puede usarse en contextos de levantar del sueño o de la muerte, aunque aquí el contexto es físico. El verbo final también puede traducirse «se puso de pie» o «se levantó».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición narrativa con leve contraste; «Pero» conserva mejor el valor adversativo que «Y», y suena natural en español.
- source_word: κρατήσας τῆς χειρὸς αὐτοῦ
  english_pob_choice: taking him by the hand
  chosen_spanish: tomándolo de la mano
  alternatives_spanish:
  - tomando su mano
  - agarrándolo de la mano
  - tomando la mano de él
  lexicon: BDAG
  rationale: La construcción con κρατέω expresa acción física concreta. En español, «tomarlo de la mano» comunica de forma idiomática el contacto sin endurecer el gesto con «agarrar».
- source_word: ἤγειρεν
  english_pob_choice: raised him up
  chosen_spanish: lo levantó
  alternatives_spanish:
  - lo alzó
  - lo hizo levantarse
  - lo levantó en pie
  lexicon: BDAG
  rationale: Aquí el sentido inmediato es que Jesús lo hace ponerse de pie o incorporarse. «Lo levantó» es claro y sobrio, y mantiene la resonancia de levantamiento sin forzar una lectura exclusivamente resurreccional.
- source_word: ἀνέστη
  english_pob_choice: he arose
  chosen_spanish: se levantó
  alternatives_spanish:
  - se puso de pie
  - se alzó
  - arose
  lexicon: BDAG
  rationale: El verbo final describe el resultado visible de la acción de Jesús. «Se levantó» es natural en español y preserva el movimiento corporal, sin introducir un tono arcaico.
theological_decisions:
- issue: Resonancia de lenguaje de resurrección en ἤγειρεν / ἀνέστη
  english_pob_reading: Use ordinary physical-rise language in context while preserving the lexical resonance of 'raised' in English.
  chosen_spanish_reading: Usar lenguaje ordinario de levantarse en el contexto, preservando la idea de que Jesús lo puso en pie sin convertir el verso en una afirmación explícita de resurrección.
  alternative_spanish_readings:
  - Usar un lenguaje más formal como «lo levantó, y se levantó» para resaltar la resonancia verbal
  - 'Suavizar aún más: «lo ayudó a levantarse, y se puso de pie»'
  rationale: El contexto inmediato es la restauración del muchacho, no una narración de resurrección de entre los muertos. Sin embargo, el campo semántico de ἐγείρω/ἀνίστημι puede evocar ese trasfondo. La traducción mantiene la acción física principal y no elimina esa tensión lexical.
  doctrine_reference: Preservar la tensión lexical sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Esta redacción sigue el ajuste final del audit trail: mantiene una transición adversativa, conserva el contacto manual concreto, y prefiere un español natural y formalmente cercano a ἤγειρεν / ἀνέστη sin imponer una lectura resurreccional.'
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς según el estándar del proyecto.
  - Se evita «SEÑOR» porque no hay aquí un sustituto del nombre divino.
  - Se conserva un registro bíblico sobrio y moderno, apto para lectura pública.
  - 'Los dos verbos finales se traducen de manera distinta para reflejar su posible matiz distinto en griego: acción de levantar y resultado de levantarse.'
