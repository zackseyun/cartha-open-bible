    rationale: Esto pierde una decisión exegética importante del original y agrega una nota secundaria no preservada como nota en el POB inglés.
  - severity: low
    issue: «Hubo entrado» suena poco natural en español bíblico moderno.
    rationale: Aunque refleja anterioridad, en español actual y eclesial amplio «cuando entró» comunica bien el trasfondo temporal sin rigidez innecesaria.
  - severity: medium
    issue: La ambigüedad entre el espíritu y el muchacho no queda señalada en la traducción española.
    rationale: Dado que el español usa «lo», conviene una nota que explique que el griego es neutro y apunta más naturalmente al espíritu, preservando la rationale documentada.
