revisions:
- from: 'Y cuando él hubo entrado en la casa[a], sus discípulos le preguntaban aparte: «¿Por qué no pudimos expulsarlo?»'
  to: 'Y cuando entró en la casa, sus discípulos le preguntaban aparte: «¿Por qué no pudimos expulsarlo[a]?».'
  rationale: Se elimina la nota impropia sobre «la casa» y se restituye la nota relevante del audit trail sobre αὐτό. También se mejora la naturalidad del español cambiando «hubo entrado» por «entró», sin pérdida del sentido temporal del genitivo absoluto en este contexto narrativo. Se conserva «expulsarlo» como opción idiomática y fiel en contexto de exorcismo.
