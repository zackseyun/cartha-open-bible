translation:
  language: es
  text: 'Y cuando entró en la casa, sus discípulos le preguntaban aparte: «¿Por qué no pudimos expulsarlo[a]?».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «expulsarlo a él», si el pronombre se entiende como referencia al muchacho más que al espíritu; el pronombre griego es neutro, lo cual apunta más naturalmente al espíritu.
    reason: alternative_reading
lexical_decisions:
- source_word: εἰσελθόντος αὐτοῦ
  english_pob_choice: when he had entered
  chosen_spanish: cuando él hubo entrado
  alternatives_spanish:
  - después de que entró
  - cuando entró
  lexicon: BDAG
  rationale: El participio aoristo con genitivo absoluto expresa acción previa al verbo principal. «Cuando él hubo entrado» conserva esa anterioridad de manera natural en español y evita una paráfrasis excesiva.
- source_word: εἰς οἶκον
  english_pob_choice: the house
  chosen_spanish: en la casa
  alternatives_spanish:
  - a la casa
  - en una casa
  lexicon: BDAG
  rationale: En este contexto narrativo, el español fluye mejor con un complemento locativo («en la casa») que con una literalidad rígida. La idea de lugar determinado está suficientemente sugerida por la escena.
- source_word: μαθηταὶ αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos
  - sus estudiantes
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal y exacto en contexto evangélico. El posesivo español transmite la relación sin añadir matiz ajeno.
- source_word: κατ’ ἰδίαν
  english_pob_choice: privately
  chosen_spanish: aparte
  alternatives_spanish:
  - en privado
  - privadamente
  lexicon: BDAG
  rationale: La frase indica separación de otros, no solo un tono íntimo. «Aparte» es natural en español y preserva la idea de que lo hicieron lejos de la multitud.
- source_word: ἐπηρώτων
  english_pob_choice: were asking
  chosen_spanish: preguntaban
  alternatives_spanish:
  - estaban preguntándole
  - le seguían preguntando
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso o repetida. «Preguntaban» comunica bien ese aspecto sin volver la frase pesada.
- source_word: Ὅτι
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿A causa de qué
  - ¿Cómo es que
  lexicon: BDAG
  rationale: En esta pregunta, ὅτι funciona idiomáticamente como «why». «¿Por qué» es la forma española directa y fiel al sentido interrogativo.
- source_word: ἠδυνήθημεν
  english_pob_choice: were not able
  chosen_spanish: no pudimos
  alternatives_spanish:
  - no fuimos capaces
  - no teníamos poder para
  lexicon: BDAG
  rationale: El verbo expresa capacidad. «No pudimos» es una traducción natural y precisa del valor de capacidad en español.
- source_word: ἐκβαλεῖν
  english_pob_choice: to cast out
  chosen_spanish: expulsarlo
  alternatives_spanish:
  - echarlo fuera
  - sacarlo
  lexicon: BDAG
  rationale: En el contexto de exorcismo, el verbo significa expulsar al espíritu maligno. En español, «expulsarlo» comunica bien ese acto. Se mantiene el sentido de acción contra el ente referido por el pronombre neutro griego.
- source_word: αὐτό
  english_pob_choice: it
  chosen_spanish: lo
  alternatives_spanish:
  - lo; el espíritu
  - a él
  lexicon: BDAG
  rationale: El pronombre griego es neutro singular y, en el contexto inmediato, apunta más naturalmente al espíritu inmundo que al muchacho. En español, «lo» preserva el referente no personal sin forzar un masculino personal que la morfología griega no exige.
theological_decisions:
- issue: Referente del pronombre final neutro αὐτό
  english_pob_reading: The disciples ask why they could not cast out the spirit/demon, rendered 'it.'
  chosen_spanish_reading: Los discípulos preguntan por qué no pudieron expulsarlo, manteniendo un pronombre neutro en función referencial.
  alternative_spanish_readings:
  - ¿Por qué no pudimos expulsarlo? refiriéndolo al muchacho
  - ¿Por qué no pudimos echarlo fuera? refiriéndolo al demonio con un masculino personal
  rationale: La morfología griega es neutra y el contexto del exorcismo favorece que el referente sea el espíritu inmundo, no el niño. El español no tiene un neutro pronominal átono equivalente; por eso se usa «lo», que conserva la referencia sin imponer una lectura personal masculina.
  doctrine_reference: Transparencia al texto original; preservación de la distinción entre el poseído y el espíritu expulsado.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el griego SBLGNT y el audit trail inglés: mantiene la anterioridad del participio aoristo, el valor adverbial de κατ’ ἰδίαν, el imperfecto de ἐπηρώτων y el referente neutro de αὐτό, evitando una traducción mecánica desde el inglés cuando el español requiere una formulación más natural.'
  spanish_consistency_notes:
  - Se usa «expulsarlo» para el exorcismo, en coherencia con la fuerza de ἐκβάλλω en este contexto.
  - Se usa «discípulos» como término técnico estable del evangelio.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, porque no hay un nombre divino en este versículo.
  - El pronombre «lo» funciona como solución española para el neutro griego sin añadir interpretación doctrinal innecesaria.
