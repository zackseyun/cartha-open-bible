translation:
  language: es
  text: Y al instante, cuando toda la multitud[a] lo vio, quedaron muy asombrados, y corriendo hacia él, lo saludaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quedaron atónitos» o «se alarmaron». El verbo griego puede expresar asombro intenso, estupor o alarma según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: al instante
  alternatives_spanish:
  - inmediatamente
  - de inmediato
  lexicon: BDAG
  rationale: Εὐθύς funciona en Marcos como marcador narrativo de inmediatez. «Al instante» conserva esa urgencia en un español natural y fluido.
- source_word: πᾶς ὁ ὄχλος
  english_pob_choice: the whole crowd
  chosen_spanish: toda la multitud
  alternatives_spanish:
  - todo el gentío
  - la multitud entera
  lexicon: BDAG
  rationale: El sustantivo colectivo singular con πᾶς expresa el conjunto completo. «Toda la multitud» mantiene la totalidad y suena natural en español bíblico contemporáneo.
- source_word: ἰδόντες αὐτόν
  english_pob_choice: when they saw him
  chosen_spanish: al verlo
  alternatives_spanish:
  - cuando lo vieron
  - después de verlo
  lexicon: BDAG
  rationale: El participio aoristo es temporal y circunstancial; «al verlo» reproduce bien esa relación sin sobrecargar la frase en español.
- source_word: ἐξεθαμβήθησαν
  english_pob_choice: were greatly amazed
  chosen_spanish: se quedó grandemente asombrada
  alternatives_spanish:
  - quedó muy sorprendida
  - quedó aturdida
  - se alarmó
  lexicon: BDAG
  rationale: El verbo admite gran asombro, sorpresa intensa o alarma según el contexto. Dado que el texto sigue con la acción de correr hacia Jesús y saludarlo, «grandemente asombrada» conserva la intensidad sin imponer miedo o alarma como sentido exclusivo.
- source_word: προστρέχοντες
  english_pob_choice: running up to him
  chosen_spanish: corriendo hacia él
  alternatives_spanish:
  - acercándose corriendo a él
  - corriendo a su encuentro
  lexicon: BDAG
  rationale: El participio describe un movimiento apresurado y directo hacia Jesús. «Corriendo hacia él» es claro, idiomático y fiel a la escena.
- source_word: ἠσπάζοντο αὐτόν
  english_pob_choice: they greeted him
  chosen_spanish: lo saludaban
  alternatives_spanish:
  - lo saludaron
  - lo recibían
  - lo daban la bienvenida
  lexicon: BDAG
  rationale: Ἀσπάζομαι significa comúnmente saludar o dar la bienvenida. En este contexto narrativo, «lo saludaban» comunica el acto de recibirlo de forma neutral y natural.
theological_decisions:
- issue: Matiz de la reacción de la multitud ante Jesús en ἐξεθαμβήθησαν
  english_pob_reading: A strong amazement/awe response rather than explicitly fear or a supernatural radiance explanation
  chosen_spanish_reading: Un fuerte asombro, sin introducir de forma explícita miedo ni una explicación sobrenatural no dicha en el verso
  alternative_spanish_readings:
  - se alarmó
  - quedó atónita
  - quedó deslumbrada
  rationale: El texto solo afirma la reacción intensa de la multitud al verlo y luego su acercamiento para saludarlo. La traducción conserva la intensidad emocional sin añadir una causa especulativa que el griego no expresa.
  doctrine_reference: 'Principio POB: primacía del original; no importar interpretaciones doctrinales o explicativas que el texto no declara.'
translation_notes:
  revision_awareness: La redacción sigue de cerca la última revisión auditada del inglés POB, manteniendo la estructura temporal del participio y la secuencia narrativa inmediata, pero trasladándolas a un español natural. Se evitó una calca rígida de «when they saw him» y se conservó la ambigüedad léxica de ἐξεθαμβήθησαν con una nota alternativa.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma general de este proyecto, pero este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aparece en el texto.
  - Se eligió «multitud» como equivalente natural de ὄχλος en este contexto narrativo.
  - El pronombre objeto directo en español se resolvió con «lo» para Jesús, conforme al uso estándar y la claridad discursiva.
