revisions:
- from: 'Y uno de la multitud le respondió[a]: «Maestro, he traído a ti a mi hijo, que tiene un espíritu mudo».'
  to: 'Y uno de la multitud le respondió: «Maestro, te traje a mi hijo, que tiene[a] un espíritu mudo».'
  rationale: Se corrigió la frase verbal a «te traje» para reflejar mejor el aoristo narrativo y lograr español natural. Se eliminó la nota incorrecta sobre «uno de la multitud» y se reubicó una nota léxica en la cláusula final para preservar la alternativa documentada por el POB respecto de ἔχοντα. Se mantuvo «que tiene un espíritu mudo» como la opción principal por claridad y buen español, sin añadir «demonio» al texto.
