translation:
  language: es
  text: 'Y uno de la multitud le respondió: «Maestro, te traje a mi hijo, que tiene[a] un espíritu mudo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «teniendo un espíritu mudo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió
  lexicon: BDAG
  rationale: En español, «respondió» reproduce el verbo narrativo de réplica sin añadir matices innecesarios. Conserva el idiomático de los Evangelios y funciona de forma natural junto al discurso directo.
- source_word: εἷς ἐκ τοῦ ὄχλου
  english_pob_choice: one from the crowd
  chosen_spanish: uno de la multitud
  alternatives_spanish:
  - uno entre la multitud
  - un hombre de la multitud
  lexicon: BDAG
  rationale: La expresión partitiva se vierte de modo natural como «uno de la multitud», preservando el singular indefinido. «Un hombre» explicita más de lo que el griego dice; «uno entre la multitud» es posible, pero menos directo.
- source_word: Διδάσκαλε
  english_pob_choice: Teacher
  chosen_spanish: Maestro
  alternatives_spanish:
  - Rabí
  - Maestro
  lexicon: BDAG
  rationale: «Maestro» es el equivalente natural y reverente en español para el vocativo de διδάσκαλος. «Rabí» sería más marcado culturalmente y menos neutro; se evita «Señor» porque no corresponde al término griego aquí.
- source_word: ἤνεγκα
  english_pob_choice: I brought
  chosen_spanish: he traído
  alternatives_spanish:
  - traje
  - he traído
  lexicon: BDAG
  rationale: Aunque el aoristo puede traducirse con pasado simple, aquí el presente perfecto español («he traído») suena natural ante el acto ya realizado con relevancia presente en la escena. Mantiene la relación con el gesto de presentar al hijo a Jesús.
- source_word: υἱόν
  english_pob_choice: son
  chosen_spanish: hijo
  alternatives_spanish:
  - hijo
  - muchacho
  lexicon: BDAG
  rationale: «Hijo» conserva el parentesco explícito del lexema griego. «Muchacho» suavizaría el sentido familiar y añadiría una edad no expresada por el texto.
- source_word: πρὸς σέ
  english_pob_choice: to you
  chosen_spanish: a ti
  alternatives_spanish:
  - a ti
  - ante ti
  lexicon: BDAG
  rationale: Después de «he traído», la preposición se expresa naturalmente con «a ti» en español. «Ante ti» sería más interpretativo y menos directo.
- source_word: ἔχοντα
  english_pob_choice: having
  chosen_spanish: que tiene
  alternatives_spanish:
  - teniendo
  - que tiene
  lexicon: BDAG
  rationale: El participio modifica a «mi hijo» y explica su condición. En español, la cláusula relativa «que tiene» comunica con claridad la fuerza descriptiva sin la aspereza de un gerundio calco.
- source_word: πνεῦμα ἄλαλον
  english_pob_choice: a mute spirit
  chosen_spanish: un espíritu mudo
  alternatives_spanish:
  - un espíritu mudo
  - un espíritu que no habla
  - un espíritu sin voz
  lexicon: BDAG
  rationale: '«Espíritu mudo» sigue de cerca el adjetivo ἄλαλος y conserva la tensión teológica del texto: el griego dice solo «espíritu», sin añadir «demonio» ni «maligno». «Que no habla» explicita más de lo que el original dice.'
theological_decisions:
- issue: Naturaleza de πνεῦμα en el contexto de exorcismo
  english_pob_reading: spirit, specifically an evil/demonic spirit implied by context
  chosen_spanish_reading: espíritu, específicamente un espíritu de posesión o demoníaco implícito por el contexto
  alternative_spanish_readings:
  - espíritu en sentido general
  - demonio
  rationale: El contexto narrativo sugiere una fuerza espiritual aflictiva, pero el griego no añade un calificativo como «maligno». Por eso el texto principal mantiene simplemente «espíritu», dejando visible la tensión entre la palabra precisa del original y la inferencia contextual.
  doctrine_reference: Primacía del lenguaje original y preservación de tensiones textuales en escenas de exorcismo.
translation_notes:
  revision_awareness: La versión inglesa revisó «because he has» a «having» para reflejar más directamente el participio griego que modifica a «my son». En español, la relativa «que tiene» preserva esa relación participial de forma natural y legible, evitando una paráfrasis causal excesiva.
  spanish_consistency_notes:
  - Se mantuvo «espíritu» sin añadir «maligno» para respetar el texto griego y la decisión auditada del POB inglés.
  - Se evitó «SEÑOR» para Διδάσκαλε, siguiendo el valor vocativo de «Teacher/Maestro».
  - La puntuación y el diálogo siguen un estilo publicable en español bíblico moderno, sin arcaísmos innecesarios.
