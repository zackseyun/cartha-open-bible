source:
  edition: SBLGNT
  text: Καὶ ἐὰν ⸀σκανδαλίζῃ σε ἡ χείρ σου, ἀπόκοψον αὐτήν· καλόν ⸂ἐστίν σε⸃ κυλλὸν ⸂εἰσελθεῖν εἰς τὴν ζωὴν⸃ ἢ τὰς δύο χεῖρας ἔχοντα ἀπελθεῖν εἰς τὴν γέενναν, εἰς τὸ πῦρ τὸ ⸀ἄσβεστον.
base_translation:
  language: en
  yaml_path: translation/nt/mark/009/043.yaml
  text: And if your hand causes you to stumble[a], cut it off. It is better for you to enter into life crippled than, having two hands, to go away into Gehenna[b], into the unquenchable fire.
  footnotes:
  - marker: a
    text: 'Or: ''causes you to sin.'' The Greek verb can mean to cause someone to stumble, fall, or sin.'
    reason: lexical_alternative
  - marker: b
    text: Gehenna is the Greek form of a place-name associated with divine judgment; traditionally rendered 'hell.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
