translation:
  language: es
  text: Y si tu mano te hace tropezar[a], córtala. Es mejor para ti entrar en la vida manco que, teniendo las dos manos, ir a la Gehenna[b], al fuego inextinguible.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «te hace pecar». El verbo griego puede significar hacer tropezar, caer o pecar.'
    reason: lexical_alternative
  - marker: b
    text: Gehenna es la forma griega de un nombre de lugar asociado con el juicio divino; tradicionalmente se traduce «infierno».
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζῃ
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace caer
  - te hace pecar
  lexicon: BDAG
  rationale: Mantiene la imagen de tropiezo del verbo griego sin estrecharlo de inmediato a una sola categoría moral. En español, 'hacer tropezar' conserva bien la metáfora y sigue siendo natural.
- source_word: ἀπόκοψον
  english_pob_choice: cut it off
  chosen_spanish: córtala
  alternatives_spanish:
  - córtala y arrójala
  - arráncala
  lexicon: BDAG
  rationale: El imperativo exige una acción concreta y enfática. 'Córtala' reproduce la fuerza del mandamiento sin suavizarlo.
- source_word: καλόν
  english_pob_choice: better
  chosen_spanish: más te vale
  alternatives_spanish:
  - es mejor
  - te es mejor
  lexicon: BDAG
  rationale: En esta comparación, καλόν funciona idiomáticamente como 'mejor'. 'Más te vale' es una forma natural en español que conserva el contraste exhortativo.
- source_word: κυλλὸν
  english_pob_choice: crippled
  chosen_spanish: manco
  alternatives_spanish:
  - lisiado
  - mutilado
  lexicon: BDAG
  rationale: El contexto es la pérdida de una mano. 'Manco' comunica esa condición de modo directo y natural en español; 'lisiado' o 'mutilado' son posibles, pero menos precisos o más duros en el registro.
- source_word: εἰσελθεῖν εἰς τὴν ζωὴν
  english_pob_choice: to enter into life
  chosen_spanish: entrar en la vida
  alternatives_spanish:
  - entrar en la vida eterna
  - entrar a la vida
  lexicon: BDAG
  rationale: La frase conserva el valor escatológico de 'life' sin añadir una especificación que no está explícita en el griego. 'Entrar en la vida' es fiel y comprensible.
- source_word: ἀπελθεῖν
  english_pob_choice: to go away
  chosen_spanish: irte
  alternatives_spanish:
  - partir
  - alejarte
  lexicon: BDAG
  rationale: El verbo marca alejamiento con contraste respecto de 'entrar'. 'Irte' expresa de manera natural ese movimiento de salida.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: la Gehenna
  alternatives_spanish:
  - el infierno
  lexicon: BDAG
  rationale: Se preserva el término propio del original, siguiendo la decisión auditada de no sustituirlo por 'infierno' en el texto principal. El artículo ayuda a la fluidez del español.
- source_word: ἄσβεστον
  english_pob_choice: unquenchable
  chosen_spanish: inextinguible
  alternatives_spanish:
  - inapagable
  - que no se apaga
  lexicon: BDAG
  rationale: '''Inextinguible'' es un equivalente preciso y solemne en español para ἄσβεστος, conservando la idea de un fuego que no puede ser apagado.'
- source_word: χεὶρ σου
  english_pob_choice: your hand
  chosen_spanish: tu mano
  alternatives_spanish:
  - la mano tuya
  lexicon: BDAG
  rationale: Es una equivalencia directa y natural que preserva la imagen corporal central del dicho.
- source_word: τὰς δύο χεῖρας ἔχοντα
  english_pob_choice: having two hands
  chosen_spanish: teniendo las dos manos
  alternatives_spanish:
  - con las dos manos
  - si tienes las dos manos
  lexicon: BDAG
  rationale: La forma participial se expresa de modo explícito para mantener el contraste retórico del original entre la privación presente y la plenitud corporal en el juicio.
theological_decisions:
- issue: Tratamiento de γέεννα
  english_pob_reading: Gehenna
  chosen_spanish_reading: Gehenna
  alternative_spanish_readings:
  - infierno
  rationale: Se preserva el término histórico y geográfico-teológico del griego para no aplanar el trasfondo judío del dicho. La nota ofrece el equivalente tradicional sin imponerlo en el texto principal.
  doctrine_reference: Translation philosophy §1; mantener la tensión lexical y teológica del término
- issue: Imagen hiperbólica de cortar la mano
  english_pob_reading: Retain the concrete bodily language without interpretive softening
  chosen_spanish_reading: Retener el lenguaje corporal concreto sin suavizarlo
  alternative_spanish_readings:
  - parafrasear como evitar el pecado
  - moralizar la advertencia
  rationale: La frase conserva su carácter chocante y literal en la superficie. Traducirla de otro modo diluiría la urgencia retórica del texto.
  doctrine_reference: No paraphrase beyond source warrants; preserve rhetorical force
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión auditada en inglés: conservar σκανδαλίζῃ como un tropiezo posible sin reducirlo a una sola glosa moral, mantener γέεννα como término propio y reproducir la fuerza concreta del imperativo y de la imagen corporal. Se optó por un español natural y publicable sin perder la tensión léxica.'
  spanish_consistency_notes:
  - Se mantiene 'Gehenna' en el texto principal, coherente con el criterio POB de preservar el término original.
  - '''Vida'' traduce ζωὴν sin añadir ''eterna'', porque el griego aquí no la explicita.'
  - '''Inextinguible'' conserva el valor de ἄσβεστον y es estilísticamente más adecuado que una perífrasis más larga.'
  - '''Manco'' concreta la pérdida de la mano en el marco inmediato del versículo y evita un término más general.'
