translation:
  language: es
  text: Y después de seis días[a], Jesús toma a Pedro y a Jacobo y a Juan, y los lleva arriba a un monte alto, a solas[b]. Y fue transfigurado delante de ellos[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «seis días más tarde».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «aparte». El griego usa dos expresiones de separación, destacando que Jesús llevó con él solo a estos tres.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fue transformado delante de ellos».'
    reason: alternative_reading
lexical_decisions:
- source_word: μετὰ ἡμέρας ἓξ
  english_pob_choice: after six days
  chosen_spanish: después de seis días
  alternatives_spanish:
  - seis días después
  lexicon: BDAG
  rationale: μετά con acusativo expresa sucesión temporal. En español, «después de seis días» conserva bien esa relación y mantiene la cercanía al griego; «seis días después» es una alternativa natural pero más idiomática que desplaza un poco la estructura.
- source_word: παραλαμβάνει
  english_pob_choice: takes
  chosen_spanish: toma
  alternatives_spanish:
  - toma consigo
  - lleva consigo
  lexicon: BDAG
  rationale: El presente histórico de Marcos se puede conservar con «toma». En español, «toma» comunica la acción de acompañar sin forzar una perífrasis; «toma consigo» explicita más, pero añade material no necesario.
- source_word: ἀναφέρει αὐτοὺς εἰς ὄρος ὑψηλὸν
  english_pob_choice: brings them up onto a high mountain
  chosen_spanish: los lleva arriba a un monte alto
  alternatives_spanish:
  - los lleva a un monte alto
  - los conduce arriba a un monte alto
  lexicon: BDAG
  rationale: ἀναφέρει indica subir o llevar arriba. «Los lleva arriba a un monte alto» conserva la idea de ascenso sin calcar rígidamente «up onto»; «monte alto» es una forma natural y fiel para ὄρος ὑψηλόν.
- source_word: κατ’ ἰδίαν μόνους
  english_pob_choice: by themselves
  chosen_spanish: aparte
  alternatives_spanish:
  - a solas
  - ellos solos
  lexicon: BDAG
  rationale: El griego acumula dos expresiones de separación. Dado que en español «aparte» puede cargar la idea de apartamiento/separación, aquí funciona como una síntesis breve que preserva el énfasis del texto sin redundancia artificial. Las alternativas «a solas» o «ellos solos» también son posibles, pero pueden sonar menos directamente ligadas al acto de separación narrado.
- source_word: μετεμορφώθη
  english_pob_choice: was transfigured
  chosen_spanish: fue transfigurado
  alternatives_spanish:
  - fue transformado
  lexicon: BDAG
  rationale: «Fue transfigurado» es el término tradicional y preciso para el evento narrado, y expresa una manifestación visible de gloria sin interpretar de más. «Fue transformado» es lexicamente posible, pero en este contexto suena menos específico.
- source_word: ἔμπροσθεν αὐτῶν
  english_pob_choice: before them
  chosen_spanish: delante de ellos
  alternatives_spanish:
  - ante ellos
  - en presencia de ellos
  lexicon: BDAG
  rationale: «Delante de ellos» es natural en español y mantiene el sentido visual/presencial de ἔμπροσθεν αὐτῶν. «Ante ellos» es equivalente pero algo más formal; «en presencia de ellos» explicita el matiz, pero añade explicación.
theological_decisions:
- issue: El sentido cristológico de μετεμορφώθη
  english_pob_reading: was transfigured
  chosen_spanish_reading: fue transfigurado
  alternative_spanish_readings:
  - fue transformado
  rationale: La escena describe la Transfiguración de Jesús, un evento revelatorio singular. «Fue transfigurado» conserva ese valor tradicional y textual sin imponer una explicación doctrinal ajena al pasaje. Esto es coherente con la lectura cristológica clásica de la glorificación visible de Jesús.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
translation_notes:
  revision_awareness: El texto inglés del POB mantuvo «after six days» y luego fue revisado para eliminar una redundancia en la frase de separación («by themselves alone» > «by themselves»). En español se conserva la doble idea del griego sin redundancia excesiva mediante «aparte», y se mantiene la opción principal «fue transfigurado» como lectura preferida del evento.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, «Pedro», «Jacobo» y «Juan» para los nombres propios, y «monte» para ὄρος en un registro bíblico natural.
  - Se usa «transfigurado» en lugar de «transformado» para respetar la terminología tradicional y la precisión del evento.
  - La coma final reproduce el corte del versículo según el texto fuente, que continúa en el siguiente versículo.
