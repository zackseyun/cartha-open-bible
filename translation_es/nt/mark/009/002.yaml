  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Jesús», «fue transfigurado» y el resto del vocabulario concuerdan con las decisiones auditadas. La principal mejora es ajustar κατ’ ἰδίαν μόνους de «aparte» a «a solas» para mejor fidelidad y naturalidad.
