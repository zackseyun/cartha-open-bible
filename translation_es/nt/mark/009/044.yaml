translation:
  language: es
  text: donde su gusano[a] no muere, y el fuego no se apaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos, incluidas las grandes unciales Sinaítico y Vaticano, y en antiguas traducciones coptas; aparece en Alejandrino, en la tradición latina y en la mayoría bizantina posterior. Probablemente es una adición copista tardía que repite la frase idéntica de 9:48.
    reason: textual_variant
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - en donde
  - allí donde
  lexicon: BDAG
  rationale: Introduce el lugar del dicho de manera natural en español sin alterar el valor locativo del griego.
- source_word: σκώληξ
  english_pob_choice: worm
  chosen_spanish: gusano
  alternatives_spanish:
  - gusano larval
  - maggot
  lexicon: BDAG
  rationale: ‘Gusano’ transmite de forma directa e inteligible la imagen del original y preserva la resonancia bíblica de Isaías 66:24. ‘Maggot’ sería demasiado técnico en español; ‘gusano larval’ explica más de la cuenta.
- source_word: τελευτᾷ
  english_pob_choice: die
  chosen_spanish: muere
  alternatives_spanish:
  - llega a su fin
  - perece
  lexicon: BDAG
  rationale: En español, ‘morir’ es el equivalente más natural y preciso para un ser vivo; mantiene la fuerza simple del verbo griego sin suavizarla.
- source_word: σβέννυται
  english_pob_choice: quenched
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - es apagado
  lexicon: BDAG
  rationale: ‘Se apaga’ expresa con claridad la idea pasiva de extinguirse o apagarse, y suena más natural que una perífrasis más técnica, sin perder el matiz tradicional de juicio inextinguible.
translation_notes:
  revision_awareness: La formulación española sigue de cerca el texto griego bizantino de referencia y conserva el paralelismo breve de la línea, mientras la nota textual explica la ausencia del versículo en los testigos más antiguos, conforme al aparato auditado en la fuente inglesa.
  spanish_consistency_notes:
  - Se mantuvo ‘gusano’ y ‘fuego’ como imágenes concretas, sin convertirlas en paráfrasis moralizadas.
  - Se usó ‘se apaga’ para reflejar la pasiva griega de σβέννυται con un español natural.
  - La nota textual se ancla en el versículo con [a] porque la tradición inglesa audita la variante como relevante para la lectura del pasaje.
