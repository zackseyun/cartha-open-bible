review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la mayor parte del griego: la acción simultánea de καταβαινόντων, el mandato fuerte de διεστείλατο, el contenido de ἃ εἶδον, el título «el Hijo del Hombre» y la precisión de ἐκ νεκρῶν como «de entre los muertos». Sin embargo, la construcción «sino hasta cuando» no preserva bien la forma ni suena natural en español para εἰ μὴ ὅταν («excepto/salvo cuando»), y además desplaza indebidamente la nota al pie.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «sino hasta cuando» resulta poco idiomático y algo enredado. También hay un problema formal: la nota [a] está anclada en «del monte», aunque su contenido trata la cláusula temporal final. Una redacción más natural y fiel sería «excepto cuando el Hijo del Hombre hubiera resucitado de entre los muertos», con la nota alternativa anclada allí.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hijo del Hombre» y «de entre los muertos» están bien alineados con las decisiones léxicas y teológicas auditadas. «Monte» es aceptable para ὄρους en este contexto.
  issues:
  - severity: high
    issue: La frase «sino hasta cuando» para εἰ μὴ ὅταν es poco natural y semánticamente deficiente.
    rationale: El griego expresa una excepción temporal («excepto/salvo cuando»), con posible solapamiento de sentido con «hasta que», pero no la formulación híbrida «sino hasta cuando». En español estándar bíblico y general, «excepto cuando» preserva mejor la forma y la inteligibilidad.
  - severity: medium
    issue: La nota [a] está anclada en «del monte», pero su contenido corresponde a la cláusula temporal final.
    rationale: La nota dice «O, más idiomáticamente...» sobre la alternativa temporal, no sobre «monte». Debe colocarse en la frase final pertinente para mantener coherencia editorial y claridad para el lector.
  - severity: low
    issue: La alternativa de la nota [a] debe formularse con español más natural.
    rationale: Si la traducción principal adopta «excepto cuando», la alternativa idiomática adecuada es «hasta que el Hijo del Hombre hubiera resucitado de entre los muertos», no «hasta cuando...».
  revised_spanish_text: Y mientras ellos bajaban del monte, les mandó que no contaran a nadie lo que habían visto[b], excepto cuando[a] el Hijo del Hombre hubiera resucitado de entre los muertos.
  revised_footnotes:
