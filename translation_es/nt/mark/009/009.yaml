    reason: alternative_reading
  - marker: b
    text: 'Griego: «de entre los muertos».'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula temporal para reflejar fielmente εἰ μὴ ὅταν con español natural («excepto cuando») y se reubica la nota alternativa en el lugar correcto. Se conserva el resto del borrador porque transmite adecuadamente el sentido del griego y las decisiones auditadas de la POB.
