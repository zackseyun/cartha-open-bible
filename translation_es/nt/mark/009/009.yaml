translation:
  language: es
  text: Y mientras ellos bajaban del monte, les mandó que no contaran a nadie lo que habían visto[b], excepto cuando[a] el Hijo del Hombre hubiera resucitado de entre los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más idiomáticamente, «hasta que el Hijo del Hombre hubiera resucitado de entre los muertos».
    reason: alternative_reading
  - marker: b
    text: 'Griego: «de entre los muertos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καταβαινόντων
  english_pob_choice: as they were coming down
  chosen_spanish: mientras ellos bajaban
  alternatives_spanish:
  - mientras descendían
  - cuando bajaban
  lexicon: BDAG
  rationale: El participio genitivo absoluto expresa acción concomitante; en español, 'mientras' + imperfecto comunica bien la simultaneidad sin sonar forzado.
- source_word: ὄρους
  english_pob_choice: mountain
  chosen_spanish: monte
  alternatives_spanish:
  - montaña
  - cerro
  lexicon: BDAG
  rationale: '''Ὄρος'' puede renderizarse como ''monte'' en español bíblico natural y digno; mantiene el tono narrativo sin introducir una distinción geográfica ajena al contexto.'
- source_word: διεστείλατο
  english_pob_choice: he ordered
  chosen_spanish: les mandó
  alternatives_spanish:
  - les ordenó
  - les encargó
  lexicon: BDAG
  rationale: El verbo expresa una instrucción imperativa con fuerza. 'Mandó' conserva esa fuerza de manera natural en español; 'ordenó' también es posible, pero menos idiomático aquí.
- source_word: ἵνα μηδενὶ
  english_pob_choice: to tell no one
  chosen_spanish: que no contaran a nadie
  alternatives_spanish:
  - para no decirle a nadie
  - que no dijeran nada a nadie
  lexicon: BDAG
  rationale: La construcción de propósito/contenido se expresa naturalmente con subjuntivo en español. 'A nadie' conserva el alcance negativo de μηδενί.
- source_word: ἃ εἶδον
  english_pob_choice: what they had seen
  chosen_spanish: lo que habían visto
  alternatives_spanish:
  - las cosas que habían visto
  - lo que vieron
  lexicon: BDAG
  rationale: El relativo neutro plural se vierte de forma natural como 'lo que'. El pluscuamperfecto refleja que la visión ya había ocurrido antes del mandato.
- source_word: διηγήσωνται
  english_pob_choice: tell
  chosen_spanish: contaran
  alternatives_spanish:
  - relataran
  - narraran
  lexicon: BDAG
  rationale: El verbo puede implicar relatar o contar; 'contar' es claro y natural en español, sin añadir una idea de informe técnico que el contexto no exige.
- source_word: εἰ μὴ ὅταν
  english_pob_choice: except when
  chosen_spanish: sino hasta cuando
  alternatives_spanish:
  - excepto cuando
  - salvo cuando
  lexicon: BDAG
  rationale: La combinación introduce una excepción temporal. En español, 'sino hasta cuando' expresa bien la restricción temporal y evita la ambigüedad de un mero 'excepto cuando'.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título tradicional, que en español sigue siendo transparente y preserva la resonancia titular y daniélica del griego.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from among the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de entre los muertos
  - de los muertos
  lexicon: BDAG
  rationale: '''De entre los muertos'' mantiene con claridad la noción de salida desde el grupo de los muertos, más precisa que un simple ''de los muertos''.'
- source_word: ἀναστῇ
  english_pob_choice: had risen
  chosen_spanish: hubiera resucitado
  alternatives_spanish:
  - hubiera levantado
  - resucitara
  lexicon: BDAG
  rationale: Tras 'hasta cuando', el subjuntivo pluscuamperfecto expresa adecuadamente la acción futura completada respecto al momento de la restricción. 'Resucitado' comunica claramente la resurrección.
theological_decisions:
- issue: Temporal force of εἰ μὴ ὅταν
  english_pob_reading: except when the Son of Man had risen from among the dead
  chosen_spanish_reading: sino hasta cuando el Hijo del Hombre hubiera resucitado de entre los muertos
  alternative_spanish_readings:
  - excepto cuando el Hijo del Hombre hubiera resucitado de entre los muertos
  - salvo cuando el Hijo del Hombre hubiera resucitado de entre los muertos
  rationale: La POB en inglés conserva el valor literal de la excepción temporal. En español, 'sino hasta cuando' transmite la misma restricción con mayor naturalidad y mantiene la tensión temporal sin sobre-explicarla.
  doctrine_reference: Translation philosophy §1 y §3; preservar la forma del giro temporal sin resolverlo de manera interpretativa excesiva.
- issue: Rendering of ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_reading: the Son of Man
  chosen_spanish_reading: el Hijo del Hombre
  alternative_spanish_readings:
  - el Ser Humano
  - el Hombre
  rationale: Se mantiene el título cristológico tradicional por fidelidad al griego y por su resonancia bíblica, evitando una paráfrasis que debilite su carácter titular.
  doctrine_reference: Translation philosophy §2; preservar títulos cristológicos con fuerza histórica y textual.
- issue: Phrase ἐκ νεκρῶν
  english_pob_reading: from among the dead
  chosen_spanish_reading: de entre los muertos
  alternative_spanish_readings:
  - de los muertos
  rationale: La fórmula preserva la idea de movimiento desde el grupo de los muertos, evitando reducirla a una mera referencia al estado de muerte.
  doctrine_reference: Affirmations on resurrection and textual precision in translation.
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la última pasada; esta redacción española sigue de cerca la decisión exegética ya validada, ajustando solo la sintaxis para que resulte natural en español y corrigiendo la ancladura obligatoria de las notas.
  spanish_consistency_notes:
  - Se mantiene 'Hijo del Hombre' como título fijo y no como paráfrasis antropológica.
  - '''De entre los muertos'' conserva la precisión léxica del griego ἐκ νεκρῶν.'
  - '''Mandó'' comunica la fuerza de διεστείλατο sin arcaísmo.'
  - La estructura 'sino hasta cuando' busca reflejar la restricción temporal de εἰ μὴ ὅταν sin perder naturalidad en español.
  - Los pies de nota están anclados exactamente donde aparecen las expresiones alternativas en el texto.
