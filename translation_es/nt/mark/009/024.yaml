translation:
  language: es
  text: 'De inmediato, el padre del niño gritó y dijo[a]: «Creo[b]; ¡ayuda mi incredulidad!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el padre del hijo». El griego παιδίον puede significar «niño» o «hijo pequeño» según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «ayuda mi falta de fe». El griego ἀπιστία puede denotar incredulidad o carencia de fe.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθύς
  english_pob_choice: Immediately
  chosen_spanish: De inmediato
  alternatives_spanish:
  - Inmediatamente
  - Al instante
  lexicon: BDAG
  rationale: εὐθύς marca prontitud y urgencia. «De inmediato» conserva ese valor temporal en un español natural y digno, sin sonar arcaico.
- source_word: κράξας
  english_pob_choice: cried out
  chosen_spanish: gritó
  alternatives_spanish:
  - clamó
  - exclamó
  lexicon: BDAG
  rationale: El participio aoristo expresa una exclamación fuerte y urgente. «Gritó» transmite el clamor audible con naturalidad; «clamó» puede sonar más solemne, pero menos directo.
- source_word: ὁ πατὴρ τοῦ παιδίου
  english_pob_choice: the father of the child
  chosen_spanish: el padre del niño
  alternatives_spanish:
  - el padre del niño
  - el padre del muchacho
  lexicon: BDAG
  rationale: παιδίον puede referirse a «niño» o «hijo/niño pequeño» según el contexto. «Niño» mantiene el rango semántico sin estrechar innecesariamente el referente a «muchacho».
- source_word: ἔλεγεν
  english_pob_choice: said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - iba diciendo
  lexicon: BDAG
  rationale: Aunque el imperfecto puede sugerir continuidad, en español la introducción de discurso directo se expresa con naturalidad mediante «dijo». El contexto ya aporta la vivacidad de la escena.
- source_word: Πιστεύω
  english_pob_choice: I believe
  chosen_spanish: Creo
  alternatives_spanish:
  - Yo creo
  - Tengo fe
  lexicon: BDAG
  rationale: πιστεύω aquí funciona como confesión de fe inmediata. «Creo» es la forma más natural en español y preserva la afirmación breve y directa del original.
- source_word: βοήθει
  english_pob_choice: help
  chosen_spanish: ayuda
  alternatives_spanish:
  - socorre
  - asiste
  lexicon: BDAG
  rationale: El imperativo es una súplica directa. «Ayuda» es conciso y reproduce bien el tono urgente de la petición.
- source_word: μου τῇ ἀπιστίᾳ
  english_pob_choice: my unbelief
  chosen_spanish: a mi incredulidad
  alternatives_spanish:
  - a mi falta de fe
  - a mi desconfianza
  lexicon: BDAG
  rationale: ἀπιστία puede significar incredulidad o falta de fe. «Incredulidad» conserva el contraste retórico con «Creo» y mantiene la tensión del texto sin suavizarla.
theological_decisions:
- issue: Tensión entre πιστεύω y ἀπιστίᾳ
  english_pob_reading: 'Retain the paradox in the main text: ''I believe; help my unbelief!'''
  chosen_spanish_reading: 'Mantener el paradoja en el texto principal: «Creo; ¡ayuda a mi incredulidad!»'
  alternative_spanish_readings:
  - «Creo; ¡ayuda a mi falta de fe!»
  - «Sí creo; ¡ayuda a mi incredulidad!»
  rationale: El pasaje no resuelve la tensión entre fe real y falta de fe persistente. La traducción debe dejar audible ese contraste, porque pertenece al sentido teológico del ruego y no debe armonizarse artificialmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el tramo revisado más reciente del audit trail: no se documentan cambios posteriores y el consenso de revisión fue alto, por lo que la redacción propuesta conserva la lectura óptima-equivalente sin introducir nuevas tensiones textuales.'
  spanish_consistency_notes:
  - Se mantiene la secuencia narrativa breve y enfática del griego con una estructura natural en español.
  - «Incredulidad» se conserva como término principal para mantener el paralelismo semántico con «Creo» y la tensión teológica del versículo.
  - Las notas al pie preservan las alternativas léxicas documentadas en el audit trail en lugar de normalizarlas fuera del texto principal.
