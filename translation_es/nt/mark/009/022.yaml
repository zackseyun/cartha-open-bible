translation:
  language: es
  text: Y muchas veces lo ha arrojado tanto al fuego como a las aguas, para destruirlo[a]. Pero si puedes hacer algo, ayúdanos[b], ten compasión de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'al agua'. El griego tiene el plural 'a las aguas'.
    reason: lexical_alternative
  - marker: b
    text: O 'movido a compasión por nosotros' o 'ten misericordia de nosotros'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλάκις
  english_pob_choice: many times
  chosen_spanish: muchas veces
  alternatives_spanish:
  - a menudo
  - frecuentemente
  lexicon: BDAG
  rationale: Expresa con naturalidad la repetición reiterada de la acción y conserva la fuerza adverbial del griego sin volverla más fuerte de lo que el texto requiere.
- source_word: ἔβαλεν
  english_pob_choice: has thrown
  chosen_spanish: lo ha arrojado
  alternatives_spanish:
  - lo arrojó
  - lo ha echado
  lexicon: BDAG
  rationale: El aoristo reporta una acción repetida vista como un conjunto hasta el presente; el presente perfecto español mantiene bien ese valor retrospectivo. 'Arrojar' conserva el matiz violento de βάλλω.
- source_word: εἰς πῦρ ... καὶ εἰς ὕδατα
  english_pob_choice: into fire and into waters
  chosen_spanish: tanto al fuego como a las aguas
  alternatives_spanish:
  - al fuego y a las aguas
  - al fuego y al agua
  lexicon: BDAG
  rationale: Se conserva el doble movimiento con repetición semántica equivalente al griego. 'A las aguas' refleja el plural ὕδατα, que el inglés POB también preserva con 'waters'.
- source_word: ἵνα ἀπολέσῃ αὐτόν
  english_pob_choice: to destroy him
  chosen_spanish: para destruirlo
  alternatives_spanish:
  - para matarlo
  - con el fin de destruirlo
  lexicon: BDAG
  rationale: La construcción final ἵνα + subjuntivo expresa propósito. 'Destruirlo' sigue el alcance de ἀπόλλυμι sin reducirlo indebidamente a 'matarlo'.
- source_word: ἀλλ’ εἴ τι δύνῃ
  english_pob_choice: But if you can do anything
  chosen_spanish: Pero si puedes hacer algo
  alternatives_spanish:
  - Pero si puedes hacer algo que sea
  - Pero si puedes
  lexicon: BDAG
  rationale: Se mantiene el indefinido τι como 'algo', porque el padre expresa una petición cautelosa e incierta. La formulación no suaviza la tensión del original.
- source_word: βοήθησον ἡμῖν
  english_pob_choice: help us
  chosen_spanish: ayúdanos
  alternatives_spanish:
  - ven en nuestra ayuda
  - socórrenos
  lexicon: BDAG
  rationale: El imperativo aoristo pide ayuda inmediata. 'Ayúdanos' es directo, natural y plenamente fiel al valor exhortativo.
- source_word: σπλαγχνισθεὶς ἐφ’ ἡμᾶς
  english_pob_choice: having compassion on us
  chosen_spanish: teniendo compasión de nosotros
  alternatives_spanish:
  - movido a compasión por nosotros
  - teniendo misericordia de nosotros
  lexicon: BDAG
  rationale: El participio preserva mejor la forma adverbial del griego que una cláusula finita. 'Compasión' comunica el afecto entrañable de σπλαγχνίζομαι, y 'de nosotros' traduce con naturalidad ἐπί con acusativo en este contexto.
theological_decisions:
- issue: La cautela y la posible duda en la apelación del padre
  english_pob_reading: Render the clause straightforwardly as 'if you can do anything' without softening or resolving the tension.
  chosen_spanish_reading: Traducir 'si puedes hacer algo' sin añadir certidumbre ni convertirlo en una afirmación de fe más fuerte de la que el griego expresa.
  alternative_spanish_readings:
  - si eres capaz de hacer algo
  - si de algún modo puedes hacer algo
  rationale: El griego presenta una petición vacilante; la traducción conserva esa tensión narrativa y no la resuelve por medio de una paráfrasis más confiada.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el consenso del control cruzado fue de alta concordancia con observaciones menores בלבד. La redacción española se ajusta a ese estado estable y conserva las decisiones léxicas principales del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma del proyecto cuando corresponda; este versículo no lo contiene.
  - Se usa 'aguas' en plural para reflejar ὕδατα y conservar la tensión lexical documentada.
  - Se evita 'misericordia' en el texto principal porque el audit trail inglés privilegia 'compassion'; se deja como alternativa en nota.
  - Se preserva 'algo' para τι, porque su indefinición es teológicamente relevante en la escena.
