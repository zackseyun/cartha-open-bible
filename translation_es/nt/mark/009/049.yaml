translation:
  language: es
  text: Porque cada uno será salado con fuego[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cada uno será sazonado con fuego». La imagen puede evocar juicio, purificación o lenguaje sacrificial; compárese Levítico 2:13.
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos añaden: «y todo sacrificio será salado con sal».'
    reason: textual_variant
lexical_decisions:
- source_word: Πᾶς
  english_pob_choice: everyone
  chosen_spanish: todos
  alternatives_spanish:
  - cada uno
  - todos
  lexicon: BDAG
  rationale: El adjetivo funciona aquí como sustantivo y, en este contexto, el referente natural es personal. «Todos» conserva la amplitud de πᾶς sin restringir innecesariamente a una sola clase de personas.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque
  lexicon: BDAG
  rationale: Introduce la razón o explicación del dicho anterior. «Porque» mantiene con claridad la relación explicativa en español.
- source_word: πυρὶ
  english_pob_choice: with fire
  chosen_spanish: con fuego
  alternatives_spanish:
  - por fuego
  - en fuego
  lexicon: BDAG
  rationale: El dativo permite una relación instrumental o asociativa. «Con fuego» es natural en español y conserva la ambigüedad sin cerrar el sentido.
- source_word: ἁλισθήσεται
  english_pob_choice: will be salted
  chosen_spanish: serán salados
  alternatives_spanish:
  - serán sazonados
  - serán preservados con sal
  lexicon: BDAG
  rationale: El futuro pasivo de ἁλίζω significa literalmente «ser salado / sazonado con sal». «Serán salados» preserva la imagen marcada del original y evita resolverla en una interpretación explicativa.
theological_decisions:
- issue: Metáfora de «salados con fuego»
  english_pob_reading: Retain the literal-metaphorical wording without resolving whether it refers primarily to judgment, purification, sacrifice, or discipleship testing.
  chosen_spanish_reading: Conservar la expresión literal-metafórica «serán salados con fuego» sin decidir en el texto si alude principalmente al juicio, la purificación, el sacrificio o la prueba del discipulado.
  alternative_spanish_readings:
  - todos serán juzgados por fuego
  - todos serán purificados por fuego
  - todos serán consagrados como sacrificio, sazonado con sal
  rationale: El griego es alusivo y breve; el contexto admite varias lecturas relacionadas. La traducción principal mantiene la tensión teológica sin imponer una explicación interpretativa.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el pasaje fuente; el estado de revisión más reciente indica que no hubo cambios necesarios y que hubo alto acuerdo en los controles cruzados.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como forma base en el proyecto, pero este versículo no la contiene.
  - Se conserva el verbo pasivo en español para reflejar el pasivo futuro de ἁλισθήσεται.
  - «Fuego» y «salados» quedan sin explicitar la interpretación, para respetar la ambigüedad del original.
