review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego: Πᾶς γὰρ πυρὶ ἁλισθήσεται se refleja como una explicación general, con «con fuego» preservando la ambigüedad instrumental/asociativa y «serán salados» manteniendo la imagen difícil sin resolverla. También conserva correctamente la variante textual en nota.'
  spanish_quality_summary: La frase principal es comprensible, pero «todos serán salados» suena algo forzada en español y además «todos» puede inclinarse a un plural colectivo donde el singular distributivo del griego y el inglés auditado se capta mejor con «cada uno». «Cada uno será salado con fuego» suena más natural y mantiene el referente personal distributivo. Las notas son buenas; conviene quitar comillas simples sobrantes en la nota b.
  glossary_alignment: 'No hay términos del glosario principal especialmente implicados. La decisión clave ἁλισθήσεται → «será salado»/«serán salados» respeta la preferencia de preservar la fuerza léxica literal. La alternativa «sazonado» queda bien en nota. La revisión propuesta mejora la correspondencia con Πᾶς como uso sustantival distributivo: «cada uno».'
  issues:
  - severity: medium
    issue: «Todos serán salados» es menos natural y menos distributivo que el singular implícito del original.
    rationale: Πᾶς es singular sustantivado y el inglés auditado eligió «everyone». En español, «cada uno será salado con fuego» conserva mejor el matiz distributivo y suena más idiomático en un dicho general.
  - severity: low
    issue: Puntuación/estilo menor en la nota textual b.
    rationale: La nota comienza con comillas simples innecesarias antes de «Algunos manuscritos añaden...». Conviene normalizarla para limpieza editorial.
