    reason: textual_variant
  revision_rationale: Se ajusta «todos» a «cada uno» para reflejar mejor el singular sustantivado Πᾶς y la decisión auditada «everyone», con mejor naturalidad distributiva en español. Se mantiene la metáfora literal «será salado con fuego» según la filosofía POB. Además, se limpia la puntuación de la nota textual.
