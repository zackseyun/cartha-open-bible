translation:
  language: es
  text: Y si tu ojo te hace tropezar, arráncalo. Más te vale entrar en el reino de Dios con un solo ojo que, teniendo dos ojos, ser arrojado a Gehenna[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infierno». El griego dice «Gehenna», término ligado al Valle de Hinom y usado para el juicio escatológico.
    reason: alternative_reading
lexical_decisions:
- source_word: σκανδαλίζῃ
  english_pob_choice: causes you to stumble
  chosen_spanish: te hace tropezar
  alternatives_spanish:
  - te hace caer
  - te lleva a pecar
  - te hace ofender
  lexicon: BDAG
  rationale: Conserva la metáfora de tropiezo del verbo σκανδαλίζω sin reducirla solo a “pecar”. En español, “hacer tropezar” comunica bien la imagen y su fuerza advertencia.
- source_word: ἔκβαλε
  english_pob_choice: throw it out
  chosen_spanish: sácalo
  alternatives_spanish:
  - arrójalo
  - échatelo fuera
  - expúlsalo
  lexicon: BDAG
  rationale: El imperativo de ἐκβάλλω expresa expulsar o sacar con fuerza. “Sácalo” es natural en español y mantiene el mandato breve y enérgico sin sobreespecificar el modo.
- source_word: καλόν
  english_pob_choice: better
  chosen_spanish: Mejor
  alternatives_spanish:
  - Bueno
  - Más te conviene
  - Es preferible
  lexicon: BDAG
  rationale: En la construcción comparativa, español requiere una forma natural equivalente a “better for you”. “Mejor” conserva el valor comparativo e idiomático.
- source_word: μονόφθαλμον
  english_pob_choice: with one eye
  chosen_spanish: con un solo ojo
  alternatives_spanish:
  - tuerto
  - de un ojo
  - monóculo
  lexicon: BDAG
  rationale: μονόφθαλμος describe la condición de tener un solo ojo. “Con un solo ojo” mantiene la imagen concreta y evita una palabra más marcada como “tuerto”, que puede sonar menos neutral o más idiomática de lo deseado.
- source_word: βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - la realeza de Dios
  - el dominio de Dios
  lexicon: BDAG
  rationale: “Reino de Dios” es la correspondencia directa y transparente de βασιλεία τοῦ θεοῦ, ampliamente inteligible en español bíblico contemporáneo.
- source_word: βληθῆναι
  english_pob_choice: to be thrown
  chosen_spanish: ser arrojado
  alternatives_spanish:
  - ser echado
  - ser lanzado
  - ser tirado
  lexicon: BDAG
  rationale: El pasivo de βάλλω se traduce de forma natural como “ser arrojado”. Esto mantiene la pasividad del sujeto y la contundencia del verbo.
- source_word: γέενναν
  english_pob_choice: Gehenna
  chosen_spanish: la Gehenna
  alternatives_spanish:
  - el infierno
  - el Gehena
  lexicon: BDAG
  rationale: Se conserva el término técnico “Gehenna” para no aplanar la terminología de juicio escatológico. El artículo español ayuda a la fluidez sin cambiar el referente específico.
theological_decisions:
- issue: Distinción entre γέεννα y una traducción generalizada como “infierno”
  english_pob_reading: Gehenna with a footnote explaining the term and its Valley of Hinnom background
  chosen_spanish_reading: la Gehenna, con nota explicativa
  alternative_spanish_readings:
  - el infierno
  - el lugar de castigo final
  rationale: La fuente griega usa γέεννα, un término específico. Traducirlo como “infierno” borra esa precisión. Se mantiene “Gehenna” para preservar la referencia histórica y teológica, dejando la opción común en nota.
  doctrine_reference: Translation philosophy §1 (primacía del original); §6 (claridad moderna)
- issue: Fuerza hiperbólica del mandato sobre el ojo
  english_pob_reading: hyperbolic warning without softening the violence of the image
  chosen_spanish_reading: sácalo / ser arrojado
  alternative_spanish_readings:
  - quítalo
  - elíminalo
  rationale: El pasaje conserva un lenguaje duro e hiperbólico. No se debe suavizar la imagen ni convertirla en una mera metáfora moral, porque el texto emplea acciones corporales extremas para enfatizar la seriedad del tropiezo.
  doctrine_reference: Lectura literaria del discurso exhortativo; respeto a la imagen retórica del texto
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el criterio inglés auditado: mantiene la metáfora de tropiezo, conserva el contraste comparativo, y preserva “Gehenna” como término específico de juicio en lugar de generalizarlo como “infierno”. No se detectaron revisiones aplicadas en el paquete inglés más allá de la forma final establecida.'
  spanish_consistency_notes:
  - Se usó “reino de Dios” por consistencia con la terminología bíblica común y porque no hay indicio en el pasaje de que deba reemplazarse por una paráfrasis.
  - Se evitó “Cristo” u otros títulos no presentes en el versículo.
  - Se mantuvo un registro sobrio y eclesialmente legible, sin calco excesivo ni arcaísmos innecesarios.
