  glossary_alignment: No hay conflicto con los términos por defecto del proyecto. «Dios» y «reino de Dios» están bien. La elección de «Gehenna» respeta la decisión teológica documentada. «te hace tropezar» también armoniza con la preferencia de preservar la metáfora de σκανδαλίζω.
