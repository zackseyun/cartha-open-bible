translation:
  language: es
  text: 'Y les dijo[a]: «Esta clase no puede salir por ningún medio, sino por oración».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos posteriores leen: «oración y ayuno».'
    reason: textual_variant
lexical_decisions:
- source_word: Τοῦτο τὸ γένος
  english_pob_choice: This kind
  chosen_spanish: Esta clase
  alternatives_spanish:
  - Este tipo
  - Esta especie
  lexicon: BDAG
  rationale: γένος denota aquí una categoría o clase. En español, «esta clase» conserva la concisión del griego sin añadir «espíritu» u otro sustantivo que no aparece en el texto, aunque el contexto inmediato se refiere a un espíritu impuro.
- source_word: ἐν οὐδενί
  english_pob_choice: by anything
  chosen_spanish: por nada
  alternatives_spanish:
  - de ninguna manera
  - por ningún medio
  - por cualquier cosa
  lexicon: BDAG
  rationale: La construcción con ἐν + dativo expresa medio o instrumento. «Por nada» comunica en español la idea de que no hay medio alguno eficaz, manteniendo la fuerza negativa natural de la expresión.
- source_word: δύναται ἐξελθεῖν
  english_pob_choice: cannot come out
  chosen_spanish: no puede salir
  alternatives_spanish:
  - no puede salir fuera
  - no es capaz de salir
  lexicon: BDAG
  rationale: Para un contexto de expulsión demoníaca, «salir» es el equivalente idiomático natural en español. Conserva la noción de incapacidad del verbo δύναμαι sin volver la frase innecesariamente técnica.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - a menos que
  lexicon: BDAG
  rationale: Después de una negación, «sino» reproduce con naturalidad la exclusión única expresada por εἰ μὴ. En español resulta más fluido que repetir una construcción como «excepto».
- source_word: ἐν προσευχῇ
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - plegaria
  - oración a Dios
  lexicon: BDAG
  rationale: προσευχή se traduce normalmente como «oración». En español eclesial amplio, «oración» es la forma más clara y fiel; no se explicita «a Dios» porque el griego no lo dice.
theological_decisions:
- issue: Variante textual con «ayuno»
  english_pob_reading: prayer
  chosen_spanish_reading: oración
  alternative_spanish_readings:
  - oración y ayuno
  rationale: El texto griego proporcionado dice solo προσευχῇ («oración»). Por fidelidad a la base original, el texto principal no añade «ayuno», aunque esa lectura aparece en tradición manuscrita posterior y se conserva en nota como variante textual.
  doctrine_reference: Primacía del texto original y preservación de variantes textuales documentadas
- issue: Referencia implícita a un espíritu impuro
  english_pob_reading: This kind
  chosen_spanish_reading: Esta clase
  alternative_spanish_readings:
  - Este tipo de espíritu
  - Esta especie
  rationale: Aunque el contexto narrativo señala al espíritu inmundo, el sustantivo griego γένος no repite «espíritu». Se mantiene la ambigüedad textual de la frase y no se explicita más de lo que el griego ofrece.
  doctrine_reference: Preservar la tensión léxica del texto sin sobreinterpretación
translation_notes:
  revision_awareness: 'Se ha seguido el texto griego SBLGNT dado, con atención al aparato auditado en inglés: se mantiene solo «oración» en el texto principal y la variante más larga se reserva para nota. No se añadió «espíritu» en la línea principal porque el griego no lo dice explícitamente.'
  spanish_consistency_notes:
  - Se usa «oración» para προσευχή, en continuidad con el uso eclesial amplio y con el inglés auditado.
  - Se traduce δύναται ἐξελθεῖν por «no puede salir» para conservar la idea de incapacidad en español natural.
  - «Sino» reproduce la exclusión única de εἰ μὴ tras negación, evitando una estructura más pesada.
  - El tono de comillas angulares mantiene registro bíblico publicable en español.
