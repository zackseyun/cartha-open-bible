review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: mantiene «Esta clase» sin añadir «espíritu», conserva la imposibilidad con «no puede salir» y preserva la variante larga «oración y ayuno» en nota. Sin embargo, «por nada» no comunica con suficiente naturalidad ni precisión el valor instrumental de ἐν οὐδενί («por ningún medio / por nada [como medio]») y suena ambiguo en español.'
  spanish_quality_summary: La redacción es mayormente clara y eclesialmente natural, pero «no puede salir por nada, sino por oración» resulta poco idiomática y puede entenderse como causa o motivo («por nada») en vez de medio. «No puede salir por ningún medio, sino por oración» expresa mejor el griego y suena más natural en español general.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «oración» es adecuado para προσευχή. La decisión de mantener «Esta clase» en vez de explicitar «espíritu» sigue correctamente la justificación documentada.
  issues:
  - severity: medium
    issue: «por nada» para ἐν οὐδενί es ambiguo y poco natural
    rationale: La expresión griega indica medio o instrumento. En español, «por nada» puede oírse como 'sin motivo' o 'de ninguna manera', no claramente 'por ningún medio'. Eso debilita la precisión semántica del original y del análisis inglés.
  - severity: low
    issue: La construcción completa suena algo forzada
    rationale: «No puede salir por nada, sino por oración» no es la forma más fluida en español amplio. Una formulación con «por ningún medio» conserva el contraste exclusivo con «sino por oración» de manera más clara.
  revised_spanish_text: 'Y les dijo[a]: «Esta clase no puede salir por ningún medio, sino por oración».'
