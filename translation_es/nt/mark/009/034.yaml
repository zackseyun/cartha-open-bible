translation:
  language: es
  text: Pero ellos callaban[a], porque habían discutido entre sí en el camino quién era mayor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «quién era el mayor». Muchas traducciones españolas usan un superlativo idiomático, pero el adjetivo griego es comparativo: «mayor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But they
  chosen_spanish: Pero ellos
  alternatives_spanish:
  - Y ellos
  - Mas ellos
  lexicon: BDAG
  rationale: δέ introduce contraste suave con la pregunta anterior de Jesús. En español, «Pero ellos» reproduce bien ese giro sin sonar forzado.
- source_word: ἐσιώπων
  english_pob_choice: kept silent
  chosen_spanish: callaban
  alternatives_spanish:
  - guardaban silencio
  - se mantenían callados
  lexicon: BDAG
  rationale: El imperfecto sugiere una acción కొనసాగada o sostenida; «callaban» conserva mejor ese aspecto que un simple pretérito puntual.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - mutuamente
  lexicon: BDAG
  rationale: La expresión recíproca se expresa de manera natural en español con «entre sí», manteniendo la idea de interacción mutua.
- source_word: διελέχθησαν
  english_pob_choice: had argued
  chosen_spanish: habían discutido
  alternatives_spanish:
  - habían debatido
  - habían alegado
  lexicon: BDAG
  rationale: En este contexto, la conversación tenía un contenido competitivo sobre estatus. «Discutido» comunica la disputa sin exceder la fuerza del verbo griego, y el pluscuamperfecto español refleja la anterioridad respecto del silencio presente.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the road
  chosen_spanish: en el camino
  alternatives_spanish:
  - por el camino
  - en la ruta
  lexicon: BDAG
  rationale: En español bíblico actual, «en el camino» es la forma más natural y fiel al sentido de desplazamiento del contexto narrativo de Marcos.
- source_word: τίς μείζων
  english_pob_choice: who was greater
  chosen_spanish: quién era mayor
  alternatives_spanish:
  - quién era más grande
  - quién era el mayor
  lexicon: BDAG
  rationale: El comparativo μείζων se vierte directamente con «mayor», preservando la comparación del griego sin convertirla en superlativo. «Era» coordina con el contenido implícito de la discusión.
theological_decisions:
- issue: Comparativo griego preservado frente al superlativo idiomático
  english_pob_reading: who was greater
  chosen_spanish_reading: quién era mayor
  alternative_spanish_readings:
  - quién era el mayor
  - quién era más grande
  rationale: El texto griego usa un comparativo, no un superlativo. Mantener «mayor» conserva la tensión lexical documentada por el POB inglés y evita suavizarla hacia una formulación más idiomática pero menos precisa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El borrador sigue el acuerdo alto del audit trail inglés y mantiene sin cambios relevantes la lectura principal: silencio continuado, discusión previa en el camino y comparativo griego preservado en español.'
  spanish_consistency_notes:
  - Se usó «camino» para ὁδός, consistente con el contexto narrativo de Marcos y con el uso frecuente de la sección.
  - Se evitó «señor» o cualquier terminología eclesiástica ajena al texto; el versículo no contiene vocabulario teológico que requiera normalización adicional.
  - La nota al pie se ancla en «mayor» para preservar la alternativa lexical documentada.
