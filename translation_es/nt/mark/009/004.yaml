translation:
  language: es
  text: Y se les apareció Elías con Moisés, y estaban hablando[a] con Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estaban conversando con Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se les apareció
  alternatives_spanish:
  - fue visto por ellos
  - se hizo visible a ellos
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω aquí funciona con sentido intransitivo de manifestación; en español, «se les apareció» conserva la irrupción narrativa y la relación con el dative αὐτοῖς.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: se les
  alternatives_spanish:
  - a ellos
  - delante de ellos
  lexicon: BDAG
  rationale: El dativo marca a quienes se les aparece Elías; el clítico dativo español «les» expresa naturalmente ese destinatario sin endurecer la frase.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  lexicon: nombre propio
  rationale: Transliteración española estándar del nombre propio bíblico.
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - junto con
  lexicon: BDAG
  rationale: La preposición expresa compañía; «con» es la opción más directa y natural en español. «Junto con» sería más explícita, pero no necesaria.
- source_word: Μωϋσεῖ
  english_pob_choice: Moses
  chosen_spanish: Moisés
  lexicon: nombre propio
  rationale: Transliteración española estándar del nombre propio bíblico.
- source_word: συλλαλοῦντες
  english_pob_choice: talking
  chosen_spanish: conversando
  alternatives_spanish:
  - hablando
  - charlando
  lexicon: BDAG
  rationale: El participio indica hablar mutuamente, dialogar; «conversando» preserva bien la reciprocidad sin sonar coloquial como «charlando».
- source_word: τῷ Ἰησοῦ
  english_pob_choice: with Jesus
  chosen_spanish: con Jesús
  alternatives_spanish:
  - a Jesús
  lexicon: BDAG
  rationale: Aunque el dativo podría verterse literalmente con «a Jesús», el verbo de conversación favorece en español la relación recíproca «con Jesús».
theological_decisions:
- issue: Realidad de la aparición de Elías y Moisés en la escena
  english_pob_reading: Render the verse straightforwardly as the appearance of Elijah with Moses speaking with Jesus, without interpretive qualification.
  chosen_spanish_reading: 'Presentar la escena de forma directa: Elías se apareció con Moisés y conversaban con Jesús.'
  alternative_spanish_readings:
  - Elías fue visto por ellos con Moisés
  - Elías y Moisés aparecieron como visión simbólica
  rationale: El griego narra la aparición y el diálogo sin matiz interpretativo; la traducción debe mantener esa tensión teológica sin resolverla ni reducirla a símbolo.
  doctrine_reference: Preservar la tensión teológica sin añadir explicación doctrinal al texto.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando la nota al pie no anclada; el texto ya no requiere marcador porque no se introduce una alternativa textual explícita en la línea principal.
  spanish_consistency_notes:
  - Se mantiene «Jesús» y no «Cristo» porque el griego usa el nombre propio Ἰησοῦς.
  - Se usa «Elías» y «Moisés» como transliteraciones estándar en español.
  - Se eligió «conversando» para reflejar el sentido mutuo de συλλαλοῦντες y evitar una calca rígida.
