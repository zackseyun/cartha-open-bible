translation:
  language: es
  text: Y de repente, al mirar alrededor, ya no vieron a nadie, sino solo[a] a Jesús con ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sino a Jesús solo con ellos».'
    reason: alternative_rendering
lexical_decisions:
- source_word: ἐξάπινα
  english_pob_choice: suddenly
  chosen_spanish: de repente
  alternatives_spanish:
  - súbitamente
  - repentinamente
  lexicon: BDAG
  rationale: El adverbio expresa brusquedad e inesperada inmediatez. «De repente» es natural en español y conserva el cambio abrupto de escena sin añadir matiz interpretativo.
- source_word: περιβλεψάμενοι
  english_pob_choice: looking around
  chosen_spanish: al mirar alrededor
  alternatives_spanish:
  - mirando alrededor
  - al echar una mirada alrededor
  lexicon: BDAG
  rationale: El participio aoristo medio describe la acción de observar el entorno. «Al mirar alrededor» es idiomático, claro y suficientemente cercano al griego narrativo.
- source_word: οὐκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - no seguían
  lexicon: BDAG
  rationale: Marca la cesación de una condición previa. «Ya no» es la forma más natural en español para expresar esa interrupción.
- source_word: οὐδένα
  english_pob_choice: anyone
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - a nadie más
  lexicon: BDAG
  rationale: En español, el objeto negativo se expresa mejor con «a nadie» en este contexto narrativo, manteniendo la negación del griego sin perder fluidez.
- source_word: εἶδον
  english_pob_choice: saw
  chosen_spanish: vieron
  alternatives_spanish:
  - contemplaron
  - alcanzaron a ver
  lexicon: BDAG
  rationale: El aoristo narrativo de ὁράω se vierte de manera simple como «vieron», sin sobrecargar el verbo con matices no presentes en el texto.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - excepto
  lexicon: BDAG
  rationale: Después de una negación, «sino» reproduce con precisión la fuerza exceptiva/adversativa del griego y suena natural en español.
- source_word: μόνον
  english_pob_choice: alone
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: Aquí modifica a Jesús para señalar exclusividad. «Solo» mantiene la fuerza del griego sin duplicar innecesariamente la exclusión ya expresada por «sino».
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: with them
  chosen_spanish: con ellos
  alternatives_spanish:
  - en su compañía
  - junto a ellos
  lexicon: BDAG
  rationale: La preposición con el pronombre reflexivo indica que Jesús estaba presente con los discípulos. «Con ellos» es la manera más clara e idiomática de expresarlo en español.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - Jesús
  - al Jesús
  lexicon: BDAG
  rationale: El nombre propio se translitera como «Jesús». Se mantiene la marca de objeto directo con «a» por norma del español cuando corresponde a persona.
theological_decisions:
- issue: Alcance de la exclusividad visual tras la transfiguración
  english_pob_reading: The verse is rendered to emphasize that Moses and Elijah were no longer visible and that Jesus alone remained with the disciples, without importing additional theological interpretation into the translation itself.
  chosen_spanish_reading: 'El versículo se vierte como un hecho narrativo: ya no ven a nadie, sino a Jesús solo con ellos, sin añadir una explicación teológica explícita.'
  alternative_spanish_readings:
  - ver únicamente a Jesús con ellos
  - no ver a nadie excepto a Jesús con ellos
  rationale: El griego presenta un dato visual y narrativo. La traducción conserva esa sobriedad y la exclusividad de Jesús sin convertir el versículo en comentario doctrinal.
  doctrine_reference: Preservar la tensión narrativa y no resolverla mediante paráfrasis doctrinal
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando toda nota al pie no anclada en el texto. La redacción final mantiene la fuerza exceptiva de ἀλλά mediante «sino», sin requerir marcador de nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no aplica.
  - Se mantiene el nombre propio «Jesús» conforme al estándar del proyecto.
  - La estructura «ya no vieron a nadie, sino a Jesús solo con ellos» conserva la construcción negativa-exceptiva del griego sin introducir una interpretación adicional.
  - El español evita calco innecesario de la secuencia inglesa y sigue una sintaxis natural para narrativa bíblica moderna.
