translation:
  language: es
  text: 'Pero Jesús le dijo[b][a]: «“Si puedes”? Todas las cosas son posibles para el que cree».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Lo de “si puedes”?». Jesús repite y cuestiona las palabras del padre en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: La frase «el que cree» también puede traducirse «el que tiene fe» o «el que confía».
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ δὲ Ἰησοῦς εἶπεν αὐτῷ
  english_pob_choice: But Jesus said to him
  chosen_spanish: Pero Jesús le dijo
  alternatives_spanish:
  - Y Jesús le dijo
  - Entonces Jesús le dijo
  lexicon: SBLGNT / BDAG
  rationale: Se conserva la adversativa δὲ con «pero» y el dativo indirecto αὐτῷ con «le». El verbo «dijo» reproduce el aoristo narrativo de manera natural en español.
- source_word: Τὸ Εἰ δύνῃ
  english_pob_choice: ‘If you can’?
  chosen_spanish: «¿“Si puedes”?»
  alternatives_spanish:
  - «Asunto de “si puedes”»
  - «¿“Si puedes”?»
  lexicon: SBLGNT / BDAG
  rationale: El artículo neutro Τὸ marca una cita retomada y subrayada; en español se transmite mejor como repetición interrogativa de la frase del padre, manteniendo el matiz de desafío de Jesús sin volverla demasiado literal y extraña.
- source_word: δύνῃ
  english_pob_choice: you can
  chosen_spanish: puedes
  alternatives_spanish:
  - eres capaz
  - tienes poder
  lexicon: BDAG
  rationale: δύναμαι aquí expresa capacidad. «Puedes» es la equivalencia más natural y directa en español contemporáneo.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: Todo
  alternatives_spanish:
  - Todas las cosas
  - Todo
  lexicon: BDAG
  rationale: Aunque el griego es plural neutro, en español «todo» evita una construcción pesada y conserva el alcance absoluto de la frase.
- source_word: δυνατὰ
  english_pob_choice: are possible
  chosen_spanish: es posible
  alternatives_spanish:
  - son posibles
  - pueden hacerse
  lexicon: BDAG
  rationale: El predicado con δυνατός en este contexto comunica posibilidad. En español, «es posible» mantiene el sentido idiomático sin forzar el plural de «todo».
- source_word: τῷ πιστεύοντι
  english_pob_choice: for the one who believes
  chosen_spanish: para el que cree
  alternatives_spanish:
  - para el que tiene fe
  - para el creyente
  lexicon: BDAG
  rationale: 'El participio presente πιστεύοντι se vierte como una designación de persona en acción continua: «el que cree». «Para» refleja la relación de posibilidad del enunciado.'
- source_word: πιστεύοντι
  english_pob_choice: believes
  chosen_spanish: cree
  alternatives_spanish:
  - tiene fe
  - confía
  lexicon: BDAG
  rationale: «Cree» conserva el valor verbal de πιστεύω en el contexto. «Tiene fe» sería posible, pero suena más nominal y se aleja un poco del participio verbal.
theological_decisions:
- issue: Alcance absoluto de «Todo es posible»
  english_pob_reading: Retain the absolute-sounding statement without adding qualifiers in the main text.
  chosen_spanish_reading: Mantener la afirmación absoluta sin añadir en el texto principal una aclaración como «con Dios».
  alternative_spanish_readings:
  - Todo es posible con Dios para el que cree
  - Todo es posible al creyente en el contexto del poder de Dios
  rationale: El griego no inserta aquí una cualificación explícita; por eso el español preserva el énfasis retórico y deja la tensión teológica intacta, en línea con la filosofía de traducción del POB.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las dos notas al texto mediante [a] y [b], sin cambiar la lectura base ya aprobada y manteniendo la fuerza interrogativa y absoluta del dicho.
  spanish_consistency_notes:
  - Se usa «Jesús» para Ἰησοῦς, conforme al estándar del proyecto.
  - Se mantiene «cree» para πιστεύω, reservando «fe» para la nota alternativa.
  - Se evita añadir «con Dios» en el texto principal para no resolver la tensión teológica del dicho.
  - La puntuación con comillas anidadas refleja la cita retadora del fragmento griego.
