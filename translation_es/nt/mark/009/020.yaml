    text: O «al espíritu inmundo»; el contexto más amplio identifica al espíritu como inmundo, pero este versículo dice simplemente «el espíritu».
    reason: alternative_reading
  - marker: b
    text: O «lo arrojó en convulsiones».
    reason: lexical_alternative
  revision_rationale: Se ajustó la primera cláusula para un español más natural y claro, evitando el calco «a él». Se cambió «lo convulsionó» por «le causó convulsiones» para reflejar mejor el verbo griego en español idiomático. También se suavizó «en tierra» a «al suelo». La nota [a] se adaptó para seguir anclada al referente «espíritu» en la oración revisada, y la [b] mantiene una alternativa léxica válida para συνεσπάραξεν.
