translation:
  language: es
  text: Y se lo llevaron ante él[a]. Y cuando el espíritu lo vio, inmediatamente le causó convulsiones, y cayó al suelo y se revolcaba[b], echando espuma.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al espíritu inmundo»; el contexto más amplio identifica al espíritu como inmundo, pero este versículo dice simplemente «el espíritu».
    reason: alternative_reading
  - marker: b
    text: O «lo arrojó en convulsiones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤνεγκαν
  english_pob_choice: brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - llevaron
  - trajeron hasta
  lexicon: BDAG
  rationale: El aoristo de φέρω aquí expresa el traslado del muchacho hacia Jesús. En español, «trajeron» es natural y conserva la acción de conducirlo hasta alguien sin sobretraducir.
- source_word: πρὸς αὐτόν
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - ante él
  - hacia él
  lexicon: BDAG
  rationale: La preposición πρός con acusativo indica dirección hacia una persona. «A él» es la forma más sobria y clara en español para referirse a Jesús.
- source_word: τὸ πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - el espíritu inmundo
  - el demonio
  lexicon: BDAG
  rationale: El griego de este versículo dice simplemente «el espíritu». Aunque el contexto amplio lo identifica como inmundo, aquí se preserva el texto del versículo sin añadir calificativos no presentes.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: inmediatamente
  alternatives_spanish:
  - enseguida
  - al instante
  lexicon: BDAG
  rationale: «Inmediatamente» reproduce bien la fuerza adverbial de εὐθύς en un español actual y digno, sin perder la rapidez enfática de Marcos.
- source_word: συνεσπάραξεν
  english_pob_choice: convulsed
  chosen_spanish: lo convulsionó
  alternatives_spanish:
  - lo sacudió violentamente
  - lo hizo tener convulsiones
  lexicon: BDAG
  rationale: El verbo expresa espasmos o convulsiones intensas. «Lo convulsionó» mantiene esa fuerza clínica y narrativa con brevedad; se evita suavizarlo con un verbo más genérico.
- source_word: πεσὼν ἐπὶ τῆς γῆς
  english_pob_choice: he fell on the ground
  chosen_spanish: cayó en tierra
  alternatives_spanish:
  - cayó al suelo
  - cayó a tierra
  lexicon: BDAG
  rationale: El participio señala la caída del muchacho en la secuencia de acciones. «Cayó en tierra» es bíblico pero sigue siendo comprensible y no introduce una paráfrasis excesiva.
- source_word: ἐκυλίετο
  english_pob_choice: rolled about
  chosen_spanish: se revolcaba
  alternatives_spanish:
  - rodaba
  - se agitaba
  lexicon: BDAG
  rationale: El imperfecto medio describe una acción continua. «Se revolcaba» comunica bien el movimiento repetido o prolongado del cuerpo en español, conservando la vivacidad del relato.
- source_word: ἀφρίζων
  english_pob_choice: foaming
  chosen_spanish: echando espuma
  alternatives_spanish:
  - espumando
  - con espuma
  lexicon: BDAG
  rationale: El participio describe el estado concomitante del muchacho durante la convulsión. «Echando espuma» es idiomático y fiel sin añadir explícitamente «por la boca», que el griego no dice de forma directa.
theological_decisions:
- issue: Identificación de τὸ πνεῦμα
  english_pob_reading: Rendered as 'the spirit' in the main text without adding 'unclean' or 'demon.'
  chosen_spanish_reading: Se traduce «el espíritu» sin añadir «inmundo» ni «demonio» en el texto principal.
  alternative_spanish_readings:
  - el espíritu inmundo
  - el demonio
  rationale: 'La decisión sigue la primacía del texto de este versículo: el griego conserva solo τὸ πνεῦμα. El contexto más amplio sí aclara que se trata de un espíritu inmundo, pero esa aclaración no se incorpora al versículo principal para no expandirlo interpretativamente.'
  doctrine_reference: Translation philosophy §1 (primacía del idioma original sobre la tradición de traducción)
- issue: Relación entre la caída y la convulsión
  english_pob_reading: And he fell on the ground and rolled about, foaming.
  chosen_spanish_reading: 'Se mantiene la secuencia: primero cayó, luego se revolcaba, mientras echaba espuma.'
  alternative_spanish_readings:
  - cayó y se revolcó en tierra
  - se cayó mientras se revolcaba
  rationale: El texto griego presenta una cadena de participios y verbos que describe acciones sucesivas y concomitantes del muchacho. La versión española conserva esa relación sin fusionarla en una sola imagen menos precisa.
  doctrine_reference: Translation philosophy §2 (claridad narrativa sin perder la secuencia del original)
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del POB en inglés, que sustituyó una construcción participial menos clara por «he fell on the ground» para clarificar que quien cayó fue el muchacho. En español se reflejó esa claridad con «cayó en tierra», manteniendo además el flujo narrativo del original griego.
  spanish_consistency_notes:
  - Se conserva «espíritu» en minúscula porque funciona como sustantivo común en este contexto narrativo.
  - «En tierra» se eligió como equivalente bíblico y natural de ἐπὶ τῆς γῆς, sin forzar una lectura técnica distinta.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene esa referencia.
  - Se mantuvo un registro sobrio y narrativo, acorde con un evangelio sinóptico en estilo de proclamación pública.
