revisions:
- from: Y lo trajeron a él[a]. Y cuando el espíritu lo vio, inmediatamente lo convulsionó, y cayó en tierra y se revolcaba[b], echando espuma.
  to: Y se lo llevaron ante él[a]. Y cuando el espíritu lo vio, inmediatamente le causó convulsiones, y cayó al suelo y se revolcaba[b], echando espuma.
  rationale: Se ajustó la primera cláusula para un español más natural y claro, evitando el calco «a él». Se cambió «lo convulsionó» por «le causó convulsiones» para reflejar mejor el verbo griego en español idiomático. También se suavizó «en tierra» a «al suelo». La nota [a] se adaptó para seguir anclada al referente «espíritu» en la oración revisada, y la [b] mantiene una alternativa léxica válida para συνεσπάραξεν.
