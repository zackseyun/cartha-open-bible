translation:
  language: es
  text: 'Y una nube vino, cubriéndolos con su sombra, y una voz salió de la nube: «Este es mi Hijo amado; escúchenlo[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «óiganlo». El mandato tiene el sentido de prestar atención con cuidado, no solo de percibir un sonido.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: vino
  alternatives_spanish:
  - llegó
  - apareció
  - se hizo presente
  lexicon: BDAG
  rationale: En español, con «nube» como sujeto, «vino» comunica la irrupción repentina del acontecimiento de manera natural. Conserva el valor eventivo de γίνομαι sin recurrir a una fórmula impersonal poco idiomática como «hubo».
- source_word: νεφέλη
  english_pob_choice: cloud
  chosen_spanish: nube
  alternatives_spanish:
  - nubarrón
  lexicon: BDAG
  rationale: El sentido léxico básico es «nube». No se amplía interpretativamente el término, aunque el contexto sugiera presencia divina.
- source_word: ἐπισκιάζουσα
  english_pob_choice: overshadowing
  chosen_spanish: cubriéndolos con su sombra
  alternatives_spanish:
  - ensombreciéndolos
  - cubriéndolos
  - envolviéndolos
  lexicon: BDAG
  rationale: El participio expresa la acción de proyectar sombra o cubrir con sombra. «Cubriéndolos con su sombra» conserva la imagen y resulta más natural que un calco como «sobrecubriendo».
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - sobre ellos
  - a ellos
  lexicon: BDAG
  rationale: En español, el objeto directo «los» queda integrado en la construcción participial. La relación espacial ya está sugerida por «con su sombra», de modo que no es necesario duplicarla explícitamente.
- source_word: φωνή
  english_pob_choice: a voice
  chosen_spanish: una voz
  alternatives_spanish:
  - un sonido
  - una voz que habló
  lexicon: BDAG
  rationale: Aquí se trata de una manifestación verbal divina; «voz» es la equivalencia directa y suficiente. No se añade «que habló» porque el texto griego no lo expresa de forma explícita.
- source_word: ἐκ τῆς νεφέλης
  english_pob_choice: out of the cloud
  chosen_spanish: de la nube
  alternatives_spanish:
  - desde la nube
  - de en medio de la nube
  lexicon: BDAG
  rationale: «De la nube» reproduce bien el origen de la voz en español y evita una repetición pesada. Aunque «ἐκ» puede sugerir salida desde el interior, no exige una expansión adicional en el texto principal.
- source_word: ὁ υἱός μου
  english_pob_choice: my Son
  chosen_spanish: mi Hijo
  alternatives_spanish:
  - mi Hijo
  lexicon: BDAG
  rationale: 'Se conserva la filiación divina con el término directo «Hijo». El orden español normal coloca el posesivo antes del sustantivo: «mi Hijo».'
- source_word: ὁ ἀγαπητός
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - amado entrañablemente
  - querido
  lexicon: BDAG
  rationale: «Amado» es breve, solemne y fiel al valor de ἀγαπητός. «Amado» también evita sobrecargar el texto con matices no explícitos como «entrañablemente».
- source_word: ἀκούετε αὐτοῦ
  english_pob_choice: listen to him
  chosen_spanish: escúchenlo
  alternatives_spanish:
  - óiganlo
  - escúchenle
  lexicon: BDAG
  rationale: El imperativo presente pide una escucha atenta y receptiva. «Escúchenlo» comunica mejor ese llamado que «óiganlo», que en español puede quedar reducido a la mera percepción auditiva. Se conserva el plural implícito del verbo.
theological_decisions:
- issue: Declaración divina sobre la identidad de Jesús
  english_pob_reading: 'This is rendered as a direct heavenly affirmation: ''This is my beloved Son.'''
  chosen_spanish_reading: 'Se traduce como una afirmación directa del cielo: «Este es mi Hijo amado».'
  alternative_spanish_readings:
  - Este es mi Hijo amado
  - Este es el amado Hijo mío
  rationale: El griego presenta una proclamación reveladora sin añadidos explicativos. La redacción española conserva ese tono solemne y cristológico sin introducir formulaciones doctrinales externas al versículo.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Fuerza de ἀκούετε αὐτοῦ
  english_pob_reading: Rendered 'listen to him' rather than 'hear him' or 'obey him.'
  chosen_spanish_reading: Se traduce «escúchenlo», no «óiganlo» ni «obedézcanlo».
  alternative_spanish_readings:
  - óiganlo
  - obedézcanlo
  rationale: El imperativo implica atención obediente, pero el verbo griego no usa un término explícito para «obedecer». «Escúchenlo» preserva la fuerza exhortativa sin sobreinterpretarla.
  doctrine_reference: 'Translation philosophy #3 and #6'
translation_notes:
  revision_awareness: 'El contexto auditado muestra acuerdo alto y sin revisiones aplicadas en la última pasada. La propuesta sigue la decisión inglesa estable: γίνομαι como llegada/evento repentino, νεφέλη como «nube», ἐπισκιάζω como imagen de sombra, y ἀκούετε como escucha atenta. Se ajusta la sintaxis al español natural sin perder el paralelismo del original.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «Hijo» con mayúscula inicial por referencia cristológica a Jesús, en continuidad con el criterio auditado en inglés.
  - «Escúchenlo» preserva el imperativo plural implícito; no se singulariza el mandato.
  - La puntuación con punto y coma reproduce la pausa fuerte antes del mandato final y ayuda a distinguir la declaración de la exhortación.
