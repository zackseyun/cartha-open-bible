translation:
  language: es
  text: La sal es buena[a]; pero si la sal se vuelve insípida, ¿con qué la sazonarán? Tengan sal en ustedes[b], y estén en paz unos con otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si la sal pierde su salinidad» o «se vuelve insípida».
    reason: lexical_alternative
  - marker: b
    text: El mandato «Tengan sal en ustedes» conserva la metáfora del griego; posibles sentidos incluyen pureza, sabiduría, fidelidad del pacto o una influencia preservadora, pero el texto no especifica uno de manera explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: buena
  alternatives_spanish:
  - útil
  - beneficiosa
  lexicon: BDAG
  rationale: καλός expresa una valoración positiva general. En español, «buena» conserva la sencillez aforística de la frase sin volverla interpretativa.
- source_word: ἅλας / ἅλα
  english_pob_choice: salt
  chosen_spanish: sal
  alternatives_spanish:
  - sal
  lexicon: BDAG
  rationale: Se mantiene el sustantivo «sal» de manera uniforme para conservar el juego verbal del pasaje y el referente culinario/metafórico.
- source_word: ἄναλον
  english_pob_choice: unsalty
  chosen_spanish: insípida
  alternatives_spanish:
  - sin sal
  - desabrida
  - pierde su sabor
  lexicon: BDAG
  rationale: ἄναλος significa literalmente «sin sal» o «insípido». «Insípida» es natural en español y comunica la pérdida de cualidad sin suavizar el contraste con «sal».
- source_word: γένηται
  english_pob_choice: becomes
  chosen_spanish: se vuelve
  alternatives_spanish:
  - llega a ser
  - se hace
  lexicon: BDAG
  rationale: γίνομαι indica cambio de estado. «Se vuelve» reproduce ese valor de transformación de forma idiomática.
- source_word: ἐν τίνι
  english_pob_choice: with what
  chosen_spanish: ¿con qué?
  alternatives_spanish:
  - ¿por medio de qué?
  - ¿con qué medio?
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «en qué», aquí la pregunta es instrumental. «¿Con qué?» es la equivalencia española más natural y fiel.
- source_word: ἀρτύσετε
  english_pob_choice: will you season
  chosen_spanish: la sazonaréis
  alternatives_spanish:
  - la sazonaréis nuevamente
  - la daréis sabor
  lexicon: BDAG
  rationale: ἀρτύω significa sazonar o condimentar. «Sazonaréis» mantiene la metáfora culinaria sin interpretarla de más.
- source_word: ἔχετε
  english_pob_choice: have
  chosen_spanish: Tened
  alternatives_spanish:
  - Tengan
  - Conserven
  lexicon: BDAG
  rationale: 'El imperativo presente se rinde con una orden directa y durativa: «Tened».'
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: in yourselves
  chosen_spanish: en vosotros
  alternatives_spanish:
  - entre vosotros
  - dentro de vosotros
  lexicon: BDAG
  rationale: La expresión reflexiva conserva el matiz interno del griego. «En vosotros» mantiene la metáfora de manera sobria y comprensible.
- source_word: εἰρηνεύετε
  english_pob_choice: be at peace
  chosen_spanish: estad en paz
  alternatives_spanish:
  - vivid en paz
  - manteneos en paz
  lexicon: BDAG
  rationale: εἰρηνεύω expresa estar o vivir en paz. «Estad en paz» es directo, formalmente equivalente y natural en español bíblico contemporáneo.
- source_word: ἐν ἀλλήλοις
  english_pob_choice: with one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre ustedes
  - los unos con los otros
  lexicon: BDAG
  rationale: La reciprocidad de ἀλλήλοις se expresa bien con «unos con otros», una fórmula clara y de uso amplio en español.
theological_decisions:
- issue: Fuerza metafórica de «sal» en el mandato final
  english_pob_reading: 'Retain the metaphor literally: ''Have salt in yourselves'''
  chosen_spanish_reading: 'Conservar la metáfora: «Tened sal en vosotros»'
  alternative_spanish_readings:
  - Tened pureza en vosotros
  - Tened sabiduría en vosotros
  rationale: El texto no define la metáfora. Mantenerla en español evita resolver la tensión interpretativa y permite que el lector perciba el vínculo con el dicho previo sobre la sal.
  doctrine_reference: Translation philosophy §3
- issue: Mandato final de paz recíproca
  english_pob_reading: 'Translate as an ethical imperative: ''be at peace with one another'''
  chosen_spanish_reading: 'Traducirlo como imperativo ético: «estad en paz unos con otros»'
  alternative_spanish_readings:
  - vivid en paz unos con otros
  - mantened la paz unos con otros
  rationale: La forma verbal presente se expresa con un imperativo que comunica una disposición continua de reconciliación y convivencia pacífica.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión inglesa más reciente cambió el final de 'live at peace' a 'be at peace' por mayor equivalencia formal. Por eso el español usa «estad en paz» en lugar de una paráfrasis más dinámica.
  spanish_consistency_notes:
  - Se mantiene «sal» de forma consistente para el doble juego léxico del pasaje.
  - Se evita introducir términos doctrinales no presentes en el griego, como «pureza» o «sabiduría», en el texto principal.
  - El cierre «unos con otros» conserva la reciprocidad de ἀλλήλοις con español natural y no masculino genérico forzado.
