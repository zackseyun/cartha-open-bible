revisions:
- from: La sal es buena[a]; pero si la sal se vuelve insípida, ¿con qué la sazonaréis? Tened sal en vosotros[b], y estad en paz unos con otros[c].
  to: La sal es buena[a]; pero si la sal se vuelve insípida, ¿con qué la sazonarán? Tengan sal en ustedes[b], y estén en paz unos con otros.
  rationale: La revisión unifica el pasaje en un español neutral latinoamericano con «ustedes», elimina la inconsistencia de persona verbal en la nota c, y mantiene intactos el sentido del griego, la metáfora de la sal y la fuerza imperativa del mandato final. La nota c se omite porque la alternativa inglesa («be at peace») no genera una alternativa léxica distinta en español fuera de la variación de persona verbal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:39:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego: «La sal es buena», el condicional sobre la sal que llega a ser insípida, la pregunta instrumental «¿con qué...?», la conservación de la metáfora «tener sal en vosotros/ustedes», y el mandato recíproco de paz. Sin embargo, hay un desajuste de registro pronominal: el texto mezcla «la sazonaréis / tened / vosotros» con una nota al pie que usa «estén». Para un español neutral latinoamericano y eclesialmente legible, conviene unificar en «ustedes».'
  spanish_quality_summary: La redacción es clara y fiel, pero «sazonaréis / tened / vosotros / estad» suena marcadamente peninsular y no cumple del todo con la meta de español neutral latinoamericano. Además, la nota c introduce una alternativa verbal en tercera persona plural («estén») que no corresponde al texto base en segunda persona plural peninsular. Una revisión menor puede mejorar naturalidad y consistencia sin alterar el significado.
  glossary_alignment: No hay conflicto con la terminología doctrinal del proyecto. «Sal», «insípida», «tener sal en ustedes» y «estar en paz unos con otros» preservan la metáfora y el contenido del original y del rastro de auditoría inglés. La decisión de mantener literalmente la metáfora de la sal está bien alineada con la justificación teológica documentada.
  issues:
  - severity: medium
    issue: Mezcla de registro pronominal no neutral
    rationale: «la sazonaréis», «tened», «vosotros» y «estad» pertenecen al registro de vosotros; el encargo pide español neutral latinoamericano. «Ustedes» es más apropiado y ampliamente legible.
  - severity: low
    issue: Nota al pie c inconsistente con el texto principal
    rationale: La nota c dice «O “estén en paz unos con otros”», mientras el texto principal usa «estad». La alternativa no debe surgir de un cambio artificial de persona verbal, sino reflejar una opción real de traducción.
