translation:
  language: es
  text: donde[a] su gusano no muere, y el fuego no se apaga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos Sinaítico y Vaticano del siglo IV) y en traducciones coptas tempranas, pero está presente en la tradición bizantina mayoritaria y en la latina. Probablemente es una adición posterior de un copista que repite las mismas palabras del versículo 48 (y del 44).
    reason: textual_variant
lexical_decisions:
- source_word: σκώληξ
  english_pob_choice: worm
  chosen_spanish: gusano
  alternatives_spanish:
  - lombriz
  - gusano de carroña
  lexicon: BDAG
  rationale: «Gusano» conserva el valor general de worm y mantiene la resonancia tradicional del dicho, además de enlazar naturalmente con la cita de Isaías 66:24. «Lombriz» suena más específica y menos adecuada al contexto de juicio; «gusano de carroña» explicita demasiado.
- source_word: τελευτᾷ
  english_pob_choice: die
  chosen_spanish: muere
  alternatives_spanish:
  - llega a su fin
  - perece
  lexicon: BDAG
  rationale: 'En este contexto, el presente durativo pide una traducción verbal sencilla: «muere». Reproduce la idea de una acción que no llega a consumarse. «Llega a su fin» y «perece» son posibles, pero menos directas.'
- source_word: σβέννυται
  english_pob_choice: quenched
  chosen_spanish: se apaga
  alternatives_spanish:
  - se extingue
  - se sofoca
  lexicon: BDAG
  rationale: «Se apaga» comunica bien la imagen de un fuego que no puede ser apagado, con naturalidad en español. «Se extingue» es más formal; «se sofoca» añade un matiz que no está en el griego.
- source_word: ὁ σκώληξ αὐτῶν
  english_pob_choice: their worm
  chosen_spanish: su gusano
  alternatives_spanish:
  - el gusano de ellos
  - su propio gusano
  lexicon: Syntactic context
  rationale: El posesivo plural αὐτῶν se expresa de forma natural con «su» en español. «El gusano de ellos» suena forzado; «su propio gusano» añade énfasis no garantizado por el texto.
theological_decisions:
- issue: 'Crítica textual: ausencia en los manuscritos más antiguos versus tradición bizantina/latina'
  english_pob_reading: This verse is absent from the earliest Greek manuscripts... but is present in the Byzantine majority tradition and the Latin tradition. It is likely a later scribal addition repeating the identical words of verse 48 (and verse 44).
  chosen_spanish_reading: Este versículo va con nota textual, porque falta en los manuscritos griegos más antiguos, pero está presente en la tradición bizantina mayoritaria y en la latina; probablemente repite las mismas palabras del versículo 48 (y del 44).
  alternative_spanish_readings:
  - Sin nota textual explícita, integrándolo sin comentario
  - Marcarlo como duda menor sin explicar la transmisión
  rationale: La POB en inglés preserva la tensión entre la recepción eclesial del texto y la evidencia textual temprana. En español conviene mantener esa advertencia para no ocultar la variante documentada ni suavizar el estatus del versículo.
  doctrine_reference: Crítica textual del Nuevo Testamento; preservación de la evidencia manuscrita y de la transmisión eclesial
translation_notes:
  revision_awareness: 'El borrador sigue la lectura y la nota textual del POB inglés sin cambios sustantivos en el sentido. Se conserva la equivalencia óptima del inglés: imaginería tradicional («gusano», «fuego no se apaga») y una nota crítica que documenta la variante textual sin eliminar el versículo del texto principal.'
  spanish_consistency_notes:
  - Se usa «gusano» en lugar de un término más técnico para mantener la resonancia bíblica y la conexión con Isaías 66:24.
  - Se usa «se apaga» para el fuego porque es idiomático, claro y fiel a la imagen de un fuego que no puede extinguirse.
  - La nota textual queda anclada en el texto principal con [a], siguiendo el patrón del POB inglés.
