translation:
  language: es
  text: Y guardaron el asunto[a] para sí[b], discutiendo qué significaba resucitar de entre los muertos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'el dicho' o 'la palabra'.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, 'para ellos mismos' o 'entre ellos'.
    reason: lexical_alternative
  - marker: c
    text: Más literalmente, 'levantarse de entre los muertos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸν λόγον
  english_pob_choice: the matter
  chosen_spanish: la palabra
  alternatives_spanish:
  - el asunto
  - la declaración
  - el dicho
  lexicon: BDAG
  rationale: λόγος aquí remite a la declaración previa de Jesús, no a una sola unidad léxica. En español, 'la palabra' conserva bien la referencia a lo dicho en v. 9 y mantiene la posibilidad de leer tanto 'la palabra' como 'el dicho' sin forzar una paráfrasis. Se deja la alternativa 'el asunto' como opción idiomática, pero 'la palabra' es más directa al eco verbal del contexto.
- source_word: ἐκράτησαν
  english_pob_choice: kept
  chosen_spanish: guardaron
  alternatives_spanish:
  - mantuvieron
  - conservaron
  - retuvieron
  lexicon: BDAG
  rationale: κρατέω puede expresar 'retener/guardar' en este contexto narrativo. 'Guardaron' comunica que no divulgaron la declaración y la conservaron entre ellos, sin sonar demasiado técnico. 'Retuvieron' es más cercano al valor literal, pero menos natural en español actual.
- source_word: πρὸς ἑαυτοὺς
  english_pob_choice: to themselves
  chosen_spanish: para sí
  alternatives_spanish:
  - entre ellos
  - para ellos mismos
  - dentro de sí
  lexicon: BDAG
  rationale: La frase indica que la reservaron dentro de su propio círculo. 'Para sí' es una expresión natural en español que transmite privacidad y reserva. 'Entre ellos' también sería posible, pero 'para sí' deja más claro que no la hicieron pública.
- source_word: συζητοῦντες
  english_pob_choice: discussing
  chosen_spanish: discutiendo
  alternatives_spanish:
  - dialogando
  - deliberando
  - debatían
  lexicon: BDAG
  rationale: El participio describe conversación activa y búsqueda de entendimiento. 'Discutiendo' aquí no implica pelea, sino intercambio de ideas, y encaja con la perplejidad de los discípulos. 'Debatían' podría sonar más intenso de lo que exige el texto.
- source_word: τί ἐστιν
  english_pob_choice: what it meant
  chosen_spanish: qué significaba
  alternatives_spanish:
  - qué era
  - qué quería decir
  - qué significaba aquello
  lexicon: BDAG
  rationale: 'Aunque gramaticalmente puede acercarse a ''qué es'', el sentido contextual es interpretativo: los discípulos intentan comprender el alcance de la frase de Jesús. ''Qué significaba'' comunica bien esa búsqueda de sentido sin ampliar el texto.'
- source_word: τὸ ἐκ νεκρῶν ἀναστῆναι
  english_pob_choice: to rise from the dead
  chosen_spanish: resucitar de entre los muertos
  alternatives_spanish:
  - levantarse de entre los muertos
  - volver a la vida de entre los muertos
  - resucitar de los muertos
  lexicon: BDAG
  rationale: La construcción expresa la idea de resurrección. 'Resucitar de entre los muertos' conserva la fuerza teológica y es natural en español bíblico contemporáneo. Se prefiere 'de entre' para reflejar mejor ἐκ νεκρῶν y mantener la tensión de 'entre los muertos' sin diluirla.
theological_decisions:
- issue: Lenguaje de resurrección con ἐκ νεκρῶν
  english_pob_reading: to rise from the dead
  chosen_spanish_reading: resucitar de entre los muertos
  alternative_spanish_readings:
  - levantarse de entre los muertos
  - resucitar de los muertos
  rationale: La frase debe conservar la afirmación de resurrección sin resolver la dificultad que los discípulos están tratando de entender. 'De entre los muertos' mantiene el matiz de ἐκ νεκρῶν y evita domesticar el texto a una fórmula más abstracta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Revisado a la luz del paquete fuente griego y del audit trail inglés: se conservó el sentido referencial de λόγος, la reserva de πρὸς ἑαυτούς, la conversación implícita de συζητοῦντες y la tensión resurreccional de τὸ ἐκ νεκρῶν ἀναστῆναι. No se requirieron cambios respecto al último pase auditado, porque la equivalencia óptima ya estaba alineada con el texto fuente.'
  spanish_consistency_notes:
  - Se usa 'resucitar' para la resurrección y no 'levantarse' en el cuerpo del texto, aunque 'levantarse' queda como alternativa literal en nota.
  - '''La palabra'' se mantiene como traducción referencial de λόγος en este contexto narrativo; no se usa ''Verbo'' porque no corresponde aquí al uso joánico técnico.'
  - '''Para sí'' traduce la reserva privada sin introducir una nota interpretativa adicional.'
  - La puntuación sigue el orden sintáctico natural del español y conserva la progresión narrativa del griego.
