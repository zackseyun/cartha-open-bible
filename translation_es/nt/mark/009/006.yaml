translation:
  language: es
  text: Porque no sabía qué responder[a], pues estaban aterrados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué debía responder» o «qué decir en respuesta».'
    reason: lexical_alternative
  - marker: b
    text: Algunas traducciones suavizan la última cláusula como «pues estaban aterrados»; el griego, más literalmente, dice «pues llegaron a estar aterrados».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ ᾔδει
  english_pob_choice: did not know
  chosen_spanish: no sabía
  alternatives_spanish:
  - no conocía
  - no entendía
  lexicon: οἶδα
  rationale: οἶδα expresa conocimiento o conciencia; en español, «no sabía» comunica de manera natural la falta de respuesta o de comprensión inmediata sin añadir matices no presentes en el griego.
- source_word: τί ἀποκριθῇ
  english_pob_choice: what he should answer
  chosen_spanish: qué responder
  alternatives_spanish:
  - qué debía responder
  - qué decir en respuesta
  lexicon: ἀποκρίνομαι
  rationale: ἀποκρίνομαι significa responder o contestar, no simplemente hablar. En español, «qué responder» preserva la relación con una réplica concreta y evita una paráfrasis excesiva.
- source_word: ἔκφοβοι
  english_pob_choice: terrified
  chosen_spanish: aterrados
  alternatives_spanish:
  - terrificados
  - muy asustados
  lexicon: ἔκφοβος
  rationale: ἔκφοβος intensifica fuertemente el temor. «Aterrados» transmite mejor esa intensidad en español actual que un simple «asustados».
- source_word: ἐγένοντο
  english_pob_choice: they were / they became
  chosen_spanish: estaban
  alternatives_spanish:
  - se hicieron
  - llegaron a estar
  lexicon: γίνομαι
  rationale: Aunque γίνομαι puede señalar entrada en un estado, el contexto y la revisión inglesa prefieren una lectura más natural y estática. «Estaban aterrados» comunica el estado resultante sin perder la idea de temor intenso.
- source_word: γὰρ ... γὰρ
  english_pob_choice: for ... for
  chosen_spanish: porque ... pues
  alternatives_spanish:
  - pues ... pues
  - porque ... porque
  lexicon: γάρ
  rationale: Las dos cláusulas explicativas se conservan con partículas causales en español para reflejar la estructura discursiva del griego. «Porque ... pues» suena natural y mantiene la doble explicación.
theological_decisions:
- issue: Sujetos de la cláusula plural
  english_pob_reading: they were terrified
  chosen_spanish_reading: estaban aterrados
  alternative_spanish_readings:
  - estaba aterrado
  rationale: El adjetivo plural ἔκφοβοι y el verbo plural ἐγένοντο requieren un sujeto plural. En contexto, el texto se refiere naturalmente a Pedro y sus compañeros, y la traducción debe conservar ese dato gramatical sin singularizarlo.
  doctrine_reference: Priorizar la primacía del idioma original y preservar la tensión textual cuando la gramática la determina.
- issue: Fuerza aspectual de ἐγένοντο
  english_pob_reading: they were terrified
  chosen_spanish_reading: estaban aterrados
  alternative_spanish_readings:
  - llegaron a estar aterrados
  - se aterrorizaron
  rationale: La revisión inglesa optó por una formulación más estática por naturalidad. En español, «estaban aterrados» mantiene esa naturalidad y sigue siendo compatible con el estado resultante indicado por γίνομαι en contexto.
  doctrine_reference: Fidelidad semántica con claridad idiomática, sin resolver artificialmente la tensión aspectual.
translation_notes:
  revision_awareness: La versión inglesa más reciente suavizó «they became terrified» a «they were terrified» para reflejar con más naturalidad el valor estativo; esta versión española sigue esa decisión con «estaban aterrados», pero conserva en nota la alternativa más literal vinculada a γίνομαι. También mantiene «responder» para ἀποκριθῇ, en línea con el audit trail inglés.
  spanish_consistency_notes:
  - Usé «Yahvé» como término por defecto solo cuando corresponda; este versículo no lo contiene.
  - Mantengo «aterrados» para ἔκφοβοι en vez de «asustados» para conservar la intensidad.
  - La estructura causal doble se refleja con «porque ... pues» para respetar el doble γάρ.
  - La cláusula plural se conserva plural y no se singulariza.
