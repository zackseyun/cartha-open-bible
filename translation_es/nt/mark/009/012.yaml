translation:
  language: es
  text: 'Y él les dijo: «Elías, habiendo venido primero, restaura todas las cosas. ¿Y cómo está escrito acerca del Hijo del Hombre que ha de padecer muchas cosas y ser tratado con desprecio[a]?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ser despreciado» / «ser tenido en nada». El verbo griego lleva la idea de ser tratado como de ninguna cuenta.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφη
  english_pob_choice: He said
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - dijo a ellos
  lexicon: BDAG
  rationale: En español, «dijo» es la forma narrativa natural y formal para este verbo de habla. Mantiene el registro directo del original sin añadir matices no presentes.
- source_word: Ἠλίας
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elia
  lexicon: Nombre propio bíblico estándar
  rationale: El nombre propio se vierte con la forma bíblica usual en español, «Elías», que es transparente y reconocible para el lector.
- source_word: ἐλθὼν πρῶτον
  english_pob_choice: having come first
  chosen_spanish: habiendo venido primero
  alternatives_spanish:
  - viniendo primero
  - primero viene
  lexicon: BDAG
  rationale: El participio aoristo se conserva con una construcción participial española natural. «Habiendo venido primero» preserva la relación temporal anterior respecto del verbo principal.
- source_word: ἀποκαθιστάνει
  english_pob_choice: restores
  chosen_spanish: restaura
  alternatives_spanish:
  - restablece
  - pone en orden otra vez
  lexicon: BDAG
  rationale: «Restaura» comunica el sentido de volver a poner en su estado debido o correcto, sin diluir la fuerza del verbo ni volverlo demasiado interpretativo.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: BDAG
  rationale: «Todas las cosas» reproduce el alcance amplio del plural neutro y conserva una dicción bíblica clara en español.
- source_word: πῶς γέγραπται ἐπὶ τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: how is it written about the Son of Man
  chosen_spanish: ¿cómo está escrito acerca del Hijo del Hombre?
  alternatives_spanish:
  - ¿cómo se ha escrito acerca del Hijo del Hombre?
  - ¿cómo está escrito del Hijo del Hombre?
  lexicon: BDAG
  rationale: La fórmula escritural se expresa de manera natural con «está escrito». «Acerca de» rinde ἐπὶ en el sentido de referencia temática o concerniente a, sin sobretraducir.
- source_word: υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hombre
  lexicon: BDAG
  rationale: Se conserva el título establecido «Hijo del Hombre», que es terminológicamente importante y no debe interpretarse ni expandirse en el texto.
- source_word: ἵνα
  english_pob_choice: that he should
  chosen_spanish: que ha de
  alternatives_spanish:
  - para que
  - que debería
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido de lo escrito y la expectativa resultante. «Que ha de» comunica obligación o destino esperado en un español natural, sin suavizar la fuerza del pasaje.
- source_word: πολλὰ πάθῃ
  english_pob_choice: suffer many things
  chosen_spanish: padecer muchas cosas
  alternatives_spanish:
  - sufrir muchas cosas
  - sufrir mucho
  lexicon: BDAG
  rationale: «Padecer» mantiene un registro bíblico sobrio y comunica el sufrimiento padecido. «Muchas cosas» preserva el plural neutro de πολλὰ sin convertirlo en una abstracción.
- source_word: ἐξουδενηθῇ
  english_pob_choice: be treated with contempt
  chosen_spanish: ser tratado con desprecio
  alternatives_spanish:
  - ser despreciado
  - ser tenido en nada
  - ser considerado como nada
  lexicon: BDAG
  rationale: La forma pasiva se conserva con «ser tratado». «Con desprecio» expresa la nota evaluativa de ser tenido en poco o en nada; es una opción clara y digna en español.
theological_decisions:
- issue: La tensión entre la restauración atribuida a Elías y el sufrimiento del Hijo del Hombre
  english_pob_reading: Render the second clause as a genuine rhetorical question without harmonizing or resolving the tension.
  chosen_spanish_reading: Mantener la segunda cláusula como una pregunta retórica genuina, sin armonizar ni explicar la tensión.
  alternative_spanish_readings:
  - sugerir contraste con «y sin embargo, ¿cómo está escrito...? »
  - convertir la pregunta en una explicación doctrinal
  rationale: El griego presenta una pregunta real; por eso la traducción debe conservar el choque entre la restauración de Elías y el sufrimiento del Hijo del Hombre. No conviene suavizarlo con una paráfrasis que resuelva la tensión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referencia del título 'el Hijo del Hombre'
  english_pob_reading: Retain the title 'the Son of Man' without interpretive expansion.
  chosen_spanish_reading: Conservar el título «el Hijo del Hombre» sin expansión interpretativa.
  alternative_spanish_readings:
  - el Hombre
  - el Ser Humano
  - el Mesías
  rationale: El título tiene peso bíblico y cristológico propio; traducirlo o explicarlo más allá del texto introduciría interpretación no exigida por la forma griega.
  doctrine_reference: DOCTRINE.md §Translation philosophy 2, 3
translation_notes:
  revision_awareness: El pasaje fue revisado y quedó sin cambios sustantivos en el último pase de revisión; el cotejo final informó alta concordancia (0,95) y no requirió ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» sin necesidad de aparecer en este versículo.
  - Se conserva el título cristológico «el Hijo del Hombre» como término fijo, acorde con la política del proyecto.
  - La construcción «ser tratado con desprecio» reproduce la pasiva del griego y deja abierta la alternativa léxica documentada en la nota.
