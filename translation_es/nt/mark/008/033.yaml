translation:
  language: es
  text: 'Pero él, volviéndose y viendo a sus discípulos[a], reprendió a Pedro y dijo: «¡Ponte detrás de mí, Satanás!, porque no tienes en mente las cosas de Dios, sino las de los hombres».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas de las personas» o «las cosas humanas»; el griego usa un término genérico para los seres humanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστραφεὶς
  english_pob_choice: turning around
  chosen_spanish: dándose vuelta
  alternatives_spanish:
  - volviéndose
  - dándose la vuelta
  lexicon: BDAG
  rationale: El participio aoristo describe un giro físico de Jesús antes de hablar con Pedro. «Dándose vuelta» conserva la reorientación corporal con naturalidad en español.
- source_word: ἰδὼν
  english_pob_choice: seeing
  chosen_spanish: viendo
  alternatives_spanish:
  - al ver
  - habiendo visto
  lexicon: BDAG
  rationale: El participio indica que Jesús mira a los discípulos en ese momento. «Viendo» preserva la secuencia narrativa y suena natural.
- source_word: μαθητὰς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: En contexto evangélico, μαθητής se refiere al grupo técnico de discípulos de Jesús; «discípulos» es la equivalencia directa y estable.
- source_word: ἐπετίμησεν
  english_pob_choice: rebuked
  chosen_spanish: reprendió
  alternatives_spanish:
  - reprobó
  - regañó
  lexicon: BDAG
  rationale: ἐπιτιμάω expresa una reprensión fuerte. «Reprendió» comunica bien la fuerza verbal sin sonar excesivamente coloquial.
- source_word: Ὕπαγε ὀπίσω μου
  english_pob_choice: Get behind me
  chosen_spanish: Ponte detrás de mí
  alternatives_spanish:
  - Ve detrás de mí
  - Ponte detrás de mí
  lexicon: BDAG
  rationale: La orden no es solo de moverse físicamente sino de tomar el lugar correcto detrás de Jesús. «Ponte detrás de mí» conserva el imperativo y el sentido relacional.
- source_word: Σατανᾶ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Adversario
  lexicon: BDAG
  rationale: Aquí funciona como vocativo personal/titular; «Satanás» mantiene la fuerza directa del texto y la forma usual en español bíblico.
- source_word: φρονεῖς
  english_pob_choice: are not setting your mind on
  chosen_spanish: no estás pensando en
  alternatives_spanish:
  - no tienes en mente
  - no sientes inclinación por
  lexicon: BDAG
  rationale: φρονέω incluye orientación mental y disposición, pero en español «no estás pensando en» comunica bien la falta de enfoque sin volverse pesado. Se conserva la tensión entre mente y orientación.
- source_word: τὰ τοῦ θεοῦ
  english_pob_choice: the things of God
  chosen_spanish: las cosas de Dios
  alternatives_spanish:
  - los intereses de Dios
  - los asuntos de Dios
  lexicon: BDAG
  rationale: El neutro plural articular es amplio e idiomático. «Las cosas de Dios» sigue de cerca la forma griega sin especificar demasiado.
- source_word: τὰ τῶν ἀνθρώπων
  english_pob_choice: the things of men
  chosen_spanish: las de los hombres
  alternatives_spanish:
  - las cosas de las personas
  - las cosas humanas
  lexicon: BDAG
  rationale: La construcción elíptica contrasta con «las cosas de Dios». «Las de los hombres» conserva la simetría y el contraste tradicional, mientras «hombres» mantiene el valor genérico del término griego.
theological_decisions:
- issue: A quién va dirigida la reprensión en relación con 'Satanás'
  english_pob_reading: Jesus directly rebukes Peter with the vocative 'Satan,' identifying Peter's words as aligned with satanic opposition, without requiring that Peter is literally Satan.
  chosen_spanish_reading: Jesús reprende directamente a Pedro y lo llama «Satanás», sin sugerir que Pedro sea literalmente Satanás; sus palabras quedan alineadas con una oposición satánica.
  alternative_spanish_readings:
  - Jesús se dirige solo a Satanás detrás de Pedro
  - '''Satanás'' significa únicamente ''adversario'' en sentido impersonal'
  rationale: El objeto inmediato de la reprensión es Pedro, y el vocativo conserva la dureza del dicho sin resolver la tensión interpretativa que el texto mismo deja abierta.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicarla.
- issue: Valor de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - personas
  - humanos
  rationale: ἀνθρώπων es genérico para seres humanos, pero «hombres» preserva la antítesis clásica con «Dios» y mantiene la forma tradicional del contraste, con sentido inclusivo genérico en el contexto.
  doctrine_reference: Preferencia del proyecto por un registro fiel al contraste original y con claridad doctrinal.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando el marcador [a] en el texto de traducción, anclado exactamente en «discípulos[a]».
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ y «Satanás» para Σατανᾶ, conforme al marco terminológico del proyecto.
  - La elipsis de «las de los hombres» refleja mejor la parataxis y el contraste del griego que repetir «cosas» en ambas mitades.
  - El registro es bíblico pero natural, evitando arcaísmos innecesarios y preservando la aspereza de la reprensión.
