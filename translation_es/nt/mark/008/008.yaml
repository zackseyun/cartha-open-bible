translation:
  language: es
  text: Y comieron y quedaron satisfechos, y recogieron siete canastas[a] de los pedazos que sobraron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego σπυρίδας designa canastas, probablemente más grandes que los cestos de 6:43, donde Marcos usa otro término (κόφινοι).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔφαγον
  english_pob_choice: they ate
  chosen_spanish: comieron
  alternatives_spanish:
  - se alimentaron
  lexicon: BDAG
  rationale: El aoristo narrativo de ἐσθίω se rinde de forma simple y natural con «comieron», sin añadir énfasis ni explicación ajena al texto.
- source_word: ἐχορτάσθησαν
  english_pob_choice: were satisfied
  chosen_spanish: quedaron satisfechos
  alternatives_spanish:
  - fueron saciados
  - quedaron llenos
  - tuvieron suficiente
  lexicon: BDAG
  rationale: χορτάζω expresa quedar alimentado hasta la suficiencia. «Quedaron satisfechos» conserva esa idea en español contemporáneo y evita el tono más literal pero menos natural de «fueron saciados».
- source_word: ἦραν
  english_pob_choice: they picked up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: En el contexto de juntar lo que sobró, «recogieron» comunica bien la acción de reunir los restos y suena más natural que una traducción estrictamente literal de «alzaron» o «tomaron».
- source_word: περισσεύματα κλασμάτων
  english_pob_choice: leftover pieces
  chosen_spanish: pedazos sobrantes
  alternatives_spanish:
  - fragmentos sobrantes
  - pedazos que sobraron
  - restos
  lexicon: BDAG
  rationale: La combinación expresa los restos que quedaron después de comer. «Pedazos sobrantes» conserva tanto la idea de fragmentos de comida como la de abundancia restante, sin forzar una locución demasiado técnica.
- source_word: ἑπτὰ σπυρίδας
  english_pob_choice: seven baskets
  chosen_spanish: siete cestas
  alternatives_spanish:
  - siete canastos
  - siete cestas grandes
  lexicon: BDAG
  rationale: σπυρίς denota una canasta/cesta. «Cestas» mantiene la lectura clara en español; «canastos» y «cestas grandes» son alternativas posibles, pero el tamaño distintivo se preserva mejor en la nota.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide sustancialmente con el recorrido auditado en inglés, preservando la distinción léxica de σπυρίς mediante nota y manteniendo el sentido de suficiencia y recolección de sobrantes sin introducir interpretaciones adicionales.
  spanish_consistency_notes:
  - Se prefirió «Y» inicial para reflejar la coordinación narrativa del griego.
  - «Quedaron satisfechos» mantiene un registro sobrio y bíblico sin depender de la formulación inglesa.
  - Se usó «cestas» en el texto principal y se aclaró en nota la distinción de tamaño/terminología entre σπυρίς y κόφινος.
