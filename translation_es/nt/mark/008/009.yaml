lexical_decisions:
- source_word: ἦσαν
  english_pob_choice: there were
  chosen_spanish: Eran
  alternatives_spanish:
  - Había
  lexicon: BDAG
  rationale: El valor existencial de εἰμί se puede expresar en español con una construcción personal simple. 'Eran' conserva la referencia al grupo contado sin forzar un giro impersonal innecesario.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: —
  alternatives_spanish:
  - Ahora
  - Y
  - Entonces
  lexicon: BDAG
  rationale: δέ introduce una transición suave. En español, puede quedar implícita sin perder claridad narrativa, evitando sobredeterminación temporal.
- source_word: ὡς
  english_pob_choice: about
  chosen_spanish: como
  alternatives_spanish:
  - aproximadamente
  - unos
  lexicon: BDAG
  rationale: Con numerales, ὡς marca aproximación. 'Como' refleja esa indeterminación de manera natural y fiel en español.
- source_word: τετρακισχίλιοι
  english_pob_choice: four thousand
  chosen_spanish: cuatro mil
  lexicon: BDAG
  rationale: El numeral es directo y no presenta tensión léxica; 'cuatro mil' comunica el conteo del texto griego con normalidad idiomática.
- source_word: ἀπέλυσεν
  english_pob_choice: sent away
  chosen_spanish: despidió
  alternatives_spanish:
  - los envió
  - los dejó ir
  - los soltó
  lexicon: BDAG
  rationale: ἀπολύω aquí significa despedir o enviar fuera a la multitud. 'Despidió' conserva bien la idea de dar por terminada su permanencia y soltarlos para que se vayan.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - los
  lexicon: BDAG
  rationale: El pronombre retoma a la multitud; en español el objeto directo masculino plural queda natural como 'los'.
translation_notes:
  revision_awareness: 'El borrador sigue el estado de revisión más reciente sin cambios sustantivos, y conserva la equivalencia óptima del inglés auditado: conteo aproximado + despedida de la multitud.'
  spanish_consistency_notes:
  - Se mantiene 'cuatro mil' para el numeral cardinal, sin añadir artículos o perífrasis no requeridos por el griego.
  - '''Despidió'' se usa en sentido narrativo de despedir a la gente, no en el sentido moderno exclusivo de despedir del trabajo.'
  - La puntuación separa con coma las dos cláusulas para reflejar la coordinación simple del griego.
