    issue: «Eran» no es la mejor representación del uso existencial de ἦσαν.
    rationale: 'El griego usa εἰμί existencialmente para indicar la cantidad presente: «había» en español comunica esto de forma más natural que «eran», que suena predicativo o más literalista.'
  - severity: medium
    issue: «como cuatro mil» es menos idiomático que «unos cuatro mil» para ὡς con numeral.
    rationale: Aunque «como» puede expresar aproximación, en narrativa bíblica contemporánea «unos cuatro mil» fluye mejor y evita una resonancia coloquial potencialmente ambigua.
  - severity: low
    issue: La nota [a] mezcla dos alternativas distintas porque intenta compensar una redacción principal menos natural.
    rationale: Si el texto principal se corrige a «Había unos cuatro mil», ya no hace falta una nota para ἦσαν/ὡς.
  - severity: low
    issue: La nota [b] puede simplificarse.
    rationale: 'La alternativa relevante documentada por el inglés es «dismissed them»; en español basta con una nota breve como «O: “los envió”» o «También: “los dejó ir”», sin sobrecargar.'
  revised_spanish_text: Había unos cuatro mil, y los despidió[a].
