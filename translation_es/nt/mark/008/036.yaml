translation:
  language: es
  text: Pues ¿de qué le sirve al hombre ganar el mundo entero y perder su vida?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su alma». La palabra griega ψυχή puede significar «vida», «alma» o «ser», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: «Al hombre» aquí representa a un ser humano en sentido genérico.
    reason: cultural_note
lexical_decisions:
- source_word: τί γὰρ
  english_pob_choice: For what
  chosen_spanish: Porque ¿qué
  alternatives_spanish:
  - ¿Qué pues
  - Porque ¿para qué
  lexicon: BDAG
  rationale: τί introduce una pregunta retórica, y γάρ aporta una relación explicativa con lo anterior. En español, «Porque ¿qué» conserva el enlace explicativo y el impulso interrogativo de manera natural.
- source_word: ὠφελεῖ
  english_pob_choice: does it profit
  chosen_spanish: aprovecha
  alternatives_spanish:
  - beneficia
  - provecha
  lexicon: BDAG
  rationale: ὠφελέω significa beneficiar o ser de provecho. «Aprovecha» comunica bien el valor práctico del verbo y suena natural en una pregunta retórica de contraste.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a una persona
  - a alguien
  lexicon: BDAG
  rationale: ἄνθρωπος es singular y genérico. «Al hombre» conserva la forma masculina representativa del griego, con valor inclusivo en el contexto, tal como documenta la POB inglesa.
- source_word: κερδῆσαι
  english_pob_choice: to gain
  chosen_spanish: ganar
  alternatives_spanish:
  - obtener
  - conquistar
  lexicon: BDAG
  rationale: κερδαίνω expresa ganar o obtener provecho. «Ganar» mantiene el contraste económico con «aprovecha» y con la pérdida final.
- source_word: τὸν κόσμον ὅλον
  english_pob_choice: the whole world
  chosen_spanish: el mundo entero
  alternatives_spanish:
  - todo el mundo
  - el mundo completo
  lexicon: BDAG
  rationale: κόσμος aquí es el mundo en sentido total; ὅλον intensifica esa totalidad. «El mundo entero» es la equivalencia más natural y precisa en español.
- source_word: ζημιωθῆναι
  english_pob_choice: and forfeit
  chosen_spanish: y perder
  alternatives_spanish:
  - y sufrir la pérdida de
  - y quedar privado de
  lexicon: BDAG
  rationale: ζημιόω en pasivo puede significar sufrir pérdida o perder algo en un trueque. «Perder» comunica con claridad el contraste de ganancia/pérdida en español, sin forzar un término más técnico.
- source_word: τὴν ψυχὴν αὐτοῦ
  english_pob_choice: his life
  chosen_spanish: su vida
  alternatives_spanish:
  - su alma
  - su ser
  lexicon: BDAG
  rationale: ψυχή puede significar vida, alma o yo mismo según el contexto. En Marcos 8:35–37 la referencia inmediata es a la vida que puede salvarse o perderse; por eso «vida» es la mejor opción contextual. Se preserva «alma» como alternativa teológica en nota.
theological_decisions:
- issue: Ambigüedad de ψυχή entre 'vida' y 'alma' en una enseñanza de discipulado
  english_pob_reading: life, with footnote preserving soul
  chosen_spanish_reading: vida, con nota que preserva 'alma'
  alternative_spanish_readings:
  - alma
  - ser
  rationale: El contexto inmediato de Marcos 8:35–37 presenta ψυχή como algo que uno puede salvar, perder o dar por Jesús y el evangelio; «vida» preserva mejor esa lógica narrativa. Sin embargo, «alma» sigue siendo una posibilidad lexical real y teológicamente sensible, por lo que se conserva en nota.
  doctrine_reference: Translation philosophy §3, §6
- issue: Valor genérico de ἄνθρωπος sin borrar el referente masculino gramatical
  english_pob_reading: '''A man'' here represents a generic human being.'
  chosen_spanish_reading: «al hombre» como genérico representativo
  alternative_spanish_readings:
  - a una persona
  - a alguien
  rationale: La forma griega es singular masculina, pero funciona genéricamente. En español, «al hombre» mantiene esa correspondencia formal y el uso representativo, sin convertirlo innecesariamente en una paráfrasis más amplia.
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: 'El audit trail en inglés no muestra revisiones aplicadas; la versión vigente fue aprobada sin cambios en el último pase. Esta propuesta mantiene la misma lectura semántica de base: pregunta retórica, contraste de ganancia/pérdida y ψυχή como «vida», con la alternativa «alma» preservada en nota.'
  spanish_consistency_notes:
  - Se mantiene el patrón de pregunta retórica con valor explicativo de γάρ mediante «Porque ¿qué...».
  - «Aprovecha / ganar / perder» conserva el campo semántico económico del texto griego y del POB inglés.
  - Se usa «vida» para ψυχή en el texto principal y se reserva «alma» para la nota, conforme al criterio contextual del pasaje.
  - «Al hombre» se conserva como genérico representativo, con aclaración en nota para lectores sensibles al uso inclusivo.
