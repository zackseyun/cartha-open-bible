translation:
  language: es
  text: Y llegaron a Betsaida. Y le trajeron un ciego y le rogaban que lo tocara.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἔρχονται
  english_pob_choice: they came
  chosen_spanish: llegaron
  alternatives_spanish:
  - vinieron
  - venían
  lexicon: BDAG
  rationale: Aunque el griego usa presente histórico, en español narrativo natural suele expresarse con pretérito perfecto simple. «Llegaron» conserva el avance de la acción sin sonar forzado.
- source_word: εἰς Βηθσαϊδάν
  english_pob_choice: to Bethsaida
  chosen_spanish: a Betsaida
  alternatives_spanish:
  - a Bethsaida
  - hacia Betsaida
  lexicon: BDAG
  rationale: Con un nombre de lugar, εἰς se vierte de forma natural como «a». «Betsaida» es la adaptación habitual y legible del topónimo.
- source_word: φέρουσιν
  english_pob_choice: they brought
  chosen_spanish: trajeron
  alternatives_spanish:
  - llevaron
  - presentaron
  lexicon: BDAG
  rationale: El presente histórico se vierte en pasado para el flujo narrativo del español. «Trajeron» reproduce el movimiento hacia Jesús sin añadir matices de transporte o ceremonia.
- source_word: τυφλὸν
  english_pob_choice: a blind man
  chosen_spanish: un ciego
  alternatives_spanish:
  - un hombre ciego
  - una persona ciega
  lexicon: BDAG
  rationale: El adjetivo funciona como sustantivo y en contexto designa a un varón. «Un ciego» es natural, fiel y conciso en español.
- source_word: παρακαλοῦσιν
  english_pob_choice: begged
  chosen_spanish: le rogaban
  alternatives_spanish:
  - le suplicaban
  - le pedían con insistencia
  lexicon: BDAG
  rationale: Aquí παρακαλέω expresa una súplica insistente, no una simple petición. «Le rogaban» conserva esa urgencia sin exagerar el tono.
- source_word: ἵνα αὐτοῦ ἅψηται
  english_pob_choice: to touch him
  chosen_spanish: que lo tocara
  alternatives_spanish:
  - para tocarlo
  - a fin de que lo tocara
  lexicon: BDAG
  rationale: En español, la cláusula final con ἵνα y subjuntivo suele expresarse naturalmente con «que» + subjuntivo. «Lo tocara» mantiene el valor de propósito de la solicitud y el verbo «tocar» para ἅπτομαι.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Luego
  - Entonces
  lexicon: BDAG
  rationale: Se conserva la parataxis característica de Marcos con «Y» al inicio de ambas oraciones, evitando suavizar el ritmo narrativo.
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y coincide sustancialmente con la pauta auditada en inglés; la principal adaptación es sintáctica, al verter el presente histórico al pretérito para una narración española más natural.
  spanish_consistency_notes:
  - Se mantiene la equivalencia directa de nombres propios y acciones sin añadir elementos interpretativos.
  - No se introduce vocabulario eclesiástico o tradicional ajeno al griego; se preserva el paralelismo simple de las dos cláusulas con «Y».
  - La petición final se expresa con subjuntivo español para reflejar el propósito pedido en ἵνα sin perder claridad.
