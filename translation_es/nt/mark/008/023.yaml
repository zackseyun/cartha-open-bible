translation:
  language: es
  text: 'Y tomando de la mano al ciego, lo sacó fuera de la aldea; y después de escupir sobre sus ojos[a] y poner las manos sobre él, le preguntó: «¿Ves algo?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «escupiendo en sus ojos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιλαβόμενος τῆς χειρὸς
  english_pob_choice: taking ... by the hand
  chosen_spanish: tomando de la mano
  alternatives_spanish:
  - tomando la mano
  - asir de la mano
  lexicon: BDAG
  rationale: La construcción griega con genitivo es un modismo concreto de tomar a alguien de la mano. «Tomando de la mano» conserva el movimiento físico con español natural y evita una formulación demasiado literal o torpe.
- source_word: τοῦ τυφλοῦ
  english_pob_choice: the blind man
  chosen_spanish: al ciego
  alternatives_spanish:
  - al hombre ciego
  - al invidente
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «Al ciego» es breve, idiomático y mantiene el referente masculino sin añadir información no presente en el texto.
- source_word: ἐξήνεγκεν
  english_pob_choice: led him out
  chosen_spanish: lo sacó fuera
  alternatives_spanish:
  - lo llevó fuera
  - lo condujo fuera
  lexicon: BDAG
  rationale: Aunque el inglés POB prefirió «led him out» por naturalidad, el griego enfatiza el sacar a alguien hacia afuera. En español, «lo sacó fuera» preserva bien la fuerza direccional de ἔξω y de ἐκφέρω.
- source_word: ἔξω τῆς κώμης
  english_pob_choice: out of the village
  chosen_spanish: fuera de la aldea
  alternatives_spanish:
  - fuera del pueblo
  - fuera de la villa
  lexicon: BDAG
  rationale: κώμη designa una aldea o pequeña localidad. «Aldea» refleja mejor el matiz que «pueblo» en un contexto rural y conserva la relación espacial del griego.
- source_word: πτύσας εἰς τὰ ὄμματα αὐτοῦ
  english_pob_choice: after spitting on his eyes
  chosen_spanish: después de escupir sobre sus ojos
  alternatives_spanish:
  - después de escupir en sus ojos
  - después de escupir sobre los ojos de él
  lexicon: BDAG
  rationale: El participio aoristo expresa acción anterior; «después de» reproduce bien la secuencia. Para εἰς τὰ ὄμματα, «sobre sus ojos» sigue el uso que el POB inglés consideró idiomático, sin perder la crudeza del gesto.
- source_word: ἐπιθεὶς τὰς χεῖρας αὐτῷ
  english_pob_choice: laying his hands on him
  chosen_spanish: poner las manos sobre él
  alternatives_spanish:
  - imponerle las manos
  - colocar las manos sobre él
  lexicon: BDAG
  rationale: La frase describe un contacto físico concreto. «Poner las manos sobre él» es fiel y transparente; «imponerle las manos» podría sugerir un acto ritual más cargado de lo que el contexto exige.
- source_word: ἐπηρώτα
  english_pob_choice: he asked
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le iba preguntando
  - le preguntaba
  lexicon: BDAG
  rationale: El imperfecto puede sugerir una acción en curso, pero en narrativa española «le preguntó» comunica con claridad la interacción inmediata y el contenido del diálogo, sin forzar una iteración no explicitada.
- source_word: Εἴ τι βλέπεις;
  english_pob_choice: Do you see anything?
  chosen_spanish: ¿Ves algo?
  alternatives_spanish:
  - ¿Puedes ver algo?
  - ¿Ves alguna cosa?
  lexicon: BDAG
  rationale: La pregunta griega indaga si percibe algo en absoluto. «¿Ves algo?» preserva el indefinido τι y suena natural en español; «alguna cosa» sería correcto pero más pesado.
theological_decisions:
- issue: Mantener la crudeza física del acto de sanidad
  english_pob_reading: Retain the concrete sequence of Jesus spitting on the man's eyes and laying hands on him.
  chosen_spanish_reading: 'Conservar la secuencia concreta: tomarlo de la mano, sacarlo, escupir sobre sus ojos y poner las manos sobre él.'
  alternative_spanish_readings:
  - Suavizar el lenguaje para hacer menos chocante la escena
  - Parafrasear el gesto de sanidad
  rationale: El versículo presenta una sanidad corporal con detalles materiales explícitos. La traducción debe preservar esa concreción y no atenuar el carácter sorprendente del relato.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Posible matiz ritual de la imposición de manos
  english_pob_reading: Translate as 'laying his hands on him' without adding sacramental or ordination language.
  chosen_spanish_reading: Traducir como «poner las manos sobre él» sin cargar la expresión con sentido sacramental o litúrgico posterior.
  alternative_spanish_readings:
  - imponerle las manos
  - hacer una imposición de manos formal
  rationale: En este contexto la frase describe el contacto sanador de Jesús. No hay base suficiente para introducir categorías eclesiales posteriores que el texto no menciona.
  doctrine_reference: Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no requieren revisión adicional; la presente versión sigue la lectura aprobada, ajustando solo la naturalidad del español sin alterar el sentido ni las decisiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene «ciego» como sustantivo, coherente con el valor sustantivado de τυφλός.
  - Se conserva la materialidad del gesto de sanidad sin introducir terminología sacramental.
  - «Aldea» refleja mejor κώμη que «pueblo» en este pasaje narrativo.
  - La nota al pie preserva la alternativa literal de εἰς τὰ ὄμματα αὐτοῦ sin duplicar marcas.
