lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Conjunción coordinante simple; «Y» conserva la conexión narrativa sin añadir una relación temporal que el griego no exige.
- source_word: ἔλεγεν
  english_pob_choice: he was saying
  chosen_spanish: les decía
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: El imperfecto expresa una acción en curso o repetida. En español, «les decía» comunica ese aspecto de manera natural y digna.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - a sus discípulos
  lexicon: BDAG
  rationale: El dativo pronominal se expresa con el clítico indirecto «les». No se añade un sustantivo como «discípulos» porque el texto griego no lo dice en este versículo.
- source_word: Οὔπω
  english_pob_choice: not yet
  chosen_spanish: Todavía no
  alternatives_spanish:
  - Aún no
  - No todavía
  lexicon: BDAG
  rationale: Οὔπω puede significar «no aún»/«todavía no». En español, «todavía no» es la forma más idiomática y conserva la idea de ausencia de comprensión hasta el presente.
- source_word: συνίετε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - perciben
  lexicon: BDAG
  rationale: El verbo apunta a captar con la mente, no solo a percibir sensorialmente. «Entienden» es claro en español y mantiene el sentido de comprensión intelectual.
theological_decisions:
- issue: Si conviene explicitar el objeto de la comprensión
  english_pob_reading: 'Leave the object unstated: ''Do you not yet understand?'''
  chosen_spanish_reading: 'Dejar el objeto implícito: «¿Todavía no entienden?»'
  alternative_spanish_readings:
  - ¿Todavía no entienden esto?
  - ¿Todavía no comprenden?
  rationale: El griego deja el objeto sin mencionar. Mantenerlo implícito preserva el tono de reproche y la tensión interpretativa sin restringir indebidamente el sentido.
  doctrine_reference: 'Translation philosophy: Original-language primacy; preserve theological tension rather than resolving it by addition.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió 'not yet' sobre 'still not' para reflejar más directamente οὔπω. La frase española «todavía no» sigue ese ajuste y evita añadir un objeto explícito que el griego no presenta.
  spanish_consistency_notes:
  - Se mantiene la referencia pronominal indirecta «les» como equivalente natural de αὐτοῖς.
  - Se conserva la pregunta abierta sin complementar con «esto» o un referente implícito.
  - La puntuación y las comillas siguen el uso estándar en español bíblico contemporáneo.
