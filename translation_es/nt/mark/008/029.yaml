translation:
  language: es
  text: 'Y él les preguntaba[a]: «Pero ustedes, ¿quién dicen que soy yo?». Pedro le respondió: «Tú eres el Mesías[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «les seguía preguntando».
    reason: alternative_reading
  - marker: b
    text: O, «el Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπηρώτα
  english_pob_choice: was asking
  chosen_spanish: les seguía preguntando
  alternatives_spanish:
  - les preguntaba
  - les estaba preguntando
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada o reiterada; en español, «seguía preguntando» comunica bien ese valor aspectual sin sonar rígido. «Les preguntaba» es posible, pero pierde algo de la insistencia narrativa.
- source_word: Ὑμεῖς δὲ
  english_pob_choice: But who do you
  chosen_spanish: Pero ustedes
  alternatives_spanish:
  - Y ustedes
  - Pero vosotros
  lexicon: BDAG
  rationale: «Pero» conserva el contraste de δέ con la pregunta anterior. «Ustedes» expresa de forma natural el plural enfático del griego en español neutral.
- source_word: τίνα με λέγετε εἶναι
  english_pob_choice: who do you say that I am
  chosen_spanish: ¿quién dicen que soy yo?
  alternatives_spanish:
  - ¿a quién dicen que soy?
  - ¿quién dicen ustedes que soy yo?
  lexicon: BDAG
  rationale: La construcción acusativo + infinitivo se vierte de manera idiomática en español como una pregunta directa. Se mantiene el sentido confesional sin calcar la sintaxis griega.
- source_word: ἀποκριθεὶς
  english_pob_choice: answered
  chosen_spanish: respondiendo
  alternatives_spanish:
  - respondió
  - en respuesta
  lexicon: BDAG
  rationale: El participio introductorio puede funcionar como un adverbial de respuesta. «Respondiendo» conserva esa relación discursiva, aunque «respondió» también sería natural.
- source_word: λέγει αὐτῷ
  english_pob_choice: answered him
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  - le respondió
  lexicon: BDAG
  rationale: Marcos usa con frecuencia el presente histórico; por eso se conserva «dice». El dativo se expresa naturalmente con «le».
- source_word: Σὺ εἶ
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú eres tú
  - Tú sí eres
  lexicon: BDAG
  rationale: El pronombre explícito ya aporta énfasis; «Tú eres» mantiene la fuerza confesional sin sobrerrecalcarla.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: Se traduce el título χριστός como «Mesías» conforme al criterio del proyecto y al valor titular del artículo. «Cristo» queda como alternativa tradicional reconocible.
theological_decisions:
- issue: χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - el Cristo
  rationale: Aquí χριστός funciona como título, no como nombre propio. Traducirlo como «Mesías» preserva el sentido judío del reconocimiento de Jesús. Se evita la forma litúrgica tradicional si oscurece el título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial inglés: la oscilación entre «Messiah» y «Christ» fue resuelta a favor de «Messiah» por la política del proyecto, y en español se refleja como «Mesías». También se conservó el valor aspectual del imperfecto y el presente histórico de Marcos.'
  spanish_consistency_notes:
  - Se usa «Mesías» para χριστός, conforme al criterio del proyecto.
  - Se mantiene «Tú eres» sin añadir énfasis artificial.
  - El orden y la puntuación buscan ser publicables en español bíblico moderno sin calcar el inglés.
