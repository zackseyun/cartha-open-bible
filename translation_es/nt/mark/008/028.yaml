translation:
  language: es
  text: 'Ellos le dijeron[a]: «Juan el Bautista; y otros, Elías; pero otros, uno de los profetas».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más explícita: «Ellos le dijeron: “Juan el Bautista; y otros, Elías; y otros, uno de los profetas”». El griego deja sin expresar el verbo repetido «decir» y el implícito «eres» en las cláusulas posteriores.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Y ellos
  - Entonces ellos
  lexicon: BDAG
  rationale: El artículo con δέ funciona como sujeto retomado del contexto previo. En español, «Ellos» comunica con naturalidad la referencia a los discípulos sin añadir contenido ajeno; el matiz leve de conexión queda implícito.
- source_word: εἶπαν αὐτῷ λέγοντες
  english_pob_choice: told him, saying
  chosen_spanish: le dijeron,
  alternatives_spanish:
  - le dijeron, diciendo
  - le hablaron, diciendo
  lexicon: BDAG
  rationale: La secuencia verbal griega repite λέγω en forma finita y participial. En español, «le dijeron» conserva el acto de informar; se evita «diciendo» en el cuerpo principal por sonar redundante, pero la nota puede explicar la forma más explícita si se desea.
- source_word: Ἰωάννην τὸν βαπτιστήν
  english_pob_choice: John the Baptist
  chosen_spanish: Juan el Bautista
  alternatives_spanish:
  - Juan el Bautizador
  lexicon: BDAG
  rationale: «Bautista» es la forma tradicional y plenamente inteligible en español para el personaje histórico. Aunque «Bautizador» sería más transparente al sustantivo verbal, suena menos natural y no ofrece ventaja exegética aquí.
- source_word: ἄλλοι ... ἄλλοι δὲ
  english_pob_choice: and others ... but others
  chosen_spanish: y otros ... pero otros
  alternatives_spanish:
  - otros ... y otros
  - unos ... otros
  lexicon: BDAG
  rationale: La alternancia distributiva del griego se conserva con «y otros ... pero otros». «Pero» refleja el contraste final de δέ sin exagerarlo; «unos ... otros» sería posible, pero borra un poco la repetición estructural del original.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: BDAG
  rationale: Se usa la forma estándar castellana del nombre propio. «Elías» es la convención bíblica más reconocible y no altera el sentido.
- source_word: ὅτι εἷς τῶν προφητῶν
  english_pob_choice: one of the prophets
  chosen_spanish: uno de los profetas
  alternatives_spanish:
  - que es uno de los profetas
  - que tú eres uno de los profetas
  lexicon: BDAG
  rationale: El griego deja el predicado implícito tras la primera cláusula. En español, la forma nominal «uno de los profetas» conserva la elipsis y la concisión del texto, siguiendo la decisión auditada del inglés POB.
- source_word: προφητῶν
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - profetas de Israel
  lexicon: BDAG
  rationale: «Profetas» es la traducción normal y suficiente en este contexto. No hace falta añadir una especificación histórica que el griego no expresa.
theological_decisions:
- issue: Cómo representar la identificación popular de Jesús sin expandir la elipsis
  english_pob_reading: The verse is translated as a list of reported identifications without expanding the implied 'you are' in every clause.
  chosen_spanish_reading: El versículo se presenta como una lista de identificaciones reportadas, sin repetir en cada cláusula el implícito «eres».
  alternative_spanish_readings:
  - 'Ellos le dijeron: «Juan el Bautista, y otros dicen Elías, y otros dicen que es uno de los profetas».'
  - 'Ellos le dijeron: «Que eres Juan el Bautista; y otros, que eres Elías; y otros, que eres uno de los profetas».'
  rationale: El valor del pasaje está en el abanico de opiniones públicas sobre Jesús. Mantener la elipsis evita sobreexplicar la sintaxis y respeta la densidad del griego, a la vez que el español sigue siendo claro.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador de nota [a] aparezca exactamente en el texto español. También se preservó la elipsis del griego y la estructura contrastiva de las identidades reportadas.
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto solo cuando corresponda al nombre divino; aquí no aparece.
  - Se mantuvo «Bautista» como título histórico convencional en español, coherente con la decisión auditada en inglés.
  - Se conservó la repetición contrastiva de «otros ... pero otros» para reflejar ἄλλοι ... ἄλλοι δέ.
  - No se introdujo vocabulario doctrinal adicional que no esté sostenido por el griego.
