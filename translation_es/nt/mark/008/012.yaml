translation:
  language: es
  text: 'Y suspirando profundamente en su espíritu, dice: «¿Por qué esta generación busca una señal? En verdad les digo: no se dará una señal a esta generación[a]»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «si se dará una señal a esta generación»; es una expresión juramentaria de tipo semítico que significa que no se dará una señal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναστενάξας
  english_pob_choice: sighing deeply
  chosen_spanish: suspirando profundamente
  alternatives_spanish:
  - gimiendo
  - dando un profundo suspiro
  lexicon: BDAG
  rationale: El participio expresa un suspiro o gemido intensificado. «Suspirando profundamente» conserva la fuerza emocional sin volver la frase demasiado áspera o antinatural en español.
- source_word: τῷ πνεύματι αὐτοῦ
  english_pob_choice: in his spirit
  chosen_spanish: en su espíritu
  alternatives_spanish:
  - dentro de sí
  - interiormente
  lexicon: BDAG
  rationale: La dación de esfera/respecto se refleja mejor con «en su espíritu», manteniendo el lenguaje antropológico del griego y evitando reducirlo solo a una interioridad psicológica.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dijo
  alternatives_spanish:
  - dice
  lexicon: BDAG
  rationale: Aunque el presente narrativo del griego tiene viveza, en español la secuencia fluye mejor con pretérito dentro de la narración. No se pierde el sentido ni la fuerza del dicho.
- source_word: Τί ἡ γενεὰ αὕτη ζητεῖ σημεῖον;
  english_pob_choice: Why does this generation seek a sign?
  chosen_spanish: ¿Por qué esta generación busca una señal?
  alternatives_spanish:
  - ¿Qué busca esta generación, una señal?
  - ¿Por qué esta generación pide una señal?
  lexicon: BDAG
  rationale: «Por qué» expresa adecuadamente τί en este giro idiomático. «Generación» conserva el matiz colectivo y temporal. «Señal» traduce σημεῖον con el valor de un signo acreditador o milagroso sin explicitar más de lo que el contexto exige.
- source_word: ἀμὴν λέγω ὑμῖν
  english_pob_choice: Truly I say to you
  chosen_spanish: En verdad les digo
  alternatives_spanish:
  - Amén, les digo
  - Verdaderamente les digo
  lexicon: BDAG
  rationale: «En verdad les digo» comunica la solemnidad de la fórmula con un español natural y reverente. Se evita «Amén» en el cuerpo principal para no sonar litúrgicamente rígido donde el griego funciona como fórmula discursiva de Jesús.
- source_word: εἰ δοθήσεται τῇ γενεᾷ ταύτῃ σημεῖον
  english_pob_choice: no sign will be given to this generation
  chosen_spanish: no se dará señal a esta generación
  alternatives_spanish:
  - si se dará una señal a esta generación
  - que se dé señal a esta generación
  lexicon: BDAG
  rationale: 'Se sigue la lectura idiomática reconocida por el POB inglés: la cláusula condicional funciona como negación enfática/juramentada. En español, «no se dará señal» expresa con claridad la fuerza negativa que el griego pretende comunicar.'
theological_decisions:
- issue: La cláusula condicional εἰ después de ἀμὴν λέγω ὑμῖν
  english_pob_reading: 'Interpret as an emphatic negation: ''no sign will be given to this generation.'''
  chosen_spanish_reading: 'Interpretarla como negación enfática: «no se dará señal a esta generación».'
  alternative_spanish_readings:
  - «si se dará señal a esta generación»
  - «que se dé señal a esta generación»
  rationale: No es una disputa doctrinal, sino una decisión exegético-traductora. El giro semítico funciona como negación enérgica; expresarlo así en español evita una lectura literal que sonaría oscura o incorrecta.
  doctrine_reference: Translación y claridad discursiva; principio de comunicar el valor pragmático del texto fuente.
translation_notes:
  revision_awareness: 'Coincide con el último pase del texto fuente: no se reportaron revisiones aplicadas y el acuerdo de control fue alto, con solo un matiz menor sobre la cláusula εἰ, resuelto aquí siguiendo la lectura idiomática ya documentada en el audit trail inglés.'
  spanish_consistency_notes:
  - Se mantiene «señal» para σημεῖον, coherente con el POB inglés.
  - Se mantiene «generación» para γενεά, evitando «pueblo» o «edad», que debilitarían el contraste contextual.
  - Se usa «espíritu» en minúscula porque no hay artículo ni indicación explícita del Espíritu Santo en esta frase.
  - Se evita «Cristo» u otras ampliaciones no presentes en el versículo.
  - La puntuación y las comillas siguen el uso estándar del español bíblico moderno.
