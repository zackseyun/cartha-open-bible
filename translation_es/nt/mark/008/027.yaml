    issue: La nota al pie [a] está anclada a «salió» pero el English POB conserva la nota en la pregunta final sobre ἄνθρωποι = «people», no sobre ἐξῆλθεν.
    rationale: La auditoría inglesa documenta explícitamente una alternativa léxica relevante en la cláusula interrogativa («men» vs «people»). La nota española actual introduce una alternativa distinta y débilmente útil, por lo que no preserva el rastro de decisión auditado.
  - severity: medium
    issue: «diciendo a ellos» es una construcción poco idiomática en español.
    rationale: Aunque intenta reflejar λέγων αὐτοῖς de cerca, resulta acartonada y no cumple bien con la meta de español moderno y digno. «diciéndoles» preserva la estructura participial sin sonar traducido literalmente.
  - severity: low
    issue: «las personas» es correcto pero menos natural que «la gente» en este contexto.
    rationale: Para una pregunta sobre la opinión pública general, «la gente» suena más fluido y sigue siendo genérico, sin la restricción masculina de «los hombres».
