translation:
  language: es
  text: 'Y Jesús salió con sus discípulos hacia las aldeas de Cesarea de Filipo. Y por el camino iba preguntando a sus discípulos, diciéndoles: «¿Quién dice la gente[a] que soy?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «¿Quién dicen los hombres que soy?». El griego usa ἄνθρωποι en sentido genérico para referirse a la gente, no específicamente a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθεν
  english_pob_choice: went out
  chosen_spanish: salió
  alternatives_spanish:
  - partió
  - salió fuera
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa movimiento de salida; «salió» conserva ese valor de forma natural en español sin añadir matices de destino que el griego no requiere.
- source_word: κώμας
  english_pob_choice: villages
  chosen_spanish: aldeas
  alternatives_spanish:
  - pueblos
  - villages
  lexicon: BDAG
  rationale: κώμη designa una población rural menor que una ciudad. «Aldeas» comunica bien ese valor en español bíblico contemporáneo; «pueblos» puede sonar más amplio, pero es una alternativa aceptable.
- source_word: Καισαρείας τῆς Φιλίππου
  english_pob_choice: Caesarea Philippi
  chosen_spanish: Cesarea de Filipo
  alternatives_spanish:
  - Cesarea Filipi
  - la Cesarea de Filipo
  lexicon: BDAG
  rationale: Se mantiene el nombre geográfico usual en español, con la preposición «de» para transparentar la relación posesiva del griego sin volver la expresión artificiosa.
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the way
  chosen_spanish: por el camino
  alternatives_spanish:
  - en el camino
  - en el trayecto
  lexicon: BDAG
  rationale: «Por el camino» conserva el sentido locativo y la sensación de movimiento narrativo. Es idiomático y no pierde la idea de desplazamiento presente en la escena.
- source_word: ἐπηρώτα
  english_pob_choice: was asking
  chosen_spanish: iba preguntando
  alternatives_spanish:
  - preguntaba
  - estaba preguntando
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en curso. «Iba preguntando» comunica bien la duratividad en español y evita una simple pasada que aplastaría el aspecto.
- source_word: λέγων αὐτοῖς
  english_pob_choice: saying to them
  chosen_spanish: diciendo a ellos
  alternatives_spanish:
  - y les decía
  - mientras les decía
  lexicon: BDAG
  rationale: Se conserva la estructura participial de manera relativamente cercana al griego. «Diciendo a ellos» mantiene el flujo sintáctico; aunque menos idiomático que «les decía», resulta transparente para el audito de la construcción.
- source_word: Τίνα με λέγουσιν οἱ ἄνθρωποι εἶναι;
  english_pob_choice: Who do people say that I am?
  chosen_spanish: ¿Quién dicen las personas que soy?
  alternatives_spanish:
  - ¿Quién dicen los hombres que soy?
  - ¿Quién dicen que soy las personas?
  lexicon: BDAG
  rationale: El interrogativo τίνα pide identidad personal. «¿Quién dicen las personas que soy?» preserva el sentido de «Who do people say that I am?» y mantiene el valor genérico de ἄνθρωποι sin reducirlo a varones. Se omite «yo soy» explícito porque el español no lo requiere para la naturalidad de la pregunta, aunque el referente sigue siendo claro.
- source_word: οἱ μαθηταὶ αὐτοῦ / τοὺς μαθητὰς αὐτοῦ
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos de él
  - sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente estándar de μαθηταί. El posesivo «sus» refleja correctamente el αὐτοῦ explícito en ambos miembros de la oración.
theological_decisions:
- issue: ἄνθρωποι como genérico humano en la pregunta de Jesús
  english_pob_reading: people
  chosen_spanish_reading: las personas
  alternative_spanish_readings:
  - los hombres
  - la gente
  rationale: El griego usa ἄνθρωποι en sentido genérico; «las personas» evita una lectura restrictiva masculina y conserva el alcance público de la pregunta. «La gente» también sería posible, pero «las personas» es más transparente respecto del referente humano plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El contexto auditado en inglés no presenta cambios revisados posteriores; el último pase de revisión indicó que no hacían falta cambios y que solo había cuestiones menores. Por eso la propuesta española sigue de cerca las decisiones léxicas estables del POB en inglés, especialmente en el aspecto imperfectivo de ἐπηρώτα y en el genérico humano de ἄνθρωποι.
  spanish_consistency_notes:
  - Se mantiene «Jesús» y «discípulos» de acuerdo con la terminología base.
  - Se usa «Cesarea de Filipo» como nombre propio español asentado, sin traducir mecánicamente la estructura posesiva.
  - «Personas» preserva el valor genérico de ἄνθρωποι y armoniza con la política de precisión de género en la base inglesa.
  - La puntuación y la comillas españolas siguen el estilo editorial del proyecto.
