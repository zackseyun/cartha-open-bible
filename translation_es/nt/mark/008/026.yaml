translation:
  language: es
  text: 'Y lo envió a su casa[a], diciéndole: «Ni siquiera entres en la aldea».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «y no digas nada a nadie en la aldea».'
    reason: textual_variant
lexical_decisions:
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - lo mandó
  - lo despachó
  lexicon: BDAG
  rationale: ἀποστέλλω aquí expresa que Jesús lo despide o lo hace partir. «Envió» conserva el valor básico del verbo sin añadir connotaciones excesivas y funciona naturalmente en español narrativo.
- source_word: εἰς οἶκον αὐτοῦ
  english_pob_choice: to his home
  chosen_spanish: a su casa
  alternatives_spanish:
  - a su hogar
  - a su vivienda
  lexicon: BDAG
  rationale: La secuencia indica destino hacia la propia residencia. «A su casa» es la forma más natural y fiel en español; evita el calco de «into his house» y preserva la referencia a su propio domicilio.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciéndole
  alternatives_spanish:
  - diciendo
  - y le dijo
  lexicon: BDAG
  rationale: El participio de discurso se integra en español con una construcción natural que mantiene la dependencia del verbo principal. «Diciéndole» conserva el vínculo narrativo y explicita el destinatario implícito.
- source_word: Μηδὲ
  english_pob_choice: Do not even
  chosen_spanish: Ni siquiera
  alternatives_spanish:
  - Y no
  - Ni
  lexicon: BDAG
  rationale: μηδέ añade una negación enfática. «Ni siquiera» transmite mejor esa intensificación que una simple coordinación negativa.
- source_word: κώμην
  english_pob_choice: the village
  chosen_spanish: la aldea
  alternatives_spanish:
  - el pueblo
  - la villa
  lexicon: BDAG
  rationale: κώμη designa una población pequeña, una aldea o aldea/villa rural. «Aldea» es la opción más precisa y natural en español; «pueblo» puede sonar más amplio o moderno.
- source_word: εἰσέλθῃς
  english_pob_choice: enter
  chosen_spanish: entres
  alternatives_spanish:
  - vayas a
  - entres en
  lexicon: BDAG
  rationale: La prohibición con subjuntivo aoristo se expresa de manera idiomática en español con una negativa mandativa. «Entres» conserva la fuerza direccional del verbo sin rigidizar el estilo.
theological_decisions:
- issue: Alcance de la prohibición de Jesús
  english_pob_reading: Render the command as a straightforward prohibition against entering the village, without importing motives or harmonizing with longer textual traditions.
  chosen_spanish_reading: Presentar el mandato como una prohibición directa de entrar en la aldea, sin añadir motivos ni expandirlo con tradiciones textuales más largas.
  alternative_spanish_readings:
  - No entrar siquiera en la aldea y además no hablar con nadie allí.
  - Salir de allí y no regresar a la aldea.
  rationale: El texto griego de SBLGNT solo contiene la prohibición de entrar en la aldea. La traducción española debe limitarse a ese alcance y no incorporar la variante manuscrita ampliada al cuerpo principal.
  doctrine_reference: Crítica textual; fidelidad al texto base
- issue: Tratamiento de la variante manuscrita
  english_pob_reading: Some manuscript traditions expand the saying to include telling no one in the village.
  chosen_spanish_reading: Indicar la variante como nota, no como parte del texto principal.
  alternative_spanish_readings:
  - Incluir la expansión en el texto principal.
  - Omitir toda referencia a la variante.
  rationale: La tradición textual ampliada es relevante para la auditoría, pero no pertenece al texto base adoptado aquí. Debe preservarse como nota textual para claridad y transparencia.
  doctrine_reference: Crítica textual; transmisión manuscrita
translation_notes:
  revision_awareness: No se requirieron revisiones recientes en el expediente; la lectura base coincide con el griego SBLGNT y con la auditoría inglesa de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se prefirió «aldea» para κώμη por precisión léxica y coherencia con el registro narrativo.
  - La prohibición negativa se formuló con «Ni siquiera entres» para conservar el énfasis de μηδέ sin sobreexplicar el mandato.
