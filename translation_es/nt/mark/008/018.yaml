translation:
  language: es
  text: Teniendo ojos[a], ¿no ven? Y teniendo oídos, ¿no oyen? Y ¿no recuerdan?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Aunque tengan ojos, ¿no perciben? Y aunque tengan oídos, ¿no entienden?». El griego usa los verbos ordinarios «ver» y «oír», que en este contexto también pueden implicar percepción espiritual.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὀφθαλμοὺς ἔχοντες
  english_pob_choice: Having eyes
  chosen_spanish: Teniendo ojos
  alternatives_spanish:
  - Aunque tienen ojos
  - Ustedes tienen ojos
  lexicon: BDAG
  rationale: El participio presente se conserva de manera relativamente literal con un giro natural en español. «Teniendo» mantiene la estructura retórica del griego sin volverla áspera; «aunque tienen ojos» explicita el matiz concesivo, pero añade interpretación.
- source_word: βλέπετε
  english_pob_choice: do you not see
  chosen_spanish: ¿no ven?
  alternatives_spanish:
  - ¿no perciben?
  - ¿no miran?
  lexicon: BDAG
  rationale: «Ver» es el equivalente más directo del verbo griego y preserva el paralelismo con «oír». «Perciben» capta el posible sentido figurado, pero en español introduce una interpretación que el griego no expresa léxicamente aquí.
- source_word: ὦτα ἔχοντες
  english_pob_choice: having ears
  chosen_spanish: teniendo oídos
  alternatives_spanish:
  - aunque tienen oídos
  - ustedes tienen oídos
  lexicon: BDAG
  rationale: Se mantiene el mismo paralelismo del primer miembro. «Oídos» reproduce el sustantivo concreto y conserva la repetición deliberada del texto fuente.
- source_word: ἀκούετε
  english_pob_choice: do you not hear
  chosen_spanish: ¿no oyen?
  alternatives_spanish:
  - ¿no escuchan?
  - ¿no prestan atención?
  lexicon: BDAG
  rationale: «Oír»/«oír» en forma verbal se acerca más al léxico griego básico que «escuchar». «Escuchar» o «prestar atención» pueden ser más explícitos, pero desplazan el peso semántico hacia la obediencia o la atención.
- source_word: μνημονεύετε
  english_pob_choice: do you not remember
  chosen_spanish: ¿no recuerdan?
  alternatives_spanish:
  - ¿no se acuerdan?
  - ¿no lo tienen presente?
  lexicon: BDAG
  rationale: «Recordar» es la opción más clara y natural en español para la falta de memoria que Jesús reprocha. «Se acuerdan» es posible, pero «recuerdan» conserva mejor el tono de reproche formal.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y además
  lexicon: BDAG
  rationale: La conjunción se vierte de forma directa para mantener el encadenamiento de las preguntas. En español, «Y» reproduce bien la acumulación retórica.
- source_word: οὐ / οὐκ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es que
  - acaso no
  lexicon: BDAG
  rationale: La negación simple conserva el valor interrogativo-retórico del griego y se integra naturalmente en las preguntas en español.
theological_decisions:
- issue: Fuerza figurada de ver y oír
  english_pob_reading: Retain the concrete verbs 'see' and 'hear,' allowing the context to imply spiritual dullness.
  chosen_spanish_reading: Conservar «ver» y «oír» en el texto principal, dejando que el contexto sugiera la insensibilidad espiritual.
  alternative_spanish_readings:
  - Usar «percibir» y «entender» para explicitar el sentido figurado
  - Usar «comprender» en lugar de «oír»
  rationale: El griego emplea verbos sensoriales ordinarios, y el eco profético se entiende mejor si no se lo sustituye por verbos más interpretativos. En español, «ver» y «oír» mantienen la carga retórica y la posible tensión entre percepción física y entendimiento espiritual.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por tanto, este borrador sigue de cerca el texto base y la decisión léxica del POB en inglés, manteniendo el paralelismo y la fuerza retórica del griego.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se mantiene la pareja verbal concreta «ver/oír» para no borrar la posible lectura espiritual, pero sin reemplazarla por una paráfrasis interpretativa.
  - La puntuación interrogativa en series preserva el ritmo de acusación retórica del original.
