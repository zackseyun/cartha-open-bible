translation:
  language: es
  text: Y mandó que la multitud se recostara en el suelo[a]. Luego, tomando los siete panes, después de dar gracias, los partió y seguía dándolos a sus discípulos para que los pusieran delante de la multitud[b]; y ellos los pusieron delante de la multitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sentarse». El verbo griego sugiere más específicamente reclinarse para una comida.
    reason: lexical_alternative
  - marker: b
    text: O «servirlos». El griego literalmente significa «poner delante».
    reason: lexical_alternative
lexical_decisions:
- source_word: παραγγέλλει
  english_pob_choice: instructed
  chosen_spanish: mandó
  alternatives_spanish:
  - instruyó
  - ordenó
  - dio la instrucción de
  lexicon: BDAG
  rationale: El verbo griego expresa una orden o instrucción autoritativa. «Mandó» conserva la fuerza directiva en español sin sonar excesivamente técnico ni endurecer el tono más allá del contexto narrativo.
- source_word: ἀναπεσεῖν
  english_pob_choice: to recline
  chosen_spanish: recostarse
  alternatives_spanish:
  - sentarse
  - reclinarse
  - echarse
  lexicon: BDAG
  rationale: En contexto de comida, el verbo sugiere la postura de reclinarse para comer, no simplemente sentarse. «Recostarse» comunica mejor esa imagen en español; la nota mantiene la alternativa de sentido más general.
- source_word: ἐπὶ τῆς γῆς
  english_pob_choice: on the ground
  chosen_spanish: sobre la tierra
  alternatives_spanish:
  - sobre el suelo
  - en la tierra
  - sobre el terreno
  lexicon: BDAG
  rationale: γῆ puede ser «tierra», «suelo» o «tierra/terreno» según contexto. Aquí designa la superficie sobre la que la multitud se recuesta; «sobre la tierra» sigue el valor léxico más directo y mantiene la imagen física del texto.
- source_word: τοὺς ἑπτὰ ἄρτους
  english_pob_choice: the seven loaves
  chosen_spanish: los siete panes
  alternatives_spanish:
  - los siete panes de pan
  - los siete panes/loaves
  lexicon: BDAG
  rationale: ἄρτος en este pasaje se refiere a panes/loaves dentro del relato de alimentación. En español, «panes» es natural y comunica el referente sin forzar una distinción ajena al uso corriente.
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - después de agradecer
  lexicon: BDAG
  rationale: La forma participial expresa acción previa a partir el pan. «Después de dar gracias» reproduce la secuencia y evita introducir un objeto explícito que el griego no menciona.
- source_word: ἔκλασεν
  english_pob_choice: broke them
  chosen_spanish: los partió
  alternatives_spanish:
  - los quebró
  - los rompió
  lexicon: BDAG
  rationale: El verbo se usa de partir el pan. «Los partió» es la formulación natural en español bíblico contemporáneo y mantiene la referencia al pan/panes sin añadir explicaciones.
- source_word: ἐδίδου
  english_pob_choice: kept giving
  chosen_spanish: seguía dándolos
  alternatives_spanish:
  - les daba
  - continuaba dándolos
  - iba dándolos
  lexicon: BDAG
  rationale: El imperfecto señala acción continuada o repetida. «Seguía dándolos» preserva ese aspecto progresivo en español. El pronombre «los» retoma los panes de manera natural en el flujo narrativo.
- source_word: τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: to his disciples
  chosen_spanish: a sus discípulos
  alternatives_spanish:
  - a los discípulos de él
  - a sus seguidores
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente estable de μαθηταί y conserva el matiz técnico del grupo de Jesús dentro del relato.
- source_word: ἵνα παρατιθῶσιν
  english_pob_choice: so that they might set them before the crowd
  chosen_spanish: para que los pusieran delante de la multitud
  alternatives_spanish:
  - para servirlos a la multitud
  - para colocarlos delante de la multitud
  lexicon: BDAG
  rationale: παρατίθημι significa literalmente poner o colocar delante, especialmente comida. «Pusieran delante» conserva esa imagen concreta mejor que «servir», que sería más interpretativo. «Multitud» mantiene el paralelismo con ὄχλος.
- source_word: παρέθηκαν
  english_pob_choice: they set them before the crowd
  chosen_spanish: los pusieron delante de la multitud
  alternatives_spanish:
  - los sirvieron a la multitud
  - los colocaron delante de la multitud
  lexicon: BDAG
  rationale: El aoristo narra la acción completada de los discípulos. Repetir «pusieron delante» conserva la coherencia léxica con παρατιθῶσιν y la imagen de presentar la comida ante la gente.
- source_word: ὄχλος
  english_pob_choice: crowd
  chosen_spanish: multitud
  alternatives_spanish:
  - gente
  - muchedumbre
  - crowd
  lexicon: BDAG
  rationale: «Multitud» es el equivalente bíblico y natural en español para ὄχλος, manteniendo el referente colectivo sin el matiz moderno de «multitud» como simple aglomeración casual.
theological_decisions:
- issue: Posible resonancia eucarística de la acción de dar gracias y partir el pan
  english_pob_reading: Rendered εὐχαριστήσας straightforwardly as 'after giving thanks' without importing sacramental terminology.
  chosen_spanish_reading: Traducir εὐχαριστήσας como «después de dar gracias» sin introducir lenguaje sacramental o eucarístico.
  alternative_spanish_readings:
  - después de agradecer [con énfasis eucarístico explícito]
  - después de bendecir
  rationale: El pasaje usa lenguaje ordinario de comida. Aunque puede resonar con prácticas cristianas posteriores, el texto no afirma aquí una doctrina sacramental. La traducción conserva la tensión y no la resuelve por anticipado.
  doctrine_reference: 'Principio de la POB: no importar afirmaciones doctrinales que el texto no formula explícitamente; preservar la evidencia textual y el posible eco sin convertirlo en interpretación.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el auditable English POB, conservando la decisión de traducir ἀναπεσεῖν con una imagen de reclinarse para comer, ἐδίδου con aspecto continuativo, y παρατίθημι con el sentido concreto de poner delante, sin introducir términos sacramentales no explícitos. No se detectaron revisiones posteriores que alteren estas decisiones.
  spanish_consistency_notes:
  - Se mantiene «multitud» para ὄχλος en todo el verso para conservar coherencia léxica.
  - Se mantiene «discípulos» para μαθηταί como término técnico del relato.
  - Se evita alternar entre «panes» y «loaves»; en español se usa «panes» de manera natural y consistente.
  - Se conserva «dar gracias» como traducción neutral de εὐχαριστήσας, sin añadir objeto implícito.
