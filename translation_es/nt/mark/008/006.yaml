    rationale: La frase es entendible, pero mezcla un dativo implícito («les») con complemento directo explícito («a la multitud») de forma algo áspera. «Mandó que la multitud se recostara» o «mandó a la multitud que se recostara» suena más natural y mantiene la fuerza de παραγγέλλει.
