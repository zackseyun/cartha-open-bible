base_translation:
  language: en
  yaml_path: translation/nt/mark/008/006.yaml
  text: And he instructed the crowd to recline on the ground[a]. Then, taking the seven loaves, after giving thanks he broke them and kept giving them to his disciples so that they might set them before the crowd[b], and they set them before the crowd.
  footnotes:
  - marker: a
    text: Or 'sit down.' The Greek verb more specifically suggests reclining for a meal.
    reason: lexical_alternative
  - marker: b
    text: Or 'serve them.' The Greek literally means 'set before.'
    reason: lexical_alternative
