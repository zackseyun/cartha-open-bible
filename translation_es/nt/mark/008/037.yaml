translation:
  language: es
  text: Pues ¿qué puede dar un hombre a cambio de su vida[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma»; la palabra griega puede significar «vida», «yo mismo» o «alma», según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ
  english_pob_choice: For what
  chosen_spanish: Porque ¿qué…?
  alternatives_spanish:
  - Pues ¿qué…?
  - Porque ¿qué daría…?
  lexicon: BDAG
  rationale: τί introduce la pregunta retórica y γάρ aporta conexión explicativa con lo anterior. En español, «Porque ¿qué…?» conserva esa relación causal/explicativa y mantiene el tono interrogativo natural del griego.
- source_word: δοῖ
  english_pob_choice: can give
  chosen_spanish: puede dar
  alternatives_spanish:
  - daría
  - querría dar
  lexicon: BDAG
  rationale: El aoristo optativo en la pregunta retórica expresa posibilidad hipotética. «Puede dar» comunica bien la fuerza práctica de la pregunta sin endurecerla con un condicional menos natural en español.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El sustantivo singular masculino tiene fuerza genérica. «Un hombre» reproduce mejor la forma del griego y conserva el valor representativo del sujeto, sin cambiarlo innecesariamente a un término más abstracto.
- source_word: ἀντάλλαγμα
  english_pob_choice: in exchange
  chosen_spanish: a cambio de
  alternatives_spanish:
  - en intercambio por
  - como rescate de
  lexicon: BDAG
  rationale: El sustantivo expresa una cosa dada en trueque o compensación. En español, la relación se expresa con naturalidad mediante la locución «a cambio de», que evita una construcción forzada y mantiene el sentido de intercambio.
- source_word: τῆς ψυχῆς αὐτοῦ
  english_pob_choice: for his life
  chosen_spanish: de su vida[a]
  alternatives_spanish:
  - de su alma
  - de sí mismo
  lexicon: BDAG
  rationale: ψυχή puede significar «vida», «alma» o «yo mismo» según el contexto. Aquí, el marco de Marcos 8:35–37 favorece «vida» como sentido principal, pero la ambigüedad teológica del término se conserva en la nota para no reducirlo solo a vida biológica.
theological_decisions:
- issue: Alcance de ψυχή en una sentencia sobre pérdida y ganancia definitiva
  english_pob_reading: life with a footnote preserving soul as an alternative
  chosen_spanish_reading: vida con nota que preserva alma como alternativa
  alternative_spanish_readings:
  - alma
  - yo mismo
  - vida del alma
  rationale: En Marcos 8:35–37, ψυχή designa la vida entera de la persona en contraste con ganar el mundo. «Vida» es claro en el texto principal, pero «alma» debe permanecer como alternativa porque el término griego conserva una profundidad antropológica y teológica que no conviene resolver de antemano.
  doctrine_reference: Translation philosophy §3 (preservar tensión teológica); §6 (español moderno, claro y digno)
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego y la trayectoria auditada en inglés: conserva la pregunta retórica, la fuerza explicativa de γάρ y la ambigüedad significativa de ψυχή sin neutralizarla.'
  spanish_consistency_notes:
  - Se usó «un hombre» para reflejar el masculino singular genérico del griego.
  - Se prefirió «vida» en el texto principal por claridad contextual, con nota para mantener la tensión semántica de ψυχή.
  - «A cambio de» expresa el valor de intercambio de ἀντάλλαγμα de manera idiomática en español.
  - La puntuación interrogativa española se adaptó para reflejar una pregunta retórica continua.
