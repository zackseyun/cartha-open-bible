    issue: Inicio «Porque ¿qué...?» poco natural en español
    rationale: Aunque γάρ aporta conexión explicativa, en español una pregunta retórica introducida por «Porque» sin pausa ni cláusula previa explícita suena forzada. «Pues» comunica la conexión discursiva con más naturalidad.
  - severity: low
    issue: Explicación morfológica incorrecta en la decisión lexical sobre δοῖ
    rationale: El comentario dice «aoristo optativo», pero δοῖ aquí es subjuntivo aoristo. No exige adjudicación compleja, pero conviene corregir la revisión editorial asociada.
