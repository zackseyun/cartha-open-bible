translation:
  language: es
  text: Y discutían entre sí que no tenían pan[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «no tenían panes».
    reason: lexical_alternative
lexical_decisions:
- source_word: διελογίζοντο
  english_pob_choice: were discussing
  chosen_spanish: discutían
  alternatives_spanish:
  - estaban discutiendo
  - razonaban
  - deliberaban
  lexicon: BDAG
  rationale: El imperfecto medio indica una acción շարունակada o en curso entre los discípulos. «Discutían» conserva bien ese sentido durativo en español y resulta natural sin perder el matiz de conversación interna.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: with one another
  chosen_spanish: entre sí
  alternatives_spanish:
  - unos con otros
  - entre ellos
  - con los demás
  lexicon: BDAG
  rationale: La expresión griega marca reciprocidad. «Entre sí» es una equivalencia breve, idiomática y clara en español para una interacción recíproca.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido de lo que discutían, no una causa. «Que» reproduce correctamente la subordinación indirecta.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - barras de pan
  lexicon: BDAG
  rationale: Aunque el plural puede significar literalmente «panes» o «hogazas», en español «pan» funciona naturalmente como sustantivo de alimento básico y evita una rigidez innecesaria. En este contexto, el referente sigue siendo el alimento que no tenían.
- source_word: οὐκ ἔχουσιν
  english_pob_choice: they had no
  chosen_spanish: no tenían
  alternatives_spanish:
  - no tienen
  - carecían de
  lexicon: BDAG
  rationale: Dentro del discurso indirecto narrado en imperfecto, «no tenían» refleja bien el tiempo y el flujo del relato. Mantiene la naturalidad del español y la referencia al estado de carencia.
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés están en alta concordancia; no se registraron revisiones aplicadas. La versión española sigue la decisión inglesa de preservar el sentido de discurso en curso y la alternativa léxica de ἄρτους como «panes», aunque el cuerpo principal opta por «pan» para una lectura natural en español.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y readable para uso eclesial, sin recurrir a formulaciones arcaizantes.
  - La nota conserva la alternativa literal «panes» para reflejar el plural griego sin sobrecargar el texto principal.
  - No hay decisiones teológicas específicas en este versículo; el trabajo es principalmente sintáctico y léxico.
