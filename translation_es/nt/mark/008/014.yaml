translation:
  language: es
  text: Y se habían olvidado de llevar pan[a], y no tenían más que un pan consigo en la barca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El plural ἄρτους puede significar ‘panes’ literalmente, pero aquí probablemente funciona de manera colectiva como ‘pan/provisiones’. Se conserva ‘pan’ en el texto principal por naturalidad, sin negar la posibilidad del plural concreto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπελάθοντο
  english_pob_choice: had forgotten
  chosen_spanish: se habían olvidado
  alternatives_spanish:
  - olvidaron
  - habían olvidado
  lexicon: BDAG
  rationale: El aoristo medio de ἐπιλανθάνομαι expresa que los discípulos dejaron pasar el llevar provisiones; en español, el pluscuamperfecto ‘se habían olvidado’ refleja bien el trasfondo narrativo y la relación con la falta actual de pan.
- source_word: λαβεῖν
  english_pob_choice: to take
  chosen_spanish: llevar
  alternatives_spanish:
  - tomar
  - traer
  lexicon: BDAG
  rationale: En este contexto de viaje, ‘llevar’ comunica de manera natural la idea de tomar consigo provisiones. Evita un calco rígido y conserva la función del infinitivo complementario.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - provisiones
  lexicon: BDAG
  rationale: Aunque el plural puede referirse a panes individuales, en español ‘pan’ expresa de modo más natural el alimento/provisión general. Se mantiene la tensión entre plural concreto y sentido colectivo mediante la nota.
- source_word: εἰ μὴ ἕνα ἄρτον
  english_pob_choice: no more than one loaf
  chosen_spanish: no tenían más que un pan
  alternatives_spanish:
  - sólo tenían un pan
  - excepto un pan
  lexicon: BDAG
  rationale: La construcción exceptiva se vierte con una restricción de cantidad natural en español. ‘No tenían más que’ conserva el sentido de límite y evita una repetición torpe del contraste negativo.
- source_word: οὐκ εἶχον
  english_pob_choice: they had no more than
  chosen_spanish: no tenían
  alternatives_spanish:
  - no tenían nada
  - carecían de
  lexicon: BDAG
  rationale: En combinación con la frase exceptiva, se expresa la ausencia de provisiones adicionales. En español, el verbo ‘tener’ basta porque el límite ya está determinado por ‘más que un pan’.
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: with them
  chosen_spanish: consigo
  alternatives_spanish:
  - con ellos
  - con ellos mismos
  lexicon: BDAG
  rationale: ‘Consigo’ es una forma natural y compacta en español para el reflexivo de acompañamiento. Mantiene el matiz de llevar algo junto a sí en la barca.
- source_word: ἐν τῷ πλοίῳ
  english_pob_choice: in the boat
  chosen_spanish: en la barca
  alternatives_spanish:
  - en el barco
  - a bordo de la barca
  lexicon: BDAG
  rationale: ‘Barca’ es la opción más idiomática y bíblicamente clara en español para πλοῖον en este relato. Conserva el escenario acuático sin sobreactuar el registro.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el criterio auditado del POB inglés: primero expresa el olvido de llevar provisiones, luego el límite exacto de cantidad. Se evitó traducir mecánicamente ‘loaves’ por un plural español innecesario, manteniendo la ambigüedad documentada entre panes individuales y pan como alimento/provisión.'
  spanish_consistency_notes:
  - Se mantuvo ‘pan’ como sustantivo colectivo, pero con nota para no perder el posible sentido de ‘panes’.
  - ‘Barca’ se usa como término bíblico común y claro en español para πλοῖον.
  - No se introdujo lenguaje doctrinal ni títulos no presentes en el versículo.
