review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: la comparación con la alimentación de los cuatro mil, la pregunta sobre cuántas canastas grandes de sobras recogieron, y la respuesta «Siete». También preserva correctamente la distinción léxica de σπυρίς como recipiente grande. Sin embargo, la nota [a] está anclada erróneamente a «cuatro mil» cuando corresponde a «canastos grandes», y «fueron para los cuatro mil» suena demasiado literal y poco natural para τοὺς ἑπτὰ εἰς τοὺς τετρακισχιλίους.'
  spanish_quality_summary: La legibilidad necesita ajuste. «Los siete fueron para los cuatro mil» resulta poco idiomático en español; es mejor explicitar «panes» aquí para claridad natural sin traicionar el sentido contextual. Además, «recogiste[n]» no es aceptable en texto bíblico corrido; debe resolverse con una forma normal de segunda persona plural o una reformulación. «Pedazos» es posible, pero «trozos» o «pedazos del pan» sería más claro; no obstante, no requiere nota aparte.
  glossary_alignment: No hay conflictos con la terminología teológica del proyecto. La distinción entre σπυρίς y el término de Marcos 8:19 debe mantenerse en español, idealmente con «canastas grandes» o «canastos grandes» y la nota anclada allí. No hay términos como Yahvé/Mesías/esclavo implicados en este versículo.
  issues:
  - severity: high
    issue: Anclaje incorrecto de la nota [a]
    rationale: La nota explica σπυρίς («cesta/canasta grande»), pero el marcador aparece en «cuatro mil[a]» en vez de junto al término del recipiente. Esto rompe la correspondencia exigida entre nota y palabra relevante.
  - severity: high
    issue: «recogiste[n]» es una forma editorial no apta para el texto final
    rationale: El texto principal no debe contener marcas morfológicas internas como [n]. Debe usarse una forma española normal y legible.
  - severity: medium
    issue: «los siete fueron para los cuatro mil» suena antinatural
    rationale: Aunque intenta conservar la elipsis griega, en español esta formulación resulta forzada. Añadir «panes» mejora la claridad y sigue siendo fiel al referente implícito en el original.
  - severity: low
    issue: La nota [b] es innecesaria
    rationale: El inglés POB no preservó nota para κλάσματα, y en español «trozos»/«pedazos» no crea una ambigüedad nueva que requiera explicación.
  revised_spanish_text: 'Y cuando los siete panes fueron para los cuatro mil, ¿cuántos canastos grandes[a] llenos de trozos recogieron? Ellos le dijeron: «Siete».'
