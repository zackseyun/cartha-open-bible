translation:
  language: es
  text: 'Y cuando los siete panes fueron para los cuatro mil, ¿cuántos canastos grandes[a] llenos de trozos recogieron? Ellos le dijeron: «Siete».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: σπυρίς designa una cesta grande, distinta del término para el cesto más pequeño usado en Marcos 8:19.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε καὶ
  english_pob_choice: And when
  chosen_spanish: Y cuando
  alternatives_spanish:
  - Cuando también
  - Y cuando también
  lexicon: BDAG
  rationale: La secuencia introduce una nueva comparación dentro del mismo discurso de Jesús. En español, «Y cuando» conserva la conexión narrativa y temporal sin forzar un «también» que suena pesado, aunque el valor aditivo de καὶ queda implícito en el contexto comparativo.
- source_word: τοὺς ἑπτὰ
  english_pob_choice: the seven
  chosen_spanish: los siete
  alternatives_spanish:
  - siete
  - los siete panes
  lexicon: BDAG
  rationale: El griego elíptico remite a los siete panes mencionados antes. «Los siete» preserva esa elipsis y evita añadir «panes» en el texto principal, aunque el referente contextual sea claro.
- source_word: εἰς τοὺς τετρακισχιλίους
  english_pob_choice: for the four thousand
  chosen_spanish: para los cuatro mil
  alternatives_spanish:
  - para los cuatro mil personas
  - entre los cuatro mil
  lexicon: BDAG
  rationale: «Εἰς» en este contexto expresa relación/beneficio respecto del grupo alimentado. «Para los cuatro mil» suena natural en español y conserva esa relación sin añadir más de lo que el griego dice.
- source_word: πόσων σπυρίδων
  english_pob_choice: how many large baskets
  chosen_spanish: ¿cuántos canastos grandes
  alternatives_spanish:
  - ¿cuántas canastas grandes
  - ¿cuántos cestos grandes
  lexicon: BDAG
  rationale: σπυρίς designa un recipiente grande y el auditorio de Marcos distingue este término del usado antes para un cesto más pequeño. «Canastos grandes» mantiene esa distinción con un término comprensible en español.
- source_word: πληρώματα
  english_pob_choice: full
  chosen_spanish: llenos
  alternatives_spanish:
  - rebosantes
  - con llenado de
  lexicon: BDAG
  rationale: El sustantivo expresa el estado de estar lleno, unido a los canastos. En español, «llenos» comunica de forma natural el valor de πληρώματα sin volver la frase torpe o abstracta.
- source_word: κλασμάτων
  english_pob_choice: of broken pieces
  chosen_spanish: de pedazos
  alternatives_spanish:
  - de fragmentos
  - de trozos rotos
  lexicon: BDAG
  rationale: κλάσματα son las porciones quebradas del pan. «Pedazos» es natural en español y conserva la concreción; «fragmentos» suena más técnico, y «trozos rotos» sobreexplicaría la acción ya implícita.
- source_word: ἤρατε
  english_pob_choice: did you pick up
  chosen_spanish: recogiste[n]
  alternatives_spanish:
  - recogieron
  - levantaron
  lexicon: BDAG
  rationale: αἴρω aquí se refiere a recoger lo sobrante. «Recogiste[n]» comunica bien el acto de juntar los restos. Se marca la forma de segunda persona plural con [n] para reflejar la pregunta directa a los discípulos sin fijar una distinción gráfica innecesaria en el cuerpo del texto.
- source_word: καὶ λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Y le dicen
  - Y ellos le dijeron
  lexicon: BDAG
  rationale: Aunque el presente griego puede conservar viveza narrativa, en español la forma simple de pasado fluye mejor en este contexto. «Le dijeron» mantiene la respuesta directa a Jesús sin perder claridad.
- source_word: Ἑπτά
  english_pob_choice: Seven
  chosen_spanish: Siete
  alternatives_spanish:
  - Siete panes
  lexicon: BDAG
  rationale: La respuesta es numérica y breve. Mantener solo «Siete» respeta la concisión del griego y deja implícito el sustantivo por el contexto inmediato.
translation_notes:
  revision_awareness: Se siguió el auditorio de traducción del POB inglés y su decisión de preservar la distinción léxica entre σπυρίς y el término anterior para «cesto». No se observan revisiones aplicadas en el paquete en inglés; la versión española mantiene esa misma lectura y la elipsis de «los siete» sin añadir explícitamente «panes» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene la distinción entre un recipiente grande (σπυρίς) y el término previo del contexto inmediato, para no borrar una diferencia léxica importante en Marcos 8:19–20.
  - Se conserva la elipsis de «los siete» para seguir de cerca la construcción griega y el razonamiento auditado en inglés.
  - La respuesta numérica final se deja breve, como en el original, sin expandirla innecesariamente.
