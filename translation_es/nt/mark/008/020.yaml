  to: 'Y cuando los siete panes fueron para los cuatro mil, ¿cuántos canastos grandes[a] llenos de trozos recogieron? Ellos le dijeron: «Siete».'
  rationale: Se corrigió la sintaxis para un español natural y fiel al contexto («los siete panes»), se eliminó la forma editorial impropia «recogiste[n]» mediante una reformulación en tercera persona plural, y se movió la nota léxica al término que realmente traduce σπυρίς. También se eliminó la nota sobre «pedazos/trozos» por no ser necesaria.
