translation:
  language: es
  text: Y los fariseos salieron y comenzaron a discutir con él, pidiéndole una señal[a] del cielo, para ponerlo a prueba.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del cielo» en el sentido de «del cielo físico»; en este contexto, la frase probablemente indica una señal de origen o autoridad divina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξῆλθον
  english_pob_choice: came out
  chosen_spanish: salieron
  alternatives_spanish:
  - salieron afuera
  - fueron y salieron
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι expresa salida o movimiento hacia afuera. En español, «salieron» comunica con naturalidad la entrada en escena sin añadir información que el griego no da.
- source_word: ἤρξαντο συζητεῖν
  english_pob_choice: began to argue
  chosen_spanish: comenzaron a discutir
  alternatives_spanish:
  - comenzaron a argumentar
  - comenzaron a debatir
  lexicon: BDAG
  rationale: 'La construcción perifrástica pide valor ingresivo: «comenzaron a». συζητέω puede ser discutir, debatir o disputar; en este contexto hostil, «discutir» transmite el forcejeo verbal sin sonar demasiado técnico.'
- source_word: αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Jesús
  lexicon: BDAG
  rationale: El dativo con συζητεῖν se expresa de manera natural en español como «con él». Se mantiene el pronombre porque el griego no nombra a Jesús aquí.
- source_word: ζητοῦντες
  english_pob_choice: seeking
  chosen_spanish: buscando
  alternatives_spanish:
  - pidiendo
  - exigiendo
  lexicon: BDAG
  rationale: El participio contemporáneo se traduce bien como gerundio en español. «Buscando» conserva el matiz de solicitar algo que sigue especificado por el sustantivo siguiente.
- source_word: παρ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - de su parte
  lexicon: BDAG
  rationale: παρά con genitivo indica fuente o procedencia. «De él» es la forma más directa y sobria en español, y evita sobreexplicar.
- source_word: σημεῖον
  english_pob_choice: a sign
  chosen_spanish: una señal
  alternatives_spanish:
  - un signo
  - un milagro
  lexicon: BDAG
  rationale: Se conserva el valor de evidencia o validación. «Señal» es más natural en español bíblico que «signo» y evita reducir el término a «milagro».
- source_word: ἀπὸ τοῦ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - del cielo arriba
  - del cielo, es decir, de origen divino
  lexicon: BDAG
  rationale: En este contexto judío y evangélico, οὐρανός puede referirse al cielo en sentido teológico. «Del cielo» mantiene la literalidad y la resonancia bíblica; en nota se puede explicar la posible referencia al origen divino.
- source_word: πειράζοντες
  english_pob_choice: testing him
  chosen_spanish: para ponerlo a prueba
  alternatives_spanish:
  - tentándolo
  - probándolo
  lexicon: BDAG
  rationale: πειράζω puede ser probar o tentar. Aquí el contexto es de desafío hostil, así que «ponerlo a prueba» preserva la intención adversarial sin sugerir necesariamente incitación al pecado.
theological_decisions:
- issue: Sentido de «del cielo» en la petición de una señal
  english_pob_reading: A sign of divine/heavenly origin or authorization
  chosen_spanish_reading: Una señal de origen o validación divina
  alternative_spanish_readings:
  - una señal del cielo físico
  - una señal atmosférica
  rationale: La frase conserva su forma literal en el texto, pero en la lectura de conjunto apunta a una señal acreditada por Dios, no a un fenómeno meteorológico. Esa tensión se mantiene sin borrarla.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El texto inglés de la POB mantiene una lectura activa y hostil de συζητεῖν («began to argue») y conserva «from heaven» con nota sobre la posible lectura de origen divino. La versión española sigue esa misma línea, pero adapta συζητεῖν a una solución idiomática natural («comenzaron a discutir») y explicita en nota la alternativa «debatir». No se observan revisiones posteriores que alteren la decisión base, y el pasaje permanece alineado con el resumen de alta concordancia.
  spanish_consistency_notes:
  - Se usa «señal» para σημεῖον, consistente con la preferencia del proyecto por mantener el valor evidencial del término.
  - Se traduce οὐρανός como «cielo», no como una perífrasis interpretativa en el texto principal, para conservar la ambigüedad controlada del original.
  - «Ponerlo a prueba» refleja πειράζοντες sin cargar el texto con una lectura doctrinal añadida.
  - Se mantiene el pronombre «él» para αὐτῷ/αὐτόν, evitando introducir el nombre de Jesús donde el griego no lo da.
