translation:
  language: es
  text: 'Y al darse cuenta, les dice: «¿Por qué están discutiendo que no tienen pan[a]? ¿Aún no perciben o entienden? ¿Tienen endurecido el corazón?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «panes». El griego tiene el plural «panes», pero en español «pan» suele sonar más natural en este contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: knowing
  chosen_spanish: al darse cuenta
  alternatives_spanish:
  - sabiendo
  - al saberlo
  - al comprender
  lexicon: BDAG
  rationale: El participio aoristo introduce la toma de conciencia de Jesús sobre la discusión de los discípulos. «Al darse cuenta» expresa esa irrupción narrativa de manera natural en español sin añadir un objeto explícito que el griego no exige.
- source_word: διαλογίζεσθε
  english_pob_choice: are you discussing
  chosen_spanish: están discutiendo
  alternatives_spanish:
  - están razonando
  - están deliberando
  - están pensando
  lexicon: BDAG
  rationale: El verbo puede referirse a deliberar o discutir interiormente. En este contexto, «están discutiendo» comunica con claridad la conversación sobre el pan sin volverlo demasiado técnico o enrevesado.
- source_word: ἄρτους
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - panes
  - alimento
  - panes de pan
  lexicon: BDAG
  rationale: Aunque el griego está en plural, en español «pan» suele funcionar mejor como sustantivo colectivo en este contexto, como en el uso natural de la escena. «Panes» quedaría más literal, pero menos idiomático.
- source_word: νοεῖτε
  english_pob_choice: perceive
  chosen_spanish: perciben
  alternatives_spanish:
  - comprenden
  - se dan cuenta
  - disciernen
  lexicon: BDAG
  rationale: νόεω enfatiza la percepción mental o el captar lo que sucede. «Perciben» preserva esa primera idea y mantiene la distinción con el siguiente verbo.
- source_word: συνίετε
  english_pob_choice: understand
  chosen_spanish: entienden
  alternatives_spanish:
  - comprenden
  - captan
  - disciernen
  lexicon: BDAG
  rationale: συνίημι suele significar entender o comprender. «Entienden» conserva el paralelismo retórico con «perciben» y suena natural en español.
- source_word: πεπωρωμένην
  english_pob_choice: hardened
  chosen_spanish: endurecido
  alternatives_spanish:
  - insensible
  - embotado
  - duro
  lexicon: BDAG
  rationale: El participio perfecto pasivo de πωρόω describe un estado de dureza o insensibilidad. «Endurecido» mantiene la imagen bíblica y permite una formulación española natural al unirse con «el corazón».
- source_word: καρδίαν
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón interior
  - mente
  - interior
  lexicon: BDAG
  rationale: En lenguaje bíblico, καρδία incluye la vida interior, no solo las emociones. «Corazón» es la forma más clara y fiel en español para conservar el valor antropológico y teológico del término.
theological_decisions:
- issue: La forma final de la reprensión sobre la condición del corazón
  english_pob_reading: Do you have your heart hardened?
  chosen_spanish_reading: ¿Tienen endurecido el corazón?
  alternative_spanish_readings:
  - ¿Tienen el corazón endurecido?
  - ¿Está endurecido su corazón?
  - ¿Tienen corazones endurecidos?
  rationale: 'El griego expresa literalmente una construcción con «tener» + objeto + participio, pero en español resulta más natural y a la vez fiel traducirla como un estado posesivo: «tienen endurecido el corazón». Esta opción conserva la fuerza de la reprensión y evita una redacción artificial.'
  doctrine_reference: Principios de equivalencia óptima; nota gramatical sobre el estado resultante expresado por el participio perfecto pasivo
translation_notes:
  revision_awareness: 'La revisión inglesa reciente eliminó el objeto interpretativo tras ''knowing'' y mantuvo una lectura más literal de la cláusula final. En español, se siguió ese mismo impulso de sobriedad: no se añadió ningún objeto a ''al darse cuenta'' y se evitó suavizar la última pregunta hacia una paráfrasis explicativa.'
  spanish_consistency_notes:
  - Se mantuvo 'pan' en singular colectivo para reflejar el uso natural del español y evitar una literalidad innecesaria de 'los panes'.
  - Se eligió la pareja verbal 'perciben ni entienden' para conservar el paralelismo entre νοεῖτε y συνίετε.
  - No se introdujeron notas al pie porque la formulación española puede dar cuenta del sentido sin requerir alternativas ancladas.
