review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido del griego: inicio de enseñanza, necesidad expresada por δεῖ, título «el Hijo del Hombre», sufrimiento, rechazo por los grupos dirigentes, muerte y resurrección «después de tres días». También conserva correctamente la nota alternativa sobre la expresión temporal. Sin embargo, el texto español contiene un error grave de escritura en «قتلado», que rompe la legibilidad y no corresponde al español. Además, la decisión léxica documentada para ἀποκτανθῆναι es «ser muerto», pero el texto no coincide con esa decisión debido al error tipográfico.'
  spanish_quality_summary: La redacción es en general natural y digna para español bíblico moderno. «Comenzó a enseñarles», «debía padecer muchas cosas», «ser rechazado» y «después de tres días resucitar» funcionan bien. El principal problema es el término híbrido/no español «قتلado». Conviene repararlo con una forma idiomática y fiel. Entre las opciones, «ser muerto» sigue la decisión documentada pero suena algo dura; «ser matado» es poco natural; «ser asesinado» añade matiz indebido. La mejor solución es «ser muerto» solo si se prioriza máxima cercanía formal a la decisión ya registrada; en este caso, para legibilidad y fidelidad al inglés POB «be killed», lo más natural es «ser matado» no es recomendable. Mejor ajustar el texto a «ser muerto» y, si se desea, mantener la justificación de que es una formulación marcada. Aun así, para calidad española amplia, «ser ejecutado» sería demasiado interpretativo. Por tanto, propongo «ser muerto».
  glossary_alignment: No hay conflicto con los glosarios principales del proyecto. «Hijo del Hombre», «escribas» y ausencia de términos sensibles como Yahvé/Mesías/esclavo están bien. «Principales sacerdotes» es aceptable para ἀρχιερεῖς según la documentación del registro. La reparación propuesta mantiene alineación con las decisiones auditadas.
  issues:
  - severity: high
    issue: Error textual grave en «ser قتلado»
    rationale: La palabra contiene caracteres árabes y no es español. Esto hace que el borrador sea inaceptable tal como está y debe corregirse automáticamente.
  - severity: medium
    issue: Desajuste entre el texto español y la decisión léxica registrada para ἀποκτανθῆναι
    rationale: La decisión documentada dice «ser muerto», pero el texto no la refleja. Conviene alinear texto y decisiones para consistencia editorial.
  revised_spanish_text: Y comenzó a enseñarles que el Hijo del Hombre[a] debía padecer muchas cosas, y ser rechazado por los ancianos, los principales sacerdotes y los escribas, y ser muerto, y después de tres días resucitar.
  revised_footnotes:
  - marker: a
    text: O «en tres días». El griego de Marcos dice «después de tres días»; algunas tradiciones traducen la expresión de manera más idiomática o la armonizan con pasajes paralelos que dicen «al tercer día».
    reason: alternative_reading
  revision_rationale: Se corrige un error textual grave y se alinea el texto con la decisión léxica documentada para ἀποκτανθῆναι, sin alterar el sentido del original griego ni la nota temporal preservada por el POB inglés.
