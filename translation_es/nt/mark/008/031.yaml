translation:
  language: es
  text: Y comenzó a enseñarles que el Hijo del Hombre[a] debía padecer muchas cosas, y ser rechazado por los ancianos, los principales sacerdotes y los escribas, y ser muerto, y después de tres días resucitar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tres días». El griego de Marcos dice «después de tres días»; algunas tradiciones traducen la expresión de manera más idiomática o la armonizan con pasajes paralelos que dicen «al tercer día».
    reason: alternative_reading
lexical_decisions:
- source_word: ἤρξατο διδάσκειν
  english_pob_choice: began to teach
  chosen_spanish: comenzó a enseñarles
  alternatives_spanish:
  - empezó a enseñarles
  lexicon: BDAG
  rationale: ἤρξατο con infinitivo expresa inicio de la acción; «comenzó a enseñarles» conserva el matiz ingrésivo y suena natural en español.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debía
  alternatives_spanish:
  - debe
  - tenía que
  lexicon: BDAG
  rationale: En este contexto, δεῖ expresa necesidad fuerte respecto del camino del Hijo del Hombre. «Debía» comunica necesidad/divina conveniencia en pasado narrativo sin volverlo una explicación doctrinal explícita.
- source_word: τὸν υἱὸν τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - el Hijo del hombre
  lexicon: BDAG
  rationale: Es el título establecido y transparente en español bíblico; debe conservarse como título, no parafrasearse.
- source_word: πολλὰ παθεῖν
  english_pob_choice: suffer many things
  chosen_spanish: padecer muchas cosas
  alternatives_spanish:
  - sufrir muchas cosas
  - sufrir mucho
  lexicon: BDAG
  rationale: El griego usa πολλά con πάσχω de forma amplia. «Padecer muchas cosas» sigue de cerca la fuerza concreta de la expresión y mantiene el plural neutro sin reducirlo a una abstracción.
- source_word: ἀποδοκιμασθῆναι
  english_pob_choice: be rejected
  chosen_spanish: ser rechazado
  alternatives_spanish:
  - ser desechado
  - ser repudiado
  lexicon: BDAG
  rationale: El verbo implica ser desaprobado/rechazado por evaluación. «Ser rechazado» es la opción más clara y fiel al contexto de rechazo oficial por las autoridades.
- source_word: ὑπὸ τῶν πρεσβυτέρων
  english_pob_choice: by the elders
  chosen_spanish: por los ancianos
  alternatives_spanish:
  - por los presbíteros
  - por los mayores
  lexicon: BDAG
  rationale: En este contexto se refiere al grupo de liderazgo judío. «Ancianos» es la traducción natural y reconocible; «presbíteros» sería demasiado eclesial en español moderno.
- source_word: τῶν ἀρχιερέων
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: Aunque «chief priests» puede verterse como «principales sacerdotes», esta opción conserva el plural y evita confundirlo con el oficio singular de «sumo sacerdote».
- source_word: τῶν γραμματέων
  english_pob_choice: the scribes
  chosen_spanish: los escribas
  alternatives_spanish:
  - los letrados
  - los expertos en la Ley
  lexicon: BDAG
  rationale: «Escribas» preserva la designación histórica del grupo y coincide con el uso evangélico habitual.
- source_word: ἀποκτανθῆναι
  english_pob_choice: be killed
  chosen_spanish: ser muerto
  alternatives_spanish:
  - ser asesinado
  - ser ejecutado
  lexicon: BDAG
  rationale: El pasivo del verbo indica muerte causada por otros. «Ser muerto» refleja más de cerca la pasividad del original, aunque en español actual suena algo más marcado que «ser asesinado».
- source_word: μετὰ τρεῖς ἡμέρας
  english_pob_choice: after three days
  chosen_spanish: después de tres días
  alternatives_spanish:
  - al cabo de tres días
  - en tres días
  lexicon: BDAG
  rationale: μετά con acusativo significa «después de». Se mantiene la frase sin armonizarla con otras formulaciones sinópticas.
- source_word: ἀναστῆναι
  english_pob_choice: rise again
  chosen_spanish: resucitar
  alternatives_spanish:
  - levantarse
  - volver a vivir
  lexicon: BDAG
  rationale: En contexto de la pasión y tras la muerte, ἀναστῆναι se refiere a la resurrección. «Resucitar» expresa el sentido de manera natural y precisa en español.
theological_decisions:
- issue: Necesidad expresada por δεῖ en la predicción de la pasión
  english_pob_reading: must
  chosen_spanish_reading: debía
  alternative_spanish_readings:
  - debe
  - tenía que
  rationale: La frase presenta sufrimiento, rechazo, muerte y resurrección como parte necesaria del destino del Hijo del Hombre. «Debía» conserva la fuerza de necesidad sin añadir una explicación causal que el griego no desarrolla aquí.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
- issue: Expresión temporal μετὰ τρεῖς ἡμέρας
  english_pob_reading: after three days
  chosen_spanish_reading: después de tres días
  alternative_spanish_readings:
  - al tercer día
  - en tres días
  rationale: Se traduce el griego de forma directa y no se armoniza con otras formulaciones del evangelio. Esto respeta la primacía del texto fuente frente a la tradición de traducción.
  doctrine_reference: Primacía del idioma original sobre la armonización entre pasajes.
translation_notes:
  revision_awareness: Se revisó el pasaje con concordancia alta entre el texto griego, la traducción inglesa auditada y el análisis morfológico. No se detectaron revisiones textuales relevantes en el expediente; se mantuvo la lectura de Marcos «después de tres días» y se preservó la secuencia narrativa y la pasividad de los verbos principales.
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título fijo.
  - Se traduce ἀποδοκιμασθῆναι como «ser rechazado» para conservar el matiz de desaprobación por autoridades.
  - Se usa «ancianos», «principales sacerdotes» y «escribas» como grupos de liderazgo judío, no como títulos eclesiales.
  - Se evita armonizar la cronología de la resurrección; la nota explica la alternativa idiomática.
  - Se prefiere un registro bíblico claro y moderno, sin sustituir términos técnicos por paráfrasis libres.
