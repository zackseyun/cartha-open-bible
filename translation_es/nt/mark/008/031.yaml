revisions:
- from: Y comenzó a enseñarles que el Hijo del Hombre[a] debía padecer muchas cosas, y ser rechazado por los ancianos, los principales sacerdotes y los escribas, y ser قتلado, y después de tres días resucitar.
  to: Y comenzó a enseñarles que el Hijo del Hombre[a] debía padecer muchas cosas, y ser rechazado por los ancianos, los principales sacerdotes y los escribas, y ser muerto, y después de tres días resucitar.
  rationale: Se corrige un error textual grave y se alinea el texto con la decisión léxica documentada para ἀποκτανθῆναι, sin alterar el sentido del original griego ni la nota temporal preservada por el POB inglés.
