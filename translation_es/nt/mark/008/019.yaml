base_translation:
  language: en
  yaml_path: translation/nt/mark/008/019.yaml
  text: When I broke the five loaves for the five thousand[a], how many baskets full of broken pieces did you pick up?” They said to him[c][b], “Twelve.”
  footnotes:
  - marker: a
    text: Or 'fragments.' The Greek term refers to pieces left over from the broken loaves.
    reason: lexical_alternative
  - marker: b
    text: Or 'did you take up?'
    reason: lexical_alternative
  - marker: c
    text: Literally 'the five thousand'; some translations render 'the five thousand men.'
    reason: alternative_reading
