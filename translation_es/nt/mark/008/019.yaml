translation:
  language: es
  text: 'Cuando partí los cinco panes para los cinco mil[b], ¿cuántas canastas llenas de pedazos[a] recogieron?[c] Ellos le dijeron: «Doce»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fragmentos». El término griego se refiere a los pedazos que quedaron del pan partido.'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «los cinco mil»; algunas traducciones traducen «los cinco mil hombres».
    reason: alternative_reading
  - marker: c
    text: 'O: «tomaron?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτε
  english_pob_choice: When
  chosen_spanish: Cuando
  alternatives_spanish:
  - En el momento en que
  lexicon: BDAG
  rationale: Introduce una cláusula temporal directa y natural en español, manteniendo la referencia al milagro anterior sin añadir explicación innecesaria.
- source_word: ἔκλασα
  english_pob_choice: I broke
  chosen_spanish: partí
  alternatives_spanish:
  - rompí
  - quebré
  lexicon: BDAG
  rationale: En el contexto de partir pan, «partí» comunica de manera natural la acción de dividir el pan para repartirlo. Evita un calco torpe y conserva la concreción del verbo griego.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - bollos
  lexicon: BDAG
  rationale: En los relatos de alimentación, ἄρτος designa piezas contables de pan. «Panes» es claro, natural y fiel al plural concreto del texto.
- source_word: εἰς τοὺς πεντακισχιλίους
  english_pob_choice: for the five thousand
  chosen_spanish: para los cinco mil
  alternatives_spanish:
  - para los cinco mil hombres
  - a los cinco mil
  lexicon: BDAG
  rationale: «Para» expresa bien el destinatario del reparto. Se mantiene el mismo nivel de especificidad que el griego y el audit trail inglés, sin añadir «hombres» al texto principal.
- source_word: πόσους
  english_pob_choice: how many
  chosen_spanish: cuántas
  alternatives_spanish:
  - cuántos
  lexicon: BDAG
  rationale: Concuerda con «canastas» y reproduce la pregunta numérica directa del original.
- source_word: κοφίνους
  english_pob_choice: baskets
  chosen_spanish: canastas
  alternatives_spanish:
  - cestas
  - cestos
  lexicon: BDAG
  rationale: Designa un recipiente para recoger restos. «Canastas» es una equivalencia clara y ampliamente entendible en español, sin imponer una especificación técnica no requerida por el texto.
- source_word: κλασμάτων
  english_pob_choice: broken pieces
  chosen_spanish: pedazos
  alternatives_spanish:
  - fragmentos
  - pedazos partidos
  lexicon: BDAG
  rationale: El sustantivo se refiere a lo que quedó del pan partido. «Pedazos» transmite bien la idea de restos recogidos; el adjetivo «partidos» podría sonar redundante en español, aunque sigue siendo posible.
- source_word: πλήρεις
  english_pob_choice: full of
  chosen_spanish: llenas de
  alternatives_spanish:
  - llenas
  - colmadas de
  lexicon: BDAG
  rationale: En español, «llenas de» reproduce la construcción atributiva de manera fluida. Se conserva la relación entre las canastas y los pedazos recogidos.
- source_word: ἤρατε
  english_pob_choice: did you pick up
  chosen_spanish: recogieron
  alternatives_spanish:
  - levantaron
  - tomaron
  lexicon: BDAG
  rationale: En este contexto el verbo apunta a juntar los sobrantes. «Recogieron» comunica el resultado de manera natural y evita una frase interrogativa demasiado mecánica. La alternativa «levantaron» podría sugerir simplemente alzar, no reunir.
- source_word: λέγουσιν αὐτῷ
  english_pob_choice: They said to him
  chosen_spanish: Ellos le dijeron
  alternatives_spanish:
  - Le dijeron
  - Le responden
  lexicon: BDAG
  rationale: Se conserva la referencia explícita a los interlocutores. El pasado simple funciona bien en español narrativo, aunque el presente histórico también sería posible.
- source_word: Δώδεκα
  english_pob_choice: Twelve
  chosen_spanish: «Doce»
  alternatives_spanish:
  - Doce
  lexicon: BDAG
  rationale: Respuesta numérica directa sin expansión. Las comillas reflejan el discurso directo.
theological_decisions:
- issue: Referencia del grupo πεντακισχιλίους
  english_pob_reading: the five thousand
  chosen_spanish_reading: los cinco mil
  alternative_spanish_readings:
  - los cinco mil hombres
  rationale: Se mantiene la designación convencional del grupo alimentado, sin agregar «hombres» al texto principal. Eso sigue el sentido del audit trail inglés y evita sobreespecificar una referencia que el griego de este versículo presenta de modo abreviado.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de κλασμάτων
  english_pob_reading: broken pieces
  chosen_spanish_reading: pedazos
  alternative_spanish_readings:
  - fragmentos
  - pedazos partidos
  rationale: No se borra la relación con el pan partido, pero en español «pedazos» comunica con naturalidad los restos que se recogieron. La posible intensificación mediante «partidos» queda como alternativa, no como requisito del texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §2
- issue: Verbo ἤρατε en el contexto de recoger sobrantes
  english_pob_reading: did you pick up
  chosen_spanish_reading: recogieron
  alternative_spanish_readings:
  - levantaron
  - tomaron
  rationale: El sentido aquí es reunir lo que sobró, no simplemente alzar objetos. «Recogieron» preserva esa fuerza semántica en español y evita un calco menos claro. La lectura de pregunta directa queda suficientemente marcada por el contexto y la puntuación.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: Se siguió el audit trail inglés sin copiarlo mecánicamente. No se reportan cambios de revisión; el pasaje estaba en acuerdo alto y sin modificaciones recientes, así que la redacción española busca equivalencia óptima con claridad natural.
  spanish_consistency_notes:
  - Se mantiene «los cinco mil» sin añadir «hombres», en consonancia con el tratamiento del grupo en el contexto auditado.
  - Se usa «Yahvé» no aplica aquí porque el versículo no contiene el nombre divino.
  - Se eligió «canastas»/«pedazos» por naturalidad española, pero se conserva en nota la alternativa literal «fragmentos».
