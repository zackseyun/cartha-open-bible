base_translation:
  language: en
  yaml_path: translation/nt/mark/008/034.yaml
  text: And after calling the crowd together with his disciples[a], he said to them, “If anyone wants to come after me, let him deny himself, take up his cross[b], and follow me.”
  footnotes:
