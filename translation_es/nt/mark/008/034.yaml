translation:
  language: es
  text: 'Y llamando a la multitud junto con sus discípulos, les dijo: «Si alguno quiere[a] venir en pos de mí, niéguese a sí mismo, tome su cruz y sígame».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Si alguno desea venir en pos de mí».
    reason: lexical_alternative
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: after calling ... together
  chosen_spanish: llamando ... junto con
  alternatives_spanish:
  - habiendo llamado
  - convocando
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa una acción previa de reunir. «Llamando ... junto con» conserva la secuencia narrativa y el sentido de convocatoria sin sonar forzado en español.
- source_word: ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: «Multitud» transmite bien ὄχλος en un registro natural y digno en español, manteniendo el contraste narrativo sin volverlo arcaico.
- source_word: σὺν τοῖς μαθηταῖς αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: junto con sus discípulos
  alternatives_spanish:
  - con sus discípulos
  - con sus seguidores
  lexicon: BDAG
  rationale: σύν marca acompañamiento. «Junto con» refleja de manera clara que la multitud fue llamada en compañía de los discípulos, conservando el alcance del escenario.
- source_word: Εἴ τις θέλει
  english_pob_choice: If anyone wants
  chosen_spanish: Si alguno quiere
  alternatives_spanish:
  - Si alguien quiere
  - Quienquiera que quiera
  lexicon: BDAG
  rationale: La construcción condicional general queda bien en español con «Si alguno quiere». Preserva el carácter abierto de la invitación y la fuerza voluntativa de θέλει.
- source_word: ὀπίσω μου ἐλθεῖν
  english_pob_choice: to come after me
  chosen_spanish: venir en pos de mí
  alternatives_spanish:
  - venir detrás de mí
  - seguirme
  lexicon: BDAG
  rationale: «Venir en pos de mí» conserva la imagen direccional de ὀπίσω μου y evita fusionar demasiado pronto este primer verbo con ἀκολουθέω, que aparece al final del verso.
- source_word: ἀπαρνησάσθω ἑαυτόν
  english_pob_choice: let him deny himself
  chosen_spanish: niéguese a sí mismo
  alternatives_spanish:
  - renúnciese a sí mismo
  - déselo todo por sí
  lexicon: BDAG
  rationale: El imperativo medio de tercera persona exige una exhortación directa. «Niéguese a sí mismo» es la forma natural y fiel para expresar auto-renuncia, sin suavizar el mandato.
- source_word: ἀράτω
  english_pob_choice: take up
  chosen_spanish: tome
  alternatives_spanish:
  - levante
  - cargue
  lexicon: BDAG
  rationale: En español, el modismo «tomar su cruz» comunica el gesto idiomático de manera estable y reconocible. El verbo «tome» mantiene el mandato sin sobreexplicar la acción.
- source_word: τὸν σταυρὸν αὐτοῦ
  english_pob_choice: his cross
  chosen_spanish: su cruz
  alternatives_spanish:
  - la cruz que le corresponde
  - su madero
  lexicon: BDAG
  rationale: «Cruz» se mantiene literalmente para conservar la imagen histórica concreta del instrumento de ejecución, como exige el contexto y la lectura POB en inglés.
- source_word: ἀκολουθείτω μοι
  english_pob_choice: follow me
  chosen_spanish: sígame
  alternatives_spanish:
  - siga tras de mí
  - continúe siguiéndome
  lexicon: BDAG
  rationale: El imperativo presente se puede expresar de forma natural con «sígame». Mantiene la orden continua de discipulado sin perder claridad en español.
theological_decisions:
- issue: Alcance de la invitación y exigencia del discipulado
  english_pob_reading: A general call to any prospective disciple, expressed with imperative force.
  chosen_spanish_reading: 'Una invitación general a cualquiera que quiera seguir a Jesús, pero con exigencias imperativas claras: negación de sí mismo, cruz y seguimiento.'
  alternative_spanish_readings:
  - Una formulación más rígida con «debe» repetido
  - Una paráfrasis más suave centrada solo en compromiso
  rationale: 'El griego abre con una condición general y luego usa imperativos. La redacción española conserva ambos rasgos: apertura y mandato, sin volverlo ni demasiado mecánico ni demasiado blando.'
  doctrine_reference: Translation philosophy §§3, 6
- issue: Sentido de σταυρός
  english_pob_reading: Rendered literally as 'cross' without paraphrasing it as suffering, burden, or martyrdom alone.
  chosen_spanish_reading: «Cruz» se conserva literalmente, sin sustituirla por «carga» o «sufrimiento».
  alternative_spanish_readings:
  - carga
  - peso
  - sufrimiento
  rationale: La cruz es una imagen histórica concreta y teológicamente cargada. Traducirla de modo literal preserva esa concreción y evita reducirla a una metáfora genérica.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: Coincide con la evaluación auditada de alta concordancia; no se registraron revisiones aplicadas en el pasaje inglés de referencia, por lo que la versión española sigue de cerca la estructura y las decisiones léxicas ya aprobadas.
  spanish_consistency_notes:
  - Se mantuvo «cruz» de forma literal para conservar la imagen histórica concreta del texto.
  - Se prefirió «venir en pos de mí» para distinguir el primer verbo de la exhortación final «sígame».
  - El registro busca ser moderno y reverente, evitando tanto arcaísmos excesivos como paráfrasis explicativas.
  - La nota al pie marca la alternativa semántica de θέλει, ya documentada en el audit trail inglés.
