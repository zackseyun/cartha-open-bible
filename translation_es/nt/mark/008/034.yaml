review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: Jesús convoca a la multitud con sus discípulos y presenta una invitación-condición seguida de tres imperativos de discipulado. Conserva correctamente «cruz» de forma literal y distingue «venir …» de «seguir …». Sin embargo, la nota al pie está mal anclada y no corresponde al lugar ni al contenido de la alternativa inglesa auditada.'
  spanish_quality_summary: El español es claro, digno y ampliamente eclesialmente legible. «Multitud», «junto con sus discípulos», «niéguese a sí mismo», «tome su cruz» y «sígame» son naturales. «Venir en pos de mí» es una opción válida y tradicionalmente inteligible, aunque algo más marcada; aun así, preserva bien la diferencia con «sígame». La reparación necesaria es principalmente de aparato de notas, no de redacción principal.
  glossary_alignment: No hay conflictos con la terminología base del proyecto en este versículo. Se preserva la literalidad de σταυρός como «cruz» y no se introduce paráfrasis teológica indebida. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en «su cruz» pero su contenido ofrece una alternativa para «Si alguno quiere venir en pos de mí».
    rationale: Según la pista de auditoría inglesa, la alternativa léxica corresponde a Εἴ τις θέλει («If anyone wants / wishes»), no a «his cross». En el estado actual, el lector español recibe una nota desalineada con el texto fuente y con la decisión léxica documentada.
  - severity: low
    issue: El texto de la nota española usa «O “si alguno quiere venir en pos de mí”», que no expresa una verdadera alternativa al texto principal.
    rationale: La nota inglesa da una alternativa a «wants» («wishes»), no repite sustancialmente la misma redacción. En español conviene reflejar una alternativa real, por ejemplo «si alguno desea venir en pos de mí».
  revised_spanish_text: 'Y llamando a la multitud junto con sus discípulos, les dijo: «Si alguno quiere[a] venir en pos de mí, niéguese a sí mismo, tome su cruz y sígame».'
  revised_footnotes:
