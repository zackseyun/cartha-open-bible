    text: O «Si alguno desea venir en pos de mí».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal casi intacto porque es fiel y natural en español. Solo se corrige el aparato crítico para que la nota alternativa quede anclada a «quiere» y refleje correctamente la opción léxica documentada para θέλει.
