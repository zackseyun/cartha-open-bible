translation:
  language: es
  text: Porque todo el que quiera salvar su vida[a] la perderá; pero todo el que pierda su vida por causa de mí y del evangelio la salvará.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alma» en todo el versículo; la palabra griega puede significar «vida» o «alma» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ψυχή
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - alma
  lexicon: BDAG
  rationale: En este dicho, ψυχή se refiere a la vida propia de la persona, no de manera principal al componente inmortal. «Vida» conserva el contraste entre intentar salvarla y perderla, y mantiene la fuerza del dicho en español. Se preserva «alma» como alternativa en nota por la amplitud semántica del término y por la tradición cristiana.
- source_word: σῶσαι / σώσει
  english_pob_choice: save / will save
  chosen_spanish: salvar / la salvará
  alternatives_spanish:
  - preservar / la preservará
  lexicon: BDAG
  rationale: «Salvar» reproduce el verbo y el paralelo interno con ἀπολέσει. «Preservar» sería posible, pero atenúa la carga teológica y retórica del contraste. Se mantiene la correspondencia verbal en la repetición final.
- source_word: ἀπολέσει
  english_pob_choice: will lose
  chosen_spanish: perderá
  alternatives_spanish:
  - destruirá
  - arruinará
  lexicon: BDAG
  rationale: En relación con ψυχή, ἀπόλλυμι funciona aquí como «perder» en un dicho paradójico. «Destruirá» sería demasiado fuerte y menos idiomático en español; «perderá» conserva el sentido de pérdida real sin sobreinterpretar.
- source_word: ἕνεκεν ἐμοῦ καὶ τοῦ εὐαγγελίου
  english_pob_choice: for my sake and for the gospel
  chosen_spanish: por causa de mí y del evangelio
  alternatives_spanish:
  - por mi causa y por el evangelio
  - por mí y por el evangelio
  lexicon: BDAG
  rationale: ἕνεκεν expresa motivo o causa. «Por causa de mí y del evangelio» refleja bien la estructura griega y la relación conjunta con ἐμοῦ y τοῦ εὐαγγελίου. «Evangelio» se conserva como término estable del vocabulario de Marcos.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: En Marcos, εὐαγγέλιον es un término clave y «evangelio» es la forma natural y eclesialmente reconocible en español. «Buena noticia» explicita el sentido, pero pierde la fijación literaria del término.
- source_word: ὃς ... ὃς
  english_pob_choice: whoever ... whoever
  chosen_spanish: todo el que ... todo el que
  alternatives_spanish:
  - quienquiera que ... quienquiera que
  - el que ... el que
  lexicon: BDAG
  rationale: La construcción es genérica e indefinida. «Todo el que» expresa con naturalidad el valor proverbial y universal del dicho, y suena más fluido que una solución más literal o formal.
- source_word: θέλῃ
  english_pob_choice: wants to
  chosen_spanish: quiera
  alternatives_spanish:
  - quiere
  - desee
  lexicon: BDAG
  rationale: «Quiera» reproduce bien la fuerza volitiva y el matiz potencial de ἐὰν θέλῃ en una oración general. «Quiere» suena menos ajustado al giro condicional; «desee» sería más marcado y menos natural.
- source_word: αὐτοῦ / αὐτήν
  english_pob_choice: his / it
  chosen_spanish: su / la
  alternatives_spanish:
  - su propia / la
  lexicon: N/A
  rationale: El griego usa formas masculinas singulares en un valor genérico. En español, «su vida» mantiene la referencia natural sin forzar género innecesario. El pronombre «la» retoma «vida» de manera idiomática.
theological_decisions:
- issue: Sentido antropológico de ψυχή en el dicho de Jesús
  english_pob_reading: Render ψυχή as 'life' in the main text, with 'soul' in a footnote as an alternative
  chosen_spanish_reading: «vida» en el texto principal, con «alma» en nota
  alternative_spanish_readings:
  - alma
  - vida/ alma según contexto
  rationale: El contexto inmediato trata del discipulado, la pérdida de uno mismo y el contraste entre conservar y perder la vida por Jesús y el evangelio. «Vida» comunica mejor la paradoja sin estrechar ψυχή a una antropología parcial. La alternativa «alma» se conserva en nota porque el término griego sí puede abarcar ese sentido en otros contextos y porque la tradición cristiana la reconoce.
  doctrine_reference: Translation philosophy §3; §6
- issue: Referencia conjunta a Jesús y al evangelio en la motivación del sacrificio
  english_pob_reading: for my sake and for the gospel
  chosen_spanish_reading: por causa de mí y del evangelio
  alternative_spanish_readings:
  - por mi causa y por el evangelio
  - por mí y por el evangelio
  rationale: La preposición ἕνεκεν expresa causa o motivo, y el español «por causa de» deja visible ese valor sin sobrecargar la frase. La mención de Jesús y del evangelio queda coordinada como en el griego. Se evita una formulación excesivamente interpretativa que diluya el paralelo.
  doctrine_reference: Translation philosophy §2; §5
- issue: Alcance universal del dicho
  english_pob_reading: whoever ... whoever
  chosen_spanish_reading: todo el que ... todo el que
  alternative_spanish_readings:
  - quienquiera que ... quienquiera que
  - el que ... el que
  rationale: La forma española elegida conserva el carácter proverbial y universal de la sentencia, sin masculinizar innecesariamente ni introducir singularidad estilística extraña. También mantiene la repetición paralela del griego, importante para el efecto retórico.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: Se tuvo en cuenta la última revisión inglesa que simplificó «for my sake and for the sake of the gospel» a «for my sake and for the gospel». La versión española refleja esa economía con «por causa de mí y del evangelio», sin repetir innecesariamente la expresión causal dos veces.
  spanish_consistency_notes:
  - Se mantuvo «evangelio» como término técnico estable y no se reemplazó por «buena noticia» en el texto principal.
  - Se eligió «vida» para ψυχή en armonía con el auditable criterio inglés, pero se preservó la alternativa tradicional «alma» en nota.
  - La repetición de «todo el que ... todo el que» conserva el paralelismo del griego y la cadencia proverbial del dicho.
  - «La salvará» retoma naturalmente «vida» y evita introducir un complemento más explícito que el original no exige.
