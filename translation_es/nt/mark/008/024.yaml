    issue: «a los hombres» para τοὺς ἀνθρώπους
    rationale: ἄνθρωποι aquí significa seres humanos en general, no varones. En español actual y eclesial general, «las personas» o «la gente» comunica mejor el valor genérico sin pérdida.
  - severity: low
