base_translation:
  language: en
  yaml_path: translation/nt/mark/008/024.yaml
  text: And looking up[a], he said, “I see people, for I see them like trees[b], walking around.”
  footnotes:
  - marker: a
    text: Or, 'I see people; I see them like trees, walking.' The Greek syntax is compressed, and some translations attach 'walking' more directly to 'people' rather than to the comparison.
    reason: alternative_reading
  - marker: b
    text: The participle translated 'looking up' can also carry the sense 'regaining sight' in healing contexts.
    reason: lexical_alternative
