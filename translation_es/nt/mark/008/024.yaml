translation:
  language: es
  text: 'Y alzando la vista[a], dijo: «Veo a las personas, porque las veo como árboles[b], caminando».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Alzando la vista» también puede insinuar «recobrando la vista» en este contexto de sanidad gradual.
    reason: lexical_alternative
  - marker: b
    text: 'La sintaxis griega es comprimida; también puede entenderse: «Veo a las personas; las veo como árboles, caminando». Algunas traducciones relacionan «caminando» más directamente con «las personas» que con la comparación.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀναβλέψας
  english_pob_choice: looking up
  chosen_spanish: alzando la vista
  alternatives_spanish:
  - mirando hacia arriba
  - recobrando la vista
  lexicon: BDAG
  rationale: En este contexto de curación, ἀναβλέψας puede significar tanto ‘mirar hacia arriba’ como ‘recobrar la vista’. Opto por ‘alzando la vista’ para conservar la imagen de levantar los ojos sin cerrar el sentido de sanidad que sigue inmediatamente en el dicho del hombre.
- source_word: ἔλεγεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - decía
  - estaba diciendo
  lexicon: BDAG
  rationale: El imperfecto griego puede sugerir continuidad, pero en español una forma simple en discurso directo resulta natural y fiel al valor narrativo general.
- source_word: Βλέπω
  english_pob_choice: I see
  chosen_spanish: Veo
  alternatives_spanish:
  - Puedo ver
  - Distingo
  lexicon: BDAG
  rationale: ‘Veo’ reproduce de manera directa el presente de primera persona y la inmediatez del testimonio.
- source_word: τοὺς ἀνθρώπους
  english_pob_choice: people
  chosen_spanish: a los hombres
  alternatives_spanish:
  - a las personas
  - a la gente
  lexicon: BDAG
  rationale: Aunque ἄνθρωπος puede ser genérico, aquí la forma plural con artículo puede mantenerse como ‘los hombres’. En español, ‘personas’ suavizaría la referencia; ‘hombres’ preserva mejor el término de base, aunque se entiende genéricamente en este contexto.
- source_word: ὅτι
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: La cláusula griega introduce la explicación del modo de ver. ‘Porque’ comunica bien la relación causal/explanatoria en español, de modo natural y transparente.
- source_word: ὡς δένδρα
  english_pob_choice: like trees
  chosen_spanish: como árboles
  alternatives_spanish:
  - como árboles inmóviles
  - como si fueran árboles
  lexicon: BDAG
  rationale: ὡς marca comparación; ‘como árboles’ preserva la similitud sin añadir interpretaciones.
- source_word: ὁρῶ
  english_pob_choice: I see them
  chosen_spanish: los veo
  alternatives_spanish:
  - los percibo
  - los distingo
  lexicon: BDAG
  rationale: ὁρῶ refuerza la percepción visual en paralelo con βλέπω. En español, ‘los veo’ evita redundancia excesiva y mantiene la referencia a las personas vistas.
- source_word: περιπατοῦντας
  english_pob_choice: walking around
  chosen_spanish: que andan
  alternatives_spanish:
  - caminando
  - que caminan
  lexicon: BDAG
  rationale: El participio presente describe movimiento continuo. ‘Que andan’ funciona bien en español y expresa el rasgo dinámico sin sonar forzado. Se evita cargar el verso con un adverbio innecesario.
theological_decisions:
- issue: Sentido gradual de la sanidad visual
  english_pob_reading: The participle can also carry the sense 'regaining sight' in healing contexts, while the verse itself reports partial vision.
  chosen_spanish_reading: Alzando la vista[a]
  alternative_spanish_readings:
  - recobrando la vista
  - levantando la mirada
  rationale: 'La traducción conserva la ambigüedad de ἀναβλέψας: no explicita más de lo que el griego exige, pero deja visible el marco de curación gradual que continúa en el pasaje.'
  doctrine_reference: Marcos 8:22-26; sanidad progresiva en el relato
- issue: Construcción de comparación y percepción
  english_pob_reading: I see people, for I see them like trees, walking around.
  chosen_spanish_reading: Veo a los hombres, porque los veo[b] como árboles que andan.
  alternative_spanish_readings:
  - Veo a los hombres, pues los veo como árboles andando.
  - Veo a las personas, porque las veo como árboles que se mueven.
  rationale: 'La cláusula española preserva la tensión de la sintaxis comprimida: primero se nombran ‘los hombres’ y luego se describe cómo se perciben. ‘Que andan’ deja abierto si el rasgo de caminar califica directamente a las personas o a la comparación, como en el griego.'
  doctrine_reference: Marcos 8:24; nota sintáctica sobre la comparación
translation_notes:
  revision_awareness: Se tuvo en cuenta el ajuste del auditoría inglesa que prefirió ‘for’ en lugar de ‘because’ para ὅτι y reordenó la cláusula para acercarse más al griego. En español, se mantuvo una relación causal natural con ‘porque’, pero se preservó la comparación principal y la posibilidad sintáctica de que ‘que andan’ modifique de manera flexible a la visión completa.
  spanish_consistency_notes:
  - Se mantuvo ‘Veo’ para βλέπω y ‘veo’/‘los veo’ para ὁρῶ, conservando la repetición perceptiva del original.
  - Se evitó ‘Cristo’, ‘SEÑOR’ u otras sustituciones no presentes en el versículo.
  - ‘Hombres’ se usó como equivalente genérico de ἀνθρώπους en armonía con el registro bíblico, aunque ‘personas’ sería posible en otro contexto.
  - La puntuación en estilo de cita directa sigue el uso español con dos puntos y comillas angulares.
