translation:
  language: es
  text: 'En aquellos días, cuando de nuevo había una gran multitud[a] y no tenían qué comer, llamó a sus discípulos y les dice[b]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «había de nuevo una gran multitud». El griego usa un genitivo absoluto: «de nuevo, habiendo una gran multitud».'
    reason: alternative_reading
  - marker: b
    text: El griego dice «les dice»; Marcos con frecuencia usa el presente histórico, aunque muchas traducciones lo suavizan con el pasado «dijo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐν ἐκείναις ταῖς ἡμέραις
  english_pob_choice: In those days
  chosen_spanish: En aquellos días
  alternatives_spanish:
  - Durante aquellos días
  lexicon: BDAG
  rationale: Es una fórmula temporal narrativa natural en español y conserva el marco de tiempo sin precisar más de lo que dice el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  lexicon: BDAG
  rationale: Mantiene la idea de recurrencia de manera clara y fluida en español; 'de nuevo' es idiomático y sobrio.
- source_word: πολλοῦ ὄχλου ὄντος
  english_pob_choice: a large crowd was present
  chosen_spanish: había una gran multitud
  alternatives_spanish:
  - una gran multitud estaba presente
  - estaba presente una gran multitud
  lexicon: BDAG
  rationale: El absoluto genitivo expresa una circunstancia de trasfondo; en español, 'había' comunica de forma natural la presencia de la multitud sin perder el sentido de contexto circunstancial.
- source_word: καὶ μὴ ἐχόντων τί φάγωσιν
  english_pob_choice: and they had nothing to eat
  chosen_spanish: y no tenían qué comer
  alternatives_spanish:
  - y no tenían nada que comer
  - y no tenían nada para comer
  lexicon: BDAG
  rationale: La construcción griega indica falta de alimento; 'no tenían qué comer' es una equivalencia idiomática fiel y compacta en español.
- source_word: προσκαλεσάμενος
  english_pob_choice: he called ... to himself
  chosen_spanish: llamando a
  alternatives_spanish:
  - habiendo llamado a
  - convocando a
  lexicon: BDAG
  rationale: El participio medio sugiere una acción de llamar a sí; en español, 'llamando a' conserva la función verbal sin añadir un complemento no expresado en el texto griego.
- source_word: τοὺς μαθητάς
  english_pob_choice: his disciples
  chosen_spanish: sus discípulos
  alternatives_spanish:
  - los discípulos
  lexicon: BDAG
  rationale: Aunque el posesivo no está explícito, el referente narrativo es Jesús; 'sus discípulos' es claro y natural en español y coincide con la lectura contextual del POB en inglés.
- source_word: λέγει αὐτοῖς
  english_pob_choice: says to them
  chosen_spanish: les dice
  alternatives_spanish:
  - les dijo
  lexicon: BDAG
  rationale: Se preserva el presente histórico de Marcos, tal como lo hace el POB inglés, para mantener la vivacidad narrativa del griego.
theological_decisions:
- issue: Preservación del presente histórico en Marcos
  english_pob_reading: Retain present tense in 'says to them'
  chosen_spanish_reading: les dice
  alternative_spanish_readings:
  - les dijo
  rationale: No es una cuestión doctrinal, sino de representación del estilo narrativo de Marcos. El presente histórico refleja mejor el griego y evita suavizar el discurso a pasado.
  doctrine_reference: DOCTRINE.md Translation philosophy §5-6
translation_notes:
  revision_awareness: 'Se incorporó la corrección del pase de revisión en inglés: no se añadió ningún equivalente de «to himself», porque no está expresado en el griego. También se mantuvo el presente histórico en «dice», conforme al POB inglés y al estilo de Marcos.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» u otras convenciones de ocultamiento del nombre divino, porque este versículo no contiene referencias al nombre divino.
  - Se mantuvo «discípulos» y no «seguidores», por corresponder al término μαθητάς y al registro del texto.
  - «Multitud» se usó para ὄχλος, sin cargarlo con matices adicionales no presentes en el griego.
