translation:
  language: es
  text: Y les advirtió[a] que no dijeran a nadie acerca de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los reprendió» o «les ordenó con severidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπετίμησεν
  english_pob_choice: warned
  chosen_spanish: lo reprendió
  alternatives_spanish:
  - lo advirtió
  - le ordenó con severidad
  - lo amonestó
  lexicon: BDAG
  rationale: ἐπιτιμάω puede expresar reprensión fuerte o una orden severa. En español, «reprendió» conserva la fuerza directiva y la seriedad del acto sin volver la frase artificial. «Advirtió» suaviza demasiado; «le ordenó con severidad» es más explicativo que el griego mismo.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: lo
  alternatives_spanish:
  - les
  - a ellos
  lexicon: BDAG
  rationale: El objeto dativo plural refiere a los discípulos, pero en español la construcción con «reprender» normalmente pide un complemento directo de persona. Se usa «lo» porque el mandato recae sobre ellos como grupo ya identificado en el contexto, y el sentido queda natural sin añadir un sujeto explícito innecesario.
- source_word: ἵνα μηδενὶ λέγωσιν
  english_pob_choice: to tell no one
  chosen_spanish: para que no dijeran nada
  alternatives_spanish:
  - para no decir nada
  - para que no hablaran con nadie
  - para que no lo contaran a nadie
  lexicon: BDAG
  rationale: Tras un verbo de mandato, ἵνα + subjuntivo expresa contenido o propósito. «Para que no dijeran nada» reproduce esa fuerza con fluidez. «Contaran» requiere un objeto implícito más específico; «hablaran con nadie» cambia el matiz del griego.
- source_word: μηδενὶ
  english_pob_choice: no one
  chosen_spanish: nada
  alternatives_spanish:
  - a nadie
  - con nadie
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «a nadie», en español la negación con «no dijeran nada» comunica naturalmente la prohibición de hablar del asunto. La opción más idiomática y fiel al efecto discursivo es esta formulación breve; la alternativa «a nadie» queda implícita en el mandato negativo.
- source_word: περὶ αὐτοῦ
  english_pob_choice: about him
  chosen_spanish: acerca de él
  alternatives_spanish:
  - sobre él
  - de él
  - concerning him
  lexicon: BDAG
  rationale: περί con genitivo se traduce bien como «acerca de». «Acerca de él» mantiene el alcance referencial y evita un calco menos natural como «sobre él».
theological_decisions:
- issue: La fuerza de la prohibición de Jesús en el contexto de secreto mesiánico
  english_pob_reading: Render the command as a strong warning not to disclose his identity, without importing a broader theory into the translation.
  chosen_spanish_reading: La frase se vierte como una reprensión/mandato fuerte que prohíbe divulgarlo, sin resolver interpretativamente la razón de la reserva.
  alternative_spanish_readings:
  - Y les mandó estrictamente que no dijeran nada acerca de él.
  - Y los reprendió, diciéndoles que no lo contaran a nadie.
  rationale: 'El griego presenta una orden fuerte, pero no obliga a escoger entre «reprendió» y «mandó» como interpretación exclusiva. El español elegido conserva la tensión: hay severidad y prohibición, pero no se añade una teoría sobre la llamada reserva mesiánica.'
  doctrine_reference: Preservar la tensión narrativa sin sobreinterpretar el motivo de Jesús.
translation_notes:
  revision_awareness: 'El borrador sigue el pasaje y el audit trail inglés: mantiene la fuerza prohibitiva de ἐπετίμησεν, conserva la finalidad/prohibición de ἵνα μηδενὶ λέγωσιν y traduce περὶ αὐτοῦ con una expresión natural en español.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» y «Cristo», no pertinentes en este versículo.
  - Se prefiere «él» para αὐτοῦ por referencia inmediata a Jesús ya identificado en el contexto.
  - La nota al pie marca solo la alternativa lexical principal de ἐπετίμησεν, como en el inglés, sin añadir más variantes innecesarias.
