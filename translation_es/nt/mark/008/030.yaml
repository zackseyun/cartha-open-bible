revisions:
- from: Y lo reprendió[a] para que no dijeran nada acerca de él.
  to: Y les advirtió[a] que no dijeran a nadie acerca de él.
  rationale: Se corrige el referente plural de αὐτοῖς con «les», se alinea ἐπετίμησεν con la decisión principal auditada («advirtió»), y se restituye μηδενί como «a nadie» en vez de «nada». La frase revisada suena natural en español y conserva la fuerza prohibitiva sin sobreinterpretar el contexto teológico.
