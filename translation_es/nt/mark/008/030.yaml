review_pass:
  verdict: revise
  source_alignment_summary: El borrador no preserva con precisión varios elementos del griego ni la trayectoria auditada en inglés. ἐπετίμησεν aquí se entiende mejor como una advertencia/orden severa dirigida a los discípulos, no como «lo reprendió». αὐτοῖς es dativo plural («les»), pero el borrador usa singular «lo». μηδενί significa «a nadie», y el borrador lo desplaza a «nada», cambiando la sintaxis y el referente del negativo. περὶ αὐτοῦ sí queda bien reflejado como «acerca de él».
  spanish_quality_summary: 'El español del borrador suena extraño e incorrecto en concordancia pronominal: «Y lo reprendió... para que no dijeran...» mezcla singular con plural y desorienta al lector. Una formulación como «Y les advirtió[a] que no se lo dijeran a nadie acerca de él» sería torpe; lo natural y fiel es «Y les advirtió[a] que no le dijeran a nadie acerca de él», aunque aún más idiomático es «que no hablaran a nadie acerca de él». Para mantener cercanía con el audit trail inglés, «Y les advirtió[a] que no le dijeran a nadie acerca de él» no es ideal por el dativo ambiguo; mejor «Y les advirtió[a] que no dijeran a nadie acerca de él».'
  glossary_alignment: 'No hay términos de glosario mayor en juego, pero sí una desviación importante del criterio léxico documentado: el inglés POB eligió «warned», y en español «advirtió» o «les hizo una advertencia» se alinea mejor que «reprendió». La nota alternativa debe reflejar también «los reprendió» o «les ordenó severamente».'
  issues:
  - severity: high
    issue: Pronombre erróneo en «lo reprendió» para αὐτοῖς
    rationale: αὐτοῖς es dativo plural, refiriéndose a los discípulos; «lo» es singular y altera el referente.
  - severity: high
    issue: «reprendió» no sigue la decisión léxica principal auditada para ἐπετίμησεν
    rationale: En este contexto la fuerza es de advertencia/mandato severo para no divulgar; «reprendió» es posible como alternativa, pero no como mejor opción principal según el expediente.
  - severity: high
    issue: μηδενί fue traducido como «nada» en vez de «a nadie»
    rationale: El griego indica destinatario humano de la comunicación («a nadie»), no contenido indefinido («nada»).
  - severity: medium
    issue: La construcción resultante en español es poco natural y confusa
    rationale: La combinación «lo reprendió... para que no dijeran nada acerca de él» produce discordancia y dificulta la lectura.
  - severity: low
    issue: La nota alternativa usa singular «lo advirtió»/«le ordenó»
    rationale: 'Las alternativas deberían concordar con el plural de los discípulos: «les advirtió», «les ordenó con severidad», «los reprendió».'
  revised_spanish_text: Y les advirtió[a] que no dijeran a nadie acerca de él.
  revised_footnotes:
