revisions:
- from: Y si los despidiera[a] en ayunas a sus casas, desfallecerán en el camino; y algunos de ellos han venido de lejos.
  to: Si los despido hambrientos a sus casas, desfallecerán[a] en el camino; y algunos de ellos han venido de lejos.
  rationale: Se corrige el error principal de anclaje de la nota, moviéndola a 'desfallecerán[a]', que es donde corresponde según ἐκλυθήσονται y el audit trail inglés. También se ajusta 'en ayunas' a 'hambrientos' para reflejar mejor el sentido contextual de νήστεις como falta de comida, no ayuno ritual, y se mejora la naturalidad española con 'Si los despido' en lugar de 'Y si los despidiera'. No se requiere adjudicación adicional.
