review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: condición con ἐὰν, despedir a la multitud, su estado de falta de comida, el riesgo de desfallecer durante el trayecto, y la explicación de que algunos han venido desde lejos. Sin embargo, la nota al pie está mal anclada: la nota inglesa y la justificación léxica corresponden a ἐκλυθήσονται (''desfallecerán'' / ''se desmayarán''), no a ἀπολύσω (''despidiera'').'
  spanish_quality_summary: 'El español es claro, digno y ampliamente legible. ''A sus casas'', ''en el camino'' y ''han venido de lejos'' funcionan bien. ''En ayunas'' es posible, pero en español puede sugerir más fácilmente un ayuno intencional que el sentido práctico de ''hambrientos/sin comer''; aun así no es inaceptable. El problema principal es técnico y de fidelidad editorial: la nota debe ir sobre ''desfallecerán'', no sobre ''despidiera''. Además, es más natural en español omitir la conjunción inicial ''Y'' tras punto previo, y puede mejorarse la fluidez con ''si los despido''.'
  glossary_alignment: 'No hay términos del glosario de alto impacto en este versículo. Las decisiones léxicas son generalmente coherentes con el rastro inglés: ἀπολύσω = ''despedir'', εἰς οἶκον αὐτῶν = ''a sus casas'', ἐν τῇ ὁδῷ = ''en el camino'', ἥκασιν = ''han venido''. La excepción práctica es νήστεις: el inglés auditado eligió ''hungry'', y en español ''hambrientos'' o ''sin comer'' preserva mejor ese matiz no ritual que ''en ayunas''.'
  issues:
  - severity: high
    issue: La nota al pie está anclada a 'despidiera[a]' pero su contenido explica 'desfallecerán / se desmayarán'.
    rationale: Esto desajusta la evidencia fuente y el audit trail inglés, donde la alternativa léxica pertenece a ἐκλυθήσονται, no a ἀπολύσω. Debe corregirse para mantener trazabilidad y fidelidad editorial.
  - severity: medium
    issue: '''En ayunas'' puede sugerir ayuno deliberado más que simple hambre/falta de comida.'
    rationale: Aunque el racional español lo defiende, el audit trail inglés eligió 'hungry' precisamente para evitar sobretonos devocionales. 'Hambrientos' comunica mejor el sentido práctico del contexto.
  - severity: low
    issue: La apertura con 'Y si' suena menos natural en español corriente.
    rationale: καί al inicio puede representarse sin forzar una conjunción inicial después de puntuación previa. 'Si los despido...' mantiene el sentido y mejora la naturalidad.
  revised_spanish_text: Si los despido hambrientos a sus casas, desfallecerán[a] en el camino; y algunos de ellos han venido de lejos.
  revised_footnotes:
  - marker: a
    text: O «se desmayarán en el camino». El verbo griego puede indicar debilidad o agotamiento hasta el punto de desfallecer.
    reason: lexical_alternative
  revision_rationale: Se corrige el error principal de anclaje de la nota, moviéndola a 'desfallecerán[a]', que es donde corresponde según ἐκλυθήσονται y el audit trail inglés. También se ajusta 'en ayunas' a 'hambrientos' para reflejar mejor el sentido contextual de νήστεις como falta de comida, no ayuno ritual, y se mejora la naturalidad española con 'Si los despido' en lugar de 'Y si los despidiera'. No se requiere adjudicación adicional.
