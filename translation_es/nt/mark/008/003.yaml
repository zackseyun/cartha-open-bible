translation:
  language: es
  text: Si los despido hambrientos a sus casas, desfallecerán[a] en el camino; y algunos de ellos han venido de lejos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se desmayarán en el camino». El verbo griego puede indicar debilidad o agotamiento hasta el punto de desfallecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπολύσω
  english_pob_choice: send ... away
  chosen_spanish: despidiera
  alternatives_spanish:
  - los enviara
  - los dejara ir
  - los despidiera y los mandara
  lexicon: BDAG
  rationale: En este contexto de despedir a la multitud, «despedir» comunica bien la acción de dejarlos ir sin introducir matices ajenos como liberación legal o divorcio. El subjuntivo imperfecto encaja con la condición de la frase griega.
- source_word: νήστεις
  english_pob_choice: hungry
  chosen_spanish: en ayunas
  alternatives_spanish:
  - hambrientos
  - sin comer
  - con hambre
  lexicon: BDAG
  rationale: El griego describe su estado de no haber comido. «En ayunas» conserva con precisión ese valor factual sin convertirlo en un matiz devocional de ayuno ritual; en español bíblico suena natural y digno.
- source_word: εἰς οἶκον αὐτῶν
  english_pob_choice: to their homes
  chosen_spanish: a sus casas
  alternatives_spanish:
  - a sus hogares
  - a sus viviendas
  lexicon: BDAG
  rationale: El plural distribuye la idea de que cada uno vuelve a su propia casa. «A sus casas» es directo y fiel; «hogares» sería posible, pero un poco más interpretativo.
- source_word: ἐκλυθήσονται
  english_pob_choice: they will collapse
  chosen_spanish: desfallecerán
  alternatives_spanish:
  - caerán rendidos
  - se agotarán
  - se desmayarán
  lexicon: BDAG
  rationale: El verbo puede indicar debilidad o agotamiento severo. «Desfallecerán» mantiene la idea de flaquear por falta de fuerzas sin añadir una imagen demasiado física como «caerán» ni suavizarlo demasiado con «se agotarán».
- source_word: ἐν τῇ ὁδῷ
  english_pob_choice: on the way
  chosen_spanish: en el camino
  alternatives_spanish:
  - de camino
  - por el camino
  lexicon: BDAG
  rationale: «En el camino» es el equivalente natural en español para un contexto de viaje y preserva la escena sin forzar una expresión idiomática excesivamente local.
- source_word: καί τινες αὐτῶν
  english_pob_choice: and some of them
  chosen_spanish: y algunos de ellos
  alternatives_spanish:
  - y unos de ellos
  - y ciertos de ellos
  lexicon: BDAG
  rationale: La coordinación simple con «y» reproduce καί; «algunos de ellos» expresa con claridad el subconjunto dentro de la multitud.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from far away
  chosen_spanish: de lejos
  alternatives_spanish:
  - desde lejos
  - de muy lejos
  lexicon: BDAG
  rationale: La expresión griega señala distancia. «De lejos» es breve, natural y fiel; «desde lejos» también sería posible, pero «de lejos» encaja mejor con el ritmo de la frase.
- source_word: ἥκασιν
  english_pob_choice: have come
  chosen_spanish: han venido
  alternatives_spanish:
  - han llegado
  - vinieron
  lexicon: BDAG
  rationale: El perfecto enfatiza el estado presente de haber llegado. «Han venido» conserva ese aspecto mejor que un pretérito simple, y resulta más directo que «han llegado» en este contexto narrativo.
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste final del audit trail inglés: coloca el estado de hambre antes del destino («en ayunas a sus casas»), mantiene la coordinación simple con «y», y conserva para ἐκλυθήσονται una solución fuerte pero natural en español.'
  spanish_consistency_notes:
  - Se usa «desfallecerán» para mantener la fuerza semántica de ἐκλυθήσονται sin caer en un calco áspero.
  - «Y si» conserva la apertura condicional de καὶ ἐὰν con un español bíblico claro.
  - No se introduce terminología eclesiástica ajena al pasaje; la escena permanece narrativa y concreta.
  - «Han venido de lejos» respeta el perfecto griego y sugiere que siguen estando presentes como los que realizaron ese trayecto.
