translation:
  language: es
  text: 'Y él seguía advirtiéndoles, diciendo: «Estén atentos[b]; cuídense de la levadura[a] de los fariseos y de la levadura de Herodes».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fermento». Se conserva «levadura» para mantener la metáfora bíblica de una influencia que se difunde.
    reason: lexical_alternative
  - marker: b
    text: Es decir, estén alerta ante la influencia corruptora asociada con los fariseos y con Herodes; compárese Mt 16:6, 12 y Lc 12:1.
    reason: cross_reference
lexical_decisions:
- source_word: διεστέλλετο
  english_pob_choice: he kept instructing
  chosen_spanish: seguía advirtiéndoles
  alternatives_spanish:
  - les advertía
  - les insistía
  - les instruía con insistencia
  lexicon: BDAG
  rationale: El imperfecto indica acción continuada o reiterada en el pasado. En este contexto, Jesús no solo emite una orden aislada, sino una advertencia insistente; en español, «seguía advirtiéndoles» conserva bien ese valor durativo y la fuerza de cautela sin sonar forzado.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce el contenido de la exhortación. «Diciendo» mantiene la estructura del griego de forma natural en español.
- source_word: Ὁρᾶτε
  english_pob_choice: Watch out
  chosen_spanish: Mirad
  alternatives_spanish:
  - Estad atentos
  - Tened cuidado
  - Mirad bien
  lexicon: BDAG
  rationale: Como imperativo de advertencia, no es mera percepción visual. «Mirad» preserva el tono breve e imperativo del original y combina bien con el segundo mandato sin añadir interpretación.
- source_word: βλέπετε
  english_pob_choice: beware
  chosen_spanish: guardaos
  alternatives_spanish:
  - estad en guardia contra
  - cuidaos de
  - evitad
  lexicon: BDAG
  rationale: El segundo imperativo refuerza el primero y expresa alerta frente a un peligro. «Guardaos de» es una forma natural en español para advertir contra una influencia dañina y conserva la relación con la preposición ἀπό.
- source_word: ἀπὸ
  english_pob_choice: of
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - contra
  lexicon: BDAG
  rationale: Con verbos de advertencia en español, «guardarse de» corresponde de manera idiomática al valor de separación o alejamiento que tiene ἀπό en este contexto.
- source_word: ζύμης
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - leudado
  - fermento
  lexicon: BDAG
  rationale: En español, «levadura» comunica el término base y mantiene la metáfora bíblica de una influencia que se difunde. Aunque «levadura» puede evocar el agente físico más que la carga metafórica, el contexto y la nota preservan esa imagen sin resolverla indebidamente.
- source_word: Φαρισαίων
  english_pob_choice: the Pharisees
  chosen_spanish: los fariseos
  alternatives_spanish:
  - fariseos
  lexicon: BDAG
  rationale: 'Nombre grupal estándar; el artículo definido reproduce adecuadamente el genitivo asociativo del griego: la levadura asociada con ese grupo.'
- source_word: Ἡρῴδου
  english_pob_choice: Herod
  chosen_spanish: Herodes
  alternatives_spanish:
  - de Herodes
  lexicon: BDAG
  rationale: El texto nombra a Herodes directamente y el español requiere su forma usual. El genitivo se conserva con «de Herodes» para mantener el paralelismo con «de los fariseos».
theological_decisions:
- issue: Sentido de la metáfora de la levadura
  english_pob_reading: Retain the metaphor as 'leaven' without explicating it in the main text.
  chosen_spanish_reading: Mantener la metáfora de la levadura sin explicarla en el cuerpo principal.
  alternative_spanish_readings:
  - la enseñanza de los fariseos y de Herodes
  - la hipocresía de los fariseos y de Herodes
  - la influencia corruptora de los fariseos y de Herodes
  rationale: El versículo no define explícitamente el alcance exacto de la metáfora. Mantener «levadura» preserva la tensión interpretativa y deja que los pasajes paralelos orienten la lectura sin resolverla de antemano.
  doctrine_reference: Preservar la tensión interpretativa en lugar de cerrarla sin base textual.
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés y no requiere revisiones sustantivas; se mantuvo la metáfora central y se ajustó la advertencia al español idiomático sin explicitar en exceso su sentido.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde al nombre divino; aquí no aplica.
  - Se mantuvo «levadura» y no «yeast»/«fermento» para conservar el valor metafórico bíblico.
  - Se optó por «fariseos» y «Herodes» como nombres propios estándar en español.
  - La doble advertencia se reprodujo con dos imperativos distintos pero complementarios para respetar la fuerza retórica del griego.
