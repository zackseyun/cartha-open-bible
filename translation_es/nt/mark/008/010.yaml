translation:
  language: es
  text: Y enseguida[a], subiendo a la barca con sus discípulos, fue a la región de Dalmanuta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «el distrito de Dalmanuta». El giro griego usa literalmente una expresión plural: «las partes/regiones de Dalmanuta».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: enseguida
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Conserva la rapidez narrativa característica de Marcos y suena natural en español contemporáneo; evita un calco demasiado rígido como «inmediatamente» cuando «enseguida» transmite igual urgencia.
- source_word: ἐμβὰς
  english_pob_choice: getting into
  chosen_spanish: entrando en
  alternatives_spanish:
  - subiendo a
  - metiéndose en
  lexicon: BDAG
  rationale: El participio aoristo antecede al verbo principal y expresa la acción previa de subir/entrar en la embarcación. «Entrando en» mantiene el valor participial de manera clara y fluida en español.
- source_word: πλοῖον
  english_pob_choice: boat
  chosen_spanish: barca
  alternatives_spanish:
  - barco
  - embarcación
  lexicon: BDAG
  rationale: En el contexto del mar de Galilea, «barca» comunica mejor el tamaño y uso del vehículo que «barco»; es además una forma natural y bíblicamente reconocible en español.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: con sus discípulos
  alternatives_spanish:
  - junto con sus discípulos
  lexicon: BDAG
  rationale: Reproduce el acompañamiento expresado por μετά con genitivo. «Con sus discípulos» es la opción más directa y idiomática en español.
- source_word: ἦλθεν
  english_pob_choice: he went
  chosen_spanish: fue
  alternatives_spanish:
  - vino
  - llegó
  lexicon: BDAG
  rationale: En un movimiento narrativo hacia un destino, «fue» es el equivalente natural de «he went» y preserva el avance de la escena sin añadir matices de llegada que el griego no enfatiza aquí.
- source_word: τὰ μέρη
  english_pob_choice: the region
  chosen_spanish: la región
  alternatives_spanish:
  - el distrito
  - las partes
  lexicon: BDAG
  rationale: El plural griego tiene valor idiomático para designar una zona geográfica. «La región» comunica bien ese sentido y evita la literalidad extraña de «las partes».
- source_word: Δαλμανουθά
  english_pob_choice: Dalmanutha
  chosen_spanish: Dalmanuta
  alternatives_spanish:
  - Dalmanutha
  lexicon: BDAG
  rationale: Se translitera el topónimo al español como nombre propio; «Dalmanuta» mantiene la referencia al lugar con ortografía más natural para el lector hispanohablante, sin perder la identidad del nombre.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la forma griega SBLGNT y con la solución inglesa auditada. La única zona con relieve traductológico es τὰ μέρη Δαλμανουθά, donde el plural griego puede reflejarse como «la región» en el texto principal y explicarse en nota como «el distrito» / «las partes/regiones»; también se ajustó el topónimo a la forma española natural «Dalmanuta».
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Mesías según las pautas generales, aunque este versículo no las contiene.
  - Se eligió «barca» por consistencia con el registro evangélico en español y para evitar la sobreextensión semántica de «barco».
  - La nota [a] conserva la tensión entre la expresión plural literal del griego y la naturalidad geográfica en español.
