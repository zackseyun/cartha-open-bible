translation:
  language: es
  text: Siento compasión por la multitud, porque ya llevan tres días conmigo y no tienen nada que comer.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Σπλαγχνίζομαι
  english_pob_choice: I have compassion
  chosen_spanish: Siento compasión
  alternatives_spanish:
  - Tengo compasión
  - Me conmuevo de compasión
  - Se me conmueven las entrañas
  lexicon: BDAG
  rationale: El verbo expresa una compasión profunda y activa. En español, «siento compasión» comunica de forma natural la emoción y la disposición interior sin forzar un calco. «Tengo compasión» también sería posible, pero suena algo más abstracto; «se me conmueven las entrañas» es más vívido, pero demasiado marcado y menos adecuado para un registro público moderno.
- source_word: ἐπὶ τὸν ὄχλον
  english_pob_choice: on the crowd
  chosen_spanish: por la multitud
  alternatives_spanish:
  - sobre la multitud
  - para la multitud
  - hacia la multitud
  lexicon: BDAG
  rationale: Con este verbo, la preposición marca el objeto de la compasión. En español, «por la multitud» expresa mejor el matiz relacional y causal de la compasión que un calco como «sobre». Elegí «multitud» porque conserva el sentido colectivo de ὄχλος; «gente» sería más general y menos preciso.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya para entonces
  lexicon: BDAG
  rationale: «Ya» reproduce el valor aspectual de que el tiempo se ha cumplido. Es la forma más natural en español y conserva la fuerza de ἤδη.
- source_word: ἡμέραι τρεῖς
  english_pob_choice: for three days
  chosen_spanish: tres días
  alternatives_spanish:
  - por tres días
  - durante tres días
  lexicon: BDAG
  rationale: La expresión de duración en español se integra naturalmente con «llevan tres días». No hace falta añadir una preposición explícita si el verbo ya la expresa. «Durante tres días» también sería claro, pero menos directo en esta construcción.
- source_word: προσμένουσίν μοι
  english_pob_choice: have already remained with me
  chosen_spanish: llevan ... conmigo
  alternatives_spanish:
  - han permanecido conmigo
  - han estado conmigo
  - continúan conmigo
  lexicon: BDAG
  rationale: προσμένω significa permanecer, quedarse o seguir con alguien. En español, «llevan tres días conmigo» transmite con naturalidad la permanencia continuada y la duración del período. «Han permanecido conmigo» es más formal y exacto, pero menos fluido; «han estado conmigo» es posible, aunque algo menos específico respecto a la idea de permanecer.
- source_word: μοι
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - a mi lado
  - junto a mí
  lexicon: BDAG
  rationale: El dativo con προσμένω es relacional; «conmigo» es la forma natural y precisa en español.
- source_word: οὐκ ἔχουσιν τί φάγωσιν
  english_pob_choice: have nothing to eat
  chosen_spanish: no tienen nada que comer
  alternatives_spanish:
  - no tienen nada para comer
  - no tienen qué comer
  - no tienen nada que puedan comer
  lexicon: BDAG
  rationale: La construcción indica falta de alimento para comer. «No tienen nada que comer» es idiomático, claro y fiel; preserva la negación total sin añadir explicaciones.
- source_word: φάγωσιν
  english_pob_choice: to eat
  chosen_spanish: que comer
  alternatives_spanish:
  - para comer
  - para que coman
  lexicon: BDAG
  rationale: El aoristo subjuntivo tras τί funciona idiomáticamente como una idea de finalidad o contenido en torno a comer. En español, «que comer» integra esa fuerza de manera natural dentro de la expresión fija «no tienen nada que comer».
translation_notes:
  revision_awareness: 'La redacción sigue el sentido confirmado por la versión inglesa auditada y por el griego: compasión de Jesús ante la multitud después de tres días de permanencia continua, con la duración expresada de forma natural en español. No se introducen notas textuales ni variantes porque el testimonio fuente no presenta tensiones relevantes en este versículo.'
  spanish_consistency_notes:
  - Se mantuvo «multitud» para ὄχλος, en coherencia con un registro bíblico contemporáneo y consistente.
  - 'Se evitó «tengo compasión» por preferirse en español una formulación más natural con sujeto experimentante: «siento compasión».'
  - La duración se integró con el verbo «llevan», que en español expresa mejor el matiz de permanencia continuada que una traducción más literal de la estructura griega.
