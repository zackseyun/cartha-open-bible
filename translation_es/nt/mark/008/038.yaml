translation:
  language: es
  text: Porque quien se avergüence de mí y de mis palabras en esta generación adúltera y pecadora[a], también el Hijo del Hombre se avergonzará de él cuando venga en la gloria de su Padre con los santos ángeles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «infiel y pecadora». Se conserva «adúltera» en el texto principal porque el griego usa la metáfora profética concreta del adulterio para la infidelidad de pacto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπαισχυνθῇ / ἐπαισχυνθήσεται
  english_pob_choice: is ashamed of / will also be ashamed of
  chosen_spanish: se avergüence de / se avergonzará de
  alternatives_spanish:
  - se avergüence de / se avergonzará de él
  - sienta vergüenza de / sentirá vergüenza de
  - desconozca / desconocerá
  lexicon: BDAG
  rationale: La forma española más directa y idiomática para el verbo griego es «avergonzarse de». Mantiene el paralelismo recíproco entre la reacción humana presente y la respuesta futura del Hijo del Hombre. «Desconocer» sería demasiado interpretativo; «sentir vergüenza» es posible, pero menos natural aquí.
- source_word: λόγους
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - mensajes
  - dichos
  lexicon: BDAG
  rationale: El plural griego se conserva mejor con «palabras», que mantiene el énfasis verbal y personal del texto. «Mensajes» suaviza demasiado el plural; «dichos» resulta más estrecho y menos natural en esta advertencia.
- source_word: γενεᾷ
  english_pob_choice: generation
  chosen_spanish: generación
  alternatives_spanish:
  - época
  - gente
  lexicon: BDAG
  rationale: «Generación» reproduce bien el alcance moral y social del término en este contexto. «Época» desplaza el foco hacia el tiempo; «gente» pierde la cualidad colectiva histórica del pasaje.
- source_word: μοιχαλίδι
  english_pob_choice: adulterous
  chosen_spanish: adúltera
  alternatives_spanish:
  - infiel
  - adúltera e infiel
  lexicon: BDAG
  rationale: Se conserva el metáforo profético concreto del griego. «Adúltera» es más fiel al término y preserva la resonancia bíblica de infidelidad de pacto; «infiel» explicita la implicación, pero atenúa la imagen.
- source_word: ἁμαρτωλῷ
  english_pob_choice: sinful
  chosen_spanish: pecadora
  alternatives_spanish:
  - pecaminosa
  - malvada
  lexicon: BDAG
  rationale: «Pecadora» corresponde de manera directa al adjetivo griego y se acopla naturalmente con «adúltera». «Pecaminosa» suena más abstracto; «malvada» añade intensidad no exigida por el término.
- source_word: ὁ υἱὸς τοῦ ἀνθρώπου
  english_pob_choice: the Son of Man
  chosen_spanish: el Hijo del Hombre
  alternatives_spanish:
  - el Hijo del ser humano
  - yo
  lexicon: BDAG
  rationale: Se conserva el título cristológico fijo y su resonancia daniélica. Traducirlo como «yo» borraría el título; «el Hijo del ser humano» no es idiomático en español y pierde la forma tradicional del título bíblico.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - majestad
  lexicon: BDAG
  rationale: «Gloria» es la equivalencia bíblica natural en español y preserva la carga teológica del término. «Esplendor» y «majestad» son posibles, pero menos consistentes con el uso bíblico amplio.
- source_word: μετὰ τῶν ἀγγέλων τῶν ἁγίων
  english_pob_choice: with the holy angels
  chosen_spanish: con los santos ángeles
  alternatives_spanish:
  - con los ángeles santos
  - con los ángeles, los santos
  lexicon: BDAG
  rationale: La construcción atributiva griega se vierte de forma natural como «los santos ángeles». «Santos ángeles» respeta el orden normal del español y no añade un posesivo inexistente en el griego.
- source_word: ὃς γὰρ ἐὰν
  english_pob_choice: For whoever
  chosen_spanish: Porque el que
  alternatives_spanish:
  - Porque quien
  - Pues el que
  lexicon: BDAG
  rationale: La construcción general condicional se expresa con naturalidad como «Porque el que». Mantiene el valor explicativo de γάρ y la genericidad de ὃς ἐάν sin sobrecargar la frase.
- source_word: ἐν τῇ γενεᾷ ταύτῃ
  english_pob_choice: in this generation
  chosen_spanish: en esta generación
  alternatives_spanish:
  - entre esta generación
  - en esta época
  lexicon: BDAG
  rationale: «En esta generación» reproduce de manera directa la relación preposicional y el sentido socio-moral del contexto. «Entre» sería posible, pero menos exacto; «época» desplaza el matiz de colectivo humano.
theological_decisions:
- issue: Metáfora de «adúltera»
  english_pob_reading: Retain 'adulterous' in the main text as a prophetic metaphor for spiritual and moral unfaithfulness.
  chosen_spanish_reading: Conservar «adúltera» en el texto principal como metáfora profética de infidelidad moral y de pacto.
  alternative_spanish_readings:
  - «infiel» para explicitar la metáfora
  - «adúltera e infiel» para combinar imagen y explicación
  rationale: El griego usa el término concreto μοιχαλίδι, que evoca el lenguaje profético bíblico sobre la infidelidad de pacto. Mantener la imagen evita borrar la tensión metafórica y respeta la primacía del texto fuente.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; never paraphrase beyond what the source warrants.'
- issue: Referencia de «el Hijo del Hombre»
  english_pob_reading: Keep the self-referential messianic title 'the Son of Man' rather than substituting 'I' or 'the Messiah'.
  chosen_spanish_reading: Conservar «el Hijo del Hombre» como título mesiánico y escatológico.
  alternative_spanish_readings:
  - «yo»
  - «el Mesías»
  rationale: El griego presenta un título distinto con peso teológico propio. Sustituirlo por un pronombre o por otro título reduciría su densidad y su resonancia bíblica.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; Translation philosophy: translate titles to preserve meaning where possible, while preserving theological tension rather than resolving it.'
- issue: Pronombre masculino singular αὐτόν
  english_pob_reading: Render as 'him'
  chosen_spanish_reading: Renderizarlo como «él»
  alternative_spanish_readings:
  - «lo»
  - «a esa persona»
  rationale: El singular masculino del griego se refleja con «él» para mantener la concordancia gramatical y no neutralizar el valor singular representativo del texto.
  doctrine_reference: 'Translation philosophy: gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última revisión inglesa, que no requirió cambios, y conserva sus decisiones principales: «ashamed of» como «se avergüence de / se avergonzará de», «adulterous» en sentido metafórico, «the Son of Man» como título fijo y «with the holy angels» sin posesivo añadido. No se detectaron revisiones posteriores que alteren el criterio de traducción.'
  spanish_consistency_notes:
  - Se mantiene «Hijo del Hombre» como título fijo y no se sustituye por una forma explicativa.
  - Se conserva la doble cualidad moral «adúltera y pecadora» para reflejar el paralelismo griego.
  - «Santos ángeles» evita el posesivo no presente en el original y suena natural en español.
  - La puntuación busca reproducir la estructura condicional y la segunda cláusula con claridad en español contemporáneo.
