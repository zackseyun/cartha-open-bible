translation:
  language: es
  text: Entonces, otra vez le puso las manos sobre los ojos[a], y vio claramente y fue restaurado[b], y veía todo claramente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos tienen una redacción reflejada en traducciones como: «y vio claramente y fue restaurado, y veía todo claramente».'
    reason: textual_variant
  - marker: b
    text: O «comenzó a ver todo claramente»; la cláusula final combina un verbo imperfecto con un adverbio de visión clara y distinta.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα πάλιν
  english_pob_choice: Then again
  chosen_spanish: Entonces, otra vez
  alternatives_spanish:
  - Luego, otra vez
  - Después, otra vez
  lexicon: BDAG
  rationale: εἶτα marca secuencia temporal y πάλιν añade repetición. «Entonces, otra vez» conserva ambos valores sin sonar demasiado literal en español.
- source_word: ἐπέθηκεν τὰς χεῖρας ἐπὶ τοὺς ὀφθαλμοὺς αὐτοῦ
  english_pob_choice: he laid his hands on his eyes
  chosen_spanish: le puso las manos sobre los ojos
  alternatives_spanish:
  - le colocó las manos sobre los ojos
  - le impuso las manos sobre los ojos
  lexicon: BDAG
  rationale: El griego describe el gesto físico de poner las manos sobre los ojos. «Puso las manos» conserva la acción concreta; «impuso» sería comprensible, pero puede sonar más técnico o litúrgico que el texto griego.
- source_word: διέβλεψεν
  english_pob_choice: he looked intently
  chosen_spanish: miró fijamente
  alternatives_spanish:
  - vio claramente
  - levantó la vista y vio
  lexicon: BDAG
  rationale: διεβλέψεν puede expresar visión clara o mirar con atención. «Miró fijamente» sigue la revisión del inglés POB y evita forzar «vio claramente» antes de la cláusula final.
- source_word: ἀπεκατέστη
  english_pob_choice: was restored
  chosen_spanish: fue restaurado
  alternatives_spanish:
  - quedó restaurado
  - fue sanado
  lexicon: BDAG
  rationale: ἀποκαθίστημι expresa ser devuelto a un estado previo o correcto. «Fue restaurado» mantiene ese sentido y no reduce el verbo a una simple sanidad física.
- source_word: ἐνέβλεπεν τηλαυγῶς ἅπαντα
  english_pob_choice: he began to see everything clearly
  chosen_spanish: comenzó a ver todo claramente
  alternatives_spanish:
  - empezó a ver todo claramente
  - veía todo claramente
  lexicon: BDAG
  rationale: El imperfecto ἐνέβλεπεν sugiere acción/visión en curso, y τηλαυγῶς aporta claridad nítida. «Comenzó a ver todo claramente» refleja ese inicio/resultante sin borrar el matiz progresivo.
theological_decisions:
- issue: Curación en dos etapas y progresión narrativa
  english_pob_reading: The translation preserves the sequential, progressive nature of the healing without smoothing it into a single instantaneous event.
  chosen_spanish_reading: La traducción conserva la secuencia y el carácter progresivo de la curación sin convertirla en un solo acto instantáneo.
  alternative_spanish_readings:
  - La traducción presenta la curación como un evento completado de una sola vez.
  - La traducción suaviza la progresión verbal para hacerla más homogénea.
  rationale: El griego encadena verbos en secuencia y usa un imperfecto final, lo que sugiere un proceso observable. Mantener esa progresión respeta la tensión narrativa y no la resuelve artificialmente.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La versión final en español sigue la última revisión del inglés POB en el punto clave de la secuencia verbal: διέβλεψεν se refleja como una acción atenta o intensa, ἀπεκατέστη como restauración, y ἐνέβλεπεν τηλαυγῶς ἅπαντα como visión clara en desarrollo. Se evitó una traducción que aplaste la progresión en una sola visión instantánea.'
  spanish_consistency_notes:
  - Se mantuvo «restaurado» para ἀπεκατέστη, coherente con el valor de restablecimiento del verbo.
  - Se eligió «comenzó a ver» para respetar el imperfecto ἐνέβλεπεν y su sentido progresivo.
  - «Todo» traduce ἅπαντα de manera natural y completa, sin añadir elementos no presentes en el griego.
