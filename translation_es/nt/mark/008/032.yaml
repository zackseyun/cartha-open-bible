revisions:
- from: Y hablaba la palabra[a] abiertamente. Y Pedro, tomándolo aparte, comenzó a reprenderlo.
  to: Y decía esta palabra[a] abiertamente. Y Pedro, tomándolo aparte, comenzó a reprenderlo.
  rationale: Se reemplaza «hablaba la palabra» por «decía esta palabra» para lograr un español natural y ampliamente legible, mientras se conserva la referencia discursiva de τὸν λόγον mejor que con «el mensaje» o una paráfrasis mayor. Se mantiene «abiertamente» y el resto de la redacción por su buena fidelidad al griego y al razonamiento léxico documentado.
