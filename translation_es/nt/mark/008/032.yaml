translation:
  language: es
  text: Y decía esta palabra[a] abiertamente. Y Pedro, tomándolo aparte, comenzó a reprenderlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «claramente» o «con franqueza». El término griego expresa habla franca y sin ocultamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησίᾳ
  english_pob_choice: openly
  chosen_spanish: abiertamente
  alternatives_spanish:
  - claramente
  - con franqueza
  - valientemente
  lexicon: BDAG
  rationale: παρρησίᾳ expresa apertura, franqueza y ausencia de ocultamiento. «Abiertamente» es natural en español y conserva la idea de hablar sin reserva; «claramente» podría sugerir solo inteligibilidad, y «valientemente» desplazaría el matiz hacia el coraje.
- source_word: τὸν λόγον
  english_pob_choice: the word
  chosen_spanish: la palabra
  alternatives_spanish:
  - el mensaje
  - el asunto
  - esta palabra
  lexicon: BDAG
  rationale: La expresión apunta al contenido de lo que Jesús venía diciendo. «La palabra» mantiene el vínculo discursivo con el griego y suena natural en español bíblico; «el mensaje» es más explícito, pero menos cercano a la formulación del texto.
- source_word: ἐλάλει
  english_pob_choice: was speaking
  chosen_spanish: hablaba
  alternatives_spanish:
  - estaba hablando
  - dijo
  - seguía hablando
  lexicon: BDAG
  rationale: El imperfecto presenta una acción en desarrollo. En español, «hablaba» comunica bien ese aspecto sin cargarlo innecesariamente; «estaba hablando» sería más analítico, y «dijo» perdería el matiz durativo.
- source_word: προσλαβόμενος
  english_pob_choice: took him aside
  chosen_spanish: tomándolo aparte
  alternatives_spanish:
  - llevándolo aparte
  - tomándolo a un lado
  - aparte de él
  lexicon: BDAG
  rationale: El participio sugiere una acción de tomar consigo o retirar a alguien a un ámbito privado para hablarle. «Tomándolo aparte» refleja ese valor contextual de manera idiomática en español. «Tomándolo a un lado» también sería posible, pero suena menos sobrio en este registro.
- source_word: ἤρξατο ἐπιτιμᾶν
  english_pob_choice: began to rebuke
  chosen_spanish: comenzó a reprenderlo
  alternatives_spanish:
  - empezó a reprenderlo
  - se puso a reprenderlo
  - comenzó a corregirlo
  lexicon: BDAG
  rationale: La construcción con ἄρχομαι + infinitivo pide una traducción con «comenzó a…». ἐπιτιμᾶν denota reprensión fuerte; «reprenderlo» conserva esa fuerza. «Corregirlo» suavizaría demasiado el tono.
theological_decisions:
- issue: Fuerza de παρρησίᾳ en la predicción de la pasión
  english_pob_reading: Rendered as 'openly' to emphasize that Jesus stated this plainly and without concealment.
  chosen_spanish_reading: «abiertamente» para subrayar que Jesús lo decía sin ocultarlo ni rodeos.
  alternative_spanish_readings:
  - claramente
  - con franqueza
  - valientemente
  rationale: 'La opción mantiene el énfasis narrativo en la claridad del anuncio de Jesús sin introducir un matiz extra como valentía heroica. En este versículo, la tensión no es doctrinal sino de estilo y énfasis: la predicción fue directa, y la reacción de Pedro se entiende mejor así.'
  doctrine_reference: 'Principio de traducción del POB: preservar el sentido llano del texto fuente y su contraste narrativo.'
translation_notes:
  revision_awareness: Se revisó el tono para que fuera publicable en español neutral y se conservó el paralelismo de dos oraciones breves del griego. No se detectaron revisiones previas que exigieran ajustes adicionales.
  spanish_consistency_notes:
  - Se prefirió «la palabra» en concordancia con la decisión inglesa del POB y para mantener el vínculo formal con λόγος.
  - Se evitó «SEÑOR» u otra sustitución teológica, porque el texto no contiene el nombre divino ni un título equivalente.
  - «Reprenderlo» conserva el valor fuerte de ἐπιτιμάω mejor que un verbo más suave como «corregirlo».
