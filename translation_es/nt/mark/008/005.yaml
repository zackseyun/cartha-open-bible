review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido básico del griego: Jesús pregunta cuántos panes tienen y ellos responden «siete». Conserva bien la secuencia narrativa y la brevedad de la respuesta. Sin embargo, la forma verbal de la pregunta en español no corresponde bien a la segunda persona plural del griego, porque «¿Cuántos panes tienen?» después de «les preguntó» puede leerse como tercera persona sobre un grupo ajeno. Debe ajustarse a una forma directa de segunda persona más natural en español.'
  spanish_quality_summary: El español es claro y legible, pero la pregunta «¿Cuántos panes tienen?» suena menos natural en discurso directo si no se explicita «ustedes» o se usa una forma verbal que marque claramente al interlocutor. También «Ellos dijeron» es comprensible, pero «Ellos» es algo innecesario; «Ellos dijeron» no es incorrecto. La reparación principal es en la pregunta.
  glossary_alignment: No hay términos del glosario doctrinal principal en este versículo. «Panes» para ἄρτους está bien y refleja el contexto contable mejor que una paráfrasis. No hay conflictos con terminología de Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La pregunta en español usa «tienen», que puede sonar como tercera persona en vez de segunda persona plural dirigida a los discípulos.
    rationale: 'El griego ἔχετε es segunda persona plural: «ustedes tienen». En español latinoamericano neutral, «¿Cuántos panes tienen ustedes?» o más naturalmente «¿Cuántos panes tienen?» puede funcionar por contexto, pero tras «les preguntó» la ambigüedad aumenta. «¿Cuántos panes tienen ustedes?» asegura fidelidad y claridad.'
  - severity: low
    issue: «Ellos dijeron» es un poco redundante en español narrativo.
    rationale: El griego permite el sujeto explícito; en español puede mantenerse, pero «ellos» no aporta mucho. Aun así, no es error serio y puede conservarse o suavizarse.
  revised_spanish_text: 'Y les preguntó: «¿Cuántos panes tienen ustedes?». Ellos dijeron: «Siete».'
  revision_rationale: Se revisa únicamente la forma de la pregunta para reflejar sin ambigüedad la segunda persona plural de ἔχετε en español neutral latinoamericano. No se requieren notas.
