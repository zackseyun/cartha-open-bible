translation:
  language: es
  text: 'Y les preguntó: «¿Cuántos panes tienen ustedes?». Ellos dijeron: «Siete».'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: La conjunción simple mantiene el flujo narrativo de Marcos sin añadir una matización temporal que el griego no exige. En español, «Y» reproduce bien ese encadenamiento breve y natural.
- source_word: ἠρώτα
  english_pob_choice: he asked
  chosen_spanish: preguntó
  alternatives_spanish:
  - les preguntó
  - les hacía la pregunta
  lexicon: BDAG
  rationale: El imperfecto puede sugerir una acción en curso, pero en español narrativo «preguntó» comunica con naturalidad la acción interrogativa. Se explicita el destinatario con «les» porque el pronombre griego αὐτούς lo pide de forma directa.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: 'El acusativo plural se expresa de forma idiomática en español como objeto indirecto con verbos de preguntar: «les preguntó». Así se evita una calca innecesaria y se mantiene la referencia a los discípulos.'
- source_word: Πόσους
  english_pob_choice: How many
  chosen_spanish: ¿Cuántos
  alternatives_spanish:
  - ¿Cuántos de
  lexicon: BDAG
  rationale: La pregunta cuantitativa en acusativo plural se vierte naturalmente como «¿Cuántos…?», que preserva la fuerza interrogativa y el valor distributivo de πόσος.
- source_word: ἔχετε
  english_pob_choice: do you have
  chosen_spanish: tienen
  alternatives_spanish:
  - ustedes tienen
  - ustedes poseen
  lexicon: BDAG
  rationale: Aunque el griego usa segunda persona plural, el español bíblico moderno suele omitir el sujeto cuando el contexto ya lo identifica. «Tienen» es claro y directo; en una pregunta con «les preguntó» suena más natural que la perífrasis «¿cuántos tienen?» sin sujeto explícito.
- source_word: ἄρτους
  english_pob_choice: loaves
  chosen_spanish: panes
  alternatives_spanish:
  - hogazas
  - loaves
  lexicon: BDAG
  rationale: En un contexto de conteo, ἄρτος se entiende como unidades contables de pan. «Panes» conserva esa concreción sin sonar arcaico; «hogazas» es más específico pero menos general y menos natural para lectores amplios.
- source_word: οἱ δὲ εἶπαν
  english_pob_choice: They said
  chosen_spanish: Ellos dijeron
  alternatives_spanish:
  - Y ellos dijeron
  - Respondieron
  lexicon: BDAG
  rationale: La respuesta del grupo se expresa de modo transparente con «Ellos dijeron». Se mantiene la sencillez del verbo griego λέγω y la transición de δέ sin forzar un matiz de contraste fuerte.
- source_word: Ἑπτά
  english_pob_choice: Seven
  chosen_spanish: Siete
  alternatives_spanish:
  - Siete panes
  lexicon: BDAG
  rationale: El numeral se traduce de forma directa como respuesta breve. No se repite «panes» porque el sustantivo ya queda sobreentendido por la pregunta previa.
theological_decisions:
- issue: Valor narrativo del imperfecto ἠρώτα
  english_pob_reading: he asked
  chosen_spanish_reading: preguntó
  alternative_spanish_readings:
  - les estaba preguntando
  - les preguntaba
  rationale: No hay tensión doctrinal; la decisión es principalmente estilística. El imperfecto griego puede enfatizar la acción en curso, pero en español la forma simple «preguntó» transmite adecuadamente el hecho narrativo sin sobrecargar la frase.
  doctrine_reference: N/A
translation_notes:
  revision_awareness: No se detectaron revisiones textuales ni variantes relevantes en el audit trail inglés; el texto griego y la traducción inglesa concuerdan de forma alta, y la versión española sigue esa lectura sin introducir matices no sustentados.
  spanish_consistency_notes:
  - Se usa «panes» para ἄρτους, coherente con el valor contable en este contexto.
  - Se evita «Cristo/SEÑOR» u otra terminología teológica no presente en el versículo.
  - Se mantiene un registro bíblico moderno y claro, con puntuación de diálogo en estilo editorial español.
