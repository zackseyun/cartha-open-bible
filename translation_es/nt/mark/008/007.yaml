translation:
  language: es
  text: Y tenían unos pocos peces pequeños[a]; y después de bendecirlos, dijo que también sirvieran estos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pececillos». El diminutivo griego ἰχθύδια sugiere peces de tamaño pequeño.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «dijo que también pusieran estos delante de ellos». El infinitivo παρατιθέναι puede expresarse como «servir» o, más literalmente en contexto de mesa, «poner delante».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰχθύδια
  english_pob_choice: small fish
  chosen_spanish: pececillos
  alternatives_spanish:
  - peces pequeños
  - pescaditos
  lexicon: BDAG
  rationale: El diminutivo griego ἰχθύδια sugiere peces pequeños; en español, «pececillos» conserva el matiz diminutivo sin perder naturalidad. «Peces pequeños» es más neutro, pero atenúa el valor expresivo del diminutivo.
- source_word: ὀλίγα
  english_pob_choice: a few
  chosen_spanish: unos pocos
  alternatives_spanish:
  - pocos
  - un pequeño número de
  lexicon: BDAG
  rationale: «Unos pocos» expresa de forma idiomática la cantidad reducida de elementos contables. «Pocos» puede sonar más abrupto o absoluto en español.
- source_word: εὐλογήσας
  english_pob_choice: after blessing
  chosen_spanish: después de bendecirlos
  alternatives_spanish:
  - habiéndolos bendecido
  - después de darles bendición
  lexicon: BDAG
  rationale: El participio aoristo indica acción anterior; en contexto de comida, «bendecirlos» es el equivalente más cercano y sobrio. «Darles bendición» sería menos natural y menos directo.
- source_word: αὐτά
  english_pob_choice: them
  chosen_spanish: los
  alternatives_spanish:
  - a ellos
  - los mismos
  lexicon: BDAG
  rationale: El pronombre neutro plural remite a los pececillos; en español concuerda mejor como objeto directo plural masculino («los»).
- source_word: καὶ ταῦτα
  english_pob_choice: these also
  chosen_spanish: también estos
  alternatives_spanish:
  - estos también
  - estos igualmente
  lexicon: BDAG
  rationale: «También estos» conserva el valor aditivo de καί y la demostración de ταῦτα en un orden natural para el español.
- source_word: παρατιθέναι
  english_pob_choice: to set before them
  chosen_spanish: fueran puestos delante de ellos
  alternatives_spanish:
  - se sirvieran
  - se colocaran delante de ellos
  lexicon: BDAG
  rationale: En contexto de comida, παρατίθημι puede significar poner o servir alimentos. Para el español, la pasiva perifrástica «fueran puestos delante de ellos» mantiene la idea de colocación sin forzar un sujeto explícito. «Servir» es posible, pero introduce una adaptación más interpretativa.
- source_word: εἶπεν
  english_pob_choice: he said
  chosen_spanish: dijo
  alternatives_spanish:
  - les dijo
  - ordenó
  lexicon: BDAG
  rationale: «Dijo» mantiene la correspondencia básica con εἶπεν. No se explicita «les» porque el griego no lo repite aquí y el contexto ya identifica a los destinatarios del mandato.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego: participio aoristo anterior («después de bendecirlos»), pronombre plural neutro («los»), y infinitivo de propósito/mandato («fueran puestos delante de ellos»). Se evita suavizar παρατιθέναι con un pasivo demasiado libre o convertir εἶπεν en una orden explícita que el texto no formula directamente. El rastro inglés confirma la decisión de conservar la idea de colocar/servir, sin depender mecánicamente de la pasiva inglesa.'
  spanish_consistency_notes:
  - Se usa «Dios»/«Yahvé» según la convención general del proyecto; aquí no aparece ningún término divino.
  - «Pececillos» preserva el matiz diminutivo mejor que un simple «peces».
  - Se mantuvo la relación sintáctica del griego sin introducir sujeto expreso para el mandato.
  - La puntuación con punto y coma refleja la división de las dos acciones principales del verso.
