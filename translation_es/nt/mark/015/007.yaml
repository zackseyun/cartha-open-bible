translation:
  language: es
  text: Ahora el hombre llamado Barrabás estaba detenido con los rebeldes[a] que habían cometido asesinato en la rebelión.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con los insurrectos» / «en la insurrección». El griego usa términos relacionados para los que participaron en un alzamiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἦν δὲ
  english_pob_choice: Now ... was
  chosen_spanish: Pero ... estaba
  alternatives_spanish:
  - Y ... estaba
  - Ahora ... estaba
  lexicon: BDAG
  rationale: δέ es un conector leve; en español, «Pero» conserva el flujo narrativo y la transición sin cargar el texto. El imperfecto «estaba» refleja bien ἦν en una descripción de estado.
- source_word: ὁ λεγόμενος
  english_pob_choice: the man called
  chosen_spanish: el hombre llamado
  alternatives_spanish:
  - el que era llamado
  - el llamado
  lexicon: BDAG
  rationale: La combinación de artículo y participio identifica a Barrabás descriptivamente. «El hombre llamado» es natural en español y evita el matiz peyorativo que tendría «supuesto» o «así llamado».
- source_word: Βαραββᾶς
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabbás
  - Barabás
  lexicon: Transliteración propia
  rationale: Se conserva el nombre propio en forma española tradicionalmente inteligible, con acentuación castellana/latinoamericana normalizada.
- source_word: μετὰ τῶν στασιαστῶν
  english_pob_choice: with the rebels
  chosen_spanish: con los rebeldes
  alternatives_spanish:
  - con los insurrectos
  - con los insurrectionistas
  lexicon: BDAG
  rationale: στασιασταί designa a quienes participan en una revuelta o alzamiento. «Rebeldes» es claro y mantiene el paralelismo con στάσις en la cláusula siguiente.
- source_word: δεδεμένος
  english_pob_choice: was bound
  chosen_spanish: estaba preso
  alternatives_spanish:
  - estaba atado
  - estaba encadenado
  lexicon: BDAG
  rationale: Aunque el griego dice literalmente «estaba atado/ligado», en este contexto de custodia «estaba preso» comunica la situación de detención de manera natural en español sin perder la fuerza coercitiva.
- source_word: ἐν τῇ στάσει
  english_pob_choice: in the rebellion
  chosen_spanish: en la rebelión
  alternatives_spanish:
  - en el alzamiento
  - en la insurrección
  lexicon: BDAG
  rationale: στάσις aquí apunta a un levantamiento político violento. «Rebelión» reproduce bien el sentido y armoniza con «rebeldes».
- source_word: φόνον πεποιήκεισαν
  english_pob_choice: had committed murder
  chosen_spanish: habían cometido un asesinato
  alternatives_spanish:
  - habían cometido homicidio
  - habían matado a alguien
  lexicon: BDAG
  rationale: φόνος en este contexto es un homicidio criminal; «asesinato» expresa con claridad el acto violento y su carga jurídica. El pluscuamperfecto «habían cometido» refleja el valor de acción anterior completada.
theological_decisions:
- issue: Naturaleza de στάσις / στασιασταί en contexto histórico-político
  english_pob_reading: rebels ... in the rebellion
  chosen_spanish_reading: rebeldes ... en la rebelión
  alternative_spanish_readings:
  - insurrectos ... en la insurrección
  - revolucionarios ... en el levantamiento
  rationale: 'No hay una cuestión doctrinal directa, pero sí una decisión interpretativa histórica: el texto presenta a Barrabás asociado con una revuelta violenta. «Rebeldes» y «rebelión» preservan esa carga sin exagerar el matiz ideológico moderno de «revolucionarios».'
  doctrine_reference: N/A
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene el enlace entre στασιαστῶν y στάσει con «rebeldes» / «rebelión», y conserva la idea de detención con una formulación natural en español. Se optó por «asesinato» como equivalente comunicativo de φόνον, aunque se reconoce la alternativa más literal «homicidio».'
  spanish_consistency_notes:
  - Se mantuvo «Barrabás» como nombre propio españolizado de uso común.
  - Se evitó «SEÑOR» u otra máscara porque no hay referencia al nombre divino en este versículo.
  - «Preso» comunica la custodia implícita en δεδεμένος; se aclara con la nota alternativa la lectura más literal de estar atado.
