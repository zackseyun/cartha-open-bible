  source_alignment_summary: El borrador refleja bien el sentido básico de σῶσον σεαυτόν ... ἀπὸ τοῦ σταυροῦ y mantiene la relación estrecha entre el imperativo y καταβάς. Sin embargo, «descendiendo» suena menos natural en esta burla y puede sentirse algo rígido en español contemporáneo. «Bajando» preserva mejor la lectura participial/adverbial del griego sin añadir una relación instrumental fuerte ni sonar acartonado.
  spanish_quality_summary: «¡Sálvate, descendiendo de la cruz!» es comprensible, pero el gerundio con «descender» resulta algo literario y menos idiomático en una exclamación de burla directa. «¡Sálvate[a], bajando de la cruz!» mejora la naturalidad y legibilidad sin perder dignidad ni fidelidad. La nota actual sigue siendo útil, pero debe ajustarse para corresponder exactamente al nuevo texto.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Sálvate» conserva el vínculo con el lenguaje de salvación para σῶσον; «cruz» para σταυρός es correcto. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc.
  issues:
