translation:
  language: es
  text: ¡Sálvate[a], bajando de la cruz!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «¡Sálvate, habiendo bajado de la cruz!» o «¡Sálvate; baja de la cruz!»'
    reason: lexical_alternative
lexical_decisions:
- source_word: σῶσον
  english_pob_choice: Save
  chosen_spanish: ¡Sálvate!
  alternatives_spanish:
  - ¡Rescátate!
  - ¡Líbrate!
  lexicon: BDAG
  rationale: El imperativo aoristo de segunda persona singular conserva en español la fuerza de orden/taunt con un verbo directo. «Salvar» mantiene además el vínculo verbal con el lenguaje de salvación, como en el inglés POB.
- source_word: σεαυτόν
  english_pob_choice: yourself
  chosen_spanish: te
  alternatives_spanish:
  - a ti mismo
  - a ti
  lexicon: BDAG
  rationale: El reflexivo enclítico «te» es la forma más natural y fiel en español con un imperativo. El sentido de auto-dirigido se mantiene sin sobrecargar la frase.
- source_word: καταβάς
  english_pob_choice: coming down
  chosen_spanish: descendiendo
  alternatives_spanish:
  - bajando
  - habiendo descendido
  - después de descender
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera adverbial con un gerundio para conservar la acción concomitante sin imponer una relación instrumental que el griego no expresa explícitamente. «Descendiendo» es más elevado y mantiene el paralelismo con el contexto pasional.
- source_word: ἀπὸ τοῦ σταυροῦ
  english_pob_choice: from the cross
  chosen_spanish: de la cruz
  alternatives_spanish:
  - desde la cruz
  lexicon: BDAG
  rationale: La preposición ἀπό indica movimiento alejándose del objeto; «de la cruz» es la forma más natural y estable en español bíblico contemporáneo. «Cruz» traduce σταυρός en este contexto de pasión.
theological_decisions:
- issue: Relación entre el imperativo σῶσον y el participio καταβάς
  english_pob_reading: 'The English POB keeps the participle closely attached to the imperative, finally reading: ''Save yourself, coming down from the cross!'''
  chosen_spanish_reading: «¡Sálvate, descendiendo de la cruz!» conserva la cercanía sintáctica entre el mandato y el participio sin convertirlo en dos mandatos coordinados.
  alternative_spanish_readings:
  - ¡Sálvate y desciende de la cruz!
  - ¡Sálvate bajando de la cruz!
  - ¡Sálvate, habiendo descendido de la cruz!
  rationale: La frase griega es una burla comprimida; en español conviene preservar esa tensión entre mandato y participio. No se resuelve la ambigüedad, porque el texto no especifica de forma explícita si el descenso es medio, condición o acción concomitante.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail en el punto clave del participio: evita añadir «por» o «al» y conserva una relación más directa entre el imperativo y el participio, como en el griego y en la revisión inglesa final.'
  spanish_consistency_notes:
  - Se prefirió «cruz» para σταυρός por consistencia con el contexto de la pasión.
  - Se mantuvo el registro exclamativo, ya que el enunciado funciona como burla imperativa.
  - No se introdujo «Cristo» ni «Señor», porque no aparecen en el texto fuente de este versículo.
