translation:
  language: es
  text: Pues sabía que los principales sacerdotes lo habían entregado por envidia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por celos' o 'a causa de envidia'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγίνωσκεν
  english_pob_choice: he knew
  chosen_spanish: sabía
  alternatives_spanish:
  - conocía
  - reconocía
  - entendía
  lexicon: BDAG
  rationale: El imperfecto expresa una conciencia continua o asentada de Pilato. En español, 'sabía' comunica naturalmente ese conocimiento sostenido sin forzar una forma perifrástica.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - En efecto
  - Ya que
  lexicon: BDAG
  rationale: '''γάρ'' introduce la base explicativa de lo anterior. ''Pues'' conserva bien la conexión discursiva en español y suena más natural al inicio de la oración que un calco rígido.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Introduce el contenido de lo que sabía. 'Que' es la conjunción completiva directa y más natural en español.
- source_word: διὰ φθόνον
  english_pob_choice: because of envy
  chosen_spanish: por envidia
  alternatives_spanish:
  - a causa de envidia
  - por celos
  - a causa de celos
  lexicon: BDAG
  rationale: La preposición con acusativo expresa causa. 'Por envidia' transmite de modo conciso el motivo atribuido a los principales sacerdotes, manteniendo la tensión lexical entre 'envy' y posibles matices de 'jealousy' sin resolverla en exceso.
- source_word: παραδεδώκεισαν
  english_pob_choice: had handed ... over
  chosen_spanish: habían entregado
  alternatives_spanish:
  - habían entregado ... a
  - habían puesto en manos de
  - habían traicionado
  lexicon: BDAG
  rationale: El pluscuamperfecto indica una acción anterior al conocimiento de Pilato. 'Habían entregado' conserva el valor de entrega judicial o de remisión a autoridades, sin cargarlo con el sentido más fuerte de 'traicionado'.
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre de objeto directo referido a Jesús. En español, 'lo' es la forma más natural y fluida en este contexto.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: En plural, ἀρχιερεῖς designa a los líderes sacerdotales. 'Principales sacerdotes' conserva la referencia al grupo dirigente y evita confundirlo con un solo 'sumo sacerdote'.
theological_decisions:
- issue: Motive attributed to the chief priests
  english_pob_reading: The verse states that their motive in handing Jesus over was envy.
  chosen_spanish_reading: El verso afirma que lo entregaron por envidia.
  alternative_spanish_readings:
  - por celos
  - por resentimiento
  rationale: La traducción mantiene la afirmación directa del texto sobre el motivo, sin suavizarlo ni expandirlo. 'Envidia' es la opción más cercana al léxico del griego y deja abierta la gama semántica que la nota inglesa preserva.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No se observan revisiones aplicadas en el expediente. La redacción española sigue de cerca el texto griego y el criterio óptimo-equivalente del POB inglés, manteniendo la alternativa semántica de φθόνος en nota.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando aparece el nombre divino; aquí no aplica.
  - Se conserva el orden discursivo explicativo con 'Pues' para reflejar γάρ.
  - '''Principales sacerdotes'' se emplea consistentemente para el plural ἀρχιερεῖς en este contexto de Pasión.'
