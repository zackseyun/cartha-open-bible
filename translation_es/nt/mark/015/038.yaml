translation:
  language: es
  text: Y la cortina[a] del templo[b] se rasgó en dos, de arriba abajo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «velo del templo».
    reason: lexical_alternative
  - marker: b
    text: El griego puede referirse más específicamente al santuario interior del templo.
    reason: lexical_alternative
lexical_decisions:
- source_word: καταπέτασμα
  english_pob_choice: curtain
  chosen_spanish: velo
  alternatives_spanish:
  - cortina
  - telón
  lexicon: BDAG
  rationale: En español bíblico, «velo» comunica bien la pieza colgante del santuario/templo y preserva la posible referencia más específica que el texto puede tener. Aunque «cortina» sería más transparente en uso cotidiano, «velo» mantiene mejor la tradición descriptiva sin convertir la imagen en interpretación.
- source_word: ναοῦ
  english_pob_choice: temple
  chosen_spanish: del templo
  alternatives_spanish:
  - del santuario
  lexicon: BDAG
  rationale: «Templo» reproduce de manera natural el genitivo griego y conserva la referencia al lugar sagrado. «Santuario» es posible para enfatizar el recinto interior, pero resulta menos idiomático aquí como texto principal.
- source_word: ἐσχίσθη
  english_pob_choice: was torn
  chosen_spanish: se rasgó
  alternatives_spanish:
  - fue rasgado
  - se partió
  - se desgarró
  lexicon: BDAG
  rationale: El pasivo aoristo de σχίζω expresa una ruptura o desgarro. «Se rasgó» es una equivalencia natural en español y mantiene la fuerza concreta del evento sin suavizarla.
- source_word: εἰς δύο
  english_pob_choice: in two
  chosen_spanish: en dos
  alternatives_spanish:
  - en dos partes
  - en dos pedazos
  lexicon: BDAG
  rationale: «En dos» es la forma breve e idiomática que corresponde al giro griego y evita añadir matices no explícitos sobre la clase de fragmentación.
- source_word: ἀπ’ ἄνωθεν ἕως κάτω
  english_pob_choice: from top to bottom
  chosen_spanish: de arriba abajo
  alternatives_spanish:
  - desde arriba hasta abajo
  - de la parte superior a la inferior
  lexicon: BDAG
  rationale: «De arriba abajo» conserva el movimiento vertical completo de la frase griega con naturalidad en español. Mantiene la imagen espacial sin explicarla.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Además
  lexicon: BDAG
  rationale: La conjunción simple enlaza el evento con la narración anterior sin imponer un matiz temporal adicional.
theological_decisions:
- issue: Significado teológico del rasgado del velo
  english_pob_reading: Render the event descriptively without explaining its symbolism in the main text.
  chosen_spanish_reading: Presentar el hecho de manera descriptiva, sin desarrollar su simbolismo en el cuerpo del versículo.
  alternative_spanish_readings:
  - El hecho indica acceso directo a Dios
  - El hecho simboliza juicio sobre el sistema del templo
  rationale: El griego informa el acontecimiento, pero no explicita su interpretación. La traducción debe preservar esa tensión y dejar la implicación teológica para el contexto y la enseñanza, no para la línea principal del versículo.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la traducción.
translation_notes:
  revision_awareness: 'Coincide con el control de revisión más reciente: no se requieren cambios respecto del perfil auditado; la versión española mantiene la lectura descriptiva y la equivalencia óptima del original.'
  spanish_consistency_notes:
  - Se mantiene «templo» para ναός y «velo» para καταπέτασμα, siguiendo una opción léxica natural en español sin perder la posible especificidad del pasaje.
  - La puntuación coloca las notas al término «templo» para que ambas alternativas/precisiones queden ancladas al sintagma completo, como en el audit trail inglés.
  - No se introduce interpretación simbólica en el texto principal, en coherencia con la filosofía de la POB.
