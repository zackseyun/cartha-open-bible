base_translation:
  language: en
  yaml_path: translation/nt/mark/015/021.yaml
  text: And they compelled a certain passerby[a], Simon of Cyrene, who was coming from the country, the father of Alexander and Rufus[c][b], to carry his cross.
  footnotes:
  - marker: a
    text: Or 'coming in from the countryside'; literally 'coming from the field/country.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'compelled' refers to forced service or impressment.
    reason: cultural_note
  - marker: c
    text: Some understand 'cross' more specifically as 'crossbeam,' but the Greek text says simply 'cross.'
    reason: lexical_alternative
