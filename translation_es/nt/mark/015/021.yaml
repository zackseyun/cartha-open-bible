translation:
  language: es
  text: Y obligaron[a] a uno que iba pasando, Simón de Cirene, que venía del campo[b], el padre de Alejandro y de Rufo, a llevar su cruz[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «forzaron»; el verbo también puede referirse a servicio forzado o requisa.'
    reason: cultural_note
  - marker: b
    text: 'O: «que venía de la campiña»; literalmente, «que venía del campo/país».'
    reason: lexical_alternative
  - marker: c
    text: Algunos entienden «cruz» más específicamente como «travesaño», pero el texto griego dice simplemente «cruz».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγαρεύουσιν
  english_pob_choice: compelled
  chosen_spanish: obligaron
  alternatives_spanish:
  - compelieron
  - forzaron
  - presionaron para prestar servicio
  lexicon: BDAG
  rationale: ἀγγαρεύω expresa imposición de servicio forzado o requisa. En español, «obligaron» comunica bien la coerción sin sonar excesivamente técnico, y conserva el sentido de imposición histórica que el audit trail resalta.
- source_word: παράγοντά τινα
  english_pob_choice: a certain passerby
  chosen_spanish: a un[a] transeúnte
  alternatives_spanish:
  - a un hombre que pasaba
  - a un pasajero
  - a un cierto hombre que pasaba
  lexicon: BDAG
  rationale: El participio indica a alguien que iba pasando; τινα añade indefinición. «Transeúnte» es natural y breve en español, y conserva la idea de presencia incidental. Se evita una paráfrasis más larga que diluya la escena.
- source_word: Σίμωνα Κυρηναῖον
  english_pob_choice: Simon of Cyrene
  chosen_spanish: Simón de Cirene
  alternatives_spanish:
  - Simón el cireneo
  - Simón el de Cirene
  lexicon: BDAG
  rationale: Se translitera el nombre propio y se vierte el identificador geográfico con la forma más natural en español bíblico actual. «De Cirene» mantiene la relación de procedencia sin introducir un gentilicio menos transparente.
- source_word: ἐρχόμενον ἀπ’ ἀγροῦ
  english_pob_choice: who was coming from the country
  chosen_spanish: que venía del campo
  alternatives_spanish:
  - que venía de la campiña
  - que venía del campo/campiña
  - que venía de la zona rural
  lexicon: BDAG
  rationale: ἀγρός puede significar campo, tierra cultivada o campo/campiña. En este contexto narrativo, «del campo» es fiel y natural; mantiene abierta la referencia amplia sin imponer «campo» como parcela agrícola concreta.
- source_word: τὸν πατέρα Ἀλεξάνδρου καὶ Ῥούφου
  english_pob_choice: the father of Alexander and Rufus
  chosen_spanish: el padre de Alejandro y de Rufo
  alternatives_spanish:
  - el padre de Alejandro y Rufo
  - padre de Alejandro y Rufo
  lexicon: BDAG
  rationale: Se conserva la identificación apposicional sin interpretarla. En español, repetir la preposición «de» ante ambos nombres evita ambigüedad y suena natural en la enumeración.
- source_word: ἵνα ἄρῃ
  english_pob_choice: to carry
  chosen_spanish: a llevar
  alternatives_spanish:
  - para llevar
  - a cargar
  - para cargar
  lexicon: BDAG
  rationale: Aunque ἵνα + subjuntivo expresa propósito, tras un verbo de coacción el infinitivo final es idiomático en español. «Llevar» aquí comunica el acto de portar la cruz sin sobreespecificar la mecánica física.
- source_word: σταυρὸν
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - cruz
  - madero
  lexicon: BDAG
  rationale: σταυρός se traduce de manera estándar como «cruz». El audit trail señala la posibilidad de «crossbeam», pero el griego dice simplemente σταυρός; por eso no se estrecha el sentido en el texto principal.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de Jesús
  lexicon: BDAG
  rationale: El pronombre se entiende naturalmente de Jesús por contexto, y en español se mantiene la referencia pronominal con «su» para no introducir un nombre que no aparece en el griego.
theological_decisions:
- issue: Naturaleza de la coerción sobre Simón
  english_pob_reading: Simon was compelled by the soldiers/authorities to carry Jesus' cross.
  chosen_spanish_reading: Simón fue obligado por la autoridad romana a llevar la cruz de Jesús.
  alternative_spanish_readings:
  - Simón fue invitado o requerido a ayudar.
  - Simón fue simplemente asignado para ayudar.
  rationale: El verbo griego indica servicio forzado, no una petición amable. «Obligaron» conserva el peso histórico y narrativo de la imposición. La referencia explícita a la autoridad romana queda implícita en el contexto, sin sobrecargar el texto principal.
  doctrine_reference: Translation philosophy §1, §5
- issue: Objeto llevado por Simón
  english_pob_reading: cross
  chosen_spanish_reading: cruz
  alternative_spanish_readings:
  - madero
  - cruz/travesaño
  rationale: Aunque ciertas reconstrucciones históricas proponen un travesaño, el texto dice σταυρός. Mantener «cruz» preserva la forma verbal del pasaje y evita introducir una precisión histórica que el griego no expresa.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'El pasaje coincide con el audit trail inglés en sus decisiones centrales: ἀγγαρεύω como coerción, παράγων/τινα como indefinición incidental, ἀπ’ ἀγροῦ como procedencia desde el campo, y σταυρός como «cruz» sin estrechar a «travesaño». No se registran revisiones posteriores que alteren estas elecciones.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, con sintaxis natural para español latinoamericano.
  - Se conserva la identificación «Simón de Cirene» como forma estándar y transparente.
  - La nota al pie se ancla en «transeúnte» para preservar la alternativa léxica sin interrumpir la lectura principal.
