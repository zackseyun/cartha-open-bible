translation:
  language: es
  text: 'Y algunos de los que estaban allí[a], al oírlo, decían: «Miren, está llamando a Elías».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Miren, está llamando por Elías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καί
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  - Ahora
  lexicon: BDAG
  rationale: La conjunción conecta esta reacción con el clamor anterior de Jesús. «Y» conserva la continuidad narrativa sin añadir una relación temporal más fuerte de la que aporta el griego.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos
  - ciertos
  lexicon: BDAG
  rationale: El indefinido plural indica un grupo no especificado de presentes. «Algunos» es natural en español y mantiene esa indeterminación.
- source_word: τῶν παρεστηκότων
  english_pob_choice: of those standing there
  chosen_spanish: de los que estaban allí
  alternatives_spanish:
  - de los presentes
  - de los que estaban de pie allí
  lexicon: BDAG
  rationale: El participio perfecto funciona sustantivadamente para los que se hallaban presentes en la escena. «Los que estaban allí» conserva el sentido espacial y resulta idiomático en español.
- source_word: ἀκούσαντες
  english_pob_choice: when they heard it
  chosen_spanish: al oírlo
  alternatives_spanish:
  - cuando lo oyeron
  - habiéndolo oído
  lexicon: BDAG
  rationale: El participio aoristo marca una acción anterior a lo que seguía. «Al oírlo» expresa bien esa relación temporal en español y evita una construcción más pesada.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción en desarrollo o discurso repetido. En español, «decían» suele comunicar ese matiz de forma natural y suficiente.
- source_word: Ἴδε
  english_pob_choice: Look
  chosen_spanish: Miren
  alternatives_spanish:
  - Mira
  - Vean
  lexicon: BDAG
  rationale: Es un imperativo de atención dirigido a los presentes. «Miren» transmite con naturalidad la llamada a fijarse en algo.
- source_word: Ἠλίαν
  english_pob_choice: Elijah
  chosen_spanish: Elías
  alternatives_spanish:
  - Elias
  lexicon: BDAG
  rationale: Nombre propio del profeta según la forma española estándar.
- source_word: φωνεῖ
  english_pob_choice: he is calling
  chosen_spanish: está llamando
  alternatives_spanish:
  - llama
  - está invocando
  lexicon: BDAG
  rationale: El presente en discurso reportado puede expresarse de manera progresiva en español. «Está llamando» mantiene la vivacidad del reporte y el sentido básico del verbo sin sobreinterpretar el objeto de la llamada.
theological_decisions:
- issue: Si explicitar en el texto principal que los presentes malinterpretan el clamor de Jesús
  english_pob_reading: Retain the surface-level statement 'he is calling Elijah' without explanatory expansion in the main text
  chosen_spanish_reading: 'Mantener la declaración superficial: «está llamando a Elías»'
  alternative_spanish_readings:
  - está llamando por Elías
  - pensaban que estaba llamando a Elías
  rationale: El griego reporta lo que dicen los presentes; no añade una glosa narrativa explícita. La posible malinterpretación queda clara por el contexto inmediato, así que no debe resolverse ni ampliarse en el texto principal.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; no paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo; no se registraron revisiones recientes que alteren la traducción. Se conservó la lectura superficial del enunciado sin explicar la confusión en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Elías» sigue la forma española estándar para el profeta.
  - El imperativo plural «Miren» responde de modo natural al griego Ἴδε en discurso directo.
  - La nota al pie conserva la alternativa lexical del inglés POB sin forzar una interpretación narrativa adicional.
