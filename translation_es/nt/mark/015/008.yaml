revisions:
- from: Y la multitud subió y comenzó a pedirle que hiciera lo que solía hacer por ellos[a].
  to: Y la multitud se acercó y comenzó a pedirle que hiciera como solía hacer por ellos[a].
  rationale: Se ajusta ἀναβὰς a un español más natural en contexto narrativo («se acercó») y se restaura el matiz comparativo de καθὼς con «como», en línea con el griego y con la revisión inglesa auditada. Se mantiene «solía hacer» para el imperfecto habitual ἐποίει.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:49:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: el sujeto es la multitud, ἤρξατο αἰτεῖσθαι se capta bien con «comenzó a pedirle», y el imperfecto ἐποίει queda bien representado por «solía hacer». Sin embargo, «subió» para ἀναβὰς suena demasiado literal/espacial en español en este contexto narrativo de aproximación a Pilato; «se acercó» o «vino» preserva mejor el movimiento sin sugerir una subida física marcada. Además, el español principal cambia καθὼς («como») por «lo que», opción posible por idiomaticidad, pero el texto auditado en inglés finalmente preserva explícitamente «him to do as he used to do for them», por lo que conviene mantener también en español la relación comparativa/customaria con «como».'
  spanish_quality_summary: El texto es claro y legible, pero «la multitud subió» resulta poco natural en español bíblico moderno aquí. «La multitud se acercó» mejora la fluidez y evita una imagen espacial innecesaria. También «que hiciera como solía hacer por ellos» suena natural y más ceñido al griego que «lo que solía hacer por ellos».
  glossary_alignment: No hay términos teológicos sensibles en este versículo. «Multitud» es aceptable para ὄχλος, aunque «la gente» sería más coloquial. «Pedirle» encaja bien para αἰτεῖσθαι. La revisión propuesta mantiene la fuerza acostumbrativa de ἐποίει con «solía hacer».
  issues:
  - severity: medium
    issue: «subió» para ἀναβὰς suena demasiado literal y poco idiomático en este contexto.
    rationale: ἀναβὰς literalmente es «habiendo subido/venido arriba», pero en la escena narrativa describe el acercamiento de la multitud. En español, «la multitud subió» puede sugerir ascenso físico y suena torpe; «se acercó» preserva mejor el sentido contextual.
  - severity: medium
    issue: «lo que solía hacer por ellos» debilita el valor de καθὼς.
    rationale: El griego tiene καθὼς, «como/justo como», y la revisión inglesa auditada procuró conservar esa relación. «Lo que» es interpretativo y menos pegado a la forma y matiz del original.
  revised_spanish_text: Y la multitud se acercó y comenzó a pedirle que hiciera como solía hacer por ellos[a].
  revised_footnotes:
  - marker: a
    text: Más literalmente, «Y la multitud, habiéndose acercado, comenzó a pedirle como él solía hacer por ellos».
    reason: lexical_alternative
  revision_rationale: Se ajusta ἀναβὰς a un español más natural en contexto narrativo («se acercó») y se restaura el matiz comparativo de καθὼς con «como», en línea con el griego y con la revisión inglesa auditada. Se mantiene «solía hacer» para el imperfecto habitual ἐποίει.
