translation:
  language: es
  text: Y la multitud se acercó y comenzó a pedirle que hiciera como solía hacer por ellos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «Y la multitud, habiéndose acercado, comenzó a pedirle como él solía hacer por ellos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβὰς
  english_pob_choice: came up
  chosen_spanish: subió
  alternatives_spanish:
  - había subido
  - ascendió
  lexicon: BDAG
  rationale: El participio aoristo de ἀναβαίνω expresa movimiento de subida/llegada. En español, con un sujeto colectivo ya presente en la escena, «subió» transmite de forma natural ese desplazamiento sin volverlo más pesado con un gerundio o una perífrasis excesiva.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - el gentío
  lexicon: BDAG
  rationale: ὄχλος puede ser «multitud» o «muchedumbre». «La multitud» es una equivalencia clara y digna en español; conserva el matiz colectivo y funciona bien en narración bíblica.
- source_word: ἤρξατο αἰτεῖσθαι
  english_pob_choice: began to ask
  chosen_spanish: comenzó a pedirle
  alternatives_spanish:
  - empezó a pedirle
  - comenzó a solicitarle
  lexicon: BDAG
  rationale: La construcción indica inicio de una acción de petición. En español, «pedirle» comunica mejor que «preguntarle» o un calco demasiado literal, porque aquí el sentido es solicitar una acción concreta. El dativo implícito del objeto indirecto se expresa naturalmente con «le».
- source_word: καθὼς ἐποίει αὐτοῖς
  english_pob_choice: to do as he used to do for them
  chosen_spanish: lo que solía hacer por ellos
  alternatives_spanish:
  - como solía hacer para ellos
  - lo que acostumbraba hacer por ellos
  lexicon: BDAG
  rationale: El imperfecto ἐποίει señala acción habitual pasada. En español, «solía hacer» preserva ese valor acostumbrativo de manera idiomática. «Lo que» refleja la acción implícita que la petición presupone, y «por ellos» mantiene el sentido benefactivo de αὐτοῖς.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que añadió el objeto implícito («him to do») para reflejar mejor el griego. En español se integró ese objeto de manera natural con el pronombre dativo «le» en «pedirle», sin necesidad de una nota separada. También se conservó el valor habitual del imperfecto ἐποίει mediante «solía hacer».
  spanish_consistency_notes:
  - Se prefirió «multitud» para ὄχλος en coherencia con un registro narrativo bíblico claro y moderno.
  - Se mantuvo el benefactivo de αὐτοῖς con «por ellos», no con un simple «a ellos», para reflejar mejor la relación de favor implícita en el contexto.
  - No se usó «Cristo», «Señor» ni terminología teológica ajena al versículo.
  - La nota al pie marca una alternativa formal, no una variante textual.
