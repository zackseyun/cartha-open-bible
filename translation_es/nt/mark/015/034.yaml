translation:
  language: es
  text: 'Y a la hora novena Jesús clamó con voz fuerte[a]: «Eloí, Eloí, lema sabachthani?» que traducido es: «Dios mío, Dios mío, ¿por qué motivo me has abandonado?»[b][c]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos y muchas tradiciones inglesas reflejan la frase semítica como «lama sabachthani» en lugar de «lema sabachthani».
    reason: textual_variant
  - marker: b
    text: Las palabras de Jesús evocan el Salmo 22:1.
    reason: cross_reference
  - marker: c
    text: 'O: «¿por qué me has abandonado?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τῇ ἐνάτῃ ὥρᾳ
  english_pob_choice: at the ninth hour
  chosen_spanish: a la hora novena
  alternatives_spanish:
  - a la hora novena del día
  - a las tres de la tarde
  lexicon: BDAG
  rationale: Conserva la expresión temporal judía/romana del texto y su registro solemne, sin convertirla en una paráfrasis explicativa.
- source_word: ἐβόησεν
  english_pob_choice: cried out
  chosen_spanish: clamó
  alternatives_spanish:
  - gritó
  - exclamó
  - clamó con voz alta
  lexicon: BDAG
  rationale: El verbo expresa un grito fuerte; «clamó» mantiene fuerza y dignidad en español bíblico contemporáneo.
- source_word: φωνῇ μεγάλῃ
  english_pob_choice: with a loud voice
  chosen_spanish: con voz fuerte
  alternatives_spanish:
  - en voz alta
  - con voz muy fuerte
  - con una gran voz
  lexicon: BDAG
  rationale: La frase instrumental intensifica el clamor. «Con voz fuerte» preserva el matiz sin sonar forzado en español.
- source_word: Ἐλωῒ ἐλωῒ λεμὰ σαβαχθάνι
  english_pob_choice: Eloi, Eloi, lema sabachthani?
  chosen_spanish: Eloí, Eloí, lema sabactani
  alternatives_spanish:
  - Eloí, Eloí, lama sabactani
  - Eloí, Eloí, lema sabajtani
  lexicon: BDAG
  rationale: Se conserva la forma transliterada del grito en Marcos. «Eloí» refleja la forma preservada por el texto griego; «lema» sigue la lectura del SBLGNT, y «sabactani» adapta la grafía al español de manera reconocible sin alterar el valor semítico.
- source_word: μεθερμηνευόμενον
  english_pob_choice: which is translated
  chosen_spanish: que traducido significa
  alternatives_spanish:
  - que se traduce
  - que interpretado significa
  - esto es, traducido
  lexicon: BDAG
  rationale: 'La construcción explicativa de Marcos se vierte de forma natural y fiel: primero señala la traducción y luego introduce el significado en español.'
- source_word: εἰς τί
  english_pob_choice: for what reason
  chosen_spanish: ¿por qué motivo?
  alternatives_spanish:
  - ¿por qué?
  - ¿con qué razón?
  - ¿para qué motivo?
  lexicon: BDAG
  rationale: La pregunta pide la razón de la acción. «¿Por qué motivo?» conserva mejor la relación causal que un simple «¿por qué?» y refleja la revisión del POB inglés.
- source_word: ἐγκατέλιπές με
  english_pob_choice: have you forsaken me
  chosen_spanish: me has abandonado
  alternatives_spanish:
  - me has dejado
  - me has desamparado
  - me has abandonado
  lexicon: BDAG
  rationale: «Abandonado» expresa la gravedad del verbo y su resonancia bíblica en español. Se evita suavizarlo con un término menos intenso, preservando la tensión del texto.
- source_word: Ὁ θεός μου ὁ θεός μου
  english_pob_choice: My God, my God
  chosen_spanish: Dios mío, Dios mío
  alternatives_spanish:
  - Mi Dios, mi Dios
  - Dios mío, mi Dios
  lexicon: BDAG
  rationale: Se mantiene la formulación natural y reverente en español. Aunque el griego usa el orden enfático, la repetición devocional queda clara en «Dios mío, Dios mío».
theological_decisions:
- issue: Relación de la cita con el Salmo 22:1
  english_pob_reading: Retain the wording as a direct cry of dereliction while preserving its scriptural resonance without adding interpretive explanation in the main text.
  chosen_spanish_reading: Mantener el grito como una expresión directa de desamparo, dejando en el texto principal la resonancia con el Salmo 22:1 sin explicarla.
  alternative_spanish_readings:
  - «es decir, del Salmo 22»
  - añadir una nota explicativa sobre la cita
  rationale: El versículo presenta la frase semítica y su traducción, lo que ya evoca el Salmo 22:1. La traducción no debe resolver la tensión teológica ni introducir una explicación interpretativa que no está en el texto.
  doctrine_reference: Translation philosophy §3; Credo Niceno; Calcedonia
- issue: Preservación de la frase semítica de Jesús
  english_pob_reading: Preserve the transliterated form in the main text and provide the translation immediately after, following Mark's own pattern.
  chosen_spanish_reading: Conservar la forma transliterada en el texto principal y dar enseguida la traducción, siguiendo el patrón de Marcos.
  alternative_spanish_readings:
  - traducir solo el significado y omitir las palabras semíticas
  - normalizar a la forma mateana «Eli, Eli»
  rationale: Marcos conserva la expresión tal como fue pronunciada y luego la interpreta. Mantener ambos elementos respeta el testimonio textual y evita armonizar con Mateo.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del POB inglés, que ajustó «why» a «for what reason» para reflejar con mayor precisión εἰς τί. Por eso el español principal usa «¿por qué motivo?» en lugar de una forma más breve.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto cuando aparezca el nombre divino; aquí el texto cita «Dios» en la frase de Jesús, por lo que no corresponde sustituirlo.
  - Se preserva la distinción entre la expresión semítica transliterada y su traducción, sin fusionarlas.
  - «Abandonado» conserva la fuerza del verbo sin añadir una interpretación doctrinal del abandono.
