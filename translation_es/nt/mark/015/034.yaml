    text: 'O: «¿por qué me has abandonado?»'
    reason: lexical_alternative
  revision_rationale: Se corrige la transliteración del grito semítico a «sabachthani» para mantener coherencia con la evidencia auditada y con la nota textual, y se pule la cláusula explicativa a «que traducido es» por mayor naturalidad y fidelidad formal en español. El resto del versículo puede mantenerse.
