review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: Pilato se sorprende ante la noticia de la muerte, llama al centurión y le pregunta por el hecho. Sin embargo, la nota al pie no preserva fielmente la alternativa documentada en la auditoría inglesa. El griego εἰ ἤδη τέθνηκεν se vierte bien como «de que ya había muerto», y εἰ πάλαι ἀπέθανεν aquí se puede expresar naturalmente como «si había muerto ya», con posible nota más literal sobre duración/resultados.'
  spanish_quality_summary: El español es claro y natural, pero «hubiera muerto» tras «se asombró de que» suena innecesariamente subjuntivo/literario en una narración de estilo bíblico moderno; «había muerto» o «estaba ya muerto» lee mejor. Además, la nota actual está anclada al primer miembro pero comenta πάλαι del segundo, lo cual confunde al lector y desordena la relación entre texto y nota.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Centurión» es correcto. No aparecen términos sensibles del glosario principal. La principal corrección es de sintaxis española y de correspondencia exacta con la nota léxica preservada en la auditoría inglesa.
  issues:
  - severity: medium
    issue: Uso de «hubiera muerto» en «se asombró de que ya hubiera muerto»
    rationale: Aunque es gramaticalmente posible, en este contexto narrativo español moderno y digno suena menos natural que «había muerto». El griego τέθνηκεν expresa estado resultante/perfecto; «había muerto» lo comunica con mayor claridad y fluidez.
  - severity: medium
    issue: La nota al pie está anclada al primer verbo pero explica πάλαι del segundo miembro
    rationale: La nota [a] aparece tras «muerto» en la primera cláusula, pero su contenido comenta «πάλαι» en la pregunta al centurión. Eso rompe la correspondencia entre anclaje y explicación exigida por el proyecto.
  - severity: medium
    issue: La nota no conserva la alternativa léxica documentada por la auditoría inglesa
    rationale: La auditoría inglesa preserva como alternativa más literal «whether he had been dead for some time». En español debe mantenerse una nota equivalente, no sustituirse por una explicación meta sobre πάλαι como «ya».
  revised_spanish_text: Pero Pilato se asombró de que ya había muerto, y, llamando al centurión, le preguntó si había muerto ya[a].
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «si había estado muerto por algún tiempo».'
    reason: lexical_alternative
  revision_rationale: Se ajusta «hubiera muerto» a «había muerto» para un español más natural y fiel al valor narrativo del griego. Se mueve la nota al segundo miembro, donde realmente corresponde, y se reemplaza por una alternativa literal que sí preserva la decisión léxica documentada en la auditoría inglesa sobre πάλαι/ἀπέθανεν.
