translation:
  language: es
  text: Pero Pilato se asombró de que ya había muerto, y, llamando al centurión, le preguntó si había muerto ya[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «si había estado muerto por algún tiempo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐθαύμασεν
  english_pob_choice: was amazed
  chosen_spanish: se asombró
  alternatives_spanish:
  - se maravilló
  - quedó asombrado
  lexicon: BDAG
  rationale: El verbo expresa sorpresa o asombro ante la noticia de la muerte de Jesús. «Se asombró» comunica bien la reacción en español moderno sin cargar un matiz demasiado literario como «se maravilló».
- source_word: εἰ ἤδη τέθνηκεν
  english_pob_choice: that he had already died
  chosen_spanish: de que ya hubiera muerto
  alternatives_spanish:
  - de que ya estaba muerto
  - de que ya había muerto
  lexicon: BDAG
  rationale: La construcción tras un verbo de asombro se expresa naturalmente en español con «de que». «Hubiera muerto» mantiene el valor de la noticia reportada y el resultado completo de la muerte, sin convertirlo en una afirmación directa del narrador.
- source_word: προσκαλεσάμενος
  english_pob_choice: summoning
  chosen_spanish: llamando
  alternatives_spanish:
  - habiendo llamado
  - llamando a
  lexicon: BDAG
  rationale: El participio indica una acción previa y concomitante a la pregunta. «Llamando» conserva la brevedad narrativa del griego y resulta natural en español; «llamando al centurión» hace explícito el destinatario.
- source_word: κεντυρίωνα
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  lexicon: BDAG
  rationale: «Centurión» es el equivalente preciso y ya establecido para κεντυρίων, preservando la especificidad histórica del rango militar romano.
- source_word: ἐπηρώτησεν
  english_pob_choice: he asked him
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le interrogó
  - le inquirió
  lexicon: BDAG
  rationale: El verbo significa preguntar o interrogar. «Le preguntó» es la forma más natural y transparente en español, sin forzar un registro más técnico de lo necesario.
- source_word: εἰ πάλαι ἀπέθανεν
  english_pob_choice: whether he had died already
  chosen_spanish: si había muerto ya
  alternatives_spanish:
  - si había muerto desde hacía algún tiempo
  - si ya estaba muerto
  lexicon: BDAG
  rationale: '«Ya» reproduce el valor aspectual de πάλαι en este contexto: no tanto «hace mucho» como «ya, para ese momento». «Si había muerto ya» mantiene la pregunta indirecta y evita introducir una duración más fuerte de la que exige el griego.'
theological_decisions:
- issue: Valor de εἰ tras un verbo de asombro
  english_pob_reading: that he had already died
  chosen_spanish_reading: de que ya hubiera muerto
  alternative_spanish_readings:
  - si ya hubiera muerto
  - que ya había muerto
  rationale: El griego usa εἰ en una pregunta indirecta, pero el contexto narrativo admite una formulación española de contenido («se asombró de que...»). Se conserva así la noticia inesperada sin borrar la estructura interrogativa subyacente, que aparece después en la pregunta al centurión.
  doctrine_reference: Gramática del discurso indirecto; no hay implicación doctrinal especial.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente, que prefirió «already» sobre «some time ago» para πάλαι. Por eso el español usa «ya» y evita una expresión que sugiera una duración excesiva, manteniendo la fuerza breve y contextual del adverbio.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se conservó el rango militar preciso «centurión» en lugar de un término más general.
  - Se eligió una estructura natural en español para el discurso indirecto, sin perder el contenido de la pregunta griega.
