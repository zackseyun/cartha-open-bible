revisions:
- from: Pero Pilato se asombró de que ya hubiera muerto[a], y, llamando al centurión, le preguntó si había muerto ya.
  to: Pero Pilato se asombró de que ya había muerto, y, llamando al centurión, le preguntó si había muerto ya[a].
  rationale: Se ajusta «hubiera muerto» a «había muerto» para un español más natural y fiel al valor narrativo del griego. Se mueve la nota al segundo miembro, donde realmente corresponde, y se reemplaza por una alternativa literal que sí preserva la decisión léxica documentada en la auditoría inglesa sobre πάλαι/ἀπέθανεν.
