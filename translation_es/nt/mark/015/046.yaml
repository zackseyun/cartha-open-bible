translation:
  language: es
  text: Y después de comprar una tela de lino[a], lo bajó, lo envolvió en la tela de lino, y lo colocó en un sepulcro que había sido tallado en la roca[b]. Luego rodó una piedra contra la entrada[c] del sepulcro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Alternativa posible: «sábana de lino» o «mortaja» para σινδών; «tela de lino» conserva el valor material y no fuerza la imagen funeraria más allá del contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'También: «cortado de la roca» o «excavado en la roca» para λελατομημένον ἐκ πέτρας. «Tallado en la roca» expresa el resultado completado con español natural.'
    reason: lexical_alternative
  - marker: c
    text: O «puerta» del sepulcro, porque θύρα puede significar tanto «puerta» como «entrada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγοράσας / buying
  english_pob_choice: after buying
  chosen_spanish: después de comprar
  alternatives_spanish:
  - habiendo comprado
  - cuando hubo comprado
  lexicon: BDAG
  rationale: El participio aoristo antecede a las acciones principales; en español, 'después de comprar' comunica con naturalidad esa secuencia sin perder la relación temporal del griego.
- source_word: σινδόνα / σινδόνι
  english_pob_choice: linen cloth / the linen cloth
  chosen_spanish: tela de lino / la tela de lino
  alternatives_spanish:
  - sábana de lino
  - manto de lino
  - mortaja
  lexicon: BDAG
  rationale: σινδών designa una tela de lino, a menudo usada para envolver un entierro. 'Tela de lino' conserva el material y evita especificar más de lo que el contexto exige; 'mortaja' sería más interpretativo.
- source_word: καθελὼν
  english_pob_choice: took him down
  chosen_spanish: lo bajó
  alternatives_spanish:
  - lo descendió
  - lo retiró
  lexicon: BDAG
  rationale: En este contexto, el verbo se refiere a bajar el cuerpo de Jesús de la cruz. 'Lo bajó' es directo, natural y preciso en español.
- source_word: ἐνείλησεν
  english_pob_choice: wrapped him
  chosen_spanish: lo envolvió
  alternatives_spanish:
  - lo envolvió cuidadosamente
  - lo arropó
  lexicon: BDAG
  rationale: El verbo expresa envolver o enfajar. 'Lo envolvió' mantiene la fuerza concreta del acto sin añadir detalles no presentes en el texto.
- source_word: ἔθηκεν
  english_pob_choice: laid him
  chosen_spanish: lo puso
  alternatives_spanish:
  - lo colocó
  - lo dejó
  lexicon: BDAG
  rationale: τίθημι aquí indica depositar el cuerpo en el sepulcro. 'Lo puso' es fiel y natural; 'lo colocó' también sería posible, pero menos sencillo.
- source_word: μνημείῳ / μνημείου
  english_pob_choice: tomb / the tomb
  chosen_spanish: sepulcro / del sepulcro
  alternatives_spanish:
  - tumba
  - tumba funeraria
  lexicon: BDAG
  rationale: En español bíblico, 'sepulcro' comunica bien un lugar de entierro construido; 'tumba' también es posible, pero 'sepulcro' mantiene mejor el tono y la imagen de una cámara funeraria.
- source_word: λελατομημένον ἐκ πέτρας
  english_pob_choice: that had been cut out of rock
  chosen_spanish: que había sido tallado en la roca
  alternatives_spanish:
  - que había sido cortado de la roca
  - que había sido excavado en la roca
  - hecho en la roca
  lexicon: BDAG
  rationale: 'El participio perfecto pasivo señala un estado resultante: el sepulcro ya estaba hecho. ''Tallado en la roca'' comunica con claridad la imagen de un sepulcro excavado en roca sólida; ''cortado'' sería más literal pero menos natural en español.'
- source_word: προσεκύλισεν
  english_pob_choice: rolled
  chosen_spanish: rodó
  alternatives_spanish:
  - hizo rodar
  - acercó rodando
  lexicon: BDAG
  rationale: El verbo implica mover una piedra por rodamiento. 'Rodó' es idiomático en español y permite que la dirección se complete con la frase siguiente.
- source_word: ἐπὶ τὴν θύραν τοῦ μνημείου
  english_pob_choice: against the entrance of the tomb
  chosen_spanish: contra la entrada del sepulcro
  alternatives_spanish:
  - contra la puerta del sepulcro
  - sobre la entrada del sepulcro
  lexicon: BDAG
  rationale: θύρα puede significar 'puerta' o 'entrada'. En un sepulcro, 'entrada' comunica mejor la abertura cerrada por la piedra; 'contra' refleja bien ἐπί con movimiento hacia una superficie o cierre.
translation_notes:
  revision_awareness: 'El texto inglés auditado no requirió revisiones en la última pasada; el presente borrador sigue ese acuerdo de alta concordancia y mantiene las decisiones léxicas principales: σινδών como tela de lino, καθαιρέω como bajar, ἐνειλέω como envolver, μνημεῖον como sepulcro y θύρα como entrada.'
  spanish_consistency_notes:
  - Se mantiene 'sepulcro' de forma consistente para μνημεῖον, en lugar de alternar con 'tumba', para conservar uniformidad terminológica.
  - Se usa 'lo' como objeto directo clítico para Jesús y su cuerpo, en paralelo al inglés auditado.
  - 'La puntuación divide las cláusulas como en el flujo narrativo del griego: acciones sucesivas, luego la clausura con la piedra.'
