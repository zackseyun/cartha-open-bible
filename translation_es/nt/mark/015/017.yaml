translation:
  language: es
  text: Y lo vistieron de púrpura[a], y después de tejer una corona de espinas, se la pusieron sobre él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo vistieron con púrpura»; el griego no dice explícitamente «manto» o «ropa» en este versículo, aunque el contexto implica una prenda.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐνδιδύσκουσιν
  english_pob_choice: dress ... in
  chosen_spanish: lo vistieron de
  alternatives_spanish:
  - lo cubrieron con
  - lo pusieron con
  lexicon: BDAG
  rationale: El verbo significa poner una prenda sobre alguien. En español, «vestir de púrpura» comunica de forma natural la acción causativa sin añadir un sustantivo inexistente en el griego.
- source_word: πορφύραν
  english_pob_choice: purple
  chosen_spanish: púrpura
  alternatives_spanish:
  - morado
  - tela púrpura
  lexicon: BDAG
  rationale: El sustantivo puede referirse a tela púrpura o a una vestidura púrpura. Como el griego no especifica «manto» o «ropa», «púrpura» conserva la ambigüedad textual y mantiene el color/insignia real implícita.
- source_word: περιτιθέασιν
  english_pob_choice: they place it on him
  chosen_spanish: se la pusieron
  alternatives_spanish:
  - se la colocaron
  - se la pusieron encima
  lexicon: BDAG
  rationale: El verbo expresa poner alrededor o sobre. En español, el dativo implícito y el objeto directo referido a la corona quedan claros con «se la pusieron».
- source_word: πλέξαντες
  english_pob_choice: after weaving
  chosen_spanish: después de tejer
  alternatives_spanish:
  - habiendo tejido
  - tras tejer
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal. «Después de tejer» conserva la secuencia temporal y suena natural en español bíblico contemporáneo.
- source_word: ἀκάνθινον
  english_pob_choice: of thorns
  chosen_spanish: de espinas
  alternatives_spanish:
  - espinoso
  - hecha de espinas
  lexicon: BDAG
  rationale: El adjetivo indica algo hecho con espinas. En español, «corona de espinas» es la forma idiomática y fiel al sentido.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - diadema
  lexicon: BDAG
  rationale: Aunque στέφανος puede significar guirnalda, aquí el contexto de burla real exige «corona» para preservar la ironía narrativa sin suavizarla.
theological_decisions:
- issue: Imagen de burla real en la pasión
  english_pob_reading: Use 'crown' rather than 'wreath' for στέφανος.
  chosen_spanish_reading: Usar «corona» y no «guirnalda» para στέφανος.
  alternative_spanish_readings:
  - guirnalda
  - coroa
  rationale: La escena parodia la realeza de Jesús. «Corona» mantiene la carga irónica del texto y comunica mejor la humillación pública sin introducir interpretación extra.
  doctrine_reference: Cristología narrativa; preservación de la ironía real en la pasión.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego y el audit trail en inglés: conserva la ambigüedad de πορφύραν, explicita la secuencia del participio πλέξαντες y mantiene la imagen de burla real con «corona de espinas».'
  spanish_consistency_notes:
  - Se prefirió «púrpura» como sustantivo de color/insignia, no «manto púrpura», porque el texto griego no nombra la prenda.
  - «Se la pusieron» resuelve de modo natural la referencia anafórica a la corona sin sobreexplicar el objeto.
  - Se evitó una formulación arcaizante para conservar legibilidad litúrgica y fidelidad textual.
