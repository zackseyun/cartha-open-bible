  source_alignment_summary: 'El borrador sigue de cerca el griego y el rastro de auditoría en casi todos los puntos: ἐνδιδύσκουσιν se refleja bien con «vistieron», πορφύραν con «púrpura» sin añadir «manto», πλέξαντες con una secuencia antecedente natural, y στέφανον/ἀκάνθινον con la idiomática y teológicamente adecuada «corona de espinas». La única desviación significativa es la omisión explícita de αὐτῷ en la segunda cláusula: «se la pusieron» en español deja implícito el destinatario y debilita ligeramente «la pusieron sobre él».'
