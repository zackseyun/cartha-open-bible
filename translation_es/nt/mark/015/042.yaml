translation:
  language: es
  text: Y al atardecer[a], como era el Día de la Preparación[b] —es decir, la víspera del sábado[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ya había llegado la tarde».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Preparación», término usado para el día de preparación antes del sábado.'
    reason: cultural_note
  - marker: c
    text: 'O: «el día antes del sábado»; la expresión se refiere al día anterior al sábado, tradicionalmente el viernes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Y así
  lexicon: BDAG
  rationale: Se mantiene la coordinación narrativa de Marcos sin forzar una relación lógica más fuerte de la que el griego indica.
- source_word: ἤδη ὀψίας γενομένης
  english_pob_choice: when evening had already come
  chosen_spanish: cuando ya había anochecido
  alternatives_spanish:
  - cuando ya había llegado la noche
  - cuando la tarde ya se había hecho noche
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto expresa circunstancia temporal; en español, "ya había anochecido" reproduce de forma natural el valor de ἤδη con la idea de que la tarde/evening ya había comenzado o llegado.
- source_word: παρασκευή
  english_pob_choice: Preparation Day
  chosen_spanish: el Día de la Preparación
  alternatives_spanish:
  - la Preparación
  - el día de preparación
  lexicon: BDAG
  rationale: Se conserva el sentido calendárico idiomático del término como designación fija del día previo al sábado. La capitalización en español ayuda a marcar que no se trata de una preparación genérica sino de una denominación reconocible.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: como
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce una cláusula explicativa/causal; "como" funciona de manera natural en español narrativo y mantiene el matiz causal sin recargar el estilo.
- source_word: ὅ ἐστιν
  english_pob_choice: that is
  chosen_spanish: es decir
  alternatives_spanish:
  - o sea
  - esto es
  lexicon: BDAG
  rationale: La fórmula explicativa se vierte con una equivalencia idiomática clara en español, preservando la función aclaratoria del griego.
- source_word: προσάββατον
  english_pob_choice: the day before the Sabbath
  chosen_spanish: la víspera del sábado
  alternatives_spanish:
  - el día antes del sábado
  - la víspera del día de reposo
  lexicon: BDAG
  rationale: El compuesto y la glosa explicativa señalan el día inmediatamente anterior al sábado. "Víspera" es la forma española más natural para esa relación temporal y conserva el valor interpretativo del texto.
translation_notes:
  revision_awareness: Se siguió el acuerdo alto del audit trail inglés sin cambios de fondo. La redacción española evita calcos innecesarios, pero conserva la secuencia narrativa, la explicación calendárica y la aclaración del término específico para el día previo al sábado.
  spanish_consistency_notes:
  - Se usó "Día de la Preparación" como término técnico, coherente con la decisión inglesa de capitalizar la expresión idiomática.
  - Se eligió "sábado" para σάββατον conforme al uso bíblico común en español, sin introducir una nota doctrinal adicional.
  - La explicación con "es decir" preserva el carácter glosador de ὅ ἐστιν sin añadir contenido no presente en el griego.
