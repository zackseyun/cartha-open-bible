- from: Y cuando ya había anochecido[a], como era el Día de la Preparación[b], es decir[c], la víspera del sábado.
  to: Y al atardecer[a], como era el Día de la Preparación[b] —es decir, la víspera del sábado[c]—
  rationale: Se ajusta ὀψίας γενομένης a «al atardecer» para evitar el exceso de sentido de «anochecido»; se conservan la causalidad de ἐπεὶ y la aclaración de ὅ ἐστιν; y se reubican las notas para que correspondan con mayor precisión a las decisiones léxicas auditadas de παρασκευή y προσάββατον.
