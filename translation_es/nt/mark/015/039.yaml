    changes_summary: Revised 'the Son of God' to 'God's Son' to better reflect the anarthrous Greek expression υἱὸς θεοῦ without adding definiteness not explicit in the source. Kept the rest unchanged as accurate and natural.
translation:
  language: es
  text: 'Cuando el centurión[a], que estaba de pie frente a él, vio que expiró así, dijo: «Verdaderamente, este hombre era Hijo de Dios»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Verdaderamente, este hombre era un hijo de Dios». La expresión griega puede leerse de manera cualitativa o indefinida, pero en el contexto de Marcos probablemente lleva la fuerza del título «Hijo de Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: ἰδὼν δὲ
  english_pob_choice: Now when ... saw
  chosen_spanish: Cuando ... vio
  alternatives_spanish:
  - Y cuando ... vio
  - Pero cuando ... vio
  lexicon: BDAG
  rationale: El participio aoristo ἰδών expresa aquí una relación temporal natural en español con 'cuando'; δέ funciona como enlace leve, sin exigir contraste fuerte. Se evita añadir 'ahora' por no ser necesario en español.
- source_word: κεντυρίων
  english_pob_choice: centurion
  chosen_spanish: centurión
  alternatives_spanish:
  - oficial romano
  - capitán romano
  lexicon: BDAG
  rationale: '''Centurión'' es el equivalente preciso y ya establecido para el rango militar κεντυρίων.'
- source_word: ὁ παρεστηκὼς ἐξ ἐναντίας αὐτοῦ
  english_pob_choice: who was standing opposite him
  chosen_spanish: que estaba de pie frente a él
  alternatives_spanish:
  - que estaba de pie en frente de él
  - que estaba de pie opuesto a él
  lexicon: BDAG
  rationale: El participio perfecto comunica una posición ya asumida; 'estaba de pie' suena natural y conserva el aspecto durativo. ἐξ ἐναντίας indica ubicación frente/opuesta; 'frente a él' es claro en español sin sobrerinterpretar.
- source_word: ὅτι ⸀οὕτως ἐξέπνευσεν
  english_pob_choice: that he breathed his last in this way
  chosen_spanish: que así había expirado
  alternatives_spanish:
  - que había exhalado su último aliento de esta manera
  - que había muerto de esta manera
  lexicon: BDAG
  rationale: ἐκπνέω significa literalmente 'exhalar' y puede funcionar idiomáticamente como 'morir'. 'Había expirado' mantiene la idea verbal y la referencia a la manera de la muerte; 'así' refleja οὕτως sin perder el énfasis narrativo.
- source_word: Ἀληθῶς
  english_pob_choice: Truly
  chosen_spanish: ¡Verdaderamente!
  alternatives_spanish:
  - Ciertamente
  - ¡De veras!
  lexicon: BDAG
  rationale: '''Verdaderamente'' preserva el tono solemne y declarativo de ἀληθῶς. Se usa con exclamación para reflejar el peso confesional del dicho.'
- source_word: οὗτος ὁ ἄνθρωπος
  english_pob_choice: this man
  chosen_spanish: este hombre
  alternatives_spanish:
  - este ser humano
  - este individuo
  lexicon: BDAG
  rationale: ἄνθρωπος se refiere aquí a Jesús como varón humano individual; 'este hombre' es la traducción natural y precisa en español.
- source_word: υἱὸς θεοῦ
  english_pob_choice: God's Son
  chosen_spanish: Hijo de Dios
  alternatives_spanish:
  - un hijo de Dios
  - Hijo de Dios
  lexicon: BDAG
  rationale: Aunque el griego carece de artículo ante θεοῦ, la construcción predicativa en el contexto de Marcos apunta con fuerza a una designación cristológica. En español, 'Hijo de Dios' conserva esa carga sin imponer un artículo que no está en el griego; se evita 'un hijo de Dios' por debilitar excesivamente la confesión.
- source_word: ἦν
  english_pob_choice: was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - había sido
  lexicon: BDAG
  rationale: El imperfecto de εἰμί se puede renderizar de forma natural con 'era' en esta confesión en estilo indirecto libre/narrativo, manteniendo el valor descriptivo del estado que el centurión reconoce.
theological_decisions:
- issue: Fuerza de υἱὸς θεοῦ en la confesión del centurión
  english_pob_reading: God's Son
  chosen_spanish_reading: Hijo de Dios
  alternative_spanish_readings:
  - un hijo de Dios
  rationale: En Marcos, la expresión funciona como designación cristológica cargada (cf. 1:1; 1:11; 9:7). En español, 'Hijo de Dios' preserva mejor esa fuerza que 'un hijo de Dios', aunque el griego anartro permita debate. Se mantiene la tensión semántica sin debilitar la confesión del texto.
  doctrine_reference: Philosophy §3; cristología marcana sin añadir formulaciones no presentes en el versículo
- issue: Valor de ἐξέπνευσεν en la descripción de la muerte de Jesús
  english_pob_reading: he breathed his last in this way
  chosen_spanish_reading: había expirado así
  alternative_spanish_readings:
  - había muerto así
  - había exhalado su último aliento así
  rationale: El verbo griego puede significar literalmente 'exhalar' y, por extensión, 'morir'. 'Expirado' preserva el matiz verbal y permite que el lector perciba la observación del centurión sobre el modo de morir de Jesús, sin reducirlo a una simple afirmación de muerte.
  doctrine_reference: Sufrimiento y muerte real de Jesús; fidelidad al aspecto verbal del texto
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la auditoría inglesa: se conservó la observación espacial del centurión, el matiz idiomático de ἐξέπνευσεν y la tensión interpretativa de υἱὸς θεοῦ. A diferencia del último pase inglés, el español principal opta por ''Hijo de Dios'' sin artículo, porque el castellano reproduce mejor la indefinición formal del griego anartro sin sonar forzado; la nota preserva la lectura alternativa ''un hijo de Dios''.'
  spanish_consistency_notes:
  - Se usa 'centurión' como término técnico militar consistente con el registro bíblico.
  - Se traduce el valor de ἐξ ἐναντίας con una locución natural ('frente a él') sin añadir elementos interpretativos.
  - Se mantiene 'Hijo de Dios' en mayúsculas para reflejar la lectura cristológica principal, mientras la nota conserva la alternativa indefinida.
  - Se prefiere 'expirado' para no perder el vínculo con el verbo griego ἐκπνέω, aunque en español suene más formal que 'murió'.
