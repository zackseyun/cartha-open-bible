  text: ἰδὼν δὲ ὁ κεντυρίων ὁ παρεστηκὼς ἐξ ἐναντίας αὐτοῦ ὅτι ⸀οὕτως ἐξέπνευσεν εἶπεν· Ἀληθῶς ⸂οὗτος ὁ ἄνθρωπος⸃ υἱὸς ⸂θεοῦ ἦν⸃.
base_translation:
  language: en
  yaml_path: translation/nt/mark/015/039.yaml
  text: Now when the centurion[a], who was standing opposite him, saw that he breathed his last in this way, he said, “Truly this man was God's Son.”
  footnotes:
  - marker: a
    text: Or “Truly this man was a son of God.” The Greek expression can be read qualitatively or indefinitely, but in Mark’s context it likely carries the force of the title “Son of God.”
    reason: alternative_reading
