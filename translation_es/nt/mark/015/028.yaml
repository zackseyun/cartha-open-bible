translation:
  language: es
  text: 'Y[a] se cumplió la Escritura que dice: «Y fue contado entre los transgresores».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Este versículo falta en los manuscritos griegos más antiguos (incluidos Sinaítico y Vaticano, del siglo IV) y en traducciones coptas tempranas, pero se conserva en la tradición mayoritaria bizantina y en la tradición latina. Probablemente fue añadido más tarde por escribas como armonización con Lucas 22:37, que cita Isaías 53:12.
    reason: textual_critical
lexical_decisions:
- source_word: ἐπληρώθη / πληρόω
  english_pob_choice: was fulfilled
  chosen_spanish: se cumplió
  alternatives_spanish:
  - fue cumplida
  - se realizó
  lexicon: BDAG
  rationale: El pasivo indica realización de la Escritura profética; en español, «se cumplió» expresa con naturalidad esa consumación profética sin perder el sentido teológico de cumplimiento.
- source_word: λογίζομαι
  english_pob_choice: numbered
  chosen_spanish: fue contado
  alternatives_spanish:
  - fue enumerado
  - fue considerado
  lexicon: BDAG
  rationale: «Contado» reproduce bien la idea de ser incluido o clasificado junto con otros; en este contexto conserva la resonancia de Isaías 53:12 sin forzar un término más explicativo.
- source_word: ἄνομος
  english_pob_choice: transgressors
  chosen_spanish: transgresores
  alternatives_spanish:
  - malhechores
  - inicuos
  - sin ley
  lexicon: BDAG
  rationale: «Transgresores» comunica el peso moral y bíblico del término en la cita de Isaías 53:12. «Sin ley» sería demasiado literal y menos natural en español bíblico; «malhechores» desplaza el matiz hacia criminalidad general.
theological_decisions:
- issue: Cita/eco de Isaías 53:12 y su cumplimiento en Jesús
  english_pob_reading: And the scripture was fulfilled that says, "And he was numbered with the transgressors."
  chosen_spanish_reading: 'Y se cumplió la Escritura que dice: «Y fue contado entre los transgresores».'
  alternative_spanish_readings:
  - 'Y se cumplió la Escritura que dice: «Y fue considerado entre los transgresores»'
  - 'Y se cumplió la Escritura que dice: «Y fue enumerado entre los transgresores»'
  rationale: Se mantiene explícitamente el lenguaje de cumplimiento de la Escritura y la formulación de la cita, preservando la conexión con la profecía de Isaías 53:12 y su aplicación a Jesús.
  doctrine_reference: Isaías 53:12; Lucas 22:37
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y sin revisiones recientes; por eso la redacción española sigue de cerca la formulación recibida, con atención especial a la variante textual marcada en la nota crítica.
  spanish_consistency_notes:
  - Se mantiene «Escritura» con mayúscula por referencia bíblica.
  - Se usa «transgresores» para conservar la carga intertextual con Isaías 53:12.
  - Se evita «SEÑOR» porque el texto no contiene el nombre divino ni κύριος en esta línea.
