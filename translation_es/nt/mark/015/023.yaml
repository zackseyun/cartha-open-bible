translation:
  language: es
  text: Y le daban vino mezclado con mirra[a][b], pero él no lo tomó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vino perfumado con mirra».'
    reason: lexical_alternative
  - marker: b
    text: 'El griego usa literalmente una construcción relativa resumptiva, equivalente a: «pero él no lo tomó».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδίδουν
  english_pob_choice: they were giving
  chosen_spanish: le daban
  alternatives_spanish:
  - le estaban dando
  - le ofrecían
  lexicon: BDAG
  rationale: El imperfecto griego expresa una acción en curso o intentada; «le daban» conserva esa idea en español con naturalidad. «Le estaban dando» sería más explícito, pero menos conciso. «Le ofrecían» es posible, pero desplaza el valor básico de δίδωμι hacia una formulación más interpretativa.
- source_word: ἐσμυρνισμένον οἶνον
  english_pob_choice: wine mixed with myrrh
  chosen_spanish: vino mezclado con mirra
  alternatives_spanish:
  - vino con mirra
  - vino perfumado con mirra
  - vino aromatizado con mirra
  lexicon: BDAG
  rationale: σμυρνίζω indica preparar o mezclar con mirra. «Vino mezclado con mirra» es claro y mantiene la referencia concreta al ingrediente sin añadir una explicación interpretativa.
- source_word: ὃς δὲ
  english_pob_choice: but he
  chosen_spanish: pero él
  alternatives_spanish:
  - y él
  - sin embargo, él
  lexicon: BDAG
  rationale: 'Aunque el griego usa una forma relativa resumptiva, en español lo más natural y fiel al sentido es una construcción adversativa simple: «pero él». Así se conserva el contraste narrativo sin forzar la sintaxis.'
- source_word: ἔλαβεν
  english_pob_choice: did not take it
  chosen_spanish: no lo tomó
  alternatives_spanish:
  - no lo recibió
  - no lo aceptó
  lexicon: BDAG
  rationale: λαμβάνω aquí puede entenderse como «tomar» o «recibir». «No lo tomó» es directo y reproduce el verbo sin añadir matices no explicitados por el texto.
theological_decisions:
- issue: Razón de la negativa de Jesús a beber
  english_pob_reading: Render the action descriptively without importing an explanation for why he refused it.
  chosen_spanish_reading: Traducir la acción de manera descriptiva, sin introducir una explicación sobre por qué no lo tomó.
  alternative_spanish_readings:
  - Rechazó una bebida narcótica para aliviar el dolor
  - No aceptó una bebida acostumbrada por otras razones
  rationale: El versículo solo afirma que le daban vino mezclado con mirra y que él no lo tomó. La traducción no debe incluir una interpretación que el griego no expresa explícitamente.
  doctrine_reference: Conservar la tensión teológica sin resolverla interpretativamente.
translation_notes:
  revision_awareness: 'El texto sigue el estado más reciente del audit trail en inglés: no hay revisiones aplicadas y el consenso es alto, con solo observaciones menores. La redacción española mantiene el valor aspectual del imperfecto, la referencia concreta a la mirra y la negativa de Jesús sin explicaciones añadidas.'
  spanish_consistency_notes:
  - Se mantiene «mirra» como equivalente directo de myrrh.
  - Se usa «tomó» para λαμβάνω en el sentido contextual de recibir o aceptar la bebida.
  - La puntuación reproduce el contraste breve del griego con una adversativa natural en español.
  - Las notas a y b reflejan alternativas y una observación sintáctica que el inglés POB preservó en sus notas.
