translation:
  language: es
  text: Entonces los soldados lo llevaron dentro del patio[a], que es el pretorio, y convocan a toda la cohorte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «dentro de la sede del gobernador».'
    reason: lexical_alternative
  - marker: b
    text: Una «cohorte» era una unidad militar romana; aquí se refiere a los soldados reunidos bajo autoridad romana.
    reason: cultural_note
lexical_decisions:
- source_word: Οἱ δὲ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ marca aquí transición narrativa más que contraste fuerte; «Entonces» conserva el avance de la escena en español sin añadir énfasis ajeno.
- source_word: στρατιῶται
  english_pob_choice: soldiers
  chosen_spanish: soldados
  alternatives_spanish:
  - tropas
  lexicon: BDAG
  rationale: «Soldados» es la equivalencia directa y natural para στρατιῶται.
- source_word: ἀπήγαγον
  english_pob_choice: led
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo llevaron aparte
  lexicon: BDAG
  rationale: ἀπάγω puede expresar llevar o conducir a alguien; en contexto narrativo, «lo llevaron» es idiomático y conserva el movimiento hacia dentro especificado por ἔσω.
- source_word: ἔσω τῆς αὐλῆς
  english_pob_choice: inside the courtyard
  chosen_spanish: adentro del patio
  alternatives_spanish:
  - dentro del patio
  - al interior del patio
  - dentro del atrio
  lexicon: BDAG
  rationale: αὐλή puede ser patio, atrio o patio/courtyard según el contexto. Aquí «patio» es claro en español y evita sobrecargar con una precisión interpretativa mayor que la del texto; «adentro» mantiene ἔσω como interioridad espacial.
- source_word: ὅ ἐστιν πραιτώριον
  english_pob_choice: which is the praetorium
  chosen_spanish: que es el pretorio
  alternatives_spanish:
  - es decir, la sede del gobernador
  - que es la residencia del gobernador
  lexicon: BDAG
  rationale: Se conserva «pretorio» para mantener el término técnico romano, como hace la POB en inglés con «praetorium». La cláusula explicativa del griego ya funciona como glosa.
- source_word: συγκαλοῦσιν
  english_pob_choice: they call together
  chosen_spanish: convocaron
  alternatives_spanish:
  - llamaron juntos
  - reunieron
  - convocan
  lexicon: BDAG
  rationale: El compuesto puede expresar reunir mediante convocatoria. «Convocaron» transmite con precisión la acción de reunir por llamado en un registro natural y digno.
- source_word: ὅλην τὴν σπεῖραν
  english_pob_choice: the whole cohort
  chosen_spanish: toda la cohorte
  alternatives_spanish:
  - toda la compañía
  - todo el destacamento
  lexicon: BDAG
  rationale: σπεῖρα designa una unidad militar romana; «cohorte» preserva el sentido técnico, tal como la POB en inglés, y «toda» refleja ὅλην.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el archivo auditado en inglés de la POB. Mantiene la progresión narrativa de δέ, conserva los términos técnicos «pretorio» y «cohorte», y evita expandir ἔσω τῆς αὐλῆς más allá de lo que el griego y la POB documentan. No se detectaron revisiones previas que obligaran a cambiar la línea actual.
  spanish_consistency_notes:
  - Se usa «pretorio» como tecnicismo romano consistente con el inglés POB «praetorium».
  - Se mantiene la distinción entre movimiento espacial («adentro») y lugar («patio»).
  - «Convocaron» refleja una llamada para reunir, coherente con el presente histórico de Marcos sin forzar una traducción demasiado literal del tiempo verbal griego.
