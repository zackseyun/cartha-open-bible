  to: Entonces los soldados lo llevaron dentro del patio[a], que es el pretorio, y convocan a toda la cohorte[b].
  rationale: 'La revisión hace tres ajustes menores pero importantes: (1) cambia ''convocaron'' por ''convocan'' para conservar el presente histórico de Marcos y la decisión auditada en inglés; (2) corrige la nota [a] para reflejar la alternativa documentada relacionada con el conjunto del lugar como sede del gobernador, en vez de una simple variación ''patio/atrio''; y (3) añade la nota cultural sobre ''cohorte'' para preservar la ayuda explicativa presente en la POB inglesa. También se suaviza ''adentro'' a ''dentro'' por mayor naturalidad y dignidad en español bíblico moderno.'
