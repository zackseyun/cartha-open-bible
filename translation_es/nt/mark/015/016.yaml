review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido básico del griego: los soldados llevan a Jesús al interior del patio/pretorio y reúnen a toda la cohorte. Sin embargo, no preserva del todo un matiz importante del texto y de la auditoría inglesa: συγκαλοῦσιν está en presente histórico en Marcos, y la POB inglesa lo reflejó con ''they call together''. El español ''convocaron'' lo normaliza innecesariamente al pasado. Además, la nota [a] no refleja la alternativa documentada en inglés y añade una variante redundante sobre ''patio/atrio'' que no responde al punto principal de αὐλή en este contexto.'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse levemente para ajustarse mejor al estilo auditado y al flujo narrativo. 'Adentro del patio' es comprensible, aunque 'dentro del patio' suena un poco más sobrio. 'Convocan' preserva mejor la viveza marcana. También conviene completar la nota cultural sobre 'cohorte', ya presente en inglés, porque 'cohorte' puede no ser transparente para todos los lectores.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Pretorio' y 'cohorte' están bien elegidos para πραιτώριον y σπεῖρα. La revisión propuesta conserva esos términos técnicos, añade la nota cultural sobre 'cohorte', y ajusta la nota de αὐλή para alinearla con la alternativa inglesa sobre 'la sede del gobernador' vinculada al conjunto espacial.
  issues:
  - severity: medium
    issue: Se pierde el presente histórico de συγκαλοῦσιν
    rationale: El griego usa presente histórico y la POB inglesa lo conservó con 'they call together'. 'Convocaron' cambia el aspecto narrativo; 'convocan' o 'llaman' reproduce mejor el estilo de Marcos.
  - severity: medium
    issue: La nota [a] no corresponde a la alternativa preservada en la auditoría inglesa
    rationale: La nota inglesa en ese punto ofrece 'which is the governor’s headquarters', mientras que la nota española actual introduce variantes de 'patio/atrio' que no son la alternativa principal documentada.
  - severity: low
    issue: Falta la nota cultural sobre 'cohorte'
    rationale: La auditoría inglesa incluye una explicación cultural para σπεῖρα. Dado que 'cohorte' es un término técnico menos transparente en español, conviene conservarla.
  revised_spanish_text: Entonces los soldados lo llevaron dentro del patio[a], que es el pretorio, y convocan a toda la cohorte[b].
