revisions:
- from: 'Pero Pilato les iba diciendo[a]: «¿Pues qué mal ha hecho?». Pero ellos gritaban con más fuerza: «¡Crucifícalo!»'
  to: 'Pero Pilato les decía[a]: «Pues, ¿qué mal ha hecho?» Pero ellos gritaron todavía más: «¡Crucifícalo!»'
  rationale: Se ajusta ἔκραξαν al aoristo con «gritaron», se suaviza «iba diciendo» a «decía» para una lectura más natural sin perder el imperfecto, se refuerza la comparación de περισσῶς con «todavía más», y se reemplaza la nota por una alternativa real que refleja la opción documentada en inglés.
