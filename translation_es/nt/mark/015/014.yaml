translation:
  language: es
  text: 'Pero Pilato les decía[a]: «Pues, ¿qué mal ha hecho?» Pero ellos gritaron todavía más: «¡Crucifícalo!»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Por qué? ¿Qué mal ha hecho?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγεν
  english_pob_choice: was saying
  chosen_spanish: iba diciendo
  alternatives_spanish:
  - decía
  - seguía diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción շարունակada o repetida. «Iba diciendo» conserva ese aspecto en español sin volverla demasiado pesada; «decía» puede sonar puntual y perder esa continuidad.
- source_word: Τί γὰρ ἐποίησεν κακόν
  english_pob_choice: For what evil has he done?
  chosen_spanish: ¿Pues qué mal ha hecho?
  alternatives_spanish:
  - ¿Pues qué mal ha hecho?
  - ¿Por qué, qué mal ha hecho?
  - ¿Qué mal ha hecho?
  lexicon: BDAG
  rationale: En español, «¿pues qué mal ha hecho?» mantiene el valor interrogativo y la partícula explicativa de γάρ de manera natural. «Mal» conserva la fuerza moral de κακόν sin introducir una formulación demasiado abstracta.
- source_word: κακόν
  english_pob_choice: evil
  chosen_spanish: mal
  alternatives_spanish:
  - mal
  - maldad
  - daño
  lexicon: BDAG
  rationale: κακόν tiene fuerza moral. En español, «mal» comunica esa carga mejor que «daño» o una explicación más débil como «error»; «maldad» sería más interpretativo y menos directo en esta pregunta.
- source_word: περισσῶς
  english_pob_choice: all the more
  chosen_spanish: con más fuerza
  alternatives_spanish:
  - cada vez más
  - todavía más
  - con mayor ímpetu
  lexicon: BDAG
  rationale: El adverbio intensifica la respuesta del pueblo. «Con más fuerza» transmite bien la escalada audible del grito en un español natural; conserva la intensificación sin forzar una traducción adverbial rígida.
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - gritaban
  - alzaban la voz
  lexicon: BDAG
  rationale: La acción es un alboroto público y en voz alta. «Gritaban» es la forma más directa y natural para un clamor colectivo; aunque «clamaban» es posible, suena más elevado y menos inmediato.
- source_word: Σταύρωσον αὐτόν
  english_pob_choice: Crucify him!
  chosen_spanish: ¡Crucifícalo!
  alternatives_spanish:
  - ¡Crucifícalo!
  - ¡Que lo crucifiquen!
  - ¡Haz que lo crucifiquen!
  lexicon: BDAG
  rationale: El imperativo directo se conserva mejor con «¡Crucifícalo!». Es la equivalencia más transparente y tradicional en español para la orden dirigida a Pilato.
- source_word: Πιλᾶτος
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  alternatives_spanish:
  - Pilato
  lexicon: Nombre propio estándar
  rationale: Nombre propio transliterado según uso establecido en español bíblico.
theological_decisions:
- issue: Fuerza moral de κακόν en la pregunta de Pilato
  english_pob_reading: Rendered as 'evil' rather than 'wrong'
  chosen_spanish_reading: «mal» mantiene la carga moral sin suavizarla
  alternative_spanish_readings:
  - «daño» sería demasiado débil
  - «maldad» sería más interpretativo
  rationale: La pregunta de Pilato cuestiona la base moral y legal de la condena. «Mal» preserva esa tensión semántica de manera sobria y fiel, sin añadir una doctrina ajena al texto.
  doctrine_reference: Primacía del texto original; conservación de la fuerza moral/forense de κακόν
translation_notes:
  revision_awareness: 'El verso coincide sustancialmente con el audit trail inglés: imperfecto para ἔλεγεν, intensificación para περισσῶς, y pregunta moral para τί γὰρ ἐποίησεν κακόν. La única adaptación principal es ajustar el orden y la idiomaticidad del español con «iba diciendo» y «¿Pues qué mal ha hecho?» para mantener naturalidad sin perder las decisiones lexicales del POB.'
  spanish_consistency_notes:
  - Se mantiene «Pilato» como nombre propio estándar.
  - Se conserva el registro sobrio y directo, sin expandir el texto con explicaciones.
  - La exclamación final reproduce la urgencia del imperativo griego.
  - «Mal» funciona aquí como equivalente de κακόν con fuerza moral, coherente con la decisión inglesa de usar «evil».
