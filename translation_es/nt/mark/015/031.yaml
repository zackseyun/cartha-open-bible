revisions:
- from: 'Del mismo modo, los sumos sacerdotes[a], burlándose entre ellos con los escribas, decían: «A otros salvó; a sí mismo no puede salvarse».'
  to: 'Del mismo modo, los principales sacerdotes[a], burlándose entre ellos con los escribas, decían: «A otros salvó; no puede salvarse a sí mismo».'
  rationale: Se reemplaza «sumos sacerdotes» por «principales sacerdotes» para ajustarse a la decisión léxica documentada para ἀρχιερεῖς y evitar una implicación histórica imprecisa. Se mejora la segunda cláusula a «no puede salvarse a sí mismo» para reflejar más explícitamente ἑαυτόν. Se rehace la nota para que ofrezca una alternativa real y aclare la posible estructura de la frase griega.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T20:49:20Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ὁμοίως = «Del mismo modo», ἐμπαίζοντες = «burlándose», μετὰ τῶν γραμματέων = «con los escribas», ἔλεγον = «decían», y conserva la repetición de σῴζω con «salvó ... salvar». Sin embargo, «sumos sacerdotes» para ἀρχιερεῖς no sigue la preferencia documentada del POB inglés («chief priests») ni su razón léxica, y en español puede sugerir impropiamente varios titulares del sumo sacerdocio. Además, «no puede salvarse» expresa el sentido, pero atenúa ligeramente la correspondencia formal con «ἑαυτὸν ... σῶσαι» mejor representada por «salvarse a sí mismo».'
  spanish_quality_summary: El español es claro y natural, con registro bíblico moderno y digno. La frase «burlándose entre ellos con los escribas» es entendible, pero la nota al pie no aporta una verdadera alternativa en español, porque repite casi exactamente la redacción del texto principal en vez de aclarar la ambigüedad sintáctica. Una formulación más directa y fiel sería preferible.
  glossary_alignment: 'Hay un desajuste importante con la terminología del proyecto en ἀρχιερεῖς: debe evitarse «sumos sacerdotes» aquí y preferirse «principales sacerdotes» para reflejar el grupo dirigente sacerdotal, en línea con la justificación del audit trail. No hay conflictos con Yahvé, Mesías, espíritu, esclavo, etc., en este versículo.'
  issues:
