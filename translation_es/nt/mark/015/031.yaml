    rationale: El audit trail inglés eligió «chief priests» precisamente para evitar la implicación de múltiples «high priests». En español, «sumos sacerdotes» transmite esa misma dificultad y no preserva bien la razón léxica documentada.
  - severity: medium
    issue: La nota [a] repite prácticamente el texto principal
    rationale: La nota debe preservar una alternativa o aclaración real. Tal como está, «O “burlándose entre ellos con los escribas”» no ofrece contraste útil con el texto español ya dado, y no ayuda al lector a percibir la ambigüedad de πρὸς ἀλλήλους.
  - severity: low
    issue: «no puede salvarse» frente a «no puede salvarse a sí mismo»
    rationale: La forma actual es idiomática y correcta, pero añadir «a sí mismo» preserva con más transparencia el pronombre reflexivo ἑαυτόν y el paralelismo de la burla.
  revised_spanish_text: 'Del mismo modo, los principales sacerdotes[a], burlándose entre ellos con los escribas, decían: «A otros salvó; no puede salvarse a sí mismo».'
