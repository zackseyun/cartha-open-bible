translation:
  language: es
  text: 'Del mismo modo, los principales sacerdotes[a], burlándose entre ellos con los escribas, decían: «A otros salvó; no puede salvarse a sí mismo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «burlándose unos con otros junto con los escribas». La frase griega puede destacar la interacción recíproca entre los principales sacerdotes, con los escribas uniéndose a ellos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁμοίως
  english_pob_choice: In the same way
  chosen_spanish: Del mismo modo
  alternatives_spanish:
  - Igualmente
  - Así también
  lexicon: BDAG
  rationale: Expresa la relación comparativa con el contexto anterior sin sonar rígido; conserva el valor de paralelo marcado por ὁμοίως.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: los sumos sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los jefes sacerdotales
  lexicon: BDAG
  rationale: En español bíblico, «sumos sacerdotes» comunica bien el grupo dirigente del sacerdocio. Se evita una traducción demasiado literal que sonaría menos natural.
- source_word: ἐμπαίζοντες
  english_pob_choice: mocking
  chosen_spanish: burlándose
  alternatives_spanish:
  - ridiculizándose
  - escarneciendo
  lexicon: BDAG
  rationale: «Burlándose» transmite el tono de desprecio y burla pública del participio sin volverse arcaico.
- source_word: πρὸς ἀλλήλους
  english_pob_choice: among themselves
  chosen_spanish: entre ellos
  alternatives_spanish:
  - unos a otros
  - mutuamente
  lexicon: BDAG
  rationale: La frase indica interacción recíproca dentro del grupo. «Entre ellos» refleja el matiz de conversación interna mejor que un simple «unos a otros» en este contexto.
- source_word: μετὰ τῶν γραμματέων
  english_pob_choice: with the scribes
  chosen_spanish: con los escribas
  alternatives_spanish:
  - junto con los escribas
  - en compañía de los escribas
  lexicon: BDAG
  rationale: Mantiene la idea de que los escribas se unían a la burla junto con los sumos sacerdotes.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - seguían diciendo
  - estaban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego sugiere acción continua o repetida; en español, «decían» lo comunica de manera natural sin sobrecarga aspectual.
- source_word: Ἄλλους ἔσωσεν
  english_pob_choice: He saved others
  chosen_spanish: A otros salvó
  alternatives_spanish:
  - Salvó a otros
  - A otros rescató
  lexicon: BDAG
  rationale: Se conserva la repetición de σῴζω en español con «salvó» para mantener el contraste irónico con el segundo miembro de la frase.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  - a sí mismo
  lexicon: BDAG
  rationale: En español, con el infinitivo «salvarse», «a sí mismo» expresa con claridad el referente reflexivo y el énfasis del griego.
- source_word: οὐ δύναται σῶσαι
  english_pob_choice: he cannot save himself
  chosen_spanish: no puede salvarse
  alternatives_spanish:
  - no puede salvar a sí mismo
  - no es capaz de salvarse
  lexicon: BDAG
  rationale: La construcción reflexiva en español es la forma más natural para reproducir el sentido de incapacidad expresado por δύναται σῶσαι.
theological_decisions:
- issue: Preservación de la repetición de σῴζω para la ironía del dicho
  english_pob_reading: saved ... save
  chosen_spanish_reading: salvó ... salvarse
  alternative_spanish_readings:
  - rescató ... rescatarse
  - libró ... librarse
  rationale: 'Se mantiene el mismo campo verbal en ambas cláusulas para conservar la ironía del texto: el que «salvó» a otros, aparentemente, no puede «salvarse» a sí mismo. «Salvar» es el término más directo y teológicamente estable en este contexto.'
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de πρὸς ἀλλήλους en contexto de burla colectiva
  english_pob_reading: mocking among themselves
  chosen_spanish_reading: burlándose entre ellos
  alternative_spanish_readings:
  - burlándose unos a otros
  - burlándose entre sí
  rationale: La decisión evita sugerir que se burlaban principalmente unos de otros; el griego indica más bien una burla compartida dentro del grupo, en conversación recíproca.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El inglés POB revisó la frase desde «mocking one another» a «mocking among themselves» para reflejar mejor πρὸς ἀλλήλους. La versión española sigue esa revisión con «burlándose entre ellos», manteniendo además la unión de los escribas con el grupo. También se conservó la repetición verbal de σῴζω con «salvó / salvarse» para reflejar la ironía del original.
  spanish_consistency_notes:
  - Se usa «sumos sacerdotes» para ἀρχιερεῖς, en línea con el valor de plural dirigente del término.
  - Se preserva «escribas» para γραμματέων como designación bíblica estable.
  - Se mantiene «salvó / salvarse» para σῴζω a fin de conservar la repetición léxica del griego.
  - La puntuación y las comillas siguen el estilo español contemporáneo para cita directa bíblica.
