  text: ὁμοίως καὶ οἱ ἀρχιερεῖς ἐμπαίζοντες πρὸς ἀλλήλους μετὰ τῶν γραμματέων ἔλεγον· Ἄλλους ἔσωσεν, ἑαυτὸν οὐ δύναται σῶσαι·
base_translation:
  language: en
  yaml_path: translation/nt/mark/015/031.yaml
  text: In the same way the chief priests[a], mocking among themselves with the scribes, were saying, “He saved others; he cannot save himself.”
