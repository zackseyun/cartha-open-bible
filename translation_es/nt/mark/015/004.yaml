    issue: «le preguntó» no refleja bien el imperfecto ἐπηρώτα
    rationale: El griego presenta una acción repetida o continuada. Con πάλιν, una formulación como «volvió a preguntarle» reproduce mejor el valor aspectual sin forzar el español.
  - severity: high
