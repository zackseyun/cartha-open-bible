revisions:
- from: 'Pero Pilato nuevamente le preguntó, diciendo: «¿No respondes nada?[a] Mira cuántas acusaciones presentan contra ti.»'
  to: 'Pero Pilato volvió a preguntarle, diciendo: «¿No respondes nada? Mira[a] cuántas acusaciones presentan contra ti.»'
  rationale: Se ajusta el verbo principal a «volvió a preguntarle» para reflejar mejor el imperfecto ἐπηρώτα en combinación con πάλιν, en un español más idiomático. Se corrige la nota al pie para que exprese de manera natural y fiel la alternativa más literal basada en πόσα («cuántas cosas») dentro del contexto judicial de κατηγοροῦσιν. Se elimina el anclaje de nota desde la pregunta y se coloca en «Mira», donde corresponde a la cláusula alternativa completa preservada por el English POB.
