translation:
  language: es
  text: 'Pero Pilato volvió a preguntarle, diciendo: «¿No respondes nada? Mira[a] cuántas acusaciones presentan contra ti.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Mira de cuántas cosas te acusan».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: En español, 'Pero' comunica la leve transición con matiz de contraste que introduce la nueva acción de Pilato sin forzar una oposición fuerte.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: nuevamente
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: BDAG
  rationale: '''Nuevamente'' conserva la repetición del acto y mantiene un registro sobrio y natural.'
- source_word: ἐπηρώτα
  english_pob_choice: questioned
  chosen_spanish: le preguntó
  alternatives_spanish:
  - le cuestionó
  - lo interrogó
  lexicon: BDAG
  rationale: El imperfecto sugiere acción continuada o repetida; en español 'le preguntó' es natural y suficiente aquí, sin exagerar hacia 'interrogó', que podría sonar más fuerte que el griego.
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: El participio introduce la cita directa; 'diciendo' preserva la estructura del original de forma transparente.
- source_word: Οὐκ ἀποκρίνῃ οὐδέν;
  english_pob_choice: Do you give no answer?
  chosen_spanish: ¿No respondes nada?
  alternatives_spanish:
  - ¿No das ninguna respuesta?
  - ¿No tienes respuesta?
  lexicon: BDAG
  rationale: La pregunta negativa en griego presiona el silencio de Jesús. '¿No respondes nada?' expresa de manera idiomática y fiel esa fuerza sin añadir elementos ajenos.
- source_word: ἴδε
  english_pob_choice: See
  chosen_spanish: Mira
  alternatives_spanish:
  - Ve
  - Observa
  lexicon: BDAG
  rationale: El imperativo llama la atención sobre la escena. 'Mira' es natural en español y conserva la vivacidad directa del mandato.
- source_word: πόσα
  english_pob_choice: how many charges
  chosen_spanish: cuántas acusaciones
  alternatives_spanish:
  - cuántas cosas
  - cuántos cargos
  lexicon: BDAG
  rationale: Aunque literalmente significa 'cuántas cosas', el contexto judicial exige explicitar el sentido de acusaciones. 'Acusaciones' mantiene el contenido legal sin sobretraducir.
- source_word: σου
  english_pob_choice: against you
  chosen_spanish: contra ti
  alternatives_spanish:
  - de ti
  lexicon: BDAG
  rationale: Con κατηγορέω, el genitivo marca a la persona acusada; en español jurídico y natural, 'contra ti' expresa mejor esa relación.
- source_word: κατηγοροῦσιν
  english_pob_choice: they bring against you
  chosen_spanish: presentan contra ti
  alternatives_spanish:
  - acusan contra ti
  - formulan contra ti
  lexicon: BDAG
  rationale: El presente indica una acción en curso. 'Presentan contra ti' funciona bien en registro jurídico y evita la construcción menos natural 'acusar contra' en español, sin perder la idea de cargos presentados.
theological_decisions:
- issue: El tono de la pregunta negativa de Pilato y el peso judicial de la acusación
  english_pob_reading: Do you give no answer? See how many charges they bring against you.
  chosen_spanish_reading: ¿No respondes nada? Mira cuántas acusaciones presentan contra ti.
  alternative_spanish_readings:
  - ¿No das ninguna respuesta? Mira cuántos cargos presentan contra ti.
  - ¿No tienes nada que responder? Mira cuántas acusaciones formulan contra ti.
  rationale: 'No hay una cuestión doctrinal, pero sí una tensión retórica: la frase expresa presión judicial y asombro ante el silencio de Jesús. La traducción conserva esa confrontación sin suavizarla ni convertirla en una simple observación.'
  doctrine_reference: Narrativa de la Pasión; no aplica una referencia doctrinal específica
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó 'Look' a 'See' y simplificó el presente para reflejar con más precisión el griego. En español, la opción 'Mira' + 'presentan' conserva la naturalidad verbal y el valor presente continuo del enunciado legal.
  spanish_consistency_notes:
  - Se mantiene el registro narrativo sobrio y judicial adecuado a Marcos.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el texto.
  - '''Acusaciones'' y ''presentan contra ti'' preservan el campo semántico legal de κατηγορέω.'
  - La nota al pie queda anclada exactamente en 'nada?[a]' para cumplir la validación de marcadores.
