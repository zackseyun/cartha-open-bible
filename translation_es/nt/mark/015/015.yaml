translation:
  language: es
  text: Entonces Pilato[a], queriendo satisfacer a la multitud, les liberó a Barrabás; y, después de haber hecho azotar a Jesús, lo entregó para que fuera crucificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «para contentar a la multitud». Literalmente: «para hacer lo suficiente para la multitud».'
    reason: lexical_alternative
lexical_decisions:
- source_word: βουλόμενος
  english_pob_choice: wanting
  chosen_spanish: queriendo
  alternatives_spanish:
  - deseando
  - intentando
  - queriendo hacer
  lexicon: BDAG
  rationale: El participio expresa la voluntad o intención de Pilato. «Queriendo» es natural en español y conserva el valor volitivo sin sobreinterpretar el grado de deliberación.
- source_word: τῷ ὄχλῳ τὸ ἱκανὸν ποιῆσαι
  english_pob_choice: to satisfy the crowd
  chosen_spanish: satisfacer a la multitud
  alternatives_spanish:
  - hacer lo suficiente para la multitud
  - complacer a la multitud
  - contentar a la multitud
  lexicon: BDAG
  rationale: La expresión es idiomática y literalmente alude a «hacer lo suficiente» para la multitud. En español, «satisfacer a la multitud» comunica de forma clara la idea de apaciguamiento o concesión política, manteniendo la tensión moral del pasaje.
- source_word: ἀπέλυσεν
  english_pob_choice: released
  chosen_spanish: les soltó
  alternatives_spanish:
  - los liberó
  - los dejó libres
  - les concedió la libertad
  lexicon: BDAG
  rationale: En este contexto judicial, el verbo se refiere a dejar ir a un preso. «Les soltó» es idiomático en español bíblico moderno y conserva la brevedad del griego.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: BDAG
  rationale: El dativo señala a la multitud como receptora de la decisión. En español, el dativo átono «les» expresa esa relación de manera natural.
- source_word: παρέδωκεν
  english_pob_choice: handed him over
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo puso en manos de ellos
  - lo entregó en sus manos
  - lo remitió
  lexicon: BDAG
  rationale: Παραδίδωμι es un verbo de entrega con peso narrativo y pasional. «Lo entregó» mantiene ese valor sin volver la frase forzada; el contexto ya implica que fue entregado al poder de otros.
- source_word: φραγελλώσας
  english_pob_choice: after having Jesus flogged
  chosen_spanish: después de haber hecho azotar a Jesús
  alternatives_spanish:
  - tras azotar a Jesús
  - después de azotar a Jesús
  - una vez azotado Jesús
  lexicon: BDAG
  rationale: El participio aoristo anterior al verbo principal indica una acción previa. «Después de haber hecho azotar a Jesús» refleja con precisión que Pilato ordenó el azote, y «hacer azotar» evita atribuirle a Pilato la ejecución material directa.
- source_word: Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  alternatives_spanish:
  - Jesús
  lexicon: convención de transliteración
  rationale: Nombre propio transliterado de forma estándar.
- source_word: Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barrabás
  lexicon: convención de transliteración
  rationale: Nombre propio transliterado según el uso habitual en español bíblico.
theological_decisions:
- issue: Tono de la motivación de Pilato en τῷ ὄχλῳ τὸ ἱκανὸν ποιῆσαι
  english_pob_reading: Pilate acted to satisfy the crowd’s demand
  chosen_spanish_reading: Pilato actuó para satisfacer a la multitud
  alternative_spanish_readings:
  - Pilato actuó para complacer a la multitud
  - Pilato actuó para hacer lo conveniente para la multitud
  rationale: La frase describe una concesión política, no un servicio benevolente. «Satisfacer a la multitud» preserva el sentido de apaciguamiento y el conflicto narrativo sin añadir comentario interpretativo ajeno al griego.
  doctrine_reference: 'Principio de traducción: conservar el sentido llano del texto fuente y su tensión narrativa.'
- issue: Relación entre el azote y la crucifixión en ἵνα σταυρωθῇ
  english_pob_reading: to be crucified
  chosen_spanish_reading: para que fuera crucificado
  alternative_spanish_readings:
  - a fin de que fuera crucificado
  - para ser crucificado
  rationale: La cláusula de finalidad expresa el resultado esperado de la entrega. «Para que fuera crucificado» mantiene la dirección causal y el matiz de propósito/resultante del original.
  doctrine_reference: Lectura narrativa y sintáctica de ἵνα en contexto de finalidad/resulto.
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre literalidad y naturalidad: se mantuvo la secuencia narrativa del griego (soltar a Barrabás, azotar a Jesús, entregarlo para la crucifixión) y se evitó una traducción demasiado mecánica de τὸ ἱκανὸν ποιῆσαι, siguiendo el criterio óptimo-equivalente del POB inglés.'
  spanish_consistency_notes:
  - Se emplea «multitud» para ὄχλος, en coherencia con un registro bíblico claro y contemporáneo.
  - Se usa «entregar» para παραδίδωμι, conservando el valor pasional/jurídico del verbo.
  - Se eligió «hacer azotar» para φραγελλώσας, destacando la orden de Pilato y la anterioridad temporal.
  - Se mantiene el nombre propio «Barrabás» y «Jesús» por convención estable en español.
  - La nota a pie preserva la alternativa «contentar» porque puede ser la opción más natural en algunos contextos de lectura, aunque «satisfacer» refleja mejor la tensión moral del pasaje.
