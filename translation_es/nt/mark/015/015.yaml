    text: 'O «para contentar a la multitud». Literalmente: «para hacer lo suficiente para la multitud».'
    reason: lexical_alternative
  revision_rationale: 'Se hace una corrección menor de estilo y naturalidad: «Entonces» representa mejor el flujo narrativo de δέ, y «les liberó a Barrabás» comunica con más claridad y dignidad el sentido judicial de ἀπέλυσεν αὐτοῖς sin la aspereza de «les soltó a Barrabás». El resto del verso preserva fielmente la secuencia, la motivación de Pilato y la finalidad de la crucifixión.'
