revisions:
- from: Así que Pilato[a], queriendo satisfacer a la multitud, les soltó a Barrabás; y, después de haber hecho azotar a Jesús, lo entregó para que fuera crucificado.
  to: Entonces Pilato[a], queriendo satisfacer a la multitud, les liberó a Barrabás; y, después de haber hecho azotar a Jesús, lo entregó para que fuera crucificado.
  rationale: 'Se hace una corrección menor de estilo y naturalidad: «Entonces» representa mejor el flujo narrativo de δέ, y «les liberó a Barrabás» comunica con más claridad y dignidad el sentido judicial de ἀπέλυσεν αὐτοῖς sin la aspereza de «les soltó a Barrabás». El resto del verso preserva fielmente la secuencia, la motivación de Pilato y la finalidad de la crucifixión.'
  reviewer_model: gpt-5.4
