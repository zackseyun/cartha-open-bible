translation:
  language: es
  text: 'Y los que pasaban lo injuriaban[a], meneando la cabeza y diciendo[b]: «¡Ajá! Tú que derribas el templo y lo edificas en tres días,»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más específicamente, «el santuario».
    reason: lexical_alternative
  - marker: b
    text: O «lo reconstruyes en tres días». El verbo griego significa simplemente «construir/edificar», aunque el contexto puede implicar reconstrucción.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραπορευόμενοι
  english_pob_choice: those passing by
  chosen_spanish: los que pasaban
  alternatives_spanish:
  - los transeúntes
  - los que iban pasando
  lexicon: BDAG
  rationale: El participio describe a personas que iban pasando por el lugar. «Los que pasaban» conserva el valor progresivo y suena natural en español.
- source_word: ἐβλασφήμουν
  english_pob_choice: were reviling
  chosen_spanish: lo desacraban
  alternatives_spanish:
  - lo injuriaban
  - lo blasfemaban
  - lo insultaban
  lexicon: BDAG
  rationale: El contexto es el de insultos hostiles dirigidos contra Jesús. «Desacrar» intenta conservar la fuerza de βλασφημέω sin reducirlo solo a un tecnicismo religioso ni perder la carga ofensiva del acto. Se mantiene el imperfecto con valor durativo.
- source_word: κινοῦντες τὰς κεφαλὰς αὐτῶν
  english_pob_choice: shaking their heads
  chosen_spanish: meneando la cabeza
  alternatives_spanish:
  - sacudiendo la cabeza
  - moviendo la cabeza
  lexicon: BDAG
  rationale: Es un gesto idiomático de burla. «Meneando la cabeza» reproduce bien el gesto en español y conserva el matiz despectivo.
- source_word: Οὐὰ
  english_pob_choice: Aha!
  chosen_spanish: ¡Ja!
  alternatives_spanish:
  - ¡Ajá!
  - ¡Bah!
  - ¡Ja, ja!
  lexicon: BDAG
  rationale: Es una exclamación de burla. «¡Ja!» expresa mejor el tono de mofa en español que una traducción más explicativa.
- source_word: ὁ καταλύων
  english_pob_choice: You who would tear down
  chosen_spanish: Tú que derribas
  alternatives_spanish:
  - Tú que destruyes
  - Tú que demueles
  - Tú que derribarías
  lexicon: BDAG
  rationale: La construcción con artículo y participio funciona como un vocativo en la burla. «Tú que derribas» mantiene la acusación directa y es más natural que una perífrasis excesivamente explicativa. Se conserva el presente de reproche como en el griego.
- source_word: ναὸν
  english_pob_choice: the temple
  chosen_spanish: el templo
  alternatives_spanish:
  - el santuario
  lexicon: BDAG
  rationale: Aunque ναός puede referirse más específicamente al santuario, en esta acusación el equivalente más claro y usual en español es «el templo». Se preserva la alternativa más específica en nota.
- source_word: οἰκοδομῶν ἐν τρισὶν ἡμέραις
  english_pob_choice: build it in three days
  chosen_spanish: lo edificas en tres días
  alternatives_spanish:
  - lo reconstruyes en tres días
  - lo construyes en tres días
  lexicon: BDAG
  rationale: El verbo griego es simplemente «construir/edificar»; el contexto puede sugerir reconstrucción, pero el texto no lo dice de manera explícita. «Edificas» refleja bien el acto de construir y permite mantener la posible tensión interpretativa.
theological_decisions:
- issue: Sentido de la acusación sobre el templo
  english_pob_reading: Translate the mockers' words straightforwardly as an accusation/allusion without importing John's interpretive identification of the temple with Jesus' body into the main text.
  chosen_spanish_reading: Traducir la burla tal como aparece, como una acusación/alusión, sin introducir en el cuerpo del texto la identificación joánica del templo con el cuerpo de Jesús.
  alternative_spanish_readings:
  - Hacerla más interpretativa para señalar en el texto principal que Jesús hablaba de su cuerpo
  - Explicar la alusión en el texto principal
  rationale: Marcos presenta el sarcasmo de los transeúntes en la escena de la crucifixión. La traducción debe respetar esa perspectiva narrativa y dejar la tensión teológica abierta en lugar de resolverla en el versículo mismo.
  doctrine_reference: Preservar la tensión teológica; no resolver intertextualmente lo que Marcos no explicita aquí.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el packet griego y coincide con la revisión inglesa de alta concordancia: se mantiene el tono de burla, el imperfecto durativo, la exclamación despectiva y la tensión entre «edificar» y «reconstruir» sin resolverla interpretativamente en el cuerpo principal.'
  spanish_consistency_notes:
  - Se usa «templo» en el texto principal y «santuario» en nota para preservar la distinción semántica de ναός sin sobrecargar el versículo.
  - Se conserva el valor despectivo de la escena con una exclamación breve y coloquial, pero aún publicable.
  - «Lo edificas» mantiene el paralelismo con el sujeto tácito de la burla y evita introducir una lectura más fuerte que el griego.
  - 'La puntuación y el orden siguen una sintaxis natural en español, sin perder la progresión del original: pasar de insultar, a gesticular, a decir la burla textual.'
