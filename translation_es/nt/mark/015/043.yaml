    rationale: El borrador explica en la nota léxica que integra el participio inicial, pero en la redacción final 'se atrevió a entrar' no transmite claramente el valor de 'vino/llegó'. Dado que el griego sí presenta esa acción introductoria, conviene preservarla en español con una forma natural.
  - severity: medium
    issue: '''Se atrevió a entrar ante Pilato'' es una construcción poco natural.'
    rationale: En español eclesial general suena más idiomático 'entró con valentía ante Pilato' o 'se presentó valientemente ante Pilato'. La combinación actual mezcla bien el sentido, pero con cierta torpeza estilística.
  - severity: low
    issue: El orden enfático 'que también él mismo esperaba' puede aligerarse.
    rationale: Aunque es fiel a καὶ αὐτός, en español fluye mejor 'que también esperaba' o 'que él mismo también esperaba'. Mantener 'él mismo' es defendible, pero conviene evitar rigidez innecesaria.
  - severity: low
