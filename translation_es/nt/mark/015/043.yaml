translation:
  language: es
  text: José de Arimatea[a], miembro respetado del consejo, que también él mismo esperaba[b] el reino de Dios, llegó y entró con valentía[c] ante Pilato[d], y pidió[e] el cuerpo de Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “prominente” u “honorable” miembro del consejo.
    reason: lexical_alternative
  - marker: b
    text: O “aguardaba”; el griego expresa una expectativa continua del reino de Dios.
    reason: lexical_alternative
  - marker: c
    text: O “se atrevió”; el griego destaca el valor de José al acercarse a Pilato.
    reason: lexical_alternative
  - marker: d
    text: O “entró donde Pilato” o “se presentó ante Pilato”; el griego combina la idea de entrar e ir a su presencia.
    reason: lexical_alternative
  - marker: e
    text: O “solicitó”; el verbo griego puede expresar una petición formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλθὼν
  english_pob_choice: came
  chosen_spanish: se atrevió a entrar
  alternatives_spanish:
  - vino
  - habiendo venido
  - llegó
  lexicon: BDAG
  rationale: El participio inicial introduce la acción de José, pero en español la secuencia natural se integra con τολμήσας y εἰσῆλθεν. Por eso no se fuerza un participio pesado; se conserva el impulso narrativo con una construcción fluida.
- source_word: Ἰωσὴφ ὁ ἀπὸ Ἁριμαθαίας
  english_pob_choice: Joseph of Arimathea
  chosen_spanish: José de Arimatea
  alternatives_spanish:
  - José, que era de Arimatea
  - José, originario de Arimatea
  lexicon: BDAG
  rationale: La fórmula idiomática española más natural y fiel es el genitivo de procedencia con 'de'. Mantiene la identificación geográfica sin añadir explicaciones que el griego no explicita.
- source_word: εὐσχήμων
  english_pob_choice: respected
  chosen_spanish: respetado
  alternatives_spanish:
  - prominente
  - honorable
  - distinguido
  lexicon: BDAG
  rationale: '''Respetado'' comunica estatus social y consideración pública de forma clara en español moderno. Evita tanto el tono arcaizante de ''honorable'' como una precisión social más fuerte de lo que el término exige.'
- source_word: βουλευτής
  english_pob_choice: council member
  chosen_spanish: miembro del consejo
  alternatives_spanish:
  - consejero
  - miembro del sanedrín
  - concejal
  lexicon: BDAG
  rationale: El término griego designa a un miembro de un consejo gobernante. 'Miembro del consejo' conserva la designación general sin importar 'Sanedrín' en el texto principal, ya que el griego no lo nombra explícitamente.
- source_word: ὃς καὶ αὐτὸς ἦν προσδεχόμενος
  english_pob_choice: who was himself also waiting for
  chosen_spanish: que también él mismo esperaba
  alternatives_spanish:
  - que también él esperaba
  - que él mismo también aguardaba
  - que asimismo esperaba
  lexicon: BDAG
  rationale: Se preserva el énfasis de καὶ αὐτός con 'también él mismo'. 'Esperaba' comunica bien la expectativa continua en español; 'aguardaba' es posible, pero menos neutro en este contexto.
- source_word: τὴν βασιλείαν τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - la realeza de Dios
  lexicon: BDAG
  rationale: Es la traducción estándar y más transparente del sintagma. 'Reinado' sería posible para el matiz dinámico, pero aquí 'reino' mantiene mejor la formulación evangélica reconocible y fiel.
- source_word: τολμήσας
  english_pob_choice: boldly
  chosen_spanish: se atrevió
  alternatives_spanish:
  - osó
  - con valentía
  - tomando valor
  lexicon: BDAG
  rationale: El verbo destaca el coraje de José al presentarse ante Pilato. En español, 'se atrevió' reproduce directamente la idea de audacia; el adverbio 'boldly' se expresa mejor aquí mediante el verbo de valor, unido al movimiento siguiente.
- source_word: εἰσῆλθεν πρὸς τὸν Πιλᾶτον
  english_pob_choice: went in to Pilate
  chosen_spanish: a entrar ante Pilato
  alternatives_spanish:
  - a entrar donde Pilato
  - a presentarse ante Pilato
  - a ir a Pilato
  lexicon: BDAG
  rationale: '''Ante Pilato'' conserva la idea de presentarse en su presencia, y ''entrar'' refleja εἰσῆλθεν. La combinación evita una duplicación torpe en español y mantiene el sentido de aproximación formal a una autoridad.'
- source_word: ᾐτήσατο
  english_pob_choice: asked for
  chosen_spanish: pidió
  alternatives_spanish:
  - solicitó
  - rogó por
  - reclamó
  lexicon: BDAG
  rationale: El verbo medio expresa una solicitud concreta. 'Pidió' es la solución más natural en español y preserva el matiz de petición directa sin sobreformalizar el acto.
- source_word: τὸ σῶμα τοῦ Ἰησοῦ
  english_pob_choice: the body of Jesus
  chosen_spanish: el cuerpo de Jesús
  alternatives_spanish:
  - el cadáver de Jesús
  - el cuerpo de Jesús
  lexicon: BDAG
  rationale: '''Cuerpo'' mantiene la sobriedad y la estructura del genitivo. ''Cadáver'' sería demasiado marcado en español y añadiría una aspereza no requerida por el texto.'
theological_decisions:
- issue: Matiz de 'βουλευτής' y posible referencia al Sanedrín
  english_pob_reading: Rendered as 'council member' without specifying 'Sanhedrin' in the main text.
  chosen_spanish_reading: '''Miembro del consejo'' sin añadir ''Sanedrín'' en el cuerpo principal.'
  alternative_spanish_readings:
  - miembro del Sanedrín
  - consejero del consejo
  rationale: El griego nombra un consejo, no identifica explícitamente el Sanedrín. La traducción principal evita introducir una especificación histórica no dicha por el texto, aunque puede explicarse en nota si se desea.
  doctrine_reference: Primacía del original y cautela exegética; no añadir precisión histórica no explicitada.
- issue: Fuerza de τολμήσας como acto arriesgado ante autoridad
  english_pob_reading: Expressed as Joseph acting 'boldly' in approaching Pilate.
  chosen_spanish_reading: '''Se atrevió a entrar ante Pilato''.'
  alternative_spanish_readings:
  - entró con valentía ante Pilato
  - osó entrar ante Pilato
  - entró audazmente ante Pilato
  rationale: La escena implica riesgo político y social. 'Se atrevió' conserva la tensión del verbo y sugiere la valentía de la acción sin sonar artificial en español.
  doctrine_reference: Equivalencia óptima; preservar el peso narrativo y la valentía implícita del gesto.
translation_notes:
  revision_awareness: El auditorio inglés revisó una redacción más literal ('came and boldly went in') hacia una forma más fluida ('boldly went in') y resolvió el problema de la procedencia con 'Joseph of Arimathea'. La presente redacción española sigue esa línea de fluidez sin perder el valor del participio de audacia ni la identificación geográfica. También evita importar 'Sanedrín' al texto principal, coherente con el control exegético del registro inglés.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ y 'reino de Dios' como fórmula evangélica estable.
  - Se evita 'siervo' porque δοῦλος no aparece en este versículo; no hay necesidad de ajuste terminológico adicional.
  - '''Jesús'' se conserva de forma estándar y solemne en el objeto de la petición.'
  - La puntuación reproduce una sola oración larga con incisos, adecuada al estilo narrativo de Marcos.
