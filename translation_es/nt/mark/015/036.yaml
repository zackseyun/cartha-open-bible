base_translation:
  language: en
  yaml_path: translation/nt/mark/015/036.yaml
  text: Then someone ran[a], filled a sponge with sour wine, put it on a reed, and gave him a drink, saying, “Leave him alone[b]. Let us see whether Elijah is coming to take him down.”
  footnotes:
  - marker: a
    text: Or, “Wait. Let us see whether Elijah comes to take him down.”
    reason: lexical_alternative
  - marker: b
    text: “Sour wine” refers to a cheap acidic wine drink, not necessarily distilled vinegar in the modern sense.
    reason: cultural_note
