translation:
  language: es
  text: 'Entonces alguien corrió, llenó una esponja con vino agrio[a], la puso en una caña y le dio a beber, diciendo: «Déjenlo[b]. Veamos si viene Elías para bajarlo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vinagre». El griego ὄξος se refiere aquí a una bebida ácida barata, no necesariamente al vinagre de cocina moderno.'
    reason: cultural_note
  - marker: b
    text: 'O: «Esperen». «Déjenlo» puede entenderse también como «Esperen»; el sentido exacto depende del tono y del contexto inmediato.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δραμὼν
  english_pob_choice: ran
  chosen_spanish: corrió
  alternatives_spanish:
  - habiendo corrido
  - salió corriendo
  lexicon: BDAG
  rationale: El participio aoristo presenta la acción inicial en secuencia narrativa. En español, «corrió» comunica de modo natural el avance narrativo sin sobrecargar con una construcción participial pesada.
- source_word: τις καὶ
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - uno
  - una persona
  lexicon: BDAG
  rationale: τις es indefinido y no identifica al sujeto. «Alguien» conserva esa indefinición; el καί no requiere una marca separada en español porque está ligado al giro narrativo.
- source_word: γεμίσας σπόγγον ὄξους
  english_pob_choice: filled a sponge with sour wine
  chosen_spanish: llenó una esponja con vino agrio
  alternatives_spanish:
  - llenó una esponja con vinagre
  - empapó una esponja en vino agrio
  lexicon: BDAG
  rationale: ὄξος en este contexto apunta a una bebida avinagrada, barata y agria; «vino agrio» evita el sentido moderno demasiado culinario de «vinagre» y sigue mejor el valor cultural del término.
- source_word: περιθεὶς καλάμῳ
  english_pob_choice: put it on a reed
  chosen_spanish: la puso en una caña
  alternatives_spanish:
  - la colocó sobre una caña
  - la fijó a una caña
  lexicon: BDAG
  rationale: κάλαμος designa una caña/reed. «Caña» es natural en español y conserva la imagen concreta de un tallo alargado usado para sostener la esponja.
- source_word: ἐπότιζεν αὐτόν
  english_pob_choice: gave him a drink
  chosen_spanish: le dio a beber
  alternatives_spanish:
  - le estaba dando de beber
  - le ofreció de beber
  lexicon: BDAG
  rationale: El imperfecto puede sugerir acción en curso, pero la revisión del POB prefirió en inglés una forma más natural en contexto. En español, «le dio a beber» suena idiomático y mantiene la acción efectuada sin forzar una perífrasis menos fluida.
- source_word: Ἄφετε
  english_pob_choice: Leave him alone
  chosen_spanish: Déjenlo
  alternatives_spanish:
  - Déjenlo en paz
  - Espérenlo
  lexicon: BDAG
  rationale: Aquí ἀφίημι funciona como imperativo de desistir/soltar. «Déjenlo» conserva la fuerza directa y admite la lectura contextual de «dejen de intervenir por el momento» sin introducir una paráfrasis excesiva.
- source_word: ἴδωμεν εἰ ἔρχεται Ἠλίας
  english_pob_choice: Let us see whether Elijah is coming
  chosen_spanish: Veamos si viene Elías
  alternatives_spanish:
  - Veamos si está viniendo Elías
  - Miremos si viene Elías
  lexicon: BDAG
  rationale: ἴδωμεν introduce la invitación a observar; en español «Veamos» reproduce bien el subjuntivo exhortativo. ἔρχεται se vierte con presente simple «viene» para mantener la inmediatez narrativa.
- source_word: καθελεῖν αὐτόν
  english_pob_choice: to take him down
  chosen_spanish: para bajarlo
  alternatives_spanish:
  - para quitarlo
  - para descenderlo
  lexicon: BDAG
  rationale: En contexto de crucifixión, καθαιρέω significa quitar a alguien de lo alto, es decir, bajarlo de la cruz. «Para bajarlo» es breve, claro y conserva el sentido espacial básico del verbo.
theological_decisions:
- issue: Sentido de Ἄφετε
  english_pob_reading: The line is rendered as a command to leave Jesus alone temporarily so they can see whether Elijah will intervene.
  chosen_spanish_reading: 'La frase se vierte como una orden de desistir: «Déjenlo».'
  alternative_spanish_readings:
  - «Esperen»
  - «Déjenlo en paz»
  rationale: No hay una tensión doctrinal fuerte, pero sí una ambigüedad pragmática. Se preserva la lectura más literal y se deja abierta la posibilidad idiomática sin resolverla en exceso.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue el contexto auditado del POB en inglés, incluyendo la revisión que prefirió una forma más natural para la acción de dar de beber. Se conservó la ambigüedad pragmática de Ἄφετε mediante nota, y se mantuvo «vino agrio» para ὄξος por precisión cultural.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y no aplica aquí terminología de YHWH.
  - Se usó «vino agrio» como equivalente de ὄξος para mantener la precisión cultural del contexto.
  - «Caña» conserva el valor de κάλαμος sin endurecer el español con un calco.
  - «Déjenlo» comunica la fuerza imperativa sin añadir interpretación doctrinal.
  - El registro es bíblico-actual, no arcaizante, pero conserva la solemnidad apropiada.
