revisions:
- from: Y María Magdalena y María la madre[a] de Joses miraban dónde había sido puesto.
  to: Y María Magdalena y María la madre[a] de Joses miraban dónde él fue puesto.
  rationale: Se revisa la cláusula final para lograr un español más natural y directo en contexto narrativo («fue puesto» en lugar de «había sido puesto») y para explicitar el referente humano («él») por claridad contextual, en línea con la justificación ya documentada en el expediente inglés. Se conserva la nota léxica sobre la formulación más literal «María de Joses».
