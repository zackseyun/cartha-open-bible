translation:
  language: es
  text: Y María Magdalena y María la madre[a] de Joses miraban dónde él fue puesto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «María de Joses». El griego identifica a esta María por su relación con Joses.
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δὲ funciona como un conector suave de continuidad narrativa, no como contraste fuerte. En español, «Y» reproduce esa continuidad con naturalidad.
- source_word: Μαρία ἡ Μαγδαληνή
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María la Magdalén
  - María de Magdala
  lexicon: BDAG
  rationale: Es el nombre propio y epíteto tradicionalmente identificable en español; «María Magdalena» conserva claridad y reconocimiento sin alterar el referente.
- source_word: Μαρία ἡ Ἰωσῆτος
  english_pob_choice: Mary the mother of Joses
  chosen_spanish: María la madre de Joses
  alternatives_spanish:
  - María de Joses
  - María, madre de Joses
  lexicon: BDAG
  rationale: El genitivo griego presenta a esta María por relación con Joses. En español, la relación queda más clara y natural con «la madre de Joses», siguiendo la decisión inglesa de explicitar el vínculo familiar.
- source_word: ἐθεώρουν
  english_pob_choice: were watching
  chosen_spanish: miraban
  alternatives_spanish:
  - observaban
  - estaban mirando
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua en pasado. «Miraban» conserva ese valor durativo de manera natural y sobria en español.
- source_word: ποῦ
  english_pob_choice: where
  chosen_spanish: dónde
  alternatives_spanish:
  - en qué lugar
  lexicon: BDAG
  rationale: Es el interrogativo adverbial directo y más natural en español para esta cláusula.
- source_word: τέθειται
  english_pob_choice: he was laid
  chosen_spanish: había sido puesto
  alternatives_spanish:
  - fue puesto
  - había sido sepultado
  - había sido depositado
  lexicon: BDAG
  rationale: El perfecto pasivo de τίθημι subraya el estado resultante tras la acción de poner/colocar. En español, «había sido puesto» comunica bien la acción completada con resultado vigente, sin forzar el texto con un término interpretativo más específico que el griego.
theological_decisions:
- issue: Objeto implícito del pasivo
  english_pob_reading: English supplies 'he' for clarity, referring to Jesus.
  chosen_spanish_reading: 'Se deja implícito el referente, con la oración en pasiva impersonal: «había sido puesto».'
  alternative_spanish_readings:
  - «donde él había sido puesto»
  - «dónde había sido puesto su cuerpo»
  rationale: El griego no expresa el objeto, aunque el contexto lo hace evidente. En español puede mantenerse esa economía sintáctica sin perder claridad, evitando añadir un sujeto explícito que el texto fuente no formula.
  doctrine_reference: Principio de transparencia textual y claridad contextual; cf. decisión inglesa sobre el objeto implícito
- issue: Relación familiar de Joses
  english_pob_reading: Mary the mother of Joses
  chosen_spanish_reading: María la madre de Joses
  alternative_spanish_readings:
  - María de Joses
  - María, madre de Joses
  rationale: La identificación por parentesco es el punto de la construcción griega y la lectura auditada inglesa. En español, «la madre de Joses» comunica esa relación sin borrar la tensión entre un genitivo relacional y una formulación más explícita.
  doctrine_reference: Uso contextual de genitivos relacionales en narrativa evangélica
translation_notes:
  revision_awareness: 'Se siguió el contexto auditado de la POB en inglés, incluyendo la revisión reciente que prefirió una forma más directa del perfecto pasivo. Para el español, se buscó una equivalencia óptima: conservar la continuidad narrativa de δὲ, el valor durativo del imperfecto ἐθεώρουν y la identificación relacional de Μαρία ἡ Ἰωσῆτος, sin sobreexplicitar el objeto implícito del pasivo más allá de lo que el español requiere.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «María Magdalena» como forma reconocible y estable en español.
  - Se evita «Cristo» porque no aparece en el versículo.
  - «Había sido puesto» conserva el valor resultativo del perfecto pasivo sin introducir una interpretación adicional.
  - La nota al pie preserva la alternativa lexical documentada en el audit trail inglés.
