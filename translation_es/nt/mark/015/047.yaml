review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: continuidad narrativa con «Y», identificación de las dos Marías, imperfecto durativo en «miraban», y la localización de donde Jesús fue puesto. También preserva correctamente la nota léxica sobre «María de Joses». Sin embargo, «había sido puesto» introduce un pluscuamperfecto no necesario y suena menos natural aquí que una forma más directa para τέθειται en esta secuencia narrativa.'
  spanish_quality_summary: El español es claro y comprensible, pero «dónde había sido puesto» suena algo forzado y ligeramente más pesado de lo necesario. En español bíblico natural y digno, «dónde fue puesto» fluye mejor. Además, conviene explicitar «él» para evitar una pasiva algo despersonalizada, dado que el referente es Jesús y el propio expediente inglés justificó esa explicitación por claridad.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «María Magdalena» y «la madre de Joses» son adecuados. No intervienen términos sensibles como Yahvé, Mesías, Espíritu, esclavo, etc. La alternativa en nota «María de Joses» está bien conservada.
  issues:
  - severity: medium
    issue: «había sido puesto» es menos natural que «fue puesto» en este contexto.
    rationale: El griego τέθειται es perfecto pasivo, pero el propio expediente inglés ya optó finalmente por una forma más simple y directa en narrativa. En español, el pluscuamperfecto pasivo añade pesadez sin ganar fidelidad clara.
  - severity: medium
    issue: Se deja implícito el referente del pasivo en «había sido puesto».
    rationale: Aunque el griego deja implícito el referente, en español «dónde fue puesto» puede sonar más claro con «él», especialmente porque se refiere a Jesús como persona y no meramente a un cuerpo u objeto. Esto sigue la lógica explicativa del expediente inglés.
  revised_spanish_text: Y María Magdalena y María la madre[a] de Joses miraban dónde él fue puesto.
  revised_footnotes:
  - marker: a
    text: O, más literalmente, «María de Joses». El griego identifica a esta María por su relación con Joses.
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula final para lograr un español más natural y directo en contexto narrativo («fue puesto» en lugar de «había sido puesto») y para explicitar el referente humano («él») por claridad contextual, en línea con la justificación ya documentada en el expediente inglés. Se conserva la nota léxica sobre la formulación más literal «María de Joses».
