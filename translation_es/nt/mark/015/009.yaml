translation:
  language: es
  text: 'Pero Pilato les respondió[a], diciendo: «¿Quieren que les suelte al Rey de los judíos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el rey de los judeanos». El griego Ἰουδαίων puede significar tanto «judíos» como «judeanos», pero en este título fijo de la pasión la forma tradicional y contextualmente adecuada es «judíos».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca una transición con leve contraste narrativo. «Pero» reproduce bien ese giro en español y mantiene la continuidad con la escena anterior.
- source_word: ἀπεκρίθη
  english_pob_choice: answered
  chosen_spanish: respondió
  alternatives_spanish:
  - contestó
  - respondió a ellos
  lexicon: BDAG
  rationale: En español, «respondió» es natural y conserva la fuerza de réplica de ἀποκρίνομαι sin sonar forzado.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de manera idiomática con «les» después de «respondió».
- source_word: λέγων
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  lexicon: BDAG
  rationale: Conserva el participio narrativo griego en una forma natural en español, sin sobrecargar la oración.
- source_word: Θέλετε
  english_pob_choice: Do you want
  chosen_spanish: ¿Quieren...?
  alternatives_spanish:
  - ¿Desean...?
  - ¿Están dispuestos a...?
  lexicon: BDAG
  rationale: θέλω expresa deseo o voluntad. «Quieren» comunica esa intención de manera clara y directa en el discurso de Pilato.
- source_word: ἀπολύσω
  english_pob_choice: to release
  chosen_spanish: que les suelte
  alternatives_spanish:
  - que les libere
  - que les deje libre
  lexicon: BDAG
  rationale: En este contexto judicial, ἀπολύω significa soltar o poner en libertad. «Soltar» es fiel y natural en español, y mantiene el matiz procesal.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: 'El dativo receptor se integra naturalmente con el verbo: «les suelte».'
- source_word: βασιλέα
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  lexicon: BDAG
  rationale: Forma parte del título fijo pronunciado en la narración de la pasión. Se capitaliza en español por tratarse de ese título específico en el discurso.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En este título pasional fijo, el POB en inglés mantiene «Jews» por ser la forma tradicional y contextual. En español, «judíos» conserva ese mismo valor titular; «judeanos» quedaría más técnico pero menos natural en este contexto narrativo.
theological_decisions:
- issue: Título pasional «τὸν βασιλέα τῶν Ἰουδαίων»
  english_pob_reading: the King of the Jews
  chosen_spanish_reading: el Rey de los judíos
  alternative_spanish_readings:
  - el rey de los judeanos
  rationale: Se conserva el título político e irónico tal como funciona en la narración, sin suavizarlo ni reinterpretarlo. La capitalización en «Rey» sigue el valor titular del enunciado, no añade una afirmación doctrinal externa.
  doctrine_reference: 'Translation philosophy: preserve lexical and narrative tension; original-language primacy.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el criterio auditado del POB inglés para el título de la pasión. No se observan revisiones aplicadas en el paquete fuente; por ello, la redacción española mantiene la misma decisión lexical central y la misma nota alternativa.
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB para el nombre divino, pero este versículo no lo contiene.
  - «Rey» se capitaliza solo por tratarse de un título fijo en el discurso; fuera de ese uso, se preferirá minúscula.
  - «judíos» mantiene la correspondencia con el POB inglés; se deja explícita la alternativa «judeanos» en nota para no borrar la tensión lexical.
  - El registro es sobrio y narrativo, con puntuación española y comillas angulares para el discurso directo.
