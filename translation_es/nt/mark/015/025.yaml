translation:
  language: es
  text: Era ya la tercera hora[a], y lo crucificaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, aproximadamente a las nueve de la mañana, según la manera común judía de contar las horas.
    reason: cultural_note
lexical_decisions:
- source_word: Ἦν
  english_pob_choice: it was
  chosen_spanish: era
  alternatives_spanish:
  - fue
  - estaba
  lexicon: BDAG
  rationale: El imperfecto de εἰμί funciona aquí como marco temporal narrativo. En español, «era» reproduce bien ese valor de trasfondo sin sonar rígido ni forzar una lectura puntual propia del perfecto.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - entonces
  - pero
  lexicon: BDAG
  rationale: δώ marca una transición suave en la narración. En español, la coordinación simple con «y» conserva la fluidez sin añadir una matiz temporal o contrastivo más fuerte de lo que el griego exige.
- source_word: ὥρα τρίτη
  english_pob_choice: the third hour
  chosen_spanish: la tercera hora
  alternatives_spanish:
  - la tercera hora del día
  - las nueve de la mañana
  lexicon: BDAG
  rationale: Se conserva la designación temporal literal del texto griego. La equivalencia moderna («las nueve de la mañana») sería explicativa y desplazaría la referencia cultural al pie de página o a una nota, no al cuerpo del versículo.
- source_word: ἐσταύρωσαν
  english_pob_choice: they crucified
  chosen_spanish: lo crucificaron
  alternatives_spanish:
  - lo clavaron en una cruz
  - lo ejecutaron por crucifixión
  lexicon: BDAG
  rationale: El aoristo activo indica la acción de crucificar. «Lo crucificaron» es la correspondencia directa y natural en español, sin parafrasear el hecho ni debilitar la fuerza del verbo.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Jesús
  lexicon: BDAG
  rationale: El pronombre de objeto directo se refiere a Jesús. En español, el clítico «lo» es la forma más natural y concisa; mantiene la referencia sin añadir el nombre propio que el griego no repite.
theological_decisions:
- issue: Expresión horaria antigua y posible equivalencia moderna
  english_pob_reading: Retain the literal expression 'the third hour' in the main text.
  chosen_spanish_reading: Mantener «la tercera hora» en el texto principal.
  alternative_spanish_readings:
  - «las nueve de la mañana»
  - «aproximadamente a las nueve»
  rationale: El versículo usa una designación horaria antigua sin explicarla. Conservarla preserva la primacía del dato fuente y deja la aclaración cronológica en una nota, evitando imponer una armonización o simplificación interpretativa en el versículo.
  doctrine_reference: 'Principio de traducción: prioridad del texto original y preservación de la tensión histórica sin resolverla en el cuerpo principal.'
translation_notes:
  revision_awareness: El contexto en inglés no introdujo cambios recientes; el consenso del control cruzado fue alto y no hubo revisiones aplicadas. La formulación española sigue la misma decisión de preservar el tiempo literal en el texto principal y explicar su equivalencia cultural en una nota.
  spanish_consistency_notes:
  - Se mantiene «la tercera hora» para conservar la referencia temporal antigua, coherente con la decisión POB en inglés.
  - Se usa «lo crucificaron» para reflejar el verbo griego sin suavizar el acto con perífrasis interpretativas.
  - El pronombre enclítico «lo» preserva la referencia a Jesús de manera natural en español.
  - La nota al pie ofrece la equivalencia cultural sin sustituir la expresión del texto base.
