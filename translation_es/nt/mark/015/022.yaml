    issue: «al lugar de Golgota» es poco idiomático en español
    rationale: Aunque intenta preservar τόπον + Γολγοθᾶν, la construcción con «de» suena antinatural y puede sugerir pertenencia más que aposición o designación del lugar.
  - severity: medium
    issue: «calavera» se aleja del sustantivo griego κρανίον
    rationale: κρανίον corresponde más directamente a «cráneo» que a «calavera». «Calavera» es entendible, pero introduce un matiz más coloquial o imagístico que el término anatómico básico.
  - severity: low
    issue: La nota sobre el artículo simplifica en exceso la relación entre el griego y el español
    rationale: Decir que «en español también es posible entender» tal opción por falta de artículo en griego puede sonar demasiado mecánico. Conviene formular la alternativa como posibilidad de traducción, no como equivalencia gramatical directa.
  revised_spanish_text: 'Y lo llevan a Gólgota[a], que se traduce: «Lugar de un cráneo»[b].'
