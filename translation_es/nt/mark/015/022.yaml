translation:
  language: es
  text: 'Y lo llevan a Gólgota[a], que se traduce: «Lugar de un cráneo»[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «al lugar Gólgota». El griego dice «al lugar, Gólgota», conservando tanto el sustantivo «lugar» como el nombre propio.
    reason: lexical_clarity
  - marker: b
    text: O «Lugar del cráneo». El griego Κρανίου Τόπος permite ambas traducciones en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: φέρουσιν
  english_pob_choice: bring
  chosen_spanish: llevan
  alternatives_spanish:
  - traen
  - conducen
  lexicon: BDAG
  rationale: El verbo griego puede expresar el traslado de Jesús hacia un destino sin exigir que se enfatice si lo cargan o lo guían. En español, «llevan» conserva esa neutralidad narrativa mejor que «traen» o «conducen».
- source_word: ἐπὶ τὸν Γολγοθᾶν τόπον
  english_pob_choice: to the place Golgotha
  chosen_spanish: al lugar de Golgota
  alternatives_spanish:
  - a Golgota
  - al lugar llamado Golgota
  lexicon: BDAG
  rationale: El griego conserva tanto el sustantivo común τόπον como el nombre propio Γολγοθᾶν. «Al lugar de Golgota» mantiene ambos elementos sin añadir «llamado», que no está explícito en el texto.
- source_word: Γολγοθᾶν
  english_pob_choice: Golgotha
  chosen_spanish: Golgota
  alternatives_spanish:
  - Gólgota
  lexicon: BDAG
  rationale: Se translitera el nombre propio para conservar la forma tradicional reconocible en español. Se prefiere la grafía sin tilde como forma editorial simple y ampliamente entendible.
- source_word: μεθερμηνευόμενον
  english_pob_choice: is translated
  chosen_spanish: se traduce
  alternatives_spanish:
  - se interpreta
  - significa
  lexicon: BDAG
  rationale: El participio indica traducción o explicación de un nombre en otra lengua. «Se traduce» reproduce mejor ese valor que «significa», que suaviza la precisión del término griego.
- source_word: Κρανίου Τόπος
  english_pob_choice: Place of a Skull
  chosen_spanish: Lugar de una calavera
  alternatives_spanish:
  - Lugar de la calavera
  - Lugar del cráneo
  lexicon: BDAG
  rationale: El griego carece de artículo en Κρανίου, por lo que en español son posibles tanto «una calavera» como «la calavera». Se eligió «una calavera» para reflejar la anartrosis y mantener la apertura semántica documentada en la nota inglesa.
translation_notes:
  revision_awareness: El texto griego y la audit trail inglesa muestran alta concordancia y no requieren revisión sustancial; la única tensión relevante es la ausencia de artículo en Κρανίου Τόπος, que en español se refleja con una nota alternativa.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo simple y directo, coherente con el presente histórico del griego.
  - Se transliteró Golgota de forma uniforme como nombre propio.
  - Se evitó añadir «llamado» o «conocido como», porque no está explicitado en el griego.
  - La nota preserva la alternativa por la ausencia del artículo en Κρανίου Τόπος, siguiendo el criterio del inglés POB.
