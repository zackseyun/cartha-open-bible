translation:
  language: es
  text: Y con él crucifican a dos ladrones[a], uno a su derecha y uno a su izquierda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bandidos»; posiblemente «rebeldes» si el término se entiende con matices políticos.
    reason: lexical_alternative
lexical_decisions:
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  - acompañándolo
  lexicon: BDAG
  rationale: σύν con dativo expresa acompañamiento. «Con él» es la forma más natural y directa en español, y conserva el vínculo cercano entre Jesús y los otros crucificados.
- source_word: σταυροῦσιν
  english_pob_choice: they crucify
  chosen_spanish: crucifican
  alternatives_spanish:
  - están crucificando
  - crucifican
  lexicon: BDAG
  rationale: El presente histórico del griego se puede mantener en español con el presente simple. «Crucifican» preserva la vivacidad narrativa sin forzar una perífrasis innecesaria.
- source_word: δύο λῃστάς
  english_pob_choice: two robbers
  chosen_spanish: dos ladrones
  alternatives_spanish:
  - dos bandidos
  - dos salteadores
  lexicon: BDAG
  rationale: λῃστής puede significar ladrón, bandido o salteador. «Ladrones» es una equivalencia clara y común en español; sin embargo, se conserva la posibilidad de una carga más amplia o violenta en la nota.
- source_word: ἕνα ἐκ δεξιῶν
  english_pob_choice: one at his right
  chosen_spanish: uno a su derecha
  alternatives_spanish:
  - uno a la derecha de él
  - uno del lado derecho
  lexicon: BDAG
  rationale: La expresión indica ubicación espacial. «A su derecha» es idiomático y reproduce bien la posición al lado derecho de Jesús.
- source_word: ἕνα ἐξ εὐωνύμων αὐτοῦ
  english_pob_choice: one at his left
  chosen_spanish: uno a su izquierda
  alternatives_spanish:
  - uno a la izquierda de él
  - uno del lado izquierdo
  lexicon: BDAG
  rationale: εὐώνυμος señala el lado izquierdo en paralelo con «derecha». «A su izquierda» mantiene la simetría del griego y el referente posesivo de αὐτοῦ sin sobrecargar la frase.
theological_decisions:
- issue: λῃσταί en el relato de la crucifixión
  english_pob_reading: robbers, with a note allowing bandits or rebels if political overtones are intended
  chosen_spanish_reading: ladrones, con una nota que permite «bandidos» o «rebeldes» si el contexto se entiende con matiz político
  alternative_spanish_readings:
  - bandidos
  - salteadores
  - rebeldes
  rationale: El término puede abarcar desde delincuentes violentos hasta figuras con resonancia insurgente. Este versículo por sí solo no exige la lectura politizada, por lo que el texto principal usa «ladrones» y la nota preserva la tensión lexical sin resolverla artificialmente.
  doctrine_reference: Principio de primacía del original y preservación de tensiones lexicales; no neutralizar el rango semántico más allá de lo que el pasaje exige.
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; la lectura final coincide con el pasaje griego y con la decisión inglesa de mantener el presente histórico y el rango semántico de λῃστής.
  spanish_consistency_notes:
  - Se mantiene el presente narrativo («crucifican») para reflejar el valor del presente histórico griego.
  - Se usa «a su derecha / a su izquierda» para conservar el paralelismo espacial del original.
  - Se prefiere «ladrones» como equivalente principal de λῃσταί, con nota para alternativas semánticas relevantes.
