translation:
  language: es
  text: «El Mesías[a], el Rey de Israel, que baje ahora de la cruz, para que veamos y creamos». Y también los que fueron crucificados con él lo insultaban[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el Cristo». El griego Χριστός se vierte aquí como «Mesías» para preservar su sentido de título ungido y real en el contexto.
    reason: alternative_reading
  - marker: b
    text: O «lo increpaban», «lo injuriaban» o «lo reprochaban». El verbo griego implica afrenta o insulto continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: La fuente griega usa Χριστός como título en una burla de carácter real-mesiánico. En español, «Mesías» conserva mejor ese valor titulado que «Cristo», que suena más a nombre eclesial fijo. Se mantiene el artículo porque el griego lo lleva.
- source_word: ὁ βασιλεὺς Ἰσραήλ
  english_pob_choice: the King of Israel
  chosen_spanish: el Rey de Israel
  alternatives_spanish:
  - el rey de Israel
  - Rey de Israel
  lexicon: BDAG
  rationale: Se conserva el título formal con mayúscula por tratarse de un apelativo regio en el discurso de escarnio. La estructura con genitivo se vierte de modo directo y natural en español.
- source_word: καταβάτω νῦν ἀπὸ τοῦ σταυροῦ
  english_pob_choice: let ... come down now from the cross
  chosen_spanish: descienda ahora de la cruz
  alternatives_spanish:
  - baje ahora de la cruz
  - que baje ahora de la cruz
  lexicon: BDAG
  rationale: El imperativo exhortativo/irónico se expresa con subjuntivo exhortativo en español. «Descienda» conserva el matiz de movimiento hacia abajo y mantiene la dignidad del registro; «baje» sería más coloquial.
- source_word: ἵνα ἴδωμεν καὶ πιστεύσωμεν
  english_pob_choice: so that we may see and believe
  chosen_spanish: para que veamos y creamos
  alternatives_spanish:
  - para que veamos y creamos en él
  - a fin de que veamos y creamos
  lexicon: BDAG
  rationale: «Para que» reproduce bien la finalidad de ἵνα con subjuntivos. «Ver y creer» es la correspondencia directa de los verbos; no se amplía con «en él» porque el griego no lo explicita.
- source_word: οἱ συνεσταυρωμένοι σὺν αὐτῷ
  english_pob_choice: those who were crucified with him
  chosen_spanish: los que estaban crucificados con él
  alternatives_spanish:
  - los crucificados con él
  - los que fueron crucificados con él
  lexicon: BDAG
  rationale: 'El participio perfecto/pasivo apunta a un estado resultante: personas en condición de haber sido crucificadas junto a Jesús. «Estaban crucificados» comunica bien ese estado durativo sin forzar una forma demasiado técnica.'
- source_word: ὠνείδιζον αὐτόν
  english_pob_choice: were also insulting him
  chosen_spanish: lo insultaban
  alternatives_spanish:
  - lo injuriaban
  - lo escarnecían
  - lo reprochaban
  lexicon: BDAG
  rationale: El imperfecto indica acción continua; «insultaban» es claro y accesible en español moderno. Se omite «también» en el cuerpo porque la coordinación inicial ya queda naturalizada por «Y también» en la frase anterior; la repetición no aporta en español. La alternativa «escarnecían» preservaría el tono de burla, pero resulta menos transparente.
theological_decisions:
- issue: Cómo rendir Χριστός en un contexto de burla mesiánica
  english_pob_reading: the Messiah rather than the Christ
  chosen_spanish_reading: el Mesías y no Cristo
  alternative_spanish_readings:
  - el Cristo
  - Cristo
  rationale: La decisión sigue el valor titular de Χριστός en el contexto judío-regio de la escena. En español, «Mesías» comunica mejor la carga semántica que «Cristo», que suele funcionar como forma fija del nombre/título en el uso litúrgico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías (title sense); Cristo when name-like or fixed ecclesial form'
translation_notes:
  revision_awareness: Se siguió el paquete fuente griego SBLGNT y el audit trail inglés. No hubo revisiones aplicadas en la fuente inglesa; la redacción española conserva la misma decisión principal de Χριστός → Mesías, ajustando el orden y la naturalidad sintáctica al español.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός, en coherencia con el criterio POB para el uso titular.
  - Se usó «cruz» para σταυρός, sin introducir terminología eclesiástica adicional.
  - Se preservó el valor imperfectivo de ὠνείδιζον con un imperfecto español («insultaban»).
  - Se evitó añadir contenido no explícito como «en él» en la cláusula de creer.
