translation:
  language: es
  text: 'Y comenzaron a saludarlo: «¡Salve[a], Rey de los judíos[b]!».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «saludarlo». El verbo griego puede denotar un saludo ordinario, pero aquí lleva el sentido de un saludo formal en tono de burla.
    reason: lexical_alternative
  - marker: b
    text: O «Rey de los judeanos». El término puede referirse a «judíos» o a «judeanos»; aquí se mantiene «judíos» por ser el sentido estándar en este contexto de la pasión.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Entonces
  lexicon: BDAG
  rationale: Se conserva la simple conexión narrativa del griego y el estilo paratáctico de Marcos.
- source_word: ἤρξαντο
  english_pob_choice: began
  chosen_spanish: comenzaron
  alternatives_spanish:
  - empezaron
  lexicon: BDAG
  rationale: El valor ingresivo de ἄρχομαι + infinitivo se expresa naturalmente con 'comenzaron a', sin añadir interpretación.
- source_word: ἀσπάζεσθαι
  english_pob_choice: to salute
  chosen_spanish: saludarlo
  alternatives_spanish:
  - saludarlo formalmente
  - hacerle un saludo
  lexicon: BDAG
  rationale: En este contexto de burla real, 'saludarlo' comunica el gesto performativo; la nota preserva la alternativa 'saludar' frente a un saludo meramente cordial.
- source_word: Χαῖρε
  english_pob_choice: Hail
  chosen_spanish: ¡Salve!
  alternatives_spanish:
  - ¡Salud!
  - ¡Viva!
  lexicon: BDAG
  rationale: Como aclamación imperativa dirigida al rey, '¡Salve!' reproduce mejor el tono formal y burlón que un simple 'hola' o 'saludos'.
- source_word: βασιλεῦ τῶν Ἰουδαίων
  english_pob_choice: King of the Jews
  chosen_spanish: Rey de los judíos
  alternatives_spanish:
  - Rey de los judeanos
  lexicon: BDAG
  rationale: Se mantiene la lectura contextual habitual en el relato de la pasión; 'judíos' conserva el uso establecido por la POB inglesa, con la alternativa 'judeanos' como posibilidad léxica real del término Ἰουδαῖος.
theological_decisions:
- issue: La burla de los soldados sin atenuar la ironía real
  english_pob_reading: Use 'Hail, King of the Jews!' as a mocking royal salute
  chosen_spanish_reading: Usar «¡Salve, Rey de los judíos!» como saludo real irónico y burlón
  alternative_spanish_readings:
  - «¡Saludos, Rey de los judíos!»
  - «¡Viva, Rey de los judíos!»
  rationale: La traducción mantiene la ironía de la escena y el carácter solemne de la aclamación sin domesticarla a un saludo ordinario.
  doctrine_reference: 'Translation philosophy: preserve the source text''s plain sense; readable modern Spanish'
translation_notes:
  revision_awareness: 'La versión española corrige el problema de validación anterior haciendo que cada marcador de nota aparezca explícitamente en el texto principal: [a] junto a «Salve» y [b] junto a «judíos». Se conserva además la distinción léxica entre el saludo formal y la aclamación del rey.'
  spanish_consistency_notes:
  - Se prefirió «comenzaron a» para reflejar el valor ingresivo de ἤρξαντο.
  - Se eligió «saludarlo» para ἀσπάζεσθαι, dejando abierta la alternativa de un saludo formal de burla.
  - «¡Salve!» reproduce mejor la aclamación Χαῖρε que un saludo neutro.
  - Se mantiene «Rey de los judíos» conforme al uso establecido y al contexto narrativo.
  - La puntuación española coloca las notas al pie en la forma esperable para publicación.
