translation:
  language: es
  text: Ahora, en la fiesta, les soltaba[a] a un preso[b], al que pedían[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Les soltaba'' traduce el imperfecto habitual ἀπέλυεν: una acción acostumbrada, no un hecho puntual.'
    reason: lexical_alternative
  - marker: b
    text: '''Preso'' refleja δέσμιος con el matiz de alguien bajo custodia; ''prisionero'' también sería válido.'
    reason: lexical_alternative
  - marker: c
    text: '''Al que pedían'' expresa ὃν παρῃτοῦντο, es decir, la persona que ellos pedían que se les liberara; también podría traducirse ''al que pedían'' o, más explícitamente, ''al que pedían que soltara''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Κατὰ δὲ ἑορτὴν
  english_pob_choice: Now at the feast
  chosen_spanish: Ahora, en la fiesta
  alternatives_spanish:
  - En la fiesta
  - Durante la fiesta
  - Ahora, durante la fiesta
  lexicon: BDAG
  rationale: 'κατά con acusativo expresa tiempo habitual: ''en/durante la fiesta''. δέ añade enlace narrativo leve; ''Ahora'' mantiene el avance del relato sin forzar una oposición. ἑορτή puede ser ''fiesta'' o ''festival''; ''fiesta'' es natural en español y encaja con el contexto pascual.'
- source_word: ἀπέλυεν
  english_pob_choice: he would release
  chosen_spanish: les soltaba
  alternatives_spanish:
  - les soltaba habitualmente
  - soltaba para ellos
  - liberaba
  lexicon: BDAG
  rationale: El imperfecto indica acción habitual en el pasado. 'Soltaba' comunica bien esa costumbre sin sonar rígido. 'Les' conserva el destinatario indirecto del dativo αὐτοῖς; 'liberaba' es posible, pero 'soltaba' refleja mejor el matiz de liberar a un preso en este contexto.
- source_word: αὐτοῖς
  english_pob_choice: for them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: BDAG
  rationale: El dativo marca a los beneficiarios de la acción. En español, el clítico dativo 'les' es la forma más natural y fiel en esta construcción; evita una perífrasis innecesaria.
- source_word: ἕνα δέσμιον
  english_pob_choice: one prisoner
  chosen_spanish: a uno preso
  alternatives_spanish:
  - a un preso
  - a un prisionero
  - a un cautivo
  lexicon: BDAG
  rationale: ἕνα subraya el número 'uno'. δέσμιος significa 'preso/prisionero'; aquí 'preso' resulta natural en español y mantiene el valor judicial. Se dejó 'uno' antepuesto y se añadió 'preso' para conservar la secuencia del griego sin perder fluidez; 'prisionero' también sería viable, pero 'preso' es más directo.
- source_word: ὃν παρῃτοῦντο
  english_pob_choice: whom they asked for
  chosen_spanish: al que pidieran
  alternatives_spanish:
  - al que pedían
  - al que pedían por él
  - al que solicitaban
  lexicon: BDAG
  rationale: παραιτέομαι aquí significa pedir o solicitar. El imperfecto puede sugerir una petición reiterada o habitual; en español, 'pidieran' en una relativa con antecedente indefinido reproduce con naturalidad esa referencia a la persona pedida, sin exagerar el aspecto. 'Pedían' también es posible, pero 'pidieran' ayuda a mantener el valor de 'whom they asked for' con un tono más bíblico y fluido.
translation_notes:
  revision_awareness: 'La versión inglesa POB pasó de ''whom they requested'' a ''whom they asked for'' para hacer más directa la relación con παρῃτοῦντο y conservar naturalidad. La redacción española sigue esa misma orientación: usa un verbo sencillo de petición (''pedir'') y procura reflejar el imperfecto habitual de ἀπέλυεν sin mecanicismo.'
  spanish_consistency_notes:
  - Se preservó el valor temporal habitual del imperfecto con una forma española natural.
  - Se evitó sustituir δέσμιος por un término más eclesiástico o abstracto; el contexto legal pide un preso concreto.
  - No se usó 'Mesías', 'Yahvé' ni otra terminología especializada porque el versículo no lo requiere.
  - La puntuación y el orden buscan sonar publicables en español sin diluir la correspondencia con el griego.
