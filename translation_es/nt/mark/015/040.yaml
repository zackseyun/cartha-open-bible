translation:
  language: es
  text: También había mujeres mirando desde lejos[a], entre las cuales estaban María Magdalena, María la madre de Jacobo el menor y de Joses[b], y Salomé[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde lejos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «María la madre de Jacobo el Menor y de Joses».'
    reason: lexical_alternative
  - marker: c
    text: El nombre griego aquí es «Joses», una forma distinta de «José».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἦσαν δὲ καὶ
  english_pob_choice: There were also
  chosen_spanish: También había
  alternatives_spanish:
  - Había también
  - Y había también
  lexicon: BDAG
  rationale: El imperfecto con δέ y καί expresa una continuidad narrativa aditiva; «también había» reproduce bien esa suma sin forzar un giro demasiado literal.
- source_word: γυναῖκες
  english_pob_choice: women
  chosen_spanish: mujeres
  alternatives_spanish:
  - mujeres
  lexicon: BDAG
  rationale: Es el equivalente directo y natural para el plural de γυνή en este contexto de testigos presentes.
- source_word: ἀπὸ μακρόθεν
  english_pob_choice: from a distance
  chosen_spanish: desde lejos
  alternatives_spanish:
  - a distancia
  - desde lejos
  lexicon: BDAG
  rationale: La frase describe ubicación espacial de observación; «desde lejos» es idiomático en español y mantiene el sentido sin perder la distancia marcada por el griego.
- source_word: θεωροῦσαι
  english_pob_choice: watching
  chosen_spanish: mirando
  alternatives_spanish:
  - observando
  - mirando
  lexicon: BDAG
  rationale: El participio presente indica atención visual sostenida; «mirando» funciona de manera clara y natural en español para la escena.
- source_word: ἐν αἷς
  english_pob_choice: among whom were
  chosen_spanish: entre las cuales estaban
  alternatives_spanish:
  - entre ellas estaban
  - entre las cuales estaban
  lexicon: BDAG
  rationale: La construcción relativa identifica mujeres dentro de un grupo mayor; «entre las cuales estaban» refleja esa inclusión con claridad en español.
- source_word: Μαρία ἡ Μαγδαληνή
  english_pob_choice: Mary Magdalene
  chosen_spanish: María Magdalena
  alternatives_spanish:
  - María Magdalena
  lexicon: BDAG
  rationale: Es la forma establecida y transparente en español para el nombre y el epíteto.
- source_word: Μαρία ἡ Ἰακώβου τοῦ μικροῦ καὶ Ἰωσῆτος μήτηρ
  english_pob_choice: Mary the mother of James the younger and of Joses
  chosen_spanish: María la madre de Jacobo el menor y de Joses
  alternatives_spanish:
  - María, madre de Jacobo el menor y de Joses
  - María la madre de Jacobo el menor y de Joses
  lexicon: BDAG
  rationale: μήτηρ rige ambos nombres, por lo que conviene hacer explícita la relación de maternidad. Se conserva el identificador «el menor» para μικροῦ, porque el griego lo usa como rasgo distintivo sin precisar si alude a edad, estatura o importancia.
- source_word: Ἰακώβου
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  - Jacobo
  lexicon: BDAG
  rationale: En este registro se conserva la forma tradicional «Jacobo» para Ἰάκωβος; es plenamente comprensible y evita mezclar criterios onomásticos dentro de la misma cláusula.
- source_word: τοῦ μικροῦ
  english_pob_choice: the younger
  chosen_spanish: el menor
  alternatives_spanish:
  - el menor
  - el más joven
  - el pequeño
  lexicon: BDAG
  rationale: «El menor» comunica bien el valor distintivo de μικρός sin sobreespecificar el matiz. En español bíblico resulta claro y natural, y deja abierta la misma tensión semántica que el griego no resuelve.
- source_word: Ἰωσῆτος
  english_pob_choice: Joses
  chosen_spanish: Joses
  alternatives_spanish:
  - Joses
  lexicon: BDAG
  rationale: Se translitera el nombre distintivo del griego y no se lo armoniza con José/Joseph, preservando la diferencia textual documentada.
- source_word: Σαλώμη
  english_pob_choice: Salome
  chosen_spanish: Salomé
  alternatives_spanish:
  - Salomé
  lexicon: BDAG
  rationale: Transliteración estándar al español del nombre propio.
theological_decisions:
- issue: Valor de τοῦ μικροῦ en la identificación de Jacobo
  english_pob_reading: the younger / the Less as a distinguishing label without overdefining the nuance
  chosen_spanish_reading: el menor como etiqueta distintiva sin precisar si alude a edad, estatura o prominencia
  alternative_spanish_readings:
  - el más joven
  - el pequeño
  - el Menor
  rationale: El texto solo distingue a este Jacobo de otro homónimo. La traducción no debe convertir esa marca en una afirmación más específica de lo que el griego permite.
  doctrine_reference: Principio POB de no sobretraducir ni borrar tensiones léxicas del original.
- issue: Identidad del nombre Ἰωσῆτος
  english_pob_reading: Joses as a distinct Greek name form, not Joseph
  chosen_spanish_reading: Joses como nombre distinto, no José
  alternative_spanish_readings:
  - José
  - Joses
  rationale: La versión española conserva la diferencia que el audit trail destaca; no se domestica el nombre hacia una forma más familiar cuando eso borraría una distinción textual.
  doctrine_reference: Fidelidad onomástica al testimonio griego y preservación de distinciones textuales.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas sin anclaje. Ahora solo aparece el marcador [a] en el texto, y la única nota de pie corresponde a ese ancla.
  spanish_consistency_notes:
  - 'Se mantuvo el orden informativo del griego: observación a distancia, identificación del grupo, y lista de nombres.'
  - Se evitó sustituir «María Magdalena» por una forma más litúrgica o arcaica, priorizando claridad y equivalencia transparente.
  - Se conservó la distinción de Joses frente a José, según la auditoría inglesa.
  - El registro general es sobrio y apto para lectura eclesial amplia en español latinoamericano.
