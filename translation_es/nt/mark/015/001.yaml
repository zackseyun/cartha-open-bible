translation:
  language: es
  text: E inmediatamente, muy temprano en la mañana, los sumos sacerdotes celebraron una consulta con los ancianos, los escribas y todo el consejo[a]; luego ataron a Jesús, se lo llevaron y se lo entregaron a Pilato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "todo el Sanedrín". El griego συνέδριον se refiere al consejo gobernante judío.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: de madrugada
  alternatives_spanish:
  - enseguida
  - inmediatamente
  lexicon: BDAG
  rationale: El griego marca prontitud narrativa, pero en español el adverbio debe encajar con πρωῒ. La combinación “de madrugada” conserva la idea de un comienzo muy temprano y evita una redundancia forzada con “inmediatamente” al inicio de la oración.
- source_word: πρωῒ
  english_pob_choice: early in the morning
  chosen_spanish: de madrugada
  alternatives_spanish:
  - temprano en la mañana
  - por la mañana temprano
  lexicon: BDAG
  rationale: El valor temporal apunta a una hora muy temprana. “De madrugada” expresa con naturalidad ese matiz en español y, junto con εὐθὺς, mantiene la urgencia narrativa sin duplicación innecesaria.
- source_word: συμβούλιον ποιήσαντες
  english_pob_choice: held a consultation
  chosen_spanish: después de haber tomado una decisión en consulta
  alternatives_spanish:
  - habiendo celebrado una consulta
  - después de haber deliberado
  - después de haber celebrado consejo
  lexicon: BDAG
  rationale: La construcción participial indica que los sumos sacerdotes actuaron tras una deliberación conjunta. “Tomar una decisión en consulta” comunica el sentido deliberativo de συμβούλιον ποιήσαντες sin forzar una expresión poco natural en español, y conserva el carácter formal de la reunión.
- source_word: ἀρχιερεῖς
  english_pob_choice: chief priests
  chosen_spanish: sumos sacerdotes
  alternatives_spanish:
  - principales sacerdotes
  - jefes sacerdotales
  lexicon: BDAG
  rationale: En español bíblico “sumos sacerdotes” es la forma más transparente y estable para el plural de ἀρχιερεῖς, refiriéndose a la autoridad sacerdotal principal, no a varios oficiantes máximos simultáneos.
- source_word: πρεσβυτέρων
  english_pob_choice: elders
  chosen_spanish: ancianos
  alternatives_spanish:
  - presbíteros
  - mayores
  lexicon: BDAG
  rationale: En este contexto de gobierno judío, “ancianos” comunica bien a los líderes reconocidos. “Presbíteros” sería más técnico y menos inmediato para lectores generales.
- source_word: γραμματέων
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - doctores de la ley
  - expertos en la Ley
  lexicon: BDAG
  rationale: “Escribas” es la equivalencia tradicional y clara en español. Conserva el oficio identificable sin añadir explicación innecesaria al texto principal.
- source_word: ὅλον τὸ συνέδριον
  english_pob_choice: the whole council
  chosen_spanish: todo el consejo
  alternatives_spanish:
  - todo el Sanedrín
  - todo el concilio
  lexicon: BDAG
  rationale: La traducción “todo el consejo” comunica la referencia institucional de συνέδριον sin transliterar. Se mantiene la posibilidad histórica de “Sanedrín” en nota, pero el texto principal prioriza la inteligibilidad directa.
- source_word: δήσαντες
  english_pob_choice: bound
  chosen_spanish: ataron
  alternatives_spanish:
  - lo ataron
  - lo sujetaron
  lexicon: BDAG
  rationale: Aquí el verbo expresa la acción física de inmovilizar a Jesús antes de su traslado. “Ataron” es fiel, sencillo y más natural que un calco solemne como “lo ligaron”.
- source_word: ἀπήνεγκαν
  english_pob_choice: led him away
  chosen_spanish: lo llevaron
  alternatives_spanish:
  - lo condujeron
  - lo sacaron
  lexicon: BDAG
  rationale: En este contexto de custodia y traslado, “lo llevaron” reproduce el movimiento de remoción sin sobreespecificar el modo. “Lo condujeron” es posible, pero algo más formal; “lo llevaron” mantiene fluidez narrativa.
- source_word: παρέδωκαν
  english_pob_choice: handed him over
  chosen_spanish: se lo entregaron
  alternatives_spanish:
  - lo entregaron
  - lo pusieron en manos de
  lexicon: BDAG
  rationale: El verbo tiene fuerza judicial/custodial. “Se lo entregaron” preserva el movimiento de transferencia de custodia y resulta idiomático en español. La forma pronominal ayuda a mantener a Pilato como destinatario explícito sin perder claridad.
- source_word: Πιλάτῳ
  english_pob_choice: Pilate
  chosen_spanish: Pilato
  lexicon: BDAG
  rationale: Nombre propio estándar en español bíblico y de uso común.
theological_decisions:
- issue: Referencia de συνέδριον
  english_pob_reading: the whole council
  chosen_spanish_reading: todo el consejo
  alternative_spanish_readings:
  - todo el Sanedrín
  rationale: Se mantiene la traducción descriptiva en el texto principal para no depender de un término transliterado. La nota conserva “Sanedrín” como equivalente histórico reconocido, sin perder el sentido institucional del consejo gobernante judío.
  doctrine_reference: Translation philosophy §2, §6
- issue: Fuerza de παρέδωκαν en la pasión
  english_pob_reading: handed him over
  chosen_spanish_reading: se lo entregaron
  alternative_spanish_readings:
  - lo entregaron
  rationale: La redacción conserva la transferencia formal de custodia hacia autoridad romana, sin cargar el verbo con una interpretación doctrinal adicional. Esto preserva la tensión narrativa-jurídica del pasaje y evita banalizar el acto.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se integró el audit trail inglés sin depender de una traducción mecánica. La principal decisión fue resolver la secuencia εὐθὺς πρωῒ con una sola expresión española natural (“de madrugada”) para conservar la urgencia y la tempranidad del momento. También se mantuvo el valor institucional de συνέδριον con una nota alternativa histórica.
  spanish_consistency_notes:
  - Se usó “sumos sacerdotes” para ἀρχιερεῖς, coherente con el español bíblico y con el plural de autoridad.
  - Se prefirió “ancianos” y “escribas” como equivalentes estables y comprensibles.
  - “Todo el consejo” conserva el sentido institucional de συνέδριον sin transliteración en el texto principal.
  - El verbo “entregar” se reservó para παρέδωκαν por su fuerza custodial/judicial; “llevar” traduce el traslado de ἀπήνεγκαν.
