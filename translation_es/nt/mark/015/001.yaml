review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja en general la secuencia de acciones y los referentes principales del griego, pero no preserva bien dos matices clave: εὐθὺς (''inmediatamente'') se pierde al fusionarse con πρωῒ en ''de madrugada'', y συμβούλιον ποιήσαντες se desplaza de ''celebraron/tuvieron una consulta'' a ''tomado una decisión en consulta'', que introduce un resultado no explícito en el texto fuente. El resto —''sumos sacerdotes'', ''ancianos'', ''escribas'', ''todo el consejo'', ''ataron'', ''lo llevaron'', ''se lo entregaron'', ''Pilato''— es sustancialmente fiel.'
  spanish_quality_summary: El español es claro y legible, pero la oración suena algo recargada por 'después de haber tomado una decisión en consulta'. Una formulación más directa como 'celebraron una consulta' o 'tuvieron una consulta' fluye mejor y sigue más de cerca el griego. También conviene recuperar explícitamente la urgencia de Marcos con 'inmediatamente'.
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: Ἰησοῦς -> ''Jesús'', ἀρχιερεῖς -> ''sumos sacerdotes'', πρεσβύτεροι -> ''ancianos'', γραμματεῖς -> ''escribas'', συνέδριον -> ''consejo'' con nota alternativa ''Sanedrín''. No hay conflictos con los glosarios mayores. La nota sobre συνέδριον está bien planteada.'
  issues:
  - severity: high
    issue: Se omite el valor de εὐθὺς
    rationale: El borrador traduce εὐθὺς y πρωῒ juntos como 'de madrugada', pero εὐθὺς añade urgencia narrativa distinta del tiempo del día. Debe conservarse con 'inmediatamente' o equivalente.
  - severity: medium
    issue: '''Tomado una decisión en consulta'' sobretraduce συμβούλιον ποιήσαντες'
    rationale: La expresión griega describe celebrar/tener una consulta o deliberación, no necesariamente que ya tomaron una decisión. La redacción actual introduce un resultado más fuerte que el fuente no exige.
  - severity: low
    issue: La estructura española puede simplificarse para mayor naturalidad
    rationale: La cadena 'después de haber...' hace la frase más pesada de lo necesario. Una construcción verbal más directa conserva solemnidad y mejora la lectura.
  revised_spanish_text: E inmediatamente, muy temprano en la mañana, los sumos sacerdotes celebraron una consulta con los ancianos, los escribas y todo el consejo[a]; luego ataron a Jesús, se lo llevaron y se lo entregaron a Pilato.
  revised_footnotes:
  - marker: a
    text: O "todo el Sanedrín". El griego συνέδριον se refiere al consejo gobernante judío.
    reason: alternative_reading
  revision_rationale: La revisión restaura explícitamente εὐθὺς con 'inmediatamente', distingue ese matiz de πρωῒ con 'muy temprano en la mañana', y devuelve συμβούλιον ποιήσαντες a un sentido deliberativo no sobreinterpretado con 'celebraron una consulta'. También se mantiene la nota histórica sobre 'Sanedrín' y una sintaxis española clara y digna.
