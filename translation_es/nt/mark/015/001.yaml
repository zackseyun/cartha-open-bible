revisions:
- from: Y de madrugada, los sumos sacerdotes, después de haber tomado una decisión en consulta con los ancianos, los escribas y todo el consejo[a], ataron a Jesús, lo llevaron y se lo entregaron a Pilato.
  to: E inmediatamente, muy temprano en la mañana, los sumos sacerdotes celebraron una consulta con los ancianos, los escribas y todo el consejo[a]; luego ataron a Jesús, se lo llevaron y se lo entregaron a Pilato.
  rationale: La revisión restaura explícitamente εὐθὺς con 'inmediatamente', distingue ese matiz de πρωῒ con 'muy temprano en la mañana', y devuelve συμβούλιον ποιήσαντες a un sentido deliberativo no sobreinterpretado con 'celebraron una consulta'. También se mantiene la nota histórica sobre 'Sanedrín' y una sintaxis española clara y digna.
  reviewer_model: gpt-5.4
