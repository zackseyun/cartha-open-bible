translation:
  language: es
  text: Estas mujeres[a], cuando él estaba en Galilea, lo seguían y le servían[b]; y había muchas otras mujeres que habían subido con él a Jerusalén[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las mujeres que». El griego retoma a las mujeres mencionadas antes; el español puede explicitar esa referencia de distintas maneras.
    reason: alternative_reading
  - marker: b
    text: O «le ministraban». El verbo griego puede abarcar servicio práctico o apoyo personal; «servían» es más natural en español, mientras que «ministraban» conserva un tono más amplio y digno.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «subido con él a Jerusalén», reflejando el modismo bíblico habitual de subir a Jerusalén.
    reason: cultural_note
lexical_decisions:
- source_word: αἳ
  english_pob_choice: These women
  chosen_spanish: Estas mujeres
  alternatives_spanish:
  - las mujeres que
  - quienes
  lexicon: BDAG
  rationale: El pronombre relativo griego retoma a las mujeres mencionadas en el versículo anterior. En español, «Estas mujeres» conserva bien la referencia anafórica y suena natural, sin perder la conexión con el antecedente.
- source_word: ὅτε ἦν ἐν τῇ Γαλιλαίᾳ
  english_pob_choice: when he was in Galilee
  chosen_spanish: cuando él estaba en Galilea
  alternatives_spanish:
  - mientras él estaba en Galilea
  - cuando estaba en Galilea
  lexicon: BDAG
  rationale: La cláusula temporal se traduce de forma directa. Se mantiene «Galilea» sin expansión, y se explicita «él» para evitar ambigüedad en español.
- source_word: ἠκολούθουν
  english_pob_choice: used to follow
  chosen_spanish: lo seguían
  alternatives_spanish:
  - lo seguían habitualmente
  - solían seguirlo
  lexicon: BDAG
  rationale: El imperfecto expresa acción habitual en el pasado. En español, el imperfecto simple «lo seguían» comunica esa continuidad sin sobrecargar el texto; el matiz habitual queda recuperado por el contexto y la nota filosófica de traducción.
- source_word: διηκόνουν
  english_pob_choice: minister to
  chosen_spanish: le ministraban
  alternatives_spanish:
  - le servían
  - lo atendían
  lexicon: BDAG
  rationale: Se conserva el término tradicional «ministraban» para reflejar el alcance de διακονέω sin reducirlo a un servicio doméstico ni introducir lenguaje eclesiástico ajeno al pasaje. Aunque menos común, es transparente y sostiene la dignidad del acto descrito.
- source_word: ἄλλαι πολλαὶ
  english_pob_choice: many other women
  chosen_spanish: muchas otras
  alternatives_spanish:
  - muchas otras mujeres
  - otras muchas
  lexicon: BDAG
  rationale: El femenino plural ya está garantizado por el antecedente inmediato. En español, «muchas otras» evita repetir «mujeres» de forma pesada y sigue siendo claro en contexto.
- source_word: αἱ συναναβᾶσαι αὐτῷ
  english_pob_choice: who had gone up with him
  chosen_spanish: que habían subido con él
  alternatives_spanish:
  - que habían ido con él
  - que subieron con él
  lexicon: BDAG
  rationale: El participio aoristo se rinde como acción previa. «Subido» conserva el idiomatismo bíblico de ascender a Jerusalén y permanece natural en español.
- source_word: εἰς Ἱεροσόλυμα
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hasta Jerusalén
  - a la ciudad de Jerusalén
  lexicon: BDAG
  rationale: La preposición εἰς con nombre de ciudad se expresa de modo idiomático con «a». Se preserva el destino sin añadir matices direccionales innecesarios.
theological_decisions:
- issue: Traducción de διακονέω y su posible carga ministerial
  english_pob_reading: minister to him
  chosen_spanish_reading: le ministraban
  alternative_spanish_readings:
  - le servían
  - lo atendían
  rationale: El pasaje presenta a las mujeres como participantes activas en el apoyo a Jesús durante su ministerio en Galilea. «Le ministraban» mantiene la amplitud semántica del verbo y evita tanto una reducción a tarea doméstica como una lectura eclesiástica posterior no exigida por el texto.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Expresión de acción habitual en el imperfecto ἠκολούθουν
  english_pob_reading: used to follow
  chosen_spanish_reading: lo seguían
  alternative_spanish_readings:
  - solían seguirlo
  - lo estaban siguiendo
  rationale: Aunque el español no siempre marca habitualidad con un giro explícito, el imperfecto «lo seguían» es la forma más natural y fiel. El contexto narrativo y el paralelo con «ministraban» sostienen el sentido habitual sin forzar una perífrasis menos fluida.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés muestran acuerdo alto y sin revisiones aplicadas. Esta versión española sigue la lectura principal del POB inglés, manteniendo la habitualidad del imperfecto, la referencia anafórica femenina y la distinción entre «seguir» y «ministrar» sin añadir contenido interpretativo no sustentado.
  spanish_consistency_notes:
  - Se usa «Jesús» implícito por el pronombre «él», siguiendo el antecedente inmediato del contexto.
  - Se mantiene «Jerusalén» como topónimo fijo en español, con la preposición «a» para el movimiento de destino.
  - Se eligió «ministraban» por coherencia con el valor amplio de διακονέω en el audit trail, aunque se reconoce «servían» como alternativa válida.
