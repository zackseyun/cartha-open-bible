    text: Or 'served him.' The Greek verb can denote practical service or support.
    reason: lexical_alternative
  - marker: b
    text: Literally 'gone up with him to Jerusalem,' reflecting the customary biblical idiom of going up to Jerusalem.
    reason: cultural_note
