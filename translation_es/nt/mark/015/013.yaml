lexical_decisions:
- source_word: οἱ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - la gente
  - la multitud
  lexicon: BDAG
  rationale: El artículo plural funciona sustantivamente y remite al grupo ya presente en el contexto. En español se requiere un sujeto explícito; «ellos» conserva la referencia sin añadir interpretación colectiva innecesaria.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Entonces
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un giro o contraste leve. «Pero» reproduce bien ese matiz en español sin cargar la relación lógica más de lo que indica el griego.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: La idea de repetición se expresa naturalmente con «otra vez». Mantiene el énfasis narrativo en que el clamor se repitió.
- source_word: ἔκραξαν
  english_pob_choice: cried out
  chosen_spanish: gritaron
  alternatives_spanish:
  - clamaron
  - alzaron la voz
  lexicon: BDAG
  rationale: κράζω denota un grito fuerte. «Gritaron» comunica bien la intensidad y resulta más natural en español; «clamaron» puede sonar más elevado pero menos directo.
- source_word: Σταύρωσον
  english_pob_choice: Crucify
  chosen_spanish: Crucifícalo
  alternatives_spanish:
  - Que lo crucifiquen
  - Haced que lo crucifiquen
  lexicon: BDAG
  rationale: El imperativo aoristo singular dirigido a Pilato pide un mandato directo. «Crucifícalo» conserva esa fuerza imperativa sin volverlo perifrástico.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: El objeto directo masculino singular corresponde naturalmente con el pronombre enclítico «lo» en la orden directa española. Se mantiene la referencia a Jesús sin cambiar el foco del mandato.
translation_notes:
  revision_awareness: El texto inglés POB presenta una equivalencia óptima sin notas; la versión española sigue esa misma línea y no introduce glosas ni expansiones que no estén sugeridas por el griego o por el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene un registro narrativo sobrio y directo, adecuado para un clamor de multitud.
  - No se introduce «mesianismo», «Señor» ni otras formulaciones ausentes del versículo.
  - El mandato se conserva en forma imperativa breve para reflejar la fuerza del griego.
