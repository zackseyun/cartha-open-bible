review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la secuencia temporal de γνοὺς, el matiz oficial de ἐδωρήσατο y la opción principal «cuerpo» para πτῶμα con nota de alternativa. Sin embargo, «por el centurión» no preserva tan fielmente el valor de fuente/origen de ἀπὸ τοῦ κεντυρίωνος como «del centurión» o «por medio del centurión»; además, «conceder» normalmente pide un complemento explícito del beneficiario para evitar ambigüedad.
  spanish_quality_summary: La frase es legible, pero «Y, después de enterarse por el centurión[a], le concedió el cuerpo a José» suena algo trabada y deja el sujeto implícito de forma menos natural en español. Una redacción más fluida y precisa es «Y después de saberlo por el centurión, le concedió a José el cuerpo[a]».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Centurión», «José» y «cuerpo» son adecuados. Se conserva correctamente la nota léxica para πτῶμα.
  issues:
  - severity: medium
    issue: «por el centurión» para ἀπὸ τοῦ κεντυρίωνος
    rationale: El griego marca fuente de información («de/desde el centurión»). En español, «enterarse por X» puede ser natural, pero aquí suena más instrumental/mediado que fuente directa. «Saberlo por el centurión» o «del centurión» preserva mejor el sentido.
  - severity: low
    issue: Ubicación de la nota al pie
    rationale: La nota léxica explica πτῶμα, no «centurión». El marcador debe anclarse a «cuerpo» para corresponder al término comentado.
  - severity: low
    issue: Orden sintáctico algo menos natural
    rationale: «Le concedió el cuerpo a José» es comprensible, pero con «conceder» resulta más claro «le concedió a José el cuerpo», especialmente en un registro bíblico claro y digno.
  revised_spanish_text: Y después de saberlo por el centurión, le concedió a José el cuerpo[a].
  revised_footnotes:
  - marker: a
    text: O «el cadáver» o «el cuerpo muerto».
    reason: lexical_alternative
