translation:
  language: es
  text: Y después de saberlo por el centurión, le concedió a José el cuerpo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cadáver» o «el cuerpo muerto».
    reason: lexical_alternative
lexical_decisions:
- source_word: γνοὺς
  english_pob_choice: after learning
  chosen_spanish: después de enterarse
  alternatives_spanish:
  - habiendo sabido
  - después de conocer
  - cuando supo
  lexicon: BDAG
  rationale: El participio aoristo funciona aquí como circunstancia temporal previa a la acción principal. «Después de enterarse» transmite bien el orden de los hechos en un español natural y mantiene el valor de adquisición de información sin volver la frase demasiado pesada.
- source_word: ἀπὸ τοῦ κεντυρίωνος
  english_pob_choice: from the centurion
  chosen_spanish: por el centurión
  alternatives_spanish:
  - del centurión
  - desde el centurión
  lexicon: BDAG
  rationale: 'En español, la fuente de información se expresa con naturalidad mediante «por» en este contexto: Pilato se informa por medio del centurión. «Del centurión» también sería posible, pero puede sonar menos explícito en cuanto a origen de la información.'
- source_word: ἐδωρήσατο
  english_pob_choice: granted
  chosen_spanish: le concedió
  alternatives_spanish:
  - le dio
  - le otorgó
  - le hizo entrega
  lexicon: BDAG
  rationale: El verbo griego puede implicar un dar como favor o concesión. «Le concedió» conserva el matiz oficial y benévolo del acto de Pilato, mejor que un simple «le dio».
- source_word: πτῶμα
  english_pob_choice: body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cadáver
  - el cuerpo muerto
  - el cadáver / cuerpo
  lexicon: BDAG
  rationale: POB optó en inglés por «body» en el texto principal, preservando el dato léxico más duro en nota. En español, «el cuerpo» suena natural y digno; la alternativa más explícita queda reflejada en la nota para auditar el sentido de πτῶμα.
- source_word: τῷ Ἰωσήφ
  english_pob_choice: to Joseph
  chosen_spanish: a José
  alternatives_spanish:
  - para José
  lexicon: BDAG
  rationale: El dativo indica destinatario del favor o concesión. «A José» es la forma directa y natural en español para el receptor del verbo «conceder».
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del texto inglés, que eliminó cualquier objeto implícito no expresado en el griego; por eso la frase española no añade complemento directo alguno fuera de lo que el texto soporta.
  spanish_consistency_notes:
  - Se mantuvo un registro narrativo sobrio y formal, coherente con el contexto de la pasión.
  - «Centurión» se conservó por precisión histórica y consistencia con la audit trail en inglés.
  - «Concedió» conserva la noción de otorgamiento oficial sin introducir lenguaje eclesiástico ajeno al pasaje.
