revisions:
- from: Y, después de enterarse por el centurión[a], le concedió el cuerpo a José.
  to: Y después de saberlo por el centurión, le concedió a José el cuerpo[a].
  rationale: Se ajusta ἀπό para expresar mejor la fuente de la información, se mueve la nota al término πτῶμα/cuerpo, y se suaviza el orden sintáctico para un español más natural sin perder el matiz oficial de «granted».
