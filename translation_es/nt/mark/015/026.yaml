translation:
  language: es
  text: 'Y estaba escrita la inscripción del cargo contra él: «El Rey de los judíos».[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «El Rey de los judeanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιγραφή
  english_pob_choice: inscription
  chosen_spanish: inscripción
  alternatives_spanish:
  - letrero
  - placa
  - título escrito
  lexicon: BDAG
  rationale: En este contexto se trata de un aviso escrito colocado sobre o junto a la cruz. «Inscripción» conserva el sentido formal de un texto escrito y suena natural en español sin ampliar indebidamente el significado.
- source_word: αἰτία
  english_pob_choice: charge against him
  chosen_spanish: cargo
  alternatives_spanish:
  - acusación
  - motivo
  - causa
  lexicon: BDAG
  rationale: Aquí αἰτία nombra el motivo o fundamento legal expuesto públicamente. «Cargo» expresa bien el sentido judicial en español y permite mantener la relación con el escrito colocado sobre la cruz; «cargo contra él» sería más explícito, pero innecesariamente pesado en la frase.
- source_word: ἐπιγεγραμμένη
  english_pob_choice: was written
  chosen_spanish: estaba escrita
  alternatives_spanish:
  - había sido escrita
  - estaba inscrita
  lexicon: BDAG
  rationale: 'La construcción perifrástica con ἦν + participio perfecto indica el estado resultante: la inscripción ya se hallaba puesta. «Estaba escrita» comunica ese estado de manera clara y natural; «estaba inscrita» también es posible, pero «escrita» conserva mejor la sencillez del enunciado.'
- source_word: βασιλεὺς
  english_pob_choice: King
  chosen_spanish: Rey
  alternatives_spanish:
  - rey
  lexicon: BDAG
  rationale: Es un título real dentro del texto de la acusación. «Rey» en mayúscula dentro de la cita preserva su valor titular y reproduce la función formal del rótulo.
- source_word: Ἰουδαίων
  english_pob_choice: the Jews
  chosen_spanish: de los judíos
  alternatives_spanish:
  - de los judeanos
  lexicon: BDAG
  rationale: En este pasaje del relato de la pasión, la fórmula fija del cargo se conserva en su forma más reconocible en español. Aunque «judeanos» es una posibilidad léxica, aquí no mejora la claridad del rótulo y no es necesaria para la lectura pública del versículo.
theological_decisions:
- issue: Renderizado de Ἰουδαίων en el título de la cruz
  english_pob_reading: the Jews
  chosen_spanish_reading: los judíos
  alternative_spanish_readings:
  - los judeanos
  rationale: El versículo transmite el título/inscripción que acompaña la crucifixión. Mantener «los judíos» conserva el carácter tradicional del rótulo tal como aparece en el texto narrativo y evita introducir una precisión geográfica que no está explicitada en la línea inmediata. Se deja constancia de la alternativa «los judeanos» por transparencia lexical, no porque el contexto inmediato la exija.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios aplicados; se mantiene el acuerdo alto del audit trail inglés.'
  spanish_consistency_notes:
  - Se prefirió un español sobrio y publicable, con orden natural de la oración y sin calcos rígidos.
  - Se conservó la mayúscula en «Rey» dentro de la cita por tratarse del contenido formal del letrero.
  - La nota alternativa reproduce la tensión léxica documentada entre «judíos» y «judeanos» sin imponerla en el texto principal.
