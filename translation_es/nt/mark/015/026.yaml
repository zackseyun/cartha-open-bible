  rationale: Se ajusta «de su cargo» a «del cargo contra él» para reflejar con precisión el sentido judicial de αἰτία αὐτοῦ y evitar una lectura ambigua o poco idiomática en español. Se mantiene el resto del texto y la nota léxica sobre «judeanos» porque están bien sustentados por la auditoría inglesa.
