review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ἐπιγραφή como «inscripción», αἰτία en contexto judicial, y el rótulo citado «El Rey de los judíos». Sin embargo, «de su cargo» debilita la fuerza explícita de αἰτία αὐτοῦ, que en el original y en el English POB expresa la acusación/cargo contra él, no un cargo que le pertenece.'
  spanish_quality_summary: El español es claro y digno, pero «la inscripción de su cargo» suena poco natural y puede malentenderse como un puesto/oficio. «La inscripción del cargo contra él» o «de la acusación contra él» comunica mejor el sentido judicial y sigue siendo legible. El resto del verso funciona bien, incluida la cita y la nota alternativa.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «judíos» con nota «judeanos» sigue la decisión auditada. «Inscripción» y «Rey» son adecuados. La revisión necesaria es de precisión semántica en αἰτία, no de glosario doctrinal.
  issues:
  - severity: medium
    issue: «de su cargo» para αἰτία αὐτοῦ
    rationale: 'En español, «su cargo» suele significar puesto, función o responsabilidad, y no transmite con claridad «la acusación/cargo contra él». El genitivo αὐτοῦ aquí es objetivo en contexto judicial: la causa/acusación referente a él.'
  - severity: low
    issue: Ligera pérdida del matiz judicial explícito del English POB
    rationale: El English POB documenta «the charge against him». El borrador conserva parcialmente el campo semántico con «cargo», pero omite «contra él», que evita ambigüedad y alinea mejor con la evidencia fuente.
  revised_spanish_text: 'Y estaba escrita la inscripción del cargo contra él: «El Rey de los judíos».[a]'
  revised_footnotes:
