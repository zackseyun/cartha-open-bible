translation:
  language: es
  text: Y le golpeaban la cabeza con una caña, y le escupían, y, poniéndose de rodillas, se inclinaban ante él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo adoraban». El verbo griego puede significar «inclinarse ante», «rendir homenaje» o «adorar», pero aquí describe la imitación burlona de honores reales por parte de los soldados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔτυπτον
  english_pob_choice: were striking
  chosen_spanish: seguían golpeándole
  alternatives_spanish:
  - golpeaban
  - estaban golpeándole
  lexicon: BDAG
  rationale: El imperfecto expresa acción repetida o en curso. «Seguían golpeándole» conserva ese valor durativo de manera natural en español sin volver más fuerte el verbo de lo que exige el texto.
- source_word: αὐτοῦ τὴν κεφαλήν
  english_pob_choice: his head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - su cabeza
  - la cabeza de él
  lexicon: BDAG
  rationale: La construcción griega es idiomática de posesión. En español, «le» en el verbo y «la cabeza» bastan para expresar el sentido con naturalidad.
- source_word: καλάμῳ
  english_pob_choice: with a reed
  chosen_spanish: con una caña
  alternatives_spanish:
  - con un junco
  - con un bastón de caña
  lexicon: BDAG
  rationale: «κάλαμος» designa una caña o junco. «Caña» es claro y mantiene la referencia al objeto de burla ya presente en la escena.
- source_word: ἐνέπτυον αὐτῷ
  english_pob_choice: spitting on him
  chosen_spanish: escupiéndole
  alternatives_spanish:
  - y le escupían
  - escupiendo sobre él
  lexicon: BDAG
  rationale: El imperfecto indica acción repetida. El gerundio coordinado con el participio anterior reproduce la continuidad del maltrato en español sin sobrecargar la frase.
- source_word: τιθέντες τὰ γόνατα
  english_pob_choice: kneeling down
  chosen_spanish: poniéndose de rodillas
  alternatives_spanish:
  - arrodillándose
  - doblando las rodillas
  lexicon: BDAG
  rationale: La expresión griega es idiomática para arrodillarse. «Poniéndose de rodillas» comunica el gesto de forma directa y idiomática en español.
- source_word: προσεκύνουν
  english_pob_choice: were bowing down to him
  chosen_spanish: le hacían reverencias
  alternatives_spanish:
  - se inclinaban ante él
  - lo adoraban
  lexicon: BDAG
  rationale: En este contexto burlesco, προσκυνέω describe una imitación de honra real, no devoción sincera. «Le hacían reverencias» transmite la postura de homenaje burlón sin cargar el verbo con «adorar».
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - ante él
  lexicon: BDAG
  rationale: El dativo se integra naturalmente en español con complemento indirecto («le»). Mantiene la referencia a Jesús sin sonar forzado.
theological_decisions:
- issue: Sentido de προσκυνέω en una escena de burla
  english_pob_reading: bowing down to him; footnote preserves 'worshiping' as a lexical alternative
  chosen_spanish_reading: le hacían reverencias[a]
  alternative_spanish_readings:
  - se inclinaban ante él
  - lo adoraban
  rationale: El contexto inmediato es de burla y parodia de honor real. Por eso se evita «adoraban», que en español sugiere devoción sincera. Se preserva la tensión lexical con una nota que reconoce la posibilidad de «adorar» como equivalente léxico en otros contextos.
  doctrine_reference: Preservar la tensión léxica y contextual; consistencia terminológica con matiz contextual, no resolución artificial.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y el audit trail inglés. En particular, mantiene el valor imperfectivo de los verbos, el objeto «una caña» para καλάμῳ y una solución contextual para προσκυνέω conforme a la revisión que prefirió una expresión más directa en la escena de burla.
  spanish_consistency_notes:
  - 'Se preserva el paralelismo de acciones: golpear, escupir, arrodillarse y hacer reverencias.'
  - Se evita «SEÑOR» porque el pasaje no contiene el nombre divino ni κύριος en referencia a Yahvé.
  - Se elige un registro digno y actual, apto para lectura pública e iglesia, sin arcaísmos innecesarios.
