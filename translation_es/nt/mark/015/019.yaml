- from: Y seguían golpeándole la cabeza con una caña y escupiéndole, y, poniéndose de rodillas, le hacían reverencias[a].
  to: Y le golpeaban la cabeza con una caña, y le escupían, y, poniéndose de rodillas, se inclinaban ante él[a].
  rationale: Se ajustó «le hacían reverencias» a «se inclinaban ante él» para reflejar más directamente el gesto físico de προσκυνέω en este contexto de burla, en línea con la revisión inglesa auditada. También se cambió «escupiéndole» por «le escupían» para una narración más natural en español y una representación más clara del imperfecto repetitivo. El resto del contenido y la nota léxica se conservaron sustancialmente.
