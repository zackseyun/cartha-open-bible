translation:
  language: es
  text: Y los sumos sacerdotes lo acusaban de muchas cosas[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más formal, «presentaban muchas acusaciones contra él».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y entonces
  - Ahora bien
  lexicon: BDAG
  rationale: Conecta la escena con la narración anterior mediante una coordinación simple, como en el griego y en el inglés POB. En español, 'Y' conserva mejor la parataxis de Marcos que una formulación más explicativa.
- source_word: κατηγόρουν
  english_pob_choice: were accusing
  chosen_spanish: acusaban
  alternatives_spanish:
  - estaban acusando
  - formularon acusaciones contra
  lexicon: BDAG
  rationale: El imperfecto griego expresa acción continuada o reiterada en pasado. 'Acusaban' comunica esa duratividad de forma natural en español sin introducir una perífrasis innecesaria.
- source_word: αὐτοῦ
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - contra él
  - a él
  lexicon: BDAG
  rationale: Aunque el griego usa genitivo, en español el objeto directo pronominal es la forma idiomática y sigue la dirección de la acusación ya marcada por el verbo. 'Lo' mantiene la referencia personal de manera fluida.
- source_word: οἱ ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los sumos sacerdotes
  alternatives_spanish:
  - los principales sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: '''Sumos sacerdotes'' es la equivalencia española más estable para el plural griego ἀρχιερεῖς, entendido como las autoridades sacerdotales principales. ''Sumos'' evita la lectura engañosa de varios titulares individuales del oficio singular.'
- source_word: πολλά
  english_pob_choice: of many things
  chosen_spanish: de muchas cosas
  alternatives_spanish:
  - de muchas acusaciones
  - en muchos puntos
  lexicon: BDAG
  rationale: El neutro plural funciona de modo adverbial u objetivo con κατηγορέω. 'De muchas cosas' conserva la amplitud indefinida del griego sin convertirla de antemano en un lenguaje jurídico más estrecho.
theological_decisions:
- issue: Alcance de la acusación contra Jesús
  english_pob_reading: were accusing him of many things
  chosen_spanish_reading: lo acusaban de muchas cosas
  alternative_spanish_readings:
  - lo estaban acusando de muchas cosas
  - presentaban muchas acusaciones contra él
  rationale: No hay una tesis doctrinal explícita en el versículo; la decisión principal es mantener la indefinición del objeto ('muchas cosas') y la repetición implícita del imperfecto, sin especificar cargos que el texto no enumera.
  doctrine_reference: No aplica; versículo narrativo sin afirmación doctrinal directa.
translation_notes:
  revision_awareness: El texto inglés POB vigente no fue revisado en el último pase y fue confirmado como de alta concordancia con la fuente griega; la versión española sigue esa misma línea sin introducir cambios de sentido ni ampliar el contenido narrativo.
  spanish_consistency_notes:
  - Se mantiene la terminología POB para ἀρχιερεῖς como 'sumos sacerdotes', coherente con el plural institucional del griego.
  - Se conserva el valor imperfectivo de κατηγόρουν con un imperfecto español simple ('acusaban').
  - La nota alternativa refleja la opción más formal ya documentada en el audit trail inglés, adaptada al español sin añadir matices ajenos al original.
