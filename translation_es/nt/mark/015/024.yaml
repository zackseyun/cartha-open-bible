translation:
  language: es
  text: Y lo crucifican, y reparten sus vestiduras entre sí[a], echando suertes sobre ellas para decidir qué tomaría cada uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «echando suertes sobre ellas, para ver quién tomaría qué».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σταυροῦσιν
  english_pob_choice: crucify
  chosen_spanish: crucifican
  alternatives_spanish:
  - crucificaron
  lexicon: BDAG
  rationale: Conservo el presente histórico del griego, como hace la POB en inglés, porque Marcos narra con viveza la acción. En español, «crucifican» mantiene ese valor narrativo sin volverlo un calco forzado.
- source_word: διαμερίζονται
  english_pob_choice: divide
  chosen_spanish: reparten
  alternatives_spanish:
  - dividen
  - distribuyen
  lexicon: BDAG
  rationale: Aquí el verbo se aplica a las vestiduras que se adjudican entre varios. «Reparten» expresa naturalmente la partición del objeto en español, con el mismo sentido distributivo que la POB captura con «divide».
- source_word: τὰ ἱμάτια
  english_pob_choice: garments
  chosen_spanish: vestidos
  alternatives_spanish:
  - ropas
  - prendas
  lexicon: BDAG
  rationale: «Vestidos» conserva la referencia concreta a las prendas de vestir en un registro bíblico claro. Evita tanto la vaguedad de «ropa» como la posible rigidez de un término más técnico.
- source_word: βάλλοντες κλῆρον
  english_pob_choice: casting lots
  chosen_spanish: echando suertes
  alternatives_spanish:
  - tirando suertes
  - echando lotes
  lexicon: BDAG
  rationale: «Echando suertes» es el equivalente bíblico e idiomático natural en español para el sorteo por lotes. Mantiene la forma tradicional de la acción sin perder el sentido técnico del pasaje.
- source_word: ἐπ’ αὐτὰ
  english_pob_choice: for them
  chosen_spanish: sobre ellos
  alternatives_spanish:
  - por ellos
  - encima de ellos
  lexicon: BDAG
  rationale: El griego sugiere la acción de arrojar la suerte sobre los objetos. «Sobre ellos» respeta esa imagen física y deja claro que el sorteo recae sobre las vestiduras.
- source_word: τίς τί ἄρῃ
  english_pob_choice: to decide what each would take
  chosen_spanish: para decidir qué tomaba cada uno
  alternatives_spanish:
  - para ver quién tomaría qué
  - para decidir qué se llevaría cada uno
  lexicon: BDAG
  rationale: 'La cláusula final explica el resultado del sorteo: determinar qué le correspondería a cada persona. «Qué tomaba cada uno» preserva la fuerza distributiva de τίς τί y mantiene la cadencia narrativa del versículo.'
theological_decisions:
- issue: Presente histórico en la narración de la pasión
  english_pob_reading: Retain the historical present ('they crucify') rather than converting to simple past.
  chosen_spanish_reading: Mantener el presente histórico («lo crucifican») en vez de pasarlo al pasado.
  alternative_spanish_readings:
  - lo crucificaron
  rationale: Esta decisión reproduce la textura discursiva de Marcos y la elección auditada de la POB en inglés. No añade contenido doctrinal; conserva la vivacidad narrativa del original.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: El paquete auditado muestra alta coincidencia y ninguna revisión aplicada en la última pasada. La redacción española se ajusta a esa estabilidad textual, conservando el presente histórico y la secuencia sintáctica del griego sin introducir variantes no documentadas.
  spanish_consistency_notes:
  - Se usó «Y» inicial para reproducir el comienzo conjuntivo del griego en un registro bíblico natural.
  - «Vestidos» mantiene un término concreto y sobrio, coherente con el estilo de la POB.
  - La nota [a] se ancla en «echando suertes» porque esa es la expresión que admite la alternativa idiomática documentada.
  - Se evitó «SEÑOR» u otra terminología no pertinente, ya que el versículo no contiene el nombre divino ni un título cristológico.
  - La puntuación separa claramente la acción del reparto y la finalidad del sorteo, como en el griego.
