translation:
  language: es
  text: Pero Jesús, dando un grito fuerte[a], expiró[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un gran grito» o «una voz fuerte».
    reason: lexical_alternative
  - marker: b
    text: O «exhaló su último aliento» o simplemente «murió»; literalmente, «exhaló».
    reason: lexical_alternative
lexical_decisions:
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora
  lexicon: BDAG
  rationale: δέ es una partícula conectiva suave; aquí conviene una transición adversativa o de contraste narrativo. «Pero» mantiene la solemnidad del giro en la escena final sin volver el texto áspero.
- source_word: ἀφεὶς
  english_pob_choice: uttering
  chosen_spanish: dando un grito
  alternatives_spanish:
  - prorrumpiendo en
  - profiriendo
  - soltando
  lexicon: BDAG
  rationale: En este contexto ἀφείς con φωνήν expresa la emisión de una voz o grito. «Dando un grito» transmite de forma natural la acción de emitir ese clamor sin sobreinterpretar el verbo.
- source_word: φωνὴν μεγάλην
  english_pob_choice: a loud cry
  chosen_spanish: un grito fuerte
  alternatives_spanish:
  - un gran grito
  - una voz fuerte
  - un grito en voz alta
  lexicon: BDAG
  rationale: φωνή puede ser «voz», «sonido» o «grito». En la pasión, el valor natural es un clamor audible. «Fuerte» comunica la intensidad/volumen que el inglés POB expresó con «loud».
- source_word: ἐξέπνευσεν
  english_pob_choice: breathed his last
  chosen_spanish: expiró
  alternatives_spanish:
  - exhaló su último aliento
  - murió
  - entregó el espíritu
  lexicon: BDAG
  rationale: ἐκπνέω significa literalmente «exhalar» y, por extensión idiomática, morir. «Expiró» es una forma española sobria y tradicional que conserva el sentido de muerte sin añadir una interpretación teológica ajena al verbo.
- source_word: ὁ δὲ Ἰησοῦς
  english_pob_choice: But Jesus
  chosen_spanish: Pero Jesús
  alternatives_spanish:
  - Y Jesús
  - Ahora Jesús
  lexicon: BDAG
  rationale: El artículo con nombre propio no se expresa de forma independiente en español. El sujeto se presenta naturalmente como «Jesús», con la conexión narrativa llevada por «Pero».
theological_decisions:
- issue: Expresar la muerte de Jesús sin introducir una lectura teológica añadida
  english_pob_reading: breathed his last
  chosen_spanish_reading: expiró
  alternative_spanish_readings:
  - murió
  - entregó el espíritu
  rationale: El versículo describe la muerte de Jesús en términos concisos. «Expiró» conserva la imagen física del aliento y evita importar una formulación interpretativa de otros pasajes. «Entregó el espíritu» se reserva como alternativa porque puede sugerir una armonización con otros evangelios.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se siguió el último pase de revisión del contexto inglés: se mantuvo una formulación formal y sobria para ἀφεὶς φωνὴν μεγάλην, y se conservó para ἐξέπνευσεν una expresión breve que preserve la imagen de la muerte sin añadir contenido ajeno al verbo.'
  spanish_consistency_notes:
  - Se usó «Pero» para δὲ, en línea con el matiz narrativo del pasaje.
  - Se prefirió «Jesús» sin artículo, conforme al uso natural del español.
  - Se evitó «Cristo» y «Señor» porque el versículo no los exige y el texto fuente usa el nombre propio.
  - «Expiró» mantiene la sobriedad del relato y la imagen de respirar/exhalar presente en el verbo griego.
