revisions:
- from: Y cuando llegó la hora sexta, hubo tinieblas sobre toda la tierra[a] hasta la hora novena.
  to: Y cuando llegó la hora sexta, hubo tinieblas sobre toda la región[a] hasta la hora novena.
  rationale: Se corrige la nota para ajustarla al expediente auditado y se revisa γῆ en el texto principal a «región» para reflejar mejor la elección inglesa «land», preservando la alternativa «tierra» en nota sin introducir el sentido menos preciso «mundo». No se requiere adjudicación adicional.
