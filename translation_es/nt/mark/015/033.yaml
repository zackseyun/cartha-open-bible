translation:
  language: es
  text: Y cuando llegó la hora sexta, hubo tinieblas sobre toda la región[a] hasta la hora novena.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda la tierra». La palabra griega puede significar «región» o «tierra».
    reason: alternative_reading
lexical_decisions:
- source_word: γενομένης ὥρας ἕκτης
  english_pob_choice: when the sixth hour had come
  chosen_spanish: cuando llegó la hora sexta
  alternatives_spanish:
  - cuando había llegado la hora sexta
  - cuando fue la hora sexta
  - cuando llegó el sexto hora
  lexicon: BDAG; uso narrativo temporal de γίνομαι
  rationale: La construcción genitiva absoluta con γίνομαι expresa un cambio de momento temporal; en español, 'cuando llegó la hora sexta' comunica con naturalidad ese valor sin perder la referencia exacta a la 'hora sexta'. Se evita convertirla en una hora moderna en el texto principal.
- source_word: σκότος
  english_pob_choice: darkness
  chosen_spanish: tinieblas
  alternatives_spanish:
  - oscuridad
  - tiniebla
  lexicon: BDAG
  rationale: '''σκότος'' denota oscuridad densa; ''tinieblas'' es un equivalente español elevado y bíblicamente apto. Se prefiere el plural tradicional para el efecto solemne del pasaje, sin cambiar el sentido básico.'
- source_word: ἐγένετο
  english_pob_choice: came
  chosen_spanish: hubo
  alternatives_spanish:
  - vino
  - sucedió
  - se hizo
  lexicon: BDAG
  rationale: En español, 'hubo tinieblas' reproduce bien el carácter eventivo de ἐγένετο y suena natural. 'Se hizo' o 'vino' serían posibles, pero menos idiomáticos aquí.
- source_word: ἐφ’ ὅλην τὴν γῆν
  english_pob_choice: over the whole land
  chosen_spanish: sobre toda la tierra
  alternatives_spanish:
  - sobre toda la tierra habitada
  - sobre todo el país
  - sobre todo el país/land
  lexicon: BDAG
  rationale: γῆ puede significar 'tierra' o 'land'. En español, 'toda la tierra' conserva la amplitud y la ambigüedad lexical sin forzar una reducción a 'país'. Se mantiene la tensión semántica documentada por el texto griego.
- source_word: ἕως ὥρας ἐνάτης
  english_pob_choice: until the ninth hour
  chosen_spanish: hasta la hora novena
  alternatives_spanish:
  - hasta la novena hora
  - hasta las tres de la tarde
  - hasta cerca de las tres de la tarde
  lexicon: BDAG
  rationale: Se preserva la expresión temporal de la fuente, manteniendo 'hora novena' como equivalente directo de 'ninth hour'. La modernización horaria queda para nota si se desea, no para el texto base.
theological_decisions:
- issue: Alcance de γῆ en la oscuridad de la crucifixión
  english_pob_reading: land
  chosen_spanish_reading: tierra
  alternative_spanish_readings:
  - mundo
  - país
  - tierra habitada
  rationale: La elección 'tierra' deja abierta la ambigüedad de γῆ, como hace el POB en inglés con 'land' y la nota alternativa 'earth'. No se resuelve dogmáticamente el alcance exacto del fenómeno.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el único marcador de nota, [a], aparezca explícitamente en el texto español y que no existan notas sin anclaje. La redacción principal mantiene la correspondencia directa con el griego y con el auditorial inglés, sin añadir una hora moderna en el cuerpo del versículo.
  spanish_consistency_notes:
  - '''hora sexta'' y ''hora novena'' conservan el sistema horario del pasaje.'
  - '''tinieblas'' mantiene el registro bíblico solemne y el sentido de σκότος.'
  - '''toda la tierra'' deja intacta la ambigüedad de γῆ entre ''land'' y ''earth''.'
  - Se evitó 'SEÑOR' u այլ masking terminology porque el versículo no contiene el nombre divino.
