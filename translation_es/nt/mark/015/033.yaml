review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura temporal del griego: γενομένης ὥρας ἕκτης se traduce naturalmente como «cuando llegó la hora sexta», σκότος como «tinieblas», y ἕως ὥρας ἐνάτης como «hasta la hora novena». Sin embargo, en ἐφ’ ὅλην τὴν γῆν el inglés POB documenta la elección principal «land» con nota «earth». El español principal «tierra» inclina más hacia la alternativa que hacia la elección principal y la nota añade «mundo», que no corresponde a la alternativa auditada del griego.'
  spanish_quality_summary: El español es claro y digno. «Hubo tinieblas» suena natural y apropiado. La única mejora necesaria es ajustar la terminología de γῆ para que el texto principal preserve mejor el matiz de «land» sin cerrar la ambigüedad, y corregir la nota para que presente la alternativa correcta y no introduzca «mundo».
  glossary_alignment: No hay términos del glosario mayor en juego salvo la precisión semántica de γῆ. Para alinearse con la auditoría inglesa y la decisión teológica documentada, conviene usar «tierra» o «región» en texto principal solo si se explica bien la alternativa; mejor aún, «tierra» en español funciona, pero aquí la nota debe ser «O ‘la tierra entera’», no «mundo». Aun así, para acercarse más a «land», «sobre toda la tierra[a]» puede mantenerse si la nota se corrige; sin embargo, «sobre toda la región[a]» preserva mejor la elección principal y deja «tierra entera» como alternativa.
  issues:
  - severity: medium
    issue: La nota al pie introduce «mundo» como alternativa de γῆ.
    rationale: El expediente inglés conserva la alternativa «earth», no «world». «Mundo» desplaza el campo semántico y no refleja con precisión la decisión léxica auditada.
  - severity: medium
    issue: El texto principal «sobre toda la tierra» se acerca más a la alternativa «earth» que a la elección principal inglesa «land».
    rationale: Aunque «tierra» puede conservar cierta ambigüedad en español, en este contexto sugiere más naturalmente «earth». «Región» o una formulación equivalente refleja mejor la cautela del POB sin imponer una afirmación cosmológica global.
  revised_spanish_text: Y cuando llegó la hora sexta, hubo tinieblas sobre toda la región[a] hasta la hora novena.
  revised_footnotes:
  - marker: a
    text: O «toda la tierra». La palabra griega puede significar «región» o «tierra».
    reason: alternative_reading
  revision_rationale: Se corrige la nota para ajustarla al expediente auditado y se revisa γῆ en el texto principal a «región» para reflejar mejor la elección inglesa «land», preservando la alternativa «tierra» en nota sin introducir el sentido menos preciso «mundo». No se requiere adjudicación adicional.
