translation:
  language: es
  text: Pero los principales sacerdotes incitaron[a] a la multitud para que más bien[b] les pusiera en libertad a Barrabás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «azuzaron a la multitud». El verbo griego puede significar provocar, incitar o mover a un grupo hacia una acción deseada.
    reason: lexical_alternative
  - marker: b
    text: O «más bien dicho, preferentemente». La idea es que soltaran a Barrabás en preferencia a la alternativa implícita en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un leve contraste o avance narrativo. «Pero» conserva ese giro adversativo de forma natural en español.
- source_word: ἀρχιερεῖς
  english_pob_choice: the chief priests
  chosen_spanish: los principales sacerdotes
  alternatives_spanish:
  - los sumos sacerdotes
  - los jefes de los sacerdotes
  lexicon: BDAG
  rationale: En español bíblico, «principales sacerdotes» comunica la misma referencia al liderazgo sacerdotal de Jerusalén sin sonar forzado. «Sumos sacerdotes» también es posible, pero aquí el plural y el contexto narrativo favorecen la expresión más transparente.
- source_word: ἀνέσεισαν
  english_pob_choice: stirred up
  chosen_spanish: incitaron
  alternatives_spanish:
  - agitaron
  - azuzaron
  - pusieron en contra
  lexicon: BDAG
  rationale: El verbo griego puede significar arremover, excitar o incitar a un grupo a actuar. «Incitaron» preserva bien la fuerza causal sobre la multitud. En este contexto, es más preciso que un calco como «sacudieron» y más natural que «agitaron».
- source_word: τὸν ὄχλον
  english_pob_choice: the crowd
  chosen_spanish: a la multitud
  alternatives_spanish:
  - al gentío
  - a la gente
  lexicon: BDAG
  rationale: ὄχλος se refiere al grupo reunido. «Multitud» mantiene el valor colectivo y es plenamente idiomático en registro bíblico español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce finalidad. «Para que» comunica de manera clara y directa la relación de propósito.
- source_word: μᾶλλον
  english_pob_choice: instead
  chosen_spanish: más bien
  alternatives_spanish:
  - antes
  - en lugar de eso
  - preferentemente
  lexicon: BDAG
  rationale: μᾶλλον expresa preferencia comparativa. «Más bien» preserva esa preferencia sin añadir explícitamente el término comparado, que queda implícito en el contexto, como en el inglés auditado.
- source_word: τὸν Βαραββᾶν
  english_pob_choice: Barabbas
  chosen_spanish: Barrabás
  alternatives_spanish:
  - Barabás
  - Barrabás
  lexicon: BDAG
  rationale: Se translitera el nombre al uso español bíblico estándar como «Barrabás».
- source_word: ἀπολύσῃ
  english_pob_choice: would release
  chosen_spanish: les soltara
  alternatives_spanish:
  - lo liberara para ellos
  - lo dejara libre para ellos
  lexicon: BDAG
  rationale: ἀπολύω aquí significa liberar o soltar a un preso. «Soltara» refleja bien ese acto judicial concreto y suena natural en español. Se mantiene el dativo beneficiario con «les».
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - para ellos
  - a ellos
  lexicon: BDAG
  rationale: El dativo indica destinatarios o beneficiarios. En español, el clítico dativo «les» integra de forma fluida la referencia y evita repetir una construcción pesada.
translation_notes:
  revision_awareness: 'El draft sigue de cerca el griego SBLGNT y el audit trail inglés: conserva el contraste de δέ, el valor causal de ἀνασείω y la preferencia comparativa de μᾶλλον sin explicitar en el texto principal la alternativa implícita. No se detectaron revisiones aplicadas en el registro fuente, por lo que no hay señales de variantes textuales o decisiones editoriales adicionales que deban reflejarse.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» o fórmulas de máscara porque no aparece el tetragrámaton en este versículo.
  - Se usa «Barrabás» como forma española estable del nombre propio.
  - «Incitaron» y «multitud» mantienen un registro bíblico claro sin caer en arcaísmo.
  - «Más bien» deja abierta la preferencia implícita del contexto, en línea con el audit trail inglés para μᾶλλον.
