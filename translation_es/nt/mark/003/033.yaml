translation:
  language: es
  text: 'Y, respondiéndoles[a], les dice[b]: «¿Quiénes son mi madre y mis hermanos?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Les respondió: “¿Quiénes son mi madre y mis hermanos?”». El griego usa un participio y un presente histórico: «respondiendo… dice».'
    reason: lexical_alternative
  - marker: b
    text: 'O, más literalmente: «¿Quién es mi madre, o mis hermanos?». El griego tiene verbo singular con el primer término y luego añade el segundo con «o», una construcción poco natural en español.'
    reason: previous_rendering
lexical_decisions:
- source_word: ἀποκριθεὶς
  english_pob_choice: answering
  chosen_spanish: respondiéndoles
  alternatives_spanish:
  - les respondió
  - al responderles
  lexicon: BDAG
  rationale: El participio aoristo se conserva mejor en español con una forma participial que refleje la secuencia narrativa y la vivacidad marcana, sin volver la frase rígida.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: BDAG
  rationale: El dativo indica a quién va dirigida la respuesta; en español puede integrarse naturalmente en el verbo pronominalizado o en el complemento indirecto.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico de Marcos para preservar la inmediatez narrativa.
- source_word: Τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién
  alternatives_spanish:
  - ¿Qué persona
  lexicon: BDAG
  rationale: Interrogativo de identidad; «quién» es la equivalencia natural y precisa en español.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: «Madre» es el equivalente digno y estándar, fiel al registro del griego.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: y
  alternatives_spanish:
  - o
  lexicon: BDAG
  rationale: Aunque el griego tiene ἢ, la construcción española más natural en esta pregunta coordinada es «y»; la nota textual queda reflejada en la decisión sobre la formulación idiomática, sin perder el sentido de la pregunta sobre los miembros de la familia.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos
  lexicon: BDAG
  rationale: El plural masculino griego se traduce como «hermanos» sin expansión inclusiva, siguiendo la decisión de mantener la forma masculina cuando el texto inmediato se refiere de manera concreta a hermanos varones.
theological_decisions:
- issue: Familial terminology for ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - familiares
  rationale: La escena presenta de forma concreta a los hermanos de Jesús; ampliar a «hermanos y hermanas» introduciría una interpretación no explicitada por la forma griega ni por el contexto inmediato.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4 (Gender-accurate over gender-neutral)
- issue: Historical present in Mark
  english_pob_reading: he says
  chosen_spanish_reading: dice
  alternative_spanish_readings:
  - dijo
  rationale: El presente histórico conserva la vivacidad narrativa propia de Marcos y evita aplanar el ritmo del relato.
  doctrine_reference: DOCTRINE.md § Style and discourse rendering
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió una formulación más idiomática en inglés para armonizar el singular gramatical del griego con la fluidez del receptor. En español, la estructura «respondiéndoles... dice» ya resulta natural y conserva bien tanto el participio como el presente histórico, por lo que no requiere un cambio paralelo; sí se preserva la alternativa idiomática en nota.
  spanish_consistency_notes:
  - Se mantiene «hermanos» sin expansión inclusiva, en coherencia con la lectura masculina plural del griego.
  - Se conserva el presente histórico «dice» para reflejar el estilo narrativo marcano.
  - Se evita «SEÑOR» u otras sustituciones no pertinentes, dado que no aparece el nombre divino en este versículo.
