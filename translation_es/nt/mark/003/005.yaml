translation:
  language: es
  text: 'Y después de mirarlos alrededor con ira[a], afligido por la dureza de sus corazones[b], le dice al hombre: «Extiende tu mano». Y él la extendió, y su mano fue restaurada.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ira». El griego usa μετ’ ὀργῆς, que expresa acompañamiento; «con ira» mantiene la fuerza directa.
    reason: lexical_alternative
  - marker: b
    text: O «de su corazón». El griego tiene el singular καρδίας con el plural αὐτῶν, probablemente como expresión colectiva; el español pluraliza de forma natural.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  english_pob_choice: after looking around
  chosen_spanish: después de mirar alrededor
  alternatives_spanish:
  - mirando alrededor
  - habiendo mirado alrededor
  lexicon: BDAG
  rationale: El participio aoristo antecede a λέγει; «después de mirar alrededor» conserva la secuencia de acciones de forma natural en español y evita una construcción más pesada.
- source_word: μετ’ ὀργῆς
  english_pob_choice: with anger
  chosen_spanish: con ira
  alternatives_spanish:
  - con enojo
  - en ira
  lexicon: BDAG
  rationale: La preposición con genitivo expresa acompañamiento. «Ira» mantiene la fuerza léxica de ὀργή sin suavizarla; «enojo» sería más leve y menos preciso en este contexto.
- source_word: συλλυπούμενος
  english_pob_choice: grieved
  chosen_spanish: afligido
  alternatives_spanish:
  - entristecido
  - dolido
  lexicon: BDAG
  rationale: El participio expresa estar apenado o entristecido. «Afligido» comunica bien el dolor emocional y permite conservar la coordinación con la ira sin explicitar de más.
- source_word: ἐπὶ τῇ πωρώσει
  english_pob_choice: at the hardness
  chosen_spanish: por la dureza
  alternatives_spanish:
  - a causa de la dureza
  - ante la dureza
  lexicon: BDAG
  rationale: ἐπί con dativo aquí señala la base o causa del dolor. «Por la dureza» es natural en español y conserva la relación causal implícita.
- source_word: τῆς καρδίας αὐτῶν
  english_pob_choice: of their heart / of their hearts
  chosen_spanish: de sus corazones
  alternatives_spanish:
  - de su corazón
  - de sus corazones
  lexicon: BDAG
  rationale: El griego tiene καρδίας singular con αὐτῶν plural; en español, el plural es más natural y refleja la revisión inglesa que optó por «their hearts». Mantiene el sentido colectivo sin forzar un singular idiomático.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - dice
  - les dice
  lexicon: BDAG
  rationale: Se conserva el presente histórico de Marcos con «dice», pero el dativo singular del destinatario hace más fluido «le dice al hombre»; esto evita una repetición torpe del objeto indirecto en español.
- source_word: τῷ ἀνθρώπῳ
  english_pob_choice: to the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  - al varón
  lexicon: BDAG
  rationale: ἄνθρωπος aquí designa al individuo concreto de la escena. «Al hombre» es fiel, claro y natural.
- source_word: Ἔκτεινον τὴν χεῖρα
  english_pob_choice: Stretch out your hand
  chosen_spanish: Extiende tu mano
  alternatives_spanish:
  - Tiende tu mano
  - Alarga tu mano
  lexicon: BDAG
  rationale: El imperativo aoristo exige una acción decidida. «Extiende tu mano» es la equivalencia más transparente y sobria en español para el contexto de sanidad.
- source_word: ἐξέτεινεν
  english_pob_choice: he stretched it out
  chosen_spanish: la extendió
  alternatives_spanish:
  - extendió su mano
  - la alargó
  lexicon: BDAG
  rationale: El verbo repite la orden y el objeto es claro por contexto. En español, «la extendió» conserva la repetición verbal y evita redundancia innecesaria.
- source_word: ἀπεκατεστάθη
  english_pob_choice: was restored
  chosen_spanish: fue restaurada
  alternatives_spanish:
  - quedó restaurada
  - fue sanada
  lexicon: BDAG
  rationale: El pasivo indica retorno a un estado correcto. «Fue restaurada» sigue de cerca el valor léxico y evita reducirlo a un mero matiz médico de «sanada».
theological_decisions:
- issue: 'La respuesta emocional de Jesús: ira y dolor simultáneos'
  english_pob_reading: 'Render both emotions straightforwardly: ''with anger'' and ''grieved,'' without softening either.'
  chosen_spanish_reading: «con ira» y «afligido» se presentan sin atenuar ninguna de las dos emociones.
  alternative_spanish_readings:
  - «indignado» en lugar de «con ira»
  - «profundamente triste» en lugar de «afligido»
  rationale: El texto atribuye a Jesús tanto ira como dolor. La traducción debe conservar esa tensión moral sin suavizarla ni armonizarla artificialmente.
  doctrine_reference: Preservar la tensión teológica y emocional del texto.
translation_notes:
  revision_awareness: La redacción sigue la lectura revisada del inglés POB que ajusta el referente colectivo a «their hearts», y mantiene sin suavizar la doble respuesta emocional de Jesús (ira y aflicción).
  spanish_consistency_notes:
  - Se emplea «Yahvé» como término de base para el nombre divino solo cuando aparece explícitamente en el texto fuente; aquí no aplica.
  - Se conserva el presente histórico con «dice»/«le dice» según la narración de Marcos.
  - «Mano» se traduce literalmente sin sustituciones devocionales.
  - Se evita «SEÑOR» porque el pasaje no contiene κύριος ni un reemplazo del nombre divino.
