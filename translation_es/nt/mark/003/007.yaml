translation:
  language: es
  text: Y Jesús se retiró con sus discípulos al mar[a], y una gran multitud de Galilea lo siguió, y de Judea[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia el mar». La preposición griega puede indicar movimiento en dirección al mar.
    reason: lexical_alternative
  - marker: b
    text: Es decir, el mar de Galilea. El texto griego dice simplemente «el mar».
    reason: cultural_note
lexical_decisions:
- source_word: ἀνεχώρησεν
  english_pob_choice: withdrew
  chosen_spanish: se retiró
  alternatives_spanish:
  - se apartó
  - se retiró de allí
  - se fue
  lexicon: BDAG
  rationale: «Se retiró» conserva la idea de apartarse o replegarse que tiene ἀνεχώρησεν, y en español comunica con naturalidad el movimiento de Jesús sin perder el matiz de retirada frente a presión u oposición.
- source_word: μετὰ τῶν μαθητῶν αὐτοῦ
  english_pob_choice: with his disciples
  chosen_spanish: con sus discípulos
  alternatives_spanish:
  - con sus estudiantes
  - junto con sus discípulos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente establecido y fiel para μαθηταί en el contexto evangélico, porque mantiene la relación de seguimiento y aprendizaje implícita en el término.
- source_word: πρὸς τὴν θάλασσαν
  english_pob_choice: to the sea
  chosen_spanish: hacia el mar[a]
  alternatives_spanish:
  - al mar
  - hacia el lago
  lexicon: BDAG
  rationale: La preposición πρὸς puede expresar dirección o movimiento hacia un lugar. «Hacia el mar» conserva el término literal θάλασσα sin interpretar de inmediato que se trata del mar de Galilea.
- source_word: πολὺ πλῆθος
  english_pob_choice: a great crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una gran muchedumbre
  - un gran gentío
  lexicon: BDAG
  rationale: «Una gran multitud» reproduce bien el énfasis cuantitativo de πολὺ πλῆθος y sigue siendo natural y reverente en español.
- source_word: ἠκολούθησεν
  english_pob_choice: followed
  chosen_spanish: lo siguió
  alternatives_spanish:
  - lo seguía
  - lo acompañó
  lexicon: BDAG
  rationale: El verbo ἀκολουθέω aquí indica seguimiento geográfico del grupo hacia Jesús. «Lo siguió» es la manera más directa y natural de expresar ese movimiento.
- source_word: ἀπὸ τῆς Γαλιλαίας
  english_pob_choice: from Galilee
  chosen_spanish: de Galilea
  alternatives_spanish:
  - desde Galilea
  lexicon: BDAG
  rationale: La construcción «de Galilea» conserva el valor de procedencia del genitivo con ἀπό, de forma fluida en español.
- source_word: ἀπὸ τῆς Ἰουδαίας
  english_pob_choice: and from Judea,
  chosen_spanish: y de Judea,
  alternatives_spanish:
  - y desde Judea,
  lexicon: BDAG
  rationale: Se mantiene la coordinación y la coma final para reflejar que la frase continúa en el versículo siguiente, como en el texto griego y en la auditoría inglesa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego SBLGNT y la auditoría inglesa aprobada sin cambios, preservando la estructura incompleta del enunciado al final del versículo para dejar visible que la frase continúa en el siguiente contexto.
  spanish_consistency_notes:
  - Se mantiene «Jesús» para Ἰησοῦς, conforme al uso establecido.
  - Se conserva «discípulos» para μαθηταί por coherencia con el registro evangélico.
  - «Mar» se deja en el texto principal para θάλασσα, con nota explicativa sobre la dirección posible de πρὸς y la referencia cultural al mar de Galilea.
  - La coordinación final «y de Judea,» queda abierta intencionalmente para reflejar la sintaxis del original.
