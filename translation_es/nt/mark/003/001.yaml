revisions:
- from: Y entró de nuevo en una sinagoga, y había allí un hombre con la mano seca.[b][c][a]
  to: Y entró de nuevo en una sinagoga[a], y había allí un hombre con una mano atrofiada[b].
  rationale: Se reemplazó «mano seca» por «mano atrofiada» para comunicar mejor el sentido de ἐξηραμμένην en español natural y preciso. Se eliminó la nota redundante sobre «había allí un hombre» porque no ofrecía una alternativa real. También se reubicaron los marcadores para anclarlos donde corresponde.
