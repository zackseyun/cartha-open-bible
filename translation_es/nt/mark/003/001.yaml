translation:
  language: es
  text: Y entró de nuevo en una sinagoga[a], y había allí un hombre con una mano atrofiada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la sinagoga», si Marcos pretende una sinagoga específica ya conocida por el contexto inmediato.'
    reason: alternative_reading
  - marker: b
    text: 'O: «con una mano marchita» o «con una mano que se había secado».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰσῆλθεν
  english_pob_choice: entered
  chosen_spanish: entró
  alternatives_spanish:
  - ingresó
  - entró en
  lexicon: BDAG
  rationale: El aoristo narrativo de εἰσέρχομαι se expresa de forma natural con «entró». En español, la preposición puede ir implícita con el verbo de movimiento, por lo que «entró de nuevo en» comunica el mismo valor sin sobrerrecargar la frase.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: de nuevo
  alternatives_spanish:
  - otra vez
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν marca repetición. «De nuevo» es fluido y plenamente equivalente en español narrativo.
- source_word: εἰς συναγωγήν
  english_pob_choice: into a synagogue
  chosen_spanish: en una sinagoga
  alternatives_spanish:
  - a una sinagoga
  - dentro de una sinagoga
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento hacia el interior, en español «entró en una sinagoga» es la forma natural y fiel. La falta de artículo en griego permite «una sinagoga»; no se fija una sinagoga identificada por el contexto inmediato.
- source_word: ἦν ἐκεῖ
  english_pob_choice: a man was there
  chosen_spanish: había allí
  alternatives_spanish:
  - estaba allí
  - había allí un hombre
  lexicon: BDAG
  rationale: La construcción existencial se vierte mejor con «había allí». En español, repetir «había allí un hombre» sería posible, pero aquí la frase ya lo introduce de manera clara y natural; el sentido de ἦν ἐκεῖ queda preservado.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  lexicon: BDAG
  rationale: ἄνθρωπος designa aquí a un individuo masculino en la narración, por lo que «un hombre» es la opción más directa y precisa.
- source_word: ἐξηραμμένην
  english_pob_choice: withered
  chosen_spanish: seca
  alternatives_spanish:
  - marchita
  - reseca
  - atrofiada
  lexicon: BDAG
  rationale: El participio perfecto pasivo de ξηραίνω describe una mano que se ha secado. En español, «mano seca» es más natural que «mano marchita» y conserva el matiz físico sin añadir interpretación médica innecesaria.
- source_word: ἔχων τὴν χεῖρα
  english_pob_choice: with a withered hand
  chosen_spanish: con la mano
  alternatives_spanish:
  - teniendo la mano
  - con su mano
  lexicon: BDAG
  rationale: La construcción participial se vierte idiomáticamente con «con». Dado que «seca» ya califica a «la mano», la equivalencia resultante es «con la mano seca», que refleja el griego sin calco rígido.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden sustancialmente; la única cuestión de revisión relevante es la naturalidad de la expresión locativa/existencial y la elección léxica para ξηραίνω. La versión española conserva la apertura narrativa, respeta la ausencia de artículo en συναγωγήν y mantiene la ambigüedad léxica de ἐξηραμμένην en una nota.
  spanish_consistency_notes:
  - Se mantiene «Y» al inicio para reflejar la continuidad narrativa de καί.
  - Se usa «sinagoga» sin mayúscula por tratarse del sustantivo común.
  - Se opta por «mano seca» como equivalencia española natural del estado descrito por ἐξηραμμένην.
  - Las notas conservan alternativas importantes sin sobrecargar el texto principal.
  - El orden de los marcadores en el texto se ajusta al anclaje de las notas para auditabilidad.
