review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: entrada repetida en una sinagoga, presencia de un hombre allí, y la descripción de su mano afectada. Sin embargo, «con la mano seca» no preserva bien el sentido idiomático y médico-narrativo de ἐξηραμμένην χεῖρα en este contexto de sanidad; suena menos natural y potencialmente equívoco en español. Además, la nota c no funciona como alternativa real porque repite esencialmente la redacción principal.'
  spanish_quality_summary: La frase es mayormente natural y clara, pero «mano seca» resulta poco idiomático en español bíblico actual y puede sonar como sequedad superficial más que mano atrofiada o marchita. «Tenía la mano atrofiada» o «con una mano atrofiada» lee mejor. También conviene reubicar las notas para anclarlas en las palabras pertinentes, no al final de toda la oración.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La revisión se centra en precisión léxica de ἐξηραμμένην y en claridad estilística. «Sinagoga» y «hombre» están bien; «de nuevo» para πάλιν también. La alternativa sobre «la sinagoga» puede conservarse. La nota léxica debe anclarse en «atrofiada» o equivalente.
  issues:
  - severity: medium
    issue: «con la mano seca» es una elección léxica débil para ἐξηραμμένην χεῖρα
    rationale: Aunque literalmente puede sugerir 'secada', en español actual no es la forma más natural para una extremidad inutilizada en un relato de curación. El contexto favorece «atrofiada» o una alternativa similar, como ya reconoce la nota del propio borrador.
  - severity: low
    issue: La nota c no aporta una alternativa distinguible
    rationale: 'El texto principal ya dice «había allí un hombre»; por tanto, la nota «O: “y había allí un hombre”» no añade información útil y parece derivada mecánicamente del inglés.'
  - severity: low
    issue: Los marcadores de nota están mal anclados al final de la oración
    rationale: 'Las notas deberían aparecer junto al término o frase relevante: la alternativa de «sinagoga» junto a «una sinagoga», y la alternativa léxica junto a «atrofiada».'
  revised_spanish_text: Y entró de nuevo en una sinagoga[a], y había allí un hombre con una mano atrofiada[b].
  revised_footnotes:
