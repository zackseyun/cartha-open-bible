translation:
  language: es
  text: 'Y les dijo: «¿Es lícito en sábado[a] hacer el bien o hacer daño, salvar una vida o quitarla?» Pero ellos guardaban silencio.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «en los sábados», un plural idiomático griego que se refiere al sábado como día de reposo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔξεστιν
  english_pob_choice: Is it lawful
  chosen_spanish: ¿Es lícito
  alternatives_spanish:
  - ¿Está permitido
  - ¿Es permitido
  lexicon: BDAG
  rationale: En este contexto de controversia sobre la observancia del sábado, ἔξεστιν formula una pregunta sobre lo que es lícito o permitido. «Es lícito» conserva el matiz jurídico sin sonar arcaico en español.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en sábado
  alternatives_spanish:
  - en los sábados
  - en el sábado
  lexicon: BDAG
  rationale: El griego usa el plural idiomático «los sábados», pero en español la forma natural y fiel al sentido es «en sábado». Mantiene la referencia al día de reposo sin forzar un plural poco idiomático.
- source_word: ἀγαθοποιῆσαι
  english_pob_choice: to do good
  chosen_spanish: hacer el bien
  alternatives_spanish:
  - hacer lo bueno
  - obrar el bien
  lexicon: BDAG
  rationale: La expresión verbal comunica acción benéfica. «Hacer el bien» preserva la fuerza ética y suena natural en español.
- source_word: κακοποιῆσαι
  english_pob_choice: to do harm
  chosen_spanish: hacer el mal
  alternatives_spanish:
  - hacer daño
  - obrar mal
  lexicon: BDAG
  rationale: 'Aunque el inglés POB eligió «do harm» para destacar el contraste práctico, el griego admite el contraste moral de bien/mal. En español, «hacer el mal» mantiene el paralelismo retórico del dicho, mientras la frase siguiente concreta el resultado: salvar o quitar una vida.'
- source_word: ψυχὴν
  english_pob_choice: a life
  chosen_spanish: una vida
  alternatives_spanish:
  - un alma
  - una persona
  lexicon: BDAG
  rationale: Aquí ψυχή contrasta con matar y se refiere a la vida de una persona, no a la parte inmaterial. «Una vida» es la equivalencia contextual más clara.
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - preservar
  - rescatar
  lexicon: BDAG
  rationale: «Salvar» conserva la relación léxica con σῴζω y funciona bien en la oposición con «quitarla».
- source_word: ἀποκτεῖναι
  english_pob_choice: to kill
  chosen_spanish: quitarla
  alternatives_spanish:
  - matarla
  - darle muerte
  lexicon: BDAG
  rationale: El verbo básico significa matar. En español, «quitarla» mantiene la referencia a «una vida» y refleja el contraste breve y contundente del dicho; «matarla» también sería posible, pero «quitarla» enlaza mejor con «salvar una vida».
- source_word: ἐσιώπων
  english_pob_choice: they were silent
  chosen_spanish: guardaban silencio
  alternatives_spanish:
  - estaban callados
  - no respondían
  lexicon: BDAG
  rationale: El imperfecto expresa una silenciosa continuidad. «Guardaban silencio» reproduce bien ese valor aspectual y el tono narrativo.
theological_decisions:
- issue: Sabbath idiom and singular/plural tension
  english_pob_reading: Retain the plural form 'on the Sabbaths' in the main text
  chosen_spanish_reading: Usar el singular idiomático «en sábado» en el texto principal, con nota sobre el plural griego
  alternative_spanish_readings:
  - en los sábados
  - en el sábado
  rationale: El griego es plural («τοῖς σάββασιν»), pero en español una traducción literal al plural resultaría extraña y podría oscurecer el contexto inmediato de un solo día de reposo. La nota preserva la transparencia al texto fuente sin sacrificar la legibilidad.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; documented idiom handling'
translation_notes:
  revision_awareness: 'La auditoría inglesa revisó la construcción idiomática del plural griego de «los sábados» y concluyó que, aunque formalmente transparente, en inglés era más natural «on the Sabbath». Para el español, se siguió el mismo principio: se conserva la transparencia al sentido del original sin producir un plural impropio en la lengua meta.'
  spanish_consistency_notes:
  - Se mantiene «sábado» como término clave para el día de reposo, en coherencia con el tratamiento idiomático del griego.
  - Se evita «Cristo»/«Mesías» porque no aparece en el versículo.
  - «Guardaban silencio» preserva la continuidad aspectual del imperfecto griego.
  - La pareja «hacer el bien / hacer el mal» conserva el paralelismo retórico del interrogante.
