translation:
  language: es
  text: Y designó a doce[a], para que estuvieran con él y para que los enviara a predicar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «a quienes también llamó apóstoles».'
    reason: textual_variant
  - marker: b
    text: 'O: «a proclamar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: appointed
  chosen_spanish: nombró
  alternatives_spanish:
  - designó
  - constituyó
  - appointó
  lexicon: BDAG
  rationale: En este contexto, ἐποίησεν con 'doce' no significa 'hacer' en sentido creativo, sino establecerlos en una función. 'Nombró' comunica de forma natural esa constitución o designación sin perder el valor institucional del verbo.
- source_word: δώδεκα
  english_pob_choice: twelve
  chosen_spanish: doce
  alternatives_spanish:
  - los doce
  lexicon: BDAG
  rationale: El griego dice literalmente 'doce' sin artículo explícito. En español puede mantenerse la elipsis con 'doce'; 'los doce' también sería posible, pero añade una determinación que no está en la forma griega de esta cláusula.
- source_word: ἵνα ὦσιν μετ’ αὐτοῦ
  english_pob_choice: so that they might be with him
  chosen_spanish: para que estuvieran con él
  alternatives_spanish:
  - a fin de que estuvieran con él
  - para que fuesen con él
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa finalidad. 'Para que estuvieran con él' conserva el sentido de propósito y suena natural en español contemporáneo, sin forzar un matiz distinto al del original.
- source_word: ἀποστέλλῃ
  english_pob_choice: he might send them out
  chosen_spanish: enviarlos
  alternatives_spanish:
  - mandarlos
  - comisionarlos
  - enviarlos fuera
  lexicon: BDAG
  rationale: ἀποστέλλω implica enviar con encargo. 'Enviarlos' es el equivalente más directo y claro en español; el contexto ya aporta la idea de misión o comisión, por lo que no es necesario introducir un término más técnico en el texto principal.
- source_word: κηρύσσειν
  english_pob_choice: to preach
  chosen_spanish: predicar
  alternatives_spanish:
  - proclamar
  - anunciar públicamente
  lexicon: BDAG
  rationale: κηρύσσω puede significar 'proclamar' o 'predicar'. En este contexto de ministerio público, 'predicar' es la opción más idiomática y fiel en español eclesial moderno, mientras que 'proclamar' queda como alternativa válida.
theological_decisions:
- issue: Lectura textual con posible título apostólico implícito
  english_pob_reading: Do not add 'apostles' to the translation of this verse; preserve the shorter reading in the main text.
  chosen_spanish_reading: No añadir 'apóstoles' en el texto principal; mantener la lectura breve.
  alternative_spanish_readings:
  - Y nombró a doce, a quienes también llamó apóstoles...
  - Y nombró a doce, nombrándolos apóstoles...
  rationale: El texto griego base recibido no incluye la expansión 'a quienes también llamó apóstoles'. Para respetar la transparencia textual, el texto principal conserva la lectura breve, y la variante se registra en nota como alternativa de testigos manuscritos.
  doctrine_reference: 'Principio POB: primacía del texto fuente y preservación de variantes textuales en nota cuando afectan la lectura tradicional.'
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones posteriores; la lectura aprobada permaneció estable y de alta concordancia en el control cruzado.
  spanish_consistency_notes:
  - Se mantuvo 'él'/'él' en referencia a Jesús de forma implícita, conforme al contexto inmediato del evangelio.
  - Se evitó 'apóstoles' en el cuerpo principal por no aparecer en el texto griego base provisto, pero se preservó la variante textual en nota.
  - '''Predicar'' se usó como equivalente natural de κηρύσσειν en un registro bíblico moderno y readable para iglesias hispanohablantes.'
