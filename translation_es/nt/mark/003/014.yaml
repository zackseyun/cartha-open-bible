  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: ἐποίησεν + δώδεκα se entiende correctamente como constitución/designación del grupo; conserva la finalidad doble introducida por ἵνα; no introduce ''apóstoles'' en el texto principal; y mantiene la alternativa léxica de κηρύσσειν en nota. Sin embargo, la segunda cláusula de propósito en español (''para enviarlos a predicar'') suaviza la simetría del griego, donde también hay ἵνα + subjuntivo con sujeto explícito (''para que él los enviara'').'
  spanish_quality_summary: El español es claro y natural, pero puede mejorarse para reflejar con más precisión la estructura y el matiz verbal del original. 'Nombró a doce' es aceptable, aunque 'designó a doce' refleja un poco mejor el sentido institucional sin sugerir meramente poner nombre. La repetición de 'para que... y para que...' suena natural y preserva mejor la doble finalidad del griego que el infinitivo actual.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se respeta la decisión de no añadir 'apóstoles' al texto principal. 'Predicar' para κηρύσσειν está bien, con 'proclamar' como alternativa en nota. La variante textual está bien documentada en español.
  issues:
  - severity: medium
    issue: La segunda cláusula de finalidad no refleja plenamente el segundo ἵνα + subjuntivo.
    rationale: El griego dice καὶ ἵνα ἀποστέλλῃ αὐτοὺς κηρύσσειν, literalmente 'y para que los enviara a predicar'. El borrador usa 'para enviarlos a predicar', que sigue el sentido general pero omite el paralelismo y el sujeto verbal explícito de la acción de enviar.
  - severity: low
    issue: '''Nombró'' puede entenderse como ''dar nombre'' más que ''designar/constituir''.'
    rationale: Aunque en contexto funciona, el inglés auditado eligió 'appointed' por su fuerza institucional. En español, 'designó' o 'constituyó' reflejan mejor esa idea; además la nota textual ya usa 'llamó apóstoles', por lo que 'nombró' en el texto principal puede rozar una ambigüedad no deseada.
  revised_spanish_text: Y designó a doce[a], para que estuvieran con él y para que los enviara a predicar[b].
  revised_footnotes:
  - marker: a
    text: 'Algunos manuscritos añaden: «a quienes también llamó apóstoles».'
    reason: textual_variant
  - marker: b
