revisions:
- from: Y nombró a doce[a], para que estuvieran con él y para enviarlos a predicar[b].
  to: Y designó a doce[a], para que estuvieran con él y para que los enviara a predicar[b].
  rationale: Se ajusta el verbo principal a 'designó' para reflejar mejor el sentido de constitución/nombramiento institucional de ἐποίησεν en contexto, y se restituye la estructura paralela de doble finalidad ('para que... y para que...') para representar con más fidelidad los dos ἵνα del griego. Las notas se mantienen sustancialmente iguales, con formato limpio y marcadores correctamente anclados.
