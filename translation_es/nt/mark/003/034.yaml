translation:
  language: es
  text: 'Y mirando alrededor a los que estaban sentados en círculo a su alrededor, dice: «Miren, mi madre y mis hermanos[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas». El griego dice «hermanos», pero el grupo más amplio alrededor de Jesús pudo haber incluido también mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: περιβλεψάμενος
  english_pob_choice: looking around
  chosen_spanish: mirando alrededor
  alternatives_spanish:
  - habiendo mirado alrededor
  - echando una mirada alrededor
  lexicon: BDAG
  rationale: El participio aoristo medio expresa una acción visual deliberada; «mirando alrededor» conserva la vividez narrativa sin volverla rígida o excesivamente literal.
- source_word: τοὺς περὶ αὐτὸν κύκλῳ καθημένους
  english_pob_choice: those seated around him in a circle
  chosen_spanish: a los que estaban sentados a su alrededor en círculo
  alternatives_spanish:
  - a los que estaban sentados alrededor de él
  - a los que estaban sentados en círculo a su alrededor
  lexicon: BDAG
  rationale: La expresión combina la cercanía espacial («a su alrededor») con la idea de totalidad o disposición circular («en círculo»). En español se preservan ambos elementos de forma natural.
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: dice
  alternatives_spanish:
  - dijo
  lexicon: BDAG
  rationale: Se mantiene el presente histórico característico de Marcos, en lugar de pasarlo a pretérito simple.
- source_word: Ἴδε
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Mira
  - Vean
  lexicon: BDAG
  rationale: Ἴδε funciona como llamado de atención. «Miren» conserva la fuerza deíctica en un español contemporáneo y comunitario, sin el tono arcaico de «He aquí» o «He aquí/Hele».
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mamá
  lexicon: BDAG
  rationale: Es el sentido léxico estándar y el más adecuado para un registro bíblico sobrio.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Aunque el griego está en masculino plural, el contexto familiar y la nota del POB inglés permiten reflejar en español la posible amplitud del grupo con la forma natural «hermanos», sin forzar una glosa inclusiva en el texto principal.
theological_decisions:
- issue: Alcance potencialmente mixto del grupo designado por ἀδελφοί
  english_pob_reading: brothers; the wider group around Jesus may have included women as well
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se conserva la forma masculina plural que corresponde al griego, mientras la nota explica que el grupo más amplio alrededor de Jesús pudo incluir mujeres. Así se mantiene la tensión lexical sin alterar el texto base.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: Se ajustó el llamado de atención para que el marcador de nota quede anclado exactamente en el sustantivo con posible amplitud semántica, evitando el error de una nota sin anclaje en el texto.
  spanish_consistency_notes:
  - Se preserva el presente histórico con «dice» para corresponder al estilo narrativo de Marcos.
  - «En círculo» mantiene la fuerza de κύκλῳ sin sonar forzado en español.
  - «Miren» traduce el deíctico Ἴδε con naturalidad contemporánea y sin arcaísmo.
  - Se usa «hermanos» como forma principal, con nota aclaratoria sobre el posible alcance del grupo.
