  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: Jesús mira alrededor, se dirige a los que están sentados en torno a él, mantiene el presente histórico con «dice», y conserva «madre» y «hermanos». También preserva correctamente la nota alternativa para ἀδελφοί. Sin embargo, la construcción «mirando alrededor a los que estaban sentados a su alrededor en círculo» suena algo pesada y repetitiva en español, y puede mejorarse sin perder ninguno de los elementos espaciales del original.'
