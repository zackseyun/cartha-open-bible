translation:
  language: es
  text: y tener autoridad para expulsar a los demonios[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'echar fuera a los demonios'.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Conecta esta frase infinitiva con la comisión anterior; en español, 'y' es la coordinación natural aquí.
- source_word: ἔχειν
  english_pob_choice: to have
  chosen_spanish: tener
  alternatives_spanish:
  - poseer
  lexicon: BDAG
  rationale: El infinitivo español 'tener' reproduce de forma directa y natural el sentido de posesión/atribución de la comisión.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - poder
  - derecho
  lexicon: BDAG
  rationale: '''Autoridad'' refleja mejor una prerrogativa delegada o comisionada, no mera capacidad bruta. En este contexto, Jesús concede una comisión con competencia para actuar.'
- source_word: ἐκβάλλειν
  english_pob_choice: to cast out
  chosen_spanish: expulsar
  alternatives_spanish:
  - echar fuera
  - arrojar fuera
  - expulsar / echar fuera
  lexicon: BDAG
  rationale: En español, 'expulsar' transmite bien la acción de sacar a fuerzas a los demonios sin sonar tan idiomático-calco como 'echar fuera'. Mantiene la fuerza exorcística del verbo.
- source_word: τὰ δαιμόνια
  english_pob_choice: demons
  chosen_spanish: los demonios
  alternatives_spanish:
  - los demonios impuros
  - los espíritus inmundos
  lexicon: BDAG
  rationale: El texto griego dice δαιμόνια, no πνεύματα ἀκάθαρτα; por eso la traducción debe conservar 'demonios' sin importar la formulación de pasajes cercanos.
theological_decisions:
- issue: Naturaleza de ἐξουσία en la comisión de los Doce
  english_pob_reading: authority
  chosen_spanish_reading: autoridad
  alternative_spanish_readings:
  - poder
  rationale: La frase subraya una capacidad otorgada por comisión, no solo un poder milagroso abstracto. 'Autoridad' preserva mejor el matiz de prerrogativa delegada.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente del texto inglés no introdujo cambios; el acuerdo crítico es alto y no hay revisiones aplicadas que alteren esta elección española.
  spanish_consistency_notes:
  - Se mantiene 'demonios' porque el griego usa δαιμόνια y no 'espíritus inmundos'.
  - Se evita 'Cristo' o terminología eclesiástica no presente en el versículo.
  - '''Autoridad'' conserva la fuerza de ἐξουσία como comisión delegada.'
  - 'El infinitivo coordinado se resuelve de forma natural en español: ''y tener autoridad para...'''
