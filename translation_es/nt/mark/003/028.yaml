revisions:
- from: En verdad les digo que todo pecado será perdonado a los hijos de los hombres[a], y cualesquiera blasfemias que pronuncien;
  to: En verdad les digo que todos los pecados serán perdonados a los hijos de los hombres[a], y cualquier blasfemia que pronuncien;
  rationale: Se revisa «todo pecado» a «todos los pecados» para reflejar el plural griego τὰ ἁμαρτήματα y preservar mejor el paralelismo con «blasfemia». También se ajusta el verbo a plural («serán perdonados»). Se mantiene «a los hijos de los hombres» con nota inclusiva, en línea con la decisión POB. «Cualquier blasfemia que pronuncien» ofrece español más natural sin perder el alcance indefinido de ὅσα ἐὰν βλασφημήσωσιν.
