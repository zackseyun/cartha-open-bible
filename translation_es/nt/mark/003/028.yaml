translation:
  language: es
  text: En verdad les digo que todos los pecados serán perdonados a los hijos de los hombres[a], y cualquier blasfemia que pronuncien;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Expresión genérica que significa «seres humanos» o «personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀμὴν
  english_pob_choice: Truly
  chosen_spanish: En verdad
  alternatives_spanish:
  - Amén
  - Verdaderamente
  lexicon: BDAG
  rationale: En la fórmula sinóptica Ἀμὴν λέγω ὑμῖν, «En verdad» reproduce el valor solemne del marcador discursivo sin transliterarlo, y suena natural en español bíblico actual.
- source_word: λέγω ὑμῖν
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les digo a ustedes
  - les afirmo
  lexicon: BDAG
  rationale: «Les digo» conserva la primera persona, la dirección a los oyentes y el tono de declaración solemne con una construcción española natural.
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todos
  - todas las cosas
  lexicon: BDAG
  rationale: En este contexto, el neutro plural funciona de manera comprehensiva sobre los sustantivos siguientes; «todo pecado» evita un calco rígido como «todas las cosas» y no introduce un sentido ajeno.
- source_word: ἀφεθήσεται
  english_pob_choice: will be forgiven
  chosen_spanish: será perdonado
  alternatives_spanish:
  - será absuelto
  - será remitido
  lexicon: BDAG
  rationale: En contexto de pecado, el futuro pasivo de ἀφίημι expresa perdón. «Será perdonado» mantiene el sentido teológico de la frase sin sobreexplicar.
- source_word: τοῖς υἱοῖς τῶν ἀνθρώπων
  english_pob_choice: the sons of men
  chosen_spanish: a los hijos de los hombres
  alternatives_spanish:
  - a los seres humanos
  - a las personas
  lexicon: BDAG
  rationale: Se conserva la forma semítica y masculinizada del original, porque el texto griego usa literalmente «hijos»; el sentido inclusivo queda claro por el uso genérico de la expresión.
- source_word: τὰ ἁμαρτήματα
  english_pob_choice: sins
  chosen_spanish: todo pecado
  alternatives_spanish:
  - todos los pecados
  - las transgresiones
  lexicon: BDAG
  rationale: Aunque el griego usa plural, el alcance es genérico y abarcador; en español, «todo pecado» comunica bien la amplitud sin perder la referencia a actos de pecado.
- source_word: βλασφημίαι
  english_pob_choice: blasphemies
  chosen_spanish: blasfemias
  alternatives_spanish:
  - injurias
  - palabras blasfemas
  lexicon: BDAG
  rationale: «Blasfemias» preserva la carga religiosa específica del término, especialmente por el contexto inmediato sobre hablar contra el Espíritu Santo.
- source_word: ὅσα ἐὰν βλασφημήσωσιν
  english_pob_choice: whatever blasphemies they may utter
  chosen_spanish: cualesquiera blasfemias que pronuncien
  alternatives_spanish:
  - cuantas blasfemias pronuncien
  - cualesquiera blasfemias que puedan decir
  lexicon: BDAG
  rationale: La cláusula relativa indefinida se expresa de modo natural con «cualesquiera ... que pronuncien», manteniendo el alcance abierto y la idea de habla blasfema.
theological_decisions:
- issue: Amplitud del perdón y tensión con la advertencia inmediata del contexto
  english_pob_reading: Render the verse as a sweeping declaration of forgiveness in its own terms, without importing the exception from the next verse into this verse's wording.
  chosen_spanish_reading: La frase se traduce como una afirmación amplia de perdón, sin incorporar en su redacción la excepción que aparece en el versículo siguiente.
  alternative_spanish_readings:
  - Todo pecado y toda blasfemia les será perdonada, salvo...
  - Se perdonarán todos los pecados, excepto...
  rationale: El verso, por sí solo, declara amplitud; la restricción pertenece al contexto inmediato posterior. La traducción debe preservar esa tensión en lugar de resolverla antes de tiempo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Expresión genérica «los hijos de los hombres»
  english_pob_reading: Retain 'the sons of men' in the main text with an inclusive footnote.
  chosen_spanish_reading: Se conserva «los hijos de los hombres» en el texto principal, con nota explicativa sobre su sentido inclusivo.
  alternative_spanish_readings:
  - los seres humanos
  - las personas
  - la humanidad
  rationale: El griego es semítico y masculino en su forma, pero funciona genéricamente. Mantener la forma del original protege la huella lexical del texto y la nota aclara el sentido inclusivo.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'La redacción sigue el último ajuste auditado del POB en inglés: se refleja el dativo indirecto con «a los hijos de los hombres» y se conserva el alcance amplio de la afirmación sin mezclarla con la advertencia del versículo siguiente. También se mantiene la equivalencia óptima entre la fórmula solemne inicial y el español bíblico natural.'
  spanish_consistency_notes:
  - Se usa «En verdad» para el marcador solemne Ἀμὴν, en lugar de «Amén», porque el valor pragmático aquí es declarativo y no litúrgico.
  - Se prefiere «blasfemias» por su fuerza religiosa específica; «injurias» sería demasiado general en este contexto.
  - La nota [a] aclara la inclusión genérica de «los hijos de los hombres» sin sustituir la forma del texto principal.
  - «Todo pecado» resume el valor abarcador de πάντα + τὰ ἁμαρτήματα sin añadir un plural innecesario en español.
