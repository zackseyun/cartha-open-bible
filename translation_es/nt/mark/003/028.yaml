review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la fórmula solemne («En verdad les digo»), el sentido futuro pasivo de perdón, la fuerza teológica de «blasfemias» y la expresión genérica semítica con nota inclusiva. Sin embargo, no preserva adecuadamente la estructura comprehensiva del griego/POB inglés: πάντα + los plurales appositivos τὰ ἁμαρτήματα καὶ αἱ βλασφημίαι. «Todo pecado será perdonado» pasa de plural a singular y deja «blasfemias» coordinado de forma menos clara, como si solo el pecado en singular fuera perdonado.'
  spanish_quality_summary: El español es legible y digno, pero «cualesquiera blasfemias que pronuncien» suena algo rígido, y la combinación con «todo pecado» produce una sintaxis menos natural y menos precisa que una coordinación plural. Una redacción plural coordinada mejora claridad, fidelidad y fluidez.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «En verdad», «blasfemias» y la nota sobre «los hijos de los hombres» están alineadas. El punto principal es léxico-sintáctico: τὰ ἁμαρτήματα debe reflejarse mejor como «los pecados» o «todos los pecados», no como singular genérico «todo pecado», dado el paralelo con «las blasfemias».'
  issues:
  - severity: medium
    issue: «todo pecado» traduce un plural appositivo griego como singular genérico
    rationale: El griego tiene τὰ ἁμαρτήματα en plural, en coordinación con αἱ βλασφημίαι. El singular español debilita el paralelismo y puede alterar el alcance de la declaración.
  - severity: medium
    issue: La estructura española no refleja con suficiente claridad que tanto los pecados como las blasfemias están dentro del alcance de «será/serán perdonados»
    rationale: Con «todo pecado será perdonado..., y cualesquiera blasfemias que pronuncien», la segunda parte queda algo colgante. Una formulación plural coordinada expresa mejor el sentido de conjunto del original.
  - severity: low
    issue: «cualesquiera blasfemias» es correcto pero algo tieso en español actual
    rationale: «Cualesquiera» no es incorrecto, pero «cualquier blasfemia que pronuncien» o, mejor aún en plural paralelo, «y cualquier blasfemia que pronuncien» suena más natural. No obstante, por fidelidad estructural conviene una solución plural amplia.
  revised_spanish_text: En verdad les digo que todos los pecados serán perdonados a los hijos de los hombres[a], y cualquier blasfemia que pronuncien;
