review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia y el sentido básico del griego: «salieron», «de inmediato», «con los herodianos», «contra él» y «destruirlo» corresponden adecuadamente a ἐξελθόντες, εὐθύς, μετὰ τῶν Ἡρῳδιανῶν, κατ’ αὐτοῦ y ἀπολέσωσιν. También conserva correctamente la decisión auditada de mantener el valor amplio de ἀπόλλυμι en el texto principal con nota para la alternativa más explícita. Sin embargo, «para ver cómo» añade un matiz no exigido por ὅπως; el griego expresa propósito/deliberación, no necesariamente exploración tentativa. «Cómo destruirlo» o «para destruirlo» preserva mejor la fuerza del original y del POB inglés.'
  spanish_quality_summary: 'El español es claro y natural, pero puede afinarse. «Comenzaron a tramar» suena idiomático y transmite conspiración, aunque «tramar» ya incluye hostilidad y funciona bien aquí. El principal ajuste necesario es quitar «para ver», que alarga la frase y introduce una idea de tanteo menos directa. La nota al pie necesita pulirse: sobra la comilla simple inicial y conviene eliminarla para ajustarse a un formato limpio.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Herodianos» es adecuado; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión de mantener «destruirlo» en vez de «matarlo» está alineada con la justificación léxica y teológica documentada.
  issues:
  - severity: medium
    issue: «para ver cómo» sobretraduce ὅπως
    rationale: ὅπως con subjuntivo aquí introduce el objetivo/deliberación del complot. «Para ver cómo» añade una noción de exploración o tanteo que no está explícita en el griego ni en el POB inglés.
  - severity: low
    issue: Formato de la nota al pie con comilla sobrante
    rationale: La nota comienza con una comilla simple innecesaria antes de «O», lo que afecta la limpieza editorial aunque no el sentido.
