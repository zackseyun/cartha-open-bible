translation:
  language: es
  text: Y los fariseos salieron y, de inmediato, comenzaron a tramar con los herodianos[a] contra él, cómo destruirlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más explícita en el contexto: «matarlo» o «ponerlo a muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξελθόντες
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - habiendo salido
  - después de salir
  lexicon: BDAG
  rationale: El aoristo participial de ἐξέρχομαι expresa una acción de salida que acompaña la narración. En español, «salieron» transmite con naturalidad el movimiento sin sobrecargar la frase con una perífrasis participial que resultaría menos idiomática.
- source_word: εὐθὺς
  english_pob_choice: immediately
  chosen_spanish: de inmediato
  alternatives_spanish:
  - inmediatamente
  - al instante
  lexicon: BDAG
  rationale: Mantiene la urgencia narrativa característica de Marcos. «De inmediato» suena natural en español y conserva el valor adverbial enfático.
- source_word: μετὰ τῶν Ἡρῳδιανῶν
  english_pob_choice: with the Herodians
  chosen_spanish: con los herodianos
  alternatives_spanish:
  - junto con los herodianos
  lexicon: BDAG
  rationale: μετά con genitivo indica asociación. Se translitera el grupo como «herodianos», forma natural y reconocible en español para este partido o facción vinculada a Herodes.
- source_word: συμβούλιον ἐδίδουν
  english_pob_choice: began plotting
  chosen_spanish: comenzaron a tramar
  alternatives_spanish:
  - comenzaron a tomar consejo
  - estaban consultando
  - hacían planes
  lexicon: BDAG
  rationale: La expresión idiomática συμβούλιον διδόναι implica deliberación o consulta, pero el contexto hostil exige que esa consulta se lea como conspiración. «Comenzaron a tramar» comunica bien el carácter conspirativo y refleja el imperfecto con matiz incoativo, equivalente al «began» del audit trail inglés.
- source_word: κατ’ αὐτοῦ
  english_pob_choice: against him
  chosen_spanish: contra él
  alternatives_spanish:
  - en contra de él
  lexicon: BDAG
  rationale: La preposición κατά con genitivo tiene fuerza adversativa. «Contra él» preserva de manera directa la hostilidad del texto.
- source_word: ὅπως
  english_pob_choice: how
  chosen_spanish: para ver cómo
  alternatives_spanish:
  - cómo
  - de qué manera
  lexicon: BDAG
  rationale: Con subjuntivo, ὅπως introduce aquí la finalidad o el modo del plan. «Para ver cómo» fluye bien en español y conserva la dimensión deliberativa del complot sin forzar una subordinación más técnica.
- source_word: ἀπολέσωσιν
  english_pob_choice: destroy him
  chosen_spanish: destruirlo
  alternatives_spanish:
  - matarlo
  - quitarlo de en medio
  - ponerlo a muerte
  lexicon: BDAG
  rationale: ἀπόλλυμι puede abarcar destruir, arruinar o matar según el contexto. Se conserva «destruirlo» en el texto principal para respetar la amplitud léxica documentada por el audit trail inglés, sin cerrar prematuramente el sentido a una sola formulación homicida.
theological_decisions:
- issue: Si explicitar en el texto principal que el plan era homicida
  english_pob_reading: Retain the broader wording 'destroy him' in the main text.
  chosen_spanish_reading: Mantener «destruirlo» en el texto principal.
  alternative_spanish_readings:
  - matarlo
  - ponerlo a muerte
  rationale: El verbo ἀπόλλυμι es más amplio que una sola equivalencia explícitamente letal. En este contexto, el complot apunta ciertamente a eliminar a Jesús, pero conservar «destruirlo» respeta mejor la amplitud semántica del griego y deja que el contexto cargue la implicación homicida; la nota puede ofrecer la alternativa explícita.
  doctrine_reference: Principio de primacía del texto original y de preservación de la tensión léxica cuando el contexto la resuelve sin necesidad de estrecharla.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el audit trail inglés y con la revisión más reciente indicada como sin cambios. No se identifican revisiones aplicadas ni discrepancias textuales relevantes entre el griego, el inglés POB y esta propuesta española.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el Tetragrámaton; aquí no aplica.
  - Se emplea «herodianos» como transliteración estable del grupo, coherente con el registro bíblico en español.
  - Se conserva la distinción léxica entre «destruir» y una lectura más explícitamente homicida, para no resolver prematuramente la ambigüedad documentada por el texto y el audit trail.
  - La puntuación y la segmentación buscan una lectura natural en español sin añadir contenido interpretativo no presente en el original.
