translation:
  language: es
  text: 'Y los espíritus inmundos, siempre que lo veían[a], se postraban delante de él y gritaban, diciendo: «Tú eres el Hijo de Dios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se arrojaban delante de él». El verbo griego puede denotar caer ante alguien en sumisión o súplica.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ πνεύματα τὰ ἀκάθαρτα
  english_pob_choice: the unclean spirits
  chosen_spanish: los espíritus inmundos
  alternatives_spanish:
  - los espíritus impuros
  - los espíritus malignos
  lexicon: BDAG
  rationale: «Inmundos» conserva el valor ritual/moral de ἀκάθαρτα y sigue la terminología estable de los evangelios sin suavizarla a «malignos», que interpretaría más de lo que el griego expresa.
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: siempre que
  alternatives_spanish:
  - cuando
  - cada vez que
  lexicon: BDAG
  rationale: El imperfecto con ὅταν expresa repetición; «siempre que» en español transmite bien la iteración de cada ocasión en que lo veían.
- source_word: ἐθεώρουν
  english_pob_choice: saw
  chosen_spanish: lo veían
  alternatives_spanish:
  - lo observaban
  - lo contemplaban
  lexicon: BDAG
  rationale: En este contexto narrativo, «veían» es natural y suficiente; el matiz de observación está ya cubierto por el contexto de reacción repetida.
- source_word: προσέπιπτον αὐτῷ
  english_pob_choice: fell down before him
  chosen_spanish: se postraban delante de él
  alternatives_spanish:
  - caían delante de él
  - se arrojaban delante de él
  lexicon: BDAG
  rationale: «Se postraban» comunica la acción física de prosternarse sin forzar la lectura a «adoraban». «Delante de él» mantiene la dirección relacional del griego.
- source_word: ἔκραζον
  english_pob_choice: cried out
  chosen_spanish: gritaban
  alternatives_spanish:
  - clamaban
  - exclamaban
  lexicon: BDAG
  rationale: «Gritaban» conserva la intensidad de κράζω en español de modo claro y directo; «clamaban» sería más solemne, pero menos inmediato.
- source_word: λέγοντα
  english_pob_choice: saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y diciendo
  lexicon: BDAG
  rationale: El participio acompañante se vierte naturalmente con «diciendo» en español, manteniendo la relación con el grito anterior sin añadir énfasis innecesario.
- source_word: Σὺ εἶ
  english_pob_choice: You are
  chosen_spanish: Tú eres
  alternatives_spanish:
  - Tú mismo eres
  lexicon: BDAG
  rationale: El pronombre explícito en griego aporta énfasis; «Tú eres» lo preserva de manera idiomática en español sin sonar forzado.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - el Hijo de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico con su forma más natural y precisa en español, manteniendo su peso confesional y narrativo.
theological_decisions:
- issue: Cómo rendir προσέπιπτον sin introducir la idea de adoración
  english_pob_reading: Rendered as 'fell down before him' without using 'worshiped.'
  chosen_spanish_reading: «Se postraban delante de él» sin usar «adoraban».
  alternative_spanish_readings:
  - «lo adoraban»
  - «se inclinaban ante él»
  rationale: 'El verbo puede indicar postración o caída reverente, pero el texto no dice explícitamente «adorar». «Se postraban» preserva la tensión: una acción de sumisión física intensa sin imponer una interpretación teológica más fuerte que el griego.'
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica en lugar de resolverla por anticipado.'
translation_notes:
  revision_awareness: 'La redacción sigue el juicio revisado de alta concordancia del registro inglés: mantiene la iteración con ὅταν, conserva la fuerza de κράζω y evita traducir προσπίπτω como «adorar», siguiendo la decisión textual ya establecida sin cambios en la revisión más reciente.'
  spanish_consistency_notes:
  - Se mantiene la terminología demonológica como «espíritus inmundos», coherente con el lenguaje evangélico y con la política POB de no sustituirlo por una paráfrasis moralizante.
  - «Tú eres el Hijo de Dios» conserva el título sin añadir matices explicativos.
  - La puntuación con comillas angulares es compatible con el registro bíblico en español y distingue claramente el discurso directo.
