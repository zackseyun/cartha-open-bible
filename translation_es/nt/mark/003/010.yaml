    issue: «se arrojaban sobre él» no es la mejor equivalencia idiomática para ἐπιπίπτειν en este contexto
    rationale: Aunque comunica fuerza, en español puede sonar a acto individual de lanzarse físicamente, mientras que el griego describe más naturalmente a la multitud abalanzándose o echándose encima de Jesús para tocarlo. «Se abalanzaban sobre él» conserva el ímpetu y mejora la naturalidad.
  revised_spanish_text: Porque había sanado a muchos, de modo que todos los que tenían aflicciones se abalanzaban sobre él para tocarlo.
