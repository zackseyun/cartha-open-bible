translation:
  language: es
  text: Porque había sanado a muchos, de modo que todos los que tenían aflicciones se abalanzaban sobre él para tocarlo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - a gran número de personas
  lexicon: BDAG
  rationale: El acusativo plural funciona como objeto de ἐθεράπευσεν. En español, «a muchos» conserva la cantidad sin añadir un sustantivo explícito como «personas», que el texto no da.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la explicación del comportamiento de la multitud. «Porque» expresa bien la relación causal en español natural y mantiene el valor explicativo.
- source_word: ἐθεράπευσεν
  english_pob_choice: had healed
  chosen_spanish: había sanado
  alternatives_spanish:
  - sanó
  - había curado
  lexicon: BDAG
  rationale: El aoristo anterior explica la reacción presente de la multitud; el pluscuamperfecto español refleja mejor esa anterioridad. «Sanar» preserva el sentido terapéutico amplio sin restringirlo a diagnóstico médico.
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de tal manera que
  lexicon: BDAG
  rationale: Introduce el resultado de haber sanado a muchos. «De modo que» mantiene la relación resultativa con buen ritmo en español.
- source_word: ἐπιπίπτειν αὐτῷ
  english_pob_choice: were falling upon him
  chosen_spanish: se arrojaban sobre él
  alternatives_spanish:
  - caían sobre él
  - se precipitaban sobre él
  - se abalanzaban sobre él
  lexicon: BDAG
  rationale: ἐπιπίπτω es literalmente «caer sobre», pero en este contexto de multitud describe un movimiento impetuoso hacia Jesús. «Se arrojaban sobre él» conserva la fuerza del griego sin sonar demasiado mecánico; además mantiene la violencia/urgencia que el inglés POB quiso resaltar.
- source_word: ἵνα
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: Expresa finalidad. En español, «para» es la forma más natural y precisa en este contexto.
- source_word: αὐτοῦ ἅψωνται
  english_pob_choice: touch him
  chosen_spanish: tocarlo
  alternatives_spanish:
  - tocar a Jesús
  - llegar a tocarlo
  lexicon: BDAG
  rationale: ἅπτομαι con genitivo aquí es tocar físicamente. El infinitivo español «tocarlo» transmite esa acción directa sin sobreexplicar la construcción griega.
- source_word: ὅσοι
  english_pob_choice: all who
  chosen_spanish: todos los que
  alternatives_spanish:
  - cuantos
  - todos cuantos
  lexicon: BDAG
  rationale: «Todos los que» comunica el valor inclusivo y general del relativo de manera idiomática en español.
- source_word: εἶχον μάστιγας
  english_pob_choice: had afflictions
  chosen_spanish: tenían aflicciones
  alternatives_spanish:
  - tenían enfermedades
  - padecían aflicciones
  - tenían plagas
  lexicon: BDAG
  rationale: μάστιξ es literalmente «azote/flagelo», pero en este contexto funciona de forma figurada para sufrimientos graves. «Aflicciones» conserva la amplitud semántica y evita reducirlo indebidamente a una categoría médica estrecha.
theological_decisions:
- issue: Sentido de μάστιγας en el contexto de sanidad
  english_pob_reading: Rendered as 'afflictions' rather than a more specific medical term.
  chosen_spanish_reading: «aflicciones»
  alternative_spanish_readings:
  - enfermedades
  - plagas
  - azotes
  rationale: El pasaje enfatiza personas que acuden a Jesús por sanidad, pero μάστιξ conserva una carga más fuerte que una etiqueta clínica. «Aflicciones» mantiene el peso del sufrimiento y evita imponer una diagnosis más específica de la que el texto ofrece.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente del inglés POB reemplazó una expresión de movimiento más suave por una más literal para ἐπιπίπτω, sin alterar el núcleo semántico. Esta versión española sigue esa decisión al usar una formulación enérgica («se arrojaban sobre él») y conserva «aflicciones» para μάστιγας, en coherencia con el audit trail final.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el versículo no usa Χριστός como título ni nombre.
  - Se mantuvo el tono narrativo sobrio y directo, sin añadir explicaciones no presentes en el griego.
  - No se añadieron notas al texto porque no había ambigüedades que requirieran anclaje de nota al pie en esta línea.
