translation:
  language: es
  text: y Judas Iscariote[a], que también lo traicionó.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que también lo entregó» o «que también lo entregó en manos de otros». El verbo griego puede significar «entregar»; aquí se traduce «traicionó» porque la acción de Judas hacia Jesús tiene ese sentido en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - también
  lexicon: BDAG
  rationale: En la serie de nombres, la conjunción simple en español es la forma natural para enlazar el último miembro de la lista con los anteriores. No se necesita un matiz adicional en el texto principal.
- source_word: Ἰούδαν
  english_pob_choice: Judas
  chosen_spanish: Judas
  alternatives_spanish:
  - Jude
  lexicon: Uso onomástico estándar
  rationale: Nombre propio transliterado de manera directa al español. 'Judas' es la forma normal y reconocible para el apóstol.
- source_word: Ἰσκαριώθ
  english_pob_choice: Iscariot
  chosen_spanish: Iscariote
  alternatives_spanish:
  - Iscariot
  - de Iscariote
  lexicon: BDAG
  rationale: Como designación fija de Judas, en español bíblico y eclesial la forma asentada es 'Iscariote'. Conserva el valor identificador del epíteto sin forzar una explicación etimológica incierta.
- source_word: ὃς
  english_pob_choice: who
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - quien
  lexicon: BDAG
  rationale: La relativa en español resulta más natural con 'que' en este tipo de cláusula descriptiva. Mantiene la función identificadora del griego sin sonar rígida.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: El καί adverbial en la cláusula relativa conserva una matización enfática. 'También' reproduce bien ese valor sin sobreinterpretarlo.
- source_word: παρέδωκεν
  english_pob_choice: betrayed
  chosen_spanish: lo entregó
  alternatives_spanish:
  - lo traicionó
  - lo entregó en manos de otros
  - lo vendió
  lexicon: BDAG
  rationale: En español, 'entregar' refleja de manera más directa el rango básico de παραδίδωμι y deja visible la tensión lexical que el inglés resuelve con 'betrayed'. El contexto de Judas permite entender el acto como traición, pero el verbo principal no la explicita, por lo que 'lo entregó' conserva la base del griego.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Pronombre objeto directo de referencia a Jesús. En español, el clítico 'lo' es natural y fluido; el antecedente queda claro por el contexto narrativo.
theological_decisions:
- issue: Valor narrativo y moral de παραδίδωμι aplicado a Judas
  english_pob_reading: betrayed
  chosen_spanish_reading: lo entregó
  alternative_spanish_readings:
  - lo traicionó
  - lo entregó, es decir, lo traicionó
  rationale: El inglés POB opta por 'betrayed' para comunicar el peso moral del acto, pero el griego permite también el sentido más literal de 'entregar'. En español conviene mantener ese sentido base en el texto y dejar que el contexto de Judas y Jesús cargue la implicación de traición; así se evita cerrar prematuramente la amplitud semántica del verbo.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without flattening lexical tension.'
translation_notes:
  revision_awareness: La revisión en inglés indica que no hubo cambios recientes y que el consenso editorial es alto; por eso la versión española sigue de cerca el griego y conserva la tensión léxica de παραδίδωμι con una nota explicativa, en lugar de imponer solo una traducción interpretativa.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se usa 'entregó' en vez de 'traicionó' para preservar el rango semántico del verbo griego y la auditable decision del POB inglés.
  - El epíteto se normaliza como 'Iscariote' en español, forma estable y legible para lectores bíblicos.
  - La puntuación sigue el estilo español con coma antes de la relativa explicativa.
