translation:
  language: es
  text: 'Y habiéndolos llamado junto a sí, les hablaba en parábolas: «¿Cómo puede Satanás expulsar a Satanás?»'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: προσκαλεσάμενος
  english_pob_choice: after calling them to himself
  chosen_spanish: habiéndolos llamado junto a sí
  alternatives_spanish:
  - después de llamarlos a sí
  - llamándolos junto a sí
  - habiéndolos convocado
  lexicon: BDAG
  rationale: 'El participio aoristo medio expresa una acción previa: Jesús los llamó primero y luego habló. «Habiéndolos llamado junto a sí» conserva la secuencia y la dirección del llamado sin sonar demasiado mecánico en español.'
- source_word: ἐν παραβολαῖς
  english_pob_choice: in parables
  chosen_spanish: en parábolas
  alternatives_spanish:
  - con parábolas
  - por medio de parábolas
  - figuradamente
  lexicon: BDAG
  rationale: La construcción plural se conserva de forma directa. «En parábolas» es natural en español bíblico y mantiene el dato literario sin precisar más de lo que el texto dice.
- source_word: ἔλεγεν
  english_pob_choice: he was speaking
  chosen_spanish: les hablaba
  alternatives_spanish:
  - les decía
  - seguía hablándoles
  - les estaba hablando
  lexicon: BDAG
  rationale: El imperfecto indica acción en curso o repetida. En español, «les hablaba» comunica esa continuidad con naturalidad y evita una rigidez excesiva.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad o posibilidad. «Puede» es la equivalencia más sobria y idiomática en esta pregunta retórica.
- source_word: Σατανᾶς / Σατανᾶν
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: BDAG
  rationale: Se conserva el nombre/título en forma transliterada usada normalmente en español bíblico. La forma nominativa y acusativa se unifican en «Satanás».
- source_word: ἐκβάλλειν
  english_pob_choice: cast out
  chosen_spanish: expulsar
  alternatives_spanish:
  - echar fuera
  - arrojar fuera
  - expulsar a
  lexicon: BDAG
  rationale: En este contexto polémico y de exorcismo, ἐκβάλλω designa expulsar. «Expulsar» es claro y fiel; evita una expresión demasiado idiomática que podría sonar menos precisa que la acción descrita.
theological_decisions:
- issue: Fuerza retórica de la pregunta sobre Satanás contra sí mismo
  english_pob_reading: 'Rendered as a rhetorical question of impossibility: ''How can Satan cast out Satan?'''
  chosen_spanish_reading: 'Se conserva como pregunta retórica de imposibilidad: «¿Cómo puede Satanás expulsar a Satanás?»'
  alternative_spanish_readings:
  - ¿Cómo es posible que Satanás expulse a Satanás?
  - ¿De qué manera puede Satanás expulsar a Satanás?
  rationale: El griego plantea posibilidad/capacidad y, en contexto, expone la incoherencia de la acusación. La traducción mantiene la tensión sin explicarla en exceso ni suavizarla.
  doctrine_reference: Preservar la tensión teológica y retórica del texto; no añadir explicación doctrinal al cuerpo del versículo.
translation_notes:
  revision_awareness: 'Coincide con el contexto de revisión más reciente: no se detectaron cambios necesarios respecto al sentido del texto fuente ni a la auditoría inglesa.'
  spanish_consistency_notes:
  - Se usa «Satanás» de manera uniforme para el nominativo y el acusativo.
  - Se conserva el plural «parábolas» como en el griego.
  - 'El imperfecto se refleja con una forma continua natural en español: «les hablaba».'
  - Se evita «SEÑOR» u otras sustituciones no presentes en el texto fuente.
