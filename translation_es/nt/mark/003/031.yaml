translation:
  language: es
  text: Entonces vinieron su madre y sus hermanos, y de pie afuera enviaron a decirle[a], llamándolo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «le enviaron un mensaje».
    reason: lexical_alternative
  - marker: b
    text: O «llamándolo» o «citándolo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Y
  - Luego
  lexicon: BDAG
  rationale: κaί al inicio de la cláusula avanza la narración. «Entonces» expresa ese progreso narrativo de forma natural en español sin perder el enlace.
- source_word: ἔρχονται
  english_pob_choice: came
  chosen_spanish: vinieron
  alternatives_spanish:
  - vinieron
  - llegaron
  lexicon: BDAG
  rationale: El presente histórico griego se vierte de manera natural en pasado en español. «Vinieron» conserva el movimiento de llegada sin sobreinterpretar.
- source_word: μήτηρ αὐτοῦ
  english_pob_choice: his mother
  chosen_spanish: su madre
  alternatives_spanish:
  - su madre
  lexicon: BDAG
  rationale: Construcción posesiva directa y natural en español; el antecedente de «su» es claro por el contexto.
- source_word: οἱ ἀδελφοὶ αὐτοῦ
  english_pob_choice: his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - sus hermanos
  - sus hermanos y hermanas
  - sus parientes
  lexicon: BDAG
  rationale: ἀδελφοί es masculino plural y, en este contexto, refiere a los varones de la familia de Jesús según el texto. Se conserva «hermanos» para mantener la fuerza léxica sin introducir una interpretación ampliada.
- source_word: ἔξω
  english_pob_choice: outside
  chosen_spanish: fuera
  alternatives_spanish:
  - afuera
  - en la calle
  lexicon: BDAG
  rationale: Adverbio espacial simple. «Fuera» es claro y sobrio en español bíblico contemporáneo.
- source_word: στήκοντες
  english_pob_choice: standing
  chosen_spanish: estando
  alternatives_spanish:
  - estando
  - permaneciendo
  - de pie
  lexicon: BDAG
  rationale: El participio describe la circunstancia simultánea de su posición exterior. «Estando» suena natural con «fuera»; se conserva la idea de posición, aunque no se explicita «de pie».
- source_word: ἀπέστειλαν πρὸς αὐτὸν
  english_pob_choice: they sent word to him
  chosen_spanish: enviaron a decirle
  alternatives_spanish:
  - enviaron un mensaje a él
  - mandaron aviso a él
  - enviaron a llamarlo
  lexicon: BDAG
  rationale: La construcción con ἀποστέλλω + πρός indica enviar un recado o intermediario hacia una persona. «Enviaron a decirle» reproduce bien el valor idiomático sin forzar el español. Se mantiene la posibilidad de un mensaje implícito sin fijarlo de forma excesiva.
- source_word: καλοῦντες αὐτόν
  english_pob_choice: calling him
  chosen_spanish: llamándolo
  alternatives_spanish:
  - llamándolo
  - llamándolo a él
  - haciéndole llamar
  lexicon: BDAG
  rationale: El participio expresa la acción concomitante y el contenido del recado. «Llamándolo» conserva la relación verbal directa con el griego y evita la ambigüedad de una lectura meramente acústica.
theological_decisions:
- issue: Referencia de «sus hermanos»
  english_pob_reading: Translate literally as 'his brothers' without interpretive qualification.
  chosen_spanish_reading: Traducir literalmente «sus hermanos» sin aclaración doctrinal añadida.
  alternative_spanish_readings:
  - sus parientes
  - sus hermanos y hermanas (según interpretación tradicional)
  rationale: El griego usa ἀδελφοί, cuyo sentido llano es «hermanos». La traducción no debe importar una postura eclesial sobre la relación exacta más allá de lo que el texto dice.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 4
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «calling for him» a «calling him» para ajustarse mejor a καλοῦντες αὐτόν. La versión española sigue esa decisión con «llamándolo», manteniendo correspondencia léxica cercana y naturalidad idiomática. También se reflejó la decisión narrativa de traducir el presente histórico ἔρχονται como pasado simple en español.
  spanish_consistency_notes:
  - Se mantiene «madre» y «hermanos» en registro sobrio y natural, sin expandir la relación familiar.
  - «Fuera» conserva la localización espacial exacta de ἔξω.
  - «Enviaron a decirle» refleja la idiomaticidad de ἀπέστειλαν πρὸς αὐτόν sin convertirla en una expresión más interpretativa.
  - «Llamándolo» mantiene la relación directa con καλοῦντες αὐτόν y evita una paráfrasis más amplia.
