revisions:
- from: 'Y cuando los suyos [a] lo oyeron, salieron para prenderlo, porque decían[b]: «Está fuera de sí».'
  to: 'Y cuando sus allegados[a] lo oyeron, salieron para apoderarse de él, porque decían: «Está fuera de sí».[b]'
  rationale: Se ajusta οἱ παρ’ αὐτοῦ a «sus allegados» para preservar mejor la ambigüedad del original y la decisión documentada del POB en inglés. Se reemplaza «prenderlo» por «apoderarse de él» para evitar un matiz policial/jurídico que el griego no exige. Se corrige la nota b para que presente una alternativa real en vez de repetir el texto principal.
