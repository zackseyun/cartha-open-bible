translation:
  language: es
  text: 'Y cuando sus allegados[a] lo oyeron, salieron para apoderarse de él, porque decían: «Está fuera de sí».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su familia» o «los suyos»; la expresión griega es idiomática y puede referirse específicamente a los miembros de la casa de Jesús o a su círculo cercano.
    reason: alternative_reading
  - marker: b
    text: O «Está fuera de juicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ παρ’ αὐτοῦ
  english_pob_choice: those close to him
  chosen_spanish: los suyos
  alternatives_spanish:
  - los que estaban cerca de él
  - sus allegados
  - su familia
  lexicon: BDAG
  rationale: La expresión griega es idiomática y ambigua. En español, «los suyos» mantiene esa amplitud y fluidez, sin cerrar prematuramente el referente a «su familia»; esa especificidad queda como alternativa, siguiendo la cautela del POB en inglés.
- source_word: ἀκούσαντες
  english_pob_choice: when ... heard
  chosen_spanish: y cuando ... oyeron
  alternatives_spanish:
  - habiendo oído
  - después de oír
  lexicon: BDAG
  rationale: El participio aoristo se vierte temporalmente para conservar la secuencia narrativa natural en español. «Cuando ... oyeron» evita una construcción demasiado literal y mantiene el valor temporal del griego.
- source_word: ἐξῆλθον
  english_pob_choice: they went out
  chosen_spanish: salieron
  alternatives_spanish:
  - fueron
  - se fueron
  lexicon: BDAG
  rationale: «Salieron» reproduce de forma directa el movimiento narrativo del verbo griego y es la opción más natural en español para este contexto.
- source_word: κρατῆσαι
  english_pob_choice: to seize him
  chosen_spanish: para prenderlo
  alternatives_spanish:
  - para sujetarlo
  - para tomarlo por la fuerza
  - para detenerlo
  lexicon: BDAG
  rationale: κρατέω puede significar tomar o agarrar con fuerza; en este contexto, el matiz es de intervenir sobre Jesús de manera firme. «Prenderlo» comunica esa acción en español con fuerza semejante sin obligar a una lectura estrictamente legal de «arrestar».
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto griego expresa habla repetida o en curso. En español, «decían» conserva ese aspecto de manera natural, sin sobrecargar la frase.
- source_word: ἐξέστη
  english_pob_choice: He is out of his mind
  chosen_spanish: Está fuera de sí
  alternatives_spanish:
  - Está fuera de su juicio
  - Ha perdido el juicio
  - Está loco
  lexicon: BDAG
  rationale: La expresión griega aquí indica alteración mental o estar «fuera de sí». «Está fuera de sí» es idiomático, claro y suficientemente cercano al sentido, sin introducir una etiqueta más fuerte que el texto no exige.
theological_decisions:
- issue: Identidad de οἱ παρ’ αὐτοῦ
  english_pob_reading: Rendered generically as 'those close to him' rather than specifying 'his family' in the main text.
  chosen_spanish_reading: «los suyos» en el texto principal, con la posibilidad de entenderlo como familia, allegados o círculo cercano.
  alternative_spanish_readings:
  - su familia
  - sus allegados
  - los que estaban cerca de él
  rationale: El griego no nombra de manera explícita a la familia; la expresión es idiomática y admite más de una referencia. Mantener «los suyos» conserva la tensión interpretativa y evita resolverla sin una base más fuerte que la del original, en línea con la filosofía del POB.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El inglés POB no registró revisiones aplicadas en este versículo; el consenso de revisión indicó alta concordancia y sin cambios necesarios, por lo que la redacción española sigue de cerca esa lectura auditada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «los suyos» para conservar la ambigüedad del sintagma griego οἱ παρ’ αὐτοῦ.
  - «Prenderlo» se eligió por su fuerza narrativa y porque evita especificar «arrestar» sin base textual directa.
  - 'La cita directa conserva una fórmula idiomática española natural: «Está fuera de sí».'
