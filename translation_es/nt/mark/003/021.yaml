  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia básica del griego: «cuando... oyeron», «salieron», «decían», y «Está fuera de sí». Sin embargo, «los suyos» estrecha y colorea de forma algo más interpretativa οἱ παρ’ αὐτοῦ que el inglés auditado «those close to him», y «prenderlo» en español suele sonar más jurídico/policial que κρατῆσαι aquí.'
  spanish_quality_summary: El español es legible y digno, pero puede mejorarse para alinearse mejor con la ambigüedad del original y evitar un matiz legal innecesario. «Los que estaban cerca de él» o «sus allegados» preserva mejor la ambigüedad que «los suyos», y «apoderarse de él» o «sujetarlo» evita el sesgo jurídico de «prenderlo». También conviene eliminar la nota b, porque repite exactamente el texto principal y no aporta alternativa real.
  glossary_alignment: No hay conflictos con la terminología base del proyecto (no aparecen Yahvé/Mesías/etc.). La principal cuestión léxica es mantener la ambigüedad de οἱ παρ’ αὐτοῦ y la fuerza no jurídica de κρατῆσαι.
  issues:
  - severity: medium
    issue: «los suyos» para οἱ παρ’ αὐτοῦ
    rationale: Aunque idiomático, en español suele sugerir con más fuerza «su familia» o «su gente» y no conserva tan limpiamente la ambigüedad de «those close to him». El original permite círculo cercano, casa o allegados; conviene una formulación menos interpretativa en el texto principal.
  - severity: medium
    issue: «prenderlo» para κρατῆσαι
    rationale: «Prender» en el español general contemporáneo suele evocar arresto formal. El griego expresa tomar/asir con fuerza, no necesariamente una detención legal. Una opción como «apoderarse de él» preserva mejor la fuerza sin juridizar.
  - severity: low
    issue: La nota b no añade una alternativa distinta
    rationale: La nota dice exactamente «Está fuera de sí», igual que el texto principal. Según el expediente inglés, la alternativa es «He is beside himself»; en español debe reflejarse con una variante real o suprimirse.
  revised_spanish_text: 'Y cuando sus allegados[a] lo oyeron, salieron para apoderarse de él, porque decían: «Está fuera de sí».[b]'
