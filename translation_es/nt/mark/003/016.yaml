translation:
  language: es
  text: Y constituyó a los doce, y dio a Simón el nombre de Pedro[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pedro significa 'Roca'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐποίησεν
  english_pob_choice: appointed
  chosen_spanish: los constituyó
  alternatives_spanish:
  - los nombró
  - los designó
  lexicon: BDAG
  rationale: En este contexto no significa simplemente 'hacer', sino establecer a los Doce como grupo. 'Los constituyó' conserva ese sentido institucional en español sin volverlo demasiado paraprástico.
- source_word: τοὺς δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: los doce
  alternatives_spanish:
  - los Doce
  lexicon: BDAG
  rationale: La frase designa al grupo reconocido de los doce discípulos. En español, el artículo + numeral en minúscula es claro y fiel; la mayúscula puede reservarse como opción estilística, no exigencia léxica.
- source_word: ἐπέθηκεν ὄνομα
  english_pob_choice: gave ... the name
  chosen_spanish: puso ... el nombre
  alternatives_spanish:
  - le dio el nombre
  - lo nombró
  lexicon: BDAG
  rationale: El griego expresa literalmente 'poner un nombre sobre'. 'Puso a Simón el nombre de Pedro' conserva esa acción de imposición del nombre y evita perder el matiz del idioma original.
- source_word: Σίμωνι
  english_pob_choice: Simon
  chosen_spanish: Simón
  lexicon: BDAG
  rationale: Nombre propio transliterado al español de forma estándar.
- source_word: Πέτρον
  english_pob_choice: Peter
  chosen_spanish: Pedro
  alternatives_spanish:
  - Roca
  lexicon: BDAG
  rationale: Aquí λειτουργa como nombre personal conferido, no como traducción semántica en el cuerpo del texto. En español se conserva la forma nominal 'Pedro' y el valor de 'roca' se puede explicar en nota.
theological_decisions:
- issue: Cómo expresar la constitución de los Doce
  english_pob_reading: appointed the twelve
  chosen_spanish_reading: los constituyó
  alternative_spanish_readings:
  - los nombró
  - los designó
  rationale: La lectura inglesa destaca la acción formal de establecerlos como grupo. 'Constituyó' reproduce ese peso institucional sin introducir terminología eclesiástica ajena al pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tratamiento de Πέτρος como nombre conferido
  english_pob_reading: Peter
  chosen_spanish_reading: Pedro
  alternative_spanish_readings:
  - Roca
  rationale: El texto presenta el nombre otorgado a Simón; en español la forma establecida es 'Pedro'. La posible transparencia semántica de 'roca' queda mejor preservada como nota que en la línea principal.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El pasaje en griego es breve y coincide ampliamente con la lectura auditada en inglés. Se mantiene la decisión de traducir ἐποίησεν con un verbo de constitución/nombramiento y de conservar el nombre propio Pedro, añadiendo nota solo para su sentido etimológico.
  spanish_consistency_notes:
  - Se usa 'los doce' para el grupo de discípulos, coherente con el valor establecido del término en el evangelio.
  - Se evita 'Cristo' o terminología interpretativa no presente en el versículo.
  - La nota al pie conserva la tensión entre nombre propio y significado léxico de Πέτρος sin sustituir el nombre en el texto.
