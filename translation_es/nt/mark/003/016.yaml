revisions:
- from: Y los doce[a] los constituyó, y puso a Simón el nombre de Pedro.
  to: Y constituyó a los doce, y dio a Simón el nombre de Pedro[a].
  rationale: 'Se corrige el orden y la idiomaticidad del español sin cambiar las decisiones léxicas de fondo: ἐποίησεν se mantiene como acto de constituir/apointar al grupo, y ἐπέθηκεν ὄνομα se expresa con un giro español natural equivalente. La nota se reubica sobre ''Pedro'', que es el elemento explicado.'
  reviewer_model: gpt-5.4
