review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien los dos movimientos del griego: Jesús constituye al grupo de los doce y luego da a Simón el nombre Pedro. Sin embargo, el orden inicial en español (''Y los doce los constituyó'') suena marcado e innecesariamente invertido frente al griego, y la expresión ''puso a Simón el nombre de Pedro'' resulta menos natural que una formulación española equivalente que preserve el mismo sentido idiomático de ἐπέθηκεν ὄνομα.'
  spanish_quality_summary: La redacción actual es comprensible, pero algo rígida. 'Constituyó a los doce' o 'designó a los doce' suena natural; 'dio a Simón el nombre de Pedro' refleja mejor el giro sin calco torpe. También conviene anclar la nota en 'Pedro' para que el lector vea con claridad a qué palabra se refiere.
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Simón' y 'Pedro' están bien. La nota léxica sobre 'Pedro' = 'Roca' es adecuada. La revisión propuesta mantiene la decisión inglesa 'appointed' con un español más natural y fiel.
  issues:
  - severity: medium
    issue: Orden sintáctico poco natural en 'Y los doce los constituyó'
    rationale: Aunque no es incorrecto, el griego no exige ese frenteo del objeto en español, y la frase suena forzada. 'Y constituyó a los doce' transmite mejor el sentido institucional de ἐποίησεν sin afectar la fidelidad.
  - severity: medium
    issue: Calco poco idiomático en 'puso a Simón el nombre de Pedro'
    rationale: El español natural para ἐπέθηκεν ὄνομα en este contexto es 'le dio a Simón el nombre de Pedro' o 'dio a Simón el nombre de Pedro'. La versión actual suena extraña y menos clara para lectura pública.
  - severity: low
    issue: La nota al pie no está anclada en el término relevante
    rationale: La nota explica el significado de 'Pedro', no de 'doce'. Debe colocarse junto a 'Pedro' para cumplir mejor la convención de notas y evitar ambigüedad.
  revised_spanish_text: Y constituyó a los doce, y dio a Simón el nombre de Pedro[a].
  revised_footnotes:
  - marker: a
    text: Pedro significa 'Roca'.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el orden y la idiomaticidad del español sin cambiar las decisiones léxicas de fondo: ἐποίησεν se mantiene como acto de constituir/apointar al grupo, y ἐπέθηκεν ὄνομα se expresa con un giro español natural equivalente. La nota se reubica sobre ''Pedro'', que es el elemento explicado.'
