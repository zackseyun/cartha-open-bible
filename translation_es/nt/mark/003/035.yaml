translation:
  language: es
  text: Porque cualquiera que haga la voluntad de Dios[a], esa persona es mi hermano y hermana y madre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ése es mi hermano y hermana y madre». El griego tiene un demostrativo enfático, literalmente «éste».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ... ἂν ποιήσῃ
  english_pob_choice: whoever does
  chosen_spanish: cualquiera que haga
  alternatives_spanish:
  - quien haga
  - el que haga
  - todo el que haga
  lexicon: BDAG
  rationale: La construcción relativa indefinida con ἄν y subjuntivo expresa una condición general; en español, «cualquiera que haga» comunica bien esa generalidad sin sonar forzado. Se evita un presente simple mecánico que perdería la fuerza indefinida.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Porque, en efecto
  lexicon: BDAG
  rationale: γάρ introduce explicación o razón de lo dicho antes. «Porque» es natural en español y conserva la relación lógica.
- source_word: ποιήσῃ
  english_pob_choice: does
  chosen_spanish: haga
  alternatives_spanish:
  - hiciere
  - cumpla
  - realice
  lexicon: BDAG
  rationale: ποιέω aquí significa hacer o llevar a cabo. «Haga» mantiene la acción concreta y funciona bien con «la voluntad de Dios».
- source_word: τὸ θέλημα τοῦ θεοῦ
  english_pob_choice: the will of God
  chosen_spanish: la voluntad de Dios
  alternatives_spanish:
  - el querer de Dios
  - la voluntad divina
  lexicon: BDAG
  rationale: Se conserva la expresión bíblica directa y transparente. «La voluntad de Dios» sigue de cerca el griego y es plenamente idiomática en español.
- source_word: οὗτος
  english_pob_choice: he / this one
  chosen_spanish: ése
  alternatives_spanish:
  - éste
  - esta persona
  - ese
  lexicon: BDAG
  rationale: El demostrativo enfático del griego se refleja con «ése», que conserva la referencia demostrativa sin reducir el sentido a un simple pronombre masculino genérico. En español, aquí resulta más natural que «este uno» o una paráfrasis nominal.
- source_word: ἀδελφός μου
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano mío
  lexicon: BDAG
  rationale: Término de parentesco directo; se traduce literalmente con el posesivo natural en español.
- source_word: ἀδελφὴ
  english_pob_choice: sister
  chosen_spanish: hermana
  alternatives_spanish:
  - mi hermana
  lexicon: BDAG
  rationale: Se preserva explícitamente el femenino del griego, importante porque Jesús enumera miembros de familia en ambos géneros.
- source_word: μήτηρ
  english_pob_choice: mother
  chosen_spanish: madre
  alternatives_spanish:
  - mi madre
  lexicon: BDAG
  rationale: Término de parentesco directo; se traduce de manera literal y clara.
- source_word: καὶ ... καὶ
  english_pob_choice: and ... and
  chosen_spanish: y ... y
  alternatives_spanish:
  - e ... e
  - así como ... y
  lexicon: BDAG
  rationale: La coordinación repetida de καί mantiene el efecto acumulativo de la lista de parentescos.
- source_word: ἐστίν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - son
  lexicon: BDAG
  rationale: Copulativo simple; concuerda con el sujeto singular implícito en οὗτος.
theological_decisions:
- issue: Representación del sujeto singular demostrativo con parentescos mixtos
  english_pob_reading: he is my brother and sister and mother
  chosen_spanish_reading: ése es mi hermano y hermana y madre
  alternative_spanish_readings:
  - él es mi hermano y hermana y madre
  - esa persona es mi hermano y hermana y madre
  rationale: El griego usa un demostrativo singular enfático. «Ése» conserva esa fuerza sin introducir una lectura exclusivamente masculina; además evita una paráfrasis que diluya el contraste retórico del dicho de Jesús.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1, 4 y 6
- issue: Lenguaje de familia como redefinición del vínculo con Jesús
  english_pob_reading: literal kinship terms retained metaphorically
  chosen_spanish_reading: términos literales de parentesco retenidos con sentido metafórico
  alternative_spanish_readings:
  - miembro de mi familia
  - pariente mío
  rationale: Mantener «hermano», «hermana» y «madre» preserva la fuerza de la redefinición del parentesco en torno a la voluntad de Dios. Generalizar a «familia» suavizaría demasiado la concreción del dicho.
  doctrine_reference: DOCTRINE.md §Translation philosophy, items 1 y 6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió un sujeto más natural en vez de «this one is». En español, «ése es» ofrece una solución igualmente natural y a la vez conserva el demostrativo enfático del griego, evitando tanto una traducción meramente masculina como una paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene «Dios» sin artículo añadido, conforme al griego.
  - Se conserva la coordinación repetida «y ... y» para reflejar el paralelismo del texto fuente.
  - El demostrativo «ése» concuerda con el matiz enfático de οὗτος y queda anclado mediante nota.
  - No se introduce «Cristo», «SEÑOR» ni otra terminología no presente en el versículo.
