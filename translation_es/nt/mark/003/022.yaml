revisions:
- from: 'Y los escribas que habían bajado de Jerusalén decían[a]: «Tiene a Beelzebul[b]», y[c][d] «Por medio del gobernante de los demonios echa fuera a los demonios»[e].'
  to: 'Y los escribas que habían bajado de Jerusalén decían[a]: «Tiene a Beelzebul[b]», y[c] «Por el gobernante de los demonios echa fuera a los demonios».'
  rationale: Se conserva la fidelidad básica del borrador, pero se corrige el aparato de notas para alinearlo con la auditoría inglesa y se simplifica la frase instrumental principal. Se elimina la nota sobre «expulsa», que no estaba respaldada por el rastro inglés, y se unifican las alternativas de ἄρχων en una sola nota tradicionalmente relevante («príncipe»).
