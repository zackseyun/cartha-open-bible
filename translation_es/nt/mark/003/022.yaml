translation:
  language: es
  text: 'Y los escribas que habían bajado de Jerusalén decían[a]: «Tiene a Beelzebul[b]», y[c] «Por el gobernante de los demonios echa fuera a los demonios».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «Está poseído por Beelzebul».'
    reason: lexical_alternative
  - marker: b
    text: Griego Βεελζεβούλ; tradicionalmente se vierte «Beelzebub».
    reason: alternative_reading
  - marker: c
    text: 'O: «Por el príncipe de los demonios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γραμματεῖς
  english_pob_choice: scribes
  chosen_spanish: escribas
  alternatives_spanish:
  - maestros de la ley
  - expertos en la ley
  lexicon: BDAG
  rationale: «Escribas» es el término transparente y estándar en español para γραμματεῖς en el contexto evangélico, manteniendo la referencia a los especialistas judíos en la Ley sin sustituirla por una paráfrasis más interpretativa.
- source_word: ἀπὸ Ἱεροσολύμων καταβάντες
  english_pob_choice: who had come down from Jerusalem
  chosen_spanish: que habían bajado de Jerusalén
  alternatives_spanish:
  - que venían de Jerusalén
  - habiendo bajado de Jerusalén
  lexicon: BDAG
  rationale: «Bajado» conserva el valor direccional de καταβάντες desde Jerusalén y la relación temporal anterior al verbo principal; «habían bajado» mantiene un español natural y el matiz de anterioridad.
- source_word: ἔλεγον
  english_pob_choice: were saying
  chosen_spanish: decían
  alternatives_spanish:
  - estaban diciendo
  - seguían diciendo
  lexicon: BDAG
  rationale: El imperfecto expresa acción reiterada o en curso; en español, «decían» comunica esa duratividad con naturalidad y sin recargar el estilo.
- source_word: Βεελζεβοὺλ
  english_pob_choice: Beelzebul
  chosen_spanish: Beelzebul
  alternatives_spanish:
  - Beelzebub
  lexicon: BDAG
  rationale: La transliteración directa del griego Βεελζεβούλ es «Beelzebul». Se conserva la forma tradicional «Beelzebub» en nota como alternativa histórica, pero no como texto principal.
- source_word: ἔχει
  english_pob_choice: has
  chosen_spanish: tiene
  alternatives_spanish:
  - está poseído por
  - lo tiene
  lexicon: BDAG
  rationale: «Tiene» sigue de cerca el giro griego «Βεελζεβοὺλ ἔχει» sin resolver de antemano la acusación en una formulación más explícita. La posible implicación de posesión se deja como tensión interpretativa documentada en nota.
- source_word: ἐν τῷ ἄρχοντι τῶν δαιμονίων
  english_pob_choice: By the ruler of the demons
  chosen_spanish: Por medio del gobernante de los demonios
  alternatives_spanish:
  - Por el gobernante de los demonios
  - Por medio del príncipe de los demonios
  lexicon: BDAG
  rationale: En este contexto ἐν funciona con sentido instrumental o asociativo; «por medio de» comunica el medio/instancia con claridad en español. «Gobernante» traduce ἄρχων con lenguaje moderno y preciso, evitando imponer de entrada la opción tradicional «príncipe».
- source_word: δαιμονίων / δαιμόνια
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus inmundos
  lexicon: BDAG
  rationale: El término δαιμόνιον se traduce de manera consistente como «demonio», preservando la correspondencia léxica con el griego. «Espíritus inmundos» pertenece a otro giro y no se usa aquí como sustituto.
- source_word: ἐκβάλλει
  english_pob_choice: casts out
  chosen_spanish: echa fuera
  alternatives_spanish:
  - expulsa
  - arroja fuera
  lexicon: BDAG
  rationale: «Echa fuera» es una forma natural y fiel en español para el lenguaje de expulsión exorcística; mantiene el sentido de ἐκβάλλει sin sonar forzado ni excesivamente técnico.
theological_decisions:
- issue: Giro acusatorio «Βεελζεβοὺλ ἔχει»
  english_pob_reading: He has Beelzebul
  chosen_spanish_reading: Tiene a Beelzebul
  alternative_spanish_readings:
  - Está poseído por Beelzebul
  - Tiene Beelzebul
  rationale: La traducción principal conserva la forma breve e idiomática del griego sin resolverla de antemano en una explicación doctrinal. La acusación sugiere control o posesión demoníaca, pero esa fuerza se documenta como alternativa para no borrar la tensión del texto.
  doctrine_reference: Preservar la tensión lexical y acusatoria del texto; no explicitar más de lo que el griego dice en la línea principal.
- issue: Relación instrumental en ἐν τῷ ἄρχοντι τῶν δαιμονίων
  english_pob_reading: By the ruler of the demons
  chosen_spanish_reading: Por medio del gobernante de los demonios
  alternative_spanish_readings:
  - Por el gobernante de los demonios
  - Por medio del príncipe de los demonios
  rationale: La frase griega puede leerse instrumentalmente; «por medio de» hace explícita esa función en español sin perder el carácter acusatorio. «Gobernante» evita una lectura demasiado tradicionalizada que podría ocultar el valor de ἄρχων.
  doctrine_reference: Lectura gramatical e instrumental del sintagma; mantener claridad sin sobreinterpretar.
translation_notes:
  revision_awareness: 'Se revisó el pasaje contra el texto griego SBLGNT y el audit trail inglés de la POB. La versión inglesa ya había elegido una traducción idiomática pero cercana; aquí se mantuvo la misma tensión entre literalidad y naturalidad: ἔχει no se expande en el texto principal, ἐν se interpreta instrumentalmente, y δαιμόνια se conserva como «demonios». No hubo cambios textuales respecto al criterio de revisión más reciente, sino adaptación fiel al español con preservación de alternativas en notas.'
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - «Mesías/Cristo» no aplica aquí; no se introdujo terminología ajena al versículo.
  - Se usó «demonios» de forma consistente para δαιμόνια/δαιμονίων.
  - Se prefirió «echa fuera» por naturalidad bíblica en español, equivalente a «casts out» sin perder el matiz exorcístico.
  - Las notas mantienen las alternativas significativas del audit trail inglés y añaden solo las necesarias para claridad española.
