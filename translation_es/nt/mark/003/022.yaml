review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido global del griego: los escribas venidos de Jerusalén hacen dos acusaciones, que Jesús tiene a Beelzebul y que expulsa demonios por el gobernante de los demonios. Conserva adecuadamente γραμματεῖς = «escribas», καταβάντες = «habían bajado», ἔλεγον = «decían», Βεελζεβούλ = «Beelzebul» y δαιμόνια = «demonios». Sin embargo, la línea principal introduce una sobretraducción leve en «Tiene a Beelzebul», porque el griego dice más literalmente «tiene Beelzebul»/«tiene a Beelzebul» sin artículo, y en español «tener a X» tiende a sonar más transitivo-personal. Además, el aparato de notas no sigue bien el rastro inglés: añade notas no justificadas y duplica alternativas léxicas de manera confusa.'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay pequeños problemas de naturalidad y de disciplina editorial. «Por medio del gobernante de los demonios» es entendible, aunque «por el gobernante de los demonios» suena más directo y más cercano al valor instrumental ya recogido en la auditoría inglesa. La secuencia de notas [c][d] es innecesariamente recargada, y la nota [e] para «echa fuera» introduce una alternativa no preservada por el inglés y no necesaria para evitar ambigüedad en español.
  glossary_alignment: 'La terminología principal está bien alineada con el proyecto: «escribas», «Beelzebul», «demonios», «echa fuera». No hay términos del glosario mayor en disputa. La única corrección recomendada es ajustar la frase instrumental y simplificar las notas para corresponder mejor a las decisiones léxicas documentadas: conservar la alternativa de «está poseído por Beelzebul», mantener «Beelzebub» en nota, y preservar «príncipe de los demonios» como alternativa tradicional a «gobernante/ruler».'
  issues:
  - severity: medium
    issue: Exceso y desorden en las notas al pie
    rationale: El borrador crea cinco notas donde la auditoría inglesa preserva tres. Las notas [c] y [d] fragmentan innecesariamente la misma decisión léxica, y [e] añade una alternativa para ἐκβάλλει que no fue preservada en el POB inglés ni es necesaria por claridad española.
  - severity: medium
    issue: «Por medio del gobernante de los demonios» suena más explicativo que el original y que la decisión inglesa principal
    rationale: Aunque es defendible, «por el gobernante de los demonios» comunica mejor la acusación instrumental sin expansión innecesaria. El inglés principal usa «By the ruler...», no «by means of the ruler...».
  - severity: low
    issue: «Tiene a Beelzebul» es algo tenso en español
    rationale: La frase busca preservar el modismo griego, pero en español puede sonar menos natural. Aun así, puede mantenerse si se apoya con la nota explicativa de posesión, porque la auditoría inglesa quiso conservar la literalidad en la línea principal.
  revised_spanish_text: 'Y los escribas que habían bajado de Jerusalén decían[a]: «Tiene a Beelzebul[b]», y[c] «Por el gobernante de los demonios echa fuera a los demonios».'
  revised_footnotes:
