    text: Griego Βεελζεβούλ; tradicionalmente se vierte «Beelzebub».
    reason: alternative_reading
  - marker: c
    text: 'O: «Por el príncipe de los demonios».'
    reason: lexical_alternative
  revision_rationale: Se conserva la fidelidad básica del borrador, pero se corrige el aparato de notas para alinearlo con la auditoría inglesa y se simplifica la frase instrumental principal. Se elimina la nota sobre «expulsa», que no estaba respaldada por el rastro inglés, y se unifican las alternativas de ἄρχων en una sola nota tradicionalmente relevante («príncipe»).
