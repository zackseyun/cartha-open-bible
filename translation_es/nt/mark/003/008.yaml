  text: καὶ ἀπὸ Ἱεροσολύμων καὶ ἀπὸ τῆς Ἰδουμαίας ⸀καὶ πέραν τοῦ Ἰορδάνου ⸁καὶ περὶ Τύρον καὶ Σιδῶνα, πλῆθος πολύ, ⸀ἀκούοντες ὅσα ⸀ἐποίει ἦλθον πρὸς αὐτόν.
base_translation:
  language: en
  yaml_path: translation/nt/mark/003/008.yaml
  text: and from Jerusalem[a], and from Idumea, and beyond the Jordan, and around Tyre and Sidon, a great crowd, hearing what he was doing[c][b], came to him.
  footnotes:
  - marker: a
    text: Or 'from across the Jordan.' The Greek expression can denote the region on the far side of the Jordan River.
    reason: lexical_alternative
  - marker: b
    text: Or 'from the vicinity of Tyre and Sidon.' The Greek says 'around Tyre and Sidon,' referring to the surrounding region rather than necessarily the cities themselves.
    reason: lexical_alternative
  - marker: c
    text: Or 'all that he was doing.' The Greek relative pronoun can carry a comprehensive sense.
    reason: lexical_alternative
