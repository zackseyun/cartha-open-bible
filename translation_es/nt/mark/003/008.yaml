translation:
  language: es
  text: y de Jerusalén, y de Idumea, y de más allá del Jordán[a], y de las cercanías de Tiro y Sidón[b], una gran multitud, al oír lo que él hacía[c], vinieron a él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'del otro lado del Jordán'. La expresión griega puede referirse a la región situada al otro lado del río Jordán.
    reason: lexical_alternative
  - marker: b
    text: O 'de la región alrededor de Tiro y Sidón'. El griego dice 'alrededor de Tiro y Sidón', refiriéndose a la zona circundante y no necesariamente a las ciudades mismas.
    reason: lexical_alternative
  - marker: c
    text: O 'todo lo que él hacía'. El pronombre relativo griego puede tener un sentido comprehensivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπὸ Ἱεροσολύμων
  english_pob_choice: from Jerusalem
  chosen_spanish: de Jerusalén
  alternatives_spanish:
  - desde Jerusalén
  - de la región de Jerusalén
  lexicon: BDAG
  rationale: ἀπό con genitivo marca procedencia; en español, 'de Jerusalén' transmite de forma natural el origen geográfico sin añadir matiz innecesario.
- source_word: ἀπὸ τῆς Ἰδουμαίας
  english_pob_choice: from Idumea
  chosen_spanish: de Idumea
  alternatives_spanish:
  - desde Idumea
  - de la región de Idumea
  lexicon: BDAG
  rationale: Se conserva el nombre regional con transliteración habitual y el sentido de procedencia de ἀπό.
- source_word: πέραν τοῦ Ἰορδάνου
  english_pob_choice: beyond the Jordan
  chosen_spanish: de más allá del Jordán
  alternatives_spanish:
  - de la otra orilla del Jordán
  - de allende el Jordán
  lexicon: BDAG
  rationale: '''Más allá del Jordán'' mantiene el valor espacial de πέραν y suena natural en español bíblico contemporáneo.'
- source_word: περὶ Τύρον καὶ Σιδῶνα
  english_pob_choice: around Tyre and Sidon
  chosen_spanish: de alrededor de Tiro y de Sidón
  alternatives_spanish:
  - de la región de Tiro y de Sidón
  - de las cercanías de Tiro y de Sidón
  lexicon: BDAG
  rationale: περί con acusativo señala la zona circundante; 'de alrededor de' preserva ese matiz regional mejor que limitarlo a las ciudades mismas.
- source_word: πλῆθος πολύ
  english_pob_choice: a great crowd
  chosen_spanish: una gran multitud
  alternatives_spanish:
  - una multitud grande
  - una multitud muy numerosa
  lexicon: BDAG
  rationale: '''Multitud'' conserva el valor colectivo de πλῆθος y ''gran'' refleja el énfasis en tamaño.'
- source_word: ἀκούοντες
  english_pob_choice: hearing
  chosen_spanish: oyendo
  alternatives_spanish:
  - al oír
  - cuando oyeron
  lexicon: BDAG
  rationale: El participio presente se vierte con una forma participial española para conservar la relación sintáctica con el verbo principal sin explicitar causalidad o temporalidad de más.
- source_word: ὅσα ἐποίει
  english_pob_choice: what he was doing
  chosen_spanish: todo lo que él hacía
  alternatives_spanish:
  - lo que él hacía
  - todas las cosas que hacía
  lexicon: BDAG
  rationale: ὅσα puede tener sentido comprehensivo; 'todo lo que' retoma esa amplitud, y el imperfecto 'hacía' preserva la acción en curso.
- source_word: ἦλθον πρὸς αὐτόν
  english_pob_choice: came to him
  chosen_spanish: vino a él
  alternatives_spanish:
  - vinieron a él
  - se acercó a él
  lexicon: BDAG
  rationale: El verbo de movimiento con πρός indica llegada hacia una persona; en singular colectivo español, 'vino' puede funcionar de modo natural para la multitud como conjunto, pero debe leerse en sentido grupal.
- source_word: καὶ ... καὶ ... καὶ
  english_pob_choice: and ... and ... and
  chosen_spanish: y ... y ... y
  alternatives_spanish:
  - omitido en español para mayor fluidez
  lexicon: LSJ
  rationale: Se conserva la acumulación de καί para reflejar el estilo enumerativo de Marcos sin borrar la cadencia del original.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del inglés, que mantuvo la enumeración acumulativa y solo ajustó la puntuación alrededor de 'a great crowd'. En español se refleja esa misma estructura con comas, sin incisos añadidos ni omisiones de contenido.
  spanish_consistency_notes:
  - Se mantuvo 'Idumea' como nombre geográfico estándar.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el texto fuente.
  - '''Multitud'' se usó para πλῆθος, no ''muchedumbre'', por consistencia con el registro bíblico moderno y el valor colectivo del griego.'
  - El sujeto implícito de 'vino' se entiende como la multitud en conjunto; no se añadió un pronombre innecesario.
