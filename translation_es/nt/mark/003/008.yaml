  to: y de Jerusalén, y de Idumea, y de más allá del Jordán[a], y de las cercanías de Tiro y Sidón[b], una gran multitud, al oír lo que él hacía[c], vinieron a él.
  rationale: Se corrigió 'vino' a 'vinieron' para reflejar el plural griego ἦλθον. Se mejoró la naturalidad de περὶ Τύρον καὶ Σιδῶνα con 'de las cercanías de Tiro y Sidón', manteniendo el sentido regional. Se ajustó 'todo lo que él hacía' a 'lo que él hacía' para alinearlo con la elección principal del POB inglés, preservando la lectura comprehensiva en nota. Se añadieron las notas léxicas pertinentes del audit trail inglés con marcadores únicos anclados en el texto.
