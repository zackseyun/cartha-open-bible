translation:
  language: es
  text: Y les dijo a sus discípulos que una barca pequeña estuviera lista para él, a causa de la multitud, para que no lo apretaran[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aplastaran». El verbo griego puede denotar presionar, apretar o aplastar bajo presión.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶπεν
  english_pob_choice: told
  chosen_spanish: les dijo
  alternatives_spanish:
  - les habló
  - les dijo que
  lexicon: BDAG
  rationale: λέγω aquí introduce un contenido indirecto; en español, «les dijo» conserva la relación directa con los discípulos y mantiene naturalidad sintáctica sin añadir matices no presentes en el griego.
- source_word: μαθηταῖς
  english_pob_choice: disciples
  chosen_spanish: discípulos
  alternatives_spanish:
  - seguidores
  - alumnos
  lexicon: BDAG
  rationale: «Discípulos» es el equivalente normal y fiel para μαθηταί en los Evangelios, preservando la relación maestro-seguidor.
- source_word: πλοιάριον
  english_pob_choice: small boat
  chosen_spanish: barquito
  alternatives_spanish:
  - pequeña barca
  - barca pequeña
  - barco pequeño
  lexicon: BDAG
  rationale: El diminutivo πλοιάριον sugiere un bote/barca pequeña. «Barquito» conserva ese matiz diminutivo de manera natural en español, sin sonar tan técnico como «embarcación pequeña».
- source_word: προσκαρτερῇ
  english_pob_choice: should stay ready
  chosen_spanish: estuviera listo
  alternatives_spanish:
  - permaneciera listo
  - estuviera disponible
  - quedara listo
  lexicon: BDAG
  rationale: En este contexto el verbo expresa permanecer a disposición o listo para uso inmediato. «Estuviera listo» comunica esa disponibilidad continua de forma idiomática en español.
- source_word: αὐτῷ
  english_pob_choice: for him
  chosen_spanish: para él
  alternatives_spanish:
  - a su disposición
  - para uso de él
  lexicon: BDAG
  rationale: Con προσκαρτερῇ, el dativo indica disponibilidad en relación con Jesús. «Para él» refleja esa relación de utilidad/disposición con claridad.
- source_word: διὰ τὸν ὄχλον
  english_pob_choice: because of the crowd
  chosen_spanish: a causa de la multitud
  alternatives_spanish:
  - por la multitud
  - debido a la multitud
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o razón. «A causa de la multitud» mantiene la fuerza causal del griego y suena natural en registro bíblico contemporáneo.
- source_word: θλίβωσιν
  english_pob_choice: might not crush
  chosen_spanish: lo apretaran
  alternatives_spanish:
  - lo aplastaran
  - lo apretujaran
  - lo oprimieran
  lexicon: BDAG
  rationale: θλίβω puede abarcar presionar, apretar o aplastar. «Apretaran» conserva la idea física de presión de la multitud sin exagerar hacia «aplastaran», que en español puede sonar más extremo que el contexto inmediato.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con la traducción inglesa auditada; no se detectaron revisiones sustanciales en el testimonio de revisión más reciente, y se conservó la lectura de disponibilidad de la embarcación y la presión física de la multitud.
  spanish_consistency_notes:
  - Se preservó el diminutivo de πλοιάριον con un equivalente natural en español.
  - Se mantuvo la relación causal de διὰ τὸν ὄχλον con una construcción explícita.
  - Se evitó sustituir el valor físico de θλίβω por un verbo meramente general como «molestar» o «estorbar».
