translation:
  language: es
  text: Y si un reino se divide contra sí mismo, ese reino no puede mantenerse.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - También
  lexicon: BDAG
  rationale: Conserva la coordinación simple con el contexto inmediato. En español, 'Y' mantiene la conexión argumentativa sin añadir matiz temporal o explicativo.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: BDAG
  rationale: Introduce una condición general, proverbial. 'Si' expresa de forma natural la estructura condicional del griego con subjuntivo.
- source_word: βασιλεία
  english_pob_choice: kingdom
  chosen_spanish: reino
  alternatives_spanish:
  - dominio
  - reinado
  lexicon: BDAG
  rationale: '''Reino'' reproduce la imagen político-social que usa Jesús y conserva mejor el sustantivo concreto del original que opciones más abstractas como ''reinado''.'
- source_word: ἐφ’ ἑαυτὴν
  english_pob_choice: against itself
  chosen_spanish: contra sí mismo
  alternatives_spanish:
  - contra sí misma
  - en contra de sí
  lexicon: BDAG
  rationale: La expresión con ἐπί + reflexivo comunica oposición interna. En español, 'contra sí mismo' es la forma más natural y fiel para esta idea idiomática; se usa el masculino concordando con 'reino'.
- source_word: μερισθῇ
  english_pob_choice: is divided
  chosen_spanish: se divide
  alternatives_spanish:
  - es dividido
  - se parte
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo expresa una situación de división. 'Se divide' suena natural en español y preserva la idea sin forzar una voz pasiva dura.
- source_word: οὐ δύναται
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no logra
  lexicon: BDAG
  rationale: '''No puede'' es breve, idiomático y refleja bien la incapacidad expresada por δύναμαι.'
- source_word: σταθῆναι
  english_pob_choice: stand
  chosen_spanish: mantenerse
  alternatives_spanish:
  - permanecer en pie
  - subsistir
  lexicon: BDAG
  rationale: Aquí el infinitivo de ἵστημι expresa permanecer firme o continuar establecido. 'Mantenerse' preserva el sentido de continuidad y estabilidad en español, sin sonar literal de manera artificial.
- source_word: ἡ βασιλεία ἐκείνη
  english_pob_choice: that kingdom
  chosen_spanish: ese reino
  alternatives_spanish:
  - aquel reino
  - ese mismo reino
  lexicon: BDAG
  rationale: El demostrativo subraya el reino referido en la frase. 'Ese reino' mantiene la referencia cercana y el énfasis retórico sin sobrecargar el español.
theological_decisions:
- issue: Alcance de la afirmación
  english_pob_reading: Render as a general principle within Jesus's argument, without importing a broader doctrinal claim about political entities or Satan beyond the immediate context.
  chosen_spanish_reading: Presentar el dicho como principio general dentro del argumento de Jesús, sin ampliar su alcance a una tesis doctrinal externa al contexto inmediato.
  alternative_spanish_readings:
  - Tomarlo como una máxima sociopolítica general
  - Interpretarlo como una afirmación específica sobre Satanás
  rationale: El versículo funciona como una sentencia proverbial en la refutación de Jesús. La traducción debe conservar ese carácter general sin añadir explicaciones teológicas que el texto no formula aquí.
  doctrine_reference: Mantener la tensión interpretativa; no ampliar la aplicación más allá del contexto narrativo y argumentativo inmediato.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del testimonio en inglés: no se documentaron cambios necesarios y el control cruzado reportó alto acuerdo. La redacción española sigue esa misma lectura sin introducir notas textuales adicionales.'
  spanish_consistency_notes:
  - Se conserva 'reino' de manera consistente con el valor de βασιλεία en el audit trail inglés.
  - Se mantiene la estructura condicional-proverbial del griego con una sintaxis natural en español.
  - '''Se divide contra sí mismo'' reproduce la oposición interna sin suavizarla.'
  - '''No puede mantenerse'' procura el valor de σταθῆναι como permanecer firme o continuar establecido, evitando una paráfrasis doctrinal.'
