translation:
  language: es
  text: Y si Satanás se ha levantado contra sí mismo y está dividido[a], no puede permanecer en pie, sino que ha llegado a su fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «sino que tiene fin».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satán
  lexicon: BDAG
  rationale: Se translitera el nombre propio como en el inglés POB. En español, ‘Satanás’ es la forma más reconocible y doctrinalmente transparente, sin perder el valor de nombre personal.
- source_word: ἀνέστη
  english_pob_choice: has risen up
  chosen_spanish: se ha levantado
  alternatives_spanish:
  - ha resucitado
  - se ha puesto en pie
  lexicon: BDAG
  rationale: El verbo expresa un levantarse en oposición dentro del argumento de Jesús. ‘Se ha levantado’ conserva el matiz de acción hostil sin sugerir resurrección física.
- source_word: ἐφ’ ἑαυτὸν
  english_pob_choice: against himself
  chosen_spanish: contra sí mismo
  alternatives_spanish:
  - sobre sí mismo
  lexicon: BDAG
  rationale: La lectura idiomática es hostil y refleja acción dirigida contra uno mismo. ‘Contra sí mismo’ es el equivalente natural en español y evita una literalidad opaca.
- source_word: ἐμερίσθη
  english_pob_choice: is divided
  chosen_spanish: está dividido
  alternatives_spanish:
  - ha sido dividido
  - está fragmentado
  lexicon: BDAG
  rationale: El pasivo comunica un estado resultante de división interna. ‘Está dividido’ mantiene la fuerza descriptiva del estado actual en el razonamiento condicional.
- source_word: οὐ δύναται στῆναι
  english_pob_choice: he cannot stand
  chosen_spanish: no puede permanecer en pie
  alternatives_spanish:
  - no puede estar en pie
  - no puede sostenerse
  lexicon: BDAG
  rationale: El modismo griego sugiere incapacidad de mantenerse firme o perdurar. ‘Permanecer en pie’ suena natural en español y conserva la imagen retórica de firmeza/continuidad.
- source_word: ἀλλὰ τέλος ἔχει
  english_pob_choice: but has come to an end
  chosen_spanish: sino que ha llegado a su fin
  alternatives_spanish:
  - sino que tiene fin
  - sino que ha terminado
  lexicon: BDAG
  rationale: La expresión literal es ‘tiene fin’, pero en español ‘ha llegado a su fin’ comunica con claridad el valor idiomático de terminación sin exagerar más allá del contexto inmediato.
theological_decisions:
- issue: Alcance de la afirmación sobre la derrota de Satanás
  english_pob_reading: La cláusula funciona como parte del argumento reductio de Jesús y no obliga a convertir el verso en una declaración doctrinal completa sobre la derrota final de Satanás.
  chosen_spanish_reading: 'Mantener la afirmación como consecuencia lógica del reino dividido: Satanás no puede sostenerse si obra contra sí mismo.'
  alternative_spanish_readings:
  - tratarlo como una declaración escatológica absoluta
  - traducirlo como una afirmación más enfática de fin definitivo
  rationale: 'El griego presenta una conclusión argumentativa inmediata. La traducción española debe conservar esa tensión: el verso afirma la imposibilidad de continuidad de un dominio dividido, sin expandirlo más allá de su función retórica en el contexto.'
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: La redacción sigue el ajuste más reciente del POB inglés, que pasó de una formulación progresiva a una perfectiva en la cláusula final. En español, ‘ha llegado a su fin’ refleja con más precisión τέλος ἔχει y mantiene un registro formal y conciso.
  spanish_consistency_notes:
  - Se mantiene el nombre propio ‘Satanás’ en lugar de una glosa descriptiva.
  - Se evita ‘Cristo’ porque no aparece en el versículo ni en su contexto inmediato lexical.
  - ‘Está dividido’ y ‘no puede permanecer en pie’ conservan la lógica interna del argumento sin sobrerreformularla.
  - La nota a pie de página ofrece la alternativa más literal de la cláusula final, como en el audit trail inglés.
