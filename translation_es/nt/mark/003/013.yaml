review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la secuencia narrativa y las decisiones principales del griego: ἀναβαίνει -> «subió», εἰς τὸ ὄρος -> «al monte», οὓς ἤθελεν αὐτός -> «a los que él quería», y ἀπῆλθον πρὸς αὐτόν -> «vinieron a él». También conserva adecuadamente la nota sobre el énfasis de αὐτός y la alternativa de movimiento hacia Jesús. Sin embargo, «llamó a sí» no es español natural ni una forma fielmente idiomática de expresar προσκαλεῖται en este contexto; debe repararse para preservar el matiz medio sin caer en calco.'
  spanish_quality_summary: La frase general es clara, pero «llamó a sí» suena antinatural y poco legible en español contemporáneo eclesial. «Llamó junto a sí» o «llamó a su lado» comunican mejor la implicación personal del verbo medio. El resto del versículo es claro, digno y natural.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La elección «quería» para θέλω y «vinieron a él» para ἀπῆλθον πρὸς αὐτόν es adecuada. La única desalineación relevante es estilística/lexical en προσκαλεῖται: el borrador debía evitar el calco «llamó a sí» y usar un español natural que preserve el matiz relacional.'
  issues:
