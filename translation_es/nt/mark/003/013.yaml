revisions:
- from: Y subió al monte y llamó a sí a los que él quería[a], y vinieron a él[b].
  to: Y subió al monte y llamó junto a sí a los que él quería[a], y vinieron a él[b].
  rationale: Se reemplazó «llamó a sí» por «llamó junto a sí» para evitar un calco antinatural y expresar con español claro el matiz personal/relacional de προσκαλεῖται. Se mantuvieron las notas existentes porque siguen representando bien las alternativas preservadas en la auditoría inglesa.
