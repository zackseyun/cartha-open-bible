    issue: «llamó a sí» es un calco no idiomático en español
    rationale: Aunque busca reflejar el medio de προσκαλεῖται, en español neutral «llamó a sí» no se usa de forma natural. Distorsiona la legibilidad y no mejora la fidelidad. «Llamó junto a sí» preserva mejor la idea de que los llamó hacia su propia presencia.
  revised_spanish_text: Y subió al monte y llamó junto a sí a los que él quería[a], y vinieron a él[b].
