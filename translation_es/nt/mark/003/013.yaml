translation:
  language: es
  text: Y subió al monte y llamó junto a sí a los que él quería[a], y vinieron a él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los que quería»; el griego incluye un «él» enfático.
    reason: lexical_alternative
  - marker: b
    text: O «fueron a él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναβαίνει
  english_pob_choice: went up
  chosen_spanish: subió
  alternatives_spanish:
  - iba subiendo
  - ascendió
  lexicon: BDAG
  rationale: El griego usa presente histórico; en español narrativo natural se expresa mejor con pretérito. «Subió» conserva el sentido de ascenso sin volver el estilo demasiado solemne.
- source_word: εἰς τὸ ὄρος
  english_pob_choice: on the mountain
  chosen_spanish: al monte
  alternatives_spanish:
  - a la montaña
  - sobre el monte
  - en el monte
  lexicon: BDAG
  rationale: Con ἀναβαίνει, la dirección es de subida hacia el monte. «Al monte» refleja el movimiento y suena natural en español bíblico contemporáneo.
- source_word: προσκαλεῖται
  english_pob_choice: called to himself
  chosen_spanish: llamó a sí
  alternatives_spanish:
  - llamó
  - convocó
  - llamó junto a sí
  lexicon: BDAG
  rationale: El medio sugiere iniciativa e implicación personal. «Llamó a sí» conserva la relación marcada por el griego y evita sustituir el matiz por un verbo más institucional como «convocó».
- source_word: οὓς ἤθελεν αὐτός
  english_pob_choice: those whom he wanted
  chosen_spanish: a los que él quería
  alternatives_spanish:
  - a los que quería
  - a los que él deseaba
  lexicon: BDAG
  rationale: «Quería» es el equivalente más natural de θέλω aquí. Se conserva el énfasis de αὐτός con «él», sin forzar un «él mismo» innecesario en español.
- source_word: ἀπῆλθον πρὸς αὐτόν
  english_pob_choice: they came to him
  chosen_spanish: vinieron a él
  alternatives_spanish:
  - fueron hacia él
  - se acercaron a él
  lexicon: BDAG
  rationale: Aunque ἀπέρχομαι puede ser «ir/se apartar», con πρὸς αὐτόν el movimiento es hacia Jesús. «Vinieron a él» expresa mejor esa dirección desde la perspectiva del destino, siguiendo la revisión inglesa.
theological_decisions:
- issue: Énfasis en la iniciativa personal de Jesús al llamar a los doce
  english_pob_reading: Retained the emphatic force with 'he himself wanted' without importing a doctrinal claim about election beyond the verse's wording.
  chosen_spanish_reading: Se conservó el énfasis personal con «él quería», sin añadir una formulación doctrinal sobre elección que vaya más allá del versículo.
  alternative_spanish_readings:
  - a los que quería
  - a los que él mismo quería
  rationale: El texto subraya la iniciativa de Jesús, pero no desarrolla aquí una doctrina sistemática. La traducción mantiene la tensión sin sobrerinterpretarla.
  doctrine_reference: Preservar la tensión textual; no resolverla con una sistematización doctrinal no explícita.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente: se prefirió un movimiento hacia Jesús («vinieron a él») y se evitó duplicar innecesariamente la idea enfática de «él mismo»; el español conserva la fuerza del énfasis con el pronombre explícito «él».'
  spanish_consistency_notes:
  - Se mantuvo el registro narrativo bíblico en pretérito simple.
  - «Monte» se usó por coherencia con el movimiento ascendente del verbo griego.
  - Se evitó «Cristo» o vocabulario litúrgico no presente en el texto.
  - La preposición «a sí» refleja el valor relacional de προσκαλεῖται sin introducir una paráfrasis extensa.
