translation:
  language: es
  text: y Andrés, y Felipe, y Bartolomé, y Mateo, y Tomás, y Jacobo, hijo de Alfeo, y Tadeo, y Simón el cananeo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Griego Καναναῖος; probablemente significa «zelote», como en Lucas 6:15. En versiones antiguas a menudo se vertía «cananita», pero eso puede sugerir erróneamente una referencia étnica o geográfica a Canaán.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Se mantiene la estructura paratáctica de la lista con la conjunción simple «y», que es la forma normal y más natural en español para enumeraciones de nombres.
- source_word: Ἀνδρέαν
  english_pob_choice: Andrew
  chosen_spanish: Andrés
  alternatives_spanish:
  - André
  lexicon: BDAG
  rationale: Nombre propio transliterado según la convención española establecida y de uso eclesial amplio.
- source_word: Φίλιππον
  english_pob_choice: Philip
  chosen_spanish: Felipe
  alternatives_spanish:
  - Filipo
  lexicon: BDAG
  rationale: Se usa la forma española tradicional y plenamente inteligible del nombre propio.
- source_word: Βαρθολομαῖον
  english_pob_choice: Bartholomew
  chosen_spanish: Bartolomé
  alternatives_spanish:
  - Bartolomeo
  lexicon: BDAG
  rationale: Se adopta la forma española establecida del nombre propio, fiel a la transliteración y de uso reconocible.
- source_word: Μαθθαῖον
  english_pob_choice: Matthew
  chosen_spanish: Mateo
  alternatives_spanish:
  - Matías
  lexicon: BDAG
  rationale: Nombre propio con forma española estándar; «Mateo» es la equivalencia natural y reconocible en español bíblico.
- source_word: Θωμᾶν
  english_pob_choice: Thomas
  chosen_spanish: Tomás
  alternatives_spanish:
  - Tomé
  lexicon: BDAG
  rationale: Forma española tradicional y clara del nombre propio.
- source_word: Ἰάκωβον τὸν τοῦ Ἁλφαίου
  english_pob_choice: James the son of Alphaeus
  chosen_spanish: Jacobo, hijo de Alfeo
  alternatives_spanish:
  - Santiago, hijo de Alfeo
  - Jacobo de Alfeo
  lexicon: BDAG
  rationale: El griego identifica a este Jacobo mediante filiación; «hijo de Alfeo» expresa con naturalidad la construcción artículo + genitivo. Se conserva «Jacobo» porque el contexto de lista apostólica permite esta forma y evita imponer una equivalencia litúrgica no garantizada por el dato griego.
- source_word: Θαδδαῖον
  english_pob_choice: Thaddaeus
  chosen_spanish: Tadeo
  alternatives_spanish:
  - Taddeo
  lexicon: BDAG
  rationale: Nombre propio con forma española usual; conserva la identificación personal sin introducir una grafía extraña al lector.
- source_word: Σίμωνα τὸν ⸀Καναναῖον
  english_pob_choice: Simon the Cananaean
  chosen_spanish: Simón el Cananeo
  alternatives_spanish:
  - Simón el Zelote
  - Simón el cananeo
  lexicon: BDAG
  rationale: Se conserva el valor directo del término griego en español con «Cananeo», siguiendo de cerca la revisión inglesa más reciente. Aunque el audit trail inglés menciona la lectura interpretativa «Zealot» como trasfondo posible, aquí se preserva la designación explícita del manuscrito en lugar de sustituirla por una glosa interpretativa.
theological_decisions:
- issue: 'Epiteto de Simón: designación literal frente a interpretación histórica'
  english_pob_reading: Simon the Cananaean, with historical note that it likely means 'Zealot' and is not an ethnic Canaanite reference
  chosen_spanish_reading: Simón el Cananeo, conservando la designación textual y dejando implícita la posible trasfondo histórico sin glosarla en el cuerpo del versículo
  alternative_spanish_readings:
  - Simón el Zelote
  - Simón el cananeo
  rationale: La evidencia griega de Marcos usa Καναναῖον; la nota inglesa muestra la tensión entre la forma textual y su probable sentido histórico. En español, mantener «Cananeo» respeta el dato superficial del texto y no borra esa tensión. La interpretación «Zelote» queda disponible como alternativa explicativa, pero no se impone en el versículo principal.
  doctrine_reference: Principio de primacía del texto fuente y preservación de tensiones lexicohistóricas; cf. paralelos sinópticos en Lucas 6:15.
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió de «Simon the Zealot» a «Simon the Cananaean» para reflejar más directamente el griego Καναναῖον. Este borrador español sigue esa decisión revisada y no reintroduce la interpretación «zelote» en el texto principal.
  spanish_consistency_notes:
  - Se conservaron nombres propios con formas españolas ampliamente reconocidas para mantener legibilidad eclesial.
  - Se evitó traducir «Cananaean» por «Canaanita», por ser potencialmente engañoso según el audit trail inglés.
  - La conjunción repetida «y» reproduce la lista acumulativa del griego sin añadir subordinación ni simplificación estilística.
