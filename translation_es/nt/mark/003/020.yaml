revisions:
- from: Y entra en una casa[a]; y la multitud se reúne otra vez[b], de modo que ellos[c] ni siquiera pueden comer pan.
  to: Y entra en una casa[a]; y la multitud se reúne otra vez, de modo que ni siquiera pueden comer pan[b].
  rationale: Se elimina «ellos» para mejorar la naturalidad del español sin perder el referente. Se suprime la nota redundante sobre «otra vez» y se reemplaza la nota inadecuada por la aclaración idiomática necesaria para «comer pan», en conformidad con el rastro lexical del POB inglés. El resto del texto preserva bien el sentido fuente y el presente narrativo de Marcos.
