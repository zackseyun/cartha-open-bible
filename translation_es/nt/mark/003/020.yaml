review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la secuencia básica del griego: presente narrativo, entrada a una casa, reunión repetida de la multitud y cláusula de resultado. Sin embargo, introduce dos desviaciones menores del rastro auditado: añade un pronombre explícito innecesario («ellos») para αὐτούς, y las notas b/c no preservan las alternativas relevantes del inglés POB. La nota sobre πάλιν explica una obviedad en vez de una alternativa significativa, y la nota c altera el sentido al presentar «no pueden» como alternativa cuando ya está en el texto; la alternativa auditada era el cambio de tiempo verbal en inglés, no aplicable así en español. Además, falta una nota para el sentido idiomático de «comer pan» = tomar una comida.'
  spanish_quality_summary: El español es generalmente natural y digno. «Entra en una casa» y «la multitud se reúne otra vez» son claros. No obstante, «ellos» suena algo forzado en español, porque el referente puede quedar implícito sin pérdida de sentido. También conviene mejorar las notas para que ayuden de verdad al lector y reflejen la lógica lexical del proyecto.
  glossary_alignment: No hay términos teológicos sensibles en este versículo. Las decisiones léxicas principales son compatibles con el proyecto. «Multitud» para ὄχλος y «pan» para ἄρτον son defendibles. Se conserva adecuadamente la literalidad de «pan», pero debe acompañarse de una nota idiomática como en el POB inglés.
  issues:
  - severity: medium
    issue: Pronombre explícito «ellos» innecesario en el texto principal
    rationale: αὐτούς sí está en griego, pero en español el sujeto de «pueden» puede quedar implícito sin pérdida; mantener «ellos» suena marcado y menos natural. La referencia a Jesús y los suyos puede preservarse sin forzar el estilo.
  - severity: medium
    issue: La nota b sobre «otra vez» no preserva una alternativa significativa
    rationale: El inglés POB no anotó πάλιν para explicar su significado básico, sino que no requería nota sustantiva en español. La nota actual es redundante y no aporta información textual útil.
  - severity: medium
    issue: Falta nota para el modismo «comer pan»
    rationale: El rastro auditado conserva «bread/pan» en el texto principal pero añade nota para aclarar que significa tomar una comida. Esa transparencia más aclaración debe mantenerse en español.
  - severity: medium
    issue: La nota c no corresponde al fundamento auditado
    rationale: Presenta «no pueden» como alternativa, pero eso ya aparece en el texto. Además, explica de manera imprecisa la construcción griega sin ofrecer una alternativa útil al lector español.
  revised_spanish_text: Y entra en una casa[a]; y la multitud se reúne otra vez, de modo que ni siquiera pueden comer pan[b].
  revised_footnotes:
  - marker: a
    text: O «hogar». El griego dice literalmente «en una casa», pero la expresión puede funcionar idiomáticamente para volver a casa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «comer pan»; es decir, tomar una comida.
    reason: lexical_alternative
  revision_rationale: Se elimina «ellos» para mejorar la naturalidad del español sin perder el referente. Se suprime la nota redundante sobre «otra vez» y se reemplaza la nota inadecuada por la aclaración idiomática necesaria para «comer pan», en conformidad con el rastro lexical del POB inglés. El resto del texto preserva bien el sentido fuente y el presente narrativo de Marcos.
