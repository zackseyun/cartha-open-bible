translation:
  language: es
  text: Y entra en una casa[a]; y la multitud se reúne otra vez, de modo que ni siquiera pueden comer pan[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hogar». El griego dice literalmente «en una casa», pero la expresión puede funcionar idiomáticamente para volver a casa.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «comer pan»; es decir, tomar una comida.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔρχεται
  english_pob_choice: comes
  chosen_spanish: entra
  alternatives_spanish:
  - viene
  - llega
  lexicon: BDAG
  rationale: En español, para εἰς οἶκον el verbo más natural es «entra», porque expresa el movimiento hacia el interior de una casa sin sobrecargar el verso con un calco. El presente narrativo se conserva con «entra».
- source_word: εἰς οἶκον
  english_pob_choice: into a house
  chosen_spanish: en una casa
  alternatives_spanish:
  - a una casa
  - en casa
  lexicon: BDAG
  rationale: La frase griega es anártrica y no identifica de manera explícita la casa como ‘la’ casa de alguien. «En una casa» mantiene la indefinición de οἶκον. Se evitó «en casa» porque en español puede sonar más idiomático, pero desplaza demasiado el matiz transparente del griego.
- source_word: συνέρχεται
  english_pob_choice: gathers
  chosen_spanish: se reúne
  alternatives_spanish:
  - se junta
  - se congrega
  lexicon: BDAG
  rationale: Con ὁ ὄχλος como sujeto, «se reúne» comunica bien la idea de que la multitud vuelve a juntarse. «Se congrega» sería posible, pero suena más marcado religiosamente en español.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: «Otra vez» es natural y claro en español moderno, y preserva la repetición indicada por πάλιν.
- source_word: ὁ ὄχλος
  english_pob_choice: the crowd
  chosen_spanish: la multitud
  alternatives_spanish:
  - la gente
  - la muchedumbre
  lexicon: BDAG
  rationale: «Multitud» comunica el sentido colectivo de ὄχλος sin sonar tan coloquial como «la gente» y sin la carga más literaria de «muchedumbre».
- source_word: ὥστε μὴ δύνασθαι αὐτοὺς
  english_pob_choice: so that they were not able / are not able
  chosen_spanish: de modo que ellos ni siquiera pueden
  alternatives_spanish:
  - de modo que no pueden
  - hasta el punto de que no pueden
  lexicon: BDAG
  rationale: «De modo que» expresa bien el resultado de ὥστε con infinitivo. Se mantiene el presente narrativo con «pueden», en armonía con los otros verbos en presente del versículo. El pronombre «ellos» conserva la referencia a Jesús y los suyos implícita en αὐτούς.
- source_word: μηδὲ ἄρτον φαγεῖν
  english_pob_choice: not even to eat bread
  chosen_spanish: ni siquiera pueden comer pan
  alternatives_spanish:
  - ni siquiera pueden comer
  - ni siquiera pueden tomar alimento
  lexicon: BDAG
  rationale: «Pan» conserva la literalidad de ἄρτον, tal como el inglés POB mantiene «bread» con nota idiomática. En español, «comer pan» puede sonar menos natural que en griego/inglés, pero preserva la transparencia al texto fuente; el verbo «comer» se integra de forma idiomática en la frase.
translation_notes:
  revision_awareness: El inglés auditado mantiene el presente narrativo («comes», «gathers», «are not able») para armonizar el estilo de Marcos; la versión española sigue esa decisión con presentes («entra», «se reúne», «pueden»). También se respetó la nota idiomática sobre ἄρτον, conservando «pan» en el texto principal y dejando la posibilidad de entenderlo como una comida en la nota.
  spanish_consistency_notes:
  - Se prefirió «multitud» para ὄχλος, coherente con el español bíblico contemporáneo y con el sentido colectivo singular.
  - Se evitó «SEÑOR» u otras convenciones no pertinentes porque el versículo no contiene el nombre divino ni títulos cristológicos.
  - Se mantuvo un registro sobrio y publicación-readable, sin añadir explícitamente 'los discípulos' ni otros referentes no presentes en el versículo.
