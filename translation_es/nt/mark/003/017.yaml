translation:
  language: es
  text: y a Jacobo, hijo de Zebedeo, y a Juan, hermano de Jacobo (les dio el nombre[a] Boanerges, que significa Hijos del trueno).
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego dice literalmente 'nombres' en plural; el plural probablemente funciona de manera colectiva para un solo sobrenombre compartido por los dos hermanos.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰάκωβον
  english_pob_choice: James
  chosen_spanish: Jacobo
  alternatives_spanish:
  - Santiago
  lexicon: uso neotestamentario tradicional en español
  rationale: El nombre griego Ἰάκωβος corresponde al apóstol conocido en español bíblico como Jacobo o Santiago. Aquí se elige Jacobo para mantener cercanía formal con la raíz del nombre y evitar la forma eclesiástica más marcada, que no es necesaria por el contexto del listado de los Doce.
- source_word: τὸν τοῦ Ζεβεδαίου
  english_pob_choice: the son of Zebedee
  chosen_spanish: hijo de Zebedeo
  alternatives_spanish:
  - el hijo de Zebedeo
  - el de Zebedeo
  lexicon: construcción genitiva descriptiva
  rationale: La construcción griega identifica a Jacobo por filiación. 'Hijo de Zebedeo' expresa con naturalidad la relación familiar sin añadir nada al texto.
- source_word: Ἰωάννην
  english_pob_choice: John
  chosen_spanish: Juan
  lexicon: nombre propio bíblico
  rationale: Ἰωάννης se traduce de forma estable como Juan en español.
- source_word: τὸν ἀδελφὸν τοῦ Ἰακώβου
  english_pob_choice: the brother of James
  chosen_spanish: hermano de Jacobo
  alternatives_spanish:
  - el hermano de Jacobo
  lexicon: ἀδελφός = hermano literal
  rationale: El griego señala parentesco literal. En español, la aposición 'hermano de Jacobo' es clara y fiel; no se necesita una equivalencia más interpretativa.
- source_word: ἐπέθηκεν
  english_pob_choice: he gave
  chosen_spanish: les puso nombres
  alternatives_spanish:
  - les dio el nombre
  - les asignó el nombre
  lexicon: ἐπιτίθημι + ὀνόματα
  rationale: Aunque el verbo base significa 'poner', en esta construcción con ὀνόματα funciona como 'poner nombres' o 'dar un nombre'. Se conserva la imagen verbal del griego sin forzar un giro demasiado idiomático.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  lexicon: dativo personal
  rationale: El dativo indirecto se expresa naturalmente con 'les' en español.
- source_word: ὀνόματα
  english_pob_choice: the name
  chosen_spanish: nombres
  alternatives_spanish:
  - un nombre
  - el nombre
  lexicon: ὄνομα plural con valor colectivo
  rationale: Se preserva el plural griego 'nombres', ya que el texto habla de una designación aplicada a los dos hermanos. Esto mantiene la tensión observada en el audit trail inglés entre plural formal y uso colectivo.
- source_word: Βοανηργές
  english_pob_choice: Boanerges
  chosen_spanish: Boanergues
  alternatives_spanish:
  - Boanerges
  lexicon: transliteración de nombre/nickname arameizante
  rationale: Se adopta una transliteración española más ajustada a la fonética y ortografía del castellano, manteniendo la rareza del apelativo como forma propia del texto.
- source_word: ὅ ἐστιν
  english_pob_choice: which means
  chosen_spanish: que significa
  alternatives_spanish:
  - es decir
  - esto es
  lexicon: fórmula explicativa
  rationale: La fórmula introduce una glosa interpretativa del sobrenombre. 'Que significa' es natural y transparente en español.
- source_word: Υἱοὶ Βροντῆς
  english_pob_choice: Sons of Thunder
  chosen_spanish: Hijos del Trueno
  alternatives_spanish:
  - hijos del trueno
  lexicon: título explicativo nominal
  rationale: Se conserva la literalidad de la glosa explicativa. La mayúscula inicial en ambos sustantivos refleja su función como sobrenombre explicativo en el contexto narrativo.
theological_decisions:
- issue: Conservación del apodo semítico y su glosa
  english_pob_reading: Retain the transliterated Semitic form 'Boanerges' and explain it as 'Sons of Thunder'
  chosen_spanish_reading: Conservar el sobrenombre transliterado y explicar su sentido como 'Hijos del Trueno'
  alternative_spanish_readings:
  - Traducir solo el sentido sin transliteración
  - Dejar solo el nombre extranjero sin explicación
  rationale: El versículo preserva tanto la forma extranjera como la explicación. Mantener ambas evita aplanar el dato narrativo y respeta la textura del texto fuente.
  doctrine_reference: 'Principio de traducción del POB: conservar nombres propios transliterados y traducir glosas explicativas.'
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés: nombre propio tradicional para Ἰάκωβος, conservación del dato explicativo del sobrenombre y preservación del plural ὀνόματα. No se observaron revisiones aplicadas en el expediente inglés reciente.'
  spanish_consistency_notes:
  - Se usa 'Jacobo' de modo consistente para Ἰάκωβος en este registro.
  - Se conserva el contraste entre el nombre transliterado 'Boanergues' y la glosa 'Hijos del Trueno'.
  - Se mantiene el plural 'nombres' para reflejar ὀνόματα y su posible valor colectivo.
