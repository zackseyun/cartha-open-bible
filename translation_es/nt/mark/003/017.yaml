review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la estructura básica del griego: Jacobo/Juan, filiación/fraternidad, sobrenombre transliterado y glosa explicativa. Sin embargo, no preserva bien la decisión auditada del POB sobre ὀνόματα: el inglés adopta singular idiomático en el texto principal con nota sobre el plural griego. Además, ''Boanergues'' se aparta innecesariamente de la forma auditada ''Boanerges'', y la redacción española necesita mejor puntuación para reflejar la parentética del original.'
  spanish_quality_summary: El español es generalmente claro, pero 'les puso nombres Boanergues' suena poco natural y algo áspero. Una formulación como 'les dio el nombre Boanerges' es más idiomática y fiel al sentido colectivo documentado. También conviene bajar la capitalización de la glosa a 'Hijos del trueno' o 'hijos del trueno'; en este contexto, la capitalización total de ambos sustantivos suena menos natural en español. Se recomienda mantener la glosa con mayúscula inicial solo por ir tras nombre propio o dejarla en minúscula; aquí opto por 'Hijos del trueno' por su función de sobrenombre explicado.
  glossary_alignment: No hay términos del glosario mayor directamente implicados. Sí importa la política del POB de conservar nombres transliterados cuando el texto mismo los conserva; por eso debe mantenerse 'Boanerges' y no una castellanización no documentada. La elección 'Jacobo' es aceptable dado el rationale aportado y no requiere adjudicación adicional.
  issues:
  - severity: high
    issue: Se tradujo ὀνόματα como 'nombres' en el texto principal.
    rationale: El audit trail inglés documenta explícitamente que el plural griego funciona colectivamente y por eso usa singular idiomático en el texto principal, preservando el plural en nota. El español debería seguir esa misma decisión para evitar una construcción extraña e imprecisa ('les puso nombres Boanergues').
  - severity: medium
    issue: Uso de 'Boanergues' en vez de 'Boanerges'.
    rationale: La decisión teológica/lexical auditada es conservar la forma transliterada del sobrenombre. Cambiarla a una castellanización no respaldada por el audit trail debilita la consistencia interlingüística y no mejora claramente la legibilidad.
  - severity: medium
    issue: Falta de puntuación parentética adecuada.
    rationale: El griego pone la explicación entre paréntesis. En español conviene reflejarlo con rayas o paréntesis/comas para mantener la estructura y la claridad del inciso.
  - severity: low
    issue: Capitalización de 'Hijos del Trueno' demasiado rígida para el español.
    rationale: En español no es necesario poner mayúscula en ambos sustantivos de la glosa. Una forma más natural es 'Hijos del trueno'.
