    issue: «la mano seca» es demasiado literal y poco idiomático en español para esta afección.
    rationale: Aunque ξηράν tiene valor básico de ‘seca’, en español aplicado a una mano enferma suena menos natural y puede distraer. «Marchita» preserva el matiz de ‘withered’ mejor que una literalidad rígida.
  - severity: medium
    issue: «y ponte en medio» debilita la fuerza de movimiento de εἰς τὸ μέσον.
    rationale: La frase griega incluye dirección hacia el centro. «Ponte en medio» puede entenderse como colocación estática; «ven al medio» o «ven al centro» comunica mejor el desplazamiento implícito y armoniza con la revisión inglesa auditada.
  - severity: low
    issue: La nota al pie actual defiende «seca» contra una alternativa mejor contextualizada.
    rationale: Dado que el ajuste principal recomendado cambia el texto a «marchita», la nota debe reformularse para preservar la alternativa más literal sin contrariar la mejor lectura española.
  revised_spanish_text: 'Y le dice al hombre que tenía la mano marchita[a]: «Levántate y ven al medio».

