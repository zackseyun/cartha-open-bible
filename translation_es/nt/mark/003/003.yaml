review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: conserva el presente histórico («le dice»), identifica correctamente al referente masculino («al hombre») y expresa el mandato doble con movimiento hacia una posición central. Sin embargo, «ponte en medio» tiende a sonar más estático que direccional, mientras que la revisión inglesa auditada explicitó movimiento: «come to the middle». Además, «la mano seca» es posible por cercanía léxica a ξηράν, pero en español resulta menos natural para una mano enferma que «la mano paralizada» o «marchita»; de esas, «marchita» preserva mejor el campo semántico sin medicalizar.'
  spanish_quality_summary: 'El español es generalmente claro y digno, pero «la mano seca» suena algo rígido e infrecuente en este contexto corporal, y «ponte en medio» no expresa tan bien la idea de ir al centro desde donde está. Una formulación más natural y fiel sería: «Y le dice al hombre que tenía la mano marchita[a]: “Levántate y ven al medio”».'
  glossary_alignment: No hay términos teológicos de glosario mayor en este versículo. Las decisiones principales son léxicas y narrativas. Se mantiene correctamente el presente histórico. La excepción relevante es que conviene apartarse de «seca» como default más literal para lograr mejor fidelidad idiomática al referente físico en español, explicándolo en nota.
  issues:
