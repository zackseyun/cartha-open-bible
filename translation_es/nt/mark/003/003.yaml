translation:
  language: es
  text: 'Y le dice al hombre que tenía la mano marchita[a]: «Levántate y ven al medio».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la mano seca»; «marchita» expresa de manera más natural en español el sentido de ξηράν en este contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγει
  english_pob_choice: he says
  chosen_spanish: le dice
  alternatives_spanish:
  - le dijo
  lexicon: BDAG
  rationale: El presente histórico se conserva mejor con el presente narrativo español; así se mantiene la viveza del relato sin forzar el pasado.
- source_word: τῷ ἀνθρώπῳ
  english_pob_choice: the man
  chosen_spanish: al hombre
  alternatives_spanish:
  - a la persona
  lexicon: BDAG
  rationale: El referente es un varón concreto en el contexto, por lo que 'hombre' preserva la referencia personal y de género del griego.
- source_word: τὴν χεῖρα ἔχοντι ξηράν
  english_pob_choice: with the withered hand
  chosen_spanish: que tenía la mano seca
  alternatives_spanish:
  - con la mano seca
  - de la mano seca
  lexicon: BDAG
  rationale: La construcción participial se vierte de manera natural en español como una subordinada relativa. 'Seca' conserva el sentido básico de ξηράν sin añadir interpretación médica excesiva; 'tenía' expresa la posesión descrita por ἔχοντι.
- source_word: ξηράν
  english_pob_choice: withered
  chosen_spanish: seca
  alternatives_spanish:
  - mancillada
  - atrofiada
  - marchita
  lexicon: BDAG
  rationale: '''Seca'' es el equivalente más directo del campo semántico de ξηρός/ξηρά y suena más natural que un calco menos transparente. Se evita ''atrofiada'' por ser más interpretativo que el griego y ''marchita'' por sonar menos idiomático aplicado a una mano.'
- source_word: Ἔγειρε
  english_pob_choice: Rise
  chosen_spanish: Levántate
  alternatives_spanish:
  - Ponte de pie
  - Levántese
  lexicon: BDAG
  rationale: En español, el imperativo de ἐγείρω se entiende con mayor claridad como 'levántate'. Mantiene el mandato directo sin perder la fuerza verbal del original.
- source_word: εἰς τὸ μέσον
  english_pob_choice: and come to the middle
  chosen_spanish: y ponte en medio
  alternatives_spanish:
  - y ve al centro
  - y sal al medio
  lexicon: BDAG
  rationale: '''En medio'' reproduce mejor la fuerza espacial de εἰς τὸ μέσον que ''al centro'' en español bíblico actual. ''Ponte'' hace explícito el movimiento hacia el lugar central, como reflejó la revisión inglesa al evitar una traducción meramente estática.'
translation_notes:
  revision_awareness: La revisión inglesa ajustó la segunda cláusula para reflejar mejor el movimiento implícito de εἰς τὸ μέσον, pasando de una formulación más estática a otra que expresa desplazamiento hacia el centro. La versión española adopta una solución equivalente con 'ponte en medio', manteniendo transparencia espacial y naturalidad.
  spanish_consistency_notes:
  - Se conserva el presente narrativo ('dice') para reflejar el histórico presente griego.
  - '''En medio'' se mantiene como expresión espacial directa, sin convertirla en una glosa interpretativa como ''adelante''.'
  - No se usa 'Cristo', 'Señor' ni otras sustituciones teológicas no presentes en el verso.
  - La nota textual/lexical en la nota al pie ofrece una alternativa española natural ('marchita') sin desplazar el sentido base de 'seca'.
