translation:
  language: es
  text: Y lo estaban vigilando de cerca para ver si lo sanaría en sábado[a], para acusarlo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en los sábados». El griego usa la forma plural «los sábados», que puede funcionar idiomáticamente para el día de reposo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρετήρουν
  english_pob_choice: were watching him closely
  chosen_spanish: lo estaban vigilando de cerca
  alternatives_spanish:
  - lo estaban observando atentamente
  - lo estaban mirando de cerca
  - lo estaban vigilando
  lexicon: BDAG
  rationale: El imperfecto indica acción շարունակada; en este contexto la vigilancia es hostil o sospechosa. «Vigilar de cerca» conserva ese matiz mejor que un simple «observar».
- source_word: εἰ
  english_pob_choice: to see whether
  chosen_spanish: para ver si
  alternatives_spanish:
  - para ver si acaso
  - a ver si
  - si
  lexicon: BDAG
  rationale: Después de un verbo de vigilancia, el español natural expresa la interrogativa indirecta con «para ver si», que mantiene la fuerza de «whether» sin forzar la sintaxis.
- source_word: τοῖς σάββασιν
  english_pob_choice: on the Sabbath
  chosen_spanish: en el sábado
  alternatives_spanish:
  - en los sábados
  - en el día de reposo
  - en sábado
  lexicon: BDAG
  rationale: El griego usa un plural dativo que puede funcionar idiomáticamente para el día de reposo. En español, «en el sábado» comunica la referencia al día concreto con naturalidad; se preserva en nota la posibilidad más literal «los sábados».
- source_word: θεραπεύσει
  english_pob_choice: would heal
  chosen_spanish: lo sanaría
  alternatives_spanish:
  - lo curaría
  - lo sanará
  - lo iba a sanar
  lexicon: BDAG
  rationale: En este contexto, θεραπεύω significa sanar a una persona. «Sanaría» reproduce bien el futuro en discurso indirecto; «curaría» es posible, pero «sanar» resulta más directo para una acción sobre una persona.
- source_word: κατηγορήσωσιν αὐτοῦ
  english_pob_choice: might accuse him
  chosen_spanish: para poder acusarlo
  alternatives_spanish:
  - para acusarlo
  - para presentar cargos contra él
  - para denunciarlo
  lexicon: BDAG
  rationale: El subjuntivo aoristo con ἵνα expresa propósito. «Acusarlo» es la equivalencia más natural y suficientemente jurídica sin importar un proceso formal que el texto no explicita.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  - de modo que
  lexicon: BDAG
  rationale: En español, la construcción final queda más fluida con «para poder acusarlo» y conserva la relación de propósito del griego.
theological_decisions:
- issue: Alcance de la acusación buscada por los observadores
  english_pob_reading: The verse presents hostile surveillance aimed at finding grounds for accusation, without specifying a formal legal proceeding.
  chosen_spanish_reading: La frase presenta una vigilancia hostil orientada a encontrar motivo para acusarlo, sin introducir un proceso judicial formal.
  alternative_spanish_readings:
  - para juzgarlo
  - para procesarlo
  - para presentar una querella contra él
  rationale: «Acusarlo» conserva la tensión del texto y evita sobredeterminar el escenario como un juicio formal, algo que el griego no exige.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it; avoid importing doctrinal or narrative detail not stated by the text.'
translation_notes:
  revision_awareness: Se siguió el ajuste auditado del inglés revisado que prefiere la referencia natural al día de reposo en singular en este contexto, sin perder de vista la forma plural del griego y su posible valor idiomático.
  spanish_consistency_notes:
  - Se prefirió «sanar» sobre «curar» para θεραπεύω por claridad en una acción dirigida a una persona.
  - Se evitó «SEÑOR» o terminología tradicional no pertinente; el pasaje no contiene el nombre divino.
  - «Acusar» se mantuvo como traducción nuclear de κατηγορέω, sin intensificarlo a «procesar» o «juzgar».
  - La nota de pie de página conserva la tensión entre la forma plural griega y la referencia natural al sábado en español.
