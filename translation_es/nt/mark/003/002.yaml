review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: vigilancia hostil continua, interrogativa indirecta sobre si Jesús sanaría, y propósito de acusarlo. Sin embargo, dos elecciones no preservan óptimamente ni la naturalidad del español ni con precisión la fuerza aspectual/final: «en el sábado» suena poco idiomático en español bíblico general, y «para poder acusarlo» añade un matiz de capacidad/oportunidad que ἵνα no exige. La nota sobre el plural griego es adecuada y debe conservarse con un anclaje más natural.'
  spanish_quality_summary: El texto es mayormente claro, pero «en el sábado» resulta poco natural en español neutro; «en sábado» o «en el día de reposo» sería mejor, y dada la nota existente, «en sábado[a]» preserva bien el vínculo con el plural idiomático. «Lo estaban vigilando de cerca» es bueno y comunica sospecha. «Lo sanaría» funciona. «Para acusarlo» es más limpio y fiel que «para poder acusarlo».
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La referencia a σάββασιν no requiere introducir «día de reposo» en el texto principal; «sábado» es aceptable. La decisión de conservar «acusarlo» concuerda con la nota teológica de no sobredesarrollar un proceso jurídico formal.
  issues:
  - severity: medium
    issue: «en el sábado» es poco idiomático en español
    rationale: Aunque intenta reflejar el artículo griego, en español general y eclesial suena forzado. «En sábado» es más natural y sigue siendo fiel; la nota ya preserva la información del plural griego.
  - severity: medium
    issue: «para poder acusarlo» añade un matiz no expresado por ἵνα
    rationale: El griego expresa propósito («para acusarlo»), no capacidad o posibilidad. «Poder» puede sugerir que buscaban la oportunidad o habilidad para hacerlo, un desarrollo innecesario.
  revised_spanish_text: Y lo estaban vigilando de cerca para ver si lo sanaría en sábado[a], para acusarlo.
