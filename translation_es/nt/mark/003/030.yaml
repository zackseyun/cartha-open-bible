lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: El contexto da la razón de la afirmación previa; «porque» expresa con claridad la relación causal sin introducir ambigüedad temporal o explicativa excesiva.
- source_word: ἔλεγον
  english_pob_choice: they were saying
  chosen_spanish: estaban diciendo
  alternatives_spanish:
  - decían
  - iban diciendo
  lexicon: BDAG
  rationale: El imperfecto griego señala acción en curso o repetida. «Estaban diciendo» preserva mejor ese matiz aspectual que un pasado simple.
- source_word: Πνεῦμα ἀκάθαρτον
  english_pob_choice: an unclean spirit
  chosen_spanish: un espíritu inmundo
  alternatives_spanish:
  - un espíritu impuro
  lexicon: BDAG
  rationale: «Espíritu inmundo» reproduce la expresión estable de los Evangelios y mantiene el vínculo léxico con ἀκάθαρτος sin suavizar su fuerza.
- source_word: ἔχει
  english_pob_choice: he has
  chosen_spanish: tiene
  alternatives_spanish:
  - está poseído por
  - está bajo el poder de
  lexicon: BDAG
  rationale: El verbo griego dice literalmente «tiene». En la línea principal se conserva esa formulación directa, sin expandirla interpretativamente.
theological_decisions:
- issue: Forma de la acusación contra Jesús
  english_pob_reading: Retain the direct accusation 'He has an unclean spirit' without interpretive expansion.
  chosen_spanish_reading: 'Conservar la acusación directa: «Tiene un espíritu inmundo».'
  alternative_spanish_readings:
  - Está poseído por un espíritu inmundo
  - Está bajo el poder de un espíritu inmundo
  rationale: La redacción mantiene el filo de la acusación tal como aparece en el griego, sin convertirla en una explicación más explícita de posesión. La nota conserva la alternativa idiomática para lectores que la necesiten.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'El contexto auditado en inglés no requirió revisiones textuales; la versión española conserva la misma decisión central de la POB: mantener la acusación directa en la línea principal y reservar la expansión idiomática para nota.'
  spanish_consistency_notes:
  - Se usa «espíritu inmundo» como término estándar y consistente con el vocabulario sinóptico.
  - Se conserva «tiene» en la línea principal para no sustituir el verbo del griego por una explicación interpretativa.
  - El imperfecto se refleja con «estaban diciendo» para mantener el aspecto discursivo continuo.
