translation:
  language: es
  text: 'porque decían: «Tiene[a] un espíritu inmundo.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «Está poseído por un espíritu inmundo».'
