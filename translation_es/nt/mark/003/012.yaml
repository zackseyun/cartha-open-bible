translation:
  language: es
  text: Y les advertía severamente muchas veces para que no lo dieran a conocer[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como 'revelarlo', 'hacerlo público' o, en un registro más formal, 'manifestarlo'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλὰ
  english_pob_choice: many times
  chosen_spanish: con insistencia
  alternatives_spanish:
  - muchas veces
  - repetidamente
  - con frecuencia
  lexicon: BDAG
  rationale: El adverbial neutro plural intensifica la acción de ἐπετίμα; en español, 'con insistencia' comunica bien la repetición y la fuerza del acto sin sonar forzado.
- source_word: ἐπετίμα
  english_pob_choice: sternly warned
  chosen_spanish: les advertía con insistencia
  alternatives_spanish:
  - los reprendía severamente
  - les ordenaba con severidad
  - los amonestaba con firmeza
  lexicon: BDAG
  rationale: La forma griega expresa una reprensión o mandato enérgico. 'Advertía con insistencia' conserva el tono serio y prohibitivo sin cargar el verso con una recriminación más fuerte de lo que el contexto exige.
- source_word: αὐτοῖς
  english_pob_choice: them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - los
  lexicon: BDAG
  rationale: El dativo plural se refiere a los espíritus impuros del contexto inmediato; 'les' refleja de modo natural el objeto indirecto en español.
- source_word: ἵνα μὴ
  english_pob_choice: not to
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - para no
  lexicon: BDAG
  rationale: La construcción expresa el contenido o finalidad de la advertencia. 'Para que no' preserva la estructura final-prohibitiva con naturalidad en español.
- source_word: αὐτὸν φανερὸν ποιήσωσιν
  english_pob_choice: make him known
  chosen_spanish: lo dieran a conocer
  alternatives_spanish:
  - lo revelaran
  - lo manifestaran
  - lo hicieran público
  lexicon: BDAG
  rationale: La expresión idiomática φανερὸν ποιέω significa hacer conocido o manifiesto. 'Dar a conocer' es el equivalente español más natural y fiel; 'lo' mantiene la referencia directa a Jesús.
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: The verse is rendered as a prohibition against publicly disclosing Jesus' identity, without specifying more than the text states.
  chosen_spanish_reading: El versículo se traduce como una prohibición de darlo a conocer públicamente, sin añadir una confesión cristológica más específica de la que el texto dice.
  alternative_spanish_readings:
  - No permitir que revelaran que era el Hijo de Dios
  - Un silencio mesiánico explícito
  rationale: El contexto inmediato puede sugerir más, pero este versículo solo habla de hacerlo conocido. La traducción conserva esa tensión y evita precisar más de lo que el griego afirma.
  doctrine_reference: Preservar la tensión teológica sin resolverla por anticipado.
translation_notes:
  revision_awareness: El pasaje griego es breve y estable; la auditoría inglesa no muestra revisiones sustantivas. Se mantuvo la decisión óptima de expresar ἐπετίμα con un verbo de advertencia/amonestación en español y ἀὐτὸν φανερὸν ποιήσωσιν con una locución idiomática de divulgación.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' y otras sustituciones no pertinentes porque el texto no contiene κύριος ni el Tetragrámaton.
  - Se prefirió 'dar a conocer' sobre 'manifestar' para mantener naturalidad en español y conservar la ambigüedad controlada del griego.
  - '''les'' respeta el dativo plural del destinatario de la advertencia sin introducir un sujeto explícito innecesario.'
