translation:
  language: es
  text: Y sé de tal hombre[a]—si en el cuerpo o aparte del cuerpo, no lo sé; Dios sabe—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fuera del cuerpo» para «aparte del cuerpo». Pablo no dice si la experiencia fue corporal o no.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: conozco
  alternatives_spanish:
  - sé
  - estoy consciente de
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento real y asentado; en español, «conozco» mantiene la fuerza cognitiva y suena natural en primera persona. Se repite la idea de conocimiento al final con «Dios lo sabe» para conservar el contraste retórico.
- source_word: τὸν τοιοῦτον ἄνθρωπον
  english_pob_choice: such a man
  chosen_spanish: a un hombre así
  alternatives_spanish:
  - a tal hombre
  - a una persona así
  lexicon: BDAG
  rationale: La construcción griega apunta a un individuo caracterizado por el contexto previo. «A un hombre así» conserva el matiz indirecto y la forma masculina singular, sin volver explícita una identificación que el texto no hace.
- source_word: εἴτε ... εἴτε
  english_pob_choice: whether ... or
  chosen_spanish: si ... o
  alternatives_spanish:
  - sea ... o
  - ya sea ... o
  lexicon: BDAG
  rationale: En español, la correlación interrogativa/alternativa natural aquí es «si ... o», que refleja la indecisión expresada en el griego sin añadir interpretación.
- source_word: ἐν σώματι
  english_pob_choice: in the body
  chosen_spanish: en el cuerpo
  alternatives_spanish:
  - corporalmente
  - en un cuerpo
  lexicon: BDAG
  rationale: «En el cuerpo» reproduce de manera directa el contraste con la frase siguiente y mantiene la referencia física concreta que el griego presenta.
- source_word: χωρὶς τοῦ σώματος
  english_pob_choice: apart from the body
  chosen_spanish: fuera del cuerpo
  alternatives_spanish:
  - aparte del cuerpo
  - separado del cuerpo
  lexicon: BDAG
  rationale: χωρὶς indica separación; «fuera del cuerpo» es una opción española clara y natural que preserva la tensión del texto sin resolver si se trata de una experiencia corporal o extracorporal.
- source_word: οὐκ οἶδα, ὁ θεὸς οἶδεν
  english_pob_choice: I do not know; God knows
  chosen_spanish: no lo sé; Dios lo sabe
  alternatives_spanish:
  - no sé; Dios sabe
  - no lo sé, Dios lo sabe
  lexicon: BDAG
  rationale: La repetición de οἶδα/οἶδεν se conserva con el verbo «saber» en ambas cláusulas. El objeto implícito se explicita en español como «lo» para que el contraste sea fluido y natural.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Referencia inequívoca a Dios; se mantiene la forma estándar española.
theological_decisions:
- issue: Preservar la incertidumbre sobre si la experiencia fue corporal o extracorporal
  english_pob_reading: Paul does not say whether the experience was bodily or not.
  chosen_spanish_reading: No se especifica si fue en el cuerpo o fuera del cuerpo.
  alternative_spanish_readings:
  - No se dice si fue corporal o extracorporal.
  - El texto no aclara si ocurrió dentro del cuerpo o fuera de él.
  rationale: La traducción conserva la ambigüedad del griego y no la resuelve interpretativamente. Esto sigue la lectura del POB en inglés, que mantiene la tensión y solo aclara el valor lexical posible en nota.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
- issue: Mantener la referencia indirecta y retórica del hombre mencionado
  english_pob_reading: Retain the third-person expression 'such a man' without making explicit that Paul refers to himself.
  chosen_spanish_reading: Conservar «un hombre así» sin identificarlo explícitamente como Pablo.
  alternative_spanish_readings:
  - un hombre de ese tipo
  - esa persona
  rationale: El griego usa una referencia en tercera persona que crea distancia retórica. La traducción española conserva esa distancia y evita una identificación explícita que el texto no formula.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it); §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se revisó el texto griego SBLGNT junto con el audit trail en inglés. No hubo revisiones previas aplicadas en el registro fuente; la versión española conserva la misma tensión interpretativa y el paralelismo verbal de οἶδα/οἶδεν.
  spanish_consistency_notes:
  - Se mantuvo el pronombre implícito de primera persona en español para reflejar el cambio retórico del hablante sin sobrecargar el estilo.
  - Se preservó la repetición de saber/conocer en ambas cláusulas para imitar el énfasis del griego.
  - No se introdujo identificación explícita de Pablo ni glosa doctrinal fuera de la nota.
  - Se usó puntuación con rayas y punto y coma para reflejar las pausas del original y la estructura de contraste.
