translation:
  language: es
  text: En cuanto a esto[a][b][c][d], tres veces rogué al Señor que se apartara de mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Acerca de esto» o «Por esto».
    reason: lexical_alternative
  - marker: b
    text: O «le supliqué» o «le imploré».
    reason: lexical_alternative
  - marker: c
    text: El griego dice solo «el Señor»; Pablo no nombra explícitamente a Jesús aquí.
    reason: alternative_reading
  - marker: d
    text: O «que se fuera de mí» o «que se alejara de mí». El griego deja implícito el sujeto, refiriéndose a la aflicción mencionada en el versículo anterior.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὲρ τούτου
  english_pob_choice: Concerning this
  chosen_spanish: Por este motivo
  alternatives_spanish:
  - Acerca de esto
  - Por esto
  - En cuanto a esto
  lexicon: BDAG
  rationale: ὑπέρ con genitivo introduce el asunto al que se refiere Pablo; en español, «Por este motivo» expresa de forma natural la referencia al contexto previo sin forzar un valor de representación o sustitución.
- source_word: τρὶς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres ocasiones
  - trés
  lexicon: BDAG
  rationale: Indica tres ocasiones. «Tres veces» es la forma clara y moderna en español, fiel al adverbio griego.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: κύριος se traduce normalmente como «Señor» en este contexto paulino. Aunque el griego no nombra explícitamente a Jesús, el español conserva la misma amplitud semántica sin añadir especificación inexistente en el texto.
- source_word: παρεκάλεσα
  english_pob_choice: I pleaded with
  chosen_spanish: rogué
  alternatives_spanish:
  - suplicé
  - imploré
  - pedí con insistencia
  lexicon: BDAG
  rationale: En un contexto de oración dirigida al Señor, παρακαλέω expresa una petición ferviente; «rogué» comunica bien esa intensidad en español sin exceder el matiz del verbo.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  lexicon: BDAG
  rationale: Introduce el contenido de la súplica. En español, «que» es la conexión más natural y directa aquí.
- source_word: ἀποστῇ
  english_pob_choice: it might depart
  chosen_spanish: se apartara
  alternatives_spanish:
  - se fuera
  - se alejase
  - desapareciera
  lexicon: BDAG
  rationale: El aoristo subjuntivo de ἀφίστημι/ἀφίσταμαι expresa separación o alejamiento; «se apartara» conserva el movimiento de retirada. El español permite un sujeto impersonal/reflexivo que deja abierta la referencia implícita del griego.
- source_word: ἀπ’ ἐμοῦ
  english_pob_choice: from me
  chosen_spanish: de mí
  alternatives_spanish:
  - lejos de mí
  - apartándose de mí
  lexicon: BDAG
  rationale: La preposición de separación se rinde de manera directa y natural como «de mí».
theological_decisions:
- issue: Referent of 'the Lord'
  english_pob_reading: Rendered generically as 'the Lord' without expanding to 'the Lord Jesus.'
  chosen_spanish_reading: Se traduce simplemente «el Señor», sin explicitar «Jesús».
  alternative_spanish_readings:
  - el Señor Jesús
  rationale: El griego dice solo κύριον; aunque el referente probable en el contexto sea Jesús, la traducción no debe añadir una precisión no expresada por el texto.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Subject of ἀποστῇ
  english_pob_reading: Used the impersonal English subject 'it' for the thing to depart.
  chosen_spanish_reading: Se mantiene una formulación que deja implícito el sujeto de «se apartara».
  alternative_spanish_readings:
  - que él se apartara
  - que eso se apartara
  - que el aguijón se apartara
  rationale: El griego no explicita el sujeto y remite al contexto previo; en español, el reflexivo conserva esa ambigüedad sin resolver si Pablo piensa en el aguijón, el mensajero o la aflicción.
  doctrine_reference: 'Translation philosophy #3'
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando todas las notas al pie, para evitar marcadores no anclados en el texto español. La redacción conserva el sentido del audit trail inglés y del griego sin añadir especificaciones no contenidas en el original.
  spanish_consistency_notes:
  - Se mantiene «el Señor» conforme al griego κύριον, sin expandir a «Jesús».
  - «Tres veces» conserva la frecuencia puntual del adverbio τρὶς.
  - La forma reflexiva «se apartara» preserva la ambigüedad del sujeto implícito en ἀποστῇ.
  - El registro es moderno y reverente, apto para lectura eclesial.
