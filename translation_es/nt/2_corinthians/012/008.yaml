  to: En cuanto a esto[a][b][c][d], tres veces rogué al Señor que se apartara de mí.
  rationale: Se ajusta ὑπὲρ τούτου a una expresión temática más fiel («En cuanto a esto») y se añaden notas para conservar las alternativas documentadas y la ambigüedad del texto griego sin sobreinterpretarlo.
