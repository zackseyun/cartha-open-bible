review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura griega y conserva las metáforas principales: Pablo instó a Tito, envió al hermano con él, niega que Tito sacara ventaja, y apela a una conducta compartida ''en el mismo espíritu'' y ''en las mismas huellas''. Sin embargo, hay dos desajustes importantes: «Exhorté a Tito» suena demasiado sermoneador para παρακαλέω en este contexto práctico de solicitud, y la nota al pie [a] está anclada en «los explotó» cuando en realidad documenta la alternativa de «en el mismo espíritu / por el mismo Espíritu».'
  spanish_quality_summary: 'El español es claro y legible, pero requiere ajustes menores para sonar más natural y fiel al matiz. «Le insistí a Tito» o «Le rogué a Tito» reflejan mejor una petición práctica que «Exhorté a Tito». «Los explotó» es posible, pero suena más duro y sociopolítico que el griego contextual; «se aprovechó de ustedes» expresa mejor la idea amplia de tomar ventaja. También conviene alinear la última pregunta con la metáfora de caminar: «¿No anduvimos en las mismas huellas?» o una formulación equivalente.'
  glossary_alignment: No hay conflictos con términos base del proyecto como Yahvé, Mesías, esclavo, etc. La decisión «en el mismo espíritu[a]» está bien alineada con la política de preservar la ambigüedad de πνεῦμα, pero la nota debe colocarse en esa frase, no en «los explotó».
  issues:
  - severity: medium
    issue: «Exhorté a Tito» no refleja bien παρακαλέω en este contexto
    rationale: Aquí Pablo describe una petición o insistencia práctica relacionada con enviar a Tito, no una exhortación moral o sermónica. En español eclesial neutral, «Le insistí a Tito» o «Le rogué a Tito» son más fieles y naturales.
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada
    rationale: La nota explica la alternativa de τῷ αὐτῷ πνεύματι («por el mismo Espíritu»), pero en el borrador aparece en «los explotó[a]». Esto desinforma al lector y rompe la trazabilidad del aparato.
  - severity: medium
    issue: «Los explotó» es más fuerte y estrecho que ἐπλεονέκτησεν ὑμᾶς
    rationale: El verbo griego aquí apunta a sacar ventaja de alguien, probablemente con matiz material/financiero, pero no necesariamente a explotación en el sentido fuerte moderno. «Se aprovechó de ustedes» preserva mejor el alcance semántico documentado por el POB inglés.
  - severity: low
    issue: La última pregunta cambia el verbo de caminar por «seguimos»
    rationale: Aunque «seguimos las mismas huellas» es comprensible, el griego repite el campo metafórico de conducta con περιεπατήσαμεν implícito. Mantener «anduvimos» en ambas preguntas preserva mejor la textura del original.
  revised_spanish_text: Le insistí a Tito y envié con él al hermano. Tito no se aprovechó de ustedes, ¿verdad? ¿No anduvimos en el mismo espíritu[a]? ¿No anduvimos en las mismas huellas?
  revised_footnotes:
