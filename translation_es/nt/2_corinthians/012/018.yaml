translation:
  language: es
  text: Le insistí a Tito y envié con él al hermano. Tito no se aprovechó de ustedes, ¿verdad? ¿No anduvimos en el mismo espíritu[a]? ¿No anduvimos en las mismas huellas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por el mismo Espíritu», posiblemente una referencia al Espíritu Santo más que solo a la misma actitud o disposición.'
    reason: alternative_reading
lexical_decisions:
- source_word: παρεκάλεσα
  english_pob_choice: I urged Titus to go
  chosen_spanish: Exhorté a Tito
  alternatives_spanish:
  - Le rogué a Tito
  - Le insistí a Tito
  lexicon: BDAG
  rationale: παρακαλέω expresa aquí una petición/apelación en un contexto práctico de misión. «Exhorté» conserva la fuerza de la petición insistente sin volverla demasiado técnica o sermoneada en español.
- source_word: συναπέστειλα
  english_pob_choice: sent ... with him
  chosen_spanish: envié con él
  alternatives_spanish:
  - envié junto con él
  - lo envié acompañado de él
  lexicon: BDAG
  rationale: El verbo compuesto indica envío conjunto o acompañamiento. En español, «envié con él» comunica naturalmente esa relación sin añadir contenido no explicitado.
- source_word: τὸν ἀδελφόν
  english_pob_choice: the brother
  chosen_spanish: al hermano
  alternatives_spanish:
  - a nuestro hermano
  - al creyente
  lexicon: BDAG
  rationale: El griego tiene artículo definido y no posee un posesivo. «Al hermano» preserva la referencia indefinida pero reconocible a un cristiano conocido, sin sobreespecificar.
- source_word: ἐπλεονέκτησεν ὑμᾶς
  english_pob_choice: take advantage of you
  chosen_spanish: los explotó
  alternatives_spanish:
  - los defraudó
  - sacó ventaja de ustedes
  lexicon: BDAG
  rationale: πλεονεκτέω puede expresar obtener ganancia injusta a costa de otro. «Explotó» es una opción fuerte y natural en español que mantiene la idea de ventaja indebida; se evita suavizarla con un giro más débil.
- source_word: μήτι
  english_pob_choice: did he?
  chosen_spanish: ¿verdad?
  alternatives_spanish:
  - ¿acaso?
  - ¿no es así?
  lexicon: BDAG
  rationale: μήτι introduce una pregunta que espera respuesta negativa. En español, la coletilla «¿verdad?» preserva el matiz retórico y la expectativa de negación sin hacerlo rebuscado.
- source_word: τῷ αὐτῷ πνεύματι
  english_pob_choice: in the same spirit
  chosen_spanish: en el mismo espíritu
  alternatives_spanish:
  - con el mismo espíritu
  - por el mismo Espíritu
  lexicon: BDAG
  rationale: La construcción admite valor de esfera o manera. «En el mismo espíritu» mantiene la ambigüedad entre disposición compartida y posible resonancia con el Espíritu Santo, en línea con el tratamiento auditable del POB.
- source_word: περιεπατήσαμεν
  english_pob_choice: walk
  chosen_spanish: anduvimos
  alternatives_spanish:
  - caminamos
  - vivimos
  lexicon: BDAG
  rationale: El verbo conserva la metáfora de conducta. «Anduvimos» es un equivalente natural en español bíblico moderno que no borra la imagen del caminar.
- source_word: τοῖς αὐτοῖς ἴχνεσιν
  english_pob_choice: in the same footsteps
  chosen_spanish: por las mismas huellas
  alternatives_spanish:
  - en los mismos pasos
  - sobre las mismas pisadas
  lexicon: BDAG
  rationale: ἴχνος alude a huella, rastro o pisada; la metáfora apunta al mismo patrón de conducta. «Por las mismas huellas» conserva mejor la imagen concreta que una formulación abstracta.
theological_decisions:
- issue: Ambigüedad de τῷ αὐτῷ πνεύματι
  english_pob_reading: shared spirit/disposition, with possible allusion to the Holy Spirit
  chosen_spanish_reading: en el mismo espíritu, con posible eco del Espíritu Santo
  alternative_spanish_readings:
  - por el mismo Espíritu
  - con la misma actitud
  rationale: La frase puede referirse a una disposición compartida o a una referencia implícita al Espíritu Santo. Se preserva la tensión con una traducción que no cierra el sentido, manteniendo abierta la posibilidad teológica documentada por el POB inglés.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica en vez de resolverla prematuramente)
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete fuente griego y la auditoría inglesa del POB; no hay revisiones aplicadas en el registro fuente más allá de la elección estilística española para naturalidad y transparencia. Se conserva la ambigüedad de πνεύμα sin resolverla de forma excesiva.
  spanish_consistency_notes:
  - Se usa «Tito» para Τίτον conforme al nombre propio ya fijado en español.
  - Se mantiene el paralelismo retórico de las tres preguntas del texto griego.
  - «Espíritu» aparece en minúscula en el cuerpo principal para no cerrar la lectura a una mera actitud, pero la nota permite la lectura del Espíritu Santo.
  - La metáfora de «huellas» se conserva como imagen de conducta y seguimiento.
  - Se evita sustituir el lenguaje de ventaja indebida por una paráfrasis moralizante más débil.
