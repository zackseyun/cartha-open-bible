revisions:
- from: Exhorté a Tito y envié con él al hermano. Tito no los explotó[a], ¿verdad? ¿No anduvimos en el mismo espíritu? ¿No seguimos las mismas huellas?
  to: Le insistí a Tito y envié con él al hermano. Tito no se aprovechó de ustedes, ¿verdad? ¿No anduvimos en el mismo espíritu[a]? ¿No anduvimos en las mismas huellas?
  rationale: Se corrigió el verbo inicial para reflejar mejor una petición insistente en contexto práctico, se suavizó «explotó» a una formulación más fiel al sentido de sacar ventaja, se reubicó correctamente la nota textual sobre πνεύματι y se mantuvo la metáfora de «andar» en ambas preguntas para seguir más de cerca el griego y el audit trail inglés.
