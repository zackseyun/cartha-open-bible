    text: O 'un ángel de Satanás'. El griego ἄγγελος puede significar 'mensajero' o 'ángel'.
    reason: alternative_reading
  - marker: c
    text: O 'me golpee' o 'me hiera a golpes'. El verbo κολαφίζῃ literalmente se refiere a golpear o abofetear repetidamente.
    reason: lexical_alternative
  - marker: d
    text: La frase repetida 'para que no me enaltezca' aparece dos veces en el texto griego y se conserva aquí.
    reason: cross_reference
  revision_rationale: La revisión mantiene las decisiones correctas del borrador —estructura, pasiva, 'en la carne' y 'mensajero de Satanás'— pero alinea el texto principal con el audit trail del POB al usar 'me atormente' para κολαφίζῃ y trasladar el matiz más físico a una nota. También restaura las notas léxicas y de repetición que el inglés documentó y mejora levemente la naturalidad española con 'me fue dado'.
