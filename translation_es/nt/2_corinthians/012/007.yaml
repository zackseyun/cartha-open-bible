revisions:
- from: Y debido a la extraordinaria grandeza de las revelaciones—para que no me enaltezca—a mí me fue dado un aguijón en la carne, un mensajero de Satanás, para que me abofetee, para que no me enaltezca.
  to: Y debido a la extraordinaria grandeza de las revelaciones—para que no me enaltezca—me fue dado un aguijón[a] en la carne, un mensajero[b] de Satanás, para que me atormente[c][d], para que no me enaltezca.
  rationale: La revisión mantiene las decisiones correctas del borrador —estructura, pasiva, 'en la carne' y 'mensajero de Satanás'— pero alinea el texto principal con el audit trail del POB al usar 'me atormente' para κολαφίζῃ y trasladar el matiz más físico a una nota. También restaura las notas léxicas y de repetición que el inglés documentó y mejora levemente la naturalidad española con 'me fue dado'.
  reviewer_model: gpt-5.4
