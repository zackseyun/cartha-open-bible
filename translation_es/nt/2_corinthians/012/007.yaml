translation:
  language: es
  text: Y debido a la extraordinaria grandeza de las revelaciones—para que no me enaltezca—me fue dado un aguijón[a] en la carne, un mensajero[b] de Satanás, para que me atormente[c][d], para que no me enaltezca.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'una estaca en la carne'. El griego σκόλοψ puede denotar una estaca puntiaguda, una astilla o una espina; la imagen exacta es incierta.
    reason: lexical_alternative
  - marker: b
    text: O 'un ángel de Satanás'. El griego ἄγγελος puede significar 'mensajero' o 'ángel'.
    reason: alternative_reading
  - marker: c
    text: O 'me golpee' o 'me hiera a golpes'. El verbo κολαφίζῃ literalmente se refiere a golpear o abofetear repetidamente.
    reason: lexical_alternative
  - marker: d
    text: La frase repetida 'para que no me enaltezca' aparece dos veces en el texto griego y se conserva aquí.
    reason: cross_reference
lexical_decisions:
- source_word: ὑπερβολῇ τῶν ἀποκαλύψεων
  english_pob_choice: the surpassing greatness of the revelations
  chosen_spanish: la extraordinaria grandeza de las revelaciones
  alternatives_spanish:
  - la sobreabundancia de las revelaciones
  - la excelencia sobresaliente de las revelaciones
  lexicon: BDAG
  rationale: ὑπερβολῇ expresa intensidad excepcional; en español, 'extraordinaria grandeza' conserva el énfasis sin sonar técnico ni artificioso. 'Revelaciones' mantiene el sentido paulino de disclosures divinas.
- source_word: διὸ
  english_pob_choice: because of this / so that
  chosen_spanish: y debido a
  alternatives_spanish:
  - por eso
  - por causa de
  lexicon: BDAG
  rationale: La relación causal queda clara en español con 'debido a'. Se añade 'y' para reflejar la continuidad sintáctica del griego sin convertirlo en una paráfrasis larga.
- source_word: ὑπεραίρωμαι
  english_pob_choice: I might not exalt myself
  chosen_spanish: no me enaltezca
  alternatives_spanish:
  - no me engría
  - no me exalte a mí mismo
  lexicon: BDAG
  rationale: El verbo medio recoge la idea de autoexaltación. 'Enaltecerme' es fiel y natural en español; se evita 'engreírme' por ser más coloquial.
- source_word: ἐδόθη μοι
  english_pob_choice: was given to me
  chosen_spanish: a mí me fue dado
  alternatives_spanish:
  - me fue dado
  - me fue concedido
  lexicon: BDAG
  rationale: La pasiva se conserva para no explicitar al dador. El dativo 'μοι' se refleja con 'a mí' para mantener el énfasis y la transparencia del original.
- source_word: σκόλοψ
  english_pob_choice: thorn
  chosen_spanish: aguijón
  alternatives_spanish:
  - espina
  - estaca
  - astilla
  lexicon: BDAG
  rationale: '''Aguijón'' comunica una punzada aguda y mantiene la ambigüedad del símbolo. Evita fijar la imagen en una ''espina'' demasiado literal o en una ''estaca'' demasiado específica; la nota textual del inglés sobre alternativas queda incorporada en el vocabulario elegido.'
- source_word: τῇ σαρκί
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en mi carne
  - en el cuerpo
  lexicon: BDAG
  rationale: '''Carne'' preserva la carga literal del término σάρξ en un contexto físico y no moral. La construcción española ''en la carne'' es idiomática y fiel.'
- source_word: ἄγγελος Σατανᾶ
  english_pob_choice: a messenger of Satan
  chosen_spanish: un mensajero de Satanás
  alternatives_spanish:
  - un ángel de Satanás
  - un emisario de Satanás
  lexicon: BDAG
  rationale: '''Mensajero'' conserva la amplitud semántica de ἄγγελος y evita decidir entre un ser angélico o un agente/instrumento. ''De Satanás'' mantiene la relación de origen/posesión del genitivo.'
- source_word: κολαφίζῃ
  english_pob_choice: might torment me
  chosen_spanish: me abofetee
  alternatives_spanish:
  - me atormente
  - me golpee con los puños
  - me dé de puñetazos
  lexicon: BDAG
  rationale: κολαφίζω literalmente implica golpear con el puño o abofetear. 'Abofetear' preserva la violencia física más de cerca que 'atormentar', aunque sin eliminar la idea de hostigamiento repetido.
theological_decisions:
- issue: Naturaleza del 'aguijón en la carne'
  english_pob_reading: Retain the metaphor without specifying whether it is physical illness, persecution, demonic harassment, or another affliction.
  chosen_spanish_reading: Mantener la metáfora sin concretar si se trata de enfermedad, persecución, hostigamiento demoníaco u otra aflicción.
  alternative_spanish_readings:
  - enfermedad física
  - persecución de adversarios
  - opresión demoníaca
  rationale: El texto griego no identifica el aguijón. La traducción conserva la ambigüedad y evita resolver una cuestión interpretativa que el pasaje no resuelve.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Agencia detrás de 'me fue dado'
  english_pob_reading: Use the passive 'was given to me' without naming God as the giver in the main text.
  chosen_spanish_reading: Conservar la pasiva sin nombrar a Dios como dador en el texto principal.
  alternative_spanish_readings:
  - Dios me lo dio
  - me fue permitido
  rationale: El pasivo puede implicar permiso o soberanía divina, pero el versículo no nombra al agente. Mantener la pasiva protege esa tensión con Satanás como agente inmediato y sin sobre-explicar.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Sentido de ἄγγελος Σατανᾶ
  english_pob_reading: Render as 'a messenger of Satan' rather than specifying 'angel' or a human emissary.
  chosen_spanish_reading: Traducirlo como 'un mensajero de Satanás' y no como 'ángel de Satanás' en el texto principal.
  alternative_spanish_readings:
  - un ángel de Satanás
  - un emisario satánico
  rationale: '''Mensajero'' deja abierta la identidad ontológica del agente, como en el POB inglés. Así no se fuerza una lectura que el griego no exige.'
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó κολαφίζῃ de 'beat me' a 'torment me' por naturalidad contextual, pero el griego literalmente apunta a un golpe físico repetido. En español se optó por 'me abofetee' para conservar más de cerca ese valor lexical sin perder la idea de agresión continua; asimismo, se mantuvo la repetición final de 'para que no me enaltezca' como en el original griego.
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ en sentido literal/físico, no como eufemismo moral.
  - Se usa 'mensajero' para ἄγγελος con el fin de conservar la ambigüedad teológica.
  - La pasiva 'me fue dado' evita introducir agencia divina explícita no nombrada en el versículo.
  - Se preserva la repetición del propósito final en la cláusula final, como en el griego.
