base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/005.yaml
  text: On behalf of such a one I will boast[a], but on behalf of myself I will not boast[b], except in my weaknesses.
  footnotes:
  - marker: a
    text: Or 'about such a one.' The Greek preposition can be rendered more generally, but the wording here preserves Paul's rhetorical distancing.
    reason: lexical_alternative
  - marker: b
    text: Or 'in weaknesses' or 'in infirmities.' Paul often uses 'weakness' for human frailty, suffering, or conditions that display God's power.
    reason: lexical_alternative
