translation:
  language: es
  text: Miren[a], esta es la tercera vez que estoy listo para ir a ustedes, y no seré una carga. Porque no busco lo que es de ustedes, sino a ustedes. Pues los hijos no están obligados a atesorar para sus progenitores, sino los progenitores para sus hijos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «esta tercera vez estoy listo para ir a ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἰδοὺ
  english_pob_choice: Look
  chosen_spanish: Mira
  alternatives_spanish:
  - Miren
  - Miren, pues
  - Vean
  lexicon: BDAG
  rationale: Como interjección de atención, en español natural funciona mejor 'Mira' que un calco más solemne. Conserva el llamado directo sin añadir énfasis interpretativo.
- source_word: τρίτον τοῦτο
  english_pob_choice: this is the third time
  chosen_spanish: esta es la tercera vez
  alternatives_spanish:
  - por tercera vez
  - esta tercera vez
  lexicon: BDAG
  rationale: El griego señala una tercera ocasión/instancia. 'Esta es la tercera vez' comunica con claridad el valor discursivo y evita una literalidad torpe.
- source_word: ἑτοίμως ἔχω ἐλθεῖν
  english_pob_choice: I am ready to come
  chosen_spanish: estoy listo para ir
  alternatives_spanish:
  - estoy preparado para ir
  - estoy listo para venir
  lexicon: BDAG
  rationale: En español, con 'a ustedes' resulta más natural 'ir' que 'venir'; ambas expresan la disposición a visitarles. 'Listo' mantiene la idea de disponibilidad presente.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - para ustedes
  lexicon: BDAG
  rationale: La preposición en contexto de visita se expresa naturalmente con dirección personal. 'A ustedes' suena idiomático y claro en español.
- source_word: καταναρκήσω
  english_pob_choice: be a burden
  chosen_spanish: les seré una carga
  alternatives_spanish:
  - los agobiaré
  - les pesaré financieramente
  - les impondré una carga
  lexicon: BDAG
  rationale: La imagen de carga transmite bien la idea de imponer una presión material o económica. Se conserva la amplitud del verbo sin restringirlo solo a dinero.
- source_word: ζητῶ τὰ ὑμῶν ἀλλὰ ὑμᾶς
  english_pob_choice: I do not seek what is yours, but you
  chosen_spanish: no busco lo que es de ustedes, sino a ustedes
  alternatives_spanish:
  - no busco sus posesiones, sino a ustedes mismos
  - no busco sus bienes, sino a ustedes
  lexicon: BDAG
  rationale: La oposición entre bienes y personas se preserva. 'Lo que es de ustedes' deja oír el sentido material implícito sin estrecharlo indebidamente.
- source_word: ὀφείλει
  english_pob_choice: are not obligated
  chosen_spanish: no están obligados
  alternatives_spanish:
  - no deben
  - no tienen que
  lexicon: BDAG
  rationale: El verbo expresa obligación normativa, no mera conveniencia. 'No están obligados' reproduce esa fuerza con claridad.
- source_word: θησαυρίζειν
  english_pob_choice: to store up
  chosen_spanish: atesorar
  alternatives_spanish:
  - guardar
  - acumular
  - almacenar
  lexicon: BDAG
  rationale: El verbo conserva la metáfora de poner en reserva/tesoro. 'Atesorar' es la opción española que mejor reproduce la imagen con densidad semántica.
- source_word: γονεῦσιν / γονεῖς
  english_pob_choice: parents
  chosen_spanish: padres
  alternatives_spanish:
  - progenitores
  - padres y madres
  lexicon: BDAG
  rationale: El sustantivo griego es genérico para padres en sentido parental. 'Padres' es una forma natural en español; aquí no se requiere explicitar el matiz inclusivo de género.
- source_word: τέκνα / τέκνοις
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  lexicon: BDAG
  rationale: En el proverbio, 'hijos' funciona de manera natural y puede abarcar descendencia en general. Mantiene el paralelismo familiar del dicho.
theological_decisions:
- issue: El alcance de 'no seré una carga'
  english_pob_reading: The verb can carry the sense of imposing oneself financially on someone.
  chosen_spanish_reading: No se restringe a 'dinero'; se deja como carga general, con posible trasfondo material.
  alternative_spanish_readings:
  - no les costaré nada
  - no les seré financieramente gravoso
  rationale: La frase griega puede implicar carga material o económica, pero no se limita necesariamente a eso. La redacción española conserva esa amplitud y permite la lectura contextual sin cerrarla.
  doctrine_reference: Lexical force of καταναρκάω; translation philosophy §2
- issue: La relación entre 'lo que es de ustedes' y 'a ustedes'
  english_pob_reading: Preserves the contrast between possessions and persons.
  chosen_spanish_reading: Se mantiene la contraposición entre bienes y personas.
  alternative_spanish_readings:
  - sus cosas, sino a ustedes
  - sus posesiones, sino a ustedes mismos
  rationale: 'El contraste retórico de Pablo es central: no busca recursos, sino a las personas mismas. El español mantiene esa tensión sin explicitar más de lo que el texto da.'
  doctrine_reference: Rhetorical and lexical contrast in 2 Cor 12:14
- issue: El valor de 'esta es la tercera vez'
  english_pob_reading: Rendered as a third readiness/intended visit rather than asserting with interpretive force that two prior visits certainly occurred.
  chosen_spanish_reading: Se traduce de forma natural sin fijar más historia de viajes de la que el versículo exige.
  alternative_spanish_readings:
  - por tercera vez estoy listo para ir a ustedes
  - mira, por tercera vez estoy listo para ir a ustedes
  rationale: El griego pone el foco en la disposición presente para una tercera ocasión. La versión española evita sobreinterpretar la cronología y conserva el valor discursivo del enunciado.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y el acuerdo alto del dossier inglés, pero adopta decisiones españolas idiomáticas: ''Mira'' para Ἰδοὺ, ''esta es la tercera vez'' para τρίτον τοῦτο, y ''les seré una carga'' para καταναρκήσω. Se preserva la tensión entre bienes y personas en ζητῶ τὰ ὑμῶν ἀλλὰ ὑμᾶς y la imagen proverbial de obligaciones parentales en la cláusula final. No se añadió material interpretativo ajeno al versículo.'
  spanish_consistency_notes:
  - Se mantiene 'ustedes' como pronombre de segunda persona plural para todo el versículo.
  - Se usa 'padres' e 'hijos' como términos familiares genéricos, coherentes con el griego.
  - '''Atesorar'' se eligió para conservar la metáfora de θησαυρίζειν y evitar una paráfrasis plana.'
  - No se emplea 'SEÑOR' ni terminología eclesiástica no presente en el texto.
