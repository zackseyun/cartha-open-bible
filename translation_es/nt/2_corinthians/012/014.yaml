base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/014.yaml
  text: Look[a], this is the third time I am ready to come to you, and I will not be a burden. For I do not seek what is yours, but you. For children are not obligated to store up for their parents[b], but parents for their children.
  footnotes:
  - marker: a
    text: Or, more literally, 'this third time I am ready to come to you.'
    reason: lexical_alternative
  - marker: b
    text: The verb rendered 'be a burden' can carry the sense of imposing oneself financially on someone.
    reason: lexical_alternative
