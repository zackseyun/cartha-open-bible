translation:
  language: es
  text: que fue arrebatado al paraíso y oyó palabras inefables[a], que a un ser humano[b] no le es permitido hablar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Inefables» conserva el valor de ἄρρητα como palabras demasiado extraordinarias para expresarse, sin borrar la posibilidad de que también conlleven la idea de que no deben decirse.
    reason: lexical_alternative
  - marker: b
    text: «A un ser humano» refleja el dativo singular genérico ἀνθρώπῳ; la expresión funciona de manera representativa, no restrictivamente masculina.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡρπάγη
  english_pob_choice: was caught up
  chosen_spanish: fue arrebatado
  alternatives_spanish:
  - fue tomado
  - fue levantado
  lexicon: BDAG
  rationale: ἁρπάζω expresa una acción súbita y fuerte de traslado. En español, «fue arrebatado» conserva esa fuerza pasiva sin añadir detalles que el griego no da.
- source_word: παράδεισον
  english_pob_choice: paradise
  chosen_spanish: paraíso
  alternatives_spanish:
  - jardín
  - Paraíso
  lexicon: BDAG
  rationale: παράδεισος en este contexto alude al ámbito celestial bienaventurado. «Paraíso» es el equivalente natural y tradicional en español, y refleja bien el valor del término sin forzar una mayúscula no exigida por el griego.
- source_word: ἄρρητα ῥήματα
  english_pob_choice: inexpressible words
  chosen_spanish: palabras inefables
  alternatives_spanish:
  - palabras indecibles
  - dichos inefables
  - palabras imposibles de expresar
  lexicon: BDAG
  rationale: ἄρρητα puede significar tanto «que no se pueden decir» como «que no se pueden expresar». «Inefables» comunica la extraordinaria calidad de lo oído y mantiene la tensión sin convertir el adjetivo en mera prohibición.
- source_word: ῥήματα
  english_pob_choice: words
  chosen_spanish: palabras
  alternatives_spanish:
  - dichos
  - expresiones
  - sentencias
  lexicon: BDAG
  rationale: ῥήματα se refiere aquí al contenido hablado u oído en la visión. «Palabras» es la equivalencia más natural y suficientemente precisa en español.
- source_word: οὐκ ἐξὸν
  english_pob_choice: is not permitted
  chosen_spanish: no le es permitido
  alternatives_spanish:
  - no está permitido
  - no es lícito
  - no se le permite
  lexicon: BDAG
  rationale: La construcción impersonal expresa lo que no está permitido. «No le es permitido» reproduce bien el matiz impersonal y formal del griego sin sonar jurídico de más.
- source_word: ἀνθρώπῳ
  english_pob_choice: a person
  chosen_spanish: a un ser humano
  alternatives_spanish:
  - a una persona
  - a un hombre
  - al ser humano
  lexicon: BDAG
  rationale: El dativo singular es genérico. «A un ser humano» conserva la referencia representativa y evita que el español sugiera masculinidad específica donde el griego funciona de manera general.
- source_word: λαλῆσαι
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  - expresar
  lexicon: BDAG
  rationale: λαλέω aquí apunta al acto de comunicar verbalmente. «Hablar» es la opción más amplia y natural en español para la prohibición.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - cómo
  - el hecho de que
  lexicon: BDAG
  rationale: Introduce el contenido de lo que se afirma en el contexto inmediato. «Que» es la conjunción más directa y natural en español.
theological_decisions:
- issue: Alcance de la experiencia celestial
  english_pob_reading: Retain 'paradise' and 'was caught up' without specifying whether the experience was bodily or visionary only.
  chosen_spanish_reading: Conservar «fue arrebatado al paraíso» sin especificar si la experiencia fue corporal o solo visionaria.
  alternative_spanish_readings:
  - fue llevado corporalmente al paraíso
  - tuvo una visión del paraíso
  rationale: El contexto inmediato de los versículos previos mantiene la tensión sobre si fue «en el cuerpo» o «fuera del cuerpo». La traducción no debe resolver esa cuestión.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Doble matiz de ἄρρητα ῥήματα
  english_pob_reading: Render as 'inexpressible words' while keeping the following clause as a prohibition on human speech.
  chosen_spanish_reading: Traducir como «palabras inefables» y mantener la cláusula siguiente como prohibición del hablar humano.
  alternative_spanish_readings:
  - palabras indecibles
  - palabras que no pueden decirse
  rationale: Esto evita confundir la cualidad extraordinaria de lo oído con la prohibición explícita de comunicarlo. Ambas ideas permanecen distintas en el versículo.
  doctrine_reference: Translation philosophy §1 and §6
translation_notes:
  revision_awareness: La revisión inglesa reciente sustituyó «a man» por «a person» para reflejar el sentido genérico de ἀνθρώπῳ; el español adopta una solución igualmente genérica con «a un ser humano», manteniendo la neutralidad contextual sin perder la referencia singular. También se conserva la distinción audit trail entre el adjetivo ἄρρητα y la cláusula de prohibición en οὐκ ἐξὸν.
  spanish_consistency_notes:
  - Se mantiene «paraíso» para παράδεισος, coherente con el valor celestial del término.
  - Se evita «SEÑOR» o equivalentes de enmascaramiento porque no aplica aquí el tetragrámaton.
  - «Inefables» preserva el tono formal y la tensión semántica del original.
  - «Ser humano» ofrece un genérico claro y readable en español sin introducir una lectura doctrinal adicional.
