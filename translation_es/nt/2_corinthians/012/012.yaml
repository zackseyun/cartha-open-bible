translation:
  language: es
  text: Ciertamente[a], las señales de un apóstol se realizaron entre ustedes con toda perseverancia, con señales, prodigios y obras poderosas[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las señales del apóstol», si se entiende que se refiere específicamente a Pablo y no a marcas apostólicas en general.
    reason: alternative_reading
  - marker: b
    text: «Obras poderosas» también puede traducirse como «milagros» o «actos poderosos»; el término griego destaca manifestaciones de poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ μὲν σημεῖα
  english_pob_choice: Indeed, the signs
  chosen_spanish: Ciertamente, las señales
  alternatives_spanish:
  - Las señales, ciertamente
  - En verdad, las señales
  lexicon: BDAG
  rationale: μέν aporta énfasis afirmativo o concesivo sin un δέ explícito; en español, «Ciertamente» reproduce bien ese matiz. «Señales» conserva σημεῖα sin convertirlo en «milagros», porque el contexto las trata como evidencias caracterizadoras del ministerio apostólico.
- source_word: τοῦ ἀποστόλου
  english_pob_choice: of an apostle
  chosen_spanish: de un apóstol
  alternatives_spanish:
  - del apóstol
  - de apóstol
  lexicon: BDAG
  rationale: 'El genitivo es más naturalmente cualitativo o genérico: señales propias de un apóstol. «De un apóstol» preserva esa generalidad y evita fijar innecesariamente la referencia solo a Pablo.'
- source_word: κατειργάσθη
  english_pob_choice: were performed
  chosen_spanish: se realizaron
  alternatives_spanish:
  - fueron efectuadas
  - se llevaron a cabo
  lexicon: BDAG
  rationale: El aoristo pasivo expresa que las señales fueron efectivamente producidas o llevadas a cabo. «Se realizaron» suena natural en español y mantiene el sentido pasivo/resultativo sin añadir agencia que el griego no explicita.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en ustedes
  lexicon: BDAG
  rationale: En el contexto paulino, la expresión apunta a la presencia y actividad entre la comunidad corintia. «Entre ustedes» evita una lectura interna («en ustedes») que no corresponde al sentido comunitario.
- source_word: ἐν πάσῃ ὑπομονῇ
  english_pob_choice: with all perseverance
  chosen_spanish: con toda perseverancia
  alternatives_spanish:
  - con todo aguante
  - con toda paciencia
  lexicon: BDAG
  rationale: ὑπομονή denota resistencia firme bajo presión. «Perseverancia» comunica bien esa constancia apostólica en un español claro y digno; «con toda» conserva el alcance enfático de πάσῃ.
- source_word: σημείοις τε καὶ τέρασιν καὶ δυνάμεσιν
  english_pob_choice: with signs and wonders and powers
  chosen_spanish: con señales, prodigios y poderes
  alternatives_spanish:
  - con señales, maravillas y poderes
  - con señales, prodigios y milagros
  lexicon: BDAG
  rationale: 'Se conserva la triple distinción léxica: σημεῖα = «señales», τέρατα = «prodigios», δυνάμεις = «poderes». «Poderes» mantiene la fuerza de δυνάμεις y evita colapsarlo en «milagros», aunque el sentido milagroso está implícito en la triada.'
theological_decisions:
- issue: Sentido de «las señales de un apóstol»
  english_pob_reading: The phrase refers to evidences or marks that authenticate apostolic ministry, especially as manifested in endurance and miraculous works.
  chosen_spanish_reading: La frase se entiende como las evidencias o marcas que autentican el ministerio apostólico, manifestadas tanto en perseverancia como en obras poderosas.
  alternative_spanish_readings:
  - La frase se limita a milagros como credenciales apostólicas.
  - La frase se refiere solo a Pablo como «el apóstol».
  rationale: La sintaxis presenta primero «las señales de un apóstol» y luego las desarrolla con perseverancia y con obras poderosas. La traducción preserva ese alcance amplio sin cerrar la tensión teológica sobre si se trata de una lista fija de credenciales apostólicas.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El borrador sigue el último pase de revisión del POB en inglés: se prefirió una formulación más natural para κατειργάσθη y se ajustó la relación instrumental de la segunda cláusula para reflejar mejor la construcción griega. En español, eso se refleja en «se realizaron» y en la secuencia «con señales, prodigios y poderes», manteniendo la forma y la distinción léxica.'
  spanish_consistency_notes:
  - Se usa «señales» para σημεῖα, en línea con el criterio POB de no colapsar toda la triada en «milagros».
  - Se usa «poderes» para δυνάμεις para preservar la distinción con τέρατα y no perder el matiz de actos de poder.
  - «Apóstol» se mantiene en singular genérico, no como título exclusivo de Pablo, salvo la nota textual alternativa.
  - El registro es bíblico contemporáneo, sin arcaísmos innecesarios, pero con dignidad eclesial.
