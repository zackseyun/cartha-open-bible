    reason: alternative_reading
  - marker: b
    text: «Obras poderosas» también puede traducirse como «milagros» o «actos poderosos»; el término griego destaca manifestaciones de poder.
    reason: lexical_alternative
  revision_rationale: Se cambió «poderes» por «obras poderosas» para reflejar δυνάμεις de manera más natural y precisa en español, preservando la distinción frente a «señales» y «prodigios». También se reubicó la nota léxica al término correspondiente, siguiendo el rastro de auditoría inglés.
