  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: mantiene el énfasis de μέν con «Ciertamente», conserva el genitivo genérico en «de un apóstol», traduce ἐν ὑμῖν como «entre ustedes», y preserva la tríada «señales… prodigios…». Sin embargo, «poderes» para δυνάμεσιν suena poco natural en español bíblico y puede malentenderse como facultades abstractas o autoridades, cuando aquí se refiere a obras poderosas/milagrosas. Además, la nota [b] está mal anclada: el rastro inglés ubica la alternativa léxica en «powers», no en «perseverance».'
  spanish_quality_summary: El español es claro y digno, pero «con señales, prodigios y poderes» resulta menos idiomático que «con señales, prodigios y obras poderosas». También conviene corregir la nota léxica para que corresponda al término realmente comentado. El resto del verso lee naturalmente y sin calcos innecesarios.
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Señales» y «prodigios» están bien. La decisión de no usar «milagros» directamente en el texto principal es defendible, pero para δυνάμεις el español necesita una forma más idiomática que preserve la distinción léxica; «obras poderosas» lo logra mejor que «poderes».
  issues:
  - severity: medium
    issue: «poderes» para δυνάμεσιν es poco natural y ambiguo en español
    rationale: Aunque es un equivalente formal posible, en este contexto la tríada convencional apunta a manifestaciones poderosas/milagrosas. «Poderes» en español puede sonar abstracto o referirse a potestades; «obras poderosas» conserva mejor el valor léxico y la legibilidad.
  - severity: high
    issue: La nota [b] está aplicada al término equivocado
    rationale: El expediente inglés indica que la nota léxica corresponde a δυνάμεις («powers»), no a ὑπομονῇ («perseverance»). En español, la nota debe anclarse en la expresión que traduce δυνάμεις, no en «perseverancia».
