translation:
  language: es
  text: ¿Han pensado todo este tiempo que nos estamos defendiendo ante ustedes? Delante de Dios[a], en el Mesías, hablamos. Y todo, amados[b], es para edificarlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo».
    reason: alternative_reading
  - marker: b
    text: 'O: «hablamos; y todo, amados, es para edificarlos».'
    reason: previous_rendering
lexical_decisions:
- source_word: Πάλαι
  english_pob_choice: all along
  chosen_spanish: desde hace tiempo
  alternatives_spanish:
  - siempre
  - todo este tiempo
  lexicon: BDAG
  rationale: La idea no es solo un pasado lejano, sino una suposición sostenida por un tiempo; «desde hace tiempo» conserva esa duración continua con naturalidad en español.
- source_word: δοκεῖτε
  english_pob_choice: Have you been thinking
  chosen_spanish: ¿Piensan
  alternatives_spanish:
  - ¿Creen
  - ¿Han estado pensando
  lexicon: BDAG
  rationale: La pregunta retórica en español funciona bien con presente simple. «Piensan» mantiene el carácter de suposición o impresión que Pablo confronta.
- source_word: ἀπολογούμεθα
  english_pob_choice: we are defending ourselves
  chosen_spanish: nos estamos defendiendo
  alternatives_spanish:
  - estamos presentando nuestra defensa
  - nos justificamos
  lexicon: BDAG
  rationale: El medio tiene fuerza de defensa/vindicación propia. «Nos estamos defendiendo» conserva el matiz forense sin sonar técnico o artificial.
- source_word: κατέναντι θεοῦ
  english_pob_choice: Before God
  chosen_spanish: Delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: La expresión marca ubicación y rendición de cuentas ante Dios. «Delante de Dios» es solemne, claro y plenamente idiomático en español.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva el título mesiánico según la política del proyecto para Χριστός cuando el sentido titular está activo. En español, «Mesías» evita sustituir la elección documentada por la forma litúrgica tradicional sin base textual suficiente.
- source_word: λαλοῦμεν
  english_pob_choice: we are speaking
  chosen_spanish: estamos hablando
  alternatives_spanish:
  - hablamos
  - decimos
  lexicon: BDAG
  rationale: El presente progresivo comunica la inmediatez retórica del griego en este contexto. «Estamos hablando» funciona de manera natural en español y refleja el contraste con la pregunta anterior.
- source_word: τὰ δὲ πάντα
  english_pob_choice: And everything
  chosen_spanish: Y todo
  alternatives_spanish:
  - Y todas las cosas
  - Y todo lo que hacemos
  lexicon: BDAG
  rationale: «Todo» conserva la amplitud sin sobrecargar la frase. En contexto se refiere a la totalidad de lo que Pablo hace y dice, no a una máxima abstracta.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - queridos
  - amados hermanos
  lexicon: BDAG
  rationale: «Amados» preserva el vocativo afectivo con una resonancia bíblica clara en español, sin convertirlo en una fórmula eclesiástica más expansiva de lo que exige el texto.
- source_word: ὑπὲρ τῆς ὑμῶν οἰκοδομῆς
  english_pob_choice: for your building up
  chosen_spanish: es para su edificación
  alternatives_spanish:
  - es para su edificación espiritual
  - es para edificarlos
  lexicon: BDAG
  rationale: «Edificación» mantiene el metáfora de construcción y la convención lexical de la familia οἰκοδομή, pero en español es más estable y transparente que un calco literal.
theological_decisions:
- issue: Tratamiento de Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: La decisión sigue la pauta doctrinal del proyecto de traducir Χριστός como título cuando el sentido titular está activo. Aquí el contexto no exige un nombre propio litúrgico, sino la referencia a la esfera/relación asociada al Mesías.
  doctrine_reference: 'DOCTRINE.md: titles vs. names for Χριστός / contested terms table'
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la estructura retórica del griego y toma en cuenta la trayectoria de revisión del inglés POB: (1) separación en dos afirmaciones tras la pregunta inicial; (2) mantenimiento de la lectura titulativa de Χριστός como «Mesías»; (3) conservación del alcance total de τὰ δὲ πάντα sin convertirlo en una generalización vaga. Se evita depender mecánicamente del inglés y se prioriza la evidencia griega con el audit trail como contexto confirmatorio.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en coherencia con la política del proyecto y con este contexto titulativo.
  - «Delante de Dios» conserva solemnidad sin reemplazar el nombre divino por una convención de máscara; aquí no aparece יהוה, pero la formulación mantiene el tono reverente.
  - «Edificación» se mantiene como término técnico-bíblico comprensible en español y alineado con οἰκοδομή.
  - Se mantiene el vocativo plural afectivo «amados» para ἀγαπητοί, evitando sobreexpansión.
  - La puntuación separa la pregunta, la afirmación de habla ante Dios y la conclusión sobre el propósito, reflejando el ritmo del griego.
