source:
  edition: SBLGNT
  text: καὶ εἴρηκέν μοι· Ἀρκεῖ σοι ἡ χάρις μου· ἡ γὰρ ⸀δύναμις ἐν ἀσθενείᾳ ⸀τελεῖται. ἥδιστα οὖν μᾶλλον καυχήσομαι ἐν ταῖς ἀσθενείαις ⸀μου, ἵνα ἐπισκηνώσῃ ἐπ’ ἐμὲ ἡ δύναμις τοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/009.yaml
  text: And he has said to me[a], “My grace is sufficient for you, for my power is made perfect in weakness.” Therefore I will boast all the more gladly in my weaknesses[d][c][b], so that the power of Messiah may dwell upon me.
  footnotes:
  - marker: a
    text: Or, “for power is made perfect in weakness.”
    reason: lexical_alternative
  - marker: b
    text: Or, “so that the power of the Messiah may rest upon me”; more literally, “may tabernacle over me.”
    reason: lexical_alternative
  - marker: c
    text: Traditional English often reads “Christ” instead of “Messiah.”
    reason: alternative_reading
  - marker: d
    text: Or 'most gladly boast all the more'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
