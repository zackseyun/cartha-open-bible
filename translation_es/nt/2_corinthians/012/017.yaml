translation:
  language: es
  text: ¿Acaso saqué ventaja de ustedes por medio de alguno de los que les envié?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me aproveché de ustedes» o «los defraudé». El verbo griego lleva la idea de obtener ganancia a costa de otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τινα
  english_pob_choice: Did I exploit you through any of those whom I sent to you?
  chosen_spanish: ¿Acaso me aproveché de ustedes...?
  alternatives_spanish:
  - ¿Acaso exploté a ustedes...?
  - ¿Acaso saqué ventaja de ustedes...?
  lexicon: BDAG
  rationale: La pregunta con μή espera una respuesta negativa, y en español una interrogativa retórica con «¿Acaso...?» comunica bien ese matiz. Para ἐπλεονέκτησα, «me aproveché de» reproduce la idea de sacar ganancia indebida o ventaja a costa de otros, manteniendo el tono relacional del contexto.
- source_word: ὧν ἀπέσταλκα πρὸς ὑμᾶς
  english_pob_choice: of those whom I sent to you
  chosen_spanish: de los que les envié
  alternatives_spanish:
  - de los que mandé a ustedes
  - de aquellos a quienes envié a ustedes
  lexicon: BDAG
  rationale: El griego mantiene una referencia grupal a personas enviadas por Pablo. En español, «los que les envié» conserva la idea de comisión y destino sin volver la frase pesada. Se evita una traducción excesivamente literal de la relativa partitiva porque el español natural ya expresa esa relación con «de los que».
- source_word: δι’ αὐτοῦ
  english_pob_choice: through any of those whom I sent to you
  chosen_spanish: por medio de alguno de los que les envié
  alternatives_spanish:
  - a través de alguno de los que les envié
  - por alguno de los que les envié
  lexicon: BDAG
  rationale: Aunque αὐτοῦ está en singular, en el contexto funciona distributivamente respecto del grupo enviado. «Por medio de alguno de los que les envié» preserva ese sentido sin forzar un singular poco natural en español. Además, refleja la mediación instrumental que tiene la preposición διά.
- source_word: ἐπλεονέκτησα
  english_pob_choice: exploit
  chosen_spanish: me aproveché de
  alternatives_spanish:
  - exploté
  - defraudé
  - saqué ventaja de
  lexicon: BDAG
  rationale: El verbo πλεονεκτέω en este pasaje apunta a obtener ganancia indebida a expensas de otros. «Me aproveché de» es natural en español y no pierde la carga ética de abuso o ventaja injusta. «Exploté» es más duro y moderno, pero puede sonar más técnico o más fuerte de lo que el contexto requiere.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - a ustedes
  - ustedes
  lexicon: BDAG
  rationale: El objeto directo del verbo en español se expresa naturalmente con la construcción pronominal «me aproveché de ustedes». Esta solución conserva la referencia a la comunidad corintia y evita una formulación menos idiomática.
theological_decisions:
- issue: Valor retórico de la pregunta negativa
  english_pob_reading: Did I exploit you ...?
  chosen_spanish_reading: ¿Acaso me aproveché de ustedes ...?
  alternative_spanish_readings:
  - ¿No me aproveché de ustedes ...?
  - ¿Acaso los exploté ...?
  rationale: La partícula μή plantea una pregunta que presupone la negación. «¿Acaso...?» conserva el tono defensivo-retórico de Pablo sin convertirlo en una simple negación declarativa. Esto respeta la fuerza discursiva del original.
  doctrine_reference: Retórica apostólica en 2 Corintios 12:17; coherencia discursiva del pasaje
- issue: Sentido moral de πλεονεκτέω
  english_pob_reading: exploit / take advantage of / defraud
  chosen_spanish_reading: me aproveché de
  alternative_spanish_readings:
  - los exploté
  - los defraudé
  - saqué ventaja de ustedes
  rationale: El POB inglés preserva la tensión entre abuso económico/relacional y obtención de ganancia indebida. «Me aproveché de» mantiene esa ambigüedad controlada en español y no cierra el sentido solo a fraude financiero ni solo a explotación laboral, que serían más estrechos.
  doctrine_reference: Ética apostólica y transparencia ministerial en 2 Corintios 12:17
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia entre el texto griego y la decisión inglesa final, sin revisiones aplicadas. La versión española sigue de cerca esa lectura estable y conserva la ambigüedad semántica del verbo πλεονεκτέω sin endurecerla indebidamente ni suavizarla.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural de segunda persona en un registro latinoamericano neutral.
  - Se usa «me aproveché de» como equivalente idiomático de abuso ventajoso, consistente con la decisión POB de no restringir el sentido solo a 'defraudar'.
  - Se preserva la pregunta retórica con «¿Acaso...?» para reflejar la fuerza de μή en contexto interrogativo.
