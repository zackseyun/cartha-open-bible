translation:
  language: es
  text: 'Pero sea así: yo no les fui una carga[a]. Sin embargo, siendo astuto[c][b], los tomé con engaño.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Concedámoslo entonces» o «Sea como fuere»; Pablo parece ceder el punto por el bien del argumento.
    reason: lexical_alternative
  - marker: b
    text: La cláusula «siendo astuto, los tomé con engaño» probablemente refleja, con ironía, una acusación contra Pablo, no una admisión literal.
    reason: alternative_reading
  - marker: c
    text: O «mañoso» o «tramposo»; aquí el matiz es negativo, de habilidad sin escrúpulos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔστω δέ
  english_pob_choice: But let it be so
  chosen_spanish: Pero sea así
  alternatives_spanish:
  - Concedámoslo entonces
  - Sea como fuere
  - Pero supongamos que sí
  lexicon: BDAG
  rationale: La forma imperativa funciona aquí de manera concesiva y retórica. «Pero sea así» conserva la concesión sin volver la frase demasiado explicativa, y suena natural en español.
- source_word: κατεβάρησα
  english_pob_choice: burden
  chosen_spanish: fui de carga
  alternatives_spanish:
  - los agobié
  - les pesé encima
  - les fui una carga
  lexicon: BDAG
  rationale: El verbo en contexto habla de imponer una carga, especialmente económica o material. «Fui de carga» mantiene la idea de carga sin reducirla a lo meramente financiero.
- source_word: ὑπάρχων
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - puesto que era
  - aunque era
  - mientras era
  lexicon: BDAG
  rationale: El participio se vierte con una forma simple para preservar la estructura participial griega y dejar abierta la relación exacta de circunstancia.
- source_word: πανοῦργος
  english_pob_choice: crafty
  chosen_spanish: astuto
  alternatives_spanish:
  - cunningo
  - mañoso
  - tramposo
  lexicon: BDAG
  rationale: El término es despectivo y acusa una habilidad sin escrúpulos. «Astuto» funciona en español, aunque es algo más neutral que «crafty»; por eso se conserva la tensión en la nota sobre la lectura irónica.
- source_word: δόλῳ
  english_pob_choice: by deceit
  chosen_spanish: con engaño
  alternatives_spanish:
  - con fraude
  - con astucia
  - mediante engaño
  lexicon: BDAG
  rationale: El dativo es instrumental. «Con engaño» es claro, directo y suficientemente literal para reflejar la acusación.
- source_word: ἔλαβον
  english_pob_choice: I took you
  chosen_spanish: los tomé
  alternatives_spanish:
  - los atrapé
  - los capté
  - me aproveché de ustedes
  lexicon: BDAG
  rationale: «Tomar» es la equivalencia más cercana al verbo, y el complemento «con engaño» deja sentir el matiz hostil de la acusación. En español, la frase queda suficientemente abierta para la posible ironía del contexto.
theological_decisions:
- issue: Si la frase posterior a ἀλλὰ es una admisión literal o una respuesta irónica a una acusación
  english_pob_reading: The clause 'being crafty, I took you by deceit' is likely Paul’s ironic restatement of an accusation against him, not an actual admission.
  chosen_spanish_reading: La cláusula se traduce de manera directa, pero con una redacción que permita leerla como eco irónico de una acusación, no como confesión literal.
  alternative_spanish_readings:
  - Pero, siendo astuto, los atrapé con engaño
  - Sin embargo, como astuto, los engañé y los tomé
  rationale: El contexto mayor sugiere que Pablo refuta la idea de haber explotado a los corintios. La traducción debe conservar la tensión retórica sin resolverla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: Se revisó el paquete fuente y el audit trail inglés; no hay revisiones aplicadas en el registro base, y el texto griego se mantiene con una traducción que conserva el tono concesivo e irónico.
  spanish_consistency_notes:
  - Se usa «Dios» y no hay nombres divinos en este versículo.
  - «Astuto» se eligió por naturalidad, pero se señaló su matiz negativo para no suavizar πανοῦργος.
  - «Con engaño» mantiene el valor instrumental de δόλῳ sin sobreinterpretar el verbo ἔλαβον.
  - La puntuación busca reflejar el contraste entre concesión y réplica final en el griego.
