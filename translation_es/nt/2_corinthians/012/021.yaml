base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/021.yaml
  text: I fear that when I come again[a], my God may humble me before you[d][c][b], and I will mourn over many who have sinned before and have not repented of the impurity and sexual immorality and sensuality that they practiced.
