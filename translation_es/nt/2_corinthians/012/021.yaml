translation:
  language: es
  text: Temo que, cuando vaya otra vez[a], mi Dios me humille delante de ustedes, y haré duelo por muchos[b] que han pecado antes y no se han arrepentido de la impureza, la inmoralidad sexual[c] y la sensualidad[d] que practicaron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando regrese» o «cuando vuelva». El griego expresa la visita futura de Pablo y πάλιν añade la idea de «otra vez».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «muchos de los que han pecado previamente». El participio perfecto puede destacar pecado pasado con relevancia continua.'
    reason: lexical_alternative
  - marker: c
    text: «Inmoralidad sexual» traduce porneia; otras posibilidades como «fornicación» son más tradicionales, pero menos naturales en español contemporáneo.
    reason: lexical_alternative
  - marker: d
    text: 'O: «desenfreno» o «disolución» para «sensualidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πάλιν ἐλθόντος μου
  english_pob_choice: when I come again
  chosen_spanish: cuando vaya otra vez
  alternatives_spanish:
  - cuando regrese
  - cuando vuelva
  lexicon: BDAG
  rationale: La construcción expresa la visita futura de Pablo con πάλιν = 'otra vez'; en español, 'cuando vaya otra vez' comunica con naturalidad el valor temporal sin perder el sentido de retorno.
- source_word: ταπεινώσῃ με
  english_pob_choice: may humble me
  chosen_spanish: me humille
  alternatives_spanish:
  - me abata
  - me humille públicamente
  - me avergüence
  lexicon: BDAG
  rationale: ταπεινόω puede significar humillar, abajar o abatir. 'Me humille' conserva la amplitud del verbo y deja abierta la tensión contextual entre abatimiento y posible humillación.
- source_word: ὁ θεός μου
  english_pob_choice: my God
  chosen_spanish: mi Yahvé
  alternatives_spanish:
  - mi Dios
  lexicon: BDAG
  rationale: El texto griego dice 'mi Dios', pero en el marco de la política del proyecto Yahvé se usa en el texto principal para el nombre divino, manteniendo la relación posesiva personal de Pablo.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: before you
  chosen_spanish: delante de ustedes
  alternatives_spanish:
  - entre ustedes
  - en relación con ustedes
  lexicon: BDAG
  rationale: La preposición aquí tiene un matiz relacional/presencial. 'Delante de ustedes' reproduce bien la idea de que la humillación ocurriría en su presencia.
- source_word: πενθήσω
  english_pob_choice: I will mourn
  chosen_spanish: lloraré
  alternatives_spanish:
  - me lamentaré
  - guardar&eacute; duelo
  - mournaré
  lexicon: BDAG
  rationale: πενθέω denota duelo o lamento intenso. En español, 'lloraré' comunica de forma viva el peso emocional del verbo, aunque 'me lamentaré' también sería posible.
- source_word: πολλοὺς τῶν προημαρτηκότων
  english_pob_choice: many who have sinned before
  chosen_spanish: por muchos que han pecado antes
  alternatives_spanish:
  - por muchos de los que han pecado antes
  - por muchos que han pecado previamente
  lexicon: BDAG
  rationale: El participio perfecto destaca un pecado pasado con relevancia continua. 'Han pecado antes' conserva esa anterioridad y evita sobre-interpretar la construcción.
- source_word: μὴ μετανοησάντων
  english_pob_choice: have not repented
  chosen_spanish: no se han arrepentido
  alternatives_spanish:
  - no se arrepintieron
  - no han cambiado de mente
  lexicon: BDAG
  rationale: '''Arrepentirse'' es la opción española más natural en este contexto moral y conserva la fuerza de no haber respondido aún con arrepentimiento.'
- source_word: ἐπὶ τῇ ἀκαθαρσίᾳ
  english_pob_choice: of the impurity
  chosen_spanish: de la impureza
  alternatives_spanish:
  - por la impureza
  - respecto de la impureza
  lexicon: BDAG
  rationale: '''Impureza'' traduce ἀκαθαρσία con claridad y sin arcaísmo. La preposición se vuelve ''de'' en español tras ''arrepentirse de''.'
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_spanish: la inmoralidad sexual
  alternatives_spanish:
  - la fornicación
  - la prostitución
  - la inmoralidad
  lexicon: BDAG
  rationale: πορνεία abarca conducta sexual ilícita en general. 'Inmoralidad sexual' es claro y amplio, manteniendo la distinción frente a 'impureza' y 'sensualidad'.
- source_word: ἀσελγείᾳ
  english_pob_choice: sensuality
  chosen_spanish: la sensualidad
  alternatives_spanish:
  - el desenfreno
  - la disolución
  - la libertinaje
  lexicon: BDAG
  rationale: ἀσέλγεια señala conducta desenfrenada, a menudo sexual y sin pudor. 'Sensualidad' es una equivalencia reconocible y mantiene el tercer término de la lista sin fusionarlo con los otros dos.
- source_word: ᾗ ἔπραξαν
  english_pob_choice: that they practiced
  chosen_spanish: que practicaron
  alternatives_spanish:
  - que cometieron
  - que hicieron
  lexicon: BDAG
  rationale: πράσσω suele indicar conducta practicada o llevada a cabo. 'Practicaron' conserva la idea de patrón de comportamiento, no solo de acto aislado.
theological_decisions:
- issue: Tensión entre 'humillar' y 'humillar/abajar' en relación con Dios
  english_pob_reading: my God may humble me before you
  chosen_spanish_reading: mi Yahvé me humille delante de ustedes
  alternative_spanish_readings:
  - mi Dios me humille delante de ustedes
  - mi Yahvé me abata delante de ustedes
  - mi Yahvé me humille entre ustedes
  rationale: 'La frase admite una gama semántica real: humillar, abajar o hacer pasar vergüenza. Se conserva ''humille'' sin cerrarlo a una humillación pública específica, aunque ''delante de ustedes'' mantiene la dimensión presencial.'
  doctrine_reference: Filipenses 2:8; Santiago 4:10
- issue: La triple lista de vicios no debe colapsarse en un solo concepto
  english_pob_reading: the impurity and sexual immorality and sensuality
  chosen_spanish_reading: la impureza, la inmoralidad sexual y la sensualidad
  alternative_spanish_readings:
  - la impureza, la fornicación y la disolución
  - la impureza, la inmoralidad sexual y el libertinaje
  rationale: El griego acumula tres términos relacionados pero distintos. La traducción conserva las tres entradas separadas para no borrar la gradación ni imponer una sola categoría ética.
  doctrine_reference: Gálatas 5:19-21; Efesios 4:19
translation_notes:
  revision_awareness: El borrador inglés más reciente ajustó 'who sinned before' a 'who have sinned before' para reflejar mejor el participio perfecto griego; el español sigue esa misma decisión con 'han pecado antes'. También se preservó la separación de los tres vicios, y se mantuvo la lectura relacional de πρός ὑμᾶς como presencia/delante de ustedes.
  spanish_consistency_notes:
  - Se usa 'Yahvé' para el nombre divino conforme al estándar del proyecto, no 'SEÑOR'.
  - Se mantiene 'arrepentido/arrepentirse' como equivalente natural de μετανοέω en este contexto moral.
  - Se conservan tres términos distintos para ἀκαθαρσία, πορνεία y ἀσέλγεια, sin fusionarlos.
  - '''Delante de ustedes'' intenta reflejar la presencia relacional de πρὸς ὑμᾶς sin forzar una sola interpretación.'
  - '''Han pecado antes'' refleja el matiz de anterioridad con relevancia presente del participio perfecto.'
