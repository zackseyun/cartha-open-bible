translation:
  language: es
  text: Porque ¿en qué fueron tratados como inferiores a las demás iglesias[a], si no es en que yo mismo no les fui carga[b]? Perdónenme esta injusticia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron hechos inferiores»; el verbo griego puede expresar desventaja o trato como inferior en comparación con las demás iglesias.'
    reason: lexical_alternative
  - marker: b
    text: Es decir, Pablo no les impuso una carga económica al no aceptar sostén de ellos.
    reason: cultural_note
  - marker: c
    text: 'Pablo habla con ironía: la supuesta «injusticia» fue no haber sido una carga para ellos.'
    reason: cross_reference
lexical_decisions:
- source_word: ἡσσώθητε
  english_pob_choice: were treated as inferior
  chosen_spanish: fueron tratados como inferiores
  alternatives_spanish:
  - fueron puestos en desventaja
  - fueron hechos inferiores
  - quedaron en inferioridad
  lexicon: BDAG
  rationale: El pasivo comunica una condición comparativa o de desventaja frente a otras iglesias. «Fueron tratados como inferiores» conserva la fuerza relacional y la ironía del pasaje sin sugerir inferioridad intrínseca.
- source_word: ὑπὲρ τὰς λοιπὰς ἐκκλησίας
  english_pob_choice: to the rest of the churches
  chosen_spanish: a las demás iglesias
  alternatives_spanish:
  - que las otras iglesias
  - frente a las otras iglesias
  - sobre las demás iglesias
  lexicon: BDAG
  rationale: En español, el valor comparativo queda natural con «a las demás iglesias». Mantiene el contraste con las otras comunidades paulinas sin forzar una construcción literal poco idiomática.
- source_word: λοιπὰς ἐκκλησίας
  english_pob_choice: the rest of the churches
  chosen_spanish: las demás iglesias
  alternatives_spanish:
  - las otras iglesias
  - las iglesias restantes
  lexicon: BDAG
  rationale: «Demás» expresa bien la idea de las iglesias restantes u otras en comparación, con fluidez natural en español bíblico contemporáneo.
- source_word: αὐτὸς ἐγὼ
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo personalmente
  - yo mismo en persona
  - yo
  lexicon: BDAG
  rationale: La combinación enfática se conserva con «yo mismo», que mantiene la insistencia personal de Pablo y el tono irónico del argumento.
- source_word: οὐ κατενάρκησα ὑμῶν
  english_pob_choice: did not become a burden to you
  chosen_spanish: no les fui carga
  alternatives_spanish:
  - no los cargué
  - no les impuse carga
  - no me aproveché de ustedes económicamente
  lexicon: BDAG
  rationale: El verbo se refiere aquí a imponer una carga material o financiera. «No les fui carga» es breve, fiel y suficientemente concreto en contexto, sin explicitar más de lo que el griego exige en la línea principal.
- source_word: χαρίσασθέ μοι
  english_pob_choice: Forgive me
  chosen_spanish: Perdónenme
  alternatives_spanish:
  - Concédanme
  - Disculpenme
  - Ténganme por perdonado
  lexicon: BDAG
  rationale: Aunque el verbo también puede significar «conceder» o «dar graciosamente», en este cierre irónico el valor comunicativo en español es «perdonar». Se conserva la dureza retórica del enunciado sin volverlo paraprástico.
- source_word: τὴν ἀδικίαν ταύτην
  english_pob_choice: this wrong
  chosen_spanish: este agravio
  alternatives_spanish:
  - esta injusticia
  - este mal
  - esta ofensa
  lexicon: BDAG
  rationale: «ἀδικία» puede rendirse como «injusticia», «mal» u «ofensa». Aquí «agravio» expresa bien la acusación irónica del pasaje y suena natural en español público, sin perder la tensión moral del término.
- source_word: τί γάρ ἐστιν ὃ
  english_pob_choice: For in what
  chosen_spanish: Porque ¿en qué
  alternatives_spanish:
  - Pues ¿en qué
  - ¿En qué
  - Porque en qué
  lexicon: BDAG
  rationale: La pregunta retórica pide un equivalente natural en español. «Porque ¿en qué» refleja la conexión argumentativa de γάρ y el carácter interrogativo del griego con claridad y concisión.
theological_decisions:
- issue: Ironía de Pablo respecto a su negativa a ser sostenido económicamente por la iglesia de Corinto
  english_pob_reading: Render the statement straightforwardly while preserving the irony through 'Forgive me this wrong' rather than making the sarcasm explicit in paraphrase.
  chosen_spanish_reading: Traducir de forma directa, dejando que la ironía emerja por la fórmula «Perdónenme este agravio» y por la afirmación negativa «no les fui carga».
  alternative_spanish_readings:
  - 'Explicitar la ironía con una paráfrasis más marcada, por ejemplo: «Perdónenme por este terrible agravio»'
  - Suavizar el tono a una simple disculpa literal
  rationale: El griego y el contexto indican una disculpa mordaz, no una confesión real de culpa. La versión española debe dejar visible la tensión retórica sin añadir explicaciones interpretativas al texto principal.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no se debe paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el audit trail inglés y no requiere revisión sustantiva; la versión española conserva la comparación, la carga financiera implícita y la ironía final sin sobreexplicar.
  spanish_consistency_notes:
  - Se mantiene «iglesias» para ἐκκλησίας, siguiendo el registro eclesial común y el contexto paulino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en este versículo.
  - Se preserva la fuerza comparativa de ὑπέρ con una construcción española natural, no literalista.
  - «No les fui carga» conserva la idea financiera sin introducir vocabulario técnico ajeno al texto.
  - La nota sobre «agravio» ayuda a sostener la ironía sin cambiar el sentido base de ἀδικία.
