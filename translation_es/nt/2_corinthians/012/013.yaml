base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/013.yaml
  text: For in what were you treated as inferior to the rest of the churches[c][b][a], except that I myself did not become a burden to you? Forgive me this wrong.
  footnotes:
  - marker: a
    text: Or, 'were made inferior to the other churches.' The Greek verb can mean to be put at a disadvantage or treated as lesser.
    reason: lexical_alternative
  - marker: b
    text: That is, Paul did not financially burden them by accepting support from them.
    reason: cultural_note
  - marker: c
    text: 'Paul speaks ironically: the supposed ''wrong'' was his refusal to be a burden to them.'
    reason: cross_reference
