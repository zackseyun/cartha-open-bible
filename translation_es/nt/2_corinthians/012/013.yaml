    rationale: En el rastro inglés, la nota cultural explica «did not become a burden to you», mientras que la nota de ironía explica «this wrong». En el borrador español, [b] está sobre «yo mismo» y [c] sobre «agravio», pero falta anclar la nota cultural a «carga». Esto desalinearía la explicación con el segmento textual pertinente.
  - severity: low
    issue: «Agravio» es un poco más interpretativo que el griego ἀδικία.
    rationale: «Agravio» es defendible, pero «injusticia» conserva mejor la forma y fuerza semántica del sustantivo griego, mientras que la ironía ya queda suficientemente clara por el contexto y la nota.
