translation:
  language: es
  text: He llegado a ser un necio; ustedes me obligaron a ello. Porque yo debía haber sido elogiado por ustedes[a], pues en nada fui inferior a esos superapóstoles, aunque soy nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los más eminentes apóstoles». La expresión griega es muy enfática y puede ser irónica en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: Γέγονα
  english_pob_choice: I have become
  chosen_spanish: He llegado a ser
  alternatives_spanish:
  - He pasado a ser
  - Me he vuelto
  lexicon: BDAG
  rationale: El perfecto expresa un estado presente resultante; «he llegado a ser» conserva ese valor mejor que un pretérito simple y suena natural en español.
- source_word: ἄφρων
  english_pob_choice: a fool
  chosen_spanish: un necio
  alternatives_spanish:
  - un insensato
  - un tonto
  lexicon: BDAG
  rationale: Aquí funciona como sustantivo predicativo y, en el contexto irónico de Pablo, «necio» comunica mejor la autodescripción retórica que un adjetivo suelto.
- source_word: ὑμεῖς με ἠναγκάσατε
  english_pob_choice: you forced me to it
  chosen_spanish: ustedes me obligaron
  alternatives_spanish:
  - ustedes me forzaron
  - ustedes me compelieron
  lexicon: BDAG
  rationale: Se conserva el sujeto enfático «ustedes» y el verbo transmite la coerción sin añadir una explicación más allá del griego; «a esto» queda implícito como en el contexto inmediato.
- source_word: ὤφειλον
  english_pob_choice: I ought
  chosen_spanish: debía
  alternatives_spanish:
  - debí haber sido
  - estaba obligado a
  lexicon: BDAG
  rationale: Expresa deber u obligación esperada; «debía» mantiene la fuerza normativa y encaja bien con el giro pasivo siguiente.
- source_word: ὑφ’ ὑμῶν συνίστασθαι
  english_pob_choice: to have been commended by you
  chosen_spanish: haber sido recomendado por ustedes
  alternatives_spanish:
  - haber sido commendado por ustedes
  - haber sido aprobado por ustedes
  lexicon: BDAG
  rationale: En este contexto συνίστημι tiene el sentido de presentar favorablemente o dar testimonio a favor; «recomendado» es idiomático en español y conserva la agencia de ὑπό.
- source_word: οὐδὲν ... ὑστέρησα
  english_pob_choice: I fell short in nothing
  chosen_spanish: en nada fui inferior
  alternatives_spanish:
  - no carecí de nada
  - en nada quedé atrás
  lexicon: BDAG
  rationale: La expresión idiomática indica no estar por debajo de otros; «fui inferior» preserva la comparación implícita y evita suavizar la idea de inferioridad.
- source_word: τῶν ὑπερλίαν ἀποστόλων
  english_pob_choice: those super-apostles
  chosen_spanish: esos superapóstoles
  alternatives_spanish:
  - esos apóstoles sumamente eminentes
  - esos llamados superapóstoles
  lexicon: BDAG
  rationale: Se conserva la fuerza hiperbólica y potencialmente irónica del término. «Superapóstoles» reproduce el tono polémico sin explicitar en el texto principal una interpretación adicional.
- source_word: εἰ καὶ οὐδέν εἰμι
  english_pob_choice: even if I am nothing
  chosen_spanish: aunque no soy nada
  alternatives_spanish:
  - aunque nada soy
  - incluso si no soy nada
  lexicon: BDAG
  rationale: La concesiva mantiene la autodepreciación de Pablo. «No soy nada» es una forma natural y fiel en español que conserva la tensión del griego.
theological_decisions:
- issue: Posible ironía en τῶν ὑπερλίαν ἀποστόλων
  english_pob_reading: Rendered as 'those super-apostles' with likely ironic/polemical force left implicit rather than explained in the main text.
  chosen_spanish_reading: «esos superapóstoles» mantiene la hipérbole y deja la posible ironía implícita.
  alternative_spanish_readings:
  - «esos llamados superapóstoles» haciendo explícita la ironía
  - «los más eminentes apóstoles» como lectura no irónica
  rationale: El griego no añade una marca explícita de ironía; por eso conviene conservar la expresión fuerte sin resolverla en la línea principal. La nota puede ofrecer la alternativa interpretativa sin imponerla.
  doctrine_reference: Translation philosophy §3; preservar la tensión teológica y retórica en vez de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión del audit trail sustituyó una relación causal implícita por γάρ más directo; por eso se traduce con «Porque»/«pues» sin añadir una causalidad más fuerte que la del griego. También se preserva la fuerza polémica de τῶν ὑπερλίαν ἀποστόλων sin explicitar en el texto principal la ironía posible.
  spanish_consistency_notes:
  - Se mantiene «ustedes» para el plural enfático de ὑμεῖς, evitando un tratamiento más formal que alteraría el tono directo.
  - «recomendado» refleja el uso de συνίστημι en sentido de presentar favorablemente, conforme al contexto paulino.
  - «superapóstoles» se conserva como término marcado; si aparece en otras secciones, debe mantenerse uniforme salvo razón exegética clara.
  - «no soy nada» conserva la concesión final sin suavizarla a una formulación más explicativa.
