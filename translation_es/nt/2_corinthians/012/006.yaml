translation:
  language: es
  text: Porque si quisiera gloriarme[a], no sería insensato, pues diría la verdad. Pero me abstengo, para que nadie piense de mí más de lo que ve en mí o oye de mis labios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oye cualquier cosa de mis labios». El griego incluye de manera explícita un elemento indefinido después de «oye», que en español idiomático puede quedar implícito.
    reason: lexical_alternative
lexical_decisions:
- source_word: θελήσω
  english_pob_choice: should want
  chosen_spanish: quisiera
  alternatives_spanish:
  - quisiera
  - querría
  - si quiero
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἐὰν expresa una contingencia hipotética; en español, «quisiera» transmite bien esa posibilidad sin volverla una afirmación presente.
- source_word: καυχήσασθαι
  english_pob_choice: to boast
  chosen_spanish: gloriarme
  alternatives_spanish:
  - alardear
  - boastear
  - jactarme
  lexicon: BDAG
  rationale: «Gloriarme» conserva el matiz paulino de καυχάομαι y encaja con el contexto retórico de autoapología; «jactarme» sería posible, pero suena más negativo y menos equilibrado aquí.
- source_word: ἄφρων
  english_pob_choice: foolish
  chosen_spanish: insensato
  alternatives_spanish:
  - necio
  - tonto
  - un necio
  lexicon: BDAG
  rationale: Como adjetivo predicativo tras ἔσομαι, «insensato» suena natural y mantiene la idea de falta de sabiduría sin exagerar el tono coloquial de «tonto».
- source_word: ἀλήθειαν ... ἐρῶ
  english_pob_choice: I would be speaking the truth
  chosen_spanish: diría la verdad
  alternatives_spanish:
  - estaría diciendo la verdad
  - hablaría con verdad
  lexicon: BDAG
  rationale: El futuro ἐρῶ dentro de la condición se vierte de forma idiomática con «diría la verdad», que conserva la relación hipotética y el contenido veraz de la afirmación.
- source_word: φείδομαι
  english_pob_choice: I refrain
  chosen_spanish: me abstengo
  alternatives_spanish:
  - me contengo
  - me refreno
  - me detengo
  lexicon: BDAG
  rationale: El verbo medio expresa autocontención; «me abstengo» comunica bien la decisión deliberada de no seguir en ese camino de gloriarse.
- source_word: λογίσηται
  english_pob_choice: may reckon
  chosen_spanish: piense
  alternatives_spanish:
  - considere
  - repute
  - cuente
  lexicon: BDAG
  rationale: Aunque «reckon» conserva el sentido evaluativo, en español «piense de mí» resulta más natural y comunica la estimación mental que Pablo quiere evitar.
- source_word: ὑπὲρ ὃ
  english_pob_choice: above what
  chosen_spanish: más de lo que
  alternatives_spanish:
  - por encima de lo que
  - más allá de lo que
  lexicon: BDAG
  rationale: La comparación de exceso se expresa con fluidez en español como «más de lo que», sin perder la idea de una valoración inflada.
- source_word: βλέπει με
  english_pob_choice: he sees in me
  chosen_spanish: ve en mí
  alternatives_spanish:
  - ve acerca de mí
  - ve de mí
  lexicon: BDAG
  rationale: La adición inglesa de «in» explicita una evaluación basada en lo observable; en español, «ve en mí» comunica naturalmente ese criterio de observación personal.
- source_word: ἀκούει ... τι ἐξ ἐμοῦ
  english_pob_choice: hears from me
  chosen_spanish: oye de mí
  alternatives_spanish:
  - oye algo de mí
  - oye cualquier cosa de mí
  lexicon: BDAG
  rationale: La forma griega incluye un indefinido tras ἀκούει; en español puede quedar implícito como «oye de mí». La alternativa explícita se reserva para nota, porque la frase idiomática aquí fluye mejor sin añadirla al cuerpo del texto.
theological_decisions:
- issue: Boastful speech versus truthful self-defense
  english_pob_reading: The verse is rendered as a hypothetical statement of truthful boasting that Paul nevertheless declines, without implying that boasting is inherently justified or doctrinally commendable.
  chosen_spanish_reading: El versículo presenta un gloriarse hipotético que, de ocurrir, no sería falso; aun así, Pablo se abstiene para no alimentar una valoración exagerada de su persona.
  alternative_spanish_readings:
  - Un giro que hiciera sonar el gloriarse como moralmente aprobado
  - Una lectura que tratara todo gloriarse aquí como necesariamente pecaminoso
  rationale: 'El griego sostiene una tensión real: si Pablo decidiera gloriarse, no sería insensato porque diría verdad, pero elige contenerse. La traducción española conserva esa tensión sin resolverla doctrinalmente en una dirección u otra.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del juicio de alta concordancia; se mantiene la solución idiomática para ἀκούει τι ἐξ ἐμοῦ con nota alternativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aplica.
  - Se conserva el contraste paulino entre autoglorificación hipotética y restricción voluntaria sin suavizar el verbo καυχάομαι.
  - «Me abstengo» refleja la voz media de φείδομαι y evita sobreinterpretar el matiz como simple omisión accidental.
  - La nota de pie de página marca únicamente la alternativa explícita para el indefinido de ἀκούει, siguiendo el patrón del audit trail en inglés.
