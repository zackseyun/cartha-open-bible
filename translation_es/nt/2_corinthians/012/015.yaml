revisions:
- from: Pero yo con muchísimo gusto gastaré y seré gastado por sus almas. Si los amo más abundantemente[a], ¿seré amado menos?
  to: Pero yo, con muchísimo gusto, gastaré y me gastaré por completo por sus almas. Si los amo más y más[a], ¿soy amado menos?
  rationale: 'Se revisa para mejorar fidelidad y naturalidad en español: ἐκδαπανηθήσομαι se expresa idiomáticamente como «me gastaré por completo», conservando la intensificación del doble verbo; ἀγαπῶμαι se corrige a presente («¿soy amado menos?»); y περισσοτέρως se vuelve una expresión española más natural («más y más»). Se mantiene «sus almas» con la nota léxica, en línea con la decisión documentada de la POB inglesa.'
  reviewer_model: gpt-5.4
