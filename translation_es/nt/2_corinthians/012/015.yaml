review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: contraste enfático con ἐγὼ δὲ, disposición intensísima con ἥδιστα, doble metáfora de gasto en δαπανήσω / ἐκδαπανηθήσομαι, finalidad benéfica con ὑπὲρ, preservación léxica de ψυχαί como «almas», y la pregunta retórica final. Sin embargo, dos decisiones no preservan bien el valor idiomático y temporal del original: «seré gastado» suena poco natural en español para ἐκδαπανηθήσομαι, y «¿seré amado menos?» desplaza indebidamente el presente ἀγαπῶμαι hacia futuro.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero tiene dos giros poco naturales para español bíblico contemporáneo: «seré gastado» y «más abundantemente». Una formulación más idiomática conserva mejor la metáfora y la queja retórica paulina: «me gastaré por completo» y «más y más». También conviene mantener la pregunta final en presente: «¿soy amado menos?»'
  glossary_alignment: 'Alinea bien con la terminología del proyecto en los puntos relevantes: «Jesús/Mesías/Yahvé» no aplican aquí; ψυχαί se conserva como «almas» con nota de alternativas, lo cual coincide con la decisión inglesa y la rationale teológica. No hay conflictos con el glosario principal.'
  issues:
  - severity: medium
    issue: «seré gastado» para ἐκδαπανηθήσομαι es demasiado calcado y poco idiomático
    rationale: Aunque intenta conservar la pasiva/metáfora, en español suena forzado y puede distraer. El verbo compuesto intensifica que Pablo mismo se consumirá; «me gastaré por completo» o «seré consumido» comunica mejor esa fuerza sin perder el paralelismo.
  - severity: high
    issue: «¿seré amado menos?» cambia el presente griego ἀγαπῶμαι a futuro
    rationale: El original expresa un estado/realidad presente en la pregunta retórica, no un futuro. «¿Soy amado menos?» preserva mejor el tiempo verbal y la fuerza del reproche.
  - severity: low
    issue: «más abundantemente» es comprensible pero poco natural en español
    rationale: Reproduce demasiado de cerca el inglés auditado. En español, «más», «mucho más» o «más y más» expresan mejor περισσοτέρως sin rigidez.
  revised_spanish_text: Pero yo, con muchísimo gusto, gastaré y me gastaré por completo por sus almas. Si los amo más y más[a], ¿soy amado menos?
  revised_footnotes:
  - marker: a
    text: O «sus vidas» o «ustedes mismos» para «sus almas».
    reason: lexical_alternative
  revision_rationale: 'Se revisa para mejorar fidelidad y naturalidad en español: ἐκδαπανηθήσομαι se expresa idiomáticamente como «me gastaré por completo», conservando la intensificación del doble verbo; ἀγαπῶμαι se corrige a presente («¿soy amado menos?»); y περισσοτέρως se vuelve una expresión española más natural («más y más»). Se mantiene «sus almas» con la nota léxica, en línea con la decisión documentada de la POB inglesa.'
