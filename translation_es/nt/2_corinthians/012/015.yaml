translation:
  language: es
  text: Pero yo, con muchísimo gusto, gastaré y me gastaré por completo por sus almas. Si los amo más y más[a], ¿soy amado menos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sus vidas» o «ustedes mismos» para «sus almas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἥδιστα
  english_pob_choice: most gladly
  chosen_spanish: con muchísimo gusto
  alternatives_spanish:
  - muy gustosamente
  - con gran gusto
  - de muy buena gana
  lexicon: BDAG
  rationale: El adverbio superlativo expresa disposición intensísima y voluntaria. En español, «con muchísimo gusto» conserva la calidez y la intensidad mejor que una repetición mecánica de un superlativo adverbial.
- source_word: δαπανήσω
  english_pob_choice: I will spend
  chosen_spanish: gastaré
  alternatives_spanish:
  - invertiré
  - desembolsaré
  - consumiré
  lexicon: BDAG
  rationale: El verbo griego mantiene la metáfora de gasto/consumo de recursos; «gastaré» reproduce ese campo semántico de manera natural y conecta con el verbo intensificado siguiente.
- source_word: ἐκδαπανηθήσομαι
  english_pob_choice: be spent
  chosen_spanish: seré gastado
  alternatives_spanish:
  - seré consumido
  - seré totalmente gastado
  - seré expendido
  lexicon: BDAG
  rationale: 'La forma pasiva intensifica el verbo previo: no solo gastar lo propio, sino ser agotado uno mismo. «Seré gastado» preserva la metáfora y el paralelismo sin suavizarla hacia una paráfrasis más abstracta.'
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - en favor de
  - a favor de
  - por causa de
  lexicon: BDAG
  rationale: Aquí ὑπέρ expresa beneficio/sustitución en sentido de entrega sacrificial. «Por» es la equivalencia española más natural y mantiene la relación de beneficio para ellos.
- source_word: τῶν ψυχῶν ὑμῶν
  english_pob_choice: your souls
  chosen_spanish: sus almas
  alternatives_spanish:
  - sus vidas
  - ustedes mismos
  - sus personas
  lexicon: BDAG
  rationale: La POB inglesa preserva ψυχή con «souls» para no borrar su fuerza lexical. En español, «almas» comunica de forma fiel y digna esa referencia, aunque el contexto también permita «vidas» o «ustedes mismos»; por eso se documentan las alternativas.
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si es que
  - Si realmente
  lexicon: BDAG
  rationale: La condición retórica se conserva sin resolver interpretativamente el matiz. «Si» deja que la pregunta final cargue la fuerza polémica del enunciado.
- source_word: περισσοτέρως
  english_pob_choice: more abundantly
  chosen_spanish: más abundantemente
  alternatives_spanish:
  - más
  - con mayor abundancia
  - mucho más
  lexicon: BDAG
  rationale: El comparativo adverbial se expresa de forma transparente con «más abundantemente», que conserva el matiz de excedencia sin perder la naturalidad española.
- source_word: ἀγαπῶν
  english_pob_choice: I love
  chosen_spanish: los amo
  alternatives_spanish:
  - los estoy amando
  - amándolos
  lexicon: BDAG
  rationale: Aunque formalmente es participio, la frase retórica en español suena más natural con un verbo finito. Se mantiene el sujeto implícito de primera persona y el objeto directo plural.
- source_word: ἧσσον
  english_pob_choice: less
  chosen_spanish: menos
  alternatives_spanish:
  - en menor grado
  - menos todavía
  lexicon: BDAG
  rationale: Es el comparativo simple que contrasta directamente con «más abundantemente». «Menos» conserva la tensión del reclamo retórico.
- source_word: ἀγαπῶμαι
  english_pob_choice: am I loved
  chosen_spanish: seré amado
  alternatives_spanish:
  - soy amado
  - me aman
  lexicon: BDAG
  rationale: Para mantener el efecto retórico y la relación con la voz pasiva griega, «seré amado» refleja la forma verbal sin volverla activa. Aunque el español puede sonar un poco más literario, es fiel al contraste del texto.
theological_decisions:
- issue: ψυχή en un contexto paulino de entrega pastoral
  english_pob_reading: your souls
  chosen_spanish_reading: sus almas
  alternative_spanish_readings:
  - sus vidas
  - ustedes mismos
  rationale: No se debe reducir ψυχή a un simple pronombre, porque Pablo habla de una entrega profunda y personal. «Sus almas» conserva la carga espiritual y lexical que la POB inglesa decide mantener.
  doctrine_reference: Translation philosophy §1, §5
- issue: Pasiva final en forma interrogativa retórica
  english_pob_reading: am I loved less?
  chosen_spanish_reading: ¿seré amado menos?
  alternative_spanish_readings:
  - ¿me aman menos?
  - ¿soy amado menos?
  rationale: La pasiva griega es parte de la ironía/queja retórica del pasaje. Mantener una pasiva en español protege esa forma y evita convertir el verso en una reescritura activa.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: El análisis inglés más reciente se mantuvo sin cambios sustantivos; la versión española sigue de cerca la misma solución léxica y retórica, preservando la metáfora de gasto y la ambigüedad semántica de ψυχή documentada en el audit trail.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evita «Cristo»/«Mesías» porque no aparecen en el texto.
  - «Almas» se usa por fidelidad lexical; las alternativas se documentan en nota para no borrar la posible lectura de «vidas» o «ustedes mismos».
  - La estructura retórica condicional-interrogativa se conserva sin suavizarla en una declaración explicativa.
