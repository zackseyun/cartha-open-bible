translation:
  language: es
  text: Por eso me complazco en las debilidades, en los insultos, en las penurias, en las persecuciones y en las angustias, por causa del Mesías[a][b]; porque cuando soy débil, entonces soy fuerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, “por causa de Cristo”.
    reason: alternative_reading
  - marker: b
    text: Mesías traduce aquí Χριστός como título; “Cristo” es la forma tradicional.
    reason: theological_note
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  lexicon: BDAG
  rationale: Marca una conclusión inferida del argumento anterior. 'Por eso' preserva la relación lógica con naturalidad en español contemporáneo sin volver la frase rígida.
- source_word: εὐδοκῶ
  english_pob_choice: I delight
  chosen_spanish: me complazco
  alternatives_spanish:
  - me deleito
  - me agrada
  - me gozo
  lexicon: BDAG
  rationale: El verbo expresa aprobación gozosa o agrado positivo. 'Me complazco' conserva la fuerza voluntaria y paradójica del original sin sonar demasiado emocional o interpretativo.
- source_word: ἐν ἀσθενείαις
  english_pob_choice: in weaknesses
  chosen_spanish: en las debilidades
  alternatives_spanish:
  - en las flaquezas
  - en las enfermedades
  lexicon: BDAG
  rationale: El plural dativo con ἐν se mantiene como plural. 'Debilidades' refleja la amplitud semántica de ἀσθένεια mejor que restringirlo a enfermedad física.
- source_word: ἐν ὕβρεσιν
  english_pob_choice: in insults
  chosen_spanish: en los insultos
  alternatives_spanish:
  - en los ultrajes
  - en los agravios
  - en los abusos
  lexicon: BDAG
  rationale: ὕβρις aquí apunta a trato humillante o insultante. 'Insultos' es idiomático en español y conserva el tono de afrenta personal.
- source_word: ἐν ἀνάγκαις
  english_pob_choice: in hardships
  chosen_spanish: en las necesidades
  alternatives_spanish:
  - en las penurias
  - en las presiones
  - en las angustias
  lexicon: BDAG
  rationale: Se conserva la base léxica de ἀνάγκη como necesidad/constraint. 'Necesidades' sigue más de cerca el término griego que una paráfrasis como 'penurias', aunque la construcción suene menos natural; por eso se armoniza con el resto de la lista sin eliminar la tensión semántica.
- source_word: ἐν διωγμοῖς
  english_pob_choice: in persecutions
  chosen_spanish: en las persecuciones
  alternatives_spanish:
  - en los acosos
  lexicon: BDAG
  rationale: En Pablo, διωγμός es persecución sufrida por fidelidad a Cristo/Mesías. 'Persecuciones' es la correspondencia directa y clara.
- source_word: καὶ στενοχωρίαις
  english_pob_choice: and distresses
  chosen_spanish: y en las angustias
  alternatives_spanish:
  - y en las aflicciones
  - y en las dificultades
  - y en las estrecheces
  lexicon: BDAG
  rationale: στενοχωρία expresa presión, constricción o estrechez extrema. 'Angustias' comunica bien la intensidad en español, aunque no reproduce literalmente la imagen espacial; se mantiene la lista con repetición de ἐν implícita en español por fluidez.
- source_word: ὑπὲρ Χριστοῦ
  english_pob_choice: for the sake of Messiah
  chosen_spanish: por causa del Mesías
  alternatives_spanish:
  - por causa de Cristo
  - por el Mesías
  - a favor del Mesías
  lexicon: BDAG
  rationale: 'ὑπέρ aquí tiene valor causal/benefactivo: los sufrimientos se soportan por lealtad y en favor de la persona mencionada. Se conserva el término POB ''Mesías'' para Χριστός como título, siguiendo la decisión doctrinal del proyecto; ''por causa de'' expresa bien el sentido relacional y causal en español.'
- source_word: ὅταν γὰρ ἀσθενῶ
  english_pob_choice: for when I am weak
  chosen_spanish: porque cuando soy débil
  alternatives_spanish:
  - pues cuando soy débil
  - porque siempre que soy débil
  lexicon: BDAG
  rationale: ὅταν con presente subjuntivo tiene valor general. 'Porque cuando soy débil' mantiene la relación causal y la generalidad sin sobredeterminar el matiz temporal.
- source_word: τότε δυνατός εἰμι
  english_pob_choice: then I am strong
  chosen_spanish: entonces soy fuerte
  alternatives_spanish:
  - entonces soy poderoso
  - entonces estoy fuerte
  lexicon: BDAG
  rationale: δυνατός se traduce naturalmente como 'fuerte', en contraste directo con 'débil'. Esto preserva el paralelismo retórico y la paradoja paulina.
theological_decisions:
- issue: Χριστοῦ como título mesiánico
  english_pob_reading: for the sake of Messiah
  chosen_spanish_reading: por causa del Mesías
  alternative_spanish_readings:
  - por causa de Cristo
  - por causa del Ungido
  rationale: La lectura POB usa 'Messiah' para Χριστός cuando funciona como título. En español, 'Mesías' mantiene el valor titular y la resonancia judía del texto, sin ocultar la terminología original bajo una forma eclesiástica tradicional.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός / Christos → Mesías (cuando es título)'
- issue: Paradoja fuerza/debilidad en el cierre
  english_pob_reading: for when I am weak, then I am strong
  chosen_spanish_reading: porque cuando soy débil, entonces soy fuerte
  alternative_spanish_readings:
  - porque cuando estoy débil, entonces soy fuerte
  - pues cuando soy débil, entonces soy fuerte
  rationale: Se conserva la paradoja retórica sin suavizarla. 'Soy débil / soy fuerte' reproduce el contraste de identidad/estado que Pablo formula, sin introducir explicaciones doctrinales ajenas al versículo.
  doctrine_reference: Contexto paulino de 2 Corintios 12:9–10 sobre poder en la debilidad
translation_notes:
  revision_awareness: 'El texto inglés de trabajo pasó por una corrección de ida y vuelta sobre Χριστοῦ: primero se cambió a ''Christ'' por naturalidad epistolar y luego se restauró ''Messiah'' conforme a la política doctrinal del proyecto. La versión española sigue la lectura restaurada y la hace explícita con nota.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la terminología del proyecto, en vez de la forma tradicional 'Cristo'.
  - Se traduce ἀσθενείαις / ἀσθενῶ con el campo semántico de debilidad, no enfermedad, porque el contexto es retórico y existencial.
  - Se conserva la serie de preposiciones con una sintaxis española fluida, sin perder la enumeración de aflicciones.
  - '''Por causa de'' refleja mejor el valor causal/benefactivo de ὑπέρ que una equivalencia puramente literal como ''por''.'
