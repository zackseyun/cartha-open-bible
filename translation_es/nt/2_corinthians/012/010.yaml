review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: inferencia inicial, lista de padecimientos, motivo cristológico y paradoja final debilidad/fuerza. Sin embargo, ἐν ἀνάγκαις se aparta de la decisión auditada del POB (''hardships'') al traducirse como ''necesidades'', lo cual en español sugiere carencias materiales más estrechas y reduce el sentido contextual de presiones/dificultades apremiantes. Además, la nota [a] está mal anclada: comenta la alternativa de ''Mesías/Cristo'' pero aparece sobre ''debilidades'' en vez de sobre ''Mesías''.'
  spanish_quality_summary: El español es claro y digno, pero puede afinarse. 'Me complazco' es aceptable, aunque algo rígido; no exige cambio. 'Angustias' para στενοχωρίαις funciona bien. El principal problema de legibilidad/fidelidad es 'necesidades', que suena menos natural en esta serie y no refleja bien el valor contextual. También conviene corregir la distribución de notas para evitar confusión del lector.
  glossary_alignment: 'Alineación mayormente correcta con el glosario del proyecto: Χριστός se mantiene como ''Mesías'', ἀσθενείαις como ''debilidades'', διωγμοῖς como ''persecuciones''. La excepción importante es ἀνάγκαις, donde el POB inglés documentó ''hardships''; en español ''penurias'' o ''dificultades apremiantes'' se acercan mejor que ''necesidades''. La nota tradicional debe quedar vinculada a ''Mesías'', no a otra palabra.'
  issues:
  - severity: high
    issue: Traducción de ἐν ἀνάγκαις como 'en las necesidades'
    rationale: Aunque ἀνάγκη puede tener sentido básico de necesidad/obligación, en esta lista de sufrimientos el contexto exige algo como 'penurias', 'dificultades' o 'aflicciones apremiantes'. 'Necesidades' en español moderno suele leerse como carencias o necesidades básicas, y no corresponde a la decisión auditada 'hardships'.
  - severity: high
    issue: Nota [a] mal anclada en 'debilidades'
    rationale: La nota dice 'O, tradicionalmente, “por causa de Cristo”', pero esa alternativa corresponde a 'por causa del Mesías', no a 'debilidades'. Esto rompe la disciplina de anclaje de notas y puede inducir a error.
  - severity: medium
    issue: Redundancia/confusión en notas sobre 'Mesías'
    rationale: Hay dos notas separadas sobre Χριστός/Mesías ('por causa de Cristo' y explicación teológica de Mesías). Conviene conservar ambas solo si están correctamente ancladas y diferenciadas; de lo contrario recargan el texto. Aquí pueden mantenerse con anclajes correctos y razones distintas.
  revised_spanish_text: Por eso me complazco en las debilidades, en los insultos, en las penurias, en las persecuciones y en las angustias, por causa del Mesías[a][b]; porque cuando soy débil, entonces soy fuerte.
  revised_footnotes:
  - marker: a
    text: O, tradicionalmente, “por causa de Cristo”.
    reason: alternative_reading
  - marker: b
    text: Mesías traduce aquí Χριστός como título; “Cristo” es la forma tradicional.
    reason: theological_note
  revision_rationale: Se corrige 'necesidades' a 'penurias' para reflejar mejor ἀνάγκαις en este contexto de sufrimientos y para alinearse con la decisión auditada del POB ('hardships'). Se reubican las notas sobre Χριστός/Mesías al lugar correcto, anclándolas en 'Mesías'. Se eliminó la nota léxica sobre 'angustias' por no ser necesaria para la claridad y para evitar sobrecarga, ya que el español principal ya comunica bien στενοχωρίαις.
