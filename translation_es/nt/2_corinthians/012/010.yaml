revisions:
- from: Por eso me complazco en las debilidades[a], en los insultos, en las necesidades, en las persecuciones y en las angustias[b], por causa del Mesías[c]; porque cuando soy débil, entonces soy fuerte.
  to: Por eso me complazco en las debilidades, en los insultos, en las penurias, en las persecuciones y en las angustias, por causa del Mesías[a][b]; porque cuando soy débil, entonces soy fuerte.
  rationale: Se corrige 'necesidades' a 'penurias' para reflejar mejor ἀνάγκαις en este contexto de sufrimientos y para alinearse con la decisión auditada del POB ('hardships'). Se reubican las notas sobre Χριστός/Mesías al lugar correcto, anclándolas en 'Mesías'. Se eliminó la nota léxica sobre 'angustias' por no ser necesaria para la claridad y para evitar sobrecarga, ya que el español principal ya comunica bien στενοχωρίαις.
  reviewer_model: gpt-5.4
