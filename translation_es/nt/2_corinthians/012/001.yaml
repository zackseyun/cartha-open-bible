translation:
  language: es
  text: Jactarse[a] es necesario, aunque no es provechoso; pero pasaré ahora a visiones y revelaciones del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «gloriarse». El infinitivo griego funciona aquí como sustantivo; «jactarse» conserva el matiz de autoexaltación con un registro más natural y digno en español.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Καυχᾶσθαι
  english_pob_choice: Boasting
  chosen_spanish: Alardear
  alternatives_spanish:
  - Presumir
  - Jactarse
  lexicon: BDAG
  rationale: El infinitivo griego funciona aquí de manera sustantiva. En español, "alardear" conserva el matiz de autoexaltación o autoelogio con un tono algo más natural que un infinitivo nominalizado, y encaja bien con "es necesario".
- source_word: δεῖ
  english_pob_choice: is necessary
  chosen_spanish: es necesario
  alternatives_spanish:
  - debe
  - es preciso
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. "Es necesario" reproduce esa fuerza con un giro natural en español y evita endurecer innecesariamente el enunciado.
- source_word: οὐ συμφέρον μέν
  english_pob_choice: though it is not beneficial
  chosen_spanish: aunque no es provechoso
  alternatives_spanish:
  - aunque no es beneficioso
  - aunque no es útil
  lexicon: BDAG
  rationale: συμφέρω aquí comunica lo que resulta ventajoso o provechoso. "Aunque" refleja bien el valor concesivo de μέν...δέ, y "provechoso" mantiene el sentido de ventaja sin sonar demasiado técnico.
- source_word: ἐλεύσομαι δὲ
  english_pob_choice: but I will go on
  chosen_spanish: pero seguiré
  alternatives_spanish:
  - pero iré
  - pero continuaré
  lexicon: BDAG
  rationale: El futuro medio de ἔρχομαι con εἰς aquí introduce el paso a un nuevo tema. "Seguiré" comunica con naturalidad la progresión discursiva que el inglés POB expresa con "go on".
- source_word: εἰς ὀπτασίας
  english_pob_choice: to visions
  chosen_spanish: con visiones
  alternatives_spanish:
  - a visiones
  - hacia visiones
  lexicon: BDAG
  rationale: ὀπτασία significa visiones o experiencias visionarias. En español, "con visiones" suena más fluido para introducir el nuevo ámbito temático; la preposición no pretende añadir contenido, sino evitar una construcción rígida. El sentido básico permanece con "visiones".
- source_word: καὶ ἀποκαλύψεις
  english_pob_choice: and revelations
  chosen_spanish: y revelaciones
  alternatives_spanish:
  - y revelaciones divinas
  - y descubrimientos
  lexicon: BDAG
  rationale: ἀποκάλυψις en este contexto se refiere a revelaciones de origen divino. "Revelaciones" es el equivalente más estable y transparente en español.
- source_word: κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Jesús
  - de Yahvé
  lexicon: BDAG
  rationale: El genitivo puede entenderse como posesivo o de fuente. En español, "del Señor" conserva esa ambigüedad sin especificar indebidamente si la referencia es de procedencia o pertenencia. Se usa "Señor" por el uso tradicional de κύριος en este sintagma.
theological_decisions:
- issue: Relación del genitivo κυρίου con "visiones y revelaciones"
  english_pob_reading: of the Lord
  chosen_spanish_reading: del Señor
  alternative_spanish_readings:
  - procedentes del Señor
  - del Señor como posesión o fuente
  rationale: El griego no obliga a explicitar si las visiones y revelaciones son del Señor en sentido posesivo o si proceden de él. "Del Señor" preserva la reserva del texto y evita cerrar una ambigüedad significativa.
  doctrine_reference: Translation philosophy §3; tratamiento de κύριος como Señor en contexto cristológico y reverencial
translation_notes:
  revision_awareness: La redacción sigue el ajuste del POB inglés que coloca la cláusula concesiva antes de la principal y usa contraste con δέ. En español se mantuvo el paralelismo mediante «aunque»... «pero» y se evitó traducir mecánicamente como una secuencia pesada o redundante.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος, coherente con el uso del proyecto en este contexto.
  - Se eligió un español moderno y reverente, evitando calcos como «go on» o «beneficioso» cuando sonaban menos naturales.
  - La nota textual/lexical sobre el infinitivo sustantivado está anclada en la palabra principal para conservar la observación de sentido sin sobrecargar el verso.
