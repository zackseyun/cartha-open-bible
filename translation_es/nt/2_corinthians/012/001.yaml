  glossary_alignment: «del Señor» para κυρίου está bien y preserva la ambigüedad documentada. No hay conflicto con la terminología del proyecto en este versículo. La principal desviación terminológica está en καυχᾶσθαι, donde «jactarse» es mejor que «alardear» para un registro bíblico neutral y fiel.
