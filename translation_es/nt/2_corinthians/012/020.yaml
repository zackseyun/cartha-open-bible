translation:
  language: es
  text: Porque temo que quizá, cuando llegue, no los halle como quiero, y que yo resulte para ustedes como no quieren; no sea que haya discordia, celos, arrebatos de ira, ambiciones egoístas, difamaciones, murmuraciones[a], arrogancia y desorden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «chismes».
    reason: lexical_alternative
lexical_decisions:
- source_word: φοβοῦμαι
  english_pob_choice: I fear
  chosen_spanish: temo
  alternatives_spanish:
  - tengo miedo
  - me temo
  lexicon: BDAG
  rationale: «Temo» conserva el valor directo y presente de la preocupación de Pablo sin volverlo más emocional de lo que suena en el griego.
- source_word: μή πως
  english_pob_choice: that perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - que quizá
  - no sea que
  lexicon: BDAG
  rationale: En ambos miembros de la oración, el matiz es de posibilidad temida. «Quizá» mantiene la contingencia sin cargar la frase con una construcción demasiado pesada.
- source_word: ἐλθὼν
  english_pob_choice: when I come
  chosen_spanish: cuando vaya
  alternatives_spanish:
  - cuando venga
  - al venir
  lexicon: BDAG
  rationale: El participio aoristo es temporal; «cuando vaya» suena natural en español y preserva la referencia a la visita futura de Pablo.
- source_word: οὐχ οἵους θέλω
  english_pob_choice: not as I wish
  chosen_spanish: no os halle como quiero
  alternatives_spanish:
  - no os halle como deseo
  - no os encuentre como quiero
  lexicon: BDAG
  rationale: La construcción se refiere al estado o condición de los corintios. En español, «como quiero» reproduce la comparación de manera clara y natural.
- source_word: εὕρω ὑμᾶς
  english_pob_choice: I may find you
  chosen_spanish: os halle
  alternatives_spanish:
  - os encuentre
  lexicon: BDAG
  rationale: El subjuntivo tras la posibilidad temida pide un giro equivalente en español; «halle» mantiene el registro bíblico sin ser arcaizante en exceso.
- source_word: κἀγὼ εὑρεθῶ ὑμῖν
  english_pob_choice: and I may be found by you
  chosen_spanish: yo sea hallado por vosotros
  alternatives_spanish:
  - yo resulte para vosotros
  - vosotros me halléis
  lexicon: BDAG
  rationale: 'La pasiva conserva la reciprocidad del griego: así como Pablo puede «hallar» a la comunidad, él también puede ser «hallado» por ellos en una condición que no desean.'
- source_word: οἷον οὐ θέλετε
  english_pob_choice: to be as you do not wish
  chosen_spanish: como no queréis
  alternatives_spanish:
  - tal como no queréis
  - de la manera que no queréis
  lexicon: BDAG
  rationale: Resume con fidelidad la idea de que Pablo puede resultarles distinto de lo que desean encontrar.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: discordia
  alternatives_spanish:
  - pleito
  - contienda
  lexicon: BDAG
  rationale: «Discordia» expresa bien el conflicto relacional de la lista y funciona con naturalidad en español.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - zelos
  lexicon: BDAG
  rationale: En esta lista de vicios, el sentido negativo es claro. «Celos» comunica la rivalidad posesiva que encaja mejor en español corriente.
- source_word: θυμοί
  english_pob_choice: outbursts of anger
  chosen_spanish: arrebatos de ira
  alternatives_spanish:
  - exabruptos de ira
  - estallidos de ira
  lexicon: BDAG
  rationale: El plural sugiere episodios repetidos; «arrebatos de ira» transmite esa idea de explosiones de enojo.
- source_word: ἐριθεῖαι
  english_pob_choice: selfish ambition
  chosen_spanish: ambiciones egoístas
  alternatives_spanish:
  - rivalidades
  - afanes egoístas
  lexicon: BDAG
  rationale: La expresión describe la búsqueda interesada de preeminencia; «ambiciones egoístas» es clara y fiel sin perder fuerza moral.
- source_word: καταλαλιαί
  english_pob_choice: slanders
  chosen_spanish: difamaciones
  alternatives_spanish:
  - calumnias
  - habladurías
  lexicon: BDAG
  rationale: Designa palabra dañina contra otros. «Difamaciones» conserva el peso de la acusación verbal sin quedarse en una mera charla informal.
- source_word: ψιθυρισμοί
  english_pob_choice: whisperings
  chosen_spanish: murmuraciones
  alternatives_spanish:
  - chismes
  - susurros
  lexicon: BDAG
  rationale: El griego sugiere hablar en voz baja, a menudo de manera maliciosa. «Murmuraciones» permite mantener esa ambigüedad entre secreto y queja.
- source_word: φυσιώσεις
  english_pob_choice: conceit
  chosen_spanish: arrogancia
  alternatives_spanish:
  - vanagloria
  - presunción
  lexicon: BDAG
  rationale: La idea es la de estar inflado de sí mismo. «Arrogancia» comunica bien esa autoexaltación en español sin sonar artificial.
- source_word: ἀκαταστασίαι
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - confusión
  - tumulto
  lexicon: BDAG
  rationale: El cierre de la lista apunta a falta de orden y estabilidad comunitaria; «desorden» es la equivalencia más directa y amplia.
theological_decisions:
- issue: Alcance del temor de Pablo
  english_pob_reading: Paul fears mutual displeasure and the presence of communal vices, without specifying a doctrinal cause beyond the text.
  chosen_spanish_reading: Pablo teme encontrar a la comunidad en un estado moral y relacional que no desea, y teme también resultarles a ellos no deseable, sin añadir causas doctrinales que el versículo no menciona.
  alternative_spanish_readings:
  - Pablo teme principalmente tener que ejercer severidad apostólica
  - Pablo teme sobre todo la influencia de falsos maestros
  rationale: El versículo enumera directamente actitudes y conductas de ruptura. La traducción debe conservar esa tensión sin introducir una explicación más amplia que dependa del contexto posterior o de inferencias interpretativas.
  doctrine_reference: Mantener la tensión textual; no resolverla por amplificación contextual.
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado en inglés: no hubo revisiones pendientes y el acuerdo de revisión fue alto, por lo que esta propuesta sigue de cerca las decisiones léxicas validadas, adaptándolas al español con especial atención a la reciprocidad del verbo «hallar», la lista de vicios y el matiz de posibilidad temida.'
  spanish_consistency_notes:
  - Se mantiene «Pablo» implícito en la primera persona sin introducir explicaciones adicionales.
  - 'Se conservó la estructura recíproca del griego con dos verbos de hallazgo: «os halle» / «sea hallado por vosotros».'
  - La lista de vicios se tradujo con sustantivos concretos y de registro eclesial comprensible, evitando tecnicismos innecesarios.
  - El marcador [a] se ancla solo en «murmuraciones», donde el español admite una alternativa legítima con diferencia de matiz.
