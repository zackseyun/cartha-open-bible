source:
  edition: SBLGNT
  text: οἶδα ἄνθρωπον ἐν Χριστῷ πρὸ ἐτῶν δεκατεσσάρων— εἴτε ἐν σώματι οὐκ οἶδα, εἴτε ἐκτὸς τοῦ σώματος οὐκ οἶδα, ὁ θεὸς οἶδεν— ἁρπαγέντα τὸν τοιοῦτον ἕως τρίτου οὐρανοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/012/002.yaml
  text: I know a man in Messiah who[a], fourteen years ago—whether in the body I do not know, or outside the body I do not know[c][b], God knows—was caught up to the third heaven.
  footnotes:
  - marker: a
    text: Or, traditionally, 'in Christ.' The Greek is ἐν Χριστῷ; this draft renders the title as 'Messiah' to preserve its meaning.
    reason: alternative_reading
  - marker: b
    text: Paul explicitly does not say whether this happened in the body or outside the body; the text leaves the mode of the experience unresolved.
    reason: lexical_alternative
  - marker: c
    text: '''The third heaven'' reflects ancient Jewish cosmological language for the highest heaven or paradise; the translation preserves the expression rather than interpreting it.'
    reason: cultural_note
