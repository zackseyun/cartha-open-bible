    changes_summary: 'Changed ''in Messiah'' to ''in Christ'' for more standard formal rendering of ἐν Χριστῷ in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Sé de un hombre en Mesías[a] que, hace catorce años—si fue en el cuerpo no lo sé; si fuera del cuerpo no lo sé, Dios lo sabe—fue arrebatado hasta el tercer cielo[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «en Cristo». El griego es ἐν Χριστῷ; esta traducción vierte el título como «Mesías» para preservar su sentido.
    reason: alternative_reading
  - marker: b
    text: Pablo no dice si esto ocurrió en el cuerpo o fuera del cuerpo; el texto deja sin resolver la modalidad de la experiencia.
    reason: lexical_alternative
  - marker: c
    text: «El tercer cielo» refleja el lenguaje cosmológico judío antiguo para el cielo más alto o el paraíso; la traducción conserva la expresión en vez de interpretarla.
    reason: cultural_note
lexical_decisions:
- source_word: οἶδα
  english_pob_choice: I know
  chosen_spanish: Conozco
  alternatives_spanish:
  - Sé
  lexicon: BDAG
  rationale: οἶδα tiene sentido perfecto con valor presente. En español, ‘conozco’ comunica mejor una relación o conocimiento personal y mantiene un tono natural sin perder el valor de certeza.
- source_word: ἄνθρωπον
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - una persona
  - alguien
  lexicon: BDAG
  rationale: El sustantivo es masculino singular y el contexto paulino apunta a una referencia personal concreta. ‘Un hombre’ preserva la referencia gramatical y la ambigüedad deliberada del pasaje.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva el título mesiánico según la política del proyecto para Χριστός. En español, ‘en Mesías’ suena menos idiomático que ‘en Cristo’, pero refleja la decisión lexical/documentada del POB y evita aplanar el título a una forma tradicional fija.
- source_word: πρὸ ἐτῶν δεκατεσσάρων
  english_pob_choice: fourteen years ago
  chosen_spanish: hace catorce años
  alternatives_spanish:
  - catorce años atrás
  - desde hace catorce años
  lexicon: BDAG
  rationale: La construcción idiomática en español para πρό con genitivo temporal es ‘hace catorce años’. Mantiene el valor temporal sin calcar la sintaxis griega.
- source_word: εἴτε ἐν σώματι
  english_pob_choice: whether in the body
  chosen_spanish: si fue en el cuerpo
  alternatives_spanish:
  - si estaba en el cuerpo
  - si en el cuerpo
  lexicon: BDAG
  rationale: La cláusula expresa incertidumbre sobre la modalidad de la experiencia. ‘Si fue en el cuerpo’ conserva la alternancia con la segunda cláusula y suena natural en español, sin resolver el asunto.
- source_word: ἐκτὸς τοῦ σώματος
  english_pob_choice: outside the body
  chosen_spanish: fuera del cuerpo
  alternatives_spanish:
  - apartado del cuerpo
  - ajeno al cuerpo
  lexicon: BDAG
  rationale: ‘Fuera del cuerpo’ reproduce con claridad el contraste espacial de ἐκτός + genitivo y se ajusta al paralelismo con ‘en el cuerpo’.
- source_word: ὁ θεὸς οἶδεν
  english_pob_choice: God knows
  chosen_spanish: Dios lo sabe
  alternatives_spanish:
  - Solo Dios lo sabe
  - Dios sabe
  lexicon: BDAG
  rationale: La cláusula afirma que Dios posee ese conocimiento. ‘Dios lo sabe’ es la forma más directa y natural en español; evita añadir ‘solo’ porque no está explícito en el griego.
- source_word: ἁρπαγέντα
  english_pob_choice: was caught up
  chosen_spanish: fue arrebatado
  alternatives_spanish:
  - fue llevado abruptamente
  - fue raptado
  lexicon: BDAG
  rationale: El aoristo pasivo participial expresa una acción súbita de traslado. ‘Fue arrebatado’ es el equivalente bíblico más exacto y preserva la fuerza de ἁρπάζω sin volverlo demasiado interpretativo.
- source_word: τὸν τοιοῦτον
  english_pob_choice: that man
  chosen_spanish: a ese hombre
  alternatives_spanish:
  - a tal hombre
  - a ese mismo
  lexicon: BDAG
  rationale: El demostrativo retoma al hombre previamente mencionado sin introducir un nuevo referente. ‘A ese hombre’ conserva la referencia y evita una traducción demasiado interpretativa como ‘ese hombre’ en nominativo.
- source_word: ἕως τρίτου οὐρανοῦ
  english_pob_choice: to the third heaven
  chosen_spanish: hasta el tercer cielo
  alternatives_spanish:
  - al tercer cielo
  - hasta el cielo tercero
  lexicon: BDAG
  rationale: ‘Hasta’ refleja ἕως de manera natural y preserva la idea de destino/alcance. ‘Tercer cielo’ mantiene la expresión cosmológica antigua sin explicarla en el cuerpo del texto.
theological_decisions:
- issue: Rendering of Χριστῷ
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se sigue la decisión del POB de traducir Χριστός como título mesiánico cuando el contexto lo permite. En español esto implica una construcción menos idiomática, pero más transparente respecto del término subyacente y de la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Unresolved mode of Paul's experience
  english_pob_reading: Paul explicitly does not say whether this happened in the body or outside the body; the text leaves the mode of the experience unresolved.
  chosen_spanish_reading: La traducción conserva la incertidumbre sin decidir si la experiencia fue corporal o extracorporal.
  alternative_spanish_readings:
  - visión en el cuerpo
  - ascenso corporal
  - experiencia fuera del cuerpo
  rationale: El griego repite la negación de conocimiento y atribuye el saber a Dios. La traducción debe mantener esa tensión y no resolverla con una interpretación que el texto no afirma.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: una versión intermedia cambió Χριστῷ a «Cristo», pero el ajuste posterior restauró «Mesías» por coherencia con la política del proyecto. También se preservó la tensión interpretativa sobre si la experiencia fue en el cuerpo o fuera del cuerpo, y se mantuvo la expresión cosmológica «tercer cielo» sin explicación en el texto principal.'
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός conforme al criterio del proyecto, aun cuando la forma sea menos idiomática en español.
  - Se eligió «fue arrebatado» para ἁρπαγέντα porque en español bíblico transmite bien el traslado súbito sin perder solemnidad.
  - Se mantuvo la ambigüedad sobre el modo de la experiencia con una estructura paralela en español.
  - Se prefirió «Dios lo sabe» como equivalente natural de ὁ θεὸς οἶδεν, sin añadir ‘solo’.
  - Se conservó «tercer cielo» como expresión culturalmente marcada, no como interpretación doctrinal.
