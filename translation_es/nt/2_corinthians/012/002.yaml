  rationale: Se reemplaza «Conozco a un hombre» por «Sé de un hombre» para reflejar mejor οἶδα en este contexto y mejorar la naturalidad del español sin alterar el sentido ni la ambigüedad del pasaje. Se conservan la terminología del proyecto y las notas existentes.
