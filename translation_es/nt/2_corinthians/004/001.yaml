translation:
  language: es
  text: Por tanto, ya que tenemos este ministerio, ya que hemos recibido misericordia,[a] no desmayamos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''se nos mostró misericordia''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''no nos desanimamos'' o ''no nos cansamos''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὰ τοῦτο
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad la relación inferencial del griego y mantiene el peso argumentativo del contexto anterior sin sonar mecánico.
- source_word: ἔχοντες
  english_pob_choice: since we have
  chosen_spanish: como tenemos
  alternatives_spanish:
  - puesto que tenemos
  - ya que tenemos
  lexicon: BDAG
  rationale: El participio presente introduce la circunstancia que fundamenta la acción principal; 'como tenemos' conserva ese valor causal/circunstancial en un español fluido.
- source_word: τὴν διακονίαν ταύτην
  english_pob_choice: this ministry
  chosen_spanish: este ministerio
  alternatives_spanish:
  - este servicio
  - esta labor de ministerio
  lexicon: BDAG
  rationale: En contexto paulino, διακονία se refiere al ministerio apostólico del evangelio; 'ministerio' es la equivalencia más natural y fiel en español.
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: según
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: 'Aquí el sentido es de correspondencia o base: la posesión del ministerio está medida por la misericordia recibida. ''Según'' permite conservar esa relación sin sobrecargar el verso.'
- source_word: ἠλεήθημεν
  english_pob_choice: we have received mercy
  chosen_spanish: hemos recibido misericordia
  alternatives_spanish:
  - se nos mostró misericordia
  - fuimos tratados con misericordia
  lexicon: BDAG
  rationale: El aoristo pasivo comunica una misericordia recibida de parte de Dios; 'hemos recibido misericordia' preserva la voz pasiva teológica y su relevancia continua.
- source_word: οὐκ ἐγκακοῦμεν
  english_pob_choice: we do not lose heart
  chosen_spanish: no desmayamos
  alternatives_spanish:
  - no nos desanimamos
  - no perdemos el ánimo
  - no nos cansamos
  lexicon: BDAG
  rationale: ἐγκακέω puede abarcar desánimo, cansancio o renuncia; 'no desmayamos' es una equivalencia bíblica clara y digna que comunica la idea de no ceder al desaliento.
theological_decisions:
- issue: Valor del pasivo divino en ἠλεήθημεν
  english_pob_reading: The passive implies that God showed mercy to Paul and his companions, grounding their possession of ministry in divine mercy rather than personal merit.
  chosen_spanish_reading: El pasivo sugiere que Dios les mostró misericordia, de modo que el ministerio no nace de mérito personal sino de la misericordia recibida.
  alternative_spanish_readings:
  - Hemos obtenido misericordia, sin explicitar el agente.
  - Recibimos misericordia en un sentido más general.
  rationale: La frase española conserva el sujeto implícito del acto misericordioso sin introducir elementos ajenos al texto, y mantiene la base teológica paulina del ministerio como don de gracia.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Alcance de ἐγκακοῦμεν
  english_pob_reading: we do not lose heart
  chosen_spanish_reading: no desmayamos
  alternative_spanish_readings:
  - no nos desanimamos
  - no nos agotamos
  - no nos damos por vencidos
  rationale: El contexto favorece la idea de no ceder interiormente al desaliento; 'no desmayamos' preserva esa fuerza sin reducir el sentido solo al cansancio físico.
  doctrine_reference: Affirmations; lexical context
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el flujo argumentativo del griego: inferencia inicial, participio circunstancial, ministerio apostólico, comparación/basamento en la misericordia recibida y negación final de desaliento. Se privilegió un español natural y digno, con ''misericordia'' y ''no desmayamos'' como equivalentes idiomáticos bien asentados.'
  spanish_consistency_notes:
  - Se conserva 'ministerio' para διακονία conforme al uso paulino.
  - Se evita 'Señor' o máscara equivalente porque no aparece el léxico divino en este versículo.
  - '''Misericordia'' mantiene el campo semántico de ἐλεάω sin convertirlo en simple ''favor''.'
  - '''No desmayamos'' comunica el resultado interior de ἐγκακέω con registro bíblico y comprensible.'
