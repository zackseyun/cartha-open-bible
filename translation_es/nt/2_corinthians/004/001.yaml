- from: Por tanto, como tenemos este ministerio, según hemos recibido misericordia, no desmayamos.
  to: Por tanto, ya que tenemos este ministerio, ya que hemos recibido misericordia,[a] no desmayamos.[b]
  rationale: Se reemplaza 'como ... según' por una estructura causal más natural en español que preserva la fuerza circunstancial del participio ἔχοντες y la base expresada por καθὼς ἠλεήθημεν. Se añaden notas para conservar las alternativas léxicas que el rastro de auditoría inglés preservó para 'we were shown mercy' y 'we do not grow weary / become discouraged'.
