translation:
  language: es
  text: Por eso no nos desanimamos. Pero aunque nuestro hombre[a] exterior se va desgastando, nuestro hombre interior se renueva día tras día.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestro ser exterior» y «nuestro ser interior». El griego usa «hombre» en sentido representativo y establece un contraste deliberado entre la vida humana exterior y la interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Así que
  - Por lo tanto
  lexicon: BDAG
  rationale: Expresa la conclusión inferida del argumento anterior de manera natural en español, con un tono sobrio y fiel al valor consecutivo de διό.
- source_word: οὐκ ἐγκακοῦμεν
  english_pob_choice: we do not lose heart
  chosen_spanish: no nos desanimamos
  alternatives_spanish:
  - no perdemos el ánimo
  - no nos damos por vencidos
  lexicon: BDAG
  rationale: En español, «desanimarse» comunica bien el sentido paulino de no perder valor o firmeza interior sin sonar forzado. Se evita una traducción demasiado literal que no fluiría con naturalidad.
- source_word: ὁ ἔξω ἡμῶν ἄνθρωπος
  english_pob_choice: our outer man
  chosen_spanish: nuestro hombre exterior
  alternatives_spanish:
  - nuestro ser exterior
  - nuestra persona exterior
  - nuestro hombre de fuera
  lexicon: BDAG
  rationale: Se conserva la correspondencia deliberada con «hombre interior» y el sustantivo representativo ἄνθρωπος, siguiendo la decisión POB de mantener la forma «man/hombre» por transparencia léxica y paralelismo paulino.
- source_word: διαφθείρεται
  english_pob_choice: is wasting away
  chosen_spanish: se va desgastando
  alternatives_spanish:
  - se está corrompiendo
  - se va deteriorando
  - se va consumiendo
  lexicon: BDAG
  rationale: La forma presente pasiva indica un proceso continuo de deterioro. «Se va desgastando» comunica bien esa progresión física o vital sin cargar demasiado el verbo con una connotación moral que el contexto no exige.
- source_word: ὁ ἔσω ἡμῶν
  english_pob_choice: our inner man
  chosen_spanish: el hombre interior
  alternatives_spanish:
  - nuestro ser interior
  - nuestro hombre interior
  - el hombre de dentro
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «hombre exterior» y se respeta la formulación paulina. En español, omitir el posesivo aquí evita redundancia y sigue siendo natural, mientras conserva el contraste antropológico del texto.
- source_word: ἀνακαινοῦται
  english_pob_choice: is being renewed
  chosen_spanish: se renueva
  alternatives_spanish:
  - está siendo renovado
  - va siendo renovado
  - se va renovando
  lexicon: BDAG
  rationale: El presente pasivo se expresa de modo claro y natural como proceso continuo. «Se renueva» es idiomático en español y suficientemente abierto para mantener la acción en curso.
- source_word: ἡμέρᾳ καὶ ἡμέρᾳ
  english_pob_choice: day by day
  chosen_spanish: día tras día
  alternatives_spanish:
  - día por día
  - cada día
  - de día en día
  lexicon: BDAG
  rationale: Reproduce la idea distributiva de repetición continua con una fórmula idiomática y elegante en español.
theological_decisions:
- issue: Contraste antropológico entre «hombre exterior» e «hombre interior»
  english_pob_reading: Rendered as 'outer man' / 'inner man' without importing a full body-soul dualism beyond Paul's stated contrast.
  chosen_spanish_reading: «hombre exterior» / «hombre interior» como contraste retórico y antropológico, sin convertirlo en una antropología técnica más allá del texto.
  alternative_spanish_readings:
  - ser exterior / ser interior
  - persona exterior / persona interior
  - naturaleza exterior / naturaleza interior
  rationale: La formulación paulina presenta una oposición entre deterioro externo y renovación interna. Mantener «hombre» preserva la metáfora y el eco intertextual, sin forzar una explicación doctrinal que el versículo no desarrolla.
  doctrine_reference: Anthropology in Pauline correspondence; contrast of outer and inner person without over-specification.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios textuales; el pasaje quedó estable. La versión española sigue esa lectura estable y mantiene el paralelismo léxico y retórico del original griego.
  spanish_consistency_notes:
  - Se usa «Por eso» para el valor inferencial de Διὸ, en lugar de una calca rígida.
  - Se conserva la pareja «hombre exterior / hombre interior» por consistencia con la elección POB y por fidelidad al paralelismo de ἄνθρωπος.
  - «Se va desgastando» y «se renueva» mantienen el aspecto de proceso continuo en ambos verbos.
  - Se emplea «día tras día» como equivalente natural de la repetición distributiva ἡμέρᾳ καὶ ἡμέρᾳ.
  - La nota al pie se ancla en «hombre exterior» para ofrecer la alternativa léxica documentada sin alterar el texto principal.
