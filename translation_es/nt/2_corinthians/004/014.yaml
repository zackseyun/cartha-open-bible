translation:
  language: es
  text: pues sabemos que el que resucitó a Jesús también nos resucitará con Jesús y nos presentará con ustedes[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Señor Jesús» en vez de «Jesús».
    reason: textual_variant
lexical_decisions:
- source_word: εἰδότες
  english_pob_choice: because we know
  chosen_spanish: pues sabemos
  alternatives_spanish:
  - porque sabemos
  - ya que sabemos
  lexicon: BDAG
  rationale: El participio perfecto de οἶδα funciona causalmente en contexto. «Pues sabemos» conserva el valor de fundamento de la frase sin volverla rígidamente participial en español.
- source_word: ὁ ἐγείρας
  english_pob_choice: the one who raised
  chosen_spanish: el que resucitó
  alternatives_spanish:
  - el que levantó
  - el que hizo resucitar
  lexicon: BDAG
  rationale: En este contexto de resurrección, «resucitó» comunica naturalmente el acto de Dios. «Levantó» es más literal pero menos claro en español bíblico actual; «hizo resucitar» añade una perífrasis que el griego no exige.
- source_word: τὸν Ἰησοῦν
  english_pob_choice: Jesus
  chosen_spanish: a Jesús
  alternatives_spanish:
  - a Jesús el Señor
  lexicon: SBLGNT
  rationale: El texto crítico base lee «Ἰησοῦν» sin κύριος. Por eso se mantiene simplemente «Jesús»; no se incorpora «Señor» sin apoyo del texto principal.
- source_word: καὶ ἡμᾶς
  english_pob_choice: will also raise us
  chosen_spanish: también nos resucitará
  alternatives_spanish:
  - nos resucitará también
  - nos levantará también
  lexicon: BDAG
  rationale: El futuro con ἐγερεῖ se expresa de modo natural con «resucitará». «También» conserva el matiz aditivo del καί.
- source_word: σὺν Ἰησοῦ
  english_pob_choice: with Jesus
  chosen_spanish: con Jesús
  alternatives_spanish:
  - junto con Jesús
  lexicon: BDAG
  rationale: σύν con dativo indica compañía o asociación; «con Jesús» es la forma más directa y natural en español.
- source_word: παραστήσει
  english_pob_choice: will present
  chosen_spanish: nos presentará
  alternatives_spanish:
  - nos pondrá delante
  - nos colocará ante
  lexicon: BDAG
  rationale: «Presentará» conserva la idea de poner delante o comparecer, sin especificar más de lo que el verbo griego permite. Se evita sobrecargarlo con una escena jurídica explícita.
- source_word: σὺν ὑμῖν
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - junto con ustedes
  lexicon: BDAG
  rationale: Se mantiene la asociación comunitaria del preposición σύν. «Ustedes» adapta el plural al español latinoamericano neutral y comunica la referencia directa a los corintios.
theological_decisions:
- issue: Alcance de la resurrección compartida
  english_pob_reading: the one who raised Jesus will also raise us with Jesus
  chosen_spanish_reading: el que resucitó a Jesús también nos resucitará con Jesús
  alternative_spanish_readings:
  - el que levantó a Jesús también nos levantará con Jesús
  - el que hizo resucitar a Jesús también nos hará resucitar con Jesús
  rationale: La frase mantiene la esperanza pascual compartida entre Jesús y los creyentes, sin añadir detalles doctrinales que el versículo no explicita. «Resucitar» es el término español más claro para esta relación teológica.
  doctrine_reference: resurrección de los muertos; vida futura en unión con Cristo
- issue: Eschatological presentation before God
  english_pob_reading: will present us with you
  chosen_spanish_reading: nos presentará con ustedes
  alternative_spanish_readings:
  - nos pondrá delante con ustedes
  - nos hará comparecer con ustedes
  rationale: El verbo permanece abierto a la escena escatológica de comparecencia/presentación, sin precisar tribunal o audiencia más allá de la evidencia textual. Así se conserva la tensión semántica de παραστήσει.
  doctrine_reference: Apostolic Creed; Nicene Creed (resurrección de los muertos)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego de SBLGNT, corrigiendo cualquier posible lectura expandida con κύριος en favor de «Jesús», conforme al expediente de revisión. Se conservó la fuerza causal del participio εἰδότες y el matiz de compañía de σύν en ambos segmentos.
  spanish_consistency_notes:
  - Se usa «Jesús» de forma uniforme para τὸν Ἰησοῦν y σὺν Ἰησοῦ.
  - Se prefirió «resucitar» para ἐγείρω por tratarse del campo semántico dominante en el versículo.
  - «Con ustedes» mantiene el registro neutral latinoamericano y la referencia directa a los corintios.
  - La nota textual se ancla solo en la variante documentada del nombre de Jesús.
