review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: contraste inicial, renuncia decidida, rechazo de conducta astuta, no manipular la palabra de Dios, y recomendación del ministerio por la manifestación de la verdad ante la conciencia humana delante de Dios. Sin embargo, la nota al pie está mal formulada: ofrece como alternativa exactamente la misma expresión ya usada en el texto, cuando el expediente inglés preserva como alternativa la idea más dinámica de hacer visible/poner de manifiesto la verdad. También conviene ajustar levemente la redacción principal para mayor naturalidad y precisión idiomática en español.'
  spanish_quality_summary: El texto es mayormente claro, fiel y digno. 'En cambio' funciona, aunque 'más bien' suena algo más natural con ἀλλὰ aquí. 'Las cosas ocultas de la vergüenza' es comprensible pero algo rígido; 'las cosas ocultas y vergonzosas' fluye mejor en español sin traicionar el sentido. 'Andando en astucia' es aceptable, aunque 'procediendo con astucia' evita una construcción algo forzada. 'Adulterando la palabra de Dios' es una buena elección léxica y preserva el matiz de manipulación engañosa. La nota al pie actual necesita corrección.
  glossary_alignment: No hay conflictos con la terminología del proyecto. θεοῦ -> 'Dios' está correcto. No aparecen Yahvé, Mesías, δοῦλος, etc. La elección 'adulterando' para δολοῦντες concuerda con la alternativa documentada del POB y es defendible en español.
  issues:
  - severity: medium
    issue: La nota al pie [a] repite la misma frase del texto en lugar de ofrecer una alternativa real.
    rationale: 'El texto principal ya dice ''manifestación[a] de la verdad'', pero la nota dice ''O: «la manifestación de la verdad»''. Eso no preserva la función de alternativa léxica del expediente inglés, que distingue entre ''open display/manifestation'' y una formulación más dinámica sobre hacer visible la verdad.'
  - severity: low
    issue: '''Las cosas ocultas de la vergüenza'' suena demasiado calcado en español.'
    rationale: Aunque es bastante fiel al genitivo griego, en español eclesial general 'las cosas ocultas y vergonzosas' comunica mejor la idea de prácticas ocultas caracterizadas por vergüenza, sin pérdida material de sentido.
  - severity: low
    issue: '''No andando en astucia'' es entendible pero menos natural que una formulación más idiomática.'
    rationale: El participio περιπατοῦντες puede conservarse metafóricamente, pero en este contexto defensivo 'no procediendo con astucia' o 'no caminando con astucia' suena más natural que 'andando en astucia'.
  revised_spanish_text: Más bien, hemos renunciado a las cosas ocultas y vergonzosas, no procediendo con astucia ni adulterando la palabra de Dios, sino mediante la manifestación de la verdad[a], recomendándonos a toda conciencia humana delante de Dios.
  revised_footnotes:
  - marker: a
    text: 'O: «al hacer visible la verdad». El griego puede subrayar el hacer patente la verdad más que la proclamación verbal en sí.'
    reason: lexical_alternative
  revision_rationale: Se corrige la nota al pie para que aporte una alternativa real y fiel al expediente inglés. Además, se suavizan dos giros algo calcados ('cosas ocultas de la vergüenza', 'andando en astucia') con español más natural y igualmente fiel al griego. Se conserva 'adulterando la palabra de Dios' por su buena correspondencia con δολοῦντες.
