revisions:
- from: En cambio, hemos renunciado a las cosas ocultas de la vergüenza, no andando en astucia ni adulterando la palabra de Dios, sino mediante la manifestación[a] de la verdad, recomendándonos a toda conciencia humana delante de Dios.
  to: Más bien, hemos renunciado a las cosas ocultas y vergonzosas, no procediendo con astucia ni adulterando la palabra de Dios, sino mediante la manifestación de la verdad[a], recomendándonos a toda conciencia humana delante de Dios.
  rationale: Se corrige la nota al pie para que aporte una alternativa real y fiel al expediente inglés. Además, se suavizan dos giros algo calcados ('cosas ocultas de la vergüenza', 'andando en astucia') con español más natural y igualmente fiel al griego. Se conserva 'adulterando la palabra de Dios' por su buena correspondencia con δολοῦντες.
