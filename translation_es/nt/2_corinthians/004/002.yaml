translation:
  language: es
  text: Más bien, hemos renunciado a las cosas ocultas y vergonzosas, no procediendo con astucia ni adulterando la palabra de Dios, sino mediante la manifestación de la verdad[a], recomendándonos a toda conciencia humana delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al hacer visible la verdad». El griego puede subrayar el hacer patente la verdad más que la proclamación verbal en sí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπειπάμεθα
  english_pob_choice: we have renounced
  chosen_spanish: hemos renunciado
  alternatives_spanish:
  - hemos repudiado
  - hemos rechazado
  lexicon: BDAG
  rationale: El aoristo medio expresa una renuncia decidida. 'Hemos renunciado' conserva ese valor enfático y suena natural en español bíblico contemporáneo.
- source_word: τὰ κρυπτὰ τῆς αἰσχύνης
  english_pob_choice: the hidden things of shame
  chosen_spanish: las cosas ocultas de la vergüenza
  alternatives_spanish:
  - las cosas secretas de la vergüenza
  - los actos ocultos vergonzosos
  lexicon: BDAG
  rationale: Mantiene la estructura genitiva y el peso de algo oculto caracterizado por vergüenza. 'Vergüenza' comunica el campo semántico con suficiente claridad sin forzar una interpretación más intensa que el griego no exige.
- source_word: περιπατοῦντες
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - viviendo
  - conduciéndonos
  lexicon: BDAG
  rationale: Pablo usa con frecuencia 'caminar' en sentido figurado para la conducta. 'Andando' preserva ese rasgo idiomático en español sin sonar rígido.
- source_word: ἐν πανουργίᾳ
  english_pob_choice: in cunning
  chosen_spanish: en astucia
  alternatives_spanish:
  - con engaño astuto
  - con craftiness
  lexicon: BDAG
  rationale: πανουργία denota habilidad sin escrúpulos o astucia engañosa. 'Astucia' es breve y adecuada; evita suavizar el matiz moral negativo del término.
- source_word: δολοῦντες
  english_pob_choice: falsifying
  chosen_spanish: adulterando
  alternatives_spanish:
  - falsificando
  - corrompiendo
  lexicon: BDAG
  rationale: El verbo sugiere manipulación engañosa de algo valioso. 'Adulterando' comunica bien la idea de mezclar o alterar fraudulentamente la palabra de Dios; es una opción fuerte y fiel al sentido de tampering.
- source_word: τὸν λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - la palabra de Yahvé
  lexicon: BDAG
  rationale: '''Palabra de Dios'' es la forma más directa y transparente; preserva la amplitud de λόγος sin especificar indebidamente si se trata del mensaje predicado o de la palabra divina en sentido más amplio.'
- source_word: τῇ φανερώσει τῆς ἀληθείας
  english_pob_choice: by the open display of the truth
  chosen_spanish: mediante la manifestación[a] de la verdad
  alternatives_spanish:
  - mediante el despliegue de la verdad
  - mediante la clara manifestación de la verdad
  lexicon: BDAG
  rationale: φανέρωσις denota hacer visible o patente. 'Manifestación' conserva ese valor de revelación/disclosure mejor que una paráfrasis más verbal; el contexto permite entender una verdad hecha patente públicamente.
- source_word: συνιστάνοντες ἑαυτοὺς
  english_pob_choice: commending ourselves
  chosen_spanish: recomendándonos
  alternatives_spanish:
  - comprobándonos
  - presentándonos favorablemente
  lexicon: BDAG
  rationale: En este contexto συνίστημι significa presentarse de manera favorable o recomendarse. 'Recomendándonos' es idiomático en español y mantiene el matiz paulino sin sugerir vanagloria gratuita.
- source_word: πρὸς πᾶσαν συνείδησιν ἀνθρώπων
  english_pob_choice: to every human conscience
  chosen_spanish: a toda conciencia humana
  alternatives_spanish:
  - a toda conciencia de los hombres
  - a la conciencia de toda persona
  lexicon: BDAG
  rationale: La frase apunta al examen ante la conciencia moral de cada persona. 'Toda conciencia humana' conserva el distributivo πᾶσαν y el carácter general de ἀνθρώπων con español natural.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' mantiene la idea de estar bajo la mirada y el juicio divinos. Es una forma clara y solemne en español bíblico contemporáneo.'
theological_decisions:
- issue: Alcance ético de la afirmación de Pablo sobre su ministerio
  english_pob_reading: The verse describes ethical transparency in ministry rather than making a narrower doctrinal claim about inspiration, sacramental action, or ecclesial office.
  chosen_spanish_reading: El versículo describe la transparencia ética en el ministerio, no una afirmación doctrinal más estrecha sobre inspiración, acción sacramental u ოფicio eclesial.
  alternative_spanish_readings:
  - Una condena solo de la manipulación retórica
  - Una declaración doctrinal amplia sobre todo el manejo de la Escritura
  rationale: El contexto inmediato trata de la conducta apostólica y de la manera de proclamar la verdad. La redacción española debe conservar ese alcance sin añadir un marco doctrinal no explícito en el texto.
  doctrine_reference: 2 Corintios 4:1-2; integridad ministerial y veracidad apostólica
translation_notes:
  revision_awareness: He seguido la revisión inglesa más reciente, que prefirió 'open display' para φανέρωσις en lugar de una traducción centrada solo en la proclamación verbal. En español, por eso se usa 'manifestación' y no un término restringido a predicación oral.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'palabra de Dios' para λόγος τοῦ θεοῦ, sin sustituir por una fórmula litúrgica masking.
  - '''Astucia'' conserva el matiz negativo de πανουργία, mientras ''adulterando'' expresa el tampering engañoso de δολοῦντες.'
  - '''Delante de Dios'' reproduce el marco de testimonio/presencia divina de ἐνώπιον τοῦ θεοῦ.'
  - Se evitó 'Cristo' porque no aparece en el versículo; también se evitó 'Señor' por no corresponder al griego aquí.
