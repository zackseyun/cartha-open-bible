base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/002.yaml
  text: Instead[a], we have renounced the hidden things of shame, not walking in cunning nor falsifying the word of God[b], but by the open display of the truth commending ourselves to every human conscience before God.
  footnotes:
