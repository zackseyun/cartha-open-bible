translation:
  language: es
  text: Porque todas las cosas son por causa de ustedes, para que la gracia, al aumentar por medio de más y más personas[a], haga que la acción de gracias abunde para la gloria de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “por medio de muchos” o “por medio de un mayor número”. El griego puede referirse ya sea a muchas personas en general o a un número creciente de personas.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto existe
  lexicon: BDAG
  rationale: La expresión articular neutra plural abarca de manera total y comprehensiva. "Todas las cosas" conserva esa amplitud en español sin restringir el sentido.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: para su bien
  alternatives_spanish:
  - por ustedes
  - para ustedes
  lexicon: BDAG
  rationale: διά con acusativo expresa beneficio o ventaja. "Para su bien" transmite con naturalidad ese beneficio en español y evita la ambigüedad de "por ustedes".
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - de modo que
  - a fin de que
  lexicon: BDAG
  rationale: Introduce una cláusula de propósito o resultado. "Para que" es la opción natural y fiel en español.
- source_word: ἡ χάρις
  english_pob_choice: grace
  chosen_spanish: la gracia
  alternatives_spanish:
  - gracia
  - el favor
  lexicon: BDAG
  rationale: Se conserva el sustantivo teológico tradicional en español. El artículo se mantiene porque aparece en el griego y la frase funciona bien con él.
- source_word: πλεονάσασα
  english_pob_choice: increases
  chosen_spanish: al aumentar
  alternatives_spanish:
  - al crecer
  - al abundar
  - habiendo aumentado
  lexicon: BDAG
  rationale: El participio aoristo modifica a "la gracia" y expresa incremento. "Al aumentar" suena natural en español y preserva la imagen de crecimiento.
- source_word: διὰ τῶν πλειόνων
  english_pob_choice: through more and more people
  chosen_spanish: por medio de muchos
  alternatives_spanish:
  - por medio de más y más personas
  - por medio de un mayor número
  - por medio de los muchos
  lexicon: BDAG
  rationale: La expresión puede referirse a muchas personas o a un número creciente. "Por medio de muchos" mantiene la amplitud y la ambigüedad documentada, sin forzar una precisión que el griego no exige.
- source_word: τὴν εὐχαριστίαν
  english_pob_choice: thanksgiving
  chosen_spanish: la acción de gracias
  alternatives_spanish:
  - el agradecimiento
  - la gratitud
  lexicon: BDAG
  rationale: El sustantivo se refiere a la respuesta de agradecimiento dirigida a Dios. "Acción de gracias" reproduce bien esa idea en español bíblico contemporáneo.
- source_word: περισσεύσῃ
  english_pob_choice: may overflow
  chosen_spanish: haga que abunde
  alternatives_spanish:
  - rebose
  - desborde
  - sobreabunde
  lexicon: BDAG
  rationale: El verbo comunica abundancia superabundante. "Haga que abunde" expresa el desbordamiento resultante de manera clara y bíblica en español.
- source_word: εἰς τὴν δόξαν τοῦ θεοῦ
  english_pob_choice: to the glory of God
  chosen_spanish: para la gloria de Dios
  alternatives_spanish:
  - hacia la gloria de Dios
  - a la gloria de Dios
  lexicon: BDAG
  rationale: εἰς expresa meta o resultado. "Para la gloria de Dios" preserva esa dirección final en un español idiomático.
theological_decisions:
- issue: Alcance de "gracia" en la cláusula de propósito
  english_pob_reading: '"Grace" is retained as the divine favor operative in Paul''''s ministry and its spread, without specifying a narrower doctrinal mechanism.'
  chosen_spanish_reading: '"La gracia" se mantiene como la gracia divina en acción, sin precisar si se enfatiza ante todo el favor recibido o la actividad graciosa de Dios.'
  alternative_spanish_readings:
  - la gracia salvadora extendiéndose a más personas
  - el favor divino que produce más agradecimiento
  rationale: El versículo no obliga a escoger una sola explicación teológica. La redacción española preserva la amplitud del original y no resuelve una tensión que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica donde el texto no la resuelve.
translation_notes:
  revision_awareness: El borrador sigue la última revisión inglesa indicada como sin cambios y toma en cuenta la observación del control cruzado sobre la expresión διὰ τῶν πλειόνων, manteniendo la ambigüedad documentada en español.
  spanish_consistency_notes:
  - Se usa "gracia" para χάρις, conforme al término teológico estándar y al uso del POB inglés.
  - Se usa "Dios" para θεοῦ y no se introduce una glosa doctrinal adicional.
  - Se evita convertir διὰ τῶν πλειόνων en una precisión exegética cerrada; la nota conserva la alternativa lexical relevante.
  - La puntuación y el orden respetan un español fluido sin perder la estructura causal-final del griego.
