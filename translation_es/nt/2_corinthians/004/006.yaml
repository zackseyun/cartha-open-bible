translation:
  language: es
  text: 'Porque Dios, quien dijo[c]: «De las tinieblas resplandecerá la luz», ha resplandecido en nuestros corazones para la iluminación del conocimiento de la gloria de Dios en el rostro[a] del Mesías[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la persona del Mesías». La frase griega puede entenderse de modo más abstracto como «en la persona del Mesías», pero «en el rostro del Mesías» conserva mejor la imagen de la gloria divina visible.'
    reason: alternative_reading
  - marker: b
    text: Griego Χριστοῦ, tradicionalmente «Cristo»; aquí se vierte «Mesías» porque el término funciona como título.
    reason: lexical_alternative
  - marker: c
    text: La cita evoca Génesis 1:3 y usa la imaginería de la luz creadora para la obra reveladora de Dios en los creyentes.
    reason: cross_reference
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto introduce la base causal de lo anterior; «Porque» mantiene la relación argumentativa con naturalidad en español.
- source_word: ὁ θεὸς ὁ εἰπών
  english_pob_choice: God, who said
  chosen_spanish: Dios, quien dijo
  alternatives_spanish:
  - el Dios que dijo
  - Dios que dijo
  lexicon: BDAG
  rationale: La cláusula participial se vierte como relativa para un español fluido sin perder la identificación de Dios como el que habló.
- source_word: Ἐκ σκότους φῶς λάμψει
  english_pob_choice: Light will shine out of darkness
  chosen_spanish: De las tinieblas resplandecerá la luz
  alternatives_spanish:
  - La luz resplandecerá de las tinieblas
  - La luz brillará desde la oscuridad
  lexicon: BDAG
  rationale: «De las tinieblas» refleja ἐκ y conserva la imaginería de Génesis 1:3; «resplandecerá» comunica el futuro de λάμψει con un registro bíblico natural.
- source_word: ὃς ἔλαμψεν
  english_pob_choice: has shone
  chosen_spanish: ha resplandecido
  alternatives_spanish:
  - resplandeció
  - ha brillado
  lexicon: BDAG
  rationale: El perfecto aorístico se adapta bien al perfecto español para expresar una acción pasada con efecto presente en nuestros corazones.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  english_pob_choice: in our hearts
  chosen_spanish: en nuestros corazones
  alternatives_spanish:
  - en nuestro interior
  - en nuestras vidas
  lexicon: BDAG
  rationale: «Corazones» preserva la metáfora bíblica del centro interior de la persona y coincide con el uso habitual en español bíblico.
- source_word: πρὸς φωτισμὸν
  english_pob_choice: for the illumination
  chosen_spanish: para la iluminación
  alternatives_spanish:
  - para iluminar
  - con el fin de iluminar
  lexicon: BDAG
  rationale: «Para la iluminación» refleja el sustantivo φωτισμός y mantiene la relación final con la cadena nominal siguiente.
- source_word: τῆς γνώσεως
  english_pob_choice: of the knowledge
  chosen_spanish: del conocimiento
  alternatives_spanish:
  - del saber
  lexicon: BDAG
  rationale: El genitivo se conserva de forma transparente; «conocimiento» es la opción más natural y teológicamente sobria.
- source_word: τῆς δόξης τοῦ θεοῦ
  english_pob_choice: of the glory of God
  chosen_spanish: de la gloria de Dios
  alternatives_spanish:
  - de la gloria divina
  - de la gloria de Yahvé
  lexicon: BDAG
  rationale: La cadena genitiva se mantiene literalmente; «gloria de Dios» es la formulación más clara y fiel en español.
- source_word: ἐν προσώπῳ Χριστοῦ
  english_pob_choice: in the face of the Messiah
  chosen_spanish: en el rostro del Mesías
  alternatives_spanish:
  - en la persona del Mesías
  - en el rostro de Cristo
  lexicon: BDAG
  rationale: «Rostro» conserva el sentido concreto de πρόσωπον y sugiere la imagen visible de la gloria; «Mesías» sigue la decisión terminológica del proyecto para Χριστός cuando funciona como título.
theological_decisions:
- issue: Rendering Χριστοῦ
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός funciona como título cristológico; el proyecto prioriza «Mesías» para preservar la fuerza titular y evitar una transliteración que puede sonar más nominalizada en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías where title; Christ where name-like'
- issue: Sense of ἐν προσώπῳ Χριστοῦ
  english_pob_reading: in the face of the Messiah
  chosen_spanish_reading: en el rostro del Mesías
  alternative_spanish_readings:
  - en la persona del Mesías
  - en el rostro de Cristo
  rationale: La opción concreta conserva la imaginería de revelación visible y la conexión con la luz/gloria; no diluye πρόσωπον en una abstracción.
  doctrine_reference: 'Affirmations: Nicene/Chalcedonian orthodoxy; preserve theological tension rather than resolve it'
- issue: Echo of Genesis 1:3
  english_pob_reading: The quotation echoes Genesis 1:3 and uses creation-light imagery for God's revelatory work in believers.
  chosen_spanish_reading: La cita evoca Génesis 1:3 y usa la imaginería de la luz creadora para la obra reveladora de Dios en los creyentes.
  alternative_spanish_readings:
  - La frase alude a Génesis 1:3
  - La expresión retoma el lenguaje creador de Génesis
  rationale: Conviene preservar la alusión intertextual porque forma parte del sentido teológico del versículo y explica la metáfora de la luz en el corazón.
  doctrine_reference: 'Cross-reference: Genesis 1:3; creation-light imagery in revelation'
translation_notes:
  revision_awareness: La redacción sigue el último estado auditado del texto inglés, pero corrige la deriva detectada en la revisión que había oscilado entre «Christ» y «Messiah». También evita traducir πρὸς φωτισμὸν como una perífrasis verbal, manteniendo el sustantivo «iluminación» para reflejar mejor la cadena nominal griega.
  spanish_consistency_notes:
  - Se usa «Dios» sin máscara litúrgica, conforme al criterio del proyecto para θεός.
  - Se mantiene «Mesías» para Χριστός por tratarse de un título en este contexto.
  - «Rostro» conserva el valor concreto de πρόσωπον y armoniza con la metáfora de la luz que resplandece.
  - La puntuación y las comillas españolas se ajustan al uso editorial moderno y legible.
