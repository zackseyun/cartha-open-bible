source:
  edition: SBLGNT
  text: ὅτι ὁ θεὸς ὁ εἰπών· Ἐκ σκότους φῶς ⸀λάμψει, ὃς ἔλαμψεν ἐν ταῖς καρδίαις ἡμῶν πρὸς φωτισμὸν τῆς γνώσεως τῆς δόξης τοῦ θεοῦ ἐν προσώπῳ ⸀Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/004/006.yaml
  text: For God[a], who said[c][b], “Light will shine out of darkness,” has shone in our hearts for the illumination of the knowledge of the glory of God in the face of Messiah.
  footnotes:
  - marker: a
    text: Or, “in the person of Christ.” The Greek phrase can be understood more concretely as “in the face of the Messiah,” preserving the imagery of visible divine glory.
    reason: alternative_reading
  - marker: b
    text: Greek Χριστοῦ, traditionally “Christ”; here rendered “Messiah” because the term functions as a title.
    reason: lexical_alternative
  - marker: c
    text: The quotation echoes Genesis 1:3 and uses creation-light imagery for God's revelatory work in believers.
    reason: cross_reference
