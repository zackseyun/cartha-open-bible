translation:
  language: es
  text: Pero tenemos este tesoro en vasos de barro[a], para que la sobreabundante grandeza del poder[b] sea de Dios y no de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en vasijas de barro».
    reason: lexical_alternative
  - marker: b
    text: O «el poder extraordinario» o «el poder que sobrepasa todo».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - contamos con
  lexicon: BDAG
  rationale: El presente indicativo plural se expresa de manera natural con «tenemos». Mantiene la afirmación directa de posesión/presencia sin añadir matices no presentes en el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Conserva el valor de transición contrastiva respecto del contexto anterior. «Pero» es el equivalente español más natural para ese giro adversativo.
- source_word: τὸν θησαυρὸν τοῦτον
  english_pob_choice: this treasure
  chosen_spanish: este tesoro
  alternatives_spanish:
  - este depósito de tesoro
  - este tesoro-riqueza
  lexicon: BDAG
  rationale: «Tesoro» corresponde bien a θησαυρός y el demostrativo «este» conserva la referencia deíctica al contexto previo. No se explicita el contenido del tesoro para no ir más allá del texto.
- source_word: ἐν ὀστρακίνοις σκεύεσιν
  english_pob_choice: in clay jars
  chosen_spanish: en vasos de barro
  alternatives_spanish:
  - en vasijas de barro
  - en vasos de arcilla
  - en recipientes de barro
  lexicon: BDAG
  rationale: «Vasos de barro» es una forma idiomática, digna y transparente en español, y comunica la fragilidad del recipiente. Se evita «vasijas» como menos natural en este contexto, pero se conserva la materialidad de ὀστράκινος y σκεῦος.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: «Para que» expresa bien la finalidad/resultante de ἵνα en un registro natural y fiel. Mantiene la relación lógica sin volverla interpretativamente más fuerte de lo que el griego exige.
- source_word: ἡ ὑπερβολὴ τῆς δυνάμεως
  english_pob_choice: the surpassing greatness of the power
  chosen_spanish: la extraordinaria grandeza del poder
  alternatives_spanish:
  - el poder extraordinario
  - la excelencia del poder
  - la grandeza suprema del poder
  lexicon: BDAG
  rationale: ὑπερβολή expresa excedencia, magnitud superlativa o carácter extraordinario. En español, «extraordinaria grandeza» preserva esa intensidad sin reducirla a una sola palabra técnica. «Del poder» refleja el genitivo de δύναμις.
- source_word: ᾖ
  english_pob_choice: may be
  chosen_spanish: sea
  alternatives_spanish:
  - pueda ser
  - llegue a ser
  lexicon: BDAG
  rationale: Después de «para que», el subjuntivo español «sea» reproduce de forma natural el matiz de finalidad del subjuntivo griego. Evita una perífrasis más larga sin perder la fuerza modal.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - perteneciente a Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: La relación genitiva se conserva de modo formal y claro con «de Dios», manteniendo el contraste inmediato con «no de nosotros».
- source_word: καὶ μὴ ἐξ ἡμῶν
  english_pob_choice: and not from us
  chosen_spanish: y no de nosotros
  alternatives_spanish:
  - y no procede de nosotros
  - y no proviene de nosotros
  lexicon: BDAG
  rationale: El valor de origen de ἐκ/ἐξ puede expresarse en español con «de». «No de nosotros» conserva el paralelismo con «de Dios» y la oposición de fuente/causa. «No procede de nosotros» sería más explicativo y menos directo.
theological_decisions:
- issue: Metáfora del tesoro y los recipientes
  english_pob_reading: Retain the metaphor without explicating the treasure as the gospel or the jars as human bodies/weakness in the main text.
  chosen_spanish_reading: Conservar la metáfora sin aclarar en el texto principal que el tesoro es el evangelio ni que los vasos representan el cuerpo humano o la debilidad.
  alternative_spanish_readings:
  - este tesoro del evangelio en nuestros cuerpos frágiles
  - este tesoro en nuestras frágiles vidas
  rationale: El contexto amplia el sentido, pero el versículo no lo explicita. La traducción debe preservar esa tensión metafórica sin resolverla mediante expansión interpretativa.
  doctrine_reference: 'Principio de fidelidad textual: no paraphrase beyond what the source text warrants.'
- issue: Función de la cláusula ἵνα
  english_pob_reading: Render as purpose/result with 'so that ... may be.'
  chosen_spanish_reading: 'Traducir con finalidad: «para que ... sea».'
  alternative_spanish_readings:
  - de modo que ... sea
  - con el resultado de que ... es
  rationale: En Pablo, ἵνα puede expresar propósito y, a veces, resultado. «Para que» conserva el matiz intencional sin forzar una lectura exclusivamente causal o meramente consecutiva.
  doctrine_reference: Gramática del griego koiné; preservación del matiz de finalidad/resulto sin sobreinterpretación.
translation_notes:
  revision_awareness: El borrador sigue de cerca la última versión inglesa auditada, que fue dejada sin cambios tras la revisión y recibió acuerdo alto. Se mantuvo la metáfora sin expansión interpretativa y se conservó el contraste fuente/origen entre «de Dios» y «no de nosotros».
  spanish_consistency_notes:
  - Se usa «Dios» para θεός de manera consistente con el estándar POB en español.
  - Se eligió «poder» para δύναμις y se matizó con «extraordinaria grandeza» para reflejar ὑπερβολή sin perder naturalidad.
  - Se mantuvo el contraste genitivo con «de» para reflejar tanto τοῦ θεοῦ como ἐξ ἡμῶν.
  - Se evitó «SEÑOR» o términos eclesiásticos no presentes, porque el verso no contiene κύριος ni títulos cristológicos.
