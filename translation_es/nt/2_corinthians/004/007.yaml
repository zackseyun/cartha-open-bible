revisions:
- from: Pero tenemos este tesoro en vasos de barro[a], para que la extraordinaria grandeza[b] del poder sea de Dios y no de nosotros.
  to: Pero tenemos este tesoro en vasos de barro[a], para que la sobreabundante grandeza del poder[b] sea de Dios y no de nosotros.
  rationale: Se corrige el anclaje de las notas para que cada una aparezca sobre la frase pertinente. También se ajusta ἡ ὑπερβολὴ τῆς δυνάμεως a «la sobreabundante grandeza del poder», que conserva mejor el matiz de excedencia/superación de ὑπερβολή y la estructura nominal del griego, manteniendo un español natural y digno. La alternativa en nota [b] se rehace para corresponder mejor al expediente inglés y al uso idiomático del español.
  reviewer_model: gpt-5.4
