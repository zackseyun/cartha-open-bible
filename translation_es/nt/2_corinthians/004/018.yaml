translation:
  language: es
  text: mientras no fijamos la mirada en las cosas que se ven, sino en las que no se ven. Porque las cosas que se ven son temporales[a], pero las que no se ven son eternas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que se ve ... lo que no se ve»; también posible: «las cosas visibles ... las invisibles».'
    reason: lexical_alternative
lexical_decisions:
- source_word: σκοπούντων
  english_pob_choice: look to
  chosen_spanish: fijar la mirada en
  alternatives_spanish:
  - mirar a
  - poner la vista en
  - contemplar
  lexicon: BDAG
  rationale: El participio expresa dirigir la atención hacia algo. «Fijar la mirada en» conserva la metáfora visual y comunica bien la orientación deliberada que el contexto requiere, sin sonar tan forzado como una traducción literal.
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - sin
  lexicon: BDAG
  rationale: Es la negación simple del participio y de la segunda frase participial. «No» mantiene la correspondencia directa sin añadir matiz temporal o aspectual ajeno al griego.
- source_word: τὰ βλεπόμενα
  english_pob_choice: the things that are seen
  chosen_spanish: las cosas que se ven
  alternatives_spanish:
  - lo visible
  - las cosas visibles
  - lo que se ve
  lexicon: BDAG
  rationale: El participio sustantivado en neutro plural se expresa naturalmente en español con «las cosas que se ven», conservando la repetición paralela con la segunda mitad del versículo.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En español, después de una negación previa, «sino» reproduce mejor la oposición fuerte entre los dos objetos de la mirada que un simple «pero».
- source_word: τὰ μὴ βλεπόμενα
  english_pob_choice: the things that are not seen
  chosen_spanish: las que no se ven
  alternatives_spanish:
  - las cosas que no se ven
  - lo no visto
  - lo invisible
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera cola sin repetir innecesariamente «cosas» en la segunda, ya que el antecedente es claro en español. La forma mantiene la tensión visible/invisible sin abstraerla.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón explicativa del contraste anterior. «Porque» es claro y natural en español, y preserva la conexión argumentativa paulina.
- source_word: πρόσκαιρα
  english_pob_choice: temporary
  chosen_spanish: temporales
  alternatives_spanish:
  - transitorias
  - de paso
  - momentáneas
  lexicon: BDAG
  rationale: El adjetivo indica duración limitada. «Temporales» comunica con precisión esa idea y mantiene el contraste con «eternas».
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - sin embargo
  lexicon: BDAG
  rationale: Marca la segunda parte del contraste. «Pero» funciona bien en español tras la cláusula explicativa y conserva el giro antitético.
- source_word: αἰώνια
  english_pob_choice: eternal
  chosen_spanish: eternas
  alternatives_spanish:
  - eternas
  - perdurables
  - del siglo venidero
  lexicon: BDAG
  rationale: En este contraste paulino, el término señala lo que pertenece al orden perdurable y sin fin. «Eternas» es la correspondencia más natural y fiel en español.
- source_word: ἡμῶν
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nos
  - nuestro
  lexicon: BDAG
  rationale: El genitivo del participio se entiende en español como sujeto implícito de la acción. Se expresa con «nosotros» para hacer transparente la subordinación circunstancial («al no fijar nosotros la mirada»), aunque el pronombre pueda omitirse por estilo.
theological_decisions:
- issue: Contraste entre lo visible y lo invisible
  english_pob_reading: Maintain concrete language of 'things that are seen' and 'things that are not seen' rather than abstracting to 'material' and 'spiritual' things.
  chosen_spanish_reading: Mantener la contraposición concreta entre «las cosas que se ven» y «las que no se ven», sin convertirla en una oposición filosófica de «material» y «espiritual».
  alternative_spanish_readings:
  - las cosas visibles ... las invisibles
  - lo material ... lo espiritual
  rationale: El texto griego contrasta realidades observables y no observables; no define explícitamente una dicotomía filosófica. La traducción conserva la tensión teológica y no la resuelve de antemano.
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretarla.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: mantiene la estructura paralela del griego, conserva el contraste visible/invisible sin abstracción filosófica y usa una equivalencia española natural para el participio de σκοπέω. No se registran revisiones previas adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se prefirió «temporales» para πρόσκαιρα por su transparencia y por el contraste directo con «eternas».
  - Se usó «sino» en la primera oposición para reflejar mejor la negación previa y la antítesis fuerte del griego.
  - Se evitó «Cristo», «Señor» u otra terminología no presente en el verso.
  - La cadencia mantiene un registro bíblico claro, pero con español contemporáneo y readable para comunidad eclesial.
