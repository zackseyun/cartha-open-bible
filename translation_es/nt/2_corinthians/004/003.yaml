lexical_decisions:
- source_word: εἰ δὲ καὶ
  english_pob_choice: And even if
  chosen_spanish: Y aun si
  alternatives_spanish:
  - Pero aun si
  - Ahora bien, aun si
  lexicon: BDAG
  rationale: En español, 'Y aun si' conserva la fuerza concesiva e intensificadora de εἰ δὲ καὶ sin sonar mecánico. Mantiene la continuidad discursiva de δέ y el énfasis de καί.
- source_word: κεκαλυμμένον
  english_pob_choice: veiled
  chosen_spanish: velado
  alternatives_spanish:
  - oculto
  - cubierto
  lexicon: BDAG
  rationale: '''Velado'' reproduce la metáfora y el paralelismo inmediato con el contexto paulino, mejor que ''oculto'' o ''cubierto'', que debilitan o desplazan la imagen.'
- source_word: τὸ εὐαγγέλιον ἡμῶν
  english_pob_choice: our gospel
  chosen_spanish: nuestro evangelio
  alternatives_spanish:
  - el evangelio que predicamos
  - la buena noticia que anunciamos
  lexicon: BDAG
  rationale: Se conserva el posesivo ἡμῶν y la expresión paulina estable sin expandir innecesariamente el sintagma. 'Evangelio' es el equivalente natural y fiel en español bíblico contemporáneo.
- source_word: ἐν τοῖς ἀπολλυμένοις
  english_pob_choice: among those who are perishing
  chosen_spanish: entre los que se pierden
  alternatives_spanish:
  - entre los que perecen
  - para los que se pierden
  lexicon: BDAG
  rationale: '''Entre'' refleja adecuadamente el valor de ἐν con dativo como esfera/ámbito. ''Los que se pierden'' conserva el proceso continuo de ἀπολλυμένοις y mantiene la tensión teológica sin resolverla demasiado pronto en una etiqueta estática.'
- source_word: ἐστὶν κεκαλυμμένον
  english_pob_choice: it is veiled
  chosen_spanish: está velado
  alternatives_spanish:
  - permanece velado
  - es velado
  lexicon: BDAG
  rationale: El español natural requiere omitir el pronombre expletivo y usar 'está velado' para reflejar la copula + participio perfecto. 'Permanece velado' sería más interpretativo; 'es velado' suena menos idiomático.
theological_decisions:
- issue: Sentido soteriológico de ἀπολλυμένοις
  english_pob_reading: those who are perishing
  chosen_spanish_reading: los que se pierden
  alternative_spanish_readings:
  - los que perecen
  - los perdidos
  rationale: '''Los que se pierden'' expresa un estado/proceso en curso y preserva la ambigüedad teológica del pasaje. Evita cerrar el sentido con ''los perdidos'', que suena más a etiqueta finalizada que al participio presente.'
  doctrine_reference: Conservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no había cambios necesarios; se conserva la solución óptima previa, con ajuste estilístico mínimo para el español.
  spanish_consistency_notes:
  - Se mantiene 'evangelio' como término técnico estable y no se sustituye por perífrasis.
  - '''Velado'' preserva la metáfora paulina coherente con el contexto inmediato.'
  - '''Los que se pierden'' mantiene el aspecto procesual del participio presente griego.'
  - La puntuación reproduce una sola cláusula concesiva seguida de la apódosis, en paralelo al griego.
