translation:
  language: es
  text: En su caso, el dios de esta era[b] ha cegado las mentes de los incrédulos, para que la luz[a] del evangelio de la gloria de Mesías[c], quien es la imagen de Dios, no resplandezca sobre ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para que no vean la luz del evangelio de la gloria de Mesías». El verbo raro aquí puede enfatizar tanto el resplandor de la luz como la percepción de ella.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el dios de este mundo». El griego aiōn normalmente significa «era», y resalta el presente orden caído.'
    reason: lexical_alternative
  - marker: c
    text: Griego Christos; aquí se rinde como «Mesías» porque funciona como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν οἷς
  english_pob_choice: In their case
  chosen_spanish: En su caso
  alternatives_spanish:
  - entre ellos
  - en quienes
  lexicon: BDAG
  rationale: La expresión retoma a las personas mencionadas en el contexto previo. En español, 'En su caso' comunica bien el valor referencial sin sugerir una localización física o una unión mística no expresada por el griego.
- source_word: ὁ θεὸς τοῦ αἰῶνος τούτου
  english_pob_choice: the god of this age
  chosen_spanish: el dios de esta era
  alternatives_spanish:
  - el dios de este mundo
  - el dios de este siglo
  lexicon: BDAG
  rationale: αἰών alude primariamente a la 'era' o 'edad' presente, no al mundo creado. 'Era' preserva esa fuerza temporal e histórica. Se mantiene 'dios' en minúscula porque se trata de un poder usurpador, no del Dios verdadero.
- source_word: ἐτύφλωσεν
  english_pob_choice: has blinded
  chosen_spanish: ha cegado
  alternatives_spanish:
  - cegó
  - ha enceguecido
  lexicon: BDAG
  rationale: El aoristo se refleja con perfecto compuesto para expresar un hecho cumplido con efecto presente. 'Cegado' es natural y fiel al verbo griego.
- source_word: τὰ νοήματα
  english_pob_choice: the minds
  chosen_spanish: las mentes
  alternatives_spanish:
  - los pensamientos
  - la capacidad de entender
  lexicon: BDAG
  rationale: νόημα aquí apunta a la facultad de comprensión/percepción mental. 'Mentes' transmite de forma natural esa esfera en español y evita reducirlo solo a pensamientos aislados.
- source_word: τῶν ἀπίστων
  english_pob_choice: of the unbelieving
  chosen_spanish: de los incrédulos
  alternatives_spanish:
  - de los que no creen
  - de los infieles
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a quienes no creen. 'Incrédulos' es la equivalencia natural en español y conserva el valor substantivado sin cargar innecesariamente una nota moral extra.
- source_word: εἰς τὸ μὴ αὐγάσαι
  english_pob_choice: so that ... might not shine on them
  chosen_spanish: para que ... no resplandezca sobre ellos
  alternatives_spanish:
  - para que no vean
  - para impedir que ... brille sobre ellos
  lexicon: BDAG
  rationale: La construcción expresa finalidad/resultado. Dado que αὐγάζω es raro y puede matizarse como 'brillar' o 'percibir', la versión principal sigue la imagen de la luz que no llega a resplandecer sobre ellos, en coordinación con φωτισμός.
- source_word: τὸν φωτισμὸν
  english_pob_choice: the light
  chosen_spanish: la luz
  alternatives_spanish:
  - la iluminación
  - el resplandor
  lexicon: BDAG
  rationale: Aunque el sustantivo significa literalmente 'iluminación', en este contexto metafórico 'la luz' es la forma más clara y natural en español, y mantiene bien la imagen del texto.
- source_word: τοῦ εὐαγγελίου
  english_pob_choice: of the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - de la buena noticia
  lexicon: BDAG
  rationale: '''Evangelio'' es la equivalencia estable y transparente en español para εὐαγγέλιον y conserva el registro teológico habitual sin perder precisión.'
- source_word: τῆς δόξης
  english_pob_choice: of the glory
  chosen_spanish: de la gloria
  alternatives_spanish:
  - de la esplendor
  - del resplandor
  lexicon: BDAG
  rationale: 'Se conserva el genitivo de relación sin convertirlo en adjetivo. Esto mantiene la estructura acumulativa del pasaje: la luz del evangelio relacionada con la gloria.'
- source_word: τοῦ Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como 'Mesías' cuando funciona como título, conforme al criterio del proyecto. Aquí el término es claramente titular y cristológico.
- source_word: ὅς ἐστιν εἰκὼν τοῦ θεοῦ
  english_pob_choice: who is the image of God
  chosen_spanish: quien es la imagen de Dios
  alternatives_spanish:
  - que es imagen de Dios
  - quien es la imagen de Dios
  lexicon: BDAG
  rationale: '''Imagen de Dios'' es la equivalencia estándar de εἰκών en Pablo y preserva la afirmación cristológica directa sin ampliarla con formulaciones doctrinales ajenas al verso.'
theological_decisions:
- issue: Referente de 'el dios de esta era'
  english_pob_reading: A false god/usurping ruler, traditionally understood as Satan, not the true God.
  chosen_spanish_reading: Se mantiene la expresión 'el dios de esta era' sin sustituirla por 'Satanás'.
  alternative_spanish_readings:
  - Satanás, el dios de esta era
  - el sistema de este mundo
  rationale: El griego nombra al agente como 'el dios de esta era'. La traducción conserva esa formulación y deja implícito el referente tradicional sin añadir una identificación que no aparece en el texto.
  doctrine_reference: La traducción debe reflejar el texto sin sobreinterpretarlo; la lectura cristiana histórica reconoce un poder maligno personal, pero el verso no usa el nombre 'Satanás'.
- issue: Sentido de αὐγάσαι con φωτισμός
  english_pob_reading: The gospel's light is what does not shine upon the unbelieving.
  chosen_spanish_reading: La luz del evangelio no resplandece sobre ellos.
  alternative_spanish_readings:
  - ellos no perciben la luz del evangelio
  - la luz del evangelio no les alumbra
  rationale: La construcción admite más de una lectura por el verbo raro αὐγάζω. La versión principal mantiene la imagen de la luz que no llega a resplandecer sobre los incrédulos, mientras conserva la posibilidad de una nota alternativa.
  doctrine_reference: El texto enfatiza el cegamiento espiritual como impedimento para recibir la luz del evangelio.
- issue: Función de 'Mesías' como título
  english_pob_reading: Greek Christos; rendered 'Messiah' here because it functions as a title.
  chosen_spanish_reading: Se usa 'Mesías' en el texto principal.
  alternative_spanish_readings:
  - Cristo
  rationale: Χριστός aquí funciona como título, no meramente como nombre fijo. 'Mesías' preserva el valor semántico y se alinea con el criterio terminológico del proyecto.
  doctrine_reference: Cristología paulina; se mantiene la afirmación titular sin introducir terminología eclesial posterior.
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión del POB en inglés: la oscilación entre ''Messiah'' y ''Christ'' fue resuelta a favor de ''Mesías'' por la política terminológica del proyecto, y se conservó el resto de las decisiones léxicas principales, especialmente el valor de αἰών como ''era''.'
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός de manera consistente con el criterio del proyecto.
  - Se usa 'Dios' para θεός y minúscula en 'dios' cuando el referente es el poder usurpador del verso.
  - '''Era'' se eligió para αἰών, evitando ''mundo'' como traducción principal.'
  - '''Mentes'' mantiene el campo semántico de νοήματα sin volverlo meramente intelectualista.'
  - La puntuación y mayúsculas siguen el uso estándar del español bíblico moderno.
