lexical_decisions:
- source_word: διωκόμενοι
  english_pob_choice: persecuted
  chosen_spanish: perseguidos
  alternatives_spanish:
  - acosados
  - hostigados
  lexicon: BDAG
  rationale: En Pablo, el verbo expresa hostilidad sufrida por causa de la oposición; «perseguidos» conserva con naturalidad esa fuerza en español y corresponde al valor elegido en inglés.
- source_word: ἐγκαταλειπόμενοι
  english_pob_choice: abandoned
  chosen_spanish: abandonados
  alternatives_spanish:
  - desamparados
  - dejados
  - forsaken
  lexicon: BDAG
  rationale: «Abandonados» comunica que no son dejados a su suerte sin cargar el verso con un matiz arcaico o una resonancia intertextual más fuerte de la necesaria. Mantiene el contraste con la primera mitad del hemistiquio.
- source_word: καταβαλλόμενοι
  english_pob_choice: struck down
  chosen_spanish: derribados
  alternatives_spanish:
  - arrojados abajo
  - derribados al suelo
  - abatidos
  lexicon: BDAG
  rationale: El verbo puede significar derribar o tumbar; «derribados» reproduce bien la imagen física o figurada de ser echados por tierra. En español suena más natural que una calca como «golpeados abajo».
- source_word: ἀπολλύμενοι
  english_pob_choice: destroyed
  chosen_spanish: destruidos
  alternatives_spanish:
  - arruinados
  - perecidos
  lexicon: BDAG
  rationale: La oposición con «derribados» apunta a la destrucción final, no solo a un proceso de perecer. «Destruidos» preserva ese cierre fuerte y simétrico.
- source_word: ἀλλ’ οὐκ
  english_pob_choice: but not
  chosen_spanish: pero no
  alternatives_spanish:
  - mas no
  - y no
  lexicon: BDAG
  rationale: «Pero no» conserva el paralelismo antitético compacto del griego y el ritmo de contraste del texto.
theological_decisions:
- issue: Si ἐγκαταλειπόμενοι debe insinuar «forsaken/desamparados» con mayor carga teológica o mantenerse en un español más directo.
  english_pob_reading: abandoned
  chosen_spanish_reading: abandonados
  alternative_spanish_readings:
  - desamparados
  - desertados
  - forsaken
  rationale: 'Se conserva el sentido de no ser dejados sin ayuda ni presencia, sin introducir una elevación devocional adicional que el contexto inmediato no exige. La tensión teológica queda intacta: el ministerio sufre abandono humano, pero no una deserción definitiva en el marco paulino.'
  doctrine_reference: 2 Co 4:7–10; preservar la tensión entre aflicción y preservación divina sin sobre-interpretar el léxico.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del consenso de alta concordancia; se mantiene la equivalencia óptima con vocabulario español claro y fiel al griego.'
  spanish_consistency_notes:
  - 'Se mantiene el paralelismo de dos hemistiquios con la misma cadencia adversativa: «pero no».'
  - Se evita «SEÑOR» o formulaciones no presentes en el verso; no hay término divino explícito aquí.
  - «Destruidos» se conserva como cierre fuerte, en línea con el contraste retórico del griego y la decisión inglesa.
  - El texto es apto para lectura pública y conserva el tono epistolar paulino sin arcaísmos innecesarios.
