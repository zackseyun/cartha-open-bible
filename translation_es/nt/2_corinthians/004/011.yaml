translation:
  language: es
  text: Porque nosotros, los que vivimos, siempre somos entregados a la muerte por causa de Jesús[a], para que también la vida de Jesús se manifieste en nuestra carne mortal[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «por Jesús» o «a causa de Jesús».'
    reason: lexical_alternative
  - marker: b
    text: «Carne» aquí se refiere a la existencia corporal mortal, no a la «naturaleza humana pecaminosa».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀεί
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - siempre y en todo momento
  lexicon: BDAG
  rationale: Adverbio de circunstancia continua; «siempre» es el equivalente natural y directo en español, sin añadir énfasis innecesario.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conecta el versículo como explicación del contexto inmediato. «Porque» mantiene la relación discursiva de causa/explicación con claridad en español.
- source_word: οἱ ζῶντες
  english_pob_choice: we who are living
  chosen_spanish: nosotros, los que vivimos
  alternatives_spanish:
  - nosotros, los vivientes
  - nosotros los que estamos vivos
  lexicon: BDAG
  rationale: El participio sustantivado conserva la idea de un grupo definido por estar vivos; «los que vivimos» reproduce bien esa fuerza sin perder naturalidad.
- source_word: εἰς θάνατον
  english_pob_choice: to death
  chosen_spanish: a la muerte
  alternatives_spanish:
  - hacia la muerte
  - para la muerte
  lexicon: BDAG
  rationale: Con παραδιδόμεθα expresa destino o resultado. En español, «a la muerte» es breve y fiel; el artículo definido hace natural la construcción.
- source_word: παραδιδόμεθα
  english_pob_choice: are being handed over
  chosen_spanish: somos entregados
  alternatives_spanish:
  - somos entregados a
  - somos puestos en manos de
  lexicon: BDAG
  rationale: Pasivo presente con matiz de entrega/ceder a otro poder. «Somos entregados» preserva el pasivo y el tono de vulnerabilidad; en este contexto, el complemento «a la muerte» expresa bien el resultado.
- source_word: διὰ Ἰησοῦν
  english_pob_choice: for Jesus’ sake
  chosen_spanish: por causa de Jesús
  alternatives_spanish:
  - por Jesús
  - a causa de Jesús
  lexicon: BDAG
  rationale: διά con acusativo puede indicar causa o motivo. «Por causa de Jesús» evita una lectura mecánica de finalidad y refleja bien el motivo del sufrimiento apostólico.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito o resultado. «Para que» es la equivalencia natural en español y preserva la fuerza telica del griego.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - asimismo
  lexicon: BDAG
  rationale: Marca correspondencia con la cláusula anterior. «También» expresa adecuadamente la adición paralela.
- source_word: ἡ ζωὴ τοῦ Ἰησοῦ
  english_pob_choice: the life of Jesus
  chosen_spanish: la vida de Jesús
  alternatives_spanish:
  - la vida de Jesús mismo
  - la vida que es de Jesús
  lexicon: BDAG
  rationale: Mantiene la construcción genitiva formal y el paralelismo con «la muerte» implícita en el contexto, sin sobreexplicar el vínculo teológico.
- source_word: φανερωθῇ
  english_pob_choice: may be revealed
  chosen_spanish: se manifieste
  alternatives_spanish:
  - sea revelada
  - se haga visible
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo expresa que algo llegue a hacerse patente. «Se manifieste» es natural en español y conserva la idea de hacerse visible/percibible sin añadir agente.
- source_word: ἐν τῇ θνητῇ σαρκὶ ἡμῶν
  english_pob_choice: in our mortal flesh
  chosen_spanish: en nuestra carne mortal
  alternatives_spanish:
  - en nuestro cuerpo mortal
  - en nuestra condición mortal
  lexicon: BDAG
  rationale: «Carne» conserva el término paulino σάρξ y el matiz corporal concreto. «Mortal» explicita la fragilidad física; se evita «naturaleza humana» porque aquí no se trata del sentido ético/metafórico.
theological_decisions:
- issue: Sentido de σάρξ en un contexto paulino de mortalidad
  english_pob_reading: literal 'flesh'
  chosen_spanish_reading: carne
  alternative_spanish_readings:
  - cuerpo
  - naturaleza humana pecaminosa
  rationale: El contexto habla de la vulnerabilidad corporal de los creyentes entregados a la muerte; no alude a una categoría moral como «naturaleza humana pecaminosa». «Carne» conserva el vocabulario paulino y, con «mortal», evita ambigüedad doctrinal.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ → ''carne'' (literal) / ''naturaleza humana pecaminosa'' (metafórico)'
- issue: Valor de διά con acusativo en relación con el sufrimiento apostólico
  english_pob_reading: for Jesus’ sake
  chosen_spanish_reading: por causa de Jesús
  alternative_spanish_readings:
  - por Jesús
  - porque Jesús
  rationale: 'La causa del ser entregados no es meramente instrumental sino relacional y apostólica: ocurre en vínculo con Jesús. «Por causa de Jesús» preserva esa idea sin forzar una finalidad que el contexto no exige.'
  doctrine_reference: 'BDAG διά + acusativo: causa/motivo'
translation_notes:
  revision_awareness: 'El texto español sigue de cerca el acuerdo alto del audit trail inglés y mantiene las mismas decisiones principales: γάρ como conexión explicativa, διά Ἰησοῦν como motivo/causa, y σάρξ en sentido literal de existencia corporal mortal. No se introdujeron cambios textuales de revisión respecto del último pase, y la formulación española conserva el paralelismo entre la entrega a la muerte y la manifestación de la vida de Jesús.'
  spanish_consistency_notes:
  - Se conservó «Jesús» de forma uniforme para Ἰησοῦς.
  - Se mantuvo «carne» para σάρξ por consistencia con el uso paulino literal y con la aclaración doctrinal asociada.
  - «Somos entregados» reproduce el pasivo presente de παραδιδόμεθα sin convertirlo en una voz activa.
  - El orden de la cláusula final mantiene el contraste entre «muerte» y «vida» de manera clara y publicable en español.
