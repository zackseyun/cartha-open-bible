translation:
  language: es
  text: Así que[a], la muerte actúa en nosotros, pero la vida en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la muerte está actuando en nosotros, pero la vida en ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  - Así pues
  lexicon: BDAG
  rationale: ὥστε introduce una conclusión o resultado. «Así que» comunica bien la fuerza inferencial en español actual sin sonar excesivamente formal.
- source_word: ὁ θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - la muerte
  lexicon: BDAG
  rationale: El sustantivo abstracto conserva el valor de θάνατος como realidad operante. El artículo griego se refleja naturalmente en español como «la muerte».
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - dentro de nosotros
  lexicon: BDAG
  rationale: «En nosotros» reproduce directamente la relación espacial/relacional de ἐν con el plural de primera persona y mantiene el contraste con «en ustedes».
- source_word: ἐνεργεῖται
  english_pob_choice: is at work
  chosen_spanish: actúa
  alternatives_spanish:
  - está obrando
  - está en acción
  - opera
  lexicon: BDAG
  rationale: El verbo medio/pasivo expresa una operación efectiva y continua. «Actúa» es natural en español y conserva la idea de una fuerza que está operando.
- source_word: ἡ δὲ ζωὴ
  english_pob_choice: but life
  chosen_spanish: pero la vida
  alternatives_spanish:
  - y la vida
  - mas la vida
  lexicon: BDAG
  rationale: δέ señala contraste; «pero» lo expresa de manera clara. Se mantiene «la vida» para reflejar el sustantivo abstracto del griego.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - dentro de ustedes
  lexicon: BDAG
  rationale: La segunda persona plural conserva el paralelismo con «en nosotros» y el contraste entre el ámbito apostólico y el de los corintios.
theological_decisions:
- issue: Contraste muerte/vida
  english_pob_reading: Paul contrasts the apostles' experience of deathlike suffering with the Corinthians' reception of spiritual life through apostolic ministry, without narrowing the statement to either merely physical or merely metaphorical categories.
  chosen_spanish_reading: Pablo contrasta la experiencia de muerte padecida por los apóstoles con la vida recibida por los corintios mediante el ministerio apostólico, sin reducir la frase a una categoría meramente física o meramente figurada.
  alternative_spanish_readings:
  - Muerte física en los apóstoles y vida física en los corintios
  - Muerte espiritual en los apóstoles y vida eterna en los corintios
  rationale: El contexto inmediato habla de la vida de Jesús manifestándose en cuerpos sometidos al sufrimiento apostólico, y del ministerio que produce vida en otros. Por eso la traducción conserva los términos simples «muerte» y «vida» sin explicarlos en el texto principal.
  doctrine_reference: 2 Corintios 4:10-11; 4:15
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el texto fuente y la lectura inglesa quedaron en alta concordancia, sin observaciones pendientes.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» sin intervenir aquí porque el versículo no contiene el nombre divino.
  - Se usa «nosotros»/«ustedes» para reflejar con claridad el contraste plural de ἐν ἡμῖν / ἐν ὑμῖν.
  - Se eligió «actúa» como equivalente idiomático de ἐνεργεῖται, evitando una versión excesivamente literal que sonaría forzada en español.
