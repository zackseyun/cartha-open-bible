translation:
  language: es
  text: Porque no nos proclamamos a nosotros mismos[a], sino al Mesías Jesús como Señor[b], y a nosotros mismos como esclavos de ustedes[c] por causa de Jesús[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no nos predicamos a nosotros mismos». κηρύσσω puede rendirse también como «predicar» o «anunciar»; aquí se prefiere «proclamar» por su sentido público y declarativo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a Cristo Jesús como Señor». Χριστός puede conservarse como «Cristo» cuando funciona más como forma de nombre; aquí se entiende como título, por eso se traduce «Mesías».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «como siervos de ustedes». El griego δοῦλοι también puede significar «siervos» o «servidores», pero aquí se mantiene «esclavos» para conservar la fuerza del contraste con «Señor».'
    reason: lexical_alternative
  - marker: d
    text: 'O: «a causa de Jesús». La preposición διά con acusativo expresa aquí la razón o el motivo de esta actitud de servicio.'
    reason: alternative_reading
lexical_decisions:
- source_word: κηρύσσομεν
  english_pob_choice: proclaim
  chosen_spanish: proclamamos
  alternatives_spanish:
  - predicamos
  - anunciamos
  lexicon: BDAG
  rationale: «Proclamar» conserva el sentido público y autoritativo de κηρύσσω sin restringirlo a la idea de sermón formal.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: a nosotros mismos
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: 'El reflexivo subraya el contraste: Pablo y sus compañeros no son el contenido de su mensaje, sino que se mencionan separadamente frente a Cristo.'
- source_word: Χριστὸν Ἰησοῦν
  english_pob_choice: Messiah Jesus
  chosen_spanish: Jesucristo, el Mesías
  alternatives_spanish:
  - Cristo Jesús
  - Jesús Cristo
  lexicon: BDAG
  rationale: En español, «Jesucristo» preserva la forma nominal común y «el Mesías» conserva el valor titular de Χριστός que el POB inglés documenta como lectura preferida para el título, sin forzar una sintaxis extraña.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - dueño
  - amo
  lexicon: BDAG
  rationale: «Señor» es el equivalente estándar y conserva la afirmación predicativa sobre Jesús sin rebajarlo a un sentido meramente doméstico o social.
- source_word: δούλους
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Se mantiene la fuerza de δοῦλος que el POB inglés preserva con «slaves», especialmente por el contraste deliberado con «Señor».
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: de ustedes
  alternatives_spanish:
  - sus
  lexicon: BDAG
  rationale: «De ustedes» expresa de forma clara la relación posesiva/genitiva en un registro neutral latinoamericano.
- source_word: διὰ Ἰησοῦν
  english_pob_choice: for Jesus' sake
  chosen_spanish: por causa de Jesús
  alternatives_spanish:
  - a causa de Jesús
  - por Jesús
  lexicon: BDAG
  rationale: Con διά + acusativo, el matiz más natural aquí es causal o motivacional; «por causa de Jesús» preserva esa relación sin introducir un «a través de» que sería menos probable en este contexto.
theological_decisions:
- issue: Rendición de Χριστός como título
  english_pob_reading: 'Title: ''Messiah'''
  chosen_spanish_reading: «el Mesías»
  alternative_spanish_readings:
  - «Cristo»
  rationale: Se conserva el valor titular de Χριστός en armonía con la pauta del POB inglés, pero en español se añade la aposición «el Mesías» para evitar ambigüedad y mantener la confesión cristológica explícita.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título.'
- issue: Fuerza de la frase Χριστὸν Ἰησοῦν κύριον
  english_pob_reading: '''Jesus the Messiah as Lord'''
  chosen_spanish_reading: «a Jesucristo, el Mesías, como Señor»
  alternative_spanish_readings:
  - «a Cristo Jesús como Señor»
  - «a Jesucristo como Señor»
  rationale: La construcción con acusativo se reproduce con una frase de contenido de proclamación; «como Señor» conserva el valor predicativo de κύριον sin añadir un verbo copulativo inexistente en el griego.
  doctrine_reference: Cristología nicena/ortodoxa afirmada; la traducción debe preservar la confesión del señorío de Jesús sin expandirla.
- issue: δοῦλος en contraste con κύριος
  english_pob_reading: slaves
  chosen_spanish_reading: «esclavos»
  alternative_spanish_readings:
  - «siervos»
  - «servidores»
  rationale: Dado el contraste intencional con «Señor», «esclavos» preserva mejor la subordinación fuerte que el texto resalta y evita suavizar la tensión léxica que el POB inglés documenta.
  doctrine_reference: 'DOCTRINE.md: δοῦλος → esclavo cuando la fuerza lexical lo requiere.'
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación entre renderizaciones más idiomáticas y más literales: «Christ Jesus»/«Messiah Jesus», y «servants»/«slaves». La decisión final en el POB inglés restauró «Messiah» y «slaves» tras una regresión a formas más suaves. La presente traducción española sigue esa línea final, preservando el título mesiánico y la fuerza de δοῦλος, sin copiar mecánicamente el orden inglés cuando el español exige una reexpresión natural.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el tetragrámaton.
  - «Mesías» se emplea como título, no como nombre propio aislado.
  - «Señor» se mantiene para κύριος, coherente con la confesión cristológica del versículo.
  - «Esclavos» se usa deliberadamente para reflejar la relación de subordinación fuerte que el contexto subraya.
  - La puntuación mantiene dos miembros contrastivos principales, reflejando la estructura οὐ... ἀλλὰ....
