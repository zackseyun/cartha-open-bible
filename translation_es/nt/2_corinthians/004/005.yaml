  - severity: medium
    issue: La nota b no corresponde exactamente al texto anclado.
    rationale: La nota ofrece como alternativa «Cristo Jesús como Señor», pero el texto principal no traduce de modo paralelo el sintagma, sino con una construcción appositiva distinta («Jesucristo, el Mesías, como Señor»). Conviene que la nota y el texto reflejen una misma decisión estructural.
  - severity: low
    issue: La nota c incluye «como sus esclavos», que en español no es una alternativa realmente distinta de «como esclavos de ustedes».
    rationale: No es erróneo, pero resulta menos útil como nota léxica. Es preferible mantener la alternativa significativa «siervos».
