translation:
  language: es
  text: siempre llevando en el cuerpo la muerte[a] de Jesús, para que también la vida de Jesús se manifieste en nuestro cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el morir de Jesús». El sustantivo griego puede destacar la condición o experiencia de muerte llevada en el cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - todo el tiempo
  lexicon: BDAG
  rationale: Adverbio de circunstancia continua; 'siempre' es natural en español y conserva la idea de acción incesante.
- source_word: τὴν νέκρωσιν
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - el morir
  - la mortificación
  - el estado de muerte
  lexicon: BDAG
  rationale: El sustantivo puede enfatizar el estado o experiencia de muerte. 'La muerte' es la opción más clara y fiel en español, y mantiene la fuerza corporal del pasaje sin reducirlo a un simple proceso.
- source_word: τοῦ Ἰησοῦ
  english_pob_choice: of Jesus
  chosen_spanish: de Jesús
  alternatives_spanish:
  - de Jesús mismo
  - que Jesús sufrió
  lexicon: BDAG
  rationale: Se conserva el genitivo de forma directa, sin explicitar más de lo que el griego pide. En contexto alude a la muerte asociada con Jesús.
- source_word: ἐν τῷ σώματι
  english_pob_choice: in the body
  chosen_spanish: en el cuerpo
  alternatives_spanish:
  - en nuestro cuerpo
  - en el cuerpo físico
  lexicon: BDAG
  rationale: La primera ocurrencia no tiene posesivo explícito en griego. 'En el cuerpo' respeta ese dato y deja intacto el matiz representativo/ministerial.
- source_word: περιφέροντες
  english_pob_choice: carrying
  chosen_spanish: llevando
  alternatives_spanish:
  - cargando
  - llevando alrededor
  lexicon: BDAG
  rationale: Participio presente que indica una carga continua y encarnada. 'Llevando' es idiomático y conserva la imagen de portar una aflicción o marca de muerte.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce cláusula de propósito/resultad​o. 'Para que' es natural y mantiene la relación lógica del texto.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: Marca correspondencia entre muerte y vida de Jesús; 'también' preserva el paralelo.
- source_word: ζωὴ
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - vida nueva
  - vida resucitada
  lexicon: BDAG
  rationale: Traducción directa y clara; el contexto la vincula con la vida del Jesús resucitado sin añadir especificación que el griego no explicita.
- source_word: ἐν τῷ σώματι ἡμῶν
  english_pob_choice: in our body
  chosen_spanish: en nuestro cuerpo
  alternatives_spanish:
  - en nuestros cuerpos
  - en el cuerpo nuestro
  lexicon: BDAG
  rationale: El griego usa singular con posesivo plural. En español se conserva el singular colectivo para mantener la simetría retórica con la primera ocurrencia de 'cuerpo'.
- source_word: φανερωθῇ
  english_pob_choice: may be revealed
  chosen_spanish: se manifieste
  alternatives_spanish:
  - sea revelada
  - se haga visible
  lexicon: BDAG
  rationale: Aoristo pasivo subjuntivo tras ἵνα. 'Se manifieste' es natural en español bíblico y conserva el matiz de quedar hecho visible sin sonar arcaico.
theological_decisions:
- issue: Sentido de νέκρωσις en relación con Jesús
  english_pob_reading: Render as 'death of Jesus' rather than 'dying of Jesus.'
  chosen_spanish_reading: '''la muerte de Jesús'''
  alternative_spanish_readings:
  - '''el morir de Jesús'''
  - '''la agonía de Jesús'''
  rationale: '''Muerte'' refleja mejor el valor léxico del sustantivo y conserva el paralelo con ''la vida de Jesús''. En el contexto de unión con Cristo, no hace falta especificar más el modo de esa muerte.'
  doctrine_reference: Unión con Cristo; participación en los sufrimientos de Cristo
- issue: Número de σώμα en español
  english_pob_reading: Retain singular 'body' in both phrases.
  chosen_spanish_reading: 'Mantener singular: ''en el cuerpo'' / ''en nuestro cuerpo''.'
  alternative_spanish_readings:
  - '''en nuestros cuerpos'''
  rationale: El griego usa singular en ambas apariciones. Mantenerlo conserva la retórica del pasaje y su perspectiva corporativa/apostólica.
  doctrine_reference: Ministerio apostólico; corporalidad de los sufrimientos y de la vida de Cristo
- issue: Valor de ἵνα con aoristo pasivo subjuntivo
  english_pob_reading: so that the life of Jesus may also be revealed
  chosen_spanish_reading: '''para que también la vida de Jesús se manifieste'''
  alternative_spanish_readings:
  - '''para que también la vida de Jesús sea revelada'''
  rationale: La forma pasiva admite una traducción con pasiva refleja natural en español. 'Se manifieste' comunica bien la idea de hacerse visible sin perder la pasividad del griego.
  doctrine_reference: Revelación de la vida resucitada de Jesús en la existencia de los creyentes
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente griego y el criterio auditado de la POB inglesa, especialmente en νέκρωσις, la retención del singular de σώμα y la relación de propósito con ἵνα. No se aplicaron revisiones posteriores en el registro inglés; el consenso de revisión fue alto y sin cambios.
  spanish_consistency_notes:
  - Se mantiene 'Jesús' como nombre propio en ambas apariciones del genitivo.
  - Se conserva 'cuerpo' en singular para reflejar la estructura griega.
  - '''Se manifieste'' funciona como equivalente natural de la pasiva subjuntiva sin introducir una lectura doctrinal adicional.'
  - La nota al pie marca la alternativa léxica principal sin duplicar otras posibles paráfrasis.
