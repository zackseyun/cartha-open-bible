  glossary_alignment: No hay conflictos con la terminología del proyecto. «Jesús» está correctamente usado; no aparecen términos sensibles como Yahvé, Mesías/Cristo, δοῦλος, etc. La elección de «muerte» frente a «morir» concuerda con la racionalidad léxica y teológica documentada en el POB inglés.
