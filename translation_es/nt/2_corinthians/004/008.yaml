translation:
  language: es
  text: Somos afligidos[a] en todo sentido[b], pero no aplastados[c]; perplejos, pero no desesperados[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «oprimidos». θλιβόμενοι denota estar bajo presión o aflicción.
    reason: lexical_alternative
  - marker: b
    text: O «en todo». La frase griega expresa alcance completo, no necesariamente ubicación espacial.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «no estrechados» o «no constreñidos»; «aplastados» expresa el sentido de no llegar al colapso en español idiomático.
    reason: lexical_alternative
  - marker: d
    text: O «totalmente sin salida». El compuesto intensifica el verbo anterior.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν παντί
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo sentido
  - de todas maneras
  - en todo aspecto
  lexicon: BDAG
  rationale: La expresión griega con ἐν + dativo neutro funciona de modo idiomático para indicar alcance total, no ubicación física. «En todo» comunica esa amplitud de manera natural y breve en español, sin convertir el giro en una imagen espacial.
- source_word: θλιβόμενοι
  english_pob_choice: afflicted
  chosen_spanish: afligidos
  alternatives_spanish:
  - oprimidos
  - atribulados
  - afligidos por presión
  lexicon: BDAG
  rationale: θλίβω expresa presión, aflicción o angustia. «Afligidos» conserva el campo semántico de sufrimiento y presión sin introducir una metáfora demasiado fuerte que se confunda con el verbo siguiente.
- source_word: στενοχωρούμενοι
  english_pob_choice: crushed
  chosen_spanish: aplastados
  alternatives_spanish:
  - encerrados
  - estrechados
  - comprimidos
  lexicon: BDAG
  rationale: El verbo evoca quedar en un espacio angosto o bajo constricción; en esta antítesis, la idea es que la presión no llega al colapso. «Aplastados» transmite bien esa negación de hundimiento o colapso en español natural, aunque el trasfondo literal sea de estrechez.
- source_word: ἀπορούμενοι
  english_pob_choice: perplexed
  chosen_spanish: perplejos
  alternatives_spanish:
  - sin saber qué hacer
  - confundidos
  - a la deriva
  lexicon: BDAG
  rationale: El término griego indica estar sin salida o sin saber qué hacer. «Perplejos» es un equivalente conciso y digno que mantiene el matiz cognitivo sin volver la frase pesada.
- source_word: ἐξαπορούμενοι
  english_pob_choice: driven to despair
  chosen_spanish: desesperados
  alternatives_spanish:
  - totalmente sin salida
  - sin recursos
  - llevados a la desesperación
  lexicon: BDAG
  rationale: El compuesto intensifica ἀπορέω. En español, «desesperados» comunica la escalada retórica de manera clara y natural. Se evita formularlo como una afirmación doctrinal sobre la pérdida de fe; el texto describe el grado extremo de la presión experimentada.
- source_word: ἀλλ’ οὐ ... ἀλλ’ οὐκ
  english_pob_choice: but not ... but not
  chosen_spanish: pero no ... pero no
  alternatives_spanish:
  - mas no ... mas no
  - sino que no ... sino que no
  lexicon: BDAG
  rationale: La repetición adversativa sostiene el ritmo retórico de Pablo. «Pero no» conserva la simetría y funciona con claridad en español contemporáneo.
theological_decisions:
- issue: Intensificación entre ἀπορούμενοι y ἐξαπορούμενοι
  english_pob_reading: Render ἐξαπορούμενοι as "driven to despair" to distinguish it from ἀπορούμενοι and preserve Paul's intensification without importing a doctrinal claim about loss of faith.
  chosen_spanish_reading: Traducir ἐξαπορούμενοι como «desesperados» para marcar una intensificación real respecto de «perplejos», sin convertir el versículo en una afirmación técnica sobre el estado espiritual del apóstol.
  alternative_spanish_readings:
  - llevados a la desesperación
  - totalmente sin salida
  - sin esperanza
  rationale: La secuencia retórica presenta una escalada de presión y de pérdida aparente de recursos. La traducción debe dejar visible esa intensificación, pero sin exagerarla hacia una lectura doctrinal que el versículo no exige.
  doctrine_reference: 2 Corintios 4:8; comparación léxica de ἀπορέω / ἐξαπορέομαι
translation_notes:
  revision_awareness: Se siguió el audit trail inglés y no se detectaron cambios revisionales posteriores en el contexto provisto; la decisión española mantiene la antítesis y la intensificación del griego sin añadir paráfrasis.
  spanish_consistency_notes:
  - Se usa «afligidos» para θλιβόμενοι y «aplastados» para στενοχωρούμενοι a fin de mantener la diferencia entre presión/aflicción y colapso por constricción.
  - «Perplejos» y «desesperados» reproducen la progresión del par ἀπορούμενοι / ἐξαπορούμενοι.
  - Se preserva el paralelismo de «pero no ... pero no» para reflejar el ritmo del texto griego.
  - La nota de «en todo» evita leer la frase como una localización física, en línea con el análisis morfosintáctico.
