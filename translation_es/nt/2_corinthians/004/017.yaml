translation:
  language: es
  text: Porque nuestra aflicción momentánea y leve[a] produce para nosotros, más allá de toda comparación[b], un peso eterno de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ligera»; el griego destaca la idea de ligereza en contraste con el «peso» de la gloria.
    reason: lexical_alternative
  - marker: b
    text: O «hasta un grado que supera toda medida»; griego literalmente, «según exceso hasta exceso», un modismo que expresa una medida extraordinaria.
    reason: lexical_alternative
lexical_decisions:
- source_word: παραυτίκα
  english_pob_choice: momentary
  chosen_spanish: momentánea
  alternatives_spanish:
  - por el momento
  - breve
  lexicon: BDAG
  rationale: El adverbio expresa lo que dura solo por el presente o por un tiempo corto. «Momentánea» mantiene ese valor temporal y prepara el contraste con «eterno» al final del versículo.
- source_word: ἐλαφρὸν
  english_pob_choice: light
  chosen_spanish: leve
  alternatives_spanish:
  - ligera
  - pequeña
  lexicon: BDAG
  rationale: «Leve» conserva la metáfora de ligereza frente a «peso» en la segunda mitad del versículo. «Pequeña» debilitaría el contraste; «ligera» también es posible, pero «leve» suena más natural en español bíblico contemporáneo.
- source_word: θλίψεως
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - dolor
  - angustia
  lexicon: BDAG
  rationale: En Pablo, θλῖψις suele referirse a presión, angustia o sufrimiento. «Aflicción» comunica bien ese campo semántico sin cargar el texto con matices escatológicos que «tribulación» puede sugerir.
- source_word: καθ’ ὑπερβολὴν εἰς ὑπερβολὴν
  english_pob_choice: beyond all comparison
  chosen_spanish: más allá de toda comparación
  alternatives_spanish:
  - de exceso en exceso
  - en grado sumamente превосlente
  - extraordinariamente
  lexicon: BDAG
  rationale: La duplicación idiomática de ὑπερβολή intensifica la idea de manera extrema. En español, «más allá de toda comparación» transmite esa fuerza superlativa de forma natural, sin volverlo rígidamente literal.
- source_word: αἰώνιον
  english_pob_choice: eternal
  chosen_spanish: eterno
  alternatives_spanish:
  - perpetuo
  - eternamente duradero
  lexicon: BDAG
  rationale: En contraste con lo momentáneo, «eterno» es la equivalencia más clara y fiel en español.
- source_word: βάρος
  english_pob_choice: weight
  chosen_spanish: peso
  alternatives_spanish:
  - pesadez
  - carga
  lexicon: BDAG
  rationale: «Peso» preserva el paralelismo deliberado con «leve». «Carga» introduciría la idea de algo opresivo, que no corresponde a la gloria del texto.
- source_word: δόξης
  english_pob_choice: of glory
  chosen_spanish: de gloria
  alternatives_spanish:
  - gloriosa
  - de esplendor
  lexicon: BDAG
  rationale: Se conserva la construcción nominal «peso de gloria», porque retiene la densidad retórica y teológica de la expresión paulina. Volverla adjetival suavizaría su fuerza.
- source_word: κατεργάζεται
  english_pob_choice: is producing
  chosen_spanish: produce
  alternatives_spanish:
  - está produciendo
  - obra
  - está obrando
  lexicon: BDAG
  rationale: El verbo expresa una causación eficaz con resultado. En español, el presente simple «produce» comunica bien ese efecto continuo sin sobrecargar la frase.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - en nosotros
  - a favor de nosotros
  lexicon: BDAG
  rationale: 'El dativo aquí es de लाभ/beneficio: la aflicción resulta en gloria para los creyentes. «Para nosotros» conserva ese valor mejor que «en nosotros», que podría sonar a formación interior más que a resultado escatológico.'
theological_decisions:
- issue: Relación entre aflicción presente y gloria futura
  english_pob_reading: La aflicción presente produce una gloria futura y eterna para los creyentes, sin implicar que el sufrimiento gane la salvación por mérito humano.
  chosen_spanish_reading: La aflicción momentánea de los creyentes resulta en un peso eterno de gloria para ellos, sin sugerir mérito salvador.
  alternative_spanish_readings:
  - El sufrimiento merecería la gloria futura
  - La aflicción solo describe crecimiento espiritual presente
  rationale: La estructura del versículo contrasta claramente lo momentáneo con lo eterno y usa un verbo de resultado eficaz, no de mérito. La traducción conserva esa tensión sin añadir una doctrina de recompensa meritoria ni reducir la gloria a mera madurez interior.
  doctrine_reference: Ortodoxia cristiana histórica; preservar la relación resultado/no mérito sin sobreinterpretar el texto.
translation_notes:
  revision_awareness: Se verificó el estado de revisión más reciente y no se registraron cambios pendientes; la solución propuesta mantiene la misma lectura general del audit trail en inglés, con ajuste natural de estilo al español.
  spanish_consistency_notes:
  - Se conserva el contraste retórico «leve / peso» para reflejar ἐλαφρόν / βάρος.
  - Se traduce ὑπερβολὴν εἰς ὑπερβολὴν con una expresión idiomática española equivalente a la intensificación del griego.
  - Se mantiene «gloria» como sustantivo para no diluir la fuerza de δόξα en un adjetivo.
  - Se usa el presente «produce» para reflejar la eficacia continua de κατεργάζεται.
