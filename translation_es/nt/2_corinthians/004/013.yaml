translation:
  language: es
  text: 'Pero teniendo el mismo espíritu[a] de fe, conforme a lo que está escrito: «Creí; por tanto, hablé», nosotros también creemos; por tanto, también hablamos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «el mismo Espíritu de fe», si πνεῦμα se entiende como una referencia al Espíritu Santo y no solo como una disposición compartida marcada por la fe.
    reason: alternative_reading
  - marker: b
    text: Pablo cita Salmo 116:10 (LXX 115:1), alineando su propia fe y su hablar con el testimonio del salmista.
    reason: cross_reference
lexical_decisions:
- source_word: Ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - puesto que tenemos
  - ya que tenemos
  lexicon: BDAG
  rationale: El participio presente se conserva con una forma participial española para mantener el encadenamiento sintáctico del griego sin convertirlo prematuramente en causalidad explícita. «Teniendo» refleja el valor de continuidad y conexión con la cláusula principal.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un leve contraste o desarrollo discursivo. «Pero» es natural en español y conserva el movimiento argumentativo del contexto inmediato.
- source_word: τὸ αὐτὸ πνεῦμα τῆς πίστεως
  english_pob_choice: the same spirit of faith
  chosen_spanish: el mismo espíritu de fe
  alternatives_spanish:
  - el mismo Espíritu de fe
  - el mismo espíritu caracterizado por la fe
  lexicon: BDAG
  rationale: Se mantiene «espíritu» en minúscula porque el griego no exige una referencia explícita al Espíritu Santo. «De fe» conserva el genitivo sin explicitar más de lo que el texto demuestra; la posible lectura pneumatológica queda disponible en nota.
- source_word: κατὰ τὸ γεγραμμένον
  english_pob_choice: according to what is written
  chosen_spanish: conforme a lo que está escrito
  alternatives_spanish:
  - como está escrito
  - según lo que está escrito
  lexicon: BDAG
  rationale: La fórmula introduce una cita bíblica. «Conforme a lo que está escrito» es fiel, claro y suficientemente formal en español, preservando la función de cita sin añadir matiz interpretativo.
- source_word: Ἐπίστευσα
  english_pob_choice: I believed
  chosen_spanish: Creí
  alternatives_spanish:
  - Yo creí
  - Tuve fe
  lexicon: BDAG
  rationale: El aoristo de πιστεύω en la cita se rinde con el pasado simple «creí», la forma más directa y natural en español para la confesión citada.
- source_word: διὸ
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - por eso
  - así que
  lexicon: BDAG
  rationale: διό expresa inferencia o resultado. «Por tanto» preserva la relación lógica solemne del texto y funciona bien en ambos lugares de la frase.
- source_word: ἐλάλησα
  english_pob_choice: I spoke
  chosen_spanish: hablé
  alternatives_spanish:
  - hablé públicamente
  - dije
  lexicon: BDAG
  rationale: λαλέω se traduce de modo simple como «hablar». En español, «hablé» conserva la parquedad y el paralelismo de la cita.
- source_word: καὶ ἡμεῖς πιστεύομεν
  english_pob_choice: we also believe
  chosen_spanish: nosotros también creemos
  alternatives_spanish:
  - también nosotros creemos
  - nosotros también tenemos fe
  lexicon: BDAG
  rationale: Se conserva el grupo πιστεύω con «creemos», que en español mantiene la relación verbal con la cita y la respuesta apostólica. «Nosotros también» reproduce el énfasis del pronombre y el paralelismo retórico.
- source_word: διὸ καὶ λαλοῦμεν
  english_pob_choice: therefore we also speak
  chosen_spanish: por tanto, también hablamos
  alternatives_spanish:
  - por eso también hablamos
  - y por eso hablamos también
  lexicon: BDAG
  rationale: La segunda inferencia se expresa con «por tanto» y «también» para reflejar el paralelismo con la cláusula anterior. «Hablamos» corresponde de manera natural a λαλέω y mantiene la aplicación apostólica.
theological_decisions:
- issue: 'Sentido de πνεῦμα: espíritu compartido/disposición o Espíritu Santo'
  english_pob_reading: shared spirit/disposition ('spirit of faith')
  chosen_spanish_reading: espíritu compartido/disposición de fe
  alternative_spanish_readings:
  - el Espíritu Santo como dador u origen de la fe
  rationale: La lectura principal conserva la ambigüedad del griego sin resolverla de antemano. El contexto inmediato conecta la frase con la confesión citada («Creí; por tanto, hablé»), lo que favorece una disposición animada por la fe. La mayúscula no se usa en el texto principal para no imponer una identificación que el griego no exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla; la posible referencia al Espíritu queda abierta.
- issue: Cómo rendir el grupo πιστ-
  english_pob_reading: believed / believe
  chosen_spanish_reading: creí / creemos
  alternative_spanish_readings:
  - tuve fe / tenemos fe
  - confié / confiamos
  rationale: Se mantiene la coherencia verbal del grupo πιστεύω con «creer/creí/creemos», que es natural en español y conserva la relación interna entre la cita y la aplicación paulina. Esta decisión sigue la preferencia por el campo léxico de la fe sin diluirlo en otras equivalencias menos directas.
  doctrine_reference: Conservar la unidad léxica del grupo de fe/creencia.
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el expediente inglés; el acuerdo de revisión fue alto y la lectura base se mantuvo sin cambios. La redacción española conserva esa estabilidad y procura reflejar la misma ambigüedad controlada del original.
  spanish_consistency_notes:
  - Se mantiene «creer/creí/creemos» para el grupo πιστεύω a lo largo del versículo.
  - Se conserva «espíritu» en minúscula en el texto principal para no fijar la lectura pneumatológica.
  - La fórmula de cita bíblica se traduce de modo uniforme con «conforme a lo que está escrito».
  - «Por tanto» se repite para respetar el paralelismo inferencial del griego.
