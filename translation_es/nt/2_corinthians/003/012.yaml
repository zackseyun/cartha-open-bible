- from: Por tanto, teniendo tal esperanza, nos valemos de gran franqueza,[a]
  to: Por tanto, teniendo tal esperanza, usamos gran denuedo,[a]
  rationale: Se corrige el término principal para παρρησίᾳ de 'franqueza' a 'denuedo', porque el contexto y la auditoría inglesa privilegian 'boldness' como sentido central. Se conserva la posibilidad de 'apertura/franqueza' en nota, y se simplifica χρώμεθα con 'usamos' para un español más natural sin perder el sentido instrumental del griego.
