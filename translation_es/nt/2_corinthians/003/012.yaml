review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura inferencial del griego: ''Por tanto'' para οὖν, ''teniendo tal esperanza'' para Ἔχοντες...τοιαύτην ἐλπίδα, y ''nos valemos de'' para χρώμεθα con sentido instrumental. Sin embargo, el punto principal a corregir es παρρησίᾳ: en este contexto paulino, y conforme al rastro auditado en inglés, el sentido principal es ''denuedo'' o ''valentía/confianza al hablar o actuar'', mientras que ''franqueza'' desplaza el énfasis hacia sinceridad o llaneza. La nota inglesa preserva ''openness/frankness'' como alternativas, no como sentido principal.'
  spanish_quality_summary: El español es claro y digno, pero 'nos valemos de gran franqueza' suena algo menos natural y algo semánticamente torcido en registro bíblico moderno. 'Actuamos con gran denuedo' o 'usamos gran denuedo' reflejan mejor el sentido. Para conservar cercanía con el inglés POB revisado y el verbo χρώμεθα, 'usamos gran denuedo' es aceptable y natural. La nota también debe ajustarse para poner 'franqueza/apertura' como alternativas al término principal.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. La decisión léxica que necesita ajuste es παρρησία: debe alinearse con el inglés POB, que tomó ''boldness'' como opción principal y dejó ''openness''/''frankness'' en nota. En español, ''denuedo'' transmite mejor ese valor principal que ''franqueza''.'
  issues:
  - severity: medium
    issue: παρρησίᾳ se tradujo como 'franqueza' en el texto principal.
    rationale: El griego en este contexto y el rastro inglés favorecen 'boldness' como sentido central. 'Franqueza' es una alternativa posible, pero en español suele enfatizar sinceridad o habla directa más que valentía o confianza abierta; por eso conviene relegarla a nota.
  - severity: low
    issue: La combinación 'nos valemos de gran franqueza' suena menos idiomática.
    rationale: Aunque gramaticalmente válida, la expresión no es la forma más natural ni la más clara para un lector eclesial general. 'Usamos gran denuedo' mantiene el valor instrumental de χρώμεθα y mejora la fluidez.
  revised_spanish_text: Por tanto, teniendo tal esperanza, usamos gran denuedo,[a]
  revised_footnotes:
  - marker: a
    text: O 'gran apertura' o 'gran franqueza'.
    reason: lexical_alternative
  revision_rationale: Se corrige el término principal para παρρησίᾳ de 'franqueza' a 'denuedo', porque el contexto y la auditoría inglesa privilegian 'boldness' como sentido central. Se conserva la posibilidad de 'apertura/franqueza' en nota, y se simplifica χρώμεθα con 'usamos' para un español más natural sin perder el sentido instrumental del griego.
