translation:
  language: es
  text: Por tanto, teniendo tal esperanza, usamos gran denuedo,[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gran apertura' o 'gran franqueza'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἔχοντες
  english_pob_choice: Therefore, having
  chosen_spanish: teniendo
  alternatives_spanish:
  - ya que tenemos
  - puesto que tenemos
  lexicon: BDAG
  rationale: 'El participio se entiende de modo causal/inferencial en el contexto, pero el español puede mantener la construcción participial con naturalidad: ''teniendo''. Esto preserva la relación lógica sin añadir una subordinación más pesada.'
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así pues
  - Por ello
  lexicon: BDAG
  rationale: '''Por tanto'' refleja de manera directa la inferencia de οὖν y es natural en registro bíblico moderno.'
- source_word: τοιαύτην
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - semejante
  - de ese tipo
  lexicon: BDAG
  rationale: '''Tal'' conserva la fuerza cualitativa y demostrativa de τοιαύτην con concisión y buena fluidez en español.'
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza esperanzada
  - esperanza futura
  lexicon: BDAG
  rationale: '''Esperanza'' es el equivalente directo y mantiene el valor paulino del término en el contexto de confianza en la acción de Dios.'
- source_word: πολλῇ
  english_pob_choice: great
  chosen_spanish: gran
  alternatives_spanish:
  - mucha
  - abundante
  lexicon: BDAG
  rationale: Con παρρησίᾳ, la intensificación natural en español es 'gran', que transmite amplitud e intensidad sin sonar afectado.
- source_word: παρρησίᾳ
  english_pob_choice: boldness
  chosen_spanish: franqueza
  alternatives_spanish:
  - osadía
  - apertura
  lexicon: BDAG
  rationale: 'El español ''franqueza'' recoge bien la gama de παρρησία en este contexto: libertad de expresión, apertura y ausencia de reserva. Se evita ''osadía'' por ser más marcadamente audaz/agresivo en español, aunque el matiz de confianza permanece en el contexto.'
- source_word: χρώμεθα
  english_pob_choice: we use
  chosen_spanish: nos valemos de
  alternatives_spanish:
  - usamos
  - obramos con
  lexicon: BDAG
  rationale: χράομαι con dativo expresa 'hacer uso de'. 'Nos valemos de' comunica ese uso instrumental en español con naturalidad, sin imponer la idea específica de habla que el griego no exige.
translation_notes:
  revision_awareness: El texto griego mantiene una relación lógica inferencial entre la esperanza y el ejercicio de παρρησία. La versión española conserva la inferencia con 'Por tanto' y el participio con 'teniendo', mientras que χρώμεθα se vierte con un giro instrumental natural ('nos valemos de') para no restringir indebidamente el sentido a la mera palabra hablada. Se tuvo en cuenta que la revisión inglesa reciente prefirió 'therefore' y 'use great boldness'; el español refleja esa dirección con una formulación formal y fiel al vínculo semántico del verbo.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - '''Franqueza'' se mantiene como opción principal para παρρησία; en notas se preservan alternativas cercanas para reflejar la amplitud semántica sin diluir el matiz contextual.'
  - La puntuación sigue la convención española con coma antes de la cláusula final y nota al final del segmento.
