translation:
  language: es
  text: Porque si lo que estaba llegando a su fin vino con gloria[a][b], mucho más lo que permanece está en gloria[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo que estaba siendo abolido»; «lo que estaba siendo puesto de lado»; «lo que estaba siendo anulado».'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «por gloria» o «a través de gloria».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «lo que perdura» o «lo que permanece en pie».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ καταργούμενον
  english_pob_choice: what was being brought to an end
  chosen_spanish: lo que estaba siendo llevado a su fin
  alternatives_spanish:
  - lo que estaba siendo abolido
  - lo que estaba siendo puesto de lado
  - lo que estaba siendo anulado
  lexicon: BDAG
  rationale: καταργούμενον es un participio pasivo presente con sentido de proceso de desactivación o terminación. En español, "estar siendo llevado a su fin" conserva la idea de proceso y evita fijar demasiado pronto una sola opción interpretativa como "abolido".
- source_word: διὰ δόξης
  english_pob_choice: came with glory
  chosen_spanish: vino con gloria
  alternatives_spanish:
  - vino por medio de gloria
  - vino a través de gloria
  - vino mediante gloria
  lexicon: BDAG
  rationale: διά con genitivo tiene valor instrumental o mediador, pero en español "vino con gloria" comunica con naturalidad que aquello llegó acompañado de gloria, sin imponer un calco poco idiomático.
- source_word: πολλῷ μᾶλλον
  english_pob_choice: much more
  chosen_spanish: mucho más
  alternatives_spanish:
  - cuánto más
  - con mucha más razón
  - muchísimo más
  lexicon: BDAG
  rationale: La comparación intensiva se expresa de forma directa y natural con "mucho más", preservando el contraste retórico de Pablo.
- source_word: τὸ μένον
  english_pob_choice: what remains
  chosen_spanish: lo que permanece
  alternatives_spanish:
  - lo que perdura
  - lo que permanece en pie
  - lo que abides
  lexicon: BDAG
  rationale: μένω en este contexto contrasta con lo que está siendo llevado a su fin. "Lo que permanece" mantiene el paralelismo nominal y la fuerza de permanencia sin sobreinterpretar.
- source_word: ἐν δόξῃ
  english_pob_choice: is in glory
  chosen_spanish: está en gloria
  alternatives_spanish:
  - permanece en gloria
  - está glorioso
  - permanece glorioso
  lexicon: BDAG
  rationale: La preposición ἐν señala esfera o condición. "Está en gloria" conserva la relación espacial/condicional de la frase griega y es claro en español.
theological_decisions:
- issue: Contraste entre lo transitorio y lo permanente en el argumento de Pablo
  english_pob_reading: The verse contrasts a ministry that was temporary and passing with one that remains, without importing extra doctrinal conclusions beyond Paul's wording.
  chosen_spanish_reading: El versículo contrasta lo que está siendo llevado a su fin con lo que permanece, sin identificar explícitamente en la frase las realidades mayores del argumento.
  alternative_spanish_readings:
  - El versículo podría explicitar la alusión al antiguo y nuevo pacto.
  - Podría traducirse de manera más interpretativa como una oposición entre lo abolido y lo permanente.
  rationale: El griego usa participios sustantivados neutros y deja el contraste en términos funcionales. La traducción conserva esa tensión y evita resolverla con terminología eclesiástica no presente en el texto.
  doctrine_reference: Preservar la tensión teológica sin aclararla más allá del enunciado apostólico.
translation_notes:
  revision_awareness: Se corrigió la falla previa asegurando que cada marcador de nota al pie aparece exactamente en el texto español. También se ajustó el inicio a una traducción más fluida y auditable del contraste griego, manteniendo la ambigüedad léxica donde el texto la sostiene.
  spanish_consistency_notes:
  - Se mantuvo "gloria" para δόξα en ambos miembros para conservar el paralelismo del versículo.
  - Se evitó "SEÑOR" o terminología no presente, porque este versículo no contiene el Tetragrámaton ni κύριος.
  - '"Lo que permanece" se usa de manera consistente con el neutro sustantivado del griego.'
  - La secuencia causal "Porque si" reproduce adecuadamente εἰ γὰρ sin añadir contenido.
