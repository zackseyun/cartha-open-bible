- from: Porque si lo que estaba siendo llevado a su fin vino con gloria[a][b][c], mucho más lo que permanece está en gloria.
  to: Porque si lo que estaba llegando a su fin vino con gloria[a][b], mucho más lo que permanece está en gloria[c].
  rationale: Se revisa la frase principal para mejorar la naturalidad del español sin perder el contraste temporal del griego. 'Estaba llegando a su fin' expresa de manera más idiomática el proceso de καταργούμενον. También se corrige la nota sobre τὸ μένον para eliminar una duplicación de la lectura principal y el anglicismo 'abides'.
