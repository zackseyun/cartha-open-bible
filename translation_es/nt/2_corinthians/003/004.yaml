    rationale: Aunque reproduce literalmente la dirección de πρός, en «Tal confianza tenemos ... hacia Dios» el español suena torpe y casi espacial. «Para con Dios» conserva mejor la orientación relacional sin introducir una interpretación más fuerte como «ante Dios».
  - severity: low
    issue: La nota literal de la preposición debe corresponder al texto revisado
    rationale: Si el texto principal cambia a «para con Dios», la nota debe preservar la alternativa/literal «hacia Dios» para reflejar el audit trail inglés y la forma básica de πρός.
