lexical_decisions:
- source_word: Πεποίθησιν
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - convicción
  lexicon: BDAG
  rationale: «Confianza» comunica una seguridad asentada y natural en español, sin añadir el matiz de mera emoción ni desplazar el sentido relacional del término griego.
- source_word: δὲ
  english_pob_choice: Such
  chosen_spanish: Tal
  alternatives_spanish:
  - Y
  - Ahora
  - Entonces
  lexicon: BDAG
  rationale: El conector se refleja con «Tal» para conservar la referencia cualitativa de τοιαύτην y el flujo discursivo sin forzar una conjunción fuerte.
- source_word: τοιαύτην
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - de esa clase
  - como esa
  lexicon: BDAG
  rationale: «Tal» reproduce de forma natural la fuerza demostrativa cualitativa de «such» y mantiene la referencia al tipo de confianza ya mencionada.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: «Tenemos» es el equivalente directo e idiomático de ἔχομεν, sin elevar indebidamente el registro.
- source_word: διὰ τοῦ Χριστοῦ
  english_pob_choice: through Messiah
  chosen_spanish: por medio del Mesías
  alternatives_spanish:
  - a través del Mesías
  - por Cristo
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o instrumento; «por medio de» lo comunica con claridad. Se conserva «Mesías» según la pauta del proyecto para Χριστός cuando funciona como título.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: toward God
  chosen_spanish: hacia Dios
  alternatives_spanish:
  - ante Dios
  - en dirección a Dios
  lexicon: BDAG
  rationale: «Hacia Dios» preserva el movimiento u orientación de πρός sin convertirlo en una relación estática ni reemplazarlo por una lectura interpretativa como «ante».
theological_decisions:
- issue: Renderización de Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la decisión del proyecto de traducir Χριστός como «Mesías» cuando el término funciona como título, manteniendo la distinción entre nombre propio y título mesiánico.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando es titular; Cristo cuando sea necesario por forma fija o razón contextual clara'
- issue: Relación expresada por πρός con θεόν
  english_pob_reading: toward God
  chosen_spanish_reading: hacia Dios
  alternative_spanish_readings:
  - ante Dios
  - para con Dios
  rationale: La preposición se conserva con una expresión direccional/relacional que no borra la orientación a Dios que el griego presenta. «Hacia Dios» es la forma más sobria y cercana en español.
  doctrine_reference: BDAG πρός + acusativo; mantener la orientación relacional sin sobreinterpretación
translation_notes:
  revision_awareness: El texto español sigue el packet griego SBLGNT y el audit trail inglés. Se preserva la elección teológica de Χριστός como «Mesías», y se evita traducir πρός como una frase estática. La nota sobre Cristo se mantiene como alternativa para reflejar el equivalente tradicional documentado por el POB inglés.
  spanish_consistency_notes:
  - Se usa «Mesías» de forma consistente con el criterio del proyecto para Χριστός cuando funciona como título.
  - «Por medio de» conserva el valor mediador de διά con genitivo.
  - «Hacia Dios» refleja la orientación de πρός sin neutralizarla como «con respecto a».
  - No se introdujo puntuación o léxico eclesiástico ajeno al griego base.
