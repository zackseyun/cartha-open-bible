translation:
  language: es
  text: quien también nos capacitó como servidores de un nuevo pacto[a], no de la letra[c] sino del Espíritu; porque la letra mata, pero el Espíritu[b] da vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del nuevo pacto».
    reason: lexical_alternative
  - marker: b
    text: O «espíritu» en ambos lugares.
    reason: alternative_reading
  - marker: c
    text: «La letra» también puede entenderse como «el código escrito».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἱκάνωσεν
  english_pob_choice: made us competent
  chosen_spanish: nos capacitó
  alternatives_spanish:
  - nos hizo competentes
  - nos habilitó
  - nos calificó
  lexicon: BDAG
  rationale: «Capacitó» comunica la idea de hacer aptos o idóneos para una función, con naturalidad en español y sin reducir el sentido a una simple suficiencia abstracta. Mantiene el matiz de habilitación para el ministerio.
- source_word: διακόνους
  english_pob_choice: servants
  chosen_spanish: ministros
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: En este contexto paulino, «ministros» expresa el oficio/encargo de servicio sin sonar a cargo eclesiástico posterior como obligación del verso. Se conserva la alternativa lexical en nota porque el griego permite tanto el matiz de servicio como de ministerio.
- source_word: καινῆς διαθήκης
  english_pob_choice: of a new covenant
  chosen_spanish: de un nuevo pacto
  alternatives_spanish:
  - de un pacto nuevo
  - del nuevo pacto
  lexicon: BDAG
  rationale: «Pacto» traduce adecuadamente διαθήκη en el marco bíblico y paulino; «nuevo pacto» preserva la categoría teológica reconocible. Se usa artículo indefinido por el griego anartro, sin perder la referencia al pacto nuevo escatológico.
- source_word: γράμματος / γράμμα
  english_pob_choice: letter
  chosen_spanish: la letra
  alternatives_spanish:
  - el escrito
  - el código escrito
  lexicon: BDAG
  rationale: «La letra» conserva el contraste conciso de Pablo con πνεῦμα y el valor metafórico del término. Evita interpretar de antemano como «código escrito», aunque esa posibilidad se mantiene implícita.
- source_word: πνεύματος / πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En esta antítesis del nuevo pacto, el referente más probable es el Espíritu Santo, por lo que la mayúscula es la mejor decisión contextual. Se preserva la alternativa «espíritu» porque el griego no distingue tipográficamente la capitalización.
- source_word: ἀποκτέννει
  english_pob_choice: kills
  chosen_spanish: mata
  alternatives_spanish:
  - da muerte
  - causa la muerte
  lexicon: BDAG
  rationale: «Mata» reproduce la fuerza directa y breve del presente griego, y funciona bien en el paralelo antitético con «da vida». Mantiene el contraste sin suavizarlo.
- source_word: ζῳοποιεῖ
  english_pob_choice: gives life
  chosen_spanish: da vida
  alternatives_spanish:
  - vivifica
  - hace vivir
  lexicon: BDAG
  rationale: «Da vida» es la expresión española más clara y natural para el verbo vivificante, conservando el dinamismo del texto sin sonar arcaica.
theological_decisions:
- issue: Si πνεῦμα debe leerse como «Espíritu» o «espíritu»
  english_pob_reading: Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - el espíritu
  rationale: El contexto de 2 Corintios 3 contrapone la letra con el agente vivificante del nuevo pacto, lo que apunta al Espíritu Santo. No obstante, como el griego no marca mayúsculas, se conserva la alternativa en nota para no borrar la tensión interpretativa.
  doctrine_reference: Preservar la ambigüedad cuando el texto no la resuelve tipográficamente; ver la lectura contextual del Espíritu en el nuevo pacto.
- issue: Cómo traducir διακόνους sin imponer lenguaje eclesiástico posterior
  english_pob_reading: servants
  chosen_spanish_reading: ministros
  alternative_spanish_readings:
  - siervos
  rationale: «Ministros» mantiene el campo de servicio encargado y evita que «siervos» suene demasiado genérico en español moderno. A la vez, la nota preserva la alternativa para no perder el sentido básico de διάκονος.
  doctrine_reference: Respeto al sentido léxico sin fijar más oficio del que el texto explícitamente da.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el auditorial inglés: mantiene la antítesis γράμμα/πνεῦμα, conserva la posibilidad de leer πνεῦμα como «espíritu», y evita sustituir el léxico de servicio por terminología eclesiástica más tardía sin justificación contextual.'
  spanish_consistency_notes:
  - Se usa «pacto» para διαθήκη de manera consistente con el uso bíblico y paulino.
  - Se emplea «la letra» como correlato de γράμμα, conservando la metáfora breve del original.
  - Se capitaliza «Espíritu» por decisión contextual, no por exigencia gráfica del griego.
  - Se prefiere «da vida» frente a «vivifica» por claridad y naturalidad en español contemporáneo.
  - Los marcadores de nota se usan solo donde hay una alternativa lexical o interpretativa real en el texto.
