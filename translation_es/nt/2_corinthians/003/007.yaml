    reason: alternative_reading
  revision_rationale: 'Se revisa para restaurar una decisión léxica importante del audit trail inglés: la nota sobre «los hijos de Israel». También se reordenan las notas para que cada anclaje corresponda con su contenido, y se ajusta «llegó con gloria» a «vino con gloria» por mayor naturalidad sin cambiar el sentido. No hay problemas doctrinales ni textuales mayores.'
