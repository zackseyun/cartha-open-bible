translation:
  language: es
  text: Pero si el ministerio de muerte[a], grabado en letras sobre piedras, vino con gloria, de modo que los hijos[b] de Israel no podían fijar la vista en el rostro de Moisés por la gloria de su rostro, la cual se iba desvaneciendo[c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que llevaba a la muerte» o «que resultaba en muerte».
    reason: alternative_reading
  - marker: b
    text: «Los hijos de Israel» podría traducirse «los israelitas», pero se mantiene la expresión masculina para reflejar más de cerca el griego.
    reason: lexical_alternative
  - marker: c
    text: O «la cual estaba siendo llevada a su fin» o «la cual iba pasando»; se mantiene «se iba desvaneciendo» porque el contexto inmediato describe la gloria visible en el rostro de Moisés.
    reason: alternative_reading
lexical_decisions:
- source_word: διακονία
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  lexicon: BDAG
  rationale: «Ministerio» conserva la idea de una función encomendada y sirve bien al contraste paulino en este contexto; «servicio» sería posible, pero atenúa el matiz institucional y de encargo.
- source_word: τοῦ θανάτου
  english_pob_choice: of death
  chosen_spanish: de muerte
  alternatives_spanish:
  - que produce muerte
  - portador de muerte
  lexicon: BDAG
  rationale: Se mantiene la construcción compacta del genitivo para preservar la fuerza expresiva del griego sin expandir interpretativamente el sentido.
- source_word: ἐν γράμμασιν
  english_pob_choice: in letters
  chosen_spanish: en letras
  alternatives_spanish:
  - en escritura
  - en palabras escritas
  lexicon: BDAG
  rationale: «En letras» refleja de manera directa el sustantivo γράμμασιν y conserva el contraste probable con el Espíritu en el contexto inmediato.
- source_word: ἐντετυπωμένη λίθοις
  english_pob_choice: engraved in letters on stones
  chosen_spanish: grabado en letras sobre piedras
  alternatives_spanish:
  - inscrito sobre piedras
  - grabado sobre tablas de piedra
  lexicon: BDAG
  rationale: «Grabado» comunica bien la idea de algo impreso o grabado; «sobre piedras» retiene λίθοις sin introducir explícitamente «tablas», que no aparece en el griego.
- source_word: ἐγενήθη ἐν δόξῃ
  english_pob_choice: came with glory
  chosen_spanish: llegó con gloria
  alternatives_spanish:
  - vino con gloria
  - se manifestó con gloria
  lexicon: BDAG
  rationale: «Llegó con gloria» expresa el valor eventivo de ἐγενήθη y sugiere acompañamiento de gloria de manera natural en español.
- source_word: ὥστε μὴ δύνασθαι ἀτενίσαι
  english_pob_choice: so that ... were not able to gaze
  chosen_spanish: de modo que ... no podían fijar la vista
  alternatives_spanish:
  - de tal manera que ... no podían mirar fijamente
  - así que ... no podían contemplar
  lexicon: BDAG
  rationale: «Fijar la vista» transmite la intensidad de ἀτενίζω sin sonar demasiado rígido; conserva la idea de mirar con atención sostenida.
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: BDAG
  rationale: Se conserva la expresión masculina del griego y la correspondencia bíblica tradicional de «los hijos de Israel», sin neutralizarla a «israelitas».
- source_word: εἰς τὸ πρόσωπον Μωϋσέως
  english_pob_choice: at Moses’ face
  chosen_spanish: en el rostro de Moisés
  alternatives_spanish:
  - al rostro de Moisés
  - hacia el rostro de Moisés
  lexicon: BDAG
  rationale: «En el rostro de Moisés» reproduce con naturalidad el foco concreto del griego y su sintaxis de mirada dirigida a su rostro.
- source_word: διὰ τὴν δόξαν τοῦ προσώπου αὐτοῦ
  english_pob_choice: because of the glory of his face
  chosen_spanish: por la gloria de su rostro
  alternatives_spanish:
  - a causa de la gloria de su rostro
  - debido a la gloria de su rostro
  lexicon: BDAG
  rationale: «Por» expresa causalidad de forma natural en español y mantiene la relación entre la gloria visible y la imposibilidad de mirar.
- source_word: τὴν καταργουμένην
  english_pob_choice: which was fading away
  chosen_spanish: la cual se iba desvaneciendo
  alternatives_spanish:
  - la cual estaba siendo anulada
  - la cual pasaba
  - la cual se iba acabando
  lexicon: BDAG
  rationale: «Se iba desvaneciendo» conserva el matiz visible y progresivo que el contexto sugiere para la gloria del rostro, sin cerrar la tensión más amplia de καταργέω en Pablo.
theological_decisions:
- issue: Cómo renderizar καταργουμένην sin eliminar la tensión entre desvanecimiento visible y terminación teológica.
  english_pob_reading: which was fading away
  chosen_spanish_reading: la cual se iba desvaneciendo
  alternative_spanish_readings:
  - la cual estaba siendo anulada
  - la cual pasaba
  rationale: El contexto inmediato habla de la gloria en el rostro de Moisés; por eso «se iba desvaneciendo» comunica mejor el aspecto perceptible. A la vez, no se excluye que Pablo apunte a la caducidad de la gloria antigua.
  doctrine_reference: Preservar la tensión teológica y no resolverla de forma prematura.
translation_notes:
  revision_awareness: 'Se siguió el sentido general del pasaje y la auditoría inglesa: διακονία como «ministerio», τοῦ θανάτου como genitivo compacto, ἐν γράμμασιν como «en letras», y καταργουμένην como una pérdida visible de gloria sin borrar la posible lectura de terminación. No hubo revisiones aplicadas en el paso auditado.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no aparece.
  - Se mantiene la expresión masculina «los hijos de Israel» por fidelidad al griego y al criterio auditado.
  - «Rostro» se usa de manera consistente para πρόσωπον en este versículo.
  - No se introdujo «tablas» porque λίθοις dice literalmente «piedras».
