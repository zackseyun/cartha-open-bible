  to: Pero si el ministerio de muerte[a], grabado en letras sobre piedras, vino con gloria, de modo que los hijos[b] de Israel no podían fijar la vista en el rostro de Moisés por la gloria de su rostro, la cual se iba desvaneciendo[c],
