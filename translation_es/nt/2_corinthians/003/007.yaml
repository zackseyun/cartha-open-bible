  text: Εἰ δὲ ἡ διακονία τοῦ θανάτου ἐν ⸀γράμμασιν ⸀ἐντετυπωμένη λίθοις ἐγενήθη ἐν δόξῃ, ὥστε μὴ δύνασθαι ἀτενίσαι τοὺς υἱοὺς Ἰσραὴλ εἰς τὸ πρόσωπον Μωϋσέως διὰ τὴν δόξαν τοῦ προσώπου αὐτοῦ τὴν καταργουμένην,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/007.yaml
  text: But if the ministry of death[a], engraved in letters on stones, came with glory, so that the sons of Israel were not able to gaze at Moses’ face because of the glory of his face, which was fading away[b],
