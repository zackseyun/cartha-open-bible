translation:
  language: es
  text: mostrando que ustedes son una carta del Mesías[a], transmitida por nosotros, escrita no con tinta sino con el Espíritu del Dios viviente[d][c][b], no en tablas de piedra sino en tablas de corazones de carne.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «una carta de Cristo». El genitivo griego también puede leerse de manera más literal así; el texto principal refleja el sentido probable de origen/autoría como «del Mesías».'
    reason: alternative_reading
  - marker: b
    text: «Mesías» traduce el título Χριστός; tradicionalmente, «Cristo».
    reason: lexical_alternative
  - marker: c
    text: «Corazones de carne» evoca la imagen del nuevo pacto del Antiguo Testamento, especialmente Ezequiel 11:19 y 36:26.
    reason: cross_reference
  - marker: d
    text: 'O: «sobre tablas de corazones de carne».'
    reason: alternative_reading
lexical_decisions:
- source_word: φανερούμενοι
  english_pob_choice: showing
  chosen_spanish: mostrando
  alternatives_spanish:
  - haciendo evidente
  - manifestando
  lexicon: BDAG
  rationale: La forma participial conserva el avance del argumento de Pablo y en español se expresa con naturalidad como 'mostrando', sin perder la idea de evidencia pública o manifiesta.
- source_word: ἐπιστολὴ
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  lexicon: BDAG
  rationale: '''Carta'' es el equivalente moderno más natural y claro; evita el tono eclesiástico de ''epístola'' y preserva la metáfora.'
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: 'Se sigue el criterio del proyecto para Χριστός como título: ''Mesías'' comunica mejor el valor titular que ''Cristo''. El genitivo se entiende aquí como procedencia/autoría, de ahí ''del Mesías''.'
- source_word: διακονηθεῖσα
  english_pob_choice: ministered by us
  chosen_spanish: ministrada por nosotros
  alternatives_spanish:
  - servida por nosotros
  - atendida por nosotros
  lexicon: BDAG
  rationale: '''Ministrada'' refleja el verbo διακονέω sin convertirlo en un término técnico eclesiástico rígido; mantiene la idea de mediación humana en la imagen de la carta.'
- source_word: ἐγγεγραμμένη
  english_pob_choice: written
  chosen_spanish: escrita
  alternatives_spanish:
  - inscrita
  lexicon: BDAG
  rationale: '''Escrita'' es la correspondencia más directa y natural en español, especialmente por el contraste con tinta/Espíritu.'
- source_word: μέλανι
  english_pob_choice: ink
  chosen_spanish: tinta
  alternatives_spanish:
  - negro
  lexicon: BDAG
  rationale: El dativo instrumental se expresa de manera natural con 'tinta', equivalente léxico directo del contraste de escritura.
- source_word: πνεύματι θεοῦ ζῶντος
  english_pob_choice: the Spirit of the living God
  chosen_spanish: el Espíritu del Dios viviente
  alternatives_spanish:
  - el espíritu del Dios viviente
  lexicon: BDAG
  rationale: La oposición con tinta y el contexto del nuevo pacto apuntan al Espíritu Santo; por eso se capitaliza 'Espíritu'. 'Dios viviente' conserva plenamente el genitivo descriptivo.
- source_word: πλαξὶν λιθίναις
  english_pob_choice: stone tablets
  chosen_spanish: tablas de piedra
  alternatives_spanish:
  - tablas de piedra tallada
  - tablas pétreas
  lexicon: BDAG
  rationale: '''Tablas de piedra'' es la equivalencia idiomática más clara en español y mantiene la alusión al Sinaí.'
- source_word: πλαξὶν καρδίαις σαρκίναις
  english_pob_choice: tables of hearts of flesh
  chosen_spanish: tablas de corazones de carne
  alternatives_spanish:
  - tablas de corazones carnales
  - tablas—corazones de carne
  lexicon: BDAG
  rationale: Se conserva la imagen bíblica y la resonancia de Ezequiel; 'carne' reproduce σάρκινος de forma más literal que opciones interpretativas como 'humanos' o 'carnales'. La construcción española mantiene la relación metafórica sin imponer una explicación.
theological_decisions:
- issue: Traducción de Χριστοῦ como título
  english_pob_reading: from the Messiah
  chosen_spanish_reading: del Mesías
  alternative_spanish_readings:
  - de Cristo
  - de Jesucristo
  rationale: Se mantiene el valor titular de Χριστός según el criterio del proyecto. El genitivo se deja abierto a la relación de origen/autoría propia de la metáfora epistolar, sin reducirla a un simple posesivo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve source-based tension in genitives'
- issue: Referencia de πνεύματι θεοῦ ζῶντος
  english_pob_reading: the Spirit of the living God
  chosen_spanish_reading: el Espíritu del Dios viviente
  alternative_spanish_readings:
  - el espíritu del Dios viviente
  rationale: El contraste con tinta y la teología del nuevo pacto favorecen una referencia personal al Espíritu Santo. La mayúscula en 'Espíritu' se adopta por el sentido contextual, no por una automatización doctrinal.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than flatten it'
- issue: Imagen final de las 'tablas de corazones de carne'
  english_pob_reading: tablets of hearts of flesh
  chosen_spanish_reading: tablas de corazones de carne
  alternative_spanish_readings:
  - tablas de corazones carnales
  - tablas que son corazones de carne
  rationale: Se preserva la alusión a Jeremías/Ezequiel sin suavizar la expresión. 'Carne' retiene la fuerza bíblica de σάρκινος y evita sustituirla por una paráfrasis antropológica más libre.
  doctrine_reference: 'DOCTRINE.md: Keep OT allusions visible when the source does'
translation_notes:
  revision_awareness: La revisión más reciente revirtió una opción más interpretativa en la cláusula final y volvió a una forma más fiel al griego; también ajustó el verbo de διακονηθεῖσα a 'ministrada'. Este borrador sigue esa línea y conserva la tensión imagen/gramática sin convertirla en paráfrasis explicativa.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός de acuerdo con la terminología del proyecto.
  - Se usa 'Espíritu' con mayúscula por el contraste contextual con tinta y la referencia al Espíritu Santo.
  - '''Carne'' se conserva para σάρκινος por fidelidad al eco veterotestamentario.'
  - La secuencia final conserva la ambigüedad/imaginación del original sin reescribirla como comentario teológico.
