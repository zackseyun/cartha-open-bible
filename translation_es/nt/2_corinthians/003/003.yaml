revisions:
- from: mostrando que ustedes son una carta del Mesías[a], ministrada por nosotros, escrita no con tinta sino con el Espíritu del Dios viviente[d][c][b], no en tablas de piedra sino en tablas de corazones de carne.
  to: mostrando que ustedes son una carta del Mesías[a], transmitida por nosotros, escrita no con tinta sino con el Espíritu del Dios viviente[d][c][b], no en tablas de piedra sino en tablas de corazones de carne.
  rationale: Se reemplaza 'ministrada por nosotros' por 'transmitida por nosotros' para lograr un español más natural dentro de la metáfora de la carta, manteniendo la idea de mediación expresada por διακονηθεῖσα ὑφ’ ἡμῶν. También se corrige la ortografía de 'autoría' en la nota a. No se altera 'tablas de corazones de carne' porque, aunque es una construcción tensa en español, conserva de cerca la imagen griega y la alusión profética que el expediente inglés quiso preservar.
