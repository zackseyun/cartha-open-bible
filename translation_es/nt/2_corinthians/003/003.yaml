  text: φανερούμενοι ὅτι ἐστὲ ἐπιστολὴ Χριστοῦ διακονηθεῖσα ὑφ’ ἡμῶν, ἐγγεγραμμένη οὐ μέλανι ἀλλὰ πνεύματι θεοῦ ζῶντος, οὐκ ἐν πλαξὶν λιθίναις ἀλλ’ ἐν πλαξὶν καρδίαις σαρκίναις.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/003.yaml
  text: showing that you are a letter from the Messiah[a], ministered by us, written not with ink but with the Spirit of the living God[d][c][b], not on stone tablets but on tablets of hearts of flesh.
  footnotes:
  - marker: a
    text: Or 'a letter of Christ.' The Greek genitive can be read more literally that way; the main text renders the likely sense of source/authorship as 'from the Messiah.'
    reason: alternative_reading
  - marker: b
    text: '''Messiah'' translates the title Χριστός; traditionally, ''Christ.'''
    reason: lexical_alternative
  - marker: c
    text: '''Hearts of flesh'' echoes Old Testament new-covenant imagery, especially Ezekiel 11:19 and 36:26.'
    reason: cross_reference
  - marker: d
    text: Or 'tablets of hearts of flesh'.
    reason: previous_rendering
