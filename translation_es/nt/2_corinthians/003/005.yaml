translation:
  language: es
  text: No es que seamos suficientes[a] en nosotros mismos para considerar algo como si proviniera de nosotros mismos[b]; más bien, nuestra suficiencia[a] proviene de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Suficientes» y «suficiencia» también pueden traducirse como «aptos/aptitud» o «competentes/competencia».
    reason: lexical_alternative
  - marker: b
    text: O «calcular» o «contar algo como si proviniera de nosotros mismos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐχ ὅτι
  english_pob_choice: Not that
  chosen_spanish: No es que
  alternatives_spanish:
  - No porque
  - No es porque
  lexicon: BDAG
  rationale: En español, «No es que» introduce de manera natural una aclaración o corrección, equivalente al giro paulino de restricción más que de causalidad.
- source_word: ἀφ’ ἑαυτῶν
  english_pob_choice: in ourselves
  chosen_spanish: en nosotros mismos
  alternatives_spanish:
  - de nosotros mismos
  - por nosotros mismos
  lexicon: BDAG
  rationale: Con ἱκανοί ἐσμεν, la idea es una suficiencia localizada en el propio sujeto. «En nosotros mismos» conserva esa interioridad de origen sin forzar una construcción extraña en español.
- source_word: ἱκανοί
  english_pob_choice: sufficient
  chosen_spanish: suficientes
  alternatives_spanish:
  - aptos
  - competentes
  lexicon: BDAG
  rationale: «Suficientes» mantiene el vínculo léxico con ἱκανότης en la segunda mitad del verso y evita reducir el sentido a habilidad ministerial estrecha.
- source_word: λογίσασθαί
  english_pob_choice: to consider
  chosen_spanish: considerar
  alternatives_spanish:
  - estimar
  - contar
  lexicon: BDAG
  rationale: El verbo apunta a un acto mental de cálculo o evaluación; «considerar» comunica bien esa operación sin arcaísmo.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - nada
  - cosa alguna
  lexicon: BDAG
  rationale: En una construcción negativa, «algo» funciona de manera natural en español y preserva el alcance indefinido del original.
- source_word: ὡς ἐξ αὑτῶν
  english_pob_choice: as coming from ourselves
  chosen_spanish: como proveniente de nosotros
  alternatives_spanish:
  - como si saliera de nosotros
  - como procedente de nosotros
  lexicon: BDAG
  rationale: La frase aclara origen o fuente; «proveniente de nosotros» expresa ese origen sin la rigidez de un calco literal.
- source_word: ἡ ἱκανότης ἡμῶν
  english_pob_choice: our sufficiency
  chosen_spanish: nuestra suficiencia
  alternatives_spanish:
  - nuestra adecuación
  - nuestra competencia
  lexicon: BDAG
  rationale: Se conserva el mismo campo léxico que en «suficientes», manteniendo la relación interna del verso y la idea de capacidad recibida.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: is from God
  chosen_spanish: es de Dios
  alternatives_spanish:
  - proviene de Dios
  - viene de Dios
  lexicon: BDAG
  rationale: «Es de Dios» es breve y fiel; deja claro a Dios como fuente sin añadir matiz interpretativo innecesario.
theological_decisions:
- issue: Alcance de la insuficiencia humana
  english_pob_reading: The verse speaks broadly of self-derived sufficiency rather than narrowly of ministerial competence alone.
  chosen_spanish_reading: El verso habla en general de una suficiencia que no se origina en el ser humano, no solo de una capacidad apostólica estrecha.
  alternative_spanish_readings:
  - Se refiere únicamente a la competencia para el ministerio apostólico.
  - Habla solo de la idoneidad ministerial inmediata.
  rationale: El griego es amplio y no debe estrecharse más de lo que el texto permite; la cercanía del contexto ministerial se conserva, pero sin limitar el alcance semántico del enunciado.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente: no se requirieron cambios posteriores y el acuerdo de revisión fue alto.'
  spanish_consistency_notes:
  - Se mantuvo una correspondencia léxica entre «suficientes» y «suficiencia» para reflejar ἱκανοί / ἱκανότης.
  - Se evitó traducir ἐκ τοῦ θεοῦ con una paráfrasis doctrinal; la relación de fuente quedó explícita con «es de Dios».
  - La nota se ancla solo en «suficientes», porque la alternativa léxica documentada en la auditoría afecta a ese par de términos; el resto del verso queda sin notas para no sobrecargar el texto.
