translation:
  language: es
  text: Ustedes son nuestra carta[a], escrita en nuestros corazones, conocida y leída por todas las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «reconocida y leída por todas las personas».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολή
  english_pob_choice: letter
  chosen_spanish: carta
  alternatives_spanish:
  - epístola
  lexicon: BDAG
  rationale: En este contexto metafórico, ἐπιστολή designa una comunicación escrita. «Carta» es el equivalente moderno natural en español y conserva la imagen de una misiva; «epístola» suena más tradicional pero menos transparente para lectores actuales.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestra / nuestros
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: 'El genitivo expresa posesión: los corintios son metafóricamente la carta de Pablo y sus colaboradores. El español exige concordancia de género, de ahí «nuestra carta» y «nuestros corazones».'
- source_word: ὑμεῖς ἐστε
  english_pob_choice: You are
  chosen_spanish: Ustedes son
  alternatives_spanish:
  - Vosotros sois
  - Ustedes mismos son
  lexicon: BDAG
  rationale: La cláusula predicativa directa se traduce de forma natural con «Ustedes son». El plural mantiene el valor referencial del griego sin añadir una enfatización innecesaria.
- source_word: ἐγγεγραμμένη
  english_pob_choice: written
  chosen_spanish: escrita
  alternatives_spanish:
  - inscrita
  lexicon: BDAG
  rationale: El participio perfecto pasivo indica algo que permanece escrito. «Escrita» es idiomático en español y preserva la metáfora de manera clara; «inscrita» sería posible, pero más solemne y menos natural aquí.
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  english_pob_choice: in our hearts
  chosen_spanish: en nuestros corazones
  alternatives_spanish:
  - sobre nuestros corazones
  lexicon: BDAG
  rationale: El texto griego dice literalmente «en». Se mantiene esa relación espacial/metafórica con «en nuestros corazones», evitando intensificarla a «sobre» sin base textual.
- source_word: γινωσκομένη
  english_pob_choice: known
  chosen_spanish: conocida
  alternatives_spanish:
  - reconocida
  lexicon: BDAG
  rationale: El participio puede significar «ser conocida» o «ser reconocida». «Conocida» conserva bien el paralelismo con «leída» y suena natural en español.
- source_word: ἀναγινωσκομένη
  english_pob_choice: read
  chosen_spanish: leída
  alternatives_spanish:
  - releída
  lexicon: BDAG
  rationale: El verbo se refiere propiamente a la lectura. «Leída» mantiene la imagen epistolar de forma directa y clara.
- source_word: ὑπὸ πάντων ἀνθρώπων
  english_pob_choice: by all people
  chosen_spanish: por todos los hombres
  alternatives_spanish:
  - por todas las personas
  - por todos
  lexicon: BDAG
  rationale: ἀνθρώπων es genérico para seres humanos. La forma más neutra en español sería «por todas las personas», pero aquí se conserva «todos los hombres» para reflejar la fórmula tradicional y la universalidad del griego; no pretende restringir a varones.
theological_decisions:
- issue: Universalidad de la lectura pública de la comunidad
  english_pob_reading: known and read by all people
  chosen_spanish_reading: conocida y leída por todos los hombres
  alternative_spanish_readings:
  - conocida y leída por todas las personas
  - conocida y leída por todos
  rationale: El punto no es un grupo interno sino la visibilidad universal de la comunidad como carta de Cristo/los apóstoles. Se mantiene el alcance universal sin añadir un matiz doctrinal ajeno al verso.
  doctrine_reference: 2 Corintios 3:2; 2 Corintios 3:3
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió revisiones posteriores y fue confirmada como de alta concordancia; esta propuesta sigue esa lectura estable, ajustando solo la idiomaticidad y la concordancia propias del español.
  spanish_consistency_notes:
  - Se evita «epístola» en el texto principal para conservar claridad moderna, aunque se deja como alternativa registrada.
  - Se mantiene la metáfora epistolar con «carta», «escrita», «conocida» y «leída» sin expandirla interpretativamente.
  - Se conserva el alcance genérico de ἀνθρώπων con una nota que explicita su valor inclusivo en español.
