review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y la metáfora del griego: «Ustedes son nuestra carta, escrita en nuestros corazones, conocida y leída…». También preserva correctamente ἐν como «en» y la alternativa léxica de γινωσκομένη como «reconocida». Sin embargo, «por todos los hombres» no refleja bien la decisión auditada ni el valor genérico de ἀνθρώπων en español actual; el sentido es inclusivo: «por todas las personas» o equivalente.'
  spanish_quality_summary: El español es claro y natural en general. La única falla importante de legibilidad y precisión inclusiva es «todos los hombres», que en español contemporáneo puede sonar restringido a varones y choca con la propia justificación léxica dada. «Todas las personas» conserva el alcance universal y suena natural en registro bíblico moderno.
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. «Carta» para ἐπιστολή está bien. La revisión necesaria es alinear ἀνθρώπων con un español genérico natural e inclusivo, en línea con el POB inglés («all people»).
  issues:
  - severity: medium
    issue: «por todos los hombres» para ὑπὸ πάντων ἀνθρώπων
    rationale: El griego ἀνθρώπων es genérico para seres humanos. El inglés auditado eligió explícitamente «all people» para evitar una lectura masculina. En español actual, «todos los hombres» puede introducir ambigüedad o sonar excluyente; «todas las personas» comunica mejor el sentido fuente y la intención del POB.
  - severity: low
    issue: La nota alternativa repite «todos los hombres»
    rationale: La nota léxica para γινωσκομένη debe mantenerse, pero su anclaje final también debe reflejar el referente humano genérico del texto para no reintroducir el mismo problema de la línea principal.
  revised_spanish_text: Ustedes son nuestra carta[a], escrita en nuestros corazones, conocida y leída por todas las personas.
  revised_footnotes:
  - marker: a
    text: O «reconocida y leída por todas las personas».
    reason: lexical_alternative
