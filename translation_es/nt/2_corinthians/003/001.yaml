    issue: La nota al pie usa «commendación».
    rationale: «Commendación» es un calco del inglés, no una opción natural o recomendable en español neutral. Daña la legibilidad y no cumple bien la racionalidad léxica documentada.
  - severity: low
    issue: «para ustedes» suaviza la direccionalidad de πρὸς ὑμᾶς.
    rationale: Aunque idiomático, «a ustedes» refleja más directamente el valor de «to you» del audit trail y el paralelismo con «de ustedes».
  - severity: low
    issue: «de parte de ustedes» explicita agencia más que simple fuente en ἐξ ὑμῶν.
    rationale: El griego marca origen/fuente. «De ustedes» es más directo y suficientemente natural en este contexto.
