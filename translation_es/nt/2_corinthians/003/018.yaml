translation:
  language: es
  text: Y todos nosotros[a], con el rostro descubierto, contemplando la gloria del Señor como en un espejo, somos transformados en la misma imagen, de gloria en gloria, como por el Señor[b], el Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'reflejando la gloria del Señor como en un espejo'.
    reason: alternative_reading
  - marker: b
    text: O 'por el Señor, que es el Espíritu'; alternativamente, 'por el Espíritu del Señor'.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀνακεκαλυμμένῳ προσώπῳ
  english_pob_choice: with unveiled face
  chosen_spanish: con el rostro descubierto
  alternatives_spanish:
  - con el rostro velado
  - con el rostro sin velo
  lexicon: BDAG
  rationale: La forma perfecta participial describe un estado resultante de haber sido quitado el velo. En español, 'con el rostro descubierto' comunica ese estado de manera natural y mantiene la imagen singular y colectiva del griego.
- source_word: δόξαν κυρίου
  english_pob_choice: the glory of the Lord
  chosen_spanish: la gloria del Señor
  alternatives_spanish:
  - la gloria del Señor
  - la gloria de Yahvé
  lexicon: BDAG
  rationale: Se conserva la relación genitiva simple del griego. Aquí 'κύριος' funciona en el marco de la frase con el valor de 'Señor', y la traducción mantiene la designación tradicional dentro del texto base inglés ya auditado.
- source_word: κατοπτριζόμενοι
  english_pob_choice: beholding ... as in a mirror
  chosen_spanish: contemplando ... como en un espejo
  alternatives_spanish:
  - reflejando ... como un espejo
  - mirando ... como en un espejo
  lexicon: BDAG
  rationale: El verbo admite la idea de ver por medio de un espejo o la de reflejar. En el cuerpo principal, 'contemplando' sigue la lectura escogida por el POB en inglés; la alternativa de 'reflejando' se preserva en nota porque el valor léxico sigue siendo discutido.
- source_word: τὴν αὐτὴν εἰκόνα
  english_pob_choice: the same image
  chosen_spanish: la misma imagen
  alternatives_spanish:
  - esa misma imagen
  lexicon: BDAG
  rationale: La expresión se traduce de forma directa para mantener el vínculo con la transformación descrita. 'La misma imagen' conserva la referencia precisa sin añadir énfasis interpretativo no presente en el griego.
- source_word: μεταμορφούμεθα
  english_pob_choice: are being transformed
  chosen_spanish: somos transformados
  alternatives_spanish:
  - estamos siendo transformados
  - somos cambiados
  lexicon: BDAG
  rationale: El presente pasivo comunica acción en curso. En español, 'somos transformados' puede expresar ese proceso sin volverse torpemente perifrástico, y conserva la pasiva griega con claridad litúrgica y naturalidad.
- source_word: ἀπὸ δόξης εἰς δόξαν
  english_pob_choice: from glory to glory
  chosen_spanish: de gloria en gloria
  alternatives_spanish:
  - de gloria a gloria
  lexicon: BDAG
  rationale: La fórmula compacta del griego se mantiene compacta en español. 'De gloria en gloria' es idiomática, fiel y conserva el efecto acumulativo de la expresión.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - justo como
  lexicon: BDAG
  rationale: '''Tal como'' reproduce con claridad el valor comparativo y resulta natural en español contemporáneo. Mantiene la relación de semejanza sin intensificar indebidamente el matiz.'
- source_word: ἀπὸ κυρίου πνεύματος
  english_pob_choice: from the Lord, the Spirit
  chosen_spanish: del Señor, el Espíritu
  alternatives_spanish:
  - del Señor, que es el Espíritu
  - del Espíritu del Señor
  lexicon: BDAG
  rationale: La frase griega es comprimida y admite más de una relación sintáctica. 'Del Señor, el Espíritu' preserva la apposición sin resolver de más la ambigüedad. La opción más explícita queda reservada para nota, como en el POB inglés.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se sigue el valor estándar de κύριος en el texto base. 'Señor' funciona bien tanto en la primera mención como en la clausula final, sin borrar la posible referencia teológica implícita.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Aquí el contexto exige mayúscula por la referencia personal-teológica. Mantener 'Espíritu' preserva la lectura del POB inglés y evita perder la posibilidad de una referencia al Espíritu Santo.
theological_decisions:
- issue: El sentido de κατοπτριζόμενοι
  english_pob_reading: beholding the glory of the Lord as in a mirror
  chosen_spanish_reading: contemplando la gloria del Señor como en un espejo
  alternative_spanish_readings:
  - reflejando la gloria del Señor como un espejo
  rationale: La lectura principal enfatiza la contemplación de la gloria del Señor como medio de transformación. Dado que el verbo griego también puede sugerir reflejo, la alternativa se preserva en nota para no borrar la tensión léxica.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla artificialmente.
- issue: La relación de κυρίου y πνεύματος en la cláusula final
  english_pob_reading: from the Lord, the Spirit
  chosen_spanish_reading: del Señor, el Espíritu
  alternative_spanish_readings:
  - del Señor, que es el Espíritu
  - del Espíritu del Señor
  rationale: El griego es conciso y sintácticamente abierto. La redacción elegida sigue de cerca la forma del texto y deja abierta la cuestión de si se trata de una apposición, una identificación o una relación genitiva más explícita.
  doctrine_reference: Preservar la tensión doctrinal y sintáctica.
translation_notes:
  revision_awareness: 'El texto griego y el aparato auditado en inglés muestran alta concordancia y no requieren cambios de revisión adicionales; se conservan las dos tensiones principales del versículo: κατοπτριζόμενοι y la clausula final ἀπὸ κυρίου πνεύματος.'
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en todo el versículo, conforme al criterio del proyecto y al POB inglés.
  - Se usa 'Espíritu' con mayúscula en la cláusula final por la referencia personal-teológica, sin introducir una paráfrasis doctrinal cerrada.
  - '''De gloria en gloria'' preserva la concisión del original y la cadencia de la fórmula paulina.'
  - El anclaje de la nota [a] corresponde a 'contemplando' para señalar la lectura alternativa de 'reflejando'.
  - El anclaje de la nota [b] corresponde a 'del Señor, el Espíritu' para conservar la ambigüedad sintáctica documentada.
