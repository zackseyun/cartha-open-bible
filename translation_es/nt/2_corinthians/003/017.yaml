translation:
  language: es
  text: Ahora bien, el Señor es el Espíritu[a]; y donde está el Espíritu del Señor, allí hay libertad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ahora bien, el Señor es el Espíritu» puede entenderse como una identificación contextual estrecha, sin precisar en la traducción cómo debe definirse teológicamente la relación.'
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  - dueño
  lexicon: BDAG
  rationale: Se conserva el valor cristológico-teológico habitual de κύριος en el corpus paulino. En español, «Señor» es el equivalente natural y reverente; «amo» o «dueño» serían demasiado reductivos para este contexto.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Se usa «Espíritu» con mayúscula porque el contexto inmediato y la lectura auditada del POB inglés apuntan al Espíritu Santo, no a un espíritu humano o a una fuerza impersonal.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - y
  - pero
  lexicon: BDAG
  rationale: «Ahora bien» comunica en español el avance discursivo de δέ sin endurecerlo en una oposición fuerte. Mantiene el tono argumentativo de transición del pasaje.
- source_word: οὗ
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - dondequiera que
  lexicon: BDAG
  rationale: La forma locativa natural en español es «donde». «Dondequiera que» amplía más de lo que pide el griego y vuelve más enfática la generalidad.
- source_word: ἐλευθερία
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - libertad plena
  - libre acceso
  lexicon: BDAG
  rationale: «Libertad» es el equivalente directo y conserva la carga teológica del sustantivo griego sin añadir matices no presentes en el texto.
- source_word: ὁ δὲ κύριος τὸ πνεῦμά ἐστιν
  english_pob_choice: Now the Lord is the Spirit
  chosen_spanish: Ahora bien, el Señor es el Espíritu
  alternatives_spanish:
  - Ahora bien, el Señor es espíritu
  lexicon: BDAG
  rationale: Se mantiene la cláusula equativa sin suavizarla, porque el griego presenta la identificación de forma directa. La mayúscula en «Espíritu» sigue la decisión contextual del POB inglés.
- source_word: τὸ πνεῦμα κυρίου
  english_pob_choice: the Spirit of the Lord
  chosen_spanish: el Espíritu del Señor
  alternatives_spanish:
  - el espíritu del Señor
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva explícita para reflejar la forma griega y la resonancia bíblica de la expresión. La mayúscula en «Espíritu» se mantiene por coherencia contextual.
theological_decisions:
- issue: La identificación «el Señor es el Espíritu» es teológicamente discutida.
  english_pob_reading: 'Rendered the clause straightforwardly as an unsoftened equative statement: "the Lord is the Spirit."'
  chosen_spanish_reading: 'Se traduce de manera directa: «el Señor es el Espíritu», sin resolver la relación en la redacción principal.'
  alternative_spanish_readings:
  - «el Señor actúa por medio del Espíritu»
  - «el Señor se identifica funcionalmente con el Espíritu»
  - «el Señor es espiritual»
  rationale: El griego presenta una afirmación ecuativa directa, y el POB inglés decidió preservar esa tensión. La versión española mantiene la misma transparencia y evita explicar en el texto principal una relación teológica que el pasaje no define de manera explícita.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla por paráfrasis.
translation_notes:
  revision_awareness: Se siguió el estado auditado más reciente del POB inglés, que no presenta revisiones adicionales y mantiene alta concordancia con la lectura original. No se añadieron notas textuales nuevas porque el punto principal ya está cubierto por la nota alternativa sobre la identificación de «el Señor» y «el Espíritu».
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος según el estándar del proyecto y por coherencia con el uso paulino.
  - Se capitalizó «Espíritu» en ambos casos para reflejar la referencia al Espíritu Santo, como en el audit trail inglés.
  - Se evitó «SEÑOR» como sustituto de Yahvé porque aquí el término griego κύριος funciona dentro de la formulación paulina, no como simple máscara del nombre divino hebreo.
