    text: 'O ''del Antiguo Testamento''. Griego: ''del antiguo pacto''.'
    reason: lexical_alternative
  - marker: b
    text: 'O ''sin ser levantado'' o ''sin ser descorrido''. La imagen sigue siendo la del velo; también puede entenderse: ''porque en el Mesías es abolido / dejado de lado''.'
    reason: alternative_reading
  revision_rationale: 'Se reubican y corrigen las notas para reflejar el expediente inglés: la alternativa tradicional pertenece a ''antiguo pacto'', no a ''mentes''; y la nota sobre μὴ ἀνακαλυπτόμενον debe mantener la imagen del velo siendo quitado/levantado, además de conservar la ambigüedad documentada sobre καταργεῖται. También se cambia ''entendimientos'' por ''mentes'' para una lectura más natural en español actual.'
