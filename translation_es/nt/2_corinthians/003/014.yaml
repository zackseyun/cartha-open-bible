    output_hash: c5a1f080e120a6c38fc426d70243c5ceb703a2c3ad4e0e921b19ba94db7f0d7c
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:37:10Z'
    unchanged: false
    changes_summary: 'Replaced ''unveiled'' with ''lifted'' to better match the veil imagery and the sense of ἀνακαλυπτόμενον; replaced ''the Messiah'' with ''Christ'' for more natural rendering of ἐν Χριστῷ in this context. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero sus mentes fueron endurecidas. Porque hasta el día de hoy, en la lectura del antiguo pacto[a], el mismo velo permanece, sin ser quitado[b], porque en el Mesías se quita.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O ''del Antiguo Testamento''. Griego: ''del antiguo pacto''.'
    reason: lexical_alternative
  - marker: b
    text: 'O ''sin ser levantado'' o ''sin ser descorrido''. La imagen sigue siendo la del velo; también puede entenderse: ''porque en el Mesías es abolido / dejado de lado''.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπωρώθη
  english_pob_choice: were hardened
  chosen_spanish: fueron endurecidos
  alternatives_spanish:
  - se endurecieron
  - quedaron endurecidos
  - fueron insensibilizados
  lexicon: BDAG
  rationale: Conserva la pasiva y el sentido de volverse insensibles o resistentes espiritualmente, sin añadir una lectura más volitiva de la que exige el griego.
- source_word: νοήματα
  english_pob_choice: minds
  chosen_spanish: entendimientos
  alternatives_spanish:
  - mentes
  - pensamientos
  - comprensiones
  lexicon: BDAG
  rationale: En este contexto apunta a la facultad de percibir y comprender; 'entendimientos' suena natural en español y preserva el alcance cognitivo sin reducirlo solo a pensamientos aislados.
- source_word: ἄχρι γὰρ τῆς σήμερον ἡμέρας
  english_pob_choice: For until this very day
  chosen_spanish: Porque hasta el día de hoy
  alternatives_spanish:
  - Porque hasta este mismo día
  - Porque hasta hoy
  - Porque hasta el día presente
  lexicon: BDAG
  rationale: Mantiene el énfasis temporal y se lee con naturalidad en español moderno.
- source_word: κάλυμμα
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cubierta
  - cobertura
  lexicon: BDAG
  rationale: '''Velo'' preserva la imagen paulina y la conexión con el contexto de Moisés; ''cubierta'' sería más genérico y menos evocador.'
- source_word: παλαιᾶς διαθήκης
  english_pob_choice: the old covenant
  chosen_spanish: el antiguo pacto
  alternatives_spanish:
  - el pacto antiguo
  - el antiguo testamento
  lexicon: BDAG
  rationale: '''διαθήκη'' aquí es ''pacto'' o ''alianza'', no ''testamento''; ''antiguo pacto'' sigue el griego y evita importar una tradición terminológica ajena al texto.'
- source_word: μὴ ἀνακαλυπτόμενον
  english_pob_choice: not being lifted
  chosen_spanish: sin ser levantado
  alternatives_spanish:
  - sin ser descorrido
  - sin ser revelado
  - sin quitarse
  lexicon: BDAG
  rationale: '''Levantado'' conserva la imagen del velo y se ajusta al sentido revisado en el audit trail; la forma perifrástica mantiene el participio pasivo sin exagerar la abstracción.'
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona como título; 'Mesías' preserva el valor titular y sigue el defecto terminológico del proyecto, que prefiere 'Mesías' salvo razón contextual fuerte para 'Cristo'.
- source_word: καταργεῖται
  english_pob_choice: is removed
  chosen_spanish: se quita
  alternatives_spanish:
  - se abole
  - se anula
  - se deja de lado
  lexicon: BDAG
  rationale: Dado que el antecedente inmediato es el velo, 'se quita' comunica de forma clara y concreta la acción sobre ese velo, sin forzar el verbo hacia una abstracción doctrinal mayor.
theological_decisions:
- issue: Referente de καταργεῖται
  english_pob_reading: The nearest antecedent is the veil, so the clause means 'because in the Messiah it is removed.'
  chosen_spanish_reading: 'Se mantiene la lectura de que el referente inmediato es el velo: ''porque en el Mesías se quita''.'
  alternative_spanish_readings:
  - porque en el Mesías se abole el antiguo pacto
  - porque en el Mesías queda abolido
  - porque en el Mesías se deja de lado
  rationale: El antecedente más cercano y natural es τὸ ... κάλυμμα ('el mismo velo'); traducir con 'se quita' preserva la imaginería del pasaje y evita resolver indebidamente la ambigüedad a favor de un objeto distinto.
  doctrine_reference: Preservar la tensión teológica y sintáctica del texto; no expandir el alcance de καταργεῖται más allá del referente inmediato.
translation_notes:
  revision_awareness: 'El draft sigue de cerca el último estado revisado del audit trail: se adopta ''velo'' para κάλυμμα, ''antiguo pacto'' para παλαιᾶς διαθήκης, y se conserva la resolución del referente de καταργεῖται hacia el velo inmediato. Se evita ''Cristo'' en favor de ''Mesías'' conforme a la restauración editorial indicada en la revisión final.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' como traducción titular de Χριστός, coherente con la terminología del proyecto.
  - Se evita 'SEÑOR' y otras sustituciones reverenciales, porque el verso no contiene el tetragrámaton ni κύριος como forma principal aquí.
  - '''Antiguo pacto'' conserva la distinción con ''testamento'' que el griego no justifica en este contexto.'
  - La frase 'sin ser levantado' conserva el pasivo y la metáfora del velo sin volverla una explicación interpretativa excesiva.
