revisions:
- from: Pero sus entendimientos fueron endurecidos[a]. Porque hasta el día de hoy, en la lectura del antiguo pacto, el mismo velo permanece, sin ser levantado[b], porque en el Mesías se quita.
  to: Pero sus mentes fueron endurecidas. Porque hasta el día de hoy, en la lectura del antiguo pacto[a], el mismo velo permanece, sin ser quitado[b], porque en el Mesías se quita.
  rationale: 'Se reubican y corrigen las notas para reflejar el expediente inglés: la alternativa tradicional pertenece a ''antiguo pacto'', no a ''mentes''; y la nota sobre μὴ ἀνακαλυπτόμενον debe mantener la imagen del velo siendo quitado/levantado, además de conservar la ambigüedad documentada sobre καταργεῖται. También se cambia ''entendimientos'' por ''mentes'' para una lectura más natural en español actual.'
