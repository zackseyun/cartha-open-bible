source:
  edition: SBLGNT
  text: ἀλλὰ ἐπωρώθη τὰ νοήματα αὐτῶν. ἄχρι γὰρ τῆς σήμερον ⸀ἡμέρας τὸ αὐτὸ κάλυμμα ἐπὶ τῇ ἀναγνώσει τῆς παλαιᾶς διαθήκης μένει μὴ ἀνακαλυπτόμενον, ⸀ὅτι ἐν Χριστῷ καταργεῖται,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/003/014.yaml
  text: But their minds were hardened[a]. For until this very day, at the reading of the old covenant, the same veil remains, not being lifted[b], because in Messiah it is removed.
  footnotes:
  - marker: a
    text: 'Or ''the old testament.'' Greek: ''the old covenant.'''
    reason: lexical_alternative
  - marker: b
    text: Or 'because in Christ it is abolished / set aside.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: 5cfdbd698997b6b694332bcb2e1427ce8cd4e00f7425f70d699408940b6d54e2
