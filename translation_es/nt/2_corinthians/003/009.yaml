translation:
  language: es
  text: Porque si el ministerio de la condenación tenía gloria, mucho más abunda en gloria el ministerio de la justicia[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «rectitud».
    reason: lexical_alternative
lexical_decisions:
- source_word: διακονία
  english_pob_choice: ministry
  chosen_spanish: ministración
  alternatives_spanish:
  - ministerio
  - servicio
  lexicon: BDAG
  rationale: Se conserva el valor institucional/covenantal del término, no solo la idea de un acto de servicio. "Ministración" permite reflejar la función o administración a la que Pablo contrapone otra ministración, y evita reducir el contraste a un servicio aislado.
- source_word: κατάκρισις
  english_pob_choice: condemnation
  chosen_spanish: condena
  alternatives_spanish:
  - condenación
  - sentencia de condena
  - juicio condenatorio
  lexicon: BDAG
  rationale: El sustantivo griego es forense; "condena" comunica bien el resultado judicial sin añadir más contenido del que aporta el texto. "Condenación" es posible, pero en español suele sonar más abstracta y menos directa en este contraste.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: '"Gloria" es el equivalente natural y teológicamente cargado en español bíblico, preservando el hilo argumental de Pablo sobre la gloria superior del nuevo pacto.'
- source_word: πολλῷ μᾶλλον
  english_pob_choice: much more
  chosen_spanish: mucho más
  alternatives_spanish:
  - con mucha más razón
  - muchísimo más
  lexicon: BDAG
  rationale: 'La comparación intensiva idiomática se vierte con la expresión española más directa y natural: "mucho más".'
- source_word: περισσεύω
  english_pob_choice: abound
  chosen_spanish: abunda
  alternatives_spanish:
  - sobreabunda
  - rebosa
  - abunda en gran manera
  lexicon: BDAG
  rationale: '"Abunda" reproduce la idea de exceder o rebosar sin forzar una metáfora más fuerte que la del griego. Encaja además con el complemento "en gloria".'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justificación
  lexicon: BDAG
  rationale: Aunque el inglés POB retiene "righteousness" por su uso paulino, en español "justicia" es el término más natural y fiel al campo semántico aquí. Se preserva la alternativa teológica en nota para no borrar la tensión entre justicia y rectitud.
theological_decisions:
- issue: δικαιοσύνη en contraste paulino entre dos ministraciones
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justificación
  rationale: En español, "justicia" comunica de forma clara el contraste entre la ministración de condena y la ministración asociada con la justicia. Se mantiene la posibilidad de leer "righteousness" como "justicia" sin imponer una glosa doctrinal adicional.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; Spanish note preserves justicia as an accepted alternative in Pauline contexts'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que sustituyó una formulación más libre por "had glory" para acercarse más al griego verbalmente elíptico. La redacción española evita un verbo de movimiento y usa una construcción posesiva natural («tenía gloria») que refleja bien la cláusula sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se conservó "gloria" como término técnico-teológico consistente con el resto del corpus.
  - '"Ministración" se usa para mantener el contraste de dos administraciones/ministerios, evitando reducir διακονία a "servicio".'
  - '"Justicia" se eligió en el texto principal por claridad en español; la nota mantiene la alternativa "rectitud" para no perder la amplitud semántica paulina.'
  - La puntuación y el orden mantienen una cadencia bíblica moderna y publicable en español neutro.
