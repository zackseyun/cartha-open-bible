  revision_rationale: La revisión no cambia sustancialmente la traducción principal, pero corrige la alineación entre notas y texto fuente. Se mueve la nota de καθάπερ al adverbio comparativo «como», se conserva la nota idiomática sobre «los hijos de Israel», y se añade una nota en «fin» para reflejar la alternativa documentada para τέλος. Así el español preserva mejor tanto la evidencia griega como la pista de auditoría inglesa.
