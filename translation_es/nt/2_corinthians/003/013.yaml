translation:
  language: es
  text: y no [a]como Moisés, que solía poner un velo sobre su rostro, para que los hijos de Israel[b] no fijaran la vista en el fin[c] de lo que se iba desvaneciendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tal como».
    reason: alternative_reading
  - marker: b
    text: O «israelitas».
    reason: lexical_alternative
  - marker: c
    text: O «la meta» o «el resultado» de lo que estaba siendo llevado a su fin.
    reason: alternative_reading
lexical_decisions:
- source_word: καθάπερ
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: En español, «como» expresa la comparación de manera natural y mantiene la fuerza comparativa sin añadir énfasis innecesario.
- source_word: ἐτίθει
  english_pob_choice: used to put
  chosen_spanish: solía poner
  alternatives_spanish:
  - ponía
  - estaba poniendo
  lexicon: BDAG
  rationale: El imperfecto sugiere acción habitual o reiterada en el trasfondo narrativo; «solía poner» comunica bien ese matiz en español.
- source_word: κάλυμμα
  english_pob_choice: veil
  chosen_spanish: velo
  alternatives_spanish:
  - cubierta
  - cubrimiento
  lexicon: BDAG
  rationale: «Velo» es el término preciso y reconocible para este objeto en el contexto de Éxodo y en la argumentación de Pablo.
- source_word: πρόσωπον αὐτοῦ
  english_pob_choice: his face
  chosen_spanish: su rostro
  alternatives_spanish:
  - su cara
  lexicon: BDAG
  rationale: «Rostro» es una opción digna y natural en español bíblico, equivalente a «face» sin perder claridad.
- source_word: πρὸς τὸ μὴ ἀτενίσαι
  english_pob_choice: so that ... would not gaze
  chosen_spanish: para que ... no fijaran la vista
  alternatives_spanish:
  - para que ... no miraran fijamente
  - para que ... no contemplaran
  lexicon: BDAG
  rationale: La construcción expresa finalidad. «Fijar la vista» conserva la intensidad de ἀτενίζω mejor que un simple «mirar».
- source_word: τοὺς υἱοὺς Ἰσραήλ
  english_pob_choice: the sons of Israel
  chosen_spanish: los hijos de Israel
  alternatives_spanish:
  - los israelitas
  - los hijos de Jacob
  lexicon: BDAG
  rationale: Se mantiene la forma explícita del griego y el idiomatismo bíblico con una traducción directa y natural en español.
- source_word: εἰς τὸ τέλος
  english_pob_choice: at the end
  chosen_spanish: en el fin
  alternatives_spanish:
  - al final
  - en el término
  lexicon: BDAG
  rationale: «Fin» preserva la ambigüedad semántica de τέλος entre fin, término y meta, y deja espacio para la tensión interpretativa del contexto.
- source_word: τοῦ καταργουμένου
  english_pob_choice: of what was fading away
  chosen_spanish: de lo que se iba desvaneciendo
  alternatives_spanish:
  - de lo que estaba siendo abolido
  - de lo que se estaba acabando
  lexicon: BDAG
  rationale: «Desvaneciendo» refleja bien la idea de algo que pierde vigor o se va deshaciendo. Mantiene la imagen contextual de lo transitorio sin forzar «abolido».
theological_decisions:
- issue: Sentido de τέλος τοῦ καταργουμένου
  english_pob_reading: Paul refers to the termination of the old-covenant glory as something fading away, not primarily to a positive 'goal' or 'telos.'
  chosen_spanish_reading: Pablo habla del fin de algo que se iba desvaneciendo, no principalmente de una meta positiva.
  alternative_spanish_readings:
  - la meta de lo que se estaba anulando
  - el resultado de lo que se estaba llevando a término
  rationale: La redacción conserva la tensión del contraste entre lo transitorio y lo permanente en 2 Corintios 3, sin resolverla hacia una interpretación más fuerte que la exigida por el texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Referente de «los hijos de Israel»
  english_pob_reading: Greek 'sons of Israel'; idiomatically, 'Israelites.'
  chosen_spanish_reading: Se conserva la forma bíblica explícita «los hijos de Israel».
  alternative_spanish_readings:
  - los israelitas
  rationale: Dado que el griego dice literalmente «hijos», el español puede reproducir esa forma bíblica sin perder inteligibilidad; la opción idiomática queda disponible, pero no es necesaria aquí.
  doctrine_reference: Fidelidad al sintagma del texto fuente
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente las notas al texto con [a] y [b], sin cambiar el contenido base del versículo.
  spanish_consistency_notes:
  - Se mantuvo «hijos de Israel» para reflejar el griego υἱοὺς Ἰσραήλ.
  - Se usó «velo» para κάλυμμα y «rostro» para πρόσωπον por claridad y dignidad en español.
  - Se prefirió «se iba desvaneciendo» para καταργουμένου, evitando una traducción excesivamente técnica o doctrinalmente cerrada.
  - El tono general es bíblico-formal pero en español moderno legible.
