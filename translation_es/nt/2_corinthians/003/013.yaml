revisions:
- from: y no como Moisés[a], que solía poner un velo sobre su rostro, para que los hijos de Israel[b] no fijaran la vista en el fin de lo que se iba desvaneciendo.
  to: y no [a]como Moisés, que solía poner un velo sobre su rostro, para que los hijos de Israel[b] no fijaran la vista en el fin[c] de lo que se iba desvaneciendo.
  rationale: La revisión no cambia sustancialmente la traducción principal, pero corrige la alineación entre notas y texto fuente. Se mueve la nota de καθάπερ al adverbio comparativo «como», se conserva la nota idiomática sobre «los hijos de Israel», y se añade una nota en «fin» para reflejar la alternativa documentada para τέλος. Así el español preserva mejor tanto la evidencia griega como la pista de auditoría inglesa.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:44Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: comparación con Moisés, imperfecto habitual («solía poner»), finalidad negativa («para que ... no fijaran la vista»), y la idea de lo transitorio en «lo que se iba desvaneciendo». Sin embargo, no preserva plenamente la evidencia ni la pista de auditoría inglesa en dos puntos: (1) el texto español no marca nota en «fin», aunque la POB inglesa conserva una alternativa importante para τέλος; y (2) la nota [a] está anclada a «Moisés», pero en realidad comenta καθάπερ/«como», no el nombre propio. Eso requiere reparación para que las notas correspondan al lugar semántico correcto.'
  spanish_quality_summary: 'La redacción es clara, natural y digna en español bíblico contemporáneo. «Rostro», «velo», «solía poner» y «fijaran la vista» funcionan bien. «En el fin» en las decisiones léxicas sería poco natural como redacción principal, pero el texto real usa «en el fin» no, sino «en el fin» solo en metadatos; el texto visible dice «en el fin de lo que se iba desvaneciendo»? No: el borrador dice «en el fin de lo que se iba desvaneciendo» implícitamente mediante «en el fin» no aparece; el texto real dice «en el fin» tampoco, sino «en el fin» está solo en la decisión. Aun así, en el texto principal «en el fin» no es problema porque se expresa como «en el fin de...», pero «el fin de...» puede mejorarse con una nota en el punto de ambigüedad. La lectura general es buena.'
  glossary_alignment: No hay términos del glosario maestro en disputa aquí. El borrador sí sigue la preferencia de preservar «los hijos de Israel» frente a la alternativa idiomática «israelitas», y mantiene bien el valor de κάλυμμα como «velo». La decisión sobre τέλος requiere una nota española equivalente a la inglesa para conservar la justificación léxica y teológica documentada.
  issues:
  - severity: medium
    issue: La nota [a] está anclada al lugar equivocado.
    rationale: La nota «O «tal como»» explica καθάπερ = «como», no «Moisés». Debe colocarse junto a «como» para que el anclaje corresponda al elemento fuente relevante.
  - severity: medium
    issue: Falta en español la nota de alternativa para «fin».
    rationale: La POB inglesa preserva una alternativa sustantiva para εἰς τὸ τέλος («goal/outcome»). Dado que el español también puede leerse como «fin» terminativo, debe mantenerse una nota equivalente para auditoría y para preservar la tensión interpretativa documentada.
  - severity: low
    issue: La nota sobre «los hijos de Israel» puede mantenerse, pero el orden de marcadores debe rehacerse tras corregir los anclajes.
    rationale: Al mover la nota de καθάπερ y añadir la de τέλος, los marcadores deben quedar en orden textual único (a, b, c).
  revised_spanish_text: y no [a]como Moisés, que solía poner un velo sobre su rostro, para que los hijos de Israel[b] no fijaran la vista en el fin[c] de lo que se iba desvaneciendo.
  revised_footnotes:
