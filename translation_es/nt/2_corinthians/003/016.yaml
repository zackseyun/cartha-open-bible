translation:
  language: es
  text: Pero siempre que uno se vuelva al Señor, el velo[a] es quitado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando uno se vuelva al Señor».
    reason: lexical_alternative
  - marker: b
    text: O «el velo es removido».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἡνίκα
  english_pob_choice: whenever
  chosen_spanish: siempre que
  alternatives_spanish:
  - cuando
  - cada vez que
  lexicon: BDAG
  rationale: ἡνίκα introduce una cláusula temporal con sentido indefinido o repetido. En español, «siempre que» comunica bien esa iteración sin sonar mecánico.
- source_word: δὲ ἐὰν
  english_pob_choice: but whenever
  chosen_spanish: pero siempre que
  alternatives_spanish:
  - pero cuando
  - ahora bien, siempre que
  lexicon: BDAG
  rationale: δέ conserva un matiz adversativo o de transición, y ἐὰν mantiene la eventualidad/indefinición. «Pero siempre que» refleja ambos valores con naturalidad.
- source_word: ἐπιστρέψῃ
  english_pob_choice: turns
  chosen_spanish: se vuelva
  alternatives_spanish:
  - se vuelva de nuevo
  - se convierta
  - se arrepienta
  lexicon: BDAG
  rationale: ἐπιστρέφω aquí expresa movimiento de regreso o giro hacia alguien. «Se vuelva» preserva la imagen direccional sin cargar el texto con una interpretación más estrecha como «arrepentirse».
- source_word: πρὸς κύριον
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - hacia el Señor
  - para con el Señor
  lexicon: BDAG
  rationale: πρός con acusativo expresa dirección hacia una persona. En español, «al Señor» es idiomático y conserva esa orientación.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título «Señor» como equivalente natural y reverente de κύριος, sin resolver en la traducción la identidad interpretativa más amplia del contexto.
- source_word: περιαιρεῖται
  english_pob_choice: is removed
  chosen_spanish: es quitado
  alternatives_spanish:
  - es removido
  - es quitado de en medio
  - es levantado
  lexicon: BDAG
  rationale: El pasivo presente indica lo que ocurre con el velo. «Es quitado» conserva la pasividad y evita introducir un agente implícito.
- source_word: τὸ κάλυμμα
  english_pob_choice: the veil
  chosen_spanish: el velo
  alternatives_spanish:
  - el cubrimiento
  - el velo que cubre
  lexicon: BDAG
  rationale: En este contexto paulino el objeto es el velo mosaico. «Velo» es la opción específica y reconocible en español.
theological_decisions:
- issue: Referencia del Señor en el contexto inmediato
  english_pob_reading: Render simply as 'the Lord' without specifying 'Christ' or 'the Spirit' in the translation line
  chosen_spanish_reading: Traducir simplemente «el Señor», sin añadir «Cristo» ni identificarlo explícitamente con «el Espíritu» en el texto principal
  alternative_spanish_readings:
  - el Señor Cristo
  - el Señor, es decir, el Espíritu
  rationale: El verso griego dice μόνο κύριον. La traducción debe conservar esa sobriedad y no resolver en el cuerpo del texto una tensión interpretativa que el pasaje cercano deja abierta.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sujeto indefinido de la cláusula
  english_pob_reading: Leave the subject implicit in English as 'one' within 'whenever one turns to the Lord'
  chosen_spanish_reading: Expresar el sujeto indefinido como «uno»
  alternative_spanish_readings:
  - si alguien se vuelve al Señor
  - cuando una persona se vuelva al Señor
  rationale: El griego usa un verbo en subjuntivo con valor indefinido; «uno» mantiene la generalidad y evita restringir el alcance del enunciado.
  doctrine_reference: Indefinitud gramatical sin especificar más de lo que el texto dice.
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se reportan cambios necesarios y el acuerdo con la auditoría inglesa es alto.'
  spanish_consistency_notes:
  - Se preserva «Señor» como título y no se sustituye por «Yahvé», porque el griego aquí usa κύριον y la auditoría inglesa mantiene «Lord» sin especificación adicional.
  - «Velo» se mantiene como término técnico-contextual del pasaje mosaico.
  - La cláusula indefinida se expresa con «uno» para reflejar el valor general del subjuntivo griego.
  - El registro es sobrio y publicable, evitando un tono excesivamente arcaico.
