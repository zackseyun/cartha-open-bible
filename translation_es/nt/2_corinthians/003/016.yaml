review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido básico del griego: cláusula temporal indefinida/iterativa, giro hacia el Señor, y resultado pasivo sobre el velo. También preserva correctamente la reserva interpretativa sobre «el Señor». Sin embargo, la nota [b] introduce un matiz no respaldado por el inglés auditado ni necesario desde el griego: «de en medio» añade especificación. Además, «es quitado» es comprensible, pero «es removido» o «se quita» suenan menos toscos; aun así, puede mantenerse «es quitado» por fidelidad formal.'
  spanish_quality_summary: El texto es claro y legible en español eclesial neutral. «Pero siempre que uno se vuelva al Señor» funciona, aunque «cada vez que» también sería natural. La principal mejora necesaria es ajustar la nota léxica para que no añada contenido no documentado. El resto del fraseo es digno y natural.
  glossary_alignment: Señor para κύριον está bien y respeta la decisión de no resolver la identidad del referente. «Velo» para κάλυμμα es correcto. No hay conflicto con la terminología base del proyecto. La elección «se vuelva» para ἐπιστρέψῃ preserva bien la metáfora direccional sin sobreinterpretar.
  issues:
  - severity: medium
    issue: La nota [b] añade «de en medio»
    rationale: El inglés POB solo preserva como alternativa «the veil is taken away». El griego περιαιρεῖται no exige aquí el añadido «de en medio», y esa expansión introduce un matiz no documentado.
  - severity: low
    issue: «Es quitado» suena algo rígido en español
    rationale: No es incorrecto, pero en español moderno puede sonar más natural «es removido» o «se quita». Dado que el inglés auditado usa «is removed» con alternativa «is taken away», conviene alinear mejor la nota sin forzar un cambio mayor en el texto principal.
  revised_spanish_text: Pero siempre que uno se vuelva al Señor, el velo[a] es quitado[b].
  revised_footnotes:
  - marker: a
    text: O «cuando uno se vuelva al Señor».
    reason: lexical_alternative
  - marker: b
    text: O «el velo es removido».
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel y natural en conjunto, pero se corrige la nota [b] para eliminar una expansión no respaldada por el griego ni por la auditoría inglesa. También se formula la alternativa de manera más cercana a «is removed / is taken away».
