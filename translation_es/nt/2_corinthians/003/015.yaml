translation:
  language: es
  text: Pero hasta el día de hoy, cada vez que se lee a Moisés[a], un velo yace sobre su corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los escritos de Moisés, especialmente la ley.
    reason: cultural_note
  - marker: b
    text: El griego tiene «su corazón» en singular, probablemente como singular colectivo; también podría verterse «sus corazones».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Introduce el contraste de forma natural en español. «Pero» conserva la oposición inmediata sin sobredramatizarla.
- source_word: ἕως σήμερον
  english_pob_choice: to this day
  chosen_spanish: hasta el día de hoy
  alternatives_spanish:
  - hasta hoy
  - hasta este día
  lexicon: BDAG
  rationale: Expresa la continuidad hasta el presente con una fórmula idiomática y clara en español.
- source_word: ἡνίκα ἂν ἀναγινώσκηται
  english_pob_choice: whenever Moses is read
  chosen_spanish: cuando se lee
  alternatives_spanish:
  - cada vez que se lee
  - siempre que se lee
  lexicon: BDAG
  rationale: La construcción griega indica una circunstancia repetida e indefinida; «cuando se lee» comunica bien esa idea en español, y el matiz repetitivo queda implícito por el contexto.
- source_word: Μωϋσῆς
  english_pob_choice: Moses
  chosen_spanish: Moisés
  alternatives_spanish:
  - la ley de Moisés
  - los escritos de Moisés
  lexicon: BDAG
  rationale: Se preserva el nombre propio del texto fuente, manteniendo la metonimia sin explicitarla en el cuerpo principal.
- source_word: κάλυμμα
  english_pob_choice: a veil
  chosen_spanish: un velo
  alternatives_spanish:
  - un cubrimiento
  - un tapado
  lexicon: BDAG
  rationale: «Velo» es el equivalente directo y contextual en el marco de la imagen paulina del pasaje.
- source_word: ἐπὶ τὴν καρδίαν αὐτῶν
  english_pob_choice: over their heart
  chosen_spanish: sobre su corazón
  alternatives_spanish:
  - sobre sus corazones
  - sobre el corazón de ellos
  lexicon: BDAG
  rationale: Se conserva el singular de «corazón» para reflejar más de cerca el griego, mientras que «su» comunica naturalmente el referente plural colectivo.
- source_word: κεῖται
  english_pob_choice: lies
  chosen_spanish: yace
  alternatives_spanish:
  - está
  - permanece
  lexicon: BDAG
  rationale: «Yace» reproduce la imagen de algo que está tendido o colocado encima, sin suavizar la metáfora.
theological_decisions:
- issue: Metonimia de «Moisés» para los escritos mosaicos
  english_pob_reading: Retain 'Moses' in the main text as a metonymy
  chosen_spanish_reading: Conservar «Moisés» en el texto principal como metonimia
  alternative_spanish_readings:
  - explicitar «la ley de Moisés»
  - explicitar «los escritos de Moisés»
  rationale: El griego dice literalmente «Moisés»; conservarlo respeta la primacía del texto fuente y deja la aclaración metonímica para una nota, si se desea.
  doctrine_reference: Primacía del texto original y cautela ante explicitaciones interpretativas en la línea principal de traducción.
translation_notes:
  revision_awareness: Coincide con la lectura auditada del inglés POB y no requiere cambios según el resumen de revisión más reciente; se conservan el contraste adversativo, la metonimia de «Moisés», el singular de «corazón» y la imagen de un velo que reposa sobre él.
  spanish_consistency_notes:
  - Se usó «Moisés» y no una paráfrasis explicativa en el cuerpo principal, en coherencia con la decisión inglesa auditada.
  - Se mantuvo el singular «corazón» para reflejar el griego, con nota aclaratoria sobre el posible singular colectivo.
  - «Hasta el día de hoy» y «cuando se lee» buscan un español natural sin perder la fuerza temporal e indefinida del griego.
