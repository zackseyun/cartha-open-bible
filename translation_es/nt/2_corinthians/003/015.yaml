- from: Pero hasta el día de hoy[a], cuando se lee a Moisés[b], un velo yace sobre su corazón.
  to: Pero hasta el día de hoy, cada vez que se lee a Moisés[a], un velo yace sobre su corazón[b].
  rationale: Se corrige el anclaje de la nota metonímica para que recaiga sobre «Moisés», que es lo que la nota explica, y se ajusta «cuando» a «cada vez que» para reflejar mejor la idea griega de circunstancia repetida e indefinida. Se conserva «su corazón» con nota por fidelidad al singular colectivo del griego, y se mantiene «yace» como opción válida y suficientemente natural.
