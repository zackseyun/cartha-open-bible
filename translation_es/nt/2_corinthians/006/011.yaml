translation:
  language: es
  text: Nuestra boca se ha abierto a ustedes[a], Corintios; nuestro corazón se ha ensanchado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «les hemos hablado abiertamente».'
    reason: lexical_alternative
  - marker: b
