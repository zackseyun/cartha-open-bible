lexical_decisions:
- source_word: στόμα
  english_pob_choice: mouth
  chosen_spanish: boca
  alternatives_spanish:
  - boca
  - boca para hablar
  lexicon: BDAG
  rationale: En español, «boca» conserva la metáfora corporal de Pablo y comunica con naturalidad la idea de hablar abiertamente sin convertir la imagen en paráfrasis.
- source_word: ἀνέῳγεν
  english_pob_choice: has been opened
  chosen_spanish: se ha abierto
  alternatives_spanish:
  - está abierta
  - ha sido abierta
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado presente resultante; «se ha abierto» conserva ese valor y mantiene la metáfora de la boca abierta, sin perder la referencia a la franqueza del habla.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - para ustedes
  lexicon: BDAG
  rationale: «A ustedes» expresa de manera natural la dirección del discurso en español. Mantiene la relación interpersonal sin forzar una formulación más literal que suene menos idiomática.
- source_word: Κορίνθιοι
  english_pob_choice: Corinthians
  chosen_spanish: corintios
  alternatives_spanish:
  - corintios
  - gente de Corinto
  lexicon: BDAG
  rationale: El vocativo transliterado y común en español conserva el tono de apelación directa de Pablo y evita una expansión innecesaria.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - corazón
  - interior
  - afectos
  lexicon: BDAG
  rationale: «Corazón» es el equivalente español más claro para el centro de afecto y disposición interior, y preserva el paralelismo con «boca».
- source_word: πεπλάτυνται
  english_pob_choice: has been widened
  chosen_spanish: se ha ensanchado
  alternatives_spanish:
  - se ha ampliado
  - está abierto de par en par
  - se ha ensanchado
  lexicon: BDAG
  rationale: El verbo πλατύνω significa ensanchar o ampliar. «Se ha ensanchado» refleja la imagen espacial del griego y sugiere amplitud interior sin introducir una explicación interpretativa que exceda el texto.
theological_decisions:
- issue: Imagen corporal para la franqueza y la disposición afectiva de Pablo
  english_pob_reading: Retain the bodily metaphors literally ('mouth ... opened,' 'heart ... widened') rather than interpret them in the main text.
  chosen_spanish_reading: Conservar las metáforas corporales («boca se ha abierto», «corazón se ha ensanchado») en el texto principal.
  alternative_spanish_readings:
  - Hemos hablado abiertamente con ustedes, corintios; nuestro corazón está muy abierto.
  - Les hemos hablado con franqueza y les hemos abierto el corazón.
  rationale: 'La frase no plantea una controversia doctrinal, pero sí una decisión de estilo y fidelidad: mantener las metáforas permite auditar la relación con el griego y evita sustituirlas por una paráfrasis más interpretativa.'
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence; never paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: La revisión disponible indicó que no eran necesarias modificaciones del contenido base; el único ajuste requerido aquí es anclar correctamente las notas al texto español mediante los marcadores [a] y [b].
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aparece ningún equivalente divino en este versículo.
  - Se usó «corazón» en singular para conservar el paralelismo metafórico con «boca».
  - Se prefirió «se ha ensanchado» por su cercanía imagística con πλατύνω y su naturalidad en español.
  - Los marcadores de nota [a] y [b] aparecen exactamente en los puntos correspondientes del texto principal.
