translation:
  language: es
  text: en azotes, en prisiones, en disturbios[a], en trabajos, en noches sin dormir, en ayunos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'tumultos' o 'desórdenes'.
    reason: lexical_alternative
  - marker: b
    text: O 'ayunos'; el término puede referirse a periodos de ayuno, ya sean escogidos o impuestos por las circunstancias.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Se conserva la repetición de la preposición para reflejar el ritmo catalogal de Pablo y no fundir la serie en una sola enumeración fluida.
- source_word: πληγαῖς
  english_pob_choice: beatings
  chosen_spanish: azotes
  alternatives_spanish:
  - golpes
  - palizas
  - llagas
  lexicon: BDAG
  rationale: En este contexto de sufrimientos apostólicos, el término apunta a golpes físicos infligidos. 'Azotes' es natural en español bíblico y mantiene la fuerza corporal del castigo, sin caer en un calco mecánico.
- source_word: φυλακαῖς
  english_pob_choice: imprisonments
  chosen_spanish: prisiones
  alternatives_spanish:
  - encarcelamientos
  - cárceles
  - jailings
  lexicon: BDAG
  rationale: El plural puede referirse a experiencias repetidas de encierro. 'Prisiones' preserva la concisión del griego y suena más natural que una perífrasis, aunque puede leerse como el lugar o la experiencia según el contexto.
- source_word: ἀκαταστασίαις
  english_pob_choice: disturbances
  chosen_spanish: disturbios
  alternatives_spanish:
  - desórdenes
  - tumultos
  - convulsiones
  lexicon: BDAG
  rationale: El término puede abarcar desorden, agitación o tumulto. 'Disturbios' comunica bien la agitación hostil o pública y sigue de cerca la última revisión del POB en inglés, sin restringir indebidamente el alcance a 'motines'.
- source_word: κόποις
  english_pob_choice: labors
  chosen_spanish: trabajos
  alternatives_spanish:
  - fatigas
  - fatigosas labores
  - penosos trabajos
  lexicon: BDAG
  rationale: La palabra denota esfuerzo agotador. 'Trabajos' conserva la brevedad y la idea de labor intensa; en español bíblico puede necesitarse una palabra más general que no suene arcaica.
- source_word: ἀγρυπνίαις
  english_pob_choice: sleepless nights
  chosen_spanish: noches sin dormir
  alternatives_spanish:
  - veladas
  - desvelos
  - insomnios
  lexicon: BDAG
  rationale: El sustantivo se refiere a periodos sin sueño. 'Noches sin dormir' expresa con claridad la privación repetida, más transparentemente que un abstracto como 'insomnios'.
- source_word: νηστείαις
  english_pob_choice: fastings
  chosen_spanish: ayunos
  alternatives_spanish:
  - ayunamientos
  - abstinencias
  - hambres
  lexicon: BDAG
  rationale: El término normalmente significa actos o periodos de ayuno. 'Ayunos' preserva el plural y deja abierta la posibilidad de ayunos voluntarios o de abstinencia impuesta por circunstancias, sin reducirlo a mera falta de alimento.
theological_decisions:
- issue: 'Sentido de νηστείαις: ayuno voluntario o privación involuntaria'
  english_pob_reading: fastings
  chosen_spanish_reading: ayunos
  alternative_spanish_readings:
  - hambre
  - privación de alimento
  rationale: 'La forma léxica apunta primariamente a ayuno, y no conviene convertirla sin más en hambre. Mantener ''ayunos'' respeta la ambigüedad interpretativa señalada en el POB inglés: pueden ser prácticas voluntarias o abstinencias asociadas a las circunstancias.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: La revisión inglesa más reciente corrigió 'riots' por 'disturbances' para ajustarse mejor a ἀκαταστασίαις. La versión española sigue esa decisión con 'disturbios', y conserva el paralelismo de la serie con preposición repetida.
  spanish_consistency_notes:
  - Se mantiene 'en' en cada miembro para reflejar la cadencia del original.
  - '''Azotes'' se usa aquí por fuerza física y tradición bíblica, sin adoptar ''golpes'' como opción más neutral.'
  - '''Prisiones'' y no ''encarcelamientos'' conserva concisión y permite leer la expresión como experiencia repetida.'
  - '''Ayunos'' deja abierta la tensión léxica documentada en el POB inglés entre ayuno voluntario y abstinencia forzada.'
