translation:
  language: es
  text: Y seré para ustedes un Padre[a], y ustedes serán para mí hijos e hijas, dice el Señor Todopoderoso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «seré para ustedes por padre, y ustedes serán para mí por hijos e hijas». El griego expresa una relación de pacto mediante una construcción idiomática que el español suele suavizar como «seré para ustedes un Padre» y «serán para mí hijos e hijas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσομαι
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - estaré
  lexicon: BDAG
  rationale: El futuro de εἰμί se expresa naturalmente en español con «seré». Mantiene la relación de identidad/estado duradero en la fórmula de pacto mejor que «estaré».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - con ustedes
  lexicon: BDAG
  rationale: En esta fórmula de alianza, el dativo con εἰς πατέρα se vierte mejor con una relación final/beneficiaria en español. «Para ustedes» conserva el vínculo relacional sin volver la frase rígida.
- source_word: εἰς πατέρα
  english_pob_choice: a Father
  chosen_spanish: un Padre
  alternatives_spanish:
  - Padre
  - como Padre
  lexicon: BDAG
  rationale: La construcción idiomática griega expresa relación de pacto más que simple metáfora. En español, «seré para ustedes un Padre» comunica de forma natural esa relación sin perder el sentido de título relacional divino.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  lexicon: BDAG
  rationale: El pronombre explícito se mantiene para reflejar el énfasis del griego. «Ustedes» ofrece español neutral latinoamericano y conserva la segunda persona plural.
- source_word: ἔσεσθέ μοι
  english_pob_choice: you will be ... to me
  chosen_spanish: serán para mí
  alternatives_spanish:
  - llegarán a ser para mí
  - serán míos
  lexicon: BDAG
  rationale: «Serán para mí» preserva la reciprocidad del paralelismo y refleja μοι sin añadir un matiz posesivo que el griego no formula aquí.
- source_word: υἱοὺς καὶ θυγατέρας
  english_pob_choice: sons and daughters
  chosen_spanish: hijos e hijas
  alternatives_spanish:
  - hijos
  - descendencia
  lexicon: BDAG
  rationale: El griego nombra explícitamente ambos sexos; «hijos e hijas» preserva esa precisión en español. Se evita «hijos» a secas porque podría borrar la mención de las hijas.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - afirma
  - declara
  lexicon: BDAG
  rationale: El presente de cita se expresa de manera natural con «dice», manteniendo la vivacidad de la fórmula escritural.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor Yahvé
  - Dueño
  lexicon: BDAG
  rationale: En esta cita bíblica, κύριος funciona como título divino. En español, «Señor» comunica ese título de forma estándar y reverente; no se usa «Yahvé» porque el texto griego citado no escribe el nombre divino sino κύριος.
- source_word: παντοκράτωρ
  english_pob_choice: Almighty
  chosen_spanish: Todopoderoso
  alternatives_spanish:
  - Omnipotente
  - el Todopoderoso
  lexicon: BDAG
  rationale: «Todopoderoso» reproduce el título divino παντοκράτωρ de manera natural y solemne en español. Mantiene la fuerza de autoridad universal del término.
theological_decisions:
- issue: Título divino κύριος en una cita de la Escritura
  english_pob_reading: the Lord Almighty
  chosen_spanish_reading: el Señor Todopoderoso
  alternative_spanish_readings:
  - el Señor, el Todopoderoso
  - el Señor, Todopoderoso
  rationale: La cita conserva el título compuesto como una designación divina. En español, «Señor Todopoderoso» comunica el mismo valor reverente y evita introducir «Yahvé» donde el griego cita κύριος.
  doctrine_reference: 'DOCTRINE.md §Contested terms: κύριος'
- issue: Relación filial de pacto con inclusión explícita de ambos sexos
  english_pob_reading: sons and daughters
  chosen_spanish_reading: hijos e hijas
  alternative_spanish_readings:
  - hijos
  - descendientes
  rationale: El griego distingue υἱοὺς y θυγατέρας; por eso la traducción conserva ambos términos. «Hijos e hijas» preserva la inclusión marcada sin neutralizar el lenguaje de la cita.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'Coincide con el pase más reciente y el cotejo de alta concordancia: no se requirieron revisiones respecto al auditorio inglés. La decisión principal fue cómo reproducir en español la fórmula relacional de pacto y el título divino sin perder la precisión del griego.'
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος en conformidad con el uso de título divino del proyecto y porque el griego aquí cita una fórmula escritural, no el Tetragrámaton escrito en hebreo.
  - Se eligió «Todopoderoso» para παντοκράτωρ por ser la equivalencia española más directa y sobria del título.
  - Se preservó la dualidad «hijos e hijas» para no borrar el alcance explícito del original.
  - La nota al pie marca la alternativa más literal de la construcción εἰς + acusativo y explica la suavización necesaria en español.
