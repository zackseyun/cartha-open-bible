translation:
  language: es
  text: en pureza[a], en conocimiento, en paciencia, en bondad, en el Espíritu Santo, en amor sincero,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en un espíritu santo', si se entiende como una disposición santa más que como el Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por
  - mediante
  - con
  lexicon: BDAG
  rationale: La repetición de ἐν marca la esfera, el medio o el modo de ministerio. 'En' conserva el paralelismo retórico del griego y suena natural en español.
- source_word: ἁγνότητι
  english_pob_choice: purity
  chosen_spanish: pureza
  alternatives_spanish:
  - rectitud
  - castidad
  lexicon: BDAG
  rationale: ἁγνότης expresa pureza moral o limpieza interior en sentido amplio. 'Pureza' mantiene ese alcance sin restringirlo indebidamente a la esfera sexual.
- source_word: γνώσει
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  lexicon: BDAG
  rationale: γνῶσις aquí denota conocimiento, probablemente práctico y espiritual. 'Conocimiento' es la equivalencia directa y natural en español.
- source_word: μακροθυμίᾳ
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - longanimidad paciente
  - forbearancia
  lexicon: BDAG
  rationale: μακροθυμία comunica paciencia perseverante y tolerancia ante personas o circunstancias. 'Paciencia' es claro, moderno y suficientemente amplio.
- source_word: χρηστότητι
  english_pob_choice: kindness
  chosen_spanish: bondad
  alternatives_spanish:
  - amabilidad
  - benignidad
  - dulzura
  lexicon: BDAG
  rationale: χρηστότης puede abarcar bondad, benevolencia o amabilidad. Se eligió 'bondad' porque expresa bien la cualidad relacional sin sonar forzado; 'amabilidad' sería posible, pero puede estrechar el matiz a trato cordial.
- source_word: πνεύματι ἁγίῳ
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - un espíritu santo
  - un espíritu santo
  lexicon: BDAG
  rationale: En el uso paulino, la construcción apunta normalmente al Espíritu divino, no solo a una disposición humana. Se conserva la mayúscula y el artículo para señalar ese referente personal.
- source_word: ἀγάπῃ
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Por defecto del proyecto, ἀγάπη se rinde como 'amor'. En esta lista de cualidades ministeriales, 'amor' es la equivalencia más natural y amplia.
- source_word: ἀνυποκρίτῳ
  english_pob_choice: sincere
  chosen_spanish: sincero
  alternatives_spanish:
  - sin hipocresía
  - genuino
  - no fingido
  lexicon: BDAG
  rationale: ἀνυπόκριτος significa sin hipocresía o sin pretensión. 'Sincero' mantiene la idea de autenticidad y combina bien con 'amor' en español.
theological_decisions:
- issue: Referente de πνεύματι ἁγίῳ
  english_pob_reading: the Holy Spirit refers to the divine Spirit
  chosen_spanish_reading: el Espíritu Santo refiere al Espíritu divino
  alternative_spanish_readings:
  - un espíritu santo como disposición humana
  - espíritu santo en sentido cualitativo
  rationale: La secuencia de virtudes en el contexto paulino y el uso habitual de la expresión favorecen el referente personal divino. La traducción conserva esa lectura sin eliminar que el griego, aisladamente, podría leerse cualitativamente.
  doctrine_reference: Affirmations; Translation philosophy §1, §3
- issue: Valor de ἁγνότητι en la serie
  english_pob_reading: purity
  chosen_spanish_reading: pureza moral amplia, no solo castidad sexual
  alternative_spanish_readings:
  - castidad
  - rectitud moral
  rationale: El término griego es más amplio que una referencia a conducta sexual. 'Pureza' en español preserva la amplitud ética y evita reducir el campo semántico del original.
  doctrine_reference: BDAG; principio de no estrechar indebidamente el término
translation_notes:
  revision_awareness: El contexto de auditoría inglesa no muestra revisiones aplicadas ni cambios pendientes; la lectura se mantiene en alta concordancia con la evaluación revisada, sin necesidad de correcciones adicionales.
  spanish_consistency_notes:
  - Se mantiene el paralelismo repetido de 'en' para reflejar la cadencia de la lista griega.
  - Se usa 'Espíritu Santo' con mayúsculas por el referente divino preferido en el audit trail.
  - '''Pureza'', ''conocimiento'', ''paciencia'', ''bondad'' y ''amor sincero'' preservan el tono de lista de virtudes ministeriales sin introducir matices ajenos al texto.'
  - La nota textual se ancla en 'Espíritu Santo' porque en español surge una ambigüedad similar a la del inglés sobre si el sintagma es cualitativo o personal.
