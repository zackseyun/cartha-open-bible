translation:
  language: es
  text: Por tanto, salgan de en medio de ellos, y sean apartados[a], dice el Señor, y no toquen lo inmundo[c][b]; y yo los recibiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sean separados’ o ‘sepárense’.
    reason: lexical_alternative
  - marker: b
    text: O ‘no toquen nada inmundo’.
    reason: lexical_alternative
  - marker: c
    text: Pablo está haciendo eco del lenguaje profético del Antiguo Testamento, especialmente Isaías 52:11.
    reason: cross_reference
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por esto
  lexicon: BDAG
  rationale: Expresa de manera natural en español la conclusión inferencial que conecta con el argumento previo, conservando la fuerza lógica de διό sin volverlo pesado.
- source_word: ἐξέλθατε
  english_pob_choice: come out
  chosen_spanish: salgan
  alternatives_spanish:
  - salgan afuera
  - salgan de
  lexicon: BDAG
  rationale: El imperativo plural aoristo exige una salida decisiva; 'salgan' comunica bien la acción. El complemento 'de en medio de ellos' completa el sentido de separación social y espacial.
- source_word: ἐκ μέσου αὐτῶν
  english_pob_choice: from among them
  chosen_spanish: de en medio de ellos
  alternatives_spanish:
  - de entre ellos
  - de su medio
  lexicon: BDAG
  rationale: '''De en medio de ellos'' preserva la imagen idiomática de μέσου y la distancia relacional implicada por el griego.'
- source_word: ἀφορίσθητε
  english_pob_choice: be separate
  chosen_spanish: apártense
  alternatives_spanish:
  - sean separados
  - sepárense
  lexicon: BDAG
  rationale: El pasivo imperativo puede expresarse en español como exhortación a apartarse/separarse. 'Apártense' mantiene la idea de distinción sin introducir un matiz sectario o excesivamente técnico.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Dios
  - afirma el Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula profética estándar. Aunque el trasfondo remite al lenguaje del AT asociado con Yahvé, el texto griego dice κύριος y la auditable equivalencia del POB inglés es 'Lord'; en español, 'Señor' es la forma natural y coherente con esa decisión.
- source_word: ἀκαθάρτου
  english_pob_choice: what is unclean
  chosen_spanish: lo inmundo
  alternatives_spanish:
  - lo impuro
  - algo inmundo
  lexicon: BDAG
  rationale: El genitivo neutro se vierte con un sustantivo neutro sustantivado en español. 'Lo inmundo' conserva la categoría de pureza/impureza sin especificar un objeto único que el griego no nombra.
- source_word: μὴ ἅπτεσθε
  english_pob_choice: do not touch
  chosen_spanish: no toquen
  alternatives_spanish:
  - no toquen ni rocen
  - no se acerquen a
  lexicon: BDAG
  rationale: ἅπτομαι en este contexto de pureza y separación se traduce de forma directa por 'tocar'. El español necesita el complemento sustantivado previo ('lo inmundo') para que la frase quede natural y fiel.
- source_word: κἀγὼ
  english_pob_choice: and I
  chosen_spanish: y yo
  alternatives_spanish:
  - y yo mismo
  - entonces yo
  lexicon: BDAG
  rationale: La crasis conserva el enlace enfático, pero no exige una explicitación adicional. 'Y yo' reproduce la sencillez del original.
- source_word: εἰσδέξομαι ὑμᾶς
  english_pob_choice: I will receive you
  chosen_spanish: los recibiré
  alternatives_spanish:
  - los acogeré
  - los aceptaré
  lexicon: BDAG
  rationale: '''Recibir'' transmite una acogida favorable y mantiene una resonancia formal/covenantal coherente con la cita profética. Se usa ''los'' porque el destinatario plural masculino genérico es el uso normal del español bíblico para ὑμᾶς.'
theological_decisions:
- issue: Rendering of κύριος in a prophetic citation with OT resonance
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor
  rationale: La fuente griega presenta κύριος y el audit trail inglés mantiene 'Lord' como decisión doctrinal estándar. En español, 'Señor' preserva esa equivalencia sin imponer una sustitución tipográfica por 'Yahvé' dentro de una cita directiva donde el texto griego no lo explicita.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Force of the separation command
  english_pob_reading: be separate
  chosen_spanish_reading: apártense
  alternative_spanish_readings:
  - sean separados
  - sepárense
  rationale: La forma pasiva del griego permite una exhortación a vivir en separación/distinción. 'Apártense' mantiene el mandato sin convertirlo en una llamada a aislarse de toda relación social; la advertencia apunta a la pureza y a la fidelidad del pueblo de Dios.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3'
translation_notes:
  revision_awareness: 'El pasaje muestra alta concordancia con el audit trail inglés y no presenta revisiones aplicadas en la última pasada. La redacción española sigue la misma decisión óptima: traducción directa del imperativo de salida, del mandato de separación, de la prohibición de contacto con lo inmundo y de la promesa final de acogida.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, evitando calcos innecesarios.
  - Se conserva la distinción entre separación moral/ritual y aislamiento social absoluto.
  - Se traduce κύριος como 'Señor' de forma consistente con la auditoría inglesa y con el uso bíblico natural en español.
  - Se usa 'lo inmundo' para sostener el valor genérico del neutro griego sin añadir especificación ajena al texto.
