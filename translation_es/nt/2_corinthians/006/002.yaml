translation:
  language: es
  text: 'Porque dice[a]: «En tiempo aceptable te escuché, y en el día de salvación te ayudé». He aquí, ahora[b] es el tiempo aceptable; he aquí, ahora es el día de salvación.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «te escuché favorablemente». El verbo puede implicar oír con aceptación o con respuesta.
    reason: lexical_alternative
  - marker: b
    text: O «ahora es el tiempo favorable ... ahora es el día de salvación». El griego carece de artículo en estas expresiones, aunque aquí se ha usado la forma definida por claridad y solemnidad en español.
    reason: alternative_reading
lexical_decisions:
- source_word: λέγει γάρ
  english_pob_choice: For he says
  chosen_spanish: Porque dice
  alternatives_spanish:
  - Pues dice
  - Porque él dice
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento, por eso «porque» comunica bien la relación. λέγει conserva un presente vivo de cita bíblica; «dice» mantiene la referencia personal al hablante de la Escritura sin volverla impersonal.
- source_word: Καιρῷ δεκτῷ
  english_pob_choice: At an acceptable time
  chosen_spanish: En tiempo aceptable
  alternatives_spanish:
  - En un tiempo aceptable
  - En tiempo favorable
  - En un tiempo favorable
  lexicon: BDAG
  rationale: καιρός señala un momento oportuno, fijado o favorable; en español, «tiempo» comunica de forma natural ese matiz. δεκτός es «aceptable» o «agradable/recibido»; «aceptable» preserva el vínculo léxico con εὐπρόσδεκτος en la segunda mitad del versículo.
- source_word: ἐπήκουσά σου
  english_pob_choice: I listened to you
  chosen_spanish: te escuché
  alternatives_spanish:
  - te oí
  - te escuché favorablemente
  - te atendí
  lexicon: BDAG
  rationale: ἐπακούω puede implicar oír con respuesta o aceptación. «Te escuché» es natural en español y conserva la idea de atención receptiva sin forzar explícitamente «respondí».
- source_word: ἐν ἡμέρᾳ σωτηρίας
  english_pob_choice: in a day of salvation
  chosen_spanish: en día de salvación
  alternatives_spanish:
  - en un día de salvación
  - en el día de salvación
  lexicon: BDAG
  rationale: La construcción griega es anartrosa; «en día de salvación» refleja esa forma de manera sobria, y mantiene la referencia cualitativa/ocasional más que una fórmula fijada por el artículo.
- source_word: ἐβοήθησά σοι
  english_pob_choice: I helped you
  chosen_spanish: te ayudé
  alternatives_spanish:
  - te socorrí
  - vine en tu ayuda
  - te presté ayuda
  lexicon: BDAG
  rationale: βοηθέω significa ayudar o acudir en auxilio. «Te ayudé» es la opción más clara y directa en español, sin añadir matices innecesarios.
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Ahora
  alternatives_spanish:
  - He aquí
  - Mira
  lexicon: BDAG
  rationale: Aunque ἰδού suele introducir una llamada de atención, en esta cláusula el énfasis recae en la urgencia temporal de νῦν. «Ahora» permite que la exclamación funcione de forma natural en español y reproduce el impacto de la aplicación paulina.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ya
  - en este momento
  lexicon: BDAG
  rationale: νῦν es temporal e intensificador; «ahora» conserva la urgencia del presente que Pablo aplica al texto citado.
- source_word: καιρὸς εὐπρόσδεκτος
  english_pob_choice: the acceptable time
  chosen_spanish: el tiempo aceptable
  alternatives_spanish:
  - el tiempo favorable
  - el momento aceptable
  - el momento favorable
  lexicon: BDAG
  rationale: εὐπρόσδεκτος intensifica la idea de algo bien recibido o favorable. «Aceptable» mantiene la conexión con δεκτός y suena natural en español; se usa el artículo definido para seguir el giro revisado del audit trail en inglés, que entendió la expresión como referencia actual y concreta.
- source_word: ἡμέρα σωτηρίας
  english_pob_choice: the day of salvation
  chosen_spanish: el día de salvación
  alternatives_spanish:
  - un día de salvación
  - día de salvación
  lexicon: BDAG
  rationale: Aunque la forma griega es anartrosa, la revisión inglesa final adoptó el artículo definido. En español, «el día de salvación» expresa con claridad la formulación tradicional y la aplicación presente del pasaje, sin perder el carácter solemne de la expresión.
theological_decisions:
- issue: Si el versículo debe sonar indefinido («un tiempo / un día») o definido («el tiempo / el día») en la aplicación de Pablo
  english_pob_reading: The latest English revision prefers 'the acceptable time' / 'the day of salvation' while noting earlier concern for the anarthrous Greek form.
  chosen_spanish_reading: «el tiempo aceptable» / «el día de salvación»
  alternative_spanish_readings:
  - «un tiempo aceptable» / «un día de salvación»
  - «tiempo aceptable» / «día de salvación»
  rationale: El griego no usa artículo, pero la revisión del audit trail decidió finalmente una lectura definida en inglés por coherencia y naturalidad interpretativa. En español, la forma definida comunica mejor la proclamación de urgencia de Pablo y evita una lectura demasiado genérica que debilite la aplicación actual.
  doctrine_reference: Translation philosophy §3, §5
- issue: Cómo representar la cita profética como voz de Dios en discurso indirecto
  english_pob_reading: For he says
  chosen_spanish_reading: Porque dice
  alternative_spanish_readings:
  - Pues dice
  - Porque él dice
  rationale: La fórmula paulina introduce Escritura como palabra viva de Dios. «Dice» conserva esa inmediatez personal sin necesidad de explicitar un sujeto diferente.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó una formulación más marcada («a very acceptable time») por «the acceptable time» y también ajustó «a day of salvation» a «the day of salvation». Esta propuesta española sigue esa decisión revisada, pero conserva la posibilidad de una lectura alternativa en nota porque la forma griega es anartrosa y la tensión entre literalidad formal y aplicación concreta es significativa.
  spanish_consistency_notes:
  - He mantenido «Dios» implícito en la fórmula de cita, sin añadirlo, porque el sujeto textual es «dice».
  - He evitado «Señor» o «Cristo» porque no aparecen en el verso.
  - «Tiempo» se usa para καιρός por su naturalidad en español y por la fuerza de momento oportuno, no meramente cronológico.
  - «Escuché» se eligió para ἐπήκουσά como forma receptiva y clara; si se quisiera subrayar más la respuesta, podría decirse «te atendí», pero sería menos directo.
