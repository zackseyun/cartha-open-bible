    text: O «te escuché favorablemente». El verbo puede implicar oír con aceptación o con respuesta.
    reason: lexical_alternative
  - marker: b
    text: O «ahora es el tiempo favorable ... ahora es el día de salvación». El griego carece de artículo en estas expresiones, aunque aquí se ha usado la forma definida por claridad y solemnidad en español.
    reason: alternative_reading
  revision_rationale: Se añadió «He aquí» para representar explícitamente ἰδοὺ en ambas cláusulas finales, preservando mejor la fuerza retórica del original. También se cambió «en día de salvación» por «en el día de salvación» para evitar un giro poco idiomático en español. Se mantuvo «aceptable» por continuidad léxica con las decisiones documentadas, y se ajustó la nota b para que explique de forma más directa la alternativa de traducción en español.
