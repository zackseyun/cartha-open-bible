translation:
  language: es
  text: ¿Y qué armonía hay entre el Mesías y Beliar[a]? ¿O qué parte tiene el creyente con el incrédulo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Beliar: forma griega Βελιάρ; muchas traducciones en español usan la forma alternativa «Belial».'
    reason: alternative_reading
lexical_decisions:
- source_word: συμφώνησις
  english_pob_choice: harmony
  chosen_spanish: armonía
  alternatives_spanish:
  - acuerdo
  - concordia
  lexicon: BDAG
  rationale: El sustantivo expresa compatibilidad o consonancia relacional. 'Armonía' conserva bien la fuerza retórica de la pregunta y sugiere la idea de concordancia entre dos realidades incompatibles.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre fijo. En español, 'el Mesías' refleja mejor ese valor titular y sigue la directriz doctrinal del proyecto.
- source_word: Βελιάρ
  english_pob_choice: Beliar
  chosen_spanish: Beliar
  alternatives_spanish:
  - Belial
  lexicon: BDAG
  rationale: Es un nombre propio transliterado. La forma griega del texto es Βελιάρ, así que 'Beliar' reproduce de manera más directa la forma fuente; 'Belial' queda como alternativa reconocible.
- source_word: μερίς
  english_pob_choice: share
  chosen_spanish: parte
  alternatives_spanish:
  - porción
  - participación
  lexicon: BDAG
  rationale: El término indica porción o participación compartida. 'Parte' comunica de forma natural la pregunta retórica sobre qué le corresponde o comparte uno con otro.
- source_word: πιστῷ
  english_pob_choice: a believer
  chosen_spanish: el creyente
  alternatives_spanish:
  - el fiel
  - el que cree
  lexicon: BDAG
  rationale: El adjetivo es sustantivado y designa a una persona caracterizada por la fe. 'El creyente' es la opción más natural y clara en español.
- source_word: ἀπίστου
  english_pob_choice: an unbeliever
  chosen_spanish: el incrédulo
  alternatives_spanish:
  - el no creyente
  - el infiel
  lexicon: BDAG
  rationale: En contraste con πιστῷ, aquí el sentido substantivado apunta a quien no cree. 'El incrédulo' mantiene el paralelismo sin introducir matices de infidelidad que podrían desviar el sentido.
- source_word: πρὸς
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - con
  - hacia
  lexicon: BDAG
  rationale: Con συμφώνησις en esta construcción, el español natural pide 'entre ... y ...' para expresar la relación mutua.
- source_word: μετὰ
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - en compañía de
  lexicon: BDAG
  rationale: La preposición marca asociación; 'con' es la equivalencia breve y natural en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: δέ continúa la cadena de preguntas retóricas; 'Y' conserva el encadenamiento sin añadir un contraste más fuerte del que exige el griego.
theological_decisions:
- issue: Rendering of Χριστός as title rather than name
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El pasaje presenta un contraste conceptual entre el Mesías y Beliar; traducirlo como título evita convertirlo en un simple nombre propio y sigue la política doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
- issue: Identification of Βελιάρ as a proper evil counterpart name
  english_pob_reading: Beliar as a proper name for the evil counterpart in Paul's contrast
  chosen_spanish_reading: Beliar
  alternative_spanish_readings:
  - Belial
  rationale: Se preserva la forma transliterada del griego sin importar una interpretación adicional en el texto principal. La alternativa tradicional 'Belial' se mantiene implícitamente como forma conocida.
  doctrine_reference: 'DOCTRINE.md: Traducir títulos; transliterar nombres propios'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en el punto clave de Χριστοῦ: el criterio doctrinal reafirma ''Mesías'' para el título, y la revisión que había cambiado la forma a ''Christ'' fue revertida en la corrección posterior. También se conservó la transliteración directa de Βελιάρ y el contraste substantivado πιστῷ / ἀπίστου.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo retórico de dos preguntas.
  - '''Mesías'' se usa como título y no como nombre propio fijo.'
  - '''El creyente'' / ''el incrédulo'' conservan el contraste substantivado del griego.'
  - '''Armonía'' y ''parte'' son opciones idiomáticas que respetan el tono argumentativo del versículo.'
