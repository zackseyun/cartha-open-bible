- from: como desconocidos y aun reconocidos[a], como moribundos y, mira, vivimos, como disciplinados y no entregados a la muerte[b],
  to: como desconocidos y aun reconocidos[a], como muriendo y, he aquí, vivimos, como disciplinados y no puestos a muerte[b],
  rationale: 'Se corrigen dos puntos principales para acercarse más al griego y al rastro auditado en inglés: ἀποθνῄσκοντες se expresa mejor como ''muriendo'' que como ''moribundos'', y μὴ θανατούμενοι debe mantenerse como pasiva directa, aquí ''no puestos a muerte'', en vez de ''no entregados a la muerte'', que añade un matiz no explícito. También se eleva ligeramente el registro de ἰδού con ''he aquí'', más acorde con el tono bíblico moderno y digno.'
