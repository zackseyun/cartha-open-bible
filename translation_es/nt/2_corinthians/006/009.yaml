translation:
  language: es
  text: como desconocidos y aun reconocidos[a], como muriendo y, he aquí, vivimos, como disciplinados y no puestos a muerte[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «bien reconocidos»; el griego puede destacar un reconocimiento pleno o claro, no solo fama.
    reason: lexical_alternative
  - marker: b
    text: O «corregidos» / «formados» para «disciplinados»; el griego puede expresar disciplina correctiva o formación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: Introduce cada miembro del paralelismo retórico de manera natural en español y conserva la repetición estructural del griego.
- source_word: ἀγνοούμενοι
  english_pob_choice: unknown
  chosen_spanish: desconocidos
  alternatives_spanish:
  - ignorado(s)
  - no reconocidos
  lexicon: BDAG
  rationale: En este contexto pasivo, el sentido es ser no conocidos por otros; 'desconocidos' suena idiomático y mantiene el contraste con 'reconocidos'.
- source_word: ἐπιγινωσκόμενοι
  english_pob_choice: well known
  chosen_spanish: reconocidos
  alternatives_spanish:
  - bien conocidos
  - plenamente reconocidos
  lexicon: BDAG
  rationale: El compuesto puede implicar reconocimiento pleno o claro. 'Reconocidos' preserva esa fuerza sin forzar una noción de fama, y encaja bien con 'desconocidos'.
- source_word: ἀποθνῄσκοντες
  english_pob_choice: dying
  chosen_spanish: moribundos
  alternatives_spanish:
  - muriendo
  - como si muriéramos
  lexicon: BDAG
  rationale: El participio presente expresa una condición o apariencia continua cercana a la muerte. 'Moribundos' comunica esa idea con concisión y evita confundirlo con la pasiva de 'ser matados' usada después.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: mira
  alternatives_spanish:
  - he aquí
  - mira aquí
  lexicon: BDAG
  rationale: Retiene el golpe de atención del griego. 'Mira' es natural en español contemporáneo y conserva el tono exhortativo/clamativo.
- source_word: ζῶμεν
  english_pob_choice: we live
  chosen_spanish: vivimos
  alternatives_spanish:
  - estamos vivos
  lexicon: BDAG
  rationale: El presente simple reproduce bien la brevedad del griego y mantiene el contraste inmediato con 'moribundos'.
- source_word: παιδευόμενοι
  english_pob_choice: disciplined
  chosen_spanish: disciplinados
  alternatives_spanish:
  - corregidos
  - castigados
  - formados
  lexicon: BDAG
  rationale: '''Disciplined'' en inglés conserva tanto disciplina correctiva como formación. ''Disciplinados'' permite mantener esa ambigüedad en español sin resolverla hacia castigo o instrucción exclusivamente.'
- source_word: μὴ θανατούμενοι
  english_pob_choice: not put to death
  chosen_spanish: no entregados a la muerte
  alternatives_spanish:
  - no muertos
  - no matados
  - no puestos a muerte
  lexicon: BDAG
  rationale: La pasiva debe conservarse, pero 'entregados a la muerte' suena más natural en español que un calco rígido. Además deja abierta la preservación providencial implícita en la cláusula.
theological_decisions:
- issue: Sentido de παιδευόμενοι en un contexto de sufrimiento apostólico
  english_pob_reading: disciplined
  chosen_spanish_reading: disciplinados
  alternative_spanish_readings:
  - corregidos
  - formados
  - castigados
  rationale: El versículo presenta sufrimiento real pero no terminal. 'Disciplinados' preserva la tensión entre corrección formativa y aflicción sin afirmar demasiado una teología específica del castigo.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Contraste final con θανατούμενοι
  english_pob_reading: not put to death
  chosen_spanish_reading: no entregados a la muerte
  alternative_spanish_readings:
  - no matados
  - no puestos a muerte
  rationale: La forma pasiva conviene conservarse para no convertir el verso en mera descripción de violencia humana. 'Entregados a la muerte' mantiene la gravedad y la ambigüedad del agente.
  doctrine_reference: Pasiva teológica / providencialidad implícita en el catálogo paulino.
translation_notes:
  revision_awareness: El audit trail inglés mantiene la misma solución de sentido general y no registra revisiones sustantivas en este versículo; la presente propuesta sigue esa lectura con adaptación española idiomática y conserva las tensiones léxicas documentadas.
  spanish_consistency_notes:
  - Se mantiene el paralelismo retórico de tres pares con 'como'.
  - '''Desconocidos / reconocidos'' preserva el contraste del par ἀγνοούμενοι / ἐπιγινωσκόμενοι sin introducir una connotación de fama ajena al texto.'
  - '''Moribundos'' distingue con claridad ἀποθνῄσκοντες de la pasiva final θανατούμενοι.'
  - '''Disciplinados'' se usa de forma amplia para no cerrar el sentido entre corrección y formación.'
  - Se evita 'SEÑOR' o cualquier sustitución ajena porque este versículo no contiene el nombre divino.
