review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura triple de ὡς ... καὶ ... y preserva los contrastes paradójicos del griego. ''Desconocidos ... reconocidos'' y ''disciplinados'' reflejan adecuadamente ἀγνοούμενοι / ἐπιγινωσκόμενοι y παιδευόμενοι, con notas útiles para las alternativas. Sin embargo, dos elecciones no son las más fieles al valor léxico y al registro buscado: ''moribundos'' endurece ἀποθνῄσκοντες hacia un estado casi terminal más que el participio presente ''muriendo'', y ''no entregados a la muerte'' se aleja de la pasiva directa de μὴ θανατούμενοι (''no muertos'' / ''no puestos a muerte'') y añade un matiz de entrega no explícito en el texto.'
  spanish_quality_summary: El español es generalmente claro y digno, pero 'mira' suena algo coloquial en este contexto paulino elevado; 'he aquí' comunica mejor la fuerza de ἰδού en un registro bíblico moderno-digno. Además, la secuencia gana naturalidad y precisión con 'muriendo' en vez de 'moribundos'. La cláusula final también queda más limpia y fiel con 'no puestos a muerte'.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Disciplinados' respeta la decisión documentada para παιδευόμενοι. La revisión propuesta mantiene la tensión teológica y la pasiva de θανατούμενοι con mayor fidelidad.
  issues:
  - severity: medium
    issue: ἀποθνῄσκοντες está vertido como 'moribundos'
    rationale: El participio presente describe un proceso o apariencia de estar muriendo; 'moribundos' sugiere un estado más extremo y lexicalmente más estrecho que el griego y que el inglés auditado 'dying'.
  - severity: medium
    issue: ἰδού está vertido como 'mira'
    rationale: '''Mira'' es comprensible, pero en este contexto resulta más coloquial que el tono deseado. ''He aquí'' conserva mejor la irrupción enfática de ἰδού en registro bíblico legible.'
  - severity: high
    issue: μὴ θανατούμενοι está vertido como 'no entregados a la muerte'
    rationale: La expresión introduce el concepto de 'entrega' ausente del griego y se aleja de la pasiva verbal directa 'no puestos a muerte'. Conviene conservar la forma pasiva con mayor cercanía semántica.
  revised_spanish_text: como desconocidos y aun reconocidos[a], como muriendo y, he aquí, vivimos, como disciplinados y no puestos a muerte[b],
  revised_footnotes:
  - marker: a
    text: O «bien reconocidos»; el griego puede destacar un reconocimiento pleno o claro, no solo fama.
    reason: lexical_alternative
  - marker: b
    text: O «corregidos» / «formados» para «disciplinados»; el griego puede expresar disciplina correctiva o formación.
    reason: lexical_alternative
  revision_rationale: 'Se corrigen dos puntos principales para acercarse más al griego y al rastro auditado en inglés: ἀποθνῄσκοντες se expresa mejor como ''muriendo'' que como ''moribundos'', y μὴ θανατούμενοι debe mantenerse como pasiva directa, aquí ''no puestos a muerte'', en vez de ''no entregados a la muerte'', que añade un matiz no explícito. También se eleva ligeramente el registro de ἰδού con ''he aquí'', más acorde con el tono bíblico moderno y digno.'
