translation:
  language: es
  text: No están restringidos por nosotros[a], pero están restringidos en sus propios afectos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «No están constreñidos en nosotros, sino que están constreñidos en sus propios corazones/entrañas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: στενοχωρεῖσθε
  english_pob_choice: are restricted
  chosen_spanish: están restringidos
  alternatives_spanish:
  - están constreñidos
  - están oprimidos
  - están estrechados
  lexicon: BDAG
  rationale: El verbo στενοχωρέομαι conserva la imagen de estrechez y la idea figurada de estar bajo presión o limitación. «Están restringidos» comunica esa limitación de manera natural en español y mantiene el paralelismo de las dos ocurrencias. «Constreñidos» es posible, pero suena más técnico o literario; «estrechados» resulta más literal pero menos idiomático.
- source_word: ἐν ἡμῖν
  english_pob_choice: by us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - en nosotros
  - con nosotros
  lexicon: BDAG
  rationale: 'Aunque ἐν es literalmente «en», el sentido relacional aquí no es locativo sino de origen o agente implícito: la limitación no proviene de Pablo y sus compañeros. En español, «por nosotros» expresa mejor esa relación causal/agente que «en nosotros», que sería más oscuro.'
- source_word: στενοχωρεῖσθε
  english_pob_choice: are constrained
  chosen_spanish: están constreñidos
  alternatives_spanish:
  - están restringidos
  - están oprimidos
  - están estrechados
  lexicon: BDAG
  rationale: Se conserva la misma base léxica para ambas cláusulas, reflejando el contraste retórico de Pablo. «Constreñidos» subraya la presión interna y mantiene la posibilidad figurada del verbo sin reducirlo a una simple limitación externa.
- source_word: ἐν τοῖς σπλάγχνοις ὑμῶν
  english_pob_choice: in your own affections
  chosen_spanish: en sus propias entrañas
  alternatives_spanish:
  - en sus propios corazones
  - en sus propios afectos
  - en su interior
  lexicon: BDAG
  rationale: σπλάγχνα designa literalmente las entrañas, y figuradamente las emociones profundas, afectos o compasión. Se elige «entrañas» porque conserva la imagen corporal del texto griego y evita diluirla en un término más abstracto. «Sus propias» reproduce el énfasis posesivo del griego; el matiz afectivo queda implícito en la metáfora corporal, que el contexto retórico aclara.
- source_word: ὑμῶν
  english_pob_choice: your own
  chosen_spanish: sus propias
  alternatives_spanish:
  - vuestras propias
  - de ustedes
  - sus
  lexicon: BDAG
  rationale: Se usa el tratamiento de cortesía plural implícito en un registro bíblico neutro latinoamericano, con «sus propias» para reflejar el posesivo enfático del griego. La redundancia aparente en español ayuda a conservar el énfasis del original.
theological_decisions:
- issue: Sentido figurado de σπλάγχνα
  english_pob_reading: Paul speaks of the Corinthians' inner affections or emotional capacity, not a literal bodily reference.
  chosen_spanish_reading: Pablo habla de la esfera interior y afectiva de los corintios, no de sus órganos físicos literalmente.
  alternative_spanish_readings:
  - en sus corazones
  - en sus afectos
  - en su interior
  rationale: 'El contexto es relacional y contrastivo: la limitación no está en Pablo, sino en la disposición interior de ellos. «En sus entrañas» conserva la metáfora encarnada del griego, y el lector entiende por contexto que se trata de la vida afectiva e interior.'
  doctrine_reference: Antropología bíblica; lenguaje metafórico del corazón/entrañas
- issue: Valor de ἐν ἡμῖν
  english_pob_reading: The Corinthians are not constrained in Paul and his co-workers.
  chosen_spanish_reading: La limitación no procede de Pablo y sus colaboradores.
  alternative_spanish_readings:
  - no están limitados en nosotros
  - no están constreñidos por nosotros
  rationale: El griego permite una lectura relacional y otra de esfera. La formulación española evita una locución demasiado oscura y mantiene el contraste argumentativo sin borrar la tensión semántica del texto.
  doctrine_reference: Exégesis retórica paulina
translation_notes:
  revision_awareness: La traducción sigue el pasaje griego directo y el auditable English POB, pero ajusta la primera cláusula para que ἐν ἡμῖν no suene artificial en español. Se conserva la repetición de στενοχωρεῖσθε y la metáfora de σπλάγχνα, aunque el español obliga a decidir entre una traducción más figurada («afectos», «corazón») o más corporal («entrañas»).
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro y contemporáneo, sin sustituir la metáfora de σπλάγχνα por un término abstracto en el texto principal.
  - «Por nosotros» se usa para expresar mejor el matiz relacional/agencial de ἐν ἡμῖν, mientras la nota preserva la alternativa más literal.
  - El posesivo plural de cortesía «sus» se usa de manera coherente para el destinatario plural.
  - Se conserva el paralelismo de las dos instancias de στενοχωρεῖσθε con la misma raíz española.
