translation:
  language: es
  text: Colaborando con él[a], también les exhortamos a no recibir en vano la gracia de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Como colaboradores, también les exhortamos»; el participio griego puede traducirse sin hacer explícito con quién colabora Pablo, aunque el contexto sugiere fuertemente a Dios.'
    reason: alternative_reading
lexical_decisions:
- source_word: Συνεργοῦντες
  english_pob_choice: Working together with him
  chosen_spanish: Trabajando junto con él
  alternatives_spanish:
  - Como colaboradores
  - Trabajando juntos
  lexicon: BDAG
  rationale: El participio expresa acción concomitante y cooperación. En español, «trabajando junto con él» conserva el valor verbal y hace explícito el referente contextual implícito, que en el discurso inmediato es Dios. «Como colaboradores» es posible, pero suaviza el matiz verbal del participio.
- source_word: παρακαλοῦμεν
  english_pob_choice: we ... urge
  chosen_spanish: exhortamos
  alternatives_spanish:
  - les rogamos
  - los animamos
  - instamos
  lexicon: BDAG
  rationale: En contexto paulino, παρακαλέω tiene fuerza de apelación/exhortación. «Exhortamos» mantiene ese registro serio y eclesial sin perder claridad en español.
- source_word: εἰς κενὸν
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin fruto
  - sin propósito
  - para nada
  lexicon: BDAG
  rationale: La locución idiomática española «en vano» reproduce bien el sentido de inutilidad o falta de efecto del giro griego.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don de gracia
  lexicon: BDAG
  rationale: χάρις en Pablo es un término teológicamente cargado. «Gracia» es la equivalencia estándar y más fiel en español.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - proveniente de Dios
  lexicon: BDAG
  rationale: 'El genitivo se rinde de manera directa como posesivo: «la gracia de Dios».'
- source_word: δέξασθαι
  english_pob_choice: to receive
  chosen_spanish: recibir
  alternatives_spanish:
  - aceptar
  - acoger
  lexicon: BDAG
  rationale: δέχομαι significa recibir/aceptar. «Recibir» conserva bien la construcción con infinitivo y la relación con «gracia».
theological_decisions:
- issue: Referente implícito de «junto con él»
  english_pob_reading: The Greek participle can be rendered without making explicit the one with whom Paul is working, though the context strongly suggests God.
  chosen_spanish_reading: Se explicita «con él» como referencia contextual a Dios, sin introducir un referente nuevo.
  alternative_spanish_readings:
  - Trabajando juntos, también los exhortamos
  - Como colaboradores, también los exhortamos
  rationale: El contexto inmediato de 5:18–6:1 trata de la obra reconciliadora de Dios y del ministerio paulino en esa obra. En español, omitir el complemento puede dejar una ambigüedad mayor que en griego, por lo que se hace explícito el referente más probable sin alterar el sentido.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del consenso de alta concordancia del texto fuente y del audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, sin mascarlo como «Señor».
  - Se usa «gracia» para χάρις conforme al uso paulino.
  - La puntuación y el orden responden a un español natural, pero sin desplazar la relación participial del griego.
  - Se preserva la tensión interpretativa del participio con una nota alternativa, en lugar de resolverla de forma absoluta.
