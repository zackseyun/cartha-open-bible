  source_alignment_summary: 'El borrador refleja bien el sentido del griego: el participio Συνεργοῦντες se entiende contextualmente como cooperación con Dios, παρακαλοῦμεν conserva fuerza exhortativa, y μὴ εἰς κενὸν... δέξασθαι se traduce fielmente como no recibir la gracia de Dios en vano. La nota alternativa también preserva correctamente la ambigüedad posible del participio.'
  spanish_quality_summary: La redacción es clara y natural, pero «los exhortamos» suena menos idiomático en gran parte del español general para una exhortación dirigida a destinatarios; «les exhortamos» o mejor «les rogamos/instamos» sería más natural. Además, «Trabajando junto con él» es comprensible, pero «colaborando con él» suena más fluido y mantiene el valor verbal sin redundancia. Se requiere un ajuste menor de naturalidad y régimen pronominal.
  glossary_alignment: 'Alinea bien con la terminología del proyecto: χάρις -> «gracia», θεοῦ -> «de Dios». No hay conflicto con términos doctrinales mayores. La explicitación de «él» para Dios concuerda con la decisión auditada en inglés y se conserva con nota.'
  issues:
