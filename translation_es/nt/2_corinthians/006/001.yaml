    issue: Uso de «los exhortamos» en vez de «les exhortamos»
    rationale: Con verbo de apelación dirigido a personas, el dativo «les» resulta más natural y estándar en español general; «los exhortamos» puede percibirse como menos idiomático o regionalmente marcado.
  - severity: low
    issue: «Trabajando junto con él» suena algo pesado
    rationale: Aunque fiel, la combinación «trabajando junto con» es más torpe que «colaborando con él», que expresa de manera más natural en español la idea de συνεργοῦντες sin perder el matiz verbal.
