translation:
  language: es
  text: como entristecidos, pero siempre regocijándonos; como pobres, pero enriqueciendo[a] a muchos; como no teniendo nada[b], y sin embargo poseyéndolo todo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘haciendo ricos a muchos’. En contexto, esta riqueza probablemente no es material sino espiritual.
    reason: lexical_alternative
  - marker: b
    text: Es decir, no teniendo nada en sentido exterior, pero poseyendo todo en el sentido más profundo que Pablo afirma en unión con Cristo.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - cual
  - igual que
  - como si
  lexicon: BDAG
  rationale: Conserva el marco comparativo repetido de Pablo y deja que la paradoja se exprese sin suavizarla.
- source_word: λυπούμενοι
  english_pob_choice: sorrowful
  chosen_spanish: entristecidos
  alternatives_spanish:
  - dolidos
  - apenados
  - afligidos
  lexicon: BDAG
  rationale: '''Entristecidos'' comunica bien el estado de aflicción y mantiene un español natural y digno sin forzar una causa explícita.'
- source_word: ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - perennemente
  lexicon: BDAG
  rationale: Es el equivalente temporal más natural en español y preserva el contraste continuo con 'entristecidos'.
- source_word: δὲ
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mas
  - sin embargo
  lexicon: BDAG
  rationale: Introduce contraste claro en cada miembro de la serie; 'pero' es directo y comprensible en español moderno.
- source_word: χαίροντες
  english_pob_choice: rejoicing
  chosen_spanish: gozosos
  alternatives_spanish:
  - regocijándonos
  - alegres
  - gozando
  lexicon: BDAG
  rationale: Para evitar un giro demasiado verbal en español y conservar la fuerza del participio, 'gozosos' expresa el estado de alegría sostenida de modo natural.
- source_word: πτωχοὶ
  english_pob_choice: poor
  chosen_spanish: pobres
  alternatives_spanish:
  - necesitados
  - indigentes
  - desposeídos
  lexicon: BDAG
  rationale: Es la equivalencia básica y mantiene el contraste material y social presente en el texto.
- source_word: πολλοὺς
  english_pob_choice: many
  chosen_spanish: a muchos
  alternatives_spanish:
  - muchos
  - muchas personas
  lexicon: BDAG
  rationale: El objeto indirecto en español ayuda a expresar con claridad a quiénes alcanza la acción de enriquecer.
- source_word: πλουτίζοντες
  english_pob_choice: making many rich
  chosen_spanish: enriqueciendo a muchos
  alternatives_spanish:
  - haciendo ricos a muchos
  - enriqueciendo muchos
  lexicon: BDAG
  rationale: '''Enriqueciendo'' conserva la forma participial y ''a muchos'' mantiene la referencia personal implícita, sin resolver si la riqueza es material o espiritual.'
- source_word: μηδὲν ἔχοντες
  english_pob_choice: having nothing
  chosen_spanish: no teniendo nada
  alternatives_spanish:
  - sin tener nada
  - poseyendo nada
  lexicon: BDAG
  rationale: Preserva la estructura participial del griego y la paradoja de la carencia de manera transparente para el lector español.
- source_word: πάντα κατέχοντες
  english_pob_choice: possessing everything
  chosen_spanish: poseyéndolo todo
  alternatives_spanish:
  - poseyendo todo
  - teniendo todas las cosas
  - poseyendo todas las cosas
  lexicon: BDAG
  rationale: '''Poseyéndolo todo'' suena natural en español y conserva la tensión con ''no teniendo nada'' sin introducir una explicación interpretativa en el texto principal.'
theological_decisions:
- issue: La naturaleza de la 'riqueza' y de la 'posesión' en el paralelismo final
  english_pob_reading: Render the language straightforwardly without specifying 'spiritually' in the main text.
  chosen_spanish_reading: Mantener la paradoja sin aclarar en el texto principal si la riqueza y la posesión son espirituales o materiales.
  alternative_spanish_readings:
  - enriqueciendo espiritualmente a muchos
  - poseyéndolo todo en Cristo
  - poseyendo todas las cosas en sentido espiritual
  rationale: El griego presenta una serie de contrastes retóricos; el contexto paulino sugiere una realidad más profunda, pero el texto no la explicita. La traducción debe preservar esa tensión teológica en vez de resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando explícitamente los marcadores [a] y [b] dentro del texto español, sin añadir notas huérfanas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo repetido de ὡς con 'como' en las tres cláusulas.
  - Se evitó 'Cristo' en el texto principal porque el versículo no lo nombra explícitamente y la POB inglesa también preserva la paradoja sin explicitarla.
  - '''Gozosos'' se eligió para conservar el valor participial de χαίροντες con español idiomático.'
  - '''Poseyéndolo todo'' resuelve la elipsis del objeto directo de manera natural en español, sin alterar el sentido global.'
