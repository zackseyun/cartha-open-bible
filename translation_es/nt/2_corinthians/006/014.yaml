translation:
  language: es
  text: No lleguen a estar en yugo desigual con los incrédulos[a]. Porque ¿qué participación tiene la justicia[b] con el desprecio de la ley? ¿O qué comunión tiene la luz con las tinieblas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: La expresión 'en yugo desigual' conserva la imagen de animales mal apareados bajo un mismo yugo; compárese Deuteronomio 22:10.
    reason: cross_reference
  - marker: b
    text: También puede traducirse 'rectitud'; el griego δικαιοσύνη abarca tanto rectitud moral como justicia, y aquí contrasta con el desprecio de la ley.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ γίνεσθε
  english_pob_choice: Do not become
  chosen_spanish: No se unan
  alternatives_spanish:
  - No lleguen a ser
  - No estén
  lexicon: BDAG
  rationale: El imperativo con μή expresa prohibición; en español, 'No se unan' comunica con naturalidad la exhortación y encaja con la imagen relacional del resto del versículo. 'No lleguen a ser' sería más literal respecto de γίνομαι, pero menos natural en este giro exhortativo.
- source_word: ἑτεροζυγοῦντες
  english_pob_choice: unequally yoked
  chosen_spanish: en yugo desigual
  alternatives_spanish:
  - con un yugo diferente
  - yugados de modo desigual
  lexicon: BDAG
  rationale: Se conserva la metáfora del yugo, que probablemente alude a Deuteronomio 22:10. 'En yugo desigual' mantiene el peso figurado y es la forma más reconocible en español sin perder el sentido de desajuste entre los unidos por el yugo.
- source_word: ἀπίστοις
  english_pob_choice: with unbelievers
  chosen_spanish: con los incrédulos
  alternatives_spanish:
  - con los no creyentes
  - con los que no creen
  lexicon: BDAG
  rationale: ἄπιστος designa a quienes no creen. 'Incrédulos' es claro, bíblico y fiel al contraste paulino; se evita suavizarlo a una expresión más amplia que diluya la oposición entre creyentes e incrédulos.
- source_word: μετοχὴ
  english_pob_choice: partnership
  chosen_spanish: participación
  alternatives_spanish:
  - partnership
  - comunión compartida
  - parte en común
  lexicon: BDAG
  rationale: μετοχή expresa participación o compartir en algo común. 'Participación' es el equivalente más directo en español y conserva el matiz de relación compartida; 'partnership' sería un anglicismo inadecuado para el texto.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/rectitud
  lexicon: BDAG
  rationale: Aunque el inglés POB favorece 'righteousness', en español 'justicia' es la opción más natural y además permite reflejar la alternativa lexical reconocida por el propio aparato auditado. Aquí no se pierde el contraste moral con ἀνομία, y se preserva la tensión entre 'justicia' y 'rectitud' en nota.
- source_word: ἀνομίᾳ
  english_pob_choice: lawlessness
  chosen_spanish: la iniquidad
  alternatives_spanish:
  - la falta de ley
  - la anarquía moral
  - la maldad
  lexicon: BDAG
  rationale: ἀνομία puede verterse literalmente como 'sin ley' o 'ilegalidad', pero en español bíblico 'iniquidad' transmite bien la oposición ética y resulta natural en paralelo con 'justicia'. Se mantiene el contraste semántico con δικαιοσύνη sin volver la frase torpe.
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - participación
  - compañerismo
  - relación
  lexicon: BDAG
  rationale: κοινωνία denota compartir en común o estrecha asociación. 'Comunión' reproduce bien la idea de participación relacional y, en español eclesial, mantiene el paralelismo con la primera pregunta retórica.
- source_word: φωτὶ
  english_pob_choice: light
  chosen_spanish: la luz
  alternatives_spanish:
  - luz
  lexicon: BDAG
  rationale: Se conserva el sustantivo literal y su valor metafórico en la oposición paulina.
- source_word: πρὸς σκότος
  english_pob_choice: with darkness
  chosen_spanish: con las tinieblas
  alternatives_spanish:
  - frente a las tinieblas
  - en relación con las tinieblas
  lexicon: BDAG
  rationale: Aunque πρός puede tener matiz relacional o direccional, el español idiomático pide 'con' en esta pregunta retórica. 'Tinieblas' mantiene el plural tradicional y el contraste bíblico con 'luz'.
theological_decisions:
- issue: δικαιοσύνη en contraste paulino
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  rationale: El POB inglés deja constancia de la alternativa 'justice' para δικαιοσύνη. En español, 'justicia' comunica de manera directa el campo semántico y permite conservar la tensión ética-jurídica frente a ἀνομία sin necesidad de un calco doctrinal estrecho. Se mantiene abierta la posibilidad de 'rectitud' como matiz.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice preserved in footnotes for Pauline passages'
- issue: La metáfora del yugo desigual
  english_pob_reading: unequally yoked
  chosen_spanish_reading: en yugo desigual
  alternative_spanish_readings:
  - unidos desigualmente bajo un yugo
  - con un yugo diferente
  rationale: Se preserva la imagen agrícola y la posible alusión a Deuteronomio 22:10, porque esa metáfora forma parte del argumento apostólico y no debe diluirse en una mera prohibición abstracta. La formulación escogida es natural para el lector español y mantiene la fuerza exhortativa.
  doctrine_reference: Cross-reference to Deuteronomy 22:10 in the English audit trail
- issue: ἀνομία como oposición ética a δικαιοσύνη
  english_pob_reading: lawlessness
  chosen_spanish_reading: iniquidad
  alternative_spanish_readings:
  - iniquidad/legalidad rota
  - sin ley
  rationale: 'Aunque ''sin ley'' sería más transparente etimológicamente, ''iniquidad'' es una equivalencia bíblica estable en español que conserva la polaridad moral del versículo. La tensión léxica no se elimina: queda explicada en la decisión lexical y en la relación antitética con ''justicia''.'
  doctrine_reference: Lexical contrast in Pauline ethics
translation_notes:
  revision_awareness: 'El control de revisión indica que no hubo cambios necesarios en la última pasada y que el consenso de revisión fue alto (agree). Por eso esta propuesta sigue de cerca la línea auditada: conserva la metáfora del yugo, el contraste justicia/iniquidad y la pregunta retórica sobre luz/tinieblas sin introducir reinterpretaciones nuevas.'
  spanish_consistency_notes:
  - Se usa 'tinieblas' en plural por coherencia bíblica y por correspondencia estilística con 'luz'.
  - Se prefiere 'comunión' frente a 'fellowship' o 'compañerismo' para mantener registro eclesial sin perder el matiz de participación común.
  - '''Incrédulos'' y no ''no creyentes'' preserva la dicotomía paulina habitual entre creyentes e incrédulos.'
  - La nota sobre δικαιοσύνη se vincula al término 'justicia' en el texto para evitar duplicidad de marcadores y mantener trazabilidad.
