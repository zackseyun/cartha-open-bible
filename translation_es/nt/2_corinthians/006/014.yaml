base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/006/014.yaml
  text: Do not become unequally yoked with unbelievers[b][a]. For what partnership has righteousness with lawlessness? Or what fellowship has light with darkness?
  footnotes:
