revisions:
- from: No se unan en yugo desigual con los incrédulos[a][b]. Porque ¿qué participación tiene la justicia con la iniquidad? ¿O qué comunión tiene la luz con las tinieblas?
  to: No lleguen a estar en yugo desigual con los incrédulos[a]. Porque ¿qué participación tiene la justicia[b] con el desprecio de la ley? ¿O qué comunión tiene la luz con las tinieblas?
  rationale: Se ajusta γίνεσθε para reflejar mejor el sentido de 'llegar a estar/ser' sin perder naturalidad; se conserva la metáfora agrícola auditada. Se repara ἀνομία con una expresión que preserve el matiz de 'lawlessness' y el contraste con δικαιοσύνη. Se corrige además la ubicación de la nota léxica para que quede anclada en 'justicia', el término al que realmente explica.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura retórica y la metáfora principal, pero no sigue de forma suficientemente fiel algunas decisiones léxicas auditadas del griego. En particular, γίνεσθε se acerca mejor a 'lleguen a estar/ser' que a 'se unan', porque el griego no expresa explícitamente 'unirse' sino entrar en el estado de estar bajo yugo desigual. Además, ἀνομίᾳ está auditado como 'lawlessness' y conviene reflejarlo en español como 'ilegalidad' o mejor 'desprecio de la ley'/'falta de ley'; 'iniquidad' suaviza y desplaza el contraste léxico con δικαιοσύνη. El resto de la antítesis (μετοχή/κοινωνία; luz/tinieblas) está bien preservado.
  spanish_quality_summary: 'El español es claro y eclesialmente legible, con buena cadencia. Sin embargo, la colocación de las notas está invertida respecto del contenido: la nota [b] está anclada en ''incrédulos'' pero habla de δικαιοσύνῃ. También ''No se unan en yugo desigual'' suena algo menos preciso que una formulación que preserve mejor el verbo de devenir y la imagen de quedar bajo un yugo desigual.'
  glossary_alignment: Alineación parcial. δικαιοσύνη como 'justicia' es aceptable en español y está respaldado por la nota auditada como alternativa a 'righteousness'. Pero la nota española introduce 'rectitud' en vez de preservar la alternativa auditada principal 'justicia' frente a 'righteousness'; en español conviene explicitar 'también puede traducirse justicia/rectitud' solo si hace falta, pero aquí basta mantener una nota sobre la amplitud semántica. Más importante, ἀνομία debe reflejar el campo de 'lawlessness' mejor que 'iniquidad'.
  issues:
  - severity: medium
    issue: Μὴ γίνεσθε se tradujo como 'No se unan'
    rationale: El griego dice literalmente 'No lleguen a ser/estar', no un verbo explícito de unión. La metáfora del yugo ya expresa la relación; 'no se unan' añade una especificación interpretativa.
  - severity: high
    issue: ἀνομίᾳ se tradujo como 'iniquidad'
    rationale: La auditoría inglesa decidió 'lawlessness' para preservar el contraste léxico con δικαιοσύνη. 'Iniquidad' es más amplia y pierde el matiz de rechazo a la ley.
  - severity: medium
    issue: La nota [b] está anclada en 'incrédulos' pero trata sobre δικαιοσύνῃ
    rationale: Los marcadores deben aparecer en el lugar pertinente del texto. La nota léxica debe anclarse en 'justicia'.
  - severity: low
    issue: La nota léxica española no refleja con precisión la lógica del aparato inglés
    rationale: El aparato inglés preserva 'justice' como alternativa a 'righteousness'. En español, al usar 'justicia' en el texto principal, la nota debe explicar la alternativa 'rectitud' o el rango semántico, no presentar de forma confusa la relación con el inglés.
  revised_spanish_text: No lleguen a estar en yugo desigual con los incrédulos[a]. Porque ¿qué participación tiene la justicia[b] con el desprecio de la ley? ¿O qué comunión tiene la luz con las tinieblas?
  revised_footnotes:
