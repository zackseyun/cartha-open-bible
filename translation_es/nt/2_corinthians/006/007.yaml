translation:
  language: es
  text: en la palabra de verdad, en el poder de Dios; por medio de las armas de rectitud[a] en la mano derecha y en la izquierda[b][c],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'de justicia'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'en la mano derecha y en la izquierda' probablemente evoca armas usadas en ambas manos, lo que sugiere plena disposición tanto para el ataque como para la defensa.
    reason: cultural_note
  - marker: c
    text: O 'para la mano derecha y para la izquierda'.
    reason: previous_rendering
lexical_decisions:
- source_word: λόγῳ ἀληθείας
  english_pob_choice: the word of truth
  chosen_spanish: la palabra de verdad
  alternatives_spanish:
  - el mensaje de verdad
  - la palabra verdadera
  lexicon: BDAG
  rationale: λόγος puede significar ‘palabra’, ‘mensaje’ o ‘discurso’. ‘La palabra de verdad’ conserva la estructura del griego y la formulación auditada del inglés POB, y en español suena natural y eclesial sin perder la referencia a proclamación veraz o mensaje del evangelio.
- source_word: δυνάμει θεοῦ
  english_pob_choice: the power of God
  chosen_spanish: el poder de Dios
  alternatives_spanish:
  - el poder de Dios mismo
  - el poder que proviene de Dios
  lexicon: BDAG
  rationale: La construcción genitiva se refleja de forma directa en español. ‘El poder de Dios’ mantiene el paralelismo con la frase anterior y evita una paráfrasis innecesaria.
- source_word: διά
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - mediante
  - a través de
  lexicon: BDAG
  rationale: Con genitivo, διά suele expresar medio o instrumento. ‘Por medio de’ comunica bien la idea instrumental en español y resulta más natural que un calco más rígido.
- source_word: ὅπλων
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armamento
  - armas de combate
  lexicon: BDAG
  rationale: ὅπλον designa instrumentos de guerra. ‘Armas’ es el equivalente más directo y transparente en español; ‘armas de combate’ sería más explicativo, pero menos fielmente breve.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rendimiento correcto
  lexicon: BDAG
  rationale: En este contexto paulino, el POB inglés preservó la alternativa ‘justice’. En español, ‘justicia’ conserva esa tensión semántica mejor que ‘rectitud’ en una imagen de lucha espiritual, y permite una nota que mantenga abierta la alternativa.
- source_word: τῶν δεξιῶν καὶ ἀριστερῶν
  english_pob_choice: in the right hand and in the left
  chosen_spanish: en la mano derecha y en la izquierda
  alternatives_spanish:
  - para la mano derecha y para la izquierda
  - a la derecha y a la izquierda
  lexicon: BDAG
  rationale: Los adjetivos funcionan sustantivamente y evocan la imagen de uso completo de armas en ambas manos. ‘En la mano derecha y en la izquierda’ refleja con naturalidad la decisión revisada en el inglés auditado y conserva la imaginería militar sin sobreexplicarla.
theological_decisions:
- issue: δικαιοσύνη en una frase paulina de tono ministerial y combativo
  english_pob_reading: righteousness, with 'justice' preserved as an alternative
  chosen_spanish_reading: justicia, con ‘justicia’ manteniendo la alternativa al sentido moral/forense de ‘rectitud’
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El proyecto distingue δικαιοσύνη como ‘righteousness’ por defecto, pero aquí la imagen de ‘armas’ admite también ‘justicia’. En español, ‘justicia’ conserva mejor la ambigüedad productiva que ‘rectitud’, y la nota puede reconocer la alternativa sin borrar la tensión lexical.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → righteousness/justicia en notas para pasajes paulinos'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que aclaró la frase final como ‘in the right hand and in the left’. La redacción española adopta ‘en la mano derecha y en la izquierda’ para reflejar de forma natural esa lectura revisada y mantener el paralelismo de las dos manos.
  spanish_consistency_notes:
  - Se mantiene ‘Dios’ para θεός, conforme a la norma del proyecto.
  - Se usa ‘justicia’ como opción principal de δικαιοσύνη, dejando abierta la alternativa mediante nota.
  - Se conserva un registro sobrio y publicable, sin añadir explicaciones interpretativas al cuerpo principal del versículo.
