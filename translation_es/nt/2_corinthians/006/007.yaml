review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura tripartita del griego: ἐν λόγῳ ἀληθείας / ἐν δυνάμει θεοῦ / διὰ τῶν ὅπλων τῆς δικαιοσύνης τῶν δεξιῶν καὶ ἀριστερῶν. ''en la palabra de verdad'' y ''en el poder de Dios'' son fieles. ''por medio de las armas'' representa adecuadamente διά + genitivo. La imagen final de armas en ambas manos también está bien reflejada.'
  spanish_quality_summary: 'El español principal es claro y natural. Sin embargo, la nota [a] está mal anclada y además no corresponde al segmento ''palabra de verdad''; repite por error la alternativa de δικαιοσύνη/ὅπλων. También conviene alinear la terminología principal de δικαιοσύνη con la pauta del proyecto y con el rastro auditado inglés: en texto base debe preferirse ''rectitud'' o ''justicia'' según contexto, pero aquí el inglés fijó ''righteousness'' con ''justice'' como alternativa preservada. En español, ''armas de rectitud'' suena suficientemente natural y preserva mejor esa decisión, dejando ''justicia'' en nota.'
  glossary_alignment: 'Buen alineamiento general con Dios, palabra, poder, armas. El punto conflictivo es δικαιοσύνης: el borrador principal usa ''justicia'', pero el rastro POB y la guía doctrinal piden mantener el valor principal equivalente a ''righteousness'' y preservar ''justice'' como alternativa en nota para Pablo. También debe corregirse la nota alternativa para que esté unida a ''rectitud'' y no a ''palabra de verdad''.'
  issues:
  - severity: high
    issue: La nota [a] está asociada al lugar equivocado
    rationale: En el texto aparece tras 'verdad', pero su contenido ('O por medio de las armas de justicia') no ofrece una alternativa para λόγῳ ἀληθείας. Esto confunde al lector y no preserva correctamente el rastro de decisiones léxicas.
  - severity: medium
    issue: δικαιοσύνης en el texto principal no sigue la decisión auditada principal
    rationale: El inglés POB eligió 'righteousness' como lectura principal y preservó 'justice' como alternativa. En español, 'rectitud' representa mejor esa lectura principal que 'justicia', especialmente dado que la alternativa debe quedar en nota.
  - severity: low
    issue: La nota [c] podría formularse con artículo para sonar más natural en español
    rationale: '''para la mano derecha y para la izquierda'' es entendible, pero ''para la mano derecha y para la mano izquierda'' o mantener la forma breve en nota es menor. No es necesario forzar cambio si se preserva la alternativa auditada.'
  revised_spanish_text: en la palabra de verdad, en el poder de Dios; por medio de las armas de rectitud[a] en la mano derecha y en la izquierda[b][c],
  revised_footnotes:
  - marker: a
    text: O 'de justicia'.
    reason: lexical_alternative
  - marker: b
    text: La expresión 'en la mano derecha y en la izquierda' probablemente evoca armas usadas en ambas manos, lo que sugiere plena disposición tanto para el ataque como para la defensa.
    reason: cultural_note
  - marker: c
    text: O 'para la mano derecha y para la izquierda'.
    reason: previous_rendering
  revision_rationale: 'Se corrigió un error importante de notas: la nota [a] estaba anclada a ''verdad'' pero pertenecía al campo léxico de δικαιοσύνη. Además, se ajustó el término principal a ''rectitud'' para reflejar mejor la decisión principal auditada (''righteousness'') y se conservó ''justicia'' como alternativa en nota, en línea con la guía doctrinal del proyecto para pasajes paulinos. El resto del verso puede mantenerse, pues es fiel y natural en español.'
