revisions:
- from: en la palabra de verdad[a], en el poder de Dios; por medio de las armas de justicia en la mano derecha y en la izquierda[b][c],
  to: en la palabra de verdad, en el poder de Dios; por medio de las armas de rectitud[a] en la mano derecha y en la izquierda[b][c],
  rationale: 'Se corrigió un error importante de notas: la nota [a] estaba anclada a ''verdad'' pero pertenecía al campo léxico de δικαιοσύνη. Además, se ajustó el término principal a ''rectitud'' para reflejar mejor la decisión principal auditada (''righteousness'') y se conservó ''justicia'' como alternativa en nota, en línea con la guía doctrinal del proyecto para pasajes paulinos. El resto del verso puede mantenerse, pues es fiel y natural en español.'
