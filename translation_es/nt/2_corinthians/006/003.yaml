lexical_decisions:
- source_word: μηδεμίαν
  english_pob_choice: 'no'
  chosen_spanish: ninguna
  alternatives_spanish:
  - 'no'
  - ningún tipo de
  lexicon: BDAG
  rationale: Con προσκοπήν, el griego forma una negación total de la ocasión de tropiezo; en español, «ninguna» conserva la negación enfática sin sonar artificial.
- source_word: ἐν μηδενί
  english_pob_choice: in anything
  chosen_spanish: en nada
  alternatives_spanish:
  - en cualquier cosa
  - en ningún aspecto
  lexicon: BDAG
  rationale: La frase expresa alcance general o circunstancia. «En nada» suena natural en español y conserva la amplitud comprensiva del original.
- source_word: διδόντες
  english_pob_choice: giving
  chosen_spanish: dando
  alternatives_spanish:
  - causando
  - provocando
  lexicon: BDAG
  rationale: El participio significa literalmente «dar». «Dando» mantiene el valor verbal y permite la construcción natural «dar ocasión de».
- source_word: προσκοπήν
  english_pob_choice: cause for stumbling
  chosen_spanish: ocasión de tropiezo
  alternatives_spanish:
  - causa de tropiezo
  - ofensa
  - piedra de tropiezo
  lexicon: BDAG
  rationale: προσκοπή puede ser una ocasión de caer o de ofenderse. «Ocasión de tropiezo» conserva la metáfora y evita reducirla solo a una reacción subjetiva de «ofensa».
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que ... no
  alternatives_spanish:
  - a fin de que ... no
  - para evitar que
  lexicon: BDAG
  rationale: La cláusula introduce propósito. «Para que ... no» es claro en español y preserva la relación final sin forzar un matiz demasiado arcaico.
- source_word: μωμηθῇ
  english_pob_choice: may not be blamed
  chosen_spanish: no sea desacreditado
  alternatives_spanish:
  - no sea culpado
  - no sea reprochado
  - no sea encontrado culpable
  lexicon: BDAG
  rationale: El verbo puede significar culpar, censurar o desacreditar. En este contexto, el foco no es solo culpa moral sino pérdida de crédito delante de otros; «desacreditado» expresa bien ese matiz, como reconoce la alternativa inglesa.
- source_word: διακονία
  english_pob_choice: the ministry
  chosen_spanish: el ministerio
  alternatives_spanish:
  - el servicio
  - la labor ministerial
  lexicon: BDAG
  rationale: En Pablo, διακονία aquí se refiere al servicio/apostolado ejercido por los ministros. «El ministerio» es la forma española más idiomática y no impone una estructura eclesiástica ajena al contexto.
theological_decisions:
- issue: Sentido de μωμηθῇ aplicado a la διακονία
  english_pob_reading: '''so that the ministry may not be blamed'' / ''discredited'''
  chosen_spanish_reading: «para que el ministerio no sea desacreditado»
  alternative_spanish_readings:
  - «para que el ministerio no sea culpado»
  - «para que el ministerio no sea reprochado»
  rationale: El pasivo admite la idea de ser culpado o censurado; sin embargo, en el contexto paulino el objetivo es evitar que la obra ministerial pierda credibilidad por una conducta inapropiada. «Desacreditado» mantiene esa tensión mejor que una culpabilidad meramente forense.
  doctrine_reference: 2 Co 6:3; BDAG μωμάομαι; traducción por fuerza contextual
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés de alta concordancia; no se registran revisiones textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «ministerio» para διακονία, coherente con el uso paulino y con la decisión inglesa auditada.
  - Se eligió «desacreditado» para μωμηθῇ por su capacidad de abarcar tanto censura como pérdida de credibilidad, sin borrar la tensión semántica documentada.
  - La frase «ocasión de tropiezo» preserva la metáfora de προσκοπή sin endurecerla en una sola equivalencia técnica.
