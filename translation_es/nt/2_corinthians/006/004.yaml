translation:
  language: es
  text: 'pero en todo[a], recomendándonos como siervos de Dios: en mucha perseverancia[b], en aflicciones, en dificultades, en angustias,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en todo aspecto». La frase griega es amplia y puede referirse a cada circunstancia o a cada aspecto en que se prueban.
    reason: lexical_alternative
  - marker: b
    text: O «con mucha perseverancia». La repetición de «en» en la lista sigue la estructura del griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  lexicon: BDAG
  rationale: Marca contraste con la negación anterior y abre la descripción positiva del ministerio; en español, 'pero' es el equivalente natural y directo.
- source_word: ἐν παντί
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en cada aspecto
  - en toda circunstancia
  lexicon: BDAG
  rationale: La frase es amplia y adverbial, indicando la esfera o respecto en que se muestran. 'En todo' preserva esa amplitud sin explicitar más de lo que el griego requiere.
- source_word: συνιστάνοντες ἑαυτούς
  english_pob_choice: commending ourselves
  chosen_spanish: presentándonos
  alternatives_spanish:
  - recomendándonos
  - demostrándonos
  lexicon: BDAG
  rationale: En este contexto paulino, συνίστημι puede significar presentarse/probarse como auténtico. 'Presentándonos' mantiene el sentido de exhibir la realidad del ministerio por la conducta, sin sonar forzado en español.
- source_word: ὡς θεοῦ διάκονοι
  english_pob_choice: as God's servants
  chosen_spanish: como siervos de Dios
  alternatives_spanish:
  - como servidores de Dios
  - como ministros de Dios
  lexicon: BDAG
  rationale: διάκονος denota servicio. 'Siervos' conserva la relación de servicio personal y evita el matiz eclesiástico más técnico de 'ministros'; además, en español bíblico es claro y fiel al término griego.
- source_word: ἐν ὑπομονῇ πολλῇ
  english_pob_choice: in great endurance
  chosen_spanish: en mucha perseverancia
  alternatives_spanish:
  - con mucha paciencia
  - en gran resistencia
  lexicon: BDAG
  rationale: ὑπομονή expresa perseverar bajo prueba, no solo 'paciencia' en sentido cotidiano. 'Perseverancia' comunica mejor la resistencia constante; 'mucha' refleja πολλῇ y mantiene la estructura repetida con ἐν.
- source_word: θλίψεσιν
  english_pob_choice: afflictions
  chosen_spanish: en aflicciones
  alternatives_spanish:
  - en tribulaciones
  - en angustias
  lexicon: BDAG
  rationale: θλῖψις alude a presión, aflicción o tribulación. 'Aflicciones' es una forma digna y suficientemente fuerte para la lista de sufrimientos.
- source_word: ἀνάγκαις
  english_pob_choice: hardships
  chosen_spanish: en necesidades
  alternatives_spanish:
  - en apuros
  - en dificultades
  - en estrecheces
  lexicon: BDAG
  rationale: Aquí ἀνάγκη refiere a circunstancias apremiantes y constrictivas. 'Necesidades' conserva el peso de lo urgente o apremiante y deja abierto el matiz de presión, sin convertirlo en una lectura más interpretativa.
- source_word: στενοχωρίαις
  english_pob_choice: distresses
  chosen_spanish: en angustias
  alternatives_spanish:
  - en estrecheces
  - en estrechuras
  - en aprietos
  lexicon: BDAG
  rationale: στενοχωρία evoca estar 'apretado', cercado o bajo presión severa. 'Angustias' comunica bien la opresión experimentada y resulta natural en español; se mantiene la serie de preposiciones para reflejar la estructura griega.
theological_decisions:
- issue: Cómo verter διάκονοι sin importar un cargo eclesiástico posterior
  english_pob_reading: God's servants
  chosen_spanish_reading: siervos de Dios
  alternative_spanish_readings:
  - servidores de Dios
  - ministros de Dios
  rationale: El texto identifica a Pablo y sus colaboradores por su servicio a Dios, no por un oficio institucional. 'Siervos' conserva la función de servicio y evita cargar el versículo con una lectura clerical posterior.
  doctrine_reference: Translation philosophy §6; distinción contextual entre servicio y oficio
- issue: Mantener la fuerza acumulativa de la lista de sufrimientos
  english_pob_reading: in great endurance, in afflictions, in hardships, in distresses
  chosen_spanish_reading: en mucha perseverancia, en aflicciones, en necesidades, en angustias
  alternative_spanish_readings:
  - con mucha perseverancia, en tribulaciones, en dificultades, en estrecheces
  rationale: La repetición de ἐν en la serie se conserva para reproducir el ritmo y la acumulación del griego. Además, cada término español intenta diferenciarse levemente para no borrar la gradación de presión y aflicción.
  doctrine_reference: Principio de equivalencia óptima; preservación de estructura retórica paulina
translation_notes:
  revision_awareness: 'Concordancia alta con la auditoría inglesa: se preserva el contraste inicial, la amplitud de ἐν παντί, el sentido de συνιστάνοντες ἑαυτούς como auto-presentación/auto-demostración ministerial, y la lista acumulativa de padecimientos. Se eligió un español más natural que no depende mecánicamente de la forma inglesa, pero mantiene las tensiones léxicas documentadas.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ según el estándar del proyecto.
  - Se evita 'SEÑOR' o 'ministros' como lectura principal para διάκονοι, salvo nota alternativa.
  - La serie de preposiciones 'en' se conserva en el verso para reflejar el patrón del griego.
  - '''perseverancia'' se usa para ὑπομονή, manteniendo la idea de resistencia bajo prueba.'
