- from: 'pero en todo, presentándonos como [a] siervos de Dios: en mucha perseverancia[b], en aflicciones, en necesidades, en angustias,'
  to: 'pero en todo[a], recomendándonos como siervos de Dios: en mucha perseverancia[b], en aflicciones, en dificultades, en angustias,'
  rationale: Se corrige el anclaje de la nota sobre ἐν παντί, se mejora la naturalidad de esa nota, se cambia «presentándonos» por «recomendándonos» para reflejar mejor συνιστάνοντες ἑαυτούς, y se sustituye «necesidades» por «dificultades» para representar con mayor fidelidad ἀνάγκαις en este catálogo de sufrimientos. Se conservan «siervos de Dios», la estructura repetida con «en» y el tono digno y legible.
