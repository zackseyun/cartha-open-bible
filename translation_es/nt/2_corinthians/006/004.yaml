    text: O «en todo aspecto». La frase griega es amplia y puede referirse a cada circunstancia o a cada aspecto en que se prueban.
    reason: lexical_alternative
  - marker: b
    text: O «con mucha perseverancia». La repetición de «en» en la lista sigue la estructura del griego.
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre ἐν παντί, se mejora la naturalidad de esa nota, se cambia «presentándonos» por «recomendándonos» para reflejar mejor συνιστάνοντες ἑαυτούς, y se sustituye «necesidades» por «dificultades» para representar con mayor fidelidad ἀνάγκαις en este catálogo de sufrimientos. Se conservan «siervos de Dios», la estructura repetida con «en» y el tono digno y legible.
