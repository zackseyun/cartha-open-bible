review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego y conserva la cadena repetida con «en». Sin embargo, hay varios desajustes importantes: «presentándonos» debilita el sentido de συνιστάνοντες ἑαυτούς, que aquí es más bien «recomendándonos»/«mostrándonos»/«acreditándonos»; «necesidades» para ἀνάγκαις suena demasiado material y no transmite bien «hardships» o circunstancias apremiantes; además, la nota [a] está mal anclada, porque comenta ἐν παντί pero aparece junto a «siervos de Dios».'
  spanish_quality_summary: El español es legible y digno, pero la puntuación y el anclaje de notas necesitan ajuste. «En todo, presentándonos como...» se entiende, aunque «recomendándonos» o «mostrándonos» expresa mejor el valor paulino sin sonar demasiado moderno. «Dificultades» funciona mejor que «necesidades» en este contexto. Conviene también corregir la redacción de la nota [a] para que su español sea natural.
  glossary_alignment: «Dios» y «siervos de Dios» son compatibles con las decisiones auditadas para θεοῦ διάκονοι. No hay conflicto con los términos del glosario principal. El problema principal es léxico-contextual con ἀνάγκαις y, en menor grado, con συνιστάνοντες.
  issues:
  - severity: medium
    issue: La nota [a] está anclada en el lugar equivocado.
    rationale: La nota explica ἐν παντί («en todo» / «en todo aspecto»), pero en el borrador aparece junto a «siervos de Dios», lo cual induce a confusión textual.
  - severity: medium
    issue: «Presentándonos» no expresa plenamente συνιστάνοντες ἑαυτούς.
    rationale: El participio en este contexto no es solo «presentarse», sino demostrar o acreditar el carácter genuino del ministerio. «Recomendándonos» o «mostrándonos» preserva mejor la fuerza semántica y la relación con el inglés auditado «commending ourselves».
  - severity: high
    issue: «Necesidades» para ἀνάγκαις es engañoso en español.
    rationale: En español bíblico y común, «necesidades» suele oírse como carencias materiales o necesidades básicas. Aquí el griego apunta a presiones, apuros o dificultades apremiantes; por eso «dificultades» o «apuros» es más fiel al contexto.
  - severity: low
    issue: La nota [a] tiene una formulación poco natural en español.
    rationale: «Cada respectiva manera» suena torpe. Una formulación como «cada circunstancia o cada aspecto en que se prueban» es más natural y clara.
  revised_spanish_text: 'pero en todo[a], recomendándonos como siervos de Dios: en mucha perseverancia[b], en aflicciones, en dificultades, en angustias,'
  revised_footnotes:
