    issue: '''la misma retribución'' suena demasiado comercial o punitiva'
    rationale: Aunque ἀντιμισθίαν puede denotar recompensa o retribución, en este contexto Pablo pide una respuesta correspondiente de afecto y apertura, no una paga. 'Correspondencia' comunica mejor la reciprocidad sin desviar el sentido.
  - severity: low
    issue: Orden poco natural en 'estén también ustedes abiertos'
    rationale: El español suena más natural con 'estén abiertos ustedes también' o 'ábranse también ustedes'. Dado que se quiere evitar añadir objeto explícito y preservar el matiz pasivo/deponente, 'estén abiertos ustedes también' mantiene mejor equilibrio entre fidelidad y fluidez.
