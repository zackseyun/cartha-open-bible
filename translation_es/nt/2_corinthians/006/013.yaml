translation:
  language: es
  text: Ahora, con la misma correspondencia[a]—hablo como a hijos—estén abiertos[b] ustedes también.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como retribución», «como recompensa» o «en igual intercambio».'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «sean ensanchados» o «sean ampliados»; aquí el sentido es de apertura y receptividad mutua.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὴν δὲ αὐτὴν ἀντιμισθίαν
  english_pob_choice: in the same return
  chosen_spanish: la misma retribución
  alternatives_spanish:
  - el mismo retorno
  - la misma recompensa
  - el mismo intercambio
  lexicon: BDAG
  rationale: ἀντιμισθίαν expresa una respuesta recíproca, no una paga comercial. En español, «retribución» conserva la idea de correspondencia o respuesta, y «la misma» refleja αὐτὴν con el énfasis de igualdad que el inglés POB revisado quiso preservar.
- source_word: ὡς τέκνοις
  english_pob_choice: as to children
  chosen_spanish: como a hijos
  alternatives_spanish:
  - como a niños
  - como a mis hijos
  - como a hijos queridos
  lexicon: BDAG
  rationale: τέκνοις significa «hijos» y no incluye un posesivo explícito. «Como a hijos» mantiene la relación afectuosa sin añadir «mis». Se prefiere «hijos» sobre «niños» porque el contexto es relacional y pastoral.
- source_word: πλατύνθητε
  english_pob_choice: be open wide
  chosen_spanish: estén también ustedes abiertos
  alternatives_spanish:
  - ábranse ampliamente
  - ensanchaos
  - sean ensanchados
  lexicon: BDAG
  rationale: El imperativo pasivo/deponente literalmente es «sean ensanchados» o «sean ampliados». En español, «estén abiertos» comunica la metáfora de receptividad y apertura relacional sin introducir un objeto no explícito como «corazones». Se añade «también» para reflejar καὶ ὑμεῖς como reciprocidad.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: también ustedes
  alternatives_spanish:
  - ustedes también
  - vosotros también
  lexicon: BDAG
  rationale: La expresión enfatiza reciprocidad. «También ustedes» preserva ese énfasis con un orden natural en español latinoamericano.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ marca transición suave, no contraste fuerte. «Ahora» funciona como enlace discursivo claro en español.
theological_decisions:
- issue: Reciprocidad afectiva sin añadir objeto explícito
  english_pob_reading: be open wide, you also
  chosen_spanish_reading: estén también ustedes abiertos
  alternative_spanish_readings:
  - ábranse ampliamente, ustedes también
  - estén abiertos de par en par, ustedes también
  rationale: El griego no menciona «corazones» en este versículo. La redacción española mantiene la metáfora de apertura/receptividad sin amplificarla más allá del texto, preservando la reciprocidad exhortativa de Pablo.
  doctrine_reference: Principio de primacía del original; no paraphrase beyond the source warrants.
- issue: Relación paternal sin posesivo explícito
  english_pob_reading: as to children
  chosen_spanish_reading: como a hijos
  alternative_spanish_readings:
  - como a mis hijos
  - como a sus hijos
  rationale: El texto expresa una apelación familiar, pero sin pronombre posesivo explícito. La opción escogida evita atribuir una matización no presente en la forma griega.
  doctrine_reference: Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del inglés POB, que corrigió «in return» a «in the same return» y sustituyó «open your hearts wide» por una formulación más cercana a la literalidad. La versión española sigue esa cautela: conserva la igualdad recíproca de αὐτὴν y evita añadir «corazones».'
  spanish_consistency_notes:
  - Se mantiene «hijos» para τέκνοις en lugar de «niños», por el tono relacional del contexto.
  - Se usa «retribución» para ἀντιμισθίαν como término neutral de correspondencia, evitando carga comercial.
  - «También ustedes» refleja la reciprocidad enfatizada por καὶ ὑμεῖς.
  - No se introduce «corazones» para respetar la explicitud del griego.
