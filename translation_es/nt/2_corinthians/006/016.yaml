base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/006/016.yaml
  text: 'And what agreement has the temple of God with idols? For we are the temple of the living God[a], just as God said: “I will dwell among them and walk among them, and I will be their God[b], and they will be my people.”'
  footnotes:
  - marker: a
    text: Or “what accord” or “what common cause.”
    reason: lexical_alternative
  - marker: b
    text: Or “I will dwell in them.” The Greek preposition can be rendered “in” or “among”; here the communal covenant context favors “among them.”
    reason: alternative_reading
