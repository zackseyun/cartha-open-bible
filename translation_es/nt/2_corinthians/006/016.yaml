translation:
  language: es
  text: '¿Y qué acuerdo tiene el templo de Dios con los ídolos? Porque nosotros somos el templo del Dios vivo[a], así como dijo Dios: «Habitaré entre ellos y caminaré entre ellos, y seré su Dios[b], y ellos serán mi pueblo».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “qué concordia” o “qué causa común”.
    reason: lexical_alternative
  - marker: b
    text: O “Habitaré en ellos”. La preposición griega puede traducirse “en” o “entre”; aquí el contexto de pacto comunitario favorece “entre ellos”.
    reason: alternative_reading
lexical_decisions:
- source_word: συγκατάθεσις
  english_pob_choice: agreement
  chosen_spanish: acuerdo
  alternatives_spanish:
  - concordia
  - consentimiento
  lexicon: BDAG
  rationale: El sustantivo expresa concordancia o compatibilidad; «acuerdo» comunica bien la pregunta retórica y evita una formulación demasiado abstracta. «Concordia» suena más literario y «consentimiento» desplaza el sentido hacia una aceptación voluntaria menos natural en este contexto.
- source_word: ναῷ / ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός designa el templo/santuario cultual. «Templo» es la equivalencia natural en español y conserva la fuerza metafórica y religiosa del texto.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: Aquí el texto griego usa θεοῦ sin el nombre divino explícito, y la expresión fija «templo de Dios» es la forma más directa y transparente en español. No se sustituye por «Yahvé» porque el enunciado no cita el nombre, aunque la cita posterior sí se presenta como palabra de Dios.
- source_word: εἰδώλων
  english_pob_choice: idols
  chosen_spanish: ídolos
  alternatives_spanish:
  - imágenes
  lexicon: BDAG
  rationale: El contexto es polémico-religioso y contrasta al Dios vivo con las divinidades paganas. «Ídolos» preserva esa carga; «imágenes» sería demasiado neutral.
- source_word: ζῶντος
  english_pob_choice: living
  chosen_spanish: vivo
  alternatives_spanish:
  - viviente
  lexicon: BDAG
  rationale: La expresión fija en español bíblico es «Dios vivo». «Vivo» es natural, claro y reproduce la oposición con los ídolos sin vida.
- source_word: Ἐνοικήσω ἐν αὐτοῖς
  english_pob_choice: I will dwell among them
  chosen_spanish: Habitaré entre ellos
  alternatives_spanish:
  - Habitaré en ellos
  lexicon: BDAG
  rationale: El audit trail inglés favorece el sentido comunal de la preposición. En español, «entre ellos» mantiene la presencia divina en medio del pueblo y evita reducir el sentido a una interioridad individual.
- source_word: ἐμπεριπατήσω
  english_pob_choice: walk among them
  chosen_spanish: caminaré entre ellos
  alternatives_spanish:
  - andaré en medio de ellos
  lexicon: BDAG
  rationale: El verbo sugiere una imagen antropomórfica de presencia y convivencia. «Caminaré entre ellos» es idiomático en español y preserva el paralelismo con «habitaré entre ellos».
- source_word: ἔσομαι αὐτῶν θεός
  english_pob_choice: I will be their God
  chosen_spanish: seré su Dios
  alternatives_spanish:
  - seré Dios para ellos
  lexicon: BDAG
  rationale: Es la fórmula de pacto estándar. «Seré su Dios» es la forma más reconocible y fiel en español, manteniendo la relación de pertenencia del pacto.
- source_word: λαός
  english_pob_choice: people
  chosen_spanish: pueblo
  alternatives_spanish:
  - gente
  - pueblo mío
  lexicon: BDAG
  rationale: En la fórmula de pacto, λαός denota al pueblo colectivo de Dios. «Pueblo» conserva mejor el eco bíblico que «gente».
theological_decisions:
- issue: Identidad corporativa del templo
  english_pob_reading: we are the temple of the living God
  chosen_spanish_reading: nosotros somos el templo del Dios vivo
  alternative_spanish_readings:
  - nosotros somos un templo del Dios vivo
  rationale: El predicado anartro en griego funciona aquí con sentido definido/cualitativo; Pablo afirma la identidad comunitaria de la iglesia como templo de Dios. «El templo» expresa mejor esa identificación que una lectura indefinida.
  doctrine_reference: Translation philosophy §1, §5
- issue: Lugar del habitar divino en la cita
  english_pob_reading: I will dwell among them
  chosen_spanish_reading: Habitaré entre ellos
  alternative_spanish_readings:
  - Habitaré en ellos
  rationale: La cita bíblica tiene un marcado sentido corporativo de presencia pactal. «Entre ellos» conserva el matiz colectivo que el audit trail inglés privilegia y evita imponer una lectura exclusivamente interior.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'El cotejo con la traducción inglesa POB y la revisión de auditoría muestran acuerdo alto y no requieren cambios sustanciales. Mantengo la equivalencia óptima del texto aprobado, con español natural y las mismas decisiones clave: «acuerdo» para συγκατάθεσις, «templo» para ναός, «ídolos» para εἴδωλων, y la fórmula pactal con sentido comunitario en «entre ellos».'
  spanish_consistency_notes:
  - Se preserva «Dios vivo» como fórmula bíblica estable y natural en español.
  - Se evita «SEÑOR» porque el texto griego cita θεός y no κύριος; no hace falta enmascarar el nombre divino aquí.
  - «Entre ellos» se usa de forma consistente para conservar el sentido corporativo del pasaje.
  - La puntuación y las comillas siguen las convenciones tipográficas del español.
  - No se introduce «Cristo» ni otra terminología no presente en el verso.
