translation:
  language: es
  text: por honor[a] y deshonor, por difamación y elogio[b]; tenidos por engañadores y, sin embargo, verdaderos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'gloria y deshonor'. La palabra griega también puede significar 'gloria', pero aquí probablemente lleva el sentido social de honor público.
    reason: lexical_alternative
  - marker: b
    text: O 'mal informe y buen informe'.
    reason: lexical_alternative
  - marker: c
    text: Literalmente, 'como engañadores y verdaderos'. La expresión contrasta cómo Pablo y sus colaboradores son considerados con lo que realmente son.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ
  english_pob_choice: through
  chosen_spanish: por
  alternatives_spanish:
  - a través de
  - mediante
  - en medio de
  lexicon: BDAG
  rationale: Con genitivos que expresan circunstancias, διά señala la esfera o condición en que transcurre el ministerio. En español, 'por' conserva la estructura repetida y suena natural en una serie paralela de circunstancias.
- source_word: δόξης
  english_pob_choice: honor
  chosen_spanish: honor
  alternatives_spanish:
  - gloria
  - reputación
  lexicon: BDAG
  rationale: Aquí δόξα se contrapone a ἀτιμία en sentido social y público. 'Honor' mantiene mejor el par antitético con 'deshonor' que 'gloria', que en español podría sonar más teológico de lo que el contexto inmediato exige.
- source_word: ἀτιμίας
  english_pob_choice: dishonor
  chosen_spanish: deshonor
  alternatives_spanish:
  - deshonra
  - vergüenza
  lexicon: BDAG
  rationale: Se eligió 'deshonor' para balancear con 'honor' y preservar la oposición pública/social del griego. 'Deshonra' también es posible, pero 'deshonor' mantiene la simetría léxica del par.
- source_word: δυσφημίας
  english_pob_choice: slander
  chosen_spanish: mala fama
  alternatives_spanish:
  - calumnia
  - difamación
  - mal informe
  lexicon: BDAG
  rationale: El término apunta a habla hostil o mala reputación. Se optó por 'mala fama' porque en español capta tanto la difusión negativa como el resultado reputacional, y evita reducir el sentido solo a una acusación verbal jurídica.
- source_word: εὐφημίας
  english_pob_choice: praise
  chosen_spanish: buena fama
  alternatives_spanish:
  - alabanza
  - buen informe
  - elogio
  lexicon: BDAG
  rationale: Como contraparte de δυσφημία, esta palabra alude a habla favorable o buena reputación. 'Buena fama' conserva mejor la simetría con 'mala fama' que 'alabanza', y refleja la dimensión reputacional del contraste.
- source_word: ὡς
  english_pob_choice: regarded as
  chosen_spanish: considerados como
  alternatives_spanish:
  - como
  - tratados como
  - tenidos por
  lexicon: BDAG
  rationale: La forma introduce percepción ajena, no una identidad afirmada por el hablante. 'Considerados como' explicita esa perspectiva sin borrar la tensión entre la acusación y la realidad.
- source_word: πλάνοι
  english_pob_choice: deceivers
  chosen_spanish: engañadores
  alternatives_spanish:
  - impostores
  - seductores
  - mentirosos
  lexicon: BDAG
  rationale: En contexto se trata de una acusación de extraviar o engañar a otros. 'Engañadores' conserva ese valor y es suficientemente literal para mantener la fuerza polémica del pasaje.
- source_word: ἀληθεῖς
  english_pob_choice: 'true'
  chosen_spanish: verdaderos
  alternatives_spanish:
  - veraces
  - auténticos
  - genuinos
  lexicon: BDAG
  rationale: El adjetivo contrasta directamente con πλάνοι. 'Verdaderos' es la opción más natural en español y preserva el contraste breve e incisivo del griego.
theological_decisions:
- issue: Contraste entre percepción pública y realidad apostólica en el último par
  english_pob_reading: Rendered ὡς as 'regarded as' to show that 'deceivers' is an accusation, while 'yet true' states the reality.
  chosen_spanish_reading: '''considerados como engañadores y, sin embargo, verdaderos'' muestra que ''engañadores'' es una percepción ajena, mientras que ''verdaderos'' afirma la realidad.'
  alternative_spanish_readings:
  - '''como engañadores y verdaderos'''
  - '''tenidos por engañadores, pero verdaderos'''
  rationale: No se trata de resolver la tensión retórica sino de preservarla. La redacción explicita el contraste entre el juicio de otros y la condición real de Pablo y sus colaboradores.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior evitando notas al pie no ancladas. La redacción mantiene el paralelismo del griego y la tensión retórica del final sin introducir marcadores de nota.
  spanish_consistency_notes:
  - Se mantuvo 'honor/deshonor' para el par social de δόξα/ἀτιμία, coherente con el contexto y con la decisión auditada en inglés.
  - Se prefirió 'mala fama/buena fama' para δυσφημία/εὐφημία por ser un par idiomático y simétrico en español, sin perder el componente reputacional.
  - Se usó 'considerados como' para reflejar ὡς como percepción externa, preservando la lectura teológica del texto.
  - No se empleó 'Cristo', 'SEÑOR' ni otras terminologías no presentes en el versículo; la traducción permanece ceñida al griego fuente.
