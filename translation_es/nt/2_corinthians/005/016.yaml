translation:
  language: es
  text: Así que, desde ahora, no consideramos a nadie según la carne[a]. Aunque hemos conocido al Mesías[b] según la carne, ahora ya no lo conocemos así.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «desde una perspectiva humana» o «con criterios mundanos» para «según la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Χριστόν». Tradicionalmente: «Cristo». Aquí se traduce «Mesías» para preservar el sentido del título.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De manera que
  lexicon: BDAG
  rationale: Marca una conclusión inferida del argumento previo. «Así que» conserva la relación lógica y suena natural en español moderno.
- source_word: ἀπὸ τοῦ νῦν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - a partir de ahora
  - desde este momento en adelante
  lexicon: BDAG
  rationale: Expresa el cambio decisivo de perspectiva desde el presente hacia adelante con naturalidad idiomática.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - a ninguna persona
  - nadie
  lexicon: BDAG
  rationale: Con «conocer» transitivo en español, el objeto humano se expresa mejor con «a nadie». Mantiene el valor universal del indefinido.
- source_word: οἴδαμεν
  english_pob_choice: we regard
  chosen_spanish: conocemos
  alternatives_spanish:
  - consideramos
  - vemos
  lexicon: BDAG
  rationale: En este contexto, el verbo no es simple conocimiento abstracto sino evaluación/reconocimiento de las personas. El español «conocer» puede abarcar esa relación personal y permite conservar la repetición del verbo en la segunda cláusula, donde Pablo contrasta dos modos de conocer.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - desde una perspectiva humana
  - con criterios humanos
  - según estándares mundanos
  lexicon: BDAG
  rationale: Se mantiene «carne» para conservar la carga teológica de σάρξ. «Según la carne» suena fiel y reconocible en español bíblico sin ocultar el término original.
- source_word: εἰ καὶ
  english_pob_choice: Even if
  chosen_spanish: Y aun si
  alternatives_spanish:
  - Aunque
  - Incluso si
  lexicon: BDAG
  rationale: La concesiva queda bien reflejada y el enlace con la oración anterior fluye con naturalidad.
- source_word: ἐγνώκαμεν
  english_pob_choice: we have known
  chosen_spanish: hemos conocido
  alternatives_spanish:
  - conocimos
  - llegamos a conocer
  lexicon: BDAG
  rationale: El perfecto griego señala una experiencia pasada con relevancia presente; «hemos conocido» conserva mejor ese valor que un pretérito simple.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Se traduce el título como «Mesías» para preservar su sentido léxico, siguiendo la preferencia documentada del proyecto para Χριστός cuando funciona como título.
- source_word: ἀλλὰ νῦν οὐκέτι
  english_pob_choice: yet now we no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - pero ahora ya no
  - sin embargo, ahora no
  lexicon: BDAG
  rationale: La fuerza contrastiva de ἀλλὰ νῦν οὐκέτι queda incluida de forma compacta y natural en español dentro de la segunda cláusula.
- source_word: γινώσκομεν
  english_pob_choice: know him that way
  chosen_spanish: lo conocemos así
  alternatives_spanish:
  - lo reconocemos así
  - lo conocemos de esa manera
  lexicon: BDAG
  rationale: El adverbio «así» recoge el contraste con «según la carne» y evita añadir un pronombre explicativo que el español ya puede inferir. Mantiene la diferencia entre el modo antiguo y el actual de conocer.
theological_decisions:
- issue: Sentido de κατὰ σάρκα respecto de personas y del Mesías
  english_pob_reading: Rendered 'according to the flesh' in the main text, understood as according to merely human, earthly categories rather than as a denial of Christ's true humanity.
  chosen_spanish_reading: «según la carne» en el texto principal, entendido como evaluación desde categorías meramente humanas y terrenales, no como negación de la verdadera humanidad del Mesías.
  alternative_spanish_readings:
  - desde una perspectiva humana
  - con criterios mundanos
  rationale: Se conserva el término «carne» para no borrar la tensión teológica de Pablo. La redacción permite leer la frase como un modo de evaluar, no como una afirmación cristológica contra la encarnación.
  doctrine_reference: 'Niceno-constantinopolitano; Definición de Calcedonia; Contested terms: σάρξ'
- issue: Renderización de Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: al Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La preferencia del proyecto es traducir Χριστός como «Mesías» cuando funciona como título. Esto preserva su contenido semántico y evita una forma meramente tradicionalizada.
  doctrine_reference: 'Translation philosophy §2; Contested terms: Χριστός'
translation_notes:
  revision_awareness: La redacción sigue la última revisión del expediente en cuanto a volver a «Mesías» para Χριστόν, pero adapta el español para conservar la tensión entre el modo antiguo y el nuevo de conocer. También toma en cuenta la oscilación auditada entre «we regard» y «we know», optando por una solución española que preserve ambos matices en el contexto.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ, conforme al principio del proyecto, sin reemplazarlo por «naturaleza humana».
  - Se usa «Mesías» para Χριστός como título, siguiendo la política doctrinal indicada.
  - La cláusula final conserva el contraste del griego entre el conocimiento pasado y el presente mediante «ya no lo conocemos así».
  - El sujeto implícito de la segunda cláusula se expresa con «lo» para claridad natural en español sin añadir información nueva.
