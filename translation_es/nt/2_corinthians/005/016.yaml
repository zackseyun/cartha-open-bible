  text: Ὥστε ἡμεῖς ἀπὸ τοῦ νῦν οὐδένα οἴδαμεν κατὰ σάρκα· ⸀εἰ καὶ ἐγνώκαμεν κατὰ σάρκα Χριστόν, ἀλλὰ νῦν οὐκέτι γινώσκομεν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/016.yaml
  text: So from now on we regard no one according to the flesh[a]. Even if we have known Messiah according to the flesh[b], yet now we no longer know him that way.
  footnotes:
  - marker: a
    text: Or 'from a human point of view' or 'by worldly standards' for 'according to the flesh.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'Christon'; traditionally 'Christ.' Here rendered 'the Messiah' to preserve the title's meaning.
    reason: lexical_alternative
