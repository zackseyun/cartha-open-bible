revisions:
- from: Así que, desde ahora, no conocemos a nadie según la carne[a]. Y aun si hemos conocido al Mesías[b] según la carne, ya no lo conocemos así.
  to: Así que, desde ahora, no consideramos a nadie según la carne[a]. Aunque hemos conocido al Mesías[b] según la carne, ahora ya no lo conocemos así.
  rationale: Se cambia «no conocemos a nadie» por «no consideramos a nadie» para reflejar mejor el sentido contextual de οἴδαμεν κατὰ σάρκα como evaluación según criterios humanos. Se alisa la concesiva con «Aunque» y se mantiene «Mesías» y «según la carne» conforme a las decisiones léxicas y teológicas documentadas. La segunda cláusula conserva «lo conocemos así» para expresar el cambio en el modo de conocer sin borrar el contraste paulino.
