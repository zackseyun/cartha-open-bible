translation:
  language: es
  text: Él hizo que el que no conoció pecado fuera pecado[a] por nosotros, para que en él llegáramos a ser la justicia de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘ofrenda por el pecado’. El griego dice ‘pecado’ las dos veces; algunos entienden la segunda ocurrencia en sentido sacrificial.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘la justicia proveniente de Dios’ o ‘la justicia de Dios’ entendida como ‘justicia’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γνόντα
  english_pob_choice: did not know
  chosen_spanish: no conoció
  alternatives_spanish:
  - no había conocido
  - no experimentó
  lexicon: BDAG
  rationale: ‘Conocer’ conserva el modismo griego sin expandirlo demasiado. En español, ‘no conoció pecado’ comunica bien la ausencia de participación personal en el pecado y mantiene la concisión paulina.
- source_word: ἁμαρτίαν (first occurrence)
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - sin
  lexicon: BDAG
  rationale: En español, ‘pecado’ es la equivalencia natural de ἁμαρτία y suena más idiomática que ‘sin’. Mantiene el valor abstracto del primer uso.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: ‘Por nosotros’ preserva bien la fuerza benefactiva y representativa de ὑπέρ en un registro natural para el español bíblico.
- source_word: ἁμαρτίαν (second occurrence)
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - ofrenda por el pecado
  - sacrificio por el pecado
  lexicon: BDAG; LSJ
  rationale: Se conserva la repetición del mismo sustantivo en el griego. La alternativa sacrificial queda indicada en nota, pero el texto principal mantiene ‘pecado’ para no resolver la tensión del original.
- source_word: ἐποίησεν
  english_pob_choice: made
  chosen_spanish: hizo
  alternatives_spanish:
  - hizo llegar a ser
  - constituyó
  lexicon: BDAG
  rationale: ‘Hizo’ es una traducción directa y suficientemente amplia de ποιέω aquí. Evita precisar en exceso el modo de la acción divina.
- source_word: γενώμεθα
  english_pob_choice: might become
  chosen_spanish: llegáramos a ser
  alternatives_spanish:
  - llegáramos a ser
  - lleguemos a ser
  - fuéramos hechos
  lexicon: BDAG
  rationale: ‘Llegáramos a ser’ refleja con naturalidad el valor de γίνομαι en la cláusula de propósito y conserva el matiz de proceso/resultante sin volverlo estático.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - justicia
  - rectitud
  lexicon: BDAG
  rationale: Aquí se elige ‘justicia’ porque en español conserva mejor la amplitud semántica de δικαιοσύνη y permite mantener la tensión teológica del sintagma, en línea con la alternativa léxica reconocida en el auditoría inglesa.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - proveniente de Dios
  lexicon: BDAG
  rationale: Se deja la relación del genitivo abierta como en el griego y en la auditoría inglesa, sin decidir entre posesión, origen o cualidad.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en él
  - unidos a él
  lexicon: BDAG
  rationale: ‘En él’ conserva la expresión paulina breve y formal sin añadir una explicación interpretativa como ‘unidos a él’.
theological_decisions:
- issue: Cómo traducir ‘ἁμαρτίαν ἐποίησεν’ sin resolver la tensión sacrificial/cristológica
  english_pob_reading: The verse speaks of God treating the sinless one representatively with respect to sin for our sake, without implying that Christ became sinful.
  chosen_spanish_reading: El texto dice que Dios ‘hizo pecado’ al que no conoció pecado, manteniendo la formulación fuerte del griego sin sugerir que Cristo se volvió moralmente pecador.
  alternative_spanish_readings:
  - lo hizo ofrenda por el pecado
  - lo hizo pecador
  rationale: La redacción principal preserva la dureza y ambigüedad del original. La lectura moralmente pecaminosa se excluye por el contexto inmediato; la lectura sacrificial queda registrada como posibilidad interpretativa, no incorporada al texto principal.
  doctrine_reference: 'Affirmations: Chalcedonian orthodoxy; Translation philosophy §3 preserve theological tension rather than resolve it'
- issue: Alcance de ‘δικαιοσύνη θεοῦ’
  english_pob_reading: The phrase is left as 'the righteousness of God' without specifying whether it means God's own righteousness, righteousness from God, or covenant status before God.
  chosen_spanish_reading: La expresión queda como ‘la justicia de Dios’, sin precisar si alude a la justicia propia de Dios, a la justicia que procede de Dios o al estatus justo delante de Dios.
  alternative_spanish_readings:
  - la justicia proveniente de Dios
  - la justicia de Dios en sentido pactual
  rationale: La frase paulina es densa y debatida; el español conserva la misma apertura semántica que el inglés auditado, evitando una decisión doctrinal prematura en el texto principal.
  doctrine_reference: Translation philosophy §3; Contested terms table for δικαιοσύνη
translation_notes:
  revision_awareness: 'Se revisó el último pase de la auditoría inglesa (sin cambios necesarios) y se mantuvo la misma resolución de tensión teológica: el texto principal conserva la formulación fuerte del griego, con la alternativa sacrificial y la ambigüedad de δικαιοσύνη en notas.'
  spanish_consistency_notes:
  - Se usó ‘pecado’ de manera consistente para ἁμαρτία en el texto principal, con nota para la lectura sacrificial.
  - Se eligió ‘justicia’ para δικαιοσύνη, en coherencia con el español bíblico contemporáneo y con la alternativa léxica documentada.
  - Se mantuvo ‘en él’ para ἐν αὐτῷ, preservando la frase paulina breve y relacional.
  - Se evitó ‘Cristo’ porque el versículo griego no usa Χριστός y la auditoría inglesa tampoco introduce ese término.
