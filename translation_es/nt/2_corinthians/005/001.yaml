translation:
  language: es
  text: Porque sabemos que, si nuestra casa terrenal de tienda[a] es derribada[b], tenemos[c] un edificio de parte de Dios, una casa no hecha por manos humanas[d], eterna en los cielos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra casa terrenal, la tienda»; el griego conserva simultáneamente la imagen de «casa» y de «tienda» para la morada mortal presente.
    reason: lexical_alternative
  - marker: b
    text: O «es destruida» o «es desmantelada»; el verbo puede sugerir el desmontaje de una estructura, acorde con la imagen de tienda.
    reason: lexical_alternative
  - marker: c
    text: El griego dice «tenemos», no «tendremos», preservando la tensión entre posesión presente y realización futura.
    reason: alternative_reading
  - marker: d
    text: O «una casa no hecha por manos». La expresión conserva resonancia bíblica para lo que procede de Dios y no del ser humano.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - estamos seguros
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento establecido; en español, «sabemos» reproduce de forma natural esa certeza sin añadir interpretación.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: La partícula introduce la razón de lo afirmado antes. «Porque» conserva la relación explicativa de manera clara y natural en español.
- source_word: ἡ ἐπίγειος ἡμῶν οἰκία τοῦ σκήνους
  english_pob_choice: our earthly tent-house
  chosen_spanish: nuestra casa terrenal, la tienda
  alternatives_spanish:
  - nuestra casa terrenal de la tienda
  - nuestra tienda terrenal
  - nuestra casa terrenal, esta tienda
  lexicon: BDAG
  rationale: El griego une οἰκία («casa») con τοῦ σκήνους («de la tienda») para mantener una imagen mixta. «Casa terrenal, la tienda» conserva ambos elementos sin reducirlos a «cuerpo» ni borrar la tensión metafórica.
- source_word: καταλυθῇ
  english_pob_choice: is torn down
  chosen_spanish: es derribada
  alternatives_spanish:
  - es destruida
  - es desarmada
  - es desmantelada
  lexicon: BDAG
  rationale: καταλύω puede sugerir derribar, desmontar o destruir; con la imagen de tienda/casa, «es derribada» mantiene mejor el sentido de desarme o demolición de una estructura.
- source_word: οἰκοδομὴν ἐκ θεοῦ
  english_pob_choice: a building from God
  chosen_spanish: un edificio de parte de Dios
  alternatives_spanish:
  - un edificio de Dios
  - una construcción de parte de Dios
  - un edificio procedente de Dios
  lexicon: BDAG
  rationale: οἰκοδομή se toma concretamente como una construcción. «De parte de Dios» expresa ἐκ θεοῦ sin convertirlo en posesión rígida ni perder el origen divino.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - tenemos ya
  lexicon: BDAG
  rationale: Se conserva el presente indicativo. «Tenemos» mantiene la tensión entre posesión presente y realización futura sin resolverla en futuro.
- source_word: οἰκίαν ἀχειροποίητον
  english_pob_choice: a house not made with hands
  chosen_spanish: una casa no hecha por manos
  alternatives_spanish:
  - una casa no hecha por manos humanas
  - una casa no fabricada por manos
  lexicon: BDAG
  rationale: ἀχειροποίητος conserva el contraste bíblico entre lo divino y lo humano. «No hecha por manos» preserva la resonancia textual y evita una paráfrasis excesiva.
- source_word: αἰώνιον
  english_pob_choice: eternal
  chosen_spanish: eterna
  alternatives_spanish:
  - perpetua
  - para siempre
  lexicon: BDAG
  rationale: «Eterna» es la equivalencia española más directa para αἰώνιος en este contraste entre lo transitorio y lo perdurable.
- source_word: ἐν τοῖς οὐρανοῖς
  english_pob_choice: in the heavens
  chosen_spanish: en los cielos
  alternatives_spanish:
  - en el cielo
  - en los cielos
  lexicon: BDAG
  rationale: Se conserva el plural griego con «en los cielos», en vez de reducirlo al singular idiomático «en el cielo».
theological_decisions:
- issue: Imagen del cuerpo/dwelling referent
  english_pob_reading: Retain the architectural/tent imagery rather than interpretively substituting 'body' in the main text.
  chosen_spanish_reading: Mantener la imagen de casa/tienda en el texto principal, en vez de sustituirla por «cuerpo».
  alternative_spanish_readings:
  - si nuestro cuerpo terrenal es destruido...
  - si la tienda que es nuestra casa terrenal es derribada...
  rationale: Pablo superpone deliberadamente las imágenes de casa, tienda y edificio. Traducir directamente «cuerpo» resolvería la metáfora demasiado pronto y perdería la textura del texto griego.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Tensión temporal de ἔχομεν
  english_pob_reading: Use present 'we have' rather than future 'we will have.'
  chosen_spanish_reading: Usar el presente «tenemos» y no el futuro «tendremos».
  alternative_spanish_readings:
  - tendremos
  - vamos a tener
  rationale: El verbo griego está en presente. La traducción conserva la tensión entre posesión presente y cumplimiento futuro en lugar de resolverla unilateralmente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión sin cambios sustantivos: el sentido general y las decisiones principales del inglés POB se mantienen, especialmente la imagen mixta de casa/tienda, el presente de ἔχομεν y el plural de «los cielos».'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque este versículo no contiene κύριος ni una cita explícita del nombre divino.
  - Se prefirió «Mesías»/«Cristo» no aplica aquí; no hay τίτλος Χριστός en el texto.
  - Se mantuvo el paralelismo de imágenes sin sustituirlo por una explicación doctrinal en la línea principal.
  - Se respetó el plural «los cielos» para corresponder al griego τοῖς οὐρανοῖς.
