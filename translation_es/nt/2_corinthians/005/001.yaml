  text: Οἴδαμεν γὰρ ὅτι ἐὰν ἡ ἐπίγειος ἡμῶν οἰκία τοῦ σκήνους καταλυθῇ, οἰκοδομὴν ἐκ θεοῦ ἔχομεν οἰκίαν ἀχειροποίητον αἰώνιον ἐν τοῖς οὐρανοῖς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/001.yaml
  text: For we know that if our earthly tent-house is torn down[a], we have a building from God, a house not made with hands[d][c][b], eternal in the heavens.
  footnotes:
  - marker: a
    text: Or 'our earthly house of the tent'; the Greek preserves both 'house' and 'tent' imagery for the present mortal dwelling.
    reason: lexical_alternative
  - marker: b
    text: Or 'is destroyed' or 'is dismantled'; the verb can suggest the taking down of a structure, fitting the tent image.
    reason: lexical_alternative
  - marker: c
    text: The Greek says 'we have,' not 'we will have,' preserving a tension between present possession and future realization.
    reason: alternative_reading
  - marker: d
    text: Or 'a house not made by human hands.' This expression carries biblical resonance for what is of divine, not human, origin.
    reason: lexical_alternative
