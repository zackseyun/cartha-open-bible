    text: 'Or, ''he is a new creation.'' The Greek is elliptical: literally, ''if anyone is in the Messiah—new creation.'''
    reason: alternative_reading
  - marker: b
    text: Many English translations read, 'all things have become new.' The SBLGNT text here reads simply 'new things have come,' without an explicit word for 'all things.'
    reason: textual_variant
