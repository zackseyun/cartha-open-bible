translation:
  language: es
  text: Así que, si alguien está en el Mesías, hay una nueva creación[a]; las cosas antiguas han pasado; ¡he aquí![b], han llegado cosas nuevas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «él es una nueva creación». El griego es elíptico: literalmente, «si alguien está en el Mesías, nueva creación».'
    reason: alternative_reading
  - marker: b
    text: 'Muchas traducciones leen: «todas las cosas han llegado a ser nuevas». El texto SBLGNT aquí dice simplemente «han llegado cosas nuevas», sin una palabra explícita para «todas las cosas».'
    reason: textual_variant
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca la conclusión inferida del argumento anterior. «Así que» conserva la relación lógica y suena natural en español actual.
- source_word: εἴ τις
  english_pob_choice: if anyone
  chosen_spanish: si alguien
  alternatives_spanish:
  - si alguno
  - si cualquier persona
  lexicon: BDAG
  rationale: La condicional indefinida tiene alcance general. «Si alguien» transmite bien el valor abierto y representativo sin forzar género masculino.
- source_word: ἐν Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título. En español, el POB privilegia «Mesías» cuando el contexto mantiene el sentido titular y cristológico-judeo mesiánico.
- source_word: καινὴ κτίσις
  english_pob_choice: there is a new creation
  chosen_spanish: hay una nueva creación
  alternatives_spanish:
  - él es una nueva creación
  - nueva creación
  lexicon: BDAG
  rationale: El griego es elíptico y no expresa verbo. «Hay una nueva creación» preserva la concisión sin reducir indebidamente la frase a la persona individual ni añadir más de lo que el texto dice.
- source_word: τὰ ἀρχαῖα
  english_pob_choice: the old things
  chosen_spanish: las cosas antiguas
  alternatives_spanish:
  - las cosas viejas
  - lo antiguo
  lexicon: BDAG
  rationale: El plural neutro sustantivado pide un plural en español. «Las cosas antiguas» mantiene la amplitud del referente y la contraposición con lo nuevo.
- source_word: παρῆλθεν
  english_pob_choice: have passed away
  chosen_spanish: han pasado
  alternatives_spanish:
  - han pasado de largo
  - han desaparecido
  lexicon: BDAG
  rationale: El aoristo se entiende en español con valor resultativo. «Han pasado» es idiomático y conserva la idea de que lo anterior quedó atrás.
- source_word: ἰδοὺ
  english_pob_choice: behold
  chosen_spanish: miren
  alternatives_spanish:
  - miren aquí
  - vean
  lexicon: BDAG
  rationale: Partícula deíctica que llama la atención sobre el resultado. «Miren» mantiene la fuerza exhortativa en un español moderno y claro.
- source_word: γέγονεν καινά
  english_pob_choice: new things have come
  chosen_spanish: han llegado cosas nuevas
  alternatives_spanish:
  - se han hecho nuevas las cosas
  - las cosas nuevas han venido
  lexicon: BDAG
  rationale: El perfecto expresa un estado resultante; el neutro plural pide pluralidad. «Han llegado cosas nuevas» refleja el plural del texto y evita introducir «todas las cosas», que no está explícito en el griego SBLGNT.
theological_decisions:
- issue: Cómo resolver la elipsis de καινὴ κτίσις
  english_pob_reading: there is a new creation
  chosen_spanish_reading: hay una nueva creación
  alternative_spanish_readings:
  - él es una nueva creación
  rationale: Se preserva la tensión textual sin convertir la frase de manera cerrada en un predicado estrictamente individual. La formulación principal deja abierta la densidad corporativa y escatológica del enunciado.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Traducción de Χριστός como título
  english_pob_reading: in the Messiah
  chosen_spanish_reading: en el Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: Se mantiene el valor titular de Χριστός. En este contexto paulino, traducirlo como «Mesías» evita vaciar el trasfondo judío del término.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: Se tomó como base el paquete de fuente griega SBLGNT y el rastro auditado en inglés. Se preservó la lectura de Χριστός como título («Mesías») conforme a la política del proyecto. Se evitó la expansión tradicional «todas las cosas han sido hechas nuevas» porque no aparece explícitamente en el texto SBLGNT proporcionado. Las notas se anclaron solo en el texto con marcadores presentes.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en armonía con el proyecto y con el sentido titular del griego.
  - Se evita «SEÑOR» porque el verso no contiene κύριος ni un sustituto del nombre divino.
  - Se mantiene el plural de los neutros griegos con «cosas» para conservar la forma textual.
  - «Miren» reproduce la fuerza de ἰδοὺ sin arcaísmo innecesario.
