translation:
  language: es
  text: Por tanto, siempre tenemos confianza y sabemos que, mientras estamos en casa en el cuerpo, estamos ausentes del Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "lejos del Señor". El verbo griego ἐκδημοῦμεν es el contrapunto de "estar en casa" y puede traducirse como "estar ausentes" o "estar lejos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θαρροῦντες
  english_pob_choice: we are always confident
  chosen_spanish: siempre tenemos confianza
  alternatives_spanish:
  - siempre confiamos
  - siempre somos valientes
  lexicon: BDAG
  rationale: El participio presente expresa una disposición continua; en español, una construcción verbal natural con 'tener confianza' comunica mejor ese estado sostenido que un participio literal.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica respecto del argumento previo; 'Por tanto' preserva el valor inferencial con tono adecuado para registro bíblico contemporáneo.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - todo el tiempo
  - en todo momento
  lexicon: BDAG
  rationale: Equivale de forma directa al adverbio de continuidad y funciona naturalmente en español.
- source_word: εἰδότες
  english_pob_choice: know
  chosen_spanish: sabemos
  alternatives_spanish:
  - tenemos conocimiento
  - estamos seguros
  lexicon: BDAG
  rationale: El participio perfecto con fuerza presente expresa conocimiento asentado; 'sabemos' mantiene la certeza sin sobreexplicar el matiz cognitivo.
- source_word: ἐνδημοῦντες
  english_pob_choice: while we are at home
  chosen_spanish: mientras habitamos
  alternatives_spanish:
  - mientras estamos en casa
  - mientras vivimos como residentes
  lexicon: BDAG
  rationale: Aunque el griego usa la imagen de estar 'en casa', en español 'habitar' preserva la idea de residencia/vida presente y evita una expresión doméstica que podría sonar demasiado estrecha para el contraste paulino.
- source_word: ἐν τῷ σώματι
  english_pob_choice: in the body
  chosen_spanish: en el cuerpo
  alternatives_spanish:
  - en este cuerpo
  - corporalmente
  lexicon: BDAG
  rationale: La frase locativa se traduce de manera directa; 'cuerpo' mantiene el contraste antropológico de Pablo sin añadir determinaciones no exigidas por el texto.
- source_word: ἐκδημοῦμεν
  english_pob_choice: we are away
  chosen_spanish: estamos ausentes
  alternatives_spanish:
  - estamos lejos
  - estamos fuera
  lexicon: BDAG
  rationale: Se conserva el paralelismo con 'habitamos' mediante una oposición semántica clara. 'Ausentes' expresa la contrapartida de ἐνδημοῦντες y evita perder la tensión espacial/metafórica.
- source_word: ἀπὸ τοῦ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de parte del Señor
  - lejos del Señor
  lexicon: BDAG
  rationale: κύριος se vierte como 'Señor' por la equivalencia estándar en el NT; el genitivo con ἀπό indica separación, que queda implícita en 'ausentes del Señor' sin añadir una formulación más explicativa que el griego no exige.
theological_decisions:
- issue: Contraste metafórico entre estar en el cuerpo y estar con/ausente del Señor
  english_pob_reading: Paul contrasts present embodied life with being away from the Lord, preserving the tension without importing the next verse or overstating separation.
  chosen_spanish_reading: El versículo contrapone la vida presente en el cuerpo con estar ausentes del Señor, sin resolver la tensión ni adelantar la afirmación de la presencia plena del siguiente versículo.
  alternative_spanish_readings:
  - mientras estamos en el cuerpo, estamos lejos del Señor
  - mientras vivimos en el cuerpo, no estamos con el Señor
  rationale: 'La traducción mantiene el paralelismo y la reserva teológica del texto: habla de ausencia en sentido relacional/consumado, no de una separación ontológica absoluta de Cristo.'
  doctrine_reference: Preservar la tensión teológica; κύριος → Señor
- issue: Valor inferencial de οὖν
  english_pob_reading: Therefore
  chosen_spanish_reading: Por tanto
  alternative_spanish_readings:
  - Así pues
  - Entonces
  rationale: La inferencia enlaza con el razonamiento previo de Pablo sobre la esperanza y el ánimo; conviene señalar que no inicia una idea aislada sino una conclusión.
  doctrine_reference: Coherencia argumentativa paulina
translation_notes:
  revision_awareness: El texto español sigue de cerca el audit trail inglés, pero ajusta la imagen verbal para que suene natural en español sin perder el contraste ἐνδημοῦντες/ἐκδημοῦμεν. Se evita importar la formulación de 2 Corintios 5:8 (“ausentes del cuerpo... presentes al Señor”) y se mantiene el alcance del versículo 6 tal como aparece en el griego y en la revisión inglesa sin cambios.
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος conforme al NT y al audit trail inglés.
  - Se evita 'Cristo' porque el texto fuente usa κύριος y la tradición del proyecto pide no sustituir sin razón textual.
  - '''cuerpo'' se mantiene literal para σῶμα, preservando el contraste antropológico.'
  - La nota [a] recoge la alternativa léxica documentada sin duplicar el sentido en el cuerpo principal.
