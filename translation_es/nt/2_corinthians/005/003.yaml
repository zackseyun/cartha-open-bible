    issue: «cuando hayamos sido vestidos» suena antinatural y excesivamente pasivo
    rationale: El participio medio ἐνδυσάμενοι admite en español una formulación más idiomática como «cuando nos hayamos vestido», que mantiene la metáfora de ponerse la vestidura y evita una construcción pesada.
  - severity: low
    issue: La nota alternativa no refleja de la mejor manera la alternativa léxica documentada
    rationale: La alternativa inglesa preserva «having put it on / unclothed». En español conviene una nota como «si en verdad, habiéndonos vestido, no seremos hallados sin vestir», que distingue mejor la opción alternativa.
