translation:
  language: es
  text: si en verdad[a], cuando nos hayamos vestido, no seremos hallados desnudos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «si en verdad, habiéndonos vestido, no seremos hallados sin vestir».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ γε
  english_pob_choice: if indeed
  chosen_spanish: si en verdad
  alternatives_spanish:
  - si realmente
  - si ciertamente
  lexicon: BDAG
  rationale: La combinación introduce una condición con matiz enfático o confirmatorio. «Si en verdad» conserva la condicionalidad de εἰ y el refuerzo de γε sin explicar más de lo que el griego dice.
- source_word: καὶ ἐνδυσάμενοι
  english_pob_choice: when we have been clothed
  chosen_spanish: cuando hayamos sido vestidos
  alternatives_spanish:
  - habiendo sido vestidos
  - después de haber sido vestidos
  lexicon: BDAG
  rationale: El participio aoristo medio de ἐνδύω comunica la acción de ponerse o ser vestidos antes de la acción principal futura. En español, «cuando hayamos sido vestidos» mantiene el valor anterior del participio y conserva la imagen de vestirse sin volverla demasiado interpretativa.
- source_word: οὐ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es que
  - nunca
  lexicon: BDAG
  rationale: Negación simple del verbo futuro pasivo; «no» es la forma natural y fiel en español.
- source_word: γυμνοὶ
  english_pob_choice: naked
  chosen_spanish: desnudos
  alternatives_spanish:
  - sin vestir
  - desnudos de ropa
  lexicon: BDAG
  rationale: γυμνός significa literalmente «desnudo». Como Pablo continúa la metáfora de vestirse, «desnudos» preserva la imagen directa. Se evita «sin vestir» por ser más explicativo que el griego.
- source_word: εὑρεθησόμεθα
  english_pob_choice: we will be found
  chosen_spanish: seremos hallados
  alternatives_spanish:
  - seremos encontrados
  - se nos encontrará
  lexicon: BDAG
  rationale: El futuro pasivo de εὑρίσκω se rinde de manera natural con «ser hallados». Mantiene la pasividad y la posibilidad idiomática de «ser hallados» como «resultar ser».
theological_decisions:
- issue: Alcance de la metáfora de desnudez/vestidura
  english_pob_reading: Retain the metaphor without resolving whether 'naked' refers specifically to a disembodied intermediate state, eschatological shame, or lack of resurrection embodiment.
  chosen_spanish_reading: Mantener la metáfora sin resolver si «desnudos» alude a un estado intermedio sin cuerpo, a la falta de la vestidura celestial, o a la vergüenza/exposición ante Dios.
  alternative_spanish_readings:
  - «desnudos» como existencia desencarnada entre la muerte y la resurrección
  - «desnudos» como falta del cuerpo/vestidura celestial
  - «desnudos» como metáfora de vergüenza delante de Dios
  rationale: El texto griego no define por sí mismo el referente teológico completo de la imagen. La traducción conserva la tensión de la metáfora paulina y no introduce una explicación doctrinal en el cuerpo del versículo.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió «when we have been clothed» frente a «after being clothed» para reflejar de modo más natural y formal el participio. Por eso el español adopta «cuando hayamos sido vestidos», manteniendo la anterioridad respecto del futuro pasivo y la fuerza condicional de εἴ γε.
  spanish_consistency_notes:
  - Se mantuvo «desnudos» para conservar la metáfora corporal directa y no sustituirla por una explicación.
  - «Seremos hallados» reproduce el pasivo futuro del griego con buena naturalidad en español.
  - El marcador [a] queda anclado en «desnudos» para señalar la alternativa lexical «sin vestir», como en el audit trail inglés con «unclothed».
