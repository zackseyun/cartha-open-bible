translation:
  language: es
  text: Y murió por todos[a], para que los que viven ya no vivan para sí mismos, sino para el que murió y fue resucitado[b] por ellos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en favor de todos» / «a favor de todos» para ambos usos de ὑπέρ, destacando el beneficio o la representación.
    reason: lexical_alternative
  - marker: b
    text: El griego usa voz pasiva en «fue resucitado»; algunas versiones traducen «resucitó».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ πάντων
  english_pob_choice: for all
  chosen_spanish: por todos
  alternatives_spanish:
  - en favor de todos
  - en nombre de todos
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa beneficio o representación. «Por todos» es natural en español y conserva la amplitud del enunciado sin fijar una conclusión doctrinal sobre el alcance de la expiación.
- source_word: ἀπέθανεν
  english_pob_choice: he died
  chosen_spanish: murió
  alternatives_spanish:
  - él murió
  - falleció
  lexicon: BDAG
  rationale: El aoristo indica un hecho pasado simple. En español, el sujeto ya queda claro por el contexto, así que «murió» suena más natural y fiel que repetir pronombre explícito.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce finalidad; «para que» expresa bien el valor telicor es moderno y claro en español.
- source_word: οἱ ζῶντες
  english_pob_choice: those who live
  chosen_spanish: los que viven
  alternatives_spanish:
  - los que están vivos
  - los vivientes
  lexicon: BDAG
  rationale: El participio sustantivado se vierte naturalmente como «los que viven». Mantiene la referencia a personas en estado de vida, con el matiz existencial del contexto.
- source_word: μηκέτι
  english_pob_choice: no longer
  chosen_spanish: ya no
  alternatives_spanish:
  - no más
  - de ningún modo ya
  lexicon: BDAG
  rationale: Marca cese de una pauta previa. «Ya no» es la forma natural y precisa en español.
- source_word: ἑαυτοῖς ζῶσιν
  english_pob_choice: live for themselves
  chosen_spanish: vivan para sí mismos
  alternatives_spanish:
  - vivan para ellos mismos
  - vivan para sí
  lexicon: BDAG
  rationale: El dativo reflexivo con ζάω expresa orientación o beneficio. «Vivan para sí mismos» conserva el contraste ético de una vida centrada en uno mismo.
- source_word: ἀλλὰ τῷ ... ἀποθανόντι καὶ ἐγερθέντι
  english_pob_choice: but for the one who died and was raised
  chosen_spanish: sino para el que murió y fue resucitado
  alternatives_spanish:
  - sino para aquel que murió y fue resucitado
  - sino para el que murió y resucitó
  lexicon: BDAG
  rationale: La construcción retoma el contraste de orientación vital. «El que» reproduce el valor sustantivado del participio y «fue resucitado» conserva el pasivo griego, atribuyendo implícitamente la acción a Dios sin añadirlo al texto.
- source_word: ἐγερθέντι
  english_pob_choice: was raised
  chosen_spanish: fue resucitado
  alternatives_spanish:
  - fue levantado
  - resucitó
  lexicon: BDAG
  rationale: El pasivo aoristo se refleja mejor con «fue resucitado», que preserva la voz y la iniciativa divina en la resurrección. «Resucitó» es posible, pero atenúa ese pasivo.
- source_word: ὑπὲρ αὐτῶν
  english_pob_choice: for them
  chosen_spanish: por ellos
  alternatives_spanish:
  - en favor de ellos
  - a su favor
  lexicon: BDAG
  rationale: Repite el mismo ὑπέρ con sentido de beneficio/representación. «Por ellos» mantiene la repetición de la preposición a lo largo del versículo y su fuerza relacional.
theological_decisions:
- issue: Alcance de πάντων / αὐτῶν
  english_pob_reading: Rendered straightforwardly as 'all' and 'them' without narrowing the referent.
  chosen_spanish_reading: Traducido de forma directa como «todos» y «ellos», sin restringir el referente.
  alternative_spanish_readings:
  - todos los seres humanos en sentido universal explícito
  - todos los creyentes
  rationale: El versículo presenta un alcance amplio y no resuelve por sí mismo debates posteriores sobre el alcance de la expiación. La traducción conserva la amplitud textual sin importar una conclusión confesional.
  doctrine_reference: Affirmations; Translation philosophy §3 Preserve theological tension rather than resolve it.
- issue: Voz pasiva de ἐγερθέντι
  english_pob_reading: '''was raised'''
  chosen_spanish_reading: «fue resucitado»
  alternative_spanish_readings:
  - «resucitó»
  - «fue levantado»
  rationale: El pasivo refleja mejor la forma griega y preserva el énfasis bíblico en la acción de Dios en la resurrección. No niega que «resucitó» sea una paráfrasis viable, pero evita perder la voz pasiva.
  doctrine_reference: Translation philosophy §1 Original-language primacy over translation tradition.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requirieron cambios y la concordancia general del auditor fue alta.'
  spanish_consistency_notes:
  - Se mantuvo «por» para ambas ocurrencias de ὑπέρ para conservar la repetición del original.
  - Se prefirió «ya no» para μηκέτι por claridad idiomática.
  - «Fue resucitado» conserva la pasiva griega y evita convertir el participio en una forma activa.
