  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: muerte de Cristo por todos, propósito expresado con ἵνα, contraste entre vivir para sí mismos y vivir para aquel que murió y fue resucitado por ellos. También preserva correctamente la voz pasiva de ἐγερθέντι en el texto principal. Sin embargo, la nota a introduce una alternativa española menos adecuada: «en nombre de todos» no corresponde bien al valor normal de ὑπέρ aquí, donde el matiz es beneficio/representación más que habla vicaria ''en nombre de''.'
  spanish_quality_summary: El texto es claro, natural y eclesialmente legible. Hay un pequeño desajuste entre la decisión léxica que dice que no hace falta pronombre explícito y el texto principal que sí incluye «Y él murió». En español fluye mejor «Y murió por todos…». La redacción general es buena; la revisión necesaria es menor.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. La opción «fue resucitado» está bien alineada con la decisión auditada de conservar el pasivo. La nota alternativa para ὑπέρ debe ajustarse para evitar «en nombre de», que desplaza el campo semántico documentado.
  issues:
  - severity: medium
    issue: La nota [a] usa «en nombre de todos» como alternativa para ὑπέρ.
    rationale: Según la auditoría inglesa, la alternativa es 'on behalf of', con énfasis en beneficio o representación. En español, «en nombre de» suele sugerir hablar o actuar como portavoz/autorizado, y puede desviar el sentido de ὑπέρ en este contexto.
  - severity: low
    issue: El texto principal incluye «él» aunque la propia decisión léxica reconoce que no hace falta.
    rationale: No es infiel, pero «Y murió por todos…» suena más natural y mantiene mejor la concisión del griego y del español bíblico moderno.
  - severity: low
    issue: La nota [b] está anclada en «sí mismos» en vez de en «fue resucitado».
    rationale: El contenido de la nota trata la voz pasiva de ἐγερθέντι; conviene anclarla en la frase correspondiente para mayor claridad editorial.
  revised_spanish_text: Y murió por todos[a], para que los que viven ya no vivan para sí mismos, sino para el que murió y fue resucitado[b] por ellos.
  revised_footnotes:
  - marker: a
    text: O «en favor de todos» / «a favor de todos» para ambos usos de ὑπέρ, destacando el beneficio o la representación.
    reason: lexical_alternative
  - marker: b
    text: El griego usa voz pasiva en «fue resucitado»; algunas versiones traducen «resucitó».
    reason: lexical_alternative
