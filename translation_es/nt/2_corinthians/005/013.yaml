translation:
  language: es
  text: Porque si estamos fuera de sí[a], es para Dios; si estamos en nuestro sano juicio[b], es para ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fuera de juicio».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sobrios de mente» / «en nuestro sano juicio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε ... εἴτε
  english_pob_choice: if ... if
  chosen_spanish: si ... si
  alternatives_spanish:
  - sea ... sea
  - ya sea ... ya sea
  - si ... o si
  lexicon: BDAG
  rationale: En español, la repetición de «si ... si» reproduce de manera natural la estructura contrastiva y abreviada del griego, manteniendo el vaivén retórico sin sobrecargar la frase con una construcción más explicativa.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Y es que
  lexicon: BDAG
  rationale: La conexión causal o explicativa de γάρ se expresa con «Porque», que suena claro y fluido en español contemporáneo y conserva la relación con el enunciado anterior.
- source_word: ἐξέστημεν
  english_pob_choice: are out of our minds
  chosen_spanish: estamos fuera de juicio
  alternatives_spanish:
  - estamos locos
  - estamos fuera de nosotros
  - hemos perdido el juicio
  lexicon: BDAG
  rationale: La expresión intenta reflejar el sentido de estar fuera de sí, con una formulación que suena natural en español y no fuerza un diagnóstico clínico; «fuera de juicio» mantiene la tensión entre percepción externa e ironía retórica.
- source_word: θεῷ
  english_pob_choice: for God
  chosen_spanish: es para Dios
  alternatives_spanish:
  - es por Dios
  - es para el bien de Dios
  - es con referencia a Dios
  lexicon: BDAG
  rationale: El dativo elíptico expresa referencia o beneficio. «Es para Dios» conserva la brevedad y la dirección del acto hacia Dios sin añadir una explicación que el texto no desarrolla.
- source_word: σωφρονοῦμεν
  english_pob_choice: are of sound mind
  chosen_spanish: estamos en nuestro sano juicio
  alternatives_spanish:
  - somos sensatos
  - estamos sobrios de mente
  - pensamos con sensatez
  lexicon: BDAG
  rationale: La forma griega contrasta con ἐξέστημεν y apunta a juicio sensato o mente sobria. «En nuestro sano juicio» es una equivalencia idiomática clara, digna y reconocible para el lector español.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: es para ustedes
  alternatives_spanish:
  - es para ustedes el bien
  - es con miras a ustedes
  - es en su favor
  lexicon: BDAG
  rationale: El dativo también es elíptico y señala referencia o beneficio. «Es para ustedes» preserva la concisión del griego y la idea de servicio en favor de los corintios.
theological_decisions:
- issue: Naturaleza del contraste entre «fuera de juicio» y «sano juicio»
  english_pob_reading: Paul contrasts behavior perceived as ecstatic or irrational with behavior recognized as sober, without endorsing literal madness.
  chosen_spanish_reading: Pablo contrasta una conducta que puede parecer fuera de juicio con una conducta de juicio sobrio, sin afirmar una locura literal.
  alternative_spanish_readings:
  - Pablo describe éxtasis religioso literal
  - Pablo solo repite la acusación de otros de forma irónica
  rationale: El griego es compacto y retórico; la traducción debe conservar esa ambigüedad controlada. «Fuera de juicio» permite leer tanto la percepción ajena como la auto-descripción sin resolver la tensión en una sola dirección.
  doctrine_reference: Preservar la tensión teológica y retórica del texto sin simplificarla.
translation_notes:
  revision_awareness: Se siguió el audit trail en inglés y no se introdujeron aclaraciones doctrinales ajenas al texto. La versión española conserva la estructura breve del griego, la relación causal de γάρ y la doble datividad elíptica.
  spanish_consistency_notes:
  - Se prefirió «Dios» por θεῷ, siguiendo el valor contextual del dativo sin añadir perífrasis innecesarias.
  - Se mantuvo «ustedes» como forma neutral latinoamericana para ὑμῖν.
  - No se usó «Cristo» ni terminología litúrgica adicional, porque el verso no la requiere.
  - La nota de «fuera de sí» se dejó como alternativa idiomática posible, sin desplazar la elección principal.
