base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/004.yaml
  text: For indeed[a], while we are in this tent, we groan, being burdened, because we do not want to be unclothed but to be further clothed[b], so that what is mortal may be swallowed up by life.
  footnotes:
