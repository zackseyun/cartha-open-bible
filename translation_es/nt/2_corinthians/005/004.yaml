revisions:
- from: Porque en efecto[a], mientras estamos en este tabernáculo, gemimos, agobiados, ya que no queremos ser desnudados, sino ser revestidos[b], para que lo mortal sea absorbido por la vida.
  to: Porque en efecto, mientras estamos en este tabernáculo, gemimos, agobiados, ya que no queremos ser desnudados, sino ser revestidos[a], para que lo mortal[b] sea tragado por la vida.
  rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras que explican en el texto fuente y en el audit trail inglés. Además, se reemplaza 'sea absorbido' por 'sea tragado' para preservar mejor la viveza de καταποθῇ / 'may be swallowed up'. Se mantienen las demás decisiones por ser razonables y legibles en español eclesial neutro.
