translation:
  language: es
  text: Porque en efecto, mientras estamos en este tabernáculo, gemimos, agobiados, ya que no queremos ser desnudados, sino ser revestidos[a], para que lo mortal[b] sea tragado por la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ser revestidos por encima'. El verbo griego sugiere ponerse una prenda exterior sobre lo que ya se lleva puesto.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que es mortal' o 'la mortalidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: σκήνει
  english_pob_choice: tent
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - carpa
  - morada
  lexicon: BDAG
  rationale: El POB inglés conserva la imagen de 'tent'; en español, 'tabernáculo' comunica mejor la metáfora corporal y su tono bíblico sin perder la idea de una morada temporal. 'Tienda' puede sonar ambiguo; 'carpa' es demasiado coloquial.
- source_word: στενάζομεν
  english_pob_choice: we groan
  chosen_spanish: gemimos
  alternatives_spanish:
  - suspiramos
  - nos lamentamos
  lexicon: BDAG
  rationale: '''Gemir'' conserva el peso de anhelo y aflicción escatológica que el inglés expresa con ''groan''. ''Suspirar'' resulta más débil y ''lamentarnos'' introduce una explicación más interpretativa.'
- source_word: βαρούμενοι
  english_pob_choice: being burdened
  chosen_spanish: agobiados
  alternatives_spanish:
  - cargados
  - oprimidos
  - pesados
  lexicon: BDAG
  rationale: '''Agobiados'' expresa bien el estado pasivo de estar cargados por una presión, con naturalidad en español. Mantiene el sentido de peso sin volverlo demasiado literal o abstracto.'
- source_word: ἐφ’ ᾧ
  english_pob_choice: because
  chosen_spanish: ya que
  alternatives_spanish:
  - porque
  - puesto que
  - por lo cual
  lexicon: BDAG
  rationale: La frase introduce la razón del gemido; 'ya que' suena natural y causal en español. 'Porque' también sería posible, pero 'ya que' enlaza con mayor fluidez la primera proposición.
- source_word: ἐκδύσασθαι
  english_pob_choice: to be unclothed
  chosen_spanish: ser desnudados
  alternatives_spanish:
  - quedar sin vestir
  - ser desvestidos
  lexicon: BDAG
  rationale: '''Ser desnudados'' mantiene la metáfora del despojo corporal con fuerza verbal. Aunque ''desnudos'' sería posible como estado, el infinitivo pasivo pide una forma verbal que preserve la acción rechazada.'
- source_word: ἐπενδύσασθαι
  english_pob_choice: to be further clothed
  chosen_spanish: ser revestidos
  alternatives_spanish:
  - ser cubiertos por encima
  - vestirnos encima
  - ser vestidos de nuevo
  lexicon: BDAG
  rationale: El prefijo sugiere ponerse una prenda sobre otra; 'ser revestidos' es la forma más idiomática y solemne para conservar esa idea en español. 'Ser vestidos de nuevo' podría sonar a mera repetición, no a prenda adicional.
- source_word: καταποθῇ
  english_pob_choice: may be swallowed up
  chosen_spanish: sea absorbido
  alternatives_spanish:
  - sea tragado
  - sea devorado
  - sea consumido
  lexicon: BDAG
  rationale: '''Absorbido'' comunica en español la idea de ser completamente vencido o incorporado por algo superior, sin hacer la imagen excesivamente cruda. El POB inglés preserva la metáfora con ''swallowed up''; en español, ''absorbido'' funciona de modo equivalente y más natural.'
- source_word: τὸ θνητὸν
  english_pob_choice: what is mortal
  chosen_spanish: lo mortal
  alternatives_spanish:
  - lo que es mortal
  - la mortalidad
  - el ser mortal
  lexicon: BDAG
  rationale: El adjetivo sustantivado neutro se expresa con naturalidad como 'lo mortal'. Es breve y conserva la amplitud de referencia a la condición mortal, no sólo a un aspecto abstracto.
- source_word: ζωῆς
  english_pob_choice: life
  chosen_spanish: vida
  alternatives_spanish:
  - la vida
  lexicon: BDAG
  rationale: '''Vida'' es el equivalente natural del genitivo sin artículo en este contraste con ''lo mortal''. Conserva la fuerza del término sin necesidad de precisar ''la vida''.'
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque en efecto
  alternatives_spanish:
  - Pues en verdad
  - Porque ciertamente
  - Y en efecto
  lexicon: BDAG
  rationale: La combinación tiene valor explicativo y enfático. 'Porque en efecto' refleja ambos matices en español y enlaza bien con el argumento previo.
theological_decisions:
- issue: Metáfora del cuerpo como vestido y la tensión sobre el estado intermedio
  english_pob_reading: Retain the metaphor of being 'unclothed' and 'further clothed' without specifying a doctrinal scheme about the intermediate state.
  chosen_spanish_reading: Conservar la imagen de estar 'desnudos' y 'revestidos' sin definir si Pablo describe de modo explícito una existencia desencarnada o una secuencia doctrinal detallada.
  alternative_spanish_readings:
  - Interpretar 'desnudados' como una referencia explícita a existir sin cuerpo
  - Interpretar 'revestidos' como una afirmación cerrada sobre el cuerpo resucitado
  rationale: El griego mantiene la metáfora del vestido y la transforma en contraste entre despojo y revestimiento. El español debe preservar esa tensión sin resolverla con glosas doctrinales que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario; esta propuesta mantiene el trazado auditado del inglés POB y ajusta la expresión al español natural sin alterar la metáfora ni la tensión teológica.
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Dios según las normas del proyecto, aunque este versículo no contiene esos términos.
  - '''Tabernáculo'' se usa aquí como equivalente contextual de la metáfora corporal, no como término técnico litúrgico.'
  - '''Revestidos'' conserva el campo semántico de vestirse/ponerse sobre otra prenda, alineado con la nota de alternativa.'
  - '''Lo mortal'' respeta el neutro sustantivado del griego y evita restringirlo a una sola interpretación antropológica.'
