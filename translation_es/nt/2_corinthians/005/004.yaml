review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: conserva la imagen de la tienda/tabernáculo, el gemido, la carga, el contraste entre ser desnudados y ser revestidos, y el propósito de que lo mortal sea vencido por la vida. Sin embargo, hay dos fallas importantes en la implementación editorial: las notas al pie están ancladas en lugares equivocados, y ''sea absorbido'' debilita la viveza de καταποθῇ frente al valor documentado ''sea tragado/devorado/consumido; swallowed up''.'
  spanish_quality_summary: El español es legible y digno, pero puede mejorarse. 'Tabernáculo' es defendible por tono bíblico, aunque se aleja del valor más concreto de 'tent'; no requiere cambio forzoso aquí. 'Gemimos' y 'agobiados' funcionan bien. 'Porque en efecto' suena algo pesado pero aceptable. Lo principal es corregir la colocación de las notas y fortalecer la metáfora final con una formulación más fiel y natural en español bíblico contemporáneo.
  glossary_alignment: No hay conflicto con los términos doctrinales principales del proyecto. La metáfora de vestidura se preserva sin resolver el estado intermedio. La decisión 'revestidos' encaja bien con ἐπενδύσασθαι. La única desalineación relevante es que el POB inglés documenta explícitamente la fuerza metafórica de 'swallowed up', y 'absorbido' la atenúa innecesariamente.
  issues:
  - severity: high
    issue: Las notas al pie están ancladas en los lugares incorrectos.
    rationale: La nota [a] explica ἐπενδύσασθαι ('ser revestidos por encima'), pero fue colocada tras 'Porque en efecto'. La nota [b] explica τὸ θνητόν ('lo mortal' / 'la mortalidad'), pero fue colocada tras 'revestidos'. Esto rompe la trazabilidad con el original y el audit trail inglés.
  - severity: medium
    issue: '''Sea absorbido'' debilita la metáfora de καταποθῇ.'
    rationale: El griego y el POB inglés conservan una imagen fuerte de ser 'tragado' o 'devorado por completo'. 'Absorbido' comunica superación, pero pierde la fuerza imagística y la cercanía al texto fuente.
  - severity: low
    issue: '''Porque en efecto'' es algo rígido.'
    rationale: Refleja bien καὶ γὰρ, pero en español puede sonar pesado. Aun así, es aceptable y no necesita corrección obligatoria si se quiere mantener cercanía estructural.
  revised_spanish_text: Porque en efecto, mientras estamos en este tabernáculo, gemimos, agobiados, ya que no queremos ser desnudados, sino ser revestidos[a], para que lo mortal[b] sea tragado por la vida.
  revised_footnotes:
  - marker: a
    text: O 'ser revestidos por encima'. El verbo griego sugiere ponerse una prenda exterior sobre lo que ya se lleva puesto.
    reason: lexical_alternative
  - marker: b
    text: O 'lo que es mortal' o 'la mortalidad'.
    reason: lexical_alternative
  revision_rationale: Se corrigen los anclajes de las notas para que correspondan a las palabras que explican en el texto fuente y en el audit trail inglés. Además, se reemplaza 'sea absorbido' por 'sea tragado' para preservar mejor la viveza de καταποθῇ / 'may be swallowed up'. Se mantienen las demás decisiones por ser razonables y legibles en español eclesial neutro.
