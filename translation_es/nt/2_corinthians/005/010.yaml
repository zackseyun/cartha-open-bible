  rationale: 'Se hizo un ajuste menor de estilo para que el español suene más natural y directo sin apartarse del griego ni de la auditoría inglesa: «debemos ser manifestados» expresa mejor el valor de δεῖ + infinitivo que la construcción más pesada «es necesario que ... seamos manifestados». También se simplificó el cierre a «sea bueno o malo», que en español conserva el contraste de ἀγαθὸν / φαῦλον de manera más idiomática.'
