    changes_summary: 'Changed ''the Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ in standard formal register and to match the conventional rendering of the title in this context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque todos nosotros debemos ser manifestados ante el tribunal de Mesías[a], para que cada uno reciba lo que le corresponde por lo que ha hecho en el cuerpo[d][c][b], sea bueno o malo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «comparecer ante el tribunal del Mesías». El verbo griego puede significar tanto simple aparición como quedar públicamente expuestos; el texto principal conserva el sentido más fuerte de manifestación.
    reason: lexical_alternative
  - marker: b
    text: O «las cosas hechas en el cuerpo». La frase griega puede entenderse como obras realizadas a través de la vida encarnada.
    reason: lexical_alternative
  - marker: c
    text: Griego «Cristo»; aquí se ha vertido «Mesías» porque Χριστός funciona como título.
    reason: alternative_reading
  - marker: d
    text: O «reciba lo que le corresponde por las cosas hechas por medio del cuerpo».
    reason: lexical_alternative
lexical_decisions:
- source_word: φανερωθῆναι
  english_pob_choice: be revealed
  chosen_spanish: seamos manifestados
  alternatives_spanish:
  - seamos revelados
  - comparezcamos
  - seamos puestos de manifiesto
  lexicon: BDAG
  rationale: El pasivo infinitivo expresa quedar al descubierto o ser hecho manifiesto, no solo presentarse físicamente. «Seamos manifestados» conserva ese valor forense y moral en un español natural.
- source_word: βήματος
  english_pob_choice: judgment seat
  chosen_spanish: tribunal
  alternatives_spanish:
  - asiento de juicio
  - sede de juicio
  - tribunal de juicio
  lexicon: BDAG
  rationale: En este contexto βῆμα remite a una plataforma judicial de evaluación. «Tribunal» comunica con claridad el marco judicial sin sonar forzado en español.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» porque Χριστός funciona aquí como título; la política del proyecto favorece esa forma cuando el término es titular y no un nombre ya fijado por tradición.
- source_word: κομίσηται
  english_pob_choice: may receive what is due
  chosen_spanish: reciba lo que le corresponde
  alternatives_spanish:
  - reciba
  - obtenga recompensa por
  - se lleve lo debido
  lexicon: BDAG
  rationale: El verbo medio implica recibir de vuelta conforme a las acciones. «Lo que le corresponde» expresa la idea retributiva sin sobreexplicar ni convertirlo en una fórmula ajena al texto.
- source_word: τὰ διὰ τοῦ σώματος
  english_pob_choice: what is due for what he has done in the body
  chosen_spanish: por lo que ha hecho en el cuerpo
  alternatives_spanish:
  - por las cosas hechas en el cuerpo
  - por lo que ha practicado mediante el cuerpo
  - por las obras realizadas en su vida corporal
  lexicon: BDAG
  rationale: La expresión griega es comprimida y puede aludir a la vida encarnada o a lo hecho por medio del cuerpo. «En el cuerpo» conserva la referencia al ámbito corporal sin convertirla en paráfrasis excesiva.
- source_word: πρὸς ἃ ἔπραξεν
  english_pob_choice: for what he has done
  chosen_spanish: por lo que ha hecho
  alternatives_spanish:
  - según lo que hizo
  - conforme a lo que practicó
  lexicon: BDAG
  rationale: πρός expresa correspondencia o conformidad. «Por lo que ha hecho» funciona bien junto con «le corresponde» y preserva la relación entre acciones y retribución.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: BDAG
  rationale: El distributivo singular subraya la responsabilidad individual. «Cada uno» es la forma más clara y natural en español.
- source_word: ἀγαθὸν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - bien
  - recto
  - justo
  lexicon: BDAG
  rationale: Es un término moral amplio en contraste con φαῦλον; «bueno» es la equivalencia directa y más idiomática.
- source_word: φαῦλον
  english_pob_choice: bad
  chosen_spanish: malo
  alternatives_spanish:
  - vil
  - inútil
  - malo o ruin
  lexicon: BDAG
  rationale: φαῦλος puede significar malo, ruin o sin valor. «Malo» conserva el contraste amplio con ἀγαθόν sin cargar el término con un matiz más fuerte de lo que exige el contexto.
theological_decisions:
- issue: Naturaleza del evento evaluativo ante Mesías
  english_pob_reading: The verse presents universal manifestation and individual recompense without specifying whether the judgment concerns believers only, all humanity, rewards only, or final condemnation.
  chosen_spanish_reading: El versículo mantiene la universalidad de la manifestación y la retribución individual, sin precisar si el juicio se refiere solo a creyentes, a toda la humanidad, a recompensas solamente o a condenación final.
  alternative_spanish_readings:
  - tribunal del Mesías enfocado solo en recompensas de los creyentes
  - juicio final de todas las personas ante Mesías
  rationale: El texto afirma con claridad la comparecencia y la retribución, pero no resuelve por sí mismo distinciones sistemáticas posteriores. La traducción conserva esa tensión en vez de cerrarla.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El inglés de trabajo pasó por revisiones que ajustaron la fluidez y después restauraron «Messiah» conforme a la política doctrinal del proyecto. Para el español se siguió esa línea final, manteniendo «Mesías» como traducción titular de Χριστοῦ y reflejando la tensión entre manifestación pública y comparecencia judicial.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστοῦ según la norma del proyecto.
  - «Manifestados» reproduce mejor el valor de φανερωθῆναι que un simple «aparecer».
  - «Tribunal» comunica el βῆμα judicial sin introducir terminología eclesiástica ajena al texto.
  - «En el cuerpo» conserva la referencia a la vida corporal sin cerrar la ambigüedad de διὰ τοῦ σώματος.
