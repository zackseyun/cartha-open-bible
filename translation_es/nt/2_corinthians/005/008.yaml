translation:
  language: es
  text: Así que tenemos confianza y preferimos más bien estar ausentes del cuerpo y estar en casa con el Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «alejarnos del cuerpo y estar en casa con el Señor».
    reason: lexical_alternative
lexical_decisions:
- source_word: θαρροῦμεν
  english_pob_choice: we are confident
  chosen_spanish: tenemos confianza
  alternatives_spanish:
  - estamos confiados
  - tenemos ánimo
  lexicon: BDAG
  rationale: El presente indicativo expresa una confianza/coraje sostenidos. «Tenemos confianza» suena natural en español actual y conserva la idea de una disposición firme sin volverlo demasiado técnico o arcaico.
- source_word: δὲ
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ continúa el argumento previo más que oponerlo. «Así que» comunica bien la inferencia discursiva desde los vv. 6–7.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - también
  lexicon: BDAG
  rationale: Conjunción simple que une los dos verbos principales.
- source_word: εὐδοκοῦμεν
  english_pob_choice: would rather
  chosen_spanish: preferimos más bien
  alternatives_spanish:
  - nos agrada más
  - nos complacemos en
  lexicon: BDAG
  rationale: En este contexto, con μᾶλλον, el sentido es preferencia. «Preferimos más bien» mantiene el matiz volitivo y evita leer solo una emoción de agrado.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - más
  - antes
  lexicon: BDAG
  rationale: Adverbio comparativo que modifica la preferencia expresada por εὐδοκοῦμεν. «Más bien» es el equivalente más natural en español.
- source_word: ἐκδημῆσαι
  english_pob_choice: be away
  chosen_spanish: salir
  alternatives_spanish:
  - estar ausentes
  - partir
  lexicon: BDAG
  rationale: El verbo contrasta con ἐνδημῆσαι en la metáfora hogar/ausencia. En español, «salir» conserva la idea de moverse fuera de una esfera sin explicitar de más la muerte; «estar ausentes» sería más explicativo que verbal.
- source_word: ἐκ τοῦ σώματος
  english_pob_choice: from the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - fuera del cuerpo
  - de nuestro cuerpo
  lexicon: BDAG
  rationale: La construcción preposicional se rinde de forma directa. «Cuerpo» se conserva literalmente para respetar la imagen paulina.
- source_word: ἐνδημῆσαι
  english_pob_choice: be at home
  chosen_spanish: habitar
  alternatives_spanish:
  - estar en casa
  - residir
  lexicon: BDAG
  rationale: Para evitar una expresión demasiado doméstica que en español podría sonar demasiado concreta, «habitar» mantiene la antítesis con «salir» y preserva la idea de estar en la esfera propia de alguien.
- source_word: πρὸς τὸν κύριον
  english_pob_choice: with the Lord
  chosen_spanish: con el Señor
  alternatives_spanish:
  - junto al Señor
  - hacia el Señor
  lexicon: BDAG
  rationale: Aunque πρός puede sugerir dirección, en la construcción con ἐνδημῆσαι expresa relación/presencia personal. «Con el Señor» comunica con claridad esa asociación sin añadir una explicación no presente en el griego.
theological_decisions:
- issue: Si el texto debe explicitar la muerte o el estado intermedio
  english_pob_reading: Retain Paul's metaphor of being away from the body and at home with the Lord without adding explanatory language such as 'after death' or 'in heaven.'
  chosen_spanish_reading: Conservar la metáfora de salir del cuerpo y habitar con el Señor, sin añadir «después de la muerte» ni «en el cielo».
  alternative_spanish_readings:
  - morir y ir al cielo con el Señor
  - separarse del cuerpo para estar con el Señor en el cielo
  rationale: El versículo sugiere una presencia postmortem con el Señor, pero el traductor no debe importar términos ajenos al griego. Mantener la tensión evita resolver indebidamente lo que el texto no formula explícitamente.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla por paráfrasis doctrinal.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado más reciente indica que no hubo cambios necesarios y la concordancia de revisión es alta.
  spanish_consistency_notes:
  - Se conserva «Señor» para κύριος, conforme al tratamiento doctrinal estándar del proyecto.
  - Se mantiene «cuerpo» de manera literal para σώμα, sin suavizar la imagen paulina.
  - La pareja verbal «salir / habitar» intenta reflejar el contraste ἐκδημῆσαι / ἐνδημῆσαι sin fijar una interpretación extra-textual.
