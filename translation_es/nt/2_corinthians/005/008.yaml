revisions:
- from: Así que tenemos confianza y preferimos más bien salir del cuerpo y habitar con el Señor[a].
  to: Así que tenemos confianza y preferimos más bien estar ausentes del cuerpo y estar en casa con el Señor[a].
  rationale: Se ajusta el texto para reflejar con mayor fidelidad el par metafórico ἐκδημῆσαι / ἐνδημῆσαι, manteniendo la tensión teológica del original sin añadir explicaciones doctrinales. La nueva redacción también mejora la naturalidad del español y pone en el texto principal la opción que mejor conserva la imagen de Pablo; la nota preserva una alternativa léxica cercana.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y la línea del POB en cuanto a mantener la metáfora sin añadir ''morir'' ni ''cielo''. Sin embargo, dos elecciones debilitan la correspondencia léxica del par ἐκδημῆσαι / ἐνδημῆσαι: «salir del cuerpo» suena más físico y dinámico que el sentido de estar ausente/lejos, y «habitar con el Señor» pierde la imagen específica de estar en casa / en la esfera propia, además de no reflejar bien el emparejamiento antonímico del original.'
  spanish_quality_summary: El español es claro, pero «preferimos más bien» resulta algo redundante, y «salir del cuerpo y habitar con el Señor» suena menos idiomático y menos fiel a la metáfora paulina que una formulación con «estar ausentes... y estar en casa...». La nota al pie ya conserva precisamente la mejor alternativa para el cuerpo del texto.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Señor» para κύριον es apropiado aquí. La revisión propuesta mejora la alineación con las decisiones léxicas auditadas del inglés: ''be away'' / ''be at home''.'
  issues:
  - severity: medium
    issue: «salir del cuerpo» sobreinterpreta ἐκδημῆσαι
    rationale: El verbo se refiere a estar ausente o lejos del hogar/esfera propia; «salir» introduce una imagen más física de movimiento que no preserva tan bien la metáfora paulina ni el paralelo con ἐνδημῆσαι.
  - severity: medium
    issue: «habitar con el Señor» no preserva la metáfora de estar en casa
    rationale: ἐνδημῆσαι contrasta con ἐκδημῆσαι como 'estar en casa' frente a 'estar ausente'. «Habitar» comunica residencia general, pero borra el juego metafórico y la relación antonímica marcada en el griego.
  - severity: low
    issue: «preferimos más bien» es estilísticamente pesado
    rationale: Aunque no es incorrecto, combina dos elementos de preferencia de manera redundante. «preferimos más bien estar...» o una reestructuración más natural mejora la fluidez sin perder μᾶλλον.
  revised_spanish_text: Así que tenemos confianza y preferimos más bien estar ausentes del cuerpo y estar en casa con el Señor[a].
  revised_footnotes:
  - marker: a
    text: O «alejarnos del cuerpo y estar en casa con el Señor».
    reason: lexical_alternative
  revision_rationale: Se ajusta el texto para reflejar con mayor fidelidad el par metafórico ἐκδημῆσαι / ἐνδημῆσαι, manteniendo la tensión teológica del original sin añadir explicaciones doctrinales. La nueva redacción también mejora la naturalidad del español y pone en el texto principal la opción que mejor conserva la imagen de Pablo; la nota preserva una alternativa léxica cercana.
