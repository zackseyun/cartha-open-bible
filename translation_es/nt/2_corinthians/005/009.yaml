revisions:
- from: Por eso también nos empeñamos[a], ya sea que estemos en casa o ausentes, en agradarle a él.
  to: Por eso también hacemos de ello nuestra meta,[a] ya sea que estemos en casa o ausentes, serle agradables.
  rationale: Se ajusta φιλοτιμούμεθα a una expresión española que conserva la idea de ambición/meta deliberada, y se corrige εὐάρεστοι αὐτῷ εἶναι con «serle agradables», que es más fiel al griego y más natural en español. Se mantiene la concisión contextual de «en casa o ausentes» y la nota explicativa del cuerpo, conforme al audit trail inglés.
