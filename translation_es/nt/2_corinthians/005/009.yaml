translation:
  language: es
  text: Por eso también hacemos de ello nuestra meta,[a] ya sea que estemos en casa o ausentes, serle agradables.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente por el contexto: «ya sea que estemos en casa en el cuerpo o ausentes del cuerpo».'
    reason: alternative_reading
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Así que
  - Por tanto
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación inferencial con el contexto anterior; mantiene el valor conclusivo sin sonar rígido.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: Conserva el matiz de continuidad o énfasis de la partícula sin sobrecargar la frase.
- source_word: φιλοτιμούμεθα
  english_pob_choice: we make it our ambition
  chosen_spanish: nos empeñamos
  alternatives_spanish:
  - hacemos de ello nuestra ambición
  - nos esforzamos con empeño
  - lo tomamos como nuestra meta
  lexicon: BDAG
  rationale: El verbo griego comunica una determinación activa y diligente. 'Nos empeñamos' transmite ese compromiso decidido en español actual sin volverse artificial, y evita reducir el sentido a una simple meta mental.
- source_word: εἴτε ἐνδημοῦντες εἴτε ἐκδημοῦντες
  english_pob_choice: whether at home or away
  chosen_spanish: ya sea que estemos en casa o ausentes
  alternatives_spanish:
  - ya sea que estemos en casa o fuera
  - ya sea que estemos presentes o ausentes
  - ya sea en el cuerpo o fuera del cuerpo
  lexicon: BDAG
  rationale: La pareja verbal literal permite 'en casa / ausentes' como equivalente conciso. 'Estemos' da una lectura natural del participio en español y mantiene abierta la referencia contextual al cuerpo sin añadirla al texto principal.
- source_word: εὐάρεστοι
  english_pob_choice: pleasing
  chosen_spanish: en agradarle
  alternatives_spanish:
  - para agradarle
  - agradables para él
  - de modo que le agrademos
  lexicon: BDAG
  rationale: En español, 'ser agradables' o 'agradarle' expresan el valor relacional del adjetivo. La construcción infinitiva 'en agradarle' integra con fluidez el resultado deseado y conserva el sentido de ser aceptables/agradables ante él.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: a él
  alternatives_spanish:
  - al Señor
  - a Dios
  lexicon: BDAG
  rationale: El griego usa un pronombre y el referente se determina por el contexto inmediato. Se mantiene 'a él' en el texto principal para no explicitar más de lo que el verso dice.
- source_word: εἶναι
  english_pob_choice: to be
  chosen_spanish: en
  alternatives_spanish:
  - ser
  - estar
  lexicon: BDAG
  rationale: La idea de infinitivo queda absorbida de manera natural en la construcción española 'empeñarnos en agradarle'; evita una estructura forzada como 'ser agradables' en una frase menos idiomática.
theological_decisions:
- issue: Si conviene explicitar el complemento tácito de 'en casa / ausentes' con referencia al cuerpo
  english_pob_reading: Keep the concise expression 'whether at home or away' in the main text, with the bodily sense in a footnote
  chosen_spanish_reading: Mantener 'ya sea que estemos en casa o ausentes' en el texto principal, con una nota que explique la referencia al cuerpo
  alternative_spanish_readings:
  - ya sea que estemos en casa en el cuerpo o ausentes del cuerpo
  - ya sea presentes en el cuerpo o ausentes de él
  rationale: El contexto inmediato de 2 Corintios 5:6-8 habla de estar en el cuerpo y ausentes del Señor, pero el verso griego omite ese complemento. La traducción principal conserva esa concisión; la nota permite recuperar el alcance contextual sin introducirlo como parte del texto.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y el rastro auditado de la POB inglesa. Se preserva la concisión de εἴτε ἐνδημοῦντες εἴτε ἐκδημοῦντες en el texto principal, con la ampliación contextual reservada para la nota, en línea con la revisión inglesa sin cambios.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero aquí αὐτῷ remite contextualmente a Dios/el Señor y el griego usa pronombre; por eso el texto principal conserva 'a él' sin explicitar el referente.
  - Se evita 'Cristo' porque el verso no lo nombra y la referencia pronominal depende del contexto anterior.
  - '''Nos empeñamos'' conserva la fuerza voluntaria de φιλοτιμούμεθα sin convertirla en una mera aspiración abstracta.'
  - La construcción 'en agradarle' ofrece español natural para εὐάρεστοι αὐτῷ εἶναι y mantiene la relación de deleite/aceptación personal.
