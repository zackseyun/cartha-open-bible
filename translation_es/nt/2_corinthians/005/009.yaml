review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura inferencial y la concisión del griego: διὸ καὶ = «Por eso también», y mantiene correctamente la elipsis contextual de εἴτε ἐνδημοῦντες εἴτε ἐκδημοῦντες con una nota. Sin embargo, «nos empeñamos ... en agradarle a él» desplaza φιλοτιμούμεθα desde la idea de aspiración/meta hacia la de insistencia o terquedad, y la secuencia «en agradarle» no representa bien εὐάρεστοι ... εἶναι («ser agradables/aceptables a él»).'
  spanish_quality_summary: 'El texto es mayormente natural, pero «ya sea que estemos en casa o ausentes» queda algo desequilibrado semánticamente, y «en agradarle a él» suena menos idiomático y menos fiel que «serle agradables» o «agradarle». La mejor reparación es usar una formulación más directa y digna: «hacemos de ello nuestra meta ... serle agradables».'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. El pronombre «a él» puede conservarse, pero en español «serle agradables» expresa mejor αὐτῷ sin énfasis innecesario. La nota alternativa contextual sobre «en el cuerpo / fuera del cuerpo» debe mantenerse.
  issues:
  - severity: medium
    issue: «nos empeñamos» para φιλοτιμούμεθα
    rationale: Aunque transmite esfuerzo, en español suele sugerir obstinación o insistencia más que aspiración noble o meta deliberada. El inglés auditado enfatiza «make it our ambition».
  - severity: medium
    issue: «en agradarle a él» para εὐάρεστοι αὐτῷ εἶναι
    rationale: La construcción con «en» no corresponde de forma natural al infinitivo de propósito/complemento aquí, y pierde el matiz adjetival «agradables/aceptables a él». «Serle agradables» preserva mejor la sintaxis y el sentido.
  - severity: low
    issue: Ligero desequilibrio en «en casa o ausentes»
    rationale: No es incorrecto, pero «en casa o fuera» o mantener la estructura alrededor de «serle agradables» mejora la fluidez general. Aun así, puede conservarse por cercanía contextual al audit trail.
  revised_spanish_text: Por eso también hacemos de ello nuestra meta,[a] ya sea que estemos en casa o ausentes, serle agradables.
  revised_footnotes:
  - marker: a
    text: 'O, más explícitamente por el contexto: «ya sea que estemos en casa en el cuerpo o ausentes del cuerpo».'
    reason: alternative_reading
  revision_rationale: Se ajusta φιλοτιμούμεθα a una expresión española que conserva la idea de ambición/meta deliberada, y se corrige εὐάρεστοι αὐτῷ εἶναι con «serle agradables», que es más fiel al griego y más natural en español. Se mantiene la concisión contextual de «en casa o ausentes» y la nota explicativa del cuerpo, conforme al audit trail inglés.
