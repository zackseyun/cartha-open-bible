translation:
  language: es
  text: Porque en esto gemimos, anhelando revestirnos[a] de nuestra morada que es del cielo[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El verbo puede sugerir «ponerse encima», como ponerse una prenda sobre otra.
    reason: lexical_alternative
  - marker: b
    text: 'O: «nuestra morada celestial». El griego dice más literalmente «nuestra morada que es del cielo», destacando el origen.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque en verdad
  alternatives_spanish:
  - Y en verdad
  - Pues en verdad
  lexicon: BDAG
  rationale: La combinación introduce explicación y énfasis; «Porque en verdad» preserva la relación causal/explanatoria y la fuerza discursiva con un español natural.
- source_word: ἐν τούτῳ
  english_pob_choice: in this
  chosen_spanish: en esto
  alternatives_spanish:
  - en esto mismo
  - en esta situación
  - en este cuerpo
  lexicon: BDAG
  rationale: Se conserva la ambigüedad del demostrativo sin añadir explícitamente «cuerpo» o «tienda», que el griego no repite aquí.
- source_word: στενάζομεν
  english_pob_choice: we groan
  chosen_spanish: gemimos
  alternatives_spanish:
  - gimimos
  - nos lamentamos
  - suspiramos
  lexicon: BDAG
  rationale: «Gemimos» reproduce el peso interno del verbo con un valor más idiomático en español que un calco rígido, sin suavizar el sentido de aflicción.
- source_word: τὸ οἰκητήριον ἡμῶν τὸ ἐξ οὐρανοῦ
  english_pob_choice: our dwelling from heaven
  chosen_spanish: nuestra morada que es del cielo
  alternatives_spanish:
  - nuestra morada desde el cielo
  - nuestra morada celestial
  - nuestro domicilio del cielo
  lexicon: BDAG
  rationale: «Morada» comunica el sustantivo concreto; «que es del cielo» mantiene la procedencia/origen de ἐξ οὐρανοῦ, evitando convertirlo solo en un adjetivo de cualidad.
- source_word: ἐπενδύσασθαι
  english_pob_choice: to put on
  chosen_spanish: revestirnos de
  alternatives_spanish:
  - ponernos sobre
  - vestirnos con
  - revestirnos
  lexicon: BDAG
  rationale: El verbo sugiere ponerse una prenda encima; «revestirnos de» es la opción española más natural que conserva la imagen de vestirse sin forzar una paráfrasis doctrinal.
- source_word: ἐπιποθοῦντες
  english_pob_choice: longing
  chosen_spanish: anhelando
  alternatives_spanish:
  - deseando ardientemente
  - suspirando por
  - con anhelo
  lexicon: BDAG
  rationale: «Anhelando» expresa deseo intenso y continuo, equivalente a la fuerza participial de espera/apetencia del griego.
theological_decisions:
- issue: Imagen de vestidura y morada celestial
  english_pob_reading: Retain the clothing/dwelling imagery without resolving whether Paul refers specifically to the resurrection body, the intermediate state, or the eschatological heavenly habitation in a narrower sense.
  chosen_spanish_reading: Conservar la imagen de vestidura y morada sin resolver si Pablo habla de manera específica del cuerpo resucitado, del estado intermedio o de una habitación celestial escatológica en sentido más estrecho.
  alternative_spanish_readings:
  - Explicitar «cuerpo resucitado del cielo»
  - Explicitar «hogar celestial»
  rationale: El versículo mantiene metáforas superpuestas («morada» y «revestirse») y no obliga por sí solo a cerrar la tensión doctrinal. La redacción española deja abierta esa ambigüedad responsablemente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo de revisión fue alto y no se requirieron ajustes posteriores.
  spanish_consistency_notes:
  - Se mantiene «morada» para οἰκητήριον, en consonancia con el valor concreto de lugar de habitación.
  - Se conserva «del cielo» para ἐξ οὐρανοῦ para no convertir prematuramente el participio en un simple adjetivo de cualidad.
  - «Anhelando» y «revestirnos de» preservan el dinamismo verbal sin perder la imagen corporal/vestidura.
  - La puntuación reproduce una sola unidad oracional continua, como en el griego.
