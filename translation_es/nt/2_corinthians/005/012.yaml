  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: niega una nueva auto-recomendación, expresa que Pablo les da base para responder favorablemente sobre él y conserva el contraste entre apariencia externa y corazón. Sin embargo, hay pequeños puntos mejorables de naturalidad y precisión idiomática: «nos estamos recomendando» suena menos natural que «nos recomendamos»; y «tengan qué responder a» es comprensible, pero «tengan con qué responder a» refleja mejor el valor de ἔχητε πρὸς como disponer de algo para responder.'
  spanish_quality_summary: El español es claro y mayormente digno, pero puede pulirse para sonar más natural y bíblico sin volverse arcaico. «Respecto de nosotros» es aceptable, aunque «acerca de nosotros» fluye mejor en este contexto. «En lo externo» comunica bien el contraste con «corazón».
  glossary_alignment: No hay términos del glosario mayor que entren en conflicto. La elección de «gloriarse» mantiene cohesión retórica con καύχημα/καυχάομαι y es defendible en registro bíblico. «Corazón» preserva adecuadamente καρδίᾳ. No se requieren cambios teológicos ni terminológicos de proyecto.
  issues:
  - severity: medium
    issue: Perífrasis verbal innecesaria en «No nos estamos recomendando»
    rationale: El presente griego συνιστάνομεν no exige perífrasis progresiva. En español, «No nos recomendamos otra vez» es más natural, más directo y conserva mejor el tono paulino.
  - severity: medium
    issue: «Tengan qué responder a» suena algo incompleto
    rationale: Aunque se entiende, el giro idiomático más natural en español para ἵνα ἔχητε πρὸς es «tengan con qué responder a», que expresa mejor que se les da una base o recurso para contestar.
  - severity: low
    issue: «Respecto de nosotros» es algo rígido
    rationale: La decisión es semánticamente válida para ὑπὲρ ἡμῶν, pero «acerca de nosotros» suena más natural y conserva el mismo campo de sentido sin cerrar indebidamente la interpretación.
