translation:
  language: es
  text: No nos recomendamos[a] otra vez a ustedes, sino dándoles una oportunidad de gloriarse[b] acerca de nosotros, para que tengan con qué responder a los que se glorían en lo externo[c] y no en el corazón.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos estamos presentando favorablemente».
    reason: lexical_alternative
  - marker: b
    text: O «una ocasión para gloriarse acerca de nosotros».
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «en rostro»; es decir, en lo visible o externo, no en lo interior.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιστάνομεν
  english_pob_choice: are commending
  chosen_spanish: estamos recomendando
  alternatives_spanish:
  - estamos presentando
  - estamos elogiando
  lexicon: BDAG
  rationale: En este contexto paulino, συνίστημι expresa la idea de recomendar o presentar favorablemente a uno mismo. «Estamos recomendando» conserva el matiz relacional y evita intensificarlo indebidamente como autoelogio.
- source_word: ἀφορμὴν
  english_pob_choice: opportunity
  chosen_spanish: una oportunidad
  alternatives_spanish:
  - una ocasión
  - un motivo
  lexicon: BDAG
  rationale: ἀφορμή puede ser base, ocasión u oportunidad. «Una oportunidad» fluye con naturalidad en español y conserva la idea de proporcionar a los corintios un punto de respuesta.
- source_word: καυχήματος
  english_pob_choice: to boast
  chosen_spanish: de gloriarse
  alternatives_spanish:
  - de jactarse
  - para gloriarse
  lexicon: BDAG
  rationale: El sustantivo καύχημα se relaciona con el acto de gloriarse o jactarse. «Gloriarse» mantiene el enlace verbal con el resto de la oración y permite un registro más bíblico sin perder la fuerza retórica.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: about us
  chosen_spanish: respecto de nosotros
  alternatives_spanish:
  - acerca de nosotros
  - en defensa nuestra
  lexicon: BDAG
  rationale: Aquí ὑπέρ funciona de manera cercana al contenido sobre el cual se puede gloriar o hablar. «Respecto de nosotros» preserva esa relación sin imponer de antemano una lectura más estrecha de defensa o representación.
- source_word: ἵνα ἔχητε πρὸς
  english_pob_choice: so that you may have an answer for
  chosen_spanish: para que tengan qué responder a
  alternatives_spanish:
  - para que tengan una respuesta a
  - para que tengan con qué responder a
  lexicon: BDAG
  rationale: El giro ἔχειν πρός τινα comunica tener algo para responder frente a alguien. «Tengan qué responder a» expresa la función apologética en un español natural y cercano al sentido idiomático.
- source_word: ἐν προσώπῳ
  english_pob_choice: in outward appearance
  chosen_spanish: en lo externo
  alternatives_spanish:
  - en apariencia
  - en la cara
  lexicon: BDAG
  rationale: La expresión contrasta lo visible o superficial con lo interior. «En lo externo» evita una traducción demasiado literal como «en el rostro» y comunica el sentido idiomático de manera clara.
- source_word: καυχωμένους
  english_pob_choice: those who boast
  chosen_spanish: los que se glorían
  alternatives_spanish:
  - los que se jactan
  - los que presumen
  lexicon: BDAG
  rationale: καυχάομαι suele significar gloriarse o jactarse. «Se glorían» mantiene la cohesión con «gloriarse» en la primera mitad del versículo y reproduce el contraste retórico.
- source_word: καρδίᾳ
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - vida interior
  lexicon: BDAG
  rationale: «Corazón» es la correspondencia normal de καρδία en español bíblico y conserva la contraposición moral entre lo exterior y lo interior.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - una vez más
  lexicon: BDAG
  rationale: πάλιν marca repetición. «Otra vez» es natural en español y refleja la negación de que Pablo esté repitiendo una auto-recomendación.
theological_decisions:
- issue: Contraste entre ἐν προσώπῳ ... καὶ μὴ ἐν καρδίᾳ
  english_pob_reading: A contrast between external appearance and inward reality
  chosen_spanish_reading: Un contraste entre lo externo y el corazón
  alternative_spanish_readings:
  - un contraste entre la apariencia pública y la sinceridad
  - un contraste entre la presencia visible y la disposición interior
  rationale: El contexto retórico de 2 Corintios contrasta lo que es visible con lo que es real delante de Dios. «Lo externo» / «corazón» conserva esa tensión moral sin resolverla en una formulación doctrinal más estrecha.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y retórica sin eliminarla'
- issue: Valor de ὑπὲρ ἡμῶν
  english_pob_reading: about us
  chosen_spanish_reading: respecto de nosotros
  alternative_spanish_readings:
  - acerca de nosotros
  - en nuestra defensa
  rationale: El verso no obliga a una sola función semántica de ὑπέρ. «Respecto de nosotros» deja abierta la relación entre elogio, defensa y referencia temática, de acuerdo con el contexto inmediato.
  doctrine_reference: auditable lexical restraint; no doctrinal resolution required
translation_notes:
  revision_awareness: Seguí la revisión más reciente del audit trail al tratar ὑπὲρ ἡμῶν de manera más directa como referencia al contenido «respecto de nosotros», sin convertirlo en una defensa explícita. También conservé el contraste retórico entre exterior e interior, que el inglés POB mantuvo con «outward appearance ... heart».
  spanish_consistency_notes:
  - Se usa «Dios» y no aparece aquí ningún término divino a sustituir.
  - Se mantiene «gloriarse» para conservar la relación verbal con καυχήματος/καυχωμένους.
  - Se evita «SEÑOR» porque no hay κύριος en el versículo.
  - La puntuación sigue el español moderno con coma antes de la cláusula final de propósito.
