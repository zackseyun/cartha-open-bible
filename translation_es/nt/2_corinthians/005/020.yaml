translation:
  language: es
  text: 'Así que, en nombre del Mesías[a], somos embajadores, como si Dios estuviera haciendo su llamado por medio de nosotros. Les rogamos en nombre del Mesías: reconcíliense con Dios[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo» a lo largo de este versículo. El título griego es Χριστός; aquí se traduce «Mesías» para conservar su sentido como título.
    reason: alternative_reading
  - marker: b
    text: O «a Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑπὲρ Χριστοῦ
  english_pob_choice: for the Messiah / on behalf of the Messiah
  chosen_spanish: en nombre del Mesías
  alternatives_spanish:
  - por el Mesías
  - a favor del Mesías
  - como representantes del Mesías
  lexicon: BDAG
  rationale: ὑπέρ con genitivo expresa aquí representación y beneficio, no solo causa. En español, «en nombre de» comunica bien la función de representación apostólica y preserva el matiz de hablar/actuar con autoridad derivada. Se mantiene «Mesías» para Χριστοῦ conforme a la pauta del proyecto de traducir el título.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: οὖν introduce una inferencia a partir del argumento previo sobre la reconciliación. «Así que» es natural en español moderno y conserva la conclusión lógica sin sonar excesivamente solemne.
- source_word: πρεσβεύομεν
  english_pob_choice: we are ambassadors
  chosen_spanish: somos embajadores
  alternatives_spanish:
  - actuamos como embajadores
  - servimos como embajadores
  lexicon: BDAG
  rationale: πρεσβεύω denota la función de embajador o enviado. «Somos embajadores» reproduce de manera directa y clara el oficio representativo al que alude el verbo.
- source_word: ὡς
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera
  - cual si
  lexicon: BDAG
  rationale: 'Aquí ὡς introduce la manera en que debe entenderse la acción: no que Dios esté ausente, sino que su apelación pasa por el ministerio apostólico. «Como si» conserva esa comparación sin resolver la tensión del pasaje.'
- source_word: παρακαλοῦντος
  english_pob_choice: were appealing
  chosen_spanish: estuviera suplicando
  alternatives_spanish:
  - estuviera apelando
  - estuviera exhortando
  - estuviera rogando
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar invitar, exhortar, rogar o apelar. En este contexto de reconciliación, «suplicando» expresa la intensidad de la invitación divina con un tono digno y urgente. Se evita «apelando» por sonar más técnico que afectivo en español.
- source_word: δι’ ἡμῶν
  english_pob_choice: through us
  chosen_spanish: por medio de nosotros
  alternatives_spanish:
  - a través de nosotros
  - por nosotros
  lexicon: BDAG
  rationale: διά con genitivo indica agencia o medio. «Por medio de nosotros» es claro en español bíblico contemporáneo y mantiene la idea de mediación sin borrar la agencia divina.
- source_word: δεόμεθα
  english_pob_choice: We beg you
  chosen_spanish: Les rogamos
  alternatives_spanish:
  - Les suplicamos
  - Les imploramos
  - Les pedimos
  lexicon: BDAG
  rationale: δέομαι expresa petición intensa y urgente. «Les rogamos» comunica bien esa súplica en español y evita una dureza innecesaria. Se antepone el objeto implícito de la exhortación con un pronombre de cortesía/plural natural en español.
- source_word: καταλλάγητε
  english_pob_choice: be reconciled
  chosen_spanish: reconcíliense
  alternatives_spanish:
  - sean reconciliados
  - vuélvanse a reconciliar
  - reconcilíense con Dios
  lexicon: BDAG
  rationale: El imperativo aoristo pasivo pide recibir la reconciliación, no producirla autónomamente. «Reconcíliense» conserva la forma exhortativa natural en español y el matiz pasivo implícito mejor que una paráfrasis activa.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: con Dios
  alternatives_spanish:
  - a Dios
  - para con Dios
  lexicon: BDAG
  rationale: El dativo con καταλλάσσω admite «con Dios» o «a Dios». En español, «reconciliarse con Dios» es la forma más idiomática y conserva la relación restaurada sin sobrecargar la dirección del dativo.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
  rationale: Χριστός funciona aquí como título y el proyecto pide traducirlo como «Mesías» para preservar su sentido. Se evita «Cristo» en el texto principal por tratarse de un uso titulado, no de un nombre fijo.
theological_decisions:
- issue: Título Χριστός como Mesías
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La línea del proyecto favorece traducir el título para preservar su valor semántico. En este versículo el contexto es ministerial y representativo, no litúrgico-fijo, por lo que «Mesías» transmite mejor el contenido del título.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: Agencia divina y mediación apostólica
  english_pob_reading: as though God were appealing through us
  chosen_spanish_reading: como si Dios estuviera suplicando por medio de nosotros
  alternative_spanish_readings:
  - como si Dios les hablara por medio de nosotros
  - como si Dios los exhortara por medio de nosotros
  rationale: 'La frase preserva la tensión teológica: Dios es quien apela, pero lo hace mediante los apóstoles. «Como si» evita explicar en exceso la mecánica de esa mediación, y «por medio de nosotros» conserva la instrumentación divina.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Imperativo pasivo de reconciliación
  english_pob_reading: be reconciled to God
  chosen_spanish_reading: reconcíliense con Dios
  alternative_spanish_readings:
  - sean reconciliados con Dios
  - reconcíliense a Dios
  rationale: El griego ordena recibir la reconciliación. En español, el reflexivo «reconcíliense» conserva el carácter exhortativo y evita convertir el mandato en una explicación doctrinal excesiva. «Con Dios» mantiene la relación personal restaurada.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Coincide con el último paso de revisión disponible: no se registran cambios posteriores y el consenso de revisión fue alto. La redacción española se ajusta al auditable POB inglés manteniendo el título traducido, la fuerza representativa de ὑπέρ y la tensión teológica de la mediación divina.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme a la política del proyecto.
  - Se usa «reconcíliense con Dios» para preservar el imperativo pasivo en español idiomático.
  - «Por medio de nosotros» conserva la idea de mediación de διά con genitivo.
  - La puntuación separa claramente la conclusión, la descripción de la mediación y la súplica final, siguiendo la estructura del griego.
