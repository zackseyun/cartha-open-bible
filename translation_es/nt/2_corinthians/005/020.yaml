revisions:
- from: 'Así que, en nombre del Mesías[a], somos embajadores; como si Dios estuviera suplicando por medio de nosotros[b]. Les rogamos en nombre del Mesías: reconcíliense con Dios.'
  to: 'Así que, en nombre del Mesías[a], somos embajadores, como si Dios estuviera haciendo su llamado por medio de nosotros. Les rogamos en nombre del Mesías: reconcíliense con Dios[b].'
  rationale: 'Se mantiene la excelente base del borrador, pero se corrigen dos puntos para ajustarlo al griego y al rastro auditado del POB: (1) παρακαλοῦντος se expresa como «estuviera haciendo su llamado», que comunica apelación urgente sin sobreintensificarlo como «suplicando»; (2) la nota b se traslada a «con Dios» y preserva la alternativa auditada para τῷ θεῷ. También se suaviza la puntuación para un flujo más natural en español.'
  reviewer_model: gpt-5.4
