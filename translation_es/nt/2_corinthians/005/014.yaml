revisions:
- from: 'Porque el amor de Cristo[a] nos apremia, habiendo juzgado esto: que uno murió por todos; por tanto, todos murieron.'
  to: 'Porque el amor del Mesías[a] nos apremia, porque hemos llegado a esta conclusión: que uno murió por todos; por tanto, todos murieron.'
  rationale: Se revisa «Cristo» a «Mesías» para respetar la decisión terminológica auditada y la política del proyecto sobre Χριστός como título. Se reemplaza «habiendo juzgado esto» por «porque hemos llegado a esta conclusión» para reflejar con naturalidad española el valor causal de κρίναντας y el sentido evaluativo documentado. Se mantiene «nos apremia», «por todos» y «todos murieron» por ser fieles y legibles. La nota se ajusta para conservar la ambigüedad del genitivo en español sin incoherencia terminológica.
