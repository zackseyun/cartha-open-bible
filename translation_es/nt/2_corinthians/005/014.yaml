translation:
  language: es
  text: 'Porque el amor del Mesías[a] nos apremia, porque hemos llegado a esta conclusión: que uno murió por todos; por tanto, todos murieron.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el amor del Mesías por nosotros» o «el amor por el Mesías»; el genitivo griego puede entenderse de ambas maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: «Amor» es la equivalencia natural y fiel para ἀγάπη en español moderno. Conserva el paralelismo teológico con el texto fuente sin arcaísmo innecesario.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  lexicon: BDAG
  rationale: Aunque el rastro inglés preserva «Messiah» para Χριστός como título, en español «Cristo» es la forma más natural y establecida en este contexto epistolar. Mantiene el valor titular sin forzar una perífrasis menos idiomática.
- source_word: συνέχει
  english_pob_choice: compels
  chosen_spanish: nos apremia
  alternatives_spanish:
  - nos constriñe
  - nos impulsa
  - nos domina
  lexicon: BDAG
  rationale: «Apremia» transmite la fuerza interior y urgente de συνέχω sin volverlo mecánico. Conserva la presión motivadora que el inglés expresa con «compels».
- source_word: κρίναντας
  english_pob_choice: because we have concluded
  chosen_spanish: habiendo juzgado
  alternatives_spanish:
  - porque hemos concluido
  - habiendo considerado
  - después de juzgar
  lexicon: BDAG
  rationale: El participio aoristo expresa la base razonada de la afirmación. «Habiendo juzgado» conserva el sentido de juicio/valoración de κρίνω y el nexo lógico con la cláusula principal.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Introduce el contenido del juicio previo; «que» es la forma normal y clara en español para esa subordinación.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - una persona
  - un hombre
  lexicon: BDAG
  rationale: El griego dice simplemente «uno». «Uno» conserva la brevedad retórica y no añade especificación interpretativa innecesaria.
- source_word: ὑπὲρ πάντων
  english_pob_choice: on behalf of all
  chosen_spanish: por todos
  alternatives_spanish:
  - en favor de todos
  - en nombre de todos
  - en lugar de todos
  lexicon: BDAG
  rationale: «Por todos» es la forma más natural en español y mantiene la amplitud representativa/substitutiva de ὑπέρ sin cerrar indebidamente el matiz teológico.
- source_word: ἄρα
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - así que
  - por consiguiente
  - entonces
  lexicon: BDAG
  rationale: Marca la inferencia paulina con un conector formal y claro. «Por tanto» corresponde bien al peso lógico de ἄρα.
- source_word: οἱ πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las personas
  - el conjunto
  lexicon: BDAG
  rationale: En este contexto, el artículo con πάντες se vierte naturalmente como «todos» en español, sin añadir explicaciones que el griego no explicita.
- source_word: ἀπέθανον
  english_pob_choice: died
  chosen_spanish: murieron
  alternatives_spanish:
  - han muerto
  lexicon: BDAG
  rationale: 'El aoristo se expresa con pasado simple en español: «murieron». Respeta la conclusión compacta del verso sin introducir un matiz aspectual no requerido.'
theological_decisions:
- issue: Genitivo en ἡ ἀγάπη τοῦ Χριστοῦ
  english_pob_reading: The main text preserves the ambiguity with 'the love of the Messiah.'
  chosen_spanish_reading: El texto principal mantiene la ambigüedad con «el amor de Cristo».
  alternative_spanish_readings:
  - el amor de Cristo por nosotros
  - nuestro amor por Cristo
  - el amor del Mesías
  rationale: El genitivo puede entenderse de más de una manera, y el contexto inmediato no obliga a resolverlo en el texto principal. Se conserva la tensión semántica en una forma natural para el español.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Alcance de «todos murieron»
  english_pob_reading: Rendered literally as 'all died' without interpretive expansion.
  chosen_spanish_reading: Se traduce literalmente «todos murieron», sin expandir la frase en el cuerpo del texto.
  alternative_spanish_readings:
  - todos murieron representativamente en Cristo
  - todos los creyentes murieron con él
  rationale: Pablo formula una conclusión breve y densa; la traducción no debe resolver por adelantado debates doctrinales sobre el modo o el alcance de esa muerte. La literalidad preserva la compresión del argumento.
  doctrine_reference: DOCTRINE.md §Affirmations; §Translation philosophy 3
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisiones inglés: la oscilación entre «Mesías» y «Cristo» confirma que Χριστοῦ funciona aquí como título, pero en español la forma más idiomática y reconocible en el registro bíblico es «Cristo». También se respetó la decisión de no resolver en el texto principal la ambigüedad del genitivo ni la densidad de «todos murieron».'
  spanish_consistency_notes:
  - Se mantuvo un registro bíblico moderno y digno, sin calcos rígidos.
  - «Cristo» se usa como título propio aceptado en español; la nota conserva la alternativa «Mesías» para reflejar la decisión auditada.
  - «Por todos» preserva la amplitud del ὑπέρ sin especificar más de lo que el griego dice.
  - 'La puntuación sigue el flujo retórico del original: motivo, juicio, contenido, inferencia y conclusión.'
