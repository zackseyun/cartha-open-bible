  text: ἡ γὰρ ἀγάπη τοῦ Χριστοῦ συνέχει ἡμᾶς, κρίναντας τοῦτο ⸀ὅτι εἷς ὑπὲρ πάντων ἀπέθανεν· ἄρα οἱ πάντες ἀπέθανον·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/014.yaml
  text: 'For the love of Messiah compels us[a], because we have concluded this: that one died on behalf of all; therefore all died.'
  footnotes:
