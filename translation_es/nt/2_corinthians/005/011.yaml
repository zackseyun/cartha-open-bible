base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/005/011.yaml
  text: Therefore[a], knowing the fear of the Lord, we persuade people; but we have been made known to God[b], and I hope that we also have been made known in your consciences.
  footnotes:
