- from: es decir, que Dios estaba en el Mesías reconciliando al mundo consigo mismo, no tomando en cuenta sus transgresiones[a][b] contra ellos, y poniendo en nosotros[c] la palabra[d] de la reconciliación.
  to: es decir, que Dios estaba en el Mesías reconciliando al mundo consigo mismo, no tomándoles en cuenta sus transgresiones, y poniendo en nosotros[a] el mensaje[b] de la reconciliación.
  rationale: La revisión corrige un error semántico serio en la cláusula de μὴ λογιζόμενος αὐτοῖς τὰ παραπτώματα αὐτῶν, preserva «Mesías» según la política del proyecto, mantiene «en nosotros» para respetar la tensión de ἐν ἡμῖν, y mejora λόγος a «mensaje» en línea con la decisión auditada del POB inglés y con mejor legibilidad en español. Se reducen además notas innecesarias para dejar solo las alternativas lexicales realmente útiles.
