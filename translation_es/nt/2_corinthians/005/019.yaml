translation:
  language: es
  text: es decir, que Dios estaba en el Mesías reconciliando al mundo consigo mismo, no tomándoles en cuenta sus transgresiones, y poniendo en nosotros[a] el mensaje[b] de la reconciliación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «entre nosotros» o «a nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la palabra de la reconciliación».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς ὅτι
  english_pob_choice: namely, that / that is, that
  chosen_spanish: es decir, que
  alternatives_spanish:
  - o sea, que
  - a saber, que
  lexicon: BDAG
  rationale: La fórmula griega es explicativa y aclara el contenido de la afirmación anterior. «Es decir, que» comunica bien esa función en español moderno sin endurecer la sintaxis ni perder el matiz de explicación.
- source_word: θεὸς ἦν ἐν Χριστῷ
  english_pob_choice: God was in Messiah
  chosen_spanish: Dios estaba en el Mesías
  alternatives_spanish:
  - Dios estaba en Cristo
  - Dios estaba por medio del Mesías
  lexicon: BDAG
  rationale: Se mantiene la relación directa de ἐν con «en» y se conserva «Mesías» según la guía del proyecto para Χριστός como título. No se resuelve la tensión teológica hacia una paráfrasis instrumental más interpretativa.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título, no como nombre fijo. En español, «Mesías» preserva mejor el contenido semántico del título y sigue la pauta terminológica del proyecto.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al cosmos
  - a la humanidad
  lexicon: BDAG
  rationale: «Mundo» es la equivalencia natural y suficientemente amplia para el objeto de la reconciliación. El dativo/acusativo con movimiento relacional se expresa de forma idiomática con «al mundo».
- source_word: καταλλάσσων
  english_pob_choice: reconciling
  chosen_spanish: reconciliando
  alternatives_spanish:
  - restableciendo la relación con
  - trayendo a reconciliación
  lexicon: BDAG
  rationale: Se conserva el verbo de la familia léxica de καταλλαγή para mantener consistencia terminológica y la imagen de restauración relacional.
- source_word: ἑαυτῷ
  english_pob_choice: to himself
  chosen_spanish: consigo mismo
  alternatives_spanish:
  - a sí mismo
  - para sí
  lexicon: BDAG
  rationale: «Consigo mismo» es la forma natural en español para el valor reflexivo-dativo de ἑαυτῷ y evita una traducción demasiado rígida.
- source_word: μὴ λογιζόμενος
  english_pob_choice: not counting
  chosen_spanish: no tomando en cuenta
  alternatives_spanish:
  - no contando
  - no imputando
  lexicon: BDAG
  rationale: Aunque «contar» reproduce la metáfora contable, en español «no tomando en cuenta» comunica con más naturalidad la idea de no cargarles esas faltas en el registro relacional/judicial.
- source_word: παραπτώματα
  english_pob_choice: trespasses
  chosen_spanish: transgresiones
  alternatives_spanish:
  - faltas
  - ofensas
  - pecados
  lexicon: BDAG
  rationale: «Transgresiones» preserva el sentido de desviación o caída implícito en παράπτωμα sin reducirlo al término más general «pecados».
- source_word: καὶ θέμενος
  english_pob_choice: and entrusting / and placing
  chosen_spanish: y poniendo
  alternatives_spanish:
  - y confiando
  - y encomendando
  lexicon: BDAG
  rationale: Se conserva la imagen más literal de τίθημι como «poner», que el contexto completa con el sentido de depositar o asignar. «Poniendo» deja abierta la tensión entre literalidad y función idiomática del participio.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  - para nosotros
  lexicon: BDAG
  rationale: La preposición se mantiene como «en» para no diluir la forma griega. En español, «en nosotros» conserva la ambigüedad productiva entre ubicación interior, corporativa o ministerial.
- source_word: τὸν λόγον τῆς καταλλαγῆς
  english_pob_choice: the message of reconciliation
  chosen_spanish: la palabra de la reconciliación
  alternatives_spanish:
  - el mensaje de la reconciliación
  - la palabra de reconciliación
  lexicon: BDAG
  rationale: Se conserva «palabra» porque el texto griego dice λόγος; aunque «mensaje» es una paráfrasis posible, «palabra» mantiene mejor la literalidad y el eco bíblico de un anuncio confiado.
theological_decisions:
- issue: Traducción de Χριστός como título cristológico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La guía del proyecto pide traducir el título cuando el contexto lo permite. «Mesías» aclara el sentido titulado de Χριστός y evita que el término se cierre prematuramente como nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve contested-terms distinctions'
- issue: Relación teológica en θεὸς ἦν ἐν Χριστῷ
  english_pob_reading: God was in Messiah reconciling the world to himself
  chosen_spanish_reading: Dios estaba en el Mesías reconciliando al mundo consigo mismo
  alternative_spanish_readings:
  - Dios estaba por medio del Mesías reconciliando al mundo consigo mismo
  - En el Mesías, Dios estaba reconciliando al mundo consigo mismo
  rationale: La redacción conserva la cercanía al griego y no resuelve la expresión hacia una explicación más explícita (por medio de / en el Mesías) que disminuiría la tensión interpretativa del pasaje.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: Alcance de ἐν ἡμῖν
  english_pob_reading: in us
  chosen_spanish_reading: en nosotros
  alternative_spanish_readings:
  - entre nosotros
  - para nosotros
  rationale: 'Se conserva la literalidad del texto y su ambigüedad legítima: puede leerse como depósito interior, esfera corporativa o comisión ministerial. La formulación española no decide entre esas posibilidades.'
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension'
translation_notes:
  revision_awareness: El expediente inglés pasó por revisiones sobre Χριστός/«Messiah» y sobre θέμενος ἐν ἡμῖν/«entrusting to us». Esta versión española sigue la decisión final del proyecto de conservar el título como «Mesías» y mantiene una opción más literal para θέμενος («poniendo») con nota léxica, en lugar de fijar de entrada una paráfrasis más interpretativa. También conserva la correspondencia de καταλλαγή con «reconciliación» para mantener la familia léxica del versículo.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός, en coherencia con la política terminológica del proyecto.
  - Se mantiene la familia léxica de καταλλαγή con «reconciliación» y no con otra raíz más libre.
  - «No tomando en cuenta» conserva el sentido relacional/judicial de λογιζόμενος sin introducir jerga técnica innecesaria.
  - «En nosotros» preserva la ambigüedad del griego y queda anotado como alternativa idiomática.
  - Las notas usan marcadores únicos y corresponden a elementos anclados en el texto.
