translation:
  language: es
  text: Pues por fe andamos, no por vista[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no por apariencia' o 'no por lo que se ve'. El término griego puede referirse a forma visible o apariencia; 'vista' se elige para preservar el contraste con 'fe'.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ πίστεως
  english_pob_choice: by faith
  chosen_spanish: por fe
  alternatives_spanish:
  - por la fe
  - mediante la fe
  - por confianza
  lexicon: BDAG; doctrina POB para πίστις
  rationale: διά con genitivo expresa medio o modo; en español, 'por fe' conserva la brevedad y la oposición directa con 'no por vista'. Se evita 'confianza' porque estrecha indebidamente πίστις en este contraste, y 'por la fe' introduce un matiz definido no exigido por el griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: '''γάρ'' introduce la base explicativa de la afirmación anterior. ''Porque'' comunica con claridad esa función causal/explicativa en español sin volver el verso más discursivo de lo necesario.'
- source_word: περιπατοῦμεν
  english_pob_choice: we walk
  chosen_spanish: andamos
  alternatives_spanish:
  - caminamos
  - vivimos
  - conducimos nuestra vida
  lexicon: BDAG
  rationale: Aunque el verbo es literalmente 'andar/caminar', en español 'andamos' conserva la metáfora bíblica de conducta de vida y suena más natural que un calco pesado. 'Caminamos' es posible, pero 'andamos' mantiene mejor el registro bíblico sin perder transparencia.
- source_word: οὐ διὰ εἴδους
  english_pob_choice: not by sight
  chosen_spanish: no por vista
  alternatives_spanish:
  - no por apariencia
  - no por lo que se ve
  - no por lo visible
  lexicon: BDAG
  rationale: '''εἶδος'' puede referirse a forma visible, apariencia o lo que se ve. La opción ''vista'' preserva el contraste tradicional con ''fe'' y mantiene la concisión del griego. Se evita ''apariencia'' porque puede sugerir mera superficialidad más de lo que el texto requiere.'
theological_decisions:
- issue: Contraste paulino entre fe y lo visible/visible-formal
  english_pob_reading: not by sight
  chosen_spanish_reading: no por vista
  alternative_spanish_readings:
  - no por apariencia
  - no por lo que se ve
  rationale: El griego contrapone πίστις con εἶδος; la traducción elegida mantiene la antítesis entre depender de la fe y depender de la realidad visible. 'Vista' conserva el equilibrio retórico del original y la lectura auditada en inglés.
  doctrine_reference: 'DOCTRINE.md: πίστις como ''faith'' por defecto; §3 sobre equivalencia óptima y contraste semántico'
- issue: Sentido aspectual/metafórico de περιπατέω en un contexto paulino
  english_pob_reading: we walk
  chosen_spanish_reading: andamos
  alternative_spanish_readings:
  - caminamos
  - vivimos
  rationale: El verbo se usa metafóricamente para el modo de vida. 'Andamos' permite mantener la imagen bíblica sin convertirla en paráfrasis interpretativa. No se explicita 'vivimos' porque eso borra la metáfora que el griego sí conserva.
  doctrine_reference: 'DOCTRINE.md: preservar metáfora cuando es transparente y significativa'
translation_notes:
  revision_awareness: El archivo inglés auditado mantiene el texto sin cambios en la última revisión y alcanzó alto acuerdo en la verificación cruzada; por ello no se introducen revisiones textuales adicionales en español, solo una adaptación léxica equivalente y cauta.
  spanish_consistency_notes:
  - Se mantiene 'fe' como equivalente principal de πίστις, conforme al criterio doctrinal del proyecto.
  - Se conserva la metáfora de 'andar' para περιπατέω, evitando una paráfrasis explicativa.
  - '''Vista'' se usa como equivalente breve y contrastivo de εἶδος, con nota de alternativa para reflejar la amplitud semántica.'
  - La puntuación con raya final reproduce el cierre abierto del original y del texto inglés auditado.
