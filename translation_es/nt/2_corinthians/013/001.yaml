  rationale: Se corrigió la concordancia gramatical en la cláusula inicial («Esta es…») y se reemplazó «voy» por «vengo» para una expresión más natural y más cercana al valor del presente de ἔρχομαι dirigido a los destinatarios. Se conservó «Todo asunto» por su fuerza jurídica, y se añadió la nota de referencia cruzada para reflejar el expediente del POB inglés.
