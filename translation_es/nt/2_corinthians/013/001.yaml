translation:
  language: es
  text: 'Esta es la tercera vez que vengo a ustedes: «Todo asunto[a] será establecido por el testimonio de dos o tres testigos».[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda palabra». La expresión griega sigue de cerca la redacción de Deuteronomio 19:15 y usa un modismo legal.
    reason: lexical_alternative
  - marker: b
    text: Alusión a Deuteronomio 19:15.
    reason: cross_reference
lexical_decisions:
- source_word: Τρίτον τοῦτο
  english_pob_choice: This is the third time
  chosen_spanish: Este es la tercera vez
  alternatives_spanish:
  - Por tercera vez
  - Esta es la tercera vez
  lexicon: BDAG
  rationale: La expresión griega funciona adverbialmente con ἔρχομαι e indica la tercera ocasión de la venida de Pablo. «Este es la tercera vez» conserva el valor ordinal y suena natural en español bíblico moderno.
- source_word: ἔρχομαι πρὸς ὑμᾶς
  english_pob_choice: I am coming to you
  chosen_spanish: voy a ustedes
  alternatives_spanish:
  - vengo a ustedes
  - estoy yendo a ustedes
  lexicon: BDAG
  rationale: El presente deponente se entiende en contexto como un presente con sentido futuro/inminente. «Voy a ustedes» comunica la dirección y la inminencia sin sonar forzado en español.
- source_word: ἐπὶ στόματος
  english_pob_choice: by the testimony of
  chosen_spanish: por el testimonio de
  alternatives_spanish:
  - por boca de
  - sobre la boca de
  lexicon: BDAG
  rationale: Se trata de un giro legal idiomático que refleja la fórmula de Deuteronomio 19:15. En español, «por el testimonio de» conserva el sentido jurídico mejor que una calca literal.
- source_word: δύο μαρτύρων καὶ τριῶν
  english_pob_choice: two or three witnesses
  chosen_spanish: dos o tres testigos
  alternatives_spanish:
  - dos testigos o tres
  - dos y tres testigos
  lexicon: BDAG
  rationale: La fórmula reproduce el patrón legal bíblico. «Dos o tres testigos» es la forma idiomática natural en español y evita una lectura aritmética equivocada de καί.
- source_word: σταθήσεται
  english_pob_choice: will be established
  chosen_spanish: será establecido
  alternatives_spanish:
  - quedará establecido
  - será confirmado
  lexicon: BDAG
  rationale: El futuro pasivo de ἵστημι en contexto jurídico expresa quedar establecido o validado. «Será establecido» mantiene la fuerza forense de la frase.
- source_word: πᾶν ῥῆμα
  english_pob_choice: Every matter
  chosen_spanish: Todo asunto
  alternatives_spanish:
  - toda palabra
  - toda declaración
  - todo dicho
  lexicon: BDAG
  rationale: Aunque ῥῆμα puede significar «palabra» o «declaración», en esta cita legal se refiere a un asunto o caso. «Todo asunto» transmite mejor el sentido jurídico en español.
theological_decisions:
- issue: Cita legal de Deuteronomio 19:15 en el contexto disciplinario de Pablo
  english_pob_reading: The quotation is rendered as a general legal principle about establishing any matter/charge, without narrowing it beyond the Greek.
  chosen_spanish_reading: La cita se vierte como un principio jurídico general sobre la confirmación de cualquier asunto, sin limitarla innecesariamente a una aplicación eclesiástica más estrecha.
  alternative_spanish_readings:
  - Toda palabra será establecida
  - Toda acusación será establecida
  rationale: El griego cita una fórmula legal conocida. La traducción debe preservar su amplitud jurídica y no imponer una restricción doctrinal o procesal que el texto no explicita.
  doctrine_reference: Principios de traducción POB §§1, 3, 6
translation_notes:
  revision_awareness: El texto sigue la lectura revisada del POB en inglés que prefiere «two or three witnesses» por su ajuste más natural a la construcción griega y mantiene el valor jurídico de la cita. En español se conserva esa misma naturalidad con «dos o tres testigos».
  spanish_consistency_notes:
  - Se usa «asunto» para πᾶν ῥῆμα por su fuerza jurídica, sin ocultar en la nota la alternativa literal «palabra».
  - Se evita «Cristo» o terminología cristológica porque el versículo no la contiene.
  - Se mantiene el tono formal, pero con sintaxis española natural y readable para iglesias de habla hispana.
