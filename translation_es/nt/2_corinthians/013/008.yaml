translation:
  language: es
  text: Porque no podemos hacer nada contra la verdad, sino por la verdad.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Ya que ... no
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la afirmación anterior; en español, «Porque» comunica bien la relación causal/expositiva y mantiene el tono breve y argumentativo. La negación directa de οὐ queda naturalmente en «no».
- source_word: δυνάμεθά
  english_pob_choice: we are not able
  chosen_spanish: no podemos
  alternatives_spanish:
  - no somos capaces
  - no tenemos poder
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad/poder. «No podemos» es la forma más natural y fiel en español para una incapacidad general, sin añadir matices ajenos.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: nada
  alternatives_spanish:
  - algo
  - cosa alguna
  lexicon: BDAG
  rationale: En una cláusula negativa, τι adquiere un sentido indefinido amplio; en español, «nada» transmite mejor el alcance total de la negación que una traducción más literal pero menos idiomática.
- source_word: κατὰ τῆς ἀληθείας
  english_pob_choice: against the truth
  chosen_spanish: contra la verdad
  alternatives_spanish:
  - en contra de la verdad
  - oponiéndonos a la verdad
  lexicon: BDAG
  rationale: 'κατά con genitivo tiene valor adversativo: «contra». Se conserva «la verdad» como entidad definida, siguiendo el griego y el criterio del POB de no reducirla a una fórmula doctrinal más estrecha.'
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: En una negación seguida de contraste, «sino» refleja mejor la oposición fuerte de ἀλλά y suena más natural en español que «pero».
- source_word: ὑπὲρ τῆς ἀληθείας
  english_pob_choice: for the truth
  chosen_spanish: por la verdad
  alternatives_spanish:
  - en favor de la verdad
  - en apoyo de la verdad
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa apoyo o beneficio. «Por la verdad» mantiene la brevedad antitética del texto y es una equivalencia idiomática clara en español; las alternativas explícitan mejor la idea de apoyo, pero son más largas.
theological_decisions:
- issue: Alcance de «la verdad» en la antítesis paulina
  english_pob_reading: '''the truth'' is retained without narrowing it to a specific doctrinal formula'
  chosen_spanish_reading: «la verdad» se mantiene sin restringirla a una fórmula doctrinal específica
  alternative_spanish_readings:
  - la verdad del evangelio
  - lo verdadero
  rationale: El griego usa un sustantivo definido amplio. Mantener «la verdad» conserva la amplitud retórica y teológica del texto, que incluye la verdad del evangelio sin limitarse solo a esa expresión.
  doctrine_reference: Conservar la tensión teológica y la amplitud semántica del texto.
translation_notes:
  revision_awareness: 'La versión inglesa revisada eliminó «only» porque no está en el griego; en español se evita igualmente cualquier intensificador equivalente no sustentado por el texto. Se conservó la estructura antitética breve: no poder hacer nada contra la verdad, sino por la verdad.'
  spanish_consistency_notes:
  - Se usó «verdad» sin mayúscula porque el griego no requiere capitalización teológica aquí.
  - «sino» refleja mejor el contraste de ἀλλά tras una negación.
  - No se añadió nota al pie porque la alternativa principal queda bien resuelta en el cuerpo del texto español.
