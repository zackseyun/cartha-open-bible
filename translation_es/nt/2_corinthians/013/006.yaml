translation:
  language: es
  text: Pero espero que sabrán que no somos descalificados[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no aprobados» o «que no pasan la prueba». El adjetivo griego se refiere a no quedar aprobado después de ser puesto a prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίζω
  english_pob_choice: I hope
  chosen_spanish: espero
  alternatives_spanish:
  - tengo esperanza
  - confío
  lexicon: BDAG
  rationale: El presente indicativo de primera persona singular expresa una expectativa futura; «espero» es la correspondencia natural y directa en español, sin añadir matices que no están en el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición con contraste leve respecto al contexto inmediato; «Pero» reproduce bien esa transición en español y mantiene el tono natural.
- source_word: γνώσεσθε
  english_pob_choice: you will know
  chosen_spanish: conocerán
  alternatives_spanish:
  - llegarán a conocer
  - reconocerán
  lexicon: BDAG
  rationale: El futuro de γινώσκω aquí señala una toma de conciencia futura. «Conocerán» conserva el valor básico de conocimiento futuro sin sobreexplicar el proceso.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Ambas ocurrencias introducen cláusulas de contenido; «que» es la equivalencia directa y fluida en español.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito puede conservarse como sujeto enfático en español con «nosotros». No hace falta intensificar más el énfasis porque el contexto ya lo sostiene.
- source_word: οὐκ ἐσμὲν
  english_pob_choice: are not
  chosen_spanish: no somos
  alternatives_spanish:
  - no estamos
  lexicon: BDAG
  rationale: La negación de εἰμί se rinde naturalmente como «no somos». «No estamos» introduciría una lectura más circunstancial que no corresponde al simple copulativo.
- source_word: ἀδόκιμοι
  english_pob_choice: disqualified
  chosen_spanish: descalificados
  alternatives_spanish:
  - no aprobados
  - reprobados
  - que no pasan la prueba
  lexicon: BDAG
  rationale: En el marco de examen/prueba del contexto inmediato, ἀδόκιμος expresa no haber sido aprobado tras la prueba. «Descalificados» comunica bien esa idea en español actual y evita la carga doctrinal de «reprobados»; «no aprobados» sería más literal, pero menos idiomático.
theological_decisions:
- issue: Valor de ἀδόκιμοι en un contexto de prueba y legitimidad apostólica
  english_pob_reading: not disqualified
  chosen_spanish_reading: no somos descalificados
  alternative_spanish_readings:
  - no somos aprobados
  - no pasamos la prueba
  - no somos reprobados
  rationale: El pasaje trata de si Pablo y sus colaboradores resisten la prueba y quedan aprobados. «Descalificados» preserva la fuerza evaluativa y el trasfondo de examen sin importar connotaciones doctrinales ajenas al contexto. «Reprobados» se evita por su peso teológico tradicional en español, no exigido aquí por el griego.
  doctrine_reference: Principios POB sobre sentido léxico contextual y evitación de carga doctrinal no requerida
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en una lectura estable; no se registran revisiones aplicadas. Se mantiene la equivalencia funcional de ἀδόκιμοι con una opción española contemporánea y clara.
  spanish_consistency_notes:
  - Se conserva el orden lógico del griego con una estructura natural en español.
  - Se mantiene la primera persona plural explícita («nosotros») para reflejar el énfasis del pronombre ἡμεῖς.
  - «Descalificados» se usa de manera consistente con el campo semántico de prueba/aprobación indicado por el audit trail inglés.
  - No se introduce «Cristo», «Señor» ni otra terminología teológica no presente en el versículo.
