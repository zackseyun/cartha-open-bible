review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura del griego: δὲ como contraste leve («Pero»), ἐλπίζω («espero»), doble ὅτι («que»), y la negación de ἀδόκιμοι. Sin embargo, «conocerán» suena menos natural aquí que «sabrán», y la nota al pie invierte el sentido al decir «no haber resistido la prueba como aprobados», cuando el inglés auditado dice que el adjetivo se refiere a fallar en quedar aprobado después de la prueba.'
  spanish_quality_summary: El texto es claro, pero «nosotros» no es necesario en español y vuelve la línea un poco pesada; puede conservarse o omitirse. «Descalificados» funciona bien para ἀδόκιμοι en este contexto de prueba/examen. La nota al pie necesita corrección semántica y una alternativa mejor alineada con el inglés auditado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La decisión «descalificados» para ἀδόκιμοι está bien alineada con la justificación teológica y lexical del POB; debe evitarse «reprobados» como alternativa principal por su carga doctrinal, aunque puede mencionarse como alternativa menos recomendada. «Sabrán» refleja mejor el uso idiomático español de γινώσκω aquí que «conocerán».
  issues:
  - severity: medium
    issue: «Conocerán» suena poco natural para γνώσεσθε en este contexto.
    rationale: En español bíblico natural, «sabrán» o «llegarán a saber» expresa mejor una realización futura que «conocerán», que suele sugerir familiaridad o conocimiento relacional.
  - severity: high
    issue: La nota al pie explica al revés el valor de ἀδόκιμοι.
    rationale: Dice «se refiere a no haber resistido la prueba como aprobados», pero debe explicar que se refiere a fallar la prueba o no quedar aprobado después de ser probado.
  - severity: low
    issue: La alternativa «no reprobados» en la nota puede confundir por su carga doctrinal.
    rationale: El propio rastro auditado evita hacer de «reprobate/reprobados» la opción principal; conviene mantenerla fuera de la nota o muy subordinada.
  revised_spanish_text: Pero espero que sabrán que no somos descalificados[a].
