  glossary_alignment: Hay un desajuste importante con la pauta del proyecto sobre Χριστός -> normalmente 'Mesías' cuando funciona como título. Aquí el expediente inglés documenta precisamente ese uso titular. Por ello debe ir 'Jesús el Mesías' en el texto principal, con 'Jesucristo' como alternativa en nota, no al revés. El resto del glosario relevante ('Jesús', 'fe', 'descalificados') está alineado.
