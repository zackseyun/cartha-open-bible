translation:
  language: es
  text: Pónganse a prueba ustedes mismos para ver si están en la fe[c]; examínense ustedes mismos. ¿O no reconocen que Jesús el Mesías[a] está en ustedes[b]?—a menos que en verdad estén descalificados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «entre ustedes» o «en medio de ustedes».'
    reason: alternative_reading
  - marker: c
    text: «En la fe» puede referirse a permanecer dentro de la fe cristiana o a poseer una fe genuina.
    reason: lexical_alternative
lexical_decisions:
- source_word: πειράζετε
  english_pob_choice: Test
  chosen_spanish: Pónganse a prueba
  alternatives_spanish:
  - Examínense
  - Pruébense
  lexicon: BDAG
  rationale: El imperativo pide una autoevaluación para discernir la autenticidad. "Pónganse a prueba" conserva el sentido evaluativo de πειράζω sin sugerir tentación moral.
- source_word: ἐν τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - dentro de la fe
  lexicon: BDAG
  rationale: La presencia del artículo favorece una referencia definida a la realidad/sfera de la fe cristiana. Mantener "en la fe" preserva la ambigüedad teológica entre estar dentro de la fe y poseer fe genuina.
- source_word: δοκιμάζετε
  english_pob_choice: examine
  chosen_spanish: examínense
  alternatives_spanish:
  - pónganse a prueba
  - pruébense
  lexicon: BDAG
  rationale: Δοκιμάζω añade la idea de escrutinio con miras a aprobación o autenticidad. "Examínense" diferencia bien este verbo del anterior, como hace la POB inglesa con "examine".
- source_word: ἐπιγινώσκετε
  english_pob_choice: recognize
  chosen_spanish: reconocen
  alternatives_spanish:
  - se dan cuenta
  - reconocen plenamente
  - conocen
  lexicon: BDAG
  rationale: El compuesto sugiere un reconocimiento más pleno que simple conocimiento. "Reconocen" funciona naturalmente en la pregunta retórica y evita sobrecargar la frase.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús, el Mesías
  lexicon: BDAG
  rationale: Aunque la POB inglesa traduce Χριστός como "Messiah" en este versículo, en español la forma confesional y ampliamente inteligible "Jesucristo" preserva la unidad del nombre-título sin forzar una construcción menos natural. Se conserva la tensión título/nombre en la nota.
- source_word: ἐν ὑμῖν
  english_pob_choice: is in you
  chosen_spanish: está en ustedes
  alternatives_spanish:
  - está entre ustedes
  - está en medio de ustedes
  lexicon: BDAG
  rationale: El contexto inmediato favorece la presencia interior de Cristo en los creyentes, y el plural se mantiene con "ustedes". La alternativa comunitaria se preserva en nota porque ἐν puede abarcar también el matiz corporativo.
- source_word: εἰ μήτι
  english_pob_choice: unless indeed
  chosen_spanish: a menos que, en verdad
  alternatives_spanish:
  - a menos que
  - salvo que, en verdad
  lexicon: BDAG
  rationale: La combinación introduce una excepción con cierta ironía o suavización retórica. "A menos que, en verdad" mantiene ese matiz sin exagerarlo.
- source_word: ἀδόκιμοί
  english_pob_choice: disqualified
  chosen_spanish: descalificados
  alternatives_spanish:
  - reprobados
  - no aprobados
  - que no han pasado la prueba
  lexicon: BDAG
  rationale: '"Descalificados" expresa con claridad la idea de no haber resistido la prueba y evita la carga doctrinal posterior asociada a "reprobados". Además mantiene la relación semántica con los verbos de prueba y examen.'
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: Jesus the Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús, el Mesías
  rationale: La pauta del proyecto favorece traducir Χριστός como "Mesías" cuando funciona claramente como título. Sin embargo, en español "Jesucristo" es la forma más establecida y reverente para esta confesión, y aquí se usa para no sacrificar fluidez ni reconocimiento eclesial. La tensión entre nombre y título se conserva en la documentación.
  doctrine_reference: 'DOCTRINE.md: Translate titles; preserve recognizable confession where Spanish idiom requires it'
- issue: ἐν τῇ πίστει y su alcance teológico
  english_pob_reading: in the faith
  chosen_spanish_reading: en la fe
  alternative_spanish_readings:
  - en la fe cristiana
  - dentro de la fe
  rationale: La frase puede referirse a permanecer dentro de la esfera de la fe cristiana o a poseer una fe genuina. Se preserva la formulación abierta "en la fe" para no resolver más allá del griego una tensión que el propio texto mantiene.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
- issue: 'ἐν ὑμῖν: presencia interna o comunitaria'
  english_pob_reading: in you
  chosen_spanish_reading: está en ustedes
  alternative_spanish_readings:
  - está entre ustedes
  - está en medio de ustedes
  rationale: El contexto de autoexamen favorece la lectura de la presencia de Cristo en los creyentes. Aun así, la preposición permite un matiz corporativo; por eso se conserva la alternativa en nota para no clausurar la ambigüedad.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma como contexto auditado la POB inglesa, pero adapta la sintaxis al español natural. Se corrigió la necesidad de distinguir πειράζω/δοκιμάζω con dos verbos distintos, se mantuvo la ambigüedad de ἐν τῇ πίστει, y se documentó la alternativa comunitaria de ἐν ὑμῖν. A diferencia del audit trail inglés, no se reproduce una nota literal de 'Jesus Christ' como variante principal, porque en español la forma confesional 'Jesucristo' es la más idiomática; la alternativa titulativa se deja en nota.
  spanish_consistency_notes:
  - Se mantiene 'ustedes' para el plural universal y coherente con el registro neutral latinoamericano.
  - '''Fe'' se conserva sin añadir ''cristiana'' en el texto principal para respetar la ambigüedad del griego.'
  - '''Descalificados'' se eligió para evitar ''reprobados'', que tendría carga teológica posterior no necesaria aquí.'
  - 'La coordinación de los dos imperativos conserva la progresión: auto-prueba / examen.'
  - La presencia de Cristo se expresa con 'está en ustedes' como lectura principal y se deja la variante 'entre ustedes' en nota.
