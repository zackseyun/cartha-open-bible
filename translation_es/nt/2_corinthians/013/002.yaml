revisions:
- from: Ya lo he dicho antes[a], y ahora lo digo de antemano, estando ausente, como cuando estuve presente la segunda vez, a los que pecaron antes y a todos los demás, que si voy de nuevo, no los perdonaré.
  to: Ya lo he dicho antes[a], y ahora lo digo de antemano, estando ausente, como cuando estuve presente la segunda vez, a los que pecaron antes y a todos los demás, que si vengo de nuevo, no tendré consideración.
  rationale: Se ajustó «si voy de nuevo» a «si vengo de nuevo» para un español más natural y coherente con el contexto epistolar, y se sustituyó «no los perdonaré» por «no tendré consideración» para reflejar mejor οὐ φείσομαι como negativa a mostrar indulgencia o a escatimar severidad, evitando una lectura de perdón moral. Se armonizó la nota con el verbo principal.
