translation:
  language: es
  text: Ya lo he dicho antes[a], y ahora lo digo de antemano, estando ausente, como cuando estuve presente la segunda vez, a los que pecaron antes y a todos los demás, que si vengo de nuevo, no tendré consideración.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más explícitamente: «si vengo por tercera vez». El griego dice literalmente: «si vengo de nuevo», pero el contexto de las visitas de Pablo sugiere otra visita después de la segunda.'
    reason: alternative_reading
lexical_decisions:
- source_word: προείρηκα
  english_pob_choice: I have said before
  chosen_spanish: ya lo he dicho antes
  alternatives_spanish:
  - ya lo he dicho previamente
  - ya he advertido antes
  lexicon: BDAG
  rationale: El perfecto expresa una declaración anterior con vigencia actual. «Ya lo he dicho antes» conserva ese valor retrospectivo sin forzar explícitamente el matiz de advertencia, que en español puede quedar para el contexto.
- source_word: προλέγω
  english_pob_choice: I say beforehand
  chosen_spanish: lo digo de antemano
  alternatives_spanish:
  - lo advierto de antemano
  - lo digo previamente
  lexicon: BDAG
  rationale: El verbo significa literalmente «decir de antemano». «Lo digo de antemano» mantiene la continuidad léxica con la primera cláusula y no añade más de lo que el griego exige.
- source_word: ὡς παρὼν τὸ δεύτερον καὶ ἀπὼν νῦν
  english_pob_choice: now while absent as I did when present the second time
  chosen_spanish: estando ausente, como cuando estuve presente la segunda vez
  alternatives_spanish:
  - como cuando estuve presente por segunda vez, y ahora ausente
  - ausente ahora, como cuando estuve presente la segunda vez
  lexicon: BDAG
  rationale: La frase contrasta la presencia anterior de Pablo con su ausencia actual. El español coloca primero la ausencia actual y luego la comparación con la segunda visita para que la relación temporal resulte clara sin perder la estructura comparativa.
- source_word: τοῖς προημαρτηκόσιν
  english_pob_choice: to those who sinned previously
  chosen_spanish: a los que pecaron antes
  alternatives_spanish:
  - a los que han pecado antes
  - a los que pecaron previamente
  lexicon: BDAG
  rationale: El participio perfecto apunta a personas cuyo pecado previo ya está en vista. «Pecaron antes» expresa esa anterioridad de forma natural en español sin decidir si hubo o no arrepentimiento.
- source_word: τοῖς λοιποῖς πᾶσιν
  english_pob_choice: to all the rest
  chosen_spanish: a todos los demás
  alternatives_spanish:
  - a todos los otros
  - a los restantes
  lexicon: BDAG
  rationale: «Todos los demás» es idiomático y conserva el contraste entre el grupo señalado por su pecado previo y el resto de la comunidad.
- source_word: ἐὰν ἔλθω εἰς τὸ πάλιν
  english_pob_choice: if I come again
  chosen_spanish: si voy de nuevo
  alternatives_spanish:
  - si vuelvo otra vez
  - si vengo de nuevo
  lexicon: BDAG
  rationale: La expresión idiomática indica otra visita. «Si voy de nuevo» suena natural en español y preserva la idea de un regreso sin explicitar interpretativamente que se trate necesariamente de una tercera visita en el texto principal.
- source_word: οὐ φείσομαι
  english_pob_choice: I will not spare them
  chosen_spanish: no los perdonaré
  alternatives_spanish:
  - no tendré consideración
  - no los perdonaré ni mostraré indulgencia
  lexicon: BDAG
  rationale: φείδομαι significa «perdonar / ahorrar / tener consideración» según contexto; aquí el sentido es abstenerse de severidad. «No los perdonaré» comunica con fuerza la falta de indulgencia, aunque en español puede oírse también como perdón moral; por eso se mantiene la referencia a una acción disciplinaria en la nota teológica.
theological_decisions:
- issue: Alcance de la severidad anunciada por Pablo
  english_pob_reading: Paul warns the offending parties and the rest of the congregation that on a return visit he will not refrain from disciplinary action.
  chosen_spanish_reading: Pablo advierte a los que pecaron antes y a todos los demás que, si regresa, no se abstendrá de actuar con severidad.
  alternative_spanish_readings:
  - Pablo advierte solo al grupo que pecó antes
  - Pablo anuncia una severidad apostólica general sin especificar disciplina
  rationale: La sintaxis incluye tanto a los que pecaron antes como a todos los demás. En español, «no los perdonaré» puede sonar a perdón moral; por eso se aclara en la nota que el trasfondo es una acción severa/disciplinaria, sin resolver más de lo que el texto permite.
  doctrine_reference: Preservar la tensión teológica sin imponer un marco eclesiológico no explícito.
- issue: Posible referencia a una tercera visita
  english_pob_reading: Or, more explicitly, 'if I come for a third time.' The Greek says literally, 'if I come again,' but the context of Paul's visits suggests another visit after the second.
  chosen_spanish_reading: 'O, más explícitamente: «si vengo por tercera vez». El griego dice literalmente: «si voy de nuevo», pero el contexto de las visitas de Pablo sugiere otra visita después de la segunda.'
  alternative_spanish_readings:
  - si vengo otra vez
  - si regreso de nuevo
  rationale: La redacción principal mantiene la literalidad del griego; la nota preserva la alternativa explicativa que el contexto histórico sugiere, sin convertirla en parte del texto principal.
  doctrine_reference: Dejar abierta la tensión textual e histórica donde el original la deja abierta.
translation_notes:
  revision_awareness: 'La versión inglesa revisada ajustó el orden para reflejar con más naturalidad la secuencia griega y sustituyó la puntuación fuerte por una subordinada con «that». La presente versión española sigue esa misma decisión: conserva la comparación «como cuando estuve presente la segunda vez», mantiene el valor de ὅτι con «que», y evita añadir una interpretación más fuerte que la del griego.'
  spanish_consistency_notes:
  - Se mantiene el patrón POB de traducir el nombre divino y los títulos cristológicos solo cuando aparecen; aquí no intervienen.
  - «Pecaron antes» y «no los perdonaré» preservan la tensión entre el pecado previo y la respuesta futura sin especificar el tipo de sanción en el texto principal.
  - La nota [a] conserva la alternativa histórica/visita adicional tal como en el audit trail inglés.
