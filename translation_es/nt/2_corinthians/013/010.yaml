review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: causalidad (''Por esta razón''), contraste temporal entre ausencia y presencia, propósito con ''para que'', autoridad dada por el Señor, y la finalidad pastoral de esa autoridad. Sin embargo, en la cláusula final debilita una decisión importante del audit trail inglés: el griego mantiene una metáfora de construcción con οἰκοδομή / καθαίρεσις, y el inglés la preservó en el texto principal (''building up ... tearing down''), mientras que el español la desplazó a nota con ''edificación ... destrucción''.'
  spanish_quality_summary: El español es claro, natural y digno. 'No tenga que actuar con severidad' funciona bien. No obstante, 'para edificación y no para destrucción' suena más eclesiástico y abstracto que el resto de la frase, y pierde viveza retórica. Una formulación como 'para edificar y no para derribar' preserva mejor la imagen paulina y suena plenamente natural en español bíblico contemporáneo.
  glossary_alignment: 'La terminología clave está en buena consonancia con el proyecto: κύριος → ''el Señor''; ἐξουσία → ''autoridad''. No hay conflicto con glosario mayor. La única desalineación relevante es con la decisión léxica documentada para οἰκοδομή / καθαίρεσις, donde conviene conservar la metáfora en el texto principal, no solo en nota.'
  issues:
  - severity: medium
    issue: La metáfora de construcción del griego no se preserva en el texto principal.
    rationale: El audit trail inglés eligió explícitamente 'for building up and not for tearing down' para reflejar οἰκοδομή / καθαίρεσις. El borrador español usa 'edificación ... destrucción', correcto semánticamente pero menos fiel a la imagen retórica documentada.
  - severity: low
    issue: La nota b mezcla dos asuntos distintos bajo un solo anclaje.
    rationale: El anclaje [b] está en 'actuar con severidad', pero la nota también comenta la metáfora final de construcción. Es mejor que la nota en ese punto se limite a la alternativa léxica de ἀποτόμως χρήσωμαι, especialmente si la metáfora se recupera en el texto principal.
  revised_spanish_text: Por esta razón escribo estas cosas estando ausente[a], para que cuando esté presente no tenga que actuar con severidad[b], conforme a la autoridad que el Señor me dio para edificar y no para derribar.
  revised_footnotes:
  - marker: a
    text: 'O: «mientras estoy ausente»; «estando ausente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con dureza» o «tratar con severidad».'
    reason: lexical_alternative
  revision_rationale: Se mantiene casi todo el borrador porque es fiel y natural, pero se ajusta la cláusula final a 'para edificar y no para derribar' para preservar en el texto principal la metáfora de construcción del griego y del audit trail inglés. También se depura la nota b para que corresponda solo al anclaje donde aparece.
