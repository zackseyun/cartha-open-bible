base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/013/010.yaml
  text: For this reason I write these things while absent[a], so that when present I may not have to act harshly[b], according to the authority that the Lord gave me for building up and not for tearing down.
  footnotes:
