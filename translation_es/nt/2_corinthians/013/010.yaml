  to: Por esta razón escribo estas cosas estando ausente[a], para que cuando esté presente no tenga que actuar con severidad[b], conforme a la autoridad que el Señor me dio para edificar y no para derribar.
  rationale: Se mantiene casi todo el borrador porque es fiel y natural, pero se ajusta la cláusula final a 'para edificar y no para derribar' para preservar en el texto principal la metáfora de construcción del griego y del audit trail inglés. También se depura la nota b para que corresponda solo al anclaje donde aparece.
