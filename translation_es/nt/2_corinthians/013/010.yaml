translation:
  language: es
  text: Por esta razón escribo estas cosas estando ausente[a], para que cuando esté presente no tenga que actuar con severidad[b], conforme a la autoridad que el Señor me dio para edificar y no para derribar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mientras estoy ausente»; «estando ausente».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «con dureza» o «tratar con severidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por tanto
  - Por eso
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación causal y consecuencial del contexto inmediato, sin perder la fuerza explícita del enlace paulino.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas materias
  - esto
  lexicon: BDAG
  rationale: Se mantiene el plural del demostrativo griego y se conserva la referencia al contenido de la carta o a las advertencias previas.
- source_word: ἀπὼν
  english_pob_choice: while absent
  chosen_spanish: estando ausente
  alternatives_spanish:
  - mientras estoy ausente
  - ausente
  lexicon: BDAG
  rationale: El participio se vierte de modo temporal e idiomático en español, manteniendo el contraste con 'presente' más adelante.
- source_word: γράφω
  english_pob_choice: I write
  chosen_spanish: escribo
  alternatives_spanish:
  - estoy escribiendo
  lexicon: BDAG
  rationale: El presente simple comunica adecuadamente el estilo epistolar y evita una perífrasis innecesaria.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Marca con claridad el propósito de la oración en español actual y digno.
- source_word: παρὼν
  english_pob_choice: when present
  chosen_spanish: cuando esté presente
  alternatives_spanish:
  - estando presente
  - cuando me encuentre presente
  lexicon: BDAG
  rationale: Recupera la fuerza temporal del participio y mantiene el paralelismo con 'estando ausente'.
- source_word: μὴ ἀποτόμως χρήσωμαι
  english_pob_choice: I may not have to act harshly
  chosen_spanish: no tenga que actuar con severidad
  alternatives_spanish:
  - no tenga que tratar con dureza
  - no tenga que proceder con rigor
  lexicon: BDAG
  rationale: χράομαι se entiende aquí como 'tratar/actuar', y ἀποτόμως aporta la idea de severidad o aspereza. 'Con severidad' preserva el matiz y evita una lectura meramente física o coloquial.
- source_word: κατὰ τὴν ἐξουσίαν
  english_pob_choice: according to the authority
  chosen_spanish: conforme a la autoridad
  alternatives_spanish:
  - de acuerdo con la autoridad
  - en consonancia con la autoridad
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad o acuerdo; 'conforme a' suena natural en español y conserva el sentido normativo.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Dueño
  - el Amo
  lexicon: BDAG
  rationale: Se conserva el título reverente habitual en español para κύριος cuando refiere a Dios o al Señor en contexto paulino, sin añadir una identificación doctrinal que el versículo no explicita.
- source_word: ἔδωκέν μοι
  english_pob_choice: gave me
  chosen_spanish: me dio
  alternatives_spanish:
  - me ha dado
  lexicon: BDAG
  rationale: El aoristo se vierte con pretérito simple en español para una comisión recibida en el pasado.
- source_word: εἰς οἰκοδομὴν
  english_pob_choice: for building up
  chosen_spanish: para edificación
  alternatives_spanish:
  - para construir
  - para edificar
  lexicon: BDAG
  rationale: Se conserva el sustantivo abstracto que Pablo usa frecuentemente en este campo semántico y que el audit trail inglés trató como metáfora de construcción.
- source_word: καθαίρεσιν
  english_pob_choice: tearing down
  chosen_spanish: destrucción
  alternatives_spanish:
  - derribo
  - demolición
  lexicon: BDAG
  rationale: Aunque el inglés prefirió 'tearing down' para preservar la metáfora, en español 'destrucción' comunica bien el contraste retórico y evita una imagen forzada; la nota conserva la tensión metafórica.
theological_decisions:
- issue: Alcance de 'el Señor' que concede la autoridad
  english_pob_reading: Rendered simply as 'the Lord' without specifying beyond the Greek text.
  chosen_spanish_reading: Se mantiene 'el Señor' sin precisar más allá del texto griego.
  alternative_spanish_readings:
  - Jesús el Señor
  - el Señor en sentido más amplio/divino
  rationale: El versículo usa ὁ κύριος y no obliga aquí a una identificación más específica. La traducción conserva el título y evita importar una precisión doctrinal que el texto no desarrolla en esta frase.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → Señor); Translation philosophy items 1 and 3'
- issue: Naturaleza de la relación entre 'edificación' y 'destrucción'
  english_pob_reading: 'The Greek uses a building metaphor: ''for building up and not for tearing down.'''
  chosen_spanish_reading: Se conserva el contraste semántico y se explica la metáfora de construcción en nota.
  alternative_spanish_readings:
  - para edificación y no para derribo
  - para edificar y no para destruir
  rationale: Pablo contrasta dos fines opuestos; 'edificación' mantiene el término paulino habitual y 'destrucción' refleja el polo contrario sin diluir la oposición. La nota permite recuperar la imagen de 'construcción/derribo' que el griego sugiere.
  doctrine_reference: 'DOCTRINE.md: metaphor preservation guidance; Translation philosophy item 2'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el audit trail inglés sin depender mecánicamente de la formulación inglesa. Se conservan los contrastes ausente/presente, severidad, autoridad y la metáfora de construir/destruir. No se introdujeron revisiones posteriores en el paquete; el estado de revisión más reciente indica que no hubo cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene 'el Señor' como traducción de κύριος, coherente con el criterio del proyecto.
  - '''Edificación'' se conserva como término técnico paulino, mientras que ''destrucción'' funciona como polo opuesto claro en español.'
  - '''Estando ausente'' y ''cuando esté presente'' conservan el paralelismo temporal del griego.'
  - La puntuación y el orden siguen un español natural sin borrar la relación causal inicial.
