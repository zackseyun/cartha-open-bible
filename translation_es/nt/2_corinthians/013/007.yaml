translation:
  language: es
  text: Ahora oramos a Dios para que ustedes no hagan nada malo[a], no para que nosotros aparezcamos aprobados[b], sino para que ustedes hagan lo correcto, aunque nosotros parezcamos descalificados[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no hagan ningún mal'.
    reason: lexical_alternative
  - marker: b
    text: O 'probados genuinos'; el griego contrasta 'aprobados' con 'descalificados' mediante términos emparentados.
    reason: lexical_alternative
  - marker: c
    text: O 'aunque se nos tenga por no aprobados' o 'aunque parezcamos descalificados'.
    reason: alternative_reading
lexical_decisions:
- source_word: εὐχόμεθα
  english_pob_choice: we pray
  chosen_spanish: oramos
  alternatives_spanish:
  - rogamos
  - pedimos
  lexicon: BDAG
  rationale: εὔχομαι aquí expresa oración dirigida a Dios; «oramos» es natural en español y conserva el sentido de petición a Dios sin añadir matices innecesarios.
- source_word: πρὸς τὸν θεὸν
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para con Dios
  - delante de Dios
  lexicon: BDAG
  rationale: Con un verbo de oración, la preposición se expresa de forma idiomática en español como «a Dios». Mantiene la dirección de la oración de manera clara y directa.
- source_word: μὴ ποιῆσαι ὑμᾶς κακὸν μηδέν
  english_pob_choice: that you may do nothing wrong
  chosen_spanish: para que ustedes no hagan nada malo
  alternatives_spanish:
  - para que ustedes no hagan nada malo/ningún mal
  - para que ustedes no hagan nada perverso
  lexicon: BDAG
  rationale: La construcción infinitiva expresa el contenido de la oración. «Nada malo» comunica bien la negación enfática de κακὸν μηδέν sin sonar forzado; conserva la fuerza ética del original.
- source_word: δόκιμοι
  english_pob_choice: approved
  chosen_spanish: aprobados
  alternatives_spanish:
  - probados genuinos
  - aceptados
  lexicon: BDAG
  rationale: δόκιμος contrasta con ἀδόκιμος en el mismo verso. «Aprobados» conserva ese contraste de evaluación/test y es claro en español. Se evita suavizarlo con términos más generales.
- source_word: φανῶμεν
  english_pob_choice: we may appear
  chosen_spanish: aparezcamos
  alternatives_spanish:
  - seamos vistos
  - seamos mostrados
  lexicon: BDAG
  rationale: φαίνω en este contexto tiene sentido intransitivo de aparecer/manifestarse. «Aparezcamos» reproduce bien la idea de percepción pública.
- source_word: τὸ καλὸν
  english_pob_choice: what is right
  chosen_spanish: lo correcto
  alternatives_spanish:
  - lo bueno
  - el bien
  lexicon: BDAG
  rationale: En contexto ético, καλός apunta a lo moralmente bueno y correcto. «Lo correcto» suena natural en español y preserva la fuerza práctica del término.
- source_word: ποιῆτε
  english_pob_choice: you may do
  chosen_spanish: hagan
  alternatives_spanish:
  - practiquen
  - realicen
  lexicon: BDAG
  rationale: 'La subordinación final con ἵνα se expresa en español de forma fluida con el subjuntivo: «para que… hagan». Mantiene el valor purposivo.'
- source_word: ὡς ἀδόκιμοι
  english_pob_choice: even if we seem disqualified
  chosen_spanish: aunque nosotros parezcamos descalificados
  alternatives_spanish:
  - aunque nosotros seamos tenidos por descalificados
  - aunque parezcamos no aprobados
  lexicon: BDAG
  rationale: 'ἀδόκιμος es el opuesto de δόκιμος: no aprobado, rechazado en una prueba, descalificado. «Descalificados» conserva el contraste con «aprobados» y transmite la idea de ser considerados no aptos sin introducir una condena final.'
theological_decisions:
- issue: Contraste δόκιμοι / ἀδόκιμοι y su alcance teológico
  english_pob_reading: Paul speaks of appearing or being regarded as disqualified/unapproved in the eyes of others, not of ultimate spiritual reprobation.
  chosen_spanish_reading: Pablo habla de parecer descalificados o no aprobados a ojos de otros, no de una reprobación espiritual final.
  alternative_spanish_readings:
  - Pablo habla de ser inútiles
  - Pablo habla de una condenación definitiva
  rationale: El verso contrapone la validación pública de ‘aprobados’ con ‘descalificados’. La traducción conserva esa tensión sin resolverla doctrinalmente ni ir más allá de la evidencia textual.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Finalidad negativa y positiva de la oración
  english_pob_reading: not so that we may appear approved, but so that you may do what is right
  chosen_spanish_reading: no para que nosotros aparezcamos aprobados, sino para que ustedes hagan lo correcto
  alternative_spanish_readings:
  - no porque queramos quedar bien, sino para que ustedes hagan el bien
  - no para que se nos reconozca, sino para que ustedes obren bien
  rationale: 'El griego estructura una finalidad negada y otra afirmada. El español conserva ese contraste para no desplazar el foco pastoral de Pablo: el bien de los corintios, no la autojustificación apostólica.'
  doctrine_reference: Mantener la intención pastoral del texto
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el audit trail inglés. Se reflejó la revisión reciente al usar un subjuntivo explícito en ambas cláusulas finales/potenciales con «aparezcamos» y «parezcamos», manteniendo el paralelismo con el griego y la lectura revisada del inglés.
  spanish_consistency_notes:
  - Se usa ‘Dios’ por θεός, sin sustitución reverencial no motivada.
  - 'Se traduce δόκιμος/ἀδόκιμος con un contraste consistente: ‘aprobados’ / ‘descalificados’.'
  - ‘Lo correcto’ conserva el valor ético de τὸ καλόν sin volverlo demasiado abstracto.
  - ‘Oramos’ es una elección idiomática para εὐχόμεθα en contexto de petición dirigida a Dios.
  - Se evita ‘Cristo’ o terminología eclesial ajena al versículo; no hay necesidad de introducirla.
