  text: ⸀εὐχόμεθα δὲ πρὸς τὸν θεὸν μὴ ποιῆσαι ὑμᾶς κακὸν μηδέν, οὐχ ἵνα ἡμεῖς δόκιμοι φανῶμεν, ἀλλ’ ἵνα ὑμεῖς τὸ καλὸν ποιῆτε, ἡμεῖς δὲ ὡς ἀδόκιμοι ὦμεν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/013/007.yaml
  text: Now we pray to God that you may do nothing wrong—not so that we may appear approved[a], but so that you may do what is right[c][b], even if we may seem disqualified.
  footnotes:
  - marker: a
    text: Or 'do no evil.'
    reason: lexical_alternative
  - marker: b
    text: Or 'approved' / 'proven genuine'; the Greek contrasts 'approved' with 'disqualified' using related terms.
    reason: lexical_alternative
  - marker: c
    text: Or 'even if we are as unapproved' or 'even if we appear disqualified.'
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
