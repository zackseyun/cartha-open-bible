translation:
  language: es
  text: Salúdense unos a otros con un beso santo[a][b]. Todos los santos los saludan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con un beso sagrado». La expresión alude a un saludo culturalmente reconocido, marcado por la santidad y la comunión cristiana.'
    reason: lexical_alternative
  - marker: b
    text: «Santos» aquí significa creyentes, es decir, el pueblo santo de Dios; no se refiere solo a una clase selecta de cristianos canonizados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Salúdense
  alternatives_spanish:
  - Dense saludos
  - Saluden
  lexicon: BDAG
  rationale: El imperativo aoristo medio en segunda plural expresa una acción recíproca dentro de la comunidad. «Salúdense» comunica de manera natural y directa la exhortación, conservando la reciprocidad.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - entre sí
  - mutuamente
  lexicon: BDAG
  rationale: El pronombre recíproco exige acción mutua. «Unos a otros» es la equivalencia española más natural en estilo bíblico sin perder el sentido comunitario.
- source_word: ἐν ἁγίῳ φιλήματι
  english_pob_choice: with a holy kiss
  chosen_spanish: con un beso santo
  alternatives_spanish:
  - con un beso sagrado
  - en un beso santo
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», el contexto de saludo epistolar se expresa mejor en español con «con». «Beso» conserva el sentido de φίλημα sin eufemismo, y «santo» mantiene la cualidad consagrada del gesto.
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: saludan
  alternatives_spanish:
  - envían saludos
  - os saludan
  lexicon: BDAG
  rationale: En la clausura epistolar, el presente medio indica el acto de enviar saludos. «Saludan» es una equivalencia natural y concisa en español.
- source_word: οἱ ἅγιοι πάντες
  english_pob_choice: All the saints
  chosen_spanish: Todos los santos
  alternatives_spanish:
  - Todos los santos de Dios
  - Todos los creyentes
  lexicon: BDAG
  rationale: En Pablo, ἅγιοι designa a los creyentes como el pueblo santo de Dios. «Santos» preserva la continuidad léxica y el valor identitario sin sugerir una categoría eclesiástica posterior.
theological_decisions:
- issue: Sentido de ἅγιοι en un saludo paulino
  english_pob_reading: saints means believers, not a later canonized class
  chosen_spanish_reading: santos = creyentes, el pueblo santo de Dios, no una élite canonizada
  alternative_spanish_readings:
  - santos = personas canonizadas
  - santos = los que alcanzan un grado superior de santidad
  rationale: La lectura paulina normal de ἅγιοι es la de los creyentes apartados para Dios. «Santos» en español mantiene esa identidad comunitaria y evita importar un sentido eclesiástico posterior.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Carácter cultural y santificado del beso
  english_pob_reading: a culturally recognized greeting marked by holiness and Christian fellowship
  chosen_spanish_reading: un saludo culturalmente reconocido, marcado por la santidad y la comunión cristiana
  alternative_spanish_readings:
  - un gesto litúrgico
  - un mero beso afectuoso
  rationale: La frase no debe vaciarse a un afecto genérico ni rigidizarse indebidamente como rito técnico. «Beso santo» conserva el gesto reconocido culturalmente y su valor de comunión santa.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
translation_notes:
  revision_awareness: 'El borrador coincide con el sentido del texto griego y con el audit trail inglés: mantiene el imperativo recíproco, conserva «holy/sacred kiss» como opción léxica marcada, y refleja la lectura paulina de ἅγιοι como creyentes. No se registran revisiones posteriores que alteren estas decisiones.'
  spanish_consistency_notes:
  - Se usó «santo» en lugar de «sagrado» como opción principal para mantener cercanía con el léxico paulino y la naturalidad del español.
  - «Salúdense» representa mejor el matiz epistolar de ἀσπάζονται que un simple «den saludos» en la clausura.
  - Se mantuvo el plural comunitario en «unos a otros» y «Todos los santos» para reflejar la dimensión eclesial del versículo.
