translation:
  language: es
  text: Por lo demás[a], hermanos[b], alégrense, sean restaurados[c], reciban ánimo[d], piensen lo mismo[e], vivan en paz, y el Dios de amor y de paz estará con ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “adiós”; el griego puede funcionar como saludo de despedida, pero aquí probablemente sigue una cadena de exhortaciones: “alégrense”.'
    reason: lexical_alternative
  - marker: b
    text: “Hermanos” aquí se dirige a la congregación como un todo e incluye probablemente a hombres y mujeres.
    reason: cultural_note
  - marker: c
    text: O “sean hechos completos”, “sean restaurados” o “pónganse en orden” para “sean restaurados”.
    reason: lexical_alternative
  - marker: d
    text: O “reciban exhortación/ánimo” para “reciban ánimo”.
    reason: lexical_alternative
  - marker: e
    text: Literalmente, “piensen lo mismo”; es decir, “sean de un mismo sentir”.
    reason: lexical_alternative
lexical_decisions:
- source_word: Λοιπόν
  english_pob_choice: Finally
  chosen_spanish: Por lo demás
  alternatives_spanish:
  - Finalmente
  - En conclusión
  - Así pues
  lexicon: BDAG
  rationale: Como marcador discursivo de cierre, en español "por lo demás" transmite bien el paso final de la exhortación sin sonar rígido. Conserva la función epistolar de apertura a la conclusión mejor que un "finalmente" demasiado mecánico.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - personas hermanas
  lexicon: BDAG
  rationale: '"Hermanos" preserva la forma masculina plural del griego y sigue el criterio de no neutralizar la referencia en el texto principal. En contexto paulino, el vocativo congregacional incluye a toda la asamblea.'
- source_word: χαίρετε
  english_pob_choice: rejoice
  chosen_spanish: alegraos
  alternatives_spanish:
  - regocijaos
  - alégrense
  - estén alegres
  lexicon: BDAG
  rationale: El imperativo encadena una serie de exhortaciones, así que conviene mantener el valor verbal de χαίρω. "Alegraos" es la forma más directa y conserva la fuerza exhortativa.
- source_word: καταρτίζεσθε
  english_pob_choice: be restored
  chosen_spanish: sean restaurados
  alternatives_spanish:
  - sean puestos en orden
  - sean completos
  - sean reparados
  lexicon: BDAG
  rationale: El verbo puede implicar restaurar, completar o poner en buen estado. "Sean restaurados" conserva la idea de quedar corregidos/repuestos sin cargar la frase con una perfección absoluta que el contexto no exige.
- source_word: παρακαλεῖσθε
  english_pob_choice: be encouraged
  chosen_spanish: reciban ánimo
  alternatives_spanish:
  - sean consolados
  - acéptense la exhortación
  - anímense
  lexicon: BDAG
  rationale: La forma pasiva/media puede significar recibir ánimo, consuelo o exhortación. "Reciban ánimo" es natural en español moderno y mantiene la idea de una exhortación recibida, no solo producida.
- source_word: τὸ αὐτὸ φρονεῖτε
  english_pob_choice: think the same thing
  chosen_spanish: piensen lo mismo
  alternatives_spanish:
  - sean de un mismo sentir
  - tengan la misma manera de pensar
  - piensen de la misma manera
  lexicon: BDAG
  rationale: La expresión es literalmente cognitiva; por eso "piensen lo mismo" preserva la base de φρονέω sin diluirla en una fórmula más idiomática que pudiera ocultar la repetición léxica.
- source_word: εἰρηνεύετε
  english_pob_choice: live in peace
  chosen_spanish: vivan en paz
  alternatives_spanish:
  - estén en paz
  - busquen la paz
  - manténganse en paz
  lexicon: BDAG
  rationale: El imperativo presente sugiere una disposición continua. "Vivan en paz" expresa bien un estado y una práctica comunitaria sostenida.
- source_word: ὁ θεὸς τῆς ἀγάπης καὶ εἰρήνης
  english_pob_choice: the God of love and peace
  chosen_spanish: el Dios de amor y de paz
  alternatives_spanish:
  - el Dios caracterizado por amor y paz
  - el Dios del amor y de la paz
  lexicon: BDAG
  rationale: La construcción genitiva se rinde de forma directa y natural. Se conserva "Dios" y los sustantivos abstractos sin añadir explicaciones que el griego no requiere.
- source_word: ἔσται μεθ’ ὑμῶν
  english_pob_choice: will be with you
  chosen_spanish: estará con ustedes
  alternatives_spanish:
  - será con ustedes
  - estará junto a ustedes
  lexicon: BDAG
  rationale: El futuro simple expresa la promesa con claridad y naturalidad en español. "Con ustedes" mantiene el sentido de compañía comunitaria del plural de segunda persona.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en un saludo congregacional
  english_pob_reading: Render as 'brothers' in the main text, preserving the masculine form while recognizing the mixed congregation context.
  chosen_spanish_reading: Mantener "hermanos" en el texto principal, con el sentido congregacional inclusivo implícito.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermandad
  rationale: El texto griego usa el vocativo masculino plural y el criterio auditado favorece conservar esa forma en el cuerpo principal. En español, la nota puede recordar que se dirige a la congregación entera sin neutralizar la forma base.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacían falta cambios sustanciales y el nivel de acuerdo fue alto (0,92). Esta versión sigue ese consenso, ajustando el español para que suene publicable y manteniendo las tensiones léxicas documentadas en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεός y "amor" para ἀγάπη, conforme a los valores por defecto del proyecto.
  - Se evita imponer "SEÑOR" porque el versículo no contiene κύριος ni una cita directa del nombre divino.
  - '"hermanos" conserva la forma masculina plural, con la inclusión congregacional explicada en nota.'
  - '"alegraos" y las demás formas verbales preservan la serie de imperativos del griego.'
  - '"vivan en paz" traduce el aspecto exhortativo continuo de εἰρηνεύετε sin volverlo una mera fórmula nominal.'
