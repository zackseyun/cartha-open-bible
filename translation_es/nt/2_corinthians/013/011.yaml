revisions:
- from: Por lo demás, hermanos, alegraos, sean restaurados, reciban ánimo, piensen lo mismo, vivan en paz[a][b][c][d][e], y el Dios de amor y de paz estará con ustedes.
  to: Por lo demás[a], hermanos[b], alégrense, sean restaurados[c], reciban ánimo[d], piensen lo mismo[e], vivan en paz, y el Dios de amor y de paz estará con ustedes.
  rationale: La revisión corrige la incoherencia de registro para ajustarse al español neutral latinoamericano y reubica cada nota al pie en la palabra o frase que realmente comenta. El sentido del original y de la auditoría inglesa se mantiene sin cambios sustantivos.
