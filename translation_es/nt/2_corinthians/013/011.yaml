review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien la secuencia exhortativa del griego y conserva adecuadamente los sentidos principales: Λοιπόν como cierre discursivo, ἀδελφοί como vocativo congregacional, χαίρετε como exhortación verbal, καταρτίζεσθε como restauración, παρακαλεῖσθε como recibir ánimo/exhortación, τὸ αὐτὸ φρονεῖτε como unidad de pensamiento, εἰρηνεύετε como vida pacífica continua, y la promesa final de la presencia del Dios de amor y paz. Sin embargo, hay dos desajustes importantes: (1) el registro pronominal mezcla voseo plural peninsular (''alegraos'') con ustedes (''reciban'', ''vivan'', ''ustedes''), lo cual perjudica la coherencia del español meta; y (2) los marcadores de notas están anclados todos en ''vivan en paz'' en lugar de aparecer en las palabras/frases pertinentes del texto.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero la mezcla de registros ('alegraos' junto con 'ustedes') suena inconsistente para un español neutral latinoamericano. Conviene uniformar todo en formas de ustedes. También es preferible distribuir las notas junto a cada término relevante para evitar confusión lectora.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός -> ''Dios'', ἀγάπη -> ''amor'', εἰρήνη -> ''paz''. ''Hermanos'' sigue la decisión auditada para ἀδελφοί. No aparecen términos de glosario de mayor sensibilidad como Yahvé, Mesías, Espíritu, esclavo, etc.'
  issues:
  - severity: high
    issue: Mezcla de registros pronominales en el texto español
    rationale: 'El borrador usa ''alegraos'' (vosotros) pero luego ''sean/restaurados, reciban, piensen, vivan... ustedes'' (ustedes). Para español neutral latinoamericano debe mantenerse un solo registro, preferiblemente ''ustedes'': ''alégrense''.'
  - severity: medium
    issue: Anclaje incorrecto de las notas al pie
    rationale: Las notas [a][b][c][d][e] aparecen todas sobre 'vivan en paz', aunque corresponden respectivamente a 'Por lo demás', 'hermanos', 'sean restaurados', 'reciban ánimo' y 'piensen lo mismo'. Esto incumple la disciplina de anclar cada marcador en la frase pertinente.
  - severity: low
    issue: '''piensen la misma cosa'' en la nota es algo poco natural'
    rationale: 'Como glosa literal puede entenderse, pero en español suena mejor ''piensen lo mismo'' o ''la misma cosa'' solo si se justifica. La nota puede conservar la literalidad de manera más natural: ''Literalmente, “piensen lo mismo”''.'
