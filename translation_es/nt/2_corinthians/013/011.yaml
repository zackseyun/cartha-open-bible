base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/013/011.yaml
  text: Finally[a], brothers, rejoice, be restored, be encouraged, think the same thing, live in peace[e][d][c][b], and the God of love and peace will be with you.
  footnotes:
  - marker: a
    text: 'Or ''farewell''; the Greek can function as a closing greeting, but here it likely continues the series of exhortations: ''rejoice.'''
    reason: lexical_alternative
  - marker: b
    text: '''Brothers'' here addresses the congregation corporately and likely includes both men and women.'
    reason: cultural_note
  - marker: c
    text: Or 'be made complete,' 'be restored,' or 'put yourselves in order' for 'be restored.'
    reason: lexical_alternative
  - marker: d
    text: Or 'accept encouragement/exhortation' for 'be encouraged.'
    reason: lexical_alternative
  - marker: e
    text: Literally 'think the same thing'; that is, 'be of one mind.'
    reason: lexical_alternative
