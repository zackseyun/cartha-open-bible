source:
  edition: SBLGNT
  text: καὶ ⸀γὰρ ἐσταυρώθη ἐξ ἀσθενείας, ἀλλὰ ζῇ ἐκ δυνάμεως θεοῦ. καὶ γὰρ ἡμεῖς ἀσθενοῦμεν ἐν αὐτῷ, ἀλλὰ ⸀ζήσομεν σὺν αὐτῷ ἐκ δυνάμεως θεοῦ εἰς ὑμᾶς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/013/004.yaml
  text: For indeed he was crucified in weakness[a], but he lives by the power of God. For indeed we are weak in him[d][c][b], but we will live with him by the power of God toward you.
  footnotes:
  - marker: a
    text: Or 'in weakness' for 'from weakness'; the Greek uses ἐξ, which more literally expresses source or basis.
    reason: lexical_alternative
  - marker: b
    text: Or 'by the power of God' for 'from the power of God'; the Greek repeats ἐκ to set divine power in deliberate contrast with weakness.
    reason: lexical_alternative
  - marker: c
    text: '''We will live with him'' may refer to Paul''s future exercise of Christ-empowered life in relation to the Corinthians, and may also echo broader resurrection-life themes.'
    reason: alternative_reading
  - marker: d
    text: Or 'for you' / 'among you' for 'toward you'; the Greek εἰς ὑμᾶς is somewhat compressed and can indicate direction, relation, or effect.
    reason: lexical_alternative
