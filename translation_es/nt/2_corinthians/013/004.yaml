translation:
  language: es
  text: Porque en verdad fue crucificado en debilidad[a], pero vive por el poder de Dios. Porque en verdad nosotros somos débiles en él, pero viviremos con él[c] por el poder de Dios[b] hacia ustedes[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'desde la debilidad' para ἐξ ἀσθενείας; el griego usa ἐξ, que con más literalidad expresa fuente o base.
    reason: lexical_alternative
  - marker: b
    text: O 'desde el poder de Dios' para ἐκ δυνάμεως θεοῦ; el griego repite ἐκ para conservar el contraste deliberado con la debilidad.
    reason: lexical_alternative
  - marker: c
    text: '''Viviremos con él'' puede referirse al futuro ejercicio de la vida capacitada por Cristo en la relación de Pablo con los corintios, y también puede evocar temas más amplios de vida de resurrección.'
    reason: alternative_reading
  - marker: d
    text: O 'para ustedes' / 'entre ustedes' para 'hacia ustedes'; εἰς ὑμᾶς puede indicar dirección, relación o efecto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐσταυρώθη
  english_pob_choice: was crucified
  chosen_spanish: fue crucificado
  alternatives_spanish:
  - fue puesto en una cruz
  lexicon: BDAG
  rationale: El aoristo pasivo de σταυρόω se expresa de manera precisa y natural como 'fue crucificado', manteniendo el hecho histórico y el matiz pasivo del griego.
- source_word: ἐξ ἀσθενείας
  english_pob_choice: in weakness
  chosen_spanish: en debilidad
  alternatives_spanish:
  - desde la debilidad
  - por debilidad
  lexicon: BDAG
  rationale: Aunque el audit trail inglés notó el valor de fuente/base de ἐκ/ἐξ, la revisión posterior prefirió una formulación más natural. En español, 'en debilidad' conserva el contraste paulino entre debilidad aparente y poder divino sin forzar una construcción poco idiomática.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  lexicon: BDAG
  rationale: El presente activo de ζάω requiere un verbo dinámico; 'vive' conserva la acción continua mejor que una simple descripción estática.
- source_word: ἐκ δυνάμεως θεοῦ
  english_pob_choice: by the power of God
  chosen_spanish: por el poder de Dios
  alternatives_spanish:
  - desde el poder de Dios
  - mediante el poder de Dios
  lexicon: BDAG
  rationale: El griego repite ἐκ para contrastar con ἐξ ἀσθενείας. En español, 'por el poder de Dios' comunica bien la causalidad o agente efectivo sin sonar forzado; se mantiene la referencia explícita a Dios.
- source_word: ἀσθενοῦμεν
  english_pob_choice: are weak
  chosen_spanish: somos débiles
  alternatives_spanish:
  - estamos débiles
  - somos impotentes
  lexicon: BDAG
  rationale: '''Somos débiles'' reproduce el campo semántico de ἀσθενέω y mantiene la relación léxica con ἀσθενείας en la primera cláusula. ''Somos'' funciona mejor en español bíblico que un mero estado transitorio.'
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - con él
  - en unión con él
  lexicon: BDAG
  rationale: Se preserva la preposición 'en' para mantener la compacta idea paulina de unión/esfera en Cristo sin explicarla en exceso.
- source_word: ζήσομεν
  english_pob_choice: we will live
  chosen_spanish: viviremos
  alternatives_spanish:
  - seguiremos viviendo
  - viviremos para siempre
  lexicon: BDAG
  rationale: El futuro activo exige futuro español; 'viviremos' conserva la apertura semántica entre vida apostólica vindicada y resonancias de vida resurreccional.
- source_word: σὺν αὐτῷ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: σύν indica asociación; 'con él' es la forma más natural y suficiente en español.
- source_word: εἰς ὑμᾶς
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - para ustedes
  - entre ustedes
  - en relación con ustedes
  lexicon: BDAG
  rationale: Se conserva la noción direccional de εἰς sin cerrar el sentido a una sola posibilidad. 'Hacia ustedes' permite oír referencia, efecto o orientación del actuar apostólico.
theological_decisions:
- issue: Sentido de 'crucificado en debilidad'
  english_pob_reading: The phrase refers to the mode or sphere of apparent human weakness in which he was crucified, not to any denial of Christ's true deity or sinlessness.
  chosen_spanish_reading: La frase se entiende como el modo o esfera de debilidad aparente en la que fue crucificado, sin negar su verdadera deidad ni su ausencia de pecado.
  alternative_spanish_readings:
  - Énfasis solo en cómo fue percibido humanamente como débil
  rationale: La traducción conserva la tensión paulina entre debilidad y poder sin resolverla ni insinuar una cristología heterodoxa. Se mantiene el lenguaje bíblico de la debilidad y la vida en poder divino.
  doctrine_reference: Credo Niceno; Definición de Calcedonia
- issue: Alcance de 'viviremos con él'
  english_pob_reading: The phrase is left broad enough to include Paul's apostolic life/power manifested in relation to the Corinthians, without restricting it to either present ministry or final resurrection alone.
  chosen_spanish_reading: La frase queda lo bastante abierta para incluir la vida y el poder apostólicos de Pablo en relación con los corintios, sin limitarla ni al ministerio presente ni solo a la resurrección final.
  alternative_spanish_readings:
  - Referencia exclusiva a la vida resucitada futura
  - Referencia exclusiva al ministerio apostólico presente
  rationale: 'La forma española conserva la tensión deliberada del contexto: Pablo habla de su debilidad actual, pero también de la vida compartida con Cristo y de su efecto hacia los corintios.'
  doctrine_reference: 'Principio de traducción POB: preservar la tensión teológica en lugar de resolverla'
translation_notes:
  revision_awareness: El inglés POB pasó de 'from weakness' y 'from the power of God' a 'in weakness' y 'by the power of God' en una revisión posterior por naturalidad y precisión. La presente versión española sigue esa revisión, pero conserva en nota la alternativa más literal donde el griego permite un matiz de fuente o base. También se preserva la apertura de ζήσομεν σὺν αὐτῷ y de εἰς ὑμᾶς, sin estrechar el alcance teológico del verso.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ, sin sustituciones eclesiásticas.
  - Se traduce ἀσθενεία / ἀσθενοῦμεν con la misma raíz léxica ('debilidad' / 'somos débiles') para preservar la relación interna del verso.
  - '''Hacia ustedes'' se usa para εἰς ὑμᾶς por claridad moderna, pero las notas conservan las alternativas ''para ustedes'' y ''entre ustedes''.'
  - No se introduce 'Cristo' porque el versículo usa pronombres referidos a Jesús y la forma española funciona mejor sin añadir un título no presente en el texto.
  - Se evita una paráfrasis expansiva para mantener el paralelismo entre crucifixión en debilidad, vida por el poder de Dios y la futura vida con él.
