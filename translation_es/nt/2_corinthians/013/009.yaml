  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: χαίρομεν = «nos gozamos», ἀσθενῶμεν / δυνατοὶ = contraste «débiles / fuertes», y κατάρτισιν = «restauración» con alternativas preservadas en nota. Sin embargo, «esto también es lo que oramos» suena menos natural en español que una formulación más directa, y la nota debe alinearse mejor con las alternativas documentadas en inglés para κατάρτισις.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «nosotros somos débiles» está algo cargado y «esto también es lo que oramos» resulta poco idiomático. Una ligera pulida mejora la naturalidad sin apartarse del griego ni del rastro de auditoría inglés.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Restauración» para κατάρτισις concuerda con la decisión léxica y teológica del POB; conviene conservar en nota «madurez» y «ser hechos completos» en vez de introducir «equipamiento» como alternativa de traducción española principal.
  issues:
  - severity: medium
    issue: 'Frase poco natural: «Y esto también es lo que oramos»'
    rationale: Aunque refleja el énfasis de τοῦτο καὶ εὐχόμεθα, en español eclesial natural suena mejor «Y también oramos por esto» o «Y esto también es lo que pedimos en oración». La redacción actual parece calco del inglés.
  - severity: low
    issue: Énfasis pronominal algo pesado en «cuando nosotros somos débiles»
    rationale: ἡμεῖς sí aporta contraste, pero en español puede mantenerse con «cuando somos débiles» sin perder sentido, especialmente porque el contraste ya sigue con «y ustedes son fuertes».
  - severity: low
    issue: Nota léxica algo desalineada con el audit trail inglés
    rationale: 'La nota inglesa preserva alternativas de traducción («your maturity», «your being made complete») y luego explica que el griego puede referirse a restauración, equipamiento o poner algo en condición adecuada. En español conviene mantener esa misma estructura, pero con formulación más natural: «ser llevados a un estado completo» o equivalente.'
  revised_spanish_text: 'Porque nos gozamos cuando somos débiles y ustedes son fuertes[a]. Y también oramos por esto: su restauración.'
