translation:
  language: es
  text: 'Porque nos gozamos cuando somos débiles y ustedes son fuertes[a]. Y también oramos por esto: su restauración.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su madurez» o «su ser hechos completos». El griego puede referirse a restauración, equipamiento o a llevar algo a su condición adecuada.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρομεν
  english_pob_choice: we rejoice
  chosen_spanish: nos gozamos
  alternatives_spanish:
  - nos alegramos
  lexicon: BDAG
  rationale: El griego expresa gozo activo, no solo ausencia de tristeza. «Nos gozamos» conserva ese matiz más fuerte y suena natural en español bíblico actual.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Conecta de modo explicativo con el contexto previo. «Porque» mantiene la relación causal/explicativa con fluidez en español.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Con el subjuntivo griego, la cláusula tiene valor temporal general. «Cuando» comunica bien ese sentido sin sobrecargar el español.
- source_word: ἀσθενῶμεν
  english_pob_choice: we are weak
  chosen_spanish: nosotros somos débiles
  alternatives_spanish:
  - nos sentimos débiles
  - somos débiles
  lexicon: BDAG
  rationale: Se conserva el contraste amplio de debilidad física, social o retórica. «Somos débiles» es directo y fiel; se explicita el sujeto por claridad y paralelismo.
- source_word: δυνατοὶ
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosos
  lexicon: BDAG
  rationale: La oposición natural de «débil» en español es «fuerte». «Fuertes» reproduce mejor el contraste retórico que «poderosos».
- source_word: εὐχόμεθα
  english_pob_choice: we pray
  chosen_spanish: oramos
  alternatives_spanish:
  - pedimos en oración
  - rogamos
  lexicon: BDAG
  rationale: En este contexto paulino, εὔχομαι se entiende como acto de oración/petición. «Oramos» es claro y digno en español.
- source_word: κατάρτισιν
  english_pob_choice: your restoration
  chosen_spanish: su restauración
  alternatives_spanish:
  - su madurez
  - su perfección
  - su completa restauración
  lexicon: BDAG
  rationale: κατάρτισις puede referirse a restauración, equipamiento o llevar algo a su condición adecuada. «Restauración» capta bien la idea de ser puestos en orden o en condición correcta, sin excluir las otras posibilidades.
theological_decisions:
- issue: Sentido pastoral de κατάρτισις
  english_pob_reading: your restoration
  chosen_spanish_reading: su restauración
  alternative_spanish_readings:
  - su madurez
  - su perfección
  - su completa restauración
  rationale: El contexto de corrección y relación pastoral favorece una idea de ser restablecidos o puestos en orden. «Restauración» evita imponer una doctrina técnica de perfeccionismo y mantiene abierta la amplitud semántica del término.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y el audit trail en inglés. Se preservó el contraste «débiles / fuertes» y la ambigüedad léxica de κατάρτισις mediante una nota alternativa, sin introducir explicaciones ajenas al versículo.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; aquí no corresponde.
  - Se mantuvo «restauración» como término principal para κατάρτισις por consistencia con el POB inglés.
  - «Nos gozamos» y «oramos» reflejan el tono paulino sin caer en arcaísmos innecesarios.
  - Se optó por «fuertes» en lugar de «poderosos» para conservar el paralelismo antitético con «débiles».
