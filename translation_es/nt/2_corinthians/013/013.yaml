review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura trinitaria de la bendición y conserva adecuadamente χάρις, ἀγάπη, κοινωνία y μετὰ πάντων ὑμῶν. Sin embargo, no sigue la decisión léxica/theológica auditada del POB para Χριστοῦ como título: el inglés principal tiene ''Jesus Messiah'' con nota alternativa ''Jesus Christ'', mientras que el español puso ''Jesucristo'' en el texto principal. Además, el inglés preserva alternativas para κοινωνία (''communion'' / ''participation in''), y el español omitió esa nota léxica.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'La comunión del Espíritu Santo' y 'sea con todos ustedes' suenan bien en una bendición. El único ajuste de calidad/terminología importante es usar 'Jesús el Mesías' para reflejar el valor titulativo documentado, dejando 'Jesucristo' como alternativa tradicional en nota.
  glossary_alignment: Alinea bien con 'gracia', 'Dios', 'Espíritu Santo' y la amplitud semántica de κοινωνία. Pero se aparta del estándar del proyecto para Χριστός, que normalmente debe traducirse como 'Mesías' cuando es título, salvo carve-out documentado; aquí el audit trail inglés no documenta una excepción para mantener 'Cristo' en el texto principal. Por tanto, el español debe seguir 'Jesús el Mesías' y conservar 'Jesucristo' como alternativa tradicional. También conviene reflejar en notas las alternativas de κοινωνία preservadas por el POB inglés.
  issues:
  - severity: high
    issue: Χριστοῦ se vertió como 'Jesucristo' en el texto principal en vez de un equivalente titulativo.
    rationale: El source y el audit trail inglés tratan Χριστοῦ como título ('Jesus Messiah'), con 'Jesus Christ' solo como alternativa tradicional. El proyecto indica traducir títulos como 'Mesías' salvo excepción documentada; aquí no la hay.
  - severity: medium
    issue: Falta la nota léxica para κοινωνία.
    rationale: El POB inglés preserva alternativas significativas ('communion' / 'participation in the Holy Spirit'). En español, 'comunión' es válida, pero también debe conservarse la posibilidad de 'participación en el Espíritu Santo' y, si se desea, la variante tradicional ya usada en el texto principal puede quedar sin nota; la nota debe reflejar las alternativas relevantes del audit trail.
  revised_spanish_text: La gracia del Señor Jesús el Mesías[a], y el amor de Dios, y la comunión del Espíritu Santo[b], sea con todos ustedes.
  revised_footnotes:
  - marker: a
    text: O, tradicionalmente, «Jesucristo».
    reason: alternative_reading
  - marker: b
    text: O «la participación en el Espíritu Santo».
    reason: lexical_alternative
