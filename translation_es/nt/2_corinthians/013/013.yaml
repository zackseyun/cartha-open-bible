revisions:
- from: La gracia del Señor Jesucristo, y el amor de Dios, y la comunión del Espíritu Santo[a], sea con todos ustedes.
  to: La gracia del Señor Jesús el Mesías[a], y el amor de Dios, y la comunión del Espíritu Santo[b], sea con todos ustedes.
  rationale: Se revisa 'Jesucristo' a 'Jesús el Mesías' para obedecer la decisión auditada de traducir Χριστοῦ como título en el texto principal, conservando la forma tradicional en nota. Se mantiene 'comunión' para κοινωνία por su idoneidad benedictoria y amplitud semántica, pero se añade la alternativa 'participación en el Espíritu Santo' para preservar la gama documentada en el POB inglés. El resto del versículo está bien alineado con el griego y suena natural en español.
