translation:
  language: es
  text: La gracia del Señor Jesús el Mesías[a], y el amor de Dios, y la comunión del Espíritu Santo[b], sea con todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «Jesucristo».
    reason: alternative_reading
  - marker: b
    text: O «la participación en el Espíritu Santo».
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En una bendición paulina, «gracia» conserva el peso teológico normal de χάρις y suena natural en español. «Favor» sería posible, pero pierde la densidad doctrinal y la resonancia litúrgica del término.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: En este contexto cristológico, κύριος funciona como título de dignidad y se vierte de forma estable como «Señor». «Maestro» no corresponde al uso benedictorio ni al valor del término aquí.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús el Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque el POB inglés explicita la tensión entre título y nombre, en español la forma más natural y reconocible en esta fórmula doxológica es «Jesucristo». Mantiene la identificación tradicional sin perder el referente cristológico; «Mesías» sería posible, pero aquí sonaría menos idiomático en la bendición fija.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: «Amor» es la equivalencia directa y la más natural en español. «Caridad» sería más restringido y puede sonar eclesiástico o moralizado.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios para ustedes
  - de Dios hacia ustedes
  lexicon: BDAG
  rationale: Se mantiene el genitivo simple sin especificar el sentido subjetivo u objetivo. La formulación española preserva la apertura del original y evita resolver la relación semántica más allá de lo que el texto exige.
- source_word: κοινωνία
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - participación
  - compañerismo
  lexicon: BDAG
  rationale: En esta fórmula benedictoria, «comunión» conserva el campo semántico de κοινωνία y permite mantener la tensión entre relación compartida y participación. «Participación» sería demasiado explicativa; «compañerismo» es más coloquial y menos preciso.
- source_word: ἁγίου πνεύματος
  english_pob_choice: the Holy Spirit
  chosen_spanish: Espíritu Santo
  alternatives_spanish:
  - Espíritu Santo de Dios
  - santo espíritu
  lexicon: BDAG
  rationale: La mayúscula y la forma fija «Espíritu Santo» reflejan que el texto se refiere a la persona divina, no simplemente a un espíritu santo cualitativo. Es la forma estándar y reverente en español.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: be with all of you
  chosen_spanish: sea con todos ustedes
  alternatives_spanish:
  - esté con todos ustedes
  - sea con ustedes todos
  lexicon: BDAG
  rationale: En español, la bendición requiere suplir el verbo copulativo implícito. «Sea con todos ustedes» refleja mejor la fórmula litúrgica y conserva la inclusividad explícita de πάντων ὑμῶν.
theological_decisions:
- issue: Cómo reflejar Χριστοῦ en español sin borrar el valor titulativo
  english_pob_reading: Jesus Messiah / traditionally, Jesus Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús el Mesías
  - Jesús Cristo
  rationale: El audit trail inglés reconoce la tensión entre traducción titulativa y forma tradicional. En español, «Jesucristo» es la forma consagrada y más inteligible en una bendición breve. No se usa «Mesías» en el texto principal porque aquí sonaría menos natural y podría romper la cadencia litúrgica del versículo.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; preserve meaningful tension where possible'
- issue: Sense of κοινωνία τοῦ ἁγίου πνεύματος
  english_pob_reading: the fellowship of the Holy Spirit
  chosen_spanish_reading: la comunión del Espíritu Santo
  alternative_spanish_readings:
  - la participación en el Espíritu Santo
  - la comunión con el Espíritu Santo
  rationale: 'Se preserva la ambigüedad teológica del genitivo: puede aludir a comunión que procede del Espíritu, comunión en torno al Espíritu o participación en el Espíritu. «Comunión» en español deja abierta esa tensión sin forzar una sola lectura.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto sigue la revisión más reciente sin cambios sustantivos; la principal adaptación es hacer explícita en español la fórmula benedictoria con el verbo implícito «sea», manteniendo el orden y las tres cláusulas coordinadas del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ y «Espíritu Santo» para πνεύματος, conforme a los valores contextuales del pasaje.
  - Se evita «SEÑOR» en mayúsculas como convención de ocultación del nombre divino, porque aquí κύριος se refiere a Jesús como título cristológico.
  - La opción «comunión» conserva mejor la amplitud de κοινωνία que una sola glosa como «participación».
  - La puntuación con comas refleja la coordinación tripartita del original y la cadencia benedictoria en español.
