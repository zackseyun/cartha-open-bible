    text: O «que el Mesías está hablando por medio de mí». El griego dice más literalmente «el Mesías que habla en mí».
    reason: lexical_alternative
  - marker: b
    text: O «en medio de ustedes».
    reason: lexical_alternative
  revision_rationale: Se ajusta ἐν ὑμῖν a «en ustedes» para seguir la decisión final auditada y la forma más directa del griego, dejando la lectura comunitaria como alternativa en nota. También se cambia «evidencia» por «prueba» para reflejar mejor δοκιμήν, y «respecto de ustedes» por «hacia ustedes» para una expresión más natural sin perder la fuerza relacional de εἰς ὑμᾶς.
