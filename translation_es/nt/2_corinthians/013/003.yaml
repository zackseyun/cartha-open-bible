review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura causal y el contraste principal del griego: ἐπεὶ = «puesto que», δοκιμήν ζητεῖτε = «buscan evidencia/prueba», «el Mesías habla en mí», y «no es débil ... sino poderoso». Sin embargo, se aparta del estado auditado del English POB en un punto importante: el texto principal inglés vigente tiene «is powerful in you», mientras el español pone «en medio de ustedes» y relega «en ustedes» a nota. Dado que el griego ἐν ὑμῖν permite directamente «en ustedes» y el audit trail final restauró esa lectura en el texto principal, el español debe alinearse con ello. Además, «evidencia de que» es entendible, pero «prueba de que» corresponde mejor a δοκιμήν y al razonamiento documentado.'
  spanish_quality_summary: 'El español es claro y digno, pero «respecto de ustedes» suena algo rígido; «hacia ustedes» o «para con ustedes» sería más natural. Aun así, no es un error grave. La reparación necesaria es principalmente de fidelidad/alineación: cambiar «en medio de ustedes» por «en ustedes». También conviene ajustar la nota [b], porque actualmente solo repite la lectura que debe ir en el texto principal. El resto del verso es legible y eclesialmente natural.'
  glossary_alignment: Correcto en «Mesías» para Χριστοῦ, en conformidad con la política doctrinal del proyecto. «Habla en mí» preserva bien ἐν ἐμοί, con nota alternativa adecuada para «por medio de mí». No hay términos del glosario mayor en conflicto salvo la necesidad de no desplazar ἐν ὑμῖν desde «en ustedes» al texto principal alternativo «en medio de ustedes» contra la revisión auditada final.
  issues:
  - severity: medium
    issue: El texto principal usa «en medio de ustedes» para ἐν ὑμῖν
    rationale: El audit trail final del English POB dejó «is powerful in you» en el texto principal. Aunque «en medio de ustedes» es una interpretación posible en contexto comunitario, aquí desplaza una decisión ya documentada y más directa al griego.
  - severity: low
    issue: La nota [b] queda invertida respecto de la decisión principal
    rationale: Si el texto principal debe decir «en ustedes», la alternativa puede conservar «en medio de ustedes» o «entre ustedes», no al revés.
  - severity: low
    issue: «evidencia de que» es menos preciso que «prueba de que»
    rationale: La documentación léxica inglesa favorece «proof» como validación demostrativa. «Prueba de que» es más directo y más cercano al valor argumentativo de δοκιμήν en este contexto.
  revised_spanish_text: puesto que ustedes buscan prueba de que el Mesías habla en mí[a]—él no es débil hacia ustedes, sino que es poderoso en ustedes[b],
  revised_footnotes:
