translation:
  language: es
  text: puesto que ustedes buscan prueba de que el Mesías habla en mí[a]—él no es débil hacia ustedes, sino que es poderoso en ustedes[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que el Mesías está hablando por medio de mí». El griego dice más literalmente «el Mesías que habla en mí».
    reason: lexical_alternative
  - marker: b
    text: O «en medio de ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - pues que
  lexicon: BDAG
  rationale: Introduce la razón del argumento de Pablo. «Puesto que» conserva bien la fuerza causal sin sonar forzado en español moderno.
- source_word: δοκιμήν
  english_pob_choice: proof
  chosen_spanish: evidencia
  alternatives_spanish:
  - prueba
  - demostración
  - confirmación
  lexicon: BDAG
  rationale: Aquí el sentido apunta a la evidencia que valida, no al acto de examinar. «Evidencia» comunica la idea con naturalidad en español y evita reducirlo a una simple «prueba» formal.
- source_word: ζητεῖτε
  english_pob_choice: you are seeking
  chosen_spanish: buscan
  alternatives_spanish:
  - están buscando
  - buscan continuamente
  - siguen pidiendo
  lexicon: BDAG
  rationale: El presente se entiende como demanda vigente. «Buscan» es natural y conserva el matiz de una búsqueda insistente sin sobrecargar la frase.
- source_word: τοῦ ἐν ἐμοὶ λαλοῦντος Χριστοῦ
  english_pob_choice: that Messiah is speaking in me
  chosen_spanish: de que el Mesías habla en mí
  alternatives_spanish:
  - de que el Mesías está hablando en mí
  - de que Cristo habla en mí
  - de que el Mesías habla por medio de mí
  lexicon: BDAG
  rationale: La construcción griega funciona bien como contenido dependiente de «evidencia». Se conserva «en mí» porque esa es la preposición explícita; «por medio de mí» se deja fuera del texto principal para no resolver una tensión interpretativa no expresada de forma directa.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se sigue la preferencia POB para Χριστός como título. «Mesías» mantiene el valor titular y evita tratarlo como mero nombre propio.
- source_word: ὃς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - quien
  - el cual
  lexicon: BDAG
  rationale: En español resulta más fluido iniciar la nueva cláusula con «él», manteniendo la referencia al Mesías.
- source_word: εἰς ὑμᾶς
  english_pob_choice: toward you
  chosen_spanish: respecto de ustedes
  alternatives_spanish:
  - hacia ustedes
  - con respecto a ustedes
  - para ustedes
  lexicon: BDAG
  rationale: La idea es relacional/direccional. «Respecto de ustedes» evita exagerar un movimiento espacial y encaja con el contraste que sigue.
- source_word: οὐκ ἀσθενεῖ
  english_pob_choice: is not weak
  chosen_spanish: no es débil
  alternatives_spanish:
  - no es impotente
  - no actúa con debilidad
  - no carece de fuerza
  lexicon: BDAG
  rationale: Se conserva el contraste léxico con δυνατεῖ. «Débil» es el equivalente más directo y claro en español.
- source_word: ἀλλὰ δυνατεῖ
  english_pob_choice: but is powerful
  chosen_spanish: sino que es poderoso
  alternatives_spanish:
  - sino que tiene poder
  - sino que es fuerte
  - sino que ejerce poder
  lexicon: BDAG
  rationale: El verbo raro δυνατέω se expresa con un término de poder que contraste directamente con «débil». «Poderoso» es natural y mantiene la oposición.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en medio de ustedes
  alternatives_spanish:
  - en ustedes
  - entre ustedes
  lexicon: BDAG
  rationale: Aunque la forma literal es «en ustedes», el contexto corporativo favorece una lectura de presencia/acción en medio de la comunidad. «En medio de ustedes» preserva esa fuerza sin cerrar la posibilidad de la lectura más interior.
theological_decisions:
- issue: Rendering Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la decisión doctrinal de traducir Χριστός como título cuando el contexto lo presenta así. «Mesías» conserva el valor semántico del título y evita una forma meramente litúrgica o nominal.
  doctrine_reference: 'DOCTRINE.md: Χριστός normalmente se traduce «Mesías» cuando funciona como título.'
- issue: Force of ἐν ἐμοί and ἐν ὑμῖν
  english_pob_reading: '''speaking in me'' and ''powerful in you'''
  chosen_spanish_reading: '''habla en mí'' y ''es poderoso en medio de ustedes'''
  alternative_spanish_readings:
  - '''habla por medio de mí'''
  - '''es poderoso en ustedes'''
  rationale: Se conserva «en mí» en el texto principal porque esa es la forma explícita del griego. Para ἐν ὑμῖν, «en medio de ustedes» refleja mejor el sujeto plural y el marco comunitario. Así no se resuelve de antemano si la fuerza está dentro de cada creyente o en la comunidad como conjunto.
  doctrine_reference: 'DOCTRINE.md: conservar la tensión teológica y no resolverla indebidamente'
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra dos ajustes relevantes: la preferencia doctrinal por Χριστός → «Mesías» y la oscilación entre «among you» / «in you» para ἐν ὑμῖν. El borrador español mantiene «Mesías» y opta por una solución comunitaria («en medio de ustedes») para preservar el matiz relacional sin cerrar la ambigüedad del griego. También conserva «en mí» de forma explícita, con nota alternativa para la lectura más interpretativa «por medio de mí».'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al criterio POB y no «Cristo» como forma de nombre fijo.
  - Se evita «SEÑOR» u otras sustituciones de máscara porque aquí no aparece el Tetragrámaton.
  - Se mantiene un tono bíblico moderno, pero sin arcaismos innecesarios.
  - La puntuación con raya mantiene la oposición fuerte entre la negación y el contraste final.
