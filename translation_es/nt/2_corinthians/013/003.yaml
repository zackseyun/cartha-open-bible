- from: puesto que ustedes buscan evidencia de que el Mesías habla en mí[a]—él no es débil respecto de ustedes, sino que es poderoso en medio de ustedes[b],
  to: puesto que ustedes buscan prueba de que el Mesías habla en mí[a]—él no es débil hacia ustedes, sino que es poderoso en ustedes[b],
