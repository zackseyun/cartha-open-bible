  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y sentido general del griego: la carta surge de mucha aflicción y angustia interior, fue escrita con lágrimas, no para causar tristeza sino para que los corintios conozcan el amor de Pablo. Sin embargo, dos elecciones necesitan ajuste para alinearse mejor con el origen/causa expresado por ἐκ y con el español natural en λυπηθῆτε.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero 'desde mucha aflicción' suena poco idiomático para expresar origen emocional, y 'fueran entristecidos' resulta innecesariamente forzado en español moderno. 'Con muchas lágrimas' es natural y aceptable para διὰ πολλῶν δακρύων, y 'especialmente por ustedes' comunica bien el énfasis relacional final.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Amor' para ἀγάπην es correcto. La revisión propuesta mantiene la fidelidad léxica y mejora la naturalidad sin apartarse del rastro auditado en inglés.
  issues:
  - severity: medium
    issue: '''desde mucha aflicción'' para ἐκ ... θλίψεως καὶ συνοχῆς καρδίας'
    rationale: Aunque intenta reflejar origen, en español suena espacial o temporal más que causal/originario. 'En medio de mucha aflicción' o 'desde en medio de' serían mejores, pero la opción más natural y fiel aquí es 'en medio de mucha aflicción y angustia de corazón'.
  - severity: medium
    issue: '''fueran entristecidos'' para λυπηθῆτε'
    rationale: La pasiva está representada, pero la construcción suena dura y poco idiomática. 'Se entristecieran' preserva el sentido de resultar entristecidos y lee mucho mejor en español eclesial contemporáneo.
  - severity: low
    issue: La nota [a] queda invertida respecto a la mejor opción española
    rationale: Si se adopta 'se entristecieran' en el texto principal, la alternativa puede registrar 'fueran entristecidos' como opción más literal de forma.
  revised_spanish_text: Porque en medio de mucha aflicción y angustia de corazón les escribí con muchas lágrimas, no para que se entristecieran[a], sino para que conocieran el amor que tengo especialmente por ustedes[b].
  revised_footnotes:
