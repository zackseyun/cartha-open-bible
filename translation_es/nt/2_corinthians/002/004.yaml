revisions:
- from: Porque desde mucha aflicción y angustia de corazón les escribí con muchas lágrimas, no para que fueran entristecidos[a], sino para que conocieran el amor que tengo especialmente por ustedes[b].
  to: Porque en medio de mucha aflicción y angustia de corazón les escribí con muchas lágrimas, no para que se entristecieran[a], sino para que conocieran el amor que tengo especialmente por ustedes[b].
  rationale: Se ajusta ἐκ a una expresión española más natural de circunstancia/origen emocional ('en medio de') y se reemplaza la pasiva forzada 'fueran entristecidos' por 'se entristecieran', que comunica mejor λυπηθῆτε en español actual sin perder el sentido. Se conservan las notas léxicas pertinentes, reordenando la de [a] para que corresponda al nuevo texto principal.
