translation:
  language: es
  text: 'Por esto también escribí: para saber la prueba de ustedes[a], si son obedientes en todo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la comprobación de ustedes» o «su carácter probado».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰς τοῦτο
  english_pob_choice: For this is why
  chosen_spanish: Por esto también
  alternatives_spanish:
  - para esto
  - por esta razón
  lexicon: —
  rationale: La frase introduce la razón de la carta; «por esto» conserva el valor causal/puntual sin sonar forzado en español. Se añadió «también» para reflejar el καὶ aditivo de Pablo.
- source_word: ἔγραψα
  english_pob_choice: wrote
  chosen_spanish: escribí
  alternatives_spanish:
  - he escrito
  - redacté
  lexicon: —
  rationale: El aoristo se rinde naturalmente con pretérito perfecto simple en español.
- source_word: ἵνα γνῶ
  english_pob_choice: so that I might know
  chosen_spanish: para conocer
  alternatives_spanish:
  - para que yo conociera
  - a fin de conocer
  lexicon: —
  rationale: Se preserva la finalidad sin recargar la frase; «conocer» expresa el resultado buscado con naturalidad en español.
- source_word: τὴν δοκιμὴν ὑμῶν
  english_pob_choice: the proof of you
  chosen_spanish: la prueba de ustedes
  alternatives_spanish:
  - el test de ustedes
  - la evidencia de ustedes
  lexicon: —
  rationale: «δοκιμή» puede denotar prueba, examen o evidencia/resultante del examen. «Prueba» mantiene la tensión semántica sin importar una lectura interpretativa como «carácter probado».
- source_word: ὑμῶν
  english_pob_choice: your / of you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes mismos
  lexicon: —
  rationale: La construcción posesiva se vuelve natural en español; «ustedes» es neutro y ampliamente inteligible.
- source_word: ὑπήκοοί ἐστε
  english_pob_choice: you are obedient
  chosen_spanish: son obedientes
  alternatives_spanish:
  - obedecen
  - están obedientes
  lexicon: —
  rationale: «ὑπήκοος» describe obediencia efectiva; se conserva el adjetivo/predicado con el valor de disposición y práctica obediente.
- source_word: εἰς πάντα
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo asunto
  lexicon: —
  rationale: Expresa la amplitud total del alcance sin calco innecesario.
theological_decisions:
- issue: Sentido de δοκιμή entre 'prueba', 'test' y 'carácter probado'
  english_pob_reading: the proof of you
  chosen_spanish_reading: la prueba de ustedes
  alternative_spanish_readings:
  - el test de ustedes
  - su carácter probado
  rationale: El contexto inmediato habla de obediencia, pero el texto griego no obliga a convertir el sustantivo en una cualidad moral ya interpretada. «Prueba» conserva la ambigüedad útil entre proceso y resultado, como hace el ajuste revisado del POB en inglés.
  doctrine_reference: No doctrinal issue; lexical nuance only.
translation_notes:
  revision_awareness: El inglés POB revisó 'your proven character' a 'the proof of you' para reflejar más directamente τὴν δοκιμὴν ὑμῶν sin introducir una interpretación adicional. La versión española sigue ese ajuste y evita concretar el sustantivo como 'carácter probado'.
  spanish_consistency_notes:
  - Se mantiene el estilo de segunda persona plural con 'ustedes', coherente y neutral en español.
  - Se evita 'Cristo/SEÑOR' o terminología no pertinente; el versículo no contiene títulos divinos.
  - La traducción conserva una construcción de propósito clara y no añade contenido ausente del griego.
  - La nota al pie está anclada explícitamente en 'ustedes[a]' para cumplir la validación.
