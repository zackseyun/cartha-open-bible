translation:
  language: es
  text: 'Pues yo me propuse esto: no venir otra vez a ustedes con tristeza[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en tristeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκρινα
  english_pob_choice: I decided
  chosen_spanish: me propuse
  alternatives_spanish:
  - decidí
  - resolví
  - tomé la determinación
  lexicon: BDAG
  rationale: El aoristo de κρίνω expresa aquí una decisión personal ya tomada. «Me propuse» comunica bien en español una resolución deliberada y mantiene el matiz volitivo sin sonar rígido.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Porque en efecto
  - Así que
  lexicon: BDAG
  rationale: γάρ conecta explicativamente con el contexto anterior. «Pues» es natural en español escrito y conserva esa relación lógica.
- source_word: ἐμαυτῷ
  english_pob_choice: for myself
  chosen_spanish: yo
  alternatives_spanish:
  - para mí mismo
  - en mí mismo
  - por mi parte
  lexicon: BDAG
  rationale: El dativo reflexivo señala una determinación personal e interior. En español, «me propuse» ya incorpora esa referencia a la propia decisión, por lo que se evita sobrecargar la frase.
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esta decisión
  - este asunto
  lexicon: BDAG
  rationale: El demostrativo introduce el contenido de la decisión. «Esto» conserva la deixis y deja que la cláusula siguiente precise el contenido.
- source_word: τὸ μὴ ... ἐλθεῖν
  english_pob_choice: not to come
  chosen_spanish: no ir ...
  alternatives_spanish:
  - no venir
  - no presentarme
  - no volver a ir
  lexicon: BDAG
  rationale: El infinitivo articular expresa el contenido del propósito. «No ir» es idiomático en español con un verbo de movimiento hacia un destinatario; «volver a ir» refleja πάλιν de manera natural.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: πάλιν marca repetición. «Otra vez» comunica esa reiteración de forma clara y natural.
- source_word: ἐν λύπῃ
  english_pob_choice: in sorrow
  chosen_spanish: con tristeza
  alternatives_spanish:
  - en tristeza
  - con dolor
  - en dolor
  lexicon: BDAG
  rationale: λύπη puede significar tristeza, dolor o aflicción. El español «con tristeza» refleja bien el matiz afectivo y evita la literalidad dura de «en tristeza». La nota conserva la alternativa posible de «con tristeza» frente a «en tristeza» según el giro preposicional del griego.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - hacia ustedes
  - para ustedes
  lexicon: BDAG
  rationale: Con un verbo de venir/ir, πρός + acusativo indica movimiento hacia personas. «A ustedes» es el equivalente idiomático más natural en español latinoamericano.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el audit trail inglés: conserva la relación explicativa de γάρ, el valor deliberativo de ἔκρινα y la ambigüedad legítima de ἐν λύπῃ, aunque en español se opta por una formulación más natural con «con tristeza». No se detectaron revisiones textuales relevantes en el material auditado.'
  spanish_consistency_notes:
  - Se evitó «Señor»/«Cristo» porque no aparecen en este versículo.
  - Se mantuvo un registro sobrio y eclesialmente legible, sin forzar un calco de la sintaxis griega.
  - La nota a recoge la alternativa semántica importante de λύπη, dado que el español puede oscilar entre tristeza, dolor y aflicción.
