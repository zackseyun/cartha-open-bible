- from: 'Pues yo me propuse esto: no ir otra vez a ustedes[a] con tristeza.'
  to: 'Pues yo me propuse esto: no venir otra vez a ustedes con tristeza[a].'
  rationale: Se ajusta «ir» a «venir» para reflejar más de cerca ἐλθεῖν y la decisión auditada en inglés. Se corrige la nota para que preserve una alternativa real para ἐν λύπῃ, en vez de repetir la lectura del texto principal.
