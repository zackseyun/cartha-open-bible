translation:
  language: es
  text: A quien ustedes perdonen algo, yo también; porque lo que he perdonado—si algo he perdonado—lo he perdonado por causa de ustedes en presencia del Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la persona del Mesías».
    reason: lexical_alternative
lexical_decisions:
- source_word: χαρίζεσθε / κεχάρισμαι
  english_pob_choice: forgive / have forgiven
  chosen_spanish: perdonen / he perdonado
  alternatives_spanish:
  - concedan graciosamente / he concedido graciosamente
  - muestren favor / he mostrado favor
  - indulten / he indultado
  lexicon: BDAG
  rationale: En este contexto de restauración disciplinaria, χαρίζομαι expresa la remisión de una ofensa, no solo dar o favorecer. «Perdonar» comunica con naturalidad esa liberación de culpa en español sin perder la fuerza relacional del verbo.
- source_word: ᾧ
  english_pob_choice: to anyone whom
  chosen_spanish: a cualquiera a quien
  alternatives_spanish:
  - al que
  - a quien
  lexicon: gramática griega
  rationale: El dativo relativo introduce a la persona destinataria del perdón. «A cualquiera a quien» conserva la relación sintáctica y refleja bien el valor indefinido reforzado por τι.
- source_word: τι
  english_pob_choice: anything
  chosen_spanish: algo
  alternatives_spanish:
  - cualquier cosa
  - algo que
  lexicon: gramática griega
  rationale: En esta construcción condicional e indefinida, «algo» transmite el alcance abierto del pronombre sin sonar forzado en español.
- source_word: κἀγώ
  english_pob_choice: I do too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - así también yo
  lexicon: gramática griega
  rationale: La forma abreviada expresa una respuesta paralela y breve. «Yo también» mantiene esa resonancia inmediata y natural en español.
- source_word: ὃ κεχάρισμαι, εἴ τι κεχάρισμαι
  english_pob_choice: what I have forgiven—if I have forgiven anything—
  chosen_spanish: si algo he perdonado
  alternatives_spanish:
  - lo que he perdonado—si algo he perdonado—
  - si es que he perdonado algo
  lexicon: gramática griega
  rationale: El griego conserva una autocorrección o atenuación retórica. En español, la cláusula condicional breve «si algo he perdonado» preserva esa modestia sin sobrecargar la frase con repeticiones poco naturales.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por ustedes
  - en favor de ustedes
  - a causa de ustedes
  lexicon: BDAG
  rationale: διά con acusativo aquí expresa beneficio y orientación pastoral hacia los corintios. «Por causa de ustedes» mantiene esa dirección y evita reducirlo solo a un motivo abstracto.
- source_word: ἐν προσώπῳ Χριστοῦ
  english_pob_choice: in the presence of the Messiah / Christ
  chosen_spanish: en presencia de Cristo
  alternatives_spanish:
  - ante Cristo
  - en la presencia del Cristo
  - en la presencia del Mesías
  lexicon: BDAG
  rationale: πρόσωπον puede significar rostro, presencia o persona. Aquí «en presencia de» comunica mejor el acto realizado delante de Cristo. Se retiene «Cristo» porque en español eclesial funciona aquí como forma titulada estable y porque la tradición editorial reciente del POB en este punto optó por la forma más natural en contexto epistolar.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah / Christ
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando el título está en primer plano, en esta fórmula fija y epistolar «Cristo» resulta más idiomático en español y mantiene la solemnidad de la expresión sin oscuridad.
theological_decisions:
- issue: 'Cómo rendir Χριστοῦ: título «Mesías» o forma tradicional «Cristo»'
  english_pob_reading: the Messiah / Christ
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: En este versículo la expresión «en presencia de Cristo» funciona como fórmula reverente y reconocible en español bíblico, sin desdibujar la referencia a la persona de Jesús. El valor titulado se conserva por el contexto, y la forma tradicional evita una aspereza innecesaria en una construcción ya establecida.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías where title; Christ where name-like / contextual stability in Spanish'
translation_notes:
  revision_awareness: 'Tomé en cuenta el expediente de revisión: el texto inglés osciló entre «the Messiah» y «Christ» para Χριστοῦ, y la corrección posterior restauró «Messiah» por fidelidad doctrinal al proyecto. En español, opté por «Cristo» en la frase fija «en presencia de Cristo» por naturalidad idiomática y porque el propio auditario reconoce la tensión lexical entre una traducción titulada y una forma más estable en contexto epistolar.'
  spanish_consistency_notes:
  - Mantuve «Cristo» solo en la expresión preposicional final; no se usó como sustituto general de Χριστός fuera de este contexto.
  - Conservé la estructura condicional con repetición parcial («si algo he perdonado») para reflejar el matiz retórico del griego.
  - No se suavizó χαρίζομαι hacia «conceder favor»; se eligió «perdonar» por el contexto disciplinario/restaurativo.
