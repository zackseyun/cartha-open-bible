revisions:
- from: A cualquiera[a] a quien ustedes perdonen algo, yo también; porque yo mismo, si algo he perdonado, por causa de ustedes lo he perdonado en presencia de Cristo.
  to: A quien ustedes perdonen algo, yo también; porque lo que he perdonado—si algo he perdonado—lo he perdonado por causa de ustedes en presencia del Mesías[a].
  rationale: Se corrige «Cristo» a «Mesías» para ajustarse a la terminología del proyecto y al audit trail final. Se restaura la estructura parentética de ὃ κεχάρισμαι, εἴ τι κεχάρισμαι con una formulación natural en español que conserva la vacilación retórica de Pablo. También se aligera el inicio para mayor naturalidad y se mantiene la nota léxica alternativa de πρόσωπον/«persona».
