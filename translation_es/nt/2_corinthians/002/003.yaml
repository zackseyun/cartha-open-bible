translation:
  language: es
  text: Y escribí esto mismo para que, cuando llegara, no tuviera tristeza[b] de parte de los que debían alegrarme[a], confiando respecto de todos ustedes en que mi alegría es la alegría de todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más literalmente, «de aquellos de quienes debía yo alegrarme»; esta formulación preserva más de cerca la estructura del griego, pero en español suena más pesada.
    reason: lexical_alternative
  - marker: b
    text: «Tristeza» traduce aquí λύπη; también podría renderizarse «pesar» o «dolor», pero «tristeza» expresa bien el efecto emocional en español contemporáneo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  english_pob_choice: I wrote
  chosen_spanish: escribí
  alternatives_spanish:
  - he escrito
  lexicon: BDAG
  rationale: El aoristo indicativo se entiende mejor como pasado simple en este contexto, refiriéndose a una carta previa de Pablo.
- source_word: τοῦτο αὐτὸ
  english_pob_choice: this very thing
  chosen_spanish: esto mismo
  alternatives_spanish:
  - esta misma cosa
  - exactamente esto
  lexicon: BDAG
  rationale: La combinación es enfática; «esto mismo» conserva la intensificación sin sonar artificial en español.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Introduce finalidad. «Para que» es natural en español moderno y conserva el valor purposivo.
- source_word: λύπην σχῶ
  english_pob_choice: might not have grief
  chosen_spanish: no tuviera tristeza
  alternatives_spanish:
  - no tuviera dolor
  - no experimentara pesar
  lexicon: BDAG
  rationale: El subjuntivo con μή después de ἵνα expresa propósito negativo. «Tristeza» comunica bien la carga emocional de λύπη en español actual; «pesar» también sería posible, pero aquí «tristeza» es más transparente.
- source_word: ἀφ’ ὧν ἔδει με χαίρειν
  english_pob_choice: from those who ought to make me rejoice
  chosen_spanish: de parte de los que debían alegrarme
  alternatives_spanish:
  - de aquellos de quienes debía yo alegrarme
  - de quienes yo debía recibir gozo
  lexicon: BDAG
  rationale: 'Se preserva la relación semántica: esas personas debían ser motivo de gozo para Pablo, no de tristeza. «Alegrarme» mantiene el vínculo con χαίρειν y evita una construcción demasiado dura en español.'
- source_word: πεποιθὼς ἐπὶ πάντας ὑμᾶς
  english_pob_choice: being confident about all of you
  chosen_spanish: confiado en todos ustedes
  alternatives_spanish:
  - teniendo confianza en todos ustedes
  - estando persuadido acerca de todos ustedes
  lexicon: BDAG
  rationale: El participio perfecto expresa una confianza ya asentada. En español, una construcción participial breve es natural y conserva el matiz de estado resultante.
- source_word: ἡ ἐμὴ χαρὰ πάντων ὑμῶν ἐστιν
  english_pob_choice: my joy is the joy of you all
  chosen_spanish: mi alegría es la alegría de todos ustedes
  alternatives_spanish:
  - mi alegría pertenece a todos ustedes
  - mi alegría es compartida por todos ustedes
  lexicon: BDAG
  rationale: Se mantiene la estructura casi formal del griego y la idea de alegría compartida entre Pablo y la comunidad, usando «alegría» como equivalente natural de χαρά.
translation_notes:
  revision_awareness: 'El draft sigue de cerca el ajuste de la revisión inglesa que cambió una causalidad fuerte por una construcción participial más cercana al griego. Por eso se evita «porque estaba confiado» y se prefiere una forma adjetival/participial: «confiado en todos ustedes».'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; este versículo no contiene el nombre divino.
  - Se conserva «Jesús/Mesías/Cristo» fuera de este versículo según corresponda, pero aquí no aplica.
  - «Alegría» y «tristeza» mantienen la red emocional del pasaje sin introducir un tecnicismo innecesario.
  - El sujeto implícito de «confiado» es Pablo, acorde con el participio griego.
