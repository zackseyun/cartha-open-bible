translation:
  language: es
  text: Ahora, cuando llegué a Troas para el evangelio del Mesías[a], y se me había abierto una puerta[b] en el Señor,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para el evangelio de Cristo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y una puerta estaba abierta para mí en el Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλθὼν
  english_pob_choice: when I came
  chosen_spanish: cuando fui
  alternatives_spanish:
  - cuando llegué
  - al llegar
  lexicon: BDAG
  rationale: El participio aoristo introduce una circunstancia temporal. En español, «cuando fui» conserva el movimiento narrativo y la relación temporal sin forzar una construcción demasiado pesada.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ funciona como transición suave. «Ahora» mantiene el paso discursivo de manera natural en español.
- source_word: εἰς τὴν Τρῳάδα
  english_pob_choice: to Troas
  chosen_spanish: a Troas
  alternatives_spanish:
  - hacia Troas
  - en Troas
  lexicon: BDAG
  rationale: La preposición εἰς con nombre de lugar expresa dirección; «a Troas» es la forma más directa y natural en español.
- source_word: εἰς τὸ εὐαγγέλιον
  english_pob_choice: for the gospel / for the good news
  chosen_spanish: para el evangelio
  alternatives_spanish:
  - para las buenas noticias
  - para el evangelio de
  lexicon: BDAG
  rationale: La segunda εἰς es de propósito. «Para el evangelio» conserva el sentido final y el término establecido en español bíblico, sin añadir una expansión como «predicar».
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Ungido
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός conforme a la pauta del proyecto. «Del Mesías» evita convertir el término en mero nombre propio y mantiene la referencia al enviado ungido.
- source_word: θύρας
  english_pob_choice: a door
  chosen_spanish: una puerta
  alternatives_spanish:
  - una oportunidad
  - un acceso
  lexicon: BDAG
  rationale: Aunque el contexto es metafórico, el griego dice «puerta». Mantener la imagen respeta el lenguaje de Pablo y sugiere la oportunidad sin explicitarla en exceso.
- source_word: ἀνεῳγμένης
  english_pob_choice: had been opened
  chosen_spanish: se me había abierto
  alternatives_spanish:
  - había sido abierta
  - estaba abierta
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado resultante de una acción previa. «Se me había abierto» comunica bien tanto la pasividad como el efecto presente en español natural.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - unido al Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión paulina con el valor locativo-relacional de ἐν. «En el Señor» es idiomático en español bíblico y fiel a la estructura griega.
theological_decisions:
- issue: Renderizar Χριστοῦ como título y no como nombre fijo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  - Jesucristo
  rationale: La pauta doctrinal del proyecto favorece «Mesías» cuando Χριστός funciona como título. Aquí la frase se refiere al evangelio perteneciente al rey ungido, por lo que «Mesías» preserva mejor esa fuerza tituladora.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando es título; Cristo cuando el uso es ya fijo como nombre'
- issue: Conservar la metáfora de la puerta
  english_pob_reading: a door had been opened
  chosen_spanish_reading: se me había abierto una puerta
  alternative_spanish_readings:
  - se había abierto una oportunidad
  - una puerta estaba abierta para mí
  rationale: La metáfora de la puerta forma parte del efecto retórico del versículo. Traducirla literalmente evita neutralizar una imagen que puede aludir a una oportunidad ministerial sin explicarla de más.
  doctrine_reference: Principio POB de preservar la imagen donde el original la preserva
translation_notes:
  revision_awareness: He seguido el expediente auditado del inglés POB, pero adapté la sintaxis al español con un registro publicable. Mantengo la decisión titular de Χριστός como «Mesías», la metáfora de «puerta» y el sentido perfectivo de ἀνεῳγμένης, evitando depender mecánicamente del inglés base.
  spanish_consistency_notes:
  - Se conserva «evangelio» por coherencia terminológica bíblica en español, aunque el inglés también admite «good news».
  - «Mesías» se usa aquí como traducción de título; no se trata de un cambio estilístico sino de una decisión lexical-teológica documentada.
  - La expresión «en el Señor» se mantiene sin expandir a una interpretación instrumental, para respetar la redacción breve del griego.
