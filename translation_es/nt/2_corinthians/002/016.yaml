translation:
  language: es
  text: Para unos, olor[a] de muerte a muerte; para otros, olor de vida a vida[b]. ¿Y quién es suficiente para estas cosas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘fragancia’ o ‘aroma’ para ὀσμή en ambos casos.
    reason: lexical_alternative
  - marker: b
    text: Las expresiones ‘de muerte a muerte’ y ‘de vida a vida’ pueden indicar origen y resultado (‘procedente de muerte y que lleva a muerte’ / ‘procedente de vida y que lleva a vida’) o una caracterización intensificada.
    reason: alternative_reading
lexical_decisions:
- source_word: ὀσμή
  english_pob_choice: fragrance
  chosen_spanish: olor
  alternatives_spanish:
  - fragancia
  - aroma
  - hedor
  lexicon: BDAG
  rationale: En español, ‘olor’ conserva el campo semántico amplio de ὀσμή sin forzar un matiz siempre agradable como ‘fragancia’. Dado que el contexto contrasta muerte y vida, ‘olor’ mantiene la neutralidad sensorial y deja que el efecto dependa del referente, como en el griego.
- source_word: ἐκ θανάτου εἰς θάνατον
  english_pob_choice: from death to death
  chosen_spanish: de muerte para muerte
  alternatives_spanish:
  - de muerte a muerte
  - salido de muerte para muerte
  - de una muerte que lleva a muerte
  lexicon: BDAG
  rationale: ‘De muerte para muerte’ reproduce la compacta progresión del griego y conserva la ambigüedad entre fuente/resultado e intensificación. ‘Para’ suena natural en español y evita resolver el sentido en una paráfrasis explicativa.
- source_word: ἐκ ζωῆς εἰς ζωήν
  english_pob_choice: from life to life
  chosen_spanish: de vida para vida
  alternatives_spanish:
  - de vida a vida
  - salido de vida para vida
  - de una vida que lleva a vida
  lexicon: BDAG
  rationale: Se mantiene el paralelismo formal con la primera mitad del verso. La repetición ‘de... para...’ preserva la simetría retórica y no estrecha el alcance interpretativo del texto.
- source_word: πρὸς ταῦτα
  english_pob_choice: for these things
  chosen_spanish: para estas cosas
  alternatives_spanish:
  - para esto
  - frente a estas cosas
  - con respecto a estas cosas
  lexicon: BDAG
  rationale: ‘Para estas cosas’ refleja bien el plural ταῦτα y la pregunta retórica sobre capacidad o suficiencia en relación con lo recién descrito.
- source_word: ἱκανός
  english_pob_choice: sufficient
  chosen_spanish: suficiente
  alternatives_spanish:
  - adecuado
  - capaz
  - idóneo
  lexicon: BDAG
  rationale: ‘Suficiente’ expresa con precisión la idea de estar a la altura de una tarea o carga. Además, preserva el tono retórico de la pregunta final sin introducir un matiz más técnico como ‘competente’.
theological_decisions:
- issue: Sentido de las expresiones paralelas ‘de muerte para muerte’ y ‘de vida para vida’
  english_pob_reading: The phrases may express source and result or an intensified characterization; the English POB preserves the ambiguity.
  chosen_spanish_reading: 'La traducción mantiene la misma ambigüedad: puede leerse como origen y resultado, o como caracterización intensificada.'
  alternative_spanish_readings:
  - de una muerte que produce muerte / de una vida que produce vida
  - procedente de muerte y que conduce a muerte / procedente de vida y que conduce a vida
  rationale: El griego es deliberadamente compacto y no obliga a decidir entre una paráfrasis causal y una caracterización intensiva. Conservar la estructura breve del original respeta esa tensión interpretativa en vez de resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registran revisiones aplicadas; este borrador sigue la última pasada, que quedó sin cambios, y mantiene la ambigüedad semántica del original griego.
  spanish_consistency_notes:
  - Se usa ‘Dios/Yahvé’ y ‘Mesías’ según las normas del proyecto, pero este verso no contiene esos términos.
  - ‘Olor’ se prefirió sobre ‘fragancia’ por la amplitud semántica y la neutralidad contextual.
  - La sintaxis conserva el paralelismo del griego con dos miembros contrastivos y una pregunta final retórica.
