translation:
  language: es
  text: Por eso les ruego que reafirmen su amor hacia él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «reafirmen su amor para con él».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Marca una conclusión inferida del contexto anterior; «Por eso» comunica bien la relación lógica en español actual sin endurecer el tono.
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insto
  lexicon: BDAG
  rationale: Expresa una apelación apostólica sincera y respetuosa; «ruego» conserva el matiz de súplica exhortativa más naturalmente que una formulación demasiado técnica.
- source_word: κυρῶσαι
  english_pob_choice: reaffirm
  chosen_spanish: reafirmen
  alternatives_spanish:
  - confirmen
  - ratifiquen
  lexicon: BDAG
  rationale: El verbo indica hacer válido o confirmar de nuevo. En este contexto pastoral, «reafirmen» refleja mejor la restauración/ratificación del amor hacia la persona, manteniendo la fuerza de la revisión inglesa.
- source_word: εἰς αὐτὸν
  english_pob_choice: for him
  chosen_spanish: por él
  alternatives_spanish:
  - para con él
  - hacia él
  lexicon: BDAG
  rationale: En español, «por él» comunica de manera natural la dirección relacional del amor, sin perder la referencia personal del griego.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor fraternal
  - afecto
  lexicon: BDAG
  rationale: Corresponde al valor básico de ἀγάπη y funciona con claridad en el contexto de reconciliación y restauración comunitaria.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del auditorio inglés, que prefirió «reaffirm» frente a «confirm» para reflejar mejor el matiz de restauración de κυρῶσαι en este contexto. La españolización mantiene esa decisión con «reafirmen».
  spanish_consistency_notes:
  - Se mantiene un registro moderno y eclesialmente legible.
  - No se introduce «Cristo» ni «Señor» porque el versículo no los contiene.
  - La nota conserva la alternativa direccional «hacia él», paralela al margen inglés «toward him».
