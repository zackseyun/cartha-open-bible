translation:
  language: es
  text: Porque si yo los entristezco, ¿quién me alegrará sino el que es entristecido por mí[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sino el que es entristecido a causa de mí». La expresión griega ἐξ ἐμοῦ puede indicar fuente o causa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: λυπῶ
  english_pob_choice: grieve
  chosen_spanish: entristezco
  alternatives_spanish:
  - aflijo
  - causo tristeza
  - apeno
  lexicon: BDAG
  rationale: El verbo expresa causar tristeza o dolor. En español, «entristezco» conserva la fuerza causativa de forma natural y clara, sin volver la frase rígida.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  - os
  lexicon: gramática del español
  rationale: En este contexto epistolar, «los» funciona como objeto directo natural en español latinoamericano y mantiene la referencia al destinatario plural.
- source_word: εὐφραίνων
  english_pob_choice: make me glad
  chosen_spanish: me alegre
  alternatives_spanish:
  - me haga feliz
  - me dé alegría
  - me regocije
  lexicon: BDAG
  rationale: El participio activo se expresa mejor con una construcción de relativo en español. «Alegre» conserva el efecto de producir gozo con un tono idiomático.
- source_word: τίς ὁ εὐφραίνων με
  english_pob_choice: who is there to make me glad
  chosen_spanish: ¿quién será el que me alegre?
  alternatives_spanish:
  - ¿quién me alegrará?
  - ¿quién es el que me alegra?
  - ¿quién hay que me alegre?
  lexicon: gramática del griego / BDAG
  rationale: La pregunta retórica se vuelve natural en español con futuro de cortesía o expectativa. La estructura mantiene el matiz de búsqueda retórica del participio sustantivado.
- source_word: ὁ λυπούμενος
  english_pob_choice: the one who is grieved by me
  chosen_spanish: el que es entristecido por mí
  alternatives_spanish:
  - el que se entristece por mí
  - el que yo he entristecido
  - el que padece tristeza por mí
  lexicon: BDAG
  rationale: Se conserva el valor pasivo del participio. «Es entristecido por mí» refleja mejor la relación agente/paciente que una paráfrasis activa.
- source_word: ἐξ ἐμοῦ
  english_pob_choice: by me / because of me
  chosen_spanish: por mí
  alternatives_spanish:
  - a causa de mí
  - debido a mí
  - de mí
  lexicon: BDAG
  rationale: La preposición indica fuente o causa. En español, «por mí» comunica de manera breve y natural esa relación causal/agente, sin perder la conexión con la nota alternativa implícita.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - En efecto
  lexicon: BDAG
  rationale: «Porque» introduce la razón explicativa de manera directa y fluida en español, conservando la relación lógica con el argumento anterior.
translation_notes:
  revision_awareness: Se revisó la cláusula final para reflejar el participio pasivo λυπούμενος y la relación causal/fuente de ἐξ ἐμοῦ; la nota se ancla ahora correctamente en el texto con [a].
  spanish_consistency_notes:
  - Se prefirió «entristezco» para λυπῶ por su fuerza causativa y naturalidad en español.
  - Se mantuvo la forma pasiva en la última cláusula para no borrar el matiz del participio griego.
  - Se usó «Porque» al inicio para reproducir la conexión explicativa de γάρ.
  - La puntuación interrogativa española se adaptó con coma y signo de apertura sin alterar el sentido retórico.
