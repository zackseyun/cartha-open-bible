translation:
  language: es
  text: No tuve descanso en mi espíritu[a], porque no hallé a Tito mi hermano[b]; pero, después de despedirme de ellos[c], salí para Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por mi espíritu».
    reason: lexical_alternative
  - marker: b
    text: «Mi hermano» se refiere a Tito como creyente y colaborador de Pablo.
    reason: cultural_note
  - marker: c
    text: O «después de darles la despedida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσχηκα
  english_pob_choice: I had
  chosen_spanish: No tuve
  alternatives_spanish:
  - No he tenido
  - No había tenido
  lexicon: BDAG
  rationale: El perfecto griego se entiende aquí como una condición pasada en el relato. En español, el pretérito simple comunica con naturalidad el estado anterior de Pablo sin forzar un valor aspectual más técnico.
- source_word: ἄνεσιν
  english_pob_choice: rest
  chosen_spanish: descanso
  alternatives_spanish:
  - alivio
  - reposo
  lexicon: BDAG
  rationale: «Descanso» expresa bien la falta de sosiego interior y suena natural en español actual. «Alivio» es posible, pero desplaza el matiz hacia la descarga de presión; «reposo» puede sonar más físico o solemne.
- source_word: τῷ πνεύματί μου
  english_pob_choice: in my spirit
  chosen_spanish: en mi espíritu
  alternatives_spanish:
  - para mi espíritu
  lexicon: BDAG
  rationale: La dativa se puede entender como esfera o referencia. «En mi espíritu» conserva la interioridad personal sin cerrar la ambigüedad entre experiencia anímica e interioridad espiritual.
- source_word: τῷ μὴ εὑρεῖν με Τίτον
  english_pob_choice: because I did not find Titus
  chosen_spanish: porque no hallé a Tito
  alternatives_spanish:
  - porque no pude encontrar a Tito
  - porque no encontré a Tito
  lexicon: Greek grammar / BDAG
  rationale: La construcción infinitiva articular con μή expresa la razón de la falta de descanso. «No hallé a Tito» sigue de cerca el griego y evita añadir una idea de incapacidad que el texto no dice.
- source_word: ἀδελφόν μου
  english_pob_choice: my brother
  chosen_spanish: mi hermano
  alternatives_spanish:
  - mi hermano en la fe
  - mi compañero creyente
  lexicon: BDAG
  rationale: Se conserva la metáfora fraternal de Pablo. En español, la nota aclara el sentido comunitario sin reemplazar el término del texto por una expansión interpretativa en el cuerpo principal.
- source_word: ἀποταξάμενος αὐτοῖς
  english_pob_choice: after taking leave of them
  chosen_spanish: después de despedirme de ellos
  alternatives_spanish:
  - tras despedirme de ellos
  - después de decirles adiós
  lexicon: BDAG
  rationale: El participio aoristo indica una acción previa de separación o despedida. «Despedirme de ellos» es fiel y natural; «decirles adiós» sería más coloquial.
- source_word: ἐξῆλθον εἰς Μακεδονίαν
  english_pob_choice: I went on to Macedonia
  chosen_spanish: salí para Macedonia
  alternatives_spanish:
  - partí para Macedonia
  - me fui a Macedonia
  lexicon: BDAG
  rationale: «Salí para Macedonia» mantiene el movimiento de salida y destino sin sonar forzado. «Partí para Macedonia» es también viable; «me fui a Macedonia» resulta más coloquial.
theological_decisions:
- issue: Sentido de «mi hermano» aplicado a Tito
  english_pob_reading: '"My brother" means Titus as Paul''s fellow believer and coworker.'
  chosen_spanish_reading: «Mi hermano» se mantiene como referencia a Tito en sentido de hermano en la fe y colaborador.
  alternative_spanish_readings:
  - mi hermano biológico
  - mi compañero
  rationale: El contexto paulino favorece un uso comunitario y eclesial de «hermano». Mantenerlo en el texto evita perder la calidez relacional del original y de la tradición paulina, mientras que la nota puede explicitar el sentido.
  doctrine_reference: Uso paulino de fraternidad en la comunidad creyente; cf. Romanos 16:1-16, 1 Corintios 4:15.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior eliminando cualquier marcador no anclado: ahora solo aparecen [a] y [b] en el texto español, y ambos tienen nota correspondiente. La redacción conserva la relación causal, la despedida previa y el movimiento a Macedonia sin añadir elementos no sustentados por el griego o el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Tito» y no «Títus» para coherencia con el uso bíblico en español.
  - Se eligió «descanso» para ἄνεσις en el cuerpo y se dejó la alternativa «por mi espíritu» en nota para mantener la ambigüedad del dativo.
  - No se introdujo «Cristo» ni vocabulario doctrinal no presente en el versículo.
  - La puntuación separa claramente la causa y la acción principal, como en el griego.
