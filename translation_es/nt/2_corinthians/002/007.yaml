translation:
  language: es
  text: Así que, por el contrario, más bien deben perdonarlo[a] y consolarlo, para que tal persona no sea abrumada[b] por demasiada tristeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'perdonarlo con gracia'; el verbo está relacionado con mostrar gracia o favor.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'sea tragado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοὐναντίον
  english_pob_choice: on the contrary
  chosen_spanish: al contrario
  alternatives_spanish:
  - por el contrario
  - en cambio
  lexicon: BDAG
  rationale: Expresa bien el giro de expectativa y suena natural en español sin debilitar la oposición del texto.
- source_word: μᾶλλον
  english_pob_choice: rather
  chosen_spanish: más bien
  alternatives_spanish:
  - preferentemente
  - antes bien
  lexicon: BDAG
  rationale: Conserva el matiz comparativo junto con el contraste previo y evita añadir intensidad no explícita.
- source_word: χαρίσασθαι
  english_pob_choice: forgive
  chosen_spanish: perdonarlo
  alternatives_spanish:
  - mostrarle gracia
  - condonarlo
  - darle perdón
  lexicon: BDAG
  rationale: En este contexto disciplinario, el verbo apunta naturalmente a perdón; se mantiene su trasfondo de gracia en la nota.
- source_word: παρακαλέσαι
  english_pob_choice: comfort
  chosen_spanish: consuélenlo
  alternatives_spanish:
  - anímenlo
  - consolarlo
  lexicon: BDAG
  rationale: La idea es restaurar al ofensor evitando su abatimiento; 'consolar' comunica mejor ese alivio afectivo.
- source_word: καταποθῇ
  english_pob_choice: be overwhelmed
  chosen_spanish: sea consumida
  alternatives_spanish:
  - sea tragada
  - sea abrumada
  - sea absorbida
  lexicon: BDAG
  rationale: La metáfora de 'ser tragado' se vierte de manera idiomática como 'ser consumido', manteniendo la fuerza de la imagen sin sonar forzado.
- source_word: ὁ τοιοῦτος
  english_pob_choice: such a person
  chosen_spanish: una persona así
  alternatives_spanish:
  - tal persona
  - uno como ese
  lexicon: BDAG
  rationale: Preserva la referencia genérica del griego con una formulación natural en español.
- source_word: περισσοτέρᾳ λύπῃ
  english_pob_choice: excessive sorrow
  chosen_spanish: una tristeza excesiva
  alternatives_spanish:
  - un dolor excesivo
  - un gran pesar
  - una tristeza mayor
  lexicon: BDAG
  rationale: '''Tristeza'' comunica el campo afectivo de λύπη con claridad; ''excesiva'' refleja el comparativo sin sobreinterpretar.'
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y el expediente auditado en inglés sin cambios de revisión aplicados; se conservan el contraste 'al contrario / más bien' y la metáfora de καταποθῇ en una equivalencia idiomática natural.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - '''Perdonarlo'' se usa como verbo directo natural en español, con nota para conservar la relación con χάρις.'
  - '''Ser consumida'' traduce la pasiva metafórica de καταποθῇ sin perder la imagen de ser tragado.'
  - Las dos notas están ancladas exactamente en 'perdonarlo[a]' y 'consuélenlo[b]' para cumplir la validación.
