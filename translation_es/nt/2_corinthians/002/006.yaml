lexical_decisions:
- source_word: ἱκανὸν
  english_pob_choice: enough
  chosen_spanish: Basta
  alternatives_spanish:
  - Es suficiente
  - Es bastante
  lexicon: BDAG
  rationale: ἱκανὸν funciona predicativamente con la idea de suficiencia. «Basta» comunica de forma natural que la medida ya es adecuada o suficiente, sin endurecer innecesariamente el tono.
- source_word: τῷ τοιούτῳ
  english_pob_choice: for such a man
  chosen_spanish: a tal persona
  alternatives_spanish:
  - a tal hombre
  - a tal uno
  - para tal persona
  lexicon: BDAG
  rationale: El griego apunta a un individuo concreto ya descrito en el contexto. «Tal persona» conserva la referencia específica sin forzar en español el masculino explícito de «hombre», que podría sonar más marcado de lo necesario en una formulación breve.
- source_word: ἐπιτιμία
  english_pob_choice: punishment
  chosen_spanish: castigo
  alternatives_spanish:
  - pena
  - sanción
  - disciplina
  lexicon: BDAG
  rationale: El término describe una medida disciplinaria efectiva ya aplicada por la comunidad. «Castigo» conserva la fuerza sancionadora de la palabra y evita suavizarla a una mera reprensión verbal.
- source_word: ἡ ὑπὸ τῶν πλειόνων
  english_pob_choice: by the majority
  chosen_spanish: impuesto por la mayoría
  alternatives_spanish:
  - impuesto por los más
  - impuesto por la mayoría de ellos
  - aplicado por la mayoría
  lexicon: BDAG
  rationale: La frase griega indica el agente colectivo de la acción disciplinaria. «Impuesto por la mayoría» reproduce esa relación y mantiene el sentido comunitario del acto.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego de SBLGNT y el expediente inglés. La redacción española conserva la estructura breve y evaluativa del versículo, con el agente colectivo expresado explícitamente para reflejar ὑπὸ τῶν πλειόνων. No se detectaron revisiones aplicadas en el expediente base.
  spanish_consistency_notes:
  - Se mantuvo un estilo sobrio y eclesial, evitando vocabulario excesivamente jurídico o arcaico.
  - «Basta» se usa como equivalente natural de suficiencia predicativa en una frase breve.
  - No se introdujo una nota teológica porque el versículo no plantea una decisión doctrinal adicional en el expediente proporcionado.
