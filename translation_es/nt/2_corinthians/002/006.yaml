translation:
  language: es
  text: Le basta a tal hombre[a] este castigo[b] impuesto por la mayoría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a tal persona». El griego es masculino singular y señala a un individuo concreto del contexto.
    reason: lexical_alternative
