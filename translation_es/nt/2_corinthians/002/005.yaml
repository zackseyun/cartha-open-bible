translation:
  language: es
  text: Pero si alguien ha causado tristeza, no me ha entristecido a mí, sino en parte[a] a todos ustedes, para no exagerarlo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta cierto punto».
    reason: lexical_alternative
  - marker: b
    text: O «para no cargarlo demasiado sobre todos ustedes» o «para no ponerlo demasiado fuerte sobre todos ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: λελύπηκεν
  english_pob_choice: has caused grief / has grieved
  chosen_spanish: ha causado tristeza
  alternatives_spanish:
  - ha entristecido
  - ha causado dolor
  - ha afligido
  lexicon: BDAG
  rationale: El perfecto se conserva con "ha..." para reflejar una acción pasada con efecto presente. "Tristeza" y "entristecido" mantienen el campo léxico de λυπέω con naturalidad en español, sin forzar un calco innecesario.
- source_word: οὐκ ἐμὲ
  english_pob_choice: not me
  chosen_spanish: no me
  alternatives_spanish:
  - no a mí
  - no a mí personalmente
  lexicon: BDAG
  rationale: Se conserva el contraste directo y mínimo del griego. "No me" en español comunica la negación sin añadir énfasis no explícito en el texto.
- source_word: ἀπὸ μέρους
  english_pob_choice: to some extent / in part
  chosen_spanish: en parte
  alternatives_spanish:
  - hasta cierto punto
  - parcialmente
  - a medias
  lexicon: BDAG
  rationale: La locución adverbial se vierte de forma natural como "en parte", que preserva la limitación introducida por el griego sin explicitar más de lo que el texto dice.
- source_word: ἐπιβαρῶ
  english_pob_choice: overstate it
  chosen_spanish: exagerarlo
  alternatives_spanish:
  - cargarlo demasiado
  - presionarlo demasiado
  - ponerlo demasiado fuerte
  lexicon: BDAG
  rationale: El verbo literalmente alude a poner una carga, pero en este contexto el audit trail inglés observó un matiz retórico. "Exagerarlo" transmite esa moderación discursiva en español sin perder la idea de no cargar la afirmación más allá de lo debido.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_spanish: a todos ustedes
  alternatives_spanish:
  - a ustedes todos
  - a todos vosotros
  lexicon: BDAG
  rationale: Se conserva la totalidad explícita de πάντας y el carácter corporativo del destinatario. "Ustedes" mantiene registro neutro y ampliamente usable en el ámbito hispanoamericano.
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió ἀπὸ μέρους hacia una limitación más exacta y suavizó ἵνα μὴ ἐπιβαρῶ hacia un matiz retórico de no sobrecargar la afirmación. La versión española sigue esa revisión: usa "en parte" y vierte ἐπιβαρῶ como "exagerarlo" para mantener la idea de moderación sin volver al inglés base previo.'
  spanish_consistency_notes:
  - Se mantiene un español moderno, digno y publicable, evitando el calco rígido pero sin ampliar el sentido del griego.
  - 'La estructura conserva la antítesis paulina: no me..., sino en parte a todos ustedes...'
  - Las notas al pie preservan la alternativa léxica importante para ἀπὸ μέρους y para ἐπιβαρῶ, de acuerdo con el rastro auditado en inglés.
  - '"Tristeza" se usa como equivalente natural de λυπέω, manteniendo la conexión semántica entre ambas cláusulas.'
