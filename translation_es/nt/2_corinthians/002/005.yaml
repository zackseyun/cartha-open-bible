    rationale: Viola el requisito de que cada nota debe anclarse exactamente a la palabra o frase pertinente. Además induce una alternativa falsa para λελύπηκεν.
  - severity: medium
    issue: La nota [b] está anclada a «todos ustedes» aunque sus alternativas corresponden a «para no exagerarlo».
    rationale: El contenido de la nota explica ἐπιβαρῶ, no πάντας ὑμᾶς. Debe moverse al segmento verbal final para evitar confusión exegética.
  - severity: low
    issue: «Ha causado tristeza / no me la ha causado» pierde la repetición verbal del griego y suena un poco menos natural que «ha entristecido / no me ha entristecido».
    rationale: λελύπηκεν aparece dos veces; repetir «entristecer» refleja mejor la cohesión léxica del original y mejora la fluidez en español.
  revised_spanish_text: Pero si alguien ha causado tristeza, no me ha entristecido a mí, sino en parte[a] a todos ustedes, para no exagerarlo[b].
