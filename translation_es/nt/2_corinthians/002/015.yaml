revisions:
- from: Porque somos el aroma de Mesías para Dios entre los que están siendo salvados y entre los que están pereciendo[a][b].
  to: Porque somos el aroma del Mesías para Dios entre los que se están salvando y entre los que están pereciendo[a][b].
  rationale: 'Se revisa para mejorar la naturalidad y precisión del español sin alterar el sentido del griego ni las decisiones doctrinales del proyecto: «del Mesías» suena más idiomático que «de Mesías», y «se están salvando» preserva mejor en español el aspecto procesual de σῳζομένοις que la perífrasis pasiva calcada «están siendo salvados». Se mantiene «para Dios», que sigue siendo defendible, y «están pereciendo», que comunica bien ἀπολλυμένοις.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:14Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ὅτι como explicación («Porque»), Χριστοῦ con valor titular («Mesías»), εὐωδία como metáfora olfativa, y el paralelismo de ἐν ... καὶ ἐν ... con dos grupos. También preserva correctamente el aspecto procesual de σῳζομένοις y ἀπολλυμένοις. Sin embargo, dos decisiones afectan la fidelidad idiomática y semántica en español: «para Dios» suena menos preciso que «para Dios»/«ante Dios» en este contexto cultual-relacional, y sobre todo «están siendo salvados» resulta demasiado calcado y poco natural; «se están salvando» conserva mejor el proceso sin sonar mecánico.'
  spanish_quality_summary: El texto es generalmente claro, pero «el aroma de Mesías» suena algo rígido y «entre los que están siendo salvados» es poco idiomático en español bíblico natural. La frase mejora notablemente con «el aroma del Mesías» y «entre los que se están salvando». «Están pereciendo» es comprensible y digno; puede mantenerse. Las notas son casi adecuadas, pero la nota b actual presenta una alternativa que en realidad es más natural que el texto principal, lo que sugiere que el texto principal debe ajustarse.
  glossary_alignment: Alinea bien con la terminología del proyecto al usar «Mesías» para Χριστοῦ y no «Cristo» en el texto principal. «Dios» para θεῷ también es correcto. No hay conflicto con Yahvé u otros términos clave. La revisión propuesta mantiene «Mesías», conserva «aroma», y mejora la expresión española del aspecto procesual sin apartarse de la decisión teológica documentada.
  issues:
  - severity: medium
    issue: «el aroma de Mesías» suena poco natural en español
    rationale: Aunque literalmente posible, en español la construcción genitiva idiomática aquí se expresa mejor como «el aroma del Mesías», que sigue comunicando pertenencia/caracterización sin rigidez innecesaria.
  - severity: medium
    issue: «entre los que están siendo salvados» es un calco poco natural
    rationale: El participio presente pasivo griego expresa proceso, pero en español esta perífrasis pasiva progresiva resulta pesada. «Entre los que se están salvando» conserva el aspecto en curso y mejora la legibilidad.
  - severity: low
    issue: La nota b compite con el texto principal en naturalidad
    rationale: La alternativa «se están perdiendo» no corrige un problema textual importante del original; el verdadero ajuste necesario está en la primera cláusula procesual. Tras revisar el texto principal, la nota puede mantenerse como alternativa léxica válida para ἀπολλυμένοις.
  revised_spanish_text: Porque somos el aroma del Mesías para Dios entre los que se están salvando y entre los que están pereciendo[a][b].
  revised_footnotes:
  - marker: a
    text: O «Cristo».
    reason: alternative_reading
  - marker: b
    text: O «entre los que se están perdiendo».
    reason: alternative_reading
  revision_rationale: 'Se revisa para mejorar la naturalidad y precisión del español sin alterar el sentido del griego ni las decisiones doctrinales del proyecto: «del Mesías» suena más idiomático que «de Mesías», y «se están salvando» preserva mejor en español el aspecto procesual de σῳζομένοις que la perífrasis pasiva calcada «están siendo salvados». Se mantiene «para Dios», que sigue siendo defendible, y «están pereciendo», que comunica bien ἀπολλυμένοις.'
