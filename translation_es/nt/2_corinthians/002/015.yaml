lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: ὅτι introduce aquí una explicación de la afirmación anterior; en español, «Porque» expresa de forma natural esa relación causal o explicativa sin añadir contenido ajeno al texto.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como «Mesías», siguiendo la política del proyecto para mantener la referencia al título bíblico y no convertirlo sin necesidad en un nombre litúrgico fijo.
- source_word: εὐωδία
  english_pob_choice: aroma
  chosen_spanish: aroma
  alternatives_spanish:
  - fragancia
  - buen olor
  lexicon: BDAG
  rationale: «Aroma» comunica bien la imagen sensorial y sigue de cerca la decisión inglesa, sin añadir el matiz de «buen» que no está explícito en el griego.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  - ante Dios
  lexicon: BDAG
  rationale: El dativo expresa relación/dirección del símbolo. En español, «para Dios» fluye de manera natural y conserva la orientación del ofrecimiento o la referencia del aroma sin forzar una construcción menos idiomática.
- source_word: ἐν τοῖς σῳζομένοις
  english_pob_choice: among those who are being saved
  chosen_spanish: entre los que están siendo salvados
  alternatives_spanish:
  - entre los que se salvan
  - entre los salvados
  lexicon: BDAG
  rationale: El participio presente pasivo mantiene un valor procesual; «están siendo salvados» preserva ese aspecto progresivo mejor que una etiqueta estática. «Entre» refleja con claridad el ἐν distributivo.
- source_word: ἐν τοῖς ἀπολλυμένοις
  english_pob_choice: among those who are perishing
  chosen_spanish: entre los que están pereciendo
  alternatives_spanish:
  - entre los que se pierden
  - entre los que son destruidos
  lexicon: BDAG
  rationale: También aquí el participio presente indica proceso continuo. «Pereciendo» mantiene la tensión teológica y evita resolver el texto en una categoría cerrada como «perdidos» o «destruidos».
theological_decisions:
- issue: Aspecto procesual en σῳζομένοις y ἀπολλυμένοις
  english_pob_reading: those who are being saved / those who are perishing
  chosen_spanish_reading: los que están siendo salvados / los que están pereciendo
  alternative_spanish_readings:
  - los salvados / los perdidos
  - los que se salvan / los que se pierden
  rationale: El griego usa participios presentes que presentan salvación y perdición como realidades en curso. La traducción conserva esa tensión y no la aplana en rótulos completados.
  doctrine_reference: Preservar la tensión teológica del proceso, no resolverla artificialmente.
- issue: Χριστοῦ como título cristológico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto, el título cristológico puede leerse con fuerza titular. «Mesías» mantiene esa referencia y armoniza con la política terminológica del proyecto.
  doctrine_reference: Terminología cristológica del proyecto para Χριστός.
translation_notes:
  revision_awareness: 'El contexto auditado muestra una oscilación en inglés entre «Messiah» y «Christ», finalmente resuelta a favor de «Messiah» por política doctrinal; por eso el español adopta «Mesías» de manera consistente. También se observó una revisión sobre el segundo ἐν: la versión final inglesa repite «among» en ambos miembros, y el español conserva esa repetición con «entre... y entre...» para reflejar el paralelismo griego.'
  spanish_consistency_notes:
  - Se usa «Mesías» en lugar de «Cristo» para Χριστοῦ, conforme al criterio terminológico del proyecto.
  - Se mantiene el paralelismo con doble «entre» para reproducir la repetición de ἐν.
  - «Pereciendo» preserva el aspecto procesual del participio presente.
  - La puntuación final con punto mantiene la lectura fluida y publica en español.
