translation:
  language: es
  text: Porque somos el aroma del Mesías para Dios entre los que se están salvando y entre los que están pereciendo[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: alternative_reading
  - marker: b
    text: O «entre los que se están perdiendo».
