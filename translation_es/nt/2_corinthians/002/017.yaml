    changes_summary: 'Changed ''Messiah'' to ''Christ'' for consistency with the Greek Χριστῷ in this translation context; adjusted punctuation and removed one comma for smoother formal English while preserving the repeated contrastive structure (''but as ... but as ...''). [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque no somos como los muchos[a], que trafican[b] con la palabra de Dios, sino que hablamos como con sinceridad[c], como de parte de Dios, delante[d] de Dios, en Mesías[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "la mayoría" o "tantos otros".'
    reason: lexical_alternative
  - marker: b
    text: '"Trafican con" también puede sugerir adulterar la palabra o comerciar con ella para ganar dinero.'
    reason: lexical_alternative
  - marker: c
    text: 'O: "de sinceridad".'
    reason: lexical_alternative
  - marker: d
    text: 'O: "ante Dios", "a la vista de Dios" o "en la presencia de Dios".'
    reason: lexical_alternative
  - marker: e
    text: 'Tradicional: "en Cristo".'
    reason: alternative_reading
lexical_decisions:
- source_word: οἱ πολλοί
  english_pob_choice: the many
  chosen_spanish: los muchos
  alternatives_spanish:
  - la multitud
  - la mayoría
  - tantos otros
  lexicon: —
  rationale: Conservo el valor articular del grupo ('los muchos') sin convertirlo en una estadística como 'la mayoría'. Mantiene el contraste paulino con el ministerio apostólico.
- source_word: καπηλεύοντες
  english_pob_choice: peddling
  chosen_spanish: trafican con
  alternatives_spanish:
  - venden con afán de lucro
  - mercadean con
  - adulteran por ganancia
  lexicon: BDAG
  rationale: '''Trafican con'' conserva la imagen comercial y la crítica moral de lucro/manipulación. En español suena natural y no suaviza la fuerza del verbo.'
- source_word: λόγον τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios
  - el mensaje de Dios
  lexicon: —
  rationale: La traducción directa mantiene la formulación paulina solemne y reconocible, sin perder la construcción genitiva.
- source_word: ἐξ εἰλικρινείας
  english_pob_choice: from sincerity
  chosen_spanish: como de sinceridad
  alternatives_spanish:
  - con sinceridad
  - desde sinceridad
  - de sinceridad
  lexicon: BDAG
  rationale: 'El griego repite la idea de origen con ἐκ/ἐξ y además usa ὡς (''como''). Por eso ''como de'' intenta preservar la doble capa: comparación y procedencia.'
- source_word: ἐκ θεοῦ
  english_pob_choice: from God
  chosen_spanish: como de parte de Dios
  alternatives_spanish:
  - de parte de Dios
  - desde Dios
  - procedentes de Dios
  lexicon: —
  rationale: '''De parte de Dios'' comunica bien el origen/encargo apostólico. Se mantiene el paralelismo con la frase anterior y se evita una paráfrasis excesiva.'
- source_word: κατέναντι θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en la presencia de Dios
  - a la vista de Dios
  - ante Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' expresa la idea de estar bajo su mirada y responsabilidad. Es claro, idiomático y suficientemente cercano al valor preposicional.'
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: —
  rationale: Sigo la decisión doctrinal de traducir Χριστός como título en su sentido vivo. 'Mesías' conserva el valor titular y evita asumir de entrada un nombre fijo de iglesia.
- source_word: λαλοῦμεν
  english_pob_choice: we speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - decimos
  - proclamamos
  - hablamos constantemente
  lexicon: —
  rationale: '''Hablamos'' refleja bien el verbo sin intensificarlo a ''proclamamos''. Mantiene la sencillez del presente indicativo.'
theological_decisions:
- issue: Repetición de ἀλλ’ ὡς... ἀλλ’ ὡς...
  english_pob_reading: but as from sincerity, but as from God
  chosen_spanish_reading: sino que, como de sinceridad, sino que, como de parte de Dios
  alternative_spanish_readings:
  - sino que, desde sinceridad y desde Dios
  - sino que, con sinceridad y de parte de Dios
  rationale: La construcción griega repite el contraste y el marco de procedencia. Conservar la repetición en español evita suavizar la retórica de Pablo y mantiene visible la secuencia de fuente/autoridad.
  doctrine_reference: Estilo retórico paulino; preservar paralelismo sin borrar tensión textual.
- issue: Χριστῷ como título cristológico
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: La política del proyecto favorece 'Mesías' cuando Χριστός funciona como título. Aquí la frase mantiene su valor titulativo y no exige fijarlo como nombre litúrgico tradicional.
  doctrine_reference: Translate titles; transliterate names. Χριστός → Mesías cuando el contexto conserva el título.
translation_notes:
  revision_awareness: 'El auditable English POB pasó por una corrección importante en la clausula final: de ''in Christ'' a ''in Messiah'' y luego una restauración doctrinal de ''Messiah''. También se revisó la estructura repetida de ἀλλ’ ὡς... para evitar un inglés que sonara incorrectamente adversativo. En español, por eso se conserva la repetición paralela y la traducción titulativa ''Mesías''.'
  spanish_consistency_notes:
  - Uso 'Dios' para θεοῦ y 'Mesías' para Χριστῷ, conforme a las normas del proyecto.
  - Conservo el contraste entre conducta ajena ('los muchos') y la autodefinición apostólica con fuentes ('de sinceridad', 'de parte de Dios').
  - La frase 'delante de Dios' mantiene el matiz de accountability/presencia sin sobreexplicar.
  - Las comillas y el marcaje de notas siguen el orden alfabético exigido; no se reutiliza ningún marcador.
