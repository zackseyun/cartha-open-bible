translation:
  language: es
  text: para que Satanás no se aproveche de nosotros[a], porque no ignoramos sus maquinaciones[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no seamos burlados» o «no seamos explotados».
    reason: lexical_alternative
  - marker: b
    text: O «designios», «intenciones» o «pensamientos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa la finalidad/resultando del verbo principal con naturalidad en español y conserva la fuerza prospectiva del griego.
- source_word: πλεονεκτηθῶμεν
  english_pob_choice: be outwitted
  chosen_spanish: seamos vencidos
  alternatives_spanish:
  - seamos sobrepasados
  - seamos explotados
  - seamos burlados
  lexicon: BDAG
  rationale: El griego puede implicar ser aprovechado o superado por astucia. En este contexto, “vencidos” comunica de manera breve la idea de quedar en desventaja ante una estrategia hostil, sin reducirlo solo a engaño intelectual.
- source_word: ὑπὸ τοῦ Σατανᾶ
  english_pob_choice: by Satan
  chosen_spanish: por Satanás
  alternatives_spanish:
  - por el adversario
  - por Satanás el adversario
  lexicon: BDAG
  rationale: Se conserva el nombre propio transliterado, conforme a la política del proyecto. La preposición pasiva se vierte con “por”.
- source_word: νοήματα
  english_pob_choice: schemes
  chosen_spanish: maquinaciones
  alternatives_spanish:
  - planes
  - designios
  - pensamientos
  lexicon: BDAG
  rationale: “Maquinaciones” refleja bien el sentido de planes calculados y hostiles. Mantiene la tensión de que no se trata de pensamientos neutrales, sino de estrategias.
- source_word: ἀγνοοῦμεν
  english_pob_choice: are not ignorant of
  chosen_spanish: no ignoramos
  alternatives_spanish:
  - no somos ignorantes de
  - no desconocemos
  - estamos al tanto de
  lexicon: BDAG
  rationale: Conserva la negación del conocimiento en forma natural y directa en español, sin forzar una perífrasis innecesaria.
translation_notes:
  revision_awareness: El auditable inglés POB revisó πλεονεκτηθῶμεν desde “be taken advantage of” a “be outwitted” para precisar el matiz de astucia; por eso la versión española evita una mera equivalencia de explotación y elige “vencidos”, que puede abarcar quedar superados por la estrategia de Satanás sin cerrar el sentido a una sola opción. También se mantuvo el paralelismo con “no ignoramos” para reflejar ἀγνοοῦμεν. La opción de “maquinaciones” sigue de cerca la decisión inglesa de “schemes”, pero deja abierta la alternativa semántica más amplia del término griego.
  spanish_consistency_notes:
  - Se usa “Satanás” como nombre propio, no como apelativo traducido.
  - Se prefirió una formulación breve y pública en español, manteniendo el contraste entre la finalidad negativa y la explicación causal.
  - El plural “maquinaciones” conserva el valor colectivo de τὰ νοήματα.
