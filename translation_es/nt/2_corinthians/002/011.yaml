review_pass:
  verdict: revise
  source_alignment_summary: La cláusula de propósito ἵνα μὴ está bien reflejada por «para que no». «Satanás» y «maquinaciones» representan adecuadamente Σατανᾶ y νοήματα, y «porque no ignoramos» comunica bien οὐ γὰρ ... ἀγνοοῦμεν. Sin embargo, «seamos vencidos» no preserva fielmente πλεονεκτηθῶμεν, que en contexto apunta a ser aventajados, explotados o burlados/sobrepasados por la astucia de Satanás, no simplemente derrotados en sentido general.
  spanish_quality_summary: El borrador es legible y natural, pero «vencidos» resulta demasiado amplio y desplaza el matiz estratégico del contexto. Además, la nota [a] contiene «seamos aprovechados», que es poco natural en español para este sentido; conviene usar alternativas idiomáticas como «se aprovechen de nosotros» o «seamos explotados». El resto del versículo suena claro y digno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Satanás» es correcto. «Maquinaciones» encaja bien para νοήματα en este contexto hostil. La principal corrección léxica es reemplazar «vencidos» por una opción que conserve el sentido de ser burlados/aventajados/explotados.
  issues:
  - severity: high
    issue: «seamos vencidos» para πλεονεκτηθῶμεν
    rationale: «Vencidos» sugiere derrota general y no refleja con precisión el sentido de ser sobrepasados, burlados o explotados por ventaja indebida. El contexto de 2 Co 2:11 favorece una idea de astucia estratégica.
  - severity: medium
    issue: Nota [a] con «seamos aprovechados»
    rationale: Esa formulación no es idiomática en español para expresar «be taken advantage of». Debe reformularse con opciones naturales y coherentes con el texto principal.
  revised_spanish_text: para que Satanás no se aproveche de nosotros[a], porque no ignoramos sus maquinaciones[b].
  revised_footnotes:
  - marker: a
    text: O «no seamos burlados» o «no seamos explotados».
    reason: lexical_alternative
  - marker: b
    text: O «designios», «intenciones» o «pensamientos».
    reason: lexical_alternative
