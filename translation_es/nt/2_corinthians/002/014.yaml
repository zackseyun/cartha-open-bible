translation:
  language: es
  text: Pero gracias a Dios, que siempre nos lleva en procesión triunfal[a] en el Mesías y da a conocer por medio de nosotros la fragancia[b] del conocimiento de él en todo lugar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «triunfa sobre nosotros en el Mesías».'
    reason: alternative_reading
  - marker: b
    text: 'O: «aroma».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: thanks be
  chosen_spanish: gracias
  alternatives_spanish:
  - acción de gracias
  - gracias sean dadas
  lexicon: BDAG
  rationale: En esta construcción dativa exclamativa, el sentido es doxológico y de agradecimiento a Dios; en español, «gracias a Dios» conserva de modo natural esa fuerza, sin convertir χάρις en la abstracción «gracia».
- source_word: θριαμβεύοντι
  english_pob_choice: leads us in triumphal procession
  chosen_spanish: nos lleva en triunfo
  alternatives_spanish:
  - nos conduce en procesión triunfal
  - triunfa sobre nosotros
  lexicon: BDAG
  rationale: La imagen principal es la del triunfo, con nosotros como objeto directo; «nos lleva en triunfo» preserva la metáfora concreta sin introducir explicaciones que el griego no exige. La lectura alternativa de triunfo sobre nosotros se mantiene aparte en decisión teológica.
- source_word: ἐν τῷ Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Siguiendo la norma del proyecto, Χριστός se traduce como «Mesías» cuando funciona como título. Aquí expresa la esfera o relación en la que ocurre el triunfo divino.
- source_word: ὀσμὴν
  english_pob_choice: fragrance
  chosen_spanish: aroma
  alternatives_spanish:
  - fragancia
  - olor
  lexicon: BDAG
  rationale: «Aroma» reproduce bien la metáfora positiva y mantiene una opción léxica reconocible en español; además deja abierta la equivalencia con el inglés POB, que registró «aroma» como alternativa a «fragrance».
- source_word: γνώσεως
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento de
  lexicon: BDAG
  rationale: «Conocimiento» es la forma más natural y precisa para γνῶσις en este contexto; el genitivo se mantiene explícito con «de él».
- source_word: φανεροῦντι
  english_pob_choice: makes ... known
  chosen_spanish: manifiesta
  alternatives_spanish:
  - da a conocer
  - hace ... conocido
  - revela
  lexicon: BDAG
  rationale: El participio causativo comunica que Dios hace perceptible el contenido del mensaje; «manifiesta» funciona de manera fluida en español y conserva el acto de poner algo en claro. Se mantiene el complemento «por medio de nosotros» para reflejar διά con genitivo.
- source_word: δι’ ἡμῶν
  english_pob_choice: through us
  chosen_spanish: por medio de nosotros
  alternatives_spanish:
  - a través de nosotros
  - mediante nosotros
  lexicon: BDAG
  rationale: «Por medio de nosotros» expresa la mediación/instrumentalidad de διά con mayor naturalidad que un calco rígido, y sigue siendo transparente para el lector.
- source_word: ἐν παντὶ τόπῳ
  english_pob_choice: in every place
  chosen_spanish: en todo lugar
  alternatives_spanish:
  - en cada lugar
  - por todas partes
  lexicon: BDAG
  rationale: «En todo lugar» mantiene la amplitud universal del griego y suena idiomático en español contemporáneo.
theological_decisions:
- issue: Sentido de θριαμβεύω con ἡμᾶς como objeto directo
  english_pob_reading: Paul depicts God as leading the apostolic band in triumphal procession in the Messiah.
  chosen_spanish_reading: Pablo presenta a Dios llevándonos en triunfo en el Mesías.
  alternative_spanish_readings:
  - Pablo presenta a Dios triunfando sobre nosotros en el Mesías.
  rationale: La redacción principal conserva la imagen procesional-triunfal que encaja con la metáfora del versículo y con el flujo hacia el «aroma del conocimiento». La lectura alternativa se preserva porque el verbo admite también la idea de triunfo sobre cautivos; no se neutraliza esa tensión interpretativa.
  doctrine_reference: Preservar la tensión exegética documentada en lugar de resolverla artificialmente.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el trazado auditado del POB inglés: conserva la ambigüedad de θριαμβεύω mediante una nota, mantiene el título «Mesías» para Χριστός, y usa una formulación natural en español para χάρις sin perder el tono doxológico.'
  spanish_consistency_notes:
  - Se usa «Mesías» según la convención del proyecto para Χριστός como título.
  - «Aroma» se eligió como opción principal; la nota conserva «fragancia» como alternativa lexical legítima.
  - «Por medio de nosotros» refleja la mediación de διά sin forzar una construcción menos natural.
  - Se evita «SEÑOR» porque el texto griego tiene θεῷ, no κύριος.
