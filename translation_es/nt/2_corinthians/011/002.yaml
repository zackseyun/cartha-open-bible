    text: Or 'with a godly jealousy.' The Greek may mean jealousy belonging to God or jealousy characterized by God.
    reason: lexical_alternative
  - marker: b
    text: 'Or ''to Christ.'' Greek: ''to the Messiah.'''
    reason: alternative_reading
