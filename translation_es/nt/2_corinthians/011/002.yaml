translation:
  language: es
  text: Porque siento celos por ustedes con celos de Dios[a], pues los comprometí con un solo esposo[b], para presentarlos como una virgen pura al Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «con un celo de Dios». El griego puede significar celos que pertenecen a Dios o celos caracterizados por él.
    reason: lexical_alternative
  - marker: b
    text: 'O «al Cristo». Griego: «al Mesías».'
    reason: alternative_reading
lexical_decisions:
- source_word: ζηλῶ
  english_pob_choice: I am jealous for
  chosen_spanish: tengo celos de ustedes
  alternatives_spanish:
  - estoy celoso por ustedes
  - tengo celo por ustedes
  lexicon: BDAG
  rationale: En este contexto matrimonial y de exclusividad, «celos» conserva mejor la fuerza protectora y relacional del verbo que un simple «celo». «Tengo celos de ustedes» evita suavizar el matiz paulino, aunque en español puede sonar intenso; por eso se mantiene la referencia al objeto de la solicitud pastoral.
- source_word: θεοῦ ζήλῳ
  english_pob_choice: with God’s jealousy
  chosen_spanish: con celos de Yahvé
  alternatives_spanish:
  - con un celo divino
  - con celos piadosos
  lexicon: BDAG
  rationale: 'El genitivo se entiende posesivamente: celos que pertenecen a Dios o están caracterizados por él. Se usa «Yahvé» para el nombre divino según la convención del proyecto, preservando el matiz de celos pactuales sin convertirlo en una paráfrasis interpretativa.'
- source_word: ἡρμοσάμην
  english_pob_choice: I betrothed
  chosen_spanish: los desposé
  alternatives_spanish:
  - los prometí en matrimonio
  - los comprometí
  lexicon: BDAG
  rationale: El contexto nupcial pide una acción formal de unión comprometida. «Desposé» comunica mejor la imagen matrimonial y el acto de preparación para una presentación nupcial que «comprometí», que en español moderno es más débil y menos ritual.
- source_word: ἑνὶ ἀνδρὶ
  english_pob_choice: to one husband
  chosen_spanish: con un solo esposo
  alternatives_spanish:
  - a un solo hombre
  - para un solo esposo
  lexicon: BDAG
  rationale: Aunque ἀνήρ puede significar «hombre», la metáfora de desposorio hace que «esposo» sea la correspondencia natural en español. Se añade «solo» para reflejar la exclusividad de ἑνί.
- source_word: παρθένον
  english_pob_choice: virgin
  chosen_spanish: virgen
  alternatives_spanish:
  - doncella
  - muchacha virgen
  lexicon: BDAG
  rationale: «Virgen» es la equivalencia directa y mantiene la fuerza de pureza sexual y simbólica del término en la metáfora nupcial.
- source_word: ἁγνὴν
  english_pob_choice: pure
  chosen_spanish: casta
  alternatives_spanish:
  - pura
  - sin mancha
  lexicon: BDAG
  rationale: «Casta» comunica la pureza sexual y moral que encaja con la imagen de una novia preparada para su esposo. «Pura» sería posible, pero en español puede sonar más general y perder algo del matiz de integridad sexual implícito en el contexto.
- source_word: παραστῆσαι
  english_pob_choice: to present
  chosen_spanish: para presentarlos
  alternatives_spanish:
  - para ponerlos delante
  - para ofrecerlos
  lexicon: BDAG
  rationale: El verbo mantiene su sentido de presentar formalmente a alguien ante otro. «Presentarlos» conserva la solemnidad del acto y el tono ceremonial de la imagen paulina.
- source_word: τῷ Χριστῷ
  english_pob_choice: to the Messiah
  chosen_spanish: a Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Según la pauta del proyecto, Χριστός se traduce como «Mesías» cuando funciona como título. Aquí conserva la referencia al destinatario de la presentación nupcial sin convertirlo en un simple nombre propio.
theological_decisions:
- issue: Celos divinos y celos humanos en Pablo
  english_pob_reading: Paul claims a jealousy that reflects God's own covenantal jealousy, not sinful envy.
  chosen_spanish_reading: Pablo expresa unos celos que reflejan los celos pactales de Yahvé, no envidia pecaminosa.
  alternative_spanish_readings:
  - Pablo expresa solo un celo pastoral
  - Pablo habla de una preocupación protectora sin matiz divino
  rationale: La imagen matrimonial y el genitivo θεοῦ ζήλῳ sostienen una lectura de celos pertenecientes a Dios o caracterizados por él. La traducción conserva la tensión teológica en vez de reducirla a mera preocupación pastoral.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica sin resolverla de antemano'
- issue: Título mesiánico de Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titulado de Χριστός conforme a la decisión doctrinal del proyecto. La escena nupcial refuerza la función de título, no de mero nombre litúrgico.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando funciona como título'
- issue: Imagen nupcial y pureza
  english_pob_reading: to present you as a pure virgin
  chosen_spanish_reading: para presentarlos como virgen casta
  alternative_spanish_readings:
  - para presentarlos como virgen pura
  - para presentarlos como virgen sin mancha
  rationale: La combinación «virgen casta» conserva la doble idea de virginidad e integridad moral/sexual sin añadir explicaciones. Esto respeta el símbolo nupcial de una comunidad preparada para su esposo.
  doctrine_reference: Plausible semantic range of παρθένον + ἁγνὴν in marital metaphor
translation_notes:
  revision_awareness: 'La redacción refleja la última resolución del audit trail: se restauró «Mesías» para Χριστός después de una revisión que había propuesto «Cristo». También se conservó la lectura posesiva de θεοῦ ζήλῳ como celos pertenecientes a Dios, en línea con el contexto nupcial y la tensión teológica documentada.'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino conforme al estándar del proyecto.
  - Se evita «Cristo» en el texto principal porque el expediente auditado marca «Mesías» como decisión terminológica para Χριστός cuando funciona como título.
  - «Desposé» se eligió por la metáfora matrimonial; no se rebaja a «comprometí».
  - «Casta» se prefirió a «pura» para preservar mejor el matiz de pureza sexual implícito en la imagen de la virgen.
  - El plural de tratamiento «ustedes» se mantiene para naturalidad en español latinoamericano y fidelidad al griego plural.
