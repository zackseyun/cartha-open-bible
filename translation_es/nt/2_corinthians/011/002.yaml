revisions:
- from: Porque tengo celos de ustedes con celos de Yahvé[a], pues los desposé con un solo esposo[b], para presentarlos como virgen casta a Mesías.
  to: Porque siento celos por ustedes con celos de Dios[a], pues los comprometí con un solo esposo[b], para presentarlos como una virgen pura al Mesías.
  rationale: 'Se corrige «Yahvé» a «Dios» para reflejar fielmente θεοῦ y respetar la terminología del proyecto. Se ajusta «de ustedes» a «por ustedes» para evitar ambigüedad y expresar mejor el sentido protector de ζηλῶ. Se cambia «los desposé» por «los comprometí» para representar con más claridad ἡρμοσάμην en español moderno sin perder la imagen nupcial. Se revisa «casta» a «pura» para alinearse con la decisión auditada del POB y mantener una formulación más natural junto a «virgen». La nota de alternativa sobre Χριστός se adapta al español con artículo: «al Cristo».'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura y el sentido general del griego: ζηλῶ se mantiene como «celos», ἡρμοσάμην conserva la imagen de desposorio, ἑνὶ ἀνδρὶ se entiende correctamente como «un solo esposo», y τῷ Χριστῷ se alinea con la política del proyecto al usar «Mesías». Sin embargo, hay dos problemas de fidelidad: «celos de Yahvé» introduce indebidamente el nombre divino donde el griego dice θεοῦ («de Dios»), y «los desposé con un solo esposo» sugiere una ceremonia ya realizada “con” él, mientras que el griego expresa más bien promesa/desposorio «con un solo esposo / para un solo esposo».'
  spanish_quality_summary: El español es mayormente claro y digno, pero tiene giros mejorables. «Tengo celos de ustedes» puede sonar ambiguo en español; «por ustedes» expresa mejor el sentido protector. «Los desposé con un solo esposo» suena algo extraño y puede malentenderse; «los comprometí con un solo esposo» o «los desposé con un solo esposo» sería posible, pero en registro neutral moderno «los comprometí» con nota o mantenimiento del resto de la imagen resulta más natural. También conviene cambiar «Yahvé» por «Dios» aquí, porque no se está traduciendo el Tetragrámaton.
  glossary_alignment: 'Buen alineamiento general con la pauta «Mesías» para Χριστός. Desalineación importante: la convención «Yahvé» aplica a יהוה/YHWH, no a θεός; por tanto aquí debe ser «Dios». No hay otros choques significativos con el glosario del proyecto.'
  issues:
  - severity: high
    issue: «con celos de Yahvé» traduce θεοῦ como si fuera el nombre divino
    rationale: El texto griego dice θεοῦ, no יהוה ni una cita del nombre divino. La política del proyecto distingue «Dios» de «Yahvé»; usar «Yahvé» aquí altera el referente léxico y sobretraduce.
  - severity: medium
    issue: «tengo celos de ustedes» suena ambiguo en español
    rationale: En español puede oírse como si Pablo sintiera celos causados por ellos, no celos protectores a favor de ellos. «Por ustedes» refleja mejor ζηλῶ ὑμᾶς en este contexto.
  - severity: medium
    issue: «los desposé con un solo esposo» es poco natural y puede sugerir matrimonio consumado
    rationale: ἡρμοσάμην en contexto nupcial apunta a compromiso/desposorio. «Los comprometí con un solo esposo» comunica mejor la acción preparatoria y evita confusión.
  - severity: low
    issue: La nota [a] ofrece «con un celo de Dios», pero el texto principal usa plural «celos»
    rationale: No es un error grave, pero conviene armonizar singular/plural en la alternativa para que la nota refleje mejor la decisión estilística del texto principal.
  revised_spanish_text: Porque siento celos por ustedes con celos de Dios[a], pues los comprometí con un solo esposo[b], para presentarlos como una virgen pura al Mesías.
  revised_footnotes:
  - marker: a
    text: O «con un celo de Dios». El griego puede significar celos que pertenecen a Dios o celos caracterizados por él.
    reason: lexical_alternative
  - marker: b
    text: 'O «al Cristo». Griego: «al Mesías».'
    reason: alternative_reading
  revision_rationale: 'Se corrige «Yahvé» a «Dios» para reflejar fielmente θεοῦ y respetar la terminología del proyecto. Se ajusta «de ustedes» a «por ustedes» para evitar ambigüedad y expresar mejor el sentido protector de ζηλῶ. Se cambia «los desposé» por «los comprometí» para representar con más claridad ἡρμοσάμην en español moderno sin perder la imagen nupcial. Se revisa «casta» a «pura» para alinearse con la decisión auditada del POB y mantener una formulación más natural junto a «virgen». La nota de alternativa sobre Χριστός se adapta al español con artículo: «al Cristo».'
