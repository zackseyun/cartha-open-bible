review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la secuencia retórica de εἴ τις y la mayoría de los sentidos léxicos: καταδουλοῖ como «esclavice», κατεσθίει como «devore», λαμβάνει como tomar explotadoramente, ἐπαίρεται como autoexaltación, y δέρει como golpear en el rostro. Sin embargo, ἀνέχεσθε en este contexto se refleja mejor con un objeto implícito en español («lo toleran/soportan») para corresponder al inglés auditado «put up with it» y al valor contextual de tolerar tal trato. Además, la nota [b] está anclada en «se engrandezca» aunque su contenido corresponde a λαμβάνει («tome»), lo cual desalineó nota y texto.'
  spanish_quality_summary: El español es claro y digno, pero la sintaxis repetida con «que alguien» después de «toleran» suena algo menos natural que «si alguien…». También hay una mejora de legibilidad al explicitar «lo» con «ustedes lo toleran» y al usar «se exalte» en lugar de «se engrandezca», que es más natural y directo para autoexaltación en español eclesial general. La colocación de la nota [b] debe corregirse al segmento de «tome de ustedes».
  glossary_alignment: Se mantiene correctamente la preferencia del proyecto por lenguaje fuerte de esclavitud con «esclavice». No hay conflictos con terminología teológica mayor. La decisión sobre ἐπαίρεται puede expresarse mejor como «se exalte» para reflejar la forma reflexiva sin sonar forzada. La nota léxica de λαμβάνει debe permanecer ligada al verbo de tomar, no al de autoexaltarse.
  issues:
  - severity: medium
    issue: Falta el objeto implícito de ἀνέχεσθε en español
    rationale: El inglés auditado traduce «you put up with it», y el contexto pide la idea de tolerar ese trato. «Ustedes toleran que…» es comprensible, pero «ustedes lo toleran si alguien…» reproduce mejor el sentido contextual y la ironía.
  - severity: medium
    issue: La nota [b] está anclada al verbo equivocado
    rationale: El contenido de la nota [b] explica λαμβάνει («toma» en sentido explotador), pero el marcador aparece sobre «se engrandezca». Esto puede confundir al lector y rompe la trazabilidad del razonamiento léxico.
  - severity: low
    issue: «Se engrandezca» suena menos natural que «se exalte»
    rationale: Ambas opciones son posibles, pero «se exalte» refleja de forma más transparente la autoexaltación de ἐπαίρεται y resulta más idiomático en español bíblico contemporáneo.
  revised_spanish_text: Porque ustedes lo toleran[a] si alguien los esclaviza, si alguien los devora, si alguien toma de ustedes[b], si alguien se exalta, si alguien los golpea en el rostro.
  revised_footnotes:
