    text: 'O: «lo soportan» o «lo aguantan».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se aprovecha de ustedes»; el griego dice simplemente «toma», probablemente en sentido explotador.'
    reason: lexical_alternative
  revision_rationale: La revisión restaura la correspondencia contextual de ἀνέχεσθε con un objeto implícito («lo toleran»), alinea la estructura repetida con el griego mediante «si alguien», mueve la nota [b] al verbo «toma de ustedes» que es donde realmente aplica, y mejora la naturalidad de ἐπαίρεται con «se exalta».
