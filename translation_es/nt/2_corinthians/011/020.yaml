translation:
  language: es
  text: Porque ustedes lo toleran[a] si alguien los esclaviza, si alguien los devora, si alguien toma de ustedes[b], si alguien se exalta, si alguien los golpea en el rostro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo soportan» o «lo aguantan».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «se aprovecha de ustedes»; el griego dice simplemente «toma», probablemente en sentido explotador.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέχεσθε
  english_pob_choice: you put up with it
  chosen_spanish: ustedes toleran
  alternatives_spanish:
  - ustedes lo soportan
  - ustedes lo aguantan
  lexicon: BDAG
  rationale: El verbo expresa la idea de soportar o tolerar una conducta abusiva. "Toleran" comunica bien la ironía de Pablo en español actual, sin volver la frase demasiado pesada.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa del conector y enlaza con el reproche inmediato anterior.
- source_word: καταδουλοῖ
  english_pob_choice: enslaves
  chosen_spanish: esclavice
  alternatives_spanish:
  - los someta
  - los ponga en esclavitud
  lexicon: BDAG
  rationale: Se mantiene el lenguaje fuerte de esclavitud, coherente con la preferencia del proyecto y con el valor del verbo compuesto de someter a esclavitud.
- source_word: κατεσθίει
  english_pob_choice: devours
  chosen_spanish: devore
  alternatives_spanish:
  - consuma
  - se los coma
  lexicon: BDAG
  rationale: '"Devore" preserva la imagen vívida de explotación depredadora que el inglés POB también mantuvo.'
- source_word: λαμβάνει
  english_pob_choice: takes from you
  chosen_spanish: tome de ustedes
  alternatives_spanish:
  - les quite
  - los despoje
  lexicon: BDAG
  rationale: El griego es deliberadamente amplio; "tomar de" mantiene esa amplitud sin especificar de más el objeto tomado, aunque el contexto sugiere explotación.
- source_word: ἐπαίρεται
  english_pob_choice: exalts himself
  chosen_spanish: se engrandezca
  alternatives_spanish:
  - se enaltezca
  - se exalte
  lexicon: BDAG
  rationale: La forma media comunica autoexaltación. En español, "se engrandezca" conserva el matiz de arrogancia y de elevarse por encima de otros.
- source_word: εἰς πρόσωπον ὑμᾶς δέρει
  english_pob_choice: strikes you in the face
  chosen_spanish: los golpee en el rostro
  alternatives_spanish:
  - los abofetee en el rostro
  - les pegue en la cara
  lexicon: BDAG
  rationale: La expresión griega apunta a un golpe dirigido al rostro; "en el rostro" mantiene el registro más digno y cercano al texto que "en la cara".
- source_word: εἴ τις
  english_pob_choice: if someone
  chosen_spanish: que alguien
  alternatives_spanish:
  - si alguien
  - si cualquiera
  lexicon: BDAG
  rationale: En la repetición condicional, el español fluye mejor con una subordinación introducida por "que" después de "toleran", sin alterar el valor indefinido del griego.
theological_decisions:
- issue: Tono retórico de reprensión irónica
  english_pob_reading: The verse is rendered as ironic rebuke describing the Corinthians' tolerance of abusive false apostles, without adding explicit labels in the main text.
  chosen_spanish_reading: La frase se traduce como reproche irónico que describe la tolerancia de los corintios ante abusos, sin añadir en el texto principal una identificación explícita de los agresores.
  alternative_spanish_readings:
  - Nombrar a los agresores como falsos apóstoles o falsos maestros en el texto principal
  - Suavizar la ironía hasta convertirla en una simple observación
  rationale: El griego enumera conductas abusivas sin nombrar aquí a los responsables. La traducción conserva la carga irónica y acusatoria sin introducir explicación ajena al verso.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El texto griego y el contexto del pasaje apoyan una traducción irónica y acusatoria; el audit trail en inglés no requirió revisiones adicionales y se mantuvieron sus decisiones léxicas principales, adaptadas al español sin añadir contenido interpretativo extra.
  spanish_consistency_notes:
  - Se preservó el lenguaje de esclavitud con «esclavice» para no suavizar καταδουλοῖ.
  - «Tomar de ustedes» conserva la amplitud del griego λαμβάνει y deja abierta la lectura explotadora sugerida por el contexto.
  - Se evitó traducir ἐπαίρεται por un adjetivo como «arrogante» para mantener la forma verbal y el matiz reflexivo.
  - El marcador de nota [a] se colocó en el verbo de tolerancia porque allí reside la alternativa léxica principal del inglés POB.
  - El marcador de nota [b] se colocó en «tome de ustedes» para reflejar la posibilidad de un sentido más específico de aprovechamiento.
