revisions:
- from: Porque ustedes toleran que alguien los esclavice[a], que alguien los devore, que alguien tome de ustedes, que alguien se engrandezca[b], que alguien los golpee en el rostro.
  to: Porque ustedes lo toleran[a] si alguien los esclaviza, si alguien los devora, si alguien toma de ustedes[b], si alguien se exalta, si alguien los golpea en el rostro.
  rationale: La revisión restaura la correspondencia contextual de ἀνέχεσθε con un objeto implícito («lo toleran»), alinea la estructura repetida con el griego mediante «si alguien», mueve la nota [b] al verbo «toma de ustedes» que es donde realmente aplica, y mejora la naturalidad de ἐπαίρεται con «se exalta».
  reviewer_model: gpt-5.4
