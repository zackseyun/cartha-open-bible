translation:
  language: es
  text: 'Otra vez digo: que nadie me tenga por necio[a]; pero si no, entonces recíbanme aun como necio, para que yo también me jacte un poco.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que nadie me tenga por un necio ... recíbanme aun como un necio». El adjetivo griego ἄφρων puede entenderse aquí como adjetivo («necio») o como sustantivo («un necio»).'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: Adverbio de repetición. «Otra vez» suena natural en español y conserva el valor de reiteración de la apelación de Pablo.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - estoy diciendo
  lexicon: BDAG
  rationale: Presente en discurso directo; el presente simple español expresa bien la fórmula introductoria sin forzar una perífrasis.
- source_word: μή τίς με δόξῃ ἄφρονα εἶναι
  english_pob_choice: let no one think me to be foolish
  chosen_spanish: que nadie me tenga por necio
  alternatives_spanish:
  - que nadie piense que soy un necio
  - que nadie me considere necio
  lexicon: BDAG
  rationale: μή con subjuntivo aoristo funciona como prohibición o deseo negativo. «Tener por» reproduce de manera idiomática la idea de δοκέω + infinitivo, y «necio» mantiene el campo semántico de ἄφρων sin resolver la tensión irónica.
- source_word: ἄφρονα
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - fool
  - insensato
  lexicon: BDAG
  rationale: El adjetivo puede leerse también sustantivamente. «Necio» funciona bien como adjetivo y deja abierta la posibilidad de entender el término con matiz sustantivo en la nota.
- source_word: εἰ δὲ μή γε
  english_pob_choice: but if not
  chosen_spanish: pero si no
  alternatives_spanish:
  - pero si de otra manera
  - pero si no es así
  lexicon: BDAG
  rationale: La breve concesión retórica queda más natural en español como «pero si no». Preserva la transición lógica sin añadir contenido ajeno al griego.
- source_word: κἂν
  english_pob_choice: even
  chosen_spanish: aun
  alternatives_spanish:
  - incluso
  - aunque sea
  lexicon: BDAG
  rationale: Aquí introduce un matiz concesivo con el imperativo. «Aun» conserva ese valor y evita recargar la frase.
- source_word: ὡς ἄφρονα
  english_pob_choice: as foolish
  chosen_spanish: como necio
  alternatives_spanish:
  - como un necio
  - como insensato
  lexicon: BDAG
  rationale: Se mantiene la lectura adjetival y la simetría con la primera mención de ἄφρων. «Como necio» es claro y reproduce el contraste irónico.
- source_word: δέξασθέ με
  english_pob_choice: receive me
  chosen_spanish: recíbanme
  alternatives_spanish:
  - acéptenme
  - reciban mi persona
  lexicon: BDAG
  rationale: Imperativo plural aoristo con valor de acogida/aceptación. «Recíbanme» conserva la fuerza directa y el tono retórico del pasaje.
- source_word: ἵνα κἀγὼ
  english_pob_choice: so that I too
  chosen_spanish: para que yo también
  alternatives_spanish:
  - a fin de que yo también
  - de modo que yo también
  lexicon: BDAG
  rationale: ἵνα expresa finalidad o resultado; «para que» es la equivalencia más natural en español. «Yo también» preserva el énfasis de κἀγώ.
- source_word: μικρόν τι
  english_pob_choice: a little
  chosen_spanish: un poco
  alternatives_spanish:
  - algo
  - un poquito
  lexicon: BDAG
  rationale: Expresión idiomática de pequeña medida. «Un poco» comunica la cantidad mínima sin añadir coloquialismo excesivo.
- source_word: καυχήσωμαι
  english_pob_choice: may boast
  chosen_spanish: me gloríe
  alternatives_spanish:
  - me jacte
  - pueda gloriarme
  lexicon: BDAG
  rationale: En contexto paulino, el verbo puede traducirse con el campo de «gloriarse» o «jactarse». Se elige «me gloríe» para conservar el registro bíblico y la ambivalencia retórica del pasaje; «jactarse» sería una alternativa más fuerte, pero menos eclesialmente fluida en español.
theological_decisions:
- issue: La ironía de Pablo al hablar de sí mismo como ἄφρων
  english_pob_reading: Retain 'foolish' language without softening the irony
  chosen_spanish_reading: Mantener el lenguaje de «necio» sin suavizar la ironía
  alternative_spanish_readings:
  - usar «loco»
  - parafrasear como «hablando con atrevimiento»
  rationale: 'El versículo conserva una autocaracterización retórica deliberadamente tensa: Pablo acepta, a modo concesivo, el marco de la necedad para continuar su argumento. Conviene no disipar esa ironía con una paráfrasis explicativa.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica y retórica, no resolverla.'
translation_notes:
  revision_awareness: El borrador inglés auditado pasó de «but if otherwise» a «but if not», lo cual refuerza una concesión breve y directa. En español se reflejó con «pero si no», evitando una formulación más interpretativa y manteniendo el paralelismo retórico del verso.
  spanish_consistency_notes:
  - Se mantiene «necio» para ἄφρων en ambas apariciones, con nota de alternativa sustantiva.
  - Se usa «gloríe» para καυχήσωμαι, coherente con el léxico paulino y con el tono irónico del contexto.
  - No se introduce «Cristo» ni terminología doctrinal ajena al versículo; la puntuación reproduce el quiebre retórico del griego con un punto y coma implícito en español.
