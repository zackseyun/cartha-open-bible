    rationale: El POB inglés eligió «may boast» precisamente para no suavizar el lenguaje de jactancia en este contexto irónico. «Gloriarse» en español puede sonar más noble o teológicamente positivo, mientras que Pablo aquí adopta una postura de jactancia irónica y reacia.
