    rationale: Aunque semánticamente defendible, en español bíblico natural «para vergüenza nuestra» o «para nuestra vergüenza» comunica mejor la fuerza retórica de deshonra/shame sin rigidez calca.
  - severity: medium
    issue: Falta la explicitación contextual de «jactarse» en «en lo que cualquiera se atreve»
    rationale: La auditoría inglesa documenta esta expansión como una aclaración discursiva justificada por el contexto inmediato de jactancia rival. En español, dejarlo implícito vuelve la frase más opaca de lo necesario.
  - severity: low
    issue: La nota d queda menos bien anclada si el texto principal usa «lo digo con insensatez»
    rationale: La alternativa inglesa «I speak as a fool» se refleja más naturalmente con «hablo como un necio/insensato». La redacción actual no es errónea, pero la correspondencia nota-texto podría pulirse.
