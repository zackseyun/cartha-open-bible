base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/021.yaml
  text: I say this to our shame[a], as though we had been weak[d][c][b]. Yet in whatever anyone dares to boast—I am speaking foolishly—I also dare.
  footnotes:
