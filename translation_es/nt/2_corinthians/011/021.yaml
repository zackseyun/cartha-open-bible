translation:
  language: es
  text: Lo digo para vergüenza nuestra[a], como si hubiéramos sido débiles[b]. Pero en cualquier cosa en que alguien se atreva a jactarse[c], lo digo con insensatez[d], también yo me atrevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por vía de deshonra lo digo»; la expresión griega es idiomática y también puede entenderse como «lo digo como una deshonra».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como si fuéramos débiles». Pablo habla con ironía en el contexto de su jactancia «insensata».'
    reason: lexical_alternative
  - marker: c
    text: 'Literalmente: «en cualquier cosa en que alguien se atreva». El objeto «a jactarse» está implícito por el contexto circundante.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «hablo como un necio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ ἀτιμίαν
  english_pob_choice: to our shame
  chosen_spanish: para nuestra deshonra
  alternatives_spanish:
  - con vergüenza
  - para vergüenza nuestra
  - en nuestra deshonra
  lexicon: BDAG
  rationale: La expresión es idiomática y no debe traducirse de forma mecánica como “según deshonra”. “Para nuestra deshonra” conserva la idea de vergüenza/deshonra ligada al hablante y mantiene el tono retórico del pasaje. Se evita “vergüenza” como único equivalente porque el campo de ἀτιμία incluye deshonra pública además de emoción interna.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: lo digo
  alternatives_spanish:
  - digo
  - estoy diciendo
  lexicon: BDAG
  rationale: El presente simple español mantiene bien el valor de la observación retórica de Pablo. “Lo digo” suena natural y enlaza con el contenido de la cláusula anterior sin forzar un complemento explícito fuera del contexto.
- source_word: ὡς ὅτι
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como que
  - como si fuera el caso que
  lexicon: BDAG
  rationale: La combinación introduce una concesión irónica o de apariencia, no una afirmación directa. “Como si” es el equivalente español más claro y fiel a esa matización.
- source_word: ἠσθενήκαμεν
  english_pob_choice: we had been weak
  chosen_spanish: hubiéramos sido débiles
  alternatives_spanish:
  - éramos débiles
  - habíamos sido débiles
  - estuviéramos débiles
  lexicon: BDAG
  rationale: El pluscuamperfecto/valor retrospectivo en inglés refleja la concesión irónica. En español, el imperfecto de subjuntivo en la prótasis comparativa (“como si hubiéramos sido...”) expresa bien la irrealidad o apariencia. “Débiles” preserva el matiz de falta de fuerza/estatus, no solo debilidad física.
- source_word: ἐν ᾧ
  english_pob_choice: in whatever
  chosen_spanish: en lo que
  alternatives_spanish:
  - en aquello en que
  - en cualquier cosa en que
  - en cualquier medida en que
  lexicon: BDAG
  rationale: La frase introduce la esfera o ámbito de la audacia. “En lo que” suena natural en español y mantiene la amplitud del giro sin añadir más de lo que el griego exige.
- source_word: τολμᾷ
  english_pob_choice: dares to boast
  chosen_spanish: cualquiera se atreve
  alternatives_spanish:
  - cualquiera se atreve a jactarse
  - cualquiera osa
  - cualquiera se atreve
  lexicon: BDAG
  rationale: En esta cláusula el verbo es “atreverse”; el objeto implícito está dado por el contexto de jactancia rival. En el texto español se deja implícito, como en el griego, para no sobrecargar la línea. Dado que el contexto ya es claramente apologético y de jactancia, “se atreve” conserva la fuerza verbal sin imponer una expansión interpretativa.
- source_word: ἐν ἀφροσύνῃ
  english_pob_choice: I am speaking foolishly
  chosen_spanish: lo digo con insensatez
  alternatives_spanish:
  - hablo neciamente
  - lo digo como necio
  - hablo como necio
  lexicon: BDAG
  rationale: Pablo añade una autocalificación retórica. “Con insensatez” mantiene la estructura del sintagma preposicional y suena más natural que un calco literal. “Insensatez” comunica el matiz de falta de prudencia/cordura sin convertirlo en una autoacusación doctrinal.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: lo digo
  alternatives_spanish:
  - digo
  lexicon: BDAG
  rationale: Aquí el verbo retoma la cláusula parentética; repetir “lo digo” ayuda a reflejar el paralelismo y el tono parentético del griego.
- source_word: τολμῶ κἀγώ
  english_pob_choice: I also dare
  chosen_spanish: también yo me atrevo
  alternatives_spanish:
  - yo también me atrevo
  - también me atrevo yo
  - yo también oso
  lexicon: BDAG
  rationale: Se preserva la repetición de la raíz de “atreverse” para reflejar el paralelismo con τολμᾷ. “También yo me atrevo” mantiene la respuesta retórica de Pablo y deja implícito el objeto, como en el griego y en la auditoría inglesa.
theological_decisions:
- issue: Ironía y ‘fool’s speech’ en la autodescripción de Pablo
  english_pob_reading: Render the statement as ironic concession rather than literal confession of moral failure
  chosen_spanish_reading: Traducir la frase como concesión irónica, no como confesión literal de fracaso moral o ministerial
  alternative_spanish_readings:
  - Como si de verdad hubiéramos sido débiles
  - Lo digo simplemente como confesión de debilidad
  rationale: El contexto inmediato es la sección de la ‘locura’ de la jactancia en 2 Corintios 11. La traducción debe conservar esa ironía y no resolverla en una admisión directa que altere el argumento de Pablo. “Como si hubiéramos sido débiles” deja abierta la tensión retórica documentada por el POB inglés.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se revisó el verso a la luz del griego SBLGNT y del audit trail inglés. La redacción española conserva el idiomatismo de κατὰ ἀτιμίαν, la concesión irónica de ὡς ὅτι, el objeto implícito de τολμᾷ y el comentario parentético de ἐν ἀφροσύνῃ χωρίς resolver la tensión retórica.
  spanish_consistency_notes:
  - Se usa ‘deshonra’ para ἀτιμία, en línea con el sentido público/retórico del término.
  - Se mantiene ‘me atrevo’ para τολμάω y su repetición enfática.
  - ‘Insensatez’ traduce ἀφροσύνη con un registro natural y bíblicamente inteligible.
  - La cláusula comparativa usa subjuntivo para expresar la irrealidad/ironía del griego.
  - Las notas a pie distinguen entre alternativa lexical y explicación contextual sin duplicar marcadores.
