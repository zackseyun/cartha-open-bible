    issue: «de gloriarme» personaliza τῆς καυχήσεως
    rationale: El genitivo griego nombra «la jactancia / el gloriarse» como esfera o contenido de la confianza, no específicamente «mi gloriarme». El infinitivo en primera persona añade interpretación no presente en el original.
