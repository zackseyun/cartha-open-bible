translation:
  language: es
  text: Lo que digo[a], no lo digo conforme al Señor, sino como en insensatez[b], en esta confianza[c] de jactarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no digo esto como de parte del Señor», o «según el criterio del Señor».'
    reason: alternative_reading
  - marker: b
    text: 'O: «sino como si fuera en insensatez», o más idiomáticamente, «sino como un necio».'
    reason: lexical_alternative
  - marker: c
    text: El término griego traducido «confianza» también puede significar «asunto», «base» o «empresa» según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ λαλῶ
  english_pob_choice: What I am saying
  chosen_spanish: Lo que digo
  alternatives_spanish:
  - Lo que estoy diciendo
  - Lo que hablo
  lexicon: BDAG
  rationale: El relativo neutro introduce el contenido del habla de Pablo. «Lo que digo» es natural en español y conserva el presente continuo del sentido sin forzar una perífrasis excesiva.
- source_word: κατὰ κύριον
  english_pob_choice: according to the Lord
  chosen_spanish: conforme al Señor
  alternatives_spanish:
  - según el Señor
  - de acuerdo con el Señor
  - como de parte del Señor
  lexicon: BDAG
  rationale: κατά con acusativo expresa norma o estándar. «Conforme al Señor» mantiene la idea de medida o criterio sin decidir demasiado entre origen, autoridad o norma.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - maestro
  lexicon: BDAG
  rationale: Se conserva «Señor» por el uso cristiano establecido y porque el contexto paulino normalmente remite al Señor Jesús; no se expande en el texto principal.
- source_word: ἀλλ’ ὡς ἐν ἀφροσύνῃ
  english_pob_choice: but as in foolishness
  chosen_spanish: sino como en insensatez
  alternatives_spanish:
  - sino como si fuera insensatez
  - sino como un necio
  lexicon: BDAG
  rationale: «Insensatez» conserva el campo semántico de ἀφροσύνη y mantiene una formulación cercana al griego. Evita cerrar la ambigüedad entre modo retórico y autocaracterización directa.
- source_word: ἐν ταύτῃ τῇ ὑποστάσει
  english_pob_choice: in this confidence
  chosen_spanish: en esta confianza
  alternatives_spanish:
  - en este asunto
  - en este fundamento
  - en esta empresa
  - en esta seguridad
  lexicon: BDAG
  rationale: Aunque ὑπόστασις puede significar «asunto», «base» o «emprendimiento», en este contexto de jactancia la opción más transparente es «confianza», que refleja el tono de autosostén retórico sin eliminar la posible tensión semántica.
- source_word: τῆς καυχήσεως
  english_pob_choice: of boasting
  chosen_spanish: de gloriarme
  alternatives_spanish:
  - de jactancia
  - del gloriarme
  lexicon: BDAG
  rationale: καύχησις expresa el acto de jactarse o gloriarse. «De gloriarme» es una opción digna y natural en español bíblico moderno, y conserva el matiz verbal del sustantivo.
theological_decisions:
- issue: Sentido de «conforme al Señor» / κατὰ κύριον
  english_pob_reading: Paul says his forthcoming boast is not spoken according to the Lord's standard or manner, but as speech marked by foolishness.
  chosen_spanish_reading: Pablo señala que lo que va a decir no está formulado conforme al Señor, sino como un discurso marcado por la insensatez.
  alternative_spanish_readings:
  - Pablo dice que no habla aquí como una cita directa del Señor.
  - Pablo dice que su contenido no proviene realmente del Señor.
  rationale: La frase griega probablemente marca el modo retórico y la norma del discurso, no una negación de verdad o inspiración. La traducción conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de eliminarla'
- issue: Valor de ἀφροσύνῃ y el tono de autocaracterización
  english_pob_reading: but as in foolishness
  chosen_spanish_reading: sino como en insensatez
  alternative_spanish_readings:
  - sino como si fuera insensatez
  - sino como un necio
  rationale: La expresión mantiene el carácter de recurso retórico de Pablo al hablar de su jactancia. No se rebaja el texto a una simple autoinsulto, ni se diluye el contraste con el Señor.
  doctrine_reference: 2 Corintios 10–12; retórica paulina de la jactancia necia
- issue: Ambigüedad de ὑπόστασις en contexto
  english_pob_reading: in this confidence
  chosen_spanish_reading: en esta confianza
  alternative_spanish_readings:
  - en este asunto
  - en esta base
  - en esta empresa
  rationale: «Confianza» refleja bien la postura interior o base de la jactancia en el flujo inmediato. A la vez, no elimina la posibilidad de que el término roce la idea de «asunto» o «fundamento»; esa tensión se preserva en la nota.
  doctrine_reference: 2 Corintios 11:16–18; semántica contextual de ὑπόστασις
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete inglés; la presente versión sigue el estado más reciente, con acuerdo alto entre revisión y control cruzado.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al criterio proyectivo, sin convertirlo en un reemplazo litúrgico opaco.
  - Se usa «gloriarme» para καύχησις para conservar el campo semántico de jactancia/boast y su conexión con el contexto inmediato.
  - «Insensatez» se eligió para ἀφροσύνη para evitar un calco duro y mantener registro bíblico moderno.
  - 'La puntuación separa claramente la oposición retórica: negación, contraste y frase nominal final.'
