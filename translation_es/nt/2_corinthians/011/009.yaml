source:
  edition: SBLGNT
  text: καὶ παρὼν πρὸς ὑμᾶς καὶ ὑστερηθεὶς οὐ κατενάρκησα οὐθενός· τὸ γὰρ ὑστέρημά μου προσανεπλήρωσαν οἱ ἀδελφοὶ ἐλθόντες ἀπὸ Μακεδονίας· καὶ ἐν παντὶ ἀβαρῆ ⸂ἐμαυτὸν ὑμῖν⸃ ἐτήρησα καὶ τηρήσω.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/009.yaml
  text: And when I was present with you and was in need[a], I was not a burden to anyone; for the brothers who came from Macedonia supplied what I lacked. And in everything I kept myself from being a burden to you[b], and will keep doing so.
  footnotes:
  - marker: a
    text: Or, 'I did not burden anyone.' The Greek verb can mean to weigh on someone or be a financial burden to them.
    reason: lexical_alternative
  - marker: b
    text: '''The brothers'' translates a masculine plural form. Depending on context, Paul can use this term more broadly for fellow believers, but here it likely refers to specific coworkers from Macedonia.'
    reason: lexical_alternative
