translation:
  language: es
  text: Y cuando estuve presente con ustedes y tuve necesidad[a], no fui carga para nadie; porque los hermanos[b] que llegaron de Macedonia suplieron lo que me faltaba. Y en todo me mantuve sin serles carga, y así seguiré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no fui carga para nadie». El verbo griego puede significar que uno pesa sobre alguien o le resulta una carga financiera.'
    reason: lexical_alternative
  - marker: b
    text: «Los hermanos» traduce una forma masculina plural. Según el contexto, Pablo puede usar este término de manera más amplia para creyentes, pero aquí probablemente se refiere a colaboradores específicos de Macedonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρὼν πρὸς ὑμᾶς
  english_pob_choice: when I was present with you
  chosen_spanish: cuando estuve presente con ustedes
  alternatives_spanish:
  - cuando estaba con ustedes
  - mientras estaba con ustedes
  lexicon: BDAG
  rationale: El participio con πρὸς ὑμᾶς expresa presencia personal y circunstancial; en español, «estuve presente con ustedes» conserva la idea de presencia real sin sonar forzado. «Con ustedes» mantiene la relación directa del destinatario.
- source_word: ὑστερηθεὶς
  english_pob_choice: was in need
  chosen_spanish: tuve necesidad
  alternatives_spanish:
  - me faltaba algo
  - estuve en necesidad
  - carecí
  lexicon: BDAG
  rationale: El participio pasivo indica experimentar carencia o necesidad, especialmente material en este contexto. «Tuve necesidad» es natural en español y deja abierta la fuerza económica del pasaje sin volverlo abstracto.
- source_word: οὐ κατενάρκησα οὐθενός
  english_pob_choice: I was not a burden to anyone
  chosen_spanish: no fui carga para nadie
  alternatives_spanish:
  - no cargué a nadie
  - no les fui gravoso a nadie
  - no fui un peso para nadie
  lexicon: BDAG
  rationale: καταναρκάω implica ser una carga, especialmente económica o material. «No fui carga para nadie» conserva la fuerza idiomática y el matiz relacional del original mejor que una paráfrasis más libre.
- source_word: τὸ ὑστέρημά μου
  english_pob_choice: what I lacked
  chosen_spanish: lo que me faltaba
  alternatives_spanish:
  - mi necesidad
  - mi carencia
  lexicon: BDAG
  rationale: La expresión nombra la deficiencia o lo faltante. «Lo que me faltaba» es idiomático en español y evita una abstracción excesiva, manteniendo el sentido de carencia concreta.
- source_word: προσανεπλήρωσαν
  english_pob_choice: supplied
  chosen_spanish: suplieron
  alternatives_spanish:
  - completaron
  - llenaron lo que faltaba
  - proveyeron
  lexicon: BDAG
  rationale: El verbo compuesto significa suplir algo añadido, llenar lo que faltaba. «Suplieron» es breve y fiel; el complemento «lo que me faltaba» ya comunica la idea de completar la necesidad.
- source_word: οἱ ἀδελφοὶ
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - la hermandad
  lexicon: BDAG
  rationale: El plural masculino se conserva como «los hermanos», siguiendo la política de fidelidad de género en el texto base. En este contexto puede aludir a colaboradores específicos llegados de Macedonia.
- source_word: ἐλθόντες ἀπὸ Μακεδονίας
  english_pob_choice: who came from Macedonia
  chosen_spanish: que llegaron de Macedonia
  alternatives_spanish:
  - que vinieron de Macedonia
  - procedentes de Macedonia
  lexicon: BDAG
  rationale: El participio aoristo se vierte de manera natural como relativa en español. «Llegaron de Macedonia» mantiene el origen geográfico del apoyo sin añadir información.
- source_word: ἐν παντὶ
  english_pob_choice: in everything
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en toda circunstancia
  - de todas maneras
  lexicon: BDAG
  rationale: La expresión es amplia y adverbial. «En todo» preserva esa amplitud de forma concisa y más natural que una expansión excesiva.
- source_word: ἀβαρῆ ἐμαυτὸν ὑμῖν
  english_pob_choice: myself from being a burden to you
  chosen_spanish: me guardé de serles carga
  alternatives_spanish:
  - me mantuve sin serles carga
  - me conservé sin gravarlos
  - me hice no gravoso para ustedes
  lexicon: BDAG
  rationale: ἀβαρής significa no gravoso, no pesado, especialmente en sentido económico. En español se requiere expansión; «me guardé de serles carga» retiene la idea de evitar gravarlos y suena natural.
- source_word: ἐτήρησα καὶ τηρήσω
  english_pob_choice: I kept ... and will keep doing so
  chosen_spanish: me guardaré también
  alternatives_spanish:
  - lo he guardado y lo guardaré
  - seguiré guardándome así
  - lo mantuve y lo mantendré
  lexicon: BDAG
  rationale: τηρέω aquí se refiere a mantener la misma conducta de no resultar gravoso. «Me guardaré también» conserva la continuidad verbal con el primer verbo y refleja la intención futura sin redundancia pesada.
theological_decisions:
- issue: Tratamiento de ἀδελφοὶ como masculino plural
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - personas creyentes
  rationale: El texto griego usa masculino plural, y la auditoría inglesa retiene «the brothers». En español se mantiene «los hermanos» para no neutralizar el rasgo gramatical del original ni borrar la posible referencia a colaboradores concretos.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y coincide en sustancia con la auditoría inglesa de POB, manteniendo las decisiones léxicas clave sobre presencia, necesidad, carga, suplir y la continuidad futura. No se introdujeron revisiones textuales ni cambios de sentido respecto al último pase auditado.
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene κύριος ni una alusión directa al nombre divino.
  - «No fui carga para nadie» y la nota [a] preservan la alternativa documentada de sentido económico o relacional del verbo.
  - 'Se mantiene la secuencia verbal en primera persona singular para reflejar la progresión del original: conducta pasada, mantenimiento actual y compromiso futuro.'
  - «Los hermanos» conserva el plural masculino del griego y la lectura auditada en inglés.
