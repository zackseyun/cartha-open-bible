revisions:
- from: Y cuando estuve presente con ustedes y tuve necesidad[a], no fui carga para nadie; porque los hermanos[b] que llegaron de Macedonia suplieron lo que me faltaba. Y en todo me guardé de serles carga, y me guardaré también.
  to: Y cuando estuve presente con ustedes y tuve necesidad[a], no fui carga para nadie; porque los hermanos[b] que llegaron de Macedonia suplieron lo que me faltaba. Y en todo me mantuve sin serles carga, y así seguiré.
  rationale: Se ajusta solo la cláusula final para reflejar con más naturalidad y precisión la idea de mantener en el pasado y continuar en el futuro la conducta de no ser carga para los corintios. «Me mantuve sin serles carga, y así seguiré» comunica mejor ἀβαρῆ ἐμαυτὸν ὑμῖν ἐτήρησα καὶ τηρήσω.
  reviewer_model: gpt-5.4
