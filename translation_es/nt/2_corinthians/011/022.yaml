translation:
  language: es
  text: ¿Son hebreos? Yo también. ¿Son israelitas? Yo también. ¿Son descendencia de Abraham[a]? Yo también.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «simiente de Abraham». El griego usa una expresión singular colectiva.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἑβραῖοί
  english_pob_choice: Hebrews
  chosen_spanish: hebreos
  alternatives_spanish:
  - pueblo hebreo
  - judíos
  lexicon: BDAG
  rationale: El término designa una identidad étnico-histórica y se conserva mejor con el etnónimo breve y reconocido «hebreos». «Pueblo hebreo» explicita el sentido, pero es menos directo; «judíos» sería demasiado amplio y borraría la distinción retórica con «israelitas».
- source_word: κἀγώ
  english_pob_choice: So am I
  chosen_spanish: Yo también
  alternatives_spanish:
  - También yo
  - Así también yo
  lexicon: BDAG
  rationale: La forma griega es breve y enfática; en español la respuesta natural y equivalente es «Yo también». Mantiene la repetición retórica sin sonar forzada.
- source_word: Ἰσραηλῖταί
  english_pob_choice: Israelites
  chosen_spanish: israelitas
  alternatives_spanish:
  - miembros de Israel
  - descendientes de Israel
  lexicon: BDAG
  rationale: «Israelitas» es el equivalente español preciso y asentado para pertenencia al pueblo de Israel. Conserva la distinción con «hebreos» y con la siguiente referencia genealógica.
- source_word: σπέρμα Ἀβραάμ
  english_pob_choice: Abraham’s offspring
  chosen_spanish: descendencia de Abraham
  alternatives_spanish:
  - simiente de Abraham
  - semilla de Abraham
  - descendientes de Abraham
  lexicon: BDAG
  rationale: El griego usa un singular colectivo; «descendencia» reproduce bien esa idea en español y suena natural. «Simiente» conserva más literalmente el matiz de σπέρμα, pero en español actual puede sonar menos claro o más eclesiástico; «descendientes» pluraliza el matiz colectivo.
theological_decisions:
- issue: Tres reclamos parcialmente superpuestos de identidad judaica
  english_pob_reading: 'Retain three distinct labels: ''Hebrews,'' ''Israelites,'' and ''Abraham’s offspring'''
  chosen_spanish_reading: 'Conservar tres etiquetas distintas: «hebreos», «israelitas» y «descendencia de Abraham»'
  alternative_spanish_readings:
  - unificar todo como «judíos»
  - reducir el final a «descendientes de Abraham» sin mantener la serie
  rationale: La fuerza del pasaje está en la acumulación de títulos relacionados pero no idénticos. La traducción no debe aplanarlos en una sola categoría; por eso se mantienen tres formulaciones diferenciadas en español.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El contexto inglés indica alta concordancia y ninguna revisión aplicada; por eso se mantiene la estructura retórica directa, con ajuste natural al español para la respuesta idiomática y la coletilla explicativa en la nota de «descendencia de Abraham».
  spanish_consistency_notes:
  - Se conserva la tríada retórica sin sinonimizarla.
  - «Yo también» se usa uniformemente para κἀγώ en las tres respuestas.
  - «Descendencia de Abraham» refleja el singular colectivo de σπέρμα y evita una traducción mecánica o excesivamente literal.
