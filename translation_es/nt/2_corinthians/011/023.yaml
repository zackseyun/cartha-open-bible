    reason: alternative_reading
  - marker: b
    text: Literalmente, «en muertes muchas veces»; probablemente alude a repetidos peligros de muerte o a encuentros reiterados con la muerte.
    reason: lexical_alternative
  revision_rationale: Se corrige 'esclavos' a 'servidores' para reflejar διάκονοι con fidelidad y conforme a la decisión auditada del POB. Se mueve la nota [b] a 'muertes' porque explica θανάτοις πολλάκις, no πληγαῖς. También se ajusta 'prisiones' a 'encarcelamientos' para expresar mejor episodios repetidos de confinamiento, y se alisa el español retórico con 'más abundantemente' y 'yo más aún' sin apartarse del sentido fuente.
