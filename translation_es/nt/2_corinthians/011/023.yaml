review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura retórica del griego, incluyendo la autocalificación de Pablo (''Hablo como si estuviera loco'') y la serie de comparativos/intensificadores. También preserva correctamente Χριστοῦ como ''Mesías'' con nota alternativa. Sin embargo, hay dos desajustes relevantes con la evidencia fuente y con el rastro auditado: διάκονοι debe reflejar ''servidores/siervos'', no ''esclavos'', porque el POB inglés documentó explícitamente ''servants'' frente a ''ministers''; y la nota [b] está anclada en ''golpes'' aunque corresponde a ''en muertes muchas veces''. Además, ''prisiones'' suaviza la idea de episodios repetidos mejor expresada por ''encarcelamientos''.'
  spanish_quality_summary: El español es mayormente claro, pero '¿Son esclavos de Mesías?' suena teológicamente más fuerte de lo que exige διάκονοι y menos idiomático que 'servidores'. 'En trabajos con mayor abundancia' y 'en prisiones con mayor abundancia' son comprensibles pero algo pesados; 'más abundantemente' mantiene mejor el paralelismo y la elevación retórica. La reubicación de la nota [b] mejora la legibilidad y la precisión. El resto del verso puede mantenerse con pequeños ajustes para una lectura más natural y fiel.
  glossary_alignment: Alineación parcial. 'Mesías' sigue correctamente la política para Χριστός. No hay otros términos doctrinales conflictivos. Pero 'esclavos' no se alinea con la decisión auditada para διάκονοι en este versículo; aquí corresponde 'servidores' (o secundariamente 'siervos'), no el valor más fuerte de δοῦλος. La nota alternativa 'Cristo' está bien.
  issues:
  - severity: high
    issue: διάκονοι fue traducido como 'esclavos'
    rationale: El término fuente es διάκονοι, no δοῦλοι. El POB inglés documenta 'servants' precisamente para evitar tanto 'ministers' como una carga eclesiástica indebida. 'Esclavos' introduce una fuerza semántica más propia de δοῦλος y altera el sentido.
  - severity: high
    issue: La nota [b] está anclada en 'golpes' pero explica 'en muertes muchas veces'
    rationale: La nota lexical sobre el plural inusual θανάτοις debe aparecer en la frase correspondiente. Tal como está, crea una referencia errónea y confusa.
  - severity: medium
    issue: '''Prisiones'' no expresa tan bien como ''encarcelamientos'' la idea de episodios repetidos'
    rationale: φυλακαῖς en plural apunta a confinamientos repetidos más que a lugares. 'Encarcelamientos' comunica mejor el matiz señalado en el rastro inglés.
  - severity: low
    issue: La formulación 'con mayor abundancia' resulta algo rígida
    rationale: Aunque fiel, en español suena menos natural en una enumeración retórica. 'Más abundantemente' o 'mucho más' fluye mejor sin perder el comparativo.
  revised_spanish_text: '¿Son servidores del Mesías[a]? Hablo como si estuviera loco: yo más aún; en trabajos más abundantemente, en encarcelamientos más abundantemente, en golpes más allá de medida, en muertes[b] muchas veces.'
  revised_footnotes:
