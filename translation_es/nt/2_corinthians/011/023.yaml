- from: '¿Son esclavos de Mesías[a]? Hablo como si estuviera loco: yo soy más; en trabajos con mayor abundancia, en prisiones con mayor abundancia, en golpes[b] más allá de medida, en muertes muchas veces.'
  to: '¿Son servidores del Mesías[a]? Hablo como si estuviera loco: yo más aún; en trabajos más abundantemente, en encarcelamientos más abundantemente, en golpes más allá de medida, en muertes[b] muchas veces.'
  rationale: Se corrige 'esclavos' a 'servidores' para reflejar διάκονοι con fidelidad y conforme a la decisión auditada del POB. Se mueve la nota [b] a 'muertes' porque explica θανάτοις πολλάκις, no πληγαῖς. También se ajusta 'prisiones' a 'encarcelamientos' para expresar mejor episodios repetidos de confinamiento, y se alisa el español retórico con 'más abundantemente' y 'yo más aún' sin apartarse del sentido fuente.
  reviewer_model: gpt-5.4
