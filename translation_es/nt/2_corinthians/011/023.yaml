translation:
  language: es
  text: '¿Son servidores del Mesías[a]? Hablo como si estuviera loco: yo más aún; en trabajos más abundantemente, en encarcelamientos más abundantemente, en golpes más allá de medida, en muertes[b] muchas veces.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Cristo»: «¿Son servidores de Cristo?»'
    reason: alternative_reading
  - marker: b
    text: Literalmente, «en muertes muchas veces»; probablemente alude a repetidos peligros de muerte o a encuentros reiterados con la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - ministros
  lexicon: BDAG
  rationale: διάκονος puede abarcar servicio y ministerio, pero el POB inglés eligió 'servants' para mantener transparencia y no cargar el término con un sentido eclesiástico. En español, 'esclavos' preserva mejor la fuerza relacional y servicial del vocablo en este contexto polémico, aunque 'siervos' es una alternativa más suave; se evita 'ministros' por ser demasiado eclesiástico.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como nombre propio plenamente fijado; por eso se rinde como 'Mesías', siguiendo la directriz doctrinal del proyecto y la lectura transparente del genitivo 'de Mesías'.
- source_word: παραφρονῶν λαλῶ
  english_pob_choice: I am speaking as if insane
  chosen_spanish: Hablo como si estuviera loco
  alternatives_spanish:
  - Hablo como un loco
  - Estoy hablando como si estuviera fuera de mí
  lexicon: BDAG
  rationale: La construcción expresa que Pablo reconoce que su habla suena desatinada o insensata. 'Como si estuviera loco' conserva el valor comparativo y el tono autoconciente sin forzar un modismo ajeno al español.
- source_word: ὑπὲρ ἐγώ
  english_pob_choice: I am more so
  chosen_spanish: yo soy más
  alternatives_spanish:
  - yo soy todavía más
  - yo soy más que ellos
  lexicon: BDAG
  rationale: La frase griega es elíptica. En español se completa de manera sobria como 'yo soy más', manteniendo la comparación implícita con los rivales sin añadir contenido no presente.
- source_word: ἐν κόποις περισσοτέρως
  english_pob_choice: in labors more abundantly
  chosen_spanish: en trabajos con mayor abundancia
  alternatives_spanish:
  - en labores con mayor abundancia
  - en fatigas con mayor abundancia
  lexicon: BDAG
  rationale: κόπος denota esfuerzo penoso, trabajo agotador o fatiga. 'Trabajos' es natural en español, y la frase 'con mayor abundancia' preserva περισσοτέρως sin suavizar la repetición intensiva.
- source_word: ἐν φυλακαῖς περισσοτέρως
  english_pob_choice: in imprisonments more abundantly
  chosen_spanish: en prisiones con mayor abundancia
  alternatives_spanish:
  - en encarcelamientos con mayor abundancia
  - en cautiverios con mayor abundancia
  lexicon: BDAG
  rationale: φυλακή en plural señala experiencias reiteradas de encierro. 'Prisiones' mantiene la imagen concreta y el plural de episodios; 'encarcelamientos' sería más explícito pero menos natural.
- source_word: ἐν πληγαῖς ὑπερβαλλόντως
  english_pob_choice: in beatings beyond measure
  chosen_spanish: en golpes[b] más allá de medida
  alternatives_spanish:
  - en azotes más allá de medida
  - en heridas más allá de medida
  lexicon: BDAG
  rationale: πληγή puede referir a golpe, herida o castigo corporal. 'Golpes' conserva la amplitud semántica y el carácter contundente de la lista; 'más allá de medida' reproduce ὑπερβαλλόντως con un giro español claro.
- source_word: ἐν θανάτοις πολλάκις
  english_pob_choice: in deaths often
  chosen_spanish: en muertes muchas veces
  alternatives_spanish:
  - en peligros de muerte muchas veces
  - muchas veces al borde de la muerte
  lexicon: BDAG
  rationale: Se conserva el plural llamativo 'muertes', como en el POB inglés, para no apagar la intensidad retórica. En español puede oírse como múltiples peligros mortales o experiencias repetidas al borde de morir, pero se mantiene la literalidad sobria del original.
theological_decisions:
- issue: Título Χριστός en genitivo después de διάκονοι
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se sigue la política del proyecto de traducir el título Χριστός como 'Mesías' cuando funciona como designación titular. Esto evita convertirlo en un nombre fijo sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Interpretación de θανάτοις πολλάκις
  english_pob_reading: Literally 'in deaths often,' likely meaning repeated brushes with death or mortal dangers.
  chosen_spanish_reading: literalidad con posible sentido de peligros mortales reiterados
  alternative_spanish_readings:
  - peligros de muerte muchas veces
  - al borde de la muerte muchas veces
  rationale: La redacción conserva la pluralidad extraña de 'muertes' y, a la vez, permite entender la alusión a riesgos mortales repetidos sin sustituirla por una paráfrasis interpretativa en el texto principal.
  doctrine_reference: POB lexical note on preserving rhetorical strangeness where the source is intentionally abrupt
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión: el POB inglés osciló entre ''Messiah'' y ''Christ'' para Χριστοῦ, con restauración final de ''Messiah'' por la política doctrinal. También se conservó la nota léxica sobre el plural inusual ''deaths often'' como referencia para no suavizar θανάτοις πολλάκις.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' de forma consistente con la política del proyecto para Χριστός como título.
  - Se evitó 'ministerios' o 'ministros' para διάκονοι por ser terminología eclesiástica más cargada que el original.
  - Se preservó la repetición de 'con mayor abundancia' para reflejar περισσοτέρως en dos miembros paralelos.
  - Las notas [a] y [b] están ancladas exactamente en el texto principal y no se usan otros marcadores.
