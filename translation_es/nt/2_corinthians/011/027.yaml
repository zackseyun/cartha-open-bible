translation:
  language: es
  text: en trabajo y fatiga[a], en muchas noches sin dormir, en hambre y sed, en frecuentes ayunos, en frío y falta de abrigo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en trabajo penoso». La pareja griega κόπῳ καὶ μόχθῳ reúne dos términos muy cercanos para el trabajo arduo y la penuria que lo acompaña.
    reason: lexical_alternative
  - marker: b
    text: O «desnudez». Aquí el sentido puede ser falta de ropa suficiente y exposición al clima.
    reason: lexical_alternative
lexical_decisions:
- source_word: κόπῳ
  english_pob_choice: labor
  chosen_spanish: trabajo
  alternatives_spanish:
  - labor
  - esfuerzo
  - faena
  lexicon: BDAG
  rationale: κόπος expresa trabajo arduo o esfuerzo agotador. «Trabajo» funciona naturalmente en español y conserva la idea de labor penosa sin sonar rebuscado.
- source_word: μόχθῳ
  english_pob_choice: hardship
  chosen_spanish: fatiga
  alternatives_spanish:
  - penuria
  - dificultad
  - aflicción
  lexicon: BDAG
  rationale: μόχθος añade la idea de penoso desgaste o afán junto a κόπος. «Fatiga» permite mantener la pareja cercana sin repetir exactamente el mismo término y conserva el matiz de cansancio y penosidad.
- source_word: ἐν ἀγρυπνίαις πολλάκις
  english_pob_choice: in many sleepless nights
  chosen_spanish: en muchas noches sin dormir
  alternatives_spanish:
  - en frecuentes vigilias
  - en muchas insomnias
  lexicon: BDAG
  rationale: ἀγρυπνία denota vigilia o falta de sueño. En plural con πολλάκις, la idea se comunica con naturalidad como episodios repetidos de «noches sin dormir».
- source_word: ἐν λιμῷ καὶ δίψει
  english_pob_choice: in hunger and thirst
  chosen_spanish: en hambre y sed
  alternatives_spanish:
  - con hambre y sed
  - en ayuno y sed
  lexicon: BDAG
  rationale: Los dativos indican condiciones sufridas. «Hambre y sed» conserva la estructura concisa del griego y la fuerza experiencial de la privación.
- source_word: ἐν νηστείαις πολλάκις
  english_pob_choice: in frequent fastings
  chosen_spanish: en frecuentes ayunos
  alternatives_spanish:
  - en ayunos frecuentes
  - en repetidos ayunos
  lexicon: BDAG
  rationale: νηστεία significa ayuno. El plural con πολλάκις pide una forma que preserve repetición; «frecuentes ayunos» mantiene abierta la tensión entre ayunos voluntarios y privaciones no especificadas por el texto.
- source_word: ἐν ψύχει
  english_pob_choice: in cold
  chosen_spanish: en frío
  alternatives_spanish:
  - en el frío
  - en el rigor del frío
  lexicon: BDAG
  rationale: ψῦχος denota frío como condición soportada. «En frío» es breve y fiel a la lista acumulativa del griego.
- source_word: γυμνότητι
  english_pob_choice: exposure
  chosen_spanish: desnudez
  alternatives_spanish:
  - falta de ropa
  - exposición a los elementos
  lexicon: BDAG
  rationale: γυμνότης puede referirse a desnudez literal o a carencia de abrigo; en este catálogo de sufrimientos, la traducción más directa y auditables es «desnudez», dejando abierta la posible atenuación contextual.
theological_decisions:
- issue: Sentido de νηστείαις en la lista de sufrimientos de Pablo
  english_pob_reading: fastings
  chosen_spanish_reading: ayunos
  alternative_spanish_readings:
  - ayunos voluntarios
  - privación de comida
  rationale: El término griego es específicamente «ayunos», y el texto no aclara si fueron voluntarios o impuestos por las circunstancias. Mantener «ayunos» preserva la distinción con «hambre» y no resuelve la tensión interpretativa.
  doctrine_reference: Principio POB de mantener la tensión léxica y no suavizarla sin base textual.
- issue: Sentido de γυμνότητι en el catálogo de sufrimientos
  english_pob_reading: exposure
  chosen_spanish_reading: desnudez
  alternative_spanish_readings:
  - falta de ropa
  - exposición a los elementos
  rationale: Aunque el inglés POB opta por «exposure» para comunicar abrigo insuficiente, en español el sustantivo más directo y fiel al lexema es «desnudez». La nota preserva la posibilidad de entenderlo como falta de ropa o exposición al clima.
  doctrine_reference: Principio POB de transparencia semántica y preservación de alternativas auditablemente
translation_notes:
  revision_awareness: El borrador sigue de cerca el paquete griego y el audit trail inglés, conservando la serie de dativos y las distinciones entre hambre/sed y ayunos. Se optó por soluciones españolas naturales sin borrar la tensión entre los términos cercanos κόπος y μόχθος ni entre γυμνότης como desnudez o exposición.
  spanish_consistency_notes:
  - Se mantiene «ayunos» para νηστείαις, en línea con el valor léxico específico y la distinción respecto de «hambre».
  - Se evita introducir terminología eclesiástica tradicional no requerida por el texto; el registro es sobrio y contemporáneo.
  - La secuencia enumerativa conserva paralelismo con «en ... y ...» para reflejar la estructura repetida de ἐν.
