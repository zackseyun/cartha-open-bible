translation:
  language: es
  text: ¿O cometí[a] un pecado al humillarme a mí mismo para que ustedes fueran exaltados, porque les anuncié gratis[b] el evangelio de Dios?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «pequé». El giro griego es literalmente «hice» o «cometí» un pecado.
    reason: lexical_alternative
  - marker: b
    text: O, «sin pago».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Acaso
  - ¿O fue que
  lexicon: BDAG
  rationale: Mantiene la partícula disyuntiva e introduce la pregunta retórica con la misma brusquedad que el griego y la versión inglesa auditada.
- source_word: ἁμαρτίαν ἐποίησα
  english_pob_choice: did I commit a sin
  chosen_spanish: cometí un pecado
  alternatives_spanish:
  - pecó mi conducta
  - obré mal
  lexicon: BDAG
  rationale: El giro griego es literalmente 'hice un pecado'; en español, 'cometer un pecado' conserva la categoría moral y la fuerza idiomática sin calcar mecánicamente la sintaxis.
- source_word: ἐμαυτὸν ταπεινῶν
  english_pob_choice: by humbling myself
  chosen_spanish: al humillarme a mí mismo
  alternatives_spanish:
  - humillándome
  - al rebajarme
  lexicon: BDAG
  rationale: La acción participial se expresa con un gerundio/preposición natural en español. Se conserva el sentido reflexivo y la autohumillación de Pablo.
- source_word: ἵνα ὑμεῖς ὑψωθῆτε
  english_pob_choice: so that you might be exalted
  chosen_spanish: para que ustedes fueran ensalzados
  alternatives_spanish:
  - para que ustedes fueran exaltados
  - para que ustedes fueran levantados
  lexicon: BDAG
  rationale: '''Ensalsar'' refleja elevación de honor/estatus mejor que una elevación física. ''Fueran ensalzados'' mantiene el propósito y la inversión retórica de honor.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: Aquí introduce la base o explicación de la supuesta falta; 'porque' es el conector más claro y natural en español contemporáneo.
- source_word: δωρεὰν
  english_pob_choice: free of charge
  chosen_spanish: gratis
  alternatives_spanish:
  - sin cobrar
  - sin pago
  lexicon: BDAG
  rationale: '''Gratis'' es breve, transparente y fiel a la noción de ausencia de pago. Aunque coloquial, no desentona en esta afirmación directa; se conserva la posibilidad de ''sin pago'' en nota.'
- source_word: τὸ τοῦ θεοῦ εὐαγγέλιον
  english_pob_choice: the gospel of God
  chosen_spanish: el evangelio de Dios
  alternatives_spanish:
  - la buena noticia de Dios
  - el evangelio que es de Dios
  lexicon: BDAG
  rationale: Se conserva la construcción genitiva y el término técnico 'evangelio', que en español eclesial es claro y digno. 'De Dios' expresa el origen/pertenencia sin añadir interpretación.
- source_word: εὐηγγελισάμην ὑμῖν
  english_pob_choice: I proclaimed ... to you
  chosen_spanish: les anuncié
  alternatives_spanish:
  - les proclamé
  - les evangelicé
  lexicon: BDAG
  rationale: '''Anuncié'' comunica la acción de dar a conocer la buena noticia de manera pública sin restringirla al registro eclesiástico de ''prediqué''. El objeto ''les'' refleja el dativo de destinatario.'
theological_decisions:
- issue: Tensión retórica sobre si la autohumillación y el servicio gratuito constituyen 'pecado'
  english_pob_reading: Render the question straightforwardly without importing a doctrinal judgment about ministerial compensation.
  chosen_spanish_reading: Traducir la pregunta de forma directa, sin resolver la ironía ni suavizarla en una disculpa.
  alternative_spanish_readings:
  - ¿O pequé... ?
  - ¿O hice mal... ?
  rationale: El griego plantea una pregunta retórica que deja en tensión la acusación implícita. 'Cometí un pecado' conserva esa tensión mejor que una paráfrasis que absuelva o condene explícitamente la conducta de Pablo.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se revisó la formulación para mantener la pregunta retórica, la ironía implícita y la distinción entre 'gratis' y 'sin pago' sin desplazar el sentido del griego ni del audit trail inglés.
  spanish_consistency_notes:
  - Se usó 'evangelio de Dios' para conservar el genitivo transparente y el término técnico ya asentado.
  - Se optó por 'ensalzados' en lugar de una imagen puramente física para reflejar ὑψόω como reversión de honor/estatus.
  - Se evitó 'prediqué' para no cargar el verbo con una connotación ministerial más estrecha que εὐαγγελίζω en este contexto.
  - Se mantuvo el singular 'un pecado' para reflejar la idiomaticidad del giro griego, aunque la nota explica la literalidad subyacente.
