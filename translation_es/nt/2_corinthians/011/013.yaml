translation:
  language: es
  text: Porque tales hombres son falsos apóstoles[a], obreros engañosos, haciéndose pasar por apóstoles del Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apóstoles de Cristo». El título griego Χριστός puede verterse «Cristo» cuando funciona de modo más parecido a un nombre; aquí se traduce «Mesías» para preservar su sentido titular.'
    reason: alternative_reading
lexical_decisions:
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  lexicon: BDAG
  rationale: Introduce la explicación del argumento anterior; en español, «Porque» conserva la conexión causal/expositiva de forma natural y directa.
- source_word: τοιοῦτοι
  english_pob_choice: such men
  chosen_spanish: hombres como éstos
  alternatives_spanish:
  - tales hombres
  - personas como éstas
  lexicon: BDAG
  rationale: El contexto apunta a un grupo concreto ya caracterizado; «hombres como éstos» mantiene el referente masculino plural y su tono despectivo sin añadir paráfrasis.
- source_word: ψευδαπόστολοι
  english_pob_choice: false apostles
  chosen_spanish: falsos apóstoles
  alternatives_spanish:
  - seudoapóstoles
  lexicon: BDAG
  rationale: El compuesto expresa afirmación apostólica fraudulenta; «falsos apóstoles» es transparente, fiel y más natural que un tecnicismo como «seudoapóstoles».
- source_word: ἐργάται δόλιοι
  english_pob_choice: deceitful workers
  chosen_spanish: obreros engañosos
  alternatives_spanish:
  - trabajadores engañosos
  - obreros fraudulentos
  lexicon: BDAG
  rationale: La pareja sustantivo-adjetivo describe labor con engaño; «obreros engañosos» conserva la fuerza moral del griego y fluye mejor en español que un calco más rígido.
- source_word: μετασχηματιζόμενοι
  english_pob_choice: disguising themselves
  chosen_spanish: disfrazándose
  alternatives_spanish:
  - presentándose como
  - fingiendo ser
  - enmascarándose
  lexicon: BDAG
  rationale: En contexto el participio señala una apariencia externa asumida con intención engañosa; «disfrazándose» comunica esa autocolocación fraudulenta sin sugerir una transformación interior.
- source_word: εἰς ἀποστόλους Χριστοῦ
  english_pob_choice: as apostles of the Messiah
  chosen_spanish: como apóstoles de Mesías
  alternatives_spanish:
  - como apóstoles de Cristo
  - como apóstoles del Mesías
  lexicon: BDAG
  rationale: La construcción indica asunción de rol/identidad; «como apóstoles de Mesías» mantiene el sentido titular de Χριστοῦ conforme a la pauta del proyecto, evitando convertirlo en un nombre fijo si el contexto preserva el valor de título.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστοῦ funciona con valor de título; «Mesías» conserva el contenido semántico documentado por el POB inglés y sigue la terminología del proyecto para el título cuando el contexto lo favorece.
theological_decisions:
- issue: Cómo verter Χριστοῦ en una frase de autoidentificación falsa
  english_pob_reading: The Greek title Χριστός can be rendered 'Christ' when used in a more name-like way; here it is translated 'Messiah' to preserve the title's meaning.
  chosen_spanish_reading: «Mesías»
  alternative_spanish_readings:
  - «Cristo»
  rationale: No se trata de un nombre litúrgico fijo sino de una designación titulada dentro de la acusación de Pablo; «Mesías» preserva la tensión entre título y función sin ocultar el matiz semántico.
  doctrine_reference: 'DOCTRINE.md: Χριστός → «Mesías» cuando el texto usa el título; «Cristo» sólo en usos ya fijados o claramente de nombre.'
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación editorial entre «Messiah» y «Christ», con una restauración posterior de «Messiah» por coherencia doctrinal. La presente versión sigue esa restauración y traduce Χριστοῦ como «Mesías», manteniendo el resto del versículo estable y sin suavizar el reproche paulino.
  spanish_consistency_notes:
  - Se mantiene «falsos apóstoles» en vez de una forma más técnica para preservar claridad y fuerza retórica.
  - «Obreros engañosos» conserva la imagen laboral del griego sin introducir terminología eclesial ajena.
  - «Disfrazándose» refleja mejor la auto-presentación engañosa que «transformándose», que podría sugerir un cambio real.
  - Se usa «Mesías» de manera consistente con la pauta del proyecto para Χριστός cuando opera como título.
  - La nota a pie deja abierta la alternativa «Cristo» sin imponerla en el texto principal.
