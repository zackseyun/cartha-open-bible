    text: Or, 'the truth of Christ is in me.'
    reason: alternative_reading
  - marker: b
    text: Or, 'this boasting will not be stopped for me' or 'this boast will not be shut off from me.' The Greek expression is idiomatic and difficult.
    reason: lexical_alternative
  - marker: c
    text: Or 'this boasting will not be silenced in regard to me'.
    reason: previous_rendering
