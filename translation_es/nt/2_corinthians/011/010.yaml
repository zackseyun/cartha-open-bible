    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ more naturally in this Pauline context and maintain formal register; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Como la verdad del Mesías[a] está en mí, esta jactancia mía[b] no será silenciada en las regiones de Acaya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la verdad de Cristo».'
    reason: alternative_reading
  - marker: b
    text: 'O: «esta jactancia mía no será detenida» o «no será cerrada para mí»; el giro griego es idiomático y difícil.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλήθεια Χριστοῦ
  english_pob_choice: the truth of the Messiah
  chosen_spanish: la verdad de Mesías
  alternatives_spanish:
  - la verdad de Cristo
  - la verdad del Mesías
  - la verdad que pertenece al Mesías
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστοῦ como Mesías, según el criterio POB para términos disputados. En español, la construcción más directa y sobria es «la verdad de Mesías»; aunque suena marcada, mantiene la relación genitiva sin sobreinterpretar. Se ofrece en alternativas «la verdad del Mesías» como formulación más natural si se decide explicitar el artículo.
- source_word: ἐν ἐμοὶ
  english_pob_choice: is in me
  chosen_spanish: está en mí
  alternatives_spanish:
  - está conmigo
  - está dentro de mí
  lexicon: BDAG
  rationale: La expresión locativa se conserva de forma sencilla y transparente. «Está en mí» reproduce la afirmación solemne sin añadir matices no presentes en el griego.
- source_word: ὅτι
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Que
  - Porque
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de la afirmación con valor casi formular, por lo que «Como» comunica mejor el matiz de «as surely as» que un «que» subordinante literal.
- source_word: καύχησις
  english_pob_choice: boasting
  chosen_spanish: jactancia
  alternatives_spanish:
  - gloriarse
  - motivo de jactancia
  - alarde
  lexicon: BDAG
  rationale: El sustantivo denota el acto o contenido de presumir. «Jactancia» preserva el sustantivo abstracto y el tono fuerte del término; «boast» en inglés también fue tratado como sustantivo abstracto.
- source_word: φραγήσεται
  english_pob_choice: will not be silenced
  chosen_spanish: no será silenciada
  alternatives_spanish:
  - no será detenida
  - no será cerrada
  - no será frenada
  lexicon: BDAG
  rationale: El verbo pasivo de φράσσω implica bloquear o cerrar. En este contexto de jactancia/boasting, la metáfora se vierte con naturalidad como «no será silenciada», conservando la fuerza pasiva y el sentido idiomático.
- source_word: εἰς ἐμὲ
  english_pob_choice: of mine / in regard to me
  chosen_spanish: mía
  alternatives_spanish:
  - en cuanto a mí
  - para mí
  - respecto de mí
  lexicon: BDAG
  rationale: El giro idiomático es difícil de calcar en español. Tras el ajuste del audit trail inglés hacia «of mine», la solución posesiva «mía» es la más fluida y evita un calco duro; el matiz de referencia personal queda suficientemente preservado por el contexto.
- source_word: ἐν τοῖς κλίμασι τῆς Ἀχαΐας
  english_pob_choice: in the regions of Achaia
  chosen_spanish: en las regiones de Acaya
  alternatives_spanish:
  - en los distritos de Acaya
  - en las partes de Acaya
  - por toda Acaya
  lexicon: BDAG
  rationale: κλίμασι alude a regiones o distritos. «Regiones» reproduce mejor el plural y la amplitud espacial que una simple mención de la provincia.
- source_word: Ἀχαΐας
  english_pob_choice: Achaia
  chosen_spanish: Acaya
  alternatives_spanish:
  - Acaia
  lexicon: BDAG
  rationale: 'Se translitera el nombre geográfico con la forma estándar en español bíblico y geográfico: «Acaya».'
theological_decisions:
- issue: Χριστοῦ como título o nombre
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene la decisión doctrinal POB de renderizar Χριστός como título («Mesías») cuando el contexto lo permite. Aunque el registro paulino hace frecuente el uso casi nominal, el criterio fuente-base favorece conservar el valor titular antes que adoptar la forma tradicional sin justificación textual.
  doctrine_reference: 'DOCTRINE.md: contested terms — Χριστός → Mesías where title; Cristo where name-like'
- issue: ἡ καύχησις αὕτη ... οὐ φραγήσεται
  english_pob_reading: this boasting of mine will not be silenced
  chosen_spanish_reading: esta jactancia mía no será silenciada
  alternative_spanish_readings:
  - este alarde mío no será silenciado
  - este motivo de jactancia mío no será silenciado
  rationale: Se conserva la imagen de una declaración que no será sofocada o bloqueada. «Silenciada» sigue la solución inglesa y mantiene la metáfora sin desplazarla a una interpretación más explicativa.
  doctrine_reference: No doctrinal issue; lexical-theological sensitivity only
translation_notes:
  revision_awareness: El texto español sigue el estado final del audit trail donde Χριστοῦ volvió a «Mesías» tras una reversión de revisión que había cambiado indebidamente el término a «Cristo». También toma en cuenta la última forma inglesa estable de referencia posesiva («this boasting of mine»), por lo que la referencia personal se vierte naturalmente como «mía».
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός por coherencia con la política POB y con el estado restaurado del audit trail.
  - Se usa «Acaya» como topónimo bíblico estándar en español.
  - «Silenciada» conserva el pasivo y la imagen idiomática de φραγήσεται sin forzar un calco.
  - La puntuación y el orden buscan una lectura pública fluida sin perder la estructura solemne del original.
