    rationale: '''Jactancia'' es femenino; debe ser ''esta jactancia''. El error afecta la corrección básica del texto bíblico.'
  - severity: medium
    issue: '''La verdad de Mesías'' suena forzada en español'
    rationale: Aunque intenta conservar el genitivo de relación, en español eclesial y general 'la verdad del Mesías' transmite el mismo sentido de manera más natural y digna. No supone una paráfrasis indebida.
  - severity: low
    issue: Ubicación del marcador [b] es mejorable
    rationale: La nota b comenta la cláusula verbal idiomática completa ('no será silenciada' / 'mía'), no solo el posesivo. Conviene anclarla al sintagma completo o al posesivo dentro de una redacción corregida.
