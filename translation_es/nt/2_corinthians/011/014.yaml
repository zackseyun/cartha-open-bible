translation:
  language: es
  text: Y no es de extrañar[a], pues Satanás mismo se disfraza de ángel de luz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O bien: «se transforma en un ángel de luz». El verbo griego puede traducirse más literalmente como «cambia de forma», pero aquí probablemente se refiere a una apariencia engañosa.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: Se conserva el enlace discursivo con el versículo anterior; en español, 'Y' es la equivalencia natural y sobria de la conexión coordinante.
- source_word: οὐ θαῦμα
  english_pob_choice: no wonder
  chosen_spanish: no es de extrañar
  alternatives_spanish:
  - no sorprende
  - no resulta extraño
  lexicon: BDAG
  rationale: La expresión griega es idiomática y significa que algo no es sorprendente. 'No es de extrañar' reproduce bien esa fuerza en español sin endurecer el giro.
- source_word: αὐτὸς ... ὁ Σατανᾶς
  english_pob_choice: Satan himself
  chosen_spanish: Satanás mismo
  alternatives_spanish:
  - el mismo Satanás
  - Satanás
  lexicon: BDAG
  rationale: αὐτός es enfático; 'mismo' expresa esa intensificación de forma natural en español. Se mantiene 'Satanás' sin artículo, ya que el artículo griego es normal con nombres propios en este contexto.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Introduce la explicación de por qué 'no es de extrañar'. 'Pues' conserva el matiz explicativo con fluidez en español moderno.
- source_word: μετασχηματίζεται
  english_pob_choice: disguises himself as
  chosen_spanish: se disfraza como
  alternatives_spanish:
  - se transforma en
  - se hace pasar por
  lexicon: BDAG
  rationale: El contexto sugiere una apariencia engañosa más que un cambio ontológico. 'Se disfraza como' comunica bien la idea de presentación falsa y mantiene la tensión lexical documentada por la POB inglesa.
- source_word: εἰς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - en
  - hacia
  lexicon: BDAG
  rationale: Con μετασχηματίζεται, εἰς introduce la forma o rol asumido. En español, 'como' es la opción más idiomática y fiel a esa relación.
- source_word: ἄγγελον
  english_pob_choice: an angel
  chosen_spanish: ángel
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: El contexto sobrenatural exige 'ángel' y no el sentido general de 'mensajero'.
- source_word: φωτός
  english_pob_choice: of light
  chosen_spanish: de luz
  alternatives_spanish:
  - luminoso
  - radiante
  lexicon: BDAG
  rationale: El genitivo se conserva de manera literal. 'De luz' mantiene la imaginería bíblica y la relación nominal del original.
theological_decisions:
- issue: Naturaleza del cambio de Satanás
  english_pob_reading: The verse describes deceptive outward presentation, not an assertion of actual transformation into a holy angel.
  chosen_spanish_reading: El versículo describe una apariencia engañosa, no una afirmación de que Satanás se convierta realmente en un ángel santo.
  alternative_spanish_readings:
  - Satanás se transforma realmente en un ángel de luz
  - Satanás asume solo una apariencia externa
  rationale: La forma verbal y el contexto retórico de Pablo apuntan a engaño y apariencia externa. 'Se disfraza como' y 'ángel de luz' preservan esa lectura sin añadir una afirmación ontológica que el texto no exige.
  doctrine_reference: 2 Co 11:13-15; cf. la función retórica de contrastar apariencia y verdad en el argumento de Pablo.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del texto fuente inglés: no hubo cambios en la edición base y se mantiene la lectura de apariencia engañosa con una equivalencia óptima en español.'
  spanish_consistency_notes:
  - Se usa 'Satanás' y no 'el Satanás' para un español más natural, sin perder el énfasis del pronombre intensivo 'mismo'.
  - Se mantiene 'ángel de luz' de forma literal para conservar la imagen y la posible tensión interpretativa ya documentada en la POB inglesa.
  - '''Se disfraza como'' traduce la función pragmática del verbo sin borrar la alternativa más literal, que queda en nota.'
