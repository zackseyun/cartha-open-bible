translation:
  language: es
  text: Tres veces fui golpeado con varas, una vez fui apedreado, tres veces naufragué; he pasado una noche y un día en lo profundo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en mar abierto» para «en lo profundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: τρὶς
  english_pob_choice: three times
  chosen_spanish: tres veces
  alternatives_spanish:
  - tres ocasiones
  lexicon: BDAG
  rationale: Adverbio repetitivo normal en español; conserva la repetición enfática del griego sin añadir matiz.
- source_word: ἐραβδίσθην
  english_pob_choice: I was beaten with rods
  chosen_spanish: fui golpeado con varas
  alternatives_spanish:
  - fui azotado con varas
  - fui castigado con varas
  lexicon: BDAG
  rationale: El verbo pasivo expresa un golpeo con instrumento; 'varas' mantiene la especificidad del original sin sustituirla por un término más amplio como 'azotado', que puede sugerir otros instrumentos.
- source_word: ἅπαξ
  english_pob_choice: once
  chosen_spanish: una vez
  alternatives_spanish:
  - una ocasión
  lexicon: BDAG
  rationale: Equivalente adverbial directo y natural en español.
- source_word: ἐλιθάσθην
  english_pob_choice: I was stoned
  chosen_spanish: fui apedreado
  alternatives_spanish:
  - me apedrearon
  lexicon: BDAG
  rationale: En español, 'apedreado' comunica con claridad el acto de ser atacado con piedras y conserva la concisión del griego.
- source_word: ἐναυάγησα
  english_pob_choice: I was shipwrecked
  chosen_spanish: naufragué
  alternatives_spanish:
  - sufrí naufragio
  - fui naufragado
  lexicon: BDAG
  rationale: '''Naufragué'' es el verbo natural y directo en español para el evento de un naufragio; conserva el carácter de experiencia sufrida por Pablo.'
- source_word: νυχθήμερον
  english_pob_choice: a night and a day
  chosen_spanish: una noche y un día
  alternatives_spanish:
  - veinticuatro horas
  lexicon: BDAG
  rationale: Mantiene el orden y la expresión idiomática del griego sin sobreespecificar una equivalencia cronológica moderna.
- source_word: ἐν τῷ βυθῷ
  english_pob_choice: in the deep
  chosen_spanish: en lo profundo
  alternatives_spanish:
  - en el abismo
  - en el mar profundo
  lexicon: BDAG
  rationale: '''Lo profundo'' conserva la ambigüedad del griego entre el fondo del mar y las aguas profundas; evita fijar prematuramente ''el mar'' cuando el texto puede abarcar más ampliamente la profundidad acuática.'
- source_word: πεποίηκα
  english_pob_choice: I have spent
  chosen_spanish: pasé
  alternatives_spanish:
  - he pasado
  - he permanecido
  lexicon: BDAG
  rationale: Con una expresión temporal, el perfecto griego puede describir el tiempo transcurrido; 'pasé' suena natural en español y preserva la idea de haber estado ese lapso allí.
translation_notes:
  revision_awareness: El texto griego y el informe auditado en inglés están en alto acuerdo; no se requieren cambios de fondo. La principal decisión española fue conservar la especificidad de 'varas' y la ambigüedad legítima de βυθός con 'lo profundo'.
  spanish_consistency_notes:
  - Se mantuvo un registro sobrio y readable para publicación.
  - Se evitó 'Cristo'/'Mesías' porque no aparece en este versículo.
  - Se evitó 'SEÑOR' u otras sustituciones teológicas porque no hay términos divinos en el texto.
  - La frase final conserva la estructura temporal del original sin tecnicismos.
