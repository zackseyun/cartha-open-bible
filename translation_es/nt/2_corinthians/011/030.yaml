revisions:
- from: Si debo[a] gloriarme, me gloriaré en las cosas de mi debilidad.
  to: Si debo[a] jactarme, me jactaré de las cosas que tienen que ver con mi debilidad.
  rationale: 'La revisión hace un ajuste menor pero útil: «jactarme» refleja mejor καυχάομαι en este contexto retórico, y la expresión sobre la debilidad se vuelve más natural en español sin borrar el plural ni la construcción marcada del griego. También se corrige la forma de la nota al pie.'
  reviewer_model: gpt-5.4
