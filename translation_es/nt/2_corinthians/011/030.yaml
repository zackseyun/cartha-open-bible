review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional y la paradoja paulina de gloriarse en la debilidad. Conserva adecuadamente la repetición verbal y el sentido de ἀσθένεια como «debilidad». Sin embargo, «gloriarme» en español contemporáneo eclesial puede sonar menos claro que «jactarme» para el valor de καυχάομαι en este contexto, y la nota al pie tiene una comilla inicial sobrante. Además, «las cosas de mi debilidad» es comprensible, pero «las cosas que tienen que ver con mi debilidad» suena más natural sin perder el plural ni la extrañeza intencional del griego.
  spanish_quality_summary: La redacción es mayormente digna y legible, pero requiere un pequeño ajuste de naturalidad y precisión idiomática. «Si debo jactarme» comunica mejor la ironía retórica en español moderno neutral que «si debo gloriarme», que puede sonar más positivo o litúrgico. La frase revisada mantiene la tensión del original y mejora la fluidez general.
  glossary_alignment: No hay términos del glosario base especialmente implicados más allá de respetar el valor de καυχάομαι. La revisión propuesta mantiene fidelidad al criterio de no paraprasear en exceso, preserva «debilidad» para ἀσθένεια y conserva la alternativa idiomática en nota.
  issues:
  - severity: medium
    issue: «gloriarme» para καυχάομαι puede sonar menos claro o demasiado positivo en este contexto
    rationale: Aunque es una opción bíblica tradicional, en español actual «jactarme» expresa con mayor nitidez el matiz de ‘boast’ y la ironía de Pablo, sin caer en coloquialismo excesivo.
  - severity: low
    issue: «las cosas de mi debilidad» suena algo forzado en español
    rationale: El griego es inusual y conviene conservar esa rareza, pero una formulación como «las cosas que tienen que ver con mi debilidad» preserva mejor el sentido sin sonar calcada.
  - severity: low
    issue: La nota al pie tiene puntuación/comillas defectuosas
    rationale: Empieza con una comilla simple innecesaria antes de «O, de manera más idiomática...», lo que debe corregirse.
  revised_spanish_text: Si debo[a] jactarme, me jactaré de las cosas que tienen que ver con mi debilidad.
  revised_footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «me jactaré de mis debilidades». El griego dice más literalmente: «me jactaré en las cosas de mi debilidad».'
    reason: lexical_alternative
  revision_rationale: 'La revisión hace un ajuste menor pero útil: «jactarme» refleja mejor καυχάομαι en este contexto retórico, y la expresión sobre la debilidad se vuelve más natural en español sin borrar el plural ni la construcción marcada del griego. También se corrige la forma de la nota al pie.'
