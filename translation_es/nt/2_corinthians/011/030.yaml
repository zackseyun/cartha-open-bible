translation:
  language: es
  text: Si debo[a] jactarme, me jactaré de las cosas que tienen que ver con mi debilidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: «me jactaré de mis debilidades». El griego dice más literalmente: «me jactaré en las cosas de mi debilidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Ya que
  - Aunque
  lexicon: BDAG
  rationale: La partícula condicional se conserva con «Si» para mantener la forma retórica del griego sin convertirla en causalidad ni concesión interpretativa.
- source_word: καυχᾶσθαι
  english_pob_choice: boast
  chosen_spanish: gloriarme
  alternatives_spanish:
  - jactarme
  - alardear
  lexicon: BDAG
  rationale: En español, «gloriarme» comunica la idea de καυχάομαι en un registro bíblico comprensible y mantiene la tensión retórica. «Jactarme» y «alardear» suenan más negativos o demasiado coloquiales.
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debo
  alternatives_spanish:
  - es necesario
  - tengo que
  lexicon: BDAG
  rationale: El verbo impersonal de necesidad se expresa con una construcción natural en primera persona. «Debo» conserva el sentido de obligación sin añadir explicaciones.
- source_word: τὰ τῆς ἀσθενείας μου
  english_pob_choice: the things of my weakness
  chosen_spanish: las cosas de mi debilidad
  alternatives_spanish:
  - mis debilidades
  - las cosas que muestran mi debilidad
  - los asuntos de mi debilidad
  lexicon: BDAG
  rationale: Se conserva la estructura algo inusual del griego con plural neutro y genitivo. «Las cosas de mi debilidad» suena natural en español y evita aplanar la construcción a «mis debilidades», que pierde parte de la forma del original.
- source_word: ἀσθενείας
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - fragilidad
  - enfermedad
  lexicon: BDAG
  rationale: Aquí ἀσθένεια apunta a debilidad en sentido paulino, no a enfermedad. «Debilidad» es la opción más clara y consistente.
- source_word: καυχήσομαι
  english_pob_choice: I will boast
  chosen_spanish: me gloriaré
  alternatives_spanish:
  - me jactaré
  - me vanagloriaré
  lexicon: BDAG
  rationale: Se repite el mismo verbo en futuro para conservar el paralelismo del griego. «Me gloriaré» es más tradicional y encaja bien con el valor retórico del pasaje; evita que el español pierda la repetición enfática.
theological_decisions:
- issue: La paradoja de gloriarse en la debilidad
  english_pob_reading: Render the statement straightforwardly as ironic/rhetorical boasting centered on weakness, without importing a broader doctrinal explanation into the translation.
  chosen_spanish_reading: 'Presentar la frase como una afirmación retórica: «si debo gloriarme, me gloriaré en las cosas de mi debilidad», sin suavizar la paradoja.'
  alternative_spanish_readings:
  - Si debo gloriarme, me gloriaré de mis debilidades
  - Si debo gloriarme, me gloriaré en lo que revela mi debilidad
  rationale: 'La versión española conserva la tensión del texto: Pablo no elimina la ironía del gloriarse, sino que la dirige a su debilidad. No se resuelve la paradoja con una explicación añadida, para respetar el énfasis paulino del contexto.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, manteniendo la condicionalidad de Εἰ, la necesidad de δεῖ y la construcción poco común τὰ τῆς ἀσθενείας μου sin normalizarla excesivamente. No hay revisiones aplicadas en el contexto inglés, por lo que el español se alinea con el estado más reciente aceptado.
  spanish_consistency_notes:
  - Se usa «gloriarme/me gloriaré» para conservar el paralelismo del verbo καυχάομαι y su tono retórico.
  - Se evita «SEÑOR» u այլ sustituciones no pertinentes, porque no hay aquí referencia al nombre divino.
  - «Debilidad» se mantiene como término paulino básico para ἀσθένεια, sin convertirlo en «enfermedad».
