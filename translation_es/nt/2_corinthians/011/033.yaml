translation:
  language: es
  text: y por una ventana, en una canasta, fui descolgado a través del muro, y escapé de sus manos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fui bajado a través del muro en una canasta de cuerdas»'
    reason: lexical_alternative
lexical_decisions:
- source_word: θυρίδος
  english_pob_choice: window
  chosen_spanish: ventana
  alternatives_spanish:
  - abertura
  - claraboya
  lexicon: BDAG
  rationale: θυρίς designa una ventana o pequeña abertura. «Ventana» conserva la imagen concreta y es la equivalencia natural en español.
- source_word: σαργάνῃ
  english_pob_choice: basket
  chosen_spanish: canasta
  alternatives_spanish:
  - cesta
  - canasto
  - canasta de cuerdas
  lexicon: BDAG
  rationale: σαργάνη nombra un recipiente tejido o trenzado. «Canasta» es clara y natural en español; la especificación material queda implícita, como en el inglés POB con «basket» y su nota alternativa.
- source_word: ἐχαλάσθην
  english_pob_choice: I was lowered
  chosen_spanish: fui bajado
  alternatives_spanish:
  - fui dejado bajar
  - me bajaron
  lexicon: BDAG
  rationale: El pasivo de χαλάω aquí significa ser descendido mediante algún recurso, probablemente una cuerda. «Fui bajado» reproduce bien el pasivo y la acción concreta sin sobreexplicar el medio.
- source_word: διὰ τοῦ τείχους
  english_pob_choice: through the wall
  chosen_spanish: por el muro
  alternatives_spanish:
  - a través del muro
  - por la muralla
  lexicon: BDAG
  rationale: διὰ con genitivo indica paso a través de una estructura. En español, «por el muro» mantiene la idea de tránsito y evita añadir «ciudad» sin apoyo explícito del griego.
- source_word: ἐξέφυγον τὰς χεῖρας αὐτοῦ
  english_pob_choice: escaped his hands
  chosen_spanish: escapé de sus manos
  alternatives_spanish:
  - escapé de él
  - eludí sus manos
  lexicon: BDAG
  rationale: La expresión conserva la imagen idiomática de evadir el alcance o el control de alguien. «De sus manos» suena natural en español y mantiene la vividez del griego mejor que una simple explicación.
translation_notes:
  revision_awareness: El contexto auditado en inglés no requirió cambios de revisión; se mantuvo la solución óptima con mínima intervención, conservando la imaginería concreta del griego y la alternativa léxica para σαργάνῃ.
  spanish_consistency_notes:
  - Se usó el pretérito perfecto simple para reflejar la acción puntual del relato.
  - Se mantuvo la imagen corporal «sus manos» para reproducir el idiomatismo griego sin volverlo abstracto.
  - No se añadió «ciudad» a «muro» porque el texto griego no lo explicita, aunque sea contexto probable.
