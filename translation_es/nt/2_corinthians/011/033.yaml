- from: y por una ventana en una canasta fui bajado[a] por el muro, y escapé de sus manos.
  to: y por una ventana, en una canasta, fui descolgado a través del muro, y escapé de sus manos[a].
  rationale: Se revisa «por el muro» a «a través del muro» para reflejar fielmente διὰ τοῦ τείχους según la evidencia griega y la auditoría inglesa. Se mejora «fui bajado» a «fui descolgado» por mayor naturalidad contextual en español. La nota alternativa se rehace en español idiomático y conserva la especificación material de σαργάνη como opción léxica secundaria.
