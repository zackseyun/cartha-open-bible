translation:
  language: es
  text: frecuentemente en viajes, en peligros de ríos, en peligros de ladrones, en peligros de mi propio pueblo[a], en peligros de gentiles, en peligros en la ciudad, en peligros en el desierto, en peligros en el mar, en peligros entre falsos hermanos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de mi propia raza» o «de mi propia nación»; el griego dice literalmente «de [mi] parentesco/pueblo».
    reason: lexical_alternative
  - marker: b
    text: O «entre falsos creyentes». El griego dice literalmente «entre falsos hermanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁδοιπορίαις πολλάκις
  english_pob_choice: often on journeys
  chosen_spanish: frecuentemente en viajes
  alternatives_spanish:
  - a menudo en viajes
  - frecuentemente en travesías
  lexicon: BDAG
  rationale: La combinación dativo plural + adverbio expresa repetición en el curso de los desplazamientos. «Frecuentemente en viajes» conserva la idea de frecuencia y resulta natural en español; «viajes» evita forzar una paráfrasis más amplia que el griego.
- source_word: κινδύνοις
  english_pob_choice: in dangers
  chosen_spanish: en peligros
  alternatives_spanish:
  - en riesgos
  - en peligros inminentes
  lexicon: BDAG
  rationale: Se mantiene la repetición retórica del dativo plural con «en peligros», que refleja el paralelismo acumulativo del griego. «Peligros» es el equivalente más directo y sobrio.
- source_word: ποταμῶν
  english_pob_choice: from rivers
  chosen_spanish: de ríos
  alternatives_spanish:
  - por ríos
  - por desbordamientos de ríos
  lexicon: BDAG
  rationale: El genitivo tras κινδύνοις señala fuente o clase de peligro. «De ríos» conserva la literalidad básica sin especificar más de lo que el texto dice.
- source_word: λῃστῶν
  english_pob_choice: from robbers
  chosen_spanish: de ladrones
  alternatives_spanish:
  - de asaltantes
  - de bandidos
  lexicon: BDAG
  rationale: λῃστής puede ser «ladrón» o «bandido». «Ladrones» es claro y suficientemente amplio para el contexto de viaje y violencia.
- source_word: ἐκ γένους
  english_pob_choice: from my own people
  chosen_spanish: de mi propio pueblo
  alternatives_spanish:
  - de mi propia raza
  - de mi propia nación
  - de mis parientes
  lexicon: BDAG
  rationale: γένους alude al grupo de pertenencia étnico-kinésico de Pablo. «Mi propio pueblo» comunica la idea sin añadir un término doctrinalmente cargado; mantiene el contraste con «gentiles».
- source_word: ἐξ ἐθνῶν
  english_pob_choice: from Gentiles
  chosen_spanish: de gentiles
  alternatives_spanish:
  - de las naciones
  - de no judíos
  lexicon: BDAG
  rationale: En el contraste paulino con «mi propio pueblo», ἔθνη apunta a los gentiles/no judíos. «Gentiles» es la forma breve y estándar en español bíblico contemporáneo.
- source_word: ἐν πόλει
  english_pob_choice: in the city
  chosen_spanish: en la ciudad
  alternatives_spanish:
  - en ciudades
  - en la urbe
  lexicon: BDAG
  rationale: El singular con ἐν funciona de manera genérica o distributiva. «En la ciudad» conserva la forma del griego y el ritmo de la lista.
- source_word: ἐν ἐρημίᾳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en la soledad
  - en lugares desolados
  - en la wilderness
  lexicon: BDAG
  rationale: ἐρημία puede referirse a desierto, lugar desolado o soledad. «Desierto» es una opción clara y idiomática en español; aquí el contexto de riesgo físico admite esa amplitud.
- source_word: ἐν θαλάσσῃ
  english_pob_choice: at sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - a mar abierto
  - en alta mar
  lexicon: BDAG
  rationale: El griego dice literalmente «en el mar». Se conserva esa imagen con «en el mar», evitando una expresión más interpretativa que el texto no requiere.
- source_word: ἐν ψευδαδέλφοις
  english_pob_choice: among false brothers
  chosen_spanish: entre falsos hermanos
  alternatives_spanish:
  - entre falsos creyentes
  - entre hermanos falsos
  lexicon: BDAG
  rationale: ψευδάδελφος es literalmente «falso hermano». Se mantiene la expresión masculina plural del original y la idea de relación fraternal fingida, sin expandir indebidamente a una formulación inclusiva.
theological_decisions:
- issue: Contraste étnico entre ἐκ γένους y ἐξ ἐθνῶν
  english_pob_reading: from my own people / from Gentiles
  chosen_spanish_reading: de mi propio pueblo / de gentiles
  alternative_spanish_readings:
  - de mi propia nación / de no judíos
  - de mis parientes / de las naciones
  rationale: El pasaje contrapone peligros procedentes del propio grupo de Pablo y de los gentiles. «Mi propio pueblo» y «gentiles» preservan el contraste sin introducir interpretaciones adicionales.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 5
- issue: ψευδαδέλφοις como relación interna fingida dentro de la comunidad
  english_pob_reading: among false brothers
  chosen_spanish_reading: entre falsos hermanos
  alternative_spanish_readings:
  - entre falsos creyentes
  - entre supuestos hermanos
  rationale: La lectura mantiene la fuerza del término griego para personas que se presentan como hermanos pero no lo son verdaderamente. «Falsos hermanos» sigue de cerca el original y conserva la tensión del lenguaje paulino.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; se mantuvo la solución de la línea inglesa auditada, ajustándola al español con equivalentes naturales y conservando las tensiones léxicas relevantes.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἐξ ἐθνῶν por consistencia con el contraste paulino y con la terminología bíblica del proyecto.
  - Se conserva «falsos hermanos» como equivalente directo de ψευδαδέλφοις; si en otros contextos aparece una expansión a «creyentes», debe estar motivada por el propio pasaje.
  - Se usa «desierto» para ἐρημίᾳ por claridad y fluidez en español; no se debe endurecer a «soledad» sin una razón contextual específica.
  - Se evita «SEÑOR» u otras sustituciones no presentes en este versículo; no hay términos divinos en juego aquí.
