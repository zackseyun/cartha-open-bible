  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός = «Dios» y ἀγαπάω = «amar» están bien resueltos. El único desajuste relevante es léxico-discursivo en οἶδεν, donde debe preservarse la elipsis desnuda del griego en vez de explicitarla con «lo».'
