translation:
  language: es
  text: ¿Por qué? ¿Porque no los amo? Dios sabe.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «Dios sabe». El griego deja sin expresar la respuesta implícita a la pregunta retórica.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τί
  english_pob_choice: Why?
  chosen_spanish: ¿Por qué?
  alternatives_spanish:
  - ¿Para qué?
  - ¿Cuál es la razón?
  lexicon: BDAG
  rationale: Es la pregunta idiomática de causa o motivo; en español, «¿Por qué?» conserva la fuerza retórica con naturalidad y sin sobreexplicar.
- source_word: ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Que
  lexicon: BDAG
  rationale: Aquí introduce la explicación ligada a la pregunta anterior. «Porque» reproduce mejor el flujo discursivo que un calco como «que».
- source_word: οὐκ ἀγαπῶ ὑμᾶς
  english_pob_choice: I do not love you
  chosen_spanish: no los amo
  alternatives_spanish:
  - no los quiero
  - no los amo a ustedes
  lexicon: BDAG
  rationale: ἀγαπάω se traduce por «amar» según el valor básico elegido en la POB; el objeto directo plural masculino/femenino de segunda persona se expresa naturalmente como «los» en español general, con suficiente claridad en contexto.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se traduce de manera estándar como «Dios». El artículo griego no exige un artículo español aquí.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: lo sabe
  alternatives_spanish:
  - sabe
  lexicon: BDAG
  rationale: El griego dice simplemente que Dios sabe. En español, «Dios lo sabe» suena más completo y natural que una clausula desnuda, sin añadir el contenido implícito de manera explícita.
theological_decisions:
- issue: Si se debe explicitar o no la respuesta implícita a la pregunta retórica final
  english_pob_reading: God knows.
  chosen_spanish_reading: Dios lo sabe.
  alternative_spanish_readings:
  - Dios sabe.
  - Dios sabe que no los amo.
  rationale: El griego final es breve y no desarrolla la respuesta implícita. Siguiendo la revisión inglesa más conservadora, el español mantiene la concisión y no añade «yo sí» ni otra expansión interpretativa.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: La revisión inglesa eliminó la expansión implícita «I do» para acercarse más al griego; el español sigue esa misma línea y evita añadir contenido no expresado en el texto fuente.
  spanish_consistency_notes:
  - Se mantiene el tono interrogativo-retórico con dos preguntas breves seguidas de una declaración final concisa.
  - Se usa «Dios» sin mayúsculas especiales adicionales ni sustitución por una fórmula litúrgica.
  - Se conserva «amar» para ἀγαπάω, en continuidad con la decisión léxica documentada de la POB.
