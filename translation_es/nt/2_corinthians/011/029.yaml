translation:
  language: es
  text: ¿Quién es débil[a], y yo no soy débil? ¿Quién es llevado a tropezar, y yo no ardo con indignación?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘¿Quién es llevado a tropezar, y yo no ardo?’ El verbo griego ‘arder’ es metafórico y puede expresar dolor intenso, celo o indignación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀσθενεῖ / ἀσθενῶ
  english_pob_choice: is weak / am weak
  chosen_spanish: está débil / estoy débil
  alternatives_spanish:
  - está enfermo / estoy enfermo
  - es débil / soy débil
  lexicon: BDAG
  rationale: ‘ἀσθενέω’ puede abarcar debilidad física, social o espiritual. ‘Débil’ conserva esa amplitud mejor que ‘enfermo’, que restringe demasiado el sentido. El verbo copulativo ‘estar’ refleja una condición actual y conservada en el paralelismo retórico.
- source_word: σκανδαλίζεται
  english_pob_choice: is caused to stumble
  chosen_spanish: es hecho tropezar
  alternatives_spanish:
  - es escandalizado
  - cae en pecado
  - es llevado a pecar
  lexicon: BDAG
  rationale: El pasivo sugiere a alguien puesto en peligro de tropiezo moral o espiritual. ‘Es hecho tropezar’ preserva la metáfora sin decidir de antemano si el resultado es ofensa, pecado o caída espiritual.
- source_word: πυροῦμαι
  english_pob_choice: burn with indignation
  chosen_spanish: me abraso con indignación
  alternatives_spanish:
  - ardo
  - me inflamo
  - me consumo
  lexicon: BDAG
  rationale: ‘πυρόομαι’ es literalmente ‘arder’, aquí de forma metafórica para una agitación interior intensa. ‘Me abraso’ mantiene la imagen del fuego; ‘con indignación’ sigue la revisión inglesa que especifica una posible matización afectiva, sin borrar la tensión metafórica del original.
- source_word: τίς
  english_pob_choice: Who
  chosen_spanish: ¿Quién?
  alternatives_spanish:
  - ¿Qué persona?
  lexicon: BDAG
  rationale: Interroga por personas en dos preguntas retóricas. ‘¿Quién?’ es la equivalencia natural y precisa en español.
- source_word: καὶ οὐκ ἐγώ
  english_pob_choice: and I do not
  chosen_spanish: y yo no
  alternatives_spanish:
  - y no yo
  - y no es que yo
  lexicon: BDAG
  rationale: El ἐγώ explícito añade énfasis. ‘Y yo no’ conserva el paralelismo y la fuerza retórica sin volver la frase artificiosa.
theological_decisions:
- issue: Matiz emocional de πυροῦμαι
  english_pob_reading: burn with indignation
  chosen_spanish_reading: me abraso con indignación
  alternative_spanish_readings:
  - me abraso
  - ardiendo
  - me inflamo de indignación
  - me abraso con dolor
  rationale: La metáfora del fuego debe mantenerse en la línea principal, pero el contexto permite una lectura de intensa agitación interior. ‘Con indignación’ sigue la revisión inglesa y deja visible la fuerza emocional sin convertir el texto en una explicación psicológica cerrada.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que aclaró πυροῦμαι como ‘burn with indignation’, pero conserva el valor metafórico del fuego para no resolver en exceso la ambigüedad emocional del original. También se reflejó el pasivo de σκανδαλίζεται con una expresión española que mantiene la imagen de tropiezo.
  spanish_consistency_notes:
  - Se mantiene ‘débil’ para ἀσθενέω, en paralelo sujeto-verbo con ambas cláusulas.
  - Se evita ‘escandalizado’ como traducción principal de σκανδαλίζεται para no moralizar el verbo ni desplazar la imagen de tropiezo.
  - ‘Me abraso’ conserva la metáfora del fuego mejor que ‘ardo’ en español devocional contemporáneo, y el añadido ‘con indignación’ se limita a la matización documentada por la revisión inglesa.
