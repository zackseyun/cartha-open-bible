revisions:
- from: Así que no es gran cosa si sus esclavos también se disfrazan como esclavos de justicia[a], cuyo fin será conforme a sus obras.
  to: Así que no es gran cosa si sus siervos también se disfrazan como siervos de rectitud[a], cuyo fin será conforme a sus obras.
  rationale: Se revisa «esclavos» a «siervos» porque διάκονοι indica servicio/función, no la relación de propiedad expresada por δοῦλος. Se revisa «justicia» a «rectitud» en el texto principal para seguir la decisión auditada de 'righteousness' como sentido principal en este contexto de apariencia moral, conservando «justicia» como alternativa en nota. El resto del versículo puede mantenerse por fidelidad y buena naturalidad en español.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:07Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: inferencia («Así que»), expresión idiomática de no sorpresa («no es gran cosa»), apariencia engañosa («se disfrazan»), y fórmula de juicio final («conforme a sus obras»). Sin embargo, no sigue de manera suficiente el audit trail inglés en dos puntos clave: (1) διάκονοι fue documentado como ''servants'', no como ''slaves'', y en este contexto ''esclavos'' sobretraduce el término; (2) δικαιοσύνης en el POB inglés se eligió como sentido principal ''righteousness'', dejando ''justice'' como alternativa en nota. En español, ''justicia'' como texto principal desplaza indebidamente ese énfasis contextual de rectitud moral/apariencia de lo correcto.'
  spanish_quality_summary: El español es claro y natural, pero 'sus esclavos' y 'esclavos de justicia' suenan más duros de lo que pide διάκονοι y menos idiomáticos en esta frase. 'Siervos' o 'servidores' funcionan mejor; 'siervos' conserva registro bíblico sobrio y evita la carga técnica/eclesiástica de 'ministros'. Además, para δικαιοσύνη, 'rectitud' comunica mejor en español la apariencia de corrección moral; la alternativa 'justicia' puede conservarse en nota.
  glossary_alignment: No hay conflicto con términos de proyecto como Yahvé/Mesías/etc. Sí hay un desajuste con la política contextual de δικαιοσύνη ('justicia/rectitud por contexto') y con la decisión auditada para διάκονοι ('servants' frente a 'ministers'). En esta frase, 'siervos' alinea mejor con el sentido funcional de διάκονοι, y 'rectitud' alinea mejor con la decisión inglesa principal de 'righteousness', preservando 'justicia' como alternativa en nota.
  issues:
  - severity: high
    issue: διάκονοι se tradujo como «esclavos»
    rationale: El griego διάκονοι no equivale normalmente a δοῦλοι. El audit trail eligió 'servants' precisamente para evitar una lectura engañosamente eclesiástica, no para intensificar a 'slaves'. «Esclavos» añade una fuerza léxica no presente en el original y distorsiona la decisión documentada.
  - severity: high
    issue: δικαιοσύνης se tradujo en el texto principal como «justicia» en vez de una opción de rectitud moral
    rationale: El POB inglés fijó 'righteousness' como lectura principal y 'justice' como alternativa en nota para este contexto paulino. Aquí el sentido es la apariencia de estar moralmente en lo correcto; «rectitud» refleja mejor ese matiz en español, mientras «justicia» puede reservarse como variante en nota.
  - severity: low
    issue: La nota al pie repite la lectura principal en vez de ofrecer una alternativa real
    rationale: La nota dice «O “esclavos de justicia”», pero esa ya es la lectura del texto. Una nota útil debe preservar la alternativa léxica real creada por la elección principal revisada.
  revised_spanish_text: Así que no es gran cosa si sus siervos también se disfrazan como siervos de rectitud[a], cuyo fin será conforme a sus obras.
  revised_footnotes:
  - marker: a
    text: O «siervos de justicia». El griego puede significar tanto «rectitud» como «justicia»; aquí se refiere a la apariencia de estar alineados con lo correcto.
    reason: lexical_alternative
  revision_rationale: Se revisa «esclavos» a «siervos» porque διάκονοι indica servicio/función, no la relación de propiedad expresada por δοῦλος. Se revisa «justicia» a «rectitud» en el texto principal para seguir la decisión auditada de 'righteousness' como sentido principal en este contexto de apariencia moral, conservando «justicia» como alternativa en nota. El resto del versículo puede mantenerse por fidelidad y buena naturalidad en español.
