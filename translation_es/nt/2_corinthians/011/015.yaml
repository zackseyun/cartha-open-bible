translation:
  language: es
  text: Así que no es gran cosa si sus siervos también se disfrazan como siervos de rectitud[a], cuyo fin será conforme a sus obras.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «siervos de justicia». El griego puede significar tanto «rectitud» como «justicia»; aquí se refiere a la apariencia de estar alineados con lo correcto.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ μέγα
  english_pob_choice: it is no great thing
  chosen_spanish: no es gran cosa
  alternatives_spanish:
  - no es algo sorprendente
  - no es gran sorpresa
  lexicon: BDAG
  rationale: La expresión griega es idiomática y comunica que el hecho no resulta notable ni sorprendente. En español, «no es gran cosa» conserva ese valor natural e idiomático sin endurecer la sintaxis.
- source_word: οὖν
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Marca la inferencia desde el versículo anterior. «Así que» mantiene la conexión lógica de manera fluida y sobria en español.
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - servidores
  - ministros
  lexicon: BDAG
  rationale: En este contexto se trata de agentes al servicio de Satanás, no de un cargo eclesiástico. «Esclavos» preserva la fuerza relacional y funcional del término griego y evita una lectura demasiado religiosa de «ministros».
- source_word: μετασχηματίζονται
  english_pob_choice: disguise themselves
  chosen_spanish: se disfrazan
  alternatives_spanish:
  - se transforman
  - se hacen pasar por
  lexicon: BDAG
  rationale: El verbo indica una apariencia externa adoptada con intención engañosa, no una transformación interior. «Se disfrazan» expresa bien la idea de una presentación falsa o asumida.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - en calidad de
  lexicon: BDAG
  rationale: Introduce la apariencia o papel que asumen. «Como» es la equivalencia más directa y natural.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/rectitud
  lexicon: BDAG
  rationale: Aquí la forma griega puede referirse tanto a «righteousness» como a «justice». En español, «justicia» conserva esa amplitud semántica y permite mantener abierta la tensión lexical señalada por el audit trail.
- source_word: τὸ τέλος
  english_pob_choice: their end
  chosen_spanish: su fin
  alternatives_spanish:
  - su final
  - su desenlace
  lexicon: BDAG
  rationale: El giro apunta al resultado o destino final. «Su fin» es breve, idiomático y fiel al valor escatológico/judicial del texto.
- source_word: κατὰ τὰ ἔργα αὐτῶν
  english_pob_choice: according to their works
  chosen_spanish: conforme a sus obras
  alternatives_spanish:
  - según sus obras
  - de acuerdo con sus obras
  lexicon: BDAG
  rationale: La fórmula expresa correspondencia entre acciones y resultado. «Conforme a sus obras» conserva el registro bíblico y la relación semántica de ἔργα sin perder claridad.
theological_decisions:
- issue: Render de δικαιοσύνη en un contexto paulino de apariencia moral
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: El contexto describe una apariencia de alineación con lo correcto. En español, «justicia» mantiene la ambigüedad productiva del término griego y evita restringirlo prematuramente a una sola acepción moralista.
  doctrine_reference: 'DOCTRINE.md: δικαιοσύνη → righteousness por defecto; justice preservado como alternativa cuando el contexto paulino admite esa lectura.'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el texto base y con la revisión más reciente: no se detectaron cambios necesarios tras la última pasada, y se conserva el sentido del audit trail inglés, especialmente la imagen de engaño externo y la ambigüedad de δικαιοσύνη.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se ha preferido «esclavos» para διάκονοι siguiendo el valor funcional marcado por el audit trail, evitando el falso matiz eclesiástico de «ministros».
  - Se ha preservado la tensión léxica de δικαιοσύνη mediante una nota, sin borrar la alternativa «justicia/rectitud».
