translation:
  language: es
  text: El Dios y Padre del Señor Jesús, el que es bendito para siempre[a], sabe que no miento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «por los siglos»; el griego dice εἰς τοὺς αἰῶνας.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ θεὸς καὶ πατὴρ
  english_pob_choice: The God and Father
  chosen_spanish: El Dios y Padre
  alternatives_spanish:
  - Dios, incluso el Padre
  - el Dios y Padre
  lexicon: BDAG
  rationale: Un solo artículo gobierna ambos sustantivos, y la construcción fija conserva la forma solemne del original. En español, 'El Dios y Padre' mantiene esa relación sin añadir explicaciones que el griego no expresa.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - de nuestro Señor Jesús
  lexicon: BDAG
  rationale: κύριος se rinde como 'Señor' según el término del proyecto. No se añade 'nuestro' porque no está en el griego.
- source_word: οἶδεν
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - conoce
  - sabe bien
  lexicon: BDAG
  rationale: El verbo básico es 'saber/conocer'; en este contexto juramentario 'sabe' conserva el valor léxico sin expandirlo a 'da testimonio'.
- source_word: ὁ ὢν εὐλογητὸς
  english_pob_choice: he who is blessed
  chosen_spanish: el que es bendito
  alternatives_spanish:
  - quien es bendito
  - el que está bendito
  lexicon: BDAG
  rationale: 'La partícula articular con participio se expresa de modo natural como una cláusula relativa: ''el que es bendito''. ''Bendito'' conserva el matiz doxológico sin convertirlo en una fórmula litúrgica ajena al texto.'
- source_word: εἰς τοὺς αἰῶνας
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por los siglos
  - para los siglos
  lexicon: BDAG
  rationale: '''Para siempre'' comunica de forma idiomática la duración indefinida del doxológico sin perder la fuerza temporal del plural ''los siglos/las eras''.'
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: 'Aquí introduce el contenido de lo que Dios sabe: ''que no miento''. Por eso ''que'' es la opción más directa y precisa.'
- source_word: οὐ ψεύδομαι
  english_pob_choice: I am not lying
  chosen_spanish: no miento
  alternatives_spanish:
  - no estoy mintiendo
  - no digo mentira
  lexicon: BDAG
  rationale: El presente medio/pasivo se vierte con un presente español natural. 'No miento' preserva la afirmación tajante y solemne del original.
theological_decisions:
- issue: Distinción entre Dios Padre y el Señor Jesús
  english_pob_reading: Render the phrase straightforwardly as 'The God and Father of the Lord Jesus' without softening its distinction of persons.
  chosen_spanish_reading: 'Traducir de forma directa: ''El Dios y Padre del Señor Jesús'', manteniendo la distinción entre Dios Padre y el Señor Jesús.'
  alternative_spanish_readings:
  - El Dios, que es también el Padre del Señor Jesús
  - Dios, incluso el Padre del Señor Jesús
  rationale: El texto distingue claramente a Dios Padre del Señor Jesús. La traducción no debe suavizar ni resolver esa relación, sino dejarla visible tal como está en el griego.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451)
- issue: Carácter doxológico de 'el que es bendito para siempre'
  english_pob_reading: Treat 'he who is blessed forever' as a parenthetical doxological description of God.
  chosen_spanish_reading: Tratar 'el que es bendito para siempre' como una descripción doxológica inserta en la frase, no como un nuevo sujeto.
  alternative_spanish_readings:
  - Puntuarlo como una cláusula independiente
  - Unirlo directamente sin pausa
  rationale: En español, la coma ayuda a mostrar que se trata de una aclaración reverente sobre Dios. Así se conserva la función doxológica sin alterar la estructura del juramento.
  doctrine_reference: Principio de equivalencia óptima; preservación de la puntuación interpretativa cuando ayuda a la lectura pública
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del inglés POB: mantiene el orden natural de la frase, conserva ''knows/sabe'' en presente, y trata la cláusula doxológica como una incisión reverente separada por comas, sin añadir em dash ni expandir el juramento.'
  spanish_consistency_notes:
  - Se usó 'Dios' para θεός y 'Padre' para πατὴρ, manteniendo la distinción relacional explícita.
  - '''Señor'' traduce κύριος según el estándar del proyecto; no se añadió ningún posesivo no presente en el griego.'
  - '''Bendito'' se eligió para εὐλογητός porque en este contexto funciona como alabanza descriptiva, no como simple bienaventuranza humana.'
  - '''Para siempre'' prioriza la naturalidad en español, mientras la nota conserva la alternativa más literal ''por los siglos''.'
