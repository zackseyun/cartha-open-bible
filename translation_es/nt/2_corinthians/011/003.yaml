source:
  edition: SBLGNT
  text: φοβοῦμαι δὲ μή πως, ὡς ὁ ὄφις ⸂ἐξηπάτησεν Εὕαν⸃ ἐν τῇ πανουργίᾳ αὐτοῦ, ⸀φθαρῇ τὰ νοήματα ὑμῶν ἀπὸ τῆς ἁπλότητος ⸂καὶ τῆς ἁγνότητος⸃ τῆς εἰς τὸν Χριστόν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/003.yaml
  text: But I fear that somehow[a], just as the serpent deceived Eve by his cunning[d][c][b], your minds may be corrupted from the sincerity and purity that are toward Messiah.
  footnotes:
  - marker: a
    text: Or 'from the simplicity and purity toward Christ'; 'sincerity' may also be understood as 'simplicity' or 'single-heartedness.'
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts omit 'and purity.'
    reason: textual_variant
  - marker: c
    text: Greek 'Christ'; rendered 'Messiah' here because Χριστός functions as a title.
    reason: alternative_reading
  - marker: d
    text: Or 'that are toward the Messiah'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
