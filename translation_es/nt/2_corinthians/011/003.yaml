    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' to reflect the Greek Χριστόν more naturally and consistently in this context, and changed ''toward the Messiah'' to ''that are toward Christ'' to more clearly attach the phrase to ''sincerity and purity'' in formal English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero temo que, de algún modo, así como la serpiente engañó a Eva con su astucia, su mente sea corrompida apartándola de la sinceridad[a] y de la pureza[b] hacia el Mesías[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sencillez' o 'devoción de corazón indiviso'.
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos omiten 'y de la pureza'.
    reason: textual_variant
  - marker: c
    text: Aquí Χριστός se traduce como 'Mesías' porque funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: φοβοῦμαι
  english_pob_choice: I fear
  chosen_spanish: temo
  alternatives_spanish:
  - tengo miedo
  - me preocupa
  lexicon: BDAG
  rationale: Expresa una preocupación continua y natural en español sin debilitar la intensidad del verbo.
- source_word: μή πως
  english_pob_choice: that somehow
  chosen_spanish: de algún modo
  alternatives_spanish:
  - que quizá
  - no sea que
  lexicon: BDAG
  rationale: Introduce la posibilidad temida de forma idiomática en español y conserva la indefinición del griego.
- source_word: ὡς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - como
  lexicon: BDAG
  rationale: Marca comparación directa con la historia de Génesis y suena natural en español.
- source_word: ὁ ὄφις
  english_pob_choice: the serpent
  chosen_spanish: la serpiente
  alternatives_spanish:
  - el serpiente
  - la culebra
  lexicon: BDAG
  rationale: ‘Serpiente’ preserva el eco bíblico de Génesis mejor que un término más coloquial.
- source_word: ἐξηπάτησεν
  english_pob_choice: deceived
  chosen_spanish: engañó
  alternatives_spanish:
  - sedujo
  - desvió
  lexicon: BDAG
  rationale: ‘Engañó’ comunica con claridad la acción de fraude o engaño; ‘sedujo’ podría sugerir connotaciones no presentes aquí.
- source_word: Εὕαν
  english_pob_choice: Eve
  chosen_spanish: Eva
  alternatives_spanish:
  - Eva
  lexicon: Nombre propio bíblico
  rationale: Forma española estándar del nombre.
- source_word: ἐν τῇ πανουργίᾳ αὐτοῦ
  english_pob_choice: by his cunning
  chosen_spanish: con su astucia
  alternatives_spanish:
  - por su astucia
  - mediante su astucia
  - en su astucia
  lexicon: BDAG
  rationale: ‘Con su astucia’ expresa bien el medio o acompañamiento instrumental en español y evita la rigidez de una calca.
- source_word: φθαρῇ
  english_pob_choice: may be corrupted
  chosen_spanish: puedan corromperse
  alternatives_spanish:
  - sean corrompidos
  - queden corrompidos
  - se arruinen
  lexicon: BDAG
  rationale: El pasivo sugiere un daño real al interior de la persona; en español, el reflexivo mantiene la fuerza del pasivo sin sonar forzado.
- source_word: τὰ νοήματα ὑμῶν
  english_pob_choice: your minds
  chosen_spanish: sus pensamientos
  alternatives_spanish:
  - sus mentes
  - sus ideas
  - su manera de pensar
  lexicon: BDAG
  rationale: Aunque νοήματα puede abarcar mente o modo de pensar, ‘pensamientos’ permite un plural natural en español y mantiene la referencia cognitiva colectiva.
- source_word: ἀπὸ τῆς ἁπλότητος
  english_pob_choice: from the sincerity
  chosen_spanish: de la sinceridad
  alternatives_spanish:
  - de la sencillez
  - de la simpleza
  - de la simplicidad
  lexicon: BDAG
  rationale: Sigo la decisión auditada de entender ἁπλότης como integridad/sinceridad en el contexto paulino, sin eliminar las otras posibilidades léxicas.
- source_word: καὶ τῆς ἁγνότητος
  english_pob_choice: and purity
  chosen_spanish: y pureza
  alternatives_spanish:
  - y castidad
  - y santidad
  lexicon: BDAG
  rationale: ‘Pureza’ es amplio y fiel al sentido moral del término sin restringirlo innecesariamente a castidad sexual.
- source_word: τῆς εἰς τὸν Χριστόν
  english_pob_choice: that are toward the Messiah
  chosen_spanish: que son hacia Mesías
  alternatives_spanish:
  - hacia Cristo
  - orientadas a Mesías
  - dirigidas hacia Mesías
  lexicon: BDAG
  rationale: Mantengo la terminología POB de Χριστός como ‘Mesías’ por su valor titular, y ‘que son hacia’ conserva la relación direccional con las dos cualidades anteriores.
theological_decisions:
- issue: Rendering Χριστόν
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La guía del proyecto favorece ‘Mesías’ para Χριστός cuando el título está activo; aquí Pablo habla de la orientación de la devoción cristiana, no de un nombre litúrgico fijo.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός como título'
- issue: Sense of ἁπλότης
  english_pob_reading: sincerity
  chosen_spanish_reading: sinceridad
  alternative_spanish_readings:
  - sencillez
  - simpleza
  - singularidad de corazón
  rationale: ‘Sinceridad’ comunica integridad y franqueza moral en español contemporáneo, mientras la nota conserva las alternativas léxicas relevantes.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; conservar alternativas significativas'
- issue: Inclusion of καὶ τῆς ἁγνότητος
  english_pob_reading: and purity
  chosen_spanish_reading: y pureza
  alternative_spanish_readings:
  - omitirlo como variante textual
  rationale: El texto base incluye la frase y debe aparecer en la traducción principal; la posibilidad de omisión queda registrada en nota por su apoyo manuscrito alternativo.
  doctrine_reference: 'DOCTRINE.md: primacía del original; registrar variantes textuales'
- issue: Directionality of τῆς εἰς τὸν Χριστόν
  english_pob_reading: toward the Messiah
  chosen_spanish_reading: que son hacia Mesías
  alternative_spanish_readings:
  - hacia Cristo
  - para Mesías
  - orientadas a Mesías
  rationale: La frase modifica las dos cualidades anteriores y expresa orientación/dirección; en español se puede explicitar con ‘que son hacia’ sin sobreinterpretar.
  doctrine_reference: 'DOCTRINE.md: conservar la relación sintáctica y semántica del original'
translation_notes:
  revision_awareness: 'La redacción española sigue el texto griego SBLGNT y el historial auditado en inglés: conserva la comparación con la serpiente y Eva, mantiene la idea de corrupción de los pensamientos, y registra la variante textual de ‘y pureza’. También refleja la decisión doctrinal de traducir Χριστός como ‘Mesías’ en el texto principal, evitando la sustitución por un equivalente tradicional no alineado con la guía del proyecto.'
  spanish_consistency_notes:
  - ‘Mesías’ se usa de forma consistente para Χριστός en el texto principal.
  - ‘Sinceridad’ y ‘pureza’ mantienen el par de cualidades morales del griego; la nota recoge las alternativas léxicas de ἁπλότης.
  - La construcción ‘que son hacia Mesías’ conserva la orientación sintáctica sin convertirla en paráfrasis extensa.
  - Se eligió ‘pensamientos’ para νοήματα por su naturalidad plural en español, aunque la nota léxica explica la amplitud semántica de la palabra.
