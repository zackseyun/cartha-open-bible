translation:
  language: es
  text: Robé[a] a otras iglesias, recibiendo sustento para servirlos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «paga» o «salario».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλας ἐκκλησίας
  english_pob_choice: other churches
  chosen_spanish: otras iglesias
  alternatives_spanish:
  - otras congregaciones
  - otras asambleas
  lexicon: BDAG
  rationale: ἐκκλησία en Pablo suele referirse a comunidades cristianas locales. «Iglesias» es el equivalente natural y transparente en español eclesial contemporáneo.
- source_word: ἐσύλησα
  english_pob_choice: robbed
  chosen_spanish: despojé
  alternatives_spanish:
  - robé
  - saqueé
  - despojé de sus bienes
  lexicon: BDAG
  rationale: El verbo griego es fuerte y puede expresar robar, saquear o despojar. «Despojé» conserva la dureza retórica sin sonar tan legalmente literal como «robé» en español actual; mantiene la ironía paulina que el audit trail inglés quiso preservar.
- source_word: λαβὼν
  english_pob_choice: by accepting
  chosen_spanish: recibiendo
  alternatives_spanish:
  - al recibir
  - tomando
  - habiendo recibido
  lexicon: BDAG
  rationale: 'El participio aoristo tiene sentido instrumental/explicativo: indica el medio por el cual se presenta la acción principal. «Recibiendo» comunica esa relación de manera fluida en español.'
- source_word: ὀψώνιον
  english_pob_choice: support
  chosen_spanish: sustento
  alternatives_spanish:
  - salario
  - pago
  - sueldo
  - sustento material
  lexicon: BDAG
  rationale: ὀψώνιον designa literalmente paga o salario, pero en este contexto ministerial no conviene sugerir una relación laboral. «Sustento» expresa ayuda material/financiera de forma idiomática y adecuada.
- source_word: πρὸς τὴν ὑμῶν διακονίαν
  english_pob_choice: for serving you
  chosen_spanish: para servirles
  alternatives_spanish:
  - para vuestro servicio
  - para ministrarles
  - para su ministerio entre ustedes
  lexicon: BDAG
  rationale: La construcción con πρός expresa dirección o finalidad. «Servirles» hace explícito que el servicio es hacia los corintios, conforme al contexto, y conserva la idea de διακονία como servicio ministerial.
theological_decisions:
- issue: Fuerza retórica de «ἐσύλησα»
  english_pob_reading: Retain the provocative metaphor 'I robbed other churches' as ironic/hyperbolic rhetoric, not a literal confession of theft.
  chosen_spanish_reading: Conservar una expresión fuerte («Despojé a otras iglesias») como ironía hiperbólica, no como confesión literal de hurto.
  alternative_spanish_readings:
  - Robé a otras iglesias
  - Saqué provecho de otras iglesias
  - Exploté a otras iglesias
  rationale: El contexto trata de apoyo económico para el ministerio, no de un delito real. Aun así, el griego usa un verbo deliberadamente enérgico; «despojé» preserva la aspereza y evita suavizar indebidamente el contraste retórico.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se registran cambios necesarios; la formulación mantiene la fuerza retórica del verbo griego y el valor instrumental del participio.'
  spanish_consistency_notes:
  - Se mantiene «iglesias» para ἐκκλησία según el uso paulino habitual.
  - «Sustento» evita una lectura comercial excesiva de ὀψώνιον, pero la nota conserva la alternativa más literal.
  - «Servirles» refleja la finalidad expresada por πρός + acusativo sin volver la frase pesada.
  - La elección de «despojé» busca preservar la tensión léxica documentada entre un verbo muy fuerte y el contexto de apoyo financiero.
