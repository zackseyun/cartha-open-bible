review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general: Pablo usa una hipérbole irónica fuerte sobre recibir ayuda de otras iglesias para ministrar a los corintios. Sin embargo, «despojé a otras iglesias» suena menos natural en español sin complemento y puede quedar semánticamente incompleto. «Robé a otras iglesias» preserva mejor la fuerza retórica explícita de ἐσύλησα, en línea con el audit trail inglés. El resto de la estructura —recibir apoyo para servir a los corintios— está bien alineado con λαβὼν ὀψώνιον πρὸς τὴν ὑμῶν διακονίαν.'
  spanish_quality_summary: El texto es claro y legible, pero «Despojé a otras iglesias» resulta algo forzado en español moderno porque «despojar» suele pedir un complemento expreso («despojar de algo»). «Robé a otras iglesias» es más idiomático y transmite mejor la ironía paulina. También conviene ajustar «servirles» a «servirlos» o «servir a ustedes» para evitar posible ambigüedad dialectal; «servirlos» funciona bien en registro bíblico neutro.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Iglesias» para ἐκκλησίας y «sustento» para ὀψώνιον son aceptables, con la nota que preserva «paga/salario». La principal cuestión léxica es ἐσύλησα: para seguir la decisión inglesa documentada, «robé» alinea mejor que «despojé».'
  issues:
  - severity: medium
    issue: «Despojé a otras iglesias» suena menos natural y algo incompleto en español
    rationale: Aunque «despojar» puede reflejar el campo semántico de συλάω, en español normalmente requiere complemento («despojar de bienes», etc.). Sin ese complemento, la frase pierde fuerza y naturalidad.
  - severity: medium
    issue: La fuerza retórica de ἐσύλησα queda algo atenuada con «despojé»
    rationale: El audit trail inglés escogió deliberadamente «robbed» para preservar la ironía provocativa. «Robé» refleja esa decisión con mayor precisión en español.
  - severity: low
    issue: «Servirles» puede sonar menos directo según el dialecto
    rationale: Dado que el referente es «ustedes» (los corintios), «servirlos» evita vacilación entre leísmo y uso regional, y mantiene la referencia clara.
  revised_spanish_text: Robé[a] a otras iglesias, recibiendo sustento para servirlos.
