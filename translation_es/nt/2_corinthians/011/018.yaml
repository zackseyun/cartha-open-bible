translation:
  language: es
  text: Puesto que muchos se jactan[a] conforme a la carne, yo también me jactaré.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘de acuerdo con criterios humanos’ o ‘de una manera meramente humana’.
