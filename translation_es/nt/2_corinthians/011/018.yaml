lexical_decisions:
- source_word: ἐπεὶ
  english_pob_choice: Since
  chosen_spanish: Puesto que
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: Introduce la base de la afirmación siguiente y funciona de manera natural en español sin perder el valor causal/inferencial del griego.
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - un gran número de
  - bastantes
  lexicon: BDAG
  rationale: Corresponde de forma directa al cuantificador plural y conserva el tono general del pasaje.
- source_word: καυχῶνται
  english_pob_choice: boast
  chosen_spanish: se jactan
  alternatives_spanish:
  - se glorían
  - presumen
  lexicon: BDAG
  rationale: En este contexto polémico, 'jactarse' transmite bien el matiz retórico de καυχάομαι y conserva la repetición verbal con la forma futura siguiente.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: conforme a la carne
  alternatives_spanish:
  - según la carne
  - de acuerdo con criterios humanos
  lexicon: BDAG
  rationale: Se preserva 'carne' para σάρξ, como término paulino cargado teológicamente. 'Conforme a' mantiene el valor idiomático sin convertirlo de inmediato en una paráfrasis interpretativa.
- source_word: σάρκα
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza humana
  - criterios humanos
  lexicon: BDAG
  rationale: La forma conservada 'carne' respeta el término técnico paulino y evita reemplazarlo por una explicación que borre su textura teológica.
- source_word: κἀγὼ
  english_pob_choice: I too
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - incluso yo
  lexicon: BDAG
  rationale: Reproduce el énfasis del griego y el paralelismo con 'muchos' de la cláusula anterior.
- source_word: καυχήσομαι
  english_pob_choice: will boast
  chosen_spanish: me jactaré
  alternatives_spanish:
  - me gloriaré
  - presumiré
  lexicon: BDAG
  rationale: Mantiene la misma raíz semántica de καυχάομαι en español con el verbo reflexivo natural en este contexto, conservando la fuerza retórica del anuncio futuro.
theological_decisions:
- issue: Tratamiento de σάρξ en la expresión idiomática κατὰ σάρκα
  english_pob_reading: according to the flesh
  chosen_spanish_reading: conforme a la carne
  alternative_spanish_readings:
  - según la carne
  - de acuerdo con criterios humanos
  rationale: La decisión sigue la pauta doctrinal de conservar 'carne' como traducción base de σάρξ cuando el contexto apunta a criterios meramente humanos o mundanos. En el texto principal se retiene la imagen paulina; la lectura idiomática queda suficientemente transparente por el contexto y no exige una paráfrasis más explicativa.
  doctrine_reference: 'DOCTRINE.md: table for σάρξ; translation philosophy on preserving contested terms'
translation_notes:
  revision_awareness: El borrador coincide con la última revisión auditada, que quedó sin cambios y con acuerdo alto; no se requiere ajuste adicional respecto del texto fuente ni del control cruzado.
  spanish_consistency_notes:
  - Se mantiene la repetición de la familia verbal καυχ- con 'se jactan' / 'me jactaré'.
  - '''Carne'' se conserva como equivalente principal de σάρξ para sostener la textura paulina.'
  - La puntuación española refleja una sola oración causal seguida de la resolución enfática del hablante.
