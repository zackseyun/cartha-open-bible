translation:
  language: es
  text: Cinco veces recibí de los judíos cuarenta azotes menos uno[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «cuarenta menos uno»; es decir, treinta y nueve azotes.
    reason: lexical_alternative
  - marker: b
    text: O «por los judíos». El griego identifica la fuente o los agentes del castigo sin especificar un cuerpo gobernante particular.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπὸ Ἰουδαίων
  english_pob_choice: from the Jews
  chosen_spanish: de parte de los judíos
  alternatives_spanish:
  - por los judíos
  - de los judíos
  - por las autoridades judías
  lexicon: BDAG
  rationale: Con ὑπό más genitivo, el griego señala agencia o procedencia de la acción. En español, "de parte de" comunica mejor la fuente de la acción que un simple "por", y evita especificar autoridades que el texto no menciona. "De los judíos" es posible, pero suena menos explícito sobre el origen del castigo.
- source_word: πεντάκις
  english_pob_choice: Five times
  chosen_spanish: Cinco veces
  alternatives_spanish:
  - En cinco ocasiones
  lexicon: BDAG
  rationale: La expresión adverbial indica repetición cuantificada. "Cinco veces" es directa, natural y fiel al énfasis de Pablo en la reiteración de sus sufrimientos.
- source_word: τεσσεράκοντα παρὰ μίαν
  english_pob_choice: forty lashes less one
  chosen_spanish: cuarenta azotes menos uno
  alternatives_spanish:
  - cuarenta menos uno
  - treinta y nueve azotes
  lexicon: BDAG
  rationale: La frase griega significa literalmente "cuarenta menos uno". En español conviene explicitar el sustantivo del castigo, por eso "azotes"; mantiene la forma idiomática sin reducirla a "treinta y nueve", que sería correcto pero menos cercano a la formulación griega y al audit trail inglés.
- source_word: ἔλαβον
  english_pob_choice: I received
  chosen_spanish: recibí
  alternatives_spanish:
  - sufrí
  - soporté
  - me dieron
  lexicon: BDAG
  rationale: λαμβάνω aquí conserva la idea de "recibir" una pena o castigo. "Recibí" reproduce bien esa forma verbal sin reinterpretarla como una mera experiencia pasiva o como una traducción más explicativa como "sufrí".
translation_notes:
  revision_awareness: El inglés POB revisó "minus one" por "less one" para acercarse más a la formulación griega y mantener un registro formal; la versión española adopta una fórmula igualmente sobria y cercana al griego, sin perder claridad para el lector moderno.
  spanish_consistency_notes:
  - Se mantiene "judíos" para reflejar el genitivo Ἰουδαίων, sin ampliar a "autoridades judías" en el texto principal.
  - Se usa "azotes" como equivalente contextual de un castigo corporal implícito por ἔλαβον en este versículo.
  - No se usa "SEÑOR" ni terminología cristológica, por no estar presentes en el versículo.
