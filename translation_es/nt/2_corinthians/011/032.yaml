translation:
  language: es
  text: En Damasco, el etnarca del rey Aretas vigilaba la ciudad de los damascenos[a] para prenderme,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la ciudad de Damasco». El griego dice más literalmente «la ciudad de los damascenos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν Δαμασκῷ
  english_pob_choice: In Damascus
  chosen_spanish: En Damasco
  alternatives_spanish:
  - En la ciudad de Damasco
  lexicon: BDAG
  rationale: ἐν + dativo expresa ubicación; «En Damasco» es la forma natural y directa en español, equivalente al inglés POB sin añadir precisión innecesaria.
- source_word: ἐθνάρχης
  english_pob_choice: ethnarch
  chosen_spanish: etnarca
  alternatives_spanish:
  - gobernador
  - ruler
  lexicon: BDAG
  rationale: La voz técnica histórica se conserva en español como «etnarca», evitando rebajar el título a un término más general. Mantiene la especificidad del cargo.
- source_word: Ἁρέτα τοῦ βασιλέως
  english_pob_choice: of King Aretas
  chosen_spanish: de rey Aretas
  alternatives_spanish:
  - de Aretas el rey
  - bajo el rey Aretas
  lexicon: BDAG
  rationale: El genitivo identifica al etnarca como relacionado con Aretas; en español, «de rey Aretas» reproduce esa relación de pertenencia/adscripción de manera compacta. Se omite el artículo para evitar una formulación pesada y porque el valor del nombre propio ya delimita al referente.
- source_word: ἐφρούρει
  english_pob_choice: was guarding
  chosen_spanish: vigilaba
  alternatives_spanish:
  - estaba guardando
  - custodiaba
  lexicon: BDAG
  rationale: El imperfecto señala acción continua en el pasado. «Vigilaba» conserva esa duratividad y el matiz de custodia policial/militar sin sonar demasiado mecánico en español.
- source_word: τὴν πόλιν Δαμασκηνῶν
  english_pob_choice: the city of the Damascenes
  chosen_spanish: la ciudad de los damascenos
  alternatives_spanish:
  - la ciudad de Damasco
  - la ciudad damascena
  lexicon: BDAG
  rationale: Se preserva la construcción más literal del griego, con el genitivo plural sustantivado «Damascenes». La alternativa «la ciudad de Damasco» se deja implícita como posibilidad interpretativa, pero no se adopta en el texto principal para no borrar la huella formal del original.
- source_word: πιάσαι με
  english_pob_choice: in order to seize me
  chosen_spanish: para prenderme
  alternatives_spanish:
  - para arrestarme
  - para capturarme
  - para apresarme
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa finalidad tras la vigilancia. «Prenderme» comunica la idea de aprehensión hostil o de detención, con un registro natural en español bíblico y suficientemente amplio para el matiz de πιάζω.
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el acuerdo general del control de calidad fue alto, con una observación menor sobre la alternativa léxica de τὴν πόλιν Δαμασκηνῶν. La versión española conserva esa tensión literal/idiomática en una nota, sin resolverla por paráfrasis.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrama.
  - Se usa «etnarca» como término técnico coherente con la decisión inglesa de conservar «ethnarch».
  - Se evita «SEÑOR» o «Cristo» por no ser pertinentes en este texto.
  - La nota al pie marca la alternativa entre la formulación literal y la identificación geográfica más fluida, siguiendo el audit trail inglés.
