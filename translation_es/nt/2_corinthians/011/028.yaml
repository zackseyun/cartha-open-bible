translation:
  language: es
  text: 'Aparte de tales cosas externas[a], hay sobre mí, día tras día, una presión[b]: la preocupación[c] por todas las iglesias.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «además de las demás cosas» o «aparte de las cosas dejadas sin mencionar».
    reason: lexical_alternative
  - marker: b
    text: O «mi carga diaria» o «la presión que pesa sobre mí».
    reason: lexical_alternative
  - marker: c
    text: O «ansiedad» o «cuidado».
    reason: lexical_alternative
lexical_decisions:
- source_word: χωρὶς τῶν παρεκτὸς
  english_pob_choice: Apart from such external things
  chosen_spanish: Aparte de las cosas externas
  alternatives_spanish:
  - además de las otras cosas
  - aparte de las cosas dejadas sin mencionar
  - aparte de los asuntos externos
  lexicon: BDAG
  rationale: La construcción χωρὶς + genitivo con παρεκτός expresa exclusión o lo que queda fuera de la lista previa. En español, «Aparte de» conserva ese valor de exclusión; «cosas externas» refleja el contraste con las cargas visibles o exteriores ya enumeradas, sin convertir la frase en una paráfrasis libre.
- source_word: ἐπίστασίς μοι
  english_pob_choice: there is ... pressure on me
  chosen_spanish: está la presión sobre mí
  alternatives_spanish:
  - hay ... presión sobre mí
  - mi carga diaria
  - la presión que pesa sobre mí
  lexicon: BDAG
  rationale: ἐπίστασις sugiere presión, asalto o un empuje que recae sobre alguien. «Presión sobre mí» mantiene ese valor experiencial e impersonal mejor que una posesiva como «mi presión». El dativo μοι queda naturalmente expresado con «sobre mí».
- source_word: ἡ καθ’ ἡμέραν
  english_pob_choice: the daily
  chosen_spanish: la presión diaria
  alternatives_spanish:
  - la presión de cada día
  - la presión cotidiana
  - día tras día
  lexicon: BDAG
  rationale: La frase funciona adjetivalmente con ἐπίστασις y marca repetición diaria. «Diaria» es breve, idiomática y conserva la relación con la presión sin añadir matices no presentes en el griego.
- source_word: ἡ μέριμνα
  english_pob_choice: concern
  chosen_spanish: la preocupación
  alternatives_spanish:
  - la preocupación intensa
  - el cuidado
  - la ansiedad
  lexicon: BDAG
  rationale: μέριμνα puede abarcar cuidado, preocupación o ansiedad. Aquí, al referirse al peso pastoral de Pablo por las iglesias, «preocupación» conserva la carga emocional sin introducir necesariamente un juicio moral negativo como haría «ansiedad».
- source_word: πασῶν τῶν ἐκκλησιῶν
  english_pob_choice: for all the churches
  chosen_spanish: por todas las iglesias
  alternatives_spanish:
  - por todas las congregaciones
  - por todas las asambleas
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία designa normalmente comunidades cristianas. «Iglesias» es el equivalente más natural y reconocido en español bíblico, y el genitivo se expresa con claridad mediante «por».
theological_decisions:
- issue: Nuance of Paul's pastoral burden in μέριμνα
  english_pob_reading: Rendered as 'concern' rather than 'anxiety' to reflect genuine pastoral care without importing a negative moral judgment.
  chosen_spanish_reading: «preocupación» en vez de «ansiedad» para reflejar una carga pastoral real sin cargar el texto con una valoración moral previa.
  alternative_spanish_readings:
  - ansiedad por todas las iglesias
  - cuidado por todas las iglesias
  rationale: El verso describe el peso apostólico de Pablo; no define aquí una doctrina sobre la preocupación pecaminosa. «Preocupación» mantiene la tensión afectiva y pastoral, mientras deja abierta la posibilidad de un matiz más fuerte si el contexto lo requiriera.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla de antemano.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; esta versión sigue la lectura aprobada con la misma estructura semántica y conserva las alternativas relevantes del expediente inglés.
  spanish_consistency_notes:
  - Se mantiene «iglesias» para ἐκκλησίαι, conforme al uso paulino y a la terminología estándar del proyecto.
  - Se evita «SEÑOR» porque este verso no contiene el tetragrámaton ni una cita directa que requiera ese recurso.
  - Se conserva la tensión semántica de μέριμνα entre preocupación y ansiedad sin fijarla innecesariamente en un solo registro psicológico.
