review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: un contraste con los padecimientos ya enumerados, seguido de la presión diaria y la preocupación pastoral por todas las iglesias. Sin embargo, «está la presión diaria sobre mí» suena menos natural en español que una formulación existencial como «hay sobre mí, día tras día, una presión» o «hay la presión diaria sobre mí». Además, la nota y el anclaje de «cosas externas» mezclan tres alternativas que en realidad corresponden a dos puntos léxicos distintos del inglés auditado: (1) χωρὶς τῶν παρεκτὸς y (2) ἐπίστασίς μοι / μέριμνα.'
  spanish_quality_summary: El texto es claro y fiel, pero requiere un ajuste pequeño de naturalidad sintáctica. «Aparte de las cosas externas» es entendible, aunque «Aparte de tales cosas externas» conecta mejor con la lista previa sin sonar forzado. La secuencia de notas [a][b][c] colocadas todas tras «externas» no corresponde de manera legible a las palabras o frases pertinentes; conviene anclar cada nota donde toca. «La preocupación por todas las iglesias» es una buena opción en español eclesial moderno.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Iglesias» para ἐκκλησιῶν y «preocupación» para μέριμνα están bien justificadas. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. El único ajuste recomendado es de estilo y de colocación de notas, no de glosario.
  issues:
  - severity: medium
    issue: Sintaxis algo rígida en «está la presión diaria sobre mí»
    rationale: Aunque comprensible, esta estructura resulta poco idiomática en español bíblico natural. El griego expresa una presión que recae sobre Pablo; «hay sobre mí, día tras día, una presión» o «hay la presión diaria sobre mí» transmite mejor esa carga sin perder fidelidad.
  - severity: medium
    issue: Anclaje de notas mal distribuido
    rationale: Las tres notas aparecen unidas a «externas», pero una corresponde a χωρὶς τῶν παρεκτὸς, otra a ἐπίστασίς μοι, y otra a μέριμνα. Deben colocarse junto a la frase o palabra relevante para que el lector entienda qué se está aclarando.
  - severity: low
    issue: «cosas externas» podría conectarse mejor con el contexto previo
    rationale: La traducción es defendible, pero «tales cosas externas» refleja mejor el valor contextual de «such external things» del audit trail, enlazando con la lista anterior de sufrimientos sin añadir contenido nuevo.
  revised_spanish_text: 'Aparte de tales cosas externas[a], hay sobre mí, día tras día, una presión[b]: la preocupación[c] por todas las iglesias.'
