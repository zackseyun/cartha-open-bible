translation:
  language: es
  text: Porque ustedes gustosamente toleran[a] a los necios[b], siendo ustedes mismos sabios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «soportan»; el verbo griego puede significar tolerar, soportar o tener paciencia con alguien.
    reason: lexical_alternative
  - marker: b
    text: 'Pablo habla con ironía: los corintios se consideran sabios, pero toleran a dirigentes necios.'
    reason: cultural_note
lexical_decisions:
- source_word: ἡδέως
  english_pob_choice: gladly
  chosen_spanish: gustosamente
  alternatives_spanish:
  - de buena gana
  - con gusto
  lexicon: BDAG
  rationale: El adverbio expresa una aceptación voluntaria y hasta complacida. «Gustosamente» conserva ese matiz y mantiene el tono irónico del contexto sin volverse demasiado coloquial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o explicación de lo anterior. «Porque» comunica bien la relación causal en español y es natural en este contexto.
- source_word: ἀνέχεσθε
  english_pob_choice: put up with
  chosen_spanish: toleran
  alternatives_spanish:
  - soportan
  - aguantan
  - padecen
  lexicon: BDAG
  rationale: El verbo puede significar soportar o tolerar a personas. «Toleran» conserva la idea de admitir o permitir, con un matiz menos coloquial que «aguantan» y más claro que una paráfrasis amplia.
- source_word: τῶν ἀφρόνων
  english_pob_choice: fools
  chosen_spanish: a los necios
  alternatives_spanish:
  - a los tontos
  - a los insensatos
  - a los imprudentes
  lexicon: BDAG
  rationale: «Necios» reproduce el campo semántico de ἄφρων sin caer en un insulto demasiado moderno o infantil. Mantiene el contraste con «sabios».
- source_word: φρόνιμοι
  english_pob_choice: wise
  chosen_spanish: sabios
  alternatives_spanish:
  - prudentes
  - sensatos
  lexicon: BDAG
  rationale: En la ironía paulina, el término contrasta directamente con «necios». «Sabios» preserva mejor la antítesis léxica y la fuerza retórica.
- source_word: ὄντες
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - puesto que son
  - aunque son
  lexicon: BDAG
  rationale: El participio presente se conserva con una estructura natural en español. «Siendo ustedes mismos sabios» refleja la forma participial sin imponer explícitamente una lectura causal o concesiva.
theological_decisions:
- issue: Ironía paulina respecto de la autopercepción de los corintios
  english_pob_reading: Render the statement straightforwardly in English while preserving the irony through lexical choices ('gladly,' 'put up with,' 'wise').
  chosen_spanish_reading: Mantener la frase de manera directa, dejando que el contraste entre «necios» y «sabios» comunique la ironía sin explicitarla en el texto principal.
  alternative_spanish_readings:
  - Pues con gusto aguantan a los necios, aunque ustedes mismos son sabios.
  - Porque bien soportan a los necios, siendo ustedes sabios de veras.
  rationale: El griego mismo sugiere ironía por la yuxtaposición de los términos opuestos. Una redacción transparente en español debe conservar esa tensión sin añadir una paráfrasis interpretativa que exceda el texto.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'El pasaje no requiere revisión adicional según el resumen de revisión más reciente: el texto griego y la traducción inglesa quedaron en alta concordancia, sin cambios pendientes.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento de segunda persona plural implícito en el español mediante «ustedes».
  - Se conserva la antítesis léxica necios/sabios para reflejar el contraste retórico del griego.
  - Se evita «Cristo» o terminología teológica no presente en el versículo.
  - La puntuación con coma antes del participio mantiene la estructura del original sin sobreinterpretar la relación sintáctica.
