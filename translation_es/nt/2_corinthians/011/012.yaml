translation:
  language: es
  text: Pero lo que hago[a], eso mismo seguiré haciendo, para quitarles la oportunidad a los que quieren una oportunidad, para que en aquello de que se jactan sean hallados tal como nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «pretexto» u «ocasión» para ambas ocurrencias de ἀφορμή.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃ δὲ ποιῶ καὶ ποιήσω
  english_pob_choice: But what I am doing, I will continue to do
  chosen_spanish: Pero lo que hago, eso mismo seguiré haciendo
  alternatives_spanish:
  - Pero lo que estoy haciendo, lo seguiré haciendo
  - Y lo que hago, lo seguiré haciendo también
  lexicon: BDAG
  rationale: El presente más futuro expresa la práctica actual de Pablo y su resolución de persistir. En español, «lo que hago, eso mismo seguiré haciendo» conserva esa continuidad y el énfasis sin añadir contenido.
- source_word: ἐκκόψω
  english_pob_choice: cut off
  chosen_spanish: cortar
  alternatives_spanish:
  - eliminar
  - quitar
  lexicon: BDAG
  rationale: ἐκκόπτω conserva una imagen vívida de cortar o arrancar; «cortar» mantiene la metáfora y resulta natural en español.
- source_word: ἀφορμή
  english_pob_choice: opportunity
  chosen_spanish: oportunidad
  alternatives_spanish:
  - ocasión
  - pretexto
  lexicon: BDAG
  rationale: ἀφορμή puede significar base, ocasión u oportunidad. En este contexto polémico, la traducción principal neutra «oportunidad» preserva el rango léxico y deja que el contexto determine la valoración negativa; se conservan las otras posibilidades como alternativas.
- source_word: τῶν θελόντων ἀφορμήν
  english_pob_choice: those who want an opportunity
  chosen_spanish: a los que quieren una oportunidad
  alternatives_spanish:
  - a los que desean una ocasión
  - a los que quieren un pretexto
  lexicon: BDAG
  rationale: El participio con la repetición de ἀφορμή se reproduce de forma directa para conservar la repetición retórica y la concisión del griego.
- source_word: ἐν ᾧ καυχῶνται
  english_pob_choice: in what they boast about
  chosen_spanish: en aquello de que se jactan
  alternatives_spanish:
  - en lo que se jactan
  - en el asunto de que se jactan
  lexicon: BDAG
  rationale: Καυχάομαι suele implicar jactancia o gloria en sentido competitivo; «jactarse» comunica mejor ese matiz que un simple «alardear» y mantiene el tono polémico del pasaje.
- source_word: εὑρεθῶσιν καθὼς καὶ ἡμεῖς
  english_pob_choice: they may be found to be just as we are
  chosen_spanish: sean hallados como también nosotros
  alternatives_spanish:
  - sean hallados iguales a nosotros
  - sean hallados tal como nosotros
  lexicon: BDAG
  rationale: El pasivo subjuntivo εὑρεθῶσιν se traduce como «sean hallados». La comparación de καθὼς καὶ ἡμεῖς queda en «como también nosotros» para mantener la referencia comparativa abierta y fiel al griego.
theological_decisions:
- issue: Sentido de ἀφορμή en un contexto polémico
  english_pob_reading: Render neutrally as 'opportunity' in the main text rather than specifying a morally loaded 'pretext.'
  chosen_spanish_reading: Renderizar de manera neutra como «oportunidad» en el texto principal, sin fijar «pretexto».
  alternative_spanish_readings:
  - pretexto
  - ocasión
  rationale: El sustantivo por sí solo no obliga a una carga moral negativa; la polémica la aporta el contexto. Mantener la neutralidad en la traducción principal preserva la tensión lexical y evita resolverla interpretativamente.
  doctrine_reference: Primacía del texto original y preservación de la tensión semántica.
translation_notes:
  revision_awareness: 'El borrador sigue el estado revisado más reciente del POB en inglés: no hay cambios posteriores pendientes y la lectura acordada permanece estable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponda al nombre divino; este versículo no lo requiere.
  - Se preserva «jactarse» para καυχάομαι por su fuerza retórica, en lugar de suavizarlo a «alardear».
  - Se evita «Cristo»/«Mesías» porque el versículo no contiene Χριστός.
  - La puntuación y el orden son naturales en español, pero mantienen la relación de causa/propósito de las dos cláusulas con ἵνα.
