review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: presente + futuro de ποιέω, el propósito con ἵνα, la repetición de ἀφορμή, y el pasivo subjuntivo εὑρεθῶσιν. Sin embargo, «sean hallados como también nosotros» queda incompleto y poco natural en español, y no expresa con suficiente claridad el sentido comparativo de καθὼς καὶ ἡμεῖς (''tal como nosotros'', ''igual que nosotros'').'
  spanish_quality_summary: 'El texto es mayormente fiel y legible, pero tiene dos puntos de mejora: 1) «cortar la oportunidad» suena menos idiomático que «quitarles la oportunidad» o «cortarles la oportunidad»; 2) «sean hallados como también nosotros» resulta forzado y ambiguo en español. Una revisión menor puede mantener la cercanía al griego y mejorar mucho la claridad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Oportunidad» para ἀφορμή sigue correctamente la decisión POB, con nota para «pretexto» y «ocasión». «Jactan» es adecuado para καυχῶνται. No aparecen términos sensibles del glosario mayor.
  issues:
  - severity: medium
    issue: La cláusula final «sean hallados como también nosotros» es poco natural y semánticamente incompleta.
    rationale: καθὼς καὶ ἡμεῖς compara a los opositores con Pablo y sus colaboradores. En español, hace falta explicitar el valor comparativo con una formulación como «tal como nosotros» o «igual que nosotros» para que la frase se entienda.
  - severity: low
    issue: «para cortar la oportunidad» suena menos idiomático en español.
    rationale: Aunque «cortar» conserva la metáfora de ἐκκόψω, en español con objeto abstracto y dativo implícito es más natural «quitarles la oportunidad» o «cortarles la oportunidad». Esto mejora la fluidez sin perder el sentido.
  revised_spanish_text: Pero lo que hago[a], eso mismo seguiré haciendo, para quitarles la oportunidad a los que quieren una oportunidad, para que en aquello de que se jactan sean hallados tal como nosotros.
  revised_footnotes:
  - marker: a
    text: O «pretexto» u «ocasión» para ambas ocurrencias de ἀφορμή.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta la redacción para lograr un español más natural y preciso: «quitarles la oportunidad» comunica mejor el sentido de ἐκκόψω con objeto personal implícito, y «sean hallados tal como nosotros» expresa claramente la comparación de καθὼς καὶ ἡμεῖς sin añadir contenido nuevo. Se conserva la repetición retórica de «oportunidad» y la nota léxica del POB.'
