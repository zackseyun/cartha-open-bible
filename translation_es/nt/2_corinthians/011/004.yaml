revisions:
- from: Porque si alguien viene y anuncia[a] a otro Jesús, a quien no anunciamos nosotros, o si reciben un espíritu diferente[b], que no recibieron, o un evangelio diferente[c], que no aceptaron, bien lo toleran.
  to: Porque si alguien viene y anuncia[a] a otro Jesús, que nosotros no anunciamos, o si reciben un espíritu diferente[b], que no recibieron, o un evangelio diferente[c], que no aceptaron, ustedes lo soportan muy bien[d].
  rationale: 'La revisión hace tres ajustes menores: mejora la fluidez de «que nosotros no anunciamos», vuelve más idiomática y clara la ironía de καλῶς ἀνέχεσθε con «ustedes lo soportan muy bien», y añade una nota que preserva la explicación irónica documentada en el POB inglés.'
