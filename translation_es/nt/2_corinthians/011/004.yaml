translation:
  language: es
  text: Porque si alguien viene y anuncia[a] a otro Jesús, que nosotros no anunciamos, o si reciben un espíritu diferente[b], que no recibieron, o un evangelio diferente[c], que no aceptaron, ustedes lo soportan muy bien[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclama»; κηρύσσω denota un anuncio público y autorizado.
    reason: lexical_alternative
  - marker: b
    text: O «otro espíritu». El griego usa un término que puede expresar diferencia de clase o cualidad; aquí el sentido es deliberadamente amplio.
    reason: lexical_alternative
  - marker: c
    text: O «otro evangelio».
    reason: lexical_alternative
  - marker: d
    text: 'La expresión «ustedes lo soportan muy bien» probablemente es irónica: Pablo reprende a los corintios por su excesiva disposición a tolerar tales afirmaciones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἐρχόμενος
  english_pob_choice: someone comes
  chosen_spanish: alguien viene
  alternatives_spanish:
  - el que viene
  - uno que viene
  lexicon: BDAG
  rationale: El participio sustantivado expresa una persona indefinida que llega o se presenta entre ellos. «Alguien viene» conserva esa indefinición y suena natural en español sin volverlo demasiado rígido.
- source_word: ἄλλον Ἰησοῦν
  english_pob_choice: another Jesus
  chosen_spanish: a otro Jesús
  alternatives_spanish:
  - a un Jesús diferente
  - a un Jesús distinto
  lexicon: BDAG
  rationale: «Otro» conserva el contraste entre el Jesús proclamado por Pablo y una figura rival que usa el mismo nombre. «A otro Jesús» mantiene la fuerza polémica sin sobreexplicar la diferencia.
- source_word: κηρύσσει / ἐκηρύξαμεν
  english_pob_choice: proclaims / did not proclaim
  chosen_spanish: anuncia / no anunciamos
  alternatives_spanish:
  - proclama / no proclamamos
  - predica / no predicamos
  lexicon: BDAG
  rationale: «Anunciar» comunica bien el acto público de proclamar una noticia o mensaje. Aquí evita un tono eclesiástico más estrecho que «predicar» y sigue siendo fiel al valor de κηρύσσω.
- source_word: πνεῦμα ἕτερον
  english_pob_choice: a different spirit
  chosen_spanish: un espíritu diferente
  alternatives_spanish:
  - otro espíritu
  lexicon: BDAG
  rationale: «Diferente» refleja mejor ἕτερος, que suele marcar diferencia de clase o cualidad. Mantener «espíritu» sin especificarlo preserva la amplitud semántica y la tensión teológica del pasaje.
- source_word: λαμβάνετε / ἐλάβετε
  english_pob_choice: receive / did not receive
  chosen_spanish: reciben / no recibieron
  alternatives_spanish:
  - reciben / no han recibido
  - aceptan / no aceptaron
  lexicon: BDAG
  rationale: «Recibir» es la correspondencia más natural para λαμβάνω en este contexto de algo transmitido o impartido. Mantiene la distinción con el verbo siguiente, que sí expresa aceptación.
- source_word: εὐαγγέλιον ἕτερον
  english_pob_choice: a different gospel
  chosen_spanish: un evangelio diferente
  alternatives_spanish:
  - otro evangelio
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente usual de εὐαγγέλιον. «Diferente» conserva el contraste de ἕτερος con el evangelio auténtico ya recibido.
- source_word: ἐδέξασθε
  english_pob_choice: did not accept
  chosen_spanish: no aceptaron
  alternatives_spanish:
  - no recibieron
  - no acogieron
  lexicon: BDAG
  rationale: «Aceptar» mantiene la diferencia frente a «recibir» en la cláusula anterior. En español distingue con claridad la recepción de un mensaje y su aprobación o acogida.
- source_word: καλῶς ἀνέχεσθε
  english_pob_choice: you put up with it well enough
  chosen_spanish: bien lo toleran
  alternatives_spanish:
  - lo soportan bien
  - lo aguantan bien
  lexicon: BDAG
  rationale: «Tolerar» expresa el sentido de ἀνέχομαι y puede comunicar la ironía del reproche paulino. «Bien» retiene la tonalidad irónica de καλῶς sin convertirla en elogio.
theological_decisions:
- issue: Referencia de «un espíritu diferente»
  english_pob_reading: Rendered generically as 'a different spirit' without specifying whether Paul means the Holy Spirit falsely presented, a demonic spirit, or a different spiritual influence.
  chosen_spanish_reading: «Un espíritu diferente» sin precisar si se trata del Espíritu Santo tergiversado, de un espíritu maligno o de otra influencia espiritual.
  alternative_spanish_readings:
  - el Espíritu Santo mal presentado por falsos maestros
  - un espíritu demoníaco
  - una disposición espiritual distinta
  rationale: El griego permite varias posibilidades y el contexto inmediato no obliga a resolverlas. La traducción conserva la ambigüedad para no borrar una tensión teológica que el texto deja abierta.
  doctrine_reference: Translation philosophy §3
- issue: Tono de καλῶς ἀνέχεσθε
  english_pob_reading: '''Treated as ironic rebuke: ''you put up with it well enough.'''''
  chosen_spanish_reading: 'Entendido como reproche irónico: «bien lo toleran».'
  alternative_spanish_readings:
  - lo toleran de buena gana
  - lo soportan sin problema
  - los reciben con agrado
  rationale: En el contexto Pablo no elogia la actitud de los corintios, sino que critica su disposición a aceptar enseñanzas rivales. La formulación española conserva la ironía sin alejarse del giro griego.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, que no introdujo cambios. La redacción española conserva la estructura de tres miembros paralelos, la distinción entre «recibir» y «aceptar», y la ironía final del reproche paulino.
  spanish_consistency_notes:
  - Se mantuvo «Jesús» para Ἰησοῦς y «evangelio» para εὐαγγέλιον, conforme al léxico base del proyecto.
  - Se prefirió «otro»/«diferente» según la fuerza contrastiva de ἄλλος y ἕτερος; en el texto principal se usa «otro Jesús» y «espíritu/evangelio diferente» para mantener naturalidad y matiz.
  - «Toleran» se eligió para sonar idiomático en español y conservar la lectura irónica del cierre.
  - La puntuación conserva la cadena condicional y las cláusulas relativas del griego sin añadir interpretaciones explicativas al cuerpo del texto.
