base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/011/004.yaml
  text: For if someone comes and proclaims another Jesus[a], whom we did not proclaim, or if you receive a different spirit, which you did not receive, or a different gospel, which you did not accept[c][b], you put up with it well enough.
  footnotes:
  - marker: a
    text: Or 'another spirit.' The Greek uses a term that can mean 'different' or 'another,' here likely emphasizing a spirit different from the one they had previously received.
    reason: lexical_alternative
  - marker: b
    text: Or 'another gospel.'
    reason: lexical_alternative
  - marker: c
    text: The phrase 'you put up with it well enough' is likely ironic, meaning the Corinthians were too ready to tolerate such claims.
    reason: lexical_alternative
