  text: ὅσαι γὰρ ἐπαγγελίαι θεοῦ, ἐν αὐτῷ τὸ Ναί· ⸀διὸ καὶ ⸂δι’ αὐτοῦ⸃ τὸ Ἀμὴν τῷ θεῷ πρὸς δόξαν δι’ ἡμῶν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/020.yaml
  text: For however many promises of God there are[a], in him is the Yes[c][b]. Therefore also through him is the Amen to God for glory through us.
  footnotes:
  - marker: a
    text: Or, more explicitly, 'in him they have their Yes.'
    reason: alternative_reading
  - marker: b
    text: '''Amen'' is a transliterated affirmation meaning something like ''truly'' or ''so be it.'''
    reason: cultural_note
  - marker: c
    text: Or 'to the glory of God through us,' if πρὸς δόξαν is taken more explicitly with God as the goal of the praise.
    reason: alternative_reading
