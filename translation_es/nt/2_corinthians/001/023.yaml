revisions:
- from: Pero yo invoco a Dios como testigo sobre mi propia vida[a][b], de que, para ahorraros sufrimiento, no fui otra vez a Corinto.
  to: Pero yo invoco a Dios por testigo sobre mi propia vida[a][b], que, para no imponeros una carga, no volví a Corinto.
  rationale: La revisión elimina la adición interpretativa «sufrimiento», mejora la naturalidad del español, evita el voseo/vosotros peninsular, y mantiene las alternativas léxicas documentadas por el POB inglés para la expresión de juramento y para οὐκέτι ἦλθον.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:10Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: el contraste inicial, la invocación solemne de Dios como testigo, el motivo de ‘perdonar/evitar’ a los corintios, y la idea de que Pablo no volvió a Corinto. Sin embargo, introduce una expansión no explícita en el texto fuente al traducir φειδόμενος ὑμῶν como «para ahorraros sufrimiento». El griego dice simplemente «para no cargaros / para perdonaros / para evitaros», sin mencionar ‘sufrimiento’.'
  spanish_quality_summary: El español es mayormente claro y digno, pero mezcla registro peninsular («ahorraros», «no fui») con el objetivo de español neutral latinoamericano. Además, «no fui otra vez a Corinto» suena menos natural que «no volví a Corinto» o «no fui de nuevo a Corinto». La frase «sobre mi propia vida» funciona, aunque «invoco a Dios por testigo sobre mi propia vida» suena más idiomático en español bíblico general que «como testigo».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Dios» está bien. No hay términos teológicos sensibles aquí. La principal cuestión léxica es φειδόμενος: conviene evitar una explicitación interpretativa como «sufrimiento» y usar una formulación más ceñida al griego, p. ej. «para no imponeros una carga» o más literalmente «para perdonaros / para evitaros».'
  issues:
  - severity: medium
    issue: «para ahorraros sufrimiento» añade un objeto no presente en el griego
    rationale: φειδόμενος ὑμῶν significa ‘perdonándoos / escatimándoos / por consideración hacia vosotros / para evitaros’, pero no especifica ‘sufrimiento’. Esa explicitación va más allá de la evidencia fuente.
  - severity: medium
    issue: 'Registro no plenamente neutral: uso de «ahorraros»'
    rationale: El encargo pide español neutral latinoamericano / ampliamente legible en iglesia. El enclítico de segunda persona plural peninsular no encaja con ese objetivo.
  - severity: low
    issue: «no fui otra vez a Corinto» es comprensible pero poco natural
    rationale: Para οὐκέτι ἦλθον, en español suena más natural «no volví a Corinto» o «no fui de nuevo a Corinto», manteniendo el sentido de no repetir la visita.
  - severity: low
    issue: La nota a dice «sobre mi alma/vida», formulación algo redundante
    rationale: 'Puede afinarse para reflejar mejor la alternativa preservada en el POB inglés: «contra mí mismo» o más literalmente «sobre mi alma».'
  revised_spanish_text: Pero yo invoco a Dios por testigo sobre mi propia vida[a][b], que, para no imponeros una carga, no volví a Corinto.
  revised_footnotes:
  - marker: a
    text: O «contra mí mismo»; más literalmente, «sobre mi alma».
    reason: lexical_alternative
  - marker: b
    text: O «ya no fui a Corinto» o «no fui más a Corinto».
    reason: alternative_reading
  revision_rationale: La revisión elimina la adición interpretativa «sufrimiento», mejora la naturalidad del español, evita el voseo/vosotros peninsular, y mantiene las alternativas léxicas documentadas por el POB inglés para la expresión de juramento y para οὐκέτι ἦλθον.
