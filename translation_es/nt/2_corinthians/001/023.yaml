translation:
  language: es
  text: Pero yo invoco a Dios por testigo sobre mi propia vida[a][b], que, para no imponeros una carga, no volví a Corinto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «contra mí mismo»; más literalmente, «sobre mi alma».
    reason: lexical_alternative
  - marker: b
    text: O «ya no fui a Corinto» o «no fui más a Corinto».
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγὼ δὲ
  english_pob_choice: But I
  chosen_spanish: Pero yo
  alternatives_spanish:
  - Y yo
  - Ahora bien, yo
  lexicon: sentido discursivo de δέ; énfasis explícito de ἐγώ
  rationale: Conserva el contraste leve de δέ y el énfasis en la primera persona sin sonar forzado en español.
- source_word: μάρτυρα τὸν θεὸν ἐπικαλοῦμαι
  english_pob_choice: I call God as witness
  chosen_spanish: invoco a Dios como testigo
  alternatives_spanish:
  - llamo a Dios como testigo
  - llamo a Dios por testigo
  lexicon: BDAG para ἐπικαλέω en contexto jurídico/solemne
  rationale: '''Invoco'' y ''como testigo'' conservan el matiz solemne y forense del giro griego, con español natural y digno.'
- source_word: ἐπὶ τὴν ἐμὴν ψυχήν
  english_pob_choice: upon my own life
  chosen_spanish: sobre mi propia vida
  alternatives_spanish:
  - sobre mi alma
  - contra mí mismo
  lexicon: BDAG; valor idiomático de ἐπί + acusativo
  rationale: '''Sobre mi propia vida'' comunica el carácter de juramento o apelación que recae sobre el propio sujeto; evita la ambigüedad de ''alma'' en español moderno, aunque la nota preserva la alternativa literal.'
- source_word: φειδόμενος ὑμῶν
  english_pob_choice: to spare you
  chosen_spanish: para ahorraros sufrimiento
  alternatives_spanish:
  - para perdonaros
  - por consideración hacia vosotros
  lexicon: BDAG para φείδομαι
  rationale: 'El participio expresa la razón de no ir: evitarles daño o aflicción. ''Ahorraros sufrimiento'' explicita la intención preservada por el contexto, sin añadir un sentido ajeno.'
- source_word: οὐκέτι ἦλθον
  english_pob_choice: I did not come again
  chosen_spanish: no fui otra vez
  alternatives_spanish:
  - no vine de nuevo
  - ya no fui
  lexicon: BDAG para οὐκέτι + ἔρχομαι
  rationale: En español, 'no fui otra vez' transmite con naturalidad el valor de una visita no repetida, equivalente al 'did not come again' del POB inglés.
- source_word: εἰς Κόρινθον
  english_pob_choice: to Corinth
  chosen_spanish: a Corinto
  alternatives_spanish:
  - hacia Corinto
  - a la ciudad de Corinto
  lexicon: uso normal de movimiento con εἰς
  rationale: La preposición de destino se expresa de modo idiomático como 'a' en español.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el ajuste del POB inglés que prefirió 'upon my own life' frente a 'against my own life'. También conserva la lectura revisada de οὐκέτι ἦλθον como una visita no repetida, expresada de forma natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός conforme al estándar del proyecto.
  - Se evita 'Señor' porque el texto no usa κύριος.
  - '''Corinto'' sigue la ortografía española habitual para el topónimo.'
  - La frase 'sobre mi propia vida' está anclada con nota para preservar la alternativa más literal sin perder fluidez.
  - No se introduce terminología eclesiástica ajena al registro forense/epistolar del versículo.
