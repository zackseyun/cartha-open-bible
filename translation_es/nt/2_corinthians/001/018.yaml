revisions:
- from: Tan cierto como que Dios es fiel[a], nuestra palabra para con ustedes no es “sí y no”.
  to: Tan cierto como que Dios es fiel[a], nuestra palabra[b] a ustedes no es «sí y no».
  rationale: Se conserva la buena solución principal para la construcción enfática («Tan cierto como que Dios es fiel»), pero se sustituye «para con ustedes» por «a ustedes» para reflejar mejor ὁ πρὸς ὑμᾶς en español natural y fiel. También se añade la nota léxica sobre λόγος, en línea con el audit trail inglés.
