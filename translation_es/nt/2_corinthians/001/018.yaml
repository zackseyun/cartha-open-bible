translation:
  language: es
  text: Tan cierto como que Dios es fiel[a], nuestra palabra[b] a ustedes no es «sí y no».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Pero Dios es fiel, que nuestra palabra a ustedes no es sí y no».'
    reason: lexical_alternative
  - marker: b
    text: «Palabra» también puede traducirse «mensaje» o «discurso».
    reason: lexical_alternative
lexical_decisions:
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - fidedigno
  lexicon: BDAG
  rationale: Para Dios, «fiel» comunica mejor su confiabilidad pactual y personal en español, sin perder la fuerza de la afirmación paulina.
- source_word: δὲ
  english_pob_choice: as surely as
  chosen_spanish: Tan cierto como que
  alternatives_spanish:
  - pero
  - ahora bien
  lexicon: BDAG
  rationale: Aquí δέ funciona dentro de una fórmula enfática con «πιστὸς ὁ θεός»; en español, «Tan cierto como que» transmite mejor el valor de solemnidad/aseveración que un simple contraste adversativo.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Es la traducción directa y natural del sujeto.
- source_word: λόγος
  english_pob_choice: message
  chosen_spanish: palabra
  alternatives_spanish:
  - mensaje
  - discurso
  lexicon: BDAG
  rationale: Aunque el inglés POB optó por «message» para fluidez, en español «palabra» conserva mejor el campo semántico de λόγος y la posible tensión entre palabra/mensaje/discurso; por eso se mantiene una traducción cercana y transparente.
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestra
  alternatives_spanish:
  - de nosotros
  lexicon: BDAG
  rationale: Genitivo posesivo ordinario; el español exige concordancia femenina con «palabra».
- source_word: ὁ πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: para con ustedes
  alternatives_spanish:
  - a ustedes
  - dirigida a ustedes
  lexicon: BDAG
  rationale: La preposición πρός con acusativo puede expresar dirección o relación; «para con ustedes» conserva la idea de palabra dirigida a los corintios y su relación con ellos, sin reducirla solo a destino espacial.
- source_word: οὐκ ἔστιν
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no ha sido
  lexicon: BDAG
  rationale: El presente simple refleja bien el griego y la afirmación general de Pablo.
- source_word: Ναὶ καὶ Οὔ
  english_pob_choice: Yes and No
  chosen_spanish: “sí y no”
  alternatives_spanish:
  - sí y no
  - “sí” y “no”
  lexicon: BDAG
  rationale: Se conserva la fórmula antitética y la puntuación con comillas para indicar que es una expresión fija o sloganizada, no una mera enumeración.
theological_decisions:
- issue: Cómo reproducir la construcción enfática πιστὸς δὲ ὁ θεὸς ὅτι
  english_pob_reading: As surely as God is faithful
  chosen_spanish_reading: Tan cierto como que Dios es fiel
  alternative_spanish_readings:
  - Pero Dios es fiel, que…
  - Dios es fiel, porque…
  rationale: La frase española busca reproducir la función solemne/asser tiva que el inglés POB leyó en la construcción, sin forzar un giro literalmente subordinante que en español sonaría oscuro.
  doctrine_reference: fidelidad de Dios; veracidad del ministerio apostólico
- issue: Sostener la posible ambigüedad de λόγος entre palabra, mensaje y discurso
  english_pob_reading: Message may also be rendered word or speech
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - mensaje
  - discurso
  rationale: Se eligió «palabra» por su cercanía al griego y porque deja abierta la gama semántica. En nota de revisión interna queda reconocido que también podría entenderse como «mensaje» o «discurso», pero el texto principal debe preservar la tensión léxica.
  doctrine_reference: lenguaje apostólico; integridad de la comunicación
- issue: Valor de la negación final respecto a vacilación o contradicción
  english_pob_reading: not “Yes and No”
  chosen_spanish_reading: no es “sí y no”
  alternative_spanish_readings:
  - no es un “sí” y un “no”
  - no es tanto sí como no
  rationale: La formulación mantiene el contraste tajante de Pablo contra la inestabilidad o duplicidad, sin suavizarlo con una paráfrasis interpretativa.
  doctrine_reference: integridad, veracidad apostólica
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior incluyendo el único marcador de nota [a] directamente en el texto español. Se evitó crear el marcador [b] porque no aparece anclado en el texto principal; la alternativa léxica de λόγος queda absorbida por la decisión léxica y no requiere nota separada.
  spanish_consistency_notes:
  - Se usa «Dios» como sujeto divino directo, sin máscara reverencial.
  - Se mantiene «fiel» para πιστός conforme al valor de confiabilidad de Dios.
  - Se evita «Cristo»/«Mesías» porque no aparece en este versículo.
  - 'Se conserva la antítesis final con comillas: «sí y no».'
  - Se usa español neutro latinoamericano con «ustedes» para la segunda persona plural.
