translation:
  language: es
  text: Porque, así como los sufrimientos de Cristo[a][b] abundan sobre nosotros, así también por medio de Cristo abunda nuestro consuelo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los sufrimientos por Cristo’. El griego puede indicar sufrimientos que pertenecen a Cristo o sufrimientos padecidos por causa de él.
    reason: alternative_reading
  - marker: b
    text: ‘Cristo’ también puede traducirse ‘Mesías’ cuando el sentido de título está en primer plano.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: —
  rationale: Introduce la explicación de lo anterior con una conjunción causal natural en español, manteniendo la fuerza explicativa del griego y del inglés POB.
- source_word: καθὼς ... οὕτως
  english_pob_choice: just as ... so also
  chosen_spanish: así como ... así también
  alternatives_spanish:
  - tal como ... así también
  - como ... así también
  lexicon: —
  rationale: Conserva la estructura correlativa comparativa del original sin sobrecargar el español.
- source_word: περισσεύει
  english_pob_choice: overflow
  chosen_spanish: se desbordan / se desborda
  alternatives_spanish:
  - abundan
  - se multiplican
  lexicon: BDAG
  rationale: ‘Desbordarse’ comunica abundancia con movimiento expansivo, más cercano a la imagen verbal que ‘abundar’.
- source_word: τὰ παθήματα
  english_pob_choice: the sufferings
  chosen_spanish: las aflicciones
  alternatives_spanish:
  - los sufrimientos
  - los padecimientos
  lexicon: BDAG
  rationale: ‘Aflicciones’ suena natural en español bíblico y conserva el sentido de padecimientos intensos, aunque ‘sufrimientos’ sigue siendo una alternativa válida.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Christ
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  - por Cristo
  lexicon: BDAG
  rationale: Se mantiene la relación genitiva de forma transparente. El título ‘Cristo’ se conserva como forma fija y contextual en el texto principal; la posible lectura relacional ‘por Cristo’ se preserva en la nota.
- source_word: εἰς ἡμᾶς
  english_pob_choice: to us
  chosen_spanish: hacia nosotros
  alternatives_spanish:
  - sobre nosotros
  - para nosotros
  lexicon: BDAG
  rationale: ‘Hacia nosotros’ refleja la dirección/irrupción de las aflicciones con mayor precisión que un simple ‘para’, sin cerrar la ambigüedad del alcance.
- source_word: διὰ τοῦ Χριστοῦ
  english_pob_choice: through Christ
  chosen_spanish: por medio de Cristo
  alternatives_spanish:
  - a través de Cristo
  - mediante Cristo
  lexicon: BDAG
  rationale: Expresa agencia mediada de manera clara y natural en español.
- source_word: ἡ παράκλησις
  english_pob_choice: comfort
  chosen_spanish: la consolación
  alternatives_spanish:
  - el consuelo
  - la exhortación
  lexicon: BDAG
  rationale: ‘Consolación’ mantiene el campo semántico pastoral de παράκλησις en este contexto paulino, sin perder la fuerza de alivio y ánimo.
- source_word: ἡμῶν
  english_pob_choice: our comfort
  chosen_spanish: nuestra consolación
  alternatives_spanish:
  - nuestro consuelo
  - la consolación que tenemos
  lexicon: —
  rationale: Reproduce de forma directa el posesivo del griego y conserva la cohesión retórica de la frase.
theological_decisions:
- issue: Genitivo de τοῦ Χριστοῦ en ‘las aflicciones de Cristo’
  english_pob_reading: Shared participation in sufferings belonging to Christ and associated with union with him
  chosen_spanish_reading: Participación compartida en aflicciones vinculadas a Cristo, sin resolver si son aflicciones de Cristo o sufridas por causa de él
  alternative_spanish_readings:
  - aflicciones por Cristo
  - aflicciones que pertenecen a Cristo
  rationale: El griego admite varias relaciones genitivas; el español mantiene la misma tensión con ‘de Cristo’ y una nota que preserva la alternativa ‘por Cristo’ sin forzarla en el texto principal.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto principal con sus marcadores [a] y [b], y se conservó la tensión del genitivo sin resolverla de más.
  spanish_consistency_notes:
  - Se mantuvo ‘Cristo’ como forma principal, coherente con el uso paulino y con la práctica POB documentada.
  - Se usó ‘consolación’ para παράκλησις en armonía con el contraste de aflicción/consolación del contexto inmediato.
  - Se preservó la comparación correlativa con ‘así como ... así también’ para reflejar la sintaxis del griego.
  - Los marcadores de nota aparecen exactamente donde corresponden en el texto principal.
