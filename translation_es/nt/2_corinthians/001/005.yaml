    text: Or 'the sufferings for Christ.' The Greek may denote sufferings belonging to Christ or sufferings endured on his account.
    reason: alternative_reading
  - marker: b
    text: '''Christ'' may also be rendered ''Messiah'' where the title sense is foregrounded.'
    reason: lexical_alternative
