translation:
  language: es
  text: tal como también ustedes llegaron a entendernos en parte[a], que somos su motivo de jactancia, así como también ustedes lo son nuestro[b], en el día de nuestro Señor Jesús.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parcialmente» o «hasta cierto punto».
    reason: lexical_alternative
  - marker: b
    text: O «motivo de orgullo» o «razón de orgullo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπέγνωτε
  english_pob_choice: came to understand
  chosen_spanish: reconocieron
  alternatives_spanish:
  - llegaron a entender
  - comprendieron
  lexicon: BDAG
  rationale: El aoristo de ἐπιγινώσκω aquí señala un reconocimiento real alcanzado por los corintios. «Reconocieron» conserva la fuerza relacional y cognitiva sin exagerar una comprensión total.
- source_word: ἀπὸ μέρους
  english_pob_choice: in part
  chosen_spanish: en parte
  alternatives_spanish:
  - parcialmente
  - hasta cierto punto
  lexicon: BDAG
  rationale: La expresión idiomática comunica una comprensión incompleta o parcial. «En parte» es natural en español y mantiene abierta la amplitud exacta del matiz.
- source_word: καύχημα
  english_pob_choice: boast
  chosen_spanish: motivo de orgullo
  alternatives_spanish:
  - orgullo
  - motivo de jactancia
  lexicon: BDAG
  rationale: En este contexto paulino, καύχημα puede expresar el objeto o causa del regocijo/boast. En español, «motivo de orgullo» preserva el valor relacional sin sonar jactancioso de manera inapropiada, aunque se mantiene la tensión semántica del término.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como también
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: La comparación recíproca requiere una unión fluida en español. «Así como también» reproduce el paralelismo y el valor aditivo de καί.
- source_word: ἡμέρᾳ τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: the day of our Lord Jesus
  chosen_spanish: el día de nuestro Señor Jesús
  alternatives_spanish:
  - el día de nuestro Señor Jesucristo
  - el día de nuestro Señor
  lexicon: BDAG
  rationale: Se mantiene la expresión escatológica y el título «Señor» para κύριος, con la formulación más natural en español. No se sustituye por una paráfrasis doctrinalmente más amplia.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico; «Señor» es el equivalente normal y reverente en español.
- source_word: καθὼς καὶ
  english_pob_choice: just as you also
  chosen_spanish: tal como también
  alternatives_spanish:
  - así como también
  - justamente como también
  lexicon: BDAG
  rationale: La apertura comparativa enlaza con lo anterior y conserva el énfasis recíproco sin forzar el orden del español.
theological_decisions:
- issue: Lenguaje recíproco de καύχημα entre Pablo y la iglesia
  english_pob_reading: we are your boast, just as you also are ours
  chosen_spanish_reading: somos motivo de orgullo de ustedes, así como también ustedes lo son de nosotros
  alternative_spanish_readings:
  - somos su jactancia, así como ustedes la nuestra
  - somos causa de orgullo para ustedes, así como ustedes para nosotros
  rationale: La frase expresa una reciprocidad escatológica de gozo y reconocimiento entre el apóstol y la congregación, no una afirmación de autoexaltación. «Motivo de orgullo» conserva el trasfondo de καύχημα sin suavizar innecesariamente la tensión del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla por paráfrasis.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés al usar una sola coma para reflejar mejor el fluir del griego, y conserva todos los elementos del original: el reconocimiento parcial, la reciprocidad de καύχημα y la referencia escatológica al día de nuestro Señor Jesús.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según el criterio del proyecto.
  - «En parte» reproduce de forma idiomática ἀπὸ μέρους.
  - La construcción recíproca se conserva con paralelismo claro y lectura natural en español.
  - Se evita resolver καύχημα con un término excesivamente técnico; la tensión entre orgullo/jactancia queda documentada en nota.
