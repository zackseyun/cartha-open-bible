translation:
  language: es
  text: el que nos rescató de una muerte tan grande y nos rescatará[a], en quien hemos puesto nuestra esperanza de que también nos rescatará de nuevo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de un peligro mortal tan grande».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τηλικούτου
  english_pob_choice: so great
  chosen_spanish: tan grande
  alternatives_spanish:
  - tan severa
  - tan terrible
  - tan grande así
  lexicon: BDAG
  rationale: El adjetivo demostrativo intensifica la magnitud del peligro o de la muerte. «Tan grande» conserva esa fuerza enfática en español sin volver la frase extraña.
- source_word: θανάτου
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - peligro mortal
  - riesgo mortal
  lexicon: BDAG
  rationale: El sustantivo es literalmente «muerte». Mantenerlo en la línea principal sigue de cerca el griego; el sentido idiomático de peligro mortal queda sugerido por el contexto y puede explicitarse en nota si fuera necesario.
- source_word: ἐρρύσατο
  english_pob_choice: rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  lexicon: BDAG
  rationale: El verbo denota liberar de un peligro real. «Rescató» suena natural en español moderno y conserva el matiz concreto de intervención para sacar de peligro.
- source_word: ῥύσεται
  english_pob_choice: will rescue
  chosen_spanish: rescatará
  alternatives_spanish:
  - librará
  - salvará
  lexicon: BDAG
  rationale: Se mantiene la misma raíz léxica en español para reflejar la repetición del griego y conservar la continuidad entre la acción pasada y la futura.
- source_word: εἰς ὃν
  english_pob_choice: in whom
  chosen_spanish: en quien
  alternatives_spanish:
  - sobre quien
  - a quien
  lexicon: BDAG
  rationale: Aunque la preposición básica puede sugerir dirección, aquí expresa el objeto personal de la esperanza. «En quien» es idiomático y mantiene el foco relacional.
- source_word: ἠλπίκαμεν
  english_pob_choice: we have hoped
  chosen_spanish: hemos esperado
  alternatives_spanish:
  - hemos puesto nuestra esperanza
  - hemos confiado
  lexicon: BDAG
  rationale: El perfecto indica una esperanza estable y continua. «Hemos esperado» conserva esa duratividad sin añadir más contenido del que el texto exige.
- source_word: καὶ ἔτι
  english_pob_choice: indeed...again
  chosen_spanish: también aún
  alternatives_spanish:
  - ciertamente todavía
  - sí, todavía
  lexicon: BDAG
  rationale: La combinación aporta refuerzo y continuidad. «También aún» preserva ambas ideas de modo breve y natural en español.
theological_decisions:
- issue: Si la frase debe explicitar el sentido idiomático de «muerte» como peligro mortal en el texto principal
  english_pob_reading: Retains 'death' in the main text, with a footnote for the idiomatic sense 'from such a deadly peril.'
  chosen_spanish_reading: Conserva «muerte» en el texto principal, con nota para el posible sentido idiomático de peligro mortal.
  alternative_spanish_readings:
  - «de un peligro mortal tan grande»
  - «de una muerte tan grande» sin nota
  rationale: El griego dice literalmente «muerte», y la prioridad es respetar esa forma. A la vez, la nota permite que el lector entienda la posibilidad idiomática sin sustituir la imagen original.
  doctrine_reference: 'Translation philosophy: original-language primacy over translation tradition; optimal equivalence'
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y conserva la repetición léxica de «rescatar» para ἐρρύσατο / ῥύσεται, alineada con la auditoría inglesa. Se mantiene «muerte» en el cuerpo principal y se explicita en nota la alternativa idiomática que el audit trail documenta.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma del proyecto solo cuando aparezca el tetragrámaton; este versículo no lo contiene.
  - Se prefirió «rescató / rescatará» para mantener continuidad verbal y la fuerza concreta del verbo griego.
  - «En quien» preserva la construcción relacional de esperanza sin convertirla en paráfrasis doctrinal.
  - La nota emplea una formulación breve y lecturable, adecuada para una alternativa lexical documentada.
