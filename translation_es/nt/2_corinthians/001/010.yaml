revisions:
- from: él que nos rescató de una muerte tan grande y nos rescatará[a], en quien hemos esperado que también aún nos rescatará.
  to: el que nos rescató de una muerte tan grande y nos rescatará[a], en quien hemos puesto nuestra esperanza de que también nos rescatará de nuevo.
  rationale: Se ajusta el borrador para que el español refleje con más fidelidad el sentido de esperanza depositada (ἠλπίκαμεν con εἰς ὃν) y para que καὶ ἔτι suene natural como continuación/repetición («de nuevo»). También se mejora la fluidez con «el que». No se altera la decisión principal de mantener «muerte» en el texto con nota alternativa idiomática.
