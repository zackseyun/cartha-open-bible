translation:
  language: es
  text: Porque no les escribimos otra cosa sino lo que leen y sí entienden[a], y espero que lo entenderán plenamente hasta el fin.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y espero que entenderán hasta el fin».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἄλλα
  english_pob_choice: anything else
  chosen_spanish: otra cosa
  alternatives_spanish:
  - algo más
  - nada más
  lexicon: BDAG
  rationale: El griego neutro plural negado expresa exclusión de un contenido diferente; en español, «otra cosa» transmite naturalmente que Pablo no está escribiendo un mensaje distinto o adicional.
- source_word: γράφομεν
  english_pob_choice: we are not writing
  chosen_spanish: no les escribimos
  alternatives_spanish:
  - no estamos escribiéndoles
  - no les estamos escribiendo
  lexicon: BDAG
  rationale: El presente epistolar en español puede expresarse con el presente simple. Mantiene la inmediatez de la carta sin forzar una perífrasis más pesada.
- source_word: ἀναγινώσκετε
  english_pob_choice: you read
  chosen_spanish: leen
  alternatives_spanish:
  - están leyendo
  - van leyendo
  lexicon: BDAG
  rationale: Aquí el sentido es la lectura de la carta por los destinatarios; «leen» es claro, sobrio y preserva el valor general del presente.
- source_word: ἐπιγινώσκετε
  english_pob_choice: indeed understand
  chosen_spanish: entienden
  alternatives_spanish:
  - reconocen
  - comprenden
  lexicon: BDAG
  rationale: En contraste con el simple leer, el verbo intensificado apunta a captar el sentido. «Entienden» comunica bien esa comprensión sin volverlo técnico.
- source_word: ἕως τέλους
  english_pob_choice: fully to the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - por completo
  - hasta el final
  lexicon: BDAG
  rationale: La frase puede leerse de modo temporal o idiomático. «Hasta el fin» conserva la forma más cercana al griego y permite mantener la tensión entre duración y plenitud que el POB inglés también preserva en su nota.
- source_word: ἐπιγνώσεσθε
  english_pob_choice: you will understand fully
  chosen_spanish: lo entenderán plenamente
  alternatives_spanish:
  - lo conocerán plenamente
  - llegarán a comprenderlo plenamente
  lexicon: BDAG
  rationale: El futuro intensifica el verbo anterior; «entenderán plenamente» conserva esa progresión de comprensión más completa. Se añade el pronombre «lo» para hacer explícito el objeto implícito en español.
theological_decisions:
- issue: Relación entre «leer» y «entender» como contraste retórico, no como dos mensajes distintos
  english_pob_reading: what you read and indeed understand
  chosen_spanish_reading: lo que leen y también entienden
  alternative_spanish_readings:
  - lo que leen y reconocen
  - lo que leen y comprenden
  rationale: El texto no sugiere dos contenidos separados, sino que subraya que lo escrito es transparente y puede ser leído y comprendido. «También entienden» mantiene el paralelismo sin introducir una explicación ajena.
  doctrine_reference: 2 Co 1:13; transparencia apostólica del mensaje
- issue: 'Alcance de ἕως τέλους: temporal, intensivo o ambos'
  english_pob_reading: understand fully to the end
  chosen_spanish_reading: hasta el fin lo entenderán plenamente
  alternative_spanish_readings:
  - lo entenderán plenamente
  - lo entenderán hasta el fin
  rationale: El griego permite tanto una idea de completitud como una referencia temporal. La redacción elegida preserva ambas posibilidades sin decidir en exceso por una sola.
  doctrine_reference: 2 Co 1:13; valor aspectual de ἕως τέλους
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «also understand» a «indeed understand» y de «understand completely» a «understand fully to the end». La propuesta española sigue esa revisión al distinguir la lectura simple («leen») de la comprensión más plena («entienden plenamente») y al conservar explícitamente «hasta el fin», que refleja ἕως τέλους.
  spanish_consistency_notes:
  - Se mantiene un registro sobrio y transparente, adecuado para una declaración paulina de claridad retórica.
  - No se introduce terminología eclesiástica técnica donde el griego es directo.
  - La nota al pie preserva la alternativa literal sin romper la fluidez del texto principal.
