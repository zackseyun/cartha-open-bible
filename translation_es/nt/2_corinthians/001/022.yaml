translation:
  language: es
  text: el cual también nos selló y nos dio la garantía[a] del Espíritu en nuestros corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «depósito» del Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: σφραγισάμενος
  english_pob_choice: sealed
  chosen_spanish: selló
  alternatives_spanish:
  - marcó con su sello
  - puso su sello sobre
  lexicon: BDAG
  rationale: σφραγίζω comunica la idea de sellar para propiedad, autenticación o seguridad. En español, «selló» conserva la metáfora de forma natural y breve, sin explicarla de más.
- source_word: δοὺς
  english_pob_choice: gave
  chosen_spanish: dio
  alternatives_spanish:
  - habiendo dado
  lexicon: BDAG
  rationale: 'El participio aoristo de δίδωμι se expresa con naturalidad en español como un perfecto simple coordinado: «dio». Mantiene el paralelismo con «selló».'
- source_word: ἀρραβῶνα
  english_pob_choice: pledge
  chosen_spanish: prenda
  alternatives_spanish:
  - depósito
  - garantía
  - anticipo
  lexicon: BDAG
  rationale: ἀρραβών designa una entrega inicial que asegura lo restante. «Prenda» preserva bien el valor concreto y tradicional del término en español bíblico, sin perder el matiz comercial de la metáfora.
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - que es del Espíritu
  - como prenda del Espíritu
  lexicon: BDAG
  rationale: 'El genitivo se conserva de manera directa: la prenda está relacionada con el Espíritu. «Del Espíritu» respeta la formulación compacta del griego sin introducir una paráfrasis interpretativa.'
- source_word: ἐν ταῖς καρδίαις ἡμῶν
  english_pob_choice: in our hearts
  chosen_spanish: en nuestros corazones
  alternatives_spanish:
  - dentro de nuestros corazones
  - en lo íntimo de nuestros corazones
  lexicon: BDAG
  rationale: «En nuestros corazones» reproduce con claridad el ámbito interior indicado por ἐν + dativo, conservando la localización personal e íntima del don.
- source_word: ὁ καὶ ... καὶ
  english_pob_choice: who also ... and
  chosen_spanish: el cual también ... y
  alternatives_spanish:
  - quien también ... y
  - el que también ... y
  lexicon: Greek grammar
  rationale: El artículo con participio remite a Dios del contexto anterior. En español, «el cual» ofrece continuidad referencial y mantiene el encadenamiento participial de manera idiomática.
theological_decisions:
- issue: Sentido de ἀρραβών como garantía anticipada
  english_pob_reading: Rendered concretely as a pledge, preserving the commercial metaphor rather than abstracting it into a doctrinal explanation.
  chosen_spanish_reading: Traducido como «prenda», conservando la imagen concreta de anticipo que asegura lo futuro.
  alternative_spanish_readings:
  - garantía
  - anticipo que garantiza lo restante
  - depósito
  rationale: El texto usa una metáfora comercial. «Prenda» mantiene la fuerza concreta del término y evita aplanarlo en una abstracción teológica, preservando la tensión interpretativa.
  doctrine_reference: Mantener la metáfora paulina sin resolverla por completo; equivalencia óptima con transparencia lexical.
- issue: Relación del Espíritu con la prenda
  english_pob_reading: of the Spirit
  chosen_spanish_reading: del Espíritu
  alternative_spanish_readings:
  - que proviene del Espíritu
  - que consiste en el Espíritu
  rationale: La formulación breve conserva la ambigüedad del genitivo y no fuerza una explicación que el griego no explicita.
  doctrine_reference: No cerrar la relación semántica del genitivo más allá de lo que el texto exige.
translation_notes:
  revision_awareness: Se incorporó la revisión del inglés POB que prefirió «pledge» sobre «down payment»; por eso se eligió «prenda» como equivalente más formal e idiomático en español, manteniendo el valor metáforico sin convertirlo en paráfrasis.
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por referencia al Espíritu Santo en el contexto paulino.
  - Se conserva el paralelismo verbal («selló» / «dio») para reflejar la coordinación griega.
  - Se evita sustituir el genitivo por una explicación más larga en el texto principal; la nota recoge las alternativas léxicas relevantes.
