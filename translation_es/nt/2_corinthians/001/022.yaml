  glossary_alignment: 'No hay conflicto con la terminología del proyecto: «Espíritu» está bien capitalizado por contexto; no aparecen términos sensibles como Yahvé/Mesías/esclavo. La revisión propuesta respeta la decisión auditada de conservar el valor de ἀρραβών con una formulación española clara, apoyada por nota léxica.'
