translation:
  language: es
  text: y por medio de ustedes pasar a Macedonia[a], y nuevamente de Macedonia venir a ustedes y ser enviado en camino por ustedes a Judea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para ser ayudado en el camino a Judea».
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὑμῶν
  english_pob_choice: through you
  chosen_spanish: por medio de ustedes
  alternatives_spanish:
  - a través de ustedes
  - por ustedes
  - por ustedes all
  lexicon: BDAG
  rationale: La preposición διὰ con genitivo expresa aquí tránsito por la mediación de los corintios en el plan de viaje. «Por medio de ustedes» conserva esa idea de mediación o vía, con español natural y sin reducirlo a mera compañía.
- source_word: διελθεῖν
  english_pob_choice: to pass
  chosen_spanish: pasar
  alternatives_spanish:
  - viajar
  - atravesar
  lexicon: BDAG
  rationale: El infinitivo indica pasar o recorrer camino hacia adelante. «Pasar» es breve, fiel y encaja bien con el complemento de destino.
- source_word: εἰς Μακεδονίαν
  english_pob_choice: into Macedonia
  chosen_spanish: a Macedonia
  alternatives_spanish:
  - hacia Macedonia
  - dentro de Macedonia
  lexicon: BDAG
  rationale: Aunque el griego tiene el matiz de movimiento «hacia/into», en español «pasar a Macedonia» expresa naturalmente el destino sin sonar forzado. Aquí no se pierde el movimiento direccional.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: nuevamente
  alternatives_spanish:
  - otra vez
  - de nuevo
  lexicon: BDAG
  rationale: Marca el regreso previsto en el itinerario. «Nuevamente» suena más sobrio y literario que «otra vez».
- source_word: ἀπὸ Μακεδονίας
  english_pob_choice: from Macedonia
  chosen_spanish: de Macedonia
  alternatives_spanish:
  - desde Macedonia
  lexicon: BDAG
  rationale: La preposición ἀπό señala origen o salida. «De Macedonia» es natural en español y mantiene la idea de procedencia.
- source_word: ἐλθεῖν πρὸς ὑμᾶς
  english_pob_choice: to come to you
  chosen_spanish: ir a ustedes
  alternatives_spanish:
  - venir a ustedes
  - volver a ustedes
  lexicon: BDAG
  rationale: En el contexto del itinerario, el griego expresa el movimiento hacia los corintios. «Ir a ustedes» evita añadir explícitamente «volver», que el griego no dice, aunque el contexto lo sugiere.
- source_word: ὑφ’ ὑμῶν
  english_pob_choice: by you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - de parte de ustedes
  - con su ayuda
  lexicon: BDAG
  rationale: ὑπό con genitivo expresa agencia. «Por ustedes» mantiene a los corintios como quienes realizan la acción siguiente sin sobreinterpretar el medio.
- source_word: προπεμφθῆναι
  english_pob_choice: to be sent on
  chosen_spanish: ser encaminado
  alternatives_spanish:
  - ser enviado adelante
  - ser ayudado en el camino
  - ser despedido
  lexicon: BDAG
  rationale: En un contexto de viaje, προπέμπω puede implicar acompañar/poner en camino a alguien con apoyo. «Ser encaminado» comunica bien esa acción de despacho o envío en español e incluye, sin imponer, la ayuda práctica del trayecto.
- source_word: εἰς τὴν Ἰουδαίαν
  english_pob_choice: to Judea
  chosen_spanish: a Judea
  alternatives_spanish:
  - hacia Judea
  - a la Judea
  lexicon: BDAG
  rationale: Como destino, «a Judea» es la forma más natural en español y mantiene el valor direccional de εἰς.
translation_notes:
  revision_awareness: El texto sigue de cerca el recorrido itinerante del griego y conserva la mediación de los corintios tanto para el paso a Macedonia como para el envío posterior a Judea. La nota reproduce la alternativa interpretativa tradicional del verbo final, documentada en el audit trail inglés.
  spanish_consistency_notes:
  - Se emplea «ustedes» para el destinatario plural, en coherencia con un registro neutral latinoamericano.
  - Se evita «SEÑOR» u otra terminología no presente en el versículo.
  - Se mantiene una equivalencia sobria entre los verbos de movimiento («pasar», «ir», «ser encaminado») para no borrar el relieve del itinerario.
