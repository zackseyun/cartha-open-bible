    rationale: Aunque semánticamente defendible, «encaminado» puede sonar abstracto o poco transparente en español bíblico moderno. «Ser enviado en camino» mantiene mejor la idea de ser despedido/provisto para seguir viaje, mientras la nota conserva la opción más interpretativa.
