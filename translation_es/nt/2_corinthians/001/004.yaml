translation:
  language: es
  text: El que nos consuela[a] en toda nuestra aflicción, para que podamos consolar a los que están en cualquier aflicción, mediante el consuelo con que nosotros mismos somos consolados por Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'anima' ... 'ánimo'; el griego usa la misma familia de palabras a lo largo del versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλῶν
  english_pob_choice: comforts
  chosen_spanish: consuela
  alternatives_spanish:
  - conforta
  - anima
  - consuela y anima
  lexicon: BDAG
  rationale: En este contexto de θλῖψις, el campo semántico de παρακαλέω incluye dar consuelo y aliento fortalecedor. 'Consuela' conserva la calidez pastoral y la repetición léxica con παρακλήσεως/παρακαλούμεθα, sin estrechar el sentido a un mero alivio emocional.
- source_word: ἐπὶ πάσῃ τῇ θλίψει ἡμῶν
  english_pob_choice: in all our affliction
  chosen_spanish: en toda nuestra aflicción
  alternatives_spanish:
  - en todo nuestro sufrimiento
  - en toda nuestra angustia
  - en toda nuestra tribulación
  lexicon: BDAG
  rationale: θλῖψις en Pablo denota aflicción, presión o sufrimiento. 'Aflicción' preserva mejor ese peso que términos más generales como 'problema' o 'angustia'. La preposición se expresa de forma natural en español como 'en toda'.
- source_word: εἰς τὸ δύνασθαι ἡμᾶς
  english_pob_choice: so that we may be able
  chosen_spanish: para que podamos nosotros
  alternatives_spanish:
  - a fin de que podamos
  - para poder nosotros
  - de modo que podamos
  lexicon: BDAG
  rationale: La construcción infinitiva expresa propósito. 'Para que podamos nosotros' mantiene la finalidad y deja visible el énfasis pronominal de ἡμᾶς/αὐτοὶ sin sonar forzado en español.
- source_word: παρακαλεῖν
  english_pob_choice: to comfort
  chosen_spanish: consolar
  alternatives_spanish:
  - confortar
  - animar
  - dar consuelo a
  lexicon: BDAG
  rationale: Se mantiene la familia léxica con παρακαλῶν y παρακλήσεως, pero en español 'consolar' funciona con naturalidad para el sentido de alivio y fortalecimiento en medio del sufrimiento.
- source_word: τοὺς ἐν πάσῃ θλίψει
  english_pob_choice: those in any affliction
  chosen_spanish: a los que están en cualquier aflicción
  alternatives_spanish:
  - a los que padecen cualquier aflicción
  - a todos los que están en aflicción
  - a los que se hallan en cualquier aflicción
  lexicon: BDAG
  rationale: 'El sentido es distributivo: cualquier persona que esté en cualquier clase de aflicción. ''Los que están en cualquier aflicción'' conserva esa amplitud y suena idiomático en español.'
- source_word: παρακλήσεως
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - confort
  - aliento
  - consolación
  lexicon: BDAG
  rationale: '''Consuelo'' mantiene el vínculo léxico con ''consuela'' y con el pasaje anterior, sin perder la idea de alivio fortalecedor que el término griego comunica.'
- source_word: παρακαλούμεθα
  english_pob_choice: are comforted
  chosen_spanish: somos consolados
  alternatives_spanish:
  - recibimos consuelo
  - se nos consuela
  - somos confortados
  lexicon: BDAG
  rationale: El pasivo divino se expresa claramente con 'somos consolados', que comunica tanto la acción recibida como la agencia implícita de Dios en la cláusula final.
- source_word: αὐτοὶ
  english_pob_choice: we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros mismos también
  - nosotros mismos en persona
  - nosotros mismos precisamente
  lexicon: BDAG
  rationale: El pronombre es enfático. 'Nosotros mismos' reproduce esa fuerza sin sobrecargar la frase.
- source_word: ὑπὸ τοῦ θεοῦ
  english_pob_choice: by God
  chosen_spanish: por Dios
  alternatives_spanish:
  - de parte de Dios
  - de Dios
  lexicon: BDAG
  rationale: Con el pasivo, ὑπό marca agencia personal. 'Por Dios' es el equivalente más natural y preciso en español.
theological_decisions:
- issue: Rango semántico de παρακαλέω / παράκλησις en un contexto de aflicción
  english_pob_reading: comfort / comforts / comforted
  chosen_spanish_reading: consuela / consuelo / consolados
  alternative_spanish_readings:
  - anima / ánimo / animados
  - conforta / confort / confortados
  - consola / consolación / consolados
  rationale: La frase está enmarcada por θλῖψις, por lo que el sentido de consuelo fortalecedor es primario. 'Consuela' y 'consuelo' preservan la relación léxica interna del versículo y la carga pastoral del texto, sin reducirlo a simple estímulo emocional.
  doctrine_reference: 2 Corintios 1:3-7; Romanos 12:15
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el expediente auditado en inglés. Se preservó la repetición de la familia παρακαλ- con una solución española consistente ('consuela / consolar / consuelo / consolados'), manteniendo la tensión semántica entre 'comfort' y posibles alternativas como 'encourages' sin neutralizarla.
  spanish_consistency_notes:
  - Se mantuvo 'aflicción' para θλῖψις, coherente con el uso paulino y con el inglés auditado.
  - Se evitó 'SEÑOR' porque el versículo usa θεοῦ y el sujeto agente es explícitamente 'Dios'.
  - La secuencia 'consuela / consolar / consuelo / consolados' preserva la repetición léxica central del versículo.
  - Se eligió un español natural pero reverente, sin depender de formulaciones tradicionales no requeridas por el texto.
