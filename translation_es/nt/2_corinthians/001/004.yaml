    issue: Pronombre explícito innecesario en 'para que podamos nosotros consolar'
    rationale: Aunque ἡμᾶς está presente en la construcción infinitiva, en español ese sujeto ya está codificado en 'podamos'. Mantener 'nosotros' allí suena pesado y desplaza el énfasis, que en el griego se destaca más naturalmente en αὐτοὶ > 'nosotros mismos' al final del versículo.
  - severity: low
