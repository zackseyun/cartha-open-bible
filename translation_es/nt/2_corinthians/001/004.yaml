    rationale: El texto proporcionado comienza en minúscula ('el que nos consuela'). Como texto bíblico corrido en español debe comenzar con mayúscula al inicio de oración.
  revised_spanish_text: El que nos consuela[a] en toda nuestra aflicción, para que podamos consolar a los que están en cualquier aflicción, mediante el consuelo con que nosotros mismos somos consolados por Dios.
  revised_footnotes:
