translation:
  language: es
  text: Porque el Hijo de Dios[a], Jesús Mesías, quien fue proclamado entre ustedes por medio de nosotros—por medio de mí, de Silvano y de Timoteo— no llegó a ser Sí y No; más bien[c][b], en él ha llegado a ser Sí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesucristo».
    reason: lexical_alternative
  - marker: b
    text: O «por nosotros».
    reason: lexical_alternative
  - marker: c
    text: O «no fue “Sí” y “No” ... sino que en él ha sido “Sí”.»
    reason: alternative_reading
lexical_decisions:
- source_word: υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  lexicon: BDAG
  rationale: Conserva la construcción titular y su peso cristológico natural en español, sin añadir ni quitar contenido. El artículo definido ayuda a mantener el valor identificatorio del grupo nominal.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús Cristo
  lexicon: BDAG
  rationale: Aunque Χριστός puede traducirse como «Mesías» cuando funciona claramente como título, aquí la combinación con Ἰησοῦς opera como designación fija y casi nominal. En español, «Jesucristo» es la forma más natural y reverente para esa unidad de nombre, sin perder la referencia al Cristo.
- source_word: κηρυχθείς
  english_pob_choice: was proclaimed
  chosen_spanish: fue proclamado
  alternatives_spanish:
  - fue predicado
  - fue anunciado
  lexicon: BDAG
  rationale: «Proclamado» reproduce el matiz de κηρύσσω como anuncio público y autorizado, más cercano a la imagen de pregón que «predicado», y mantiene transparencia frente al griego.
- source_word: δι’ ἡμῶν
  english_pob_choice: through us
  chosen_spanish: por medio de nosotros
  alternatives_spanish:
  - a través de nosotros
  - por nosotros
  lexicon: BDAG
  rationale: «Por medio de» conserva la mediación instrumental de διά sin volverla causal ni meramente agente. Además prepara bien la especificación que sigue con los nombres propios.
- source_word: δι’ ἐμοῦ καὶ Σιλουανοῦ καὶ Τιμοθέου
  english_pob_choice: through me and Silvanus and Timothy
  chosen_spanish: por medio de mí, de Silvano y de Timoteo
  alternatives_spanish:
  - a través de mí, de Silvano y de Timoteo
  - por mí, Silvano y Timoteo
  lexicon: BDAG
  rationale: Mantiene el mismo valor instrumental de la preposición anterior y refleja con claridad la secuencia paulina de colaboración ministerial. Se conservan los nombres propios en su forma española estándar.
- source_word: οὐκ ἐγένετο Ναὶ καὶ Οὔ
  english_pob_choice: did not become Yes and No
  chosen_spanish: no llegó a ser Sí y No
  alternatives_spanish:
  - no fue Sí y No
  - no se volvió Sí y No
  lexicon: BDAG
  rationale: «Llegó a ser» representa bien ἐγένετο y evita suavizar el verbo hacia una simple cópula. Se deja la expresión «Sí y No» visible para conservar la tensión retórica del texto, sin interpretarla como vacilación o doblez.
- source_word: ἀλλὰ Ναὶ ἐν αὐτῷ γέγονεν
  english_pob_choice: rather, in him it has become Yes
  chosen_spanish: antes bien, en él ha llegado a ser Sí
  alternatives_spanish:
  - más bien, en él ha llegado a ser Sí
  - sino que en él ha llegado a ser Sí
  - antes bien, en él ha sido Sí
  lexicon: BDAG
  rationale: El perfecto γέγονεν se refleja con «ha llegado a ser», que transmite estado resultante y permanencia. «Sí» se mantiene con mayúscula como elemento discursivo repetido por Pablo, y «en él» conserva la localización cristológica del cumplimiento.
theological_decisions:
- issue: Cómo renderizar Χριστός en una combinación casi nominal con Ἰησοῦς
  english_pob_reading: Jesus Christ
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús Cristo
  rationale: La guía del proyecto favorece «Mesías» cuando Χριστός funciona principalmente como título, pero permite una forma fija cuando la expresión es nombre-like. Aquí la secuencia de los nombres y el paralelismo con «el Hijo de Dios» hacen que una designación compacta y estable sea la más fiel y natural en español.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías where title; Christ where name-like'
- issue: Cómo preservar la tensión de Ναί/Οὔ sin resolverla interpretativamente
  english_pob_reading: did not become Yes and No; rather, in him it has become Yes
  chosen_spanish_reading: no llegó a ser Sí y No; antes bien, en él ha llegado a ser Sí
  alternative_spanish_readings:
  - no fue vacilante, sino fiel
  - no fue Sí y No, sino únicamente Sí
  rationale: La frase paulina contrasta inconstancia con cumplimiento en Cristo. La traducción conserva la literalidad discursiva para no borrar la tensión retórica ni convertirla en una paráfrasis doctrinalmente más explicativa de la que el texto exige.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: 'Tomé en cuenta la auditoría inglesa y sus revisiones: mantuve la estructura transparente de διά con «por medio de», conservé la secuencia de nombres propios, y reflejé ἐγένετο / γέγονεν con «llegó a ser» / «ha llegado a ser» para conservar el aspecto verbal y la tensión retórica. También evité resolver Ναί/Οὔ en una paráfrasis interpretativa y preservé la posibilidad documentada de leer Χριστός como título o como forma fija de nombre, explicando por qué en español se eligió Jesucristo.'
  spanish_consistency_notes:
  - Uso «Sí» con mayúscula para reflejar el término discursivo del griego y la práctica auditada en inglés.
  - Conservo «Yahvé» no aplica aquí, pero mantengo la terminología POB de transparencia en el resto de la formulación.
  - 'Los nombres propios se normalizan en español estándar: Silvano y Timoteo.'
  - No se introdujo puntuación teológica ajena al griego; el encuadre con guiones solo ayuda a la legibilidad.
