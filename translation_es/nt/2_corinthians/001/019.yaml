revisions:
- from: Porque el Hijo de Dios[a], Jesucristo, quien fue proclamado entre ustedes por medio de nosotros —por medio de mí, de Silvano y de Timoteo— no llegó a ser Sí y No; antes bien[d][c][b], en él ha llegado a ser Sí.
  to: Porque el Hijo de Dios[a], Jesús Mesías, quien fue proclamado entre ustedes por medio de nosotros—por medio de mí, de Silvano y de Timoteo— no llegó a ser Sí y No; más bien[c][b], en él ha llegado a ser Sí.
  rationale: 'Se corrige el punto principal de alineación doctrinal y léxica: Χριστός debe rendirse aquí como «Mesías» en el texto principal, conforme a la revisión auditada final del POB inglés. Se invierte la nota alternativa correspondiente. También se simplifica la sección final usando «más bien» como conector principal más natural en español contemporáneo y se elimina una nota redundante, mientras se conservan las alternativas significativas ya documentadas.'
