  rationale: Se ajusta κυριεύομεν a «nos enseñoreemos de» para reflejar mejor el sentido de ejercer señorío sobre otros, en paralelo más vivo con «somos colaboradores». También se mejora la fluidez con coma antes de «porque» y se reubica la nota [c] junto a «por la fe», donde corresponde la alternativa «en la fe».
