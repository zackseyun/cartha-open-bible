translation:
  language: es
  text: No es que nos enseñoreemos de su fe[a], sino que somos colaboradores para su gozo[b], porque ustedes están firmes por la fe[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su confianza».
    reason: lexical_alternative
  - marker: b
    text: O «cooperadores para su gozo».
    reason: lexical_alternative
  - marker: c
    text: O «ustedes están firmes en la fe».
    reason: alternative_reading
lexical_decisions:
- source_word: κυριεύομεν
  english_pob_choice: lord it over
  chosen_spanish: ejerzamos dominio sobre
  alternatives_spanish:
  - señoreemos sobre
  - dominemos sobre
  - gobernemos sobre
  lexicon: BDAG
  rationale: El verbo expresa ejercer señorío o control sobre otros. En español, «ejerzamos dominio sobre» comunica la idea de autoridad opresiva sin sonar forzado, y conserva el matiz negativo del griego y del inglés POB.
- source_word: ὑμῶν τῆς πίστεως
  english_pob_choice: your faith
  chosen_spanish: su fe
  alternatives_spanish:
  - su confianza
  - la fe de ustedes
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma idiomática como «su fe». Mantiene el sentido principal de πίστις como fe, sin introducir una glosa innecesaria en el texto principal.
- source_word: συνεργοί
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - compañeros de trabajo
  - cooperadores
  - colegas de trabajo
  lexicon: BDAG
  rationale: El término señala labor conjunta, no autoridad. «Colaboradores» es natural en español bíblico contemporáneo y preserva la relación de cooperación que destaca el contexto.
- source_word: τῆς χαρᾶς ὑμῶν
  english_pob_choice: for your joy
  chosen_spanish: para su gozo
  alternatives_spanish:
  - para el gozo de ustedes
  - por su gozo
  - a favor de su gozo
  lexicon: BDAG
  rationale: Aunque la forma es genitiva, el sentido contextual es finalidad o beneficio. «Para su gozo» expresa esa relación de manera clara y fiel en español.
- source_word: τῇ γὰρ πίστει
  english_pob_choice: by faith
  chosen_spanish: por la fe
  alternatives_spanish:
  - en la fe
  - mediante la fe
  - por medio de la fe
  lexicon: BDAG
  rationale: El dativo funciona aquí como base o medio. «Por la fe» suena natural en español y conserva la fuerza explicativa de γάρ.
- source_word: ἑστήκατε
  english_pob_choice: stand firm
  chosen_spanish: están firmes
  alternatives_spanish:
  - permanecen firmes
  - se mantienen firmes
  - han quedado firmes
  lexicon: BDAG
  rationale: El perfecto comunica una postura estable y resultante. «Están firmes» refleja esa condición estable en español, mientras que la nota preserva la alternativa «en la fe» que también es posible.
theological_decisions:
- issue: Sentido de πίστις en ambos usos
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Siguiendo la pauta del proyecto, πίστις se traduce como «fe» en el texto principal. El contexto trata de la postura creyente de los corintios, no de una abstracción distinta como «fidelidad» ni de una mera «confianza» psicológica.
  doctrine_reference: 'Término controvertido: πίστις → fe; se preservan alternativas en nota'
- issue: Relación de Pablo y sus compañeros con la comunidad
  english_pob_reading: we are fellow workers for your joy
  chosen_spanish_reading: somos colaboradores para su gozo
  alternative_spanish_readings:
  - somos cooperadores para su gozo
  - somos compañeros de trabajo para su gozo
  rationale: La cláusula excluye explícitamente toda pretensión de dominio. «Colaboradores» conserva la cooperación sin diluir la oposición con «ejerzamos dominio sobre».
  doctrine_reference: 'Eclesiología y ministerio: servicio no dominación'
translation_notes:
  revision_awareness: El pasaje muestra alta concordancia con el análisis inglés y no requiere revisión textual adicional. Se respetó la negación de dominio, el valor cooperativo de συνεργοί y la ambigüedad controlada de πίστις, manteniendo una formulación natural en español.
  spanish_consistency_notes:
  - Se usó «fe» de manera consistente para πίστις en el texto principal.
  - Se evitó «SEÑOR» o equivalentes para este versículo porque no aparece κύριος como designación divina aquí.
  - «Colaboradores» conserva el matiz de cooperación y evita suavizar la oposición retórica con el dominio.
  - La nota c se ancla en «firmes» para reflejar la lectura alternativa de ‘en la fe’.
