review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: voluntad negativa, aviso a los destinatarios, referencia a la aflicción en Asia, carga extrema más allá de la capacidad y resultado de desesperar de la vida. Sin embargo, hay un problema de anclaje de notas: la nota [b] habla de «Asia» pero en el texto está colocada sobre «abrumados». Además, «desesperamos» en pretérito simple es menos natural que una construcción de resultado más directa en español para ὥστε ἐξαπορηθῆναι ἡμᾶς.'
  spanish_quality_summary: El español es claro y digno, pero requiere un ajuste menor para corregir la ubicación de la nota cultural y pulir la naturalidad sintáctica. «Pues» es aceptable, aunque «Porque» suena algo más directo para γὰρ. «Acerca de» puede mantenerse, pero «con respecto a» o «en cuanto a» sería más formal; no es un error. «Que nos sobrevino en Asia» es una buena opción idiomática.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos» respeta la decisión documentada para ἀδελφοί. «Aflicción» corresponde bien a θλῖψις. «Asia» debe conservarse con la nota cultural correctamente anclada. No hay términos teológicos sensibles mal resueltos.
  issues:
  - severity: high
    issue: La nota [b] está anclada al término equivocado.
    rationale: La nota [b] explica «Asia», pero en el texto aparece tras «abrumados». Esto incumple la disciplina de notas y crea confusión para el lector.
  - severity: medium
    issue: La construcción «de modo que desesperamos» suena menos natural que una formulación resultativa con infinitivo o perífrasis.
    rationale: ὥστε + infinitivo expresa resultado. En español bíblico natural, «hasta desesperar» o «de modo que llegamos a desesperar» refleja mejor la relación sintáctica y evita un pretérito simple algo brusco.
  revised_spanish_text: Porque no queremos que ignoren[a], hermanos, con respecto a nuestra aflicción que nos sobrevino en Asia[b], que fuimos abrumados excesivamente, más allá de nuestras fuerzas, hasta desesperar incluso de vivir[c].
  revised_footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino ἀδελφοί; en contexto, Pablo probablemente se dirige a la comunidad creyente de manera inclusiva.
    reason: cultural_note
  - marker: b
    text: «Asia» se refiere a la provincia romana en el occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: c
    text: 'O: «incluso de seguir viviendo».'
    reason: lexical_alternative
  revision_rationale: Se corrige el anclaje de la nota sobre «Asia» para que coincida con la palabra explicada, y se ajusta la cláusula de resultado a una forma más natural en español («hasta desesperar»). También se adopta «Porque» y «con respecto a» para un registro algo más fluido y formal, sin alterar el sentido fuente.
