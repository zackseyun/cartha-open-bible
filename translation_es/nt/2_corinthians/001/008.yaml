translation:
  language: es
  text: Porque no queremos que ignoren[a], hermanos, con respecto a nuestra aflicción que nos sobrevino en Asia[b], que fuimos abrumados excesivamente, más allá de nuestras fuerzas, hasta desesperar incluso de vivir[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino ἀδελφοί; en contexto, Pablo probablemente se dirige a la comunidad creyente de manera inclusiva.
    reason: cultural_note
  - marker: b
    text: «Asia» se refiere a la provincia romana en el occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: c
    text: 'O: «incluso de seguir viviendo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλομεν
  english_pob_choice: we do not want
  chosen_spanish: no queremos
  alternatives_spanish:
  - no deseamos
  - no quisiéramos
  lexicon: BDAG
  rationale: Expresa de forma natural la voluntad negativa presente sin cargar el texto con una perífrasis extraña en español.
- source_word: ἀγνοεῖν
  english_pob_choice: to be unaware
  chosen_spanish: ignoren
  alternatives_spanish:
  - no sepan
  - estén ignorantes
  lexicon: BDAG
  rationale: En español, «ignoren» comunica la idea de no estar enterados sin el tono despectivo que puede tener «ser ignorantes».
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Conserva la forma masculina plural del griego y, en contexto epistolar cristiano, puede abarcar a la comunidad como grupo representativo.
- source_word: θλίψεως
  english_pob_choice: affliction
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - angustia
  - aflicción
  lexicon: BDAG
  rationale: «Aflicción» preserva la gravedad de θλῖψις y funciona bien en registro bíblico actual.
- source_word: γενομένης ἐν τῇ Ἀσίᾳ
  english_pob_choice: that happened in Asia
  chosen_spanish: que nos sobrevino en Asia
  alternatives_spanish:
  - que ocurrió en Asia
  - que sucedió en Asia
  - que tuvo lugar en Asia
  lexicon: BDAG
  rationale: El participio puede expresarse de manera más natural como algo que «sobrevino» a Pablo y sus compañeros, sin perder la localización en Asia.
- source_word: καθ’ ὑπερβολὴν
  english_pob_choice: excessively
  chosen_spanish: excesivamente
  alternatives_spanish:
  - sobremanera
  - más allá de toda medida
  - en extremo
  lexicon: BDAG
  rationale: «Excesivamente» reproduce bien la idea intensificadora de medida sobrepasada; es formal y transparente.
- source_word: ὑπὲρ δύναμιν
  english_pob_choice: beyond our strength
  chosen_spanish: más allá de nuestras fuerzas
  alternatives_spanish:
  - más allá de nuestra fuerza
  - por encima de nuestra capacidad
  - superando nuestras fuerzas
  lexicon: BDAG
  rationale: «Fuerzas» mantiene la metáfora de capacidad/energía y suena natural en español, sin suavizar el límite expresado por el griego.
- source_word: ἐβαρήθημεν
  english_pob_choice: we were burdened
  chosen_spanish: fuimos abrumados
  alternatives_spanish:
  - fuimos cargados
  - fuimos agobiados
  - fuimos oprimidos
  lexicon: BDAG
  rationale: «Abrumados» conserva la imagen de peso opresivo del pasivo y encaja con el registro de la frase completa.
- source_word: ὥστε ἐξαπορηθῆναι ἡμᾶς
  english_pob_choice: so that we despaired
  chosen_spanish: de modo que desesperamos
  alternatives_spanish:
  - hasta el punto de desesperar
  - de forma que llegamos a desesperar
  - de suerte que desesperamos
  lexicon: BDAG
  rationale: La construcción de resultado se vierte con una fórmula clara y solemne; «desesperamos» mantiene el fuerte peso existencial del verbo.
- source_word: καὶ τοῦ ζῆν
  english_pob_choice: even of life
  chosen_spanish: incluso de vivir
  alternatives_spanish:
  - hasta de vivir
  - incluso de la vida
  - de seguir viviendo
  lexicon: BDAG
  rationale: «Incluso de vivir» conserva el paralelo del griego y deja abierta la tensión entre vida como existencia y vivir como acto continuado.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en una carta apostólica
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se retiene el término masculino plural del original en el texto principal, sin expandirlo, y se deja que el contexto eclesial indique el posible alcance inclusivo.
  doctrine_reference: Fidelidad morfosintáctica al género gramatical del original
- issue: La descripción del sufrimiento apostólico como experiencia extrema
  english_pob_reading: we were burdened excessively, beyond our strength
  chosen_spanish_reading: fuimos abrumados excesivamente, más allá de nuestras fuerzas
  alternative_spanish_readings:
  - fuimos sobrecargados
  - fuimos oprimidos en extremo, más allá de nuestras fuerzas
  rationale: El español conserva la acumulación retórica de exceso y límite, sin atenuar la fuerza del pasaje ni convertirlo en una paráfrasis explicativa.
  doctrine_reference: Sufrimiento apostólico y lenguaje de experiencia límite
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que prefirió un registro más formal para la relación semántica de ὑπέρ/περί y mantuvo la intensificación de exceso; en español se reflejó con «acerca de», «excesivamente» y la nota cultural sobre Asia, preservando la tensión de «más allá de nuestras fuerzas» y la culminación existencial «incluso de vivir».
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» fuera de este versículo porque no aparece el nombre divino en el texto fuente.
  - Se evitó «Cristo» porque no hay Χριστός en el verso.
  - Se conservó una sintaxis sobria y epistolar, con puntuación española y ritmo próximo al griego sin calco rígido.
  - Las notas se anclan exactamente en los marcadores presentes en el texto para cumplir la trazabilidad editorial.
