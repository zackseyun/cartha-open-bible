revisions:
- from: Pues no queremos que ignoren[a], hermanos, acerca de nuestra aflicción que nos sobrevino en Asia, que fuimos abrumados[b] excesivamente, más allá de nuestras fuerzas, de modo que desesperamos incluso de vivir[c].
  to: Porque no queremos que ignoren[a], hermanos, con respecto a nuestra aflicción que nos sobrevino en Asia[b], que fuimos abrumados excesivamente, más allá de nuestras fuerzas, hasta desesperar incluso de vivir[c].
  rationale: Se corrige el anclaje de la nota sobre «Asia» para que coincida con la palabra explicada, y se ajusta la cláusula de resultado a una forma más natural en español («hasta desesperar»). También se adopta «Porque» y «con respecto a» para un registro algo más fluido y formal, sin alterar el sentido fuente.
