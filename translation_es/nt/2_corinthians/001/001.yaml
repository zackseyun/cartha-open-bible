translation:
  language: es
  text: 'Pablo[a], apóstol de Mesías Jesús por la voluntad de Dios, y Timoteo el hermano[b], a la iglesia de Dios que está en Corinto, junto con todos los santos que están en toda Acaya:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, Cristo Jesús.
    reason: alternative_reading
  - marker: b
    text: O, «Timoteo, nuestro hermano».
    reason: previous_rendering
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: nombre propio bíblico
  rationale: Se usa la forma española usual del nombre propio. No requiere transliteración más cercana al griego porque el nombre ya tiene forma establecida en español.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: «Apóstol» conserva el valor técnico de oficio/comisión apostólica que la salutación establece; «mensajero» o «enviado» debilitarían ese peso.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG / DOCTRINE.md
  rationale: Se mantiene «Mesías» para Χριστός según la decisión doctrinal del proyecto cuando el término funciona como título. En español, el orden «Mesías Jesús» refleja la fórmula inglesa y deja visible la lectura titular.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - por medio de la voluntad de Dios
  - a través de la voluntad de Dios
  lexicon: BDAG
  rationale: «Por la voluntad de Dios» expresa bien la agencia divina en esta fórmula de comisión y suena natural en español sin introducir un matiz instrumental innecesario.
- source_word: ὁ ἀδελφός
  english_pob_choice: the brother / our brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - nuestro hermano
  - hermano
  lexicon: BDAG
  rationale: El griego lleva artículo y no pronombre posesivo; «el hermano» conserva esa literalidad. Se evita añadir «nuestro» porque el texto no lo dice, aunque en español suene más relacional.
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: «Iglesia» es la forma natural y eclesialmente clara en este saludo paulino. «Asamblea» sería más formalmente literal, pero menos idiomática aquí.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santas personas
  - santos y santas
  lexicon: BDAG
  rationale: «Santos» comunica la identidad del pueblo apartado para Dios con el mismo alcance técnico que «saints» en Pablo. «Santos y santas» añadiría explicitación no presente.
- source_word: σὺν
  english_pob_choice: together with
  chosen_spanish: junto con
  alternatives_spanish:
  - con
  lexicon: BDAG
  rationale: «Junto con» conserva el sentido inclusivo de σύν y resulta natural en una fórmula de saludo colectiva.
- source_word: ἐν ὅλῃ τῇ Ἀχαΐᾳ
  english_pob_choice: in all Achaia
  chosen_spanish: en toda Acaya
  alternatives_spanish:
  - por toda Acaya
  lexicon: BDAG
  rationale: «En toda Acaya» sigue de cerca la estructura griega y expresa el alcance regional. «Por toda Acaya» sería un poco más idiomático pero menos ceñido al texto.
theological_decisions:
- issue: Χριστός como título en la salutación
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: Se conserva la distinción titular de Χριστός y se evita convertirlo en un simple nombre litúrgico. La opción alternativa tradicional se deja documentada para mostrar la tensión entre uso eclesial común y la política del proyecto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego SBLGNT y toma en cuenta el historial inglés: la lectura alternativa de Χριστός/Christ fue revertida en la auditoría doctrinal, por lo que se restituye «Mesías» en español. También se reconoce que la fórmula sobre Timoteo tuvo una revisión desde la literalidad («el hermano») hacia una redacción más idiomática en inglés; en español se mantiene la literalidad transparente y se documenta la alternativa.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en línea con la terminología del proyecto.
  - Se conserva «Dios» sin mayúscula reverencial adicional fuera del uso normal español.
  - Se mantiene «iglesia» para ἐκκλησία en contexto paulino.
  - «Santos» se traduce de forma técnica y no como una simple descripción moral.
  - La puntuación de saludo reproduce el cierre enumerativo del griego con dos puntos finales.
