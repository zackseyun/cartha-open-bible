translation:
  language: es
  text: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor[a] Jesús Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Señor» también puede traducirse «Maestro» en algunos contextos.
    reason: lexical_alternative
  - marker: b
    text: O, tradicionalmente, «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  - gracia
  lexicon: BDAG
  rationale: Se conserva el saludo paulino establecido y su peso teológico; «gracia» es el equivalente natural en español y mantiene la misma amplitud semántica que el inglés POB.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario en saludo epistolar se expresa con naturalidad en español con «a ustedes», sin perder el valor direccional del original.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  - paz
  lexicon: BDAG
  rationale: «Paz» conserva el registro bíblico y la fórmula paulina, igual que el inglés POB, y es la opción idiomática más clara.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - procedente de
  lexicon: BDAG
  rationale: En español, «de parte de» comunica mejor el origen epistolar y relacional del saludo que un simple «de».
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - nuestro Dios y Padre
  lexicon: BDAG
  rationale: La cadena genitiva se vierte de forma compacta y natural; «nuestro Padre» preserva la relación posesiva sin introducir una estructura más pesada.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  - Señor
  lexicon: BDAG
  rationale: Aunque la política inglesa usa «Lord», en español «Señor» es el equivalente estándar para κύριος en contexto cristológico y preserva el tono litúrgico y bíblico.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme a la política del proyecto de traducir el título; «Jesús Mesías» conserva la transparencia titular en español mejor que una transliteración tradicionalizada.
theological_decisions:
- issue: Rendering of Χριστοῦ as a title rather than a name-form
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: El texto griego usa Χριστός en forma genitiva dentro de una fórmula cristológica; traducirlo como «Mesías» preserva su valor titular y no lo reduce a un mero apellido religioso.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Rendering of κύριος with christological force
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Maestro
  rationale: En la bendición paulina, κύριος funciona como título de Jesús junto a «Dios nuestro Padre». «Señor» es el equivalente más natural y doctrinalmente estable en español.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for κύριος'
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una corrección de «Christ» a «Messiah» para restaurar la política del proyecto sobre Χριστός. La versión española sigue esa decisión y evita la transliteración tradicionalizada «Cristo» en el cuerpo principal, manteniendo la transparencia titular. También se adapta el saludo a la sintaxis natural del español con «de parte de» y «a ustedes» sin alterar el contenido del griego.
  spanish_consistency_notes:
  - Se mantiene la correspondencia terminológica de κύριος → «Señor» y Χριστός → «Mesías» en este versículo.
  - Se usa «Dios nuestro Padre» como equivalente compacto de θεοῦ πατρὸς ἡμῶν, sin añadir puntuación explicativa innecesaria.
  - El saludo completo conserva la estructura paulina de gracia + paz + fuente divina, con registro bíblico y legible para publicación.
