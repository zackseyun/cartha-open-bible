lexical_decisions:
- source_word: Εὐλογητὸς
  english_pob_choice: Blessed be
  chosen_spanish: Bendito sea
  alternatives_spanish:
  - Bendito
  - Alabado sea
  lexicon: BDAG
  rationale: En una fórmula doxológica, «Bendito sea» conserva el valor exhortativo/declarativo del griego y suena natural en español bíblico sin perder dignidad.
- source_word: θεὸς καὶ πατὴρ
  english_pob_choice: the God and Father
  chosen_spanish: el Dios y Padre
  alternatives_spanish:
  - Dios y Padre
  - el Dios, Padre
  lexicon: BDAG
  rationale: El artículo rige la expresión conjunta; en español, «el Dios y Padre» refleja mejor la relación única y formulística que dos referentes separados.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico habitual en el NT; «Señor» comunica esa lectura de manera estable en español.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός según la pauta del proyecto; en español «Mesías» hace visible el título sin convertirlo en mero nombre propio.
- source_word: οἰκτιρμῶν
  english_pob_choice: mercies
  chosen_spanish: misericordias
  alternatives_spanish:
  - compasiones
  - actos de misericordia
  lexicon: BDAG
  rationale: El plural griego se conserva con un plural natural en español; «misericordias» expresa la abundancia de los actos compasivos de Dios y permite una lectura doxológica fluida.
- source_word: παρακλήσεως
  english_pob_choice: comfort
  chosen_spanish: consuelo
  alternatives_spanish:
  - consuelo y aliento
  - consolación
  - ánimo
  lexicon: BDAG
  rationale: En este contexto de aflicción y alivio divino, «consuelo» es la opción más natural y amplia en español; mantiene la red semántica de confort/encouragement/consolation sin sobreexplicar.
theological_decisions:
- issue: Título cristológico Χριστός en la fórmula «Ἰησοῦ Χριστοῦ»
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: Se preserva la traducción del título, no una simple transcripción litúrgica, para hacer explícito el sentido mesiánico del término conforme a la pauta doctrinal del proyecto.
  doctrine_reference: Χριστός → Mesías cuando funciona como título
- issue: Fórmula doxológica de apertura «Εὐλογητὸς ὁ θεός»
  english_pob_reading: Blessed be the God
  chosen_spanish_reading: Bendito sea el Dios
  alternative_spanish_readings:
  - Bendito es el Dios
  - Alabado sea el Dios
  rationale: El español requiere una construcción natural para una bendición dirigida a Dios; «Bendito sea» conserva el tono litúrgico sin forzar el orden griego.
  doctrine_reference: Formulas de bendición/doxología en el NT
translation_notes:
  revision_awareness: La historia de revisión en inglés muestra una oscilación entre «Jesus Christ» y «Jesus Messiah», con restauración final de «Messiah» por política doctrinal. Por eso el español mantiene «Mesías» en el texto principal y deja constancia de la alternativa «Jesús Cristo» en nota, sin colapsar el título en un nombre propio.
  spanish_consistency_notes:
  - Se emplea «Mesías» para Χριστός en coherencia con la política del proyecto.
  - Se evita «SEÑOR» como máscara tipográfica; el texto usa «Señor» en español natural.
  - Se conserva el plural de οἰκτιρμῶν con «misericordias».
  - «Consuelo» mantiene la amplitud semántica de παρακλήσεως sin perder claridad.
  - La puntuación sigue el registro bíblico en español con coma antes de la segunda cláusula nominal.
