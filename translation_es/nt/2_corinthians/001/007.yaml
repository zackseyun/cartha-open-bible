translation:
  language: es
  text: Y nuestra esperanza respecto de ustedes es firme, pues sabemos que, así como son partícipes de los sufrimientos, así también del consuelo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aliento» para παράκλησις.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - confianza
  lexicon: BDAG
  rationale: «Esperanza» es el equivalente natural y transparente en español para ἐλπίς; conserva la idea de expectativa confiada sin añadir matices que el texto no exige.
- source_word: βεβαία
  english_pob_choice: firm
  chosen_spanish: firme
  alternatives_spanish:
  - segura
  - constante
  - estable
  lexicon: BDAG
  rationale: «Firme» comunica en español la solidez y confiabilidad de la esperanza de Pablo, con naturalidad moderna y sin exagerar el adjetivo.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - por ustedes
  - en favor de ustedes
  - para ustedes
  lexicon: BDAG
  rationale: En este contexto ὑπέρ con genitivo expresa referencia respecto de los corintios; «acerca de ustedes» evita una lectura causal o utilitaria no necesaria en español y mantiene la orientación hacia ellos.
- source_word: εἰδότες
  english_pob_choice: because we know
  chosen_spanish: pues sabemos
  alternatives_spanish:
  - porque sabemos
  - sabiendo
  lexicon: BDAG
  rationale: El participio introduce la base de la afirmación anterior; «pues sabemos» reproduce bien la relación causal-explicativa en un español fluido y digno.
- source_word: ὡς ... οὕτως καί
  english_pob_choice: just as ... so also
  chosen_spanish: así como ... así también
  alternatives_spanish:
  - como ... así también
  - del mismo modo que ... también
  lexicon: BDAG
  rationale: La correlación se conserva con una construcción natural en español que refleja el paralelismo del griego sin perder solemnidad.
- source_word: κοινωνοί
  english_pob_choice: share
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - compañeros
  - socios
  lexicon: BDAG
  rationale: El sustantivo expresa participación real. «Partícipes» conserva ese valor con buena resonancia bíblica en español y evita reducirlo a una mera metáfora de compañía.
- source_word: παθημάτων
  english_pob_choice: sufferings
  chosen_spanish: los sufrimientos
  alternatives_spanish:
  - las aflicciones
  - los padecimientos
  lexicon: BDAG
  rationale: «Los sufrimientos» es la forma más directa y amplia para πάθημα, manteniendo el plural y el peso experiencial del término paulino.
- source_word: παρακλήσεως
  english_pob_choice: comfort
  chosen_spanish: el consuelo
  alternatives_spanish:
  - la consolación
  - el alivio
  - el ánimo
  lexicon: BDAG
  rationale: En 2 Corintios 1, παράκλησις forma un campo semántico de consuelo y aliento; «consuelo» preserva la continuidad temática y suena natural en español. Se evita fijar «consolación» como única opción, aunque sigue siendo posible en otros contextos.
- source_word: '[ellipsis after παρακλήσεως]'
  english_pob_choice: you share in
  chosen_spanish: son partícipes de
  alternatives_spanish:
  - comparten
  - participan de
  - son copartícipes de
  lexicon: BDAG
  rationale: El griego elide el verbo en la segunda mitad; en español se completa de modo sobrio con «son partícipes de» para sostener el paralelismo sin añadir contenido nuevo.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego y el audit trail inglés: mantiene la estructura correlativa, conserva la idea de participación compartida en sufrimientos y consuelo, y usa una solución española natural para la elipsis del segundo hemistiquio. No se detectaron revisiones adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se preservó el tono paulino solemne con vocabulario claro y eclesialmente inteligible.
  - Se evitó «SEÑOR» u otras sustituciones innecesarias, ya que no hay aquí un término divino a enmascarar.
  - «Consuelo» mantiene la coherencia temática con παράκλησις en el contexto inmediato de 2 Corintios 1.
  - La elipsis del segundo miembro se resolvió con una repetición española mínima para que la frase sea publicable y natural.
