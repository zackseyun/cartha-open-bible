translation:
  language: es
  text: Y con esta confianza tenía la intención de ir primero[a] a ustedes, para que tuvieran un segundo beneficio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ir antes a ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «una segunda gracia» o «un segundo favor».
    reason: lexical_alternative
lexical_decisions:
- source_word: πεποιθήσει
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - seguridad
  - segura convicción
  lexicon: BDAG
  rationale: πεποίθησις expresa confianza o seguridad. «Confianza» es natural en español moderno y conserva el sentido de base interior sobre la cual Pablo actuaba.
- source_word: ἐβουλόμην
  english_pob_choice: intended
  chosen_spanish: quería
  alternatives_spanish:
  - me proponía
  - pensaba ir
  lexicon: BDAG
  rationale: βούλομαι comunica voluntad o intención. «Quería» refleja esa intención en español de forma natural sin convertirla en una promesa formal más fuerte de lo que exige el griego.
- source_word: πρότερον πρὸς ὑμᾶς ἐλθεῖν
  english_pob_choice: to come to you first
  chosen_spanish: ir antes a ustedes
  alternatives_spanish:
  - venir primero a ustedes
  - ir primero a ustedes
  lexicon: BDAG
  rationale: La construcción expresa prioridad temporal en el viaje. En español, «ir antes a ustedes» conserva esa secuencia de manera clara y idiomática; se evita «venir» porque desde la perspectiva de Pablo el movimiento es de ida.
- source_word: δευτέραν χάριν
  english_pob_choice: a second benefit
  chosen_spanish: una segunda gracia
  alternatives_spanish:
  - un segundo beneficio
  - un segundo favor
  lexicon: BDAG
  rationale: 'χάρις aquí tiene una tensión lexical importante: el contexto de viaje favorece una idea de beneficio recibido, pero el término sigue siendo χάρις y no conviene ocultarlo. Por eso se mantiene «gracia» en el texto principal, con nota alternativa para «beneficio» o «favor».'
- source_word: σχῆτε
  english_pob_choice: you might have
  chosen_spanish: tuvieran
  alternatives_spanish:
  - recibieran
  - tuvieran de
  lexicon: BDAG
  rationale: ἔχω aquí funciona idiomáticamente como «tener/recibir». En español, «tuvieran» suena natural y mantiene la estructura del griego, mientras la nota aclara la alternativa semántica de beneficio/recibo.
theological_decisions:
- issue: Sentido de χάρις en un contexto no soteriológico
  english_pob_reading: a second benefit
  chosen_spanish_reading: una segunda gracia
  alternative_spanish_readings:
  - un segundo beneficio
  - un segundo favor
  rationale: El contexto no trata de la gracia salvadora sino del provecho que los corintios recibirían por otra visita de Pablo. Sin embargo, dado que el sustantivo griego es χάρις y la tradición POB quiere dejar visible la tensión lexical, el texto principal conserva «gracia» y la nota ofrece el sentido contextual de beneficio/favor.
  doctrine_reference: Gracia / favor; uso contextual de χάρις en Pablo
- issue: Relación entre la intención de Pablo y el resultado para los corintios
  english_pob_reading: I intended to come to you first, so that you might have a second benefit
  chosen_spanish_reading: quería ir antes a ustedes, para que tuvieran una segunda gracia
  alternative_spanish_readings:
  - me proponía ir primero a ustedes, para que recibieran un segundo beneficio
  - quería venir primero a ustedes, para que tuvieran un segundo favor
  rationale: El verso presenta el propósito de Pablo y el efecto esperado para los destinatarios. «Para que tuvieran» conserva la finalidad expresada por ἵνα sin añadir una interpretación más fuerte que el texto.
  doctrine_reference: Intención apostólica y beneficio comunitario
translation_notes:
  revision_awareness: El inglés audit trail revisó una paráfrasis dinámica («benefit a second time») y volvió a una forma más directa («have a second benefit»). Por eso el español evita verbalizar χάρις como acción («beneficiaran de nuevo») y mantiene un sintagma nominal ligado al término griego, con alternativa contextual en nota.
  spanish_consistency_notes:
  - Se usa «gracia» para χάρις en el texto principal para mantener la señal lexical, pero se explicita el sentido contextual en la nota.
  - Se mantiene «ustedes» por español latinoamericano neutral y por claridad pastoral.
  - No se introduce vocabulario eclesiástico tradicional ajeno al griego; la redacción sigue una equivalencia óptima sin perder la tensión entre forma y sentido.
