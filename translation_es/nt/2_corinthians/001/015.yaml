review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien πεποιθήσει como «confianza» y ἐβουλόμην como intención no formal. Sin embargo, «una segunda gracia» no representa adecuadamente el sentido contextual de δευτέραν χάριν en este pasaje de viajes; el expediente inglés ya determinó que aquí significa «segundo beneficio/favor», no la noción teológica habitual de «gracia». Además, πρότερον se expresa mejor como «primero» que «antes» para conservar la prioridad secuencial del plan de viaje.
  spanish_quality_summary: El español es claro y legible, pero «quería ir antes a ustedes» suena algo menos natural y preciso que «tenía la intención de ir primero a ustedes». «Una segunda gracia» resulta poco idiomático y puede inducir una lectura doctrinal equivocada en español eclesial. Una pequeña revisión mejora fidelidad y claridad.
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. La decisión problemática es χάρις: aunque normalmente se traduce «gracia», aquí el propio análisis POB documenta el sentido contextual «beneficio/favor». En español conviene seguir esa decisión en el texto principal y conservar «gracia» como alternativa en nota, no al revés.'
  issues:
  - severity: high
    issue: «una segunda gracia» para δευτέραν χάριν
    rationale: En este contexto de visitas apostólicas, χάρις significa beneficio/favor recibido por la visita. «Gracia» en español activa fuertemente un sentido teológico no pretendido y contradice la decisión léxica principal del POB auditado.
  - severity: medium
    issue: «ir antes a ustedes» para πρότερον πρὸς ὑμᾶς ἐλθεῖν
    rationale: No es incorrecto, pero «primero a ustedes» refleja mejor la prioridad secuencial del itinerario y suena más natural en este contexto.
  - severity: low
    issue: «quería» para ἐβουλόμην
    rationale: Es defendible, pero «tenía la intención de» o «me proponía» comunica mejor la idea de intención deliberada sin sonar meramente desiderativo.
  revised_spanish_text: Y con esta confianza tenía la intención de ir primero[a] a ustedes, para que tuvieran un segundo beneficio[b],
  revised_footnotes:
  - marker: a
    text: O «ir antes a ustedes».
    reason: lexical_alternative
  - marker: b
    text: O «una segunda gracia» o «un segundo favor».
    reason: lexical_alternative
  revision_rationale: Se ajusta χάρις al sentido contextual documentado por el POB («beneficio/favor») para evitar una lectura teológica engañosa de «gracia» en español. También se mejora πρότερον con «primero» y ἐβουλόμην con una expresión de intención más precisa y natural.
