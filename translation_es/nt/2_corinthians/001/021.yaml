translation:
  language: es
  text: Pero el que nos afirma junto con ustedes en el Mesías[a], y nos ungió, es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo». El título griego es Christos; aquí se ha rendido como «Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: βεβαιῶν
  english_pob_choice: establishes
  chosen_spanish: confirma
  alternatives_spanish:
  - establece
  - hace firmes
  - fortalece
  lexicon: BDAG
  rationale: βεβαιόω expresa hacer firme, confirmar o asegurar. En español, «confirma» comunica bien la idea de dar estabilidad o certeza sin sonar demasiado abstracto; también conserva el valor aspectual del participio presente.
- source_word: ἡμᾶς σὺν ὑμῖν
  english_pob_choice: with you
  chosen_spanish: junto con ustedes
  alternatives_spanish:
  - con ustedes
  - al mismo tiempo que ustedes
  lexicon: BDAG
  rationale: La expresión subraya participación compartida de Pablo y los corintios. «Junto con ustedes» conserva ese matiz colectivo de forma natural en español.
- source_word: εἰς Χριστόν
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  - hacia el Mesías
  lexicon: BDAG
  rationale: εἰς puede sugerir incorporación relacional, no solo dirección espacial. Se mantiene el sentido incorporativo con «en», y Χριστός se rinde como «Mesías» conforme al criterio del proyecto para el título.
- source_word: χρίσας
  english_pob_choice: anointed
  chosen_spanish: ungió
  alternatives_spanish:
  - consagró
  - unció
  lexicon: BDAG
  rationale: χρίω se refiere a ungir con un trasfondo de investidura o consagración. «Ungió» conserva la conexión léxica con el acto de ungir sin restringirlo a un rito técnico específico.
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: 'El predicado final del griego se expresa de manera directa en español: «es Dios». Mantiene el énfasis de cierre del original.'
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque el proyecto prefiere este término para Χριστός cuando funciona como título, preservando su sentido hebraico y titular.
theological_decisions:
- issue: Sentido de εἰς Χριστόν
  english_pob_reading: relational/incorporative sense rendered as 'in Messiah'
  chosen_spanish_reading: 'sentido relacional e incorporativo: «en el Mesías»'
  alternative_spanish_readings:
  - «en Cristo»
  - «hacia el Mesías»
  - «dentro del Mesías»
  rationale: En este contexto paulino, εἰς no exige una traducción direccional literal. «En el Mesías» conserva la idea de unión o incorporación relacional sin eliminar la tensión semántica del griego.
  doctrine_reference: Optimal equivalence; preservar la tensión exegética sin sobreexplicarla
translation_notes:
  revision_awareness: La versión inglesa más reciente alternó entre «Messiah» y «Christ» por coherencia idiomática, pero el registro de auditoría restablece «Messiah» por la política doctrinal del proyecto. La traducción española sigue esa decisión y evita «Cristo» como forma por defecto.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en armonía con la política del proyecto.
  - «Junto con ustedes» conserva la participación compartida implícita en σὺν ὑμῖν.
  - 'El orden de la cláusula final sigue el énfasis del griego: «es Dios».'
  - Se evita una traducción mecánica de εἰς como dirección física para preservar el sentido paulino de incorporación.
