revisions:
- from: Pero el que nos confirma[a] junto con ustedes en el Mesías, y el que nos ungió, es Dios.
  to: Pero el que nos afirma junto con ustedes en el Mesías[a], y nos ungió, es Dios.
  rationale: Se reubica la nota al término correcto («Mesías»), se ajusta βεβαιῶν a «afirma» para reflejar mejor el sentido de hacer firmes/establecer, y se aligera la coordinación final para un español más natural sin alterar el significado.
