translation:
  language: es
  text: Así que, cuando me propuse esto[a], ¿acaso actué con ligereza? ¿O lo que decido[b], lo decido según la carne[c], para que en mi caso haya tanto el “Sí, sí” como el “No, no”?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: “cuando intenté esto” o “cuando tenía la intención de esto”.'
    reason: lexical_alternative
  - marker: b
    text: ‘Decido’ traduce el valor deliberativo de βουλεύομαι; también puede entenderse como “me propongo” o “delibero”.
    reason: lexical_alternative
  - marker: c
    text: Es decir, según criterios meramente humanos o mundanos.
    reason: theological_note
lexical_decisions:
- source_word: βουλόμενος
  english_pob_choice: intended
  chosen_spanish: quise / cuando quise esto
  alternatives_spanish:
  - cuando me propuse esto
  - cuando intenté esto
  - cuando lo deseé
  lexicon: BDAG
  rationale: El participio expresa una intención o propósito previo en el contexto del cambio de planes de Pablo. ‘Cuando quise esto’ mantiene la idea deliberativa sin introducir una formulación demasiado técnica o pesada en español.
- source_word: τῇ ἐλαφρίᾳ
  english_pob_choice: lightly
  chosen_spanish: con ligereza
  alternatives_spanish:
  - con frivolidad
  - con inconstancia
  - con volubilidad
  lexicon: BDAG
  rationale: La construcción apunta a la acusación de inconsistencia o falta de seriedad. ‘Con ligereza’ suena natural en español y conserva el matiz de conducta liviana o inestable. Otras opciones son posibles, pero más marcadas o menos transparentes.
- source_word: ἐχρησάμην
  english_pob_choice: was I acting
  chosen_spanish: actué
  alternatives_spanish:
  - me conduje
  - procedí
  - hice uso de ello
  lexicon: BDAG
  rationale: Con el dativo τῇ ἐλαφρίᾳ, el verbo comunica conducta o proceder bajo esa cualidad. ‘Actué’ resume bien el valor idiomático en español y encaja en la pregunta retórica.
- source_word: ἃ βουλεύομαι ... βουλεύομαι
  english_pob_choice: do I plan what I plan
  chosen_spanish: lo que decido, lo decido
  alternatives_spanish:
  - lo que planifico, lo planifico
  - lo que me propongo, me lo propongo
  - lo que determino, lo determino
  lexicon: BDAG
  rationale: La repetición en griego es enfática. En español, ‘lo que decido, lo decido’ conserva esa insistencia sin sonar artificial. ‘Decidir’ aquí recoge la noción de deliberar/planear con suficiente amplitud.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - de manera puramente humana
  - según criterios humanos
  - en un sentido mundano
  lexicon: BDAG
  rationale: Se preserva ‘carne’ para respetar el término paulino y no aplanar su carga teológica. Las alternativas interpretativas ayudan a entender el sentido, pero el texto principal conserva la formulación del original.
- source_word: τὸ Ναὶ ναὶ καὶ τὸ Οὒ οὔ
  english_pob_choice: both “Yes, yes” and “No, no”
  chosen_spanish: el “Sí, sí” y el “No, no”
  alternatives_spanish:
  - un “Sí” y un “No” a la vez
  - Sí y no
  - el sí y el no
  lexicon: BDAG
  rationale: Se mantiene la repetición enfática de las palabras afirmativa y negativa, porque forma parte de la acusación retórica. En español, la duplicación suena natural y reproduce el énfasis del griego.
- source_word: παρ’ ἐμοὶ
  english_pob_choice: with me there should be
  chosen_spanish: en mí haya
  alternatives_spanish:
  - conmigo haya
  - en mi caso haya
  - para mí haya
  lexicon: BDAG
  rationale: ‘παρ’ ἐμοὶ’ expresa lo que caracteriza la conducta de Pablo o lo que se encuentra en él. ‘En mí haya’ refleja bien esa idea en español y conserva el giro relacional sin forzar una equivalencia mecánica.
theological_decisions:
- issue: Renderización de σάρξ en la expresión κατὰ σάρκα
  english_pob_reading: according to the flesh
  chosen_spanish_reading: según la carne
  alternative_spanish_readings:
  - según criterios humanos
  - de forma meramente humana
  - en un sentido mundano
  rationale: En Pablo, σάρξ es un término doctrinal importante. Mantener ‘carne’ preserva la textura teológica y deja abierta la interpretación contextual, en lugar de sustituirla por una explicación que cerraría el sentido.
  doctrine_reference: 'Contested terms table: σάρξ (sarx)'
- issue: Fuerza retórica de la pregunta sobre la consistencia del hablar de Pablo
  english_pob_reading: so that with me there should be both “Yes, yes” and “No, no”?
  chosen_spanish_reading: para que en mí haya el “Sí, sí” y el “No, no”?
  alternative_spanish_readings:
  - para que conmigo haya tanto “Sí, sí” como “No, no”?
  - para que en mí estén a la vez el “Sí” y el “No”?
  rationale: La pregunta no afirma una doctrina, sino que rechaza la acusación de duplicidad. La versión española conserva esa tensión retórica sin suavizarla demasiado ni convertirla en una simple explicación.
  doctrine_reference: Rhetorical integrity of apostolic speech in the immediate context
translation_notes:
  revision_awareness: Tomé en cuenta la revisión inglesa más reciente, que preserva la relación de παρ’ ἐμοὶ ᾖ con un giro idiomático. Por eso elegí una formulación española que exprese la misma relación de pertenencia o caracterización sin volverla pesada. También conservé la repetición enfática de “Sí, sí” y “No, no”, y mantuve la carga de σάρξ con ‘carne’ en el texto principal.
  spanish_consistency_notes:
  - Usé ‘carne’ para σάρξ, conforme al uso paulino estándar del proyecto, y no la sustituí por ‘naturaleza humana’.
  - Mantuvе la duplicación ‘Sí, sí’ / ‘No, no’ para reflejar el énfasis del griego.
  - Elegí un español neutro y publicable, evitando un calco excesivo de la sintaxis inglesa.
  - La forma ‘en mí haya’ busca reflejar el valor relacional de παρ’ ἐμοὶ sin sonar arcaizante.
