translation:
  language: es
  text: Pero nosotros mismos teníamos dentro de nosotros la sentencia de muerte[a], para que no confiáramos en nosotros mismos, sino en Dios, que resucita a los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el veredicto de muerte».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: Indeed
  chosen_spanish: En verdad
  alternatives_spanish:
  - Pero
  - Al contrario
  lexicon: no inventar
  rationale: ἀλλά introduce un giro fuerte respecto del contexto anterior; en español, «En verdad» conserva el énfasis discursivo sin sonar duro o antinatural en esta frase introductoria.
- source_word: αὐτοὶ
  english_pob_choice: we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros
  - nosotros personalmente
  lexicon: no inventar
  rationale: El pronombre es enfático; «nosotros mismos» preserva esa explicitación en español.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: within ourselves
  chosen_spanish: dentro de nosotros
  alternatives_spanish:
  - en nosotros
  - dentro de nosotros mismos
  lexicon: no inventar
  rationale: La expresión comunica una experiencia interior y personal. «Dentro de nosotros» suena natural en español y mantiene la referencia interna sin perder el sentido reflexivo.
- source_word: τὸ ἀπόκριμα τοῦ θανάτου
  english_pob_choice: the sentence of death
  chosen_spanish: la sentencia de muerte
  alternatives_spanish:
  - el veredicto de muerte
  - la respuesta de muerte
  lexicon: BDAG
  rationale: «Sentencia» conserva el matiz judicial/decisivo que el contexto exige y sigue de cerca la lectura adoptada por la POB en inglés. «Veredicto» es posible, pero «sentencia de muerte» es más idiomática en español bíblico moderno.
- source_word: ἐσχήκαμεν
  english_pob_choice: had
  chosen_spanish: tuvimos
  alternatives_spanish:
  - habíamos tenido
  - llevábamos
  lexicon: no inventar
  rationale: El perfecto griego expresa un estado asumido o poseído en un momento pasado. En español, «tuvimos» reproduce con sobriedad la idea de que esa sentencia estuvo sobre ellos como una realidad presente en la experiencia narrada, sin añadir «recibimos».
- source_word: πεποιθότες
  english_pob_choice: rely
  chosen_spanish: confiáramos
  alternatives_spanish:
  - tuviéramos confianza
  - recurriéramos
  lexicon: no inventar
  rationale: El participio perfecto de πείθω aquí apunta a una confianza asentada. En español, el subjuntivo «confiáramos» comunica bien la finalidad de no depender de sí mismos.
- source_word: ἐφ’ ἑαυτοῖς
  english_pob_choice: on ourselves
  chosen_spanish: en nosotros mismos
  alternatives_spanish:
  - sobre nosotros mismos
  - de nosotros mismos
  lexicon: no inventar
  rationale: Con «confiar» en español, la construcción natural es «confiar en». El contraste de dependencia personal se mantiene con «en nosotros mismos».
- source_word: ἐπὶ τῷ θεῷ
  english_pob_choice: on God
  chosen_spanish: en Dios
  alternatives_spanish:
  - sobre Dios
  - con Dios
  lexicon: no inventar
  rationale: La preposición con «confiar» se expresa naturalmente en español con «en». Así se conserva el contraste entre confianza en sí mismos y confianza en Dios.
- source_word: τῷ ἐγείροντι τοὺς νεκρούς
  english_pob_choice: who raises the dead
  chosen_spanish: que resucita a los muertos
  alternatives_spanish:
  - que levanta a los muertos
  - que da vida a los muertos
  lexicon: no inventar
  rationale: «Resucita» comunica con claridad el poder vivificador de Dios y es el equivalente natural de ἐγείρω en este contexto. «A los muertos» conserva el sustantivo colectivo griego.
theological_decisions:
- issue: Cómo expresar τοὺς νεκρούς sin perder el sentido colectivo de la resurrección
  english_pob_reading: the dead
  chosen_spanish_reading: a los muertos
  alternative_spanish_readings:
  - a los que han muerto
  - a los muertos (como colectivo)
  rationale: El griego usa el plural sustantivado; «a los muertos» preserva el colectivo y la referencia a la esfera de la muerte/resurrección sin añadir explicaciones.
  doctrine_reference: resurrección de los muertos
- issue: Cómo reflejar el contraste teológico entre autoconfianza y confianza en Dios
  english_pob_reading: we would not rely on ourselves but on God
  chosen_spanish_reading: para que no confiáramos en nosotros mismos, sino en Dios
  alternative_spanish_readings:
  - para no apoyarnos en nosotros mismos, sino en Dios
  - para que no tuviéramos confianza en nosotros mismos, sino en Dios
  rationale: El contraste paulino es de dependencia/confianza. «Confiáramos» mantiene el paralelismo con el griego y evita endurecer el sentido a un mero apoyo psicológico.
  doctrine_reference: dependencia de Dios
translation_notes:
  revision_awareness: 'La POB inglesa revisó su decisión sobre ἐσχήκαμεν para acercarse más al griego y dejó «had» en vez de «had received». Por eso el español evita cualquier añadido de «recibimos» y usa una formulación simple de posesión/estado: «tuvimos». También se conservó el énfasis de ἀλλὰ con un marcador discursivo fuerte, y el resto sigue de cerca la puntuación y el contraste del texto fuente.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός según el estándar del proyecto.
  - Se tradujo ἐγείρω como «resucita» para un español bíblico claro y digno.
  - Se preservó el énfasis de αὐτοὶ con «nosotros mismos».
  - La nota textual alternativa se ancló solo en «sentencia de muerte» porque ahí está la principal tensión léxica.
