  to: 'Porque este es nuestro motivo de orgullo: el testimonio de nuestra conciencia, que nos condujimos en el mundo con santidad[a] y sinceridad de Dios[b], no con sabiduría carnal[c] sino con la gracia de Dios, y especialmente hacia ustedes.'
  rationale: Se corrigió el anclaje de la variante textual para que recaiga sobre «santidad», que es donde realmente afecta el texto griego. Se sustituyó «nos hemos conducido» por «nos condujimos» para reflejar mejor ἀνεστράφημεν en español natural. También se ajustó καύχησις a «motivo de orgullo» para expresar mejor el valor positivo de boast en español moderno sin perder la dignidad del registro.
