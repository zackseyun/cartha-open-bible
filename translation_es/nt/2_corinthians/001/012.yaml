review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura global del griego: καύχησις/μαρτύριον/συνείδησις, el contraste entre ἐν ἁγιότητι... οὐκ ἐν σοφίᾳ σαρκικῇ ἀλλ’ ἐν χάριτι θεοῦ, y el cierre comparativo περισσοτέρως... πρὸς ὑμᾶς. Sin embargo, hay dos desajustes importantes con la evidencia y el rastro POB: (1) la nota [a] está anclada en «sinceridad» cuando la variante textual afecta a ἁγιότητι («santidad»), no a εἰλικρινείᾳ; (2) «nos hemos conducido» introduce un perfecto compuesto donde el aoristo ἀνεστράφημεν se vierte mejor con un pretérito simple o una forma no marcada aspectualmente en este contexto. Además, «gloria» para καύχησις es posible pero menos preciso que «motivo de orgullo legítimo/jactancia»; aun así, no obliga por sí solo a rechazo si se ajusta a mejor español y fidelidad contextual.'
  spanish_quality_summary: El español es generalmente claro y digno, pero la colocación de notas produce confusión exegética, y «nos hemos conducido» suena algo rígido y menos natural en español bíblico actual. También conviene evitar que «gloria» se lea como honra o gloria abstracta en vez de 'boast'. Una redacción más natural y fiel es «este es nuestro motivo de orgullo» o «esta es nuestra gloria»; entre ambas, la primera aclara mejor el sentido semántico en español moderno.
  glossary_alignment: Se mantiene bien «Dios», «gracia», «santidad», «carnal». La elección «sinceridad de Dios» es aceptable porque sigue la revisión inglesa y preserva la ambigüedad del genitivo, con nota alternativa «piadosa sinceridad». «Sabiduría carnal» alinea correctamente con la política de visibilizar σάρξ. El principal problema no es terminológico sino de anclaje de nota y de forma verbal.
  issues:
  - severity: high
    issue: La nota textual [a] está anclada en «sinceridad» en vez de «santidad».
    rationale: La variante documentada dice «sencillez» en lugar de «santidad», correspondiente a ἁγιότητι, no a εἰλικρινείᾳ. Tal como está, induce a pensar erróneamente que la variante afecta a «sinceridad».
  - severity: medium
    issue: «Nos hemos conducido» no representa idealmente el aoristo ἀνεστράφημεν.
    rationale: En este contexto paulino, el aoristo resume la conducta de Pablo y sus compañeros; en español suena más natural «nos condujimos» o «nos comportamos», evitando un perfecto compuesto innecesario.
  - severity: medium
    issue: «Gloria» para καύχησις puede resultar semánticamente difuso en español contemporáneo.
    rationale: Aunque teológicamente defendible, «gloria» puede entenderse como honra o esplendor. «Motivo de orgullo» o «motivo de gloria» comunica con más precisión la idea de boast positiva sin caer en connotación pecaminosa.
  revised_spanish_text: 'Porque este es nuestro motivo de orgullo: el testimonio de nuestra conciencia, que nos condujimos en el mundo con santidad[a] y sinceridad de Dios[b], no con sabiduría carnal[c] sino con la gracia de Dios, y especialmente hacia ustedes.'
  revised_footnotes:
  - marker: a
    text: Algunos manuscritos leen «sencillez» en lugar de «santidad».
    reason: textual_variant
  - marker: b
    text: 'O: «piadosa sinceridad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «humana».'
    reason: lexical_alternative
  revision_rationale: Se corrigió el anclaje de la variante textual para que recaiga sobre «santidad», que es donde realmente afecta el texto griego. Se sustituyó «nos hemos conducido» por «nos condujimos» para reflejar mejor ἀνεστράφημεν en español natural. También se ajustó καύχησις a «motivo de orgullo» para expresar mejor el valor positivo de boast en español moderno sin perder la dignidad del registro.
