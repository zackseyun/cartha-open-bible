  text: Ἡ γὰρ καύχησις ἡμῶν αὕτη ἐστίν, τὸ μαρτύριον τῆς συνειδήσεως ἡμῶν, ὅτι ἐν ⸀ἁγιότητι καὶ εἰλικρινείᾳ ⸀τοῦ θεοῦ, ⸀οὐκ ἐν σοφίᾳ σαρκικῇ ἀλλ’ ἐν χάριτι θεοῦ, ἀνεστράφημεν ἐν τῷ κόσμῳ, περισσοτέρως δὲ πρὸς ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/001/012.yaml
  text: 'For this is our boast: the testimony of our conscience[a], that we conducted ourselves in the world in holiness and sincerity of God[c][b], not in fleshly wisdom but in the grace of God—and especially toward you.'
  footnotes:
