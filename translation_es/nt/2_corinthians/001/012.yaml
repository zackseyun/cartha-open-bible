translation:
  language: es
  text: 'Porque este es nuestro motivo de orgullo: el testimonio de nuestra conciencia, que nos condujimos en el mundo con santidad[a] y sinceridad de Dios[b], no con sabiduría carnal[c] sino con la gracia de Dios, y especialmente hacia ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «sencillez» en lugar de «santidad».
    reason: textual_variant
  - marker: b
    text: 'O: «piadosa sinceridad».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «humana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καύχησις
  english_pob_choice: boast
  chosen_spanish: gloria
  alternatives_spanish:
  - motivo de gloria
  - orgullo
  - jactancia
  lexicon: BDAG
  rationale: En este contexto paulino, καύχησις expresa el motivo legítimo de confianza o gloria, no una jactancia vacía. En español, «gloria» comunica mejor la idea de algo de lo que uno puede gloriarse sin cargar de negatividad la frase.
- source_word: μαρτύριον
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testificación
  - evidencia
  - testigo
  lexicon: BDAG
  rationale: «Testimonio» conserva el valor declarativo e interior de la conciencia que da testimonio, y es el equivalente más natural y transparente en español.
- source_word: συνείδησις
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  - conocimiento interior
  lexicon: BDAG
  rationale: «Conciencia» es el término normal y más claro en español para συνείδησις en Pablo.
- source_word: ἁγιότητι
  english_pob_choice: holiness
  chosen_spanish: santidad
  alternatives_spanish:
  - holgura espiritual
  - pureza
  - consagración
  lexicon: BDAG
  rationale: Aunque la POB inglesa usa «holiness», en español «santidad» es el sustantivo más natural y fiel para ἁγιότης, manteniendo la fuerza moral y religiosa del término.
- source_word: εἰλικρινείᾳ τοῦ θεοῦ
  english_pob_choice: sincerity of God
  chosen_spanish: sinceridad de Dios
  alternatives_spanish:
  - sinceridad de parte de Dios
  - sinceridad piadosa
  - sinceridad divina
  lexicon: BDAG
  rationale: La decisión sigue la revisión inglesa que prefirió reflejar con más formalidad el genitivo τοῦ θεοῦ. En español, «sinceridad de Dios» preserva esa relación sin resolverla por paráfrasis; mantiene la tensión posible entre origen/posesión/qualidad. Se evita convertirla de manera automática en «sinceridad piadosa», que interpreta más de lo que el griego exige.
- source_word: σοφίᾳ σαρκικῇ
  english_pob_choice: fleshly wisdom
  chosen_spanish: sabiduría carnal
  alternatives_spanish:
  - sabiduría humana
  - sabiduría mundana
  - sabiduría de la carne
  lexicon: BDAG
  rationale: «Carnal» mantiene visible el grupo léxico de σάρξ, como pide la POB. «Sabiduría carnal» es idiomática en español y conserva la oposición con la gracia de Dios.
- source_word: χάριτι θεοῦ
  english_pob_choice: the grace of God
  chosen_spanish: la gracia de Dios
  alternatives_spanish:
  - la gracia divina
  - la gracia que viene de Dios
  lexicon: BDAG
  rationale: «La gracia de Dios» es la equivalencia natural y teológicamente estable para χάρις θεοῦ en Pablo.
- source_word: ἀνεστράφημεν
  english_pob_choice: we conducted ourselves
  chosen_spanish: nos hemos conducido
  alternatives_spanish:
  - nos comportamos
  - hemos vivido
  - anduvimos
  lexicon: BDAG
  rationale: El verbo se refiere al modo de vida o conducta. «Nos hemos conducido» expresa esa conducta de manera formal y clara en español, sin caer en una traducción mecánica.
- source_word: κόσμῳ
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el mundo entero
  - la sociedad
  lexicon: BDAG
  rationale: «El mundo» reproduce el alcance general de κόσμος como esfera de vida y acción.
- source_word: περισσοτέρως δὲ πρὸς ὑμᾶς
  english_pob_choice: and especially toward you
  chosen_spanish: y especialmente hacia ustedes
  alternatives_spanish:
  - y aún más hacia ustedes
  - pero especialmente hacia ustedes
  lexicon: BDAG
  rationale: La frase conserva el matiz comparativo de περισσοτέρως y la orientación relacional de πρὸς ὑμᾶς con una construcción natural en español.
theological_decisions:
- issue: Sentido del genitivo en εἰλικρινείᾳ τοῦ θεοῦ
  english_pob_reading: 'Rendered as a relation best left somewhat open: ''sincerity of God'' rather than resolving it to ''godly sincerity'' or ''sincerity from God.'''
  chosen_spanish_reading: «sinceridad de Dios»
  alternative_spanish_readings:
  - «sinceridad piadosa»
  - «sinceridad de parte de Dios»
  - «sinceridad divina»
  rationale: La lectura elegida sigue la revisión inglesa que prefirió una forma más formalmente cercana al genitivo. En español, «de Dios» preserva la relación sin decidir de manera prematura si es posesiva, cualitativa o de origen. Así se mantiene la tensión documental del texto.
  doctrine_reference: Formal equivalence with preserved ambiguity; avoid over-resolving the genitive.
- issue: Valor de καύχησις en el contexto paulino
  english_pob_reading: Positive 'boast' rather than sinful self-exaltation.
  chosen_spanish_reading: «gloria»
  alternative_spanish_readings:
  - «jactancia»
  - «orgullo»
  - «motivo de gloria»
  rationale: En este pasaje Pablo habla de una confianza legítima fundada en la conciencia. «Gloria» permite ese valor positivo sin introducir la connotación negativa que «jactancia» tendría en español moderno.
  doctrine_reference: Preserve Pauline positive boasting without moralizing it away.
translation_notes:
  revision_awareness: La redacción sigue la línea revisada del POB en inglés que ajustó el genitivo de τοῦ θεοῦ para reflejar más directamente la construcción formal («sincerity of God»). También conserva el contraste retórico de Pablo entre una conducta pública en el mundo y una relación especial con los corintios. Se mantuvo la posible variante textual sobre ἁγιότητι, expresándola como nota, y se preservó la alternativa léxica de εἰλικρινείᾳ con una nota al pie.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός y «gracia de Dios» para χάρις θεοῦ.
  - Se preservó el grupo léxico de σάρξ con «carnal» en lugar de «humano» como opción principal.
  - Se usó «conciencia» para συνείδησις, coherente con el uso paulino.
  - La preposición relacional πρὸς se vertió como «hacia» para evitar una lectura demasiado literal o exclusiva.
