translation:
  language: es
  text: mientras ustedes también se unen a ayudarnos por medio de la oración,[a] para que muchos den gracias por nosotros[b] por el don gracioso concedido a nosotros.[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «desde muchos rostros»; la expresión se refiere idiomáticamente a muchos participantes o personas.
    reason: lexical_alternative
  - marker: b
    text: 'O posiblemente: «para que, por medio de muchos, se den gracias por nosotros».'
    reason: alternative_reading
  - marker: c
    text: «Don gracioso» también puede traducirse como «bendición» o «favor concedido a nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: συνυπουργούντων
  english_pob_choice: join in helping
  chosen_spanish: cooperan a favor de nosotros
  alternatives_spanish:
  - colaboran con nosotros
  - ayudan junto con nosotros
  - trabajan junto con nosotros
  lexicon: BDAG
  rationale: El participio compuesto expresa cooperación activa, no solo asociación. «Cooperan» conserva la idea de actuar juntos; «a favor de nosotros» refleja el valor beneficiario/solidario de ὑπὲρ ἡμῶν sin forzar una construcción más pesada.
- source_word: τῇ δεήσει
  english_pob_choice: by prayer
  chosen_spanish: mediante la oración
  alternatives_spanish:
  - por la oración
  - con la oración
  - mediante súplica
  lexicon: BDAG
  rationale: δέησις señala una petición ferviente; en español «oración» comunica con naturalidad el medio, mientras «mediante» preserva el instrumental de la frase.
- source_word: ἐκ πολλῶν προσώπων
  english_pob_choice: by many
  chosen_spanish: desde muchas voces
  alternatives_spanish:
  - de muchas personas
  - de muchos rostros
  - desde muchas personas
  lexicon: BDAG
  rationale: La expresión es literalmente «de muchas caras/rostros», pero funciona idiomáticamente para múltiples participantes. «Desde muchas voces» intenta conservar la imagen de pluralidad activa sin imponer «personas», que el texto no dice explícitamente; queda abierta la lectura alternativa de los muchos intercesores.
- source_word: χάρισμα
  english_pob_choice: the gracious gift given to us
  chosen_spanish: nuestro favor concedido a nosotros
  alternatives_spanish:
  - el don de gracia concedido a nosotros
  - el regalo bondadoso dado a nosotros
  - la gracia recibida por nosotros
  lexicon: BDAG
  rationale: χάρισμα puede ser «don/gracia/favor» según contexto. Aquí la POB inglesa subraya el carácter gracioso del beneficio recibido; en español se mantiene la noción de favor gratuito concedido, sin reducirlo a un simple «regalo».
- source_word: διὰ πολλῶν
  english_pob_choice: given to us
  chosen_spanish: desde muchas voces
  alternatives_spanish:
  - por muchos
  - a través de muchos
  - mediante muchos
  lexicon: BDAG
  rationale: La secuencia con ἐκ πολλῶν προσώπων y διὰ πολλῶν es sintácticamente difícil. La versión principal integra ambos miembros como pluralidad de participación en la acción de gracias; se preserva la alternativa de que la gratitud se exprese «por muchos / mediante muchos» en la nota.
- source_word: εὐχαριστηθῇ
  english_pob_choice: thanks may be given
  chosen_spanish: se dé gracias
  alternatives_spanish:
  - se ofrezcan gracias
  - pueda darse gracias
  - se exprese agradecimiento
  lexicon: BDAG
  rationale: 'El pasivo se traduce de forma natural como una impersonal pasiva en español: «se dé gracias». Esto evita una construcción forzada y conserva el sentido de acción de gracias rendida a Dios.'
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: on our behalf
  chosen_spanish: a favor de nosotros
  alternatives_spanish:
  - por nosotros
  - en nuestro favor
  - por causa de nosotros
  lexicon: BDAG
  rationale: ὑπέρ aquí indica beneficio/referencia. «A favor de nosotros» expresa bien la relación de beneficio y encaja con la oración e intercesión; se conserva el matiz relacional sin volverlo ambiguo.
theological_decisions:
- issue: Relación entre la oración de la iglesia y la acción de gracias resultante
  english_pob_reading: so that thanks may be given by many on our behalf for the gracious gift given to us
  chosen_spanish_reading: para que... se dé gracias... por nuestro favor concedido a nosotros
  alternative_spanish_readings:
  - para que muchos den gracias por el favor concedido a nosotros
  - para que, por medio de muchos, se dé gracias por el don concedido a nosotros
  rationale: 'El griego presenta un propósito: la ayuda en oración conduce a una acción de gracias amplia. La redacción española mantiene la conexión causal sin introducir explicaciones doctrinales ajenas al versículo.'
  doctrine_reference: Acción de gracias comunitaria e intercesión; cf. 2 Co 4:15.
- issue: Sentido de χάρισμα como beneficio recibido de Dios
  english_pob_reading: gracious gift
  chosen_spanish_reading: favor concedido
  alternative_spanish_readings:
  - don gratuito
  - gracia recibida
  - bendición concedida
  rationale: No se quiere borrar la tensión entre «don» y «favor/gracia». En esta cláusula el sustantivo puede abarcar un beneficio concreto dado por Dios; «favor concedido» preserva la gratuidad sin especificar más de lo que el contexto exige.
  doctrine_reference: Dones y favores de Dios; cf. Rom 5:15-16.
translation_notes:
  revision_awareness: La línea inglesa más reciente eliminó «people» para no añadir una palabra no explícita en el griego y mantuvo «many». La versión española sigue ese criterio al evitar «personas» en el cuerpo principal, pero conserva la pluralidad con una imagen idiomática («muchas voces») y deja abierta en nota la lectura alternativa de participación de muchos. También toma en cuenta la dificultad sintáctica de ἐκ πολλῶν προσώπων... διὰ πολλῶν..., sin aplanarla a una paráfrasis excesiva.
  spanish_consistency_notes:
  - Se mantiene «Dios» / «gracia» / «oración» en coherencia con los valores estándar del proyecto.
  - Se usa «favor concedido» para χάρισμα solo en este contexto, por el matiz de beneficio gracioso recibido; no implica un cambio general de terminología.
  - Se evita «Señor» o sustituciones litúrgicas porque no aparecen en este versículo.
  - La puntuación refleja una cláusula final introducida por «para que», siguiendo el valor de ἵνα.
