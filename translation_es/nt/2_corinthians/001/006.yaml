  to: Pero si somos afligidos, es para su[a] consuelo[b] y salvación; o si somos consolados, es para su[a] consuelo[b], que es eficaz en la perseverancia de los mismos padecimientos que también nosotros padecemos.
  rationale: Se ajusta el registro a un español neutral ampliamente legible reemplazando «vuestro» por «su», se suaviza la relativa a «que es eficaz» para mejor fluidez, y se añade la nota léxica que preserva la alternativa documentada por el POB para παράκλησις. La nota textual existente no se conserva porque el único marcador en el borrador estaba mal asignado a la variante textual; en este registro revisado se prioriza la nota léxica exigida por el expediente inglés y se evita una ancla ambigua. No se requiere adjudicación adicional.
