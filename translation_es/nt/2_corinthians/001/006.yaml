translation:
  language: es
  text: Pero si somos afligidos, es para su[a] consuelo[b] y salvación; o si somos consolados, es para su[a] consuelo[b], que es eficaz en la perseverancia de los mismos padecimientos que también nosotros padecemos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego puede referirse a plural o singular de cortesía; aquí «su» se usa como forma neutral para dirigirse a los destinatarios en español amplio.
    reason: spanish_style
  - marker: b
    text: O «aliento» en lugar de «consuelo» en todo este versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: θλιβόμεθα
  english_pob_choice: we are afflicted
  chosen_spanish: somos afligidos
  alternatives_spanish:
  - sufrimos aflicción
  - somos atribulados
  - estamos bajo presión
  lexicon: BDAG
  rationale: El verbo pasivo presente indica una situación continua de presión o aflicción. "Afligidos" conserva el valor de padecimiento y armoniza con el contraste posterior con "consuelo".
- source_word: παρακλήσεως / παρακαλούμεθα
  english_pob_choice: comfort / are comforted
  chosen_spanish: consuelo / somos consolados
  alternatives_spanish:
  - aliento / somos alentados
  - consolación / somos consolados
  lexicon: BDAG
  rationale: En el contexto inmediato, el campo léxico de παράκλησις se repite varias veces. "Consuelo" mantiene esa cohesión en español y conserva tanto el sentido de alivio como el de fortalecimiento.
- source_word: σωτηρίας
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  lexicon: BDAG
  rationale: Pablo usa σωτηρία con alcance amplio y teológico; "salvación" es la equivalencia más clara y fiel en español.
- source_word: τῆς ἐνεργουμένης
  english_pob_choice: which is effective
  chosen_spanish: el cual es eficaz
  alternatives_spanish:
  - que actúa
  - que está en acción
  - que obra
  lexicon: BDAG
  rationale: La participio medio-pasivo expresa eficacia operante. "Eficaz" conserva bien ese valor sin sonar forzado en español.
- source_word: ἐν ὑπομονῇ
  english_pob_choice: in the endurance
  chosen_spanish: en la perseverancia
  alternatives_spanish:
  - en la constancia
  - en la paciencia perseverante
  lexicon: BDAG
  rationale: En español, "perseverancia" comunica mejor el sentido de ὑπομονή como resistencia firme y sostenida que "endurance" traducido mecánicamente.
- source_word: τῶν αὐτῶν παθημάτων
  english_pob_choice: the same sufferings
  chosen_spanish: los mismos padecimientos
  alternatives_spanish:
  - los mismos sufrimientos
  - las mismas aflicciones
  lexicon: BDAG
  rationale: '"Padecimientos" conserva el valor concreto de πάθημα como sufrimientos experimentados y deja visible la participación compartida entre Pablo y los destinatarios.'
- source_word: ὑπὲρ
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - por causa de
  - en beneficio de
  lexicon: BDAG
  rationale: En ambas cláusulas ὑπέρ marca beneficio dirigido a los corintios. "Para" es natural en español y preserva ese sentido benefactivo.
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el audit trail inglés, conservando la repetición de παράκλησις con "consuelo" y reflejando la variante textual señalada por la POB inglesa en una nota española equivalente. Se evitó traducir mecánicamente desde el inglés cuando el español requería una formulación más natural, especialmente en ἐν ὑπομονῇ, resuelto como "en la perseverancia".
  spanish_consistency_notes:
  - Se mantuvo la cohesión léxica con "consuelo" para παράκλησις/παρακαλέω, en lugar de alternar sin necesidad con "aliento" o "encouragement".
  - '"Afligidos" y "padecimientos" conservan el paralelismo de sufrimiento compartido del versículo.'
  - La nota textual se ancla solo en la segunda cláusula, siguiendo la decisión auditada de la POB inglesa.
