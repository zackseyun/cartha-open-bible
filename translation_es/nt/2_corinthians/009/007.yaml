translation:
  language: es
  text: Cada uno[a] dé según haya decidido en su corazón, no por tristeza[b] ni por compulsión, porque Dios ama al dador alegre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El singular «cada uno / haya decidido / su» refleja el singular representativo del griego, no una referencia exclusivamente masculina.
    reason: cultural_note
  - marker: b
    text: 'O: «no de mala gana»; el griego dice literalmente «no por tristeza» o «no por dolor/pesar».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada persona
  - Cada hombre
  lexicon: BDAG
  rationale: El singular distributivo se conserva naturalmente con «cada uno», sin introducir un sentido masculino exclusivo.
- source_word: προῄρηται
  english_pob_choice: has decided
  chosen_spanish: haya decidido
  alternatives_spanish:
  - haya resuelto
  - haya determinado
  - haya escogido de antemano
  lexicon: BDAG
  rationale: En español, el perfecto de subjuntivo en una oración exhortativa expresa bien la decisión previa y deliberada del creyente, manteniendo la fuerza de una determinación interior.
- source_word: τῇ καρδίᾳ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en su interior
  - en su corazón íntimo
  lexicon: BDAG
  rationale: «Corazón» conserva el término antropológico bíblico para el centro de la voluntad y la intención, sin reducirlo solo a la emoción o al pensamiento.
- source_word: μὴ ἐκ λύπης
  english_pob_choice: not out of grief
  chosen_spanish: no por tristeza
  alternatives_spanish:
  - no por dolor
  - no de mala gana
  - no con pesar
  lexicon: BDAG
  rationale: «Tristeza» comunica en español el campo semántico de λύπη con naturalidad. La alternativa más dinámica «de mala gana» queda implícita como posibilidad interpretativa, pero el texto principal preserva la base léxica de pesar/tristeza.
- source_word: ἐξ ἀνάγκης
  english_pob_choice: or compulsion
  chosen_spanish: ni por compulsión
  alternatives_spanish:
  - ni por necesidad
  - ni por presión
  - ni bajo coerción
  lexicon: BDAG
  rationale: En este contexto de dar, «compulsión» refleja mejor la idea de presión externa o imposición que simplemente «necesidad».
- source_word: ἱλαρὸν
  english_pob_choice: cheerful
  chosen_spanish: alegre
  alternatives_spanish:
  - contento
  - gozoso
  - dispuesto
  lexicon: BDAG
  rationale: «Alegre» es el equivalente natural en español para el matiz de disposición gozosa o benévola del dador.
- source_word: δότην
  english_pob_choice: giver
  chosen_spanish: al dador
  alternatives_spanish:
  - al que da
  - al que ofrenda
  - al generoso
  lexicon: BDAG
  rationale: «Dador» mantiene la forma nominal del griego y reproduce el foco en la persona que da, no solo en el acto de dar.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - tiene complacencia en
  - se complace en
  lexicon: BDAG
  rationale: Se conserva el verbo fuerte «amar», coherente con la terminología habitual para ἀγαπάω y con la formulación del texto fuente.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Se mantiene la referencia estándar a Dios sin añadir elementos interpretativos.
theological_decisions:
- issue: Lectura de λύπη en el contexto de la generosidad
  english_pob_reading: not out of grief
  chosen_spanish_reading: no por tristeza
  alternative_spanish_readings:
  - no de mala gana
  - no con pesar
  rationale: La elección principal conserva el peso lexical de λύπη como tristeza/pesar, mientras que las alternativas dinámicas quedan reconocidas como posibles implicaciones contextuales sin desplazar el valor del término griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 6
- issue: Sujeto singular representativo sin exclusión de género
  english_pob_reading: Each one should give as he has decided in his heart
  chosen_spanish_reading: Cada uno dé según haya decidido en su corazón
  alternative_spanish_readings:
  - Cada persona dé según haya decidido en su corazón
  - Que cada uno dé según haya decidido en su corazón
  rationale: El griego usa singular representativo; «cada uno» preserva esa estructura sin forzar un plural inclusivo que borre la forma singular del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Tensión entre corazón e intención deliberada
  english_pob_reading: has decided in his heart
  chosen_spanish_reading: haya decidido en su corazón
  alternative_spanish_readings:
  - haya resuelto en su corazón
  - haya determinado en su corazón
  rationale: La frase española conserva tanto el acto de decidir como el asiento interior de esa decisión, sin convertir «corazón» en mera emoción ni en puro intelecto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1
translation_notes:
  revision_awareness: El cotejo con el texto griego SBLGNT y el audit trail inglés muestra alta concordancia, sin revisiones sustanciales pendientes. Se mantuvo la tensión léxica de λύπη en español con una nota alternativa, y se preservó el singular representativo del original sin masculinizarlo innecesariamente.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se mantiene «corazón» como término antropológico bíblico central.
  - Se evita «SEÑOR» o «Cristo» porque no aparecen en este versículo.
  - La puntuación y el orden reflejan una dicción natural en español sin alejarse del paralelismo del griego.
