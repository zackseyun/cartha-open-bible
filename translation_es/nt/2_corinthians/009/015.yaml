translation:
  language: es
  text: ¡Gracias a Dios por su dádiva[a] indecible!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inefable». El adjetivo griego puede referirse a algo que no se puede describir o narrar por completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Thanks be
  chosen_spanish: ¡Gracias sean dadas!
  alternatives_spanish:
  - Gracia sea dada
  - Gracias
  lexicon: BDAG
  rationale: En esta exclamación con dativo a Dios, χάρις funciona idiomáticamente como acción de gracias o alabanza, no como «gracia» en sentido soteriológico. «Gracias sean dadas» reproduce el valor doxológico con español natural y solemne.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El dativo señala el destinatario de la acción de gracias. En español, la construcción fija y clara es «a Dios».
- source_word: ἐπὶ
  english_pob_choice: for
  chosen_spanish: por
  alternatives_spanish:
  - por
  - a causa de
  - debido a
  lexicon: BDAG
  rationale: Con el dativo, ἐπί expresa base o motivo. «Por» comunica de forma idiomática la causa de la acción de gracias sin añadir explicación innecesaria.
- source_word: ἀνεκδιηγήτῳ
  english_pob_choice: indescribable
  chosen_spanish: indescriptible
  alternatives_spanish:
  - inexpresable
  - inefable
  - más allá de todo relato
  lexicon: BDAG
  rationale: El adjetivo indica algo que no puede describirse plenamente o narrarse por completo. «Indescriptible» es claro, contemporáneo y conserva esa limitación verbal sin sobrecargar el estilo.
- source_word: αὐτοῦ
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - su
  - de él
  lexicon: BDAG
  rationale: El posesivo se refiere de manera natural a Dios. «Su» mantiene la referencia implícita del griego y su fluidez en español.
- source_word: δωρεᾷ
  english_pob_choice: gift
  chosen_spanish: don
  alternatives_spanish:
  - don
  - regalo
  - obsequio
  lexicon: BDAG
  rationale: δωρεά puede designar un regalo dado gratuitamente. «Don» preserva mejor el tono elevado y teológico que «regalo» o «obsequio» en este contexto doxológico.
theological_decisions:
- issue: Referencia de «su don indescriptible»
  english_pob_reading: La referencia se deja implícita como el don de Dios, sin precisar en la traducción si apunta estrechamente a Cristo, a la salvación en Cristo o más ampliamente a la provisión graciosa de Dios en el contexto de la generosidad.
  chosen_spanish_reading: 'Se mantiene la misma indefinición: el texto alaba a Dios por su don indescriptible, sin cerrar la referencia a una sola identificación.'
  alternative_spanish_readings:
  - su don que es Cristo
  - su don de salvación
  - su don de gracia en la comunidad
  rationale: El verso no nombra explícitamente el referente del don. Aunque la interpretación cristiana histórica suele ver a Cristo en el centro, el contexto inmediato también trata de la gracia que produce generosidad. La traducción conserva esa tensión teológica sin resolverla de manera prematura.
  doctrine_reference: Preservar la tensión teológica y no imponer una identificación no explicitada por el texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego y coincide con la decisión del POB en inglés de entender χάρις aquí como fórmula de agradecimiento. Se ha optado por «don» para δωρεά por su registro más elevado y su afinidad con un cierre doxológico. Se mantiene la ambigüedad teológica del referente del «don» tal como lo hace el contexto auditado.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «su» para αὐτοῦ, manteniendo la referencia implícita al mismo sujeto.
  - Se evita «SEÑOR» porque el texto griego no contiene κύριος.
  - «Indescriptible» se preserva como solución principal, con nota alternativa para «inefable».
  - «Don» se escoge por coherencia con un registro bíblico solemne, sin convertirlo en un término dogmáticamente más específico de lo que permite el verso.
