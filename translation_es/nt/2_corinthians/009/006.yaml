    rationale: Aunque δέ introduce transición, en español bíblico natural esta formulación queda rígida. Una expresión como «Y esto digo:» comunica mejor el giro exhortativo sin perder fidelidad.
  - severity: medium
    issue: «con bendiciones» en texto principal es menos idiomático que el sentido contextual del griego.
    rationale: ἐπ’ εὐλογίαις puede conservarse lexicalmente en nota, pero en español corriente «sembrar con bendiciones» y «segar con bendiciones» suena extraño y puede confundirse con una acción acompañada de palabras de bendición, no con una medida generosa.
  - severity: low
    issue: La nota en «escasamente» es prescindible o secundaria frente a la de εὐλογίαις.
    rationale: «Escasamente» ya comunica con claridad el sentido de φειδομένως; la mayor necesidad explicativa está en la frase idiomática ἐπ’ εὐλογίαις.
  revised_spanish_text: 'Y esto digo: el que siembra escasamente también segará escasamente, y el que siembra abundantemente[a] también segará abundantemente.'
