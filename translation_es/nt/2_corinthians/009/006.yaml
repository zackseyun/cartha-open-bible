translation:
  language: es
  text: 'Y esto digo: el que siembra escasamente también segará escasamente, y el que siembra abundantemente[a] también segará abundantemente.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «generosamente»; lit. «con bendiciones». El griego usa el sustantivo «bendiciones», que idiomáticamente puede expresar una medida abundante o generosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο δέ
  english_pob_choice: 'Now this:'
  chosen_spanish: 'Esto, pues:'
  alternatives_spanish:
  - 'Y esto:'
  - 'Ahora bien, esto:'
  lexicon: BDAG
  rationale: δέ introduce una transición discursiva o conclusión práctica. «Esto, pues:» conserva el valor inferencial y el tono exhortativo sin volver la frase artificial en español.
- source_word: ὁ σπείρων
  english_pob_choice: the one who sows
  chosen_spanish: el que siembra
  alternatives_spanish:
  - quien siembra
  - el sembrador
  lexicon: BDAG
  rationale: El participio sustantivado es genérico y proverbial. «El que siembra» mantiene la estructura representativa y suena natural en español.
- source_word: φειδομένως
  english_pob_choice: sparingly
  chosen_spanish: escasamente
  alternatives_spanish:
  - con poca medida
  - parsimoniosamente
  lexicon: BDAG
  rationale: El adverbio expresa medida restringida. «Escasamente» conserva la idea de poca cantidad sin añadir el matiz moral fuerte de «mezquinamente» o «tacañamente».
- source_word: καὶ θερίσει
  english_pob_choice: will also reap
  chosen_spanish: también segará
  alternatives_spanish:
  - también cosechará
  - también recogerá
  lexicon: BDAG
  rationale: «Segar» mantiene la correspondencia agrícola con σπείρων/θερίζω y refleja bien el paralelismo proverbial. «Cosechará» sería posible, pero «segará» conserva mejor la imagen verbal del griego.
- source_word: ἐπ’ εὐλογίαις
  english_pob_choice: bountifully / generously
  chosen_spanish: con bendiciones
  alternatives_spanish:
  - generosamente
  - abundantemente
  - con abundancia
  lexicon: BDAG
  rationale: La POB inglesa decidió preservar el sustantivo εὐλογίαις como «blessings» en un nivel lexical, aunque reconoció la lectura idiomática «bountifully». En español, «con bendiciones» mantiene esa conexión léxica con bendición y evita reducir de entrada la frase a un mero adverbio de cantidad.
- source_word: ἐπ’ εὐλογίαις ... καὶ θερίσει
  english_pob_choice: will also reap bountifully
  chosen_spanish: también segará con bendiciones
  alternatives_spanish:
  - también segará abundantemente
  - también segará generosamente
  lexicon: BDAG
  rationale: Se conserva el paralelismo entre sembrar y segar con la misma frase para mantener el juego verbal y la carga teológica de la expresión. En español, repetir «con bendiciones» deja abierta la tensión entre bendición y abundancia sin resolverla por completo.
theological_decisions:
- issue: Sentido de ἐπ’ εὐλογίαις en el proverbio de sembrar y segar
  english_pob_reading: The English POB ultimately rendered the phrase idiomatically as 'bountifully' while noting the lexical force of 'blessings.'
  chosen_spanish_reading: «con bendiciones» preserva el valor lexical de εὐλογίαις y permite leer la frase como una siembra orientada a la bendición, no sólo a la cantidad.
  alternative_spanish_readings:
  - abundantemente
  - generosamente
  rationale: El contexto es la generosidad en la ofrenda, por lo que una traducción adverbial es legítima. Sin embargo, mantener «bendiciones» resguarda la conexión con el vocabulario de bendición y evita cerrar la lectura en una fórmula mecánica de retribución material.
  doctrine_reference: Preservar la tensión semántica y teológica del original; primacía del griego sobre la tradición de traducción.
translation_notes:
  revision_awareness: El borrador sigue la revisión inglesa más reciente al reflejar la estructura proverbial de «sow/reap sparingly ... bountifully», pero en español opta por conservar explícitamente «bendiciones» para no perder el sustantivo εὐλογίαις que la nota auditada considera importante. Esto responde a la tensión documentada entre la lectura idiomática y la lectura léxica del griego.
  spanish_consistency_notes:
  - Se usa «siembra/segará» para mantener el paralelismo agrícola.
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el texto.
  - Se mantiene el tono proverbial y conciso, sin ampliar el contenido más allá de la oración griega.
  - Las notas distinguen entre medida de cantidad y vocabulario de bendición, conforme al audit trail inglés.
