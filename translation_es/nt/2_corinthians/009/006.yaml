revisions:
- from: 'Esto, pues: el que siembra escasamente[a], también segará escasamente, y el que siembra con bendiciones[b], también segará con bendiciones.'
  to: 'Y esto digo: el que siembra escasamente también segará escasamente, y el que siembra abundantemente[a] también segará abundantemente.'
  rationale: Se ajusta el inicio a un español bíblico más natural y se adopta en el texto principal la resolución idiomática final de la POB inglesa para ἐπ’ εὐλογίαις («abundantemente»), conservando en nota la alternativa más literal «con bendiciones» y su valor teológico/lexical. Así se preservan fidelidad al griego, legibilidad en español y coherencia con la auditoría documentada.
