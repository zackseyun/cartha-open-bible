translation:
  language: es
  text: no sea que, si algunos macedonios vienen conmigo y los encuentran desprevenidos, nosotros —por no decir ustedes— quedemos avergonzados en este asunto de confianza[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en esta confianza». El griego también puede significar «empeño» o «situación» según el contexto, pero aquí probablemente se refiere a la confianza de Pablo respecto de ustedes.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή πως ἐὰν
  english_pob_choice: lest if
  chosen_spanish: Con tal de que, si
  alternatives_spanish:
  - no sea que, si
  - por si acaso, si
  lexicon: BDAG
  rationale: La combinación expresa una preocupación preventiva por un posible escenario futuro. En español, «Con tal de que, si» intenta conservar ese matiz de eventualidad temida sin volver la frase rígida o antinatural.
- source_word: ἔλθωσιν σὺν ἐμοὶ Μακεδόνες
  english_pob_choice: any Macedonians come with me
  chosen_spanish: vinieren algunos macedonios conmigo
  alternatives_spanish:
  - vengan macedonios conmigo
  - vinieran algunos macedonios conmigo
  lexicon: BDAG
  rationale: Μακεδόνες es anartro e indefinido en fuerza; «algunos macedonios» refleja la posibilidad sin especificar un grupo concreto. Se conserva el sentido futuro/hipotético de la cláusula.
- source_word: εὕρωσιν ὑμᾶς ἀπαρασκευάστους
  english_pob_choice: find you unprepared
  chosen_spanish: os hallaren desprevenidos
  alternatives_spanish:
  - os encuentren no preparados
  - os hallaren no preparados
  lexicon: BDAG
  rationale: ἀπαρασκευάστους significa «sin preparación / no listos». «Desprevenidos» es un español natural y digno que conserva la idea de no estar listos para lo esperado en el contexto de la colecta.
- source_word: καταισχυνθῶμεν
  english_pob_choice: would be put to shame
  chosen_spanish: seamos avergonzados
  alternatives_spanish:
  - quedemos avergonzados
  - seamos puestos en vergüenza
  lexicon: BDAG
  rationale: El pasivo griego expresa ser avergonzados públicamente, no sólo una emoción interna. «Seamos avergonzados» conserva esa fuerza pasiva y social.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego. En español se mantiene con «nosotros», reforzado por la pausa del inciso posterior.
- source_word: ἵνα μὴ λέγωμεν ὑμεῖς
  english_pob_choice: not to say you
  chosen_spanish: no digo vosotros
  alternatives_spanish:
  - por no decir vosotros
  - por no mencionaros
  lexicon: BDAG
  rationale: La frase funciona como inciso atenuante que implica que también ellos compartirían la vergüenza. «No digo vosotros» conserva esa estructura parentética y la tensión retórica del original.
- source_word: ἐν τῇ ὑποστάσει ταύτῃ
  english_pob_choice: in this matter of confidence
  chosen_spanish: en esta confianza
  alternatives_spanish:
  - en este empeño
  - en esta situación
  lexicon: BDAG
  rationale: ὑπόστασις aquí no se toma en sentido metafísico, sino como base/seguridad de la confianza o la expectativa de Pablo respecto de ellos. «Confianza» es la opción más directa y coherente con el contexto; la nota conserva la alternativa de matiz.
theological_decisions:
- issue: Sentido de ὑπόστασις en contexto paulino no técnico
  english_pob_reading: confidence/ground of boasting rather than 'substance'
  chosen_spanish_reading: confianza más que 'sustancia'
  alternative_spanish_readings:
  - empeño
  - situación
  rationale: El pasaje trata de la expectativa de Pablo sobre la disposición de los corintios antes de la llegada de los macedonios. Traducir ὑπόστασις como «confianza» evita introducir el sentido filosófico de «sustancia» y encaja con la lógica retórica inmediata.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail, que corrigió la apertura interpretativa de μή πως ἐὰν para reflejar mejor un matiz preventivo («lest if»). La versión española mantiene ese matiz con «Con tal de que, si», y conserva el valor contextual de ὑπόστασις como «confianza» en lugar de una traducción técnica o metafísica.
  spanish_consistency_notes:
  - Se prefirió «desprevenidos» para ἀπαρασκευάστους por ser natural en español y mantener el campo semántico de preparación previa.
  - Se evitó «Cristo/SEÑOR» u otro vocabulario no pertinente; el versículo no contiene títulos divinos ni cristológicos.
  - «Vosotros» se evita en el cuerpo principal por la norma de español latinoamericano neutral; el inciso retórico se resolvió con «vosotros» en la nota de decisión solo como explicación del eco griego, no como forma base del texto.
