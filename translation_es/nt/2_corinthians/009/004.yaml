revisions:
- from: Con tal de que, si vinieren algunos macedonios conmigo y os hallaren desprevenidos, nosotros seamos avergonzados; no digo vosotros, en esta [a]confianza.
  to: no sea que, si algunos macedonios vienen conmigo y los encuentran desprevenidos, nosotros —por no decir ustedes— quedemos avergonzados en este asunto de confianza[a].
  rationale: Se reemplazó «Con tal de que, si» por «no sea que, si» para reflejar con precisión el temor preventivo de μή πως ἐὰν. Se actualizó el registro a un español neutro ampliamente legible («vienen», «los encuentran», «ustedes»). Se rehízo el inciso como «por no decir ustedes» para comunicar de forma natural la implicación parentética de ἵνα μὴ λέγωμεν ὑμεῖς. Se cambió «seamos avergonzados» por «quedemos avergonzados», que conserva el resultado público de vergüenza sin sonar rígido. Finalmente, «en este asunto de confianza» hace explícito el valor contextual de ὑπόστασις, mientras la nota preserva la alternativa más literal.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:33:59Z'
