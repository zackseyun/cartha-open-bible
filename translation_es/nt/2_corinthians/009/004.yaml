  text: μή πως ἐὰν ἔλθωσιν σὺν ἐμοὶ Μακεδόνες καὶ εὕρωσιν ὑμᾶς ἀπαρασκευάστους καταισχυνθῶμεν ἡμεῖς, ἵνα μὴ ⸀λέγωμεν ὑμεῖς, ἐν τῇ ὑποστάσει ⸀ταύτῃ.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/009/004.yaml
  text: lest if any Macedonians come with me and find you unprepared[b][a], we—not to say you—would be put to shame in this matter of confidence.
  footnotes:
  - marker: a
    text: Or 'in this confidence.' The Greek word can also mean 'undertaking' or 'situation' in context, but here it most likely refers to Paul's confidence about you.
    reason: lexical_alternative
  - marker: b
    text: Or 'not to mention you.' Paul parenthetically implies that the Corinthians too would share the shame if found unprepared.
    reason: alternative_reading
