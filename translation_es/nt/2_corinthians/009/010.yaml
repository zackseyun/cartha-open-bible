revisions:
- from: Y el que da semilla al sembrador y pan para comer, también proveerá y multiplicará vuestra semilla y aumentará[a] los frutos[b] de vuestra justicia.
  to: Y el que provee semilla al sembrador y pan para alimento, proveerá y multiplicará vuestra semilla y aumentará la cosecha[a] de vuestra rectitud[b].
  rationale: Se ajusta el primer verbo a «provee» para reflejar el vínculo léxico con «proveerá». Se eleva el registro con «pan para alimento». Se adopta «la cosecha» como equivalente principal de τὰ γενήματα, en línea con el POB, dejando «frutos/producto/rendimiento» en nota. Se cambia «justicia» por «rectitud» en el texto principal para seguir la elección principal auditada de δικαιοσύνη como 'righteousness', preservando «justicia» como alternativa en nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:34:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: Dios da semilla y pan, luego proveerá, multiplicará y aumentará el resultado de la justicia de los destinatarios. Sin embargo, se aparta innecesariamente del rastro auditado en dos puntos importantes: ἐπιχορηγῶν/χορηγήσει están vinculados léxicamente y conviene reflejar mejor esa relación con «provee/proveerá» en vez de «da/proveerá»; y δικαιοσύνης debe mantenerse por defecto como «justicia» o «rectitud» según contexto, pero el English POB fijó aquí «righteousness» como lectura principal con «justice» en nota. En español, «rectitud» preserva mejor esa decisión sin sonar antinatural.'
  spanish_quality_summary: El español es claro y legible, pero tiene pequeños desajustes de estilo y fidelidad auditada. «Pan para comer» es natural, aunque «pan para alimento» suena más digno y preserva mejor la distinción semilla/pan. «Los frutos de vuestra justicia» es comprensible, pero la nota actual sobre «aumentará» no refleja una alternativa preservada por el POB, mientras falta una nota para la alternativa semántica de δικαιοσύνη. Además, el texto puede ganar cohesión con «el que provee … proveerá».
  glossary_alignment: No hay términos de glosario mayor en conflicto salvo δικαιοσύνη. Según la guía del proyecto, debe preferirse «justicia»/«rectitud» por contexto; dado que el English POB documentó «righteousness» como principal y «justice» como alternativa, en español conviene usar «rectitud» en el texto principal y conservar «justicia» en nota. El resto («semilla», «sembrador», «multiplicará») está alineado.
  issues:
  - severity: medium
    issue: Inconsistencia léxica entre ἐπιχορηγῶν y χορηγήσει
    rationale: El griego enlaza los dos verbos de provisión; «el que da … proveerá» pierde esa relación mejor preservada con «el que provee … proveerá» o equivalente cercano.
  - severity: high
    issue: La elección principal «justicia» para δικαιοσύνης no sigue la decisión auditada del English POB
    rationale: El POB fijó 'righteousness' como lectura principal y 'justice' como alternativa en nota. En español, «rectitud» reproduce mejor esa lectura principal sin calco inglés, mientras «justicia» puede mantenerse como alternativa.
  - severity: medium
    issue: La nota [a] introduce una alternativa no preservada por el English POB y omite la nota necesaria sobre δικαιοσύνη
    rationale: El POB no anotó αὐξήσει como alternativa principal; sí anotó γενήματα y δικαιοσύνη. La anotación española debe seguir esa jerarquía de decisiones.
  - severity: low
    issue: «Pan para comer» es válido pero menos digno que «pan para alimento»
    rationale: Ambas son fieles; «pan para alimento» preserva mejor el registro bíblico moderno y la finalidad de βρῶσιν.
  revised_spanish_text: Y el que provee semilla al sembrador y pan para alimento, proveerá y multiplicará vuestra semilla y aumentará la cosecha[a] de vuestra rectitud[b].
  revised_footnotes:
  - marker: a
    text: O «los frutos», «el producto» o «el rendimiento» de vuestra rectitud.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El griego δικαιοσύνη puede significar «rectitud» o, en algunos contextos, «justicia».
    reason: alternative_reading
  revision_rationale: Se ajusta el primer verbo a «provee» para reflejar el vínculo léxico con «proveerá». Se eleva el registro con «pan para alimento». Se adopta «la cosecha» como equivalente principal de τὰ γενήματα, en línea con el POB, dejando «frutos/producto/rendimiento» en nota. Se cambia «justicia» por «rectitud» en el texto principal para seguir la elección principal auditada de δικαιοσύνη como 'righteousness', preservando «justicia» como alternativa en nota.
