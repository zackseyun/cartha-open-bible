translation:
  language: es
  text: Y el que provee semilla al sembrador y pan para alimento, proveerá y multiplicará vuestra semilla y aumentará la cosecha[a] de vuestra rectitud[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los frutos», «el producto» o «el rendimiento» de vuestra rectitud.
    reason: lexical_alternative
  - marker: b
    text: O «justicia». El griego δικαιοσύνη puede significar «rectitud» o, en algunos contextos, «justicia».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπιχορηγῶν
  english_pob_choice: the one who supplies
  chosen_spanish: el que da
  alternatives_spanish:
  - el que provee
  - el que suministra abundantemente
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente. En español, «el que da» conserva la idea de provisión sin sonar forzado; en contexto agrícola y de generosidad, comunica bien la acción de otorgar.
- source_word: σπόρον
  english_pob_choice: seed
  chosen_spanish: semilla
  alternatives_spanish:
  - grano
  - simiente
  lexicon: BDAG
  rationale: «Semilla» mantiene la metáfora agrícola y es natural en español bíblico contemporáneo.
- source_word: τῷ σπείροντι
  english_pob_choice: to the sower
  chosen_spanish: al sembrador
  alternatives_spanish:
  - al que siembra
  lexicon: BDAG
  rationale: El participio sustantivado se refiere a la persona que siembra. «Sembrador» es conciso y idiomático en español, preservando la imagen.
- source_word: ἄρτον εἰς βρῶσιν
  english_pob_choice: bread for food
  chosen_spanish: pan para comer
  alternatives_spanish:
  - pan para alimento
  - pan para sustento
  lexicon: BDAG
  rationale: La expresión de propósito se vuelve más natural en español como «pan para comer», sin perder la distinción entre la semilla para sembrar y el pan para consumir.
- source_word: χορηγήσει
  english_pob_choice: will supply
  chosen_spanish: proveerá
  alternatives_spanish:
  - suministrará
  - dará
  lexicon: BDAG
  rationale: El futuro retoma la provisión del participio inicial. «Proveerá» es claro y natural, y conserva la relación verbal con la idea de suministro.
- source_word: πληθυνεῖ
  english_pob_choice: multiply
  chosen_spanish: multiplicará
  alternatives_spanish:
  - aumentará considerablemente
  - hará abundar
  lexicon: BDAG
  rationale: El verbo expresa hacer más numeroso o abundante. «Multiplicará» sigue de cerca la fuerza del original y conserva el tono agrícola.
- source_word: τὸν σπόρον ὑμῶν
  english_pob_choice: your seed
  chosen_spanish: vuestra semilla
  alternatives_spanish:
  - vuestra provisión de semilla
  - vuestra semilla para sembrar
  lexicon: BDAG
  rationale: Se mantiene el lenguaje literal para preservar el entrecruce metafórico entre provisión material y capacidad de generosidad.
- source_word: αὐξήσει
  english_pob_choice: increase
  chosen_spanish: aumentará
  alternatives_spanish:
  - hará crecer
  - hará aumentar
  lexicon: BDAG
  rationale: El verbo de crecimiento se vierte con un futuro simple natural en español. «Aumentará» mantiene la idea de crecimiento sin añadir matices ajenos.
- source_word: τὰ γενήματα
  english_pob_choice: the harvest
  chosen_spanish: los frutos
  alternatives_spanish:
  - la cosecha
  - el producto
  - el rendimiento
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió «harvest», el griego plural sugiere «frutos/produce/yield». «Los frutos» comunica bien el resultado agrícola y deja abierta la imagen metafórica.
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  - justicia/righteousness
  lexicon: BDAG
  rationale: Se conserva la tensión documentada entre «righteousness» y «justice». En español, «justicia» cubre el campo semántico relevante y permite mantener abierta la lectura ética y relacional del texto.
theological_decisions:
- issue: Sentido de «los frutos de vuestra justicia»
  english_pob_reading: A metaphor for the fruit/results that flow from the Corinthians' righteous generosity, without restricting it either to material return or to forensic status.
  chosen_spanish_reading: Una metáfora del fruto o resultado que brota de la generosidad justa de los corintios, sin limitarla ni a una recompensa material ni a una noción forense aislada.
  alternative_spanish_readings:
  - bendición material resultante de la generosidad
  - fruto de la fidelidad de pacto/justicia
  - evidencia de conducta recta
  rationale: El contexto trata de la ofrenda generosa y usa imágenes agrícolas. La traducción conserva la amplitud teológica del pasaje sin reducirla a prosperidad, ni a justicia social solamente, ni a una justicia imputada en sentido técnico.
  doctrine_reference: Mantener la tensión teológica; δικαιοσύνη se traduce por defecto como justicia, preservando la alternativa de rectitud/justicia en nota.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el auditable inglés POB como contexto, manteniendo el paralelismo de provisión y crecimiento. No se aplicaron revisiones adicionales.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando corresponde al nombre divino; este versículo no lo contiene.
  - Se mantiene «justicia» para δικαιοσύνη, dejando abierta la alternativa semántica documentada sin imponer una sola lectura.
  - «Semilla» y «frutos» conservan la metáfora agrícola y la relación entre provisión y resultado.
  - La puntuación y el orden sintáctico buscan sonar naturales en español bíblico moderno sin alejarse del original.
