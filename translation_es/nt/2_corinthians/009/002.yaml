translation:
  language: es
  text: 'Porque conozco vuestra disposición[a], de la cual me glorío por ustedes ante los macedonios: que Acaya ha estado preparada desde el año pasado[b], y vuestro celo ha estimulado a la mayoría de ellos[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prontitud» para προθυμίαν.
    reason: lexical_alternative
  - marker: b
    text: Es decir, la provincia de Acaya, incluida Corinto; Pablo habla de la región por sus creyentes.
    reason: cultural_note
  - marker: c
    text: O «la mayoría».
    reason: lexical_alternative
lexical_decisions:
- source_word: προθυμίαν
  english_pob_choice: eagerness
  chosen_spanish: prontitud
  alternatives_spanish:
  - disposición
  - entusiasmo
  - presteza
  lexicon: BDAG
  rationale: προθυμία expresa disposición pronta y voluntariosa. «Prontitud» conserva la idea de preparación interior y decisión favorable, y en español encaja bien con el motivo de alabanza del contexto sin reducirlo a mera logística.
- source_word: καυχῶμαι
  english_pob_choice: I boast about
  chosen_spanish: me glorío
  alternatives_spanish:
  - me jacto
  - me glorío de
  - me enorgullezco
  lexicon: BDAG
  rationale: καυχάομαι tiene un valor fuerte de jactancia/gloria retórica. «Me glorío» mantiene esa fuerza en un registro bíblico natural en español y evita suavizar el matiz apostólico.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: on your behalf
  chosen_spanish: de la cual me glorío ...
  alternatives_spanish:
  - en vuestro favor
  - por vosotros
  - a vuestro favor
  lexicon: BDAG
  rationale: En esta construcción, ὑπέρ señala representación o defensa de otros. La frase española «de la cual me glorío» deja que el complemento «ante los macedonios» y el contexto expresen que Pablo habla en favor de los corintios/acaios; se evita forzar una perífrasis demasiado larga, aunque el sentido de representación queda explícito en la nota cultural.
- source_word: Μακεδόσιν
  english_pob_choice: the Macedonians
  chosen_spanish: los macedonios
  alternatives_spanish:
  - los de Macedonia
  - los creyentes macedonios
  lexicon: BDAG
  rationale: El dativo plural refiere a los macedonios como grupo al que Pablo ha estado hablando. «Los macedonios» es la equivalencia directa y natural en español.
- source_word: Ἀχαΐα
  english_pob_choice: Achaia
  chosen_spanish: Acaya
  alternatives_spanish:
  - la provincia de Acaya
  - la región de Acaya
  lexicon: BDAG
  rationale: El texto nombra la provincia romana. «Acaya» conserva el topónimo y su fuerza geográfica; en contexto puede funcionar metonímicamente por los creyentes de esa región, especialmente Corinto.
- source_word: παρεσκεύασται
  english_pob_choice: has been ready
  chosen_spanish: ha estado preparada
  alternatives_spanish:
  - está preparada
  - ha sido preparada
  - ha estado lista
  lexicon: BDAG
  rationale: El perfecto indica un estado resultante de preparación previa. «Ha estado preparada» conserva ese estado continuo y suena natural en español.
- source_word: ἀπὸ πέρυσι
  english_pob_choice: since last year
  chosen_spanish: desde el año pasado
  alternatives_spanish:
  - desde el año anterior
  - desde el año pasado mismo
  lexicon: BDAG
  rationale: La locución señala duración desde el año previo hasta ahora. «Desde el año pasado» es la forma idiomática clara en español.
- source_word: τὸ ὑμῶν ζῆλος
  english_pob_choice: your zeal
  chosen_spanish: vuestro celo
  alternatives_spanish:
  - vuestra pasión
  - vuestra diligencia
  - vuestro ardor
  lexicon: BDAG
  rationale: ζῆλος aquí es positivo y fuerte. «Celo» preserva la intensidad y el matiz de fervor comprometido mejor que alternativas más suaves.
- source_word: ἠρέθισε
  english_pob_choice: has stirred up
  chosen_spanish: ha estimulado
  alternatives_spanish:
  - ha provocado
  - ha incitado
  - ha despertado
  lexicon: BDAG
  rationale: ἐρεθίζω puede significar estimular o provocar. En este contexto positivo, «ha estimulado» comunica el efecto motivador sin la carga negativa que suele tener «provocar» en español.
- source_word: τοὺς πλείονας
  english_pob_choice: most of them
  chosen_spanish: a la mayoría
  alternatives_spanish:
  - a la mayoría de ellos
  - al mayor número
  - a la mayor parte
  lexicon: BDAG
  rationale: οἱ πλείονες suele significar la mayoría o el grupo más numeroso. «A la mayoría» expresa bien el sentido colectivo implícito y mantiene la naturalidad del español.
theological_decisions:
- issue: Referente de «Acaya»
  english_pob_reading: Achaia is retained as a geographical designation standing for the churches/believers there, rather than being paraphrased directly as 'you' or 'the believers in Achaia.'
  chosen_spanish_reading: «Acaya» se mantiene como designación geográfica que representa a las iglesias o creyentes de esa región.
  alternative_spanish_readings:
  - ustedes han estado preparados desde el año pasado
  - los creyentes de Acaya han estado preparados desde el año pasado
  rationale: El griego nombra explícitamente Ἀχαΐα. Conservar el topónimo respeta la formulación de Pablo y deja que el contexto haga visible la metonimia hacia los creyentes locales.
  doctrine_reference: Lectura contextual/metonímica del destinatario regional; no implica diferencia doctrinal.
- issue: Fuerza del jactarse paulino
  english_pob_reading: Rendered straightforwardly as 'I boast about' rather than softened.
  chosen_spanish_reading: «Me glorío» conserva el tono fuerte y retórico de Pablo.
  alternative_spanish_readings:
  - me jacto
  - hablo con orgullo
  - me enorgullezco
  rationale: καυχῶμαι es un verbo fuerte de autoexaltación retórica o gloria en algo. «Me glorío» mantiene esa fuerza sin reducirla a una simple recomendación o elogio neutro.
  doctrine_reference: Retórica paulina; no hay atenuación doctrinal necesaria.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés, conservando la estructura causal y la progresión retórica. No se aplicaron revisiones previas adicionales; el estado más reciente indicaba acuerdo alto y sin cambios necesarios.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva el topónimo «Acaya» y el etnónimo «macedonios» para respetar el alcance geográfico del pasaje.
  - '«Celo» y «prontitud» distinguen dos matices cercanos pero no idénticos: disposición favorable y ardor motivador.'
  - La puntuación con coma y punto y coma busca reflejar la sintaxis retórica del griego sin sobrecargar el período en español.
