revisions:
- from: Porque sé vuestra [a] prontitud, de la cual me glorío ante los macedonios, que Acaya ha estado preparada desde el año pasado[b], y vuestro celo ha estimulado a la mayoría[c].
  to: 'Porque conozco vuestra disposición[a], de la cual me glorío por ustedes ante los macedonios: que Acaya ha estado preparada desde el año pasado[b], y vuestro celo ha estimulado a la mayoría de ellos[c].'
  rationale: La revisión hace explícito el sentido de ὑπὲρ ὑμῶν («por ustedes»), mejora el matiz léxico de προθυμία con «disposición», corrige el anclaje de la nota [a], y aclara el referente de τοὺς πλείονας con «de ellos». Se mantiene «Acaya», el perfecto «ha estado preparada», y el tono fuerte de la jactancia paulina.
