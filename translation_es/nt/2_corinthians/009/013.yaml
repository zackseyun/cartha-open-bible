    reason: lexical_alternative
  - marker: b
    text: O «la obediencia mostrada en la confesión de ustedes»; la construcción griega puede entenderse de modo más explícito, pero aquí se conserva la relación más estrecha entre obediencia y confesión.
    reason: lexical_alternative
  - marker: c
    text: O «comunión», «participación» o «contribución»; en este contexto κοινωνία apunta específicamente a la participación material y generosa en la ayuda.
    reason: lexical_alternative
  revision_rationale: Se eliminó la redundancia inicial «Porque, por» para reflejar διὰ con español natural. Se cambió «su confesión» por «la confesión de ustedes» para evitar ambigüedad pronominal. Se reemplazó «participación» por «compartir» en el texto principal porque comunica mejor en español el sentido material de κοινωνία dentro de la colecta, mientras las alternativas más literales se conservan en nota.
