    changes_summary: Changed 'given' to 'provided' for more natural formal English, and revised 'the obedience shown in your confession' to 'the obedience of your confession' to more closely reflect the Greek construction without interpretive expansion.
translation:
  language: es
  text: Por la prueba de este ministerio[a], glorifican a Dios por la obediencia de la confesión de ustedes[b] al evangelio del Mesías y por la generosidad de su compartir[c] con ellos y con todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el servicio»; aquí διακονία se refiere al servicio caritativo concreto de la colecta.
    reason: lexical_alternative
  - marker: b
    text: O «la obediencia mostrada en la confesión de ustedes»; la construcción griega puede entenderse de modo más explícito, pero aquí se conserva la relación más estrecha entre obediencia y confesión.
    reason: lexical_alternative
  - marker: c
    text: O «comunión», «participación» o «contribución»; en este contexto κοινωνία apunta específicamente a la participación material y generosa en la ayuda.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμῆς
  english_pob_choice: proof
  chosen_spanish: prueba
  alternatives_spanish:
  - evidencia
  - comprobación
  - prueba resultante
  lexicon: BDAG
  rationale: En este contexto la colecta funciona como demostración de autenticidad; 'prueba' comunica el resultado de la evaluación sin convertirlo en una explicación más larga que el griego.
- source_word: διακονίας
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - administración
  lexicon: BDAG
  rationale: El contexto es el servicio caritativo organizado por Pablo; 'ministerio' conserva el valor de servicio con peso eclesial, como en el inglés POB.
- source_word: δοξάζοντες τὸν θεὸν
  english_pob_choice: they glorify God
  chosen_spanish: glorifican a Dios
  alternatives_spanish:
  - alaban a Dios
  - dan gloria a Dios
  lexicon: BDAG
  rationale: '''Glorificar'' corresponde directamente a δοξάζω y mantiene la fuerza del verbo mejor que ''alabar''.'
- source_word: ὑποταγῇ
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  - sujeción
  lexicon: BDAG
  rationale: Aunque el sustantivo base puede sugerir sumisión, en este contexto la obediencia concreta encaja mejor con la respuesta visible al evangelio y con el tratamiento del inglés POB.
- source_word: ὁμολογίας
  english_pob_choice: your confession
  chosen_spanish: su confesión
  alternatives_spanish:
  - su profesión
  - su declaración de fe
  lexicon: BDAG
  rationale: '''Confesión'' preserva el acto público de profesar fe; en español la referencia es naturalmente a la confesión de los destinatarios.'
- source_word: εἰς τὸ εὐαγγέλιον τοῦ Χριστοῦ
  english_pob_choice: to the gospel of the Messiah
  chosen_spanish: al evangelio del Mesías
  alternatives_spanish:
  - al evangelio de Cristo
  - hacia el evangelio del Mesías
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como 'Mesías', siguiendo la preferencia del proyecto para títulos, y la preposición se naturaliza con 'al'.
- source_word: ἁπλότητι
  english_pob_choice: generosity
  chosen_spanish: generosidad
  alternatives_spanish:
  - sencillez
  - liberalidad
  - singularidad de intención
  lexicon: BDAG
  rationale: En el contexto de la colecta, el término apunta a liberalidad abierta; 'generosidad' transmite mejor ese matiz en español que 'sencillez'.
- source_word: κοινωνίας
  english_pob_choice: sharing
  chosen_spanish: participación
  alternatives_spanish:
  - compartir
  - comunión
  - contribución
  lexicon: BDAG
  rationale: Aquí la κοινωνία es participación material en la ayuda; 'participación' conserva amplitud y evita reducirlo solo a 'comunión' espiritual.
- source_word: εἰς αὐτοὺς καὶ εἰς πάντας
  english_pob_choice: with them and with everyone
  chosen_spanish: con ellos y con todos
  alternatives_spanish:
  - para ellos y para todos
  - hacia ellos y hacia todos
  lexicon: BDAG
  rationale: La repetición de εἰς indica dirección/beneficiarios de la participación generosa; 'con' es idiomático en español cuando se habla de participación compartida, y mantiene el movimiento relacional.
theological_decisions:
- issue: Χριστοῦ como título mesiánico
  english_pob_reading: the gospel of the Messiah
  chosen_spanish_reading: el evangelio del Mesías
  alternative_spanish_readings:
  - el evangelio de Cristo
  rationale: Se sigue la decisión del POB inglés de ver Χριστός como título y no como nombre fijo; en español, 'Mesías' preserva esa carga titular y evita vaciar el término de su sentido.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; contested-term guidance for Χριστός'
- issue: ὑποταγῇ τῆς ὁμολογίας
  english_pob_reading: the obedience of your confession
  chosen_spanish_reading: la obediencia de su confesión
  alternative_spanish_readings:
  - la sumisión de su confesión
  - la obediencia mostrada en su confesión
  rationale: Se mantiene la construcción estrecha del griego sin expandirla demasiado; 'obediencia de su confesión' deja visible la tensión entre confesión verbal y sometimiento práctico, en línea con el audit trail inglés.
  doctrine_reference: Lexical/theological note from revision history on ὑποταγῇ τῆς ὁμολογίας
translation_notes:
  revision_awareness: El borrador toma en cuenta la revisión más reciente del inglés POB que volvió a una formulación más cercana al griego en la frase sobre ὑποταγῇ τῆς ὁμολογίας. Por eso se evita una expansión interpretativa excesiva y se conserva una relación sintáctica compacta en español. También se respeta la decisión estable de traducir Χριστός como 'Mesías' cuando funciona como título.
  spanish_consistency_notes:
  - Se usa 'Yahvé' por defecto en el proyecto, pero este versículo no contiene el nombre divino explícito.
  - '''Mesías'' se mantiene para Χριστός conforme a la pauta del proyecto.'
  - '''Ministerio'' y ''participación'' se usan con sentido contextual, no como equivalentes automáticos de ''servicio'' o ''comunión''.'
  - Se evita traducir ὑποταγή solo como 'sumisión' para no perder el matiz de obediencia práctica resaltado por el audit trail inglés.
