translation:
  language: es
  text: 'como está escrito: «Esparció, dio a los pobres; su rectitud[a] permanece para siempre».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su justicia permanece para siempre». El griego δικαιοσύνη puede abarcar tanto rectitud como justicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: como está escrito
  alternatives_spanish:
  - tal como está escrito
  - así como está escrito
  lexicon: BDAG
  rationale: La fórmula introduce una cita bíblica y en español suena natural, sobria y reconocible sin perder el tono escritural del griego.
- source_word: Ἐσκόρπισεν
  english_pob_choice: he scattered abroad
  chosen_spanish: Esparció
  alternatives_spanish:
  - dispersó
  - esparció ampliamente
  lexicon: BDAG
  rationale: El verbo expresa la imagen de dispersar o esparcir. En español, «esparció» conserva el dinamismo poético sin añadir un matiz innecesario de amplitud que el texto griego no exige explícitamente.
- source_word: ἔδωκεν
  english_pob_choice: he gave
  chosen_spanish: dio
  alternatives_spanish:
  - ha dado
  - entregó
  lexicon: BDAG
  rationale: El aoristo narrativo se vierte con un pasado simple natural en español. «Dio» mantiene la sencillez del original.
- source_word: τοῖς πένησιν
  english_pob_choice: to the poor
  chosen_spanish: a los pobres
  alternatives_spanish:
  - a los necesitados
  - a los indigentes
  lexicon: BDAG
  rationale: πένης se refiere a personas pobres, especialmente de medios limitados. «A los pobres» es la equivalencia más directa e idiomática.
- source_word: ἡ δικαιοσύνη αὐτοῦ
  english_pob_choice: his righteousness
  chosen_spanish: su justicia
  alternatives_spanish:
  - su rectitud
  - su justicia recta
  lexicon: BDAG
  rationale: Se conserva la alternativa lexical documentada para δικαιοσύνη. En este contexto de cita bíblica, «justicia» mantiene la amplitud semántica de la palabra griega y permite incluir tanto rectitud moral como justicia en sentido ético/social.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - dura
  - subsiste
  lexicon: BDAG
  rationale: El verbo expresa continuidad y permanencia. «Permanece» es claro, solemne y fiel al sentido de duración estable.
- source_word: εἰς τὸν αἰῶνα
  english_pob_choice: forever
  chosen_spanish: para siempre
  alternatives_spanish:
  - por siempre
  - eternamente
  lexicon: BDAG
  rationale: La expresión idiomática se traduce de manera natural en español como una duración sin fin.
theological_decisions:
- issue: δικαιοσύνη en una cita paulina
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: Aunque la POB inglesa prefirió «righteousness», en español «justicia» es la opción más abarcadora y auditable para δικαιοσύνη en este contexto. Conserva la tensión lexical entre rectitud personal y justicia en sentido moral, algo que una nota puede dejar visible sin imponer una sola lectura estrecha.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; justice preserved in footnotes for Pauline passages'
translation_notes:
  revision_awareness: 'El inglés POB lee el texto con una equivalencia óptima: conserva la fórmula escritural, la imagen de dispersión, el dativo «a los pobres» y la ambigüedad léxica de δικαιοσύνη. Esta propuesta mantiene esa estructura, pero ajusta el último sintagma al español con «justicia» como término más natural y semánticamente amplio, dejando la alternativa «rectitud» en nota para no ocultar la tensión lexical.'
  spanish_consistency_notes:
  - Se mantiene el registro bíblico y sobrio con comillas angulares españolas.
  - No se traduce mecánicamente «he scattered abroad» como una perífrasis más larga; «Esparció» preserva la imagen sin sobreexplicarla.
  - Se evita «SEÑOR» u otras sustituciones no presentes en el verso.
  - La nota al pie conserva la alternativa lexical documentada para δικαιοσύνη, necesaria por la tensión entre justicia y rectitud.
