    rationale: El expediente inglés documenta 'his righteousness' como lectura principal en contexto paulino, con 'justice' en nota. El borrador invierte esa prioridad sin necesidad textual suficiente. En español, 'su rectitud' preserva mejor la decisión documentada y mantiene la alternativa 'justicia' en nota.
