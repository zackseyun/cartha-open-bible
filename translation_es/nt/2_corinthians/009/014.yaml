translation:
  language: es
  text: y en la oración de ellos por ustedes[a], los anhelan a causa de la gracia sobreabundante de Dios sobre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la súplica de ellos por ustedes, anhelándolos».
    reason: lexical_alternative
lexical_decisions:
- source_word: δέησις
  english_pob_choice: prayer
  chosen_spanish: oración
  alternatives_spanish:
  - súplica
  - petición
  lexicon: BDAG
  rationale: En este contexto, δέησις se entiende como una intercesión ferviente. «Oración» es natural en español y abarca bien la idea sin volver el texto técnico o rígido; «súplica» también es posible, pero aquí no es necesaria para la claridad.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: de ellos
  alternatives_spanish:
  - su
  - de ellos mismos
  lexicon: BDAG
  rationale: El genitivo plural señala posesión o pertenencia respecto de la oración. «De ellos» conserva con transparencia esa relación y evita añadir ambigüedad sobre un posesivo singular en español.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - a favor de ustedes
  - en favor de ustedes
  - por ustedes mismos
  lexicon: BDAG
  rationale: ὑπέρ con genitivo en contexto de oración expresa intercesión en beneficio de otros. «Por ustedes» es la equivalencia más natural y breve en español.
- source_word: ἐπιποθούντων
  english_pob_choice: they long for
  chosen_spanish: anhelan
  alternatives_spanish:
  - desean con fervor
  - sienten profundo cariño por ustedes
  - suspiran por ustedes
  lexicon: BDAG
  rationale: El participio presente comunica deseo continuo e intenso. «Anhelan» preserva esa fuerza afectiva sin sobreexplicar ni debilitar el verbo.
- source_word: διὰ
  english_pob_choice: because of
  chosen_spanish: a causa de
  alternatives_spanish:
  - por
  - debido a
  - en razón de
  lexicon: BDAG
  rationale: Con acusativo, διά indica causa o motivo. «A causa de» expresa de forma clara esa relación causal en español.
- source_word: ὑπερβάλλουσαν
  english_pob_choice: surpassing
  chosen_spanish: sobresaliente
  alternatives_spanish:
  - superabundante
  - excedente
  - sobreabundante
  lexicon: BDAG
  rationale: El participio modifica χάριν y comunica excedencia o prominencia. «Sobresaliente» intenta conservar la idea de algo que destaca y rebasa lo ordinario, en un español natural; «superabundante» sería más literal, pero menos idiomático.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don de gracia
  lexicon: BDAG
  rationale: En Pablo, χάρις tiene peso teológico y debe mantenerse como «gracia». No se reduce a simple favor humano.
- source_word: ἐφ’ ὑμῖν
  english_pob_choice: upon you
  chosen_spanish: sobre ustedes
  alternatives_spanish:
  - en ustedes
  - encima de ustedes
  - sobre vosotros
  lexicon: BDAG
  rationale: ἐπί con dativo sugiere aquí una gracia que reposa o está presente «sobre» los creyentes. «Sobre ustedes» conserva esa imagen mejor que una formulación más abstracta.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  - e
  lexicon: BDAG
  rationale: Conector simple que enlaza esta cláusula con lo anterior sin añadir énfasis no explicitado en el griego.
theological_decisions:
- issue: Relación entre la oración de ellos y su anhelo por los corintios
  english_pob_reading: The verse describes the recipients of the gift praying for the Corinthians and, in that praying posture, longing for them because of God's grace on them.
  chosen_spanish_reading: La frase presenta a los creyentes como orando por los corintios y, al mismo tiempo, anhelándolos a causa de la gracia de Dios sobre ellos.
  alternative_spanish_readings:
  - 'La frase podría verse de manera más literal como: «y en la oración de ellos por ustedes, anhelando por ustedes…»'
  - También podría entenderse que el anhelo se expresa dentro de la misma oración, sin separar demasiado ambas acciones.
  rationale: El griego es compacto y el participio genitivo ligado a αὐτῶν exige desdoblar la relación en español. Esta redacción mantiene las dos acciones—orar y anhelar—sin resolver artificialmente una tensión sintáctica que el original conserva.
  doctrine_reference: Translation philosophy §3, preserve tension rather than resolve it beyond the text
translation_notes:
  revision_awareness: Coincide con la lectura revisada de alto acuerdo; no se detectaron cambios necesarios respecto del pasaje fuente y la solución anterior se mantiene en sustancia.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις conforme al uso paulino y al estándar del proyecto.
  - Se usa «Dios» para θεοῦ sin matiz alternativo, ya que aquí el griego es explícito.
  - Se conserva «sobre ustedes» para ἐφ’ ὑμῖν para reflejar la imagen espacial/metafórica de la gracia.
  - El marcador de nota [a] está anclado en «por ustedes» para ofrecer la alternativa lexical principal sin duplicar notas.
