revisions:
- from: y en la oración de ellos por ustedes[a], anhelan por ustedes a causa de la gracia sobresaliente de Dios sobre ustedes.
  to: y en la oración de ellos por ustedes[a], los anhelan a causa de la gracia sobreabundante de Dios sobre ustedes.
  rationale: Se requiere una reparación menor, no una relectura doctrinal. «Los anhelan» refleja correctamente ἐπιποθούντων ὑμᾶς en español natural, y «gracia sobreabundante» conserva mejor la fuerza de ὑπερβάλλουσαν que «sobresaliente». Se mantiene «de ellos» y «sobre ustedes» porque siguen siendo fieles y comprensibles, aunque algo formales.
  reviewer_model: gpt-5.4
