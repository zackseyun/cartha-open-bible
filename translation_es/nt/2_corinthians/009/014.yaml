review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: oración/intercesión por los corintios, anhelo hacia ellos, y causa basada en la gracia de Dios sobre ellos. También mantiene adecuadamente χάρις como «gracia» y ἐφ’ ὑμῖν con una imagen cercana a «sobre ustedes». Sin embargo, hay dos puntos donde el español no refleja bien el sentido ni la sintaxis implícita: «anhelan por ustedes» suena poco idiomático y no corresponde bien a ἐπιποθούντων ὑμᾶς, que pide objeto directo («los anhelan» / «anhelan verlos» / «anhelan estar con ustedes»); y «sobresaliente» para ὑπερβάλλουσαν debilita el matiz de excedencia o sobreabundancia más que de mera distinción.'
  spanish_quality_summary: 'El texto es generalmente claro, pero presenta giros poco naturales: «en la oración de ellos» es entendible, aunque «en su oración» sería más fluido; aun así, «de ellos» puede tolerarse si se busca máxima transparencia. El problema principal es «anhelan por ustedes», que en español general resulta forzado. Además, «gracia sobresaliente» no suena teológicamente ni idiomáticamente tan bien como «gracia extraordinaria» o mejor «gracia sobreabundante/superabundante». Conviene un ajuste menor para lograr español más natural y más fiel al valor léxico.'
  glossary_alignment: Se alinea bien con los términos del proyecto en «Dios» y «gracia». No hay conflicto con terminología mayor. La principal corrección léxica requerida es ἐπιποθούντων → «anhelándolos»/«anhelan verlos» en vez de «anhelan por ustedes», y ὑπερβάλλουσαν → una opción que exprese excedencia real, preferiblemente «sobreabundante».
  issues:
  - severity: medium
    issue: «anhelan por ustedes» no es una construcción española natural para ἐπιποθούντων ὑμᾶς
    rationale: El verbo griego toma a «ustedes» como objeto directo. En español, «anhelar por» es marcado y aquí suena incorrecto o al menos torpe. Debe decir «los anhelan», «anhelan estar con ustedes» o una formulación equivalente.
  - severity: medium
    issue: «sobresaliente» debilita el sentido de ὑπερβάλλουσαν
    rationale: ὑπερβάλλουσαν comunica algo que excede, sobrepasa o rebasa. «Sobresaliente» en español suele significar distinguido/notable, no necesariamente abundante o superlativo en el mismo sentido. «Sobreabundante» o «extraordinaria» representan mejor el matiz.
  - severity: low
    issue: La nota alternativa repite el problema de régimen verbal en español
    rationale: «Anhelándolos con intenso deseo» es aceptable, pero la formulación principal de la nota («en la súplica de ellos por ustedes...») podría mantenerse mejor si el texto revisado también ajusta la redacción para sonar más natural y paralela al original.
  revised_spanish_text: y en la oración de ellos por ustedes[a], los anhelan a causa de la gracia sobreabundante de Dios sobre ustedes.
  revised_footnotes:
  - marker: a
    text: O «en la súplica de ellos por ustedes, anhelándolos».
    reason: lexical_alternative
