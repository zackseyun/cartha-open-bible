  - severity: medium
    issue: La nota [a] está anclada en «ustedes» pero explica «toda suficiencia»
    rationale: La nota trata del sentido de αὐτάρκεια («suficiencia / todo lo necesario»). Debe marcar la frase correspondiente en el texto para cumplir la disciplina de notas del proyecto.
  - severity: medium
    issue: «abunden para toda buena obra» es menos fiel e idiomático que «abunden en toda buena obra»
    rationale: La decisión auditada en inglés eligió «in every good work» precisamente por la combinación con «abound». En español, tras «abundar», «en toda buena obra» preserva mejor esa relación y suena más natural.
  revised_spanish_text: Y Dios puede hacer que toda gracia abunde para ustedes, para que, en todo y siempre, teniendo toda suficiencia[a], abunden en toda buena obra.
