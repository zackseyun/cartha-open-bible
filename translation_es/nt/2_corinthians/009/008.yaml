revisions:
- from: Y Yahvé puede hacer que toda gracia abunde para ustedes[a], para que, en todo y siempre, teniendo toda suficiencia, abunden para toda buena obra.
  to: Y Dios puede hacer que toda gracia abunde para ustedes, para que, en todo y siempre, teniendo toda suficiencia[a], abunden en toda buena obra.
  rationale: Se corrige «Yahvé» a «Dios» porque el griego dice θεός. Se mueve la nota al lugar de «toda suficiencia» porque explica αὐτάρκεια. Se cambia «para toda buena obra» por «en toda buena obra» para ajustarse mejor al original, a la decisión auditada y al español natural.
