translation:
  language: es
  text: Y Dios puede hacer que toda gracia abunde para ustedes, para que, en todo y siempre, teniendo toda suficiencia[a], abunden en toda buena obra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «teniendo todo lo necesario». El término griego puede denotar suficiencia, adecuación o contentamiento; aquí se refiere a la provisión adecuada de Dios, no a una autosuficiencia independiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: δυνατεῖ
  english_pob_choice: is able
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: El griego expresa capacidad efectiva de Dios. En español, «puede» es natural y conserva la idea de poder divino sin añadir matices innecesarios.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: Aquí δέ es conectivo suave, no adversativo fuerte. «Y» mantiene el flujo del argumento en español.
- source_word: πᾶσαν χάριν
  english_pob_choice: all grace
  chosen_spanish: toda gracia
  alternatives_spanish:
  - cada gracia
  - toda favor
  lexicon: BDAG
  rationale: «Toda gracia» conserva la amplitud de πᾶσαν y la densidad teológica de χάρις. En este contexto no se reduce a favor subjetivo ni se limita a ayuda material.
- source_word: περισσεῦσαι
  english_pob_choice: to make ... abound
  chosen_spanish: hacer que ... abunde
  alternatives_spanish:
  - hacer que ... sobreabunde
  - hacer que ... rebose
  lexicon: BDAG
  rationale: El infinitivo con χάριν y εἰς ὑμᾶς expresa la acción causativa de Dios. «Hacer que ... abunde» es natural en español y conserva el sentido verbal.
- source_word: εἰς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - hacia ustedes
  - a ustedes
  lexicon: BDAG
  rationale: La dirección hacia los corintios se expresa de forma idiomática en español con «para ustedes».
- source_word: ἐν παντὶ πάντοτε
  english_pob_choice: in everything, at all times
  chosen_spanish: en todo y siempre
  alternatives_spanish:
  - en cada cosa, siempre
  - en toda circunstancia, en todo tiempo
  lexicon: BDAG
  rationale: La acumulación de lenguaje de totalidad se conserva de manera breve y natural. «En todo y siempre» reproduce la fuerza enfática sin sonar pesado.
- source_word: πᾶσαν αὐτάρκειαν
  english_pob_choice: all sufficiency
  chosen_spanish: toda suficiencia
  alternatives_spanish:
  - todo lo necesario
  - plena suficiencia
  - toda suficiencia y contentamiento
  lexicon: BDAG
  rationale: «Suficiencia» mantiene el vínculo léxico con αὐτάρκεια y evita importar la idea filosófica de autosuficiencia. El modificador «toda» conserva la amplitud del griego.
- source_word: ἔχοντες
  english_pob_choice: having
  chosen_spanish: teniendo
  alternatives_spanish:
  - poseyendo
  - contando con
  lexicon: BDAG
  rationale: 'El participio simultáneo se expresa con «teniendo» para mantener la estructura sintáctica del original: al tener suficiencia, abunden.'
- source_word: περισσεύητε
  english_pob_choice: you may abound
  chosen_spanish: abunden
  alternatives_spanish:
  - rebosen
  - sobren
  lexicon: BDAG
  rationale: Se conserva el motivo de abundancia con el mismo verbo que en la primera mitad del versículo, siguiendo la repetición retórica del griego.
- source_word: εἰς πᾶν ἔργον ἀγαθόν
  english_pob_choice: in every good work
  chosen_spanish: para toda buena obra
  alternatives_spanish:
  - en toda buena obra
  - hacia toda buena obra
  lexicon: BDAG
  rationale: Tras «abunden», en español suena natural expresar finalidad con «para». Se conserva el alcance total de πᾶν ἔργον ἀγαθόν mediante «toda buena obra».
theological_decisions:
- issue: Sentido de χάρις en un contexto de generosidad
  english_pob_reading: grace as God's gracious provision broadly conceived, including material enablement for generosity
  chosen_spanish_reading: gracia como provisión generosa de Dios, incluyendo el sostén necesario para dar
  alternative_spanish_readings:
  - favor solamente
  - don
  rationale: El contexto habla de la capacidad dada por Dios para la generosidad. «Toda gracia» conserva la amplitud teológica de χάρις y no la reduce a dinero o a un simple favor.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Sentido de αὐτάρκεια
  english_pob_reading: sufficiency/adequacy rather than philosophical self-sufficiency
  chosen_spanish_reading: suficiencia/adecuación, no autosuficiencia filosófica
  alternative_spanish_readings:
  - contentamiento
  - autosuficiencia
  rationale: La provisión viene de Dios para que los creyentes puedan seguir siendo generosos. «Suficiencia» evita la carga estoica de independencia y refleja mejor la dependencia de Dios.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto griego y la auditoría inglesa muestran alto acuerdo en la interpretación general. Se mantuvo la repetición de abundancia y la lectura de αὐτάρκεια como suficiencia, no autosuficiencia.
  spanish_consistency_notes:
  - Se usa «Yahvé» para θεός en esta traducción según el estándar del proyecto, sin ocultar el nombre divino.
  - Se mantiene la repetición de «abunde/abunden» para reflejar el paralelismo retórico de περισσεῦσαι / περισσεύητε.
  - «Toda suficiencia» y la nota preservan la tensión entre suficiencia y contentamiento sin introducir autosuficiencia.
  - «Para ustedes» y «para toda buena obra» expresan dirección y finalidad con español natural, sin perder el sentido del griego.
