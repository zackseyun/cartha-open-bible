revisions:
- from: Pero envié a los hermanos[a], para que nuestra gloria acerca de ustedes no quedara vacía en este asunto[b], para que, así como estaba diciendo, ustedes estuvieran preparados.
  to: Pero envié a los hermanos[a], para que nuestra jactancia acerca de ustedes no quede en nada en este asunto[b], para que, tal como venía diciendo, ustedes estén preparados.
  rationale: Se revisa «nuestra gloria» a «nuestra jactancia» para reflejar con fidelidad καύχημα, que en este contexto es el acto o contenido de gloriarse respecto de los corintios. Se ajusta «no quedara vacía» a «no quede en nada» para un español más natural que aún preserva la idea de κενωθῇ como vaciar/anular. Se mejora «así como estaba diciendo» a «tal como venía diciendo» para expresar mejor el imperfecto ἔλεγον en español idiomático. También se adopta «estén preparados», más natural después de la finalidad con «para que», sin pérdida del estado resultante de παρεσκευασμένοι ἦτε.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:31Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el sentido general del griego: ἔπεμψα = «envié», τοὺς ἀδελφούς = «los hermanos», ἐν τῷ μέρει τούτῳ = «en este asunto», y el propósito doble con ἵνα está bien reflejado. Sin embargo, τὸ καύχημα ἡμῶν τὸ ὑπὲρ ὑμῶν no se preserva fielmente con «nuestra gloria acerca de ustedes»; καύχημα aquí significa «jactancia/gloriarse/boast», no «gloria» en sentido abstracto. Además, el matiz verbal de κενωθῇ puede expresarse mejor en español con «quede en nada» o «resulte vacía», más idiomático y cercano al valor de ‘quedar vacío/ser invalidado’.'
  spanish_quality_summary: El español es generalmente claro y digno, pero «nuestra gloria acerca de ustedes» suena poco natural y semánticamente impreciso en español bíblico actual. «Así como estaba diciendo» es aceptable, aunque «como venía diciendo» o «tal como decía» suena más natural; no es un error grave. El resto del versículo lee bien y mantiene un registro epistolar adecuado.
  glossary_alignment: 'No hay conflictos con la terminología teológica del proyecto. La cuestión principal es léxica: καύχημα debe rendirse con un término del campo de «jactancia/gloriarse/motivo de orgullo», no con «gloria». «Los hermanos» concuerda con la decisión auditada. Las notas al pie están bien planteadas; conviene conservar la nota sobre «en este asunto/respeto/caso».'
  issues:
  - severity: high
    issue: «nuestra gloria acerca de ustedes» no refleja adecuadamente καύχημα
    rationale: καύχημα en este contexto se refiere a la jactancia o al motivo de orgullo de Pablo respecto de los corintios. «Gloria» en español cambia el campo semántico y puede sugerir honor o esplendor, no el acto/contenido de gloriarse.
  - severity: medium
    issue: La formulación de κενωθῇ como «no quedara vacía» es aceptable pero algo rígida
    rationale: El griego conserva la imagen de vaciamiento o nulificación; en español bíblico natural, «no quede en nada», «no resulte vacía» o «no sea vaciada» comunican mejor el sentido idiomático sin perder la imagen.
  - severity: low
    issue: «Así como estaba diciendo» es algo poco idiomático
    rationale: Aunque reproduce el imperfecto, en español suena más natural «tal como decía» o «como venía diciendo», manteniendo el matiz de acción continuada o repetida.
  revised_spanish_text: Pero envié a los hermanos[a], para que nuestra jactancia acerca de ustedes no quede en nada en este asunto[b], para que, tal como venía diciendo, ustedes estén preparados.
  revised_footnotes:
