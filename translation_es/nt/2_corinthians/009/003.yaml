translation:
  language: es
  text: Pero envié a los hermanos[a], para que nuestra jactancia acerca de ustedes no quede en nada en este asunto[b], para que, tal como venía diciendo, ustedes estén preparados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los hermanos y hermanas»; aquí se conserva el masculino plural del griego y la referencia probable a los enviados concretos.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en este respecto» o «en este caso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_spanish: envié
  alternatives_spanish:
  - he enviado
  lexicon: BDAG
  rationale: El aoristo indica una acción pasada completa; en español, el pretérito perfecto simple comunica mejor esa puntualidad narrativa que un presente perfecto.
- source_word: τοὺς ἀδελφούς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  lexicon: BDAG
  rationale: Se mantiene el plural masculino del griego y la referencia a los delegados concretos del contexto. No se amplía a un grupo mixto sin base textual inmediata.
- source_word: τὸ καύχημα ἡμῶν τὸ ὑπὲρ ὑμῶν
  english_pob_choice: our boasting about you
  chosen_spanish: nuestra gloria acerca de ustedes
  alternatives_spanish:
  - nuestra jactancia acerca de ustedes
  - nuestro motivo de gloria acerca de ustedes
  lexicon: BDAG
  rationale: καύχημα puede ser 'jactancia/boast' o el objeto de gloriarse. En español, 'gloria' conserva el campo de orgullo/boast sin sonar tan áspero como 'jactancia', aunque queda como opción interpretativa moderada. 'Acerca de ustedes' refleja ὑπὲρ ὑμῶν de modo idiomático.
- source_word: κενωθῇ
  english_pob_choice: might not be emptied
  chosen_spanish: no quedara vacía
  alternatives_spanish:
  - no fuera vaciada
  - no resultara vacía
  - no quedara sin contenido
  lexicon: BDAG
  rationale: El verbo de vaciarse se expresa de forma natural en español con 'quedar vacía'. Mantiene la imagen de algo que pierde su contenido o valor sin forzar un calco.
- source_word: ἐν τῷ μέρει τούτῳ
  english_pob_choice: in this matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en este respecto
  - en este caso
  lexicon: BDAG
  rationale: μέρος aquí significa 'ámbito/aspecto/asunto' más que 'parte' física. 'Asunto' es claro y acorde con el registro epistolar.
- source_word: καθὼς ἔλεγον
  english_pob_choice: just as I was saying
  chosen_spanish: así como estaba diciendo
  alternatives_spanish:
  - tal como yo decía
  - como venía diciendo
  lexicon: BDAG
  rationale: El imperfecto ἔλεγον sugiere una referencia a lo dicho reiteradamente o en progreso; 'estaba diciendo' conserva ese matiz mejor que un simple pasado.
- source_word: παρεσκευασμένοι ἦτε
  english_pob_choice: you may be prepared
  chosen_spanish: ustedes estuvieran preparados
  alternatives_spanish:
  - ustedes estén preparados
  - ustedes pudieran estar preparados
  lexicon: BDAG
  rationale: La construcción perifrástica expresa un estado resultante/esperado de preparación. En español, el subjuntivo imperfecto armoniza con la finalidad y con la dependencia de la oración subordinada.
translation_notes:
  revision_awareness: No se registran revisiones previas; se sigue de cerca el texto griego SBLGNT y el rastro auditado en inglés, manteniendo las decisiones léxicas clave sin añadir material ajeno al versículo.
  spanish_consistency_notes:
  - Se preserva el contraste entre la acción pasada de enviar y la finalidad expresada por las cláusulas con ἵνα.
  - Se conserva el valor figurado de 'vacía' para κενωθῇ, evitando una paráfrasis que borre la imagen.
  - '''Los hermanos'' se usa como traducción gender-accurate del grupo masculino plural del griego en este contexto.'
  - '''Este asunto'' refleja el sentido contextual de μέρει como ámbito o respecto, no como ''parte'' material.'
