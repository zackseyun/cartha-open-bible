revisions:
- from: Por tanto, consideré necesario rogar a los hermanos que se adelantaran a ustedes y prepararan de antemano su promesa de bendición[a][b], para que estuviera lista así, como bendición y no como avidez[c].
  to: Por tanto, consideré necesario instar a los hermanos[a] a que fueran antes a ustedes y prepararan de antemano su bendición prometida previamente[b], para que estuviera lista de este modo, como bendición y no como codicia[c].
  rationale: Se corrige el error principal de sentido cambiando «su promesa de bendición» por «su bendición prometida previamente», de modo que el adjetivo/participio griego modifique a «bendición» y no convierta el objeto en una «promesa». También se ajusta παρακαλέσαι a «instar» para reflejar mejor el tono exhortativo, se mejora la fluidez de οὕτως con «de este modo», y se reemplaza «avidez» por «codicia» para corresponder más fielmente a πλεονεξία y al rastro léxico inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:00Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general del griego: necesidad deliberada, envío anticipado de los hermanos, preparación previa y contraste entre εὐλογία y πλεονεξία. Sin embargo, hay una desviación importante en τὴν προεπηγγελμένην εὐλογίαν ὑμῶν: el español dice «su promesa de bendición», que convierte la bendición prometida en la promesa misma. El griego y el rastro inglés requieren «su bendición prometida previamente» o equivalente, es decir, la contribución prometida, no la promesa.'
  spanish_quality_summary: El texto es mayormente natural y legible, pero «rogar a los hermanos» suena algo más suplicante que el griego en este contexto; «instar» o «animar» encajan mejor con παρακαλέσαι. Además, «avidez» para πλεονεξίαν es menos preciso y menos idiomático en este contraste moral que «codicia» o «avaricia». También conviene mejorar «así, como bendición» a «de este modo, como bendición» para mayor fluidez.
  glossary_alignment: Se mantiene correctamente «bendición» para εὐλογία y «los hermanos» con nota inclusiva, en línea con la política POB. No hay términos del glosario maestro en conflicto. La principal corrección léxica es no reemplazar εὐλογία por «promesa». Para πλεονεξίαν, «codicia» se alinea mejor con la decisión inglesa documentada («greed»).
  issues:
  - severity: high
    issue: «su promesa de bendición» traduce mal τὴν προεπηγγελμένην εὐλογίαν ὑμῶν
    rationale: El participio προεπηγγελμένην modifica εὐλογίαν, no un sustantivo implícito «promesa». Pablo habla de la bendición/contribución previamente prometida por ellos, no de su promesa como tal.
  - severity: medium
    issue: «rogar» debilita o desplaza el matiz de παρακαλέσαι
    rationale: En este contexto de gestión práctica y urgencia, «instar» o «animar» representan mejor la fuerza de «urge» del POB que una súplica como «rogar».
  - severity: medium
    issue: «avidez» no comunica tan claramente πλεονεξίαν
    rationale: πλεονεξία denota codicia/avaricia. «Avidez» en español puede sonar más amplia o menos moralmente precisa; «codicia» preserva mejor el contraste con «bendición».
  - severity: low
    issue: «así, como bendición» es algo torpe
    rationale: Una formulación como «de este modo, como bendición» refleja οὕτως y suena más natural en español eclesial general.
  revised_spanish_text: Por tanto, consideré necesario instar a los hermanos[a] a que fueran antes a ustedes y prepararan de antemano su bendición prometida previamente[b], para que estuviera lista de este modo, como bendición y no como codicia[c].
  revised_footnotes:
