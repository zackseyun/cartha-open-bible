translation:
  language: es
  text: Por tanto, consideré necesario instar a los hermanos[a] a que fueran antes a ustedes y prepararan de antemano su bendición prometida previamente[b], para que estuviera lista de este modo, como bendición y no como codicia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas», si se entiende que la delegación incluía también mujeres.
    reason: lexical_alternative
  - marker: b
    text: «Bendición» aquí se refiere a la contribución prometida por los corintios; también puede entenderse como «ofrenda generosa» o «regalo generoso».
    reason: lexical_alternative
  - marker: c
    text: O «no como una exigencia codiciosa». El griego expresa más literalmente «codicia» o «avaricia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀναγκαῖον
  english_pob_choice: necessary
  chosen_spanish: necesario
  alternatives_spanish:
  - indispensable
  - preciso
  lexicon: BDAG
  rationale: Predicado de necesidad; «necesario» expresa adecuadamente la conveniencia obligada sin endurecerla más de lo que el griego exige.
- source_word: ἡγησάμην
  english_pob_choice: I considered
  chosen_spanish: consideré
  alternatives_spanish:
  - pensé
  - estimé
  lexicon: BDAG
  rationale: El aoristo medio presenta un juicio deliberado de Pablo; «consideré» conserva ese matiz reflexivo y ponderado.
- source_word: παρακαλέσαι
  english_pob_choice: to urge
  chosen_spanish: rogar
  alternatives_spanish:
  - exhortar
  - instar
  - animar
  lexicon: BDAG
  rationale: Aquí Pablo presiona a la acción con cortesía y fuerza. «Rogar» comunica súplica insistente sin sonar técnico ni demasiado duro; se prefiere sobre «exhortar» por naturalidad española.
- source_word: τοὺς ἀδελφοὺς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  lexicon: BDAG
  rationale: Se conserva el plural masculino del griego en el texto principal. La posible inclusión mixta queda abierta por el contexto y se refleja en nota.
- source_word: προέλθωσιν εἰς ὑμᾶς
  english_pob_choice: to go on ahead to you
  chosen_spanish: que se adelantaran a ustedes
  alternatives_spanish:
  - que fueran delante de ustedes
  - que llegaran antes a ustedes
  lexicon: BDAG
  rationale: El compuesto implica ir antes en el tiempo y en la llegada. «Se adelantaran a ustedes» expresa bien la prioridad de llegada y preparación.
- source_word: προκαταρτίσωσι
  english_pob_choice: prepare in advance
  chosen_spanish: prepararan de antemano
  alternatives_spanish:
  - dispusieran de antemano
  - arreglaran previamente
  lexicon: BDAG
  rationale: El verbo combina preparación con anticipación temporal. «Prepararan de antemano» mantiene claridad y el valor previo del prefijo.
- source_word: προεπηγγελμένην
  english_pob_choice: previously promised
  chosen_spanish: promesa ... de antemano
  alternatives_spanish:
  - prometida previamente
  - anunciada de antemano
  lexicon: BDAG
  rationale: El participio alude a una promesa ya hecha por los corintios. En español se integra como «promesa ... de antemano» para conservar el carácter anticipado sin forzar la sintaxis.
- source_word: εὐλογίαν
  english_pob_choice: blessing
  chosen_spanish: bendición
  alternatives_spanish:
  - regalo generoso
  - don generoso
  lexicon: BDAG
  rationale: Se conserva el campo léxico de bendición, como en el texto inglés, para mantener el juego verbal con πλεονεξίαν. En el contexto de la colecta también puede implicar una ofrenda generosa; esa posibilidad queda en la nota.
- source_word: ἑτοίμην εἶναι
  english_pob_choice: might be ready
  chosen_spanish: estuviera lista
  alternatives_spanish:
  - estuviera preparada
  - quedara lista
  lexicon: BDAG
  rationale: La construcción de propósito expresa resultado deseado. «Estuviera lista» es natural en español y conserva la idea de disponibilidad.
- source_word: οὕτως ὡς εὐλογίαν
  english_pob_choice: in this way as a blessing
  chosen_spanish: así, como bendición
  alternatives_spanish:
  - de este modo, como bendición
  - en esta forma, como bendición
  lexicon: BDAG
  rationale: Se hace explícito el adverbio «así»/«de este modo» para reflejar οὕτως, tal como muestra la revisión inglesa, y se mantiene la repetición de «bendición».
- source_word: πλεονεξίαν
  english_pob_choice: greed
  chosen_spanish: avidez
  alternatives_spanish:
  - codicia
  - ambición desmedida
  - avaricia
  lexicon: BDAG
  rationale: πλεονεξία designa codicia/greed. «Avidez» suena más natural en español contemporáneo y mantiene la idea de deseo posesivo; se deja abierta la dureza semántica en nota.
theological_decisions:
- issue: Posible inclusión del grupo llamado ἀδελφοὺς
  english_pob_reading: the brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  rationale: Se sigue la forma masculina plural del griego como lectura principal, sin neutralizarla en el texto. La inclusión de mujeres en la delegación queda como posibilidad contextual, no como imposición textual.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #4'
- issue: Sentido de εὐλογία en una colecta monetaria
  english_pob_reading: blessing
  chosen_spanish_reading: bendición
  alternative_spanish_readings:
  - regalo generoso
  - ofrenda generosa
  - don generoso
  rationale: Se conserva «bendición» para mantener la repetición retórica y el marco teológico del pasaje. El matiz de ofrenda concreta se sugiere en nota sin sustituir el término clave.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #5'
- issue: Contraste final con πλεονεξίαν
  english_pob_reading: greed
  chosen_spanish_reading: avidez
  alternative_spanish_readings:
  - codicia
  - avaricia
  - exacción mezquina
  rationale: El contraste no debe suavizarse. «Avidez» comunica apropiación desordenada y deja ver el peso ético del término, aunque otras traducciones posibles sean legítimas.
  doctrine_reference: BDAG πλεονεξία
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que añadió la idea de «in this way» para reflejar οὕτως, y se incorporó con «así». También se respetó el contraste final entre «blessing» y «greed» sin diluirlo.
  spanish_consistency_notes:
  - Se mantuvo «bendición» como término clave para εὐλογία, en coherencia con el POB inglés.
  - Se prefirió una forma verbal natural en español («se adelantaran», «prepararan») para conservar el flujo del propósito griego.
  - Se evitó introducir terminología eclesiástica tradicional no atestiguada por la evidencia textual.
  - La puntuación y el orden sintáctico buscan una lectura pública clara sin perder los paralelos retóricos del versículo.
