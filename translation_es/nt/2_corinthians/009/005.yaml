    reason: lexical_alternative
  - marker: c
    text: O «no como una exigencia codiciosa». El griego expresa más literalmente «codicia» o «avaricia».
    reason: lexical_alternative
  revision_rationale: Se corrige el error principal de sentido cambiando «su promesa de bendición» por «su bendición prometida previamente», de modo que el adjetivo/participio griego modifique a «bendición» y no convierta el objeto en una «promesa». También se ajusta παρακαλέσαι a «instar» para reflejar mejor el tono exhortativo, se mejora la fluidez de οὕτως con «de este modo», y se reemplaza «avidez» por «codicia» para corresponder más fielmente a πλεονεξία y al rastro léxico inglés.
