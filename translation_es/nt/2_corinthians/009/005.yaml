source:
  edition: SBLGNT
  text: ἀναγκαῖον οὖν ἡγησάμην παρακαλέσαι τοὺς ἀδελφοὺς ἵνα προέλθωσιν ⸀εἰς ὑμᾶς καὶ προκαταρτίσωσι τὴν ⸀προεπηγγελμένην εὐλογίαν ὑμῶν, ταύτην ἑτοίμην εἶναι οὕτως ὡς εὐλογίαν καὶ μὴ ὡς πλεονεξίαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/009/005.yaml
  text: Therefore I considered it necessary to urge the brothers to go on ahead to you and prepare in advance your previously promised blessing[c][b][a], so that it might be ready in this way as a blessing and not as greed.
  footnotes:
  - marker: a
    text: Or 'brothers and sisters,' if the delegation is understood inclusively.
    reason: lexical_alternative
  - marker: b
    text: '''Blessing'' here refers to the Corinthians'' promised contribution; alternatively, ''generous gift'' or ''bountiful gift.'''
    reason: lexical_alternative
  - marker: c
    text: Or 'not as a grudging exaction.' The Greek word more literally means 'greed' or 'covetousness.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
