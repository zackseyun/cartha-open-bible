translation:
  language: es
  text: Porque el ministerio de este servicio no solo suple las necesidades de los santos[a], sino que también abunda en muchas acciones de gracias a Dios[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las carencias de los santos».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «rebosando en muchas acciones de gracias a Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce una explicación de lo anterior. «Porque» conserva bien esa fuerza explicativa en español, con un tono natural y sobrio.
- source_word: διακονία
  english_pob_choice: ministry
  chosen_spanish: ministerio
  alternatives_spanish:
  - servicio
  - diaconía
  lexicon: BDAG
  rationale: Dado que λειτουργία sigue inmediatamente, conviene mantener una distinción en español entre ambos sustantivos. «Ministerio» preserva el valor de una labor encomendada, sin borrar el matiz funcional de λειτουργία.
- source_word: λειτουργίας
  english_pob_choice: service
  chosen_spanish: servicio
  alternatives_spanish:
  - servicio público
  - ministerio
  lexicon: BDAG
  rationale: «Servicio» reproduce el carácter de λειτουργία como prestación/acto de servicio y evita confundirlo con διακονία, que ya se tradujo como «ministerio».
- source_word: ταύτης
  english_pob_choice: this
  chosen_spanish: este
  alternatives_spanish:
  - este mismo
  lexicon: BDAG
  rationale: El demostrativo señala el servicio concreto en discusión; «este» es suficiente y natural en español.
- source_word: προσαναπληροῦσα
  english_pob_choice: supplying
  chosen_spanish: supliendo
  alternatives_spanish:
  - llenando lo que falta
  - suministrando
  lexicon: BDAG
  rationale: El participio expresa la acción de suplir lo que falta. «Supliendo» comunica bien ese sentido continuo y mantiene la relación con las carencias mencionadas.
- source_word: τὰ ὑστερήματα
  english_pob_choice: needs
  chosen_spanish: las necesidades
  alternatives_spanish:
  - lo que falta
  - las carencias
  - las deficiencias
  lexicon: BDAG
  rationale: En este contexto de contribución para hermanos necesitados, «necesidades» expresa de forma natural la idea de carencias que deben ser suplidas, sin volverlo demasiado abstracto.
- source_word: τῶν ἁγίων
  english_pob_choice: the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - de los santos de Dios
  - de los creyentes
  lexicon: BDAG
  rationale: «Santos» preserva el término paulino habitual para los creyentes y mantiene la correspondencia terminológica con el griego y con la traducción inglesa auditada.
- source_word: περισσεύουσα
  english_pob_choice: overflowing
  chosen_spanish: abundando
  alternatives_spanish:
  - rebosando
  - desbordando
  lexicon: BDAG
  rationale: El verbo comunica abundancia más allá de lo suficiente. «Abundando» conserva ese sentido en español y encaja con la frase siguiente.
- source_word: διὰ πολλῶν εὐχαριστιῶν
  english_pob_choice: in many thanksgivings
  chosen_spanish: en muchas acciones de gracias
  alternatives_spanish:
  - por medio de muchas acciones de gracias
  - con muchas acciones de gracias
  lexicon: BDAG
  rationale: El inglés revisado entiende la construcción como una abundancia que se expresa en agradecimientos dirigidos a Dios. «En muchas acciones de gracias» refleja esa relación de esfera/manifestación con naturalidad en español.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Yahvé
  alternatives_spanish:
  - a Dios
  - para Dios
  lexicon: BDAG
  rationale: El dativo apunta al destinatario de las acciones de gracias. En esta serie, el proyecto usa «Yahvé» para el nombre divino cuando el texto se dirige explícitamente a Dios; aquí la combinación con εὐχαριστίαις y el flujo doxológico justifican mantener el nombre divino en lugar de una máscara reverencial.
theological_decisions:
- issue: Término paulino ἅγιοι
  english_pob_reading: the saints
  chosen_spanish_reading: los santos
  alternative_spanish_readings:
  - los creyentes
  - el pueblo de Dios
  rationale: «Los santos» preserva el término eclesial de Pablo sin introducir una lectura posterior de canonización. Es la opción más fiel al valor terminológico del texto.
  doctrine_reference: Translation philosophy §5 (consistencia de términos clave)
- issue: Nombre divino en el dativo τῷ θεῷ
  english_pob_reading: to God
  chosen_spanish_reading: a Yahvé
  alternative_spanish_readings:
  - a Dios
  rationale: Aunque θεῷ puede traducirse genéricamente como «Dios», el contexto de agradecimiento explícito orientado hacia el Dios bíblico favorece el uso de «Yahvé» según la política del proyecto. Se conserva así la transparencia del nombre divino sin perder la referencia teológica.
  doctrine_reference: 'Terminología del proyecto: יהוה / YHWH -> Yahvé'
translation_notes:
  revision_awareness: La versión inglesa auditada pasó de «through many thanksgivings to God» a «in many thanksgivings to God» para reflejar más naturalmente la construcción griega. La redacción española adopta «en muchas acciones de gracias» para seguir esa revisión y evitar una lectura demasiado instrumental de διά.
  spanish_consistency_notes:
  - Se mantuvo la distinción entre «ministerio» (διακονία) y «servicio» (λειτουργία).
  - Se tradujo ἅγιοι de forma consistente como «santos», conforme al uso paulino del proyecto.
  - Se usó «Yahvé» para τῷ θεῷ siguiendo la política terminológica del proyecto para el nombre divino.
  - Se preservó el matiz de abundancia de περισσεύουσα con «abundando».
  - Las notas al pie conservan la alternativa léxica principal donde el griego admite más de una lectura en español.
