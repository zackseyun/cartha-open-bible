revisions:
- from: Porque el ministerio de este servicio no solo está supliendo las necesidades de los santos[a], sino que también está abundando en muchas acciones de gracias a Yahvé[b]—
  to: Porque el ministerio de este servicio no solo suple las necesidades de los santos[a], sino que también abunda en muchas acciones de gracias a Dios[b]—
  rationale: Se corrige «a Yahvé» a «a Dios» para ajustarse fielmente a τῷ θεῷ y a la política terminológica del proyecto, que no convierte automáticamente θεός en «Yahvé». También se suavizan las perífrasis verbales para un español más natural y digno, sin pérdida de sentido. Se conservan las notas léxicas pertinentes y sus anclajes.
