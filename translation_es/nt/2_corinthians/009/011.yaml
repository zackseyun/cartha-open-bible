translation:
  language: es
  text: siendo enriquecidos en toda manera para toda generosidad[a], la cual por medio de nosotros produce acción de gracias a Dios—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «liberalidad»; ἁπλότης también puede significar «sinceridad» o «sencillez» en otros contextos, pero aquí el contexto de la ofrenda favorece «generosidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν παντὶ
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - de toda manera
  - en todos los aspectos
  lexicon: BDAG
  rationale: La expresión griega con ἐν + dativo es amplia e idiomática; en español, «en todo» comunica bien la idea de amplitud o cobertura total sin volver la frase pesada. Se evita una traducción más explicativa que diluya la concisión del participio.
- source_word: πλουτιζόμενοι
  english_pob_choice: being enriched
  chosen_spanish: siendo enriquecidos
  alternatives_spanish:
  - al ser enriquecidos
  - estando enriquecidos
  lexicon: BDAG
  rationale: 'El participio presente pasivo conserva mejor la pasividad: los creyentes reciben la acción de ser enriquecidos. «Siendo enriquecidos» mantiene ese matiz y no convierte la frase en una afirmación de autoenriquecimiento.'
- source_word: εἰς πᾶσαν ἁπλότητα
  english_pob_choice: for all generosity
  chosen_spanish: para toda generosidad[a]
  alternatives_spanish:
  - para toda liberalidad
  - para toda sinceridad
  - para toda sencillez
  lexicon: BDAG
  rationale: En este contexto de colecta y ofrenda, ἁπλότης apunta más naturalmente a generosidad / liberalidad que a sencillez interior. «Generosidad» es el equivalente español más claro; se conserva la nota porque el término griego admite otros sentidos en otros contextos.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - y esta
  lexicon: BDAG
  rationale: El relativo cualitativo se refiere a la generosidad mencionada y presenta su efecto. «La cual» mantiene una referencia clara y algo más formal, apropiada al registro bíblico en español.
- source_word: κατεργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - obra
  - obra para
  - origina
  lexicon: BDAG
  rationale: El verbo indica que algo da como resultado otra cosa. «Produce» es directo y reproduce bien la relación causal entre la generosidad y la acción de gracias.
- source_word: δι’ ἡμῶν
  english_pob_choice: through us
  chosen_spanish: por medio de nosotros
  alternatives_spanish:
  - a través de nosotros
  - mediante nosotros
  lexicon: BDAG
  rationale: La preposición con genitivo expresa medio o agencia. «Por medio de nosotros» es natural en español y deja claro que Pablo y sus compañeros sirven de instrumento en este proceso.
- source_word: εὐχαριστίαν τῷ θεῷ
  english_pob_choice: thanksgiving to God
  chosen_spanish: acción de gracias a Dios
  alternatives_spanish:
  - agradecimiento a Dios
  - gracias a Dios
  lexicon: BDAG
  rationale: 'La forma nominal εὐχαριστίαν pide un sustantivo en español, no solo una exclamación. «Acción de gracias» conserva el peso sustantivo del griego y mantiene el destinatario: Dios.'
theological_decisions:
- issue: Sentido de ἁπλότης en el contexto de la colecta
  english_pob_reading: generosity/openhandedness in giving
  chosen_spanish_reading: generosidad / liberalidad en el dar
  alternative_spanish_readings:
  - sinceridad
  - sencillez
  - singularidad de intención
  rationale: Aunque ἁπλότης puede implicar sinceridad o sencillez en otros contextos, aquí el marco inmediato es la provisión para dar y el resultado es acción de gracias a Dios. Por eso la lectura de generosidad es la más sólida y evita desviar el verso hacia una cualidad interior no central en este pasaje.
  doctrine_reference: Translation philosophy §1, §5
- issue: Relación entre la bendición recibida y la gratitud producida
  english_pob_reading: the gift’s effect is thanksgiving to God through Paul’s ministry
  chosen_spanish_reading: la generosidad producida por el enriquecimiento da como resultado acción de gracias a Dios por medio de la mediación apostólica
  alternative_spanish_readings:
  - la generosidad simplemente causa gratitud
  - la ofrenda produce alabanza a Dios
  rationale: 'El verso conserva una cadena causal: Dios enriquece, eso se expresa en generosidad, y esa generosidad produce acción de gracias a Dios por medio de los apóstoles. Mantener esa secuencia evita suavizar la mediación de ''por medio de nosotros'' y preserva la lógica retórica del texto.'
  doctrine_reference: 2 Corintios 8–9; Translation philosophy §2
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide con la lectura auditada en inglés. No se observan revisiones pendientes ni cambios posteriores que alteren las decisiones léxicas principales.
  spanish_consistency_notes:
  - Se usa «Dios» para τῷ θεῷ, conforme al estándar del proyecto.
  - Se mantiene el tono sobrio y eclesial sin recurrir a formulaciones arcaizantes.
  - 'Se preserva la estructura causal del verso: enriquecimiento → generosidad → acción de gracias a Dios.'
