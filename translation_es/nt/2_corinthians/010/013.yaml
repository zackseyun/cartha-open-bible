translation:
  language: es
  text: 'Pero no nos gloriaremos más allá de la medida[a], sino conforme a la medida de la esfera[b] que Dios nos asignó: una medida que llega incluso hasta ustedes—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘más allá de los límites’; el griego expresa exceder la medida apropiada.
    reason: lexical_alternative
  - marker: b
    text: O ‘ámbito’, ‘regla’ o ‘norma’; aquí κανών alude al campo o esfera asignados por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄμετρα
  english_pob_choice: beyond measure
  chosen_spanish: más allá de lo debido
  alternatives_spanish:
  - más allá de medida
  - más allá de lo medido
  - sin medida
  lexicon: BDAG
  rationale: La idea no es solo de algo 'inmedible', sino de exceder los límites apropiados en el contexto de la jactancia. 'Más allá de lo debido' comunica la noción de exceso con naturalidad en español y conserva el sentido de límite.
- source_word: καυχησόμεθα
  english_pob_choice: we will boast
  chosen_spanish: nos gloriaremos
  alternatives_spanish:
  - nos jactaremos
  - nos alabaremos
  lexicon: BDAG
  rationale: En Pablo, el verbo puede tener el matiz de 'boast' retórico y polémico. 'Gloriarse' es un equivalente tradicional y preciso en español bíblico, sin perder la fuerza del reclamo de mérito.
- source_word: κατὰ τὸ μέτρον
  english_pob_choice: according to the measure
  chosen_spanish: conforme a la medida
  alternatives_spanish:
  - según la medida
  - de acuerdo con la medida
  lexicon: BDAG
  rationale: Conserva la repetición de 'medida' y expresa adecuación o conformidad, reflejando el patrón del griego sin sonar forzado en español.
- source_word: κανόνος
  english_pob_choice: sphere
  chosen_spanish: ámbito
  alternatives_spanish:
  - esfera
  - límite
  - regla
  - norma
  lexicon: BDAG
  rationale: Aquí κανών apunta a una esfera o campo asignado por Dios, no principalmente a una regla moral. 'Ámbito' suena natural en español y mantiene la imagen de un espacio o campo de ministerio delimitado.
- source_word: οὗ ἐμέρισεν ἡμῖν ὁ θεὸς
  english_pob_choice: God assigned to us
  chosen_spanish: que Dios nos asignó
  alternatives_spanish:
  - que Dios nos repartió
  - que Dios nos repartió como porción
  - que Dios nos asignó como porción
  lexicon: BDAG
  rationale: μερίζω expresa aquí asignación o reparto de una porción/sfera. 'Asignó' es claro y fiel al sentido de una tarea o campo divinamente otorgado.
- source_word: μέτρου
  english_pob_choice: a measure
  chosen_spanish: una medida
  alternatives_spanish:
  - una porción medida
  - una medida determinada
  lexicon: BDAG
  rationale: La segunda ocurrencia de μέτρον funciona de manera explicativa y refuerza el lenguaje de límite. 'Una medida' mantiene la repetición y la claridad sin añadir interpretación indebida.
- source_word: ἐφικέσθαι
  english_pob_choice: that reaches
  chosen_spanish: que llega
  alternatives_spanish:
  - que alcanza
  - que se extiende
  lexicon: BDAG
  rationale: El infinitivo expresa alcance o extensión. 'Que llega' es una forma simple y natural de comunicar la extensión del ámbito/medida hasta los destinatarios.
- source_word: ἄχρι καὶ ὑμῶν
  english_pob_choice: even to you
  chosen_spanish: incluso hasta ustedes
  alternatives_spanish:
  - hasta ustedes también
  - aun hasta ustedes
  lexicon: BDAG
  rationale: '''Incluso hasta ustedes'' preserva el énfasis de ἄχρι καί y comunica con claridad que los corintios están incluidos dentro del campo dado por Dios.'
theological_decisions:
- issue: Sentido de κανών en la afirmación sobre el ministerio apostólico
  english_pob_reading: A God-assigned sphere of ministry that includes the Corinthians
  chosen_spanish_reading: Un ámbito de ministerio asignado por Dios que incluye a los corintios
  alternative_spanish_readings:
  - Una regla o norma por la que Pablo mide su jactancia
  - Una frontera o límite fijo
  rationale: El contexto insiste en medida, extensión y alcance ('llega incluso hasta ustedes'). Por eso conviene reflejar un campo o ámbito otorgado por Dios, más que una norma abstracta o una frontera lineal.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El inglés auditado fue revisado de ‘boundary’ a ‘sphere’ para reflejar mejor κανών como campo o esfera asignada. La versión española sigue esa revisión con ‘ámbito’ y mantiene la repetición de ‘medida’ para conservar el patrón del griego.
  spanish_consistency_notes:
  - Se mantuvo 'Dios' para θεός conforme al criterio POB.
  - '''Gloriarnos'' preserva el valor retórico de καυχάομαι en un contexto polémico.'
  - '''Ámbito'' evita la asociación moderna de ''canon'' con una lista escrita y sigue la imagen de una esfera de ministerio.'
  - La frase final conserva el alcance inclusivo hacia los destinatarios, como en el texto griego.
