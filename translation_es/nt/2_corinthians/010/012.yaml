base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/012.yaml
  text: For we do not dare to classify or compare ourselves with some of those who commend themselves[a]. But when they measure themselves by themselves and compare themselves with themselves[b], they do not understand.
  footnotes:
  - marker: a
    text: Or 'include ourselves among' or 'rank ourselves with'; the Greek verb carries the idea of placing oneself in the same category as others.
    reason: lexical_alternative
  - marker: b
    text: Literally 'measuring themselves in themselves and comparing themselves with themselves.' The sense is that they use themselves as their own standard.
    reason: lexical_alternative
