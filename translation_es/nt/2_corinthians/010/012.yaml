translation:
  language: es
  text: Porque no nos atrevemos a clasificarnos ni a compararnos con algunos de los que se recomiendan a sí mismos[a]. Pero ellos, midiéndose a sí mismos por sí mismos y comparándose a sí mismos con sí mismos[b], no entienden.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incluirnos entre» o «ponernos en la misma categoría que»; el verbo griego lleva la idea de colocarse en la misma clase que otros.'
    reason: lexical_alternative
  - marker: b
    text: 'Lit.: «midiéndose a sí mismos en sí mismos y comparándose a sí mismos con sí mismos». El sentido es que se usan a sí mismos como su propio estándar.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τολμῶμεν
  english_pob_choice: we do not dare
  chosen_spanish: no nos atrevemos
  alternatives_spanish:
  - no osamos
  - no presumimos
  lexicon: BDAG
  rationale: τολμάω expresa falta de audacia o de presunción; «no nos atrevemos» conserva el tono idiomático e irónico de Pablo en español natural.
- source_word: ἐγκρῖναι
  english_pob_choice: to classify
  chosen_spanish: clasificarnos
  alternatives_spanish:
  - incluirnos
  - contarnos entre
  - ponernos en la misma categoría
  lexicon: BDAG
  rationale: Aquí el verbo no es un juicio moral simple, sino la acción de ponerse en la misma categoría que otros. «Clasificarnos» comunica bien esa decisión de orden o categoría.
- source_word: συγκρῖναι / συγκρίνοντες
  english_pob_choice: compare / compare
  chosen_spanish: compararnos / comparándose
  alternatives_spanish:
  - igualarnos / igualándose
  - ponernos a la par / poniéndose a la par
  lexicon: BDAG
  rationale: El verbo σημαίνει comparar; mantener «comparar» en ambas apariciones preserva la repetición retórica del griego.
- source_word: ἑαυτούς τισιν τῶν ἑαυτοὺς συνιστανόντων
  english_pob_choice: ourselves with some of those who commend themselves
  chosen_spanish: con algunos de los que se recomiendan a sí mismos
  alternatives_spanish:
  - con algunos de los que se alaban a sí mismos
  - con algunos de los que se presentan favorablemente
  lexicon: BDAG
  rationale: συνιστάνω aquí significa recomendar o acreditar; el reflexivo subraya la auto-recomendación, y «se recomiendan a sí mismos» lo refleja con claridad en español.
- source_word: αὐτοὶ
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - ellos mismos
  - por su parte
  lexicon: BDAG
  rationale: El pronombre es enfático y contrasta a los oponentes con Pablo; «ellos» después de «Pero» mantiene la oposición sin volver rígida la sintaxis.
- source_word: ἐν ἑαυτοῖς
  english_pob_choice: by themselves
  chosen_spanish: por sí mismos
  alternatives_spanish:
  - entre sí
  - dentro de sí
  lexicon: BDAG
  rationale: La frase es idiomática y apunta a usar su propio criterio como norma; «por sí mismos» comunica ese carácter autorreferencial con naturalidad.
- source_word: μετροῦντες
  english_pob_choice: measure
  chosen_spanish: midiéndose
  alternatives_spanish:
  - evaluándose
  - calculándose
  lexicon: BDAG
  rationale: μετρέω es literalmente «medir»; conservar la metáfora verbal mantiene la fuerza de la crítica paulina.
- source_word: ἑαυτοὺς ἑαυτοῖς
  english_pob_choice: themselves by themselves
  chosen_spanish: a sí mismos por sí mismos
  alternatives_spanish:
  - consigo mismos
  - a sí mismos consigo mismos
  lexicon: BDAG
  rationale: La reiteración reflexiva es central para el reproche; el español debe conservar el eco de auto-referencialidad sin suavizarlo.
- source_word: οὐ συνιᾶσιν
  english_pob_choice: they do not understand
  chosen_spanish: no entienden
  alternatives_spanish:
  - no comprenden
  - carecen de entendimiento
  lexicon: BDAG
  rationale: συνίημι significa comprender; «no entienden» es claro, natural y fiel al sentido de que no captan la necedad de su propia comparación.
translation_notes:
  revision_awareness: La revisión más reciente del expediente indica alta concordancia y que no se requieren cambios sustantivos; se mantiene la solución óptima ya acordada, con español natural y el mismo perfil semántico del texto base griego.
  spanish_consistency_notes:
  - Se conserva la repetición de los reflexivos para reflejar la ironía y la autorreferencialidad del griego.
  - «Clasificarnos» y «compararnos» mantienen la distinción conceptual entre ἐγκρῖναι y συγκρῖναι sin perder fluidez.
  - «Se recomiendan a sí mismos» sigue la decisión POB de reflejar συνιστανόντων como auto-commendación, no como simple «presentarse bien».
  - Las notas al pie preservan la alternativa léxica del inglés POB y aclaran la metáfora de medir como norma propia.
