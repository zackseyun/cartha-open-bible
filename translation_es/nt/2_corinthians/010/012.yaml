    rationale: El original repite ἑαυτούς / ἑαυτοῖς de forma enfática. «Consigo mismos» comunica parte del sentido, pero pierde el eco estructural y el paralelismo con «a sí mismos por sí mismos». «Comparándose a sí mismos con sí mismos» preserva mejor la retórica y la lógica del versículo.
  - severity: low
    issue: La nota b puede sonar poco idiomática en «usan a sí mismos como su propio estándar»
    rationale: Es comprensible, pero en español bíblico natural suena mejor «se usan a sí mismos como su propia medida» o «como su propio criterio/estándar». Esto mejora la legibilidad sin alterar el sentido.
