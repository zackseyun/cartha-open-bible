translation:
  language: es
  text: para predicar el evangelio en las regiones más allá de ustedes[a], no para jactarme en el campo de otro[b] acerca de lo ya preparado[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en las tierras más allá de ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en el ámbito de otro». Aquí κανών se entiende como un campo o esfera de ministerio asignado, no como una «regla» ni como el canon bíblico.'
    reason: theological_note
  - marker: c
    text: 'O: «no para jactarme en el campo de otro acerca de lo que ya está hecho o listo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερέκεινα
  english_pob_choice: the regions beyond
  chosen_spanish: las regiones más allá de ustedes
  alternatives_spanish:
  - las tierras más allá de ustedes
  - los lugares más allá de ustedes
  - las regiones de más allá de ustedes
  lexicon: BDAG
  rationale: El término señala zonas situadas más allá de un punto de referencia. En español, «las regiones más allá de ustedes» conserva la extensión geográfica y la relación con los corintios sin volverla rígidamente literal.
- source_word: ὑμῶν
  english_pob_choice: you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - su
  - de ustedes en sentido local
  - más allá de su región
  lexicon: BDAG
  rationale: El genitivo marca el punto de referencia relativo a los destinatarios. «De ustedes» mantiene ese vínculo personal y evita añadir «región» como interpretación explícita.
- source_word: εὐαγγελίσασθαι
  english_pob_choice: to proclaim the good news
  chosen_spanish: proclamar la buena noticia
  alternatives_spanish:
  - predicar el evangelio
  - evangelizar
  lexicon: BDAG
  rationale: La forma verbal expresa el propósito misionero de Pablo. «Proclamar la buena noticia» es claro y fiel sin depender de un tecnicismo eclesiástico; además evita el calcado de «evangelizar» cuando el contexto apunta a la acción de anunciar.
- source_word: ἀλλοτρίῳ
  english_pob_choice: another's
  chosen_spanish: de otro
  alternatives_spanish:
  - ajeno
  - de otra persona
  - de otro hombre
  lexicon: BDAG
  rationale: El adjetivo significa perteneciente a otro. «De otro» reproduce con naturalidad la posesión ajena sin introducir un matiz de género no exigido por el griego.
- source_word: κανόνι
  english_pob_choice: sphere
  chosen_spanish: esfera
  alternatives_spanish:
  - campo
  - ámbito
  - regla
  - canon
  lexicon: BDAG
  rationale: Aquí κανών funciona metafóricamente como esfera o campo asignado de ministerio, no como «regla» moral ni como «canon» bíblico posterior. «Esfera» conserva esa idea de territorio o ámbito apostólico.
- source_word: ἕτοιμα
  english_pob_choice: already prepared
  chosen_spanish: lo ya preparado
  alternatives_spanish:
  - lo ya hecho
  - lo preparado de antemano
  - las cosas ya listas
  lexicon: BDAG
  rationale: El adjetivo se usa sustantivamente para cosas en estado de preparación. «Lo ya preparado» comunica la idea sin añadir más que el texto permite.
- source_word: καυχήσασθαι
  english_pob_choice: to boast
  chosen_spanish: jactarme
  alternatives_spanish:
  - gloriarme
  - vanagloriarme
  - boastme
  lexicon: BDAG
  rationale: Pablo usa su verbo recurrente para la jactancia/boast. «Jactarme» conserva la fuerza retórica del término; en nota se mantiene la posibilidad de «gloriarme» si se desea un matiz más tradicional.
- source_word: εἰς τὰ ὑπερέκεινα ὑμῶν εὐαγγελίσασθαι
  english_pob_choice: to proclaim the good news in the regions beyond you
  chosen_spanish: para proclamar la buena noticia en las regiones más allá de ustedes
  alternatives_spanish:
  - para proclamar la buena noticia en las tierras más allá de ustedes
  - para evangelizar en los lugares más allá de ustedes
  lexicon: BDAG
  rationale: La construcción final expresa el objetivo de ir más allá del área corintia. La traducción mantiene el paralelismo con el contexto inmediato de 2 Co 10:13–15 sobre la medida y el ámbito del ministerio.
- source_word: οὐκ ἐν ἀλλοτρίῳ κανόνι εἰς τὰ ἕτοιμα καυχήσασθαι
  english_pob_choice: not to boast in another's sphere about things already prepared
  chosen_spanish: no para jactarme en la esfera de otro sobre lo ya preparado
  alternatives_spanish:
  - no para jactarme en el campo de otro sobre lo que ya está listo
  - no para gloriarme en el ámbito de otro acerca de lo ya preparado
  lexicon: BDAG
  rationale: La frase es comprimida y elíptica. «En la esfera de otro» conserva el valor metafórico de κανών y «sobre lo ya preparado» refleja la referencia a un trabajo o situación ya dispuesta sin especificar más de lo que el griego dice.
theological_decisions:
- issue: Sentido de κανών en el contexto paulino
  english_pob_reading: assigned sphere of ministry rather than moral rule or scriptural canon
  chosen_spanish_reading: esfera asignada de ministerio, no una regla moral ni un canon bíblico posterior
  alternative_spanish_readings:
  - regla
  - norma
  - canon
  rationale: El contexto de 2 Corintios 10:13–15 habla de la medida y el límite del trabajo apostólico. Traducir κανών como «esfera» evita importar el sentido posterior de «canon» y preserva la imagen de un campo asignado.
  doctrine_reference: Translation philosophy §1, §5
- issue: Referencia de τὰ ἕτοιμα
  english_pob_reading: work already prepared/accomplished by others
  chosen_spanish_reading: lo ya preparado, entendido como lo dispuesto o adelantado por otros
  alternative_spanish_readings:
  - las cosas listas en general
  - lo que ya está hecho
  rationale: La lectura más natural en el pasaje es que Pablo no quiere gloriarse donde otro ya ha preparado el terreno. El español mantiene la ambigüedad relativa de τὰ ἕτοιμα sin cerrarla a una sola formulación técnica.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del POB en inglés que prefirió la formulación más literal «another's» y ajustó «things already prepared» para reflejar mejor el griego sin sobrerinterpretación. Por eso el español usa una posesión neutra («de otro») y una expresión igualmente abierta («lo ya preparado»), manteniendo la sobriedad del original.
  spanish_consistency_notes:
  - Se mantiene «buena noticia» para εὐαγγελίζω conforme al estilo POB de evitar jerga eclesiástica cuando el contexto permite una equivalencia clara.
  - Se usa «esfera» para κανών por coherencia con el audit trail en inglés y para evitar confundir el término con «canon».
  - Se evita «SEÑOR» u otra terminología no presente en el versículo; no hay sustituciones teológicas ajenas al texto.
  - La sintaxis española conserva la oposición entre el propósito propio de Pablo y la negación de jactarse en terreno ajeno, sin expandir el contenido más allá del griego.
