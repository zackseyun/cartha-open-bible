lexical_decisions:
- source_word: λογιζέσθω
  english_pob_choice: let ... consider
  chosen_spanish: considere
  alternatives_spanish:
  - tome en cuenta
  - piense
  - calcule
  lexicon: BDAG
  rationale: El imperativo medio/pasivo exhorta a hacer un juicio reflexivo sobre un hecho. «Considere» conserva el matiz deliberativo y funciona con naturalidad en español.
- source_word: ὁ τοιοῦτος
  english_pob_choice: such a person
  chosen_spanish: esa persona
  alternatives_spanish:
  - tal persona
  - esa clase de persona
  - tal hombre
  lexicon: BDAG
  rationale: La expresión remite a una persona concreta del tipo previamente descrito. «Esa persona» evita arcaísmo y mantiene la referencia singular sin añadir color interpretativo.
- source_word: οἷοί ἐσμεν
  english_pob_choice: what we are
  chosen_spanish: como somos
  alternatives_spanish:
  - qué somos
  - la clase de personas que somos
  - tal como somos
  lexicon: BDAG
  rationale: La construcción expresa cualidad o carácter. «Como somos» reproduce la comparación de manera natural y prepara el paralelismo con la cláusula siguiente.
- source_word: τῷ λόγῳ
  english_pob_choice: in word
  chosen_spanish: en palabra
  alternatives_spanish:
  - en discurso
  - en lo que decimos
  - en habla
  lexicon: BDAG
  rationale: Se conserva el contraste retórico con «en obra». «Palabra» es breve y refleja el ámbito verbal del argumento paulino.
- source_word: δι’ ἐπιστολῶν
  english_pob_choice: by letters
  chosen_spanish: por cartas
  alternatives_spanish:
  - mediante cartas
  - a través de cartas
  - por medio de cartas
  lexicon: BDAG
  rationale: La preposición con genitivo señala medio o instrumento. «Por cartas» es claro en español y mantiene la idea de medio escrito sin sobrecargar la frase.
- source_word: ἀπόντες
  english_pob_choice: when absent
  chosen_spanish: cuando estamos ausentes
  alternatives_spanish:
  - estando ausentes
  - mientras estamos ausentes
  - al estar ausentes
  lexicon: BDAG
  rationale: El participio circunstancial se vierte con una oración temporal natural. «Estamos ausentes» preserva la oposición con «presentes».
- source_word: παρόντες
  english_pob_choice: when present
  chosen_spanish: cuando estamos presentes
  alternatives_spanish:
  - estando presentes
  - mientras estamos presentes
  - al estar presentes
  lexicon: BDAG
  rationale: Mantiene el paralelismo con «ausentes» y la contraposición temporal/circunstancial del griego.
- source_word: τῷ ἔργῳ
  english_pob_choice: in deed
  chosen_spanish: en obra
  alternatives_spanish:
  - en hecho
  - en acción
  - en conducta
  lexicon: BDAG
  rationale: Se preserva la antítesis compacta «en palabra ... en obra». «Obra» comunica acción concreta sin diluir la fuerza del contraste verbal.
theological_decisions:
- issue: Contraste entre conducta escrita y presencia personal sin implicar incoherencia moral
  english_pob_reading: Paul's conduct in person matches the force of his written words.
  chosen_spanish_reading: La frase afirma que la realidad de Pablo y sus compañeros en presencia coincide con la que muestran por carta.
  alternative_spanish_readings:
  - Solo es una amenaza para el futuro
  - Contrasta estilo literario versus poder espiritual
  - Indica dos identidades distintas
  rationale: 'El griego presenta una comparación directa y paralela: lo que son en palabra por cartas ausentes, eso mismo son en obra presentes. La traducción debe conservar el aviso retórico sin exagerarlo en otra afirmación doctrinal.'
  doctrine_reference: 2 Corintios 10:1-11; 2 Corintios 13:10
- issue: Valor de λόγος y ἔργον como contraste retórico
  english_pob_reading: '''word'' and ''deed'' as a rhetorical contrast'
  chosen_spanish_reading: «palabra» y «obra» se mantienen como contraste retórico explícito
  alternative_spanish_readings:
  - «palabra» y «acción»
  - «discurso» y «hecho»
  - «lo que decimos» y «lo que hacemos»
  rationale: El par breve es parte de la fuerza del versículo. «Palabra/obra» resulta natural en español y no borra el paralelismo del original.
  doctrine_reference: Mateo 7:24; Santiago 1:22
translation_notes:
  revision_awareness: La redacción sigue de cerca el cierre revisado del contexto inglés, especialmente la decisión de expresar δι’ ἐπιστολῶν con un medio directo («por cartas»/«by letters») y conservar el paralelismo entre ausencia/presencia y palabra/obra. Se evita una paráfrasis explicativa adicional.
  spanish_consistency_notes:
  - Se mantiene un registro moderno y digno, apto para lectura eclesial.
  - Se conserva la estructura retórica del versículo con paralelismo directo.
  - No se usa «Cristo», «SEÑOR» ni terminología ajena al pasaje.
  - La nota a aclara la alternativa lexical de ὁ τοιοῦτος sin duplicar marcadores.
