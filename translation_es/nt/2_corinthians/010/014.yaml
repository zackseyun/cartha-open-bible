translation:
  language: es
  text: Porque no nos estamos extendiendo más allá de lo debido[a], como si no hubiéramos llegado hasta ustedes; pues incluso hasta ustedes hemos llegado con el evangelio del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no nos estamos sobreextendiendo». El verbo griego sugiere extenderse más allá de los límites apropiados.
    reason: lexical_alternative
  - marker: b
    text: O «de Cristo»; aquí se traduce «Mesías» porque Χριστός funciona como título.
    reason: alternative_reading
lexical_decisions:
- source_word: ὑπερεκτείνομεν
  english_pob_choice: are not overextending
  chosen_spanish: no nos estamos sobreextendiendo
  alternatives_spanish:
  - no nos estamos extendiendo más allá de nuestros límites
  - no nos estamos pasando de los límites
  lexicon: BDAG
  rationale: El verbo conserva la imagen de extenderse más allá del margen debido. En español, «sobreextenderse» comunica bien esa metáfora con tono natural y mantiene el presente continuo de la acción.
- source_word: ἐφικνούμενοι εἰς ὑμᾶς
  english_pob_choice: as though we had not reached you
  chosen_spanish: como si no hubiéramos llegado hasta ustedes
  alternatives_spanish:
  - como si no estuviéramos llegando hasta ustedes
  - como si no nos hubiéramos extendido hasta ustedes
  lexicon: BDAG
  rationale: El participio expresa el haber alcanzado a los corintios en sentido espacial y ministerial. «Llegado hasta ustedes» refleja ese alcance consumado sin volverlo demasiado técnico.
- source_word: ἑαυτούς
  english_pob_choice: ourselves
  chosen_spanish: nos estamos
  alternatives_spanish:
  - a nosotros mismos
  - nosotros mismos
  lexicon: BDAG
  rationale: El reflexivo se refiere directamente a Pablo y sus colaboradores; en español queda naturalmente integrado en «nos estamos sobreextendiendo».
- source_word: ἄχρι ... καὶ ὑμῶν
  english_pob_choice: even as far as you
  chosen_spanish: hasta ustedes
  alternatives_spanish:
  - incluso hasta ustedes
  - hasta aun ustedes
  lexicon: BDAG
  rationale: El griego enfatiza el alcance real hasta los corintios y el καί intensifica el límite. En la frase principal se mantiene el alcance simple y la intensidad se preserva en la nota textual.
- source_word: ἐφθάσαμεν
  english_pob_choice: we came
  chosen_spanish: hemos llegado
  alternatives_spanish:
  - llegamos
  - hemos alcanzado
  lexicon: BDAG
  rationale: Aunque el aoristo puede traducirse con pasado simple, aquí el perfecto español subraya el hecho ya cumplido y enlaza mejor con el argumento retórico de Pablo sobre el alcance de su ministerio.
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: with the gospel
  chosen_spanish: con el evangelio
  alternatives_spanish:
  - en el evangelio
  - por medio del evangelio
  lexicon: BDAG
  rationale: La preposición tiene valor instrumental o asociativo en contexto. «Con el evangelio» es natural en español y conserva la idea de la esfera/medio del ministerio.
- source_word: εὐαγγέλιον
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  lexicon: BDAG
  rationale: «Evangelio» es el equivalente establecido en contexto paulino y mantiene el peso teológico del término.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: 'Se conserva la política terminológica del proyecto: Χριστός se vierte como «Mesías» cuando funciona como título. En español suena claro y mantiene la referencia titulada más que la forma nominalizada.'
theological_decisions:
- issue: Χριστός como título o nombre-forma fija
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστοῦ califica al evangelio y conserva fuerza titular; por eso se traduce «Mesías». Esto evita borrar el matiz mesiánico y sigue la norma doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando el título está en vista; Cristo cuando la forma ya es nombre-fija o por necesidad idiomática.'
translation_notes:
  revision_awareness: El borrador inglés más reciente osciló entre «Messiah» y «Christ» en 2 Corintios 10:14. Se mantiene «Mesías» porque la política del proyecto para Χριστός favorece el valor titular aquí, y la revisión que cambió a «Christ» fue revertida en la cadena de control por considerarse contraria a esa norma. También se tuvo en cuenta el ajuste estilístico de 'even as far as you', pero en español se optó por una formulación más natural con la nota que preserva el énfasis del καί.
  spanish_consistency_notes:
  - Se usó «Mesías» para Χριστός conforme al criterio del proyecto, no «Cristo» como forma automática.
  - «Evangelio» se mantiene como término técnico paulino estándar.
  - La metáfora de extensión se conservó con «sobreextendiendo» para reflejar el griego sin suavizarla excesivamente.
  - Se prefirió «hasta ustedes» para un español latinoamericano amplio y digno.
  - Las notas a–c conservan alternativas reales que el español también permite sin contradecir el texto principal.
