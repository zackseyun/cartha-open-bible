revisions:
- from: Porque, dicen[a], “sus cartas son graves y fuertes, pero su presencia corporal es débil, y su palabra es despreciada[b]”.
  to: 'Pues dicen[a]: «Sus cartas son graves y fuertes, pero su presencia corporal es débil y su habla es despreciada[b]».'
  rationale: Se ajusta ὅτι a «Pues» para un español más natural en función discursiva introductoria, y se corrige λόγος de «palabra» a «habla» para reflejar con precisión el contraste contextual entre cartas, presencia física y expresión oral. Se actualiza la nota correspondiente para mantener coherencia con el texto revisado y con las alternativas documentadas por el POB.
