translation:
  language: es
  text: 'Pues dicen[a]: «Sus cartas son graves y fuertes, pero su presencia corporal es débil y su habla es despreciada[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pues dice...» El griego tiene φησίν en singular («dice»), que puede funcionar como fórmula parentética de cita; aquí el sentido es la opinión reportada por los críticos de Pablo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su habla es despreciable» o «tenida en poco».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce el contenido de la acusación citada; en español, «Porque» mantiene la función introductoria sin volver el verso rígido. No se interpreta como causalidad simple sino como encabezado de discurso reportado.
- source_word: ἐπιστολαὶ
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - epístolas
  - cartas escritas
  lexicon: BDAG
  rationale: «Cartas» es el equivalente natural y contemporáneo de ἐπιστολαί. «Epístolas» suena más eclesiástico y no es necesario aquí.
- source_word: φησίν
  english_pob_choice: they say
  chosen_spanish: dicen
  alternatives_spanish:
  - dice
  - se dice
  lexicon: BDAG
  rationale: Aunque la forma griega es singular, el contexto muestra una opinión reportada de los críticos de Pablo; «dicen» comunica bien esa voz colectiva en español, preservando el carácter de cita indirecta.
- source_word: βαρεῖαι
  english_pob_choice: weighty
  chosen_spanish: graves
  alternatives_spanish:
  - pesadas
  - imponentes
  - serias
  lexicon: BDAG
  rationale: «Graves» conserva el peso metafórico de βαρεῖαι y sugiere seriedad e impacto retórico. «Pesadas» sería demasiado físico en español y puede sonar torpe en este contexto.
- source_word: ἰσχυραί
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosas
  - enérgicas
  lexicon: BDAG
  rationale: «Fuertes» es el correlato natural de «graves» y reproduce la fuerza retórica de ἰσχυραί sin sobreinterpretar. «Poderosas» añade un matiz más explicativo.
- source_word: παρουσία
  english_pob_choice: presence
  chosen_spanish: presencia
  alternatives_spanish:
  - venida
  - presencia personal
  lexicon: BDAG
  rationale: El contraste es con las cartas y la apariencia en persona de Pablo; «presencia» es el sentido contextual directo y no requiere ampliación.
- source_word: τοῦ σώματος
  english_pob_choice: bodily
  chosen_spanish: corporal
  alternatives_spanish:
  - del cuerpo
  - física
  lexicon: BDAG
  rationale: «Corporal» expresa bien la referencia al cuerpo o a la presencia física. Es más fluido que «del cuerpo» y menos interpretativo que «física».
- source_word: ἀσθενὴς
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - floja
  - frágil
  - endeble
  lexicon: BDAG
  rationale: «Débil» es la equivalencia directa y natural en español, manteniendo la evaluación peyorativa de los adversarios sin suavizarla.
- source_word: λόγος
  english_pob_choice: speech
  chosen_spanish: palabra
  alternatives_spanish:
  - discurso
  - habla
  - mensaje
  lexicon: BDAG
  rationale: Aunque λόγος puede referirse a «speech», en español «palabra» preserva el paralelismo con la expresión verbal de Pablo y puede abarcar su forma de hablar. Se mantiene la tensión semántica sin resolverla hacia un tecnicismo.
- source_word: ἐξουθενημένος
  english_pob_choice: despised
  chosen_spanish: despreciada
  alternatives_spanish:
  - tenida en poco
  - menospreciada
  - sin valor
  lexicon: BDAG
  rationale: El participio expresa ser tratado con desprecio. «Despreciada» es claro y natural en español; aunque el sustantivo implícito «palabra» es femenino, la acusación conserva el tono de menosprecio que el griego comunica.
theological_decisions:
- issue: La frase reporta el juicio de los críticos de Pablo, no una evaluación inspirada del narrador
  english_pob_reading: 'The verse is rendered as the words of Paul''s critics: ''For they say...'''
  chosen_spanish_reading: 'El verso se presenta como cita indirecta de los críticos: «Porque, dicen...»'
  alternative_spanish_readings:
  - Porque, dice...
  - Porque se dice...
  rationale: El singular φησίν puede funcionar como fórmula de cita, pero el contexto de 2 Corintios 10 muestra claramente una acusación contra Pablo. Traducirlo con «dicen» preserva la función retórica y evita atribuir la crítica al narrador o a Pablo mismo.
  doctrine_reference: Translation philosophy §3 (preserve tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el acuerdo alto del audit trail inglés y conserva la tensión retórica del griego: cartas fuertes frente a presencia corporal débil y palabra despreciada. No introduce lecturas doctrinales ajenas ni resuelve la cita reportada como si fuera voz narrativa.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando corresponda, aunque este versículo no contiene el nombre divino.
  - Se usa «corporal» para τοῦ σώματος por fluidez y precisión contextual.
  - Se conserva la ambigüedad de λόγος con «palabra», ya que el contexto permite tanto discurso oral como forma de hablar.
  - La puntuación y la comillas siguen uso hispano moderno, con la cita interna claramente delimitada.
