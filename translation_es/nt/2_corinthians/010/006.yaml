translation:
  language: es
  text: y estando preparados[a] para castigar toda desobediencia, cuando su obediencia[b] sea completa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «teniendo en preparación». La expresión griega es un modismo que significa estar listos o preparados para actuar.
    reason: lexical_alternative
  - marker: b
    text: O «cuando su obediencia esté completa/consumada». El verbo puede expresar que la obediencia llegue a su plenitud.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἑτοίμῳ ἔχοντες
  english_pob_choice: being ready
  chosen_spanish: teniendo listo[a]
  alternatives_spanish:
  - estando preparados
  - teniendo en preparación
  lexicon: BDAG
  rationale: La locución griega expresa estar en disposición o preparado para actuar. En español, «teniendo listo» mantiene la idea de preparación inmediata con una construcción natural y participial. Se conserva el enlace sintáctico con el contexto anterior sin endurecerlo con un calco innecesario.
- source_word: ἐκδικῆσαι
  english_pob_choice: to punish
  chosen_spanish: para castigar
  alternatives_spanish:
  - para vengar
  - para hacer justicia contra
  lexicon: BDAG
  rationale: El verbo puede significar vengar o ejecutar justicia, pero en este contexto la POB inglesa eligió «punish» por el sentido disciplinario. «Castigar» transmite mejor en español esa acción correctiva y evita sugerir venganza personal. Se conserva la tensión semántica del verbo sin resolverla hacia un sentido más fuerte de lo que el contexto inmediato pide.
- source_word: πᾶσαν παρακοήν
  english_pob_choice: every act of disobedience
  chosen_spanish: toda desobediencia
  alternatives_spanish:
  - cada acto de desobediencia
  - toda rebelión
  lexicon: BDAG
  rationale: παρακοή denota desobediencia. Aunque la inglesa explicita el valor distributivo con «every act of», en español «toda desobediencia» comunica de forma idiomática la totalidad sin introducir un sustantivo extra que vuelva más pesada la frase. Se mantiene el alcance general del término.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuando llegue el momento en que
  - cada vez que
  lexicon: BDAG
  rationale: El valor temporal-condicional de ὅταν con subjuntivo se vierte naturalmente como «cuando» en español. No se añade énfasis repetitivo que no está exigido por el texto ni por la revisión inglesa más reciente.
- source_word: πληρωθῇ
  english_pob_choice: is complete
  chosen_spanish: sea completa
  alternatives_spanish:
  - sea cumplida
  - llegue a su plenitud
  lexicon: BDAG
  rationale: El pasivo de πληρόω aquí apunta a que la obediencia alcance su plenitud o medida completa. «Sea completa» reproduce esa idea de manera clara y sobria, y encaja bien con «vuestra obediencia».
- source_word: ὑμῶν ἡ ὑπακοή
  english_pob_choice: your obedience
  chosen_spanish: vuestra obediencia
  alternatives_spanish:
  - su obediencia
  - la obediencia de ustedes
  lexicon: BDAG
  rationale: El posesivo de segunda persona plural se expresa con «vuestra». En español bíblico resulta más directo y transparente que una perífrasis; conserva la referencia a la comunidad destinataria sin oscurecerla.
theological_decisions:
- issue: Naturaleza de la acción sobre la desobediencia
  english_pob_reading: disciplinary punishment of disobedience within the church context
  chosen_spanish_reading: castigo disciplinario de la desobediencia en un marco eclesial
  alternative_spanish_readings:
  - venganza personal contra opositores
  - juicio escatológico divino
  rationale: El contexto inmediato trata de autoridad apostólica y corrección de oposición dentro de la comunidad, no de revancha privada. «Castigar» sostiene el matiz disciplinario que la POB inglesa privilegió y evita cargar el verso con una idea de venganza personal no garantizada por el contexto.
  doctrine_reference: Mantener la tensión del verbo y del contexto; primacía del testimonio original sobre la terminología devocional tradicional.
translation_notes:
  revision_awareness: La revisión inglesa más reciente sustituyó «whenever» por «when» para reflejar mejor el valor temporal de ὅταν. La redacción española sigue ese ajuste con «cuando», y mantiene el matiz disciplinario de ἐκδικῆσαι como «castigar», en línea con la auditoría inglesa.
  spanish_consistency_notes:
  - Se conservó «Yahvé» como norma general del proyecto; aquí no aplica porque el verso no contiene el tetragrámaton ni κύριος en cita directa.
  - Se eligió «castigar» y no «vengar» para no desplazar el sentido contextual hacia represalia personal.
  - Se mantuvo el posesivo plural «vuestra» para reflejar con claridad el destinatario corporativo de la carta.
  - La puntuación sigue la sintaxis española natural, con coma tras la prótasis participial para separar la cláusula temporal final.
