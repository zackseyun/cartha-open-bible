  glossary_alignment: No hay términos del glosario mayor que requieran ajuste. «Castigar» concuerda con la decisión documentada para ἐκδικῆσαι. «Desobediencia» y «obediencia» preservan bien παρακοή / ὑπακοή. El ajuste principal es estilístico-lexical en ἐν ἑτοίμῳ ἔχοντες y en el posesivo plural.
