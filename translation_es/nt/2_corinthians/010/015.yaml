  text: οὐκ εἰς τὰ ἄμετρα καυχώμενοι ἐν ἀλλοτρίοις κόποις, ἐλπίδα δὲ ἔχοντες αὐξανομένης τῆς πίστεως ὑμῶν ἐν ὑμῖν μεγαλυνθῆναι κατὰ τὸν κανόνα ἡμῶν εἰς περισσείαν,
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/015.yaml
  text: not boasting beyond measure in the labors of others[a], but having hope that, as your faith is growing, we will be enlarged among you according to our sphere, unto abundance[c][b],
