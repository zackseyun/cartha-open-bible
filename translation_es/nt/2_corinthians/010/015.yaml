    rationale: El uso de «vuestra/vosotros» es comprensible, pero el encargo pide español neutral LATAM / ampliamente legible en iglesia. «Su/ustedes» o una redacción sin pronombres peninsulares se ajusta mejor al objetivo estilístico.
