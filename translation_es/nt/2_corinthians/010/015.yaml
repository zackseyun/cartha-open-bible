translation:
  language: es
  text: no jactándonos sin medida en los trabajos de otros, sino teniendo esperanza de que, al crecer la fe de ustedes, seremos engrandecidos entre ustedes conforme a nuestra esfera[a], para abundancia[c][b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conforme a nuestra medida asignada» o «conforme a nuestra regla»; aquí κανών se refiere a una esfera o campo medido de ministerio.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «seremos muy engrandecidos» o «seremos grandemente ampliados»; en contexto, el sentido es la expansión de la obra apostólica, no la alabanza personal.'
    reason: alternative_reading
  - marker: c
    text: 'O: «a mayor extensión» o «para una expansión adicional».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ εἰς τὰ ἄμετρα
  english_pob_choice: not boasting beyond measure
  chosen_spanish: no jactándonos sin medida
  alternatives_spanish:
  - no jactándonos más allá de toda medida
  - no jactándonos fuera de medida
  lexicon: BDAG
  rationale: La idea es la de no extender la jactancia más allá de sus límites apropiados. «Sin medida» conserva la imagen de medida/límite y suena natural en español.
- source_word: καυχώμενοι
  english_pob_choice: boasting
  chosen_spanish: jactándonos
  alternatives_spanish:
  - gloriándonos
  - vanagloriándonos
  lexicon: BDAG
  rationale: En este contexto καυχάομαι tiene el sentido de jactarse. «Jactándonos» mantiene el matiz polémico y la conexión con el argumento de Pablo.
- source_word: ἐν ἀλλοτρίοις κόποις
  english_pob_choice: in the labors of others
  chosen_spanish: en los trabajos de otros
  alternatives_spanish:
  - en los esfuerzos de otros
  - en el trabajo ajeno
  lexicon: BDAG
  rationale: κόποις se refiere a labores o trabajos arduos, y ἀλλοτρίοις indica que pertenecen a otros. «Trabajos de otros» comunica que Pablo no se atribuye obra ajena.
- source_word: ἐλπίδα δὲ ἔχοντες
  english_pob_choice: but having hope
  chosen_spanish: sino teniendo esperanza
  alternatives_spanish:
  - pero teniendo esperanza
  - sino que tenemos esperanza
  lexicon: BDAG
  rationale: Se conserva la construcción participial de manera natural. «Teniendo esperanza» mantiene el sustantivo ἐλπίδα y el contraste introducido por δέ.
- source_word: αὐξανομένης τῆς πίστεως ὑμῶν
  english_pob_choice: as your faith is growing
  chosen_spanish: al crecer vuestra fe
  alternatives_spanish:
  - mientras crece vuestra fe
  - con el crecimiento de vuestra fe
  lexicon: BDAG
  rationale: La cláusula de genitivo absoluto se vierte de modo fluido en español. «Vuestra fe» respeta πίστις como «fe» según el uso doctrinal del proyecto.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre vosotros
  alternatives_spanish:
  - en vosotros
  - dentro de vosotros
  lexicon: BDAG
  rationale: Aquí la frase se refiere naturalmente al ámbito comunitario corintio. «Entre vosotros» evita una lectura solo interior o individualista.
- source_word: μεγαλυνθῆναι
  english_pob_choice: we will be enlarged
  chosen_spanish: seremos engrandecidos
  alternatives_spanish:
  - seremos ampliados
  - seremos ensanchados
  lexicon: BDAG
  rationale: El infinitivo expresa expansión/enlargement del ámbito apostólico, no autoexaltación personal. «Engrandecidos» conserva la idea de aumento o ampliación con dignidad en español.
- source_word: κατὰ τὸν κανόνα ἡμῶν
  english_pob_choice: according to our sphere
  chosen_spanish: conforme a nuestra esfera
  alternatives_spanish:
  - según nuestra medida
  - según nuestra esfera asignada
  lexicon: BDAG
  rationale: κανών aquí designa una esfera o medida asignada, no un «canon» eclesiástico. «Esfera» sigue de cerca el sentido contextual sin anacronismo.
- source_word: εἰς περισσείαν
  english_pob_choice: unto abundance
  chosen_spanish: para abundancia
  alternatives_spanish:
  - hasta abundancia
  - para mayor abundancia
  lexicon: BDAG
  rationale: La preposición εἰς marca dirección hacia un resultado de abundancia. «Para abundancia» conserva esa fuerza direccional en español.
theological_decisions:
- issue: Sentido de μεγαλυνθῆναι en el marco del ministerio apostólico
  english_pob_reading: Pablo habla de que su obra o esfera apostólica sea ampliada entre los corintios, no de autopromoción personal.
  chosen_spanish_reading: «Seremos engrandecidos entre vosotros» se entiende como expansión del ministerio apostólico en su ámbito, no como elogio personal.
  alternative_spanish_readings:
  - seremos honrados más entre vosotros
  - será magnificado nuestro nombre
  rationale: El contexto inmediato trata de no jactarse en el trabajo ajeno y de una esfera asignada. Por eso la ampliación se refiere a la obra ministerial de Pablo dentro del encargo recibido.
  doctrine_reference: Translation philosophy §1, §3, §5
- issue: Sentido de κανών
  english_pob_reading: '''sphere of ministry'' rather than a literal ''rule'' or later theological ''canon'''
  chosen_spanish_reading: «nuestra esfera» refleja una medida o ámbito asignado de labor.
  alternative_spanish_readings:
  - nuestra regla
  - nuestra medida asignada
  - nuestro canon
  rationale: En este pasaje κανών expresa un ámbito medido o delimitado para el trabajo apostólico. «Esfera» evita el anacronismo de «canon» y el exceso de literalidad de «regla».
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: He seguido la revisión más reciente del audit trail, que coloca ἐν ὑμῖν de forma más natural con «entre vosotros» y simplifica κανών a «esfera» para ceñirse más al griego contextual sin expandir la interpretación.
  spanish_consistency_notes:
  - Se mantiene πίστις como «fe», coherente con el uso doctrinal del proyecto.
  - Se usa «jactándonos» para conservar la fuerza de καυχάομαι en contexto polémico.
  - «Esfera» evita el sentido eclesiástico tardío de «canon» y armoniza con el argumento de los vv. 13–16.
  - «Entre vosotros» expresa mejor el valor comunitario de ἐν ὑμῖν que un «en vosotros» meramente interior.
