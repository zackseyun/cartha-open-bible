  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB inglés: no jactarse en labores ajenas, tener esperanza mientras crece la fe de los corintios, y la ampliación del ámbito apostólico según el κανών asignado. Sin embargo, la nota al pie [a] está anclada en «otros», aunque su contenido explica κανών, que aparece después en «nuestra esfera». Ese desajuste de anclaje rompe la correspondencia requerida entre texto y nota y puede confundir al lector sobre qué expresión recibe la alternativa léxica.'
