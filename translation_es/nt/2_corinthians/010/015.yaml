  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Fe» para πίστις y «esfera» para κανών están bien justificadas. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, carne o esclavo. La decisión sobre κανών debe seguir visible en nota, pero anclada en «esfera[a]», no en «otros[a]».
