translation:
  language: es
  text: Pues aun si yo me gloriara algo más de nuestra autoridad, la cual el Señor dio para edificarlos y no para derribarlos, no me avergonzaré[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no seré avergonzado». El verbo griego puede expresarse de ambas maneras, pero el sentido pasivo «ser avergonzado» refleja más claramente la forma del original.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τε γὰρ
  english_pob_choice: For even if
  chosen_spanish: Pues aun si
  alternatives_spanish:
  - Porque aun si
  - Y aun si
  - Pues si
  lexicon: BDAG
  rationale: Combina la fuerza explicativa de γάρ con la condicional ἐάν y el matiz enfático de τε de forma natural en español. 'Pues aun si' conserva la relación lógica sin sonar mecánico.
- source_word: περισσότερόν τι
  english_pob_choice: somewhat more
  chosen_spanish: algo más
  alternatives_spanish:
  - un poco más
  - algo un poco más
  - más todavía
  lexicon: BDAG
  rationale: Expresa el grado comparativo con la indefinitud suavizadora de τι. 'Algo más' es idiomático y preserva el matiz de 'somewhat more'.
- source_word: καυχήσωμαι
  english_pob_choice: I should boast
  chosen_spanish: yo me gloriara
  alternatives_spanish:
  - yo me jactara
  - yo me ufanara
  - yo me alabara
  lexicon: BDAG
  rationale: En este contexto paulino, 'gloriarse' comunica la idea de presumir/boast de modo más natural en español bíblico que una jactancia vulgar. El subjuntivo condicional refleja bien la forma hipotética.
- source_word: περὶ τῆς ἐξουσίας ἡμῶν
  english_pob_choice: about our authority
  chosen_spanish: de nuestra autoridad
  alternatives_spanish:
  - acerca de nuestra autoridad
  - sobre nuestra autoridad
  lexicon: BDAG
  rationale: '''De nuestra autoridad'' es la forma más natural en español para expresar el tema del orgullo o gloriarse. ''Autoridad'' mantiene el sentido de ἐξουσία como autoridad delegada, no poder abstracto.'
- source_word: ἧς ἔδωκεν ὁ κύριος
  english_pob_choice: which the Lord gave
  chosen_spanish: la cual el Señor dio
  alternatives_spanish:
  - que el Señor dio
  - la que el Señor dio
  lexicon: BDAG
  rationale: Conserva el antecedente femenino 'autoridad' y la relación relativa con claridad. 'Señor' sigue la terminología del proyecto para κύριος, aquí entendida en sentido cristológico.
- source_word: εἰς οἰκοδομὴν
  english_pob_choice: for building you up
  chosen_spanish: para edificación
  alternatives_spanish:
  - para edificar
  - para construirlos
  lexicon: BDAG
  rationale: Aunque el inglés explicita 'you up', el griego usa el sustantivo metafórico. 'Edificación' preserva el término técnico/espiritual sin forzar una repetición pronominal que el español puede omitir por el contexto.
- source_word: καὶ οὐκ εἰς καθαίρεσιν ὑμῶν
  english_pob_choice: and not for tearing you down
  chosen_spanish: y no para destrucción de ustedes
  alternatives_spanish:
  - y no para derribarlos
  - y no para demolerlos
  - y no para su destrucción
  lexicon: BDAG
  rationale: καθαίρεσις puede denotar demolición, derribo o destrucción. 'Destrucción de ustedes' mantiene el contraste con edificación y conserva la amplitud semántica sin perder la tensión pastoral. Se evita una lectura demasiado suavizada o demasiado literal que suene forzada.
- source_word: οὐκ αἰσχυνθήσομαι
  english_pob_choice: I will not be put to shame
  chosen_spanish: no me avergonzaré
  alternatives_spanish:
  - no seré avergonzado
  - no quedaré avergonzado
  - no seré puesto en vergüenza
  lexicon: BDAG
  rationale: El futuro pasivo puede reflejarse en español con una pasiva o con un reflexivo natural. 'No me avergonzaré' es la forma más fluida y habitual, aunque la nota permite reconocer la alternativa pasiva del griego.
theological_decisions:
- issue: Naturaleza y propósito de la autoridad apostólica
  english_pob_reading: Paul's authority is presented as delegated by the Lord for the constructive strengthening of the Corinthians, not for their ruin.
  chosen_spanish_reading: La autoridad es dada por el Señor para edificación, no para destrucción.
  alternative_spanish_readings:
  - La autoridad es dada para disciplina punitiva o ruina.
  - La autoridad tiene un fin correctivo que podría sonar destructivo.
  rationale: 'La frase mantiene el contraste explícito entre edificación y destrucción, sin diluir la fuerza de la autoridad ni convertirla en mera benignidad. Se conserva la tensión teológica documentada por el POB: autoridad real, pero con propósito constructivo.'
  doctrine_reference: 'Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms: κύριος → Señor'
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que el marcador [a] aparezca en el texto español exactamente en el lugar correspondiente. No se añadieron notas sin anclaje.
  spanish_consistency_notes:
  - Se mantuvo 'Señor' para κύριος según el contexto cristológico paulino y la convención del proyecto.
  - '''Autoridad'' se usa para ἐξουσία para conservar el sentido de autoridad delegada y no solo poder.'
  - '''Edificación'' y ''destrucción'' preservan el contraste metafórico del texto griego entre construir y derribar/demoler.'
  - Se evitó 'Cristo' porque el versículo contiene κύριος y el audit trail documenta 'Lord/Señor' como decisión establecida.
