review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional y el sentido general del versículo: Pablo habla hipotéticamente de gloriarse más acerca de la autoridad apostólica dada por el Señor. Sin embargo, omite en el texto principal la explicitación del objeto implícito en εἰς οἰκοδομὴν / καθαίρεσιν ὑμῶν y debilita el contraste metafórico documentado por el POB al usar ''edificación'' frente a ''destrucción de ustedes'' en vez de un par más paralelo como ''edificarlos / derribarlos''. Además, la nota del verbo final está anclada al lugar equivocado: la alternativa corresponde a οὐκ αἰσχυνθήσομαι, no a ''autoridad''.'
  spanish_quality_summary: 'El español es claro y digno, pero la frase central suena algo desequilibrada: ''para edificación y no para destrucción de ustedes'' mezcla un sustantivo abstracto con una expresión menos idiomática y pierde fuerza retórica. ''Para edificarlos y no para derribarlos'' o equivalente suena más natural y preserva mejor la metáfora de construcción. También conviene mover la nota al verbo final para que el anclaje sea correcto.'
  glossary_alignment: '''Señor'' para κύριος es correcto en este contexto paulino. ''Autoridad'' para ἐξουσία también está bien. ''Me gloriara'' es aceptable y church-readable. El principal ajuste terminológico es alinear καθαίρεσις con una imagen de derribo/demolición en paralelo con οἰκοδομή, tal como documenta el inglés POB, en vez de ''destrucción de ustedes'', que aunque posible no sigue la elección preferida del proyecto en este versículo.'
  issues:
  - severity: high
    issue: La nota al pie está anclada a 'autoridad[a]' pero su contenido explica οὐκ αἰσχυνθήσομαι.
    rationale: El marcador debe aparecer en la palabra o frase relevante. Aquí la nota trata del verbo final ('no me avergonzaré' / 'no seré avergonzado'), no de 'autoridad'.
  - severity: medium
    issue: '''Para edificación y no para destrucción de ustedes'' no preserva bien el contraste metafórico de οἰκοδομή / καθαίρεσις.'
    rationale: El POB inglés eligió 'building you up' / 'tearing you down' precisamente para mantener la metáfora de construcción. En español, 'edificarlos / derribarlos' reproduce mejor ese paralelismo.
  - severity: low
    issue: Se omite en el primer miembro el objeto implícito referido a los corintios.
    rationale: Aunque el griego deja el objeto implícito en οἰκοδομή, el inglés POB lo hace explícito y en español también conviene explicitarlo para equilibrar con 'derribarlos' y mejorar claridad.
  revised_spanish_text: Pues aun si yo me gloriara algo más de nuestra autoridad, la cual el Señor dio para edificarlos y no para derribarlos, no me avergonzaré[a].
  revised_footnotes:
  - marker: a
    text: O «no seré avergonzado». El verbo griego puede expresarse de ambas maneras, pero el sentido pasivo «ser avergonzado» refleja más claramente la forma del original.
    reason: lexical_alternative
  revision_rationale: 'Se corrige el anclaje de la nota para que corresponda al verbo final, y se revisa la frase de propósito para preservar mejor el contraste metafórico del griego y la decisión léxica documentada por el POB: autoridad dada para edificar, no para derribar. La redacción resultante es más natural en español y más fiel al énfasis retórico del original.'
