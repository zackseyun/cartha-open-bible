revisions:
- from: Pues aun si yo me gloriara algo más de nuestra autoridad[a], la cual el Señor dio para edificación y no para destrucción de ustedes, no me avergonzaré.
  to: Pues aun si yo me gloriara algo más de nuestra autoridad, la cual el Señor dio para edificarlos y no para derribarlos, no me avergonzaré[a].
  rationale: 'Se corrige el anclaje de la nota para que corresponda al verbo final, y se revisa la frase de propósito para preservar mejor el contraste metafórico del griego y la decisión léxica documentada por el POB: autoridad dada para edificar, no para derribar. La redacción resultante es más natural en español y más fiel al énfasis retórico del original.'
