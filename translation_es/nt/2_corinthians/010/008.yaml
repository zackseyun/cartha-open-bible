  yaml_path: translation/nt/2_corinthians/010/008.yaml
  text: For even if I should boast somewhat more about our authority[a], which the Lord gave for building you up and not for tearing you down[b], I will not be put to shame.
  footnotes:
  - marker: a
    text: Or 'I will not be ashamed.' The Greek verb can be rendered either way, but the passive sense 'be put to shame' more clearly reflects the form here.
    reason: lexical_alternative
  - marker: b
    text: Or 'for your destruction.' The Greek contrasts 'building up' with 'tearing down/destruction'; the chosen wording preserves the construction metaphor.
    reason: lexical_alternative
