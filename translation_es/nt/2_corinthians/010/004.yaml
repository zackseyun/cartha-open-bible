translation:
  language: es
  text: Porque las armas de nuestra guerra no son carnales[a], sino poderosas ante Dios[b] para el derribo de fortalezas—derribando argumentos[c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «de la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «delante de Dios» o «por Dios».'
    reason: alternative_reading
  - marker: c
    text: 'O: «razonamientos» o «especulaciones».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅπλα
  english_pob_choice: weapons
  chosen_spanish: armas
  alternatives_spanish:
  - armas de guerra
  - armamentos
  lexicon: BDAG
  rationale: ὅπλα designa armas concretas en la metáfora militar. 'Armas' es el equivalente natural en español y conserva la imagen bélica sin añadir especificación innecesaria.
- source_word: στρατείας
  english_pob_choice: warfare
  chosen_spanish: guerra
  alternatives_spanish:
  - guerra militar
  - campaña
  - servicio militar
  lexicon: BDAG
  rationale: στρατεία expresa la idea de una campaña o servicio militar; en español, 'guerra' comunica mejor el campo metafórico y fluye con 'nuestra guerra'.
- source_word: σαρκικὰ
  english_pob_choice: fleshly
  chosen_spanish: carnales
  alternatives_spanish:
  - de la carne
  - mundanas
  - naturales
  lexicon: BDAG
  rationale: Se mantiene la relación con σάρξ mediante 'carnales', que en español bíblico conserva el contraste con lo que pertenece a la esfera humana/meramente terrenal. 'De la carne' sería más literal pero menos natural; 'mundanas' diluye el vínculo léxico con 'carne'.
- source_word: δυνατὰ τῷ θεῷ
  english_pob_choice: powerful before God
  chosen_spanish: poderosas para Dios
  alternatives_spanish:
  - poderosas delante de Dios
  - poderosas por Dios
  - poderosas ante Dios
  lexicon: BDAG
  rationale: La construcción dativa es compacta y admite matices. 'Para Dios' conserva la relación con Dios sin introducir explícitamente una relación instrumental que el griego no desarrolla de manera directa en el texto base de esta entrega; además suena natural y reverente en español.
- source_word: καθαίρεσιν
  english_pob_choice: the tearing down
  chosen_spanish: la destrucción
  alternatives_spanish:
  - el derribo
  - la demolición
  - el desmantelamiento
  lexicon: BDAG
  rationale: El sustantivo expresa la acción de derribar o destruir una estructura fortificada. 'La destrucción' es comprensible y fiel, aunque menos pictórico que 'derribo' o 'demolición'; se opta por una forma amplia que funciona bien con 'fortalezas'.
- source_word: ὀχυρωμάτων
  english_pob_choice: strongholds
  chosen_spanish: fortalezas
  alternatives_spanish:
  - fortificaciones
  - baluartes
  - plazas fuertes
  lexicon: BDAG
  rationale: ὀχυρώματα alude a posiciones fortificadas. 'Fortalezas' es el equivalente más transparente y tradicional en español, conservando la imagen militar y el alcance metafórico.
- source_word: λογισμοὺς
  english_pob_choice: arguments
  chosen_spanish: argumentos
  alternatives_spanish:
  - razonamientos
  - especulaciones
  - pensamientos
  lexicon: BDAG
  rationale: En este contexto polémico, λογισμούς apunta a líneas de razonamiento hostiles, no a pensamientos neutros. 'Argumentos' captura bien ese sentido y mantiene la conexión con la batalla intelectual del pasaje.
- source_word: καθαιροῦντες
  english_pob_choice: tearing down
  chosen_spanish: derribando
  alternatives_spanish:
  - destruyendo
  - demoliendo
  - derrumbando
  lexicon: BDAG
  rationale: El participio retoma la misma raíz de καθαίρεσιν. 'Derribando' preserva el vínculo léxico y la imagen de abatir estructuras, con buena naturalidad en español.
theological_decisions:
- issue: Sentido de σαρκικὰ en contraste paulino entre medios humanos y poder de Dios
  english_pob_reading: fleshly
  chosen_spanish_reading: carnales
  alternative_spanish_readings:
  - de la carne
  - mundanos
  - carnales en el sentido de pecaminosos
  rationale: Se conserva la tensión paulina entre lo perteneciente a la carne y lo que procede de Dios. 'Carnales' mantiene el nexo con σάρξ sin resolverlo prematuramente en 'pecaminosos', que sería más interpretativo de lo que exige el versículo por sí solo.
  doctrine_reference: 'DOCTRINE.md: σάρξ = carne (literal) / naturaleza pecaminosa (metafórico), según el contexto; preservar la tensión cuando el texto la mantiene.'
- issue: Relación de δυνατὰ τῷ θεῷ con Dios
  english_pob_reading: powerful before God
  chosen_spanish_reading: poderosas para Dios
  alternative_spanish_readings:
  - poderosas delante de Dios
  - poderosas por Dios
  - poderosas ante Dios
  rationale: La expresión griega permite una relación dativa concisa. En español, 'para Dios' evita forzar una lectura instrumental explícita y puede abarcar la idea de que estas armas están orientadas a Dios y efectivas bajo su esfera/poder; por eso se prefiere una formulación sobria y abierta.
  doctrine_reference: 'DOCTRINE.md: equivalencia óptima; no imponer una paráfrasis teológica donde el griego es comprimido.'
translation_notes:
  revision_awareness: El texto inglés revisado osciló entre 'through God' y 'before God' para δυνατὰ τῷ θεῷ, con preferencia final por una formulación menos instrumental. La versión española adopta una solución igualmente sobria ('para Dios') que evita añadir más de lo que el dativo griego exige y mantiene la apertura semántica del audit trail. También se preserva el enlace léxico entre καθαίρεσις y καθαιροῦντες mediante 'destrucción' / 'derribando'.
  spanish_consistency_notes:
  - Se mantiene 'carnales' para σάρξ/σαρκικός cuando el contraste es con medios humanos o meramente terrenales.
  - Se usa 'Dios' para θεός y no una sustitución litúrgica.
  - Se conserva la metáfora militar con 'armas', 'guerra' y 'fortalezas'.
  - Se evita 'Cristo' u otras terminologías no presentes en este versículo.
  - Las notas al pie marcan alternativas reales del griego y no simples paráfrasis estilísticas.
