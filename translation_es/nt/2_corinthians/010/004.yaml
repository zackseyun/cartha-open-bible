review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español acierta en la imaginería militar general: ὅπλα = ''armas'', στρατείας = ''guerra'', ὀχυρωμάτων = ''fortalezas'', λογισμοὺς = ''argumentos'', y mantiene el enlace léxico entre καθαίρεσιν / καθαιροῦντες mediante ''derribo/derribando'' mejor que con una traducción más abstracta. Sin embargo, dos puntos no preservan bien el sentido auditado: (1) δυνατὰ τῷ θεῷ no queda bien representado por ''poderosas para Dios'', que suena teleológico o direccional y no refleja bien el dativo comprimido; ''ante Dios'' o ''delante de Dios'' sigue mejor la revisión inglesa auditada (''before God''). (2) ''destrucción'' para καθαίρεσιν es comprensible, pero debilita la repetición retórica con ''derribando''; una forma como ''derribo'' preserva mejor la conexión del sustantivo con el participio y la imagen de asedio.'
  spanish_quality_summary: 'El español es mayormente legible, pero ''poderosas para Dios'' resulta poco natural y algo ambiguo en español bíblico moderno. También conviene cambiar los dos puntos por una raya larga, que refleja mejor la estructura del griego y del POB inglés. ''Carnales'' es aceptable y mantiene el vínculo con σάρξ, aunque connota más tradición bíblica que español general; aquí funciona por el registro eclesial. El conjunto mejora claramente con una redacción más idiomática: ''poderosas ante Dios para el derribo de fortalezas—derribando argumentos''.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. ''Carnales'' respeta la decisión de no aplanar σάρξ a ''mundano'' o ''pecaminoso''. ''Dios'' es correcto para θεῷ. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La corrección principal es léxico-sintáctica: evitar ''para Dios'' y preferir ''ante Dios'' para alinear el español con la decisión auditada del POB y con la compresión del dativo griego.'
  issues:
  - severity: high
    issue: '''poderosas para Dios'' traduce deficientemente δυνατὰ τῷ θεῷ'
    rationale: En español, 'para Dios' sugiere finalidad, dedicación o beneficio, no el matiz de relación/evaluación reflejado en la revisión inglesa 'before God'. 'Poderosas ante Dios' o 'delante de Dios' conserva mejor la fuerza del original sin introducir instrumentalidad.
  - severity: medium
    issue: '''destrucción'' debilita la correspondencia entre καθαίρεσιν y καθαιροῦντες'
    rationale: El griego repite la raíz καθαιρ-. El POB inglés la conserva con 'tearing down ... tearing down'. En español, 'derribo ... derribando' reproduce mejor el vínculo retórico que 'destrucción ... derribando'.
  - severity: low
    issue: La puntuación con dos puntos no refleja tan bien la progresión del original
    rationale: La raya larga comunica mejor que la frase final especifica o expande el propósito anterior, en línea con el griego y el inglés auditado.
  revised_spanish_text: Porque las armas de nuestra guerra no son carnales[a], sino poderosas ante Dios[b] para el derribo de fortalezas—derribando argumentos[c]
  revised_footnotes:
  - marker: a
    text: 'O: «de la carne».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «delante de Dios» o «por Dios».'
    reason: alternative_reading
  - marker: c
    text: 'O: «razonamientos» o «especulaciones».'
    reason: lexical_alternative
  revision_rationale: Se revisa 'para Dios' a 'ante Dios' para reflejar mejor δυνατὰ τῷ θεῷ según la revisión auditada del POB y evitar un sentido final impropio en español. Se cambia 'destrucción' por 'derribo' para preservar la repetición léxica con 'derribando' y mantener la imaginería de asedio del original. Se sustituye el signo de dos puntos por raya larga para reflejar mejor la estructura explicativa/especificativa del griego.
