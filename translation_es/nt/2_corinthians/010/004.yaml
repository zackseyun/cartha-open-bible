revisions:
- from: 'Porque las armas de nuestra guerra no son carnales[a], sino poderosas para Dios[b], para la destrucción de fortalezas: derribando argumentos[c]'
  to: Porque las armas de nuestra guerra no son carnales[a], sino poderosas ante Dios[b] para el derribo de fortalezas—derribando argumentos[c]
  rationale: Se revisa 'para Dios' a 'ante Dios' para reflejar mejor δυνατὰ τῷ θεῷ según la revisión auditada del POB y evitar un sentido final impropio en español. Se cambia 'destrucción' por 'derribo' para preservar la repetición léxica con 'derribando' y mantener la imaginería de asedio del original. Se sustituye el signo de dos puntos por raya larga para reflejar mejor la estructura explicativa/especificativa del griego.
  reviewer_model: gpt-5.4
