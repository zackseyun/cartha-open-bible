source:
  edition: SBLGNT
  text: Αὐτὸς δὲ ἐγὼ Παῦλος παρακαλῶ ὑμᾶς διὰ τῆς πραΰτητος καὶ ἐπιεικείας τοῦ Χριστοῦ, ὃς κατὰ πρόσωπον μὲν ταπεινὸς ἐν ὑμῖν, ἀπὼν δὲ θαρρῶ εἰς ὑμᾶς·
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/001.yaml
  text: Now I myself[a], Paul, appeal to you by the meekness and gentleness of Messiah—I who am humble face to face among you[c][b], but bold toward you when absent.
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: alternative_reading
  - marker: b
    text: '''Humble'' may reflect an ironic summary of what some said about Paul in person; alternatively, ''lowly'' or, more interpretively, ''timid.'''
    reason: lexical_alternative
  - marker: c
    text: Literally 'according to face'; that is, 'in person' or 'face to face.'
    reason: lexical_alternative
