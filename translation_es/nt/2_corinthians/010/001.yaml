    changes_summary: 'Changed ''Messiah'' to ''Christ'' for more natural rendering and consistency with Paul''s usage in this epistle; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Ahora yo mismo, Pablo, les ruego por la mansedumbre y la gentileza del Mesías[a]: yo, que en persona[b] soy humilde[c] entre ustedes, pero cuando estoy ausente soy audaz con ustedes.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». Χριστός se vierte aquí «Mesías» porque funciona como título.
    reason: alternative_reading
  - marker: b
    text: Literalmente, «según rostro»; es decir, «en persona» o «cara a cara».
    reason: lexical_alternative
  - marker: c
    text: «Humilde» puede reflejar un resumen irónico de lo que algunos decían de Pablo en persona; alternativamente, «bajo» o, de manera más interpretativa, «tímido».
    reason: lexical_alternative
lexical_decisions:
- source_word: Αὐτὸς δὲ ἐγὼ Παῦλος
  english_pob_choice: Now I myself, Paul
  chosen_spanish: Ahora yo mismo, Pablo
  alternatives_spanish:
  - Pero yo mismo, Pablo
  - Yo, Pablo, mismo
  lexicon: BDAG
  rationale: El griego pone énfasis en la persona de Pablo; en español, «Ahora yo mismo, Pablo» conserva el arranque enfático y el giro de transición de δέ sin sobrerrepresentar un contraste.
- source_word: παρακαλῶ
  english_pob_choice: appeal to
  chosen_spanish: les ruego
  alternatives_spanish:
  - les suplico
  - les exhorto
  - les imploro
  lexicon: BDAG
  rationale: Aquí Pablo hace una súplica personal más que dar una orden. «Les ruego» comunica bien el valor relacional y apelativo de παρακαλέω en este contexto.
- source_word: διὰ τῆς πραΰτητος
  english_pob_choice: by the meekness
  chosen_spanish: por la mansedumbre
  alternatives_spanish:
  - por la humildad apacible
  - por la mansedumbre
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o base. «Por la mansedumbre» es natural en español y conserva la cualidad moral asociada a πραΰτης sin debilitarla a mera suavidad.
- source_word: ἐπιεικείας
  english_pob_choice: gentleness
  chosen_spanish: la benignidad
  alternatives_spanish:
  - la gentileza
  - la moderación
  - la consideración
  lexicon: BDAG
  rationale: ἐπιείκεια denota una actitud considerada, clemente y cederante. «Benignidad» funciona en español bíblico digno y mantiene la idea de trato benévolo y contenido; «gentileza» sería posible, pero puede sonar más social que moral.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Χριστός funciona como título, no solo como nombre propio. Conforme al criterio del proyecto, se traduce «Mesías» para preservar el sentido titular y la resonancia mesiánica.
- source_word: κατὰ πρόσωπον
  english_pob_choice: face to face
  chosen_spanish: en persona
  alternatives_spanish:
  - cara a cara
  - de presencia
  - según la apariencia
  lexicon: BDAG
  rationale: La expresión idiomática apunta a presencia personal frente a ausencia. «En persona» es claro y fiel al contraste del versículo; se mantiene la idea sin forzar una calca.
- source_word: ταπεινὸς
  english_pob_choice: humble
  chosen_spanish: soy humilde
  alternatives_spanish:
  - soy bajo de ánimo
  - soy de apariencia humilde
  - soy tímido
  lexicon: BDAG
  rationale: En este contexto puede sonar como auto-descripción irónica o como resumen de la acusación de algunos. «Soy humilde» conserva la tensión sin resolverla; «tímido» sería más interpretativo de lo que el griego exige.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - con ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: La frase indica presencia dentro del grupo. «Entre ustedes» es idiomático y mantiene el contraste con la ausencia posterior.
- source_word: ἀπὼν
  english_pob_choice: when absent
  chosen_spanish: ausente
  alternatives_spanish:
  - estando ausente
  - cuando estoy ausente
  - alejado
  lexicon: BDAG
  rationale: El participio expresa circunstancia temporal. En español, el adjetivo «ausente» resulta natural en esta construcción y comunica la oposición con la presencia.
- source_word: θαρρῶ
  english_pob_choice: bold
  chosen_spanish: atrevido
  alternatives_spanish:
  - audaz
  - confiado
  - valiente
  lexicon: BDAG
  rationale: En el contraste retórico del versículo, θάρρος apunta a una osadía o seguridad al escribir. «Atrevido» refleja bien ese matiz sin convertirlo en agresión.
- source_word: εἰς ὑμᾶς
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - contra ustedes
  - respecto de ustedes
  lexicon: BDAG
  rationale: εἰς marca dirección de actitud o acción. «Hacia ustedes» mantiene la amplitud del griego y evita cargar el texto con una hostilidad que el original no explicita.
theological_decisions:
- issue: Rendering Χριστοῦ
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El término funciona como título. La política del proyecto pide traducir los títulos cristológicos cuando el sentido titular es claro, por lo que «Mesías» preserva el valor semántico y la resonancia judía.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Posible ironía en la auto-descripción de Pablo
  english_pob_reading: Retain the wording in a way that preserves possible irony rather than resolving whether Paul endorses or echoes an accusation
  chosen_spanish_reading: Conservar una formulación que permita la ironía sin decidirla en el texto principal
  alternative_spanish_readings:
  - «soy tímido»
  - «soy bajo de ánimo»
  - «soy humilde» como simple autodescripción positiva
  rationale: El griego no marca explícitamente si Pablo cita o retoma una crítica ajena. La traducción mantiene la ambigüedad para no cerrar indebidamente la tensión retórica.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El audit trail inglés muestra una ida y vuelta entre «Christ» y «Messiah»; seguí la restauración final de «Messiah» y la política doctrinal del proyecto. También conservé la tensión interpretativa sobre ταπεινός en lugar de resolverla como «tímido» o suavizarla excesivamente.
  spanish_consistency_notes:
  - Usé «Mesías» para Χριστός como título, consistente con la política del proyecto.
  - Mantuve un registro neutral de παρακαλῶ como «les ruego», evitando sobredeterminarlo como mandato.
  - Elegí «en persona» para κατὰ πρόσωπον por claridad idiomática y fidelidad al contraste con «ausente».
  - Conservé la ambigüedad de ταπεινός para no eliminar la posible ironía del pasaje.
  - Usé puntuación española estándar con raya implícita sustituida por dos puntos para introducir la cláusula explicativa.
