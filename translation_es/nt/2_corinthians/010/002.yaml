translation:
  language: es
  text: Pero les ruego que, cuando yo esté presente, no tenga que actuar con audacia, con la confianza con que me propongo atreverme contra algunos que nos consideran como si anduviéramos según la carne[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como si viviéramos según criterios humanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: δέομαι
  english_pob_choice: I beg
  chosen_spanish: les ruego
  alternatives_spanish:
  - les pido con insistencia
  - les imploro
  lexicon: BDAG
  rationale: δέομαι expresa una súplica intensa; en español, «les ruego» conserva el tono serio y respetuoso de una petición apremiante sin sonar demasiado artificial.
- source_word: τὸ μὴ παρὼν θαρρῆσαι
  english_pob_choice: that when I am present I may not have to be bold
  chosen_spanish: que, cuando yo esté presente, no tenga que ser atrevido
  alternatives_spanish:
  - que, estando presente, no tenga que ser valiente
  - que, cuando esté presente, no deba actuar con audacia
  lexicon: BDAG
  rationale: La construcción articula el contenido de la súplica. «No tenga que ser atrevido» preserva la idea de una audacia necesaria que Pablo desea evitar, sin suavizarla en exceso.
- source_word: παρὼν
  english_pob_choice: present
  chosen_spanish: esté presente
  alternatives_spanish:
  - esté con ustedes
  - esté allí
  lexicon: BDAG
  rationale: «Esté presente» reproduce la oposición entre presencia y ausencia en el contexto inmediato y mantiene la forma natural del español.
- source_word: θαρρῆσαι
  english_pob_choice: be bold
  chosen_spanish: ser atrevido
  alternatives_spanish:
  - ser valiente
  - actuar con audacia
  lexicon: BDAG
  rationale: El verbo apunta a una firmeza osada. «Atrevido» conserva mejor esa fuerza en español, aunque connota algo más confrontativo que «valiente».
- source_word: τῇ πεποιθήσει
  english_pob_choice: with the confidence
  chosen_spanish: con la confianza
  alternatives_spanish:
  - en la confianza
  - con la seguridad
  lexicon: BDAG
  rationale: πεποίθησις significa confianza o seguridad. El dativo se entiende aquí de manera instrumental/asociativa, por eso «con la confianza» es la solución más natural.
- source_word: ᾗ λογίζομαι
  english_pob_choice: with which I consider
  chosen_spanish: con que pienso actuar
  alternatives_spanish:
  - con que considero actuar
  - según la cual juzgo
  lexicon: BDAG
  rationale: λογίζομαι aquí expresa una evaluación o cálculo previo. «Pienso actuar» comunica la intención deliberada y mantiene el vínculo con la confianza sin volver la frase demasiado pesada.
- source_word: τολμῆσαι
  english_pob_choice: daring against
  chosen_spanish: ser atrevido
  alternatives_spanish:
  - atreverme
  - osar
  lexicon: BDAG
  rationale: El infinitivo de τολμάω mantiene la idea de atreverse. En español, «ser atrevido» o «atreverme» expresan la misma disposición; se eligió la forma más fluida dentro de la construcción.
- source_word: ἐπί τινας
  english_pob_choice: against some
  chosen_spanish: contra algunos
  alternatives_spanish:
  - sobre algunos
  - frente a algunos
  lexicon: BDAG
  rationale: La preposición con personas tiene un matiz adversativo. «Contra algunos» reproduce ese valor sin ampliar indebidamente la escena.
- source_word: τοὺς λογιζομένους
  english_pob_choice: who regard
  chosen_spanish: que nos consideran
  alternatives_spanish:
  - que piensan de nosotros
  - que nos juzgan
  lexicon: BDAG
  rationale: El participio describe una evaluación acerca de Pablo y sus colaboradores. «Nos consideran» conserva ese sentido de juicio valorativo.
- source_word: ὡς κατὰ σάρκα περιπατοῦντας
  english_pob_choice: as walking according to the flesh
  chosen_spanish: como si anduviéramos según la carne
  alternatives_spanish:
  - como si viviéramos según la carne
  - como si nos condujéramos según la carne
  lexicon: BDAG
  rationale: Se preserva la expresión paulina «según la carne» para no borrar la tensión teológica de σάρξ. «Anduviéramos» mantiene la metáfora bíblica de conducta.
theological_decisions:
- issue: σάρξ en κατὰ σάρκα
  english_pob_reading: according to the flesh
  chosen_spanish_reading: según la carne
  alternative_spanish_readings:
  - según criterios humanos
  - según una conducta carnal
  rationale: 'La frase es paulina y teológicamente densa. Traducirla por «según la carne» conserva el término clave y su ambigüedad: puede aludir a una evaluación meramente humana o a una conducta carnal, sin cerrar prematuramente el sentido.'
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ'
- issue: El matiz de θάρρος/τολμάω en la corrección apostólica
  english_pob_reading: I may not have to be bold ... daring against some
  chosen_spanish_reading: no tenga que ser atrevido ... ser atrevido contra algunos
  alternative_spanish_readings:
  - no tenga que hablar con dureza
  - no tenga que actuar con valentía
  rationale: El contexto muestra una posible firmeza disciplinaria de Pablo si fuera necesario. «Atrevido» conserva el nervio retórico sin convertir la advertencia en hostilidad gratuita.
  doctrine_reference: Contexto epistolar de la autoridad apostólica en 2 Corintios 10
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del inglés POB: se mantuvo el valor adversativo de δέ con «Pero», se conservó la relación instrumental de πεποιθήσει con «con la confianza», y se evitó expandir ἐπί τινας más allá de una referencia a «contra algunos».'
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ por coherencia con el registro paulino del proyecto.
  - «Les ruego» conserva un nivel de formalidad respetuoso sin perder urgencia.
  - La metáfora de «andar» se preserva para περιπατοῦντας, en línea con el patrón paulino de conducta.
  - La nota al pie ofrece la alternativa semántica que el inglés POB ya documenta, adaptada a un giro natural en español.
