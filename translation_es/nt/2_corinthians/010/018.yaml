translation:
  language: es
  text: Porque no es aprobado el que se recomienda[a] a sí mismo, sino aquel a quien el Señor recomienda.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se elogia a sí mismo» ... «aquel a quien el Señor elogia». El mismo verbo griego se usa en ambos lugares.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνιστάνων
  english_pob_choice: commends
  chosen_spanish: recomienda
  alternatives_spanish:
  - presenta
  - comienda
  - establece
  lexicon: BDAG
  rationale: En este contexto de autoexaltación y evaluación, συνίστημι expresa la acción de presentarse o recomendarse para aprobación. «Recomienda» suena natural en español y conserva la relación verbal con la segunda ocurrencia del mismo verbo.
- source_word: δόκιμος
  english_pob_choice: approved
  chosen_spanish: aprobado
  alternatives_spanish:
  - aceptado
  - apto
  - probado
  lexicon: BDAG
  rationale: δόκιμος denota a quien ha sido aprobado tras examen o prueba. «Aprobado» comunica bien el contraste entre la auto-recomendación y el reconocimiento del Señor.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título tradicional «Señor» como equivalente de κύριος. En el contexto paulino puede referirse al Señor Jesús, pero el texto griego no lo explicita aquí.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - uno mismo
  - él mismo
  lexicon: BDAG
  rationale: La construcción reflexiva masculina singular se expresa naturalmente en español con «a sí mismo», preservando el sentido personal y reflexivo del griego.
- source_word: ὃν
  english_pob_choice: the one whom
  chosen_spanish: aquel a quien
  alternatives_spanish:
  - el que
  - quien
  lexicon: BDAG
  rationale: «Aquel a quien» mantiene claro el contraste del griego entre la persona que se recomienda a sí misma y la persona recomendada por el Señor.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce una explicación de lo anterior. «Porque» conserva esa fuerza explicativa de manera fluida en español.
theological_decisions:
- issue: Referente de «el Señor» (ὁ κύριος)
  english_pob_reading: Rendered simply as 'the Lord' without specifying further in the main text.
  chosen_spanish_reading: Se traduce simplemente «el Señor» sin identificarlo más en el texto principal.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: Aunque en el contexto paulino puede referirse a Jesús, el griego usa solo κύριος. La traducción preserva esa ambigüedad controlada sin resolverla de manera interpretativa en el texto principal.
  doctrine_reference: 'DOCTRINE.md: traducir títulos y preservar la tensión teológica cuando el texto no la resuelve explícitamente.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se registraron cambios necesarios y hubo alto grado de acuerdo con la evaluación externa.'
  spanish_consistency_notes:
  - Se mantuvo el paralelismo verbal entre las dos ocurrencias de συνίστημι mediante «recomienda» en ambos miembros.
  - Se eligió «aprobado» para δόκιμος por su claridad en contraste con la auto-recomendación.
  - Se conservó «Señor» como traducción de κύριος sin especificación adicional en la línea principal.
  - La sintaxis española reproduce el contraste del original sin añadir contenido interpretativo.
