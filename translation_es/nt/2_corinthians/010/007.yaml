translation:
  language: es
  text: 'Ustedes se fijan en las apariencias[a]. Si alguno confía en sí mismo y piensa que es del Mesías, considere esto otra vez dentro de sí: que, así como él es del Mesías[b], así también lo somos nosotros.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ustedes miran lo que está delante de su rostro», «Ustedes se fijan en lo superficial».'
    reason: alternative_reading
  - marker: b
    text: Lit. «es del Mesías»; aquí se conserva la idea de pertenencia o lealtad, no sólo identidad nominal.
    reason: alternative_reading
lexical_decisions:
- source_word: Τὰ κατὰ πρόσωπον
  english_pob_choice: outward appearances
  chosen_spanish: las apariencias
  alternatives_spanish:
  - lo que está delante de su rostro
  - las cosas conforme a la apariencia
  - lo superficial
  lexicon: BDAG
  rationale: La expresión griega es idiomática y apunta a la evaluación externa o superficial. «Las apariencias» comunica de forma natural en español esa idea sin perder el contraste con el discernimiento interior que exige el contexto.
- source_word: βλέπετε
  english_pob_choice: You are looking at
  chosen_spanish: ustedes se fijan
  alternatives_spanish:
  - ustedes miran
  - ustedes están mirando
  - miren
  lexicon: BDAG
  rationale: 'El verbo puede leerse como indicativo o imperativo, pero el contexto de reproche favorece una afirmación acusatoria: Pablo dice que ellos están evaluando por la apariencia. «Se fijan» conserva la idea de prestar atención evaluativa.'
- source_word: πέποιθεν
  english_pob_choice: is confident
  chosen_spanish: está convencido
  alternatives_spanish:
  - tiene confianza
  - está seguro
  - se fía
  lexicon: BDAG
  rationale: El perfecto de πείθω expresa una seguridad asentada. En español, «está convencido» refleja mejor ese estado de convicción sostenida que una confianza momentánea.
- source_word: ἑαυτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - sobre sí mismo
  - para sí mismo
  lexicon: BDAG
  rationale: El dativo indica la esfera de esa confianza. «En sí mismo» conserva el matiz de auto-confianza y evita sugerir sólo reflexión privada.
- source_word: Χριστοῦ εἶναι
  english_pob_choice: belongs to the Messiah
  chosen_spanish: es del Mesías
  alternatives_spanish:
  - pertenece al Mesías
  - es de Cristo
  lexicon: BDAG
  rationale: La construcción genitiva expresa pertenencia o lealtad. Siguiendo la política del proyecto, Χριστός se rinde como «Mesías» cuando funciona como título, y en español la relación se expresa de forma breve y clara con «es del Mesías».
- source_word: λογιζέσθω
  english_pob_choice: let him consider
  chosen_spanish: considere
  alternatives_spanish:
  - razone
  - piense
  - calcule
  lexicon: BDAG
  rationale: El imperativo pide una reconsideración deliberada. «Considere» mantiene el tono reflexivo y exhortativo sin sonar mecánico.
- source_word: πάλιν
  english_pob_choice: again
  chosen_spanish: otra vez
  alternatives_spanish:
  - de nuevo
  - nuevamente
  lexicon: BDAG
  rationale: Marca una nueva evaluación. «Otra vez» es natural y conserva la insistencia del contexto.
- source_word: ἐφ’ ἑαυτοῦ
  english_pob_choice: within himself
  chosen_spanish: dentro de sí mismo
  alternatives_spanish:
  - en su interior
  - para sí
  - por su cuenta
  lexicon: BDAG
  rationale: La frase señala una reconsideración interior, no sólo privada sino mental e interna. «Dentro de sí mismo» expresa bien ese matiz introspectivo.
- source_word: καθὼς αὐτὸς Χριστοῦ οὕτως καὶ ἡμεῖς
  english_pob_choice: just as he belongs to the Messiah, so also do we
  chosen_spanish: así como él es del Mesías, así también lo somos nosotros
  alternatives_spanish:
  - así como él pertenece al Mesías, así también nosotros
  - como él es del Mesías, así somos también nosotros
  lexicon: BDAG
  rationale: La cláusula comparativa repite la idea de pertenencia/lealtad al Mesías. En español se mantiene la elipsis del verbo y se la completa de manera natural en la segunda mitad para que el contraste quede claro.
theological_decisions:
- issue: Rendering Χριστοῦ as a title rather than a fixed name
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto trata de pertenencia y lealtad al ungido de Dios, por lo que el término funciona aquí como título. Mantener «Mesías» sigue la política del proyecto y evita convertirlo en un nombre fijo cuando el griego conserva fuerza titular.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Force of the opening clause
  english_pob_reading: You are looking at outward appearances
  chosen_spanish_reading: Ustedes se fijan en las apariencias
  alternative_spanish_readings:
  - Miren las apariencias
  - Ustedes miran sólo lo exterior
  rationale: El griego permite lectura indicativa o imperativa, pero el flujo argumental es de reprensión. La traducción adopta la lectura indicativa acusatoria, que coincide con el audit trail inglés y preserva el reproche de Pablo.
  doctrine_reference: Contextual syntax decision based on Greek mood ambiguity
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que osciló entre «Christ» y «Messiah»; la restauración final a «Messiah» se respetó en español con «Mesías». También se tuvo en cuenta que la primera cláusula admite lectura imperativa o indicativa, pero el contexto de reprensión favorece la indicativa.
  spanish_consistency_notes:
  - Se conservó «Mesías» para Χριστός, de acuerdo con la política del proyecto y la revisión final del inglés.
  - Se evitó «Cristo» salvo que el contexto exigiera un nombre fijo; aquí el sentido titular y de pertenencia es más claro con «Mesías».
  - La duplicación de la idea de pertenencia en la última cláusula se mantuvo explícita para que el contraste paulino quede claro en español.
  - Se eligió un español de registro sobrio y claro, apto para lectura pública eclesial, sin calcos innecesarios.
