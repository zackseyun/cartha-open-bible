source:
  edition: SBLGNT
  text: Τὰ κατὰ πρόσωπον βλέπετε. εἴ τις πέποιθεν ἑαυτῷ Χριστοῦ εἶναι, τοῦτο λογιζέσθω πάλιν ⸀ἐφ’ ἑαυτοῦ ὅτι καθὼς αὐτὸς Χριστοῦ οὕτως καὶ ⸀ἡμεῖς.
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/010/007.yaml
  text: 'You are looking at outward appearances[a]. If anyone is confident in himself that he belongs to Messiah, let him consider this again within himself: that just as he belongs to Messiah[b], so also do we.'
  footnotes:
  - marker: a
    text: Or, more literally, 'You look at things according to appearance' or possibly 'Look at what is before your face.'
    reason: lexical_alternative
  - marker: b
    text: Greek 'is Christ's'; rendered 'belongs to the Messiah' to express the sense of allegiance/belonging and to translate Χριστός as a title.
    reason: alternative_reading
