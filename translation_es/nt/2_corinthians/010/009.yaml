translation:
  language: es
  text: para que no parezca como si estuviera tratando de atemorizarlos[a] por medio de mis cartas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como si estuviera tratando de intimidarlos»; también posible «por medio de las cartas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce una cláusula de propósito; en español, «para que» expresa de forma natural esa relación final sin perder la dependencia sintáctica.
- source_word: μὴ
  english_pob_choice: not
  chosen_spanish: 'no'
  lexicon: BDAG
  rationale: Negación estándar en la cláusula subordinada, preservando el alcance del subjuntivo.
- source_word: δόξω
  english_pob_choice: I may not seem
  chosen_spanish: no parezca
  alternatives_spanish:
  - no aparezca
  - no dé la impresión
  lexicon: BDAG
  rationale: δόξω, de δοκέω, aquí significa «parecer» o «dar la impresión», no «pensar». «No parezca» conserva el valor aspectual y la modestia del enunciado.
- source_word: ὡς ἂν
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera que
  - cual si
  lexicon: BDAG
  rationale: La combinación ὡς ἂν introduce una comparación hipotética; «como si» es la equivalencia española más natural y fiel.
- source_word: ἐκφοβεῖν
  english_pob_choice: were trying to frighten
  chosen_spanish: tratando de atemorizarlos
  alternatives_spanish:
  - queriendo intimidarlos
  - tratando de asustarlos
  lexicon: BDAG
  rationale: ἐκφοβέω expresa amedrentar o causar fuerte temor. «Atemorizar» conserva la fuerza del verbo; «tratando de» refleja el matiz de aparente intención que en inglés POB se explicitó con una perífrasis.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - os
  - a ustedes
  lexicon: BDAG
  rationale: El objeto directo plural se hace explícito en español con el pronombre enclítico en la forma verbal («atemorizarlos»), manteniendo naturalidad y referencia directa a los destinatarios.
- source_word: διὰ τῶν ἐπιστολῶν
  english_pob_choice: by my letters
  chosen_spanish: por medio de mis cartas
  alternatives_spanish:
  - por mis cartas
  - a través de mis cartas
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. Aunque el griego dice literalmente «de las cartas», el contexto señala las cartas de Pablo; «mis cartas» hace explícito el referente ya implícito en el contexto, y «por medio de» preserva el valor instrumental.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando el anclaje ausente y colocando el marcador [a] exactamente en el término al que se refiere la alternativa lexical.
  spanish_consistency_notes:
  - Se conservó un registro sobrio y publicable, sin añadir contenido ajeno al verso.
  - Se mantuvo la fuerza de ἐκφοβεῖν con un verbo español de intensidad equivalente.
  - Se hizo explícito el posesivo en «mis cartas» siguiendo el contexto paulino y el manejo del POB en inglés.
