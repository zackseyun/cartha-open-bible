translation:
  language: es
  text: Porque aunque andamos en la carne[a], no hacemos guerra conforme a la carne—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque aunque vivimos en el cuerpo, no hacemos guerra según criterios meramente humanos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en el cuerpo
  - en condición corporal
  - en la esfera de la carne
  lexicon: BDAG
  rationale: Conservo la preposición y el sustantivo de manera bastante literal para mantener el contraste paulino entre la existencia encarnada y los criterios de guerra. 'En la carne' comunica bien σάρξ sin adelantar aquí 'naturaleza pecaminosa', que sería demasiado interpretativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Pues bien
  lexicon: BDAG
  rationale: γάρ introduce una explicación del enunciado anterior. 'Porque' es natural en español y mantiene el enlace argumentativo.
- source_word: περιπατοῦντες
  english_pob_choice: though we walk
  chosen_spanish: aunque andamos
  alternatives_spanish:
  - mientras andamos
  - aunque vivimos
  - mientras vivimos
  lexicon: BDAG
  rationale: El participio presenta la idea de conducta o modo de vida. 'Andamos' conserva la metáfora paulina de caminar, y 'aunque' refleja bien el valor concesivo del contexto.
- source_word: οὐ κατὰ σάρκα
  english_pob_choice: not according to the flesh
  chosen_spanish: no conforme a la carne
  alternatives_spanish:
  - no según la carne
  - no de manera carnal
  - no según criterios meramente humanos
  lexicon: BDAG
  rationale: '''κατὰ'' con acusativo expresa norma o criterio. ''Conforme a la carne'' preserva la repetición de σάρξ y deja abierta la amplitud de sentido: carnal, meramente humano o gobernado por la carne.'
- source_word: στρατευόμεθα
  english_pob_choice: we do not wage war
  chosen_spanish: no militamos
  alternatives_spanish:
  - no hacemos guerra
  - no guerreamos
  - no combatimos
  lexicon: BDAG
  rationale: 'El verbo tiene imaginería militar. ''Militamos'' es idiomático en español bíblico y conserva la metáfora sin sonar excesivamente explicativo. El contexto negativo ya completa el sentido de ''no militamos''. '
theological_decisions:
- issue: Doble uso de σάρξ
  english_pob_reading: Translate both occurrences with 'flesh' in the main text rather than 'sinful nature' or 'human standards.'
  chosen_spanish_reading: Traducir ambos usos con 'carne' en el texto principal.
  alternative_spanish_readings:
  - en el cuerpo ... no según criterios humanos
  - en la carne ... no de manera carnal
  - en condición corporal ... no conforme a la carne
  rationale: La repetición de σάρξ es retórica y teológicamente importante. Mantener 'carne' en ambos lugares preserva la tensión entre la existencia humana ordinaria y los métodos de combate, sin resolver prematuramente el matiz en una paráfrasis doctrinal.
  doctrine_reference: 'DOCTRINE.md: Términos controvertidos — σάρξ; principios de preservación de la repetición léxica'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto fuente SBLGNT y con el audit trail inglés: no hay revisiones aplicadas ni variación textual relevante reportada en el paquete actual.'
  spanish_consistency_notes:
  - Se mantuvo la repetición de 'carne' para reflejar la repetición de σάρξ en el griego.
  - Se eligió 'militamos' por su fuerza militar y por ser natural en un registro bíblico contemporáneo.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; no hay terminología cristológica o divina en este versículo.
