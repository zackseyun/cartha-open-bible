translation:
  language: es
  text: Pero el que se jacta, que se jacte en el Señor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Que el que se jacta, se jacte en el Señor». Pablo probablemente está haciendo eco de Jeremías 9:24 (LXX 9:23).'
    reason: cross_reference
lexical_decisions:
- source_word: Ὁ δὲ καυχώμενος
  english_pob_choice: But the one who boasts
  chosen_spanish: Pero el que se gloría
  alternatives_spanish:
  - Pero el que se jacta
  - Pero el que se ufana
  lexicon: BDAG
  rationale: El participio sustantivado con artículo se vierte de manera genérica como una persona caracterizada por esa acción. «Gloriarse» conserva mejor el tono bíblico-retórico y la posibilidad de eco intertextual que un simple «presumir», sin perder la fuerza de καυχάομαι.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Jesús
  - en Dios
  lexicon: BDAG
  rationale: Se mantiene la fórmula idiomática española natural «en el Señor», que refleja la construcción griega con ἐν y preserva la ambigüedad reverente del referente, sin forzar una identificación más precisa que el griego no explicita.
- source_word: καυχάσθω
  english_pob_choice: must boast
  chosen_spanish: gloríese
  alternatives_spanish:
  - debe gloriarse
  - que se gloríe
  lexicon: BDAG
  rationale: El imperativo exhortativo se expresa con el subjuntivo exhortativo español «gloríese», que comunica adecuadamente el mandato sin añadir la modalización de «debe», y conserva el paralelismo y la concisión del original.
theological_decisions:
- issue: Referente de «el Señor» en un eco/cita escritural
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El texto griego solo dice κυρίῳ, y el contexto paulino evoca Jeremías sin identificar de modo explícito al referente. La traducción conserva «el Señor» para no resolver prematuramente la tensión teológica y dejar el eco escritural abierto.
  doctrine_reference: 'Contested terms: κύριος → Señor; preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se revisó el pasaje frente al griego SBLGNT y el audit trail en inglés. La redacción española sigue de cerca la estructura del original, conserva el imperativo exhortativo y mantiene el eco probable de Jeremías sin sobreinterpretarlo.
  spanish_consistency_notes:
  - Se prefirió «gloriarse» para mantener una equivalencia bíblica natural y evitar un calco menos idiomático como «boast».
  - «Señor» se mantiene sin expansión para respetar la ambigüedad del texto fuente y la práctica POB documentada en inglés.
  - El orden español se ajusta para sonar publicable en lectura eclesial sin perder la relación entre participio y imperativo.
