translation:
  language: es
  text: y toda cosa elevada[a] que se levanta contra el conocimiento de Dios, y tomando cautivo todo pensamiento a la obediencia del Mesías[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «toda cosa alta» o «toda pretensión» para «toda cosa elevada».
    reason: lexical_alternative
  - marker: b
    text: Griego «el Mesías»; tradicionalmente, «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶν ὕψωμα
  english_pob_choice: every lofty thing
  chosen_spanish: toda altivez
  alternatives_spanish:
  - toda cosa elevada
  - todo orgullo
  - todo obstáculo soberbio
  lexicon: BDAG
  rationale: ὕψωμα nombra algo elevado o ensalzado; en este contexto metafórico, 'altivez' comunica bien la idea de elevación orgullosa o dominante sin reducirla solo a una 'pretensión'. 'Toda' conserva el valor distributivo de πᾶν.
- source_word: ἐπαιρόμενον
  english_pob_choice: raised up
  chosen_spanish: que se levanta
  alternatives_spanish:
  - levantada
  - exaltada
  - que se exalta
  lexicon: BDAG
  rationale: El participio expresa algo que está elevado o levantado. 'Que se levanta' mantiene la imagen y puede funcionar de manera natural con 'altivez' en español, sin imponer un matiz reflexivo más fuerte que el griego exige.
- source_word: κατὰ τῆς γνώσεως τοῦ θεοῦ
  english_pob_choice: against the knowledge of God
  chosen_spanish: contra el conocimiento de Dios
  alternatives_spanish:
  - contra el conocer a Dios
  - en oposición al conocimiento de Dios
  lexicon: BDAG
  rationale: γνῶσις se rinde con 'conocimiento' aquí, porque el contraste es con el conocimiento verdadero de Dios. 'De Dios' preserva la relación genitiva compacta del griego sin estrechar indebidamente el sentido.
- source_word: αἰχμαλωτίζοντες
  english_pob_choice: taking captive
  chosen_spanish: llevando cautivo
  alternatives_spanish:
  - capturando
  - tomando cautivo
  - haciendo prisionero
  lexicon: BDAG
  rationale: El verbo describe tomar como cautivo, con imagen militar. 'Llevando cautivo' es idiomático en español y conserva el proceso/resultado de someter y conducir bajo control.
- source_word: πᾶν νόημα
  english_pob_choice: every thought
  chosen_spanish: todo pensamiento
  alternatives_spanish:
  - toda mente
  - todo designio
  - todo razonamiento
  lexicon: BDAG
  rationale: νόημα puede significar pensamiento, intención o disposición mental. 'Pensamiento' es la opción más natural y amplia aquí; 'todo' reproduce la fuerza distributiva de πᾶν.
- source_word: εἰς τὴν ὑπακοὴν
  english_pob_choice: into obedience
  chosen_spanish: a la obediencia
  alternatives_spanish:
  - hacia la obediencia
  - para obediencia
  - dentro de la obediencia
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento hacia un estado resultante, en español 'a la obediencia' comunica con claridad esa orientación sin sonar forzado. Se evita una calca menos natural como 'dentro de la obediencia'.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: to Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Cristo
  lexicon: BDAG
  rationale: Se conserva la traducción titulada 'Mesías', siguiendo la norma del proyecto para Χριστός cuando funciona como título. El genitivo se entiende como obediencia perteneciente a, dirigida a, o en relación con el Mesías.
theological_decisions:
- issue: Rendering of Χριστοῦ as a title rather than a fixed name-form
  english_pob_reading: to Messiah
  chosen_spanish_reading: del Mesías
  alternative_spanish_readings:
  - de Cristo
  rationale: El contexto presenta Χριστός como título; por eso se vierte 'Mesías' para mantener el valor semántico original. Se evita normalizarlo a 'Cristo' sin una razón basada en la fuente.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; Χριστός → Mesías cuando funciona como título.'
- issue: Scope of the exalted opposition in πᾶν ὕψωμα ἐπαιρόμενον
  english_pob_reading: every lofty thing raised up against the knowledge of God
  chosen_spanish_reading: toda altivez que se levanta contra el conocimiento de Dios
  alternative_spanish_readings:
  - toda pretensión que se levanta contra el conocimiento de Dios
  - todo obstáculo soberbio levantado contra el conocimiento de Dios
  rationale: La imagen es amplia y metafórica; 'altivez' mantiene la tensión entre orgullo, elevación y oposición sin cerrar el sentido a una sola clase de objeto o idea. Esto preserva la amplitud del griego y el alcance teológico del pasaje.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en lugar de resolverla prematuramente.'
translation_notes:
  revision_awareness: 'La redacción sigue el texto griego de SBLGNT y toma en cuenta el historial de revisión en inglés: se mantuvo la decisión doctrinal de traducir Χριστός como ''Mesías'' y se evitó deslizar el sentido hacia una formulación más tradicional que borrara el título. También se conservó la metáfora amplia de la oposición elevada contra el conocimiento de Dios.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos cláusulas unidas por 'y'.
  - '''Conocimiento de Dios'' preserva el genitivo sin añadir explicaciones.'
  - '''Llevando cautivo'' conserva la imagen militar del verbo αἰχμαλωτίζοντες.'
  - El artículo y la distributividad de πᾶν se expresan con 'toda' / 'todo'.
  - Se evita 'SEÑOR' u otras sustituciones litúrgicas no respaldadas por la fuente.
