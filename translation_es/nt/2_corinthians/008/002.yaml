translation:
  language: es
  text: que, en una severa prueba de aflicción, la abundancia de su alegría y su profunda pobreza[a] desbordaron en la riqueza[b] de su generosidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hasta lo profundo de su pobreza’ o ‘su pobreza extrema’.
    reason: lexical_alternative
  - marker: b
    text: O ‘la riqueza de su liberalidad’; el griego también puede significar ‘simplicidad’ o ‘sencillez de corazón’, pero aquí probablemente se refiere a dar con generosidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν πολλῇ δοκιμῇ θλίψεως
  english_pob_choice: in a severe test of affliction
  chosen_spanish: en una severa prueba de aflicción
  alternatives_spanish:
  - en una gran prueba de aflicción
  - en medio de una severa aflicción
  - en un duro examen de aflicción
  lexicon: BDAG
  rationale: δοκιμή apunta a una prueba o examen; con θλίψεως, el conjunto expresa una situación intensamente aflictiva. «Prueba» conserva la idea de testing y «severa» transmite la intensidad sin volver el español artificial.
- source_word: περισσεία τῆς χαρᾶς
  english_pob_choice: the abundance of their joy
  chosen_spanish: la abundancia de su alegría
  alternatives_spanish:
  - su alegría desbordante
  - la plenitud de su alegría
  - el exceso de su alegría
  lexicon: BDAG
  rationale: περισσεία es un sustantivo de abundancia/exceso. «Abundancia» conserva la estructura nominal del griego y «alegría» comunica con naturalidad χαρά en este contexto.
- source_word: κατὰ βάθους πτωχεία
  english_pob_choice: their deep poverty
  chosen_spanish: su profunda pobreza
  alternatives_spanish:
  - su pobreza en lo profundo
  - su pobreza extrema
  - su pobreza hasta el fondo
  lexicon: BDAG
  rationale: El giro κατὰ βάθους intensifica πτωχεία mediante la imagen de profundidad. «Profunda pobreza» mantiene esa metáfora con un español claro; «extrema» sería más explicativo, pero menos fiel a la imagen.
- source_word: ἐπερίσσευσεν
  english_pob_choice: overflowed
  chosen_spanish: se desbordó
  alternatives_spanish:
  - abundó
  - se derramó
  - rebosó
  lexicon: BDAG
  rationale: El verbo expresa abundancia que rebasa límites. «Se desbordó» reproduce bien el movimiento resultativo hacia la frase siguiente y conserva el sentido vívido de overflowed.
- source_word: εἰς ⸂τὸ πλοῦτος⸃
  english_pob_choice: into the wealth
  chosen_spanish: hacia la riqueza
  alternatives_spanish:
  - en la riqueza
  - para la riqueza
  - resultando en la riqueza
  lexicon: BDAG
  rationale: εἰς aquí marca resultado o dirección hacia un resultado. «Hacia» deja visible ese impulso sin forzar una causalidad demasiado explícita; «riqueza» es un equivalente natural de πλοῦτος en este encadenamiento.
- source_word: ἁπλότης
  english_pob_choice: generosity
  chosen_spanish: generosidad
  alternatives_spanish:
  - sencillez
  - simplicidad
  - sinceridad
  - liberalidad
  lexicon: BDAG
  rationale: En el contexto de la colecta, ἁπλότης comunica generosidad o liberalidad. «Generosidad» es la opción española más clara y fiel al sentido contextual, sin borrar la tensión semántica con «sencillez/simplicidad» que la nota preserva.
theological_decisions:
- issue: Sentido de ἁπλότης en un contexto de ofrenda y apoyo material
  english_pob_reading: generosity
  chosen_spanish_reading: generosidad
  alternative_spanish_readings:
  - simplicidad
  - sinceridad
  - liberalidad
  rationale: El pasaje habla de la respuesta de los creyentes en medio de pobreza y aflicción; por eso ἁπλότης se entiende aquí como generosidad en el dar. Traducirlo como «simplicidad» podría ocultar el elogio paulino de una ofrenda sacrificial.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: Relación entre alegría, pobreza y abundancia retórica
  english_pob_reading: their abundance of joy and their deep poverty overflowed into the wealth of their generosity
  chosen_spanish_reading: la abundancia de su alegría y su profunda pobreza se desbordó hacia la riqueza de su generosidad
  alternative_spanish_readings:
  - la abundancia de su alegría y su profunda pobreza abundaron en la riqueza de su generosidad
  - la abundancia de su alegría y su profunda pobreza rebosaron en la riqueza de su generosidad
  rationale: La imagen paulina une dos realidades aparentemente opuestas. «Se desbordó hacia» conserva el dinamismo retórico del verbo y la dirección del resultado sin añadir una interpretación doctrinal extra.
  doctrine_reference: Translation philosophy §2 (preserve source images and tensions)
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el auditoría inglesa en el punto clave de ἁπλότης como generosidad; se preserva también la metáfora de profundidad en πτωχεία y el movimiento resultativo de εἰς mediante una formulación española natural.
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Jesús/Mesías» según los defaults del proyecto, aunque no aparecen en este versículo.
  - Se usa «alegría» para χαρά, coherente con el registro habitual del POB en español.
  - Se evita «siempre»/«sinceridad» para ἁπλότης en el texto principal porque el contexto de colecta exige la lectura de generosidad.
  - La puntuación y el orden respetan la fluidez del español sin borrar las relaciones sintácticas del griego.
