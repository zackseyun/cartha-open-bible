translation:
  language: es
  text: Así pues, muéstrenles ante las iglesias la prueba[a] de su amor y de nuestra jactancia[b] acerca de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'demostración' o 'evidencia' de su amor.
    reason: lexical_alternative
  - marker: b
    text: O 'gloriarse'. Aquí se refiere a la afirmación pública y positiva que Pablo hace acerca de ustedes, no necesariamente a jactancia pecaminosa.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así pues
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: Introduce la conclusión lógica de la exhortación anterior. 'Así pues' conserva el valor inferencial de οὖν con buen flujo natural en español.
- source_word: ἔνδειξιν
  english_pob_choice: proof
  chosen_spanish: prueba
  alternatives_spanish:
  - demostración
  - evidencia
  lexicon: BDAG
  rationale: ἔνδειξις expresa una manifestación o prueba visible de algo. 'Prueba' comunica bien la idea de evidencia tangible sin volver el español demasiado abstracto.
- source_word: ἀγάπης
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - afecto
  lexicon: BDAG
  rationale: Se mantiene el sentido relacional y práctico de ἀγάπη como 'amor', que es el valor semántico normal y más fiel en este contexto.
- source_word: καυχήσεως
  english_pob_choice: boasting
  chosen_spanish: orgullo
  alternatives_spanish:
  - gloria
  - jactancia
  lexicon: BDAG
  rationale: El sustantivo καύχησις puede sonar más natural en español como 'orgullo' en una frase posesiva ('nuestro orgullo por ustedes'), pero esta opción suaviza el matiz retórico de 'boasting'. Se conserva la idea de una afirmación pública de orgullo, no de mera vanagloria.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: about you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - acerca de ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: Con καυχήσεως, ὑπέρ señala referencia a los corintios. 'Por ustedes' mantiene la relación natural en español y evita una formulación demasiado pesada.
- source_word: ἐνδεικνύμενοι
  english_pob_choice: show
  chosen_spanish: muestren
  alternatives_spanish:
  - demuestren
  - presenten
  lexicon: BDAG
  rationale: Aunque el participio es formalmente medio, aquí funciona exhortativamente en continuidad con la llamada implícita. Se vierte con el imperativo plural 'muestren' para reflejar la fuerza práctica de la instrucción.
- source_word: εἰς αὐτοὺς
  english_pob_choice: them
  chosen_spanish: ante las iglesias
  alternatives_spanish:
  - a ellos
  - delante de ellos
  lexicon: BDAG
  rationale: El objeto indirecto de la acción se entiende por el contexto inmediato como los representantes de las iglesias; el foco final recae en el escenario público. Se integra en la frase para evitar duplicar torpemente el referente.
- source_word: εἰς πρόσωπον τῶν ἐκκλησιῶν
  english_pob_choice: in the presence of the churches
  chosen_spanish: ante las iglesias
  alternatives_spanish:
  - en presencia de las iglesias
  - delante de las iglesias
  lexicon: BDAG
  rationale: La idiomática griega de 'rostro/presencia' indica una actuación pública ante testigos eclesiales. 'Ante las iglesias' conserva la publicidad del acto en un español sobrio y claro.
theological_decisions:
- issue: 'Naturaleza de καύχησις: ¿jactancia pecaminosa o motivo legítimo de orgullo/boast?'
  english_pob_reading: boasting
  chosen_spanish_reading: orgullo
  alternative_spanish_readings:
  - jactancia
  - gloriarse
  rationale: En Pablo, καύχησις no siempre es negativamente pecaminosa; puede señalar un motivo legítimo de afirmación en la obra de Dios. 'Orgullo' comunica esa idea en español, aunque conlleva una posible tensión semántica que se mantiene visible al no cambiarlo por una formulación devocional más suave.
  doctrine_reference: 2 Co 1:14; 7:4; 9:2
- issue: 'Valor público de la escena: ¿ante ellos o ante las iglesias?'
  english_pob_reading: before the churches; the phrase refers to a public demonstration before the representatives of the churches.
  chosen_spanish_reading: ante las iglesias
  alternative_spanish_readings:
  - en presencia de las iglesias
  - delante de las iglesias
  rationale: La frase griega εἰς πρόσωπον τῶν ἐκκλησιῶν describe un acto público frente a testigos eclesiales. La traducción mantiene el carácter público y representativo sin introducir una paráfrasis interpretativa excesiva.
  doctrine_reference: 2 Co 8:18-23
translation_notes:
  revision_awareness: 'Esta redacción sigue el último pasaje inglés revisado: se mantiene la conclusión inferencial, se conserva el orden natural del complemento de lugar público y se refleja la fuerza exhortativa del participio. También atiende la tensión del griego entre un referente humano inmediato (''a ellos'') y el escenario público (''ante las iglesias''), integrándolo de forma clara en español.'
  spanish_consistency_notes:
  - Se usa 'iglesias' para ἐκκλησίαι, en continuidad con el uso paulino estándar.
  - Se usa 'amor' para ἀγάπη y 'prueba' para ἔνδειξις, manteniendo claridad léxica.
  - Se evita 'SEÑOR' o vocabulario eclesiástico tradicional no presente en el versículo.
  - Se respeta el matiz público de εἰς πρόσωπον sin volverlo un calco torpe.
