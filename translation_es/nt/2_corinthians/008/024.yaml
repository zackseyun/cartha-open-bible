revisions:
- from: Así pues, muestren[a] ante las iglesias la prueba de su amor y de nuestro orgullo[b] por ustedes.
  to: Así pues, muéstrenles ante las iglesias la prueba[a] de su amor y de nuestra jactancia[b] acerca de ustedes.
  rationale: La revisión restaura explícitamente εἰς αὐτούς con 'muéstrenles', conserva el marco público de εἰς πρόσωπον τῶν ἐκκλησιῶν con 'ante las iglesias', y alinea καυχήσεως con la decisión auditada mediante 'jactancia', acompañado de una nota para evitar una lectura exclusivamente negativa. 'Acerca de ustedes' refleja mejor ὑπὲρ ὑμῶν en relación con 'jactancia' que 'por ustedes'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:53Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura general de la exhortación y refleja adecuadamente οὖν, ἔνδειξιν, ἀγάπης y el carácter público de εἰς πρόσωπον τῶν ἐκκλησιῶν. Sin embargo, omite explícitamente εἰς αὐτούς ('a ellos') al absorberlo en 'ante las iglesias', y suaviza indebidamente καυχήσεως ('boasting') con 'orgullo', perdiendo la conexión léxica y retórica paulina documentada en el rastro inglés.
  spanish_quality_summary: El español es claro y legible, pero 'orgullo por ustedes' introduce una connotación menos precisa y potencialmente equívoca que 'jactancia' o una formulación equivalente. También conviene expresar tanto el destinatario inmediato ('a ellos') como el marco público ('ante las iglesias') para no comprimir dos elementos griegos distintos en uno solo.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. La principal desalineación léxica es καυχήσεως, donde el inglés auditado exige preservar el campo semántico de 'boasting'; en español, 'jactancia' suena más exacto que 'orgullo' en este contexto, idealmente con nota aclaratoria. También debe preservarse εἰς αὐτούς con 'a ellos'.
  issues:
  - severity: high
    issue: Se omite εἰς αὐτούς ('a ellos').
    rationale: El texto griego distingue entre mostrar algo a los delegados/referentes inmediatos y hacerlo ante las iglesias. El borrador solo conserva el escenario público ('ante las iglesias') y deja implícito el destinatario, perdiendo un componente de sentido presente en la fuente y en la traducción inglesa auditada.
  - severity: medium
    issue: '''orgullo'' suaviza καυχήσεως.'
    rationale: La decisión inglesa documentada conserva 'boasting' por su fuerza retórica paulina. 'Orgullo' es más blando y puede sugerir un estado interno en vez de una afirmación pública. 'Jactancia' reproduce mejor el sustantivo, aunque requiera nota para evitar una lectura exclusivamente negativa.
  - severity: low
    issue: La nota a sobre 'muestren' es útil, pero podría convivir mejor con la nota léxica principal sobre ἔνδειξιν si se simplifica el sistema de notas.
    rationale: 'No es un error grave, pero la revisión puede concentrar las notas en las verdaderas ambigüedades léxicas que importan para fidelidad al griego: ''prueba/demostración/evidencia'' y ''jactancia''.'
  revised_spanish_text: Así pues, muéstrenles ante las iglesias la prueba[a] de su amor y de nuestra jactancia[b] acerca de ustedes.
  revised_footnotes:
  - marker: a
    text: O 'demostración' o 'evidencia' de su amor.
    reason: lexical_alternative
  - marker: b
    text: O 'gloriarse'. Aquí se refiere a la afirmación pública y positiva que Pablo hace acerca de ustedes, no necesariamente a jactancia pecaminosa.
    reason: lexical_alternative
  revision_rationale: La revisión restaura explícitamente εἰς αὐτούς con 'muéstrenles', conserva el marco público de εἰς πρόσωπον τῶν ἐκκλησιῶν con 'ante las iglesias', y alinea καυχήσεως con la decisión auditada mediante 'jactancia', acompañado de una nota para evitar una lectura exclusivamente negativa. 'Acerca de ustedes' refleja mejor ὑπὲρ ὑμῶν en relación con 'jactancia' que 'por ustedes'.
