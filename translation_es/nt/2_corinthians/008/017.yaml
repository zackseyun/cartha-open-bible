translation:
  language: es
  text: Porque aceptó el ruego[a], pero, siendo más solícito[b], fue a ustedes por su propia iniciativa[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «porque aceptó el ruego». También puede traducirse «la petición».
    reason: lexical_alternative
  - marker: b
    text: O «más ansioso» o «más diligente».
    reason: lexical_alternative
  - marker: c
    text: O «voluntariamente» o «por iniciativa propia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto introduce la explicación de la acción anterior; «Porque» conserva la relación causal/explanatoria que el inglés POB expresó con «For» sin sonar forzado en español.
- source_word: παράκλησιν
  english_pob_choice: appeal
  chosen_spanish: solicitud
  alternatives_spanish:
  - ruego
  - apelación
  - exhortación
  lexicon: BDAG
  rationale: Aquí el sustantivo se refiere a la petición o encargo aceptado por Tito. «Solicitud» comunica bien la idea de una petición concreta y evita el sentido más general de «consuelo/ánimo» que no encaja aquí.
- source_word: ἐδέξατο
  english_pob_choice: accepted
  chosen_spanish: aceptó
  alternatives_spanish:
  - recibió
  - acogió
  lexicon: BDAG
  rationale: El verbo medio expresa recepción favorable; «aceptó» conserva la respuesta positiva a la solicitud y suena natural en español.
- source_word: σπουδαιότερος
  english_pob_choice: more earnest
  chosen_spanish: más diligente
  alternatives_spanish:
  - más fervoroso
  - más entusiasta
  - más solícito
  lexicon: BDAG
  rationale: El comparativo indica mayor celo o empeño. «Más diligente» preserva la fuerza comparativa y resulta claro en español, aunque otras opciones también podrían reflejar el matiz de empeño.
- source_word: ὑπάρχων
  english_pob_choice: being
  chosen_spanish: siendo
  alternatives_spanish:
  - como era
  - al estar
  lexicon: BDAG
  rationale: El participio se vierte con una construcción participial simple para mantener el flujo de la frase sin añadir interpretación adicional.
- source_word: αὐθαίρετος
  english_pob_choice: of his own accord
  chosen_spanish: por su propia iniciativa
  alternatives_spanish:
  - voluntariamente
  - de su propia voluntad
  lexicon: BDAG
  rationale: El adjetivo enfatiza acción voluntaria y autoimpulsada. «Por su propia iniciativa» conserva bien esa espontaneidad en español y es idiomático.
- source_word: ἐξῆλθεν πρὸς ὑμᾶς
  english_pob_choice: he went to you
  chosen_spanish: fue a ustedes
  alternatives_spanish:
  - vino a ustedes
  - se dirigió a ustedes
  lexicon: BDAG
  rationale: El verbo griego literalmente es «salió»/«partió», pero el sentido contextual es desplazamiento hacia los corintios. «Fue a ustedes» es natural y mantiene la dirección sin sobreespecificar el punto de partida.
translation_notes:
  revision_awareness: El texto inglés auditado pasó de «went out to you» a «went to you» por naturalidad; en español se optó por «fue a ustedes», que preserva la dirección del movimiento sin introducir un calco literal innecesario. También se conservó la idea de voluntariedad («of his own accord») con una formulación idiomática.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología eclesiástica no presente en el versículo.
  - «Solicitud» se usa aquí en sentido de petición concreta, no de simple ánimo o consuelo.
  - La construcción «por su propia iniciativa» mantiene la tensión de voluntariedad del adjetivo αὐθαίρετος.
  - Se mantiene un registro sobrio y bíblico, adecuado para lectura pública.
