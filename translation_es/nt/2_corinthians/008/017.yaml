  to: Porque aceptó el ruego[a], pero, siendo más solícito[b], fue a ustedes por su propia iniciativa[c].
  rationale: Se revisa «solicitud» a «ruego» para reflejar mejor παράκλησις como petición/apelación personal, no trámite formal. Se cambia «más diligente» a «más solícito» para preservar mejor el matiz de mayor celo o empeño de σπουδαιότερος, manteniendo una expresión natural y digna en español. Se corrige la nota b para que aporte alternativas reales en lugar de repetir la lectura principal. Se conserva «Porque», «aceptó», «fue a ustedes» y «por su propia iniciativa» como opciones fieles y naturales.
