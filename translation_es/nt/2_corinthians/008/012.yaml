translation:
  language: es
  text: Porque si la buena disposición[a] está presente, es aceptable según lo que uno tiene[b], no según lo que no tiene.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prontitud» o «voluntad» para «buena disposición».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «según cualquier cosa que uno tenga ... no según lo que no tiene».
    reason: lexical_alternative
lexical_decisions:
- source_word: προθυμία
  english_pob_choice: readiness
  chosen_spanish: disposición
  alternatives_spanish:
  - prontitud
  - disposición voluntaria
  - disposición dispuesta
  lexicon: BDAG
  rationale: προθυμία expresa una actitud voluntaria y dispuesta. En español, «disposición» comunica bien esa disponibilidad interior sin forzar «eagerness» como simple emoción. «Prontitud» es posible, pero puede sonar más a rapidez que a voluntad.
- source_word: πρόκειται
  english_pob_choice: is present
  chosen_spanish: está presente
  alternatives_spanish:
  - está puesta delante
  - se halla
  - está al alcance
  lexicon: BDAG
  rationale: En este contexto, πρόκειται no debe leerse literalmente como «puesta delante» sino como algo que está presente o disponible. «Está presente» conserva el sentido idiomático y la relación con la disposición ya mencionada.
- source_word: καθὸ ἐὰν ἔχῃ
  english_pob_choice: according to what one has
  chosen_spanish: según lo que uno tiene
  alternatives_spanish:
  - de acuerdo con lo que uno posee
  - en proporción a lo que uno tiene
  - según cualquier cosa que uno tenga
  lexicon: BDAG
  rationale: La frase marca medida o norma basada en los recursos reales disponibles. «Según lo que uno tiene» es natural en español y conserva el valor proporcional sin introducir especificaciones que el griego no exige.
- source_word: εὐπρόσδεκτος
  english_pob_choice: acceptable
  chosen_spanish: aceptable
  alternatives_spanish:
  - bien recibido
  - bien acogido
  - agradable
  lexicon: BDAG
  rationale: εὐπρόσδεκτος significa «aceptable» o «bien recibido». «Aceptable» mantiene la valoración general sin precisar indebidamente si la aceptación es ante Dios, ante la comunidad o en ambos sentidos.
- source_word: οὐ καθὸ οὐκ ἔχει
  english_pob_choice: not according to what one does not have
  chosen_spanish: no según lo que no tiene
  alternatives_spanish:
  - no conforme a lo que no tiene
  - no según lo que le falta
  - no de acuerdo con lo que no posee
  lexicon: BDAG
  rationale: 'La segunda mitad conserva el contraste exacto del griego: el criterio no es lo ausente sino lo realmente disponible. «No según lo que no tiene» sigue de cerca la estructura sin sonar excesivamente literal.'
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque, si
  alternatives_spanish:
  - Pues si
  - Porque si
  - Ya que, si
  lexicon: BDAG
  rationale: Las partículas introducen una explicación con matiz condicional. «Porque, si» reproduce esa relación lógica en español de forma clara y natural.
theological_decisions:
- issue: Criterio de aceptación implícito
  english_pob_reading: The verse states that willing giving is acceptable in proportion to one's actual means, without specifying more narrowly whether the acceptability is before God, before the church, or both.
  chosen_spanish_reading: El versículo dice que la ofrenda hecha con disposición es aceptable en proporción a los recursos reales, sin precisar si esa aceptación es ante Dios, ante la iglesia o ambas.
  alternative_spanish_readings:
  - aceptable ante Dios
  - aceptable para la comunidad
  rationale: εὐπρόσδεκτος señala aceptación, pero el texto no identifica explícitamente al receptor de esa aceptación. La traducción conserva esa amplitud y no resuelve una tensión que el griego deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; por eso esta propuesta sigue de cerca la lectura auditada en inglés y no introduce expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - Se mantiene «aceptable» para εὐπρόσδεκτος, en lugar de fórmulas eclesiásticas más interpretativas.
  - Se evita traducir προθυμία como «entusiasmo», porque el valor contextual es disponibilidad voluntaria, no emoción intensa.
  - Se conserva «uno» para el sujeto genérico implícito, evitando un referente masculino específico.
  - La cláusula final mantiene el paralelismo de contraste entre lo que se tiene y lo que no se tiene.
