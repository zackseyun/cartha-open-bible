translation:
  language: es
  text: 'tal como está escrito: El que tenía mucho no tuvo demasiado[a], y el que tenía poco no tuvo falta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más literal en línea con Éxodo 16:18: «El que reunió mucho no tuvo exceso, y el que reunió poco no tuvo falta».'
    reason: alternative_reading
lexical_decisions:
- source_word: καθὼς γέγραπται
  english_pob_choice: as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - así como está escrito
  lexicon: BDAG
  rationale: La fórmula cita un pasaje de la Escritura y el perfecto griego γέγραπται funciona como testimonio escrito vigente. «Tal como está escrito» conserva ese valor formular sin sonar mecánico en español.
- source_word: Ὁ τὸ πολὺ
  english_pob_choice: The one who had much
  chosen_spanish: El que tenía mucho
  alternatives_spanish:
  - el que tenía mucho de sobra
  - el que había reunido mucho
  - el que tenía bastante
  lexicon: BDAG
  rationale: 'El artículo con el adjetivo neutro funciona sustantivamente: «el que tenía mucho». En español, «tenía mucho» expresa con naturalidad la posesión/cantidad sin introducir explícitamente «reunió», que no aparece en el griego de esta cita.'
- source_word: ἐπλεόνασεν
  english_pob_choice: did not have too much
  chosen_spanish: no tuvo demasiado
  alternatives_spanish:
  - no tuvo exceso
  - no abundó
  - no tuvo más de lo debido
  lexicon: BDAG
  rationale: πλεονάζω aquí apunta al resultado de tener exceso o sobrante. «No tuvo demasiado» mantiene el contraste distributivo y evita un calco pesado; «exceso» es posible, pero suena más interpretativo en esta línea breve.
- source_word: ὁ τὸ ὀλίγον
  english_pob_choice: the one who had little
  chosen_spanish: el que tenía poco
  alternatives_spanish:
  - el que tenía poco de sobra
  - el que había reunido poco
  - el que tenía escaso
  lexicon: BDAG
  rationale: La estructura es paralela a la primera cola. «El que tenía poco» conserva la simetría y el sentido de cantidad sin añadir el verbo «reunir» que no está explícito en el texto griego citado.
- source_word: ἠλαττόνησεν
  english_pob_choice: did not have too little
  chosen_spanish: no tuvo demasiado poco
  alternatives_spanish:
  - no careció
  - no tuvo falta
  - no se vio disminuido
  lexicon: BDAG
  rationale: ἐλαττονέω comunica deficiencia o quedar por debajo de lo necesario. «No tuvo demasiado poco» mantiene el paralelismo con «no tuvo demasiado» y expresa el efecto distributivo de la cita.
theological_decisions:
- issue: Alcance de la cita de Éxodo 16:18 en 2 Corintios 8:15
  english_pob_reading: Render the line in terms of resulting possession/distribution rather than explicitly inserting 'gathered,' preserving Paul's application to equitable provision.
  chosen_spanish_reading: 'Conservar la frase en términos de posesión/cantidad resultante: «tenía mucho/poco», sin insertar explícitamente «reunió».'
  alternative_spanish_readings:
  - El que reunió mucho no le sobró, y el que reunió poco no le faltó
  - El que había juntado mucho no tuvo exceso, y el que había juntado poco no tuvo falta
  rationale: En este contexto paulino, la cita de la Escritura se aplica a la igualdad y al reparto justo entre creyentes. El griego citado no repite el verbo de recoger de Éxodo de manera explícita, así que la traducción principal preserva el alcance de la cita tal como está formulada en 2 Corintios, mientras que las alternativas dejan visible la conexión con el relato del maná.
  doctrine_reference: 2 Corintios 8:13-15; Éxodo 16:18
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés sin depender mecánicamente de él: se preservó la fórmula de cita bíblica, la estructura paralela de los dos miembros y el sentido distributivo de πλεονάζω / ἐλαττονέω. La versión española evita introducir «reunió» en el texto principal, pero lo ofrece en la nota como alternativa más literal vinculada a Éxodo 16:18.'
  spanish_consistency_notes:
  - Se mantuvo «tal como está escrito» para reflejar una fórmula escritural estable y natural en español.
  - Se prefirió «tenía mucho/poco» para conservar el paralelismo y evitar sobreinterpretar el verbo implícito.
  - «Demasiado» se usó en ambos miembros para reflejar el contraste simétrico de exceso/deficiencia.
  - La nota a pie de página marca la alternativa más literal basada en la escena del maná, sin desplazar el sentido paulino inmediato.
