revisions:
- from: En el tiempo presente[a], su abundancia es para la necesidad de ellos, para que también la abundancia de ellos sea para la necesidad de ustedes, a fin de que haya igualdad.
  to: En este tiempo presente[a], la abundancia de ustedes es para la necesidad de ellos, para que también la abundancia de ellos sea para la necesidad de ustedes, a fin de que haya igualdad.
  rationale: La revisión conserva plenamente el sentido del griego y del POB inglés, pero mejora la naturalidad del español y la claridad referencial. «En este tiempo presente» suena más idiomático que «En el tiempo presente» sin perder el valor de καιρός. «La abundancia de ustedes» evita ambigüedad con el sistema de tratamiento «ustedes». La nota elimina «justeza», que es menos natural para lectura eclesial amplia, y mantiene el matiz documentado de ἰσότης como provisión mutua equilibrada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:58:40Z'
