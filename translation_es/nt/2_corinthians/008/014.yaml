  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. «Abundancia», «necesidad» e «igualdad» se alinean bien con περίσσευμα, ὑστέρημα e ἰσότης. La nota debe conservar las alternativas «equidad» y una opción más natural que «justeza», como «imparcialidad» o mejor solo «equidad», pero dado el rastro inglés, lo más seguro es «equidad» y «justicia» no sería ideal aquí. '
