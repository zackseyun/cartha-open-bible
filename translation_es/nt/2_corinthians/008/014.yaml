translation:
  language: es
  text: En este tiempo presente[a], la abundancia de ustedes es para la necesidad de ellos, para que también la abundancia de ellos sea para la necesidad de ustedes, a fin de que haya igualdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «equidad»; el término griego aquí se refiere a una provisión mutua equilibrada, no necesariamente a posesiones idénticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ νῦν καιρῷ
  english_pob_choice: At the present time
  chosen_spanish: En el tiempo presente
  alternatives_spanish:
  - En el momento presente
  - En esta ocasión
  - En el presente tiempo
  lexicon: BDAG
  rationale: καιρός señala aquí un tiempo o circunstancia determinada; «En el tiempo presente» mantiene ese sentido situacional con español natural y digno.
- source_word: τὸ ὑμῶν περίσσευμα
  english_pob_choice: your abundance
  chosen_spanish: su abundancia
  alternatives_spanish:
  - su exceso
  - su sobrante
  - lo que les sobra
  lexicon: BDAG
  rationale: περίσσευμα designa lo que excede la necesidad. «Abundancia» es el equivalente más amplio y claro en español; el posesivo de cortesía de segunda persona plural se expresa aquí como «su» por norma editorial, manteniendo el referente de ustedes.
- source_word: εἰς τὸ ἐκείνων ὑστέρημα
  english_pob_choice: for their need
  chosen_spanish: para la necesidad de ellos
  alternatives_spanish:
  - para la falta de ellos
  - hacia su carencia
  - para suplir lo que les falta
  lexicon: BDAG
  rationale: La construcción expresa finalidad o dirección hacia cubrir lo que les falta. «Necesidad» comunica bien ὑστέρημα en español moderno sin volverlo demasiado técnico o rígido.
- source_word: τὸ ἐκείνων περίσσευμα
  english_pob_choice: their abundance
  chosen_spanish: la abundancia de ellos
  alternatives_spanish:
  - su abundancia
  - su sobrante
  lexicon: BDAG
  rationale: Se conserva la repetición de περίσσευμα para mantener la simetría del argumento paulino sobre provisión mutua.
- source_word: γένηται εἰς τὸ ὑμῶν ὑστέρημα
  english_pob_choice: may also be for your need
  chosen_spanish: sea para la necesidad de ustedes
  alternatives_spanish:
  - llegue a ser para la necesidad de ustedes
  - sirva también para la necesidad de ustedes
  - se convierta en ayuda para ustedes
  lexicon: BDAG
  rationale: «Sea para» reproduce la relación de finalidad/resultante del griego sin forzar una paráfrasis. Se mantiene «necesidad» para conservar la correspondencia con ὑστέρημα.
- source_word: ὅπως γένηται ἰσότης
  english_pob_choice: in order that there may be equality
  chosen_spanish: a fin de que haya igualdad
  alternatives_spanish:
  - para que haya equidad
  - a fin de que haya balance
  - para que haya justicia distributiva
  lexicon: BDAG
  rationale: ἰσότης apunta a una igualdad de provisión recíproca, no necesariamente a uniformidad absoluta. «Igualdad» es el equivalente más directo; el matiz se preserva en la nota.
theological_decisions:
- issue: Sentido de ἰσότης en la exhortación paulina
  english_pob_reading: equality in mutual provision
  chosen_spanish_reading: igualdad en la provisión mutua
  alternative_spanish_readings:
  - equidad
  - equilibrio
  - fairness
  rationale: El contexto inmediato trata del alivio de necesidades entre creyentes, no de una teoría social abstracta. «Igualdad» conserva el valor léxico directo, mientras la nota aclara que la idea es una provisión mutua balanceada.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con la auditoría inglesa de alta concordancia: no se registraron revisiones aplicadas y el sentido de mutualidad/equilibrio de ἰσότης permanece intacto.'
  spanish_consistency_notes:
  - Se usa «ustedes» como destinatarios y se mantiene la reciprocidad del paralelismo.
  - «Abundancia» y «necesidad» repiten consistentemente el contraste léxico del griego.
  - La nota de pie de página preserva la tensión entre igualdad, equidad y equilibrio sin borrar ninguna de las opciones documentadas.
