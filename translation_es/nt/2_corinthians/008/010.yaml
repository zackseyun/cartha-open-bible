revisions:
- from: 'Y en este asunto doy mi juicio: porque esto les es beneficioso[a], a ustedes, que comenzaron el año pasado no solo a hacerlo, sino también a quererlo.'
  to: 'Y en este asunto doy mi juicio[a]: pues esto les conviene, ya que el año pasado ustedes comenzaron no solo a hacerlo, sino también a quererlo[b].'
  rationale: Se mantiene 'juicio' por fidelidad a γνώμην y a la decisión teológica documentada. Se ajusta συμφέρει a 'les conviene' para mejor español natural. Se simplifica la cláusula relativa eliminando 'a ustedes,' y se añade la nota faltante para θέλειν, preservando la distinción entre voluntad y acción que el English POB documenta.
