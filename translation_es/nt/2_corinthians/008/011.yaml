translation:
  language: es
  text: Pero ahora también completen el llevarlo a cabo[a], para que, así como hubo la disposición de quererlo, así también lo completen de lo que tienen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «terminen de llevarlo a cabo».'
    reason: lexical_alternative
  - marker: b
    text: Es decir, conforme a sus medios actuales.
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Ahora bien
  - Mas ahora
  lexicon: BDAG
  rationale: La combinación marca transición y leve contraste; «Pero ahora» conserva ambos matices en español natural y sobrio.
- source_word: τὸ ποιῆσαι
  english_pob_choice: the doing of it
  chosen_spanish: la realización de ello
  alternatives_spanish:
  - el hacerlo
  - la ejecución de ello
  - el llevarlo a cabo
  lexicon: BDAG
  rationale: El infinitivo articular sustantivado apunta al acto concreto ya propuesto. «La realización de ello» mantiene el valor nominal y el referente al asunto de la colecta, sin sonar forzado.
- source_word: ἐπιτελέσατε
  english_pob_choice: complete
  chosen_spanish: completen
  alternatives_spanish:
  - terminen
  - lleguen a cabo
  - lleven a cumplimiento
  lexicon: BDAG
  rationale: ἐπιτελέω expresa llevar algo a término; «completen» es la forma más breve y fiel, y guarda relación con el sustantivo posterior.
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad o resultado esperado; «para que» es la equivalencia española más directa y clara.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - del mismo modo que
  - tal como
  lexicon: BDAG
  rationale: Señala comparación simétrica entre la disposición previa y la culminación deseada; «así como» reproduce bien esa correspondencia.
- source_word: ἡ προθυμία
  english_pob_choice: the eagerness
  chosen_spanish: la disposición
  alternatives_spanish:
  - el empeño
  - la voluntad pronta
  - el anhelo
  lexicon: BDAG
  rationale: En este contexto de ofrenda, προθυμία se refiere a una disposición pronta y voluntaria. «Disposición» es más natural en español y conserva la idea de prontitud interior.
- source_word: τοῦ θέλειν
  english_pob_choice: to will it
  chosen_spanish: de quererlo
  alternatives_spanish:
  - de desearlo
  - de querer hacerlo
  - de proponérselo
  lexicon: BDAG
  rationale: El infinitivo depende de προθυμία y expresa el contenido de esa disposición. «Quererlo» transmite el impulso volitivo sin sobrecargar el español.
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - también así
  - del mismo modo también
  lexicon: BDAG
  rationale: Mantiene el paralelismo retórico del griego entre la disposición y la culminación.
- source_word: τὸ ἐπιτελέσαι
  english_pob_choice: the completion
  chosen_spanish: la realización
  alternatives_spanish:
  - el cumplimiento
  - la terminación
  - el llevarlo a cabo
  lexicon: BDAG
  rationale: Se conserva el sustantivo correspondiente a ἐπιτελέω y se evita una repetición demasiado rígida de «completen». «Realización» suena natural y mantiene la idea de llevar a término.
- source_word: ἐκ τοῦ ἔχειν
  english_pob_choice: from what you have
  chosen_spanish: según lo que tienen
  alternatives_spanish:
  - de acuerdo con lo que tienen
  - a partir de lo que tienen
  - conforme a sus medios
  lexicon: BDAG
  rationale: 'La frase indica fuente o medida: la culminación debe proceder de lo disponible. «Según lo que tienen» comunica con claridad la limitación por los recursos presentes.'
theological_decisions:
- issue: La ofrenda debe completarse conforme a los recursos presentes
  english_pob_reading: The verse exhorts completion of the collection in proportion to present resources, without implying a demand to give beyond one's means.
  chosen_spanish_reading: La exhortación es a llevar a término la ofrenda de acuerdo con lo que realmente tienen, no más allá de sus recursos actuales.
  alternative_spanish_readings:
  - Completen la ofrenda sin referencia explícita a la medida de sus recursos
  - Hagan la ofrenda como expresión de su voluntad, sin énfasis en la disponibilidad material
  rationale: La expresión ἐκ τοῦ ἔχειν señala claramente el punto de partida material; la traducción debe conservar esa restricción práctica y no convertir el texto en una exhortación abstracta desvinculada de los medios disponibles.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se siguió el último pase revisado sin cambios sustanciales, y se mantuvo la lectura contextual de la colecta como proyecto concreto a completar según los medios presentes.
  spanish_consistency_notes:
  - Se usó «Dios/Yahvé» según corresponda; aquí no aplica ninguna mención divina explícita.
  - Se mantuvo un español natural y eclesialmente legible, evitando calcos como «de lo que tienen» dentro del cuerpo principal y reservando la literalidad para la nota.
  - Se preservó la simetría retórica del griego entre voluntad/disposición y realización/completación.
  - No se introdujeron términos tradicionales no atestiguados por el texto; «realización» y «disposición» responden a la semántica contextual de ἐπιτελέω y προθυμία.
