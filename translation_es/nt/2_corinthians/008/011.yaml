revisions:
- from: Pero ahora también completen la realización de ello[a], para que, así como hubo la disposición de quererlo, así también haya la realización según lo que tienen[b].
  to: Pero ahora también completen el llevarlo a cabo[a], para que, así como hubo la disposición de quererlo, así también lo completen de lo que tienen[b].
  rationale: La revisión conserva la lógica y el paralelismo del griego, pero sustituye expresiones abstractas o poco idiomáticas por formulaciones más naturales en español. «El llevarlo a cabo» representa mejor τὸ ποιῆσαι que «la realización de ello», y «lo completen» expresa con claridad τὸ ἐπιτελέσαι dentro de la comparación. Además, «de lo que tienen» acerca el texto principal a ἐκ τοῦ ἔχειν, dejando la explicación interpretativa en la nota.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:34Z'
