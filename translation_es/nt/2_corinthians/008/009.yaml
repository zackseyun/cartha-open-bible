base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/009.yaml
  text: For you know the grace of our Lord Jesus Christ[a], that though he was rich, yet for your sake he became poor[b], so that you by his poverty might become rich.
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστοῦ can be rendered 'Christ' or translated 'Messiah'; here 'Messiah' preserves the title's meaning.
    reason: alternative_reading
  - marker: b
    text: '''Rich'' and ''poor'' are likely metaphorical, contrasting Christ''s prior richness with his self-humbling for the sake of others; Paul does not explicitly define the metaphor here.'
    reason: lexical_alternative
