translation:
  language: es
  text: Pues ustedes conocen la gracia de nuestro Señor Jesús Mesías[a], que, aunque era rico, por causa de ustedes se hizo pobre[b], para que ustedes, por su pobreza, lleguen a ser ricos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». El título Χριστοῦ puede conservarse como «Cristo» o traducirse como «Mesías»; aquí «Mesías» conserva mejor su sentido titular.
    reason: alternative_reading
  - marker: b
    text: «Rico» y «pobre» probablemente son metáforas que contrastan la riqueza previa del Mesías con su humillación por el bien de otros; Pablo no define explícitamente la metáfora aquí.
    reason: lexical_alternative
lexical_decisions:
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: conocen
  alternatives_spanish:
  - saben
  - han llegado a conocer
  lexicon: BDAG
  rationale: El presente de indicativo en segunda persona plural expresa conocimiento ya compartido por los corintios. «Conocen» conserva esa información asentada y suena natural en español actual.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - generosidad
  lexicon: BDAG
  rationale: «Gracia» conserva el peso teológico de χάρις y, al mismo tiempo, permite la implicación ética de la generosidad en el contexto inmediato.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia cristológica normal para κύριος y preserva la carga de autoridad y honor del título.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se traduce Χριστός como «Mesías» para conservar el valor titular del término griego, conforme al criterio del proyecto, en vez de fijarlo como un nombre litúrgico.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - por ustedes
  - para ustedes
  lexicon: BDAG
  rationale: διά con acusativo expresa beneficio o causa. «Por causa de ustedes» comunica bien el sentido benefactivo sin endurecerlo en una sola preposición española.
- source_word: ἐπτώχευσεν
  english_pob_choice: he became poor
  chosen_spanish: se hizo pobre
  alternatives_spanish:
  - se volvió pobre
  - llegó a ser pobre
  lexicon: BDAG
  rationale: El aoristo verbal mantiene el contraste con la riqueza anterior. «Se hizo pobre» es idiomático y conserva la idea de paso a una condición de pobreza.
- source_word: πλούσιος ὤν
  english_pob_choice: though he was rich
  chosen_spanish: aunque era rico
  alternatives_spanish:
  - siendo rico
  - mientras era rico
  lexicon: BDAG
  rationale: La construcción participial tiene fuerza concesiva en el contexto. «Aunque era rico» expresa con claridad esa tensión sin resolver qué clase de riqueza es.
- source_word: τῇ ἐκείνου πτωχείᾳ
  english_pob_choice: by his poverty
  chosen_spanish: por medio de su pobreza
  alternatives_spanish:
  - mediante su pobreza
  - con su pobreza
  lexicon: BDAG
  rationale: El dativo instrumental se rinde de forma natural con «por medio de». El posesivo «su» aclara ἐκείνου sin perder el referente de Cristo.
- source_word: πλουτήσητε
  english_pob_choice: might become rich
  chosen_spanish: llegaran a ser ricos
  alternatives_spanish:
  - pudieran enriquecerse
  - fueran enriquecidos
  lexicon: BDAG
  rationale: Se conserva el paralelo verbal con «se hizo pobre» y el matiz de resultado/purpose del ἵνα. «Llegaran a ser ricos» mantiene el movimiento de la metáfora sin estrecharla a riqueza material.
theological_decisions:
- issue: Sentido de la riqueza y la pobreza de Cristo y de los creyentes
  english_pob_reading: Retain the economic metaphor in the main text without specifying whether the richness is preincarnational glory, incarnational status, material wealth, or spiritual blessing.
  chosen_spanish_reading: Mantener la metáfora económica en el texto principal sin precisar si la riqueza de Cristo es gloria preexistente, estatus mesiánico o bendición espiritual, ni si la riqueza de los creyentes es material o espiritual.
  alternative_spanish_readings:
  - «Aunque era rico» se refiere específicamente a su gloria preexistente.
  - «Llegaran a ser ricos» se refiere de manera exclusiva a bendiciones espirituales.
  - «Llegaran a ser ricos» incluye también una dimensión comunitaria y ética ligada a la generosidad.
  rationale: El griego presenta una antítesis deliberadamente amplia. La traducción debe preservar esa tensión teológica y retórica sin cerrarla con una explicación que el texto no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se mantiene la estructura introducida por «que» para reflejar ὅτι, y se conserva la metáfora de riqueza/pobreza sin añadir una glosa interpretativa al cuerpo del versículo.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; en este versículo el referente es «Señor», por tratarse del título κύριος aplicado a Jesús.
  - Se traduce Χριστός como «Mesías» de manera consistente con la política del proyecto y con el valor titular del griego.
  - Se conserva el paralelismo rico/pobre con verbos de cambio de estado («se hizo pobre», «llegaran a ser ricos») para mantener la fuerza retórica del pasaje.
  - La puntuación con comas sigue la relación subordinante del ὅτι, evitando una ruptura más fuerte que no refleja el griego.
