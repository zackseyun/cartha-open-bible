revisions:
- from: Porque ustedes conocen la gracia de nuestro Señor Jesús Mesías[a], que, aunque era rico, por causa de ustedes se hizo pobre[b], para que ustedes, por medio de su pobreza, llegaran a ser ricos.
  to: Pues ustedes conocen la gracia de nuestro Señor Jesús Mesías[a], que, aunque era rico, por causa de ustedes se hizo pobre[b], para que ustedes, por su pobreza, lleguen a ser ricos.
  rationale: 'La revisión corrige la nota [a], que ofrecía como alternativa la misma lectura del texto principal en vez de la alternativa real «Jesús Cristo». Además, se pulen detalles menores de estilo y sintaxis para un español más natural y fiel al propósito del griego: «Pues» para γάρ, «por su pobreza» como instrumental más directo y «lleguen a ser ricos» para expresar mejor el ἵνα de propósito.'
