translation:
  language: es
  text: Y no como esperábamos[a], sino que se entregaron primero al Señor y a nosotros, por voluntad de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como lo habíamos esperado».
    reason: lexical_alternative
  - marker: b
    text: O «por la voluntad de Dios» o «de acuerdo con la voluntad de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ οὐ καθὼς ἠλπίσαμεν
  english_pob_choice: And not as we expected
  chosen_spanish: Y no como esperábamos
  alternatives_spanish:
  - Y no como esperábamos que lo harían
  - Y no como lo habíamos esperado
  lexicon: BDAG ἐλπίζω
  rationale: El sentido aquí contrasta la acción de los macedonios con la expectativa apostólica. En español, «esperábamos» conserva la fuerza de la expectativa sin hacer demasiado explícita una connotación emocional que el contexto no exige. La alternativa «como esperábamos que lo harían» es más explicativa, pero menos directa.
- source_word: ἑαυτοὺς ἔδωκαν
  english_pob_choice: they gave themselves
  chosen_spanish: se entregaron
  alternatives_spanish:
  - se dieron a sí mismos
  - se dedicaron a sí mismos
  lexicon: BDAG δίδωμι
  rationale: La combinación reflexiva con δίδωμι comunica autoentrega personal, no solo una contribución material. «Se entregaron» preserva ese valor de entrega de la propia persona en español natural; «se dieron a sí mismos» es más literal pero más pesado.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes que nada
  lexicon: BDAG πρῶτος
  rationale: «Primero» expresa prioridad de manera clara y breve. En español, mantiene tanto el orden lógico como la posible secuencia temporal sin sobreinterpretarla.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Jesús
  - al Señor
  lexicon: BDAG κύριος
  rationale: En el contexto paulino, κύριος se refiere a Cristo. Siguiendo el criterio del proyecto, la forma natural en español es «el Señor», sin sustituirlo por un equivalente menos preciso. La referencia cristológica queda implícita por el contexto.
- source_word: καὶ ἡμῖν
  english_pob_choice: and to us
  chosen_spanish: y luego a nosotros
  alternatives_spanish:
  - y a nosotros
  - y también a nosotros
  lexicon: BDAG ἐγώ
  rationale: El paralelo con el dativo anterior queda mejor en español si se expresa la secuencia y el orden de prioridad. «Y luego a nosotros» comunica que su entrega al apóstol y sus colaboradores es subordinada a la primera entrega al Señor.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: through the will of God
  chosen_spanish: por voluntad de Dios
  alternatives_spanish:
  - por la voluntad de Dios
  - de acuerdo con la voluntad de Dios
  lexicon: BDAG θέλημα
  rationale: διά con genitivo permite un matiz de medio, autorización o conformidad. «Por voluntad de Dios» conserva esa ambigüedad en español y evita cerrar el sentido en una sola lectura; «de acuerdo con la voluntad de Dios» explicita una de las posibilidades, pero interpreta más.
theological_decisions:
- issue: Prioridad entre la entrega al Señor y la entrega a Pablo y sus compañeros
  english_pob_reading: The verse presents the Macedonians' self-giving as first directed to the Lord and then, subordinately, to Paul and his companions in service of the apostolic mission.
  chosen_spanish_reading: El versículo presenta la autoentrega de los macedonios primero al Señor y después, en segundo plano, a Pablo y sus compañeros en servicio de la misión apostólica.
  alternative_spanish_readings:
  - Una dedicación doble sin énfasis jerárquico fuerte más allá del «primero».
  - Una entrega indistinta tanto al Señor como a los apóstoles.
  rationale: El adverbio πρῶτον y la secuencia de dativos favorecen una prioridad real al Señor. La traducción la deja visible sin expandirla en una formulación eclesiológica más fuerte de la que el texto exige.
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
- issue: Sentido de διὰ θελήματος θεοῦ
  english_pob_reading: The phrase is left as 'through the will of God' to preserve ambiguity between divine agency, authorization, and accordance.
  chosen_spanish_reading: La frase se traduce «por voluntad de Dios» para mantener abierta la posibilidad de agencia divina, autorización o conformidad.
  alternative_spanish_readings:
  - por la voluntad de Dios
  - de acuerdo con la voluntad de Dios
  rationale: El griego admite varios matices y no conviene fijar uno solo. «Por voluntad de Dios» es suficientemente natural en español y conserva la ambigüedad doctrinal del original.
  doctrine_reference: Preservar la tensión teológica sin resolverla de más.
translation_notes:
  revision_awareness: 'Alineado con la última revisión del testimonio inglés: no se requieren cambios sustantivos. La presente redacción mantiene la prioridad del Señor, la autoentrega personal y la ambigüedad de διὰ θελήματος θεοῦ, en continuidad con el audit trail.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en coherencia con el uso paulino y con la terminología del proyecto en contextos cristológicos.
  - Se evita «siervo» porque el verbo y el pronombre reflexivo de ἑαυτοὺς ἔδωκαν expresan autoentrega más que mera subordinación.
  - «Por voluntad de Dios» conserva el valor relacional de διά sin decidir entre medio, autorización o conformidad.
  - Se mantiene un español claro y publicable, sin copiar mecánicamente la sintaxis inglesa.
