translation:
  language: es
  text: Y enviamos con él al hermano, cuya alabanza en el evangelio es por todas las iglesias[a]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuya alabanza en el evangelio está entre todas las iglesias'.
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέμψαμεν
  english_pob_choice: we sent with
  chosen_spanish: enviamos con
  alternatives_spanish:
  - enviamos junto con
  - mandamos con
  lexicon: BDAG
  rationale: El aoristo narra una acción completa; en español, 'enviamos con' comunica acompañamiento de manera natural sin agregar matices ajenos. 'Junto con' es posible, pero algo más pesado.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora
  - Pero
  lexicon: BDAG
  rationale: δώ aquí funciona como enlace suave de avance narrativo. 'Y' conserva la continuidad del relato en español.
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - junto con él
  lexicon: BDAG
  rationale: μετά con genitivo expresa compañía. 'Con él' es la equivalencia más directa y natural.
- source_word: τὸν ἀδελφόν
  english_pob_choice: the brother
  chosen_spanish: al hermano
  alternatives_spanish:
  - a nuestro hermano
  - al fellow believer
  lexicon: BDAG
  rationale: El artículo con ἀδελφός señala a un hombre concreto ya conocido en el contexto. En español, el acusativo personal se refleja naturalmente con 'al hermano'.
- source_word: οὗ ὁ ἔπαινος
  english_pob_choice: whose praise
  chosen_spanish: cuya alabanza
  alternatives_spanish:
  - cuya commendación
  - de quien se habla bien
  lexicon: BDAG
  rationale: La construcción posesiva relativa se conserva con 'cuya'. 'Alabanza' mantiene el sustantivo nominal de ἔπαινος sin convertirlo en una paráfrasis verbal.
- source_word: ἔπαινος
  english_pob_choice: praise
  chosen_spanish: alabanza
  alternatives_spanish:
  - commendación
  - reputación
  lexicon: BDAG
  rationale: '''Alabanza'' es el equivalente más directo y natural en español para ἔπαινος. ''Commendación'' también es posible, pero suena más técnico.'
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the gospel
  chosen_spanish: en el evangelio
  alternatives_spanish:
  - en la proclamación del evangelio
  - en el asunto del evangelio
  lexicon: BDAG
  rationale: 'Se mantiene la formulación formal y abierta de la fuente: no se especifica predicación u oficio, sólo la esfera o conexión con el evangelio. ''Evangelio'' conserva la referencia precisa y reconocible.'
- source_word: διὰ πασῶν τῶν ἐκκλησιῶν
  english_pob_choice: throughout all the churches
  chosen_spanish: entre todas las iglesias
  alternatives_spanish:
  - por todas las iglesias
  - a través de todas las iglesias
  lexicon: BDAG
  rationale: διά con genitivo expresa difusión o extensión. 'Entre todas las iglesias' comunica bien la idea de reconocimiento extendido en el conjunto de las congregaciones. 'Iglesias' es el término paulino normal para ἐκκλησίαι.
- source_word: ἐκκλησιῶν
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - congregaciones
  - asambleas
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία se refiere a comunidades cristianas locales. 'Iglesias' es la opción más clara y estándar en español eclesial.
theological_decisions:
- issue: Alcance de ἐν τῷ εὐαγγελίῳ
  english_pob_reading: Kept as 'in the gospel' without specifying ministry role.
  chosen_spanish_reading: Se conserva 'en el evangelio' sin añadir 'predicación' ni 'ministerio'.
  alternative_spanish_readings:
  - en la predicación del evangelio
  - en su labor en el evangelio
  rationale: El griego no explicita un cargo ministerial ni la acción de predicar; sólo ubica la alabanza en relación con el evangelio. Mantener la expresión abierta evita introducir una precisión doctrinal no dada por el texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 y §3
- issue: Identidad de ἀδελφός
  english_pob_reading: Rendered as 'the brother' referring to a male Christian coworker known to the Corinthians.
  chosen_spanish_reading: Se traduce como 'al hermano', manteniendo la referencia a un varón cristiano concreto.
  alternative_spanish_readings:
  - al hermano (genérico)
  - al creyente
  rationale: La forma masculina singular con artículo en este contexto de viaje apunta a una persona específica. 'Al hermano' respeta el dato gramatical y el contexto narrativo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió la validación anterior añadiendo el marcador de nota [a] en el texto español exactamente donde corresponde. La redacción general permanece alineada con el auditoría inglesa y el griego, sin cambios de sentido sustanciales.
  spanish_consistency_notes:
  - Se mantiene 'evangelio' sin ampliar a 'predicación' para no sobreinterpretar ἐν τῷ εὐαγγελίῳ.
  - Se usa 'iglesias' para ἐκκλησιῶν conforme al uso paulino y a la terminología eclesial estándar.
  - '''Alabanza'' conserva mejor el sustantivo ἔπαινος que una paráfrasis verbal.'
  - La nota al pie ofrece la alternativa lexical documentada sin desplazar la lectura principal.
