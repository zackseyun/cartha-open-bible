translation:
  language: es
  text: Ahora les hacemos saber, hermanos[a], la gracia de Dios[b] que ha sido dada entre las iglesias de Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» reproduce el vocativo masculino plural del griego; en Pablo suele incluir a toda la comunidad. También puede entenderse como «hermanos y hermanas».
    reason: lexical_alternative
  - marker: b
    text: «La gracia de Dios» puede referirse tanto al favor o gracia de Dios como a la generosidad producida por esa gracia en las iglesias de Macedonia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζομεν
  english_pob_choice: we make known
  chosen_spanish: les damos a conocer
  alternatives_spanish:
  - les informamos
  - hacemos saber
  lexicon: BDAG
  rationale: γνωρίζω expresa comunicar o dar a conocer. En español, «les damos a conocer» conserva el tono epistolar y la acción declarativa sin sonar tan rígido como una calca literal.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ aquí introduce un nuevo tramo del discurso con transición suave. «Ahora» comunica ese giro natural en español sin cargar contraste fuerte.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma natural en español con pronombre enclítico y contexto epistolar plural.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermandad
  lexicon: BDAG
  rationale: El vocativo masculino plural se mantiene como «hermanos», forma fiel a la marca gramatical del griego. En el uso paulino puede incluir a toda la congregación; por eso la alternativa inclusiva queda como opción, no en el texto principal.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  - don bondadoso
  lexicon: BDAG
  rationale: χάρις es un término paulino central y conviene conservarlo como «gracia». Así se mantiene su amplitud teológica sin reducirlo a una sola idea como «favor» o «regalo».
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  lexicon: BDAG
  rationale: 'El genitivo se traduce de forma directa y natural: «la gracia de Dios». Mantiene la relación sin sobreexplicarla.'
- source_word: τὴν δεδομένην
  english_pob_choice: that has been given
  chosen_spanish: que ha sido dada
  alternatives_spanish:
  - otorgada
  - concedida
  lexicon: BDAG
  rationale: El participio perfecto pasivo pide una forma compuesta que preserve el acto concluido y su resultado presente. «Ha sido dada» refleja bien la pasividad del original.
- source_word: ἐν
  english_pob_choice: among
  chosen_spanish: entre
  alternatives_spanish:
  - en
  lexicon: BDAG
  rationale: Con «las iglesias» y el sentido de ámbito de manifestación, «entre» comunica mejor la distribución relacional de la gracia que el simple «en».
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: «Iglesias» es el equivalente contextual normal en Pablo para ἐκκλησία y resulta transparente para lectores actuales.
- source_word: τῆς Μακεδονίας
  english_pob_choice: of Macedonia
  chosen_spanish: de Macedonia
  alternatives_spanish:
  - en Macedonia
  lexicon: BDAG
  rationale: 'El genitivo se conserva como relación posesiva/identificadora: «las iglesias de Macedonia».'
theological_decisions:
- issue: Sentido de «la gracia de Dios» en contexto
  english_pob_reading: A reference to God's gracious work active in the Macedonian churches, with implications for their generosity
  chosen_spanish_reading: Referencia a la obra graciosa de Dios activa entre las iglesias macedonias, con posible manifestación en su generosidad
  alternative_spanish_readings:
  - una referencia al don concreto de la colecta
  - una referencia general al favor divino mostrado a esas iglesias
  rationale: Pablo deja abierta la relación entre la gracia divina y su expresión práctica. La traducción conserva «la gracia de Dios» para no reducir el alcance teológico ni disolver la posible referencia a la generosidad resultante.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla de antemano.'
translation_notes:
  revision_awareness: El texto coincide con el audit trail inglés en sentido y alcance; no se registran revisiones posteriores que obliguen a ajustar la redacción española.
  spanish_consistency_notes:
  - Se mantuvo «gracia» para χάρις, en coherencia con la terminología paulina del proyecto.
  - Se evitó «SEÑOR» porque aquí el original dice θεοῦ y no κύριος.
  - Se conservó la forma vocativa masculina «hermanos» con nota inclusiva, siguiendo la política POB documentada.
  - «Entre las iglesias de Macedonia» refleja el valor espacial/distributivo de ἐν sin perder naturalidad en español.
