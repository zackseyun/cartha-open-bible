translation:
  language: es
  text: En cuanto a Tito, él es mi compañero y colaborador para ustedes; en cuanto a nuestros hermanos[a], ellos son mensajeros de las iglesias, la gloria del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «apóstoles de las iglesias». El término griego puede referirse a enviados o delegados comisionados, no necesariamente al oficio técnico de apóstol.'
    reason: alternative_reading
  - marker: b
    text: 'O: «la gloria de Cristo». Aquí «Mesías» traduce Χριστός como título, conforme a la política del proyecto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε ὑπὲρ Τίτου
  english_pob_choice: As for Titus
  chosen_spanish: En cuanto a Tito
  alternatives_spanish:
  - Respecto de Tito
  - Si se trata de Tito
  lexicon: BDAG
  rationale: La construcción es elíptica y abre un primer caso paralelo. En español, «En cuanto a Tito» conserva la función discursiva de introducción de tema sin forzar un giro artificial con «si» o una expansión interpretativa.
- source_word: κοινωνὸς ἐμὸς
  english_pob_choice: my partner
  chosen_spanish: mi compañero
  alternatives_spanish:
  - mi socio
  - mi partícipe
  lexicon: BDAG
  rationale: κοινωνός expresa a alguien que comparte con otro. «Compañero» comunica la cercanía relacional y ministerial en español, con naturalidad. Se evita «socio» por su matiz comercial y «partícipe» por sonar más abstracto.
- source_word: συνεργός
  english_pob_choice: fellow worker
  chosen_spanish: colaborador
  alternatives_spanish:
  - cooperador
  - copartícipe en la obra
  lexicon: BDAG
  rationale: El sentido es de alguien que trabaja junto con otro. «Colaborador» transmite bien el valor de συνεργός en español moderno y mantiene el paralelismo con «mi compañero».
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - hacia ustedes
  - en relación con ustedes
  lexicon: BDAG
  rationale: La preposición con pronombre personal tiene aquí orientación relacional/ministerial. «Para ustedes» es fiel y claro, sin añadir la expansión interpretativa de «para su bien».
- source_word: ἀδελφοὶ ἡμῶν
  english_pob_choice: our brothers
  chosen_spanish: nuestros hermanos
  alternatives_spanish:
  - nuestros hermanos y hermanas
  - nuestros hermanos en la fe
  lexicon: BDAG
  rationale: El plural masculino griego se refiere a varones concretos en este contexto. «Nuestros hermanos» conserva esa forma sin introducir una expansión inclusiva no presente en el texto.
- source_word: ἀπόστολοι ἐκκλησιῶν
  english_pob_choice: messengers of the churches
  chosen_spanish: mensajeros de las iglesias
  alternatives_spanish:
  - apóstoles de las iglesias
  - delegados de las iglesias
  lexicon: BDAG
  rationale: ἀπόστολοι puede referirse a enviados/representantes, no necesariamente al oficio técnico apostólico. «Mensajeros» preserva la amplitud semántica y evita una sobrelectura eclesiológica. Se mantiene «iglesias» porque el genitivo plural señala a las congregaciones locales.
- source_word: δόξα Χριστοῦ
  english_pob_choice: the glory of the Messiah
  chosen_spanish: gloria de Mesías
  alternatives_spanish:
  - la gloria de Cristo
  - honra de Mesías
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, y el proyecto traduce normalmente ese título como «Mesías». Se conserva la tensión formal del sintagma nominal sin añadir verbo ni paráfrasis; «gloria de Mesías» refleja el genitivo de relación/pertenencia de manera breve en español.
theological_decisions:
- issue: Naturaleza de ἀπόστολοι en relación con los hermanos mencionados
  english_pob_reading: non-technical 'messengers/delegates' of the churches
  chosen_spanish_reading: mensajeros de las iglesias
  alternative_spanish_readings:
  - apóstoles de las iglesias
  - delegados de las iglesias
  rationale: El contexto de la colecta y la mención de hermanos enviados por congregaciones favorece la idea de representantes comisionados, no del oficio apostólico fundacional. «Mensajeros» conserva esa amplitud y evita imponer un estatus eclesial que el versículo no exige.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Renderización de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Χριστός aparece con valor titular. Conforme al criterio del proyecto, se traduce el título como «Mesías» cuando el contexto lo sostiene, en lugar de fijarlo como nombre propio en español.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del texto inglés: se confirmó que la expansión interpretativa «for your good» fue corregida a un valor más cercano de εἰς ὑμᾶς, y que la oscilación entre «Christ» y «Messiah» quedó resuelta en favor de «Messiah» por política terminológica. La versión española sigue esa lectura y evita añadir expansión interpretativa.'
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al criterio del proyecto.
  - Se evita «SEÑOR» u otras sustituciones para nombres divinos, aunque este versículo no contiene el Tetragrámaton.
  - «Iglesias» conserva el plural del genitivo ἐκκλησιῶν.
  - El estilo busca un registro bíblico moderno, claro y publicable, sin caer en calcos rígidos.
