translation:
  language: es
  text: Y no solo eso, sino que también fue designado por las iglesias como nuestro compañero de viaje con este don generoso[a] que es administrado por nosotros para la gloria del Señor mismo[b] y nuestra buena disposición[c]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'con esta gracia'; aquí 'don generoso' refleja χάρις en el contexto de la colecta.
    reason: lexical_alternative
  - marker: b
    text: O 'la gloria de su Señor'; la frase griega también puede entenderse como 'la gloria del Señor'.
    reason: alternative_reading
  - marker: c
    text: O 'entusiasmo', 'prontitud' o 'celo'; προθυμίαν puede expresar disposición voluntaria y entusiasta para actuar.
    reason: lexical_alternative
lexical_decisions:
- source_word: χειροτονηθεὶς
  english_pob_choice: appointed
  chosen_spanish: designado
  alternatives_spanish:
  - nombrado
  - elegido
  - escogido
  lexicon: BDAG
  rationale: El participio indica que fue señalado o puesto aparte por las iglesias. 'Designado' comunica bien la acción sin imponer una idea moderna de votación; mantiene abierta la tensión entre elección y nombramiento que el inglés POB preserva con 'appointed' y sus alternativas.
- source_word: ἐκκλησιῶν
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - congregaciones
  - asambleas
  lexicon: BDAG
  rationale: En Pablo, el término se refiere normalmente a comunidades cristianas. 'Iglesias' es la equivalencia natural y contextualmente precisa en español.
- source_word: συνέκδημος
  english_pob_choice: traveling companion
  chosen_spanish: compañero de viaje
  alternatives_spanish:
  - fellow traveler
  - compañero de camino
  lexicon: BDAG
  rationale: La palabra describe a alguien que viaja con otro. 'Compañero de viaje' es idiomático en español y conserva el sentido de acompañamiento en una misión concreta.
- source_word: χάριτι
  english_pob_choice: gracious gift
  chosen_spanish: gracia
  alternatives_spanish:
  - don de gracia
  - regalo gracioso
  - favor
  lexicon: BDAG
  rationale: Aquí χάρις se relaciona con la colecta y no solo con la gracia abstracta. En el texto principal se deja 'gracia' para no sobrecargar la frase, pero la nota explica que el sentido incluye el acto/don de gracia; esto conserva la tensión lexical documentada por el POB inglés.
- source_word: διακονουμένῃ
  english_pob_choice: being administered
  chosen_spanish: es administrada
  alternatives_spanish:
  - es servida
  - está siendo administrada
  - es gestionada
  lexicon: BDAG
  rationale: El participio describe el manejo práctico de la colecta por Pablo y sus colaboradores. 'Es administrada' reproduce el sentido logístico y fiduciario mejor que opciones más eclesiásticas o más libres.
- source_word: πρὸς
  english_pob_choice: for
  chosen_spanish: para
  alternatives_spanish:
  - hacia
  - con miras a
  lexicon: BDAG
  rationale: En este contexto expresa finalidad. 'Para' es la forma natural en español y refleja el propósito de la administración de la colecta.
- source_word: αὐτοῦ τοῦ κυρίου
  english_pob_choice: the Lord himself
  chosen_spanish: el Señor mismo
  alternatives_spanish:
  - su Señor
  - el Señor
  lexicon: BDAG
  rationale: La construcción es compacta y puede leerse con énfasis intensivo. 'El Señor mismo' conserva ese énfasis sin forzar un poseedor distinto en español.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título reverencial convencional para κύριος, conforme a la guía doctrinal del proyecto.
- source_word: δόξαν
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honra
  - honor
  lexicon: BDAG
  rationale: '''Gloria'' conserva el peso teológico del término y se ajusta al propósito explícito de la frase.'
- source_word: προθυμίαν
  english_pob_choice: eagerness
  chosen_spanish: diligencia
  alternatives_spanish:
  - prontitud
  - celo
  - disposición
  lexicon: BDAG
  rationale: El sustantivo denota disposición voluntaria y celo para actuar. 'Diligencia' funciona en español como una cualidad activa y responsable; se elige como opción sobria y readable, aunque la nota reconoce que también puede entenderse como 'celo' o 'prontitud'.
theological_decisions:
- issue: Referencia y fuerza de αὐτοῦ en πρὸς τὴν αὐτοῦ τοῦ κυρίου δόξαν
  english_pob_reading: '''the glory of the Lord himself'' with αὐτοῦ taken as an intensive element modifying ''the Lord.'''
  chosen_spanish_reading: '''la gloria del Señor mismo'' con sentido intensivo'
  alternative_spanish_readings:
  - '''la gloria de su Señor'''
  - '''la gloria del Señor'''
  rationale: La frase griega es condensada y admite más de una relación sintáctica. En español se opta por la lectura intensiva, que mantiene el énfasis en el Señor sin introducir un poseedor ambiguo; la nota preserva las alternativas documentadas por el POB inglés.
  doctrine_reference: Preservar la tensión teológica y sintáctica cuando la ambigüedad es real.
translation_notes:
  revision_awareness: El inglés POB pasó por revisiones que ajustaron la relación de σὺν τῇ χάριτι con συνέκδημος y que prefirieron 'eagerness' para προθυμίαν ἡμῶν. La versión española refleja esas decisiones evitando unir indebidamente la frase preposicional con el participio y conservando una cualidad voluntaria y activa al final. También se mantiene la ambigüedad controlada de αὐτοῦ τοῦ κυρίου mediante una nota.
  spanish_consistency_notes:
  - Se mantiene 'iglesias' para ἐκκλησίαι, en línea con el uso paulino del término.
  - '''Señor'' se usa para κύριος según la terminología del proyecto.'
  - '''Gracia'' se conserva como traducción principal de χάρις, pero con nota para el matiz de don concreto en la colecta.'
  - La puntuación con guion final reproduce el carácter de continuación del versículo en el contexto inmediato.
