  text: οὐ μόνον δὲ ἀλλὰ καὶ χειροτονηθεὶς ὑπὸ τῶν ἐκκλησιῶν συνέκδημος ἡμῶν ⸀σὺν τῇ χάριτι ταύτῃ τῇ διακονουμένῃ ὑφ’ ἡμῶν πρὸς τὴν ⸀αὐτοῦ τοῦ κυρίου δόξαν καὶ προθυμίαν ἡμῶν—
base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/008/019.yaml
  text: And not only that[d][c][b][a], but he was also appointed by the churches as our traveling companion with this gracious gift that is being administered by us for the glory of the Lord himself and our eagerness—
  footnotes:
  - marker: a
    text: Or 'chosen' or 'elected' by the churches.
    reason: lexical_alternative
  - marker: b
    text: Or 'with this grace'; here 'gracious gift' reflects χάρις in the context of the collection.
    reason: lexical_alternative
  - marker: c
    text: Or 'for the glory of his Lord'; the Greek phrase may also be understood as 'the Lord's glory.'
    reason: alternative_reading
  - marker: d
    text: Or 'as our traveling companion with this gracious gift'.
    reason: previous_rendering
