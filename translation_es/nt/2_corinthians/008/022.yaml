translation:
  language: es
  text: Y hemos enviado con ellos a nuestro hermano[a], a quien hemos probado muchas veces en muchos asuntos y hallado diligente; pero ahora es aún más diligente por la gran confianza que tiene en ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero ahora mucho más fervoroso por la gran confianza que tiene en ustedes». El griego permite un matiz ligeramente distinto, aunque el sentido general sigue siendo que su celo ha aumentado en relación con ustedes.'
    reason: lexical_alternative
lexical_decisions:
- source_word: συνεπέμψαμεν
  english_pob_choice: we have sent with them
  chosen_spanish: hemos enviado con ellos
  alternatives_spanish:
  - lo enviamos con ellos
  - lo hemos enviado junto con ellos
  lexicon: BDAG
  rationale: El aoristo se vierte con perfecto compuesto por naturalidad narrativa en español, manteniendo la acción completada con relevancia presente. El prefijo σύν- se conserva con «con ellos».
- source_word: ἀδελφὸν ἡμῶν
  english_pob_choice: our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - nuestro hermano en la fe
  - nuestro compañero creyente
  lexicon: BDAG
  rationale: Se preserva el idiomatismo cristiano fraternal sin expandir innecesariamente el sentido. «Hermano» comunica tanto la relación comunitaria como el referente masculino singular.
- source_word: ἐδοκιμάσαμεν
  english_pob_choice: we have often tested
  chosen_spanish: hemos probado
  alternatives_spanish:
  - hemos examinado
  - hemos puesto a prueba
  lexicon: BDAG
  rationale: «Probar» comunica bien la idea de examinar con el fin de verificar carácter o fiabilidad. El matiz de proceso y resultado queda reforzado por el contexto de la cláusula participial.
- source_word: ἐν πολλοῖς πολλάκις
  english_pob_choice: often in many matters
  chosen_spanish: muchas veces en muchos asuntos
  alternatives_spanish:
  - a menudo en muchas cosas
  - repetidamente en muchas situaciones
  lexicon: BDAG
  rationale: La combinación expresa repetición y amplitud; «muchas veces» refleja πολλάκις y «en muchos asuntos» refleja ἐν πολλοῖς con un español natural y claro.
- source_word: σπουδαῖον ὄντα
  english_pob_choice: found to be diligent
  chosen_spanish: hallado diligente
  alternatives_spanish:
  - hallado serio
  - hallado celoso
  lexicon: BDAG
  rationale: '«Diligente» recoge el valor de σπουδαῖος en este contexto ministerial: empeñoso, serio y confiable. «Hallado» refleja el resultado de la prueba sin añadir ideas ajenas.'
- source_word: νυνὶ δὲ πολὺ σπουδαιότερον
  english_pob_choice: but who is now even more diligent
  chosen_spanish: pero ahora es aún mucho más diligente
  alternatives_spanish:
  - pero ahora es mucho más fervoroso
  - pero ahora es aún más empeñoso
  lexicon: BDAG
  rationale: El comparativo intensificado por πολὺ se expresa de forma idiomática con «aún mucho más». Se conserva la comparación con la evaluación previa de diligencia.
- source_word: πεποιθήσει πολλῇ τῇ εἰς ὑμᾶς
  english_pob_choice: because of his great confidence in you
  chosen_spanish: por la gran confianza que tiene en ustedes
  alternatives_spanish:
  - por su gran confianza hacia ustedes
  - por la gran seguridad que tiene respecto de ustedes
  lexicon: BDAG
  rationale: 'La dativa se entiende causal/instrumental: la confianza es la base de su mayor diligencia. «En ustedes» reproduce la dirección de εἰς ὑμᾶς en español claro y natural.'
theological_decisions:
- issue: Referencia y matiz de la frase final sobre la confianza
  english_pob_reading: the brother's increased diligence is grounded in his great confidence in the Corinthians
  chosen_spanish_reading: la mayor diligencia del hermano se funda en la gran confianza que tiene en los corintios
  alternative_spanish_readings:
  - la frase podría entenderse como la confianza de Pablo en los corintios
  - la expresión podría leerse como valentía hacia ustedes más que confianza en ustedes
  rationale: La sintaxis inmediata vincula la confianza con el hermano nombrado y explica por qué ahora es «aún mucho más diligente». Se conserva la tensión semántica sin resolverla artificialmente, siguiendo la lectura auditada del POB inglés.
  doctrine_reference: Preservar la tensión textual sin sobreinterpretar
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última pasada auditada, que no introdujo cambios, y mantiene la misma interpretación de conjunto: el hermano fue probado, resultó diligente y ahora lo es aún más por su confianza en los corintios. Se evita suavizar la tensión de πεποιθήσει πολλῇ τῇ εἰς ὑμᾶς, dejando abierta la alternativa semántica ya documentada en el POB inglés.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aplica.
  - Se mantiene «hermano» por el idiomatismo cristiano y la referencia masculina singular.
  - «Diligente» se usa como equivalente de σπουδαῖος para conservar el tono ministerial y la evaluación ética.
  - La puntuación con punto y coma separa la cláusula de contraste, en línea con la estructura del griego y la fluidez del español.
  - Se prefiere «ustedes» para un registro latinoamericano neutral y contemporáneo.
