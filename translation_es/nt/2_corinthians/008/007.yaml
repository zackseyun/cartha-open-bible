translation:
  language: es
  text: Pero, así como abundan en todo—en fe, en palabra, en conocimiento, en toda diligencia y en el amor nuestro en ustedes—procuren también abundar en esta gracia[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O posiblemente, «su amor por nosotros». La frase griega es difícil, y algunos manuscritos leen «su amor en nosotros».
    reason: alternative_reading
  - marker: b
    text: Es decir, esta obra de dar que procede de la gracia.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ ὥσπερ
  english_pob_choice: But just as
  chosen_spanish: Pero, así como
  alternatives_spanish:
  - Sino que, así como
  - Mas así como
  lexicon: BDAG
  rationale: Introduce una continuación adversativa y comparativa natural en español, manteniendo el contraste sin endurecer el tono.
- source_word: ἐν παντὶ περισσεύετε
  english_pob_choice: you abound in everything
  chosen_spanish: abundan en todo
  alternatives_spanish:
  - sobresalen en todo
  - son abundantes en todo
  lexicon: BDAG
  rationale: «Abundar» conserva la imagen de superabundancia del verbo περισσεύω y permite reutilizar el mismo verbo en la exhortación final.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: «Fe» es la equivalencia directa y encaja con la serie de dones o virtudes que Pablo enumera.
- source_word: λόγῳ
  english_pob_choice: speech
  chosen_spanish: palabra
  alternatives_spanish:
  - habla
  - discurso
  - expresión
  lexicon: BDAG
  rationale: En español, «palabra» puede abarcar facultad de hablar, discurso y expresión; aquí preserva la amplitud del λόγος sin sonar demasiado técnico. «Habla» sería posible, pero la secuencia «fe, palabra, conocimiento» fluye mejor y sigue el ritmo de la lista.
- source_word: γνώσει
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - sabiduría
  lexicon: BDAG
  rationale: «Conocimiento» mantiene la correspondencia más directa y no fuerza el matiz a sabiduría.
- source_word: πάσῃ σπουδῇ
  english_pob_choice: all diligence
  chosen_spanish: toda diligencia
  alternatives_spanish:
  - todo empeño
  - todo celo
  - toda prontitud
  lexicon: BDAG
  rationale: «Diligencia» conserva el sustantivo de la lista y el valor de esfuerzo serio y constante; «toda» reproduce πάσῃ.
- source_word: τῇ ἐξ ἡμῶν ἐν ὑμῖν ἀγάπῃ
  english_pob_choice: our love in you
  chosen_spanish: nuestro amor en ustedes
  alternatives_spanish:
  - el amor de nosotros en ustedes
  - el amor que procede de nosotros entre ustedes
  - su amor por nosotros
  lexicon: BDAG
  rationale: La redacción griega es difícil; el audit trail inglés opta por una lectura más natural pero aún ligada a ἐξ ἡμῶν ἐν ὑμῖν. En español, «nuestro amor en ustedes» conserva la procedencia y la ubicación relacional sin resolver excesivamente la ambigüedad. «El amor de nosotros en ustedes» sería más literal pero menos idiomático.
- source_word: ἵνα καὶ ἐν ταύτῃ τῇ χάριτι περισσεύητε
  english_pob_choice: see that you also abound in this grace
  chosen_spanish: procuren también abundar en esta gracia
  alternatives_spanish:
  - asegúrense de abundar también en esta gracia
  - para que también abunden en esta gracia
  lexicon: BDAG
  rationale: «Procuren» expresa una exhortación pastoral natural en español para ἵνα con el verbo exhortativo implícito; «abundar» conserva la repetición léxica central; «gracia» traduce χάρις siguiendo la decisión teológica del texto fuente.
- source_word: χάριτι
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - don
  - favor
  - acto de gracia
  lexicon: BDAG
  rationale: Mantener «gracia» preserva la carga teológica de χάρις y la conexión paulina con la generosidad como manifestación de gracia, sin reducir el término a un simple aporte material.
theological_decisions:
- issue: Sentido de χάρις en la colecta para los santos
  english_pob_reading: '''this grace'' refers to the gracious work of giving, while retaining the theological term ''grace'' in the main text.'
  chosen_spanish_reading: «esta gracia» permanece en el texto principal como término teológico, con el contexto indicando que se trata de la obra graciosa de dar.
  alternative_spanish_readings:
  - esta dádiva
  - este acto de gracia
  - este generoso don
  rationale: La traducción principal no debe vaciar el término paulino. «Gracia» mantiene la amplitud teológica y deja que el contexto de la colecta precise su referencia concreta.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ambigüedad de τῇ ἐξ ἡμῶν ἐν ὑμῖν ἀγάπῃ
  english_pob_reading: The English audit trail finally prefers 'our love in you' as a smoother rendering while preserving the likely sense.
  chosen_spanish_reading: «nuestro amor en ustedes» retiene la relación poseída y localizada sin cerrar del todo la construcción difícil.
  alternative_spanish_readings:
  - su amor por nosotros
  - el amor de ustedes por nosotros
  - nuestro amor entre ustedes
  rationale: La frase griega es sintácticamente tensa y admite más de una lectura. La traducción evita normalizarla demasiado y conserva la tensión documentada por el texto fuente y el audit trail.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El expediente inglés muestra una revisión posterior que suavizó la frase hacia 'our love in you' para mayor naturalidad. Esta versión española sigue esa línea, pero conserva la estructura relacional difícil del griego y mantiene 'gracia' como término central de χάρις. También preserva la repetición de 'abundan/abundar' para reflejar περισσεύω en ambos miembros del versículo.
  spanish_consistency_notes:
  - Se mantiene 'gracia' para χάρις en armonía con el criterio general del proyecto.
  - Se usa 'abundan/abundar' para περισσεύω en ambos lugares, evitando alternar con 'sobresalen' o 'excelen'.
  - '''Palabra'' se adopta para λόγῳ como opción amplia y reconocible en español, sin restringir indebidamente el alcance del término.'
  - La preposición relacional en 'nuestro amor en ustedes' intenta reflejar ἐξ ἡμῶν ἐν ὑμῖν sin sobreexplicar la construcción.
