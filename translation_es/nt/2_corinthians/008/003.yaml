- from: Pues[a], yo testifico, que dieron conforme a su capacidad, y aun más allá de su capacidad, por propia iniciativa[b].
  to: Pues[a] doy testimonio de que dieron conforme a su capacidad, y aun más allá de su capacidad, por iniciativa propia[b].
  rationale: Se ajusta la sintaxis para que el inciso de μαρτυρῶ suene natural en español («doy testimonio de que») sin perder la fuerza de atestación personal. También se mejora la idiomaticidad de αὐθαίρετοι con «por iniciativa propia», que conserva el sentido de voluntariedad y acción sin compulsión. No se requieren cambios doctrinales ni textuales mayores.
