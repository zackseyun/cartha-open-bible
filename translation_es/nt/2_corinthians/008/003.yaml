translation:
  language: es
  text: Pues[a] doy testimonio de que dieron conforme a su capacidad, y aun más allá de su capacidad, por iniciativa propia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «porque».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «voluntariamente» o «de buena voluntad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce la afirmación explicativa de Pablo respecto de lo que sigue; en español, «Pues» conserva bien el valor discursivo causal/explicativo sin sonar forzado al inicio de la cláusula.
- source_word: κατὰ δύναμιν
  english_pob_choice: according to their ability
  chosen_spanish: conforme a su capacidad
  alternatives_spanish:
  - según su capacidad
  - de acuerdo con su capacidad
  - según sus medios
  lexicon: BDAG
  rationale: κατά con acusativo y δύναμις expresa medida o norma. «Conforme a su capacidad» preserva la idea de proporcionalidad y suena natural en español; «capacidad» mantiene el sentido de habilidad/posibilidad, dejando abierta la alternativa de «medios» que el inglés POB anotó.
- source_word: μαρτυρῶ
  english_pob_choice: I testify
  chosen_spanish: yo testifico
  alternatives_spanish:
  - doy testimonio
  - atestiguo
  - yo doy testimonio
  lexicon: BDAG
  rationale: El presente indicativo enfático y parentético de μαρτυρῶ se expresa bien con «yo testifico», que conserva la fuerza personal de la afirmación paulina. Se usa el pronombre para reflejar el énfasis implícito del griego.
- source_word: καὶ παρὰ δύναμιν
  english_pob_choice: and beyond their ability
  chosen_spanish: y aun más allá de su capacidad
  alternatives_spanish:
  - y más allá de su capacidad
  - e incluso más allá de su capacidad
  - y aun por encima de su capacidad
  lexicon: BDAG
  rationale: παρά con acusativo indica rebasar un límite o norma. «Aun más allá de su capacidad» reproduce la contraposición retórica y evita una paráfrasis excesiva; «capacidad» mantiene la correspondencia con la frase anterior.
- source_word: αὐθαίρετοι
  english_pob_choice: of their own accord
  chosen_spanish: por propia iniciativa
  alternatives_spanish:
  - voluntariamente
  - de buena voluntad
  - de propio impulso
  lexicon: BDAG
  rationale: El adjetivo describe actuar por iniciativa propia, sin compulsión. «Por propia iniciativa» comunica bien esa voluntariedad en español y conserva el matiz de acción espontánea que el inglés POB captó con «of their own accord».
theological_decisions:
- issue: Sujeto y verbo implícito con αὐθαίρετοι
  english_pob_reading: Supply 'they gave' from the context so the clause reads as a complete statement about the Macedonians' voluntary giving.
  chosen_spanish_reading: Mantener la elipsis en el adjetivo final, con el verbo de «dieron» recuperado del contexto inmediato, para que la frase siga refiriéndose a su ofrenda voluntaria.
  alternative_spanish_readings:
  - 'hacer explícito el verbo: «por propia iniciativa dieron»'
  - 'traducir de modo más literal: «siendo voluntarios»'
  rationale: El griego es elíptico y depende del contexto de los vv. 2–4. En español, puede conservarse la naturalidad con una construcción adverbial («por propia iniciativa») sin añadir información ajena al pasaje; la lectura sigue entendiendo que se trata de dar/ofrendar.
  doctrine_reference: 'Principio de equivalencia óptima: preservar el sentido llano del texto sin sobreexplicar ni perder la relación con el contexto narrativo.'
translation_notes:
  revision_awareness: 'Coincide con el estado más reciente del expediente inglés: no hay revisiones aplicadas y el control cruzado reporta alto acuerdo. La redacción española sigue la misma solución interpretativa básica, ajustada a sintaxis natural del español.'
  spanish_consistency_notes:
  - Se mantiene «capacidad» de forma uniforme para δύναμις, en paralelo con el inglés auditado «ability».
  - Se evita «Mesías/Cristo» porque este versículo no contiene el término.
  - «Yo testifico» conserva el énfasis personal del verbo μαρτυρῶ.
  - «Por propia iniciativa» conserva la voluntariedad sin convertirla en un tecnicismo eclesiástico.
