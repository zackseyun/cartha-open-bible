review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente el sentido del griego: Pablo da testimonio de que los macedonios dieron según su capacidad y aun más allá de ella, y lo hicieron voluntariamente. Sin embargo, la sintaxis española introduce un «que» innecesario después de «yo testifico», lo que se aleja de la estructura parentética de μαρτυρῶ y suena menos natural. También conviene ajustar levemente la puntuación/flujo para preservar mejor la atestación parentética del original.'
  spanish_quality_summary: 'La redacción es en general clara y fiel, pero «Pues[a], yo testifico, que dieron...» suena algo trabada en español bíblico moderno. «Pues[a] doy testimonio de que dieron...» o «Pues[a], doy testimonio: dieron...» sería más natural. Además, «por propia iniciativa» es comprensible, pero «por iniciativa propia» suena más idiomático en español general. El resto del vocabulario es adecuado y legible.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales están bien encaminadas: ὅτι → «Pues», κατὰ δύναμιν / παρὰ δύναμιν → «según/conforme a su capacidad ... más allá de su capacidad», αὐθαίρετοι → voluntariedad. Se conserva correctamente la nota alternativa para «porque» y para el matiz de voluntariedad.'
  issues:
  - severity: medium
    issue: Uso de «que» tras «yo testifico»
    rationale: El griego tiene μαρτυρῶ como inciso parentético («doy testimonio»), no una construcción principal que requiera necesariamente «que» justo después de una pausa. En español, «yo testifico, que dieron» resulta poco natural; «doy testimonio de que dieron» o una reestructuración equivalente preserva mejor el sentido.
  - severity: low
    issue: «por propia iniciativa» suena menos idiomático que «por iniciativa propia»
    rationale: Ambas opciones son fieles a αὐθαίρετοι, pero «por iniciativa propia» es la formulación más natural en español general y mantiene bien el matiz de actuar sin presión externa.
  - severity: low
    issue: «yo testifico» es correcto pero menos idiomático que «doy testimonio»
    rationale: No es un error semántico, pero «doy testimonio» suele sonar más natural y digno en español eclesial amplio, a la vez que conserva la fuerza de μαρτυρῶ.
  revised_spanish_text: Pues[a] doy testimonio de que dieron conforme a su capacidad, y aun más allá de su capacidad, por iniciativa propia[b].
