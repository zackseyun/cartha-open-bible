translation:
  language: es
  text: Porque procuramos lo bueno[a], no solo delante del Señor, sino también delante de las personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo honorable» o «lo recto».
    reason: lexical_alternative
lexical_decisions:
- source_word: προνοοῦμεν
  english_pob_choice: we take thought for
  chosen_spanish: procuramos hacer
  alternatives_spanish:
  - tomamos en cuenta
  - velamos por
  - nos ocupamos de
  lexicon: BDAG
  rationale: προνοέω expresa pensar de antemano, prever o ocuparse cuidadosamente de algo. En este contexto de integridad en el manejo de la colecta, «procuramos hacer» comunica una intención deliberada y prudente sin volver la frase pesada en español. Mantiene el matiz de acción orientada por previsión.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - en efecto
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación anterior. «Porque» conserva esa relación explicativa de modo natural en español.
- source_word: καλὰ
  english_pob_choice: what is good
  chosen_spanish: lo bueno
  alternatives_spanish:
  - lo honorable
  - lo recto
  - lo que es bueno
  lexicon: BDAG
  rationale: El plural neutro καλὰ puede referirse a acciones moralmente buenas u honorables. «Lo bueno» es breve y fiel al valor general del término, sin restringirlo indebidamente. La alternativa ética más específica queda preservada en la nota.
- source_word: οὐ μόνον ... ἀλλὰ καὶ
  english_pob_choice: not only ... but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no meramente ... sino también
  lexicon: BDAG
  rationale: La construcción correlativa se refleja con la fórmula natural en español «no solo ... sino también», conservando el equilibrio y el énfasis del griego.
- source_word: ἐνώπιον
  english_pob_choice: before
  chosen_spanish: delante de
  alternatives_spanish:
  - en presencia de
  - a la vista de
  lexicon: BDAG
  rationale: ἐνώπιον indica estar ante la vista o presencia de alguien. «Delante de» funciona bien en ambos miembros de la oración y suena natural en español bíblico contemporáneo.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Señor Dios
  - el Kyrios
  lexicon: BDAG
  rationale: Aunque el proyecto prefiere «Yahvé» para יהוה, aquí el griego usa κύριος en una expresión fija. En español, «el Señor» reproduce el título relacional y mantiene la referencia reverente que el contexto exige.
- source_word: ἀνθρώπων
  english_pob_choice: people
  chosen_spanish: las personas
  alternatives_spanish:
  - la gente
  - los seres humanos
  lexicon: BDAG
  rationale: ἄνθρωποι es genérico y no limita el referente a varones. «Las personas» expresa claramente la pluralidad de observadores humanos en español neutral.
theological_decisions:
- issue: Alcance ético de καλὰ en un contexto de transparencia financiera
  english_pob_reading: Rendered broadly as 'what is good' in the main text, with a footnote for 'what is honorable' or 'what is right.'
  chosen_spanish_reading: «lo bueno» en el texto principal, con nota para «lo honorable» o «lo recto».
  alternative_spanish_readings:
  - «lo honorable»
  - «lo recto»
  - «lo que es bueno»
  rationale: El versículo habla de conducta visible y recomendable tanto ante Dios como ante testigos humanos. El griego permite una lectura amplia de bondad moral o una lectura más concreta de honorabilidad pública. Mantener «lo bueno» evita estrechar el sentido, y la nota conserva la tensión ética que el contexto sugiere.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: El pasaje no requirió revisiones posteriores en el registro de auditoría; la lectura actual coincide con el último pase y con el resumen de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «el Señor» para κύριος, en línea con el uso reverente del título en este contexto.
  - Se prefirió «las personas» para ἀνθρώπων por su valor genérico y neutral en español.
  - La nota preserva la alternativa ética documentada para καλὰ sin desplazar la lectura principal del texto.
