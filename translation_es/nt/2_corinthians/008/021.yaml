review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura griega y la intención general: γάρ = «Porque», καλὰ = «lo bueno» con nota alternativa adecuada, οὐ μόνον...ἀλλὰ καὶ = «no solo... sino también», y ἐνώπιον en ambas cláusulas. Sin embargo, «procuramos hacer» añade explícitamente «hacer», que no está en προνοοῦμεν, y desplaza el matiz principal de previsión/cuidadosa consideración hacia ejecución. El sentido fuente es más bien «pensamos de antemano / tenemos cuidado de / nos preocupamos por» lo que es bueno u honorable.'
  spanish_quality_summary: El español es claro y natural, pero «procuramos hacer lo bueno» suena algo interpretativo y menos preciso que una formulación que conserve la idea de previsión ética. El resto del verso es muy legible. «Delante del Señor» y «delante de las personas» funcionan; «las personas» es correcto aunque algo más pesado que «la gente», pero sigue siendo adecuado y neutral.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Señor» para κύριος es apropiado aquí. La nota léxica para καλὰ está bien planteada. El único desajuste relevante es que la decisión para προνοοῦμεν no preserva suficientemente el valor de «pensar por adelantado / tomar cuidado».
  issues:
  - severity: medium
    issue: «procuramos hacer» sobretraduce προνοοῦμεν
    rationale: El verbo griego expresa previsión y cuidado deliberado, no directamente «hacer». Añadir «hacer» estrecha e interpreta el sentido, especialmente en un contexto de integridad y consideración pública.
  - severity: low
    issue: La formulación puede conservar mejor la relación con «delante del Señor... delante de las personas»
    rationale: Una redacción como «procuramos lo bueno» o «nos preocupamos por lo bueno» enlaza más naturalmente con la idea de conducta considerada tanto ante Dios como ante observadores humanos, sin introducir una acción no expresada.
  revised_spanish_text: Porque procuramos lo bueno[a], no solo delante del Señor, sino también delante de las personas.
  revised_footnotes:
  - marker: a
    text: O «lo honorable» o «lo recto».
    reason: lexical_alternative
  revision_rationale: Se reemplaza «procuramos hacer lo bueno» por «procuramos lo bueno» para evitar añadir el verbo «hacer», no presente en el griego, y para conservar mejor el matiz de cuidado deliberado/previsión de προνοοῦμεν. Se mantiene la nota sobre καλὰ, así como el resto de la estructura y terminología del borrador, que son fieles y naturales.
