- from: Porque procuramos hacer lo bueno[a], no solo delante del Señor, sino también delante de las personas.
  to: Porque procuramos lo bueno[a], no solo delante del Señor, sino también delante de las personas.
  rationale: Se reemplaza «procuramos hacer lo bueno» por «procuramos lo bueno» para evitar añadir el verbo «hacer», no presente en el griego, y para conservar mejor el matiz de cuidado deliberado/previsión de προνοοῦμεν. Se mantiene la nota sobre καλὰ, así como el resto de la estructura y terminología del borrador, que son fieles y naturales.
