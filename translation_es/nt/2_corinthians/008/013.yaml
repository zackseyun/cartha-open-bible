translation:
  language: es
  text: Porque no quiero decir que haya alivio para otros y dificultad para ustedes[a], sino igualdad—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «equidad». El término griego puede referirse a un balance justo al suplir necesidades, no necesariamente a una igualdad estricta en todas las posesiones.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... do not
  chosen_spanish: Porque no quiero decir
  alternatives_spanish:
  - No quiero decir
  - Pues no quiero decir
  lexicon: BDAG
  rationale: γάρ aporta enlace explicativo; en español, 'Porque' reproduce bien esa conexión. La negación recae sobre la intención del hablante, por eso 'no quiero decir' expresa la fuerza idiomática de la elipsis sin volverla mecánica.
- source_word: ἵνα
  english_pob_choice: mean that there should be
  chosen_spanish: que haya
  alternatives_spanish:
  - para que haya
  - que existiera
  lexicon: BDAG
  rationale: Aquí ἵνα funciona dentro de una construcción de intención/explicación; en español, 'que haya' transmite de manera natural el contenido de la afirmación implícita, sin forzar un 'para que' que sonaría menos idiomático.
- source_word: ἄλλοις
  english_pob_choice: for others
  chosen_spanish: para otros
  alternatives_spanish:
  - a otros
  - en favor de otros
  lexicon: BDAG
  rationale: El dativo contrasta el beneficio relativo. 'Para otros' comunica esa orientación de ventaja o provecho, y mantiene el contraste con 'para ustedes'.
- source_word: ἄνεσις
  english_pob_choice: relief
  chosen_spanish: alivio
  alternatives_spanish:
  - descanso
  - reposo
  - alivio de carga
  lexicon: BDAG
  rationale: En el contexto de la colecta, el término señala el alivio de una carga o presión. 'Alivio' preserva ese valor práctico y social mejor que opciones más devocionales o abstractas.
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - a ustedes
  - en ustedes
  lexicon: BDAG
  rationale: El dativo contrasta con 'para otros'. 'Para ustedes' es la correspondencia más clara y natural en español.
- source_word: θλῖψις
  english_pob_choice: hardship
  chosen_spanish: aflicción
  alternatives_spanish:
  - tribulación
  - apuro
  - opresión
  lexicon: BDAG
  rationale: Aunque θλῖψις puede abarcar presión, aflicción o angustia, en este contexto de recursos materiales 'aflicción' evita una lectura demasiado técnica y conserva la idea de carga indebida. Se mantiene la tensión semántica sin convertirla en mera comodidad emocional.
- source_word: ἀλλ’ ἐξ ἰσότητος
  english_pob_choice: but equality
  chosen_spanish: sino igualdad
  alternatives_spanish:
  - sino equidad
  - sino justicia distributiva
  - sino equidad en el reparto
  lexicon: BDAG
  rationale: ἰσότης apunta a equilibrio/equidad en el dar y recibir. 'Igualdad' es el equivalente más directo y transparente, mientras que 'equidad' podría interpretarse de modo más moderno. Se conserva la sobriedad del contraste paulino.
theological_decisions:
- issue: ἰσότης en una exhortación sobre la colecta y el reparto de recursos
  english_pob_reading: equality
  chosen_spanish_reading: igualdad
  alternative_spanish_readings:
  - equidad
  - fairness
  - balance
  rationale: 'La lectura principal mantiene el equivalente léxico directo para no diluir el alcance del argumento de Pablo. ''Igualdad'' preserva la tensión: no se trata de imponer un igualitarismo abstracto, sino de un balance práctico en la provisión de necesidades, como desarrollan los versículos siguientes.'
  doctrine_reference: Preservar la tensión teológica; no resolverla por paráfrasis ideológica.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el sentido del griego SBLGNT y la auditoría inglesa: conserva la negación de intención (''no quiero decir''), el contraste entre alivio y aflicción, y mantiene ''igualdad'' como lectura principal de ἰσότης, con una nota que preserva la alternativa semántica de equidad. No se detectaron revisiones previas que alteren el contenido.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' solo cuando corresponda; este versículo no lo requiere.
  - Se usa 'igualdad' en el texto principal y se reserva 'equidad' en nota, alineado con la decisión inglesa de conservar la transparencia léxica.
  - El estilo es bíblico contemporáneo, sin depender de fórmulas tradicionales que puedan ocultar el matiz de la colecta.
