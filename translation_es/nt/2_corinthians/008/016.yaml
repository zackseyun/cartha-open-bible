review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: una acción de gracias a Dios que ha puesto en Tito una disposición semejante en favor de los corintios. Sin embargo, «la misma diligencia» no representa tan bien σπουδή en este contexto relacional como «el mismo interés», «la misma solicitud» o «el mismo empeño». La nota alternativa también queda demasiado cercana al texto principal sin captar mejor el matiz.'
  spanish_quality_summary: El español es claro y natural, pero «pone la misma diligencia por ustedes en el corazón de Tito» suena algo rígido y menos idiomático para una disposición interior afectiva. «Pone en el corazón de Tito el mismo interés por ustedes» fluye mejor en español y preserva la metáfora interna.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεῷ = «Dios» está bien; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión es léxica-contextual con σπουδή.'
  issues:
  - severity: medium
    issue: «la misma diligencia» para τὴν αὐτὴν σπουδήν
    rationale: σπουδή aquí apunta más a interés solícito/afán sincero por los corintios que a «diligencia» en sentido de aplicación laboriosa. «Diligencia» en español puede sonar demasiado funcional y menos afectiva que el contexto paulino y el audit trail inglés («earnestness», alternativa «eagerness»).
  - severity: low
    issue: Orden sintáctico algo pesado en español
    rationale: 'Aunque «pone ... en el corazón de Tito» es comprensible, en español suena más natural colocar primero el complemento locativo: «que pone en el corazón de Tito...». Esto mejora la legibilidad sin alterar el sentido.'
  revised_spanish_text: Pero gracias a Dios[a], que pone en el corazón de Tito el mismo interés por ustedes,
  revised_footnotes:
