- from: Pero gracias a Dios[a], que pone la misma diligencia por ustedes en el corazón de Tito,
  to: Pero gracias a Dios[a], que pone en el corazón de Tito el mismo interés por ustedes,
  rationale: Se revisa «la misma diligencia» a «el mismo interés» para reflejar mejor σπουδή como preocupación solícita y sincera en este contexto. También se ajusta el orden de la frase para un español más natural, manteniendo la imagen de Dios como quien pone esa disposición en el corazón de Tito. La nota alternativa conserva una opción más cercana a «gives/solicitud».
