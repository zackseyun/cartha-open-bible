translation:
  language: es
  text: Pero gracias a Dios[a], que pone en el corazón de Tito el mismo interés por ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que da en el corazón de Tito la misma solicitud por ustedes».
    reason: lexical_alternative
lexical_decisions:
- source_word: Χάρις
  english_pob_choice: thanks be
  chosen_spanish: gracias
  alternatives_spanish:
  - gracia
  - agradecimiento
  lexicon: BDAG
  rationale: En esta fórmula epistolar con dativo a Dios, χάρις funciona como expresión de acción de gracias. «Gracias a Dios» conserva el valor doxológico sin introducir «gracia» como término teológico aquí.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ marca una transición suave desde lo anterior. «Pero» mantiene el giro discursivo natural en español y el contraste leve del contexto.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - para Dios
  lexicon: BDAG
  rationale: El dativo en esta construcción se expresa de modo idiomático en español con «a Dios» dentro de la exclamación de gratitud.
- source_word: τῷ διδόντι
  english_pob_choice: who puts
  chosen_spanish: que pone
  alternatives_spanish:
  - que da
  - que está poniendo
  lexicon: BDAG
  rationale: El participio presente de δίδωμι describe a Dios como el agente que comunica o suscita la disposición interior. «Pone» reproduce bien la idea de introducir esa disposición en el interior, como hace el inglés POB con «puts».
- source_word: τὴν αὐτὴν σπουδὴν
  english_pob_choice: the same earnestness
  chosen_spanish: la misma diligencia
  alternatives_spanish:
  - el mismo celo
  - la misma solicitud
  lexicon: BDAG
  rationale: σπουδή abarca diligencia, empeño y solicitud. En este contexto relacional, «diligencia» conserva el sentido de empeño activo sin perder el matiz de interés fervoroso; otras opciones posibles son «celo» o «solicitud».
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - a favor de ustedes
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa preocupación o interés dirigido hacia los corintios. «Por ustedes» es natural en español y conserva la referencia de beneficio/concernencia.
- source_word: ἐν τῇ καρδίᾳ Τίτου
  english_pob_choice: into Titus's heart
  chosen_spanish: en el corazón de Tito
  alternatives_spanish:
  - dentro del corazón de Tito
  - en el interior de Tito
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, la imagen idiomática en español se expresa de forma natural con «en el corazón de Tito». Mantiene la metáfora de la disposición interior sin forzar un calco innecesario.
theological_decisions:
- issue: Valor de χάρις en una fórmula de gratitud
  english_pob_reading: But thanks be to God
  chosen_spanish_reading: Pero gracias a Dios
  alternative_spanish_readings:
  - Pero gracia a Dios
  - Pero agradecimiento a Dios
  rationale: Aquí χάρις no introduce el tema paulino de la gracia salvadora, sino una expresión de gratitud a Dios. Traducirlo como «gracias» evita confundir al lector y sigue el valor contextual del original y del audit trail en inglés.
  doctrine_reference: Acción de gracias en fórmulas epistolares; no implica doctrina de gracia en este versículo.
translation_notes:
  revision_awareness: El control comparativo del pasaje coincide en alta medida con el texto inglés auditado; no se documentan revisiones sustantivas en la fuente inglesa reciente, por lo que el borrador español sigue de cerca la decisión ya establecida de entender χάρις aquí como agradecimiento y σπουδή como disposición ferviente/activa.
  spanish_consistency_notes:
  - Conservo «Dios» sin artículo en la fórmula de gratitud, conforme al uso idiomático.
  - Uso «Tito» como forma española estable del nombre propio.
  - Mantuve una puntuación simple y publicación-readable sin añadir paréntesis interpretativos al cuerpo del texto.
  - 'La nota al pie ofrece la alternativa léxica más cercana documentada por el audit trail inglés: «solicitud» frente a «diligencia».'
