review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: expresa la acción preventiva de στελλόμενοι, la finalidad negativa de μή + subjuntivo, el matiz de rendición de cuentas, y la idea de la contribución generosa administrada por Pablo y sus compañeros. Sin embargo, hay dos detalles mejorables: «culpe» es correcto pero «reproche» encaja algo mejor con μωμάομαι en este contexto de crítica pública; y «que es administrada por nosotros» suena algo pesado e innecesariamente literal frente a un español más natural que aún preserve la pasiva de sentido.'
  spanish_quality_summary: El texto es claro y digno, pero puede sonar más idiomático en español eclesial general. «Tomando esta precaución» funciona bien. «Respecto de» es aceptable, aunque «con respecto a» o «respecto a» serían más fluidos; no obstante, no es indispensable cambiarlo. La mejora principal es aligerar la última frase a «que administramos», que conserva el sentido sin rigidez. También conviene ajustar la nota b para reflejar mejor una alternativa natural en español.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos clave como Yahvé, Mesías, esclavo, etc. La elección de «ofrenda» para ἁδρότης es defendible en contexto, aunque «contribución» también sería posible. Se preserva correctamente el énfasis ético de responsabilidad en el manejo de la colecta.
  issues:
  - severity: medium
    issue: «nos culpe» puede ser menos preciso que «nos reproche» en este contexto
    rationale: μωμάομαι en 2 Co 8:20 apunta a encontrar falta o reprochar por el manejo de la colecta. «Culpar» es posible, pero «reprochar» refleja mejor el matiz de crítica o censura pública sin implicar necesariamente culpabilidad penal.
  - severity: medium
    issue: «que es administrada por nosotros» suena rígido y calcado
    rationale: Aunque formalmente correcto, en español resulta pesado. El griego participial pasivo en este contexto puede expresarse naturalmente como «que administramos» sin pérdida de significado ni del énfasis en que ellos están a cargo de la gestión.
  - severity: low
    issue: La nota b suena algo literal en «encuentre falta en nosotros»
    rationale: Como nota de alternativa está permitida, pero una formulación como «nos reproche» o «halle falta en nosotros» sería más natural en español y más cercana al valor contextual del verbo.
  revised_spanish_text: tomando esta precaución[a], para que nadie nos reproche[b] con respecto a esta generosa ofrenda que administramos,
