translation:
  language: es
  text: No digo esto como un mandato[a], sino por medio del empeño[b] de otros, y también pongo a prueba[c] la autenticidad del amor de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como una orden’. ἐπιταγή puede expresar mandato, orden o directriz con autoridad.
    reason: lexical_alternative
  - marker: b
    text: O ‘la diligencia de otros’ o ‘el ardor de otros’. σπουδή puede denotar empeño, diligencia o ardor entusiasta, según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O ‘pruebo’ o ‘examino’ la autenticidad del amor de ustedes. δοκιμάζω expresa comprobación por medio de prueba.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιταγή
  english_pob_choice: command
  chosen_spanish: mandato
  alternatives_spanish:
  - orden
  - precepto
  - comando
  lexicon: BDAG
  rationale: El griego indica una instrucción dada con autoridad; en español 'mandato' comunica bien ese valor sin sonar tan técnico como 'precepto' ni tan duro como 'comando'. Mantiene la negación de que Pablo esté hablando 'por vía de mandato'.
- source_word: διὰ τῆς ἑτέρων σπουδῆς
  english_pob_choice: through the earnestness of others
  chosen_spanish: por medio del fervor de otros
  alternatives_spanish:
  - por medio del empeño de otros
  - a través del entusiasmo de otros
  - por medio del celo de otros
  lexicon: BDAG
  rationale: διά con genitivo expresa medio; 'por medio de' lo refleja de forma natural. Para σπουδή, 'fervor' captura la intensidad y seriedad del contexto de generosidad mejor que una simple 'prisa'. 'Otros' conserva la indefinición de ἑτέρων, como en el inglés POB.
- source_word: σπουδή
  english_pob_choice: earnestness
  chosen_spanish: fervor
  alternatives_spanish:
  - empeño
  - entusiasmo
  - diligencia
  lexicon: BDAG
  rationale: σπουδή puede ser earnestness/eagerness/diligence. En este contexto, la idea es una disposición intensa y comprometida; 'fervor' comunica esa energía moral y afectiva sin perder la seriedad del término.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  - caridad
  lexicon: BDAG
  rationale: Se sigue el valor habitual de ἀγάπη como 'amor'. En español, 'amor' es la forma más directa y fiel al texto, sin imponer el término eclesiástico 'caridad'.
- source_word: γνήσιον
  english_pob_choice: genuineness
  chosen_spanish: genuinidad
  alternatives_spanish:
  - autenticidad
  - sinceridad
  lexicon: BDAG
  rationale: 'Como adjetivo sustantivado con τὸ, γνήσιον pide un sustantivo abstracto: ''genuinidad'' mantiene con claridad la idea de autenticidad real, adecuada para el contraste con una mera apariencia.'
- source_word: δοκιμάζων
  english_pob_choice: I am also testing
  chosen_spanish: también pongo a prueba
  alternatives_spanish:
  - también estoy probando
  - también examino
  - también verifico
  lexicon: BDAG
  rationale: δοκιμάζω puede significar probar, poner a prueba o examinar. 'Pongo a prueba' conserva la fuerza del proceso de comprobación y funciona naturalmente en español con el participio coordinado al verbo principal. 'También' refleja el valor aditivo de καί.
- source_word: καί
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - y también
  - incluso
  lexicon: BDAG
  rationale: 'Aquí καί añade una acción concurrente: además de hablar de la diligencia de otros, Pablo prueba la autenticidad del amor corintio. ''También'' reproduce bien esa adición.'
- source_word: ὑμετέρας
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: BDAG
  rationale: En español bíblico latinoamericano, el posesivo de tercera persona plural puede sonar más natural y reverente en una dirección comunitaria. 'Su' evita la rigidez de 'de ustedes' y no fuerza un registro peninsular de 'vuestro'. Si se prefiere máxima transparencia, 'de ustedes' sería viable.
theological_decisions:
- issue: La fuerza de la negación de un mandato apostólico
  english_pob_reading: Paul explicitly denies issuing an apostolic command and frames his words as a test of the genuineness of the Corinthians' love.
  chosen_spanish_reading: Pablo niega explícitamente que esté hablando como quien da un mandato y enmarca sus palabras como una prueba de la genuinidad del amor corintio.
  alternative_spanish_readings:
  - Pablo suaviza retóricamente un mandato implícito.
  - Pablo no rechaza la autoridad apostólica, solo modera su tono.
  rationale: 'La construcción οὐ κατ’ ἐπιταγὴν λέγω no se debe diluir: el texto mantiene la tensión entre autoridad apostólica y respuesta libre nacida del amor. ''No digo esto como un mandato'' conserva esa negación sin resolverla artificialmente.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT y el rastro de auditoría en inglés POB. No hubo revisiones aplicadas en la última pasada; la redacción española conserva la negación de mandato, el medio expresado por διά, el matiz de σπουδή como intensidad seria, y el valor de δοκιμάζω como prueba de autenticidad.
  spanish_consistency_notes:
  - Se mantuvo 'amor' para ἀγάπη, conforme al criterio del proyecto.
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes; el versículo no contiene el nombre divino.
  - Se optó por 'genuinidad' para conservar el tono abstracto del griego con τὸ + adjetivo.
  - Se prefirió un español sobrio y publicable, sin añadir nombres o especificaciones que el texto no da.
