    text: O ‘como una orden’. ἐπιταγή puede expresar mandato, orden o directriz con autoridad.
    reason: lexical_alternative
  - marker: b
    text: O ‘la diligencia de otros’ o ‘el ardor de otros’. σπουδή puede denotar empeño, diligencia o ardor entusiasta, según el contexto.
    reason: lexical_alternative
  - marker: c
    text: O ‘pruebo’ o ‘examino’ la autenticidad del amor de ustedes. δοκιμάζω expresa comprobación por medio de prueba.
    reason: lexical_alternative
  revision_rationale: 'La revisión afina tres puntos: (1) cambia ''fervor'' por ''empeño'' para reflejar mejor σπουδή según el audit trail inglés; (2) sustituye ''genuinidad'' por ''autenticidad'', que es más natural en español y conserva el sentido de γνήσιον; y (3) aclara ''su amor'' como ''el amor de ustedes''. También se corrige la nota de δοκιμάζω para que ofrezca alternativas genuinas y se añade una nota léxica en el punto de σπουδή, donde el inglés POB preservó alternativas significativas.'
