translation:
  language: es
  text: Así que instamos a Tito[a] a que, así como antes había comenzado, también completara entre ustedes esta obra de gracia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta gracia»; también puede traducirse «este acto de gracia».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρακαλέσαι
  english_pob_choice: urged
  chosen_spanish: exhortamos
  alternatives_spanish:
  - rogamos
  - instamos
  - animamos
  lexicon: BDAG
  rationale: παρακαλέω aquí expresa una acción de apremiar a Tito para que actuara. «Exhortamos» conserva bien esa fuerza exhortativa sin volverse demasiado coloquial, y en español puede abarcar tanto ruego como apremio según el contexto.
- source_word: Τίτον
  english_pob_choice: Titus
  chosen_spanish: Tito
  alternatives_spanish:
  - Titus
  lexicon: Nombre propio
  rationale: Se usa la forma española usual del nombre propio, transparente y reconocible en lectura eclesial.
- source_word: καθὼς προενήρξατο
  english_pob_choice: just as he had previously begun
  chosen_spanish: así como antes había comenzado
  alternatives_spanish:
  - tal como había comenzado antes
  - como ya había comenzado
  lexicon: BDAG
  rationale: El verbo compuesto comunica inicio anterior; «antes había comenzado» conserva la prioridad temporal sin sonar forzado en español.
- source_word: ἐπιτελέσῃ
  english_pob_choice: should also complete
  chosen_spanish: también completara
  alternatives_spanish:
  - también llevara a término
  - también terminara
  lexicon: BDAG
  rationale: El subjuntivo aoristo en la cláusula de propósito expresa la intención de llevar algo a su término. «Completara» mantiene esa idea de finalización adecuada al contexto de la colecta.
- source_word: εἰς ὑμᾶς
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - con ustedes
  - en medio de ustedes
  - para ustedes
  lexicon: BDAG
  rationale: Con personas, εἰς puede indicar actividad dirigida hacia o realizada en el ámbito de la comunidad. «Entre ustedes» comunica de manera natural que la acción se desarrollaba en la comunidad corintia.
- source_word: χάριν
  english_pob_choice: act of grace
  chosen_spanish: esta gracia
  alternatives_spanish:
  - este acto de gracia
  - esta obra de gracia
  - este servicio de gracia
  lexicon: BDAG
  rationale: En 2 Corintios 8 χάρις tiene el sentido concreto de la colecta/ministerio generoso, pero en español «esta gracia» preserva el término cargado teológicamente y permite mantener la tensión entre gracia divina y acción concreta. Se evita forzar una perífrasis que opaque el vocabulario paulino.
theological_decisions:
- issue: Sentido concreto de χάρις en la colecta
  english_pob_reading: grace refers to the gracious ministry/contribution rather than abstract divine grace alone.
  chosen_spanish_reading: «gracia» se conserva como término central, con referencia concreta a la colecta/ministerio generoso.
  alternative_spanish_readings:
  - acto de gracia
  - obra de gracia
  - servicio de gracia
  rationale: El contexto inmediato habla de la administración de la colecta para los santos. Mantener «gracia» preserva la forma de hablar de Pablo y la tensión teológica entre gracia y generosidad concreta, sin disolverla en una explicación interpretativa excesiva.
  doctrine_reference: 2 Corintios 8:1-7; 2 Corintios 9:8
translation_notes:
  revision_awareness: El inglés POB optó por «act of grace» para explicitar el sentido concreto de χάρις en la colecta. En español se decidió conservar «gracia» en el texto principal para respetar el término paulino y la posible tensión teológica, dejando la alternativa explicativa en nota.
  spanish_consistency_notes:
  - Se mantiene «gracia» para χάρις conforme al vocabulario paulino del capítulo.
  - «Exhortamos» refleja mejor el tono de παρακαλέω en este contexto que un simple «animamos».
  - «Entre ustedes» traduce naturalmente εἰς ὑμᾶς con referencia comunitaria.
  - Se usa el pretérito pluscuamperfecto «había comenzado» para reproducir la anterioridad del verbo compuesto.
