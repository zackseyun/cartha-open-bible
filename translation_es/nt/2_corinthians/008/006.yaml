review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis general del griego: la exhortación a Tito, el paralelo ''así como... así también'', el matiz temporal de προενήρξατο, y el sentido comunitario de εἰς ὑμᾶς como actividad realizada entre la congregación. Sin embargo, la elección principal para χάρις (''esta gracia'') no preserva suficientemente el sentido concreto documentado en el contexto de la colecta; en español suena demasiado abstracto sin apoyo inmediato.'
  spanish_quality_summary: El español es claro y natural, pero 'exhortamos' suena algo más formal y menos idiomático que 'instamos' o 'urgimos' en este contexto. Además, 'esta gracia' resulta ambiguo y menos legible para lectores eclesiales comunes. Una leve revisión mejora fidelidad y claridad sin perder el lenguaje paulino.
  glossary_alignment: No hay conflictos con terminología mayor del proyecto. La decisión problemática no es de glosario fijo, sino del tratamiento contextual de χάρις. Dado el razonamiento auditado en inglés, conviene explicitar 'obra de gracia' o 'acto de gracia' en el texto principal, dejando 'esta gracia' como alternativa más literal en nota.
  issues:
  - severity: medium
    issue: '''esta gracia'' para χάριν en el texto principal'
    rationale: Aunque es más literal, no comunica con suficiente claridad el sentido concreto de la colecta/ministerio generoso que el expediente inglés documenta como central en 2 Corintios 8. En español contemporáneo eclesial, 'esta gracia' se lee fácilmente como gracia abstracta.
  - severity: low
    issue: '''exhortamos'' puede sonar algo rígido'
    rationale: παρακαλέσαι aquí implica apremiar o instar a Tito. 'Exhortamos' es defendible, pero 'instamos' refleja mejor la fuerza práctica y suena más natural en español actual.
  revised_spanish_text: Así que instamos a Tito[a] a que, así como antes había comenzado, también completara entre ustedes esta obra de gracia.
  revised_footnotes:
  - marker: a
    text: O «esta gracia»; también puede traducirse «este acto de gracia».
    reason: lexical_alternative
