revisions:
- from: Así que exhortamos a Tito[a] que, así como antes había comenzado, también completara entre ustedes esta gracia.
  to: Así que instamos a Tito[a] a que, así como antes había comenzado, también completara entre ustedes esta obra de gracia.
  rationale: Se cambia 'exhortamos' por 'instamos' para una fuerza más idiomática y natural en español actual. Se cambia 'esta gracia' por 'esta obra de gracia' para reflejar mejor el valor concreto de χάρις en el contexto de la colecta, en línea con la auditoría inglesa, mientras se conserva la alternativa más literal en nota.
  reviewer_model: gpt-5.4
