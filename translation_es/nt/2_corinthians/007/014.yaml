    text: O «nuestra jactancia acerca de ustedes ante Tito». La frase griega puede expresarse más literalmente como «ante Tito», pero el contexto indica que Pablo se refiere a lo que dijo a Tito acerca de los corintios.
    reason: lexical_alternative
