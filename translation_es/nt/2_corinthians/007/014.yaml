translation:
  language: es
  text: Porque si en algo me he jactado ante Tito acerca de ustedes, no quedé avergonzado; más bien, así como les hablamos todo con verdad, así también nuestra jactancia ante Tito resultó ser verdad.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nuestra jactancia acerca de ustedes ante Tito». La frase griega puede expresarse más literalmente como «ante Tito», pero el contexto indica que Pablo se refiere a lo que dijo a Tito acerca de los corintios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κεκαύχημαι
  english_pob_choice: have boasted
  chosen_spanish: me he jactado
  alternatives_spanish:
  - he alabado de mí mismo
  - me he gloriado
  lexicon: BDAG
  rationale: καυχάομαι en Pablo conserva el matiz de jactancia/boast. En español, «me he jactado» mantiene la fuerza retórica sin volverlo artificial; «me he gloriado» es posible, pero puede sonar más tradicional y menos transparente en el registro actual.
- source_word: οὐ κατῃσχύνθην
  english_pob_choice: I was not put to shame
  chosen_spanish: no quedé avergonzado
  alternatives_spanish:
  - no fui avergonzado
  - no quedé deshonrado
  lexicon: BDAG
  rationale: El pasivo apunta a la vergüenza producida públicamente o demostrada como falsa. «No quedé avergonzado» conserva el valor pasivo y suena natural; «no fui avergonzado» es más literal, pero menos idiomático en español.
- source_word: πάντα ἐν ἀληθείᾳ ἐλαλήσαμεν
  english_pob_choice: we spoke everything to you in truth
  chosen_spanish: hablamos todo con ustedes en verdad
  alternatives_spanish:
  - les hablamos todo con verdad
  - les dijimos todo con sinceridad
  lexicon: BDAG
  rationale: «Todo» mantiene el alcance de πάντα, y «en verdad» se vierte de manera natural como «con ustedes en verdad» / «con verdad». Se evita reducirlo a solo sinceridad, porque ἀλήθεια aquí expresa modo y correspondencia con la realidad.
- source_word: ἡ καύχησις ἡμῶν
  english_pob_choice: our boasting
  chosen_spanish: nuestra jactancia
  alternatives_spanish:
  - nuestro orgullo
  - nuestro motivo de jactancia
  lexicon: BDAG
  rationale: Se preserva la conexión lexical con καυχάομαι mediante «jactancia». «Orgullo» puede suavizar demasiado el término y sugerir otra carga semántica.
- source_word: ἡ ἐπὶ Τίτου
  english_pob_choice: our boasting to Titus
  chosen_spanish: ante Tito
  alternatives_spanish:
  - para Tito
  - con respecto a Tito
  - a Tito
  lexicon: BDAG
  rationale: La preposición ἐπί con genitivo admite un valor relacional que, en este contexto, funciona como referencia a lo dicho en presencia de / en relación con Tito. «Ante Tito» conserva esa orientación y evita añadir demasiado explícitamente un objeto que el contexto ya había establecido.
- source_word: ἀλήθεια ἐγενήθη
  english_pob_choice: proved true
  chosen_spanish: resultó verdad
  alternatives_spanish:
  - se mostró verdadero
  - quedó comprobado como verdadero
  - se hizo verdad
  lexicon: BDAG
  rationale: La expresión idiomática indica validación por la realidad. «Resultó verdad» comunica bien el cumplimiento sin forzar una abstracción poco natural como «se hizo verdad».
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: BDAG
  rationale: Aquí ὅτι introduce una relación explicativa con el contexto previo. «Porque» es fluido y mantiene la conexión discursiva.
theological_decisions:
- issue: Sentido de la jactancia paulina
  english_pob_reading: Rendered as ordinary rhetorical boasting/taking pride, not as sinful arrogance.
  chosen_spanish_reading: Se vierte como jactancia legítima o validada por los hechos, no como arrogancia pecaminosa.
  alternative_spanish_readings:
  - orgullo
  - confianza
  - gloriarse
  rationale: El contexto muestra que Pablo no condena la acción en sí, sino que la presenta como verificada. «Jactancia» conserva la tensión retórica sin moralizar el término en español.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: Se tomó en cuenta el ajuste de revisión que en inglés prefirió acortar la frase equivalente a «our boasting to Titus» por fluidez. En español, «ante Tito» conserva la relación griega sin hacer redundante el objeto ya presentado en la primera cláusula. También se respetó la decisión auditada de mantener el campo semántico de καυχάομαι/καύχησις con un término de jactancia/boast, en vez de suavizarlo a «confianza».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» por norma general, aunque este versículo no lo contiene.
  - Se conserva la red lexical jactarse/jactancia para καυχάομαι/καύχησις.
  - «Verdad» traduce ἀλήθεια de modo consistente con el matiz de correspondencia con la realidad.
  - Se usa «ustedes» para el pronombre plural, en registro neutro latinoamericano.
