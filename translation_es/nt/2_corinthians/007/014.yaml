revisions:
- from: Porque si en algo me he jactado ante él[a] por ustedes, no quedé avergonzado; sino que, así como hablamos todo con ustedes en verdad[b], así también nuestra jactancia ante Tito resultó verdad.
  to: Porque si en algo me he jactado ante Tito acerca de ustedes, no quedé avergonzado; más bien, así como les hablamos todo con verdad, así también nuestra jactancia ante Tito resultó ser verdad.[a]
  rationale: Se corrigen dos giros poco naturales («con ustedes», «resultó verdad»), se aclara el referente de αὐτῷ como Tito, y se reemplaza la nota b por una única nota alineada con la alternativa contextual documentada en la auditoría inglesa. La revisión conserva la fuerza léxica de «jactado / jactancia» y el sentido pasivo de «no quedé avergonzado».
