lexical_decisions:
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: Me alegro
  alternatives_spanish:
  - Me regocijo
  - Me gozo
  lexicon: BDAG
  rationale: El verbo griego expresa una reacción gozosa presente. «Me alegro» comunica bien el sentido verbal en español natural y mantiene el tono relacional de Pablo sin sonar forzado.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - porque
  - que
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la alegría de Pablo. En español, «me alegro de que» es la construcción más natural y preserva el valor completivo de ὅτι sin convertirlo necesariamente en causal.
- source_word: ἐν παντί
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en cada aspecto
  - de todas maneras
  lexicon: BDAG
  rationale: La expresión es adverbial y de alcance amplio. «En todo» conserva la amplitud del griego de manera sobria y natural; «en cada aspecto» explicita más de lo que exige el texto.
- source_word: θαρρῶ
  english_pob_choice: I have confidence
  chosen_spanish: tengo confianza
  alternatives_spanish:
  - estoy confiado
  - tomo ánimo
  - tengo buen ánimo
  lexicon: BDAG
  rationale: En este contexto, θαρρέω expresa confianza asentada respecto de los corintios. «Tengo confianza» refleja bien esa idea en español actual y conserva la fuerza relacional del verbo.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - respecto de ustedes
  - con ustedes
  lexicon: BDAG
  rationale: Aunque el español puede preferir «respecto de ustedes», la opción «en ustedes» sigue más de cerca la preposición griega y mantiene la imagen de confianza puesta en ellos, como en el audit trail inglés.
translation_notes:
  revision_awareness: 'El registro coincide con el pasaje griego y con el audit trail inglés: ὅτι se entiende como introducción del contenido de la alegría, y θαρρῶ como confianza estable. No se detectaron revisiones aplicadas en el expediente inglés; se mantiene una solución equivalente y auditable en español.'
  spanish_consistency_notes:
  - Se preserva la primera persona singular de ambos verbos principales.
  - Se evitó «Cristo»/«Mesías» y terminología teológica no presente en el versículo.
  - La nota alterna recoge la posibilidad causal de ὅτι y el matiz «respecto de ustedes», sin romper la lectura principal.
