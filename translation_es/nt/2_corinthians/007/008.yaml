revisions:
- from: Porque, si bien los entristecí con la carta[a], no me arrepiento; aunque sí me había arrepentido, porque veo que aquella carta los entristeció[b], aunque solo por un tiempo.
  to: Porque, aunque los entristecí con la carta, no lo lamento; aunque sí lo lamenté[a], porque veo que aquella carta los entristeció[b], aunque solo por un tiempo.
  rationale: Se reemplazó «arrepentirse» por «lamentar» para respetar la distinción auditada entre μεταμέλομαι y μετανοέω y evitar una lectura de arrepentimiento moral. También se corrigió la nota [a] para que refleje la alternativa aspectual del imperfecto griego, en vez de introducir la idea no atestiguada de que a Pablo le dolió escribir la carta. El resto del versículo se mantuvo con ajustes mínimos.
