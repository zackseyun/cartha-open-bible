base_translation:
  language: en
  yaml_path: translation/nt/2_corinthians/007/012.yaml
  text: So even if I wrote to you[a], it was not because of the one who did wrong, nor because of the one who was wronged[b], but so that your earnestness for us might be made known among you before God.
  footnotes:
  - marker: a
    text: Some manuscripts read, 'so that our earnestness for you might be made known among you before God.'
    reason: textual_variant
  - marker: b
    text: Or 'your diligence,' 'your zeal,' or 'your deep concern.'
    reason: lexical_alternative
