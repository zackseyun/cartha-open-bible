  revision_rationale: Se cambia 'diligencia' por 'empeño' para reflejar mejor σπουδή en este contexto de seria preocupación o solicitud, manteniendo en nota las demás posibilidades léxicas. Se conserva la estructura y la variante textual del POB. 'Manifiesto' concuerda naturalmente con 'empeño'.
