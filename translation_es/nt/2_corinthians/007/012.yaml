translation:
  language: es
  text: Así que, aunque les escribí[a], no fue por causa del que hizo mal, ni por causa del que fue agraviado[b], sino para que su empeño[c] por nosotros se hiciera manifiesto entre ustedes delante de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos dicen: «para que nuestra diligencia por ustedes se hiciera manifiesta entre ustedes delante de Dios».'
    reason: textual_variant
  - marker: b
    text: O «del injuriado», «del que sufrió la injusticia».
    reason: lexical_alternative
  - marker: c
    text: O «celo», «diligencia», «serio interés».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα εἰ καὶ
  english_pob_choice: So even if
  chosen_spanish: Así que, aunque
  alternatives_spanish:
  - Por tanto, aunque
  - De modo que, aunque
  lexicon: BDAG
  rationale: ἄρα expresa inferencia; en español, 'Así que' conserva la conexión lógica de conclusión. εἰ καὶ aporta concesión; 'aunque' reproduce bien esa fuerza sin sonar forzado.
- source_word: ἔγραψα
  english_pob_choice: I wrote
  chosen_spanish: les escribí
  alternatives_spanish:
  - les he escrito
  - escribí
  lexicon: BDAG
  rationale: El aoristo se entiende naturalmente como pasado simple. Se añade 'les' por el dativo ὑμῖν para mantener la referencia explícita en español.
- source_word: οὐχ ἕνεκεν τοῦ ἀδικήσαντος
  english_pob_choice: it was not because of the one who did wrong
  chosen_spanish: no fue por causa del que hizo mal
  alternatives_spanish:
  - no fue por causa del que cometió la injusticia
  - no fue por el culpable
  lexicon: BDAG
  rationale: ἕνεκεν expresa causa o motivo; 'por causa de' es una equivalencia clara. El participio sustantivado ἀδικήσαντος se rinde como 'el que hizo mal' para preservar la referencia personal sin sobrerrefinarlo como término técnico.
- source_word: οὐδὲ ἕνεκεν τοῦ ἀδικηθέντος
  english_pob_choice: nor because of the one who was wronged
  chosen_spanish: ni por causa del que fue agraviado
  alternatives_spanish:
  - ni por causa del que sufrió la injusticia
  - ni por causa del agraviado
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la frase anterior. 'Agraviado' comunica bien el pasivo ἀδικηθέντος y suena natural en español bíblico actual.
- source_word: ἀλλ’ ἕνεκεν τοῦ φανερωθῆναι
  english_pob_choice: but so that ... might be made known
  chosen_spanish: sino para que ... se hiciera manifiesta
  alternatives_spanish:
  - sino para que ... se diera a conocer
  - sino con el fin de que ... fuera manifiesta
  lexicon: BDAG
  rationale: El infinitivo articular con ἕνεκεν indica propósito. 'Para que ... se hiciera manifiesta' conserva la finalidad y refleja bien el matiz pasivo/de manifestación de φανερωθῆναι.
- source_word: τὴν σπουδὴν ὑμῶν
  english_pob_choice: your earnestness
  chosen_spanish: su diligencia
  alternatives_spanish:
  - su celo
  - su empeño
  - su earnestness
  lexicon: BDAG
  rationale: σπουδή puede significar diligencia, celo o seriedad. 'Diligencia' es el término más equilibrado en español para esta combinación de esfuerzo y seriedad, y evita cargar el versículo con un matiz excesivamente emocional.
- source_word: τὴν ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - a favor de nosotros
  - en favor de nosotros
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa relación favorable o en beneficio de. 'Por nosotros' es breve, natural y compatible con el flujo de la frase en español.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - ante ustedes
  - para ustedes
  - en su presencia
  lexicon: BDAG
  rationale: Se sigue la revisión inglesa que prefirió 'among you' para captar el contexto de manifestación ante el grupo. 'Entre ustedes' refleja mejor el alcance comunitario de πρὸς ὑμᾶς en este versículo.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - ante Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' conserva el tono solemne y es una equivalencia española estable para la fórmula de testimonio/presencia divina.'
theological_decisions:
- issue: Relación entre 'su diligencia ... entre ustedes' y la variante manuscrita 'nuestra diligencia por ustedes'
  english_pob_reading: The verse follows the printed text but preserves the alternative manuscript reading in a footnote.
  chosen_spanish_reading: La lectura principal mantiene 'su diligencia por nosotros' y la ubicación comunitaria 'entre ustedes'; la variante se preserva en nota.
  alternative_spanish_readings:
  - '''nuestra diligencia por ustedes'''
  - '''nuestro empeño por ustedes'''
  rationale: El griego impreso de SBLGNT tiene una sintaxis difícil; la versión española sigue esa forma y, como hace el audit trail inglés, conserva la variante textual en nota en vez de resolverla dentro del cuerpo del texto.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
- issue: Sentido de πρὸς ὑμᾶς
  english_pob_reading: The latest revision prefers 'among you' to better reflect the phrase in context.
  chosen_spanish_reading: '''entre ustedes'''
  alternative_spanish_readings:
  - '''a ustedes'''
  - '''delante de ustedes'''
  - '''en ustedes'''
  rationale: La preposición griega puede indicar referencia/dirección hacia la audiencia, pero en este contexto el resultado es que el asunto se hace público dentro del grupo. 'Entre ustedes' capta mejor el matiz relacional y comunitario que 'a ustedes'.
  doctrine_reference: Translation philosophy §2, Preserve context-sensitive nuance
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que cambió 'to you' por 'among you' para πρὸς ὑμᾶς. En español se siguió esa decisión con 'entre ustedes', mientras se mantuvo la lectura principal del texto impreso y la nota de variante manuscrita.
  spanish_consistency_notes:
  - Se usó 'Dios' para θεοῦ conforme al estándar del proyecto.
  - Se evitó 'SEÑOR' porque el versículo no contiene el nombre divino ni un κύριος relevante.
  - Se prefirió 'por nosotros' para ὑπὲρ ἡμῶν y no una expresión litúrgica más cargada.
  - Se mantuvo 'diligencia' como traducción principal de σπουδή para conservar la amplitud semántica sin forzar 'celo' en el texto principal.
