revisions:
- from: Tengo mucha confianza[a] en ustedes, y mucho de qué gloriarme[b] por ustedes; estoy lleno de consuelo[c], y sobreabundo de gozo en toda nuestra aflicción[d].
  to: Tengo mucha franqueza[a] para con ustedes, y mucho de qué gloriarme[b] por ustedes. Estoy lleno de consuelo[c]; reboso de gozo en toda nuestra aflicción[d].
  rationale: Se ajusta παρρησία a «franqueza» para reflejar mejor el valor principal documentado, dejando «confianza» como alternativa en nota. Se mantiene «gloriarme» por la justificación teológica ya documentada, y se conserva la nota de alternativa. Se sustituye «sobreabundo» por «reboso» por mayor naturalidad en español. Se preservan «consuelo» y «en toda nuestra aflicción», que representan bien el griego y el audit trail.
  reviewer_model: gpt-5.4
