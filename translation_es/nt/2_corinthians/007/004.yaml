translation:
  language: es
  text: Tengo mucha franqueza[a] para con ustedes, y mucho de qué gloriarme[b] por ustedes. Estoy lleno de consuelo[c]; reboso de gozo en toda nuestra aflicción[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confianza». El griego παρρησία también puede transmitir apertura franca al hablar.
    reason: lexical_alternative
  - marker: b
    text: O «jactarme». Aquí καύχησις conserva un sentido positivo y paulino, no de soberbia.
    reason: lexical_alternative
  - marker: c
    text: O «aliento» o «consolación». El griego παράκλησις incluye tanto consuelo como fortalecimiento.
    reason: lexical_alternative
  - marker: d
    text: O «a pesar de toda nuestra aflicción». El griego puede entenderse como gozo que desborda en medio del sufrimiento continuo.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησία
  english_pob_choice: boldness
  chosen_spanish: confianza
  alternatives_spanish:
  - franqueza
  - audacia
  - valentía
  lexicon: BDAG
  rationale: En este contexto, παρρησία expresa una seguridad abierta y confiada hacia los corintios. «Confianza» es natural en español y conserva el matiz relacional; «franqueza» queda como alternativa porque la palabra también puede incluir libertad para hablar con apertura.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: toward you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - hacia ustedes
  - para con ustedes
  - ante ustedes
  lexicon: BDAG
  rationale: La preposición πρός con acusativo marca orientación o relación. «En ustedes» fluye mejor en español y comunica esa relación directa sin forzar una imagen espacial demasiado literal; «hacia ustedes» es una alternativa más cercana al griego.
- source_word: καύχησις
  english_pob_choice: boasting
  chosen_spanish: gloriarme
  alternatives_spanish:
  - boast
  - jactancia
  - orgullo
  lexicon: BDAG
  rationale: En Pablo, καύχησις puede ser un motivo legítimo de jactancia o gloria. En español, «gloriarme» conserva mejor el sentido positivo y paulino que «orgullo», que suena más fácilmente peyorativo; «boast» se evita por no ser natural en un texto bíblico en español.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: on your behalf
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - a favor de ustedes
  - acerca de ustedes
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede significar «por», «en favor de» o «acerca de». «Por ustedes» es breve y natural en español, y mantiene la referencia representativa sin sobreexplicar.
- source_word: πεπλήρωμαι
  english_pob_choice: I am filled
  chosen_spanish: estoy lleno
  alternatives_spanish:
  - he sido llenado
  - estoy colmado
  - me hallo lleno
  lexicon: BDAG
  rationale: El perfecto pasivo describe un estado presente resultante. «Estoy lleno» comunica ese estado de manera idiomática en español; «estoy colmado» sería posible pero menos directo.
- source_word: παρακλήσει
  english_pob_choice: encouragement
  chosen_spanish: consuelo
  alternatives_spanish:
  - aliento
  - ánimo
  - consolación
  lexicon: BDAG
  rationale: παράκλησις incluye consuelo, consolación y fortalecimiento. En este contexto de aflicción y gozo, «consuelo» mantiene bien el aspecto de alivio y sostiene la tensión con el sufrimiento; «aliento» queda como alternativa si se desea destacar el fortalecimiento.
- source_word: ὑπερπερισσεύομαι
  english_pob_choice: I overflow
  chosen_spanish: sobreabundo
  alternatives_spanish:
  - reboso
  - abundo muchísimo
  - desbordo
  lexicon: BDAG
  rationale: El verbo intensivo expresa abundancia desbordante. «Sobreabundo» conserva la fuerza léxica y suena más elevado que «reboso», sin perder la imagen de exceder en medida.
- source_word: χαρᾷ
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - regocijo
  lexicon: BDAG
  rationale: Χαρά puede traducirse como «gozo» o «alegría». Aquí «gozo» encaja bien con el tono paulino y con el contraste de aflicción; «alegría» sería igualmente válida, pero algo más cotidiana.
- source_word: ἐπὶ πάσῃ τῇ θλίψει ἡμῶν
  english_pob_choice: in all our affliction
  chosen_spanish: en toda nuestra aflicción
  alternatives_spanish:
  - a pesar de toda nuestra aflicción
  - en medio de toda nuestra aflicción
  - sobre toda nuestra aflicción
  lexicon: BDAG
  rationale: θλῖψις es «aflicción», «tribulación» o «presión». «En toda nuestra aflicción» preserva la coexistencia de gozo y sufrimiento sin convertir la frase en una paráfrasis adversativa; «en medio de» es una alternativa explicativa. La preposición ἐπί con dativo admite esta lectura de esfera o circunstancia.
- source_word: πολλή ... πολλή
  english_pob_choice: great ... great
  chosen_spanish: mucha ... mucho
  alternatives_spanish:
  - gran ... gran
  - muy grande ... muy grande
  - abundante ... abundante
  lexicon: BDAG
  rationale: La repetición de πολύς enfatiza abundancia. En español, «mucha ... mucho» conserva la repetición y resulta más natural con los sustantivos «confianza» y «de qué gloriarme» que una repetición de «gran», que sonarían menos idiomática aquí.
theological_decisions:
- issue: Mantener el valor paulino positivo de καύχησις sin volverlo arrogancia
  english_pob_reading: Translate καύχησις as 'boasting' rather than softening to 'pride'
  chosen_spanish_reading: Traducir καύχησις con «gloriarme», manteniendo un sentido positivo y paulino, no de soberbia
  alternative_spanish_readings:
  - jactancia
  - orgullo
  - boast
  rationale: Pablo usa el lenguaje de la «gloria» o «jactancia» de manera legítima y relacional. «Gloriarme» preserva ese matiz en español sin cargarlo automáticamente con el sentido moral negativo de «orgullo».
  doctrine_reference: Translation philosophy §1, §5
- issue: Preservar la tensión entre gozo y sufrimiento
  english_pob_reading: Render ἐπὶ πάσῃ τῇ θλίψει ἡμῶν as 'in all our affliction'
  chosen_spanish_reading: Traducirlo como «en toda nuestra aflicción»
  alternative_spanish_readings:
  - a pesar de toda nuestra aflicción
  - en medio de toda nuestra aflicción
  rationale: La cláusula presenta el gozo como abundante en la esfera misma de la aflicción. «En toda nuestra aflicción» conserva esa coexistencia sin suavizarla ni resolverla prematuramente.
  doctrine_reference: Translation philosophy §3
- issue: Elegir un equivalente español para παράκλησις que conserve consuelo y fortalecimiento
  english_pob_reading: '''encouragement'' with footnote allowing ''comfort'''
  chosen_spanish_reading: «consuelo» con nota que admite «aliento» o «consolación»
  alternative_spanish_readings:
  - aliento
  - consolación
  - ánimo
  rationale: En este contexto pastoral, παράκλησις abarca tanto alivio como fortalecimiento. «Consuelo» comunica bien el efecto recibido, y la nota preserva la amplitud semántica del término griego.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el criterio auditado del POB inglés, con una única adaptación estilística en español: «en ustedes» para πρὸς ὑμᾶς y «sobreabundo» para ὑπερπερισσεύομαι, manteniendo el contraste entre gozo y aflicción. No se detectaron cambios de revisión posteriores que obliguen a modificar la lectura base.'
  spanish_consistency_notes:
  - Se mantiene Yahvé/Jesús/Dios donde no aplica en este versículo, sin introducir terminología no presente.
  - «Gozo» se usa como equivalente digno de χαρά; no se sustituye por «alegría» para conservar el registro paulino.
  - «Gloriarme» expresa καύχησις sin neutralizar su valor retórico positivo.
  - Los marcadores de nota a, b, c, d aparecen anclados directamente en el texto en los puntos ambiguos relevantes.
