revisions:
- from: Porque la tristeza según Dios produce arrepentimiento para salvación sin arrepentimiento[a][b], pero la tristeza del mundo produce muerte.
  to: Porque la tristeza según Dios produce arrepentimiento para salvación sin lamentarlo[a][b], pero la tristeza del mundo produce muerte.
  rationale: Se reemplaza solo la expresión problemática «sin arrepentimiento» por «sin lamentarlo» para comunicar correctamente ἀμεταμέλητον en español y evitar confundirla con μετάνοιαν. Se conservan el orden general, el paralelismo y las alternativas del POB inglés, con una leve mejora de estilo en la nota a.
