translation:
  language: es
  text: Porque la tristeza según Dios produce arrepentimiento para salvación sin lamentarlo[a][b], pero la tristeza del mundo produce muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tristeza según Dios». La frase griega es más literalmente «tristeza según Dios».
    reason: lexical_alternative
  - marker: b
    text: O «un arrepentimiento que no debe lamentarse y que lleva a salvación». El adjetivo puede entenderse más directamente como cualificador del arrepentimiento.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ θεὸν
  english_pob_choice: godly
  chosen_spanish: según Dios
  alternatives_spanish:
  - piadosa
  - conforme a Dios
  - de acuerdo con Dios
  lexicon: BDAG
  rationale: El giro preposicional modifica a λύπη y expresa una tristeza medida o conforme a Dios. En español, «según Dios» conserva esa relación sin recurrir a un adjetivo interpretativo que suavice el contraste con «del mundo». Se deja visible la lectura alternativa más literal que la nota inglesa preserva.
- source_word: λύπη
  english_pob_choice: sorrow
  chosen_spanish: tristeza
  alternatives_spanish:
  - dolor
  - pena
  - aflicción
  lexicon: BDAG
  rationale: «Tristeza» es natural y claro en español para este estado emocional y moral, y funciona bien en ambos miembros del paralelismo. «Aflicción» o «pena» podrían ser posibles, pero «tristeza» conserva mejor el contraste directo con «del mundo».
- source_word: μετάνοιαν
  english_pob_choice: repentance
  chosen_spanish: arrepentimiento
  alternatives_spanish:
  - cambio de mente
  - cambio de pensamiento
  - penitencia
  lexicon: BDAG
  rationale: En este contexto paulino, el término no es solo reconsideración mental sino un giro moral y espiritual. «Arrepentimiento» es el equivalente español más establecido y fiel; «cambio de mente» sería más analítico, pero menos natural y menos preciso para el uso bíblico aquí.
- source_word: εἰς σωτηρίαν
  english_pob_choice: leading to salvation
  chosen_spanish: para salvación
  alternatives_spanish:
  - que conduce a salvación
  - llevando a salvación
  - resultando en salvación
  lexicon: BDAG
  rationale: La preposición εἰς indica meta o resultado. «Para salvación» mantiene esa orientación de manera natural en español y evita precisar de más el mecanismo causal. En una frase más expansiva podría decirse «que conduce a salvación», pero el ritmo del paralelismo favorece la forma breve.
- source_word: ἀμεταμέλητον
  english_pob_choice: without regret
  chosen_spanish: sin arrepentimiento
  alternatives_spanish:
  - sin remordimiento
  - que no debe lamentarse
  - no lamentable
  lexicon: BDAG
  rationale: La palabra puede calificar tanto el arrepentimiento como todo el proceso que lleva a la salvación. En español, «sin arrepentimiento» conserva la ambigüedad del griego y resulta más natural que «sin regret» literal; además mantiene el vínculo semántico con μετάνοια/μεταμέλητος. Se reconoce, sin resolverla, la tensión entre «arrepentimiento» y «no lamentado».
- source_word: ἐργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - obra
  - obra como resultado
  - origina
  lexicon: BDAG
  rationale: «Produce» expresa bien la idea de causar o efectuar un resultado y preserva el paralelismo con «produce muerte» en la segunda cláusula. «Obra» sería posible, pero en español puede sonar menos directo aquí.
- source_word: τοῦ κόσμου
  english_pob_choice: worldly
  chosen_spanish: del mundo
  alternatives_spanish:
  - mundana
  - del siglo
  - del sistema del mundo
  lexicon: BDAG
  rationale: El genitivo tiene fuerza adjetival y contrasta con «según Dios». La forma «del mundo» mantiene la relación más literal y deja que el contraste retórico haga su trabajo; «mundana» sería más interpretativa.
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: muerte
  alternatives_spanish:
  - fallecimiento
  - destrucción
  - ruina
  lexicon: BDAG
  rationale: El sustantivo debe permanecer simple. «Muerte» conserva la amplitud del griego sin especificar si el alcance es físico, espiritual o final, lo cual el contexto no define de modo cerrado.
- source_word: κατεργάζεται
  english_pob_choice: produces
  chosen_spanish: produce
  alternatives_spanish:
  - origina
  - obra
  - lleva a cabo
  lexicon: BDAG
  rationale: 'Aunque el verbo tiene un matiz algo más intenso que ἐργάζεται, aquí el paralelismo favorece la misma solución en ambas mitades: «produce». Eso preserva la oposición retórica entre los dos tipos de tristeza.'
theological_decisions:
- issue: Relación entre tristeza, arrepentimiento y salvación
  english_pob_reading: godly sorrow produces repentance leading to salvation without regret
  chosen_spanish_reading: la tristeza según Dios produce arrepentimiento para salvación sin arrepentimiento
  alternative_spanish_readings:
  - la tristeza según Dios produce arrepentimiento que lleva a salvación sin remordimiento
  - la tristeza conforme a Dios produce arrepentimiento para salvación no lamentada
  rationale: La cláusula griega no debe resolverse demasiado rápido. El adjetivo ἀμεταμέλητον puede referirse al arrepentimiento o al resultado completo, y la traducción española mantiene esa ambigüedad. Así se preserva la tensión textual sin fijar una formulación doctrinal más estrecha que la del versículo.
  doctrine_reference: Preservar la tensión semántica del texto; no definir de más la mecánica de la salvación.
- issue: Alcance de la muerte producida por la tristeza del mundo
  english_pob_reading: but worldly sorrow produces death
  chosen_spanish_reading: pero la tristeza del mundo produce muerte
  alternative_spanish_readings:
  - pero la tristeza mundana produce muerte
  - pero la tristeza del mundo produce muerte espiritual
  rationale: El texto habla de «muerte» sin especificación. La versión española conserva esa amplitud, evitando decidir si el énfasis es físico, espiritual o escatológico. Esto sigue la pauta de la POB inglesa de preservar la ambigüedad donde el griego no la resuelve.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La base inglesa fue revisada desde «a change of mind» a «repentance» para μετάνοιαν. En esta versión española se sigue esa revisión y se evita retroceder a una paráfrasis analítica. También se respeta la nota inglesa sobre ἀμεταμέλητον, manteniendo la ambigüedad entre modificar «arrepentimiento» o el complejo «arrepentimiento para salvación».
  spanish_consistency_notes:
  - Se eligió «según Dios» para reflejar el valor relacional de κατὰ θεόν sin introducir una adaptación doctrinal innecesaria.
  - Se mantuvo «del mundo» en paralelo con «según Dios» para conservar el contraste retórico del griego.
  - Se prefirió «arrepentimiento» en lugar de «cambio de mente», siguiendo la revisión auditada de la POB inglesa.
  - Se usó «produce» en ambas cláusulas para preservar el paralelismo verbal de ἐργάζεται / κατεργάζεται.
  - No se especificó el tipo de muerte, en coherencia con la lectura auditada que preserva la amplitud del término.
