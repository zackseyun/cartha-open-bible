translation:
  language: es
  text: Pero Dios, que consuela a los humildes[a], nos consoló con la llegada[b] de Tito.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los abatidos» o «los humildes de condición».
    reason: lexical_alternative
  - marker: b
    text: O «con la presencia de Tito».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca contraste con la aflicción previa. «Pero» es la conjunción adversativa más natural y sobria en español bíblico contemporáneo.
- source_word: ὁ παρακαλῶν
  english_pob_choice: who comforts
  chosen_spanish: que consuela
  alternatives_spanish:
  - que anima
  - que conforta
  lexicon: BDAG
  rationale: El participio sustantivado describe a Dios por su acción característica. «Consuela» preserva el vínculo léxico con el verbo posterior y encaja con el contexto de alivio y ánimo en la carta.
- source_word: τοὺς ταπεινοὺς
  english_pob_choice: the humble
  chosen_spanish: a los humildes
  alternatives_spanish:
  - a los abatidos
  - a los bajos de ánimo
  - a los bajos
  lexicon: BDAG
  rationale: ταπεινός puede referirse a humildes o a los humillados/abatidos. «Los humildes» conserva el rango semántico amplio sin cerrar indebidamente el sentido a una sola condición emocional.
- source_word: παρεκάλεσεν
  english_pob_choice: comforted
  chosen_spanish: nos consoló
  alternatives_spanish:
  - nos animó
  - nos confortó
  lexicon: BDAG
  rationale: El aoristo retoma la raíz de παρακαλέω. «Consoló» mantiene la conexión léxica con «consuela» y suena natural en español para el alivio recibido por la venida de Tito.
- source_word: ἐν τῇ παρουσίᾳ
  english_pob_choice: by the coming
  chosen_spanish: con la llegada
  alternatives_spanish:
  - por la presencia
  - al venir
  lexicon: BDAG
  rationale: παρουσία puede significar presencia, llegada o venida. Aquí el matiz eventivo de la llegada de Tito es el más probable y el más claro en español.
- source_word: Τίτου
  english_pob_choice: of Titus
  chosen_spanish: de Tito
  alternatives_spanish:
  - de Tito
  lexicon: BDAG
  rationale: Nombre propio transliterado de forma estándar en español bíblico.
theological_decisions:
- issue: Alcance de τοὺς ταπεινοὺς en el contexto
  english_pob_reading: the humble
  chosen_spanish_reading: los humildes
  alternative_spanish_readings:
  - los abatidos
  - los humillados
  - los bajos de ánimo
  rationale: La frase puede describir a personas humildes en disposición o a quienes han sido abatidos por circunstancias. Mantener «los humildes» conserva la tensión semántica sin resolverla prematuramente hacia una sola lectura psicológica.
  doctrine_reference: Preservar la tensión lexical y contextual en lugar de estrechar indebidamente el sentido.
- issue: ἐν τῇ παρουσίᾳ como presencia o llegada
  english_pob_reading: by the coming of Titus
  chosen_spanish_reading: con la llegada de Tito
  alternative_spanish_readings:
  - por la presencia de Tito
  - al llegar Tito
  rationale: El griego permite presencia o llegada. Dado el contexto narrativo, la llegada de Tito explica mejor el alivio experimentado; aun así, la nota mantiene la alternativa de presencia.
  doctrine_reference: Evitar fijar un solo matiz cuando el término griego conserva ambigüedad legítima.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el análisis auditado en inglés, conservando la relación léxica entre παρακαλῶν / παρεκάλεσεν y respetando la ambigüedad de ταπεινούς y παρουσίᾳ sin sobreexplicar el sentido.
  spanish_consistency_notes:
  - Se usa «Dios» sin sustitución reverencial porque el griego tiene ὁ θεός, no κύριος.
  - Se mantiene «consuela/consoló» para conservar el paralelismo verbal de παρακαλέω.
  - «Llegada» comunica el valor eventivo de παρουσία en este contexto, sin excluir la lectura alternativa de «presencia».
  - La puntuación sigue el estilo español bíblico moderno con coma explicativa tras «Dios».
