translation:
  language: es
  text: Porque aun cuando llegamos a Macedonia, nuestra carne no tuvo descanso[a], sino que en todo fuimos afligidos—conflictos por fuera, temores por dentro—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nosotros mismos no tuvimos descanso». El griego dice literalmente «nuestra carne», una expresión para la debilidad y la angustia propias de nuestra condición humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: Καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Y en verdad
  - Pues aun
  lexicon: BDAG
  rationale: La combinación introduce explicación con énfasis, vinculando este versículo con el anterior. «Porque aun» conserva la conexión causal y el matiz enfático sin sonar forzado en español.
- source_word: ἐλθόντων ἡμῶν εἰς Μακεδονίαν
  english_pob_choice: when we came into Macedonia
  chosen_spanish: cuando llegamos a Macedonia
  alternatives_spanish:
  - cuando entramos en Macedonia
  - después de que llegamos a Macedonia
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte temporalmente. «Llegamos a Macedonia» es natural en español y conserva el valor de εἰς sin perder claridad.
- source_word: οὐδεμίαν ἔσχηκεν ἄνεσιν
  english_pob_choice: had no rest
  chosen_spanish: no tuvo descanso
  alternatives_spanish:
  - no tuvo alivio
  - no tuvo sosiego
  lexicon: BDAG
  rationale: ἄνεσις puede significar alivio, descanso o descanso de una presión. «No tuvo descanso» comunica bien la ausencia de alivio y mantiene el tono idiomático del contexto.
- source_word: ἡ σὰρξ ἡμῶν
  english_pob_choice: our flesh
  chosen_spanish: nuestra carne
  alternatives_spanish:
  - nosotros mismos
  - nuestro cuerpo
  lexicon: BDAG
  rationale: Se conserva el valor literal de σάρξ como «carne», siguiendo la decisión POB de no suavizarlo a «naturaleza humana» aquí. En español, «nuestra carne» mantiene la textura del original y la referencia a la debilidad corporal y existencial.
- source_word: ἀλλ’ ἐν παντὶ θλιβόμενοι
  english_pob_choice: but we were afflicted in every way
  chosen_spanish: sino que en todo fuimos afligidos
  alternatives_spanish:
  - pero en todo fuimos atribulados
  - sino que en todo estábamos oprimidos
  lexicon: BDAG
  rationale: θλιβόμενοι expresa presión, aflicción o tribulación. «Fuimos afligidos» es claro y solemne; «en todo» conserva el alcance total de ἐν παντί.
- source_word: ἔξωθεν μάχαι
  english_pob_choice: conflicts on the outside
  chosen_spanish: por fuera, conflictos
  alternatives_spanish:
  - conflictos externos
  - por fuera, luchas
  lexicon: BDAG
  rationale: μάχαι puede referirse a disputas o enfrentamientos. La colocación «por fuera» reproduce bien el contraste con «por dentro» y evita sugerir solo combate literal.
- source_word: ἔσωθεν φόβοι
  english_pob_choice: fears on the inside
  chosen_spanish: por dentro, temores
  alternatives_spanish:
  - temores internos
  - por dentro, miedos
  lexicon: BDAG
  rationale: φόβοι son temores o ansiedades. «Por dentro» mantiene el paralelismo con «por fuera» y hace natural el contraste retórico del versículo.
theological_decisions:
- issue: Rendering of σάρξ
  english_pob_reading: our flesh
  chosen_spanish_reading: nuestra carne
  alternative_spanish_readings:
  - nosotros mismos
  - nuestro cuerpo
  rationale: La guía doctrinal de POB distingue usos literales de σάρξ frente a usos metafóricos. Aquí no se trata de «naturaleza pecaminosa», sino de una referencia concreta a la debilidad y el agobio de la existencia encarnada; por eso se conserva «carne» en el texto principal, con la posibilidad idiomática indicada en nota.
  doctrine_reference: 'DOCTRINE.md: contested terms — σάρξ'
translation_notes:
  revision_awareness: La revisión más reciente del texto base no introdujo cambios y el cotejo final mostró alta concordancia; por eso no se requieren ajustes de sentido adicionales. Se mantiene la decisión de conservar σάρξ como «carne» y de reflejar el paralelismo externo/interno con «por fuera / por dentro».
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - «Macedonia» se conserva sin artículo, como nombre geográfico propio en español bíblico.
  - El contraste retórico «por fuera / por dentro» se preserva para reflejar la estructura del griego.
  - No se reemplaza «carne» por una paráfrasis doctrinal, en coherencia con la terminología POB.
