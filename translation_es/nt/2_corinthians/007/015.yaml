translation:
  language: es
  text: Y su cariño[a] hacia ustedes es aún mayor, al recordar la obediencia de todos ustedes, cómo lo recibieron con temor y temblor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «afecto»; la expresión griega σπλάγχνα alude literalmente a las entrañas, pero aquí funciona como un modismo de profundo cariño o afecto.
    reason: lexical_alternative
  - marker: b
    text: O «con reverencia y temblor»; la expresión «temor y temblor» es un modismo paulino para una respuesta seria, humilde y reverente.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπλάγχνα
  english_pob_choice: affection
  chosen_spanish: cariño
  alternatives_spanish:
  - afecto
  - ternura
  - entrañas
  lexicon: BDAG
  rationale: En este contexto, σπλάγχνα es idiomático y expresa afecto profundo; «cariño» comunica cercanía afectiva en español moderno sin volver literal de más la imagen corporal. Se evita «entrañas» en el texto principal por sonar demasiado crudo o arcaico, aunque conserva la imagen subyacente.
- source_word: περισσοτέρως
  english_pob_choice: even greater
  chosen_spanish: aún mayor
  alternatives_spanish:
  - todavía mayor
  - más abundante
  - cada vez mayor
  lexicon: BDAG
  rationale: El comparativo intensifica la medida del afecto; «aún mayor» mantiene la comparación de forma natural y clara en español.
- source_word: εἰς ὑμᾶς
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - para ustedes
  - hacia ustedes
  - para todos ustedes
  lexicon: BDAG
  rationale: Con lenguaje de afecto, εἰς marca dirección hacia las personas. «Por ustedes» suena natural en español para expresar el vínculo afectivo; el plural se mantiene claramente con «ustedes».
- source_word: ἀναμιμνῃσκομένου
  english_pob_choice: as he remembers
  chosen_spanish: al recordar
  alternatives_spanish:
  - mientras recuerda
  - cuando recuerda
  - al tener presente
  lexicon: BDAG
  rationale: El participio genitivo expresa circunstancia acompañante. «Al recordar» reproduce esa relación temporal/circunstancial de manera fluida en español.
- source_word: ὑπακοήν
  english_pob_choice: obedience
  chosen_spanish: obediencia
  alternatives_spanish:
  - sumisión
  - respuesta obediente
  - acatamiento
  lexicon: BDAG
  rationale: La acepción principal es «obediencia»; en contexto se refiere a la respuesta de la comunidad a la instrucción apostólica. Se conserva el término directo y transparente.
- source_word: πάντων ὑμῶν
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - cada uno de ustedes
  - ustedes todos
  - todos
  lexicon: BDAG
  rationale: La frase enfatiza la totalidad del grupo. «Todos ustedes» conserva el alcance comunitario de forma clara y natural.
- source_word: μετὰ φόβου καὶ τρόμου
  english_pob_choice: with fear and trembling
  chosen_spanish: con temor y temblor
  alternatives_spanish:
  - con reverencia y temblor
  - con respeto y temblor
  - con temor reverente
  lexicon: BDAG
  rationale: Se preserva la fórmula paulina reconocible y su tensión semántica. «Temor y temblor» mantiene el ritmo y la fuerza del giro sin neutralizarlo.
- source_word: ἐδέξασθε
  english_pob_choice: you received
  chosen_spanish: lo recibieron
  alternatives_spanish:
  - lo acogieron
  - lo aceptaron
  - lo recibieron ustedes
  lexicon: BDAG
  rationale: El aoristo de δέχομαι aquí se refiere a la recepción de Tito. «Recibieron» conserva la amplitud de recibir/acoger/aceptar sin sobreespecificar.
- source_word: αὐτόν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  - a Tito
  - a él mismo
  lexicon: BDAG
  rationale: El pronombre se refiere a Tito por el contexto inmediato. En español, el objeto directo masculino se expresa naturalmente como «lo»; el referente queda claro por el contexto.
theological_decisions:
- issue: Sentido de «temor y temblor» en la recepción de Tito
  english_pob_reading: An expression of reverent seriousness and humble responsiveness, not cringing terror
  chosen_spanish_reading: Una expresión de seriedad reverente y respuesta humilde, no de terror servil
  alternative_spanish_readings:
  - temor literal
  - miedo intenso
  - reverencia y temblor
  rationale: Se conserva el modismo paulino en el texto principal porque su fuerza no debe diluirse. La frase puede implicar reverencia seria más que pánico; la traducción mantiene la tensión y no la resuelve excesivamente.
  doctrine_reference: Mantener la tensión léxica y teológica del modismo paulino; traducción clara y moderna sin borrar su sentido reverente.
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el contexto inglés; la versión española sigue de cerca el sentido auditado del texto griego y conserva las tensiones léxicas relevantes, especialmente σπλάγχνα y la fórmula paulina «temor y temblor».
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se mantiene «temor y temblor» como giro paulino reconocible, sin suavizarlo en el cuerpo principal.
  - Se usa «ustedes» para reflejar el plural comunitario de ὑμᾶς / πάντων ὑμῶν.
  - El pronombre «lo» representa a αὐτόν con claridad contextual y naturalidad en español.
