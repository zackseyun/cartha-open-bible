translation:
  language: es
  text: y no solo por su venida[a], sino también por el consuelo[b] con que fue consolado[b] con respecto a ustedes, al informarnos de su anhelo, de su lamento[c] y de su fervor por mí, de modo que me regocijé todavía más.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por su presencia' para 'por su venida'.
    reason: alternative_reading
  - marker: b
    text: O 'ánimo' para 'consuelo' en ambas ocurrencias de la palabra cognada en el sustantivo y el verbo.
    reason: lexical_alternative
  - marker: c
    text: O 'su lamentación' o 'su duelo' para 'su lamento'.
    reason: lexical_alternative
lexical_decisions:
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto de viaje personal, παρουσία se refiere a la llegada/venida de Tito, no a una presencia abstracta. 'Venida' es natural en español y conserva el sentido eventivo.
- source_word: παρακλήσει / παρεκλήθη
  english_pob_choice: comfort / was comforted
  chosen_spanish: consuelo / fue consolado
  alternatives_spanish:
  - ánimo / fue animado
  - aliento / fue alentado
  lexicon: BDAG
  rationale: Conservo la relación léxica entre el sustantivo y el verbo con la misma familia en español. 'Consuelo' y 'fue consolado' mantienen el tono afectivo del pasaje; 'ánimo' o 'aliento' son posibles, pero desplazan ligeramente el matiz.
- source_word: ἐφ’ ὑμῖν
  english_pob_choice: concerning you
  chosen_spanish: con respecto a ustedes
  alternatives_spanish:
  - acerca de ustedes
  - por causa de ustedes
  lexicon: BDAG
  rationale: La preposición con dativo aquí expresa ocasión o referencia, no simple causalidad. 'Con respecto a ustedes' refleja mejor esa relación y evita sugerir que ustedes causaron el consuelo en sentido estricto.
- source_word: ἀναγγέλλων
  english_pob_choice: as he reported
  chosen_spanish: al informarnos
  alternatives_spanish:
  - al reportarnos
  - mientras nos contaba
  lexicon: BDAG
  rationale: El participio presenta la manera en que llegó la información. 'Al informarnos' es fluido y fiel al valor participial; 'reportar' resulta más técnico en español eclesial contemporáneo.
- source_word: ἐπιπόθησιν
  english_pob_choice: longing
  chosen_spanish: anhelo
  alternatives_spanish:
  - ardiente deseo
  - deseo intenso
  lexicon: BDAG
  rationale: El sustantivo denota un fuerte anhelo. 'Anhelo' preserva esa intensidad sin sonar demasiado técnico o recargado.
- source_word: ὀδυρμόν
  english_pob_choice: mourning
  chosen_spanish: lamento
  alternatives_spanish:
  - duelo
  - plañido
  lexicon: BDAG
  rationale: El término puede abarcar dolor expresado en queja o lamentación. 'Lamento' conserva mejor la expresión audible del dolor; 'duelo' puede sonar más general y 'plañido' más marcado regionalmente.
- source_word: ζῆλον
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - ardor
  - entusiasmo
  lexicon: BDAG
  rationale: '''Celo'' es el equivalente más directo y apto para el registro bíblico. Preserva la intensidad de la preocupación favorable por Pablo.'
- source_word: ὑπὲρ ἐμοῦ
  english_pob_choice: for me
  chosen_spanish: por mí
  alternatives_spanish:
  - en favor de mí
  - a favor mío
  lexicon: BDAG
  rationale: La preposición ὑπέρ con genitivo indica apoyo o referencia en favor de Pablo. 'Por mí' es la opción más natural y suficientemente amplia en español.
- source_word: ὥστε με μᾶλλον χαρῆναι
  english_pob_choice: so that I rejoiced even more
  chosen_spanish: de modo que me regocijé todavía más
  alternatives_spanish:
  - así que me alegré aún más
  - por lo cual me alegré más
  lexicon: BDAG
  rationale: La cláusula expresa resultado. 'Me regocijé' mantiene un registro bíblico digno y comunica el aumento comparativo de μᾶλλον con 'todavía más'.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión inglesa más reciente, que mantuvo el valor de ἐφ’ ὑμῖν como referencia/ocasión ('concerning you') y conservó la correspondencia léxica entre παρακλήσει y παρεκλήθη. En español se reflejó esa misma precisión con 'con respecto a ustedes' y la pareja 'consuelo / fue consolado'.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando corresponda al Tetragrama; este versículo no lo contiene.
  - Se mantiene 'Jesús' y 'Cristo/Mesías' fuera de este versículo; no aplica aquí.
  - '''Celo'' se usa para ζῆλος conforme al tono paulino y al registro eclesial natural del español.'
  - Los corchetes de notas se colocan solo donde hay variantes reales relevantes para la traducción.
  - Se prefirió 'anhelo' y 'lamento' por claridad y dignidad, sin suavizar el contenido emocional del texto.
