translation:
  language: es
  text: Hágannos lugar[a]. A nadie hemos agraviado, a nadie hemos corrompido[b], a nadie hemos explotado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Recíbannos» o «Ábrannos su corazón». El griego dice literalmente «Hágan[nos] lugar», y probablemente continúa la imaginería relacional de 6:11–13.
    reason: lexical_alternative
  - marker: b
    text: O «hemos arruinado» o «hemos pervertido».
    reason: lexical_alternative
lexical_decisions:
- source_word: Χωρήσατε
  english_pob_choice: Make room for
  chosen_spanish: Den espacio / den[nos] espacio
  alternatives_spanish:
  - Recíbanos
  - Ábrannos su corazón
  - Háganse lugar para nosotros
  lexicon: χωρέω
  rationale: 'El imperativo aoristo plural pide una acción relacional: hacer espacio para Pablo y sus compañeros. «Den espacio» conserva la metáfora de amplitud/recepción sin volver explícito «corazón» en el texto principal; el complemento enclítico «nos» puede omitirse o leerse implícito según el ritmo de publicación.'
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nosotros / nos
  alternatives_spanish:
  - a nosotros
  lexicon: ἐγώ
  rationale: Es el objeto directo del imperativo. En español, el clítico «nos» es natural y conciso; la forma plena «a nosotros» sería más enfática pero menos fluida aquí.
- source_word: οὐδένα
  english_pob_choice: no one
  chosen_spanish: a nadie
  alternatives_spanish:
  - nadie
  - a ninguna persona
  lexicon: οὐδείς
  rationale: La triple repetición refuerza la negación absoluta. «A nadie» mantiene esa fuerza y se ajusta al régimen verbal de los tres verbos transitivos.
- source_word: ἠδικήσαμεν
  english_pob_choice: wronged
  chosen_spanish: hemos hecho injusticia
  alternatives_spanish:
  - hemos agraviado
  - hemos perjudicado
  - hemos tratado injustamente
  lexicon: ἀδικέω
  rationale: ἀδικέω comunica la idea de actuar injustamente contra alguien. «Hemos hecho injusticia» conserva la raíz de «justicia/injusticia» y la amplitud del término sin especificar un daño concreto; «agraviado» o «perjudicado» estrecharían el sentido.
- source_word: ἐφθείραμεν
  english_pob_choice: corrupted
  chosen_spanish: hemos corrompido
  alternatives_spanish:
  - hemos arruinado
  - hemos pervertido
  - hemos desviado
  lexicon: φθείρω
  rationale: En contexto paulino relacional/moral, φθείρω puede implicar corromper o causar deterioro moral. «Hemos corrompido» preserva esa tensión y sigue de cerca el valor léxico básico; «arruinado» suena más material, y «desviado» interpreta demasiado.
- source_word: ἐπλεονεκτήσαμεν
  english_pob_choice: taken advantage of
  chosen_spanish: hemos explotado
  alternatives_spanish:
  - hemos defraudado
  - hemos sacado ventaja de
  - hemos abusado de
  lexicon: πλεονεκτέω
  rationale: πλεονεκτέω suele implicar explotar o sacar ventaja de otro. «Hemos explotado» es breve, fuerte y ampliamente inteligible; «defraudado» sería más económico/forense y más estrecho, mientras que «abusado de» puede sonar demasiado general.
theological_decisions:
- issue: Sentido relacional del imperativo Χωρήσατε ἡμᾶς
  english_pob_reading: A relational appeal for the Corinthians to make space in their hearts/lives for Paul and his companions
  chosen_spanish_reading: Un ruego relacional para que los corintios den espacio a Pablo y a sus compañeros
  alternative_spanish_readings:
  - Recíbannos
  - Ábrannos su corazón
  - Háganse lugar para nosotros
  rationale: El contexto inmediato de 6:11–13 habla de amplitud de afectos y de espacio para el vínculo; por eso la lectura principal debe ser relacional. En español, «Den espacio» conserva la imagen sin añadir «corazón» al cuerpo del texto, que sería más interpretativo que el griego.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El pasaje fue revisado en el flujo inglés y quedó sin cambios; la cruzada de control reporta alta concordancia y no hubo enmiendas aplicadas. La presente propuesta sigue ese estado estable, preservando la metáfora de «hacer espacio» y las tres negaciones enfáticas.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «a nadie» en serie para reflejar la repetición enfática de οὐδένα.
  - «Hemos hecho injusticia» y «hemos corrompido» mantienen una cadencia paralela y evitan especificar indebidamente el tipo de daño.
  - «Hemos explotado» sigue el rango de πλεονεκτέω sin reducirlo únicamente a fraude financiero.
