translation:
  language: es
  text: No digo esto para condenarlos[a], pues ya he dicho antes que ustedes están en nuestros corazones[b], para morir juntos y para vivir juntos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para condenación» o «con miras a condenación».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para morir juntos y para vivir juntos». El griego destaca la solidaridad compartida tanto en la muerte como en la vida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς κατάκρισιν οὐ λέγω
  english_pob_choice: I do not say this to condemn you
  chosen_spanish: No digo esto para condenarlos
  alternatives_spanish:
  - No digo esto para condenación
  - No digo esto con miras a condenarlos
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo expresa dirección o propósito; en español, la forma natural y fiel es 'para condenarlos'. 'Condenación' conserva el sustantivo, pero suena más abstracto y menos directo; 'con miras a' es válido pero más pesado. El verbo 'condenar' mantiene la fuerza pragmática del griego sin calco mecánico.
- source_word: λέγω
  english_pob_choice: I say this
  chosen_spanish: digo esto
  alternatives_spanish:
  - hablo así
  - estoy diciendo esto
  lexicon: BDAG
  rationale: El presente se expresa de manera directa con 'digo'. Se añade 'esto' porque el contexto apunta a lo que Pablo acaba de decir, tal como en el inglés auditado.
- source_word: προείρηκα
  english_pob_choice: I have said before
  chosen_spanish: ya he dicho antes
  alternatives_spanish:
  - he dicho previamente
  - ya lo había dicho
  lexicon: BDAG
  rationale: El perfecto griego señala una afirmación previa con vigencia actual. 'Ya he dicho antes' conserva ese valor anterior y su relevancia presente en un español natural.
- source_word: ἐν ταῖς καρδίαις ἡμῶν ἐστε
  english_pob_choice: you are in our hearts
  chosen_spanish: ustedes están en nuestros corazones
  alternatives_spanish:
  - ustedes están en nuestro corazón
  - los llevamos en nuestros corazones
  lexicon: BDAG
  rationale: '''Corazones'' es el equivalente normal de καρδίαι. Se conserva el plural del griego (''nuestros'') para reflejar la referencia colectiva de Pablo y sus compañeros. ''Están en nuestros corazones'' mantiene el matiz relacional y afectivo sin sobreexplicar.'
- source_word: εἰς τὸ συναποθανεῖν καὶ συζῆν
  english_pob_choice: to die together and to live together
  chosen_spanish: para morir juntos y para vivir juntos
  alternatives_spanish:
  - para compartir juntos la muerte y la vida
  - para morir con ustedes y vivir con ustedes
  lexicon: BDAG
  rationale: Los infinitivos compuestos con συν- expresan solidaridad compartida; 'juntos' comunica ese vínculo de manera natural en español. Se repite 'para' para conservar el paralelismo del griego y la fuerza retórica de la frase.
- source_word: συναποθανεῖν
  english_pob_choice: to die together
  chosen_spanish: morir juntos
  alternatives_spanish:
  - morir con ustedes
  - morir en solidaridad
  lexicon: BDAG
  rationale: El prefijo συν- aporta la idea de acción compartida. 'Morir juntos' preserva esa solidaridad sin añadir una categoría teológica no explicitada por el texto.
- source_word: συζῆν
  english_pob_choice: to live together
  chosen_spanish: vivir juntos
  alternatives_spanish:
  - vivir con ustedes
  - compartir la vida juntos
  lexicon: BDAG
  rationale: Como con el verbo anterior, 'juntos' reproduce el valor de συν- y mantiene el equilibrio entre muerte y vida que el griego enfatiza.
theological_decisions:
- issue: Si la frase final debe explicitar una unión teológica más específica (p. ej., pacto, participación en Cristo, vínculo matrimonial)
  english_pob_reading: Retain the relational solidarity language without importing a narrower theological category
  chosen_spanish_reading: Mantener el lenguaje de solidaridad relacional sin introducir una categoría teológica más estrecha
  alternative_spanish_readings:
  - alusión explícita a lealtad de pacto
  - eco de participación en Cristo
  - vínculo de tipo matrimonial
  rationale: El texto expresa afecto y solidaridad profundos entre Pablo y los corintios, pero no identifica de forma explícita una categoría técnica. La traducción conserva esa tensión y evita resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica en vez de cerrarla.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el acuerdo con la auditoría inglesa es alto y no se registraron correcciones pendientes.
  spanish_consistency_notes:
  - Se conserva 'Dios' y 'Yahvé' según corresponda, aunque este versículo no los menciona.
  - Se usa 'juntos' para reflejar el valor de συν- sin forzar una explicación doctrinal.
  - Se mantiene el tono pastoral y sobrio del pasaje, evitando una paráfrasis expansiva.
