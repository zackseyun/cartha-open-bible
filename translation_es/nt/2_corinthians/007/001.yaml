translation:
  language: es
  text: Por tanto[a], puesto que tenemos estas promesas, amados, limpiémonos de toda impureza[b] de carne y de espíritu, llevando la santidad a su plenitud[c] en el temor de Dios[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “Así que”.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “de toda impureza de cuerpo y espíritu”.'
    reason: lexical_alternative
  - marker: c
    text: 'O: “perfeccionando la santidad”.'
    reason: lexical_alternative
  - marker: d
    text: La expresión “temor de Dios” conserva el sentido de asombro reverente ante Dios, no mero terror.
    reason: theological_note
lexical_decisions:
- source_word: ταύτας ... τὰς ἐπαγγελίας
  english_pob_choice: these promises
  chosen_spanish: estas promesas
  alternatives_spanish:
  - estas cosas prometidas
  - estas promesas dadas
  lexicon: BDAG
  rationale: ἐπαγγελία en Pablo se entiende naturalmente como “promesa”; el demostrativo retoma las seguridades previas. “Estas promesas” es idiomático en español y conserva la referencia anafórica.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica desde el contexto anterior. “Por tanto” conserva mejor ese enlace argumentativo que una opción más coloquial.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  lexicon: BDAG
  rationale: Es una vocación afectuosa y solemne. “Amados” mantiene esa mezcla de cercanía y gravedad sin sonar demasiado coloquial.
- source_word: καθαρίσωμεν
  english_pob_choice: let us cleanse
  chosen_spanish: limpiémonos
  alternatives_spanish:
  - purifiquémonos
  - limpiemos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo inclusivo se expresa de manera natural con una forma imperativa inclusiva. “Limpiémonos” preserva la fuerza exhortativa y el campo semántico de purificación.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros
  - a nosotros mismos
  lexicon: BDAG
  rationale: El reflexivo se incluye en la forma verbal española. “Limpiémonos” ya contiene el valor de ἑαυτοὺς, por lo que no hace falta duplicarlo en la superficie del texto.
- source_word: ἀπὸ παντὸς μολυσμοῦ
  english_pob_choice: from every defilement
  chosen_spanish: de toda mancha
  alternatives_spanish:
  - de toda impureza
  - de toda contaminación
  lexicon: BDAG
  rationale: μολυσμός puede ser “mancha”, “impureza” o “contaminación”. “Mancha” es breve, natural y conserva la idea moral/ritual de contaminación sin volverla técnica o abstracta.
- source_word: σαρκὸς
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza humana
  lexicon: BDAG
  rationale: Aquí se mantiene “carne” por la correspondencia directa con πνεύματος y porque el contexto no exige el sentido especializado de “naturaleza pecaminosa”. “Cuerpo” suavizaría demasiado el contraste; “naturaleza humana” sería interpretativo.
- source_word: πνεύματος
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - alma
  - interior
  lexicon: BDAG
  rationale: Se conserva el paralelismo con “carne”. “Espíritu” mantiene la amplitud semántica y evita restringir el término a “alma” o a una explicación psicológica específica.
- source_word: ἐπιτελοῦντες
  english_pob_choice: bringing holiness to completion
  chosen_spanish: llevando la santidad a su plenitud
  alternatives_spanish:
  - perfeccionando la santidad
  - llevando a cabo la santidad
  lexicon: BDAG
  rationale: 'El participio expresa acción concomitante: avanzar hacia la meta. “Llevando ... a su plenitud” comunica la idea de completar sin perder la tensión de proceso y consumación.'
- source_word: ἁγιωσύνην
  english_pob_choice: holiness
  chosen_spanish: la santidad
  alternatives_spanish:
  - santidad
  - consagración
  lexicon: BDAG
  rationale: El sustantivo denota santidad como cualidad o estado. “La santidad” es la equivalencia más clara y natural en este contexto ético.
- source_word: ἐν φόβῳ θεοῦ
  english_pob_choice: in the fear of God
  chosen_spanish: en el temor de Dios
  alternatives_spanish:
  - en reverencia hacia Dios
  - con temor de Dios
  lexicon: BDAG
  rationale: Se conserva el giro bíblico “temor de Dios”, que en español transmite el peso reverente del original sin reducirlo a una sola explicación emocional. “Reverencia” suavizaría demasiado el término.
theological_decisions:
- issue: Alcance de σάρξ en “defilement of flesh and spirit”
  english_pob_reading: Rendered literally as 'flesh,' not 'sinful nature.'
  chosen_spanish_reading: Se traduce literalmente como “carne”, no como “naturaleza pecaminosa”.
  alternative_spanish_readings:
  - cuerpo
  - naturaleza pecaminosa
  rationale: El contraste inmediato con “espíritu” sugiere la dimensión corporal/material de la persona, sin forzar el sentido paulino especializado de σάρξ como orientación caída. Mantener “carne” preserva la tensión léxica documentada.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ *sarx* | flesh (literal) / sinful nature (metaphorical)'
- issue: Fuerza del subjuntivo exhortativo καθαρίσωμεν
  english_pob_reading: 'Exhortation inclusive of Paul and the readers: ''let us cleanse ourselves.'''
  chosen_spanish_reading: 'Exhortación inclusiva: “limpiémonos”.'
  alternative_spanish_readings:
  - debemos limpiarnos
  - purifiquémonos
  rationale: La primera persona plural exhortativa se reproduce naturalmente con un imperativo inclusivo en español. Así se conserva el tono pastoral y la implicación conjunta del hablante y los destinatarios.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
- issue: Sentido de φόβος θεοῦ
  english_pob_reading: Retained as 'fear of God' rather than reduced to 'reverence.'
  chosen_spanish_reading: Se mantiene “temor de Dios” y no se reduce a “reverencia”.
  alternative_spanish_readings:
  - reverencia hacia Dios
  - awe reverente ante Dios
  rationale: La expresión bíblica conserva deliberadamente una gravedad que “reverencia” atenúa. “Temor de Dios” retiene la fuerza idiomática y deja abierta la dimensión de asombro reverente.
  doctrine_reference: DOCTRINE.md Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión inglesa más reciente permanece sin cambios y fue confirmada por revisión de alta concordancia; esta redacción española sigue de cerca las decisiones léxicas y teológicas ya auditadas, sin introducir reinterpretaciones nuevas.
  spanish_consistency_notes:
  - 'Se mantiene la terminología POB habitual: Yahvé no aparece aquí; Mesías/Cristo no es pertinente; θεός se vierte como “Dios”.'
  - Se conserva la distinción léxica entre “carne” y “espíritu” sin psicologizarla.
  - El tono es bíblico y contemporáneo, evitando calco rígido pero también evitando paráfrasis libres.
