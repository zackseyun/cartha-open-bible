translation:
  language: es
  text: 'Porque vean qué diligencia ha producido en ustedes esta misma tristeza según Dios: pero también defensa[a], pero también indignación, pero también temor, pero también anhelo, pero también celo, pero también hacer justicia[b]. En todo demostraron estar puros en este asunto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una aclaración de ustedes mismos» para «defensa».
    reason: lexical_alternative
  - marker: b
    text: O «vindicación», «castigo» o «justicia» para «hacer justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἰδοὺ γὰρ
  english_pob_choice: For see
  chosen_spanish: Porque miren
  alternatives_spanish:
  - Vean
  - Miren
  lexicon: BDAG
  rationale: ἰδοὺ llama a prestar atención y γάρ introduce la explicación; «Porque miren» conserva ambos valores con naturalidad en español, sin perder el tono exhortativo e inferencial del griego.
- source_word: τὸ κατὰ θεὸν λυπηθῆναι
  english_pob_choice: this very grief according to God
  chosen_spanish: esta misma tristeza según Dios
  alternatives_spanish:
  - esta misma tristeza piadosa
  - esta misma tristeza de acuerdo con Dios
  lexicon: BDAG
  rationale: «Tristeza» mantiene el sustantivo de la aflicción, y «según Dios» preserva más literalmente κατὰ θεόν que una glosa ya interpretada como «piadosa». Se conserva así la tensión entre la formulación griega y la lectura teológica posible.
- source_word: σπουδήν
  english_pob_choice: earnestness
  chosen_spanish: gran diligencia
  alternatives_spanish:
  - seriedad
  - ardor
  - esfuerzo diligente
  lexicon: BDAG
  rationale: σπουδή aquí expresa el efecto moral activo producido por la tristeza; «gran diligencia» comunica bien la respuesta concreta y esforzada en español. «Diligencia» también deja espacio al matiz de earnestness/zeal sin volverlo meramente emocional.
- source_word: ἀπολογίαν
  english_pob_choice: a defense
  chosen_spanish: defensa
  alternatives_spanish:
  - cambio de sí mismos
  - justificación
  - aclaración
  lexicon: BDAG
  rationale: «Defensa» es el equivalente más directo y sobrio para ἀπολογία. Mantiene la idea de responder a una acusación o cargo sin añadir por sí solo el matiz más explícito de «limpieza de culpabilidad».
- source_word: ἀγανάκτησιν
  english_pob_choice: indignation
  chosen_spanish: indignación
  alternatives_spanish:
  - enojo
  - ira
  - repudio
  lexicon: BDAG
  rationale: «Indignación» reproduce el rechazo moral intenso de ἀγανάκτησις y funciona bien en registro bíblico contemporáneo.
- source_word: φόβον
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - reverente temor
  - alarma
  lexicon: BDAG
  rationale: «Temor» es más amplio y bíblicamente más fiel que «miedo», porque no obliga a decidir de antemano si el objeto es Dios, Pablo o la situación.
- source_word: ἐπιπόθησιν
  english_pob_choice: longing
  chosen_spanish: anhelo
  alternatives_spanish:
  - deseo profundo
  - añoranza
  - ansia
  lexicon: BDAG
  rationale: «Anhelo» expresa deseo intenso y relacional sin sonar excesivamente afectivo o moderno.
- source_word: ζῆλον
  english_pob_choice: zeal
  chosen_spanish: celo
  alternatives_spanish:
  - entusiasmo
  - ardor
  - empeño
  lexicon: BDAG
  rationale: «Celo» conserva el matiz de ardor moral y, en español bíblico, distingue bien este término de σπουδή («diligencia») en la primera mitad del versículo.
- source_word: ἐκδίκησιν
  english_pob_choice: vindication
  chosen_spanish: vindicación
  alternatives_spanish:
  - justicia
  - castigo
  - venganza
  lexicon: BDAG
  rationale: Aunque ἐκδίκησις puede abarcar castigo o justicia, aquí la POB inglesa eligió «vindication» para subrayar la respuesta que deja claro el asunto y demuestra inocencia. «Vindicación» conserva ese matiz demostrativo y evita imponer venganza personal.
- source_word: ἐν παντὶ
  english_pob_choice: In every way
  chosen_spanish: En todo
  alternatives_spanish:
  - En todo sentido
  - En todo aspecto
  - En cada cosa
  lexicon: BDAG
  rationale: La frase resume la totalidad del efecto. «En todo» es natural en español y suficientemente inclusivo, sin sobreexplicar el alcance.
- source_word: συνεστήσατε ἑαυτοὺς
  english_pob_choice: you proved yourselves
  chosen_spanish: se mostraron a sí mismos
  alternatives_spanish:
  - se demostraron
  - se recomendaron
  - se probaron
  lexicon: BDAG
  rationale: συνίστημι puede significar mostrar, demostrar o recomendar. Aquí el sentido es evidencial, así que «se mostraron a sí mismos» preserva la auto-manifestación de su conducta, con un español idiomático.
- source_word: ἁγνοὺς εἶναι
  english_pob_choice: to be pure
  chosen_spanish: puros
  alternatives_spanish:
  - inocentes
  - sin culpa
  - limpios
  lexicon: BDAG
  rationale: «Puros» conserva la cualidad moral de ἁγνός y deja abierta la implicación contextual de inocencia en el caso tratado.
- source_word: τῷ πράγματι
  english_pob_choice: in the matter
  chosen_spanish: en este asunto
  alternatives_spanish:
  - en la materia
  - en este caso
  - en el asunto
  lexicon: BDAG
  rationale: «Asunto» es una manera natural de referirse al incidente concreto sin volver demasiado técnico el texto.
theological_decisions:
- issue: κατὰ θεόν en relación con la tristeza
  english_pob_reading: according to God
  chosen_spanish_reading: según Dios
  alternative_spanish_readings:
  - piadosa
  - de acuerdo con Dios
  rationale: La expresión se conserva sin suavizarla a un adjetivo devocional. «Según Dios» mantiene visible la frase del original y evita cerrar la interpretación entre tristeza piadosa, conforme a Dios o medida por Dios.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: ἐκδίκησις en un contexto de arrepentimiento y corrección
  english_pob_reading: vindication
  chosen_spanish_reading: vindicación
  alternative_spanish_readings:
  - castigo
  - justicia
  - venganza
  rationale: El contexto describe una respuesta que esclarece y corrige el asunto, no una invitación a la represalia. «Vindicación» preserva la fuerza forense/restauradora que la POB inglesa quiso mantener.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: 'Se tomó en cuenta el contexto editorial inglés y el informe de revisión más reciente, que no requirió cambios sustantivos. La redacción española refleja la misma decisión interpretativa principal: mantener la literalidad controlada de «según Dios» y conservar el valor evidencial de ἐκδίκησις como «vindicación» en vez de cargarlo hacia castigo o venganza.'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «Mesías» solo cuando el texto lo requiera; aquí no aparece.
  - «Temor» y «celo» se distinguen para conservar la serie de afectos del versículo.
  - Los corchetes de notas se colocaron solo donde hay alternativa léxica real en el texto principal.
