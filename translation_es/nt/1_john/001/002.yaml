  - marker: b
    text: La expresión “la vida eterna” está gramaticalmente en forma de cosa, pero en el contexto se refiere personalmente al Hijo, el que estaba con el Padre y fue revelado a los apóstoles.
    reason: cross_reference
  revision_rationale: 'Se ajusta el texto para mejorar fidelidad y naturalidad en español: ''damos testimonio'' refleja mejor μαρτυροῦμεν; ''a ustedes'' hace explícito ὑμῖν; y se mantiene la estructura joánica de ''la vida'' / ''la vida eterna'' con una formulación más clara y litúrgicamente legible.'
