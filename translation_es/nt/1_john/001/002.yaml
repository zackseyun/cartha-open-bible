translation:
  language: es
  text: y la vida fue revelada[a], y la hemos visto y damos testimonio y les anunciamos a ustedes la vida eterna[b], la cual estaba con el Padre y fue revelada a nosotros—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “apareció” / “fue hecha manifiesta” para ἐφανερώθη.
    reason: lexical_alternative
  - marker: b
    text: La expresión “la vida eterna” está gramaticalmente en forma de cosa, pero en el contexto se refiere personalmente al Hijo, el que estaba con el Padre y fue revelado a los apóstoles.
    reason: cross_reference
lexical_decisions:
- source_word: ἡ ζωὴ / τὴν ζωὴν
  english_pob_choice: the life
  chosen_spanish: la vida
  alternatives_spanish:
  - la vida
  lexicon: BDAG
  rationale: Conservo el artículo definido porque aquí no se trata de “vida” en abstracto, sino de una realidad concreta y determinada que luego se identifica como “la vida eterna”. En español, “la vida” mantiene bien esa referencia definida sin forzar una explicación adicional.
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: fue revelada
  alternatives_spanish:
  - apareció
  - fue manifestada
  - se hizo manifiesta
  lexicon: BDAG
  rationale: El pasivo aoristo se refleja naturalmente con “fue revelada”. Esta forma conserva el valor de dar a conocer algo antes oculto y evita debilitar el matiz de revelación que el griego sugiere.
- source_word: ἑωράκαμεν
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  lexicon: BDAG
  rationale: El perfecto griego expresa una experiencia completada con vigencia actual; “hemos visto” conserva ese valor testimonial mejor que un pretérito simple.
- source_word: μαρτυροῦμεν
  english_pob_choice: testify
  chosen_spanish: testificamos
  alternatives_spanish:
  - damos testimonio
  - atestiguamos
  lexicon: BDAG
  rationale: “Testificamos” reproduce con claridad el sentido forense/de testimonio de μαρτυροῦμεν y funciona de manera digna en español contemporáneo. “Dar testimonio” también sería posible, pero aquí la forma simple resulta más directa.
- source_word: ἀπαγγέλλομεν
  english_pob_choice: proclaim
  chosen_spanish: anunciamos
  alternatives_spanish:
  - proclamamos
  - declaramos
  - reportamos
  lexicon: BDAG
  rationale: “Anunciamos” conserva la fuerza pública y declarativa del verbo sin sonar excesivamente técnico. “Proclamamos” es más fuerte, pero en español puede cargar un matiz litúrgico que no es necesario aquí.
- source_word: τὴν ζωὴν τὴν αἰώνιον
  english_pob_choice: the eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - la vida eterna
  lexicon: BDAG
  rationale: Mantengo la frase nominal definida en forma natural española. El orden “la vida eterna” comunica bien la concreción del referente y respeta la identificación del texto sin añadir paráfrasis.
- source_word: ἥτις
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  - quien
  lexicon: BDAG
  rationale: Uso “la cual” para conservar la referencia gramatical a “vida” sin cerrar demasiado pronto la tensión personal del contexto. En español, “que” también sería posible, pero “la cual” ayuda a mantener la estructura del original.
- source_word: ἦν πρὸς τὸν πατέρα
  english_pob_choice: was with the Father
  chosen_spanish: estaba con el Padre
  alternatives_spanish:
  - estaba junto al Padre
  - estaba en la presencia del Padre
  lexicon: BDAG
  rationale: “Estaba con el Padre” es la equivalencia más natural y directa de πρὸς τὸν πατέρα. Conserva la relación personal y la preexistencia implícita sin expandir el sentido más allá del griego.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el Padre
  lexicon: BDAG
  rationale: Conservo el título relacional-teológico con mayúscula, ya que en el contexto joánico se refiere a Dios como Padre. Esto sigue la convención española reverente y clara.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: a nosotros
  alternatives_spanish:
  - para nosotros
  lexicon: BDAG
  rationale: “A nosotros” reproduce la dirección del dativo y suena natural en español. Evito “para nosotros” porque desplaza ligeramente el valor de destinatario/testimonio del pasaje.
theological_decisions:
- issue: Cómo traducir la designación de Jesús como “la vida” sin resolver en exceso la referencia personal
  english_pob_reading: Kept 'the life' / 'the eternal life' as the main text, allowing the personal referent to emerge from context rather than substituting 'he' or directly naming the Son.
  chosen_spanish_reading: Conservo “la vida” y “la vida eterna” en el texto principal, permitiendo que el lector vea la identificación personal por el contexto, no por una explicitación añadida.
  alternative_spanish_readings:
  - y él fue revelado...
  - la vida, es decir, la vida eterna
  rationale: El griego usa el sustantivo ζωή y no un pronombre masculino explícito. En español, mantener la forma nominal conserva la tensión joánica entre vida como realidad y vida como referencia personal al Hijo, sin resolverla prematuramente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Cómo reflejar la relación preexistente expresada por πρὸς τὸν πατέρα
  english_pob_reading: was with the Father
  chosen_spanish_reading: estaba con el Padre
  alternative_spanish_readings:
  - estaba junto al Padre
  - estaba en la presencia del Padre
  rationale: Esta redacción es fiel al griego y comunica de manera sobria la relación previa y cercana con el Padre. No añade formulaciones doctrinales extra, pero sí deja ver la profundidad relacional del enunciado.
  doctrine_reference: Afirmación compatible con la cristología nicena; primacía del original frente a la tradición de traducción.
translation_notes:
  revision_awareness: El pasaje coincide de forma alta con el texto fuente y con el audit trail inglés; no se detectaron revisiones posteriores que alteren la elección léxica o teológica. Se conserva la misma línea de traducción óptima y la nota cristológica contextual.
  spanish_consistency_notes:
  - Mantengo “vida” y “vida eterna” con artículo definido para reflejar la fuerza identificadora del original.
  - Conservo “Padre” con mayúscula como título divino coherente con el contexto joánico.
  - Uso verbos en primera persona plural en presente perfecto y presente para reproducir el valor testimonial continuo del griego.
  - La nota b preserva la tensión entre el sustantivo femenino y el referente personal del Hijo sin convertirla en paráfrasis explícita en el texto principal.
