  to: y la vida fue revelada[a], y la hemos visto y damos testimonio y les anunciamos a ustedes la vida eterna[b], la cual estaba con el Padre y fue revelada a nosotros—
  rationale: 'Se ajusta el texto para mejorar fidelidad y naturalidad en español: ''damos testimonio'' refleja mejor μαρτυροῦμεν; ''a ustedes'' hace explícito ὑμῖν; y se mantiene la estructura joánica de ''la vida'' / ''la vida eterna'' con una formulación más clara y litúrgicamente legible.'
