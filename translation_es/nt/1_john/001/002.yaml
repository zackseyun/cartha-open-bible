review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del POB inglés: conserva la repetición de ''vida'', el pasivo de ἐφανερώθη, el perfecto ''hemos visto'', el carácter testimonial de μαρτυροῦμεν, y la referencia relacional ''con el Padre''. Sin embargo, hay dos ajustes recomendables: (1) añadir el artículo en ''la vida eterna'' para reflejar mejor la definitud marcada en el griego y preservada en el POB inglés; y (2) preferir ''a ustedes'' en vez de ''les'' para hacer explícito ὑμῖν, paralelo a ''a nosotros''.'
  spanish_quality_summary: 'El español es claro y digno, pero ''testificamos'' suena menos natural en español eclesial general que ''damos testimonio'', y ''la cual'' resulta algo pesado; no obstante, es aceptable. El cambio principal es de fidelidad y naturalidad combinadas: ''les anunciamos la vida eterna'' debería quedar ''les anunciamos a ustedes la vida eterna'' o mejor ''les anunciamos a ustedes la vida eterna'' con artículo completo; para mayor fluidez puede usarse ''y les anunciamos a ustedes la vida eterna'', aunque basta con ''y les anunciamos a ustedes la vida eterna''. También conviene mantener ''la vida, la eterna'' no; la forma natural es ''la vida eterna'', pero con nota ya se preserva el matiz personal.'
  glossary_alignment: No hay conflictos con la terminología del proyecto. 'Padre' está bien capitalizado. No intervienen términos como Yahvé/Mesías/esclavo. La decisión de mantener 'la vida' y 'la vida eterna' concuerda con la rationale del POB. La nota b está bien orientada teológicamente.
  issues:
  - severity: medium
    issue: 'Falta el artículo definido completo en la segunda mención: ''la vida eterna'''
    rationale: 'El griego τὴν ζωὴν τὴν αἰώνιον y el POB inglés ''the eternal life'' preservan una definitud enfática. En español ''la vida eterna'' ya incluye artículo, pero en el borrador la frase aparece sin el artículo previo de la repetición completa de ''la vida'': conviene mantener la estructura ''les anunciamos la vida eterna'' dentro de una revisión global que subraye que se trata de la realidad definida ya introducida. No es error grave, pero sí un punto de fidelidad literaria.'
  - severity: medium
    issue: '''Testificamos'' es comprensible, pero menos natural que ''damos testimonio'''
    rationale: μαρτυροῦμεν tiene claro sentido de testimonio. 'Testificamos' existe, pero en español bíblico general suena más forzado; 'damos testimonio' conserva mejor el matiz y mejora la legibilidad sin perder precisión.
  - severity: low
    issue: ὑμῖν queda solo implícito en 'les'
    rationale: El español permite dativo clítico, pero el POB inglés lo hace explícito ('to you') y el versículo ya explicita 'a nosotros' al final. Añadir 'a ustedes' mejora el paralelismo y la claridad para lectura pública.
  revised_spanish_text: y la vida fue revelada[a], y la hemos visto y damos testimonio y les anunciamos a ustedes la vida eterna[b], la cual estaba con el Padre y fue revelada a nosotros—
  revised_footnotes:
