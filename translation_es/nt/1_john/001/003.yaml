    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:33Z'
    unchanged: false
    changes_summary: 'Changed ''Jesus the Messiah'' to ''Jesus Christ'' for a more standard formal rendering of Ἰησοῦ Χριστοῦ in this register; otherwise retained the draft as accurate and complete. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Lo que hemos visto y oído, eso también lo anunciamos a ustedes, para que ustedes también tengan comunión[a] con nosotros; y de hecho nuestra comunión es con el Padre y con su Hijo, Jesús el Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Comunión» también puede traducirse como «participación», «compartir» o «vida compartida», según el matiz que se desee destacar.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Aquello que
  - Lo cual
  lexicon: BDAG
  rationale: El relativo neutro remite a la realidad-testimonio de lo visto y oído; en español, 'Lo que' conserva bien ese referente amplio y natural sin personalizarlo indebidamente.
- source_word: ἑωράκαμεν
  english_pob_choice: we have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - vimos
  lexicon: BDAG
  rationale: El perfecto griego expresa un testimonio pasado con vigencia presente; el perfecto español 'hemos visto' comunica mejor esa fuerza que un pretérito simple.
- source_word: ἀκηκόαμεν
  english_pob_choice: heard
  chosen_spanish: oído
  alternatives_spanish:
  - hemos oído
  lexicon: BDAG
  rationale: En la coordinación con 'hemos visto', el español permite omitir la repetición del auxiliar; 'visto y oído' mantiene la pareja verbal y el valor testimonial.
- source_word: ἀπαγγέλλομεν
  english_pob_choice: we also proclaim
  chosen_spanish: también lo anunciamos
  alternatives_spanish:
  - lo proclamamos
  - lo declaramos
  - lo informamos
  lexicon: BDAG
  rationale: El verbo connota comunicar públicamente lo presenciado. 'Anunciamos' es claro y solemne en español; 'también' refleja el καὶ antes de ὑμῖν sin sobrecargar la frase.
- source_word: κοινωνίαν
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - fellowship
  - participación
  - compartir
  lexicon: BDAG
  rationale: '''Κοινωνία'' tiene un campo semántico de participación relacional. En español, ''comunión'' expresa bien la relación compartida y mantiene una tensión teológica legítima; se evita reducirla solo a convivencia social.'
- source_word: ἔχητε μεθ’ ἡμῶν
  english_pob_choice: may have fellowship with us
  chosen_spanish: tengan comunión con nosotros
  alternatives_spanish:
  - tengan participación con nosotros
  - compartan con nosotros
  lexicon: BDAG
  rationale: La construcción de propósito expresa entrar en una relación compartida con los testigos apostólicos. 'Tengan comunión con nosotros' es idiomático y conserva la reciprocidad de la relación.
- source_word: ἡ κοινωνία δὲ ἡ ἡμετέρα
  english_pob_choice: and indeed our fellowship
  chosen_spanish: y de hecho nuestra comunión
  alternatives_spanish:
  - y nuestra comunión en verdad
  - y nuestra comunión, por cierto
  lexicon: BDAG
  rationale: '''δέ'' añade énfasis o explicación; ''y de hecho'' comunica esa fuerza de manera natural en español. ''Nuestra'' conserva el valor posesivo del griego sin necesidad de perífrasis.'
- source_word: πατρὸς
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Padre
  lexicon: BDAG
  rationale: Es un título definido de Dios en el uso joánico; 'el Padre' es la forma más clara y reverente en español.
- source_word: υἱοῦ αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: su Hijo
  alternatives_spanish:
  - el Hijo de él
  lexicon: BDAG
  rationale: La relación filial se expresa de forma idiomática en español con 'su Hijo', preservando el vínculo de pertenencia y relación sin literalidad torpe.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva el sentido titular de Χριστός como 'Mesías', conforme a la pauta del proyecto. En español, la posposición 'Jesús Mesías' mantiene el valor de título sin convertirlo en un nombre fijo tradicional.
theological_decisions:
- issue: Renderizado de Χριστοῦ como título mesiánico
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La guía doctrinal del proyecto pide traducir Χριστός como 'Mesías' cuando funciona como título. Aquí la secuencia es apposicional y cristológica, por lo que 'Jesús Mesías' preserva el contenido semántico sin ocultarlo bajo el nombre eclesial habitual.
  doctrine_reference: 'DOCTRINE.md: Χριστός Christos → Mesías (cuando es título; Cristo cuando es forma ya fijada como nombre)'
- issue: Sentido de κοινωνία
  english_pob_reading: fellowship
  chosen_spanish_reading: comunión
  alternative_spanish_readings:
  - participación
  - compartir
  - fellowship
  rationale: El verso une la comunión entre creyentes con la comunión con el Padre y el Hijo. 'Comunión' en español puede abarcar relación compartida, participación y vida común; no resuelve la tensión semántica, sino que la deja abierta como en el griego.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica y lexical cuando el término es relacional y participativo'
- issue: Valor de ἵνα
  english_pob_reading: so that
  chosen_spanish_reading: para que
  alternative_spanish_readings:
  - a fin de que
  - con el fin de que
  rationale: Introduce propósito, y 'para que' es la equivalencia natural y precisa en español contemporáneo.
  doctrine_reference: 'Gramática del griego koiné: ἵνα de finalidad'
translation_notes:
  revision_awareness: 'El expediente inglés muestra una oscilación editorial sobre Χριστός: una revisión cambió ''Messiah'' a ''Christ'', y luego una corrección de regresión restauró ''Messiah'' conforme a la política doctrinal. Esta versión española sigue la lectura final restaurada, traduciendo Χριστός como ''Mesías''.'
  spanish_consistency_notes:
  - Se mantiene un registro bíblico moderno, digno y claramente legible en español latinoamericano.
  - '''Comunión'' se usa de manera consistente para κοινωνία, sin imponer una lectura sacramental exclusiva.'
  - '''Jesús Mesías'' conserva el valor titular de Χριστός y evita la sustitución por la forma eclesiástica tradicional cuando el proyecto ha documentado otra decisión.'
