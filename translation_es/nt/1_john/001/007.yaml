  text: ἐὰν δὲ ἐν τῷ φωτὶ περιπατῶμεν ὡς αὐτός ἐστιν ἐν τῷ φωτί, κοινωνίαν ἔχομεν μετ’ ἀλλήλων καὶ τὸ αἷμα ⸀Ἰησοῦ τοῦ υἱοῦ αὐτοῦ καθαρίζει ἡμᾶς ἀπὸ πάσης ἁμαρτίας.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/001/007.yaml
  text: But if we walk in the light[a], as he himself is in the light, we have fellowship with one another[b], and the blood of Jesus his Son cleanses us from every sin.
  footnotes:
  - marker: a
    text: Or 'with each other.' Some interpreters take 'with one another' to mean fellowship between believers and God, but the reciprocal Greek most naturally refers to mutual fellowship among believers.
    reason: alternative_reading
  - marker: b
    text: Or 'from all sin.' The Greek can be understood distributively ('every sin') or collectively ('all sin').
    reason: lexical_alternative
