translation:
  language: es
  text: Pero si andamos en la luz, como él mismo está en la luz, tenemos comunión unos con otros[a], y la sangre de Jesús, su Hijo, nos limpia de todo pecado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre sí». Algunos intérpretes toman «unos con otros» como comunión entre los creyentes y Dios, pero el recíproco griego se refiere más naturalmente a la comunión mutua entre creyentes.
    reason: alternative_reading
  - marker: b
    text: O «de cada pecado». El griego puede entenderse distributivamente («cada pecado») o colectivamente («todo pecado»).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: δέ conserva un matiz adversativo frente al versículo anterior; «Pero si» expresa bien ese contraste en español natural.
- source_word: ἐν τῷ φωτὶ
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - en la luz
  - en luz
  lexicon: BDAG
  rationale: Mantiene la imagen joánica sin explicación añadida; el artículo no exige una construcción más pesada en español.
- source_word: περιπατῶμεν
  english_pob_choice: we walk
  chosen_spanish: andamos
  alternatives_spanish:
  - caminamos
  - vivimos
  lexicon: BDAG
  rationale: El verbo metafórico de conducta se puede expresar naturalmente con «andar» en español bíblico contemporáneo; conserva la imagen ética del original sin volverla paráfrasis.
- source_word: ὡς αὐτός ἐστιν ἐν τῷ φωτί
  english_pob_choice: as he himself is in the light
  chosen_spanish: como él mismo está en la luz
  alternatives_spanish:
  - como él está en la luz
  - tal como él mismo está en la luz
  lexicon: BDAG
  rationale: «Él mismo» refleja el énfasis explícito de αὐτός; «está» reproduce el estado/posición presente de forma natural en español.
- source_word: κοινωνίαν ἔχομεν
  english_pob_choice: we have fellowship
  chosen_spanish: tenemos comunión
  alternatives_spanish:
  - tenemos fellowship
  - compartimos comunión
  lexicon: BDAG
  rationale: En español eclesial, «comunión» comunica bien κοινωνία y evita un anglicismo; conserva la idea de participación relacional sin convertirla en término sacramental exclusivo.
- source_word: μετ’ ἀλλήλων
  english_pob_choice: with one another
  chosen_spanish: unos con otros
  alternatives_spanish:
  - entre nosotros
  - unos y otros
  lexicon: BDAG
  rationale: La reciprocidad griega se expresa de modo natural con «unos con otros» y preserva el sentido mutuo del pronombre recíproco.
- source_word: τὸ αἷμα Ἰησοῦ
  english_pob_choice: the blood of Jesus
  chosen_spanish: la sangre de Jesús
  alternatives_spanish:
  - la sangre de Jesús
  - la sangre de Jesús
  lexicon: BDAG
  rationale: La forma posesiva española sigue de cerca el genitivo griego sin perder solemnidad; «Jesús» se mantiene como nombre propio según el estándar del proyecto.
- source_word: τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: su Hijo
  alternatives_spanish:
  - su Hijo
  - el Hijo de él
  lexicon: BDAG
  rationale: La relación filial queda clara y natural en español; no se necesita una glosa más analítica.
- source_word: καθαρίζει
  english_pob_choice: cleanses
  chosen_spanish: nos limpia
  alternatives_spanish:
  - nos purifica
  - nos está limpiando
  lexicon: BDAG
  rationale: «Limpiar» conserva la imagen verbal sin perder la dimensión moral/cultual de καθαρίζω; el presente simple español puede expresar acción continua o característica sin sobreinterpretación.
- source_word: ἀπὸ πάσης ἁμαρτίας
  english_pob_choice: from every sin
  chosen_spanish: de todo pecado
  alternatives_spanish:
  - de cada pecado
  - de todo pecado
  lexicon: BDAG
  rationale: La construcción singular con πᾶς admite lectura distributiva o colectiva; «de todo pecado» es idiomático en español y mantiene la amplitud del alcance sin forzar una repetición artificial.
theological_decisions:
- issue: Referente de μετ’ ἀλλήλων
  english_pob_reading: mutual fellowship among believers
  chosen_spanish_reading: comunión mutua entre creyentes
  alternative_spanish_readings:
  - comunión entre nosotros y Dios
  - comunión recíproca entre los creyentes
  rationale: El recíproco ἀλλήλων apunta de forma más natural a la relación entre personas; se preserva así la lectura más llana del griego y se evita absorber aquí la comunión con Dios, que ya está en el contexto inmediato (1 Jn 1:3).
  doctrine_reference: Preservar la tensión textual; no resolver de más el alcance de la comunión.
- issue: Fuerza aspectual de καθαρίζει
  english_pob_reading: ongoing cleansing expressed by English simple present
  chosen_spanish_reading: presente con valor durativo/habitual implícito
  alternative_spanish_readings:
  - 'presente progresivo explícito: ''nos está limpiando'''
  - cercano a una acción puntual pasada
  rationale: El presente griego puede expresar acción continua o característica; el presente simple español «nos limpia» permite esa fuerza sin añadir una perífrasis interpretativa que el texto no exige.
  doctrine_reference: 'Translation philosophy: optimal equivalence; no paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios sustantivos; se mantiene la lectura óptima ya aprobada, con el mismo tratamiento del contraste de δέ, la imagen de caminar/andar en la luz, la reciprocidad de ἀλλήλων y el presente de καθαρίζει.
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma del proyecto cuando corresponda, pero este versículo no contiene el tetragrámaton.
  - Se mantiene «Jesús» y la estructura cristológica «su Hijo» conforme al genitivo del original.
  - «Comunión» se usa en sentido relacional amplio, no limitado sacramentalmente.
  - «Nos limpia» deja intacta la ambigüedad de aspecto sin añadir 'sigue' o 'está' en el texto principal.
  - La nota a aclara la alternativa interpretativa sobre μετ’ ἀλλήλων, y la nota b la amplitud semántica de πάσης ἁμαρτίας.
