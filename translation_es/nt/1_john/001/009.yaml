translation:
  language: es
  text: Si confesamos nuestros pecados, él es fiel y recto[a] para perdonarnos nuestros pecados y limpiarnos de toda injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "justo": "él es fiel y justo para perdonarnos nuestros pecados y limpiarnos de toda injusticia".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Siempre que
  lexicon: BDAG
  rationale: Introduce una condición de tercera clase. En español, 'Si' conserva la fuerza condicional de forma natural y precisa, sin añadir habitualidad que el griego no exige.
- source_word: ὁμολογῶμεν
  english_pob_choice: we confess
  chosen_spanish: confesamos
  alternatives_spanish:
  - reconocemos
  - admitimos
  lexicon: BDAG
  rationale: En un contexto de pecado, ὁμολογέω implica reconocer abiertamente la culpa. 'Confesamos' mantiene la carga moral y religiosa que el inglés POB también preserva con 'confess'.
- source_word: τὰς ἁμαρτίας ἡμῶν
  english_pob_choice: our sins
  chosen_spanish: nuestros pecados
  alternatives_spanish:
  - los pecados nuestros
  lexicon: BDAG
  rationale: La construcción es un objeto directo con posesivo. 'Nuestros pecados' es idiomático en español y conserva el referente plural sin suavizar el término ἁμαρτία.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - fidedigno
  lexicon: BDAG
  rationale: '''Fiel'' es el equivalente natural de πιστός cuando describe la constancia de Dios en cumplir su palabra. Mantiene la relación con la promesa de perdonar y limpiar.'
- source_word: δίκαιος
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - righteous
  lexicon: BDAG
  rationale: En español, 'justo' comunica bien el paralelo con 'fiel' y preserva la ambigüedad léxica de δίκαιος entre 'justo' y 'recto'. Aunque el inglés POB prefirió 'righteous', en español 'justo' es el término más claro y natural sin perder la base semántica.
- source_word: ἵνα
  english_pob_choice: to
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de
  lexicon: BDAG
  rationale: '''Para'' expresa con naturalidad la finalidad/resultante del infinitivo en español. Evita una subordinación pesada y conserva el valor de propósito de ἵνα con los aoristos subjuntivos siguientes.'
- source_word: ἀφῇ
  english_pob_choice: forgive
  chosen_spanish: perdonarnos
  alternatives_spanish:
  - absolvernos
  - dejarnos libres
  lexicon: BDAG
  rationale: En contexto de pecado, ἀφίημι significa 'perdonar'. 'Perdonarnos' reproduce bien el valor verbal y mantiene la relación directa con 'nuestros pecados'.
- source_word: ἡμῖν τὰς ἁμαρτίας
  english_pob_choice: us our sins
  chosen_spanish: perdonarnos nuestros pecados
  alternatives_spanish:
  - perdonar nuestros pecados a nosotros
  lexicon: BDAG
  rationale: El dativo con objeto directo se expresa naturalmente en español con el clítico dativo 'nos' y el objeto 'nuestros pecados'. Esto conserva la estructura relacional sin sonar forzado.
- source_word: καθαρίσῃ
  english_pob_choice: cleanse
  chosen_spanish: limpiarnos
  alternatives_spanish:
  - purificarnos
  - purificarnos de
  lexicon: BDAG
  rationale: '''Limpiarnos'' conserva la imagen de remoción de mancha moral y se coordina bien con el perdón previo. ''Purificarnos'' sería posible, pero ''limpiar'' es más directo y transparente en español contemporáneo.'
- source_word: ἀπὸ πάσης ἀδικίας
  english_pob_choice: from all unrighteousness
  chosen_spanish: de toda injusticia
  alternatives_spanish:
  - de toda maldad
  - de todo pecado
  lexicon: BDAG
  rationale: ἀδικία abarca injusticia, maldad o wrongdoing. 'Injusticia' preserva la amplitud moral del término y mantiene el paralelismo con la limpieza de pecado, aunque en español puede sonar más relacional/ética que 'unrighteousness'.
theological_decisions:
- issue: Relación entre δίκαιος y el perdón divino
  english_pob_reading: righteous
  chosen_spanish_reading: justo
  alternative_spanish_readings:
  - recto
  - righteous
  rationale: El versículo fundamenta el perdón y la limpieza en el carácter de Dios. 'Justo' conserva el sentido moral y judicial sin cerrar la tensión entre rectitud ética y justicia forense; en español resulta más natural que 'righteous'.
  doctrine_reference: Translation philosophy §3; preservación de ambigüedad léxica relevante.
translation_notes:
  revision_awareness: El inglés POB reciente se mantuvo sin cambios y ya había resuelto δίκαιος con una nota alternativa 'just'. En español, se conservó esa tensión léxica mediante una nota que ofrece 'justo' como opción principal y reconoce la alternativa interpretativa. No hubo revisiones textuales posteriores que obligaran a ajustar el tenor del versículo.
  spanish_consistency_notes:
  - Se mantiene 'pecados' para ἁμαρτίας de forma consistente en ambos lugares del verso.
  - Se usa 'limpiarnos' para καθαρίσῃ siguiendo la imagen de purificación moral y la coordinación natural con 'perdonarnos'.
  - '''Injusticia'' se eligió para ἀδικία por su amplitud moral y por su legibilidad en español bíblico contemporáneo.'
  - La nota de pie refleja la alternativa léxica principal sin duplicar marcadores.
  - 'El tratamiento de Dios es coherente con el patrón POB: no se sustituye por ''Señor'' ni se enmascara el nombre divino, aunque aquí el texto no contiene el Tetragrámaton.'
