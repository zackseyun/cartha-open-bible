    reason: lexical_alternative
  revision_rationale: Se corrige δίκαιος en el texto principal a 'recto' para reflejar mejor la elección principal auditada 'righteous' sin usar un anglicismo, y se conserva 'justo' como alternativa léxica en nota, en línea con el POB inglés. Se elimina el anclaje innecesario en 'pecados' y se coloca la nota sobre 'recto', donde corresponde. El resto del versículo se mantiene por ser fiel, claro y natural.
