review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura condicional y el sentido general del griego: confesión de pecados, fidelidad y justicia de Dios, perdón y limpieza. Sin embargo, no preserva la decisión léxica auditada del POB para δίκαιος, donde el inglés principal eligió ''righteous'' y dejó ''just'' como alternativa en nota. En español, el texto principal puso ''justo'' y la nota repite erróneamente ''justo'' como alternativa, de modo que se pierde la distinción documentada.'
  spanish_quality_summary: El español es claro y natural. 'Si confesamos nuestros pecados' y 'él es fiel' leen bien. 'Limpiarnos de toda injusticia' es comprensible, aunque algo menos idiomático que 'purificarnos'; aun así es defendible por la imagen de καθαρίζω. El problema principal de calidad está en la nota al pie, que es circular y mal formulada, y en la falta de alineación entre texto principal y alternativa léxica.
  glossary_alignment: 'No hay conflicto con los términos de proyecto mayores. La cuestión clave es δίκαιος: para seguir la racionalidad auditada, el español principal debería reflejar ''righteous'' con ''recto'' o una opción equivalente de rectitud moral, y conservar ''justo'' como alternativa en nota. ''Fiel y recto'' suena natural y preserva mejor la distinción con la nota. ''Injusticia'' para ἀδικία es aceptable, aunque en español puede inclinarse hacia injusticia social; aquí se mantiene por alineación con el POB y amplitud semántica.'
  issues:
  - severity: high
    issue: δίκαιος se tradujo como 'justo' en el texto principal en vez de reflejar la elección auditada principal 'righteous'.
    rationale: El POB inglés documenta 'righteous' como lectura principal y 'just' solo como alternativa. El español debe preservar esa priorización, no invertirla sin necesidad fuerte.
  - severity: high
    issue: La nota al pie [a] es defectuosa y no ofrece una alternativa real.
    rationale: Dice 'O “justo”' cuando el texto principal ya usa 'justo'; además reproduce casi todo el versículo innecesariamente. La nota debe marcar la alternativa al término principal, no duplicarlo.
  - severity: medium
    issue: La decisión léxica y teológica del borrador contradice la auditoría sin justificación suficiente.
    rationale: Afirmar que 'justo' es preferible en español puede ser discutible, pero aquí la tarea es revisar fidelidad al rastro auditado. No hay necesidad doctrinal ni idiomática que obligue a apartarse de la decisión principal documentada.
  revised_spanish_text: Si confesamos nuestros pecados, él es fiel y recto[a] para perdonarnos nuestros pecados y limpiarnos de toda injusticia.
  revised_footnotes:
