    text: O 'en tinieblas'. El griego tiene 'en las tinieblas', lo que puede enfatizar el ámbito moral-espiritual opuesto a Dios en el uso joánico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'no hacemos la verdad'.
    reason: lexical_alternative
