translation:
  language: es
  text: Si decimos que tenemos comunión con él y andamos en las tinieblas[a], mentimos y no practicamos la verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en tinieblas'. El griego tiene 'en las tinieblas', lo que puede enfatizar el ámbito moral-espiritual opuesto a Dios en el uso joánico.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'no hacemos la verdad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπωμεν
  english_pob_choice: If we say
  chosen_spanish: Si decimos
  alternatives_spanish:
  - Si afirmamos
  - Si dijéramos
  lexicon: BDAG
  rationale: La condicional de tercera clase se expresa de manera natural con 'Si decimos', conservando el valor hipotético sin añadir matices interpretativos como 'afirmamos'.
- source_word: κοινωνίαν ἔχομεν
  english_pob_choice: we have fellowship
  chosen_spanish: tenemos comunión
  alternatives_spanish:
  - tenemos fellowship
  - estamos en comunión
  lexicon: BDAG
  rationale: '''Comunión'' es el equivalente español más natural y eclesialmente inteligible para κοινωνία, y conserva la idea relacional de ''tener'' comunión sin convertirla en una mera condición interna.'
- source_word: μετ’ αὐτοῦ
  english_pob_choice: with him
  chosen_spanish: con él
  alternatives_spanish:
  - con Dios
  - con él mismo
  lexicon: BDAG
  rationale: Se mantiene el pronombre del griego como 'él', tal como hace la POB inglesa, sin expandirlo a 'Dios' aunque el contexto lo aclare.
- source_word: ἐν τῷ σκότει
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en la oscuridad moral
  lexicon: BDAG
  rationale: '''Oscuridad'' comunica bien el artículo griego y la carga moral-espiritual joánica. ''Tinieblas'' sería posible, pero en español actual puede sonar más literario o marcado; aquí se prefiere claridad y dignidad.'
- source_word: περιπατῶμεν
  english_pob_choice: walk
  chosen_spanish: caminamos
  alternatives_spanish:
  - andamos
  - vivimos
  lexicon: BDAG
  rationale: En español, 'caminar' conserva la metáfora de conducta o modo de vida con mayor naturalidad que un calco como 'andar' o una explicación como 'vivimos'.
- source_word: ψευδόμεθα
  english_pob_choice: we are lying
  chosen_spanish: mentimos
  alternatives_spanish:
  - estamos mintiendo
  - decimos mentira
  lexicon: BDAG
  rationale: El presente griego puede expresarse de modo simple en español con 'mentimos', manteniendo la acusación directa y fluida; 'estamos mintiendo' sería más marcado y menos natural en este paralelismo.
- source_word: οὐ ποιοῦμεν τὴν ἀλήθειαν
  english_pob_choice: are not practicing the truth
  chosen_spanish: no practicamos la verdad
  alternatives_spanish:
  - no hacemos la verdad
  - no vivimos la verdad
  lexicon: BDAG
  rationale: '''Practicar la verdad'' conserva el idiomatismo joánico de ''hacer la verdad'' sin volverse demasiado literal o extraña en español. ''No hacemos la verdad'' es más cercano al griego, pero menos idiomático; ''vivimos la verdad'' interpreta más de lo que dice el texto.'
theological_decisions:
- issue: Metáfora joánica de la oscuridad
  english_pob_reading: Retain 'walk in the darkness' as an ethical-spiritual metaphor rather than flattening it to merely immoral behavior.
  chosen_spanish_reading: Mantener 'caminamos en la oscuridad' como metáfora ética y espiritual, sin reducirla a una simple descripción de mala conducta.
  alternative_spanish_readings:
  - vivimos en pecado
  - andamos en tinieblas
  - llevamos una vida mala
  rationale: En Juan, la oscuridad es una categoría cargada que incluye oposición a Dios, engaño y desorden moral. La traducción conserva esa tensión metafórica en lugar de resolverla en una paráfrasis doctrinal.
  doctrine_reference: Preservar la tensión teológica del símbolo joánico de luz/oscuridad.
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés con equivalencias naturales en español, conservando el paralelismo, la metáfora de oscuridad y la expresión joánica 'hacer la verdad' en forma idiomática.
  spanish_consistency_notes:
  - Se mantuvo 'comunión' para κοινωνία, coherente con el registro eclesial del español bíblico contemporáneo.
  - Se evitó 'SEÑOR' o expansiones doctrinales; el pronombre 'él' refleja el griego y deja el antecedente al contexto.
  - La metáfora de 'caminar' se trasladó a 'caminamos' para conservar el aspecto de conducta continua en español natural.
  - '''Practicamos la verdad'' preserva el valor verbal de ποιεῖν sin volver el verso artificial.'
