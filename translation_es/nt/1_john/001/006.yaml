review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura condicional, la comunión con él, el contraste con caminar en una esfera de oscuridad/tinieblas, y la conclusión de mentira y falta de práctica de la verdad. Sin embargo, en 1 Juan la expresión ἐν τῷ σκότει se vierte más naturalmente y con mayor resonancia bíblica en español como 'en las tinieblas' o 'en tinieblas' que 'en la oscuridad'; además, la nota actual dice 'en tinieblas' pero el texto principal usa otra formulación menos idiomática para este registro.
  spanish_quality_summary: El español es claro y gramatical, pero 'caminamos en la oscuridad' suena algo menos bíblico y menos natural en este contexto joánico que 'andamos en tinieblas'. También conviene ajustar la nota para que la alternativa no contradiga la mejor opción principal y para reflejar que el artículo griego puede conservarse en español como 'las tinieblas'. El resto del versículo, especialmente 'tenemos comunión', 'mentimos' y 'no practicamos la verdad', es sólido y legible.
  glossary_alignment: No hay conflictos con los términos base del proyecto. 'Comunión' para κοινωνία es adecuado. 'La verdad' y 'practicamos' preservan bien el idiomatismo joánico con nota literal. La principal mejora terminológica es preferir 'tinieblas' sobre 'oscuridad' para σκότος en este contexto teológico joánico.
  issues:
  - severity: medium
    issue: '''en la oscuridad'' es menos idiomático y menos teológicamente resonante que ''en las tinieblas'' en este contexto joánico.'
    rationale: Aunque 'oscuridad' no es incorrecto, en 1 Juan el campo semántico luz/tinieblas está muy asentado en español bíblico y eclesial. 'Tinieblas' comunica mejor la categoría moral-espiritual sin sonar oscuro o arcaizante en este contexto.
  - severity: low
    issue: '''caminamos'' podría mejorarse a ''andamos'' junto con ''tinieblas'' para una colocación bíblica más natural.'
    rationale: Ambas opciones son fieles a περιπατῶμεν, pero 'andamos en tinieblas' es una combinación muy natural y ampliamente inteligible en español bíblico moderno.
  - severity: low
    issue: La nota al pie sobre la alternativa de σκότει debe alinearse con el texto revisado.
    rationale: Si el texto principal usa 'las tinieblas', la alternativa puede ser 'en tinieblas' y explicar el matiz del artículo griego, evitando tensión innecesaria entre texto y nota.
  revised_spanish_text: Si decimos que tenemos comunión con él y andamos en las tinieblas[a], mentimos y no practicamos la verdad[b].
  revised_footnotes:
