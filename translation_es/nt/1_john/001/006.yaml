revisions:
- from: Si decimos que tenemos comunión con él y caminamos en la oscuridad[a], mentimos y no practicamos la verdad[b].
  to: Si decimos que tenemos comunión con él y andamos en las tinieblas[a], mentimos y no practicamos la verdad[b].
  rationale: Se revisa 'caminamos en la oscuridad' a 'andamos en las tinieblas' para reflejar mejor el uso joánico de σκότος, conservar la fuerza del artículo griego y sonar más natural en español bíblico y eclesial sin caer en arcaísmo. Se mantiene 'no practicamos la verdad' con nota literal porque reproduce bien el idiomatismo joánico en español claro.
