  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Palabra» para λόγος está bien justificado. No intervienen aquí Yahvé/Mesías/esclavo u otros términos de control. La decisión sobre el referente divino implícito está alineada con la guía del POB.
