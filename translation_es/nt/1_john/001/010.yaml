translation:
  language: es
  text: Si decimos que no hemos pecado[a], lo llamamos mentiroso[b], y su palabra no está en nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no pecamos». El verbo griego está en perfecto, por lo que «no hemos pecado» expresa mejor una acción pasada con relevancia presente.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «su mensaje». El griego λόγος puede significar «palabra» o «mensaje»; se conserva «palabra» para mantener el vocabulario joánico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν εἴπωμεν
  english_pob_choice: If we say
  chosen_spanish: Si decimos
  alternatives_spanish:
  - Si afirmamos
  - Si dijéramos
  lexicon: BDAG
  rationale: La construcción condicional con ἐάν + subjuntivo aoristo expresa una condición general; en español, 'Si decimos' conserva la fuerza natural y directa del enunciado sin añadir matices de mayor énfasis como 'afirmamos'.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - —
  lexicon: BDAG
  rationale: Conjunción completiva estándar en español para introducir el contenido de lo dicho.
- source_word: οὐχ ἡμαρτήκαμεν
  english_pob_choice: we have not sinned
  chosen_spanish: no hemos pecado
  alternatives_spanish:
  - no pecamos
  - nunca hemos pecado
  lexicon: BDAG
  rationale: El perfecto griego comunica una acción pasada con relevancia presente. 'No hemos pecado' reproduce bien ese valor aspectual en español y evita el pasado simple, mientras que 'nunca hemos pecado' amplía indebidamente el alcance.
- source_word: ψεύστην
  english_pob_choice: a liar
  chosen_spanish: mentiroso
  alternatives_spanish:
  - un mentiroso
  - falso
  lexicon: BDAG
  rationale: En español, el predicativo tras 'hacer' suena más natural como 'lo hacemos mentiroso'. Mantiene la fuerza personal del sustantivo griego sin volverlo adjetivo. 'Mentiroso' preserva la acusación directa.
- source_word: ποιοῦμεν αὐτὸν
  english_pob_choice: we make him
  chosen_spanish: lo hacemos
  alternatives_spanish:
  - lo presentamos como
  - lo consideramos
  lexicon: BDAG
  rationale: ποιέω con acusativo predicativo puede significar 'hacer' en el sentido de convertir o declarar a alguien algo. En español, 'lo hacemos mentiroso' transmite esa relación sin perder la dureza del griego. El referente se mantiene como pronombre para respetar el texto y la audibilidad del contexto.
- source_word: ὁ λόγος αὐτοῦ
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - su Palabra
  lexicon: BDAG
  rationale: '''Palabra'' conserva la dicción joánica y resulta natural en español. ''Mensaje'' sería una alternativa explicativa, pero menos apta para mantener la resonancia del término λόγος.'
- source_word: οὐκ ἔστιν ἐν ἡμῖν
  english_pob_choice: is not in us
  chosen_spanish: no está en nosotros
  alternatives_spanish:
  - no mora en nosotros
  - no permanece en nosotros
  lexicon: BDAG
  rationale: La traducción literal preserva la imagen relacional del griego. 'No está en nosotros' es clara y fiel; 'mora' o 'permanece' introducirían una interpretación más teológica que el texto no explicita aquí.
theological_decisions:
- issue: Referente de αὐτόν y αὐτοῦ
  english_pob_reading: 'God is the referent: ''we make him a liar, and his word is not in us.'''
  chosen_spanish_reading: El referente implícito es Dios, aunque el texto mantiene el pronombre.
  alternative_spanish_readings:
  - Referente divino implícito no explicitado en la traducción
  - Dios es el referente directo en el texto
  rationale: En el contexto inmediato, la negación del pecado contradice el testimonio divino (1 Jn 1:5-10). La versión española conserva el pronombre para respetar la forma del griego y dejar que el contexto identifique al referente, sin resolverlo por sustitución interpretativa en el cuerpo del versículo.
  doctrine_reference: Primacía del texto original y preservación de la tensión contextual.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el audit trail inglés: conserva el valor perfecto de ἡμαρτήκαμεν con ''no hemos pecado'', mantiene la acusación directa de ψεύστην con ''mentiroso'' en construcción predicativa, y preserva λόγος como ''palabra'' por continuidad joánica. No hay revisiones previas en el paquete, y el consenso de revisión es alto.'
  spanish_consistency_notes:
  - Se usa 'Dios' en las decisiones teológicas, pero no se expande en el texto principal para respetar el pronombre del griego.
  - Se evita 'SEÑOR' porque no corresponde a este versículo; el texto habla de 'su palabra'.
  - '''Palabra'' se mantiene con minúscula en el texto principal para reflejar el uso contextual de λόγος, no un título tipográfico.'
