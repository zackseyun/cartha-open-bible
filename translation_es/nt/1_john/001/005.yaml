translation:
  language: es
  text: 'Y este es el mensaje que hemos oído de él y les anunciamos: que Dios es luz[a], y no hay ningunas tinieblas en él en absoluto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «les proclamamos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγγελία
  english_pob_choice: message
  chosen_spanish: mensaje
  alternatives_spanish:
  - anuncio
  lexicon: BDAG
  rationale: «Mensaje» es natural en español actual y conserva la idea de contenido comunicado. «Anuncio» también es posible, pero aquí suena menos idiomático como sustantivo del contenido transmitido.
- source_word: ἀκηκόαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - oímos
  lexicon: BDAG
  rationale: El perfecto griego expresa un hecho pasado con vigencia presente; «hemos oído» preserva mejor esa continuidad que el pretérito simple.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de Jesús
  - del Hijo
  lexicon: BDAG
  rationale: Se conserva el pronombre, como en el griego, sin suplir un antecedente explícito que introduciría interpretación al texto principal.
- source_word: ἀναγγέλλομεν
  english_pob_choice: announce
  chosen_spanish: anunciamos
  alternatives_spanish:
  - proclamamos
  - declaramos
  - reportamos
  lexicon: BDAG
  rationale: «Anunciamos» mantiene el vínculo léxico con ἀγγελία y comunica transmisión pública del contenido recibido. «Proclamamos» es posible, pero «anunciamos» refleja mejor la relación cognada del pasaje.
- source_word: ὁ θεὸς φῶς ἐστιν
  english_pob_choice: God is light
  chosen_spanish: Dios es luz
  alternatives_spanish:
  - Dios es la luz
  - Dios es luz pura
  - Dios es luz santa
  lexicon: BDAG
  rationale: El predicado es cualitativo en griego; «Dios es luz» conserva la metáfora sin convertirla en identificación con «la luz» ni expandirla explicativamente.
- source_word: σκοτία
  english_pob_choice: darkness
  chosen_spanish: oscuridad
  alternatives_spanish:
  - tinieblas
  lexicon: BDAG
  rationale: «Oscuridad» es claro y natural en español moderno, y preserva tanto el sentido literal como el metafórico. «Tinieblas» es más tradicional, pero más marcado y menos neutral.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  lexicon: BDAG
  rationale: «En él» es la forma española más natural y mantiene la fuerza relacional/metafórica sin sobreexplicar.
- source_word: οὐδεμία
  english_pob_choice: at all
  chosen_spanish: ninguna
  alternatives_spanish:
  - en absoluto
  - en lo más mínimo
  - para nada
  lexicon: BDAG
  rationale: En español, la combinación «no hay ninguna» ya intensifica suficientemente la negación. No hacía falta añadir un adverbio equivalente explícito para reproducir el énfasis idiomáticamente.
theological_decisions:
- issue: Metáfora predicativa «Dios es luz»
  english_pob_reading: Retained the metaphor directly without explanatory expansion.
  chosen_spanish_reading: 'Se conserva la metáfora directamente: «Dios es luz».'
  alternative_spanish_readings:
  - Dios es luz pura
  - Dios es luz santa
  rationale: El griego expresa la metáfora de forma desnuda y poderosa. Añadir calificativos interpretaría la imagen en vez de traducirla y reduciría su amplitud teológica y literaria.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica en vez de resolverla.'
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el audit trail inglés: mantiene el perfecto en «hemos oído», conserva el pronombre de origen en «de él», y reproduce la metáfora central sin expansión interpretativa. No hay revisiones previas aplicadas en el inglés, así que no se requiere incorporar cambios históricos.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός conforme al estándar del proyecto.
  - Se prefirió «luz» sin artículo para respetar el predicado cualitativo del griego.
  - Se evitó «tinieblas» por no ser necesario para la fuerza semántica aquí; «oscuridad» mantiene neutralidad y claridad.
  - La nota al pie se ancla en «anunciamos» para reflejar la alternativa verbal preservada por el audit trail inglés.
