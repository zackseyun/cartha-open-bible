revisions:
- from: 'Y este es el mensaje que hemos oído de él y les anunciamos: que Dios es luz[a], y no hay ninguna oscuridad en él.'
  to: 'Y este es el mensaje que hemos oído de él y les anunciamos: que Dios es luz[a], y no hay ningunas tinieblas en él en absoluto.'
  rationale: Se revisa la cláusula final para reflejar mejor el énfasis de οὐδεμία y la resonancia joánica de σκοτία mediante «tinieblas» y «en absoluto». También se mejora la naturalidad de la nota alternativa del verbo.
