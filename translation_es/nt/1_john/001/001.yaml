translation:
  language: es
  text: Lo que era desde el principio[a], lo que hemos oído, lo que hemos visto con nuestros ojos, lo que hemos contemplado y nuestras manos han tocado[b], acerca de la palabra de la vida—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Aquello que era desde el principio». El griego usa un pronombre relativo neutro, lo que puede apuntar ampliamente al testimonio apostólico acerca del Hijo, en vez de nombrarlo directamente como «él».
    reason: alternative_reading
  - marker: b
    text: O «la Palabra de la vida». La frase puede referirse personalmente al Hijo, en resonancia deliberada con Juan 1:1, o al mensaje que da vida acerca de él.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὃ / ὃ
  english_pob_choice: What
  chosen_spanish: Lo que
  alternatives_spanish:
  - Eso que
  - Aquello que
  lexicon: BDAG
  rationale: El pronombre relativo neutro amplio del griego se expresa mejor en español con una forma neutra e inclusiva como «lo que», que conserva la amplitud del testimonio sin forzar un referente masculino explícito en el texto principal.
- source_word: ἦν ἀπ’ ἀρχῆς
  english_pob_choice: was from the beginning
  chosen_spanish: era desde el principio
  alternatives_spanish:
  - ha sido desde el principio
  - era desde el origen
  lexicon: BDAG
  rationale: El imperfecto ἦν se traduce naturalmente con «era», manteniendo el trasfondo durativo. «Desde el principio» reproduce la fórmula joánica sin añadir matices no exigidos por el griego.
- source_word: ἀκηκόαμεν
  english_pob_choice: we have heard
  chosen_spanish: hemos oído
  alternatives_spanish:
  - hemos escuchado
  - oímos
  lexicon: BDAG
  rationale: El perfecto expresa una experiencia pasada con vigencia en el presente; «hemos oído» conserva bien ese valor testimonial en español.
- source_word: ἑωράκαμεν τοῖς ὀφθαλμοῖς ἡμῶν
  english_pob_choice: we have seen with our eyes
  chosen_spanish: hemos visto con nuestros ojos
  alternatives_spanish:
  - hemos contemplado con nuestros ojos
  - vimos con nuestros ojos
  lexicon: BDAG
  rationale: Se conserva el perfecto y la expresión enfática «con nuestros ojos» para mantener la concreción de la evidencia ocular.
- source_word: ἐθεασάμεθα
  english_pob_choice: we looked upon
  chosen_spanish: contemplamos
  alternatives_spanish:
  - miramos atentamente
  - observamos
  lexicon: BDAG
  rationale: θεάομαι implica mirar con atención, contemplar o mirar fijamente. «Contemplamos» comunica esa deliberación mejor que un simple «vimos», y suena más natural que un calco como «miramos sobre».
- source_word: αἱ χεῖρες ἡμῶν ἐψηλάφησαν
  english_pob_choice: our hands have touched
  chosen_spanish: nuestras manos han tocado
  alternatives_spanish:
  - nuestras manos han palpado
  - nuestras manos han manoseado
  lexicon: BDAG
  rationale: ψηλαφάω puede significar tocar, palpar o manejar. «Han tocado» es la opción más clara y sobria en español, preservando la fisicidad del testimonio sin sobreinterpretar.
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - con respecto a
  - sobre
  lexicon: BDAG
  rationale: En este contexto περί introduce el tema del testimonio apostólico; «acerca de» mantiene el registro formal y claro.
- source_word: τοῦ λόγου τῆς ζωῆς
  english_pob_choice: the word of life
  chosen_spanish: la palabra de la vida
  alternatives_spanish:
  - el mensaje de la vida
  - la Palabra de la vida
  lexicon: BDAG
  rationale: Se prefiere «palabra» en minúscula para no fijar en el texto principal una decisión de mayúscula que el griego no marca. «La palabra de la vida» conserva la ambigüedad productiva entre el anuncio de vida y la resonancia cristológica.
theological_decisions:
- issue: Alcance del pronombre neutro inicial y del referente de la cláusula
  english_pob_reading: Render with neuter 'What' to preserve the broad referent and avoid deciding too quickly for a masculine personal pronoun.
  chosen_spanish_reading: Render with «Lo que» rather than «El que» or «Él».
  alternative_spanish_readings:
  - El que era desde el principio
  - Aquello que era desde el principio
  rationale: El griego usa un relativo neutro, y la versión española debe dejar abierta la tensión entre el testimonio acerca del Hijo y la formulación impersonal que engloba todo el anuncio apostólico. «Lo que» preserva esa amplitud.
  doctrine_reference: 'Principio de la POB: preservar la tensión teológica cuando el texto la deja abierta.'
- issue: Identidad de «la palabra de la vida»
  english_pob_reading: Lowercase 'word of life' in the main text, leaving open whether the phrase refers personally to the Son or to the life-giving message concerning him.
  chosen_spanish_reading: «la palabra de la vida» en minúscula, con la misma apertura interpretativa.
  alternative_spanish_readings:
  - «la Palabra de la vida»
  - «el mensaje de la vida»
  rationale: El griego λόγος admite más de un matiz, y el contexto joánico permite tanto una resonancia personal como una referencia al mensaje proclamado. La minúscula evita resolver por tipografía lo que el texto no marca formalmente.
  doctrine_reference: Pauta de la POB sobre decisiones cristológicas con ambigüedad lexical mantenida.
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego SBLGNT y el audit trail en inglés, incluyendo la revisión que mantuvo la secuencia perfecta en «hemos oído / hemos visto / nuestras manos han tocado». En español se reflejó esa misma consistencia verbal con «hemos oído / hemos visto / han tocado».
  spanish_consistency_notes:
  - Se mantuvo la secuencia de perfectos en español para reflejar el valor testimonial continuo del griego.
  - Se prefirió un registro sobrio y eclesialmente legible, sin capitalizar «palabra» en el texto principal.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el versículo.
  - La puntuación con raya final conserva el carácter de frase abierta del original.
