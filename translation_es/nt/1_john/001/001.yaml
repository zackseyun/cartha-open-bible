    text: Or 'That which was from the beginning.' The Greek uses a neuter relative pronoun, which may point broadly to the apostolic witness concerning the Son rather than naming him directly as 'he.'
    reason: alternative_reading
  - marker: b
    text: Or 'the Word of life.' The phrase may refer personally to the Son, in deliberate resonance with John 1:1, or to the life-giving message concerning him.
    reason: lexical_alternative
