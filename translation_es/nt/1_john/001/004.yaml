lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Además
  - Y también
  lexicon: BDAG
  rationale: Conecta esta afirmación con lo anterior. En español, 'Y' es la coordinación más natural y fiel al enlace simple del griego.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El plural neutro se conserva mejor con 'estas cosas', que mantiene la referencia al conjunto del contenido escrito.
- source_word: γράφομεν
  english_pob_choice: are writing
  chosen_spanish: las escribimos
  alternatives_spanish:
  - estamos escribiendo
  - escribimos
  lexicon: BDAG
  rationale: El presente indicativo griego puede expresar acción en curso o presente epistolar. 'Las escribimos' es natural en español y conserva el valor presente sin forzar una perífrasis menos idiomática.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  - nosotros, precisamente
  lexicon: BDAG
  rationale: El pronombre explícito subraya el énfasis del griego, ya que la forma verbal ya marca primera persona plural.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - con el fin de que
  lexicon: BDAG
  rationale: Introduce propósito. 'Para que' es la equivalencia más natural en español y mantiene la relación final del original.
- source_word: χαρά
  english_pob_choice: joy
  chosen_spanish: gozo
  alternatives_spanish:
  - alegría
  - júbilo
  lexicon: BDAG
  rationale: '''Gozo'' es una equivalencia plenamente válida y habitual en registro bíblico en español, y preserva bien el valor teológico de χαρά en Juan.'
- source_word: ἡμῶν
  english_pob_choice: our
  chosen_spanish: nuestro
  alternatives_spanish:
  - vuestro
  lexicon: BDAG
  rationale: El texto base griego leído aquí es primera persona plural ('nuestro'). Se traduce directamente, y la variante 'vuestro' se conserva en nota.
- source_word: ᾖ πεπληρωμένη
  english_pob_choice: may be complete
  chosen_spanish: sea completo
  alternatives_spanish:
  - sea cumplido
  - llegue a su plenitud
  - esté completo
  lexicon: BDAG
  rationale: La construcción perifrática expresa un estado resultante de plenitud. En español, 'sea completo' comunica esa idea con claridad y sin perder el matiz de culminación.
theological_decisions:
- issue: Variante textual en el posesivo de la alegría/gozo
  english_pob_reading: our joy
  chosen_spanish_reading: nuestro gozo
  alternative_spanish_readings:
  - vuestro gozo
  rationale: El texto griego proporcionado lee ἡμῶν ('nuestro'). Como la tradición manuscrita también conoce la variante 'vuestro', se refleja en nota sin sustituir la lectura base.
  doctrine_reference: 'POB Translation Philosophy §3: preservar alternativas significativas en notas cuando existe una variante textual relevante.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del texto base; se mantiene la lectura griega proporcionada y la variante manuscrita se anota.'
  spanish_consistency_notes:
  - Se ha preferido 'gozo' para armonizar con el registro bíblico de Juan y evitar una posible restricción semántica de 'alegría'.
  - Se conserva el énfasis del pronombre explícito con 'nosotros', aunque el verbo ya lo indica.
  - La nota textual sigue de cerca la observación del aparato en inglés y evita resolver la variante en el texto principal.
