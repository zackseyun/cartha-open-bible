translation:
  language: es
  text: Y estas cosas las escribimos nosotros, para que nuestro gozo[a] llegue a ser completo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «vuestro gozo» en lugar de «nuestro gozo».
