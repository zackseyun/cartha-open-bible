translation:
  language: es
  text: Si decimos que no tenemos pecado[a], nos engañamos a nosotros mismos, y la verdad no está en nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «pecaminosidad»; el griego dice literalmente «pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - En caso de que
  lexicon: BDAG
  rationale: Introduce una condición real hipotética; en español, «si» reproduce de manera natural la estructura condicional del griego sin añadir matices temporales indebidos.
- source_word: εἴπωμεν
  english_pob_choice: we say
  chosen_spanish: decimos
  alternatives_spanish:
  - digamos
  - si dijéramos
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἐὰν funciona como protasis condicional; en español, el presente de indicativo en la cláusula introducida por «si» es idiomático y fiel al sentido condicional.
- source_word: ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecados
  - pecaminosidad
  lexicon: BDAG
  rationale: El singular sin artículo puede funcionar como sustantivo de masa. En español, «pecado» preserva mejor esa lectura que «pecados»; «pecaminosidad» sería más interpretativo de lo que exige el griego.
- source_word: οὐκ ἔχομεν
  english_pob_choice: we have no
  chosen_spanish: no tenemos
  alternatives_spanish:
  - no poseemos
  - carecemos de
  lexicon: BDAG
  rationale: La negación de posesión se expresa naturalmente como «no tenemos». Mantiene la fuerza de la afirmación negada sin forzar una formulación más literal que resulte menos clara.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: a nosotros mismos
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El reflexivo se vierte de modo explícito para conservar la referencia de vuelta al sujeto plural y la intensificación reflexiva del griego.
- source_word: πλανῶμεν
  english_pob_choice: we deceive
  chosen_spanish: nos engañamos
  alternatives_spanish:
  - nos extraviamos
  - nos inducimos a error
  lexicon: BDAG
  rationale: En construcción reflexiva, el verbo expresa autoengaño. «Nos engañamos» comunica con naturalidad el valor de πλανῶμεν en este contexto; «nos extraviamos» trasladaría la imagen de desviación más que la de autoengaño.
- source_word: ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: Se conserva el artículo, como en el griego. «La verdad» mantiene la posible resonancia joánica de verdad objetiva y fidelidad a la revelación sin explicitarla innecesariamente.
- source_word: οὐκ ἔστιν ἐν ἡμῖν
  english_pob_choice: is not in us
  chosen_spanish: no está en nosotros
  alternatives_spanish:
  - no permanece en nosotros
  - no habita en nosotros
  lexicon: BDAG
  rationale: La construcción existencial con ἐν se traduce de manera directa y natural. «En nosotros» preserva la dimensión interior y personal del dicho joánico sin resolver su alcance teológico.
theological_decisions:
- issue: Sentido de «no tenemos pecado»
  english_pob_reading: Rendered as 'sin' in the singular mass-noun sense, referring to the presence of sin in a person rather than merely isolated sinful acts.
  chosen_spanish_reading: «No tenemos pecado» se entiende como negación de la presencia de pecado en nosotros, no como referencia exclusiva a actos aislados.
  alternative_spanish_readings:
  - «no hemos cometido ningún pecado»
  - «no tenemos pecaminosidad»
  rationale: El griego usa ἁμαρτίαν con ἔχομεν, no un verbo de cometer. La traducción conserva la tensión joánica entre negar el pecado presente e indwelling y la confesión de pecado en contextos cercanos, sin homogeneizarla.
  doctrine_reference: Preservar la tensión textual de 1 Juan 1:8–10; primacía del original sobre la armonización doctrinal.
- issue: Alcance de «la verdad no está en nosotros»
  english_pob_reading: Kept as 'the truth is not in us' without expanding it to 'God's truth' or 'truthfulness.'
  chosen_spanish_reading: «la verdad no está en nosotros» se mantiene sin expansión explicativa.
  alternative_spanish_readings:
  - «no vivimos en la verdad»
  - «no somos veraces»
  - «la verdad de Dios no está en nosotros»
  rationale: La expresión griega es compacta y puede abarcar tanto verdad objetiva como sinceridad/fidelidad personal. La traducción no la resuelve para conservar su fuerza y ambigüedad productiva.
  doctrine_reference: Preservar la tensión teológica y retórica del texto joánico, evitando explicitar más de lo que el griego dice.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; esta versión sigue ese estado estable y mantiene la equivalencia óptima del audit trail inglés, con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «pecado» como sustantivo singular de masa, coherente con el contraste de 1 Juan 1:8 frente a 1:10.
  - Se conserva «la verdad» con artículo para reflejar el griego y la formulación joánica.
  - Se usa «nosotros» y el reflexivo explícito para una lectura clara y publicada en español neutral.
  - No se introduce terminología eclesiástica adicional ni una paráfrasis que diluya la afirmación condicional del versículo.
