translation:
  language: es
  text: Salieron de nosotros[a], pero no eran de nosotros; porque si hubieran sido de nosotros, habrían permanecido con nosotros[b]. Pero esto sucedió para que se hiciera manifiesto[c] que no todos son de nosotros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «salieron de entre nosotros».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «habrían continuado con nosotros».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «fuera revelado» o «fuera hecho manifiesto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ ἡμῶν
  english_pob_choice: from us / of us
  chosen_spanish: de nosotros
  alternatives_spanish:
  - de entre nosotros
  - de los nuestros
  lexicon: BDAG
  rationale: En español, «de nosotros» conserva la repetición del griego y puede abarcar tanto procedencia como pertenencia relacional. «De entre nosotros» explicita la salida física, pero hace menos natural la repetición posterior; «de los nuestros» interpreta más de lo que el texto dice.
- source_word: ἐξῆλθαν
  english_pob_choice: went out
  chosen_spanish: salieron
  alternatives_spanish:
  - se fueron
  - salieron de entre nosotros
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι indica una salida concreta. «Salieron» es natural en español y mantiene la imagen de partida sin añadir una interpretación teológica al verbo.
- source_word: οὐκ ἦσαν ἐξ ἡμῶν
  english_pob_choice: they were not of us
  chosen_spanish: no eran de nosotros
  alternatives_spanish:
  - no pertenecían a nosotros
  - no eran de los nuestros
  lexicon: BDAG
  rationale: «No eran de nosotros» reproduce la relación idiomática del griego sin resolverla en categorías más explícitas. «No pertenecían a nosotros» es más interpretativo; «de los nuestros» suena más natural pero reduce la transparencia de la repetición.
- source_word: μεμενήκεισαν ἂν μεθ’ ἡμῶν
  english_pob_choice: they would have remained with us
  chosen_spanish: habrían permanecido con nosotros
  alternatives_spanish:
  - habrían quedado con nosotros
  - habrían seguido con nosotros
  lexicon: BDAG
  rationale: «Permanecido» conserva el valor de μένω y su resonancia joánica de permanecer/abide. «Quedado» y «seguido» son posibles, pero pierden parte de esa carga léxica.
- source_word: φανερωθῶσιν
  english_pob_choice: might be made clear / revealed / made manifest
  chosen_spanish: se hiciera manifiesto
  alternatives_spanish:
  - se revelara
  - quedara manifiesto
  lexicon: BDAG
  rationale: El pasivo de φανερόω comunica revelación o manifestación. «Se hiciera manifiesto» es idiomático en español y preserva el sentido pasivo sin volverlo demasiado interpretativo.
- source_word: ὅτι οὐκ εἰσὶν πάντες ἐξ ἡμῶν
  english_pob_choice: that not all are of us
  chosen_spanish: que no todos son de nosotros
  alternatives_spanish:
  - que no todos pertenecen a nosotros
  - que no todos son de los nuestros
  lexicon: BDAG
  rationale: «No todos son de nosotros» mantiene la posición enfática de πάντες y la misma relación expresada antes. «Pertenecen a nosotros» explicita la idea, pero aleja el texto del lenguaje relacional del original.
theological_decisions:
- issue: Cómo reflejar la tensión entre salida visible y pertenencia genuina sin resolverla sistemáticamente
  english_pob_reading: Retain the relational phrase 'of us' rather than interpretively expanding it to 'truly believers' or 'really saved people.'
  chosen_spanish_reading: Conservar «de nosotros» en lugar de explicitar «verdaderos creyentes» o «personas realmente salvas».
  alternative_spanish_readings:
  - verdaderos creyentes
  - personas realmente salvas
  - no eran realmente de la iglesia
  rationale: El griego usa lenguaje de pertenencia/comunidad, no una categoría sistemática posterior. La traducción conserva esa tensión teológica y evita resolverla con una formulación confesional ajena al texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios textuales; el borrador mantiene alto acuerdo con la auditoría inglesa y conserva las opciones léxicas y teológicas documentadas.
  spanish_consistency_notes:
  - Se mantuvo «de nosotros» para reproducir la repetición del griego y la tensión entre procedencia y pertenencia.
  - Se eligió «permanecido» para reflejar μένω con su matiz joánico de permanecer.
  - «Se hiciera manifiesto» preserva el pasivo de φανερωθῶσιν sin cerrar la ambigüedad entre revelar y manifestar.
  - La puntuación sigue el uso español con comas y punto y coma, manteniendo la estructura contrastiva del versículo.
