review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del griego, conserva los dos presentes de γράφω, el perfecto en «han conocido / han vencido» y la referencia personal en «al maligno». Sin embargo, «jóvenes» no preserva adecuadamente el valor masculino específico de νεανίσκοι, dado que el expediente inglés documenta explícitamente «young men» frente a opciones inclusivas. Además, falta la nota alternativa que el POB inglés conserva para «him who is from the beginning».
  spanish_quality_summary: 'El español es claro y natural, con buen registro eclesial moderno. «Les escribo a ustedes» suena algo redundante pero aceptable. La reparación principal es terminológica: «jóvenes» debería especificarse como «jóvenes hombres» para mantener la referencia masculina sin caer en una formulación extraña. También conviene añadir la nota para la alternativa de lectura de «el que es desde el principio».'
  glossary_alignment: 'No hay conflicto con los términos globales principales. «Padres» y «al maligno» están bien alineados. La desviación relevante es νεανίσκοι: el proyecto favorece precisión de género cuando el griego es masculino plural, por lo que «jóvenes hombres» o equivalente es preferible a «jóvenes».'
  issues:
  - severity: medium
    issue: «jóvenes» neutraliza el masculino de νεανίσκοι
    rationale: El griego es masculino plural y el expediente inglés justifica explícitamente «young men» sobre opciones neutras. En español, «jóvenes» puede entenderse mixto; por fidelidad conviene explicitar la masculinidad.
  - severity: medium
    issue: Falta la nota alternativa para τὸν ἀπ’ ἀρχῆς
    rationale: 'El POB inglés preserva una nota significativa: «the one from the beginning» y la posible referencia al Hijo o más ampliamente a Dios. Debe mantenerse en español, especialmente porque la expresión queda deliberadamente abierta en el texto.'
  revised_spanish_text: Les escribo a ustedes, padres, porque han conocido al que es desde el principio[a]; les escribo a ustedes, jóvenes hombres, porque han vencido al maligno.
  revised_footnotes:
  - marker: a
    text: O «al que es del principio». La expresión probablemente se refiere al Hijo, aunque algunos la entienden más ampliamente como una referencia a Dios.
    reason: alternative_reading
  revision_rationale: Se revisa «jóvenes» a «jóvenes hombres» para conservar el masculino específico de νεανίσκοι conforme al expediente léxico del POB. Se añade la nota alternativa para «al que es desde el principio», preservando la misma apertura interpretativa documentada en inglés. No se requieren cambios adicionales.
