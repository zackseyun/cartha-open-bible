translation:
  language: es
  text: Les escribo a ustedes, padres, porque han conocido al que es desde el principio[a]; les escribo a ustedes, jóvenes hombres, porque han vencido al maligno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al que es del principio». La expresión probablemente se refiere al Hijo, aunque algunos la entienden más ampliamente como una referencia a Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: γράφω
  english_pob_choice: I write
  chosen_spanish: les escribo
  alternatives_spanish:
  - escribo
  - les estoy escribiendo
  lexicon: BDAG
  rationale: El presente epistolar se expresa de manera natural en español con presente simple. «Les escribo» conserva la inmediatez de la carta sin añadir una progresividad que el griego no exige.
- source_word: πατέρες
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - padres espirituales
  - ancianos
  lexicon: BDAG
  rationale: El vocativo plural significa literalmente «padres». En el contexto probablemente se dirige a hombres maduros en la fe, pero el término literal se mantiene en el texto principal para no reinterpretar la forma griega.
- source_word: ἐγνώκατε
  english_pob_choice: you have known
  chosen_spanish: han conocido
  alternatives_spanish:
  - conocen
  - han llegado a conocer
  lexicon: BDAG
  rationale: El perfecto griego comunica un conocimiento ya adquirido con efecto vigente. «Han conocido» preserva ese valor sin agregar la nuance de proceso que tendría «han llegado a conocer».
- source_word: τὸν ἀπ’ ἀρχῆς
  english_pob_choice: him who is from the beginning
  chosen_spanish: al que es desde el principio
  alternatives_spanish:
  - al que era desde el principio
  - al que es de desde el principio
  lexicon: BDAG
  rationale: La construcción articular funciona sustantivamente. En español, «al que es desde el principio» conserva la referencia personal abierta y la fuerza presente del enunciado, sin cerrar demasiado el referente.
- source_word: νεανίσκοι
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - muchachos
  - jóvenes varones
  lexicon: BDAG
  rationale: Aunque el griego es masculino plural, en español «jóvenes» es la forma más natural y publicable; el contexto ya marca que se trata de un grupo masculino dentro de la alocución.
- source_word: νενικήκατε
  english_pob_choice: you have overcome
  chosen_spanish: han vencido
  alternatives_spanish:
  - han sobrepasado
  - han conquistado
  lexicon: BDAG
  rationale: El perfecto indica una victoria lograda con resultado permanente. «Han vencido» es natural en español y conserva el campo semántico de victoria de νικάω, frecuente en Juan.
- source_word: τὸν πονηρόν
  english_pob_choice: the evil one
  chosen_spanish: al maligno
  alternatives_spanish:
  - al malo
  - al maligno[?]
  lexicon: BDAG
  rationale: La forma masculina singular sustantivada apunta a una figura personal de maldad, no a la abstracción «el mal». «El maligno» es la equivalencia española estable y clara para ese referente personal.
theological_decisions:
- issue: Referente de «al que es desde el principio»
  english_pob_reading: Rendered without making the referent explicit in the text
  chosen_spanish_reading: 'Se mantiene la expresión abierta: «al que es desde el principio»'
  alternative_spanish_readings:
  - «al Hijo, que es desde el principio»
  - «a Dios, que es desde el principio»
  rationale: El griego no nombra el referente. La redacción española conserva esa tensión joánica y deja al lector la identificación sugerida por el contexto, sin resolverla más allá de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica sin sobreespecificar.
- issue: Sentido de «el maligno»
  english_pob_reading: Personal evil adversary
  chosen_spanish_reading: 'Se traduce como un adversario personal: «el maligno»'
  alternative_spanish_readings:
  - «el mal»
  rationale: La forma gramatical masculina singular con artículo favorece un ser personal. La traducción evita reducirlo a un concepto abstracto y respeta la señal lingüística del griego.
  doctrine_reference: Primacía del dato morfológico sobre la tradición interpretativa.
translation_notes:
  revision_awareness: El borrador español sigue la revisión más reciente del POB inglés, que volvió de una progresiva («I am writing») a una forma simple («I write») para reflejar con mayor directitud el presente γράφω. También conserva la decisión revisada de no explicitar el referente de «al que es desde el principio» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene un registro bíblico claro, moderno y solemne, sin arcaísmos innecesarios.
  - Se conserva la simetría de los dos miembros del versículo con dos cláusulas coordinadas por punto y coma.
  - No se introduce nota al pie porque en español no se ha marcado ninguna alternativa textual dentro del versículo principal.
