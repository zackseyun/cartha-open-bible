- from: Les escribo a ustedes, padres, porque han conocido al que es desde el principio; les escribo a ustedes, jóvenes, porque han vencido al maligno.
  to: Les escribo a ustedes, padres, porque han conocido al que es desde el principio[a]; les escribo a ustedes, jóvenes hombres, porque han vencido al maligno.
