translation:
  language: es
  text: Les he escrito[a], niños, porque han llegado a conocer al Padre. Les he escrito, padres, porque han llegado a conocer al que es desde el principio[b]. Les he escrito, jóvenes, porque son fuertes, y la palabra de Dios permanece en ustedes[c], y han vencido al maligno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Les escribí» en todo el versículo. El aoristo griego puede rendirse con un pasado simple, pero aquí «les he escrito» refleja mejor el contexto epistolar y su relevancia presente.'
    reason: lexical_alternative
  - marker: b
    text: «El que es desde el principio» probablemente se refiere al Hijo preexistente en el uso joánico, aunque el texto no nombra explícitamente al referente.
    reason: alternative_reading
  - marker: c
    text: 'O: «habita en ustedes» para «permanece en ustedes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔγραψα
  english_pob_choice: I have written
  chosen_spanish: les he escrito
  alternatives_spanish:
  - les escribí
  lexicon: BDAG
  rationale: El aoristo epistolar en este contexto admite un perfecto de presente relevancia. «Les he escrito» conserva mejor esa fuerza que un pretérito simple, y además mantiene el paralelismo retórico de las tres repeticiones.
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - hijos
  - pequeños
  lexicon: BDAG
  rationale: «Niños» transmite de forma natural el apelativo afectivo y relacional del griego. «Hijos» introduciría una relación distinta con el hablante; «pequeños» añade un matiz no explícito.
- source_word: ἐγνώκατε
  english_pob_choice: you have known
  chosen_spanish: conocen
  alternatives_spanish:
  - han conocido
  - conocen y conocen
  lexicon: BDAG
  rationale: El perfecto griego expresa un conocimiento adquirido con permanencia. En español, el presente «conocen» comunica bien el estado resultante y suena más natural que un perfecto reiterado; la nota de tiempo y aspecto queda implícita en el contexto.
- source_word: τὸν πατέρα
  english_pob_choice: the Father
  chosen_spanish: al Padre
  alternatives_spanish:
  - al padre
  lexicon: BDAG
  rationale: Se traduce como título divino. La mayúscula señala la referencia titular sin convertirla en un agregado interpretativo.
- source_word: πατέρες
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - padres espirituales
  - ancianos
  lexicon: BDAG
  rationale: «Padres» preserva el término vocativo y la tríada retórica del griego. No se expande a «padres espirituales» porque el texto no lo explicita.
- source_word: τὸν ἀπ’ ἀρχῆς
  english_pob_choice: him who is from the beginning
  chosen_spanish: al que es desde el principio
  alternatives_spanish:
  - al que estaba desde el principio
  - al que desde el principio es
  lexicon: BDAG
  rationale: La construcción articular se conserva sin nombrar explícitamente el referente, manteniendo la tensión interpretativa joánica. «Es desde el principio» comunica bien la referencia a preexistencia sin sobreespecificar.
- source_word: νεανίσκοι
  english_pob_choice: young men
  chosen_spanish: jóvenes
  alternatives_spanish:
  - jovencitos
  - muchachos
  lexicon: BDAG
  rationale: «Jóvenes» es el equivalente directo y digno en español. A diferencia de «muchachos», no suena coloquial ni infantiliza el vocativo masculino plural.
- source_word: ἰσχυροί
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - fuertes y valientes
  - vigorosos
  lexicon: BDAG
  rationale: «Fuertes» es el adjetivo natural y directo en este contexto moral/espiritual. Mantiene la correspondencia con el griego sin añadir matices no expresados.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - el mensaje de Dios
  - el habla de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» es la formulación transparente y ampliamente inteligible. Mantiene abierta la referencia al mensaje proclamado sin estrecharla indebidamente.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - habita
  - se queda
  lexicon: BDAG
  rationale: «Permanece» comunica la duración y estabilidad del verbo μένω con un registro natural y sobrio. «Habita» sería posible, pero sugiere una imagen más espacial que el contexto no exige.
- source_word: νενικήκατε
  english_pob_choice: you have overcome
  chosen_spanish: han vencido
  alternatives_spanish:
  - han superado
  - han conquistado
  lexicon: BDAG
  rationale: El perfecto expresa una victoria ya lograda con vigencia actual. «Han vencido» reproduce bien ese valor y suena más idiomático en español que «han sobrevenido/han conquistado» en este contexto.
- source_word: τὸν πονηρόν
  english_pob_choice: the evil one
  chosen_spanish: al maligno
  alternatives_spanish:
  - al malo
  - al maligno
  lexicon: BDAG
  rationale: La forma masculina con artículo apunta a una referencia personal, no abstracta. «Maligno» es la manera natural en español para Satanás/el diablo en este contexto, preservando la lectura personal del griego.
theological_decisions:
- issue: Referente de «el que es desde el principio»
  english_pob_reading: Left implicit as 'him who is from the beginning' rather than identifying explicitly as Christ.
  chosen_spanish_reading: Se deja implícito como «el que es desde el principio», sin identificarlo explícitamente.
  alternative_spanish_readings:
  - Cristo
  - el Hijo
  - Dios
  rationale: Aunque el uso joánico sugiere una referencia personal preexistente, el texto no la nombra. Mantener la formulación implícita preserva la tensión teológica documentada en el inglés POB y evita resolverla por cuenta propia.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor temporal de los verbos en la triple repetición
  english_pob_reading: '''I have written'' better reflects the epistolary context and present relevance.'
  chosen_spanish_reading: «Les he escrito» mantiene el efecto epistolar y la relevancia actual.
  alternative_spanish_readings:
  - Les escribí
  rationale: En español, el pretérito perfecto compuesto puede comunicar mejor una acción concluida con pertinencia presente. Esto ayuda a conservar la repetición enfática del versículo sin perder la fuerza del aoristo epistolar.
  doctrine_reference: 'Translation philosophy §1: Preserve discourse force and present relevance.'
translation_notes:
  revision_awareness: 'Se siguió el último pasaje de revisión: el control cruzado indicó alta concordancia y no se registraron cambios necesarios; por ello la traducción española mantiene la misma solución exegética y discursiva del POB inglés, adaptada a un español natural y auditable.'
  spanish_consistency_notes:
  - 'Se mantuvo la tríada vocativa con paralelismo: niños / padres / jóvenes.'
  - Se preservó el valor epistolar del aoristo con pretérito perfecto compuesto donde suena natural en español.
  - Se tradujo el título divino con mayúscula en «Padre» y se mantuvo implícito el referente de «el que es desde el principio».
  - Se eligió «permanece» para μένω y se anotó la alternativa «habita» por transparencia terminológica.
  - Se optó por «al maligno» para τὸν πονηρόν por su lectura personal en el contexto joánico.
