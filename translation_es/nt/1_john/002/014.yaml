    rationale: 'El rastro léxico inglés documenta de manera explícita que el perfecto debe preservarse en lo posible: «you have known». En español, «han llegado a conocer» comunica el conocimiento adquirido con resultado vigente mejor que «conocen», y mantiene la intención exegética sin sonar antinatural.'
  - severity: low
    issue: «Niños» para παιδία puede sonar menos natural como vocativo comunitario
    rationale: Aunque es léxicamente posible, en 1 Juan el apelativo suele ser familiar/pastoral más que meramente etario. No es un error grave, pero en combinación con «padres» y «jóvenes» puede sentirse desigual.
  - severity: low
    issue: «Jóvenes» no marca el masculino explícito de νεανίσκοι tan claramente como «jóvenes hombres» o «hombres jóvenes»
    rationale: El POB inglés preserva la forma masculina con «young men». En español, «jóvenes» es idiomático y probablemente suficiente, así que no requiere cambio forzoso, pero conviene notar la leve pérdida de especificidad de género.
  revised_spanish_text: Les he escrito[a], niños, porque han llegado a conocer al Padre. Les he escrito, padres, porque han llegado a conocer al que es desde el principio[b]. Les he escrito, jóvenes, porque son fuertes, y la palabra de Dios permanece en ustedes[c], y han vencido al maligno.
