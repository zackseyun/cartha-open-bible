  text: ⸀ἔγραψα ὑμῖν, παιδία, ὅτι ἐγνώκατε τὸν πατέρα· ἔγραψα ὑμῖν, πατέρες, ὅτι ἐγνώκατε τὸν ἀπ’ ἀρχῆς· ἔγραψα ὑμῖν, νεανίσκοι, ὅτι ἰσχυροί ἐστε καὶ ὁ λόγος τοῦ θεοῦ ἐν ὑμῖν μένει καὶ νενικήκατε τὸν πονηρόν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/014.yaml
  text: I have written to you[a], children, because you have known the Father. I have written to you, fathers, because you have known him who is from the beginning. I have written to you, young men, because you are strong, and the word of God remains in you[c][b], and you have overcome the evil one.
  footnotes:
  - marker: a
    text: Or, 'I wrote to you' throughout the verse. The Greek aorist can be rendered as a simple past, but here 'I have written' better reflects the epistolary context and present relevance.
    reason: lexical_alternative
  - marker: b
    text: '''Him who is from the beginning'' likely refers to the preexistent Son in Johannine usage, though the text does not name the referent explicitly.'
    reason: alternative_reading
  - marker: c
    text: Or, 'abides in you' for 'remains in you.'
    reason: lexical_alternative
