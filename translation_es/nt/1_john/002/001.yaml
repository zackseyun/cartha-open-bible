source:
  edition: SBLGNT
  text: Τεκνία μου, ταῦτα γράφω ὑμῖν ἵνα μὴ ἁμάρτητε. καὶ ἐάν τις ἁμάρτῃ, παράκλητον ἔχομεν πρὸς τὸν πατέρα Ἰησοῦν Χριστὸν δίκαιον,
base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/001.yaml
  text: My little children[a], I write these things to you so that you may not sin. But if anyone does sin[b], we have an advocate with the Father—Jesus Messiah the Righteous One.
  footnotes:
  - marker: a
    text: Or 'advocate' may also be understood more broadly as 'helper,' 'counselor,' or 'comforter'; the Greek term is παράκλητος.
    reason: lexical_alternative
  - marker: b
    text: 'Traditional rendering: ''Jesus Christ.'' The Greek title Χριστός can mean ''Messiah'' or function name-like as ''Christ.'''
    reason: alternative_reading
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: b4fed6819cc3d7b348494597b174f86f303695644cb9e5d0f5c52edbcae28a4f
    timestamp: '2026-04-19T00:25:03Z'
    output_hash: ac76b89b557e42d3368e23af9d01c444d4b7c21d738e6ac20ea595b3cc160c6c
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:34Z'
    unchanged: false
    changes_summary: 'Changed ''I am writing'' to ''I write'' for closer correspondence to γράφω; changed ''Jesus Messiah'' to ''Jesus Christ'' for standard rendering of Ἰησοῦν Χριστόν in formal translation. Kept ''the Righteous One'' for δίκαιον. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Hijitos míos[a], les escribo estas cosas para que no pequen. Pero si alguno peca, tenemos un abogado[b] ante el Padre: Jesús Mesías, el Justo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Diminutivo afectuoso para Τεκνία μου; también puede entenderse como «hijitos» en un tono pastoral cercano.
    reason: lexical_alternative
  - marker: b
    text: 'παράκλητος tiene un campo semántico amplio: «abogado», «defensor», «intercesor», incluso «ayudador» o «consolador». Aquí se eligió «abogado» por el contexto de estar «ante el Padre».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τεκνία μου
  english_pob_choice: My little children
  chosen_spanish: Hijitos míos
  alternatives_spanish:
  - Mis hijos pequeños
  - Queridos hijos míos
  lexicon: BDAG
  rationale: τεκνία es un diminutivo afectuoso en plural; en español, 'Hijitos míos' conserva la ternura pastoral y la relación familiar sin sonar tan literal o rígido como otras opciones.
- source_word: ταῦτα γράφω ὑμῖν
  english_pob_choice: I write these things to you
  chosen_spanish: les escribo estas cosas
  alternatives_spanish:
  - les escribo esto
  - les estoy escribiendo estas cosas
  lexicon: BDAG
  rationale: γράφω está en presente y en español 'les escribo' comunica con naturalidad la acción epistolar en curso. 'Estas cosas' mantiene ταῦτα sin precisar de más el contenido.
- source_word: ἵνα μὴ ἁμάρτητε
  english_pob_choice: so that you may not sin
  chosen_spanish: para que no pequen
  alternatives_spanish:
  - a fin de que no pequen
  - para no pecar
  lexicon: BDAG
  rationale: ἵνα expresa propósito; 'para que no pequen' transmite bien el objetivo del autor sin sobrecargar la frase. Se conserva el plural y el sentido preventivo de la cláusula.
- source_word: ἐάν τις ἁμάρτῃ
  english_pob_choice: But if anyone does sin
  chosen_spanish: Y si alguno peca
  alternatives_spanish:
  - Pero si alguno peca
  - Y si alguien peca
  lexicon: BDAG
  rationale: El griego conecta la advertencia con la contingencia; en español, 'Y si alguno peca' suena natural y mantiene la apertura condicional. Se evita resolver la tensión del texto entre propósito y posibilidad real de pecado.
- source_word: παράκλητον
  english_pob_choice: advocate
  chosen_spanish: un abogado
  alternatives_spanish:
  - un defensor
  - un intercesor
  - un consolador
  lexicon: BDAG
  rationale: παράκλητος tiene un campo semántico amplio, con matiz de representación/ayuda legal o de intercesión. 'Abogado' es la opción más clara en español para expresar esa función de representación ante el Padre, sin excluir los matices de ayuda y apoyo.
- source_word: πρὸς τὸν πατέρα
  english_pob_choice: with the Father
  chosen_spanish: ante el Padre
  alternatives_spanish:
  - con el Padre
  - junto al Padre
  lexicon: BDAG
  rationale: πρός con acusativo puede indicar orientación o presencia relacional. 'Ante el Padre' comunica en español la idea de estar en su presencia con función de mediación, y evita una lectura meramente espacial de 'con'.
- source_word: Ἰησοῦν Χριστὸν
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός se traduce normalmente como 'Mesías' cuando funciona como título. Aquí mantiene el valor titular de la expresión y preserva la decisión terminológica del proyecto frente al uso tradicional 'Cristo'.
- source_word: δίκαιον
  english_pob_choice: the Righteous One
  chosen_spanish: el Justo
  alternatives_spanish:
  - el Justo y recto
  - el Righteous One
  lexicon: BDAG
  rationale: δίκαιον concuerda con la expresión cristológica y puede leerse como título sustantivado. 'El Justo' es la forma más natural y concisa en español para expresar esa cualidad personal y legal-moral.
theological_decisions:
- issue: Cómo traducir Χριστός en Ἰησοῦν Χριστόν
  english_pob_reading: Messiah rather than Christ, since the term functions as a title.
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El antecedente inglés y la política doctrinal del proyecto favorecen traducir Χριστός como 'Mesías' cuando actúa como título. En esta frase, 'Jesús Mesías' conserva el valor titular y evita tratar el término como nombre fijo sin justificación.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
- issue: Mantener la tensión entre el propósito de no pecar y la posibilidad real de pecado
  english_pob_reading: so that you may not sin / But if anyone does sin
  chosen_spanish_reading: para que no pequen / y si alguno peca
  alternative_spanish_readings:
  - para que no pequen / pero si alguno peca
  - para que no pequen / si alguno peca
  rationale: 'La traducción conserva ambas afirmaciones sin suavizarlas: el propósito moral de evitar el pecado y la contingencia explícita de que alguien llegue a pecar. No se introduce una idea de perfección sin pecado que el versículo no exige.'
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El inglés auditado pasó por una revisión que ajustó la frase verbal a un presente epistolar más cercano y luego restauró «Messiah» frente a «Christ» por coherencia doctrinal. La versión española sigue esa línea al usar presente simple («les escribo») y traducir Χριστός como «Mesías», manteniendo además la designación cristológica «el Justo».
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός conforme a la política terminológica del proyecto, no 'Cristo'.
  - Se usa 'abogado' para παράκλητος por el contexto forense-relacional; no se sustituye por un término eclesiástico más amplio.
  - 'Se conserva la tensión teológica del versículo: propósito de no pecar y provisión ante el pecado real.'
  - '''Yahvé'' no aparece en este versículo; no aplica aquí.'
  - Se usa español neutral y eclesialmente legible, evitando arcaísmos innecesarios.
