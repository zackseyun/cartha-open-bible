translation:
  language: es
  text: Porque todo lo que hay en el mundo —el deseo de la carne[a][b], el deseo de los ojos y el orgullo de la vida[c]— no proviene del Padre, sino del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la lujuria de la carne». El griego ἐπιθυμία puede significar deseo intenso, anhelo o lujuria; aquí se usa «deseo» para no limitarlo a un sentido sexual.
    reason: lexical_alternative
  - marker: b
    text: O «la naturaleza pecaminosa». En algunos contextos, «carne» puede referirse metafóricamente a la condición humana caída.
    reason: alternative_reading
  - marker: c
    text: O «la arrogancia de la vida» o «la pretensión de la vida mundana». La frase puede incluir orgullo en el estatus, las posesiones o el modo de vivir.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación causal del mandato previo. «Porque» preserva la fuerza explicativa de ὅτι con naturalidad en español.
- source_word: πᾶν τὸ ἐν τῷ κόσμῳ
  english_pob_choice: everything in the world
  chosen_spanish: todo lo que hay en el mundo
  alternatives_spanish:
  - todo lo del mundo
  - todo lo que está en el mundo
  lexicon: BDAG
  rationale: La construcción neutra singular tiene sentido colectivo. «Todo lo que hay en el mundo» conserva el alcance total sin sobrecargar la frase.
- source_word: κόσμῳ / κόσμου
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - sistema del mundo
  - orden mundano
  lexicon: BDAG
  rationale: Se mantiene el término básico «mundo» para no añadir una glosa interpretativa ajena al texto; la oposición con «el Padre» y el origen «del mundo» deja la carga teológica al contexto.
- source_word: ἐπιθυμία
  english_pob_choice: desire
  chosen_spanish: deseo
  alternatives_spanish:
  - lujuria
  - pasión
  - codicia
  lexicon: BDAG
  rationale: «Deseo» conserva el campo semántico amplio de ἐπιθυμία sin reducirlo a un sentido sexual o moralmente más estrecho que el griego no exige por sí solo.
- source_word: τῆς σαρκὸς
  english_pob_choice: of the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de la naturaleza pecaminosa
  - de la naturaleza humana caída
  lexicon: BDAG
  rationale: Se conserva «carne» como equivalente normal de σάρξ, manteniendo la tensión joánica entre lo humano y lo desordenado sin explicarla de más.
- source_word: τῶν ὀφθαλμῶν
  english_pob_choice: of the eyes
  chosen_spanish: de los ojos
  alternatives_spanish:
  - de la vista
  lexicon: BDAG
  rationale: La expresión es transparente y debe reflejar el plural griego de forma directa.
- source_word: ἀλαζονεία
  english_pob_choice: pride
  chosen_spanish: arrogancia
  alternatives_spanish:
  - vanagloria
  - jactancia
  - orgullo
  lexicon: BDAG
  rationale: Aunque el inglés POB redujo la frase a «pride», el griego señala presunción ostentosa. «Arrogancia» comunica mejor la idea de autosuficiencia y ostentación implícita en ἀλαζονεία.
- source_word: τοῦ βίου
  english_pob_choice: of life
  chosen_spanish: de la vida
  alternatives_spanish:
  - de la existencia
  - de la manera de vivir
  lexicon: BDAG
  rationale: «Vida» reproduce de manera natural βίος y mantiene la ambigüedad entre vida cotidiana, medios de vida y estilo de vida, sin resolverla interpretativamente.
- source_word: οὐκ ἔστιν ἐκ τοῦ πατρός
  english_pob_choice: is not from the Father
  chosen_spanish: no proviene del Padre
  alternatives_spanish:
  - no es del Padre
  - no viene del Padre
  lexicon: BDAG
  rationale: ἐκ expresa origen. «Proviene de» hace explícita esa fuente/origen en español y evita una lectura meramente relacional o estática.
- source_word: τοῦ πατρός
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Dios Padre
  lexicon: BDAG
  rationale: En el contexto joánico, «el Padre» nombra naturalmente a Dios sin necesidad de expandirlo.
- source_word: ἀλλὰ ἐκ τοῦ κόσμου ἐστίν
  english_pob_choice: but is from the world
  chosen_spanish: sino del mundo
  alternatives_spanish:
  - pero proviene del mundo
  - sino que procede del mundo
  lexicon: BDAG
  rationale: En español, la elipsis del verbo tras una construcción paralela resulta natural y mantiene el contraste de origen con la cláusula anterior.
theological_decisions:
- issue: Cómo traducir σάρξ sin resolver de antemano su alcance moral/antropológico
  english_pob_reading: flesh / possible 'sinful nature' alternative in footnote
  chosen_spanish_reading: carne, con nota sobre la posible lectura de naturaleza pecaminosa
  alternative_spanish_readings:
  - naturaleza pecaminosa
  - naturaleza humana caída
  rationale: La opción principal conserva la forma lexical más cercana al griego y evita imponer un sistema antropológico que el verso no explicita. La nota preserva la tensión interpretativa que el inglés POB documenta.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ; preserve theological tension rather than resolve it.'
- issue: Cómo rendir ἀλαζονεία τοῦ βίου con precisión sin suavizar la crítica
  english_pob_reading: the pride of life / possible 'arrogance of life' or 'pretension of worldly living'
  chosen_spanish_reading: la arrogancia de la vida
  alternative_spanish_readings:
  - el orgullo de la vida
  - la pretensión de la vida mundana
  rationale: «Arrogancia» refleja mejor la presunción autoexaltada de ἀλαζονεία que un simple «orgullo». «De la vida» conserva la literalidad y deja abierta la relación con estilo de vida, bienes o estatus.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve lexical tension where the source is broader than one narrow gloss.'
- issue: Mantener κόσμος como 'mundo' sin glosa doctrinal
  english_pob_reading: world
  chosen_spanish_reading: mundo
  alternative_spanish_readings:
  - sistema del mundo
  - orden mundano
  rationale: El contraste con «el Padre» basta para comunicar el origen opuesto. Introducir una expansión como «sistema del mundo» sería interpretativo y excedería el texto.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La traducción inglesa fue revisada desde «boastful pride of life» a «the pride of life» para acercarse más a ἀλαζονεία τοῦ βίου. En español se optó por «arrogancia de la vida», que mantiene la fuerza de ἀλαζονεία sin añadir un matiz más amplio que el griego no requiere.
  spanish_consistency_notes:
  - Se mantiene «Padre» para τοῦ πατρός, conforme al uso joánico y al patrón del proyecto.
  - Se usa «mundo» para κόσμος, sin glosa interpretativa añadida en el texto principal.
  - Se preserva «carne» en el texto principal y se documenta la alternativa contextual «naturaleza pecaminosa» en nota.
  - La elipsis verbal en la segunda cláusula («sino del mundo») evita repetición innecesaria y sigue el paralelismo del griego.
  - Las notas con [a], [b], [c] están ancladas en los términos afectados y no se reutilizan.
