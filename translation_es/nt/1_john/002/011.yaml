translation:
  language: es
  text: Pero el que odia a su hermano está en la oscuridad y anda en la oscuridad[a], y no sabe a dónde va, porque la oscuridad le ha cegado los ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermano o hermana»; el griego dice «hermano» y probablemente se refiere a un miembro de la comunidad cristiana.
    reason: lexical_alternative
lexical_decisions:
- source_word: μισῶν
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - está odiando
  lexicon: BDAG
  rationale: El participio presente sustantivado con ὁ expresa una disposición característica; en español, «el que odia» comunica mejor esa condición estable que una perífrasis progresiva.
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - creyente
  lexicon: BDAG
  rationale: Se conserva el singular masculino del griego y el término habitual de parentesco espiritual. La posible referencia comunitaria más amplia se deja para nota, sin neutralizar el texto principal.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en oscuridad
  lexicon: BDAG
  rationale: Se mantiene el artículo implícito en español mediante «la oscuridad», preservando el valor figurado y la repetición enfática del griego.
- source_word: περιπατεῖ
  english_pob_choice: walks
  chosen_spanish: anda
  alternatives_spanish:
  - camina
  - vive
  lexicon: BDAG
  rationale: «Anda» conserva la imagen bíblica de conducta o modo de vida con naturalidad en español, sin perder la metáfora de andar como forma de vivir.
- source_word: οὐκ οἶδεν ποῦ ὑπάγει
  english_pob_choice: does not know where he is going
  chosen_spanish: no sabe a dónde va
  alternatives_spanish:
  - no sabe adónde va
  - no sabe hacia dónde se dirige
  lexicon: BDAG
  rationale: La formulación española es natural y mantiene el sentido de rumbo desconocido. «A dónde» refleja bien la orientación del movimiento implícito en ὑπάγει.
- source_word: ἐτύφλωσεν
  english_pob_choice: has blinded
  chosen_spanish: ha cegado
  alternatives_spanish:
  - ha dejado ciego
  - cegó
  lexicon: BDAG
  rationale: «Ha cegado» expresa el efecto resultante de la acción de la oscuridad sobre los ojos, con un pasado perfecto que subraya el estado presente.
- source_word: τοὺς ὀφθαλμοὺς αὐτοῦ
  english_pob_choice: his eyes
  chosen_spanish: los ojos
  alternatives_spanish:
  - sus ojos
  lexicon: BDAG
  rationale: El posesivo se expresa de manera natural con «le» en la construcción verbal española («le ha cegado los ojos»), preservando la imagen concreta sin forzar una repetición posesiva.
theological_decisions:
- issue: Imagen moral-teológica de la oscuridad
  english_pob_reading: Render σκοτία literally as 'darkness' rather than interpretively as 'evil' or 'spiritual darkness.'
  chosen_spanish_reading: Traducir σκοτία literalmente como «oscuridad», no como «mal» ni como una explicación doctrinal más amplia.
  alternative_spanish_readings:
  - mal
  - oscuridad espiritual
  - tinieblas
  rationale: La metáfora joánica se conserva sin estrecharla. «Oscuridad» permite mantener el contraste con la luz y el peso teológico de la imagen sin explicitarla más de lo que el griego hace.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Referente de «hermano»
  english_pob_reading: Retain 'brother' in the main text with representative force, rather than replacing it with an inclusive paraphrase.
  chosen_spanish_reading: Mantener «hermano» en el texto principal, con posible alcance representativo para la comunidad creyente.
  alternative_spanish_readings:
  - hermano o hermana
  - creyente
  - prójimo
  rationale: El griego es masculino singular y el POB en inglés preserva esa forma. En español se mantiene la misma referencia básica y la ampliación semántica, si se desea, queda para nota.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el texto inglés auditado y conserva sus decisiones léxicas y teológicas principales sin introducir ampliaciones.
  spanish_consistency_notes:
  - Se mantuvo la secuencia verbal y la repetición de «en la oscuridad» para reflejar el paralelismo del griego.
  - Se prefirió un español claro y publicable, pero sin suavizar la fuerza moral de μισῶν ni la imagen concreta de los ojos cegados.
  - La nota al pie se ancla en «hermano» para reflejar la alternativa documentada en el audit trail inglés.
  - Se evitó traducir «Yahvé», «Mesías» u otros términos no presentes en este versículo.
