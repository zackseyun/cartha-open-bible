    issue: Posible alternativa estilística «tinieblas» en vez de «oscuridad».
    rationale: «Tinieblas» podría sonar más tradicional en contexto joánico, pero «oscuridad» es fiel al sentido, moderno y coherente con la filosofía del proyecto; no requiere cambio.
