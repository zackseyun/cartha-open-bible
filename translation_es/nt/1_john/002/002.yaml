translation:
  language: es
  text: Y él mismo es el sacrificio expiatorio por nuestros pecados[a], y no solo por los nuestros, sino también por los de todo el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «propiciación»; también entendido por algunos como «expiación».
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  - él solo
  lexicon: BDAG
  rationale: El valor intensivo de αὐτός se conserva mejor en español con «él mismo», que destaca la acción personal de Jesús sin volver la frase rígida o forzada.
- source_word: ἱλασμός
  english_pob_choice: atoning sacrifice
  chosen_spanish: sacrificio expiatorio
  alternatives_spanish:
  - sacrificio de expiación
  - propiciación
  - expiación
  lexicon: BDAG
  rationale: En español, «sacrificio expiatorio» comunica de manera clara el campo sacrificial y expiatorio de ἱλασμός. Se evita imponer un tecnicismo eclesiástico en el cuerpo principal, pero se preserva la tensión semántica con una nota.
- source_word: περὶ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: for our sins
  chosen_spanish: por nuestros pecados
  alternatives_spanish:
  - por nuestros pecados
  - respecto de nuestros pecados
  - con respecto a nuestros pecados
  lexicon: BDAG
  rationale: Con ἱλασμός, περί expresa relación efectiva con el pecado y funciona naturalmente en español como «por». «Pecados» mantiene el plural y el alcance concreto del término griego.
- source_word: τῶν ἡμετέρων
  english_pob_choice: ours
  chosen_spanish: los nuestros
  alternatives_spanish:
  - nuestros pecados
  - los de nosotros
  lexicon: BDAG
  rationale: El adjetivo posesivo griego queda elíptico y remite a los pecados ya mencionados. «Los nuestros» conserva esa elipsis en español y evita repetir innecesariamente el sustantivo.
- source_word: ὅλου τοῦ κόσμου
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - todo el mundo
  lexicon: BDAG
  rationale: «Todo el mundo» transmite el alcance total de κόσμος sin estrecharlo interpretativamente. Mantiene la amplitud del original y la lectura abierta del texto.
- source_word: δὲ μόνον ἀλλὰ καὶ
  english_pob_choice: not for ours only but also
  chosen_spanish: no solo ... sino también
  alternatives_spanish:
  - no solamente ... sino también
  - no solo ... pero también
  lexicon: BDAG
  rationale: La correlación adversativa se expresa con una construcción natural en español que conserva el énfasis del griego y su contraste progresivo.
theological_decisions:
- issue: Alcance de «todo el mundo»
  english_pob_reading: Retain the full expression 'the whole world' without interpretive narrowing.
  chosen_spanish_reading: Mantener «todo el mundo» sin limitarlo a un grupo definido.
  alternative_spanish_readings:
  - personas de todo el mundo
  - los elegidos de todo el mundo
  rationale: El griego no introduce una restricción explícita; por eso la traducción debe preservar la amplitud del enunciado y no resolver por adelantado la tensión interpretativa.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla fuera del texto; no imponer un distintivo denominacional.
- issue: Terminología de ἱλασμός
  english_pob_reading: Use 'atoning sacrifice' in the main text.
  chosen_spanish_reading: Usar «sacrificio expiatorio» en el texto principal.
  alternative_spanish_readings:
  - propiciación
  - expiación
  rationale: «Sacrificio expiatorio» es suficientemente claro para lectores contemporáneos y conserva la idea sacrificial sin cerrar indebidamente el debate técnico sobre el matiz exacto del término.
  doctrine_reference: Lenguaje moderno legible y manejo cuidadoso de términos en disputa.
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete fuente griego y la decisión auditada en inglés, manteniendo la amplitud de κόσμος y la ambigüedad lexical de ἱλασμός sin reducirlas. No se registran revisiones aplicadas en el pasaje base; por eso se conserva una solución estable y publicable.
  spanish_consistency_notes:
  - Se usa «él mismo» para reflejar el énfasis de αὐτός, como en el audit trail inglés.
  - Se prefiere «sacrificio expiatorio» como equivalente principal de ἱλασμός, con nota alternativa para «propiciación» y «expiación».
  - «Por nuestros pecados» y «los nuestros» mantienen la elipsis del segundo miembro sin sobreexplicar.
  - «Todo el mundo» conserva la extensión global de κόσμος sin restringirla interpretativamente.
  - La puntuación reproduce la doble correlación del griego y resulta natural para lectura eclesial en español.
