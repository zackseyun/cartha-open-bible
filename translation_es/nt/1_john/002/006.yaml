translation:
  language: es
  text: El que dice que permanece en él debe también andar como aquel anduvo[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «permanece unido a él». El verbo μένω es un término clave en Juan para continuar, permanecer o habitar en una relación.
    reason: lexical_alternative
  - marker: b
    text: «Aquel» conserva la fuerza demostrativa enfática de ἐκεῖνος; el referente es Jesús por el contexto inmediato.
    reason: alternative_reading
  - marker: c
    text: «Andar» es una metáfora bíblica del modo de vida; esto es, uno debe vivir como vivió Jesús.
    reason: cultural_note
lexical_decisions:
- source_word: ὁ λέγων
  english_pob_choice: The one who says
  chosen_spanish: El que dice
  alternatives_spanish:
  - Quien dice
  - El que afirma
  lexicon: BDAG
  rationale: El participio articular funciona de manera sustantiva y presenta un caso representativo; «El que dice» conserva esa estructura y el alcance genérico sin recargar el español.
- source_word: ἐν αὐτῷ μένειν
  english_pob_choice: he remains in him
  chosen_spanish: permanece en él
  alternatives_spanish:
  - abide en él
  - permanece en él
  lexicon: BDAG
  rationale: μένω en Juan suele expresar permanecer/continuar en relación. «Permanece» es natural en español moderno y mantiene el sentido relacional y perseverante; «en él» conserva el pronombre singular masculino del griego.
- source_word: ὀφείλει
  english_pob_choice: ought
  chosen_spanish: debe
  alternatives_spanish:
  - debería
  - está obligado a
  lexicon: BDAG
  rationale: Aquí ὀφείλω expresa obligación moral. «Debe» comunica con claridad esa obligación en español sin sonar excesivamente jurídico; se preserva la fuerza ética del contexto.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - de la misma manera que
  lexicon: BDAG
  rationale: καθώς marca correspondencia o modo. «Tal como» expresa bien la comparación ejemplar y suena natural en español bíblico actual.
- source_word: ἐκεῖνος
  english_pob_choice: that one
  chosen_spanish: aquel
  alternatives_spanish:
  - ese
  - él
  lexicon: BDAG
  rationale: «Aquel» conserva el matiz demostrativo enfático de ἐκεῖνος mejor que un simple «él». En este contexto el referente es Jesús por el marco inmediato; el demostrativo mantiene la distancia reverente sin imponer una convención tipográfica ajena al griego.
- source_word: περιεπάτησεν ... περιπατεῖν
  english_pob_choice: walked ... to walk
  chosen_spanish: anduvo ... andar
  alternatives_spanish:
  - vivió ... vivir
  - se condujo ... conducirse
  lexicon: BDAG
  rationale: περιπατέω es una metáfora bíblica del modo de vida. «Anduvo» / «andar» preserva esa imagen intertextual y, en español, mantiene la idea de conducta habitual sin explicitarla en exceso.
- source_word: καὶ αὐτὸς
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - él también
  - igualmente
  lexicon: BDAG
  rationale: El αὐτός añade énfasis al sujeto en correspondencia con el modelo. «También» transmite bien el valor aditivo de manera idiomática, sin perder la relación de imitación.
theological_decisions:
- issue: Referente de αὐτῷ / ἐκεῖνος
  english_pob_reading: Both pronouns are rendered with lowercase 'him' / 'that one,' with the referent understood as Christ/Jesus from the immediate context.
  chosen_spanish_reading: Ambos pronombres se entienden como referencia a Jesús, y se traducen con «él» / «aquel» sin mayúsculas devocionales.
  alternative_spanish_readings:
  - «Él» con mayúscula para marcar deidad
  - «he» / «él» sin el demostrativo enfático
  rationale: El contexto inmediato presenta a Jesús como el modelo de vida que el creyente debe imitar. Sin embargo, en español no se introduce una mayúscula reverencial que no está señalada por el griego; «aquel» conserva la fuerza demostrativa de ἐκεῖνος y permite que el referente cristológico quede claro por contexto.
  doctrine_reference: Afirmaciones; filosofía de traducción §§1, 3, 6
- issue: Representación del sujeto singular genérico
  english_pob_reading: Use 'The one who says he remains in him' rather than a pluralized or gender-neutral recast.
  chosen_spanish_reading: 'Se mantiene el singular genérico: «El que dice…»'
  alternative_spanish_readings:
  - «Quienes dicen…»
  - «La persona que dice…»
  rationale: El griego usa un participio masculino singular con valor representativo. El español conserva esa forma singular, que suena natural y respeta mejor la estructura del original sin pluralizar ni neutralizar indebidamente.
  doctrine_reference: Filosofía de traducción §4
- issue: Valor metafórico de περιπατέω
  english_pob_reading: '''Walk'' is a biblical metaphor for one’s manner of life; that is, one ought to live as Jesus lived.'
  chosen_spanish_reading: «Andar» se conserva como metáfora del modo de vida.
  alternative_spanish_readings:
  - «Vivir»
  - «Conducirse»
  rationale: En español bíblico, «andar» mantiene con claridad la metáfora de conducta y estilo de vida. Traducirlo como «vivir» explicaría el sentido, pero perdería parte de la imagen verbal que el griego usa de forma consistente.
  doctrine_reference: Filosofía de traducción §§1, 6
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el audit trail inglés: se conservó la fuerza genérica del participio articular, la obligación moral de ὀφείλει, el valor comparativo de καθώς, la demostratividad enfática de ἐκεῖνος y la metáfora ética de περιπατέω. No hubo revisiones posteriores que alteraran el sentido base.'
  spanish_consistency_notes:
  - Se usa «permanece» para μένω, en coherencia con el uso joánico habitual en español.
  - Se usa «andar» para περιπατέω para mantener consistencia metafórica con otros pasajes éticos del NT.
  - Se evita «Cristo» porque el audit trail identifica el referente inmediato como Jesús y el griego aquí no exige el título.
  - Se mantiene el singular genérico masculino, conforme al sujeto gramatical del griego.
