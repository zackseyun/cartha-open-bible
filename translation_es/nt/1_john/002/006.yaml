review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: sujeto genérico singular («El que dice»), permanencia relacional («permanece en él»), obligación moral («debe»), comparación ejemplar («tal como»), fuerza demostrativa de ἐκεῖνος («aquel») y la metáfora ética de περιπατέω («andar»). Sin embargo, la cláusula final omite el infinitivo explícito περιπατεῖν después de «aquel anduvo», de modo que no expresa de forma plena que el que afirma permanecer en él también debe andar así.'
  spanish_quality_summary: El español es claro, natural y de registro digno. «El que dice… debe también andar…» suena bien en español eclesial contemporáneo. La única reparación necesaria es añadir el segundo verbo infinitivo para evitar una elipsis excesiva que debilita la correspondencia con el griego y con la traducción inglesa auditada.
  glossary_alignment: 'La terminología está alineada con las decisiones POB: «permanece» para μένω, «debe» para ὀφείλει, «aquel» para ἐκεῖνος, y «andar» para περιπατέω como metáfora de conducta. No hay conflicto con los glosarios troncales del proyecto.'
  issues:
  - severity: medium
    issue: Falta el infinitivo final correspondiente a περιπατεῖν
    rationale: 'El griego dice literalmente que el que afirma permanecer en él «debe… también andar» como aquel anduvo. El español actual («debe también andar tal como aquel anduvo») es aceptable, pero queda más fiel y más claro si se explicita la repetición implícita del verbo en la comparación: «debe también andar así como aquel anduvo» o mejor «debe también andar tal como aquel anduvo». No obstante, para reflejar mejor la construcción y la auditoría inglesa conviene insertar «él mismo»/«también» de forma que la obligación del sujeto quede inequívoca. La mejora más precisa es ajustar la redacción a «debe también andar como aquel anduvo» manteniendo el infinitivo final como núcleo de la obligación.'
  - severity: low
    issue: La nota al pie a no presenta una alternativa real
    rationale: La nota dice «O «permanece en él»», que repite exactamente la lectura principal. La auditoría inglesa preserva la alternativa «abides in him». En español conviene ofrecer una alternativa real, como «permanece»/«permanece unido a él» o mejor «habita en él»/«permanece en él», según se quiera conservar la amplitud semántica de μένω.
