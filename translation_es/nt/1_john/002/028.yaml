base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/028.yaml
  text: And now[a], little children, remain in him, so that if he is revealed[c][b], we may have confidence and not shrink away from him in shame at his coming.
  footnotes:
  - marker: a
    text: Or 'if he appears.' The Greek verb is passive ('is revealed'/'is made manifest').
    reason: lexical_alternative
  - marker: b
    text: Or 'be ashamed before him.' The phrase may also be understood more literally as shame in his presence rather than shrinking away from him.
    reason: alternative_reading
  - marker: c
    text: Or 'at his presence.' In this context, 'coming' reflects the eschatological sense of the Greek term.
    reason: lexical_alternative
