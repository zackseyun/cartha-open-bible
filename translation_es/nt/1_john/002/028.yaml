translation:
  language: es
  text: Y ahora[a], hijitos, permanezcan en él, para que, si se manifieste[c][b], tengamos confianza y no nos apartemos de él avergonzados ante su venida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si aparece». El verbo griego está en voz pasiva («es revelado» / «es hecho manifiesto»).
    reason: lexical_alternative
  - marker: b
    text: O «delante de él». La frase también puede entenderse más literalmente como vergüenza en su presencia, más que como apartarse de él.
    reason: alternative_reading
  - marker: c
    text: O «en su presencia». En este contexto, «venida» refleja el sentido escatológico del término griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεκνία
  english_pob_choice: little children
  chosen_spanish: hijitos
  alternatives_spanish:
  - amados hijos
  - niños
  lexicon: BDAG
  rationale: El diminutivo griego expresa tono afectuoso y pastoral. «Hijitos» conserva mejor esa cercanía filial que «hijos» o una paráfrasis más explicativa.
- source_word: μένετε
  english_pob_choice: remain
  chosen_spanish: permanezcan
  alternatives_spanish:
  - continúen
  - sigan
  lexicon: BDAG
  rationale: «Permanezcan» mantiene el valor durativo de μένω y su fuerza característica en Juan, sin caer en un calco arcaico como «abide».
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - unidos con él
  lexicon: BDAG
  rationale: La preposición se traduce de forma directa y relacional. «En él» preserva la formulación joánica sin explicitar más de lo que el griego dice.
- source_word: φανερωθῇ
  english_pob_choice: he is revealed
  chosen_spanish: se manifieste
  alternatives_spanish:
  - aparezca
  - sea revelado
  lexicon: BDAG
  rationale: La pasiva griega se conserva con una forma reflexiva natural en español. «Se manifieste» expresa la aparición escatológica con buena fluidez, mientras que «sea revelado» suena más pesado.
- source_word: σχῶμεν παρρησίαν
  english_pob_choice: we may have confidence
  chosen_spanish: tengamos confianza
  alternatives_spanish:
  - tengamos seguridad
  - tengamos valentía
  lexicon: BDAG
  rationale: «Confianza» es el equivalente más natural de παρρησία en este contexto. «Valentía» puede sonar más combativo y «seguridad» más interpretativo.
- source_word: αἰσχυνθῶμεν
  english_pob_choice: shrink away from him in shame
  chosen_spanish: nos apartemos de él avergonzados
  alternatives_spanish:
  - nos avergoncemos delante de él
  - retrocedamos de él con vergüenza
  lexicon: BDAG
  rationale: El verbo incluye vergüenza, y junto con ἀπ’ αὐτοῦ sugiere retirada o apartarse en su presencia. «Nos apartemos de él avergonzados» conserva esa tensión sin afirmar más de lo que el griego exige.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - ante él
  - lejos de él
  lexicon: BDAG
  rationale: «De él» reproduce de manera sencilla la relación marcada por ἀπό. En español, la idea de movimiento implícito se recoge en «nos apartemos».
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En contexto escatológico, παρουσία se entiende naturalmente como la venida futura de Cristo. «Venida» es el equivalente más claro y tradicional sin perder el sentido eventivo.
theological_decisions:
- issue: Referente cristológico de los pronombres y de la aparición
  english_pob_reading: The pronouns refer to the Son/Jesus Christ, and the verse speaks of his future eschatological revelation and coming.
  chosen_spanish_reading: Los pronombres se entienden como referidos a Jesús; el versículo habla de su manifestación futura y de su venida escatológica.
  alternative_spanish_readings:
  - Una referencia más general a Dios sin especificar al Hijo
  rationale: El contexto inmediato de 1 Juan 2 trata de permanecer en el Hijo y de su aparición. Mantener «él» en minúscula evita introducir convenciones ajenas, pero la nota teológica conserva la referencia cristológica que el contexto sostiene.
  doctrine_reference: Credo Niceno; filosofía de traducción §1, §3
- issue: Matiz de la vergüenza ante la venida de Cristo
  english_pob_reading: The text depicts believers potentially recoiling in shame at his coming, not necessarily judicial condemnation.
  chosen_spanish_reading: El texto sugiere que los creyentes podrían apartarse avergonzados ante su venida, sin convertir la frase por sí sola en una afirmación explícita de condenación judicial.
  alternative_spanish_readings:
  - Simplemente «avergonzarse delante de él» sin el matiz de apartarse
  rationale: La combinación de αἰσχυνθῶμεν con ἀπ’ αὐτοῦ permite una lectura de vergüenza con retirada. «Nos apartemos de él avergonzados» conserva esa tensión y evita sobredeterminar el juicio final.
  doctrine_reference: Filosofía de traducción §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y el audit trail inglés. Se conservó la tensión entre la manifestación pasiva de φανερωθῇ, la confianza de παρρησία y la posible ambigüedad de αἰσχυνθῶμεν ἀπ’ αὐτοῦ. No se introdujeron revisiones posteriores porque el último pase indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se usa «Jesús» solo en la decisión teológica para aclarar el referente; el texto mantiene «él» como en el griego.
  - «Venida» se emplea de forma consistente para παρουσία en sentido escatológico.
  - Se preserva el diminutivo afectivo de τεκνία con «hijitos», coherente con el registro joánico.
