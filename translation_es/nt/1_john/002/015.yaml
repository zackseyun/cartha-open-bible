translation:
  language: es
  text: No amen al mundo ni a las cosas que están en el mundo[a]. Si alguien ama al mundo, el amor del Padre[b] no está en él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ni las cosas que están en el mundo».
    reason: lexical_alternative
  - marker: b
    text: Probablemente significa «amor por el Padre»; menos probable, «el amor que el Padre tiene».
    reason: alternative_reading
  - marker: c
    text: El griego usa una forma masculina singular de manera genérica.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπᾶτε
  english_pob_choice: Do not love
  chosen_spanish: No amen
  alternatives_spanish:
  - No sigan amando
  - Dejen de amar
  lexicon: BDAG
  rationale: El imperativo presente con μή expresa una prohibición amplia. «No amen» conserva el mandato directo sin sobrecargar el aspecto con una paráfrasis más interpretativa.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - el orden mundano presente
  lexicon: BDAG
  rationale: κόσμος aquí no se limita a la creación física; sin embargo, en español «el mundo» conserva la amplitud del término y permite que el contexto aporte la connotación ética y espiritual.
- source_word: μηδὲ τὰ ἐν τῷ κόσμῳ
  english_pob_choice: or the things in the world
  chosen_spanish: ni a las cosas que están en el mundo
  alternatives_spanish:
  - o las cosas en el mundo
  - ni las cosas del mundo
  lexicon: BDAG
  rationale: La coordinación con μηδὲ amplía la prohibición desde el mundo mismo a sus contenidos. En español, «ni a las cosas que están en el mundo» reproduce la estructura y suena natural.
- source_word: ἐάν τις ἀγαπᾷ
  english_pob_choice: If anyone loves
  chosen_spanish: Si alguien ama
  alternatives_spanish:
  - Si alguno ama
  - Si una persona ama
  lexicon: BDAG
  rationale: «Alguien» expresa bien el indefinido τις en un español moderno y general, manteniendo el alcance universal de la condición.
- source_word: ἡ ἀγάπη τοῦ πατρὸς
  english_pob_choice: the love of the Father
  chosen_spanish: el amor del Padre
  alternatives_spanish:
  - el amor por el Padre
  - el amor del Padre hacia él
  lexicon: BDAG
  rationale: 'El genitivo admite varias relaciones. Dado el contexto inmediato, la lectura más natural es objetiva: amor dirigido al Padre. En español, «el amor del Padre» preserva la ambigüedad formal del griego y permite la nota explicativa.'
- source_word: πατρὸς
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - Dios el Padre
  - Padre
  lexicon: BDAG
  rationale: La forma con artículo y el uso joánico hacen natural «el Padre»; mantiene el título relacional sin expansión innecesaria.
- source_word: ἐν αὐτῷ
  english_pob_choice: is not in him
  chosen_spanish: no está en él
  alternatives_spanish:
  - no está en esa persona
  - no está en él mismo
  lexicon: BDAG
  rationale: El griego usa masculino singular genérico. Se conserva «en él» para respetar la forma del texto y la decisión auditada de no neutralizar la referencia.
theological_decisions:
- issue: Sentido de «el mundo» en la ética joánica
  english_pob_reading: Rendered as 'the world' without interpretive expansion in the main text, referring contextually to the fallen order opposed to God rather than creation itself.
  chosen_spanish_reading: Se traduce «el mundo» sin glosa interpretativa en el texto principal, dejando que el contexto identifique el orden humano en rebelión contra Dios.
  alternative_spanish_readings:
  - el sistema del mundo
  - el orden mundano
  rationale: La advertencia no prohíbe amar la creación de Dios ni a las personas en general, sino el orden caído que rivaliza con Dios. Mantener la expresión simple evita cerrar prematuramente la tensión teológica.
  doctrine_reference: Translation philosophy §3, §5
- issue: Genitivo en «ἡ ἀγάπη τοῦ πατρὸς»
  english_pob_reading: Kept as 'the love of the Father' in the main text, with the likely sense being love for the Father.
  chosen_spanish_reading: Se mantiene «el amor del Padre» en el texto principal, con la nota de que probablemente significa amor por el Padre.
  alternative_spanish_readings:
  - amor por el Padre
  - el amor que el Padre tiene
  rationale: El genitivo griego permite más de una relación. La forma literal conserva la ambigüedad sin imponer una resolución doctrinal no explicitada por el griego, mientras la nota aclara la lectura probable.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el tramo auditado; la última pasada indicó que no se necesitaban cambios y el control cruzado reportó alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «el mundo» para κόσμος, en consonancia con el uso joánico y con la decisión inglesa auditada.
  - Se conservó «el Padre» para πατήρ, evitando sustituciones litúrgicas innecesarias.
  - Se mantuvo el masculino singular genérico «él» para ἐν αὐτῷ, siguiendo la decisión textual auditada.
  - Se evitó introducir «Cristo», «SEÑOR» u այլ términos no presentes en el versículo.
  - La puntuación separa claramente la prohibición general y la condición subsecuente, en paralelo con el griego.
