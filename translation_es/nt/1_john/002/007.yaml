  glossary_alignment: 'Buena alineación con la terminología del proyecto: ἐντολήν -> «mandamiento», λόγος -> «mensaje» con alternativa esperable «palabra», Ἀγαπητοί -> «Amados». No hay conflicto con los términos teológicos por defecto del proyecto.'
