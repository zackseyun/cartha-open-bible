translation:
  language: es
  text: Amados[a], no les escribo un mandamiento nuevo, sino un mandamiento antiguo que han tenido desde el principio. El mandamiento antiguo es el mensaje[b] que oyeron.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «queridos amigos».
    reason: alternative_reading
  - marker: b
    text: 'O «palabra»: «El mandamiento antiguo es la palabra que oyeron».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos amigos
  lexicon: BDAG
  rationale: El vocativo plural expresa trato afectuoso y pastoral. «Amados» conserva la conexión con el campo de ἀγαπάω/ἀγάπη y sigue de cerca la fuerza del inglés POB «Beloved» sin volverlo explicativo.
- source_word: ἐντολήν
  english_pob_choice: commandment
  chosen_spanish: mandamiento
  alternatives_spanish:
  - mandato
  - precepto
  lexicon: BDAG
  rationale: En Juan, ἐντολή tiene peso teológico y relacional; «mandamiento» preserva mejor esa resonancia que opciones más débiles como «mandato».
- source_word: καινὴν
  english_pob_choice: new
  chosen_spanish: nuevo
  alternatives_spanish:
  - nuevo, reciente
  - fresco
  lexicon: BDAG
  rationale: «Nuevo» reproduce el contraste directo con παλαιός y no añade matices ajenos al texto.
- source_word: γράφω
  english_pob_choice: I am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - estoy escribiéndoles
  - escribo
  lexicon: BDAG
  rationale: En contexto epistolar, el presente indica la acción en curso; «les escribo» es natural en español y conserva la referencia al acto presente de escribir.
- source_word: παλαιὰν / παλαιά
  english_pob_choice: old
  chosen_spanish: antiguo
  alternatives_spanish:
  - viejo
  - antiguo
  lexicon: BDAG
  rationale: «Antiguo» comunica la contraposición con «nuevo» y evita en español la posible connotación despectiva de «viejo».
- source_word: εἴχετε
  english_pob_choice: you have had
  chosen_spanish: han tenido
  alternatives_spanish:
  - tenían
  - han poseído
  lexicon: BDAG
  rationale: El imperfecto señala posesión continua en el pasado; en español, «han tenido» comunica bien esa duración desde el comienzo hasta ahora.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: Es una expresión joánica característica. «Desde el principio» mantiene la formulación tradicional y deja abierto su alcance, sin precisar más de lo que el griego permite.
- source_word: λόγος
  english_pob_choice: message
  chosen_spanish: mensaje
  alternatives_spanish:
  - palabra
  - mensaje
  lexicon: BDAG
  rationale: Aquí λόγος alude al contenido proclamado que ellos oyeron; «mensaje» lo expresa con claridad en español moderno. Se mantiene la alternativa «palabra» en nota por la tensión léxica preservada por el inglés POB.
- source_word: ἠκούσατε
  english_pob_choice: you heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - han oído
  - escucharon
  lexicon: BDAG
  rationale: El aoristo presenta la recepción de la proclamación como un hecho puntual; «oyeron» es la equivalencia más directa en español.
theological_decisions:
- issue: Alcance de «desde el principio»
  english_pob_reading: left as 'from the beginning' without specifying whether it means the beginning of the readers' Christian instruction or an absolute beginning
  chosen_spanish_reading: se conserva como «desde el principio» sin precisar si se trata del inicio de la instrucción cristiana de los lectores o de un comienzo absoluto
  alternative_spanish_readings:
  - desde el principio de su vida cristiana
  - desde el comienzo del anuncio del evangelio
  rationale: La expresión es intencionalmente amplia en Juan. La traducción conserva esa amplitud y no resuelve la tensión con una precisión que el texto no exige.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Relación entre «mandamiento antiguo» y «mensaje»
  english_pob_reading: rendered straightforwardly without harmonizing or expanding the relationship between commandment and message
  chosen_spanish_reading: se traduce de manera directa la ecuación entre el mandamiento antiguo y el mensaje escuchado, sin armonizarla ni expandirla
  alternative_spanish_readings:
  - el mandamiento antiguo es la palabra/mensaje que oyeron desde el principio
  - el antiguo mandamiento es la palabra que oyeron
  rationale: El griego identifica el antiguo mandamiento con el λόγος oído por los lectores. La versión española mantiene esa identificación sin añadir explicaciones ni suavizar la tensión léxica.
  doctrine_reference: Translation philosophy §1 and §3.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; por ello, este borrador sigue de cerca el texto auditado en inglés y conserva sus decisiones léxicas y teológicas principales.
  spanish_consistency_notes:
  - Se usa «mandamiento» de forma consistente para ἐντολή, evitando alternar con «mandato» sin necesidad textual.
  - Se mantiene «desde el principio» como fórmula fija joánica, sin explicitar su alcance.
  - Se opta por «mensaje» para λόγος en el texto principal, dejando la alternativa «palabra» en nota por la tensión léxica documentada.
  - El vocativo se vierte como «Amados» para conservar el tono afectuoso y el plural de la forma griega.
