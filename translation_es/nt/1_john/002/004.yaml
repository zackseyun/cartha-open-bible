translation:
  language: es
  text: 'El que dice[a]: «He llegado a conocerlo», y no guarda sus mandamientos, es mentiroso[b]; y la verdad no está en él.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Yo lo conozco». El perfecto griego puede verterse más simplemente, pero «he llegado a conocerlo» refleja mejor el aspecto de una relación presente derivada de un llegar a conocer previo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la verdad no está en este» o «en tal persona».'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ λέγων
  english_pob_choice: The one who says
  chosen_spanish: El que dice
  alternatives_spanish:
  - Quien dice
  - El que afirma
  lexicon: BDAG
  rationale: El participio articular presente funciona sustantivamente; «El que dice» conserva el valor genérico singular de manera natural en español sin introducir género ni una paráfrasis excesiva.
- source_word: Ἔγνωκα
  english_pob_choice: I have come to know
  chosen_spanish: he llegado a conocer
  alternatives_spanish:
  - conozco
  - he conocido
  lexicon: BDAG
  rationale: El perfecto de γινώσκω expresa un estado presente resultante de un conocimiento previo. «He llegado a conocer» refleja mejor ese valor aspectual que el simple «conozco».
- source_word: αὐτὸν
  english_pob_choice: him
  chosen_spanish: lo
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: Se traduce como objeto directo neutro y natural en español; el contexto inmediato apunta a Dios, pero el pronombre se deja sin sobreespecificar, como en el audit trail inglés.
- source_word: τὰς ἐντολὰς αὐτοῦ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: BDAG
  rationale: «Mandamientos» preserva la fuerza bíblica y la resonancia joánica de ἐντολή mejor que opciones más débiles o menos tradicionales, sin caer en una formulación arcaizante.
- source_word: μὴ τηρῶν
  english_pob_choice: does not keep
  chosen_spanish: no guarda
  alternatives_spanish:
  - no obedece
  - no observa
  lexicon: BDAG
  rationale: τηρέω en Juan suele significar guardar/observar en el sentido de mantener fielmente; «guarda» reproduce bien esa noción de cumplimiento continuo sin reducirla solo a obediencia formal.
- source_word: ψεύστης
  english_pob_choice: a liar
  chosen_spanish: mentiroso
  alternatives_spanish:
  - un mentiroso
  - falso
  lexicon: BDAG
  rationale: Como predicado nominal, «mentiroso» comunica la caracterización moral personal con naturalidad en español. Se omite el artículo por fluidez, aunque el sentido permanece indefinido.
- source_word: ἐν τούτῳ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en este
  - en tal persona
  lexicon: BDAG
  rationale: Aunque el griego literalmente dice «en esto/este», el contexto anafórico apunta a la persona descrita; «en él» es la forma española más clara y coherente, manteniendo la referencia personal sin explicitarla de más.
- source_word: ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la realidad
  - lo verdadero
  lexicon: BDAG
  rationale: «La verdad» conserva la densidad joánica y la posible amplitud proposicional y moral de ἀλήθεια, sin restringirla a una sola dimensión.
theological_decisions:
- issue: Referente de αὐτόν / αὐτοῦ
  english_pob_reading: Refers to God ('him' / 'his') in the immediate context.
  chosen_spanish_reading: Refiere a Dios («lo» / «sus»), sin cerrar innecesariamente la relación con Cristo en la teología joánica.
  alternative_spanish_readings:
  - Refiere específicamente a Cristo
  - Referente genérico sin identificación
  rationale: El contexto inmediato de 1 Juan 2:3 apunta naturalmente a Dios, pero la cercanía entre Dios y el Hijo en 1 Juan aconseja no resolver de manera absoluta una cuestión que el texto no explicita aquí. El español conserva esa tensión.
  doctrine_reference: Mantener la tensión teológica sin sobreinterpretar el referente.
- issue: Fuerza del conocimiento en perfecto (Ἔγνωκα)
  english_pob_reading: Relational knowledge expressed as 'have come to know'.
  chosen_spanish_reading: Conocimiento relacional expresado como «he llegado a conocer».
  alternative_spanish_readings:
  - 'Simple conocimiento cognitivo: «conozco»'
  - 'Resultado perfecto más breve: «he conocido»'
  rationale: El perfecto de γινώσκω en contexto joánico no se reduce a información intelectual; la solución escogida conserva el matiz de relación establecida por experiencia previa, sin volverla mística ni excesivamente interpretativa.
  doctrine_reference: Preservar el valor relacional del conocer joánico.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; la concordancia del audit trail inglés quedó marcada como alta y sin cambios necesarios. Esta propuesta sigue esa lectura estable, trasladando al español la tensión del perfecto de γινώσκω y el referente anafórico de «en él» sin forzar aclaraciones doctrinales.
  spanish_consistency_notes:
  - Se mantiene «mandamientos» para ἐντολαί, coherente con el valor bíblico-johánico y con el lenguaje eclesial ampliamente inteligible.
  - Se usa «guardar» para τηρέω, no «obedecer», para conservar la idea de observar/fidelidad continua.
  - Se opta por «mentiroso» como predicado personal, evitando una adjetivación que debilite la fuerza del juicio.
  - «La verdad» conserva la carga teológica de ἀλήθεια y no se reduce a una simple exactitud proposicional.
  - El pronombre de objeto se deja en tercera persona singular («lo», «él») para no especificar indebidamente el referente más allá del contexto inmediato.
