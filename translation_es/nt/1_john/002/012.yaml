translation:
  language: es
  text: Les escribo[a], hijitos, porque[b] sus pecados han sido perdonados por causa de su nombre[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Les estoy escribiendo». El presente griego puede traducirse como presente simple o como presente progresivo en contexto epistolar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «que sus pecados han sido perdonados». La conjunción puede leerse como introduciendo el contenido; aquí probablemente expresa la razón de lo que Juan escribe.'
    reason: alternative_reading
  - marker: c
    text: El referente de «su» puede entenderse por el contexto como Dios o como Jesús; el griego lo deja implícito.
    reason: alternative_reading
lexical_decisions:
- source_word: Γράφω
  english_pob_choice: I am writing
  chosen_spanish: Les escribo
  alternatives_spanish:
  - Les estoy escribiendo
  lexicon: BDAG
  rationale: El presente epistolar en español suele expresarse naturalmente con el presente simple. "Les escribo" conserva el valor actual de la acción sin forzar un progresivo menos idiomático en español bíblico.
- source_word: τεκνία
  english_pob_choice: little children
  chosen_spanish: hijitos
  alternatives_spanish:
  - niñitos
  - queridos hijos
  lexicon: BDAG
  rationale: El diminutivo preserva el tono afectuoso del vocativo. "Hijitos" comunica cercanía pastoral y mantiene la fuerza de ternura mejor que una expresión más explicativa como "queridos hijos".
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí la conjunción introduce la razón por la que Juan escribe, no solo el contenido de la carta. "Porque" reproduce mejor esa relación causal/discursiva en español.
- source_word: ἀφέωνται
  english_pob_choice: have been forgiven
  chosen_spanish: han sido perdonados
  alternatives_spanish:
  - son perdonados
  - les han sido perdonados
  lexicon: BDAG
  rationale: El perfecto pasivo pide una idea de acción concluida con resultado vigente. "Han sido perdonados" conserva ese valor mejor que un presente simple.
- source_word: αἱ ἁμαρτίαι
  english_pob_choice: your sins
  chosen_spanish: sus pecados
  alternatives_spanish:
  - sus pecados
  lexicon: BDAG
  rationale: Aunque el griego tiene artículo, el dativo de segunda persona hace claro el posesivo en español. "Sus pecados" expresa de manera natural lo que la construcción comunica sin añadir interpretación extra.
- source_word: διὰ τὸ ὄνομα αὐτοῦ
  english_pob_choice: for the sake of his name
  chosen_spanish: por causa de su nombre
  alternatives_spanish:
  - a causa de su nombre
  - por el bien de su nombre
  lexicon: BDAG
  rationale: '"Por causa de" conserva el valor de base o motivo de διά con acusativo sin volverlo demasiado explicativo. Mantiene además la resonancia bíblica de "nombre" como realidad personal y teológica, no solo reputación.'
- source_word: ὄνομα
  english_pob_choice: name
  chosen_spanish: nombre
  alternatives_spanish:
  - reputación
  lexicon: BDAG
  rationale: '"Nombre" es la equivalencia directa y preserva la carga teológica del término. "Reputación" reduciría indebidamente el alcance del idiomático bíblico.'
theological_decisions:
- issue: Referente implícito de "su nombre"
  english_pob_reading: Left implicit in the main text; could refer to God or Jesus
  chosen_spanish_reading: 'Se deja implícito en el texto principal: "su nombre"'
  alternative_spanish_readings:
  - su nombre, es decir, el de Dios
  - su nombre, es decir, el de Jesús
  rationale: El versículo no identifica de manera explícita el referente. Mantener el pronombre sin resolverlo conserva la tensión interpretativa documentada por el texto y evita imponer una identificación no dicha aquí.
  doctrine_reference: Preservar la tensión teológica/textual sin resolverla indebidamente.
translation_notes:
  revision_awareness: 'La revisión auditada en inglés no exigió cambios; la versión española se ajusta al mismo análisis textual y mantiene las decisiones clave: presente epistolar, vocativo afectuoso, perfecto pasivo y el referente implícito de "su nombre". Se corrigió la anotación para que cada nota esté anclada explícitamente en el texto.'
  spanish_consistency_notes:
  - Se prefirió "Les escribo" como presente epistolar natural en español.
  - Se evitó "SEÑOR" o equivalentes de masking; el texto no contiene el nombre divino explícito.
  - Se mantuvo "pecados" en plural, coherente con αἱ ἁμαρτίαι.
  - Se preservó "nombre" sin glosa interpretativa en el cuerpo del texto.
  - 'Las notas al pie usan solo marcadores presentes en el texto: [a] y [b].'
