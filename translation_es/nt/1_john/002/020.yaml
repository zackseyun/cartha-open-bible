translation:
  language: es
  text: Pero ustedes tienen una unción del Santo[a], y todos ustedes saben[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Santo» puede referirse al Padre o al Hijo, según el contexto; el texto griego no lo especifica aquí.
    reason: theological_note
  - marker: b
    text: 'O, en otra lectura textual: «y ustedes saben todas las cosas». La lectura de SBLGNT favorece «y todos ustedes saben».'
    reason: textual_variant
lexical_decisions:
- source_word: καὶ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Sin embargo
  lexicon: BDAG
  rationale: Aquí καί marca contraste con el contexto anterior; «Pero» expresa mejor esa oposición en español que un simple «Y», sin añadir contenido ajeno al griego.
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - tú
  lexicon: BDAG
  rationale: El pronombre es enfático en griego. En español, «ustedes» mantiene la referencia plural y permite conservar el contraste implícito con los demás sin forzar un calco.
- source_word: χρῖσμα
  english_pob_choice: anointing
  chosen_spanish: unción
  alternatives_spanish:
  - ungimiento
  - unción sagrada
  lexicon: BDAG
  rationale: «Unción» preserva el valor metafórico y teológico del sustantivo en este contexto joánico. «Ungimiento» suena más técnico y menos natural en español bíblico moderno.
- source_word: ἀπὸ τοῦ ἁγίου
  english_pob_choice: from the Holy One
  chosen_spanish: de parte del Santo
  alternatives_spanish:
  - del Santo
  - de parte del Santo Uno
  - del Santo Espíritu
  lexicon: BDAG
  rationale: «De parte de» expresa bien el origen o procedencia. «El Santo» conserva la ambigüedad del referente, sin decidir entre el Padre, el Hijo o el Espíritu; «Santo Uno» sería menos natural en español.
- source_word: οἴδατε
  english_pob_choice: know
  chosen_spanish: saben
  alternatives_spanish:
  - conocen
  - tienen conocimiento
  lexicon: BDAG
  rationale: En español, «saben» es la forma directa y natural para οἴδατε. Mantiene el sentido de conocimiento/conciencia sin sobreinterpretarlo como comprensión exhaustiva.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos
  - ustedes todos
  lexicon: BDAG
  rationale: El texto griego apoyado por SBLGNT se entiende como «ustedes todos saben», no como «saben todas las cosas». «Todos ustedes» conserva el valor distributivo y el matiz de totalidad del sujeto.
theological_decisions:
- issue: Referente de «el Santo»
  english_pob_reading: Kept as 'the Holy One' without specifying whether this refers to the Father or to the Son.
  chosen_spanish_reading: Se mantiene «el Santo» sin identificar al referente.
  alternative_spanish_readings:
  - el Padre
  - Jesús, el Mesías
  - el Espíritu Santo
  rationale: El griego permite más de un referente posible en el contexto joánico. Traducirlo como «el Santo» conserva la tensión interpretativa documentada por el POB en inglés y evita resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el texto la deja abierta.'
- issue: Sentido de χρῖσμα
  english_pob_reading: Rendered as 'anointing' and left metaphorical rather than explicated as 'the Holy Spirit.'
  chosen_spanish_reading: Se traduce como «unción» y se deja metafórico.
  alternative_spanish_readings:
  - Espíritu Santo
  - don de unción
  - unción del Espíritu
  rationale: El texto usa la metáfora χρῖσμα. «Unción» la conserva en español y permite que la interpretación pneumatológica se trate en notas o enseñanza, en lugar de introducirla en el cuerpo del texto.
  doctrine_reference: 'Translation philosophy §1 and §3: primacía del original y preservación de la ambigüedad genuina.'
translation_notes:
  revision_awareness: El texto inglés auditado no requirió cambios en la última revisión; se mantuvo la lectura de SBLGNT que favorece «y todos ustedes saben» frente a la variante «ustedes saben todas las cosas». La versión española sigue esa decisión textual y conserva la ambigüedad del referente de «el Santo».
  spanish_consistency_notes:
  - Se usó «unción» para χρῖσμα, en coherencia con el valor metafórico preservado por el POB.
  - Se evitó «Cristo» como traducción de Χριστός porque este versículo no contiene el título; la expresión relevante es «el Santo».
  - Se mantuvo un orden español natural («Pero ustedes tienen…») sin perder el contraste discursivo del καί inicial.
  - La nota textual se ancla en «saben» porque la variante afecta directamente el alcance del verbo en la cláusula final.
