translation:
  language: es
  text: Y en cuanto a ustedes[a], la unción que recibieron de él permanece en ustedes, y no tienen necesidad de que alguien les enseñe. Pero así como su unción les enseña acerca de todas las cosas, y es verdadera y no es mentira, y tal como les enseñó[b], permanezcan en él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en algunos manuscritos: «y tal como les enseñó, ustedes permanecen en él».'
    reason: textual_variant
  - marker: b
    text: O «permanece en ustedes» / «permanezcan en él»; el mismo verbo griego se usa en todo el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: χρῖσμα
  english_pob_choice: anointing
  chosen_spanish: unción
  alternatives_spanish:
  - ungimiento
  - aceite de la unción
  lexicon: BDAG
  rationale: En este contexto joánico, χρῖσμα funciona de manera metafórica para lo recibido de Dios. «Unción» conserva el valor figurado en español y es un equivalente natural y eclesialmente inteligible; evita identificarlo explícitamente como «Espíritu» en el texto principal, como hace la POB inglesa.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - procedente de él
  lexicon: BDAG
  rationale: El pronombre remite al antecedente del contexto y la versión inglesa conserva esa indefinición. «De él» reproduce con sobriedad la referencia pronominal sin añadir una identificación más explícita en el versículo.
- source_word: μένει ἐν ὑμῖν
  english_pob_choice: remains in you
  chosen_spanish: permanece en ustedes
  alternatives_spanish:
  - habita en ustedes
  - reside en ustedes
  lexicon: BDAG
  rationale: «Permanece» mantiene el lenguaje característico de μένω en Juan y suena claro en español contemporáneo. Se evita «abide»/«habita» como opción más marcada o arcaizante, aunque «permanece» conserva la continuidad léxica del pasaje.
- source_word: οὐ χρείαν ἔχετε ἵνα τις διδάσκῃ ὑμᾶς
  english_pob_choice: you have no need that anyone should teach you
  chosen_spanish: no tienen necesidad de que alguien les enseñe
  alternatives_spanish:
  - no necesitan que nadie les enseñe
  - no tienen necesidad de que alguno les enseñe
  lexicon: BDAG
  rationale: La estructura griega se preserva sin convertirla en una negación absoluta de toda enseñanza humana. «Tienen necesidad de que alguien les enseñe» es natural en español y mantiene la fuerza del enunciado sin suavizarlo más de lo que el texto permite.
- source_word: διδάσκῃ / διδάσκει / ἐδίδαξεν
  english_pob_choice: teach / teaches / taught
  chosen_spanish: enseñe / enseña / enseñó
  alternatives_spanish:
  - instruya / instruye / instruyó
  - eduque / educa / educó
  lexicon: BDAG
  rationale: Se conserva la repetición verbal con la misma raíz en español para reflejar el paralelismo retórico del versículo. «Enseñar» es el equivalente más directo y transparente para διδάσκω en este contexto.
- source_word: περὶ πάντων
  english_pob_choice: about all things
  chosen_spanish: acerca de todas las cosas
  alternatives_spanish:
  - sobre todo
  - respecto de todo
  lexicon: BDAG
  rationale: «Acerca de todas las cosas» sigue de cerca el alcance de περὶ πάντων y evita restringir el sentido. La frase suena natural en español y preserva la amplitud del enunciado.
- source_word: ἀληθές ἐστιν
  english_pob_choice: is true
  chosen_spanish: es verdadera
  alternatives_spanish:
  - es verdadera de verdad
  - es genuina
  lexicon: BDAG
  rationale: 'Aunque el sujeto griego es neutro, en español se adapta al sustantivo «unción» con concordancia natural: «es verdadera». La opción mantiene la afirmación de verdad frente a falsedad sin introducir matices no requeridos.'
- source_word: οὐκ ἔστιν ψεῦδος
  english_pob_choice: is not a lie
  chosen_spanish: no es mentira
  alternatives_spanish:
  - no es falso
  - no es engaño
  lexicon: BDAG
  rationale: «Mentira» reproduce bien el contraste juanino con ἀληθές y resulta idiomático en español. Se evita una paráfrasis más fuerte que pudiera desplazar la antítesis verdad/mentira del texto.
- source_word: καθὼς ἐδίδαξεν ὑμᾶς
  english_pob_choice: just as it taught you
  chosen_spanish: tal como les enseñó
  alternatives_spanish:
  - así como les enseñó
  - del mismo modo que les enseñó
  lexicon: BDAG
  rationale: «Tal como» conserva la comparación explícita de καθὼς y encaja bien con el ritmo de la oración. El sujeto implícito sigue siendo la «unción» del contexto, sin necesidad de explicitarlo de otro modo.
- source_word: μένετε ἐν αὐτῷ
  english_pob_choice: remain in him
  chosen_spanish: permanezcan en él
  alternatives_spanish:
  - permanezcan en eso
  - permanezcan en ella
  lexicon: BDAG
  rationale: 'La forma griega del texto impreso se entiende naturalmente como imperativa; por eso se traduce con exhortación plural: «permanezcan». Se mantiene «en él» para respetar el pronombre masculino del griego y la lectura contextual preferida por la POB inglesa.'
theological_decisions:
- issue: Referencia de la «unción»
  english_pob_reading: Rendered as 'anointing' without identifying it explicitly in the main text.
  chosen_spanish_reading: Traducida como «unción» sin identificarla explícitamente como el Espíritu en el texto principal.
  alternative_spanish_readings:
  - el Espíritu Santo
  - el mensaje recibido
  rationale: La metáfora joánica debe conservarse en el cuerpo principal. Aunque la referencia teológica probablemente involucra la obra del Espíritu, el texto griego usa χρῖσμα y la POB inglesa evita convertirlo en una glosa doctrinal directa. La solución española mantiene esa tensión auditable.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de «no tienen necesidad de que alguien les enseñe»
  english_pob_reading: Kept as stated, without softening or absolutizing.
  chosen_spanish_reading: Se conserva la afirmación sin absolutizarla ni suavizarla.
  alternative_spanish_readings:
  - nadie debe enseñarles nunca
  - no necesitan maestros humanos
  rationale: El versículo no debe convertirse en una negación total de la enseñanza en la iglesia, pero tampoco debe rebajarse su fuerza retórica. La traducción conserva la formulación del texto y deja que el contexto gobierne la interpretación.
  doctrine_reference: Translation philosophy §3
- issue: Valor de μένετε al final del versículo
  english_pob_reading: 'Imperative: ''remain in him.'''
  chosen_spanish_reading: 'Imperativo plural: «permanezcan en él».'
  alternative_spanish_readings:
  - 'indicativo: «permanecen en él»'
  - 'exhortación: «sigan en él»'
  rationale: La forma del texto crítico se traduce de manera natural como mandato. Se conserva la alternativa textual indicada por la tradición manuscrita en nota, sin resolverla silenciosamente en el cuerpo principal.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: 'Se siguió el estado de revisión más reciente indicado en el expediente (latest_revision_pass: unchanged = true). No hubo cambios aplicados en la pasada de revisión, y la versión española mantiene la decisión editorial principal de la POB inglesa: conservar «unción» como metáfora, sostener la repetición de διδάσκω/μένω con equivalentes consistentes, y reflejar la variante textual final en nota.'
  spanish_consistency_notes:
  - Se usa «permanece» para μένει y «permanezcan» para μένετε, manteniendo la familia léxica en español.
  - Se evitó introducir «Cristo» o «SEÑOR»; el pronombre contextual «de él / en él» sigue la economía del original y la POB inglesa.
  - Se mantiene la distinción entre la unción como metáfora y su posible referencia teológica, sin fusionarlas en el texto principal.
  - La puntuación refleja el paralelismo y las pausas del griego, con una cadencia natural en español público eclesial.
