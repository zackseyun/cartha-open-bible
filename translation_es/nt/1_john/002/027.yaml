base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/027.yaml
  text: And as for you[a], the anointing that you received from him remains in you, and you have no need that anyone should teach you. But as his anointing teaches you about all things, and is true and is not a lie, and just as it taught you[b], remain in him.
