translation:
  language: es
  text: El que ama a su hermano permanece en la luz[a], y no hay en él causa de tropiezo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no hay tropiezo para él». La frase griega puede entenderse tanto como algo que no está en él como algo que no lo enfrenta.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ἀγαπῶν
  english_pob_choice: The one who loves
  chosen_spanish: El que ama
  alternatives_spanish:
  - Quien ama
  - El que ama continuamente
  lexicon: BDAG
  rationale: El participio articular presente funciona de modo sustantivo; en español, «el que ama» expresa bien el valor genérico y durativo sin volverse arcaico. Se evita una paráfrasis que añada intensidad o repetición no explícita en el griego.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su prójimo creyente
  lexicon: BDAG
  rationale: ἀδελφός es masculino singular en la forma griega. Se conserva «hermano» por fidelidad al texto, sin expandir interpretivamente a «hermana» o «prójimo creyente» en el cuerpo principal.
- source_word: ἐν τῷ φωτὶ
  english_pob_choice: in the light
  chosen_spanish: permanece en la luz
  alternatives_spanish:
  - permanece en luz
  lexicon: BDAG
  rationale: «En la luz» reproduce la imagen joánica y su fuerza metafórica de manera natural en español. Se mantiene el artículo para corresponder con la forma griega y el uso establecido en el pasaje.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece y sigue
  - habita
  lexicon: BDAG
  rationale: «Permanece» comunica bien el sentido durativo y relacional de μένω, con registro bíblico claro en español actual. Evita tanto «habita» como una expansión innecesaria.
- source_word: σκάνδαλον
  english_pob_choice: cause for stumbling
  chosen_spanish: causa de tropiezo
  alternatives_spanish:
  - tropiezo
  - piedra de tropiezo
  - motivo de caída
  lexicon: BDAG
  rationale: «Causa de tropiezo» conserva el valor figurado y ético de σκάνδαλον sin reducirlo a un objeto literal. Además, suena natural en español y mantiene la ambigüedad interpretativa del original.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - para él
  - contra él
  lexicon: BDAG
  rationale: El pronombre masculino singular se traduce de forma directa como «en él». La frase griega permite también la idea de «para él»; por eso se preserva la opción alternativa en nota, sin resolverla en el texto principal.
- source_word: οὐκ ἔστιν
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: BDAG
  rationale: La construcción existencial «no hay» es la más natural en español para este predicado. Mantiene la fluidez sin alterar el sentido de negación absoluta del griego.
theological_decisions:
- issue: Alcance de σκάνδαλον ἐν αὐτῷ οὐκ ἔστιν
  english_pob_reading: there is no cause for stumbling in him
  chosen_spanish_reading: no hay en él causa de tropiezo
  alternative_spanish_readings:
  - no hay tropiezo para él
  - no hay en él piedra de tropiezo
  rationale: 'El griego admite más de un matiz: puede describir algo que no está en la persona o algo que no la enfrenta. La redacción elegida conserva la lectura interna moral sin cerrar indebidamente la ambigüedad; la nota mantiene la alternativa interpretativa.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it; §6: Readable modern Spanish'
- issue: Referencia implícita de «su hermano»
  english_pob_reading: his brother
  chosen_spanish_reading: su hermano
  alternative_spanish_readings:
  - su hermano o hermana
  - su fellow believer
  rationale: Aunque en 1 Juan suele apuntar a un miembro de la comunidad creyente, el griego presenta ἀδελφός en masculino singular. Se deja el texto sin expansión inclusiva para no sobreinterpretar el alcance comunitario.
  doctrine_reference: Fidelity to source form with restrained interpretation
- issue: Imagen de la luz en contexto joánico
  english_pob_reading: remains in the light
  chosen_spanish_reading: permanece en la luz
  alternative_spanish_readings:
  - permanece en luz
  rationale: Se conserva la imagen teológica de la luz sin convertirla en explicación doctrinal. En Juan, la metáfora es central y debe mantenerse visible en el español.
  doctrine_reference: Johannine symbolism; lexical consistency
translation_notes:
  revision_awareness: El manuscrito en inglés ya había sido revisado y conservado sin cambios; en español se siguió el mismo criterio de alta concordancia, manteniendo la ambigüedad final del griego y evitando una expansión interpretativa del término ἀδελφός.
  spanish_consistency_notes:
  - Se mantiene «luz» con artículo para conservar la imagen joánica y la correspondencia con el griego.
  - «Tropiezo» se usa de forma consistente para σκάνδαλον en este contexto, en lugar de «ofensa» o «piedra de tropiezo».
  - Se evita «Cristo» o terminología no presente en el versículo.
  - La nota final preserva la tensión semántica entre ubicación interna y relación de confrontación implícita en ἐν αὐτῷ.
