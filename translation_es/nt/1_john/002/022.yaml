    reason: lexical_alternative
  revision_rationale: La revisión corrige la colocación de las notas para que correspondan a los términos explicados, y ajusta «el anticristo» para reflejar mejor el artículo griego y la decisión auditada en inglés sin perder naturalidad en español. También se normaliza el idioma de la nota [a]. No se requieren cambios doctrinales de fondo.
