translation:
  language: es
  text: '¿Quién es el mentiroso, sino el que niega que Jesús es el Mesías[a]? Este es el anticristo[b]: el que niega al Padre y al Hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O bien, «el Cristo». El griego tiene el título ὁ χριστός; aquí se traduce «Mesías» porque funciona como título y no como nombre.
    reason: alternative_reading
  - marker: b
    text: 'O simplemente, «anticristo». El griego tiene artículo: «el anticristo». En las cartas de Juan, el término puede denotar el tipo de opositor caracterizado por negar al Padre y al Hijo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς ἐστιν ὁ ψεύστης
  english_pob_choice: Who is the liar
  chosen_spanish: ¿Quién es el mentiroso?
  alternatives_spanish:
  - ¿Quién es el engañador?
  - ¿Quién es el mentiroso?
  lexicon: BDAG
  rationale: ψεύστης designa al mentiroso; en español, 'mentiroso' conserva la fuerza polémica y suena más natural que una construcción más literal. El artículo griego apoya un referente definido en este contexto retórico.
- source_word: ὁ ἀρνούμενος
  english_pob_choice: the one who denies
  chosen_spanish: el que niega
  alternatives_spanish:
  - el que niega
  - el negador
  lexicon: BDAG
  rationale: El participio presente funciona de modo sustantivado y caracterizador. 'El que niega' mantiene el valor de acción/rasgo continuo con español natural.
- source_word: ὅτι Ἰησοῦς οὐκ ἔστιν ὁ χριστός
  english_pob_choice: that Jesus is the Messiah
  chosen_spanish: que Jesús es el Mesías
  alternatives_spanish:
  - que Jesús es el Cristo
  lexicon: BDAG
  rationale: Χριστός aquí es título, no nombre propio; por ello se traduce 'Mesías' según el criterio del proyecto, preservando el contenido mesiánico del rechazo.
- source_word: ὁ χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - el Cristo
  lexicon: BDAG
  rationale: La forma con artículo indica el título. 'Mesías' comunica el valor titular con claridad en español bíblico contemporáneo.
- source_word: ἀντίχριστος
  english_pob_choice: the antichrist
  chosen_spanish: anticristo
  alternatives_spanish:
  - el anticristo
  - anti-Mesías
  lexicon: BDAG
  rationale: El término se ha lexicalizado en español como 'anticristo'. Para fluidez, puede usarse sin artículo en una frase identificativa, aunque el griego tenga artículo.
- source_word: πατέρα
  english_pob_choice: Father
  chosen_spanish: Padre
  alternatives_spanish:
  - Padre
  lexicon: BDAG
  rationale: En el marco joánico la referencia es a Dios Padre; la mayúscula refleja la identificación teológica sin añadir explicación al texto principal.
- source_word: υἱόν
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo
  lexicon: BDAG
  rationale: También en sentido relacional-teológico, 'Hijo' conserva la referencia joánica estándar a Jesús en relación con el Padre.
- source_word: οὗτός ἐστιν
  english_pob_choice: This is
  chosen_spanish: Este es
  alternatives_spanish:
  - Este es
  - Éste es
  lexicon: BDAG
  rationale: La demostrativa retoma al sujeto descrito inmediatamente antes. 'Este es' resulta directo y equivalente en español.
theological_decisions:
- issue: Cómo traducir Χριστός en una confesión/negación cristológica
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Siguiendo el valor titular de Χριστός en este versículo, 'Mesías' preserva la afirmación/negación sobre la identidad prometida de Jesús sin convertir el término en nombre propio.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (Χριστός → Messiah where title; Christ where name-like)'
- issue: Alcance de ἀντίχριστος
  english_pob_reading: the antichrist
  chosen_spanish_reading: anticristo
  alternative_spanish_readings:
  - el anticristo
  rationale: El griego con artículo puede señalar una figura definida o un tipo caracterizado por esta negación. El español 'anticristo' mantiene la tensión sin especificar más de lo que el texto da.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y conserva la decisión auditada de traducir Χριστός como título ('Mesías') y ἀντίχριστος con la tensión entre artículo griego y lexicalización española. No se requieren revisiones adicionales respecto del último pase auditado.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός conforme al criterio doctrinal del proyecto.
  - Se usó 'Padre' y 'Hijo' con mayúscula por el contexto joánico relacional.
  - '''anticristo'' se dejó como término corriente en español, con nota para reflejar el artículo griego.'
  - El registro es bíblico contemporáneo y evita calcado innecesario.
