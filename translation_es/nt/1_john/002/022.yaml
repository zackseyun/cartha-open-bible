  to: '¿Quién es el mentiroso, sino el que niega que Jesús es el Mesías[a]? Este es el anticristo[b]: el que niega al Padre y al Hijo.'
  rationale: La revisión corrige la colocación de las notas para que correspondan a los términos explicados, y ajusta «el anticristo» para reflejar mejor el artículo griego y la decisión auditada en inglés sin perder naturalidad en español. También se normaliza el idioma de la nota [a]. No se requieren cambios doctrinales de fondo.
