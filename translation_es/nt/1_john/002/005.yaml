translation:
  language: es
  text: 'Pero quien guarda su palabra, en él[a], verdaderamente, el amor de Dios ha sido perfeccionado[b]. Por esto sabemos que estamos en él:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O más literalmente, «verdaderamente en esto» o «verdaderamente en este». La frase griega puede señalar tanto a la persona que guarda su palabra como a este hecho como evidencia.
    reason: alternative_reading
  - marker: b
    text: «El amor de Dios» puede significar el amor de Dios en el creyente o el amor del creyente hacia Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: ὃς δ’ ἂν
  english_pob_choice: But whoever
  chosen_spanish: Pero quien
  alternatives_spanish:
  - Pero cualquiera que
  - Pero todo el que
  lexicon: BDAG
  rationale: La construcción relativa indefinida expresa generalidad. «Quien» en español suena natural y abarco cualquier persona; «Pero» conserva el matiz de contraste de δέ sin sobrecargar el tono.
- source_word: τηρῇ
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - obedece
  - observa
  - cumple
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, observar u obedecer. «Guarda» mantiene bien el vínculo johánico con la palabra y los mandamientos, y en español conserva la idea de custodiar/atenerse a lo recibido.
- source_word: αὐτοῦ τὸν λόγον
  english_pob_choice: his word
  chosen_spanish: su palabra
  alternatives_spanish:
  - su mensaje
  - lo que dice
  lexicon: BDAG
  rationale: «Palabra» reproduce λόγος con fuerza bíblica y johánica. El posesivo «su» mantiene la relación del pronombre griego; «mensaje» sería más interpretativo y menos fiel al léxico del pasaje.
- source_word: ἀληθῶς
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - de veras
  - realmente
  lexicon: BDAG
  rationale: El adverbio intensifica la afirmación. «Verdaderamente» suena digno y preciso en español bíblico contemporáneo.
- source_word: ἐν τούτῳ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en esto
  - en esta persona
  lexicon: BDAG
  rationale: Aunque la frase puede leerse literalmente como «en esto», el contexto inmediato apunta a la persona que guarda su palabra. «En él» aclara el referente sin perder la densidad relacional del griego; se conserva la alternativa más literal en nota.
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_spanish: el amor de Dios
  alternatives_spanish:
  - el amor a Dios
  - el amor de parte de Dios
  lexicon: BDAG
  rationale: La genitiva es ambigua en griego y puede referirse tanto al amor de Dios como al amor hacia Dios. «El amor de Dios» preserva la ambigüedad en el cuerpo principal, igual que la traducción inglesa auditada.
- source_word: τετελείωται
  english_pob_choice: has been perfected
  chosen_spanish: ha sido perfeccionado
  alternatives_spanish:
  - ha sido hecho completo
  - ha llegado a su plenitud
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado consumado con resultado presente. «Ha sido perfeccionado» sigue de cerca la forma verbal y mantiene la tensión teológica de un amor llevado a su meta.
- source_word: ἐν τούτῳ γινώσκομεν
  english_pob_choice: By this we know
  chosen_spanish: Por esto sabemos
  alternatives_spanish:
  - En esto sabemos
  - De esto sabemos
  lexicon: BDAG
  rationale: La fórmula johánica introduce la base o evidencia del conocimiento. «Por esto sabemos» es idiomático en español y conserva el valor demostrativo/causal del giro.
- source_word: ὅτι ἐν αὐτῷ ἐσμεν
  english_pob_choice: that we are in him
  chosen_spanish: que estamos en él
  alternatives_spanish:
  - que estamos en unión con él
  lexicon: BDAG
  rationale: «Estamos en él» mantiene la expresión johánica de permanencia/unión sin explicitarla en exceso. La expansión «en unión con él» es posible, pero sería más interpretativa que el griego.
theological_decisions:
- issue: Ambigüedad de ἡ ἀγάπη τοῦ θεοῦ
  english_pob_reading: the love of God
  chosen_spanish_reading: el amor de Dios
  alternative_spanish_readings:
  - el amor a Dios
  - el amor de parte de Dios
  rationale: El genitivo admite más de una relación semántica. Se conserva la forma ambigua en español para no resolver prematuramente si el pasaje habla del amor de Dios en el creyente o del amor del creyente hacia Dios.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica cuando el texto original la permite; tabla de términos: ἀγάπη → amor'
- issue: Valor de ἐν τούτῳ en la primera cláusula
  english_pob_reading: personal sense reflected as 'in him'
  chosen_spanish_reading: en él
  alternative_spanish_readings:
  - en esto
  - en esta persona
  rationale: El demostrativo puede apuntar al individuo que guarda la palabra o al asunto/evidencia mencionada. «En él» privilegia la lectura personal que hace la frase comprensible en español, mientras la nota conserva la alternativa más literal.
  doctrine_reference: 'Translation philosophy: equivalencia óptima; conservar ambigüedad genuina sin oscurecer el sentido'
- issue: Sentido de τετελείωται
  english_pob_reading: has been perfected
  chosen_spanish_reading: ha sido perfeccionado
  alternative_spanish_readings:
  - ha sido hecho completo
  - ha llegado a su plenitud
  rationale: La forma perfecta pasiva sugiere una obra culminada con resultado vigente. «Perfeccionado» retiene la meta/completitud del amor sin diluir la tensión entre crecimiento y consumación.
  doctrine_reference: 'Contested terms: τελειόω → perfeccionar/llevar a su meta'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que el texto base no requirió cambios y presenta alto acuerdo entre evaluaciones. Se mantuvieron las decisiones del audit trail inglés: conservar la ambigüedad de «el amor de Dios», reflejar ἐν τούτῳ con una forma clara en español y preservar el valor culminativo del perfecto pasivo τετελείωται.'
  spanish_consistency_notes:
  - Se mantiene «palabra» para λόγος, evitando variarlo por «mensaje» en este versículo.
  - Se usa «amor de Dios» como término ambivalente, coherente con la nota doctrinal y con el patrón joánico.
  - «En él» se reserva para el referente personal del contexto inmediato; la nota guarda la lectura más literal de ἐν τούτῳ.
  - La puntuación reproduce el cierre enfático con dos proposiciones y dos puntos, como en el inglés auditado y el flujo griego.
