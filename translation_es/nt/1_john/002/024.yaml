translation:
  language: es
  text: En cuanto a ustedes, permanezca en ustedes lo que[a] oyeron desde el principio. Si lo que oyeron desde el principio permanece en ustedes[b], ustedes también permanecerán en el Hijo y en el Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'aquello que oyeron desde el principio'; la frase probablemente se refiere al mensaje apostólico original acerca del Hijo.
    reason: lexical_alternative
  - marker: b
    text: '''Permanecer'' traduce el mismo verbo griego usado a lo largo del versículo; tradicionalmente, ''morar''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: As for you
  chosen_spanish: En cuanto a ustedes
  alternatives_spanish:
  - Ustedes
  - Y ustedes
  lexicon: BDAG
  rationale: El pronombre está adelantado para marcar énfasis tópico y contraste; en español, 'En cuanto a ustedes' reproduce mejor esa función discursiva que un simple 'ustedes'.
- source_word: ὃ ἠκούσατε ἀπ’ ἀρχῆς
  english_pob_choice: what you heard from the beginning
  chosen_spanish: lo que oyeron desde el principio
  alternatives_spanish:
  - aquello que oyeron desde el principio
  - el mensaje que oyeron desde el principio
  lexicon: BDAG
  rationale: El relativo neutro ὃ se rinde de forma amplia con 'lo que', sin especificar de más el referente. 'Mensaje' interpreta el contenido; por eso se deja como alternativa, no como texto principal.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: '''Desde el principio'' es plenamente comprensible, pero ''desde el principio'' / ''desde el comienzo'' funcionan igual en español. Se conserva ''desde el principio'' por su resonancia joánica natural y su fidelidad idiomática.'
- source_word: ἐν ὑμῖν μενέτω
  english_pob_choice: let ... remain in you
  chosen_spanish: permanezca en ustedes
  alternatives_spanish:
  - permanezca dentro de ustedes
  - esté en ustedes
  lexicon: BDAG
  rationale: El imperativo presente de μένω pide continuidad. 'Permanezca' conserva la fuerza verbal y evita el matiz más estático de 'esté'.
- source_word: ἐὰν ἐν ὑμῖν μείνῃ
  english_pob_choice: If ... remains in you
  chosen_spanish: Si lo que oyeron desde el principio permanece en ustedes
  alternatives_spanish:
  - Si permanece en ustedes lo que oyeron desde el principio
  lexicon: BDAG
  rationale: La cláusula condicional retoma el mismo contenido para mantener la cohesión del griego. El orden español se ajusta para naturalidad sin perder la repetición de μένω.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - también ustedes
  - ustedes mismos también
  lexicon: BDAG
  rationale: '''También'' recoge el καί aditivo y el pronombre explícito mantiene el énfasis.'
- source_word: ἐν τῷ υἱῷ καὶ ἐν τῷ πατρὶ
  english_pob_choice: in the Son and in the Father
  chosen_spanish: en el Hijo y en el Padre
  alternatives_spanish:
  - en el Hijo y en Dios el Padre
  lexicon: BDAG
  rationale: Se conserva la repetición de ἐν y el paralelismo relacional. 'Hijo' y 'Padre' se presentan con artículo definido, como en el uso joánico estándar.
- source_word: μενεῖτε
  english_pob_choice: will remain
  chosen_spanish: permanecerán
  alternatives_spanish:
  - morarán
  - seguirán permaneciendo
  lexicon: BDAG
  rationale: El futuro indicativo se expresa de manera directa con 'permanecerán', preservando el enlace verbal con las demás formas de μένω en el versículo.
theological_decisions:
- issue: Alcance de la promesa condicional final
  english_pob_reading: 'Render the future indicative straightforwardly: ''you also will remain in the Son and in the Father,'' without importing debates about perseverance, assurance, or sacramental union.'
  chosen_spanish_reading: 'Traducir el futuro de manera directa: ''ustedes también permanecerán en el Hijo y en el Padre'', sin resolver la frase en categorías doctrinales posteriores.'
  alternative_spanish_readings:
  - Interpretarlo como exhortación más que como promesa
  - Leerlo como prueba de perseverancia en sentido sistemático posterior
  rationale: El griego presenta una condicional unida a la permanencia en el mensaje apostólico. La traducción debe conservar esa tensión, no neutralizarla con una explicación doctrinal ajena al texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Referente de 'lo que oyeron desde el principio'
  english_pob_reading: Keep the expression general rather than specifying 'gospel' or 'apostolic teaching' in the main text.
  chosen_spanish_reading: Mantener la expresión general sin añadir 'evangelio' ni 'enseñanza apostólica' en el texto principal.
  alternative_spanish_readings:
  - el evangelio que oyeron desde el principio
  - la enseñanza apostólica que oyeron desde el principio
  rationale: Aunque el contexto apunta con fuerza al anuncio apostólico original sobre el Hijo, el griego deja el referente en una forma relativa. El texto principal no debe estrecharlo más de lo que el original permite.
  doctrine_reference: Primacía del idioma original sobre la tradición de traducción.
translation_notes:
  revision_awareness: 'La versión española sigue la revisión inglesa final sin cambios sustanciales y mantiene la misma redacción-base: pronombre inicial enfático, objeto indefinido general, repetición de μένω y futuro directo. No se detectaron revisiones aplicadas en la fuente inglesa, por lo que la propuesta española conserva esa estabilidad y traslada la misma consistencia léxica al español.'
  spanish_consistency_notes:
  - Se usa 'permanecer' para μένω en todo el versículo, preservando coherencia verbal.
  - Se usa 'Hijo' y 'Padre' con artículo definido para reflejar el paralelismo joánico.
  - No se introduce 'Cristo', 'evangelio' ni 'enseñanza apostólica' en el texto principal, para respetar el alcance del griego.
  - La colocación de 'En cuanto a ustedes' busca reflejar el tópico enfático del pronombre inicial sin sonar artificiosa.
