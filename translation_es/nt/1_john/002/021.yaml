  rationale: Se corrige 'conozcan' a 'conocen' para reflejar el indicativo griego y el español natural. Se traslada la nota [b] a la cláusula final, que es donde corresponde la alternativa 'es de la verdad'. Se limpia un detalle tipográfico en la nota [a].
