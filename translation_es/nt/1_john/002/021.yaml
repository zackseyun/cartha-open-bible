translation:
  language: es
  text: No les he escrito[a] porque no conocen la verdad, sino porque la conocen, y porque ninguna mentira procede de la verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de modo más formal: «No les escribí». El aoristo griego puede verterse como pasado simple; el perfecto refleja con naturalidad la situación epistolar.'
    reason: lexical_alternative
  - marker: b
    text: O, «ninguna mentira es de la verdad».
    reason: alternative_reading
lexical_decisions:
- source_word: ἔγραψα
  english_pob_choice: I have not written
  chosen_spanish: No les he escrito
  alternatives_spanish:
  - No les escribí
  lexicon: BDAG
  rationale: El aoristo epistolar puede verterse como pasado simple o con perfecto en español. Opté por el perfecto para mantener el carácter de carta ya recibida, sin perder naturalidad.
- source_word: οἴδατε
  english_pob_choice: you do know
  chosen_spanish: la conocen
  alternatives_spanish:
  - la saben
  - ustedes conocen la verdad
  lexicon: BDAG
  rationale: El verbo expresa conocimiento real y afirmado en contraste con la negación previa. En español, la repetición del objeto directo 'la' preserva la referencia a 'la verdad' sin sonar forzada.
- source_word: ἀλήθεια / τῆς ἀληθείας
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad divina
  - la realidad
  lexicon: BDAG
  rationale: Se conserva el artículo definido y el valor joánico de verdad como realidad revelada, sin expandir el sentido a una paráfrasis doctrinal.
- source_word: αὐτήν
  english_pob_choice: it
  chosen_spanish: la
  alternatives_spanish:
  - la verdad
  lexicon: BDAG
  rationale: El pronombre femenino remite a ἀλήθεια. En español, 'la' mantiene la referencia pronominal y evita repetir innecesariamente el sustantivo.
- source_word: πᾶν ψεῦδος
  english_pob_choice: no lie
  chosen_spanish: ninguna mentira
  alternatives_spanish:
  - toda mentira
  - ninguna falsedad
  lexicon: BDAG
  rationale: La negación universal se expresa de forma idiomática en español con 'ninguna mentira', conservando el alcance total del griego.
- source_word: ἐκ τῆς ἀληθείας
  english_pob_choice: is from the truth
  chosen_spanish: procede de la verdad
  alternatives_spanish:
  - es de la verdad
  - nace de la verdad
  lexicon: BDAG
  rationale: ἐκ señala origen o procedencia. 'Procede de' comunica ese origen con precisión y buen español, sin añadir contenido ajeno al texto.
theological_decisions:
- issue: Relación entre verdad y mentira
  english_pob_reading: no lie is from the truth
  chosen_spanish_reading: ninguna mentira procede de la verdad
  alternative_spanish_readings:
  - ninguna mentira es de la verdad
  - la verdad no produce mentira
  rationale: 'La frase se conserva como afirmación de origen: la mentira no deriva de la verdad. Evita convertir el contraste en una tesis más amplia de la que el versículo formula.'
  doctrine_reference: Teología joánica de verdad/falsedad; cf. 1 Juan 1:6, 1:8, 2:4
- issue: Valor de 'la verdad'
  english_pob_reading: the truth
  chosen_spanish_reading: la verdad
  alternative_spanish_readings:
  - la verdad revelada
  - la verdadera enseñanza
  rationale: Se mantiene la expresión abierta y definida. No se especifica 'enseñanza' o 'evangelio' porque el griego solo habla de 'la verdad'.
  doctrine_reference: Uso joánico de ἀλήθεια; cf. Juan 14:6, 17:17
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la lectura final del POB inglés: se conserva el contraste entre no conocer/conocer la verdad y se mantiene ἐκ como relación de procedencia. Se evita la paráfrasis doctrinal y se respeta la ambigüedad teológica útil del texto.'
  spanish_consistency_notes:
  - Se usa 'la verdad' de forma consistente para ἀλήθεια/τῆς ἀληθείας.
  - Se emplea 'procede de' para ἐκ con valor de origen.
  - Se mantiene el pronombre femenino 'la' para αὐτήν, evitando una traducción neutra artificial.
  - El registro es moderno y eclesial, sin recurrir a 'SEÑOR' u otras sustituciones no pertinentes.
