translation:
  language: es
  text: Estas cosas les he escrito acerca de quienes los están extraviando[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «quienes los engañan» o «quienes los están desviando». El participio griego puede expresar tanto engaño activo como el intento de hacerlos errar.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Esto
  - Estas
  lexicon: BDAG
  rationale: El demostrativo plural neutro pide un referente plural o colectivo en español; «estas cosas» conserva la referencia a lo ya escrito sin volverlo singular de forma artificial.
- source_word: ἔγραψα
  english_pob_choice: I have written
  chosen_spanish: les he escrito
  alternatives_spanish:
  - les escribí
  lexicon: BDAG
  rationale: 'En español, el pretérito perfecto compuesto expresa bien la acción ya cumplida con relevancia presente en el marco epistolar: «les he escrito».'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa naturalmente con el clítico indirecto «les»; puede implicar «a ustedes» sin sobrecargar la frase.
- source_word: περὶ
  english_pob_choice: concerning
  chosen_spanish: acerca de
  alternatives_spanish:
  - sobre
  - respecto de
  lexicon: BDAG
  rationale: Introduce el tema de lo escrito; «acerca de» es claro, formal y natural en español bíblico contemporáneo.
- source_word: τῶν πλανώντων ὑμᾶς
  english_pob_choice: those who are leading you astray
  chosen_spanish: los que los están extraviando
  alternatives_spanish:
  - los que los engañan
  - los que los están desviando
  lexicon: BDAG
  rationale: πλανάω conserva la imagen de hacer errar o extraviar; «extraviar» mantiene mejor el matiz direccional que «engañar». El gerundio progresivo «están extraviando» refleja la acción en curso del participio presente.
theological_decisions:
- issue: Cómo reflejar el participio presente πλανώντων sin resolver la intensidad de la acción
  english_pob_reading: those who are leading you astray
  chosen_spanish_reading: los que los están extraviando
  alternative_spanish_readings:
  - los que los engañan
  - los que los están desviando
  rationale: La forma presente participial describe a opositores en actividad; el español progresivo comunica mejor la acción en curso sin afirmar más de lo que exige el griego. Se preserva la tensión entre engaño doctrinal y acción de desviar.
  doctrine_reference: Mantener la advertencia pastoral sin suavizar la fuerza del participio presente.
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió de «are trying to lead you astray» a «are leading you astray» para reflejar más directamente el participio presente πλανώντων. La versión española adopta un progresivo equivalente («están extraviando») para conservar esa acción en curso.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no pertinente porque el verso no contiene el nombre divino.
  - Se mantiene el registro epistolar formal con una sintaxis natural en español.
  - «Extraviar» se elige por su valor direccional y porque preserva mejor la metáfora del griego que un simple «engañar».
