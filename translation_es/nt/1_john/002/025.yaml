translation:
  language: es
  text: 'Y esta es la promesa que él mismo nos prometió: la vida eterna[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vida eterna». El griego tiene artículo, pero en español esta expresión suele sonar más natural sin él.'
    reason: lexical_alternative
  - marker: b
    text: El pronombre «él mismo» es enfático en griego. El texto no indica de manera explícita si el referente es el Padre o el Hijo.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ αὕτη ἐστίν
  english_pob_choice: And this is
  chosen_spanish: Y esta es
  alternatives_spanish:
  - Y esto es
  - Y esta es la
  lexicon: BDAG
  rationale: La frase introduce y señala la promesa ya mencionada. «Y esta es» conserva la demostración y la copulativa de forma natural en español sin añadir interpretación.
- source_word: ἐπαγγελία
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - prometido
  - lo prometido
  lexicon: BDAG
  rationale: El sustantivo denota una promesa. «Promesa» mantiene el enlace léxico con el verbo relacionado más adelante en el versículo y es la opción más directa en español.
- source_word: αὐτός
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático en griego. «Él mismo» preserva ese énfasis que el inglés POB también quiso conservar.
- source_word: ἐπηγγείλατο
  english_pob_choice: promised
  chosen_spanish: hizo
  alternatives_spanish:
  - prometió
  - ha prometido
  lexicon: BDAG
  rationale: En español, «nos hizo» con «la promesa» expresa con naturalidad la construcción verbal del griego, y permite mantener el sustantivo «promesa» como objeto directo implícito del contenido prometido. «Prometió» también sería posible, pero aquí se evita una repetición menos idiomática con «promesa» y se conserva el valor de acción pasada del aoristo.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo se expresa de modo natural con el clítico de objeto indirecto «nos» en español.
- source_word: τὴν ζωὴν τὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: la vida eterna
  alternatives_spanish:
  - la vida eterna
  - vida eterna
  lexicon: BDAG
  rationale: La expresión joánica ζὴ αἰώνιος se traduce de forma estándar y clara como «vida eterna». El artículo griego puede reflejar una referencia definida, pero en español no suele conservarse en forma marcada en este tipo de predicación nominal.
theological_decisions:
- issue: Referencia del pronombre enfático αὐτός
  english_pob_reading: Retained as 'he himself' without specifying beyond the Greek pronoun.
  chosen_spanish_reading: Se mantiene «él mismo» sin identificar explícitamente si el referente es el Padre o el Hijo.
  alternative_spanish_readings:
  - el Padre mismo
  - el Hijo mismo
  rationale: El texto griego no nombra de nuevo al referente y el contexto admite más de una lectura. La traducción conserva esa apertura, siguiendo el audit trail inglés que evita resolver la cuestión más allá del verso.
  doctrine_reference: Preservar la tensión textual y no resolver la referencia pronominal más allá del griego.
translation_notes:
  revision_awareness: 'Coincide con el pasaje auditado en inglés: se mantiene la cláusula introductoria, el sustantivo «promesa», el énfasis de αὐτός y la referencia abierta del pronombre, sin cambios de revisión relevantes en el expediente.'
  spanish_consistency_notes:
  - Se conserva «promesa» para mantener la relación léxica con el verbo cognado del verso.
  - Se usa «él mismo» para reflejar el énfasis pronominal sin añadir un referente no explicitado.
  - «Vida eterna» funciona como equivalente idiomático de ζωή αἰώνιος en español bíblico contemporáneo.
