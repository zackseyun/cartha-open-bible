  glossary_alignment: 'No hay conflicto con la terminología troncal del proyecto. La decisión principal a corregir es léxica: ἐπηγγείλατο debe renderizarse como «prometió», no «hizo». Se conserva correctamente «él mismo» para αὐτός y «vida eterna» para ζωή αἰώνιος.'
