revisions:
- from: Si saben que él es justo, sepan también que todo el que practica la justicia ha nacido de él[a][b].
  to: Si saben que él es justo[b], saben también que todo el que practica la justicia ha nacido de él[a].
  rationale: Se corrige «sepan también» a «saben también» para reflejar el indicativo griego y mantener el paralelismo argumentativo. Se conserva «justo», «practica la justicia» y «ha nacido de él» como opciones fieles y naturales. Se mejora la nota alternativa de ἐξ αὐτοῦ con una formulación española más idiomática que «desde él».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:44:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura condicional y el sentido general del griego: conocimiento de que «él es justo» y la inferencia de que quien practica la justicia ha nacido de él. Mantiene correctamente la ambigüedad del referente de «él». Sin embargo, introduce un cambio importante de modo verbal en γινώσκετε: el griego está auditado como indicativo («you know»), no como imperativo. Además, la nota alternativa para ἐξ αὐτοῦ usa «desde él», que no es la alternativa más natural ni más fiel en español para este giro; «de él / de parte de él / de origen en él» funciona mejor. También conviene alinear δικαιοσύνη con la decisión inglesa «righteousness» usando una formulación española más ética que meramente judicial.'
  spanish_quality_summary: El español es claro y legible, pero «sepan también» suena exhortativo y altera el flujo argumentativo de Juan. «Ustedes saben» o simplemente «saben» mantiene mejor el paralelismo. «Practica la justicia» es aceptable, aunque «practica la rectitud» o «practica lo que es justo» podría aclarar mejor el matiz ético; aun así, «la justicia» sigue siendo viable por consistencia terminológica. Las notas están bien planteadas, pero la alternativa «desde él» resulta poco idiomática en una expresión de nuevo nacimiento.
  glossary_alignment: 'Alineación mayormente buena con las directrices del proyecto: δίκαιος como «justo» es adecuado; la tensión teológica del pronombre se preserva; γεγέννηται como «ha nacido» es natural y fiel. El punto principal de desalineación está en γινώσκετε, cuya decisión léxica en el borrador afirma erróneamente que es imperativo. Para ἐξ αὐτοῦ, debe mantenerse una alternativa española más idiomática que «desde él».'
  issues:
  - severity: high
    issue: γινώσκετε fue traducido como imperativo («sepan también») en lugar de indicativo.
    rationale: El paquete fuente y la auditoría inglesa lo tratan como 2PAI-P--, es decir, indicativo presente activo plural. Cambiarlo a exhortación altera el sentido del versículo.
  - severity: medium
    issue: La nota de alternativa para ἐξ αὐτοῦ usa «desde él».
    rationale: Aunque ἐκ/ἐξ puede expresar origen, «desde él» no es una alternativa natural en español para «ha nacido de él». Una nota como «O ‘de parte de él’» o «O ‘de origen en él’» preserva mejor la posibilidad léxica sin español forzado.
  - severity: low
    issue: La secuencia de notas [a][b] está anclada solo al final de «de él», pero la nota sobre el referente de «él» afecta también al primer «él».
    rationale: No es incorrecto anclar ambas al segundo «él», pero sería ligeramente más claro poner la nota del referente en la primera aparición o dejar ambas donde están si se desea economía. No requiere adjudicación compleja.
  revised_spanish_text: Si saben que él es justo[b], saben también que todo el que practica la justicia ha nacido de él[a].
  revised_footnotes:
  - marker: a
    text: O «de parte de él». La expresión griega puede traducirse de cualquiera de las dos maneras.
    reason: lexical_alternative
  - marker: b
    text: El pronombre «él» puede referirse a Dios Padre o al Hijo; el griego no especifica explícitamente el referente aquí.
    reason: alternative_reading
  revision_rationale: Se corrige «sepan también» a «saben también» para reflejar el indicativo griego y mantener el paralelismo argumentativo. Se conserva «justo», «practica la justicia» y «ha nacido de él» como opciones fieles y naturales. Se mejora la nota alternativa de ἐξ αὐτοῦ con una formulación española más idiomática que «desde él».
