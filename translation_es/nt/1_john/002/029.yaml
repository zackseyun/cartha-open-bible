translation:
  language: es
  text: Si saben que él es justo[b], saben también que todo el que practica la justicia ha nacido de él[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de parte de él». La expresión griega puede traducirse de cualquiera de las dos maneras.
    reason: lexical_alternative
  - marker: b
    text: El pronombre «él» puede referirse a Dios Padre o al Hijo; el griego no especifica explícitamente el referente aquí.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Siempre que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional; en español, «si» es la opción más natural y directa, sin añadir una matización temporal que el contexto no exige.
- source_word: εἰδῆτε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - conocen
  lexicon: BDAG
  rationale: El verbo expresa conocimiento reconocido. Se opta por «saben» para mantener el valor general de conocimiento y la fluidez en español, sin forzar un tiempo compuesto que suene menos natural aquí.
- source_word: δίκαιός
  english_pob_choice: righteous
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - justo en su carácter
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «righteous», en español «justo» es la equivalencia más natural y fiel para δίκαιος en este contexto joánico. Conserva el contenido moral/teológico sin cargar de manera artificial el sintagma.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: sepan también
  alternatives_spanish:
  - reconozcan también
  - sabrán también
  lexicon: BDAG
  rationale: 'La forma griega es un imperativo de segunda persona plural; por eso se vierte como exhortación: «sepan también». Se preserva la fuerza discursiva y el paralelismo con la primera cláusula de conocimiento.'
- source_word: πᾶς ὁ ποιῶν
  english_pob_choice: everyone who practices
  chosen_spanish: todo el que practica
  alternatives_spanish:
  - todo el que hace
  - cada uno que practica
  lexicon: BDAG
  rationale: El participio presente comunica acción característica o habitual. «Practica» expresa mejor esa conducta continua que un simple «hace».
- source_word: τὴν δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/righteousness
  lexicon: BDAG
  rationale: Se opta por «justicia» porque la raíz δικαιο- en español admite ese campo semántico y porque el contexto habla de conducta conforme al carácter de Dios. En nota puede quedar abierta la proximidad semántica con «rectitud».
- source_word: ἐξ αὐτοῦ
  english_pob_choice: of him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - procedente de él
  lexicon: BDAG
  rationale: La preposición ἐκ/ἐξ puede traducirse como «de» o «desde». En este giro de nacimiento, «de él» es el equivalente idiomático y conserva la relación de origen/derivación que el griego permite.
- source_word: γεγέννηται
  english_pob_choice: has been born
  chosen_spanish: ha nacido
  alternatives_spanish:
  - ha sido engendrado
  - ha sido nacido
  lexicon: BDAG
  rationale: El perfecto pasivo indica un hecho consumado con efecto presente. «Ha nacido» es la forma natural en español bíblico contemporáneo y preserva la imagen de nacimiento sin recurrir a «engendrado», que suena más técnico o más arcaico según el contexto.
theological_decisions:
- issue: Referente de «él / de él» (δίκαιός ἐστιν ... ἐξ αὐτοῦ)
  english_pob_reading: Retain the pronoun 'he/him' without specifying whether the referent is God the Father or the Son.
  chosen_spanish_reading: Mantener «él / de él» sin identificar si el referente es Dios Padre o el Hijo.
  alternative_spanish_readings:
  - Dios Padre
  - el Hijo
  rationale: El contexto inmediato permite más de una posibilidad y el griego no la explicita. La traducción conserva esa tensión teológica en vez de resolverla interpretativamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requieren cambios adicionales respecto del texto fuente y del audit trail en inglés.'
  spanish_consistency_notes:
  - Se mantuvo un registro de tono bíblico actual, digno y claro, evitando calcos innecesarios.
  - Se preservó la ambigüedad del referente pronominal con una nota explícita, conforme al audit trail en inglés.
  - Se eligió «justicia» para δικαιοσύνη y «justo» para δίκαιος, manteniendo la relación léxica entre ambos términos.
  - Se reflejó la diferencia aspectual entre εἰδῆτε y γινώσκετε mediante una cláusula condicional y una exhortación en presente.
