translation:
  language: es
  text: De nuevo[a] les escribo un mandamiento nuevo, el cual es verdadero en él y en ustedes, porque la oscuridad está pasando y la luz verdadera ya está resplandeciendo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que es verdadero en ello y en ustedes», entendiendo el pronombre como referido al mandamiento más que a Cristo.'
    reason: alternative_reading
lexical_decisions:
- source_word: πάλιν
  english_pob_choice: Again
  chosen_spanish: Otra vez
  alternatives_spanish:
  - De nuevo
  - Nuevamente
  lexicon: BDAG
  rationale: πάλιν marca aquí una reanudación o giro discursivo. «Otra vez» conserva esa función breve y natural en español, sin sobreexplicar el contraste con el versículo anterior.
- source_word: ἐντολὴν καινὴν
  english_pob_choice: a new commandment
  chosen_spanish: un mandamiento nuevo
  alternatives_spanish:
  - un precepto nuevo
  - un mandamiento fresco
  lexicon: BDAG
  rationale: «Mandamiento nuevo» es la correspondencia más directa y natural para ἐντολή + καινός. «Nuevo» conserva la cualidad de novedad en sentido de clase o carácter, no solo de reciente aparición.
- source_word: γράφω
  english_pob_choice: I am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - estoy escribiéndoles
  - escribo
  lexicon: BDAG
  rationale: El presente epistolar en español se expresa con naturalidad como «les escribo». Evita una perífrasis innecesaria y mantiene el acto de carta en curso.
- source_word: ὅ
  english_pob_choice: which
  chosen_spanish: el cual
  alternatives_spanish:
  - que
  - lo cual
  lexicon: BDAG
  rationale: El relativo neutro funciona aquí de manera conceptual. «El cual» permite mantener la relación con «mandamiento» sin forzar una simple equivalencia mecánica y suena sobrio en español bíblico moderno.
- source_word: ἀληθὲς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - real
  - genuino
  lexicon: BDAG
  rationale: «Verdadero» conserva el campo semántico de ἀληθής y armoniza con «luz verdadera» en la misma frase. «Genuino» o «real» serían posibles, pero menos estables en este contexto.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en ello
  - en eso
  lexicon: BDAG
  rationale: Se mantiene el pronombre masculino porque el audit trail anglosajón entiende que el referente más probable es Cristo. «En él» preserva esa lectura personal sin cerrar la alternativa gramatical.
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en vosotros
  lexicon: BDAG
  rationale: «En ustedes» refleja el plural de segunda persona en español neutral de América Latina y conserva la relación paralela con «en él».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: «Porque» expresa la relación causal introducida por ὅτι de manera clara y directa en español contemporáneo.
- source_word: ἡ σκοτία
  english_pob_choice: the darkness
  chosen_spanish: la oscuridad
  alternatives_spanish:
  - las tinieblas
  - la tiniebla
  lexicon: BDAG
  rationale: «Oscuridad» comunica bien el valor moral-espiritual del término en un español moderno y ampliamente entendible. Se evita «tinieblas» como opción más tradicional, salvo donde el contexto requiera un tono más litúrgico o poético.
- source_word: παράγεται
  english_pob_choice: is passing away
  chosen_spanish: va pasando
  alternatives_spanish:
  - está pasando
  - se va desvaneciendo
  - está desapareciendo
  lexicon: BDAG
  rationale: La imagen de un proceso en curso se conserva con «va pasando», que es idiomático y no introduce una conclusión total prematura. «Desvaneciéndose» o «desapareciendo» intensificarían más de lo que el griego exige.
- source_word: τὸ φῶς τὸ ἀληθινὸν
  english_pob_choice: the true light
  chosen_spanish: la luz verdadera
  alternatives_spanish:
  - la luz auténtica
  - la luz genuina
  lexicon: BDAG
  rationale: «Luz verdadera» reproduce la fórmula joánica clásica y mantiene el contraste con «oscuridad». Se conserva el artículo por su valor conceptual.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - todavía
  - aún
  lexicon: BDAG
  rationale: «Ya» es la forma más natural y breve para marcar la acción presente cumplida o en curso que ἤδη introduce.
- source_word: φαίνει
  english_pob_choice: is already shining
  chosen_spanish: está resplandeciendo
  alternatives_spanish:
  - está brillando
  - ya brilla
  lexicon: BDAG
  rationale: «Resplandeciendo» comunica la acción continua de φαίνει con un matiz luminoso apropiado al contraste con la oscuridad. «Brillando» sería posible, pero menos marcado poéticamente.
theological_decisions:
- issue: Referente de ἐν αὐτῷ / αὐτῷ
  english_pob_reading: 'The phrase refers to Christ: “true in him and in you.”'
  chosen_spanish_reading: La frase se vierte como «en él», entendiendo el referente principal como Cristo.
  alternative_spanish_readings:
  - «en ello», si se entiende que el referente es el mandamiento
  - «en eso», como lectura neutra del antecedente conceptual
  rationale: El griego permite una discusión real del referente del pronombre neutro relativo y del masculino posterior. El audit trail inglés favorece a Cristo por contexto joánico y por el pronombre masculino. En español se preserva esa lectura con «en él», sin borrar la alternativa interpretativa.
  doctrine_reference: Preservar la tensión exegética documentada; no cerrar indebidamente el referente.
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final del texto inglés fue confirmado como estable, con solo una observación menor sobre el referente pronominal preservada en nota.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparece el nombre divino; aquí no ocurre.
  - Se mantiene «mandamiento» para ἐντολή, no «precepto», por continuidad joánica y por el audit trail inglés.
  - Se opta por «oscuridad» en lugar de «tinieblas» para un registro moderno, mientras se conserva el artículo definido del griego.
  - La lectura principal mantiene «en él»; la alternativa textual/interpretativa queda explicitada en la nota, sin eliminar la ambigüedad documentada.
  - El español elegido evita calcar la sintaxis inglesa y prioriza una frase natural sin perder el paralelismo entre «en él» y «en ustedes».
