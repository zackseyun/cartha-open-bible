    issue: «Otra vez» para πάλιν
    rationale: Aunque no es incorrecto, aquí πάλιν funciona como marcador discursivo del tipo «de nuevo / nuevamente». «Otra vez» puede sonar más coloquial o repetitivo en español bíblico y menos natural al inicio de la oración.
  - severity: medium
    issue: «va pasando» para παράγεται
    rationale: El griego apunta a que la oscuridad está pasando/desapareciendo. «Va pasando» en español puede sonar más débil o ambiguo, incluso temporal, mientras que «está pasando» o «está desapareciendo» refleja mejor el proceso en curso sin sobreinterpretar.
