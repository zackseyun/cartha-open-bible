  to: De nuevo[a] les escribo un mandamiento nuevo, el cual es verdadero en él y en ustedes, porque la oscuridad está pasando y la luz verdadera ya está resplandeciendo.
  rationale: Se hacen ajustes menores para mejorar la naturalidad y la precisión semántica sin cambiar la exégesis del borrador. «De nuevo» representa mejor πάλιν en este contexto discursivo, y «está pasando» expresa con más claridad el proceso indicado por παράγεται. Se conserva «en él» con nota alternativa, en línea con el audit trail inglés.
