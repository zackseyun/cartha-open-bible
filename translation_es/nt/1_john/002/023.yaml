translation:
  language: es
  text: Todo el que niega al Hijo no tiene tampoco al Padre[a]; el que confiesa al Hijo también tiene al Padre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos omiten: «el que confiesa al Hijo también tiene al Padre».'
    reason: textual_variant
lexical_decisions:
- source_word: πᾶς ὁ ἀρνούμενος
  english_pob_choice: Everyone who denies
  chosen_spanish: Todo el que niega
  alternatives_spanish:
  - Cualquiera que niega
  - Todo aquel que niega
  lexicon: BDAG
  rationale: El participio articular presente funciona de manera sustantiva y general. «Todo el que niega» comunica con naturalidad el alcance universal y la fuerza genérica/continua sin volver la frase demasiado mecánica.
- source_word: ἀρνούμενος
  english_pob_choice: denies
  chosen_spanish: niega
  alternatives_spanish:
  - rechaza
  - desconoce
  lexicon: BDAG
  rationale: En un contexto confesional joánico, ἀρνέομαι expresa negar la identidad del Hijo. «Niega» preserva esa fuerza teológica mejor que «rechaza» o «desconoce».
- source_word: τὸν υἱόν
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al Hijo de Dios
  lexicon: BDAG
  rationale: El griego dice simplemente «al Hijo». Mantenerlo así evita ampliar innecesariamente el título, aunque el sentido cristológico sea claramente definido por el contexto.
- source_word: οὐδὲ
  english_pob_choice: either
  chosen_spanish: tampoco
  alternatives_spanish:
  - ni tampoco
  - ni
  lexicon: BDAG
  rationale: 'En español, «tampoco» reproduce con naturalidad la relación correlativa: quien niega al Hijo no tiene al Padre. Conserva la doble negación sin sobrecargar la sintaxis.'
- source_word: τὸν πατέρα ἔχει
  english_pob_choice: have the Father
  chosen_spanish: tiene al Padre
  alternatives_spanish:
  - posee al Padre
  - tiene relación con el Padre
  lexicon: BDAG
  rationale: ἔχω significa literalmente «tener». Se conserva la expresión directa sin convertirla en paráfrasis relacional, para mantener la tensión teológica del dicho joánico.
- source_word: ὁ ὁμολογῶν
  english_pob_choice: whoever confesses
  chosen_spanish: el que confiesa
  alternatives_spanish:
  - quien confiesa
  - todo el que confiesa
  lexicon: BDAG
  rationale: El participio presente sustantivado permite una forma general en español. «El que confiesa» es idiomático y balancea bien la primera cláusula.
- source_word: ὁμολογῶν
  english_pob_choice: confesses
  chosen_spanish: confiesa
  alternatives_spanish:
  - reconoce
  - profiesa
  lexicon: BDAG
  rationale: ὁμολογέω implica confesión explícita y pública; «confiesa» lo expresa con más precisión que «reconoce» y con menos carga denominacional que «profiesa».
- source_word: καὶ τὸν πατέρα ἔχει
  english_pob_choice: has the Father also
  chosen_spanish: también tiene al Padre
  alternatives_spanish:
  - y tiene al Padre
  - tiene también al Padre
  lexicon: BDAG
  rationale: «También» recoge el valor correlativo de καί en paralelo con οὐδὲ del primer miembro. Mantiene la simetría retórica del versículo en español natural.
theological_decisions:
- issue: Relación entre confesar al Hijo y tener al Padre
  english_pob_reading: Retain the literal expression 'have the Father' without paraphrasing.
  chosen_spanish_reading: Conservar «tener al Padre» sin explicitarlo como «tener comunión con el Padre» o «pertenecer al Padre».
  alternative_spanish_readings:
  - tener comunión con el Padre
  - pertenecer al Padre
  rationale: El texto formula una afirmación fuerte y condensada. Traducirla literalmente preserva el peso teológico y evita resolver de antemano el tipo exacto de relación implicada.
  doctrine_reference: Translation philosophy §3
- issue: Variante textual de la segunda cláusula
  english_pob_reading: Included in the main text as authentic, with a footnote noting omission in some manuscripts.
  chosen_spanish_reading: Incluir la segunda cláusula en el texto principal y marcar la nota textual.
  alternative_spanish_readings:
  - Omitir «el que confiesa al Hijo también tiene al Padre» en el texto principal
  rationale: El texto griego base proporcionado incluye la cláusula final; por eso se traduce en el cuerpo principal y se preserva la variante manuscrita en nota.
  doctrine_reference: SBLGNT textual apparatus
- issue: Alcance de «al Hijo»
  english_pob_reading: The Greek reads simply 'the Son.' Expanding to 'the Son of God' would import contextually true theology not explicitly stated in this clause.
  chosen_spanish_reading: Mantener solo «al Hijo» sin expandir a «al Hijo de Dios».
  alternative_spanish_readings:
  - al Hijo de Dios
  rationale: La ampliación sería verdadera, pero no está expresada aquí. Mantener el título simple respeta el enunciado original y evita añadir contenido no formulado en el verso.
  doctrine_reference: Johnannine christology
translation_notes:
  revision_awareness: Se revisó el texto griego SBLGNT y el audit trail inglés. No se detectaron revisiones posteriores que cambien la decisión textual; se mantuvo la segunda cláusula en el cuerpo principal con nota de variante manuscrita.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el nombre divino.
  - Se mantiene «Hijo» sin ampliar a «Hijo de Dios» para respetar la forma breve del griego.
  - Se conserva la construcción literal «tiene al Padre» para no neutralizar la densidad teológica joánica.
