translation:
  language: es
  text: Hijos, es la última hora, y así como oyeron que anticristo[a] viene, aun ahora han surgido muchos anticristos[b]; de esto sabemos que es la última hora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el anticristo». El griego no lleva artículo; en español también puede expresarse con artículo para indicar una figura esperada y reconocible.
    reason: alternative_reading
  - marker: b
    text: O «han aparecido» o «han venido». El perfecto griego destaca que muchos anticristos han surgido y están presentes ahora.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παιδία
  english_pob_choice: Children
  chosen_spanish: Hijitos
  alternatives_spanish:
  - Hijos
  - Niños
  - Amados hijos
  lexicon: BDAG
  rationale: Vocativo pastoral plural. «Hijitos» conserva el tono familiar y afectuoso del griego sin volverlo demasiado infantil; en español es una forma natural y reverente dentro del registro joánico.
- source_word: ἐσχάτη ὥρα
  english_pob_choice: the last hour
  chosen_spanish: la última hora
  alternatives_spanish:
  - la hora final
  - el último tiempo
  lexicon: BDAG
  rationale: Expresión escatológica temporal. «La última hora» reproduce de cerca la forma y mantiene la fuerza metafórica sin convertirla en una cronología precisa.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: Marca correspondencia con lo que los lectores ya oyeron. «Así como» expresa mejor la comparación que un simple «como».
- source_word: ἠκούσατε
  english_pob_choice: you heard
  chosen_spanish: oyeron
  alternatives_spanish:
  - han oído
  - escucharon
  lexicon: BDAG
  rationale: Aoristo referido a instrucción previa recibida. El pretérito español es natural y comunica el hecho de haber recibido esa enseñanza.
- source_word: ἀντίχριστος
  english_pob_choice: antichrist
  chosen_spanish: anticristo
  alternatives_spanish:
  - el anticristo
  lexicon: BDAG
  rationale: Se conserva el término técnico joánico. En español, «anticristo» funciona como sustantivo reconocible y permite mantener la tensión entre el singular esperado y la realidad plural del versículo.
- source_word: ἔρχεται
  english_pob_choice: is coming
  chosen_spanish: viene
  alternatives_spanish:
  - está viniendo
  - ha de venir
  lexicon: BDAG
  rationale: Presente con sentido prospectivo. «Viene» es idiomático en español y conserva la orientación hacia una llegada esperada.
- source_word: καὶ νῦν
  english_pob_choice: even now
  chosen_spanish: aun ahora
  alternatives_spanish:
  - y ahora
  - incluso ahora
  lexicon: BDAG
  rationale: La combinación intensifica el contraste entre el esperado singular y la presencia actual de muchos. «Aun ahora» conserva bien ese énfasis.
- source_word: ἀντίχριστοι πολλοὶ
  english_pob_choice: many antichrists
  chosen_spanish: muchos anticristos
  alternatives_spanish:
  - muchos antichristos
  - muchos tipos de anticristo
  lexicon: BDAG
  rationale: Plural directo del mismo término. Se mantiene la relación léxica con el singular anterior y se evita suavizar el contraste que el texto presenta.
- source_word: γεγόνασιν
  english_pob_choice: have arisen
  chosen_spanish: han surgido
  alternatives_spanish:
  - han aparecido
  - han venido a ser
  lexicon: BDAG
  rationale: Perfecto de γίνομαι que indica aparición efectiva y estado presente. «Han surgido» comunica bien el hecho de haber irrumpido en escena y seguir presentes.
- source_word: ὅθεν
  english_pob_choice: From this
  chosen_spanish: por eso
  alternatives_spanish:
  - de esto
  - de aquí
  lexicon: BDAG
  rationale: Introduce una inferencia a partir de la observación anterior. «Por eso» es una equivalencia natural en español y conserva el valor conclusivo.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - reconocemos
  - conocemos
  lexicon: BDAG
  rationale: Verbo johánico de conocer/reconocer. «Sabemos» es la opción más natural en español y comunica la conclusión segura del autor.
theological_decisions:
- issue: Sentido de «la última hora»
  english_pob_reading: An eschatological period indicating the decisive final stage of redemptive history, not necessarily a literal sixty-minute period.
  chosen_spanish_reading: Una expresión escatológica que señala la etapa decisiva final de la historia redentora, no una hora cronológica literal.
  alternative_spanish_readings:
  - el momento final inmediato
  - una crisis meramente retórica
  rationale: La traducción conserva la metáfora temporal sin resolverla en un esquema de fin del mundo. El contexto de anticristo/anticristos muestra peso escatológico, pero el texto no obliga a precisar más.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
- issue: Relación entre el singular «anticristo» y los plurales «muchos anticristos»
  english_pob_reading: Retain both the expected singular figure/category and the present plurality in the main text without harmonizing them.
  chosen_spanish_reading: Mantener en español tanto la figura singular esperada como la pluralidad presente, sin armonizarlas.
  alternative_spanish_readings:
  - tomar el singular solo como categoría genérica
  - identificar explícitamente al singular como un individuo ya definido
  rationale: Juan contrapone lo que habían oído sobre un anticristo venidero con la realidad de muchos anticristos. La traducción debe preservar esa tensión y no cerrarla interpretativamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: Se siguió el último pase de revisión sin cambios; la redacción española mantiene la tensión entre el anticristo singular esperado y los muchos anticristos presentes, y conserva la metáfora escatológica de «la última hora» sin explicitar un sistema de fin de los tiempos.
  spanish_consistency_notes:
  - Se mantuvo «anticristo/anticristos» para preservar el vínculo léxico del versículo.
  - Se prefirió «la última hora» por consistencia con el audit trail en inglés y por transparencia escatológica.
  - Se usó vocabulario bíblico moderno y natural en español, evitando calcos innecesarios.
