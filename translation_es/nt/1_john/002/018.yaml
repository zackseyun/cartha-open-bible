base_translation:
  language: en
  yaml_path: translation/nt/1_john/002/018.yaml
  text: Children[a], it is the last hour, and just as you heard that antichrist is coming, even now many antichrists have arisen[b]. From this we know that it is the last hour.
  footnotes:
  - marker: a
    text: Or 'the antichrist is coming.' The Greek noun is anarthrous ('antichrist' without the article), but English may also express it with the article to indicate a recognized expected figure.
    reason: alternative_reading
  - marker: b
    text: Or 'have appeared' or 'have come.' The Greek perfect verb emphasizes that many antichrists have arisen and are now present.
    reason: lexical_alternative
