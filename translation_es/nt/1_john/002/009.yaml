translation:
  language: es
  text: El que dice que está en la luz y odia a su hermano[a] está en la oscuridad hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hermano o hermana». El griego tiene el singular masculino «hermano», que aquí puede funcionar de manera representativa en este contexto ético.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λέγων
  english_pob_choice: The one who says
  chosen_spanish: El que dice
  alternatives_spanish:
  - Quien dice
  - La persona que dice
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente y describe a una persona de manera representativa y continua. «El que dice» conserva esa estructura sin volverla pesada en español.
- source_word: ἐν τῷ φωτὶ
  english_pob_choice: in the light
  chosen_spanish: en la luz
  alternatives_spanish:
  - en luz
  - en la luz divina
  lexicon: BDAG
  rationale: Se conserva la imagen joánica de esfera o ámbito espiritual. «La luz» mantiene el artículo del griego y su contraste con «la oscuridad».
- source_word: εἶναι
  english_pob_choice: he is
  chosen_spanish: está
  alternatives_spanish:
  - es
  - permanece
  lexicon: BDAG
  rationale: En español, después de «dice que» resulta natural y fiel usar «está» para expresar la situación o esfera en que afirma encontrarse. Evita endurecer la frase con una perífrasis innecesaria.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su compañero creyente
  lexicon: BDAG
  rationale: Se mantiene el singular masculino del griego como «hermano», preservando la forma léxica y el posible valor representativo. El sentido inclusivo queda indicado en la nota, sin introducirlo en el texto principal.
- source_word: μισῶν
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - está odiando
  - aborrece
  lexicon: BDAG
  rationale: El participio presente comunica una actitud característica o persistente; en español, el presente simple «odia» transmite con naturalidad esa cualidad habitual sin sonar forzado.
- source_word: ἐν τῇ σκοτίᾳ
  english_pob_choice: in the darkness
  chosen_spanish: en la oscuridad
  alternatives_spanish:
  - en tinieblas
  - en oscuridad
  lexicon: BDAG
  rationale: «Oscuridad» es el equivalente natural y claro para el contraste joánico con «luz». Se conserva el artículo para reflejar el paralelismo del griego.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - todavía
  - hasta el presente
  lexicon: BDAG
  rationale: La locución idiomática se vierte con la expresión española más directa y natural. Mantiene la idea temporal de continuidad hasta el momento presente.
theological_decisions:
- issue: Alcance representativo de ἀδελφός en un dicho ético singular
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - compañero creyente
  rationale: Se respeta el masculino singular del griego en el texto principal. Dado que en este contexto puede funcionar representativamente, se añade nota para evitar una lectura demasiado restringida en español sin alterar la forma del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial más reciente; el texto inglés auditado quedó confirmado sin cambios, y la versión española sigue fielmente esa lectura base con ajuste natural de estilo en español.
  spanish_consistency_notes:
  - Se mantiene «luz/oscuridad» como par contrastivo joánico.
  - Se conserva el singular masculino «hermano» en el texto principal, con aclaración en nota.
  - «Hasta ahora» refleja el valor temporal de ἕως ἄρτι sin añadir matices no atestiguados.
