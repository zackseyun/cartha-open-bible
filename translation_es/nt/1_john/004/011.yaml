translation:
  language: es
  text: Amados[a], si Dios nos amó así, también nosotros debemos amarnos unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «puesto que Dios nos amó de esta manera». El griego usa una forma condicional («si») que probablemente da por verdadera la condición en el contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - queridos
  - amados y amadas
  - amados hermanos
  lexicon: BDAG
  rationale: Vocativo plural afectivo. 'Amados' conserva el vínculo léxico con ἀγαπάω/ἀγάπη y suena natural en español bíblico actual. Se evita 'queridos' por ser menos cargado teológicamente.
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - puesto que
  - ya que
  lexicon: BDAG
  rationale: Se mantiene la forma condicional para reflejar la estructura del griego y la tensión exhortativa del enunciado. 'Si' preserva el valor formal sin resolverlo interpretativamente como causal.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - de esta manera
  lexicon: BDAG
  rationale: '''Así'' comunica de forma breve y natural la referencia al modo/alcance del amor de Dios, sin expandir más de lo que el griego exige.'
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Nombre común teológico estándar en español; el artículo no necesita reproducirse explícitamente.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - ha amado
  - nos amó
  lexicon: BDAG
  rationale: Aoristo de ἀγαπάω. 'Amó' preserva el campo léxico de amor con el vocativo 'Amados' y la forma verbal directa y sobria.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre de objeto directo natural en español. 'Nos' integra bien la frase verbal sin añadir énfasis innecesario.
- source_word: καὶ ἡμεῖς
  english_pob_choice: we also
  chosen_spanish: también nosotros
  alternatives_spanish:
  - nosotros también
  - y nosotros
  lexicon: BDAG
  rationale: '''También nosotros'' reproduce el énfasis del pronombre explícito griego y el valor aditivo de καί en una construcción natural.'
- source_word: ὀφείλομεν
  english_pob_choice: ought to
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - tenemos que
  lexicon: BDAG
  rationale: ὀφείλω expresa obligación moral/deuda. 'Debemos' mantiene la fuerza ética sin sonar mecánico; 'estamos obligados a' sería más explícito pero menos fluido.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre nosotros
  lexicon: BDAG
  rationale: Recíproco estándar y natural en español. Conserva el valor mutuo sin introducir un objeto más específico.
- source_word: ἀγαπᾶν
  english_pob_choice: to love
  chosen_spanish: amarnos
  alternatives_spanish:
  - amar
  - querernos
  lexicon: BDAG
  rationale: 'El infinitivo complementario se vierte de modo natural con pronombre enclítico: ''amarnos''. Conserva el mismo léxico de amor que estructura el versículo.'
theological_decisions:
- issue: Fuerza de la cláusula condicional εἰ οὕτως ὁ θεὸς ἠγάπησεν ἡμᾶς
  english_pob_reading: Retain the formal conditional 'if God so loved us' rather than converting it to a causal 'since God loved us in this way.'
  chosen_spanish_reading: Conservar 'si Dios nos amó así' en vez de resolverlo como causal ('puesto que/ya que').
  alternative_spanish_readings:
  - puesto que Dios nos amó así
  - ya que Dios nos amó así
  rationale: El griego presenta una condición formal que funciona exhortativamente, aunque presupone verdadera la premisa. Mantener 'si' preserva la estructura y la tensión retórica del texto sin interpretarla en exceso.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La traducción sigue el pasaje fuente SBLGNT y coincide con el control de revisión más reciente, que no introdujo cambios. Se conservó la lectura condicional documentada por la POB en inglés y el léxico de amor se mantuvo coherentemente en todo el versículo.
  spanish_consistency_notes:
  - Se mantuvo la familia léxica de ἀγαπάω con 'amados', 'amó' y 'amarnos'.
  - Se evitó 'Señor' o 'Cristo' porque no aparecen en el versículo.
  - '''Si'' conserva la condicionalidad formal del griego; la nota aclara la alternativa causal sin sustituirla en el texto principal.'
  - '''También nosotros'' reproduce el énfasis del sujeto explícito griego de forma natural en español.'
