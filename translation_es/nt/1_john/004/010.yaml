  glossary_alignment: 'Alineación general buena: Dios, Hijo, amor, pecados. No hay conflicto con los términos globales del proyecto. La desalineación está en ἱλασμός, donde conviene ''el sacrificio expiatorio'' en el texto principal, con ''propiciación'' y ''expiación'' como alternativas en nota, siguiendo la decisión teológica inglesa documentada.'
