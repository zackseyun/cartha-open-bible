translation:
  language: es
  text: 'En esto consiste el amor: no en que nosotros hayamos amado a Dios[a], sino en que él nos amó y envió a su Hijo como el sacrificio expiatorio[b] por nuestros pecados.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «amamos». El griego usa un perfecto; aquí se refleja con una forma española natural dentro de la construcción subordinada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «propiciación»; también posiblemente «expiación». El griego ἱλασμός se refiere a la obra sacrificial del Hijo para tratar eficazmente con nuestros pecados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - En esto mismo
  - Aquí
  lexicon: BDAG
  rationale: Mantiene el giro joánico que introduce la definición o manifestación concreta de lo que sigue, con una fórmula natural en español.
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: 'El artículo griego señala el concepto en forma definida; en español se expresa de manera natural como una afirmación general: ''el amor''.'
- source_word: οὐχ ὅτι ... ἀλλ’ ὅτι
  english_pob_choice: not that ... but that
  chosen_spanish: no en que ... sino en que
  alternatives_spanish:
  - no que ... sino que
  - no porque ... sino porque
  lexicon: BDAG
  rationale: La construcción apunta a definir en qué consiste el amor, no a dar una causalidad. 'No en que ... sino en que' conserva esa tensión y suena idiomático en español.
- source_word: ἠγαπήκαμεν
  english_pob_choice: we have loved
  chosen_spanish: hayamos amado
  alternatives_spanish:
  - hemos amado
  - amamos
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción de amor del hablante/comunidad frente a Dios; en este contexto subordinado, el subjuntivo perfecto español comunica mejor la dependencia de la negación sin perder la referencia a una acción ya planteada.
- source_word: θεόν
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: Render estándar para θεός; se conserva el régimen personal con 'a' en la sintaxis española.
- source_word: αὐτὸς
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: El pronombre es enfático por contraste con 'nosotros'; en español, el contraste queda claro con 'él' dentro de la estructura 'sino en que él...'.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - nos amó
  lexicon: BDAG
  rationale: Aoristo de acción decisiva en la historia de salvación. 'Amó' es la forma más natural y directa en español.
- source_word: ἀπέστειλεν
  english_pob_choice: sent
  chosen_spanish: envió
  alternatives_spanish:
  - mandó
  - mandó enviar
  lexicon: BDAG
  rationale: '''Enviar'' preserva el lenguaje misional central del texto y es el equivalente más directo y solemne en español.'
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: a su Hijo
  alternatives_spanish:
  - a su propio Hijo
  - a su Hijo
  lexicon: BDAG
  rationale: La relación filial se mantiene de forma clara y natural; el objeto directo personal requiere 'a' en español.
- source_word: ἱλασμὸν
  english_pob_choice: the atoning sacrifice
  chosen_spanish: la propiciación
  alternatives_spanish:
  - el sacrificio expiatorio
  - la expiación
  - el sacrificio de expiación
  lexicon: BDAG
  rationale: La opción tradicional 'propiciación' conserva la tensión doctrinal del término griego sin resolverla hacia una paráfrasis única. El audit trail inglés preserva alternativas como 'propitiation' y 'expiation', y en español se mantiene un término técnico equivalente con nota.
- source_word: περὶ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: for our sins
  chosen_spanish: por nuestros pecados
  alternatives_spanish:
  - acerca de nuestros pecados
  - con respecto a nuestros pecados
  lexicon: BDAG
  rationale: En contexto sacrificial, περί funciona como 'por' en relación con los pecados; 'pecados' reproduce el plural del original y es la opción más natural.
theological_decisions:
- issue: Sentido de ἱλασμός en una formulación atonement-sensible
  english_pob_reading: the atoning sacrifice
  chosen_spanish_reading: la propiciación
  alternative_spanish_readings:
  - el sacrificio expiatorio
  - la expiación
  rationale: El texto afirma que el amor de Dios se muestra al enviar a su Hijo como medio eficaz respecto del pecado. 'Propiciación' preserva la carga teológica tradicional y la ambigüedad productiva del término, sin forzar una resolución interpretativa única. La nota recoge alternativas reconocidas en la tradición de traducción.
  doctrine_reference: 'Principio POB: mantener la tensión teológica documentada; tratamiento de términos de expiación/propiciación con alternativas preservadas en nota.'
- issue: Relación entre el amor humano y el amor divino en la construcción contrastiva
  english_pob_reading: not that we have loved God, but that he loved us
  chosen_spanish_reading: no en que nosotros hayamos amado a Dios, sino en que él nos amó
  alternative_spanish_readings:
  - no porque nosotros hayamos amado a Dios, sino porque él nos amó
  - no que nosotros hayamos amado a Dios, sino que él nos amó
  rationale: 'La sintaxis española debe conservar el contraste definitorio: el amor no se explica por nuestro amor previo a Dios, sino por el acto primero de Dios. ''No en que... sino en que...'' refleja mejor la función explicativa de la construcción griega.'
  doctrine_reference: 1 Juan 4:10; prioridad del amor de Dios en la salvación.
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y toma en cuenta el cierre del pasaje en el audit trail inglés, que revisó 'as an atoning sacrifice' a 'the atoning sacrifice' para reflejar con mayor precisión el acusativo predicativo ἱλασμόν. En español, la estructura 'como la propiciación' conserva esa precisión sintáctica y mantiene la tensión doctrinal indicada en el registro inglés.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός y 'Hijo' para υἱός, conforme al uso establecido del proyecto.
  - Se evitó 'SEÑOR' porque el pasaje no contiene κύριος ni una alusión directa al nombre divino.
  - '''Amor'' se mantiene como sustantivo central; no se añadió paráfrasis explicativa.'
  - '''Pecados'' conserva el plural del griego y el sentido relacional sacrificial de περί con acusativo genitivo dependiente.'
