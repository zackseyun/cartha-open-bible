translation:
  language: es
  text: Y nosotros hemos visto y damos testimonio de que el Padre ha enviado al Hijo, Salvador del mundo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «el Padre ha enviado al Hijo, Salvador del mundo».'
    reason: alternative_reading
lexical_decisions:
- source_word: τεθεάμεθα
  english_pob_choice: have seen
  chosen_spanish: hemos visto
  alternatives_spanish:
  - hemos contemplado
  - hemos mirado
  lexicon: BDAG
  rationale: El perfecto medio indica una acción completada con efecto vigente; «hemos visto» conserva el valor de testimonio ocular con español natural y digno. «Hemos contemplado» suena posible, pero puede sonar más solemne de lo necesario y menos directo para el testimonio apostólico.
- source_word: μαρτυροῦμεν
  english_pob_choice: testify
  chosen_spanish: damos testimonio
  alternatives_spanish:
  - atestiguamos
  - testificamos
  lexicon: BDAG
  rationale: La frase española establecida «dar testimonio» comunica bien el acto formal de testificar sin forzar un tecnicismo. «Atestiguamos» también sería viable, pero «damos testimonio» es más claro y más natural en lectura pública.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: En Juan, el término es titular y se refiere a Dios en relación con el Hijo. Se mantiene la mayúscula por convención reverente y para señalar la función teológica del título sin añadir contenido ajeno al griego.
- source_word: ἀπέσταλκεν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción concluida con relevancia continua; «ha enviado» preserva mejor ese matiz que el pretérito simple «envió».
- source_word: τὸν υἱόν
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - el Hijo
  - a su Hijo
  lexicon: BDAG
  rationale: 'En español, el objeto directo personal requiere la «a» personal: «al Hijo». Se evita añadir «su» porque el griego no lo expresa explícitamente, aunque la relación filial quede clara por el contexto inmediato de «el Padre».'
- source_word: σωτῆρα
  english_pob_choice: Savior
  chosen_spanish: Salvador
  alternatives_spanish:
  - libertador
  - rescatador
  lexicon: BDAG
  rationale: «Salvador» es el equivalente normal y fiel en español bíblico para σωτήρ. «Libertador» o «rescatador» estrecharían o desplazarían el alcance del término.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - para el mundo
  lexicon: BDAG
  rationale: El genitivo se rinde naturalmente como «del mundo». Se conserva el alcance amplio de κόσμος sin restringirlo a una categoría más limitada.
- source_word: καὶ ἡμεῖς
  english_pob_choice: And we
  chosen_spanish: Y nosotros
  alternatives_spanish:
  - Y nosotros mismos
  - Y también nosotros
  lexicon: BDAG
  rationale: El pronombre explícito da cierto énfasis. «Y nosotros» respeta el flujo del discurso y mantiene la fuerza testimonial sin sobrecargar el español.
- source_word: σωτῆρα τοῦ κόσμου
  english_pob_choice: as the Savior of the world
  chosen_spanish: Salvador del mundo
  alternatives_spanish:
  - como Salvador del mundo
  - el Salvador del mundo
  lexicon: BDAG
  rationale: El acusativo en aposición al objeto directo puede sonar artificial si se vierte con una estructura demasiado analítica. En español, «al Hijo, Salvador del mundo» preserva la relación apposicional de forma natural. La omisión de «como» evita introducir una equivalencia interpretativa que el griego no exige.
theological_decisions:
- issue: Alcance de «Salvador del mundo»
  english_pob_reading: Retained the broad Johannine expression 'the Savior of the world' without narrowing it to a particular theory of atonement or salvation.
  chosen_spanish_reading: Se mantiene «Salvador del mundo» en su amplitud joánica, sin reducirla a una teoría particular de la salvación o de la expiación.
  alternative_spanish_readings:
  - Salvador de los escogidos
  - Salvador potencial del mundo
  rationale: El texto griego declara el título y su alcance de manera directa. La traducción no debe importar conclusiones doctrinales ajenas ni limitar el sentido de κόσμος más allá de lo que el pasaje dice.
  doctrine_reference: Affirmations; Translation philosophy 3
- issue: Relación Padre-Hijo
  english_pob_reading: Translated relational titles as 'the Father' and 'the Son' in their straightforward Johannine sense.
  chosen_spanish_reading: Se traducen los títulos relacionales como «el Padre» y «el Hijo» en su sentido joánico directo.
  alternative_spanish_readings:
  - Dios el Padre envió a Jesús, el Mesías
  - El Padre envió a su Hijo, Salvador del mundo
  rationale: El versículo usa títulos relacionales, no el nombre propio «Jesús» ni el título «Mesías/Cristo». Añadirlos sería ir más allá de la evidencia textual. La mayúscula en «Padre» e «Hijo» ayuda a reflejar el uso titular.
  doctrine_reference: Affirmations; Translation philosophy 1, 2
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el acuerdo alto del audit trail en inglés y no requiere cambios revisionales: conserva el perfecto de «ha enviado», el valor testimonial de «dar testimonio» y la aposición «Salvador del mundo» sin añadir «como», en coherencia con el análisis más reciente.'
  spanish_consistency_notes:
  - Se mantiene «Salvador» para σωτήρ, consistente con el vocabulario cristiano estándar y con la decisión léxica documentada.
  - Se conserva «el Padre» y «el Hijo» como títulos relacionales titulares, con mayúscula reverente y sin añadir nombres propios no presentes en el griego.
  - La estructura «al Hijo, Salvador del mundo» busca naturalidad en español sin perder la aposición del original.
  - No se introduce «Cristo» ni «Mesías», porque el versículo no los contiene y el audit trail inglés también evitó expandir el título relacional.
