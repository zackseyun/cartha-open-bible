revisions:
- from: Amados[a], amémonos unos a otros, porque el amor es de Yahvé, y todo el que ama ha nacido de Yahvé y conoce a Dios.
  to: Amados[a], amemos unos a otros, porque el amor es de Dios, y todo el que ama ha nacido de Dios y conoce a Dios.
  rationale: Se corrige el uso de «Yahvé» a «Dios» porque el original tiene θεός en todas las ocurrencias y el English POB lo refleja uniformemente como «God»; aquí no hay base fuente para introducir el nombre divino. También se ajusta «amémonos unos a otros» a «amemos unos a otros» para lograr un español más natural sin perder el sentido hortatorio ni la reciprocidad explícita.
