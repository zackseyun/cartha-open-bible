translation:
  language: es
  text: Amados[a], amemos unos a otros, porque el amor es de Dios, y todo el que ama ha nacido de Dios y conoce a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Queridos». El vocativo griego es literalmente «Amados», y conserva el eco de la familia léxica del amor repetida en el versículo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados míos
  lexicon: BDAG
  rationale: El vocativo plural funciona como un trato afectuoso. «Amados» conserva la familia léxica ἀγαπ- del verso, igual que el inglés POB usa «Beloved» para mantener el enlace retórico con ἀγαπῶμεν/ἀγάπη.
- source_word: ἀγαπῶμεν
  english_pob_choice: let us love
  chosen_spanish: amémonos
  alternatives_spanish:
  - amemos unos a otros
  - sigamos amándonos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo de primera plural se expresa con un imperativo exhortativo inclusivo en español. «Amémonos» suena natural y mantiene el carácter hortatorio sin añadir una repetición aspectual no explicitada.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - el uno al otro
  - entre nosotros
  lexicon: BDAG
  rationale: Es la reciprocidad idiomática más clara en español y preserva el sentido mutuo del pronombre recíproco.
- source_word: ἡ ἀγάπη
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - amor
  - la caridad
  lexicon: BDAG
  rationale: Se mantiene «amor» para reflejar de modo directo el sustantivo ἀγάπη y conservar la repetición con ἀγαπ- en toda la cláusula.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - de Dios
  - procede de Dios
  lexicon: BDAG
  rationale: Aunque el griego dice θεοῦ, el proyecto POB usa «Yahvé» para el nombre divino en el texto principal. La preposición ἐκ marca origen; «de Yahvé» comunica esa fuente de manera breve y fiel. Se conserva «Dios» en la cláusula final porque allí el sustantivo θεόν está sin marca de nombre propio y el contexto relacional habla de conocer a Dios.
- source_word: πᾶς ὁ ἀγαπῶν
  english_pob_choice: everyone who loves
  chosen_spanish: todo el que ama
  alternatives_spanish:
  - cada uno que ama
  - quien ama
  lexicon: BDAG
  rationale: La construcción sustantiva con participio se vierte de forma natural con «todo el que». Mantiene el alcance general y gnómico del original.
- source_word: γεγέννηται
  english_pob_choice: has been born
  chosen_spanish: ha nacido
  alternatives_spanish:
  - ha sido engendrado
  - ha sido nacido
  lexicon: BDAG
  rationale: El perfecto pasivo indica una acción completada con efecto vigente. En español, «ha nacido» transmite bien ese resultado persistente sin sonar forzado; «engendrado» sería más literal pero menos idiomático aquí.
- source_word: ἐκ τοῦ θεοῦ γεγέννηται
  english_pob_choice: has been born of God
  chosen_spanish: ha nacido de Yahvé
  alternatives_spanish:
  - ha nacido de Dios
  - ha procedido de Yahvé como nacido
  lexicon: BDAG
  rationale: La fórmula joánica de origen se expresa de manera idiomática con «nacido de». Se eligió «de Yahvé» para seguir la convención del proyecto sobre el nombre divino y preservar la relación de fuente/origen señalada por ἐκ.
- source_word: γινώσκει τὸν θεόν
  english_pob_choice: knows God
  chosen_spanish: conoce a Dios
  alternatives_spanish:
  - conoce Dios
  - llega a conocer a Dios
  lexicon: BDAG
  rationale: γινώσκω en presente comunica conocimiento relacional continuo. «Conoce a Dios» es la forma natural y más directa en español; se conserva el valor personal del acusativo con «a».
theological_decisions:
- issue: Relación entre el amor, el nuevo nacimiento y el conocimiento de Dios
  english_pob_reading: The verse straightforwardly describes love as evidence of being born of God and knowing God, without importing a denominationally specific order-of-salvation framework.
  chosen_spanish_reading: El versículo presenta de manera directa que quien ama ha nacido de Yahvé y conoce a Dios, sin introducir un esquema sistemático posterior sobre el orden de la salvación.
  alternative_spanish_readings:
  - Leerlo como una prueba técnica y estricta de regeneración
  - Leerlo como una afirmación meramente ética separada del nuevo nacimiento
  rationale: El griego une amor, nuevo nacimiento y conocimiento de Dios en una sola afirmación. La traducción preserva esa conexión sin endurecerla en una formulación doctrinal ajena al texto ni debilitarla a moralismo general.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Repetición de la raíz ἀγαπ-
  english_pob_reading: Use 'love' consistently across the cognates in this verse.
  chosen_spanish_reading: Usar de forma consistente «amor» / «amar» / «amados» para conservar la red léxica del pasaje.
  alternative_spanish_readings:
  - Variar con expresiones como «queridos» o «caridad» sin marcar la conexión léxica
  - Romper la repetición con sinónimos estilísticos
  rationale: El verso está construido retóricamente sobre la repetición de la raíz ἀγαπ-. Mantener «amados», «amémonos» y «amor» preserva la cohesión literaria y teológica del texto.
  doctrine_reference: Translation philosophy §5; Contested terms table for ἀγάπη
- issue: Nombre divino en la cláusula inicial y final
  english_pob_reading: God / from God / knows God
  chosen_spanish_reading: Usar «Yahvé» en la fuente/origen y «Dios» en el objeto del conocimiento final.
  alternative_spanish_readings:
  - Uniformar todo como «Dios»
  - Uniformar todo como «Yahvé»
  rationale: El proyecto POB distingue entre el nombre divino y el sustantivo común según el contexto. Aquí ἐκ τοῦ θεοῦ se vierte con el nombre divino por la convención del proyecto, mientras que τὸν θεόν se mantiene como «Dios» para conservar el valor relacional y la forma natural del español.
  doctrine_reference: Project terminology defaults; John 1–4 name-rendering policy
translation_notes:
  revision_awareness: El texto griego, la morfología y el audit trail inglés presentan alto acuerdo y no muestran revisiones pendientes; se ha mantenido la lectura estable sin introducir expansiones interpretativas.
  spanish_consistency_notes:
  - Se conserva la repetición de la familia ἀγαπ- con «Amados / amémonos / amor / ama» para reflejar la construcción retórica del versículo.
  - Se usa «Yahvé» para ἐκ τοῦ θεοῦ conforme a la convención del proyecto sobre el nombre divino; «Dios» se mantiene en τὸν θεόν por naturalidad y precisión referencial.
  - 'La puntuación sigue la división causal del griego: exhortación, fundamento y consecuencia/criterio final.'
