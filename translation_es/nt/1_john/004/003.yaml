translation:
  language: es
  text: y todo espíritu que no confiesa a Jesús no es de Dios[a]. Y este es el espíritu del anticristo[b], del cual ustedes han oído que viene[c], y ahora ya está en el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: ‘no confiesa que Jesús Mesías ha venido en carne’.'
    reason: textual_variant
  - marker: b
    text: 'O, más literalmente: ‘esto es lo del anticristo’. El griego es elíptico y no repite ‘espíritu’.'
    reason: lexical_alternative
  - marker: c
    text: 'La construcción griega puede expresarse de forma más literal como: ‘lo han oído: que viene’.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν πνεῦμα
  english_pob_choice: every spirit
  chosen_spanish: todo espíritu
  alternatives_spanish:
  - cada espíritu
  - todo Espíritu
  lexicon: BDAG
  rationale: 'El griego neutro singular πᾶν πνεῦμα tiene valor distributivo: ‘todo espíritu’. En este contexto se prueban influencias o manifestaciones espirituales, no al Espíritu Santo; por eso va en minúscula. ‘Todo’ suena más natural que un calco como ‘cada espíritu’, y conserva el alcance distributivo.'
- source_word: ὁμολογεῖ τὸν Ἰησοῦν
  english_pob_choice: confess Jesus
  chosen_spanish: confiesa a Jesús
  alternatives_spanish:
  - reconoce a Jesús
  - confiesa que Jesús ha venido en carne
  lexicon: BDAG
  rationale: ‘Confesar’ conserva el sentido de profesión pública y adhesión. En español bíblico, la preposición personal ‘a Jesús’ es la forma natural del objeto directo animado. La variante más amplia sobre la venida en carne pertenece al texto variante y no debe incorporarse al cuerpo principal.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - procede de Dios
  lexicon: BDAG
  rationale: ἐκ indica origen o procedencia. ‘De Dios’ es breve, claro y fiel al valor relacional del genitivo de origen. ‘Procede de Dios’ explicita demasiado; ‘de parte de Dios’ es posible pero menos directo.
- source_word: τοῦτό ἐστιν τὸ τοῦ ἀντιχρίστου
  english_pob_choice: this is the spirit of the antichrist / this is that of the antichrist
  chosen_spanish: esto es lo del anticristo
  alternatives_spanish:
  - esto es el espíritu del anticristo
  - esto es aquello del anticristo
  lexicon: BDAG
  rationale: 'El griego es elíptico y no repite πνεῦμα. Para mantener esa tensión sin sonar forzado en español, ‘lo del anticristo’ preserva la indeterminación del sintagma: algo que pertenece o corresponde al anticristo. ‘El espíritu del anticristo’ aclara más, pero ya interpreta la elipsis.'
- source_word: ἀντιχρίστου
  english_pob_choice: the antichrist
  chosen_spanish: anticristo
  alternatives_spanish:
  - el anticristo
  lexicon: BDAG
  rationale: En español, el sustantivo suele funcionar con o sin artículo según la construcción. Aquí la frase sustantivada ‘lo del anticristo’ evita repetir el artículo y mantiene el valor genérico-específico del término. Se conserva el término técnico del uso joánico.
- source_word: ἀκηκόατε ὅτι ἔρχεται
  english_pob_choice: you have heard is coming
  chosen_spanish: han oído que viene
  alternatives_spanish:
  - han oído que está por venir
  - han oído que viene él
  lexicon: BDAG
  rationale: El relativo neutro ὃ retoma la expresión neutra precedente, por lo que no conviene masculinizarla. En español, ‘han oído que viene’ reproduce de manera natural el valor progresivo/futuro del verbo sin sobreespecificar el sujeto. ‘Estar por venir’ añade matiz interpretativo.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en el orden del mundo
  - en el mundo humano
  lexicon: BDAG
  rationale: κόσμος en Juan suele señalar el mundo en su orden humano y a menudo en oposición a Dios. ‘Mundo’ es la traducción idiomática y tradicionalmente reconocible, sin perder el trasfondo joánico.
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - todavía ahora
  lexicon: BDAG
  rationale: ἤδη marca presencia actual consumada. ‘Ya’ es la opción española más natural y compacta; conserva el énfasis temporal de realidad presente.
theological_decisions:
- issue: Forma textual de la confesión negada
  english_pob_reading: 'Main text follows the shorter reading: ''does not confess Jesus.'''
  chosen_spanish_reading: 'El texto principal sigue la lectura breve: ‘no confiesa a Jesús’.'
  alternative_spanish_readings:
  - ‘no confiesa que Jesús Mesías ha venido en carne’
  - ‘no reconoce a Jesús’
  rationale: La lectura crítica es más breve y el contexto inmediato ya aporta el contenido cristológico de la confesión. En español, mantener la lectura breve evita importar al cuerpo principal una ampliación textual que corresponde a manuscritos variantes; esa ampliación queda mejor reservada para nota.
  doctrine_reference: Primacía de la lengua original; preservación de variantes textuales en nota
- issue: Cómo reflejar la elipsis de 'τὸ τοῦ ἀντιχρίστου'
  english_pob_reading: English audit moved from 'this is that of the antichrist' to the clearer 'this is the spirit of the antichrist.'
  chosen_spanish_reading: Se conserva la elipsis en ‘esto es lo del anticristo’ para no suplir explícitamente ‘espíritu’ en el texto principal.
  alternative_spanish_readings:
  - ‘esto es el espíritu del anticristo’
  - ‘esto pertenece al anticristo’
  rationale: El griego no repite πνεῦμα. En español, una forma elíptica como ‘lo del anticristo’ permite respetar la estructura y la ambigüedad del original, sin cerrar la interpretación. La expansión interpretativa ‘espíritu del anticristo’ se reconoce como posible, pero no se incorpora al texto base.
  doctrine_reference: Equivalencia óptima; respeto de la tensión léxica del original
- issue: Uso de ‘Jesús’ sin añadir ‘Mesías’ en el cuerpo principal
  english_pob_reading: The English note preserves the fuller manuscript reading in a footnote rather than in the main text.
  chosen_spanish_reading: Se mantiene ‘Jesús’ solo en el texto principal, con la variante más amplia en nota.
  alternative_spanish_readings:
  - ‘Jesús Mesías’
  - ‘Jesucristo’
  rationale: El texto griego del testimonio crítico no añade ‘Mesías’ aquí. En español, ‘Jesús’ basta para reproducir la lectura breve; incorporar ‘Mesías’ o ‘Cristo’ en el cuerpo principal alteraría el peso textual. La nota conserva la alternativa documentada.
  doctrine_reference: Lectura crítica y honestidad textual
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó por una revisión que consideró demasiado forzado ‘this is that of the antichrist’ y lo ajustó a una formulación más clara. Para el español, se optó por una solución intermedia que preserve la elipsis griega sin sonar antinatural: ‘esto es lo del anticristo’. Se mantuvo también la nota de la variante textual más amplia sobre la confesión de Jesús.'
  spanish_consistency_notes:
  - Se usa ‘Dios’ para θεός, sin mayúsculas especiales para ocultar el nombre divino en este versículo.
  - ‘Jesús’ se mantiene como nombre propio sin añadir ‘Cristo’ o ‘Mesías’ en el texto principal, porque la lectura crítica es breve.
  - ‘anticristo’ se escribe en minúscula por ser un sustantivo común/titular en español, salvo que el estilo editorial posterior requiera mayúscula por consistencia interna.
  - Las notas b y c distinguen entre la expansión interpretativa y la literalidad elíptica del griego.
