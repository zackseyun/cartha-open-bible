source:
  edition: SBLGNT
  text: φόβος οὐκ ἔστιν ἐν τῇ ἀγάπῃ, ἀλλ’ ἡ τελεία ἀγάπη ἔξω βάλλει τὸν φόβον, ὅτι ὁ φόβος κόλασιν ἔχει, ὁ δὲ φοβούμενος οὐ τετελείωται ἐν τῇ ἀγάπῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/018.yaml
  text: There is no fear in love[a], but perfect love drives out fear, because fear has punishment[c][b]. But the one who fears has not been perfected in love.
  footnotes:
  - marker: a
    text: Or 'casts out fear.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'fear has punishment.'
    reason: lexical_alternative
  - marker: c
    text: '''Perfect love'' may also be understood as ''complete'' or ''mature'' love—love brought to its intended fullness.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
