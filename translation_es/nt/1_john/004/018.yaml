translation:
  language: es
  text: No hay temor en el amor[a], sino que el amor perfecto[b] echa fuera el temor, porque el temor tiene castigo[c]. Pero el que teme no ha sido perfeccionado en el amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arroja fuera el temor».
    reason: lexical_alternative
  - marker: b
    text: '«Perfecto» también puede entenderse como «completo» o «maduro»: amor llevado a su plenitud prevista.'
    reason: lexical_alternative
  - marker: c
    text: Literalmente, «el temor tiene castigo».
    reason: lexical_alternative
lexical_decisions:
- source_word: φόβος
  english_pob_choice: fear
  chosen_spanish: temor
  alternatives_spanish:
  - miedo
  - terror
  lexicon: BDAG
  rationale: En este contexto relacional y judicial, «temor» conserva mejor el vínculo con el temor ante el juicio y funciona de forma natural en español bíblico contemporáneo. «Miedo» suena más emocional y cotidiano; «terror» sería demasiado fuerte.
- source_word: ἀγάπῃ / ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor cristiano
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el término básico y repetido del pasaje con «amor», que es el equivalente natural y transparente en español. «Caridad» estrecha indebidamente el sentido; «amor cristiano» añade interpretación no exigida por el griego.
- source_word: τελεία
  english_pob_choice: perfect
  chosen_spanish: perfecto
  alternatives_spanish:
  - completo
  - maduro
  lexicon: BDAG
  rationale: «Perfecto» preserva la conexión léxica con τετελείωται y mantiene la tensión teológica del texto. «Completo» o «maduro» explicitan una idea válida, pero suavizan la correspondencia formal del argumento.
- source_word: ἔξω βάλλει
  english_pob_choice: drives out
  chosen_spanish: echa fuera
  alternatives_spanish:
  - expulsa
  - arroja fuera
  lexicon: BDAG
  rationale: «Echa fuera» reproduce bien la imagen verbal de expulsión y es una expresión natural en español. «Expulsa» es correcta pero un poco más técnica; «arroja fuera» es más dura de lo necesario.
- source_word: κόλασιν ἔχει
  english_pob_choice: has punishment
  chosen_spanish: tiene castigo
  alternatives_spanish:
  - tiene condena
  - está ligado al castigo
  lexicon: BDAG
  rationale: La traducción literal y más auditable es «tiene castigo», que conserva la fuerza compacta de la cláusula griega sin expandirla interpretativamente. «Condena» introduce un matiz judicial más específico; la formulación explicativa restaría transparencia al texto.
- source_word: ὁ δὲ φοβούμενος
  english_pob_choice: the one who fears
  chosen_spanish: el que teme
  alternatives_spanish:
  - quien teme
  - la persona que teme
  lexicon: BDAG
  rationale: «El que teme» refleja con naturalidad el participio sustantivado y mantiene neutralidad de género en español. «Quien teme» también es posible, pero «el que» sigue más de cerca el tono del texto base.
- source_word: τετελείωται
  english_pob_choice: has not been perfected
  chosen_spanish: ha sido perfeccionado
  alternatives_spanish:
  - ha sido hecho perfecto
  - ha llegado a su plenitud
  lexicon: BDAG
  rationale: La pasiva perfecta se conserva con «ha sido perfeccionado», que deja ver el estado resultante y la relación con τελεία/τελειόω. «Ha llegado a su plenitud» sería más interpretativo y debilitaría la conexión léxica.
- source_word: ἐν τῇ ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en el amor
  alternatives_spanish:
  - dentro del amor
  - en la esfera del amor
  lexicon: BDAG
  rationale: «En el amor» es la manera más simple y fiel de reproducir la preposición con su sentido relacional/esférico. Las alternativas explicativas son correctas pero innecesarias para el verso.
theological_decisions:
- issue: Relación entre «amor perfecto» y la formación incompleta del creyente
  english_pob_reading: Render with 'perfect love' and 'has not been perfected' to preserve the text's tension between love's completeness and the believer's incomplete formation in love.
  chosen_spanish_reading: Mantener «amor perfecto» y «no ha sido perfeccionado en el amor» para preservar la tensión entre la plenitud del amor y la formación aún incompleta de la persona.
  alternative_spanish_readings:
  - amor completo / no ha llegado a su plenitud en el amor
  - amor maduro / no ha madurado en el amor
  rationale: El versículo contrapone el amor que ha llegado a su plenitud con el estado todavía no consumado del que teme. Traducir con «perfecto» y «perfeccionado» mantiene la relación verbal y evita diluir la afirmación en una mera descripción psicológica.
  doctrine_reference: Preservar la tensión teológica sin resolverla; mantener la conexión léxica entre τελεία y τετελείωται.
translation_notes:
  revision_awareness: La redacción sigue de cerca el pasaje griego y la revisión auditada de la POB en inglés, especialmente la decisión de conservar la frase breve y literal «fear has punishment» en lugar de expandirla como «has to do with punishment». En español se reflejó esa misma economía con «el temor tiene castigo», y se mantuvo la pareja léxica «perfecto / perfeccionado» para conservar la cohesión del versículo.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» o terminología no presente en este versículo; el texto trata únicamente de φόβος y ἀγάπη.
  - «Temor» fue preferido sobre «miedo» para mantener el registro bíblico y la relación conceptual con el juicio/castigo.
  - Se mantuvo «amor» de forma consistente para ἀγάπη, sin alternar con «caridad» ni con paráfrasis.
  - La pasiva perfecta «ha sido perfeccionado» conserva la idea de estado resultante y la conexión verbal con «perfecto».
