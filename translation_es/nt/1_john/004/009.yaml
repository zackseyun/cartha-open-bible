revisions:
- from: 'En esto se manifestó el amor de Dios entre nosotros: en que Dios ha enviado a su Hijo unigénito al mundo, para que vivamos por medio de él[a][b].'
  to: 'En esto se manifestó el amor de Dios entre nosotros: que Dios ha enviado a su único Hijo al mundo, para que vivamos por medio de él[a][b].'
