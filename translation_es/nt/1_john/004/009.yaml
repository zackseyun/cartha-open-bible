    text: 'Traducción tradicional: «su Hijo unigénito». El griego μονογενής subraya la singularidad única del Hijo; «unigénito» conserva el vocabulario histórico de la iglesia.'
    reason: alternative_reading
  revision_rationale: Se revisa para alinear el texto principal con la decisión léxica documentada del POB para μονογενής, manteniendo la formulación tradicional en nota. También se simplifica «en que» a «que» para reflejar mejor la función explicativa de ὅτι y mejorar la naturalidad del español.
