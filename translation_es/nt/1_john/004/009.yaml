review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: ἐν τούτῳ = «En esto», ἐφανερώθη = «se manifestó», ἐν ἡμῖν = «entre nosotros» con nota alternativa, ἀπέσταλκεν = «ha enviado», y δι’ αὐτοῦ = «por medio de él». Sin embargo, la decisión principal sobre μονογενής no sigue fielmente el audit trail inglés, que puso en el texto principal «one and only Son» y reservó «only begotten» para nota. El español principal «su Hijo unigénito» traslada al texto base la lectura tradicional/histórica, pero no la decisión léxica principal documentada.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «En que» después de dos puntos funciona, pero «que» es más directo y limpio en este contexto explicativo. La redacción es digna y comprensible. Conviene además corregir un error tipográfico/extraño en la justificación léxica de ἐφανερώθη («u खुले conocido»).
  glossary_alignment: 'Alinea bien con los términos base del proyecto en Dios, Hijo, mundo y por medio de él. La principal desalineación está en μονογενής: según el expediente POB, el texto principal debe expresar unicidad («único» / «uno y único») y dejar «unigénito» como alternativa tradicional en nota. «Hijo único» en español conserva bien la unicidad sin sobrecargar el texto con la formulación tradicional.'
  issues:
  - severity: high
    issue: La traducción principal de μονογενής como «unigénito» no sigue la decisión principal del POB inglés.
    rationale: El audit trail inglés eligió «one and only Son» en el texto principal y preservó «only begotten» solo en nota por su historia teológica. En español, «Hijo único» o «su único Hijo» representa mejor esa decisión principal; «unigénito» debe quedar en nota.
  - severity: medium
    issue: «en que Dios ha enviado» suena menos natural que «que Dios ha enviado».
    rationale: Después de «En esto se manifestó...», la conjunción ὅτι se explica mejor con «que», que corresponde más directamente a la cláusula explicativa del griego y mejora la fluidez del español.
  - severity: low
    issue: Hay un error de texto en una justificación léxica («u खुले conocido»).
    rationale: No afecta el versículo en sí, pero sí la calidad editorial del registro y conviene corregirlo en la documentación interna.
  revised_spanish_text: 'En esto se manifestó el amor de Dios entre nosotros: que Dios ha enviado a su único Hijo al mundo, para que vivamos por medio de él[a][b].'
  revised_footnotes:
