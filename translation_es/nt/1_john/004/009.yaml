translation:
  language: es
  text: 'En esto se manifestó el amor de Dios entre nosotros: que Dios ha enviado a su único Hijo al mundo, para que vivamos por medio de él[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en nosotros». La frase griega puede referirse a una manifestación dentro de los creyentes o entre nosotros como comunidad.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «su Hijo unigénito». El griego μονογενής subraya la singularidad única del Hijo; «unigénito» conserva el vocabulario histórico de la iglesia.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - Por esto
  - En esto mismo
  lexicon: BDAG
  rationale: Mantiene la fórmula demostrativa joánica y deja que la proposición siguiente explique en qué consiste la manifestación del amor.
- source_word: ἐφανερώθη
  english_pob_choice: was revealed
  chosen_spanish: se manifestó
  alternatives_spanish:
  - fue revelado
  - se hizo manifiesto
  lexicon: BDAG
  rationale: '"Se manifestó" es natural en español y conserva la idea de hacerse visible u खुले conocido de modo público.'
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_spanish: el amor de Dios
  alternatives_spanish:
  - el amor que viene de Dios
  - el amor de Dios
  lexicon: BDAG
  rationale: 'La genitiva es más naturalmente subjetiva en el contexto: el amor propio de Dios que se muestra al enviar al Hijo.'
- source_word: ἐν ἡμῖν
  english_pob_choice: among us
  chosen_spanish: entre nosotros
  alternatives_spanish:
  - en nosotros
  lexicon: BDAG
  rationale: '"Entre nosotros" comunica la dimensión comunitaria y manifiesta del amor en el contexto, sin negar que la frase pueda leerse también de manera interior.'
- source_word: τὸν υἱὸν αὐτοῦ
  english_pob_choice: his Son
  chosen_spanish: a su Hijo
  alternatives_spanish:
  - a su Hijo
  lexicon: BDAG
  rationale: La preposición española exige el complemento directo personal con "a"; se conserva el sentido filial y cristológico del original.
- source_word: τὸν μονογενῆ
  english_pob_choice: one and only
  chosen_spanish: unigénito
  alternatives_spanish:
  - único
  - único Hijo
  - Hijo unigénito
  lexicon: BDAG
  rationale: Se conserva la forma tradicional y teológicamente cargada "unigénito" porque el término tiene historia doctrinal en español y refleja la singularidad del Hijo; aun así, la nota preserva la alternativa histórica de "only begotten" del audit trail.
- source_word: ἀπέσταλκεν
  english_pob_choice: has sent
  chosen_spanish: ha enviado
  alternatives_spanish:
  - envió
  - ha mandado
  lexicon: BDAG
  rationale: El perfecto griego se rinde bien con el perfecto compuesto español, manteniendo la acción completada con relevancia vigente.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - al mundo
  - dentro del mundo
  lexicon: BDAG
  rationale: '"Al mundo" es idiomático en español y conserva el movimiento direccional hacia la esfera del mundo humano.'
- source_word: ἵνα ζήσωμεν
  english_pob_choice: so that we might live
  chosen_spanish: para que vivamos
  alternatives_spanish:
  - a fin de que vivamos
  - para que podamos vivir
  lexicon: BDAG
  rationale: La cláusula final de propósito se expresa con naturalidad mediante "para que"; el subjuntivo español transmite el propósito del envío.
- source_word: δι’ αὐτοῦ
  english_pob_choice: through him
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por él
  - a través de él
  lexicon: BDAG
  rationale: '"Por medio de él" conserva el valor instrumental de διά con genitivo y evita ambigüedad en español.'
theological_decisions:
- issue: Sentido de μονογενής aplicado al Hijo
  english_pob_reading: Rendered as 'one and only Son' in the main text, with 'only begotten Son' preserved in a note.
  chosen_spanish_reading: '"Hijo unigénito" en el texto principal.'
  alternative_spanish_readings:
  - '"Hijo único"'
  - '"Hijo único y unigénito"'
  - '"Hijo solo engendrado"'
  rationale: En español, "unigénito" preserva el peso histórico-teológico del término sin forzar una paráfrasis moderna. La nota permite recordar la tradición de "only begotten" y la tensión entre unicidad y generación.
  doctrine_reference: Niceno-Constantinopolitano (381); Traducción filosófica §§1, 3, 6
- issue: Alcance de ἐν ἡμῖν
  english_pob_reading: Rendered as 'among us' to preserve the communal and manifested character, while noting the possible inward sense of 'in us.'
  chosen_spanish_reading: '"entre nosotros" en el texto principal.'
  alternative_spanish_readings:
  - '"en nosotros"'
  - '"en medio de nosotros"'
  rationale: '"Entre nosotros" conserva la lectura comunitaria sin cerrar la posibilidad de la referencia interior. La nota mantiene la alternativa para transparencia interpretativa.'
  doctrine_reference: Traducción filosófica §3
translation_notes:
  revision_awareness: El pasaje fue revisado previamente y se mantuvo sin cambios en la última pasada; esta versión sigue el alto grado de acuerdo entre el texto griego y el audit trail inglés, conservando la ambigüedad de ἐν ἡμῖν y la tensión histórica de μονογενής.
  spanish_consistency_notes:
  - Se usa «Yahvé» como norma del proyecto cuando aparezca el nombre divino; en este versículo no aparece.
  - Se emplea «Dios» y «Jesús» con ortografía española estándar y sin calcos innecesarios.
  - Se mantiene el tono moderno pero digno, apto para lectura eclesial.
  - Se conserva el valor instrumental de δι’ αὐτοῦ con «por medio de él».
