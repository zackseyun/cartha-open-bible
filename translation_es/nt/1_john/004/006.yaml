  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido básico del griego: mantiene el contraste repetido de ἐκ τοῦ θεοῦ, el valor genérico de ὁ γινώσκων / ὃς οὐκ ἔστιν, el sentido receptivo de ἀκούει ἡμῶν, y la oposición entre τὸ πνεῦμα τῆς ἀληθείας y τὸ πνεῦμα τῆς πλάνης. Sin embargo, «Por esto» para ἐκ τούτου es menos preciso que «Por esto mismo» o «Por esto» según contexto; aquí funciona, pero hay un problema más claro: el orden de notas [c][b] está invertido respecto al flujo natural de lectura y al anclaje semántico. Además, «el Espíritu de la verdad» suena menos idiomático en español cristiano que «el Espíritu de verdad», aunque la forma con artículo no es infiel.'
