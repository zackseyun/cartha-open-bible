translation:
  language: es
  text: Nosotros somos de Dios[a]. El que conoce a Dios nos escucha; el que no es de Dios no nos escucha. Por esto conocemos al Espíritu de verdad[b][c] y al espíritu del error.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos oye» en ambas ocurrencias; el verbo griego puede denotar oír, pero aquí probablemente expresa la idea de prestar atención receptiva al testimonio apostólico.
    reason: lexical_alternative
  - marker: b
    text: O «el espíritu de verdad». La frase puede leerse de manera más general, aunque en el uso joánico suele referirse al Espíritu Santo.
    reason: alternative_reading
  - marker: c
    text: «Espíritu de verdad» remite a Juan 14:17; 15:26; 16:13.
    reason: cross_reference
lexical_decisions:
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedentes de Dios
  - venidos de Dios
  lexicon: BDAG
  rationale: En español, la construcción más natural y fiel para ἐκ con sentido de origen/pertenencia relacional es «de Dios». Mantiene la idea de procedencia sin sonar forzada. «Procedentes de» y «venidos de» explicitan más la fuente, pero serían más pesadas y menos idiomáticas.
- source_word: γινώσκων
  english_pob_choice: the one who knows
  chosen_spanish: el que conoce
  alternatives_spanish:
  - el que llega a conocer
  - quien conoce
  lexicon: BDAG
  rationale: El participio sustantivado se vierte como «el que conoce» para conservar el valor genérico y característico del griego. «Quien conoce» sería igualmente posible, pero «el que» resulta más fluido aquí. «Llega a conocer» añadiría un matiz aspectual no exigido por el texto.
- source_word: ἀκούει ἡμῶν
  english_pob_choice: listens to us
  chosen_spanish: nos escucha
  alternatives_spanish:
  - nos oye
  - escucha nuestra voz
  lexicon: BDAG
  rationale: «Escuchar» en español puede expresar recepción atenta y no solo percepción auditiva, por lo que reproduce bien el valor contextual de ἀκούω en esta prueba apostólica. «Nos oye» podría sonar más literal, pero en este contexto español tiende a sonar menos natural; «escucha nuestra voz» explicita demasiado.
- source_word: ὃς οὐκ ἔστιν ἐκ τοῦ θεοῦ
  english_pob_choice: whoever is not from God
  chosen_spanish: el que no es de Dios
  alternatives_spanish:
  - quien no procede de Dios
  - el que no viene de Dios
  lexicon: BDAG
  rationale: 'Se mantiene la misma construcción relacional que en la primera cláusula: «de Dios». Esta repetición preserva el contraste de origen/afiliación y la cohesión lexical del versículo. «Procede de Dios» o «viene de Dios» serían posibles, pero menos directos en español bíblico contemporáneo.'
- source_word: ἐκ τούτου
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - De esto
  lexicon: BDAG
  rationale: «Por esto» expresa con naturalidad la inferencia o criterio de discernimiento. «Con esto» puede sonar ambiguo en español, y «de esto» es menos idiomático para introducir la conclusión.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: conocemos
  alternatives_spanish:
  - sabemos
  - reconocemos
  lexicon: BDAG
  rationale: Se conserva «conocer» para mantener la conexión léxica con γινώσκω en todo el versículo. «Sabemos» sería correcto, pero debilita la relación interna del texto; «reconocemos» introduce un matiz interpretativo más fuerte.
- source_word: τὸ πνεῦμα τῆς ἀληθείας
  english_pob_choice: the Spirit of truth
  chosen_spanish: el Espíritu de la verdad
  alternatives_spanish:
  - el espíritu de la verdad
  - el Espíritu de verdad
  lexicon: BDAG
  rationale: Se capitaliza «Espíritu» porque, en el contexto inmediato de 1 Juan 4:1–6 y en el uso joánico, la expresión apunta al Espíritu Santo. Se prefiere «de la verdad» para conservar el artículo y la forma relacional del griego, además de sonar natural en español.
- source_word: τὸ πνεῦμα τῆς πλάνης
  english_pob_choice: the spirit of error
  chosen_spanish: el espíritu del error
  alternatives_spanish:
  - el espíritu del engaño
  - el espíritu de error
  lexicon: BDAG
  rationale: «Πλάνη» puede abarcar error, engaño o extravío. Se eligió «error» como equivalente breve y claramente antitético frente a «verdad», siguiendo la decisión inglesa. Se mantiene en minúscula para respetar el paralelismo y porque aquí no hay base suficiente para tratar la expresión como un nombre propio personal.
theological_decisions:
- issue: Capitalización de πνεῦμα en la primera expresión
  english_pob_reading: the Spirit of truth
  chosen_spanish_reading: el Espíritu de la verdad
  alternative_spanish_readings:
  - el espíritu de la verdad
  rationale: La frase joánica normalmente se refiere al Espíritu Santo en contraste con la influencia engañosa opuesta. La mayúscula en «Espíritu» preserva esa lectura teológica probable sin eliminar el paralelismo con la segunda expresión, que permanece en minúscula.
  doctrine_reference: Juan 14:17; 15:26; 16:13; 1 Juan 4:1–6
- issue: Sentido de ἀκούει ἡμῶν
  english_pob_reading: listens to us
  chosen_spanish_reading: nos escucha
  alternative_spanish_readings:
  - nos oye
  rationale: El contexto trata de discernir quién recibe el testimonio apostólico. «Nos escucha» comunica receptividad y atención a la enseñanza, sin convertir el verbo en una orden de obediencia. «Nos oye» reduce el matiz contextual a simple percepción auditiva.
  doctrine_reference: 1 Juan 4:1–6; testimonio apostólico
- issue: Alcance de ἐκ τούτου
  english_pob_reading: By this
  chosen_spanish_reading: Por esto
  alternative_spanish_readings:
  - De esto
  rationale: La frase introduce una conclusión basada en el criterio previo. «Por esto» comunica de manera natural el razonamiento de discernimiento que estructura el versículo.
  doctrine_reference: Método de discernimiento en 1 Juan 4:1–6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto español sigue de cerca el paquete fuente griego y el criterio inglés auditado, manteniendo las tensiones léxicas relevantes (ἀκούω, πνεῦμα, πλάνη, ἐκ).
  spanish_consistency_notes:
  - Se mantuvo «de Dios» para ἐκ τοῦ θεοῦ en ambas apariciones, a fin de preservar el paralelismo de origen.
  - Se usó «escucha» para ἀκούω en el sentido contextual de receptividad al testimonio apostólico, coherente con la elección inglesa.
  - Se capitalizó solo la primera ocurrencia de πνεῦμα por la lectura probable de Espíritu Santo; la segunda quedó en minúscula para conservar el contraste.
  - Se evitó «Cristo» y otras fórmulas tradicionales no presentes en este versículo.
  - Se conservó la estructura inferencial «Por esto conocemos» para reflejar ἐκ τούτου γινώσκομεν.
