revisions:
- from: Nosotros somos de Dios[a]. El que conoce a Dios nos escucha; el que no es de Dios no nos escucha[c][b]. Por esto conocemos el Espíritu de la verdad y el espíritu del error.
  to: Nosotros somos de Dios[a]. El que conoce a Dios nos escucha; el que no es de Dios no nos escucha. Por esto conocemos al Espíritu de verdad[b][c] y al espíritu del error.
  rationale: Se ajusta la expresión a un español más idiomático («Espíritu de verdad») sin alterar la decisión teológica ni el sentido del griego, se añade la preposición personal «a» ante «Espíritu/espíritu» como objeto directo determinado y personal en español, y se corrige el orden de los marcadores de nota para que siga la secuencia normal de lectura.
  reviewer_model: gpt-5.4
