translation:
  language: es
  text: 'En esto ustedes reconocen al Espíritu de Dios: todo espíritu que confiesa que Jesús Mesías[a] ha venido en la carne[b][c] es de Dios,'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Jesús Cristo». Χριστός se vierte aquí como «Mesías» porque funciona como título con contenido reconocible, no simplemente como parte fija del nombre.
    reason: lexical_alternative
  - marker: b
    text: O «Jesús Mesías venido en la carne». El griego usa un participio perfecto, que subraya que la venida de Jesús Mesías tiene una relevancia perdurable y sigue siendo decisiva.
    reason: lexical_alternative
  - marker: c
    text: O «confiesa a Jesús Mesías como venido en la carne». La construcción griega permite relacionar el participio con el objeto de «confiesa» de esta manera.
    reason: previous_rendering
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - Con esto
  - Por medio de esto
  lexicon: BDAG
  rationale: La construcción demostrativa indica el criterio por el cual se discierne; en español, «Por esto» expresa naturalmente el valor instrumental/circunstancial de ἐν con el demostrativo y mantiene el enlace con el contexto de prueba y discernimiento.
- source_word: γινώσκετε
  english_pob_choice: you know
  chosen_spanish: conocéis
  alternatives_spanish:
  - sabéis
  - reconocéis
  lexicon: BDAG
  rationale: El presente indicativo plural en este contexto expresa reconocimiento discernidor, no mandato. «Conocéis» conserva el valor indicativo y el matiz de discernimiento relacional propio de Juan.
- source_word: τὸ πνεῦμα τοῦ θεοῦ
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  lexicon: BDAG
  rationale: Por el artículo y por el contraste inmediato con «todo espíritu», el referente natural es el Espíritu de Dios, no solo un espíritu procedente de Dios. La mayúscula refleja la referencia al Espíritu Santo sin ocultar la transparencia léxica.
- source_word: πᾶν πνεῦμα
  english_pob_choice: every spirit
  chosen_spanish: todo espíritu
  alternatives_spanish:
  - cada espíritu
  - todo Espíritu
  lexicon: BDAG
  rationale: La expresión es distributiva y genérica, abarcando cualquier espíritu sometido a prueba. «Todo espíritu» conserva la amplitud de πᾶν πνεῦμα y evita restringir indebidamente el alcance.
- source_word: ὁμολογεῖ
  english_pob_choice: confesses
  chosen_spanish: confiesa
  alternatives_spanish:
  - reconoce
  - profesa
  lexicon: BDAG
  rationale: En el uso joánico, ὁμολογέω implica una confesión abierta y verbal. «Confiesa» mantiene ese valor público y declarativo sin suavizarlo a un mero reconocimiento interior.
- source_word: Ἰησοῦν Χριστόν
  english_pob_choice: Jesus Messiah
  chosen_spanish: a Jesús Mesías
  alternatives_spanish:
  - a Jesús Cristo
  - a Jesús el Mesías
  lexicon: BDAG
  rationale: Χριστός funciona como título, no solo como componente fijo del nombre. El POB inglés privilegia «Messiah» para conservar el peso del título; en español, «Mesías» es el equivalente natural y preserva la distinción frente al uso meramente onomástico de «Cristo».
- source_word: ἐν σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en carne
  alternatives_spanish:
  - en la carne
  - en cuerpo
  lexicon: BDAG
  rationale: σάρξ se traduce normalmente «carne» en contextos literales. Aunque «en la carne» es más idiomático, «en carne» refleja con más cercanía la construcción griega y mantiene la afirmación de una venida verdaderamente encarnada.
- source_word: ἐληλυθότα
  english_pob_choice: having come
  chosen_spanish: venido
  alternatives_spanish:
  - habiendo venido
  - que ha venido
  lexicon: BDAG
  rationale: El participio perfecto activo añade el sentido de una venida realizada con relevancia vigente. En español, «venido» con la construcción de complemento verbal recoge de forma natural esa idea sin introducir una perífrasis innecesaria.
- source_word: ἐκ τοῦ θεοῦ ἐστιν
  english_pob_choice: is from God
  chosen_spanish: es de Dios
  alternatives_spanish:
  - procede de Dios
  - viene de Dios
  lexicon: BDAG
  rationale: ἐκ con genitivo expresa origen o procedencia. «Es de Dios» es la forma breve y fiel en español para esta procedencia, manteniendo la fuerza teológica del origen divino.
theological_decisions:
- issue: Si τὸ πνεῦμα τοῦ θεοῦ debe leerse como el Espíritu Santo o como un espíritu procedente de Dios
  english_pob_reading: the Spirit of God
  chosen_spanish_reading: el Espíritu de Dios
  alternative_spanish_readings:
  - el espíritu de Dios
  - un espíritu de Dios
  rationale: El contexto inmediato habla de probar los espíritus; el singular con artículo en la primera cláusula contrapone el Espíritu de Dios a los espíritus sometidos a examen. La traducción capitalizada conserva esa referencia al Espíritu Santo sin perder la relación con la cláusula siguiente.
  doctrine_reference: Credo niceno; filosofía de traducción §1, §6
- issue: Cómo expresar ἐν σαρκὶ ἐληλυθότα sin debilitar la encarnación ni añadir tecnicismos ajenos al texto
  english_pob_reading: Jesus Messiah having come in the flesh
  chosen_spanish_reading: Jesús Mesías venido en carne
  alternative_spanish_readings:
  - Jesús Mesías que ha venido en carne
  - Jesús Mesías que vino en carne
  - Jesús Mesías encarnado
  rationale: La frase afirma que Jesús Mesías vino realmente en condición humana corporal. «Venido en carne» conserva la literalidad y la fuerza anti-doceta del texto sin introducir terminología dogmática posterior que el griego no usa.
  doctrine_reference: Definición de Calcedonia; filosofía de traducción §3
translation_notes:
  revision_awareness: 'La redacción sigue el sentido unánime del texto griego y toma en cuenta el auditorio inglés: se mantiene Χριστός como «Mesías» conforme a la política del proyecto, se conserva el participio perfecto con una forma española natural, y se evita la paráfrasis que convertiría la cláusula en una explicación doctrinal más amplia que el original. También se respeta la revisión que favorece una construcción más directa para el participio sin perder la relación sintáctica con «confiesa».'
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando aparezca; aquí no corresponde.
  - Se mantiene «Mesías» en lugar de «Cristo» conforme al criterio del proyecto y al audit trail inglés.
  - «Espíritu» va con mayúscula en la referencia a τὸ πνεῦμα τοῦ θεοῦ por el contexto; «todo espíritu» queda en minúscula por su valor genérico.
  - «Carne» se conserva para σάρξ, evitando sustituciones como «naturaleza humana» que debilitarían la afirmación de encarnación real.
