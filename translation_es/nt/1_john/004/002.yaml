  text: ἐν τούτῳ ⸀γινώσκετε τὸ πνεῦμα τοῦ θεοῦ· πᾶν πνεῦμα ὃ ὁμολογεῖ Ἰησοῦν Χριστὸν ἐν σαρκὶ ἐληλυθότα ἐκ τοῦ θεοῦ ἐστιν,
base_translation:
  language: en
  yaml_path: translation/nt/1_john/004/002.yaml
  text: 'By this you know the Spirit of God: every spirit that confesses Jesus Messiah having come in the flesh is from God[c][b][a],'
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title with clear meaning, not merely as a surname-like name.
    reason: lexical_alternative
  - marker: b
    text: Or 'has come in the flesh.' The Greek uses a perfect participle, emphasizing the enduring significance of Jesus Messiah's coming in real human flesh.
    reason: lexical_alternative
  - marker: c
    text: Or 'confesses Jesus Messiah as having come in the flesh'.
    reason: previous_rendering
