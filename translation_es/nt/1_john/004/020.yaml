translation:
  language: es
  text: 'Si alguien dice: «Yo amo a Dios», y odia a su hermano[a], es un mentiroso; porque el que no ama a su hermano, a quien ha visto, no puede amar a Dios, a quien no ha visto.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su hermano o hermana». El griego dice «su hermano» (ἀδελφόν), una forma masculina singular que puede funcionar de manera representativa en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐάν τις εἴπῃ
  english_pob_choice: If anyone says
  chosen_spanish: Si alguien dice
  alternatives_spanish:
  - Si cualquiera dice
  - Si una persona dice
  lexicon: SBLGNT / BDAG
  rationale: La construcción condicional general pide un equivalente natural en español. «Si alguien dice» conserva la indefinición de τις y el valor de ἐάν + subjuntivo sin sonar forzado.
- source_word: Ἀγαπῶ
  english_pob_choice: I love
  chosen_spanish: Yo amo
  alternatives_spanish:
  - Yo люблю?
  - Yo quiero
  lexicon: BDAG
  rationale: ἀγαπάω debe mantenerse como «amar» para conservar la red léxica del versículo. En español, «Yo amo» reproduce con claridad la afirmación directa del hablante.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  - a Dios
  lexicon: BDAG
  rationale: 'El objeto directo de «amo» en español se expresa naturalmente con la preposición personal: «a Dios».'
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su creyente hermano
  lexicon: BDAG
  rationale: Se conserva el singular masculino griego ἀδελφόν como «hermano» en el texto principal, siguiendo la preferencia de exactitud de género del POB. La posible fuerza representativa queda documentada en nota.
- source_word: μισῇ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - aborrece
  - está odiando
  lexicon: BDAG
  rationale: «Odia» es el equivalente más directo y natural para μισέω en este contexto de oposición moral, y mantiene la dureza del contraste del pasaje.
- source_word: ψεύστης ἐστίν
  english_pob_choice: he is a liar
  chosen_spanish: es un mentiroso
  alternatives_spanish:
  - es un mentiroso
  - es falso
  lexicon: BDAG
  rationale: ψεύστης es un sustantivo predicativo; «mentiroso» preserva el juicio categórico del texto. El español permite omitir el pronombre sin perder referencia.
- source_word: ὁ γὰρ μὴ ἀγαπῶν
  english_pob_choice: for the one who does not love
  chosen_spanish: porque el que no ama
  alternatives_spanish:
  - porque el que no ama
  - pues el que no ama
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. «El que no ama» expresa con naturalidad el argumento explicativo introducido por γάρ.
- source_word: τὸν ἀδελφὸν αὐτοῦ ὃν ἑώρακεν
  english_pob_choice: his brother whom he has seen
  chosen_spanish: a su hermano, a quien ha visto
  alternatives_spanish:
  - a su hermano, que ha visto
  - a su hermano, al cual ha visto
  lexicon: BDAG
  rationale: Se conserva la referencia visual completada de ἑώρακεν con «ha visto». La oración relativa mantiene la relación sintáctica del griego sin sobrecargar el español.
- source_word: τὸν θεὸν ὃν οὐχ ἑώρακεν
  english_pob_choice: God whom he has not seen
  chosen_spanish: a Dios, a quien no ha visto
  alternatives_spanish:
  - a Dios, al cual no ha visto
  - a Dios, que no ha visto
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la cláusula anterior y el perfecto griego con «ha visto / no ha visto», evitando convertirlo en una simple afirmación abstracta.
- source_word: οὐ δύναται ἀγαπᾶν
  english_pob_choice: cannot love
  chosen_spanish: no puede amar
  alternatives_spanish:
  - no es capaz de amar
  - no puede amar a Dios
  lexicon: BDAG
  rationale: δύναται expresa capacidad/imposibilidad. «No puede amar» conserva la fuerza del argumento de Juan; el complemento se completa por el contexto inmediato y la segunda cláusula.
theological_decisions:
- issue: Tratamiento de ἀδελφός en un contexto posiblemente representativo de la comunidad
  english_pob_reading: brother
  chosen_spanish_reading: hermano
  alternative_spanish_readings:
  - hermano o hermana
  - fellow believer
  rationale: El griego usa el masculino singular ἀδελφόν, y el POB inglés preserva «brother» en el texto principal. En español, «hermano» mantiene la forma fuente y la lectura representativa puede explicarse en nota sin neutralizar el género del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Alcance de la imposibilidad en οὐ δύναται ἀγαπᾶν
  english_pob_reading: cannot love God
  chosen_spanish_reading: no puede amar a Dios
  alternative_spanish_readings:
  - no es capaz de amar a Dios
  - no puede amar
  rationale: La frase expresa una imposibilidad moral-espiritual dentro del argumento de Juan, no solo una incapacidad práctica. «No puede amar a Dios» preserva esa fuerza sin añadir explicación ajena al texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §§1, 3
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo alto y ningún cambio necesario; por ello, este borrador sigue de cerca la solución aprobada en inglés, adaptando solo la sintaxis y el léxico al español con cuidado de no diluir la fuerza de μισέω ni de οὐ δύναται ἀγαπᾶν.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός, siguiendo el estándar del proyecto.
  - Se conserva «amar» para ἀγαπάω en toda la unidad para respetar la repetición léxica.
  - Se usa «hermano» en el texto principal por exactitud formal; la posible lectura inclusiva queda restringida a nota.
  - La puntuación y el orden de las cláusulas siguen el paralelismo del griego y la solución auditada en inglés.
