translation:
  language: es
  text: Amados[a], no le crean a todo espíritu, sino pongan a prueba los espíritus para ver si son de Dios[b], porque muchos falsos profetas han salido al mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “Queridos amigos”. El vocativo griego significa literalmente “amados”.
    reason: lexical_alternative
  - marker: b
    text: Es decir, pongan a prueba la fuente espiritual detrás de las pretensiones proféticas; la cláusula siguiente habla de “falsos profetas” como agentes humanos.
    reason: cultural_note
lexical_decisions:
- source_word: Ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos amigos
  - Amados hermanos
  lexicon: BDAG
  rationale: El vocativo plural expresa una dirección afectuosa y cargada de vínculo. “Amados” conserva la relación con ἀγαπάω/ἀγάπη y mantiene el tono joánico más que una formulación explicativa como “queridos amigos”.
- source_word: παντὶ πνεύματι
  english_pob_choice: every spirit
  chosen_spanish: todo espíritu
  alternatives_spanish:
  - cada espíritu
  - toda influencia espiritual
  - toda palabra inspirada
  lexicon: BDAG
  rationale: La construcción es general y debe conservar el sustantivo “espíritu”. “Todo espíritu” reproduce mejor la fuerza directa del original que una paráfrasis interpretativa como “influencia espiritual”.
- source_word: πιστεύετε
  english_pob_choice: believe
  chosen_spanish: crean
  alternatives_spanish:
  - crean en
  - confíen
  lexicon: BDAG
  rationale: En español, con objeto personal/semipersonal como “espíritu”, “creer” comunica bien la aceptación de una afirmación como verdadera. El imperativo negativo plural de uso general se expresa naturalmente como “no crean”.
- source_word: δοκιμάζετε
  english_pob_choice: test
  chosen_spanish: prueben
  alternatives_spanish:
  - examinen
  - pongan a prueba
  lexicon: BDAG
  rationale: El verbo indica verificar la genuinidad. “Probar” comunica de manera natural la evaluación crítica y conserva el matiz de discernimiento sin sobrecargar el texto.
- source_word: τὰ πνεύματα
  english_pob_choice: the spirits
  chosen_spanish: los espíritus
  alternatives_spanish:
  - las influencias espirituales
  - los mensajes espirituales
  lexicon: BDAG
  rationale: Se mantiene el plural “espíritus” para conservar el marco sobrenatural del pasaje. Eso evita reducir el alcance a simples maestros humanos, aunque el contexto los implique.
- source_word: εἰ ἐκ τοῦ θεοῦ ἐστιν
  english_pob_choice: to see whether they are from God
  chosen_spanish: para ver si son de Dios
  alternatives_spanish:
  - para ver si provienen de Dios
  - para ver si proceden de Dios
  lexicon: BDAG
  rationale: ἐκ expresa origen. “Ser de Dios” es una construcción natural en español y conserva el sentido de procedencia/origen sin alargar innecesariamente la frase.
- source_word: πολλοὶ ψευδοπροφῆται
  english_pob_choice: many false prophets
  chosen_spanish: muchos falsos profetas
  alternatives_spanish:
  - numerosos falsos profetas
  lexicon: BDAG
  rationale: “Falsos profetas” es la equivalencia directa y establecida para ψευδοπροφῆται. Se preserva sin suavizar la acusación.
- source_word: ἐξεληλύθασιν
  english_pob_choice: have gone out
  chosen_spanish: han salido
  alternatives_spanish:
  - han salido fuera
  - han ido al mundo
  lexicon: BDAG
  rationale: El perfecto indica una acción ya cumplida con resultado presente. “Han salido” conserva la imagen verbal de movimiento desde un origen hacia afuera, en un español natural.
- source_word: εἰς τὸν κόσμον
  english_pob_choice: into the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - en el mundo
  - hacia el mundo
  lexicon: BDAG
  rationale: “Al mundo” expresa con fluidez la dirección del movimiento y su destino. Mantiene el valor de εἰς sin forzar una literalidad menos natural.
theological_decisions:
- issue: Referencia de “espíritus” y relación con “falsos profetas”
  english_pob_reading: Actual spirits/spiritual sources behind prophetic claims, discerned through human prophets
  chosen_spanish_reading: Espíritus reales o fuentes espirituales detrás de las pretensiones proféticas, discernidos a través de profetas humanos
  alternative_spanish_readings:
  - Simplemente maestros humanos
  - Profecías o mensajes abstractos
  rationale: El versículo contrasta “espíritus” con “falsos profetas”, así que la traducción debe conservar la imagen sobrenatural y no reducirla a sociología religiosa. A la vez, el texto implica discernimiento de agentes humanos, por lo que la formulación no elimina esa dimensión.
  doctrine_reference: Conservar la tensión teológica sin resolverla de manera reductiva.
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requieren cambios respecto del pasaje base y se conserva el acuerdo alto del control cruzado. La redacción española busca fidelidad auditada al griego y al criterio óptimo del POB en inglés.'
  spanish_consistency_notes:
  - Se mantiene “Dios” para θεοῦ, en coherencia con los criterios del proyecto.
  - Se conserva “espíritu/espíritus” sin sustituirlo por “profetas”, para no borrar la tensión documentada entre fuentes espirituales y agentes humanos.
  - Se usa “Amados” como vocativo afectuoso y teológicamente denso, consistente con el estilo joánico del POB.
