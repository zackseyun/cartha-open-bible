review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: origen/pertenencia ''de Dios'', vocativo afectivo ''hijitos'', victoria ya lograda ''han vencido'', y el contraste implícito entre ''el que está en ustedes'' y ''el que está en el mundo''. Sin embargo, hay un problema de anclaje de notas: la nota [a] está puesta sobre ''Dios'', pero su contenido explica ''ellos''/''a ellos'', es decir, a los opositores mencionados antes. Además, la nota [b] está mal enfocada: en el inglés POB la nota b comenta la alternativa de referir implícitamente ''el que está en ustedes / el que está en el mundo'', no una alternativa para ''han vencido''.'
  spanish_quality_summary: El español es claro y ampliamente legible. 'Hijitos' funciona bien para τεκνία, y la sintaxis principal suena natural. No obstante, 'han vencido a ellos' es menos idiomático que 'los han vencido'. También conviene corregir la distribución de notas para evitar confusión lectora. El resto del verso mantiene un tono moderno y digno.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: θεός -> ''Dios'', τεκνία -> ''hijitos'', κόσμος -> ''mundo''. No hay conflicto con términos sensibles del glosario. La decisión de mantener implícitos los referentes de ''el que está en ustedes'' y ''el que está en el mundo'' coincide con la justificación teológica del POB inglés.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'Dios', pero su contenido explica el referente de 'ellos'.
    rationale: El POB inglés marca la nota explicativa sobre 'them', no sobre 'God'. Tal como está, la nota induce a pensar erróneamente que comenta 'de Dios'.
  - severity: high
    issue: La nota [b] no reproduce la función de la nota inglesa y además está anclada en el lugar equivocado.
    rationale: La nota inglesa b trata la posible explicitación de 'the one who is in you ... the one who is in the world', no una variante de 'han vencido'. En español debe colocarse donde corresponda a esas expresiones implícitas.
  - severity: medium
    issue: '''Han vencido a ellos'' suena poco natural en español bíblico contemporáneo.'
    rationale: Aunque comprensible, el clítico acusativo 'los han vencido' es la forma idiomática y más fluida en español neutral.
  revised_spanish_text: Ustedes son de Dios, hijitos, y los[a] han vencido, porque mayor es el que está en ustedes[b] que el que está en el mundo.
  revised_footnotes:
  - marker: a
    text: Es decir, los opositores mencionados inmediatamente antes, especialmente los falsos profetas.
    reason: cross_reference
