revisions:
- from: Ustedes son de Dios[a], hijitos, y han vencido a ellos[b], porque mayor es el que está en ustedes que el que está en el mundo.
  to: Ustedes son de Dios, hijitos, y los[a] han vencido, porque mayor es el que está en ustedes[b] que el que está en el mundo.
  rationale: Se corrigió la colocación y el contenido funcional de las notas para que coincidan con el audit trail inglés y con los referentes griegos implícitos. También se mejoró la naturalidad de 'a ellos' a 'los' sin alterar el sentido. El resto del verso se mantiene por ser fiel al griego y legible en español.
