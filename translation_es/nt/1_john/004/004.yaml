translation:
  language: es
  text: Ustedes son de Dios, hijitos, y los[a] han vencido, porque mayor es el que está en ustedes[b] que el que está en el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Es decir, los opositores mencionados inmediatamente antes, especialmente los falsos profetas.
    reason: cross_reference
  - marker: b
    text: 'O: «el que está en ustedes ... el que está en el mundo». El griego deja ambos referentes implícitos; el contexto sugiere a Dios o a su Espíritu para la primera expresión, y al maligno detrás del mundo para la segunda.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: You
  chosen_spanish: Ustedes
  alternatives_spanish:
  - Vosotros
  - Ustedes mismos
  lexicon: BDAG
  rationale: El pronombre es explícito y enfático en griego. En español, "ustedes" mantiene la segunda persona plural directa y suena natural en un registro bíblico contemporáneo sin añadir énfasis excesivo.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedentes de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: Aquí ἐκ expresa origen/pertenencia derivada de Dios. "De Dios" conserva la relación de procedencia de modo natural en español y encaja con el contraste joánico con "el mundo".
- source_word: τεκνία
  english_pob_choice: little children
  chosen_spanish: hijitos
  alternatives_spanish:
  - niñitos
  - amados hijos
  lexicon: BDAG
  rationale: El diminutivo afectivo de Juan se conserva mejor con "hijitos", que transmite cercanía y ternura sin sonar tan interpretativo como "amados hijos".
- source_word: νενικήκατε
  english_pob_choice: you have overcome
  chosen_spanish: han vencido
  alternatives_spanish:
  - han superado
  - han conquistado
  lexicon: BDAG
  rationale: El perfecto indica una victoria ya lograda con resultado vigente. "Han vencido" es natural en español y conserva la fuerza de triunfo sin volverlo demasiado militar.
- source_word: αὐτούς
  english_pob_choice: them
  chosen_spanish: a ellos
  alternatives_spanish:
  - a esas personas
  - a esos espíritus
  lexicon: BDAG
  rationale: El pronombre apunta a los opositores del contexto inmediato. "A ellos" mantiene la referencia anafórica sin sobreespecificar en el texto principal.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la victoria. "Porque" es la equivalencia más clara y directa en español actual.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - más poderoso
  lexicon: BDAG
  rationale: El comparativo es amplio y no debe restringirse solo a fuerza. "Mayor" preserva la comparación abierta y permite el eco teológico del pasaje.
- source_word: ὁ ἐν ὑμῖν
  english_pob_choice: the one who is in you
  chosen_spanish: el que está en ustedes
  alternatives_spanish:
  - el que habita en ustedes
  - él que está en ustedes
  lexicon: BDAG
  rationale: La construcción sustantivada con artículo se vierte de manera personal en español, pero sin identificar explícitamente al referente. "El que está en ustedes" mantiene la ambigüedad deliberada del griego.
- source_word: ὁ ἐν τῷ κόσμῳ
  english_pob_choice: the one who is in the world
  chosen_spanish: el que está en el mundo
  alternatives_spanish:
  - el que habita en el mundo
  - él que está en el mundo
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la frase anterior y la misma ambigüedad referencial. "En el mundo" mantiene el contraste joánico sin explicitar más de lo que el griego dice.
- source_word: κόσμῳ
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo-systema
  - sistema del mundo
  lexicon: BDAG
  rationale: En Juan, κόσμος suele tener matiz teológico, pero la base más fiel y natural es "mundo". Evita introducir una glosa interpretativa en el texto principal.
theological_decisions:
- issue: Identidad de "el que está en ustedes" y "el que está en el mundo"
  english_pob_reading: Kept both expressions implicit in the main text as 'the one who is in you' and 'the one who is in the world.'
  chosen_spanish_reading: 'Se mantuvieron ambas expresiones implícitas: "el que está en ustedes" y "el que está en el mundo".'
  alternative_spanish_readings:
  - '"el Espíritu Santo está en ustedes" / "Satanás está en el mundo"'
  - '"Dios está en ustedes" / "el maligno está en el mundo"'
  rationale: El contexto sugiere a Dios o su Espíritu para la primera expresión y al maligno detrás del mundo para la segunda, pero el griego conserva formulaciones sustantivadas e implícitas. La traducción debe preservar esa tensión teológica y retórica sin resolverla demasiado pronto.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla en el verso principal.
translation_notes:
  revision_awareness: El texto sigue de cerca el último pase de revisión, que quedó sin cambios y con alta concordancia entre revisores. No se registraron revisiones aplicadas al versículo, así que se conservan el paralelismo, la ambigüedad referencial y el valor aspectual del perfecto griego.
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεός conforme al estándar del proyecto.
  - Se usa "mundo" para κόσμος sin glosa interpretativa en el cuerpo principal.
  - Se conserva el diminutivo afectivo de τεκνία con "hijitos".
  - 'Se traduce νενικήκατε con un perfecto resultativo: "han vencido".'
  - Se preserva la ambigüedad cristológica/espiritual de "el que está en ustedes" y "el que está en el mundo" en la línea principal.
