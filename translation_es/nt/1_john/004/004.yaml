    text: 'O: «el que está en ustedes ... el que está en el mundo». El griego deja ambos referentes implícitos; el contexto sugiere a Dios o a su Espíritu para la primera expresión, y al maligno detrás del mundo para la segunda.'
    reason: alternative_reading
  revision_rationale: Se corrigió la colocación y el contenido funcional de las notas para que coincidan con el audit trail inglés y con los referentes griegos implícitos. También se mejoró la naturalidad de 'a ellos' a 'los' sin alterar el sentido. El resto del verso se mantiene por ser fiel al griego y legible en español.
