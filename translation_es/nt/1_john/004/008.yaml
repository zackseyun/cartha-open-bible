translation:
  language: es
  text: El que no ama no ha conocido a Dios[a], porque Dios es amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Quien no ama no conoce a Dios». El aoristo griego puede expresarse más simplemente en español, pero «no ha conocido» conserva la idea de no haber llegado a conocer a Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ μὴ ἀγαπῶν
  english_pob_choice: The one who does not love
  chosen_spanish: El que no ama
  alternatives_spanish:
  - Quien no ama
  - La persona que no ama
  lexicon: BDAG
  rationale: La construcción con artículo + participio presente funciona de modo sustantivo. «El que no ama» conserva el valor genérico e individual, y en español suena natural sin perder el sentido de persona caracterizada por no amar.
- source_word: ἀγαπῶν
  english_pob_choice: love
  chosen_spanish: ama
  alternatives_spanish:
  - muestra amor
  - quiere
  lexicon: BDAG
  rationale: «Ama» mantiene el vínculo léxico con «amor» al final del versículo y refleja bien el verbo ἀγαπάω sin diluirlo en una expresión más perifrástica.
- source_word: οὐκ ἔγνω
  english_pob_choice: has not known
  chosen_spanish: no ha conocido
  alternatives_spanish:
  - no conoce
  - no conoció
  lexicon: BDAG
  rationale: 'El aoristo ἔγνω puede expresarse en español con perfecto compuesto para comunicar el estado resultante: la persona que no ama queda descrita como alguien que no ha llegado a conocer a Dios.'
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: Como objeto directo de «ha conocido», en español se expresa naturalmente con la preposición personal «a».
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la afirmación anterior; «porque» comunica con claridad la fuerza causal.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El artículo griego no exige reproducirse en español. «Dios» es la forma natural y reverente en este predicado.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor divino
  - amoroso
  lexicon: BDAG
  rationale: «Amor» conserva el sustantivo abstracto y la relación visible con «ama». Se evita convertirlo en «amoroso», que debilitaría la afirmación predicativa.
- source_word: ἐστίν
  english_pob_choice: is
  chosen_spanish: es
  alternatives_spanish:
  - está
  lexicon: BDAG
  rationale: Copulativo simple; «es» preserva con fidelidad la estructura predicativa del original.
theological_decisions:
- issue: Valor de 'Dios es amor'
  english_pob_reading: Retained as a predicative statement about God's character/nature without converting it into an exhaustive definition.
  chosen_spanish_reading: 'Se conserva como afirmación predicativa sobre el carácter/naturaleza de Dios: «Dios es amor».'
  alternative_spanish_readings:
  - Dios es amoroso
  - Amor es Dios
  rationale: El griego presenta «ὁ θεὸς ἀγάπη ἐστίν» con Dios como sujeto y amor como predicado. Traducir «Dios es amor» mantiene la fuerza teológica sin invertir la proposición ni rebajarla a una simple cualidad pasajera.
  doctrine_reference: 'Affirmations; Translation philosophy #5'
- issue: Sentido de conocer a Dios
  english_pob_reading: Rendered relationally as 'has not known God' rather than merely cognitive 'has not understood God.'
  chosen_spanish_reading: 'Se entiende relacionalmente: «no ha conocido a Dios».'
  alternative_spanish_readings:
  - no conoce a Dios
  - no ha entendido a Dios
  rationale: En el uso joánico, γινώσκω suele implicar conocimiento relacional y probado en la conducta. «No ha conocido» conserva ese valor sin añadir explicación interpretativa ajena al texto.
  doctrine_reference: 'Translation philosophy #1; #3'
translation_notes:
  revision_awareness: 'El texto sigue el mismo juicio de revisión que el contexto inglés final: no se detectaron cambios necesarios en la lectura base. Se mantiene la relación léxica entre «ama» y «amor», y la forma perfecta compuesta «no ha conocido» para reflejar el matiz resultante del aoristo.'
  spanish_consistency_notes:
  - 'Se preserva la correspondencia lexical entre el verbo y el sustantivo: «ama» / «amor».'
  - Se evita el giro tradicional «no le ha conocido» porque en español contemporáneo puede sonar menos directo que el objeto explícito «a Dios».
  - La frase final mantiene la predicación nominal simple sin añadir adjetivos o explicaciones que atenúen la afirmación.
  - El orden de la cláusula causal reproduce naturalmente la sintaxis del original y resulta idiomático en español.
