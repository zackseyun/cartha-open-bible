translation:
  language: es
  text: Todo aquel que confiesa que Jesús es el Hijo de Dios, Dios permanece[a] en él, y él en Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'habita en él, y él en Dios'. El verbo griego menō es un término joánico clave que puede traducirse como 'permanece' o 'habita'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃς ἐὰν
  english_pob_choice: Whoever
  chosen_spanish: Todo aquel que
  alternatives_spanish:
  - Quienquiera que
  - Cualquiera que
  lexicon: BDAG
  rationale: La construcción relativa indefinida se expresa naturalmente en español con "Todo aquel que", que conserva el sentido generalizador de ὃς ἐὰν sin sonar mecánico. "Quienquiera que" también es posible, pero suena más marcado o solemne; "Cualquiera que" puede sonar menos personal.
- source_word: ὁμολογήσῃ
  english_pob_choice: confesses
  chosen_spanish: confiesa
  alternatives_spanish:
  - declara
  - profesa
  - reconoce abiertamente
  lexicon: BDAG
  rationale: En contexto joánico, ὁμολογέω implica una afirmación pública y explícita de verdad. "Confiesa" conserva esa fuerza religiosa y verbal mejor que "reconoce", y evita volverlo una mera opinión privada. "Profesa" es posible, pero en español actual puede sonar más eclesial o menos directo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Introduce de manera directa el contenido de la confesión.
- source_word: Ἰησοῦς
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: standard proper name equivalence
  rationale: Nombre propio transliterado según el uso estándar en español.
- source_word: ὁ υἱὸς τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: el Hijo de Dios
  alternatives_spanish:
  - Hijo de Dios
  - el Hijo que es de Dios
  lexicon: BDAG
  rationale: Se conserva el título cristológico completo y su valor confesional. La forma con artículo en español reproduce bien el peso titular del griego y del inglés POB. No se reduce a una paráfrasis como "hijo divino".
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Se mantiene el sujeto divino de forma directa y clara.
- source_word: ἐν αὐτῷ μένει
  english_pob_choice: remains in him
  chosen_spanish: permanece en él
  alternatives_spanish:
  - habita en él
  - reside en él
  lexicon: BDAG
  rationale: Para μένω, "permanece" conserva el valor durativo y la clave joánica sin caer en un calco áspero. "Habita" es una alternativa válida, pero en español puede sugerir más intensidad espacial que relacional.
- source_word: καὶ αὐτὸς ἐν τῷ θεῷ
  english_pob_choice: and he in God
  chosen_spanish: y él en Dios
  alternatives_spanish:
  - y él permanece en Dios
  - y él habita en Dios
  lexicon: BDAG
  rationale: Se conserva la elipsis del segundo miembro, como en el inglés POB, para mantener el paralelismo y la tensión relacional del griego. Añadir el verbo explícitamente sería interpretativo; por eso se deja implícito.
theological_decisions:
- issue: Indwelling mutuo / reciprocidad relacional
  english_pob_reading: God remains in him, and he in God
  chosen_spanish_reading: Dios permanece en él, y él en Dios
  alternative_spanish_readings:
  - Dios habita en él, y él habita en Dios
  - Dios vive en él, y él vive en Dios
  rationale: La frase conserva la reciprocidad y la tensión teológica del texto sin resolverla ni explicarla más allá de lo que dice. Se evita sustituirla por formulaciones más interpretativas que diluirían el paralelismo o harían menos visible la asimetría gramatical del segundo miembro.
  doctrine_reference: Preservar la tensión teológica del texto sin sistematizarla; en línea con la confesión cristológica clásica (Credo Niceno, 381).
- issue: Título cristológico de Jesús
  english_pob_reading: the Son of God
  chosen_spanish_reading: el Hijo de Dios
  alternative_spanish_readings:
  - Hijo de Dios
  - el Hijo que es de Dios
  rationale: El texto presenta la confesión central sobre Jesús con el título completo. Se mantiene esa formulación para no debilitar su fuerza cristológica ni convertirla en una descripción general.
  doctrine_reference: Cristología nicena y calcedonense; afirmación del Hijo en relación única con Dios Padre.
translation_notes:
  revision_awareness: El texto inglés POB permanece sin cambios en la revisión más reciente, con acuerdo alto entre evaluadores; la versión española sigue de cerca el mismo equilibrio entre claridad moderna y preservación de la forma joánica, especialmente en el paralelismo final y en el título cristológico.
  spanish_consistency_notes:
  - Se usa "Dios" para θεός y "Jesús" para Ἰησοῦς, siguiendo el estándar del proyecto.
  - Se usa "permanece" para μένει para conservar el término joánico clave sin recurrir a un arcaísmo innecesario.
  - Se conserva la elipsis final de modo paralelo al inglés POB, para reflejar el griego con la menor intervención posible.
  - No se introducen notas al pie porque no hay una alternativa textual obligatoria ni una ambigüedad española que requiera marcación en este verso.
