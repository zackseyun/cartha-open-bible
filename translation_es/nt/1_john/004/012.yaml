translation:
  language: es
  text: Nadie ha visto jamás a Dios; si nos amamos unos a otros, Dios permanece en nosotros, y su amor[a] es perfeccionado en nosotros[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «nuestro amor por Dios es perfeccionado en nosotros». El griego «su amor» puede entenderse como el amor de Dios hacia nosotros o como nuestro amor dirigido a Dios; el contexto favorece el amor de Dios.'
    reason: alternative_reading
  - marker: b
    text: 'O: «es hecho completo en nosotros».'
    reason: lexical_alternative
lexical_decisions:
- source_word: θεὸν / θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: El griego usa θεός en sentido directo para Dios; en español, «Dios» es la forma natural y reverente. No se añade artículo por ser el uso personal teológico habitual.
- source_word: οὐδεὶς πώποτε τεθέαται
  english_pob_choice: No one has ever seen
  chosen_spanish: Nadie ha visto jamás
  alternatives_spanish:
  - Nadie ha visto nunca
  - Nadie ha contemplado jamás
  lexicon: BDAG
  rationale: «Ha visto» comunica bien el perfecto con el alcance universal de πώποτε. «Jamás» intensifica la negación de modo idiomático en español. Se evita «contemplado» por sonar más interpretativo que el griego.
- source_word: ἐὰν ἀγαπῶμεν ἀλλήλους
  english_pob_choice: if we love one another
  chosen_spanish: si nos amamos unos a otros
  alternatives_spanish:
  - si amamos unos a otros
  - si nos queremos unos a otros
  lexicon: BDAG
  rationale: «Nos amamos unos a otros» preserva el sentido recíproco de ἀλλήλους y el registro natural en español. «Queremos» sería demasiado afectivo/coloquial y menos fiel al valor de ἀγαπάω.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece en
  - se queda
  lexicon: BDAG
  rationale: «Permanece» reproduce bien el sentido joánico de μένω con continuidad relacional. Es más natural que «abide» trasladado de manera rígida y conserva la fuerza teológica del verbo.
- source_word: ἡ ἀγάπη αὐτοῦ
  english_pob_choice: his love
  chosen_spanish: su amor
  alternatives_spanish:
  - el amor de él
  - el amor de Dios
  lexicon: BDAG
  rationale: 'El genitivo αὐτοῦ se mantiene deliberadamente ambiguo en español como en el griego: puede leerse como amor de Dios hacia nosotros o como nuestro amor hacia Dios. El contexto favorece el amor de Dios, pero la forma breve «su amor» preserva la tensión documentada.'
- source_word: τετελειωμένη ἐστιν
  english_pob_choice: is perfected
  chosen_spanish: es perfeccionado
  alternatives_spanish:
  - ha sido perfeccionado
  - es hecho completo
  - llega a su plenitud
  lexicon: BDAG
  rationale: «Es perfeccionado» conserva la conexión con τελειόω y el valor resultativo del perfecto perifrástico, sin diluirlo en una paráfrasis. Se evita «llega a su plenitud» por ser más explicativo que el griego.
- source_word: ἐν ἡμῖν
  english_pob_choice: in us
  chosen_spanish: en nosotros
  alternatives_spanish:
  - entre nosotros
  lexicon: BDAG
  rationale: Se mantiene «en nosotros» de forma consistente con el texto y con el énfasis en la permanencia interior/relacional. «Entre nosotros» podría sugerir un matiz comunitario posible, pero aquí el paralelo con μένει favorece «en nosotros».
theological_decisions:
- issue: Ambigüedad de ἡ ἀγάπη αὐτοῦ
  english_pob_reading: his love is perfected in us, with a note that it may alternatively mean our love for God is perfected in us
  chosen_spanish_reading: su amor es perfeccionado en nosotros, con nota alternativa sobre nuestro amor por Dios
  alternative_spanish_readings:
  - nuestro amor por Dios es perfeccionado en nosotros
  - el amor que le tenemos es perfeccionado en nosotros
  rationale: La redacción principal sigue la lectura más probable según el contexto inmediato, que enfatiza el amor iniciador de Dios. La nota conserva la alternativa documentada para no borrar la tensión léxica y teológica del genitivo.
  doctrine_reference: Translation philosophy §3 (preservar tensiones teológicas genuinas)
- issue: Uso de un tiempo resultativo en τετελειωμένη ἐστιν
  english_pob_reading: is perfected / is made complete
  chosen_spanish_reading: es perfeccionado
  alternative_spanish_readings:
  - ha sido perfeccionado
  - es hecho completo
  rationale: La forma perifrástica griega expresa un estado resultante. En español, «es perfeccionado» es breve, fiel y mantiene el vínculo con el léxico joánico de τελειόω sin explicitar más de lo que el texto exige.
  doctrine_reference: BDAG; preservación de forma/resultados perfectivos
translation_notes:
  revision_awareness: Se revisó el pasaje a partir del texto griego SBLGNT y del audit trail en inglés. La versión inglesa reciente no requirió cambios sustantivos; se mantuvo la misma decisión interpretativa sobre ἡ ἀγάπη αὐτοῦ y el valor resultativo de τετελειωμένη ἐστιν, ajustando el español para sonar natural y a la vez auditable.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός en forma consistente con los valores por defecto del proyecto.
  - Se usa «permanece» para μένω, coherente con el vocabulario joánico y con la traducción inglesa auditada.
  - Se evita «Cristo» y no aplica ninguna convención especial sobre YHWH en este versículo.
  - La nota de la letra a preserva la ambigüedad documentada sin resolverla artificialmente en el cuerpo del texto.
