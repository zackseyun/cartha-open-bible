translation:
  language: es
  text: Y nosotros hemos llegado a conocer y hemos creído el amor[a] que Dios tiene entre nosotros. Dios es amor, y el que permanece en el amor permanece en Dios, y Dios permanece en él[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el amor que Dios tiene en nosotros». La frase griega puede denotar amor presente dentro de los creyentes o manifestado entre la comunidad.
    reason: alternative_reading
  - marker: b
    text: El griego usa una forma masculina singular con valor representativo; es decir, el que permanece en el amor.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγνώκαμεν
  english_pob_choice: have come to know
  chosen_spanish: hemos llegado a conocer
  alternatives_spanish:
  - hemos conocido
  - conocemos
  lexicon: BDAG
  rationale: El perfecto de γινώσκω expresa un estado presente resultante de una llegada previa al conocimiento; «hemos llegado a conocer» conserva mejor ese valor aspectual que un simple presente.
- source_word: πεπιστεύκαμεν
  english_pob_choice: have believed
  chosen_spanish: hemos creído
  alternatives_spanish:
  - hemos confiado
  - creemos
  lexicon: BDAG
  rationale: El perfecto de πιστεύω indica una fe ya asumida y vigente; «hemos creído» preserva ese matiz y armoniza con el paralelismo del griego.
- source_word: τὴν ἀγάπην
  english_pob_choice: the love
  chosen_spanish: el amor
  alternatives_spanish:
  - el amor específico
  - ese amor
  lexicon: BDAG
  rationale: ἀγάπη se vierte por el término español normal «amor». Se mantiene el artículo porque el texto alude a un amor concreto ya identificado por el contexto.
- source_word: ἣν ἔχει ὁ θεὸς ἐν ἡμῖν
  english_pob_choice: the love that God has among us / for us
  chosen_spanish: el amor que Dios tiene para con nosotros
  alternatives_spanish:
  - el amor que Dios tiene entre nosotros
  - el amor que Dios tiene en nosotros
  lexicon: BDAG
  rationale: ἐν ἡμῖν admite una lectura locativa/comunitaria o interior. En español, «para con nosotros» comunica con naturalidad el objeto personal del amor sin cerrar indebidamente la tensión entre «en nosotros» y «entre nosotros» que el griego permite.
- source_word: Ὁ θεὸς ἀγάπη ἐστίν
  english_pob_choice: God is love
  chosen_spanish: Dios es amor
  alternatives_spanish:
  - Dios es el amor
  lexicon: BDAG
  rationale: La construcción predicativa se traduce de forma directa, sin expansión doctrinal ni artículo innecesario.
- source_word: ὁ μένων
  english_pob_choice: the one who remains
  chosen_spanish: el que permanece
  alternatives_spanish:
  - el que mora
  - el que habita
  lexicon: BDAG
  rationale: μένω es un término joánico clave. «Permanece» conserva la consistencia léxica y resulta claro en español contemporáneo.
- source_word: ἐν τῇ ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en el amor
  alternatives_spanish:
  - en amor
  lexicon: BDAG
  rationale: Aunque el artículo no siempre se reproduce en español, aquí «en el amor» suena más natural y sigue de cerca la referencia concreta del contexto.
- source_word: ἐν τῷ θεῷ μένει
  english_pob_choice: remains in God
  chosen_spanish: permanece en Dios
  alternatives_spanish:
  - mora en Dios
  lexicon: BDAG
  rationale: Se mantiene la misma raíz verbal para respetar la relación recíproca de permanencia entre el creyente y Dios.
- source_word: ὁ θεὸς ἐν αὐτῷ μένει
  english_pob_choice: God remains in him
  chosen_spanish: Dios permanece en él
  alternatives_spanish:
  - Dios mora en él
  lexicon: BDAG
  rationale: Se conserva el masculino singular representativo del griego con el pronombre «él», siguiendo la correspondencia formal del texto fuente.
theological_decisions:
- issue: Sentido de ἐν ἡμῖν en la primera cláusula
  english_pob_reading: 'locative/communal: ''among us'' vs. ''for us'' in revision'
  chosen_spanish_reading: «para con nosotros», con apertura a una referencia comunitaria implícita
  alternative_spanish_readings:
  - «en nosotros»
  - «entre nosotros»
  rationale: El griego permite una tensión entre amor experimentado dentro de la comunidad y amor dirigido a nosotros. «Para con nosotros» es una solución española natural que no elimina esa amplitud y evita elegir prematuramente entre interioridad y esfera comunitaria.
  doctrine_reference: Principio POB de primacía del texto original y preservación de tensiones interpretativas cuando el griego las permite.
- issue: Pronombre masculino singular αὐτῷ
  english_pob_reading: '''him'' in the main text; masculine singular with representative force'
  chosen_spanish_reading: «en él»
  alternative_spanish_readings:
  - «en esa persona»
  rationale: Se preserva la correspondencia gramatical del griego y su fuerza representativa. El español mantiene la precisión formal sin neutralizar el pronombre.
  doctrine_reference: Política POB de traducción con precisión gramatical y sin suavizar la forma fuente cuando esta tiene valor exegético.
translation_notes:
  revision_awareness: 'El audit trail inglés muestra una revisión reciente de ἐν ἡμῖν desde ''among us'' a ''for us''. En español se optó por una formulación que no cierre la ambigüedad del original y que resulte idiomática: ''para con nosotros'', con nota para la alternativa ''en nosotros''. También se mantuvo el perfecto en ambos verbos principales (''hemos llegado a conocer'' y ''hemos creído'') para reflejar el aspecto del griego.'
  spanish_consistency_notes:
  - Se usó 'Dios' y no 'Señor' para θεός, conforme al contexto.
  - Se mantuvo 'amor' para ἀγάπη y 'permanece' para μένω, preservando la terminología joánica.
  - Se conservó el pronombre masculino singular 'él' para αὐτῷ en coherencia con la forma griega representativa.
  - 'La puntuación divide la confesión central en dos enunciados como en el griego: primero la experiencia del amor de Dios, luego la afirmación ''Dios es amor''.'
