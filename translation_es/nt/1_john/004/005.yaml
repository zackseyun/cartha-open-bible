translation:
  language: es
  text: Ellos son del mundo[a]; por eso hablan desde el mundo[b], y el mundo los escucha.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Ellos son desde el mundo … hablan desde el mundo». El griego repite «desde / procedentes del mundo», resaltando origen o procedencia.'
    reason: lexical_alternative
  - marker: b
    text: Aquí «mundo» significa el orden humano opuesto a Dios, no el universo creado como tal.
    reason: cultural_note
lexical_decisions:
- source_word: αὐτοὶ
  english_pob_choice: They
  chosen_spanish: Ellos
  alternatives_spanish:
  - Estos
  - Ellos mismos
  lexicon: BDAG
  rationale: El pronombre tiene valor enfático en griego, pero en español puede conservarse con «ellos» sin recargar el estilo. Mantiene el contraste implícito con los que son de Dios en el contexto inmediato.
- source_word: ἐκ τοῦ κόσμου
  english_pob_choice: from the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de el mundo
  - procedentes del mundo
  - del sistema del mundo
  lexicon: BDAG
  rationale: La preposición ἐκ marca origen o procedencia. «Del mundo» es la forma natural en español y preserva la idea de fuente/origen sin añadir una glosa interpretativa excesiva.
- source_word: κόσμος
  english_pob_choice: world
  chosen_spanish: mundo
  alternatives_spanish:
  - mundo-systema
  - sistema del mundo
  lexicon: BDAG
  rationale: En este contexto joánico, κόσμος no se refiere al universo creado sino al orden humano alienado de Dios. «Mundo» conserva esa carga teológica de manera estándar en español.
- source_word: διὰ τοῦτο
  english_pob_choice: for this reason
  chosen_spanish: por eso
  alternatives_spanish:
  - por esta razón
  - por lo tanto
  - por tal motivo
  lexicon: BDAG
  rationale: La frase expresa consecuencia causal. «Por eso» es breve, natural y suficientemente precisa para unir el origen con el habla.
- source_word: λαλοῦσιν
  english_pob_choice: speak
  chosen_spanish: hablan
  alternatives_spanish:
  - hablan continuamente
  - dicen
  - se expresan
  lexicon: BDAG
  rationale: El presente tiene valor general o habitual. «Hablan» comunica esa acción de modo sobrio; «dicen» o perífrasis más largas debilitarían el paralelismo con el griego.
- source_word: ἐκ τοῦ κόσμου λαλοῦσιν
  english_pob_choice: speak from the world
  chosen_spanish: hablan del mundo
  alternatives_spanish:
  - hablan desde el mundo
  - hablan de acuerdo con el mundo
  - hablan como del mundo
  lexicon: BDAG
  rationale: El griego repite ἐκ + κόσμος para marcar procedencia y contenido originado en el mundo. En español, «hablan del mundo» mantiene la repetición con el primer miembro y suena natural; la preposición «del» puede sugerir tanto procedencia como contenido, lo cual conserva la tensión del original.
- source_word: ὁ κόσμος αὐτῶν ἀκούει
  english_pob_choice: the world listens to them
  chosen_spanish: el mundo los escucha
  alternatives_spanish:
  - el mundo los oye
  - el mundo escucha su mensaje
  - el mundo les hace caso
  lexicon: BDAG
  rationale: ἀκούω puede significar oír o escuchar con receptividad. «Los escucha» comunica mejor la recepción favorable que simple audición, y el objeto directo español expresa con naturalidad el valor del genitivo αὐτῶν.
theological_decisions:
- issue: Sentido de κόσμος en 1 Juan
  english_pob_reading: '''world'' refers to the human order alienated from God, not the created universe as such'
  chosen_spanish_reading: «mundo» se entiende como el orden humano en oposición a Dios, no como la creación material en general
  alternative_spanish_readings:
  - el mundo físico
  - la humanidad en sentido neutral
  rationale: El contexto contrasta a estos con los que son de Dios, por lo que el término tiene un sentido moral y teológico, no cosmológico. Se conserva «mundo» sin explicarlo en el texto principal, para no sobreinterpretar, pero el sentido queda reflejado en la elección lexical.
  doctrine_reference: Translation philosophy §1, §5
- issue: Fuerza enfática de αὐτοὶ
  english_pob_reading: No explicit emphatic rendering in English main text
  chosen_spanish_reading: No se añade un énfasis explícito en el texto principal más allá de «Ellos»
  alternative_spanish_readings:
  - Ellos mismos son del mundo
  - Precisamente ellos son del mundo
  rationale: El pronombre griego puede ser enfático, pero en español el énfasis adicional puede sonar pesado. «Ellos» preserva la referencia contrastiva sin exageración estilística.
  doctrine_reference: Translation philosophy §6
- issue: Valor de ἀκούει
  english_pob_reading: the world listens to them
  chosen_spanish_reading: «los escucha» expresa recepción favorable, no mera percepción auditiva
  alternative_spanish_readings:
  - los oye
  - atiende a ellos
  - les hace caso
  rationale: En este contexto, ἀκούω implica una respuesta receptiva. «Los escucha» comunica esa idea con claridad; «los oye» sería demasiado débil y «les hace caso» demasiado interpretativo.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el paquete fuente griego de SBLGNT y el trazado auditado en inglés; no se registran revisiones posteriores en el flujo fuente, y la concordancia del control cruzado fue alta/agreed. La versión española conserva la repetición de ἐκ τοῦ κόσμου mediante dos miembros paralelos y evita suavizar la tensión teológica de κόσμος.
  spanish_consistency_notes:
  - Se mantuvo «mundo» como término joánico estándar, sin sustituirlo por explicaciones interpretativas dentro del versículo.
  - Se tradujo ἐκ con valor de procedencia/origen de manera consistente en ambos miembros.
  - Se prefirió un verbo de recepción («escucha») para ἀκούει, en coherencia con la lectura auditada en inglés.
  - 'La puntuación refleja una división causal natural en español: afirmación, causa y resultado.'
