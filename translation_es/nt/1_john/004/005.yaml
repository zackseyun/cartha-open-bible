    issue: «hablan del mundo» no refleja con suficiente fidelidad ἐκ τοῦ κόσμου λαλοῦσιν
    rationale: La preposición ἐκ repetida en griego marca origen/fuente, no primariamente tema. «Hablan del mundo» en español suele significar ‘hablan acerca del mundo’, lo cual desplaza el sentido documentado por el POB inglés.
  - severity: medium
    issue: La nota [a] mezcla alternativa y explicación de una forma algo confusa
    rationale: Si el texto principal se corrige para reflejar procedencia, la nota debe presentar con claridad la alternativa «del mundo» y explicar que el griego resalta origen/procedencia.
  - severity: low
    issue: La rationale léxica española para ἐκ τοῦ κόσμου λαλοῦσιν sobreinterpreta al decir que «del» puede sugerir tanto procedencia como contenido
    rationale: Esa defensa no está suficientemente respaldada por el uso natural del español y suaviza una diferencia real entre el griego y el borrador.
