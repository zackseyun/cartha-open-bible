translation:
  language: es
  text: Y sabemos que el Hijo de Dios ha venido y nos ha dado entendimiento para que conozcamos al Verdadero; y estamos en el Verdadero[a], en su Hijo Jesús Mesías. Este es el Dios verdadero y la vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Este es el Dios verdadero y la vida eterna». El demostrativo puede referirse específicamente a Jesús Mesías, aunque algunos entienden que se refiere al «Verdadero» (el Padre) en la cláusula anterior.'
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos conocido
  - conocemos
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento establecido y presente. En español, «sabemos» comunica bien ese saber asentado sin forzar un perfecto perifrástico.
- source_word: ἥκει
  english_pob_choice: has come
  chosen_spanish: ha venido
  alternatives_spanish:
  - ha llegado
  - está aquí
  lexicon: BDAG
  rationale: ἥκω denota haber venido/llegado con efecto presente. «Ha venido» es natural en español y preserva ese valor resultativo.
- source_word: δέδωκεν
  english_pob_choice: has given
  chosen_spanish: nos ha dado
  alternatives_spanish:
  - nos dio
  lexicon: BDAG
  rationale: El perfecto subraya un don con efecto continuo. «Nos ha dado» conserva mejor esa permanencia que un pasado simple.
- source_word: διάνοιαν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - mente
  - discernimiento
  lexicon: BDAG
  rationale: Aquí no se trata solo de la facultad mental abstracta, sino de la capacidad de percibir la verdad divina. «Entendimiento» es claro y fiel al contexto.
- source_word: ἵνα γινώσκωμεν
  english_pob_choice: so that we may know
  chosen_spanish: para que conozcamos
  alternatives_spanish:
  - a fin de que conozcamos
  - para que sepamos
  lexicon: BDAG
  rationale: La cláusula de propósito con ἵνα se expresa con naturalidad mediante «para que»; el subjuntivo «conozcamos» mantiene la finalidad del texto.
- source_word: τὸν ἀληθινόν / τῷ ἀληθινῷ
  english_pob_choice: the True One
  chosen_spanish: al Verdadero / en el Verdadero
  alternatives_spanish:
  - al que es verdadero / en el que es verdadero
  - al Verdadero Uno / en el Verdadero Uno
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado. «El Verdadero» conserva la repetición joánica y evita añadir palabras que el griego no necesita.
- source_word: ἐσμὲν ἐν
  english_pob_choice: we are in
  chosen_spanish: estamos en
  alternatives_spanish:
  - permanecemos en
  - estamos unidos con
  lexicon: BDAG
  rationale: El texto dice simplemente «estamos en», sin usar μένω. Mantener esa formulación evita expandir el sentido más allá de la frase griega.
- source_word: ἐν τῷ υἱῷ αὐτοῦ
  english_pob_choice: in his Son
  chosen_spanish: en su Hijo
  alternatives_spanish:
  - en el Hijo de él
  lexicon: BDAG
  rationale: Es una reproducción natural del sintagma posesivo griego y conserva la relación entre el Padre y el Hijo.
- source_word: Ἰησοῦ Χριστῷ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Cristo
  lexicon: BDAG
  rationale: En este contexto, Χριστός funciona como título personal ya fijado en español bíblico y eclesial como parte del nombre «Jesucristo». Se mantiene la forma tradicional por inteligibilidad y uso estable, sin perder el valor titular en el trasfondo del griego.
- source_word: οὗτός
  english_pob_choice: This one
  chosen_spanish: Este
  alternatives_spanish:
  - Él
  - Este mismo
  lexicon: BDAG
  rationale: El demostrativo griego se traduce de modo más directo con «Este», que conserva la referencia señalativa y permite dejar abierta la cuestión del antecedente sin resolverla prematuramente.
- source_word: ὁ ἀληθινὸς θεὸς
  english_pob_choice: the true God
  chosen_spanish: el Dios verdadero
  alternatives_spanish:
  - el verdadero Dios
  lexicon: BDAG
  rationale: La traducción estándar y exacta en español es «el Dios verdadero». Mantiene el orden natural y la fuerza predicativa del griego.
- source_word: ζωὴ αἰώνιος
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida eterna del siglo venidero
  lexicon: BDAG
  rationale: Es la expresión joánica estable y la traducción idiomática normal de ζωὴ αἰώνιος en español bíblico.
theological_decisions:
- issue: Antecedente de οὗτός ἐστιν ὁ ἀληθινὸς θεὸς καὶ ζωὴ αἰώνιος
  english_pob_reading: This one is the true God and eternal life. The demonstrative may refer specifically to Jesus Messiah, though some understand it to refer to 'the True One' (the Father) in the preceding clause.
  chosen_spanish_reading: Este es el Dios verdadero y vida eterna. La redacción deja abierta la posibilidad de que el demostrativo se refiera a Jesucristo o al Verdadero del contexto previo.
  alternative_spanish_readings:
  - Este se refiere específicamente a Jesucristo como el Dios verdadero y vida eterna.
  - Este se refiere al Verdadero, es decir, al Padre, con «en su Hijo» como la esfera por la cual estamos en él.
  rationale: El demostrativo οὗτός puede apuntar al antecedente personal más cercano, pero la sintaxis ha sido discutida históricamente. En español conviene conservar la ambigüedad textual sin forzarla. La formulación «Este» preserva el señalamiento del griego y deja intacta la tensión interpretativa.
  doctrine_reference: Mantener la tensión interpretativa sin resolverla de manera artificial; compatible con la cristología nicena.
translation_notes:
  revision_awareness: La revisión inglesa más reciente volvió de «Jesus Christ» a «Jesus Messiah» por coherencia doctrinal, pero el español de esta línea conserva «Jesucristo» como forma estable y ampliamente reconocible para Χριστῷ, sin negar su valor titular. También refleja la preferencia final de la revisión por una traducción más directa del demostrativo οὗτός mediante «Este».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «vida eterna» para ζωὴ αἰώνιος, conforme al uso joánico estándar.
  - Se traduce Ἰησοῦς como «Jesús» dentro de la forma compuesta estable «Jesucristo», que en español bíblico funciona como nombre-título consolidado.
  - Se conserva la repetición de «el Verdadero / en el Verdadero» para reflejar el paralelismo del griego.
  - No se usa «SEÑOR» porque este versículo no contiene κύριος ni un sustituto directo del nombre divino.
