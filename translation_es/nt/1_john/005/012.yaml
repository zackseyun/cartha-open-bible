translation:
  language: es
  text: El que tiene al Hijo tiene la vida[a]; el que no tiene al Hijo de Dios no tiene la vida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vida eterna»; en el uso joánico, «la vida» aquí se refiere a la vida que se encuentra en el Hijo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ ἔχων
  english_pob_choice: the one who has
  chosen_spanish: El que tiene
  alternatives_spanish:
  - Quien tiene
  - El que posee
  lexicon: BDAG
  rationale: El participio sustantivado con artículo funciona de manera genérica; en español, «el que» conserva bien ese valor representativo. «Tiene» es la equivalencia más natural para ἔχω en este contexto relacional.
- source_word: τὸν υἱόν
  english_pob_choice: the Son
  chosen_spanish: al Hijo
  alternatives_spanish:
  - al Hijo [de Dios]
  lexicon: BDAG
  rationale: En la primera cláusula el griego dice simplemente «al Hijo»; mantener la forma breve respeta la variación del texto y deja que el contexto identifique claramente a Jesús.
- source_word: ἔχει τὴν ζωήν
  english_pob_choice: has life
  chosen_spanish: tiene la vida
  alternatives_spanish:
  - tiene vida
  - posee la vida
  lexicon: BDAG
  rationale: Aunque el griego lleva artículo, en español suena más natural «la vida» que solo «vida» en una afirmación de posesión definida. No se explicita «eterna» en el texto principal porque el verso dice simplemente ζωή.
- source_word: ὁ μὴ ἔχων
  english_pob_choice: the one who does not have
  chosen_spanish: el que no tiene
  alternatives_spanish:
  - quien no tiene
  - el que no posee
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera cláusula y el valor genérico singular del participio negado con μή.
- source_word: τὸν υἱὸν τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: al Hijo de Dios
  alternatives_spanish:
  - al Hijo de Dios [el Hijo]
  lexicon: BDAG
  rationale: La segunda cláusula explicita plenamente el título cristológico. «Hijo de Dios» traduce con transparencia la relación genitiva del griego sin añadir una glosa doctrinal.
- source_word: οὐκ ἔχει
  english_pob_choice: does not have
  chosen_spanish: no tiene
  alternatives_spanish:
  - no posee
  lexicon: BDAG
  rationale: «No tiene» reproduce con sencillez la negación verbal y mantiene el contraste directo con «tiene» en la primera cláusula.
theological_decisions:
- issue: Sentido de ζωή en contexto joánico
  english_pob_reading: '''life'' remains in the main text; the English note allows ''eternal life'' as an alternative because Johannine usage points to that fuller sense.'
  chosen_spanish_reading: «la vida» permanece en el texto principal; la nota permite «vida eterna» como alternativa contextual.
  alternative_spanish_readings:
  - vida eterna
  - la vida eterna
  rationale: El griego dice simplemente ζωή; traducir «vida» evita importar una explicación que el verso no enuncia. La alternativa se conserva en nota porque el contexto de 1 Juan da a «vida» un peso teológico especial.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Never paraphrase beyond what the source text warrants.'
- issue: Forma genérica de los participios sustantivados
  english_pob_reading: Use 'the one who...' rather than masculine-specific 'he who...' or pluralizing.
  chosen_spanish_reading: Usar «el que...» en lugar de pluralizar o masculinizar con «el que él...» o fórmulas arcaicas.
  alternative_spanish_readings:
  - quien...
  - todo el que...
  rationale: El griego es masculino singular con valor genérico; «el que» conserva esa forma representativa en un español natural y bíblico sin perder precisión.
  doctrine_reference: 'Translation philosophy: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: Sin cambios textuales respecto al análisis de referencia; se mantiene la equivalencia óptima con prioridad en la transparencia del griego y en el paralelismo de las dos cláusulas.
  spanish_consistency_notes:
  - Se mantiene «Hijo» para τὸν υἱόν y «Hijo de Dios» para τὸν υἱὸν τοῦ θεοῦ, preservando la variación del original.
  - Se usa «tiene»/«no tiene» para ἔχει/οὐκ ἔχει, evitando verbos más interpretativos como «posee».
  - Se conserva «la vida» sin añadir «eterna» en el texto principal, conforme al griego y a la nota de uso joánico.
  - La puntuación con punto y coma reproduce el contraste binario del griego con claridad en español.
