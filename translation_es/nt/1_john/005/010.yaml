translation:
  language: es
  text: El que cree en el Hijo de Dios tiene el testimonio en sí mismo[a]; el que no cree a Dios lo ha hecho mentiroso[b], porque no ha creído el testimonio que Dios ha dado testimonio acerca de su Hijo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «en él» en lugar de «en sí mismo», lo que podría entenderse como «en el Hijo» y no como referencia al creyente.
    reason: textual_variant
  - marker: b
    text: 'O: «ha hecho de él un mentiroso». La expresión griega es más literal: «lo ha hecho mentiroso», es decir, al rechazar el testimonio de Dios, se trata a Dios como falso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ πιστεύων
  english_pob_choice: The one who believes
  chosen_spanish: El que cree
  alternatives_spanish:
  - Quien cree
  - El que cree en
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente y expresa una referencia general e impersonal. «El que cree» conserva esa fuerza natural en español sin introducir una formulación arcaica.
- source_word: εἰς τὸν υἱὸν τοῦ θεοῦ
  english_pob_choice: in the Son of God
  chosen_spanish: en el Hijo de Dios
  alternatives_spanish:
  - hacia el Hijo de Dios
  - sobre el Hijo de Dios
  lexicon: BDAG
  rationale: Con πιστεύω + εἰς, el sentido idiomático es confiar/creer en alguien. En español, «cree en el Hijo de Dios» comunica esa dirección relacional de manera natural y fiel.
- source_word: τὴν μαρτυρίαν
  english_pob_choice: testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - la declaración
  lexicon: BDAG
  rationale: En el uso joánico, μαρτυρία mantiene el peso de testimonio dado como evidencia. «Testimonio» preserva el matiz jurídico y de testificación mejor que términos más generales.
- source_word: ἐν αὑτῷ
  english_pob_choice: in himself
  chosen_spanish: en sí mismo
  alternatives_spanish:
  - dentro de sí
  - en él
  lexicon: BDAG
  rationale: El reflexivo vuelve al creyente mencionado. «En sí mismo» es una traducción directa y natural que conserva la idea de posesión/inhabitación interna del testimonio.
- source_word: ὁ μὴ πιστεύων τῷ θεῷ
  english_pob_choice: the one who does not believe God
  chosen_spanish: el que no cree a Dios
  alternatives_spanish:
  - el que no cree en Dios
  - el que no confía en Dios
  lexicon: BDAG
  rationale: Aquí el dativo con πιστεύω apunta a aceptar como verdadera la palabra o testimonio de Dios. «Creer a Dios» refleja mejor esa idea que «creer en Dios», que en español suele sonar a simple existencia de Dios.
- source_word: ψεύστην πεποίηκεν αὐτόν
  english_pob_choice: has made him a liar
  chosen_spanish: lo ha hecho mentiroso
  alternatives_spanish:
  - lo ha hecho pasar por mentiroso
  - lo ha tratado como mentiroso
  lexicon: BDAG
  rationale: 'La expresión conserva el valor literal del griego y mantiene la tensión teológica: al rechazar el testimonio divino, el incrédulo trata a Dios como falso. «Lo ha hecho mentiroso» sigue de cerca la formulación original.'
- source_word: οὐ πεπίστευκεν
  english_pob_choice: has not believed
  chosen_spanish: no ha creído
  alternatives_spanish:
  - no ha llegado a creer
  - ha rechazado creer
  lexicon: BDAG
  rationale: El perfecto expresa una incredulidad con relevancia presente. «No ha creído» conserva esa idea sin sobrerrepetir la duración del aspecto verbal.
- source_word: ἣν μεμαρτύρηκεν ὁ θεὸς
  english_pob_choice: that God has testified
  chosen_spanish: el testimonio que Dios ha dado
  alternatives_spanish:
  - el testimonio que Dios ha testificado
  - la declaración que Dios ha dado
  lexicon: BDAG
  rationale: Se conserva la relación cognada de «testimonio» / «ha dado» en una forma española fluida. «Ha dado» evita una rigidez innecesaria y comunica el acto de testificar como entrega pública de testimonio.
- source_word: περὶ τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: about his Son
  chosen_spanish: acerca de su Hijo
  alternatives_spanish:
  - sobre su Hijo
  - concerniente a su Hijo
  lexicon: BDAG
  rationale: «Acerca de» es natural y preciso para περί con genitivo aquí. Mantiene el contenido referencial sin añadir matices interpretativos ajenos al texto.
theological_decisions:
- issue: Referencia de «el testimonio en sí mismo»
  english_pob_reading: The testimony is possessed internally by the believer.
  chosen_spanish_reading: El testimonio está en el creyente mismo.
  alternative_spanish_readings:
  - El testimonio está en el Hijo de Dios.
  - El testimonio está en él (según variante textual).
  rationale: Se sigue el texto griego dado ἐν αὑτῷ, que refiere de manera más natural al creyente mencionado. La traducción conserva esa lectura sin armonizarla con otras formulaciones cercanas.
  doctrine_reference: Primacía del texto fuente; conservar la tensión textual documentada.
- issue: Sentido de «no cree a Dios»
  english_pob_reading: The clause refers specifically to rejecting God's testimony, not merely lacking belief in God's existence.
  chosen_spanish_reading: La frase se refiere a rechazar el testimonio de Dios, no solo a una incredulidad general sobre su existencia.
  alternative_spanish_readings:
  - No cree en Dios en sentido general.
  - No confía en Dios.
  rationale: 'El contexto inmediato explica la incredulidad mediante el ὅτι-cláusula: no creer el testimonio que Dios ha dado acerca de su Hijo. Por eso se mantiene «cree a Dios», que en español puede expresar aceptar lo que Dios afirma.'
  doctrine_reference: Distinción semántica apoyada por la cláusula explicativa; fidelidad al discurso joánico.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y toma en cuenta el audit trail inglés: conserva la distinción entre πιστεύω εἰς + acusativo y πιστεύω con dativo; mantiene el perfecto de valor resultativo («ha hecho», «ha creído»); y reproduce la variante textual de ἐν αὑτῷ con nota, sin resolver la tensión interpretativa. También se ajustó la segunda cláusula para evitar una repetición innecesaria de «en» que no corresponde al griego.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «Hijo de Dios» para υἱὸς τοῦ θεοῦ, conforme a la terminología del proyecto.
  - Se traduce πιστεύω con dativo como «creer a Dios», no como «creer en Dios», para conservar el contraste semántico con πιστεύω εἰς.
  - Se usa «testimonio» para μαρτυρία y se mantiene el cognado verbal en la cláusula siguiente mediante «ha dado» como traducción natural de μεμαρτύρηκεν.
  - Se evita introducir «Cristo» o «Señor», porque el versículo no lo requiere y el texto fuente habla explícitamente del Hijo de Dios.
  - Se conserva la ambigüedad textual de ἐν αὑτῷ mediante nota, sin desplazarla a una interpretación dogmática en el cuerpo del texto.
