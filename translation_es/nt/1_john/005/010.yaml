source:
  edition: SBLGNT
  text: ὁ πιστεύων εἰς τὸν υἱὸν τοῦ θεοῦ ἔχει τὴν μαρτυρίαν ἐν ⸀αὑτῷ· ὁ μὴ πιστεύων τῷ θεῷ ψεύστην πεποίηκεν αὐτόν, ὅτι οὐ πεπίστευκεν εἰς τὴν μαρτυρίαν ἣν μεμαρτύρηκεν ὁ θεὸς περὶ τοῦ υἱοῦ αὐτοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/010.yaml
  text: The one who believes in the Son of God has the testimony in himself[a]; the one who does not believe God has made him a liar[b], because he has not believed the testimony that God has testified about his Son.
  footnotes:
  - marker: a
    text: Or, 'has made him out to be a liar.' The Greek is more literally 'has made him a liar,' meaning that rejecting God's testimony treats God as false.
    reason: lexical_alternative
  - marker: b
    text: Some manuscripts read 'in him' instead of 'in himself,' which could be understood as 'in the Son' rather than 'in himself.'
    reason: textual_variant
  ai_draft:
    model_id: gpt-5.4
