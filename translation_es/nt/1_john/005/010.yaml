review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «El que cree… tiene el testimonio en sí mismo» corresponde adecuadamente a ὁ πιστεύων… ἔχει τὴν μαρτυρίαν ἐν αὑτῷ; «el que no cree a Dios» preserva correctamente la distinción de πιστεύω + dativo frente a «creer en Dios»; y «lo ha hecho mentiroso» transmite con suficiente literalidad ψεύστην πεποίηκεν αὐτόν. Sin embargo, el borrador pierde un rasgo retórico importante en la última cláusula: ἣν μεμαρτύρηκεν ὁ θεὸς se vierte como «que Dios ha dado», lo cual borra la pareja cognada «testimonio / ha testificado» documentada por el POB en inglés y presente en el griego.'
  spanish_quality_summary: 'El español es claro y legible en registro bíblico moderno. La sintaxis fluye bien y «cree a Dios» es una decisión acertada. No obstante, las notas al pie están intercambiadas: el marcador [a] en el texto está sobre «en sí mismo», pero la nota a habla de «ha hecho mentiroso»; y el marcador [b] está sobre «mentiroso», pero la nota b habla de la variante textual «en él». Eso requiere corrección. Además, conviene ajustar la última cláusula a «que Dios ha dado testimonio» o similar para conservar mejor la repetición joánica.'
  glossary_alignment: No hay conflictos con los términos de glosario del proyecto. «Dios», «Hijo de Dios» y el uso de «cree a Dios» están alineados. El punto principal de alineación léxica pendiente es preservar μαρτυρία / μεμαρτύρηκεν con una solución española más cognada, preferiblemente «testimonio / ha dado testimonio» en vez de «testimonio / ha dado».
  issues:
  - severity: high
    issue: Los marcadores de notas al pie están invertidos respecto de sus contenidos.
    rationale: En el texto, [a] aparece en «en sí mismo», pero la nota a explica «lo ha hecho mentiroso»; y [b] aparece en «mentiroso», pero la nota b explica la variante «en él / en sí mismo». Esto incumple la disciplina de anclaje y puede confundir al lector.
  - severity: medium
    issue: La traducción de ἣν μεμαρτύρηκεν ὁ θεὸς como «que Dios ha dado» debilita la correspondencia léxica con μαρτυρία.
    rationale: El inglés auditado documenta explícitamente la preservación de la pareja cognada «testimony / has testified». En español, «ha dado» es comprensible, pero pierde el énfasis joánico en el acto de testificar. «Ha dado testimonio» conserva mejor forma y sentido sin sonar antinatural.
  revised_spanish_text: El que cree en el Hijo de Dios tiene el testimonio en sí mismo[a]; el que no cree a Dios lo ha hecho mentiroso[b], porque no ha creído el testimonio que Dios ha dado testimonio acerca de su Hijo.
  revised_footnotes:
