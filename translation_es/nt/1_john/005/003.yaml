translation:
  language: es
  text: 'Porque este es el amor de Dios[a]: que guardemos sus mandamientos, y sus mandamientos no son gravosos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «amor por Dios»; la frase griega puede leerse como amor dirigido a Dios o como amor que procede de Dios, aunque el contexto inmediato favorece «amor por Dios».'
    reason: alternative_reading
lexical_decisions:
- source_word: αὕτη
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto es
  - esta es
  lexicon: BDAG
  rationale: El demostrativo introduce la explicación de lo que sigue; «esto» suena natural en español y conserva el valor deíctico sin forzar una estructura más pesada.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí expresa fundamento o explicación respecto del contexto inmediato; «Porque» comunica bien esa relación causal-explicativa en español bíblico actual.
- source_word: ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_spanish: el amor de Dios
  alternatives_spanish:
  - el amor por Dios
  - el amor que Dios da
  lexicon: BDAG
  rationale: Se conserva la forma genitiva transparente del griego. En este contexto la relación se entiende principalmente como amor dirigido a Dios, pero el español mantiene la misma apertura semántica que el texto fuente y permite la nota de alternativa.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: en que
  alternatives_spanish:
  - que
  - a saber, que
  lexicon: BDAG
  rationale: Aquí introduce el contenido explicativo de en qué consiste ese amor. «En que» suena idiomático en español y mantiene la función aclaratoria del griego mejor que un simple «que».
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: BDAG
  rationale: «Mandamientos» preserva el peso normativo y la resonancia joánica de ἐντολή mejor que «mandatos», y encaja con el registro bíblico sin volverlo arcaico.
- source_word: τηρῶμεν
  english_pob_choice: we keep
  chosen_spanish: guardemos
  alternatives_spanish:
  - cumplamos
  - observemos
  lexicon: BDAG
  rationale: En español, «guardar» comunica bien la idea de mantener fielmente los mandamientos y conserva la conexión lexical con el uso joánico de τηρέω.
- source_word: βαρεῖαι
  english_pob_choice: burdensome
  chosen_spanish: gravosos
  alternatives_spanish:
  - pesados
  - cargados
  - difíciles de llevar
  lexicon: BDAG
  rationale: «Gravosos» expresa el sentido de algo opresivo o pesado de soportar. Es un equivalente natural y digno para el español, sin perder la carga semántica del término griego.
theological_decisions:
- issue: Sentido del genitivo en ἡ ἀγάπη τοῦ θεοῦ
  english_pob_reading: 'objective genitive: believers'' love for God'
  chosen_spanish_reading: amor de Dios entendido aquí como amor hacia Dios
  alternative_spanish_readings:
  - amor de Dios entendido como amor que proviene de Dios
  - amor de Dios con ambigüedad intencional
  rationale: El contexto inmediato vincula amar a Dios con guardar sus mandamientos, y el verso mismo define ese amor como obediencia. Por eso la lectura primaria en español debe orientarse hacia el amor hacia Dios, sin borrar que la forma griega permanece sintácticamente abierta.
  doctrine_reference: Preservar la tensión genitiva del original sin imponer una solución dogmática ajena al contexto.
translation_notes:
  revision_awareness: Se revisó la coherencia con el griego SBLGNT y con la solución auditada en inglés. Se mantuvo la ambigüedad genitiva relevante en nota, pero el texto principal adopta una formulación natural en español que refleja la explicación contextual de la cláusula.
  spanish_consistency_notes:
  - Se usa «mandamientos» para ἐντολαί, conforme al peso normativo del término.
  - Se usa «guardar» para τηρέω, manteniendo la continuidad terminológica joánica.
  - Se evita «SEÑOR» o sustituciones no presentes en el texto; no hay término divino explícito en este versículo.
  - «Gravosos» conserva el sentido idiomático de βαρεῖαι sin caer en un calco mecánico de «pesados».
