revisions:
- from: 'Porque en esto consiste el amor de Dios[a]: en que guardemos sus mandamientos, y sus mandamientos no son gravosos.'
  to: 'Porque este es el amor de Dios[a]: que guardemos sus mandamientos, y sus mandamientos no son gravosos.'
  rationale: Se ajusta la primera cláusula para acercarla más al griego y al rastro POB inglés, evitando una expansión innecesaria («en esto consiste»). Se conserva «amor de Dios» por transparencia al original y se mantiene la nota de alternativa con una formulación española más alineada con la decisión documentada («amor por Dios»). No se requiere adjudicación adicional.
