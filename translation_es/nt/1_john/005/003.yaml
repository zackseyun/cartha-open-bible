    issue: «en esto consiste» explicita más de lo que dice αὕτη γάρ ἐστιν
    rationale: El griego dice literalmente «porque esto es el amor de Dios», seguido por la cláusula explicativa con ἵνα. «En esto consiste» comunica bien la idea, pero introduce una paráfrasis interpretativa donde el POB inglés mantuvo una forma más directa.
  - severity: low
    issue: La nota usa «amor hacia Dios» en vez de reproducir de forma más cercana «amor por Dios»
    rationale: No es incorrecto, pero el rastro inglés da específicamente «love for God». «Amor por Dios» encaja mejor con el español natural y con la alternativa documentada.
