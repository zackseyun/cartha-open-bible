    text: Or 'whatever has been born of God,' with the neuter Greek phrasing expressing the whole class of those born of God.
    reason: lexical_alternative
  - marker: b
    text: Or 'our faithfulness.' The Greek word can in some contexts mean 'faith,' 'trust,' or 'faithfulness'; here the main text follows the default rendering 'faith.'
    reason: alternative_reading
