translation:
  language: es
  text: 'Porque todo el que ha nacido[a] de Dios vence al mundo. Y esta es la victoria que ha vencido al mundo: nuestra fe[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo que ha nacido de Dios», con el matiz neutro del griego expresando la clase entera de los nacidos de Dios.
    reason: lexical_alternative
  - marker: b
    text: O «nuestra fidelidad». La palabra griega puede significar, según el contexto, «fe», «confianza» o «fidelidad»; aquí el texto principal sigue la lectura por defecto «fe».
    reason: alternative_reading
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: ὅτι introduce la razón o fundamento de lo anterior; en español, «Porque» comunica bien esa relación causal de manera natural y fiel.
- source_word: πᾶν τὸ γεγεννημένον
  english_pob_choice: everyone who has been born
  chosen_spanish: todo el que ha nacido
  alternatives_spanish:
  - quienquiera que ha nacido
  - todo lo que ha nacido
  lexicon: BDAG
  rationale: La forma griega es neutra singular, pero en el contexto joánico se refiere colectivamente a personas nacidas de Dios. «Todo el que» conserva el valor colectivo sin perder la referencia personal.
- source_word: γεγεννημένον
  english_pob_choice: has been born
  chosen_spanish: ha nacido
  alternatives_spanish:
  - ha sido engendrado
  - ha sido nacido
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción cumplida con efecto vigente. «Ha nacido» es natural en español y encaja con el lenguaje joánico de nuevo nacimiento mejor que un calco como «engendrado».
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - a partir de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: En este contexto de origen espiritual, «de Dios» es la forma más idiomática y conserva la relación de procedencia y pertenencia.
- source_word: νικᾷ
  english_pob_choice: overcomes
  chosen_spanish: vence
  alternatives_spanish:
  - conquista
  - triunfa sobre
  lexicon: BDAG
  rationale: «Vence» es el equivalente más natural de νικάω en este marco joánico y mantiene la conexión léxica con νίκη y νικήσασα.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - el mundo
  - el orden del mundo
  lexicon: BDAG
  rationale: En 1 Juan, κόσμος suele señalar el mundo ordenado en oposición a Dios. El objeto directo con «al» suena natural en español y conserva el sentido usual de «el mundo».
- source_word: αὕτη ἐστὶν ἡ νίκη
  english_pob_choice: this is the victory
  chosen_spanish: Y esta es la victoria
  alternatives_spanish:
  - Y esta es la conquista
  - Y esta es la triunfante victoria
  lexicon: BDAG
  rationale: «Victoria» reproduce con claridad νίκη y mantiene el paralelismo con el verbo «vence» del miembro anterior.
- source_word: ἡ νικήσασα
  english_pob_choice: that has overcome
  chosen_spanish: que ha vencido
  alternatives_spanish:
  - que venció
  - que vence
  lexicon: BDAG
  rationale: El aoristo participial señala una victoria ya lograda; «que ha vencido» expresa bien ese carácter consumado en español, conservando el vínculo léxico con νικᾷ/νίκη.
- source_word: ἡ πίστις ἡμῶν
  english_pob_choice: our faith
  chosen_spanish: nuestra fe
  alternatives_spanish:
  - nuestra fidelidad
  - nuestra confianza
  lexicon: BDAG
  rationale: La lectura principal sigue el valor por defecto de πίστις como «fe». Se conserva en español la misma opción interpretativa principal del POB inglés, dejando abiertas las alternativas posibles.
theological_decisions:
- issue: Referencia de πᾶν τὸ γεγεννημένον
  english_pob_reading: 'personal and collective: ''everyone who has been born of God'''
  chosen_spanish_reading: 'colectiva y personal: ''todo el que ha nacido de Dios'''
  alternative_spanish_readings:
  - '''lo que ha nacido de Dios'''
  - '''todo lo nacido de Dios'''
  rationale: Aunque la gramática griega permite una traducción más literal y neutra, el contexto se refiere a creyentes concretos. La formulación elegida mantiene la referencia personal sin borrar la forma neutra del griego, tal como hizo la versión inglesa auditada.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Sentido de πίστις
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene «fe» como lectura principal porque es la opción doctrinal y contextual por defecto en el proyecto. No se elimina la tensión semántica de πίστις, pero aquí no parece necesario trasladarla al texto principal.
  doctrine_reference: 'Contested terms table: πίστις → faith'
translation_notes:
  revision_awareness: 'La revisión más reciente indica que no hubo cambios necesarios (pass unchanged). La presente redacción sigue el acuerdo alto del texto fuente griego y del POB inglés, conservando las dos decisiones auditadas: el valor colectivo de πᾶν τὸ γεγεννημένον y la lectura principal de πίστις como «fe».'
  spanish_consistency_notes:
  - 'Se mantiene el verbo de victoria con la misma raíz léxica: «vence / ha vencido / victoria».'
  - Se usa «de Dios» en lugar de una perífrasis más explicativa para respetar la concisión del griego.
  - La puntuación separa claramente el fundamento causal y la afirmación explicativa final, de acuerdo con la estructura del original.
  - Las notas a y b preservan las alternativas documentadas en el audit trail inglés, adaptadas al español.
