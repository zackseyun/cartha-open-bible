translation:
  language: es
  text: Sabemos que somos de Dios, y todo el mundo yace en el maligno[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El maligno» también puede entenderse por algunos como «el mal», pero en el uso joánico es más probable el sentido personal.
    reason: alternative_reading
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Conocemos
  - Estamos seguros
  lexicon: BDAG
  rationale: οἴδαμεν expresa conocimiento firme y asentado. En español, «sabemos» comunica con naturalidad esa certeza epistémica y conserva el tono de confianza propio de 1 Juan.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedemos de Dios
  - somos de Dios
  lexicon: BDAG
  rationale: La construcción ἐκ con θεοῦ indica origen/pertenencia. «De Dios» es la forma más directa y natural en español; en la cláusula elíptica se entiende «somos de Dios», que preserva el sentido sin añadir la especificación de nuevo nacimiento que el griego no expresa aquí de manera explícita.
- source_word: ὁ κόσμος ὅλος
  english_pob_choice: the whole world
  chosen_spanish: todo el mundo
  alternatives_spanish:
  - el mundo entero
  - el mundo en su totalidad
  lexicon: BDAG
  rationale: κόσμος en Juan suele abarcar el orden del mundo en oposición a Dios, y ὅλος intensifica la totalidad. «Todo el mundo» es idiomático en español y mantiene la amplitud del original.
- source_word: ἐν τῷ πονηρῷ
  english_pob_choice: the evil one
  chosen_spanish: en el maligno
  alternatives_spanish:
  - en el malo
  - en el mal
  lexicon: BDAG
  rationale: En uso joánico, ὁ πονηρός suele referirse personalmente al maligno, no al mal abstracto. «El maligno» preserva esa lectura personal en español y evita la ambigüedad de «mal»; también respeta mejor la fuerza substantivada del adjetivo griego.
- source_word: κεῖται
  english_pob_choice: lies
  chosen_spanish: yace
  alternatives_spanish:
  - está
  - permanece
  lexicon: BDAG
  rationale: κεῖται describe una condición de estar tendido o situado, y en contexto comunica un estado de sujeción. «Yace» conserva la imagen verbal de «lies» sin sonar tan coloquial como «está».
theological_decisions:
- issue: Si τῷ πονηρῷ debe entenderse de manera personal o abstracta
  english_pob_reading: 'personal: ''the evil one'''
  chosen_spanish_reading: 'personal: ''el maligno'''
  alternative_spanish_readings:
  - 'abstracto: ''el mal'''
  - '''el malo'''
  rationale: En la literatura juánica, πονηρός con artículo suele referirse al adversario personal. «El maligno» mantiene esa lectura y no diluye el pasaje en una abstracción impersonal.
  doctrine_reference: Juan 17:15; 1 Juan 2:13-14; 3:12; 5:18-19
- issue: Cómo reflejar ἐκ τοῦ θεοῦ sin introducir una interpretación excesiva
  english_pob_reading: from God
  chosen_spanish_reading: somos de Dios
  alternative_spanish_readings:
  - procedemos de Dios
  - nacimos de Dios
  rationale: La frase griega indica origen/pertenencia. Dado que el verbo «somos» está sobreentendido en español, «somos de Dios» es una traducción natural y fiel; evita convertir el texto en una afirmación explícita de nuevo nacimiento que no está formulada aquí.
  doctrine_reference: Juan 8:47; 1 Juan 4:6
translation_notes:
  revision_awareness: El texto sigue de cerca el último estado auditado en inglés, que retiró la expansión «in the power of» para reflejar más directamente ἐν τῷ πονηρῷ. En español se optó por «en el maligno», que mantiene la lectura personal y evita añadir una expansión no presente en el griego.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, conforme al criterio base del proyecto.
  - Se preserva la lectura personal de πονηρός como «el maligno», en continuidad con el audit trail en inglés.
  - «Sabemos» mantiene el registro de seguridad confesional de la epístola sin endurecer el matiz semántico.
  - «Todo el mundo» conserva la totalidad de ὅλος sin necesidad de amplificación adicional.
