translation:
  language: es
  text: 'Por esto sabemos que amamos a los hijos de Dios: cuando amamos a Dios y guardamos sus mandamientos[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obedecemos sus mandamientos». El verbo griego aquí es literalmente «hacemos» (ποιῶμεν), no el más usual «guardamos» (τηρέω).
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - En esto
  - Con esto
  lexicon: BDAG
  rationale: La expresión johánica introduce el criterio o indicio por el cual se reconoce algo. «Por esto» suena natural en español y conserva la fuerza demostrativa causal/inductiva mejor que «en esto» en este contexto.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - llegamos a saber
  lexicon: BDAG
  rationale: El presente expresa conocimiento reconocido en el argumento. «Sabemos» es claro, idiomático y mantiene el valor de conocimiento estable sin añadir matices no requeridos.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  lexicon: BDAG
  rationale: Introduce el contenido de lo conocido; en español se conserva de manera directa con «que».
- source_word: ἀγαπῶμεν
  english_pob_choice: we love
  chosen_spanish: amamos
  alternatives_spanish:
  - estamos amando
  lexicon: BDAG
  rationale: ἀγαπάω se traduce de forma consistente como «amar». El presente simple en español comunica bien la acción continua o habitual sin forzar una perífrasis.
- source_word: τὰ τέκνα τοῦ θεοῦ
  english_pob_choice: the children of God
  chosen_spanish: los hijos de Dios
  alternatives_spanish:
  - los niños de Dios
  - las criaturas de Dios
  lexicon: BDAG
  rationale: τέκνα puede ser «hijos» o «hijos/niños». En español bíblico, «hijos de Dios» es claro y natural; el masculino plural incluye el valor colectivo e inclusivo del griego neutro plural mejor que una versión literal menos idiomática.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: Con subjuntivos presentes, ὅταν puede ser temporal-condicional. «Cuando» comunica bien la relación sin sobreespecificarla como condición estricta o reiterativa.
- source_word: τὸν θεὸν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: En español el objeto directo personal requiere la a personal. Se mantiene la referencia definida a Dios sin alterar el sentido.
- source_word: τὰς ἐντολὰς αὐτοῦ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus preceptos
  lexicon: BDAG
  rationale: ἐντολή se corresponde naturalmente con «mandamiento» en contexto bíblico. «Sus mandamientos» conserva el sentido normativo y relacional del genitivo posesivo.
- source_word: ποιῶμεν
  english_pob_choice: keep his commandments / do his commandments
  chosen_spanish: hacemos
  alternatives_spanish:
  - guardamos
  - observamos
  - cumplimos
  lexicon: BDAG
  rationale: El verbo griego es literalmente «hacer» (ποιέω), no el más usual «guardar» (τηρέω). Se traduce con «hacemos» para preservar la tensión léxica registrada por el POB inglés, dejando visible que el texto habla de realizar/obedecer los mandamientos sin sustituir el verbo por uno distinto.
theological_decisions:
- issue: Relación lógica entre amar a los hijos de Dios, amar a Dios y hacer sus mandamientos
  english_pob_reading: The verse states that love for God's children is recognized by love for God and doing his commandments, without resolving broader theological debates about whether this is evidential, causal, or definitional.
  chosen_spanish_reading: 'El versículo presenta un criterio joánico de reconocimiento: el amor a los hijos de Dios se vincula con amar a Dios y hacer sus mandamientos, sin cerrar la relación lógica como si fuera solo evidencia, causa o definición.'
  alternative_spanish_readings:
  - amor evidencial
  - base causal del amor al prójimo
  - definición mutua del amor a Dios y a los creyentes
  rationale: La sintaxis griega es compacta y admite varias relaciones lógicas. La traducción conserva esa tensión en lugar de resolverla interpretativamente.
  doctrine_reference: Preservar la tensión teológica del texto sin decidir más allá de la evidencia.
translation_notes:
  revision_awareness: El audit trail inglés pasó de «do his commandments» a «keep his commandments» para mayor naturalidad, aunque el análisis léxico siguió señalando que el griego dice literalmente «hacer». La versión española conserva explícitamente ese dato con «hacemos», de modo que no se borre la tensión léxica documentada por el original y por el historial editorial.
  spanish_consistency_notes:
  - Se usó «Dios» sin artículo, conforme al uso normal del español cuando el referente es el Dios único.
  - Se prefirió «hijos de Dios» por claridad y fidelidad al plural inclusivo de τέκνα.
  - Se mantuvo la distinción entre amar y hacer/obedecer, evitando reemplazar ποιῶμεν por un verbo español que ya presuponga otra base verbal griega.
  - 'Se preservó la puntuación en dos miembros paralelos con dos acciones: amar a Dios y hacer sus mandamientos.'
