    issue: '''pecando con un pecado'' es una reproducción demasiado literal y poco idiomática de ἁμαρτάνοντα ἁμαρτίαν.'
    rationale: El griego usa participio más acusativo cognado para enfatizar un acto concreto de pecar; en español natural y fiel se expresa mejor como 'cometiendo un pecado'.
  - severity: high
