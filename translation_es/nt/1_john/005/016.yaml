translation:
  language: es
  text: Si alguien ve a su hermano[b] cometiendo un pecado que no lleva a muerte, pedirá, y Dios le dará vida[c] —a los que cometen pecados que no llevan a muerte. Hay pecado que lleva a muerte[a]; no digo que deba pedir acerca de eso.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay un pecado para muerte». El griego no especifica si esa «muerte» es física, espiritual o condenación final.'
    reason: alternative_reading
  - marker: b
    text: «Hermano» está en singular masculino en griego y probablemente se refiere a un creyente compañero; en el contexto puede abarcar más ampliamente a un hermano o hermana en la fe.
    reason: cultural_note
  - marker: c
    text: 'El griego dice simplemente: «y le dará vida»; la traducción hace explícito «Dios» porque el dador se entiende por el contexto de la oración.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - hermano o hermana
  - creyente
  lexicon: BDAG
  rationale: Conserva el singular masculino del griego y el uso joánico común para un miembro de la comunidad creyente. En español, 'hermano' es natural y fiel; puede abarcar al hermano en la fe sin neutralizar innecesariamente la forma del texto.
- source_word: ἁμαρτάνοντα ἁμαρτίαν
  english_pob_choice: committing a sin
  chosen_spanish: pecando con un pecado
  alternatives_spanish:
  - cometiendo un pecado
  - pecando
  lexicon: BDAG
  rationale: La combinación del participio con el acusativo cognado enfatiza la acción de pecar. 'Pecando con un pecado' refleja esa fuerza, aunque en español suena algo marcado; por eso se usa una formulación idiomática cercana al valor concreto del acto.
- source_word: μὴ πρὸς θάνατον
  english_pob_choice: not leading to death
  chosen_spanish: que no es para muerte
  alternatives_spanish:
  - que no lleva a muerte
  - que no resulta en muerte
  - no para muerte
  lexicon: BDAG
  rationale: La preposición πρὸς con acusativo expresa dirección/resultado hacia la muerte. 'No es para muerte' preserva la ambigüedad del griego sin precisar si la muerte es física, espiritual o final, y evita un giro demasiado forzado en español.
- source_word: αἰτήσει
  english_pob_choice: he shall ask
  chosen_spanish: pedirá
  alternatives_spanish:
  - deberá pedir
  - pedirá en oración
  lexicon: BDAG
  rationale: El futuro griego puede funcionar de modo exhortativo o predictivo. 'Pedirá' mantiene la forma verbal sin sobretraducir a un mandato explícito; en el contexto, el acto es de intercesión.
- source_word: δώσει αὐτῷ ζωήν
  english_pob_choice: God will give him life
  chosen_spanish: Dios le dará vida
  alternatives_spanish:
  - él le dará vida
  - Dios le concederá vida
  lexicon: BDAG
  rationale: El sujeto está implícito en el griego y el contexto de oración apunta a Dios como dador. En español, hacer explícito 'Dios' clarifica la referencia sin añadir contenido ajeno al pasaje. 'Vida' conserva el término amplio ζωή sin estrecharlo a 'vida espiritual'.
- source_word: τοῖς ἁμαρτάνουσιν μὴ πρὸς θάνατον
  english_pob_choice: to those committing sins not leading to death
  chosen_spanish: a los que pecan sin ser para muerte
  alternatives_spanish:
  - a los que cometen pecados que no llevan a muerte
  - para los que pecan sin llevar a muerte
  lexicon: BDAG
  rationale: El dativo plural y el participio plural sugieren el grupo de personas a quienes se les concede vida. 'A los que pecan sin ser para muerte' conserva el paralelismo con la primera cláusula y la tensión semántica de la expresión griega.
- source_word: ἔστιν ἁμαρτία πρὸς θάνατον
  english_pob_choice: There is sin leading to death
  chosen_spanish: Hay pecado para muerte
  alternatives_spanish:
  - Existe un pecado para muerte
  - Hay pecado que lleva a muerte
  lexicon: BDAG
  rationale: La construcción anartrosa puede leerse como categoría o tipo de pecado. 'Hay pecado para muerte' reproduce la tersedad del griego y mantiene abierta la cuestión de si se trata de una clase de pecado o de un acto específico.
- source_word: οὐ περὶ ἐκείνης λέγω ἵνα ἐρωτήσῃ
  english_pob_choice: I am not saying that he should ask about that
  chosen_spanish: no digo que deba pedir por ese
  alternatives_spanish:
  - no digo que pida por eso
  - no digo que deba orar por ello
  - no digo que solicite eso
  lexicon: BDAG
  rationale: ἐρωτάω puede implicar petición u oración según el contexto; como antes se tradujo αἰτέω con 'pedir', aquí se conserva la misma familia verbal en español. 'Por ese' refleja περὶ ἐκείνης de manera sencilla y mantiene la referencia al pecado para muerte.
theological_decisions:
- issue: Naturaleza de la 'muerte' en 'pecado para muerte'
  english_pob_reading: Retain the ambiguous 'death' without specifying physical, spiritual, or eternal death.
  chosen_spanish_reading: Mantener 'muerte' sin precisar si es física, espiritual o condenación final.
  alternative_spanish_readings:
  - muerte física
  - muerte espiritual
  - condenación eterna
  rationale: El pasaje no define el tipo de muerte y la tradición interpretativa es disputada. La traducción española conserva la ambigüedad para no resolver en el texto una tensión teológica que el original deja abierta.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Sujeto implícito de 'dará vida'
  english_pob_reading: Make God the explicit subject in English.
  chosen_spanish_reading: Hacer explícito 'Dios' como sujeto de 'dará vida'.
  alternative_spanish_readings:
  - él le dará vida
  - le dará vida
  rationale: Aunque el griego no nombra el sujeto, el contexto de la intercesión y la recepción de vida apunta a Dios. En español, explicitarlo mejora la claridad sin alterar la dependencia del contexto.
  doctrine_reference: 'Translation philosophy §1 and §6: source-text primacy with readable modern English.'
translation_notes:
  revision_awareness: Sin cambios respecto al último pase revisado; se mantiene la lectura ambigua de 'muerte' y la explicitación contextual de Dios como dador de vida.
  spanish_consistency_notes:
  - Se mantiene 'hermano' para ἀδελφός/ἀδελφόν, en línea con el valor comunitario del término.
  - Se usa 'pecar'/'pecado' para ἁμαρτάνω/ἁμαρτία, conservando el vínculo lexical del original.
  - '''Vida'' traduce ζωή sin adjetivarla, para no estrechar su alcance joánico.'
  - '''Muerte'' se conserva sin especificación interpretativa, preservando la tensión del texto.'
  - Se mantiene la distinción entre 'pedir' y 'orar' de forma contextual, sin imponer una equivalencia rígida.
