revisions:
- from: Si alguien ve a su hermano pecando con un pecado que no es para muerte[a], pedirá, y Dios le dará vida —a los que pecan sin ser para muerte. Hay pecado para muerte[c][b]; no digo que deba pedir por ese.
  to: Si alguien ve a su hermano[b] cometiendo un pecado que no lleva a muerte, pedirá, y Dios le dará vida[c] —a los que cometen pecados que no llevan a muerte. Hay pecado que lleva a muerte[a]; no digo que deba pedir acerca de eso.
  rationale: Se revisa para ajustar el español a un registro natural y fiel al sentido griego documentado por el POB. 'Cometiendo un pecado' comunica mejor el acusativo cognado; 'que no lleva a muerte' preserva la ambigüedad de θάνατος con mejor claridad; la frase dativa plural se hace inteligible en español; y se reubica la nota [a] donde realmente corresponde, en la cláusula 'Hay pecado que lleva a muerte'.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:17:51Z'
review_pass:
