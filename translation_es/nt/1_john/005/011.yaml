base_translation:
  language: en
  yaml_path: translation/nt/1_john/005/011.yaml
  text: 'And this is the testimony: that God has given us eternal life[c][b][a], and this life is in his Son.'
  footnotes:
  - marker: a
    text: Or "witness" for "testimony."
    reason: lexical_alternative
  - marker: b
    text: Or "gave us eternal life"; the Greek aorist can be rendered more formally this way, though "has given" brings out the present result.
    reason: lexical_alternative
  - marker: c
    text: '"In his Son" preserves the Greek wording; alternatively, some English renderings use "with his Son," but that weakens the Johannine idiom.'
    reason: lexical_alternative
