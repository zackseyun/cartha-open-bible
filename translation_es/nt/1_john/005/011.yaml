translation:
  language: es
  text: 'Y este es el testimonio[a]: que Dios nos ha dado vida eterna[b], y esta vida está en su Hijo[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «evidencia probatoria»; el griego μαρτυρία puede referirse al testimonio dado o a su contenido.
    reason: lexical_alternative
  - marker: b
    text: O «dio»; el aoristo griego puede reflejarse de forma más formal con un pasado simple, aunque «ha dado» destaca el resultado presente.
    reason: lexical_alternative
  - marker: c
    text: «En su Hijo» conserva el giro griego; alternativamente, algunas versiones usan «con su Hijo», pero eso debilita la fuerza idiomática joánica.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: evidencia
  alternatives_spanish:
  - testimonio
  - testimonio / evidencia
  lexicon: BDAG
  rationale: En español, "testimonio" es la correspondencia más directa, pero aquí la construcción introducida por el verso tiene un matiz forense y de contenido probado. "Evidencia" comunica mejor ese peso probatorio sin borrar el sentido de testimonio, por eso se deja nota alternativa.
- source_word: ἔδωκεν
  english_pob_choice: has given
  chosen_spanish: ha dado
  alternatives_spanish:
  - dio
  lexicon: BDAG
  rationale: El perfecto compuesto español expresa bien el resultado presente de una acción ya cumplida, igual que la elección inglesa "has given". "Dio" sería más cercano al aoristo formal, pero menos natural en este contexto declarativo.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perpetua
  lexicon: BDAG
  rationale: '"Vida eterna" es la equivalencia natural y teológicamente estable en español para Juan. Mantiene tanto la duración como la cualidad de la vida dada por Dios.'
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Se traduce de manera directa sin artículo en español, como sujeto explícito de la acción.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de objeto indirecto se naturaliza como pronombre enclítico/en posición proclítica en español. "Nos" conserva el destinatario comunitario sin sobreexplicar.
- source_word: ἐν τῷ υἱῷ αὐτοῦ
  english_pob_choice: in his Son
  chosen_spanish: en su Hijo
  alternatives_spanish:
  - con su Hijo
  - por medio de su Hijo
  lexicon: BDAG
  rationale: Se conserva la preposición "en" para mantener la formulación joánica compacta y su posible sentido locativo/relacional. "Con" o "por medio de" interpretan más de lo que el texto dice.
- source_word: υἱῷ
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo de Dios
  lexicon: BDAG
  rationale: Se mantiene el título cristológico y la mayúscula por tratarse de una referencia singular a Jesús en relación con el Padre.
- source_word: αὕτη ... αὕτη ἡ ζωή
  english_pob_choice: this ... this life
  chosen_spanish: esta ... esta vida
  alternatives_spanish:
  - tal ... esta vida
  lexicon: BDAG
  rationale: La repetición del demostrativo se conserva para reflejar la cohesión enfática del griego entre la evidencia y la vida mencionada. No se reemplaza por un sinónimo que debilite esa repetición.
theological_decisions:
- issue: Valor de ἔδωκεν respecto a posesión presente de la vida eterna
  english_pob_reading: '"has given" destaca el resultado presente de la acción divina terminada'
  chosen_spanish_reading: '"ha dado" mantiene la acción cumplida con resultado vigente'
  alternative_spanish_readings:
  - '"dio"'
  rationale: El español puede reflejar el aoristo con un perfecto compuesto que subraya la posesión actual sin perder la acción realizada. Así se preserva la tensión entre hecho pasado y efecto presente.
  doctrine_reference: Translation philosophy §6; preservar la tensión teológica sin resolverla
- issue: Sentido de la vida eterna "en su Hijo"
  english_pob_reading: Se mantiene la expresión compacta "in his Son" sin expandirla
  chosen_spanish_reading: '"en su Hijo" conserva la idiomática joánica y no la reemplaza por "con"'
  alternative_spanish_readings:
  - '"con su Hijo"'
  - '"por medio de su Hijo"'
  rationale: La frase señala relación, esfera o ubicación de la vida en conexión con el Hijo. En español, "en su Hijo" es la forma más fiel y menos explicativa; otras opciones suavizan demasiado la densidad del texto.
  doctrine_reference: Translation philosophy §3
- issue: Elección entre "testimonio" y un término forense más interpretativo
  english_pob_reading: '"testimony" con nota alternativa "witness"'
  chosen_spanish_reading: '"evidencia" con nota alternativa "testimonio"'
  alternative_spanish_readings:
  - '"testimonio"'
  - '"testimonio" / "evidencia"'
  rationale: Aunque "testimonio" es la opción más literal, en español puede sonar más a acto oral que al contenido evidencial del contexto. "Evidencia" hace audible el carácter probatorio del versículo, pero se mantiene nota para no borrar la alternativa más directa.
  doctrine_reference: Translation philosophy §2; preservar el matiz jurídico-evidencial
translation_notes:
  revision_awareness: 'Revisión reciente: sin cambios sustanciales; la redacción propuesta se mantiene alineada con el control de alta concordancia y no requiere ajuste adicional.'
  spanish_consistency_notes:
  - Se usa "Dios" y "Hijo" con mayúscula conforme al uso cristológico y teológico del pasaje.
  - Se conserva "en" para ἐν para no diluir la construcción joánica.
  - La repetición de "esta" mantiene la relación enfática entre "la evidencia" y "esta vida".
  - La voz verbal "ha dado" equilibra fidelidad al aoristo y naturalidad del español.
