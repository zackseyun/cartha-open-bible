  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido griego y sigue correctamente la decisión auditada de unir τοῖς πιστεύουσιν con ὑμῖν: Juan escribe a los creyentes para que sepan que tienen vida eterna. También conserva bien «vida eterna», «creen en el nombre» y «Hijo de Dios». La nota alternativa preserva adecuadamente el orden griego más cercano.'
  spanish_quality_summary: El español es claro y natural, pero «Les he escrito estas cosas a ustedes...» duplica innecesariamente el complemento indirecto («les» + «a ustedes») en una construcción algo pesada. Una formulación más limpia y plenamente natural es «Les he escrito estas cosas a ustedes, los que creen...» o, mejor aún, «Les he escrito estas cosas a ustedes que creen...», pero conviene resolver la pesadez suprimiendo uno de los dos elementos. También es preferible alinear la nota con el texto principal revisado.
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Dios», «Hijo», «vida eterna» y «creen en» están bien. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La decisión de mantener «el nombre» preserva correctamente el modismo bíblico.
  issues:
  - severity: medium
    issue: 'Construcción algo pesada por duplicación de destinatario: «Les he escrito... a ustedes...»'
    rationale: Aunque no es incorrecta, la combinación de clítico dativo «les» con el sintagma explícito «a ustedes» suena redundante aquí y reduce la fluidez en español bíblico natural. Dado que además sigue «que creen...», la frase gana claridad si se simplifica a «Les he escrito estas cosas, a ustedes que creen...» o «Les he escrito estas cosas a quienes creen...».
  - severity: low
    issue: La nota debería reflejar la formulación revisada del texto base
    rationale: Si se ajusta la redacción principal por fluidez, conviene mantener la nota consistente con esa decisión, sin alterar su función de mostrar un orden más cercano al griego.
