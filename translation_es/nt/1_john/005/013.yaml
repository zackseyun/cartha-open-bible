translation:
  language: es
  text: Les he escrito estas cosas, a ustedes que creen en el nombre del Hijo de Dios[a], para que sepan que tienen vida eterna.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, menos fluido pero más cercano al orden griego: «Les he escrito estas cosas, para que sepan que tienen vida eterna, a ustedes que creen en el nombre del Hijo de Dios».

      '
    reason: alternative_reading
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas palabras
  lexicon: BDAG
  rationale: El demostrativo neutro plural apunta al contenido escrito; «estas cosas» conserva el plural y el alcance discursivo sin volverlo genérico en exceso.
- source_word: ἔγραψα
  english_pob_choice: I have written
  chosen_spanish: les he escrito
  alternatives_spanish:
  - les escribí
  lexicon: BDAG
  rationale: 'El aoristo epistolar se expresa de modo natural en español con pretérito perfecto para una carta: acción ya completada con vigencia presente.'
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - a vosotros
  - a ustedes
  lexicon: BDAG
  rationale: El dativo de destinatario se traduce como complemento indirecto natural en español; «a ustedes» es la opción neutra y ampliamente comprensible.
- source_word: ἵνα εἰδῆτε
  english_pob_choice: so that you may know
  chosen_spanish: para que sepan
  alternatives_spanish:
  - para que conozcan
  - a fin de que sepan
  lexicon: BDAG
  rationale: ἵνα expresa propósito. «Para que sepan» conserva la finalidad y el valor de certeza de εἰδῆτε sin forzar un subjuntivo demasiado técnico; el plural sigue el destinatario de «ustedes».
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida para siempre
  - vida eterna
  lexicon: BDAG
  rationale: 'La expresión joánica fija se traduce de forma directa y reconocible: «vida eterna», preservando su sentido teológico de vida de calidad y duración ligada a Dios.'
- source_word: ἔχετε
  english_pob_choice: you have
  chosen_spanish: tienen
  alternatives_spanish:
  - poseen
  - tienen
  lexicon: BDAG
  rationale: El presente indicativo comunica posesión actual; en 1 Juan el énfasis está en la seguridad presente, no solo futura.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: to you who believe
  chosen_spanish: ustedes que creen
  alternatives_spanish:
  - los que creen
  - a los que creen
  lexicon: BDAG
  rationale: Se mantiene la apposición con el destinatario, como en la lectura inglesa auditada. En español, el relativo explícito «que creen» conserva la identificación de los receptores sin oscurecer el sentido.
- source_word: πιστεύουσιν εἰς
  english_pob_choice: believe in
  chosen_spanish: creen en
  alternatives_spanish:
  - confían en
  - creen en
  lexicon: BDAG
  rationale: Para πιστεύω con εἰς en Juan, «creer en» es la equivalencia natural y fiel en español; conserva el valor relacional del verbo con la preposición.
- source_word: τὸ ὄνομα
  english_pob_choice: the name
  chosen_spanish: el nombre
  alternatives_spanish:
  - el nombre
  - la autoridad
  lexicon: BDAG
  rationale: Se conserva el idiomático bíblico «el nombre», que remite a la persona y autoridad reveladas, sin parafrasearlo.
- source_word: τοῦ υἱοῦ τοῦ θεοῦ
  english_pob_choice: the Son of God
  chosen_spanish: del Hijo de Dios
  alternatives_spanish:
  - del Hijo de Dios
  lexicon: BDAG
  rationale: Título cristológico directo y tradicionalmente fiel al griego; «del Hijo de Dios» mantiene la construcción genitiva sin añadir matices no presentes.
theological_decisions:
- issue: Relación sintáctica de τοῖς πιστεύουσιν
  english_pob_reading: 'Attached to ὑμῖν: ''to you who believe in the name of the Son of God'''
  chosen_spanish_reading: «a ustedes que creen en el nombre del Hijo de Dios»
  alternative_spanish_readings:
  - «para que sepan que tienen vida eterna, ustedes que creen en el nombre del Hijo de Dios»
  rationale: La traducción sigue la lectura de apposición al destinatario, que es la opción más natural en español y coherente con el propósito epistolar. La alternativa conserva la posibilidad de reubicar la frase con el cierre de la cláusula de seguridad, pero no se adopta en el texto principal.
  doctrine_reference: Preservar la ambigüedad sintáctica genuina sin resolverla artificialmente; la certeza de la vida eterna se dirige a creyentes.
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca en el texto español exactamente donde corresponde. No se añadieron notas sin anclaje textual.
  spanish_consistency_notes:
  - Se mantiene «vida eterna» como equivalente fijo de ζωὴ αἰώνιον.
  - Se conserva «creer en» para πιστεύω con εἰς, en vez de «confiar en», para respetar el idiomatismo joánico.
  - Se usa «Hijo de Dios» de forma directa y consistente con el título cristológico del original.
  - La puntuación española sitúa la coma antes de la cláusula final de propósito, con estilo publicable y claro.
