translation:
  language: es
  text: Toda maldad[a] es pecado, y hay pecado que no conduce a la muerte[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda injusticia' o 'todo lo injusto'.
    reason: lexical_alternative
  - marker: b
    text: O 'no resulta en muerte' o, más literalmente, 'no es para muerte'.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶσα
  english_pob_choice: All
  chosen_spanish: Toda
  alternatives_spanish:
  - Todo
  - Toda clase de
  lexicon: BDAG
  rationale: Con ἀδικία en singular, πᾶσα tiene fuerza comprehensiva. En español, 'toda' comunica de manera natural 'all' o 'every kind of' sin perder el alcance universal.
- source_word: ἀδικία
  english_pob_choice: unrighteousness
  chosen_spanish: injusticia
  alternatives_spanish:
  - injusticia
  - maldad
  - lo indebido
  lexicon: BDAG
  rationale: ἀδικία puede significar injusticia, maldad o injusticia moral. 'Injusticia' preserva el campo semántico básico y es un equivalente español natural; 'maldad' es más libre y 'lo indebido' demasiado vago. Mantengo la tensión lexical sin reducirla solo a una categoría social.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - pecado moral
  lexicon: BDAG
  rationale: '''Pecado'' es el equivalente español estándar para ἁμαρτία en este contexto joánico. Conserva la carga teológica sin añadir matices que el griego no explicita.'
- source_word: οὐ πρὸς θάνατον
  english_pob_choice: not leading to death
  chosen_spanish: no conduce a la muerte
  alternatives_spanish:
  - no resulta en muerte
  - no es para muerte
  - no es unto death
  lexicon: BDAG
  rationale: '''Conduce a'' conserva la idea direccional de πρὸς y sugiere resultado sin resolver la clase de muerte en cuestión. ''No es para muerte'' sería más literal pero menos natural en español; ''no resulta en muerte'' es posible, pero algo más interpretativo.'
- source_word: θάνατον
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  - muerte física
  - muerte espiritual
  lexicon: BDAG
  rationale: Se mantiene simplemente 'la muerte' porque el texto griego no especifica qué tipo de muerte es. Así se preserva la ambigüedad doctrinal y exegética documentada en el audit trail inglés.
theological_decisions:
- issue: Sentido de ἀδικία en relación con la justicia bíblica
  english_pob_reading: Use 'unrighteousness' in the main text
  chosen_spanish_reading: Usar 'injusticia' en el texto principal
  alternative_spanish_readings:
  - injusticia
  - maldad
  - injusticia moral
  rationale: El griego apunta a una afirmación general sobre todo lo contrario a la justicia. 'Injusticia' preserva esa amplitud y mantiene el vínculo conceptual con justicia/rectitud sin forzar una lectura solo interpersonal.
  doctrine_reference: 'Translation philosophy §1 y §5: primacía del original y consistencia terminológica.'
- issue: Naturaleza de la muerte en la expresión 'no conduce a la muerte'
  english_pob_reading: Render simply as 'death' without interpretive qualifier
  chosen_spanish_reading: Renderizar simplemente 'la muerte' sin calificador interpretativo
  alternative_spanish_readings:
  - muerte física
  - muerte espiritual
  - condenación escatológica
  rationale: El texto griego solo dice θάνατον. Dado que la tradición interpretativa difiere, la traducción debe conservar la ambigüedad en vez de especificar una clase de muerte que el versículo no nombra.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: La revisión reciente quedó sin cambios y con alto grado de acuerdo; la redacción española mantiene esa lectura estable y conserva la ambigüedad de θάνατον sin imponer una especificación doctrinal.
  spanish_consistency_notes:
  - Se mantiene 'pecado' para ἁμαρτία en ambas apariciones.
  - Se usa 'muerte' sin adjetivos para preservar la apertura interpretativa del original.
  - '''Injusticia'' se eligió como equivalente natural de ἀδικία, evitando el tono más abstracto de ''injusticia moral'' en el texto principal.'
