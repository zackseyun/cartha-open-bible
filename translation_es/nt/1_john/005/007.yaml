lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto ὅτι introduce la explicación de la afirmación anterior. «Porque» comunica bien la fuerza explicativa en español y mantiene una conexión natural con el enunciado previo.
- source_word: τρεῖς
  english_pob_choice: three
  chosen_spanish: tres
  alternatives_spanish:
  - '3'
  lexicon: BDAG
  rationale: Numeral cardinal directo; no hay razón contextual para variar su sentido básico.
- source_word: εἰσιν
  english_pob_choice: are
  chosen_spanish: hay
  alternatives_spanish:
  - son
  - están
  lexicon: BDAG
  rationale: Aunque el griego usa el verbo «ser/estar», en español la construcción existencial resulta más natural con «hay» y preserva el sentido de existencia de tres testigos.
- source_word: οἱ μαρτυροῦντες
  english_pob_choice: who testify
  chosen_spanish: que dan testimonio
  alternatives_spanish:
  - los que dan testimonio
  - los testigos
  lexicon: BDAG
  rationale: El participio articular funciona sustantivamente. «Que dan testimonio» conserva el valor verbal y la acción en curso mejor que un sustantivo como «testigos», que desplaza el énfasis de la acción al oficio.
theological_decisions:
- issue: Forma textual corta de 1 Juan 5:7 frente al Comma Johanneum
  english_pob_reading: 'Translate the SBLGNT text only: ''For there are three who testify,'''
  chosen_spanish_reading: 'Traducir solo el texto griego corto: «Porque hay tres que dan testimonio,»'
  alternative_spanish_readings:
  - «Porque hay tres que testifican,»
  - 'La expansión tradicional: «en el cielo: el Padre, el Verbo y el Espíritu Santo...»'
  rationale: La base griega suministrada corresponde al texto crítico breve. Para respetar la primacía de la fuente y la transparencia textual, la traducción principal sigue ese texto sin incorporar la expansión posterior; la nota preserva el interés histórico de la variante mayor.
  doctrine_reference: Translation philosophy §1 (primacía del original), §3 (preservar tensiones textuales y teológicas)
translation_notes:
  revision_awareness: Ajusté la puntuación para que el texto español refleje una frase continua sin dos puntos, coherente con el griego suministrado y con la revisión del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero no aplica aquí porque el versículo no contiene el nombre divino.
  - Se eligió «dan testimonio» para preservar el matiz verbal de μαρτυροῦντες sin convertirlo en un sustantivo estático.
  - La nota textual queda anclada en [a] y corresponde exactamente al único marcador presente en el texto.
