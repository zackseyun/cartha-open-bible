translation:
  language: es
  text: Este es el que vino por agua y sangre—Jesús el Mesías[a]; no por el agua solamente, sino por el agua y por la sangre. Y el Espíritu es el que da testimonio[c][b], porque el Espíritu es la verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a través de agua y sangre». La expresión misma es debatida; intérpretes diversos la entienden como referencia al bautismo y la muerte de Jesús, a su nacimiento y muerte, o como imaginería sacramental. La traducción conserva la expresión griega sin escoger entre esas opciones.
    reason: alternative_reading
  - marker: b
    text: Griego «Jesús Cristo»; se vierte aquí como «Jesús el Mesías» porque Χριστός funciona como título.
    reason: lexical_alternative
  - marker: c
    text: O «que el Espíritu es la verdad». La conjunción puede introducir contenido o causa; «porque» encaja mejor con el flujo del pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὗτός
  english_pob_choice: This is the one
  chosen_spanish: Este es el que
  alternatives_spanish:
  - Este es uno
  - Éste es el
  lexicon: BDAG
  rationale: El demostrativo introduce una identificación enfática. «Este es el que» suena natural en español y conserva la fuerza identificadora sin añadir información.
- source_word: ὁ ἐλθὼν
  english_pob_choice: who came
  chosen_spanish: vino
  alternatives_spanish:
  - que vino
  - el que ha venido
  lexicon: BDAG
  rationale: El participio aoristo sustantivado se vierte con un verbo simple y natural en español. «Vino» preserva la referencia histórica y evita una paráfrasis más pesada.
- source_word: δι’ ὕδατος καὶ αἵματος
  english_pob_choice: by water and blood
  chosen_spanish: por agua y sangre
  alternatives_spanish:
  - a través de agua y sangre
  - mediante agua y sangre
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o circunstancia acompañante. «Por» reproduce esa relación de manera breve y fluida. Se mantiene la expresión abierta sin precisar en el texto principal una interpretación de «agua y sangre».
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus the Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no como simple forma nominalizada. Se conserva «Mesías» conforme al criterio del proyecto, y se mantiene la aposición al nombre propio de Jesús.
- source_word: οὐκ ἐν τῷ ὕδατι μόνον ἀλλ’ ἐν τῷ ὕδατι καὶ ⸀ἐν τῷ αἵματι
  english_pob_choice: not by the water only, but by the water and by the blood
  chosen_spanish: no por el agua solamente, sino por el agua y por la sangre
  alternatives_spanish:
  - no en el agua solamente, sino en el agua y en la sangre
  - no con el agua solamente, sino con el agua y con la sangre
  lexicon: BDAG
  rationale: Se conserva la repetición de la preposición para reflejar el énfasis del griego. «Por» mantiene la correspondencia con el valor instrumental/acompañante ya usado antes en la frase.
- source_word: τὸ πνεῦμά
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En este contexto joánico, el referente es el Espíritu Santo como testigo divino. La mayúscula ayuda a señalar el referente sin ampliar el contenido más allá del contexto.
- source_word: τὸ μαρτυροῦν
  english_pob_choice: the one testifying
  chosen_spanish: el que da testimonio
  alternatives_spanish:
  - el que testifica
  - el testigo
  lexicon: BDAG
  rationale: El participio presente conserva la acción en curso. «Da testimonio» es una formulación clara y bíblica en español, y mantiene la fuerza verbal mejor que una nominalización.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Aquí ὅτι expresa la razón de la afirmación anterior. «Porque» reproduce la relación causal que el contexto favorece.
- source_word: ἡ ἀλήθεια
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - verdad
  lexicon: BDAG
  rationale: 'Se conserva el artículo porque el predicado tiene valor identificador: el Espíritu es la verdad. «La verdad» suena natural y respeta la forma del griego.'
theological_decisions:
- issue: Sentido de «agua y sangre»
  english_pob_reading: Left untranslated as 'water and blood' without interpretive specification
  chosen_spanish_reading: Se deja como «agua y sangre» sin precisar su referencia en el texto principal
  alternative_spanish_readings:
  - bautismo y muerte de Jesús
  - nacimiento y muerte de Jesús
  - imaginería sacramental
  rationale: El pasaje es debatido y el griego nombra los elementos sin explicarlos. La traducción preserva esa tensión interpretativa en vez de resolverla de antemano.
  doctrine_reference: 'Translation philosophy: preservar la tensión teológica en vez de resolverla'
- issue: Referente de «el Espíritu»
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: El Espíritu Santo
  alternative_spanish_readings:
  - un espíritu genérico
  - el espíritu humano
  rationale: El contexto inmediato de testimonio divino en 1 Juan y el uso joánico apoyan fuertemente al Espíritu Santo como testigo. La mayúscula en español señala ese referente sin añadir explicación doctrinal ajena al texto.
  doctrine_reference: Afirmaciones y uso joánico del Espíritu
- issue: Valor de Χριστός
  english_pob_reading: Messiah where title force is present
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Aquí Χριστός funciona con fuerza titulativa en aposición a Jesús. Se conserva «Mesías» por fidelidad al criterio terminológico del proyecto y para evitar que el término quede absorbido como nombre propio.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando funciona como título'
translation_notes:
  revision_awareness: 'Se tomó en cuenta el historial de revisión: la oscilación entre «Cristo» y «Mesías» fue resuelta restaurando «Mesías» conforme a la política terminológica del proyecto. También se consideró que la relación causal de ὅτι se defendió en el audit trail inglés, por lo que se optó por «porque» en español.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός cuando funciona como título, en consonancia con la política del proyecto.
  - Se conserva «agua y sangre» sin interpretación explícita para respetar la ambigüedad controlada del original.
  - «Espíritu» se capitaliza por el referente al Espíritu Santo en el contexto joánico.
  - Se mantiene la repetición de «por» para reflejar la estructura enfática del griego.
  - Los marcadores de nota a, b y c aparecen exactamente en el texto principal donde corresponden.
