translation:
  language: es
  text: Hijitos[a], guárdense de los ídolos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Niños» o «Amados hijos». El término griego es un diminutivo afectivo usado por Juan en un trato directo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τεκνία
  english_pob_choice: Little children
  chosen_spanish: Hijitos
  alternatives_spanish:
  - Niños
  - Amados hijos
  - Hijitos queridos
  lexicon: BDAG
  rationale: El diminutivo vocativo afectivo de τεκνίον se conserva mejor en español con «Hijitos», que mantiene la cercanía pastoral y el tono de exhortación amorosa. «Niños» pierde el matiz afectivo; «amados hijos» agrega más de lo que dice el griego.
- source_word: φυλάξατε
  english_pob_choice: guard
  chosen_spanish: guárdense
  alternatives_spanish:
  - guarden
  - protéjanse
  - manténganse alejados
  lexicon: BDAG
  rationale: El imperativo aoristo exhorta a una vigilancia decidida. «Guárdense» refleja bien la advertencia reflexiva dirigida al grupo y conserva la fuerza preventiva mejor que una forma más general como «manténganse alejados».
- source_word: ἑαυτὰ
  english_pob_choice: yourselves
  chosen_spanish: se
  alternatives_spanish:
  - a ustedes mismos
  - ustedes mismos
  lexicon: BDAG
  rationale: 'El pronombre reflexivo se integra naturalmente en español con la forma pronominal del verbo: «guárdense». Así se preserva la fuerza reflexiva sin sobrecargar la frase.'
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - alejados de
  - lejos de
  lexicon: BDAG
  rationale: La preposición de separación se expresa de modo natural en español con «de» después de «guardarse». El contexto ya comunica la idea de apartarse, sin necesidad de añadir una expansión.
- source_word: εἰδώλων
  english_pob_choice: idols
  chosen_spanish: los ídolos
  alternatives_spanish:
  - las imágenes
  - los falsos dioses
  lexicon: BDAG
  rationale: «Ídolos» es la equivalencia directa y más clara para εἴδωλον. «Imágenes» debilita el sentido cultual; «falsos dioses» interpreta más allá del término concreto del texto.
theological_decisions:
- issue: Alcance de la advertencia contra los ídolos
  english_pob_reading: Translate concretely as 'idols' without expanding to a broader paraphrase such as 'anything that takes God's place.'
  chosen_spanish_reading: Traducir de forma concreta como «ídolos», sin ampliar a una paráfrasis más general.
  alternative_spanish_readings:
  - cualquier cosa que ocupe el lugar de Dios
  - toda forma de falsa adoración
  rationale: El griego nombra ídolos de manera directa. La traducción debe preservar ese referente concreto y no resolverlo mediante una ampliación interpretativa que exceda el texto. La forma breve también mantiene la fuerza de la amonestación final de la carta.
  doctrine_reference: 'Principio POB: no paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto griego y la auditoría inglesa están en alto acuerdo; no se documentan revisiones sustantivas aplicadas en la versión inglesa reciente. Esta propuesta sigue de cerca esa decisión estable y conserva el diminutivo afectivo de Τεκνία y el término concreto εἰδώλων.
  spanish_consistency_notes:
  - Se mantiene «ídolos» para εἰδώλων, conforme al valor léxico directo y sin ampliación interpretativa.
  - Se usa un imperativo reflexivo natural en español («guárdense») para preservar ἑαυτὰ.
  - La nota [a] ofrece alternativas afectivas sin introducir una paráfrasis doctrinalmente expansiva.
