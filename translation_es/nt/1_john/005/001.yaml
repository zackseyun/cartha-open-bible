review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: universal genérico en ambas mitades, título confesional ‘el Mesías’, perfecto de nuevo nacimiento en ‘ha nacido de Dios’, y el paralelismo entre el que engendra y el engendrado. Sin embargo, en la segunda mitad ‘al que engendró’ queda semánticamente incompleto en español porque el griego τὸν γεννήσαντα es ‘al que ha engendrado/begotten’ entendido como begetter, no un verbo transitivo sin objeto expreso. Además, ‘de él’ en ‘ha sido engendrado de él’ suena menos natural en español bíblico que ‘por él’ o una reestructuración más idiomática.'
  spanish_quality_summary: 'El texto es mayormente claro y digno, pero ‘al que engendró’ resulta duro y ambiguo para lectores hispanos: puede sugerir ‘al que él engendró’ en vez de ‘al que engendró’. Una reparación mínima mejora la legibilidad y preserva la relación léxica. La nota b también debe ajustarse para no repetir una frase española poco natural.'
  glossary_alignment: '‘Jesús’, ‘Mesías’ y ‘Dios’ están alineados con las pautas del proyecto. El manejo de γεννάω también sigue la racionalidad auditada: ‘ha nacido de Dios’ en la primera mitad y un término de la familia ‘engendrar’ en la segunda. La excepción propuesta no altera la teología ni la terminología base, sino que mejora la gramática española.'
  issues:
  - severity: medium
    issue: ‘al que engendró’ es ambiguo e incompleto en español
    rationale: Aunque intenta reflejar el participio aoristo activo γεννήσαντα, en español esa forma verbal exige normalmente un objeto o una reformulación nominal. Tal como está, puede leerse como ‘al que él engendró’, no como ‘al que engendra/engendró’ en sentido de begetter.
  - severity: low
    issue: ‘ha sido engendrado de él’ suena forzado
    rationale: Es comprensible y cercano al griego, pero menos idiomático que una formulación con ‘por él’ o una nominalización que mantenga el paralelo sin calco excesivo.
  - severity: low
    issue: La nota b reproduce una alternativa española poco natural
    rationale: Si se corrige el texto principal, la nota léxica también debe reflejar una formulación española más clara mientras sigue explicando que el griego usa el mismo verbo en todo el versículo.
  revised_spanish_text: Todo el que cree que Jesús es el Mesías ha nacido de Dios[a][b], y todo el que ama al engendrador también ama al que ha sido engendrado por él.
