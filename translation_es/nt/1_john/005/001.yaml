translation:
  language: es
  text: Todo el que cree que Jesús es el Mesías ha nacido de Dios[a][b], y todo el que ama al engendrador también ama al que ha sido engendrado por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ‘el Cristo’. Se traduce Χριστός como ‘Mesías’ aquí para preservar su sentido como título.'
    reason: alternative_reading
  - marker: b
    text: 'O: ‘el engendrador ... el que ha sido engendrado por él’. El griego usa formas del mismo verbo a lo largo de este versículo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ πιστεύων
  english_pob_choice: Everyone who believes
  chosen_spanish: Todo el que cree
  alternatives_spanish:
  - Toda persona que cree
  - Quien cree
  lexicon: BDAG
  rationale: El participio sustantivado con sentido genérico se vierte de manera natural en español con ‘todo el que’, que conserva el valor universal sin sonar forzado. ‘Cree’ mantiene el aspecto verbal presente y el matiz continuo/genericizante.
- source_word: ὅτι Ἰησοῦς ἐστιν ὁ χριστός
  english_pob_choice: that Jesus is the Messiah
  chosen_spanish: que Jesús es el Mesías
  alternatives_spanish:
  - que Jesús es el Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título confesional, no como nombre propio. ‘Mesías’ preserva el sentido titulado y hebraico mejor que ‘Cristo’ en español.
- source_word: ἐκ τοῦ θεοῦ γεγέννηται
  english_pob_choice: has been born of God
  chosen_spanish: ha nacido de Dios
  alternatives_spanish:
  - ha sido engendrado por Dios
  - es nacido de Dios
  lexicon: BDAG
  rationale: El perfecto pasivo expresa una acción completada con resultado vigente. ‘Ha nacido de Dios’ es idiomático en español y conserva la imagen joánica de nuevo nacimiento; ‘engendrado’ es posible, pero en español suena más técnico y menos natural en la primera mitad del verso.
- source_word: πᾶς ὁ ἀγαπῶν
  english_pob_choice: everyone who loves
  chosen_spanish: todo el que ama
  alternatives_spanish:
  - toda persona que ama
  - quien ama
  lexicon: BDAG
  rationale: La construcción participial genérica se reproduce con una relativa natural en español. ‘Todo el que’ mantiene la universalidad y el paralelismo con la cláusula anterior.
- source_word: τὸν γεννήσαντα
  english_pob_choice: the one begot him
  chosen_spanish: al que engendró
  alternatives_spanish:
  - al que engendró a él
  - al que fue padre de él
  lexicon: BDAG
  rationale: Se conserva el verbo de generación para reflejar el paralelo verbal del versículo. ‘Engendró’ mantiene la relación activa del participio aoristo; no se introduce ‘Padre’ porque el griego no usa ese sustantivo aquí.
- source_word: ἀγαπᾷ
  english_pob_choice: also loves
  chosen_spanish: también ama
  alternatives_spanish:
  - ama también
  lexicon: BDAG
  rationale: ‘También ama’ reproduce el valor aditivo de καί de manera natural en español y enlaza el amor a Dios con el amor al engendrado por él.
- source_word: τὸν γεγεννημένον ἐξ αὐτοῦ
  english_pob_choice: the one begotten of him
  chosen_spanish: al que ha sido engendrado de él
  alternatives_spanish:
  - al engendrado de él
  - a su engendrado
  lexicon: BDAG
  rationale: La forma perfecta pasiva conserva el vínculo verbal con la primera cláusula. ‘Ha sido engendrado de él’ mantiene la relación de origen expresada por ἐξ αὐτοῦ sin suavizar demasiado el paralelismo léxico.
theological_decisions:
- issue: Lenguaje de engendrar/nacer aplicado a Dios y a los creyentes
  english_pob_reading: Use 'born of God' / 'the one begotten of him' in the main text, while rendering τὸν γεννήσαντα as 'the one who begot him' to preserve the begetter/begotten contrast.
  chosen_spanish_reading: Usar ‘ha nacido de Dios’ / ‘al que ha sido engendrado de él’ en el texto principal, manteniendo ‘al que engendró’ para preservar el contraste entre el que engendra y el engendrado.
  alternative_spanish_readings:
  - usar ‘engendrado’ en ambas mitades
  - usar ‘hijo’ para suavizar la segunda mitad
  rationale: El verso depende de la relación analógica entre Dios como fuente de vida y la persona nacida de él. La doble referencia verbal ayuda a que el lector perciba la conexión léxica sin introducir una interpretación doctrinal ajena al texto. ‘Engendrado’ en la segunda mitad retiene mejor el paralelismo con el griego; en la primera mitad, ‘nacido’ es más idiomático en español.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Título mesiánico de Jesús
  english_pob_reading: Translate ὁ χριστός as 'the Messiah'
  chosen_spanish_reading: Traducir ὁ χριστός como ‘el Mesías’
  alternative_spanish_readings:
  - ‘el Cristo’
  rationale: 'El contexto es confesional y titular: la fe se expresa en reconocer a Jesús como el ungido prometido. ‘Mesías’ comunica ese contenido mejor que la transliteración litúrgica ‘Cristo’.'
  doctrine_reference: 'Contested terms table: Χριστός'
translation_notes:
  revision_awareness: La redacción sigue el último pasaje revisado del contexto inglés, que buscó acercarse más a la reiteración verbal de γεννάω y evitar añadir un objeto explícito donde el griego no lo expresa. En español, se mantiene ese paralelismo mediante ‘engendró’ / ‘ha sido engendrado’, pero se conserva ‘ha nacido de Dios’ al inicio por naturalidad y claridad idiomática.
  spanish_consistency_notes:
  - Se mantuvo ‘Mesías’ para Χριστός conforme al criterio POB, no ‘Cristo’.
  - Se prefirió ‘engendrar/nacer’ en paralelo para reflejar el juego verbal del griego; el español alterna entre ‘nacer’ y ‘engendrar’ para balancear naturalidad y correspondencia léxica.
  - Se usó ‘todo el que’ como equivalente natural del participio articular genérico.
  - La preposición ‘de’ en ‘de Dios’ y ‘de él’ mantiene el origen relacional expresado por ἐκ/ἐξ.
