revisions:
- from: Todo el que cree que Jesús es el Mesías ha nacido de Dios[a][b], y todo el que ama al que engendró también ama al que ha sido engendrado de él.
  to: Todo el que cree que Jesús es el Mesías ha nacido de Dios[a][b], y todo el que ama al engendrador también ama al que ha sido engendrado por él.
  rationale: Se reemplaza ‘al que engendró’ por ‘al engendrador’ para expresar en español, de forma natural y fiel, la idea del participio griego como ‘el que engendra/ha engendrado’ sin introducir un objeto inexistente. También se cambia ‘de él’ por ‘por él’ en la segunda expresión para mejorar la idiomaticidad española sin perder la relación de origen y el paralelismo verbal. Las notas se actualizan para corresponder exactamente al texto revisado.
