translation:
  language: es
  text: 'Y esta es la confianza[a] que tenemos delante de él: que, si pedimos algo conforme a su voluntad, él nos oye.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «audacia» o «seguridad» para «confianza».
    reason: lexical_alternative
lexical_decisions:
- source_word: παρρησία
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - audacia
  - seguridad
  - franqueza
  lexicon: BDAG
  rationale: En este contexto de oración, παρρησία expresa acceso confiado y libertad para acercarse a Dios. «Confianza» comunica de forma natural esa seguridad relacional en español, sin perder el matiz de acceso reverente.
- source_word: πρὸς αὐτόν
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - ante él
  - frente a él
  - hacia él
  lexicon: BDAG
  rationale: La preposición πρός con objeto personal aquí señala orientación relacional y presencia ante Dios. «Delante de él» conserva la idea de estar en su presencia, con naturalidad en español.
- source_word: ἐάν τι αἰτώμεθα
  english_pob_choice: if we ask anything
  chosen_spanish: si pedimos algo
  alternatives_spanish:
  - si le pedimos algo
  - si solicitamos algo
  - si pedimos cualquier cosa
  lexicon: BDAG
  rationale: «Pedimos algo» refleja bien el valor general de la condición y el sentido de αιτέω en contexto de oración. «Algo» preserva la amplitud de τι sin sonar forzado.
- source_word: κατὰ τὸ θέλημα αὐτοῦ
  english_pob_choice: according to his will
  chosen_spanish: conforme a su voluntad
  alternatives_spanish:
  - según su voluntad
  - de acuerdo con su voluntad
  - en consonancia con su voluntad
  lexicon: BDAG
  rationale: «Conforme a» expresa adecuación o norma y suena natural en español bíblico actual. «Voluntad» mantiene el peso teológico de θέλημα sin suavizarlo.
- source_word: ἀκούει ἡμῶν
  english_pob_choice: he hears us
  chosen_spanish: él nos oye
  alternatives_spanish:
  - nos escucha
  - nos atiende
  - nos oye y nos responde
  lexicon: BDAG
  rationale: 'En español, «oír» conserva el valor básico de atender una petición sin implicar automáticamente concesión. Esto preserva la tensión teológica del versículo: Dios oye las peticiones conforme a su voluntad, sin convertirlo en una promesa de concesión inmediata.'
theological_decisions:
- issue: Alcance de la respuesta divina a la oración
  english_pob_reading: '''he hears us'' as God''s hearing/attending to prayer, without importing the stronger idea that every request is granted.'
  chosen_spanish_reading: «él nos oye» como atención divina a la oración, sin añadir que toda petición es concedida automáticamente.
  alternative_spanish_readings:
  - él nos responde
  - él nos concede lo que pedimos
  - él accede a nosotros
  rationale: El texto afirma el oír de Dios cuando la petición está conforme a su voluntad; el versículo siguiente desarrolla la confianza en recibir. La traducción debe mantener esa tensión y no resolverla de antemano.
  doctrine_reference: Preservar la tensión teológica del pasaje; no sobretraducir la promesa.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece anclado en el texto principal junto a «confianza». Se mantuvo la decisión auditada de no traducir de forma mecánica desde el inglés, sino a partir del griego y del contexto joánico de oración.'
  spanish_consistency_notes:
  - Se usa «Dios» implícito mediante «él» para mantener la referencia al Padre en el contexto inmediato, como en el texto griego.
  - Se prefirió «voluntad» para θέλημα por consistencia doctrinal y porque el español lo expresa de forma directa y clara.
  - Se eligió «oye» en vez de «escucha» para reflejar mejor ἀκούει en un contexto de respuesta a la oración, sin añadir el sentido de cumplimiento.
