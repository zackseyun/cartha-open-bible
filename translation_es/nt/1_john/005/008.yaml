translation:
  language: es
  text: el Espíritu y el agua y la sangre[a], y los tres son para uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «y los tres son uno». El giro griego probablemente significa que su testimonio concuerda.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τὸ πνεῦμα
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: En el contexto inmediato de 1 Juan 5:6–8, πνεῦμα se entiende naturalmente como una referencia definida al Espíritu Santo; por eso se conserva la mayúscula. El artículo y la función de testigo favorecen un referente concreto.
- source_word: τὸ ὕδωρ
  english_pob_choice: the water
  chosen_spanish: el agua
  alternatives_spanish:
  - el agua, entendida interpretativamente
  lexicon: BDAG
  rationale: Se traduce de forma directa y concreta, manteniendo el artículo y sin explicar en el cuerpo del texto qué significa la imagen, porque el verso mismo no lo aclara.
- source_word: τὸ αἷμα
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - la sangre, entendida interpretativamente
  lexicon: BDAG
  rationale: Se conserva el sustantivo concreto y el paralelismo con 'agua' y 'Espíritu'. El texto griego no desarrolla aquí el referente preciso, así que no conviene interpretarlo en la línea principal.
- source_word: οἱ τρεῖς
  english_pob_choice: the three
  chosen_spanish: los tres
  alternatives_spanish:
  - estos tres
  lexicon: BDAG
  rationale: Es una equivalencia directa del sintagma sustantivado plural, manteniendo la referencia colectiva a los tres testigos nombrados.
- source_word: εἰς τὸ ἕν
  english_pob_choice: are for the one
  chosen_spanish: están para el uno
  alternatives_spanish:
  - están en acuerdo
  - son uno
  lexicon: BDAG
  rationale: El giro griego εἰς τὸ ἕν se refleja de manera más literal con una construcción que preserva la dirección/relación implícita sin convertirla en una afirmación ontológica más fuerte. En español, 'están en acuerdo' explicaría el sentido, pero añade interpretación; 'son uno' sería demasiado cargado teológicamente para este contexto.
theological_decisions:
- issue: 'Sentido de εἰς τὸ ἕν εἰσιν: unidad ontológica vs. convergencia testimonial'
  english_pob_reading: the three are for the one, with note that the idiom likely means their testimony agrees
  chosen_spanish_reading: los tres están para el uno
  alternative_spanish_readings:
  - los tres están en acuerdo
  - los tres son uno
  rationale: En el contexto, el Espíritu, el agua y la sangre actúan como testigos. La lectura debe preservar esa función testimonial sin importar la unidad ontológica de otro pasaje textual. La formulación española mantiene la tensión del original y evita resolverla con una paráfrasis explicativa excesiva.
  doctrine_reference: Preservar la tensión léxica y contextual; primacía del original sobre la armonización doctrinal a partir de variantes textuales posteriores.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del audit trail al reflejar εἰς τὸ ἕν con una formulación más literal que evita expandir el sentido a 'están en acuerdo' en el texto principal, dejando la explicación interpretativa en nota.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu' con mayúscula por el referente contextual al Espíritu Santo.
  - Se conservan artículos definidos en 'el agua' y 'la sangre' para reflejar el griego.
  - '''los tres'' mantiene el sujeto plural y la coherencia con el elenco de testigos.'
  - La nota a preserva la alternativa lexical equivalente al inglés POB y explica el posible sentido idiomático sin desplazar el texto principal.
