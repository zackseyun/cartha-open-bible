revisions:
- from: el Espíritu y el agua y la sangre[a], y los tres están para el uno.
  to: el Espíritu y el agua y la sangre[a], y los tres son para uno.
  rationale: Se ajusta solo la cláusula final para que el español preserve mejor la forma y la tensión del griego sin caer en una construcción antinatural. «Son para uno» mantiene la dirección hacia unidad implícita en εἰς τὸ ἕν, mientras la nota explica la alternativa literal y el probable sentido contextual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:18:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego: «el Espíritu», «el agua», «la sangre» y «los tres» preservan los referentes y el paralelismo formal. El problema principal está en «están para el uno», que no representa bien εἰς τὸ ἕν εἰσιν en español natural. Aunque intenta calcar la revisión inglesa «are for the one», en español esa expresión resulta opaca y no comunica con claridad ni la literalidad ni el sentido idiomático del griego. Una formulación más fiel y legible es «los tres son para uno», que conserva la extrañeza formal de εἰς τὸ ἕν sin introducir la interpretación explícita «están de acuerdo».'
  spanish_quality_summary: El texto es legible salvo en la cláusula final. «Están para el uno» suena antinatural y semánticamente confuso en español bíblico contemporáneo; además, «el uno» no es la manera más idiomática de expresar τὸ ἕν aquí. «Son para uno» es breve, formal y más comprensible, mientras la nota al pie conserva la alternativa más literal «son uno» y explica el probable sentido testimonial.
  glossary_alignment: 'Hay buena alineación con la terminología del proyecto: πνεῦμα como «Espíritu» por contexto, ὕδωρ como «agua», αἷμα como «sangre». No hay conflictos con Yahvé/Mesías/etc. La decisión teológica de evitar una afirmación ontológica fuerte en el texto principal está correctamente preservada mediante nota. La única desviación es estilístico-lexical: el intento de seguir «for the one» debe adaptarse al español para mantener fidelidad comunicativa.'
  issues:
  - severity: medium
    issue: «están para el uno» es español poco natural y opaco
    rationale: La frase no suena idiomática en español y dificulta captar el valor de εἰς τὸ ἕν. Además, «estar para» normalmente expresa disposición o inminencia, no convergencia o relación hacia unidad.
  - severity: low
    issue: «el uno» suena forzado para τὸ ἕν
    rationale: En español, «uno» sin artículo funciona mejor en esta construcción. El artículo definido reproduce demasiado mecánicamente el griego y empeora la fluidez sin aportar precisión.
  revised_spanish_text: el Espíritu y el agua y la sangre[a], y los tres son para uno.
  revised_footnotes:
  - marker: a
    text: 'O, más literalmente: «y los tres son uno». El giro griego probablemente significa que su testimonio concuerda.'
    reason: lexical_alternative
  revision_rationale: Se ajusta solo la cláusula final para que el español preserve mejor la forma y la tensión del griego sin caer en una construcción antinatural. «Son para uno» mantiene la dirección hacia unidad implícita en εἰς τὸ ἕν, mientras la nota explica la alternativa literal y el probable sentido contextual.
