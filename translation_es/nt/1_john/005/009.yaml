translation:
  language: es
  text: 'Si recibimos el testimonio de los hombres[a], el testimonio de Dios es mayor[c], porque este es el testimonio de Dios: que él ha dado testimonio[b] acerca de su Hijo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el testimonio de las personas». El griego dice «los hombres» en sentido genérico, en contraste con el testimonio de Dios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ha testificado acerca de su Hijo».'
    reason: lexical_alternative
  - marker: c
    text: 'La cláusula final también puede entenderse causalmente: «porque él ha dado testimonio acerca de su Hijo».'
    reason: alternative_reading
lexical_decisions:
- source_word: μαρτυρίαν / μαρτυρία
  english_pob_choice: testimony
  chosen_spanish: testimonio
  alternatives_spanish:
  - testigo
  - testimonio dado
  - declaración
  lexicon: BDAG
  rationale: Mantiene el valor jurídico/evidencial del término y conserva la repetición del versículo. En español, 'testimonio' es la opción más natural y más cercana al campo semántico de μαρτυρία en este contexto.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  lexicon: BDAG
  rationale: El griego usa el plural masculino genérico en contraste con el testimonio de Dios. 'Los hombres' preserva esa forma y el contraste retórico, sin impedir la lectura genérica humana.
- source_word: λαμβάνομεν
  english_pob_choice: receive
  chosen_spanish: recibimos
  alternatives_spanish:
  - aceptamos
  - tomamos
  lexicon: BDAG
  rationale: '''Recibir'' reproduce bien la idea de acoger o admitir un testimonio. En español suena natural y mantiene el vínculo con la imagen de recibir evidencia.'
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más grande
  - superior
  lexicon: BDAG
  rationale: '''Mayor'' es el comparativo más directo y sobrio en español para expresar que el testimonio de Dios sobrepasa al humano.'
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: El primer ὅτι introduce la razón por la que el testimonio de Dios es mayor; 'porque' expresa con claridad la relación causal en español moderno.
- source_word: αὕτη ἐστὶν ἡ μαρτυρία τοῦ θεοῦ
  english_pob_choice: this is the testimony of God
  chosen_spanish: este es el testimonio de Dios
  alternatives_spanish:
  - este es el testimonio de Dios mismo
  - este es el testimonio que es de Dios
  lexicon: BDAG
  rationale: Se conserva la repetición de 'testimonio' y la estructura demostrativa del griego. 'Este' sigue al antecedente neutro implícito de forma idiomática en español.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: El segundo ὅτι introduce el contenido del testimonio, no una nueva causalidad. 'Que' mantiene esa lectura de modo natural en español.
- source_word: μεμαρτύρηκεν
  english_pob_choice: has testified
  chosen_spanish: ha testificado
  alternatives_spanish:
  - ha dado testimonio
  - ha sido testigo
  lexicon: BDAG
  rationale: El perfecto griego indica una acción completada con vigencia presente. 'Ha testificado' conserva la conexión léxica con 'testimonio' y el valor aspectual de una acción ya realizada.
- source_word: περὶ τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: concerning his Son
  chosen_spanish: acerca de su Hijo
  alternatives_spanish:
  - sobre su Hijo
  - respecto de su Hijo
  lexicon: BDAG
  rationale: '''Acerca de'' traduce bien περί con genitivo en este contexto y suena natural en español. ''Hijo'' se conserva con mayúscula por referencia cristológica directa, sin añadir contenido al texto.'
theological_decisions:
- issue: Fuerza genérica de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: los hombres
  alternative_spanish_readings:
  - las personas
  - los seres humanos
  rationale: La forma griega es masculina plural y contrasta el testimonio humano con el de Dios. Mantener 'los hombres' preserva esa tensión formal y el paralelismo del original, sin negar el sentido genérico.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
- issue: Función del segundo ὅτι
  english_pob_reading: content clause ('that he has testified concerning his Son')
  chosen_spanish_reading: cláusula de contenido ('que él ha testificado acerca de su Hijo')
  alternative_spanish_readings:
  - cláusula causal ('porque él ha testificado acerca de su Hijo')
  rationale: 'La lectura de contenido encaja mejor con la lógica interna del versículo: se define en qué consiste el testimonio de Dios. Traducirlo con ''que'' evita reforzar indebidamente una causalidad secundaria.'
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y coincide con el audit trail inglés de la POB en sus decisiones léxicas principales y en la ambigüedad de la cláusula final. No hay revisiones aplicadas en la pasada más reciente; el cotejo indica alta concordancia y el texto se mantiene estable.
  spanish_consistency_notes:
  - Se preservó la repetición de 'testimonio' para reflejar μαρτυρία/mαρτυρία.
  - Se mantuvo el contraste humano/divino con 'los hombres' frente a 'Dios'.
  - Se eligió 'acerca de su Hijo' para perí con genitivo por naturalidad y fidelidad semántica.
  - Las notas usan marcadores únicos y corresponden exactamente a los anclajes del texto.
