translation:
  language: es
  text: Y si sabemos que nos oye cuando pedimos[a], sabemos que tenemos las peticiones que le hemos hecho de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cualquier cosa que pidamos». La construcción griega expresa un sentido abierto, como «lo que sea que pidamos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - estamos seguros
  lexicon: BDAG
  rationale: οἶδα expresa conocimiento cierto y, en Juan, una seguridad asentada. En español, "sabemos" conserva esa fuerza mejor que una paráfrasis como "estamos seguros".
- source_word: ἀκούει ἡμῶν
  english_pob_choice: he hears us
  chosen_spanish: nos oye
  alternatives_spanish:
  - nos escucha
  - nos atiende
  lexicon: BDAG
  rationale: ἀκούω con genitivo en este contexto indica que Dios percibe la oración dirigida a él. "Nos oye" es natural en español y mantiene la tensión teológica que el texto deja abierta, sin convertirlo en "nos responde".
- source_word: ὃ ἐὰν αἰτώμεθα
  english_pob_choice: whenever we ask
  chosen_spanish: en cualquiera cosa que pidamos
  alternatives_spanish:
  - cada vez que pidamos
  - lo que pidamos
  - cualquier cosa que pidamos
  lexicon: BDAG
  rationale: 'La construcción relativa indefinida con ἐάν expresa amplitud: "cualquier cosa / cualquiera cosa que pidamos". Se eligió una formulación española que preserve el alcance abierto y conecte con la cláusula anterior sin forzar una interpretación de respuesta inmediata.'
- source_word: αἰτώμεθα
  english_pob_choice: we ask
  chosen_spanish: pidamos
  alternatives_spanish:
  - preguntemos
  - solicitemos
  lexicon: BDAG
  rationale: En este contexto αἰτέω se refiere a pedir en oración. "Pidamos" es la forma más natural y directa en español para una súplica dirigida a Dios.
- source_word: ἔχομεν
  english_pob_choice: we have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  - recibimos
  lexicon: BDAG
  rationale: El verbo significa simplemente "tener". "Tenemos" evita introducir la idea de recepción como si fuera explícita en el griego.
- source_word: τὰ αἰτήματα
  english_pob_choice: the requests
  chosen_spanish: las peticiones
  alternatives_spanish:
  - las solicitudes
  - lo pedido
  lexicon: BDAG
  rationale: αἴτημα designa lo que se pide. "Peticiones" mantiene la relación léxica con el verbo "pedir" y suena natural en español bíblico contemporáneo.
- source_word: ἃ ᾐτήκαμεν
  english_pob_choice: that we have asked
  chosen_spanish: que le hemos pedido
  alternatives_spanish:
  - que hemos solicitado
  - que le pedimos
  lexicon: BDAG
  rationale: El perfecto ᾐτήκαμεν expresa una acción pedida con relevancia presente; "hemos pedido" lo refleja bien. Se añadió "le" porque el contexto inmediato establece a Dios como el destinatario implícito de la petición, y el español suele requerir ese objeto indirecto para claridad.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de parte de él
  - procedentes de él
  lexicon: BDAG
  rationale: ἀπό marca origen o fuente. "De él" conserva la idea de procedencia en español; aquí se integra naturalmente con "hemos pedido", sin necesidad de una paráfrasis más explicativa.
theological_decisions:
- issue: Si ἀκούει debe entenderse como simple oír o como responder favorablemente a la oración.
  english_pob_reading: he hears us
  chosen_spanish_reading: nos oye
  alternative_spanish_readings:
  - nos responde
  - nos escucha y responde
  rationale: 'Se mantuvo el valor de "oír"/"escuchar" sin convertirlo en "responder", porque el verso hace dos afirmaciones: primero, que Dios oye; luego, que tenemos las peticiones. Traducirlo como respuesta cerraría esa progresión y resolvería más de lo que el griego dice.'
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la revisión final del contexto inglés: se prefirió una forma más natural y breve para ὃ ἐὰν αἰτώμεθα, manteniendo a la vez la estructura de dos afirmaciones: Dios oye y nosotros tenemos las peticiones. Se evitó traducir ἀκούει como «responde» para conservar la lógica del versículo y la tensión teológica documentada en el audit trail.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino explícito.
  - Se mantuvo el léxico de petición («pedir», «peticiones») para hacer visible la relación entre αἰτέω y αἴτημα.
  - Se conservó el objeto indirecto «le» en «le hemos pedido» para claridad referencial en español, sin añadir contenido nuevo.
  - El marcador de nota a aparece en el texto exactamente donde se da la alternativa de alcance abierto.
