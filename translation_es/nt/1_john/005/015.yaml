revisions:
- from: Y si sabemos que nos oye[a] en cualquiera cosa que pidamos, sabemos que tenemos las peticiones que le hemos pedido.
  to: Y si sabemos que nos oye cuando pedimos[a], sabemos que tenemos las peticiones que le hemos hecho de él.
  rationale: Se ajustó la cláusula indefinida a un español más natural y más cercano a la revisión auditada ('cuando pedimos'), preservando en nota la alternativa más literal de amplitud abierta. También se hizo explícito 'de él' para reflejar ἀπ’ αὐτοῦ, y se suavizó la repetición española cambiando 'hemos pedido' por 'hemos hecho' en la frase final.
