review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: dos veces ''sabemos'', mantiene ''nos oye'' en vez de ''nos responde'', conserva ''tenemos'' para ἔχομεν, y expresa las ''peticiones'' pedidas a Dios. Sin embargo, ''en cualquiera cosa que pidamos'' suena poco natural en español y no representa tan bien la revisión inglesa auditada (''whenever we ask'') ni la fuerza abierta de ὃ ἐὰν αἰτώμεθα en contexto. Además, el texto español omite explícitamente la idea de ἀπ’ αὐτοῦ (''de él'') al absorberla solo en ''le hemos pedido'', lo cual debilita la noción de fuente/dirección presente en el griego.'
  spanish_quality_summary: El español es mayormente claro y digno, pero 'en cualquiera cosa que pidamos' resulta torpe y poco idiomático en español neutral. También 'las peticiones que le hemos pedido' repite 'pedir' de manera algo pesada; puede mejorarse sin perder la conexión léxica griega. Una formulación como 'cualquier cosa que pidamos' y 'las peticiones que le hemos hecho' suena más natural y sigue siendo fiel.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. 'Nos oye' respeta la decisión teológica documentada sobre ἀκούει. 'Peticiones' es aceptable para τὰ αἰτήματα. Se recomienda explicitar 'de él' para alinear mejor con ἀπ’ αὐτοῦ, ya que el análisis léxico español mismo lo reconoce como importante.
  issues:
  - severity: medium
    issue: 'Expresión poco natural: ''en cualquiera cosa que pidamos'''
    rationale: Aunque intenta reflejar la amplitud de ὃ ἐὰν αἰτώμεθα, en español neutral suena forzado. 'Cualquier cosa que pidamos' o 'siempre que pidamos' comunica mejor el sentido abierto sin calco innecesario.
  - severity: medium
    issue: No se expresa claramente 'ἀπ’ αὐτοῦ' en el texto principal
    rationale: El griego dice que tenemos las peticiones 'que hemos pedido de él / de parte de él'. 'Le hemos pedido' marca destinatario, pero no reproduce tan claramente la preposición ἀπό. Conviene incluir 'de él' o una construcción equivalente.
  - severity: low
    issue: Repetición áspera en 'las peticiones que le hemos pedido'
    rationale: Es comprensible y léxicamente cercana al griego, pero en español suena pesada. 'Las peticiones que le hemos hecho' mantiene buen sentido y mejora la fluidez.
  revised_spanish_text: Y si sabemos que nos oye cuando pedimos[a], sabemos que tenemos las peticiones que le hemos hecho de él.
  revised_footnotes:
  - marker: a
    text: 'O: «cualquier cosa que pidamos». La construcción griega expresa un sentido abierto, como «lo que sea que pidamos».'
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula indefinida a un español más natural y más cercano a la revisión auditada ('cuando pedimos'), preservando en nota la alternativa más literal de amplitud abierta. También se hizo explícito 'de él' para reflejar ἀπ’ αὐτοῦ, y se suavizó la repetición española cambiando 'hemos pedido' por 'hemos hecho' en la frase final.
