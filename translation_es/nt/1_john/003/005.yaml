translation:
  language: es
  text: Y saben que él apareció[a] para quitar[b] los pecados, y en él no hay pecado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue manifestado».
    reason: lexical_alternative
  - marker: b
    text: O «llevar los pecados». El verbo griego puede significar «quitar», «remover» o «cargar/llevar lejos».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: saben
  alternatives_spanish:
  - han sabido
  - están conscientes
  lexicon: BDAG
  rationale: οἶδα funciona con sentido presente en griego koiné; «saben» comunica de forma natural ese valor en español y conserva el tono afirmativo del contexto johánico.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - aquel
  - ese
  lexicon: BDAG
  rationale: Aunque literalmente puede ser «aquel/ese», aquí el referente es Cristo y el español fluye mejor con «él», manteniendo la referencia personal clara sin sobrecargar el texto.
- source_word: ἐφανερώθη
  english_pob_choice: appeared
  chosen_spanish: apareció
  alternatives_spanish:
  - fue manifestado
  - se manifestó
  lexicon: BDAG
  rationale: El pasivo de φανερόω puede expresarse como «fue manifestado», pero «apareció» es una equivalencia natural en español para el aparecer histórico de Cristo; conserva la idea central sin perder inteligibilidad.
- source_word: ἵνα
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - con el fin de
  lexicon: BDAG
  rationale: ἵνα expresa propósito; «para» transmite esa finalidad de manera directa y natural en español, equivalente al valor teleológico indicado en el texto griego.
- source_word: ἁμαρτίας
  english_pob_choice: sins
  chosen_spanish: los pecados
  alternatives_spanish:
  - los pecados cometidos
  - las transgresiones
  lexicon: BDAG
  rationale: El plural acusativo se preserva con «los pecados», evitando la reducción a un singular abstracto y manteniendo la pluralidad concreta del griego.
- source_word: ἄρῃ
  english_pob_choice: take away
  chosen_spanish: quitar
  alternatives_spanish:
  - llevarse
  - remover
  lexicon: BDAG
  rationale: αἴρω puede significar levantar, cargar, remover o quitar. En este contexto, «quitar» comunica con claridad la idea de retirar/eliminar los pecados sin fijar indebidamente un matiz atonementológico específico.
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - culpa
  - pecaminosidad
  lexicon: BDAG
  rationale: El sustantivo singular anarthrous se rinde con «pecado», manteniendo la afirmación absoluta de ausencia de pecado en él.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - dentro de él
  lexicon: BDAG
  rationale: La preposición ἐν + dativo se traduce con la fórmula estándar «en él», conservando el giro joánico y su resonancia teológica.
theological_decisions:
- issue: Referente de ἐκεῖνος
  english_pob_reading: A reference to Jesus Christ
  chosen_spanish_reading: Referencia a Jesucristo
  alternative_spanish_readings:
  - referencia general a «aquel»
  - referencia impersonal
  rationale: El contexto inmediato identifica al que apareció como Cristo; usar «él» mantiene esa referencia cristológica sin añadir formulaciones doctrinales ajenas al versículo.
  doctrine_reference: Credo Niceno; Calcedonia
- issue: Sentido de αἴρω con «pecados»
  english_pob_reading: remove/take away sins
  chosen_spanish_reading: quitar los pecados
  alternative_spanish_readings:
  - llevar los pecados
  - 'bear away sins: cargar/quitar de encima los pecados'
  rationale: «Quitar» expresa la remoción de los pecados sin resolver el modo de la expiación en una sola teoría; preserva la tensión teológica del texto y su afirmación central.
  doctrine_reference: 'Principio POB: preservar la tensión teológica sin simplificarla'
translation_notes:
  revision_awareness: 'Se revisó la opción más natural para el español («apareció», «quitar») manteniendo los dos matices principales del audit trail inglés: el aparecer/manifestarse de Cristo y la posible gama semántica de αἴρω. No se detectaron cambios pendientes en la revisión más reciente; el borrador sigue el consenso de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el plural «pecados» para τὰς ἁμαρτίας y el singular «pecado» para ἁμαρτία.
  - 'Se conservó el paralelismo breve del verso: aparición de Cristo, propósito, y afirmación final de ausencia de pecado en él.'
  - Se evitó «SEÑOR» o «Cristo» como sustitutos no presentes en el versículo; el referente queda claro por contexto y por el pronombre «él».
