translation:
  language: es
  text: Y todo lo que pidamos, lo recibimos de él, porque guardamos sus mandamientos y hacemos lo que es agradable[a] a sus ojos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὃ ἐὰν
  english_pob_choice: whatever
  chosen_spanish: cualquier cosa que
  alternatives_spanish:
  - lo que sea
  - todo lo que
  lexicon: BDAG
  rationale: La construcción relativa indefinida expresa amplitud sin limitar el alcance. En español, «cualquier cosa que» transmite bien esa indefinición y mantiene el tono general del original sin volverla más interpretativa.
- source_word: αἰτῶμεν
  english_pob_choice: we ask
  chosen_spanish: pidamos
  alternatives_spanish:
  - pedimos
  - solicitemos
  lexicon: BDAG
  rationale: En contexto de petición, «pedir» es el equivalente natural de αἰτέω. Se eligió el subjuntivo en la subordinada relativa indefinida («cualquier cosa que pidamos») porque reproduce mejor la apertura de la construcción griega con ἐάν.
- source_word: λαμβάνομεν
  english_pob_choice: we receive
  chosen_spanish: la recibimos
  alternatives_spanish:
  - la obtenemos
  - recibimos
  lexicon: BDAG
  rationale: El verbo indica recepción de lo pedido. En español, el objeto implícito se expresa naturalmente como «la recibimos», retomando «cualquier cosa» y conservando la idea de recibir de parte de Dios sin añadir matiz extra.
- source_word: ἀπ’ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - de Él
  - de parte de él
  lexicon: BDAG
  rationale: La preposición ἀπό marca origen o fuente. «De él» es breve, natural y fiel al valor de procedencia. No se usa mayúscula obligatoria porque no es un requerimiento editorial del español bíblico moderno.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón del recibir; por eso «porque» preserva la fuerza causal explícita del texto griego y de la traducción inglesa auditada.
- source_word: τὰς ἐντολὰς αὐτοῦ
  english_pob_choice: his commandments
  chosen_spanish: sus mandamientos
  alternatives_spanish:
  - sus mandatos
  - sus órdenes
  lexicon: BDAG
  rationale: «Mandamientos» mantiene el registro bíblico y la continuidad joánica de ἐντολή. «Mandatos» u «órdenes» sonarían menos estables en español para este contexto.
- source_word: τηροῦμεν
  english_pob_choice: we keep
  chosen_spanish: guardamos
  alternatives_spanish:
  - obedecemos
  - observamos
  lexicon: BDAG
  rationale: Aunque «guardar» puede sugerir custodiar, en Juan conserva bien el valor de mantener/fielmente observar los mandamientos. Se prefiere a «obedecemos» para no reducir el matiz de vigilancia y fidelidad del verbo.
- source_word: τὰ ἀρεστὰ
  english_pob_choice: what is pleasing
  chosen_spanish: lo que es agradable
  alternatives_spanish:
  - las cosas agradables
  - lo agradable
  lexicon: BDAG
  rationale: El adjetivo sustantivado neutro plural designa aquello que agrada. «Lo que es agradable» comunica la cualidad ética sin estrecharla indebidamente a un solo objeto concreto.
- source_word: ἐνώπιον αὐτοῦ
  english_pob_choice: in his sight
  chosen_spanish: en su presencia
  alternatives_spanish:
  - delante de él
  - a sus ojos
  lexicon: BDAG
  rationale: La expresión griega puede significar «delante de» o «a la vista de». En español, «en su presencia» mantiene la idea de estar bajo su mirada y funciona con naturalidad en un registro bíblico digno.
- source_word: ποιοῦμεν
  english_pob_choice: we do
  chosen_spanish: hacemos
  alternatives_spanish:
  - practicamos
  - realizamos
  lexicon: BDAG
  rationale: ποιέω es el verbo general «hacer». Aquí encaja bien con el objeto «lo que es agradable», sin introducir una habitualidad o tecnicismo que el griego no exige.
theological_decisions:
- issue: Relación entre obediencia y respuesta a la oración
  english_pob_reading: 'The verse is translated with its stated causal connection intact: believers receive from him because they keep his commandments and do what pleases him.'
  chosen_spanish_reading: 'La traducción conserva la relación causal explícita: recibimos de él porque guardamos sus mandamientos y hacemos lo que es agradable en su presencia.'
  alternative_spanish_readings:
  - Una versión que suavice la causalidad hasta mera asociación
  - Una versión que vuelva la frase en una fórmula mecánica
  rationale: El ὅτι del griego expresa razón causal; por eso la traducción debe mantenerla sin rebajarla ni convertirla en un mecanismo automático. La redacción española preserva esa tensión teológica tal como aparece en el texto.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La versión española sigue de cerca la lectura auditada del inglés POB y la revisión más reciente, especialmente en la equivalencia de ἐνώπιον αὐτοῦ como una expresión natural de esfera de percepción divina. Se mantuvo el valor causal de ὅτι y la estructura indefinida de ὃ ἐὰν sin debilitarla.
  spanish_consistency_notes:
  - Se prefirió «mandamientos» para ἐντολαί por coherencia joánica y por su uso estable en español bíblico.
  - «Guardar» se emplea como equivalente funcional de τηρέω, conservando fidelidad activa más que simple observancia externa.
  - «En su presencia» refleja el matiz relacional de ἐνώπιον αὐτοῦ sin sonar arcaico.
