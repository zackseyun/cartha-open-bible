translation:
  language: es
  text: no como Caín[a], que era del maligno y degolló[b] a su hermano. ¿Y por qué lo degolló? Porque sus obras eran malvadas, pero las de su hermano eran justas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del mal». La expresión griega puede leerse de manera más abstracta, pero en el uso joánico suele referirse personalmente al maligno.
    reason: alternative_reading
  - marker: b
    text: O «lo asesinó». El verbo griego es más vívido, literalmente «degolló».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ καθὼς
  english_pob_choice: not like
  chosen_spanish: no como
  alternatives_spanish:
  - no así como
  - no de la manera de
  lexicon: BDAG
  rationale: La comparación negativa de καθώς bajo οὐ se expresa de forma natural en español con «no como», conservando el contraste sin calco pesado.
- source_word: Κάϊν
  english_pob_choice: Cain
  chosen_spanish: Caín
  alternatives_spanish:
  - Cain
  lexicon: BDAG
  rationale: Nombre propio bíblico establecido en español; la tilde sigue la acentuación gráfica normal del español.
- source_word: ἐκ τοῦ πονηροῦ
  english_pob_choice: from the evil one
  chosen_spanish: del maligno
  alternatives_spanish:
  - del malo
  - del mal
  - del maligno, o del mal
  lexicon: BDAG
  rationale: En el uso joánico, ὁ πονηρός suele referirse personalmente al maligno. «Del maligno» preserva esa lectura personal con naturalidad en español y evita rebajar el contraste a una abstracción impersonal.
- source_word: ἔσφαξεν
  english_pob_choice: slaughtered
  chosen_spanish: degolló
  alternatives_spanish:
  - sacrificó
  - mató
  - inmoló
  lexicon: BDAG
  rationale: σφάζω es más vívido que «matar». «Degolló» conserva la violencia gráfica del verbo griego mejor que un verbo genérico, aunque en español puede sonar fuerte; por eso se mantiene la carga lexical del original.
- source_word: ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano propio
  - a su hermano
  lexicon: BDAG
  rationale: Traducción directa y natural del objeto directo con pronombre posesivo; la relación fraterna es parte del contraste moral del versículo.
- source_word: χάριν τίνος
  english_pob_choice: why
  chosen_spanish: ¿Y por qué?
  alternatives_spanish:
  - ¿Y por qué razón?
  - ¿Con qué motivo?
  lexicon: BDAG
  rationale: La interrogativa causal se vierte con la expresión idiomática española más clara, manteniendo la función explicativa del griego sin literalismo artificial.
- source_word: ἔσφαξεν αὐτόν
  english_pob_choice: he slaughtered him
  chosen_spanish: lo degolló
  alternatives_spanish:
  - lo mató
  - lo asesinó
  lexicon: BDAG
  rationale: Se conserva la repetición verbal del texto griego con el mismo nivel de crudeza. «Lo degolló» mantiene la fuerza imagética de σφάζω; «asesinó» introduciría una categorización legal que el verbo no exige.
- source_word: τὰ ἔργα αὐτοῦ πονηρὰ ἦν
  english_pob_choice: his deeds were evil
  chosen_spanish: sus obras eran malas
  alternatives_spanish:
  - sus obras eran malas y perversas
  - sus hechos eran malos
  lexicon: BDAG
  rationale: ἔργα se rinde aquí con «obras» para sostener el léxico joánico y su resonancia ética. πονηρά se traduce «malas» en el cuerpo principal por ser natural y comprensible; «malas» conserva la oposición moral, aunque en una nota puede señalarse la posible intensificación de «malvadas» o «perversas».
- source_word: τὰ δὲ τοῦ ἀδελφοῦ αὐτοῦ δίκαια
  english_pob_choice: but those of his brother were righteous
  chosen_spanish: pero las de su hermano eran justas
  alternatives_spanish:
  - pero las obras de su hermano eran justas
  - pero las de su hermano eran rectas
  lexicon: BDAG
  rationale: Se preserva la elipsis del griego, donde el segundo miembro omite explícitamente «obras». «Justas» reproduce δίκαια con un término que mantiene el paralelismo moral y la fuerza bíblica sin perder intelligibilidad.
theological_decisions:
- issue: 'ἐκ τοῦ πονηροῦ: lectura personal o impersonal'
  english_pob_reading: 'personal: ''the evil one'''
  chosen_spanish_reading: 'personal: «el maligno»'
  alternative_spanish_readings:
  - 'impersonal: «del mal»'
  - 'impersonal: «de lo malo»'
  rationale: Siguiendo el uso joánico y el auditable criterio del POB inglés, se mantiene la lectura personal. Esto preserva el contraste teológico de origen espiritual sin borrar la ambigüedad reconocida en el griego.
  doctrine_reference: Mantener la tensión lexical del original; no neutralizar una posible referencia personal de πονηρός en Juan.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente que prefirió «deeds» sobre «works» por naturalidad contextual, pero en español se conserva «obras» para mantener la continuidad del vocabulario joánico y porque aquí suena más natural y bíblicamente estable que un equivalente más abstracto. También se preservó la intensidad de σφάζω con un verbo español igualmente gráfico.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; este versículo no contiene el nombre divino.
  - Se mantiene «justas» para δίκαια, en paralelo con el léxico ético del pasaje.
  - Se evita «Cristo/Mesías» porque no aparece en el versículo.
  - Se conserva la referencia personal de «el maligno» conforme al patrón joánico documentado en la auditoría inglesa.
