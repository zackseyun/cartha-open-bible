  text: οὐ καθὼς Κάϊν ἐκ τοῦ πονηροῦ ἦν καὶ ἔσφαξεν τὸν ἀδελφὸν αὐτοῦ· καὶ χάριν τίνος ἔσφαξεν αὐτόν; ὅτι τὰ ἔργα αὐτοῦ πονηρὰ ἦν, τὰ δὲ τοῦ ἀδελφοῦ αὐτοῦ δίκαια.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/012.yaml
  text: not like Cain[a], who was from the evil one and slaughtered his brother. And why did he slaughter him? Because his deeds were evil[b], but those of his brother were righteous.
  footnotes:
