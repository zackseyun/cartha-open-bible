translation:
  language: es
  text: Hijitos, no amemos de palabra ni con la lengua, sino con hechos[a] y en verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en acción». El griego también puede entenderse como «en obra» o «en acción»; «con hechos» expresa naturalmente en español el contraste con «de palabra».
    reason: lexical_alternative
lexical_decisions:
- source_word: Τεκνία
  english_pob_choice: Little children
  chosen_spanish: Hijitos
  alternatives_spanish:
  - Niños
  - Queridos hijos
  lexicon: BDAG
  rationale: El vocativo diminutivo y afectuoso se transmite mejor con «hijitos», que conserva la cercanía familiar y el matiz tierno del griego mejor que el más neutro «niños». «Queridos hijos» introduce una palabra no explícita en el original.
- source_word: μὴ ἀγαπῶμεν
  english_pob_choice: let us not love
  chosen_spanish: no amemos
  alternatives_spanish:
  - no debemos amar
  - no amemos nosotros
  lexicon: BDAG
  rationale: 'El subjuntivo exhortativo con μή se expresa de forma natural en español con una prohibición exhortativa: «no amemos». Mantiene el carácter inclusivo de la primera persona plural sin volverlo explicativo.'
- source_word: λόγῳ
  english_pob_choice: in word
  chosen_spanish: de palabra
  alternatives_spanish:
  - en palabra
  - con palabras
  lexicon: BDAG
  rationale: El dativo de λόγος aquí apunta a la expresión verbal. «De palabra» suena natural en español y conserva la oposición con la acción posterior, sin perder el valor de habla o discurso.
- source_word: μηδὲ τῇ γλώσσῃ
  english_pob_choice: or with the tongue
  chosen_spanish: ni con la lengua
  alternatives_spanish:
  - ni en habla
  - ni con palabras
  lexicon: BDAG
  rationale: «Γλῶσσα» se mantiene con su imagen concreta de «lengua», como metonimia de habla. «Ni con la lengua» preserva la fuerza retórica del paralelo con «de palabra» y no borra la imagen corporal.
- source_word: ἐν ἔργῳ
  english_pob_choice: in deed
  chosen_spanish: en hecho
  alternatives_spanish:
  - en obra
  - en acción
  lexicon: BDAG
  rationale: «Ἔργον» puede referirse a obra/hecho/acción. «En hecho» conserva bien el paralelismo breve con «de palabra» y es transparente en español; «en obra» sería posible, pero suena más religioso y menos directo.
- source_word: καὶ ἀληθείᾳ
  english_pob_choice: and truth
  chosen_spanish: y en verdad
  alternatives_spanish:
  - y en verdad y sinceridad
  - y con verdad
  lexicon: BDAG
  rationale: Se conserva «verdad» para no estrechar ἀλήθεια a una mera «sinceridad». Añadir «en» en español ayuda al paralelismo con «en hecho» y mantiene la lectura amplia y joánica de verdad como realidad conforme a Dios.
theological_decisions:
- issue: Sentido de ἀλήθεια en el cierre «en verdad»
  english_pob_reading: Retain 'truth' rather than interpretively narrowing it to 'sincerity' or 'genuineness.'
  chosen_spanish_reading: Mantener «verdad» y no reducirlo a «sinceridad» o «genuinidad».
  alternative_spanish_readings:
  - sinceridad
  - genuinidad
  rationale: En el corpus joánico, ἀλήθεια suele tener un peso teológico que rebasa la mera honestidad subjetiva. «Verdad» preserva esa amplitud y deja abierta la tensión entre autenticidad práctica y conformidad con la verdad de Dios.
  doctrine_reference: 'Translation philosophy #3: preservar la tensión teológica en vez de resolverla por paráfrasis.'
translation_notes:
  revision_awareness: 'Coincide con la última pasada de revisión: no se requieren cambios respecto del criterio auditable de la fuente inglesa; se mantiene la equivalencia óptima con paralelismo español natural y sin aplanar las imágenes de λόγος y γλῶσσα.'
  spanish_consistency_notes:
  - Se mantiene «verdad» para ἀλήθεια, evitando «sinceridad» como reducción interpretativa.
  - Se conserva la imagen concreta de «la lengua» junto a la abstracción de «palabra» para reflejar el paralelismo del griego.
  - El vocativo se resuelve con diminutivo afectivo («hijitos») por coherencia con el tono de 1 Juan.
