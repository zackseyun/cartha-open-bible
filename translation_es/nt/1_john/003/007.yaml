    rationale: En 1 Juan 3:7 el énfasis es la conducta moral recta como evidencia de ser δίκαιος. En español, «justicia» suele activarse como categoría judicial/social; «rectitud» transmite mejor el matiz ético habitual aquí.
  - severity: medium
    issue: «es justo» para δίκαιός ἐστιν puede sonar a imparcialidad más que a rectitud moral
    rationale: Aunque cognado con «justicia», en español actual «justo» no siempre comunica tan claramente la cualidad moral de una persona como «recto». La pareja «rectitud / recto» resulta más transparente para lectores generales.
