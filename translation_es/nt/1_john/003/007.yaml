translation:
  language: es
  text: Hijitos[a], que nadie los engañe. El que practica la rectitud[b] es recto[c], así como él[d] es recto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Niños»; el diminutivo griego expresa afecto pastoral.
    reason: lexical_alternative
  - marker: b
    text: O «la justicia»; aquí el sentido es conducta recta u obrar conforme a lo que es justo.
    reason: lexical_alternative
  - marker: c
    text: O «justo». Se usa «recto» para comunicar con más claridad la cualidad moral y conservar el vínculo con «rectitud».
    reason: lexical_alternative
  - marker: d
    text: El griego dice literalmente «aquel»; la referencia más probable es Cristo, aunque algunos la entienden de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: τεκνία
  english_pob_choice: Little children
  chosen_spanish: Hijitos
  alternatives_spanish:
  - Niños
  - Hijitos queridos
  lexicon: BDAG
  rationale: El diminutivo afectuoso de τεκνία se comunica de manera natural con «Hijitos», que preserva la ternura filial y el matiz de cercanía pastoral sin volverlo más explicativo de lo que permite el griego.
- source_word: μηδεὶς πλανάτω ὑμᾶς
  english_pob_choice: let no one deceive you
  chosen_spanish: que nadie los engañe
  alternatives_spanish:
  - que nadie los decepcione
  - que nadie los desvíe
  - que nadie los lleve por mal camino
  lexicon: BDAG
  rationale: πλανάω puede abarcar engañar o desviar; aquí el contexto de advertencia moral/doctrinal hace apropiado «engañe». «Que nadie los engañe» es idiomático en español y conserva la prohibición.
- source_word: ὁ ποιῶν
  english_pob_choice: The one who practices
  chosen_spanish: El que practica
  alternatives_spanish:
  - El que hace
  - Quien practica
  - El que obra
  lexicon: BDAG
  rationale: El participio articular presente expresa un patrón habitual. «Practica» transmite bien la conducta constante en español, más naturalmente que un calco como «el que hace».
- source_word: τὴν δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia/rectitud
  lexicon: BDAG
  rationale: En español, «justicia» puede expresar el campo semántico de δικαιοσύνη, y aquí se mantiene el vínculo lexical con «justo» en la cláusula siguiente. Se conserva la posibilidad de matiz ético de rectitud en la nota.
- source_word: δίκαιός ἐστιν
  english_pob_choice: is righteous
  chosen_spanish: es justo
  alternatives_spanish:
  - es recto
  - es justo/recto
  lexicon: BDAG
  rationale: «Justo» preserva la relación cognada con δικαιοσύνη en español y es el equivalente más natural en este contexto ético-johánico. «Recto» sería posible, pero menos directo.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: «Así como» reproduce claramente la comparación y resulta natural en español contemporáneo, manteniendo la fuerza de correspondencia del griego.
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - ese
  - aquel
  lexicon: BDAG
  rationale: El demostrativo griego se traduce aquí con el pronombre personal para reflejar la revisión inglesa más natural, sin perder el referente implícito. En español, repetir «él» evita una formulación extraña como «aquel» en este paralelismo.
theological_decisions:
- issue: Referente de ἐκεῖνος
  english_pob_reading: The pronoun refers most naturally to Christ in the immediate context, but is left as 'he' in the main text.
  chosen_spanish_reading: El pronombre se mantiene como «él» en el texto principal, dejando abierta la referencia más natural a Cristo sin resolverla de forma explícita.
  alternative_spanish_readings:
  - Dios/Father as the referent
  - Cristo explícitamente en el texto principal
  rationale: La referencia de ἐκεῖνος puede entenderse como Cristo en el contexto cercano, pero el griego no lo nombra de forma explícita. Mantener «él» conserva esa tensión interpretativa y evita cerrar el sentido más de lo que el texto base exige.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La base inglesa revisada pasó de «that one» a «he» para mayor naturalidad, manteniendo el referente probable. El español sigue esa misma decisión pragmática, pero conserva la tensión teológica del demostrativo mediante una nota.
  spanish_consistency_notes:
  - Se mantiene «justicia/justo» como par léxico para reflejar δικαιοσύνη/δίκαιος.
  - Se traduce δοῦλος no aplica en este versículo; no se introduce terminología ajena.
  - Se usa «Yahvé» solo cuando el texto lo requiera; no aparece en este versículo.
  - El estilo procura ser bíblico y natural, sin arcaísmos innecesarios.
