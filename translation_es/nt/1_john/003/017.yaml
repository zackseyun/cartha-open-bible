translation:
  language: es
  text: Pero quien tenga los bienes de este mundo y vea a su hermano[a] teniendo necesidad, y cierre su corazón contra él[b], ¿cómo permanece en él el amor de Dios[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermano o hermana»; el griego dice «hermano» y puede referirse representativamente a un creyente cercano.
    reason: lexical_alternative
  - marker: b
    text: O «cierra su compasión contra él»; literalmente, «cierra sus entrañas contra él», un modismo para retener la compasión del corazón.
    reason: lexical_alternative
  - marker: c
    text: «El amor de Dios» puede significar el amor de Dios presente en la persona, o el amor de la persona por Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: βίον τοῦ κόσμου
  english_pob_choice: the world's goods
  chosen_spanish: los bienes de este mundo
  alternatives_spanish:
  - los recursos de este mundo
  - las posesiones de este mundo
  - los bienes del mundo
  lexicon: BDAG
  rationale: βίος aquí apunta a medios materiales de sustento o posesiones concretas. En español, «los bienes de este mundo» comunica de forma natural ese sentido de recursos materiales, sin reducirlo a «vida» en abstracto.
- source_word: θεωρῇ
  english_pob_choice: sees
  chosen_spanish: vea
  alternatives_spanish:
  - observe
  - mire
  - note
  lexicon: BDAG
  rationale: θεωρέω expresa ver/percibir con atención; en esta exhortación ética, «vea» es la forma más directa y natural en español para una percepción real de la necesidad del hermano.
- source_word: ἀδελφὸν
  english_pob_choice: brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano o hermana
  - su hermano en la fe
  - su creyente hermano
  lexicon: BDAG
  rationale: La forma griega es masculina singular y el POB inglés preserva «brother» en el texto principal. En español, «su hermano» conserva esa forma lexical sin neutralizarla, mientras el alcance representativo puede explicarse en nota.
- source_word: χρείαν ἔχοντα
  english_pob_choice: in need
  chosen_spanish: en necesidad
  alternatives_spanish:
  - necesitado
  - teniendo necesidad
  - faltado de lo necesario
  lexicon: BDAG
  rationale: La expresión participial significa literalmente «teniendo necesidad». «En necesidad» es una formulación española clara y fiel, y mantiene el estado de carencia sin añadir contenido interpretativo.
- source_word: κλείσῃ τὰ σπλάγχνα αὐτοῦ ἀπ’ αὐτοῦ
  english_pob_choice: closes his heart against him
  chosen_spanish: cierre su corazón contra él
  alternatives_spanish:
  - retraiga su compasión de él
  - cierre sus entrañas contra él
  - le niegue su compasión
  lexicon: BDAG
  rationale: σπλάγχνα designa literalmente las entrañas y, por extensión idiomática, las entrañas de compasión o afecto profundo. «Cierre su corazón contra él» reproduce bien el valor idiomático en español contemporáneo y conserva la fuerza deliberada del rechazo.
- source_word: πῶς
  english_pob_choice: how does
  chosen_spanish: ¿cómo
  alternatives_spanish:
  - ¿de qué manera
  - ¿cómo puede
  lexicon: BDAG
  rationale: La pregunta retórica de πῶς se conserva de modo simple con «¿cómo», sin intensificarla con una modalidad adicional que el griego no exige.
- source_word: ἡ ἀγάπη τοῦ θεοῦ
  english_pob_choice: the love of God
  chosen_spanish: el amor de Dios
  alternatives_spanish:
  - el amor de Dios hacia nosotros
  - el amor a Dios
  - el amor de parte de Dios
  lexicon: BDAG
  rationale: Se mantiene el genitivo literalmente para no resolver la ambigüedad del griego. «El amor de Dios» preserva tanto la posibilidad de amor de Dios en el creyente como la del amor del creyente por Dios, sin cerrar la tensión teológica.
- source_word: μένει ἐν αὐτῷ
  english_pob_choice: remain in him
  chosen_spanish: permanece en él
  alternatives_spanish:
  - habita en él
  - sigue en él
  - permanece dentro de él
  lexicon: BDAG
  rationale: μένω es un verbo joánico clave. «Permanece» conserva el aspecto durativo y relacional de forma natural en español; «en él» respeta la construcción preposicional sin forzar una paráfrasis.
theological_decisions:
- issue: Ambigüedad del genitivo en «ἡ ἀγάπη τοῦ θεοῦ»
  english_pob_reading: Rendered literally as 'the love of God' without resolving whether it means God's love in the person or the person's love for God.
  chosen_spanish_reading: «el amor de Dios», sin especificar si se trata del amor de Dios presente en la persona o del amor de la persona por Dios.
  alternative_spanish_readings:
  - el amor de Dios hacia nosotros
  - el amor a Dios
  rationale: El griego admite más de una relación genitiva, y el contexto joánico puede sostener ambas. La traducción literal conserva la tensión teológica en vez de resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Alcance representativo de «ἀδελφὸν»
  english_pob_reading: brother
  chosen_spanish_reading: «su hermano» en el texto principal, con posible referencia representativa a un hermano o hermana.
  alternative_spanish_readings:
  - su hermano o hermana
  - su hermano en la fe
  rationale: La forma griega es masculina singular y el POB inglés la mantiene así. El español principal conserva esa forma, mientras la amplitud representativa puede explicitarse en una nota para no borrar la forma lexical del original.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el audit trail inglés del POB, sin introducir revisiones no atestiguadas. Se preserva la ambigüedad teológica documentada en «el amor de Dios», y se mantiene el valor idiomático de σπλάγχνα mediante una equivalencia española natural.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, de acuerdo con el estándar del proyecto.
  - Se conserva «hermano» en el texto principal para reflejar la forma masculina singular del griego.
  - Se traduce βίος como recursos/bienes materiales en este contexto, no como «vida» en abstracto.
  - Se evita «SEÑOR» porque el versículo no contiene κύριος ni un reemplazo del nombre divino.
  - Se mantiene un tono formal y publicable, con puntuación española y pregunta retórica final bien marcada.
