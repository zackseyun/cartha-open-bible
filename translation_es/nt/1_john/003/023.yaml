    changes_summary: 'Changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal register and consistency with the Greek name/title; removed the comma after ''Son''; and revised ''gave us a command'' to ''gave us command'' to reflect the anarthrous Greek more naturally in formal translation. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Y este es su mandamiento: que creamos en el nombre de su Hijo Jesús Mesías y nos amemos unos a otros, así como nos dio un mandamiento.'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐντολή
  english_pob_choice: command
  chosen_spanish: mandamiento
  alternatives_spanish:
  - orden
  - precepto
  lexicon: BDAG
  rationale: «Mandamiento» comunica bien la fuerza autoritativa del sustantivo y suena natural en español bíblico sin volverlo arcaico. Mantiene la repetición del mismo término en ambas ocurrencias.
- source_word: ἵνα πιστεύσωμεν
  english_pob_choice: that we believe
  chosen_spanish: que creamos
  alternatives_spanish:
  - que creamos
  - para que creamos
  lexicon: BDAG
  rationale: Después de «este es su mandamiento», ἵνα introduce el contenido del mandamiento. «Que creamos» conserva la subordinación y la fuerza exhortativa sin sobrecargar el español.
- source_word: πιστεύω
  english_pob_choice: believe
  chosen_spanish: creamos
  alternatives_spanish:
  - creamos
  - confiemos
  lexicon: BDAG
  rationale: «Creer» es el equivalente más directo y natural en el uso joánico. «Confiar» es posible, pero en español puede desplazar el énfasis desde la convicción/fe hacia una sola matiz afectiva.
- source_word: τῷ ὀνόματι
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - en el nombre
  - en la autoridad del nombre
  lexicon: BDAG
  rationale: La construcción española estándar con πιστεύω es «creer en el nombre». Conserva el valor bíblico de «nombre» como identidad revelada y autoridad de la persona.
- source_word: υἱοῦ
  english_pob_choice: Son
  chosen_spanish: Hijo
  alternatives_spanish:
  - Hijo
  lexicon: BDAG
  rationale: «Hijo» mantiene el sentido relacional y cristológico del griego. En español, el poseedor «su Hijo» ya deja claro el referente divino.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título, no como simple apellido religioso. «Jesús Mesías» sigue la política terminológica del proyecto y evita reemplazar el matiz titulatorio por una forma convencionalizada.
- source_word: ἀγαπῶμεν
  english_pob_choice: love
  chosen_spanish: nos amemos
  alternatives_spanish:
  - nos amemos
  - amemos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se refleja de forma natural con «nos amemos». Añadir el recíproco explícito ayuda a transparentar ἀλλήλους sin forzar el orden español.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - unos a otros
  - entre nosotros
  lexicon: BDAG
  rationale: «Unos a otros» es la expresión recíproca estándar y clara en español, adecuada para el imperativo comunitario de 1 Juan.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - así como
  - del mismo modo que
  lexicon: BDAG
  rationale: «Así como» expresa correspondencia/comparación con buen ritmo en español bíblico moderno.
- source_word: ἔδωκεν ἐντολὴν ἡμῖν
  english_pob_choice: gave us command
  chosen_spanish: nos dio mandamiento
  alternatives_spanish:
  - nos dio mandamiento
  - nos dio un mandamiento
  lexicon: BDAG
  rationale: El griego usa un sustantivo sin artículo; en español, omitirlo suena más marcado o arcaizante que el griego. «Nos dio mandamiento» conserva la concisión y la repetición léxica con la primera mención.
theological_decisions:
- issue: Χριστός como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titular de Χριστός. En este contexto identifica al Hijo de Dios con su función mesiánica, no como un nombre fijo castellanizado.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός'
- issue: τῷ ὀνόματι con πιστεύω
  english_pob_reading: believe in the name
  chosen_spanish_reading: creer en el nombre
  alternative_spanish_readings:
  - confiar en el nombre
  - creer al nombre
  rationale: La expresión conserva la referencia joánica a la fe dirigida a la persona revelada por su nombre. «Creer en el nombre» es la forma española más transparente y natural.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción evita el problema detectado en la validación anterior: no se incluyen notas al pie sin anclaje en el texto. También se mantiene «Mesías» según la política terminológica del proyecto y se usa una sintaxis española natural para el cierre anartro («nos dio mandamiento») sin recurrir a una nota textual innecesaria.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός por consistencia terminológica del proyecto.
  - Se mantiene la repetición de «mandamiento» para reflejar ἐντολή en ambos miembros.
  - «Creer en el nombre» y no «creer el nombre» conserva el uso joánico y es idiomático en español.
  - Se prefiere un español litúrgico actual pero no arcaizante.
