review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego: mantiene el singular de ἐντολή, la cláusula de contenido con ἵνα, «creer en el nombre» para πιστεύω τῷ ὀνόματι, y «Jesús Mesías» conforme a la decisión doctrinal sobre Χριστός como título. También conserva correctamente el amor recíproco y la comparación final con καθὼς. La única desalineación relevante está en «nos dio mandamiento», que en español suena demasiado forzado/arcaizante y no representa mejor el griego que una forma más natural.'
  spanish_quality_summary: El texto es claro y fiel, pero «nos dio mandamiento» resulta poco idiomático en español actual y baja la legibilidad. «Nos dio un mandamiento» preserva mejor un español natural y digno. El resto del versículo fluye bien; «que creamos», «en el nombre», «Jesús Mesías» y «nos amemos unos a otros» son lecturas sólidas.
  glossary_alignment: 'Buena alineación con la terminología del proyecto: Χριστός → «Mesías» correctamente; Ἰησοῦς → «Jesús»; πιστεύω → «creamos»; ἀγαπῶμεν → «nos amemos». El uso de «mandamiento» para ἐντολή es aceptable en español bíblico. La única mejora recomendada es sintáctica, no terminológica: añadir el artículo indefinido en la segunda ocurrencia.'
  issues:
  - severity: medium
    issue: La frase «así como nos dio mandamiento» suena poco natural en español contemporáneo.
    rationale: Aunque el griego tiene ἔδωκεν ἐντολὴν ἡμῖν sin artículo, en español «dar mandamiento» es marcadamente arcaizante y menos legible. «Nos dio un mandamiento» comunica el mismo sentido y mantiene la dignidad bíblica sin calco innecesario.
  revised_spanish_text: 'Y este es su mandamiento: que creamos en el nombre de su Hijo Jesús Mesías y nos amemos unos a otros, así como nos dio un mandamiento.'
  revision_rationale: Se hace una reparación menor para mejorar la naturalidad del español en la segunda mención de ἐντολή. «Nos dio un mandamiento» refleja fielmente ἔδωκεν ἐντολὴν ἡμῖν y evita un calco rígido. No se requieren notas, porque no se introduce nueva ambigüedad ni se pierde ninguna alternativa preservada en el expediente inglés.
