- from: 'Y este es su mandamiento: que creamos en el nombre de su Hijo Jesús Mesías y nos amemos unos a otros, así como nos dio mandamiento.'
  to: 'Y este es su mandamiento: que creamos en el nombre de su Hijo Jesús Mesías y nos amemos unos a otros, así como nos dio un mandamiento.'
  rationale: Se hace una reparación menor para mejorar la naturalidad del español en la segunda mención de ἐντολή. «Nos dio un mandamiento» refleja fielmente ἔδωκεν ἐντολὴν ἡμῖν y evita un calco rígido. No se requieren notas, porque no se introduce nueva ambigüedad ni se pierde ninguna alternativa preservada en el expediente inglés.
