  text: καὶ αὕτη ἐστὶν ἡ ἐντολὴ αὐτοῦ, ἵνα ⸀πιστεύσωμεν τῷ ὀνόματι τοῦ υἱοῦ αὐτοῦ Ἰησοῦ Χριστοῦ καὶ ἀγαπῶμεν ἀλλήλους, καθὼς ἔδωκεν ἐντολὴν ⸀ἡμῖν.
base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/023.yaml
  text: 'And this is his command: that we believe in the name of his Son Jesus Messiah and love one another[d][c][b][a], just as he gave us command.'
  footnotes:
