translation:
  language: es
  text: No se asombren[a], hermanos, si el mundo los odia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce la forma masculina plural y aquí probablemente se dirige a toda la comunidad de creyentes, incluyendo a las mujeres.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ θαυμάζετε
  english_pob_choice: Do not be surprised
  chosen_spanish: No se asombren
  alternatives_spanish:
  - No se maravillen
  - No se sorprendan
  lexicon: BDAG
  rationale: El imperativo presente con μή expresa una prohibición. En español, «asombrarse» comunica de manera natural la idea de quedar sorprendido o extrañado sin sonar arcaico como «maravillarse» ni excesivamente débil como «sorprenderse» en algunos contextos.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  - familia
  lexicon: BDAG
  rationale: El vocativo plural masculino se conserva como forma de dirección. En español, «hermanos» mantiene la forma gramatical y puede abarcar representativamente a toda la comunidad creyente; la posible inclusión de mujeres queda explicada en nota.
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - puesto que
  lexicon: BDAG
  rationale: La partícula condicional se traduce con el condicional simple «si», sin convertirlo en una explicación causal o temporal que vaya más allá del griego.
- source_word: μισεῖ
  english_pob_choice: hates
  chosen_spanish: odia
  alternatives_spanish:
  - detesta
  - aborrece
  lexicon: BDAG
  rationale: El presente indicativo activo pide una afirmación general y actual. «Odia» reproduce con claridad la fuerza léxica de μισέω sin intensificar indebidamente el sentido.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el sistema del mundo
  - la sociedad opuesta a Dios
  lexicon: BDAG
  rationale: En el uso joánico, κόσμος tiene peso teológico, pero la forma básica «el mundo» conserva ese campo semántico sin introducir una expansión interpretativa en el texto principal.
theological_decisions:
- issue: Dirección masculina plural en ἀδελφοί
  english_pob_reading: Retain 'brothers' in the main text
  chosen_spanish_reading: Mantener «hermanos» en el texto principal
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se preserva la forma masculina plural del vocativo como rasgo del original, y se deja constancia en nota de que probablemente incluye a toda la comunidad de creyentes. Esto sigue la política de fidelidad a la forma gramatical sin perder la referencia comunitaria.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Sentido joánico de κόσμος
  english_pob_reading: Render as 'the world' without interpretive expansion
  chosen_spanish_reading: Traducir «el mundo» sin expansión interpretativa
  alternative_spanish_readings:
  - el sistema del mundo
  - la humanidad en rebelión contra Dios
  rationale: Se conserva el término joánico básico para no sustituir el alcance del sustantivo por una glosa doctrinal en el cuerpo del versículo. El matiz teológico puede explicarse en notas o en el contexto inmediato.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 y §6
translation_notes:
  revision_awareness: Coincide con el último repaso revisado como sin cambios necesarios; no se aplicaron revisiones adicionales respecto del texto base auditado.
  spanish_consistency_notes:
  - Se mantiene el trato directo en segunda persona plural con el pronombre enclítico «los» para reflejar ὑμᾶς de forma natural en español.
  - Se evita «maravillarse» en el texto principal porque en español puede sonar más literario o arcaico que la fuerza idiomática de θαυμάζω aquí.
  - «El mundo» conserva la ambigüedad teológica joánica sin añadir paráfrasis como «sistema del mundo» al texto principal.
