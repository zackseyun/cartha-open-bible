translation:
  language: es
  text: Sabemos que hemos pasado de la muerte a la vida[a], porque amamos a los hermanos. El que no ama permanece en la muerte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hermanos y hermanas»; el griego dice «hermanos» y, en este contexto, probablemente se refiere a los creyentes en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - hemos conocido
  - conocemos
  lexicon: BDAG
  rationale: Οἶδα en perfecto con valor estativo funciona como un presente de conocimiento. «Sabemos» expresa de manera natural ese estado actual y mantiene la fuerza aspectual sin sonar forzado.
- source_word: μεταβεβήκαμεν
  english_pob_choice: we have passed
  chosen_spanish: hemos pasado
  alternatives_spanish:
  - hemos cruzado
  - hemos transferido
  lexicon: BDAG
  rationale: El perfecto comunica un tránsito ya cumplido con resultado continuo. «Hemos pasado» conserva la metáfora de movimiento y el estado resultante.
- source_word: ἐκ τοῦ θανάτου εἰς τὴν ζωήν
  english_pob_choice: from death into life
  chosen_spanish: de la muerte a la vida
  alternatives_spanish:
  - fuera de la muerte hacia la vida
  - de muerte a vida
  lexicon: BDAG
  rationale: La pareja ἐκ...εἰς marca salida de una esfera y entrada en otra. «De la muerte a la vida» es claro en español; «a» comunica el valor direccional de εἰς de forma idiomática, aunque «hacia» también sería posible.
- source_word: ἀγαπῶμεν
  english_pob_choice: we love
  chosen_spanish: amamos
  alternatives_spanish:
  - seguimos amando
  - estamos amando
  lexicon: BDAG
  rationale: El presente indica acción característica o continua. «Amamos» es el equivalente natural en español para el verbo ἀγαπάω en este contexto, sin necesidad de perífrasis.
- source_word: τοὺς ἀδελφούς
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los hermanos en la fe
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego en el texto principal. En este contexto puede referirse a creyentes en general, pero la traducción no suaviza la forma fuente; la alternativa inclusiva se explica en nota.
- source_word: ὁ μὴ ἀγαπῶν
  english_pob_choice: the one who does not love
  chosen_spanish: El que no ama
  alternatives_spanish:
  - Quien no ama
  - El que no está amando
  lexicon: BDAG
  rationale: El participio con artículo designa una clase general de persona. «El que no ama» es una construcción natural en español y mantiene el valor genérico singular.
- source_word: μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - abide
  - sigue
  lexicon: BDAG
  rationale: μένω es un verbo joánico importante. Aquí «permanece» comunica continuidad de estado de forma clara y conserva el matiz de permanencia; «abide» sería demasiado marcado en español.
- source_word: ἐν τῷ θανάτῳ
  english_pob_choice: in death
  chosen_spanish: en la muerte
  alternatives_spanish:
  - en muerte
  - en el ámbito de la muerte
  lexicon: BDAG
  rationale: La preposición expresa permanencia en una esfera metafórica. «En la muerte» mantiene la concisión del griego sin expandir la imagen más allá de lo que el texto dice.
theological_decisions:
- issue: Alcance de ἀδελφοί y posible inclusividad
  english_pob_reading: Rendered as 'the brothers' in the main text, with the likely inclusive sense preserved in a footnote.
  chosen_spanish_reading: Se mantiene «los hermanos» en el texto principal, con nota sobre el posible sentido inclusivo.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: El griego es masculino plural; la política de fidelidad de género preserva la forma fuente. La nota evita borrar la posible referencia amplia a la comunidad de creyentes sin imponerla en el cuerpo del texto.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Naturaleza metafórica de 'muerte' y 'vida'
  english_pob_reading: Retained as 'death' and 'life' without interpretive expansion.
  chosen_spanish_reading: Se conservan «muerte» y «vida» sin ampliar a «muerte espiritual» o «vida eterna».
  alternative_spanish_readings:
  - muerte espiritual y vida eterna
  - reino de la muerte y reino de la vida
  rationale: El versículo afirma un cambio real y teológicamente profundo, pero lo expresa de forma compacta. Mantener los términos sin expansión preserva la tensión del texto y evita añadir precisión no explícita en el griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: 'Coincide con el último repaso: no se requieren cambios respecto del sentido base ni de las decisiones léxicas y teológicas principales. La formulación española sigue de cerca el audit trail inglés y el griego, con una sola nota para la posible inclusividad de ἀδελφοί.'
  spanish_consistency_notes:
  - Se mantuvo el perfecto compuesto «hemos pasado» para reflejar un estado resultante vigente.
  - Se eligió «permanece» para μένει por claridad moderna y continuidad joánica.
  - Se preservó «los hermanos» en el cuerpo principal, evitando neutralización no atestiguada en el texto fuente.
  - La preposición direccional del griego se expresó con «a» en español por idiomaticidad y fidelidad semántica.
