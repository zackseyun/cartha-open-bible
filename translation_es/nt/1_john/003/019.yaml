translation:
  language: es
  text: Por esto sabremos que somos de la verdad[a], y delante de él convenceremos nuestro corazón[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «somos de la verdad» en el sentido de «pertenecemos a la verdad».
    reason: lexical_alternative
  - marker: b
    text: O «persuadiremos nuestro corazón»; también puede entenderse como «sosegaremos nuestro corazón» o «lo pondremos en paz delante de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - En esto
  - Por medio de esto
  lexicon: BDAG
  rationale: La expresión es idiomática y señala el medio o la base de lo que sigue. «Por esto» transmite naturalmente la relación instrumental en español y conserva la fuerza demostrativa sin añadir explicación.
- source_word: γνωσόμεθα
  english_pob_choice: we will know
  chosen_spanish: sabremos
  alternatives_spanish:
  - llegaremos a saber
  - conoceremos
  lexicon: BDAG
  rationale: El futuro de γινώσκω se expresa con claridad en «sabremos». Es una forma natural y fiel, sin sobrecargar el matiz ingresivo.
- source_word: ἐκ τῆς ἀληθείας ἐσμέν
  english_pob_choice: we are from the truth
  chosen_spanish: somos de la verdad
  alternatives_spanish:
  - somos procedentes de la verdad
  - pertenecemos a la verdad
  lexicon: BDAG
  rationale: ἐκ con ἀλήθεια puede indicar origen o procedencia. En español, «de la verdad» conserva esa relación sin sonar forzado. Se mantiene la tensión teológica de pertenencia/origen sin resolverla en una paráfrasis doctrinal.
- source_word: ἀληθείας
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - verdad divina
  - la verdad
  lexicon: BDAG
  rationale: «Verdad» es el equivalente directo y suficiente. En este contexto joánico tiene peso teológico, pero el verso no exige ampliarlo en el texto principal.
- source_word: ἔμπροσθεν αὐτοῦ
  english_pob_choice: before him
  chosen_spanish: delante de él
  alternatives_spanish:
  - en su presencia
  lexicon: BDAG
  rationale: La locución es espacial-relacional. «Delante de él» es breve, fiel y natural en español; «en su presencia» es una alternativa válida pero algo más interpretativa.
- source_word: πείσομεν
  english_pob_choice: we will persuade
  chosen_spanish: persuadiremos
  alternatives_spanish:
  - convenceremos
  - tranquilizaremos
  - sosegaremos
  lexicon: BDAG
  rationale: Se conserva el verbo de persuadir para reflejar más directamente πείθω, siguiendo la revisión del audit trail. En este contexto, el objeto es el corazón, así que el sentido es interior y no meramente argumentativo.
- source_word: τὴν καρδίαν ἡμῶν
  english_pob_choice: our hearts
  chosen_spanish: nuestro corazón
  alternatives_spanish:
  - nuestros corazones
  - nuestra conciencia
  lexicon: BDAG
  rationale: Aunque el griego tiene singular, el español permite y prefiere el singular colectivo «nuestro corazón» para mantener cercanía formal con el original. Se evita «conciencia» porque introduce una especificación no explícita en el texto.
theological_decisions:
- issue: Origen/pertenencia en «ἐκ τῆς ἀληθείας ἐσμέν»
  english_pob_reading: Retain the source-oriented expression 'from the truth' without resolving it into a stronger doctrinal paraphrase such as 'truly belong to God.'
  chosen_spanish_reading: Conservar «somos de la verdad» sin convertirlo en una afirmación doctrinal más específica.
  alternative_spanish_readings:
  - pertenecemos a la verdad
  - somos verdaderamente de Dios
  rationale: El verso habla en categorías joánicas de verdad y seguridad, pero no explicita aquí sus implicaciones metafísicas o eclesiales. Mantener la formulación evita añadir conclusiones que el texto no formula.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de πείσομεν con «corazón»
  english_pob_reading: Render as inward reassurance before God rather than forensic self-justification.
  chosen_spanish_reading: Traducir como una acción interior de persuadir el corazón delante de Dios, sin reducirla a autodefensa forense.
  alternative_spanish_readings:
  - tranquilizaremos nuestro corazón
  - convenceremos a nuestro corazón
  rationale: El contexto inmediato trata de la seguridad ante Dios. «Persuadiremos nuestro corazón» conserva el vínculo con πείθω y deja abierta la gama semántica de apaciguar/convencer sin forzar una lectura jurídica.
  doctrine_reference: Primacía del original sobre la tradición; preservar la tensión teológica.
translation_notes:
  revision_awareness: El audit trail inglés revisó πείσομεν desde «reassure» a «persuade» para reflejar más directamente el verbo πείθω. Esta versión española sigue esa revisión y conserva «persuadiremos» en el texto principal, dejando en nota las alternativas contextuales de apaciguar/convencer. También mantiene «de la verdad» para reflejar ἐκ τῆς ἀληθείας sin resolver la ambigüedad teológica.
  spanish_consistency_notes:
  - Se usa «Dios» no porque aparezca explícitamente en este verso, sino porque el «él» del contexto inmediato se refiere a Dios; el texto principal conserva el pronombre conforme al griego.
  - Se eligió «corazón» en singular para preservar la cercanía formal con τὴν καρδίαν, aunque en español pluralizar sería posible.
  - «Por esto» mantiene el valor de medio/basis de ἐν τούτῳ sin sobreexplicar.
  - No se usa «Cristo» ni otra terminología cristológica porque el verso no la contiene.
  - La puntuación y el orden están ajustados al español contemporáneo sin perder la sintaxis relacional del griego.
