base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/003.yaml
  text: And everyone who has this hope set on him purifies himself[b][a], just as he is pure.
  footnotes:
  - marker: a
    text: Or 'has this hope in him.' The Greek phrase can be rendered either way; 'set on him' makes the object of hope more explicit.
    reason: lexical_alternative
  - marker: b
    text: '''That one'' most likely refers to the Son/Christ in context, though the Greek leaves the referent as a pronoun.'
    reason: alternative_reading
