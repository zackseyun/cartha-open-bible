translation:
  language: es
  text: Y todo el que tiene esta esperanza puesta en él[a] se purifica a sí mismo, así como él[b] es puro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en él». La expresión griega puede entenderse como esperanza “puesta en él” o “en él”; la formulación del texto aclara el objeto de la esperanza.'
    reason: lexical_alternative
  - marker: b
    text: El pronombre puede referirse al Hijo/ Cristo en el contexto inmediato, aunque el griego conserva la referencia con un pronombre.
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ ἔχων
  english_pob_choice: everyone who has
  chosen_spanish: todo el que tiene
  alternatives_spanish:
  - cada uno que tiene
  - todo el que posee
  lexicon: BDAG
  rationale: El participio articular funciona de manera sustantiva y general. En español, «todo el que tiene» comunica con naturalidad el sentido genérico y continuo sin forzar una construcción más mecánica.
- source_word: ἐλπίδα
  english_pob_choice: hope
  chosen_spanish: esperanza
  alternatives_spanish:
  - esperanza confiada
  - expectativa
  lexicon: BDAG
  rationale: «Esperanza» es la equivalencia natural y fiel para ἐλπίς en este contexto de expectativa segura, no de deseo incierto.
- source_word: ταύτην
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta misma
  lexicon: BDAG
  rationale: El demostrativo remite a la esperanza mencionada en el contexto inmediato; «esta» es suficiente y claro en español.
- source_word: ἐπ’ αὐτῷ
  english_pob_choice: set on him
  chosen_spanish: puesta en él
  alternatives_spanish:
  - en él
  - apoyada en él
  lexicon: BDAG
  rationale: La preposición con dativo expresa el objeto o el apoyo de la esperanza. «Puesta en él» conserva la imagen relacional con una formulación idiomática en español y evita una mecánica calca de «en él» sin aclaración.
- source_word: ἁγνίζει
  english_pob_choice: purifies
  chosen_spanish: se purifica
  alternatives_spanish:
  - se limpia
  - se santifica
  lexicon: BDAG
  rationale: ἁγνίζω alude a purificación, con matiz moral y también ritual. En español, «se purifica» preserva el vínculo léxico con ἁγνός («puro») y refleja bien el proceso verbal.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  lexicon: BDAG
  rationale: Aunque el griego es masculino singular, el antecedente es genérico. «A sí mismo» expresa el reflexivo sin perder la forma natural del español; el sentido representativo queda asegurado por «todo el que».
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: así como
  alternatives_spanish:
  - tal como
  - igual que
  lexicon: BDAG
  rationale: «Así como» marca comparación de manera clara y digna en español, equivalente a «just as».
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - aquél
  - ese
  lexicon: BDAG
  rationale: El demostrativo griego se mantiene de manera sobria con «él» por la referencialidad inmediata y la fluidez en español. La posible carga reverencial queda preservada en la nota, sin añadir un título que el texto no nombra.
- source_word: ἁγνός
  english_pob_choice: pure
  chosen_spanish: puro
  alternatives_spanish:
  - limpio
  - sin mancha
  lexicon: BDAG
  rationale: «Puro» es la mejor correspondencia léxica y mantiene la relación de palabra con «se purifica».
theological_decisions:
- issue: Referente de los pronombres ἐπ’ αὐτῷ y ἐκεῖνος
  english_pob_reading: Both most naturally refer to Christ/the Son in the immediate context, but the translation leaves the pronouns explicit rather than replacing them with a title.
  chosen_spanish_reading: Los pronombres quedan explícitos con «él», dejando abierto que el contexto inmediato los refiera a Cristo/el Hijo sin forzar una identificación en el texto español.
  alternative_spanish_readings:
  - poner «Cristo» o «el Hijo» en el texto
  - usar una nota que resuelva totalmente el referente
  rationale: El contexto favorece la referencia cristológica, pero el griego usa pronombres. El español debe conservar esa tensión y evitar resolverla de modo más fuerte que el original.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor del reflexivo ἑαυτὸν
  english_pob_reading: Render as 'himself' in line with the masculine singular generic construction.
  chosen_spanish_reading: «a sí mismo» conserva el valor reflexivo sin imponer una forma masculina donde el español puede expresar el mismo alcance genérico mediante el antecedente «todo el que».
  alternative_spanish_readings:
  - «él mismo»
  - «uno mismo»
  rationale: La construcción española idiomática permite mantener el sentido representativo y la referencia al sujeto individual sin perder naturalidad.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada pasó de «that one» a «he» para mayor naturalidad, pero mantuvo el referente cristológico implícito. En español se refleja esa misma decisión: se conserva el pronombre «él» y no se sustituye por un título, mientras se explica la alternativa léxica de ἐπ’ αὐτῷ en una nota breve.'
  spanish_consistency_notes:
  - Se preserva la relación léxica entre «se purifica» y «puro» para reflejar ἁγνίζει/ἁγνός.
  - Se mantiene el tono universal de πᾶς ὁ ἔχων con «todo el que tiene».
  - La preposición y el dativo de ἐπ’ αὐτῷ se resuelven con una frase idiomática («puesta en él») para evitar una calca innecesaria.
  - No se introduce «Cristo» en el texto principal para no resolver más de lo que el griego dice explícitamente.
