translation:
  language: es
  text: 'Porque este es el mensaje que ustedes han oído desde el principio: que debemos amarnos unos a otros[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que ustedes oyeron desde el principio».
    reason: lexical_alternative
  - marker: b
    text: O «para que nos amemos unos a otros»; o «amémonos unos a otros».
    reason: alternative_reading
lexical_decisions:
- source_word: Ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  - Puesto que
  lexicon: BDAG
  rationale: En este contexto Ὅτι introduce la explicación de la afirmación anterior. «Porque» conserva ese valor explicativo en español con naturalidad y sin endurecer el estilo.
- source_word: αὕτη ἐστὶν
  english_pob_choice: this is
  chosen_spanish: este es
  alternatives_spanish:
  - esto es
  - esta es
  lexicon: BDAG
  rationale: El referente inmediato es «el mensaje» (ἀγγελία), que en español es masculino; por eso «este es» mantiene la demostración directa del griego y concuerda con el sustantivo.
- source_word: ἀγγελία
  english_pob_choice: message
  chosen_spanish: mensaje
  alternatives_spanish:
  - anuncio
  - proclamación
  lexicon: BDAG
  rationale: «Mensaje» es el equivalente natural y claro en español para ἀγγελία en este contexto joánico. «Anuncio» o «proclamación» serían posibles, pero menos idiomáticos aquí.
- source_word: ἣν ἠκούσατε
  english_pob_choice: that you have heard
  chosen_spanish: que ustedes han oído
  alternatives_spanish:
  - que oyeron
  - que ustedes oyeron
  - la cual ustedes han oído
  lexicon: BDAG
  rationale: El pasado griego se traduce con perfectivo natural en español para una enseñanza recibida con vigencia continua. «Han oído» conserva mejor esa recepción perdurable que un simple pretérito.
- source_word: ἀπ’ ἀρχῆς
  english_pob_choice: from the beginning
  chosen_spanish: desde el principio
  alternatives_spanish:
  - desde el comienzo
  - desde el inicio
  lexicon: BDAG
  rationale: Es la fórmula joánica estándar; «desde el principio» preserva el eco intertextual y la resonancia teológica habitual en 1 Juan.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: Aquí ἵνα introduce el contenido del mensaje. En español, «que» expresa mejor esa cláusula declarativa sin sobrecargarla con un matiz final que el contexto no exige.
- source_word: ἀγαπῶμεν
  english_pob_choice: we should love
  chosen_spanish: debemos amarnos
  alternatives_spanish:
  - amemos
  - debemos amar
  lexicon: BDAG
  rationale: El subjuntivo presente con ἵνα expresa aquí el contenido ético del mensaje. «Debemos amarnos» conserva el peso normativo sin convertir la frase en una exhortación litúrgica directa.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre nosotros
  lexicon: BDAG
  rationale: «Unos a otros» es la forma recíproca natural en español y refleja bien la reciprocidad comunitaria del griego.
theological_decisions:
- issue: Valor de ἵνα ἀγαπῶμεν ἀλλήλους
  english_pob_reading: 'Rendered as the content/ethical thrust of the message: ''that we should love one another.'''
  chosen_spanish_reading: «que debemos amarnos unos a otros»
  alternative_spanish_readings:
  - «para que nos amemos unos a otros»
  - «amémonos unos a otros»
  - «que nos amemos unos a otros»
  rationale: La cláusula no se entiende sólo como finalidad, sino como el contenido normativo del mensaje recibido desde el principio. «Debemos» comunica bien la fuerza moral sin reducirla a un mero llamado litúrgico ni debilitarla a posibilidad.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: La versión inglesa auditada no requirió cambios en la evaluación final; se mantuvieron las decisiones léxicas y la lectura teológica de la cláusula con ἵνα, adaptándolas a un español natural y fiel al griego.
  spanish_consistency_notes:
  - Se mantuvo «desde el principio» por coherencia con el lenguaje joánico habitual.
  - Se prefirió «mensaje» frente a opciones más solemnes como «proclamación» para conservar claridad.
  - La reciprocidad se expresó con «unos a otros», la forma más natural y estándar en español bíblico contemporáneo.
  - Se evitó «Cristo/SEÑOR» porque este versículo no contiene esos términos y no los requiere por alusión.
