translation:
  language: es
  text: Todo el que practica el pecado también practica la falta de ley[a][b], y el pecado es la falta de ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todo el que hace el pecado también hace la falta de ley»; los presentes griegos pueden traducirse más literalmente con «hace», pero aquí «practica» expresa mejor el sentido característico o continuo del contexto.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «y el pecado es la falta de ley». El griego usa el artículo con ambos sustantivos; en español esta declaración definicional puede expresarse de forma natural conservando «la» en ambas expresiones.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πᾶς ὁ ποιῶν
  english_pob_choice: Everyone who practices
  chosen_spanish: Todo el que practica
  alternatives_spanish:
  - Todo el que hace
  - Quienquiera que comete
  lexicon: BDAG
  rationale: El participio presente articular tiene fuerza genérica y de conducta característica. «Todo el que practica» conserva ese sentido de acción continua o habitual sin convertirlo en una técnica verbal rígida. «Todo el que» preserva el alcance universal y evita un masculino genérico innecesario.
- source_word: τὴν ἁμαρτίαν
  english_pob_choice: sin
  chosen_spanish: el pecado
  alternatives_spanish:
  - el pecado concreto
  - pecado
  lexicon: BDAG
  rationale: Aunque el griego lleva artículo, en español la forma natural y fiel aquí es «el pecado» como categoría. Se conserva el peso abstracto y general del sustantivo sin añadir especificación inexistente en el texto.
- source_word: τὴν ἀνομίαν ποιεῖ
  english_pob_choice: also practices lawlessness
  chosen_spanish: también practica la maldad
  alternatives_spanish:
  - también hace la maldad
  - también practica la anarquía
  - también obra sin ley
  lexicon: BDAG
  rationale: «ἀνομία» nombra literalmente ausencia de ley o condición contraria a la ley. En español, «maldad» comunica la fuerza moral del término de manera natural, pero deja una ligera tensión interpretativa; por eso se conserva el matiz en la decisión teológica y se evita una paráfrasis explicativa más larga en el texto principal. Se repite «practica» para mantener el paralelismo verbal con ποιῶν / ποιεῖ.
- source_word: ἀνομία
  english_pob_choice: lawlessness
  chosen_spanish: maldad
  alternatives_spanish:
  - desobediencia a la ley
  - infracción de la ley
  - iniquidad
  lexicon: BDAG
  rationale: La equivalencia más directa sería «sin ley» o «desobediencia a la ley», pero en español esa forma puede sonar demasiado técnica o poco idiomática en una afirmación definicional breve. «Maldad» comunica la carga moral del pasaje, aunque no agota el vínculo lexical con νόμος; por eso se explicita la opción en las notas y decisiones para no borrar la tensión semántica del original.
- source_word: καὶ ἡ ἁμαρτία ἐστὶν ἡ ἀνομία
  english_pob_choice: and sin is lawlessness
  chosen_spanish: y el pecado es la maldad
  alternatives_spanish:
  - y el pecado es sin ley
  - y el pecado es desobediencia a la ley
  - y el pecado es iniquidad
  lexicon: BDAG
  rationale: La cláusula es definicional y el griego repite los artículos. En español suena natural «el pecado es la maldad», manteniendo la identificación fuerte sin sobrecargar la frase con artículos que resultarían extraños. Se conserva el paralelismo conceptual entre pecado y ἀνομία, aunque con una equivalencia semántica más idiomática.
theological_decisions:
- issue: Cómo rendir ἀνομία en una definición breve sin ocultar su relación con ley/νόμος
  english_pob_reading: lawlessness
  chosen_spanish_reading: maldad
  alternative_spanish_readings:
  - sin ley
  - desobediencia a la ley
  - iniquidad
  rationale: El POB inglés preserva la relación léxica con 'law' mediante 'lawlessness'. En español, 'maldad' es una traducción funcionalmente clara para lectores eclesiales, pero no reproduce de manera visible la raíz 'ley'. Por eso la decisión principal privilegia la inteligibilidad, mientras que la nota y las decisiones dejan constancia de la tensión lexical que el texto plantea.
  doctrine_reference: Translation philosophy §1, §3
- issue: Si el presente griego debe reflejar acción puntual o conducta característica
  english_pob_reading: practices
  chosen_spanish_reading: practica
  alternative_spanish_readings:
  - hace
  - comete
  rationale: El presente participial y verbal en el contexto de 1 Juan 3 señala conducta característica. «Practica» comunica mejor esa idea que una forma puntual como «hace» o «comete», y mantiene el tono de patrón de vida que el POB destaca en su audit trail.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el pasaje base; el último paso de revisión informó que no hubo cambios necesarios y el consenso fue de alta concordancia. La versión española conserva esa lectura estable y traduce desde el griego con apoyo del audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «practica» para reflejar la fuerza aspectual del presente, en paralelo para ambos miembros de la oración.
  - Se evita «SEÑOR» u otras sustituciones irrelevantes; el pasaje no contiene el nombre divino.
  - Se usa «el pecado» como categoría general, no como acto aislado, conforme al contexto definicional.
  - La decisión principal respecto de ἀνομία prioriza fluidez española, pero las notas preservan la relación semántica con la ley y evitan borrar la tensión lexical del original.
