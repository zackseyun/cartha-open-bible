translation:
  language: es
  text: 'Y el que guarda sus mandamientos permanece en él, y él en él. Y en esto sabemos que él permanece en nosotros: por el Espíritu[a] que nos dio.[b]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del Espíritu que nos dio». El griego ἐκ puede enfatizar tanto el origen como el medio.
    reason: lexical_alternative
  - marker: b
    text: La traducción tradicional suele usar «permanece» o «habita» para este verbo en todo el versículo; otra opción clásica es «mora».
    reason: lexical_alternative
lexical_decisions:
- source_word: τηρῶν
  english_pob_choice: keeps
  chosen_spanish: guarda
  alternatives_spanish:
  - cumple
  - observa
  - obedece
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, observar u obedecer. «Guarda» comunica bien la idea de custodiar y cumplir mandamientos en un contexto joánico, y en español evita la repetición pesada de «obedece» sin perder la fuerza normativa.
- source_word: ἐντολάς
  english_pob_choice: commandments
  chosen_spanish: mandamientos
  alternatives_spanish:
  - mandatos
  - preceptos
  lexicon: BDAG
  rationale: ἐντολή suele referirse a mandamiento en la literatura joánica. «Mandamientos» conserva el tono bíblico y la carga moral/covenantal del término.
- source_word: μένει / μένει
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - habita
  - se queda
  - permanece en
  lexicon: BDAG
  rationale: μένω es un término clave en Juan y 1 Juan. «Permanece» expresa continuidad relacional y durativa en un español natural y digno.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - en Dios
  lexicon: BDAG
  rationale: El pronombre griego conserva la referencia pronominal; «en él» mantiene esa forma y permite que el antecedente se recupere del contexto inmediato sin introducir el sustantivo «Dios» en el texto principal.
- source_word: ἐν τούτῳ
  english_pob_choice: by this
  chosen_spanish: en esto
  alternatives_spanish:
  - por esto
  - con esto
  lexicon: BDAG
  rationale: La expresión introduce el fundamento o medio de conocimiento. «En esto» es la equivalencia más directa y frecuente en el estilo joánico; no se optó por «por esto» para no desplazar el matiz preposicional del griego.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - reconocemos
  lexicon: BDAG
  rationale: En contexto presente, γινώσκω expresa conocimiento real o reconocimiento. «Sabemos» es natural en español y suficiente para el valor aspectual del presente.
- source_word: ἐκ τοῦ πνεύματος
  english_pob_choice: by the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - desde el Espíritu
  - a partir del Espíritu
  lexicon: BDAG
  rationale: ἐκ puede señalar origen, base o medio. En español, «por el Espíritu» comunica de manera clara la base/evidencia por la que se sabe lo que se afirma, sin perder el vínculo con el don divino.
- source_word: πνεύματος
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: El contexto joánico apunta al Espíritu Santo como don de Dios. La mayúscula en español refleja ese referente personal y teológico.
- source_word: οὗ ἡμῖν ἔδωκεν
  english_pob_choice: whom he gave to us
  chosen_spanish: que nos dio
  alternatives_spanish:
  - a quien nos dio
  - que nos ha dado
  lexicon: BDAG
  rationale: Aunque el antecedente gramatical es neutro, en español resulta más natural decir «el Espíritu que nos dio». Se evita «a quien» por sonar forzado en este contexto y «nos ha dado» porque el aoristo ἔδωκεν no exige un perfecto compuesto en español.
theological_decisions:
- issue: Referente de los pronombres en «permanece en él» / «él en él» / «permanece en nosotros»
  english_pob_reading: The pronouns refer to God, with the final 'he remains in us' likewise referring to God.
  chosen_spanish_reading: Se conserva la referencia pronominal sin nombrar explícitamente a Dios en el texto principal, dejando que el contexto de 1 Juan 3:23 determine el referente.
  alternative_spanish_readings:
  - «permanece en Dios» / «Dios en él» / «permanece en nosotros»
  - «permanece en el Padre»
  rationale: El griego usa pronombres, no el sustantivo. Mantener «él» preserva la forma del original y evita resolver demasiado pronto la referencia, aunque el contexto inmediato apunta a Dios. Esta es una tensión deliberada que el texto debe conservar.
  doctrine_reference: Preservar la primacía del original y la tensión contextual; no sustituir pronombres por identificaciones explícitas sin necesidad textual.
- issue: Valor de ἐκ τοῦ πνεύματος en la frase final
  english_pob_reading: '''by the Spirit whom he gave to us'' with a note that the preposition can emphasize source as well as means.'
  chosen_spanish_reading: «por el Espíritu que nos dio» mantiene la idea instrumental/evidencial y deja abierta la posibilidad de origen o fuente.
  alternative_spanish_readings:
  - «desde el Espíritu que nos dio»
  - «del Espíritu que nos dio»
  - «a partir del Espíritu que nos dio»
  rationale: ἐκ admite matiz de fuente, origen o medio. En español, «por» es la forma más natural para expresar el medio o base de conocimiento, sin cerrar el sentido de procedencia que el griego también permite.
  doctrine_reference: Conservar la ambigüedad productiva del pretexto griego entre fuente y medio; no reducirla a una sola lectura dogmática.
- issue: Identidad del πνεῦμα como Espíritu Santo
  english_pob_reading: '''Spirit'' is capitalized to indicate the Holy Spirit.'
  chosen_spanish_reading: 'Se traduce con mayúscula: «Espíritu».'
  alternative_spanish_readings:
  - «espíritu»
  rationale: El contexto de don divino y la sintaxis personal del relativo favorecen la identificación con el Espíritu Santo. La mayúscula es un recurso editorial español que comunica ese referente sin añadir material ajeno al texto.
  doctrine_reference: Ortodoxia trinitaria histórica; sin imponer una lectura denominacional específica.
translation_notes:
  revision_awareness: El borrador sigue el estado de revisión más reciente indicado como sin cambios necesarios, y conserva la alta concordancia con el control cruzado. No se introdujeron revisiones textuales adicionales ni se alteró el perfil semántico del verso.
  spanish_consistency_notes:
  - 'Se mantiene la terminología joánica consistente: «permanece» para μένει y «mandamientos» para ἐντολάς.'
  - Se evita sustituir los pronombres griegos por nombres explícitos, preservando la tensión referencial documentada en el audit trail.
  - Se usa «Espíritu» con mayúscula por la referencia al Espíritu Santo, manteniendo la convención editorial coherente con la teología del pasaje.
  - La preposición «por» en la frase final conserva el matiz instrumental de ἐκ sin perder naturalidad en español.
