translation:
  language: es
  text: Todo el que ha nacido de Dios no practica el pecado[a], porque su simiente permanece en él[b]; y no puede seguir pecando[c], porque ha nacido de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más formalmente, «no hace pecado» / «no comete pecado». El griego probablemente se refiere a la práctica continua del pecado más que a un solo acto.
    reason: lexical_alternative
  - marker: b
    text: O «habita en él».
    reason: lexical_alternative
  - marker: c
    text: Más literalmente, «no puede pecar». En contexto, el infinitivo presente griego probablemente expresa la idea de «seguir pecando» o «continuar pecando».
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ὁ γεγεννημένος
  english_pob_choice: Everyone who has been born
  chosen_spanish: Todo el que ha nacido
  alternatives_spanish:
  - Todo aquel que ha nacido
  - Todo el que fue nacido
  lexicon: BDAG
  rationale: πᾶς con el participio perfecto sustantivado expresa una clase universal. En español, «Todo el que ha nacido» conserva la amplitud genérica y el estado resultante del nuevo nacimiento sin sonar artificial.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - nacido de Dios
  lexicon: BDAG
  rationale: La construcción con γεννάω en Juan indica origen o fuente. «De Dios» mantiene el giro idiomático natural en español y corresponde al valor de origen del griego.
- source_word: ἁμαρτίαν οὐ ποιεῖ
  english_pob_choice: does not practice sin
  chosen_spanish: no practica el pecado
  alternatives_spanish:
  - no hace pecado
  - no comete pecado
  lexicon: BDAG
  rationale: ποιέω con ἁμαρτίαν aquí sugiere una conducta característica y continua, no un acto aislado. «No practica el pecado» comunica mejor ese valor durativo que «no comete pecado».
- source_word: σπέρμα αὐτοῦ
  english_pob_choice: his seed
  chosen_spanish: su simiente
  alternatives_spanish:
  - su semilla
  - su descendencia
  lexicon: BDAG
  rationale: Se conserva la metáfora concreta de σπέρμα sin explicarla en el texto principal. «Simiente» es un equivalente más tradicional y preciso que mantiene la tensión interpretativa del término.
- source_word: ἐν αὐτῷ μένει
  english_pob_choice: remains in him
  chosen_spanish: permanece en él
  alternatives_spanish:
  - permanece dentro de él
  - habita en él
  lexicon: BDAG
  rationale: μένω es un verbo clave en Juan y expresa permanencia continua. «Permanece en él» es natural en español y conserva el sentido durativo del griego.
- source_word: οὐ δύναται ἁμαρτάνειν
  english_pob_choice: he is not able to keep sinning
  chosen_spanish: no puede seguir pecando
  alternatives_spanish:
  - no puede pecar
  - no puede continuar pecando
  lexicon: BDAG
  rationale: El infinitivo presente ἁμαρτάνειν sugiere acción en curso o habitual. «No puede seguir pecando» preserva esa fuerza aspectual y evita una afirmación absoluta de incapacidad para todo acto individual de pecado.
- source_word: γεγέννηται
  english_pob_choice: he has been born
  chosen_spanish: ha nacido
  alternatives_spanish:
  - ha sido engendrado
  - es nacido
  lexicon: BDAG
  rationale: El perfecto subraya el resultado permanente del nuevo nacimiento. «Ha nacido» comunica con claridad ese estado resultante en español contemporáneo.
theological_decisions:
- issue: Si el versículo enseña perfección sin pecado absoluta o incompatibilidad con la práctica continua del pecado
  english_pob_reading: The verse excludes ongoing sinful practice, not every possible sinning act.
  chosen_spanish_reading: El versículo excluye la práctica continua del pecado, no todo acto posible de pecado.
  alternative_spanish_readings:
  - No puede cometer ningún pecado
  - No puede pecar en absoluto
  rationale: Los presentes ποιεῖ y ἁμαρτάνειν, leídos en contexto joánico, apuntan a una conducta persistente. La traducción evita nivelar el pasaje hacia una imposibilidad absoluta que chocaría con 1 Juan 1:8–2:1.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla'
- issue: Sentido de 'su simiente'
  english_pob_reading: The metaphor is left untranslated as 'his seed' rather than interpreted.
  chosen_spanish_reading: La metáfora se deja como 'su simiente' sin interpretarla en el texto principal.
  alternative_spanish_readings:
  - su palabra
  - su vida
  - su naturaleza
  rationale: El griego no especifica qué representa exactamente σπέρμα. Se preserva la imagen concreta para no importar una interpretación doctrinal en la línea principal.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje se mantiene en alto acuerdo con el auditrail inglés y con la lectura aspectual habitual/continuativa de los verbos griegos.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se conservó el término «simiente» para σπέρμα a fin de no interpretar la metáfora en el texto principal.
  - Se evitó «Cristo» y toda terminología eclesiástica no presente en el versículo.
  - La puntuación y el orden sintáctico buscan ser naturales en español sin perder la estructura causal del griego.
