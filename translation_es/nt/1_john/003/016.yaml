translation:
  language: es
  text: 'En esto[a] hemos llegado a conocer el amor: que él entregó su vida por nosotros, y nosotros debemos entregar nuestras vidas por los hermanos[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede traducirse: «Por esto» o «Por este medio».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «los hermanos»; en el contexto, probablemente se refiere a los creyentes en general, incluidas las hermanas.'
    reason: cultural_note
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: Por esto
  alternatives_spanish:
  - En esto
  - Por este medio
  lexicon: BDAG
  rationale: La construcción demostrativa introduce la base o medio por el cual se conoce el amor. «Por esto» es natural en español y conserva el valor explicativo mejor que una forma más literal pero menos fluida.
- source_word: ἐγνώκαμεν
  english_pob_choice: we have come to know
  chosen_spanish: hemos conocido
  alternatives_spanish:
  - conocemos
  - hemos llegado a conocer
  lexicon: BDAG
  rationale: El perfecto expresa un conocimiento adquirido con vigencia presente. «Hemos conocido» conserva el resultado presente sin sonar forzado; «hemos llegado a conocer» sería más explícito pero menos conciso.
- source_word: τὴν ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - amor
  lexicon: BDAG
  rationale: 'ἀγάπη se traduce por el sustantivo común «amor», con artículo definido para reflejar mejor la referencia concreta del pasaje: el amor definido por la acción de Cristo.'
- source_word: ἐκεῖνος
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - aquel
  - ese
  lexicon: BDAG
  rationale: En el contexto joánico, el pronombre apunta enfáticamente a Cristo. «Él» mantiene la referencia personal clara y evita una perífrasis interpretativa.
- source_word: ὑπὲρ ἡμῶν
  english_pob_choice: for us
  chosen_spanish: por nosotros
  alternatives_spanish:
  - a favor de nosotros
  - en nuestro favor
  - por nuestro bien
  lexicon: BDAG
  rationale: ὑπέρ aquí expresa acción benefactora y de entrega. «Por nosotros» es la equivalencia más natural en español y mantiene abierta la fuerza de entrega vicaria sin sobreespecificarla.
- source_word: τὴν ψυχὴν αὐτοῦ ἔθηκεν
  english_pob_choice: laid down his life
  chosen_spanish: puso su vida
  alternatives_spanish:
  - entregó su vida
  - dejó su vida
  - dio su vida
  lexicon: BDAG
  rationale: Aunque ψυχή puede significar «vida» o «alma», en esta locución joánica el sentido es «vida». «Puso su vida» reproduce con fidelidad el verbo τίθημι y conserva la imagen de entrega voluntaria; se mantiene la tensión lexical frente a una traducción más idiomática como «entregó su vida».
- source_word: ὀφείλομεν
  english_pob_choice: we ought
  chosen_spanish: debemos
  alternatives_spanish:
  - estamos obligados a
  - debemos de
  lexicon: BDAG
  rationale: El verbo expresa obligación moral. «Debemos» comunica adecuadamente el deber ético en español contemporáneo sin sonar excesivamente técnico.
- source_word: τῶν ἀδελφῶν
  english_pob_choice: the brothers
  chosen_spanish: los hermanos
  alternatives_spanish:
  - los hermanos y hermanas
  - los creyentes
  - la hermandad
  lexicon: BDAG
  rationale: Se conserva el masculino plural gramatical del griego. En el contexto eclesial, el término probablemente abarca a los creyentes en general; esa amplitud se explica en la nota, sin neutralizar la forma del texto base.
- source_word: τὰς ψυχὰς θεῖναι
  english_pob_choice: to lay down our lives
  chosen_spanish: poner nuestras vidas
  alternatives_spanish:
  - entregar nuestras vidas
  - dar nuestras vidas
  - poner nuestras almas
  lexicon: BDAG
  rationale: 'Se mantiene la correspondencia con la primera mitad del versículo: ψυχή se vierte como «vida», y τίθημι como «poner», conservando la imagen de autoentrega y la coherencia interna del pasaje.'
theological_decisions:
- issue: Referente de ἐκεῖνος
  english_pob_reading: A reference to Jesus the Son, whose self-sacrificial death defines love.
  chosen_spanish_reading: Referencia a Jesús, cuyo acto de entrega define el amor.
  alternative_spanish_readings:
  - Referencia genérica a «aquel» sin identificación explícita
  - Lectura menos determinada del pronombre
  rationale: El contexto inmediato de 1 Juan y la expresión de dar la vida señalan a Jesús. Traducir con «él» conserva la referencia implícita sin añadir una interpretación ajena al texto.
  doctrine_reference: 'Affirmations: Nicene Creed; Translation philosophy §1'
- issue: Alcance de ἀδελφῶν
  english_pob_reading: Rendered 'the brothers' in the main text, with inclusive ecclesial sense noted in a footnote.
  chosen_spanish_reading: «los hermanos» en el texto principal, con nota sobre su alcance inclusivo eclesial.
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: El griego usa un plural masculino que, en contexto, puede incluir al conjunto de creyentes. Mantener «los hermanos» respeta la forma del original y la nota evita perder el sentido inclusivo documentado.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego de SBLGNT y armoniza con la revisión inglesa más reciente, que no requirió cambios. Se preservó la estructura retórica «Por esto... que... y nosotros...», la correspondencia de ψυχή como «vida» y el valor inclusivo documentado de ἀδελφοί mediante nota.
  spanish_consistency_notes:
  - Se usó «vida(s)» para ψυχή tanto en la cláusula cristológica como en la exhortación, manteniendo consistencia léxica.
  - Se mantuvo «por» para ὑπέρ en ambos miembros del versículo, reflejando la relación benefactora/entregada.
  - «Hemos conocido» reproduce el valor perfectivo de ἐγνώκαμεν sin alterar el sentido presente resultante.
  - El artículo «el amor» ayuda a identificar el amor concreto definido por la entrega de Cristo, sin introducir una glosa explicativa en el cuerpo del texto.
