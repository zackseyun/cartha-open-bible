- from: 'Por esto hemos conocido el amor: que él puso su vida por nosotros[a], y nosotros debemos poner nuestras vidas por los hermanos[b].'
  to: 'En esto[a] hemos llegado a conocer el amor: que él entregó su vida por nosotros, y nosotros debemos entregar nuestras vidas por los hermanos[b].'
  rationale: Se ajusta ἐν τούτῳ a «En esto» con nota que preserva las alternativas documentadas; esta opción suena más natural en español con la cláusula explicativa que sigue. Se mejora ἐγνώκαμεν con «hemos llegado a conocer» para reflejar mejor el perfecto. Se reemplaza «puso/poner su(s) vida(s)» por «entregó/entregar su(s) vida(s)», que comunica fielmente la locución joánica en español natural y digno sin perder la idea de autoentrega voluntaria.
