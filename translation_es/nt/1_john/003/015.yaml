revisions:
- from: Todo el que odia a su hermano es un homicida[a], y ustedes saben que todo homicida no tiene vida eterna permaneciendo en él[b].
  to: Todo el que odia a su hermano[a] es un homicida[b], y ustedes saben que ningún homicida tiene vida eterna que permanezca en él[c].
  rationale: Se ajusta la negación a un español natural («ningún homicida tiene») sin perder el sentido universal del griego; se reestructura μένουσαν con una relativa («que permanezca en él») para sonar idiomático y fiel; se corrige y mejora la nota sobre μένω; y se añade la nota contextual sobre «hermano» para reflejar mejor el rastro POB inglés.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:41:51Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura general del griego: la clase general con «Todo el que odia», «su hermano», «vida eterna» y el valor durativo de μένουσαν. Sin embargo, dos puntos requieren corrección en español: «todo homicida no tiene» es gramaticalmente torpe y menos fiel al sentido normal de la negación universal en español; y «permaneciendo en él» suena poco natural como modificador pospuesto de «vida eterna». El sentido fuente se preserva mejor con «ningún homicida tiene vida eterna que permanezca en él» o equivalente.'
  spanish_quality_summary: 'La redacción es en general comprensible y digna, pero tiene problemas de naturalidad y corrección léxica en las notas. «Todo homicida no tiene» es un calco poco idiomático. «Permaneciendo en él» después de «vida eterna» suena forzado. Además, la nota b contiene errores ortográficos/léxicos: «abitando» debería ser «habitando», y la mezcla «abide/abiding» no está adaptada al español. Conviene simplificar y aclarar la nota joánica.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Hermano», «vida eterna» y el campo semántico de μένω están bien encaminados. «Homicida» es defendible, aunque «asesino» sería más idiomático; dado el rastro POB y la justificación léxica, puede mantenerse. La excepción necesaria es no calcar la revisión inglesa «every murderer does not have» en un español antinatural; en español debe expresarse como «ningún homicida tiene» para preservar el sentido con claridad.
  issues:
  - severity: medium
    issue: «todo homicida no tiene» es un calco poco natural en español
    rationale: Aunque refleja externamente πᾶς... οὐκ ἔχει, en español estándar esta formulación suena defectuosa y menos clara que «ningún homicida tiene». La fidelidad al sentido fuente prima sobre reproducir una rareza introducida en inglés por razones auditadas internas.
  - severity: medium
    issue: «vida eterna permaneciendo en él» es una construcción española forzada
    rationale: 'El participio μένουσαν modifica «vida eterna», pero en español esa relación se expresa mejor con una relativa: «vida eterna que permanezca en él». Así se conserva el sentido durativo y la referencia a la vida eterna presente en la persona.'
  - severity: low
    issue: 'La nota b contiene forma incorrecta: «abitando»'
    rationale: En español sería «habitando», pero aun así no es la mejor alternativa para μένω en este contexto. También conviene evitar la glosa inglesa «abide/abiding» en una nota española principal.
  - severity: low
    issue: La nota cultural sobre «hermano» presente en el inglés no fue preservada
    rationale: No es imprescindible, pero el inglés POB sí conserva la observación contextual de que probablemente se refiere a un fellow believer. Dado que el dossier español ya afirma que se aclara en nota, conviene añadir esa nota para alinear mejor el rastro auditado.
  revised_spanish_text: Todo el que odia a su hermano[a] es un homicida[b], y ustedes saben que ningún homicida tiene vida eterna que permanezca en él[c].
  revised_footnotes:
  - marker: a
    text: «Su hermano» probablemente se refiere aquí, en contexto, a un compañero creyente; el griego está en singular masculino.
    reason: cultural_note
  - marker: b
    text: O «asesino». El griego usa ἀνθρωποκτόνος, término para quien mata a un ser humano; «homicida» conserva mejor el alcance léxico.
    reason: lexical_alternative
  - marker: c
    text: O «que habite en él». El verbo μένω es un término joánico clave que suele traducirse «permanecer» o «habitar». Aquí se ha preferido «permanezca» por mayor naturalidad en español.
    reason: lexical_alternative
