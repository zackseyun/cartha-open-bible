    text: Or 'abiding in him.' The verb μένω is a key Johannine term often translated 'abide' or 'remain.'
    reason: lexical_alternative
  - marker: b
    text: '''His brother'' likely refers in context to a fellow believer; the Greek is masculine singular.'
    reason: cultural_note
