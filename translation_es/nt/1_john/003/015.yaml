translation:
  language: es
  text: Todo el que odia a su hermano[a] es un homicida[b], y ustedes saben que ningún homicida tiene vida eterna que permanezca en él[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Su hermano» probablemente se refiere aquí, en contexto, a un compañero creyente; el griego está en singular masculino.
    reason: cultural_note
  - marker: b
    text: O «asesino». El griego usa ἀνθρωποκτόνος, término para quien mata a un ser humano; «homicida» conserva mejor el alcance léxico.
    reason: lexical_alternative
  - marker: c
    text: O «que habite en él». El verbo μένω es un término joánico clave que suele traducirse «permanecer» o «habitar». Aquí se ha preferido «permanezca» por mayor naturalidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς ὁ μισῶν
  english_pob_choice: Everyone who hates
  chosen_spanish: Todo el que odia
  alternatives_spanish:
  - Cualquiera que odia
  - Todo el que aborrece
  lexicon: BDAG
  rationale: El participio presente con artículo expresa una clase general; en español, «todo el que» comunica bien ese valor general y mantiene naturalidad. «Odia» preserva el verbo fuerte del original sin suavizarlo a un término más débil.
- source_word: ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: su hermano
  alternatives_spanish:
  - su hermano o hermana
  - su hermano en la fe
  lexicon: BDAG
  rationale: Se conserva el singular masculino del griego. En este contexto joánico puede referirse a un miembro de la comunidad creyente, pero la forma base del texto es «su hermano», y esa correspondencia se mantiene en el texto principal.
- source_word: ἀνθρωποκτόνος
  english_pob_choice: murderer
  chosen_spanish: homicida
  alternatives_spanish:
  - asesino
  - matador
  lexicon: BDAG
  rationale: «Homicida» reproduce el sentido de matar a un ser humano y funciona con dignidad en español. «Asesino» puede sonar más natural en algunos contextos, pero «homicida» conserva mejor el valor léxico amplio y el tono sentencioso del término griego.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: ustedes saben
  alternatives_spanish:
  - saben
  - ya saben
  lexicon: BDAG
  rationale: El plural de segunda persona se explicita naturalmente como «ustedes». «Saben» conserva la certeza de conocimiento compartido sin añadir énfasis no requerido.
- source_word: πᾶς ἀνθρωποκτόνος οὐκ ἔχει
  english_pob_choice: every murderer does not have
  chosen_spanish: todo homicida no tiene
  alternatives_spanish:
  - ningún homicida tiene
  - cada homicida no tiene
  lexicon: BDAG
  rationale: Se mantiene la estructura más cercana al griego, donde πᾶς + sustantivo se repite de modo correlativo. Aunque «ningún homicida tiene» suena más idiomático, «todo homicida no tiene» preserva mejor la forma y la revisión auditada del inglés POB.
- source_word: ζωὴν αἰώνιον
  english_pob_choice: eternal life
  chosen_spanish: vida eterna
  alternatives_spanish:
  - vida perdurable
  - vida eterna
  lexicon: BDAG
  rationale: «Vida eterna» es la equivalencia estable y natural en el contexto joánico; conserva tanto la duración como el valor teológico del sintagma.
- source_word: ἐν αὐτῷ μένουσαν
  english_pob_choice: remaining in him
  chosen_spanish: permaneciendo en él
  alternatives_spanish:
  - abitando en él
  - quedando en él
  lexicon: BDAG
  rationale: «Permaneciendo» refleja el sentido durativo de μένω y permite una construcción fluida en español. Se evita «abitando» por sonar poco natural en el registro general, aunque se reconoce la alternativa joánica clásica «abide/abiding» detrás del término.
theological_decisions:
- issue: Alcance de «hermano»
  english_pob_reading: Retain 'his brother' in the main text, with the sense of a fellow believer left implicit.
  chosen_spanish_reading: Mantener «su hermano» en el texto principal, dejando implícito el sentido de un creyente o miembro de la comunidad.
  alternative_spanish_readings:
  - su hermano o hermana
  - su hermano en la fe
  rationale: El griego usa el masculino singular, y el contexto joánico sugiere a menudo la comunidad creyente. Para no borrar esa forma gramatical ni convertirla en paráfrasis interpretativa, se conserva la referencia literal en el texto principal y se aclara en nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Valor de μένω en clave joánica
  english_pob_reading: Use 'remaining' rather than 'abiding' in the main text.
  chosen_spanish_reading: Usar «permaneciendo» en el texto principal.
  alternative_spanish_readings:
  - abitando
  - permaneciendo
  rationale: «Permanecer» expresa el valor durativo y relacional de μένω sin depender de un tecnicismo eclesial. Se preserva la resonancia joánica, pero con un verbo natural en español.
  doctrine_reference: DOCTRINE.md Translation philosophy §6
- issue: Construcción negativa con πᾶς ἀνθρωποκτόνος οὐκ ἔχει
  english_pob_reading: every murderer does not have
  chosen_spanish_reading: todo homicida no tiene
  alternative_spanish_readings:
  - ningún homicida tiene
  rationale: Se conserva la forma auditada en inglés POB, que fue ajustada para reflejar la estructura griega más de cerca. La opción idiomática española sería posible, pero aquí se prioriza la correspondencia formal con el texto fuente.
  doctrine_reference: applied revisions / latest_revision_pass
translation_notes:
  revision_awareness: Se siguió la revisión final del inglés POB que mantiene la estructura correlativa de πᾶς en ambas mitades del versículo y conserva el valor de μένω con una forma durativa. La propuesta española refleja esa decisión al usar «todo el que...», repetir «todo homicida...», y traducir μένω con «permaneciendo» en vez de una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantuvo el tratamiento de segunda persona plural con «ustedes» para οἴδατε.
  - Se evitó «SEÑOR» u otras sustituciones irrelevantes; no hay término divino directo en el versículo.
  - Se preservó la repetición enfática de πᾶς con «todo el que» / «todo homicida» en lugar de normalizarla a «ningún homicida» en el texto principal.
  - El verbo final se dejó en forma participial para reflejar μένουσαν, manteniendo el carácter durativo del original.
