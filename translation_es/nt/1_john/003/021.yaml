translation:
  language: es
  text: Amados, si nuestro corazón[c] no nos condena[a], tenemos confianza ante Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «nos acusa» o «encuentra falta en nosotros».
    reason: lexical_alternative
  - marker: b
    text: O «valentía» o «seguridad ante Dios».
    reason: lexical_alternative
  - marker: c
    text: «Corazón» aquí se refiere al ser interior o a la conciencia moral; compárese el sentido de «conciencia».
    reason: cultural_note
lexical_decisions:
- source_word: ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados hermanos
  lexicon: BDAG
  rationale: Es un vocativo plural afectuoso. «Amados» conserva la conexión léxica con el amor y mantiene un tono elevado y natural en español.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: BDAG
  rationale: Introduce una cláusula condicional con subjuntivo; «si» es la equivalencia más directa y natural en español.
- source_word: καρδία
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - conciencia
  - interior
  lexicon: BDAG
  rationale: «Corazón» conserva la metáfora bíblica del centro interior de la persona. En este contexto incluye la evaluación moral interna sin reducirla explícitamente a «conciencia» en el texto principal.
- source_word: μὴ καταγινώσκῃ ἡμῶν
  english_pob_choice: does not condemn us
  chosen_spanish: no nos condena
  alternatives_spanish:
  - no nos acusa
  - no encuentra falta en nosotros
  lexicon: BDAG
  rationale: καταγινώσκω expresa censurar, culpar o condenar. «No nos condena» reproduce bien la fuerza judicial/moral y suena idiomático en español.
- source_word: παρρησίαν
  english_pob_choice: confidence
  chosen_spanish: confianza
  alternatives_spanish:
  - valentía
  - seguridad
  lexicon: BDAG
  rationale: παρρησία puede ser valentía, apertura o confianza. Aquí «confianza» expresa de forma clara la libertad de acceso y la seguridad relacional ante Dios.
- source_word: πρὸς τὸν θεόν
  english_pob_choice: before God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - delante de Dios
  - hacia Dios
  lexicon: BDAG
  rationale: Con παρρησία, πρός con acusativo señala relación o referencia inmediata a Dios. «Ante Dios» es natural en español y preserva la idea de estar en su presencia.
theological_decisions:
- issue: El sentido interior de καρδία
  english_pob_reading: heart
  chosen_spanish_reading: corazón
  alternative_spanish_readings:
  - conciencia
  - interior moral
  rationale: La versión mantiene la imagen joánica del «corazón» como sede de la autoevaluación moral. No se sustituye por «conciencia» en el texto principal para no estrechar indebidamente la metáfora.
  doctrine_reference: Translation philosophy §1, §6
- issue: La relación entre παρρησία y la presencia de Dios
  english_pob_reading: confidence before God
  chosen_spanish_reading: confianza ante Dios
  alternative_spanish_readings:
  - valentía ante Dios
  - seguridad ante Dios
  rationale: «Confianza» conserva la tensión entre acceso reverente y franqueza delante de Dios, sin sonar demasiado agresivo ni demasiado psicológico.
  doctrine_reference: Translation philosophy §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando notas sin anclaje. Ahora solo se usa un marcador, y aparece exactamente en el vocativo del texto.
  spanish_consistency_notes:
  - Se usó «corazón» para καρδία, coherente con el uso joánico y con el audit trail inglés.
  - Se mantuvo «confianza» para παρρησία, evitando una formulación más interpretativa como «seguridad» en el texto principal.
  - «Ante Dios» refleja mejor la relación implícita de πρὸς τὸν θεόν que un simple «con Dios» en este contexto.
