translation:
  language: es
  text: 'En esto[a] son evidentes los hijos de Dios y los hijos del diablo: todo el que no practica la rectitud[b] no es de Dios, ni el que no ama a su hermano[c].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «Por esto» o «A partir de esto». La frase griega puede señalar la base por la que se reconoce esta distinción.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la justicia». El término griego puede denotar rectitud o justicia; aquí «rectitud» encaja mejor con el contraste ético inmediato.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «a su hermano o hermana», es decir, a un creyente. El griego dice literalmente «a su hermano» con forma masculina singular.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν τούτῳ
  english_pob_choice: By this
  chosen_spanish: En esto
  alternatives_spanish:
  - Por esto
  - A partir de esto
  lexicon: BDAG
  rationale: La expresión puede señalar el fundamento o la base por la que algo se reconoce. «En esto» conserva la deixis demostrativa de manera natural en español sin decidir de antemano entre valor locativo o inferencial.
- source_word: φανερά ἐστιν
  english_pob_choice: are evident
  chosen_spanish: se hacen evidentes
  alternatives_spanish:
  - son evidentes
  - quedan manifiestos
  lexicon: BDAG
  rationale: El predicado expresa una realidad visible o reconocible. «Se hacen evidentes» mantiene el sentido estativo/resultativo y suena claro en español moderno, sin la rigidez de un calco.
- source_word: τὰ τέκνα
  english_pob_choice: the children
  chosen_spanish: los hijos
  alternatives_spanish:
  - los niños
  - los descendientes
  lexicon: BDAG
  rationale: τέκνα aquí funciona como lenguaje relacional de pertenencia. «Hijos» es el equivalente natural en español y preserva la imagen familiar y teológica del contraste.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: La relación de pertenencia se expresa de modo directo con «de Dios», que conserva el valor genitivo sin añadir explicaciones no presentes en el texto.
- source_word: τὰ τέκνα τοῦ διαβόλου
  english_pob_choice: the children of the devil
  chosen_spanish: los hijos del diablo
  alternatives_spanish:
  - los hijos del acusador
  lexicon: BDAG
  rationale: En este contexto διάβολος funciona como designación personal establecida. «Diablo» es la traducción clara y tradicionalmente comprensible; «acusador» sería demasiado interpretativa para el texto base.
- source_word: πᾶς ὁ μὴ ποιῶν
  english_pob_choice: everyone who does not practice
  chosen_spanish: todo el que no practica
  alternatives_spanish:
  - quien no hace
  - todo el que no hace
  lexicon: BDAG
  rationale: El participio presente articular expresa una conducta característica y habitual. «Todo el que no practica» reproduce bien ese valor gnómico mejor que un simple «no hace».
- source_word: δικαιοσύνην
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia recta
  lexicon: BDAG
  rationale: Aunque el audit trail inglés prefirió «righteousness», en español «justicia» comunica de forma natural la conducta conforme a Dios. Se mantiene la tensión posible con «rectitud» en nota, porque el ámbito es ético y relacional, no meramente jurídico-social.
- source_word: οὐκ ἔστιν ἐκ τοῦ θεοῦ
  english_pob_choice: is not from God
  chosen_spanish: no es de Dios
  alternatives_spanish:
  - no procede de Dios
  - no viene de Dios
  lexicon: BDAG
  rationale: ἐκ con Dios indica origen y pertenencia. «No es de Dios» es una equivalencia breve y fiel en español; «no procede de Dios» explicita el origen, pero suena menos idiomático en este paralelismo.
- source_word: ὁ μὴ ἀγαπῶν
  english_pob_choice: the one who does not love
  chosen_spanish: el que no ama
  alternatives_spanish:
  - quien no ama
  - el que no está amando
  lexicon: BDAG
  rationale: Se conserva la estructura del participio articular con una relativa sustantivada natural en español. «El que no ama» mantiene el paralelismo retórico del versículo sin sobretraducir el aspecto verbal.
- source_word: τὸν ἀδελφὸν αὐτοῦ
  english_pob_choice: his brother
  chosen_spanish: a su hermano
  alternatives_spanish:
  - a su hermano o hermana
  - a su hermano, es decir, a un creyente
  lexicon: BDAG
  rationale: El griego es masculino singular y la POB inglesa conserva esa forma. En español, el acusativo se expresa naturalmente con «a su hermano». Se preserva en nota la posibilidad contextual de un sentido inclusivo sin borrar la forma gramatical del original.
theological_decisions:
- issue: Lenguaje familiar para identidad espiritual
  english_pob_reading: children of God and the children of the devil
  chosen_spanish_reading: los hijos de Dios y los hijos del diablo
  alternative_spanish_readings:
  - las personas que pertenecen a Dios y las que pertenecen al diablo
  - los hijos de Dios y los hijos del acusador
  rationale: El griego usa un contraste familiar explícito (τέκνα), no una descripción meramente sociológica. Mantener «hijos» conserva la teología joánica de pertenencia e identidad observables por el comportamiento.
  doctrine_reference: 'Affirmations; Translation philosophy #1 y #5'
- issue: La segunda cláusula negativa con coordinación
  english_pob_reading: nor is the one who does not love his brother
  chosen_spanish_reading: ni tampoco el que no ama a su hermano
  alternative_spanish_readings:
  - ni el que no ama a su hermano
  - y tampoco el que no ama a su hermano
  rationale: El griego enlaza la segunda negación de forma paralela con la primera. «Ni tampoco» conserva el valor coordinado negativo de καὶ + cláusula implícita en español natural, sin diluir la fuerza del contraste.
  doctrine_reference: 'Translation philosophy #2 y #4'
- issue: δικαιοσύνη en contexto joánico ético
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia/rectitud
  rationale: Aunque «justicia» puede abarcar más de un matiz, en este contexto ético es la manera más transparente de reflejar la conducta correcta ante Dios. Se evita reducirlo a justicia social, pero tampoco se fuerza una abstracción técnica.
  doctrine_reference: 'Affirmations; Translation philosophy #2'
translation_notes:
  revision_awareness: El borrador español sigue de cerca el texto griego y el audit trail inglés, pero ajusta la dicción a un español publicable y natural. Se conserva la secuencia de contrastes del versículo, la fuerza gnómica de los participios presentes y la identificación relacional de «hijos»; además, se mantiene la tensión lexical de δικαιοσύνη mediante una nota, en lugar de resolverla de manera unilateral.
  spanish_consistency_notes:
  - Se usa «Dios» y «diablo» de forma consistente con el paquete fuente y el estándar POB.
  - Se mantiene «hijos» para τέκνα, siguiendo el contraste familiar del texto.
  - Se conserva la forma masculina singular «hermano» en el texto principal y se expone la posible lectura inclusiva en nota.
  - La negación final se formula con «ni tampoco» para reflejar el paralelismo negativo del griego sin sonar forzado en español.
  - El texto evita calcar la sintaxis inglesa y, a la vez, no amplía el sentido más allá de lo que el griego y el audit trail sustentan.
