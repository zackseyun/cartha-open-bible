base_translation:
  language: en
  yaml_path: translation/nt/1_john/003/010.yaml
  text: 'By this the children of God and the children of the devil are evident: everyone who does not practice righteousness is not from God[c][b][a], nor is the one who does not love his brother.'
  footnotes:
  - marker: a
    text: Or 'In this' or 'From this.' The Greek phrase can indicate the basis by which this distinction is recognized.
    reason: lexical_alternative
  - marker: b
    text: Or 'justice.' The Greek word can denote righteousness or justice, though 'righteousness' best fits the ethical contrast here.
    reason: lexical_alternative
  - marker: c
    text: Or 'his brother or sister,' that is, a fellow believer. The Greek reads 'his brother' with a masculine singular form.
    reason: alternative_reading
