  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: contraste entre los hijos de Dios y del diablo, valor habitual de πᾶς ὁ μὴ ποιῶν, y paralelismo de la segunda cláusula negativa. Sin embargo, dos decisiones se apartan del audit trail y del matiz fuente: φανερά ἐστιν se expresa mejor como estado (''son evidentes'') que como proceso (''se hacen evidentes''), y δικαιοσύνην debe evitar ''justicia'' aquí porque en español puede arrastrar un matiz social/jurídico que debilita el sentido ético de ''righteousness/rectitud''.'
  spanish_quality_summary: El español es claro y legible, pero 'se hacen evidentes' suena menos natural y menos fiel al valor predicativo simple que 'son evidentes'. 'Ni tampoco' es comprensible, aunque algo cargado; 'ni' basta y suena más limpio. En conjunto, el verso necesita un ajuste menor para mayor naturalidad y precisión semántica.
  glossary_alignment: 'Alineación mayormente buena con el glosario: θεοῦ -> ''Dios'', διάβολος -> ''diablo'', ἀδελφὸν αὐτοῦ -> ''su hermano''. El punto principal de desalineación es δικαιοσύνη, donde el valor por defecto del proyecto es ''justicia/rectitud por contexto''; aquí conviene ''rectitud'' para preservar mejor la decisión inglesa documentada (''righteousness'' no principalmente ''justice'').'
  issues:
  - severity: medium
    issue: φανερά ἐστιν traducido como 'se hacen evidentes'
    rationale: El griego presenta un predicado estativo simple ('son evidentes/están manifiestos'), no necesariamente un proceso de llegar a ser evidentes. 'Se hacen evidentes' añade un matiz dinámico no requerido.
  - severity: medium
    issue: δικαιοσύνην traducido como 'la justicia' en el texto principal
    rationale: Aunque posible léxicamente, en español bíblico general 'justicia' puede oírse como justicia social o judicial. En este contexto ético joánico, 'rectitud' comunica mejor la conducta conforme a Dios y sigue mejor la justificación del POB inglés.
  - severity: low
    issue: Coordinación negativa 'ni tampoco'
    rationale: No es incorrecta, pero 'ni el que no ama...' expresa el paralelismo con más sobriedad y fluidez en español bíblico moderno.
  revised_spanish_text: 'En esto[a] son evidentes los hijos de Dios y los hijos del diablo: todo el que no practica la rectitud[b] no es de Dios, ni el que no ama a su hermano[c].'
  revised_footnotes:
