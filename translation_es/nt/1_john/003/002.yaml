review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: estado presente como hijos de Dios, futura condición aún no revelada, semejanza futura con Cristo y visión directa de él. Sin embargo, en la cláusula ἐὰν φανερωθῇ el español principal cambia innecesariamente la voz/patrón léxico documentado por el POB inglés: «si él se manifiesta» pasa de pasivo a una formulación más activa/medio-reflexiva y debilita la repetición con «se ha revelado» anterior. El audit trail inglés favorece explícitamente «si él es revelado» o equivalente pasivo, con nota para la alternativa.'
  spanish_quality_summary: El español es claro, natural y digno. «Amados», «ahora», «lo que seremos» y «seremos semejantes a él» funcionan bien. La principal mejora necesaria es hacer coincidir mejor la segunda ocurrencia de φανερόω con la primera por medio de «si él es revelado» o «si es revelado». También conviene ajustar la nota b para reflejar la alternativa real después de la revisión y no anclar una nota que repite exactamente el texto principal como si fuera alternativa.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Dios» y «Jesús/Cristo» no presentan problema aquí. La decisión «hijos de Dios» para τέκνα θεοῦ es aceptable en español e idiomática, aunque «hijos de Dios» no refleja plenamente la neutralidad de τέκνα; no obstante, es una opción común y comprensible. La cuestión clave de alineación léxica es φανερόω: debe conservarse la relación entre «no se ha revelado» y «si él es revelado».'
  issues:
  - severity: medium
    issue: La cláusula «si él se manifiesta» no preserva bien la voz pasiva ni el vínculo léxico con φανερόω en ambas mitades del versículo.
    rationale: El griego usa ἐφανερώθη / φανερωθῇ, y el POB inglés documenta la importancia de mantener «has not yet been revealed / if he is revealed». «Se manifiesta» es comprensible, pero desplaza el énfasis de revelación/manifiestación pasiva y rompe la repetición intencional del verbo.
  - severity: low
    issue: La nota b está formulada como si «si él se manifiesta» fuera una alternativa, cuando en el borrador es el texto principal.
    rationale: Las notas deben distinguir claramente entre texto principal y alternativas. Tras corregir el texto principal, la nota puede explicar la posibilidad «si ello es revelado» y la traducción común «cuando aparezca».
  revised_spanish_text: Amados[a], ahora somos hijos de Dios, y todavía no se ha revelado lo que seremos. Sabemos que, si él es revelado[b], seremos semejantes a él, porque lo veremos tal como él es.
