translation:
  language: es
  text: Amados[a], ahora somos hijos de Dios, y todavía no se ha revelado lo que seremos. Sabemos que, si él es revelado[b], seremos semejantes a él, porque lo veremos tal como él es.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Queridos». El vocativo griego expresa afecto; «Amados» conserva mejor el enlace léxico con el campo de ἀγάπη.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «si ello es revelado», refiriéndose a lo que seremos; el sujeto en griego está implícito. El contexto favorece «él», referido a Cristo. Muchas versiones traducen esta cláusula «cuando aparezca», pero el griego es más literalmente «si es revelado», usando el mismo verbo que antes en el versículo.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Amados
  - Queridos
  - Queridos hermanos
  lexicon: BDAG
  rationale: «Amados» conserva el tono afectuoso del vocativo y mantiene la conexión léxica con ἀγάπη/ἀγαπάω. En español, «amados» es natural y solemne; se evita «queridos hermanos» porque añade contenido no presente en el griego.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - ahora mismo
  - en este momento
  lexicon: BDAG
  rationale: «Ahora» expresa el contraste temporal con la revelación futura sin cargar el sentido con matices innecesarios.
- source_word: τέκνα θεοῦ
  english_pob_choice: children of God
  chosen_spanish: hijos de Dios
  alternatives_spanish:
  - hijos de Dios
  - hijos e hijas de Dios
  lexicon: BDAG
  rationale: El griego usa τέκνα, ‘hijos/niños’, en sentido filial. En español, «hijos de Dios» es la forma más natural y fiel; se evita ampliar a «hijos e hijas» porque el original no hace esa explicitación, aunque el plural ya incluye a todos.
- source_word: οὔπω ἐφανερώθη
  english_pob_choice: has not yet been revealed
  chosen_spanish: todavía no se ha revelado
  alternatives_spanish:
  - aún no ha sido revelado
  - todavía no se ha hecho manifiesto
  lexicon: BDAG
  rationale: «Se ha revelado» reproduce bien el pasivo de φανερόω con un español fluido. «Todavía» preserva el valor de οὔπω mejor que un simple «aún» en este contexto.
- source_word: τί ἐσόμεθα
  english_pob_choice: what we will be
  chosen_spanish: lo que seremos
  alternatives_spanish:
  - qué seremos
  - lo que llegaremos a ser
  lexicon: BDAG
  rationale: El neutro τί apunta a la condición o clase futura, no solo a una pregunta directa por identidad. «Lo que seremos» conserva esa amplitud mejor que «qué seremos» en español corriente.
- source_word: οἴδαμεν
  english_pob_choice: We know
  chosen_spanish: Sabemos
  alternatives_spanish:
  - Y sabemos
  - Nosotros sabemos
  lexicon: BDAG
  rationale: La forma simple «Sabemos» es suficiente en español; el griego no exige repetir el sujeto. Evita énfasis artificial.
- source_word: ἐὰν φανερωθῇ
  english_pob_choice: if he is revealed
  chosen_spanish: si él se manifiesta
  alternatives_spanish:
  - si se manifiesta
  - si él es revelado
  - cuando se manifieste
  lexicon: BDAG
  rationale: Mantengo la ambigüedad gramatical del pasivo con una formulación natural en español. «Se manifiesta» deja abierto el sujeto implícito, pero en el contexto apunta a Cristo, como en el audit trail inglés. Se evita resolverlo demasiado con «cuando».
- source_word: ὅμοιοι αὐτῷ
  english_pob_choice: like him
  chosen_spanish: semejantes a él
  alternatives_spanish:
  - como él
  - parecidos a él
  lexicon: BDAG
  rationale: «Semejantes a él» preserva con claridad la idea de semejanza sin confundirla con identidad. Es más explícito que «como él» y más sobrio que «parecidos a él».
- source_word: ὀψόμεθα αὐτὸν
  english_pob_choice: we will see him
  chosen_spanish: lo veremos
  alternatives_spanish:
  - lo veremos
  - veremos a él
  lexicon: BDAG
  rationale: El futuro de ὁράω se expresa de forma natural como «veremos». En español, el objeto directo pronominal «lo» es idiomático y fiel.
- source_word: καθώς ἐστιν
  english_pob_choice: as he is
  chosen_spanish: tal como él es
  alternatives_spanish:
  - como él es
  - tal como es
  lexicon: BDAG
  rationale: «Tal como él es» intensifica la comparación de manera natural en español y refleja bien el valor de καθώς, sin introducir interpretación adicional.
theological_decisions:
- issue: Sujeto implícito de ἐὰν φανερωθῇ
  english_pob_reading: 'The subject is Christ: ''if he is revealed.'''
  chosen_spanish_reading: «si él se manifiesta» deja implícito que el referente es Cristo, según el contexto
  alternative_spanish_readings:
  - si él es revelado
  - cuando se manifieste
  - si se manifiesta
  rationale: El contexto inmediato habla de verle y de ser semejantes a él; por eso la traducción española no debe resolver la pasiva como si fuera un simple evento impersonal. «Se manifiesta» conserva la voz pasiva sin forzar el sujeto explícito, y mantiene la tensión interpretativa documentada.
  doctrine_reference: Preservar la tensión exegética; la referencia cristológica se apoya en el contexto, no en una explicitación añadida.
- issue: Naturaleza de la semejanza futura a Cristo
  english_pob_reading: '''we will be like him'' denotes real likeness to Christ without implying identity of essence.'
  chosen_spanish_reading: «seremos semejantes a él» expresa semejanza real, no identidad ontológica
  alternative_spanish_readings:
  - seremos como él
  - llegaremos a ser como él
  rationale: «Semejantes» comunica con precisión una semejanza verdadera y fuerte, pero evita sobrepasar el valor de ὅμοιοι. Así se preserva la distinción creador-criatura y la cristología ortodoxa.
  doctrine_reference: 'Affirmations: Credo Niceno (381 d.C.), Definición de Calcedonia (451 d.C.)'
translation_notes:
  revision_awareness: 'El pasaje se alinea con la revisión más reciente sin cambios sustanciales: el audit trail inglés considera la traducción óptima y no requiere ajustes adicionales. Se ha mantenido la tensión entre el pasivo griego y el referente cristológico, así como entre semejanza real y no-identidad, con decisiones españolas equivalentes y publicables.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se usa «Espíritu» solo cuando el contexto lo requiera; aquí no aplica.
  - Se mantiene «revelar/manifiesta» para φανερόω en coherencia con el vínculo léxico interno del versículo.
  - «Hijos de Dios» sigue la terminología del proyecto para τέκνα θεοῦ.
  - La puntuación y el orden sintáctico buscan una lectura natural en español sin perder el paralelismo del griego.
