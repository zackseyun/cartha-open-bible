translation:
  language: es
  text: ¿Qué, pues, debe hacerse?[a] Oraré con el espíritu[b], pero también oraré con la mente; cantaré alabanzas con el espíritu[c][b], pero también cantaré alabanzas con la mente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Qué, pues, es?» o simplemente «¿Qué, pues?». La expresión griega plantea una conclusión retórica y práctica.
    reason: lexical_alternative
  - marker: b
    text: O «en el espíritu» o «por el espíritu». El griego no especifica si se trata del espíritu humano, del Espíritu Santo o de una acción espiritual; el texto principal conserva esa ambigüedad.
    reason: theological_note
  - marker: c
    text: O «cantaré» o «haré melodía». Aquí ψάλλω se entiende como canto de alabanza.
    reason: lexical_alternative
lexical_decisions:
- source_word: τί οὖν ἐστιν;
  english_pob_choice: What then is to be done?
  chosen_spanish: ¿Qué, pues, es?
  alternatives_spanish:
  - ¿Qué, pues?
  - ¿Qué, entonces, es?
  - ¿Qué, pues, debe hacerse?
  lexicon: BDAG
  rationale: El griego formula una pregunta retórica de conclusión. En español, «¿Qué, pues, es?» conserva la concisión del giro original y mantiene abierta la inferencia práctica sin añadir una explicación más interpretativa que el texto no expresa de forma explícita.
- source_word: προσεύξομαι
  english_pob_choice: I will pray
  chosen_spanish: Oraré
  alternatives_spanish:
  - Iré a orar
  - Voy a orar
  - oraré
  lexicon: BDAG
  rationale: El futuro de προσεύχομαι se vierte de manera directa como futuro en español. «Oraré» conserva la sencillez verbal y el valor de decisión futura del griego.
- source_word: τῷ πνεύματι
  english_pob_choice: with the spirit
  chosen_spanish: con el espíritu
  alternatives_spanish:
  - en el espíritu
  - por el Espíritu
  - con mi espíritu
  lexicon: BDAG
  rationale: La preposición/dativo instrumental se refleja naturalmente como «con». Se conserva la ambigüedad del griego respecto de si se trata del espíritu humano, del Espíritu Santo o de una manifestación espiritual, sin resolverla en el texto principal.
- source_word: τῷ νοΐ
  english_pob_choice: with the mind
  chosen_spanish: con la mente
  alternatives_spanish:
  - con el entendimiento
  - con el entendimiento consciente
  lexicon: BDAG
  rationale: νοῦς se refiere aquí a la facultad de pensar o comprender. «Mente» mantiene el paralelismo con «espíritu» y resulta natural en español; «entendimiento» es posible, pero suena más explicativo que el sustantivo griego.
- source_word: ψαλῶ
  english_pob_choice: I will sing praise
  chosen_spanish: cantaré alabanzas
  alternatives_spanish:
  - cantaré
  - haré melodía
  - entonaré alabanzas
  lexicon: BDAG
  rationale: En este contexto ψάλλω apunta al canto de alabanza. «Cantaré alabanzas» expresa la función cultual de manera clara y sobria, sin introducir un tecnicismo o un giro menos natural en español.
- source_word: δὲ καὶ
  english_pob_choice: but I will also
  chosen_spanish: pero también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La construcción marca adición con leve contraste. «Pero también» comunica esa combinación de contraste y suma sin cargar el texto con una adversativa más fuerte de la necesaria.
theological_decisions:
- issue: Sentido de πνεῦμα en el contraste entre espíritu y mente
  english_pob_reading: Render generically as 'spirit' without specifying 'Holy Spirit' or 'human spirit' in the main text.
  chosen_spanish_reading: Traducir genéricamente como «espíritu» sin especificar «Espíritu Santo» ni «mi espíritu» en el texto principal.
  alternative_spanish_readings:
  - el Espíritu
  - mi espíritu
  rationale: El contexto inmediato deja en tensión varias posibilidades interpretativas. La traducción conserva esa ambigüedad en lugar de resolverla prematuramente, siguiendo el criterio del POB de no eliminar una tensión léxica o teológica documentada.
  doctrine_reference: Preservar la ambigüedad textual y doctrinal donde el griego no la resuelve de manera explícita.
translation_notes:
  revision_awareness: No hay cambios de revisión aplicados en el expediente inglés; se siguió la última pasada estable, con acuerdo alto entre revisores y sin objeciones abiertas.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo entre «con el espíritu» y «con la mente» para reflejar la estructura del griego.
  - Se evitó resolver en el texto principal si πνεῦμα alude al Espíritu Santo o al espíritu humano.
  - Se eligió un registro bíblico moderno y digno, sin depender de fórmulas eclesiásticas tradicionales que oculten el término original.
  - Se conservó la repetición de «oraré» y «cantaré alabanzas» para reflejar la simetría retórica del versículo.
