translation:
  language: es
  text: Por tanto[a], si no conozco el sentido de la voz, seré extranjero al que habla[b], y el que habla será extranjero a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la fuerza de la voz»; es decir, la significación o el sentido que transmite el sonido.
    reason: lexical_alternative
  - marker: b
    text: Griego βάρβαρος, aquí con el sentido de alguien extranjero en el habla o incomprensible, no necesariamente «incivilizado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν οὖν
  english_pob_choice: Therefore, if
  chosen_spanish: Por tanto, si
  alternatives_spanish:
  - Así que, si
  - Entonces, si
  lexicon: BDAG
  rationale: Ἐὰν introduce la condición y οὖν marca inferencia; «Por tanto, si» preserva la relación lógica de Pablo en español natural y digno.
- source_word: μὴ εἰδῶ
  english_pob_choice: I do not know
  chosen_spanish: no conozco
  alternatives_spanish:
  - no sé
  - no entiendo
  lexicon: BDAG
  rationale: οἶδα tiene el sentido básico de saber/conocer. «Conocer» permite en español una formulación fluida sin perder el valor cognitivo del verbo.
- source_word: τὴν δύναμιν
  english_pob_choice: the meaning
  chosen_spanish: el sentido
  alternatives_spanish:
  - la fuerza
  - la significación
  - el poder
  lexicon: BDAG
  rationale: δύναμις literalmente es «poder/fuerza», pero en la expresión «la δύναμιν de la voz» el sentido es la significación comunicada. «Sentido» comunica bien esa idea sin sobretraducir.
- source_word: τῆς φωνῆς
  english_pob_choice: of the voice
  chosen_spanish: de la voz
  alternatives_spanish:
  - del sonido
  - del habla
  - del lenguaje
  lexicon: BDAG
  rationale: φωνή puede ser «voz» o «sonido». Como el audit trail revisó la traducción inglesa hacia «voice», «voz» es la opción más cercana y publicable en español.
- source_word: ἔσομαι
  english_pob_choice: I will be
  chosen_spanish: seré
  alternatives_spanish:
  - habré de ser
  lexicon: BDAG
  rationale: Futuro simple de εἰμί; «seré» es la equivalencia natural y directa en español.
- source_word: τῷ λαλοῦντι
  english_pob_choice: to the one speaking
  chosen_spanish: para el que habla
  alternatives_spanish:
  - al que habla
  - para el que está hablando
  - para el hablante
  lexicon: BDAG
  rationale: El participio presente mantiene la acción en curso. «Para el que habla» refleja la relación interpersonal del dativo con claridad y evita rigidez.
- source_word: βάρβαρος
  english_pob_choice: a foreigner
  chosen_spanish: extranjero
  alternatives_spanish:
  - bárbaro
  - forastero
  - uno de lengua extraña
  lexicon: BDAG
  rationale: Aquí βάρβαρος designa a alguien lingüísticamente ajeno o incomprensible, no una valoración moral de incultura. «Extranjero» expresa la distancia comunicativa de modo natural en español.
- source_word: ἐν ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - ante mí
  - conmigo
  lexicon: BDAG
  rationale: La construcción recíproca expresa la relación desde mi perspectiva. «Para mí» reproduce bien el valor relacional e interpersonal en español.
translation_notes:
  revision_awareness: Alineado con el expediente revisado, que favorece «voice» sobre «sound» para φωνή y mantiene «foreigner» para βάρβαρος. La versión española conserva esa decisión léxica y ancla cada nota al término correspondiente.
  spanish_consistency_notes:
  - Se mantiene el valor inferencial de οὖν con «Por tanto».
  - «Voz» se usa para φωνή conforme al cierre revisado del expediente inglés.
  - «Extranjero» evita la carga peyorativa moderna de «bárbaro» y refleja el valor lingüístico del término en este contexto.
  - No se introduce vocabulario eclesiástico ajeno ni una paráfrasis más amplia que la permitida por el griego.
