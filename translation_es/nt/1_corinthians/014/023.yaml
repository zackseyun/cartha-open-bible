translation:
  language: es
  text: Por tanto[a], si toda la iglesia se reúne en un mismo lugar y todos hablan en lenguas, y entran personas sin instrucción[b] o incrédulos, ¿no dirán que ustedes están fuera de sí?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hablan en idiomas». El término griego puede significar «idiomas», pero «lenguas» conserva la expresión establecida en este contexto sin resolver la naturaleza debatida del fenómeno.
    reason: alternative_reading
  - marker: b
    text: O «personas no iniciadas». El griego probablemente se refiere a quienes no están informados o iniciados en las prácticas de la congregación, distinguidos aquí de los «incrédulos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκκλησία
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία nombra a la comunidad cristiana reunida. «Iglesia» es el equivalente natural en español y conserva ese sentido colectivo sin perder la referencia al grupo creyente.
- source_word: ὅλη
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - entera
  - completa
  lexicon: BDAG
  rationale: Modifica a ἐκκλησία y recalca la totalidad del grupo. «Toda la iglesia» reproduce bien esa fuerza inclusiva en español.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: in one place
  chosen_spanish: en un mismo lugar
  alternatives_spanish:
  - juntos
  - en el mismo sitio
  lexicon: BDAG
  rationale: La expresión idiomática indica reunirse en el mismo espacio. «En un mismo lugar» conserva el sentido espacial con claridad y naturalidad en español.
- source_word: λαλῶσιν γλώσσαις
  english_pob_choice: speak in tongues
  chosen_spanish: hablan en lenguas
  alternatives_spanish:
  - hablan con lenguas
  - hablan en idiomas
  lexicon: BDAG
  rationale: «Lenguas» mantiene el término establecido para el fenómeno carismático en 1 Corintios 12–14 y preserva la tensión interpretativa del pasaje. «Idiomas» resolvería demasiado pronto la cuestión.
- source_word: ἰδιῶται
  english_pob_choice: uninstructed people
  chosen_spanish: personas sin instrucción
  alternatives_spanish:
  - insiders no instruidos
  - personas no iniciadas
  - forasteros
  lexicon: BDAG
  rationale: El término apunta a quienes no están formados o informados respecto de la práctica de la congregación. «Personas sin instrucción» conserva ese matiz mejor que «forasteros», que podría confundirse con ἄπιστοι.
- source_word: ἄπιστοι
  english_pob_choice: unbelievers
  chosen_spanish: incrédulos
  alternatives_spanish:
  - no creyentes
  - descreídos
  lexicon: BDAG
  rationale: Es la contrapartida de la comunidad creyente. «Incrédulos» es un equivalente sobrio y transparente en español.
- source_word: μαίνεσθε
  english_pob_choice: you are out of your minds
  chosen_spanish: están locos
  alternatives_spanish:
  - están fuera de sí
  - están dementes
  - están locos de remate
  lexicon: BDAG
  rationale: El verbo expresa la idea de estar fuera de la razón o de la cordura. «Están locos» comunica la fuerza idiomática sin sonar excesivamente coloquial o médico.
- source_word: οὐκ ἐροῦσιν ὅτι
  english_pob_choice: will they not say that
  chosen_spanish: ¿no dirán que
  alternatives_spanish:
  - ¿no van a decir que
  - ¿acaso no dirán que
  lexicon: BDAG
  rationale: La construcción retórica espera una respuesta afirmativa. «¿No dirán que…?» mantiene ese carácter y fluye bien en español.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca una inferencia lógica a partir del argumento anterior. «Por tanto» conserva con precisión ese enlace discursivo.
- source_word: συνέλθῃ
  english_pob_choice: comes together
  chosen_spanish: se reúne
  alternatives_spanish:
  - se junta
  - se congrega
  lexicon: BDAG
  rationale: El verbo expresa reunirse o congregarse. «Se reúne» es la opción más natural y fiel al contexto de la asamblea cristiana.
theological_decisions:
- issue: Cómo traducir γλώσσαις en 1 Corintios 14:23
  english_pob_reading: Rendered as 'tongues' rather than 'languages' in the main text.
  chosen_spanish_reading: Traducido como «lenguas» y no «idiomas» en el texto principal.
  alternative_spanish_readings:
  - idiomas
  rationale: El griego puede significar «lenguas/idiomas», pero en este capítulo funciona como la etiqueta reconocible del fenómeno carismático. «Lenguas» preserva la ambigüedad interpretativa del pasaje y no decide de antemano si se trata de idiomas humanos, habla extática u otra forma del fenómeno.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'Coincide con la última revisión auditada: no hay cambios aplicados respecto del pase más reciente; la evaluación externa marcó alto acuerdo y confirmó la lectura estable.'
  spanish_consistency_notes:
  - Se mantiene «iglesia» para ἐκκλησία, coherente con el uso paulino y con el registro eclesial natural del español.
  - Se conserva «lenguas» como término técnico del pasaje para no resolver la discusión sobre la naturaleza del don.
  - «Incrédulos» distingue bien a ἄπιστοι de «personas sin instrucción», evitando fusionar ambos grupos.
  - La pregunta retórica se formula en plural para concordar con el sujeto implícito del griego y con el sentido general de la escena.
