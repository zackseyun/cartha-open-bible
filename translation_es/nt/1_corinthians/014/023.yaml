    text: Or 'speak in languages.' The Greek term can mean 'languages,' but 'tongues' preserves the established expression in this context without resolving the debated nature of the phenomenon.
    reason: alternative_reading
  - marker: b
    text: Or 'outsiders' for 'uninstructed people.' The Greek likely refers to those not informed or initiated in the congregation's practices, distinguished here from 'unbelievers.'
    reason: lexical_alternative
