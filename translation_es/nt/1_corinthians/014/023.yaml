base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/023.yaml
  text: Therefore[a], if the whole church comes together in one place and all speak in tongues, and uninstructed people or unbelievers enter[b], will they not say that you are out of your minds?
  footnotes:
