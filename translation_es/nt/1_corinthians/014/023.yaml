review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: inferencia con «Por tanto», reunión de «toda la iglesia» «en un mismo lugar», habla «en lenguas», entrada de dos grupos distintos (ἰδιῶται / ἄπιστοι) y pregunta retórica final. Sin embargo, «están locos» desplaza el referente de μαίνεσθε del segundo plural («ustedes») hacia un plural no marcado que en español puede sonar menos directo; además, «personas sin instrucción» es fiel pero algo áspero, y conviene una formulación más natural sin perder la distinción con «incrédulos».'
  spanish_quality_summary: 'El texto es claro y legible, con registro adecuado. La principal mejora de estilo y precisión es hacer explícito el referente de la acusación final con «ustedes están fuera de sí», que suena más digno y cercano al matiz idiomático del inglés auditado. También conviene ajustar la nota b: «forasteros» no es la mejor alternativa para ἰδιῶται en este contexto; «personas no iniciadas» o «no informadas» encaja mejor con la justificación documentada.'
  glossary_alignment: 'Se mantiene bien la terminología del proyecto: «iglesia» para ἐκκλησία, «lenguas» para γλώσσαις preservando la tensión teológica, e «incrédulos» para ἄπιστοι. No hay términos del glosario mayor en conflicto. La revisión propuesta conserva «lenguas» y mejora la equivalencia de μαίνεσθε con una expresión española más precisa y sobria.'
  issues:
