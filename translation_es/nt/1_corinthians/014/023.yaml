    issue: «están locos» para μαίνεσθε
    rationale: Aunque comunica la idea general, pierde parte de la fuerza idiomática dirigida al «ustedes» y suena algo más coloquial/blunta que el inglés auditado «out of your minds». «Ustedes están fuera de sí» o «han perdido la razón» representa mejor el matiz sin sobreinterpretar.
  - severity: low
    issue: Nota b usa «forasteros» como alternativa
    rationale: La justificación inglesa distingue ἰδιῶται de «unbelievers» como personas no informadas o no iniciadas, no necesariamente forasteras. «Forasteros» puede introducir una idea espacial/social no central al término.
  - severity: low
    issue: «personas sin instrucción» es fiel pero algo rígido
    rationale: No es incorrecto, pero en español eclesial más natural puede ser «personas no instruidas» o mantener la forma actual con nota mejorada. La revisión mínima conserva el texto principal y mejora solo donde la precisión lo pide.
