revisions:
- from: Pero si quieren aprender algo[a], pregúntenles a sus propios maridos en casa[b], porque es vergonzoso que una mujer hable en la asamblea.
  to: Pero si quieren aprender algo, que les pregunten a sus propios maridos en casa[b], porque es vergonzoso que una mujer[a] hable en la asamblea.
  rationale: Se corrige una construcción española no idiomática en el mandato («que les pregunten a sus propios maridos») y se reubica/reescribe la nota [a] para que refleje fielmente la ambigüedad léxica de γυναικί documentada por el POB inglés. El resto del versículo puede mantenerse.
