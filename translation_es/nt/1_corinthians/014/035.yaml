review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en general el sentido del griego y del POB inglés: mantiene «aprender», «en casa», «sus propios maridos», «vergonzoso», «hable» y «en la asamblea», y preserva bien la tensión interpretativa del pasaje. Sin embargo, la cláusula imperativa está mal construida en español: «pregúntenles a sus propios maridos» introduce un dativo redundante e impreciso; el griego pide simplemente que les pregunten a sus propios maridos. Además, la nota [a] no corresponde al punto léxico documentado en el POB inglés, pues introduce una alternativa inexistente («para que aprendan algo») y mezcla indebidamente la cuestión de «esposa», que pertenece a γυναικί, no a μαθεῖν.'
  spanish_quality_summary: La redacción es mayormente clara y digna, pero requiere una corrección pequeña para sonar natural y exacta en español bíblico moderno. «Que les pregunten a sus propios maridos» o «que pregunten a sus propios maridos» sería idiomático; la forma actual suena defectuosa. También hace falta reparar la nota [a] para que refleje la ambigüedad de «mujer/esposa» en la cláusula final, no el verbo «aprender».
  glossary_alignment: No hay conflicto con los términos base del proyecto. «Asamblea» para ἐκκλησία y «maridos» para ἄνδρας están bien alineados con la auditoría inglesa. La decisión principal «mujer» en el texto y «esposa» en nota también está bien, pero la nota fue colocada y redactada incorrectamente en el borrador; debe anclarse en «mujer» en vez de «algo».
  issues:
  - severity: high
    issue: Construcción española defectuosa en «pregúntenles a sus propios maridos»
    rationale: El griego ἐπερωτάτωσαν τοὺς ἰδίους ἄνδρας significa «que pregunten a sus propios maridos» / «que les pregunten a sus propios maridos». La forma actual combina objeto indirecto y complemento con «a» de manera torpe y potencialmente ambigua.
  - severity: high
    issue: La nota [a] no refleja la decisión léxica del POB inglés
    rationale: La nota inglesa [a] corresponde a γυνή = «woman/wife», no a μαθεῖν. El borrador introduce una alternativa no sustentada por la auditoría («para que aprendan algo») y además desplaza indebidamente la observación sobre «esposa».
  - severity: medium
    issue: El anclaje de la nota debe moverse de «algo» a «mujer»
    rationale: Para preservar la ambigüedad documentada de γυναικί, la nota debe ir donde aparece «mujer», no junto a «aprender algo».
  revised_spanish_text: Pero si quieren aprender algo, que les pregunten a sus propios maridos en casa[b], porque es vergonzoso que una mujer[a] hable en la asamblea.
  revised_footnotes:
  - marker: a
    text: O «esposa». La palabra griega puede significar «mujer» o «esposa», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en la iglesia» o «en la congregación»; el griego se refiere a la asamblea reunida.
    reason: lexical_alternative
  revision_rationale: Se corrige una construcción española no idiomática en el mandato («que les pregunten a sus propios maridos») y se reubica/reescribe la nota [a] para que refleje fielmente la ambigüedad léxica de γυναικί documentada por el POB inglés. El resto del versículo puede mantenerse.
