translation:
  language: es
  text: Pero si quieren aprender algo, que les pregunten a sus propios maridos en casa[b], porque es vergonzoso que una mujer[a] hable en la asamblea.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposa». La palabra griega puede significar «mujer» o «esposa», según el contexto.
    reason: lexical_alternative
  - marker: b
    text: O «en la iglesia» o «en la congregación»; el griego se refiere a la asamblea reunida.
    reason: lexical_alternative
lexical_decisions:
- source_word: μαθεῖν
  english_pob_choice: to learn
  chosen_spanish: aprender
  alternatives_spanish:
  - enterarse
  - ser instruidas
  lexicon: BDAG
  rationale: El infinitivo aoristo de μανθάνω expresa aprender o llegar a saber. «Aprender» es la equivalencia más directa y natural en español, sin añadir matices que el griego no exige.
- source_word: ἐν οἴκῳ
  english_pob_choice: at home
  chosen_spanish: en casa
  alternatives_spanish:
  - en la casa
  - en el hogar
  lexicon: BDAG
  rationale: La expresión idiomática contrasta con la reunión pública y en español suena natural como «en casa». Mantiene el contraste doméstico frente a la asamblea.
- source_word: τοὺς ἰδίους ἄνδρας
  english_pob_choice: their own husbands
  chosen_spanish: sus propios maridos
  alternatives_spanish:
  - sus propios esposos
  - sus propios hombres
  lexicon: BDAG
  rationale: ἀνήρ puede significar «hombre» o «marido» según el contexto. Aquí, junto con ἰδίους y el marco doméstico, el sentido marital es el más probable; «maridos» conserva esa especificidad y suena natural en español.
- source_word: ἐπερωτάτωσαν
  english_pob_choice: let them ask
  chosen_spanish: pregúntenles
  alternatives_spanish:
  - que les pregunten
  - consulten
  lexicon: BDAG
  rationale: El imperativo presente tiene fuerza exhortativa. «Pregúntenles» preserva la idea de dirigir la pregunta a otros, con un español claro y directo.
- source_word: αἰσχρὸν
  english_pob_choice: shameful
  chosen_spanish: vergonzoso
  alternatives_spanish:
  - afrentoso
  - deshonroso
  lexicon: BDAG
  rationale: αἰσχρός denota algo vergonzoso, deshonroso o moralmente deshonroso. «Vergonzoso» reproduce bien la fuerza social y moral del término en español contemporáneo.
- source_word: γυναικὶ
  english_pob_choice: for a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  - una mujer casada
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa»; el texto griego, tal como está, no obliga a limitarlo a «esposa». Por eso el texto principal conserva «mujer», y la nota registra la alternativa contextual «esposa/mujer casada».
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hable
  alternatives_spanish:
  - hablar
  - decir
  lexicon: BDAG
  rationale: λαλέω significa hablar o hablar en voz alta. En español, dentro de la construcción impersonal «es vergonzoso que…», «hable» mantiene el sentido sin endurecer el registro.
- source_word: ἐν ἐκκλησίᾳ
  english_pob_choice: in the assembly
  chosen_spanish: en la asamblea
  alternatives_spanish:
  - en la iglesia
  - en la congregación
  lexicon: BDAG
  rationale: ἐκκλησία aquí se refiere a la reunión congregada. «Asamblea» evita cargar el término con sentidos institucionales posteriores y preserva el contraste con «en casa».
theological_decisions:
- issue: Alcance de la restricción sobre hablar
  english_pob_reading: Render the clause as written without narrowing it to a specific kind of speech in the main text.
  chosen_spanish_reading: Traducir la cláusula tal como está, sin limitarla en el texto principal a un tipo específico de intervención.
  alternative_spanish_readings:
  - restringirlo a preguntas disruptivas
  - restringirlo al juzgar profecías
  - tomarlo como cita de una postura corintia
  rationale: El griego, por sí solo, dice que es vergonzoso que una mujer hable en la asamblea; no especifica el tipo exacto de habla. La traducción conserva esa formulación y deja la precisión exegética fuera del texto principal.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla en la traducción.'
- issue: 'γυνή/ἀνήρ: mujer/marido versus esposa/esposo'
  english_pob_reading: Use 'husbands' for ἄνδρας and 'woman' for γυναικί in the main text, preserving the alternative 'wife' in a footnote.
  chosen_spanish_reading: Usar «maridos» para ἄνδρας y «mujer» para γυναικί en el texto principal, preservando «esposa» como alternativa en la nota.
  alternative_spanish_readings:
  - esposa ... esposo
  - mujer ... hombres
  rationale: El contexto doméstico apoya «maridos» para ἄνδρας. En γυναικί, el singular puede ser general («mujer») o marital («esposa»). El texto principal conserva la opción más amplia, mientras la nota registra la alternativa válida.
  doctrine_reference: Translation philosophy §3 y §4.
translation_notes:
  revision_awareness: Se tuvo en cuenta el audit trail inglés y la comprobación de alta concordancia sin cambios recientes; no se registraron revisiones aplicadas, por lo que la redacción española sigue directamente la lectura base auditada.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se eligió «asamblea» para ἐκκλησία, en consonancia con la terminología del POB y para evitar anacronismos.
  - Se usó «maridos» por el contexto de ἰδίους ἄνδρας; la alternativa «esposa» queda reservada a la nota para γυναικί.
  - No se introdujo lenguaje eclesiástico tradicional donde el griego habla de reunión congregada.
