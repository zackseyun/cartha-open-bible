translation:
  language: es
  text: ¿O acaso la palabra de Dios salió de ustedes[a], o llegó a ustedes solos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Se originó en ustedes la palabra de Dios?»'
