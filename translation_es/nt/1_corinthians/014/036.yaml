lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O acaso
  alternatives_spanish:
  - ¿O
  - ¿Acaso
  lexicon: BDAG
  rationale: La partícula introduce una pregunta retórica de reprensión; en español, «¿O acaso…?» conserva el valor disyuntivo y el matiz de desafío más naturalmente que un simple «¿O…?».
- source_word: ἀφ’ ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - desde ustedes
  - de entre ustedes
  lexicon: BDAG
  rationale: La preposición con genitivo expresa origen o fuente. «De ustedes» es la forma más directa y natural para mantener la idea de procedencia sin sobreinterpretarla.
- source_word: ὁ λόγος τοῦ θεοῦ
  english_pob_choice: the word of God
  chosen_spanish: la palabra de Dios
  alternatives_spanish:
  - la palabra de Dios
  - el mensaje de Dios
  lexicon: BDAG
  rationale: «Palabra de Dios» preserva el peso formal de la expresión paulina y su amplitud referencial, sin estrecharla indebidamente a un solo subcomponente del mensaje.
- source_word: ἐξῆλθεν
  english_pob_choice: go out
  chosen_spanish: salió
  alternatives_spanish:
  - salió
  - vino
  lexicon: BDAG
  rationale: El aoristo de ἐξέρχομαι significa salir/ir fuera. «Salió» reproduce de modo natural la imagen verbal y la pregunta retórica sobre el origen de la palabra.
- source_word: εἰς ὑμᾶς μόνους
  english_pob_choice: only you
  chosen_spanish: sólo a ustedes
  alternatives_spanish:
  - a ustedes solamente
  - a ustedes solos
  lexicon: BDAG
  rationale: «Sólo a ustedes» conserva la exclusividad marcada por μόνους y su función de reprensión. La colocación con «a ustedes» refleja mejor el movimiento hacia los destinatarios.
- source_word: κατήντησεν
  english_pob_choice: has it reached
  chosen_spanish: llegó
  alternatives_spanish:
  - ha llegado
  - alcanzó
  lexicon: BDAG
  rationale: El verbo expresa llegada o alcance. En español, «llegó» funciona bien en una pregunta retórica y mantiene la idea de arribo sin cargarla innecesariamente con un perfecto compuesto.
theological_decisions:
- issue: Origen y exclusividad de la palabra de Dios
  english_pob_reading: Rendered generically as 'the word of God' without narrowing it to a specific technical sense.
  chosen_spanish_reading: «la palabra de Dios» se mantiene como expresión amplia, y el versículo conserva la reprensión sobre un supuesto monopolio corintio.
  alternative_spanish_readings:
  - «el evangelio»
  - «el mensaje profético»
  rationale: El contexto critica la actitud de actuar como si la revelación divina hubiera surgido con ellos o les perteneciera en exclusiva. La traducción conserva esa amplitud y la tensión interpretativa, en vez de resolverla en el texto principal.
  doctrine_reference: Preservar la tensión teológica sin resolverla en la redacción principal.
translation_notes:
  revision_awareness: Alineado con el último pase del inglés POB, sin revisiones aplicadas; la redacción española mantiene la fuerza retórica y las alternativas léxicas documentadas en el auditable inglés.
  spanish_consistency_notes:
  - Se usa «palabra de Dios» en lugar de una paráfrasis más interpretativa para conservar la amplitud del original.
  - Se mantiene la pregunta retórica con doble miembro para reflejar la estructura griega ἢ... ἢ...
  - Se emplea «ustedes» para consistencia con español neutro latinoamericano y para reflejar el plural del destinatario.
