    issue: «una palabra clara» reduce indebidamente εὔσημον λόγον
    rationale: λόγον aquí funciona mejor como habla/discurso/mensaje articulado, no como una sola palabra aislada. El inglés auditado eligió «intelligible speech» precisamente para evitar esa estrechez.
  - severity: medium
