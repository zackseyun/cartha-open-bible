translation:
  language: es
  text: 'Así también ustedes: si por la lengua no expresan palabras comprensibles[a], ¿cómo se entenderá lo que se habla? Porque estarán hablando al aire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabras claras» o «un mensaje claro». El griego enfatiza un habla reconocible y comprensible para los oyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: So also with you
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - De la misma manera, ustedes también
  - Así pues, ustedes también
  lexicon: BDAG
  rationale: Conserva la comparación con el ejemplo anterior y mantiene el tono directo de aplicación a los corintios. En español, «ustedes» comunica naturalmente el plural directo sin añadir contenido.
- source_word: διὰ τῆς γλώσσης
  english_pob_choice: through the tongue
  chosen_spanish: por la lengua
  alternatives_spanish:
  - con la lengua
  - por medio de la lengua
  lexicon: BDAG
  rationale: «Por la lengua» preserva la imagen concreta del órgano de habla y refleja el valor instrumental de διά. En este contexto, la referencia apunta al acto vocal, no simplemente a «idioma».
- source_word: εὔσημον λόγον
  english_pob_choice: intelligible speech
  chosen_spanish: una palabra clara
  alternatives_spanish:
  - un խոսlar claro
  - un mensaje claro
  - un discurso inteligible
  lexicon: BDAG
  rationale: εὔσημος expresa algo reconocible, claro y distinguible. «Palabra clara» funciona de manera natural en español y mantiene la exigencia de comprensibilidad. Se evita forzar «mensaje» porque λόγος aquí conserva el sentido de habla articulada.
- source_word: δῶτε
  english_pob_choice: you do not give
  chosen_spanish: no den
  alternatives_spanish:
  - no ofrezcan
  - no emitan
  - no entreguen
  lexicon: BDAG
  rationale: Se conserva la idea de «dar» propia de δίδωμι, pero en español «dar una palabra» resulta idiomático y fiel. El negativo reproduce la condición del texto griego sin ampliar el sentido.
- source_word: πῶς γνωσθήσεται τὸ λαλούμενον
  english_pob_choice: how will what is spoken be understood
  chosen_spanish: ¿cómo se entenderá lo que se habla?
  alternatives_spanish:
  - ¿cómo se conocerá lo que se dice?
  - ¿cómo se reconocerá lo hablado?
  lexicon: BDAG
  rationale: «Se entenderá» comunica mejor el pasivo de γινώσκω en un contexto de comprensión auditiva. «Lo que se habla» conserva el participio sustantivado sin volverlo demasiado técnico.
- source_word: ἔσεσθε γὰρ εἰς ἀέρα λαλοῦντες
  english_pob_choice: For you will be speaking into the air
  chosen_spanish: Porque estarán hablando al aire
  alternatives_spanish:
  - Porque estarán hablando al vacío
  - Porque estarán hablando en el aire
  lexicon: BDAG
  rationale: «Al aire» preserva la metáfora de inutilidad comunicativa y corresponde bien a εἰς ἀέρα. «Estarán hablando» transmite el valor progresivo de la perífrasis participial sin recargar la sintaxis.
theological_decisions:
- issue: Comprensión como criterio del hablar en lenguas en la congregación
  english_pob_reading: If speech is not intelligible, hearers cannot understand what is spoken; the result is speaking into the air.
  chosen_spanish_reading: Si el habla no es clara e inteligible, no puede ser entendida por los oyentes y queda reducida a hablar al aire.
  alternative_spanish_readings:
  - Si no se da un mensaje claro, no se entenderá lo que se dice.
  - Si no se habla con claridad, el discurso queda sin efecto comunicativo.
  rationale: 'La frase mantiene la fuerza argumentativa de Pablo: el valor del habla pública depende de su comprensibilidad para otros. No se introduce una interpretación doctrinal adicional; se conserva la tensión entre expresión vocal y comprensión comunitaria.'
  doctrine_reference: 1 Corintios 14:6–12; principio de edificación y entendimiento en el culto
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail inglés: se mantuvo la comparación introductoria, la imagen concreta de la lengua, la exigencia de claridad para εὔσημον λόγον, el pasivo de comprensión para γνωσθήσεται y la metáfora final de hablar al aire. No hubo revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo requiera; aquí no aparece.
  - Se evitó «Cristo»/«Mesías» por no ser pertinente en este versículo.
  - Se mantuvo un registro modernamente eclesial, pero no arcaizante.
  - La nota textual en el pie de página se ancla en «clara» para reflejar el abanico semántico de εὔσημον.
