translation:
  language: es
  text: Si alguien habla en una lengua[a], que sean dos, o a lo más tres, y por turno, y que uno interprete.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un idioma». El griego puede significar lengua o idioma; aquí «lengua» conserva la formulación de Pablo en este capítulo sin decidir el debate más amplio sobre la naturaleza del don.
    reason: lexical_alternative
lexical_decisions:
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en una lengua
  alternatives_spanish:
  - en una lengua
  - en un idioma
  lexicon: BDAG
  rationale: El griego γλώσσῃ puede referirse a “lengua” o “idioma”. En español, “en una lengua” conserva la expresión tradicional del pasaje sin decidir si se trata de una lengua humana conocida o de otra clase de habla; “idioma” sería una alternativa válida pero desplaza el término característico del capítulo.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: El indefinido tiene fuerza general y no específica. “Alguien” suena natural en español moderno y mantiene el carácter abierto de la instrucción.
- source_word: λαλεῖ
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - está hablando
  - dice
  lexicon: BDAG
  rationale: El presente indicativo en una instrucción general se expresa con un presente simple en español. “Habla” es directo y fiel al valor verbal básico.
- source_word: κατὰ δύο ἢ τὸ πλεῖστον τρεῖς
  english_pob_choice: let there be two, or at most three
  chosen_spanish: que sean dos, o a lo más tres
  alternatives_spanish:
  - dos, o a lo más tres
  - que haya dos, o a lo más tres
  lexicon: BDAG
  rationale: La frase limita el número de participantes. “Que sean dos, o a lo más tres” reproduce con naturalidad la instrucción reguladora, sin suavizar la restricción.
- source_word: ἀνὰ μέρος
  english_pob_choice: each in turn
  chosen_spanish: por turno
  alternatives_spanish:
  - uno por uno
  - en turno
  lexicon: BDAG
  rationale: La expresión indica orden secuencial, no simultaneidad. “Por turno” es idiomático y claro en español; “uno por uno” también es posible, pero puede sonar menos formal.
- source_word: εἷς
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - uno solo
  - alguno
  lexicon: BDAG
  rationale: 'El numeral funciona como sustantivo: una sola persona debe cumplir la acción. “Uno” conserva esa sencillez y precisión.'
- source_word: διερμηνευέτω
  english_pob_choice: let one interpret
  chosen_spanish: que uno interprete
  alternatives_spanish:
  - que uno traduzca
  - que uno explique
  lexicon: BDAG
  rationale: El mandato pide la mediación comprensible de lo dicho en lenguas. “Interpretar” es el equivalente más establecido y preciso en este contexto; “traduzca” y “explique” son alternativas posibles, pero menos exactas o más interpretativas.
theological_decisions:
- issue: Sentido de γλώσσῃ en el contexto de los dones espirituales
  english_pob_reading: Render as 'tongue' in the main text, referring to the phenomenon discussed in 1 Corinthians 12–14, without specifying whether the speech is human or heavenly.
  chosen_spanish_reading: Traducir con “lengua” en el texto principal, aludiendo al fenómeno de 1 Corintios 12–14 sin precisar si se trata de una lengua humana o de un tipo de habla no identificado.
  alternative_spanish_readings:
  - idioma
  - habla extática
  - lengua extranjera humana
  rationale: El versículo no resuelve la naturaleza del fenómeno. “Lengua” preserva la terminología paulina y deja intacta la tensión teológica y lexical, en lugar de cerrar la cuestión con una especificación no exigida por el texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La versión española sigue de cerca el texto griego y el razonamiento auditado del POB inglés. Se mantuvo la restricción numérica, la secuencia distributiva y el mandato final de interpretar, evitando introducir explicaciones no presentes en el versículo.
  spanish_consistency_notes:
  - Se usa «lengua» para γλώσσῃ, en continuidad con el vocabulario del capítulo y con una nota que reconoce la alternativa «idioma».
  - Se eligió «interpretar» para διερμηνευέτω por ser el término más estable en contexto eclesial y exegético.
  - La estructura imperativa en español busca reflejar la fuerza normativa del griego sin sonar artificial.
