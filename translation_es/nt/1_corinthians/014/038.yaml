translation:
  language: es
  text: Pero si alguien no reconoce esto[a][b], no es reconocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «si alguien es ignorante, que siga siendo ignorante». El texto adoptado dice: «si alguien no reconoce esto, no es reconocido».'
    reason: textual_variant
  - marker: b
    text: 'O: «si alguien no reconoce ... no es reconocido». El griego usa el mismo verbo en forma activa y pasiva para producir un efecto retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - si acaso
  - en caso de que
  lexicon: BDAG
  rationale: La partícula condicional se refleja con la condicional simple «si», que mantiene la apertura de la condición sin añadir matices no presentes en el griego.
- source_word: δέ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - ahora
  - y
  lexicon: BDAG
  rationale: «Pero» conserva bien el giro adversativo respecto de la afirmación anterior y suena natural en español.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: El indefinido singular genérico se expresa de forma natural con «alguien», sin perder el alcance general de la advertencia.
- source_word: ἀγνοεῖ
  english_pob_choice: does not recognize
  chosen_spanish: no reconoce
  alternatives_spanish:
  - ignora
  - no reconoce esto
  - no lo reconoce
  lexicon: BDAG
  rationale: En este contexto, la fuerza no es solo falta de información, sino rechazo a reconocer la instrucción apostólica. «No reconoce» preserva esa ambivalencia sin endurecerla hacia «ignora».
- source_word: ἀγνοεῖται
  english_pob_choice: is not recognized
  chosen_spanish: no es reconocido
  alternatives_spanish:
  - es ignorado
  - no es reconocido/aceptado
  lexicon: BDAG
  rationale: El pasivo mantiene el paralelismo verbal con ἀγνοεῖ. «No es reconocido» reproduce el efecto recíproco/judicial sin exigir explicitar el agente pasivo.
theological_decisions:
- issue: Sentido del pasivo ἀγνοεῖται en el cierre retórico
  english_pob_reading: 'a reciprocal/judicial sense: the person who refuses to acknowledge apostolic instruction will himself not be acknowledged'
  chosen_spanish_reading: 'sentido recíproco/judicial: quien no reconoce la instrucción apostólica tampoco será reconocido'
  alternative_spanish_readings:
  - será ignorado
  - será desconocido
  rationale: El texto griego usa el mismo verbo en activo y pasivo para un efecto retórico. «No es reconocido» conserva la correspondencia verbal y deja abierta la manera exacta en que se concreta esa falta de reconocimiento, sin reducirla a mera ignorancia intelectual.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor textual del versículo según la nota de variante
  english_pob_reading: Some manuscripts read, 'if anyone is ignorant, let him be ignorant.' The adopted text reads, 'if anyone ignores this, he is ignored.'
  chosen_spanish_reading: 'Se sigue el texto adoptado con una lectura indicativa pasiva: «si alguien no reconoce esto, no es reconocido»'
  alternative_spanish_readings:
  - si alguien es ignorante, que siga siendo ignorante
  - si alguien lo ignora, sea ignorado
  rationale: La base crítica dada en el paquete de fuente corresponde al indicativo pasivo. Por eso la redacción española evita el imperativo y refleja la forma adoptada, sin borrar la variante documentada.
  doctrine_reference: Texto crítico y variantes manuscritas
translation_notes:
  revision_awareness: Se incorporó la revisión del audit trail inglés que ajustó la opción desde «ignora/es ignorado» hacia una formulación con «no reconoce/no es reconocido», para reflejar con mayor precisión el sentido lexical de ἀγνοέω y preservar el paralelismo verbal del griego.
  spanish_consistency_notes:
  - Se mantuvo «no reconoce / no es reconocido» para conservar la correspondencia activa-pasiva del original.
  - «Esto» traduce el objeto implícito del griego y evita añadir especificaciones no presentes en el versículo.
  - El tono es breve y sentencioso, acorde con el cierre de la sección en 1 Corintios 14.
