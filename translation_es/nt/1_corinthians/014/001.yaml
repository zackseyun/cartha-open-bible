translation:
  language: es
  text: Persigan el amor, y anhelen las cosas espirituales[a], pero sobre todo que profeticen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas del Espíritu»; el contexto inmediato sugiere manifestaciones dadas por el Espíritu en la iglesia.
    reason: lexical_alternative
  - marker: b
    text: O «más bien que profeticen».
    reason: alternative_reading
lexical_decisions:
- source_word: Διώκετε
  english_pob_choice: Pursue
  chosen_spanish: Persigan
  alternatives_spanish:
  - Sigan tras
  - Busquen con empeño
  lexicon: BDAG
  rationale: διώκω expresa la idea de perseguir, ir tras algo con esfuerzo sostenido. «Persigan» conserva el impulso activo y continuo sin volverlo una paráfrasis débil.
- source_word: τὴν ἀγάπην
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  lexicon: BDAG
  rationale: ἀγάπη se traduce naturalmente como «amor». «Caridad» es más arcaico y puede ocultar la conexión léxica con el capítulo anterior.
- source_word: ζηλοῦτε
  english_pob_choice: earnestly desire
  chosen_spanish: deseen con celo
  alternatives_spanish:
  - anhelen con fervor
  - tengan celo por
  lexicon: BDAG
  rationale: ζηλόω puede indicar celo o deseo intenso. «Deseen con celo» conserva la fuerza exhortativa y evita un calco pesado.
- source_word: τὰ πνευματικά
  english_pob_choice: the spiritual things
  chosen_spanish: las cosas espirituales
  alternatives_spanish:
  - los dones espirituales
  - las cosas del Espíritu
  lexicon: BDAG
  rationale: El plural neutro es más amplio que «dones», pero en el contexto de 1 Corintios 12–14 se refiere a realidades/movimientos del Espíritu en la iglesia. «Las cosas espirituales» refleja esa amplitud sin añadir un término no explícito en el griego.
- source_word: μᾶλλον
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - más bien
  - sobre todo
  lexicon: BDAG
  rationale: μᾶλλον expresa preferencia o énfasis superior. «Especialmente» transmite bien la prioridad dada a la profecía en español natural.
- source_word: ἵνα προφητεύητε
  english_pob_choice: that you may prophesy
  chosen_spanish: que profeticen
  alternatives_spanish:
  - para que profeticen
  - que puedan profetizar
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa el contenido o propósito del deseo. En español, la subordinada final se expresa de manera natural con «que profeticen».
- source_word: προφητεύητε
  english_pob_choice: prophesy
  chosen_spanish: profeticen
  alternatives_spanish:
  - hablen proféticamente
  lexicon: BDAG
  rationale: «Profetizar» es el equivalente establecido y conserva la categoría bíblica sin paráfrasis innecesaria.
theological_decisions:
- issue: Alcance de τὰ πνευματικά
  english_pob_reading: Rendered as 'the spiritual things' rather than 'the spiritual gifts,' keeping the phrase broader than gifts while the context points to Spirit-given manifestations.
  chosen_spanish_reading: «las cosas espirituales», una expresión amplia que deja abierto el referente contextual.
  alternative_spanish_readings:
  - los dones espirituales
  - las cosas del Espíritu
  rationale: El griego es más amplio que «dones», y la frase española debe conservar esa amplitud. En el contexto de 1 Corintios 12–14, el lector entiende que se trata de manifestaciones del Espíritu, pero sin imponer una glosa más estrecha que el texto no dice.
  doctrine_reference: Translation philosophy §1, §5
- issue: Prioridad de la profecía
  english_pob_reading: '''but especially that you may prophesy'' / revised to ''especially that you may prophesy,'' preserving the comparative force of μᾶλλον.'
  chosen_spanish_reading: «especialmente que profeticen», manteniendo la prioridad sin convertirla en exclusividad.
  alternative_spanish_readings:
  - pero especialmente que profeticen
  - más bien que profeticen
  rationale: La construcción preserva la preferencia de Pablo por la profecía en este contexto, sin sugerir que sea el único don válido ni borrar el matiz comparativo de μᾶλλον.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La traducción sigue la última revisión inglesa que prefirió «the spiritual things» frente a «the spiritual gifts» y ajustó la relación de μᾶλλον δὲ para mantener naturalidad sin perder el énfasis comparativo. En español, se reflejó esa amplitud con «las cosas espirituales» y se mantuvo la prioridad de la profecía con una construcción fluida.
  spanish_consistency_notes:
  - Se usa «profeticen» para mantener el verbo técnico bíblico «profetizar».
  - Se evita «dones espirituales» porque el griego no dice explícitamente «dones» y la tradición POB documentada prefiere no estrechar el referente sin necesidad.
  - Se mantiene «amor» para ἀγάπη conforme al criterio doctrinal del proyecto.
  - La puntuación conserva tres miembros exhortativos coordinados, como en el griego.
