review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: imperativos plurales («Διώκετε», «ζηλοῦτε»), amplitud de τὰ πνευματικά como «las cosas espirituales», y la prioridad de la profecía. Sin embargo, presenta dos problemas de fidelidad/claridad: la nota [a] no ofrece una alternativa real y parece errónea, y «especialmente que profeticen» suena poco natural en español para ἵνα προφητεύητε tras «deseen».'
  spanish_quality_summary: El español es mayormente claro, pero «deseen con celo» resulta algo pesado e innecesariamente literal, y «especialmente que profeticen» es torpe. «Procuren» y «anhelen»/«deseen ardientemente» serían más idiomáticos, pero basta una reparación mínima para lograr una lectura natural y digna. También conviene ajustar las notas para que expliquen alternativas reales y no introduzcan confusión.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «amor», «profeticen» y «las cosas espirituales» son adecuados. No hay términos como Yahvé, Mesías, esclavo, etc. implicados aquí. La elección de «las cosas espirituales» sigue correctamente la decisión auditada de no estrechar τὰ πνευματικά a «dones» en el texto principal.
  issues:
  - severity: medium
    issue: 'La nota [a] es inválida o inútil: «O “el amor”».'
    rationale: El texto principal ya dice «el amor», de modo que la nota no preserva una alternativa léxica real del inglés ni del griego. Debe eliminarse o reemplazarse por una variante genuina, pero aquí no hace falta nota.
  - severity: medium
    issue: «especialmente que profeticen» es poco natural en español.
    rationale: Aunque reproduce de cerca la subordinada griega, en español suena truncado después de «deseen». Una formulación como «pero sobre todo que profeticen» o «pero especialmente procuren profetizar» comunica mejor la preferencia de μᾶλλον y el contenido de ἵνα.
  - severity: low
    issue: «deseen con celo» suena algo forzado.
    rationale: Es comprensible, pero menos idiomático que «anhelen» o «deseen ardientemente». No es un error grave de sentido, pero afecta la fluidez.
  revised_spanish_text: Persigan el amor, y anhelen las cosas espirituales[a], pero sobre todo que profeticen[b].
  revised_footnotes:
  - marker: a
    text: O «las cosas del Espíritu»; el contexto inmediato sugiere manifestaciones dadas por el Espíritu en la iglesia.
    reason: lexical_alternative
  - marker: b
    text: O «más bien que profeticen».
    reason: alternative_reading
  revision_rationale: Se elimina la nota [a] defectuosa, se mejora la naturalidad de ζηλοῦτε con «anhelen», y se reemplaza «especialmente que profeticen» por «pero sobre todo que profeticen», que conserva mejor en español la fuerza comparativa de μᾶλλον δὲ ἵνα προφητεύητε sin alejarse del sentido fuente. Se mantienen «las cosas espirituales» y la nota contextual correspondiente para respetar la amplitud de τὰ πνευματικά.
