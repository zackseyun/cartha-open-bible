revisions:
- from: Persigan el amor[a], y deseen con celo las cosas espirituales[c][b], pero especialmente que profeticen.
  to: Persigan el amor, y anhelen las cosas espirituales[a], pero sobre todo que profeticen[b].
  rationale: Se elimina la nota [a] defectuosa, se mejora la naturalidad de ζηλοῦτε con «anhelen», y se reemplaza «especialmente que profeticen» por «pero sobre todo que profeticen», que conserva mejor en español la fuerza comparativa de μᾶλλον δὲ ἵνα προφητεύητε sin alejarse del sentido fuente. Se mantienen «las cosas espirituales» y la nota contextual correspondiente para respetar la amplitud de τὰ πνευματικά.
