translation:
  language: es
  text: Así que[a], hermanos míos, anhelen profetizar, y no prohíban hablar en lenguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse inclusivamente a toda la congregación.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - por tanto
  - de modo que
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión. «Así que» conserva el sentido consecutivo y suena natural en español sin volver más rígida la frase.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos
  - hermanos y hermanas
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del vocativo griego y el posesivo «míos». En español puede funcionar representativamente para la congregación, con nota si se desea aclarar la posible inclusividad.
- source_word: ζηλοῦτε
  english_pob_choice: be eager
  chosen_spanish: anhelen
  alternatives_spanish:
  - sean celosos
  - deseen con fervor
  lexicon: BDAG
  rationale: El imperativo presente pide una disposición continua y seria. «Anhelen» comunica bien el impulso exhortativo sin sonar demasiado duro ni arcaico, aunque «ser celosos» conserva más de la fuerza léxica de ζηλόω.
- source_word: τὸ προφητεύειν
  english_pob_choice: to prophesy
  chosen_spanish: profetizar
  alternatives_spanish:
  - el profetizar
  - la profecía
  lexicon: BDAG
  rationale: El infinitivo articular funciona como complemento del mandato. En español, el infinitivo simple «profetizar» expresa la acción de modo claro y fiel.
- source_word: μὴ κωλύετε
  english_pob_choice: do not forbid
  chosen_spanish: no impidan
  alternatives_spanish:
  - no prohíban
  - no impidan ni estorben
  lexicon: BDAG
  rationale: «κωλύω» puede significar impedir o prohibir. En este contexto exhortativo, «no impidan» es una prohibición natural en español y conserva la amplitud de la acción sin introducir un matiz jurídico más fuerte que el necesario.
- source_word: τὸ λαλεῖν γλώσσαις
  english_pob_choice: speaking in tongues
  chosen_spanish: hablar en lenguas
  alternatives_spanish:
  - hablar con lenguas
  - el hablar en lenguas
  lexicon: BDAG
  rationale: La expresión idiomática estable en español es «hablar en lenguas». Mantiene el sentido del uso carismático discutido en el capítulo y evita un calco menos natural.
theological_decisions:
- issue: Posible inclusividad del vocativo masculino plural ἀδελφοί
  english_pob_reading: brothers; footnote may note brothers and sisters
  chosen_spanish_reading: hermanos míos
  alternative_spanish_readings:
  - hermanos y hermanas míos
  - hermanos y hermanas
  rationale: El griego usa masculino plural y el audit trail inglés preserva esa forma en el texto principal, con nota sobre la posible referencia inclusiva. En español, «hermanos míos» conserva la forma marcada; la inclusividad puede aclararse en nota sin borrar el rasgo gramatical del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión más reciente del audit trail no introdujo cambios; el acuerdo de revisión fue alto y no hubo observaciones que alteraran la solución base.
  spanish_consistency_notes:
  - Se mantiene «lenguas» para el fenómeno carismático, en paralelo con el uso habitual del capítulo.
  - '«Profetizar» y «hablar en lenguas» conservan la simetría verbal del griego: exhortación positiva seguida de prohibición negativa.'
  - Se evitó «SEÑOR» u otra sustitución porque este versículo no contiene el nombre divino ni una cita directa de κύριος.
