    rationale: Aunque κωλύω puede significar impedir, el audit trail inglés justificó 'do not forbid' como la mejor correspondencia por su fuerza directa en esta instrucción eclesial. 'No impidan' atenúa ese matiz y se aparta de la decisión documentada sin necesidad.
