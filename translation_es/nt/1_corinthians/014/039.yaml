  source_alignment_summary: 'El borrador sigue bien el griego y el audit trail inglés en la estructura general: ὥστε como conclusión inferencial, ἀδελφοί μου como vocativo con posesivo, ζηλοῦτε como exhortación continua, τὸ προφητεύειν como infinitivo complementario, y τὸ λαλεῖν… γλώσσαις como la práctica de hablar en lenguas. La principal desviación está en μὴ κωλύετε: el inglés auditado eligió explícitamente ''do not forbid'' por la fuerza directa de κωλύω, mientras que el español ''no impidan'' suaviza el matiz de prohibición e introduce un sentido más amplio de estorbar/prevenir.'
