  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. No aparecen Yahvé, Mesías/Cristo, Espíritu, etc. La decisión sobre ἀδελφοί está bien alineada con la política documentada: mantener ''hermanos'' en el texto principal y conservar nota de inclusividad. La única desalineación relevante es con la decisión léxica auditada para κωλύω, donde conviene reflejar ''prohibir'' en español.'
