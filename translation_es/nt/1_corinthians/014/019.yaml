translation:
  language: es
  text: Pero en la iglesia prefiero hablar cinco palabras con mi mente, para que también instruya a otros, antes que diez mil palabras en una lengua[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un idioma». El término griego puede significar «lengua» o «idioma»; aquí alude al tipo de habla tratado a lo largo de 1 Corintios 12–14.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: the church
  chosen_spanish: en la iglesia
  alternatives_spanish:
  - en la asamblea
  - en la congregación
  lexicon: BDAG
  rationale: En este contexto paulino, ἐκκλησία designa a la comunidad cristiana reunida. «Iglesia» es la forma más natural y reconocible en español, y conserva el sentido comunitario sin añadir una explicación innecesaria.
- source_word: θέλω
  english_pob_choice: I would rather
  chosen_spanish: prefiero
  alternatives_spanish:
  - quiero
  - deseo
  lexicon: BDAG
  rationale: Aquí θέλω expresa preferencia en contraste con la cláusula siguiente. «Prefiero» comunica mejor esa fuerza comparativa en español que un simple «quiero» o «deseo».
- source_word: πέντε λόγους
  english_pob_choice: five words
  chosen_spanish: cinco palabras
  alternatives_spanish:
  - cinco expresiones
  - cinco enunciados
  lexicon: BDAG
  rationale: λόγος en este contraste numérico funciona de manera concreta como «palabra»/«palabras». «Cinco palabras» preserva el golpe retórico del paralelo con «diez mil palabras».
- source_word: τῷ νοΐ μου
  english_pob_choice: with my mind
  chosen_spanish: con mi mente
  alternatives_spanish:
  - con mi entendimiento
  - con mi razón
  lexicon: BDAG
  rationale: νοῦς contrapone habla inteligible a habla en lengua no interpretada. «Con mi mente» reproduce con fidelidad el término antropológico y mantiene la tensión del texto; «entendimiento» sería interpretativo.
- source_word: λαλῆσαι
  english_pob_choice: speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - pronunciar
  lexicon: BDAG
  rationale: λαλέω en este contexto de discurso público se rinde naturalmente por «hablar». Es la opción más directa y sobria en español.
- source_word: κατηχήσω
  english_pob_choice: instruct
  chosen_spanish: instruya
  alternatives_spanish:
  - enseñe
  - catequice
  lexicon: BDAG
  rationale: κατηχέω significa instruir oralmente. «Instruya» conserva el valor formativo sin introducir el matiz técnico eclesiástico de «catequice».
- source_word: ἄλλους
  english_pob_choice: others
  chosen_spanish: a otros
  alternatives_spanish:
  - a los demás
  - a otras personas
  lexicon: BDAG
  rationale: ἄλλους simplemente significa «otros». «A otros» es natural y suficiente en español, y mantiene el alcance abierto del término.
- source_word: μυρίους λόγους
  english_pob_choice: ten thousand words
  chosen_spanish: diez mil palabras
  alternatives_spanish:
  - incontables palabras
  - miriadas de palabras
  lexicon: BDAG
  rationale: μύριοι retiene su valor literal de «diez mil» aquí para conservar la hipérbole retórica de Pablo y el contraste con «cinco palabras».
- source_word: ἐν γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en una lengua
  alternatives_spanish:
  - en un idioma
  - en lenguas
  lexicon: BDAG
  rationale: γλῶσσα en 1 Corintios 12–14 remite al habla en lengua(s) o «tongue-speech». «En una lengua» respeta el singular y evita resolver de antemano la cuestión debatida sobre la naturaleza exacta del fenómeno.
theological_decisions:
- issue: Cómo traducir γλῶσσα en el debate de 1 Corintios 12–14
  english_pob_reading: Rendered as 'a tongue' to preserve the chapter's terminology without resolving the nature of the phenomenon beyond the text.
  chosen_spanish_reading: Traducido como «una lengua» para preservar la terminología del capítulo sin resolver más allá del texto la naturaleza del fenómeno.
  alternative_spanish_readings:
  - una lengua
  - lenguas
  - un idioma
  rationale: 'La frase mantiene la tensión exegética: Pablo contrasta habla inteligible con habla en γλῶσσα, pero no define aquí el fenómeno. «Una lengua» conserva esa ambigüedad controlada mejor que opciones más explicativas.'
  doctrine_reference: Preservar la tensión teológica sin resolver la cuestión carismática debatida.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el paquete de fuente griego y el audit trail inglés: mantiene el contraste numérico, la preferencia expresada por θέλω, el valor formativo de κατηχέω y la tensión interpretativa de γλῶσσα. No se registraron revisiones posteriores en el contexto de auditoría, y el estado de consenso es alto.'
  spanish_consistency_notes:
  - Se prefirió «iglesia» como equivalente natural de ἐκκλησίᾳ en un contexto de reunión cristiana.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
  - «Mente» se mantuvo para νοῦς, en continuidad con el paralelo inglés y sin explicar en exceso.
  - «Una lengua» conserva la singularidad del griego y evita el plural litúrgico «lenguas».
  - La nota al pie está anclada en la frase «una lengua» y explica la alternativa sin resolver la discusión exegética.
