translation:
  language: es
  text: Ahora[a], hermanos, si voy a ustedes hablando en lenguas[b], ¿de qué les servirá, a menos que les hable con revelación, con conocimiento, con profecía o con enseñanza?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego «hermanos» puede dirigirse a una congregación mixta.
    reason: lexical_alternative
  - marker: b
    text: O «hablando en idiomas»; el término griego puede significar «idiomas», pero en este contexto se refiere al fenómeno tratado a lo largo de 1 Corintios 12–14.
    reason: lexical_alternative
lexical_decisions:
- source_word: Νῦν δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y ahora
  - Pues ahora
  lexicon: BDAG
  rationale: Marca el cambio discursivo hacia el punto presente del argumento de Pablo. «Ahora» conserva la transición sin forzar un contraste excesivo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: Mantiene el vocativo masculino plural del griego y el uso paulino como apelación a la congregación; la posible referencia mixta queda indicada en nota.
- source_word: γλώσσαις λαλῶν
  english_pob_choice: speaking in tongues
  chosen_spanish: hablando en lenguas
  alternatives_spanish:
  - hablando en idiomas
  - hablando en otras lenguas
  lexicon: BDAG
  rationale: En 1 Corintios 12–14, γλῶσσα en esta construcción designa el fenómeno carismático en discusión. «Lenguas» conserva el uso eclesial y el vínculo terminológico con el contexto.
- source_word: τί ὑμᾶς ὠφελήσω
  english_pob_choice: what will I profit you
  chosen_spanish: ¿de qué les aprovecharé?
  alternatives_spanish:
  - ¿qué les aprovecharé?
  - ¿qué provecho les daré?
  lexicon: BDAG
  rationale: ὠφελέω expresa beneficio/provecho; en español «aprovechar» reproduce de forma natural el valor de utilidad para ustedes y evita una construcción extraña.
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: BDAG
  rationale: Conserva la negación condicional de modo claro y directo en español.
- source_word: ἐν ἀποκαλύψει
  english_pob_choice: in revelation
  chosen_spanish: en revelación
  alternatives_spanish:
  - por revelación
  - mediante revelación
  lexicon: BDAG
  rationale: Se mantiene la preposición con valor modal/instrumental reflejando más de cerca la estructura griega y la revisión del POB inglés.
- source_word: ἐν γνώσει
  english_pob_choice: in knowledge
  chosen_spanish: en conocimiento
  alternatives_spanish:
  - por conocimiento
  - mediante conocimiento
  lexicon: BDAG
  rationale: Conserva el paralelismo de las frases con ἐν y la serie de medios de edificación inteligible.
- source_word: ἐν προφητείᾳ
  english_pob_choice: in prophecy
  chosen_spanish: en profecía
  alternatives_spanish:
  - por profecía
  - mediante profecía
  lexicon: BDAG
  rationale: Respeta el término técnico y la estructura paralela del listado.
- source_word: ἐν διδαχῇ
  english_pob_choice: in teaching
  chosen_spanish: en enseñanza
  alternatives_spanish:
  - por enseñanza
  - mediante enseñanza
  - en instrucción
  lexicon: BDAG
  rationale: διδαχή denota enseñanza/instrucción; «enseñanza» es el equivalente más natural y mantiene el ritmo de la enumeración.
theological_decisions:
- issue: Alcance de ἀδελφοί como vocativo congregacional mixto
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se conserva el masculino plural del original en el texto principal, sin negar que Pablo se dirige a la comunidad completa. La nota preserva la posibilidad inclusiva sin imponerla al cuerpo del verso.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de γλώσσαις en 1 Corintios 12–14
  english_pob_reading: tongues
  chosen_spanish_reading: lenguas
  alternative_spanish_readings:
  - idiomas
  - hablas
  rationale: El contexto inmediato del capítulo apunta al fenómeno carismático discutido por Pablo. «Lenguas» mantiene la terminología reconocible y no diluye esa referencia contextual.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés al preferir «aprovecharé» para ὠφελήσω y al conservar la serie de frases con «en» para reflejar ἐν de manera más cercana. También evita una paráfrasis excesiva, manteniendo el contraste retórico del verso y la enumeración final.
  spanish_consistency_notes:
  - Se usa «lenguas» en sentido técnico para el fenómeno carismático, coherente con la terminología del capítulo.
  - Se mantiene «hermanos» como vocativo principal y se aclara la posible inclusión mixta en nota.
  - La secuencia «en revelación / en conocimiento / en profecía / en enseñanza» conserva el paralelismo del griego.
  - «Aprovecharé» traduce el valor de beneficio/provecho de ὠφελέω sin sonar artificial en español.
