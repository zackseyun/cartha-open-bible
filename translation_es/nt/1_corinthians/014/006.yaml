revisions:
- from: Ahora[a], hermanos, si vengo a ustedes hablando en lenguas[b], ¿de qué les aprovecharé, si no les hablo o en revelación o en conocimiento o en profecía o en enseñanza?
  to: Ahora[a], hermanos, si voy a ustedes hablando en lenguas[b], ¿de qué les servirá, a menos que les hable con revelación, con conocimiento, con profecía o con enseñanza?
  rationale: 'Se hizo una reparación menor para mejorar la naturalidad del español sin apartarse del sentido del griego ni del rastro de auditoría inglés: «voy» da una lectura más idiomática de ἔλθω en contexto, «¿de qué les servirá?» expresa mejor la utilidad/beneficio de ὠφελήσω, «a menos que» aclara ἐὰν μὴ, y la serie con «con...» conserva la función modal/instrumental de ἐν evitando una construcción rígida en español.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:37Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: transición discursiva («Ahora»), vocativo («hermanos»), el fenómeno de «lenguas», la pregunta retórica sobre provecho, y la serie paralela de ἐν + sustantivo. Sin embargo, «si no» para ἐὰν μὴ en esta pregunta condicional resulta menos natural que «a menos que», y «o en revelación o en conocimiento...» suena forzado en español. También «¿de qué les aprovecharé?» es comprensible, pero menos idiomático que una formulación con «les servirá» o «les aprovechará»; conviene una reparación menor para preservar sentido y legibilidad.'
  spanish_quality_summary: La calidad general es buena y eclesialmente legible, pero la sintaxis del período necesita alisado. En español, la repetición de «o en ... o en ...» después de «les hablo» se percibe rígida; «con revelación, con conocimiento, con profecía o con enseñanza» comunica mejor el valor modal/instrumental sin traicionar el original. Además, «¿de qué les aprovecharé?» suena poco natural con sujeto personal; «¿de qué les servirá?» o «¿cómo les aprovechará?» mejora la fluidez.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Hermanos» con nota inclusiva está alineado con el criterio documentado; «lenguas» con nota alternativa a «idiomas» también. No aparecen términos sensibles del glosario mayor (Yahvé, Mesías, esclavo, etc.).
  issues:
  - severity: medium
    issue: «¿de qué les aprovecharé?» es poco idiomático en español contemporáneo
    rationale: Aunque transmite la idea de ὠφελήσω, la construcción con primera persona y objeto indirecto suena extraña. Una formulación como «¿de qué les servirá?» conserva el sentido de provecho/beneficio y mejora la naturalidad.
  - severity: medium
    issue: «si no» para ἐὰν μὴ es menos natural en esta estructura
    rationale: En español bíblico legible, «a menos que» expresa con mayor claridad la condición exceptiva de ἐὰν μὴ en una pregunta retórica como esta.
  - severity: medium
    issue: La serie «o en revelación o en conocimiento...» suena calcada y rígida
    rationale: El griego repite ἢ ἐν..., pero en español una equivalencia más natural es «con revelación, con conocimiento, con profecía o con enseñanza», que mantiene la lista paralela y el valor modal/instrumental sin wooden calque.
  revised_spanish_text: Ahora[a], hermanos, si voy a ustedes hablando en lenguas[b], ¿de qué les servirá, a menos que les hable con revelación, con conocimiento, con profecía o con enseñanza?
  revised_footnotes:
