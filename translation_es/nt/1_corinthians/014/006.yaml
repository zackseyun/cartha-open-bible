    text: O «hermanos y hermanas»; el griego «hermanos» puede dirigirse a una congregación mixta.
    reason: lexical_alternative
  - marker: b
    text: O «hablando en idiomas»; el término griego puede significar «idiomas», pero en este contexto se refiere al fenómeno tratado a lo largo de 1 Corintios 12–14.
    reason: lexical_alternative
