translation:
  language: es
  text: El que habla en una lengua[a] se edifica[b], pero el que profetiza edifica a la iglesia[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en lengua». En este capítulo, sin embargo, el término probablemente se refiere al don de hablar en lenguas; la naturaleza exacta del habla sigue siendo debatida.
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «a sí mismo»; el singular masculino es representativo.
    reason: lexical_alternative
  - marker: c
    text: O «la asamblea» o «la congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ λαλῶν
  english_pob_choice: The one who speaks
  chosen_spanish: El que habla
  alternatives_spanish:
  - Quien habla
  - La persona que habla
  lexicon: BDAG
  rationale: El participio sustantivado con artículo se conserva en español con una construcción igualmente sustantiva. «El que habla» mantiene el paralelismo con «el que profetiza» y resulta natural en español bíblico contemporáneo.
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en lengua
  alternatives_spanish:
  - en una lengua
  - en lenguas
  lexicon: BDAG
  rationale: El singular sin artículo se refleja con «en lengua», que suena natural en español y conserva la forma singular del griego. El contexto de 1 Corintios 12–14 sigue sugiriendo la referencia al hablar en lenguas, sin cerrar indebidamente la ambigüedad del fenómeno.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - él mismo
  - a uno mismo
  lexicon: BDAG
  rationale: El pronombre reflexivo masculino singular se vierte con «a sí mismo», que expresa la autorreferencia sin forzar una forma masculina explícita en el español natural. Mantiene el sentido representativo del griego.
- source_word: οἰκοδομεῖ
  english_pob_choice: builds up
  chosen_spanish: se edifica
  alternatives_spanish:
  - edifica
  - se fortalece
  lexicon: BDAG
  rationale: «Edificar» conserva la metáfora de construcción espiritual del verbo οἰκοδομέω. En español, la forma pronominal «se edifica» comunica mejor el efecto sobre la propia persona que un simple «edifica a sí mismo», y sigue siendo fiel al campo semántico del verbo.
- source_word: ὁ δὲ προφητεύων
  english_pob_choice: but the one who prophesies
  chosen_spanish: pero el que profetiza
  alternatives_spanish:
  - sino el que profetiza
  - pero quien profetiza
  lexicon: BDAG
  rationale: «Pero» refleja el contraste suave de δέ. «El que profetiza» conserva la misma estructura substantival del primer hemistiquio y mantiene el paralelo retórico del versículo.
- source_word: ἐκκλησίαν
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la asamblea
  - la congregación
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία designa la comunidad reunida de creyentes. «La iglesia» es el equivalente más natural y reconocido en español, sin perder el sentido corporativo frente al beneficio individual.
theological_decisions:
- issue: Sentido de γλώσσῃ en 1 Corintios 14
  english_pob_reading: Spirit-enabled tongue-speech rather than generic ordinary language
  chosen_spanish_reading: hablar en lengua como don de lenguas, sin definir de modo cerrado su naturaleza exacta
  alternative_spanish_readings:
  - hablar en un idioma
  - hablar en éxtasis
  rationale: 'La POB inglesa conserva la ambigüedad histórica y teológica del pasaje. El español «en lengua» preserva esa misma tensión: puede aludir al don de lenguas sin reducirlo a un simple idioma ordinario ni imponer una interpretación más estrecha.'
  doctrine_reference: Preservar la tensión teológica en 1 Corintios 12–14, en vez de resolverla por anticipado.
- issue: Construcción reflexiva en ἑαυτὸν οἰκοδομεῖ
  english_pob_reading: himself
  chosen_spanish_reading: se edifica a sí mismo de manera reflexiva y representativa
  alternative_spanish_readings:
  - edifica a sí mismo
  - se fortalece
  rationale: El griego usa pronombre reflexivo masculino singular; el español puede expresar esa relación con una forma reflexiva natural. Se evita neutralizar en exceso el singular representativo y se conserva el matiz de beneficio personal frente al beneficio comunitario.
  doctrine_reference: Política de fidelidad formal con claridad idiomática.
- issue: ἐκκλησίαν y su alcance comunitario
  english_pob_reading: the church
  chosen_spanish_reading: la iglesia como comunidad reunida de creyentes
  alternative_spanish_readings:
  - la asamblea
  - la congregación
  rationale: El contexto contrapone edificación privada y edificación corporativa. «La iglesia» comunica con claridad el sujeto colectivo sin perder el valor de comunidad reunida que está presente en ἐκκλησία.
  doctrine_reference: Uso paulino de ἐκκλησία en las cartas apostólicas.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente del expediente: no hubo cambios aplicados y el veredicto de concordancia fue alto.'
  spanish_consistency_notes:
  - Se mantiene la secuencia paralela «El que... / pero el que...» para reflejar la estructura griega.
  - Se usa «iglesia» de manera consistente con el uso paulino de ἐκκλησία en este contexto.
  - Se preserva la ambigüedad de γλώσσῃ sin reemplazarla por una glosa interpretativa cerrada.
  - La forma reflexiva española «se edifica a sí mismo» mantiene el sentido del pronombre griego y el beneficio personal contrastado con la edificación comunitaria.
