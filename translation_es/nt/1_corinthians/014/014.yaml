translation:
  language: es
  text: Porque si oro en una lengua[a], mi espíritu ora, pero mi mente es infructuosa.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un idioma». El término griego puede referirse a una lengua humana o a «lengua» en el sentido usado a lo largo de este capítulo para el habla habilitada por el Espíritu.
    reason: lexical_alternative
  - marker: b
    text: O «mi entendimiento es infructuoso».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Pues si
  - Porque, si
  lexicon: BDAG
  rationale: γάρ aporta una relación explicativa y ἐάν introduce la condición; en español, «Porque si» conserva ambas funciones de manera natural y directa en el flujo argumental de Pablo.
- source_word: προσεύχωμαι
  english_pob_choice: I pray
  chosen_spanish: oro
  alternatives_spanish:
  - estoy orando
  - ruego
  lexicon: BDAG
  rationale: El subjuntivo presente en la condición se expresa con un presente simple idiomático en español. «Oro» comunica con claridad la acción de orar sin recargar la frase.
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en una lengua
  alternatives_spanish:
  - en una lengua espiritual
  - en una lengua desconocida
  - en una lengua
  lexicon: BDAG
  rationale: El griego singular dativo puede referirse a una lengua humana o al fenómeno de habla del capítulo. «Lengua» mantiene la ambigüedad lexical documentada y evita imponer una interpretación no explicitada por el texto.
- source_word: τὸ πνεῦμά μου
  english_pob_choice: my spirit
  chosen_spanish: mi espíritu
  alternatives_spanish:
  - mi Espíritu
  - mi espíritu interior
  lexicon: BDAG
  rationale: El posesivo «mi» y el contraste con «mi mente» indican el espíritu del hablante, no el Espíritu Santo. «Mi espíritu» es la correspondencia más directa y conserva la tensión antropológica del pasaje.
- source_word: προσεύχεται
  english_pob_choice: prays
  chosen_spanish: ora
  alternatives_spanish:
  - está orando
  - reza
  lexicon: BDAG
  rationale: El presente indicativo se traduce de forma natural con presente simple en español. «Ora» preserva el paralelo con «oro» y evita una perífrasis innecesaria.
- source_word: ὁ δὲ νοῦς μου
  english_pob_choice: but my mind
  chosen_spanish: pero mi mente
  alternatives_spanish:
  - pero mi entendimiento
  - pero mi intelecto
  lexicon: BDAG
  rationale: νοῦς puede significar mente o entendimiento. «Mente» es la equivalencia más directa y mantiene el contraste con «espíritu» sin restringir demasiado el alcance del término.
- source_word: ἄκαρπός ἐστιν
  english_pob_choice: is unfruitful
  chosen_spanish: es infructuosa
  alternatives_spanish:
  - no da fruto
  - es improductiva
  lexicon: BDAG
  rationale: El adjetivo ἄκαρπος conserva la metáfora de falta de fruto. En español, «infructuosa» preserva esa imagen con un giro natural y formal, sin diluir el sentido metafórico.
theological_decisions:
- issue: Referente de «mi espíritu» (τὸ πνεῦμά μου)
  english_pob_reading: the speaker's own spirit, not the Holy Spirit
  chosen_spanish_reading: el espíritu del hablante, no el Espíritu Santo
  alternative_spanish_readings:
  - el Espíritu Santo en el creyente
  - el espíritu humano como sede de la oración
  rationale: La forma posesiva «mi» y el contraste con «mi mente» favorecen una lectura antropológica interna. La traducción conserva «mi espíritu» para no resolver de antemano la relación entre espíritu humano y Espíritu Santo, manteniendo la tensión del texto.
  doctrine_reference: Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y ninguna revisión aplicada; esta versión española sigue de cerca esas decisiones sin introducir cambios doctrinales o textuales no motivados.
  spanish_consistency_notes:
  - Se mantiene «lengua» para γλῶσσῃ, en continuidad con el uso del capítulo y la alternativa lexical documentada.
  - Se usa «espíritu» en minúscula para τὸ πνεῦμά μου, distinguiéndolo del Espíritu Santo.
  - Se prefiere «mente» para νοῦς, con nota alternativa para «entendimiento», como en el audit trail inglés.
  - Se conserva la metáfora de fruto mediante «infructuosa», equivalente funcional de ἄκαρπός.
