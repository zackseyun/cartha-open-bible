translation:
  language: es
  text: De otro modo, si bendices en el espíritu[b], ¿cómo dirá el Amén la persona que ocupa el lugar del que no ha sido instruido[a] en tu acción de gracias[c], puesto que no sabe lo que dices?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «del forastero», «de la persona común» o «del inexperto» para τοῦ ἰδιώτου.
    reason: lexical_alternative
  - marker: b
    text: O «con el espíritu» para «en el espíritu»; el griego no exige una interpretación más específica aquí.
    reason: alternative_reading
  - marker: c
    text: «Acción de gracias» aquí se refiere al acto de dar gracias, no necesariamente al término técnico posterior «Eucaristía».
    reason: cultural_note
lexical_decisions:
- source_word: ἐπεὶ ἐὰν
  english_pob_choice: Otherwise, if
  chosen_spanish: De otro modo, si
  alternatives_spanish:
  - Porque, si
  - Si, de otro modo
  lexicon: BDAG
  rationale: La construcción introduce una situación condicional con matiz inferencial respecto de lo anterior. «De otro modo» conserva ese valor de consecuencia o corrección sin sonar forzado en español, y «si» mantiene la condición explícita.
- source_word: εὐλογῇς
  english_pob_choice: you bless
  chosen_spanish: bendices
  alternatives_spanish:
  - das bendición
  - pronuncias una bendición
  lexicon: BDAG
  rationale: «Bendices» preserva el verbo básico εὐλογέω y funciona naturalmente en contexto de culto. Evita una paráfrasis excesiva y mantiene la relación léxica con la bendición verbal.
- source_word: πνεύματι
  english_pob_choice: in the spirit
  chosen_spanish: en el espíritu
  alternatives_spanish:
  - con el espíritu
  - en espíritu
  lexicon: BDAG
  rationale: La dativa permite una lectura instrumental o locativa. «En el espíritu» sigue de cerca el griego sin resolver si se trata del espíritu humano o de una acción impulsada por el Espíritu; preserva así la tensión documentada en el audit trail.
- source_word: ὁ ἀναπληρῶν τὸν τόπον
  english_pob_choice: the one filling the place
  chosen_spanish: la persona que ocupa el lugar
  alternatives_spanish:
  - el que llena el lugar
  - el que ocupa la posición
  lexicon: BDAG
  rationale: La imagen literal de «llenar el lugar» suena poco natural en español. «Ocupar el lugar» conserva la idea de remplazo o posición dentro de la asamblea, con fluidez idiomática.
- source_word: τοῦ ἰδιώτου
  english_pob_choice: of the uninstructed
  chosen_spanish: del no instruido[a]
  alternatives_spanish:
  - del inexperto
  - del laico
  - del no iniciado
  lexicon: BDAG
  rationale: «No instruido» expresa la falta de conocimiento o preparación que el contexto exige, sin imponer «extranjero» o «inculto». Se mantiene la ambigüedad léxica relevante; la nota recoge alternativas viables preservadas por el POB inglés.
- source_word: πῶς ἐρεῖ τὸ Ἀμήν
  english_pob_choice: how will ... say the Amen
  chosen_spanish: ¿cómo dirá el Amén?
  alternatives_spanish:
  - ¿cómo dirá «Amén»?
  - ¿cómo podrá responder «Amén»?
  lexicon: BDAG
  rationale: Se conserva el término litúrgico «Amén» y el valor interrogativo de la frase. En español, «dirá el Amén» mantiene mejor la referencia a la respuesta congregacional que una paráfrasis más libre.
- source_word: ἐπὶ τῇ σῇ εὐχαριστίᾳ
  english_pob_choice: at your thanksgiving
  chosen_spanish: en tu acción de gracias[c]
  alternatives_spanish:
  - ante tu agradecimiento
  - sobre tu acción de gracias
  lexicon: BDAG
  rationale: «Acción de gracias» traduce εὐχαριστία como acto de dar gracias, sin cargar el término con el sentido técnico posterior de «Eucaristía». La preposición «en» funciona de modo natural en español para el contexto de respuesta litúrgica.
- source_word: ἐπειδὴ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: Introduce la razón de la imposibilidad de responder «Amén». «Puesto que» es claro, sobrio y adecuado al registro paulino.
- source_word: τί λέγεις οὐκ οἶδεν
  english_pob_choice: he does not know what you are saying
  chosen_spanish: no sabe lo que dices
  alternatives_spanish:
  - no entiende lo que dices
  - no sabe qué quieres decir
  lexicon: BDAG
  rationale: «No sabe lo que dices» sigue de cerca el griego y explica la falta de inteligibilidad sin añadir una interpretación más fuerte de la necesaria.
theological_decisions:
- issue: Sentido de πνεύματι en el contexto de la reunión cristiana
  english_pob_reading: Rendered generically as 'in the spirit' without specifying whether Paul means the speaker's human spirit or Spirit-enabled speech.
  chosen_spanish_reading: «en el espíritu» sin precisar si alude al espíritu humano o a la acción del Espíritu
  alternative_spanish_readings:
  - «con el espíritu»
  - «por el Espíritu»
  rationale: El versículo no obliga a resolver la referencia. Mantener la formulación amplia preserva la tensión teológica y evita decidir más de lo que el griego exige.
  doctrine_reference: 'Principio de la POB: preservar tensiones teológicas documentadas sin resolverlas indebidamente.'
- issue: Sentido de εὐχαριστίᾳ
  english_pob_reading: Rendered as 'thanksgiving' rather than a technical sacramental term.
  chosen_spanish_reading: «acción de gracias» en sentido de agradecimiento, no como término técnico sacramental
  alternative_spanish_readings:
  - «Eucaristía»
  rationale: El contexto inmediato habla de una expresión audible de gratitud, no de una designación litúrgica posterior fija. «Acción de gracias» evita introducir una especificidad eclesial no exigida por el texto.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción; evitar cargar el término con desarrollos posteriores no requeridos.
translation_notes:
  revision_awareness: 'Se mantuvo la lectura de alto acuerdo del último pase: no hubo cambios sustanciales respecto del borrador auditado. Se preservaron las ambigüedades relevantes de πνεύματι e εὐχαριστίᾳ, y se ajustó el español para que suene natural sin alejarse del griego.'
  spanish_consistency_notes:
  - Se usa «Amén» como forma litúrgica estable, coherente con el término del original.
  - Se conserva «espíritu» en minúscula porque el griego no especifica aquí el Espíritu Santo de manera inequívoca.
  - Se prefirió «acción de gracias» para εὐχαριστία por consistencia con el audit trail y para evitar un tecnicismo eclesiástico no requerido.
  - Se eligió «no instruido» para ἰδιώτης por fidelidad al contexto de comprensión, no por un estatus social o eclesial específico.
