  text: ἐπεὶ ἐὰν ⸀εὐλογῇς ⸀πνεύματι, ὁ ἀναπληρῶν τὸν τόπον τοῦ ἰδιώτου πῶς ἐρεῖ τὸ Ἀμήν ἐπὶ τῇ σῇ εὐχαριστίᾳ; ἐπειδὴ τί λέγεις οὐκ οἶδεν·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/016.yaml
  text: Otherwise[a], if you bless in the spirit, how will the one filling the place of the uninstructed say the Amen at your thanksgiving[c][b], since he does not know what you are saying?
  footnotes:
  - marker: a
    text: Or 'of the outsider,' 'of the ordinary person,' or 'of the unlearned' for 'the uninstructed' (τοῦ ἰδιώτου).
    reason: lexical_alternative
  - marker: b
    text: Or 'with the spirit' for 'in the spirit'; the Greek does not require a more specific interpretation here.
    reason: alternative_reading
  - marker: c
    text: '''Thanksgiving'' here refers to giving thanks, not necessarily to the later technical term ''Eucharist.'''
    reason: cultural_note
