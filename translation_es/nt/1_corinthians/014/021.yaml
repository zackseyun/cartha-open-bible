revisions:
- from: 'En la Ley está escrito: «Por gente de lenguas extrañas[a] y por labios de extranjeros[b] hablaré a este pueblo, y ni aun así me escucharán[c], dice el Señor[d]».'
  to: 'En la Ley está escrito: «Por gente de otras lenguas[a] y por labios de extranjeros[b] hablaré a este pueblo, y ni aun así me escucharán[c], dice el Señor[d]».'
  rationale: 'Se hace una reparación léxica menor para reflejar mejor ἑτερογλώσσοις en español natural y en línea con el expediente inglés: «gente de otras lenguas» comunica con más precisión ‘personas de otro idioma’ que «gente de lenguas extrañas». El resto del borrador puede mantenerse tal como está.'
