translation:
  language: es
  text: 'En la Ley está escrito: «Por gente de otras lenguas[a] y por labios de extranjeros[b] hablaré a este pueblo, y ni aun así me escucharán[c], dice el Señor[d]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por otras lenguas» o «por lenguas extranjeras».
    reason: lexical_alternative
  - marker: b
    text: O «por labios de otros».
    reason: lexical_alternative
  - marker: c
    text: O «me prestarán atención» o «me harán caso».
    reason: lexical_alternative
  - marker: d
    text: Porque esta es una cita en la que habla el Dios de Israel, algunas traducciones usan «dice el SEÑOR» para reflejar el trasfondo hebreo.
    reason: theological_note
lexical_decisions:
- source_word: ἐν τῷ νόμῳ
  english_pob_choice: In the Law
  chosen_spanish: En la Ley
  alternatives_spanish:
  - En la ley
  - En las Escrituras
  lexicon: BDAG
  rationale: νόμος aquí funciona como referencia amplia al corpus escritural judío. En español, «Ley» con mayúscula preserva el valor convencional bíblico y paulino sin perder naturalidad.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - se ha escrito
  - está asentado por escrito
  lexicon: BDAG
  rationale: La fórmula perfecta pasiva introduce una cita bíblica. «Está escrito» es la equivalencia natural y formal en español.
- source_word: ἑτερογλώσσοις
  english_pob_choice: people of other tongues
  chosen_spanish: gente de lenguas extrañas
  alternatives_spanish:
  - otras lenguas
  - lenguas extranjeras
  - gente de otras lenguas
  lexicon: BDAG
  rationale: El adjetivo significa literalmente «de otra/diferente lengua». En español, «gente de lenguas extrañas» mantiene la idea de idioma distinto y conserva el matiz de extrañeza sin sonar demasiado técnico.
- source_word: χείλεσιν ἑτέρων
  english_pob_choice: the lips of foreigners
  chosen_spanish: labios de extranjeros
  alternatives_spanish:
  - labios de otros
  - los labios de otros pueblos
  lexicon: BDAG
  rationale: Se conserva la imagen literal de la cita. «Extranjeros» explicita el sentido de ἑτέρων como personas de otro pueblo o lengua, no simplemente «otros» en sentido genérico.
- source_word: λαλήσω
  english_pob_choice: I will speak
  chosen_spanish: hablaré
  alternatives_spanish:
  - diré
  - pronunciaré
  lexicon: BDAG
  rationale: El futuro de λαλέω se rinde con el verbo natural «hablar» en español, adecuado para el habla divina en una cita profética.
- source_word: τῷ λαῷ τούτῳ
  english_pob_choice: to this people
  chosen_spanish: a este pueblo
  alternatives_spanish:
  - a esta gente
  - a esta nación
  lexicon: BDAG
  rationale: λαός suele referirse al pueblo en sentido bíblico-covenantal. «Pueblo» es la forma más fiel y clara en español.
- source_word: οὐδ’ οὕτως
  english_pob_choice: not even in this way
  chosen_spanish: ni aun así
  alternatives_spanish:
  - ni siquiera así
  - ni aun de este modo
  lexicon: BDAG
  rationale: 'La construcción expresa énfasis: ni con este medio extraordinario habrá respuesta. «Ni aun así» recoge bien esa fuerza en español.'
- source_word: εἰσακούσονταί μου
  english_pob_choice: will they listen to me
  chosen_spanish: me escucharán
  alternatives_spanish:
  - me oirán
  - me prestarán atención
  - me harán caso
  lexicon: BDAG
  rationale: εἰσακούω puede implicar oír con atención y también atender/obedecer. «Escucharán» conserva la ambigüedad entre oír y atender, de modo publicable y natural.
- source_word: λέγει κύριος
  english_pob_choice: says the Lord
  chosen_spanish: dice el Señor
  alternatives_spanish:
  - dice el Señor Yahvé
  - dice el Señor, Yahvé
  lexicon: BDAG
  rationale: En la cita de Isaías, κύριος se traduce de forma directa como «Señor», conforme al valor doctrinal por defecto. El contexto profético permite mantener la fórmula bíblica estándar en español.
theological_decisions:
- issue: κύριος en una cita de habla divina tomada de Isaías
  english_pob_reading: says the Lord
  chosen_spanish_reading: dice el Señor
  alternative_spanish_readings:
  - dice el SEÑOR
  - dice Yahvé
  rationale: El texto griego presenta κύριος, no el tetragrámaton. La cita remite al Dios de Israel que habla en Isaías, pero en el texto base griego la forma explícita es «Señor»; por eso se mantiene esa lectura en el cuerpo principal y se deja constancia del trasfondo covenantal.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord; יְהוָה → the LORD'
- issue: Alcance de la referencia a «la Ley»
  english_pob_reading: In the Law
  chosen_spanish_reading: En la Ley
  alternative_spanish_readings:
  - En la ley
  - En las Escrituras
  rationale: Aunque la cita proviene de Isaías, el uso paulino de νόμος abarca aquí la Escritura como testimonio autoritativo. La mayúscula ayuda a captar ese uso técnico sin convertirlo en una paráfrasis.
  doctrine_reference: Uso paulino de νόμος como designación del corpus escritural
- issue: Valor de εἰσακούω
  english_pob_reading: will they listen to me
  chosen_spanish_reading: me escucharán
  alternative_spanish_readings:
  - me prestarán atención
  - me harán caso
  - me obedecerán
  rationale: El verbo puede incluir el matiz de atender obedientemente. «Me escucharán» mantiene la ambivalencia semántica sin forzar una lectura más fuerte que el griego del versículo.
  doctrine_reference: BDAG εἰσακούω
translation_notes:
  revision_awareness: La revisión más reciente indicó acuerdo total y no propuso cambios; este borrador sigue la lectura aprobada, manteniendo la referencia amplia de νόμος, la imagen literal de la cita de Isaías y la traducción directa de κύριος como «Señor».
  spanish_consistency_notes:
  - Se mantiene «Ley» con mayúscula para el uso paulino de νόμος como corpus escritural.
  - 'Se conserva el paralelismo poético de la cita: «por... y por...».'
  - «Señor» se usa consistentemente para κύριος; no se introduce «SEÑOR» en el texto principal.
  - «Escucharán» mantiene la ambigüedad entre oír, atender y obedecer sin explicar de más.
