    rationale: Ayuda a evitar una lectura demasiado fija o técnica y reproduce con más naturalidad el dativo singular γλώσσῃ.
  - severity: low
    issue: 'Error ortográfico en la nota: «oir».'
    rationale: Debe escribirse «oír».
