translation:
  language: es
  text: Porque el que habla en una lengua no habla a las personas, sino a Dios; pues nadie oye[a]; más bien, en espíritu[b] habla misterios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entiende». El verbo griego puede significar tanto «oír» como, por implicación en el contexto, «entender».
    reason: lexical_alternative
  - marker: b
    text: O «en el Espíritu». La frase griega puede referirse al Espíritu Santo o al espíritu del hablante.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ λαλῶν
  english_pob_choice: the one speaking
  chosen_spanish: el que habla
  alternatives_spanish:
  - quien habla
  - la persona que habla
  lexicon: BDAG
  rationale: El artículo con participio presente funciona de manera sustantivada. «El que habla» conserva el valor genérico singular sin forzar una paráfrasis.
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en lengua
  alternatives_spanish:
  - en lenguas
  - con una lengua
  - en otra lengua
  lexicon: BDAG
  rationale: El dativo singular se refleja con naturalidad como «en lengua». En este contexto paulino, «lengua» mantiene la referencia al fenómeno de hablar en lenguas sin suavizarlo prematuramente.
- source_word: ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: a las personas
  alternatives_spanish:
  - a los hombres
  - a los seres humanos
  lexicon: BDAG
  rationale: El dativo plural es genérico, no masculino. «A las personas» es claro, inclusivo y fiel al sentido.
- source_word: θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  lexicon: BDAG
  rationale: Dativo objeto directo de la acción de hablar; no requiere paráfrasis.
- source_word: ἀκούει
  english_pob_choice: hears
  chosen_spanish: oye
  alternatives_spanish:
  - escucha
  - entiende
  lexicon: BDAG
  rationale: El verbo griego significa literalmente «oir». En español, «oye» conserva mejor esa fuerza que «entiende», aunque el contexto sugiere la falta de comprensión; esa alternativa queda implícita sin desplazar el valor léxico básico.
- source_word: πνεύματι
  english_pob_choice: in the Spirit
  chosen_spanish: en espíritu
  alternatives_spanish:
  - en el Espíritu
  - por el Espíritu
  - con su espíritu
  lexicon: BDAG
  rationale: El dativo es sintácticamente ambiguo. «En espíritu» preserva la ambigüedad entre el Espíritu Santo y el espíritu humano del hablante, sin resolverla de antemano. En español, la mayúscula se evita aquí para no imponer una identificación doctrinal que el texto no obliga.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  - verdades ocultas
  lexicon: BDAG
  rationale: «Misterios» mantiene la carga paulina del término mejor que una paráfrasis explicativa. En español suena natural y conserva el peso teológico del plural.
- source_word: δὲ
  english_pob_choice: rather
  chosen_spanish: pero
  alternatives_spanish:
  - mas
  - y
  lexicon: BDAG
  rationale: Aquí δέ marca contraste. «Pero» es la forma más natural en español para oponer la segunda cláusula a la anterior, sin perder la relación discursiva.
theological_decisions:
- issue: Referente de πνεύματι
  english_pob_reading: Rendered 'in the Spirit' in the main text
  chosen_spanish_reading: «en espíritu» en el texto principal, dejando abierta la lectura del Espíritu Santo o del espíritu humano
  alternative_spanish_readings:
  - en el Espíritu
  - por el Espíritu
  - con el espíritu del hablante
  rationale: El dativo permite más de una interpretación y el contexto de habla espiritual no obliga a resolverla. La traducción conserva la tensión, como pide la filosofía de la POB, y evita cargar el texto con una decisión doctrinal no explicitada por el griego.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión inglesa reciente cambió «understands» por «hears» para reflejar más directamente ἀκούει; por eso el español mantiene «oye» y no lo sustituye por «entiende» en el texto principal, reservando la implicación de comprensión para la nota. También se conservó el contraste de δέ con «pero».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ y no se introduce «Señor», porque el griego aquí no usa κύριος.
  - «Lengua» reproduce el singular de γλώσσῃ y evita normalizar prematuramente a «lenguas».
  - La frase «en espíritu» se deja sin mayúscula en el texto principal para no forzar la referencia al Espíritu Santo.
  - El verbo «habla» se conserva simple y directo para λαλῶν/λαλεῖ, sin añadir matices interpretativos.
