review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: condición general («Si alguno piensa...»), las dos categorías («profeta o espiritual»), el imperativo de reconocimiento, y la cláusula final sobre la autoridad de lo escrito. Sin embargo, no sigue del todo la pista de auditoría inglesa en el punto clave κυρίου ἐστίν, donde el POB inglés hace explícita la elipsis como «a command of the Lord» y conserva la literalidad en nota. El español principal «es del Señor» es posible, pero deja demasiado abierta una elipsis que en contexto apunta a autoridad normativa.'
  spanish_quality_summary: 'El español es claro y natural en casi todo el versículo. No obstante, hay un problema formal de notas: el marcador [a] se inserta antes de «espiritual» aunque la nota no ofrece una alternativa real, sino explicación semántica; además, la redacción de la nota empieza con «O: “espiritual”», lo cual resulta impropio porque el texto principal ya dice «espiritual». También conviene explicitar mejor la elipsis final en el texto principal para mayor claridad y fidelidad al razonamiento paulino.'
  glossary_alignment: No hay conflicto con términos de glosario mayor. «Señor» para κύριος es adecuado aquí; no hay base para «Yahvé». «Espiritual» para πνευματικός coincide con la decisión del POB. El punto principal es no perder la fuerza normativa implícita en κυρίου ἐστίν.
  issues:
  - severity: high
    issue: La cláusula final «es del Señor» no explicita la elipsis de κυρίου ἐστίν como instrucción/mandato del Señor.
    rationale: Aunque literalmente posible, en este contexto Pablo está afirmando la autoridad vinculante de lo que escribe. La auditoría inglesa documenta que «a command of the Lord» hace explícito ese sentido. En español, dejar solo «es del Señor» puede sonar a pertenencia vaga más que a mandato autorizado.
  - severity: medium
    issue: La nota [a] está mal planteada como alternativa textual.
    rationale: 'El texto principal ya usa «espiritual», y la nota dice «O: “espiritual”», lo cual no aporta una alternativa. Si se mantiene una nota, debe explicar el alcance semántico («persona espiritual», «dotado por el Espíritu») en lugar de duplicar el mismo término.'
  - severity: low
    issue: La ubicación del marcador [a] antes de «espiritual» es aceptable pero innecesaria si la nota no preserva una alternativa significativa.
    rationale: Si no hay nota útil, conviene eliminar el marcador para mejorar limpieza de lectura. Si se conserva una nota explicativa, el anclaje en «espiritual» sí puede mantenerse.
  revised_spanish_text: Si alguno piensa que es profeta o espiritual[a], reconozca que lo que les escribo es un mandato del Señor.
