    text: O «una persona espiritual». El griego usa un adjetivo compacto que puede referirse a alguien que se considera dotado o guiado por el Espíritu.
    reason: alternative_reading
  revision_rationale: 'Se revisa la cláusula final para reflejar mejor la elipsis de κυρίου ἐστίν en este contexto, en línea con la decisión documentada del POB inglés: Pablo afirma la autoridad normativa de sus instrucciones, no solo una relación vaga con el Señor. Se corrige también la nota sobre «espiritual» para que preserve una alternativa real y útil en español.'
