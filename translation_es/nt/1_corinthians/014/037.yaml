translation:
  language: es
  text: Si alguno piensa que es profeta o espiritual[a], reconozca que lo que les escribo es un mandato del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una persona espiritual». El griego usa un adjetivo compacto que puede referirse a alguien que se considera dotado o guiado por el Espíritu.
    reason: alternative_reading
lexical_decisions:
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_spanish: piensa
  alternatives_spanish:
  - cree
  - considera
  lexicon: BDAG
  rationale: δοκεῖ introduce una autoevaluación o pretensión; «piensa» conserva ese matiz sin volverlo meramente externo como «parece». En español suena natural y mantiene el tono correctivo del versículo.
- source_word: προφήτης
  english_pob_choice: prophet
  chosen_spanish: profeta
  alternatives_spanish:
  - vaticinador
  lexicon: BDAG
  rationale: El término estándar en español para προφήτης es «profeta». El contexto es el de dones y habla profética, por lo que no conviene desviar el término.
- source_word: πνευματικός
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - espiritualmente dotado
  - persona espiritual
  lexicon: BDAG
  rationale: «Espiritual» preserva la concisión del adjetivo griego y la amplitud de la categoría. En este contexto puede referirse a alguien que se considera guiado o dotado por el Espíritu, sin precisar más de lo que el griego explicita.
- source_word: ἐπιγινωσκέτω
  english_pob_choice: let him recognize
  chosen_spanish: reconozca
  alternatives_spanish:
  - reconozca plenamente
  - admita
  lexicon: BDAG
  rationale: El imperativo exhorta a reconocer/aceptar la validez de la instrucción apostólica. «Reconozca» comunica bien esa idea en español y conserva el tono exhortativo.
- source_word: ἃ γράφω ὑμῖν
  english_pob_choice: what I am writing to you
  chosen_spanish: lo que les escribo
  alternatives_spanish:
  - las cosas que les escribo
  - lo que estoy escribiendo a ustedes
  lexicon: BDAG
  rationale: La relativa con el presente epistolar se naturaliza en español como «lo que les escribo». «Les» mantiene el destinatario plural y evita una construcción demasiado pesada.
- source_word: κυρίου ἐστίν
  english_pob_choice: is a command of the Lord
  chosen_spanish: es del Señor
  alternatives_spanish:
  - es del Señor Jesús
  - pertenece al Señor
  - es una orden del Señor
  lexicon: BDAG
  rationale: El griego dice literalmente «es del Señor». En español conviene conservar esa sobriedad y no cerrar la ambigüedad mediante una expansión interpretativa en el texto principal. La lectura inglesa que suplía «command» resuelve el sentido en inglés, pero el español puede dejarlo abierto sin perder claridad. «Del Señor» mantiene el genitivo y la fuerza de autoridad implícita.
theological_decisions:
- issue: Alcance de κυρίου ἐστίν
  english_pob_reading: '''is a command of the Lord'' with a footnoted alternative ''is the Lord''s'' / ''is of the Lord'''
  chosen_spanish_reading: '''es del Señor'' in the main text, with a note that the Greek reads literally ''is of the Lord'' / ''is the Lord''s'''
  alternative_spanish_readings:
  - es una orden del Señor
  - es del Señor Jesús
  - es del Señor, es decir, una orden del Señor
  rationale: La gramática griega es elíptica y admite más de una explicitación. El inglés POB optó por suplir «command» para hacer explícita la fuerza normativa; en español, sin embargo, el texto puede conservar la forma breve y permitir que la nota explique la literalidad. Así se evita imponer en el cuerpo del texto una expansión que no está dicha de manera overtamente en el griego.
  doctrine_reference: 'Translation philosophy §1, §6; Contested terms: κύριος → Señor'
- issue: Valor de πνευματικός
  english_pob_reading: '''spiritual'''
  chosen_spanish_reading: '''espiritual'''
  alternative_spanish_readings:
  - espiritualmente dotado
  - guiado por el Espíritu
  rationale: El término puede ser descriptivo de una identidad reclamada por la persona, sin necesidad de fijarlo como título técnico. «Espiritual» preserva la ambigüedad útil del griego y evita reducirlo a una categoría más específica de la que el texto da.
  doctrine_reference: Translation philosophy §4
- issue: Sujeto genérico singular masculino
  english_pob_reading: Use 'he' in English.
  chosen_spanish_reading: Uso de «si alguno» y formas verbales singulares genéricas en español.
  alternative_spanish_readings:
  - si alguien piensa que es profeta o espiritual, reconozca...
  - si una persona piensa...
  rationale: El griego usa un singular genérico masculino. En español, «si alguno» conserva bien esa referencia general sin forzar una neutralización que podría borrar el tono específico de la exhortación.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El paso de revisión reciente no introdujo cambios; la presente redacción mantiene el sentido del texto griego y la auditaron de la POB inglesa, conservando la ambigüedad de κυρίου ἐστίν en una nota y evitando una expansión interpretativa en el cuerpo principal.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en el sentido de autoridad divina, coherente con la política del proyecto para el griego que alude al nombre divino o a la autoridad del Señor.
  - «Profeta» y «espiritual» conservan la terminología del contexto carismático sin sustituirla por expresiones eclesiásticas más tradicionales.
  - La puntuación y el orden de la cláusula siguen la sintaxis española natural sin añadir palabras no requeridas por el griego.
  - El pronombre implícito en el imperativo se expresa con «reconozca», acorde con el singular genérico del original.
