translation:
  language: es
  text: Porque Dios no es un Dios de desorden, sino de paz[a], como en todas las iglesias de los santos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque Dios no es un Dios de confusión, sino de paz».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «como es el caso en todas las iglesias del pueblo santo de Dios». Algunos unen esta frase con el versículo siguiente en vez de con este.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐ γάρ ἐστιν
  english_pob_choice: For ... is not
  chosen_spanish: Porque ... no es
  alternatives_spanish:
  - Pues ... no es
  - Porque ... no es
  lexicon: BDAG
  rationale: «γάρ» expresa razón o fundamento; «Porque» mantiene esa relación causal de modo natural en español. El verbo copulativo negativo reproduce la estructura afirmativa/negativa del griego sin añadir matices ajenos.
- source_word: ἀκαταστασίας
  english_pob_choice: disorder
  chosen_spanish: desorden
  alternatives_spanish:
  - confusión
  - inestabilidad
  - desorden
  lexicon: BDAG
  rationale: El campo semántico admite «confusión», pero el contexto inmediato trata del orden en la congregación; «desorden» comunica mejor la caracterización de Dios sin reducir el término a un estado mental.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios
  lexicon: BDAG
  rationale: En español, el artículo suele omitirse en este tipo de predicación nominal. «Dios» es la forma más natural y fiel en una construcción de identidad/predicación.
- source_word: εἰρήνης
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - paz
  - armonía
  - plenitud
  lexicon: BDAG
  rationale: «Paz» es el equivalente directo y el contraste más transparente frente a «desorden». Mantiene el sentido paulino sin sobreinterpretar a «armonía» o «plenitud».
- source_word: ὡς ἐν πάσαις ταῖς ἐκκλησίαις τῶν ἁγίων
  english_pob_choice: as in all the churches of the saints
  chosen_spanish: como en todas las iglesias de los santos
  alternatives_spanish:
  - como sucede en todas las iglesias de los santos
  - como en todas las iglesias del pueblo santo de Dios
  lexicon: BDAG
  rationale: «Como en» conserva la relación comparativa breve del griego. «Iglesias» mantiene el término paulino para las congregaciones locales. «De los santos» preserva la designación técnica de los creyentes; la alternativa explicativa queda mejor para nota que para el texto principal.
theological_decisions:
- issue: Alcance de la cláusula final con ὡς ἐν πάσαις ταῖς ἐκκλησίαις τῶν ἁγίων
  english_pob_reading: Attached to verse 33 as a comparison/appeal to the practice of all the churches
  chosen_spanish_reading: Unida al versículo 33 como comparación o apelación a la práctica común de todas las iglesias
  alternative_spanish_readings:
  - Unida al versículo siguiente
  - Tomada como inicio de una nueva unidad
  rationale: La puntuación y la conexión sintáctica son debatidas en la tradición textual. Dado el texto base proporcionado, se conserva la unión con v. 33, pero se deja constancia de la posibilidad alternativa para no borrar la tensión interpretativa.
  doctrine_reference: Mantener la tensión sintáctica y eclesial sin resolverla artificialmente
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó el guion por una coma para hacer más fluida la relación de la cláusula final; la versión española sigue esa conexión con una coma antes de «como» y mantiene la lectura de una sola oración.
  spanish_consistency_notes:
  - Se usa «Dios» sin artículo para una predicación nominal natural en español.
  - Se prefiere «desorden» frente a «confusión» por el contexto de conducta congregacional, dejando la alternativa en nota.
  - Se traduce ἅγιοι como «los santos» para conservar el registro paulino y la correspondencia léxica.
  - La cláusula final se deja en el cuerpo del texto con lectura comparativa, sin resolver la disputa de enlace al versículo siguiente.
