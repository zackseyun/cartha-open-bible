translation:
  language: es
  text: Hablen dos o tres profetas, y los demás[a] evalúen lo dicho.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «juzguen» o «disciernan». El verbo griego puede denotar evaluar o discernir el discurso profético.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - los que profetizan
  lexicon: BDAG
  rationale: El sustantivo designa a profetas o hablantes proféticos. «Profetas» es la forma más directa y natural en español, y conserva la categoría personal que el texto regula.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - ahora
  - pero
  lexicon: BDAG
  rationale: Aquí δέ funciona como transición suave dentro de una instrucción encadenada. «Y» mantiene el flujo natural sin introducir contraste excesivo.
- source_word: δύο ἢ τρεῖς
  english_pob_choice: two or three
  chosen_spanish: dos o tres
  lexicon: BDAG
  rationale: Expresión numérica directa; se mantiene de manera formal y clara.
- source_word: λαλείτωσαν
  english_pob_choice: let ... speak
  chosen_spanish: hablen
  alternatives_spanish:
  - que hablen
  - hablen, pues
  lexicon: BDAG
  rationale: El imperativo de tercera persona plural se vierte con subjuntivo exhortativo en español, una forma natural y fiel para una instrucción comunitaria.
- source_word: οἱ ἄλλοι
  english_pob_choice: the others
  chosen_spanish: los demás
  alternatives_spanish:
  - los otros
  - el resto
  lexicon: BDAG
  rationale: La frase conserva la referencia abierta del griego. «Los demás» es idiomático en español y no especifica indebidamente si se trata de otros profetas, líderes o participantes.
- source_word: διακρινέτωσαν
  english_pob_choice: weigh what is said
  chosen_spanish: disciernan
  alternatives_spanish:
  - juzguen
  - evalúen
  - disciernan lo dicho
  lexicon: BDAG
  rationale: En este contexto διακρίνω apunta a evaluar/discernir el habla profética, no a condenar. «Disciernan» preserva esa fuerza espiritual e intelectual sin cargar el verbo con un matiz judicial indebido.
theological_decisions:
- issue: Identidad de «los demás»
  english_pob_reading: Rendered generically as 'the others' without specifying whether these are other prophets, leaders, or the congregation as a whole.
  chosen_spanish_reading: «los demás» sin precisar su composición
  alternative_spanish_readings:
  - los otros profetas
  - el resto de la congregación
  rationale: El griego no define el grupo más allá de «los demás». La versión española conserva esa ambigüedad para no resolver una cuestión eclesiológica que el texto deja abierta.
  doctrine_reference: Preservar la tensión teológica sin resolverla
translation_notes:
  revision_awareness: El texto griego y el audit trail en inglés coinciden ampliamente; no se requieren revisiones sustantivas. Se preserva la ambigüedad de οἱ ἄλλοι y la fuerza evaluativa de διακρινέτωσαν.
  spanish_consistency_notes:
  - Se mantiene «profetas» para προφῆται, coherente con el uso técnico del contexto.
  - «Disciernan» evita tanto una traducción demasiado judicial de διακρίνω como una paráfrasis excesiva.
  - «Los demás» conserva la apertura referencial del griego y del borrador inglés.
  - La nota al pie ofrece alternativas semánticas legítimas sin imponer una sola lectura.
