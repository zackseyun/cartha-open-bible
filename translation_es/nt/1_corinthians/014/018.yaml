translation:
  language: es
  text: Doy gracias a Dios, porque hablo en lenguas[a] más que todos ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en idiomas». El término griego puede significar «idiomas», pero en este contexto se refiere al fenómeno discutido a lo largo de 1 Corintios 12–14 y tradicionalmente se traduce «lenguas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐχαριστῶ
  english_pob_choice: I thank
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Le doy gracias
  - Agradezco
  lexicon: BDAG
  rationale: El verbo expresa acción de gracias en primera persona singular. En español, 'doy gracias' conserva el valor verbal directo y suena natural y reverente en este contexto epistolar.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  - para Dios
  lexicon: BDAG
  rationale: El dativo con εὐχαριστέω se rinde naturalmente en español con 'a Dios' en la expresión 'dar gracias a Dios', sin perder la relación verbal del original.
- source_word: πάντων ὑμῶν μᾶλλον
  english_pob_choice: more than all of you
  chosen_spanish: más que todos ustedes
  alternatives_spanish:
  - más que todos vosotros
  - más que todos ustedes mismos
  lexicon: BDAG
  rationale: La comparación expresa superioridad respecto del conjunto de los destinatarios. 'Más que todos ustedes' es idiomático en español latinoamericano y preserva la comparación global sin forzar una precisión individual que el griego no exige explícitamente.
- source_word: γλώσσαις
  english_pob_choice: in tongues
  chosen_spanish: en lenguas
  alternatives_spanish:
  - en idiomas
  - en lenguas espirituales
  lexicon: BDAG
  rationale: El contexto de 1 Corintios 12–14 señala el fenómeno tratado como 'tongues'. En español, 'lenguas' mantiene la terminología del pasaje y evita resolver la cuestión interpretativa entre idiomas humanos o habla carismática más allá de lo que el texto afirma.
- source_word: λαλῶ
  english_pob_choice: I speak
  chosen_spanish: hablo
  alternatives_spanish:
  - estoy hablando
  - habl(o)
  lexicon: BDAG
  rationale: El presente indicativo primera persona se traduce de forma simple y directa con 'hablo', que conserva la afirmación personal y el tono declarativo del griego.
theological_decisions:
- issue: Cómo rendir γλώσσαις en un contexto carismático sin resolver la discusión interpretativa
  english_pob_reading: in tongues
  chosen_spanish_reading: en lenguas
  alternative_spanish_readings:
  - en idiomas
  rationale: 'Se conserva el término tradicional del pasaje porque el contexto inmediato discute el don de lenguas. ''En lenguas'' preserva la tensión teológica: no decide si se trata de idiomas humanos, habla extática o una categoría más amplia; simplemente reproduce el modo en que el texto nombra el fenómeno.'
  doctrine_reference: Preservar la tensión teológica sin sobreinterpretar el término.
translation_notes:
  revision_awareness: El texto fuente y el audit trail inglés concuerdan en el sentido general; no se registran revisiones aplicadas. Se mantiene la alternativa léxica de γλώσσαις en nota, como en el POB inglés, para no cerrar indebidamente la discusión del pasaje.
  spanish_consistency_notes:
  - Se usa 'Dios' en lugar de una perífrasis reverencial, conforme al valor del dativo con εὐχαριστῶ.
  - '''Lenguas'' se mantiene como término técnico del contexto paulino y no se sustituye por ''idiomas'' en el texto principal.'
  - La comparación 'más que todos ustedes' conserva el alcance colectivo de πάντων ὑμῶν sin añadir matices no explícitos.
