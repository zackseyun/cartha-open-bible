revisions:
- from: Así también ustedes, puesto que son celosos de los dones espirituales[a], procuren abundar para la edificación de la iglesia.
  to: Así también ustedes, puesto que son deseosos de los dones espirituales[a], procuren abundar para la edificación de la iglesia.
  rationale: Se reemplaza 'celosos de' por 'deseosos de' para expresar con más claridad y naturalidad el sentido positivo de ζηλωταί en español contemporáneo, evitando la ambigüedad de 'celosos'. Se conserva la estructura general, la ausencia de un objeto añadido para 'abundar', y la nota sobre la compresión léxica de πνευμάτων, con una leve mejora de precisión contextual.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:05Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del POB en inglés: mantiene la inferencia inicial, la causalidad de ἐπεὶ, la meta de la edificación de la iglesia, y evita añadir un objeto explícito a περισσεύητε. También preserva en nota la compresión de πνευμάτων. Sin embargo, ''celosos de'' en español sugiere fácilmente ''jealous of'' más que ''eager for/zealous for'', y debilita la claridad contextual.'
  spanish_quality_summary: La frase es mayormente natural y digna, pero 'celosos de los dones espirituales' suena poco idiomático y potencialmente equívoco en español eclesial general. 'Deseosos de' o 'anhelan' comunica mejor la idea de afán positivo. El resto del versículo es claro y legible.
  glossary_alignment: No hay conflicto con los términos base del proyecto. 'Iglesia', 'dones espirituales' y 'edificación' son aceptables aquí. La nota sobre πνευμάτων está bien orientada; conviene solo pulir el texto principal para reflejar mejor ζηλωταί.
  issues:
  - severity: medium
    issue: '''celosos de los dones espirituales'' no refleja con suficiente claridad ζηλωταί ἐστε πνευμάτων en español natural.'
    rationale: Aunque 'celosos' puede conservar algo de la fuerza de 'zealous', en español moderno suele asociarse a celos posesivos. En este contexto Pablo habla de deseo intenso o afán por dones/manifestaciones espirituales, no de celos.
  - severity: low
    issue: La nota dice 'manifestaciones espirituales' en vez de vincularlas más explícitamente al Espíritu.
    rationale: No es incorrecto, pero 'manifestaciones del Espíritu' armoniza un poco mejor con la rationale del POB y evita una lectura vaga de 'espirituales'.
  revised_spanish_text: Así también ustedes, puesto que son deseosos de los dones espirituales[a], procuren abundar para la edificación de la iglesia.
  revised_footnotes:
  - marker: a
    text: 'Griego: «espirituales» o «espíritus»; el contexto sugiere dones o manifestaciones del Espíritu.'
    reason: alternative_reading
  revision_rationale: Se reemplaza 'celosos de' por 'deseosos de' para expresar con más claridad y naturalidad el sentido positivo de ζηλωταί en español contemporáneo, evitando la ambigüedad de 'celosos'. Se conserva la estructura general, la ausencia de un objeto añadido para 'abundar', y la nota sobre la compresión léxica de πνευμάτων, con una leve mejora de precisión contextual.
