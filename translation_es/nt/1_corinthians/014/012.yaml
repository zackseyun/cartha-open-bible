translation:
  language: es
  text: Así también ustedes, puesto que son deseosos de los dones espirituales[a], procuren abundar para la edificación de la iglesia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «espirituales» o «espíritus»; el contexto sugiere dones o manifestaciones del Espíritu.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ ὑμεῖς
  english_pob_choice: So also you
  chosen_spanish: Así también ustedes
  alternatives_spanish:
  - De la misma manera, ustedes también
  - Así pues, ustedes también
  lexicon: BDAG
  rationale: Conserva la comparación y la continuidad argumentativa con el contexto previo, en español natural y directo.
- source_word: ἐπεὶ
  english_pob_choice: since
  chosen_spanish: puesto que
  alternatives_spanish:
  - ya que
  - porque
  lexicon: BDAG
  rationale: Introduce la base de la exhortación con un matiz causal claro y fluido en español.
- source_word: ζηλωταί
  english_pob_choice: eager
  chosen_spanish: celosos
  alternatives_spanish:
  - entusiastas
  - deseosos
  lexicon: BDAG
  rationale: La noción de ζῆλος/ζηλωτής en este contexto expresa una disposición intensa o celosa; 'celosos' mantiene esa fuerza, aunque en español puede sonar más marcado que 'eager' en inglés.
- source_word: πνευμάτων
  english_pob_choice: spiritual gifts
  chosen_spanish: de los dones espirituales
  alternatives_spanish:
  - de las cosas espirituales
  - de los espíritus
  lexicon: BDAG
  rationale: El griego es comprimido y literal­mente podría leerse 'de espíritus' o 'de cosas espirituales'; en el contexto de 1 Corintios 12–14 se refiere a manifestaciones/dones del Espíritu. 'Dones espirituales' comunica ese sentido contextual sin ocultar la ambigüedad, que se preserva en nota.
- source_word: πρὸς τὴν οἰκοδομὴν
  english_pob_choice: for the building up
  chosen_spanish: para la edificación
  alternatives_spanish:
  - para la edificación mutua
  - para el edificar
  lexicon: BDAG
  rationale: '''Edificación'' conserva el valor paulino de οἰκοδομή como metáfora de fortalecer a la comunidad; en español suena más natural que calcar ''edificación'' con un complemento explícito largo.'
- source_word: τῆς ἐκκλησίας
  english_pob_choice: of the church
  chosen_spanish: de la iglesia
  alternatives_spanish:
  - de la asamblea
  lexicon: BDAG
  rationale: '''Iglesia'' es la equivalencia normal y adecuada para ἐκκλησία en el uso paulino, manteniendo inteligibilidad para lectores de español.'
- source_word: ζητεῖτε
  english_pob_choice: seek
  chosen_spanish: procuren
  alternatives_spanish:
  - busquen
  - esfuércense por
  lexicon: BDAG
  rationale: El imperativo pide una búsqueda intencional orientada a una meta; 'procuren' expresa bien esa exhortación activa en español sin perder formalidad.
- source_word: ἵνα περισσεύητε
  english_pob_choice: to abound
  chosen_spanish: abundar
  alternatives_spanish:
  - sobresalir
  - abundar en ello
  lexicon: BDAG
  rationale: '''Abundar'' reproduce el verbo περισσεύω. La formulación española evita añadir un objeto explícito no presente en el griego, siguiendo la revisión del POB en inglés que eliminó ''in them''.'
theological_decisions:
- issue: Sentido de πνευμάτων en contexto
  english_pob_reading: Rendered as 'spiritual gifts' rather than the more literal but ambiguous 'spiritual things' or 'spirits.'
  chosen_spanish_reading: '''dones espirituales'' en el cuerpo del texto, con la ambigüedad literal preservada en nota.'
  alternative_spanish_readings:
  - '''cosas espirituales'''
  - '''espíritus'''
  rationale: En el marco de 1 Corintios 12–14, Pablo trata de manifestaciones del Espíritu y su utilidad para la congregación. 'Dones espirituales' expresa el sentido contextual, pero la nota conserva que el griego permite una lectura más literal y comprimida, evitando resolver en exceso la tensión lexical.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al no añadir un equivalente de 'in them'; por eso se eligió 'abundar' con destino implícito hacia la edificación de la iglesia, sin insertar un objeto no expresado en el griego. También se refleja la decisión revisada de mantener la meta de edificación como complemento de la exhortación, no como objeto directo adicional.
  spanish_consistency_notes:
  - Se mantiene 'iglesia' para ἐκκλησία, coherente con el POB inglés y con el uso paulino.
  - Se emplea 'dones espirituales' como solución contextual, pero la nota conserva la alternativa literal para no borrar la ambigüedad del griego.
  - '''Edificación'' se usa como término técnico paulino, evitando reemplazarlo por una paráfrasis más larga que diluya la metáfora.'
