revisions:
- from: Pero si a otro que está sentado se le hace una revelación, el primero calle.
  to: Pero si a otro que está sentado se le da una revelación, el primero calle.
  rationale: Se revisa únicamente la expresión del pasivo de ἀποκαλυφθῇ para mejorar la naturalidad y alinearla más de cerca con la decisión auditada del POB inglés, sin añadir agente explícito ni cambiar el sentido. No se requieren notas al pie porque las alternativas inglesas no son necesarias para resolver una ambigüedad nueva en español en este versículo.
