review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: condición contrastiva (ἐὰν δὲ), destinatario distinto (ἄλλῳ), referencia al participante sentado (καθημένῳ), y mandato de ceder la palabra (ὁ πρῶτος σιγάτω). Sin embargo, «se le hace una revelación» no suena natural en español y debilita la fuerza idiomática del pasivo griego que el POB inglés resolvió como «a revelation is given».'
  spanish_quality_summary: El texto es comprensible, pero «se le hace una revelación» resulta poco idiomático y algo torpe para español bíblico moderno. «Se le da una revelación» conserva mejor la pasiva implícita, suena natural y mantiene el tono digno. El resto del versículo es claro y legible.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La decisión sobre ἀποκαλυφθῇ debe ajustarse por naturalidad del español, no por problema teológico. «Calle» es aceptable para σιγάτω; «el primero» preserva el literal del griego con buena claridad contextual.
