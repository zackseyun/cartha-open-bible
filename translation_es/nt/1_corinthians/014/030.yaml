translation:
  language: es
  text: Pero si a otro que está sentado se le da una revelación, el primero calle.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: En español, «pero si» reproduce bien el matiz de contraste o continuación correctiva de δέ unido a la condición de ἐάν, sin sonar forzado.
- source_word: ἄλλῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otra persona
  - a alguien más
  lexicon: BDAG
  rationale: El dativo expresa el destinatario de la revelación. «A otro» es breve, natural y conserva la referencia a un participante distinto del que habla.
- source_word: ἀποκαλυφθῇ
  english_pob_choice: is given
  chosen_spanish: se le hace una revelación
  alternatives_spanish:
  - se le revela
  - recibe una revelación
  lexicon: BDAG
  rationale: El griego pasa a una pasiva de revelación. En español, «se le hace una revelación» mantiene la pasividad y evita decidir explícitamente el agente, como hace la auditable elección inglesa.
- source_word: ἀποκαλυφθῇ ... ἄλλῳ
  english_pob_choice: a revelation is given to another
  chosen_spanish: a otro ... se le hace una revelación
  alternatives_spanish:
  - algo le es revelado a otro
  - otro recibe una revelación
  lexicon: BDAG
  rationale: La construcción expresa un evento revelatorio concreto dentro de la reunión, no solo una abstracción. La formulación española conserva esa concreción sin añadir más de lo que el texto exige.
- source_word: καθημένῳ
  english_pob_choice: who is seated
  chosen_spanish: que está sentado
  alternatives_spanish:
  - sentado
  - que está en su asiento
  lexicon: BDAG
  rationale: El participio describe al otro participante como sentado durante la reunión. «Que está sentado» es idiomático y fiel al estado descrito.
- source_word: ὁ πρῶτος
  english_pob_choice: the first
  chosen_spanish: el primero
  alternatives_spanish:
  - el primer hablante
  - el que hablaba primero
  lexicon: BDAG
  rationale: La expresión es literalmente «el primero». Mantenerla preserva la referencia contextual al primero que estaba hablando, sin explicitar más de lo que el versículo dice.
- source_word: σιγάτω
  english_pob_choice: let ... be silent
  chosen_spanish: calle
  alternatives_spanish:
  - guarde silencio
  - deje de hablar
  lexicon: BDAG
  rationale: El imperativo de σιγάω pide cesar la խոս/voz. «Calle» es breve, imperativo y suficientemente fuerte en español para expresar el mandato.
theological_decisions:
- issue: Agente implícito de la revelación
  english_pob_reading: Render the passive as 'a revelation is given' without specifying the divine agent explicitly.
  chosen_spanish_reading: Usar una pasiva/reflexiva impersonal («se le hace una revelación») sin nombrar al agente.
  alternative_spanish_readings:
  - se le revela algo
  - Dios le revela algo
  rationale: El griego no nombra aquí al agente, aunque el contexto lo presupone. La traducción conserva esa reserva y no sobreespecifica teológicamente lo que el verso no explicita.
  doctrine_reference: 1 Corintios 14:29-33; filosofía POB de no ampliar el sujeto implícito más allá del texto
translation_notes:
  revision_awareness: El texto inglés auditado traduce ἀποκαλυφθῇ con una idiomática pasiva («a revelation is given») y añade una nota alternativa («if something is revealed...»). En español, la pasiva impersonal «se le hace una revelación» conserva esa misma cautela semántica sin requerir nota textual adicional. La indicación contextual de que el primero debe dejar de hablar queda implícita en «calle».
  spanish_consistency_notes:
  - Se mantiene «otro» como destinatario de la revelación para reflejar ἄλλῳ.
  - Se evita introducir «profeta» o «hablante» porque el versículo solo dice «el primero», como en el inglés auditado.
  - Se usa una forma verbal breve e imperativa («calle») para preservar la fuerza del mandato de σιγάτω.
