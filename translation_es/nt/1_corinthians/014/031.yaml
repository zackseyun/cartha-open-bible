review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: capacidad/permiso práctico (''pueden''), secuencia ordenada (''uno por uno''), propósito (''para que''), repetición enfática de ''todos'', y el valor amplio de παρακαλῶνται con nota alternativa. Sin embargo, la correspondencia de persona es imperfecta: el griego tiene 2.ª persona plural explícita en δύνασθε, mientras que ''todos pueden'' suena más a 3.ª persona enunciativa. Conviene explicitar ''ustedes'' para conservar mejor la apelación directa paulina.'
  spanish_quality_summary: El español es claro y natural, pero 'Porque todos pueden profetizar' pierde algo de la fuerza exhortativa directa al sonar más impersonal. 'Porque todos ustedes pueden profetizar' mantiene legibilidad y alinea mejor con el original. El resto del verso es fluido y digno. 'Sean animados' es entendible; en este contexto funciona, apoyado por la nota.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Profetizar' y 'todos' están bien preservados. La nota sobre παρακαλέω mantiene adecuadamente las alternativas 'exhortar' y 'consolar'.
  issues:
  - severity: medium
    issue: La 2.ª persona plural de δύνασθε no queda plenamente reflejada en 'todos pueden'.
    rationale: El original se dirige directamente a los corintios ('ustedes pueden'). En español, 'todos pueden' se oye fácilmente como observación general en 3.ª persona. Añadir 'ustedes' preserva mejor la forma y el tono del griego sin volver el texto pesado.
  revised_spanish_text: Porque todos ustedes pueden profetizar uno por uno[a], para que todos aprendan y todos sean animados[b].
