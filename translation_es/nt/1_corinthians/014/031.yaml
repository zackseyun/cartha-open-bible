translation:
  language: es
  text: Porque todos ustedes pueden profetizar uno por uno[a], para que todos aprendan y todos sean animados[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «uno a la vez».
    reason: lexical_alternative
  - marker: b
    text: O «sean exhortados» o «sean consolados»; el verbo griego puede expresar animar, exhortar o consolar según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: δύνασθε
  english_pob_choice: you can
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces de
  - pueden ustedes
  lexicon: BDAG
  rationale: El verbo expresa capacidad/posibilidad en 2.ª persona plural. «Pueden» comunica naturalmente esa capacidad en español sin recargar el texto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o explicación de la instrucción previa. «Porque» conserva bien esa fuerza explicativa en español contemporáneo.
- source_word: καθ’ ἕνα
  english_pob_choice: one by one
  chosen_spanish: uno por uno
  alternatives_spanish:
  - uno a la vez
  - individualmente
  lexicon: BDAG
  rationale: La expresión idiomática señala secuencia ordenada, no simultaneidad. «Uno por uno» es la equivalencia natural más clara en español.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ustedes
  - todo el grupo
  lexicon: BDAG
  rationale: Se repite tres veces; «todos» preserva la amplitud y la repetición retórica sin estrechar indebidamente el referente.
- source_word: προφητεύειν
  english_pob_choice: prophesy
  chosen_spanish: profetizar
  alternatives_spanish:
  - hablar proféticamente
  lexicon: BDAG
  rationale: «Profetizar» es el equivalente directo y mantiene la categoría paulina sin añadir una glosa interpretativa.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce propósito/resultando. «Para que» es la opción más natural y fiel en español.
- source_word: μανθάνωσιν
  english_pob_choice: may learn
  chosen_spanish: aprendan
  alternatives_spanish:
  - lleguen a aprender
  - puedan aprender
  lexicon: BDAG
  rationale: El subjuntivo final expresa el propósito de edificación mediante aprendizaje. «Aprendan» conserva la sencillez del original.
- source_word: παρακαλῶνται
  english_pob_choice: may be encouraged
  chosen_spanish: sean animados
  alternatives_spanish:
  - sean exhortados
  - sean consolados
  lexicon: BDAG
  rationale: παρακαλέω puede abarcar animar, exhortar o consolar según el contexto. En este marco de edificación congregacional, «sean animados» conserva el sentido amplio y evita restringirlo a una sola faceta.
theological_decisions:
- issue: Alcance de πάντες en un contexto congregacional
  english_pob_reading: Rendered as 'all' without specifying 'all of you' or 'all the prophets,' preserving Paul's broad rhetorical repetition while allowing the immediate context to define the group.
  chosen_spanish_reading: Se mantiene «todos» sin precisar «todos ustedes» ni «todos los profetas», para conservar la repetición retórica y dejar que el contexto inmediato delimite a quiénes se refiere.
  alternative_spanish_readings:
  - todos ustedes
  - todos los profetas
  rationale: El griego repite πάντες tres veces y no resuelve de manera explícita si el primer uso se refiere a quienes profetizan y los otros dos a la asamblea oyente, o a otro matiz del grupo. La traducción conserva esa tensión sin cerrarla demasiado.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla más allá del texto.
translation_notes:
  revision_awareness: La revisión final en inglés no introdujo cambios; se mantiene la lectura aprobada y de alta concordancia. Esta versión española sigue directamente el texto griego y el audit trail inglés, sin ajustes textuales posteriores que alteren las decisiones léxicas o teológicas.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Profetizar» se conserva como término técnico paulino.
  - «Animados» recoge el campo semántico amplio de παρακαλέω sin forzar una sola acepción.
