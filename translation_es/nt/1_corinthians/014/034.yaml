base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/014/034.yaml
  text: The women should keep silent in the churches[a], for they are not permitted to speak, but should be in submission[c][b], just as the law also says.
  footnotes:
  - marker: a
    text: Or "the wives should keep silent in the churches"; γυνή can mean either "woman" or "wife" depending on context.
    reason: alternative_reading
  - marker: b
    text: That is, the verse does not itself specify what kind of speaking is in view; some understand it more narrowly from the surrounding context.
    reason: lexical_alternative
  - marker: c
    text: Or "the Law"; Paul may be referring specifically to the Mosaic Law or more broadly to Scripture.
    reason: alternative_reading
