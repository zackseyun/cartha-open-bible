translation:
  language: es
  text: Las mujeres[a] guarden silencio en las iglesias, porque no se les permite hablar[b]; más bien, estén en sujeción, como también dice la ley[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las esposas»; γυνή puede significar «mujer» o «esposa» según el contexto.
    reason: alternative_reading
  - marker: b
    text: Es decir, el versículo no especifica por sí mismo qué clase de habla está en vista; algunos lo entienden de manera más limitada por el contexto circundante.
    reason: lexical_alternative
  - marker: c
    text: O «la Ley»; Pablo puede estar refiriéndose específicamente a la Ley mosaica o más ampliamente a la Escritura.
    reason: alternative_reading
lexical_decisions:
- source_word: γυναῖκες
  english_pob_choice: the women
  chosen_spanish: las mujeres
  alternatives_spanish:
  - las esposas
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa» según el contexto. Aquí, como en el audit trail inglés, la referencia más natural del plural con artículo es «las mujeres». Se preserva la alternativa «esposas» en nota, pero el texto principal no añade un referente marital que el griego no explicita.
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - asambleas
  - congregaciones
  lexicon: BDAG
  rationale: ἐκκλησία en el uso paulino suele referirse a las reuniones cristianas/iglesias. «Iglesias» es la equivalencia natural en español e integra bien el ámbito comunitario sin perder el sentido de asamblea.
- source_word: σιγάτωσαν
  english_pob_choice: should keep silent
  chosen_spanish: callen
  alternatives_spanish:
  - guarden silencio
  - deben callar
  lexicon: BDAG
  rationale: El imperativo comunica silencio o restricción del habla. «Callen» conserva la fuerza verbal y suena natural en español bíblico sin suavizar el mandato.
- source_word: ἐπιτρέπεται
  english_pob_choice: are not permitted
  chosen_spanish: no se les permite
  alternatives_spanish:
  - no está permitido que
  - no tienen permiso para
  lexicon: BDAG
  rationale: La forma impersonal expresa negación de permiso. «No se les permite» reproduce bien esa fuerza impersonal en español y evita introducir un sujeto no expresado.
- source_word: λαλεῖν
  english_pob_choice: to speak
  chosen_spanish: hablar
  alternatives_spanish:
  - decir
  - tomar la palabra
  lexicon: BDAG
  rationale: λαλέω es un verbo amplio de hablar. «Hablar» es la opción neutral y fiel; no se estrecha el sentido a una clase específica de intervención que el verso no nombra.
- source_word: ὑποτασσέσθωσαν
  english_pob_choice: should be in submission
  chosen_spanish: estén en sujeción
  alternatives_spanish:
  - sujétense
  - estén sometidas
  lexicon: BDAG
  rationale: El imperativo medio/pasivo indica una postura de subordinación o sujeción. «Estén en sujeción» preserva la idea sin cargar el español con una formulación más áspera o más interpretativa.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  lexicon: BDAG
  rationale: «La ley» conserva la ambigüedad del griego respecto de si se trata específicamente de la Ley mosaica o de la Escritura en sentido más amplio. Se evita resolver en el texto principal una tensión que el auditorio debe percibir.
- source_word: καθὼς καὶ ὁ νόμος λέγει
  english_pob_choice: just as the law also says
  chosen_spanish: como también dice la ley
  alternatives_spanish:
  - tal como también dice la ley
  - como dice también la ley
  lexicon: BDAG
  rationale: La comparación con καὶ se expresa de manera natural con «también». «Como también dice la ley» conserva la relación comparativa y la referencia de apoyo sin forzar un giro más técnico.
theological_decisions:
- issue: Referente de γυναῖκες
  english_pob_reading: women in the assemblies
  chosen_spanish_reading: mujeres en las iglesias
  alternative_spanish_readings:
  - esposas en las iglesias
  rationale: El griego admite ambos valores léxicos. El texto principal mantiene «mujeres» para no añadir un referente marital que el verso no explicita; la alternativa «esposas» queda preservada para transparencia interpretativa.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en traducción.
- issue: Alcance de la prohibición de hablar
  english_pob_reading: rendered straightforwardly without narrowing the kind of speech in the main text
  chosen_spanish_reading: no se les permite hablar
  alternative_spanish_readings:
  - no se les permite intervenir
  - no se les permite tomar la palabra
  rationale: El verbo griego es general y no especifica en este verso qué tipo de habla está en vista. La traducción principal evita insertar una limitación más estrecha que no proviene directamente del texto.
  doctrine_reference: Primacía del original; preservar la tensión teológica sin resolverla.
- issue: Sentido de ὁ νόμος
  english_pob_reading: the law
  chosen_spanish_reading: la ley
  alternative_spanish_readings:
  - la Ley
  rationale: Se conserva la ambigüedad del griego con una minúscula funcional en español. Así no se decide en la traducción si Pablo se refiere de modo estricto a la Torá/Moisés o a la Escritura en general.
  doctrine_reference: Preservar la ambigüedad textual y teológica.
translation_notes:
  revision_awareness: 'El pasaje fue revisado en el flujo inglés y quedó sin cambios (latest_revision_pass: unchanged=true; cross-check: high_agreement). La versión española sigue ese estado: mantiene la estructura y las ambigüedades documentadas, sin introducir aclaraciones doctrinales no presentes en el audit trail.'
  spanish_consistency_notes:
  - Se usa «iglesias» para ἐκκλησίαις, en consonancia con el uso paulino y con el texto inglés auditado.
  - Se mantiene «la ley» en minúscula para preservar la ambigüedad de νόμος, evitando una decisión interpretativa cerrada.
  - «Callen» y «hablar» conservan el contraste verbal del versículo sin añadir especificaciones de tipo de intervención.
  - La nota sobre γυναῖκες diferencia «mujeres» y «esposas» sin forzar el sentido principal.
  - La puntuación y el registro buscan ser bíblicos y publicables en español latinoamericano, sin caer en calcos rígidos.
