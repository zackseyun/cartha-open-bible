translation:
  language: es
  text: Hermanos[a], no se hagan niños en su manera de pensar, sino sean como bebés en cuanto al mal[b]; pero en su manera de pensar, háganse maduros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa el plural masculino ἀδελφοί como apelativo congregacional.
    reason: lexical_alternative
  - marker: b
    text: O «en malicia»; κακία puede significar mal, maldad o malicia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - Hermanos y hermanas
  - Hermanos y hermanas en la fe
  lexicon: BDAG
  rationale: El vocativo plural masculino conserva la forma gramatical del griego y puede funcionar como apelativo congregacional para todo el grupo. En español, «Hermanos» es la forma eclesial natural y mantiene la fuerza representativa sin imponer una paráfrasis más amplia en el texto principal; la inclusión se indica en nota.
- source_word: παιδία
  english_pob_choice: children
  chosen_spanish: niños
  alternatives_spanish:
  - niños pequeños
  - criaturas
  lexicon: BDAG
  rationale: Aquí el contraste retórico es con la madurez, no con una categoría técnica de edad. «Niños» comunica con claridad la imagen de inmadurez y preserva el paralelo con «maduros».
- source_word: γίνεσθε
  english_pob_choice: do not become / become
  chosen_spanish: no se hagan / sean
  alternatives_spanish:
  - no lleguen a ser / lleguen a ser
  - no se vuelvan / vuélvanse
  lexicon: BDAG
  rationale: El imperativo de γίνομαι enfatiza el cambio de estado o condición. «No se hagan» y «sean» reproducen el valor exhortativo en español con naturalidad; en la segunda cláusula, el predicativo expresa el estado deseado sin forzar un calco repetitivo.
- source_word: ταῖς φρεσίν / ταῖς δὲ φρεσὶν
  english_pob_choice: in your thinking
  chosen_spanish: en su modo de pensar
  alternatives_spanish:
  - en su pensamiento
  - en su entendimiento
  - en su mente
  lexicon: BDAG
  rationale: φρήν apunta a la facultad de pensar, comprender o tener disposición mental. «Modo de pensar» suena natural en español y conserva el matiz de orientación mental sin reducirlo a una sola facultad psicológica.
- source_word: τῇ κακίᾳ
  english_pob_choice: in evil
  chosen_spanish: en cuanto al mal
  alternatives_spanish:
  - en el mal
  - en la maldad
  - en la malicia
  lexicon: BDAG
  rationale: κακία puede abarcar maldad, mal o perversidad. «En cuanto al mal» evita restringir prematuramente a «malicia» y mantiene el campo semántico amplio que el audit trail considera principal; el contraste es ético general, no solo interpersonal.
- source_word: νηπιάζετε
  english_pob_choice: be infants
  chosen_spanish: sean infantiles
  alternatives_spanish:
  - sean como bebés
  - sean como infantes
  - sean inmaduros
  lexicon: BDAG
  rationale: El verbo expresa comportarse como un infante. «Sean infantiles» transmite la idea de inmadurez deliberada respecto al mal, sin sonar excesivamente literal o extraño en español; la imagen se conserva en contraste con la madurez mental.
- source_word: τέλειοι
  english_pob_choice: mature
  chosen_spanish: maduros
  alternatives_spanish:
  - perfectos
  - completos
  - plenamente desarrollados
  lexicon: BDAG
  rationale: En este contexto, τέλειος describe plenitud o madurez, no perfección sin pecado. «Maduros» es la equivalencia más clara y fiel para el lector español contemporáneo.
- source_word: ἀλλὰ ... δὲ
  english_pob_choice: but ... yet
  chosen_spanish: sino ... pero
  alternatives_spanish:
  - sino ... más bien
  - pero ... pero
  lexicon: BDAG
  rationale: La primera partícula introduce contraste correctivo; en español, «sino» expresa mejor la sustitución de una actitud por otra. La segunda coordina la conclusión exhortativa con un «pero» simple y natural.
theological_decisions:
- issue: Alcance congregacional del vocativo masculino plural
  english_pob_reading: Retain 'Brothers' in the main text, with inclusive force noted in a footnote.
  chosen_spanish_reading: Mantener «Hermanos» en el texto principal, con una nota que explicite que el plural masculino incluye a la congregación.
  alternative_spanish_readings:
  - Hermanos y hermanas
  - Hermanos y hermanas en la fe
  rationale: El griego usa una forma masculina plural que es visible y significativa. En una traducción auditable, conviene conservarla en el cuerpo del texto y aclarar su alcance congregacional en nota, en vez de neutralizarla sin señalamiento.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones aplicadas; por eso la propuesta española sigue de cerca la sintaxis y el paralelismo del original, manteniendo visibles las dos oposiciones: inmadurez/infantilidad frente a madurez, y mal frente a entendimiento maduro.'
  spanish_consistency_notes:
  - Se conserva «Hermanos» como vocativo congregacional masculino visible en el texto principal, con nota inclusiva.
  - Se usa «modo de pensar» de manera consistente para φρήν, evitando alternar innecesariamente con «mente» o «entendimiento».
  - «Mal» se mantiene como término general para κακία, con «malicia» como alternativa anotada.
  - «Infantiles» se emplea para el verbo νηπιάζω, distinguido de «niños» en παιδία.
  - «Maduros» se usa para τέλειοι en sentido de plenitud ética e intelectual, no de perfección moral absoluta.
