review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del audit trail inglés: conserva la pregunta retórica inicial, el vocativo representativo «hermanos», la secuencia distributiva «cada uno tiene…», «lengua» para γλῶσσα, y el cierre exhortativo con οἰκοδομή. Sin embargo, «¿Qué es, entonces, hermanos?» suena poco natural en español y no refleja idiomáticamente la función retórica de Τί οὖν ἐστιν. Además, «Cuando se reúnen» cambia innecesariamente a tercera persona; el contexto directo pide segunda persona plural.'
  spanish_quality_summary: 'La mayor parte del español es clara y eclesialmente legible. Las notas son adecuadas. Los principales problemas son de naturalidad y coherencia pronominal: la apertura «¿Qué es, entonces, hermanos?» es torpe en español, y «Cuando se reúnen» desajusta el tratamiento respecto del contexto apostrófico. Conviene también explicitar el artículo en «para la edificación» para una formulación más natural y digna.'
  glossary_alignment: 'Buena alineación con la terminología del proyecto y del POB: «hermanos», «salmo», «enseñanza», «revelación», «lengua», «interpretación». «Edificación» es aceptable como excepción contextual bien documentada para οἰκοδομή, aunque el inglés prefirió una expresión más dinámica. No hay conflicto con glosario mayor.'
  issues:
  - severity: medium
    issue: 'Apertura poco idiomática: «¿Qué es, entonces, hermanos?»'
    rationale: Aunque es formalmente cercana a Τί οὖν ἐστιν, en español suena extraña y no comunica bien la pregunta retórica conclusiva de Pablo. Una forma como «¿Qué implica esto, entonces, hermanos[a]?» o «¿Qué, pues, hermanos[a]?» funciona mejor; la primera es más clara y natural.
  - severity: medium
    issue: Cambio de persona en «Cuando se reúnen»
    rationale: El griego está en segunda persona plural (συνέρχησθε). Usar tercera persona plural debilita la apelación directa. «Cuando se reúnen ustedes» o mejor «Cuando se juntan»/«Cuando se reúnen» con contexto podría funcionar, pero para precisión conviene «Cuando ustedes se reúnen».
  - severity: low
    issue: «para edificación» puede sonar elíptico
    rationale: Es comprensible y tradicional, pero «para la edificación» suena más natural en español general y mantiene el matiz paulino comunitario.
