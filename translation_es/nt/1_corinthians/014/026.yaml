revisions:
- from: ¿Qué es, entonces, hermanos[a]? Cuando se reúnen, cada uno tiene un salmo, tiene una enseñanza, tiene una revelación, tiene una lengua, tiene una interpretación[b]. Que todo se haga para edificación.
  to: ¿Qué implica esto, entonces, hermanos[a]? Cuando ustedes se reúnen, cada uno tiene un salmo, tiene una enseñanza, tiene una revelación, tiene una lengua, tiene una interpretación[b]. Que todo se haga para la edificación.
  rationale: 'La revisión corrige dos puntos principales: (1) hace idiomática en español la pregunta retórica inicial de Τί οὖν ἐστιν sin alejarse de su función conclusiva; y (2) restituye la segunda persona plural de συνέρχησθε con «ustedes se reúnen». También se suaviza el cierre con «para la edificación», más natural en español eclesial contemporáneo. Se mantiene «hermanos» con nota inclusiva y «lengua» con nota alternativa, en plena continuidad con el audit trail inglés.'
