translation:
  language: es
  text: ¿Qué implica esto, entonces, hermanos[a]? Cuando ustedes se reúnen, cada uno tiene un salmo, tiene una enseñanza, tiene una revelación, tiene una lengua, tiene una interpretación[b]. Que todo se haga para la edificación.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se dirige representativamente a la congregación e incluye a las mujeres así como a los hombres.
    reason: lexical_alternative
  - marker: b
    text: O «un idioma». El término griego puede denotar una lengua o un idioma; aquí «lengua» preserva la formulación de Pablo en esta discusión.
    reason: alternative_reading
lexical_decisions:
- source_word: Τί οὖν ἐστιν
  english_pob_choice: What then is it
  chosen_spanish: ¿Qué es, entonces, hermanos[a]?
  alternatives_spanish:
  - ¿Qué sucede, entonces, hermanos[a]?
  - ¿Qué es, pues, hermanos[a]?
  lexicon: BDAG
  rationale: La pregunta retórica se conserva en forma natural en español. '¿Qué es, entonces?' reproduce la apertura interrogativa y 'hermanos' mantiene el vocativo representativo del texto y del audit trail inglés.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El griego masculino plural funciona de modo representativo para la congregación mixta. En español, 'hermanos' conserva esa función eclesial sin forzar una formulación más explicativa en el texto principal.
- source_word: ὅταν συνέρχησθε
  english_pob_choice: When you come together
  chosen_spanish: Cuando se reúnen
  alternatives_spanish:
  - Cuando se congregan
  - Cuando se juntan
  lexicon: BDAG
  rationale: '''Se reúnen'' expresa con naturalidad el sentido congregacional de συνέρχεσθε y mantiene el valor temporal de ὅταν.'
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada cual
  - cada uno de ustedes
  lexicon: BDAG
  rationale: '''Cada uno'' reproduce el valor distributivo y encaja bien con la enumeración que sigue.'
- source_word: ψαλμὸν
  english_pob_choice: a psalm
  chosen_spanish: un salmo
  alternatives_spanish:
  - un canto
  - un himno
  lexicon: BDAG
  rationale: '''Salmo'' conserva el sustantivo específico del griego y sigue la decisión inglesa de no generalizarlo como ''song''.'
- source_word: διδαχὴν
  english_pob_choice: a teaching
  chosen_spanish: una enseñanza
  alternatives_spanish:
  - una instrucción
  - una doctrina
  lexicon: BDAG
  rationale: '''Enseñanza'' es idiomático en español y mantiene el sentido de una contribución instructiva en la reunión, sin cargarlo con el peso sistemático de ''doctrina''.'
- source_word: ἀποκάλυψιν
  english_pob_choice: a revelation
  chosen_spanish: una revelación
  alternatives_spanish:
  - un desvelamiento
  - una divulgación
  lexicon: BDAG
  rationale: '''Revelación'' es el equivalente transparente y estándar para un contenido revelado en la asamblea.'
- source_word: γλῶσσαν
  english_pob_choice: a tongue
  chosen_spanish: una lengua
  alternatives_spanish:
  - un idioma
  - una lengua hablada
  lexicon: BDAG
  rationale: Se conserva 'lengua' para mantener la tensión léxica y teológica del capítulo, como en el audit trail inglés con 'tongue', sin resolver de antemano si se trata de idioma humano conocido u otra manifestación.
- source_word: ἑρμηνείαν
  english_pob_choice: an interpretation
  chosen_spanish: una interpretación
  alternatives_spanish:
  - una explicación
  - una traducción
  lexicon: BDAG
  rationale: '''Interpretación'' corresponde bien al acto de dar sentido público a la lengua en el contexto inmediato.'
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo ello
  lexicon: BDAG
  rationale: '''Todo'' resume de manera natural la amplitud inclusiva del mandato final. En español suena más fluido que ''todas las cosas'' y conserva la totalidad del griego.'
- source_word: πρὸς οἰκοδομὴν
  english_pob_choice: for building up
  chosen_spanish: para edificación
  alternatives_spanish:
  - para edificar
  - para construcción
  lexicon: BDAG
  rationale: Se mantiene 'edificación' porque expresa mejor el valor eclesial-metafórico de οἰκοδομή. Aunque 'para edificar' sería más dinámico, 'edificación' preserva la terminología paulina sin perder claridad.
- source_word: γινέσθω
  english_pob_choice: Let all things be done
  chosen_spanish: Que todo se haga
  alternatives_spanish:
  - Háganse todas las cosas
  - Que todo ocurra
  lexicon: BDAG
  rationale: La forma exhortativa impersonal en español comunica bien el mandato regulativo de Pablo sin añadir agentes no presentes en el griego.
theological_decisions:
- issue: Vocativo masculino representativo para la congregación
  english_pob_reading: Retain 'brothers' in the main text, with a footnote indicating the inclusive sense in context.
  chosen_spanish_reading: Mantener 'hermanos' en el texto principal, con nota que indique el sentido inclusivo de la congregación.
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: El griego usa un masculino plural que puede abarcar a toda la congregación. El español 'hermanos' conserva esa forma representativa; la nota aclara la inclusividad sin alterar el texto base.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #4'
- issue: Sentido de γλῶσσα en 1 Corintios 12–14
  english_pob_reading: Render as 'tongue' rather than 'language' in the main text.
  chosen_spanish_reading: Renderizar como 'lengua' en el texto principal.
  alternative_spanish_readings:
  - idioma
  - lenguaje
  rationale: En español, 'lengua' permite conservar el término técnico y la tensión semántica del pasaje, análogo al 'tongue' inglés. No se decide aquí si la referencia es a idioma humano conocido o a otro fenómeno; esa ambigüedad queda intacta.
  doctrine_reference: 'DOCTRINE.md §Translation philosophy #3'
- issue: πρὸς οἰκοδομήν como término paulino
  english_pob_reading: for building up
  chosen_spanish_reading: para edificación
  alternative_spanish_readings:
  - para edificar
  - para la edificación
  rationale: '''Edificación'' mantiene el valor metafórico comunitario y eclesial del término paulino. En español es un término establecido que no reduce el matiz de construcción/fortalecimiento.'
  doctrine_reference: Uso paulino de οἰκοδομή en 1 Corintios 14
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia y no requieren cambios textuales mayores. Se mantuvo la tensión léxica de γλῶσσα con 'lengua' y la inclusividad de ἀδελφοί con nota, siguiendo las decisiones ya auditadas en inglés.
  spanish_consistency_notes:
  - Se conservó el paralelismo acumulativo de la lista mediante repeticiones de 'tiene'.
  - '''Edificación'' se usa de forma consistente con la terminología paulina y con el inglés ''building up''.'
  - Se evitó 'SEÑOR' u otras sustituciones no pertinentes, pues el versículo no contiene κύριος ni el tetragrámaton.
  - La puntuación reproduce el ritmo interrogativo y exhortativo del griego y del texto inglés auditado.
