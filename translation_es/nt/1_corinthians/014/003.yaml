translation:
  language: es
  text: Pero el que profetiza habla a las personas para edificación[a], aliento[b] y consolación[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'para fortalecer' o 'para edificar', en lugar de 'para edificación'.
    reason: lexical_alternative
  - marker: b
    text: '''Aliento'' traduce παράκλησις; también puede significar ''exhortación'' o, en algunos contextos, ''consuelo''.'
    reason: lexical_alternative
  - marker: c
    text: '''Consolación'' traduce παραμυθία; alternativamente, ''consuelo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ προφητεύων
  english_pob_choice: But the one who prophesies
  chosen_spanish: Pero el que profetiza
  alternatives_spanish:
  - Pero quien profetiza
  - Pero el profeta
  lexicon: SBLGNT / BDAG
  rationale: El participio articular con valor sustantivo se vierte naturalmente con 'el que' en español. 'Profetiza' preserva la amplitud del verbo sin reducirlo a 'predica' ni a 'anuncia'.
- source_word: ἀνθρώποις
  english_pob_choice: to people
  chosen_spanish: a las personas
  alternatives_spanish:
  - a la gente
  - a los hombres
  lexicon: BDAG
  rationale: El dativo indica destinatarios. 'A las personas' mantiene el valor genérico sin sesgo masculino y resulta natural en español actual.
- source_word: λαλεῖ
  english_pob_choice: speaks
  chosen_spanish: habla
  alternatives_spanish:
  - dice
  - se dirige
  lexicon: BDAG
  rationale: '''Habla'' conserva el verbo general de comunicación verbal y permite expresar con naturalidad la relación con los destinatarios.'
- source_word: οἰκοδομὴν
  english_pob_choice: for edification
  chosen_spanish: edificación
  alternatives_spanish:
  - edificar
  - edificación espiritual
  - construcción
  lexicon: BDAG
  rationale: '''Edificación'' conserva el sentido metafórico paulino de fortalecimiento espiritual. Se evita ''construcción'' por sonar demasiado material y ''edificar'' como verbo rompería la serie nominal del griego.'
- source_word: παράκλησιν
  english_pob_choice: encouragement
  chosen_spanish: exhortación
  alternatives_spanish:
  - ánimo
  - consuelo
  - aliento
  lexicon: BDAG
  rationale: En esta tríada, 'exhortación' conserva mejor la posible fuerza de llamado y estímulo de παράκλησις y distingue este término de παραμυθία. 'Ánimo' o 'consuelo' podrían solaparse demasiado con el siguiente miembro.
- source_word: παραμυθίαν
  english_pob_choice: consolation
  chosen_spanish: consolación
  alternatives_spanish:
  - consuelo
  - aliento
  lexicon: BDAG
  rationale: '''Consolación'' mantiene la diferencia con ''exhortación'' y refleja bien el matiz de alivio/consuelo de παραμυθία. Se evita repetir ''consuelo'' para no borrar la progresión de los tres sustantivos.'
theological_decisions:
- issue: Valor de προφητεύων en contexto congregacional
  english_pob_reading: Retain 'prophesies' without narrowing it to 'preaches' or expanding it to ecstatic prediction.
  chosen_spanish_reading: Conservar 'profetiza' sin estrecharlo a 'predica' ni expandirlo a 'predice'
  alternative_spanish_readings:
  - predica
  - anuncia revelaciones
  - predice
  rationale: El contexto paulino contrasta la profecía con las lenguas y define su efecto en la comunidad. 'Profetiza' preserva esa amplitud teológica sin imponer una definición denominacional o una reducción homilética.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Texto alineado con el audit trail inglés de alta concordancia; no se detectaron revisiones aplicadas en el pasaje fuente ni variantes textuales relevantes para este versículo.
  spanish_consistency_notes:
  - Se mantiene el registro bíblico moderno y digno, sin arcaísmos innecesarios.
  - Se evita 'SEÑOR' u otras sustituciones no pertinentes porque no aparece el Tetragrámaton en este versículo.
  - La serie nominal 'edificación, exhortación y consolación' conserva la estructura tricolon del griego y la diferenciación léxica documentada en el inglés POB.
