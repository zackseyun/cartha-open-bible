translation:
  language: es
  text: Incluso las cosas inanimadas que producen sonido —ya sea flauta o arpa[a]—, si no hacen distinción entre los tonos, ¿cómo se reconocerá lo que se toca con la flauta o con el arpa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ya sea flauta o lira». El griego κιθάρα designa un instrumento antiguo de cuerdas más cercano específicamente a una lira, aunque aquí se usa «arpa» por claridad lectora.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅμως
  english_pob_choice: Even
  chosen_spanish: Incluso
  alternatives_spanish:
  - Aun
  - También
  lexicon: BDAG
  rationale: 'Expresa con naturalidad el matiz de intensificación ilustrativa: no solo seres vivos, sino aun objetos inanimados sirven para el argumento.'
- source_word: τὰ ἄψυχα
  english_pob_choice: lifeless things
  chosen_spanish: las cosas inanimadas
  alternatives_spanish:
  - las cosas sin vida
  - los objetos inertes
  lexicon: BDAG
  rationale: En español, 'inanimadas' comunica bien el contraste con personas vivas y evita una dureza excesiva; mantiene el sentido de objetos no vivientes, aquí instrumentos musicales.
- source_word: φωνὴν διδόντα
  english_pob_choice: that produce sound
  chosen_spanish: que producen sonido
  alternatives_spanish:
  - que dan sonido
  - que emiten sonido
  lexicon: BDAG
  rationale: '''Producen sonido'' es claro y fiel al participio con ''dar voz/sonido'', sin perder el carácter auditivo del ejemplo.'
- source_word: εἴτε αὐλὸς εἴτε κιθάρα
  english_pob_choice: whether flute or harp
  chosen_spanish: ya sea flauta o arpa
  alternatives_spanish:
  - ya sea flauta o lira
  - ya sea flauta o cítara
  lexicon: BDAG
  rationale: '''αὐλός'' se vierte naturalmente como ''flauta'' en español; ''κιθάρα'' puede ser ''arpa'' o ''lira''. Se conserva ''arpa'' por legibilidad, con la alternativa histórica en nota.'
- source_word: ἐὰν διαστολὴν τοῖς φθόγγοις μὴ δῷ
  english_pob_choice: if they do not give a distinction in the notes
  chosen_spanish: si no dan distinción a los tonos
  alternatives_spanish:
  - si no hacen distinción entre los sonidos
  - si no producen tonos distintivos
  lexicon: BDAG
  rationale: '''Distinción'' preserva διαστολή; ''tonos'' refleja φθόγγοι de forma musical y comprensible. La construcción mantiene el sentido de que los sonidos deben diferenciarse para que haya melodía reconocible.'
- source_word: πῶς γνωσθήσεται
  english_pob_choice: how will ... be recognized
  chosen_spanish: ¿cómo se reconocerá?
  alternatives_spanish:
  - ¿cómo se sabrá?
  - ¿cómo será conocido?
  lexicon: BDAG
  rationale: '''Se reconocerá'' conserva el valor pasivo de γινώσκω y suena natural en el contexto musical: identificar una melodía requiere notas diferenciadas.'
- source_word: τὸ αὐλούμενον
  english_pob_choice: what is played on the flute
  chosen_spanish: lo que se toca con la flauta
  alternatives_spanish:
  - lo que se sopla con la flauta
  - la pieza para flauta
  lexicon: BDAG
  rationale: El participio pasivo se refiere a la pieza interpretada por la flauta; 'se toca con la flauta' evita una perífrasis pesada y mantiene la pasiva implícita.
- source_word: τὸ κιθαριζόμενον
  english_pob_choice: what is played on the harp
  chosen_spanish: lo que se toca con el arpa
  alternatives_spanish:
  - lo que se toca con la lira
  - la pieza para arpa
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la frase anterior. 'Arpa' sigue la opción de lectura funcional del POB inglés; 'lira' se reserva como alternativa documentada.
translation_notes:
  revision_awareness: La redacción sigue el pasaje tal como está atestiguado en el griego SBLGNT y toma como guía la decisión del POB inglés de usar un equivalente funcional para κιθάρα ('harp/arpa') por legibilidad, conservando en nota la alternativa históricamente más precisa ('lyre/lira'). También mantiene la pasiva de γνωσθήσεται con una construcción natural en español ('se reconocerá').
  spanish_consistency_notes:
  - Se usa 'Dios' y 'Yahvé' según el glosario general, pero este versículo no contiene referencia explícita a ninguno de los dos.
  - Se mantiene 'flauta' para αὐλός por claridad; en contextos musicales similares puede alternarse con 'pito' o 'flauta/pipa' solo si el fuente lo exigiera, lo cual aquí no ocurre.
  - '''Tonos'' se eligió para φθόγγοι por su claridad musical; no se añadió una nota separada porque la frase española ya conserva la distinción semántica suficiente.'
