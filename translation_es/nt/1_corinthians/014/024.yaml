revisions:
- from: Pero si todos profetizan, y entra algún[a] incrédulo o persona no instruida, es convencido por todos; es examinado por todos.
  to: Pero si todos profetizan, y entra algún incrédulo o persona no instruida[a], es puesto en evidencia por todos; es examinado por todos.
  rationale: Se corrige ἐλέγχεται a «es puesto en evidencia» para reflejar mejor la convicción/exposición moral del griego en un español natural. Se mueve la nota al término correspondiente, ἰδιώτης, y se sustituye «forastero» por «extraño», que reproduce mejor la alternativa contextual auditada sin introducir un matiz geográfico.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:14:04Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura condicional, la repetición de «por todos» y la distinción entre ἄπιστος e ἰδιώτης. «Profetizan», «incrédulo» y «persona no instruida» corresponden bien al griego y al rastro de auditoría inglés. Sin embargo, «es convencido» para ἐλέγχεται no preserva con suficiente claridad la fuerza de convicción/exposición moral del verbo; en español suena algo débil o ambiguo. Además, la nota al pie usa «forastero», que no coincide con la alternativa auditada «outsider» en este contexto e introduce un matiz geográfico/social menos adecuado que «extraño» o «persona ajena» al grupo.
  spanish_quality_summary: 'El español es claro y legible, pero «algún[a] incrédulo» está mal anclado: la nota no corresponde a «algún», sino a la alternativa de ἰδιώτης. También «algún incrédulo o persona no instruida» es mejorable a «algún incrédulo o alguna persona no instruida» para paralelismo, aunque no es obligatorio. El cambio principal necesario es léxico y de anclaje de nota.'
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Se mantiene correctamente «profetizan». La decisión sobre ἰδιώτης debe conservar la lectura principal «persona no instruida» y una nota con alternativa como «extraño», no «forastero».
  issues:
  - severity: medium
    issue: «es convencido» debilita ἐλέγχεται
    rationale: ἐλέγχεται en este contexto expresa quedar expuesto y bajo convicción; «es convencido» en español puede sonar a persuasión intelectual o a voz poco natural. «queda convencido» mejora algo, pero «es puesto en evidencia» o «queda convicto» preservan mejor la fuerza; para registro bíblico legible, «es puesto en evidencia» funciona bien.
  - severity: medium
    issue: Marcador de nota mal colocado
    rationale: La nota corresponde a ἰδιώτης («persona no instruida» / «outsider»), pero el marcador [a] está pegado a «algún». Debe anclarse en «persona no instruida[a]» o equivalente.
  - severity: low
    issue: «forastero» no es la mejor alternativa para ἰδιώτης
    rationale: La alternativa auditada es «outsider», entendido como alguien ajeno al grupo o no iniciado. «Forastero» sugiere más bien alguien de otra localidad. «Extraño» o «persona ajena al grupo» reflejan mejor el matiz contextual.
  revised_spanish_text: Pero si todos profetizan, y entra algún incrédulo o persona no instruida[a], es puesto en evidencia por todos; es examinado por todos.
  revised_footnotes:
  - marker: a
    text: O «extraño». El término griego puede referirse a alguien que no está informado, no ha sido iniciado o no forma parte del grupo que habla.
    reason: alternative_reading
  revision_rationale: Se corrige ἐλέγχεται a «es puesto en evidencia» para reflejar mejor la convicción/exposición moral del griego en un español natural. Se mueve la nota al término correspondiente, ἰδιώτης, y se sustituye «forastero» por «extraño», que reproduce mejor la alternativa contextual auditada sin introducir un matiz geográfico.
