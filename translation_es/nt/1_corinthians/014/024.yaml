translation:
  language: es
  text: Pero si todos profetizan, y entra algún incrédulo o persona no instruida[a], es puesto en evidencia por todos; es examinado por todos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «extraño». El término griego puede referirse a alguien que no está informado, no ha sido iniciado o no forma parte del grupo que habla.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos los presentes
  - todos ellos
  lexicon: BDAG
  rationale: Se mantiene el cuantificador inclusivo y natural en español, sin especificar más de lo que el contexto requiere.
- source_word: προφητεύωσιν
  english_pob_choice: prophesy
  chosen_spanish: profetizan
  alternatives_spanish:
  - hablan proféticamente
  lexicon: BDAG
  rationale: «Profetizan» conserva la categoría paulina ya establecida en el argumento de 1 Corintios 14 y evita reducirla a mera elocución inspirada.
- source_word: ἄπιστος
  english_pob_choice: unbeliever
  chosen_spanish: incrédulo
  alternatives_spanish:
  - no creyente
  - incrédulo
  lexicon: BDAG
  rationale: En este contexto la idea es la de quien no cree; «incrédulo» es natural en español bíblico moderno y mantiene la fuerza del término sin cargarlo de matices ajenos.
- source_word: ἰδιώτης
  english_pob_choice: uninstructed person
  chosen_spanish: persona no instruida
  alternatives_spanish:
  - forastero
  - persona sin instrucción
  - laico
  lexicon: BDAG
  rationale: La expresión apunta a alguien sin comprensión o formación respecto de lo que ocurre en la asamblea. «Persona no instruida» preserva ese foco semántico sin decidir que sea necesariamente un extraño externo. La alternativa tradicional «forastero» se conserva implícitamente como posibilidad de lectura.
- source_word: ἐλέγχεται
  english_pob_choice: is convicted
  chosen_spanish: es convencido
  alternatives_spanish:
  - es reprendido
  - es expuesto
  - queda convencido
  lexicon: BDAG
  rationale: En español, «es convencido» comunica mejor la idea de quedar moral e interiormente persuadido o confrontado por lo oído, y evita una connotación jurídica demasiado fuerte que «condenado/convicto» podría sugerir.
- source_word: ἀνακρίνεται
  english_pob_choice: is examined
  chosen_spanish: es examinado
  alternatives_spanish:
  - es escrutado
  - es interrogado
  - es juzgado
  lexicon: BDAG
  rationale: «Es examinado» reproduce el sentido de evaluación o escrutinio sin convertirlo en condena final. Mantiene el paralelismo con la primera cláusula y la repetición retórica de «por todos».
- source_word: ὑπὸ πάντων
  english_pob_choice: by all
  chosen_spanish: por todos
  alternatives_spanish:
  - por todos ellos
  - por toda la congregación
  lexicon: BDAG
  rationale: La frase se traduce de forma breve y directa, conservando la repetición enfática del griego.
- source_word: δέ
  english_pob_choice: But / and
  chosen_spanish: Pero / y
  alternatives_spanish:
  - Ahora bien
  lexicon: BDAG
  rationale: El primer δέ se vierte como «Pero» para marcar contraste; el segundo queda en una coordinación natural con «y» dentro de la misma oración condicional.
- source_word: τις
  english_pob_choice: some
  chosen_spanish: algún
  alternatives_spanish:
  - alguien
  - cierto
  lexicon: BDAG
  rationale: «Algún» expresa bien la indefinición antepuesto a «incrédulo o persona no instruida» y suena natural en español contemporáneo.
theological_decisions:
- issue: Sentido de ἰδιώτης en la asamblea
  english_pob_reading: Rendered as "uninstructed person" rather than "outsider."
  chosen_spanish_reading: «persona no instruida» en el texto principal, con la alternativa «forastero/extraño» reconocida como posibilidad de lectura.
  alternative_spanish_readings:
  - forastero
  - extraño
  - laico
  rationale: El contexto inmediato se centra en el efecto de la profecía sobre quien carece de comprensión de la práctica congregacional. La redacción principal no decide innecesariamente que la persona esté fuera del grupo, pero deja abierta la posibilidad de una lectura más externa donde corresponda.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'El borrador sigue el criterio POB ya asentado en inglés: mantener «prophesy» como categoría técnica paulina, traducir ἄπιστος como «incrédulo», y ἰδιώτης como una persona sin instrucción relevante más que como simple «extraño». No se introducen cambios textuales ni se apoya en variantes no documentadas.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de dos cláusulas pasivas con «es convencido» / «es examinado» y la repetición de «por todos» para reproducir el énfasis del griego.
  - «Persona no instruida» evita el anacronismo de categorías eclesiales modernas y se ajusta al matiz contextual del término.
  - La nota a conserva una alternativa léxica real sin desplazar el sentido principal del texto.
  - 'La puntuación sigue el flujo condicional del original: prótasis con «Pero si...», seguido de la acción resultante.'
