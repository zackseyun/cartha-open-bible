translation:
  language: es
  text: Así que las lenguas son como señal[a], no para los que creen, sino para los incrédulos; pero la profecía no es para los incrédulos, sino para los que creen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «idiomas». El término griego puede denotar lenguas o idiomas, pero en 1 Corintios 12–14 «lenguas» conserva la terminología establecida de Pablo sin decidir una interpretación debatida. «Señal» también puede entenderse, según algunos intérpretes, como una señal de juicio a la luz de la cita previa de Isaías 28:11–12.
    reason: lexical_alternative_and_cross_reference
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Marca la conclusión inferida del argumento previo. «Así que» transmite con naturalidad la relación lógica sin volver la frase pesada o excesivamente formal.
- source_word: γλῶσσαι
  english_pob_choice: tongues
  chosen_spanish: lenguas
  alternatives_spanish:
  - hablas
  - idiomas
  lexicon: BDAG
  rationale: En español, «lenguas» conserva el término técnico tradicional del pasaje y mantiene la ambigüedad controlada del contexto de 1 Corintios 12–14, sin decidir si se trata de idiomas o de habla extática.
- source_word: εἰς σημεῖόν
  english_pob_choice: for a sign
  chosen_spanish: por señal
  alternatives_spanish:
  - como señal
  - para señal
  lexicon: BDAG
  rationale: La construcción griega expresa finalidad o resultado. «Por señal» es breve y fiel al valor relacional de εἰς, aunque en español también puede decirse «como señal»; se prefirió una formulación más compacta y bíblica en estilo.
- source_word: τοῖς πιστεύουσιν
  english_pob_choice: to those who believe
  chosen_spanish: para los que creen
  alternatives_spanish:
  - para los creyentes
  - a los que creen
  lexicon: BDAG
  rationale: El participio sustantivado se vierte de manera verbal para conservar el dinamismo de la expresión griega. «Los que creen» evita un sustantivo eclesial más fijo que podría estrechar innecesariamente el sentido.
- source_word: τοῖς ἀπίστοις
  english_pob_choice: to unbelievers
  chosen_spanish: para los incrédulos
  alternatives_spanish:
  - para los que no creen
  - para los no creyentes
  lexicon: BDAG
  rationale: «Incrédulos» reproduce el contraste semántico con «los que creen» y es una equivalencia natural en español bíblico. Mantiene el carácter relacional/comunitario del término sin explicarlo más de lo que el griego exige.
- source_word: προφητεία
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - habla profética
  - mensaje profético
  lexicon: BDAG
  rationale: «Profecía» es la traducción directa y estable del término en este capítulo. Evita expandir el concepto con glosas que el texto no añade.
- source_word: δὲ
  english_pob_choice: while
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - mientras que
  lexicon: BDAG
  rationale: Aquí δέ introduce un contraste claro con la cláusula anterior. «Pero» expresa bien la oposición sin forzar una subordinación temporal que no está en el griego.
theological_decisions:
- issue: Sentido de σημεῖον respecto de las lenguas y los incrédulos
  english_pob_reading: Rendered neutrally as 'a sign' rather than specifying 'positive sign' or 'sign of judgment.'
  chosen_spanish_reading: Traducido neutramente como «por señal», sin añadir si se trata de señal de confirmación o de juicio.
  alternative_spanish_readings:
  - como señal de juicio
  - como señal confirmatoria
  rationale: El texto griego solo dice que las lenguas son «para/por señal»; no define la valoración teológica de esa señal. La traducción española conserva esa tensión y no resuelve la discusión interpretativa causada por el contexto inmediato y la cita previa de Isaías.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
- issue: Alcance de γλῶσσαι en el contexto carismático
  english_pob_reading: Rendered as 'tongues' without specifying 'foreign languages' or 'ecstatic utterances.'
  chosen_spanish_reading: «Lenguas» sin explicitar «idiomas extranjeros» ni «habla extática».
  alternative_spanish_readings:
  - idiomas
  - hablas extáticas
  rationale: El contexto de 1 Corintios 12–14 usa γλῶσσαι como término técnico y discutido. «Lenguas» conserva esa terminología y deja abierta la cuestión fenomenológica, tal como hace el texto griego.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: Basado en el texto griego SBLGNT y en el audit trail inglés de la POB. La revisión más reciente indicó acuerdo alto y no requirió cambios sustanciales; la presente versión mantiene esas decisiones, adaptándolas a un español natural y fiel al contraste del versículo.
  spanish_consistency_notes:
  - Se mantuvo «lenguas» como término técnico del pasaje, coherente con el uso de la serie 1 Corintios 12–14.
  - Se tradujo πιστεύουσιν con una perífrasis verbal («los que creen») para conservar el sentido participial.
  - Se evitó sustituir «incrédulos» por fórmulas más largas que diluyan el contraste directo con «los que creen».
  - Se preservó la oposición retórica entre las dos cláusulas mediante «pero», en línea con el valor contrastivo de δέ.
