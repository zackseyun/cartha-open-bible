translation:
  language: es
  text: Ahora quiero que todos ustedes hablen en lenguas, pero aún más que profeticen. El que profetiza es mayor que el que habla en lenguas, a menos que interprete[a], para que la iglesia reciba edificación[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "a menos que alguien interprete". El verbo griego singular puede referirse al mismo que habla en lenguas o, en sentido más amplio según el contexto, a que otra persona provea la interpretación.'
    reason: alternative_reading
  - marker: b
    text: '"Edificación" significa el fortalecimiento o la construcción espiritual de la iglesia reunida.'
    reason: lexical_alternative
lexical_decisions:
- source_word: θέλω
  english_pob_choice: I want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quisiera
  lexicon: BDAG
  rationale: Expresa la voluntad o deseo personal de Pablo con naturalidad en español moderno y conserva la directez del original.
- source_word: πάντας ὑμᾶς
  english_pob_choice: all of you
  chosen_spanish: todos ustedes
  alternatives_spanish:
  - todos vosotros
  - cada uno de ustedes
  lexicon: BDAG
  rationale: Reproduce la totalidad y el carácter plural de la exhortación de forma natural para el español latinoamericano.
- source_word: λαλεῖν γλώσσαις
  english_pob_choice: to speak in tongues
  chosen_spanish: hablen en lenguas
  alternatives_spanish:
  - hablen con lenguas
  - hablen en otras lenguas
  lexicon: BDAG
  rationale: En 1 Corintios 12–14, γλώσσαις se entiende como el fenómeno carismático de hablar en lenguas; 'en lenguas' mantiene la forma habitual en español bíblico sin perder el sentido técnico del pasaje.
- source_word: μᾶλλον δὲ
  english_pob_choice: but even more
  chosen_spanish: pero aún más
  alternatives_spanish:
  - pero más bien
  - pero sobre todo
  lexicon: BDAG
  rationale: Conserva el contraste con preferencia, no una negación absoluta, y suena natural en español.
- source_word: ἵνα προφητεύητε
  english_pob_choice: that you would prophesy
  chosen_spanish: que profeticen
  alternatives_spanish:
  - que ustedes profeticen
  - para que profeticen
  lexicon: BDAG
  rationale: Después de θέλω, ἵνα con subjuntivo expresa el contenido deseado. En español, la forma breve 'que profeticen' comunica bien la preferencia de Pablo sin sobrecargar la sintaxis.
- source_word: μείζων
  english_pob_choice: greater
  chosen_spanish: mayor
  alternatives_spanish:
  - más importante
  - superior
  lexicon: BDAG
  rationale: '''Mayor'' conserva el comparativo y deja abierta la base de la comparación; el contexto la define funcionalmente como mayor utilidad para la edificación congregacional.'
- source_word: ὁ προφητεύων
  english_pob_choice: the one who prophesies
  chosen_spanish: el que profetiza
  alternatives_spanish:
  - la persona que profetiza
  - quien profetiza
  lexicon: BDAG
  rationale: La construcción sustantivada del participio se expresa con naturalidad en español mediante 'el que profetiza', manteniendo el paralelismo con la frase siguiente.
- source_word: ὁ λαλῶν γλώσσαις
  english_pob_choice: the one who speaks in tongues
  chosen_spanish: el que habla en lenguas
  alternatives_spanish:
  - el que habla con lenguas
  - el que habla en otras lenguas
  lexicon: BDAG
  rationale: Sigue el paralelismo del griego y usa 'habla en lenguas' como equivalente idiomático claro en español.
- source_word: ἐκτὸς εἰ μὴ
  english_pob_choice: unless
  chosen_spanish: a menos que
  alternatives_spanish:
  - excepto que
  - salvo que
  lexicon: BDAG
  rationale: Es la manera natural de expresar la excepción condicional en español.
- source_word: διερμηνεύῃ
  english_pob_choice: he interprets
  chosen_spanish: interprete
  alternatives_spanish:
  - interpreta
  - haga interpretación
  lexicon: BDAG
  rationale: El verbo singular puede referirse al mismo hablante en lenguas o, según el contexto más amplio, a que haya interpretación provista; 'interprete' mantiene esa ambigüedad sin forzar el referente.
- source_word: ἡ ἐκκλησία
  english_pob_choice: the church
  chosen_spanish: la iglesia
  alternatives_spanish:
  - la congregación
  - la asamblea
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία designa a la comunidad cristiana reunida; 'iglesia' es el equivalente natural en español y mantiene la referencia al cuerpo congregado.
- source_word: οἰκοδομὴν λάβῃ
  english_pob_choice: may receive edification
  chosen_spanish: reciba edificación
  alternatives_spanish:
  - sea edificada
  - reciba edificación espiritual
  lexicon: BDAG
  rationale: '''Edificación'' conserva la imagen de construcción del sustantivo οἰκοδομή y refleja el beneficio congregacional indicado por el propósito final.'
theological_decisions:
- issue: Superioridad relativa de la profecía sobre las lenguas
  english_pob_reading: Paul says the one who prophesies is 'greater' in the sense of greater usefulness for congregational edification, not greater intrinsic spiritual status.
  chosen_spanish_reading: Pablo presenta a la profecía como 'mayor' en sentido funcional, es decir, más provechosa para la edificación de la iglesia, no como una afirmación de superioridad espiritual intrínseca.
  alternative_spanish_readings:
  - mayor en rango o santidad
  - mejor delante de Dios
  rationale: El propósito final del versículo define la comparación. La traducción mantiene 'mayor' sin resolverla doctrinalmente, y la nota explica el alcance funcional que el contexto exige.
  doctrine_reference: Preservar la tensión teológica sin importarle al texto una jerarquía que no expresa explícitamente.
- issue: Referente de διερμηνεύῃ
  english_pob_reading: The interpreter is most naturally the tongue-speaker himself ('unless he interprets').
  chosen_spanish_reading: El verbo singular 'interprete' puede referirse al mismo que habla en lenguas, aunque el contexto también admite que la interpretación sea provista por otra persona.
  alternative_spanish_readings:
  - a menos que alguien interprete
  - a menos que haya interpretación
  rationale: La forma verbal singular no obliga a un nuevo sujeto explícito. Mantener 'interprete' conserva la posibilidad que el audit trail inglés documenta sin cerrar la ambigüedad del pasaje.
  doctrine_reference: Preservar la tensión textual y contextual en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no hacía falta ningún cambio; por eso este borrador sigue de cerca el texto fuente y el audit trail inglés, manteniendo tanto la comparación funcional entre profecía y lenguas como la ambigüedad del verbo 'interpretar'.
  spanish_consistency_notes:
  - Se mantuvo 'iglesia' para ἐκκλησία por su uso paulino estable, sin ocultar que aquí se refiere a la asamblea reunida.
  - Se eligió 'mayor' para μείζων para preservar el comparativo sin sobreinterpretarlo.
  - Se usó 'lenguas' como término técnico coherente con el pasaje y con el español bíblico contemporáneo.
  - Se evitó 'SEÑOR' u otras sustituciones no presentes en el texto, ya que aquí no aparecen términos divinos equivalentes que requieran ese tratamiento.
