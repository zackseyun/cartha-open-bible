translation:
  language: es
  text: Porque tú, ciertamente, das bien las gracias, pero el otro no es edificado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σὺ
  english_pob_choice: you
  chosen_spanish: tú
  alternatives_spanish:
  - usted
  - tú mismo
  lexicon: BDAG
  rationale: El pronombre de segunda persona singular conserva la dirección personal del reproche/exhortación. En español, 'tú' comunica singularidad con naturalidad en este contexto.
- source_word: μὲν γὰρ
  english_pob_choice: for ... indeed
  chosen_spanish: porque ... en verdad
  alternatives_spanish:
  - pues ... en verdad
  - porque ... ciertamente
  - ya que ... en verdad
  lexicon: BDAG
  rationale: '''γάρ'' aporta razón explicativa y ''μέν'' introduce el primer miembro del contraste con ''ἀλλά''. ''Porque ... en verdad'' mantiene ambos valores sin sonar rígido en español.'
- source_word: καλῶς
  english_pob_choice: well
  chosen_spanish: bien
  alternatives_spanish:
  - correctamente
  - de manera adecuada
  - apropiadamente
  lexicon: BDAG
  rationale: '''Bien'' es el equivalente más natural y conserva el juicio positivo sobre la acción de dar gracias.'
- source_word: εὐχαριστεῖς
  english_pob_choice: give thanks
  chosen_spanish: das gracias
  alternatives_spanish:
  - agradeces
  - ofreces gracias
  - estás dando gracias
  lexicon: BDAG
  rationale: El verbo se refiere a dirigir acción de gracias; 'das gracias' es idiomático en español y conserva el sentido litúrgico sin imponer un calco mecánico.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  - aunque
  lexicon: BDAG
  rationale: Conjunción adversativa simple para introducir el contraste principal.
- source_word: ὁ ἕτερος
  english_pob_choice: the other person
  chosen_spanish: el otro
  alternatives_spanish:
  - la otra persona
  - el otro participante
  - el otro individuo
  lexicon: BDAG
  rationale: ἕτερος señala a 'el otro' en la interacción. En español, el artículo sustantivado 'el otro' es natural y no añade rasgos no presentes en el griego.
- source_word: οἰκοδομεῖται
  english_pob_choice: is not built up
  chosen_spanish: es edificado
  alternatives_spanish:
  - es edificado
  - es fortalecido
  - es edificado espiritualmente
  lexicon: BDAG
  rationale: El pasivo de οἰκοδομέω mantiene la metáfora de edificación. Aquí se conserva la forma 'es edificado' para respetar la imagen verbal y el paralelo con la alternativa inglesa 'edified'.
theological_decisions:
- issue: Metáfora paulina de edificación en contexto congregacional
  english_pob_reading: is not built up
  chosen_spanish_reading: no es edificado
  alternative_spanish_readings:
  - no es edificado
  - no queda edificado
  - no es fortalecido
  rationale: Se preserva la metáfora de construcción/edificación que Pablo usa para el bien espiritual de la comunidad. 'No es edificado' mantiene el paralelo con el texto fuente y evita reducir el concepto a una explicación doctrinal más estrecha.
  doctrine_reference: Translation philosophy §5; §6
translation_notes:
  revision_awareness: Se corrigió la versión previa para que no dependa de una nota sin anclaje. En esta entrega no se incluyen notas al pie porque el español elegido puede expresar el mismo sentido principal sin introducir una alternativa marcada en el texto.
  spanish_consistency_notes:
  - Se mantiene 'edificado' para respetar la metáfora paulina y la alternativa lexical documentada en el audit trail.
  - Se usa español directo y readable sin sustituir la lógica del contraste 'μέν ... ἀλλά'.
  - No se introduce 'SEÑOR', 'Cristo' ni otra terminología no presente en el versículo.
