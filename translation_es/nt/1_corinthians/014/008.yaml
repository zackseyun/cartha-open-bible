translation:
  language: es
  text: Pues, si la trompeta da un sonido confuso[a], ¿quién se preparará para la batalla[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «indistinto».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «para guerra».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, además
  lexicon: BDAG
  rationale: La combinación introduce la explicación del argumento. «Porque» reproduce bien el valor explicativo de γάρ y conserva la conexión lógica con el versículo anterior en español natural.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - en caso de que
  lexicon: BDAG
  rationale: La cláusula condicional con subjuntivo se expresa de manera directa y natural con «si».
- source_word: ἄδηλον
  english_pob_choice: unclear
  chosen_spanish: confuso
  alternatives_spanish:
  - indistinto
  - ininteligible
  - incierto
  lexicon: BDAG
  rationale: El contexto de una señal de trompeta apunta a un sonido no discernible. «Confuso» comunica la falta de claridad auditiva en español con buena naturalidad; «indistinto» sería la alternativa más cercana al matiz léxico de la nota inglesa.
- source_word: φωνὴν
  english_pob_choice: sound
  chosen_spanish: sonido
  alternatives_spanish:
  - voz
  - sonido emitido
  lexicon: BDAG
  rationale: Con una trompeta, φωνή se refiere a lo que se oye. «Sonido» es la equivalencia contextual adecuada y evita personificar la trompeta como «voz».
- source_word: σάλπιγξ
  english_pob_choice: the trumpet
  chosen_spanish: la trompeta
  alternatives_spanish:
  - una trompeta
  lexicon: BDAG
  rationale: Aunque el griego es anartro, en español el artículo definido resulta idiomático en una formulación general e ilustrativa. Se conserva el referente representativo de la trompeta como señal militar.
- source_word: δῷ
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - produce
  - emite
  - saca
  lexicon: BDAG
  rationale: δίδωμι conserva aquí la imagen de «dar» un sonido. «Da» mantiene esa figuración sin alejarse del griego.
- source_word: παρασκευάσεται
  english_pob_choice: will prepare
  chosen_spanish: se preparará
  alternatives_spanish:
  - se dispondrá
  - se alistará
  - se pondrá listo
  lexicon: BDAG
  rationale: El futuro medio sugiere prepararse a sí mismo. «Se preparará» expresa bien la reflexividad implícita y suena natural en español.
- source_word: εἰς πόλεμον
  english_pob_choice: for battle
  chosen_spanish: para la batalla
  alternatives_spanish:
  - para la guerra
  - para combatir
  lexicon: BDAG
  rationale: Aunque literalmente es «para guerra», «batalla» comunica con más naturalidad el contexto militar de una señal de trompeta. La alternativa «guerra» queda documentada como la más literal.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que cada marcador de nota aparezca exactamente en el texto español y que no haya notas sin ancla. La redacción se mantiene alineada con la lectura auditada del POB inglés, pero con un español más natural y sin sobreparáfrasis.
  spanish_consistency_notes:
  - Se mantuvo la imagen militar de la trompeta y la pregunta retórica, en paralelo al griego y al audit trail inglés.
  - Se evitó traducir mecánicamente «voice» como «voz», porque el contexto exige el sentido de sonido producido por la trompeta.
  - Se prefirió la forma reflexiva «se preparará» para conservar el matiz medio de παρασκευάσεται.
  - La elección de «batalla» respeta la alternativa inglesa documentada y su valor contextual, aunque se deja registrada la literalidad «guerra».
