translation:
  language: es
  text: Pero si no hay intérprete[a], guarde silencio en la iglesia, y hable a sí mismo y a Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en la asamblea» o «en la congregación».
    reason: lexical_alternative
lexical_decisions:
- source_word: διερμηνευτής
  english_pob_choice: interpreter
  chosen_spanish: intérprete
  alternatives_spanish:
  - traductor
  lexicon: BDAG
  rationale: En este contexto eclesial, el término designa a quien hace inteligible una lengua para los demás. «Intérprete» es el equivalente natural y preciso en español; «traductor» es posible, pero suena menos inmediato para una situación oral en la asamblea.
- source_word: σιγάτω
  english_pob_choice: he must keep silent
  chosen_spanish: guarde silencio
  alternatives_spanish:
  - permanezca callado
  - debe callar
  lexicon: BDAG
  rationale: El imperativo de tercera persona pide una acción directa. «Guarde silencio» preserva la fuerza normativa sin sonar tan rígido o arcaico como otras opciones.
- source_word: ἐν ἐκκλησίᾳ
  english_pob_choice: in the church
  chosen_spanish: en la iglesia
  alternatives_spanish:
  - en la asamblea
  - en la congregación
  lexicon: BDAG
  rationale: En 1 Corintios 14 el escenario es la reunión cristiana. «Iglesia» es la forma más natural en español y mantiene la referencia al cuerpo reunido; las otras alternativas siguen siendo válidas como matiz más literal o más institucional.
- source_word: ἑαυτῷ
  english_pob_choice: to himself
  chosen_spanish: para sí
  alternatives_spanish:
  - para sí mismo
  - privadamente
  lexicon: BDAG
  rationale: El dativo reflexivo indica que la palabra no se dirige públicamente a la congregación. «Para sí» es breve, natural y conserva la idea de speech no dirigido al grupo.
- source_word: λαλείτω
  english_pob_choice: speak
  chosen_spanish: hable
  alternatives_spanish:
  - siga hablando
  - diga
  lexicon: BDAG
  rationale: El imperativo continúa la instrucción sobre el habla. «Hable» es claro, sobrio y suficientemente neutral para el tono del pasaje.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: para Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: El dativo expresa dirección del habla. «Para Dios» mantiene la idea de orientación Godward y funciona bien junto a «para sí»; «a Dios» sería también posible, pero menos paralelo en la cadencia del verso.
theological_decisions:
- issue: Alcance del mandato de silencio en el culto congregacional
  english_pob_reading: The command restricts public speech in the gathered church when no interpreter is present, not all forms of private or God-directed speech.
  chosen_spanish_reading: El mandato restringe el habla pública en la reunión de la iglesia cuando no hay intérprete, no toda forma de habla privada o dirigida a Dios.
  alternative_spanish_readings:
  - Debe cesar todo hablar por completo
  - Puede seguir hablando audiblemente de modo aún dirigido a la congregación
  rationale: La oposición entre «guarde silencio en la iglesia» y «hable para sí y para Dios» muestra una limitación del discurso público, no una prohibición absoluta de toda voz. La redacción española conserva esa tensión sin resolverla con una lectura doctrinal particular.
  doctrine_reference: Preservar la tensión teológica en lugar de cerrarla.
translation_notes:
  revision_awareness: El pasaje coincide plenamente con el texto fuente y con el audit trail inglés; no hay revisiones aplicadas en la última pasada, y la versión española conserva la misma decisión interpretativa básica sin introducir aclaraciones ajenas al griego.
  spanish_consistency_notes:
  - Se mantiene «intérprete» para διερμηνευτής, en coherencia con el valor funcional del término.
  - «Iglesia» traduce ἐκκλησία como reunión cristiana, aunque se reconoce la alternativa «asamblea» en nota.
  - «Para sí y para Dios» conserva el contraste del original entre habla privada y dirección a Dios, sin expandir el sentido.
  - Se evita «Cristo» o cualquier terminología no presente en el versículo.
  - No se usan mayúsculas reverenciales no requeridas por el texto fuente.
