lexical_decisions:
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo ello
  lexicon: BDAG
  rationale: El neutro plural abarca de manera general lo que ha venido tratando Pablo; en español, «todo» transmite mejor esa amplitud sin sonar forzado. En este contexto, «todo se haga» conserva la fuerza global de la instrucción.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - y
  - Ahora bien
  lexicon: BDAG
  rationale: Marca transición resumidora y leve contraste respecto de lo anterior. «Pero» refleja bien ese giro discursivo en español natural.
- source_word: εὐσχημόνως
  english_pob_choice: decently
  chosen_spanish: decentemente
  alternatives_spanish:
  - apropiadamente
  - con corrección
  - como conviene
  lexicon: BDAG
  rationale: El adverbio griego denota lo que es apropiado, decoroso o conveniente. «Decentemente» mantiene ese campo semántico y es idiomático en una exhortación comunitaria.
- source_word: κατὰ τάξιν
  english_pob_choice: in order
  chosen_spanish: en orden
  alternatives_spanish:
  - ordenadamente
  - según un orden
  - con arreglo
  lexicon: BDAG
  rationale: La expresión señala conformidad con un arreglo o disposición correcta. «En orden» es la equivalencia más natural y fiel para la fórmula establecida.
- source_word: γινέσθω
  english_pob_choice: let everything be done
  chosen_spanish: se haga
  alternatives_spanish:
  - tenga lugar
  - ocurra
  - sea hecho
  lexicon: BDAG
  rationale: El imperativo de tercera persona funciona como mandato general. En español, la pasiva refleja «se haga» expresa con naturalidad la idea de que todo lo mandado por el contexto debe realizarse.
theological_decisions:
- issue: Alcance de la norma paulina en el culto congregacional
  english_pob_reading: A general directive for orderly and fitting conduct in the assembly without specifying a particular denominational liturgical model.
  chosen_spanish_reading: Una directiva general para que todo en la asamblea se realice con decoro y orden, sin imponer un modelo litúrgico denominacional concreto.
  alternative_spanish_readings:
  - Una regla litúrgica estricta que fija una forma de culto
  - Un principio amplio aplicable a toda práctica eclesial
  rationale: El versículo resume la discusión inmediata sobre el habla congregacional y el orden en la reunión. La traducción preserva esa generalidad y evita añadir una estructura eclesial específica que el griego no exige.
  doctrine_reference: Preservar la tensión textual sin resolverla en favor de una tradición litúrgica particular; no importar distintivos denominacionales no explicitados por el pasaje.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente redacción mantiene la lectura establecida y corrige únicamente la anotación de nota al pie para que no quede sin anclaje.
  spanish_consistency_notes:
  - Se mantiene «Pero» para δὲ como transición discursiva suave.
  - Se conserva una formulación breve y sobria, adecuada para un cierre exhortativo.
  - No se introduce vocabulario eclesiástico adicional que estreche indebidamente el alcance del mandato.
