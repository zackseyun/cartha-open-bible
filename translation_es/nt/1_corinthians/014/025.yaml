review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego y del rastro de auditoría en inglés: «los secretos de su corazón», «adorará a Dios» y «entre ustedes» con nota alternativa para «en ustedes» están bien alineados. La estructura lógica también se conserva. Sin embargo, «cayendo sobre su rostro» suena poco natural en español y no refleja de la manera más clara la expresión idiomática de postración «πεσὼν ἐπὶ πρόσωπον».'
  spanish_quality_summary: El español es generalmente claro y digno, pero hay una mejora importante de naturalidad y legibilidad en la cláusula de postración. «Cayendo rostro en tierra» o «cayendo sobre su rostro» resulta menos idiomático para lectores generales; «postrándose rostro en tierra» o «cayendo con el rostro en tierra» comunica mejor la imagen sin perder fidelidad. El resto del versículo está bien logrado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» para θεός es correcto. No hay términos sensibles como Yahvé/Mesías/esclavo implicados aquí. La decisión principal «entre ustedes» con nota «en ustedes» respeta la rationale teológica documentada.
  issues:
  - severity: medium
    issue: 'Expresión poco natural en español: «cayendo sobre su rostro»'
    rationale: Aunque formalmente cercana al griego, en español suena calcada y menos inteligible que una formulación idiomática de postración. La frase griega describe una postura corporal convencional; en español bíblico moderno se comunica mejor con «postrándose rostro en tierra» o «cayendo con el rostro en tierra».
  revised_spanish_text: los secretos de su corazón se hacen evidentes, y así, postrándose rostro en tierra, adorará a Dios, declarando que Dios verdaderamente está entre ustedes.[a]
  revised_footnotes:
  - marker: a
    text: 'O: «Dios verdaderamente está en ustedes».'
    reason: alternative_reading
  revision_rationale: Se ajusta únicamente la expresión de postración para lograr un español más natural y claro sin perder el contenido ni la imagen del griego. Se conserva la nota alternativa sobre «entre ustedes / en ustedes» porque está bien fundamentada en la auditoría inglesa.
