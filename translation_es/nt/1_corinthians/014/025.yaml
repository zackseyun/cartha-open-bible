translation:
  language: es
  text: los secretos de su corazón se hacen evidentes, y así, postrándose rostro en tierra, adorará a Dios, declarando que Dios verdaderamente está entre ustedes.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Dios verdaderamente está en ustedes».'
    reason: alternative_reading
lexical_decisions:
- source_word: τὰ κρυπτὰ
  english_pob_choice: the secrets
  chosen_spanish: los secretos
  alternatives_spanish:
  - las cosas ocultas
  - las cosas escondidas
  lexicon: BDAG
  rationale: El neutro plural sustantivado expresa aquello que está oculto en el interior de la persona. «Los secretos» conserva bien ese sentido y suena natural en español, más que una formulación más literal como «las cosas ocultas».
- source_word: καρδίας
  english_pob_choice: heart
  chosen_spanish: corazón
  alternatives_spanish:
  - interior
  - yo interior
  lexicon: BDAG
  rationale: En español bíblico «corazón» preserva el término antropológico para el centro de pensamientos, deseos y motivos. «Interior» interpretaría el término en vez de traducirlo de forma directa.
- source_word: φανερὰ γίνεται
  english_pob_choice: become evident
  chosen_spanish: se hacen evidentes
  alternatives_spanish:
  - se manifiestan
  - son revelados
  lexicon: BDAG
  rationale: La expresión indica que lo oculto pasa a quedar a la vista. «Se hacen evidentes» transmite bien el valor resultativo de γίνεται y el matiz de quedar claro sin volverlo demasiado técnico.
- source_word: οὕτως
  english_pob_choice: and so
  chosen_spanish: y así
  alternatives_spanish:
  - de este modo
  - así
  lexicon: BDAG
  rationale: Conecta la exposición del corazón con la respuesta subsiguiente. «Y así» es natural y conserva la fuerza inferencial o consecutiva del adverbio.
- source_word: πεσὼν ἐπὶ πρόσωπον
  english_pob_choice: falling on his face
  chosen_spanish: cayendo sobre su rostro
  alternatives_spanish:
  - cayendo de rostro
  - postrándose rostro en tierra
  lexicon: BDAG
  rationale: La construcción describe una postura de postración. «Cayendo sobre su rostro» mantiene la imagen corporal explícita del griego y suena digna en español; «postrándose» sería más interpretativo.
- source_word: προσκυνήσει
  english_pob_choice: he will worship
  chosen_spanish: adorará
  alternatives_spanish:
  - adorará postrado
  - rendirà adoración
  lexicon: BDAG
  rationale: En este contexto el verbo indica adoración dirigida a Dios, no solo reverencia física. «Adorará» comunica el acto religioso con claridad; la postura ya quedó expresada en la cláusula anterior.
- source_word: τῷ θεῷ
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - Dios
  lexicon: BDAG
  rationale: En español, con un verbo de adoración, la preposición «a» es idiomática y transparente. Mantiene el sentido de objeto de la adoración sin alterar el referente divino.
- source_word: ἀπαγγέλλων
  english_pob_choice: declaring
  chosen_spanish: declarando
  alternatives_spanish:
  - anunciando
  - reportando
  lexicon: BDAG
  rationale: El participio expresa la confesión que acompaña la reacción del oyente. «Declarando» conserva el tono solemne sin sobrecargar el verbo como una proclamación formal.
- source_word: Ὄντως
  english_pob_choice: truly
  chosen_spanish: verdaderamente
  alternatives_spanish:
  - realmente
  - ciertamente
  - de veras
  lexicon: BDAG
  rationale: El adverbio enfatiza la autenticidad de la conclusión. «Verdaderamente» refleja bien ese énfasis y encaja con el registro bíblico en español contemporáneo.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  lexicon: BDAG
  rationale: En el contexto de la asamblea, la presencia de Dios se reconoce en medio del grupo reunido. «Entre ustedes» preserva el sentido corporativo que el inglés POB documenta como lectura principal, sin borrar la alternativa posible.
theological_decisions:
- issue: Sentido de ἐν ὑμῖν en la confesión final
  english_pob_reading: among you
  chosen_spanish_reading: entre ustedes
  alternative_spanish_readings:
  - en ustedes
  rationale: El contexto inmediato trata de la reunión de la iglesia y del reconocimiento del oyente de que Dios está presente en medio de la comunidad ordenada. «Entre ustedes» comunica ese sentido colectivo. Se conserva «en ustedes» como alternativa porque la preposición griega puede admitir esa lectura y la POB inglesa la documenta.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y no introdujo cambios; se mantiene la decisión principal de traducir ἐν ὑμῖν como lectura corporativa («entre ustedes») y conservar la alternativa individual en nota.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se usa «SEÑOR» como sustituto.
  - Se conserva el registro sobrio y eclesial sin recurrir a un calco rígido.
  - «Corazón» se usa como término antropológico bíblico estándar, coherente con el proyecto.
  - La nota al pie marca la tensión entre una lectura comunitaria y una posible lectura locativa más interna.
