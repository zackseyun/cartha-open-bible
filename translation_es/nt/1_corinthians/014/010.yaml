lexical_decisions:
- source_word: τοσαῦτα
  english_pob_choice: so many
  chosen_spanish: tantos
  alternatives_spanish:
  - tan numerosos
  - una cantidad tan grande de
  lexicon: BDAG
  rationale: τοσαῦτα expresa multitud de manera cuantitativa. «Tantos» conserva esa idea de número abundante en un español natural y directo.
- source_word: εἰ τύχοι
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizás
  lexicon: BDAG
  rationale: El giro atenúa la afirmación con tono incidental o hipotético. «Quizá» refleja bien esa cautela sin añadir explicación interpretativa.
- source_word: γένη
  english_pob_choice: kinds
  chosen_spanish: géneros
  alternatives_spanish:
  - clases
  - tipos
  - especies
  lexicon: BDAG
  rationale: γένη señala categorías o clases. «Géneros» mantiene el valor taxonómico y suena natural en español en este contexto, sin forzar una lectura técnica indebida.
- source_word: φωνῶν
  english_pob_choice: languages / sounds
  chosen_spanish: voces
  alternatives_spanish:
  - lenguas
  - sonidos
  - hablas
  lexicon: BDAG
  rationale: φωνή puede significar voz, sonido o lengua. Dado el contexto de variedades de expresión comunicativa, «voces» preserva la amplitud semántica sin estrechar prematuramente el término a «lenguas».
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en el mundo habitable
  - en la creación
  lexicon: BDAG
  rationale: κόσμος aquí se refiere al mundo habitado o al ámbito del mundo. «En el mundo» es la equivalencia más clara y sobria.
- source_word: οὐδὲν ἄφωνον
  english_pob_choice: none is without meaning
  chosen_spanish: ninguno es sin sentido
  alternatives_spanish:
  - nada es sin voz
  - ninguno carece de voz
  - nada es mudo
  lexicon: BDAG
  rationale: ἄφωνος es literalmente «sin voz» o «sin sonido», pero el contexto favorece la idea de que ninguna voz/expresión resulta carente de significado. «Sin sentido» conserva esa lectura interpretativa sin perder la tensión lexical del término.
theological_decisions:
- issue: 'Sentido de ἄφωνον: literalidad acústica frente a significación comunicativa'
  english_pob_reading: none is without meaning
  chosen_spanish_reading: ninguno es sin sentido
  alternative_spanish_readings:
  - ninguno es sin voz
  - nada es sin sonido
  - ninguno carece de voz
  rationale: 'La revisión inglesa optó por «without meaning» para reflejar el punto retórico de Pablo: incluso las distintas voces/lenguajes comunican algo. En español, «sin sentido» comunica esa idea con naturalidad, mientras deja visible que la raíz griega literalmente apunta a la ausencia de voz/sonido.'
  doctrine_reference: 1 Corintios 14:10; relación entre dones de lenguas, inteligibilidad y edificación en 1 Corintios 14.
translation_notes:
  revision_awareness: La versión inglesa revisada pasó de una lectura más literal de «sounds»/«without sound» a una interpretación contextual de «languages»/«without meaning». La presente redacción española sigue la decisión contextual de sentido, pero evita reducir φωνῶν a «lenguas» de manera demasiado cerrada; por eso conserva «voces» en el texto principal y explicita en nota la alternativa más literal. Así se mantiene la tensión entre el valor acústico de la forma griega y su función comunicativa en el argumento.
  spanish_consistency_notes:
  - Se usó «Yahvé» por norma general del proyecto no aplicable aquí, ya que el versículo no contiene el nombre divino.
  - Se evitó «lenguas» en el cuerpo principal para no decidir de forma excesiva entre idioma, voz o sonido; la ambigüedad está documentada en la nota.
  - «Sin sentido» sigue la lectura contextual de la revisión inglesa, pero no borra el matiz literal de ἄφωνον, preservado en la nota.
