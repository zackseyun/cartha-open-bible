translation:
  language: es
  text: Hay quizá muchas clases de lenguas en el mundo[a], y ninguna carece de significado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Hay quizá muchas clases de lenguas en el mundo, y ninguna carece de significado»; también puede entenderse más literalmente la última frase como «ninguna es sin voz».'
