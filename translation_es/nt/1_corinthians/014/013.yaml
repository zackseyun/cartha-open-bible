translation:
  language: es
  text: Por tanto, el que habla en lengua[a] ore para que interprete[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en un idioma». El griego dice «en lengua», la expresión usual en este capítulo para el habla que requiere interpretación.
    reason: lexical_alternative
  - marker: b
    text: El verbo está en singular masculino representativo en griego; el sentido es genérico, no restringido a varones.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: La conjunción inferencial introduce una conclusión lógica a partir del argumento anterior. «Por tanto» conserva con naturalidad ese valor conclusivo en español y suena adecuado para registro bíblico moderno sin volverse arcaico.
- source_word: ὁ λαλῶν
  english_pob_choice: the one who speaks
  chosen_spanish: el que habla
  alternatives_spanish:
  - quien habla
  - el hablante
  lexicon: BDAG
  rationale: El participio articular presente funciona como sustantivo genérico singular. «El que habla» mantiene el singular representativo y el matiz verbal continuo, sin forzar una pluralización que borre la forma griega.
- source_word: γλώσσῃ
  english_pob_choice: in a tongue
  chosen_spanish: en lengua
  alternatives_spanish:
  - en una lengua
  - en lenguas
  - en un idioma
  lexicon: BDAG
  rationale: La forma griega es singular y, en este capítulo, remite al habla carismática que requiere interpretación. «Lengua» preserva el término tradicional del pasaje y evita resolver prematuramente la cuestión con «idioma»; en el texto español se ancla con nota la alternativa semántica.
- source_word: προσευχέσθω
  english_pob_choice: should pray
  chosen_spanish: debe orar
  alternatives_spanish:
  - debería orar
  - que ore
  - ore
  lexicon: BDAG
  rationale: El imperativo de tercera persona expresa exhortación normativa. «Debe orar» comunica bien esa fuerza en español contemporáneo y conserva el carácter directivo del texto.
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - que
  lexicon: BDAG
  rationale: 'Aquí introduce finalidad: la oración tiene como propósito la interpretación. «Para que» expresa con claridad ese matiz final en español natural.'
- source_word: διερμηνεύῃ
  english_pob_choice: he may interpret
  chosen_spanish: interprete
  alternatives_spanish:
  - lo traduzca
  - lo explique
  lexicon: BDAG
  rationale: El verbo significa hacer comprensible lo dicho. «Interprete» es el equivalente más directo y mantiene la conexión terminológica con la discusión paulina sobre la interpretación de lenguas; «traduzca» sería más estrecho y «explique» demasiado amplio.
theological_decisions:
- issue: Masculino singular genérico en la forma verbal griega
  english_pob_reading: he may interpret
  chosen_spanish_reading: interprete
  alternative_spanish_readings:
  - que interpreten
  - interpreten
  rationale: El griego usa un singular masculino representativo, pero en español el subjuntivo «interprete» puede funcionar de forma genérica sin marcar sexo. Así se preserva la referencia individual sin imponer una lectura masculina restrictiva ni pluralizar indebidamente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Sentido de γλώσσῃ en 1 Corintios 12–14
  english_pob_reading: tongue
  chosen_spanish_reading: lengua
  alternative_spanish_readings:
  - idioma
  - lenguas
  rationale: El POB inglés retiene «tongue» para conservar el enlace literario y teológico dentro del capítulo. En español, «lengua» es el equivalente más natural y también mantiene esa conexión; la nota preserva la alternativa «idioma» sin diluir el término técnico del pasaje.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego SBLGNT y el criterio auditado de la POB inglesa. No se aplicaron revisiones adicionales respecto del contexto fuente, y se preserva la tensión léxica de γλώσσῃ con una nota explicativa en español.
  spanish_consistency_notes:
  - Se usa «lengua» para γλῶσσα conforme al valor técnico del pasaje, evitando «SEÑOR» u otras sustituciones irrelevantes.
  - Se mantiene un registro bíblico moderno y claro, con «Por tanto» y «debe orar» como equivalentes idiomáticos naturales.
  - El subjuntivo «interprete» conserva la referencia genérica del singular griego sin necesidad de marcar género en el español de superficie.
