translation:
  language: es
  text: 'Ahora bien, estas cosas, hermanos[a], las he aplicado a mí mismo y a Apolos por causa de ustedes, para que en nosotros aprendan esto: «No más allá de lo que está escrito», para que ninguno de ustedes se envanezca en favor de uno contra otro.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego usa la forma masculina plural, que puede dirigirse a un grupo mixto.
    reason: cultural_note
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural griego retoma el desarrollo anterior como un conjunto de asuntos; «estas cosas» conserva mejor esa amplitud anafórica que un singular resumido.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  lexicon: BDAG
  rationale: Se mantiene la forma masculina vocativa del griego, con un español eclesial natural y fiel; la posible inclusión mixta queda explicada en nota si se desea.
- source_word: μετεσχημάτισα
  english_pob_choice: have applied
  chosen_spanish: he aplicado
  alternatives_spanish:
  - he transferido figuradamente
  - he adaptado de manera figurada
  - he usado como ilustración
  lexicon: BDAG
  rationale: El verbo comunica una aplicación retórica de lo dicho a Pablo y Apolos; «he aplicado» transmite bien ese traslado figurado sin recargar la frase.
- source_word: εἰς ἐμαυτὸν καὶ ⸀Ἀπολλῶν
  english_pob_choice: to myself and Apollos
  chosen_spanish: a mí mismo y a Apolos
  alternatives_spanish:
  - con referencia a mí mismo y a Apolos
  - para mí mismo y para Apolos
  lexicon: BDAG
  rationale: La preposición con el verbo indica el ámbito de la aplicación figurada; «a mí mismo y a Apolos» resulta natural en español y mantiene el referente personal.
- source_word: δι’ ὑμᾶς
  english_pob_choice: for your sake
  chosen_spanish: por causa de ustedes
  alternatives_spanish:
  - para ustedes
  - a causa de ustedes
  lexicon: BDAG
  rationale: διά con acusativo expresa finalidad/beneficio en este contexto pastoral; «por causa de ustedes» conserva la motivación explícita sin sonoridad forzada.
- source_word: ἵνα ἐν ἡμῖν μάθητε
  english_pob_choice: so that in us you may learn
  chosen_spanish: para que en nosotros aprendan
  alternatives_spanish:
  - para que aprendan de nosotros
  - para que, en nosotros, aprendan
  lexicon: BDAG
  rationale: 'Se preserva la cláusula de propósito y el matiz de esfera/ejemplo: Pablo y Apolos son el marco en el que la comunidad aprende.'
- source_word: τό· Μὴ ὑπὲρ ⸀ἃ ⸀γέγραπται
  english_pob_choice: 'this: “Not beyond what is written,”'
  chosen_spanish: 'esto: «No más allá de lo que está escrito»'
  alternatives_spanish:
  - 'esto: «No más allá de lo escrito»'
  - 'esto: «No sobrepasen lo que está escrito»'
  lexicon: BDAG
  rationale: El griego es elíptico y la frase puede sonar como lema; «No más allá de lo que está escrito» conserva el contenido admonitorio sin añadir un verbo ajeno al texto, y mantiene la referencia escrita de forma clara en español.
- source_word: γέγραπται
  english_pob_choice: is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: El perfecto pasivo funciona como fórmula escritural; en español «está escrito» es la equivalencia idiomática más natural y reconocible.
- source_word: φυσιοῦσθε
  english_pob_choice: be puffed up
  chosen_spanish: se enorgullezcan
  alternatives_spanish:
  - se inflen
  - se envanezcan
  - se llenen de orgullo
  lexicon: BDAG
  rationale: Aunque el verbo griego conserva la imagen de hincharse, en español «enorgullecerse» comunica con claridad el sentido de autoexaltación en el conflicto de facciones; se evita un calco que sonaría extraño en este contexto.
- source_word: ὑπὲρ τοῦ ἑνὸς
  english_pob_choice: in favor of one
  chosen_spanish: en favor de uno
  alternatives_spanish:
  - por uno
  - a favor de uno
  lexicon: BDAG
  rationale: La expresión apunta a una preferencia partidista; «en favor de uno» conserva la relación de apoyo sin perder la dirección del argumento.
- source_word: κατὰ τοῦ ἑτέρου
  english_pob_choice: against another
  chosen_spanish: contra otro
  alternatives_spanish:
  - contra el otro
  - en contra de otro
  lexicon: BDAG
  rationale: La oposición entre bandos se expresa de forma directa y natural con «contra otro», manteniendo el contraste del griego.
theological_decisions:
- issue: Cláusula elíptica τό· Μὴ ὑπὲρ ⸀ἃ ⸀γέγραπται
  english_pob_reading: 'Render as the lesson Paul wants them to learn: ''Not beyond what is written.'''
  chosen_spanish_reading: «No más allá de lo que está escrito»
  alternative_spanish_readings:
  - «No más allá de lo escrito»
  - «No sobrepasen lo que está escrito»
  - dejarlo como un lema sin verbo
  rationale: El texto griego es comprimido y admite debate; la traducción elegida sigue de cerca la forma literal sin introducir un imperativo explícito que no aparece en el griego, pero deja la fuerza admonitiva legible para el lector español.
  doctrine_reference: Principio paulino de limitación por la Escritura; no implica por sí mismo una doctrina sistemática adicional.
- issue: Sentido de φυσιοῦσθε en el conflicto comunitario
  english_pob_reading: be puffed up
  chosen_spanish_reading: se enorgullezcan
  alternative_spanish_readings:
  - se inflen
  - se envanezcan
  - se llenen de orgullo
  rationale: La metáfora de la hinchazón es importante en Pablo, pero aquí el objetivo principal es la exhortación comunitaria. «Se enorgullezcan» comunica bien la soberbia facciosa sin oscurecer el sentido ni volver la frase torpe en español.
  doctrine_reference: Ética paulina contra la arrogancia y la división en la iglesia (cf. 1 Corintios 1–4).
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión del audit trail en inglés que ajustó la cita elíptica de una formulación imperativa a una más literal: «Not beyond what is written». Por eso el español evita añadir un verbo ausente en el griego y conserva la brevedad aforística de la cláusula.'
  spanish_consistency_notes:
  - Se usa «Apolos» como forma española usual del nombre propio griego Ἀπολλῶς.
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el nombre divino.
  - Se conserva la distinción entre «hermanos» como vocativo y la posible referencia mixta en nota.
  - La puntuación con comillas angulares y dos puntos refleja bien el segmento citado dentro de la frase paulina.
