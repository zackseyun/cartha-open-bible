base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/006.yaml
  text: 'Now these things[a], brothers, I have applied to myself and Apollos for your sake[b], so that in us you may learn this: “Not beyond what is written,” so that none of you may be puffed up in favor of one against another.'
  footnotes:
  - marker: a
    text: Or 'brothers and sisters'; Greek 'brothers' can address a mixed group.
    reason: cultural_note
  - marker: b
    text: 'Greek is elliptical: literally, ''the “not beyond what is written.”'' It may reflect a slogan or maxim.'
    reason: lexical_alternative
