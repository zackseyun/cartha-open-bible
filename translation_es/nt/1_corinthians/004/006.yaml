  spanish_quality_summary: 'El español es claro y eclesialmente natural. «Por causa de ustedes» y «para que en nosotros aprendan» son legibles. La principal corrección necesaria es de legibilidad editorial: mover la nota inclusiva al vocativo «hermanos[a]». También conviene mejorar la consistencia léxica con Pablo usando «se envanezca[n]» en lugar de «se enorgullezca[n]», porque suena natural en español bíblico moderno y preserva mejor el matiz de arrogancia inflada.'
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los nombres y términos relevantes están bien. La única alineación léxica a ajustar es φυσιοῦσθε: «se envanezca» conserva mejor la imagen y la consistencia contextual que «se enorgullezca».'
