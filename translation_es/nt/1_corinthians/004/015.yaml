    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer correspondence and consistency with the Greek phrase ἐν Χριστῷ / ἐν Χριστῷ Ἰησοῦ. Kept ''became your father'' as a natural rendering of ἐγέννησα in context. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pues aunque tengáis incontables[a] tutores[b] en el Mesías[d], no tengáis muchos padres; pues en el Mesías[d] Jesús, por medio del evangelio, yo os engendré[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diez mil»; μυρίους suele funcionar idiomáticamente para una cantidad muy grande.
    reason: lexical_alternative
  - marker: b
    text: O «guardianes» o «guías»; el griego se refiere a un supervisor o acompañante de un niño, más que a un maestro de aula en sentido moderno.
    reason: cultural_note
  - marker: c
    text: O «yo os hice mis hijos» o «yo fui vuestro padre»; el verbo es metafórico y alude al papel de Pablo al traerlos a la fe por medio del evangelio.
    reason: lexical_alternative
  - marker: d
    text: O «en Cristo» y «en Cristo Jesús»; Χριστός se traduce aquí como «Mesías».
    reason: alternative_reading
lexical_decisions:
- source_word: μυρίους
  english_pob_choice: countless
  chosen_spanish: incontables
  alternatives_spanish:
  - diez mil
  - miríadas
  lexicon: BDAG
  rationale: El griego puede funcionar idiomáticamente para una cantidad muy grande. «Incontables» conserva esa fuerza retórica en español y mantiene mejor el contraste con «no tenéis muchos padres» que una cifra literal.
- source_word: παιδαγωγοὺς
  english_pob_choice: guardians
  chosen_spanish: tutores
  alternatives_spanish:
  - guardianes
  - guías
  - disciplinarios
  lexicon: BDAG
  rationale: En el mundo grecorromano, παιδαγωγός no era principalmente un maestro de aula, sino un supervisor/acompañante responsable de la crianza y disciplina del menor. «Tutores» funciona en español como equivalente social amplio; la nota preserva la alternativa de «guardianes».
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva la decisión doctrinal del POB de traducir Χριστός como «Mesías» cuando funciona como título. «En» mantiene la expresión paulina de unión/esfera.
- source_word: πατέρας
  english_pob_choice: fathers
  chosen_spanish: padres
  alternatives_spanish:
  - padres espirituales
  lexicon: BDAG
  rationale: El parentesco metafórico debe permanecer visible en la traducción principal. «Padres» es natural en español y mantiene la tensión metafórica sin expandirla interpretativamente.
- source_word: ἐν γὰρ Χριστῷ Ἰησοῦ
  english_pob_choice: for in Messiah Jesus
  chosen_spanish: pues en el Mesías Jesús
  alternatives_spanish:
  - porque en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva la misma elección terminológica para Χριστός y el orden cercano al griego, mientras que «pues» reproduce el valor causal de γάρ con naturalidad española.
- source_word: διὰ τοῦ εὐαγγελίου
  english_pob_choice: through the gospel
  chosen_spanish: por medio del evangelio
  alternatives_spanish:
  - a través del evangelio
  - mediante el evangelio
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. «Por medio del evangelio» es claro, idiomático y preserva el papel instrumental del mensaje en el engendramiento espiritual.
- source_word: ἐγέννησα
  english_pob_choice: I became your father
  chosen_spanish: yo os engendré
  alternatives_spanish:
  - yo os hice mis hijos
  - yo fui vuestro padre
  lexicon: BDAG
  rationale: El verbo γεννάω significa literalmente engendrar/engendrar hijos, y aquí el griego conserva la metáfora paternal. «Yo os engendré» preserva más directamente esa imagen que una expansión interpretativa como «me hice vuestro padre»; el pronombre explícito ayuda a la claridad española.
theological_decisions:
- issue: Metáfora paterna de Pablo sin sobrecargarla con implicaciones eclesiásticas o sacramentales
  english_pob_reading: 'Maintain the metaphor of fatherhood as Paul''s claim to unique apostolic/evangelistic role in the Corinthians'' conversion: ''I became your father.'''
  chosen_spanish_reading: Mantener la metáfora de paternidad apostólica en «yo os engendré», entendida como la relación de Pablo con su conversión mediante el evangelio, sin introducir lenguaje denominacional adicional.
  alternative_spanish_readings:
  - yo os hice mis hijos
  - yo fui vuestro padre
  - yo os engendré espiritualmente
  rationale: El griego presenta un lenguaje paterno metafórico unido al medio del evangelio. La forma elegida conserva la fuerza del verbo y deja visible la tensión entre engendrar/fundar una relación paterna y la metáfora espiritual, evitando aclaraciones doctrinales que el texto no añade.
  doctrine_reference: Preservar la tensión teológica y la metáfora sin resolverla en exceso; fidelidad semántica con español publicable.
- issue: Selección de Χριστός como título
  english_pob_reading: '''Messiah'' in the main text rather than ''Christ'''
  chosen_spanish_reading: «Mesías» en el texto principal
  alternative_spanish_readings:
  - Cristo
  rationale: La política del POB español exige «Yahvé» para el nombre divino y, para Χριστός como título, normalmente «Mesías». Aquí la repetición de la frase refuerza la cohesión terminológica y evita perder el valor titular del griego.
  doctrine_reference: Consistencia terminológica con la política de traducción del proyecto y respeto del valor titulativo de Χριστός.
translation_notes:
  revision_awareness: El audit trail inglés pasó por una oscilación entre 'Christ' y 'Messiah' antes de restablecer 'Messiah' por política doctrinal. También mantuvo 'became your father' para ἐγέννησα, evitando una literalidad arcaica. La presente versión sigue esa decisión de fondo, pero en español opta por una forma más directamente literal ('yo os engendré') porque el verbo permite preservar mejor la metáfora paterna sin introducir una explicación externa.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός, en coherencia con la política del proyecto y con el restablecimiento final del audit trail.
  - Se usa «evangelio» como término fijo para εὐαγγέλιον.
  - Se conserva la relación causal/instrumental de διὰ τοῦ εὐαγγελίου con «por medio del evangelio».
  - La puntuación reproduce la contraposición entre muchos tutores y pocos padres.
  - El pronombre explícito «yo» refuerza la estructura enfática del griego ἐγώ ὑμᾶς ἐγέννησα.
