  glossary_alignment: 'Buena alineación con la terminología del proyecto: Χριστός -> «Mesías», Ἰησοῦς -> «Jesús», εὐαγγέλιον -> «evangelio». La elección «tutores» para παιδαγωγοὺς es defendible con nota cultural, aunque «guardianes» sería también posible. No hay conflicto doctrinal que requiera adjudicación adicional.'
