translation:
  language: es
  text: y trabajamos arduamente, trabajando con nuestras propias manos; cuando nos insultan[a], bendecimos; cuando somos perseguidos, soportamos;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuando nos vituperan» o «cuando nos ultrajan».
    reason: lexical_alternative
lexical_decisions:
- source_word: κοπιῶμεν
  english_pob_choice: we labor
  chosen_spanish: nos fatigamos
  alternatives_spanish:
  - trabajamos arduamente
  - nos esforzamos
  lexicon: BDAG
  rationale: κοπιῶμεν expresa trabajo agotador y cansancio, no solo empleo. «Nos fatigamos» conserva la idea de esfuerzo penoso y evita suavizar el verbo.
- source_word: ἐργαζόμενοι
  english_pob_choice: working
  chosen_spanish: trabajando
  alternatives_spanish:
  - laborando
  - haciendo trabajo manual
  lexicon: BDAG
  rationale: 'El participio explica cómo se desarrolla el laborar: mediante trabajo activo. «Trabajando» es natural en español y mantiene la relación inmediata con el verbo principal.'
- source_word: ταῖς ἰδίαις χερσίν
  english_pob_choice: with our own hands
  chosen_spanish: con nuestras propias manos
  alternatives_spanish:
  - con nuestras manos
  - por nuestras propias manos
  lexicon: BDAG
  rationale: La frase subraya trabajo manual autosostenido. «Nuestras propias manos» conserva el énfasis de ἰδίαις sin volver el español forzado.
- source_word: λοιδορούμενοι
  english_pob_choice: when insulted
  chosen_spanish: cuando nos insultan
  alternatives_spanish:
  - cuando nos ultrajan
  - cuando nos vituperan
  lexicon: BDAG
  rationale: El pasivo participial se expresa de forma temporal en la serie. «Insultan» transmite con claridad el sentido hostil; se evita un arcaísmo innecesario.
- source_word: εὐλογοῦμεν
  english_pob_choice: we bless
  chosen_spanish: bendecimos
  alternatives_spanish:
  - damos bendición
  - respondemos con bendición
  lexicon: BDAG
  rationale: Se mantiene el verbo bíblico central sin diluirlo en una paráfrasis. En este contexto implica responder con bendición en lugar de represalia.
- source_word: διωκόμενοι
  english_pob_choice: when persecuted
  chosen_spanish: cuando nos persiguen
  alternatives_spanish:
  - cuando somos perseguidos
  - cuando nos hostigan
  lexicon: BDAG
  rationale: Aquí el griego presenta el aspecto de ser objeto de hostilidad. «Nos persiguen» comunica de manera directa la acción adversa, y «soportamos» completa la respuesta.
- source_word: ἀνεχόμεθα
  english_pob_choice: we endure
  chosen_spanish: soportamos
  alternatives_spanish:
  - aguantamos
  - perseveramos
  lexicon: BDAG
  rationale: ἀνέχομαι significa soportar o aguantar trato hostil. «Soportamos» mantiene la sobriedad del contraste sin añadir un objeto explícito inexistente en el griego.
theological_decisions:
- issue: Respuesta ética ante el maltrato
  english_pob_reading: The verse describes apostolic conduct under abuse—blessing in response to insults and enduring persecution—without expanding it into a formal command beyond what the text states.
  chosen_spanish_reading: 'El versículo describe la conducta apostólica ante el maltrato: responder con bendición a los insultos y soportar la persecución, sin convertirlo en un mandato formulado más allá de lo que dice el texto.'
  alternative_spanish_readings:
  - Presentarlo como una exhortación general a todos los creyentes
  - Añadir una idea de paciencia pasiva más fuerte de la que expresa el griego
  rationale: La construcción del pasaje es descriptiva y antitética. La traducción conserva esa fuerza ética sin sobrecargarla con una formulación normativa adicional.
  doctrine_reference: Ética apostólica y sufrimiento cristiano
- issue: Objeto implícito en ἀνεχόμεθα
  english_pob_reading: we endure
  chosen_spanish_reading: soportamos
  alternative_spanish_readings:
  - lo soportamos
  - aguantamos eso
  rationale: El griego no expresa objeto directo; por eso el español evita añadirlo. Se mantiene la brevedad del paralelismo de la frase.
  doctrine_reference: Fidelidad al texto base
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del texto base en inglés, que eliminó el objeto explícito tras «we endure» porque el griego solo dice «soportamos». Por eso el español también queda sin objeto directo. También se tuvo en cuenta que la nota inglesa sobre λοιδορούμενοι ofrece una alternativa léxica entre insulto y vituperio; aquí se eligió «insultan» por claridad moderna.
  spanish_consistency_notes:
  - 'Se mantuvo un paralelismo verbal claro: nos fatigamos / trabajando / bendecimos / soportamos.'
  - Se evitó «Cristo» y vocabulario doctrinal no presente en el versículo.
  - Se respetó el matiz manual de «con nuestras propias manos» sin ampliarlo a ganarse la vida explícitamente.
  - La nota [a] está anclada en «nos insultan» y recoge alternativas léxicas reales del audit trail.
