review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: trabajo esforzado explicado por el participio, énfasis en ''nuestras propias manos'', y la serie de respuestas apostólicas ante insulto y persecución. Sin embargo, ''nos fatigamos'' para κοπιῶμεν suena menos natural en este contexto que una forma verbal de trabajo esforzado, y ''cuando nos persiguen'' pierde un poco la simetría pasiva de los participios griegos frente a ''cuando nos insultan''.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorarse para sonar más natural y más cercano al paralelismo del original. 'Trabajamos arduamente' evita la rareza de 'nos fatigamos' como verbo principal en este tipo de enunciado apostólico, y 'cuando somos perseguidos' armoniza mejor con 'cuando somos insultados' implícito/pasivo.
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. ''Bendecimos'' preserva bien εὐλογοῦμεν. La nota léxica para λοιδορούμενοι es adecuada. El ajuste principal es estilístico-lexical: representar κοπιῶμεν con un verbo de labor esforzada más idiomático en español.'
  issues:
  - severity: medium
    issue: κοπιῶμεν traducido como 'nos fatigamos'
    rationale: Aunque comunica cansancio, en español suena menos idiomático como equivalente principal de un verbo que denota trabajar arduamente. El contexto inmediato ya añade 'trabajando con nuestras propias manos', por lo que 'trabajamos arduamente' o 'nos esforzamos' preserva mejor el sentido de labor penosa.
  - severity: low
    issue: διωκόμενοι traducido como 'cuando nos persiguen'
    rationale: Es comprensible, pero la serie de participios pasivos se refleja con mayor naturalidad y simetría en español con 'cuando somos perseguidos', especialmente junto a la cadencia 'cuando somos insultados...; cuando somos perseguidos...'.
