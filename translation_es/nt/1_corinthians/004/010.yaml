    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for more natural rendering and consistency with the Greek expressions διὰ Χριστόν / ἐν Χριστῷ in this verse; otherwise retained the structure and sense. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Nosotros somos necios por el Mesías[a], pero ustedes son sabios en el Mesías[b]; nosotros somos débiles, pero ustedes son fuertes; ustedes son honrados[c], pero nosotros somos deshonrados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por causa del Mesías' / 'a causa del Mesías'. La frase griega διὰ Χριστόν puede expresar causa o propósito.
    reason: lexical_alternative
  - marker: b
    text: O 'en Mesías'. El griego tiene la expresión paulina frecuente ἐν Χριστῷ.
    reason: lexical_alternative
  - marker: c
    text: '''Honrados'' y ''deshonrados'' aquí probablemente se refieren al estatus público y a la vergüenza ante los demás, no solo a sentimientos internos.'
    reason: cultural_note
lexical_decisions:
- source_word: μωροὶ
  english_pob_choice: fools
  chosen_spanish: necios
  alternatives_spanish:
  - tontos
  - insensatos
  lexicon: BDAG
  rationale: En este contexto retórico irónico, 'necios' comunica mejor el contraste mordaz con la autopercepción de los corintios y evita una dureza coloquial excesiva de 'tontos'.
- source_word: διὰ Χριστόν
  english_pob_choice: for Messiah / for the sake of the Messiah
  chosen_spanish: por causa de Cristo
  alternatives_spanish:
  - por el Mesías
  - a causa de Cristo
  lexicon: BDAG
  rationale: διά con acusativo expresa razón o causa. En español, 'por causa de Cristo' conserva el valor causal y la carga de motivo/sufrimiento. Se usa 'Cristo' aquí porque el giro funciona en español como forma fija y natural en esta preposición causal, sin borrar el trasfondo titular.
- source_word: φρόνιμοι
  english_pob_choice: wise
  chosen_spanish: prudentes
  alternatives_spanish:
  - sabios
  - sensatos
  lexicon: BDAG
  rationale: Aunque 'sabios' es posible, 'prudentes' refleja mejor el matiz de sensatez práctica en el paralelo irónico con 'necios' y suena más natural en español contemporáneo.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Cristo
  alternatives_spanish:
  - en el Mesías
  - con respecto a Cristo
  lexicon: BDAG
  rationale: La locución paulina ἐν Χριστῷ es una fórmula estable; en español se conserva 'en Cristo' por su reconocimiento idiomático y porque la preposición 'en' es parte del patrón retórico del texto.
- source_word: ἀσθενεῖς
  english_pob_choice: weak
  chosen_spanish: débiles
  alternatives_spanish:
  - frágiles
  - impotentes
  lexicon: BDAG
  rationale: '''Débiles'' es el equivalente directo y mantiene el paralelismo con ''fuertes''.'
- source_word: ἰσχυροί
  english_pob_choice: strong
  chosen_spanish: fuertes
  alternatives_spanish:
  - poderosos
  - robustos
  lexicon: BDAG
  rationale: En el contraste antitético con 'débiles', 'fuertes' es la correspondencia más natural y transparente.
- source_word: ἔνδοξοι
  english_pob_choice: honored
  chosen_spanish: honrados
  alternatives_spanish:
  - gloriosos
  - estimados
  lexicon: BDAG
  rationale: En este contexto social de honor y vergüenza, 'honrados' comunica mejor el estatus público que 'gloriosos', que en español puede sonar más teológico o abstracto.
- source_word: ἄτιμοι
  english_pob_choice: dishonored
  chosen_spanish: deshonrados
  alternatives_spanish:
  - sin honor
  - despreciados
  lexicon: BDAG
  rationale: '''Deshonrados'' preserva el antónimo directo de ''honrados'' y mantiene el campo semántico de prestigio/vergüenza sin intensificarlo hasta ''despreciados''.'
- source_word: ἡμεῖς / ὑμεῖς
  english_pob_choice: we / you
  chosen_spanish: nosotros / ustedes
  alternatives_spanish:
  - nosotros / vosotros
  lexicon: BDAG
  rationale: Se conservan los pronombres explícitos porque son enfáticos en el griego y estructuran la ironía comparativa de Pablo. 'Ustedes' es el español neutral latinoamericano.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - y
  - ahora bien
  lexicon: BDAG
  rationale: '''Pero'' reproduce con claridad la fuerza adversativa repetida del verso.'
theological_decisions:
- issue: Rendering of Χριστός in two parallel phrases
  english_pob_reading: The English audit trail documented 'Messiah' as title-sensitive, but the latest revision restored 'Christ' for naturalness while preserving the same Greek referent.
  chosen_spanish_reading: 'Cristo en ambas expresiones: ''por causa de Cristo'' / ''en Cristo''.'
  alternative_spanish_readings:
  - Mesías
  - el Mesías
  rationale: En español, 'Cristo' es la forma más idiomática y reconocible en estas fórmulas paulinas. Aquí no se pretende negar el valor titular de Χριστός; más bien, se preserva la expresión estable del idioma bíblico receptor sin introducir una perífrasis que vuelva torpe el paralelismo.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah where title; Christ where name-like. This verse functions in a fixed Pauline idiom in Spanish.'
- issue: Public honor/shame contrast
  english_pob_reading: '''Honored'' and ''dishonored'' likely refer to public status and shame in the eyes of others, not merely inward feelings.'
  chosen_spanish_reading: honrados / deshonrados como contraste de estatus público y vergüenza social.
  alternative_spanish_readings:
  - gloriosos / sin gloria
  - estimados / despreciados
  rationale: La elección mantiene el campo de honor social sin espiritualizarlo ni reducirlo a un estado interior. El paralelismo con 'necios / prudentes' y 'débiles / fuertes' muestra ironía pública, no solo sentimiento personal.
  doctrine_reference: English POB cultural note on honor/shame in 1 Cor 4:10
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que prefería 'Christ' por naturalidad, pero la restauración posterior volvió a 'Messiah' por política terminológica. Para el español, se evaluó la naturalidad idiomática y la estabilidad de las fórmulas paulinas; se optó por 'Cristo' en ambas ocurrencias, sin perder la referencia titular ni el contraste retórico del verso.
  spanish_consistency_notes:
  - 'Se conserva el paralelismo sintáctico del griego: nosotros / ustedes; somos / son; pero / pero.'
  - '''Cristo'' se usa como forma estable en las locuciones paulinas del español, aun cuando el trasfondo teológico siga siendo el título mesiánico.'
  - No se añadió 'el' antes de 'Cristo' en las dos frases para mantener la concisión y la cadencia del original.
  - 'El orden final mantiene la antítesis más marcada: necios/prudentes, débiles/fuertes, honrados/deshonrados.'
