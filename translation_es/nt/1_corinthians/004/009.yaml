    issue: La nota [a] está anclada en la frase equivocada.
    rationale: La nota [a] explica ἐπιθανατίους («destinados a morir»), pero en el texto aparece después de «los últimos», que corresponde a ἐσχάτους. Esto distorsiona la evidencia léxica documentada y debe corregirse.
  - severity: medium
    issue: «Como los últimos» no expresa con la mayor naturalidad el sentido de ἐσχάτους en esta construcción.
    rationale: Aquí la idea es que Dios ha puesto a los apóstoles «en último lugar / como los últimos de todos». La formulación actual es comprensible, pero algo rígida y menos idiomática.
  - severity: low
    issue: «Para el mundo» es menos preciso que «ante el mundo» en la imagen de espectáculo público.
    rationale: El dativo de referencia/audiencia se comunica más naturalmente en español con «ante el mundo», que enfatiza la exposición pública observada por mundo, ángeles y seres humanos.
