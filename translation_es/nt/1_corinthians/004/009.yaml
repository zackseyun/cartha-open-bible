translation:
  language: es
  text: Porque me parece que Dios nos ha exhibido, a nosotros los apóstoles, en último lugar, como sentenciados a muerte[a], pues hemos llegado a ser un espectáculo[b] ante el mundo, tanto para los ángeles como para los hombres[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los destinados a morir». La expresión griega ἐπιθανατίους designa a personas destinadas a la muerte, probablemente con imagen de arena o ejecución pública.
    reason: lexical_alternative
  - marker: b
    text: O «un teatro», más literalmente; el sentido es el de un espectáculo público.
    reason: lexical_alternative
  - marker: c
    text: «Hombres» traduce ἀνθρώποις en contraste con «ángeles», es decir, seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκῶ γάρ
  english_pob_choice: For it seems to me
  chosen_spanish: Porque me parece que
  alternatives_spanish:
  - Porque creo que
  - Pues me parece que
  lexicon: BDAG
  rationale: δοκῶ expresa una valoración personal atenuada; «me parece» conserva el matiz de juicio del hablante. γάρ se vierte con «Porque» para mantener la conexión explicativa.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Sujeto nominativo claro; en español no requiere artículo para esta función, aunque el contexto podría permitirlo.
- source_word: ἡμᾶς τοὺς ἀποστόλους
  english_pob_choice: us apostles
  chosen_spanish: a nosotros, los apóstoles
  alternatives_spanish:
  - a nosotros, apóstoles
  - a nosotros, los enviados
  lexicon: BDAG
  rationale: Se preserva la fuerza appositiva del sintagma y el contraste enfático con el resto de la oración. El acusativo se expresa naturalmente con complemento directo introducido por «a».
- source_word: ἐσχάτους
  english_pob_choice: last of all
  chosen_spanish: los últimos
  alternatives_spanish:
  - los postreros
  - los últimos de todos
  lexicon: BDAG
  rationale: «Los últimos» comunica la idea de ser puestos en el rango final o más bajo. Se evita una calca demasiado pesada; el sentido de degradación queda reforzado por el contexto de condena y espectáculo.
- source_word: ἀπέδειξεν
  english_pob_choice: has displayed
  chosen_spanish: ha exhibido
  alternatives_spanish:
  - ha mostrado
  - ha presentado
  lexicon: BDAG
  rationale: «Exhibido» mantiene el matiz público y visual del verbo y encaja con la imagen siguiente de espectáculo/teatro.
- source_word: ὡς ἐπιθανατίους
  english_pob_choice: like men sentenced to death
  chosen_spanish: como sentenciados a muerte
  alternatives_spanish:
  - como condenados a muerte
  - como destinados a morir
  lexicon: BDAG
  rationale: La imagen apunta a personas designadas para la muerte; en español, «sentenciados a muerte» conserva bien la fuerza jurídica y pública de la expresión. Se omite «hombres» porque aquí no es necesario para el contraste con «ángeles» y el español ya tiene un referente masculino plural implícito en «los apóstoles».
- source_word: θέατρον ἐγενήθημεν
  english_pob_choice: we have become a spectacle
  chosen_spanish: hemos llegado a ser un espectáculo
  alternatives_spanish:
  - nos hemos vuelto un espectáculo
  - hemos sido hechos un espectáculo
  lexicon: BDAG
  rationale: Se conserva el valor metafórico de θέατρον como algo expuesto a la vista pública, evitando traducirlo literalmente por «teatro» en el cuerpo del texto. «Hemos llegado a ser» reproduce bien el cambio de estado.
- source_word: τῷ κόσμῳ
  english_pob_choice: to the world
  chosen_spanish: para el mundo
  alternatives_spanish:
  - al mundo
  - ante el mundo
  lexicon: BDAG
  rationale: El dativo funciona como referencia/ámbito del espectáculo; «para el mundo» expresa con naturalidad la idea de estar expuestos ante la vista del mundo.
- source_word: καὶ ἀγγέλοις καὶ ἀνθρώποις
  english_pob_choice: both to angels and to men
  chosen_spanish: tanto para los ángeles como para los hombres
  alternatives_spanish:
  - tanto para los ángeles como para las personas
  - tanto para los ángeles como para los seres humanos
  lexicon: BDAG
  rationale: Se mantiene la estructura doble y el contraste entre audiencia celestial y humana. «Hombres» refleja el uso tradicional de ἀνθρώποις en contraste con «ángeles», sin limitarlo a varones específicos.
theological_decisions:
- issue: Sentido de ἀγγέλοις
  english_pob_reading: angels refers to heavenly beings observing the apostles' public humiliation
  chosen_spanish_reading: ángeles como seres celestiales que observan la humillación pública de los apóstoles
  alternative_spanish_readings:
  - ángeles como mensajeros
  - ángeles en sentido general de enviados
  rationale: En la secuencia «mundo… ángeles… hombres», el sentido natural es de observadores celestiales reales. No se añade desarrollo doctrinal ajeno al texto.
  doctrine_reference: Cristología y angelología paulinas; lectura contextual de 1 Corintios 4:9
translation_notes:
  revision_awareness: La redacción sigue el acuerdo alto del texto base inglés y conserva la corrección reciente que subrayó la aposición «los apóstoles». Se mantiene la metáfora de θέατρον como «espectáculo» en el texto principal, con nota para la lectura más literal. No se introdujeron cambios doctrinales respecto del audio trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no una sustitución devocional más interpretativa.
  - Se conserva el contraste «ángeles / hombres» como en el texto auditado; no se neutraliza indebidamente.
  - La aposición «a nosotros, los apóstoles» refleja la puntuación revisada del inglés POB.
  - El registro es moderno pero reverente, evitando calcos innecesarios como «teatro» en el cuerpo principal.
