review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español capta bien el sentido general del griego: juicio personal de Pablo, Dios como sujeto, identificación appositiva de «los apóstoles», imagen de condenados expuestos públicamente, y la audiencia triple de mundo/ángeles/seres humanos. Sin embargo, hay un desajuste importante en el anclaje de la nota [a]: en el texto está puesta sobre «los últimos», pero la nota explica ἐπιθανατίους («sentenciados a muerte / destinados a morir»), no ἐσχάτους. Además, «como los últimos» suena algo menos natural que «en último lugar» o «como los últimos de todos» para ἐσχάτους en este contexto.'
  spanish_quality_summary: El español es claro y digno, pero requiere una reparación menor para corregir la colocación de la nota y mejorar la naturalidad de ἐσχάτους. «Nos ha exhibido a nosotros, los apóstoles» es comprensible, aunque algo pesado; «nos ha exhibido, a nosotros los apóstoles,» fluye mejor. «Para el mundo» es posible, pero «ante el mundo» o «al mundo» refleja mejor la idea de espectáculo expuesto a observadores. También conviene evitar que «hombres» suene masculino-específico, aunque la nota ya lo aclara.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: θεός = «Dios», ἀγγέλοις = «ángeles». El uso de «hombres» para ἀνθρώποις es defendible por el contraste con «ángeles», pero en español actual «seres humanos» suele ser más claro; si se mantiene «hombres», la nota debe seguir presente. La decisión sobre ἐπιθανατίους como «sentenciados a muerte» está bien y concuerda con la documentación inglesa.'
  issues:
