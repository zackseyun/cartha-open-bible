revisions:
- from: Porque me parece que Dios nos ha exhibido a nosotros, los apóstoles, como los últimos[a], como sentenciados a muerte, pues hemos llegado a ser un espectáculo[b] para el mundo, tanto para los ángeles como para los hombres[c].
  to: Porque me parece que Dios nos ha exhibido, a nosotros los apóstoles, en último lugar, como sentenciados a muerte[a], pues hemos llegado a ser un espectáculo[b] ante el mundo, tanto para los ángeles como para los hombres[c].
  rationale: 'Se corrige un error importante de anclaje de nota: la nota sobre ἐπιθανατίους debe ir con «sentenciados a muerte», no con «los últimos». También se ajusta ἐσχάτους a «en último lugar» para una expresión más natural y precisa en español, y se cambia «para el mundo» por «ante el mundo» para reflejar mejor la imagen de espectáculo público observado. No se requieren cambios doctrinales ni de terminología principal.'
