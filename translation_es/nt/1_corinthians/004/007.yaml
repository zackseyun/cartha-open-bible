translation:
  language: es
  text: Porque ¿quién te hace diferente?[a] ¿Y qué tienes que no recibiste? Y si lo recibiste, ¿por qué te jactas como si no lo hubieras recibido?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿quién te distingue?». El verbo griego puede significar «distingue», «diferencia» o «hace distinto».
    reason: lexical_alternative
lexical_decisions:
- source_word: τίς γάρ σε διακρίνει
  english_pob_choice: For who makes you different?
  chosen_spanish: Porque ¿quién te hace diferente?[a]
  alternatives_spanish:
  - Porque ¿quién te distingue?
  - Porque ¿quién te separa?
  lexicon: BDAG
  rationale: διακρίνω se entiende aquí en sentido transitivo con σε y en un marco de reprensión comparativa. «Te hace diferente» conserva la fuerza retórica del griego y comunica bien la idea de diferencia o distinción sin volver demasiado técnica la frase. «Porque» refleja γάρ como fundamento de lo anterior.
- source_word: τί δὲ ἔχεις
  english_pob_choice: And what do you have
  chosen_spanish: ¿Y qué tienes
  alternatives_spanish:
  - Pero ¿qué tienes?
  lexicon: BDAG
  rationale: δὲ es aquí una partícula de continuación ligera; en español, «Y» mantiene el avance interrogativo y el ritmo de la cadena de preguntas mejor que un adversativo fuerte.
- source_word: ὃ οὐκ ἔλαβες
  english_pob_choice: that you did not receive
  chosen_spanish: que no hayas recibido
  alternatives_spanish:
  - que no recibiste
  lexicon: BDAG
  rationale: El aoristo ἔλαβες presenta la recepción como un hecho; en español, el presente de subjuntivo con «haya/hayas» no es necesario aquí, pero «no hayas recibido» preserva la relación de anterioridad dentro de la pregunta retórica. La alternativa en pretérito simple también sería posible, pero la elegida suena más natural en este encadenamiento.
- source_word: εἰ δὲ καὶ ἔλαβες
  english_pob_choice: And if you did receive it
  chosen_spanish: Y si lo recibiste
  alternatives_spanish:
  - Y si en verdad lo recibiste
  - Y si también lo recibiste
  lexicon: BDAG
  rationale: καὶ con εἰ añade énfasis; en español, «si lo recibiste» comunica la concesión, y el contexto ya hace visible la implicación enfática. Se añade «lo» para referir la cosa implícita que se ha recibido, como hace la traducción inglesa.
- source_word: τί καυχᾶσαι
  english_pob_choice: why do you boast
  chosen_spanish: ¿por qué te jactas
  alternatives_spanish:
  - ¿por qué te glorías
  lexicon: BDAG
  rationale: καυχάομαι en Pablo suele expresar jactancia/boast. «Jactas» conserva mejor el matiz de autoexaltación criticada que «glorías», que en español puede sonar más positivo o litúrgico.
- source_word: ὡς μὴ λαβών
  english_pob_choice: as if you had not received it
  chosen_spanish: como si no lo hubieras recibido
  alternatives_spanish:
  - como si no lo hubieras aceptado
  lexicon: BDAG
  rationale: La frase participial expresa un modo contrario a los hechos. El pluscuamperfecto de subjuntivo «hubieras recibido» refleja bien la irrealidad y el reproche implícito; «lo» retoma el objeto no expreso.
theological_decisions:
- issue: 'Alcance de la reprensión: distinción humana, posesión y jactancia'
  english_pob_reading: The verse is rendered to stress that any distinction, possession, or status is received rather than self-originated, without specifying whether Paul means spiritual gifts alone or all advantages more broadly.
  chosen_spanish_reading: La traducción resalta que toda diferencia, posesión o condición proviene de una recepción y no de una autosuficiencia humana, sin estrechar el sentido solo a dones espirituales ni ampliarlo más allá de lo que dice el texto.
  alternative_spanish_readings:
  - Restringirlo únicamente a dones espirituales o ministeriales
  - Entenderlo como una afirmación general sobre toda capacidad, estatus o bendición
  rationale: El contexto inmediato trata de orgullo, bandos y ministerio, pero la formulación de Pablo es amplia. La redacción española conserva esa amplitud y la reprensión al orgullo sin imponer una limitación doctrinal ajena al versículo.
  doctrine_reference: 1 Corintios 4:7; cf. Romanos 11:35-36
translation_notes:
  revision_awareness: 'Se revisó el equilibrio entre fidelidad y naturalidad: se mantuvo el paralelismo retórico de tres preguntas, se conservó la fuerza de διακρίνει como diferencia/distinción y se eligió un español idiomático sin suavizar la reprensión.'
  spanish_consistency_notes:
  - Se usa «jactas» para καυχᾶσαι, en coherencia con el valor paulino de la autoexaltación criticada.
  - Se conserva «recibido» para ἔλαβες/λαβών, manteniendo el tema de recepción como no originada en el sujeto.
  - Se prefirió «Y» en las preguntas encadenadas para reflejar la progresión retórica del griego.
