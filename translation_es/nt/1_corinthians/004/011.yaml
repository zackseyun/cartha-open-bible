translation:
  language: es
  text: Hasta esta misma hora[a] tenemos hambre y sed, y estamos mal vestidos[b], y nos golpean, y no tenemos un lugar fijo donde vivir[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hasta esta hora presente»; la expresión griega subraya la duración continua hasta el presente.
    reason: lexical_alternative
  - marker: b
    text: O «desnudos»; el griego puede indicar estar insuficientemente vestido, no necesariamente completamente sin ropa.
    reason: lexical_alternative
  - marker: c
    text: O «sin un hogar fijo» o «errantes»; el griego expresa inestabilidad y falta de residencia estable.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄχρι τῆς ἄρτι ὥρας
  english_pob_choice: Up to this present hour
  chosen_spanish: Hasta esta hora presente
  alternatives_spanish:
  - Hasta este mismo momento
  - Hasta esta misma hora
  lexicon: BDAG
  rationale: La expresión temporal recalca duración continua “hasta” el presente; «esta hora presente» conserva ἄρτι/ὥρα sin sonar rígido en español y refleja bien el matiz de actualidad inmediata.
- source_word: πεινῶμεν
  english_pob_choice: we are hungry
  chosen_spanish: tenemos hambre
  alternatives_spanish:
  - estamos hambrientos
  - pasamos hambre
  lexicon: BDAG
  rationale: En español, la construcción natural para el estado es «tener hambre». Mantiene el presente indicativo de condición continua sin intensificar innecesariamente el verbo.
- source_word: διψῶμεν
  english_pob_choice: thirsty
  chosen_spanish: sed
  alternatives_spanish:
  - estamos sedientos
  - tenemos sed
  lexicon: BDAG
  rationale: Como va coordinado con «tenemos hambre», «tenemos sed» sería plenamente natural; aquí se eligió la elipsis «hambre y sed» para reproducir la coordinación compacta del griego y evitar repetición pesada.
- source_word: γυμνιτεύομεν
  english_pob_choice: poorly clothed
  chosen_spanish: estamos mal vestidos
  alternatives_spanish:
  - estamos pobremente vestidos
  - estamos desnudos
  - andamos mal vestidos
  lexicon: BDAG
  rationale: El griego puede indicar falta de ropa suficiente, no necesariamente desnudez total. «Mal vestidos» preserva esa tensión léxica y evita sobretraducir con «desnudos».
- source_word: κολαφιζόμεθα
  english_pob_choice: beaten
  chosen_spanish: somos golpeados
  alternatives_spanish:
  - somos azotados
  - somos apaleados
  - recibimos golpes
  lexicon: BDAG
  rationale: La voz pasiva presente expresa abuso físico reiterado. «Somos golpeados» es directo y suficientemente amplio; no restringe el tipo de agresión más de lo que permite el griego.
- source_word: ἀστατοῦμεν
  english_pob_choice: homeless
  chosen_spanish: no tenemos un lugar fijo donde vivir
  alternatives_spanish:
  - no tenemos morada fija
  - andamos sin hogar
  - somos errantes
  lexicon: BDAG
  rationale: El verbo comunica falta de estabilidad y de residencia asentada. La formulación elegida es clara en español y conserva el sentido sin cargarlo con una categoría social moderna más específica que el griego.
- source_word: καὶ ... καὶ ... καὶ ...
  english_pob_choice: and ... and ... and ...
  chosen_spanish: y ... y ... y ...
  alternatives_spanish:
  - coma enumerativa sin repetición de «y»
  lexicon: Greek grammar
  rationale: La repetición de καί acumula las privaciones con ritmo insistente. Mantener «y» repetido conserva la fuerza retórica de la enumeración.
theological_decisions:
- issue: Naturaleza del catálogo de sufrimientos de Pablo
  english_pob_reading: A literal catalog of apostolic deprivation and abuse
  chosen_spanish_reading: Un catálogo literal de privación y maltrato apostólicos
  alternative_spanish_readings:
  - Descripción principalmente retórica o hiperbólica
  - Resumen estilizado de dificultades ministeriales
  rationale: Los presentes indicativos y la serie de verbos concretos favorecen leer el versículo como descripción directa de sufrimientos reales. La traducción no suaviza ni amplifica el cuadro.
  doctrine_reference: Sufrimiento apostólico / contexto histórico de 1 Corintios 4
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la revisión más reciente; no hubo revisiones aplicadas. La presente propuesta sigue de cerca esa lectura y conserva las mismas decisiones léxicas principales, adaptándolas al español con equivalentes naturales y manteniendo las ambigüedades documentadas (especialmente en γυμνιτεύομεν y ἀστατοῦμεν).
  spanish_consistency_notes:
  - Se evita «SEÑOR» porque este versículo no contiene el nombre divino ni κύριος.
  - Se conserva una enumeración con repetición de «y» para reflejar el polisíndeton griego.
  - «Mal vestidos» mantiene la ambigüedad entre escasa ropa y desnudez total, como en la nota inglesa.
  - La formulación «no tenemos un lugar fijo donde vivir» traduce el sentido de inestabilidad con español natural, sin introducir terminología eclesiástica.
