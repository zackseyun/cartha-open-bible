revisions:
- from: Por lo tanto[a], no juzguen nada antes del tiempo, hasta que venga el Señor, quien también sacará a la luz lo oculto de las tinieblas y pondrá de manifiesto las intenciones[b] de los corazones. Entonces la alabanza de cada uno vendrá de parte de Dios[c].
  to: Por lo tanto[a], no juzguen nada antes del tiempo, hasta que venga el Señor, quien también sacará a la luz lo oculto de las tinieblas y pondrá de manifiesto los propósitos[b] de los corazones[c]. Entonces la alabanza llegará a cada uno de parte de Dios.
  rationale: Se ajusta el texto principal a la decisión léxica auditada para βουλάς ('propósitos'), se corrige ἑκάστῳ con una formulación distributiva natural en español ('llegará a cada uno'), y se repara el error de idioma en la nota [a].
