review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: prohibición de juzgar antes del tiempo, venida futura del Señor, revelación de lo oculto y reconocimiento final proveniente de Dios. Sin embargo, hay dos desajustes relevantes con la evidencia y la auditoría inglesa: (1) βουλάς fue fijado en el POB inglés como ''purposes'' y el español principal eligió ''intenciones'', dejando ''propósitos'' solo en nota; conviene alinear el texto principal con ''propósitos''. (2) ὁ ἔπαινος γενήσεται ἑκάστῳ se refleja mejor como ''la alabanza llegará/será dada a cada uno'' que como ''la alabanza de cada uno'', ya que el griego no expresa posesión sino distribución personal.'
  spanish_quality_summary: El español es claro y digno, con buen registro bíblico. 'Por lo tanto', 'sacará a la luz' y 'pondrá de manifiesto' son naturales. No obstante, 'la alabanza de cada uno vendrá' suena menos idiomático y puede sugerir que cada uno produce su propia alabanza; 'la alabanza llegará a cada uno' o equivalente evita esa ambigüedad. Además, una nota contiene código mixto ('μπορεί') impropio de un texto español final.
  glossary_alignment: 'La terminología principal está mayormente alineada: κύριος -> ''Señor'', θεοῦ -> ''Dios''. No hay conflicto con defaults del proyecto. El punto léxico principal es βουλάς, donde la racionalidad auditada favorece ''propósitos'' como opción principal más amplia que ''intenciones'' o ''motivos''.'
  issues:
  - severity: medium
    issue: βουλάς traducido como 'intenciones' en el texto principal
    rationale: La auditoría inglesa eligió 'purposes' por ser más amplia y menos psicologizante. 'Intenciones' es posible, pero estrecha el matiz; mejor usar 'propósitos' en el texto y conservar alternativas en nota.
  - severity: high
    issue: '''la alabanza de cada uno vendrá'' no refleja bien ἑκάστῳ'
    rationale: El griego expresa que la alabanza llegará/será dada a cada persona, no la 'alabanza de' cada uno en sentido posesivo. La formulación actual puede inducir una lectura equivocada.
  - severity: low
    issue: La nota [a] contiene 'μπορεί' en griego moderno dentro de un texto español
    rationale: Es un error de idioma/edición; debe decir 'puede'.
