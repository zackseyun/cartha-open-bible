translation:
  language: es
  text: Por lo tanto[a], no juzguen nada antes del tiempo, hasta que venga el Señor, quien también sacará a la luz lo oculto de las tinieblas y pondrá de manifiesto los propósitos[b] de los corazones[c]. Entonces la alabanza llegará a cada uno de parte de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'antes del tiempo debido'; la expresión griega puede denotar actuar antes del momento apropiado o fijado.
    reason: lexical_alternative
  - marker: b
    text: O 'las intenciones de los corazones' o 'los motivos de los corazones'.
    reason: lexical_alternative
  - marker: c
    text: Es decir, desde la evaluación final del Señor cuando venga y ponga al descubierto lo oculto.
    reason: cross_reference
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por lo tanto
  alternatives_spanish:
  - Así que
  - De modo que
  lexicon: BDAG
  rationale: Expresa la conclusión inferida del contexto previo con un conector natural en español y conserva el valor lógico de ὥστε.
- source_word: μὴ πρὸ καιροῦ
  english_pob_choice: before the time
  chosen_spanish: antes del tiempo
  alternatives_spanish:
  - antes del momento debido
  - antes del tiempo señalado
  lexicon: BDAG
  rationale: Mantiene la referencia temporal sin añadir explícitamente 'señalado' o 'debido', ya que el griego dice πρὸ καιροῦ de forma más general.
- source_word: τι κρίνετε
  english_pob_choice: judge anything
  chosen_spanish: juzguen nada
  alternatives_spanish:
  - juzguen algo
  - emitan juicio sobre nada
  lexicon: BDAG
  rationale: La prohibición con τι abarca cualquier objeto de juicio; 'nada' comunica bien el alcance general en español sin forzar una lectura técnica.
- source_word: ἕως ἂν ἔλθῃ ὁ κύριος
  english_pob_choice: until the Lord comes
  chosen_spanish: hasta que venga el Señor
  alternatives_spanish:
  - hasta que llegue el Señor
  - hasta la venida del Señor
  lexicon: BDAG
  rationale: '''Venga'' es natural y conserva el matiz de la venida escatológica; ''Señor'' traduce κύριος según el valor titular cristológico del contexto.'
- source_word: φωτίσει
  english_pob_choice: will also bring to light
  chosen_spanish: sacará a la luz
  alternatives_spanish:
  - pondrá en luz
  - iluminará
  lexicon: BDAG
  rationale: Reproduce el sentido metafórico de revelación, no de iluminación física. 'Sacar a la luz' es idiomático en español y paralelo a la imagen griega.
- source_word: τὰ κρυπτὰ τοῦ σκότους
  english_pob_choice: the hidden things of darkness
  chosen_spanish: lo oculto de las tinieblas
  alternatives_spanish:
  - los secretos de las tinieblas
  - las cosas ocultas de la oscuridad
  lexicon: BDAG
  rationale: '''Lo oculto'' preserva el sustantivo neutro plural sin añadir ''cosas'' de manera innecesaria; ''tinieblas'' mantiene la fuerza semántica de σκότος en registro bíblico digno.'
- source_word: φανερώσει
  english_pob_choice: reveal
  chosen_spanish: pondrá de manifiesto
  alternatives_spanish:
  - revelará
  - dará a conocer
  lexicon: BDAG
  rationale: '''Poner de manifiesto'' expresa con claridad la función de φανερόω como desenmascarar o hacer visible lo interior.'
- source_word: τὰς βουλὰς τῶν καρδιῶν
  english_pob_choice: the purposes of the hearts
  chosen_spanish: las intenciones de los corazones
  alternatives_spanish:
  - los propósitos de los corazones
  - los motivos de los corazones
  lexicon: BDAG
  rationale: '''Intenciones'' es una buena equivalencia para βουλαί en este contexto de deliberaciones internas; conserva la pluralidad y el lenguaje bíblico del interior humano.'
- source_word: ὁ ἔπαινος γενήσεται ἑκάστῳ
  english_pob_choice: each one’s praise will come
  chosen_spanish: la alabanza de cada uno vendrá
  alternatives_spanish:
  - cada uno recibirá alabanza
  - la alabanza le llegará a cada uno
  lexicon: BDAG
  rationale: Mantiene la idea de que la alabanza 'llega' como resultado de la evaluación final; 'de cada uno' refleja el distributivo ἑκάστῳ con naturalidad.
- source_word: ἀπὸ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - procedente de Dios
  lexicon: BDAG
  rationale: '''De parte de Dios'' aclara la procedencia/origen de la alabanza en un español fluido y solemne sin introducir una interpretación ajena al texto.'
theological_decisions:
- issue: Alcance de la prohibición de juzgar
  english_pob_reading: Paul prohibits premature human judgment in view of the Lord’s future coming and disclosure, without denying all forms of discernment elsewhere.
  chosen_spanish_reading: El texto prohíbe juzgar antes del tiempo debido a la luz de la venida del Señor, sin negar todo discernimiento en otros pasajes.
  alternative_spanish_readings:
  - No se debe juzgar nunca a nadie.
  - Solo los apóstoles pueden juzgar en este caso.
  rationale: La forma 'antes del tiempo' conserva la limitación temporal del contexto y evita absolutizar una prohibición que el marco paulino no exige. La traducción sigue el peso del futuro juicio/revelación.
  doctrine_reference: 1 Corintios 2:15; 1 Corintios 5:12-13
- issue: Identidad de 'el Señor'
  english_pob_reading: '''The Lord'' refers to Jesus in his future coming as judge.'
  chosen_spanish_reading: '''El Señor'' se entiende como Jesús en su venida futura como juez.'
  alternative_spanish_readings:
  - '''El Señor'' podría leerse de modo genérico como Dios.'
  - '''El Señor'' sería solo un título honorífico sin referencia precisa.'
  rationale: En el contexto paulino y escatológico, κύριος apunta naturalmente a Jesús. Se conserva el título sin expansión para no borrar su fuerza cristológica.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Filipenses 2:9-11
translation_notes:
  revision_awareness: La versión inglesa más reciente prefirió 'before the time' frente a 'before the appointed time' por mayor precisión léxica; por eso el español conserva 'antes del tiempo' sin añadir 'señalado' o 'debido' en el texto principal, aunque se deja una alternativa en nota. También se mantuvo la doble imagen de φωτίσει/φανερώσει con dos verbos distintos en español para no aplanar el paralelismo.
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος según la convención cristológica del proyecto; no se sustituyó por un equivalente genérico.
  - '''Tinieblas'' se prefirió a ''oscuridad'' por registro bíblico y para reflejar σκότος en un tono más solemne.'
  - '''Alabanza'' traduce ἔπαινος y se mantiene en singular para seguir la forma griega.'
  - Se evitó 'Cristo' porque el texto griego usa κύριος, y el contexto ya da la referencia sin necesidad de expandir el título.
