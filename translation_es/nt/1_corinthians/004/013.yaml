translation:
  language: es
  text: Cuando se nos difama[a], apelamos; hemos llegado a ser como la basura del mundo, el desecho de todas las cosas[b], hasta ahora.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando se nos difama, suplicamos». El verbo griego puede significar «apelar», «rogar» o «animar»; aquí probablemente describe una respuesta no vengativa ante el abuso.'
    reason: lexical_alternative
  - marker: b
    text: Los dos términos traducidos «basura» y «desecho» son raros y muy fuertes. También pueden evocar aquello que se raspa o se barre al limpiar, subrayando un desprecio social extremo.
    reason: cultural_note
lexical_decisions:
- source_word: δυσφημούμενοι
  english_pob_choice: When slandered
  chosen_spanish: Cuando se nos difama
  alternatives_spanish:
  - Cuando somos calumniados
  - Cuando se nos injuria
  - Cuando somos difamados
  lexicon: BDAG
  rationale: El participio pasivo expresa recibir habla hostil o injuriosa. «Se nos difama» conserva la pasiva y el daño reputacional con un español natural; «calumniados» o «difamados» son posibles, pero «difama» mantiene mejor la idea de hablar mal de alguien en contexto de abuso.
- source_word: παρακαλοῦμεν
  english_pob_choice: we appeal
  chosen_spanish: apelamos
  alternatives_spanish:
  - rogamos
  - exhortamos
  - suplicamos
  lexicon: BDAG
  rationale: En la secuencia contrastiva, el verbo describe una respuesta conciliadora ante el maltrato. «Apelamos» transmite una reacción verbal no retaliatoria y corresponde al ajuste revisado del inglés POB, sin añadir suavizadores inexistentes en el griego.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: Introduce comparación, no identidad. «Como» es la forma más natural en español y preserva el valor comparativo del texto.
- source_word: περικαθάρματα
  english_pob_choice: refuse
  chosen_spanish: la basura
  alternatives_spanish:
  - la escoria
  - los desechos
  - la inmundicia
  lexicon: BDAG
  rationale: El término es muy fuerte y raro, y señala lo que se desecha al limpiar. «Basura» comunica desecho e insignificancia social en español contemporáneo sin perder del todo la aspereza retórica; las alternativas más literales quedan algo más marcadas o arcaizantes.
- source_word: τοῦ κόσμου
  english_pob_choice: the world's
  chosen_spanish: del mundo
  alternatives_spanish:
  - del orden presente
  - de la humanidad
  lexicon: BDAG
  rationale: 'Genitivo de relación: la vergüenza es la que el mundo asigna. «Del mundo» conserva la construcción directa y la carga social del griego.'
- source_word: ἐγενήθημεν
  english_pob_choice: we have become
  chosen_spanish: hemos llegado a ser
  alternatives_spanish:
  - hemos pasado a ser
  - llegamos a ser
  - nos volvimos
  lexicon: BDAG
  rationale: El aoristo resume un estado resultante vigente hasta el presente, reforzado por ἕως ἄρτι. «Hemos llegado a ser» expresa resultado durativo en un español sobrio y fiel.
- source_word: πάντων
  english_pob_choice: of all things
  chosen_spanish: de todos
  alternatives_spanish:
  - de todas las cosas
  - de todos los seres
  lexicon: BDAG
  rationale: El plural genitivo es amplio y probablemente neutro por sentido en la expresión. «De todos» conserva la universalidad sin forzar un sustantivo innecesario en español.
- source_word: περίψημα
  english_pob_choice: the scum
  chosen_spanish: el desecho
  alternatives_spanish:
  - la escoria
  - el residuo
  - lo que se barre
  lexicon: BDAG
  rationale: Es un término raro, paralelo a περικαθάρματα, para lo quitado o frotado fuera. «Desecho» mantiene la idea de residuo vil y, junto con «basura», reproduce el doble golpe de desprecio social del griego.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el presente
  - todavía
  lexicon: BDAG
  rationale: Expresión temporal estándar que indica continuidad hasta el momento actual. «Hasta ahora» es idiomática y exacta en español.
theological_decisions:
- issue: Cómo reflejar la pareja de términos degradantes περικαθάρματα / περίψημα
  english_pob_reading: Render as vivid social-abjection language ('refuse' / 'scum') without importing the debated technical idea of sacrificial expiatory victims into the main text.
  chosen_spanish_reading: Traducir con lenguaje vivo de abyección social («basura» / «desecho») sin introducir en el cuerpo del texto una alusión técnica a expiación o a víctimas sacrificiales.
  alternative_spanish_readings:
  - «inmundicia» / «offscouring»
  - «escoria» / «escoria de todos»
  - Introducir en el texto principal una posible referencia a objeto de limpieza o chivo expiatorio
  rationale: El punto inmediato es el desprecio y la humillación sufridos por los apóstoles. Aunque los términos pueden tener trasfondo de lo retirado en una limpieza e incluso ecos rituales, el versículo no formula una doctrina de expiación; por eso la traducción principal debe retener la dureza social y dejar cualquier matiz técnico para nota o estudio.
  doctrine_reference: 1 Corintios 4:13; cf. el uso retórico de lenguaje de humillación en el contexto inmediato de 1 Corintios 4:9-13
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés que eliminó el adverbio implícito «gently» de παρακαλοῦμεν. Por eso la versión española usa «apelamos» sin añadir atenuación no expresada en el griego. También se mantuvo la estrategia auditada para los términos raros y enfáticos del final del versículo, preservando su fuerza social y evitando una glosa técnica en el texto principal.
  spanish_consistency_notes:
  - Se mantiene Yahvé como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo»/«Mesías» porque no aparece en el versículo.
  - Se usó un registro bíblico moderno, con sintaxis natural en español y sin arcaísmos innecesarios.
  - La pareja «basura / desecho» intenta reflejar la duplicación retórica del griego sin volverla explicativa en exceso.
