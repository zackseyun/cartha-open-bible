translation:
  language: es
  text: Ya estáis saciados; ya os habéis enriquecido; sin nosotros[a] os habéis hecho reyes. ¡Y ojalá en verdad os hubierais hecho reyes[c][b], para que también nosotros reináramos con vosotros!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aparte de nosotros».
    reason: lexical_alternative
  - marker: b
    text: 'Pablo habla irónicamente: los corintios actúan como si ya estuvieran plenamente satisfechos, ricos y reinando.'
    reason: cultural_note
  - marker: c
    text: O «¡Y ojalá en verdad hubierais reinado!», conservando el deseo de manera más formal.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: Already
  chosen_spanish: Ya / ya estáis
  alternatives_spanish:
  - Ya mismo
  - Hasta ahora
  lexicon: BDAG
  rationale: Repite el adverbio al inicio de las cláusulas para conservar el énfasis temporal e irónico de Pablo. «Ya» es el equivalente natural y directo en español.
- source_word: κεκορεσμένοι ἐστέ
  english_pob_choice: you have had your fill
  chosen_spanish: estáis saciados
  alternatives_spanish:
  - estáis llenos
  - os habéis llenado
  lexicon: BDAG
  rationale: El perfecto participio con εἰμί expresa un estado presente resultante; «saciados» comunica bien la imagen de hartura y conserva la ironía sin sonar mecánico.
- source_word: ἐπλουτήσατε
  english_pob_choice: you have become rich
  chosen_spanish: os habéis enriquecido
  alternatives_spanish:
  - habéis llegado a ser ricos
  - os hicisteis ricos
  lexicon: BDAG
  rationale: El aoristo en contexto retórico apunta al resultado presente; «os habéis enriquecido» preserva el proceso/resultante mejor que un adjetivo estático.
- source_word: χωρὶς ἡμῶν
  english_pob_choice: apart from us
  chosen_spanish: sin nosotros
  alternatives_spanish:
  - aparte de nosotros
  - independientemente de nosotros
  lexicon: BDAG
  rationale: «Sin nosotros» reproduce bien la idea de separación y dependencia negada, y suena natural en español para el reproche paulino.
- source_word: ἐβασιλεύσατε
  english_pob_choice: you have become kings
  chosen_spanish: os habéis hecho reyes
  alternatives_spanish:
  - habéis reinado
  - os habéis convertido en reyes
  lexicon: BDAG
  rationale: Se conserva la imagen real explícita de βασιλεύω, como en el inglés POB, sin rebajarla a mera influencia o éxito. «Os habéis hecho reyes» refleja el tono irónico y la fuerza verbal.
- source_word: ὄφελόν γε
  english_pob_choice: And I wish indeed
  chosen_spanish: ¡Y ojalá en verdad
  alternatives_spanish:
  - ¡Y quisiera de veras
  - ¡Quién pudiera decir
  lexicon: BDAG
  rationale: La partícula optativa expresa deseo; «ojalá» es la forma española más natural para ese matiz, y «en verdad» recoge el énfasis de γε.
- source_word: ἐβασιλεύσατε
  english_pob_choice: you had become kings
  chosen_spanish: os hubierais hecho reyes
  alternatives_spanish:
  - hubierais reinado
  - os hubierais convertido en reyes
  lexicon: BDAG
  rationale: En la cláusula de deseo, el pluscuamperfecto de subjuntivo comunica adecuadamente el deseo irreal. Se mantiene la misma imagen de realeza que en la cláusula anterior.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce la finalidad del deseo con naturalidad en español y conserva la relación lógica del texto.
- source_word: συμβασιλεύσωμεν
  english_pob_choice: we also might reign with you
  chosen_spanish: también nosotros reináramos con vosotros
  alternatives_spanish:
  - también nosotros reinemos con vosotros
  - también nosotros gobernáramos con vosotros
  lexicon: BDAG
  rationale: El compuesto con συν- exige la idea de reinar juntamente; «reináramos con vosotros» expresa esa co-realeza sin perder la fuerza del verbo. Se mantiene la primera persona plural para reflejar la solidaridad apostólica.
theological_decisions:
- issue: Tono irónico de las tres primeras afirmaciones
  english_pob_reading: Render them as ironic assertions rather than straightforward commendation.
  chosen_spanish_reading: Las tres primeras cláusulas se leen como afirmaciones irónicas, no como elogio literal.
  alternative_spanish_readings:
  - Tomarlas como descripciones neutrales de éxito espiritual
  - Suavizar la ironía para hacerlas meramente retóricas
  rationale: El contexto inmediato (4:7–13) y el contraste con el sufrimiento apostólico muestran que Pablo reprocha una autosuficiencia triunfalista. El español mantiene ese filo con la secuencia breve y repetida de «ya».
  doctrine_reference: 1 Corintios 4:7–13; ironía paulina y contraste entre autosuficiencia y sufrimiento apostólico
- issue: Imagen de reinar
  english_pob_reading: Retain royal/reigning imagery rather than flattening to general success or status.
  chosen_spanish_reading: Se conserva la imagen explícita de reinar y de hacerse reyes.
  alternative_spanish_readings:
  - Convertirlo en ‘haber triunfado’
  - Traducirlo como ‘tener poder’
  rationale: La terminología de βασιλεύω y συμβασιλεύω es deliberadamente real y apunta al contraste escatológico y pastoral del pasaje. En español, «reyes» y «reináramos» preservan mejor esa carga que un lenguaje más genérico.
  doctrine_reference: BDAG βασιλεύω/συμβασιλεύω; contexto escatológico de reinar con Cristo
- issue: Matiz de deseo irreal en la segunda mitad del versículo
  english_pob_reading: Preserve the wish more formally while remaining readable.
  chosen_spanish_reading: «Ojalá» y el pluscuamperfecto de subjuntivo expresan un deseo irreal y retórico.
  alternative_spanish_readings:
  - «Quisiera que» con presente subjuntivo
  - «Si tan solo»
  rationale: La construcción española elegida comunica el valor optativo de ὄφελον y el carácter contrafactual de la cláusula siguiente sin sacrificar claridad.
  doctrine_reference: Gramática del optativo; 1 Corintios 4:8
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado revisado del POB inglés, que sustituyó ‘have begun to reign as kings’ por ‘have become kings’ en ambas ocurrencias de ἐβασιλεύσατε para reflejar más directamente el verbo griego. La versión española conserva esa misma decisión, evitando añadir una noción inceptiva que el griego no exige.
  spanish_consistency_notes:
  - He mantenido ‘reyes’/‘reináramos’ para reflejar de forma consistente βασιλεύω y συμβασιλεύω.
  - He usado ‘vosotros’ en la sección final para corresponder al plural de la fuente y conservar el paralelismo con el reproche apostólico, aunque el resto del texto usa formas enclíticas y tuteo plural implícito.
  - La ironía se sostiene por la repetición de ‘ya’ y por la combinación de abundancia material con lenguaje real.
