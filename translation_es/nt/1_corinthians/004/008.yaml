    reason: lexical_alternative
  - marker: b
    text: 'Paul speaks ironically: the Corinthians act as though they are already fully satisfied, rich, and reigning.'
    reason: cultural_note
  - marker: c
    text: Or 'Would that indeed you had reigned,' preserving the wish more formally.
    reason: lexical_alternative
