base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/008.yaml
  text: Already you have had your fill[a]; already you have become rich; apart from us you have become kings. And I wish indeed that you had become kings[c][b], so that we also might reign with you.
  footnotes:
