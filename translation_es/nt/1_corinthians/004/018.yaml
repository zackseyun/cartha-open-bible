revisions:
- from: Algunos se han inflado[a][b], como si yo no fuera a ir a ustedes.
  to: Algunos se han hinchado[a][b], como si yo no fuera a ir donde ustedes.
  rationale: Se hizo una reparación menor para mejorar la naturalidad del español sin perder el sentido ni la metáfora del griego. «Se han hinchado» conserva mejor la imagen de φυσιόω en español, y «donde ustedes» expresa de manera más idiomática la dirección de πρὸς ὑμᾶς dentro de la cláusula hipotética introducida por «como si». También se depuró la nota explicativa para que quede completamente en español.
