translation:
  language: es
  text: Algunos se han hinchado[a][b], como si yo no fuera a ir donde ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Algunos se han vuelto arrogantes, como si yo no fuera a ir donde ustedes».'
    reason: lexical_alternative
  - marker: b
    text: Pablo repite en 1 Corintios esta imagen de estar «hinchados» para hablar del orgullo engreído; compárese 1 Cor 4:6, 4:19, 5:2, 8:1 y 13:4.
    reason: cross_reference
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as though
  chosen_spanish: como si
  alternatives_spanish:
  - como si fuera que
  - cual si
  lexicon: BDAG
  rationale: La partícula introduce una suposición falsa o imaginada; «como si» expresa en español la fuerza comparativa y eventual de manera natural, sin convertirla en una afirmación directa.
- source_word: μὴ ἐρχομένου ... μου πρὸς ὑμᾶς
  english_pob_choice: I were not coming to you
  chosen_spanish: yo no fuera a ir a ustedes
  alternatives_spanish:
  - yo no estuviera yendo a ustedes
  - yo no fuera a venir a ustedes
  lexicon: BDAG
  rationale: La construcción participial genitiva con μή depende de ὡς y presenta una situación supuesta. En español, «no fuera a ir» conserva el valor hipotético y la dirección hacia los destinatarios; «venir» también sería posible, pero «ir a ustedes» sigue de cerca la relación espacial del griego sin sonar forzado.
- source_word: ἐφυσιώθησάν
  english_pob_choice: have become puffed up
  chosen_spanish: se han inflado
  alternatives_spanish:
  - se han vuelto arrogantes
  - han quedado hinchados de orgullo
  - se han ensoberbecido
  lexicon: BDAG
  rationale: Se mantiene la metáfora corporal de φυσιόω, equivalente a «puffed up». «Se han inflado» conserva esa imagen mejor que una paráfrasis abstracta como «se han vuelto arrogantes».
- source_word: τινες
  english_pob_choice: Some
  chosen_spanish: Algunos
  alternatives_spanish:
  - Ciertos
  - Unos cuantos
  lexicon: BDAG
  rationale: El indefinido plural señala a un subgrupo dentro de la comunidad. «Algunos» es la forma más natural y precisa en español.
theological_decisions:
- issue: Conservar la metáfora paulina de orgullo inflado
  english_pob_reading: Use the metaphor 'puffed up' rather than interpretive 'arrogant.'
  chosen_spanish_reading: Usar «se han inflado» en lugar de una glosa interpretativa como «se han vuelto arrogantes».
  alternative_spanish_readings:
  - se han ensoberbecido
  - han quedado hinchados de orgullo
  rationale: La imagen verbal es parte del tejido retórico de 1 Corintios y reaparece en el contexto inmediato. Mantenerla permite ver la continuidad temática sin aplanar el lenguaje de Pablo.
  doctrine_reference: 1 Corintios 4:6, 4:19; 5:2; 8:1; 13:4
- issue: Valor hipotético de la venida de Pablo
  english_pob_reading: I were not coming to you
  chosen_spanish_reading: yo no fuera a ir a ustedes
  alternative_spanish_readings:
  - yo no estuviera yendo a ustedes
  - yo no fuera a venir a ustedes
  rationale: El griego expresa una suposición atribuida a ciertos miembros, no una negación simple del viaje. La versión española conserva esa hipótesis falsa sin convertirla en una declaración factual.
  doctrine_reference: Sintaxis griega de ὡς + genitivo participial con μή
translation_notes:
  revision_awareness: 'El texto griego y el auditorial inglés coinciden en el sentido principal: unos miembros de la comunidad han adoptado una actitud de orgullo bajo la suposición errónea de que Pablo no iría. No se detectan revisiones pendientes ni divergencias textuales relevantes en este pasaje.'
  spanish_consistency_notes:
  - Se conserva la metáfora de φυσιόω con «inflados» para mantener coherencia con otros pasajes de 1 Corintios.
  - «A ustedes» sigue el destinatario plural de πρὸς ὑμᾶς.
  - No se añadió una conjunción adversativa explícita para δέ, porque en español la frase fluye con naturalidad sin ella.
