revisions:
- from: Por esta razón les envié a Timoteo, que es mi hijo amado y fiel en el Señor. Él les recordará mis caminos en Mesías Jesús[a], tal como enseño en todas partes, en cada iglesia.
  to: Por esta razón les envié a Timoteo, que es mi hijo[a] amado y fiel en el Señor. Él les recordará mis caminos en Mesías Jesús, tal como enseño en todas partes, en cada iglesia.
  rationale: Se conserva el texto principal casi intacto porque es fiel y natural en español. Se corrige el anclaje de la nota para que recaiga sobre 'hijo', que es el término explicado, y se ajusta la nota para reflejar mejor la justificación lexical documentada para τέκνον, evitando presentar 'hijo' como el sentido más literal.
