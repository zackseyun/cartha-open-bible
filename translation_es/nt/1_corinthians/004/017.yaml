translation:
  language: es
  text: Por esta razón les envié a Timoteo, que es mi hijo[a] amado y fiel en el Señor. Él les recordará mis caminos en Mesías Jesús, tal como enseño en todas partes, en cada iglesia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''mi hijo amado y fiel en el Señor''. El griego τέκνον significa más literalmente ''niño'' o ''hijo/a'', aunque en este contexto también puede expresarse como ''hijo''.'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por eso
  - Por tanto
  lexicon: BDAG
  rationale: Conserva la conexión causal con el argumento anterior en un español natural y digno, sin volverlo excesivamente formal o mecánico.
- source_word: ἔπεμψα
  english_pob_choice: I sent
  chosen_spanish: les envié
  alternatives_spanish:
  - envié
  - he enviado
  lexicon: BDAG
  rationale: El aoristo epistolar se vierte bien con pasado simple en español. Se añade el dativo implícito con 'les' para hacer explícito el destinatario del envío.
- source_word: Τιμόθεον
  english_pob_choice: Timothy
  chosen_spanish: Timoteo
  alternatives_spanish:
  - Timoteo
  lexicon: Nombre propio
  rationale: Transliteración estándar en español del nombre propio.
- source_word: τέκνον
  english_pob_choice: child
  chosen_spanish: hijo
  alternatives_spanish:
  - niño
  - hijo amado
  lexicon: BDAG
  rationale: Aunque τέκνον significa más literalmente 'hijo/descendiente' o 'niño/child', en esta relación paulina el español natural y más transparente es 'hijo'. Se conserva la metáfora afectiva y ministerial sin forzar una literalidad poco idiomática.
- source_word: ἀγαπητὸν
  english_pob_choice: beloved
  chosen_spanish: amado
  alternatives_spanish:
  - querido
  - muy amado
  lexicon: BDAG
  rationale: '''Amado'' mantiene el tono afectivo elevado del texto paulino y suena natural en registro bíblico contemporáneo.'
- source_word: πιστὸν
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  lexicon: BDAG
  rationale: '''Fiel'' es la equivalencia más directa y estable en español para describir la confiabilidad ministerial de Timoteo.'
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en Yahvé
  - en el Señor Jesús
  lexicon: BDAG
  rationale: Aquí κύριος funciona como título cristológico/personal de relación, y en español la locución fija 'en el Señor' comunica bien la esfera de vida y servicio de Timoteo sin introducir una paráfrasis innecesaria.
- source_word: ἀναμνήσει
  english_pob_choice: will remind
  chosen_spanish: les recordará
  alternatives_spanish:
  - les hará recordar
  - les traerá a la memoria
  lexicon: BDAG
  rationale: '''Recordará'' es un equivalente idiomático claro en español. Mantiene el valor futuro y el sentido de traer a la memoria.'
- source_word: τὰς ὁδούς μου
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mi manera de vivir
  - mi conducta
  lexicon: BDAG
  rationale: '''Caminos'' preserva la metáfora de ὁδός mejor que una paráfrasis explicativa, y sugiere el patrón de vida y ministerio de Pablo.'
- source_word: τὰς ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva la decisión POB de traducir Χριστός como 'Mesías' cuando actúa como título. En español, 'Mesías Jesús' mantiene la tensión entre título y nombre sin normalizarlo a la forma eclesiástica tradicional.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: BDAG
  rationale: '''Tal como'' expresa correspondencia directa con naturalidad en español y preserva la comparación entre lo que Timoteo recordará y la práctica habitual de Pablo.'
- source_word: πανταχοῦ
  english_pob_choice: everywhere
  chosen_spanish: en todas partes
  alternatives_spanish:
  - por todas partes
  - en todo lugar
  lexicon: BDAG
  rationale: Equivalente idiomático normal para la extensión universal de la enseñanza de Pablo.
- source_word: ἐν πάσῃ ἐκκλησίᾳ
  english_pob_choice: in every church
  chosen_spanish: en cada iglesia
  alternatives_spanish:
  - en toda iglesia
  - en cada asamblea
  lexicon: BDAG
  rationale: '''Iglesia'' es la mejor correspondencia contextual en español para ἐκκλησία en Pablo. ''Cada'' suena más distributivo y evita una lectura institucionalizada excesiva.'
- source_word: διδάσκω
  english_pob_choice: I teach
  chosen_spanish: enseño
  alternatives_spanish:
  - estoy enseñando
  - doy enseñanza
  lexicon: BDAG
  rationale: El presente simple expresa la práctica regular de Pablo, y 'enseño' es la forma más natural y clara en español.
theological_decisions:
- issue: Cómo renderizar Χριστός en la frase ἐν Χριστῷ Ἰησοῦ
  english_pob_reading: '''in Messiah Jesus'' to preserve the title''s meaning'
  chosen_spanish_reading: '''en Mesías Jesús'''
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: Se mantiene la política del proyecto de traducir Χριστός como 'Mesías' cuando funciona como título. En esta cláusula, el título califica los caminos de Pablo, por lo que 'Mesías' conserva la fuerza semántica sin ocultarla bajo la forma tradicionalizada 'Cristo'.
  doctrine_reference: 'DOCTRINE.md — contested terms: Χριστός → Mesías (when titular; Cristo when name-like)'
translation_notes:
  revision_awareness: La redacción española sigue la decisión auditada de la POB de traducir Χριστός como 'Mesías' en un uso titular. También toma en cuenta la revisión regresiva que restauró 'Mesías' frente a una pasada intermedia con 'Cristo'. En cuanto a τέκνον, se optó por 'hijo' porque el español idiomático transmite mejor la relación paulina que 'niño' o 'hijo' con nota de literalidad forzada.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος en la fórmula 'en el Señor', coherente con el uso paulino y con la práctica española reverente.
  - Se preserva la metáfora de 'caminos' para ὁδοί, en lugar de suavizarla con 'conducta', para no perder la imagen del patrón de vida y ministerio.
  - La puntuación separa con claridad las dos oraciones principales y conserva el ritmo del original griego en español natural.
