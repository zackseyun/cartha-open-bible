revisions:
- from: En este caso[a], además[b], se requiere de los mayordomos que alguno sea hallado fiel.
  to: En este caso[a], además[c], se requiere[b] de los mayordomos que uno sea hallado fiel.
  rationale: 'Se conserva la traducción principal, pero se corrigen dos detalles: (1) se restituye la tercera nota presente en la auditoría inglesa y se reancla la nota literal de ζητεῖται a «se requiere», donde corresponde; (2) se cambia «alguno» por «uno» para reflejar con mayor naturalidad el singular representativo de τις en español. No se requiere adjudicación adicional.'
