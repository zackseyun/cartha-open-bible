review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ὧδε + λοιπὸν como transición discursiva, ζητεῖται con sentido idiomático de exigencia, οἰκονόμοις como metáfora de mayordomía, y εὑρεθῇ πιστός como evaluación de fidelidad. Sin embargo, la distribución de notas no sigue fielmente la auditoría inglesa: la nota sobre la alternativa de ὧδε/λοιπὸν quedó incompleta y la nota literal sobre ζητεῖται debería estar anclada a la frase verbal correspondiente, no a «además».'
  spanish_quality_summary: El español es claro y bastante natural, pero «alguno sea hallado fiel» suena algo menos idiomático que «uno sea hallado fiel» o «alguien sea hallado fiel». Para conservar mejor el singular representativo del griego y la sobriedad bíblica, «uno» funciona mejor aquí. También conviene reubicar y completar las notas para evitar confusión.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Mayordomos» es aceptable para οἰκονόμοις en este contexto y preserva la metáfora. «Fiel» para πιστός está bien. La principal corrección es de anclaje y exhaustividad de notas, no de glosario.
  issues:
  - severity: medium
    issue: Las notas al pie no preservan correctamente la estructura y el contenido de la auditoría inglesa.
    rationale: El inglés tiene una nota para alternativas de ὧδε, otra para el valor literal de ζητεῖται, y otra para una formulación previa de ὧδε + λοιπὸν. En español solo hay dos notas, y la literal de ζητεῖται está anclada a «además», lo que no corresponde al elemento fuente.
  - severity: low
    issue: «Alguno» es menos natural que «uno» en este contexto genérico singular.
    rationale: Aunque no es incorrecto, «que alguno sea hallado fiel» puede oírse más marcado o restrictivo. «Que uno sea hallado fiel» mantiene mejor el singular representativo de τις y suena más fluido en español bíblico moderno.
  revised_spanish_text: En este caso[a], además[c], se requiere[b] de los mayordomos que uno sea hallado fiel.
  revised_footnotes:
