translation:
  language: es
  text: En este caso[a], además[c], se requiere[b] de los mayordomos que uno sea hallado fiel.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aquí, además», o «en este asunto, entonces».
    reason: lexical_alternative
  - marker: b
    text: Lit. «se busca entre los mayordomos»; es decir, esto es lo que se espera o requiere de ellos.
    reason: lexical_alternative
  - marker: c
    text: O «En este caso, además».
    reason: previous_rendering
lexical_decisions:
- source_word: ὧδε
  english_pob_choice: In this case
  chosen_spanish: En este caso
  alternatives_spanish:
  - aquí
  - en este asunto
  - en este sentido
  lexicon: BDAG
  rationale: En el contexto, la partícula funciona de manera discursiva e inferencial, no meramente espacial. «En este caso» transmite bien el paso argumentativo que Pablo hace a partir de la sección anterior.
- source_word: λοιπὸν
  english_pob_choice: moreover
  chosen_spanish: además
  alternatives_spanish:
  - por lo demás
  - así pues
  - ahora bien
  lexicon: BDAG
  rationale: El valor aquí es conectivo, de avance en el argumento. «Además» mantiene esa función con naturalidad en español y evita una combinación rígida de marcadores.
- source_word: ζητεῖται
  english_pob_choice: it is required
  chosen_spanish: se requiere
  alternatives_spanish:
  - se busca
  - se espera
  - se demanda
  lexicon: BDAG
  rationale: Aunque el verbo básico es «buscar», en esta construcción pasiva expresa lo que se exige o se espera de los administradores. «Se requiere» comunica bien la fuerza idiomática sin perder la base verbal del griego.
- source_word: οἰκονόμοις
  english_pob_choice: stewards
  chosen_spanish: mayordomos
  alternatives_spanish:
  - administradores
  - encargados del hogar
  - administradores de casa
  lexicon: BDAG
  rationale: «Mayordomos» conserva la metáfora de administración de una casa o encargo confiado, y es una alternativa clara y comprensible en español bíblico. El término mantiene la idea de responsabilidad delegada.
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - leal
  - fidedigno
  lexicon: BDAG
  rationale: En este contexto, el adjetivo enfatiza la confiabilidad en el cumplimiento del encargo. «Fiel» es la equivalencia más natural y sobria en español, con el peso moral adecuado.
- source_word: τις
  english_pob_choice: one
  chosen_spanish: alguno
  alternatives_spanish:
  - uno
  - alguien
  - una persona
  lexicon: BDAG
  rationale: El indefinido singular del griego preserva una referencia representativa, no necesariamente masculina ni plural. «Alguno» conserva esa singularidad de forma natural en español y evita imponer un masculino genérico.
- source_word: εὑρεθῇ
  english_pob_choice: be found
  chosen_spanish: sea hallado
  alternatives_spanish:
  - sea encontrado
  - resulte
  - sea mostrado
  lexicon: BDAG
  rationale: El pasivo subjuntivo se expresa de manera idiomática con «sea hallado», que conserva la idea de aparecer como resultado de una evaluación o examen.
theological_decisions:
- issue: Singular representativo y género
  english_pob_reading: that one be found faithful
  chosen_spanish_reading: que alguno sea hallado fiel
  alternative_spanish_readings:
  - que un hombre sea hallado fiel
  - que sean hallados fieles
  rationale: El griego usa un singular indefinido con adjetivo masculino, pero el referente es genérico. «Alguno» preserva el singular representativo sin restringirlo a varones ni convertirlo en plural.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: 'He tenido en cuenta el pasaje de revisión del inglés POB: se evitó una acumulación rígida de marcadores discursivos y se mantuvo el sentido inferencial de ὧδε + λοιπὸν con una solución española fluida («En este caso, además»). También se preservó la fuerza idiomática de ζητεῖται como exigencia, no como mera búsqueda literal.'
  spanish_consistency_notes:
  - Se mantiene «mayordomos» para οἰκονόμος, coherente con la metáfora de administración confiada.
  - Se evita «SEÑOR» u otros ajustes no pertinentes; no hay aquí términos del Tetragrama ni de Mesías/Cristo.
  - «Fiel» se conserva como adjetivo de confiabilidad moral y fiduciaria, en línea con el uso bíblico del término.
