revisions:
- from: Porque el reino de Dios no consiste en palabras[a], sino en poder.
  to: Porque el reino de Dios no es en palabra[a], sino en poder.
  rationale: Se revisa para acercar la redacción española al paralelismo y a la concisión del griego, preservando mejor el singular de λόγος y mejorando la naturalidad de la nota léxica. «No es en palabra ... sino en poder» suena algo más literal, pero sigue siendo inteligible y mantiene abierta la amplitud teológica del contraste.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:24Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: γάρ como explicación causal, ἡ βασιλεία τοῦ θεοῦ como «el reino de Dios», y ἀλλ’ ἐν δυνάμει como contraste fuerte «sino en poder». Sin embargo, «no consiste en» interpreta ἐν de manera más explicativa que formal; el griego dice más literalmente que el reino de Dios no está «en palabra/discurso» sino «en poder».'
  spanish_quality_summary: El español es claro y natural, pero puede ajustarse para acercarse más al contraste breve y punzante de Pablo. «No consiste en palabras» suena idiomático, aunque ligeramente parafrástico. La nota al pie usa «mera verbalidad», que suena algo técnica; «meras palabras» es más natural y coincide mejor con la auditoría inglesa.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto. «Dios», «reino» y «poder» están bien. La decisión sobre λόγος necesita sólo una leve mejora estilística y de fidelidad formal: «palabra» singular en el texto con alternativas en nota preserva mejor la forma y el contraste del original.'
  issues:
  - severity: medium
    issue: «No consiste en» es más interpretativo que «no es en» / «no está en».
    rationale: El griego οὐ ... ἐν λόγῳ ... ἀλλ’ ἐν δυνάμει establece una antítesis concisa con ἐν repetido. «Consiste en» explica el sentido, pero se aleja de la forma y atenúa la fuerza del paralelismo.
  - severity: low
    issue: «Palabras» en plural pierde el singular de λόγῳ.
    rationale: Aunque «en palabras» suena natural, el singular «en palabra» es posible en español bíblico y conserva mejor la forma del original y el eco con la traducción inglesa auditada «in word».
  - severity: low
    issue: La nota «mera verbalidad» suena poco natural en español eclesial general.
    rationale: La alternativa puede expresarse de forma más clara como «meras palabras», manteniendo el mismo matiz semántico sin tecnicismo innecesario.
  revised_spanish_text: Porque el reino de Dios no es en palabra[a], sino en poder.
  revised_footnotes:
  - marker: a
    text: O «en discurso» o «en meras palabras»; el contraste es con el poder eficaz, no con la retórica vacía.
    reason: lexical_alternative
