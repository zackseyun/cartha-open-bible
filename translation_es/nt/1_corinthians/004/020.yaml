translation:
  language: es
  text: Porque el reino de Dios no es en palabra[a], sino en poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en discurso» o «en meras palabras»; el contraste es con el poder eficaz, no con la retórica vacía.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ γὰρ
  english_pob_choice: For ... not
  chosen_spanish: Porque ... no
  alternatives_spanish:
  - Pues ... no
  - Porque ... no es
  lexicon: BDAG
  rationale: γάρ introduce la razón de la afirmación anterior; en español, «Porque» comunica con naturalidad esa relación causal. La negación directa «no» preserva la estructura enfática del griego sin añadir contenido.
- source_word: ἐν λόγῳ
  english_pob_choice: in word
  chosen_spanish: en palabras
  alternatives_spanish:
  - en palabra
  - en discurso
  - en habla
  lexicon: BDAG
  rationale: λόγος aquí contrasta con δύναμις y puede llevar la idea de palabras, discurso o mera verbalización. «En palabras» suena natural en español y conserva la oposición a «poder»; la nota mantiene la posibilidad de «discurso» o «mera verbalidad» sin fijar indebidamente el alcance.
- source_word: ἡ βασιλεία τοῦ θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reinado de Dios
  - el gobierno de Dios
  lexicon: BDAG
  rationale: «Reino» es la equivalencia estable y fiel para βασιλεία, preservando tanto la idea de dominio como la de soberanía efectiva. «De Dios» traduce τοῦ θεοῦ de manera directa y transparente.
- source_word: ἀλλ’ ἐν δυνάμει
  english_pob_choice: but in power
  chosen_spanish: sino en poder
  alternatives_spanish:
  - pero en poder
  - sino en fuerza
  - sino en poder eficaz
  lexicon: BDAG
  rationale: Tras una negación previa, «sino» expresa mejor la corrección contrastiva de ἀλλά que «pero». «Poder» mantiene la fuerza lexical de δύναμις y la contraposición con λόγος; no se especifica aquí si se trata de poder milagroso, moral o apostólico.
theological_decisions:
- issue: Alcance del contraste entre palabra y poder
  english_pob_reading: The verse contrasts mere speech or rhetoric with effective power as the mark of God's kingdom, without specifying here whether that power is miraculous, moral, apostolic, or the Spirit's work in a narrower sense.
  chosen_spanish_reading: El versículo contrapone la mera verbalidad con el poder eficaz como rasgo del reino de Dios, sin precisar si ese poder es milagroso, moral, apostólico o la obra del Espíritu en un sentido más estrecho.
  alternative_spanish_readings:
  - El poder se refiere específicamente a señales milagrosas
  - El poder se refiere específicamente a una vida transformada y a la disciplina de la iglesia
  - El poder se refiere específicamente a la autoridad apostólica
  rationale: El griego sólo afirma una oposición amplia entre λόγος y δύναμις. La traducción debe conservar esa amplitud, evitando cerrar el sentido donde el texto no lo hace.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: No se registraron revisiones posteriores en el paquete fuente; el texto griego y el audit trail inglés muestran acuerdo alto y sin cambios aplicados.
  spanish_consistency_notes:
  - Se mantuvo «reino de Dios» por coherencia con el término técnico βασιλεία τοῦ θεοῦ en la tradición POB.
  - Se prefirió «sino» tras la negación, porque refleja mejor el contraste correctivo de ἀλλά en español.
  - Se evitó especificar el tipo de poder para no estrechar el alcance teológico del versículo.
