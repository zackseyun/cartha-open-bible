translation:
  language: es
  text: Porque no tengo conciencia de nada contra mí[a], pero no por esto[b] estoy justificado; el que me examina[c] es el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no tengo conciencia de nada en mí» o «no sé nada contra mí».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no estoy absuelto por esto» o «no estoy vindicado por esto». El griego usa un término forense que Pablo emplea también en otros lugares para hablar de ser justificado.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «el que me juzga»; el verbo puede significar examinar, investigar o evaluar en un marco judicial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲν
  english_pob_choice: nothing
  chosen_spanish: nada
  alternatives_spanish:
  - nada en absoluto
  - ninguna cosa
  lexicon: BDAG
  rationale: Como objeto de σύνοιδα, οὐδέν expresa negación total. 'Nada' es la forma natural y precisa en español, sin añadir énfasis innecesario.
- source_word: ἐμαυτῷ
  english_pob_choice: against myself
  chosen_spanish: contra mí
  alternatives_spanish:
  - en mí
  - para mí
  - de mí
  lexicon: BDAG
  rationale: Con σύνοιδα, el dativo puede expresar el ámbito de la conciencia o un sentido moral/forense implícito. 'Contra mí' conserva bien esa fuerza idiomática y deja abierta la tensión judicial sin endurecerla demasiado.
- source_word: σύνοιδα
  english_pob_choice: I am aware of
  chosen_spanish: tengo conciencia
  alternatives_spanish:
  - sé
  - soy consciente de
  - me doy cuenta de
  lexicon: BDAG
  rationale: El perfecto con sentido presente apunta a estar consciente de algo. En español, 'tener conciencia' comunica el estado resultante de manera natural y digna.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación de la afirmación anterior. 'Porque' preserva el enlace lógico sin sonar artificial en español.
- source_word: οὐκ ἐν τούτῳ
  english_pob_choice: not by this
  chosen_spanish: no por esto
  alternatives_spanish:
  - no en esto
  - no a causa de esto
  lexicon: BDAG
  rationale: La frase indica que la ausencia de autoinculpación no constituye la base del veredicto. 'No por esto' transmite adecuadamente la relación causal/instrumental.
- source_word: δεδικαίωμαι
  english_pob_choice: I am not justified
  chosen_spanish: estoy justificado
  alternatives_spanish:
  - soy declarado justo
  - estoy absuelto
  - estoy vindicado
  lexicon: BDAG
  rationale: El pasivo perfecto de δικαιόω conserva un matiz forense. 'Estoy justificado' mantiene la terminología paulina sin desplazarla a un vocabulario ajeno al texto; la negación previa hace explícito que no se afirma la justificación 'por esto'.
- source_word: ὁ ... ἀνακρίνων με
  english_pob_choice: the one who examines me
  chosen_spanish: el que me examina
  alternatives_spanish:
  - el que me juzga
  - el que me investiga
  - el que me interroga
  lexicon: BDAG
  rationale: ἀνακρίνω puede significar examinar, investigar o juzgar en un marco judicial. 'Examina' conserva la idea de escrutinio evaluativo sin cargar de más el sentido de condena final.
- source_word: κύριός
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: κύριος se vierte de forma convencional como 'Señor'. El artículo definido mantiene la referencia concreta e identificable del contexto paulino.
theological_decisions:
- issue: Sentido forense de δεδικαίωμαι
  english_pob_reading: I am not justified by this
  chosen_spanish_reading: no por esto estoy justificado
  alternative_spanish_readings:
  - no por esto estoy absuelto
  - no por esto estoy vindicado
  - no por esto soy declarado justo
  rationale: El contexto trata de evaluación apostólica y juicio, por lo que conviene conservar el peso jurídico de δικαιόω. 'Justificado' mantiene la tensión teológica sin convertir el versículo en una definición sistemática más amplia.
  doctrine_reference: Justificación / vindicación en lenguaje paulino; mantener la tensión lexical documentada por el POB.
- issue: Identidad de κύριος
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Señor Jesús
  rationale: El griego dice κύριος, no 'Jesús' ni una identificación explícita adicional. La traducción no debe expandir el referente más allá de lo que el verso afirma.
  doctrine_reference: No importar identificaciones doctrinales que el texto no enuncia explícitamente.
translation_notes:
  revision_awareness: Se revisó la relación de σύνοιδα con ἐμαυτῷ para evitar una traducción demasiado mecánica. También se conservó el matiz forense de δεδικαίωμαι sin añadir una identificación explícita distinta de κύριος en el texto principal.
  spanish_consistency_notes:
  - Se mantiene 'Señor' para κύριος conforme al estándar del proyecto.
  - Se usa 'justificado' para conservar la terminología paulina y su tensión forense.
  - Se evita 'SEÑOR' como máscara tipográfica; se traduce el nombre/referencia según el texto.
  - La estructura adversativa 'pero no por esto' refleja bien el contraste del griego.
