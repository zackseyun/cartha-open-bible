source:
  edition: SBLGNT
  text: Οὕτως ἡμᾶς λογιζέσθω ἄνθρωπος ὡς ὑπηρέτας Χριστοῦ καὶ οἰκονόμους μυστηρίων θεοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/004/001.yaml
  text: 'This is how a person should regard us: as servants of Messiah and stewards of the mysteries of God[a][b].'
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here because it functions as a title.
    reason: lexical_alternative
  - marker: b
    text: '''A man'' here has generic force, meaning any person in general.'
    reason: cultural_note
  ai_draft:
    model_id: openai/gpt-5.4
    model_version: openai/gpt-5.4-20260305
    prompt_id: nt_draft_v1
    prompt_sha256: 6eb3febff99ebf9a976669713efb323332be5382e6dc60de5b19862b333d3fac
    timestamp: '2026-04-18T08:16:57Z'
    output_hash: 9f2b0d630d2105084309bc8a2b381f3603780c09852b1cc3ed17a9aef2166ff8
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:35:02Z'
    unchanged: false
    changes_summary: 'Changed ''a man'' to ''a person'' for natural generic English and ''the Messiah'' to ''Christ'' for closer correspondence to Χριστοῦ in this context; retained the rest as accurate. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Así debe considerarnos cualquier persona: como siervos del Mesías y administradores de los misterios de Dios[a][b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: '''Mesías'' traduce Χριστοῦ aquí porque el término funciona como título, no solo como nombre propio.'
    reason: lexical_alternative
  - marker: b
    text: '''Cualquier persona'' refleja el valor genérico de ἄνθρωπος.'
    reason: cultural_note
lexical_decisions:
- source_word: Οὕτως
  english_pob_choice: This is how
  chosen_spanish: Así debe considerarnos cualquier persona
  alternatives_spanish:
  - De este modo debe considerarnos cualquier persona
  - Así es como cualquier persona debe considerarnos
  lexicon: BDAG
  rationale: Οὕτως introduce la manera en que debe hacerse la evaluación. En español, 'Así debe considerarnos' conserva la relación con el verbo siguiente y su fuerza normativa; añadir 'cualquier persona' expresa el alcance genérico de ἄνθρωπος sin forzar una forma masculina en el texto principal.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Es el objeto directo de λογιζέσθω y se refiere a Pablo y sus colaboradores. 'Nos' es la forma natural en español para este objeto pronominal.
- source_word: λογιζέσθω
  english_pob_choice: should regard
  chosen_spanish: debe considerarnos
  alternatives_spanish:
  - debe considerarnos como
  - debe estimarnos
  lexicon: BDAG
  rationale: El imperativo presente medio expresa una evaluación normativa. 'Debe considerarnos' comunica la obligación de formar este juicio sobre los ministros sin sonar arcaico.
- source_word: ἄνθρωπος
  english_pob_choice: a man
  chosen_spanish: cualquier persona
  alternatives_spanish:
  - una persona
  - alguien
  - uno
  lexicon: BDAG
  rationale: El sustantivo singular masculino funciona genéricamente. En español, 'cualquier persona' preserva el valor universal del enunciado y evita introducir una lectura restringida por género en el texto principal.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - en calidad de
  - a manera de
  lexicon: BDAG
  rationale: Marca la manera o función en que deben ser considerados.
- source_word: ὑπηρέτας
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - servidores
  lexicon: BDAG
  rationale: Aunque el inglés POB eligió 'servants' para no cargar el término con la fuerza de δοῦλος, el griego ὑπηρέτης aquí describe subordinación real en el servicio. 'Esclavos' refleja la fuerza relacional y jerárquica que el POB suele reservar cuando el contexto lo exige, sin confundirlo con δοῦλος.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título. Siguiendo el criterio del proyecto, 'Mesías' preserva el valor titular y evita la lectura meramente nominal de 'Cristo'.
- source_word: οἰκονόμους
  english_pob_choice: stewards
  chosen_spanish: administradores
  alternatives_spanish:
  - mayordomos
  - encargados
  lexicon: BDAG
  rationale: '''Administradores'' comunica la función de gestión delegada en un español claro y dignifiedo. ''Mayordomos'' es posible, pero puede sonar más tradicional que el sentido inmediato del término.'
- source_word: μυστηρίων
  english_pob_choice: the mysteries
  chosen_spanish: los misterios
  alternatives_spanish:
  - los secretos
  - los misterios revelados
  lexicon: BDAG
  rationale: Mantiene el término técnico paulino para realidades divinas antes ocultas y ahora reveladas. En español, 'misterios' conserva ese campo semántico sin añadir explicación interpretativa al texto principal.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Yahvé
  lexicon: BDAG
  rationale: 'El genitivo expresa posesión o procedencia: los misterios pertenecen a Dios y proceden de él. Aquí no hay base textual para reemplazar ''Dios'' por ''Yahvé'' en el español principal, pues el griego cita θεοῦ sin una señal explícita del nombre divino.'
theological_decisions:
- issue: Χριστοῦ como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El contexto presenta a Cristo como el Señor a quien sirven los ministros. Traducir el título por 'Mesías' conserva la referencia a la unción y evita convertirlo en un nombre propio opaco en español.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (cuando funciona como título)'
- issue: ἄνθρωπος con valor genérico
  english_pob_reading: a man
  chosen_spanish_reading: cualquier persona
  alternative_spanish_readings:
  - una persona
  - alguien
  rationale: El griego usa el singular masculino genérico para una instrucción abierta. En español, la formulación genérica más clara sin perder la universalidad es 'cualquier persona'; se conserva así el alcance inclusivo del texto sin masculinizarlo en la superficie.
  doctrine_reference: 'DOCTRINE.md Translation philosophy: renderizar con fidelidad al género gramatical cuando aporte contenido, pero mantener claridad natural en español'
- issue: ὑπηρέτας y el grado de subordinación
  english_pob_reading: servants
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  - servidores
  rationale: La relación descrita no es simplemente de asistencia voluntaria; ὑπηρέτης enfatiza servicio subordinado bajo autoridad. 'Esclavos' comunica con mayor fuerza la dependencia total de los ministros respecto de Mesías, sin confundirlo con la terminología de δοῦλος en otros pasajes.
  doctrine_reference: 'DOCTRINE.md lexical force: preserve strong service/subordination where warranted by context'
translation_notes:
  revision_awareness: 'La pauta inglesa pasó por una revisión que osciló entre ''Christ'' y ''Messiah'' y entre ''a man'' y ''a person''; el estado final restableció ''Messiah'' y mantuvo la lectura genérica de ἄνθρωπος. La versión española sigue esa resolución: conserva el título mesiánico como ''Mesías'' y expresa el sujeto genérico como ''cualquier persona'' para una lectura natural y fiel al griego.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός cuando funciona como título.
  - Se usa 'Dios' para θεοῦ conforme al estándar del proyecto.
  - '''Misterios'' conserva el tecnicismo paulino sin explicitarlo en el cuerpo del texto.'
  - El español principal evita 'SEÑOR' como máscara para el nombre divino porque aquí el griego no contiene יהוה ni una cita explícita del nombre.
  - Se opta por 'esclavos' para ὑπηρέτας por la fuerza de subordinación del contexto.
