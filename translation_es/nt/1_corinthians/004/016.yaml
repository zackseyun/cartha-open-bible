translation:
  language: es
  text: 'Por tanto, los exhorto: lleguen a ser imitadores[a] de mí[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lleguen a ser mis imitadores».'
    reason: lexical_alternative
  - marker: b
    text: 'Pablo más adelante especifica: «Sean imitadores de mí, así como yo también lo soy del Mesías» (1 Co 11:1).'
    reason: cross_reference
lexical_decisions:
- source_word: παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insisto
  - les suplico
  lexicon: BDAG
  rationale: παρακαλῶ expresa una apelación pastoral y exhortativa. En español, «les ruego» conserva el tono urgente y personal sin sonar tan técnico como «les exhorto», y funciona bien en un registro bíblico moderno.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: οὖν introduce una inferencia lógica. «Por tanto» mantiene con claridad la conexión argumentativa en un registro natural y digno.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - ustedes
  lexicon: BDAG
  rationale: El objeto directo plural se expresa naturalmente con el pronombre átono «les» en esta construcción de trato directo. Evita una redundancia poco fluida con «ustedes».
- source_word: μιμηταί
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  - emuladores
  lexicon: BDAG
  rationale: μιμητής se refiere a quien imita o emula un modelo. «Imitadores» es el equivalente más directo y preserva la fuerza lexical del término.
- source_word: μου
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - míos
  - mi
  lexicon: BDAG
  rationale: El genitivo con μιμηταί se expresa de manera natural en español como «de mí». «Míos» o «mi» sonarían menos precisos en esta construcción.
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: háganse
  alternatives_spanish:
  - vuelvanse
  - sean
  - lleguen a ser
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι marca entrada o adopción de un estado. «Háganse» comunica bien el matiz de llegar a ser o adoptar esa condición sin perder naturalidad en español.
theological_decisions:
- issue: El mandato de imitar a Pablo puede leerse de forma aislada y parecer excesivo si no se recuerda su contexto cristocéntrico más amplio.
  english_pob_reading: Translate the statement directly as 'become imitators of me' without softening it.
  chosen_spanish_reading: Traducirlo directamente como una exhortación a hacerse imitadores de Pablo, sin suavizar el enunciado.
  alternative_spanish_readings:
  - sigan mi ejemplo
  - háganse seguidores de mi ejemplo
  rationale: El griego presenta a Pablo como modelo inmediato en este versículo. La traducción debe conservar esa fuerza y dejar que el contexto posterior, no una reformulación atenuada, aporte la cualificación teológica.
  doctrine_reference: Mantener la tensión teológica sin resolverla dentro del versículo.
translation_notes:
  revision_awareness: La revisión más reciente no propuso cambios; el consenso del control cruzado es alto y confirma una concordancia plena con el análisis previo.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» en la nota de referencia cruzada conforme al criterio POB para Χριστός.
  - Se prefirió «Por tanto» para οὖν por su claridad inferencial en español.
  - «Háganse» conserva el valor imperativo de γίνομαι sin convertirlo en una mera instrucción estática.
  - La puntuación con dos puntos reproduce la transición exhortativa del original y hace fluida la apelación directa.
