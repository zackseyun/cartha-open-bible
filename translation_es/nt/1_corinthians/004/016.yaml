    text: 'Pablo más adelante especifica: «Sean imitadores de mí, así como yo también lo soy del Mesías» (1 Co 11:1).'
    reason: cross_reference
  revision_rationale: Se ajusta el texto para reflejar mejor el matiz exhortativo de παρακαλῶ y el sentido ingresivo de γίνεσθε en un español neutral y natural. «Los exhorto» evita la fricción de «les ruego» como construcción panhispánica, y «lleguen a ser» expresa con mayor claridad ‘become’ sin suavizar el mandato. Se conservan la lógica de οὖν, la fuerza léxica de μιμηταί y la nota contextual del v. 11:1.
