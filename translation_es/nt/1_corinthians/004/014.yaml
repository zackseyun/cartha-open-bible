translation:
  language: es
  text: No escribo estas cosas para avergonzarlos[a], sino amonestándolos[b] como a mis hijos amados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para hacerlos sentir vergüenza».
    reason: lexical_alternative
  - marker: b
    text: O «advirtiéndolos».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐντρέπων
  english_pob_choice: to shame
  chosen_spanish: avergonzarlos
  alternatives_spanish:
  - ponerlos en vergüenza
  - hacerlos avergonzar
  - avergonzarlos
  lexicon: BDAG
  rationale: El participio negado con οὐκ expresa que Pablo no escribe con la intención de producir vergüenza. «Avergonzarlos» conserva mejor el matiz de honor/vergüenza que «avergonzarlos» o «ponerlos en vergüenza» en español, y evita suavizar demasiado el golpe retórico.
- source_word: γράφω ταῦτα
  english_pob_choice: I am writing these things
  chosen_spanish: escribo estas cosas
  alternatives_spanish:
  - estoy escribiendo estas cosas
  - escribo esto
  - estoy escribiendo esto
  lexicon: BDAG
  rationale: El presente epistolar se conserva naturalmente con «escribo». «Estas cosas» reproduce el plural ταῦτα; «esto» sería más libre y perdería esa referencia plural.
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  - sino
  lexicon: BDAG
  rationale: En español, tras una negación previa, «sino» expresa mejor el contraste correctivo que «pero». Mantiene la oposición entre la intención negativa y la positiva.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como a
  alternatives_spanish:
  - como
  - como si fueran
  - en calidad de
  lexicon: BDAG
  rationale: La secuencia «como a mis hijos amados» comunica bien la relación pastoral y evita una construcción torpe en español. El «a» se requiere por la referencia personal implícita en el tratamiento relacional.
- source_word: τέκνα
  english_pob_choice: children
  chosen_spanish: hijos
  alternatives_spanish:
  - hijos e hijas
  - niños
  - hijos
  lexicon: BDAG
  rationale: Aunque τέκνα es genérico, en español «hijos» funciona de forma natural para la relación filial espiritual. «Hijos e hijas» añade explicitación no requerida por el griego y alargaría innecesariamente la frase.
- source_word: ἀγαπητὰ
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados
  - queridos
  - muy amados
  lexicon: BDAG
  rationale: «Amados» conserva el registro afectivo y eclesial de ἀγαπητά mejor que «queridos», que puede sonar más coloquial. No se intensifica a «muy amados» porque el griego no lo exige.
- source_word: νουθετῶν
  english_pob_choice: to admonish you
  chosen_spanish: amonestándolos
  alternatives_spanish:
  - amonestándolos
  - advirtiéndolos
  - corrigiéndolos
  lexicon: BDAG
  rationale: El participio expresa una acción pastoral correctiva. «Amonestar» conserva tanto la advertencia como la instrucción moral, y en español resulta más preciso que «corregir» o el más débil «advertir».
theological_decisions:
- issue: Tono pastoral de corrección sin humillación
  english_pob_reading: 'The verse is rendered to show loving correction rather than harsh condemnation: ''admonishing you as my beloved children.'''
  chosen_spanish_reading: 'Se traduce para mostrar corrección amorosa y no humillación: «amonestándolos como a mis hijos amados».'
  alternative_spanish_readings:
  - advirtiéndolos como a mis hijos amados
  - corrigiéndolos como a mis hijos amados
  - amonestándolos como a mis hijos queridos
  rationale: La doble estructura del versículo, con la negación de la vergüenza y el participio positivo, pide una lectura de reprensión pastoral. «Amonestar» comunica mejor esa mezcla de advertencia y cuidado que una fórmula puramente sancionadora.
  doctrine_reference: pastoral correction; spiritual fatherhood
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada para reflejar con mayor cercanía la estructura participial del griego, eliminando un infinitivo extra antes de «admonishing». La redacción española sigue esa misma decisión estructural: contrasta una finalidad negativa («para avergonzarlos») con un participio de acción pastoral («amonestándolos»), sin convertirlo en una paráfrasis más libre.'
  spanish_consistency_notes:
  - Se mantiene «Dios»/«Yahvé» fuera de este versículo; no aplica terminología divina aquí.
  - Se evita «Cristo» porque el versículo no lo contiene.
  - Se traduce τέκνα con un término filial natural en español, conservando el sentido relacional sin marcar género innecesariamente.
  - Se conserva el contraste retórico negativo/positivo del griego mediante «para... sino...», evitando una simplificación a dos infinitivos.
  - La puntuación reproduce la oposición y el giro explicativo del original, con coma antes de «sino» para facilitar la lectura pública.
