translation:
  language: es
  text: Pero para mí es de muy poca importancia[a] que yo sea examinado por ustedes o por cualquier tribunal humano; de hecho, ni siquiera me examino a mí mismo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «por un día humano», un modismo que significa juicio o evaluación humana.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐμοὶ
  english_pob_choice: to me
  chosen_spanish: para mí
  alternatives_spanish:
  - a mí
  - en mi caso
  lexicon: BDAG
  rationale: El dativo expresa referencia personal; «para mí» mantiene el punto de vista del hablante en español natural sin perder el matiz de valoración subjetiva.
- source_word: εἰς ἐλάχιστόν ἐστιν
  english_pob_choice: it is a very small thing
  chosen_spanish: es cosa muy pequeña
  alternatives_spanish:
  - es algo de poquísima importancia
  - me importa muy poco
  lexicon: BDAG
  rationale: La expresión es idiomática y señala insignificancia. «Cosa muy pequeña» preserva el valor de mínima importancia sin volverla demasiado explicativa o coloquial.
- source_word: ἵνα ὑφ’ ὑμῶν ἀνακριθῶ
  english_pob_choice: that I should be examined by you
  chosen_spanish: que yo sea examinado por ustedes
  alternatives_spanish:
  - que yo sea investigado por ustedes
  - que yo sea sometido a examen por ustedes
  lexicon: BDAG
  rationale: «Examinado» conserva el sentido de ἀνακρίνω como escrutinio o examen cuidadoso, no como condena final. Se mantiene la voz pasiva y la referencia directa a la comunidad.
- source_word: ὑπὸ ἀνθρωπίνης ἡμέρας
  english_pob_choice: by any human court
  chosen_spanish: por cualquier juicio humano
  alternatives_spanish:
  - por cualquier tribunal humano
  - por un día humano
  lexicon: BDAG
  rationale: La imagen literal «día humano» es un modismo; en español, «juicio humano» comunica la idea de evaluación meramente humana. «Cualquier» reproduce el alcance general que el inglés POB explicitó con 'any'.
- source_word: ἀλλ’ οὐδὲ
  english_pob_choice: in fact, ... not even
  chosen_spanish: de hecho, ni aun
  alternatives_spanish:
  - pero ni siquiera
  - más aún, ni siquiera
  lexicon: BDAG
  rationale: «De hecho» refleja el giro adversativo y enfático del ἀλλά, y «ni aun» conserva la fuerza de οὐδέ en un registro bíblico claro y natural.
- source_word: ἐμαυτὸν ἀνακρίνω
  english_pob_choice: I do not even examine myself
  chosen_spanish: ni aun me examino a mí mismo
  alternatives_spanish:
  - ni siquiera me examino
  - ni aun me someto a examen
  lexicon: BDAG
  rationale: Se conserva la cohesión léxica con ἀνακριθῶ mediante «examino». El reflexivo «a mí mismo» hace explícita la intensificación y evita ambigüedad en español.
theological_decisions:
- issue: Sentido de ἀνθρωπίνης ἡμέρας
  english_pob_reading: Idiomatic reference to human judgment or evaluation, not a calendrical day.
  chosen_spanish_reading: juicio humano
  alternative_spanish_readings:
  - tribunal humano
  - día humano
  rationale: El texto contrapone la evaluación humana con una medida superior en el contexto inmediato. «Juicio humano» comunica el modismo sin introducir una imagen secundaria innecesaria.
  doctrine_reference: 1 Co 4:4-5
- issue: Alcance de ἀνακρίνω
  english_pob_reading: Careful examination rather than final condemnation.
  chosen_spanish_reading: examinar
  alternative_spanish_readings:
  - juzgar
  - investigar
  rationale: «Examinar» preserva la distinción con vocablos de condena y encaja con el uso repetido del mismo verbo en la frase, manteniendo la tensión lexical del original.
  doctrine_reference: 1 Co 4:3-4
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el paquete fuente griego y concuerda con el audit trail en inglés: mantiene la repetición de ἀνακρίνω como «examinar», conserva el contraste con la evaluación meramente humana y evita traducir mecánicamente el modismo «día humano». No se registran revisiones posteriores que alteren el sentido.'
  spanish_consistency_notes:
  - Se prefirió «por» para la agencia en pasiva con ὑπό y «para mí» para el dativo de referencia.
  - Se mantuvo la misma raíz verbal «examinar» en las dos ocurrencias de ἀνακρίνω para preservar cohesión léxica.
  - «Ni aun» se usó dos veces para reflejar la intensificación negativa del griego y el énfasis retórico del versículo.
  - La nota al pie se ancla en «juicio humano» para señalar el modismo subyacente sin obligar al lector a la literalidad.
