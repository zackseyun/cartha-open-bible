translation:
  language: es
  text: Pero vendré a ustedes pronto[a], si el Señor quiere, y averiguaré no la manera de hablar[b] de los que están envanecidos, sino el poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «conoceré no la manera de hablar de los que están envanecidos, sino el poder».'
    reason: lexical_alternative
  - marker: b
    text: «Los que están envanecidos» traduce un término que Pablo usa repetidamente en esta carta para personas infladas de orgullo o arrogancia.
    reason: cross_reference
lexical_decisions:
- source_word: ἐλεύσομαι
  english_pob_choice: I will come
  chosen_spanish: iré
  alternatives_spanish:
  - vendré
  - estaré yendo
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι expresa movimiento hacia los corintios; en español, con la perspectiva del destinatario, «iré a ustedes» comunica naturalmente ese desplazamiento sin perder la fuerza futura.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce un leve contraste con la declaración anterior; «Pero» conserva ese matiz adversativo de forma clara y sobria.
- source_word: ταχέως
  english_pob_choice: soon
  chosen_spanish: pronto
  alternatives_spanish:
  - enseguida
  - dentro de poco
  lexicon: BDAG
  rationale: El adverbio señala cercanía temporal; «pronto» es el equivalente idiomático y formal en español.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - con ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: Con un verbo de movimiento, la construcción expresa dirección hacia las personas; «a ustedes» es natural y mantiene el sentido de movimiento hacia ellos.
- source_word: ἐὰν ὁ κύριος θελήσῃ
  english_pob_choice: if the Lord wills
  chosen_spanish: si el Señor quiere
  alternatives_spanish:
  - si el Señor lo quiere
  - si el Señor lo permite
  lexicon: BDAG
  rationale: La cláusula expresa dependencia de la voluntad del Señor. «Si el Señor quiere» es una fórmula natural en español y conserva la referencia explícita a la soberanía divina.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Maestro
  lexicon: BDAG
  rationale: Se conserva el término reverente y tradicional equivalente a κύριος. El texto no especifica más, por lo que no se añade una identificación doctrinal que el verso no explicita.
- source_word: γνώσομαι
  english_pob_choice: I will find out
  chosen_spanish: conoceré
  alternatives_spanish:
  - me enteraré
  - sabré
  lexicon: BDAG
  rationale: Aunque el verbo puede significar «saber» o «conocer», aquí alude a comprobar personalmente la realidad de la situación. «Conoceré» mantiene la amplitud semántica sin introducir una paráfrasis excesiva.
- source_word: τὸν λόγον
  english_pob_choice: the speech
  chosen_spanish: la palabra
  alternatives_spanish:
  - el discurso
  - las palabras
  lexicon: BDAG
  rationale: λόγος puede significar palabra, discurso o habla. En contraste con δύναμις, el sentido es la mera expresión verbal; «la palabra» conserva esa posibilidad semántica y la formalidad del registro.
- source_word: τῶν πεφυσιωμένων
  english_pob_choice: of those who are puffed up
  chosen_spanish: de los que están envanecidos
  alternatives_spanish:
  - de los soberbios
  - de los que se inflan de orgullo
  lexicon: BDAG
  rationale: El participio perfecto pasivo de φυσιόω describe un estado de orgullo o engreimiento. «Están envanecidos» preserva la metáfora de hinchazón/vanidad sin sonar demasiado áspero en español.
- source_word: ἀλλὰ τὴν δύναμιν
  english_pob_choice: but the power
  chosen_spanish: sino el poder
  alternatives_spanish:
  - pero el poder
  - sino la fuerza
  lexicon: BDAG
  rationale: 'La oposición final debe quedar clara en español: no mera palabra, sino poder efectivo. «Poder» reproduce la concisión de δύναμις y el contraste retórico del texto.'
theological_decisions:
- issue: Referencia de «el Señor» en la cláusula condicional
  english_pob_reading: Render generically as 'the Lord' without specifying whether Paul refers explicitly to Jesus or to God the Father.
  chosen_spanish_reading: Se mantiene «el Señor» sin precisar si se trata de Jesús o del Padre.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego usa ὁ κύριος sin aclaración adicional. En el contexto paulino puede tener fuerza cristológica, pero el versículo no obliga a especificarla; la traducción conserva esa apertura.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente
- issue: Contraste entre λόγος y δύναμις
  english_pob_reading: Translate as contrast between mere speech and actual power.
  chosen_spanish_reading: Se traduce como contraste entre mera palabra y poder real.
  alternative_spanish_readings:
  - contraste entre discurso y poder apostólico
  - contraste entre palabras y obras
  rationale: El contexto inmediato opone la pretensión verbal a la realidad efectiva. «Palabra» frente a «poder» deja abierta la extensión concreta del contraste sin reducirlo indebidamente.
  doctrine_reference: Primacía del texto original; no cerrar la tensión interpretativa
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que afinó λόγον de «talk» a «speech». En español se optó por «la palabra» para mantener registro formal y la amplitud semántica de λόγος, sin perder el contraste con «el poder» y sin forzar una paráfrasis demasiado estrecha. También se respetó la fórmula condicional tradicional «si el Señor quiere», según el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Señor» como equivalente reverente de κύριος, sin añadir especificación doctrinal que el verso no da.
  - «Poder» se conserva sin adjetivos, para reproducir la concisión de δύναμις.
  - El participio πεφυσιωμένων se vierte con un estado presente («están envanecidos») para reflejar la condición continua implícita en el griego perfecto.
  - La nota de alternativa en el texto se ancla en «pronto» para reflejar la posibilidad de leer la cláusula de manera más directa como ‘I will come to you soon’.
