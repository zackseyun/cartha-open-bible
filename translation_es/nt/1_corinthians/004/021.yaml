translation:
  language: es
  text: ¿Qué quieren? ¿He de ir a ustedes con una vara[a], o con amor y espíritu de mansedumbre?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «con amor y mansedumbre de espíritu».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «espíritu de mansedumbre» puede referirse a la disposición apacible de Pablo; algunos entienden aquí «espíritu» como una referencia implícita a la obra del Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: τί θέλετε
  english_pob_choice: What do you want?
  chosen_spanish: ¿Qué quieren?
  alternatives_spanish:
  - ¿Qué desean?
  - ¿Qué quieren ustedes?
  lexicon: BDAG
  rationale: La pregunta retórica se conserva de forma directa. «Quieren» es natural en español actual y mantiene el tono de desafío pastoral sin volverlo arcaico.
- source_word: ἐν ῥάβδῳ
  english_pob_choice: with a rod
  chosen_spanish: con vara
  alternatives_spanish:
  - con un bastón
  - con disciplina
  lexicon: BDAG
  rationale: «ῥάβδος» nombra literalmente una vara o bastón; «vara» conserva la imagen disciplinaria y su fuerza. «Disciplina» interpretaría demasiado el símil.
- source_word: ἔλθω πρὸς ὑμᾶς
  english_pob_choice: Should I come to you
  chosen_spanish: ¿Vendré a ustedes?
  alternatives_spanish:
  - ¿Debo ir a ustedes?
  - ¿He de venir a ustedes?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo se vierte con una pregunta natural en español. «Vendré» mantiene el matiz de decisión y la fuerza retórica del original.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  lexicon: BDAG
  rationale: Conjunción disyuntiva simple que contrasta dos maneras de venir.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: with love
  chosen_spanish: con amor
  alternatives_spanish:
  - en amor
  lexicon: BDAG
  rationale: El uso instrumental de ἐν se expresa con «con» para mantener el paralelismo con «con vara». «Amor» sigue el valor normal de ἀγάπη en el proyecto.
- source_word: πνεύματί τε πραΰτητος
  english_pob_choice: and a spirit of gentleness
  chosen_spanish: espíritu de mansedumbre
  alternatives_spanish:
  - un espíritu de mansedumbre
  - mansedumbre de espíritu
  - el Espíritu de mansedumbre
  lexicon: BDAG
  rationale: La frase se conserva como una expresión de disposición o carácter, sin forzar una referencia explícita al Espíritu Santo. «Mansedumbre» expresa bien πραΰτης con dignidad y precisión; en español, «espíritu de mansedumbre» suena más natural que una construcción más literal con artículo indefinido.
theological_decisions:
- issue: Sentido de πνεύματι en la cláusula final
  english_pob_reading: a spirit of gentleness, referring to Paul's manner or disposition rather than explicitly to the Holy Spirit
  chosen_spanish_reading: espíritu de mansedumbre, entendido como disposición o actitud de Pablo
  alternative_spanish_readings:
  - el Espíritu de mansedumbre, como referencia al Espíritu Santo
  - un espíritu manso
  rationale: 'El contraste inmediato es entre dos modos de acercarse a la comunidad: con severidad disciplinaria o con amor y mansedumbre. El griego no obliga a capitalizar πνεῦμα como referencia explícita al Espíritu Santo, aunque tampoco lo excluye como trasfondo de una actitud guiada por Dios.'
  doctrine_reference: 1 Corintios 4:21; cf. Gálatas 5:23 sobre πραΰτης como fruto del Espíritu
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: la nota [a] ahora está anclada explícitamente en el texto español en la frase «con vara[a]».'
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el nombre divino; aquí no aplica.
  - Se evitó «Cristo»/«Mesías» porque el versículo no contiene esos términos.
  - «Espíritu de mansedumbre» conserva la ambigüedad documentada sin imponer una lectura pneumatológica explícita.
