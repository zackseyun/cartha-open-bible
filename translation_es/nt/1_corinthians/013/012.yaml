translation:
  language: es
  text: Porque ahora vemos en un espejo[a], de manera enigmática, pero entonces cara a cara. Ahora conozco en parte, pero entonces conoceré plenamente, así como también he sido plenamente conocido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de forma enigmática». El griego dice más literalmente «en un enigma», destacando una percepción indirecta, no simplemente tenue.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέπομεν
  english_pob_choice: we see
  chosen_spanish: vemos
  alternatives_spanish:
  - miramos
  - percibimos
  lexicon: BDAG
  rationale: El verbo griego expresa visión con valor también cognitivo; «vemos» conserva la metáfora básica y suena natural en español. Evita sobreinterpretar como mero acto intelectual o como «miramos», que debilita el sentido de percepción resultante.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - por ahora
  - en este momento
  lexicon: BDAG
  rationale: Marca el contraste temporal con τότε («entonces»). «Ahora» mantiene la oposición directa y es idiomático en español.
- source_word: δι’ ἐσόπτρου
  english_pob_choice: in a mirror
  chosen_spanish: en un espejo
  alternatives_spanish:
  - a través de un espejo
  - por medio de un espejo
  lexicon: BDAG
  rationale: Aunque διά con genitivo puede sugerir mediación («a través de»), el español más natural para la imagen es «en un espejo». Conserva el ámbito visual de la comparación sin forzar una construcción menos idiomática.
- source_word: ἐν αἰνίγματι
  english_pob_choice: dimly
  chosen_spanish: de manera enigmática
  alternatives_spanish:
  - en un enigma
  - oscuremente
  - con oscuridad
  lexicon: BDAG
  rationale: El sustantivo αἴνιγμα significa «enigma, acertijo, cosa enigmática»; por eso se evita reducirlo a un adverbio interpretativo como «débilmente» o «tenuemente». «De manera enigmática» conserva la tensión lexical entre percepción indirecta y sentido de misterio.
- source_word: τότε δὲ
  english_pob_choice: but then
  chosen_spanish: pero entonces
  alternatives_spanish:
  - entonces
  - y entonces
  lexicon: BDAG
  rationale: δέ introduce contraste respecto del estado presente. «Pero entonces» reproduce el giro contrastivo con claridad y fluidez.
- source_word: πρόσωπον πρὸς πρόσωπον
  english_pob_choice: face to face
  chosen_spanish: cara a cara
  alternatives_spanish:
  - rostro a rostro
  - persona a persona
  lexicon: BDAG
  rationale: Es un modismo establecido que comunica encuentro directo y sin mediación. «Cara a cara» es la forma más natural en español y conserva el paralelismo con el griego.
- source_word: γινώσκω ἐκ μέρους
  english_pob_choice: I know in part
  chosen_spanish: conozco en parte
  alternatives_spanish:
  - sé en parte
  - conozco parcialmente
  lexicon: BDAG
  rationale: «En parte» refleja la locución idiomática ἐκ μέρους. Se prefirió «conozco» por su equilibrio entre conocimiento relacional e intelectual, y porque conserva el paralelismo con «conoceré plenamente».
- source_word: ἐπιγνώσομαι
  english_pob_choice: I will know fully
  chosen_spanish: conoceré plenamente
  alternatives_spanish:
  - sabré plenamente
  - conoceré completamente
  lexicon: BDAG
  rationale: El compuesto intensifica γινώσκω hacia un conocimiento más pleno. «Conoceré plenamente» conserva la progresión sin afirmar omnisciencia exhaustiva; además mantiene el eco verbal con «conozco».
- source_word: καθὼς καὶ ἐπεγνώσθην
  english_pob_choice: just as I also have been fully known
  chosen_spanish: así como también he sido plenamente conocido
  alternatives_spanish:
  - así como también fui plenamente conocido
  - tal como también he sido conocido
  lexicon: BDAG
  rationale: La pasiva aorista deja implícito al conocedor; el español pasivo mantiene esa reserva. «Plenamente conocido» reproduce la correspondencia léxica con ἐπιγνώσομαι y preserva la asimetría entre el conocer humano futuro y el ser ya conocido por Dios.
theological_decisions:
- issue: Alcance del conocimiento futuro frente al conocimiento divino
  english_pob_reading: I will know fully, just as I also have been fully known.
  chosen_spanish_reading: conoceré plenamente, así como también he sido plenamente conocido
  alternative_spanish_readings:
  - sabré todo
  - conoceré completamente
  rationale: 'Se conserva la fuerza de ἐπιγνώσομαι como conocimiento más pleno, pero no se exagera hacia omnisciencia. La comparación final preserva la asimetría: el creyente llegará a una plenitud de conocimiento acorde con la consumación, mientras que el conocimiento divino permanece normativo y antecedente.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla por exceso de precisión.
translation_notes:
  revision_awareness: 'La redacción sigue el giro revisado del contexto inglés: se evita una traducción demasiado literal como «a través de un espejo, en un enigma» y se opta por una formulación española fluida que todavía refleja los dos elementos griegos: mediación visual y carácter enigmático. También se evita diluir αἴνιγμα en una mera adverbialización de «dimly», manteniendo la tensión léxica documentada por la auditoría inglesa.'
  spanish_consistency_notes:
  - Se mantuvo «cara a cara» como equivalente idiomático de πρόσωπον πρὸς πρόσωπον.
  - Se usó «conocer/conocido» para conservar el paralelismo verbal con γινώσκω/ἐπιγινώσκω.
  - Se prefirió «plenamente» para ἐπιγνώσομαι y ἐπεγνώσθην, evitando tanto «completamente» como una lectura de omnisciencia.
  - Se eligió «Yahvé» por defecto solo cuando el texto lo requiera; este versículo no contiene el tetragrámaton ni κύριος en foco directo.
