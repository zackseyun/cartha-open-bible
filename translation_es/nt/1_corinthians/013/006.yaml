translation:
  language: es
  text: no se alegra de la injusticia[a], sino que se goza con la verdad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «maldad» o «hacer lo injusto»; también «iniquidad» para conservar más explícitamente el sentido moral amplio.
    reason: lexical_alternative
  - marker: b
    text: O «se goza en la verdad». El verbo compuesto griego puede significar compartir el gozo con la verdad o regocijarse por la verdad.
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρει
  english_pob_choice: rejoice
  chosen_spanish: se goza
  alternatives_spanish:
  - se alegra
  - se regocija
  lexicon: BDAG
  rationale: χαίρω expresa alegría o regocijo; en español, «gozarse» conserva el paralelo verbal con συγχαίρει y mantiene un registro digno y bíblico sin sonar arcaico en exceso.
- source_word: ἐπὶ τῇ ἀδικίᾳ
  english_pob_choice: at unrighteousness
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - por la injusticia
  - en la injusticia
  - de la maldad
  lexicon: BDAG
  rationale: Con χαίρω, ἐπί + dativo puede indicar ocasión o base del gozo. En español, «gozarse de» comunica de manera natural esa relación. ἀδικία puede ser «injusticia», «maldad» o «hacer lo malo»; «injusticia» preserva la amplitud moral y la fuerza ética del contraste paulino.
- source_word: συγχαίρει
  english_pob_choice: rejoices with
  chosen_spanish: se goza con
  alternatives_spanish:
  - se alegra con
  - comparte el gozo con
  - se regocija con
  lexicon: BDAG
  rationale: El prefijo συν- añade la idea de compartir la alegría. «Se goza con» refleja esa participación conjunta y mantiene la paralela antítesis con la primera cláusula.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: sino que
  alternatives_spanish:
  - pero
  - mas
  lexicon: BDAG
  rationale: Aquí δέ marca contraste fuerte entre dos conductas opuestas del amor. En español, «sino que» reproduce bien la oposición dentro de una sola construcción verbal.
- source_word: τῇ ἀληθείᾳ
  english_pob_choice: the truth
  chosen_spanish: la verdad
  alternatives_spanish:
  - la verdad misma
  - lo verdadero
  lexicon: BDAG
  rationale: ἀλήθεια puede abarcar verdad, realidad y veracidad; «la verdad» conserva el artículo y el contraste conceptual con ἀδικία sin restringir indebidamente el sentido a verdad doctrinal, moral o discursiva.
theological_decisions:
- issue: Contraste moral entre ἀδικία y ἀλήθεια
  english_pob_reading: unrighteousness ... the truth
  chosen_spanish_reading: injusticia ... la verdad
  alternative_spanish_readings:
  - maldad ... la verdad
  - injusticia ... lo verdadero
  rationale: 'El versículo presenta un contraste ético-teológico amplio: el amor no participa del mal y sí se alegra con lo verdadero. «Injusticia» conserva la dimensión moral y relacional sin reducir ἀδικία a un mero delito legal.'
  doctrine_reference: Translation philosophy §1, §5; campo semántico justicia/injusticia
- issue: Valor del compuesto συγχαίρει
  english_pob_reading: rejoices with the truth
  chosen_spanish_reading: se goza con la verdad
  alternative_spanish_readings:
  - se alegra con la verdad
  - se regocija con la verdad
  - se alegra en la verdad
  rationale: El POB inglés preserva la posibilidad de «rejoices in the truth» en nota. En español, «se goza con la verdad» mantiene la idea de compartir gozo con la verdad y evita sonar a simple asentimiento intelectual.
  doctrine_reference: BDAG; notas de equivalencia óptima del POB
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una preposición más natural para ἐπὶ con χαίρω y mantuvo el contraste con «rejoices with the truth». En español, se optó por «gozarse de» para reflejar esa relación de base/ocasión sin perder fluidez.
  spanish_consistency_notes:
  - Se mantuvo «verdad» sin capitalizar, conforme al uso normal en español y al artículo definido griego.
  - Se evitó «justicia» para ἀδικία a fin de no confundir el contraste con δικαιοσύνη/justicia en otros contextos paulinos.
  - La estructura «no ... sino que ...» reproduce el contraste adversativo del griego de forma natural en español.
