translation:
  language: es
  text: Porque sabemos en parte[a], y profetizamos en parte.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «parcialmente»; el modismo griego dice literalmente «desde una parte» y se repite para dar énfasis en ambas cláusulas.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκ μέρους
  english_pob_choice: in part
  chosen_spanish: en parte
  alternatives_spanish:
  - parcialmente
  lexicon: BDAG
  rationale: La locución griega ἐκ μέρους expresa una idea de parcialidad; en español, «en parte» conserva de manera natural la repetición paralela de ambos miembros y mantiene la misma tensión semántica frente a lo completo en el contexto inmediato.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamentación. «Porque» comunica bien esa relación causal/explanatoria en español sin perder la conexión con el contexto anterior.
- source_word: γινώσκομεν
  english_pob_choice: we know
  chosen_spanish: conocemos
  alternatives_spanish:
  - sabemos
  - entendemos
  lexicon: BDAG
  rationale: γινώσκω significa «conocer/saber». «Conocemos» preserva el sentido directo y puede abarcar tanto conocimiento como reconocimiento sin forzar una interpretación más fuerte como «entendemos».
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - además
  lexicon: BDAG
  rationale: La conjunción simplemente une dos cláusulas paralelas; «y» mantiene la simetría retórica del griego.
- source_word: προφητεύομεν
  english_pob_choice: we prophesy
  chosen_spanish: profetizamos
  alternatives_spanish:
  - hablamos proféticamente
  lexicon: BDAG
  rationale: En este contexto de dones espirituales, προφητεύω se traduce con el verbo normal «profetizar». «Hablamos proféticamente» explicita, pero debilita la terminología propia del pasaje.
theological_decisions:
- issue: Alcance de la profecía en la comunidad
  english_pob_reading: Render προφητεύομεν as 'we prophesy' without narrowing it to either predictive foretelling or general preaching.
  chosen_spanish_reading: Traducir «profetizamos» sin restringirlo ni a predecir el futuro ni a predicar de forma general.
  alternative_spanish_readings:
  - predecimos
  - predicamos
  rationale: El contexto inmediato trata de dones espirituales y no resuelve el debate sobre el alcance exacto de la profecía. La redacción española conserva esa amplitud teológica, igual que la POB inglesa.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto sigue el acuerdo alto del auditor inglés y no introduce cambios sustanciales; se mantiene la simetría de las dos cláusulas y la correspondencia de «en parte» con el modismo griego ἐκ μέρους.
  spanish_consistency_notes:
  - Se evita «SEÑOR» u otras sustituciones no presentes en el pasaje.
  - Se conserva el paralelismo entre las dos cláusulas con la misma locución «en parte».
  - «Profetizamos» mantiene la terminología bíblica común en español sin cerrar el sentido del término.
