translation:
  language: es
  text: Y si doy todos mis bienes, y si entrego mi cuerpo para ser quemado[a], pero no tengo amor, no gano nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «para jactarme» en lugar de «para ser quemado».
    reason: textual_variant
lexical_decisions:
- source_word: ψωμίσω
  english_pob_choice: give away
  chosen_spanish: entrego
  alternatives_spanish:
  - reparto
  - doy
  lexicon: BDAG
  rationale: El verbo griego alude a distribuir en porciones o dar en favor de otros; en este contexto, con «todos mis bienes», la idea es la entrega total de las posesiones. «Entrego» conserva esa donación completa sin forzar un matiz técnico poco natural en español.
- source_word: πάντα τὰ ὑπάρχοντά μου
  english_pob_choice: all my possessions
  chosen_spanish: todos mis bienes
  alternatives_spanish:
  - todo lo que poseo
  - todas mis posesiones
  lexicon: BDAG
  rationale: La expresión se refiere a las posesiones o propiedades materiales. «Todos mis bienes» es natural en español y mantiene el sentido concreto de pertenencias materiales.
- source_word: παραδῶ
  english_pob_choice: hand over
  chosen_spanish: entrego
  alternatives_spanish:
  - pongo en manos de
  - cedo
  lexicon: BDAG
  rationale: En español, «entregar» puede reproducir la fuerza formal de παραδίδωμι sin introducir la interpretación de «sacrificar». Aquí mantiene la solemnidad de ceder el propio cuerpo.
- source_word: τὸ σῶμά μου
  english_pob_choice: my body
  chosen_spanish: mi cuerpo
  lexicon: BDAG
  rationale: Es una correspondencia directa y concreta; no hace falta ampliar el sentido con una paráfrasis.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  lexicon: BDAG
  rationale: La cláusula de propósito en español puede expresarse de forma más natural con «para». Conserva la relación de finalidad del griego sin recargar la sintaxis.
- source_word: καυθήσομαι
  english_pob_choice: I may be burned
  chosen_spanish: ser quemado
  alternatives_spanish:
  - ser consumido por el fuego
  - quemado
  lexicon: BDAG
  rationale: El texto base SBLGNT lee una forma futura pasiva de καίω, «quemar». Por fidelidad al testimonio base, la traducción principal refleja el fuego/quemadura. Se mantiene un giro impersonal en español para evitar añadir agente inexistente.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: 'Se sigue la terminología POB habitual para ἀγάπη: «amor». «Caridad» resulta más tradicional, pero en español contemporáneo puede estrechar o arcaizar el sentido.'
- source_word: οὐδὲν ὠφελοῦμαι
  english_pob_choice: I gain nothing
  chosen_spanish: de nada me aprovecho
  alternatives_spanish:
  - no gano nada
  - nada gano
  lexicon: BDAG
  rationale: El verbo expresa no obtener beneficio. «De nada me aprovecho» conserva el resultado personal sin sonar forzado y mantiene la fuerza de inutilidad del enunciado.
- source_word: καὶ ἐὰν ... καὶ ἐὰν
  english_pob_choice: And if ... and if
  chosen_spanish: Y si ... y si
  alternatives_spanish:
  - Aunque ... y aunque
  - Si ... y si
  lexicon: BDAG
  rationale: Se conserva la repetición condicional del original para reproducir la escalada retórica de Pablo. No se comprime la estructura porque ello debilitaría el paralelismo.
theological_decisions:
- issue: Variante textual en la cláusula de propósito
  english_pob_reading: Translate the SBLGNT reading καυθήσομαι as 'I may be burned' in the main text, with a footnote for the variant 'I may boast.'
  chosen_spanish_reading: Traducir la lectura del texto base como «ser quemado» y anotar la variante «jactarme» en nota.
  alternative_spanish_readings:
  - jactarme
  - gloriarme
  rationale: El texto fuente provisto es SBLGNT, así que la versión principal sigue esa lectura. Dado que la variante cambia de manera real el sentido —muerte por fuego frente a motivo de jactancia— conviene explicitarla en una nota textual en vez de ocultarla.
  doctrine_reference: Translation philosophy §1 (primacía del original) y §3 (preservar tensiones textuales reales)
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés sin aplicar revisiones adicionales; no hubo cambios pendientes en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantuvo «amor» para ἀγάπη, conforme al criterio POB y al uso contemporáneo claro en español.
  - Se usó «entregar» para ambos verbos griegos de donación/ceder, porque en español comunica bien la entrega total y preserva la solemnidad del paralelismo.
  - La nota textual se ancla solo en la variante relevante y no introduce otras conjeturas no atestiguadas.
