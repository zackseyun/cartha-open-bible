translation:
  language: es
  text: Todo lo sobrelleva[a], todo lo cree, todo lo espera[b], todo lo soporta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo cubre» o «lo protege». στέγει puede llevar la idea de cubrir o proteger, además de sobrellevar o soportar.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «confía en todo». El sentido no es que el amor sea crédulo, sino que se inclina hacia la confianza.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo lo
  alternatives_spanish:
  - todo
  - todas las cosas
  lexicon: BDAG
  rationale: El neutro plural repetido funciona de manera comprehensiva con cada verbo. En español, la repetición de "todo lo" conserva la brevedad y el paralelismo retórico sin sobrecargar con "cosas", que suena más pesado y menos natural en esta serie.
- source_word: στέγει
  english_pob_choice: bears
  chosen_spanish: lo cubre
  alternatives_spanish:
  - lo soporta
  - lo aguanta
  - lo protege
  lexicon: BDAG
  rationale: στέγω puede expresar la idea de cubrir/proteger y, por extensión, soportar. Aquí opto por "lo cubre" porque preserva la posible imagen de cobertura/protección que el inglés POB dejó abierta en nota, y en español esa opción mantiene la tensión léxica sin perder la fuerza de resistencia implícita.
- source_word: πιστεύει
  english_pob_choice: believes
  chosen_spanish: lo cree
  alternatives_spanish:
  - confía en ello
  - lo confía
  lexicon: BDAG
  rationale: '"Cree" reproduce de modo directo πιστεύω y mantiene la correspondencia léxica. En este contexto no implica credulidad ingenua, sino una disposición favorable a confiar; por eso el pronombre neutro "lo" conserva la amplitud del griego πάντα.'
- source_word: ἐλπίζει
  english_pob_choice: hopes
  chosen_spanish: lo espera
  alternatives_spanish:
  - sigue esperando
  - tiene esperanza
  lexicon: BDAG
  rationale: '"Espera" comunica bien el valor de ἐλπίζω en una serie breve y paralela. Con "lo" se preserva la referencia amplia y el tono proverbial del versículo, sin añadir contenido interpretativo.'
- source_word: ὑπομένει
  english_pob_choice: endures
  chosen_spanish: lo soporta
  alternatives_spanish:
  - persevera en ello
  - permanece firme ante ello
  lexicon: BDAG
  rationale: ὑπομένω incluye la idea de permanecer bajo presión, resistir y perseverar. "Lo soporta" es natural en español y comunica bien la resistencia activa que culmina la serie; dejo "persevera" como alternativa porque también es válida, pero menos compacta aquí.
theological_decisions:
- issue: Sentido de los cuatro πάντα en la descripción del amor
  english_pob_reading: The language is rhetorical and character-descriptive, expressing love's comprehensive steadfastness rather than an absolute claim that love approves or credulously accepts every possible thing.
  chosen_spanish_reading: 'El lenguaje es retórico y describe el carácter del amor: su firmeza abarcadora, no una afirmación de que el amor apruebe o crea ingenuamente todo.'
  alternative_spanish_readings:
  - El amor acepta todo sin discernimiento.
  - El amor cree cualquier cosa.
  rationale: La repetición de πάντα es una figura retórica que describe la amplitud de la actitud del amor. Mantengo la tensión sin resolverla hacia una credulidad moralmente ingenua; así, "todo" conserva la fuerza del original y evita suavizar el texto hacia una idea más piadosa pero menos precisa.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo en la revisión más reciente: el texto inglés auditado quedó sin cambios y el veredicto de control fue de concordancia alta. La versión española sigue esa lectura y conserva las alternativas léxicas pertinentes en nota.'
  spanish_consistency_notes:
  - Se mantiene el paralelismo de cuatro cláusulas con la repetición de «todo lo» para reproducir el ritmo del griego.
  - Se evita «caridad» o «amor ágape» para no introducir una glosa interpretativa no presente en el texto fuente.
  - Se usa «cree» y no «confía» como término principal para mantener la conexión léxica directa con πιστεύω, dejando la matización en nota.
