translation:
  language: es
  text: Cuando yo era niño, hablaba como niño, pensaba como niño, razonaba como niño. Cuando llegué a ser hombre, dejé a un lado las cosas del niño[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas infantiles» o «los modos de un niño». El griego dice literalmente «las cosas del niño».
    reason: lexical_alternative
lexical_decisions:
- source_word: νήπιος
  english_pob_choice: child
  chosen_spanish: niño
  alternatives_spanish:
  - infante
  - pequeño niño
  lexicon: BDAG
  rationale: νήπιος puede referirse a un niño pequeño o a alguien inmaduro. En español, «niño» comunica bien la imagen natural y mantiene el contraste con «hombre» sin estrechar demasiado el sentido como haría «infante».
- source_word: ἐλάλουν
  english_pob_choice: I spoke
  chosen_spanish: hablaba
  alternatives_spanish:
  - hablé
  - decía
  lexicon: BDAG
  rationale: 'λαλέω aquí expresa el acto de hablar. El imperfecto español «hablaba» preserva el aspecto durativo/iterativo de la serie: hablaba, pensaba, razonaba.'
- source_word: ἐφρόνουν
  english_pob_choice: I thought
  chosen_spanish: pensaba
  alternatives_spanish:
  - tenía la mente puesta en
  - tenía la actitud de
  lexicon: BDAG
  rationale: φρονέω puede abarcar pensamiento, disposición mental o actitud. «Pensaba» es la opción más natural y mantiene la progresión paralela del verso.
- source_word: ἐλογιζόμην
  english_pob_choice: I reasoned
  chosen_spanish: razonaba
  alternatives_spanish:
  - consideraba
  - sopesaba
  lexicon: BDAG
  rationale: λογίζομαι apunta al proceso mental de calcular, considerar o razonar. «Razonaba» distingue este verbo de ἐφρόνουν y conserva el matiz intelectual.
- source_word: ἀνήρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - adulto
  - varón
  lexicon: BDAG
  rationale: ἀνήρ contrasta directamente con νήπιος y en este contexto se refiere al estado de madurez. «Hombre» conserva el contraste léxico y la forma más directa del griego.
- source_word: κατήργηκα
  english_pob_choice: I put away
  chosen_spanish: dejé atrás
  alternatives_spanish:
  - abandoné
  - puse a un lado
  lexicon: BDAG
  rationale: καταργέω puede significar abolir, dejar sin efecto o hacer inoperante. En esta metáfora de maduración personal, «dejé atrás» expresa de forma idiomática que las cosas infantiles han quedado superadas.
- source_word: τὰ τοῦ νηπίου
  english_pob_choice: the things of the child
  chosen_spanish: las cosas del niño
  alternatives_spanish:
  - las cosas infantiles
  - los modos de niño
  lexicon: BDAG
  rationale: La frase griega es literalmente «las cosas del niño». Se conserva esa concreción para reflejar la observación auditada de la POB inglesa y su nota sobre la posible lectura idiomática.
theological_decisions:
- issue: Contraste de género en ἀνήρ
  english_pob_reading: man
  chosen_spanish_reading: hombre
  alternative_spanish_readings:
  - adulto
  - persona adulta
  rationale: El griego usa ἀνήρ, masculino singular, en contraste con νήπιος. La traducción mantiene «hombre» para respetar el contraste léxico y la política de precisión de género del proyecto, sin convertir el ejemplo de Pablo en una afirmación sobre superioridad masculina.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: 'El audit trail inglés indica una revisión final sin cambios sustanciales y un nivel alto de acuerdo, con una sola observación menor sobre la formulación alternativa de τὰ τοῦ νηπίου. La redacción española conserva esa tensión: mantiene la literalidad de «las cosas del niño» en el texto principal y ofrece una alternativa idiomática en nota.'
  spanish_consistency_notes:
  - 'Se conserva la cadena paralela imperfectiva: «hablaba / pensaba / razonaba».'
  - Se evita «Cristo» u otras terminologías no implicadas en este versículo.
  - «Hombre» se usa para ἀνήρ por fidelidad al contraste con «niño».
  - La nota a conserva la alternativa idiomática sin borrar la literalidad griega.
  - El texto principal sigue un español natural pero con transparencia suficiente para auditoría.
