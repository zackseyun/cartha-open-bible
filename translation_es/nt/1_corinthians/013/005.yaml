translation:
  language: es
  text: no se comporta indecorosamente[a], no busca lo suyo[b], no se deja provocar[c], no toma en cuenta el agravio[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «actúa de manera impropia» o «se comporta con rudeza».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «busca lo suyo»; es decir, no es egoísta ni busca su propio provecho.
    reason: lexical_alternative
  - marker: c
    text: O «no se irrita» o «no se enoja fácilmente».
    reason: alternative_reading
  - marker: d
    text: O «no lleva cuenta del agravio». Literalmente, «no cuenta el agravio».
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσχημονεῖ
  english_pob_choice: behave disgracefully
  chosen_spanish: se comporta indecorosamente
  alternatives_spanish:
  - se comporta vergonzosamente
  - actúa de manera impropia
  - se comporta con rudeza
  lexicon: BDAG
  rationale: El verbo expresa conducta impropia, vergonzosa o indecorosa. «Se comporta indecorosamente» conserva el valor moral/social sin cargar el texto con una paráfrasis más fuerte que el griego ni limitarlo solo a grosería.
- source_word: ζητεῖ τὰ ἑαυτῆς
  english_pob_choice: seek its own
  chosen_spanish: busca lo suyo
  alternatives_spanish:
  - busca sus propios intereses
  - insiste en su propia manera
  - busca lo que le pertenece
  lexicon: BDAG
  rationale: La frase es literalmente «buscar las cosas propias». «Busca lo suyo» mantiene la brevedad idiomática y deja visible el matiz de auto-búsqueda que la nota inglesa también preserva.
- source_word: παροξύνεται
  english_pob_choice: is provoked
  chosen_spanish: se irrita
  alternatives_spanish:
  - se provoca
  - se enoja fácilmente
  - se exaspera
  lexicon: BDAG
  rationale: El verbo comunica ser impulsado a irritación o enojo agudo. En español, «se irrita» transmite ese efecto de forma natural sin introducir el adverbio «fácilmente», que no está explícito en el griego.
- source_word: λογίζεται τὸ κακόν
  english_pob_choice: does not count the wrong
  chosen_spanish: no toma en cuenta el mal
  alternatives_spanish:
  - no cuenta el mal
  - no lleva registro del mal
  - no considera el mal
  lexicon: BDAG
  rationale: El verbo es de cálculo/contabilidad mental. «No toma en cuenta el mal» comunica el sentido de no llevarlo a cuenta o no imputarlo, y en español suena más fluido que un calco como «no cuenta el mal», sin perder la metáfora.
- source_word: τὸ κακόν
  english_pob_choice: wrong
  chosen_spanish: el mal
  alternatives_spanish:
  - el agravio
  - lo malo
  - el daño
  lexicon: BDAG
  rationale: En este contexto relacional, el neutro singular puede referirse al mal o al agravio considerado como ofensa. «El mal» conserva amplitud semántica y encaja con el verbo de contabilizar/imputar.
- source_word: ἀγάπη (implícita en el contexto)
  english_pob_choice: it
  chosen_spanish: se
  alternatives_spanish:
  - el amor
  lexicon: Contexto inmediato / 1 Corintios 13
  rationale: El sujeto sigue siendo «el amor» del contexto anterior. El español permite omitirlo en cada miembro de la serie y usar la construcción pronominal natural para mantener fluidez sin perder referencia.
theological_decisions:
- issue: Si intensificar παροξύνεται con una idea de irritación «fácil» o mantener el verbo simple
  english_pob_reading: is not provoked
  chosen_spanish_reading: no se irrita
  alternative_spanish_readings:
  - no se enoja fácilmente
  - no se exaspera
  rationale: El griego no añade un modificador explícito. Mantener «no se irrita» respeta la forma breve y deja la intensidad inferida por el contexto de la descripción del amor.
  doctrine_reference: 'Principios de traducción POB: fidelidad al texto base y no añadir matices no expresados'
- issue: 'Cómo verter λογίζεται τὸ κακόν: si como una frase idiomática de memoria de ofensas o como el verbo contable más literal'
  english_pob_reading: does not count the wrong
  chosen_spanish_reading: no toma en cuenta el mal
  alternative_spanish_readings:
  - no cuenta el mal
  - no lleva registro de agravios
  - no guarda rencor
  rationale: El griego conserva la metáfora contable en singular. «No toma en cuenta el mal» mantiene la idea de no imputar o no contabilizar el mal sufrido, sin pluralizar «ofensas» ni introducir «rencor», que no aparecen en el texto.
  doctrine_reference: 'Principios de traducción POB: preservar metáforas y tensiones léxicas del original'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión inglesa más reciente que prefirió «count the wrong» por naturalidad, junto con la advertencia anterior sobre no expandir παροξύνεται con un adverbio no explícito. La versión española conserva ambos puntos: evita intensificar el verbo de irritación y usa una formulación natural para λογίζεται τὸ κακόν sin perder la metáfora contable.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo exija; aquí no aparece el nombre divino.
  - Se evita «Cristo» porque no forma parte de este versículo.
  - Se mantiene un registro bíblico moderno y sobrio, sin calcos pesados.
  - «El mal» se eligió para conservar la amplitud del singular griego τὸ κακόν.
  - Las notas preservan las alternativas relevantes del audit trail inglés sin introducir lecturas doctrinalmente ajenas.
