translation:
  language: es
  text: 'Y ahora[a] permanecen[b] estos tres: la fe[c], la esperanza y el amor. Pero el mayor de ellos es el amor.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Pero ahora". El griego νυνὶ δέ puede traducirse con un matiz de continuación o de contraste suave.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "perduran" o "continúan". El verbo μένω puede expresar permanecer, continuar o durar.'
    reason: lexical_alternative
  - marker: c
    text: '"Fe" también puede entenderse más ampliamente como "confianza", aunque "fe" es la traducción estándar aquí.'
    reason: alternative_reading
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: And now
  chosen_spanish: Y ahora
  alternatives_spanish:
  - Ahora
  - Pero ahora
  lexicon: BDAG
  rationale: νυνί señala el estado presente o conclusivo (“ahora”), mientras que δέ aporta una transición suave con matiz de contraste o continuación. “Y ahora” mantiene ese movimiento discursivo en español sin forzar un contraste más fuerte de lo que pide el griego.
- source_word: μένει
  english_pob_choice: remain
  chosen_spanish: permanecen
  alternatives_spanish:
  - perduran
  - continúan
  - permanecen
  lexicon: BDAG
  rationale: μένω aquí expresa seguir existiendo, durar o continuar. “Permanecen” es natural en español y conserva la idea de duración frente a los dones que pasan.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: la fe
  alternatives_spanish:
  - la confianza
  - la fidelidad
  lexicon: BDAG
  rationale: En esta tríada paulina, πίστις se entiende de forma estándar como “fe”. “Confianza” es posible pero más estrecha; “fidelidad” desplaza el énfasis hacia otra cualidad y no es la lectura principal aquí.
- source_word: ἐλπίς
  english_pob_choice: hope
  chosen_spanish: la esperanza
  alternatives_spanish:
  - la expectativa
  lexicon: BDAG
  rationale: ἐλπίς en Pablo suele significar “esperanza” en sentido teológico. “Esperanza” comunica bien la virtud escatológica sin perder naturalidad en español.
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: el amor
  alternatives_spanish:
  - la caridad
  lexicon: BDAG
  rationale: Siguiendo el criterio del POB, ἀγάπη se traduce como “amor”. “Caridad” pertenece a un registro tradicional pero hoy puede sonar ambiguo o restringido.
- source_word: τὰ τρία ταῦτα
  english_pob_choice: these three
  chosen_spanish: estas tres
  alternatives_spanish:
  - estas tres cosas
  - las tres
  lexicon: BDAG
  rationale: La expresión remite a los tres sustantivos anteriores. “Estas tres” reproduce de modo conciso y fiel el deíctico griego sin añadir palabras innecesarias.
- source_word: μείζων
  english_pob_choice: the greatest
  chosen_spanish: el mayor
  alternatives_spanish:
  - el más grande
  - superior
  lexicon: BDAG
  rationale: Aunque morfológicamente es comparativo, el sentido contextual es jerárquico dentro del conjunto. “El mayor” suena natural en español y preserva la valoración relativa de la caridad/amor frente a fe y esperanza.
- source_word: τούτων
  english_pob_choice: of these
  chosen_spanish: de ellas
  alternatives_spanish:
  - entre ellas
  - de estas
  lexicon: BDAG
  rationale: El genitivo comparativo indica comparación dentro del grupo mencionado. “De ellas” hace explícito en español que el amor es el mayor entre las tres virtudes nombradas.
theological_decisions:
- issue: Valor de πίστις en la tríada paulina
  english_pob_reading: faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - la confianza
  - la fidelidad
  rationale: La tríada “fe, esperanza y amor” es la formulación paulina establecida y el contexto favorece “fe” como equivalente principal de πίστις. No se reinterpreta como “fidelidad” porque eso alteraría el paralelismo recibido.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith'
- issue: Relación entre la comparación μείζων τούτων y la clausula final
  english_pob_reading: the greatest of these is love
  chosen_spanish_reading: el mayor de ellas es el amor
  alternative_spanish_readings:
  - el mayor entre ellas es el amor
  - el más grande de ellas es el amor
  rationale: El griego expresa que el amor supera a las otras dos virtudes. “El mayor de ellas” conserva la comparación interna sin convertirla en una paráfrasis más explicativa de lo que permite el texto.
  doctrine_reference: Comentario sintáctico del griego de 1 Corintios 13:13
translation_notes:
  revision_awareness: 'Se siguió la lectura revisada del POB inglés, que mantiene el orden retórico: afirmación temporal, lista de las tres virtudes y sentencia comparativa final. No se introdujeron cambios textuales ni notas de variante crítica.'
  spanish_consistency_notes:
  - Se mantiene el par triádico estándar “fe, esperanza y amor” para conservar la resonancia paulina en español.
  - Se evita “caridad” por coherencia con el criterio léxico del POB y por inteligibilidad moderna.
  - Se optó por “Y ahora” como equivalente idiomático de νυνὶ δέ, sin forzar un giro adversativo excesivo.
