revisions:
- from: Si hablo en las lenguas[a] de los hombres y de los ángeles[b], pero no tengo amor, he llegado a ser bronce que resuena o un címbalo que retiñe[c].
  to: Si hablo en las lenguas[a] de los hombres[b] y de los ángeles, pero no tengo amor, he llegado a ser bronce que resuena[c] o un címbalo estridente.
  rationale: La revisión mantiene el contenido del borrador pero corrige el anclaje de notas para que corresponda al lugar semántico correcto en español y suaviza una formulación menos natural ('que retiñe') a 'estridente', que comunica mejor el valor de ἀλαλάζον sin perder fidelidad. También se ajusta la nota final para explicar con más precisión que la primera imagen nombra metal sonoro y no un instrumento específico.
