base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/013/001.yaml
  text: If I speak in the tongues of men and of angels[a], but do not have love[c][b], I have become sounding bronze or a clashing cymbal.
  footnotes:
  - marker: a
    text: Or 'languages.' The Greek word can refer to tongues or languages; here 'tongues' preserves the connection with the Corinthian discussion of inspired speech.
    reason: lexical_alternative
  - marker: b
    text: '''Men'' here means human beings, in contrast with angels.'
    reason: lexical_alternative
  - marker: c
    text: Or 'resounding brass' or 'a ringing gong.' The Greek names sounding metal rather than a specific instrument.
    reason: lexical_alternative
