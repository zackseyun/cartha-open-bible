translation:
  language: es
  text: Si hablo en las lenguas[a] de los hombres[b] y de los ángeles, pero no tengo amor, he llegado a ser bronce que resuena[c] o un címbalo estridente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘idiomas’. La palabra griega puede referirse a lenguas o idiomas; aquí ‘lenguas’ conserva la relación con la discusión corintia sobre el hablar inspirado.
    reason: lexical_alternative
  - marker: b
    text: ‘Hombres’ aquí significa seres humanos, en contraste con los ángeles.
    reason: lexical_alternative
  - marker: c
    text: O ‘bronce resonante’ o ‘un gong que resuena’. El griego nombra un metal sonoro más que un instrumento específico en la primera imagen.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si alguna vez
  - Aunque
  lexicon: BDAG
  rationale: Introduce una condición hipotética en español con naturalidad y conserva el planteamiento retórico del versículo.
- source_word: ταῖς γλώσσαις
  english_pob_choice: in the tongues
  chosen_spanish: en las lenguas
  alternatives_spanish:
  - en las lenguas habladas
  - en los idiomas
  lexicon: BDAG
  rationale: γλῶσσα puede significar 'lengua' o 'idioma'. 'Lenguas' mantiene la conexión con el pasaje sobre las lenguas, sin resolverla prematuramente como meros idiomas humanos.
- source_word: τῶν ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de los seres humanos
  - de las personas
  lexicon: BDAG
  rationale: Aquí ἄνθρωπος contrasta con ἄγγελοι. 'Hombres' reproduce esa antítesis compacta y sigue la decisión inglesa de conservar el contraste representativo con la humanidad.
- source_word: καὶ τῶν ἀγγέλων
  english_pob_choice: and of angels
  chosen_spanish: y de los ángeles
  alternatives_spanish:
  - y de mensajeros
  lexicon: BDAG
  rationale: El contraste con 'los hombres' favorece el sentido de seres celestiales. 'Ángeles' es la lectura normal y más directa del texto.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: En 1 Corintios 13, ἀγάπη se traduce mejor como 'amor' en español contemporáneo, evitando el matiz arcaico o eclesiástico de 'caridad'.
- source_word: δὲ μὴ ἔχω
  english_pob_choice: but do not have
  chosen_spanish: pero no tengo
  alternatives_spanish:
  - pero no poseo
  - sino que no tengo
  lexicon: BDAG
  rationale: '''Pero no tengo'' reproduce con claridad la oposición de δέ y la negación de posesión expresada por ἔχω.'
- source_word: γέγονα
  english_pob_choice: I have become
  chosen_spanish: he llegado a ser
  alternatives_spanish:
  - me he vuelto
  - he venido a ser
  lexicon: BDAG
  rationale: El perfecto griego expresa un estado resultante. 'He llegado a ser' conserva ese resultado sin sonar rígido en español.
- source_word: χαλκὸς ἠχῶν
  english_pob_choice: sounding bronze
  chosen_spanish: bronce que resuena
  alternatives_spanish:
  - bronce resonante
  - bronce sonoro
  - bronce que suena
  lexicon: BDAG
  rationale: χαλκός nombra un metal sonoro, no un instrumento concreto. 'Bronce que resuena' conserva la imagen del material que produce sonido y evita sobreespecificar con 'brass' u otro metal.
- source_word: ἢ κύμβαλον ἀλαλάζον
  english_pob_choice: or a clashing cymbal
  chosen_spanish: o un címbalo que retiñe
  alternatives_spanish:
  - o un címbalo resonante
  - o un címbalo que choca
  - o un címbalo ruidoso
  lexicon: BDAG
  rationale: κύμβαλον es 'címbalo'. El participio ἀλαλάζον comunica un ruido agudo y estridente; 'que retiñe' transmite ese sonido penetrante en un español sobrio.
theological_decisions:
- issue: Sentido de 'las lenguas de los hombres y de los ángeles'
  english_pob_reading: Rendered straightforwardly as a rhetorical contrast between human and angelic tongues without deciding whether Paul refers to actual angelic languages or hyperbolic speech.
  chosen_spanish_reading: Se conserva el contraste entre lenguas humanas y angelicales sin decidir si Pablo habla de lenguajes angélicos literales o de hipérbole retórica.
  alternative_spanish_readings:
  - lenguajes celestiales reales
  - hipérbole para el habla más elevada imaginable
  rationale: El texto no obliga a resolver la cuestión. La traducción debe preservar la tensión teológica y retórica sin imponer una conclusión doctrinal sobre las lenguas.
  doctrine_reference: Preservar la tensión teológica sin resolverla
- issue: Valor representativo de ἀνθρώπων
  english_pob_reading: men
  chosen_spanish_reading: hombres
  alternative_spanish_readings:
  - seres humanos
  - personas
  rationale: El contraste es con ángeles, no una discusión sobre sexo biológico. 'Hombres' mantiene la brevedad y la fuerza del contraste, mientras que la nota puede explicitar el valor inclusivo del griego.
  doctrine_reference: Precisión léxica y fidelidad al contraste del texto
- issue: Imagen sonora final
  english_pob_reading: sounding bronze / clashing cymbal
  chosen_spanish_reading: bronce que resuena / un címbalo que retiñe
  alternative_spanish_readings:
  - bronce resonante / un címbalo ruidoso
  - bronce sonoro / un címbalo que choca
  rationale: Pablo usa una imagen de metal sonoro y percusión estridente. El español debe conservar la metáfora auditiva sin convertirla en un instrumento distinto ni suavizar su aspereza.
  doctrine_reference: Conservar la imaginería y el golpe retórico del pasaje
translation_notes:
  revision_awareness: Esta redacción sigue de cerca el texto griego SBLGNT y la decisión inglesa POB revisada, sin cambios sustanciales respecto del último pase auditado. Se mantiene la tensión entre 'lenguas' y 'idiomas', el contraste humano/angélico y la imagen final de metal sonoro más címbalo estridente.
  spanish_consistency_notes:
  - Se mantiene 'amor' para ἀγάπη, conforme al estándar del proyecto en contextos de 1 Corintios 13.
  - Se usa 'lenguas' en el texto principal y se preserva la alternativa 'idiomas' en nota, para no perder el vínculo con el tema paulino de las lenguas.
  - '''Bronce'' se usa para χαλκός con una nota que evita imponer una identificación instrumental o metalúrgica más precisa de la que ofrece el griego.'
  - La puntuación y el orden reflejan la sintaxis del original sin forzar una estructura demasiado literal en español.
