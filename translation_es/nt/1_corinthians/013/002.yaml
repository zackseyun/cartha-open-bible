review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura condicional del griego y conserva adecuadamente los términos clave: profecía, misterios, conocimiento, fe, amor y la imagen de mover montañas. Sin embargo, la nota al pie [a] no sigue fielmente la auditoría inglesa: invierte la probabilidad de las alternativas para εἰδῶ. El texto principal está sustancialmente alineado con el sentido fuente.'
  spanish_quality_summary: El español es claro, natural y de registro bíblico moderno. 'Y si tengo... y si tengo...' funciona bien; 'como para mover montañas' es idiomático. 'Nada soy' es aceptable y digno. La principal corrección necesaria está en la nota, no en la redacción principal.
  glossary_alignment: 'La terminología del proyecto está bien respetada en este versículo: ἀγάπη → ''amor'', πίστις → ''fe'', μυστήρια → ''misterios'', γνῶσις → ''conocimiento''. No hay conflictos con los defaults doctrinales o léxicos. La excepción problemática es solo la formulación de la nota lexical sobre εἰδῶ, que debe reflejar que ''sé'' es la alternativa más cercana y ''comprendo'' la menos preferida, no al revés.'
  issues:
  - severity: medium
    issue: La nota al pie [a] invierte las alternativas de εἰδῶ respecto de la auditoría inglesa.
    rationale: El English POB tiene como texto principal 'understand' y como alternativa 'know'. En español, si el texto principal es 'entiendo', la alternativa natural es 'sé'; 'comprendo' no debe presentarse como menos probable si es prácticamente sinónima del principal. La nota actual ('O “sé”; menos probable, “comprendo”') no preserva fielmente la lógica documentada.
  revised_spanish_text: Y si tengo profecía y entiendo[a] todos los misterios y todo conocimiento, y si tengo toda la fe como para mover montañas, pero no tengo amor, nada soy.
  revised_footnotes:
  - marker: a
    text: O ‘sé’. El verbo griego puede expresar conocimiento, pero aquí ‘entiendo’ encaja mejor con ‘misterios’ y mantiene el matiz cognitivo del contexto.
    reason: lexical_alternative
  revision_rationale: Se mantiene el texto principal porque es fiel, claro y natural. Solo se corrige la nota [a] para alinearla con la decisión léxica auditada para εἰδῶ y evitar una jerarquización errónea de las alternativas en español.
