translation:
  language: es
  text: Y si tengo profecía y entiendo[a] todos los misterios y todo conocimiento, y si tengo toda la fe como para mover montañas, pero no tengo amor, nada soy.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘sé’; menos probable, ‘comprendo’. El verbo griego puede expresar conocimiento, pero aquí ‘entiendo’ encaja mejor con ‘misterios’ y mantiene el matiz cognitivo del contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: προφητείαν
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - don de profecía
  - poder profético
  lexicon: BDAG
  rationale: Se conserva el sustantivo directo para mantener el alcance amplio del término en el contexto de dones espirituales, sin especificar oficio ni función más allá de lo que el griego exige.
- source_word: εἰδῶ
  english_pob_choice: understand
  chosen_spanish: entiendo
  alternatives_spanish:
  - sé
  - comprendo
  lexicon: BDAG
  rationale: Aunque el verbo básico pertenece al campo de ‘saber’, ‘entiendo’ fluye mejor en español con ‘misterios’ y refleja una captación cognitiva real, no solo conocimiento de datos.
- source_word: μυστήρια
  english_pob_choice: mysteries
  chosen_spanish: misterios
  alternatives_spanish:
  - secretos
  - verdades ocultas
  lexicon: BDAG
  rationale: ‘Misterios’ conserva el término paulino establecido y su registro teológico de realidades antes ocultas y ahora reveladas.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  lexicon: BDAG
  rationale: ‘Conocimiento’ mantiene la distinción respecto de εἰδῶ/entiendo y reproduce la pareja revelación/conocimiento del griego.
- source_word: πᾶσαν τὴν πίστιν
  english_pob_choice: all faith
  chosen_spanish: toda la fe
  alternatives_spanish:
  - fe completa
  - toda confianza
  - toda fidelidad
  lexicon: BDAG
  rationale: Se sigue el valor por defecto de πίστις como ‘fe’. El contexto de capacidad extraordinaria sugiere una fe excepcional, no una categoría técnica distinta.
- source_word: ὥστε ὄρη μεθιστάναι
  english_pob_choice: so as to move mountains
  chosen_spanish: como para mover montañas
  alternatives_spanish:
  - hasta mover montañas
  - de modo que moviera montañas
  lexicon: BDAG
  rationale: La construcción final se vierte de manera natural en español y conserva la imagen idiomática de una capacidad extraordinaria.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene ‘amor’ conforme al criterio del proyecto para ἀγάπη, evitando el matiz estrechado y arcaizante de ‘caridad’.
- source_word: οὐθέν εἰμι
  english_pob_choice: I am nothing
  chosen_spanish: nada soy
  alternatives_spanish:
  - no soy nada
  - soy nada
  lexicon: BDAG
  rationale: ‘Nada soy’ conserva la fuerza absoluta de la autonegación paulina y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Rango de πίστις en un contexto de capacidad milagrosa extraordinaria
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - confianza
  - fidelidad
  rationale: Se preserva ‘fe’ como traducción principal porque el contexto habla de una capacidad extraordinaria asociada al obrar poderoso, no de una cualidad relacional distinta. Se dejan las alternativas para reconocer el rango semántico de πίστις sin imponer una lectura ajena al pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved where contested'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios y que existe alto acuerdo con el texto base; por eso se mantiene una traducción sobria y directa, sin introducir ajustes interpretativos adicionales.
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: ‘profecía’, ‘misterios’, ‘conocimiento’, ‘fe’ y ‘amor’.'
  - No se introduce ‘caridad’ para ἀγάπη, conforme al criterio lexical del POB.
  - La fuerza de negación en οὐθέν εἰμι se conserva con ‘nada soy’, equivalente de ‘I am nothing’.
