translation:
  language: es
  text: El amor nunca falla[a]. Pero, sea que haya profecías, serán dejadas de lado; sea que haya lenguas, cesarán; sea que haya conocimiento[c][b], será dejado de lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «El amor nunca cae» o «El amor nunca llega a su fin».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «idiomas» para «lenguas».'
    reason: alternative_reading
  - marker: c
    text: El verbo traducido «será dejado de lado» es el mismo en las cláusulas de «profecías» y «conocimiento».
    reason: cross_reference
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: Love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: Se mantiene el sentido paulino amplio del término como amor, no la acepción más estrecha y arcaica de «caridad». En español contemporáneo «amor» es natural y fiel al contraste del versículo con dones que cesan.
- source_word: οὐδέποτε
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún momento
  lexicon: BDAG
  rationale: Adverbio de negación absoluta; «nunca» es la equivalencia española más directa y natural.
- source_word: πίπτει
  english_pob_choice: fails
  chosen_spanish: falla
  alternatives_spanish:
  - cae
  - se termina
  - llega a su fin
  lexicon: BDAG
  rationale: Como en inglés, el verbo es idiomático aquí. «Falla» conserva la idea de no llegar a faltar ni fracasar, sin borrar la tensión con los verbos de cese posteriores.
- source_word: εἴτε δὲ
  english_pob_choice: But whether there are
  chosen_spanish: Pero, ya sean
  alternatives_spanish:
  - Pero si hay
  - Sea que
  lexicon: BDAG
  rationale: El griego introduce una serie de posibilidades contrastadas. «Pero, ya sean» mantiene el giro adversativo y hace explícita la elipsis sin añadir contenido ajeno.
- source_word: προφητεῖαι
  english_pob_choice: prophecies
  chosen_spanish: profecías
  alternatives_spanish:
  - mensajes proféticos
  - profecía
  lexicon: BDAG
  rationale: Plural referencial a expresiones proféticas o actos de profetizar; «profecías» es el equivalente natural y suficientemente preciso.
- source_word: καταργηθήσονται
  english_pob_choice: will be set aside
  chosen_spanish: serán abolidas
  alternatives_spanish:
  - serán puestas de lado
  - quedarán inoperantes
  - serán anuladas
  lexicon: BDAG
  rationale: Se traduce de modo consistente en ambas ocurrencias del verbo. «Serán abolidas» comunica la cesación de función con una fuerza algo más marcada, pero todavía compatible con el valor de καταργέω sin implicar necesariamente destrucción física.
- source_word: γλῶσσαι
  english_pob_choice: tongues
  chosen_spanish: lenguas
  alternatives_spanish:
  - idiomas
  - lenguas humanas
  lexicon: BDAG
  rationale: En 1 Corintios 12–14 el término tiene valor técnico para el fenómeno carismático. En español, «lenguas» preserva esa tradición terminológica mejor que «idiomas», que tendería a resolver la cuestión interpretativa.
- source_word: παύσονται
  english_pob_choice: will cease
  chosen_spanish: cesarán
  alternatives_spanish:
  - se detendrán
  - terminarán
  lexicon: BDAG
  rationale: 'Verbo distinto de καταργέω, por lo que se mantiene una traducción distinta: «cesarán» expresa bien el dejar de operar.'
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - sabiduría
  - conocer
  lexicon: BDAG
  rationale: En este contexto paulino, el sustantivo apunta a conocimiento como don o capacidad; «conocimiento» es natural en español y mantiene la relación con el tema del saber parcial en el contexto inmediato.
- source_word: καταργηθήσεται
  english_pob_choice: will be set aside
  chosen_spanish: será abolido
  alternatives_spanish:
  - será puesto de lado
  - será anulado
  - quedará inoperante
  lexicon: BDAG
  rationale: Se conserva la misma opción verbal que en la primera aparición de καταργέω para resaltar la correspondencia textual que el inglés POB marcó con su nota cruzada.
theological_decisions:
- issue: Sentido de ἀγάπη en contraste con dones carismáticos
  english_pob_reading: Love never fails
  chosen_spanish_reading: El amor nunca falla
  alternative_spanish_readings:
  - La caridad nunca falla
  - El amor nunca cae
  rationale: Se preserva el carácter permanente del amor frente a dones temporales. «Amor» evita la restricción doctrinal y semántica de «caridad», mientras que «falla» mantiene la fuerza idiomática del contraste.
  doctrine_reference: 'Affirmations: preserve theological tension rather than resolve it'
- issue: Distinción entre καταργέω y παύω
  english_pob_reading: will be set aside / will cease
  chosen_spanish_reading: serán abolidas / cesarán / será abolido
  alternative_spanish_readings:
  - serán anuladas / terminarán
  - serán puestas de lado / se detendrán
  rationale: 'Se conserva la diferencia verbal del griego y del inglés auditado: unos dones «cesarán» por sí mismos, mientras que otros «serán abolidos» o «será abolido». Aunque «abolir» es más fuerte que «set aside», en español sigue funcionando como equivalente de cese de función sin borrar la distinción léxica.'
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
- issue: γλῶσσαι como término técnico
  english_pob_reading: tongues
  chosen_spanish_reading: lenguas
  alternative_spanish_readings:
  - idiomas
  - hablas
  rationale: Se preserva la tensión interpretativa del pasaje en 1 Corintios 12–14. «Lenguas» mantiene el término técnico eclesial sin cerrar la discusión sobre su naturaleza exacta.
  doctrine_reference: 'Affirmations: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador sigue el pasaje griego SBLGNT y el audit trail inglés sin cambios sustantivos respecto de la última pasada revisada; se preserva la diferencia entre καταργέω y παύω, así como el valor técnico de γλῶσσαι. La única decisión de estilo más visible es usar un español natural y publicación-readable («El amor nunca falla», «cesarán», «serán abolidas») manteniendo la tensión lexical del original.
  spanish_consistency_notes:
  - Se usa «amor» como traducción estándar de ἀγάπη, coherente con el POB en inglés y con uso bíblico amplio.
  - Se mantiene «lenguas» para γλῶσσαι como término técnico, con nota alternativa «idiomas».
  - Se traduce καταργέω de forma consistente dentro del versículo como «serán abolidas / será abolido», y se señala la correspondencia textual entre las dos cláusulas.
  - Se distingue claramente entre «abolidas» (καταργέω) y «cesarán» (παύω).
  - 'La puntuación respeta la estructura de contraposición y serie del griego: afirmación general, luego tres cláusulas introducidas por «ya sean / ya sea».'
