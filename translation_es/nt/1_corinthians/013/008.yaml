    text: 'O: «El amor nunca cae» o «El amor nunca llega a su fin».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «idiomas» para «lenguas».'
    reason: alternative_reading
  - marker: c
    text: El verbo traducido «será dejado de lado» es el mismo en las cláusulas de «profecías» y «conocimiento».
    reason: cross_reference
  revision_rationale: Se ajusta καταργέω a «dejar de lado» para respetar mejor la decisión lexical documentada del POB y conservar la diferencia frente a «cesarán». También se suaviza la sintaxis de la serie condicional para que suene más natural en español sin alejarse del griego ni del inglés auditado.
