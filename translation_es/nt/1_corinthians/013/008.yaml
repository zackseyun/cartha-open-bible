review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien la estructura del griego y mantiene correctamente las distinciones entre ἀγάπη/γλῶσσαι/γνῶσις y entre παύσονται y καταργηθήσεται. Sin embargo, no sigue de manera suficiente la decisión auditada del POB para καταργέω ('will be set aside'), ya que «abolidas/abolido» introduce una fuerza más fuerte que la justificación inglesa quiso evitar. También la nota c debe reflejar con más precisión que el mismo verbo aparece en las cláusulas de «profecías» y «conocimiento».
  spanish_quality_summary: El español es generalmente claro y legible, pero «ya sean… serán…» suena algo forzado en español bíblico natural. «Sea que haya…» o una estructura equivalente fluye mejor. Además, «serán dejadas de lado / será dejado de lado» comunica mejor el matiz de cese funcional sin sonar técnico ni excesivamente fuerte. Las notas necesitan pulirse levemente para naturalidad tipográfica y precisión.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «amor», «lenguas» y «conocimiento» están bien alineados. El punto principal es ajustar καταργέω a una solución española más cercana a «set aside» que a «abolish», manteniendo la distinción con «cesarán».
  issues:
  - severity: medium
    issue: «serán abolidas / será abolido» sobretraduce καταργέω
    rationale: El audit trail inglés eligió deliberadamente «will be set aside» para evitar una noción demasiado fuerte de abolición o aniquilación. «Abolir» en español tiende a sonar más categórico y jurídico de lo que el rationale documentado pretende.
  - severity: low
    issue: La construcción «Pero, ya sean…, serán…» es poco natural
    rationale: Aunque intenta explicitar la elipsis griega, en español resulta rígida. Una formulación como «Pero, sea que haya…» preserva el valor contrastivo y mejora la lectura.
  - severity: low
    issue: La nota c puede expresarse con mayor precisión y naturalidad
    rationale: Conviene decir explícitamente que el mismo verbo se usa en ambas cláusulas, no solo «las dos cláusulas con…», para que la nota sea más clara.
  revised_spanish_text: El amor nunca falla[a]. Pero, sea que haya profecías, serán dejadas de lado; sea que haya lenguas, cesarán; sea que haya conocimiento[c][b], será dejado de lado.
  revised_footnotes:
