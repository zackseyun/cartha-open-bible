revisions:
- from: El amor nunca falla[a]. Pero, ya sean profecías, serán abolidas; ya sean lenguas, cesarán; ya sea conocimiento[c][b], será abolido.
  to: El amor nunca falla[a]. Pero, sea que haya profecías, serán dejadas de lado; sea que haya lenguas, cesarán; sea que haya conocimiento[c][b], será dejado de lado.
  rationale: Se ajusta καταργέω a «dejar de lado» para respetar mejor la decisión lexical documentada del POB y conservar la diferencia frente a «cesarán». También se suaviza la sintaxis de la serie condicional para que suene más natural en español sin alejarse del griego ni del inglés auditado.
