revisions:
- from: Pero cuando venga lo perfecto[a], lo parcial[b] será quitado de en medio.
  to: Pero cuando venga lo perfecto[a], lo parcial[b] será dejado de lado.
  rationale: Se ajusta καταργηθήσεται a 'será dejado de lado' para reflejar mejor el sentido de cese o pérdida de vigencia/función, en línea con el audit trail inglés 'will be set aside', sin introducir el matiz más fuerte o más figurado de 'quitado de en medio'. Se conserva 'lo perfecto' y 'lo parcial' porque preservan la ambigüedad y el contraste del griego. La nota léxica se actualiza para corresponder a la redacción revisada.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:26Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el contraste del griego: ὅταν…ἔλθῃ se vierte correctamente como ''cuando venga'', τὸ τέλειον como ''lo perfecto'' preserva la ambigüedad interpretativa, y τὸ ἐκ μέρους como ''lo parcial'' mantiene el paralelismo. La principal desviación está en καταργηθήσεται: ''será quitado de en medio'' introduce un giro más interpretativo e idiomáticamente más cargado que el inglés auditado ''will be set aside'' y que el sentido base de cese/inutilización. Conviene una opción más directa y fiel al registro del proyecto.'
  spanish_quality_summary: El texto es claro y legible, pero 'será quitado de en medio' suena más expansivo y algo menos natural/literario en este contexto que una formulación más sobria. 'Lo perfecto' y 'lo parcial' funcionan bien en español bíblico moderno. La nota a sobrevive bien; la nota b debe ajustarse para corresponder mejor a la nueva redacción y evitar 'será deshecho', que no refleja tan bien el rango semántico aquí.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Se preserva correctamente 'lo perfecto' frente a alternativas más interpretativas. La revisión propuesta mantiene la decisión teológica documentada y mejora la correspondencia léxica de καταργηθήσεται con una opción española más cercana a 'set aside'.
  issues:
  - severity: medium
    issue: '''será quitado de en medio'' para καταργηθήσεται'
    rationale: Aunque comunica cesación, añade color interpretativo ('de en medio') que no está explícito en el griego y se aleja del audit trail inglés 'will be set aside'. 'Será dejado de lado' o 'será apartado' preserva mejor la idea de quedar sin función o vigencia sin sobreinterpretar.
  - severity: low
    issue: 'Alternativa de nota b: ''será deshecho'''
    rationale: '''Deshecho'' puede sugerir desintegración o destrucción material, matiz menos adecuado aquí que ''abolido'', ''pasará'' o ''será quitado''/''será dejado de lado''.'
