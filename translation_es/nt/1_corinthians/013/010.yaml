translation:
  language: es
  text: Pero cuando venga lo perfecto[a], lo parcial[b] será dejado de lado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'lo completo' o 'lo maduro'. La expresión griega to teleion es debatida; los intérpretes la entienden de diversos modos como plenitud, madurez o la consumación escatológica, más que como el estado parcial presente.
    reason: alternative_reading
  - marker: b
    text: O 'será abolido', 'pasará' o 'será quitado'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: ὅταν introduce una cláusula temporal futura y contingente; en español, 'cuando' comunica de forma natural ese valor anticipado sin volverlo iterativo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: La partícula marca un leve contraste con lo anterior; 'Pero' preserva mejor ese matiz adversativo que una simple adición.
- source_word: ἔλθῃ
  english_pob_choice: comes
  chosen_spanish: venga
  alternatives_spanish:
  - llegue
  - arribe
  lexicon: BDAG
  rationale: Tras 'cuando', el subjuntivo futuro o presente de subjuntivo en español expresa bien el evento esperado. 'Venga' mantiene el movimiento de 'ἔρχομαι' sin sonar forzado.
- source_word: τὸ τέλειον
  english_pob_choice: the perfect
  chosen_spanish: lo perfecto
  alternatives_spanish:
  - lo completo
  - lo maduro
  lexicon: BDAG
  rationale: El neutro sustantivado admite un sentido de plenitud, completitud o madurez. 'Lo perfecto' conserva la amplitud léxica de la opción inglesa de la POB y deja abierta la identificación interpretativa.
- source_word: τὸ ἐκ μέρους
  english_pob_choice: the partial
  chosen_spanish: lo parcial
  alternatives_spanish:
  - lo que es en parte
  - lo incompleto
  lexicon: BDAG
  rationale: La construcción con artículo funciona sustantivamente. 'Lo parcial' mantiene el contraste con 'lo perfecto' y evita explicitar más de lo que el griego dice.
- source_word: καταργηθήσεται
  english_pob_choice: will be set aside
  chosen_spanish: será quitado de en medio
  alternatives_spanish:
  - será abolido
  - pasará
  - será deshecho
  lexicon: BDAG
  rationale: El futuro pasivo indica que aquello parcial dejará de operar o de tener función. 'Será quitado de en medio' comunica cese sin cargar innecesariamente con la idea de aniquilación total. La alternativa 'abolido' es posible, pero puede sonar más fuerte de lo que el contexto exige.
theological_decisions:
- issue: Interpretación de τὸ τέλειον
  english_pob_reading: Rendered generically as 'the perfect' without specifying its referent.
  chosen_spanish_reading: '''lo perfecto'' se mantiene sin identificar su referente.'
  alternative_spanish_readings:
  - '''lo completo'''
  - '''lo maduro'''
  - una referencia explícita a la consumación escatológica
  - una referencia al canon completo
  rationale: El griego no nombra de manera explícita el referente y el pasaje es un crux interpretativo conocido. La traducción española conserva esa ambigüedad en lugar de resolverla doctrinalmente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Alineado con el último pase de revisión, sin cambios sustantivos respecto al acuerdo alto del auditor. Se conserva la ambigüedad interpretativa de τὸ τέλειον y la amplitud semántica de καταργηθήσεται.
  spanish_consistency_notes:
  - Se mantiene 'lo perfecto' para τὸ τέλειον, en coherencia con la decisión POB inglesa y con la terminología proyectada para preservar tensión teológica.
  - '''Lo parcial'' reproduce la sustantivación del griego con una formulación natural en español.'
  - '''Ser quitado de en medio'' evita un calco rígido y conserva la idea de cese/inoperancia expresada por καταργέω.'
