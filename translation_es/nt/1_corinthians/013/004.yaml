translation:
  language: es
  text: El amor[a] es paciente, el amor es bondadoso. No envidia, no se jacta[b], no se envanece.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «caridad» para ἀγάπη; aquí se prefiere «amor» porque comunica mejor el alcance ético y relacional del término.
    reason: lexical_alternative
  - marker: b
    text: O «es arrogante» para «se envanece»; la imagen griega es la de estar inflado por orgullo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: La guía doctrinal del proyecto favorece "amor" para ἀγάπη. En español contemporáneo, "amor" comunica el sentido amplio ético y relacional del pasaje mejor que "caridad", que puede sonar más restringido o eclesiástico.
- source_word: μακροθυμεῖ
  english_pob_choice: is patient
  chosen_spanish: es paciente
  alternatives_spanish:
  - es longánime
  - es sufrido
  lexicon: BDAG
  rationale: El verbo expresa paciencia sostenida ante personas y circunstancias. "Es paciente" es natural, claro y conserva el sentido durativo sin arcaísmo.
- source_word: χρηστεύεται
  english_pob_choice: is kind
  chosen_spanish: es bondadoso
  alternatives_spanish:
  - es amable
  - obra con bondad
  lexicon: BDAG
  rationale: El verbo raro denota actuar con benevolencia o bondad. "Es bondadoso" mantiene el carácter predicativo y suena digno en español; "es amable" puede quedar algo más tenue.
- source_word: ζηλοῖ
  english_pob_choice: envy
  chosen_spanish: envidia
  alternatives_spanish:
  - es celoso
  - tiene celo
  lexicon: BDAG
  rationale: En este contexto negativo, el matiz es el de resentimiento ante lo ajeno, no celo positivo. "Envidia" expresa mejor ese valor que "celoso", que puede resultar ambiguo en español.
- source_word: περπερεύεται
  english_pob_choice: boast
  chosen_spanish: se jacta
  alternatives_spanish:
  - presume
  - se alaba
  lexicon: BDAG
  rationale: El verbo apunta a autoexhibición o fanfarronería. "Se jacta" es una equivalencia idiomática clara y digna; conserva el impulso de alarde sin sonar coloquial.
- source_word: φυσιοῦται
  english_pob_choice: is puffed up
  chosen_spanish: se envanece
  alternatives_spanish:
  - es arrogante
  - se hincha de orgullo
  lexicon: BDAG
  rationale: La metáfora paulina de ser inflado por orgullo se conserva bien con "se envanece". Esta opción mantiene la imagen figurada mejor que "es arrogante", que la explicita pero la aplana.
- source_word: ἡ ἀγάπη ... ἡ ἀγάπη ... ⸂ἡ ἀγάπη⸃
  english_pob_choice: Love ... love ... It
  chosen_spanish: El amor ... el amor ... no
  alternatives_spanish:
  - El amor ... el amor ... él
  - Amor ... amor ... no
  lexicon: Greek grammar / discourse analysis
  rationale: La repetición del sujeto en griego tiene fuerza retórica. En español se conserva con "el amor" en las dos primeras cláusulas; en las negativas, el sujeto tácito es natural y evita una repetición pesada.
- source_word: οὐ
  english_pob_choice: does not / is not
  chosen_spanish: 'no'
  alternatives_spanish:
  - no es
  - no tiene
  lexicon: Greek grammar
  rationale: El español expresa estas cláusulas de manera natural con "no". Dado que los verbos son finitos, no se requiere auxiliar explícito; el copulativo "es" se mantiene donde corresponde.
theological_decisions:
- issue: Qué término español usar para ἀγάπη en una lista de cualidades del amor cristiano
  english_pob_reading: love
  chosen_spanish_reading: amor
  alternative_spanish_readings:
  - caridad
  rationale: Se mantiene el alcance amplio de ἀγάπη como amor ético y relacional, no reducido a limosna o beneficencia. Esto coincide con la decisión auditada del POB en inglés y con el uso más claro en español actual.
  doctrine_reference: 'DOCTRINE.md Contested terms: ἀγάπη → love'
- issue: Conservar la metáfora paulina de orgullo inflado en φυσιοῦται
  english_pob_reading: is puffed up
  chosen_spanish_reading: se envanece
  alternative_spanish_readings:
  - es arrogante
  - se infla de orgullo
  rationale: '"Se envanece" conserva la imagen de orgullo inflado y mantiene el tono figurado del texto. "Es arrogante" es una interpretación válida, pero pierde la metáfora que el POB procura preservar.'
  doctrine_reference: 1 Corintios 13:4, uso retórico paulino de la metáfora de inflación del orgullo
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y sin revisiones aplicadas; se mantiene la solución inglesa vigente con equivalentes españoles naturales y fieles a la semántica griega, preservando las dos alternativas léxicas relevantes documentadas.
  spanish_consistency_notes:
  - Se usa «amor» para ἀγάπη conforme al criterio doctrinal del proyecto.
  - Se mantiene el paralelismo retórico del sujeto repetido en las dos primeras cláusulas.
  - Se conserva la metáfora de orgullo inflado con «se envanece» en lugar de aplanarla a «es arrogante».
  - La negación se expresa de forma natural en español con «no» sin añadir auxiliares innecesarios.
