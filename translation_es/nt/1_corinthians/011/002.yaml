translation:
  language: es
  text: Ahora los alabo porque en todo se acuerdan de mí y se aferran firmemente a las tradiciones, tal como se las entregué[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O “las enseñanzas” o “las instrucciones”; griego: “las tradiciones”, es decir, lo que fue transmitido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπαινῶ
  english_pob_choice: I praise
  chosen_spanish: los alabo
  alternatives_spanish:
  - los elogio
  - los felicito
  - los encomio
  lexicon: BDAG
  rationale: ἐπαινέω expresa alabar o elogiar. En español, «alabo» conserva el tono positivo y personal del pasaje, y encaja mejor que un tecnicismo más frío.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ funciona aquí como transición discursiva suave, no como contraste fuerte. «Ahora» mantiene esa transición natural en español.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: los
  alternatives_spanish:
  - ustedes
  - a ustedes
  lexicon: BDAG
  rationale: El complemento directo plural de segunda persona se expresa de forma natural con «los» en español latinoamericano cuando el referente es plural masculino mixto o genérico en un contexto eclesial.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - puesto que
  - que
  lexicon: BDAG
  rationale: Introduce la razón del elogio de Pablo; «porque» expresa con claridad la relación causal.
- source_word: πάντα μου μέμνησθε
  english_pob_choice: you remember me in everything
  chosen_spanish: en todo se acuerdan de mí
  alternatives_spanish:
  - me recuerdan en todo
  - tienen presente todo lo mío
  lexicon: BDAG
  rationale: La construcción con μέμνησθε sugiere recuerdo continuo o mantenido. «Se acuerdan de mí» comunica de forma natural esa idea; «en todo» preserva el alcance amplio de πάντα.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Coordinación simple entre los dos motivos del elogio.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: Marca correspondencia entre la entrega de Pablo y la conservación por parte de ellos. «Tal como» transmite bien la idea comparativa.
- source_word: παρέδωκα
  english_pob_choice: I delivered
  chosen_spanish: se las entregué
  alternatives_spanish:
  - las transmití
  - las pasé
  - se las entregué y transmití
  lexicon: BDAG
  rationale: παραδίδωμι en este contexto tiene el sentido de transmitir o entregar autorizadamente una enseñanza. «Entregué» es fiel y natural en español; el pronombre enclítico retoma el objeto implícito de las tradiciones.
- source_word: ὑμῖν τὰς παραδόσεις
  english_pob_choice: the traditions
  chosen_spanish: las tradiciones
  alternatives_spanish:
  - las enseñanzas
  - las instrucciones
  lexicon: BDAG
  rationale: παράδοσις significa lo transmitido o entregado. «Tradiciones» preserva el vínculo léxico con la transmisión apostólica sin reducir el término a mera instrucción genérica.
- source_word: κατέχετε
  english_pob_choice: hold firmly to
  chosen_spanish: mantienen firmemente
  alternatives_spanish:
  - retienen firmemente
  - se aferran a
  - guardan
  lexicon: BDAG
  rationale: κατέχω aquí expresa retener o adherirse con firmeza. «Mantienen firmemente» comunica adherencia activa y continua en español contemporáneo.
theological_decisions:
- issue: Valor de παραδόσεις en un contexto apostólico
  english_pob_reading: traditions
  chosen_spanish_reading: tradiciones
  alternative_spanish_readings:
  - enseñanzas
  - instrucciones
  rationale: El texto elogia a la iglesia por retener lo que Pablo les transmitió. «Tradiciones» conserva la categoría de lo recibido y entregado, sin añadir una carga confesional posterior que el pasaje no impone.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Tono de la alabanza paulina
  english_pob_reading: I praise you
  chosen_spanish_reading: los alabo
  alternative_spanish_readings:
  - los elogio
  - los felicito
  rationale: El verbo mantiene el sentido de aprobación explícita y personal de Pablo hacia la comunidad, sin suavizarlo excesivamente.
  doctrine_reference: Translation philosophy §2
translation_notes:
  revision_awareness: 'La versión española sigue el estado revisado del POB en inglés: no hay cambios posteriores que alteren la lectura base; se conserva la decisión léxica central sobre παραδόσεις y la fuerza causal de ὅτι, con una adaptación natural al español.'
  spanish_consistency_notes:
  - Se mantuvo «tradiciones» para παράδοσις, en coherencia con el audit trail inglés.
  - Se prefirió una transición discursiva suave con «Ahora» para δέ.
  - Se conservó el matiz de transmisión autorizada en «entregué» para παραδίδωμι.
  - «Mantienen firmemente» refleja adhesión continua sin introducir una imagen más idiomática pero menos transparente como «se aferran».
