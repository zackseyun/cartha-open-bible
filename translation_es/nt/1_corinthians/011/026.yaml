translation:
  language: es
  text: Porque cada vez que coman este pan y beban la copa[a][b], proclaman la muerte del Señor hasta que él venga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuantas veces coman este pan y beban la copa».
    reason: lexical_alternative
  - marker: b
    text: El griego dice «la copa», no «esta copa» en este versículo, aunque el contexto inmediato identifica cuál copa se entiende.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁσάκις ... ἐὰν
  english_pob_choice: as often as
  chosen_spanish: cuantas veces
  alternatives_spanish:
  - cada vez que
  - siempre que
  lexicon: BDAG
  rationale: La combinación expresa una repetición indefinida. «Cuantas veces» conserva bien el valor iterativo y suena natural en español bíblico sin volver la frase más explicativa de lo que permite el griego.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación o fundamento. «Porque» es una conexión clara y digna en español y mantiene el valor argumentativo del versículo.
- source_word: ἐσθίητε
  english_pob_choice: you eat
  chosen_spanish: coman
  alternatives_spanish:
  - coméis
  - ustedes comen
  lexicon: BDAG
  rationale: El subjuntivo presente en cláusula temporal indefinida se expresa naturalmente en español con «coman» dentro de «cuantas veces». Mantiene la fuerza repetitiva sin sobrecargar la sintaxis.
- source_word: ἄρτον τοῦτον
  english_pob_choice: this bread
  chosen_spanish: este pan
  alternatives_spanish:
  - este alimento
  - este pan de la mesa
  lexicon: BDAG
  rationale: ἄρτος se traduce de manera directa por «pan». La demostración «τοῦτον» se conserva con «este», como en el texto griego.
- source_word: ποτήριον
  english_pob_choice: the cup
  chosen_spanish: la copa
  alternatives_spanish:
  - el cáliz
  - la copa del Señor
  lexicon: BDAG
  rationale: El griego dice «la copa», no «esta copa». En español «la copa» refleja con precisión el artículo definido y evita añadir una demostración que el texto no tiene.
- source_word: καταγγέλλετε
  english_pob_choice: you proclaim
  chosen_spanish: anuncian
  alternatives_spanish:
  - proclaman
  - declaran
  lexicon: BDAG
  rationale: καταγγέλλω puede significar anunciar o proclamar públicamente. «Anuncian» comunica bien la declaración pública en un registro natural; «proclaman» queda como alternativa más formal y cercana al matiz solemne.
- source_word: τὸν θάνατον τοῦ κυρίου
  english_pob_choice: the Lord’s death
  chosen_spanish: la muerte del Señor
  alternatives_spanish:
  - la muerte de el Señor
  - la muerte del Señor Jesús
  lexicon: BDAG
  rationale: El genitivo se vierte de manera natural como «la muerte del Señor». «Señor» conserva la traducción convencional de κύριος en este contexto cristológico y litúrgico.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος se refiere a Jesús en el contexto inmediato de la cena y la proclamación de su muerte. En español, «Señor» es la forma directa y más reconocible para este título.
- source_word: ἄχρι οὗ ἔλθῃ
  english_pob_choice: until he comes
  chosen_spanish: hasta que él venga
  alternatives_spanish:
  - hasta su venida
  - hasta que venga
  lexicon: BDAG
  rationale: La cláusula marca el límite temporal de la proclamación. «Hasta que él venga» mantiene el sujeto implícito del contexto y reproduce de forma natural el valor del aoristo subjuntivo en español.
theological_decisions:
- issue: Referente de «él» en ἄχρι οὗ ἔλθῃ
  english_pob_reading: The implied subject is the Lord Jesus.
  chosen_spanish_reading: El referente implícito de «él» es el Señor Jesús.
  alternative_spanish_readings:
  - El Señor
  - Jesús
  rationale: El antecedente inmediato es «el Señor» y el contexto paulino apunta a su venida futura. Mantener «él» conserva la referencia contextual sin explicitar más de lo que dice el griego.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Lenguaje eucarístico / sacramental
  english_pob_reading: Render the actions straightforwardly as eating bread, drinking the cup, and proclaiming the Lord's death, without importing a denominational explanation of the Supper.
  chosen_spanish_reading: 'Traducir de manera directa las acciones: comer el pan, beber la copa y anunciar la muerte del Señor, sin añadir una teología denominacional de la Cena.'
  alternative_spanish_readings:
  - Una paráfrasis más sacramental
  - Una paráfrasis puramente memorialista
  rationale: El versículo afirma lo que la acción hace —anunciar la muerte del Señor—, pero no desarrolla una teología completa del rito. La traducción debe preservar esa tensión sin resolverla de antemano.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto inglés auditado ya fue revisado y mantenido sin cambios en la última pasada; el español sigue ese mismo trazado sin introducir ajustes de sentido no justificados por el griego.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος por consistencia cristológica y litúrgica en el corpus.
  - «Copa» traduce ποτήριον de forma estable; la nota distingue la ausencia de demostrativo en el griego de este versículo.
  - Se conserva la referencia futura con «hasta que él venga» para no sobreexplicitar el sujeto más allá del contexto.
  - «Anuncian» mantiene un registro claro; si el proyecto prefiere mayor solemnidad, «proclaman» es una alternativa válida sin cambio de sentido.
