  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Señor» para κύριος es correcto aquí por referencia a Jesús. «La copa» respeta la decisión léxica documentada. El único ajuste recomendado es preferir «proclaman» para καταγγέλλετε por mejor alineación con el POB inglés («proclaim») y con el matiz del verbo.
