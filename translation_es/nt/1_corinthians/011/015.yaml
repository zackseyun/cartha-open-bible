translation:
  language: es
  text: Pero si una mujer lleva el cabello largo[a], le es gloria[b]; porque el cabello le ha sido dado en lugar de una cubierta.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'como una cubierta'. La preposición griega puede expresar correspondencia o sustitución; la frase, por sí sola, no decide si Pablo quiere decir que el cabello funciona como la cubierta o que se da en relación con una.
    reason: lexical_alternative
  - marker: b
    text: El término griego puede significar 'mujer' o 'esposa' según el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa' según el contexto. Aquí el enunciado se presenta como una afirmación general, no como una referencia explícita a una pareja matrimonial; por eso 'una mujer' conserva mejor el alcance inmediato del griego.
- source_word: κομᾷ
  english_pob_choice: has long hair
  chosen_spanish: lleva el cabello largo
  alternatives_spanish:
  - tiene el cabello largo
  - deja crecer su cabello
  lexicon: BDAG
  rationale: κομάω expresa llevar o usar el cabello largo, no simplemente tener cabello. 'Lleva el cabello largo' suena natural en español y conserva el matiz de estilo o porte capilar.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: δόξα aquí comunica algo que constituye honra o crédito. 'Gloria' preserva la conexión léxica y el peso retórico de la expresión paulina mejor que 'honor', sin perder inteligibilidad en español.
- source_word: κόμη
  english_pob_choice: hair
  chosen_spanish: cabello
  alternatives_spanish:
  - cabellera
  - pelo
  lexicon: BDAG
  rationale: κόμη designa el cabello de la cabeza, a menudo con la idea de cabello largo. Como el verbo anterior ya expresa la largueza, 'cabello' evita redundancia y mantiene el sentido.
- source_word: ἀντί
  english_pob_choice: instead of
  chosen_spanish: en lugar de
  alternatives_spanish:
  - en vez de
  - como
  lexicon: BDAG
  rationale: ἀντί suele expresar sustitución o correspondencia. 'En lugar de' refleja bien esa fuerza y deja abierta la relación exacta entre el cabello y el cubrimiento.
- source_word: περιβολαίου
  english_pob_choice: a covering
  chosen_spanish: un cubrimiento
  alternatives_spanish:
  - una cobertura
  - un velo
  lexicon: BDAG
  rationale: περιβόλαιον es un término amplio para algo que rodea o cubre. 'Un cubrimiento' conserva la amplitud del griego y evita especificar 'velo', que sería más concreto de lo que la palabra exige.
- source_word: δέδοται
  english_pob_choice: has been given to her
  chosen_spanish: le ha sido dado
  alternatives_spanish:
  - le fue dado
  - le es dado
  lexicon: BDAG
  rationale: El perfecto pasivo señala un estado resultante de una acción completada. 'Le ha sido dado' preserva la pasividad y la idea de resultado de manera natural en español.
theological_decisions:
- issue: Si περιβόλαιον debe traducirse específicamente como 'velo' y así identificar el cabello de la mujer como el cubrimiento mandado en el pasaje.
  english_pob_reading: Render the term generically as 'a covering' without resolving the broader interpretive debate in the translation itself.
  chosen_spanish_reading: Traducir el término de manera general como 'un cubrimiento', sin resolver en la traducción el debate interpretativo más amplio.
  alternative_spanish_readings:
  - un velo
  - una cobertura
  rationale: El sustantivo griego es más amplio que 'velo'. Traducirlo como 'un cubrimiento' preserva el dato léxico y evita importar una conclusión doctrinal o cultural específica sobre si Pablo habla de un velo de tela, de un cubrimiento general de la cabeza o de una analogía entre el cabello natural y otro cubrimiento. Así se conserva la tensión textual donde el griego no obliga a una opción más estrecha.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el pasaje quedó sin cambios en la última pasada de revisión y el control cruzado señaló solo cuestiones menores.
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando corresponde; este versículo no contiene el nombre divino.
  - Se preservó la distinción entre 'mujer' y 'esposa' como posibilidad léxica en la nota, sin forzarla en el texto principal.
  - Se evitó 'velo' en el cuerpo principal para no cerrar indebidamente la ambigüedad de περιβόλαιον.
  - '''Gloria'' se conservó como traducción de δόξα para mantener la continuidad léxica con el griego.'
  - '''Cabello'' se usó para κόμη porque el contexto ya expresa la idea de cabello largo en el verbo anterior.'
