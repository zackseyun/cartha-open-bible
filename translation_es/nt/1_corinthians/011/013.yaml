translation:
  language: es
  text: 'Juzguen ustedes mismos: ¿es correcto que una mujer ore a Dios con la cabeza descubierta[a]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una esposa», si γυνή se toma en sentido matrimonial dentro del contexto más amplio de este pasaje.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐν ὑμῖν αὐτοῖς
  english_pob_choice: for yourselves
  chosen_spanish: por vosotros mismos
  alternatives_spanish:
  - entre vosotros mismos
  - en vosotros mismos
  lexicon: BDAG
  rationale: La expresión es idiomática e intensifica el llamado a que los corintios evalúen la cuestión por su propia cuenta. «Por vosotros mismos» conserva ese matiz reflexivo y suena natural en español.
- source_word: κρίνατε
  english_pob_choice: Judge
  chosen_spanish: Juzgad
  alternatives_spanish:
  - Decidid
  - Discernid
  lexicon: BDAG
  rationale: Es un imperativo aoristo que pide evaluación. «Juzgad» mantiene la fuerza directa del mandato y el tono retórico de Pablo.
- source_word: πρέπον ἐστίν
  english_pob_choice: is it proper
  chosen_spanish: ¿es apropiado?
  alternatives_spanish:
  - ¿es conveniente?
  - ¿es decoroso?
  lexicon: BDAG
  rationale: La construcción pregunta si algo es conveniente o adecuado. «Apropiado» comunica con claridad el sentido de decoro o conveniencia sin sonar arcaico.
- source_word: γυναῖκα
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa». Aquí la pregunta está formulada en términos generales, sin mención explícita de un marido; por eso «mujer» es la opción principal. Se preserva la alternativa marital en nota.
- source_word: ἀκατακάλυπτον
  english_pob_choice: with her head uncovered
  chosen_spanish: con la cabeza descubierta
  alternatives_spanish:
  - descubierta
  - con la cabeza sin cubrir
  lexicon: BDAG
  rationale: El adjetivo significa literalmente «descubierta». En este contexto de velamiento de la cabeza, la traducción explicita el referente implícito para que el español sea claro y natural.
- source_word: τῷ θεῷ
  english_pob_choice: to God
  chosen_spanish: a Dios
  alternatives_spanish:
  - ante Dios
  lexicon: BDAG
  rationale: El dativo con προσεύχομαι marca normalmente al destinatario de la oración. «A Dios» es la correspondencia más directa y clara en español.
- source_word: προσεύχεσθαι
  english_pob_choice: to pray
  chosen_spanish: ore
  alternatives_spanish:
  - rece a
  - eleve oración
  lexicon: BDAG
  rationale: El infinitivo significa «orar / rezar / orar». En un registro bíblico amplio y neutral, «ore» comunica bien la acción de dirigir oración a Dios.
theological_decisions:
- issue: Sentido de γυνή en la discusión sobre la cabeza cubierta
  english_pob_reading: a woman
  chosen_spanish_reading: una mujer
  alternative_spanish_readings:
  - una esposa
  rationale: El versículo no menciona explícitamente a un esposo, y la pregunta se presenta en términos generales sobre la conveniencia de la conducta femenina en oración. Para no introducir una lectura marital más estrecha de la que exige este versículo, el texto principal dice «una mujer», dejando «una esposa» como posibilidad contextual.
  doctrine_reference: Translation philosophy §3, §4
translation_notes:
  revision_awareness: 'El pasaje muestra alto acuerdo con la revisión más reciente: no se detectaron cambios necesarios respecto del texto auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ conforme al criterio del proyecto.
  - Se conserva el matiz directivo del imperativo con «Juzgad».
  - «Cabeza descubierta» explicita en español el rasgo implícito del adjetivo griego en este contexto.
  - La nota al pie preserva la alternativa «esposa» sin desplazar la lectura principal.
