review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido del griego y sigue de cerca la auditoría inglesa: conserva ‘casas’, la finalidad ‘para comer y beber’, ‘la iglesia de Dios’, el reproche fuerte de ‘desprecian’, la idea de causar vergüenza, la generalidad de ‘los que no tienen nada’, y la repetición retórica de ‘alabar’. La única desviación significativa está en ‘¿Qué les diré?’ y ‘¿Los alabaré?’, que cambian indebidamente la referencia de segunda persona singular/plural a tercera persona por el uso de pronombres átonos; en este contexto debe dirigirse directamente a los corintios como ‘ustedes’.'
  spanish_quality_summary: El texto es claro, natural y de registro digno. Sin embargo, ‘¿Qué les diré?’ en muchas variedades suena como ‘qué les diré a ellos/ustedes’ pero sin el referente explícito, y ‘¿Los alabaré?’ se entiende naturalmente como ‘a ellos’, no ‘a ustedes’, creando ambigüedad gramatical y debilitando la recriminación directa. Una leve reparación mejora mucho la legibilidad y precisión.
  glossary_alignment: No hay conflictos con la terminología del proyecto. ‘Dios’, ‘iglesia’, y el tratamiento general de ‘los que no tienen nada’ concuerdan con las decisiones léxicas y teológicas documentadas. No se requiere nota adicional más allá de la ya presente sobre ‘los que no tienen nada’.
  issues:
  - severity: medium
    issue: Referencia pronominal ambigua/incorrecta en ‘¿Qué les diré?’
    rationale: El griego τί εἴπω ὑμῖν significa ‘¿Qué les/qué voy a decirles a ustedes?’. Aunque ‘les’ puede funcionar para ‘ustedes’, aquí sin apoyo explícito puede sonar menos directo. ‘¿Qué debo decirles?’ o ‘¿Qué les voy a decir?’ expresan mejor la deliberación retórica.
  - severity: high
    issue: ‘¿Los alabaré?’ cambia el objeto de segunda persona a tercera persona
    rationale: ἐπαινέσω ὑμᾶς significa ‘¿debo alabarlos a ustedes?’. En español neutral, ‘los’ normalmente refiere a tercera persona masculina plural, no a ‘ustedes’. Esto rompe la fidelidad gramatical y puede malentenderse. Debe cambiarse a una forma inequívoca como ‘¿Debo alabarlos?’ o ‘¿Voy a alabarlos?’.
  revised_spanish_text: Pues, ¿no tienen casas para comer y beber? ¿O desprecian a la iglesia de Dios y avergüenzan a los que no tienen nada[a]? ¿Qué debo decirles? ¿Debo alabarlos? En esto no los alabo.
  revised_footnotes:
  - marker: a
    text: O ‘los pobres’ o ‘los que no tienen comida’; el griego literalmente dice ‘los que no tienen’.
    reason: lexical_alternative
  revision_rationale: Se corrigen únicamente las dos preguntas retóricas finales para evitar una referencia pronominal ambigua o errónea en español y para representar con mayor fidelidad el deliberativo griego dirigido a los corintios. El resto del borrador es fiel y natural, por lo que se conserva.
