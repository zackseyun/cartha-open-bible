revisions:
- from: Pues, ¿no tienen casas para comer y beber? ¿O desprecian a la iglesia de Dios y avergüenzan a los que no tienen nada[a]? ¿Qué les diré? ¿Los alabaré? En esto no los alabo.
  to: Pues, ¿no tienen casas para comer y beber? ¿O desprecian a la iglesia de Dios y avergüenzan a los que no tienen nada[a]? ¿Qué debo decirles? ¿Debo alabarlos? En esto no los alabo.
  rationale: Se corrigen únicamente las dos preguntas retóricas finales para evitar una referencia pronominal ambigua o errónea en español y para representar con mayor fidelidad el deliberativo griego dirigido a los corintios. El resto del borrador es fiel y natural, por lo que se conserva.
