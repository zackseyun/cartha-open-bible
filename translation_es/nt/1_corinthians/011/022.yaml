translation:
  language: es
  text: Pues, ¿no tienen casas para comer y beber? ¿O desprecian a la iglesia de Dios y avergüenzan a los que no tienen nada[a]? ¿Qué debo decirles? ¿Debo alabarlos? En esto no los alabo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘los pobres’ o ‘los que no tienen comida’; el griego literalmente dice ‘los que no tienen’.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἰκίας
  english_pob_choice: houses
  chosen_spanish: casas
  alternatives_spanish:
  - hogares
  lexicon: BDAG
  rationale: ‘Casas’ conserva el contraste material y espacial con ‘la iglesia de Dios’ y sigue de cerca el sustantivo plural del griego. ‘Hogares’ sería más interpretativo en español y puede suavizar la oposición retórica.
- source_word: εἰς τὸ ἐσθίειν καὶ πίνειν
  english_pob_choice: for eating and drinking
  chosen_spanish: para comer y beber
  alternatives_spanish:
  - para el comer y beber
  - a comer y beber
  lexicon: BDAG
  rationale: La construcción con infinitivo articular expresa finalidad. ‘Para comer y beber’ comunica esa finalidad de manera natural en español sin perder la fuerza del griego.
- source_word: τῆς ἐκκλησίας τοῦ θεοῦ
  english_pob_choice: the church of God
  chosen_spanish: la iglesia de Dios
  alternatives_spanish:
  - la asamblea de Dios
  lexicon: BDAG
  rationale: ‘Iglesia’ es el equivalente establecido y más claro en este contexto paulino. ‘Asamblea’ sería legítima como trasfondo etimológico, pero en español puede sonar menos natural y no mejora la precisión aquí.
- source_word: καταφρονεῖτε
  english_pob_choice: despise
  chosen_spanish: desprecian
  alternatives_spanish:
  - desestiman
  - menosprecian
  lexicon: BDAG
  rationale: ‘Desprecian’ conserva la dureza moral del verbo y refleja bien la reprensión de Pablo. ‘Menosprecian’ también sería posible, pero ‘desprecian’ es más directo.
- source_word: καταισχύνετε
  english_pob_choice: shame
  chosen_spanish: avergüenzan
  alternatives_spanish:
  - deshonran
  - humillan
  lexicon: BDAG
  rationale: El verbo indica causar vergüenza o deshonra. ‘Avergüenzan’ es fiel y natural; ‘humillan’ puede ser demasiado fuerte en una dirección específica y ‘deshonran’ desplaza el foco.
- source_word: τοὺς μὴ ἔχοντας
  english_pob_choice: those who have nothing
  chosen_spanish: los que no tienen nada
  alternatives_spanish:
  - los que no tienen
  - los pobres
  lexicon: BDAG
  rationale: La expresión griega significa literalmente ‘los que no tienen’. ‘Los que no tienen nada’ preserva la amplitud del texto sin convertirlo de antemano en una etiqueta socioeconómica más estrecha.
- source_word: τί εἴπω ὑμῖν;
  english_pob_choice: What should I say to you?
  chosen_spanish: ¿Qué les diré?
  alternatives_spanish:
  - ¿Qué debería decirles?
  - ¿Qué he de decirles?
  lexicon: BDAG
  rationale: El subjuntivo deliberativo expresa una pregunta retórica. En español, ‘¿Qué les diré?’ transmite bien la indecisión retórica y suena más natural que una forma más analítica.
- source_word: ἐπαινέσω ὑμᾶς;
  english_pob_choice: Should I praise you?
  chosen_spanish: ¿Los alabaré?
  alternatives_spanish:
  - ¿Debo alabarlos?
  - ¿He de alabarlos?
  lexicon: BDAG
  rationale: ‘Alabar’ mantiene la correspondencia con el verbo ἐπαινέω y conserva la ironía de la pregunta. La forma interrogativa simple reproduce bien el valor deliberativo.
- source_word: ἐν τούτῳ
  english_pob_choice: In this
  chosen_spanish: En esto
  alternatives_spanish:
  - En este asunto
  - Por esto
  lexicon: BDAG
  rationale: ‘En esto’ es breve, literal y suficientemente claro en el contexto; deja que el asunto en discusión determine el referente.
- source_word: οὐκ ἐπαινῶ
  english_pob_choice: I do not praise you
  chosen_spanish: no los alabo
  alternatives_spanish:
  - no los encomio
  - no los felicito
  lexicon: BDAG
  rationale: Se mantiene la repetición léxica de ἐπαινέω con ‘alabo’, como en el contexto inglés, para conservar el contraste retórico entre la pregunta y la negación final.
theological_decisions:
- issue: Referente de ‘los que no tienen nada’
  english_pob_reading: Rendered generically as 'those who have nothing' rather than explicitly 'the poor' in the main text.
  chosen_spanish_reading: Se mantiene la expresión general ‘los que no tienen nada’ en el texto principal.
  alternative_spanish_readings:
  - los pobres
  - los que no tienen comida
  rationale: El contexto apunta a personas materialmente privadas en la comida comunitaria, pero la forma griega es más amplia. Mantener la generalidad evita cerrar prematuramente la referencia y preserva la tensión observada en el texto fuente.
  doctrine_reference: Principio de primacía del texto original; no resolver en la traducción una amplitud semántica que el griego deja abierta.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la decisión inglesa auditada de mantener ‘those who have nothing’ en lugar de ‘the poor’, y conserva la secuencia retórica: preguntas de reprensión, seguida de la negativa final a alabar. No se registran revisiones previas en el paquete fuente.'
  spanish_consistency_notes:
  - Se usó ‘iglesia de Dios’ para mantener la terminología paulina estable y transparente.
  - Se evitó ‘SEÑOR’ porque aquí no aparece κύριος ni una sustitución del nombre divino.
  - Se mantuvo ‘alabo/alabar’ para reproducir la repetición de ἐπαινέω.
  - La nota al pie queda anclada solo en ‘los que no tienen nada’, donde el español introduce la misma ambigüedad léxica que el griego resuelve de forma amplia.
