translation:
  language: es
  text: Porque el hombre[a] no debe cubrir[b] su cabeza, pues él es imagen y gloria de Dios; pero la mujer[a] es gloria del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposo» / «esposa» en todo el versículo; los términos griegos ἀνήρ y γυνή pueden tener cualquiera de esos sentidos según el contexto.
    reason: alternative_reading
  - marker: b
    text: O «velar»; el griego dice de manera más general «cubrir su cabeza».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - el varón
  - el esposo
  lexicon: BDAG
  rationale: Se usa el sustantivo genérico «el hombre» para conservar el contraste representativo con «la mujer» en el versículo. «Esposo» sería más específico de lo que el griego marca aquí, y «varón» es posible pero menos natural para esta formulación en español.
- source_word: ὀφείλει
  english_pob_choice: ought
  chosen_spanish: debe
  alternatives_spanish:
  - debería
  - está obligado a
  - tiene que
  lexicon: BDAG
  rationale: «Debe» comunica obligación normativa de manera clara y sobria en español. «Está obligado a» sería más explícito pero más pesado; «debería» debilita la fuerza del texto.
- source_word: κατακαλύπτεσθαι τὴν κεφαλήν
  english_pob_choice: to cover his head
  chosen_spanish: cubrir su cabeza
  alternatives_spanish:
  - velarse la cabeza
  - tener la cabeza cubierta
  lexicon: BDAG
  rationale: Se mantiene la formulación general «cubrir su cabeza» porque el griego expresa de manera amplia la acción de cubrir, no necesariamente el acto técnico de velarse. «Velarse» sería más específico de lo que la forma verbal requiere.
- source_word: εἰκὼν
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - representación
  - reflejo
  lexicon: BDAG
  rationale: «Imagen» es la correspondencia directa y mantiene el eco teológico de la creación sin ampliar el sentido. Otras opciones introducen matices no marcados por el término.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - honor
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» conserva el peso teológico del término en ambos miembros del versículo. «Honor» reduce el alcance semántico; «esplendor» enfatiza solo una faceta del concepto.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: Se conserva el genitivo simple «de Dios» sin expansión interpretativa. Esto mantiene la afirmación tal como aparece en el griego.
- source_word: ὑπάρχων
  english_pob_choice: since he is
  chosen_spanish: pues él es
  alternatives_spanish:
  - siendo
  - ya que es
  - como quien es
  lexicon: BDAG
  rationale: La forma participial expresa la base o razón de la afirmación anterior; «pues él es» comunica esa relación causal de manera natural en español. «Siendo» sería más literal pero menos idiomático.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  - la esposa
  lexicon: BDAG
  rationale: Se traduce «la mujer» para mantener el contraste categorial con «el hombre» y respetar el alcance amplio del argumento. «La esposa» sobredeterminaría una relación matrimonial que el griego no señala de forma explícita aquí.
- source_word: ἀνδρός
  english_pob_choice: of man
  chosen_spanish: del hombre
  alternatives_spanish:
  - de un hombre
  - de su esposo
  lexicon: BDAG
  rationale: «Del hombre» preserva el paralelismo con la primera cláusula y el sentido genérico de ἀνήρ en este contexto. «De su esposo» introduciría una restricción relacional no expresada por el texto.
theological_decisions:
- issue: 'Cómo rendir ἀνήρ/γυνή: hombre/mujer o esposo/esposa'
  english_pob_reading: man/woman
  chosen_spanish_reading: hombre/mujer
  alternative_spanish_readings:
  - esposo/esposa
  rationale: El contexto contrasta masculino y femenino en una argumentación sobre cabeza, creación e imagen/gloria, no una instrucción restringida solo al matrimonio. «Hombre/mujer» conserva ese alcance representativo sin añadir una limitación conyugal.
  doctrine_reference: Primacía del original y preservación del alcance semántico contextual.
- issue: Cómo mantener la asimetría teológica de la frase final
  english_pob_reading: Retain 'the woman is the glory of man' in the main text
  chosen_spanish_reading: Mantener «la mujer es gloria del hombre»
  alternative_spanish_readings:
  - la mujer refleja la gloria del hombre
  - la mujer es honor del hombre
  rationale: El griego usa una afirmación directa con ἐστιν y δόξα; la traducción debe conservar esa tensión teológica sin suavizarla ni reinterpretarla. «Refleja» o «honor» desplazan el peso de la declaración.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con el audit trail inglés más reciente: se mantiene el enfoque en el sentido genérico de ἀνήρ/γυνή, la obligación normativa de ὀφείλει, el valor general de κατακαλύπτεσθαι como «cubrir», y la afirmación teológica sin suavizar de que la mujer es gloria del hombre. No se registran revisiones textuales adicionales en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «imagen» y «gloria» para εἰκών y δόξα, respectivamente, por consistencia terminológica.
  - Se usa «Dios» para θεοῦ y no se introduce ninguna sustitución eclesiástica como «Señor».
  - La alternancia hombre/mujer se conserva de forma simétrica para reflejar el paralelismo del griego.
  - 'El orden de ideas sigue el griego: norma, fundamento, conclusión sobre la mujer.'
  - La puntuación con punto y coma reproduce la relación argumentativa del original.
