revisions:
- from: Porque cada uno se adelanta con su propia cena, al comer[a], y uno tiene hambre mientras otro se embriaga[b].
  to: Porque cada uno come su propia cena antes que los demás cuando comen[a], y uno tiene hambre mientras otro se embriaga[b].
  rationale: 'Se reemplazó «se adelanta con su propia cena» por «come su propia cena antes que los demás» para expresar de forma natural y fiel el sentido contextual de προλαμβάνει: tomar la propia comida anticipadamente o sin esperar a los otros. Se mantuvo «cuando comen» como línea principal por cercanía al inglés auditado y al valor temporal de ἐν τῷ φαγεῖν. Se ajustó la nota b para reflejar mejor la alternativa auditada sin introducir matices innecesarios.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:38Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: ἕκαστος como distributivo singular («cada uno»), τὸ ἴδιον δεῖπνον como comida propia en contraste con la comida compartida, y el contraste final entre hambre y embriaguez. Sin embargo, «se adelanta con su propia cena» suena poco idiomático en español y no expresa con suficiente claridad el matiz de προλαμβάνει como tomar/comer antes de otros o proceder sin esperarlos. Además, la nota b del borrador introduce «mientras» y «está borracho», alejándose de la alternativa inglesa principal, que conserva mejor la estructura coordinada y el valor verbal de μεθύει.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero «se adelanta con su propia cena» resulta forzado en español e incluso puede sonar como desplazamiento físico más que prioridad egoísta al comer. «Come su propia cena antes que los demás» comunica el abuso con mayor naturalidad y fidelidad. «Al comer» es aceptable, pero con la revisión principal la oración fluye mejor como «cuando comen». «Se embriaga» es digno y correcto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La elección «se embriaga» respeta la decisión teológica de no suavizar μεθύει.
  issues:
  - severity: medium
    issue: «se adelanta con su propia cena» es poco natural y semánticamente impreciso
    rationale: προλαμβάνει aquí no se refiere meramente a adelantarse 'con' algo, sino a tomar/comer la propia comida antes de otros o sin esperarlos. La formulación actual suena calcada y puede confundir al lector.
  - severity: low
    issue: La nota b no corresponde bien a la alternativa auditada
    rationale: La alternativa inglesa auditada es «one goes hungry, another is drunk». La nota española actual añade «mientras», que no está exigido por la construcción, y «está borracho» puede servir, pero conviene ajustar la nota para reflejar más limpiamente la alternativa preservada.
  revised_spanish_text: Porque cada uno come su propia cena antes que los demás cuando comen[a], y uno tiene hambre mientras otro se embriaga[b].
  revised_footnotes:
  - marker: a
    text: O «al comer». La construcción griega con infinitivo articular es temporal y puede entenderse también de forma muy cercana así.
    reason: alternative_reading
  - marker: b
    text: O «uno pasa hambre y otro está borracho». El griego puede expresarse de manera más resultativa o estática en esta cláusula final.
    reason: alternative_reading
  revision_rationale: 'Se reemplazó «se adelanta con su propia cena» por «come su propia cena antes que los demás» para expresar de forma natural y fiel el sentido contextual de προλαμβάνει: tomar la propia comida anticipadamente o sin esperar a los otros. Se mantuvo «cuando comen» como línea principal por cercanía al inglés auditado y al valor temporal de ἐν τῷ φαγεῖν. Se ajustó la nota b para reflejar mejor la alternativa auditada sin introducir matices innecesarios.'
