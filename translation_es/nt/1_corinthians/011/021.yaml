translation:
  language: es
  text: Porque cada uno come su propia cena antes que los demás cuando comen[a], y uno tiene hambre mientras otro se embriaga[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «al comer». La construcción griega con infinitivo articular es temporal y puede entenderse también de forma muy cercana así.
    reason: alternative_reading
  - marker: b
    text: O «uno pasa hambre y otro está borracho». El griego puede expresarse de manera más resultativa o estática en esta cláusula final.
    reason: alternative_reading
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - todos
  - cada persona
  lexicon: BDAG
  rationale: ἕκαστος es distributivo singular; «cada uno» conserva esa individualización mejor que un plural colectivo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación del reproche previo; «Porque» funciona de manera natural y mantiene el valor explicativo de γάρ.
- source_word: τὸ ἴδιον δεῖπνον
  english_pob_choice: his own supper
  chosen_spanish: su propia cena
  alternatives_spanish:
  - su propia comida
  - su propia cena
  lexicon: BDAG
  rationale: δεῖπνον denota una comida principal y puede tener sentido de cena; «su propia cena» conserva el matiz de comida/supper y ἴδιον refuerza la posesión privada en contraste con la mesa común.
- source_word: προλαμβάνει
  english_pob_choice: goes ahead with
  chosen_spanish: se adelanta con
  alternatives_spanish:
  - toma antes
  - va por delante con
  - se adelanta a
  lexicon: BDAG
  rationale: El verbo puede significar tomar antes o ir por delante. «Se adelanta con» comunica el sentido de preceder a otros sin forzar un objeto adicional y deja visible la falta de consideración hacia los demás.
- source_word: ἐν τῷ φαγεῖν
  english_pob_choice: when they eat
  chosen_spanish: al comer
  alternatives_spanish:
  - mientras comen
  - cuando comen
  - al momento de comer
  lexicon: BDAG
  rationale: La construcción articular con infinitivo es temporal; «al comer» es breve, natural y suficientemente literal sin ampliar el sentido.
- source_word: ὃς μὲν ... ὃς δὲ
  english_pob_choice: one ... another
  chosen_spanish: uno ... otro
  alternatives_spanish:
  - uno ... mientras otro
  - uno ... y otro
  lexicon: BDAG
  rationale: La correlación contrasta dos resultados entre participantes; «uno ... otro» expresa bien ese paralelismo en español.
- source_word: πεινᾷ
  english_pob_choice: is hungry
  chosen_spanish: tiene hambre
  alternatives_spanish:
  - está hambriento
  - pasa hambre
  lexicon: BDAG
  rationale: El verbo describe la condición resultante; «tiene hambre» es la formulación más natural y directa en español.
- source_word: μεθύει
  english_pob_choice: gets drunk
  chosen_spanish: se embriaga
  alternatives_spanish:
  - está borracho
  - se emborracha
  lexicon: BDAG
  rationale: El verbo señala intoxicación real. «Se embriaga» mantiene la fuerza del reproche y suena digno en español bíblico moderno sin suavizar el contenido.
theological_decisions:
- issue: Referencia singular distributiva
  english_pob_reading: his own supper
  chosen_spanish_reading: su propia cena
  alternative_spanish_readings:
  - su propia comida
  - la propia cena de cada uno
  rationale: El griego usa formas singulares con valor distributivo. La traducción conserva la posesión singular implícita sin convertirla en plural ni diluir el contraste con la comida común.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Gravedad del desorden en la mesa del Señor
  english_pob_reading: gets drunk
  chosen_spanish_reading: se embriaga
  alternative_spanish_readings:
  - está borracho
  - se emborracha
  rationale: El texto describe embriaguez real, no solo exceso de apetito. La redacción debe conservar esa tensión moral sin atenuarla.
  doctrine_reference: 1 Corintios 11:21 en contexto de la corrección paulina sobre la Cena del Señor
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del audit trail inglés, que prefirió una expresión más literal para ἐν τῷ φαγεῖν. La versión española sigue esa decisión con «al comer» y mantiene la tensión semántica de προλαμβάνει y μεθύει sin suavizarla.
  spanish_consistency_notes:
  - Se usó «cena» para δεῖπνον en coherencia con el sentido de comida principal y el contexto de la Cena del Señor.
  - Se evitó «SEÑOR» o «Cristo» porque no aparecen en este versículo; no se requiere decisión terminológica adicional sobre el nombre divino o el título mesiánico.
  - Se mantuvo un registro bíblico moderno, pero con sintaxis española natural y sin calco innecesario del inglés.
