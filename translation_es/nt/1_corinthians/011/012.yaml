translation:
  language: es
  text: Porque así como la mujer viene del hombre[a], así también el hombre es por medio de la mujer; pero todo proviene de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'esposa' y 'esposo' si el contexto se entiende más estrechamente como matrimonial y no como relación general entre varón y mujer.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Porque como
  - Así como
  lexicon: BDAG
  rationale: Mantiene la relación causal/expositiva de γάρ y la comparación de ὥσπερ, con un inicio natural en español.
- source_word: ἡ γυνή
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - la mujer
  lexicon: BDAG
  rationale: La referencia es general y no estrictamente conyugal; 'la mujer' conserva el valor representativo del término sin restringirlo a 'esposa'.
- source_word: ἐκ τοῦ ἀνδρός
  english_pob_choice: from the man
  chosen_spanish: procede del hombre
  alternatives_spanish:
  - viene del hombre
  - sale del hombre
  - procede de un hombre
  lexicon: BDAG
  rationale: ἐκ indica origen/fuente. 'Procede de' comunica bien ese origen en español y mantiene la idea de procedencia sin sonar demasiado mecánico.
- source_word: ὁ ἀνήρ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el esposo
  lexicon: BDAG
  rationale: El contexto sigue siendo general y recíproco con γυνή; 'el hombre' preserva esa amplitud mejor que 'esposo'.
- source_word: διὰ τῆς γυναικός
  english_pob_choice: through the woman
  chosen_spanish: mediante la mujer
  alternatives_spanish:
  - a través de la mujer
  - por medio de la mujer
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. 'Mediante' conserva ese matiz y suena más natural y digno en español que una calca.
- source_word: τὰ δὲ πάντα
  english_pob_choice: but all things
  chosen_spanish: pero todo
  alternatives_spanish:
  - pero todas las cosas
  - y todo
  lexicon: BDAG
  rationale: En español, 'todo' puede abarcar la totalidad de lo referido por πάντα sin necesidad de 'cosas'. 'Pero' mantiene el leve contraste de δέ.
- source_word: ἐκ τοῦ θεοῦ
  english_pob_choice: from God
  chosen_spanish: procede de Dios
  alternatives_spanish:
  - viene de Dios
  - es de Dios
  lexicon: BDAG
  rationale: El cierre enfatiza fuente/origen; 'procede de Dios' expresa bien el movimiento originario de ἐκ y enlaza con el verbo elegido al inicio.
theological_decisions:
- issue: Sentido de γυνή y ἀνήρ
  english_pob_reading: generic 'woman' and 'man' rather than 'wife' and 'husband'
  chosen_spanish_reading: '''mujer'' y ''hombre'' en sentido general'
  alternative_spanish_readings:
  - '''esposa'' y ''esposo'''
  rationale: El argumento apela al orden de la creación y a la generación humana en general, no solo al matrimonio de una pareja. Por eso se conserva el alcance genérico.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Relación entre origen humano y origen divino
  english_pob_reading: preserve the distinction between 'from' (ἐκ) and 'through' (διά)
  chosen_spanish_reading: distinguir 'procede de' y 'mediante'
  alternative_spanish_readings:
  - usar 'de' para ambos
  - usar 'por' para ambos
  rationale: 'El pasaje conserva una tensión: la mujer tiene origen en el hombre, el hombre viene mediante la mujer, pero todo procede de Dios. Mantener distintas preposiciones evita aplanar esa estructura teológica.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el registro auditado en inglés. No se aplicaron revisiones posteriores; se preserva la distinción fuente/medio/origen con un español natural y publicable.
  spanish_consistency_notes:
  - Se usa 'Dios' de forma consistente para θεός.
  - Se evita 'Cristo' porque no aparece en este versículo.
  - '''procede de'' se usa de manera coherente para ἐκ; ''mediante'' para διά.'
  - La nota al pie marca la ambigüedad léxica de γυνή/ἀνήρ sin imponer una lectura exclusivamente matrimonial.
