translation:
  language: es
  text: Porque en efecto[a], el hombre no fue creado para la mujer, sino la mujer para el hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por causa de» / «a causa de». La preposición griega puede indicar causa o propósito; aquí se traduce «para» para reflejar el argumento orientado a la creación.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque en efecto
  alternatives_spanish:
  - Pues en efecto
  - Porque realmente
  - Pues
  lexicon: BDAG
  rationale: La combinación introduce una explicación con énfasis. «Porque» conserva el valor inferencial de γάρ, y «en efecto» refleja el matiz enfático de καί sin sonar forzado en español.
- source_word: ἐκτίσθη
  english_pob_choice: was created
  chosen_spanish: fue creado
  alternatives_spanish:
  - fue formado
  lexicon: BDAG
  rationale: κτίζω significa propiamente «crear». «Fue creado» mantiene con precisión la referencia al orden de la creación, que es el fundamento argumentativo del versículo.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - un hombre
  - el varón
  - esposo
  lexicon: BDAG
  rationale: Aquí el término es genérico y remite al relato de la creación, no a un esposo en particular. «El hombre» preserva el alcance representativo masculino del griego.
- source_word: διὰ τὴν γυναῖκα
  english_pob_choice: for the woman
  chosen_spanish: para la mujer
  alternatives_spanish:
  - por causa de la mujer
  - a favor de la mujer
  - en beneficio de la mujer
  lexicon: BDAG
  rationale: Con διά + acusativo, el contexto favorece finalidad/propósito. «Para» es la opción más natural y mantiene la orientación creacional del argumento sin especificar más de lo que el griego exige.
- source_word: γυνὴ
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  - la esposa
  lexicon: BDAG
  rationale: Como con ἀνήρ, el término funciona de manera general y ligada a la creación. «La mujer» evita restringir indebidamente el sentido a «esposa».
- source_word: διὰ τὸν ἄνδρα
  english_pob_choice: for the man
  chosen_spanish: para el hombre
  alternatives_spanish:
  - por causa del hombre
  - a favor del hombre
  - en beneficio del hombre
  lexicon: BDAG
  rationale: Se conserva el paralelismo con la primera frase. «Para» reproduce la misma relación teleológica que el inglés POB destacó y es idiomática en español.
theological_decisions:
- issue: Si ἀνήρ/γυνή deben leerse como «esposo/esposa» o como «hombre/mujer»
  english_pob_reading: man/woman
  chosen_spanish_reading: hombre/mujer
  alternative_spanish_readings:
  - esposo/esposa
  rationale: El argumento se apoya explícitamente en la creación, no en una relación matrimonial concreta. Por eso «hombre/mujer» conserva mejor el alcance creacional y evita introducir una restricción que el texto no señala.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Valor de διά + acusativo en ambos miembros de la frase
  english_pob_reading: for / because of / for the sake of
  chosen_spanish_reading: para
  alternative_spanish_readings:
  - por causa de
  - a favor de
  - en beneficio de
  rationale: En este contexto de creación y propósito, «para» expresa adecuadamente finalidad y beneficio, manteniendo la simetría del contraste y la naturalidad del español.
  doctrine_reference: BDAG, διά + acusativo; argumento creacional en 1 Corintios 11
translation_notes:
  revision_awareness: No se registran revisiones aplicadas en el paquete de auditoría; el borrador sigue el pasaje griego SBLGNT y la línea de traducción inglesa POB tal como está documentada, sin cambios posteriores indicados.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo hombre/mujer en ambos miembros de la frase.
  - Se evitó «esposo/esposa» para no estrechar el alcance creacional del texto.
  - «Para» se usó de manera uniforme para διά + acusativo en ambas cláusulas, con nota de alternativa semántica.
