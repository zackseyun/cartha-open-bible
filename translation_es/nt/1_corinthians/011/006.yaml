base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/006.yaml
  text: For if a woman does not cover her head[a], she should also have her hair cut off; but if it is disgraceful for a woman to have her hair cut off or to be shaved[b], she should cover her head.
  footnotes:
