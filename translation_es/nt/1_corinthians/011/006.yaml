translation:
  language: es
  text: Porque si la mujer no se cubre la cabeza[a], que también se deje cortar el cabello; pero si es deshonroso para la mujer dejarse cortar el cabello o raparse[b], que se cubra la cabeza.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esposa» en todo el versículo; el griego gynē puede significar tanto «mujer» como «esposa» según el contexto.
    reason: alternative_reading
  - marker: b
    text: El verbo también puede traducirse «ser velada»; el griego habla de estar cubierta, con la cobertura de la cabeza implícita por el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: κατακαλύπτεται / κατακαλυπτέσθω
  english_pob_choice: cover her head / should cover her head
  chosen_spanish: se cubre la cabeza / que se cubra la cabeza
  alternatives_spanish:
  - está velada / que esté velada
  - se cubre / que se cubra
  lexicon: BDAG
  rationale: El verbo significa cubrir o velar. En este contexto de cobertura de la cabeza, el español necesita explicitar el objeto para que el sentido sea claro y natural. "Cubrir la cabeza" comunica bien la idea implícita sin imponer con demasiada fuerza el tipo exacto de prenda; "velada" es posible, pero más estrecho e interpretativo.
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: γυνή puede significar "mujer" o "esposa" según el contexto. Aquí la afirmación está formulada de manera general, no de forma explícita dentro de una pareja marido-esposa; por eso "mujer" es la opción menos restrictiva. La alternativa queda abierta en una nota por el alcance más amplio del pasaje.
- source_word: κειράσθω
  english_pob_choice: she should also have her hair cut off
  chosen_spanish: que también se corte el cabello
  alternatives_spanish:
  - que también sea esquilada
  - que también se corte el pelo
  lexicon: BDAG
  rationale: El imperativo transmite una consecuencia dentro del razonamiento de Pablo. "Que también se corte el cabello" comunica la idea de cortar o esquilar el cabello en español actual con suficiente fuerza. "Corte el pelo" puede sonar demasiado débil; "esquilada" es más literal pero menos natural.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: BDAG
  rationale: 'Aquí καί enlaza la consecuencia retóricamente: si no va cubierta, entonces debe aceptar además el otro paso. "También" conserva ese avance argumentativo de forma clara en español.'
- source_word: αἰσχρὸν
  english_pob_choice: disgraceful
  chosen_spanish: deshonroso
  alternatives_spanish:
  - vergonzoso
  - afrentoso
  lexicon: BDAG
  rationale: '"Deshonroso" captura bien la dimensión de honor/vergüenza de αἰσχρός en este contexto. "Vergonzoso" también sería posible, pero "deshonroso" suena más natural en español contemporáneo y mantiene el peso moral-social.'
- source_word: τὸ κείρασθαι
  english_pob_choice: to have her hair cut off
  chosen_spanish: cortarse el cabello
  alternatives_spanish:
  - ser esquilada
  - cortarse el pelo
  lexicon: BDAG
  rationale: El infinitivo articular funciona como sujeto de "es deshonroso". La expresión se refiere al corte del cabello, no a un recorte leve. Esta redacción mantiene la diferencia con el rapado de la cláusula siguiente.
- source_word: ξυρᾶσθαι
  english_pob_choice: to be shaved
  chosen_spanish: raparse
  alternatives_spanish:
  - ser rapada
  - afeitarse la cabeza
  lexicon: BDAG
  rationale: El verbo denota afeitar/rapar. "Raparse" es una forma natural en español y conserva el contraste con el simple corte del cabello. "Afeitarse la cabeza" es claro, pero menos conciso; "ser rapada" suena más pasivo y menos idiomático aquí.
- source_word: γὰρ ... δὲ
  english_pob_choice: For ... but
  chosen_spanish: Porque ... pero
  alternatives_spanish:
  - Pues ... pero
  - Porque ... ahora bien
  lexicon: BDAG
  rationale: Estas conjunciones estructuran el razonamiento de Pablo. "Porque ... pero" representa con claridad el flujo argumentativo en español y mantiene la relación de causa/contraste.
theological_decisions:
- issue: Si γυνή debe traducirse como "mujer" o "esposa" en este versículo
  english_pob_reading: woman
  chosen_spanish_reading: mujer
  alternative_spanish_readings:
  - esposa
  rationale: El verso formula un principio general sobre la cobertura de la cabeza y el cabello, sin mencionar explícitamente a un marido. Como el contexto más amplio ha sido interpretado de varias maneras, traducir γυνή como "mujer" preserva el alcance amplio y evita restringir indebidamente el mandato a mujeres casadas. La lectura alternativa se deja abierta en nota.
  doctrine_reference: Filosofía de traducción §3, §4
translation_notes:
  revision_awareness: 'El pasaje coincide con la última revisión auditada: el texto inglés POB mantiene la misma lectura y no hubo cambios en la pasada más reciente. Esta versión española sigue ese estado estable sin introducir ajustes no respaldados por la evidencia fuente.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Mesías» fuera de este versículo, sin incidencia aquí.
  - Se optó por «mujer» en coherencia con la lectura auditada del inglés POB, preservando la alternativa «esposa» en nota.
  - Se eligió un español natural pero sobrio, evitando un calco rígido de la sintaxis griega y conservando la fuerza exhortativa del imperativo.
