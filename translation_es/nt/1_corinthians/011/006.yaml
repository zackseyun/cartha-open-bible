    text: Or 'wife' throughout the verse; Greek gynē can mean either 'woman' or 'wife' depending on context.
    reason: alternative_reading
  - marker: b
    text: The verb can also be rendered 'be veiled'; the Greek speaks of being covered, with the head covering implied by the context.
    reason: lexical_alternative
