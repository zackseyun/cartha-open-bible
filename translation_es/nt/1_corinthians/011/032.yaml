translation:
  language: es
  text: Pero cuando somos juzgados por el Señor[a], somos disciplinados, para que no se nos condene junto con el mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando somos juzgados por el Señor, somos disciplinados». Los presentes pueden subrayar una acción en curso.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κρινόμενοι
  english_pob_choice: when we are judged
  chosen_spanish: cuando somos juzgados
  alternatives_spanish:
  - siendo juzgados
  - cuando estamos siendo juzgados
  lexicon: BDAG
  rationale: 'El participio presente pasivo se entiende temporalmente en el contexto: el juicio del Señor ocurre y produce la disciplina que sigue. «Cuando somos juzgados» conserva el sentido judicial de κρίνω sin añadir una especificación innecesaria sobre si se trata de evaluación o castigo; esa función la aclara παιδευόμεθα.'
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: δὲ introduce un contraste suave con la advertencia anterior; «Pero» lo expresa con naturalidad en español.
- source_word: ὑπὸ κυρίου
  english_pob_choice: by the Lord
  chosen_spanish: por el Señor
  alternatives_spanish:
  - por el Señor Jesús
  - por el Dueño
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agencia. «Señor» mantiene el valor doctrinal habitual para κύριος y evita expandir el texto más allá de lo que exige el contexto inmediato.
- source_word: παιδευόμεθα
  english_pob_choice: we are disciplined
  chosen_spanish: somos disciplinados
  alternatives_spanish:
  - somos corregidos
  - somos formados
  - somos castigados
  lexicon: BDAG
  rationale: παιδεύω puede implicar instrucción, formación o corrección disciplinaria. En este contexto de juicio correctivo divino, «somos disciplinados» conserva el matiz remedial y no meramente punitivo.
- source_word: ἵνα μὴ
  english_pob_choice: so that ... not
  chosen_spanish: para que no
  alternatives_spanish:
  - a fin de que no
  - de modo que no
  lexicon: BDAG
  rationale: La cláusula expresa finalidad o resultado. «Para que no» es una solución idiomática y clara en español.
- source_word: σὺν τῷ κόσμῳ
  english_pob_choice: along with the world
  chosen_spanish: junto con el mundo
  alternatives_spanish:
  - con el mundo
  - al lado del mundo
  lexicon: BDAG
  rationale: σύν denota asociación o compañía. «Junto con» conserva la idea de compartir el mismo destino. «El mundo» mantiene el alcance colectivo de κόσμος como orden humano en oposición a Dios.
- source_word: κατακριθῶμεν
  english_pob_choice: we may not be condemned
  chosen_spanish: se nos condene
  alternatives_spanish:
  - se nos sentencie
  - se nos condene a juicio
  lexicon: BDAG
  rationale: κατακρίνω intensifica κρίνω y expresa condena adversa. La construcción impersonal «se nos condene» suena natural en español y preserva la diferencia entre el juicio disciplinario presente y la condenación final evitada.
theological_decisions:
- issue: Distinción entre juicio correctivo presente y condenación final
  english_pob_reading: The verse distinguishes the Lord's present corrective discipline of believers from the world's final condemnation.
  chosen_spanish_reading: El versículo distingue la disciplina correctiva presente del Señor de la condenación final que se evita.
  alternative_spanish_readings:
  - El versículo puede leerse de modo más general como una corrección temporal sin implicar una distinción tan marcada entre creyentes e incrédulos.
  rationale: La relación entre κρινόμενοι, παιδευόμεθα y κατακριθῶμεν sugiere que el juicio actual del Señor tiene una finalidad correctiva y preventiva. La traducción mantiene esa tensión sin resolverla en un sistema doctrinal más amplio.
  doctrine_reference: Conservar la tensión teológica sin cerrarla artificialmente.
translation_notes:
  revision_awareness: Se siguió el pasaje griego SBLGNT junto con el audit trail en inglés. No hubo revisiones aplicadas en la última pasada; el borrador español conserva la distinción lexical entre κρίνω y κατακρίνω y el matiz correctivo de παιδεύω.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, conforme al valor doctrinal del término en el contexto.
  - Se mantuvo «mundo» para κόσμος como orden colectivo opuesto a Dios, no como simple planeta.
  - Se diferenció «juzgados» de «condene» para reflejar κρίνω frente a κατακρίνω.
  - Se prefirió «disciplinados» por su matiz formativo/correctivo en español moderno.
