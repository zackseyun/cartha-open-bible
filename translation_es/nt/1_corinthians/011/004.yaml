translation:
  language: es
  text: Todo varón que ora o profetiza con algo en la cabeza deshonra a su cabeza[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más tradicionalmente, ‘con la cabeza cubierta’. El griego dice literalmente ‘teniendo algo sobre/de la cabeza’ y no especifica exactamente qué clase de cobertura es.
    reason: lexical_alternative
  - marker: b
    text: ‘Su cabeza’ puede referirse a su propia cabeza de manera literal y, al mismo tiempo, evocar el uso relacional de ‘cabeza’ en el contexto inmediato.
    reason: alternative_reading
lexical_decisions:
- source_word: πᾶς ἀνὴρ
  english_pob_choice: Every man
  chosen_spanish: Todo varón
  alternatives_spanish:
  - Todo hombre
  - Cada varón
  - Cada hombre
  lexicon: BDAG
  rationale: ἀνήρ puede significar ‘varón’ o ‘hombre’ según el contexto. Aquí la frase es general y masculina, y el paralelo inmediato con la mujer en el versículo siguiente favorece una formulación directa sin neutralizar el género. ‘Varón’ conserva la referencia masculina con dignidad y claridad en español bíblico moderno.
- source_word: προσευχόμενος
  english_pob_choice: who prays
  chosen_spanish: que ora
  alternatives_spanish:
  - mientras ora
  - que está orando
  lexicon: BDAG
  rationale: El participio presente describe una acción en curso o característica. ‘Que ora’ suena natural en español y preserva ese valor sin añadir material interpretativo.
- source_word: προφητεύων
  english_pob_choice: or prophesies
  chosen_spanish: o profetiza
  alternatives_spanish:
  - o mientras profetiza
  - o está profetizando
  lexicon: BDAG
  rationale: La coordinación con προσευχόμενος exige el mismo nivel de sencillez y paralelismo. ‘Profetiza’ es la equivalencia transparente y directa en español.
- source_word: κατὰ κεφαλῆς ἔχων
  english_pob_choice: with something on his head
  chosen_spanish: con algo sobre su cabeza
  alternatives_spanish:
  - con la cabeza cubierta
  - llevando algo sobre la cabeza
  lexicon: BDAG
  rationale: La expresión griega es idiomática y literalmente habla de ‘tener’ algo ‘sobre/de la cabeza’, sin nombrar de forma explícita un velo u otro objeto. ‘Con algo sobre su cabeza’ preserva esa indeterminación del original, que el inglés POB también cuidó.
- source_word: καταισχύνει
  english_pob_choice: dishonors
  chosen_spanish: deshonra
  alternatives_spanish:
  - avergüenza
  - disgracia
  lexicon: BDAG
  rationale: El verbo pertenece al campo honor/vergüenza. ‘Deshonra’ reproduce bien ese valor en español y mantiene la fuerza relacional del texto.
- source_word: τὴν κεφαλὴν αὐτοῦ
  english_pob_choice: his head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su propia cabeza
  - su cabeza física
  lexicon: BDAG
  rationale: κεφαλή puede entenderse literalmente como la cabeza física y, por el contexto cercano, también evocar el sentido relacional de ‘cabeza’. ‘Su cabeza’ conserva esa ambigüedad sin resolverla prematuramente.
theological_decisions:
- issue: Si la segunda ocurrencia de κεφαλή debe aclararse como cabeza física o como autoridad/relación de cabeza
  english_pob_reading: Retain the ambiguity with 'his head'
  chosen_spanish_reading: Conservar la ambigüedad con ‘su cabeza’
  alternative_spanish_readings:
  - su cabeza física
  - el que es su cabeza
  rationale: Pablo permite un traslape retórico entre la cabeza literal y el uso relacional de ‘cabeza’ en el contexto circundante. La traducción española debe mantener esa tensión en vez de resolverla en el texto principal.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el consenso del paquete fuente y el control cruzado: no hay revisiones posteriores que alteren la decisión principal, y la lectura permanece en alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene ‘cabeza’ para κεφαλή en ambos lugares, conservando la posible doble referencia.
  - Se usa ‘varón’ para preservar el masculino genérico sin neutralización.
  - La expresión ‘con algo sobre su cabeza’ evita precisar un objeto no nombrado por el griego.
