translation:
  language: es
  text: Por esta razón, muchos entre ustedes están débiles y enfermos, y bastantes[a] se han dormido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente, «han muerto». Pablo probablemente usa «se han dormido» como una metáfora cristiana habitual de la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Así que
  - Por lo tanto
  lexicon: BDAG
  rationale: La expresión causal remite al abuso anterior de la Cena del Señor. «Por esta razón» conserva la fuerza causal explícita en un español natural y sobrio, sin convertirlo en una conclusión más inferencial de lo que el griego permite.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: Aquí Pablo se refiere a una condición presente dentro de la comunidad corintia. «Entre ustedes» comunica bien el ámbito comunitario y evita una lectura interna-física de «en ustedes».
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - muchas personas
  - gran número
  lexicon: BDAG
  rationale: Adjetivo cuantitativo directo; «muchos» es la forma más natural y fiel en español.
- source_word: ἀσθενεῖς
  english_pob_choice: weak
  chosen_spanish: débiles
  alternatives_spanish:
  - flacos
  - enfermos
  lexicon: BDAG
  rationale: El término puede abarcar debilidad física general. Dado que sigue ἄρρωστοι, «débiles» preserva la distinción léxica frente al término más fuerte de enfermedad que viene después.
- source_word: ἄρρωστοι
  english_pob_choice: sick
  chosen_spanish: enfermos
  alternatives_spanish:
  - malos de salud
  - afectados por enfermedad
  lexicon: BDAG
  rationale: Este adjetivo denota claramente enfermedad. «Enfermos» mantiene el contraste con «débiles» y comunica el sentido de forma clara y actual.
- source_word: κοιμῶνται
  english_pob_choice: have fallen asleep
  chosen_spanish: se ha dormido
  alternatives_spanish:
  - duermen
  - han muerto
  lexicon: BDAG
  rationale: En el uso cristiano primitivo, κοιμάομαι puede funcionar como eufemismo reverente de la muerte. En español, «se ha dormido» preserva esa metáfora en un registro natural y respetuoso, sin resolverla prematuramente como «han muerto».
- source_word: ἱκανοί
  english_pob_choice: a good number
  chosen_spanish: una buena cantidad
  alternatives_spanish:
  - muchos
  - bastantes
  lexicon: BDAG
  rationale: El término indica un número considerable. «Una buena cantidad» evita repetir «muchos» y conserva la idea de proporción significativa.
theological_decisions:
- issue: 'Cómo traducir κοιμῶνται: si como sueño literal o como eufemismo de muerte'
  english_pob_reading: Metaphorical reference to death, preserved as 'have fallen asleep' in the main text
  chosen_spanish_reading: Eufemismo de muerte preservado como 'se ha dormido'
  alternative_spanish_readings:
  - duerme literalmente
  - ha muerto
  rationale: El contexto inmediato describe un juicio sobre la comunidad y la secuencia débiles → enfermos → dormido sugiere la muerte como sentido metafórico. Se conserva la metáfora sin explicitarla demasiado en el texto principal.
  doctrine_reference: Preservar la tensión teológica y retórica del texto; equivalencia óptima
translation_notes:
  revision_awareness: La versión inglesa auditada permanece sin cambios en la última revisión y fue verificada con acuerdo alto; esta propuesta sigue esa lectura sin introducir expansiones interpretativas nuevas.
  spanish_consistency_notes:
  - 'Se mantiene la tríada léxica: débiles / enfermos / se ha dormido, para reflejar la progresión del griego.'
  - Se evita «SEÑOR» o terminología eclesiástica no presente en este versículo.
  - El marcador [a] aparece únicamente en el término con ambigüedad metafórica.
  - El español usa un registro bíblico moderno y claro, sin calco excesivo de la sintaxis inglesa.
