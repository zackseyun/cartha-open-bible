translation:
  language: es
  text: Por tanto[b][a], cualquiera que coma el pan o beba la copa del Señor de manera indigna será culpable respecto al cuerpo y a la sangre del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más tradicionalmente: «será culpable del cuerpo y de la sangre del Señor». La construcción griega puede traducirse más literalmente así; se usa «respecto al cuerpo y a la sangre» en el texto principal para aclarar la idea de responsabilidad con relación al cuerpo y la sangre del Señor.'
    reason: lexical_alternative
  - marker: b
    text: «De manera indigna» traduce un adverbio y describe cómo se come o se bebe, no la valía intrínseca de la persona.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la conclusión inferencial del contexto anterior. «Por tanto» conserva esa fuerza lógica de modo natural y solemne en español.
- source_word: ὃς ἂν
  english_pob_choice: whoever
  chosen_spanish: cualquiera que
  alternatives_spanish:
  - quienquiera que
  - todo el que
  lexicon: BDAG
  rationale: La combinación relativa con ἄν expresa una generalización abierta. «Cualquiera que» comunica bien la condición general sin añadir matices no presentes.
- source_word: ἐσθίῃ
  english_pob_choice: eats
  chosen_spanish: coma
  alternatives_spanish:
  - come
  lexicon: BDAG
  rationale: En español, el subjuntivo presente encaja bien con la cláusula general introducida por ὃς ἂν y preserva el valor condicional.
- source_word: τὸν ἄρτον
  english_pob_choice: the bread
  chosen_spanish: el pan
  alternatives_spanish:
  - el pan de la cena
  - este pan
  lexicon: BDAG
  rationale: Se mantiene el sustantivo concreto y el artículo definido del texto griego. «El pan» es la forma natural para el pan sacramental en este contexto.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - y/o
  lexicon: BDAG
  rationale: La conjunción es disyuntiva; debe conservarse como «o» para no suavizar la advertencia dirigida a cualquiera de las dos acciones.
- source_word: πίνῃ τὸ ποτήριον
  english_pob_choice: drinks the cup
  chosen_spanish: beba la copa
  alternatives_spanish:
  - beba de la copa
  - tome la copa
  lexicon: BDAG
  rationale: La metonimia sacramental se conserva con «la copa». «Beber la copa» en español bíblico puede sonar poco natural; «beber la copa» se entiende, pero «beba la copa» mantiene la brevedad del griego. Se evita expandir innecesariamente a «de la copa» para no mover el foco textual.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Mesías
  - del Dueño
  lexicon: BDAG
  rationale: «Señor» es el equivalente doctrinal y litúrgicamente claro de κύριος aquí, referido a Jesús en el contexto de la cena del Señor.
- source_word: ἀναξίως
  english_pob_choice: in an unworthy manner
  chosen_spanish: de manera indigna
  alternatives_spanish:
  - indignamente
  - de un modo indigno
  lexicon: BDAG
  rationale: El adverbio modifica la manera de comer y beber, no la valía intrínseca de la persona. «De manera indigna» preserva esa función adverbial y suena más claro que el arcaísmo «indignamente».
- source_word: ἔνοχος ἔσται
  english_pob_choice: will be guilty
  chosen_spanish: será culpable
  alternatives_spanish:
  - quedará culpable
  - será responsable
  lexicon: BDAG
  rationale: Expresa culpabilidad o responsabilidad jurídica/moral. «Será culpable» es directo y solemne, acorde con el contexto de advertencia.
- source_word: τοῦ σώματος καὶ τοῦ αἵματος
  english_pob_choice: concerning the body and blood
  chosen_spanish: respecto del cuerpo y la sangre
  alternatives_spanish:
  - del cuerpo y de la sangre
  - ante el cuerpo y la sangre
  lexicon: BDAG
  rationale: Con ἔνοχος, el genitivo puede indicar aquello respecto de lo cual alguien es culpable o responsable. «Respecto del» conserva esa relación sin resolverla demasiado pronto hacia un «de» tradicional que en español podría sonar a posesión directa.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Mesías
  lexicon: BDAG
  rationale: Se conserva la repetición de «del Señor» para reflejar la reiteración del griego y mantener la referencia cristológica constante del contexto.
theological_decisions:
- issue: Sentido de ἀναξίως aplicado a la participación en la cena
  english_pob_reading: The verse condemns eating and drinking in an unworthy manner, not declaring that only personally worthy people may partake.
  chosen_spanish_reading: El versículo condena comer y beber de manera indigna, no afirma que solo las personas intrínsecamente dignas puedan participar.
  alternative_spanish_readings:
  - Condena al participante indigno, no solo el modo indigno.
  - Habla de un acto indigno más que de la dignidad personal.
  rationale: La forma adverbial debe quedar clara en español para no trasladar indebidamente el foco desde el modo de participar hacia la supuesta valía intrínseca del participante. Esto preserva la tensión gramatical y teológica del original.
  doctrine_reference: Translation philosophy §3 (preserve theological tension rather than resolve it) y §6 (readable modern Spanish)
- issue: Fuerza de ἢ entre comer y beber
  english_pob_reading: The warning applies if either action is done improperly.
  chosen_spanish_reading: La advertencia aplica si cualquiera de las dos acciones se hace de manera impropia.
  alternative_spanish_readings:
  - La advertencia vale para comer y beber como pareja fija.
  - La advertencia se refiere a ambas acciones conjuntamente.
  rationale: Se conserva la disyunción griega con «o», evitando convertirla en una coordinación más litúrgica de «y».
  doctrine_reference: Translation philosophy §1 (original-language primacy over translation tradition)
- issue: Referencia de «el cuerpo y la sangre del Señor»
  english_pob_reading: The phrase refers to the Lord's body and blood in the sacramental context.
  chosen_spanish_reading: La frase se entiende como referencia al cuerpo y la sangre del Señor en el contexto sacramental.
  alternative_spanish_readings:
  - Se refiere al cuerpo y la sangre de Cristo.
  - Se refiere al cuerpo y la sangre del Mesías.
  rationale: Se mantiene la referencia cristológica explícita con «Señor» y la relación sacramental del contexto de la cena, sin cambiar el término del original por un equivalente menos consistente con el resto del versículo.
  doctrine_reference: POB terminology default for κύριος in Christological contexts
translation_notes:
  revision_awareness: La revisión más reciente indicó alta concordancia y ningún cambio necesario. Este borrador sigue esa lectura, pero adapta con cuidado la sintaxis española para conservar la fuerza inferencial de Ὥστε, la disyunción de ἢ y el valor adverbial de ἀναξίως.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, en continuidad con el contexto cristológico y la terminología POB.
  - Se conserva la disyunción con «o» para reflejar ἢ sin armonización litúrgica.
  - «De manera indigna» evita sugerir que el texto habla de dignidad personal intrínseca en vez del modo de participar.
  - La nota [a] preserva la alternativa más literal que el audit trail inglés documenta para ἔνοχος + genitivo.
