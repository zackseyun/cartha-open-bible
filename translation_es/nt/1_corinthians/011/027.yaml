base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/027.yaml
  text: Therefore[b][a], whoever eats the bread or drinks the cup of the Lord in an unworthy manner will be guilty concerning the body and blood of the Lord.
  footnotes:
  - marker: a
    text: Or, more traditionally, 'will be guilty of the body and blood of the Lord.' The Greek construction can be rendered more literally this way; 'concerning' is used in the main text to clarify the sense of liability with respect to the Lord's body and blood.
    reason: lexical_alternative
  - marker: b
    text: '''In an unworthy manner'' translates an adverb and describes how one eats or drinks, not the intrinsic worth of the person.'
    reason: lexical_alternative
