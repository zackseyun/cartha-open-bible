translation:
  language: es
  text: 'Porque yo recibí del Señor lo que también les entregué: que el Señor Jesús[a], en la noche en que estaba siendo entregado, tomó pan.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, tradicionalmente, «en la noche en que fue traicionado».
    reason: alternative_reading
lexical_decisions:
- source_word: παρέλαβον
  english_pob_choice: received
  chosen_spanish: recibí
  alternatives_spanish:
  - acepté
  - recibí como tradición
  lexicon: BDAG
  rationale: En este contexto, παραλαμβάνω expresa la recepción de una tradición/instrucción apostólica. «Recibí» conserva el vínculo formal con «entregué» para reflejar el paralelismo de tradición en Pablo.
- source_word: ἀπὸ τοῦ κυρίου
  english_pob_choice: from the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Jesús
  - por autoridad del Señor
  lexicon: BDAG
  rationale: La frase señala origen. «Del Señor» mantiene la referencia directa del griego sin expandirla; la cláusula siguiente identifica a ese Señor como Jesús.
- source_word: παρέδωκα
  english_pob_choice: delivered
  chosen_spanish: les entregué
  alternatives_spanish:
  - les transmití
  - les pasé
  lexicon: BDAG
  rationale: «Entregué» conserva la correspondencia léxica con «recibí» y refleja el lenguaje de transmisión de tradición. «Transmití» es posible, pero debilita el eco verbal con el verbo previo.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a saber, que
  lexicon: BDAG
  rationale: Introduce el contenido de lo entregado. «Que» es natural y suficiente en español.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el valor cristológico y reverencial de κύριος con «Señor», que es el equivalente natural en español y mantiene la progresión hacia «el Señor Jesús».
- source_word: ἐν τῇ νυκτὶ ᾗ
  english_pob_choice: on the night when
  chosen_spanish: en la noche en que
  alternatives_spanish:
  - durante la noche en que
  - la noche cuando
  lexicon: BDAG
  rationale: La construcción temporal relativa se traduce con una forma idiomática y precisa en español, sin perder el sentido relacional del original.
- source_word: παρεδίδετο
  english_pob_choice: was being handed over
  chosen_spanish: estaba siendo entregado
  alternatives_spanish:
  - era traicionado
  - estaba siendo traicionado
  - era entregado
  lexicon: BDAG
  rationale: El imperfecto pasivo de παραδίδωμι significa literalmente «era/estaba siendo entregado». Se mantiene esa amplitud semántica, preservando la tensión entre la entrega humana y la dimensión redentora más amplia, en vez de limitar el sentido a «traicionado».
- source_word: ἔλαβεν ἄρτον
  english_pob_choice: took bread
  chosen_spanish: tomó pan
  alternatives_spanish:
  - tomó un pan
  - recibió pan
  lexicon: BDAG
  rationale: «Tomó pan» es la equivalencia más natural para ἔλαβεν ἄρτον y conserva la sencillez litúrgica del texto. El acusativo anartro no obliga a especificar «un pan».
theological_decisions:
- issue: Traducción de παρεδίδετο en la narración de la institución
  english_pob_reading: was being handed over
  chosen_spanish_reading: estaba siendo entregado
  alternative_spanish_readings:
  - era traicionado
  - estaba siendo traicionado
  rationale: El verbo παραδίδωμι puede significar entregar, poner en manos de, entregar para juicio o traicionar según el contexto. La opción principal preserva el alcance del término y evita reducir el pasaje solo a la acción de Judas, manteniendo abierta la tensión teológica del relato de la pasión. La nota conserva la lectura tradicional.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for κύριος
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el borrador sigue en acuerdo alto con el control cruzado y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se usa «Señor» de manera consistente para κύριος, y «Jesús» para Ἰησοῦς.
  - Se preserva el paralelismo tradicional de «recibí / entregué» para reflejar la transmisión apostólica.
  - «Estaba siendo entregado» mantiene la amplitud de παραδίδωμι sin imponer una sola interpretación narrativa.
  - La puntuación con dos puntos reproduce adecuadamente la apertura del contenido citado en el versículo.
