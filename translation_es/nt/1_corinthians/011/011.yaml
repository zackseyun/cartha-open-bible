translation:
  language: es
  text: Sin embargo[a], en el Señor la mujer no está aparte del hombre, ni el hombre aparte de la mujer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «La esposa no está aparte del esposo, ni el esposo aparte de la esposa». Los términos griegos pueden referirse tanto a mujer/hombre como a esposa/esposo; aquí se prefiere el sentido más amplio porque la declaración parece general y no limitada al matrimonio.'
    reason: alternative_reading
lexical_decisions:
- source_word: πλὴν
  english_pob_choice: Nevertheless
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - No obstante
  - Empero
  - Sin embargo
  lexicon: BDAG
  rationale: πλὴν introduce una transición concesiva o correctiva. «Sin embargo» reproduce bien ese giro en español moderno y conserva el matiz de balance respecto de lo anterior.
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: El contexto favorece el sentido general de «mujer» más que el marital de «esposa». Se mantiene así el alcance antropológico de la afirmación, como en la decisión auditada del inglés.
- source_word: ἀνήρ
  english_pob_choice: man
  chosen_spanish: hombre
  alternatives_spanish:
  - esposo
  lexicon: BDAG
  rationale: Del mismo modo, ἀνήρ aquí se entiende en sentido general como «hombre», no restringido a «esposo», para preservar el paralelismo amplio mujer/hombre.
- source_word: χωρὶς
  english_pob_choice: apart from
  chosen_spanish: aparte de
  alternatives_spanish:
  - sin
  - independiente de
  lexicon: BDAG
  rationale: «Aparte de» comunica separación o independencia relacional con naturalidad en español y conserva la fuerza de χωρίς sin volverlo demasiado interpretativo.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Mesías
  - en relación con el Señor
  lexicon: BDAG
  rationale: Se conserva la locución paulina estándar «en el Señor». En español, «Señor» reproduce el valor de κύριος sin perder la referencia relacional o esférica del contexto.
- source_word: οὔτε ... οὔτε
  english_pob_choice: is not ... nor
  chosen_spanish: no ... ni
  alternatives_spanish:
  - ni ... ni
  - no ... ni
  lexicon: BDAG
  rationale: La negación correlativa se expresa con la construcción idiomática española «no ... ni», que mantiene el paralelismo de las dos cláusulas y su valor coordinado.
theological_decisions:
- issue: γυνή / ἀνήρ como «mujer/hombre» o «esposa/esposo»
  english_pob_reading: woman/man
  chosen_spanish_reading: mujer/hombre
  alternative_spanish_readings:
  - esposa/esposo
  rationale: La frase funciona como una generalización sobre la relación mutua entre mujer y hombre «en el Señor», no como una afirmación limitada al matrimonio. Por eso se preserva el sentido amplio y se deja la lectura matrimonial como posibilidad contextual, no como traducción principal.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral); §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el audit trail inglés: no se requieren revisiones. Se mantiene la tensión lexical γυνή/ἀνήρ sin resolverla unilateralmente hacia el matrimonio.'
  spanish_consistency_notes:
  - Se conserva «en el Señor» como locución paulina estable.
  - Se usa «mujer/hombre» en el texto principal y se documenta la alternativa «esposa/esposo» en nota.
  - La puntuación sigue el valor concesivo de πλὴν con coma tras «Sin embargo».
