translation:
  language: es
  text: Porque el hombre no procede de la mujer[a], sino que la mujer procede del hombre.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Porque el esposo no procede de la esposa, sino que la esposa procede del esposo». Los términos griegos pueden significar tanto «hombre/mujer» como «esposo/esposa»; aquí se prefiere el sentido creacional más amplio.'
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la razón o fundamento de la afirmación anterior. En español, «porque» comunica con naturalidad esa relación explicativa sin perder el valor causal/consecutivo del conector.
- source_word: ἀνὴρ
  english_pob_choice: man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el varón
  - el esposo
  lexicon: BDAG
  rationale: En este contexto creacional, el contraste con γυνή apunta a categorías sexuales amplias, no a un matrimonio específico. «El hombre» mantiene el paralelismo con «la mujer» y evita restringir el sentido a «esposo».
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: procede de
  alternatives_spanish:
  - de
  - sale de
  - proviene de
  lexicon: BDAG
  rationale: La preposición marca origen o procedencia. «Procede de» expresa bien esa idea en español bíblico actual y conserva el matiz de derivación/origen del griego.
- source_word: γυναικός
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: Aquí γυνή funciona en sentido amplio de mujer, no específicamente de esposa. «La mujer» preserva el contraste creacional con ἀνήρ.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Tras una negación previa, el español idiomático exige «sino» para marcar la oposición correctiva de forma más precisa que «pero».
- source_word: γυνὴ
  english_pob_choice: woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  lexicon: BDAG
  rationale: 'Se mantiene la misma decisión que en la primera mitad del versículo: γυνή aquí designa a la mujer en sentido general, acorde con el argumento de creación.'
- source_word: ἀνδρός
  english_pob_choice: man
  chosen_spanish: del hombre
  alternatives_spanish:
  - del esposo
  lexicon: BDAG
  rationale: Genitivo de origen de ἀνήρ. «Del hombre» conserva el paralelismo con la primera cláusula y evita introducir una restricción matrimonial que el contexto no exige.
theological_decisions:
- issue: Si ἀνήρ/γυνή debe traducirse como «hombre/mujer» o «esposo/esposa»
  english_pob_reading: man/woman
  chosen_spanish_reading: hombre/mujer
  alternative_spanish_readings:
  - esposo/esposa
  rationale: El argumento de Pablo remite al orden de la creación y al origen, no a la institución matrimonial en particular. Por eso se mantiene el par «hombre/mujer», que preserva el alcance creacional y la precisión léxica.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se conserva la lectura creacional amplia de ἀνήρ/γυνή, el valor de origen de ἐκ y la oposición correctiva de ἀλλά. No hay revisiones aplicadas en la fuente inglesa; esta versión sigue esa decisión.'
  spanish_consistency_notes:
  - Se emplea «mujer» y «hombre» de manera consistente para reflejar el contraste fuente a fuente.
  - «Procede de» mantiene la idea de origen sin sonar mecánico.
  - «Sino» refleja adecuadamente la negación previa y la contraposición del segundo miembro.
  - La nota al pie reproduce la alternativa hombre/mujer vs. esposo/esposa documentada en el audit trail inglés.
