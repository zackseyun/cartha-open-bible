translation:
  language: es
  text: Pero quiero que sepan que la cabeza[a] de todo hombre es el Mesías, y la cabeza[a] de una mujer[b] es el hombre, y la cabeza[a] del Mesías es Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cabeza» puede entenderse como «fuente» o «autoridad sobre»; se conserva en el texto principal la metáfora griega misma.
    reason: lexical_alternative
  - marker: b
    text: «Mujer» y «hombre» aquí también pueden leerse como «esposa» y «esposo».
    reason: alternative_reading
lexical_decisions:
- source_word: θέλω
  english_pob_choice: I want
  chosen_spanish: quiero
  alternatives_spanish:
  - deseo
  - quisiera
  lexicon: BDAG
  rationale: Expresa de manera natural y directa la intención personal de Pablo sin añadir matices que el griego no exige.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Marca una transición suave con valor adversativo o discursivo, bien expresada por «Pero» en español.
- source_word: ὑμᾶς εἰδέναι
  english_pob_choice: you to know
  chosen_spanish: que sepan
  alternatives_spanish:
  - que entiendan
  - que estén al tanto
  lexicon: BDAG
  rationale: La construcción infinitiva comunica una exhortación informativa. En español, «que sepan» conserva el impulso de comunicar conocimiento de forma fluida y pública.
- source_word: παντὸς ἀνδρὸς
  english_pob_choice: every man
  chosen_spanish: todo hombre
  alternatives_spanish:
  - cada hombre
  - todo varón
  lexicon: BDAG
  rationale: ἀνήρ aquí funciona de modo general y no se neutraliza; «todo hombre» preserva la fuerza universal del enunciado.
- source_word: κεφαλή
  english_pob_choice: head
  chosen_spanish: cabeza
  alternatives_spanish:
  - fuente
  - autoridad sobre
  lexicon: BDAG
  rationale: Se mantiene la metáfora literal «cabeza» para no resolver interpretativamente una tensión léxica y teológica debatida en el contexto.
- source_word: ὁ Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός se traduce como título, no como nombre fijo, siguiendo la política del proyecto. «El Mesías» es la forma más transparente y auditable en español.
- source_word: γυναικὸς
  english_pob_choice: a woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - la esposa
  - una mujer
  lexicon: BDAG
  rationale: En esta cláusula paralela el sentido general de γυνή puede ser «mujer»; en español, el artículo definido conserva la relación presentada en la frase sin forzar un valor marital.
- source_word: ὁ ἀνήρ
  english_pob_choice: the man
  chosen_spanish: el hombre
  alternatives_spanish:
  - el esposo
  - el varón
  lexicon: BDAG
  rationale: Se mantiene el paralelismo genérico con γυνή. «El hombre» preserva la ambigüedad contextual entre hombre y esposo, sin cerrar el sentido más de lo que lo hace el griego.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se conserva la misma elección terminológica para Χριστός en todo el versículo, por consistencia y fidelidad al carácter titular del término.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa y estándar de θεός, manteniendo la función predicativa de la cláusula final.
theological_decisions:
- issue: Sentido de κεφαλή en las tres cláusulas paralelas
  english_pob_reading: Retain the metaphor as 'head' without specifying 'authority over' or 'source' in the main text.
  chosen_spanish_reading: Conservar la metáfora como «cabeza» sin especificar en el texto principal «fuente» ni «autoridad sobre».
  alternative_spanish_readings:
  - fuente
  - autoridad sobre
  rationale: La frase griega usa la metáfora κεφαλή y el texto no obliga a decidir entre interpretaciones disputadas. El español conserva esa tensión en lugar de resolverla previamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: 'Relación de ἀνήρ y γυνή: hombre/mujer o esposo/esposa'
  english_pob_reading: Render generically as 'man' and 'woman' in the main text.
  chosen_spanish_reading: Traducir genéricamente como «hombre» y «mujer» en el texto principal.
  alternative_spanish_readings:
  - esposo y esposa
  rationale: La sintaxis inmediata favorece un paralelismo general. Sin embargo, el contexto más amplio permite una lectura matrimonial; por eso se conserva como alternativa textual en nota.
  doctrine_reference: Translation philosophy §3 and §4.
- issue: Cómo traducir Χριστός sin diluir su valor titular
  english_pob_reading: Translate as 'Messiah' rather than 'Christ' where functioning as a title.
  chosen_spanish_reading: Traducir Χριστός como «Mesías» en las dos apariciones.
  alternative_spanish_readings:
  - Cristo
  rationale: En español, «Mesías» comunica el valor de título con mayor transparencia que «Cristo», que puede sonar más fijado como nombre propio eclesial.
  doctrine_reference: Project-level Spanish terminology defaults.
- issue: La cláusula final sobre Dios y el Mesías
  english_pob_reading: Translate literally as 'the head of the Messiah is God' without weakening or expanding the statement.
  chosen_spanish_reading: Traducir literalmente «la cabeza del Mesías es Dios», sin añadir glosas doctrinales al texto principal.
  alternative_spanish_readings:
  - la cabeza de Cristo es Dios
  - la autoridad sobre el Mesías es Dios
  rationale: La formulación respeta el texto griego y evita parapfrasear de manera que borre el enunciado. La literalidad preserva el equilibrio entre fidelidad textual y confesión cristológica ortodoxa.
  doctrine_reference: Nicene Creed (381 AD); Chalcedon (451 AD).
translation_notes:
  revision_awareness: 'El antecedente inglés muestra dos rondas de revisión sobre Χριστός: primero se cambió a «Christ» por naturalidad, y luego se restauró «Messiah» por la política doctrinal del proyecto. La versión española sigue la decisión final y mantiene «Mesías» de forma consistente en ambas apariciones. También se conserva la metáfora «cabeza» sin interpretar el término en el texto principal, en línea con el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός en ambas ocurrencias, evitando alternar con «Cristo».
  - Se conserva «cabeza» como metáfora central en las tres cláusulas.
  - La nota [b] se ancla solo en «mujer» para indicar la posible lectura «esposa/esposo» sin duplicar marcadores.
  - El texto principal mantiene un registro digno y claro, apto para lectura eclesial en español neutro.
