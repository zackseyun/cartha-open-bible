translation:
  language: es
  text: 'Y después de dar gracias[a], lo partió y dijo: «Este es mi cuerpo, por ustedes[b]. Hagan esto en memoria mía».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «después de haber dado gracias», «cuando hubo dado gracias».'
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos añaden «quebrado» después de «por ustedes»: «Este es mi cuerpo, quebrado por ustedes».'
    reason: textual_variant
lexical_decisions:
- source_word: εὐχαριστήσας
  english_pob_choice: after giving thanks
  chosen_spanish: después de dar gracias
  alternatives_spanish:
  - habiendo dado gracias
  - cuando hubo dado gracias
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «después de dar gracias» conserva la secuencia temporal con un español natural y digno, sin rigidizar la frase.
- source_word: ἔκλασεν
  english_pob_choice: he broke it
  chosen_spanish: lo partió
  alternatives_spanish:
  - lo quebró
  - lo rompió
  lexicon: BDAG
  rationale: En español, para el pan en contexto eucarístico, «lo partió» comunica con claridad la acción de romper el pan y evita un calco áspero. El objeto se expresa de forma natural por el pronombre «lo».
- source_word: Τοῦτό μού ἐστιν τὸ σῶμα
  english_pob_choice: This is my body
  chosen_spanish: Este es mi cuerpo
  alternatives_spanish:
  - Esto es mi cuerpo
  - Este es el cuerpo de mí
  - Esto significa mi cuerpo
  lexicon: BDAG
  rationale: La construcción copulativa se rinde de forma directa. «Este es mi cuerpo» mantiene la literalidad básica y evita introducir una interpretación explicativa que el griego no exige.
- source_word: τὸ ὑπὲρ ὑμῶν
  english_pob_choice: which is for you
  chosen_spanish: que es por ustedes
  alternatives_spanish:
  - que es para ustedes
  - que es en favor de ustedes
  - que es en beneficio de ustedes
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede expresar beneficio o representación. «Por ustedes» conserva esa fuerza sacrificial/benefactora sin volverla técnicamente doctrinal ni sonar menos natural en español bíblico.
- source_word: τοῦτο ποιεῖτε
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Sigan haciendo esto
  - Continúen haciendo esto
  lexicon: BDAG
  rationale: El imperativo presente puede implicar repetición habitual, pero «Hagan esto» funciona en español como mandato litúrgico claro y fiel al griego, sin sobreespecificar el matiz aspectual.
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  english_pob_choice: in remembrance of me
  chosen_spanish: en memoria de mí
  alternatives_spanish:
  - para mi memoria
  - como mi memorial
  lexicon: BDAG
  rationale: «Memoria» expresa el sentido con naturalidad en español. «En memoria de mí» reproduce bien el valor memorial de ἀνάμνησις sin convertirlo en una paráfrasis teológica.
theological_decisions:
- issue: Sentido de «Este es mi cuerpo» en contexto eucarístico
  english_pob_reading: Rendered the clause literally as 'This is my body' without interpretive qualification.
  chosen_spanish_reading: «Este es mi cuerpo» sin glosa interpretativa.
  alternative_spanish_readings:
  - «Esto representa mi cuerpo»
  - «Este significa mi cuerpo»
  - «Este simboliza mi cuerpo»
  rationale: Se preserva la formulación directa del griego y se mantiene la tensión teológica del pasaje sin resolverla en favor de una explicación sacramental o simbólica que el texto no explicita.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it.'
- issue: Alcance de «por ustedes»
  english_pob_reading: Benefactive/representative 'for you'
  chosen_spanish_reading: «por ustedes» con valor benefactivo/representativo.
  alternative_spanish_readings:
  - «para ustedes»
  - «en favor de ustedes»
  - «por el bien de ustedes»
  rationale: La frase indica orientación hacia el beneficio de los destinatarios, pero la traducción evita importar una formulación técnica de expiación que el griego por sí solo no desarrolla.
  doctrine_reference: 'DOCTRINE.md: Do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: 'Revisión comparada con el paquete fuente griego y el audit trail inglés: no se documentaron cambios aplicados en la última pasada; la redacción española mantiene la misma decisión textual y teológica básica, con equivalentes naturales en español.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el Tetragrámaton.
  - Se usa «cuerpo» para σῶμα y no una perífrasis interpretativa, para preservar la literalidad del enunciado.
  - Se traduce ὑπέρ con «por» para mantener la fuerza benefactora sin fijar una teoría doctrinal específica.
  - Se evita «Cristo» porque el versículo no contiene Χριστός; aparece simplemente la voz de Jesús en la cita.
