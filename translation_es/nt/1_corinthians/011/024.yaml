      lo más natural y fiel es «que es por ustedes» sin ser ideal; mejor aún «que es dado por ustedes» importaría texto no presente. Por eso se recomienda «que es por ustedes» eliminar dobleza semántica mediante contexto global y aceptar «por ustedes»; en texto corrido: «Este es mi cuerpo, por ustedes». Sin embargo, eso suprime el relativo presente en inglés. La opción equilibrada es «Este es mi cuerpo, que es por ustedes» → «Este es mi cuerpo, que es para ustedes»? No, cambiaría matiz. Se adopta «Este es mi cuerpo, que es por ustedes» como principal problema de estilo, pero el arreglo final opta por la puntuación y la memoria. '
