translation:
  language: es
  text: Por esta razón, la mujer debe tener autoridad[a] sobre su cabeza, por causa de los ángeles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, de manera más interpretativa, «llevar una señal de autoridad en la cabeza». El griego dice «autoridad» y no incluye explícitamente «señal» ni «cobertura».
    reason: alternative_reading
  - marker: b
    text: O «por los mensajeros», aunque aquí «ángeles» es el sentido más probable.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ τοῦτο
  english_pob_choice: For this reason
  chosen_spanish: Por esta razón
  alternatives_spanish:
  - Por esto
  - Por lo tanto
  lexicon: BDAG
  rationale: Conserva el valor inferencial-causal del griego y suena natural en español sin debilitar la relación con el argumento previo.
- source_word: ὀφείλει
  english_pob_choice: ought to
  chosen_spanish: debe
  alternatives_spanish:
  - debería
  - está obligada a
  lexicon: BDAG
  rationale: En español, «debe» comunica obligación o conveniencia normativa de manera sobria, cercana al matiz de deber del texto sin sobrerreducirlo a mandato legal técnico.
- source_word: ἡ γυνὴ
  english_pob_choice: the woman
  chosen_spanish: la mujer
  alternatives_spanish:
  - una mujer
  - la esposa
  lexicon: BDAG
  rationale: El artículo y el contexto favorecen un singular genérico. «La mujer» preserva esa forma sin restringir indebidamente el sentido a una esposa concreta.
- source_word: ἐξουσίαν
  english_pob_choice: authority
  chosen_spanish: autoridad
  alternatives_spanish:
  - señal de autoridad
  - cobertura
  - derecho
  lexicon: BDAG
  rationale: Se mantiene el sustantivo lexical «autoridad» porque el griego no dice explícitamente «señal» ni «cobertura». La interpretación tradicional se deja en nota.
- source_word: ἔχειν
  english_pob_choice: to have
  chosen_spanish: tener
  alternatives_spanish:
  - llevar
  - portar
  lexicon: BDAG
  rationale: El infinitivo básico ἔχειν corresponde naturalmente a «tener». Evita introducir por traducción principal la idea interpretativa de «llevar».
- source_word: ἐπὶ τῆς κεφαλῆς
  english_pob_choice: on her head
  chosen_spanish: sobre su cabeza
  alternatives_spanish:
  - en su cabeza
  - encima de su cabeza
  lexicon: BDAG
  rationale: «Sobre su cabeza» reproduce la relación espacial amplia del griego y conserva el terreno de ambigüedad sobre el modo exacto de la frase.
- source_word: διὰ τοὺς ἀγγέλους
  english_pob_choice: because of the angels
  chosen_spanish: por causa de los ángeles
  alternatives_spanish:
  - a causa de los ángeles
  - por los ángeles
  lexicon: BDAG
  rationale: διά con acusativo expresa causa o razón; «por causa de» es una solución clara y formal en español. «Ángeles» se mantiene como sentido primario, con la alternativa «mensajeros» reservada en nota por ser menos probable.
theological_decisions:
- issue: Sentido de ἐξουσίαν ἔχειν ἐπὶ τῆς κεφαλῆς
  english_pob_reading: Retain the text's wording as 'have authority on her head' rather than interpretively expanding it to 'wear a sign of authority.'
  chosen_spanish_reading: Mantener «tener autoridad sobre su cabeza» como redacción principal, sin añadir en el texto «señal» ni «cobertura».
  alternative_spanish_readings:
  - llevar una señal de autoridad sobre su cabeza
  - tener una cobertura en la cabeza como señal de autoridad
  rationale: El griego conserva ἐξουσίαν y no explicita «señal» o «cobertura». La traducción principal preserva esa tensión y la nota recoge la lectura interpretativa habitual sin convertirla en el texto base.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Referente de τοὺς ἀγγέλους
  english_pob_reading: angels
  chosen_spanish_reading: ángeles
  alternative_spanish_readings:
  - mensajeros
  rationale: En el uso paulino, el plural sin determinación suele referirse a seres celestiales. Se mantiene el sentido más probable sin imponer una explicación teológica adicional.
  doctrine_reference: Translation philosophy §3
- issue: Alcance de ἡ γυνὴ
  english_pob_reading: the woman
  chosen_spanish_reading: la mujer
  alternative_spanish_readings:
  - la esposa
  rationale: La forma griega admite un singular genérico. «La mujer» conserva el alcance amplio del pasaje y evita estrecharlo a un contexto matrimonial específico que el griego no exige.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y la decisión auditada de la POB en inglés. No se detectaron revisiones aplicadas en el registro fuente, y la versión más reciente indicó que no había cambios necesarios.
  spanish_consistency_notes:
  - Se usa «ángeles» como sentido principal de ἄγγελοι, en continuidad con el audit trail inglés.
  - Se evita «SEÑOR» o una sustitución litúrgica equivalente, pues no aparece el nombre divino en este versículo.
  - Se mantiene «autoridad» en el cuerpo del texto y se reserva la expansión interpretativa para la nota.
  - Se prefiere «la mujer» por el artículo griego y el contexto genérico singular.
  - La puntuación y el orden responden al español natural sin perder la estructura causal del griego.
