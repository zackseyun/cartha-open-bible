  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Hermanos míos» sigue la decisión documentada para ἀδελφοί; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La decisión contextual para ἐκδέχεσθε favorece correctamente «esperar» frente a «recibir».
