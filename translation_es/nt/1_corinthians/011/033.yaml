translation:
  language: es
  text: Así que, hermanos míos, cuando se reúnan para comer[a], espérense unos a otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas». El griego dice literalmente «hermanos» y a menudo usa la forma masculina para dirigirse a una congregación mixta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: La conjunción inferencial introduce la conclusión práctica de lo anterior. «Así que» comunica bien la relación lógica en español sin sonar tan formal como «por tanto» ni tan débil como un simple «entonces».
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - hermanos y hermanas míos
  - hermanos de mí
  lexicon: BDAG
  rationale: El vocativo plural masculino se conserva como «hermanos míos», manteniendo la forma gramatical del griego y su uso representativo para la congregación. La inclusividad implícita queda entendida por el contexto eclesial, sin neutralizar la forma original en el texto principal.
- source_word: συνερχόμενοι
  english_pob_choice: when you come together
  chosen_spanish: cuando se reúnan
  alternatives_spanish:
  - al reunirse
  - cuando ustedes se reúnan
  lexicon: BDAG
  rationale: El participio presente expresa la circunstancia en que aplica la exhortación. En español, «cuando se reúnan» reproduce de manera natural esa relación temporal y comunitaria.
- source_word: εἰς τὸ φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - a comer
  - para la comida
  lexicon: BDAG
  rationale: La construcción con infinitivo articular indica propósito. «Para comer» conserva esa fuerza final sin añadir especificaciones sobre el tipo de comida más allá de lo que el contexto ya aporta.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - los unos a los otros
  - entre ustedes
  lexicon: BDAG
  rationale: El pronombre recíproco se expresa de forma natural en español con «unos a otros», preservando la reciprocidad directa del mandato.
- source_word: ἐκδέχεσθε
  english_pob_choice: wait for
  chosen_spanish: espérense
  alternatives_spanish:
  - esperen a los demás
  - recíbanse
  lexicon: BDAG
  rationale: En este contexto de corrección sobre la comida compartida, el verbo significa esperar a los demás antes de empezar. «Espérense» capta mejor el valor práctico del mandato que «recíbanse», que sería demasiado general.
theological_decisions:
- issue: Dirección comunitaria del mandato en el contexto de la Cena del Señor
  english_pob_reading: wait for one another
  chosen_spanish_reading: espérense unos a otros
  alternative_spanish_readings:
  - esperen a los demás
  - ténganse consideración unos a otros
  rationale: El contexto inmediato trata de los abusos en la reunión y de la conducta mutua durante la comida. La traducción debe mantener el mandato concreto de esperar a los demás antes de comer, sin diluirlo en una exhortación más abstracta.
  doctrine_reference: 1 Corintios 11:21-34; DOCTRINE.md Translation philosophy §2
- issue: Uso representativo del vocativo masculino plural
  english_pob_reading: my brothers
  chosen_spanish_reading: hermanos míos
  alternative_spanish_readings:
  - hermanos y hermanas míos
  rationale: Se preserva la forma masculina plural del griego, como en la auditable decisión inglesa. En español, la forma sigue siendo comprensible para una audiencia mixta y evita borrar una tensión gramatical documentada del texto fuente.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El inglés POB ya fue revisado y quedó sin cambios; este borrador sigue esa decisión estable, manteniendo la misma lectura contextual de ἐκδέχεσθε como «wait for» y la dirección inferencial de Ὥστε.
  spanish_consistency_notes:
  - Se mantuvo «hermanos míos» para corresponder al vocativo masculino plural del griego y a la política POB de conservar la forma documentada.
  - «Así que» preserva la relación inferencial de Ὥστε con el contexto previo, en paralelo a «So then» del audit trail.
  - «Espérense unos a otros» mantiene la reciprocidad explícita de ἀλλήλους y la corrección práctica del mandato.
