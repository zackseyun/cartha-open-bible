  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Naturaleza misma», «hombre» y «deshonra» están bien alineados. La principal corrección es de fidelidad al audit trail léxico: preservar la nota alternativa en el verbo κομᾷ mediante una nota en «lleva el cabello largo», no trasladarla a ἀτιμία.'
