translation:
  language: es
  text: ¿Acaso no les enseña la naturaleza misma[a] que, si un hombre lleva el cabello largo[b], es una deshonra para él?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La naturaleza misma» puede referirse al orden creado, a la percepción humana común o a lo que una cultura considera naturalmente apropiado; el griego no lo especifica con más precisión aquí.
    reason: theological_note
  - marker: b
    text: O «si un hombre deja crecer su cabello» o «si un hombre tiene el cabello largo». El verbo griego se refiere a llevar o tener el cabello largo.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐδὲ
  english_pob_choice: Does not even
  chosen_spanish: ¿No enseña incluso...
  alternatives_spanish:
  - ¿Ni siquiera enseña...
  - ¿No enseña también...
  lexicon: BDAG
  rationale: La partícula negativa con valor enfático se expresa naturalmente en español con «ni siquiera» o «incluso» en una pregunta retórica. Aquí «¿No enseña incluso...?» conserva la fuerza enfática del griego y del audit trail inglés.
- source_word: ἡ φύσις αὐτὴ
  english_pob_choice: nature itself
  chosen_spanish: la naturaleza misma
  alternatives_spanish:
  - la naturaleza
  - el orden natural mismo
  - el instinto natural
  lexicon: BDAG
  rationale: «Naturaleza misma» reproduce la intensificación de αὐτή y mantiene la amplitud semántica sin decidir si se trata de orden creado, percepción común o convención cultural asumida como natural.
- source_word: διδάσκει ὑμᾶς
  english_pob_choice: teach you
  chosen_spanish: enseña
  alternatives_spanish:
  - les enseña
  - les muestra
  - les instruye
  lexicon: BDAG
  rationale: «Enseña» conserva el verbo didáctico de forma directa y natural en español. El objeto implícito «ustedes» queda entendido en la pregunta retórica.
- source_word: ἀνὴρ
  english_pob_choice: a man
  chosen_spanish: un hombre
  alternatives_spanish:
  - un varón
  - un marido
  lexicon: BDAG
  rationale: El contraste en el contexto es de sexo/género social en la conducta, no de relación matrimonial específica. «Un hombre» es el equivalente más claro y natural.
- source_word: κομᾷ
  english_pob_choice: wears long hair
  chosen_spanish: lleva el cabello largo
  alternatives_spanish:
  - deja crecer su cabello largo
  - tiene cabello largo
  lexicon: BDAG
  rationale: El verbo griego indica llevar o usar el cabello largo, no simplemente poseer cabello. «Lleva el cabello largo» recoge mejor esa fuerza que una frase más genérica.
- source_word: ἀτιμία
  english_pob_choice: a dishonor
  chosen_spanish: es deshonra
  alternatives_spanish:
  - es vergüenza
  - es deshonor
  - le resulta deshonroso
  lexicon: BDAG
  rationale: «Deshonra» mantiene el campo de honor/vergüenza del sustantivo griego y funciona bien con el predicado copulativo español.
- source_word: αὐτῷ ἐστιν
  english_pob_choice: it is to him
  chosen_spanish: para él
  alternatives_spanish:
  - a él
  - le es
  - es para él
  lexicon: BDAG
  rationale: La construcción griega predicativa se vuelve más idiomática en español con «para él», sin perder la referencia personal de dativo.
theological_decisions:
- issue: Sentido de φύσις en el argumento de Pablo
  english_pob_reading: nature itself may refer to created order, common human perception, or what a culture regards as naturally fitting; the Greek does not specify more narrowly here.
  chosen_spanish_reading: '«la naturaleza misma» se deja amplia: puede aludir al orden creado, a la percepción humana compartida o a lo que una cultura considera naturalmente apropiado.'
  alternative_spanish_readings:
  - el orden creado mismo
  - el instinto natural mismo
  - lo que la cultura considera natural
  rationale: El griego no fija el referente de φύσις con mayor precisión, y la traducción debe conservar esa tensión interpretativa. «Naturaleza misma» preserva la amplitud y evita cerrar el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el audit trail inglés de POB; se mantuvo la ambigüedad interpretativa de φύσις y la fuerza verbal de κομάω sin resolverla en exceso. No se detectaron revisiones posteriores que alteren la línea de traducción.
  spanish_consistency_notes:
  - Se usa «naturaleza» para φύσις y «deshonra» para ἀτιμία, manteniendo el campo semántico de honor/vergüenza.
  - Se preserva el tono de pregunta retórica del original con una estructura española natural.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; no hay léxico teológico adicional en este versículo.
