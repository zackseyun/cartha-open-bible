translation:
  language: es
  text: Pero toda mujer que ora o profetiza con la cabeza descubierta[b] deshonra su cabeza[a]; porque eso es uno y lo mismo que haber sido rapada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'toda esposa que ora o profetiza ... deshonra a su marido/cabeza'. El griego gynē puede significar 'mujer' o 'esposa', y 'cabeza' puede entenderse literalmente o metafóricamente según el contexto que la rodea.
    reason: alternative_reading
  - marker: b
    text: '''Descubierta'' no especifica por sí sola qué tipo de cobertura falta. Los intérpretes discrepan sobre si Pablo se refiere específicamente a un velo o, más generalmente, a la cabeza sin cubrir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: mujer
  alternatives_spanish:
  - esposa
  lexicon: BDAG
  rationale: El sustantivo puede significar 'mujer' o 'esposa' según el contexto. Aquí la construcción inmediata 'toda mujer que ora o profetiza' suena más general que limitada a mujeres casadas, por lo que 'mujer' conserva mejor el sentido superficial sin añadir un estado civil no explicitado.
- source_word: προσευχομένη ἢ προφητεύουσα
  english_pob_choice: who prays or prophesies
  chosen_spanish: que ora o profetiza
  alternatives_spanish:
  - mientras ora o profetiza
  lexicon: BDAG
  rationale: Los participios presentes describen a la mujer en esas acciones. La cláusula relativa en español es natural y conserva el sentido aspectual de actividad en curso sin torcer la sintaxis.
- source_word: ἀκατακαλύπτῳ τῇ κεφαλῇ
  english_pob_choice: with her head uncovered
  chosen_spanish: con la cabeza descubierta
  alternatives_spanish:
  - con la cabeza sin cubrir
  - con la cabeza desnuda
  lexicon: BDAG
  rationale: La expresión dativa indica estado o circunstancia. 'Con la cabeza descubierta' es idiomático en español y mantiene la imagen concreta sin decidir si el referente es velo, cabello u otro tipo de cobertura.
- source_word: καταισχύνει
  english_pob_choice: dishonors
  chosen_spanish: deshonra
  alternatives_spanish:
  - avergüenza
  - afrenta
  lexicon: BDAG
  rationale: '''Deshonra'' comunica bien la carga social de vergüenza y pérdida de honor en un contexto de honor/vergüenza. Es más estable que ''avergüenza'' y más directo que ''afrenta''.'
- source_word: τὴν κεφαλὴν αὐτῆς
  english_pob_choice: her head
  chosen_spanish: su cabeza
  alternatives_spanish:
  - su propia cabeza
  - a su marido/cabeza
  lexicon: BDAG
  rationale: Se conserva el sintagma literal y su ambigüedad. El griego permite leer la referencia de modo físico o metafórico en el marco más amplio, y el español no debe resolverlo donde el texto no obliga.
- source_word: ἓν γάρ ἐστιν καὶ τὸ αὐτὸ
  english_pob_choice: for that is one and the same
  chosen_spanish: porque eso es uno y lo mismo
  alternatives_spanish:
  - porque es lo mismo
  - porque una cosa y la otra son lo mismo
  lexicon: BDAG
  rationale: La expresión idiomática subraya equivalencia. 'Uno y lo mismo' reproduce bien esa fuerza enfática en español moderno.
- source_word: τῇ ἐξυρημένῃ
  english_pob_choice: as having been shaved
  chosen_spanish: que haber sido rapada
  alternatives_spanish:
  - como si hubiera sido rapada
  - como una mujer rapada
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante de haber sido rapada. 'Haber sido rapada' conserva ese valor; en una comparación implícita, el español se articula naturalmente con 'que' tras 'lo mismo que'.
theological_decisions:
- issue: Sentido del segundo 'cabeza' en 'deshonra su cabeza'
  english_pob_reading: Retain the ambiguous wording 'her head' in the main text without specifying physical head or metaphorical head.
  chosen_spanish_reading: Mantener 'su cabeza' sin aclarar si es la cabeza física o una referencia relacional/metafórica.
  alternative_spanish_readings:
  - su cabeza física
  - su marido / su cabeza
  rationale: La redacción griega deja abierta la posibilidad de una referencia literal o metafórica, y el contexto inmediato puede sugerir ambas. La traducción debe preservar esa tensión interpretativa en lugar de cerrarla prematuramente.
  doctrine_reference: Translation philosophy §3
- issue: Naturaleza de la cobertura en 'descubierta'
  english_pob_reading: Translate generically as 'uncovered' without specifying veil or hair.
  chosen_spanish_reading: Traducir genéricamente como 'descubierta' sin especificar velo ni cabello.
  alternative_spanish_readings:
  - sin velo
  - con el cabello suelto / descubierto
  rationale: El adjetivo griego señala falta de cobertura, pero no identifica el material o forma concreta. Nombrar 'velo' en el texto principal introduciría una conclusión interpretativa no exigida por la palabra misma.
  doctrine_reference: Translation philosophy §1 and §3
translation_notes:
  revision_awareness: 'Con base en el último pase de revisión, no se requieren cambios adicionales: la versión coincide con el texto fuente griego y con el trazado auditado de la POB en inglés, manteniendo las ambigüedades documentadas sin sobreinterpretarlas.'
  spanish_consistency_notes:
  - Se mantuvo 'mujer' en el texto principal y se preservó 'esposa' como alternativa en nota, siguiendo la decisión léxica del original.
  - Se eligió 'cabeza descubierta' para mantener una formulación natural en español y coherente con la ambigüedad del inglés 'uncovered'.
  - Se conservó la repetición de 'cabeza' para no resolver de antemano la tensión literal/metafórica documentada por la POB.
  - '''Rapada'' traduce el estado resultante del participio perfecto ἐξυρημένῃ sin añadir detalles no presentes en el griego.'
