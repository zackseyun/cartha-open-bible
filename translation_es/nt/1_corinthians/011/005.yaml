  text: πᾶσα δὲ γυνὴ προσευχομένη ἢ προφητεύουσα ἀκατακαλύπτῳ τῇ κεφαλῇ καταισχύνει τὴν κεφαλὴν ⸀αὐτῆς, ἓν γάρ ἐστιν καὶ τὸ αὐτὸ τῇ ἐξυρημένῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/005.yaml
  text: But every woman who prays or prophesies with her head uncovered dishonors her head[b][a], for that is one and the same as having been shaved.
  footnotes:
  - marker: a
    text: Or 'every wife who prays or prophesies ... dishonors her husband/head.' The Greek word gynē can mean 'woman' or 'wife,' and 'head' may be understood literally or metaphorically from the surrounding context.
    reason: alternative_reading
  - marker: b
    text: '''Uncovered'' does not by itself specify the exact kind of covering; interpreters differ on whether Paul refers specifically to a veil or more generally to an uncovered head.'
    reason: lexical_alternative
