translation:
  language: es
  text: Pero si alguno parece ser contencioso[a], no tenemos tal costumbre[b], ni las iglesias de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «peleador», «pendenciero» o «amante de la disputa».'
    reason: lexical_alternative
  - marker: b
    text: «Tal costumbre» puede referirse tanto a la costumbre de ser contencioso como a la práctica discutida en los versículos anteriores.
    reason: alternative_reading
lexical_decisions:
- source_word: δοκεῖ
  english_pob_choice: seems
  chosen_spanish: parece
  alternatives_spanish:
  - piensa
  - se cree
  - da la impresión de
  lexicon: BDAG
  rationale: “Parece” reproduce bien el valor de δοκεῖ en esta construcción con infinitivo, sin decidir si se trata de una percepción externa o de la autopercepción del sujeto.
- source_word: φιλόνεικος
  english_pob_choice: contentious
  chosen_spanish: contencioso
  alternatives_spanish:
  - peleador
  - pendenciero
  - disputador
  lexicon: BDAG
  rationale: El adjetivo describe a alguien inclinado a la disputa o al pleito. “Contencioso” es comprensible en español y conserva el matiz de resistencia combativa que el inglés POB expresa con “contentious”.
- source_word: τοιαύτην
  english_pob_choice: such
  chosen_spanish: tal
  alternatives_spanish:
  - semejante
  - de esa clase
  - de tal clase
  lexicon: BDAG
  rationale: “Tal” mantiene la referencia deíctica sin sobreespecificar el tipo exacto de costumbre al que alude el texto.
- source_word: συνήθειαν
  english_pob_choice: custom
  chosen_spanish: costumbre
  alternatives_spanish:
  - práctica
  - uso
  - hábito
  lexicon: BDAG
  rationale: “Costumbre” comunica una práctica aceptada o establecida en la comunidad, y deja abierta la ambigüedad contextual que el inglés POB conserva.
- source_word: οὐκ ἔχομεν
  english_pob_choice: we have no
  chosen_spanish: no tenemos
  alternatives_spanish:
  - no poseemos
  - no seguimos
  - no practicamos
  lexicon: BDAG
  rationale: La traducción directa “no tenemos” es natural en español y evita añadir la interpretación más fuerte de “no permitimos” o “no seguimos”.
- source_word: ἐκκλησίαι τοῦ θεοῦ
  english_pob_choice: the churches of God
  chosen_spanish: las iglesias de Dios
  alternatives_spanish:
  - las congregaciones de Dios
  - las asambleas de Dios
  lexicon: BDAG
  rationale: “Iglesias de Dios” conserva la genitiva y la amplitud del referente paulino, sin convertirlo en una formulación más eclesiástica de tradición posterior.
theological_decisions:
- issue: Alcance de “no tenemos tal costumbre”
  english_pob_reading: The phrase is left intentionally broad as 'no such custom' without specifying whether Paul means the custom of contentiousness or the disputed practice discussed in the preceding verses.
  chosen_spanish_reading: 'La frase queda igualmente amplia: “no tenemos tal costumbre”, sin precisar si se refiere a la costumbre de ser contencioso o a la práctica debatida en los versículos anteriores.'
  alternative_spanish_readings:
  - no tenemos tal costumbre de ser contenciosos
  - no tenemos tal costumbre como la práctica discutida antes
  rationale: El griego τοιαύτην συνήθειαν es breve y debatido en cuanto a su referente. Mantener la expresión general preserva la tensión interpretativa documentada por el POB inglés y evita resolverla por paráfrasis.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa auditada no muestra revisiones aplicadas y el pase más reciente indica que no hubo cambios necesarios; esta propuesta sigue esa lectura estable, conservando la ambigüedad del referente de συνήθειαν y el alcance amplio de ἐκκλησίαι τοῦ θεοῦ.
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se usa «iglesias» para ἐκκλησίαι, manteniendo la forma plural y el vínculo genitivo con «de Dios».
  - Se evita «Cristo» y no hay términos especiales de רוח/πνεῦμα o δοῦλος en este versículo.
  - La puntuación sigue el flujo natural del español y preserva la estructura condicional del griego.
