translation:
  language: es
  text: Lleguen a ser imitadores de mí[a], así como yo también soy imitador del Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Sean imitadores de mí».'
    reason: alternative_rendering
  - marker: b
    text: Otra posibilidad tradicional es «de Cristo». El griego es elíptico en esta cláusula; en español se explicita «imitador» para conservar con claridad el sentido de comparación.
    reason: clarity_and_alternative_reading
lexical_decisions:
- source_word: μιμηταί
  english_pob_choice: imitators
  chosen_spanish: imitadores
  alternatives_spanish:
  - seguidores
  lexicon: BDAG
  rationale: μιμηταί denota quienes imitan o reproducen el ejemplo de otro. «Imitadores» conserva de manera directa esa fuerza; «seguidores» diluye el matiz explícito de imitación.
- source_word: μου
  english_pob_choice: of me
  chosen_spanish: de mí
  alternatives_spanish:
  - míos
  lexicon: BDAG
  rationale: Con μιμηταί, el genitivo se expresa naturalmente en español con «de mí». «Míos» sonaría posesivo y menos fiel a la construcción del griego.
- source_word: γίνεσθε
  english_pob_choice: Become
  chosen_spanish: Sean
  alternatives_spanish:
  - Vuélvanse
  - Lleguen a ser
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι puede expresar «llegar a ser» o entrar en un estado. En español, «Sean» es natural y conserva el valor exhortativo sin forzar una perífrasis pesada; «Vuélvanse» sería más dinámico, pero puede sugerir cambio de conducta más que adopción de un modelo.
- source_word: κἀγὼ
  english_pob_choice: I also am
  chosen_spanish: yo también soy
  alternatives_spanish:
  - yo también estoy
  - yo mismo también soy
  lexicon: BDAG
  rationale: La crasis añade la idea de «también». «Yo también soy» reproduce bien ese énfasis aditivo y mantiene la relación con la cláusula anterior.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se sigue la preferencia del proyecto por traducir Χριστός como «Mesías» cuando funciona como título. El genitivo se rinde de forma natural como «del Mesías».
theological_decisions:
- issue: Renderización de Χριστοῦ como título y no como nombre-forma
  english_pob_reading: the Messiah
  chosen_spanish_reading: del Mesías
  alternative_spanish_readings:
  - de Cristo
  rationale: El contexto presenta a Pablo como ejemplo en la medida en que él mismo sigue a Jesús en su función mesiánica y su modelo. Mantener «Mesías» conserva esa lectura titular y evita aplanar el término en una forma litúrgica tradicional sin necesidad textual.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Elipsis del verbo en la segunda cláusula
  english_pob_reading: just as I also am of the Messiah
  chosen_spanish_reading: así como yo también soy del Mesías
  alternative_spanish_readings:
  - así como yo también imito al Mesías
  - así como yo también soy imitador del Mesías
  rationale: El griego no repite un verbo equivalente a «imitar»; la POB inglesa conserva esa elipsis con «am of the Messiah». En español, «soy del Mesías» mantiene la sobriedad del griego y evita añadir un verbo ausente, aunque suene menos explícito que una paráfrasis interpretativa.
  doctrine_reference: 'DOCTRINE.md: Preserve source syntax where intelligible; avoid over-explicating ellipsis unless required for clarity'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la evolución del audit trail inglés: una revisión temprana expandió la elipsis a una paráfrasis más idiomática, pero la revisión posterior volvió a una formulación más cercana al griego («am of the Messiah»). La versión española sigue esa decisión final y conserva la elipsis de manera natural en español.'
  spanish_consistency_notes:
  - Se usa «Mesías» como traducción de Χριστός en coherencia con el criterio del proyecto.
  - Se evita introducir «Cristo» en el texto principal salvo como alternativa anotada.
  - «Sean» mantiene el imperativo exhortativo sin alejarse de γίνεσθε.
  - La cláusula final conserva la relación comparativa de καθὼς sin explicitar más de lo que el griego ofrece.
