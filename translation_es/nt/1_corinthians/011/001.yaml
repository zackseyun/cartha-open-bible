revisions:
- from: Sean imitadores de mí[a][b], así como yo también soy del Mesías.
  to: Lleguen a ser imitadores de mí[a], así como yo también soy imitador del Mesías[b].
  rationale: Se revisa la segunda cláusula porque el calco «soy del Mesías» no es inteligible en español como expresión de imitación. Añadir «imitador» no altera el sentido, sino que resuelve una elipsis que en griego se recupera fácilmente por paralelismo pero en español produce ambigüedad de pertenencia. También se ajusta γίνεσθε a «Lleguen a ser» para reflejar mejor el matiz dinámico del imperativo.
  reviewer_model: gpt-5.4
