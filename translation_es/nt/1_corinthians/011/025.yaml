base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/011/025.yaml
  text: In the same way also[a], after supper, he took the cup, saying, “This cup is the new covenant in my blood. Do this, as often as you drink it[b], in remembrance of me.”
  footnotes:
  - marker: a
    text: Or, 'This cup is the new testament in my blood.' The Greek word can mean 'covenant' or 'testament,' but 'covenant' best fits the biblical background here.
    reason: alternative_reading
  - marker: b
    text: Or, 'whenever you drink.' The Greek expression indicates repeated occasions.
    reason: lexical_alternative
