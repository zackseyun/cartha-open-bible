translation:
  language: es
  text: 'De la misma manera, después de cenar, tomó la copa, diciendo: «Esta copa es el nuevo pacto[a] en mi sangre. Hagan esto, tantas veces como la beban[b], en memoria de mí».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esta copa es el nuevo testamento en mi sangre». La palabra griega puede significar «pacto» o «testamento», pero «pacto» encaja mejor con el trasfondo bíblico aquí.'
    reason: alternative_reading
  - marker: b
    text: 'O: «cuando la beban». La expresión griega indica ocasiones repetidas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡσαύτως καὶ
  english_pob_choice: In the same way also
  chosen_spanish: De la misma manera también
  alternatives_spanish:
  - Igualmente también
  - De igual manera también
  lexicon: BDAG
  rationale: La expresión marca correspondencia con la acción anterior sobre el pan. «De la misma manera también» conserva ambos elementos del griego y suena natural en español sin perder el nexo de repetición.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - vaso
  - cáliz
  lexicon: BDAG
  rationale: El sentido básico es el recipiente para beber. En español, «copa» es claro y bíblicamente comprensible; «cáliz» introduciría un registro litúrgico más marcado que el texto no exige.
- source_word: μετὰ τὸ δειπνῆσαι
  english_pob_choice: after supper
  chosen_spanish: después de cenar
  alternatives_spanish:
  - después de la cena
  - después de comer
  lexicon: BDAG
  rationale: El infinitivo articular con μετά indica tiempo posterior a la comida. «Después de cenar» expresa bien el contexto del banquete y mantiene naturalidad en español.
- source_word: λέγων
  english_pob_choice: he took the cup, saying
  chosen_spanish: diciendo
  alternatives_spanish:
  - y dijo
  - al decir
  lexicon: BDAG
  rationale: El participio indica la forma en que pronuncia la declaración. En español basta con «diciendo», ya que la acción principal de tomar la copa ya está explícita en la oración.
- source_word: Τοῦτο τὸ ποτήριον
  english_pob_choice: This cup
  chosen_spanish: Esta copa
  alternatives_spanish:
  - Este cáliz
  - Esta copa misma
  lexicon: BDAG
  rationale: La construcción demostrativa se vierte de manera directa. Se evita repetir el artículo de forma mecánica y se mantiene la referencia inmediata al recipiente.
- source_word: ἡ καινὴ διαθήκη
  english_pob_choice: the new covenant
  chosen_spanish: el nuevo pacto
  alternatives_spanish:
  - el nuevo testamento
  - el pacto nuevo
  lexicon: BDAG
  rationale: En español, «pacto» comunica bien el valor covenantal del término y evita la ambigüedad de «testamento», que puede sugerir el libro bíblico o un sentido jurídico posterior. Se conserva así el trasfondo de Jeremías y de los relatos de institución.
- source_word: ἐν τῷ ἐμῷ αἵματι
  english_pob_choice: in my blood
  chosen_spanish: en mi sangre
  alternatives_spanish:
  - por mi sangre
  - mediante mi sangre
  lexicon: BDAG
  rationale: La preposición ἐν se vierte de forma cercana y sobria. «En mi sangre» preserva el lenguaje pactal y sacrificial sin añadir una interpretación que el griego no explicita.
- source_word: τοῦτο ποιεῖτε
  english_pob_choice: Do this
  chosen_spanish: Hagan esto
  alternatives_spanish:
  - Haced esto
  - Sigan haciendo esto
  lexicon: BDAG
  rationale: El imperativo plural presente se expresa de manera natural con «Hagan esto». El contexto posterior ya comunica la repetición, por lo que no es necesario añadir un matiz más interpretativo.
- source_word: ὁσάκις ἐὰν πίνητε
  english_pob_choice: as often as you drink it
  chosen_spanish: tantas veces como la beban
  alternatives_spanish:
  - cada vez que la beban
  - cuando la beban
  lexicon: BDAG
  rationale: La construcción expresa ocasión repetida o recurrente. «Tantas veces como la beban» reproduce bien esa repetición y mantiene la referencia implícita a la copa en un español natural.
- source_word: εἰς τὴν ἐμὴν ἀνάμνησιν
  english_pob_choice: in remembrance of me
  chosen_spanish: en memoria de mí
  alternatives_spanish:
  - para recordarme
  - como memorial de mí
  lexicon: BDAG
  rationale: «Memoria» conserva el sentido de acto con referencia recordatoria y es plenamente idiomático. «En memoria de mí» es fiel y no sobreinterpreta la finalidad o el modo del memorial.
theological_decisions:
- issue: Sentido de διαθήκη en el contexto eucarístico/institucional
  english_pob_reading: covenant
  chosen_spanish_reading: pacto
  alternative_spanish_readings:
  - testamento
  - alianza
  rationale: El contexto de sangre, institución y trasfondo veterotestamentario apunta a un acuerdo pactal. «Pacto» es la opción más clara en español y evita depender del uso eclesiástico posterior de «testamento».
  doctrine_reference: Principio de primacía del sentido original; Jeremías 31 y relatos sinópticos de la institución
- issue: Relación entre la copa y la frase del pacto
  english_pob_reading: '''This cup is the new covenant in my blood'' retained as stated without sacramental over-specification'
  chosen_spanish_reading: «Esta copa es el nuevo pacto en mi sangre» sin añadir explicación sacramental
  alternative_spanish_readings:
  - «Esta copa representa el nuevo pacto en mi sangre»
  - «Esta copa sella el nuevo pacto en mi sangre»
  rationale: El texto griego identifica la copa con la frase del pacto y no desarrolla una teoría sacramental. La traducción conserva esa formulación directa y deja abierta la tensión doctrinal existente.
  doctrine_reference: Neutralidad doctrinal de la traducción; no imponer una lectura denominacional
translation_notes:
  revision_awareness: 'La versión española sigue el texto griego SBLGNT y se alinea con el audit trail inglés: mantiene ὡσαύτως καὶ como una frase de correspondencia, vierte ποτήριον con un término natural en español, conserva διαθήκη en sentido de pacto, y respeta la fuerza iterativa de ὁσάκις ἐὰν sin ampliar indebidamente el mandato. No se registraron revisiones posteriores que alteraran la lectura base.'
  spanish_consistency_notes:
  - Se mantiene «pacto» para διαθήκη, coherente con la decisión documental de la serie POB.
  - Se usa «copa» de forma consistente para ποτήριον, evitando «cáliz» por su carga litúrgica.
  - «Memoria de mí» preserva el sentido de ἀνάμνησις como recuerdo con referencia ritual, sin convertirlo en paráfrasis.
  - La puntuación y el uso de comillas angulares siguen la norma editorial en español.
