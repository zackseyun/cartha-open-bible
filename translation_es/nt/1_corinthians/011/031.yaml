translation:
  language: es
  text: Pero si nos juzgáramos a nosotros mismos[a], no seríamos juzgados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si nos examináramos a nosotros mismos» o «si nos discerniéramos a nosotros mismos». El verbo griego puede significar evaluar o distinguir, pero «juzgáramos» se usa aquí para preservar el contraste con «seríamos juzgados» en la cláusula siguiente.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Y si
  - Ahora bien, si
  lexicon: BDAG
  rationale: εἰ introduce una condición y δέ añade contraste suave; «Pero si» mantiene ambas fuerzas de manera natural en español.
- source_word: ἑαυτοὺς
  english_pob_choice: ourselves
  chosen_spanish: a nosotros mismos
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El reflexivo en primera persona plural se expresa de forma natural como «a nosotros mismos», conservando el objeto directo reflexivo.
- source_word: διεκρίνομεν
  english_pob_choice: judged
  chosen_spanish: juzgáramos
  alternatives_spanish:
  - examináramos
  - discerniéramos
  - evaluáramos
  lexicon: BDAG
  rationale: Aquí διακρίνω implica una evaluación discriminante de uno mismo; «juzgáramos» preserva el paralelismo verbal con ἐκρινόμεθα y mantiene la fuerza forense que el audit trail inglés protege.
- source_word: οὐκ ἂν
  english_pob_choice: would not
  chosen_spanish: no seríamos
  alternatives_spanish:
  - no habríamos de ser
  - no estaríamos
  lexicon: BDAG
  rationale: La construcción condicional contraria a los hechos se rinde de modo idiomático como «no seríamos» en español.
- source_word: ἐκρινόμεθα
  english_pob_choice: be judged
  chosen_spanish: juzgados
  alternatives_spanish:
  - condenados
  - puestos bajo juicio
  lexicon: BDAG
  rationale: Se conserva la relación léxica con «juzgáramos» y no se intensifica a «condenados», siguiendo la cautela del POB inglés de dejar abierta la naturaleza disciplinaria o judicial del juicio.
theological_decisions:
- issue: Naturaleza del juicio en la segunda cláusula
  english_pob_reading: temporal or divine disciplinary judgment is implied, rendered simply as 'be judged'
  chosen_spanish_reading: juicio/divino disciplinario implícito, expresado simplemente como «ser juzgados»
  alternative_spanish_readings:
  - condenación final
  - castigo definitivo
  rationale: El contexto inmediato de 1 Co 11:32 distingue el juzgar/disciplinar del Señor de la condenación con el mundo. Por eso la traducción no debe resolver la tensión hacia una condenación final explícita.
  doctrine_reference: Preservar la tensión teológica del texto sin importar una conclusión doctrinal no explicitada aquí.
translation_notes:
  revision_awareness: Corregido para anclar la nota [a] directamente en el texto y mantener el paralelismo léxico entre «juzgáramos» y «juzgados», evitando intensificar indebidamente el segundo verbo.
  spanish_consistency_notes:
  - Se mantuvo un español moderno y eclesialmente readable.
  - Se conservó el contraste formal entre la condición y la apódosis con verbos de la misma raíz para reflejar el juego léxico del griego.
  - No se sustituyó «juzgar» por vocabulario más tradicional como «condenar» porque el contexto cercano no exige esa intensificación.
