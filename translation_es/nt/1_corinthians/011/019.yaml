translation:
  language: es
  text: Porque es necesario que también haya facciones[a] entre ustedes, para que también los que son aprobados[b] se hagan evidentes entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede traducirse «divisiones», «sectas» o, en uso posterior, «herejías». Aquí el sentido más probable es de facciones dentro de la congregación.
    reason: lexical_alternative
  - marker: b
    text: «Los que son aprobados» también puede entenderse como «los genuinos» o «los que han pasado la prueba».
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: there must be
  chosen_spanish: es necesario que haya
  alternatives_spanish:
  - debe haber
  - tiene que haber
  lexicon: BDAG
  rationale: δεῖ expresa necesidad. «Es necesario que haya» conserva la fuerza de obligación o necesidad sin precisar si la causa es providencial, lógica o circunstancial.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el versículo anterior en un español natural y claro.
- source_word: καὶ αἱρέσεις
  english_pob_choice: also be factions
  chosen_spanish: también haya facciones
  alternatives_spanish:
  - también haya divisiones
  - también haya sectas
  - también haya disensiones
  lexicon: BDAG
  rationale: En este contexto, αἱρέσεις apunta a grupos o partidos divisivos dentro de la comunidad, no al sentido doctrinal posterior de «herejías». «Facciones» conserva esa tensión comunitaria.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: «Entre ustedes» expresa de forma idiomática la existencia de esas divisiones dentro de la comunidad reunida.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Preserva el matiz de propósito o resultado sin imponer una distinción más estrecha de la que el texto exige.
- source_word: οἱ δόκιμοι
  english_pob_choice: those who are approved
  chosen_spanish: los que son aprobados
  alternatives_spanish:
  - los genuinos
  - los que han resistido la prueba
  - los aprobados
  lexicon: BDAG
  rationale: δόκιμοι designa a quienes han sido probados y resultan genuinos. «Los que son aprobados» conserva la idea de aprobación tras prueba y mantiene la forma substantiva griega.
- source_word: φανεροὶ γένωνται
  english_pob_choice: become evident
  chosen_spanish: se hagan manifiestos
  alternatives_spanish:
  - se hagan evidentes
  - aparezcan claramente
  - se revelen
  lexicon: BDAG
  rationale: La combinación expresa llegar a ser visibles o quedar públicamente reconocidos. «Se hagan manifiestos» suena natural y refleja bien el aspecto de hacerse visible.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: Repite el marco comunitario del versículo con el mismo español idiomático que antes.
theological_decisions:
- issue: Rendering of αἱρέσεις
  english_pob_reading: factions
  chosen_spanish_reading: facciones
  alternative_spanish_readings:
  - divisiones
  - sectas
  - herejías
  rationale: El contexto inmediato trata de rupturas internas en la asamblea corintia. «Facciones» evita cargar el texto con la categoría doctrinal posterior de «herejías», que el pasaje no exige aquí.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
- issue: Force of δεῖ ('must')
  english_pob_reading: Retained as 'must' without specifying the source of necessity
  chosen_spanish_reading: es necesario que
  alternative_spanish_readings:
  - debe haber
  - tiene que haber
  rationale: La frase afirma necesidad, pero no explicita si es providencial, práctica o inevitable. La redacción española conserva esa tensión sin resolverla.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto mantiene alta concordancia con el audio/criterio de referencia y no requiere ajustes adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «entre ustedes» de forma consistente con el registro neutral latinoamericano.
  - Se evita «herejías» en el texto principal porque el valor contextual de αἱρέσεις aquí es social/comunitario, no dogmático.
  - Se conserva el paralelismo de las dos ocurrencias de ἐν ὑμῖν con la misma solución española.
