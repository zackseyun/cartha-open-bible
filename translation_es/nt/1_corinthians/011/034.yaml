translation:
  language: es
  text: Si alguno tiene hambre[a], que coma en su casa, para que no se reúnan para juicio. Y acerca de lo demás, daré instrucciones cuando yo vaya.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para condenación». El griego κρίμα puede significar «juicio» o «condenación»; aquí «juicio» encaja mejor con el contexto inmediato, donde Pablo habla de la disciplina presente del Señor más que de la condenación final (vv. 29–32).
    reason: lexical_alternative
lexical_decisions:
- source_word: πεινᾷ
  english_pob_choice: is hungry
  chosen_spanish: tiene hambre
  alternatives_spanish:
  - está hambriento
  - anda con hambre
  lexicon: BDAG
  rationale: El presente indica una condición actual. En español, «tiene hambre» es la equivalencia natural y digna para expresar ese estado sin sonar forzado.
- source_word: ἐν οἴκῳ
  english_pob_choice: at home
  chosen_spanish: en su casa
  alternatives_spanish:
  - en casa
  - en el hogar
  lexicon: BDAG
  rationale: La frase señala el ámbito doméstico frente a la reunión de la iglesia. «En su casa» conserva esa referencia concreta y fluye con naturalidad en español.
- source_word: ἐσθιέτω
  english_pob_choice: let him eat
  chosen_spanish: que coma
  alternatives_spanish:
  - que él coma
  - coma
  lexicon: BDAG
  rationale: El imperativo de tercera persona se expresa naturalmente en español con «que coma», manteniendo el valor exhortativo sin necesidad de sobrecargar la frase.
- source_word: εἰς κρίμα
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para condenación
  - para ser juzgados
  lexicon: BDAG
  rationale: «κρίμα» puede significar juicio o condenación. Se conserva «juicio» para mantener la ambigüedad teológica del contexto inmediato, donde el pasaje habla de disciplina divina más que de condena final.
- source_word: συνέρχησθε
  english_pob_choice: you may not come together
  chosen_spanish: se reúnan
  alternatives_spanish:
  - se congreguen
  - se junten
  lexicon: BDAG
  rationale: El verbo retoma el lenguaje del acto de reunirse. En español, «se reúnan» mantiene esa referencia al encuentro comunitario de forma clara y natural.
- source_word: Τὰ δὲ λοιπὰ
  english_pob_choice: And ... about the rest
  chosen_spanish: Y lo demás
  alternatives_spanish:
  - Y las demás cosas
  - En cuanto a lo demás
  lexicon: BDAG
  rationale: La expresión introduce asuntos pendientes. «Lo demás» comunica la idea de instrucciones restantes sin añadir matices que el griego no exige.
- source_word: ὡς ἂν ἔλθω
  english_pob_choice: when I come
  chosen_spanish: cuando llegue
  alternatives_spanish:
  - cuando venga
  - cuando yo llegue
  lexicon: BDAG
  rationale: La construcción temporal futura se vierte con naturalidad como «cuando llegue», preservando la referencia a la visita prevista de Pablo.
- source_word: διατάξομαι
  english_pob_choice: I will give directions
  chosen_spanish: lo dispondré
  alternatives_spanish:
  - daré instrucciones sobre ello
  - lo ordenar é
  lexicon: BDAG
  rationale: El futuro medio de διατάσσω puede significar ordenar, disponer o prescribir. «Lo dispondré» conserva la idea de dar una disposición práctica para lo restante, sin exagerar hacia un tono administrativo excesivo.
theological_decisions:
- issue: Sentido de κρίμα en la advertencia sobre la reunión
  english_pob_reading: judgment understood as divine disciplinary judgment rather than explicitly final condemnation
  chosen_spanish_reading: juicio entendido como juicio disciplinario divino, no como condenación final explícita
  alternative_spanish_readings:
  - condenación
  - sentencia judicial
  rationale: El contexto inmediato distingue entre la corrección presente del Señor y la condenación final. Traducir «juicio» conserva esa tensión y evita imponer una interpretación más fuerte que la del texto.
  doctrine_reference: Preservar la tensión teológica del pasaje; no resolver en la traducción lo que el contexto matiza.
- issue: Valor del singular indefinido τις con imperativo
  english_pob_reading: let him eat
  chosen_spanish_reading: que coma
  alternative_spanish_readings:
  - que esa persona coma
  - que él coma
  rationale: El griego usa un singular indefinido con imperativo de tercera persona. En español, «que coma» mantiene ese valor sin masculinizar innecesariamente ni pluralizar el enunciado.
  doctrine_reference: Preferir precisión gramatical y claridad natural sobre neutralización innecesaria.
translation_notes:
  revision_awareness: Texto revisado con alta concordancia respecto del audit trail inglés; no se incorporaron cambios de revisión posteriores porque el registro indica que no hubo modificaciones necesarias.
  spanish_consistency_notes:
  - Se mantuvo «juicio» para κρίμα, respetando la distinción contextual entre disciplina y condenación final.
  - Se optó por «que coma» como imperativo de tercera persona, coherente con el singular indefinido del griego.
  - «En su casa» y «cuando llegue» buscan naturalidad en español sin perder el sentido doméstico y temporal del original.
  - «Lo dispondré» conserva el matiz de διατάξομαι como disposición práctica de instrucciones pendientes.
