translation:
  language: es
  text: Porque, en primer lugar, cuando ustedes se reúnen en asamblea, oigo que hay divisiones entre ustedes, y en parte lo creo.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: πρῶτον μὲν
  english_pob_choice: in the first place
  chosen_spanish: en primer lugar
  alternatives_spanish:
  - primero
  - ante todo
  lexicon: BDAG
  rationale: La expresión introduce el primer punto de una serie o argumento. 'En primer lugar' conserva esa función discursiva en español sin sonar rígida.
- source_word: συνερχομένων ὑμῶν
  english_pob_choice: when you come together
  chosen_spanish: cuando ustedes se reúnen
  alternatives_spanish:
  - cuando se juntan
  - cuando se congregan
  lexicon: BDAG
  rationale: El participio genitivo se entiende temporalmente. 'Se reúnen' comunica de manera natural la acción congregacional del contexto.
- source_word: ἐν ἐκκλησίᾳ
  english_pob_choice: in assembly
  chosen_spanish: en asamblea
  alternatives_spanish:
  - en la iglesia
  - en la congregación
  lexicon: BDAG
  rationale: Aquí ἐκκλησία refiere a la reunión del cuerpo congregado, no a un edificio. 'En asamblea' preserva esa referencia al acto de reunirse y evita una lectura arquitectónica.
- source_word: ἀκούω
  english_pob_choice: I hear
  chosen_spanish: oigo
  alternatives_spanish:
  - escucho
  - he oído
  lexicon: BDAG
  rationale: El presente expresa el reporte que Pablo recibe. 'Oigo' es una equivalencia directa y natural en español.
- source_word: σχίσματα
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - rupturas
  - facciones
  lexicon: BDAG
  rationale: El término apunta a fracturas dentro de la comunidad. 'Divisiones' es la opción más idiomática y fiel al sentido contextual.
- source_word: ὑπάρχειν
  english_pob_choice: exist
  chosen_spanish: hay
  alternatives_spanish:
  - existen
  - están presentes
  lexicon: BDAG
  rationale: Con σχίσματα, el infinitivo expresa existencia reportada. En español, 'hay' reproduce con naturalidad ese valor existencial.
- source_word: καὶ μέρος τι
  english_pob_choice: and in part
  chosen_spanish: y en parte
  alternatives_spanish:
  - y parcialmente
  - y hasta cierto punto
  lexicon: BDAG
  rationale: La frase matiza la afirmación de Pablo indicando una aceptación parcial del reporte. 'En parte' conserva esa reserva.
- source_word: πιστεύω
  english_pob_choice: I believe it
  chosen_spanish: lo creo
  alternatives_spanish:
  - lo acepto
  - lo considero verdadero
  lexicon: BDAG
  rationale: El objeto se sobreentiende por el contexto. 'Lo creo' expresa la idea sin añadir información ajena al griego.
theological_decisions:
- issue: Sentido de ἐκκλησία en contexto
  english_pob_reading: the gathered congregation rather than a building or institutional abstraction
  chosen_spanish_reading: la asamblea reunida, no un edificio ni una abstracción institucional
  alternative_spanish_readings:
  - la iglesia
  - la congregación
  rationale: El contexto trata de la reunión de los corintios para el culto y la Cena del Señor. 'Asamblea' mantiene el sentido del grupo reunido y evita trasladar una noción edilicia posterior.
  doctrine_reference: Principio de primacía del texto original y de claridad contemporánea sin abandonar la referencia eclesial concreta.
translation_notes:
  revision_awareness: Se corrigió la validación anterior eliminando toda nota al pie; el texto ya no contiene marcas huérfanas. La redacción mantiene la relación entre ἐν ἐκκλησίᾳ y el acto de reunirse mediante 'en asamblea'.
  spanish_consistency_notes:
  - Se usó 'asamblea' para ἐκκλησία en este versículo por el contexto de reunión congregacional.
  - Se evitó 'SEÑOR' u otras máscaras porque no aparecen en este versículo.
  - Se mantuvo 'divisiones' para σχίσματα por su fuerza comunitaria y su naturalidad en español.
  - Se conservó 'en parte' para μέρος τι, respetando la reserva de Pablo.
