translation:
  language: es
  text: Pero que cada uno se examine[a], y así coma del pan y beba de la copa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Lit. «que un hombre se examine a sí mismo»; el griego usa un singular masculino de manera genérica para cualquier participante.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοκιμαζέτω
  english_pob_choice: let ... examine
  chosen_spanish: que ... se examine
  alternatives_spanish:
  - que ... se pruebe
  - que ... se examine a sí mismo
  lexicon: BDAG
  rationale: El imperativo presente exhorta a una evaluación previa de uno mismo antes de participar. «Examinarse» comunica de manera natural la autoevaluación deliberada que exige el contexto, sin añadir la idea más fuerte de «aprobar» tras una prueba.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición con matiz adversativo desde la advertencia previa hacia la respuesta correcta. «Pero» conserva bien ese giro.
- source_word: ἄνθρωπος
  english_pob_choice: a person
  chosen_spanish: la persona
  alternatives_spanish:
  - el hombre
  - alguien
  lexicon: BDAG
  rationale: Aunque el griego usa un singular masculino, funciona de modo genérico. En español, «la persona» comunica claramente la referencia universal sin perder el valor representativo del sujeto.
- source_word: ἑαυτόν
  english_pob_choice: himself
  chosen_spanish: se
  alternatives_spanish:
  - a sí mismo
  - se mismo
  lexicon: BDAG
  rationale: El reflexivo griego concuerda con el sujeto genérico. En español, la forma pronominal «se examine» evita redundancia y mantiene el sentido reflexivo.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - entonces
  lexicon: BDAG
  rationale: 'οὕτως señala la manera de comer y beber: después del autoexamen. «Así» es conciso y fiel en español.'
- source_word: ἐκ τοῦ ἄρτου
  english_pob_choice: from the bread
  chosen_spanish: del pan
  alternatives_spanish:
  - del pan consagrado
  - de ese pan
  lexicon: BDAG
  rationale: Con verbos de comer, el griego usa ἐκ de modo natural. En español, «coma del pan» conserva la relación partitiva sin sonar forzado; «pan» refleja ἄρτος en este contexto eucarístico.
- source_word: ἐσθιέτω
  english_pob_choice: let him eat
  chosen_spanish: coma
  alternatives_spanish:
  - que coma
  - que lo coma
  lexicon: BDAG
  rationale: 'El imperativo en tercera persona se expresa de forma natural en español con subjuntivo exhortativo: «coma». Mantiene la fuerza exhortativa sin sobrecargar la frase.'
- source_word: ἐκ τοῦ ποτηρίου
  english_pob_choice: from the cup
  chosen_spanish: de la copa
  alternatives_spanish:
  - del cáliz
  - de la copa sacramental
  lexicon: BDAG
  rationale: «Copa» traduce de forma directa ποτήριον y conserva el paralelismo con el pan. «Cáliz» sería más litúrgico, pero menos neutral.
- source_word: πινέτω
  english_pob_choice: drink
  chosen_spanish: beba
  alternatives_spanish:
  - que beba
  - tome
  lexicon: BDAG
  rationale: El segundo imperativo coordinado se refleja naturalmente con «beba», manteniendo el paralelismo con «coma» y la fuerza exhortativa.
theological_decisions:
- issue: Alcance genérico de ἄνθρωπος en una instrucción sobre la Cena del Señor
  english_pob_reading: Render ἄνθρωπος as 'a person' in the main text, with an inclusive alternative preserved in a footnote.
  chosen_spanish_reading: Usar «la persona» en el texto principal, con nota que explicita que el griego usa un singular masculino genérico.
  alternative_spanish_readings:
  - el hombre
  - alguien
  rationale: El contexto aplica a cualquier participante, no solo a varones. «La persona» evita una lectura restrictiva y, a la vez, mantiene el carácter general del mandato. La nota conserva la observación de que el griego es masculino singular.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La revisión inglesa más reciente prefirió 'a person' en lugar de 'a man' para ἄνθρωπος, manteniendo el resto sin cambios. La redacción española sigue esa decisión y la vuelve idiomática con «la persona», preservando además el matiz genérico señalado en la nota.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo pan/copa para reflejar ἄρτος/ποτήριον.
  - Se evitó 'cáliz' y 'siervo' por no estar respaldados por el texto ni por la auditoría inglesa.
  - La puntuación reproduce la estructura exhortativa de una sola oración con dos coordinaciones finales.
