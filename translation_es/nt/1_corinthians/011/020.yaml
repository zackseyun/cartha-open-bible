translation:
  language: es
  text: Por tanto[a], cuando ustedes se reúnen en un mismo lugar, no es para comer la cena del Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no están comiendo la cena del Señor», subrayando que su conducta hace que la comida deje de calificar como tal.'
    reason: alternative_reading
lexical_decisions:
- source_word: συνερχομένων
  english_pob_choice: when you come together
  chosen_spanish: cuando se reúnen
  alternatives_spanish:
  - cuando se juntan
  - cuando se congregan
  lexicon: BDAG
  rationale: El participio genitivo temporal se expresa con naturalidad en español como una cláusula temporal. «Reúnen» conserva la idea de asamblea comunitaria sin sonar rígido; «congregan» sería más eclesiástico, pero menos neutral.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Entonces
  lexicon: BDAG
  rationale: Marca la inferencia respecto de la reprensión anterior por las divisiones. «Por tanto» mantiene con claridad el enlace lógico y un tono digno.
- source_word: ἐπὶ τὸ αὐτό
  english_pob_choice: in the same place
  chosen_spanish: en un mismo lugar
  alternatives_spanish:
  - en el mismo lugar
  - juntos
  lexicon: BDAG
  rationale: El modismo apunta al hecho de reunirse en el mismo sitio. «En un mismo lugar» conserva el matiz espacial mejor que «juntos», que duplicaría parcialmente la idea de συνερχομένων.
- source_word: οὐκ ἔστιν ... φαγεῖν
  english_pob_choice: it is not to eat
  chosen_spanish: no es para comer
  alternatives_spanish:
  - no se puede comer
  - no están comiendo
  lexicon: BDAG
  rationale: 'La construcción griega es comprimida e idiomática. «No es para comer» reproduce bien la fuerza evaluativa: su reunión no cuenta propiamente como la acción descrita.'
- source_word: κυριακὸν
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señorío
  - que pertenece al Señor
  lexicon: BDAG
  rationale: El adjetivo significa «perteneciente al Señor». En español, «del Señor» es la forma más natural y fiel para el sintagma establecido.
- source_word: δεῖπνον
  english_pob_choice: supper
  chosen_spanish: la cena
  alternatives_spanish:
  - la comida
  - el banquete
  lexicon: BDAG
  rationale: En este contexto se trata de la comida comunitaria asociada con la memoria de Jesús. «Cena» preserva el valor contextual y es el equivalente español más claro y sobrio.
- source_word: κυριακὸν δεῖπνον
  english_pob_choice: the Lord’s supper
  chosen_spanish: la cena del Señor
  alternatives_spanish:
  - la comida del Señor
  lexicon: BDAG
  rationale: La combinación es una expresión cristiana ya reconocible. «La cena del Señor» conserva la relación posesiva y el sentido eclesial sin introducir un giro ajeno al texto.
theological_decisions:
- issue: Si Pablo niega la posibilidad de comer la cena o niega que su práctica merezca ese nombre
  english_pob_reading: Their gathering and behavior mean that what they are eating cannot properly be called the Lord’s supper.
  chosen_spanish_reading: Su reunión y conducta hacen que lo que comen no pueda llamarse propiamente la cena del Señor.
  alternative_spanish_readings:
  - No es posible comer la cena del Señor
  - Ustedes no están comiendo la cena del Señor
  rationale: 'El contexto inmediato (vv. 21–22) muestra una reprensión sobre la manera de la comida comunitaria, no una imposibilidad metafísica. La redacción española conserva la fuerza evaluativa: por su conducta, el acto no califica como la cena del Señor.'
  doctrine_reference: Conservar la tensión exegética sin resolverla de antemano; equivalencia óptima
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia y no requiere cambios sustanciales. Se mantuvo la lectura evaluativa de οὐκ ἔστιν ... φαγεῖν, evitando una paráfrasis que convierta la reprensión en una simple negación de posibilidad.
  spanish_consistency_notes:
  - Se usa «Señor» para κυριακός, coherente con el patrón POB en expresiones cristológicas y sin ocultar el matiz de pertenencia.
  - «Cena» mantiene el registro natural en español y corresponde al valor contextual de δεῖπνον en una comida comunitaria solemne.
  - No se emplea «SEÑOR» como máscara para el nombre divino, porque aquí el griego contiene κυριακός, no κύριος como cita del nombre de Yahvé.
