translation:
  language: es
  text: Pero al dar[a] esta instrucción, no los alabo, porque no se reúnen para lo mejor, sino para lo peor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al dar esta orden». El participio griego puede implicar dar una instrucción, dirección u orden.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῦτο
  english_pob_choice: this
  chosen_spanish: esta
  alternatives_spanish:
  - esta cosa
  - este asunto
  lexicon: BDAG
  rationale: El demostrativo neutro apunta a la instrucción que sigue; en español, 'esta' concuerda naturalmente con 'instrucción' y mantiene la referencia anticipatoria sin añadir palabras innecesarias.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Marca un giro adversativo hacia la reprensión. 'Pero' conserva el contraste de forma clara y natural en español.
- source_word: παραγγέλλων
  english_pob_choice: in giving this instruction
  chosen_spanish: al dar ... esta instrucción
  alternatives_spanish:
  - mientras instruyo
  - al mandar
  - al dar esta orden
  lexicon: BDAG
  rationale: El participio presente de παραγγέλλω puede significar instruir, dirigir o mandar. 'Al dar esta instrucción' preserva el valor direccional y la tonalidad autoritativa sin volverlo más duro de lo que exige el contexto.
- source_word: οὐκ ἐπαινῶ
  english_pob_choice: I do not praise you
  chosen_spanish: no los elogio
  alternatives_spanish:
  - no los alabo
  - no los encomio
  - no puedo alabarles
  lexicon: BDAG
  rationale: ἐπαινέω significa alabar/elogiar/elogiar. 'No los elogio' es claro y refleja el contraste con el elogio previo de Pablo en el contexto inmediato.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: Introduce la causa de la falta de elogio; 'porque' expresa de forma idiomática el valor causal.
- source_word: οὐκ εἰς τὸ κρεῖσσον
  english_pob_choice: not for the better
  chosen_spanish: para lo mejor
  alternatives_spanish:
  - para bien
  - para una mejora
  lexicon: BDAG
  rationale: La construcción con εἰς + artículo + comparativo expresa dirección o resultado. 'Para lo mejor' reproduce la oposición comparativa de manera breve y fiel.
- source_word: ἀλλὰ εἰς τὸ ἧσσον
  english_pob_choice: but for the worse
  chosen_spanish: sino para lo peor
  alternatives_spanish:
  - sino para lo inferior
  - sino para el mal
  lexicon: BDAG
  rationale: Mantiene el paralelismo antitético con la primera mitad. 'Lo peor' es la contraparte natural de 'lo mejor' y conserva la comparación.
- source_word: συνέρχεσθε
  english_pob_choice: you come together
  chosen_spanish: se reúnen
  alternatives_spanish:
  - se congregan
  - se juntan
  - se ensamblan
  lexicon: BDAG
  rationale: συνέρχομαι se usa intransitivamente para reunirse. 'Se reúnen' es claro, digno y adecuado para el contexto congregacional.
theological_decisions:
- issue: Tono autoritativo de παραγγέλλων
  english_pob_reading: instruction
  chosen_spanish_reading: instrucción
  alternative_spanish_readings:
  - orden
  - mandato
  - cargo
  rationale: El verbo puede llevar fuerza de mandato, pero el audit trail inglés opta por 'instruction' para no sobrerrepresentar la dureza. 'Instrucción' conserva la autoridad apostólica en el contexto de corrección litúrgica.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source force without adding unwarranted intensity.'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el audit trail inglés. Se conservó la estructura adversativa, el matiz causal de ὅτι y el paralelismo comparativo 'para lo mejor / para lo peor'.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando el texto fuente lo requiera; este versículo no lo contiene.
  - Se mantuvo 'instrucción' en el texto principal por coherencia con el audit trail, y se dejó 'orden' en la nota como alternativa léxica.
  - Se evitó 'Cristo'/'Mesías' porque no aparecen en el versículo.
  - La puntuación sigue el español moderno con coma tras el participio inicial y antes de la cláusula causal.
