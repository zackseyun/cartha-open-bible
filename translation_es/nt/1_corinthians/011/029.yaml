translation:
  language: es
  text: Porque el que come y bebe, come y bebe juicio contra sí mismo[a], sin discernir el cuerpo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «condenación». κρίμα puede referirse a una sentencia judicial, pero en el contexto inmediato Pablo habla de juicio disciplinario, no necesariamente de condenación final.
    reason: alternative_reading
  - marker: b
    text: O «distinguiendo el cuerpo». Esta expresión puede referirse al significado de la Cena del Señor, al cuerpo de creyentes reunido, o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: ὁ ... ἐσθίων καὶ πίνων
  english_pob_choice: the one who eats and drinks
  chosen_spanish: el que come y bebe
  alternatives_spanish:
  - quien come y bebe
  - el que está comiendo y bebiendo
  lexicon: BDAG
  rationale: El participio sustantivado se expresa naturalmente en español con un relativo genérico. «El que» conserva la forma general del griego y suena sobrio y bíblico sin resultar arcaico.
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - condenación
  - sentencia
  lexicon: BDAG
  rationale: «Juicio» refleja el alcance judicial de κρίμα sin cargar de antemano la idea de condenación final. En el contexto inmediato, Pablo habla de disciplina divina, por lo que «juicio» mantiene esa amplitud.
- source_word: ἑαυτῷ
  english_pob_choice: on himself
  chosen_spanish: para sí
  alternatives_spanish:
  - sobre sí
  - contra sí mismo
  lexicon: BDAG
  rationale: La dativo reflexiva indica que el efecto recae en la misma persona. «Para sí» es idiomático en español y comunica el resultado adverso sin sonar forzado.
- source_word: μὴ διακρίνων
  english_pob_choice: not discerning
  chosen_spanish: no discerniendo
  alternatives_spanish:
  - sin discernir
  - no distinguiendo
  lexicon: BDAG
  rationale: Se conserva el participio presente con una construcción participial en español para reflejar el griego con la menor intervención posible. «Discerniendo» mantiene la fuerza cognitiva y moral del verbo.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo del Señor
  - el cuerpo de creyentes
  lexicon: BDAG
  rationale: Se mantiene la lectura simple y ambigua del texto griego. «El cuerpo» preserva la tensión interpretativa entre el cuerpo de Cristo en la Cena y el cuerpo congregacional, sin resolverla prematuramente.
theological_decisions:
- issue: Sentido de τὸ σῶμα en el contexto de la Cena del Señor
  english_pob_reading: Retain the ambiguous 'the body' in the main text without specifying whether Paul refers primarily to Christ's sacrificial body, the ecclesial body, or both.
  chosen_spanish_reading: Mantener «el cuerpo» sin especificar en el texto principal si se refiere al cuerpo de Cristo, al cuerpo reunido de creyentes o a ambos.
  alternative_spanish_readings:
  - el cuerpo del Señor
  - el cuerpo de creyentes
  rationale: El griego conservado no añade posesivo ni glosa explicativa. La traducción debe conservar esa tensión teológica y exegética para no cerrar lo que Pablo deja abierto.
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla artificialmente.
- issue: Fuerza de κρίμα
  english_pob_reading: judgment rather than condemnation
  chosen_spanish_reading: juicio más bien que condenación
  alternative_spanish_readings:
  - condenación
  - sentencia condenatoria
  rationale: En 1 Corintios 11:32 el contraste posterior con la condenación final muestra que aquí el término no requiere una traducción definitiva de condena eterna. «Juicio» permite leerlo como disciplina o evaluación divina.
  doctrine_reference: 1 Corintios 11:32
translation_notes:
  revision_awareness: La versión inglesa POB fue revisada desde una forma condicional («if he does not discern») a una construcción participial («not discerning») para ajustarse mejor al griego; la redacción española sigue esa revisión con «no discerniendo». También se conserva la ambigüedad textual de τὸ σῶμα, incluyendo la nota de variante manuscrita implícita en el audit trail inglés.
  spanish_consistency_notes:
  - Se prefiere «cuerpo» para τὸ σῶμα, en continuidad con la terminología bíblica habitual y con la decisión textual de no añadir «del Señor» en el texto principal.
  - Se usa «juicio» para κρίμα en vez de «condenación» para no exceder la carga semántica del griego ni contradecir el contexto inmediato.
  - La fórmula «el que... come y bebe» mantiene el sujeto genérico singular del griego.
  - «No discerniendo» conserva el participio presente sin convertirlo en una cláusula explicativa que altere el ritmo del versículo.
