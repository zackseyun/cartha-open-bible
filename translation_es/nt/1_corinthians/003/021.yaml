translation:
  language: es
  text: Así que nadie se gloríe en las personas[a], porque todas las cosas son de ustedes.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los hombres»; el término griego es genérico y se refiere a seres humanos, no específicamente a varones. O, en contexto, «líderes humanos».
    reason: lexical_alternative
  - marker: b
    text: O «todo es de ustedes».
    reason: alternative_rendering
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Marca la conclusión inferida del argumento anterior. «Así que» reproduce bien el valor consecutivo sin sonar demasiado pesado en español.
- source_word: μηδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - ninguna persona
  lexicon: BDAG
  rationale: Es la negación indefinida natural en español y conserva el alcance general de la prohibición.
- source_word: καυχάσθω
  english_pob_choice: let no one boast
  chosen_spanish: se gloríe
  alternatives_spanish:
  - presuma
  - se jacte
  lexicon: BDAG
  rationale: «Boast» puede verterse como «gloriarse» en registro bíblico español, manteniendo la fuerza verbal y la idea de autoexaltación. Se evita «jactarse» por sonar más coloquial y «presumir» por ser menos preciso aquí.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - de
  - con respecto a
  lexicon: BDAG
  rationale: Con καυχάομαι, la preposición conserva la esfera o base del orgullo. «En» mantiene la construcción de manera transparente.
- source_word: ἀνθρώποις
  english_pob_choice: people
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - los seres humanos
  - los líderes humanos
  lexicon: BDAG
  rationale: Aunque el término griego es genérico, el español bíblico puede usar «los hombres» para reflejar la genericidad antropológica y la posible resonancia contextual con líderes humanos. Se conserva la nota de ambigüedad en la nota al pie.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todas las cosas son suyas
  lexicon: BDAG
  rationale: El neutro plural expresa totalidad. En español, «todo» comunica la amplitud del conjunto sin forzar una construcción más pesada.
- source_word: ὑμῶν
  english_pob_choice: are yours
  chosen_spanish: de ustedes
  alternatives_spanish:
  - les pertenece
  - es de ustedes
  lexicon: BDAG
  rationale: El genitivo posesivo se expresa de modo natural con «de ustedes». Mantiene la relación de pertenencia sin sobreexplicar.
- source_word: ἐστιν
  english_pob_choice: are
  chosen_spanish: es
  alternatives_spanish:
  - son
  - pertenece
  lexicon: BDAG
  rationale: Con sujeto neutro singular colectivo («todo»), el verbo singular «es» es gramaticalmente natural en español.
theological_decisions:
- issue: 'Sentido de ἀνθρώποις: seres humanos en general o líderes humanos en contexto'
  english_pob_reading: Or, in context, 'human leaders.'
  chosen_spanish_reading: «los hombres» en el texto, con posibilidad contextual de entender «líderes humanos»
  alternative_spanish_readings:
  - «las personas»
  - «los líderes humanos»
  rationale: El griego es genérico, pero el contexto corintio puede apuntar a partidismos respecto de líderes. La traducción principal conserva la formulación más directa, y la nota preserva la alternativa contextual sin cerrarla.
  doctrine_reference: 1 Corintios 1:12-13; 3:4-7
- issue: 'Fuerza exhortativa de καυχάσθω: jactancia, orgullo o glorificación'
  english_pob_reading: let no one boast
  chosen_spanish_reading: «nadie se gloríe»
  alternative_spanish_readings:
  - «nadie se jacte»
  - «nadie presuma»
  rationale: «Gloriarse» es un verbo bíblico asentado en español y puede comunicar tanto orgullo indebido como exaltación de sí mismo. Conserva la tensión retórica del pasaje sin rebajarla a un mero tono psicológico.
  doctrine_reference: 1 Corintios 1:29-31; Jeremías 9:23-24
- issue: Alcance de «todo es de ustedes»
  english_pob_reading: for all things are yours
  chosen_spanish_reading: «porque todo es de ustedes»
  alternative_spanish_readings:
  - «porque todas las cosas son de ustedes»
  - «porque todo les pertenece»
  rationale: La frase mantiene la amplitud de la afirmación paulina sin explicitar más de lo que el texto dice. «De ustedes» conserva la posesión con sobriedad y claridad.
  doctrine_reference: Romanos 8:32; 1 Corintios 3:22-23
translation_notes:
  revision_awareness: Coincide con el texto base griego y con el audit trail inglés en el punto de la conclusión inferida, la prohibición general, el valor posesivo de la cláusula final y la ambigüedad contextual de ἀνθρώποις. No se detectaron revisiones posteriores que obligaran a ajustar el sentido.
  spanish_consistency_notes:
  - Se mantuvo «gloriarse» para reflejar la fuerza bíblica de καυχάομαι en vez de suavizarlo a una paráfrasis.
  - «Los hombres» conserva la posibilidad de genericidad del griego y la nota evita una lectura exclusivamente masculina.
  - Se optó por «todo es de ustedes» por claridad y naturalidad, sin perder la amplitud del neutro plural.
  - La puntuación reproduce la pausa fuerte entre la prohibición y la razón, como en el griego y en la tradición de edición bíblica.
