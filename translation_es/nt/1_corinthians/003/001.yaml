translation:
  language: es
  text: Y yo, hermanos[a], no pude hablarles como a espirituales, sino como a carnales, como a infantes en Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘hermanos y hermanas’; el griego dice ‘hermanos’.
    reason: lexical_alternative
  - marker: b
    text: O ‘en Cristo’.
    reason: lexical_alternative
lexical_decisions:
- source_word: Κἀγώ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Y en cuanto a mí
  lexicon: BDAG
  rationale: Conserva la fuerza conectiva de καί y el pronombre explícito, manteniendo el contraste personal de Pablo sin sobrecargarlo.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: El vocativo plural masculino del griego se vierte de forma directa y natural en español. La posible inclusión del grupo mixto se deja para nota, no para el texto principal.
- source_word: οὐκ ἠδυνήθην
  english_pob_choice: was not able
  chosen_spanish: no pude
  alternatives_spanish:
  - no fui capaz
  - no tuve poder para
  lexicon: BDAG
  rationale: Expresa la idea de incapacidad en un pasado puntual con una formulación natural en español, sin perder el valor de imposibilidad del aoristo.
- source_word: λαλῆσαι ὑμῖν
  english_pob_choice: to speak to you
  chosen_spanish: hablarles
  alternatives_spanish:
  - hablarles a ustedes
  - dirigirme a ustedes
  lexicon: BDAG
  rationale: El infinitivo con dativo se resuelve de manera idiomática en español. Se evita una paráfrasis excesiva y se conserva la relación directa con los destinatarios.
- source_word: πνευματικοῖς
  english_pob_choice: spiritual people
  chosen_spanish: espirituales
  alternatives_spanish:
  - personas espirituales
  - seres espirituales
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado en el contexto. En español, el adjetivo plural sin sustantivo resulta claro y breve; el sustantivo explícito queda implícito por el contraste.
- source_word: σαρκίνοις
  english_pob_choice: fleshly people
  chosen_spanish: carnales
  alternatives_spanish:
  - de carne
  - mundanos
  - de la carne
  lexicon: BDAG
  rationale: Se preserva el vínculo léxico con σάρξ mediante 'carnales', que en español es la forma más estable y comprensible para este contraste. Se evita 'mundanos', porque moraliza más de lo que el término exige.
- source_word: νηπίοις
  english_pob_choice: infants
  chosen_spanish: infantes
  alternatives_spanish:
  - niños pequeños
  - bebés
  - niñitos
  lexicon: BDAG
  rationale: '''Infantes'' conserva la metáfora de inmadurez con dignidad y claridad, sin infantilizar de más el discurso.'
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como 'Mesías', según el criterio de la obra. En este contexto no se neutraliza el título con el nombre tradicional eclesial.
theological_decisions:
- issue: Vocativo plural ἀδελφοί y posible inclusión de oyentes mixtos
  english_pob_reading: brothers; footnote notes 'brothers and sisters' as lexical alternative
  chosen_spanish_reading: hermanos; nota alternativa sobre ‘hermanos y hermanas’
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se respeta la forma gramatical del griego en el texto principal y se deja la inclusividad implícita para una nota, evitando imponer una reinterpretación no expresada por la forma léxica.
  doctrine_reference: BDAG; política POB sobre vocativos masculinos formales
- issue: Χριστῷ como título, no mero nombre
  english_pob_reading: in Messiah
  chosen_spanish_reading: en Mesías
  alternative_spanish_readings:
  - en Cristo
  rationale: El contexto paulino conserva fuerza titular para Χριστός. Traducirlo como 'Mesías' sigue el principio POB de no ocultar el título bíblico con una forma eclesial tradicional, salvo necesidad contextual clara.
  doctrine_reference: 'Contested terms: Χριστός → Mesías (cuando funciona como título)'
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación editorial entre 'Messiah' y 'Christ' para ἐν Χριστῷ, con restauración final de 'Messiah' por política doctrinal. Esta versión española sigue esa decisión final y mantiene 'Mesías' en el texto principal. También recoge la equivalencia de 'fleshly people' con un adjetivo español natural ('carnales') que conserva el contraste con 'espirituales'.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' porque no aparece el tetragrámaton en este versículo.
  - '''Espirituales'' y ''carnales'' se mantuvieron como sustantivados/adjetivados paralelos para conservar el contraste retórico.'
  - '''Mesías'' se eligió por consistencia con la política POB sobre Χριστός como título.'
  - Las notas al pie solo se incluyeron donde el inglés POB documenta alternativas léxicas relevantes.
