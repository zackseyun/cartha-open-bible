translation:
  language: es
  text: Les di leche[a], no alimento sólido, porque aún no podían. Pero ni siquiera ahora[a] aún pueden[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «les di leche para beber, no alimento».'
    reason: lexical_alternative
  - marker: b
    text: «Alimento sólido» traduce una palabra general para comida, elegida aquí por contraste con «leche».
    reason: lexical_alternative
lexical_decisions:
- source_word: γάλα
  english_pob_choice: milk
  chosen_spanish: leche
  alternatives_spanish:
  - leche solamente
  lexicon: BDAG
  rationale: El sustantivo griego es literal y mantiene la imagen de nutrición elemental. «Leche» conserva la metáfora paulina con naturalidad en español.
- source_word: ἐπότισα
  english_pob_choice: I fed
  chosen_spanish: les di
  alternatives_spanish:
  - les di de beber
  - les di leche para beber
  lexicon: BDAG
  rationale: El verbo significa literalmente «dar de beber», pero en español la expresión natural en esta metáfora es «les di leche». Evita una construcción pesada sin perder la imagen de nutrimento.
- source_word: βρῶμα
  english_pob_choice: solid food
  chosen_spanish: alimento sólido
  alternatives_spanish:
  - comida
  - alimento
  - carne
  lexicon: BDAG
  rationale: βρῶμα es «alimento» en general, pero aquí contrasta con «leche» y apunta a una alimentación más sustanciosa. «Alimento sólido» reproduce bien ese contraste en español moderno.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: aún no
  alternatives_spanish:
  - todavía no
  lexicon: BDAG
  rationale: La negación temporal expresa que la incapacidad no había llegado a su término. «Aún no» es natural y conserva la idea temporal.
- source_word: ἐδύνασθε
  english_pob_choice: you were able
  chosen_spanish: podían
  alternatives_spanish:
  - eran capaces
  - tenían capacidad
  lexicon: BDAG
  rationale: δύναμαι expresa capacidad. En este contexto, «podían» comunica con sencillez la falta de capacidad para recibir alimento más sólido.
- source_word: οὐδὲ ἔτι νῦν
  english_pob_choice: even now ... still not
  chosen_spanish: ni siquiera ahora
  alternatives_spanish:
  - todavía ni siquiera ahora
  - ni ahora todavía
  lexicon: BDAG
  rationale: La combinación intensifica la incapacidad persistente. «Ni siquiera ahora» transmite en español la fuerza de «οὐδὲ ἔτι νῦν» de forma idiomática.
- source_word: δύνασθε
  english_pob_choice: you are able
  chosen_spanish: pueden
  alternatives_spanish:
  - son capaces
  - tienen capacidad
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con el imperfecto anterior y la idea de capacidad presente. «Pueden» es breve y natural en español.
theological_decisions:
- issue: Metáfora de la madurez espiritual frente a una explicación abstracta
  english_pob_reading: Preserve the metaphor of immature believers receiving milk rather than more advanced instruction, without expanding its theological application in translation.
  chosen_spanish_reading: Conservar la imagen de leche y alimento sólido, sin explicarla como si dijera solo «enseñanza básica».
  alternative_spanish_readings:
  - Les di enseñanzas básicas
  - Les expliqué solo lo elemental
  rationale: El griego presenta una metáfora alimentaria, no una paráfrasis conceptual. Mantenerla deja visible la tensión retórica de Pablo y evita sobreinterpretar el texto.
  doctrine_reference: Preservar la tensión teológica; no paráfrasis más allá de lo que el texto fuente permite.
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y el audit trail inglés en una lectura de equivalencia óptima; no se requieren revisiones adicionales.
  spanish_consistency_notes:
  - Se usó «leche» y «alimento sólido» para conservar el contraste metafórico documentado.
  - Se prefirió «aún no» / «ni siquiera ahora» para reflejar la progresión temporal y la incapacidad continua.
  - La puntuación mantiene el paralelismo breve del griego y la intensificación final.
