translation:
  language: es
  text: Así que ni el que planta es algo ni el que riega es algo, sino Dios que da el crecimiento.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «que hace crecer»; tradicionalmente: «que da el incremento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Expresa bien la conclusión inferida del argumento anterior y suena natural en español sin perder el valor lógico del conector.
- source_word: ὁ φυτεύων
  english_pob_choice: the one planting
  chosen_spanish: el que planta
  alternatives_spanish:
  - el plantador
  - el que está plantando
  lexicon: BDAG
  rationale: Mantiene el participio sustantivado y la paralelación con 'el que riega', con un español fluido y claro.
- source_word: ἐστίν τι
  english_pob_choice: is anything
  chosen_spanish: es algo
  alternatives_spanish:
  - cuenta para algo
  - es algo importante
  lexicon: BDAG
  rationale: 'Conserva la fuerza idiomática del griego de manera transparente: no se atribuye valor decisivo al trabajador humano.'
- source_word: ὁ ποτίζων
  english_pob_choice: the one watering
  chosen_spanish: el que riega
  alternatives_spanish:
  - el regador
  - el que está regando
  lexicon: BDAG
  rationale: Reproduce la estructura paralela del primer participio y usa un verbo natural en español para la imagen agrícola.
- source_word: ὁ αὐξάνων
  english_pob_choice: who causes growth
  chosen_spanish: que hace crecer
  alternatives_spanish:
  - que da el crecimiento
  - que da el incremento
  lexicon: BDAG
  rationale: '''Hace crecer'' transmite la idea causal del participio y evita introducir un sustantivo abstracto innecesario en español.'
- source_word: θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  - Dios mismo
  lexicon: BDAG
  rationale: Se mantiene 'Dios' de forma directa, conservando el énfasis final del griego sin forzar una apposición explícita.
theological_decisions:
- issue: Relación entre la labor humana y la acción divina en el crecimiento
  english_pob_reading: Human workers are not anything in themselves; God is the one who causes the growth.
  chosen_spanish_reading: Los ministros humanos no son decisivos en sí mismos; Dios es quien hace crecer.
  alternative_spanish_readings:
  - Los ministros humanos no cuentan para nada; Dios es quien da el crecimiento.
  - Los ministros humanos no son nada; Dios da el incremento.
  rationale: La formulación española conserva la humillación retórica de Pablo sin exagerarla más allá del griego. 'Hace crecer' comunica la acción efectiva de Dios en el desarrollo espiritual.
  doctrine_reference: 1 Corintios 3:5-9; 2 Corintios 12:9; Juan 15:5
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el ajuste final del inglés auditado: se evita una coma innecesaria antes de la cláusula relativa/participial y se conserva el énfasis en Dios como agente del crecimiento. El participio griego ὁ αὐξάνων se vierte con un verbo finito natural en español para mantener claridad sin perder el sentido causal.'
  spanish_consistency_notes:
  - Se usa 'Dios' de forma directa, coherente con el estándar del proyecto para θεός.
  - Se traduce ὥστε con una conclusión natural ('Así que') para conservar la relación lógica con el contexto inmediato.
  - Se mantiene el paralelismo 'el que planta / el que riega' para respetar la estructura retórica de Pablo.
  - '''Hace crecer'' evita una traducción excesivamente tradicionalizada y deja visible la alternativa lexical documentada en la nota.'
