translation:
  language: es
  text: 'ya sea Pablo, ya sea Apolos, ya sea Cefas, ya sea el mundo, ya sea la vida, ya sea la muerte, ya sean las cosas presentes, ya sean las cosas por venir: todas estas cosas son de ustedes,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἴτε … εἴτε
  english_pob_choice: whether ... or
  chosen_spanish: ya sea ... ya sea
  alternatives_spanish:
  - sea ... o
  - ya ... ya ...
  lexicon: BDAG
  rationale: La serie repetida de alternativas se reproduce en español con una construcción correlativa natural. «Ya sea ... ya sea» conserva el paralelismo retórico sin volverla pesada ni introducir una disyunción exclusiva que el griego no exige.
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: Nombre propio griego/uso español establecido
  rationale: Se usa la forma española establecida del nombre propio, plenamente inteligible y fiel al referente.
- source_word: Ἀπολλῶς
  english_pob_choice: Apollos
  chosen_spanish: Apolos
  alternatives_spanish:
  - Apolo
  lexicon: Nombre propio griego/uso español establecido
  rationale: La forma española natural es «Apolos», que conserva el nombre propio sin confundirlo con el dios Apolo.
- source_word: Κηφᾶς
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: El texto griego emplea la forma semítica del nombre; «Cefas» conserva mejor la redacción fuente que sustituirlo por «Pedro», aunque ambos remitan a la misma persona.
- source_word: κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el universo
  - el orden creado
  lexicon: BDAG
  rationale: «El mundo» es la equivalencia más natural y suficientemente amplia para κόσμος en esta enumeración de realidades puestas al servicio de los creyentes.
- source_word: ζωή
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida
  lexicon: BDAG
  rationale: Equivalencia directa y transparente del sustantivo.
- source_word: θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: Equivalencia directa y transparente del sustantivo.
- source_word: ἐνεστῶτα
  english_pob_choice: things present
  chosen_spanish: las cosas presentes
  alternatives_spanish:
  - lo presente
  - las realidades presentes
  lexicon: BDAG
  rationale: El participio funciona sustantivamente para realidades presentes. «Las cosas presentes» conserva la forma plural y el sentido abarcador del original.
- source_word: μέλλοντα
  english_pob_choice: things to come
  chosen_spanish: las cosas por venir
  alternatives_spanish:
  - las cosas futuras
  - lo venidero
  lexicon: BDAG
  rationale: También aquí el participio es sustantivo para realidades futuras. «Las cosas por venir» resulta claro en español y mantiene el paralelismo con «las cosas presentes».
- source_word: πάντα
  english_pob_choice: all
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo lo demás
  lexicon: BDAG
  rationale: En el cierre enfático, «todo» transmite el valor totalizador de πάντα y suena más natural en español junto con la cópula implícita/expresa según el contexto.
- source_word: ὑμῶν
  english_pob_choice: are yours
  chosen_spanish: es de ustedes
  alternatives_spanish:
  - les pertenece
  - es suyo
  lexicon: BDAG
  rationale: El genitivo indica posesión o pertenencia. «Es de ustedes» comunica la idea de pertenencia de forma clara y moderna, sin perder el giro posesivo del griego.
theological_decisions:
- issue: Alcance totalizador de «todo» en la conclusión
  english_pob_reading: all are yours
  chosen_spanish_reading: todo es de ustedes
  alternative_spanish_readings:
  - todo les pertenece
  - todas las cosas son de ustedes
  rationale: El contexto de la lista abarca personas y realidades. «Todo es de ustedes» preserva el cierre absoluto del versículo y la afirmación paulina de pertenencia en Cristo sin suavizarla.
  doctrine_reference: 1 Corintios 3:21-23; posesión de los creyentes en Cristo
translation_notes:
  revision_awareness: La redacción sigue el sentido y la estructura del texto griego directo, en línea con la versión inglesa auditada, sin cambios detectados en la revisión más reciente.
  spanish_consistency_notes:
  - Se mantiene «Cefas» para respetar la forma griega Κηφᾶς.
  - Se evita «SEÑOR» o equivalentes no presentes en el versículo.
  - 'La serie correlativa se conserva con paralelismo uniforme: «ya sea ... ya sea».'
  - Se usa «las cosas presentes / las cosas por venir» para reflejar el uso sustantivo de los participios griegos.
