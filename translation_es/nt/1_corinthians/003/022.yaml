  revision_rationale: Se conserva la estructura correlativa y toda la terminología acertada del borrador, pero se ajusta el remate final para reflejar mejor el valor totalizador de πάντα ὑμῶν en relación con la lista precedente. También se usa dos puntos antes de la conclusión para marcar con mayor naturalidad en español el clímax retórico de la enumeración.
