translation:
  language: es
  text: y ustedes son del[a] Mesías, y el Mesías es de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, 'ustedes son del Mesías, y el Mesías es de Dios.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: pronombre personal de segunda persona plural
  rationale: En español neutral latinoamericano, 'ustedes' comunica de forma natural el plural de segunda persona sin introducir marcación regional ni énfasis adicional.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: conjunción coordinante
  rationale: Aquí δέ enlaza una afirmación breve dentro de la secuencia argumental; 'y' conserva la continuidad sin cargar indebidamente el matiz adversativo.
- source_word: Χριστοῦ
  english_pob_choice: Messiah's
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: Χριστός
  rationale: Se mantiene 'Mesías' por la política del proyecto y porque el genitivo expresa pertenencia/relación de manera concisa. En español, 'son de Mesías' conserva la estructura relacional sin convertir el título en nombre litúrgico fijo.
- source_word: Χριστὸς
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: Χριστός
  rationale: Se conserva el título 'Mesías' en ambas ocurrencias para reflejar la simetría retórica del griego y evitar la sustitución tradicional 'Cristo' sin justificación contextual.
- source_word: θεοῦ
  english_pob_choice: God's
  chosen_spanish: de Dios
  alternatives_spanish:
  - pertenece a Dios
  - es de Dios
  lexicon: θεός
  rationale: El genitivo se vierte con 'de Dios' para mantener la sobriedad y la relación de pertenencia del griego sin expandir innecesariamente el texto.
theological_decisions:
- issue: Cómo expresar la doble relación de pertenencia sin suavizar la jerarquía teológica entre Mesías y Dios.
  english_pob_reading: '''you are Christ''s, and Christ is God''s.'''
  chosen_spanish_reading: '''ustedes son de Mesías, y Mesías es de Dios.'''
  alternative_spanish_readings:
  - ustedes pertenecen al Mesías, y el Mesías pertenece a Dios
  - ustedes son del Mesías, y el Mesías es de Dios
  rationale: La frase griega es telegráfica y relacional. 'Ser de' reproduce de manera breve la pertenencia implícita en los genitivos y preserva la tensión teológica de la subordinación relacional del Mesías a Dios sin interpretarla más de lo necesario.
  doctrine_reference: Preservar la tensión teológica relacional del texto sin resolverla por paráfrasis
translation_notes:
  revision_awareness: El expediente en inglés pasó por una fase de 'belong to' y luego se ajustó a la forma posesiva más directa ('are Messiah's, and Messiah is God's'). La presente redacción española sigue esa preferencia por la relación posesiva breve, pero la expresa con 'ser de' para que suene natural y conserve la concisión del griego.
  spanish_consistency_notes:
  - '''Mesías'' se usa de manera uniforme para Χριστός, en coherencia con la política del proyecto y con la corrección de regresión del inglés.'
  - La preposición 'de' comunica pertenencia relacional sin añadir artículos innecesarios; por eso no se traduce con 'Cristo' ni con una formulación plenamente explicativa.
  - Se evita 'Señor' o cualquier sustitución devocional no presente en el texto fuente.
  - La puntuación conserva la brevedad sentenciosa del original con una coma central que refleja la paralelización de las dos cláusulas.
