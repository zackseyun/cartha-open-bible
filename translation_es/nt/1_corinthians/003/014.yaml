translation:
  language: es
  text: Si permanece[a] la obra que alguno edificó sobre el fundamento, recibirá una recompensa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perdura» o «subsiste» por «permanece».
    reason: lexical_alternative
  - marker: b
    text: O «salario» o «pago» por «recompensa».
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si de veras
  - En caso de que
  lexicon: BDAG
  rationale: La partícula condicional introduce una oración sencilla; «Si» transmite con naturalidad la condición sin añadir matiz que el griego no exige.
- source_word: τινος
  english_pob_choice: anyone’s
  chosen_spanish: de alguno
  alternatives_spanish:
  - de cualquiera
  - de alguien
  lexicon: BDAG
  rationale: El genitivo indefinido expresa posesión de manera inespecífica. «De alguno» conserva esa indeterminación en español sin forzar una referencia a una persona concreta.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - labor
  lexicon: BDAG
  rationale: En el contexto inmediato de la construcción, «obra» funciona de forma natural y digna en español y puede abarcar tanto la labor realizada como el resultado de esa labor.
- source_word: μενεῖ
  english_pob_choice: remains
  chosen_spanish: permanece
  alternatives_spanish:
  - permanece firme
  - subsiste
  - perdura
  lexicon: BDAG
  rationale: El verbo futuro de μένω comunica que algo continúa o permanece. «Permanece» reproduce bien ese sentido sin intensificarlo con «perdura» o «subsiste».
- source_word: ὃ ἐποικοδόμησεν
  english_pob_choice: that he built on
  chosen_spanish: a la que él edificó sobre ella
  alternatives_spanish:
  - que él edificó sobre ella
  - que él construyó sobre ella
  lexicon: BDAG
  rationale: El compuesto ἐποικοδομέω incluye la idea de construir sobre un fundamento. En español, para mantener la referencia al antecedente y la imagen arquitectónica, se resume en «la que él edificó sobre ella»; aquí se integra de forma más idiomática con «la obra» como antecedente implícito.
- source_word: μισθὸν
  english_pob_choice: a reward
  chosen_spanish: una recompensa
  alternatives_spanish:
  - un salario
  - un pago
  lexicon: BDAG
  rationale: En este contexto de evaluación divina, «recompensa» conserva la idea de retribución sin restringirla al ámbito laboral o comercial que sugiere «salario» o «pago».
- source_word: λήμψεται
  english_pob_choice: he will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - él recibirá
  - obtendrá
  lexicon: BDAG
  rationale: La forma futura de λαμβάνω se traduce de manera directa y natural con «recibirá», que mantiene la sencillez y precisión del original.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no se registran revisiones textuales ni cambios de sentido relevantes. La única tensión léxica está en εἴ/μενεῖ/μισθός, resuelta con equivalentes españoles directos y una nota para la alternativa de recompensa retributiva.
  spanish_consistency_notes:
  - Se preserva el tono sobrio y evaluativo del contexto inmediato sin introducir terminología eclesiástica ajena al griego.
  - «Obra» se eligió por coherencia con el campo semántico de edificación; «obra de alguno» mantiene la indefinición del griego sin neutralizar el singular representativo.
  - No se añadió una glosa explícita sobre el sujeto de «la que» para no sobrecargar el verso; el antecedente queda claro por el contexto de la oración.
  - «Recompensa» mantiene el valor general de μισθός como retribución, en línea con la lectura inglesa principal y la alternativa documentada de «wages/payment».
