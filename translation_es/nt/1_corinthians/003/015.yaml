review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: condición real simple, pérdida de la obra, contraste enfático con la salvación de la persona, y cláusula final metafórica sin sobreinterpretación doctrinal. Sin embargo, «se quema» debilita la fuerza de κατακαήσεται, que en contexto apunta a consumirse por completo / ser quemada por completo, y la nota «como quien escapa por fuego» no suena natural en español ni reproduce bien la alternativa inglesa.'
  spanish_quality_summary: El español es claro y eclesialmente legible. Aun así, «se quema» suena algo insuficiente frente a la destrucción implícita; «se quema por completo» mejora la fidelidad y la naturalidad. La cláusula final queda mejor con «aunque él como por fuego», que conserva la tersura y el contraste del griego mejor que «aunque como por fuego». La nota debe naturalizarse a «como quien escapa a través del fuego» o similar.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Será salvado» es aceptable aquí. «Obra» corresponde bien a ἔργον en el contexto de construcción. La decisión de mantener la imagen abierta en la cláusula final coincide con la rationale teológica auditada.
  issues:
  - severity: medium
    issue: «se quema» atenúa la fuerza de κατακαήσεται
    rationale: El verbo compuesto sugiere consumición/destrucción por fuego, no solo el hecho de arder. En español, «se quema» puede sonar demasiado débil o incompleto.
  - severity: medium
    issue: La cláusula final puede expresarse con mejor fidelidad al contraste griego
    rationale: «Aunque como por fuego» es entendible, pero «aunque él como por fuego» reproduce mejor el vínculo con αὐτὸς δὲ σωθήσεται y la idea de salvación apenas a través del fuego sin expansión doctrinal.
  - severity: low
    issue: La alternativa de nota «como quien escapa por fuego» suena poco natural
    rationale: En español idiomático, «escapa a través del fuego» o «escapa del fuego» comunica mejor la imagen; «por fuego» puede sugerir causa más que medio o trayectoria.
  revised_spanish_text: Si la obra de alguien se quema por completo[a], sufrirá pérdida; pero él mismo será salvado, aunque él como por fuego.
  revised_footnotes:
  - marker: a
    text: 'O: «pero solo como por fuego»; o: «pero como quien escapa a través del fuego».'
    reason: lexical_alternative
  revision_rationale: Se ajusta κατακαήσεται para reflejar mejor la idea de consumición total, se mantiene la tensión teológica sin resolver la imagen final, y se naturaliza la nota alternativa en español sin alterar el sentido documentado por la POB inglesa.
