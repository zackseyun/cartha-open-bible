translation:
  language: es
  text: Si la obra de alguien se quema por completo[a], sufrirá pérdida; pero él mismo será salvado, aunque él como por fuego.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero solo como por fuego»; o: «pero como quien escapa a través del fuego».'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: BDAG
  rationale: La partícula condicional introduce una situación real y simple; «Si» reproduce con naturalidad ese valor sin añadir énfasis no presente en el griego.
- source_word: τινος
  english_pob_choice: anyone’s
  chosen_spanish: de alguien
  alternatives_spanish:
  - de cualquiera
  - de una persona
  lexicon: BDAG
  rationale: El genitivo indefinido se refiere a una persona cualquiera en el argumento. «De alguien» mantiene la indefinición en un español natural y evita sobreespecificar.
- source_word: τὸ ἔργον
  english_pob_choice: work
  chosen_spanish: la obra
  alternatives_spanish:
  - el trabajo
  - la labor
  - lo que hizo
  lexicon: BDAG
  rationale: En el contexto inmediato de 1 Corintios 3, ἔργον se integra en la metáfora de construcción y evaluación; «obra» conserva mejor ese campo semántico que «trabajo» en español eclesial, sin perder amplitud.
- source_word: κατακαήσεται
  english_pob_choice: is burned up
  chosen_spanish: se quema
  alternatives_spanish:
  - es consumida por el fuego
  - se consume
  - arde por completo
  lexicon: BDAG
  rationale: El verbo intensifica la quema hasta la destrucción del resultado del trabajo. «Se quema» es el equivalente más natural y transparente en español; el contexto ya comunica que no se trata de una simple mención del fuego, sino de pérdida real.
- source_word: ζημιωθήσεται
  english_pob_choice: will suffer loss
  chosen_spanish: sufrirá pérdida
  alternatives_spanish:
  - será perjudicado
  - perderá su recompensa
  - sufrirá perjuicio
  lexicon: BDAG
  rationale: El verbo expresa pérdida o detrimento. «Sufrirá pérdida» reproduce con claridad ese valor sin concretarlo indebidamente como «recompensa», que sería una inferencia contextual posible pero no explícita en la forma verbal.
- source_word: αὐτὸς δὲ
  english_pob_choice: but he himself
  chosen_spanish: pero él mismo
  alternatives_spanish:
  - pero él
  - sin embargo, él mismo
  lexicon: BDAG
  rationale: El pronombre intensivo subraya contraste entre la pérdida de la obra y la salvación de la persona. «Él mismo» conserva esa fuerza enfática de αὐτός.
- source_word: σωθήσεται
  english_pob_choice: will be saved
  chosen_spanish: será salvado
  alternatives_spanish:
  - será salvo
  - será rescatado
  lexicon: BDAG
  rationale: En este contexto paulino, σῴζω comunica salvación. «Será salvado» es claro, formal y mantiene el pasivo teológico sin introducir matices ajenos como «rescatado».
- source_word: οὕτως δὲ ὡς διὰ πυρός
  english_pob_choice: yet as through fire
  chosen_spanish: aunque como por fuego
  alternatives_spanish:
  - y como por fuego
  - pero como por fuego
  - aunque atravesando fuego
  lexicon: BDAG
  rationale: 'La cláusula final es metafórica y ambigua. «Aunque como por fuego» conserva la tensión del original y permite las lecturas alternativas ya reconocidas por la POB inglesa: supervivencia a través del fuego, escape apenas logrado o preservación en medio del fuego, sin resolver el símbolo de manera interpretativa.'
theological_decisions:
- issue: Cómo traducir la imagen final para no fijar una doctrina específica sobre el fuego.
  english_pob_reading: Kept the clause as 'yet as through fire' without interpretive expansion.
  chosen_spanish_reading: 'Se mantuvo una imagen abierta: «aunque como por fuego».'
  alternative_spanish_readings:
  - solo como por fuego
  - como quien escapa por fuego
  - como por un fuego purificador
  rationale: El griego no explicita si el fuego implica purificación, escape estrecho o simple preservación en medio del juicio. La traducción conserva esa tensión teológica en vez de cerrarla hacia una lectura doctrinal particular.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: El texto inglés auditado permaneció sin cambios en la última revisión; no hubo modificaciones textuales que requirieran ajustar la solución española. Se preservó la misma ambigüedad final documentada en la POB inglesa.
  spanish_consistency_notes:
  - Se mantuvo «obra» para ἔργον dentro de la metáfora de edificación del capítulo.
  - Se usó «salvado» en vez de «rescatado» para conservar la fuerza soteriológica paulina.
  - Se evitó convertir la imagen de fuego en una explicación doctrinal cerrada.
  - La puntuación española refleja la relación adversativa y la cláusula final abierta del griego.
