revisions:
- from: Si la obra de alguien se quema[a], sufrirá pérdida; pero él mismo será salvado, aunque como por fuego.
  to: Si la obra de alguien se quema por completo[a], sufrirá pérdida; pero él mismo será salvado, aunque él como por fuego.
  rationale: Se ajusta κατακαήσεται para reflejar mejor la idea de consumición total, se mantiene la tensión teológica sin resolver la imagen final, y se naturaliza la nota alternativa en español sin alterar el sentido documentado por la POB inglesa.
