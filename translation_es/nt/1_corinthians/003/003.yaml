  source_alignment_summary: 'El borrador refleja bien la estructura argumentativa y las decisiones léxicas clave del griego: ἔτι = «todavía», σαρκικοί = «carnales», ζῆλος = «celos», ἔρις = «contienda», y preserva la pregunta retórica final. También mantiene la metáfora de περιπατεῖτε con «andan». Sin embargo, «según el hombre» suena poco natural y ligeramente opaco en español, aunque formalmente cercano al griego. La alternativa documentada en nota debe quedar anclada con mayor naturalidad en el texto principal.'
  spanish_quality_summary: El español es claro y ampliamente legible, pero el comienzo con «Porque» seguido de «Pues» resulta redundante y algo tosco en español bíblico moderno. Además, la colocación de la nota en «según [a] el hombre» es tipográficamente incorrecta; el marcador debe ir unido a la frase relevante. «Según criterios humanos» comunica mejor κατὰ ἄνθρωπον en español natural sin traicionar el sentido ético contrastivo, y la nota puede preservar la otra alternativa documentada.
  glossary_alignment: Hay buena alineación con la terminología POB, especialmente en «carnales» para σαρκικοί y en evitar glosas doctrinales expansivas. No hay términos del glosario mayor en conflicto. La única mejora necesaria es una formulación más idiomática de κατὰ ἄνθρωπον, manteniendo la nota alternativa.
  issues:
  - severity: medium
    issue: «Según el hombre» es demasiado calcado y poco idiomático en español.
    rationale: Aunque transparenta el griego, en español suena antinatural y puede confundir. El propio expediente inglés reconoce alternativas más claras; en español «según criterios humanos» o «de una manera meramente humana» comunica mejor el contraste ético.
  - severity: low
    issue: Redundancia discursiva en «Porque ... Pues ...».
    rationale: El doble conector explicativo seguido puede sentirse pesado en español. «Porque todavía... Porque donde...» o «Pues todavía... Pues donde...» sería más fluido. Conviene unificar.
  - severity: low
    issue: Ubicación incorrecta del marcador de nota.
    rationale: 'El marcador aparece separado dentro de la locución («según [a] el hombre»). Debe anclarse a la palabra o frase completa correspondiente, por ejemplo «humanos[a]». '
