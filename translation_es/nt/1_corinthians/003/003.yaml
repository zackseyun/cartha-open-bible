lexical_decisions:
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  lexicon: BDAG
  rationale: Expresa la continuidad de la condición denunciada por Pablo y suena natural en español actual.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Mantiene el valor explicativo y la progresión argumentativa sin forzar una sintaxis demasiado literal.
- source_word: σαρκικοί
  english_pob_choice: fleshly
  chosen_spanish: carnales
  alternatives_spanish:
  - de la carne
  - mundanos
  - controlados por la carne
  lexicon: BDAG
  rationale: Conserva el vínculo con σάρξ mediante 'carne'/'carnales' y evita introducir una glosa doctrinal más amplia que el texto no exige.
- source_word: ὅπου
  english_pob_choice: where
  chosen_spanish: donde
  alternatives_spanish:
  - cuando
  - allí donde
  lexicon: BDAG
  rationale: Preserva el matiz locativo del griego y funciona bien en la construcción causal-argumentativa del versículo.
- source_word: ζῆλος
  english_pob_choice: jealousy
  chosen_spanish: celos
  alternatives_spanish:
  - envidia
  - celo
  lexicon: BDAG
  rationale: En este contexto negativo junto con ἔρις, 'celos' comunica de manera natural la rivalidad impropia entre creyentes.
- source_word: ἔρις
  english_pob_choice: strife
  chosen_spanish: contienda
  alternatives_spanish:
  - discordia
  - pleito
  - riña
  lexicon: BDAG
  rationale: '''Contienda'' preserva el sentido de conflicto/disputa y es suficientemente amplio para abarcar la idea del griego.'
- source_word: οὐχὶ
  english_pob_choice: are you not
  chosen_spanish: ¿no son
  alternatives_spanish:
  - ¿acaso no son
  - ¿no están
  lexicon: BDAG
  rationale: Reproduce la pregunta retórica que espera respuesta afirmativa sin añadir énfasis innecesario.
- source_word: κατὰ ἄνθρωπον
  english_pob_choice: according to man
  chosen_spanish: según el hombre
  alternatives_spanish:
  - de manera meramente humana
  - según criterios humanos
  lexicon: BDAG
  rationale: Mantiene la forma transparente del griego y conserva la tensión interpretativa; la alternativa idiomática queda para la nota.
- source_word: περιπατεῖτε
  english_pob_choice: walking
  chosen_spanish: andan
  alternatives_spanish:
  - viven
  - se conducen
  lexicon: BDAG
  rationale: En español, 'andar' conserva la metáfora paulina de conducta/estilo de vida sin sonar tan arcaico como una traducción calcada.
theological_decisions:
