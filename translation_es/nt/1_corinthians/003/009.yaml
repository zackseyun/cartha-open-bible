translation:
  language: es
  text: Porque nosotros somos colaboradores de Dios[a]; ustedes son campo de Dios, edificio de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «colaboradores con Dios».
    reason: alternative_reading
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la fuerza explicativa y causal del conector en español natural, enlazando con el argumento anterior sin endurecer el matiz.
- source_word: συνεργοί
  english_pob_choice: fellow workers
  chosen_spanish: colaboradores
  alternatives_spanish:
  - cooperadores
  - compañeros de trabajo
  lexicon: BDAG
  rationale: «Colaboradores» transmite bien la idea de labor compartida en registro actual y evita una traducción demasiado literal o pesada.
- source_word: θεοῦ (with συνεργοί)
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - con Dios
  - junto con Dios
  lexicon: BDAG
  rationale: Se mantiene el genitivo tal como el griego lo presenta, sin resolver de manera excesiva la relación exacta entre Dios y los ministros. Así se preserva la tensión textual documentada por la POB inglesa.
- source_word: γεώργιον
  english_pob_choice: field
  chosen_spanish: campo
  alternatives_spanish:
  - terreno
  - campo de cultivo
  lexicon: BDAG
  rationale: «Campo» es la forma más natural en español para la metáfora agrícola y conserva la brevedad del original.
- source_word: οἰκοδομή
  english_pob_choice: building
  chosen_spanish: edificio
  alternatives_spanish:
  - construcción
  - edificación
  lexicon: BDAG
  rationale: «Edificio» reproduce de manera clara la imagen de una estructura construida; en este contexto suena más directo que «edificación».
- source_word: ἐστε
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - vosotros sois
  - son
  lexicon: BDAG
  rationale: Explicita el plural en español neutro latinoamericano y mantiene la referencia directa a la comunidad destinataria.
theological_decisions:
- issue: Relación entre «colaboradores» y el genitivo de Dios en θεοῦ συνεργοί
  english_pob_reading: God’s fellow workers
  chosen_spanish_reading: colaboradores de Dios
  alternative_spanish_readings:
  - colaboradores con Dios
  - colaboradores de Dios / colaboradores junto con Dios
  rationale: La forma española «colaboradores de Dios» conserva la lectura principal de pertenencia o servicio bajo Dios, sin cerrar la alternativa debatida. La opción «colaboradores con Dios» se mantiene implícita en la nota porque el griego admite esa discusión.
  doctrine_reference: Preservar la tensión exegética sin imponer una resolución dogmática
translation_notes:
  revision_awareness: 'El borrador sigue el paquete fuente griego y la auditoría inglesa: mantiene el conector explicativo, conserva la metáfora agrícola y arquitectónica, y respeta la ambigüedad del genitivo θεοῦ συνεργοί sin sobretraducirla.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεοῦ en todo el versículo, conforme al estándar del proyecto.
  - «Colaboradores» se eligió para συνεργοί por naturalidad y fidelidad semántica; no se introduce terminología eclesiástica tradicional sin base textual.
  - La nota al pie conserva la alternativa interpretativa relevante que la POB inglesa documenta.
  - «Campo» y «edificio» mantienen paralelismo léxico y claridad en español moderno.
