review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido básico del griego: γάρ como conector explicativo, συνεργοί con el genitivo θεοῦ preservado sin resolver del todo la relación debatida, y el contraste metafórico entre «campo» y «edificio». Sin embargo, la nota al pie está anclada en «campo de Dios[a]» cuando su contenido explica la alternativa de «colaboradores de Dios / con Dios» al inicio del versículo. Ese desajuste rompe la fidelidad al aparato auditado y puede confundir al lector.'
  spanish_quality_summary: El español es natural, claro y eclesialmente legible. «Porque nosotros somos colaboradores de Dios; ustedes son campo de Dios, edificio de Dios» suena bien en español neutro. La única reparación necesaria es mover la nota al pie al sintagma pertinente. El resto del texto no requiere cambios estilísticos mayores.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» corresponde a θεοῦ; no hay términos sensibles como Yahvé/Mesías/esclavo aquí. «Colaboradores», «campo» y «edificio» son elecciones plausibles y fieles al razonamiento léxico documentado, aunque la alternativa «colaboradores con Dios» debe quedar señalada exactamente donde corresponde.
  issues:
  - severity: medium
    issue: La nota al pie [a] está colocada en «campo de Dios[a]», pero la nota explica una alternativa para «colaboradores de Dios».
    rationale: En el inglés POB, la nota «Or 'fellow workers with God'» modifica θεοῦ συνεργοί, no γεώργιον. En español, el anclaje actual induce a pensar erróneamente que la nota comenta «campo de Dios». Esto debe corregirse para preservar la relación entre texto principal y alternativa exegética.
  revised_spanish_text: Porque nosotros somos colaboradores de Dios[a]; ustedes son campo de Dios, edificio de Dios.
