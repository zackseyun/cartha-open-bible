translation:
  language: es
  text: 'Porque siempre que alguno dice[a]: «Yo soy de Pablo», y otro: «Yo soy de Apolos», ¿no son ustedes simplemente humanos?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿no son ustedes meramente humanos?» o «¿no están actuando como meros humanos?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν
  english_pob_choice: whenever
  chosen_spanish: cuando
  alternatives_spanish:
  - siempre que
  - cada vez que
  lexicon: BDAG
  rationale: En español, «cuando» expresa con naturalidad la circunstancia indefinida o repetida sin sonar forzado; «siempre que» y «cada vez que» serían más explicativos de lo necesario.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con el argumento previo y funciona bien al inicio de la oración en español.
- source_word: λέγῃ τις
  english_pob_choice: someone says
  chosen_spanish: alguno dice
  alternatives_spanish:
  - alguien dice
  - una persona dice
  lexicon: BDAG
  rationale: «Alguno» conserva el valor indefinido del singular griego y encaja con la estructura condicional general del pasaje.
- source_word: Ἐγὼ μέν εἰμι Παύλου
  english_pob_choice: I am of Paul
  chosen_spanish: Yo soy de Pablo
  alternatives_spanish:
  - Yo pertenezco a Pablo
  - Yo soy de parte de Pablo
  lexicon: BDAG
  rationale: «Ser de» reproduce de forma natural la lealtad o afiliación partidaria sin sobreinterpretar la relación genitiva.
- source_word: ἕτερος δέ
  english_pob_choice: and another
  chosen_spanish: y otro
  alternatives_spanish:
  - y otro más
  - y otro diferente
  lexicon: BDAG
  rationale: «Y otro» conserva el contraste paralelo de μέν ... δέ de manera breve y natural.
- source_word: Ἐγὼ Ἀπολλῶ
  english_pob_choice: I am of Apollos
  chosen_spanish: Yo soy de Apolos
  alternatives_spanish:
  - Yo pertenezco a Apolos
  - Yo soy de parte de Apolos
  lexicon: BDAG
  rationale: Se mantiene el mismo patrón de afiliación que en la cláusula anterior, preservando la repetición retórica.
- source_word: οὐκ ἄνθρωποί ἐστε
  english_pob_choice: are you not merely human?
  chosen_spanish: ¿no son ustedes simplemente humanos?
  alternatives_spanish:
  - ¿no son ustedes meramente humanos?
  - ¿no están actuando solo como seres humanos?
  lexicon: BDAG
  rationale: «Simplemente humanos» refleja la fuerza de ἄνθρωποι en la pregunta retórica sin introducir una paráfrasis excesiva; «meramente» queda implícito en el adverbio para el lector español y conserva el matiz de la revisión inglesa.
translation_notes:
  revision_awareness: La revisión inglesa añadió 'merely' para reforzar el tono retórico de ἄνθρωποι. La versión española lo refleja con «simplemente», que conserva la fuerza de reproche sin oscurecer el sentido literal de «humanos».
  spanish_consistency_notes:
  - Se mantuvo la estructura repetida «Yo soy de…» para preservar el paralelo de facción del griego.
  - Se prefirió «humanos» en lugar de una reformulación interpretativa para no borrar la tensión entre identidad humana básica y conducta partidista.
  - La puntuación reproduce el quiebre retórico de la pregunta final y el contraste entre las dos declaraciones citadas.
