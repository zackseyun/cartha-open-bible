review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: la estructura indefinida/repetida de ὅταν, la conexión explicativa de γάρ, la fórmula de afiliación «Yo soy de Pablo/Apolos» y la reprensión final. Sin embargo, hay un desajuste gramatical importante en la cláusula final: ἐστε es segunda persona plural, por lo que debe ser «¿no son ustedes...?» solo si el predicado concuerda; en español natural aquí conviene singular colectivo: «¿no son ustedes meramente humanos?» o mejor «¿no son simplemente humanos?». El borrador actual usa «simplemente humanos», que es aceptable semánticamente, pero la nota introduce una alternativa menos fiel: «como seres humanos» diluye el contraste de ‘meramente humano’.'
  spanish_quality_summary: La redacción es clara y legible, con tono digno y natural. No obstante, la nota al pie necesita ajuste para evitar una alternativa poco precisa y algo pesada. Además, «cuando» es defendible, pero «siempre que» refleja mejor el valor iterativo de ὅταν sin sonar forzado en este contexto. El texto revisado mejora la precisión y fluidez.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Yo soy de Pablo/Apolos» preserva correctamente la afiliación partidaria documentada. La reprensión final debe mantener «humanos» y no desplazarse a una perífrasis interpretativa como texto principal.
  issues:
  - severity: medium
    issue: ὅταν se traduce como «cuando» en vez de una forma más iterativa.
    rationale: «Cuando» puede funcionar, pero «siempre que» refleja mejor la circunstancia indefinida/repetida destacada en la auditoría inglesa para ὅταν.
  - severity: medium
    issue: La nota al pie ofrece «¿no están actuando como seres humanos?»
    rationale: Esa alternativa suena menos precisa en español y puede sugerir conducta humana en sentido neutro, mientras que el griego y la auditoría apuntan a ‘meramente humano’ o ‘actuando como hombres/como meros humanos’ en sentido de rebuke.
  revised_spanish_text: 'Porque siempre que alguno dice[a]: «Yo soy de Pablo», y otro: «Yo soy de Apolos», ¿no son ustedes simplemente humanos?'
  revised_footnotes:
  - marker: a
    text: 'O: «¿no son ustedes meramente humanos?» o «¿no están actuando como meros humanos?»'
    reason: lexical_alternative
  revision_rationale: Se ajusta «cuando» a «siempre que» para reflejar mejor el valor iterativo de ὅταν, y se mejora la nota para conservar el matiz de reprensión de οὐκ ἄνθρωποί ἐστε sin introducir una alternativa española menos precisa.
