- from: 'Porque cuando alguno dice[a]: «Yo soy de Pablo», y otro: «Yo soy de Apolos», ¿no son ustedes simplemente humanos?'
  to: 'Porque siempre que alguno dice[a]: «Yo soy de Pablo», y otro: «Yo soy de Apolos», ¿no son ustedes simplemente humanos?'
  rationale: Se ajusta «cuando» a «siempre que» para reflejar mejor el valor iterativo de ὅταν, y se mejora la nota para conservar el matiz de reprensión de οὐκ ἄνθρωποί ἐστε sin introducir una alternativa española menos precisa.
  reviewer_model: gpt-5.4
