translation:
  language: es
  text: Conforme a la gracia de Dios que me fue dada, como sabio maestro constructor[a] puse un fundamento, y otro edifica sobre él[b]. Pero cada uno[c] tenga cuidado de cómo edifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arquitecto»; el griego se refiere a un constructor principal o maestro de obra que supervisa la construcción.
    reason: lexical_alternative
  - marker: b
    text: O «cómo edifica sobre él».
    reason: previous_rendering
  - marker: c
    text: 'El griego usa una forma masculina singular con sentido representativo: «cada uno ... cómo edifica».'
    reason: cultural_note
lexical_decisions:
- source_word: Κατὰ
  english_pob_choice: According to
  chosen_spanish: Conforme a
  alternatives_spanish:
  - Según
  - De acuerdo con
  lexicon: BDAG
  rationale: Κατά expresa conformidad o correspondencia con la gracia recibida; «conforme a» preserva esa relación sin volverla instrumental.
- source_word: χάριν
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En Pablo, χάρις suele tener peso teológico de gracia divina; «gracia» mantiene esa carga sin expansión innecesaria.
- source_word: τὴν δοθεῖσάν μοι
  english_pob_choice: given to me
  chosen_spanish: que me fue dada
  alternatives_spanish:
  - dada a mí
  - que me fue concedida
  lexicon: BDAG
  rationale: La frase participial presenta la gracia como algo otorgado a Pablo; la pasiva «me fue dada» es natural y fiel.
- source_word: ὡς
  english_pob_choice: like
  chosen_spanish: como
  alternatives_spanish:
  - cual
  lexicon: BDAG
  rationale: 'Aquí introduce comparación o capacidad: Pablo habla «como» constructor. En español es la forma más directa.'
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: hábil
  alternatives_spanish:
  - sabio
  - diestro
  lexicon: BDAG
  rationale: El adjetivo puede abarcar sabiduría y pericia técnica. «Hábil» comunica mejor el matiz constructivo del contexto sin perder la valoración.
- source_word: ἀρχιτέκτων
  english_pob_choice: master builder
  chosen_spanish: maestro constructor
  alternatives_spanish:
  - arquitecto
  - constructor principal
  lexicon: BDAG
  rationale: El término griego apunta a un jefe o supervisor de obra, no solo a diseño; «maestro constructor» comunica esa función mejor que «arquitecto» para lectores actuales.
- source_word: θεμέλιον
  english_pob_choice: a foundation
  chosen_spanish: un fundamento
  alternatives_spanish:
  - una base
  - el fundamento
  lexicon: BDAG
  rationale: El sustantivo aparece sin artículo y se refiere a la base puesta; «un fundamento» reproduce bien esa indefinición inmediata.
- source_word: ἔθηκα
  english_pob_choice: I laid
  chosen_spanish: puse
  alternatives_spanish:
  - coloqué
  - eché
  lexicon: BDAG
  rationale: Con θεμέλιον, el sentido es establecer una base; «puse» resulta natural en español y suficientemente preciso.
- source_word: ἄλλος
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - uno más
  - alguien más
  lexicon: BDAG
  rationale: Introduce a un segundo trabajador distinto de Pablo; «otro» es breve y exacto.
- source_word: ἐποικοδομεῖ
  english_pob_choice: builds on it
  chosen_spanish: edifica sobre él
  alternatives_spanish:
  - construye sobre él
  - va edificando sobre él
  lexicon: BDAG
  rationale: El verbo compuesto significa construir sobre un fundamento ya puesto. «Edifica sobre él» conserva el contenido y funciona con tono bíblico natural.
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - todos
  lexicon: BDAG
  rationale: La forma masculina singular tiene valor representativo; «cada uno» preserva ese alcance distributivo en español.
- source_word: βλεπέτω
  english_pob_choice: let each one be careful
  chosen_spanish: mire
  alternatives_spanish:
  - tenga cuidado
  - esté atento
  lexicon: BDAG
  rationale: El imperativo exhorta a vigilar con atención. En español, «mire» funciona como advertencia breve y sobria, especialmente seguido de «cómo edifica».
- source_word: πῶς
  english_pob_choice: how
  chosen_spanish: cómo
  alternatives_spanish:
  - de qué manera
  lexicon: BDAG
  rationale: Mantiene el énfasis en la manera de construir, no solo en el acto mismo.
theological_decisions:
- issue: Lenguaje masculino representativo en ἕκαστος y el verbo final
  english_pob_reading: The English POB keeps 'each one' and a masculine singular 'he' later in the sentence, reflecting representative force.
  chosen_spanish_reading: «cada uno» conserva el valor distributivo sin marcar sexo; no se añade un plural ni una formulación neutra que borre la construcción singular.
  alternative_spanish_readings:
  - «cada hombre»
  - «cada persona»
  - «cada uno ... cómo edifica»
  rationale: El griego usa singular masculino con valor genérico; el español puede reproducirlo con «cada uno» sin forzar una masculinidad exclusiva ni alterar la exhortación individual.
  doctrine_reference: 'Translation philosophy #4 (Gender-accurate over gender-neutral)'
- issue: Sentido de ἀρχιτέκτων
  english_pob_reading: The English POB chose 'master builder' and footnoted 'architect' as a lexical alternative.
  chosen_spanish_reading: «maestro constructor» conserva la función de supervisión de obra más que una mera actividad de diseño.
  alternative_spanish_readings:
  - arquitecto
  - constructor principal
  rationale: En el mundo antiguo, el término implica dirección de obra. En español, «arquitecto» podría sonar más moderno y técnico, pero no comunica tan claramente la labor de edificar y coordinar la construcción.
  doctrine_reference: Lexical fidelity to ancient role semantics
- issue: Relación entre gracia divina y apostolado de Pablo
  english_pob_reading: According to the grace of God given to me
  chosen_spanish_reading: «Conforme a la gracia de Dios que me fue dada» conserva la dependencia de Pablo respecto del don divino.
  alternative_spanish_readings:
  - «por la gracia de Dios»
  - «según la gracia de Dios»
  rationale: «Conforme a» refleja la idea de actuar de acuerdo con la gracia recibida, no solo mediante ella como instrumento, y mantiene el matiz de correspondencia del preposición κατά.
  doctrine_reference: Pauline grace and ministry
translation_notes:
  revision_awareness: 'El contexto auditado mantiene alta concordancia con la versión inglesa: se conserva la estructura de dos cláusulas de edificación y la advertencia final. La revisión más reciente no introdujo cambios sustantivos, y la única tensión relevante sigue siendo la fuerza de ἀρχιτέκτων, resuelta aquí con un equivalente funcional y una nota alternativa.'
  spanish_consistency_notes:
  - Se preserva la repetición de edificar/edifica para reflejar ἐποικοδομεῖ.
  - «Fundamento» mantiene el campo léxico de construcción sin sobreinterpretar la metáfora.
  - La advertencia final se mantiene en singular representativo, coherente con el griego.
  - No se usa «Señor» ni otra convención de máscara, porque el verso no contiene el Tetragrámaton ni κύριος con función de nombre divino.
