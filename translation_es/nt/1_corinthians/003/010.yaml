  rationale: 'Se corrige «hábil» a «sabio» para respetar σοφός y la decisión léxica documentada por el POB. Se reordena y reancla por completo el sistema de notas para que coincida con el texto: [a] en «maestro constructor», [b] en «sobre él» para conservar la nota histórica de traducción previa, y [c] en «cada uno» para la nota sobre el masculino representativo. También se mejora βλεπέτω a «tenga cuidado de cómo edifica», que expresa mejor la advertencia del original y del inglés auditado.'
