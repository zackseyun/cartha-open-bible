review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: κατά + χάρις se vierte adecuadamente como relación de conformidad; la gracia dada a Pablo, la imagen del ἀρχιτέκτων que pone un fundamento, el otro que edifica encima, y la advertencia sobre cómo edifica cada uno. Sin embargo, hay dos desajustes importantes con el expediente POB y con el griego: (1) σοφός se tradujo «hábil», pero el POB documentó «wise» y el matiz evaluativo/sapiencial debe preservarse mejor en español con «sabio»; (2) las notas al pie están mal ancladas y mal distribuidas: el marcador [b] en «cada uno» remite a una nota sobre «arquitecto», y se omitió la nota cultural sobre el masculino representativo que sí conserva el audit trail inglés. Además, la nota [c] española no corresponde al motivo del POB, que era una variante de traducción previa sobre «builds on it», no una simple alternativa léxica para πῶς.'
  spanish_quality_summary: El español es generalmente claro y legible, con tono bíblico natural. «Edifica sobre él» y «mire cómo edifica» funcionan bien. No obstante, «hábil maestro constructor» suena algo técnico y desplaza innecesariamente el énfasis de sabiduría a destreza. «Mire cómo edifica» es aceptable, pero «tenga cuidado de cómo edifica» comunica mejor la fuerza exhortativa de βλεπέτω en español contemporáneo y armoniza con el POB inglés («be careful»).
  glossary_alignment: No hay conflictos con la terminología principal del proyecto (Dios, gracia, etc.). La decisión «maestro constructor» para ἀρχιτέκτων concuerda con la rationale inglesa, con nota alternativa «arquitecto». La principal corrección léxica necesaria es σοφός → «sabio», no «hábil». También debe preservarse mediante nota la observación del POB sobre el masculino singular representativo en ἕκαστος.
  issues:
  - severity: high
    issue: La nota [b] está anclada incorrectamente en «cada uno» pero su contenido trata de «arquitecto».
    rationale: Esto rompe la trazabilidad entre texto y nota y puede confundir al lector; cada marcador debe corresponder al término anotado.
  - severity: high
    issue: Falta la nota cultural sobre el masculino singular representativo en ἕκαστος.
    rationale: El audit trail inglés la conserva explícitamente; en español conviene mantenerla para documentar la decisión de «cada uno».
  - severity: medium
    issue: La nota [c] española no refleja la nota inglesa documentada.
    rationale: El POB inglés registra una traducción previa alternativa («how he builds on it»), no simplemente «de qué manera»; la nota española debería corresponder a esa historia/rationale o suprimirse si no se mantiene.
  - severity: medium
    issue: σοφὸς se tradujo «hábil» en vez de «sabio».
    rationale: Aunque el contexto constructivo admite pericia, el expediente POB eligió 'wise' para preservar el término griego y su matiz evaluativo; «sabio» es la opción más fiel.
  - severity: low
    issue: «Mire cómo edifica» es posible, pero suaviza la cautela imperativa de βλεπέτω.
    rationale: «Tenga cuidado de cómo edifica» comunica más claramente la vigilancia exigida por el griego y por el POB inglés.
