translation:
  language: es
  text: Si alguien destruye el templo[a] de Dios, Dios lo destruirá a él; porque el templo de Dios es santo[b], y ustedes son ese templo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse como «corrompe» o «contamina» en ambos usos del verbo griego φθείρω; aquí se adopta «destruye» por la fuerza de la advertencia.
    reason: lexical_alternative
  - marker: b
    text: El «ustedes» es plural; Pablo identifica a la congregación como un solo templo de Dios.
    reason: cultural_note
lexical_decisions:
- source_word: ναός
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: «Templo» es la opción natural y clara en español para el lugar sagrado de Dios. «Santuario» es posible, pero en este contexto resulta menos directo y puede sonar más técnico o más amplio de sentido.
- source_word: φθείρει / φθερεῖ
  english_pob_choice: destroys / will destroy
  chosen_spanish: destruye / destruirá
  alternatives_spanish:
  - corrompe / corromperá
  - contamina / contaminará
  - desfigura / desfigurará
  lexicon: BDAG
  rationale: Sigo la fuerza del inglés POB y mantengo la repetición verbal con un verbo fuerte en ambas cláusulas. «Destruye» conserva el peso de la advertencia; las alternativas suavizan demasiado el paralelismo o cambian el matiz.
- source_word: τοῦτον
  english_pob_choice: him
  chosen_spanish: lo / a él
  alternatives_spanish:
  - esa persona
  - a esa persona
  lexicon: BDAG
  rationale: El demostrativo singular apunta de manera personal al sujeto indefinido previo. En español, «lo» y «a él» expresan esa referencia directa sin añadir interpretación innecesaria.
- source_word: ἅγιος
  english_pob_choice: holy
  chosen_spanish: santo
  alternatives_spanish:
  - sagrado
  - consagrado
  lexicon: BDAG
  rationale: «Santo» es el equivalente más estable y bíblico en español para describir lo que pertenece a Dios y está apartado para él. «Sagrado» o «consagrado» son posibles, pero aquí «santo» preserva mejor el tono bíblico y la formulación del texto.
- source_word: οἵτινές ἐστε ὑμεῖς
  english_pob_choice: and you are that temple
  chosen_spanish: y ustedes son ese templo
  alternatives_spanish:
  - y ustedes mismos son ese templo
  - y ustedes son el templo
  lexicon: BDAG
  rationale: La frase identifica a los destinatarios con el templo de Dios. «Ese templo» refleja bien la identificación del relativo sin volver la frase pesada. Mantengo «ustedes» para hacer visible el plural, tal como lo destaca el POB en inglés.
theological_decisions:
- issue: Sentido corporativo de «ustedes» frente a una lectura individual
  english_pob_reading: 'The main sense is corporate: the plural "you" identifies the community collectively as God''s temple.'
  chosen_spanish_reading: 'El sentido principal es corporativo: «ustedes» designa a la comunidad como templo de Dios.'
  alternative_spanish_readings:
  - Una lectura principalmente individual del creyente
  - Una referencia mixta al creyente y a la comunidad
  rationale: El griego une un singular («templo») con un plural («ustedes»), lo que favorece la identificación colectiva de la iglesia como morada de Dios. Por eso la traducción conserva explícitamente el plural.
  doctrine_reference: 1 Co 3:16–17; Ef 2:21–22; 1 Co 6:19
translation_notes:
  revision_awareness: 'No se requieren revisiones respecto del último pasaje auditado: la evidencia textual y la evaluación cruzada coinciden en alto grado, y la formulación española mantiene la advertencia fuerte, la repetición verbal y el sentido corporativo del pasaje.'
  spanish_consistency_notes:
  - Se mantiene «templo» como traducción de ναός, coherente con la terminología POB en español para este pasaje.
  - Se evita «SEÑOR» porque el texto griego dice θεοῦ y no κύριος.
  - Se conserva «ustedes» en plural para reflejar la lectura comunitaria destacada en el audit trail.
  - 'La cadencia de la segunda cláusula conserva el paralelo: «destruye / destruirá».'
