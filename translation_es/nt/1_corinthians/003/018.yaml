translation:
  language: es
  text: Que nadie se engañe a sí mismo. Si alguno entre ustedes se cree sabio en este siglo[a], hágase necio[b], para que llegue a ser sabio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sabio según los criterios de este siglo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «conviértase en necio».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Μηδεὶς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - No se engañe nadie
  - Que no haya nadie que
  lexicon: BDAG
  rationale: El griego expresa una prohibición universal; 'Que nadie' comunica con naturalidad la fuerza imperativa sin perder el alcance general.
- source_word: ἑαυτὸν
  english_pob_choice: himself
  chosen_spanish: a sí mismo
  alternatives_spanish:
  - a sí mismo/a sí misma
  - a sí
  lexicon: BDAG
  rationale: El reflexivo es explícito en el griego. En español, 'a sí mismo' conserva la referencia reflexiva sin introducir una solución forzada de género en el texto base.
- source_word: ἐξαπατάτω
  english_pob_choice: deceive
  chosen_spanish: se engañe
  alternatives_spanish:
  - se decepcione
  - se extravíe
  lexicon: BDAG
  rationale: Aquí el verbo apunta a autoengaño; 'se engañe' transmite el sentido directo y natural en español, manteniendo el matiz de autoengaño del griego.
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_spanish: se cree
  alternatives_spanish:
  - piensa
  - supone
  lexicon: BDAG
  rationale: En este contexto la idea es la autopercepción o la opinión de sí mismo; 'se cree' refleja bien esa valoración subjetiva.
- source_word: σοφὸς
  english_pob_choice: wise
  chosen_spanish: sabio
  alternatives_spanish:
  - prudente
  - entendido
  lexicon: BDAG
  rationale: '''Sabio'' es el equivalente más directo y común para σοφός en este marco paulino de sabiduría humana frente a la de Dios.'
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: '''Entre ustedes'' es la forma natural en español neutro latinoamericano para la comunidad corintia.'
- source_word: ἐν τῷ αἰῶνι τούτῳ
  english_pob_choice: in this age
  chosen_spanish: en este siglo
  alternatives_spanish:
  - en esta edad
  - en este mundo
  - según los criterios de este siglo
  lexicon: BDAG
  rationale: Se conserva la distinción temporal y cultural de αἰών como 'siglo', que en español puede expresar con claridad la era presente y sus valores. La nota permite la alternativa interpretativa 'según los criterios de este siglo' cuando se quiera explicitar el trasfondo de estándares.
- source_word: μωρὸς
  english_pob_choice: foolish
  chosen_spanish: necio
  alternatives_spanish:
  - tonto
  - insensato
  - loco
  lexicon: BDAG
  rationale: '''Necio'' conserva mejor el registro bíblico y la fuerza de μωρός que ''tonto''; además mantiene el juego paradójico del pasaje sin reducirlo a insulto coloquial.'
- source_word: γενέσθω
  english_pob_choice: let him become
  chosen_spanish: hágase
  alternatives_spanish:
  - que llegue a ser
  - conviértase
  lexicon: BDAG
  rationale: El imperativo aoristo medio se refleja bien con 'hágase', que conserva la idea de llegar a asumir esa condición requerida por la exhortación.
- source_word: ἵνα γένηται σοφός
  english_pob_choice: so that he may become wise
  chosen_spanish: para que llegue a ser sabio
  alternatives_spanish:
  - a fin de que sea sabio
  - para volverse sabio
  lexicon: BDAG
  rationale: '''Para que llegue a ser sabio'' conserva la relación de propósito y el movimiento verbal del griego, evitando simplificar el contraste paradójico.'
theological_decisions:
- issue: Sentido de αἰών en la oposición paulina
  english_pob_reading: Rendered as 'age' rather than 'world.'
  chosen_spanish_reading: '''Siglo'' en el texto principal, con posibilidad de explicitar ''los criterios de este siglo'' en nota.'
  alternative_spanish_readings:
  - mundo
  - edad
  - época
  rationale: El contraste paulino no es meramente espacial sino histórico y valorativo. 'Siglo' comunica bien la esfera de la era presente; la nota ayuda a evitar que el lector lo entienda solo como tiempo cronológico.
  doctrine_reference: Translation philosophy §4
- issue: Autoengaño y responsabilidad personal
  english_pob_reading: Let no one deceive himself
  chosen_spanish_reading: Que nadie se engañe a sí mismo
  alternative_spanish_readings:
  - No se engañe nadie
  - Que nadie se engañe
  rationale: El texto subraya la responsabilidad del creyente frente a su propia autoevaluación. Mantener el reflexivo explícito evita diluir la advertencia apostólica.
  doctrine_reference: 1 Corintios 3:18; cf. prudencia frente a la sabiduría humana en el contexto inmediato
- issue: Paradoja de hacerse necio para llegar a ser sabio
  english_pob_reading: let him become foolish, so that he may become wise
  chosen_spanish_reading: hágase necio, para que llegue a ser sabio
  alternative_spanish_readings:
  - conviértase en necio, para ser sabio
  - hágase insensato, para que sea sabio
  rationale: Se preserva la paradoja retórica de Pablo sin suavizarla. 'Necio' mantiene el contraste con 'sabio' y deja intacta la inversión de valores exigida por el evangelio.
  doctrine_reference: Sabiduría paulina en contraste con la sabiduría de este siglo
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego directamente y se tuvo en cuenta el audit trail inglés: la distinción entre αἰών como ''age'' y el matiz de la exhortación paradójica se mantuvieron sin depender mecánicamente de la redacción inglesa. No se registran revisiones posteriores en el expediente, y el estado final del inglés es ''unchanged''.'
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita del nombre divino.
  - Se prefirió 'sabio'/'necio' para conservar el paralelismo antitético del griego y la tradición de contraste sapiencial paulino.
  - Se usó español neutro latinoamericano ('ustedes') para la comunidad destinataria.
  - El reflexivo 'a sí mismo' explicita el objeto directo del autoengaño, conservando la estructura del original.
