translation:
  language: es
  text: El que planta y el que riega son uno[a], y cada uno recibirá su recompensa conforme a su propia labor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «están unidos» o «tienen un mismo propósito».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ φυτεύων
  english_pob_choice: the one who plants
  chosen_spanish: el que planta
  alternatives_spanish:
  - el plantador
  - el que está plantando
  lexicon: BDAG
  rationale: El participio con artículo funciona sustantivamente; en español, «el que planta» conserva la idea de persona que realiza la acción de manera natural y sin volverla más técnica de lo necesario.
- source_word: ὁ ποτίζων
  english_pob_choice: the one who waters
  chosen_spanish: el que riega
  alternatives_spanish:
  - el regador
  - el que está regando
  lexicon: BDAG
  rationale: «Regar» expresa bien el campo agrícola y mantiene el paralelismo con «el que planta».
- source_word: ἕν εἰσιν
  english_pob_choice: are one
  chosen_spanish: son uno
  alternatives_spanish:
  - están unidos
  - tienen un mismo propósito
  lexicon: BDAG
  rationale: El neutro ἕν señala unidad; «son uno» preserva la concisión del griego y deja abierta la glosa explicativa que desarrolla la unidad de propósito.
- source_word: μισθὸν
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - pago
  - salario
  lexicon: BDAG
  rationale: «Recompensa» encaja con el contexto ministerial y evita reducir el término a una mera paga monetaria.
- source_word: λήμψεται
  english_pob_choice: will receive
  chosen_spanish: recibirá
  alternatives_spanish:
  - obtendrá
  - va a recibir
  lexicon: BDAG
  rationale: El futuro simple en español transmite bien el valor futuro del verbo sin añadir matices innecesarios.
- source_word: κατὰ τὸν ἴδιον κόπον
  english_pob_choice: according to his own labor
  chosen_spanish: conforme a su propio trabajo
  alternatives_spanish:
  - según su propio esfuerzo
  - de acuerdo con su propio trabajo
  lexicon: BDAG
  rationale: «Conforme a» conserva el valor proporcional de κατά; «trabajo» es claro y suficientemente cercano a κόπος, aunque «esfuerzo» también podría reflejar la idea de fatiga o labor ardua.
theological_decisions:
- issue: Sentido de ἕν εἰσιν / unidad de los ministros
  english_pob_reading: The planter and the waterer are one, meaning united in purpose and work, not identical persons or undifferentiated roles.
  chosen_spanish_reading: El que planta y el que riega son uno, es decir, están unidos en su labor y propósito, sin que eso los haga la misma persona.
  alternative_spanish_readings:
  - son uno en dignidad solamente
  - forman simplemente un equipo
  rationale: La forma neutra ἕν enfatiza unidad, no identidad personal; la redacción española conserva la afirmación breve y permite la aclaración doctrinal sin borrar la tensión del texto.
  doctrine_reference: Unidad del ministerio cristiano; 1 Corintios 3:5-9
translation_notes:
  revision_awareness: Coincide con la revisión más reciente del texto fuente y con el control cruzado de alta concordancia; no se registran cambios aplicados en la última pasada.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conserva la imagen agrícola y el paralelismo entre los dos participios articularmente sustantivados.
  - «Recompensa» y «trabajo» reflejan el campo semántico de μισθός y κόπος sin sobreinterpretar la relación como salario meramente contractual.
