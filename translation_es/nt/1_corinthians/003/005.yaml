translation:
  language: es
  text: ¿Qué es entonces Apolos? ¿Y qué es Pablo? Servidores[b] por medio de los cuales ustedes creyeron,[a] como el Señor dio a cada uno[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Quién es entonces Apolos? ¿Y quién es Pablo?» El griego usa «qué», enfocando su función más que su identidad.
    reason: lexical_alternative
  - marker: b
    text: O «ministros». La palabra griega designa servidores o agentes de servicio, no necesariamente el oficio eclesiástico de diácono.
    reason: lexical_alternative
  - marker: c
    text: La cláusula «como el Señor dio a cada uno» es elíptica en griego; algunas versiones traducen «como el Señor asignó a cada uno».
    reason: alternative_reading
lexical_decisions:
- source_word: Τί
  english_pob_choice: What
  chosen_spanish: ¿Qué
  alternatives_spanish:
  - ¿Quién
  lexicon: BDAG
  rationale: El interrogativo neutro apunta al papel o función de Apolos y Pablo, no a su identidad personal; por eso «¿Qué» reproduce mejor la fuerza retórica del griego.
- source_word: οὖν
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: «Entonces» conserva la relación inferencial y de transición sin sonar forzado en español.
- source_word: δέ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ introduce una continuación paralela con leve contraste; «Y» es natural en español y mantiene el emparejamiento retórico.
- source_word: διάκονοι
  english_pob_choice: servants
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - ministros
  lexicon: BDAG
  rationale: Se conserva la fuerza lexical de δούλος/διάκονος como agente subordinado de servicio. En este contexto Pablo rebaja el estatus de los líderes; «esclavos» mantiene esa tensión más fuertemente que «siervos» o «ministros».
- source_word: δι’ ὧν
  english_pob_choice: through whom
  chosen_spanish: por medio de los cuales
  alternatives_spanish:
  - por quienes
  - a través de quienes
  lexicon: BDAG
  rationale: «Por medio de los cuales» expresa con claridad el valor instrumental o mediador de la preposición con el relativo, sin perder naturalidad en español.
- source_word: ἐπιστεύσατε
  english_pob_choice: you believed
  chosen_spanish: ustedes creyeron
  alternatives_spanish:
  - ustedes llegaron a creer
  - ustedes pusieron su fe
  lexicon: BDAG
  rationale: El aoristo señala el acto decisivo de creer; «creyeron» es directo y no añade expansión interpretativa.
- source_word: καὶ ἑκάστῳ ὡς ὁ κύριος ἔδωκεν
  english_pob_choice: and each one as the Lord gave
  chosen_spanish: como el Señor dio a cada uno
  alternatives_spanish:
  - y a cada uno como el Señor dio
  - como el Señor asignó a cada uno
  lexicon: BDAG
  rationale: Se preserva la elipsis del griego sin suplir un objeto como «cargo», «función» o «don». El orden español se ajusta para sonar natural y reflejar que la acción de dar queda abierta en la frase.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Por defecto confesional y por el contexto paulino, κύριος se traduce «Señor». El texto no necesita explicitar aquí el referente, aunque el contexto apunta al Señor Jesús.
theological_decisions:
- issue: Alcance de διάκονοι en un contexto de liderazgo apostólico
  english_pob_reading: The term denotes servants or agents of service, not necessarily the church office of deacon.
  chosen_spanish_reading: La palabra designa agentes de servicio subordinados, no el oficio eclesiástico de diácono.
  alternative_spanish_readings:
  - diáconos
  - ministros
  rationale: El contexto minimiza la exaltación de Apolos y Pablo; traducirlo con un término de rango eclesiástico trasladaría un sentido institucional que el griego no exige aquí.
  doctrine_reference: 'Contested terms table: διάκονος → servant / agent of service'
- issue: Elipsis final en «como el Señor dio a cada uno»
  english_pob_reading: The main text preserves the ellipsis rather than supplying 'task,' 'role,' or 'gift.'
  chosen_spanish_reading: La traducción conserva la elipsis y no añade un objeto explícito a «dio».
  alternative_spanish_readings:
  - como el Señor asignó a cada uno un papel
  - como el Señor dio a cada uno su tarea
  rationale: El griego es condensado y deja abierto qué fue lo dado; resolverlo en el texto principal reduciría una ambigüedad que la fuente mantiene.
  doctrine_reference: 'Translation philosophy #3: Preserve theological tension rather than resolve it'
- issue: Referente de κύριος
  english_pob_reading: The term refers to the Lord Jesus, who assigns ministry to his servants.
  chosen_spanish_reading: El término se deja como «Señor», con referencia contextual al Señor Jesús.
  alternative_spanish_readings:
  - Dios
  - el Señor Jesús
  rationale: Nombrarlo explícitamente podría ir más allá del nivel de explicitud del versículo; mantener «Señor» respeta el texto y deja que el contexto haga la identificación.
  doctrine_reference: 'Contested terms table: κύριος → Lord'
translation_notes:
  revision_awareness: Tomé en cuenta la revisión más reciente del inglés, que reordenó la cláusula final para reflejar mejor el griego («as the Lord gave to each one»). En español, esa decisión se reflejó con «como el Señor dio a cada uno», manteniendo el orden natural del español sin resolver la elipsis.
  spanish_consistency_notes:
  - Se mantuvo «Señor» para κύριος según el estándar del proyecto.
  - Se prefirió «esclavos» para conservar la fuerza subordinante del contexto, aun cuando «siervos» sería más suave.
  - La frase final conserva la ambigüedad del griego y no introduce un sustantivo suplido.
  - Los signos de interrogación y el orden de preguntas siguen la retórica del original.
