  to: ¿Qué es entonces Apolos? ¿Y qué es Pablo? Servidores[b] por medio de los cuales ustedes creyeron,[a] como el Señor dio a cada uno[c].
  rationale: Se cambia «Esclavos» por «Servidores» para reflejar fielmente διάκονοι según la evidencia griega y el audit trail inglés, evitando confundirlo con δοῦλος. Se conservan la forma retórica «¿Qué…?» y la elipsis final. También se reordenan las marcas de nota para que [a] ancle la alternativa de «qué/quién», [b] la alternativa léxica de διάκονοι, y [c] la nota sobre la cláusula final, tal como exige la disciplina de anclaje.
