    rationale: Si se mantiene «dio a cada uno», conviene que la nota explique la elipsis de forma más directa y cercana al audit trail inglés, sin sugerir excesivamente una expansión concreta.
  revised_spanish_text: ¿Qué es entonces Apolos? ¿Y qué es Pablo? Servidores[b] por medio de los cuales ustedes creyeron,[a] como el Señor dio a cada uno[c].
