  source_alignment_summary: 'El borrador refleja bien la estructura retórica del griego («¿Qué…? ¿Y qué…?»), el valor instrumental de δι’ ὧν («por medio de los cuales») y la elipsis final («como el Señor dio a cada uno»). Sin embargo, falla en una decisión léxica clave: διάκονοι no es δοῦλοι y no debe traducirse «Esclavos». El inglés auditado eligió «servants» precisamente para evitar confundir el término con el oficio de diácono sin intensificarlo a «slaves».'
  spanish_quality_summary: El español es claro y legible, pero «Esclavos» suena demasiado fuerte y lexicalmente impreciso para διάκονοι. «Servidores» o «siervos» funcionan mejor; «servidores» encaja especialmente bien con la nota que explica agentes de servicio y evita resonancias institucionales. El resto del verso suena natural en español contemporáneo y conserva bien la concisión del original.
  glossary_alignment: 'Hay desalineación con la terminología y la justificación documentada: el borrador aplica indebidamente la preferencia de δοῦλος → «esclavo» a διάκονος. Para κύριος → «Señor» sí está alineado. La nota sobre «ministros» como alternativa es útil y debe mantenerse, pero la base léxica principal debe pasar a «servidores».'
  issues:
