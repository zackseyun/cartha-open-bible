base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/003/005.yaml
  text: What then is Apollos? And what is Paul? Servants through whom you believed[c][b][a], as the Lord gave to each one.
  footnotes:
  - marker: a
    text: Or 'Who then is Apollos? And who is Paul?' The Greek uses 'what,' focusing on their role rather than their identity.
    reason: lexical_alternative
  - marker: b
    text: Or 'ministers.' The Greek word denotes servants or agents of service, not necessarily the church office of deacon.
    reason: lexical_alternative
  - marker: c
    text: The clause 'and each one as the Lord gave' is elliptical in Greek; some render 'as the Lord assigned to each.'
    reason: alternative_reading
