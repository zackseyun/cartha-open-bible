translation:
  language: es
  text: La obra de cada uno se hará evidente, porque el Día[a] la dará a conocer, ya que se revela en el fuego[b]; y el fuego mismo probará qué clase de obra es la de cada uno.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Día» probablemente se refiere al día futuro de evaluación o juicio divino.
    reason: cross_reference
  - marker: b
    text: O «por fuego». La expresión griega ἐν πυρί puede entenderse como «en el fuego» o, de manera instrumental, como «por fuego».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστου
  english_pob_choice: each one’s
  chosen_spanish: de cada uno
  alternatives_spanish:
  - de cada persona
  - de todos
  lexicon: BDAG
  rationale: La construcción distributiva singular pide una referencia individualizada. «De cada uno» conserva esa fuerza sin añadir género ni volver la frase más pesada.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - deber
  - hecho
  lexicon: BDAG
  rationale: En este contexto, ἔργον se refiere a la obra o producción ministerial de cada uno. «Obra» suena natural en español e incluye el sentido de labor/resultados sin reducirlo a un solo acto.
- source_word: φανερὸν γενήσεται
  english_pob_choice: will become evident
  chosen_spanish: se hará evidente
  alternatives_spanish:
  - se manifestará
  - se hará manifiesta
  lexicon: BDAG
  rationale: La combinación de adjetivo más futuro de γίνομαι se expresa bien como resultado visible. «Se hará evidente» comunica el proceso de quedar expuesto de modo claro.
- source_word: ἡ ἡμέρα
  english_pob_choice: the Day
  chosen_spanish: el Día
  alternatives_spanish:
  - el día
  lexicon: BDAG
  rationale: Con artículo y contexto escatológico, Pablo alude a un día específico de evaluación divina. La mayúscula ayuda a reflejar ese referente sin añadir una explicación al texto.
- source_word: δηλώσει
  english_pob_choice: will disclose
  chosen_spanish: la dará a conocer
  alternatives_spanish:
  - la revelará
  - la pondrá en claro
  lexicon: BDAG
  rationale: «Dar a conocer» expresa con naturalidad la función de δηλόω de hacer patente o manifiesto. Se mantiene un verbo distinto de «revela» para conservar la diferencia con ἀποκαλύπτεται.
- source_word: ἐν πυρὶ
  english_pob_choice: in fire
  chosen_spanish: en fuego
  alternatives_spanish:
  - por fuego
  - mediante fuego
  lexicon: BDAG
  rationale: Se preserva la preposición ἐν de forma transparente. «En fuego» mantiene abierta la posibilidad locativa o instrumental, como en el audit trail inglés.
- source_word: ἀποκαλύπτεται
  english_pob_choice: is revealed
  chosen_spanish: se revela
  alternatives_spanish:
  - es revelado
  - se descubre
  lexicon: BDAG
  rationale: La pasiva presente se traduce de manera directa y sobria. «Se revela» conserva la imagen de un desvelamiento que ocurre en el ámbito del fuego.
- source_word: ὁποῖόν ἐστιν
  english_pob_choice: what sort of work
  chosen_spanish: qué clase de obra es
  alternatives_spanish:
  - de qué tipo de obra se trata
  - qué tipo de obra es
  lexicon: BDAG
  rationale: La pregunta sobre la calidad o clase de la obra se expresa naturalmente con «qué clase de obra es». Mantiene el énfasis en la naturaleza de la obra, no solo en su existencia.
- source_word: τὸ πῦρ αὐτὸ
  english_pob_choice: the fire itself
  chosen_spanish: el fuego mismo
  alternatives_spanish:
  - el mismo fuego
  - el fuego en sí
  lexicon: BDAG
  rationale: El pronombre intensivo se refleja con «mismo», preservando que el fuego mismo realiza la prueba.
- source_word: δοκιμάσει
  english_pob_choice: will test
  chosen_spanish: probará
  alternatives_spanish:
  - examinará
  - pondrá a prueba
  lexicon: BDAG
  rationale: «Probar» conserva el valor de examinar para verificar la calidad o autenticidad. En español bíblico moderno resulta natural y no diluye la fuerza evaluativa del verbo.
theological_decisions:
- issue: Sentido de ἡ ἡμέρα como referencia escatológica específica.
  english_pob_reading: The Day likely refers to the future day of divine evaluation or judgment.
  chosen_spanish_reading: el Día, entendido como el día futuro de evaluación divina.
  alternative_spanish_readings:
  - el día
  - aquel día
  rationale: El contexto de 1 Corintios 3 apunta a una evaluación final de la obra de cada uno. La mayúscula en «Día» comunica esa referencia sin convertirla en paráfrasis doctrinal.
  doctrine_reference: 1 Corintios 3:13-15; 2 Corintios 5:10
- issue: 'Valor de ἐν πυρί: locativo o instrumental.'
  english_pob_reading: in fire / by fire
  chosen_spanish_reading: en fuego, dejando abierta la posibilidad de matiz instrumental.
  alternative_spanish_readings:
  - por fuego
  - mediante fuego
  rationale: El griego permite tanto ubicación como medio. «En fuego» conserva la ambigüedad documentada y evita fijar unilateralmente un matiz no resuelto por el texto.
  doctrine_reference: 1 Corintios 3:13; Malquías 3:2-3
- issue: Relación entre «el fuego» y la acción de probar.
  english_pob_reading: the fire itself will test
  chosen_spanish_reading: el fuego mismo probará
  alternative_spanish_readings:
  - el fuego lo probará
  - el mismo fuego examinará
  rationale: El texto intensifica al fuego como agente de prueba. «Mismo» preserva esa fuerza enfática y evita diluir el sujeto activo.
  doctrine_reference: 1 Corintios 3:13
translation_notes:
  revision_awareness: La versión española sigue de cerca el análisis del texto griego y del audit trail inglés. Se mantuvieron las dos imágenes distintas de 1) quedar patente la obra y 2) ser sometida a prueba por el fuego, sin fusionarlas ni explicar más de lo que el texto dice.
  spanish_consistency_notes:
  - Se usa «Día» con mayúscula para reflejar la referencia escatológica documentada en el contexto.
  - Se prefirió «obra» para ἔργον por su amplitud y naturalidad en español bíblico contemporáneo.
  - Se distinguieron cuidadosamente «dar a conocer» y «revela» para no borrar la diferencia entre δηλόω y ἀποκαλύπτω.
  - Se conservó la ambigüedad de ἐν πυρί mediante una nota de pie de página, como en el audit trail inglés.
