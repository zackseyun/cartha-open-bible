    issue: Los marcadores de notas al pie están anclados a palabras equivocadas.
    rationale: La nota [a] explica ἐν πυρί pero aparece sobre «obra»; la nota [b] explica «El Día» pero aparece sobre «fuego». Esto rompe la trazabilidad del audit trail y puede confundir al lector.
  - severity: medium
    issue: «En fuego» suena poco natural en español.
    rationale: Aunque intenta preservar formalmente ἐν πυρί, en español bíblico natural «en el fuego» comunica mejor la expresión sin cerrar del todo la alternativa instrumental, que puede mantenerse en la nota.
