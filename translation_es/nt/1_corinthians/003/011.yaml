translation:
  language: es
  text: Porque nadie puede poner otro fundamento, sino el que ya está puesto, que es Jesús Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Jesucristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: θεμέλιον
  english_pob_choice: foundation
  chosen_spanish: fundamento
  alternatives_spanish:
  - base
  - cimentación
  lexicon: BDAG
  rationale: En el contexto de la metáfora de construcción, θεμέλιον designa el elemento fundacional de un edificio. 'Fundamento' es natural en español bíblico y conserva bien la imagen sin volverla técnica en exceso.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la explicación del enunciado anterior. 'Porque' mantiene la relación causal/expositiva de forma clara y fluida en español.
- source_word: ἄλλον
  english_pob_choice: another
  chosen_spanish: otro
  alternatives_spanish:
  - diferente
  - uno más
  lexicon: BDAG
  rationale: ἄλλον expresa una adición excluida por el contexto. 'Otro' reproduce esa oposición de manera idiomática.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  - no persona
  lexicon: BDAG
  rationale: El pronombre es universal y singular; 'nadie' es la forma más natural y directa en español.
- source_word: δύναται
  english_pob_choice: can
  chosen_spanish: puede
  alternatives_spanish:
  - es capaz de
  - tiene poder para
  lexicon: BDAG
  rationale: El verbo indica posibilidad/capacidad. 'Puede' es breve, claro y suficiente aquí.
- source_word: θεῖναι
  english_pob_choice: lay
  chosen_spanish: poner
  alternatives_spanish:
  - colocar
  - asentar
  lexicon: BDAG
  rationale: Aunque en inglés 'lay' preserva la metáfora constructiva, en español 'poner' funciona con naturalidad junto a 'fundamento'. Mantiene la imagen de establecer una base.
- source_word: παρὰ
  english_pob_choice: besides
  chosen_spanish: sino el
  alternatives_spanish:
  - además de
  - aparte de
  lexicon: BDAG
  rationale: Con acusativo, παρά tiene valor excluyente ('además de / aparte de'). En español, la construcción negativa 'nadie puede... sino...' expresa con precisión esa exclusión.
- source_word: τὸν κείμενον
  english_pob_choice: the one already laid
  chosen_spanish: el que ya está puesto
  alternatives_spanish:
  - el ya puesto
  - el que ha sido puesto
  lexicon: BDAG
  rationale: El participio κείμενον presenta el fundamento como ya existente y en estado resultante. 'Ya está puesto' refleja bien ese valor resultativo en un español natural.
- source_word: ὅς
  english_pob_choice: which
  chosen_spanish: que
  alternatives_spanish:
  - el cual
  - el que
  lexicon: BDAG
  rationale: La relativa retoma al fundamento. 'Que' mantiene sencillez y permite la identificación final sin sobrecargar la sintaxis.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús, el Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como 'Mesías' cuando funciona claramente como título, aquí la identificación fija del fundamento con Jesús en fórmula nominativa favorece la forma tradicional compacta 'Jesucristo' como equivalente cristiano asentado y plenamente reconocible en español. La alternativa 'Jesús, el Mesías' queda implícitamente disponible semánticamente, pero la forma unida es más idiomática en este cierre identificador.
theological_decisions:
- issue: Cómo expresar Χριστός en la identificación final del fundamento
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús, el Mesías
  - Jesús Cristo
  rationale: El texto afirma que el fundamento ya puesto es Jesús. En español, la forma compuesta 'Jesucristo' es la identificación más estable y transparente para lectores eclesiales, sin alterar la referencia a la dignidad/título de Cristo. Se evita 'Cristo' aislado como nombre ocultante y se conserva la referencia cristológica completa.
  doctrine_reference: 'DOCTRINE.md: traducir títulos según el contexto; Cristo/Χριστός puede conservarse en forma establecida cuando la identificación nominal cristiana lo requiere'
translation_notes:
  revision_awareness: El texto inglés POB pasó por una oscilación entre 'Jesus Christ' y 'Jesus Messiah', con restauración final de 'Messiah' por fidelidad a la política de traducir Χριστός como título. En español, se opta por 'Jesucristo' por ser la forma eclesialmente asentada y equivalente compacta, sin necesidad de reproducir la oscilación gráfica del inglés en el cuerpo principal.
  spanish_consistency_notes:
  - 'Se mantiene el orden lógico de la frase: causa (''Porque''), imposibilidad universal (''nadie puede''), exclusión (''sino''), y la identificación final del fundamento.'
  - '''Fundamento'' conserva la metáfora arquitectónica del contexto inmediato de 1 Corintios 3.'
  - '''Jesucristo'' se usa como forma unida estándar en español, no como sustitución doctrinal distinta de ''Jesús Mesías''.'
