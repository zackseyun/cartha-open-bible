  text: Ahora bien, si alguien edifica sobre el fundamento con oro, plata, piedras preciosas, madera, heno, paja,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ δέ
  english_pob_choice: Now if
  chosen_spanish: Ahora bien, si
  alternatives_spanish:
  - Y si
  - Pero si
  lexicon: BDAG
  rationale: ἐἰ introduce la condición y δέ señala una leve transición discursiva; «Ahora bien» conserva ese giro sin endurecerlo en contraste fuerte. «si» mantiene la condición abierta.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: El indefinido griego es genérico; «alguien» transmite bien la referencia abierta en español contemporáneo y suena natural en una advertencia hipotética.
- source_word: ἐποικοδομεῖ
  english_pob_choice: builds
  chosen_spanish: edifica
  alternatives_spanish:
  - construye
  - edifica sobre
  lexicon: BDAG
  rationale: El verbo tiene el sentido de construir encima de un fundamento. «Edifica» es idiomático en español bíblico y mantiene el valor metafórico; la relación con la base ya queda expresada por «sobre el fundamento».
- source_word: ἐπὶ τὸν θεμέλιον
  english_pob_choice: on the foundation
  chosen_spanish: sobre el fundamento
  alternatives_spanish:
  - sobre la base
  - encima del fundamento
  lexicon: BDAG
  rationale: La preposición con acusativo expresa colocación sobre una base. «Fundamento» es la equivalencia más directa para θεμέλιον y conserva el símil arquitectónico.
- source_word: χρυσόν
  english_pob_choice: gold
  chosen_spanish: oro
  lexicon: BDAG
  rationale: Término material directo; «oro» es la correspondencia natural en español.
- source_word: ἄργυρον
  english_pob_choice: silver
  chosen_spanish: plata
  lexicon: BDAG
  rationale: Término material directo; «plata» corresponde de manera inmediata y clara.
- source_word: λίθους τιμίους
  english_pob_choice: precious stones
  chosen_spanish: piedras preciosas
  alternatives_spanish:
  - piedras valiosas
  - piedras de mucho valor
  lexicon: BDAG
  rationale: La expresión puede referirse a piedras costosas o valiosas para construcción. «Piedras preciosas» es la opción española más natural y mantiene el valor elevado del conjunto sin forzar una explicación técnica.
- source_word: ξύλα
  english_pob_choice: wood
  chosen_spanish: madera
  alternatives_spanish:
  - leña
  - maderos
  lexicon: BDAG
  rationale: El plural griego nombra materiales de construcción de forma genérica; «madera» funciona como sustantivo colectivo natural en español.
- source_word: χόρτον
  english_pob_choice: hay
  chosen_spanish: heno
  alternatives_spanish:
  - pasto seco
  - hierba seca
  lexicon: BDAG
  rationale: En esta lista de materiales de baja calidad, χόρτον apunta a material vegetal seco. «Heno» conserva el contraste con los materiales nobles y es claro en español.
- source_word: καλάμην
  english_pob_choice: straw
  chosen_spanish: paja
  alternatives_spanish:
  - rastrojo
  - caña
  lexicon: BDAG
  rationale: La imagen culmina con otro material vegetal muy combustible o frágil. «Paja» es la correspondencia más extendida y comprende bien el paralelismo con «heno».
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el audit trail inglés; no se añadieron notas porque el verso es una lista material sin variantes textuales o tensiones doctrinales documentadas en el paquete. Se mantuvo el registro condensado del original, preservando la progresión retórica y la enumeración de materiales.
  spanish_consistency_notes:
  - Se evitó «SEÑOR» y cualquier terminología no pertinente, porque el versículo no contiene vocabulario divino.
  - Se prefirió «fundamento» para θεμέλιον por coherencia con el símil arquitectónico del contexto inmediato.
  - La lista de materiales conserva el paralelismo y la gradación de valor del original.
  - «Heno» y «paja» reflejan mejor el contraste de materiales pobres que equivalentes más interpretativos como «hierba» o «rastrojo» en este contexto.
