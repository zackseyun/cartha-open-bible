translation:
  language: es
  text: Yo planté[a], Apolos regó, pero Dios dio el crecimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «pero Dios hizo crecer» / «pero Dios causó el crecimiento».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: Yo
  alternatives_spanish:
  - Yo mismo
  lexicon: BDAG
  rationale: El pronombre explícito en griego añade énfasis. En español, 'Yo' conserva ese relieve sin volver la frase pesada.
- source_word: ἐφύτευσα
  english_pob_choice: planted
  chosen_spanish: planté
  alternatives_spanish:
  - hice la plantación
  - sembré
  lexicon: BDAG
  rationale: φυτεύω significa plantar; 'planté' mantiene la imagen agrícola de Pablo con naturalidad en español.
- source_word: Ἀπολλῶς
  english_pob_choice: Apollos
  chosen_spanish: Apolos
  alternatives_spanish:
  - Apolo
  lexicon: Nombre propio
  rationale: Se translitera el nombre propio siguiendo la convención del proyecto y la forma usual en español bíblico.
- source_word: ἐπότισεν
  english_pob_choice: watered
  chosen_spanish: regó
  alternatives_spanish:
  - dio agua
  - hizo el riego
  lexicon: BDAG
  rationale: ποτίζω aquí continúa la metáfora agrícola. 'Regó' es la equivalencia más natural y breve en español para este contexto.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sino
  - sin embargo
  lexicon: BDAG
  rationale: '''Pero'' expresa con claridad el contraste fuerte entre la labor humana y la acción decisiva de Dios.'
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - Dios mismo
  lexicon: BDAG
  rationale: El sujeto articular identifica a Dios como el agente verdadero del crecimiento; en español no se requiere reproducir el artículo.
- source_word: ηὔξανεν
  english_pob_choice: gave the growth
  chosen_spanish: dio el crecimiento
  alternatives_spanish:
  - hizo crecer
  - causó el crecimiento
  - estaba dando el crecimiento
  lexicon: BDAG
  rationale: La forma imperfecta sugiere acción continua en pasado, pero la decisión editorial inglesa ya optó por un equivalente más natural y formal. 'Dio el crecimiento' conserva la fuerza de la imagen y la relación causal sin volverse explicativo.
theological_decisions:
- issue: Relación entre el trabajo humano y la acción divina
  english_pob_reading: Pablo y Apolos realizaron labores ministeriales reales, pero Dios fue quien produjo el crecimiento.
  chosen_spanish_reading: Pablo y Apolos hicieron labores reales, pero solo Dios dio el crecimiento.
  alternative_spanish_readings:
  - Pablo y Apolos sembraron y regaron, y Dios hizo crecer
  - Dios fue quien hizo posible el crecimiento
  rationale: 'La frase mantiene la tensión teológica del texto: el ministerio humano es verdadero, pero la eficacia final pertenece a Dios. No se suaviza ni se resuelve esa distinción.'
  doctrine_reference: Preservar la tensión teológica del pasaje, no armonizarla de forma excesiva.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión auditada del inglés POB, que pasó de una formulación más analítica del imperfecto a 'gave the growth' por naturalidad y adecuación formal. La versión española sigue esa decisión con 'dio el crecimiento', manteniendo la metáfora agrícola y el contraste teológico.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para ὁ θεός conforme al estándar del proyecto.
  - Se usa 'Apolos' como transliteración española regular del nombre propio.
  - Se conserva el tono sobrio y bíblico sin recurrir a una paráfrasis explicativa.
  - La nota al pie refleja la alternativa lexical principal para ηὔξανεν, alineada con el audit trail inglés.
