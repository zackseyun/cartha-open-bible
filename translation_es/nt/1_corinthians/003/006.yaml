  source_alignment_summary: 'El borrador español refleja fielmente el griego: mantiene la secuencia contrastiva entre la labor de Pablo, la de Apolos y la acción decisiva de Dios. ''Planté'', ''regó'' y ''dio el crecimiento'' preservan bien la metáfora agrícola y el sentido global del versículo. Aunque ηὔξανεν puede expresar matiz imperfectivo, la auditoría inglesa ya resolvió a favor de ''gave the growth'', y ''dio el crecimiento'' lo representa de manera adecuada.'
