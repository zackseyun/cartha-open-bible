review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: σοφία = «sabiduría», κόσμου τούτου = «de este mundo», μωρία = «necedad», γέγραπται = «está escrito», y la cita de Job 5:13 conserva la idea de que Dios prende/atrapa a los sabios por medio de su propia astucia. «Ante Dios» transmite adecuadamente el valor evaluativo de παρὰ τῷ θεῷ, y la nota lo aclara bien.'
  spanish_quality_summary: La redacción principal es natural, clara y digna. Sin embargo, la nota [b] contiene inglés («cunning»), lo cual no es aceptable en un aparato de notas español. Además, «su astucia» puede leerse ambiguamente en español; «la astucia de ellos» suena más explícito, aunque el texto corriente también puede mantenerse si la nota se corrige. Conviene además suavizar «Pues está escrito» a «Porque está escrito» o mantener «Pues»; ambas son válidas. El cambio necesario es menor y editorial, no estructural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen Yahvé, Mesías, δοῦλος, etc. Las decisiones léxicas principales están alineadas con el POB inglés. La única desalineación real está en la nota lexical_alternative de πανουργίᾳ, que introduce una glosa inglesa en vez de alternativas españolas.
  issues:
  - severity: medium
    issue: La nota [b] incluye el término inglés «cunning».
    rationale: Las notas deben estar en español y servir al lector hispanohablante; mezclar inglés aquí rompe la consistencia editorial y no cumple el objetivo del aparato español.
  - severity: low
    issue: La expresión «su astucia» puede resultar ligeramente ambigua en español.
    rationale: Aunque el antecedente probable es «los sabios», «la astucia de ellos» explicita mejor αὐτῶν. No es un error grave, pero una leve mejora de claridad es recomendable.
  revised_spanish_text: 'Porque la sabiduría de este mundo es necedad ante Dios[a]. Pues está escrito: «Él atrapa a los sabios en la astucia de ellos[b]».'
