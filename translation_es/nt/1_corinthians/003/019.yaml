    text: O «a los ojos de Dios»; literalmente, «con Dios», es decir, bajo su valoración o juicio.
    reason: lexical_alternative
  - marker: b
    text: O «en su maña»; el término griego expresa una astucia de tono negativo.
    reason: lexical_alternative
  revision_rationale: Se corrige la nota [b] para que esté íntegramente en español y se ajusta levemente la cita a «la astucia de ellos» para reflejar con mayor claridad el posesivo αὐτῶν sin cambiar el sentido. El resto del versículo está bien alineado con el griego y con el historial del POB inglés.
