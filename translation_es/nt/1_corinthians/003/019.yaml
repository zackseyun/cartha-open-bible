translation:
  language: es
  text: 'Porque la sabiduría de este mundo es necedad ante Dios[a]. Pues está escrito: «Él atrapa a los sabios en la astucia de ellos[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a los ojos de Dios»; literalmente, «con Dios», es decir, bajo su valoración o juicio.
    reason: lexical_alternative
  - marker: b
    text: O «en su maña»; el término griego expresa una astucia de tono negativo.
    reason: lexical_alternative
lexical_decisions:
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría humana
  - ciencia
  lexicon: BDAG
  rationale: σοφία se refiere aquí a la pretensión de sabiduría del orden presente; «sabiduría» conserva el término amplio y el contraste paulino con la evaluación de Dios.
- source_word: κόσμου τούτου
  english_pob_choice: of this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de esta era
  - de este siglo
  lexicon: BDAG
  rationale: κόσμος con τούτου señala el orden presente; «de este mundo» es natural en español y mantiene el contraste con Dios sin introducir una interpretación más técnica.
- source_word: μωρία
  english_pob_choice: foolishness
  chosen_spanish: necedad
  alternatives_spanish:
  - locura
  - insensatez
  lexicon: BDAG
  rationale: «Necedad» transmite bien el juicio valorativo y el tono polémico de Pablo; «locura» podría sonar más psicológico que moral, y «insensatez» es posible pero menos idiomático aquí.
- source_word: παρὰ τῷ θεῷ
  english_pob_choice: with God
  chosen_spanish: ante Dios
  alternatives_spanish:
  - con Dios
  - a los ojos de Dios
  - en la valoración de Dios
  lexicon: BDAG
  rationale: La preposición con dativo expresa evaluación desde el punto de vista divino. «Ante Dios» comunica de forma breve la idea de juicio o perspectiva divina, sin ocultar la tensión lexical.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: Fórmula bíblica convencional; «está escrito» es natural y solemnemente reconocible en español.
- source_word: δρασσόμενος
  english_pob_choice: catches
  chosen_spanish: atrapa
  alternatives_spanish:
  - coge
  - prende
  - sorprende
  lexicon: BDAG
  rationale: El participio sugiere tomar o sorprender con efecto de captura. «Atrapa» conserva esa fuerza proverbial en español y evita una literalidad áspera.
- source_word: σοφοὺς
  english_pob_choice: the wise
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los prudentes
  - a los sabios de este mundo
  lexicon: BDAG
  rationale: El plural masculino funciona de manera genérica; «a los sabios» reproduce el grupo humano al que se refiere la cita sin sobreespecificar.
- source_word: πανουργίᾳ
  english_pob_choice: craftiness
  chosen_spanish: astucia
  alternatives_spanish:
  - cunning
  - habilidad
  - maña
  lexicon: BDAG
  rationale: πανουργία tiene una carga negativa de ingenio deshonesto o mañoso. «Astucia» es una equivalencia clara en español y mantiene la ambigüedad moral negativa.
theological_decisions:
- issue: Valor evaluativo de παρὰ τῷ θεῷ
  english_pob_reading: with God; that is, in God's sight or judgment
  chosen_spanish_reading: ante Dios, es decir, bajo su juicio o valoración
  alternative_spanish_readings:
  - con Dios
  - a los ojos de Dios
  - en la valoración de Dios
  rationale: La frase no describe mera compañía sino el estándar de evaluación divina. «Ante Dios» preserva la relación de juicio; la nota deja visible la alternativa semántica que el inglés POB explicó como ‘in God’s sight or judgment’.
  doctrine_reference: BDAG; nota de equivalencia evaluativa en la cláusula preposicional.
- issue: Tratamiento de la cita de Job 5:13 y del sujeto implícito
  english_pob_reading: He catches the wise in their craftiness
  chosen_spanish_reading: Él atrapa a los sabios en su astucia
  alternative_spanish_readings:
  - Atrapa a los sabios en su astucia
  - Él prende a los sabios en su astucia
  rationale: El griego usa un participio articular con valor de sujeto. En español, explicitar «Él» hace la cita clara y mantiene la referencia a Dios sin añadir una interpretación ajena; «atrapa» conserva el matiz de captura del proverbio.
  doctrine_reference: Job 5:13; preservación del sujeto implícito por claridad formal.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB inglés, que eliminó la frase explicativa innecesaria «is the one who» para reflejar más directamente el griego. En español se mantuvo la cita breve y directa, con sujeto explícito «Él» para claridad natural.
  spanish_consistency_notes:
  - Se usó «Dios» en vez de una perífrasis más larga para mantener la concisión y el contraste paulino.
  - «Sabiduría» y «sabios» conservan la repetición léxica del pasaje.
  - Se evitó «Cristo» o terminología confesional ajena al versículo.
  - La cita quedó como una sola oración con puntuación española y comillas angulares.
  - La nota a distingue la lectura evaluativa de παρὰ τῷ θεῷ sin borrar la literalidad subyacente.
