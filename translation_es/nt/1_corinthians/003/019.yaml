  rationale: Se corrige la nota [b] para que esté íntegramente en español y se ajusta levemente la cita a «la astucia de ellos» para reflejar con mayor claridad el posesivo αὐτῶν sin cambiar el sentido. El resto del versículo está bien alineado con el griego y con el historial del POB inglés.
