translation:
  language: es
  text: ¿No saben que ustedes son templo[a] de Dios y que el Espíritu de Dios habita en ustedes[b][c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'santuario de Dios'.
    reason: lexical_alternative
  - marker: b
    text: El 'ustedes' es plural; Pablo se dirige a la comunidad en conjunto.
    reason: cultural_note
  - marker: c
    text: O 'entre ustedes'.
    reason: alternative_reading
lexical_decisions:
- source_word: ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  lexicon: BDAG
  rationale: ναός designa el templo/santuario como espacio sagrado; 'templo' es la equivalencia natural y clara en español para conservar la imagen de recinto sagrado, sin diluirla en un término más general.
- source_word: θεοῦ
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  lexicon: BDAG
  rationale: El genitivo se expresa de forma directa en español con 'de Dios'. En esta frase no hace falta poseerivo enclítico; la estructura nominal conserva bien la relación genitiva.
- source_word: ἐστε
  english_pob_choice: you are
  chosen_spanish: ustedes son
  alternatives_spanish:
  - vosotros sois
  - son
  lexicon: BDAG
  rationale: El verbo está en segunda persona plural. 'Ustedes son' comunica de manera natural el plural y mantiene visible que Pablo habla a la comunidad en conjunto.
- source_word: τὸ πνεῦμα τοῦ θεοῦ
  english_pob_choice: God’s Spirit
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el Espíritu de Dios
  - el espíritu de Dios
  lexicon: BDAG
  rationale: Aunque el inglés POB usa 'God’s Spirit' por naturalidad, en español 'el Espíritu de Dios' es la forma más idiomática y bíblicamente transparente. La mayúscula en 'Espíritu' refleja el referente personal y evita ambigüedad con un espíritu creado o genérico.
- source_word: οἰκεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - vive
  - reside
  lexicon: BDAG
  rationale: '''Habita'' transmite mejor en español la permanencia de οἰκέω en un contexto de templo, y evita el tono demasiado ordinario de ''vive''. Conserva la idea de presencia continua sin volverla explícitamente teológica más allá del texto.'
- source_word: ἐν ὑμῖν
  english_pob_choice: in you
  chosen_spanish: en ustedes
  alternatives_spanish:
  - entre ustedes
  - en vosotros
  lexicon: BDAG
  rationale: El plural se conserva con 'ustedes'. Dado el contexto corporativo, 'en ustedes' mantiene el sentido literal y deja abierta la lectura comunitaria sin imponer 'entre ustedes'.
- source_word: Οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben...?
  alternatives_spanish:
  - ¿No saben ustedes...?
  - ¿No se dan cuenta...?
  lexicon: BDAG
  rationale: La pregunta retórica en plural suena natural en español con '¿No saben...?'. Mantiene el tono de reprensión pastoral sin añadir intensidad que no esté en el griego.
theological_decisions:
- issue: Si la afirmación 'templo de Dios' debe individualizarse o leerse corporativamente
  english_pob_reading: The main text keeps 'you' without narrowing it, while recognizing the plural address as primarily corporate in context.
  chosen_spanish_reading: 'El texto conserva el plural sin individualizar: ''ustedes son templo de Dios''.'
  alternative_spanish_readings:
  - cada uno de ustedes es templo de Dios
  - ustedes juntos son templo de Dios
  rationale: El griego usa segunda persona plural, pero no añade un adverbio que obligue a 'juntos'. 'Ustedes son templo de Dios' preserva el enunciado fuente y permite que el contexto marque el alcance comunitario.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Cómo reflejar la posibilidad de 'en ustedes' o 'entre ustedes'
  english_pob_reading: Or 'among you.'
  chosen_spanish_reading: Se deja 'en ustedes' como texto principal, con posibilidad de lectura comunitaria implícita.
  alternative_spanish_readings:
  - entre ustedes
  rationale: El griego ἐν ὑμῖν admite una lectura local ('en ustedes') y una corporativa ('entre ustedes'). El texto principal no fuerza una de las dos; la nota conserva la alternativa sin perder la literalidad.
  doctrine_reference: Mantener la ambigüedad legítima del texto.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el audit trail en inglés. Se mantuvo la imagen de ναός como 'templo', la segunda persona plural, y la ambigüedad de ἐν ὑμῖν. Se adaptó 'God’s Spirit' a la forma idiomática española 'el Espíritu de Dios', y 'dwells' a 'habita' por su mejor ajuste al campo semántico de residencia permanente en contexto de templo.
  spanish_consistency_notes:
  - Se usa 'templo' como equivalente principal de ναός, reservando 'santuario' para la nota alternativa.
  - '''Espíritu'' va con mayúscula porque el referente es el Espíritu de Dios.'
  - Se conserva el plural explícito con 'ustedes' para reflejar la dirección comunitaria del versículo.
  - La nota sobre 'entre ustedes' mantiene la tensión entre presencia interior y presencia comunitaria sin decidirla en exceso.
