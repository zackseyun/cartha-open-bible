translation:
  language: es
  text: 'Y de nuevo: «Yahvé conoce los pensamientos[a] de los sabios[c][b], que son vanos.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «razonamientos» para «pensamientos».
    reason: lexical_alternative
  - marker: b
    text: Citado de Salmo 94:11 (93:11 LXX).
    reason: cross_reference
  - marker: c
    text: O «vacíos» o «fútiles» para «vanos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ πάλιν
  english_pob_choice: And again
  chosen_spanish: Y de nuevo
  alternatives_spanish:
  - Y otra vez
  - Y además
  lexicon: BDAG, πάλιν
  rationale: La fórmula introduce otra cita de apoyo; «Y de nuevo» transmite con naturalidad el valor repetitivo e introductorio sin sobrecargar el español.
- source_word: Κύριος
  english_pob_choice: The Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG, κύριος
  rationale: Se mantiene el título en español como referencia al Señor de la cita bíblica. El artículo es natural en la cita introducida por Pablo.
- source_word: γινώσκει
  english_pob_choice: knows
  chosen_spanish: conoce
  alternatives_spanish:
  - sabe
  - reconoce
  lexicon: BDAG, γινώσκω
  rationale: «Conoce» comunica el acto de conocer de forma directa y solemne; evita ampliar innecesariamente el sentido.
- source_word: διαλογισμοὺς
  english_pob_choice: thoughts
  chosen_spanish: pensamientos
  alternatives_spanish:
  - razonamientos
  - planes
  lexicon: BDAG, διαλογισμός
  rationale: El contexto requiere actividad mental interior. «Pensamientos» es el equivalente más claro y natural en español; «razonamientos» queda reservado como alternativa semántica más técnica.
- source_word: τῶν σοφῶν
  english_pob_choice: of the wise
  chosen_spanish: de los sabios
  alternatives_spanish:
  - de los мудos
  - de los entendidos
  lexicon: BDAG, σοφός
  rationale: El adjetivo sustantivado se vierte naturalmente como «los sabios». Mantiene el matiz irónico del contexto paulino sobre la sabiduría humana.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - porque
  lexicon: BDAG, ὅτι
  rationale: Aquí introduce el contenido de lo conocido; «que» reproduce la subordinación declarativa.
- source_word: μάταιοι
  english_pob_choice: futile
  chosen_spanish: vanos
  alternatives_spanish:
  - inútiles
  - vacíos
  lexicon: BDAG, μάταιος
  rationale: «Vanos» conserva la fuerza de inutilidad/vacuidad del término griego y además enlaza bien con el eco bíblico del texto citado. Se preserva la alternativa inglesa «vain/empty» en la nota española.
theological_decisions:
- issue: Identificación del título Κύριος en una cita del AT
  english_pob_reading: The Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Señor
  rationale: La cita reproduce el lenguaje del Salmo y en el flujo paulino apunta al Señor de la Escritura. No se introduce «Yahvé» en el texto principal porque aquí la forma citada es la del título griego del pasaje citado; se conserva el valor reverente y reconocible de «el Señor».
  doctrine_reference: Uso bíblico del título divino en citas del Antiguo Testamento; coherencia intertextual con la forma griega citada.
- issue: Sentido de μάταιοι
  english_pob_reading: futile
  chosen_spanish_reading: vanos
  alternative_spanish_readings:
  - fútiles
  - vacíos
  rationale: En español, «vano» cubre bien la idea de inutilidad y vacuidad sin sonar excesivamente técnica. Mantiene la tensión entre inutilidad y vaciedad presente en las alternativas inglesas.
  doctrine_reference: Ninguna doctrina específica; decisión léxica para preservar el peso semántico del adjetivo.
translation_notes:
  revision_awareness: El pasaje coincide ampliamente con el audit trail en inglés y no requiere cambios sustantivos; se conservó la estructura introductoria, la cita breve y la equivalencia semántica principal. Se ajustó el orden de las notas para que la referencia cruzada siga al texto citado y se mantuvo la doble posibilidad léxica en la nota de μάταιοι.
  spanish_consistency_notes:
  - Se usa «Señor» de manera consistente con el tratamiento POB de κύριος como título divino.
  - «Pensamientos» mantiene lectura natural para διαλογισμοί sin perder la alternativa más técnica «razonamientos».
  - «Vanos» preserva el contraste bíblico entre la sabiduría humana y su insuficiencia.
  - La puntuación refleja una cita breve introducida por dos puntos y entre comillas, natural en español bíblico moderno.
