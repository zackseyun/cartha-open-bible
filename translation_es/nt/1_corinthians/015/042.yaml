- from: 'Así también es la resurrección de los muertos: se siembra en corrupción[a]; se resucita en incorrupción.'
  to: 'Así también es la resurrección de los muertos: se siembra en corrupción[a]; es resucitado en incorrupción.'
  rationale: Se corrige el verbo de ἐγείρεται para expresar con mayor fidelidad el pasivo griego y la acción recibida en la resurrección, y se arregla la alternativa léxica de la nota al pie en español idiomático.
  reviewer_model: gpt-5.4
