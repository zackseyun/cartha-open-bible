review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura y el contraste del griego: Οὕτως καὶ = ''Así también'', ἡ ἀνάστασις τῶν νεκρῶν = ''la resurrección de los muertos'', y mantiene la metáfora de ''se siembra ... se resucita''. Sin embargo, ''se resucita'' en español suena menos natural e introduce ambigüedad de sujeto/agencia frente al pasivo griego ἐγείρεται. Además, la nota usa ''imperishabilidad'', anglicismo/no español, cuando la alternativa documentada debe expresarse en español.'
  spanish_quality_summary: 'El texto es generalmente claro y digno, pero ''se resucita'' no es la mejor forma española aquí; ''es resucitado'' sería demasiado pesado, mientras que ''es levantado'' perdería el sentido de resurrección. La forma más natural y fiel en este contexto es ''es resucitado'' o una reformulación; dado el objetivo de conservar el pasivo teológico, conviene usar ''es resucitado''. La nota al pie necesita español idiomático: ''imperecibilidad'' en lugar de ''imperishabilidad''.'
  glossary_alignment: No hay conflictos con la terminología de proyecto principal. 'Corrupción/incorrupción' preserva adecuadamente el contraste φθορά/ἀφθαρσία, con alternativa en nota. 'Resurrección' y 'los muertos' están bien alineados. La única desviación relevante es la elección verbal española para ἐγείρεται, donde hace falta una forma pasiva más fiel y menos ambigua.
  issues:
  - severity: medium
    issue: '''se resucita'' para ἐγείρεται es poco natural y ambiguo en español'
    rationale: Aunque intenta reflejar una pasiva, en español 'resucitar' suele ser intransitivo o activo/causativo según el contexto, y 'se resucita' puede sonar impersonal o reflexivo. El griego es pasivo y subraya que el cuerpo recibe la acción; conviene marcarlo más claramente.
  - severity: medium
    issue: La nota al pie contiene 'imperishabilidad', que no es español estándar
    rationale: La alternativa inglesa 'imperishability' debe verterse al español como 'imperecibilidad'. La forma actual parece un anglicismo y reduce la calidad del texto.
  revised_spanish_text: 'Así también es la resurrección de los muertos: se siembra en corrupción[a]; es resucitado en incorrupción.'
  revised_footnotes:
  - marker: a
    text: O 'en perecibilidad ... en imperecibilidad'.
    reason: lexical_alternative
  revision_rationale: Se corrige el verbo de ἐγείρεται para expresar con mayor fidelidad el pasivo griego y la acción recibida en la resurrección, y se arregla la alternativa léxica de la nota al pie en español idiomático.
