translation:
  language: es
  text: 'Así también es la resurrección de los muertos: se siembra en corrupción[a]; es resucitado en incorrupción.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'en perecibilidad ... en imperecibilidad'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὕτως καὶ
  english_pob_choice: So also
  chosen_spanish: Así también
  alternatives_spanish:
  - De esta manera también
  - Así mismo también
  lexicon: BDAG
  rationale: Expresa con naturalidad la conexión comparativa e inferencial del contexto sin añadir explicación interpretativa. 'Así también' conserva la relación con la analogía previa.
- source_word: ἡ ἀνάστασις τῶν νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de los muertos
  - la resurrección desde los muertos
  lexicon: BDAG
  rationale: La construcción genitiva se vierte de forma directa y eclesiásticamente clara. 'De los muertos' mantiene mejor la sintaxis y el argumento paulino que una paráfrasis con 'desde'.
- source_word: σπείρεται
  english_pob_choice: it is sown
  chosen_spanish: se siembra
  alternatives_spanish:
  - es sembrado
  - se planta
  lexicon: BDAG
  rationale: La pasiva griega se reproduce con pasiva refleja natural en español. 'Se siembra' preserva la imagen agrícola y evita una forma más pesada o menos idiomática.
- source_word: ἐν φθορᾷ
  english_pob_choice: in corruption
  chosen_spanish: en corrupción
  alternatives_spanish:
  - en perecibilidad
  - en decadencia
  lexicon: BDAG
  rationale: '''Corrupción'' conserva el paralelismo formal con ''incorrupción'' y refleja la idea de corrupción/perishability sin restringirla a un solo matiz como ''decadencia''.'
- source_word: ἐγείρεται
  english_pob_choice: it is raised
  chosen_spanish: se resucita
  alternatives_spanish:
  - es levantado
  - se levanta
  lexicon: BDAG
  rationale: En este contexto de resurrección, 'resucitar' comunica con claridad el acto pasivo divino implícito. La pasiva refleja mantiene la idea de que el sujeto recibe la acción.
- source_word: ἐν ἀφθαρσίᾳ
  english_pob_choice: in incorruption
  chosen_spanish: en incorrupción
  alternatives_spanish:
  - en imperishabilidad
  - en incorruptibilidad
  lexicon: BDAG
  rationale: '''Incorrupción'' conserva el contraste léxico con ''corrupción'' y mantiene la correspondencia formal del par φθορά/ἀφθαρσία.'
theological_decisions:
- issue: Naturaleza corporal de la resurrección
  english_pob_reading: Retain bodily sowing/raising metaphor with passive verbs, without paraphrasing into a merely spiritual resurrection.
  chosen_spanish_reading: Mantener la metáfora de sembrar/resucitar con pasivas reflejas, sin convertirla en una paráfrasis espiritual o meramente moral.
  alternative_spanish_readings:
  - '''el cuerpo es enterrado... es levantado incorruptible'''
  - interpretar el contraste como principalmente ético
  rationale: El contexto de 1 Corintios 15 defiende la resurrección corporal mediante la analogía de la semilla. La traducción conserva la tensión entre continuidad y transformación corporal sin sustituirla por una explicación interpretativa.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
translation_notes:
  revision_awareness: El pasaje presenta alta concordancia con el audit trail inglés; no se requieren revisiones respecto del sentido base. Se mantiene la metáfora agrícola y el contraste léxico entre φθορά y ἀφθαρσία sin suavizar la tensión teológica.
  spanish_consistency_notes:
  - Se evitó 'Cristo' u otra terminología no presente en el versículo.
  - '''Incorrupción'' se usa de modo consistente como antónimo de ''corrupción''.'
  - La pasiva refleja ('se siembra', 'se resucita') conserva el valor pasivo del griego en un español natural y publicable.
