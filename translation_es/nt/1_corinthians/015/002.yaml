- from: por medio de él también ustedes están siendo salvos[a], si retienen[b] la palabra que les proclamé como buena noticia; de otro modo, habrían creído en vano.
  to: por medio de la cual también ustedes están siendo salvos[a], si retienen firmemente[b] la palabra que les proclamé como buena noticia, a menos que hayan creído en vano.
  rationale: 'Se corrigen dos problemas de fidelidad: el relativo instrumental δι’ οὗ y la cláusula de excepción ἐκτὸς εἰ μὴ εἰκῇ ἐπιστεύσατε. También se fortalece κατέχετε con ''firmemente'' para reflejar mejor el sentido contextual y la decisión del POB inglés, mientras se mantiene un español natural y de lectura eclesial amplia.'
