translation:
  language: es
  text: por medio de la cual también ustedes están siendo salvos[a], si retienen firmemente[b] la palabra que les proclamé como buena noticia, a menos que hayan creído en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'son salvos'. El presente pasivo griego puede entenderse como proceso en curso ('están siendo salvos') o, más generalmente, como estado presente ('son salvos').
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'si retienen en/con qué palabra les proclamé la buena noticia'. La frase griega es idiomática y se refiere al contenido o mensaje proclamado.
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ οὗ
  english_pob_choice: through which
  chosen_spanish: por medio de él
  alternatives_spanish:
  - por el cual
  - por medio del cual
  lexicon: διά + genitivo
  rationale: El antecedente inmediato es el evangelio anunciado en 1 Co 15:1; en español, ‘por medio de él’ expresa con naturalidad el medio/instrumento sin forzar una construcción relativa pesada. Se evita ‘por el cual’ porque en español puede sonar menos fluido para un referente discursivo como ‘el mensaje’.
- source_word: σῴζεσθε
  english_pob_choice: are being saved
  chosen_spanish: están siendo salvos
  alternatives_spanish:
  - son salvos
  - están siendo rescatados
  lexicon: σῴζω
  rationale: Se conserva el presente pasivo con sentido progresivo, reflejando la tensión aspectual del texto griego y la decisión inglesa de no aplanarla a un simple pasado o estado fijo. ‘Salvos’ funciona en español bíblico contemporáneo y mantiene el matiz de proceso.
- source_word: τίνι λόγῳ
  english_pob_choice: the word I proclaimed as good news to you
  chosen_spanish: la palabra que les proclamé como buena noticia
  alternatives_spanish:
  - la palabra que les anuncié como evangelio
  - el mensaje que les proclamé como buena noticia
  lexicon: λόγος
  rationale: Aunque el inglés osciló entre ‘message’ y luego volvió a ‘word’ para acercarse a λόγῳ, en español ‘palabra’ preserva mejor la correspondencia léxica sin perder inteligibilidad. Se mantiene el valor proclamativo de εὐηγγελισάμην con ‘como buena noticia’.
- source_word: εὐηγγελισάμην
  english_pob_choice: I proclaimed as good news
  chosen_spanish: les proclamé como buena noticia
  alternatives_spanish:
  - les anuncié el evangelio
  - les prediqué la buena noticia
  lexicon: εὐαγγελίζω
  rationale: La frase conserva el sentido de anunciar buenas noticias, evitando tanto el calco ‘evangelizar’ como el restringido ‘predicar’. ‘Proclamar como buena noticia’ refleja bien el énfasis verbal del griego.
- source_word: κατέχετε
  english_pob_choice: hold firmly to
  chosen_spanish: retienen
  alternatives_spanish:
  - se aferran a
  - mantienen firmemente
  lexicon: κατέχω
  rationale: El verbo puede expresar ‘retener’, ‘mantener’ o ‘sostener firmemente’. Aquí se eligió ‘retienen’ para un español sobrio y directo; la condición sigue siendo clara por el contexto y no añade interpretación sobre perseverancia más allá de lo que el texto dice.
- source_word: ἐκτὸς εἰ μὴ
  english_pob_choice: unless
  chosen_spanish: de otro modo
  alternatives_spanish:
  - a menos que
  - si no
  lexicon: ἐκτός + εἰ μή
  rationale: La construcción introduce una excepción. En español, ‘de otro modo’ comunica el sentido resultante de la cláusula sin hacer más pesado el período; se conserva la advertencia paulina de forma comprensible y natural.
- source_word: εἰκῇ
  english_pob_choice: in vain
  chosen_spanish: en vano
  alternatives_spanish:
  - sin resultado
  - sin motivo
  lexicon: εἰκῇ
  rationale: ‘En vano’ es el equivalente idiomático más directo y fiel, y conserva la fuerza paulina de inutilidad/futilidad del creer sin perseverar en el contenido recibido.
- source_word: ἐπιστεύσατε
  english_pob_choice: you believed
  chosen_spanish: habrían creído
  alternatives_spanish:
  - creyeron
  - llegaron a creer
  lexicon: πιστεύω
  rationale: El aoristo apunta al acto de creer en su recepción inicial del evangelio. En la estructura española, ‘habrían creído’ encaja mejor con la cláusula condicional negativa final y reproduce la advertencia implícita sin forzar la sintaxis.
theological_decisions:
- issue: Aspecto de la salvación en σῴζεσθε
  english_pob_reading: ongoing 'are being saved'
  chosen_spanish_reading: están siendo salvos
  alternative_spanish_readings:
  - son salvos
  - se están salvando
  rationale: La traducción mantiene el valor progresivo del presente pasivo, preservando la tensión paulina entre salvación recibida y salvación en curso. No se resuelve la cuestión doctrinal sobre el estado final del creyente; se deja abierta como en el griego y en el inglés auditado.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en vez de resolverla.'
- issue: Condición real en εἰ κατέχετε
  english_pob_reading: real condition 'if you hold firmly'
  chosen_spanish_reading: si retienen la palabra
  alternative_spanish_readings:
  - si se aferran a la palabra
  - si mantienen firmemente la palabra
  rationale: Se conserva la forma condicional sin convertirla en comentario doctrinal sobre perseverancia o falsa fe. El texto presenta una condición genuina; la traducción no debe explicarla más allá de lo que afirma.
  doctrine_reference: No imponer una lectura denominacional sobre la perseverancia; dejar la condición tal como está en el pasaje.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado del texto inglés, que mantiene el valor progresivo de σῴζεσθε y corrige λόγῳ hacia ‘word’. También conserva la advertencia final de εἰκῇ como una condición negativa de resultado vano, sin suavizarla teológicamente. Frente al inglés, se optó por ‘palabra’ para λόγῳ y por una clausula final en condicional compuesto (‘habrían creído’) para que el español fluya con naturalidad.
  spanish_consistency_notes:
  - Se emplea ‘salvos’ para σῴζω, consistente con el valor de salvación en proceso.
  - Se usa ‘palabra’ para λόγος conforme al ajuste revisado del audit trail inglés.
  - Se traduce εὐηγγελισάμην con un verbo de proclamación más ‘buena noticia’ para conservar el campo semántico de evangelio.
  - No se usa ‘SEÑOR’ ni terminología eclesiástica ajena al texto; el versículo no contiene el nombre divino explícito.
  - La estructura condicional final se ajusta al español para evitar una literalidad torpe, pero conserva la advertencia de ‘en vano’.
