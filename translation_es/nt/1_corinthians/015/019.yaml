translation:
  language: es
  text: Si hemos puesto nuestra esperanza en el Mesías para esta vida solamente[a][b][c], somos más dignos de lástima que todos los demás.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: «en Cristo». El griego Χριστός puede verterse «Mesías» o «Cristo»; aquí se prefiere «Mesías» para preservar el sentido titular.'
    reason: alternative_reading
  - marker: b
    text: 'También: «los más dignos de lástima entre todos». El comparativo griego puede expresarse idiomáticamente en español con sentido casi superlativo.'
    reason: lexical_alternative
  - marker: c
    text: 'También: «Si en esta vida solamente hemos puesto nuestra esperanza en el Mesías». Esta reordenación sigue una alternativa natural del griego sin cambiar el sentido.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: BDAG
  rationale: Introduce una condición real hipotética; «si» comunica con claridad la estructura condicional sin añadir matices ajenos.
- source_word: ἐν τῇ ζωῇ ταύτῃ
  english_pob_choice: in this life
  chosen_spanish: para esta vida
  alternatives_spanish:
  - en esta vida
  - durante esta vida
  lexicon: BDAG
  rationale: La idea es que la esperanza queda limitada a la presente vida; «para esta vida» evita la posible lectura espacial de «en» y mantiene el alcance restrictivo documentado en el auditoría inglesa.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Se conserva la preposición paulina «en» y se traduce Χριστός como «Mesías» según la norma del proyecto para preservar el valor titular; se evita «Cristo» como forma litúrgica fijada sin necesidad aquí.
- source_word: ἠλπικότες ἐσμὲν
  english_pob_choice: we have hoped
  chosen_spanish: hemos esperado
  alternatives_spanish:
  - hemos puesto nuestra esperanza
  - estamos esperando
  lexicon: BDAG
  rationale: El perfecto perifrástico expresa una esperanza ya asumida y vigente; «hemos esperado» es natural en español y mantiene el estado resultante hasta el presente.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: BDAG
  rationale: Modifica el alcance de la frase de esperanza respecto a esta vida; «solamente» reproduce con claridad la restricción.
- source_word: ἐλεεινότεροι
  english_pob_choice: more pitiable
  chosen_spanish: más dignos de lástima
  alternatives_spanish:
  - más compadecidos
  - más miserables
  lexicon: BDAG
  rationale: El comparativo griego indica que merecen mayor compasión/lástima; «más dignos de lástima» conserva el comparativo y el valor afectivo sin convertirlo en un superlativo ajeno al griego.
- source_word: πάντων ἀνθρώπων
  english_pob_choice: than all people
  chosen_spanish: que todos los seres humanos
  alternatives_spanish:
  - que todas las personas
  - que todos los hombres
  lexicon: BDAG
  rationale: ἄνθρωποι aquí es genérico; «seres humanos» mantiene la referencia universal y evita un masculino exclusivo.
theological_decisions:
- issue: Χριστός como título mesiánico en ἐν Χριστῷ
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El auditoría inglesa explica que Χριστός se mantiene como título y no como nombre fijo; en español, «Mesías» conserva mejor ese valor titular y respeta la política del proyecto. «Cristo» queda como alternativa reconocida, no como forma preferente.
  doctrine_reference: 'DOCTRINE.md: Contested terms; Translate titles; transliterate names'
- issue: Alcance de la afirmación paulina sobre la esperanza cristiana
  english_pob_reading: A conditional statement limited to hope confined to this life
  chosen_spanish_reading: Una condición limitada a la esperanza confinada a esta vida
  alternative_spanish_readings:
  - Una declaración absoluta sobre el destino final
  - Una paráfrasis doctrinal sobre la vida futura
  rationale: 'La traducción mantiene la fuerza retórica de Pablo sin ampliar el versículo a conclusiones doctrinales no explicitadas. Se conserva la tensión: si la esperanza quedara reducida a esta vida, la conclusión de Pablo sería de máxima lástima.'
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'La auditoría inglesa muestra una historia de ajustes menores: primero se aclaró el orden de la condición para evitar ambigüedad, y luego se restauró «Messiah» después de una revisión que había cambiado indebidamente el título. La presente versión sigue esa trayectoria: mantiene la restricción temporal, conserva Χριστός como título mesiánico y evita una formulación que suene a calco del inglés.'
  spanish_consistency_notes:
  - 'Se mantiene la terminología del proyecto: Χριστός → «Mesías» en el texto principal; ἄνθρωποι → «seres humanos» por su sentido genérico.'
  - Se conserva el comparativo griego con «más dignos de lástima», sin elevarlo a superlativo.
  - La secuencia de marcadores [a][b][c] aparece exactamente en el texto base, y cada nota correspondiente está anclada en el versículo.
