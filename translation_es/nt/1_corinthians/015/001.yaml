translation:
  language: es
  text: Ahora les doy a conocer, hermanos[a], el evangelio que les proclamé, el cual también recibieron, en el cual también están firmes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y a menudo usa la forma masculina para dirigirse a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: Γνωρίζω
  english_pob_choice: I make known
  chosen_spanish: les hago saber
  alternatives_spanish:
  - les informo
  - les declaro
  - les doy a conocer
  lexicon: BDAG
  rationale: El verbo griego expresa comunicar o hacer saber algo de manera explícita. En español, «les hago saber» conserva ese valor declarativo sin sonar forzado, y encaja con la transición discursiva de δέ como «Ahora».
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: δέ introduce un cambio suave de enfoque, no una oposición fuerte. «Ahora» funciona bien en español para marcar el giro retórico natural hacia la nueva afirmación.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  - congéneres en la fe
  lexicon: BDAG
  rationale: Se conserva la forma masculina del vocativo como en el griego, con el sentido inclusivo que suele tener en Pablo. En español, «hermanos» es la forma más fiel y natural; la alternativa inclusiva se mantiene solo como posibilidad lexical, no en el texto principal.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the good news
  chosen_spanish: el evangelio
  alternatives_spanish:
  - las buenas noticias
  - la buena noticia
  lexicon: BDAG
  rationale: Aunque el sentido básico es «buena noticia», en español bíblico «evangelio» es el término más transparente y establecido para este sustantivo. Aquí no conviene sustituirlo por una paráfrasis que pierda la resonancia terminológica del pasaje.
- source_word: εὐηγγελισάμην
  english_pob_choice: I proclaimed
  chosen_spanish: proclamé
  alternatives_spanish:
  - anuncié
  - les anuncié como buena noticia
  - prediqué
  lexicon: BDAG
  rationale: 'El verbo mantiene la relación semántica con εὐαγγέλιον: anunciar la buena noticia. «Proclamé» conserva esa conexión y evita reducirlo a un mero «prediqué», que en español puede sonar más eclesiástico que verbalmente preciso.'
- source_word: παρελάβετε
  english_pob_choice: you received
  chosen_spanish: recibieron
  alternatives_spanish:
  - aceptaron
  - tomaron
  - acogieron
  lexicon: BDAG
  rationale: En contexto de tradición apostólica, παραλαμβάνω significa recibir un mensaje o enseñanza transmitida. «Recibieron» es la opción más directa y amplia, sin añadir una matización subjetiva que el griego no exige.
- source_word: ἐν ᾧ
  english_pob_choice: in which
  chosen_spanish: en el cual
  alternatives_spanish:
  - en quien
  - por el cual
  - en lo cual
  lexicon: BDAG
  rationale: El relativo retoma el evangelio como esfera o base de permanencia. «En el cual» reproduce con claridad la relación espacial/metafórica del griego y funciona con naturalidad en español formal.
- source_word: ἑστήκατε
  english_pob_choice: you stand
  chosen_spanish: están firmes
  alternatives_spanish:
  - permanecen en pie
  - están de pie
  - se mantienen firmes
  lexicon: BDAG
  rationale: 'El perfecto de ἵστημι expresa un estado presente resultante: haber quedado en una posición estable. En español, «están firmes» transmite ese estado con mayor precisión idiomática que un simple «están parados», y preserva la fuerza de permanencia.'
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί en una dirección a toda la comunidad
  english_pob_reading: brothers in the main text, with an inclusivity footnote
  chosen_spanish_reading: hermanos en el texto principal, con nota de inclusión implícita
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos/as
  rationale: Se mantiene la forma gramatical masculina del vocativo como reflejo del griego, sin borrar el probable alcance comunitario del término. En español, una nota puede aclarar que el masculino funciona representativamente para toda la congregación, evitando una sustitución plana por una forma no marcada que el texto base no usa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés y no requiere cambios sustantivos. Se conservó la transición suave de δέ, el paralelismo entre εὐαγγέλιον / εὐηγγελισάμην, y el estado resultante de ἑστήκατε como «están firmes».
  spanish_consistency_notes:
  - Se mantiene «evangelio» como término técnico bíblico, en línea con el sentido base de εὐαγγέλιον y la tradición terminológica en español.
  - Se preserva el vocativo «hermanos» con nota inclusiva, siguiendo la política de no reemplazar la forma marcada del griego en el texto principal.
  - «Están firmes» comunica el estado presente derivado del perfecto griego, sin forzar una perífrasis más larga.
  - La puntuación separa con comas los miembros de la cláusula como en el flujo retórico del original.
