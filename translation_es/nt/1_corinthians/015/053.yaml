translation:
  language: es
  text: Porque es necesario que este cuerpo corruptible[a] se vista de incorrupción, y que este cuerpo mortal se vista de inmortalidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «que esto corruptible se vista de incorrupción, y que esto mortal se vista de inmortalidad». El griego no repite explícitamente la palabra «cuerpo» en este versículo, aunque el contexto hace claro el referente corporal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: es necesario
  alternatives_spanish:
  - debe
  - tiene que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad/obligación. En español, «es necesario» mantiene esa fuerza sin sonar demasiado coloquial; conserva el matiz de inevitabilidad del argumento de Pablo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce de manera natural la explicación respecto del versículo anterior. «Porque» funciona bien en español bíblico contemporáneo y conserva la conexión causal/explanatoria.
- source_word: τὸ φθαρτὸν τοῦτο
  english_pob_choice: this perishable body
  chosen_spanish: esto corruptible
  alternatives_spanish:
  - este cuerpo corruptible
  - esto perecedero
  - este ser corruptible
  lexicon: BDAG
  rationale: φθαρτός significa sujeto a corrupción, deterioro o perecimiento. Aquí se mantiene el neutro sustantivado como «esto corruptible», porque el griego no repite σώμα («cuerpo»); el contexto de la resurrección hace claro el referente corporal sin necesidad de añadir una palabra ausente en el verso.
- source_word: ἐνδύσασθαι
  english_pob_choice: put on
  chosen_spanish: se vista de
  alternatives_spanish:
  - se ponga
  - se cubra de
  - se revista de
  lexicon: BDAG
  rationale: Preserva la metáfora de vestirse. «Se vista de» suena natural en español y conserva la imagen de revestirse con una nueva condición.
- source_word: ἀφθαρσίαν
  english_pob_choice: imperishability
  chosen_spanish: incorrupción
  alternatives_spanish:
  - incorruptibilidad
  - imperishabilidad
  lexicon: BDAG
  rationale: ἀφθαρσία es el estado de no estar sujeto a corrupción o descomposición. «Incorrupción» mantiene el contraste léxico con φθαρτός y es una solución clara y bíblicamente reconocible en español.
- source_word: τὸ θνητὸν τοῦτο
  english_pob_choice: this mortal body
  chosen_spanish: esto mortal
  alternatives_spanish:
  - este cuerpo mortal
  - esto sujeto a muerte
  - este ser mortal
  lexicon: BDAG
  rationale: θνητός expresa aquello que está sujeto a muerte. Se conserva el neutro sustantivado como «esto mortal» para ser fiel al griego, ya que el texto no repite «cuerpo»; la referencia corporal queda asegurada por el contexto inmediato.
- source_word: ἀθανασίαν
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - no mortalidad
  - vida inmortal
  lexicon: BDAG
  rationale: Correspondencia directa y natural en español para el estado de no estar sujeto a muerte.
theological_decisions:
- issue: Si añadir «cuerpo» donde el griego usa adjetivos sustantivados neutros
  english_pob_reading: The Greek does not explicitly repeat the word 'body' in this verse, though the context makes the bodily referent clear.
  chosen_spanish_reading: No se añade «cuerpo» en el texto principal; se conserva el referente corporal implícito en el contexto.
  alternative_spanish_readings:
  - este cuerpo corruptible... este cuerpo mortal
  - este ser corruptible... este ser mortal
  rationale: La POB inglesa documenta que 'body' es una aclaración contextual, no una palabra del verso. En español, omitirla evita introducir un término no presente y respeta la forma del griego, mientras el contexto de 1 Corintios 15 mantiene inequívoco el sentido corporal.
  doctrine_reference: Translation philosophy §6; §1
- issue: Cómo reflejar el contraste escatológico entre corrupción e inmortalidad
  english_pob_reading: perishable ... imperishability; mortal ... immortality
  chosen_spanish_reading: corruptible ... incorrupción; mortal ... inmortalidad
  alternative_spanish_readings:
  - perecedero ... imperishabilidad
  - corruptible ... incorruptibilidad
  rationale: El par 'corruptible/incorrupción' reproduce con claridad el contraste léxico del griego φθαρτός/ἀφθαρσία. 'Mortal/inmortalidad' mantiene el segundo paralelismo sin suavizar la tensión entre muerte y vida definitiva.
  doctrine_reference: 1 Corintios 15:42-54; Translation philosophy §2
translation_notes:
  revision_awareness: Se revisó el precedente inglés y la última pasada indica que no hubo cambios. Esta versión española sigue de cerca la decisión auditada de no explicitar «body/cuerpo» en el texto principal, manteniendo la metáfora de vestirse y el paralelismo del griego.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el nombre divino.
  - «Corruptible/incorrupción» conserva mejor el contraste formal del griego que alternativas más explicativas.
  - La nota al pie marca únicamente la alternativa donde el inglés POB hizo explícita la posibilidad formal con omisión de 'body'.
