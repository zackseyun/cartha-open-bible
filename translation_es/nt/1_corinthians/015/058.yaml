translation:
  language: es
  text: Por tanto, mis amados hermanos[a], lleguen a ser firmes, inconmovibles, abundando siempre en la obra del Señor, sabiendo que su labor en el Señor no es en vano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el griego adelphoi, que puede referirse colectivamente a los creyentes del contexto, incluidas las mujeres, según el pasaje.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Por consiguiente
  lexicon: BDAG
  rationale: La conjunción inferencial introduce conclusión a partir del argumento anterior sobre la resurrección. «Así que» preserva bien esa fuerza conclusiva en español sin sonar rebuscado.
- source_word: ἀδελφοί μου ἀγαπητοί
  english_pob_choice: my beloved brothers
  chosen_spanish: mis hermanos amados
  alternatives_spanish:
  - mis amados hermanos
  - mis hermanos queridos
  lexicon: BDAG
  rationale: «Hermanos» conserva el valor representativo del masculino plural en el marco epistolar; «amados» rinde directamente ἀγαπητοί. Se evita una neutralización completa en el cuerpo, pero se mantiene la amplitud inclusiva mediante nota.
- source_word: ἑδραῖοι
  english_pob_choice: steadfast
  chosen_spanish: firmes
  alternatives_spanish:
  - constantes
  - estables
  lexicon: BDAG
  rationale: El término expresa estar sólidamente establecidos. «Firmes» es idiomático en español y mantiene la imagen de estabilidad doctrinal y práctica.
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: estén
  alternatives_spanish:
  - vuelvan a ser
  - lleguen a ser
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «become» para conservar fuerza verbal, en español «estén» con los adjetivos coordinados transmite la exhortación imperativa de estado continuo de manera natural y fiel al sentido exhortativo.
- source_word: ἀμετακίνητοι
  english_pob_choice: immovable
  chosen_spanish: inconmovibles
  alternatives_spanish:
  - inmóviles
  - inamovibles
  lexicon: BDAG
  rationale: El sentido es no ser desplazados de su posición. «Inconmovibles» comunica mejor la resistencia a ser sacudidos o desplazados en español eclesial contemporáneo.
- source_word: περισσεύοντες
  english_pob_choice: abounding
  chosen_spanish: abundando
  alternatives_spanish:
  - desbordando
  - sobresaliendo
  lexicon: BDAG
  rationale: El participio presente indica acción continua; «abundando» mantiene esa continuidad y la idea de plenitud sin añadir interpretación.
- source_word: ἐν τῷ ἔργῳ τοῦ κυρίου
  english_pob_choice: in the work of the Lord
  chosen_spanish: en la obra del Señor
  alternatives_spanish:
  - en el trabajo del Señor
  - en la labor del Señor
  lexicon: BDAG
  rationale: «Obra» refleja ἔργον en un sentido amplio y natural, sin restringirlo a una sola actividad ministerial. «Señor» sigue el valor de κύριος conforme al patrón doctrinal.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - en todo tiempo
  - constantemente
  lexicon: BDAG
  rationale: Adverbio directo y natural en español, equivalente pleno del adverbio griego.
- source_word: εἰδότες
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque saben
  - ya que saben
  lexicon: BDAG
  rationale: El participio perfecto funciona de modo circunstancial. «Sabiendo» conserva esa relación adverbial sin forzar una causalidad que el griego no explicita del todo.
- source_word: ὁ κόπος ὑμῶν
  english_pob_choice: your labor
  chosen_spanish: su labor
  alternatives_spanish:
  - su trabajo
  - su esfuerzo
  lexicon: BDAG
  rationale: «Labor» reproduce el peso de κόπος como esfuerzo fatigoso. Se usa «su» porque el posesivo plural de cortesía/registro común encaja bien con el español bíblico público y evita una secuencia demasiado literal «vuestra» menos natural en algunas regiones.
- source_word: οὐκ ἔστιν κενὸς
  english_pob_choice: is not in vain
  chosen_spanish: no es en vano
  alternatives_spanish:
  - no es inútil
  - no es vacío
  lexicon: BDAG
  rationale: La locución española estable «en vano» expresa con precisión el valor de κενός en este contexto de fruto y significado, conservando la fuerza proverbial paulina.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - unido al Señor
  - delante del Señor
  lexicon: BDAG
  rationale: La frase final califica la labor dentro de la esfera relacional y teológica del Señor. «En el Señor» preserva esa amplitud paulina sin estrecharla a una sola paráfrasis.
theological_decisions:
- issue: Referencia inclusiva de ἀδελφοί
  english_pob_reading: Rendered 'brothers' in the main text with inclusive force noted in a footnote.
  chosen_spanish_reading: «Hermanos» en el texto principal, con nota que explicita el alcance inclusivo según el contexto.
  alternative_spanish_readings:
  - «Hermanos y hermanas» en el texto principal
  rationale: El griego usa un masculino plural representativo, y el contexto epistolar incluye a toda la comunidad. La nota conserva la inclusividad sin sustituir la forma gramatical del original en el cuerpo del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Relación de la labor con ἐν κυρίῳ
  english_pob_reading: your labor in the Lord is not in vain
  chosen_spanish_reading: «su labor en el Señor no es en vano»
  alternative_spanish_readings:
  - «su labor no es en vano en el Señor»
  - «su labor, hecha en el Señor, no es en vano»
  rationale: La colocación más natural en español mantiene la calificación final como parte de la labor misma y conserva la fuerza paulina de pertenencia/esfera de acción. No se desarrolla más allá del texto.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Valor de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: Se mantiene el término doctrinal estándar «Señor», que en este contexto corresponde al uso cristológico paulino y evita reducir el campo semántico del término.
  doctrine_reference: DOCTRINE.md Contested terms table
translation_notes:
  revision_awareness: El contexto de revisión indica concordancia alta y sin cambios sustantivos en la versión inglesa auditada; por eso el borrador español sigue de cerca las decisiones léxicas establecidas, ajustando solo la naturalidad sintáctica propia del español.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en todo el versículo, en línea con el criterio doctrinal del proyecto.
  - 'Se conserva la cadencia exhortativa con tres rasgos coordinados: firmes, inconmovibles, abundando.'
  - Se evita traducir mecánicamente «become» con una fórmula forzada; en español la exhortación se expresa naturalmente con el subjuntivo exhortativo «estén».
  - '«Labor» y «obra» se distinguen: ἔργον como actividad amplia y κόπος como esfuerzo costoso.'
  - La nota inclusiva se ancla solo en «hermanos», sin duplicar en el cuerpo un desdoblamiento no presente en el griego.
