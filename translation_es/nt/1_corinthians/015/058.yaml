review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue de cerca la auditoría inglesa: conclusión inferencial, exhortación a firmeza, abundancia continua en la obra del Señor, y certeza de que la labor no es vana en el Señor. Sin embargo, «estén firmes» no preserva del todo la decisión documentada para γίνεσθε como ‘become’; en español conviene mantener un matiz ingresivo/exhortativo más claro. También «mis hermanos amados» es comprensible, pero «mis amados hermanos» suena más natural y conserva mejor la unidad de ἀδελφοί μου ἀγαπητοί.'
  spanish_quality_summary: 'El español es claro y eclesialmente natural. La puntuación y el registro funcionan bien. La principal mejora es hacer más fiel y más idiomática la exhortación verbal: «manténganse firmes» o «lleguen a ser firmes». Dado que el contexto parece exhortar a perseverar a la luz de la resurrección, «manténganse firmes» suena muy natural; pero para respetar la decisión auditada de γίνεσθε, «lleguen a ser firmes» preserva mejor el valor verbal. También se puede mejorar el orden adjetival a «mis amados hermanos».'
  glossary_alignment: No hay conflictos con el glosario del proyecto. κύριος como «Señor» es correcto aquí; no aplica la preferencia de «Yahvé». La nota sobre «hermanos» está bien alineada con la decisión doctrinal del POB sobre ἀδελφοί. «Labor», «obra», «en el Señor» y «en vano» también están alineados con la auditoría inglesa.
  issues:
  - severity: medium
    issue: γίνεσθε se tradujo «estén»
    rationale: La auditoría inglesa documenta explícitamente el valor de γίνομαι como ‘become’, no simple cópula. «Estén firmes» comunica exhortación, pero pierde parte de la fuerza verbal señalada en la evidencia y en la decisión léxica.
  - severity: low
    issue: Orden «mis hermanos amados»
    rationale: Es entendible y fiel, pero en español bíblico natural «mis amados hermanos» suele sonar más fluido y más cercano al énfasis afectivo del original sin cambiar el sentido.
  revised_spanish_text: Por tanto, mis amados hermanos[a], lleguen a ser firmes, inconmovibles, abundando siempre en la obra del Señor, sabiendo que su labor en el Señor no es en vano.
  revised_footnotes:
  - marker: a
    text: «Hermanos» traduce el griego adelphoi, que puede referirse colectivamente a los creyentes del contexto, incluidas las mujeres, según el pasaje.
    reason: lexical_alternative
  revision_rationale: Se ajusta la conjunción a «Por tanto» por su fuerza inferencial más directa y se cambia «estén» a «lleguen a ser» para preservar mejor el valor de γίνεσθε documentado en la auditoría inglesa. También se mejora la naturalidad de la frase vocativa con «mis amados hermanos». El resto del texto es fiel y claro, por lo que se conserva.
