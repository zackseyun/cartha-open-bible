revisions:
- from: Así que, mis hermanos amados[a], estén firmes, inconmovibles, abundando siempre en la obra del Señor, sabiendo que su labor en el Señor no es en vano.
  to: Por tanto, mis amados hermanos[a], lleguen a ser firmes, inconmovibles, abundando siempre en la obra del Señor, sabiendo que su labor en el Señor no es en vano.
  rationale: Se ajusta la conjunción a «Por tanto» por su fuerza inferencial más directa y se cambia «estén» a «lleguen a ser» para preservar mejor el valor de γίνεσθε documentado en la auditoría inglesa. También se mejora la naturalidad de la frase vocativa con «mis amados hermanos». El resto del texto es fiel y claro, por lo que se conserva.
