translation:
  language: es
  text: Y último de todos[a], como a uno nacido fuera de tiempo, se me apareció también a mí.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «como al aborto» o «como al que fue abortado». Pablo usa una metáfora dura y autodepreciativa.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔσχατον
  english_pob_choice: last of all
  chosen_spanish: último de todos
  alternatives_spanish:
  - al final de todos
  - por último
  lexicon: BDAG
  rationale: El acusativo neutro funciona adverbialmente y expresa secuencia temporal. «Último de todos» reproduce con naturalidad el valor de cierre en la lista de apariciones, sin perder el matiz de orden.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δὲ continúa la enumeración, no introduce una oposición fuerte. «Y» mantiene el flujo discursivo en español.
- source_word: πάντων
  english_pob_choice: of all
  chosen_spanish: de todos
  alternatives_spanish:
  - de ellos todos
  - de todos ellos
  lexicon: BDAG
  rationale: Con ἔσχατον forma una expresión idiomática. «De todos» preserva la referencia a los testigos previamente mencionados.
- source_word: ὡσπερεὶ
  english_pob_choice: as to
  chosen_spanish: como a
  alternatives_spanish:
  - como si a
  - cual
  lexicon: BDAG
  rationale: La partícula introduce una comparación aproximada. «Como a» conserva esa comparación sin forzar una construcción artificial en español.
- source_word: τῷ ἐκτρώματι
  english_pob_choice: to one untimely born
  chosen_spanish: a un abortivo
  alternatives_spanish:
  - a un aborto espontáneo
  - a uno nacido fuera de tiempo
  - a un nacido anormalmente
  lexicon: BDAG
  rationale: ἔκτρωμα es una metáfora fuerte y autodepreciativa, con sentido literal de aborto o feto expulsado prematuramente. «Abortivo» comunica en español esa brutalidad metafórica y la condición anómala, manteniendo la tensión léxica que el texto presenta.
- source_word: ὤφθη
  english_pob_choice: he appeared
  chosen_spanish: se me apareció
  alternatives_spanish:
  - fue visto por mí
  - apareció
  lexicon: BDAG
  rationale: En contextos de apariciones de resurrección, el pasivo de ὁράω suele expresarse como «aparecer». La forma pronominal española hace explícito el dativo κἀμοί y resulta idiomática.
- source_word: κἀμοί
  english_pob_choice: also to me
  chosen_spanish: también a mí
  alternatives_spanish:
  - a mí también
  - incluso a mí
  lexicon: BDAG
  rationale: La crasis añade a Pablo a la serie de testigos. «También a mí» conserva el valor aditivo y el orden natural del español.
theological_decisions:
- issue: Metáfora autodepreciativa de ἐκτρώματι
  english_pob_reading: Use the metaphor 'one untimely born' in the main text, with more literal alternatives footnoted.
  chosen_spanish_reading: Usar «abortivo» en el texto principal, sin suavizar el golpe retórico.
  alternative_spanish_readings:
  - «nacido fuera de tiempo»
  - «aborto»
  - «nacido anormalmente»
  rationale: El griego no pide una interpretación doctrinal adicional, pero sí preservar la aspereza de la autodescripción paulina. «Abortivo» mantiene la fuerza humillante y la rareza del término mejor que una paráfrasis eufemística.
  doctrine_reference: Translation philosophy §§3, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase del texto fuente: no hubo cambios aplicados y la concordancia del revisor fue alta (1.0). La redacción española intenta conservar la secuencia, la comparación aproximada y la aspereza léxica de ἐκτρώματι sin introducir explicaciones ajenas al versículo.'
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto solo cuando aplica; este versículo no contiene el Tetragrámaton.
  - Se eligió un español neutral y eclesial, evitando calcos innecesarios como «como a uno de aborto» y preservando la metáfora con una forma comprensible para lectores contemporáneos.
  - «Abortivo» se usa aquí por su fuerza semántica, no como término médico técnico; la nota conserva alternativas más literales para transparencia textual.
