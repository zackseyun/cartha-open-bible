revisions:
- from: Y último de todos[a], como a un abortivo, se me apareció también a mí.
  to: Y último de todos[a], como a uno nacido fuera de tiempo, se me apareció también a mí.
  rationale: 'Se revisa únicamente τῷ ἐκτρώματι para alinear el español con la decisión auditada del POB: una formulación principal legible en el texto y alternativas literales en nota. «Uno nacido fuera de tiempo» preserva la anomalía y la autohumillación sin introducir la torpeza semántica de «abortivo» en español.'
