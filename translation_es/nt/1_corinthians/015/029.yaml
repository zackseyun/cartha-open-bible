translation:
  language: es
  text: De otro modo[a], ¿qué harán los que son bautizados en favor de los muertos? Si de ningún modo los muertos resucitan, ¿por qué entonces son bautizados en favor de ellos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por los muertos», «a causa de los muertos» o, menos probable, «sobre los muertos». La preposición griega puede entenderse de más de una manera, y no se sabe con certeza a qué práctica exacta alude Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐπεὶ
  english_pob_choice: Otherwise
  chosen_spanish: De otro modo
  alternatives_spanish:
  - Entonces
  - De lo contrario
  lexicon: BDAG
  rationale: En este contexto argumentativo, ἐπεί introduce una inferencia a partir de la discusión anterior. «De otro modo» conserva el valor consecutivo sin volverlo demasiado rígido.
- source_word: τί ποιήσουσιν
  english_pob_choice: what will those do
  chosen_spanish: ¿qué harán?
  alternatives_spanish:
  - ¿qué harán esos?
  - ¿qué harán los tales?
  lexicon: BDAG
  rationale: ποιέω se mantiene en su sentido amplio de «hacer», evitando estrecharlo a «lograr» o «acometer». El sujeto se recupera naturalmente en español a partir del participio siguiente.
- source_word: οἱ βαπτιζόμενοι
  english_pob_choice: those who are being baptized
  chosen_spanish: los que se bautizan
  alternatives_spanish:
  - los que están siendo bautizados
  - los bautizados
  lexicon: BDAG
  rationale: El participio presente pasivo se vierte de manera progresiva. «Los que se bautizan» suena natural en español y conserva la idea de una práctica en curso, sin decidir la legitimidad de la práctica.
- source_word: ὑπὲρ τῶν νεκρῶν
  english_pob_choice: on behalf of the dead
  chosen_spanish: en favor de los muertos
  alternatives_spanish:
  - por los muertos
  - a causa de los muertos
  - sobre los muertos
  lexicon: BDAG
  rationale: ὑπέρ con genitivo admite varias relaciones. «En favor de» conserva con claridad la posible idea representativa sin resolver la frase de modo dogmático. «Muertos» mantiene el paralelismo con el griego y con el argumento de Pablo.
- source_word: εἰ ὅλως
  english_pob_choice: If the dead are not raised at all
  chosen_spanish: Si en realidad
  alternatives_spanish:
  - Si de verdad
  - Si absolutamente
  lexicon: BDAG
  rationale: ὅλως intensifica la condición. «En realidad» comunica esa fuerza enfática en español natural antes de la cláusula explícita sobre la resurrección.
- source_word: νεκροὶ οὐκ ἐγείρονται
  english_pob_choice: the dead are not raised
  chosen_spanish: los muertos no resucitan
  alternatives_spanish:
  - los muertos no son levantados
  - los muertos no se levantan
  lexicon: BDAG
  rationale: El pasivo ἐγείρονται se traduce con un verbo de resurrección natural en español. «Resucitan» es idiomático y mantiene la agencia divina implícita sin volverse artificial.
- source_word: τί καὶ
  english_pob_choice: why then
  chosen_spanish: ¿por qué entonces?
  alternatives_spanish:
  - ¿por qué también?
  - ¿qué también?
  lexicon: BDAG
  rationale: La secuencia interrogativa idiomática se expresa como «¿por qué entonces?», que transmite la fuerza argumentativa mejor que una traducción más literal.
- source_word: βαπτίζονται
  english_pob_choice: are they being baptized
  chosen_spanish: se bautizan
  alternatives_spanish:
  - están siendo bautizados
  - reciben el bautismo
  lexicon: BDAG
  rationale: Se conserva el valor progresivo del presente pasivo con una forma natural en español. La voz refleja la práctica en discusión sin añadir interpretación.
- source_word: ὑπὲρ αὐτῶν
  english_pob_choice: on their behalf
  chosen_spanish: en favor de ellos
  alternatives_spanish:
  - por ellos
  - a causa de ellos
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la primera aparición de ὑπέρ y la referencia a «los muertos», preservando la ambigüedad del sentido de la práctica.
theological_decisions:
- issue: Sentido de «bautizarse en favor de los muertos»
  english_pob_reading: 'Retain the phrase in a minimally interpretive form: ''being baptized on behalf of the dead,'' without endorsing any specific historical practice or theology.'
  chosen_spanish_reading: Mantener «bautizarse en favor de los muertos» de forma mínima e interpretativamente abierta, sin adjudicar una práctica histórica o una doctrina específica.
  alternative_spanish_readings:
  - bautizarse por los muertos
  - bautizarse a causa de los muertos
  - bautizarse sobre los muertos
  rationale: La frase es notoriamente difícil y admite varias lecturas. La traducción conserva la tensión textual y el uso retórico de Pablo en su argumento sobre la resurrección, en vez de resolverla con una explicación denominacional.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se registraron revisiones aplicadas en el audit trail más reciente; el consenso de revisión es alto y la traducción inglesa quedó sin cambios.
  spanish_consistency_notes:
  - Se usa «Yahvé» para el nombre divino cuando corresponda; en este versículo no aparece.
  - Se mantiene «muertos» para νεκροί por coherencia con el paralelo griego y con el argumento de resurrección.
  - Se evitó «Cristo» y otras terminologías no presentes en el versículo.
  - La puntuación y la interrogación siguen el uso estándar del español.
