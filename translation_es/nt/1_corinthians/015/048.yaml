translation:
  language: es
  text: Como es el hombre de polvo[a], así también son los de polvo; y como es el hombre celestial, así también son los que son celestiales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Tal como es el hombre de polvo, tales también son los de polvo; y tal como es el hombre celestial, tales también son los que son celestiales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οἷος ... τοιοῦτοι
  english_pob_choice: As is ... so also are ...
  chosen_spanish: Como es ... así también son ...
  alternatives_spanish:
  - Tal como es ... tal también son ...
  - Así como es ... así también son ...
  lexicon: BDAG
  rationale: La construcción correlativa griega expresa correspondencia entre un modelo y los que pertenecen a su misma clase. En español, «Como es ... así también son ...» conserva el paralelismo sin sonar forzado.
- source_word: χοϊκός
  english_pob_choice: of dust
  chosen_spanish: terrenal
  alternatives_spanish:
  - de polvo
  - hecho de polvo
  - polvoriento
  lexicon: BDAG
  rationale: El adjetivo remite a la condición derivada de la tierra/polvo y al trasfondo de Génesis en el contexto inmediato. «Terrenal» conserva la idea de pertenencia a la tierra sin introducir una expresión poco natural como «de polvo»; la nota mantiene la conexión conceptual con polvo/tierra.
- source_word: ὁ χοϊκός
  english_pob_choice: the man of dust
  chosen_spanish: el terrenal
  alternatives_spanish:
  - el hombre de polvo
  - el hombre terrenal
  - el de polvo
  lexicon: BDAG
  rationale: El singular es representativo y contrasta con el celestial en el marco de Adán y Cristo. En español, repetir «hombre» aquí resulta menos natural que un sustantivado adjetival; «el terrenal» preserva la referencia personal y la oposición lexical.
- source_word: οἱ χοϊκοί
  english_pob_choice: those of dust
  chosen_spanish: los terrenales
  alternatives_spanish:
  - los de polvo
  - los terrestres
  - los que son de polvo
  lexicon: BDAG
  rationale: El plural conserva el enlace léxico con χοϊκός y refiere a quienes comparten la condición del primer hombre. «Los terrenales» mantiene el paralelismo con el singular y evita sobreinterpretar con una frase más explicativa.
- source_word: ἐπουράνιος
  english_pob_choice: heavenly
  chosen_spanish: celestial
  alternatives_spanish:
  - de los cielos
  - heavenly
  lexicon: BDAG
  rationale: El adjetivo denota lo perteneciente al cielo. «Celestial» es un equivalente natural en español que mantiene la correspondencia adjetival con «terrenal» y preserva el contraste del texto.
- source_word: ὁ ἐπουράνιος
  english_pob_choice: the heavenly man
  chosen_spanish: el celestial
  alternatives_spanish:
  - el hombre celestial
  - el de los cielos
  - el celestial
  lexicon: BDAG
  rationale: El singular apunta al Cristo resucitado/exaltado en el contexto inmediato, pero el versículo lo presenta por su cualidad adjetival. «El celestial» conserva el paralelismo con «el terrenal» y mantiene la forma concisa del griego.
- source_word: οἱ ἐπουράνιοι
  english_pob_choice: those who are heavenly
  chosen_spanish: los celestiales
  alternatives_spanish:
  - los que son celestiales
  - los de los cielos
  - los celestiales
  lexicon: BDAG
  rationale: El plural se refiere a quienes comparten la condición del celestial, no a seres angélicos. «Los celestiales» conserva la fuerza adjetival y el paralelismo con «los terrenales»; en una nota se aclara que el referente es humano.
theological_decisions:
- issue: Si el contraste debe explicitarse como Adán/Cristo en español
  english_pob_reading: Use 'the man of dust' and 'the heavenly man'
  chosen_spanish_reading: Mantener el contraste representativo sin añadir nombres propios en el versículo
  alternative_spanish_readings:
  - el hombre de polvo / el hombre celestial
  - Adán / Cristo explícitos
  rationale: El contexto cercano ya establece el contraste Adán/Cristo, pero el versículo mismo usa adjetivos sustantivados y un paralelismo breve. La traducción española conserva esa sobriedad y deja que el contexto haga la identificación.
  doctrine_reference: DOCTRINE.md Translation philosophy §§3–4
- issue: Si οἱ ἐπουράνιοι alude a seres celestiales no humanos o a personas conformadas al celestial
  english_pob_reading: '''those who are heavenly'''
  chosen_spanish_reading: 'Referente humano: «los celestiales»'
  alternative_spanish_readings:
  - los seres celestiales
  - los del cielo
  rationale: En el contexto de 1 Corintios 15 Pablo habla de la resurrección corporal y de la conformidad con el hombre celestial. La traducción evita sugerir ángeles u otros seres, manteniendo el foco antropológico y escatológico.
  doctrine_reference: DOCTRINE.md Affirmations; Translation philosophy §1
translation_notes:
  revision_awareness: 'Coincide con la última revisión: no se requerían cambios respecto del estado auditado, y la redacción española conserva el paralelismo y las tensiones léxicas documentadas en el control de calidad.'
  spanish_consistency_notes:
  - Se usó «terrenal/celestial» para mantener un paralelismo adjetival natural en español y una correspondencia consistente con χοϊκός/ἐπουράνιος.
  - No se introdujo «SEÑOR» ni otros sustitutos teológicos ajenos al versículo; el texto no contiene el nombre divino.
  - Se evitó «Cristo» en el texto principal porque el griego no lo expresa aquí y el contexto inmediato basta para la identificación.
  - La nota a preserva la alternativa más formal documentada en el audit trail inglés sin sobrecargar el texto principal.
