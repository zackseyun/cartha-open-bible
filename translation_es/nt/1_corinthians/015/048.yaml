review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja correctamente la estructura correlativa de οἷος ... τοιοῦτοι y mantiene el paralelismo entre los singulares representativos y los plurales correspondientes. Sin embargo, sustituye χοϊκός por «terrenal», lo cual atenúa la alusión explícita al polvo presente en el griego y preservada por el English POB como decisión léxica principal. Además, omite el suministro contextual de «hombre» que el English POB documentó para aclarar el contraste Adán/Cristo en este contexto inmediato.
  spanish_quality_summary: El español es fluido y legible, pero «los celestiales» suena algo poco natural y potencialmente ambiguo en español eclesial, donde puede sugerir seres celestiales. «Los que son celestiales» o una formulación equivalente evita esa ambigüedad. Asimismo, «el hombre de polvo / el hombre celestial» suena natural y conserva mejor la fuerza representativa del contexto.
  glossary_alignment: No hay conflicto con los términos globales principales del proyecto, pero la decisión «terrenal» para χοϊκός se aparta innecesariamente de la racionalidad léxica auditada («of dust» = «de polvo»). «Celestial» para ἐπουράνιος es aceptable en español; conviene, no obstante, explicitar el referente humano en el plural.
  issues:
  - severity: high
    issue: χοϊκός se tradujo como «terrenal» en vez de «de polvo»
    rationale: El griego y la auditoría inglesa subrayan la relación con el polvo de Génesis y con v. 47. «Terrenal» comunica solo una idea general de earthly y debilita la alusión textual principal.
  - severity: medium
    issue: Se omitió «hombre» en los singulares representativos
    rationale: Aunque el griego usa adjetivos sustantivados, el English POB documentó que añadir «man» era importante para claridad contextual en vv. 45–49. En español, «el hombre de polvo ... el hombre celestial» es natural y conserva mejor el contraste representativo.
  - severity: medium
    issue: «Los celestiales» puede sonar ambiguo o poco idiomático
    rationale: En español puede sugerir seres celestes/angélicos. Una forma como «los que son celestiales» preserva la fuerza adjetival y aclara que se trata de personas humanas conformadas al hombre celestial.
  revised_spanish_text: Como es el hombre de polvo[a], así también son los de polvo; y como es el hombre celestial, así también son los que son celestiales.
  revised_footnotes:
  - marker: a
    text: 'O, más formalmente: «Tal como es el hombre de polvo, tales también son los de polvo; y tal como es el hombre celestial, tales también son los que son celestiales».'
    reason: lexical_alternative
  revision_rationale: La revisión restituye la referencia léxica central al «polvo» de χοϊκός, en línea con el griego y la auditoría inglesa, y añade «hombre» en ambos singulares para mantener explícito el contraste representativo Adán/Cristo que el contexto exige. También ajusta el plural final a «los que son celestiales» para evitar ambigüedad en español sin perder el paralelismo del original.
