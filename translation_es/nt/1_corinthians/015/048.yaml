revisions:
- from: Como es el terrenal[a], así también son los terrenales; y como es el celestial, así también son los celestiales.
  to: Como es el hombre de polvo[a], así también son los de polvo; y como es el hombre celestial, así también son los que son celestiales.
  rationale: La revisión restituye la referencia léxica central al «polvo» de χοϊκός, en línea con el griego y la auditoría inglesa, y añade «hombre» en ambos singulares para mantener explícito el contraste representativo Adán/Cristo que el contexto exige. También ajusta el plural final a «los que son celestiales» para evitar ambigüedad en español sin perder el paralelismo del original.
