translation:
  language: es
  text: 'He aquí[a], les digo un misterio: no todos dormiremos, pero todos seremos transformados[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más interpretativamente: ''no todos moriremos''. El griego dice ''dormiremos'', una metáfora común del Nuevo Testamento para la muerte a la luz de la resurrección.'
    reason: lexical_alternative
  - marker: b
    text: 'Una variante textual notable lee, en efecto: ''todos dormiremos, pero no todos seremos transformados''. El texto principal sigue la lectura de SBLGNT.'
    reason: textual_variant
lexical_decisions:
- source_word: ἰδοὺ
  english_pob_choice: Behold
  chosen_spanish: Miren
  alternatives_spanish:
  - Véanlo
  - Vean
  lexicon: BDAG
  rationale: El marcador de atención se expresa mejor en español con una forma imperativa breve y solemne. 'Miren' conserva la fuerza exhortativa de 'Behold' sin sonar arcaico o mecánico.
- source_word: μυστήριον
  english_pob_choice: mystery
  chosen_spanish: misterio
  alternatives_spanish:
  - secreto
  lexicon: BDAG
  rationale: En el uso paulino, el término designa una verdad divina revelada, no algo meramente enigmático. 'Misterio' preserva ese sentido teológico establecido en español bíblico y evita reducirlo a 'secreto'.
- source_word: ὑμῖν λέγω
  english_pob_choice: I tell you
  chosen_spanish: les digo
  alternatives_spanish:
  - les hablo
  - les anuncio
  lexicon: BDAG
  rationale: '''Les digo'' mantiene el valor directo de la declaración y su naturalidad en español. ''Les anuncio'' intensifica el matiz proclamativo, pero el griego aquí no exige ese refuerzo.'
- source_word: πάντες οὐ κοιμηθησόμεθα
  english_pob_choice: we will not all sleep
  chosen_spanish: no todos dormiremos
  alternatives_spanish:
  - no todos moriremos
  - no todos nos dormiremos
  lexicon: BDAG
  rationale: Se conserva la metáfora de 'dormir' para la muerte, tal como hace la POB inglesa, porque es el giro paulino ligado a la resurrección. 'Moriremos' interpreta la metáfora; se deja como alternativa por claridad, pero no como texto principal.
- source_word: πάντες δὲ ἀλλαγησόμεθα
  english_pob_choice: but we will all be changed
  chosen_spanish: pero todos seremos transformados
  alternatives_spanish:
  - y todos seremos transformados
  - pero todos cambiaremos
  lexicon: BDAG
  rationale: '''Seremos transformados'' expresa con precisión la pasiva futura de ἀλλάσσω en contexto escatológico. ''Transformados'' comunica mejor el cambio recibido que un simple ''cambiados'', y ''pero'' preserva el contraste marcado por δέ.'
theological_decisions:
- issue: Metáfora de 'sleep' en contexto de resurrección
  english_pob_reading: '''sleep'' is retained as a metaphor for physical death prior to resurrection'
  chosen_spanish_reading: '''dormiremos'' mantiene la metáfora de la muerte física antes de la resurrección'
  alternative_spanish_readings:
  - '''moriremos'' como traducción interpretativa'
  rationale: La metáfora paulina se conserva para no perder la resonancia con el lenguaje de la resurrección. El contexto hace claro que no se propone una doctrina de 'sueño del alma', sino la muerte vista desde la futura resurrección.
  doctrine_reference: 'Translation philosophy: preserve source-language sense and theological tension without over-resolving.'
- issue: Variante textual en el final del versículo
  english_pob_reading: Main text follows the SBLGNT reading, 'we will not all sleep, but we will all be changed'
  chosen_spanish_reading: 'El texto principal sigue la lectura de SBLGNT: ''no todos dormiremos, pero todos seremos transformados'''
  alternative_spanish_readings:
  - '''todos dormiremos, pero no todos seremos transformados'''
  rationale: La lectura base de SBLGNT se traduce de forma directa, y la variante importante se preserva en nota. Así se mantiene la primacía del texto fuente sin ocultar la tensión textual.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve alternatives in footnotes where significant.'
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requirieron cambios después del último pase, y la versión base fue confirmada como de alta concordancia.'
  spanish_consistency_notes:
  - Se mantiene el uso de 'Yahvé' para el nombre divino en este proyecto; no aplica en este versículo.
  - Se conserva 'misterio' para μυστήριον en continuidad con el uso paulino y con la terminología teológica del proyecto.
  - Se traduce la pasiva futura ἀλλαγησόμεθα con 'seremos transformados' para expresar el cambio escatológico recibido, no auto-producido.
  - Se preserva la metáfora de 'dormir' para κοιμηθησόμεθα porque la POB inglesa también conservó 'sleep' y porque el contexto resurreccional requiere no resolverla de forma demasiado explicativa.
