translation:
  language: es
  text: 'Ahora digo esto[a], hermanos: la carne y la sangre no pueden heredar el reino de Dios[b], ni lo perecedero hereda lo imperecedero.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede dirigirse de manera inclusiva a toda la congregación.
    reason: lexical_alternative
  - marker: b
    text: «La carne y la sangre» es un modismo para la vida humana mortal en su condición presente; no niega la resurrección corporal.
    reason: cultural_note
lexical_decisions:
- source_word: Τοῦτο δέ φημι
  english_pob_choice: Now I say this
  chosen_spanish: Ahora digo esto
  alternatives_spanish:
  - Pero digo esto
  - Esto es lo que quiero decir
  lexicon: BDAG
  rationale: «Ahora» reproduce de manera natural el valor discursivo de δέ como transición, y «digo esto» conserva el tono directo de φημι sin añadir interpretación innecesaria.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: BDAG
  rationale: Se mantiene el plural masculino como forma textual directa, con sentido congregacional inclusivo en contexto paulino, sin reemplazarlo en el texto principal por una expansión interpretativa.
- source_word: σὰρξ καὶ αἷμα
  english_pob_choice: flesh and blood
  chosen_spanish: la carne y la sangre
  alternatives_spanish:
  - seres humanos mortales
  - humanidad mortal
  lexicon: BDAG
  rationale: La expresión se conserva de forma idiomática en español con equivalencia transparente. En este contexto no se la suaviza a una paráfrasis, para no perder el contraste retórico con lo incorruptible.
- source_word: βασιλείαν θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  lexicon: BDAG
  rationale: Es la correspondencia natural y estable en español para βασιλείαν θεοῦ, manteniendo el valor teológico del genitivo.
- source_word: κληρονομῆσαι
  english_pob_choice: inherit
  chosen_spanish: heredar
  alternatives_spanish:
  - recibir como herencia
  - tomar posesión de
  lexicon: BDAG
  rationale: «Heredar» es el equivalente normal en español y preserva el matiz hereditaria/escatológica del verbo sin expandirlo.
- source_word: ἡ φθορὰ
  english_pob_choice: the perishable
  chosen_spanish: lo perecedero
  alternatives_spanish:
  - lo corruptible
  - la corrupción
  - lo que está sujeto a corrupción
  lexicon: BDAG
  rationale: Se opta por un sustantivo abstracto sustantivado en español que reproduce el contraste con ἀφθαρσία y evita que «corrupción» sugiera un matiz moral ajeno al contexto inmediato.
- source_word: τὴν ἀφθαρσίαν
  english_pob_choice: the imperishable
  chosen_spanish: lo imperecedero
  alternatives_spanish:
  - lo incorruptible
  - la incorrupción
  lexicon: BDAG
  rationale: «Lo imperecedero» mantiene el paralelismo con «lo perecedero» y expresa de forma clara la oposición semántica de ἀφθαρσία en el argumento de resurrección.
- source_word: οὐ δύναται
  english_pob_choice: cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no es capaz de
  - no tiene capacidad para
  lexicon: BDAG
  rationale: Se traduce con plural en concordancia con el sujeto compuesto «la carne y la sangre», reflejando la incapacidad afirmada por Pablo.
- source_word: κληρονομεῖ
  english_pob_choice: inherit
  chosen_spanish: hereda
  alternatives_spanish:
  - recibe como herencia
  - obtiene en herencia
  lexicon: BDAG
  rationale: 'Se mantiene la repetición verbal del argumento: el verbo aparece dos veces y conviene conservar esa reiteración en español para el paralelismo retórico.'
theological_decisions:
- issue: Sentido de «carne y sangre» en relación con la resurrección
  english_pob_reading: An idiom for mortal, corruptible human existence in its present state, not a denial of embodied resurrection.
  chosen_spanish_reading: Un modismo para la existencia humana mortal y perecedera en su estado presente, no una negación de la resurrección corporal.
  alternative_spanish_readings:
  - Una afirmación de que la materialidad física en sí no puede entrar en el reino de Dios
  rationale: El contexto inmediato contrasta lo perecedero con lo imperecedero; por tanto, la frase no debe leerse como rechazo del cuerpo, sino como descripción de la condición humana actual antes de la transformación escatológica.
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Alcance de ἀδελφοί
  english_pob_reading: Retain 'brothers' in the main text with inclusive sense noted in a footnote.
  chosen_spanish_reading: Retener «hermanos» en el texto principal, con posible sentido inclusivo indicado en nota.
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se conserva la forma masculina plural del original y se deja constancia de su posible referencia inclusiva para no borrar la huella textual ni introducir una expansión no exigida por el griego.
  doctrine_reference: Translation philosophy §4
- issue: Contraste μεταξύ φθορά / ἀφθαρσία
  english_pob_reading: the perishable / the imperishable
  chosen_spanish_reading: lo perecedero / lo imperecedero
  alternative_spanish_readings:
  - lo corruptible / lo incorruptible
  - la corrupción / la incorrupción
  rationale: El par elegido preserva la oposición conceptual y estilística del pasaje. «Perecedero/imperecedero» comunica con claridad el estado y la cualidad opuesta sin cargar el texto con un matiz moral que no es el principal aquí.
  doctrine_reference: 1 Corintios 15; Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue de cerca el griego SBLGNT y coincide con la decisión auditada en inglés de conservar el modismo «carne y sangre», el término de parentesco masculino plural y el contraste «perecedero/imperecedero». No se adoptaron cambios posteriores en el registro inglés porque el pase más reciente quedó sin modificaciones.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεοῦ en continuidad con el estándar del proyecto.
  - Se conserva el paralelismo verbal «heredar / hereda» para reflejar la repetición de κληρονομέω.
  - La nota sobre «hermanos» conserva la alternativa inclusiva sin trasladarla al texto principal.
  - «Lo perecedero / lo imperecedero» evita una lectura moralizante de φθορά y ἀφθαρσία.
