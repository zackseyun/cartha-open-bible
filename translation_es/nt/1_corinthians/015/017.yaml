lexical_decisions:
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El griego usa Χριστός como título, no solo como nombre propio. En español, 'Mesías' conserva mejor ese valor titular y sigue el default del proyecto para Χριστός.
- source_word: ἐγήγερται
  english_pob_choice: has not been raised
  chosen_spanish: no ha sido resucitado
  alternatives_spanish:
  - no ha sido levantado
  - no ha resucitado
  lexicon: BDAG
  rationale: El perfecto pasivo requiere una forma que mantenga el resultado presente de la acción. 'No ha sido resucitado' preserva la voz pasiva implícita del griego y evita volverlo activo sin base explícita.
- source_word: ματαία
  english_pob_choice: futile
  chosen_spanish: inútil
  alternatives_spanish:
  - vana
  - vacía
  - sin sentido
  lexicon: BDAG
  rationale: '''Inútil'' comunica bien la idea de algo sin efecto o sin resultado en español actual. ''Vana'' es posible, pero suena más literaria y menos directa para este contexto argumentativo.'
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: Aquí πίστις se refiere a la respuesta creyente de los corintios. 'Fe' es la correspondencia natural y más transparente en español.
- source_word: ἔτι
  english_pob_choice: still
  chosen_spanish: todavía
  alternatives_spanish:
  - aún
  - todavía siguen
  lexicon: BDAG
  rationale: '''Todavía'' expresa continuidad de estado de manera natural en español y reproduce bien la fuerza aspectual de ἔτι.'
- source_word: ἐν ταῖς ἁμαρτίαις ὑμῶν
  english_pob_choice: in your sins
  chosen_spanish: en sus pecados
  alternatives_spanish:
  - bajo sus pecados
  - en la esfera de sus pecados
  lexicon: BDAG
  rationale: Se mantiene la construcción preposicional simple, que en español es clara y fiel. 'En sus pecados' conserva el sentido de permanecer en la condición de pecado y su culpa/poder.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: El valor adversativo de δὲ en este argumento se expresa mejor con 'Pero' al inicio de la cláusula.
theological_decisions:
- issue: Título mesiánico de Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La POB inglesa documenta Χριστός como título. En español, 'Mesías' mantiene esa lectura teológica y evita convertirlo en un mero nombre tradicional.
  doctrine_reference: 'Contested terms table: Χριστός → Messiah (where title; Christ where name-like)'
- issue: Pasiva divina en la resurrección
  english_pob_reading: has not been raised
  chosen_spanish_reading: no ha sido resucitado
  alternative_spanish_readings:
  - no ha resucitado
  rationale: La pasiva conserva la forma del griego y deja implícita la agencia divina sin introducirla de modo explícito. Es una decisión translacional, no una expansión doctrinal.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve the Greek voice and aspect as far as Spanish allows.'
translation_notes:
  revision_awareness: Se tuvo en cuenta la oscilación del audit trail entre 'the Messiah' y 'Christ', con restauración final de 'Messiah' por fidelidad a la política del proyecto. Para el español, se mantuvo 'Mesías' por coherencia con el valor titular del griego y con la terminología por defecto del proyecto.
  spanish_consistency_notes:
  - Se preservó el tratamiento titular de Χριστός como 'Mesías' en vez de 'Cristo'.
  - Se evitó suavizar la pasiva de ἐγήγερται con una forma activa.
  - '''Fe'' se mantiene para πίστις por claridad y consistencia bíblica.'
  - '''Pecados'' conserva el plural del griego y la referencia a la condición moral/jurídica indicada por ἁμαρτίαις.'
