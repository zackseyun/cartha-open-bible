revisions:
- from: Pero si el Mesías[a] no ha sido resucitado, su fe es inútil[b]; todavía están en sus pecados.
  to: Pero si el Mesías[a] no ha sido levantado, la fe de ustedes es inútil[b]; todavía están en sus pecados.
  rationale: 'Se ajusta el español para mayor naturalidad y precisión sin cambiar el sentido: ''la fe de ustedes'' explicita el posesivo plural, y ''no ha sido levantado'' conserva la pasiva de ἐγήγερται de manera más idiomática en español bíblico contemporáneo que ''ha sido resucitado''.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:27Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido básico del griego: condición contrafactual, título mesiánico, resultado presente de ἐγήγερται, inutilidad de la fe y permanencia en los pecados. Sin embargo, ''ha sido resucitado'' suena menos idiomático en español para este contexto paulino que ''ha sido levantado'', y el posesivo ''su fe'' puede leerse ambiguamente en español más fácilmente que ''la fe de ustedes''.'
  spanish_quality_summary: El texto es claro y digno, pero puede mejorarse en naturalidad y precisión referencial. 'Su fe' en registro eclesial amplio puede sonar algo distante o ambiguo; 'la fe de ustedes' evita posible confusión. 'Resucitado' en pasiva es comprensible, pero en español bíblico natural la pasiva de ἐγείρω suele sonar mejor como 'levantado' cuando se quiere conservar la voz pasiva documentada por la POB.
  glossary_alignment: '''el Mesías'' está bien alineado con la política del proyecto para Χριστός como título. ''fe'' para πίστις y ''pecados'' para ἁμαρτίαις están bien. La decisión sobre ἐγήγερται debe conservar la pasiva; se recomienda ''ha sido levantado'' como mejor ajuste español a esa prioridad. La nota ''Cristo'' como alternativa es adecuada, y ''vana'' como alternativa léxica para ματαία también.'
  issues:
  - severity: medium
    issue: '''su fe'' puede resultar ambiguo o menos directo'
    rationale: Aunque gramaticalmente posible, en español neutral 'su' puede referirse a tercera persona no presente o sonar menos inmediato. 'La fe de ustedes' refleja mejor ὑμῶν y evita ambigüedad.
  - severity: medium
    issue: '''no ha sido resucitado'' es correcto pero menos natural que ''no ha sido levantado'' para conservar la pasiva'
    rationale: La POB inglesa prioriza la pasiva de ἐγήγερται. En español, 'resucitar' en pasiva suena más pesado; 'levantar' preserva mejor la forma verbal subyacente y el matiz de pasiva divina sin perder inteligibilidad.
  revised_spanish_text: Pero si el Mesías[a] no ha sido levantado, la fe de ustedes es inútil[b]; todavía están en sus pecados.
  revised_footnotes:
  - marker: a
    text: O, 'Cristo'.
    reason: alternative_reading
  - marker: b
    text: O, 'vana'.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta el español para mayor naturalidad y precisión sin cambiar el sentido: ''la fe de ustedes'' explicita el posesivo plural, y ''no ha sido levantado'' conserva la pasiva de ἐγήγερται de manera más idiomática en español bíblico contemporáneo que ''ha sido resucitado''.'
