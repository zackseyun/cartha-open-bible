translation:
  language: es
  text: Pero si el Mesías[a] no ha sido levantado, la fe de ustedes es inútil[b]; todavía están en sus pecados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, 'Cristo'.
    reason: alternative_reading
  - marker: b
