translation:
  language: es
  text: Entonces viene el fin[a], cuando entrega el reino a Dios el Padre[b], cuando anula[c] todo dominio, toda autoridad y poder.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la consumación». τέλος puede significar «fin», «meta» o «consumación».
    reason: lexical_alternative
  - marker: b
    text: O «cuando entrega el reino a Dios y Padre».
    reason: lexical_alternative
  - marker: c
    text: O «deja sin efecto»; o «reduce a nada» todo dominio, toda autoridad y poder.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἶτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Marca la siguiente etapa en la secuencia escatológica de Pablo. «Entonces» es natural en español y conserva la progresión temporal sin añadir matices no presentes en el griego.
- source_word: τὸ τέλος
  english_pob_choice: the end
  chosen_spanish: el fin
  alternatives_spanish:
  - la consumación
  - la meta
  lexicon: BDAG
  rationale: τέλος puede significar fin, meta o consumación. Aquí el sentido temporal directo es el más evidente; «el fin» reproduce bien ese valor sin interpretarlo de más.
- source_word: ὅταν παραδιδῷ
  english_pob_choice: when he hands over
  chosen_spanish: cuando entrega
  alternatives_spanish:
  - cuando entrega en manos
  - cuando cede
  lexicon: BDAG
  rationale: El presente subjuntivo con ὅταν señala una acción futura contingente. «Entrega» comunica de forma natural la transferencia del reino; el sujeto queda claro por el contexto, como en la línea inglesa.
- source_word: τὴν βασιλείαν
  english_pob_choice: the kingdom
  chosen_spanish: el reino
  alternatives_spanish:
  - el reinado
  - la realeza
  lexicon: BDAG
  rationale: βασιλεία puede aludir al reino o al reinado. «El reino» es la opción más natural en español y mantiene la imagen de entregar una esfera real de gobierno.
- source_word: τῷ θεῷ καὶ πατρί
  english_pob_choice: to God the Father
  chosen_spanish: a Dios el Padre
  alternatives_spanish:
  - a Dios y Padre
  - a Dios, el Padre
  lexicon: BDAG
  rationale: 'La construcción puede entenderse appositivamente: Dios, es decir, el Padre. «A Dios el Padre» comunica con claridad esa relación sin obligar al lector español a una forma torpe o ambigua.'
- source_word: ὅταν καταργήσῃ
  english_pob_choice: when he abolishes
  chosen_spanish: cuando abole
  alternatives_spanish:
  - cuando anula
  - cuando deja sin efecto
  - cuando destruye
  lexicon: BDAG
  rationale: καταργέω significa hacer inoperante, abolir o anular. «Abole» conserva la fuerza decisiva del verbo sin requerir la idea de aniquilación total, que el contexto no exige.
- source_word: πᾶσαν ἀρχὴν
  english_pob_choice: every rule
  chosen_spanish: todo principado
  alternatives_spanish:
  - toda regla
  - todo poder gobernante
  lexicon: BDAG
  rationale: En esta tríada de poderes hostiles, ἀρχή puede referirse a potestad o principado, especialmente a un poder gobernante. «Todo principado» preserva el carácter técnico/tradicional del término y sugiere una realidad de dominio, no simplemente una norma abstracta.
- source_word: πᾶσαν ἐξουσίαν
  english_pob_choice: every authority
  chosen_spanish: toda autoridad
  alternatives_spanish:
  - todo dominio
  - toda jurisdicción
  lexicon: BDAG
  rationale: ἐξουσία denota autoridad ejercida o delegada. «Toda autoridad» es la equivalencia más clara y directa en español.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - mecanismo
  lexicon: BDAG
  rationale: δύναμις forma parte de una tríada de poderes opuestos. «Poder» es la correspondencia más idiomática y amplia en español.
theological_decisions:
- issue: Relación entre «Dios» y «Padre» en τῷ θεῷ καὶ πατρί
  english_pob_reading: 'Appositional: ''God the Father'''
  chosen_spanish_reading: 'Apposicional: «Dios el Padre»'
  alternative_spanish_readings:
  - 'Coordinado: «a Dios y Padre»'
  - 'Literal: «a el Dios y Padre»'
  rationale: El griego puede leerse de manera más literal, pero en el contexto Pablo habla del Padre como aquel a quien el Hijo entrega el reino. «Dios el Padre» mantiene la claridad teológica y evita una formulación extraña en español.
  doctrine_reference: 'Credo Niceno (381): confesión de la plena deidad del Hijo y distinción personal del Padre'
- issue: Fuerza de καταργήσῃ respecto de los poderes hostiles
  english_pob_reading: Decisive abolition/nullification rather than necessarily annihilation
  chosen_spanish_reading: Abolición decisiva / anulación operativa, no necesariamente aniquilación
  alternative_spanish_readings:
  - destruir en sentido de aniquilar
  - dejar sin efecto
  rationale: El verbo apunta a poner fin a la কার্যualidad o vigencia de todo poder contrario. «Abole» conserva esa fuerza sin resolver especulativamente el destino metafísico de esas potestades.
  doctrine_reference: 'Principio traductológico POB: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que prefirió 'every rule' frente a 'every ruler' para ἀρχή. En español se refleja como «todo principado», manteniendo la idea de dominio/potestad y la coherencia con «autoridad» y «poder».
  spanish_consistency_notes:
  - Se mantiene «Dios» y no se reemplaza por «Señor», conforme al estándar del proyecto.
  - «Mesías/Cristo» no aparece en este versículo; no aplica decisión terminológica adicional.
  - 'Se conservan las tres realidades hostiles en forma paralela: principado, autoridad y poder, sin fusionarlas.'
  - La omisión explícita del sujeto en «cuando entrega» es natural en español y sigue la elipsis del griego contextual.
