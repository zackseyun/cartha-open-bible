revisions:
- from: Entonces viene el fin[a], cuando entrega[b] el reino a Dios el Padre, cuando abole[c] todo principado, toda autoridad y poder.
  to: Entonces viene el fin[a], cuando entrega el reino a Dios el Padre[b], cuando anula[c] todo dominio, toda autoridad y poder.
  rationale: Se ajustó «todo principado» a «todo dominio» para reflejar mejor ἀρχή como poder/regla en sentido amplio, en línea con la revisión del POB inglés. Se cambió «abole» por «anula» para una expresión más natural en español contemporáneo sin perder la fuerza de καταργέω. También se corrigió la nota [b] para que conserve la alternativa literal documentada en inglés sobre «Dios y Padre».
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:54Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la secuencia temporal y la estructura del griego: «Entonces viene el fin… cuando entrega… cuando…». También preserva adecuadamente la lectura appositiva de τῷ θεῷ καὶ πατρί como «Dios el Padre». Sin embargo, hay dos puntos que requieren ajuste para alinearse mejor con la evidencia fuente y con la auditoría inglesa: (1) ἀρχή fue revisado en el POB inglés a «every rule», no «every ruler», y en español «todo principado» introduce un matiz más técnico/tradicional que el griego aquí no exige; una opción como «todo dominio» o «todo gobierno» preserva mejor la idea de poder/regla en la tríada abstracta. (2) «abole» es correcto semánticamente, pero en español bíblico general suena menos natural; «anula» o «deja sin efecto» comunica mejor καταργήσῃ sin perder la fuerza de abolición operativa documentada.'
  spanish_quality_summary: El texto es generalmente claro y digno, pero «todo principado» suena más eclesiástico-tradicional que natural para lectura amplia y puede sugerir una categoría angelológica más estrecha. Además, «abole» es comprensible pero menos idiomático que «anula» en español contemporáneo neutral. La frase entera fluye mejor como «cuando anula todo dominio, toda autoridad y poder».
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto (Dios, Padre, reino, etc.). La decisión sobre «Dios el Padre» está bien. El principal desajuste está en πᾶσαν ἀρχὴν: el rastro inglés revisado favorece un sentido abstracto/institucional («every rule»), por lo que «principado» no es la mejor correspondencia en este contexto. La nota [c] ya preserva bien alternativas para καταργήσῃ.'
  issues:
  - severity: medium
    issue: «todo principado» para πᾶσαν ἀρχὴν
    rationale: La auditoría inglesa revisó expresamente «every ruler» a «every rule». «Principado» en español introduce un matiz técnico o tradicional de potestad/principality que puede estrechar o desplazar el sentido hacia entidades específicas. En esta tríada, conviene una formulación más amplia y natural, como «todo dominio».
  - severity: low
    issue: «abole» suena poco idiomático en español actual
    rationale: Aunque semánticamente válido para καταργήσῃ, «abole» resulta menos natural para una Biblia moderna y ampliamente legible. «Anula» mantiene mejor la fuerza de dejar sin efecto, coherente con la rationale inglesa y con la nota ya existente.
  - severity: low
    issue: Nota [b] no refleja con precisión la alternativa inglesa
    rationale: 'La nota actual «O “cuando lo entrega”; o “cuando entrega el reino”» no corresponde bien a la alternativa inglesa documentada («when he delivers up the kingdom to God and Father»). Conviene ofrecer una alternativa española que preserve la construcción más literal: «cuando entrega el reino a Dios y Padre».'
  revised_spanish_text: Entonces viene el fin[a], cuando entrega el reino a Dios el Padre[b], cuando anula[c] todo dominio, toda autoridad y poder.
  revised_footnotes:
  - marker: a
    text: O «la consumación». τέλος puede significar «fin», «meta» o «consumación».
    reason: lexical_alternative
  - marker: b
    text: O «cuando entrega el reino a Dios y Padre».
    reason: lexical_alternative
  - marker: c
    text: O «deja sin efecto»; o «reduce a nada» todo dominio, toda autoridad y poder.
    reason: lexical_alternative
  revision_rationale: Se ajustó «todo principado» a «todo dominio» para reflejar mejor ἀρχή como poder/regla en sentido amplio, en línea con la revisión del POB inglés. Se cambió «abole» por «anula» para una expresión más natural en español contemporáneo sin perder la fuerza de καταργέω. También se corrigió la nota [b] para que conserve la alternativa literal documentada en inglés sobre «Dios y Padre».
