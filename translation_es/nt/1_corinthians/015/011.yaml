translation:
  language: es
  text: Ya sea yo o ellos, así proclamamos, y así ustedes creyeron.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «Así predicamos, y así ustedes creyeron».'
    reason: alternative_lexical_rendering
lexical_decisions:
- source_word: εἴτε ... εἴτε
  english_pob_choice: whether ... or
  chosen_spanish: sea ... o
  alternatives_spanish:
  - ya sea ... o
  - bien ... o
  lexicon: BDAG
  rationale: La construcción correlativa expresa alternativas; en español, 'sea ... o' conserva la disyunción retórica sin sonar tan pesada como una calca directa.
- source_word: οὖν
  english_pob_choice: therefore / then
  chosen_spanish: —
  alternatives_spanish:
  - por tanto
  - entonces
  lexicon: BDAG
  rationale: Aquí οὖν queda absorbido en la formulación natural de la correlación ('Sea yo o...'), de modo que la inferencia no necesita un marcador adicional en español.
- source_word: ἐγὼ
  english_pob_choice: I
  chosen_spanish: yo
  alternatives_spanish:
  - yo mismo
  lexicon: BDAG
  rationale: Pronombre de primera persona singular, contrastado con 'ellos'.
- source_word: ἐκεῖνοι
  english_pob_choice: they
  chosen_spanish: ellos
  alternatives_spanish:
  - aquellos
  - esos
  lexicon: BDAG
  rationale: El referente son los otros testigos/apóstoles del contexto; 'ellos' es natural y suficientemente específico por el pasaje.
- source_word: οὕτως
  english_pob_choice: so / thus
  chosen_spanish: así
  alternatives_spanish:
  - de ese modo
  - de la misma manera
  lexicon: BDAG
  rationale: '''Así'' mantiene la repetición paralela con naturalidad y conserva la referencia al modo/contenido de la proclamación y la fe.'
- source_word: κηρύσσομεν
  english_pob_choice: we proclaim
  chosen_spanish: proclamamos
  alternatives_spanish:
  - predicamos
  - anunciamos
  lexicon: BDAG
  rationale: κηρύσσω tiene fuerza de proclamación pública; 'proclamamos' conserva mejor ese matiz que 'predicamos' en español contemporáneo.
- source_word: ἐπιστεύσατε
  english_pob_choice: you believed
  chosen_spanish: creísteis
  alternatives_spanish:
  - ustedes creyeron
  - habéis creído
  lexicon: BDAG
  rationale: El aoristo se refiere al acto pasado de creer. 'Creísteis' es fiel y, en registro bíblico, puede abarcar un 'ustedes' implícito sin forzar el texto.
theological_decisions:
- issue: Unidad del testimonio apostólico
  english_pob_reading: Whether then it was I or they, so we proclaim and so you believed.
  chosen_spanish_reading: Sea yo o sean ellos, así proclamamos, y así creísteis.
  alternative_spanish_readings:
  - Sea yo o sean ellos, de ese modo proclamamos, y de ese modo creísteis.
  - Sea yo o sean ellos, esto proclamamos, y esto creísteis.
  rationale: La frase debe preservar que el énfasis recae en la identidad unificada del mensaje, no en diferencias de mensajeros. 'Así' reproduce la paralelidad de οὕτως sin añadir una interpretación doctrinal extra.
  doctrine_reference: 1 Corintios 15:1–11; unidad del evangelio apostólico y del testimonio recibido.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del POB en inglés, que prefirió una correlación más literal para εἴτε οὖν y una repetición simple de οὕτως; por eso la propuesta evita expandir a 'por tanto' o 'de ese modo' y conserva la estructura breve y paralela del versículo.
  spanish_consistency_notes:
  - Se usa 'proclamamos' para κηρύσσομεν, en coherencia con el valor de anuncio público del verbo.
  - Se mantiene 'creísteis' para ἐπιστεύσατε, evitando explicaciones añadidas.
  - No se introduce 'Cristo' ni terminología doctrinal ajena al verso; el foco permanece en el mensaje compartido y la respuesta de fe.
