- from: Sea yo o sean ellos, así proclamamos, y así creísteis.
  to: Ya sea yo o ellos, así proclamamos, y así ustedes creyeron.[a]
  rationale: Se añadió una correlación más natural en español ('Ya sea yo o ellos'), se evitó el peninsular 'creísteis' en favor de 'ustedes creyeron', y se preservó la repetición de 'así' para reflejar los dos οὕτως. Se mantuvo una nota con la alternativa más formal, en paralelo con la nota inglesa de auditoría.
