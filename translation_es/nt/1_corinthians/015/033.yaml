translation:
  language: es
  text: 'No se dejen engañar: las malas compañías corrompen las buenas costumbres[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “las malas conversaciones corrompen las buenas costumbres”. El término griego puede referirse a la compañía o a la conversación; el sentido más amplio de “compañías” encaja mejor aquí.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πλανᾶσθε
  english_pob_choice: Do not be deceived
  chosen_spanish: No se dejen engañar
  alternatives_spanish:
  - No se dejen llevar por el engaño
  - No anden engañados
  lexicon: BDAG
  rationale: El imperativo negativo conserva la forma de advertencia. 'No se dejen engañar' reproduce bien el matiz pasivo/medio sin forzar una lectura de autoengaño ni añadir un agente de engaño explícito.
- source_word: φθείρουσιν
  english_pob_choice: corrupts
  chosen_spanish: corrompen
  alternatives_spanish:
  - arruinan
  - dañan
  - echan a perder
  lexicon: BDAG
  rationale: El verbo expresa deterioro moral o ético. 'Corrompen' mantiene la fuerza moral del dicho y encaja naturalmente con 'buenas costumbres' en español.
- source_word: ἤθη
  english_pob_choice: morals
  chosen_spanish: costumbres
  alternatives_spanish:
  - morales
  - hábitos
  - carácter
  lexicon: BDAG
  rationale: En este proverbio ἤθη se refiere a patrones de conducta y forma de vida. 'Costumbres' comunica bien ese sentido en español y suena natural en la sentencia proverbial; 'morales' sería posible, pero menos idiomático con el verbo 'corromper'.
- source_word: χρηστὰ
  english_pob_choice: good
  chosen_spanish: buenas
  alternatives_spanish:
  - rectas
  - sanas
  - honestas
  lexicon: BDAG
  rationale: El adjetivo califica positivamente a ἤθη. 'Buenas' es la opción más simple y fiel, sin añadir matices interpretativos innecesarios.
- source_word: ὁμιλίαι
  english_pob_choice: company
  chosen_spanish: compañías
  alternatives_spanish:
  - asociaciones
  - conversaciones
  - trato
  lexicon: BDAG
  rationale: 'Aunque el término puede aludir a conversación o asociación, aquí el contexto proverbial apunta al ámbito relacional: la gente con la que uno convive. ''Compañías'' conserva ese sentido; la alternativa ''conversaciones'' queda implícitamente cubierta por la nota.'
- source_word: κακαί
  english_pob_choice: bad
  chosen_spanish: malas
  alternatives_spanish:
  - perversas
  - malignas
  - nocivas
  lexicon: BDAG
  rationale: '''Malas'' es la forma natural en español para calificar relaciones o compañías dañinas. Evita intensificar innecesariamente el adjetivo con ''perversas'' o ''malignas''.'
translation_notes:
  revision_awareness: La versión en inglés revisada quedó sin cambios sustanciales; se mantuvo la lectura proverbial de ὁμιλίαι como ámbito de compañía, con la alternativa de ‘conversaciones’ preservada en nota.
  spanish_consistency_notes:
  - Se mantuvo la terminología directa y no eclesiástica para evitar suavizar el tenor proverbial del texto.
  - '''Costumbres'' se usa para ἤθη porque en español comunica mejor la pauta de vida colectiva que un singular como ''carácter''.'
  - La nota conserva la ambigüedad léxica entre compañía y conversación, como en el audit trail inglés.
