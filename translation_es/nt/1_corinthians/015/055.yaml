translation:
  language: es
  text: ¿Dónde está, muerte, tu victoria[a]? ¿Dónde está, muerte, tu aguijón?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «aguijón» en la primera cláusula, lectura reflejada en la tradición del texto recibido y en traducciones clásicas; el texto crítico aquí seguido lee «victoria».
    reason: textual_variant
lexical_decisions:
- source_word: ποῦ
  english_pob_choice: Where
  chosen_spanish: ¿Dónde está... ?
  alternatives_spanish:
  - ¿Dónde... ?
  - ¿Dónde queda... ?
  lexicon: BDAG
  rationale: La forma interrogativa retórica se expresa de manera natural en español con «¿Dónde está... ?», que conserva el tono de desafío sin añadir énfasis inexistente en el griego.
- source_word: σου
  english_pob_choice: your
  chosen_spanish: tu
  alternatives_spanish:
  - de ti
  - su
  lexicon: BDAG
  rationale: El genitivo posesivo de segunda persona se traduce con el posesivo directo «tu», que es la correspondencia natural en español dentro de la invectiva personificada.
- source_word: θάνατε
  english_pob_choice: O death
  chosen_spanish: muerte
  alternatives_spanish:
  - ¡oh muerte!
  - muerte,
  - oh muerte
  lexicon: BDAG
  rationale: El vocativo personifica a la muerte. En español, la inversión con coma y la repetición del sustantivo bastan para mantener el apóstrofe; se evita un «oh» obligatorio porque puede sonar más retórico de lo que exige el griego.
- source_word: νῖκος
  english_pob_choice: victory
  chosen_spanish: victoria
  alternatives_spanish:
  - triunfo
  - vencimiento
  lexicon: BDAG
  rationale: Aunque el texto base SBLGNT lee νῖκος, no κέντρον, el término denota victoria/conquista. «Victoria» es el equivalente español más claro y directo, y preserva el contraste con la derrota de la muerte en el contexto inmediato.
- source_word: κέντρον
  english_pob_choice: sting
  chosen_spanish: aguijón
  alternatives_spanish:
  - picadura
  - estímulo
  lexicon: BDAG
  rationale: κέντρον puede significar aguijón, punta o instrumento punzante. «Aguijón» es una solución bíblica y precisa en español, y refleja bien la imagen de algo que hiere o mortifica, en coherencia con la explicación posterior del contexto paulino.
theological_decisions:
- issue: Variante textual en el primer miembro de la cita
  english_pob_reading: The main text follows SBLGNT with 'victory' in the first clause, while noting the traditional 'sting' variant in English footnote tradition.
  chosen_spanish_reading: Se mantiene «victoria» en la primera cláusula, con nota de variante textual tradicional.
  alternative_spanish_readings:
  - «¿Dónde está, muerte, tu aguijón?»
  - «¿Dónde está tu victoria, muerte?»
  rationale: El texto fuente dado es el crítico SBLGNT, que lee νῖκος en la primera cláusula. La traducción principal debe seguir ese testimonio, pero conviene preservar la lectura tradicional porque es ampliamente conocida y aparece en la tradición textual mayoritaria de muchas Biblias.
  doctrine_reference: Primacía del texto original en la base crítica; preservación de variantes relevantes en nota
- issue: Personificación y tono polémico
  english_pob_reading: Apostrophic address to death as a defeated power in resurrection context.
  chosen_spanish_reading: Se conserva la personificación directa de la muerte mediante vocativo implícito y repetición retórica.
  alternative_spanish_readings:
  - «¡Oh muerte, dónde está tu victoria?»
  - «Muerte, ¿dónde está tu victoria?»
  rationale: El pasaje no describe la muerte como concepto abstracto, sino como enemigo vencido. La estructura española mantiene el desafío retórico y el paralelismo de dos preguntas.
  doctrine_reference: Contexto de 1 Corintios 15:54-57; triunfo escatológico sobre la muerte
translation_notes:
  revision_awareness: Se siguió el testimonio griego SBLGNT proporcionado para la cláusula final («κέντρον» = aguijón) y para la primera cláusula («νῖκος» = victoria), conservando la variante tradicional en nota por su relevancia textual y litúrgica. La puntuación española se ajustó para preservar el paralelismo y el reto retórico del verso.
  spanish_consistency_notes:
  - Se usó «muerte» en minúscula como vocativo personificado, coherente con el uso español moderno y con la práctica del proyecto.
  - «victoria» se mantiene para νῖκος por claridad y por fidelidad al texto crítico, mientras «aguijón» traduce κέντρον con un término natural y bíblicamente reconocible.
  - La nota de variante se ancla en la primera cláusula porque allí está la tensión textual documentada en el audit trail.
