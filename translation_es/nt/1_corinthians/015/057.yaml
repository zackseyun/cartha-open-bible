    rationale: Aunque semánticamente posible, en este contexto «gracias a Dios» puede oírse más como exclamación coloquial que como ascripción formal de acción de gracias. El griego funciona como fórmula de alabanza/agradecimiento dirigida a Dios; «gracias sean dadas a Dios» lo expresa con mayor fidelidad y mejor registro.
  - severity: low
    issue: La combinación «gracias a Dios, que nos da…» resulta algo menos fluida en español formal.
    rationale: La relativa explicativa encaja mejor tras una fórmula más plena («gracias sean dadas a Dios, que…»), evitando un inicio que suena truncado.
