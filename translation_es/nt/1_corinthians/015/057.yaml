translation:
  language: es
  text: Pero gracias sean dadas a Dios[a], que nos da la victoria por medio de nuestro Señor Jesús Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mesías» traduce el título griego Χριστός. La forma tradicional «Cristo» también es posible como lectura eclesial establecida.
    reason: alternative_reading
lexical_decisions:
- source_word: τῷ δὲ θεῷ χάρις
  english_pob_choice: But thanks be to God
  chosen_spanish: Pero gracias a Dios
  alternatives_spanish:
  - Mas gracias a Dios
  - Y gracias a Dios
  lexicon: χάρις; δέ; θεός
  rationale: En esta fórmula doxológica, χάρις expresa agradecimiento más que ‘gracia’ como favor salvador; por eso ‘gracias a Dios’ comunica bien el sentido idiomático. δέ marca transición suave, y ‘Pero’ conserva el giro retórico desde la afirmación anterior.
- source_word: τῷ διδόντι
  english_pob_choice: who gives
  chosen_spanish: que nos da
  alternatives_spanish:
  - que está dando
  - el que nos da
  lexicon: δίδωμι
  rationale: El participio presente describe a Dios como dador de manera característica. ‘Que nos da’ es natural en español y mantiene la acción continua/habitual sin forzar una forma demasiado literal.
- source_word: ἡμῖν
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: ἐγώ
  rationale: Dativo de beneficio/objeto indirecto; ‘nos’ es la realización más fluida en español.
- source_word: τὸ νῖκος
  english_pob_choice: the victory
  chosen_spanish: la victoria
  alternatives_spanish:
  - el triunfo
  - la victoria específica
  lexicon: νῖκος
  rationale: ‘Victoria’ es el equivalente más claro y natural para νῖκος. Se conserva el artículo porque el contexto remite a la victoria concreta sobre la muerte discutida en el pasaje inmediato.
- source_word: διὰ τοῦ κυρίου ἡμῶν
  english_pob_choice: through our Lord
  chosen_spanish: por medio de nuestro Señor
  alternatives_spanish:
  - por nuestro Señor
  - mediante nuestro Señor
  lexicon: διά + genitivo; κύριος
  rationale: Con genitivo, διά expresa medio/instrumento. ‘Por medio de’ explicita ese valor sin perder naturalidad. ‘Señor’ conserva el título cristológico habitual, y ‘nuestro’ refleja ἡμῶν.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: Ἰησοῦς; Χριστός
  rationale: En POB, Χριστός se traduce normalmente como ‘Mesías’ cuando funciona como título. En español, ‘Jesús Mesías’ preserva el valor titular y evita convertir el término en mero apellido religioso. Se mantiene ‘Jesús’ para Ἰησοῦς.
theological_decisions:
- issue: Si traducir Χριστός como nombre tradicional (‘Cristo’) o como título (‘Mesías’).
  english_pob_reading: Main text uses ‘Jesus Messiah’; traditional English alternative is ‘Jesus Christ.’
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La pauta del proyecto favorece traducir Χριστός como ‘Mesías’ cuando el título está semánticamente activo. En esta doxología, la referencia a ‘nuestro Señor Jesús Mesías’ mantiene el contenido confesional sin ocultar el título. Se ofrece ‘Jesús Cristo’ como alternativa de lectura tradicional para compatibilidad y auditoría.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El registro inglés pasó por una revisión que temporalmente cambió ‘Messiah’ a ‘Christ’ y luego lo restauró conforme a la política doctrinal de traducir Χριστός como ‘Messiah’ en el texto principal. La presente versión española sigue esa decisión doctrinal, manteniendo ‘Mesías’ en el texto principal y reservando la alternativa tradicional en nota.
  spanish_consistency_notes:
  - Se mantiene ‘Yahvé’ como forma predeterminada del nombre divino en el proyecto, pero aquí el texto griego usa θεῷ (‘a Dios’) y no el tetragrámaton, por lo que corresponde ‘Dios’.
  - ‘Señor’ se conserva para κύριος en el título cristológico; no se traslada a ‘Yahvé’ porque el referente inmediato es Jesús y no una cita explícita del nombre divino.
  - La puntuación reproduce una sola cláusula doxológica breve, acorde con el original griego.
