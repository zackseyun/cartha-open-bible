  source_alignment_summary: 'El borrador transmite correctamente la pregunta retórica y el sentido básico del griego: τί como «¿Por qué?», καὶ como «también», y κινδυνεύομεν como exposición al peligro. Sin embargo, «a toda hora» se aparta del giro más estrechamente alineado con πᾶσαν ὥραν («cada hora» / «a cada hora» / «cada momento»).'
  spanish_quality_summary: El español es claro y natural, pero «estamos en peligro a toda hora» suena algo menos idiomático y ligeramente coloquial. «Corremos peligro cada hora» o «estamos en peligro cada hora» refleja mejor la fuerza continua del original y la nota inglesa. La nota al pie actual necesita corrección estilística en español y mejor formulación de la alternativa literal.
  glossary_alignment: No hay términos del glosario mayor en disputa. La decisión sobre τί = «¿Por qué?» concuerda con la justificación auditada. Para κινδυνεύομεν, «corremos peligro» resulta más idiomático en español sin perder fidelidad. Para πᾶσαν ὥραν, conviene una forma más cercana a «every hour» que «a toda hora».
  issues:
  - severity: medium
    issue: «a toda hora» para πᾶσαν ὥραν
    rationale: Aunque comunica continuidad, en español puede sonar más libre o coloquial que el original y se aleja de la decisión auditada «every hour». «cada hora» preserva mejor la forma y el énfasis retórico.
  - severity: low
    issue: «estamos en peligro» suena menos idiomático que «corremos peligro» en este contexto
    rationale: La opción actual es fiel, pero «corremos peligro» fluye mejor en español bíblico contemporáneo y expresa naturalmente el valor de κινδυνεύομεν sin sobreinterpretar.
  - severity: medium
    issue: La nota al pie literal está mal formulada en español
    rationale: «¿Qué también nosotros estamos en peligro...?» no es español natural ni refleja bien la glosa inglesa. Debe presentarse como alternativa más literal con aclaración de que el sentido contextual es «¿Por qué...?».
