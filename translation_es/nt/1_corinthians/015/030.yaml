translation:
  language: es
  text: ¿Por qué también nosotros corremos peligro[a] cada hora?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente, «¿Qué? ¿También nosotros corremos peligro cada hora?». El sentido en este contexto es: «¿Por qué también nosotros corremos peligro cada hora?»'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί
  english_pob_choice: Why
  chosen_spanish: ¿Por qué
  alternatives_spanish:
  - ¿Qué
  lexicon: BDAG
  rationale: En esta pregunta retórica, τί funciona en el contexto como cuestionamiento de motivo o sentido. «¿Por qué» comunica mejor la fuerza argumentativa que «¿Qué», que en español sonaría más literal pero menos natural.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - incluso
  lexicon: BDAG
  rationale: καὶ añade a Pablo y sus compañeros al grupo ya mencionado en el argumento. «También» conserva el matiz aditivo de forma natural en español.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito se mantiene para reflejar el sujeto enfático del griego. «Nosotros» es la forma directa y clara en español.
- source_word: κινδυνεύομεν
  english_pob_choice: are in danger
  chosen_spanish: estamos en peligro
  alternatives_spanish:
  - corremos peligro
  - nos exponemos al peligro
  lexicon: BDAG
  rationale: κινδυνεύω expresa estar en peligro o en riesgo. «Estamos en peligro» es transparente y fiel; «corremos peligro» sería también posible, pero la formulación con «estar» sigue de cerca la idea básica sin añadir intensidad innecesaria.
- source_word: πᾶσαν ὥραν
  english_pob_choice: every hour
  chosen_spanish: a toda hora
  alternatives_spanish:
  - cada hora
  - todo el tiempo
  lexicon: BDAG
  rationale: La expresión acusativa tiene valor idiomático de continuidad. «A toda hora» conserva la imagen temporal del original y sugiere exposición constante al peligro sin sonar forzado en español.
theological_decisions:
- issue: Fuerza retórica de la pregunta
  english_pob_reading: The verse is rendered as a rhetorical question highlighting the absurdity of apostolic peril if the dead are not raised.
  chosen_spanish_reading: Se conserva como pregunta retórica que subraya la incongruencia de que los apóstoles estén en peligro si no hay resurrección.
  alternative_spanish_readings:
  - ¿Y por qué estaríamos nosotros también en peligro a toda hora?
  - ¿Qué también nosotros estamos en peligro a toda hora?
  rationale: El griego y el contexto inmediato favorecen una pregunta retórica, no una petición de información. La redacción española mantiene esa tensión argumentativa sin resolverla ni suavizarla.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés coinciden en leer la cláusula como pregunta retórica. No se registran revisiones posteriores que alteren la decisión principal; la versión española sigue esa lectura con una formulación natural en español.
  spanish_consistency_notes:
  - Se usa «estamos en peligro» para κινδυνεύομεν, evitando «arriesgamos nuestra vida» porque añade fuerza interpretativa no necesaria.
  - Se prefiere «a toda hora» para πᾶσαν ὥραν por su cercanía idiomática al griego y su naturalidad en español.
  - Se mantiene «nosotros» explícito para conservar el sujeto enfático del original.
