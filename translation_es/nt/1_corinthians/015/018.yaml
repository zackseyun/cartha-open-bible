review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura inferencial del griego: ἄρα = «Entonces», καὶ = «también», ἀπώλοντο = «han perecido». También conserva correctamente la decisión del proyecto de traducir Χριστῷ como título: «el Mesías», con nota alternativa «en Cristo». Sin embargo, «los que han dormido» no es la mejor preservación de οἱ κοιμηθέντες en español bíblico natural; el griego es un eufemismo de muerte («los que se durmieron» / «los que han quedado dormidos»), no simplemente el acto ordinario de dormir.'
  spanish_quality_summary: El texto es claro, pero «han dormido en el Mesías» suena algo extraño en español y puede sugerir sueño literal o una acción completada de dormir, no el estado/eufemismo funerario que Pablo usa. «Los que se durmieron en el Mesías» suena más idiomático y reconocible en registro bíblico moderno, manteniendo la metáfora sin aplanarla a «murieron». El resto del verso es legible y digno.
  glossary_alignment: Alineado con la política del proyecto en «Mesías» para Χριστός, con nota para «Cristo». No hay conflicto con otros términos del glosario. La única corrección necesaria es lexical/idiomática en la representación de κοιμηθέντες.
  issues:
  - severity: medium
    issue: «los que han dormido» representa de forma poco natural κοιμηθέντες
    rationale: Aunque conserva la metáfora, en español suena a acto normal de dormir más que al eufemismo de muerte. «Los que se durmieron» preserva mejor el valor funerario/metafórico del participio griego.
  - severity: low
    issue: La nota b explica «han dormido» y debe ajustarse si cambia el texto
    rationale: La glosa debe corresponder exactamente a la forma anclada en el texto revisado para evitar desajuste entre traducción y nota.
