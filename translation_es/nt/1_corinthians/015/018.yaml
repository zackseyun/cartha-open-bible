translation:
  language: es
  text: Entonces también los que se durmieron en el Mesías han perecido[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en Cristo».'
    reason: alternative_reading
  - marker: b
    text: «Se durmieron» es un eufemismo griego para la muerte, especialmente de los creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄρα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Así que
  - Por tanto
  - De manera que
  lexicon: BDAG
  rationale: La partícula inferencial introduce la conclusión del argumento de Pablo. «Entonces» comunica bien la consecuencia en español sin sonar demasiado rígido.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  - además
  lexicon: BDAG
  rationale: Mantiene el valor aditivo de la partícula, integrando a estos muertos dentro de la consecuencia inferida.
- source_word: οἱ κοιμηθέντες
  english_pob_choice: those who have fallen asleep
  chosen_spanish: los que han dormido
  alternatives_spanish:
  - los que han muerto
  - los dormidos
  lexicon: BDAG
  rationale: «Dormido» conserva el eufemismo griego de la muerte, especialmente de los creyentes, sin perder claridad en español. Se evita reducirlo a «muerto» porque el texto conserva la metáfora.
- source_word: ἐν Χριστῷ
  english_pob_choice: in Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός funciona como título; por defecto el proyecto usa «Mesías» para preservar el sentido titular. En nota se conserva la alternativa tradicional «en Cristo» por su uso estable en español eclesial.
- source_word: ἀπώλοντο
  english_pob_choice: have perished
  chosen_spanish: han perecido
  alternatives_spanish:
  - perecieron
  - se han perdido
  - han sido destruidos
  lexicon: BDAG
  rationale: El verbo expresa ruina/perdición en el marco del argumento condicional. El presente perfecto español comunica bien el resultado asumido del razonamiento paulino.
theological_decisions:
- issue: Χριστός como título en lenguaje paulino de unión con Cristo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La política del proyecto favorece traducir el título, no transliterarlo, cuando el contexto lo permite. Aquí se trata de la unión «en el Mesías», no de un nombre propio aislado; la nota preserva la forma tradicional «Cristo» para lectores que la esperan.
  doctrine_reference: 'DOCTRINE.md: Translate titles; Contested terms table for Χριστός'
- issue: Eufemismo de muerte en κοιμηθέντες
  english_pob_reading: fallen asleep
  chosen_spanish_reading: han dormido
  alternative_spanish_readings:
  - han muerto
  rationale: 'Se conserva la metáfora para no borrar la tensión lexical documentada: Pablo habla de los creyentes muertos como «los que duermen». En español, «han dormido» mantiene esa imagen con naturalidad suficiente.'
  doctrine_reference: BDAG κοιμάομαι; uso paulino de la metáfora del sueño para la muerte
translation_notes:
  revision_awareness: La revisión inglesa mostró una oscilación entre «the Messiah» y «Christ» para Χριστῷ, pero la corrección regresiva restauró el título «Messiah» conforme a la política del proyecto. La redacción española sigue esa decisión y no la sustituye por «Cristo» en el texto principal.
  spanish_consistency_notes:
  - Se mantiene «Mesías» en el texto principal por coherencia con el tratamiento de Χριστός como título.
  - La nota ofrece «Cristo» como alternativa tradicional, útil para lectores acostumbrados a la fórmula paulina.
  - «Han perecido» reproduce de modo natural el resultado verbal de ἀπώλοντο sin exagerar el matiz activo o pasivo.
  - Se evita «los que durmieron» porque el participio perfecto en español requiere una construcción más explícita para conservar el valor aspectual.
