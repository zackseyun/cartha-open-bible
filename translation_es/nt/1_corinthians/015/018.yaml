- from: Entonces también los que han dormido en el Mesías han perecido[a][b].
  to: Entonces también los que se durmieron en el Mesías han perecido[a][b].
  rationale: Se reemplaza «han dormido» por «se durmieron» para reflejar de manera más natural en español el eufemismo griego κοιμηθέντες para la muerte, sin perder la metáfora preservada por el POB. Se mantiene «en el Mesías» conforme a la política del proyecto, con nota alternativa «en Cristo».
