translation:
  language: es
  text: Porque, ya que por un hombre[a] vino la muerte, también por un hombre[b] vino la resurrección de los muertos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «mediante un hombre» o «a través de un hombre»; la preposición griega puede expresar medio o agencia.
    reason: lexical_alternative
  - marker: b
    text: El contexto identifica a los dos hombres como Adán y el Mesías (véanse 15:22 y 15:45).
    reason: cross_reference
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  english_pob_choice: For since
  chosen_spanish: Porque, así como
  alternatives_spanish:
  - Puesto que
  - Pues
  lexicon: BDAG
  rationale: La combinación introduce una explicación y una base argumentativa. En español, "porque" conserva la función causal, y "así como" ayuda a preparar el paralelismo que sigue sin añadir contenido ajeno al griego.
- source_word: δι’ ἀνθρώπου
  english_pob_choice: through a man
  chosen_spanish: por un hombre
  alternatives_spanish:
  - mediante un hombre
  - a través de un hombre
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o agencia. "Por un hombre" es natural en español y mantiene la mediación humana sin suavizar la fuerza representativa del paralelo entre los dos hombres.
- source_word: θάνατος
  english_pob_choice: death came
  chosen_spanish: vino la muerte
  alternatives_spanish:
  - llegó la muerte
  - sobrevino la muerte
  lexicon: BDAG
  rationale: El griego es verbalmente elíptico; en español se requiere un verbo. "Vino" reproduce bien la idea de llegada/origen de la muerte por medio de un hombre, en paralelo con la segunda cláusula.
- source_word: ἀνάστασις νεκρῶν
  english_pob_choice: the resurrection of the dead
  chosen_spanish: la resurrección de los muertos
  alternatives_spanish:
  - la resurrección de entre los muertos
  - la resurrección de los muertos yacentes
  lexicon: BDAG
  rationale: Es la expresión paulina estándar para la resurrección corporal. "De los muertos" conserva el genitivo νεκρῶν de manera directa y no espiritualiza el referente.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - asimismo
  lexicon: BDAG
  rationale: '"También" marca con claridad el segundo miembro paralelo en español y reproduce la correspondencia lógica del griego mejor que un simple "y".'
- source_word: δι’ ἀνθρώπου
  english_pob_choice: through a man
  chosen_spanish: por un hombre
  alternatives_spanish:
  - mediante un hombre
  - a través de un hombre
  lexicon: BDAG
  rationale: Se mantiene la misma solución en ambas cláusulas para preservar el paralelismo deliberado entre el hombre por medio del cual vino la muerte y el hombre por medio del cual viene la resurrección.
theological_decisions:
- issue: Paralelo representativo entre Adán y el Mesías
  english_pob_reading: Retain the singular 'a man' in both clauses without making the identities explicit in the main text.
  chosen_spanish_reading: Mantener "un hombre" en ambas cláusulas sin nombrar explícitamente a Adán ni al Mesías en el texto principal.
  alternative_spanish_readings:
  - por Adán ... por el Mesías
  - por un hombre ... por un hombre
  rationale: El contexto inmediato identifica a las dos figuras, pero este versículo formula el principio en paralelismo conciso. La redacción española conserva esa simetría y no introduce nombres ausentes del verso.
  doctrine_reference: 1 Corintios 15:22, 45; filosofía de traducción §§1, 4, 5
- issue: Realidad concreta de la resurrección
  english_pob_reading: Render ἀνάστασις νεκρῶν as 'the resurrection of the dead' without spiritualizing it.
  chosen_spanish_reading: Traducir ἀνάστασις νεκρῶν como "la resurrección de los muertos" sin convertirla en una idea meramente espiritual o figurada.
  alternative_spanish_readings:
  - resurrección espiritual
  - vida después de la muerte
  rationale: En 1 Corintios 15 Pablo defiende la resurrección real de los muertos. La traducción debe conservar ese contenido concreto y no debilitarlo.
  doctrine_reference: Afirmaciones; 1 Corintios 15 en su conjunto
translation_notes:
  revision_awareness: Coincide con el texto griego y con el análisis auditado en inglés; no se requirieron revisiones respecto al sentido base. Se preservó el paralelismo de las dos cláusulas y la concreción de la resurrección.
  spanish_consistency_notes:
  - Se usó «por un hombre» en ambas cláusulas para conservar el paralelismo.
  - Se prefirió «la resurrección de los muertos» como expresión idiomática y fiel del genitivo νεκρῶν.
  - «Vino la muerte» mantiene la elipsis verbal del griego de forma natural en español.
  - No se introdujeron nombres propios en el texto principal, siguiendo el audit trail inglés.
