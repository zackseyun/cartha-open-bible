review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el paralelismo básico del griego y conserva correctamente «por un hombre» / «la resurrección de los muertos». Sin embargo, introduce dos matices no ideales: (1) «así como» no está en ἐπειδὴ γὰρ y añade una estructura comparativa que el griego no expresa aquí; (2) el cambio verbal «vino ... viene» rompe el paralelismo del original y sugiere presente en la segunda cláusula, cuando el inglés auditado suple el mismo verbo implícito en ambas: «came».'
  spanish_quality_summary: 'El español es claro y legible, pero puede mejorarse para sonar más natural y más fiel al argumento de Pablo: «Porque ya que por un hombre vino la muerte, también por un hombre vino la resurrección de los muertos». Además, la nota [b] está anclada en «viene», pero su contenido trata de «los dos hombres»; conviene anclarla en «hombre» para mayor precisión.'
  glossary_alignment: No hay conflicto con la terminología del proyecto. «Mesías» en la nota es correcto. «Por un hombre» preserva adecuadamente δι’ ἀνθρώπου, con la alternativa instrumental/agencial en nota. «La resurrección de los muertos» mantiene bien ἀνάστασις νεκρῶν.
  issues:
  - severity: medium
    issue: «Así como» añade un matiz comparativo no presente en ἐπειδὴ γὰρ
    rationale: La combinación griega es causal/explicativa («porque/ya que/pues puesto que»), no la fórmula correlativa «así como». El paralelismo ya está en las dos cláusulas sin necesidad de esa inserción.
  - severity: medium
    issue: «Viene» en la segunda cláusula rompe el paralelismo verbal y puede sonar teológicamente impreciso
    rationale: El griego es elíptico en ambas cláusulas; el inglés auditado suple «came» dos veces. En español, repetir «vino» mantiene la simetría argumentativa entre muerte y resurrección mejor que «viene».
  - severity: low
    issue: La nota de referencia cruzada está anclada en un verbo en vez del sintagma relevante
    rationale: La nota sobre «los dos hombres» debe señalar «un hombre», no «viene», para que el anclaje corresponda al contenido explicado.
  revised_spanish_text: Porque, ya que por un hombre[a] vino la muerte, también por un hombre[b] vino la resurrección de los muertos.
  revised_footnotes:
  - marker: a
    text: También puede entenderse «mediante un hombre» o «a través de un hombre»; la preposición griega puede expresar medio o agencia.
    reason: lexical_alternative
  - marker: b
    text: El contexto identifica a los dos hombres como Adán y el Mesías (véanse 15:22 y 15:45).
    reason: cross_reference
  revision_rationale: La revisión elimina «así como», que no corresponde directamente a ἐπειδὴ γὰρ, restaura el paralelismo de las dos cláusulas con «vino ... vino», y coloca la nota contextual sobre «los dos hombres» en el sintagma adecuado. El resultado sigue siendo natural en español y más fiel al texto fuente y al audit trail inglés.
