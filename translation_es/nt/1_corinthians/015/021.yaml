revisions:
- from: Porque, así como por un hombre vino[a] la muerte, también por un hombre viene[b] la resurrección de los muertos.
  to: Porque, ya que por un hombre[a] vino la muerte, también por un hombre[b] vino la resurrección de los muertos.
  rationale: La revisión elimina «así como», que no corresponde directamente a ἐπειδὴ γὰρ, restaura el paralelismo de las dos cláusulas con «vino ... vino», y coloca la nota contextual sobre «los dos hombres» en el sintagma adecuado. El resultado sigue siendo natural en español y más fiel al texto fuente y al audit trail inglés.
