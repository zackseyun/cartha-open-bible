  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Adán», «espíritu» y el tratamiento no capitalizado de πνεῦμα aquí concuerdan con la decisión teológica documentada. La elección de «hombre» para ἄνθρωπος y «ser viviente» para ψυχή siguen la racionalidad del POB inglés.
