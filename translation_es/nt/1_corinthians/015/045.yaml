translation:
  language: es
  text: 'Así también está escrito: «El primer hombre, Adán, llegó a ser[a] un ser viviente»; el último Adán llegó a ser un espíritu que da vida[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un alma viviente», eco de la traducción tradicional de Génesis 2:7.
    reason: lexical_alternative
  - marker: b
    text: O «un espíritu vivificante»; la expresión es cualitativa y no implica necesariamente una identificación explícita de Cristo con el Espíritu Santo como persona distinta.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως καὶ γέγραπται
  english_pob_choice: So also it is written
  chosen_spanish: Así también está escrito
  alternatives_spanish:
  - De este modo también está escrito
  - Así está escrito
  lexicon: BDAG
  rationale: οὕτως καὶ introduce la cita como apoyo directo al argumento anterior; «Así también» conserva esa relación inferencial. γέγραπται es la fórmula bíblica habitual y en español se expresa con naturalidad como «está escrito».
- source_word: Ἐγένετο
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - se volvió
  lexicon: BDAG
  rationale: En la cita de Génesis, γίνομαι marca un paso a un nuevo estado. «Llegó a ser» mantiene ese cambio sin sugerir una creación ex nihilo ni perder la continuidad del sujeto.
- source_word: ὁ πρῶτος ἄνθρωπος
  english_pob_choice: the first man
  chosen_spanish: el primer hombre
  alternatives_spanish:
  - el primer ser humano
  - el primer humano
  lexicon: BDAG
  rationale: «Hombre» reproduce la correspondencia de la lectura inglesa y mantiene la fuerza tipológica de Adán como representante de la humanidad, sin diluir el contraste con «el último Adán».
- source_word: Ἀδὰμ
  english_pob_choice: Adam
  chosen_spanish: Adán
  alternatives_spanish:
  - Adam
  lexicon: Tradición onomástica bíblica en español
  rationale: El nombre propio se adapta a la forma española estándar «Adán», que es la forma bíblica reconocible y lecturable en español.
- source_word: εἰς ψυχὴν ζῶσαν
  english_pob_choice: a living being
  chosen_spanish: un ser viviente
  alternatives_spanish:
  - un alma viviente
  - un ser vivo
  lexicon: BDAG
  rationale: ψυχὴν ζῶσαν en el contexto de Génesis 2:7 describe vida animada, no principalmente una sustancia inmaterial. «Ser viviente» comunica ese sentido de manera clara y evita cargar el texto con una antropología que el griego aquí no explicita. Se conserva la tensión tradicional en la nota.
- source_word: ὁ ἔσχατος Ἀδὰμ
  english_pob_choice: the last Adam
  chosen_spanish: el último Adán
  alternatives_spanish:
  - el postrero Adán
  - el Adán final
  lexicon: BDAG
  rationale: ἔσχατος tiene aquí valor tipológico y escatológico. «El último Adán» es la forma más natural en español y preserva el contraste paulino con el primer Adán.
- source_word: εἰς πνεῦμα ζῳοποιοῦν
  english_pob_choice: a life-giving spirit
  chosen_spanish: un espíritu que da vida
  alternatives_spanish:
  - un espíritu vivificante
  - un espíritu que vivifica
  lexicon: BDAG
  rationale: El griego es cualitativo y carece de artículo antes de πνεῦμα; «un espíritu que da vida» conserva esa cualidad sin convertir la frase en una identificación explícita con el Espíritu Santo. «Vivificante» sería posible, pero la redacción elegida es más transparente y directa en español.
theological_decisions:
- issue: Sentido antropológico de ψυχὴν ζῶσαν en la cita de Génesis
  english_pob_reading: Render ψυχὴν ζῶσαν as 'a living being' rather than 'a living soul.'
  chosen_spanish_reading: Traducir ψυχὴν ζῶσαν como «un ser viviente» en vez de «un alma viviente».
  alternative_spanish_readings:
  - un alma viviente
  rationale: El contexto apunta a Adán como persona animada o ser vivo, no a una afirmación técnica sobre la composición del ser humano. «Ser viviente» evita introducir una lectura antropológica más específica que el pasaje no exige, aunque la alternativa tradicional se conserva como eco reconocible de Génesis 2:7.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Valor de πνεῦμα ζῳοποιοῦν respecto del último Adán
  english_pob_reading: the last Adam became a life-giving spirit
  chosen_spanish_reading: Conservar el contraste tipológico como «un espíritu que da vida», sin expandirlo doctrinalmente.
  alternative_spanish_readings:
  - el Espíritu que da vida
  - un espíritu vivificante
  rationale: La ausencia del artículo hace preferible una lectura cualitativa. La traducción elegida describe la función o cualidad del último Adán sin identificarlo de manera directa con el Espíritu Santo como persona distinta, lo cual preserva la cristología y la distinción trinitaria sin sobreexplicar el texto.
  doctrine_reference: Credo niceno; Calcedonia; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y ningún cambio necesario; se mantuvo la decisión base con adaptación natural al español y preservación de las notas léxicas y teológicas relevantes.
  spanish_consistency_notes:
  - Se mantuvo «Adán» como forma española estándar del nombre propio.
  - Se evitó «SEÑOR» porque el versículo cita Génesis de forma alusiva, no contiene el tetragrámaton explícito en esta forma griega.
  - «Ser viviente» y «espíritu que da vida» conservan el contraste entre vida recibida y vida comunicada sin añadir explicación interpretativa.
  - La puntuación reproduce la estructura de cita con dos miembros contrastivos y comillas de estilo español.
