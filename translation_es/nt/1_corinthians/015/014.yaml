translation:
  language: es
  text: Y si el Mesías no ha sido resucitado, entonces nuestra proclamación es vacía[a], y su fe[b] también es vacía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «vana» en lugar de «vacía» en ambas apariciones de κενός.
    reason: lexical_alternative
  - marker: b
    text: O «confianza» en lugar de «fe».
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: El contexto es el argumento paulino sobre la identidad y obra mesiánica de Jesús; en español, 'Mesías' conserva el valor titular de Χριστός mejor que 'Cristo' como nombre fijo. Mantiene la decisión auditada del POB inglés y evita convertir el título en un simple nombre propio.
- source_word: ἐγήγερται
  english_pob_choice: has not been raised
  chosen_spanish: no ha sido resucitado
  alternatives_spanish:
  - no ha resucitado
  - no ha sido levantado
  lexicon: BDAG
  rationale: La forma perfectiva pasiva pide una traducción que conserve el resultado permanente y la agencia implícita de Dios. 'Ha sido resucitado' es la forma más natural en español para ese valor pasivo; 'ha resucitado' sonaría más activo y menos exacto.
- source_word: κενὸν
  english_pob_choice: empty
  chosen_spanish: vacío
  alternatives_spanish:
  - vano
  - inútil
  lexicon: BDAG
  rationale: '''Vacío'' reproduce bien la idea de algo sin contenido o sin sustancia, y permite mantener el paralelismo retórico con la segunda ocurrencia. ''Vano'' es posible, pero puede sonar más arcaico; ''inútil'' desplaza el matiz hacia utilidad práctica.'
- source_word: ἄρα
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - por tanto
  - así que
  lexicon: BDAG
  rationale: Marca la inferencia lógica del razonamiento. 'Entonces' funciona de modo natural en español y preserva el flujo argumentativo sin endurecerlo demasiado.
- source_word: κήρυγμα
  english_pob_choice: proclamation
  chosen_spanish: anuncio
  alternatives_spanish:
  - proclamación
  - predicación
  - mensaje
  lexicon: BDAG
  rationale: '''Anuncio'' comunica de manera clara el acto público y verbal de declarar algo. Frente a ''predicación'', evita restringir el sentido al acto de sermonear; frente a ''proclamación'', suena un poco más natural en español contemporáneo, sin perder el carácter público del término.'
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: El contexto habla de la respuesta creyente de los corintios; por eso 'fe' es la equivalencia principal. 'Confianza' es una alternativa viable, pero aquí sería más explicativa que el término de uso bíblico estándar en español.
- source_word: κενὴ
  english_pob_choice: empty
  chosen_spanish: vacía
  alternatives_spanish:
  - vana
  - inútil
  lexicon: BDAG
  rationale: Se conserva el paralelo con κενόν y el acuerdo con πίστις (femenino). 'Vacía' es fiel al campo semántico y mantiene la simetría retórica del griego.
theological_decisions:
- issue: Agencia divina implícita en la resurrección
  english_pob_reading: has not been raised
  chosen_spanish_reading: no ha sido resucitado
  alternative_spanish_readings:
  - no ha resucitado
  rationale: El pasivo del griego deja implícita la acción de Dios sin nombrarlo. La traducción pasiva en español preserva esa tensión teológica y no la aplana a una forma simplemente intransitiva.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Valor de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En este versículo el término funciona titularmente dentro del argumento sobre la resurrección. 'Mesías' expresa de forma más transparente ese valor en español y evita perder la dimensión histórico-teológica que el POB auditado quiso conservar.
  doctrine_reference: 'Project-level terminology: Χριστός / Messiah language -> usually ''Mesías'' when the source uses the title.'
translation_notes:
  revision_awareness: 'El borrador inglés del POB pasó por una corrección regresiva importante: se restableció ''Messiah'' tras un intento de usar ''Christ''. Para el español, se mantiene la decisión auditada de tratar Χριστός como título y no como nombre fijo, por lo que se traduce consistentemente como ''Mesías''. También se conserva la estructura pasiva de ''ha sido resucitado'' para reflejar el perfectivo pasivo del griego y la agencia divina implícita.'
  spanish_consistency_notes:
  - Se mantuvo la repetición retórica de κενός con una misma solución léxica ('vacío/vacía') para reflejar el paralelismo del texto.
  - Se prefirió 'anuncio' por naturalidad, pero se registró la alternativa 'proclamación' para mantener la huella auditada del POB inglés.
  - La puntuación reproduce la lógica condicional e inferencial del griego con una sola oración principal en español.
