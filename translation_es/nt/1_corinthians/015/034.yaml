translation:
  language: es
  text: Recobren el juicio como es debido[a], y no sigan pecando; porque algunos tienen ignorancia de Dios. Lo digo para vergüenza de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "Recobren el juicio debidamente"; el verbo evoca literalmente salir del aturdimiento o de la embriaguez, y aquí probablemente funciona en sentido metafórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐκνήψατε
  english_pob_choice: Come to your senses
  chosen_spanish: Recobren el juicio
  alternatives_spanish:
  - Entren en razón
  - Vuelvan en sí
  - Sobrios estén
  lexicon: BDAG
  rationale: El verbo evoca literalmente el acto de sacudirse la embriaguez o el aturdimiento, pero aquí funciona de manera metafórica. En español, 'recobren el juicio' comunica el retorno a la claridad mental y conserva el valor exhortativo sin sonar forzado.
- source_word: δικαίως
  english_pob_choice: rightly
  chosen_spanish: con rectitud
  alternatives_spanish:
  - de manera correcta
  - como es debido
  - rectamente
  lexicon: BDAG
  rationale: El adverbio modifica la exhortación y añade una cualidad moral/propera al acto de volver en sí. 'Con rectitud' mantiene ese matiz sin volverlo demasiado técnico ni desplazarlo hacia un lenguaje eclesiástico más pesado.
- source_word: μὴ ἁμαρτάνετε
  english_pob_choice: do not go on sinning
  chosen_spanish: no sigan pecando
  alternatives_spanish:
  - no pequen
  - dejen de pecar
  lexicon: BDAG
  rationale: El presente imperativo con μή sugiere una prohibición con fuerza continua o habitual. 'No sigan pecando' comunica bien esa continuidad, mientras que 'no pequen' podría sonar más genérico y 'dejen de pecar' más abrupto de lo que el griego exige.
- source_word: ἀγνωσίαν
  english_pob_choice: ignorance
  chosen_spanish: ignorancia
  alternatives_spanish:
  - falta de conocimiento
  lexicon: BDAG
  rationale: '''Ignorancia'' es el equivalente directo y natural en español, y preserva la dureza del reproche. ''Falta de conocimiento'' explicita más de lo necesario.'
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - acerca de Dios
  lexicon: BDAG
  rationale: El genitivo se traduce de forma directa como 'de Dios', manteniendo la compactación del griego. 'Acerca de Dios' interpreta el sentido, pero no es necesario para la claridad del español.
- source_word: τινες
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - ciertos
  - algunos de ustedes
  lexicon: BDAG
  rationale: '''Algunos'' reproduce el indefinido plural sin especificar más de lo que el texto da. Dado el contexto de reprensión comunitaria, evita identificar indebidamente al grupo.'
- source_word: πρὸς ἐντροπὴν ὑμῖν
  english_pob_choice: to your shame
  chosen_spanish: para vergüenza de ustedes
  alternatives_spanish:
  - para su vergüenza
  - a su vergüenza
  - con vergüenza para ustedes
  lexicon: BDAG
  rationale: La expresión apunta al efecto de reproche o deshonra en relación con los oyentes. 'Para vergüenza de ustedes' conserva la fuerza retórica y el tono admonitorio; 'a su vergüenza' suena posible, pero menos natural en español actual.
- source_word: λαλῶ
  english_pob_choice: I say this
  chosen_spanish: Lo digo
  alternatives_spanish:
  - Les hablo
  - Lo estoy diciendo
  lexicon: BDAG
  rationale: En este cierre discursivo, el presente de 'hablar/decir' funciona como un remate directo de reprensión. 'Lo digo' enlaza naturalmente con la frase anterior y mantiene la observación personal del apóstol.
theological_decisions:
- issue: Valor de δικαίως en la exhortación
  english_pob_reading: rightly rather than righteously
  chosen_spanish_reading: con rectitud, en vez de una formulación más técnica como 'justamente' o 'rectamente'
  alternative_spanish_readings:
  - justamente
  - rectamente
  - piadosamente
  rationale: La línea expresa una exhortación ética, pero el adverbio acompaña el llamado a recuperar el juicio claro. 'Con rectitud' conserva el peso moral sin introducir un término que en español pueda sonar demasiado doctrinal o abstracto.
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve source sense without importing doctrinal claims.'
- issue: Fuerza aspectual de μὴ ἁμαρτάνετε
  english_pob_reading: do not go on sinning
  chosen_spanish_reading: no sigan pecando
  alternative_spanish_readings:
  - no pequen
  - dejen de pecar
  rationale: El griego puede implicar una acción continua o habitual. En español, 'no sigan pecando' transmite bien esa continuidad sin convertir la exhortación en una acusación más específica de la que el texto da.
  doctrine_reference: Aspectual nuance in present imperative; preserve ongoing-prohibition force.
translation_notes:
  revision_awareness: El borrador sigue la lectura revisada del audit trail inglés que prefirió una fórmula idiomática de 'volver en sí/recobrar el juicio' frente a una traducción más literal de la imagen de sobriedad, pero en español opta por una equivalencia natural que conserve la metáfora subyacente. También toma en cuenta la nota inglesa sobre la posible fuerza continua de 'no sigan pecando' y la expresión de reproche final 'para vergüenza de ustedes'.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεοῦ, conforme al estándar POB para θεός/אֱלֹהִים.
  - Se usa 'pecar' para ἁμαρτάνω, evitando una paráfrasis moralizante.
  - La expresión final conserva el tono paulino de reprensión sin suavizarlo a un simple comentario.
  - No se introduce 'Cristo' ni otros términos no presentes en el versículo.
