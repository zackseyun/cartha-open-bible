translation:
  language: es
  text: Hay una gloria[a] del sol, y otra gloria de la luna, y otra gloria de las estrellas; porque una estrella difiere de otra en gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “esplendor” o “resplandor” o “brillo” a lo largo del verso; δόξα puede denotar aquí radiación visible, aunque “gloria” preserva la repetición paulina en el argumento circundante.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλλη
  english_pob_choice: another / one ... another ... another
  chosen_spanish: otra / una ... otra ... otra
  alternatives_spanish:
  - diferente
  - distinta
  lexicon: BDAG
  rationale: ἄλλη marca contraste entre clases o instancias. En español, “otra” reproduce de modo natural la serie contrastiva y evita endurecer el matiz con “diferente”, que no encaja tan bien en la repetición del verso.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - resplandor
  - brillo
  lexicon: BDAG
  rationale: “Gloria” preserva la repetición de δόξα en el verso y su continuidad con el argumento paulino. Las alternativas captan mejor la radiación visible, pero “gloria” mantiene el enlace léxico-teológico que el POB inglés decidió conservar.
- source_word: ἡλίου
  english_pob_choice: of the sun
  chosen_spanish: del sol
  alternatives_spanish:
  - del astro solar
  lexicon: BDAG
  rationale: Genitivo dependiente de δόξα; “del sol” es la forma natural y directa en español.
- source_word: σελήνης
  english_pob_choice: of the moon
  chosen_spanish: de la luna
  alternatives_spanish:
  - de la luna
  lexicon: BDAG
  rationale: Genitivo paralelo al anterior; se mantiene la simetría del tríptico solar-lunar-estelar.
- source_word: ἀστέρων
  english_pob_choice: of the stars
  chosen_spanish: de las estrellas
  alternatives_spanish:
  - de los astros
  lexicon: BDAG
  rationale: El plural genitivo completa la serie. “Estrellas” es el equivalente más transparente y común; “astros” sería válido pero menos inmediato.
- source_word: ἀστὴρ ... ἀστέρος
  english_pob_choice: star ... star
  chosen_spanish: una estrella ... otra
  alternatives_spanish:
  - estrella ... estrella
  lexicon: BDAG
  rationale: El griego conserva comparación singular a singular. En español, “una estrella difiere de otra” reproduce la estructura comparativa sin sonar forzado; el primer “una” ya está incluido en la frase inicial para una lectura fluida.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón explicativa del enunciado anterior. “Porque” expresa bien esa relación causal/explicativa en español moderno.
- source_word: διαφέρει
  english_pob_choice: differs
  chosen_spanish: difiere
  alternatives_spanish:
  - es diferente
  - se distingue
  - supera
  lexicon: BDAG
  rationale: El verbo expresa diferencia o distinción. “Difiere” conserva el sentido comparativo sin añadir la idea de superioridad que el contexto puede sugerir pero no exige de forma explícita.
- source_word: ἐν δόξῃ
  english_pob_choice: in glory
  chosen_spanish: en gloria
  alternatives_spanish:
  - en esplendor
  - en resplandor
  - en brillo
  lexicon: BDAG
  rationale: La frase preposicional especifica el respecto de la diferencia. “En gloria” mantiene la repetición del término clave δόξα y su cohesión verbal con el resto del verso.
theological_decisions:
- issue: Valor de δόξα en una analogía cósmica dentro del argumento sobre la resurrección
  english_pob_reading: glory
  chosen_spanish_reading: gloria
  alternative_spanish_readings:
  - esplendor
  - resplandor
  - brillo
  rationale: Aunque el referente inmediato es la luminosidad de los cuerpos celestes, Pablo usa el mismo término que en el argumento sobre los cuerpos resucitados. Traducirlo como “gloria” preserva la continuidad retórica y teológica; las otras opciones aclaran la dimensión visible, pero reducirían el eco léxico del pasaje.
  doctrine_reference: Translation philosophy §5 (consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: La revisión inglesa más reciente no introdujo cambios; el texto se mantiene con acuerdo alto y sin revisiones aplicadas.
  spanish_consistency_notes:
  - Se conserva la repetición de δόξα con “gloria” y “en gloria” para sostener la cohesión del verso.
  - Se usa “otra” para reflejar la serie contrastiva ἄλλη... ἄλλη... ἄλλη sin calco rígido.
  - La comparación final se mantiene en singular (“una estrella difiere de otra”) para reflejar ἀστὴρ ... ἀστέρος.
