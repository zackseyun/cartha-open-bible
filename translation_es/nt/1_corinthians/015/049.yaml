translation:
  language: es
  text: Y así como hemos llevado la imagen del hombre de polvo[a], también llevaremos la imagen del hombre celestial.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Algunos manuscritos leen: «llevemos también la imagen del hombre celestial».'
    reason: textual_variant
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: y así como
  alternatives_spanish:
  - así como
  - del mismo modo que
  lexicon: BDAG
  rationale: La comparación causal/correlativa del griego se expresa con naturalidad en español con «y así como», manteniendo la correspondencia entre la condición adámica presente/pasada y la conformidad futura con Cristo.
- source_word: ἐφορέσαμεν
  english_pob_choice: we have borne
  chosen_spanish: hemos llevado
  alternatives_spanish:
  - hemos soportado
  - llevamos
  - hemos portado
  lexicon: BDAG
  rationale: φορέω aquí comunica haber llevado o portado una imagen/forma; «hemos llevado» conserva el valor perfecto experiencial y evita un giro demasiado literal o técnico en español.
- source_word: εἰκόνα
  english_pob_choice: image
  chosen_spanish: imagen
  alternatives_spanish:
  - semejanza
  - forma
  lexicon: BDAG
  rationale: «Imagen» reproduce el término básico εἰκών y preserva el contraste tipológico con el primer y el segundo hombre sin añadir matices no explícitos en el texto.
- source_word: τοῦ χοϊκοῦ
  english_pob_choice: of the man of dust
  chosen_spanish: del hombre de polvo
  alternatives_spanish:
  - del terrenal
  - del hecho de polvo
  - del hombre terrenal
  lexicon: BDAG
  rationale: χοϊκός alude a lo hecho de polvo, con eco de Génesis. En español, «hombre de polvo» mantiene la imagen y hace explícito el referente humano que el inglés POB también añadió para preservar el contraste adámico.
- source_word: φορέσομεν
  english_pob_choice: we will also bear
  chosen_spanish: también llevaremos
  alternatives_spanish:
  - también portaremos
  - llevemos también
  lexicon: BDAG
  rationale: El futuro indicativo del texto crítico expresa promesa/certeza futura; «también llevaremos» conserva esa lectura. Se evita adoptar la variante exhortativa en el cuerpo principal.
- source_word: τοῦ ἐπουρανίου
  english_pob_choice: of the heavenly man
  chosen_spanish: del celestial
  alternatives_spanish:
  - del hombre celestial
  - del ser celestial
  lexicon: BDAG
  rationale: ἐπουράνιος significa «celestial/heavenly». Aquí el sustantivo «hombre» se sobreentiende por paralelismo con «hombre de polvo»; mantener solo «el celestial» evita sobrecargar la línea y deja el paralelismo implícito, aunque no menos claro en español.
theological_decisions:
- issue: Lectura futura indicativa frente a variante exhortativa en el segundo verbo
  english_pob_reading: we will also bear
  chosen_spanish_reading: también llevaremos
  alternative_spanish_readings:
  - llevemos también
  rationale: El texto base leído por SBLGNT usa futuro indicativo, adecuado al argumento paulino sobre la conformidad futura con el hombre celestial. La lectura exhortativa se conserva como variante, no como texto principal, para no resolver indebidamente la tensión textual.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el audit trail inglés; no hubo revisiones posteriores aplicadas en el paquete fuente, y la nota textual del subjuntivo exhortativo se preservó como variante.
  spanish_consistency_notes:
  - Se mantuvo «imagen» para εἰκών en coherencia con el uso POB en español.
  - Se eligió «llevaremos» para el futuro indicativo del texto crítico, en paralelo con el inglés POB.
  - Se conservó la metáfora adámica con «hombre de polvo» para no diluir el eco de Génesis.
  - «Celestial» se usa como adjetivo sustantivado porque el griego carece de un sustantivo explícito en la segunda mitad, y el paralelismo con la primera cláusula lo suple.
