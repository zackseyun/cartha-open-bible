revisions:
- from: Y así como hemos llevado la imagen del hombre de polvo[a], también llevaremos la imagen del celestial.
  to: Y así como hemos llevado la imagen del hombre de polvo[a], también llevaremos la imagen del hombre celestial.
  rationale: Se recomienda una reparación menor para explicitar «hombre» en la segunda frase, siguiendo el paralelismo contextual del pasaje y la decisión documentada en el English POB. Esto aumenta la claridad y la simetría sin apartarse del griego ni del estilo natural del español.
