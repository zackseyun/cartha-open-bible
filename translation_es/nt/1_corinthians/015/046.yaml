translation:
  language: es
  text: Pero lo espiritual no es primero[a], sino lo natural[b]; después lo espiritual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el cuerpo espiritual». Pablo omite la palabra «cuerpo» aquí, aunque es explícita en el contexto circundante.
    reason: alternative_reading
  - marker: b
    text: «Natural» traduce el griego psychikon, que indica lo perteneciente a la vida animada ordinaria; alternativamente, más literalmente, «anímico».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ οὐ ... ἀλλὰ
  english_pob_choice: But ... not ... but
  chosen_spanish: Pero ... no ... sino
  alternatives_spanish:
  - Pero ... no ... pero
  - Sin embargo ... no ... sino
  lexicon: BDAG
  rationale: La estructura griega es una corrección contrastiva; en español, «sino» expresa mejor el giro correctivo que un segundo «pero», y «Pero» al inicio mantiene el contraste directo.
- source_word: πρῶτον
  english_pob_choice: first
  chosen_spanish: primero
  alternatives_spanish:
  - en primer lugar
  - antes
  lexicon: BDAG
  rationale: Adverbio de orden temporal/secuencial. «Primero» es la equivalencia más natural y clara en español para el orden de la afirmación de Pablo.
- source_word: τὸ πνευματικόν
  english_pob_choice: the spiritual
  chosen_spanish: lo espiritual
  alternatives_spanish:
  - el espiritual
  - lo espiritual (cuerpo espiritual)
  lexicon: BDAG
  rationale: El artículo neutro y el adjetivo funcionan sustantivadamente. «Lo espiritual» conserva la tersura del griego y evita introducir «cuerpo» donde el texto no lo dice explícitamente.
- source_word: τὸ ψυχικόν
  english_pob_choice: the natural
  chosen_spanish: lo natural
  alternatives_spanish:
  - lo anímico
  - lo psíquico
  - lo de la vida ordinaria
  lexicon: BDAG
  rationale: ψυχικός aquí contrasta con πνευματικός y señala lo perteneciente a la vida animada ordinaria. «Lo natural» es claro en español y preserva el contraste sin sonar peyorativo.
- source_word: ἔπειτα
  english_pob_choice: afterward
  chosen_spanish: después
  alternatives_spanish:
  - luego
  - después de eso
  lexicon: BDAG
  rationale: Marca secuencia posterior. «Después» es breve, natural y fiel al valor temporal del término.
theological_decisions:
- issue: Contraste entre ψυχικόν y πνευματικόν en el argumento de la resurrección
  english_pob_reading: 'A contrast of sequential modes/orders of human existence: the natural/animate comes first, then the spiritual.'
  chosen_spanish_reading: 'Un contraste de orden secuencial en la existencia humana: primero lo natural/animado, luego lo espiritual.'
  alternative_spanish_readings:
  - Un contraste entre el cuerpo natural y el cuerpo espiritual
  - Un contraste entre personas naturales y espirituales
  rationale: El versículo omite «cuerpo», aunque el contexto inmediato lo desarrolla en vv. 44–49. La traducción conserva los sustantivos abstractos para no restringir prematuramente el alcance del argumento de Pablo, pero sigue encajando con la teología de la resurrección del pasaje.
  doctrine_reference: 1 Corintios 15:44–49; mantener la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se corrigió la validación anterior anclando cada nota al texto mediante [a] y [b], y se mantuvo el contraste griego directo entre πνευματικόν y ψυχικόν sin añadir «cuerpo» al texto principal.
  spanish_consistency_notes:
  - Se usó «lo espiritual» y «lo natural» para conservar el paralelismo substantivado del griego.
  - Se prefirió «sino» para reflejar la corrección contrastiva de ἀλλὰ.
  - Se mantuvo una secuencia temporal simple con «después» para ἔπειτα.
  - No se introdujo «cuerpo» en el texto principal para respetar la omisión explícita del versículo.
