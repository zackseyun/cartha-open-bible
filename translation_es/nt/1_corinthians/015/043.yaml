translation:
  language: es
  text: Es sembrado en deshonra; es levantado en gloria. Es sembrado en debilidad; es levantado en poder.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: σπείρεται
  english_pob_choice: it is sown
  chosen_spanish: es sembrado
  alternatives_spanish:
  - es plantado
  lexicon: BDAG
  rationale: Conserva el pasivo y la metáfora agrícola de semilla/cuerpo que domina el contexto inmediato. «Es sembrado» suena natural en español y mantiene mejor la imagen paulina que «es plantado».
- source_word: ἀτιμίᾳ
  english_pob_choice: dishonor
  chosen_spanish: deshonra
  alternatives_spanish:
  - vergüenza
  - humillación
  lexicon: BDAG
  rationale: «Deshonra» preserva el contraste directo con «gloria» y refleja con claridad la antítesis del texto griego. «Vergüenza» o «humillación» introducirían matices más subjetivos o emocionales que el término no exige.
- source_word: ἐγείρεται
  english_pob_choice: it is raised
  chosen_spanish: es resucitado
  alternatives_spanish:
  - es levantado
  - es despertado
  lexicon: BDAG
  rationale: En contexto de resurrección, ἐγείρω se traduce con naturalidad como «resucitar» en español. Se conserva la voz pasiva, como en el griego y en la POB inglesa, dejando implícita la agencia divina.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es la equivalencia más estable y teológicamente cargada en español para δόξα. Mantiene el paralelismo con «deshonra» sin debilitar la fuerza del contraste.
- source_word: ἀσθενείᾳ
  english_pob_choice: weakness
  chosen_spanish: debilidad
  alternatives_spanish:
  - fragilidad
  - enfermedad
  - impotencia
  lexicon: BDAG
  rationale: «Debilidad» comunica el sentido más directo y amplio del término, y funciona bien en el paralelismo con «poder». «Fragilidad» sería posible, pero estrecha más el campo semántico.
- source_word: δυνάμει
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - potencia
  - mismo poder
  lexicon: BDAG
  rationale: «Poder» es el correlato más natural de «debilidad» en español y conserva el valor paulino de δύναμις. «Fuerza» suena más físico y menos abarcador.
theological_decisions:
- issue: Voz pasiva y agencia en la resurrección
  english_pob_reading: Use passive forms ('it is raised') without explicitly naming God as the agent in the main text.
  chosen_spanish_reading: Usar pasivos («es sembrado», «es resucitado») sin nombrar explícitamente a Dios como agente en el texto principal.
  alternative_spanish_readings:
  - Dios lo resucita
  - Dios lo levanta
  rationale: El griego mantiene el pasivo en ambos miembros; la versión española conserva esa forma para no añadir una agencia explícita que el versículo no enuncia. La acción divina queda implícita, como en el original y en la POB inglesa.
  doctrine_reference: '1 Corintios 15:43; Translation philosophy #1 y #3'
- issue: Referente del sujeto implícito
  english_pob_reading: Render the implied subject as 'it,' referring to the body from the immediate context.
  chosen_spanish_reading: Mantener un sujeto implícito en la forma verbal, referido al cuerpo del contexto inmediato.
  alternative_spanish_readings:
  - el cuerpo es sembrado ... el cuerpo es resucitado
  - se siembra el cuerpo ... se resucita el cuerpo
  rationale: En español el sujeto puede quedar implícito de manera natural. Esto evita repetir «el cuerpo» cuatro veces, pero sigue remitiendo con claridad al cuerpo mencionado en el contexto cercano.
  doctrine_reference: '1 Corintios 15:35-44; Translation philosophy #6'
translation_notes:
  revision_awareness: 'El pasaje coincide plenamente con la revisión más reciente: la POB inglesa quedó sin cambios tras la última pasada, y el texto griego SBLGNT confirma la continuidad del paralelismo pasivo y las cuatro correspondencias léxicas principales (σπείρεται/ἐγείρεται, ἀτιμίᾳ/δόξῃ, ἀσθενείᾳ/δυνάμει).'
  spanish_consistency_notes:
  - Se mantiene el paralelismo sintáctico entre las dos cláusulas dobles para reflejar la estructura del griego.
  - Se evita «SEÑOR» u otra convención de máscara, porque aquí no aparece el nombre divino ni κύριος.
  - «Resucitado» se prefiere sobre «levantado» para hacer explícito el sentido resurreccional del contexto paulino.
  - «Deshonra» y «gloria» conservan la antítesis semántica fuerte del verso.
  - No se introducen notas al pie porque no hay una variante textual o lectura alternativa que deba reflejarse en el texto español principal.
