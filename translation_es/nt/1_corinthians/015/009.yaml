  glossary_alignment: No hay conflictos con la terminología del proyecto. 'apóstol', 'digno', 'iglesia de Dios' y 'Porque' están bien. La nota léxica sobre ἱκανός puede mantenerse, aunque 'apto' y 'capaz' funcionan como alternativas más semánticas que contextuales.
