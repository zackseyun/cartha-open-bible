translation:
  language: es
  text: Porque yo soy el menor[a] de los apóstoles, que no soy digno de ser llamado apóstol, porque perseguí la iglesia de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'apto' o 'capaz' para ser llamado apóstol.
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Conserva la conexión explicativa con el contexto previo y suena natural en español sin perder el valor de enlace argumentativo.
- source_word: ἐλάχιστος
  english_pob_choice: least
  chosen_spanish: el más pequeño
  alternatives_spanish:
  - el menor
  - el último
  lexicon: BDAG
  rationale: Aquí el griego expresa el rango más bajo entre los apóstoles. En español, "el más pequeño" comunica la idea de menor estatus sin forzar una calca demasiado idiomática; se mantiene la humildad comparativa del texto.
- source_word: ἀποστόλων
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG
  rationale: El contexto señala el grupo apostólico reconocido, no un sentido genérico de mensajero. "Apóstoles" preserva el sentido técnico eclesial.
- source_word: ἱκανός
  english_pob_choice: worthy
  chosen_spanish: digno
  alternatives_spanish:
  - apto
  - capaz
  - suficiente
  lexicon: BDAG
  rationale: En esta declaración de humildad moral, "digno" refleja bien la falta de idoneidad para portar el título, sin resolver la posible tensión semántica entre suficiencia y merecimiento.
- source_word: καλεῖσθαι
  english_pob_choice: to be called
  chosen_spanish: ser llamado
  alternatives_spanish:
  - ser nombrado
  - ser designado
  lexicon: BDAG
  rationale: Mantiene de forma directa la pasiva infinitiva del griego y es completamente natural en español.
- source_word: ἐδίωξα
  english_pob_choice: I persecuted
  chosen_spanish: perseguí
  alternatives_spanish:
  - hostigué
  - acosé
  lexicon: BDAG
  rationale: El verbo expresa acción hostil contra la comunidad creyente. "Perseguí" conserva la fuerza histórica y teológica del recuerdo paulino.
- source_word: ἐκκλησίαν τοῦ θεοῦ
  english_pob_choice: the church of God
  chosen_spanish: la iglesia de Dios
  alternatives_spanish:
  - la asamblea de Dios
  - la congregación de Dios
  lexicon: BDAG
  rationale: Se preserva el término eclesial ya asentado en español bíblico, y el genitivo se mantiene literalmente para reflejar la pertenencia a Dios.
theological_decisions:
- issue: Relación entre la autodefinición de Pablo y su afirmación de apostolado
  english_pob_reading: Paul affirms that he truly is an apostle while expressing humility about his worthiness to bear the title.
  chosen_spanish_reading: Pablo se incluye realmente entre los apóstoles, pero expresa humildad respecto de su dignidad para llevar ese título.
  alternative_spanish_readings:
  - Pablo niega que sea apóstol
  - Pablo solo habla de inferioridad social, no de indignidad moral
  rationale: La primera cláusula afirma pertenencia al grupo apostólico; la segunda introduce una evaluación personal de indignidad ligada a su persecución previa. La traducción debe conservar ambas afirmaciones sin suavizar la tensión.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: El pasaje coincide con el texto base auditado y no requiere revisión sustantiva; la traducción mantiene el paralelismo entre la autoidentificación humilde de Pablo y la razón explícita de su indignidad, tal como en el original y en el inglés POB.
  spanish_consistency_notes:
  - Se mantiene "Dios" para θεός y "iglesia" para ἐκκλησία, conforme al uso bíblico común en español.
  - '"Apóstoles" conserva el valor técnico del término y evita una generalización a "mensajeros".'
  - La nota lexical se ancla en "digno" para reflejar la alternativa semántica de ἱκανός sin forzar una sola lectura.
