    issue: '''el más pequeño'' para ἐλάχιστος'
    rationale: Aunque comprensible, en español puede sugerir tamaño más que estatus relativo. Dado que Pablo habla de su posición entre los apóstoles, 'el menor' es más idiomático y fiel al matiz contextual preservado por el inglés 'least'.
