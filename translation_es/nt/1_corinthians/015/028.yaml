revisions:
- from: Pero cuando todas las cosas le sean sujetadas[a], entonces el Hijo mismo también será sujeto al que le sujetó todas las cosas[b], para que Dios sea todo en todos.
  to: Pero cuando todas las cosas le sean sometidas[a], entonces el Hijo mismo también será sometido al que sometió todas las cosas a él, para que Dios sea todo en todos[b].
  rationale: La revisión mantiene el sentido del original y las decisiones del POB, pero corrige giros españoles poco naturales o ambiguos. «Someter»/«ser sometido» refleja mejor y de forma consistente el verbo ὑποτάσσω en ambas ocurrencias. La relativa se aclara con «a él». La nota b se corrige para que ofrezca una alternativa real y útil.
