    text: O «para que Dios sea todo en todo». La expresión griega es compacta y puede traducirse más literalmente como «todo en todos» o «todo en todo»; «todo en todos» conserva bien su fuerza retórica en español.
    reason: alternative_reading
  revision_rationale: La revisión mantiene el sentido del original y las decisiones del POB, pero corrige giros españoles poco naturales o ambiguos. «Someter»/«ser sometido» refleja mejor y de forma consistente el verbo ὑποτάσσω en ambas ocurrencias. La relativa se aclara con «a él». La nota b se corrige para que ofrezca una alternativa real y útil.
