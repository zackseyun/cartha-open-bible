review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: cláusula temporal con ὅταν, repetición de τὰ πάντα, énfasis en «el Hijo mismo», y finalidad «para que Dios sea…». Sin embargo, dos elecciones españolas no preservan con suficiente fidelidad ni naturalidad la voz pasiva repetida de ὑποτάσσω: «será sujeto» suena poco idiomático y menos claro que «será sometido», y «al que le sujetó todas las cosas» es ambiguo en español porque «le» puede sonar impropio o confuso; conviene explicitar «al que sometió todas las cosas a él».'
  spanish_quality_summary: 'El texto es mayormente legible, pero presenta giros algo rígidos o poco naturales para español bíblico contemporáneo: «le sean sujetadas» y sobre todo «será sujeto»/«al que le sujetó» resultan pesados y potencialmente ambiguos. Una revisión mínima puede mantener la consistencia léxica y mejorar la claridad sin perder dignidad.'
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto: θεός = «Dios», υἱός = «Hijo». La consistencia léxica interna de ὑποτάσσω mejora si se usa «someter»/«ser sometido» en ambas ocurrencias. «Todas las cosas» y «todo en todos» preservan bien el alcance universal documentado. La nota b del borrador está mal formulada porque presenta como alternativa exactamente la misma frase principal; debe reflejar la alternativa documentada del inglés.'
  issues:
  - severity: medium
    issue: «será sujeto» no es la mejor representación española de ὑποταγήσεται
    rationale: Aunque formalmente posible, en español moderno suena forzado y menos claro que «será sometido» o «será puesto en sujeción». El griego es pasivo futuro y pide una formulación pasiva idiomática.
  - severity: medium
    issue: «al que le sujetó todas las cosas» es ambiguo y poco natural
    rationale: La combinación «le sujetó» puede interpretarse torpemente en español. El participio sustantivado τῷ ὑποτάξαντι αὐτῷ τὰ πάντα se expresa con más claridad como «al que sometió todas las cosas a él».
  - severity: medium
    issue: La nota b repite el texto principal en vez de ofrecer una verdadera alternativa
    rationale: 'El borrador dice «O “Dios sea todo en todos”» cuando el texto principal ya dice eso. La nota debe reflejar la alternativa documentada: una forma más literal como «todo en todo» o explicar la compactación de la frase griega.'
  revised_spanish_text: Pero cuando todas las cosas le sean sometidas[a], entonces el Hijo mismo también será sometido al que sometió todas las cosas a él, para que Dios sea todo en todos[b].
  revised_footnotes:
