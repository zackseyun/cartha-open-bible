translation:
  language: es
  text: Pero cuando todas las cosas le sean sometidas[a], entonces el Hijo mismo también será sometido al que sometió todas las cosas a él, para que Dios sea todo en todos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «todo»; el griego repite «todas las cosas» (τὰ πάντα), preservando el alcance cósmico del argumento de Pablo.
    reason: lexical_alternative
  - marker: b
    text: O «para que Dios sea todo en todo». La expresión griega es compacta y puede traducirse más literalmente como «todo en todos» o «todo en todo»; «todo en todos» conserva bien su fuerza retórica en español.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅταν δὲ
  english_pob_choice: But when
  chosen_spanish: Pero cuando
  alternatives_spanish:
  - Y cuando
  - Ahora cuando
  lexicon: BDAG
  rationale: ὅταν introduce una cláusula temporal; δὲ funciona como transición/adversativo leve. «Pero cuando» conserva el giro argumental y la progresión del texto.
- source_word: ὑποταγῇ
  english_pob_choice: are subjected
  chosen_spanish: le sean sujetadas
  alternatives_spanish:
  - sean puestas en sujeción
  - sean subordinadas
  lexicon: BDAG
  rationale: El aoristo pasivo subjuntivo pide una forma pasiva en español. «Le sean sujetadas» conserva la pasividad y el vínculo con el objeto indirecto αὐτῷ.
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  lexicon: BDAG
  rationale: 'El dativo se expresa naturalmente con dativo ético/indirecto en español: «le». Mantiene la referencia al Hijo en el contexto.'
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo creado
  lexicon: BDAG
  rationale: La expresión neutra plural repetida en el pasaje conserva su amplitud cósmica. «Todas las cosas» preserva la repetición formal y el alcance universal.
- source_word: τότε
  english_pob_choice: then
  chosen_spanish: entonces
  alternatives_spanish:
  - en ese momento
  lexicon: BDAG
  rationale: Adverbio temporal de secuencia; «entonces» es natural y exacto.
- source_word: αὐτὸς ὁ υἱός
  english_pob_choice: the Son himself
  chosen_spanish: el Hijo mismo
  alternatives_spanish:
  - el mismo Hijo
  - el Hijo personalmente
  lexicon: BDAG
  rationale: El énfasis de αὐτός se conserva con «mismo», que resalta al sujeto sin añadir explicación.
- source_word: ὑποταγήσεται
  english_pob_choice: will also be subjected
  chosen_spanish: será sujeto
  alternatives_spanish:
  - será puesto en sujeción
  - se someterá
  lexicon: BDAG
  rationale: El futuro pasivo de ὑποτάσσω se refleja con una pasiva en español. «Será sujeto» mantiene la fuerza lexical del verbo sin convertirlo en voz media activa. Se omite un «también» explícito porque la secuencia discursiva ya lo comunica y el español fluye mejor así.
- source_word: τῷ ὑποτάξαντι
  english_pob_choice: to the one who subjected
  chosen_spanish: al que le sujetó
  alternatives_spanish:
  - al que lo sujetó
  - al que sujetó
  lexicon: BDAG
  rationale: El participio aoristo sustantivado se traduce por una relativa natural. «Le sujetó» conserva la referencia a la relación de sujeción y evita perder el paralelo con el verbo anterior.
- source_word: ἵνα ᾖ
  english_pob_choice: so that ... may be
  chosen_spanish: para que ... sea
  alternatives_spanish:
  - a fin de que ... sea
  - con el fin de que ... sea
  lexicon: BDAG
  rationale: ἵνα expresa propósito o resultado. «Para que ... sea» es la forma más natural y fiel en español.
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Traducción directa y estándar de θεός como sujeto nominativo.
- source_word: πάντα ἐν πᾶσιν
  english_pob_choice: all in all
  chosen_spanish: todo en todos
  alternatives_spanish:
  - todo en todo
  - todo en cada uno
  lexicon: BDAG
  rationale: La fórmula compacta se reproduce con un equivalente breve que conserva la fuerza retórica. «Todo en todos» mantiene la densidad de la expresión sin expandirla innecesariamente.
theological_decisions:
- issue: Relación de la sujeción del Hijo al Padre/Dios
  english_pob_reading: Render the text straightforwardly as the Son being subjected to God/the one who subjected all things to him, without explanatory additions that would imply inferiority of essence or deny personal distinction.
  chosen_spanish_reading: Traducir de forma directa que el Hijo será sujeto al que le sujetó todas las cosas, sin añadir aclaraciones doctrinales en la línea principal.
  alternative_spanish_readings:
  - Parafrasear para evitar toda idea de sujeción
  - Explicar en el texto principal que se trata solo de una subordinación económica
  rationale: El versículo afirma con claridad la sujeción futura del Hijo dentro del argumento escatológico de Pablo. La traducción debe conservar esa afirmación sin suavizarla ni resolver la tensión teológica en la línea principal.
  doctrine_reference: Credo Niceno-Constantinopolitano (381); Definición de Calcedonia (451); principio de traducir preservando la tensión bíblica.
- issue: Alcance de τὰ πάντα / πάντα ἐν πᾶσιν
  english_pob_reading: Use the comprehensive wording 'all things' and 'all in all' to preserve Paul's universal scope.
  chosen_spanish_reading: Conservar «todas las cosas» y «todo en todos» para mantener el alcance universal de Pablo.
  alternative_spanish_readings:
  - todo
  - todo en cada uno
  - todo en todo
  rationale: La repetición de πᾶς enfatiza la amplitud cósmica del argumento. La traducción debe preservar ese alcance sin restringirlo a personas o a un sentido menor.
  doctrine_reference: Consistencia terminológica de los términos clave, salvo excepción documentada.
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a] y [b] exactamente en el texto español, de modo que cada nota queda anclada en su lugar correspondiente.
  spanish_consistency_notes:
  - Se mantuvo Yahvé no aplicable aquí; θεός se traduce como «Dios».
  - Se conservó la pasiva de ὑποτάσσω con «ser sujeto» / «le sean sujetadas» para respetar la fuerza lexical del original.
  - La expresión final se dejó breve para preservar la fórmula paulina compacta y su alcance universal.
