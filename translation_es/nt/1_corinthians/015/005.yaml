translation:
  language: es
  text: y que se apareció a Cefas[a][b], luego a los doce[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue visto por Cefas». El verbo griego es formalmente pasivo, pero en contextos de aparición del resucitado se vierte con frecuencia «se apareció».'
    reason: lexical_alternative
  - marker: b
    text: Cefas es el nombre arameo correspondiente a Pedro.
    reason: cross_reference
  - marker: c
    text: «Los doce» es la designación establecida del círculo apostólico de Jesús, aunque el grupo no fuera numéricamente doce en todos los momentos.
    reason: cultural_note
lexical_decisions:
- source_word: ὤφθη
  english_pob_choice: appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - fue visto
  - se dejó ver
  lexicon: BDAG
  rationale: En contextos de apariciones del resucitado, el aoristo pasivo de ὁράω suele verterse con un verbo que exprese manifestación visible. «Se apareció» conserva la fuerza del evento y es natural en español; «fue visto» suena más pasivo y puede desdibujar el matiz de aparición.
- source_word: Κηφᾷ
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Se translitera el nombre propio tal como aparece en el griego, sin armonizarlo con el equivalente más conocido «Pedro». «Cefas» preserva la forma del texto fuente y la conexión con la tradición aramea.
- source_word: εἶτα
  english_pob_choice: then
  chosen_spanish: luego
  alternatives_spanish:
  - después
  - entonces
  lexicon: BDAG
  rationale: La partícula marca secuencia en la tradición enumerada por Pablo. «Luego» comunica con claridad el orden temporal en español sin añadir matices que el griego no exige.
- source_word: τοῖς δώδεκα
  english_pob_choice: the twelve
  chosen_spanish: los doce
  alternatives_spanish:
  - los Doce
  - los doce apóstoles
  lexicon: BDAG
  rationale: Se mantiene la designación tradicional del grupo apostólico en forma literal. «Los doce» respeta el valor de título colectivo del griego y evita armonizar la cifra con reconstrucciones históricas externas.
theological_decisions:
- issue: Lenguaje de la aparición del resucitado
  english_pob_reading: he appeared
  chosen_spanish_reading: se apareció
  alternative_spanish_readings:
  - fue visto
  - se manifestó
  rationale: El versículo afirma una aparición posresurrección sin explicar el modo exacto. «Se apareció» conserva la afirmación histórica y la tensión teológica del texto, sin reducirla a una mera percepción humana.
  doctrine_reference: Preservar la tensión teológica en relatos de resurrección.
- issue: Designación fija de la comunidad apostólica
  english_pob_reading: the twelve
  chosen_spanish_reading: los doce
  alternative_spanish_readings:
  - los Doce
  - los once
  rationale: El griego emplea τοῖς δώδεκα como designación establecida. Traducir literalmente evita suavizar o corregir el término según cronologías de otros pasajes y preserva el uso tradicional del título.
  doctrine_reference: Primacía del texto fuente sobre armonizaciones secundarias.
translation_notes:
  revision_awareness: El pasaje coincide con el contexto de revisión de alta concordancia; no se registran cambios respecto del audit trail inglés y no se requiere ajuste adicional.
  spanish_consistency_notes:
  - 'Se conserva el orden lógico del original: «y que... luego...».'
  - Se mantiene la transliteración «Cefas» en lugar de «Pedro» para respetar la forma griega.
  - La minúscula en «los doce» sigue el uso corriente en una traducción corrida, sin perder el valor de título colectivo.
