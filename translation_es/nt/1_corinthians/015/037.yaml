translation:
  language: es
  text: Y lo que siembras, no siembras el cuerpo que será, sino un simple grano[a], quizá de trigo o de alguna otra clase[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «grano desnudo» o «semilla».
    reason: lexical_alternative
  - marker: b
    text: O «quizá de trigo, o de alguna otra clase».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπείρεις
  english_pob_choice: you sow
  chosen_spanish: siembras
  alternatives_spanish:
  - plantas
  lexicon: BDAG
  rationale: El verbo agrícola conserva la imagen paulina de la siembra y mantiene la continuidad metafórica del argumento sobre la resurrección. «Siembras» es el equivalente natural y directo en español.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - forma
  lexicon: BDAG
  rationale: «Cuerpo» conserva el peso terminológico paulino y la conexión con la resurrección corporal. «Forma» debilitaría esa relación.
- source_word: τὸ γενησόμενον
  english_pob_choice: that will be
  chosen_spanish: que ha de ser
  alternatives_spanish:
  - que será
  - que ha de llegar a ser
  lexicon: BDAG
  rationale: La forma participial futura de γίνομαι apunta a lo que llegará a existir. «Que ha de ser» mantiene la orientación futura sin sonar forzado en español.
- source_word: γυμνὸν
  english_pob_choice: bare
  chosen_spanish: desnudo
  alternatives_spanish:
  - desnudo y simple
  - vacío
  lexicon: BDAG
  rationale: «Desnudo» transmite la idea de κάτι sin cobertura o envoltura; en este contexto, unido al grano, conserva el contraste con el cuerpo futuro. Aunque «bare» en inglés se vierte a menudo como «desnudo» o «pelado», aquí «desnudo» resulta más natural que «pelado».
- source_word: κόκκον
  english_pob_choice: kernel
  chosen_spanish: grano
  alternatives_spanish:
  - semilla
  - grano/semilla
  lexicon: BDAG
  rationale: El griego puede referirse a un grano o kernel. En español, «grano» reproduce con precisión la imagen concreta sin introducir la ambigüedad de «semilla» ni sonar demasiado técnico.
- source_word: εἰ τύχοι
  english_pob_choice: perhaps
  chosen_spanish: quizá
  alternatives_spanish:
  - tal vez
  - quizá sea
  lexicon: BDAG
  rationale: El modismo expresa contingencia ilustrativa, no una condición estricta. «Quizá» reproduce bien el matiz de ejemplo probable o posible.
- source_word: σίτου
  english_pob_choice: of wheat
  chosen_spanish: de trigo
  alternatives_spanish:
  - de cereal
  - de grano
  lexicon: BDAG
  rationale: Aquí σίτου es más probable como trigo concreto que como cereal en general. «Trigo» da el ejemplo concreto que el griego sugiere.
- source_word: τινος τῶν λοιπῶν
  english_pob_choice: of some other kind
  chosen_spanish: de alguna otra clase
  alternatives_spanish:
  - de uno de los otros
  - de otra clase
  lexicon: BDAG
  rationale: La frase indica una clase distinta entre las restantes. «De alguna otra clase» expresa con naturalidad el sentido colectivo de τῶν λοιπῶν sin forzar una enumeración literal.
theological_decisions:
- issue: Continuidad entre el grano sembrado y el cuerpo futuro
  english_pob_reading: Retain 'body' and future-oriented wording without interpreting beyond the metaphor.
  chosen_spanish_reading: Conservar «cuerpo» y la orientación futura sin convertir la metáfora en una paráfrasis doctrinal.
  alternative_spanish_readings:
  - el cuerpo que va a surgir
  - la forma que tendrá después
  rationale: Pablo usa una comparación agrícola para hablar de resurrección. La traducción conserva el término «cuerpo» y el futuro de la frase sin reemplazar la metáfora por una explicación más amplia de la doctrina.
  doctrine_reference: 1 Co 15:35-38; filosofía de equivalencia óptima del POB
translation_notes:
  revision_awareness: La revisión inglesa reciente prefirió un inglés más natural («that will be», «kernel», «some other kind») sin cambiar el sentido. La redacción española sigue esa decisión de naturalidad, pero conserva con precisión la metáfora y los contrastes léxicos del griego.
  spanish_consistency_notes:
  - Se mantuvo «cuerpo» para σῶμα, en línea con el uso paulino dentro de 1 Corintios 15.
  - Se eligió «siembras» para σπείρεις por continuidad con la imagen agrícola del pasaje.
  - «Grano» refleja mejor κόκκον en español aquí que una repetición mecánica de «semilla».
  - «Quizá» reproduce el matiz de contingencia de εἰ τύχοι sin convertirlo en una condición estricta.
  - «De alguna otra clase» preserva el sentido inclusivo de τῶν λοιπῶν.
