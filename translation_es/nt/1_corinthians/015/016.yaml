  source_alignment_summary: 'El borrador refleja bien la estructura lógica del griego: «Porque si» para εἰ γὰρ, «los muertos» para νεκροὶ, y mantiene correctamente la voz pasiva en ambos verbos de resurrección. Sin embargo, no preserva la decisión auditada del proyecto para Χριστός en este versículo, donde el rastro inglés finalmente restauró «Messiah» por política doctrinal y fuerza titular.'
  spanish_quality_summary: 'El español es claro y legible, pero «no son resucitados» suena algo rígido; aun así es aceptable por fidelidad al pasivo. El problema principal es terminológico: «Cristo» contradice la preferencia del proyecto por «Mesías» aquí. Además, la nota al pie actual sobre «resucitados» no aporta una alternativa real útil, pues repite el mismo término y no ayuda al lector.'
  glossary_alignment: 'Desalineado en Χριστός: el proyecto indica traducir el título como «Mesías» salvo excepción documentada, y en este pasaje no hay carve-out válido; el audit trail incluso corrigió una regresión de «Christ» a «Messiah». Los demás términos clave están en línea general con el proyecto.'
