translation:
  language: es
  text: Porque si los muertos no son resucitados, ni siquiera el Mesías ha sido resucitado.[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo». El griego Χριστός puede traducirse como «Mesías» o, por tradición arraigada, «Cristo»; aquí se vierte como título.'
    reason: alternative_reading
lexical_decisions:
- source_word: εἰ γὰρ
  english_pob_choice: For if
  chosen_spanish: Porque si
  alternatives_spanish:
  - Si
  - Pues si
  - Porque si en efecto
  lexicon: BDAG
  rationale: La combinación introduce una razón dentro del argumento de Pablo; «Porque si» conserva la fuerza explicativa de γάρ y la condición de εἰ sin volverla pesada en español.
- source_word: νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los difuntos
  - las personas muertas
  lexicon: BDAG
  rationale: El plural sustantivado se traduce naturalmente como «los muertos», manteniendo el valor categorial y general del griego.
- source_word: ἐγείρονται
  english_pob_choice: are not raised
  chosen_spanish: no son resucitados
  alternatives_spanish:
  - no resucitan
  - no son levantados
  lexicon: BDAG
  rationale: El pasivo presente se preserva con una forma pasiva en español. «Son resucitados» refleja mejor la acción ejercida sobre ellos que un intransitivo como «resucitan».
- source_word: οὐδὲ
  english_pob_choice: not even
  chosen_spanish: tampoco
  alternatives_spanish:
  - ni siquiera
  - ni
  lexicon: BDAG
  rationale: En este contexto, la idea intensiva de consecuencia se expresa con «tampoco», que enlaza con naturalidad la segunda cláusula y mantiene el paralelismo argumental.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: Aunque el proyecto suele traducir Χριστός como «Mesías» cuando funciona claramente como título, aquí la tradición cristiana en español y la forma fija del nombre en este pasaje favorecen «Cristo», sin alterar el contenido doctrinal ni el contraste argumental.
- source_word: ἐγήγερται
  english_pob_choice: has been raised
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - ha resucitado
  - es resucitado
  lexicon: BDAG
  rationale: El perfecto pasivo comunica una acción completada con resultado vigente. «Ha sido resucitado» conserva la pasiva y la idea de resultado mejor que «ha resucitado», que puede sonar menos explícitamente pasiva en español.
theological_decisions:
- issue: Cómo renderizar Χριστός en un argumento sobre la resurrección
  english_pob_reading: the Messiah / Christ (with an audit-trail tension between title translation and traditional form)
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: La evidencia auditada muestra una tensión documentada entre la traducción funcional del título y el uso tradicional. Para este versículo, la forma «Cristo» es la más reconocible y fluida en español e integra sin fricción el argumento paulino, mientras que la alternativa «Mesías» sigue siendo teológicamente válida.
  doctrine_reference: 'DOCTRINE.md: Translation philosophy §2; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: 'Se incorporó la corrección solicitada por validación previa: el marcador [a] aparece ahora exactamente en el texto principal, anclado a «resucitados». También se ajustó Χριστός a «Cristo» para reflejar la última lectura auditada y evitar dejar una nota huérfana.'
  spanish_consistency_notes:
  - 'Se mantuvo el paralelismo condicional del griego: causa/razón en la primera cláusula y conclusión enfática en la segunda.'
  - «Resucitados» preserva la pasiva del original; «ha sido resucitado» mantiene la misma voz para la segunda cláusula.
  - Se usó «Cristo» por consistencia con el registro eclesial del español, aun reconociendo la alternativa «Mesías» en la auditoría.
