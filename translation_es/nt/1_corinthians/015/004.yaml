revisions:
- from: y que fue sepultado[a], y que ha sido resucitado[b] al tercer día, conforme a las Escrituras.
  to: y que fue sepultado, y que resucitó[a] al tercer día, conforme a las Escrituras[b].
  rationale: Se revisa ἐγήγερται a «resucitó» para lograr un español más natural y ampliamente inteligible, mientras se conserva en nota la alternativa más cercana al pasivo/perfecto griego («fue resucitado» / «ha sido resucitado»). Se corrigen las notas para alinearlas con el rastro auditado, especialmente la alternativa de «conforme a las Escrituras». Se elimina la nota innecesaria sobre «sepultado/enterrado», ya que no forma parte del audit trail principal y no añade claridad suficiente.
