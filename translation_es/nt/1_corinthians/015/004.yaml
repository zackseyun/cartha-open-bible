  timestamp: '2026-05-07T21:14:02Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura confesional del griego: repite «y que», mantiene el pasivo en «fue sepultado» y traduce bien «κατὰ τὰς γραφάς» como referencia a las Escrituras. Sin embargo, «ha sido resucitado» para ἐγήγερται, aunque morfológicamente defendible, suena poco natural en español bíblico corriente y no refleja tan bien la formulación establecida y clara de la resurrección en español. Además, las notas al pie están invertidas respecto del texto fuente auditado: la nota sobre alternativa de «conforme a las Escrituras» fue asociada en inglés al primer segmento por error de anclaje, pero en español la nota a «fue sepultado» ofrece «enterrado», lo cual no preserva el rastro auditado principal. Conviene reparar naturalidad y alineación de notas.'
  spanish_quality_summary: El español es claro y digno, pero «ha sido resucitado» resulta pesado y poco idiomático. «ha resucitado» es muy natural pero perdería la pasividad explícita; «fue resucitado» preserva la pasividad, aunque pierde el matiz perfectivo. Dado el equilibrio entre fidelidad y legibilidad, lo mejor es mantener una formulación principal natural y explicar en nota el valor del perfecto/pasivo. También es preferible «según las Escrituras» o «conforme a las Escrituras»; la actual es aceptable. La puntuación y el registro general son buenos.
  glossary_alignment: 'No hay conflictos con la terminología de proyecto. «Escrituras» está bien capitalizado. No aparecen términos sensibles como Yahvé, Mesías, δοῦλος, etc. La principal cuestión léxica es ἐγήγερται: conviene una solución española más natural con nota que preserve la justificación auditada.'
  issues:
  - severity: medium
    issue: «ha sido resucitado» suena forzado en español
    rationale: Aunque preserva voz pasiva y perfecto, en español moderno eclesial suena poco natural. Una traducción principal más idiomática mejora la legibilidad sin negar el matiz, que puede preservarse en nota.
  - severity: high
    issue: Las notas al pie no preservan correctamente el rastro auditado inglés
    rationale: La nota [a] del inglés auditado corresponde a la alternativa «in accordance with the Scriptures», no a una alternativa de «buried». El borrador introduce una nota distinta («enterrado») y omite la alternativa documentada para la frase final.
  - severity: low
    issue: La alternativa «es resucitado» en decisiones léxicas es impropia
    rationale: No debe promoverse como alternativa seria para ἐγήγερται en este contexto; no afecta necesariamente el texto final, pero muestra criterio léxico mejorable.
  revised_spanish_text: y que fue sepultado, y que resucitó[a] al tercer día, conforme a las Escrituras[b].
  revised_footnotes:
  - marker: a
    text: 'O: «fue resucitado». El griego puede también expresarse como «ha sido resucitado»; el perfecto resalta la vigencia presente de la resurrección.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de acuerdo con las Escrituras».'
    reason: lexical_alternative
  revision_rationale: Se revisa ἐγήγερται a «resucitó» para lograr un español más natural y ampliamente inteligible, mientras se conserva en nota la alternativa más cercana al pasivo/perfecto griego («fue resucitado» / «ha sido resucitado»). Se corrigen las notas para alinearlas con el rastro auditado, especialmente la alternativa de «conforme a las Escrituras». Se elimina la nota innecesaria sobre «sepultado/enterrado», ya que no forma parte del audit trail principal y no añade claridad suficiente.
