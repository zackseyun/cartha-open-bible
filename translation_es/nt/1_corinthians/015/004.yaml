translation:
  language: es
  text: y que fue sepultado, y que resucitó[a] al tercer día, conforme a las Escrituras[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fue resucitado». El griego puede también expresarse como «ha sido resucitado»; el perfecto resalta la vigencia presente de la resurrección.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de acuerdo con las Escrituras».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐτάφη
  english_pob_choice: he was buried
  chosen_spanish: fue sepultado
  alternatives_spanish:
  - fue enterrado
  - fue puesto en sepultura
  lexicon: BDAG; θάπτω
  rationale: El aoristo pasivo de θάπτω indica el hecho de ser sepultado. En español, «sepultado» conserva mejor el registro formal y la fuerza pasiva del verbo que una paráfrasis más libre. «Enterrado» también sería posible, pero «sepultado» se alinea mejor con el matiz funerario del contexto paulino.
- source_word: ἐγήγερται
  english_pob_choice: he has been raised
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - fue resucitado
  - ha resucitado
  - es resucitado
  lexicon: BDAG; ἐγείρω
  rationale: El perfecto pasivo expresa una acción completada con vigencia presente. «Ha sido resucitado» preserva la voz pasiva y el valor aspectual mejor que un simple pretérito. «Ha resucitado» suena más idiomático, pero borra el pasivo explícito del griego.
- source_word: τῇ ἡμέρᾳ τῇ τρίτῃ
  english_pob_choice: on the third day
  chosen_spanish: al tercer día
  alternatives_spanish:
  - en el tercer día
  - el tercer día
  lexicon: BDAG; temporal dative idiom
  rationale: La dativo temporal griega se expresa naturalmente en español con «al tercer día». Evita añadir «después» o cualquier precisión cronológica no contenida de forma explícita en el texto.
- source_word: κατὰ τὰς γραφάς
  english_pob_choice: according to the Scriptures
  chosen_spanish: conforme a las Escrituras
  alternatives_spanish:
  - según las Escrituras
  - de acuerdo con las Escrituras
  lexicon: BDAG; γραφή
  rationale: «Conforme a las Escrituras» conserva la idea de correspondencia o cumplimiento sin sonar excesivamente explicativo. «Las Escrituras» comunica el corpus sagrado reconocido en el contexto paulino.
theological_decisions:
- issue: Valor del perfecto pasivo en la resurrección
  english_pob_reading: he has been raised
  chosen_spanish_reading: ha sido resucitado
  alternative_spanish_readings:
  - fue resucitado
  - ha resucitado
  rationale: La forma griega presenta la resurrección como un hecho ya realizado cuyo efecto permanece. En español, el perfecto compuesto pasivo mantiene esa tensión mejor que el pretérito simple. Se conserva además la pasividad del sujeto, coherente con el testimonio paulino de la acción de Dios en la resurrección.
  doctrine_reference: Philippians 2:9-11; Romans 6:4; translation philosophy §§1, 5, 6
- issue: Referencia de «las Escrituras»
  english_pob_reading: the Scriptures
  chosen_spanish_reading: las Escrituras
  alternative_spanish_readings:
  - las Escrituras judías
  - los escritos sagrados
  rationale: No se añade especificación en el texto principal porque el griego nombra el corpus scriptural de forma reconocible para la comunidad paulina. La mayúscula en español marca adecuadamente el referente canónico sin introducir glosa interpretativa.
  doctrine_reference: 1 Corinthians 15:3-4; translation philosophy §§1, 6
translation_notes:
  revision_awareness: Se tuvo en cuenta el control de revisión más reciente, que no indicó cambios necesarios (pass unchanged). También se revisó el informe de concordancia cruzada, que señaló solo cuestiones menores; por ello se mantuvo una solución española transparente y fiel al pasivo perfecto del griego.
  spanish_consistency_notes:
  - Se mantuvo «Escrituras» con mayúscula para el corpus sagrado, en coherencia con el uso confesional del pasaje.
  - Se evitó «Cristo» porque este versículo no contiene Χριστός; el contenido se limita al verbo de sepultura y resurrección, más la referencia a las Escrituras.
  - Se preservó la repetición de «y que» para reflejar la cadencia creedal del griego.
