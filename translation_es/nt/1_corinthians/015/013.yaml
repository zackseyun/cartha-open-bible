translation:
  language: es
  text: Pero si no hay resurrección de los muertos, entonces ni siquiera el Mesías ha sido levantado.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ δὲ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Si, sin embargo
  lexicon: SBLGNT; BDAG
  rationale: εἰ introduce la condición y δέ añade una leve transición adversativa. «Pero si» conserva el giro argumentativo de Pablo con naturalidad en español.
- source_word: ἀνάστασις
  english_pob_choice: resurrection
  chosen_spanish: resurrección
  alternatives_spanish:
  - levantamiento
  - alzamiento
  lexicon: BDAG
  rationale: «Resurrección» es el equivalente directo y establecido para el término paulino, sin perder el contenido doctrinal del pasaje.
- source_word: νεκρῶν
  english_pob_choice: of the dead
  chosen_spanish: de los muertos
  alternatives_spanish:
  - de los fallecidos
  - desde los muertos
  lexicon: BDAG
  rationale: El genitivo plural con ἀνάστασις se refiere a los muertos como clase; «de los muertos» mantiene esa relación sin cambiarla a un matiz de origen.
- source_word: οὐκ ἔστιν
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: BDAG
  rationale: La negación existencial en español se expresa de manera más natural con «no hay», que comunica la inexistencia de la resurrección en la hipótesis del texto.
- source_word: οὐδὲ
  english_pob_choice: then not even
  chosen_spanish: entonces ni siquiera
  alternatives_spanish:
  - y tampoco
  - ni siquiera
  lexicon: BDAG
  rationale: En el argumento inferencial de Pablo, «entonces ni siquiera» hace explícita la consecuencia lógica de la premisa anterior.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», conforme a la pauta del proyecto de traducir el título cuando funciona como designación teológica, no como nombre fijo.
- source_word: ἐγήγερται
  english_pob_choice: has been raised
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - ha resucitado
  - ha sido levantado
  lexicon: BDAG
  rationale: 'El perfecto pasivo de ἐγείρω conserva mejor en español una forma pasiva: «ha sido resucitado». Así se mantiene la acción recibida sin explicitar el agente en el texto.'
theological_decisions:
- issue: Título Χριστός en contexto paulino
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El griego presenta Χριστός como título dentro de una argumentación sobre la identidad y el destino del ungido de Dios. Traducirlo como «el Mesías» preserva ese valor titular y evita convertirlo sin necesidad en un nombre propio litúrgico.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; preservar la fuerza teológica del término'
- issue: Pasiva de ἐγήγερται
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido resucitado
  alternative_spanish_readings:
  - ha resucitado
  rationale: La pasiva sugiere que la resurrección es algo que acontece al Mesías, sin nombrar explícitamente al agente. «Ha sido resucitado» conserva esa tensión y no la aplana en una forma intransitiva.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica cuando la forma verbal la lleva'
translation_notes:
  revision_awareness: El contexto inglés pasó por una revisión que alternó entre «Messiah» y «Christ» por razones de naturalidad y luego restauró «Messiah» por coherencia doctrinal. En español se adopta deliberadamente «el Mesías» para reflejar el valor titular del griego Χριστός y mantener la consistencia del proyecto. También se preserva la voz pasiva de ἐγήγερται, evitando una reformulación activa.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός cuando funciona como título, en línea con la política del proyecto.
  - Se evita «SEÑOR» para el nombre divino, pero este versículo no contiene el tetragrámaton ni κύριος.
  - La pasiva «ha sido resucitado» conserva la relación con el acto de Dios sin añadir el agente en la frase.
  - La formulación «no hay resurrección de los muertos» refleja la negación existencial del griego y su lógica condicional.
