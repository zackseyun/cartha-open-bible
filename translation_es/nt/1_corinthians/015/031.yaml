translation:
  language: es
  text: Cada día muero[a], por la jactancia que tengo en ustedes[b], la que tengo en Mesías Jesús nuestro Señor[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «diariamente muero».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «tan ciertamente como la jactancia que tengo en ustedes» o «por la jactancia de ustedes»; el griego es una fórmula de juramento y la frase sobre la jactancia admite debate sintáctico.'
    reason: alternative_reading
  - marker: c
    text: 'Lectura tradicional: «Cristo Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: καθ’ ἡμέραν
  english_pob_choice: every day
  chosen_spanish: cada día
  alternatives_spanish:
  - diariamente
  - día tras día
  lexicon: BDAG
  rationale: La expresión adverbial indica repetición cotidiana. «Cada día» preserva el valor iterativo con naturalidad en español y evita una rigidez innecesaria.
- source_word: ἀποθνῄσκω
  english_pob_choice: I die
  chosen_spanish: muero
  alternatives_spanish:
  - estoy muriendo
  - me enfrento a la muerte
  lexicon: BDAG
  rationale: El presente indicativo conserva la vividez retórica del griego. En español, «muero» expresa mejor la fuerza literal y enfática que una perífrasis interpretativa.
- source_word: νὴ
  english_pob_choice: by
  chosen_spanish: por
  alternatives_spanish:
  - tan ciertamente como
  - juro por
  lexicon: BDAG
  rationale: La partícula introduce una fórmula de juramento o aseveración enfática. «Por» funciona en español como introducción natural del objeto de la afirmación solemne, sin expandir demasiado el texto principal.
- source_word: τὴν ὑμετέραν καύχησιν
  english_pob_choice: the boasting in you that I have
  chosen_spanish: la gloria en que me glorío respecto de ustedes
  alternatives_spanish:
  - el motivo de mi gloria por ustedes
  - la jactancia que tengo en ustedes
  - su jactancia
  lexicon: BDAG
  rationale: El sintagma es ambiguo y el POB inglés documenta esa tensión. «Gloria» y «me glorío» mantienen el campo semántico de καύχησις sin perder la dimensión relacional; «respecto de ustedes» hace explícito que la referencia es a ellos. Evito resolver de forma cerrada la ambigüedad como si fuera simplemente la jactancia de los corintios o solo el orgullo de Pablo.
- source_word: ἣν ἔχω
  english_pob_choice: that I have
  chosen_spanish: la que tengo
  alternatives_spanish:
  - que poseo
  - que tengo
  lexicon: BDAG
  rationale: La relativa es directa; «la que tengo» suena natural y conserva la relación sintáctica con el sustantivo anterior.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se sigue la convención del proyecto para Χριστός como título mesiánico cuando el contexto lo favorece. «En» se conserva por su peso paulino y relacional.
- source_word: τῷ κυρίῳ ἡμῶν
  english_pob_choice: our Lord
  chosen_spanish: nuestro Señor
  lexicon: BDAG
  rationale: κύριος se vierte como «Señor», y el posesivo queda naturalmente integrado como «nuestro Señor».
theological_decisions:
- issue: Χριστός como título o forma tradicional fija
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: El texto y la política del proyecto favorecen traducir el título cuando conserva su fuerza semántica. «Mesías» evita la transliteración tradicional que puede funcionar como nombre fijo y mantiene visible el sentido titulado.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Ambigüedad de καύχησις con ὑμετέραν
  english_pob_reading: Paul's boasting about the Corinthians
  chosen_spanish_reading: la gloria en que me glorío respecto de ustedes
  alternative_spanish_readings:
  - la gloria de ustedes
  - su gloria
  - mi gloria en ustedes
  rationale: La cláusula relativa «la que tengo» inclina a entender que Pablo habla de algo que posee en relación con ellos. La redacción española conserva la tensión sin eliminar por completo la posibilidad de otras relaciones sintácticas.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; document ambiguity per verse'
translation_notes:
  revision_awareness: 'La redacción española sigue el último estado del audit trail: mantiene la afirmación cotidiana, conserva la fórmula enfática vinculada a καύχησις y adopta Mesías para Χριστός conforme a la restauración del cambio de revisión.'
  spanish_consistency_notes:
  - Se evita «SEÑOR» como máscara para el nombre divino; aquí κύριος se traduce por «Señor» en sentido cristológico, no como sustituto de YHWH.
  - «Cada día muero» se mantuvo en el texto principal con nota alternativa para reflejar la literalidad del presente griego.
  - Se preserva la ambigüedad de καύχησις en una forma que permite lectura relacional sin cerrar el debate sintáctico.
  - No se usó «Cristo» en el texto principal porque el paquete de revisión restauró «Mesías» para Χριστός.
