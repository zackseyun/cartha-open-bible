revisions:
- from: Cada día muero[a], por la gloria en que me glorío respecto de ustedes[b], la que tengo en Mesías Jesús nuestro Señor[c].
  to: Cada día muero[a], por la jactancia que tengo en ustedes[b], la que tengo en Mesías Jesús nuestro Señor[c].
  rationale: Se corrige la expresión de καύχησις para reflejar con más fidelidad la estructura griega y la decisión léxica del POB, evitando la expansión «en que me glorío». También se ajusta la nota [a] para que ofrezca una alternativa real en vez de repetir el texto principal. No se requiere adjudicación adicional porque la revisión es local, clara y coherente con el expediente inglés.
