review_pass:
  verdict: revise
  source_alignment_summary: 'La base del borrador acierta en los elementos principales: «Cada día muero» refleja bien καθ’ ἡμέραν ἀποθνῄσκω; «Mesías Jesús nuestro Señor» preserva correctamente la decisión del POB para Χριστός y κύριος. Sin embargo, la formulación de τὴν ὑμετέραν καύχησιν, ἣν ἔχω no es fiel en su forma actual: «por la gloria en que me glorío respecto de ustedes» introduce un verbo ausente, cambia el sustantivo «boasting/jactancia» por «gloria», y vuelve más enrevesada la sintaxis que el griego y el POB inglés. Conviene volver a una forma más directa que mantenga la ambigüedad documentada sin añadir material interpretativo.'
  spanish_quality_summary: El español es comprensible, pero «por la gloria en que me glorío respecto de ustedes» suena pesado, poco natural y algo tautológico. En registro bíblico actual suena mejor «por la jactancia que tengo en ustedes» o equivalente; conserva mejor la conexión léxica con καύχησις y mejora la legibilidad. El resto del versículo es claro y digno.
  glossary_alignment: 'Buena alineación general con el glosario del proyecto: «Mesías» para Χριστός, «Jesús», «Señor». El problema no es terminológico principal sino léxico-estilístico en καύχησις: el proyecto inglés eligió «boasting» y la nota documenta alternativas; en español «jactancia» o «gloria» pueden funcionar según contexto, pero aquí «gloria en que me glorío» sobretraduce y diluye la decisión auditada. «Jactancia» mantiene mejor la fuerza léxica y la relación con la nota alternativa.'
  issues:
  - severity: medium
    issue: «la gloria en que me glorío respecto de ustedes» añade contenido no expreso
    rationale: El griego tiene un sustantivo con relativa («la jactancia ... que tengo»), no una construcción con verbo reflexivo añadido. «me glorío» es expansión innecesaria.
  - severity: medium
    issue: «gloria» debilita la correspondencia con καύχησις
    rationale: Aunque semánticamente relacionado, «gloria» en español puede sugerir honor o esplendor más que acto/objeto de jactarse. «Jactancia» o «motivo de jactancia» preserva mejor la decisión léxica del POB.
  - severity: low
    issue: La nota [a] repite exactamente el texto principal
    rationale: 'Si el texto principal ya dice «Cada día muero», la nota «O, más literalmente: “cada día muero”» no aporta contraste. Debe ofrecer una alternativa real, p. ej. «diariamente muero».'
  revised_spanish_text: Cada día muero[a], por la jactancia que tengo en ustedes[b], la que tengo en Mesías Jesús nuestro Señor[c].
  revised_footnotes:
