    text: '''I fought with wild beasts'' may be understood literally or as a metaphor for brutal human opposition; the Greek wording itself is left intact in the main text.'
    reason: alternative_reading
  - marker: c
    text: Quotation/allusion to Isaiah 22:13.
    reason: cross_reference
