translation:
  language: es
  text: Si[a], humanamente hablando, luché con fieras en Éfeso, ¿de qué me sirve? Si los muertos no son resucitados[b], «Comamos y bebamos[c], porque mañana moriremos».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O posiblemente: «Si, desde un punto de vista meramente humano, luché con fieras en Éfeso…». La frase puede calificar la manera de hablar o la perspectiva.'
    reason: lexical_alternative
  - marker: b
    text: «Luché con fieras» puede entenderse literalmente o como metáfora de oposición humana brutal; el griego deja intacta la expresión en el texto principal.
    reason: alternative_reading
  - marker: c
    text: Cita o alusión a Isaías 22:13.
    reason: cross_reference
lexical_decisions:
- source_word: κατὰ ἄνθρωπον
  english_pob_choice: speaking in merely human terms
  chosen_spanish: hablé en términos meramente humanos
  alternatives_spanish:
  - desde un punto de vista meramente humano
  - humanamente hablando
  - según el hombre
  lexicon: BDAG
  rationale: La frase funciona como una calificación del modo de hablar o del marco de referencia. En español, 'hablé en términos meramente humanos' conserva esa idea idiomática sin volverla rígida o demasiado literal.
- source_word: ἐθηριομάχησα
  english_pob_choice: I fought with wild beasts
  chosen_spanish: batallé con fieras
  alternatives_spanish:
  - luché con fieras
  - combatí con bestias salvajes
  lexicon: BDAG
  rationale: '''Fieras'' comunica el valor vívido de ἐθηριομάχησα y permite mantener abierta la tensión entre sentido literal y figurado. ''Batallé'' preserva el carácter enérgico de la imagen sin decidirla en la traducción principal.'
- source_word: ἐν Ἐφέσῳ
  english_pob_choice: in Ephesus
  chosen_spanish: en Éfeso
  lexicon: BDAG
  rationale: Nombre propio transliterado de manera estándar en español bíblico.
- source_word: τί μοι τὸ ὄφελος
  english_pob_choice: what does it profit me?
  chosen_spanish: ¿qué me aprovecha?
  alternatives_spanish:
  - ¿qué beneficio tendría para mí?
  - ¿de qué me serviría?
  lexicon: BDAG
  rationale: '''Aprovecha'' reproduce bien la fuerza retórica de la pregunta y el sentido de beneficio/ganancia del sustantivo ὄφελος en un español natural.'
- source_word: νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los que están muertos
  - los difuntos
  lexicon: BDAG
  rationale: En este contexto de resurrección, 'los muertos' es la forma natural y sustantivada en español para el adjetivo griego.
- source_word: ἐγείρονται
  english_pob_choice: are not raised
  chosen_spanish: son resucitados
  alternatives_spanish:
  - son levantados
  - son alzados
  lexicon: BDAG
  rationale: '''Resucitar'' expresa de manera transparente el pasivo de ἐγείρω en el marco paulino de la resurrección, sin oscurecer la agencia divina implícita.'
- source_word: Φάγωμεν καὶ πίωμεν
  english_pob_choice: Let us eat and drink
  chosen_spanish: Comamos y bebamos
  alternatives_spanish:
  - Vamos a comer y beber
  - Comamos, bebamos
  lexicon: BDAG
  rationale: El subjuntivo exhortativo se expresa de forma natural con imperativos de primera persona del plural en español, preservando el tono de consigna citada.
- source_word: αὔριον γὰρ ἀποθνῄσκομεν
  english_pob_choice: for tomorrow we die
  chosen_spanish: porque mañana moriremos
  alternatives_spanish:
  - pues mañana morimos
  - porque mañana estamos por morir
  lexicon: BDAG
  rationale: La forma griega presenta una afirmación proverbial de inminencia futura; 'moriremos' reproduce bien el valor sentencioso y reconoce el eco de Isaías 22:13.
theological_decisions:
- issue: 'ἐθηριομάχησα: lectura literal o metafórica'
  english_pob_reading: Retain the literal lexical rendering 'I fought with wild beasts' in the main text without resolving whether Paul speaks literally or figuratively.
  chosen_spanish_reading: Mantener 'batallé con fieras' sin resolver si la imagen es literal o metafórica.
  alternative_spanish_readings:
  - luché con fieras (literal)
  - luché contra opositores humanos brutales (metafórico)
  rationale: La traducción conserva la imagen del griego y no borra la tensión documentada por la auditoría inglesa. Así se evita imponer una interpretación histórica que el contexto no obliga a decidir.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La versión inglesa auditada fue revisada y quedó sin cambios; el presente borrador sigue esa lectura estable y conserva las dos tensiones principales: el alcance de κατὰ ἄνθρωπον y la posible literalidad/metáfora de ἐθηριομάχησα.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; este versículo no contiene el nombre divino.
  - Se prefirió «resucitados» para ἐγείρονται por claridad en el contexto paulino de la resurrección.
  - Se evitó resolver la imagen de las fieras en el cuerpo principal, manteniendo la tensión interpretativa documentada.
  - Se tradujo la cita proverbial final con un español natural que conserva su tono de sentencia.
