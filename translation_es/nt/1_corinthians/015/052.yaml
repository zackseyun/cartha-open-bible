    rationale: ἐν τῇ ἐσχάτῃ σάλπιγγι se puede verter de manera idiomática sin añadir el sustantivo 'toque'. Aunque la idea es cercana, la formulación añade un elemento no expresado y se aleja del audit trail 'at the last trumpet'.
  - severity: low
