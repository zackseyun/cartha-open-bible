translation:
  language: es
  text: en un instante[a], en un abrir y cerrar de ojos, a la última trompeta. Porque la trompeta sonará, y los muertos serán resucitados incorruptibles, y nosotros seremos cambiados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en el parpadeo de un ojo». El modismo griego expresa una rapidez extrema.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν ἀτόμῳ
  english_pob_choice: in an instant
  chosen_spanish: en un instante
  alternatives_spanish:
  - en un momento
  - en un instante indivisible
  lexicon: BDAG
  rationale: ἄτομος expresa una brevedad extrema de tiempo en este dicho; «en un instante» comunica esa fuerza temporal de manera natural en español sin volverlo técnico ni opaco.
- source_word: ἐν ῥιπῇ ὀφθαλμοῦ
  english_pob_choice: in the blink of an eye
  chosen_spanish: en un abrir y cerrar de ojos
  alternatives_spanish:
  - en el parpadeo de un ojo
  - en el pestañeo de un ojo
  lexicon: BDAG
  rationale: La expresión griega es un modismo de rapidez extrema. «En un abrir y cerrar de ojos» es una equivalencia idiomática clara y natural en español, y conserva el sentido de súbita instantaneidad.
- source_word: ἐν τῇ ἐσχάτῃ σάλπιγγι
  english_pob_choice: at the last trumpet
  chosen_spanish: al toque de la última trompeta
  alternatives_spanish:
  - en la última trompeta
  - con la última trompeta
  lexicon: BDAG
  rationale: La construcción temporal/instrumental se vierte de forma idiomática como «al toque de la última trompeta». Mantiene la referencia escatológica sin añadir un sistema interpretativo ajeno al texto.
- source_word: σαλπίσει
  english_pob_choice: the trumpet will sound
  chosen_spanish: la trompeta sonará
  alternatives_spanish:
  - sonará
  - sonará la trompeta
  lexicon: BDAG
  rationale: El verbo implica tocar o hacer sonar la trompeta. En español, «la trompeta sonará» es la forma más natural y conserva la conexión inmediata con la trompeta mencionada antes.
- source_word: οἱ νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos
  - los que han muerto
  lexicon: BDAG
  rationale: El sustantivo adjetival colectivo se traduce mejor como «los muertos», fórmula natural en español y adecuada al contraste con «nosotros».
- source_word: ἐγερθήσονται
  english_pob_choice: will be raised
  chosen_spanish: serán resucitados
  alternatives_spanish:
  - serán levantados
  - despertarán
  lexicon: BDAG
  rationale: En contexto de resurrección, el pasivo de ἐγείρω se expresa con claridad como «serán resucitados». Aunque «serán levantados» sería más literal, en español puede sonar menos preciso en este pasaje.
- source_word: ἄφθαρτοι
  english_pob_choice: imperishable
  chosen_spanish: incorruptibles
  alternatives_spanish:
  - imperdurables
  - incorruptibles e inmortales
  lexicon: BDAG
  rationale: Ἄφθαρτος indica ausencia de corrupción o decadencia. «Incorruptibles» reproduce con fidelidad el campo semántico y es un término bíblico claro en español.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros
  - nosotros mismos
  lexicon: NA28/SBLGNT context
  rationale: El pronombre explícito debe conservarse para mantener el contraste con «los muertos» y la inclusión pastoral de Pablo en la esperanza escatológica.
- source_word: ἀλλαγησόμεθα
  english_pob_choice: will be changed
  chosen_spanish: seremos cambiados
  alternatives_spanish:
  - seremos transformados
  - cambiaremos
  lexicon: BDAG
  rationale: El futuro pasivo de ἀλλάσσω se vierte directamente como «seremos cambiados». «Seremos transformados» sería posible, pero «cambiados» mantiene mayor continuidad léxica con el verbo griego.
theological_decisions:
- issue: Evitar imponer un esquema escatológico más detallado que el texto
  english_pob_reading: at the last trumpet
  chosen_spanish_reading: al toque de la última trompeta
  alternative_spanish_readings:
  - en la última trompeta
  - con la última trompeta
  rationale: El griego habla simplemente de «la última trompeta». La redacción española debe preservar esa imagen sin concretar más de lo que el versículo dice.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Mantener el alcance del «nosotros» sin explicitar una paráfrasis interpretativa
  english_pob_reading: we will be changed
  chosen_spanish_reading: nosotros seremos cambiados
  alternative_spanish_readings:
  - nosotros seremos transformados
  - los que vivamos entonces seremos cambiados
  rationale: El texto conserva el pronombre de primera persona plural. La traducción no debe ampliarlo con una glosa explicativa que el original no exige.
  doctrine_reference: Never paraphrase beyond what the source text warrants.
translation_notes:
  revision_awareness: El pasaje coincide de forma alta con el texto griego SBLGNT y con el auditable inglés POB; no se documentan revisiones textuales relevantes. La decisión principal en español fue escoger equivalentes idiomáticos naturales para dos modismos de rapidez y mantener la secuencia semántica de resurrección y cambio sin amplificación interpretativa.
  spanish_consistency_notes:
  - Se mantiene «trompeta» de modo consistente para σάλπιγξ/σαλπίσει.
  - Se usa «resucitados» para el pasivo de ἐγείρω en contexto paulino de resurrección.
  - Se conserva el plural inclusivo «nosotros» para ἡμεῖς.
  - «Incorruptibles» sigue el valor de ἄφθαρτοι y armoniza con el argumento de 1 Corintios 15.
