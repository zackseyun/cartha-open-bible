translation:
  language: es
  text: Ahora bien, si se proclama que el Mesías ha sido resucitado de entre los muertos[a], ¿cómo dicen algunos entre ustedes que no hay resurrección de los muertos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «se proclama que Cristo ha sido resucitado». Χριστός puede traducirse como «Mesías» o «Cristo»; aquí se conserva en el texto principal el sentido de título.
    reason: alternative_reading
lexical_decisions:
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: En este contexto Χριστός funciona como título, no como nombre propio. Por eso se traduce como «Mesías», preservando el sentido semántico que el audit trail inglés documenta para el argumento paulino sobre la proclamación y la resurrección.
- source_word: κηρύσσεται
  english_pob_choice: is proclaimed
  chosen_spanish: es proclamado
  alternatives_spanish:
  - es predicado
  - se anuncia
  lexicon: BDAG
  rationale: «Proclamar» conserva el matiz de anuncio público y heráldico de κηρύσσω, y suena natural en español moderno sin debilitar la fuerza del pasivo presente.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - entre los muertos
  lexicon: BDAG
  rationale: La expresión española «de entre los muertos» refleja mejor el movimiento resurreccional implícito en ἐκ νεκρῶν que un simple «de los muertos», sin perder idiomaticidad.
- source_word: ἐγήγερται
  english_pob_choice: has been raised
  chosen_spanish: habiendo sido levantado
  alternatives_spanish:
  - habiendo sido resucitado
  - ha sido levantado
  - ha resucitado
  lexicon: BDAG
  rationale: Se preserva el perfecto pasivo con una construcción participial que mantiene el valor resultativo. «Levantado» refleja el verbo ἐγείρω; en este contexto resurreccional, «levantado» comunica la acción divina sin imponer una formulación más interpretativa que «resucitado».
- source_word: πῶς
  english_pob_choice: how can
  chosen_spanish: cómo
  alternatives_spanish:
  - cómo pueden
  - de qué manera
  lexicon: BDAG
  rationale: El español permite la pregunta retórica con solo «cómo», manteniendo la incongruencia implícita del griego sin añadir una modalización no exigida por el texto.
- source_word: ἐν ὑμῖν τινες
  english_pob_choice: some among you
  chosen_spanish: algunos entre ustedes
  alternatives_spanish:
  - algunos de ustedes
  - ciertos entre ustedes
  lexicon: BDAG
  rationale: «Entre ustedes» reproduce el sentido intracomunitario de ἐν ὑμῖν y conserva la referencia a un subgrupo dentro de la iglesia de Corinto.
- source_word: ἀνάστασις νεκρῶν
  english_pob_choice: resurrection of the dead
  chosen_spanish: resurrección de los muertos
  alternatives_spanish:
  - resurrección de entre los muertos
  - resurrección de los que murieron
  lexicon: BDAG
  rationale: La fórmula fija en español para ἀνάστασις νεκρῶν es «resurrección de los muertos». Mantiene el alcance general del sustantivo abstracto sin restringirlo a un evento individual.
- source_word: οὐκ ἔστιν
  english_pob_choice: there is no
  chosen_spanish: no hay
  alternatives_spanish:
  - no existe
  - no está
  lexicon: BDAG
  rationale: «No hay» es la forma natural en español para el valor existencial de εἰμί aquí, y evita un calco poco idiomático.
theological_decisions:
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se sigue la decisión documental de traducir el título cuando el contexto lo permite. Esto mantiene visible la afirmación cristológica central del versículo: el Mesías anunciado ha sido levantado de entre los muertos.'
  doctrine_reference: 'DOCTRINE.md: Translate titles; contested term Χριστός'
- issue: Resurrección como acto divino en pasivo
  english_pob_reading: has been raised
  chosen_spanish_reading: habiendo sido levantado
  alternative_spanish_readings:
  - habiendo sido resucitado
  - ha sido levantado
  rationale: El pasivo de ἐγείρω preserva la acción implícita de Dios sin nombrarlo explícitamente. En español, «levantado» mantiene esa pasividad y el enlace conceptual con la resurrección.
  doctrine_reference: Pauline passive/resurrection usage in 1 Corinthians 15
- issue: Existencialidad de la negación
  english_pob_reading: there is no
  chosen_spanish_reading: no hay
  alternative_spanish_readings:
  - no existe
  rationale: 'La negación existencial debe sonar natural en español y conservar el contraste lógico del argumento de Pablo: proclamar al Mesías resucitado es incompatible con negar la resurrección general.'
  doctrine_reference: Greek existential εἰμί in doctrinal argument
translation_notes:
  revision_awareness: El cierre de revisión más reciente indica agreement 1.0 y sin cambios necesarios; por eso la redacción española sigue de cerca la decisión auditada del inglés POB, ajustando solo lo necesario para el español natural y la preservación del valor pasivo de ἐγήγερται.
  spanish_consistency_notes:
  - Se mantuvo «Mesías» para Χριστός en coherencia con la política POB documentada.
  - Se usó «resurrección de los muertos» como fórmula estable en español para ἀνάστασις νεκρῶν.
  - Se evitó «SEÑOR» y otras sustituciones no presentes en el griego de este versículo.
  - La pregunta retórica se conserva sin expansión interpretativa.
  - «Entre ustedes» reproduce el sentido de grupo interno de ἐν ὑμῖν.
