review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura argumentativa del griego: condición inicial, proclamación del Mesías, resurrección y la contradicción lógica de negar la resurrección de los muertos. También sigue correctamente la decisión documentada de traducir Χριστός como título, «el Mesías», con nota alternativa para «Cristo». Sin embargo, la forma «como habiendo sido levantado» no representa con naturalidad ni precisión la construcción ὅτι ἐκ νεκρῶν ἐγήγερται; el griego expresa contenido proclamado («que ha sido levantado/resucitado»), no una perífrasis española de participio que suena forzada.'
  spanish_quality_summary: El español general es claro, pero «es proclamado como habiendo sido levantado» resulta poco idiomático y demasiado calcado. En español bíblico natural y digno, «se proclama que ha sido resucitado» o «es proclamado que ha sido resucitado» funciona mejor. También conviene evitar «levantado» aquí, porque en español puede sonar ambiguo o menos claro que «resucitado» en contexto de resurrección, aunque la nota/racional puede explicar la base léxica en ἐγείρω.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: «Mesías», «muertos», «resurrección», «Dios» implícito por el pasivo divino. No hay conflicto con términos por defecto. La única mejora necesaria es escoger una formulación española más natural para ἐγήγερται y la cláusula con ὅτι.'
  issues:
  - severity: high
    issue: «como habiendo sido levantado» es una construcción poco natural y no refleja bien el ὅτι de contenido.
    rationale: El griego dice que el contenido de la proclamación es «que ha sido levantado de entre los muertos». La perífrasis con «como habiendo sido» suena traducción mecánica y entorpece la lectura.
  - severity: medium
    issue: «levantado» en este contexto puede ser menos claro que «resucitado».
    rationale: Aunque ἐγείρω literalmente puede reflejarse como «levantar», en español actual eclesial «ha sido resucitado» comunica con más precisión la resurrección y preserva el pasivo implicando la acción divina.
  revised_spanish_text: Ahora bien, si se proclama que el Mesías ha sido resucitado de entre los muertos[a], ¿cómo dicen algunos entre ustedes que no hay resurrección de los muertos?
  revised_footnotes:
  - marker: a
    text: O «se proclama que Cristo ha sido resucitado». Χριστός puede traducirse como «Mesías» o «Cristo»; aquí se conserva en el texto principal el sentido de título.
    reason: alternative_reading
  revision_rationale: Se revisa la cláusula de proclamación para reflejar de manera idiomática el ὅτι de contenido y el perfecto pasivo ἐγήγερται. «Ha sido resucitado» preserva mejor en español el sentido resurreccional y el pasivo implícitamente divino que «habiendo sido levantado», evitando una construcción forzada. Se mantiene «el Mesías» conforme a la decisión teológica y léxica documentada, junto con la nota alternativa para «Cristo».
