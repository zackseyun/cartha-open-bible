revisions:
- from: Ahora bien, si el Mesías es proclamado como habiendo sido levantado de entre los muertos[a], ¿cómo dicen algunos entre ustedes que no hay resurrección de los muertos?
  to: Ahora bien, si se proclama que el Mesías ha sido resucitado de entre los muertos[a], ¿cómo dicen algunos entre ustedes que no hay resurrección de los muertos?
  rationale: Se revisa la cláusula de proclamación para reflejar de manera idiomática el ὅτι de contenido y el perfecto pasivo ἐγήγερται. «Ha sido resucitado» preserva mejor en español el sentido resurreccional y el pasivo implícitamente divino que «habiendo sido levantado», evitando una construcción forzada. Se mantiene «el Mesías» conforme a la decisión teológica y léxica documentada, junto con la nota alternativa para «Cristo».
  reviewer_model: gpt-5.4
