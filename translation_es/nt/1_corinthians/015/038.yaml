translation:
  language: es
  text: Pero Dios le da un cuerpo como quiso, y a cada una de las semillas[b] su propio cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: b
    text: 'O: "a cada semilla su propio cuerpo". El griego dice literalmente "a cada una de las semillas", un plural con posible valor distributivo.'
    reason: alternative_reading
lexical_decisions:
- source_word: δίδωσιν
  english_pob_choice: gives
  chosen_spanish: da
  alternatives_spanish:
  - da a
  - proporciona
  lexicon: BDAG
  rationale: En español, "dar" reproduce con naturalidad el verbo de acción divina y conserva la fuerza directa del griego, sin volver la frase pesada con una construcción más literal.
- source_word: αὐτῷ
  english_pob_choice: it
  chosen_spanish: le
  alternatives_spanish:
  - a ello
  - a esa semilla
  lexicon: BDAG
  rationale: 'El dativo se refiere a la semilla en el contexto inmediato. En español, el clítico dativo "le" permite una frase natural: "le da un cuerpo".'
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  - forma corporal
  lexicon: BDAG
  rationale: '"Cuerpo" es el equivalente normal y preserva el vínculo léxico con el argumento de cuerpos en el capítulo.'
- source_word: καθὼς ἠθέλησεν
  english_pob_choice: as he willed
  chosen_spanish: como quiso
  alternatives_spanish:
  - como quiso
  - como quiso hacerlo
  - como lo determinó
  lexicon: BDAG
  rationale: '"Quiso" expresa la voluntad divina de manera fiel y natural en español. Evita una formulación excesivamente abstracta y mantiene el énfasis en la intención soberana de Dios.'
- source_word: ἑκάστῳ τῶν σπερμάτων
  english_pob_choice: to each of the seeds
  chosen_spanish: a cada una de las semillas
  alternatives_spanish:
  - a cada semilla
  - a cada una de las semillas
  lexicon: BDAG
  rationale: Se conserva la fuerza distributiva del plural griego con una solución española natural. Aunque "cada semilla" sería más fluido, "cada una de las semillas" refleja mejor el matiz distributivo documentado en el audit trail.
- source_word: ἴδιον
  english_pob_choice: its own
  chosen_spanish: su propio
  alternatives_spanish:
  - su propio
  - su propio y particular
  - un propio
  lexicon: BDAG
  rationale: '"Su propio" reproduce el valor individualizador de ἴδιον sin añadir matices interpretativos como "distinto" o "propio" en sentido técnico.'
theological_decisions:
- issue: Agencia divina en la asignación del cuerpo
  english_pob_reading: The verse emphasizes that God sovereignly assigns the body/form to each seed, without adding a broader doctrinal explanation.
  chosen_spanish_reading: El versículo destaca que Dios da el cuerpo según su voluntad, sin desarrollar más la explicación doctrinal.
  alternative_spanish_readings:
  - El versículo podría explicarse como si cada semilla recibiera una especie distinta de cuerpo.
  - El versículo podría leerse más libremente como una referencia a categorías de cuerpos.
  rationale: La traducción mantiene el foco en la voluntad soberana de Dios y evita introducir interpretaciones que el griego no dice explícitamente.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés: se mantiene "gives/body/as he willed/each of the seeds/its own" en una solución española natural. No se requieren revisiones adicionales respecto del análisis base.'
  spanish_consistency_notes:
  - Se usa "Dios" para θεός, conforme al estándar del proyecto.
  - Se conserva "cuerpo" para σῶμα para mantener la correspondencia léxica con el contexto de 1 Corintios 15.
  - La construcción "a cada una de las semillas" intenta preservar el matiz distributivo señalado en el audit trail, aun cuando "cada semilla" sería más idiomático.
