revisions:
- from: Y cuerpos celestiales y cuerpos terrenales; pero la gloria de los celestiales es una clase[a], y la gloria de los terrenales es otra.
  to: Y hay cuerpos celestiales y cuerpos terrenales; pero la gloria de los celestiales es de una clase[a], y la gloria de los terrenales es de otra.
  rationale: Se ajusta la frase final a un español más idiomático ('es de una clase ... es de otra') y se corrige la nota al pie para que preserve una alternativa léxica completa y clara. Aunque 'celestiales/terrenales' sigue siendo defendible en el texto principal, la reparación mínima aquí corrige lo más necesario sin reescribir en exceso el borrador. No requiere adjudicación adicional.
