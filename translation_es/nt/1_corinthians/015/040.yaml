review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el contraste del griego: cuerpos celestiales/terrenales, seguido por la diferencia de gloria entre ambos. Sin embargo, se aparta innecesariamente de la decisión inglesa auditada al preferir ''celestiales/terrenales'' en el texto principal, cuando el expediente favorece el equivalente más amplio y menos técnico de ''heavenly/earthly''. Además, la nota al pie actual no preserva correctamente la alternativa documentada, porque omite ''cuerpos'' y no presenta la pareja alternativa equivalente al inglés.'
  spanish_quality_summary: El español es claro y natural, pero 'celestiales/terrenales' suena más técnico o cosmológico de lo necesario en este contexto. 'Celestiales' puede estrechar el campo semántico hacia lo astronómico más que 'celestiales/de los cielos', y la nota 'O celestiales y terrenales' resulta incompleta y poco útil. También conviene una formulación más idiomática para 'one kind ... another' en español, como 'de una clase ... de otra', manteniendo la elipsis del griego.
  glossary_alignment: 'No hay conflicto con terminología teológica mayor del proyecto. La cuestión principal es léxica: ἐπουράνια/ἐπίγεια se alinean mejor en español con ''celestiales/terrenales'' como alternativa y con ''celestiales/terrenales'' o ''de los cielos/de la tierra'' según contexto; aquí, para seguir la rationale inglesa de evitar tecnicismo y mantener amplitud, conviene ''celestiales'' solo como nota y usar ''celestiales/terrenales'' no como principal. Mejor principal: ''cuerpos celestiales'' sigue siendo posible, pero el expediente privilegia una opción menos técnica; en español, ''cuerpos celestiales'' sigue sonando más técnico que ''cuerpos del cielo'', así que ''cuerpos celestiales'' debe quedar como alternativa. ''Gloria'' y ''cuerpos'' están bien.'
  issues:
  - severity: medium
    issue: El texto principal usa 'celestiales' y 'terrenales' donde el expediente inglés favorece un contraste menos técnico equivalente a 'heavenly/earthly'.
    rationale: La rationale auditada explica que 'heavenly/earthly' preserva mejor la amplitud semántica y evita un tono más astronómico o técnico. En español, 'celestiales/terrenales' puede sonar más especializado de lo necesario.
  - severity: medium
    issue: La nota al pie no corresponde bien a la alternativa preservada en el inglés.
    rationale: La nota inglesa ofrece 'celestial bodies and terrestrial bodies'. La nota española 'O celestiales y terrenales' omite 'cuerpos' y deja una alternativa incompleta y menos clara.
  - severity: low
    issue: '''es una clase[a] ... es otra'' puede sonar algo brusco en español.'
    rationale: Una formulación como 'es de una clase[a] ... es de otra' refleja mejor la distinción cualitativa de ἑτέρα ... ἑτέρα y suena más idiomática.
  revised_spanish_text: Y hay cuerpos celestiales y cuerpos terrenales; pero la gloria de los celestiales es de una clase[a], y la gloria de los terrenales es de otra.
  revised_footnotes:
