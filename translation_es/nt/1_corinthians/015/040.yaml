translation:
  language: es
  text: Y hay cuerpos celestiales y cuerpos terrenales; pero la gloria de los celestiales es de una clase[a], y la gloria de los terrenales es de otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'cuerpos celestes y cuerpos terrestres'.
    reason: lexical_alternative
lexical_decisions:
- source_word: σώματα
  english_pob_choice: bodies
  chosen_spanish: cuerpos
  alternatives_spanish:
  - cuerpos físicos
  lexicon: BDAG
  rationale: σῶμα se refiere de manera directa a 'cuerpo'; en español, 'cuerpos' conserva esa amplitud sin añadir especificación innecesaria.
- source_word: ἐπουράνια
  english_pob_choice: heavenly
  chosen_spanish: celestiales
  alternatives_spanish:
  - celestiales
  - celestes
  - de los cielos
  lexicon: BDAG
  rationale: ἐπουράνιος puede significar 'celestial' o 'heavenly'. 'Celestiales' funciona de manera natural en español y mantiene la posibilidad de una referencia amplia sin forzar un sentido astronómico.
- source_word: ἐπίγεια
  english_pob_choice: earthly
  chosen_spanish: terrenales
  alternatives_spanish:
  - terrenales
  - terrestres
  - de la tierra
  lexicon: BDAG
  rationale: ἐπίγειος significa 'de la tierra' o 'terrenal'. 'Terrenales' empareja bien con 'celestiales' y conserva el contraste de ámbito.
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  lexicon: BDAG
  rationale: ἀλλά introduce contraste simple. 'Pero' reproduce esa fuerza de manera clara y directa.
- source_word: ἑτέρα μὲν ... ἑτέρα δὲ
  english_pob_choice: one kind ... another
  chosen_spanish: una clase ... otra
  alternatives_spanish:
  - una diferente ... otra diferente
  - una ... otra
  lexicon: BDAG
  rationale: ἕτερος marca diferencia de clase o cualidad. 'Una clase ... otra' comunica mejor la distinción de tipo que una repetición meramente adjetival en español.
- source_word: δόξα
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - resplandor
  lexicon: BDAG
  rationale: δόξα aquí puede incluir brillo o esplendor, pero 'gloria' preserva el vocabulario paulino y la amplitud teológica del término.
- source_word: τῶν ἐπουρανίων ... τῶν ἐπιγείων
  english_pob_choice: the heavenly ... the earthly
  chosen_spanish: de los celestiales ... de los terrenales
  alternatives_spanish:
  - de los cuerpos celestiales ... de los cuerpos terrenales
  - de lo celestial ... de lo terrenal
  lexicon: BDAG
  rationale: Los genitivos son elípticos y remiten a σώματα. En español, 'de los celestiales' y 'de los terrenales' conserva la referencia ya establecida sin repetir innecesariamente 'cuerpos', y mantiene la tensión del contraste.
theological_decisions:
- issue: Referente de 'cuerpos celestiales' y 'cuerpos terrenales'
  english_pob_reading: Render generically as 'heavenly bodies and earthly bodies' without narrowing the referent.
  chosen_spanish_reading: Traducir de forma genérica como 'cuerpos celestiales y cuerpos terrenales', sin limitar el referente.
  alternative_spanish_readings:
  - cuerpos celestiales y cuerpos terrestres
  - seres celestiales y seres terrenales
  rationale: Pablo habla de σώματα ('cuerpos'), no de 'seres'. La traducción debe preservar el lenguaje corporal y no imponer una identificación más estrecha, ya sea astronómica o angelológica. La formulación elegida deja abierta la amplitud del argumento.
  doctrine_reference: Preservar la tensión teológica y analógica del texto sin resolverla prematuramente.
translation_notes:
  revision_awareness: The latest English revision is unchanged; the English audit trail shows high agreement and no applied revisions, so this Spanish draft follows the established lexical decisions closely while adapting them to idiomatic Spanish.
  spanish_consistency_notes:
  - Conservo el paralelismo entre celestiales/terrenales para reflejar ἐπουράνια/ἐπίγεια.
  - Uso 'gloria' para δόξα por continuidad paulina.
  - Mantengo la estructura contrastiva de la cláusula final para no perder el matiz de ἑτέρα μὲν ... ἑτέρα δὲ.
