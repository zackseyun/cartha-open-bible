translation:
  language: es
  text: Ahora, el aguijón de la muerte es el pecado, y el poder[a] del pecado es la ley[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «fuerza»: «la fuerza del pecado es la ley».'
    reason: lexical_alternative
  - marker: b
    text: «La ley» probablemente alude de manera especial a la ley mosaica en el argumento de Pablo, aunque la formulación también permite entenderla en un sentido más amplio como la función de la ley al exponer e intensificar el pecado.
    reason: alternative_reading
lexical_decisions:
- source_word: κέντρον
  english_pob_choice: sting
  chosen_spanish: aguijón
  alternatives_spanish:
  - picadura
  - dardo
  lexicon: BDAG
  rationale: En este contexto personificado de la muerte, «aguijón» comunica la imagen de un instrumento punzante que hiere. Es el equivalente español más natural para mantener la metáfora de daño agudo presente en el griego y en la tradición interpretativa del pasaje.
- source_word: θανάτου
  english_pob_choice: of death
  chosen_spanish: de la muerte
  alternatives_spanish:
  - mortal
  - de la muerte
  lexicon: BDAG
  rationale: 'El genitivo expresa pertenencia o relación: el aguijón que pertenece a la muerte. «De la muerte» preserva con claridad esa relación en español.'
- source_word: ἁμαρτία
  english_pob_choice: sin
  chosen_spanish: pecado
  alternatives_spanish:
  - pecado
  - el pecado
  lexicon: BDAG
  rationale: En Pablo, ἁμαρτία suele funcionar como poder o principio, no solo como actos individuales. En español, «pecado» mantiene ese valor sustantivo; se añade el artículo cuando el paralelismo lo favorece y la fluidez lo requiere.
- source_word: δύναμις
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - fortaleza
  lexicon: BDAG
  rationale: «Poder» transmite mejor la capacidad eficaz o influencia activa que el texto atribuye al pecado. Es la opción más natural y fiel al sentido paulino.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - la Ley
  - ley
  lexicon: BDAG
  rationale: «La ley» conserva la referencia paulina probable a la ley mosaica sin forzar una mayúscula interpretativa. En español, el artículo definido reproduce bien la concreción del griego y permite mantener la tensión teológica del contexto.
- source_word: δὲ
  english_pob_choice: now ... and
  chosen_spanish: Ahora ... y
  alternatives_spanish:
  - Pero ... y
  - Y ... y
  lexicon: BDAG
  rationale: δέ marca transición explicativa más que oposición fuerte. «Ahora» introduce naturalmente la primera afirmación; el segundo enlace se vierte con «y» para reflejar continuidad del argumento.
theological_decisions:
- issue: Sentido de «la ley» como poder del pecado
  english_pob_reading: Rendered generically as 'the law' without capitalizing, allowing the phrase to retain its Pauline resonance with the Mosaic law while not narrowing the statement beyond the Greek wording.
  chosen_spanish_reading: «La ley» sin mayúscula interpretativa, conservando la resonancia con la ley mosaica sin limitarla más allá de lo que exige el griego.
  alternative_spanish_readings:
  - «La Ley» como referencia explícita a la ley mosaica
  - «ley» como principio general
  rationale: El contexto de 1 Corintios apunta fuertemente a la ley mosaica, pero el texto griego no obliga a resolver completamente esa referencia. La traducción mantiene la tensión teológica y deja abierta la amplitud paulina del término.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el paquete de auditoría; la traducción sigue el acuerdo alto del control cruzado y conserva la misma lectura de base.
  spanish_consistency_notes:
  - 'Se mantiene la terminología paultina básica: pecado, poder, ley.'
  - Se evita «SEÑOR» o mayúsculas teológicas no requeridas por el texto.
  - El orden y la puntuación siguen de cerca la estructura paralela del griego para preservar el contraste balanceado entre las dos cláusulas.
