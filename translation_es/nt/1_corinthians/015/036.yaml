translation:
  language: es
  text: ¡Insensato![a] Lo que tú siembras no recibe vida[b] a menos que muera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Necio» o «Sin entendimiento».
    reason: lexical_alternative
  - marker: b
    text: O «no cobra vida».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄφρων
  english_pob_choice: Foolish one
  chosen_spanish: ¡Insensato!
  alternatives_spanish:
  - ¡Necio!
  - ¡Fool!
  - ¡Tonto!
  lexicon: BDAG
  rationale: El vocativo expresa reprensión directa. «Insensato» conserva la fuerza exhortativa y suena natural en español bíblico sin suavizar la censura de Pablo. «Necio» sería posible, pero puede sonar más tradicional que comunicativo; «tonto» es demasiado coloquial.
- source_word: σὺ
  english_pob_choice: implicit in English
  chosen_spanish: tú
  alternatives_spanish:
  - —
  - usted
  lexicon: Gramática griega
  rationale: 'El pronombre es enfático en griego y en español conviene conservar esa explicitud: «lo que tú siembras». Mantiene el contraste retórico del original.'
- source_word: ὃ σπείρεις
  english_pob_choice: what you sow
  chosen_spanish: lo que tú siembras
  alternatives_spanish:
  - aquello que siembras
  - lo que plantas
  lexicon: BDAG
  rationale: «Lo que tú siembras» reproduce el sentido directo y mantiene el campo agrícola del verbo σπείρω. «Plantas» perdería la conexión léxica con la siembra; «aquello que siembras» suena más pesado.
- source_word: ζῳοποιεῖται
  english_pob_choice: is not made alive
  chosen_spanish: es hecho vivo
  alternatives_spanish:
  - cobra vida
  - vuelve a vivir
  - se le da vida
  lexicon: BDAG
  rationale: 'Se conserva la pasiva y la relación con dar vida/resucitar. «Es hecho vivo» refleja la forma pasiva con transparencia; aunque suena algo marcado, es fiel al valor verbal sin resolver la tensión metafórica. En el texto se mantiene la negación completa: «no es hecho vivo».'
- source_word: ἐὰν μὴ
  english_pob_choice: unless
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - salvo que
  lexicon: Gramática griega
  rationale: La construcción condicional negativa se expresa de forma natural como «si no» en español. En este contexto conserva la relación lógica sin sobrecargar la frase.
- source_word: ἀποθάνῃ
  english_pob_choice: it dies
  chosen_spanish: muere
  alternatives_spanish:
  - haya muerto
  - deba morir
  lexicon: BDAG
  rationale: El aoristo subjuntivo en esta condición se vierte naturalmente con el presente «muere» en español. No se añade «primero», porque el texto no lo dice explícitamente.
theological_decisions:
- issue: Metáfora de la semilla y la vida futura
  english_pob_reading: Retain the agricultural metaphor without explicating it as a doctrinal statement beyond the text.
  chosen_spanish_reading: Conservar la metáfora agrícola sin convertirla en una paráfrasis doctrinal sobre la resurrección.
  alternative_spanish_readings:
  - explicitar que se trata de la resurrección del cuerpo
  - parafrasear la imagen como principio general de vida nueva
  rationale: Pablo responde con una analogía, no con una explicación sistemática completa. La traducción debe dejar visible esa tensión y no resolverla con lenguaje interpretativo ajeno al verso.
  doctrine_reference: Preservar la tensión teológica; cf. la respuesta paulina sobre la resurrección en 1 Co 15.
translation_notes:
  revision_awareness: 'Coincide con el contexto de revisión más reciente: no se requieren cambios sustanciales respecto del sentido y la transparencia del versículo; se mantiene la metáfora agrícola y la pasiva de vida sin explicación añadida.'
  spanish_consistency_notes:
  - Se usa «siembras» para mantener la red agrícola del griego y la coherencia con el verbo clave σπείρω.
  - Se evita «Cristo»/«Mesías» porque no aparece en este versículo.
  - «Insensato» conserva el tono de reprensión directa sin elevar artificialmente el registro.
  - La pasiva «es hecho vivo» mantiene la relación semántica con ζῳοποιεῖται y la posibilidad de resonancia con vida/resurrección.
