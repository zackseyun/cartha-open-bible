review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura del griego y conserva la metáfora agrícola. «Insensato» para ἄφρων es defendible, y «lo que tú siembras» refleja adecuadamente ὃ σπείρεις con el énfasis de σὺ. Sin embargo, «no es hecho vivo» suena antinatural en español y no representa bien un registro bíblico claro; la pasiva griega puede preservarse mejor con «no recibe vida». Además, la nota alternativa «Fool» no debe aparecer en inglés dentro de notas españolas.
  spanish_quality_summary: La frase es generalmente comprensible, pero «es hecho vivo» resulta forzada y poco idiomática. «Si no muere» es aceptable, aunque «a menos que muera» fluye mejor y evita la posible lectura ambigua de la locución. La puntuación y el tono son adecuados. Hace falta limpiar la nota al pie para que esté enteramente en español y mantener un estilo eclesial natural.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La principal cuestión léxica es ζῳοποιεῖται, donde conviene una solución española natural que aún preserve el sentido de recibir vida.
  issues:
  - severity: medium
    issue: «no es hecho vivo» es una calca poco natural de ζῳοποιεῖται
    rationale: Aunque intenta conservar la pasiva, en español suena rígido y poco claro. «No recibe vida» mantiene el sentido pasivo/resultativo de ser vivificado sin sacrificar legibilidad.
  - severity: low
    issue: La nota al pie incluye «Fool» en inglés
    rationale: Las notas españolas deben estar en español. La alternativa debe presentarse como «Necio» o «Insensato», no dejar una opción inglesa sin adaptar.
  - severity: low
    issue: «si no muere» es posible, pero menos claro que «a menos que muera»
    rationale: La expresión «si no» puede leerse rápidamente como secuencia separada; «a menos que» representa con más claridad ἐὰν μὴ en español formal y natural.
  revised_spanish_text: ¡Insensato![a] Lo que tú siembras no recibe vida[b] a menos que muera.
  revised_footnotes:
  - marker: a
    text: O «Necio» o «Sin entendimiento».
    reason: lexical_alternative
  - marker: b
    text: O «no cobra vida».
    reason: lexical_alternative
