revisions:
- from: ¡Insensato![a] Lo que tú siembras no es hecho vivo[b] si no muere.
  to: ¡Insensato![a] Lo que tú siembras no recibe vida[b] a menos que muera.
  rationale: Se ajusta ζῳοποιεῖται a una formulación española natural («no recibe vida») que conserva el sentido de ser vivificado, se mejora ἐὰν μὴ con «a menos que», y se corrige la nota para que esté completamente en español y refleje alternativas léxicas pertinentes.
  reviewer_model: gpt-5.4
