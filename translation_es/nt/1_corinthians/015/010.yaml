translation:
  language: es
  text: Pero por la gracia de Dios soy lo que soy[a], y su gracia hacia mí no resultó vacía. Al contrario, trabajé más que todos ellos; pero no yo, sino la gracia de Dios que estaba conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no fue en vano» o «no se volvió vacía».
    reason: lexical_alternative
lexical_decisions:
- source_word: χάριτι δὲ θεοῦ
  english_pob_choice: But by the grace of God
  chosen_spanish: Pero por la gracia de Dios
  alternatives_spanish:
  - Pero mediante la gracia de Dios
  - Ahora bien, por la gracia de Dios
  lexicon: χάριτι (dativo de χάρις)
  rationale: El dativo expresa medio o causa eficaz; en español, «por» comunica bien ese valor instrumental sin sonar forzado. «Pero» conserva el matiz adversativo suave de δὲ en relación con el contexto inmediato.
- source_word: εἰμι ὅ εἰμι
  english_pob_choice: I am what I am
  chosen_spanish: soy lo que soy
  alternatives_spanish:
  - soy quien soy
  lexicon: ὅ (pronombre relativo) + εἰμι
  rationale: La repetición idiomática se preserva de forma cercana. «Lo que soy» mantiene la identidad descrita por Pablo sin introducir una personalización innecesaria que debilite el efecto de la fórmula.
- source_word: ἡ χάρις αὐτοῦ ἡ εἰς ἐμὲ
  english_pob_choice: his grace toward me
  chosen_spanish: su gracia hacia mí
  alternatives_spanish:
  - su gracia para conmigo
  - su gracia para mí
  lexicon: χάρις + εἰς + acusativo
  rationale: La preposición εἰς marca dirección hacia Pablo. «Hacia mí» conserva esa orientación de manera natural en español y evita restringir el sentido a un simple beneficio abstracto.
- source_word: οὐ κενὴ ἐγενήθη
  english_pob_choice: did not prove empty
  chosen_spanish: no resultó vacía
  alternatives_spanish:
  - no fue en vano
  - no se volvió vacía
  lexicon: κενός
  rationale: κενός puede significar «vacío» o «sin resultado / en vano». «No resultó vacía» mantiene la metáfora y deja visible la tensión entre imagen física y eficacia, igual que la nota inglesa sobre «did not become empty / was not in vain».
- source_word: ἀλλὰ περισσότερον αὐτῶν πάντων ἐκοπίασα
  english_pob_choice: On the contrary, I labored more than all of them
  chosen_spanish: Al contrario, trabajé más que todos ellos
  alternatives_spanish:
  - más bien, me esforcé más que todos ellos
  - al contrario, me fatigué más que todos ellos
  lexicon: κοπιάω; περισσότερον + genitivo
  rationale: κοπιάω denota trabajo esforzado o fatigoso. «Trabajé» es claro en español; «al contrario» reproduce el contraste de ἀλλά, y «más que todos ellos» conserva la comparación sin sobreinterpretarla.
- source_word: οὐκ ἐγὼ δὲ ἀλλὰ ἡ χάρις τοῦ θεοῦ
  english_pob_choice: yet not I, but the grace of God
  chosen_spanish: sin embargo, no yo, sino la gracia de Dios
  alternatives_spanish:
  - pero no yo, sino la gracia de Dios
  - aunque no yo, sino la gracia de Dios
  lexicon: οὐκ ἐγώ ... ἀλλὰ ...
  rationale: 'La cláusula mantiene la corrección del énfasis humano: Pablo realmente trabajó, pero niega que la eficacia última procediera de sí mismo. «Sin embargo» comunica bien la tensión y evita una lectura que diluya su aportación real.'
- source_word: ἡ σὺν ἐμοί
  english_pob_choice: that was with me
  chosen_spanish: que estaba conmigo
  alternatives_spanish:
  - que estaba con [a] mí
  - que estuvo conmigo
  lexicon: σύν + dativo
  rationale: El artículo vinculante y σύν con dativo remiten a la gracia descrita antes. «Que estaba conmigo» es natural en español y preserva la relación de compañía/acompañamiento sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Tensión entre el trabajo real de Pablo y la eficacia de la gracia divina
  english_pob_reading: The translation preserves both Paul's genuine labor and God's effective grace without collapsing one into the other.
  chosen_spanish_reading: La traducción conserva tanto el esfuerzo real de Pablo como la eficacia de la gracia de Dios, sin absorber uno en el otro.
  alternative_spanish_readings:
  - Dios hizo todo y Pablo solo fue pasivo
  - Pablo se atribuyó su propio mérito
  rationale: 'El griego afirma simultáneamente «trabajé más que todos ellos» y «no yo, sino la gracia de Dios». El español debe dejar intacta esa tensión: hay labor humana verdadera, pero la eficacia pertenece a la gracia.'
  doctrine_reference: Mantener la tensión teológica del texto, no resolverla en un sistema posterior.
translation_notes:
  revision_awareness: La redacción sigue de cerca el acuerdo alto del expediente inglés y conserva su decisión principal sobre χάρις, κενός y la relación entre esfuerzo humano y gracia divina. No se detectaron revisiones posteriores que obligaran a cambiar la lectura.
  spanish_consistency_notes:
  - Se mantiene «gracia» de forma consistente para χάρις, sin sustituirla por «favor» porque el contexto paulino y el audit trail inglés la tratan como término técnico-teológico.
  - Se usa «Yahvé» solo cuando corresponde al nombre divino; aquí el texto dice θεοῦ, por lo que se traduce «Dios».
  - «Trabajé» se eligió como equivalente idiomático de ἐκοπίασα, pero el sentido de labor esforzada queda reforzado por el contexto y la nota léxica.
  - La estructura adversativa se reparte entre «Pero», «Al contrario» y «sin embargo» para reflejar los cambios de contraste del griego sin endurecer el español.
  - La nota textual/lexical de a se ancla en «no resultó vacía» para conservar la alternativa del POB inglés.
