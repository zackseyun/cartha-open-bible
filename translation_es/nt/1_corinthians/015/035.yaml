translation:
  language: es
  text: 'Pero alguien dirá[a]: «¿Cómo son resucitados los muertos, y con qué clase de cuerpo vienen?»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Cómo resucitan los muertos?». El verbo griego está en pasiva; literalmente, «son levantados», lo que puede implicar agencia divina.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Y
  lexicon: BDAG
  rationale: Marca el giro hacia una objeción esperada. En español, «Pero» mantiene bien la oposición discursiva sin sonar más fuerte de lo que exige el griego.
- source_word: ἐρεῖ τις
  english_pob_choice: someone will say
  chosen_spanish: alguien dirá
  alternatives_spanish:
  - alguien puede decir
  - alguien preguntará
  lexicon: BDAG
  rationale: El futuro con indefinido introduce una intervención hipotética. «Alguien dirá» conserva ese matiz y suena natural en español.
- source_word: Πῶς
  english_pob_choice: How
  chosen_spanish: ¿Cómo
  alternatives_spanish:
  - ¿De qué manera?
  - ¿En qué forma?
  lexicon: BDAG
  rationale: Interrogativo directo de modo o manera; «¿Cómo» es la forma más natural y fiel en español.
- source_word: ἐγείρονται
  english_pob_choice: are raised
  chosen_spanish: son levantados
  alternatives_spanish:
  - son resucitados
  - se levantan
  lexicon: BDAG
  rationale: El pasivo griego se conserva con una pasiva española para no perder la agencia implícita. «Son levantados» mantiene la forma sin resolver demasiado la pregunta teológica. Como alternativa contextual, «son resucitados» expresa mejor el ámbito de la resurrección, pero es menos literal respecto del verbo.
- source_word: οἱ νεκροί
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los fallecidos
  - los difuntos
  lexicon: BDAG
  rationale: Sustantivo colectivo usual y bíblicamente claro en español; preserva el referente corporativo del griego.
- source_word: ποίῳ δὲ σώματι
  english_pob_choice: with what kind of body
  chosen_spanish: con qué clase de cuerpo
  alternatives_spanish:
  - con qué cuerpo
  - y de qué tipo de cuerpo
  lexicon: BDAG
  rationale: ποίῳ pregunta por clase o tipo, no solo por identidad. «Con qué clase de cuerpo» conserva ese matiz cualitativo y suena idiomático.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - entonces
  lexicon: BDAG
  rationale: Aquí δέ enlaza la segunda pregunta con la primera sin adversación fuerte; «y» reproduce esa continuidad.
- source_word: ἔρχονται
  english_pob_choice: do they come
  chosen_spanish: vienen
  alternatives_spanish:
  - llegan
  - aparecen
  lexicon: BDAG
  rationale: «Vienen» reproduce de manera directa ἔρχομαι y mantiene la pregunta tal como está formulada. No se sustituye por «son resucitados» para no borrar la distinción verbal del texto.
theological_decisions:
- issue: Pasivo de la resurrección y agencia divina implícita
  english_pob_reading: How are the dead raised
  chosen_spanish_reading: ¿Cómo son levantados los muertos?
  alternative_spanish_readings:
  - ¿Cómo resucitan los muertos?
  - ¿Cómo se levantan los muertos?
  rationale: Se conserva la pasiva para no eliminar la posible agencia divina implícita en ἐγείρονται. La formulación evita resolver la pregunta con un sujeto explícito que el versículo no da.
  doctrine_reference: Resurrección y agencia divina implícita
- issue: Relación entre 'levantados' y 'vienen' en la pregunta doble
  english_pob_reading: and with what kind of body do they come?
  chosen_spanish_reading: y con qué clase de cuerpo vienen
  alternative_spanish_readings:
  - y con qué cuerpo vienen
  - y con qué tipo de cuerpo llegan
  rationale: Se preserva la tensión entre el acto de ser levantados y la cuestión del cuerpo con el que vienen. No se armoniza artificialmente la segunda pregunta con la primera.
  doctrine_reference: Preservar tensión interpretativa del texto
translation_notes:
  revision_awareness: El antecedente inglés POB se mantuvo sin cambios sustanciales en la revisión más reciente; el control cruzado indicó alta concordancia con solo observaciones menores. La presente redacción sigue esa lectura estable, preservando el pasivo y la pregunta doble sin suavizar la tensión del original.
  spanish_consistency_notes:
  - Se mantiene «muertos» para οἱ νεκροί, en armonía con el uso bíblico colectivo.
  - Se usa «Y»/«y» solo como enlace débil correspondiente a δέ; no introduce contraste más fuerte que el griego.
  - El pie de nota marca la alternativa de sentido del pasivo para conservar la observación teológica de la agencia implícita.
