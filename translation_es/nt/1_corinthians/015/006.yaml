translation:
  language: es
  text: Entonces se apareció a más de quinientos hermanos[a] a la vez, de los cuales la mayoría permanece hasta ahora, aunque algunos han quedado dormidos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», y en el uso cristiano primitivo ese plural masculino a veces puede referirse a toda la comunidad de creyentes.
    reason: lexical_alternative
  - marker: b
    text: Es decir, han muerto. Pablo usa «han quedado dormidos», una expresión cristiana común para la muerte a la luz de la esperanza de la resurrección.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Después
  - Luego
  lexicon: BDAG
  rationale: Marca la continuación secuencial del recuento de apariciones; «Entonces» es natural y conserva el avance narrativo.
- source_word: ὤφθη
  english_pob_choice: he appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - fue visto
  - apareció
  lexicon: BDAG
  rationale: En contextos de apariciones de resurrección, el verbo funciona como evento de aparición; «se apareció» comunica mejor el hecho que un pasivo más literal y mantiene la referencia implícita a Cristo por el contexto inmediato.
- source_word: ἐπάνω πεντακοσίοις
  english_pob_choice: to more than five hundred
  chosen_spanish: a más de quinientos
  alternatives_spanish:
  - a más de quinientas personas
  - a más de quinientos
  lexicon: BDAG
  rationale: La preposición/expresión cuantitativa indica excedencia respecto de cinco cientos; «a más de quinientos» es fiel, breve y natural en español.
- source_word: ἀδελφοῖς
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermandad
  lexicon: BDAG
  rationale: Se conserva el masculino plural del griego. En uso cristiano temprano puede abarcar a toda la comunidad creyente, pero la forma léxica básica sigue siendo masculina.
- source_word: ἐφάπαξ
  english_pob_choice: at one time
  chosen_spanish: a la vez
  alternatives_spanish:
  - de una sola vez
  - al mismo tiempo
  lexicon: BDAG
  rationale: Expresa simultaneidad en una sola ocasión; «a la vez» es idiomático y claro en español.
- source_word: οἱ πλείονες
  english_pob_choice: most
  chosen_spanish: la mayoría
  alternatives_spanish:
  - la mayor parte
  - la mayoría de ellos
  lexicon: BDAG
  rationale: El sustantivado comparativo indica «los más» o «la mayoría»; en español, «la mayoría» comunica con precisión la proporción mencionada.
- source_word: μένουσιν
  english_pob_choice: remain
  chosen_spanish: permanece
  alternatives_spanish:
  - siguen vivos
  - siguen permaneciendo
  lexicon: BDAG
  rationale: «Permanecer» conserva el valor léxico básico de μένω; en contexto implica que siguen vivos, pero el verbo no se reduce explícitamente a esa inferencia.
- source_word: ἕως ἄρτι
  english_pob_choice: until now
  chosen_spanish: hasta ahora
  alternatives_spanish:
  - hasta el día de hoy
  - hasta este momento
  lexicon: BDAG
  rationale: Indica continuidad hasta el presente del hablante; «hasta ahora» es directo y fiel al sentido temporal.
- source_word: τινὲς δὲ
  english_pob_choice: though some
  chosen_spanish: aunque algunos
  alternatives_spanish:
  - pero algunos
  - y algunos
  lexicon: BDAG
  rationale: La partícula δέ introduce contraste leve; «aunque» reproduce bien la oposición entre la mayoría que permanece y algunos que ya no.
- source_word: ἐκοιμήθησαν
  english_pob_choice: have fallen asleep
  chosen_spanish: se han dormido
  alternatives_spanish:
  - han dormido
  - han muerto
  lexicon: BDAG
  rationale: Se preserva la metáfora cristiana de «dormir» para la muerte en un contexto de resurrección. «Se han dormido» mantiene la imagen sin reducirla al mero significado conceptual.
theological_decisions:
- issue: Alcance de ἀδελφοῖς en un contexto posiblemente mixto
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: La política de la POB favorece mantener la forma masculina plural cuando eso refleja con más exactitud la palabra fuente; la posible inclusión de mujeres puede señalarse en nota, pero no debe reemplazar el término base sin razón textual suficiente.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Metáfora de muerte en ἐκοιμήθησαν
  english_pob_reading: have fallen asleep
  chosen_spanish_reading: se han dormido
  alternative_spanish_readings:
  - han muerto
  rationale: En 1 Corintios 15 la metáfora de dormir sostiene el argumento sobre la resurrección. Traducirla de forma literal conserva la tensión y el matiz teológico del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 1, 3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto coincide con la lectura aprobada en el control de alta concordancia.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el versículo se refiere implícitamente a Jesús por contexto, no por un título explícito en el texto griego.
  - Se preservó el matiz de simultaneidad de ἐφάπαξ con una expresión idiomática española.
  - Se conservó la metáfora de sueño para la muerte, en armonía con el argumento de resurrección del capítulo.
