translation:
  language: es
  text: 'Pero cada uno en su propio orden: el Mesías, las primicias[a]; luego los que pertenecen al Mesías en su venida[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «primeros frutos» para ἀπαρχή. El término conserva la imagen cultual y agrícola de la primera porción dedicada a Dios.
    reason: lexical_alternative
  - marker: b
    text: O «presencia» o «llegada» para παρουσία; aquí se refiere a la venida futura del Mesías.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada uno de ellos
  lexicon: BDAG
  rationale: El distributivo ἕκαστος apunta a una secuencia individual dentro del orden de la resurrección previa; «cada uno» es natural en español y conserva la distribución sin añadir especificaciones.
- source_word: ἐν τῷ ἰδίῳ τάγματι
  english_pob_choice: in his own order
  chosen_spanish: en su propio orden
  alternatives_spanish:
  - en su propia categoría
  - en su propio rango
  - en su propia secuencia
  lexicon: BDAG
  rationale: τάγμα expresa un arreglo u orden establecido. «Orden» conserva la idea de secuencia determinada sin militarizar indebidamente el término. El posesivo singular concuerda con el sujeto distributivo «cada uno».
- source_word: ἀπαρχὴ
  english_pob_choice: firstfruits
  chosen_spanish: las primicias
  alternatives_spanish:
  - primicias
  - primer fruto
  - primera ofrenda
  lexicon: BDAG
  rationale: «Primicias» es el equivalente bíblico natural en español para el término cultual de primera porción ofrecida a Dios y mantiene la imagen agrícola-teológica del pasaje. Se evita una paráfrasis que diluya la alusión cultual.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Aquí Χριστός funciona como título; la guía del proyecto favorece «Mesías» cuando el sentido titular es claro. En español, «Mesías» preserva mejor el valor semántico de «Ungido» y evita convertirlo en un mero nombre propio.
- source_word: οἱ τοῦ Χριστοῦ
  english_pob_choice: those who belong to Messiah
  chosen_spanish: los que son del Mesías
  alternatives_spanish:
  - los que pertenecen al Mesías
  - los del Mesías
  lexicon: BDAG
  rationale: El genitivo expresa pertenencia. «Los que son del Mesías» mantiene esa relación de posesión/pertenencia con una formulación breve y comprensible en español.
- source_word: παρουσίᾳ
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En el uso paulino, παρουσία señala el evento futuro de la manifestación/advenimiento del Mesías. «Venida» comunica ese valor escatológico de forma idiomática en español sin cerrar la amplitud semántica de «presencia» o «llegada».
theological_decisions:
- issue: Cómo reflejar Χριστός cuando funciona como título en un enunciado escatológico y de orden de resurrección
  english_pob_reading: Messiah the firstfruits, then those who belong to Messiah at his coming.
  chosen_spanish_reading: Mesías, las primicias, luego los que son del Mesías, en su venida.
  alternative_spanish_readings:
  - Cristo, las primicias, luego los que son de Cristo, en su venida.
  - El Mesías, las primicias, luego los que pertenecen al Mesías, en su venida.
  rationale: La lectura inglesa del POB trata Χριστός como título. En español, «Mesías» conserva ese carácter titular y la carga de «Ungido». Se evita «Cristo» como forma predeterminada porque aquí el término no está funcionando principalmente como nombre litúrgico sino como título con peso teológico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός → Mesías (when title; Cristo where name-like)'
- issue: Cómo traducir παρουσία sin resolver en exceso su alcance escatológico
  english_pob_reading: 'coming (with note: presence or arrival), referring to his future advent'
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  - advenimiento
  rationale: «Venida» expresa con claridad el evento futuro esperado. Mantiene la tensión entre evento y presencia sin introducir tecnicismos que no aparecen en el griego. La nota preserva las alternativas léxicas relevantes.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el historial de revisión del POB en inglés: la ida y vuelta entre «the Messiah» y «Christ» fue resuelta finalmente a favor de «Messiah» conforme a la guía doctrinal del proyecto. La estructura appositiva «ἀπαρχὴ Χριστός» se reflejó sin insertar un verbo innecesario, y se preservó la nota de alternativa para παρουσία.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» de forma consistente para Χριστός en todo el versículo, conforme a la política del proyecto para usos titulares.
  - «Primicias» conserva el eco bíblico de ἀπαρχή y combina bien con el orden sintáctico del griego.
  - «Venida» es preferible a una perífrasis más amplia porque el contexto es claramente escatológico.
  - El posesivo implícito en «su propio orden» y «su venida» se entiende como referente del sujeto inmediato del contexto, siguiendo el patrón del inglés POB y del griego.
