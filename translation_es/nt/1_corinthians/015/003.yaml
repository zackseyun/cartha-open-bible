translation:
  language: es
  text: 'Porque yo les transmití, como de primera importancia, lo que también recibí: que el Mesías[a] murió por nuestros pecados conforme a las Escrituras[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Mesías» conserva el valor titular de Χριστός. La alternativa «Cristo» sigue siendo posible, pero aquí se prefiere la forma que explicita mejor el sentido mesiánico.
    reason: theological_note
  - marker: b
    text: O «según las Escrituras». La preposición griega κατά aquí expresa conformidad con el testimonio escrito.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρέδωκα
  english_pob_choice: I delivered
  chosen_spanish: entregué
  alternatives_spanish:
  - transmití
  - pasé
  lexicon: BDAG
  rationale: En este contexto παραδίδωμι se refiere a transmitir una tradición o enseñanza recibida. «Entregué» conserva el acto formal de transmisión y funciona de manera natural en español.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la explicación de la afirmación previa; «Porque» preserva bien la conexión causal/explanatoria en español.
- source_word: ἐν πρώτοις
  english_pob_choice: as of first importance
  chosen_spanish: en primer lugar
  alternatives_spanish:
  - como lo primero
  - como de primera importancia
  lexicon: BDAG
  rationale: La frase es idiomática. En español, «en primer lugar» comunica prioridad de orden e importancia de modo claro y sin recargar la expresión.
- source_word: ὃ καὶ παρέλαβον
  english_pob_choice: what I also received
  chosen_spanish: lo que también recibí
  alternatives_spanish:
  - lo cual también recibí
  - que también recibí
  lexicon: BDAG
  rationale: El relativo apunta al contenido transmitido por Pablo. «Lo que también recibí» mantiene la correspondencia con «entregué» y suena natural.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: que
  alternatives_spanish:
  - a saber que
  - esto es que
  lexicon: BDAG
  rationale: Introduce el contenido recibido y transmitido; «que» es la forma más directa y fiel en español.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como referencia mesiánica. «Mesías» responde al criterio del proyecto para el término cuando funciona como título, y evita borrar el sentido judío del enunciado.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - falleció
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple. «Murió» es el equivalente más directo y sobrio en una formulación confesional.
- source_word: ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_choice: for our sins
  chosen_spanish: por nuestros pecados
  alternatives_spanish:
  - a favor de nuestros pecados
  - a causa de nuestros pecados
  lexicon: BDAG
  rationale: ὑπέρ con genitivo puede expresar beneficio o relación vicaria. «Por nuestros pecados» conserva la fuerza soteriológica sin imponer una teoría específica de expiación; «pecados» es el término bíblico natural en español.
- source_word: κατὰ τὰς γραφάς
  english_pob_choice: according to the Scriptures
  chosen_spanish: conforme a las Escrituras
  alternatives_spanish:
  - según las Escrituras
  - de acuerdo con las Escrituras
  lexicon: BDAG
  rationale: κατά aquí expresa conformidad con el testimonio bíblico. «Conforme a las Escrituras» mantiene el plural y suena bíblico y claro en español.
theological_decisions:
- issue: Título Χριστός en un resumen confesional
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: En esta fórmula confesional, Χριστός funciona como título. Traducirlo como «Mesías» preserva el trasfondo judío y la carga titulativa sin deshacer el significado del texto fuente.
  doctrine_reference: 'DOCTRINE.md: Χριστός → «Mesías» cuando es título; «Cristo» solo cuando el uso se ha lexicalizado como nombre o por necesidad idiomática documentada.'
- issue: Sentido de ὑπὲρ τῶν ἁμαρτιῶν ἡμῶν
  english_pob_reading: for our sins
  chosen_spanish_reading: por nuestros pecados
  alternative_spanish_readings:
  - a favor de nuestros pecados
  - a causa de nuestros pecados
  rationale: La frase afirma la relación salvífica de la muerte de Cristo sin cerrar indebidamente el alcance expiatorio. «Por nuestros pecados» conserva la tensión teológica amplia del original.
  doctrine_reference: 'DOCTRINE.md: Preservar la tensión teológica en vez de resolverla de forma más estrecha que el texto.'
translation_notes:
  revision_awareness: El expediente inglés pasó por una revisión que osciló entre «the Messiah» y «Christ» y luego restauró «Messiah» por fidelidad a la política doctrinal del proyecto. En español, se sigue esa decisión y se mantiene el título «Mesías» para Χριστός, mientras que la cláusula final se vierte con una alternativa válida en nota.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al criterio del proyecto y a la revisión restaurada del expediente.
  - Se evita «SEÑOR» para el texto base porque no aparece aquí κύριος ni una sustitución del nombre divino.
  - «Escrituras» se mantiene en plural para reflejar τὰς γραφάς.
  - La cláusula causal se traduce de forma sobria, sin ampliar el contenido más allá de lo que el griego afirma.
