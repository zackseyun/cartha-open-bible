translation:
  language: es
  text: Después se apareció a Jacobo[a], luego a todos los apóstoles.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más literalmente, «fue visto por Jacobo ... por todos los apóstoles».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔπειτα
  english_pob_choice: Then
  chosen_spanish: Entonces
  alternatives_spanish:
  - Luego
  - Después
  lexicon: BDAG
  rationale: Adverbio temporal/secuencial que introduce el siguiente elemento de la lista. «Entonces» mantiene la secuencia de forma natural en español sin añadir matices narrativos ajenos.
- source_word: ὤφθη
  english_pob_choice: he appeared
  chosen_spanish: se apareció
  alternatives_spanish:
  - apareció
  - fue visto
  lexicon: BDAG
  rationale: El aoristo pasivo de ὁράω se usa idiomáticamente para apariciones del resucitado. «Se apareció» conserva el valor de aparición y suena natural en español; «fue visto» es más literal, pero menos idiomático.
- source_word: Ἰακώβῳ
  english_pob_choice: to James
  chosen_spanish: a Jacobo
  alternatives_spanish:
  - a Santiago
  lexicon: BDAG
  rationale: El nombre griego Ἰάκωβος corresponde al personaje conocido en español bíblico como Jacobo/Santiago. Se elige «Jacobo» para respetar la forma del nombre sin adoptar la variante litúrgica tradicional donde no es necesaria.
- source_word: εἶτα
  english_pob_choice: then
  chosen_spanish: luego
  alternatives_spanish:
  - entonces
  - después
  lexicon: BDAG
  rationale: Segundo adverbio secuencial; «luego» evita repetición exacta de «entonces» y conserva la progresión de la lista sin forzar una diferenciación semántica que el griego no exige.
- source_word: τοῖς ἀποστόλοις πᾶσιν
  english_pob_choice: all the apostles
  chosen_spanish: a todos los apóstoles
  alternatives_spanish:
  - a todos los enviados
  - a todo el grupo de apóstoles
  lexicon: BDAG
  rationale: «Apóstoles» preserva el sentido técnico reconocido en este pasaje. «A todos» expresa πᾶσιν sin perder la referencia al conjunto completo; no se estrecha el grupo a los Doce, porque el griego no lo especifica.
theological_decisions:
- issue: Alcance de «todos los apóstoles»
  english_pob_reading: all the apostles
  chosen_spanish_reading: todos los apóstoles
  alternative_spanish_readings:
  - los Doce
  - el grupo apostólico completo
  rationale: El texto no define la membresía exacta del grupo. La traducción conserva la formulación amplia para no resolver una cuestión histórica o canónica que el pasaje deja abierta.
  doctrine_reference: Preservar la tensión interpretativa sin armonización implícita.
translation_notes:
  revision_awareness: 'Concordancia alta con el audit trail en inglés: se mantiene la secuencia adverbial doble, el valor aparicional de ὤφθη y la amplitud no especificada de «todos los apóstoles». No se registran revisiones posteriores que alteren la lectura de base.'
  spanish_consistency_notes:
  - Se usa «Jacobo» para el nombre propio, coherente con la forma griega Ἰάκωβος y con un registro bíblico neutral.
  - La repetición secuencial «entonces / luego» refleja el encadenamiento de ἔπειτα ... εἶτα sin añadir contenido interpretativo.
  - «Se apareció» mantiene la pasiva idiomática de una aparición pascual sin imponer una paráfrasis excesiva.
