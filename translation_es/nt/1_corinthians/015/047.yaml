translation:
  language: es
  text: El primer hombre era de la tierra[a], hecho de polvo; el segundo hombre es del cielo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «terroso» o «hecho de polvo». El adjetivo griego χοϊκός alude a la creación de Adán a partir del polvo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πρῶτος
  english_pob_choice: first
  chosen_spanish: primer
  alternatives_spanish:
  - primero
  - el primero
  lexicon: BDAG
  rationale: ἄνθρωπος lleva artículo y el ordinal funciona de modo atributivo; en español, «primer» suena natural y conserva la relación formal con el contraste «segundo».},{
theological_decisions:
- issue: Contraste adámico-cristológico sin nombrar explícitamente a Cristo
  english_pob_reading: Retain 'the second man' without adding an explicit identifier such as 'Christ' or interpretive expansion.
  chosen_spanish_reading: Conservar «el segundo hombre» sin añadir «Cristo».
  alternative_spanish_readings:
  - el segundo hombre, Cristo, es del cielo
  - el segundo hombre, el Cristo, es del cielo
  rationale: El griego no nombra a Cristo aquí; el contexto lo identifica, pero la traducción debe preservar esa tensión y no insertar una glosa interpretativa.
  doctrine_reference: 'Principio POB: no resolver más allá de lo que el texto fuente expresa; mantener la tipología Adán/Cristo sin añadir palabras ausentes.'
- issue: Tiempo verbal de la segunda cláusula
  english_pob_reading: Render as 'is from heaven.'
  chosen_spanish_reading: «es del cielo»
  alternative_spanish_readings:
  - era del cielo
  - vino del cielo
  rationale: La cláusula griega no expresa copulativo explícito; en español, el presente comunica mejor la afirmación contrastiva y sigue la lectura auditada del inglés POB.
  doctrine_reference: Equivalencia óptima con primacía del original; evitar simetría temporal artificial.
translation_notes:
  revision_awareness: La versión revisada del inglés POB se mantuvo sin cambios; el presente borrador sigue esa línea y ajusta solo la formulación española para naturalidad idiomática sin alterar el contenido fuente.
  spanish_consistency_notes:
  - Se usa «Dios»/«cielo» según el sentido del versículo; aquí no aparece Yahvé ni Mesías.
  - «hombre» conserva el paralelismo de ἄνθρωπος en ambas cláusulas.
  - «de la tierra» mantiene el valor de origen de ἐκ γῆς y la nota explica la alternativa adjetival de χοϊκός.
