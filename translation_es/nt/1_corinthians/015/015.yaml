revisions:
- from: Entonces también somos hallados como falsos testigos acerca de Dios[a], porque testificamos acerca de Dios que él levantó al Mesías[b], a quien no levantó, si en efecto los muertos no son levantados.
  to: Entonces también somos hallados como falsos testigos acerca de Dios[a], porque testificamos contra Dios que él levantó al Mesías[b], a quien no levantó, si en efecto los muertos no son levantados.
  rationale: Se corrige «acerca de Dios» a «contra Dios» para κατὰ τοῦ θεοῦ, preservando mejor el griego y la fuerza argumentativa del pasaje. Se mantiene «acerca de Dios» en la primera frase para reflejar la ambigüedad del genitivo τοῦ θεοῦ, ahora aclarada con una nota más precisa. El resto del versículo puede mantenerse tal como está.
  reviewer_model: gpt-5.4
