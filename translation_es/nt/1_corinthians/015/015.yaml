review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue en gran medida la redacción inglesa auditada, pero no preserva adecuadamente la fuerza del griego en un punto clave: κατὰ τοῦ θεοῦ se tradujo como «acerca de Dios», aunque la evidencia fuente y la decisión léxica inglesa original favorecen «contra Dios» como el sentido más fuerte en la lógica de Pablo. Además, la revisión inglesa incluida en el historial entra en tensión con el propio análisis léxico y con el griego. El resto del versículo refleja bien el sentido: εὑρισκόμεθα = «somos hallados», ψευδομάρτυρες = «falsos testigos», τὸν Χριστόν = «al Mesías», y la condición final «si en efecto los muertos no son levantados» preserva razonablemente la estructura argumentativa.'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Somos hallados» suena algo calcado pero aceptable en registro bíblico; «falsos testigos» y «al Mesías» son naturales. Sin embargo, repetir «acerca de Dios ... acerca de Dios» debilita la progresión retórica y borra el contraste entre τοῦ θεοῦ y κατὰ τοῦ θεοῦ. Conviene reparar ese contraste en español. También es mejor ajustar la nota [a] para no subordinarse a una revisión inglesa discutible, sino reflejar la ambigüedad real del genitivo y la fuerza contextual de κατά.
  glossary_alignment: 'Buena alineación general con la terminología del proyecto: «Dios», «Jesús» no aparece, «Mesías» para Χριστός está correctamente aplicado según la política. No hay conflicto con Yahvé ni otros términos base. La única desalineación significativa es no reflejar la fuerza adversativa de κατὰ cuando el contexto la pide.'
  issues:
  - severity: high
    issue: κατὰ τοῦ θεοῦ está traducido como «acerca de Dios» en lugar de «contra Dios».
    rationale: 'En el griego, κατά con genitivo normalmente expresa oposición («contra»). En este contexto Pablo intensifica el argumento: si no hay resurrección, los apóstoles no solo hablaron acerca de Dios, sino contra Dios al atribuirle una acción que no hizo. La traducción actual aplana esa severidad y elimina un contraste retórico importante con el προηγούμενο τοῦ θεοῦ.'
  - severity: medium
    issue: La nota [a] no explica suficientemente la diferencia entre «de Dios» y «contra Dios».
    rationale: La nota actual habla de «lectura más fuerte», pero no identifica claramente que el segundo sintagma griego introduce oposición. El lector español necesita una nota que preserve la alternativa del genitivo inicial sin oscurecer el posterior «contra Dios».
  revised_spanish_text: Entonces también somos hallados como falsos testigos acerca de Dios[a], porque testificamos contra Dios que él levantó al Mesías[b], a quien no levantó, si en efecto los muertos no son levantados.
  revised_footnotes:
  - marker: a
    text: O «falsos testigos de Dios». El genitivo griego puede entenderse como testimonio acerca de Dios; sin embargo, la frase siguiente dice «contra Dios», lo que refuerza la gravedad del argumento de Pablo.
    reason: lexical_alternative
  - marker: b
    text: Griego «Cristo»; se traduce «Mesías» aquí porque Χριστός funciona como título en este contexto.
    reason: alternative_reading
  revision_rationale: Se corrige «acerca de Dios» a «contra Dios» para κατὰ τοῦ θεοῦ, preservando mejor el griego y la fuerza argumentativa del pasaje. Se mantiene «acerca de Dios» en la primera frase para reflejar la ambigüedad del genitivo τοῦ θεοῦ, ahora aclarada con una nota más precisa. El resto del versículo puede mantenerse tal como está.
