    unchanged: false
    changes_summary: 'Changed ''of God'' to ''about God'' and ''against God'' to ''about God'' to better reflect the genitive and κατά here in context: the testimony concerns God, not opposition to him. Kept the rest unchanged.'
translation:
  language: es
  text: Entonces también somos hallados como falsos testigos acerca de Dios[a], porque testificamos contra Dios que él levantó al Mesías[b], a quien no levantó, si en efecto los muertos no son levantados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «falsos testigos de Dios». El genitivo griego puede entenderse como testimonio acerca de Dios; sin embargo, la frase siguiente dice «contra Dios», lo que refuerza la gravedad del argumento de Pablo.
    reason: lexical_alternative
  - marker: b
    text: Griego «Cristo»; se traduce «Mesías» aquí porque Χριστός funciona como título en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: εὑρισκόμεθα
  english_pob_choice: we are found
  chosen_spanish: somos hallados
  alternatives_spanish:
  - resultamos ser
  - se nos encuentra
  lexicon: BDAG
  rationale: Conserva el valor pasivo/resultativo del griego y el matiz forense de ser hallados en una condición, sin volverlo demasiado pesado en español.
- source_word: δὲ καὶ
  english_pob_choice: Then ... even
  chosen_spanish: Entonces también
  alternatives_spanish:
  - Y también
  - Así que también
  lexicon: BDAG
  rationale: Mueve la inferencia lógica al frente con 'Entonces' y conserva la fuerza aditiva de καί con 'también'.
- source_word: ψευδομάρτυρες
  english_pob_choice: false witnesses
  chosen_spanish: falsos testigos
  alternatives_spanish:
  - testigos falsos
  - falsos declarantes
  lexicon: BDAG
  rationale: Equivale de manera natural y precisa al compuesto, manteniendo el peso judicial/testifical del término.
- source_word: τοῦ θεοῦ
  english_pob_choice: about God
  chosen_spanish: acerca de Dios
  alternatives_spanish:
  - de Dios
  - sobre Dios
  lexicon: BDAG
  rationale: Refleja el genitivo como referencia del testimonio. 'Acerca de Dios' preserva la lectura revisada del POB en un español claro, sin resolver indebidamente la ambigüedad.
- source_word: ἐμαρτυρήσαμεν
  english_pob_choice: we testified
  chosen_spanish: testificamos
  alternatives_spanish:
  - dimos testimonio
  - atestiguamos
  lexicon: BDAG
  rationale: Mantiene el valor forense y testimonial del aoristo en una forma natural para el español bíblico actual.
- source_word: κατὰ τοῦ θεοῦ
  english_pob_choice: about God
  chosen_spanish: acerca de Dios
  alternatives_spanish:
  - contra Dios
  - sobre Dios
  lexicon: BDAG
  rationale: 'Aunque κατά con genitivo puede significar ''contra'', sigo aquí la lectura revisada del audit trail: el punto es que el testimonio trata de Dios y atribuye a Dios una acción que no hizo. Esa tensión se deja en la formulación del conjunto y en la nota.'
- source_word: ἤγειρεν
  english_pob_choice: he raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - lo levantó
  lexicon: BDAG
  rationale: En este contexto pascual, 'levantó' conserva el paralelismo con el griego y permite abarcar el sentido de resurrección sin añadir una formulación más interpretativa en el verbo principal.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Sigue la decisión del POB de traducir Χριστός como título cuando funciona así en el argumento, y el acusativo personal español exige la 'a'.
- source_word: ὃν οὐκ ἤγειρεν
  english_pob_choice: whom he did not raise
  chosen_spanish: a quien no levantó
  alternatives_spanish:
  - a quien no resucitó
  - al cual no levantó
  lexicon: BDAG
  rationale: Conserva la relación relativa y el paralelismo verbal del original. 'Levantar' se mantiene para coherencia con el verbo previo y con el argumento tal como quedó en el audit trail.
- source_word: εἴπερ ἄρα
  english_pob_choice: if in fact
  chosen_spanish: si en efecto
  alternatives_spanish:
  - si de veras
  - si realmente
  lexicon: BDAG
  rationale: Expresa la condición asumida para el argumento de Pablo con una fórmula sobria y natural en español.
- source_word: νεκροὶ
  english_pob_choice: the dead
  chosen_spanish: los muertos
  alternatives_spanish:
  - los muertos que han fallecido
  - los difuntos
  lexicon: BDAG
  rationale: Es la forma idiomática española para el sustantivo colectivo; evita una perífrasis innecesaria.
- source_word: οὐκ ἐγείρονται
  english_pob_choice: are not raised
  chosen_spanish: no son levantados
  alternatives_spanish:
  - no son resucitados
  - no se levantan
  lexicon: BDAG
  rationale: Mantiene la pasiva y la correspondencia léxica con el verbo anterior. Aunque 'resucitados' sería más explícito teológicamente, 'levantados' preserva la continuidad terminológica del versículo.
theological_decisions:
- issue: Rendering of Χριστός as title
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva la decisión del POB de traducir Χριστός como título cuando no funciona como nombre fijo. 'Mesías' comunica el valor titular en el argumento de la resurrección y evita la transliteración innecesaria.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando el contexto es titular; preservar el forcejeo léxico donde corresponda.'
- issue: Force of κατὰ τοῦ θεοῦ / τοῦ θεοῦ
  english_pob_reading: about God
  chosen_spanish_reading: acerca de Dios
  alternative_spanish_readings:
  - contra Dios
  - de Dios
  rationale: 'La revisión más reciente del audit trail favorece una lectura de referencia: el testimonio versa sobre Dios. Sin embargo, el contexto sigue cargando una severidad implícita, porque ese testimonio afirma una acción divina que, de no haber resurrección, no habría ocurrido. La traducción española conserva esa tensión sin forzar ''contra Dios''.'
  doctrine_reference: 'DOCTRINE.md: preservar la tensión textual y teológica; primacía de la evidencia original.'
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB, que prefirió ''about God''/''acerca de Dios'' para τοῦ θεοῦ y κατὰ τοῦ θεοῦ. A la vez, se preserva el marco argumental: si no hay resurrección, los apóstoles quedan como falsos testigos porque atribuyeron a Dios una acción que no hizo. También se mantuvo la equivalencia formal del paralelismo verbal con ''levantó/levantados''.'
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός, conforme al criterio POB para este contexto titulado.
  - Se usa 'Dios' y no 'SEÑOR' porque el texto griego aquí tiene θεοῦ explícito.
  - Se conserva la pasiva en 'no son levantados' para reflejar ἐγείρονται sin desplazar el foco teológico.
  - La doble aparición de 'acerca de Dios' refleja la decisión revisada del audit trail y evita sobreinterpretar la preposición griega.
