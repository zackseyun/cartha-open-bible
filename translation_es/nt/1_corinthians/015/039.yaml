translation:
  language: es
  text: No toda carne es la misma carne[a], sino que una es la de los humanos, otra carne de los animales, otra de las aves[b] y otra de los peces.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más idiomática: ''No toda clase de carne es la misma''.'
    reason: lexical_alternative
  - marker: b
    text: 'O: ''una es la de los humanos, otra carne de los animales, otra carne de las aves y otra de los peces''. El griego repite ''carne'' con animales y aves, pero no con peces al final.'
    reason: previous_rendering
lexical_decisions:
- source_word: σὰρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - cuerpo
  - naturaleza
  lexicon: BDAG
  rationale: Aquí σάρξ se refiere de manera literal a la realidad corporal de distintos seres vivos, no al sentido paulino metafórico de inclinación pecaminosa. 'Carne' conserva la repetición léxica del griego y el contraste entre categorías creadas.
- source_word: οὐ πᾶσα σὰρξ ἡ αὐτὴ σάρξ
  english_pob_choice: Not all flesh is the same flesh
  chosen_spanish: No toda carne es la misma carne
  alternatives_spanish:
  - No toda clase de carne es la misma
  - No cada carne es la misma carne
  lexicon: BDAG
  rationale: La forma negativa universal del griego queda bien reflejada por 'No toda carne'. Mantener 'la misma carne' preserva la repetición enfática del original sin volver la frase artificial en español.
- source_word: ἄλλη
  english_pob_choice: another
  chosen_spanish: otra
  alternatives_spanish:
  - distinta
  - una clase distinta
  lexicon: BDAG
  rationale: ἄλλη señala distinción de categoría. 'Otra' reproduce mejor la serie paralela del texto y mantiene el ritmo enumerativo.
- source_word: ἀνθρώπων
  english_pob_choice: humans
  chosen_spanish: los humanos
  alternatives_spanish:
  - las personas
  - los hombres
  lexicon: BDAG
  rationale: El genitivo es genérico y no masculino exclusivo. 'Los humanos' expresa bien la categoría humana frente a animales, aves y peces.
- source_word: κτηνῶν
  english_pob_choice: animals
  chosen_spanish: los animales
  alternatives_spanish:
  - las bestias
  - el ganado
  lexicon: BDAG
  rationale: En esta lista de clases de criaturas, 'animales' es el equivalente natural y más claro en español. Evita restringir indebidamente el sentido a 'ganado' o a 'bestias'.
- source_word: πτηνῶν
  english_pob_choice: birds
  chosen_spanish: las aves
  alternatives_spanish:
  - los pájaros
  - las criaturas voladoras
  lexicon: BDAG
  rationale: Aunque el griego puede abarcar criaturas voladoras, en español 'aves' es la categoría más amplia, natural y adecuada para esta lista taxonómica.
- source_word: ἰχθύων
  english_pob_choice: fish
  chosen_spanish: los peces
  alternatives_spanish:
  - los peces
  lexicon: BDAG
  rationale: El plural genérico se expresa naturalmente como 'los peces' en español. Mantiene el valor categorial del griego sin sonar arcaico.
theological_decisions:
- issue: Sentido de σάρξ en contexto de resurrección y diversidad de criaturas
  english_pob_reading: literal 'flesh'
  chosen_spanish_reading: carne literal, no 'naturaleza pecaminosa'
  alternative_spanish_readings:
  - cuerpo
  - naturaleza pecaminosa
  rationale: El pasaje compara clases de seres vivientes y sus distintas realidades corporales. Por ello, el término debe permanecer literal y no moralizarse; 'carne' conserva la tensión léxica que Pablo usa.
  doctrine_reference: 'DOCTRINE.md Contested terms: σάρξ = flesh (literal) / sinful nature (metaphorical)'
translation_notes:
  revision_awareness: El inglés POB pasó por una corrección para evitar una formulación pesada ('one flesh is') y para reflejar mejor la idea de clases distintas. En español, la estructura 'una es la de..., otra la de...' logra de forma natural la misma serie paralela sin necesidad de expandir artificialmente el primer miembro. Se mantuvo 'carne' de modo consistente para reflejar la repetición léxica del griego.
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra convención de ocultamiento porque el versículo no contiene κύριος ni el nombre divino.
  - Se prefirió 'carne' frente a 'cuerpo' para conservar el campo léxico de σάρξ y su repetición.
  - Se usó 'aves' como categoría más natural que 'pájaros' en un registro bíblico neutro y amplio.
  - Se mantuvo la serie paralela con 'una... otra... otra... otra...' para reproducir el efecto retórico del griego.
