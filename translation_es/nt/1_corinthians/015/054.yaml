  text: ὅταν δὲ τὸ ⸂φθαρτὸν τοῦτο ἐνδύσηται ἀφθαρσίαν καὶ τὸ⸃ θνητὸν τοῦτο ἐνδύσηται ⸀ἀθανασίαν, τότε γενήσεται ὁ λόγος ὁ γεγραμμένος· Κατεπόθη ὁ θάνατος εἰς νῖκος.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/015/054.yaml
  text: 'But when this perishable puts on imperishability[a], and this mortal puts on immortality[d][c][b], then the written word will come to pass: “Death has been swallowed up in victory.”'
