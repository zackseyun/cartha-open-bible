translation:
  language: es
  text: 'Pero cuando lo corruptible se vista de incorrupción[a], y lo mortal se vista de inmortalidad, entonces llegará a cumplirse[b] la palabra escrita[c][d]: «La muerte ha sido tragada en victoria»[e].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «incorruptibilidad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acontecerá» o «llegará a suceder». El verbo griego se refiere más literalmente a que la palabra escrita llegue a pasar o suceder.'
    reason: alternative_reading
  - marker: c
    text: Cita de Isaías 25:8, con formulación que sigue la tradición griega citada por Pablo.
    reason: cross_reference
  - marker: d
    text: 'O: «la palabra que está escrita».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «ha sido absorbida en victoria».'
    reason: alternative_reading
lexical_decisions:
- source_word: φθαρτὸν
  english_pob_choice: perishable
  chosen_spanish: corruptible
  alternatives_spanish:
  - perecedero
  - sujeto a corrupción
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere al cuerpo presente en su condición de decadencia. En español, "corruptible" mantiene la relación léxica con "incorrupción" y conserva el contraste del par sin sonar excesivamente técnico.
- source_word: ἐνδύσηται
  english_pob_choice: puts on
  chosen_spanish: se vista de
  alternatives_spanish:
  - se ponga
  - se revista de
  lexicon: BDAG
  rationale: La metáfora de vestirse se conserva bien con la construcción reflexiva "se vista de", que suena natural en español y mantiene la imagen paulina de asumir una nueva condición.
- source_word: ἀφθαρσίαν
  english_pob_choice: imperishability
  chosen_spanish: incorrupción
  alternatives_spanish:
  - incorruptibilidad
  - no corrupción
  lexicon: BDAG
  rationale: '"Incorrupción" es la forma más tradicional y precisa para el contraste con "corruptible" y preserva mejor la raíz semántica del griego que una perífrasis.'
- source_word: θνητὸν
  english_pob_choice: mortal
  chosen_spanish: mortal
  alternatives_spanish:
  - sujeto a muerte
  lexicon: BDAG
  rationale: '"Mortal" es la equivalencia directa y natural, y forma en español el par esperado con "inmortalidad".'
- source_word: ἀθανασίαν
  english_pob_choice: immortality
  chosen_spanish: inmortalidad
  alternatives_spanish:
  - no mortalidad
  lexicon: BDAG
  rationale: Es la traducción estándar y transparente de la idea de ausencia de muerte, en paralelo con "mortal".
- source_word: γενήσεται
  english_pob_choice: will come to pass
  chosen_spanish: se cumplirá
  alternatives_spanish:
  - acontecerá
  - llegará a cumplirse
  lexicon: BDAG
  rationale: El verbo γίνομαι aquí expresa que la declaración escrita llega a realizarse. En español, "se cumplirá" comunica ese acontecer realizado sin añadir innecesariamente una lectura doctrinal ajena al verbo.
- source_word: ὁ λόγος ὁ γεγραμμένος
  english_pob_choice: the written word
  chosen_spanish: la palabra escrita
  alternatives_spanish:
  - la palabra que está escrita
  - el escrito
  lexicon: BDAG
  rationale: '"Palabra escrita" reproduce bien el valor de λόγος con el participio perfecto de γράφω en un contexto de cita. "Palabra" es más natural que "verbo" o "discurso" en este pasaje, y mantiene la referencia a lo ya escrito.'
- source_word: Κατεπόθη
  english_pob_choice: has been swallowed up
  chosen_spanish: ha sido devorada
  alternatives_spanish:
  - ha sido absorbida
  - ha sido tragada
  lexicon: BDAG
  rationale: El pasivo de καταπίνω conserva la imagen de ser tragado/devorado. "Devorada" funciona bien en español bíblico contemporáneo y comunica el golpe retórico de la cita, sin perder el matiz figurado.
- source_word: εἰς νῖκος
  english_pob_choice: in victory
  chosen_spanish: en victoria
  alternatives_spanish:
  - para victoria
  - hasta la victoria
  lexicon: BDAG
  rationale: La preposición εἰς con sustantivo abstracto expresa resultado/estado. "En victoria" es la manera más natural y fiel de reflejar ese estado consumado en español.
theological_decisions:
- issue: Cómo reflejar el valor futuro-realizado de la cita en relación con γενήσεται
  english_pob_reading: will come to pass
  chosen_spanish_reading: se cumplirá
  alternative_spanish_readings:
  - acontecerá
  - llegará a cumplirse
  rationale: La frase presenta la declaración escrita como hecha realidad en ese momento del argumento paulino. "Se cumplirá" conserva la idea de realización sin convertir el verbo en una fórmula más fuerte de la que el griego exige.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo traducir la cita de Isaías 25:8 sin borrar la textura de la metáfora
  english_pob_reading: Death has been swallowed up in victory
  chosen_spanish_reading: La muerte ha sido devorada en victoria
  alternative_spanish_readings:
  - La muerte ha sido tragada en victoria
  - La muerte ha sido absorbida en victoria
  rationale: La metáfora de καταπίνω es violenta e imagética; "devorada" transmite bien ese impacto en español. Se conserva el pasivo para no introducir un agente explícito y se mantiene el estado de victoria como resultado consumado.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La redacción española sigue la revisión más reciente del POB inglés al reflejar γενήσεται con una expresión natural de cumplimiento, pero adapta la elección léxica al español para conservar el contraste corruptible/incorrupción y el pasivo figurado de la cita. Se evita traducir mecánicamente desde el inglés cuando el español pide una construcción más idiomática, especialmente en la metáfora de vestirse y en la fórmula de la cita.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino en general según las normas del proyecto, pero este versículo no lo contiene explícitamente.
  - Se usa "mortal/inmortalidad" como par léxico coherente con el griego y con el estilo del proyecto.
  - '"Palabra escrita" conserva el valor de λόγος sin introducir términos eclesiásticos más interpretativos como "Escritura" donde el contexto inmediato enfatiza la expresión citada.'
  - La colocación de las notas sigue el orden de aparición en el texto y evita reutilizar marcadores.
