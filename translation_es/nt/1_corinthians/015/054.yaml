    text: 'O: «incorruptibilidad».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «acontecerá» o «llegará a suceder». El verbo griego se refiere más literalmente a que la palabra escrita llegue a pasar o suceder.'
    reason: alternative_reading
  - marker: c
    text: Cita de Isaías 25:8, con formulación que sigue la tradición griega citada por Pablo.
    reason: cross_reference
  - marker: d
    text: 'O: «la palabra que está escrita».'
    reason: lexical_alternative
  - marker: e
    text: 'O: «ha sido absorbida en victoria».'
    reason: alternative_reading
  revision_rationale: Se revisa «se cumplirá» a «llegará a cumplirse» para reflejar mejor el valor de γενήσεται sin imponer una fórmula de cumplimiento más fuerte de lo necesario, en línea con «will come to pass» del POB inglés. Se cambia «devorada» por «tragada» como equivalente más directo de Κατεπόθη. También se suaviza la rigidez de «esto corruptible / esto mortal» a «lo corruptible / lo mortal» para un español más natural sin perder el referente general del cuerpo presente.
