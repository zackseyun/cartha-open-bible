revisions:
- from: 'Pero cuando esto corruptible se vista de incorrupción[a], y esto mortal se vista de inmortalidad, entonces se cumplirá[b] la palabra escrita[c][d]: «La muerte ha sido devorada en victoria»[e].'
  to: 'Pero cuando lo corruptible se vista de incorrupción[a], y lo mortal se vista de inmortalidad, entonces llegará a cumplirse[b] la palabra escrita[c][d]: «La muerte ha sido tragada en victoria»[e].'
  rationale: Se revisa «se cumplirá» a «llegará a cumplirse» para reflejar mejor el valor de γενήσεται sin imponer una fórmula de cumplimiento más fuerte de lo necesario, en línea con «will come to pass» del POB inglés. Se cambia «devorada» por «tragada» como equivalente más directo de Κατεπόθη. También se suaviza la rigidez de «esto corruptible / esto mortal» a «lo corruptible / lo mortal» para un español más natural sin perder el referente general del cuerpo presente.
  reviewer_model: gpt-5.4
