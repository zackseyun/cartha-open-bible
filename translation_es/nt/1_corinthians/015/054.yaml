review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue de cerca la estructura griega y preserva bien los pares léxicos φθαρτόν/ἀφθαρσία y θνητόν/ἀθανασία mediante «corruptible/incorrupción» y «mortal/inmortalidad». También mantiene la metáfora de vestirse para ἐνδύσηται y el valor de cita escrita en ὁ λόγος ὁ γεγραμμένος. Sin embargo, hay dos puntos que conviene ajustar para mayor fidelidad al audit trail y al griego: 1) γενήσεται se ha vertido como «se cumplirá», opción posible pero más interpretativa que «llegará a suceder / acontecerá / llegará a cumplirse»; dado que el English POB terminó en «will come to pass», en español conviene una formulación menos fuerte que fórmula de cumplimiento. 2) Κατεπόθη se ha traducido «ha sido devorada», que intensifica la imagen respecto de «ha sido tragada / absorbida / engullida» y se aleja del equivalente más directo de καταπίνω. '
  spanish_quality_summary: El español es claro, digno y ampliamente legible. No obstante, «esto corruptible» y «esto mortal» suenan algo menos naturales en español bíblico que «lo corruptible» y «lo mortal» o «este cuerpo corruptible»; aun así, pueden mantenerse si se quiere cercanía formal. La mejora principal está en suavizar «se cumplirá» y evitar «devorada», que en español introduce un matiz más agresivo del que pide el verbo griego. Además, la colocación de notas [c][d] sobre «la palabra escrita» está bien, pero la nota [a] actualmente está anclada a «incorrupción» aunque el contenido alternativo se refiere correctamente a ese sustantivo; eso no requiere cambio.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. Las decisiones «corruptible/incorrupción», «mortal/inmortalidad» y «palabra escrita» son defendibles. La revisión propuesta alinea mejor el pasaje con la racionalidad documentada del POB para γενήσεται («llegar a suceder / venir a ser realidad») y para Κατεπόθη con un equivalente más directo del campo semántico de «tragar».
  issues:
  - severity: medium
    issue: «se cumplirá» para γενήσεται es más interpretativo que el griego base y que el audit trail inglés final.
    rationale: γίνομαι aquí significa más literalmente «suceder / llegar a pasar / venir a ser». «Se cumplirá» es posible en contexto de cita, pero importa lenguaje de cumplimiento más fuerte de lo explícito en el verbo.
  - severity: medium
    issue: «ha sido devorada» intensifica la imagen de Κατεπόθη.
    rationale: καταπίνω significa «tragar, engullir, absorber». «Devorar» es una imagen vecina pero más agresiva y menos directa; «ha sido tragada» preserva mejor la metáfora pasiva del texto.
  - severity: low
    issue: «esto corruptible» y «esto mortal» suenan algo rígidos en español.
    rationale: Aunque son formalmente cercanos al griego, en español fluye mejor «lo corruptible» / «lo mortal» o una solución explícita con «este cuerpo». No es un error grave, pero puede pulirse para legibilidad.
  revised_spanish_text: 'Pero cuando lo corruptible se vista de incorrupción[a], y lo mortal se vista de inmortalidad, entonces llegará a cumplirse[b] la palabra escrita[c][d]: «La muerte ha sido tragada en victoria»[e].'
  revised_footnotes:
