lexical_decisions:
- source_word: ἔσχατος
  english_pob_choice: last
  chosen_spanish: último
  alternatives_spanish:
  - final
  - último en la secuencia
  lexicon: BDAG
  rationale: ἔσχατος señala lo que viene al final de una secuencia; «último» comunica con naturalidad el valor escatológico y el orden del argumento paulino.
- source_word: ἐχθρὸς
  english_pob_choice: enemy
  chosen_spanish: enemigo
  alternatives_spanish:
  - adversario
  - foe
  lexicon: BDAG
  rationale: El sustantivo presenta a la muerte como una potencia hostil personificada; «enemigo» es la equivalencia natural y clara en español.
- source_word: καταργεῖται
  english_pob_choice: to be abolished
  chosen_spanish: ser abolido
  alternatives_spanish:
  - ser destruido
  - ser anulado
  - ser dejado sin poder
  lexicon: BDAG
  rationale: El pasivo presente se expresa mejor en español con una construcción infinitiva vinculada al copulativo implícito del verso. «Abolido» preserva la idea de quedar suprimido o hecho ineficaz sin forzar una noción más fuerte que el verbo griego por sí solo.
- source_word: ὁ θάνατος
  english_pob_choice: death
  chosen_spanish: la muerte
  alternatives_spanish:
  - muerte
  lexicon: BDAG
  rationale: El artículo griego marca el sustantivo como definido y personificado; en español, «la muerte» conserva naturalmente esa referencia a la potencia final adversaria.
theological_decisions:
- issue: Cómo reflejar καταργεῖται respecto de la derrota de la muerte
  english_pob_reading: to be abolished
  chosen_spanish_reading: ser abolido
  alternative_spanish_readings:
  - ser destruido
  - ser anulado
  rationale: El texto afirma el final de la muerte como enemigo escatológico. «Ser abolido» conserva el sentido de ser llevada a su término o quedar sin efecto, sin añadir una afirmación metafísica más específica que la del verbo griego. Se mantiene así la tensión léxica entre abolición, destrucción y anulación.
  doctrine_reference: 'Translation philosophy: Preserve theological tension rather than resolve it; original-language primacy over translation tradition.'
translation_notes:
  revision_awareness: El paquete fuente y la traducción inglesa auditada muestran alta concordancia y sin revisiones aplicadas; esta versión española sigue de cerca la estructura del griego y conserva la alternativa léxica relevante de καταργεῖται en nota.
  spanish_consistency_notes:
  - Se mantiene «muerte» como sustantivo personificado con artículo definido para reflejar ὁ θάνατος.
  - «Abolido» se usa como opción principal por consistencia con la decisión inglesa de no sobrecargar el verbo con «destruido».
  - La puntuación y la mayúscula inicial siguen la convención editorial española estándar.
