    rationale: La auditoría inglesa documenta «natural» como elección principal y deja «soulish» como alternativa en nota. En español, «anímico» es comprensible pero técnico, menos natural y puede sugerir categorías psicológicas modernas.
  - severity: medium
    issue: La nota al pie no presenta bien la alternativa léxica.
