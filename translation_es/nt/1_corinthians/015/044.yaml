    rationale: Aunque posible, en español bíblico moderno puede sonar reflexivo o ambiguo. «Es resucitado» conserva mejor la pasiva y el sentido de resurrección corporal.
  revised_spanish_text: Se siembra cuerpo natural; es resucitado cuerpo espiritual. Si hay cuerpo natural[a], también hay cuerpo espiritual.
