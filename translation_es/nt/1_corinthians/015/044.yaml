  source_alignment_summary: El borrador sigue bien la estructura griega y conserva el contraste clave entre σῶμα ψυχικόν y σῶμα πνευματικόν. Sin embargo, se aparta innecesariamente de la decisión léxica auditada de la POB inglesa al usar «anímico» en el texto principal donde el inglés eligió «natural» y reservó la alternativa para nota. Además, «se levanta» para ἐγείρεται es menos preciso que el idiomático «es resucitado»/«se resucita» en este contexto; la mejor equivalencia formal y contextual en español es «es resucitado» o, más naturalmente aquí, mantener la pasiva con «es resucitado».
  spanish_quality_summary: El español es claro, pero «cuerpo anímico» suena técnico y menos natural para lectura eclesial amplia. «Cuerpo natural» comunica mejor en español moderno y se ajusta a la intención de evitar una lectura platónica o excesivamente especializada. La nota actual además repite «cuerpo anímico» bajo un encabezado de alternativa; conviene corregirla para que la alternativa real sea «cuerpo anímico» o «cuerpo del alma».
  glossary_alignment: 'No hay conflicto con términos globales mayores. La cuestión principal es la alineación con la decisión contextual para ψυχικόν: por defecto aquí debe seguirse «natural» en el texto y dejar «anímico» como alternativa explicativa en nota, en paralelo con la auditoría inglesa.'
