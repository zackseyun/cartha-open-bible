translation:
  language: es
  text: Se siembra cuerpo natural; es resucitado cuerpo espiritual. Si hay cuerpo natural[a], también hay cuerpo espiritual.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cuerpo anímico» ... «cuerpo espiritual». El contraste de Pablo no es entre un cuerpo material y uno inmaterial, sino entre un cuerpo animado por la vida humana ordinaria y uno animado por el Espíritu.
    reason: lexical_alternative
lexical_decisions:
- source_word: σπείρεται
  english_pob_choice: it is sown
  chosen_spanish: se siembra
  alternatives_spanish:
  - es sembrado
  - se planta
  lexicon: BDAG
  rationale: La pasiva presente se conserva con una forma natural en español. 'Se siembra' mantiene la imagen agrícola del contexto y evita una construcción más pesada; 'se planta' sería posible pero cambia ligeramente el matiz del verbo griego.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo humano
  - organismo
  lexicon: BDAG
  rationale: '''Cuerpo'' es la equivalencia directa y más natural aquí. El contexto habla de resurrección corporal, así que no conviene diluir el término con una paráfrasis.'
- source_word: ψυχικόν
  english_pob_choice: natural
  chosen_spanish: anímico
  alternatives_spanish:
  - natural
  - soulish
  - físico
  - no espiritual
  lexicon: BDAG
  rationale: La POB inglesa eligió 'natural' para evitar 'physical' y para no oponer materialidad a inmaterialidad. En español, 'anímico' refleja mejor la relación con ψυχή y conserva la tensión léxica sin sugerir 'alma' en sentido platónico. 'Natural' es comprensible, pero puede sonar demasiado amplio; por eso se deja constancia de la alternativa en nota.
- source_word: ἐγείρεται
  english_pob_choice: it is raised
  chosen_spanish: se levanta
  alternatives_spanish:
  - es levantado
  - resucita
  lexicon: BDAG
  rationale: Se mantiene la pasiva presente y la imaginería de levantamiento propia del pasaje. 'Se levanta' es idiomático en español y corresponde bien al lenguaje de resurrección del contexto; 'resucita' explicita el sentido, pero es menos literal.
- source_word: πνευματικόν
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - del Espíritu
  - espirituado
  - animado por el Espíritu
  lexicon: BDAG
  rationale: '''Espiritual'' preserva el contraste paulino con ψυχικόν y coincide con la opción inglesa. No debe entenderse como no corporal, sino como caracterizado por el Espíritu; esa aclaración se conserva en nota.'
- source_word: Εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Cuando
  - Puesto que
  lexicon: BDAG
  rationale: La partícula condicional se traduce de forma directa para respetar la forma gramatical griega. Aunque el razonamiento pueda tener fuerza inferencial, 'Si' evita añadir una causalidad no expresada explícitamente.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - además
  - igualmente
  lexicon: BDAG
  rationale: '''También'' expresa con claridad el valor aditivo de la cláusula final y su relación lógica con la anterior.'
theological_decisions:
- issue: Contraste entre σώμα ψυχικόν y σώμα πνευματικόν
  english_pob_reading: The contrast is not between a material body and an immaterial one, but between a body animated by ordinary human life and one animated by the Spirit.
  chosen_spanish_reading: El contraste no es entre un cuerpo material y uno inmaterial, sino entre un cuerpo animado por la vida ordinaria humana y uno animado por el Espíritu.
  alternative_spanish_readings:
  - cuerpo físico versus cuerpo no físico
  - cuerpo del alma versus cuerpo del Espíritu
  rationale: La traducción principal conserva el paralelismo del griego sin sugerir que la resurrección elimine la corporalidad. 'Anímico' y 'espiritual' mantienen la oposición terminológica y la nota explica que no se trata de materialidad contra inmaterialidad.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: Sin cambios respecto del análisis de revisión más reciente; el texto sigue el acuerdo alto del control cruzado y conserva la distinción léxica principal entre ψυχικόν y πνευματικόν.
  spanish_consistency_notes:
  - Se evita 'SEÑOR' o fórmulas de sustitución porque no aparecen en el versículo.
  - '''Espiritual'' no se usa aquí como sinónimo de ''inmaterial''; la nota preserva la lectura doctrinal correcta de la resurrección corporal.'
  - '''Anímico'' se eligió para reflejar ψυχικός sin caer en un calco opaco; la nota ofrece la alternativa ''cuerpo espiritual'' conforme al contraste paulino.'
