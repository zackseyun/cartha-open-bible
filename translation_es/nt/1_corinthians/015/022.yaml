translation:
  language: es
  text: Porque así como en Adán todos mueren, así también en el Mesías[a] todos serán hechos vivir.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo». El título griego Χριστός puede transliterarse como «Cristo» o traducirse como «Mesías»; aquí se traduce por su sentido.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥσπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Así como
  - Pues así como
  lexicon: BDAG
  rationale: «Porque» conserva la conexión explicativa de γάρ y «así como» reproduce la comparación de ὥσπερ en español natural.
- source_word: ἐν τῷ Ἀδὰμ
  english_pob_choice: in Adam
  chosen_spanish: en Adán
  alternatives_spanish:
  - en unión con Adán
  - por medio de Adán
  lexicon: BDAG
  rationale: Mantiene la formulación compacta y paralela del griego, sin interpretar de más la relación expresada por ἐν.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las personas
  - כולם
  lexicon: BDAG
  rationale: «Todos» preserva el alcance amplio y no especificado del texto, manteniendo el paralelismo entre ambas apariciones de πάντες.
- source_word: ἀποθνῄσκουσιν
  english_pob_choice: die
  chosen_spanish: mueren
  alternatives_spanish:
  - están muriendo
  lexicon: BDAG
  rationale: El presente gnómico en español se expresa de manera natural con el presente simple «mueren».
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - así
  - de igual manera también
  lexicon: BDAG
  rationale: Reproduce la correlación con la primera mitad del versículo y conserva la fuerza aditiva de καί sin sonar rígido.
- source_word: ἐν τῷ Χριστῷ
  english_pob_choice: in the Messiah
  chosen_spanish: en el Mesías
  alternatives_spanish:
  - en Cristo
  lexicon: BDAG
  rationale: Χριστός se toma aquí como título, no como nombre propio fijo; por eso se vierte «Mesías», siguiendo la decisión documentada del POB en inglés.
- source_word: ζῳοποιηθήσονται
  english_pob_choice: will be made alive
  chosen_spanish: serán vivificados
  alternatives_spanish:
  - serán hechos vivir
  - recibirán vida
  lexicon: BDAG
  rationale: El futuro pasivo se expresa con un verbo que conserva la pasividad y la acción divina implícita. «Vivificados» es idiomático en registro bíblico y refleja bien la forma verbal.
theological_decisions:
- issue: Alcance de «todos» en ambos miembros del paralelo
  english_pob_reading: Retain the unqualified 'all' in both halves of the verse without narrowing or resolving the theological implications in translation.
  chosen_spanish_reading: Mantener «todos» en ambos miembros sin limitarlo ni explicarlo en exceso.
  alternative_spanish_readings:
  - todos los creyentes
  - toda la humanidad en el mismo sentido
  rationale: El griego presenta un paralelismo intencional πάντες… πάντες y no define por sí mismo el mecanismo ni el alcance exacto. La traducción conserva esa tensión teológica sin resolverla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Elección de «Mesías» frente a «Cristo»
  english_pob_reading: The Greek title Χριστός can be rendered 'Christ' or translated as 'Messiah'; here it is translated for meaning.
  chosen_spanish_reading: Usar «Mesías» en el texto principal.
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός funciona como título paralelo a Adán. «Mesías» comunica el valor semántico del título y sigue la política documental del POB de traducir el título cuando corresponde.
  doctrine_reference: Project-level terminology default for Χριστός / Messiah language.
translation_notes:
  revision_awareness: La base inglesa de trabajo pasó por una corrección de ida y vuelta entre «Christ» y «Messiah», con restauración final de «Messiah» por política doctrinal. La presente traducción sigue esa decisión final y la expresa en español como «Mesías» en vez de transliterar el título.
  spanish_consistency_notes:
  - Se mantiene el paralelismo sintáctico entre las dos mitades del versículo.
  - Se evita introducir explicaciones interpretativas sobre el alcance de «todos».
  - Se conserva un registro bíblico claro y contemporáneo, sin arcaísmos innecesarios.
  - «Mesías» se usa como título traducido y no como nombre propio transliterado.
