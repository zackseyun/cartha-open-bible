revisions:
- from: Pero ahora el Mesías[a] ha sido resucitado[b] de entre los muertos, primicias[c] de los que han dormido[d].
  to: Pero ahora el Mesías[a] ha sido levantado[b] de entre los muertos, las primicias[c] de los que se han dormido[d].
  rationale: 'Se hacen ajustes menores para mejorar la naturalidad y la precisión semántica en español: ''ha sido levantado'' preserva mejor la pasiva de ἐγήγερται de forma idiomática; ''las primicias'' suena más natural; y ''los que se han dormido'' conserva mejor la metáfora de muerte que ''los que han dormido''.'
