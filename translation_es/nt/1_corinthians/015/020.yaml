translation:
  language: es
  text: Pero ahora el Mesías[a] ha sido levantado[b] de entre los muertos, las primicias[c] de los que se han dormido[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Cristo'.
    reason: alternative_reading
  - marker: b
    text: La voz pasiva conserva que la resurrección es una acción realizada por Dios, sin expresarlo de forma explícita en la cláusula.
    reason: theological_note
  - marker: c
    text: '''Las primicias'' evoca la primera porción de la cosecha ofrecida a Dios, con sentido de prioridad y garantía de la cosecha plena que vendrá.'
    reason: cultural_note
  - marker: d
    text: '''Los que se han dormido'' es una metáfora de los muertos, especialmente en un contexto de resurrección.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Νυνὶ δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Mas ahora
  - Pero en este momento
  lexicon: BDAG
  rationale: Expresa el giro adversativo fuerte y la corrección inmediata del argumento anterior con una fórmula natural en español actual.
- source_word: Χριστὸς
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός según la política del proyecto; en este contexto argumentativo y teológico, 'Mesías' comunica mejor el sentido del término griego que la forma ya lexicalizada 'Cristo'.
- source_word: ἐγήγερται
  english_pob_choice: has been raised
  chosen_spanish: ha sido resucitado
  alternatives_spanish:
  - ha sido levantado
  - ha resucitado
  lexicon: BDAG
  rationale: El perfecto pasivo preserva la acción completada con efecto vigente y mantiene implícita la agencia divina. 'Ha sido resucitado' refleja mejor la pasividad del griego que 'ha resucitado'.
- source_word: ἐκ νεκρῶν
  english_pob_choice: from the dead
  chosen_spanish: de entre los muertos
  alternatives_spanish:
  - de los muertos
  - de entre los muertos
  lexicon: BDAG
  rationale: '''De entre los muertos'' conserva el matiz idiomático de separación desde el conjunto de los muertos y suena natural en español bíblico contemporáneo.'
- source_word: ἀπαρχὴ
  english_pob_choice: the firstfruits
  chosen_spanish: primicias
  alternatives_spanish:
  - las primicias
  - primera porción
  lexicon: BDAG
  rationale: Se traduce por el término cultual 'primicias', que preserva la imagen sacrificial y representativa del original. En español, el sustantivo plural suele funcionar de modo idiomático sin artículo cuando cumple valor predicativo.
- source_word: τῶν κεκοιμημένων
  english_pob_choice: of those who have fallen asleep
  chosen_spanish: de los que han dormido
  alternatives_spanish:
  - de los que se han dormido
  - de los que han fallecido
  lexicon: BDAG
  rationale: Se mantiene la metáfora de dormir, común en contexto de resurrección. 'Han dormido' conserva la suavidad eufemística sin aplastarla en una designación directa de muerte.
theological_decisions:
- issue: Agencia en la resurrección
  english_pob_reading: has been raised
  chosen_spanish_reading: ha sido resucitado
  alternative_spanish_readings:
  - ha resucitado
  - ha sido levantado
  rationale: La pasiva evita ocultar la acción de Dios en la resurrección y sigue de cerca la forma verbal griega, manteniendo la tensión teológica documentada por el audit trail.
  doctrine_reference: Preservar la voz pasiva donde el griego la usa para no borrar la agencia divina.
- issue: Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La evidencia del pasaje usa Χριστός como título en un argumento sobre resurrección y primacía; 'Mesías' evita convertirlo en mero nombre propio y sigue la línea doctrinal del proyecto.
  doctrine_reference: 'Contested terms: Χριστός → Mesías cuando funciona como título.'
- issue: Metáfora de dormir para la muerte
  english_pob_reading: those who have fallen asleep
  chosen_spanish_reading: los que han dormido
  alternative_spanish_readings:
  - los que se han dormido
  - los que han fallecido
  rationale: Se conserva la metáfora tradicional del texto para no perder la resonancia resurreccional ni la suavidad semántica que el participio griego aporta en este contexto.
  doctrine_reference: Mantener el eufemismo resurreccional de κοιμάομαι.
translation_notes:
  revision_awareness: La historia editorial inglesa muestra una oscilación entre 'the Messiah' y 'Christ', con restauración final de 'Messiah' por política doctrinal. La versión española sigue esa decisión final y la traduce por 'el Mesías', manteniendo además la pasiva de ἐγήγερται y la metáfora de κοιμάομαι. También se conserva la nota cultual de ἀπαρχή y la lectura eufemística de 'dormir' para los muertos.
  spanish_consistency_notes:
  - Se usa 'Mesías' para Χριστός como título, de acuerdo con la política del proyecto y el contexto teológico del versículo.
  - Se evita 'SEÑOR' o sustituciones litúrgicas no presentes en el texto.
  - '''Resucitado'' se emplea en pasiva para preservar la agencia divina implícita.'
  - '''Primicias'' mantiene el trasfondo sacrificial/cultual sin explicitarlo en el texto principal.'
  - La metáfora de 'dormir' se conserva por coherencia con el lenguaje paulino de resurrección.
