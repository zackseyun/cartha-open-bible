translation:
  language: es
  text: Pues él debe reinar hasta que haya puesto a todos sus enemigos bajo sus pies[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «hasta que ponga a todos sus enemigos bajo sus pies». El griego no obliga a distinguir entre estas opciones de aspecto en español.'
    reason: lexical_alternative
  - marker: b
    text: Esta imagen de poner a los enemigos «bajo sus pies» es una figura bíblica de sometimiento completo; compárese el Salmo 110:1.
    reason: cross_reference
lexical_decisions:
- source_word: δεῖ
  english_pob_choice: must
  chosen_spanish: debe
  alternatives_spanish:
  - tiene que
  - es necesario que
  lexicon: BDAG
  rationale: «Debe» expresa obligación o necesidad con naturalidad en español y conserva la fuerza de inevitabilidad del griego sin sobrecargar la frase.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Aquí introduce la razón de lo dicho antes; «Porque» preserva esa relación explicativa de manera clara y formal en español.
- source_word: αὐτὸν
  english_pob_choice: he
  chosen_spanish: él
  alternatives_spanish:
  - lo
  - a él
  lexicon: BDAG
  rationale: 'Aunque el griego usa acusativo en una construcción de infinitivo, el español requiere sujeto explícito: «él debe reinar» comunica el sentido sin calco innecesario.'
- source_word: βασιλεύειν
  english_pob_choice: reign
  chosen_spanish: reinar
  alternatives_spanish:
  - gobernar como rey
  - ser rey
  lexicon: BDAG
  rationale: «Reinar» es el equivalente directo y conserva el matiz real de βασιλεύειν sin expansión interpretativa.
- source_word: ἄχρι οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: «Hasta que» expresa el límite temporal de forma natural en español y no añade por sí mismo la idea de que el reinado termine después.
- source_word: θῇ
  english_pob_choice: has put
  chosen_spanish: haya puesto
  alternatives_spanish:
  - ponga
  - coloque
  lexicon: BDAG
  rationale: El subjuntivo perfecto en español («haya puesto») reproduce bien la meta completada que el inglés POB expresa con «has put», sin decidir más de lo que el griego exige.
- source_word: πάντας τοὺς ἐχθροὺς
  english_pob_choice: all his enemies
  chosen_spanish: a todos sus enemigos
  alternatives_spanish:
  - todos sus enemigos
  - a cada uno de sus enemigos
  lexicon: BDAG
  rationale: La expresión es total y personal; el complemento con «a» corresponde al objeto directo animado en español y mantiene la plenitud de la oposición.
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  english_pob_choice: under his feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo sus plantas
  lexicon: BDAG
  rationale: «Bajo sus pies» conserva la imagen bíblica de sometimiento completa con una formulación natural en español. Se evita suavizar la metáfora.
theological_decisions:
- issue: Fuerza temporal de ἄχρι οὗ / 'until'
  english_pob_reading: Rendered 'until' without implying that Messiah's reign ceases afterward.
  chosen_spanish_reading: «Hasta que» sin insinuar que su reinado termina después de ese momento.
  alternative_spanish_readings:
  - «hasta que termine de reinar»
  - «mientras»
  rationale: El griego marca un límite temporal, no la cesación del reinado. La redacción española conserva esa tensión y no resuelve indebidamente la implicación teológica.
  doctrine_reference: Preservar la tensión teológica sin añadir una conclusión no explícita en el texto.
translation_notes:
  revision_awareness: La revisión más reciente indica que el texto fuente y la traducción inglesa de auditoría permanecen sin cambios (estado de alta concordancia). Por eso no se introdujeron ajustes textuales adicionales, solo una formulación española idiomática que mantiene el mismo alcance semántico y la misma tensión temporal.
  spanish_consistency_notes:
  - Se mantuvo «reinar» para βασιλεύειν, coherente con el uso POB de lenguaje real.
  - Se prefirió «bajo sus pies» sobre variantes más explicativas para conservar la metáfora bíblica.
  - «Hasta que» se eligió para ἄχρι οὗ sin resolver la duración posterior del reinado.
  - 'El objeto directo animado se marcó con «a» en español: «a todos sus enemigos».'
