translation:
  language: es
  text: Porque ha sujetado todas las cosas bajo sus pies. Pero cuando dice que todas las cosas han sido sujetadas, es claro que esto excluye[a] al que le sujetó todas las cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «excepto al que le sujetó todas las cosas».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα / τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todo / todas las cosas
  alternatives_spanish:
  - todo
  - todas las cosas
  - todo lo creado
  lexicon: BDAG
  rationale: El plural neutro abarca de manera total e indeterminada. En español, 'todo' en la primera cláusula fluye mejor con el verbo, y 'todas las cosas' conserva la amplitud en la segunda, manteniendo la resonancia con el eco del Salmo 8.
- source_word: ὑπέταξεν
  english_pob_choice: has subjected
  chosen_spanish: ha sujetado
  alternatives_spanish:
  - ha sometido
  - ha puesto en sujeción
  - ha puesto bajo dominio
  lexicon: BDAG
  rationale: '''Sujetar'' expresa bien la idea de poner en subordinación sin sobrecargar el texto. ''Ha sujetado'' mantiene el resultado permanente del acto y suena natural en español bíblico contemporáneo.'
- source_word: ὑπὸ τοὺς πόδας αὐτοῦ
  english_pob_choice: under his feet
  chosen_spanish: bajo sus pies
  alternatives_spanish:
  - debajo de sus pies
  - bajo sus plantas
  lexicon: BDAG
  rationale: Se preserva el modismo bíblico de dominio y sometimiento. 'Bajo sus pies' es idiomático, claro y conserva la alusión escritural.
- source_word: ὅταν δὲ εἴπῃ
  english_pob_choice: But when it says
  chosen_spanish: Pero cuando dice
  alternatives_spanish:
  - Pero cuando se dice
  - Pero cuando él dice
  lexicon: BDAG
  rationale: Como en el contexto inglés, el sujeto se entiende de manera impersonal respecto de la cita escritural. 'Dice' evita especificar indebidamente el sujeto y mantiene la fluidez de la referencia.
- source_word: ὑποτέτακται
  english_pob_choice: have been subjected
  chosen_spanish: ha sido sujetado
  alternatives_spanish:
  - está sujeto
  - ha sido puesto en sujeción
  - ha quedado sujeto
  lexicon: BDAG
  rationale: El perfecto pasivo comunica una acción cumplida con estado resultante. 'Ha sido sujetado' conserva la voz pasiva y la idea de estado continuo.
- source_word: δῆλον
  english_pob_choice: it is clear
  chosen_spanish: es claro
  alternatives_spanish:
  - es evidente
  - queda claro
  - es obvio
  lexicon: BDAG
  rationale: La expresión impersonal se traduce de forma directa y natural. 'Es claro' refleja la inferencia lógica que Pablo espera que el lector reconozca.
- source_word: ἐκτὸς τοῦ ὑποτάξαντος αὐτῷ τὰ πάντα
  english_pob_choice: this excludes the one who subjected all things to him
  chosen_spanish: esto excluye al que le sujetó todas las cosas
  alternatives_spanish:
  - excepto al que le sujetó todas las cosas
  - aparte del que le sujetó todas las cosas
  lexicon: BDAG
  rationale: '''Excluye'' hace explícita la lógica de excepción en español. ''Le sujetó todas las cosas'' conserva la relación dativa y evita perder la distinción entre el que somete y aquel a quien todo fue sometido.'
- source_word: αὐτῷ
  english_pob_choice: to him
  chosen_spanish: le
  alternatives_spanish:
  - a él
  - para él
  lexicon: BDAG
  rationale: En español, el dativo se expresa de manera natural con el clítico indirecto 'le'. Mantiene la referencia al Hijo en el contexto sin añadir énfasis innecesario.
theological_decisions:
- issue: Distinción entre el Hijo y el que le sujetó todas las cosas
  english_pob_reading: The verse explicitly excludes God, the one who subjected all things to the Son, from being included in 'all things.'
  chosen_spanish_reading: 'La traducción conserva la exclusión lógica: el que le sujetó todas las cosas no queda incluido en ''todo''.'
  alternative_spanish_readings:
  - El que le sujetó todas las cosas queda exceptuado
  - Esto deja fuera al que sometió todas las cosas al Hijo
  rationale: El griego mantiene una distinción relacional precisa. La versión española debe sostener esa tensión sin resolverla ni diluirla, preservando tanto la universalidad de 'todo' como la excepción explícita del sujeto que somete.
  doctrine_reference: 'Credo de Nicea (381); Definición de Calcedonia (451); principio de traducción del POB: preservar la tensión teológica en vez de suavizarla.'
translation_notes:
  revision_awareness: 'Revisión alineada con el texto griego SBLGNT y con el audit trail inglés: se conserva la estructura lógica de excepción, el aspecto perfecto pasivo y la idiomaticidad bíblica de ''bajo sus pies''. No se requieren cambios por la verificación cruzada más reciente.'
  spanish_consistency_notes:
  - Se mantuvo 'sujetar'/'sujeción' como familia léxica coherente con la fuerza de ὑποτάσσω.
  - Se preservó 'todo'/'todas las cosas' para reflejar el neutro plural griego sin restringirlo a personas.
  - La referencia impersonal 'dice' evita introducir un sujeto no especificado en el griego.
  - El registro es bíblico contemporáneo, no arcaizante, y conserva la alusión escritural.
