translation:
  language: es
  text: ni los ladrones, ni los codiciosos[a], ni los borrachos, ni los injuriadores, ni los estafadores[b] heredarán[c] el reino de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los avaros» para «los codiciosos» (πλεονέκται).
    reason: lexical_alternative
  - marker: b
    text: O «extorsionadores» para «los estafadores» (ἅρπαγες).
    reason: lexical_alternative
  - marker: c
    text: Es decir, no recibirán una parte en el reino de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: κλέπται
  english_pob_choice: thieves
  chosen_spanish: ladrones
  alternatives_spanish:
  - hurtadores
  - los que roban
  lexicon: BDAG
  rationale: κλοπταί designa a quienes roban; en español, «ladrones» es el equivalente natural y claro para el listado de vicios, conservando el valor de sustantivo de clase.
- source_word: πλεονέκται
  english_pob_choice: the greedy
  chosen_spanish: los codiciosos
  alternatives_spanish:
  - los avaros
  - los codiciosos de más
  lexicon: BDAG
  rationale: El término apunta a la avidez de tener o ganar más. «Codiciosos» comunica bien ese rasgo en español moderno; «avaros» es viable pero más estrecho y más tradicional.
- source_word: μέθυσοι
  english_pob_choice: drunkards
  chosen_spanish: los borrachos
  alternatives_spanish:
  - los ebrios
  - los que se embriagan
  lexicon: BDAG
  rationale: En la lista de vicios, el sustantivo plural describe personas caracterizadas por la embriaguez. «Los borrachos» mantiene esa fuerza; «los ebrios» suena más literario y menos directo.
- source_word: λοίδοροι
  english_pob_choice: revilers
  chosen_spanish: injuriadores
  alternatives_spanish:
  - insultadores
  - calumniadores
  - abusive people
  lexicon: BDAG
  rationale: El término cubre el habla insultante y vejatoria, no solo la difamación falsa. «Injuriadores» preserva ese campo semántico con un registro digno y preciso.
- source_word: ἅρπαγες
  english_pob_choice: swindlers
  chosen_spanish: estafadores
  alternatives_spanish:
  - extorsionadores
  - rapaces
  - ladrones
  lexicon: BDAG
  rationale: Aquí se trata de personas que se aprovechan de otros para obtener ganancia mediante abuso o engaño. «Estafadores» comunica bien la explotación fraudulenta; «extorsionadores» y «rapaces» son alternativas posibles según el matiz.
- source_word: βασιλείαν θεοῦ
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - el reino divino
  lexicon: BDAG
  rationale: La fórmula está firmemente establecida en español bíblico y conserva la resonancia teológica paulina.
- source_word: κληρονομήσουσιν
  english_pob_choice: will inherit
  chosen_spanish: heredarán
  alternatives_spanish:
  - recibirán en herencia
  - obtendrán como herencia
  lexicon: BDAG
  rationale: El verbo expresa participación hereditaria futura. «Heredarán» mantiene la concisión y el valor jurídico-escatológico del texto.
theological_decisions:
- issue: Lista de vicios y alcance moral
  english_pob_reading: The verse states that people characterized by these unrepentant practices will not inherit God's kingdom.
  chosen_spanish_reading: La lista se entiende como una caracterización de personas marcadas por estos vicios, no como una referencia a actos aislados.
  alternative_spanish_readings:
  - Solo habla de acciones puntuales sin implicar un estado moral
  - Se refiere exclusivamente a pecados graves de otros, no del lector
  rationale: Los sustantivos plurales sustantivados en una lista de vicios normalmente designan clases de personas. La traducción conserva esa fuerza sin añadir una glosa interpretativa al texto principal.
  doctrine_reference: 'Principio de traducción: preservar la tensión teológica sin resolverla en la redacción principal.'
- issue: Lenguaje de herencia del reino
  english_pob_reading: That is, they will not receive a share in God's kingdom.
  chosen_spanish_reading: «Heredarán» conserva la imagen de participación como herencia, es decir, quedar excluidos de esa porción.
  alternative_spanish_readings:
  - No recibirán parte en el reino de Dios
  - No tendrán herencia en el reino de Dios
  rationale: El futuro de κληρονομέω combina herencia y acceso filial. La versión principal mantiene la metáfora sin sobreexplicarla.
  doctrine_reference: BDAG; uso paulino de κληρονομέω.
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando cualquier nota sin anclaje. Ahora solo aparecen las marcas [a] y [b], y ambas están presentes exactamente en el texto español.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo de la lista de vicios con sustantivos plurales.
  - Se prefirió «reino de Dios» por consistencia bíblica en español.
  - Se evitó «SEÑOR» porque el texto griego aquí dice θεοῦ, no κύριος.
  - Se conservó «heredarán» para κληρονομήσουσιν por su valor escatológico y jurídico.
