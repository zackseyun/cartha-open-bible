translation:
  language: es
  text: Y Dios resucitó al Señor y también nos resucitará por su poder.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ aquí enlaza el razonamiento de Pablo sin fuerza adversativa fuerte; en español, 'Y' conserva la continuidad argumentativa con naturalidad.
- source_word: θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: θεός se traduce de forma estándar como 'Dios'; el artículo no requiere un giro especial en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Dueño
  lexicon: BDAG
  rationale: κύριος se mantiene como 'Señor', el título cristológico usual y más natural en español para Jesús en este contexto.
- source_word: ἤγειρεν
  english_pob_choice: raised
  chosen_spanish: levantó
  alternatives_spanish:
  - resucitó
  - levantó de entre los muertos
  lexicon: BDAG
  rationale: Aunque el contexto es resurrección, en español 'levantó' conserva la fuerza verbal básica de ἐγείρω y deja que el contexto inmediato sostenga la referencia a la resurrección; 'resucitó' sería más explícito pero menos paralelo al segundo verbo.
- source_word: ἡμᾶς
  english_pob_choice: us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: Pronombre directo de primera persona plural; 'nos' es la forma natural y concisa en español.
- source_word: ἐξεγερεῖ
  english_pob_choice: will also raise
  chosen_spanish: también nos levantará
  alternatives_spanish:
  - nos resucitará también
  - también nos despertará
  lexicon: BDAG
  rationale: El futuro de ἐξεγείρω mantiene el paralelismo con la acción ya realizada en Cristo. 'También nos levantará' expresa bien la promesa futura sin forzar una repetición mecánica del inglés.
- source_word: διὰ τῆς δυνάμεως αὐτοῦ
  english_pob_choice: by his power
  chosen_spanish: por su poder
  alternatives_spanish:
  - mediante su poder
  - por medio de su poder
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento; 'por su poder' es idiomático en español y conserva la relación causal/instrumental.
theological_decisions:
- issue: Referencia de la futura resurrección
  english_pob_reading: future bodily resurrection of believers
  chosen_spanish_reading: futura resurrección corporal de los creyentes
  alternative_spanish_readings:
  - vindicación divina general
  - levantamiento espiritual metafórico
  rationale: El contexto inmediato trata del cuerpo (6:13-20) y el paralelismo con la resurrección del Señor favorece una lectura corporal futura; se evita suavizarla a una mera metáfora.
  doctrine_reference: Credo de los Apóstoles; Credo Niceno
- issue: Relación entre el primer y el segundo verbo de resurrección
  english_pob_reading: parallel between God raising Christ and raising believers
  chosen_spanish_reading: paralelo entre el levantamiento de Cristo y el nuestro
  alternative_spanish_readings:
  - identidad exacta de ambas acciones
  - mera analogía moral
  rationale: La traducción conserva el paralelismo retórico sin imponer una precisión doctrinal mayor que la del texto; el mismo Dios actúa en ambos casos.
  doctrine_reference: 1 Corintios 15:20-23; filosofía de traducción POB sobre preservar tensiones textuales
translation_notes:
  revision_awareness: El texto inglés POB actual usa 'raised' / 'will also raise' y no añade notas; la versión española mantiene el paralelismo y la lectura futura corporal, pero opta por 'levantó' / 'levantará' para un español más natural sin perder la fuerza resurreccional del pasaje.
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός y 'Señor' para κύριος como título cristológico.
  - No se usa 'Cristo' porque el griego dice κύριος y el contexto no requiere el nombre propio.
  - '''Por su poder'' refleja el medio instrumental de διὰ τῆς δυνάμεως αὐτοῦ.'
  - No se introducen notas al pie porque no hay alternativa textual significativa que deba marcarse en este versículo.
