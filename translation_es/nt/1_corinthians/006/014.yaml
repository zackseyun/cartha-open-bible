revisions:
- from: Y Dios levantó al Señor, y también nos levantará por su poder.
  to: Y Dios resucitó al Señor y también nos resucitará por su poder.
  rationale: Se reemplaza 'levantó / levantará' por 'resucitó / resucitará' porque en español esta formulación comunica de manera más precisa y natural la referencia a la resurrección corporal de Jesús y de los creyentes, que el contexto y la decisión teológica documentada exigen. También se elimina la coma antes de la segunda 'y' para una fluidez más natural en español bíblico moderno.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:11Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura básica del griego: Dios como sujeto, la resurrección pasada del Señor, la futura resurrección de los creyentes y el medio instrumental de su poder. Sin embargo, el uso de ''levantó / levantará'' en español puede sonar demasiado físico o ambiguo fuera de un contexto inmediato, y aquí el sentido de resurrección corporal es explícito por el paralelismo con la resurrección del Señor y el contexto del cuerpo. Una formulación con ''resucitó / nos resucitará'' preserva mejor el sentido fuente en español.'
  spanish_quality_summary: El español es natural y claro, pero 'levantó al Señor' y 'nos levantará' suenan menos idiomáticos para resurrección en registro bíblico moderno que 'resucitó al Señor' y 'nos resucitará'. La revisión mejora precisión semántica y legibilidad eclesial sin caer en arcaísmo.
  glossary_alignment: 'No hay conflicto con los términos base del proyecto: θεός = ''Dios'', κύριος = ''Señor''. La decisión principal es verbal: aunque el inglés retuvo ''raised'' por paralelismo, en español la equivalencia óptima favorece ''resucitó / resucitará'' para comunicar de forma inequívoca el valor de ἐγείρω / ἐξεγείρω en este contexto de resurrección corporal.'
  issues:
  - severity: medium
    issue: Ambigüedad de 'levantó / levantará' para expresar resurrección
    rationale: En español general, 'levantar' puede sugerir simplemente alzar o poner de pie. Aunque el contexto ayuda, 1 Corintios 6:14 trata precisamente de la resurrección del cuerpo, por lo que 'resucitó / resucitará' transmite con más fidelidad el significado contextual del griego.
  - severity: low
    issue: Racional léxico demasiado dependiente del paralelismo formal
    rationale: Preservar el paralelismo verbal es valioso, pero no debe hacerse a costa de claridad semántica en español. 'Resucitó ... nos resucitará' mantiene también un paralelismo suficientemente fuerte.
  revised_spanish_text: Y Dios resucitó al Señor y también nos resucitará por su poder.
  revision_rationale: Se reemplaza 'levantó / levantará' por 'resucitó / resucitará' porque en español esta formulación comunica de manera más precisa y natural la referencia a la resurrección corporal de Jesús y de los creyentes, que el contexto y la decisión teológica documentada exigen. También se elimina la coma antes de la segunda 'y' para una fluidez más natural en español bíblico moderno.
