translation:
  language: es
  text: ¿O no saben que su cuerpo es templo del Espíritu Santo[a] que está en ustedes, a quien tienen de parte de Dios? Y no son de ustedes mismos[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «del Espíritu Santo en ustedes»; o «del Espíritu Santo dentro de ustedes».
    reason: lexical_alternative
  - marker: b
    text: El griego tiene singular «cuerpo» con plural «su», lo que puede entenderse de manera distributiva («cada uno de sus cuerpos») o representativa.
    reason: alternative_reading
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O es que
  lexicon: BDAG
  rationale: Conserva la transición retórica de Pablo sin suavizarla; en español, el interrogativo con «¿O» reproduce mejor el arranque de la pregunta.
- source_word: οὐκ οἴδατε
  english_pob_choice: do you not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no reconocen
  - no entienden
  lexicon: BDAG
  rationale: La fórmula retórica paulina se expresa de manera natural con «no saben», manteniendo el sentido de conocimiento apelativo de οἶδα.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - ser corporal
  lexicon: BDAG
  rationale: «Cuerpo» es el equivalente directo y más natural para σῶμα; el contexto inmediato sobre inmoralidad sexual apunta al cuerpo físico, sin necesidad de ampliación interpretativa.
- source_word: ναὸς
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - sala sagrada
  lexicon: BDAG
  rationale: «Templo» preserva la fuerza sagrada de ναός y es el término más idiomático en español; «santuario» podría diluir el contraste metafórico con el cuerpo.
- source_word: τοῦ ἐν ὑμῖν ἁγίου πνεύματός
  english_pob_choice: of the Holy Spirit in you
  chosen_spanish: del Espíritu Santo que está en ustedes
  alternatives_spanish:
  - del Espíritu Santo dentro de ustedes
  - del Espíritu Santo en ustedes
  lexicon: BDAG
  rationale: «Que está en ustedes» conserva la referencia locativa de ἐν ὑμῖν de forma natural en español. Se evita un calco rígido («en ustedes») porque en esta cláusula suena menos fluido, sin perder el sentido.
- source_word: οὗ
  english_pob_choice: whom
  chosen_spanish: del cual
  alternatives_spanish:
  - de quien
  - que
  lexicon: BDAG
  rationale: El relativo se refiere al Espíritu Santo; «del cual» mantiene la relación personal y la dependencia sintáctica de ἔχετε ἀπὸ θεοῦ sin sobrecargar la frase en español.
- source_word: ἔχετε ἀπὸ θεοῦ
  english_pob_choice: you have from God
  chosen_spanish: tienen de parte de Dios
  alternatives_spanish:
  - lo tienen de Dios
  - han recibido de Dios
  lexicon: BDAG
  rationale: «Tienen de parte de Dios» expresa posesión procedente de Dios con naturalidad. Evita introducir explícitamente «recibido», que el griego solo implica, no dice de forma directa.
- source_word: ἑαυτῶν
  english_pob_choice: your own
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - propiedad de ustedes mismos
  - de ustedes
  lexicon: BDAG
  rationale: La construcción reflexiva se vierte como «ustedes mismos» para comunicar la idea de no pertenecer-se a sí mismos. La forma posesiva «de ustedes mismos» se integra en la negación «no son de» para respetar la relación idiomática.
theological_decisions:
- issue: Referente personal del Espíritu Santo en el relativo
  english_pob_reading: The Holy Spirit is referred to personally as 'whom.'
  chosen_spanish_reading: Se mantiene un referente personal con «del cual» para el Espíritu Santo.
  alternative_spanish_readings:
  - de quien
  - que
  rationale: Aunque el español permite varias opciones, «del cual» conserva la referencia al Espíritu Santo como sujeto personal del relativo, sin forzar una formulación demasiado marcada ni perder claridad.
  doctrine_reference: Credo Niceno-Constantinopolitano (381)
- issue: Singular de 'cuerpo' con destinatarios plurales
  english_pob_reading: Retain singular 'your body' rather than pluralizing to 'your bodies.'
  chosen_spanish_reading: Se conserva el singular «su cuerpo» en el texto principal, con plural de cortesía/contexto para el auditorio.
  alternative_spanish_readings:
  - sus cuerpos
  - tu cuerpo
  rationale: El griego tiene singular σῶμα con plural ὑμῶν; el español con «su cuerpo» preserva esa tensión y deja abierta la lectura distributiva o representativa, como en el audit trail inglés.
  doctrine_reference: Principio de preservación de tensiones textuales en traducción
- issue: Naturaleza de la pertenencia a Dios
  english_pob_reading: And you are not your own
  chosen_spanish_reading: Y no son de ustedes mismos.
  alternative_spanish_readings:
  - y no se pertenecen a ustedes mismos
  - y no son propiedad suya
  rationale: La negación de pertenencia propia se expresa con una construcción idiomática española que conserva la fuerza jurídica/existencial del griego sin añadir una glosa interpretativa.
  doctrine_reference: 1 Co 6:20; relación de pertenencia al Señor en el contexto inmediato
translation_notes:
  revision_awareness: Se tuvo en cuenta el cambio auditado del inglés de 'in you' a 'within you'; en español se optó por «que está en ustedes» por naturalidad y fidelidad locativa. También se preservó la tensión singular/plural de σῶμα/ὑμῶν y la referencia personal del Espíritu Santo en el relativo.
  spanish_consistency_notes:
  - Se usa «Espíritu Santo» para πνεῦμα ἅγιον, conforme al contexto pneumatológico.
  - Se emplea «templo» para ναός, no «santuario», por correspondencia semántica y uso bíblico claro.
  - Se mantiene «de parte de Dios» para ἀπὸ θεοῦ, evitando una ampliación interpretativa a «recibieron» en el texto principal.
  - La cláusula final se formula con pertenencia negada («no son de ustedes mismos») para reflejar ἑαυτῶν sin alargar innecesariamente el verso.
