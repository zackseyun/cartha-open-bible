revisions:
- from: ¿O no saben que su cuerpo es templo del Espíritu Santo[a] que está en ustedes, del cual tienen de parte de Dios? Y no son de ustedes mismos[b],
  to: ¿O no saben que su cuerpo es templo del Espíritu Santo[a] que está en ustedes, a quien tienen de parte de Dios? Y no son de ustedes mismos[b],
  rationale: Se corrige el relativo para preservar la referencia personal del Espíritu Santo, en línea con οὗ y con la decisión inglesa «whom». También se mejora la naturalidad sintáctica de la cláusula relativa. La nota [a] se ajusta para ofrecer alternativas verdaderas y la nota [b] se pule para mayor claridad en español, manteniendo la tensión del singular griego con audiencia plural.
