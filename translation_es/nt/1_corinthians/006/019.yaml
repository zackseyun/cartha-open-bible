review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura retórica y conserva el singular «cuerpo», «templo» y la procedencia «de Dios». Sin embargo, falla en un punto importante de alineación con el griego y con el audit trail inglés: οὗ, referido al Espíritu Santo, se tradujo como «del cual», formulación impersonal en español y además sintácticamente torpe aquí. El sentido personal del relativo debe preservarse mejor con «a quien» o con una reestructuración equivalente.'
  spanish_quality_summary: El texto es generalmente legible, pero «del cual tienen de parte de Dios» suena poco natural y ambiguo en español. También la nota [a] no funciona como verdadera alternativa porque repite prácticamente la misma redacción del texto principal. Una redacción como «que está en ustedes, a quien tienen de parte de Dios» mantiene mejor el sentido personal y la fluidez.
  glossary_alignment: '«Espíritu Santo», «cuerpo», «templo» y «Dios» están alineados con la terminología del proyecto. No hay conflicto con Yahvé/Mesías. La principal desalineación es teológico-lexical: el relativo personal para el Espíritu Santo debe evitar una forma impersonal como «del cual».'
  issues:
  - severity: high
    issue: 'Relativo impersonal para el Espíritu Santo: «del cual»'
    rationale: οὗ remite a ἁγίου πνεύματός y el audit trail inglés decidió explícitamente un relativo personal («whom»). En español, «del cual» trata al referente como cosa y no preserva bien esa decisión teológica y gramatical.
  - severity: medium
    issue: 'Construcción poco natural: «del cual tienen de parte de Dios»'
    rationale: La secuencia es gramaticalmente forzada y puede hacer pensar que «de parte de Dios» modifica solo «tienen» de manera vaga. «A quien tienen de parte de Dios» o «que han recibido de Dios» serían más claros; dado el audit trail, conviene conservar «tienen ... de parte de Dios».
  - severity: low
    issue: La nota [a] no aporta una alternativa real
    rationale: El texto principal ya dice «del Espíritu Santo ... que está en ustedes», y la nota repite casi lo mismo. La nota debería reflejar una alternativa genuina, por ejemplo «del Espíritu Santo en ustedes» o «del Espíritu Santo dentro de ustedes», siguiendo la evidencia inglesa.
  revised_spanish_text: ¿O no saben que su cuerpo es templo del Espíritu Santo[a] que está en ustedes, a quien tienen de parte de Dios? Y no son de ustedes mismos[b],
  revised_footnotes:
  - marker: a
    text: O, «del Espíritu Santo en ustedes»; o «del Espíritu Santo dentro de ustedes».
    reason: lexical_alternative
  - marker: b
    text: El griego tiene singular «cuerpo» con plural «su», lo que puede entenderse de manera distributiva («cada uno de sus cuerpos») o representativa.
    reason: alternative_reading
  revision_rationale: Se corrige el relativo para preservar la referencia personal del Espíritu Santo, en línea con οὗ y con la decisión inglesa «whom». También se mejora la naturalidad sintáctica de la cláusula relativa. La nota [a] se ajusta para ofrecer alternativas verdaderas y la nota [b] se pule para mayor claridad en español, manteniendo la tensión del singular griego con audiencia plural.
