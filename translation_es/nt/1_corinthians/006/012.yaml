revisions:
- from: “Todo me es lícito”[a], pero no todo aprovecha[b]. “Todo me es lícito”[a], pero yo no me dejaré dominar por nada[c].
  to: “Todo me es lícito”[a], pero no todo es beneficioso[b]. “Todo me es lícito”, pero yo no me dejaré dominar por nada[c].
  rationale: Se ajusta συμφέρει a «es beneficioso» para alinearlo con la decisión léxica auditada y conservar un registro más preciso y digno. Se mejora la nota c para incluir explícitamente el matiz de autoridad/poder de ἐξουσιασθήσομαι. También se simplifica el anclaje de la nota interpretativa sobre las comillas a la primera ocurrencia, manteniendo intacto el sentido.
