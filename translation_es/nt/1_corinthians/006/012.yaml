translation:
  language: es
  text: “Todo me es lícito”[a], pero no todo es beneficioso[b]. “Todo me es lícito”, pero yo no me dejaré dominar por nada[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, sin comillas: Todo me es lícito. Muchos entienden esta cláusula como un lema corintio que Pablo cita y luego califica.'
    reason: alternative_reading
  - marker: b
    text: 'O: «aprovecha» o «es útil» para «es beneficioso».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «no seré puesto bajo el poder de nada» o «no seré dominado por nada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: All things
  chosen_spanish: Todo
  alternatives_spanish:
  - Todas las cosas
  - Todo lo
  lexicon: BDAG
  rationale: El neutro plural griego funciona como una afirmación totalizante tipo lema. En español, «Todo» conserva la amplitud y permite mantener el paralelismo repetido sin sonar forzado.
- source_word: μοι
  english_pob_choice: for me
  chosen_spanish: me
  alternatives_spanish:
  - para mí
  - a mí
  lexicon: BDAG
  rationale: Con ἔξεστιν, el dativo expresa la persona para quien algo es permitido. En español, «me es lícito» reproduce con naturalidad esa relación sin añadir una preposición que vuelva pesada la frase.
- source_word: ἔξεστιν
  english_pob_choice: are lawful
  chosen_spanish: es lícito
  alternatives_spanish:
  - está permitido
  - me es permitido
  lexicon: BDAG
  rationale: «Lícito» preserva el matiz jurídico/ético de lo permitido o permitido por ley, muy cercano al valor de ἔξεστιν y adecuado para un dicho breve y polémico.
- source_word: συμφέρει
  english_pob_choice: are beneficial
  chosen_spanish: aprovecha
  alternatives_spanish:
  - es beneficioso
  - es útil
  - conviene
  lexicon: BDAG
  rationale: El verbo expresa lo que resulta ventajoso o provechoso. «Aprovecha» es la opción más natural y breve en español para sostener el contraste con la primera cláusula sin perder el valor evaluativo.
- source_word: ἐξουσιασθήσομαι
  english_pob_choice: be mastered
  chosen_spanish: me dejaré dominar
  alternatives_spanish:
  - seré dominado
  - estaré bajo el poder de
  - me someterá
  lexicon: BDAG
  rationale: El futuro pasivo comunica quedar bajo la autoridad o control de algo. «Me dejaré dominar» capta bien la pasividad y el resultado de quedar sometido, con español vivo y claro.
- source_word: ὑπό τινος
  english_pob_choice: by anything
  chosen_spanish: por nada
  alternatives_spanish:
  - por nada ni nadie
  - por algo
  - por cualquier cosa
  lexicon: BDAG
  rationale: En este contexto, el indefinido apunta a cualquier cosa que pudiera ejercer dominio. «Por nada» expresa de forma idiomática y tajante la negativa total del apóstol a quedar sometido.
theological_decisions:
- issue: ¿Marcar la primera cláusula como eslogan corintio citado y luego corregido?
  english_pob_reading: 'Render the repeated clause in quotation marks as a slogan: “All things are lawful for me”'
  chosen_spanish_reading: 'Mantener las comillas: “Todo me es lícito”'
  alternative_spanish_readings:
  - 'Sin comillas: Todo me es lícito'
  rationale: La decisión interpretativa del POB inglés se conserva para ayudar al lector moderno a percibir la posible cita de un lema corintio y la respuesta correctiva de Pablo. El griego no trae comillas, por lo que se documenta como lectura interpretativa, no textual.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla en exceso; documentar la ambigüedad real del texto.
translation_notes:
  revision_awareness: Se revisó la alineación de notas para que cada marcador aparezca exactamente en el texto español. No hubo cambios en la base fuente ni en la lectura general del versículo.
  spanish_consistency_notes:
  - Se mantuvo el paralelismo retórico de las dos repeticiones de la cláusula.
  - Se evitó traducir mecánicamente «lawful» como «legal»; «lícito» preserva el matiz ético-jurídico.
  - «Por nada» traduce de forma idiomática el alcance indefinido de ὑπό τινος en este contexto.
  - Las comillas reflejan una decisión interpretativa heredada del POB inglés, no una característica gráfica del manuscrito griego.
