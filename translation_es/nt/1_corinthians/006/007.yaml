translation:
  language: es
  text: En efecto, pues, ya es por completo una derrota para ustedes tener pleitos entre sí[a][b]. ¿Por qué no más bien sufrir injusticia? ¿Por qué no más bien ser defraudados[c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También: ‘pérdida’ o ‘fracaso’ para ‘derrota’. El término griego ἥττημα puede denotar pérdida o derrota; se eligió ‘derrota’ para reflejar la fuerza retórica de Pablo.'
    reason: lexical_alternative
  - marker: b
    text: 'También: ‘casos legales’ para ‘pleitos’. Aquí κρίματα se refiere a disputas llevadas ante tribunales.'
    reason: lexical_alternative
  - marker: c
    text: 'También: ‘ser privados’ para ‘ser defraudados’. El verbo griego ἀποστερεῖσθε puede significar ser privado, engañado o defraudado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἤδη
  english_pob_choice: already
  chosen_spanish: ya
  alternatives_spanish:
  - ya mismo
  - ya para este momento
  lexicon: BDAG
  rationale: ‘Ya’ comunica el estado presente y consumado que el griego marca con ἤδη, sin sobrecargar la frase.
- source_word: μὲν οὖν
  english_pob_choice: indeed, then
  chosen_spanish: en efecto, pues
  alternatives_spanish:
  - ciertamente, pues
  - así que
  lexicon: BDAG
  rationale: La combinación mantiene el valor inferencial y de transición del par griego, con una naturalidad idiomática en español.
- source_word: ὅλως
  english_pob_choice: altogether
  chosen_spanish: por completo
  alternatives_spanish:
  - del todo
  - enteramente
  lexicon: BDAG
  rationale: Intensifica la evaluación de Pablo; ‘por completo’ conserva ese alcance total sin sonar rígido.
- source_word: ἥττημα
  english_pob_choice: defeat
  chosen_spanish: derrota
  alternatives_spanish:
  - pérdida
  - fracaso
  lexicon: BDAG
  rationale: ‘Derrota’ reproduce la fuerza retórica de ἥττημα como pérdida real, no solo inconveniencia o daño.
- source_word: ὑμῖν ἐστιν
  english_pob_choice: it is for you
  chosen_spanish: para ustedes
  alternatives_spanish:
  - les es
  - es para ustedes
  lexicon: BDAG
  rationale: El dativo de referencia se vierte de manera natural como ‘para ustedes’, evitando añadir ‘vergüenza’ u otra glosa interpretativa.
- source_word: κρίματα
  english_pob_choice: lawsuits
  chosen_spanish: pleitos
  alternatives_spanish:
  - demandas
  - casos legales
  lexicon: BDAG
  rationale: En este contexto de disputas llevadas ante tribunales, ‘pleitos’ es una equivalencia clara y pública en español; mantiene la concreción legal sin sonar excesivamente técnica.
- source_word: μεθ’ ἑαυτῶν
  english_pob_choice: among yourselves
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - unos con otros
  - entre sí
  lexicon: BDAG
  rationale: ‘Entre ustedes’ expresa el conflicto interno de la comunidad con naturalidad y sin perder el sentido recíproco.
- source_word: διὰ τί οὐχὶ μᾶλλον
  english_pob_choice: Why not rather
  chosen_spanish: ¿Por qué no más bien
  alternatives_spanish:
  - ¿Por qué no mejor
  - ¿Por qué no, más bien
  lexicon: BDAG
  rationale: Conserva el desafío retórico y el matiz comparativo de μᾶλλον.
- source_word: ἀδικεῖσθε
  english_pob_choice: be wronged
  chosen_spanish: sufrir injusticia
  alternatives_spanish:
  - ser agraviados
  - ser tratados injustamente
  lexicon: BDAG
  rationale: ‘Sufrir injusticia’ expresa bien el pasivo y la dimensión ética de ἀδικεῖσθε sin perder claridad.
- source_word: ἀποστερεῖσθε
  english_pob_choice: be defrauded
  chosen_spanish: ser despojados
  alternatives_spanish:
  - ser defraudados
  - ser privados
  lexicon: BDAG
  rationale: El verbo puede significar despojar, privar o defraudar. ‘Ser despojados’ mantiene la fuerza de pérdida infligida por otro y suena natural en español bíblico contemporáneo.
theological_decisions:
- issue: Valor moral de la litigación entre creyentes
  english_pob_reading: Rendered ἥττημα as 'defeat' to preserve Paul's moral assessment without specifying a doctrinal category beyond the text.
  chosen_spanish_reading: Se vierte ἥττημα como ‘derrota’ para conservar la evaluación moral de Pablo sin añadir una categoría doctrinal no expresada en el versículo.
  alternative_spanish_readings:
  - pérdida
  - fracaso
  rationale: La frase comunica que la mera existencia de pleitos entre hermanos ya constituye una derrota para la comunidad; no se introduce una explicación teológica adicional.
  doctrine_reference: 'Principio de fidelidad al juicio del texto: preservar la fuerza exhortativa sin ampliar el contenido doctrinal.'
translation_notes:
  revision_awareness: 'El pasaje coincide sustancialmente con la revisión auditada más reciente: no se requieren cambios de fondo. Se mantuvo la estrategia de equivalencia óptima, conservando la fuerza retórica de ἥττημα, la concreción legal de κρίματα y la amplitud semántica de ἀποστερέω.'
  spanish_consistency_notes:
  - Se mantuvo ‘Yahvé’ como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - 'Se eligieron formas relativamente neutras y ampliamente comprensibles en español latinoamericano: ‘ustedes’, ‘pleitos’, ‘derrota’.'
  - Se evitó traducir κρίματα como ‘juicios’ para no desplazar el sentido hacia sentencias o evaluaciones abstractas.
  - Se evitó ‘siendo agraviados’ o ‘siendo defraudados’ por sonar más forzado que el paralelismo retórico del griego.
  - La puntuación reproduce la pregunta retórica en dos miembros paralelos, como en el griego, para conservar el énfasis de Pablo.
