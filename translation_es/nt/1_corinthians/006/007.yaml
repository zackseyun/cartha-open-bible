base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/007.yaml
  text: Indeed[a], then, it is already altogether a defeat for you that you have lawsuits among yourselves[c][b]. Why not rather be wronged? Why not rather be defrauded?
  footnotes:
  - marker: a
    text: Or 'loss' or 'failure' for 'defeat.' The Greek term ἥττημα can denote a loss or defeat; 'defeat' is chosen to reflect Paul's rhetorical force.
    reason: lexical_alternative
  - marker: b
    text: Or 'legal cases' for 'lawsuits.' The Greek κρίματα here refers to disputes being taken to court.
    reason: lexical_alternative
  - marker: c
    text: Or 'be deprived' for 'be defrauded.' The Greek ἀποστερεῖσθε can mean being deprived, cheated, or defrauded.
    reason: lexical_alternative
