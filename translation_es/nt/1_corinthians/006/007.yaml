  rationale: Se ajusta ‘entre ustedes’ a ‘entre sí’ para mejorar la naturalidad del recíproco en español, y se cambia ‘ser despojados’ por ‘ser defraudados’ para reflejar mejor el matiz contextual de ἀποστερεῖσθε en un entorno de pleitos legales. Se conservan las demás decisiones porque son fieles al griego y legibles en español eclesial contemporáneo.
