translation:
  language: es
  text: La comida es para el estómago[a], y el estómago para la comida; pero Dios hará desaparecer[b] tanto al uno como a la otra[c]. Pero el cuerpo no es para la inmoralidad sexual, sino para el Señor[d], y el Señor para el cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los alimentos». El griego usa plurales, pero en español la formulación singular «la comida» suena más natural en este dicho general.
    reason: lexical_alternative
  - marker: b
    text: O «destruirá»; también «abolirá» o «anulará». El verbo griego puede expresar cese, inutilización o remoción, no solo destrucción física.
    reason: lexical_alternative
  - marker: c
    text: Lit. «tanto esta como estas», refiriéndose al estómago y a la comida/los alimentos. El griego usa pronombres que retoman ambos elementos.
    reason: lexical_alternative
  - marker: d
    text: Muchos intérpretes entienden «La comida es para el estómago, y el estómago para la comida» como un eslogan corintio que Pablo cita antes de corregirlo.
    reason: alternative_reading
lexical_decisions:
- source_word: βρώματα
  english_pob_choice: Food
  chosen_spanish: La comida
  alternatives_spanish:
  - Los alimentos
  - Las comidas
  lexicon: BDAG
  rationale: El plural griego puede entenderse literalmente como «alimentos», pero en un dicho general el español natural suele preferir el sustantivo colectivo «comida». Conserva el valor genérico y evita una literalidad forzada.
- source_word: κοιλίᾳ / κοιλία
  english_pob_choice: stomach
  chosen_spanish: estómago
  alternatives_spanish:
  - vientre
  - panza
  lexicon: BDAG
  rationale: En este contexto se trata de la función corporal de digestión y apetito, no de un sentido metafórico interior. «Estómago» es el equivalente español más claro y digno.
- source_word: καταργήσει
  english_pob_choice: will do away with
  chosen_spanish: hará desaparecer
  alternatives_spanish:
  - suprimirá
  - abolirá
  - anulará
  lexicon: BDAG
  rationale: La idea es el cese o la inutilización de la relación comida-estómago, sin exigir una afirmación más fuerte de destrucción física. «Hará desaparecer» conserva la fuerza futura de la frase y la deja abierta a la gama de sentidos del verbo.
- source_word: ταύτην καὶ ταῦτα
  english_pob_choice: both it and them
  chosen_spanish: tanto esto como aquello
  alternatives_spanish:
  - tanto a esta como a estos
  - ambos, ésta y éstos
  lexicon: BDAG
  rationale: El español necesita explicitar la correlación pronominal. «Esto» y «aquello» mantienen la referencia dual al estómago y a los alimentos sin introducir un género o número demasiado mecánico.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  - cuerpo humano
  lexicon: BDAG
  rationale: Es la traducción normal de σῶμα en Pablo. Aquí el referente es corporal y concreto, aunque con peso teológico.
- source_word: πορνείᾳ
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: «Inmoralidad sexual» comunica en español actual la amplitud de πορνεία sin estrecharla a un solo acto. Es la opción más transparente y comprensible para lectores contemporáneos.
- source_word: κυρίῳ / κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: La forma establecida en español bíblico para κύριος aquí es «Señor», y en este pasaje preserva la relación cristológica implícita sin expandirla interpretativamente.
- source_word: δὲ
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - ahora bien
  - y
  lexicon: BDAG
  rationale: Marca contraste entre la afirmación sobre comida/estómago y la corrección apostólica sobre el cuerpo. «Pero» reproduce con naturalidad ese giro adversativo.
theological_decisions:
- issue: ¿La primera cláusula es un eslogan corintio citado o una afirmación directa del apóstol?
  english_pob_reading: 'Render the clause straightforwardly without quotation marks: ''Food is for the stomach, and the stomach for food'''
  chosen_spanish_reading: Se traduce de forma directa, sin comillas ni fórmula introductoria.
  alternative_spanish_readings:
  - «La comida es para el estómago, y el estómago para la comida» como cita explícita
  - '«Ustedes dicen: la comida es para el estómago...»'
  rationale: El griego no marca comillas ni una introducción explícita. La redacción directa conserva la ambigüedad auditada por el POB inglés y permite que el contraste posterior haga visible la posible cita sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión interpretativa en lugar de fijarla indebidamente.
- issue: Sentido de καταργήσει respecto de la comida y el estómago
  english_pob_reading: Express future cessation rather than explicit annihilation
  chosen_spanish_reading: Hará desaparecer tanto esto como aquello
  alternative_spanish_readings:
  - Destruirá tanto esto como aquello
  - Abolirá tanto esto como aquello
  rationale: El verbo puede apuntar a la inutilización o cesación de la relación, no necesariamente a una destrucción material. «Hará desaparecer» mantiene el alcance semántico sin sobredeterminar la imagen.
  doctrine_reference: Preservar el alcance del verbo sin resolverlo excesivamente.
- issue: La relación recíproca entre «el Señor» y «el cuerpo»
  english_pob_reading: Retain the concise reciprocal wording without expansion
  chosen_spanish_reading: y el Señor para el cuerpo
  alternative_spanish_readings:
  - y el Señor cuida del cuerpo
  - y el Señor es para el bien del cuerpo
  rationale: La concisión griega es importante. Expandirla interpretaría la relación del Señor con el cuerpo más allá de lo que el verso afirma de manera explícita.
  doctrine_reference: Preservar la compactación teológica del texto.
translation_notes:
  revision_awareness: Basado en el último pasaje auditado, no se requieren cambios de revisión; la redacción mantiene la decisión óptima-equivalente del POB inglés y conserva la ambigüedad interpretativa documentada.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος conforme a las normas del proyecto.
  - Se usa «inmoralidad sexual» para πορνεία por claridad moderna, sin reducir indebidamente el campo semántico.
  - No se introduce una cita explícita del dicho inicial, para respetar la ambigüedad textual observada en el inglés POB.
  - La coordinación «tanto esto como aquello» hace comprensible en español la referencia dual de ταύτην καὶ ταῦτα.
