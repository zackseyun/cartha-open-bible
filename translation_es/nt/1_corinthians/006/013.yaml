revisions:
- from: La comida es para el estómago[a], y el estómago para la comida; pero Dios hará desaparecer[b] tanto esto como aquello. Pero el cuerpo no es para la inmoralidad sexual, sino para el Señor, y el Señor para el cuerpo.
  to: La comida es para el estómago[a], y el estómago para la comida; pero Dios hará desaparecer[b] tanto al uno como a la otra[c]. Pero el cuerpo no es para la inmoralidad sexual, sino para el Señor[d], y el Señor para el cuerpo.
  rationale: Se corrige la referencia pronominal para reflejar con más fidelidad ταύτην καὶ ταῦτα, evitando «aquello», que suena menos preciso en español y no reproduce bien la relación con los antecedentes. Además, se repone la nota interpretativa sobre el posible eslogan corintio, presente en el rastro auditado inglés. El resto del verso se mantiene porque es fiel al griego, al estilo del POB y a la terminología del proyecto.
