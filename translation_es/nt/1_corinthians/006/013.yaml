  - severity: medium
    issue: Falta la nota sobre la posible lectura como eslogan corintio
    rationale: El POB inglés conservó esta alternativa interpretativa en nota. Como el español también deja la cláusula sin comillas, debería preservar la misma información auditada para no perder una ambigüedad interpretativa relevante.
  - severity: low
    issue: La puntuación podría reflejar mejor el contraste auditado
    rationale: El inglés POB usa raya antes de la corrección («—but God…»). En español, una raya o punto y coma con mejor conexión puede comunicar mejor el quiebre argumentativo. No es error grave, pero sí mejora de legibilidad y correspondencia retórica.
