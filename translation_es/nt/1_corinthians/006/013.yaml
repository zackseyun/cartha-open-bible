review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien el sentido general del griego y respeta la decisión auditada de no convertir la primera cláusula en cita explícita. También mantiene correctamente la tersa reciprocidad de «el cuerpo… para el Señor, y el Señor para el cuerpo». Sin embargo, «tanto esto como aquello» no representa con precisión ταύτην καὶ ταῦτα, porque oscurece que ambos pronombres retoman específicamente «el estómago» y «los alimentos/la comida»; además «aquello» introduce una lejanía no presente en el griego. Falta también la nota interpretativa equivalente a la nota inglesa sobre la posible lectura como eslogan corintio.
  spanish_quality_summary: 'El español es claro y digno, pero hay dos detalles mejorables: el punto y coma antes de «pero Dios» no refleja tan bien el giro fuerte que en el POB inglés se marcó con raya; y «tanto esto como aquello» suena menos natural y menos preciso que una formulación explícita. «Hará desaparecer» es aceptable, aunque «acabará con» o «hará desaparecer» siguen siendo opciones de matiz; no exige cambio. El resto del verso lee con naturalidad en español eclesial contemporáneo.'
  glossary_alignment: 'Alinea bien con la terminología del proyecto: θεός = «Dios», σῶμα = «cuerpo», πορνεία = «inmoralidad sexual», κύριος = «Señor». No hay conflicto con Yahvé/Mesías u otros términos de proyecto. La principal corrección es de precisión pronominal y de conservación de las notas del rastro auditado.'
  issues:
