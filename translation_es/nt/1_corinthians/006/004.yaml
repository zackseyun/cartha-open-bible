    text: Or, 'matters of everyday life'; the Greek refers to ordinary earthly or civil affairs.
    reason: lexical_alternative
  - marker: b
    text: Or, 'those who are despised in the church.' The Greek expression may refer ironically either to people regarded as insignificant within the church or to those with no standing from the church's perspective.
    reason: alternative_reading
  - marker: c
    text: 'Some understand this clause as a sarcastic imperative: ''appoint those of no standing in the church as judges.'''
    reason: alternative_reading
