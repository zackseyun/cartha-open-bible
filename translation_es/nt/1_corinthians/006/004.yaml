translation:
  language: es
  text: Así que, si ustedes tienen tribunales para asuntos de esta vida[a], ¿ponen como jueces a los que no tienen ninguna importancia en la iglesia[b][c]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "asuntos de la vida cotidiana"; el griego se refiere a asuntos terrenales o civiles ordinarios.'
    reason: lexical_alternative
  - marker: b
    text: 'O: "a los que son despreciados en la iglesia". La expresión griega puede aludir irónicamente tanto a personas consideradas insignificantes dentro de la iglesia como a personas que, desde la perspectiva de la iglesia, no tienen estatus.'
    reason: alternative_reading
  - marker: c
    text: 'Algunos entienden esta cláusula como un imperativo sarcástico: "Pongan como jueces a los que no tienen ninguna importancia en la iglesia".'
    reason: alternative_reading
lexical_decisions:
- source_word: βιωτικὰ
  english_pob_choice: of this life
  chosen_spanish: de esta vida
  alternatives_spanish:
  - cotidianos
  - de la vida diaria
  - seculares
  lexicon: BDAG
  rationale: El adjetivo se refiere a asuntos pertenecientes a la vida terrenal u ordinaria, no a una valoración moral de lo 'mundano'. 'De esta vida' reproduce con naturalidad esa referencia temporal/terrenal y evita cargar el término con un matiz indebido.
- source_word: κριτήρια
  english_pob_choice: courts
  chosen_spanish: tribunales
  alternatives_spanish:
  - juzgados
  - casos
  - decisiones judiciales
  lexicon: BDAG
  rationale: En este contexto, el sustantivo puede referirse a foros o procedimientos judiciales. 'Tribunales' comunica bien la institución y conserva el tono forense del reproche paulino.
- source_word: ἐὰν ἔχητε
  english_pob_choice: if you have
  chosen_spanish: si ustedes tienen
  alternatives_spanish:
  - si poseen
  - si cuentan con
  lexicon: BDAG
  rationale: Es una condición directa. 'Si ustedes tienen' es claro y natural en español, y mantiene la estructura condicional del griego sin añadir interpretación.
- source_word: τοὺς ἐξουθενημένους
  english_pob_choice: those who are of no standing
  chosen_spanish: a los que no tienen ningún prestigio
  alternatives_spanish:
  - a los despreciados
  - a los que son tenidos en poco
  - a los de poco valor
  lexicon: BDAG
  rationale: El participio expresa personas tratadas como nada o tenidas en poco. 'No tienen ningún prestigio' conserva la idea de falta de estatus o reconocimiento social/jurídico, sin decidir de forma demasiado cerrada si el sarcasmo apunta a personas internas o externas a la iglesia.
- source_word: ἐν τῇ ἐκκλησίᾳ
  english_pob_choice: in the church
  chosen_spanish: en la iglesia
  alternatives_spanish:
  - en la asamblea
  - dentro de la iglesia
  - ante la iglesia
  lexicon: BDAG
  rationale: La frase ubica la valoración con respecto a la comunidad eclesial. 'En la iglesia' es la forma más directa y ampliamente inteligible en español.
- source_word: τούτους καθίζετε
  english_pob_choice: do you appoint as judges
  chosen_spanish: ponen como jueces
  alternatives_spanish:
  - los sientan como jueces
  - los nombran jueces
  - los designan como jueces
  lexicon: BDAG
  rationale: καθίζω puede significar 'sentar' o 'nombrar para juzgar' en contexto judicial. 'Ponen como jueces' transmite la función judicial implícita y mantiene la pregunta retórica del pasaje sin forzar una expansión demasiado explícita.
theological_decisions:
- issue: 'Forma del enunciado: pregunta retórica frente a imperativo sarcástico'
  english_pob_reading: 'A rhetorical question: ''do you appoint as judges those who are of no standing in the church?'' with a possible sarcastic imperative as an alternative.'
  chosen_spanish_reading: 'Mantener la lectura interrogativa: ''¿ponen como jueces...?'''
  alternative_spanish_readings:
  - 'Imperativo sarcástico: ''Pongan como jueces a los que no tienen ningún prestigio en la iglesia.'''
  rationale: La puntuación y el contexto inmediato de reproche favorecen una pregunta retórica. En español, conservar la interrogación deja visible la tensión interpretativa sin resolverla artificialmente.
  doctrine_reference: 'Translation philosophy §3: preservar la tensión textual y retórica'
- issue: Identidad de 'los que no tienen ningún prestigio'
  english_pob_reading: May refer either to people regarded as insignificant within the church or to those with no standing from the church's perspective.
  chosen_spanish_reading: '''Los que no tienen ningún prestigio en la iglesia'' mantiene abierta la posibilidad de ironía social interna o valoración eclesial externa.'
  alternative_spanish_readings:
  - '''los despreciados en la iglesia'''
  - '''los de poco valor dentro de la iglesia'''
  - '''los que no cuentan para la iglesia'''
  rationale: La expresión española conserva la ambigüedad del participio griego y el posible tono irónico, sin cerrar el sentido a una sola identificación.
  doctrine_reference: 'Translation philosophy §3: no eliminar ambigüedades documentadas'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis auditado del inglés POB y no requiere cambios respecto del pasaje base: conserva la lectura interrogativa, mantiene la ambigüedad de ἐξουθενημένους y refleja el valor forense de κριτήρια con una solución natural en español.'
  spanish_consistency_notes:
  - Se usa 'Jesús' y 'Dios' como normas del proyecto cuando corresponda, pero este versículo no las activa.
  - Se eligió 'en la iglesia' en lugar de 'en la asamblea' por naturalidad y coherencia eclesial en español.
  - '''Tribunales'' mantiene el registro jurídico sin introducir una traducción demasiado técnica.'
  - La voz plural de 'ustedes' aclara el sujeto implícito del griego sin alterar el sentido.
