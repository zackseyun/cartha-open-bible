    changes_summary: 'Replaced ''Messiah'' with ''Christ'' for more natural English and closer consistency with standard rendering of Χριστοῦ in this context; otherwise retained the draft. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: ¿No saben que sus cuerpos son miembros del Mesías? Entonces, ¿tomaré los miembros del Mesías y los haré miembros de una prostituta? ¡De ningún modo![a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Cristo» en lugar de «Mesías». El título griego Χριστός puede funcionar como título traducido («Mesías») o como forma casi nominal («Cristo»).
    reason: alternative_reading
  - marker: b
    text: O, «¡De ningún modo!» / «¡En absoluto!». La expresión griega μὴ γένοιτο es una fórmula fuerte de repudio.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben que
  alternatives_spanish:
  - ¿No saben ustedes que
  - ¿Acaso no saben que
  lexicon: BDAG
  rationale: Conserva la pregunta retórica y el tono de reprensión didáctica. En español, «¿No saben que…?» es natural y suficientemente formal para el argumento paulino.
- source_word: σώματα
  english_pob_choice: bodies
  chosen_spanish: cuerpos
  alternatives_spanish:
  - cuerpos físicos
  - cuerpos de ustedes
  lexicon: BDAG
  rationale: «Cuerpos» es el equivalente directo y natural en español para el plural corporal real de los creyentes; mantiene el contraste moral-sexual del pasaje sin suavizarlo.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - integrantes
  lexicon: BDAG
  rationale: «Miembros» conserva la metáfora corporal paulina y la idea de pertenencia a un todo mayor. «Partes» sería más anatómico y menos idiomático en este contexto.
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» conforme al criterio del proyecto para Χριστός cuando funciona como título. Aquí la relación de pertenencia a la figura ungida queda explícita sin adoptar la forma eclesial tradicional como fórmula fija.
- source_word: ἄρας
  english_pob_choice: take
  chosen_spanish: tomaré
  alternatives_spanish:
  - habiendo tomado
  - arrebaté
  lexicon: BDAG
  rationale: 'El participio retórico se vierte como futuro deliberativo en español, que comunica bien la pregunta hipotética: «Entonces, ¿tomaré…?».'
- source_word: ποιήσω
  english_pob_choice: make
  chosen_spanish: los haré
  alternatives_spanish:
  - los convertiré
  - los volveré
  lexicon: BDAG
  rationale: '«Haré» reproduce la fuerza brusca del verbo sin añadir interpretaciones. Se mantiene la relación predicativa del texto griego: hacer de unos miembros, miembros de otro ámbito.'
- source_word: πόρνης
  english_pob_choice: of a prostitute
  chosen_spanish: de una prostituta
  alternatives_spanish:
  - de una mujer prostituta
  - de una ramera
  lexicon: BDAG
  rationale: «Prostituta» es la equivalencia moderna, clara y precisa; evita el arcaísmo de «ramera» y conserva la especificidad sexual del sustantivo griego.
- source_word: μὴ γένοιτο
  english_pob_choice: May it never be
  chosen_spanish: ¡De ningún modo!
  alternatives_spanish:
  - ¡Nunca sea así!
  - ¡En absoluto!
  - ¡Por supuesto que no!
  lexicon: BDAG
  rationale: La fórmula expresa una repulsa enfática, no una mera negación. «¡De ningún modo!» transmite bien la intensidad y la reprobación absoluta en español.
theological_decisions:
- issue: Χριστός como título y no como nombre fijo
  english_pob_reading: the Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se conserva la tensión semántica del título mesiánico en vez de aplanarlo en un nombre eclesiástico. Esto sigue la política del proyecto para Χριστός cuando funciona como título.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default Spanish ''Mesías'' where title; ''Cristo'' where name-like'
- issue: Fuerza de la repulsión en μὴ γένοιτο
  english_pob_reading: May it never be
  chosen_spanish_reading: ¡De ningún modo!
  alternative_spanish_readings:
  - ¡Nunca sea así!
  - ¡En absoluto!
  rationale: La expresión no es simple negación sino rechazo vehemente de la implicación moral. La traducción elegida preserva esa intensidad retórica sin añadir contenido doctrinal extra.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it; readable modern Spanish'
translation_notes:
  revision_awareness: El contexto auditado en inglés pasó por una revisión que intentó cambiar «Messiah» por «Christ» y luego fue revertida para restablecer la política del proyecto. La versión española sigue la lectura titulada de Χριστός como «Mesías» y conserva la fuerza de μὴ γένοιτο con una negación enfática. No hay indicios de variante textual en el griego proporcionado; el ajuste principal es terminológico y de tono.
  spanish_consistency_notes:
  - Se mantiene la traducción de Χριστός como «Mesías» en coherencia con el estándar del proyecto.
  - «Miembros» se usa de forma metafórica, no anatómica literal, como en el griego paulino.
  - La puntuación reproduce la estructura interrogativa y el final exclamativo de la reprimenda.
  - El sujeto implícito de «tomaré» y «haré» queda claro en el español por el contexto retórico de la pregunta.
