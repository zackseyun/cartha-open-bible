translation:
  language: es
  text: '¿O no saben que los injustos no heredarán el reino de Dios? No se dejen engañar: ni los sexualmente inmorales, ni los idólatras, ni los adúlteros, ni los afeminados[a], ni los hombres que tienen relaciones sexuales con hombres[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘blandos’ o posiblemente ‘prostitutos varones’ para μαλακοί; el término puede denotar blandura, afeminamiento, debilidad moral o, en este contexto, posiblemente la pareja pasiva en relaciones sexuales entre varones.
    reason: lexical_alternative
  - marker: b
    text: O ‘los que practican la homosexualidad’, ‘sodomitas’, o de manera más amplia ‘hombres que participan en relaciones sexuales ilícitas con varones’ para ἀρσενοκοῖται; el término es raro y debatido, aunque muchos lo vinculan con el lenguaje de Levítico en griego.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  - ¿O acaso
  lexicon: BDAG
  rationale: Conserva la transición retórica brusca de Pablo. En español, el inicio interrogativo hace natural la inversión ‘¿O no saben…?’ sin añadir contenido.
- source_word: οὐκ οἴδατε
  english_pob_choice: do you not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no lo saben
  - no se dan cuenta
  lexicon: BDAG
  rationale: ‘Saber’ reproduce bien οἶδα y mantiene la fórmula retórica paulina en plural de segunda persona, natural en español bíblico contemporáneo.
- source_word: ἄδικοι
  english_pob_choice: the unrighteous
  chosen_spanish: los injustos
  alternatives_spanish:
  - los injustos
  - los impíos
  lexicon: BDAG
  rationale: ‘Injustos’ preserva el campo moral/legal de ἄδικοι sin desplazarlo hacia un registro devocional más general como ‘impíos’.
- source_word: θεοῦ βασιλείαν
  english_pob_choice: the kingdom of God
  chosen_spanish: el reino de Dios
  alternatives_spanish:
  - el reino de Dios
  - el reino de Dios
  lexicon: BDAG
  rationale: Renderiza la construcción genitiva de manera idiomática y establecida en español bíblico, sin alterar el sentido escatológico y covenantal.
- source_word: κληρονομήσουσιν
  english_pob_choice: will not inherit
  chosen_spanish: no heredarán
  alternatives_spanish:
  - no recibirán como herencia
  - no tendrán parte en
  lexicon: BDAG
  rationale: ‘Heredar’ conserva la metáfora patrimonial y la resonancia bíblica del verbo griego, importante para el sentido eschatológico del texto.
- source_word: μὴ πλανᾶσθε
  english_pob_choice: Do not be deceived
  chosen_spanish: No se dejen engañar
  alternatives_spanish:
  - No se engañen
  - No se dejen extraviar
  lexicon: BDAG
  rationale: Preserva la advertencia contra el autoengaño o engaño moral, con una construcción natural en español. Mantiene la fuerza imperativa negativa.
- source_word: πόρνοι
  english_pob_choice: the sexually immoral
  chosen_spanish: los sexualmente inmorales
  alternatives_spanish:
  - los inmorales sexuales
  - los fornicarios
  lexicon: BDAG
  rationale: ‘Sexualmente inmorales’ sigue el valor amplio de πόρνοι y evita reducirlo al sentido más estrecho y arcaico de ‘fornicarios’.
- source_word: εἰδωλολάτραι
  english_pob_choice: idolaters
  chosen_spanish: los idólatras
  alternatives_spanish:
  - los que adoran ídolos
  lexicon: BDAG
  rationale: Equivalente directo y claro, con la misma concisión que el griego y el audit trail inglés.
- source_word: μοιχοὶ
  english_pob_choice: adulterers
  chosen_spanish: los adúlteros
  alternatives_spanish:
  - los que cometen adulterio
  lexicon: BDAG
  rationale: Traducción directa y establecida, preservando el pecado sexual específico ligado al pacto matrimonial.
- source_word: μαλακοὶ
  english_pob_choice: effeminate men
  chosen_spanish: los afeminados
  alternatives_spanish:
  - los blandos
  - los efeminados
  - los afeminados
  lexicon: BDAG
  rationale: La versión inglesa revisada volvió a ‘effeminate men’ por ser más léxicamente directo. En español, ‘afeminados’ es el equivalente más inmediato de esa opción, aunque sigue siendo un término debatido en este contexto.
- source_word: ἀρσενοκοῖται
  english_pob_choice: men who have sex with men
  chosen_spanish: los hombres que tienen relaciones sexuales con hombres
  alternatives_spanish:
  - los que practican la homosexualidad
  - los sodomitas
  - los varones que se acuestan con varones
  lexicon: BDAG
  rationale: Se opta por una descripción transparente y no identitaria, reflejando la lectura auditada del inglés POB y evitando un término tradicional que pueda oscurecer el alcance del griego.
theological_decisions:
- issue: Lista de vicios con términos sexuales disputados (μαλακοὶ / ἀρσενοκοῖται)
  english_pob_reading: Rendered as 'effeminate men' and 'men who have sex with men' in sequence
  chosen_spanish_reading: ‘los afeminados’ y ‘los hombres que tienen relaciones sexuales con hombres’
  alternative_spanish_readings:
  - ‘los blandos’ y ‘los sodomitas’
  - ‘los efeminados’ y ‘los que practican la homosexualidad’
  - un solo término general como ‘los sexualmente inmorales’
  rationale: Se conserva la tensión interpretativa documentada en el audit trail. La primera expresión se mantiene cerca del valor léxico de μαλακοί sin resolver de manera dogmática su referencia exacta; la segunda sigue la decisión descriptiva del inglés para ἀρσενοκοῖται, evitando convertir el texto en una etiqueta de identidad moderna.
  doctrine_reference: Preservar la tensión exegética y documentar alternativas sin diluir la advertencia moral del texto.
translation_notes:
  revision_awareness: La redacción sigue de cerca el último estado auditado del inglés POB, incluyendo la revisión que prefirió ‘effeminate men’ para μαλακοί por ser más léxicamente directa. Se mantiene también la estrategia descriptiva para ἀρσενοκοῖται, con alternativas documentadas en nota para no borrar la discusión léxica y teológica.
  spanish_consistency_notes:
  - Se usa ‘reino de Dios’ de forma consistente como equivalente de θεοῦ βασιλείαν.
  - ‘Heredarán’ conserva la metáfora de herencia con valor escatológico.
  - Se mantiene ‘Dios’ para θεοῦ y no una perífrasis más interpretativa.
  - Las notas siguen la práctica POB de preservar alternativas donde el léxico es disputado.
  - Se evita ‘SEÑOR’ o ‘Cristo’ porque no aparecen en este versículo.
