translation:
  language: es
  text: Y algunos de ustedes eran así[a]. Pero se lavaron[b], pero fueron santificados, pero fueron justificados en el nombre del Señor Jesús y en el Espíritu de nuestro Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y tales eran algunos de ustedes»; literalmente, «y algunos de ustedes eran estas cosas».'
    reason: lexical_alternative
  - marker: b
    text: La forma griega puede entenderse también como «fueron lavados». En contexto, muchos la leen como parte de una serie de acciones salvíficas de Dios.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ ταῦτά τινες ἦτε
  english_pob_choice: And such were some of you
  chosen_spanish: Y tales eran algunos de ustedes[a]
  alternatives_spanish:
  - Y así eran algunos de ustedes
  - Y algunos de ustedes eran así
  lexicon: BDAG
  rationale: ‘ταῦτα’ apunta de nuevo a la lista anterior de conductas/personas, por lo que ‘tales’ conserva el valor demostrativo sin volverlo meramente idiomático. ‘Algunos de ustedes’ reproduce bien τινες y mantiene el alcance parcial del enunciado. Se añade nota porque en español también es posible una forma más idiomática, pero la redacción principal conserva la huella del referente anterior.
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: La repetición de ἀλλά marca contraste fuerte. ‘Pero’ es natural en español y preserva el ritmo enfático de la reversión paulina.
- source_word: ἀπελούσασθε
  english_pob_choice: you washed yourselves / you were washed
  chosen_spanish: se lavaron[b]
  alternatives_spanish:
  - fueron lavados
  - se limpiaron
  lexicon: BDAG
  rationale: El verbo medio permite una lectura reflexiva, y el auditorio español entiende bien ‘se lavaron’ como reflejo de esa forma. Al mismo tiempo, la secuencia con ‘fueron santificados’ y ‘fueron justificados’ sugiere una acción salvadora recibida; por eso se preserva la tensión en nota, sin decidirla de forma cerrada en el texto principal.
- source_word: ἡγιάσθητε
  english_pob_choice: you were sanctified
  chosen_spanish: fueron santificados[c]
  alternatives_spanish:
  - fueron hechos santos
  - fueron consagrados
  lexicon: BDAG
  rationale: ‘Santificados’ es el equivalente teológico estable de ἁγιάζω y conserva la continuidad paulina. ‘Hechos santos’ aclara el sentido, pero suaviza la resonancia técnica del término.
- source_word: ἐδικαιώθητε
  english_pob_choice: you were justified
  chosen_spanish: fueron justificados
  alternatives_spanish:
  - fueron declarados justos
  - fueron absueltos
  lexicon: BDAG
  rationale: ‘Justificados’ conserva el valor forense de δικαιόω en Pablo. Las alternativas explican el sentido, pero pierden la densidad terminológica que el POB quiere mantener.
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: in the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - por el nombre
  - en virtud del nombre
  lexicon: BDAG
  rationale: ‘En el nombre’ es la forma española más directa y mantiene la ambigüedad instrumental/locativa de ἐν, sin resolverla de más.
- source_word: τοῦ κυρίου Ἰησοῦ
  english_pob_choice: of the Lord Jesus
  chosen_spanish: del Señor Jesús
  alternatives_spanish:
  - del Señor Jesucristo
  lexicon: BDAG
  rationale: ‘Señor’ traduce κύριος según el criterio doctrinal del proyecto, y ‘Jesús’ reproduce el nombre propio sin añadir ‘Cristo’, que no aparece en el griego.
- source_word: ἐν τῷ πνεύματι τοῦ θεοῦ ἡμῶν
  english_pob_choice: in the Spirit of our God
  chosen_spanish: y en el Espíritu de nuestro Dios
  alternatives_spanish:
  - y por el Espíritu de nuestro Dios
  - y en el espíritu de nuestro Dios
  lexicon: BDAG
  rationale: Se conserva la preposición ‘en’ para reflejar ἐν de manera consistente con el griego. ‘Espíritu’ con mayúscula señala el referente personal-divino más probable en el contexto paulino, sin introducir contenido ajeno al texto.
theological_decisions:
- issue: Valor de la voz media en ἀπελούσασθε
  english_pob_reading: The Greek form can be understood as 'washed yourselves,' though context often reads it as part of God's saving actions.
  chosen_spanish_reading: ‘Se lavaron’ mantiene la posibilidad reflexiva, pero dentro de una secuencia de acciones recibidas.
  alternative_spanish_readings:
  - fueron lavados
  - se purificaron
  rationale: El griego permite una discusión real sobre la voz. En español, un reflexivo comunica bien el medio sin negar que Pablo encadena acciones salvíficas pasivas. La nota preserva la tensión doctrinal y exegética.
  doctrine_reference: Preserve theological tension rather than resolve it
- issue: Referencia de πνεύματι
  english_pob_reading: The Spirit of our God likely refers to the Holy Spirit.
  chosen_spanish_reading: ‘Espíritu de nuestro Dios’ se entiende como el Espíritu Santo en el contexto paulino.
  alternative_spanish_readings:
  - espíritu de nuestro Dios
  - Espíritu de nuestro Dios
  rationale: 'La mayúscula es una decisión interpretativa prudente: no añade un término ausente, pero ayuda a expresar el referente más probable del texto paulino. La traducción principal conserva la construcción del griego.'
  doctrine_reference: Affirmations; optimal equivalence
translation_notes:
  revision_awareness: 'El antecedente inglés pasó por una revisión que corrigió una redacción demasiado literal para ‘καὶ ταῦτά τινες ἦτε’ y luego ajustó la voz de ‘ἀπελούσασθε’ hacia una lectura reflexiva. La presente versión española toma en cuenta ambas observaciones: mantiene el eco demostrativo de ταῦτα con ‘tales’, y refleja la posible voz media con ‘se lavaron’, sin cerrar exegéticamente la alternativa pasiva.'
  spanish_consistency_notes:
  - Se usa ‘Señor’ para κύριος conforme a la terminología del proyecto.
  - Se mantiene ‘Espíritu’ con mayúscula por el contexto paulino y por coherencia con la lectura del Espíritu Santo.
  - 'Se prefieren formas verbales con valor forense y teológico estable: ‘santificados’ y ‘justificados’.'
  - La puntuación con comas entre cláusulas reproduce el paralelismo contrastivo del griego sin añadir conectores interpretativos.
