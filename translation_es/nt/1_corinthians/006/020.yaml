translation:
  language: es
  text: Pues ustedes fueron comprados[a] por un precio[b]; por tanto[c], glorifiquen a Dios en su cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «fueron adquiridos». El verbo griego conserva la imagen de una compra.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «por precio». El griego expresa el costo pagado dentro de la metáfora comercial.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «entonces»; también puede dejarse implícito. La partícula griega añade fuerza inferencial o urgencia a la exhortación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἠγοράσθητε
  english_pob_choice: were bought
  chosen_spanish: fueron comprados
  alternatives_spanish:
  - fueron adquiridos
  - fueron rescatados
  lexicon: BDAG / ἀγοράζω
  rationale: El aoristo pasivo de ἀγοράζω conserva la imagen comercial de compra. «Fueron comprados» sigue de cerca esa metáfora y es natural en español; «rescatados» explicaría la idea, pero atenúa el vocabulario de mercado que el texto mantiene.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  lexicon: BDAG / γάρ
  rationale: γάρ introduce la razón de la exhortación anterior. «Pues» comunica bien la relación causal/explicativa en español contemporáneo sin sonar demasiado rígido.
- source_word: τιμῆς
  english_pob_choice: with a price
  chosen_spanish: por precio
  alternatives_spanish:
  - con un precio
  - a precio
  lexicon: BDAG / τιμή
  rationale: El genitivo de precio tras ἀγοράζω expresa el costo pagado. En español, «por precio» transmite la misma relación comercial de manera breve y fiel; «con un precio» suena menos idiomático, y «a precio» puede insinuar una lectura distinta.
- source_word: δοξάσατε
  english_pob_choice: glorify
  chosen_spanish: glorifiquen
  alternatives_spanish:
  - honren
  - den gloria a
  lexicon: BDAG / δοξάζω
  rationale: El imperativo aoristo pide una acción decisiva. «Glorifiquen» preserva el peso teológico del verbo y corresponde al uso bíblico estándar sin reemplazarlo por una formulación más débil.
- source_word: δὴ
  english_pob_choice: therefore
  chosen_spanish: por tanto
  alternatives_spanish:
  - entonces
  - así que
  lexicon: BDAG / δή
  rationale: δή añade fuerza inferencial o exhortativa. «Por tanto» expresa claramente la consecuencia de la razón dada y mantiene el paso argumentativo del griego.
- source_word: ἐν τῷ σώματι ὑμῶν
  english_pob_choice: in your body
  chosen_spanish: en su cuerpo
  alternatives_spanish:
  - en sus cuerpos
  - con su cuerpo
  lexicon: BDAG / σῶμα
  rationale: El singular σῶμα, con pronombre plural, se vierte de modo natural en español como «su cuerpo», preservando el enfoque en la conducta corporal de cada creyente. Se conserva «en» para no sobreinterpretar como instrumento y mantener la amplitud locativa del original.
theological_decisions:
- issue: Metáfora de compra/redención
  english_pob_reading: Retain the purchase metaphor in 'were bought with a price'
  chosen_spanish_reading: Conservar la metáfora comercial en «fueron comprados por precio»
  alternative_spanish_readings:
  - fueron redimidos a costa de un precio
  - fueron rescatados a un costo
  rationale: El griego usa lenguaje explícito de mercado. Mantenerlo en español hace auditable la imagen original y evita sustituirla por una formulación doctrinalmente verdadera pero menos transparente al texto.
  doctrine_reference: Translation philosophy §1, §5
- issue: Ética encarnada
  english_pob_reading: Translate σῶμα concretely as 'body'
  chosen_spanish_reading: Traducir σῶμα concretamente como «cuerpo»
  alternative_spanish_readings:
  - vida
  - ser
  rationale: El contexto inmediato trata del comportamiento sexual y del uso del cuerpo. «Cuerpo» preserva la concreción paulina y evita diluir el alcance del mandamiento.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje presenta alto acuerdo con el análisis previo en inglés: se conserva la metáfora de compra, el valor causal de γάρ, la fuerza inferencial de δή y el sentido concreto de σῶμα. No hubo revisiones aplicadas en el ciclo más reciente, por lo que la presente redacción sigue de cerca el consenso auditado.'
  spanish_consistency_notes:
  - Se prefirió «por tanto» para δή por coherencia con el registro exhortativo bíblico y con el valor inferencial documentado.
  - Se usa el singular «cuerpo» para reflejar el singular griego σῶμα con pronombre plural, sin introducir una lectura colectiva no señalada por el contexto inmediato.
  - Se evitó «SEÑOR» o «Cristo» porque el verso usa θεός, no κύριος ni Χριστός.
