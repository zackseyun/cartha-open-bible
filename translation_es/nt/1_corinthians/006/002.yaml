  source_alignment_summary: El borrador refleja bien la estructura retórica del griego, el futuro «juzgarán», la lectura adoptada de ἐν ὑμῖν como «por ustedes» con nota alternativa, y la fuerza evaluativa de ἀνάξιοί ἐστε. Sin embargo, «los más pequeños tribunales» suena poco idiomático en español y no expresa con claridad la relación entre ἐλαχίστων y κριτηρίων en este contexto judicial.
  spanish_quality_summary: El español es claro y mayormente natural, pero «indignos de los más pequeños tribunales» resulta torpe; en español eclesiástico y general suena más natural «incapaces de juzgar los casos más pequeños» o, si se mantiene más literal, «indignos de los tribunales más pequeños». Dado que la POB inglesa ya dejó «courts» en el texto principal, conviene conservar el referente judicial, pero mejorar la sintaxis española.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Los santos» es apropiado para οἱ ἅγιοι. No aparecen términos sensibles como Yahvé/Mesías. La decisión «por ustedes[a]» sigue correctamente la pista auditada con nota para «entre ustedes».
  issues:
  - severity: medium
    issue: Sintaxis poco natural en «de los más pequeños tribunales»
    rationale: Aunque comprensible, en español estándar la colocación adjetival y la construcción con «indignos de» suenan forzadas. «De los tribunales más pequeños» es más natural y fiel.
  - severity: low
    issue: Nota b ligeramente más interpretativa que la inglesa
    rationale: La nota española añade «el griego puede referirse a tribunales o a asuntos judiciales de mínima importancia», lo cual es válido, pero puede alinearse más estrechamente con la alternativa inglesa «los casos más pequeños».
  revised_spanish_text: ¿O no saben que los santos juzgarán al mundo? Y si el mundo es juzgado por ustedes[a], ¿son indignos de los tribunales más pequeños[b]?
