    reason: lexical_alternative
  - marker: b
    text: O «los casos más pequeños».
    reason: lexical_alternative
  revision_rationale: Se ajusta la frase final para un español más natural sin cambiar el sentido fuente ni la decisión léxica principal de la POB inglesa. También se simplifica la nota b para alinearla mejor con la alternativa documentada en inglés.
