translation:
  language: es
  text: ¿O no saben que los santos juzgarán al mundo? Y si el mundo es juzgado por ustedes[a], ¿son indignos de los tribunales más pequeños[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «entre ustedes»: la frase griega puede leerse más literalmente como «si el mundo es juzgado entre ustedes», pero el sentido en el contexto es que los santos participan en juzgar al mundo.'
    reason: lexical_alternative
  - marker: b
    text: O «los casos más pequeños».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Acaso
  - O
  lexicon: BDAG
  rationale: La partícula introduce una alternativa retórica en la argumentación de Pablo. En español, iniciar con «¿O» mantiene el tono interrogativo y el giro polémico del original.
- source_word: οὐκ οἴδατε
  english_pob_choice: do you not know
  chosen_spanish: ¿no saben
  alternatives_spanish:
  - ¿no se dan cuenta
  - ¿no conocen
  lexicon: BDAG
  rationale: La pregunta retórica conserva el verbo de conocimiento de οἶδα y su fuerza de reproche pastoral, en un español natural.
- source_word: οἱ ἅγιοι
  english_pob_choice: the saints
  chosen_spanish: los santos
  alternatives_spanish:
  - los santos de Dios
  - los consagrados
  lexicon: BDAG
  rationale: Se mantiene el término tradicional y a la vez técnico de Pablo para los creyentes como los apartados para Dios. «Los santos» es fiel y sobrio.
- source_word: τὸν κόσμον
  english_pob_choice: the world
  chosen_spanish: al mundo
  alternatives_spanish:
  - el mundo
  - el orden del mundo
  lexicon: BDAG
  rationale: κόσμος aquí se refiere al mundo en sentido amplio. En español, el objeto directo con a personal no aplica; «al mundo» refleja la función verbal de «juzgar».
- source_word: κρινοῦσιν
  english_pob_choice: will judge
  chosen_spanish: juzgarán
  alternatives_spanish:
  - van a juzgar
  - sentenciarán
  lexicon: BDAG
  rationale: El futuro activo de κρίνω se conserva con «juzgarán», que mantiene el valor judicial y escatológico sin añadir matices no presentes.
- source_word: ἐν ὑμῖν
  english_pob_choice: by you
  chosen_spanish: por ustedes[a]
  alternatives_spanish:
  - entre ustedes
  - en ustedes
  lexicon: BDAG
  rationale: El griego admite una lectura más literal «entre ustedes / en ustedes», pero el sentido argumental es que los creyentes participan en el juicio. «Por ustedes» expresa la lectura instrumental/associativa adoptada por la POB inglesa.
- source_word: κρίνεται
  english_pob_choice: is judged
  chosen_spanish: es juzgado
  alternatives_spanish:
  - está siendo juzgado
  lexicon: BDAG
  rationale: El presente pasivo se vierte con un presente simple en español, fiel al valor verbal y adecuado en la condición retórica.
- source_word: ἀνάξιοί ἐστε
  english_pob_choice: are you unworthy
  chosen_spanish: ¿son indignos
  alternatives_spanish:
  - ¿no son aptos
  - ¿son incapaces
  lexicon: BDAG
  rationale: ἀνάξιος expresa indignidad o falta de idoneidad. «Indignos» conserva la carga evaluativa y el filo retórico mejor que una paráfrasis de capacidad.
- source_word: κριτηρίων
  english_pob_choice: courts
  chosen_spanish: tribunales[b]
  alternatives_spanish:
  - casos
  - causas judiciales
  - cortes
  lexicon: BDAG
  rationale: κριτήριον puede denotar tribunal o asunto judicial. «Tribunales» comunica el ámbito judicial de manera clara y no sobreinterpreta como «law courts».
- source_word: ἐλαχίστων
  english_pob_choice: the smallest
  chosen_spanish: de los más pequeños
  alternatives_spanish:
  - de los menos importantes
  - de los más insignificantes
  lexicon: BDAG
  rationale: El superlativo se conserva con una frase natural en español. «Los más pequeños» permite mantener la literalidad sin forzar una equivalencia idiomática excesiva.
theological_decisions:
- issue: Identidad y alcance de «los santos»
  english_pob_reading: believers, the people of God, who will participate in eschatological judgment
  chosen_spanish_reading: los creyentes como el pueblo de Dios que participará en el juicio escatológico
  alternative_spanish_readings:
  - un grupo restringido de creyentes especialmente piadosos
  - los canonizados
  rationale: En Pablo, «los santos» designa normalmente a todos los creyentes. La traducción conserva el término sin reducirlo a una élite ni cargarlo con un sentido posterior ajeno al contexto.
  doctrine_reference: Affirmations; Translation philosophy §5
- issue: Participación de los creyentes en el juicio del mundo
  english_pob_reading: real participation in future judgment without specifying the exact mode
  chosen_spanish_reading: participación real en un juicio futuro, sin precisar el modo exacto
  alternative_spanish_readings:
  - solo evaluación moral metafórica
  - autoridad judicial independiente y detallada
  rationale: El texto afirma el juicio de los santos sobre el mundo, pero no describe el mecanismo. La versión española preserva esa afirmación sin explicarla en exceso.
  doctrine_reference: Translation philosophy §3
- issue: Lectura de ἐν ὑμῖν
  english_pob_reading: by you / among you
  chosen_spanish_reading: por ustedes, con la nota de la posible lectura más literal «entre ustedes»
  alternative_spanish_readings:
  - entre ustedes
  - en ustedes
  rationale: Se mantiene la decisión interpretativa de la POB inglesa y, a la vez, se deja visible la alternativa literal que el griego permite para no borrar la tensión lexical.
  doctrine_reference: BDAG; audit trail lexical alternative
translation_notes:
  revision_awareness: La versión inglesa revisada cambió «law courts» por «courts» para ajustarse mejor a κριτηρίων. En español se evitó introducir «ley» y se optó por «tribunales», con una nota alternativa que también admite «los casos más pequeños», preservando la amplitud semántica del griego y la decisión revisada.
  spanish_consistency_notes:
  - Se mantuvo «santos» como equivalente estable de ἅγιοι, coherente con el uso paulino y con la terminología eclesial habitual.
  - Se tradujo κρίνω con «juzgar» en ambos miembros de la frase para conservar la repetición retórica del original.
  - Se evitó «SEÑOR» u otra sustitución no presente, porque este versículo no contiene el nombre divino.
  - Se mantuvo un registro sobrio y contemporáneo, sin cargar el texto con formulaciones eclesiásticas arcaicas.
