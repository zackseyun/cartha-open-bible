translation:
  language: es
  text: Huyan de la inmoralidad sexual. Todo pecado que una persona pueda cometer está fuera del cuerpo[a], pero el que comete inmoralidad sexual peca contra su propio cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que un hombre pueda cometer». El griego dice «un hombre» (ἄνθρωπος) con sentido representativo y genérico.
    reason: lexical_alternative
lexical_decisions:
- source_word: φεύγετε
  english_pob_choice: Flee
  chosen_spanish: Huyan
  alternatives_spanish:
  - Huyan rápidamente
  - Escapen de
  lexicon: BDAG
  rationale: El imperativo plural presente pide una evitación continua e imperativa. En español, «huyan» comunica bien la urgencia y el movimiento de apartarse, sin volver la frase pesada ni demasiado explicativa.
- source_word: πορνείαν
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: πορνεία abarca conducta sexual ilícita en sentido amplio, no solo un acto específico. «Inmoralidad sexual» preserva esa amplitud con naturalidad en español actual y evita restringir indebidamente el término.
- source_word: πᾶν ἁμάρτημα
  english_pob_choice: Every sin
  chosen_spanish: Todo pecado
  alternatives_spanish:
  - Cada pecado
  - Todo acto pecaminoso
  lexicon: BDAG
  rationale: La frase es general y totalizante. «Todo pecado» mantiene la amplitud del griego y suena más fluido que una formulación más analítica.
- source_word: ὃ ἐὰν ποιήσῃ ἄνθρωπος
  english_pob_choice: that a person may commit
  chosen_spanish: que una persona pueda cometer
  alternatives_spanish:
  - que un hombre pueda cometer
  - que alguien cometa
  lexicon: BDAG
  rationale: Aunque ἄνθρωπος es morfológicamente masculino, aquí funciona con sentido representativo y genérico. La versión española sigue la revisión inglesa más reciente y usa «una persona» para conservar la genericidad sin forzar un masculino genérico donde el español moderno lo evitaría.
- source_word: ἐκτὸς τοῦ σώματός ἐστιν
  english_pob_choice: is outside the body
  chosen_spanish: está fuera del cuerpo
  alternatives_spanish:
  - está aparte del cuerpo
  - está fuera del cuerpo físico
  lexicon: BDAG
  rationale: «Fuera del cuerpo» reproduce con claridad la imagen espacial/metafórica y conserva el contraste del versículo sin añadir interpretación.
- source_word: ὁ δὲ πορνεύων
  english_pob_choice: the one who commits sexual immorality
  chosen_spanish: el que comete inmoralidad sexual
  alternatives_spanish:
  - la persona que comete inmoralidad sexual
  - el inmoral sexual
  lexicon: BDAG
  rationale: El participio sustantivado presenta a la persona en el acto. «El que comete inmoralidad sexual» conserva la fuerza verbal y enlaza de forma natural con el término inicial del versículo.
- source_word: εἰς τὸ ἴδιον σῶμα ἁμαρτάνει
  english_pob_choice: sins against his own body
  chosen_spanish: peca contra su propio cuerpo
  alternatives_spanish:
  - peca respecto de su propio cuerpo
  - peca contra su mismo cuerpo
  lexicon: BDAG
  rationale: Aunque εἰς es literalmente «hacia/into», en esta construcción el sentido idiomático se expresa mejor con «contra». «Su propio cuerpo» refleja ἴδιον y mantiene el énfasis personal y reflexivo del griego.
theological_decisions:
- issue: Valor genérico de ἄνθρωπος en una afirmación universal
  english_pob_reading: that a person may commit
  chosen_spanish_reading: que una persona pueda cometer
  alternative_spanish_readings:
  - que un hombre pueda cometer
  - que alguien cometa
  rationale: La forma griega es masculina singular, pero funciona de modo representativo y genérico. En español, «una persona» comunica esa generalidad con naturalidad y evita introducir una lectura masculina innecesaria en el flujo del versículo.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: La afirmación de que todo pecado está «fuera del cuerpo»
  english_pob_reading: Translate the clause straightforwardly without softening or resolving its debated meaning
  chosen_spanish_reading: Traducir la cláusula de forma directa, sin suavizar ni resolver su sentido debatido
  alternative_spanish_readings:
  - Interpretarla como un eslogan retórico citado de los corintios
  - Añadir una explicación doctrinal en el texto principal
  rationale: El griego presenta la afirmación de manera directa, aunque sea exegéticamente difícil. La traducción debe conservar la tensión del pasaje en vez de armonizarlo dentro del texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «a man» por «a person» para reflejar el valor genérico de ἄνθρωπος; la redacción española sigue esa revisión y mantiene la lectura inclusiva sin perder el sentido representativo del griego. También se conservó sin suavizar la afirmación debatida sobre que todo pecado está «fuera del cuerpo».
  spanish_consistency_notes:
  - Se usó «inmoralidad sexual» para πορνεία, en línea con la amplitud léxica del término.
  - Se evitó «SEÑOR» u otra convención de ocultamiento porque el versículo no contiene el tetragrámaton ni κύριος con referencia directa al nombre divino.
  - Se prefirió «cuerpo» para σῶμα, conservando la imagen corporal literal del texto griego.
  - La nota al pie refleja la alternativa generada por el valor genérico de ἄνθρωπος y la decisión revisada en el audit trail inglés.
