review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien el sentido general del griego: conserva el imperativo urgente de φεύγετε, la amplitud de πορνεία como «inmoralidad sexual», la tensión no resuelta de «todo pecado... está fuera del cuerpo», y el contraste final con «peca contra su propio cuerpo». Sin embargo, la nota al pie no coincide con el texto principal: presenta como alternativa exactamente la misma redacción ya usada en el cuerpo del versículo, cuando la alternativa documentada y relevante es «un hombre» frente a la opción adoptada «una persona».'
  spanish_quality_summary: El español es natural, claro y digno. «Huyan de la inmoralidad sexual» y «peca contra su propio cuerpo» suenan bien en español bíblico contemporáneo. La sintaxis fluye correctamente. El único problema real es de consistencia editorial en la nota al pie, no de legibilidad del texto principal.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Inmoralidad sexual» es una buena decisión para πορνεία. No aparecen términos sensibles como Yahvé/Mesías/esclavo. La elección «una persona» sigue la revisión inglesa reciente, aunque la documentación también preserva la alternativa «un hombre»; esa relación debe quedar bien reflejada en la nota.
  issues:
  - severity: medium
    issue: La nota al pie está mal formulada
    rationale: El texto principal dice «que una persona pueda cometer», pero la nota dice «O “que una persona pueda cometer”». Eso no ofrece una alternativa real. Según el expediente, la nota debe señalar que el griego dice «un hombre» con sentido representativo/genérico.
  revised_spanish_text: Huyan de la inmoralidad sexual. Todo pecado que una persona pueda cometer está fuera del cuerpo[a], pero el que comete inmoralidad sexual peca contra su propio cuerpo.
  revised_footnotes:
  - marker: a
    text: O «que un hombre pueda cometer». El griego dice «un hombre» (ἄνθρωπος) con sentido representativo y genérico.
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal, que es fiel y natural en español, pero se corrige la nota al pie para que presente una alternativa real y documente correctamente el valor genérico de ἄνθρωπος.
