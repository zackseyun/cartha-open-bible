translation:
  language: es
  text: Lo digo para vergüenza de ustedes[a]. ¿Tan así es que no hay entre ustedes ni siquiera uno sabio[b] que pueda juzgar entre sus hermanos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para su vergüenza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «ni siquiera una persona sabia». El griego está en masculino singular, pero Pablo se dirige a toda la congregación.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πρὸς ἐντροπὴν
  english_pob_choice: to your shame
  chosen_spanish: para vergüenza de ustedes
  alternatives_spanish:
  - para su vergüenza
  - a su vergüenza
  - para avergonzarlos
  lexicon: BDAG
  rationale: La construcción con πρός + acusativo expresa dirección o finalidad con sentido de reproche. En español, "para vergüenza de ustedes" conserva el tono de censura directa y suena natural sin perder el matiz de propósito/resultado.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: lo digo
  alternatives_spanish:
  - digo
  - les digo
  lexicon: BDAG
  rationale: El presente simple se vierte con un presente directo en discurso solemne. "Lo digo" conserva la referencia al contenido ya mencionado y evita una repetición innecesaria del objeto en español.
- source_word: οὕτως
  english_pob_choice: Is it really so
  chosen_spanish: ¿Acaso no hay...
  alternatives_spanish:
  - ¿Es así...
  - ¿Tan poco...?
  lexicon: BDAG
  rationale: Aquí οὕτως introduce una inferencia retórica indignada. En español, la pregunta "¿Acaso no hay...?" transmite mejor la sorpresa y el reproche que un adverbio desnudo como "así" o "entonces".
- source_word: οὐκ ἔνι ἐν ὑμῖν
  english_pob_choice: there is not among you
  chosen_spanish: no hay entre ustedes
  alternatives_spanish:
  - no existe entre ustedes
  - no se encuentra entre ustedes
  lexicon: BDAG
  rationale: ἔνι expresa existencia; con ἐν ὑμῖν apunta a la comunidad. "No hay entre ustedes" es la forma más natural en español y mantiene el énfasis corporativo.
- source_word: οὐδεὶς σοφὸς
  english_pob_choice: even one wise man
  chosen_spanish: ni siquiera uno sabio
  alternatives_spanish:
  - ni siquiera una persona sabia
  - ni un sabio
  lexicon: BDAG
  rationale: El griego usa singular masculino; la redacción española conserva la fuerza del singular enfático con "ni siquiera uno sabio". Se evita "hombre" en el texto principal para no sobrerrepresentar el género donde el griego puede funcionar de modo representativo.
- source_word: δυνήσεται διακρῖναι
  english_pob_choice: will be able to judge
  chosen_spanish: que pueda juzgar
  alternatives_spanish:
  - que será capaz de juzgar
  - que pueda decidir
  - que pueda arbitrar
  lexicon: BDAG
  rationale: En un contexto de disputa jurídica, διακρίνω tiene el sentido de decidir/juzgar entre partes. "Que pueda juzgar" preserva la capacidad prospectiva sin forzar demasiado el futuro en español.
- source_word: ἀνὰ μέσον
  english_pob_choice: between
  chosen_spanish: entre
  alternatives_spanish:
  - en medio de
  - de entre
  lexicon: BDAG
  rationale: La locución idiomática se expresa de manera natural con "entre".
- source_word: τοῦ ἀδελφοῦ αὐτοῦ
  english_pob_choice: between his brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - su hermano
  - un hermano suyo y otro
  - un hermano y otro
  lexicon: BDAG
  rationale: El genitivo singular con el contexto inmediato funciona de manera distributiva/representativa para una disputa entre miembros de la comunidad. En español, el plural "sus hermanos" sigue la revisión del POB en inglés y evita añadir palabras que no están explícitas en el griego.
theological_decisions:
- issue: Forma masculina singular y referencia comunitaria mixta
  english_pob_reading: even one wise man ... his brothers
  chosen_spanish_reading: ni siquiera uno sabio ... sus hermanos
  alternative_spanish_readings:
  - ni siquiera una persona sabia ... sus hermanos
  - ni siquiera uno sabio ... su hermano y otro
  rationale: El griego conserva formas masculinas singulares, pero el contexto es la congregación entera. La redacción principal mantiene el singular enfático sin masculinizar con "hombre"; el plural "sus hermanos" refleja la revisión auditada en inglés y comunica el sentido comunitario de la disputa.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado desde «between his brother and another» a «between his brothers» para reflejar con más naturalidad el sentido distributivo del griego y evitar una adición explícita. La versión española sigue esa revisión, evitando introducir un segundo término no expreso y manteniendo la fuerza retórica del reproche.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no contiene el nombre divino.
  - Se usa «juzgar» para διακρίνω en contexto forense, coherente con el registro legal del pasaje.
  - Se evita «Cristo»/«Mesías» porque no aparecen en este versículo.
  - «Hermanos» se entiende en sentido comunitario amplio, en línea con la nota auditada del POB inglés.
