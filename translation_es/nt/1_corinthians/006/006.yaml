translation:
  language: es
  text: Pero un hermano litiga contra otro hermano[a][b], ¿y esto ante incrédulos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El repetido 'hermano' se refiere a otros miembros de la comunidad cristiana.
    reason: cultural_note
  - marker: b
    text: O 'ante los incrédulos'. La frase probablemente se refiere a tribunales seculares integrados por quienes están fuera de la iglesia, pero el griego dice simplemente 'ante incrédulos'.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sin embargo
  lexicon: BDAG
  rationale: Marca un giro adversativo fuerte y natural en español, equivalente al contraste del griego con el contexto inmediato.
- source_word: ἀδελφὸς ... ἀδελφοῦ
  english_pob_choice: brother ... brother
  chosen_spanish: un hermano ... otro hermano
  alternatives_spanish:
  - un hermano ... un hermano
  - un hermano ... su hermano
  lexicon: BDAG
  rationale: Conserva la repetición singular del griego y el lenguaje familiar de la comunidad cristiana, pero en español resulta más natural explicitar la oposición con 'otro hermano'.
- source_word: μετὰ
  english_pob_choice: against
  chosen_spanish: contra
  alternatives_spanish:
  - con
  - en contra de
  lexicon: BDAG
  rationale: En contexto forense, μετά con genitivo expresa oposición; 'contra' comunica mejor el sentido litigioso que 'con'.
- source_word: κρίνεται
  english_pob_choice: goes to court
  chosen_spanish: litiga
  alternatives_spanish:
  - va a juicio
  - es juzgado
  - entabla una demanda
  lexicon: BDAG
  rationale: El verbo κρίνω aparece aquí en marco judicial. 'Litiga' conserva el matiz de disputa legal sin sobreespecificar el procedimiento.
- source_word: καὶ τοῦτο
  english_pob_choice: and this
  chosen_spanish: y esto
  alternatives_spanish:
  - e incluso esto
  - y además esto
  lexicon: BDAG
  rationale: Reproduce el golpe retórico de sorpresa del griego sin añadir contenido no presente en el texto.
- source_word: ἐπὶ ἀπίστων
  english_pob_choice: before unbelievers
  chosen_spanish: ante incrédulos
  alternatives_spanish:
  - delante de incrédulos
  - en presencia de incrédulos
  - ante los incrédulos
  lexicon: BDAG
  rationale: ἐπί con genitivo indica la esfera o audiencia ante la cual ocurre el caso. 'Ante incrédulos' mantiene la amplitud del griego sin introducir 'jueces' ni restringir indebidamente el referente.
theological_decisions:
- issue: Referencia comunitaria de 'hermano' en singular repetido
  english_pob_reading: The repeated 'brother' refers to fellow members of the Christian community.
  chosen_spanish_reading: '''Hermano'' designa a los miembros de la comunidad cristiana, manteniendo la forma singular representativa.'
  alternative_spanish_readings:
  - hermano o hermana
  - fiel creyente
  - miembro de la iglesia
  rationale: Se preserva la fuerza representativa del singular masculino del griego y su lenguaje familiar eclesial, sin neutralizar el término en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Alcance de ἀπίστων
  english_pob_reading: unbelievers
  chosen_spanish_reading: incrédulos
  alternative_spanish_readings:
  - no creyentes
  - paganos
  - ajenos a la fe
  rationale: '''Incrédulos'' mantiene el contraste paulino entre la iglesia y quienes están fuera de la fe, sin añadir una identificación más estrecha que la del griego.'
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: Se corrigió el problema de validación eliminando el marcador [b] y conservando un único pie de nota anclado en la frase correspondiente. La redacción española mantiene el sentido judicial del verbo y el contraste comunitario del pasaje, con ajuste natural de orden y preposición para el español.
  spanish_consistency_notes:
  - Se usó 'hermano' de modo representativo para concordar con la forma singular del griego y con el registro eclesial del pasaje.
  - Se evitó 'SEÑOR' u otras terminologías ajenas al versículo; no aparece ningún término divino aquí.
  - '''Incrédulos'' traduce ἀπίστων de forma amplia y coherente con el contraste iglesia/no iglesia.'
  - La puntuación interrogativa final se conserva según el griego.
