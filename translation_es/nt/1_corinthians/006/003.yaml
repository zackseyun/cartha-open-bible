review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura básica del griego: pregunta retórica («¿No saben...?»), futuro de κρινοῦμεν («juzgaremos»), sentido celestial de ἀγγέλους («ángeles»), y referencia amplia de βιωτικά a las realidades/asuntos de la vida presente. También mantiene correctamente la tensión teológica de «juzgaremos a los ángeles» sin explicarla de más.'
  spanish_quality_summary: 'El español es claro y digno, pero «¡Cuánto más las cosas de esta vida!» suena algo elíptico y poco natural en español eclesial general. Además, la nota al pie ofrece alternativas poco precisas: «¡y mucho menos!» no corresponde bien al movimiento argumentativo, y «¡ni hablar de...!» introduce un tono demasiado coloquial. Conviene una formulación más idiomática y una nota más fiel al abanico semántico documentado.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Ángeles» y «juzgaremos» están bien alineados con el audit trail. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc.
  issues:
  - severity: medium
    issue: La frase «¡Cuánto más las cosas de esta vida!» resulta forzada en español.
    rationale: Aunque refleja de cerca el inglés auditado, en español la combinación exclamativa con un sintagma nominal desnudo queda abrupta. «¡Cuánto más las cosas de la vida cotidiana!» o «¡cuánto más las de esta vida!» mejora la naturalidad sin perder el argumento de mayor a menor.
  - severity: medium
    issue: La nota al pie para μήτιγε no refleja con suficiente precisión las alternativas auditadas.
    rationale: El inglés documenta «let alone the things of this life» y «much less matters of this life». La propuesta «¡y mucho menos!» queda incompleta sin el complemento, y «¡ni hablar de...!» es demasiado coloquial para el registro objetivo del proyecto.
  revised_spanish_text: ¿No saben que juzgaremos a los ángeles? ¡Cuánto más[a] las cosas de la vida cotidiana!
  revised_footnotes:
  - marker: a
    text: 'O: «mucho menos las cosas de la vida cotidiana»; o «y ni qué decir de las cosas de la vida cotidiana».'
    reason: lexical_alternative
  revision_rationale: Se ajusta μήτιγε a un español más natural y completo en contexto, manteniendo el argumento de mayor a menor. También se revisa la nota para reflejar mejor las alternativas documentadas en el audit trail inglés, evitando una formulación demasiado coloquial o incompleta. «Vida cotidiana» comunica con claridad el sentido amplio de βιωτικά sin limitarlo indebidamente.
