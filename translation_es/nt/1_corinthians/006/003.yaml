revisions:
- from: ¿No saben que juzgaremos a los ángeles? ¡Cuánto más[a] las cosas de esta vida!
  to: ¿No saben que juzgaremos a los ángeles? ¡Cuánto más[a] las cosas de la vida cotidiana!
  rationale: Se ajusta μήτιγε a un español más natural y completo en contexto, manteniendo el argumento de mayor a menor. También se revisa la nota para reflejar mejor las alternativas documentadas en el audit trail inglés, evitando una formulación demasiado coloquial o incompleta. «Vida cotidiana» comunica con claridad el sentido amplio de βιωτικά sin limitarlo indebidamente.
