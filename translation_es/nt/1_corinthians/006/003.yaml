translation:
  language: es
  text: ¿No saben que juzgaremos a los ángeles? ¡Cuánto más[a] las cosas de la vida cotidiana!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «mucho menos las cosas de la vida cotidiana»; o «y ni qué decir de las cosas de la vida cotidiana».'
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben... ?
  alternatives_spanish:
  - ¿No conocen... ?
  - ¿No se dan cuenta...?
  - ¿No saben acaso...?
  lexicon: BDAG
  rationale: La pregunta retórica paulina se conserva con una fórmula natural en español. «Saben» mantiene el valor idiomático de conocimiento previo sin añadir explicaciones que el griego no expresa.
- source_word: κρινοῦμεν
  english_pob_choice: we will judge
  chosen_spanish: juzgaremos
  alternatives_spanish:
  - juzgaremos en juicio
  - juzgaremos sobre
  - gobernaremos
  lexicon: BDAG
  rationale: El futuro indicativo exige un valor futuro en español. «Juzgaremos» conserva la fuerza legal del verbo κρίνω sin desplazarlo hacia «gobernar», que sería más interpretativo.
- source_word: μήτιγε
  english_pob_choice: how much more
  chosen_spanish: ¡Cuánto más[a]!
  alternatives_spanish:
  - ¡Cuánto menos!
  - ¡Con mayor razón!
  - ¡Y mucho más!
  lexicon: BDAG
  rationale: La partícula intensifica un argumento de mayor a menor. «¡Cuánto más!» comunica bien la relación retórica en español y preserva la comparación implícita del griego.
- source_word: βιωτικά
  english_pob_choice: the things of this life
  chosen_spanish: las cosas de esta vida
  alternatives_spanish:
  - los asuntos de esta vida
  - las cosas temporales
  - los asuntos cotidianos
  lexicon: BDAG
  rationale: El adjetivo sustantivado se refiere a asuntos pertenecientes a la vida ordinaria terrenal. «Las cosas de esta vida» sigue de cerca el sentido del audit trail inglés y evita restringirlo solo a disputas legales.
- source_word: ἀγγέλους
  english_pob_choice: angels
  chosen_spanish: los ángeles
  alternatives_spanish:
  - mensajeros
  - seres angelicales
  lexicon: BDAG
  rationale: En este contexto judicial y escatológico, el referente son seres celestiales, no mensajeros humanos. Se conserva el término directo «ángeles».
theological_decisions:
- issue: El alcance de «juzgaremos a los ángeles»
  english_pob_reading: Retain the literal wording 'we will judge angels' without interpretive expansion.
  chosen_spanish_reading: Mantener «juzgaremos a los ángeles» sin ampliar a «gobernaremos sobre» ni limitarlo a «ángeles caídos».
  alternative_spanish_readings:
  - gobernaremos sobre los ángeles
  - juzgaremos a los ángeles caídos
  rationale: El texto afirma la acción futura de manera directa, pero no especifica mecanismo, alcance ni si solo se trata de ángeles caídos. La traducción conserva esa tensión teológica en lugar de resolverla anticipadamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y el audit trail inglés, pero ajusta la primera cláusula a español natural con una pregunta retórica directa. Se conservó la comparación intensificadora de μήτιγε y se eligió una equivalencia transparente para βιωτικά. No se añadió interpretación sobre el tipo de ángeles ni sobre la naturaleza exacta de los asuntos mencionados.
  spanish_consistency_notes:
  - Se mantiene «ángeles» como referente celestial, coherente con el contexto judicial/escatológico.
  - «Las cosas de esta vida» conserva amplitud semántica y evita estrechar el término a un solo ámbito.
  - La puntuación separa las dos cláusulas como en la revisión inglesa reciente, con exclamación en la segunda para reflejar la fuerza retórica de μήτιγε.
