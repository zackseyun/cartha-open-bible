translation:
  language: es
  text: Pero ustedes mismos cometen injusticia y defraudan[a], y eso mismo a sus hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estafan»; el verbo griego puede implicar privar a alguien de lo que le corresponde en un contexto de fraude o despojo.
    reason: lexical_alternative
  - marker: b
    text: O «hermanos y hermanas»; el griego dice «hermanos» y puede referirse más ampliamente a los creyentes de la comunidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sino
  lexicon: BDAG
  rationale: Marca un contraste fuerte con la afirmación anterior; «Pero» es natural en español y conserva el giro adversativo sin volverlo arcaico.
- source_word: ὑμεῖς
  english_pob_choice: you yourselves
  chosen_spanish: ustedes mismos
  alternatives_spanish:
  - ustedes
  - vosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego; «ustedes mismos» preserva ese énfasis y suena natural en español latinoamericano.
- source_word: ἀδικεῖτε
  english_pob_choice: do wrong
  chosen_spanish: hacen lo malo
  alternatives_spanish:
  - hacen injusticia
  - obran mal
  lexicon: BDAG
  rationale: El verbo cubre la idea general de obrar injustamente o hacer daño. «Hacen lo malo» mantiene la fuerza moral sin forzar un tecnicismo jurídico que el español bíblico podría endurecer innecesariamente.
- source_word: ἀποστερεῖτε
  english_pob_choice: defraud
  chosen_spanish: defraudan
  alternatives_spanish:
  - estafan
  - despojan
  - privan
  lexicon: BDAG
  rationale: En el contexto de disputas y perjuicio económico, «defraudan» comunica con precisión la privación indebida de lo debido y conserva el matiz legal/económico del griego.
- source_word: καὶ τοῦτο
  english_pob_choice: —and this
  chosen_spanish: —y esto
  alternatives_spanish:
  - y además esto
  - y eso
  lexicon: BDAG
  rationale: El giro añade carga retórica al reproche. El guion y «y esto» reproducen bien el énfasis del original en español sin exagerar la paráfrasis.
- source_word: ἀδελφούς
  english_pob_choice: brothers
  chosen_spanish: sus hermanos
  alternatives_spanish:
  - hermanos
  - hermanos y hermanas
  - compañeros creyentes
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego en el texto principal, pero «sus» hace natural la referencia en segunda persona directa. En español puede abarcar a la comunidad creyente en sentido representativo.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφούς en contexto eclesial mixto
  english_pob_reading: brothers; the Greek says 'brothers' and can refer to fellow believers more broadly.
  chosen_spanish_reading: sus hermanos
  alternative_spanish_readings:
  - sus hermanos y hermanas
  - sus hermanos, es decir, sus consiervos creyentes
  - sus compañeros creyentes
  rationale: La forma griega es masculina plural y, en Pablo, suele designar a la comunidad cristiana como conjunto. Se conserva la forma gramatical «hermanos» en el cuerpo del texto, y una nota aclara el posible sentido inclusivo sin borrar la tensión lexical.
  doctrine_reference: DOCTRINE.md § Translation philosophy, point 4
translation_notes:
  revision_awareness: 'La redacción sigue el trazado del texto griego y la línea auditada en inglés: contraste adversativo fuerte, pronombre enfático, verbo de injusticia general y verbo económico-jurídico de fraude. Se conserva el cierre enfático con «y esto» y se explicita en nota el alcance de ἀδελφούς sin sustituir la forma griega por una formulación más expansiva en el texto principal.'
  spanish_consistency_notes:
  - Se usa «ustedes» de manera consistente con el español latinoamericano moderno y reverente.
  - Se evita «SEÑOR» o formulaciones litúrgicas no presentes, porque el verso no contiene el nombre divino.
  - «Hacen lo malo» y «defraudan» mantienen dos verbos distintos como en el griego, sin fusionarlos en una sola idea.
  - Las notas preservan la alternativa inclusiva para ἀδελφούς sin alterar el texto principal.
