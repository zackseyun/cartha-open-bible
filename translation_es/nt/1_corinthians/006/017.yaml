  source_alignment_summary: 'El borrador español transmite bien el sentido básico de ὁ δὲ κολλώμενος τῷ κυρίῳ ἓν πνεῦμά ἐστιν: contraste con el versículo anterior, unión con el Señor, y predicado «un solo espíritu». Sin embargo, la nota [a] no preserva bien la alternativa inglesa documentada, porque ofrece como variante exactamente la misma lectura principal («se une al Señor») en vez de reflejar la alternativa pasiva/medio-pasiva «es unido/está unido al Señor».'
  spanish_quality_summary: 'La redacción principal es natural y clara en español: «Pero el que se une al Señor es un solo espíritu». Suena eclesialmente legible y no es calco torpe. Conviene un pequeño ajuste en la nota [a] para evitar redundancia y alinear mejor la explicación léxica. Las demás notas son comprensibles; [b] adapta bien la decisión de no añadir «con él» en español, y [c] expresa adecuadamente la cuestión de la mayúscula.'
  glossary_alignment: 'La terminología está bien alineada con los criterios del proyecto: κύριος -> «Señor» (referido a Jesús, no al nombre divino), πνεῦμα -> «espíritu» en minúscula por contexto, y la unión expresada por κολλώμενος se comunica naturalmente con «se une a». No hay conflicto con los valores por defecto del glosario.'
  issues:
  - severity: medium
    issue: La nota [a] no presenta correctamente la alternativa léxica documentada.
    rationale: 'El texto de la nota dice «O: “se une al Señor”», que duplica la lectura principal en lugar de dar la alternativa inglesa auditada («is joined to the Lord»). Esto debilita la trazabilidad del expediente léxico.'
  - severity: low
    issue: La formulación «expresa una unión espiritual con el Señor» en [c] podría sonar levemente más débil que la decisión inglesa de «one spirit».
    rationale: No es un error de traducción en el texto principal, pero conviene que la nota mantenga la fuerza de la unidad sin reducirla a mera cualidad espiritual. Aun así, el sentido general permanece aceptable.
  revised_spanish_text: Pero el que se une al Señor es un solo espíritu[a][b][c].
  revised_footnotes:
  - marker: a
    text: 'O: «está unido al Señor». El verbo griego puede entenderse con matiz reflexivo («se une a») o como una expresión de sentido pasivo («está unido a»).'
    reason: lexical_alternative
  - marker: b
    text: 'O simplemente: «es un solo espíritu». La idea de «con él» está implícita en el griego; en español no se añade porque la relación ya queda clara con «al Señor».'
    reason: lexical_alternative
  - marker: c
    text: «Espíritu» podría escribirse con mayúscula según algunos intérpretes, pero la frase naturalmente significa que el creyente está unido al Señor en un solo espíritu.
    reason: alternative_reading
