base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/006/017.yaml
  text: But the one who joins himself to the Lord is one spirit with him[a][b][c].
  footnotes:
  - marker: a
    text: Or 'is joined to the Lord.' The Greek verb can be rendered either with reflexive force ('joins himself to') or as a passive-like expression ('is joined to').
    reason: lexical_alternative
  - marker: b
    text: Or simply 'is one spirit.' 'With him' is implicit in the Greek and added for clarity in English.
    reason: lexical_alternative
  - marker: c
    text: '''Spirit'' could be capitalized by some interpreters, but the phrase most naturally means that the believer is united with the Lord in one spirit.'
    reason: alternative_reading
