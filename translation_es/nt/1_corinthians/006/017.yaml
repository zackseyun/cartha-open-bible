translation:
  language: es
  text: Pero el que se une al Señor es un solo espíritu[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se une al Señor». El verbo griego puede leerse con matiz reflexivo («se une a») o como una expresión de pasividad («es unido al Señor»).'
    reason: lexical_alternative
  - marker: b
    text: La idea de «con él» está implícita en el griego; en español no se añade porque la relación ya queda clara con «al Señor».
    reason: lexical_alternative
  - marker: c
    text: «Espíritu» podría escribirse con mayúscula según algunos intérpretes, pero la frase naturalmente expresa una unión espiritual con el Señor.
    reason: alternative_reading
lexical_decisions:
- source_word: κολλώμενος
  english_pob_choice: joins himself to
  chosen_spanish: se une a
  alternatives_spanish:
  - se adhiere a
  - se junta con
  - se liga a
  lexicon: BDAG
  rationale: El participio medio/pasivo expresa unión o adhesión estrecha. En español, «se une a» conserva la idea de unión personal y relacional sin sonar forzado. Mantiene además la resonancia del contraste con la unión sexual del versículo anterior.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este contexto paulino, κύριος se refiere al Señor exaltado, es decir, Jesús. «Señor» es la forma natural en español para conservar ese peso teológico y la terminología cristiana reconocible.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - único
  lexicon: BDAG
  rationale: «Un solo» refuerza la unidad expresada por ἓν sin añadir una idea extra. En español suena más natural que un simple «uno» en esta construcción predicativa.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - Espíritu
  - aliento
  lexicon: BDAG
  rationale: Aquí πνεῦμα describe la realidad de unión espiritual entre el creyente y el Señor. Se traduce «espíritu» en minúscula porque el sentido más natural es de una unión espiritual, no una identificación con el Espíritu Santo como Persona.
- source_word: ὁ δὲ ... ἐστιν
  english_pob_choice: But the one who ... is
  chosen_spanish: Pero el que ... es
  alternatives_spanish:
  - Pero quien ... es
  - Mas el que ... es
  lexicon: Greek grammar
  rationale: 'La construcción con artículo y participio funciona como un sustantivo: «el que se une». «Pero el que» conserva el valor substantivado y el contraste de δέ con el versículo anterior.'
theological_decisions:
- issue: Naturaleza de la unión expresada en «un solo espíritu»
  english_pob_reading: The phrase expresses real spiritual union with the Lord without collapsing the distinction between the believer and the Lord.
  chosen_spanish_reading: La frase expresa una unión espiritual real con el Señor, sin borrar la distinción entre el creyente y el Señor.
  alternative_spanish_readings:
  - una identificación mística más fuerte
  - una mera coincidencia de actitud o propósito
  rationale: El contexto contrapone la unión corporal con una prostituta y la unión con el Señor. Por eso conviene conservar la fuerza de la unión, pero evitando una formulación que sugiera fusión ontológica o, en el extremo opuesto, una simple afinidad moral.
  doctrine_reference: Afirmaciones; filosofía de traducción §3
- issue: Valor de la relación implícita en la predicación
  english_pob_reading: Include 'with him' for clarity.
  chosen_spanish_reading: No se añade un complemento explícito equivalente a «con él», porque en español «se une al Señor» ya deja claro el referente relacional y evita sobrecargar la frase.
  alternative_spanish_readings:
  - es un solo espíritu con él
  - es un solo espíritu con el Señor
  rationale: El griego deja implícita la relación; en español puede expresarse de forma natural por medio de «se une al Señor». Añadir «con él» no es necesario y podría sonar redundante, aunque sigue siendo una posibilidad interpretativa.
  doctrine_reference: 'Filosofía de traducción: equivalencia óptima'
- issue: Posible capitalización de «Espíritu»
  english_pob_reading: '''Spirit'' could be capitalized by some interpreters, but the phrase most naturally means that the believer is united with the Lord in one spirit.'
  chosen_spanish_reading: Se mantiene «espíritu» en minúscula.
  alternative_spanish_readings:
  - Espíritu
  rationale: En español, la minúscula evita imponer una lectura pneumatológica que el contexto no exige. La frase se entiende mejor como unión espiritual compartida, no como una referencia directa al Espíritu Santo como nombre propio.
  doctrine_reference: Afirmaciones; observación lexical sobre πνεῦμα
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el expediente auditado en inglés. Se mantiene la ambigüedad del participio κολλώμενος con una traducción natural en español, se conserva la fuerza de ἓν πνεῦμά ἐστιν sin introducir una identificación ontológica, y se ajusta la claridad relacional al español sin añadir un complemento innecesario.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος, coherente con el uso paulino y con la decisión auditada en inglés.
  - Se prefiere «espíritu» en minúscula para πνεῦμα, siguiendo la lectura más natural del contexto.
  - Se mantiene un estilo sobrio y eclesial, sin recurrir a formulaciones arcaizantes.
  - La traducción evita calcar la estructura inglesa y, a la vez, conserva la tensión interpretativa documentada en el expediente.
