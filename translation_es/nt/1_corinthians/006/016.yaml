translation:
  language: es
  text: ¿O no saben que el que se une[a] con una prostituta es un solo cuerpo con ella? Porque, como él dice[b], «Los dos llegarán a ser una sola carne».
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más formalmente: «el que se une a una prostituta es un solo cuerpo».'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «él dice»; la cita es de Génesis 2:24.'
    reason: cross_reference
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O acaso
  - ¿O es que
  lexicon: BDAG
  rationale: La partícula abre una alternativa retórica dentro del argumento paulino; en español, «¿O» conserva esa continuidad interrogativa sin añadir contenido.
- source_word: οὐκ οἴδατε
  english_pob_choice: do you not know
  chosen_spanish: no saben
  alternatives_spanish:
  - no reconocen
  - no se dan cuenta
  lexicon: BDAG
  rationale: La fórmula retórica se puede expresar de manera natural en plural de cortesía no usado aquí; el plural directo «no saben» refleja el tono apostólico y mantiene el sentido de conocimiento real.
- source_word: ὁ κολλώμενος
  english_pob_choice: the one who joins himself
  chosen_spanish: el que se une
  alternatives_spanish:
  - el que se adhiere
  - el que se pega
  lexicon: BDAG
  rationale: κολλάομαι puede expresar unión/adhesión. En este contexto sexual, «se une» comunica la unión personal sin sonar forzado; el reflexivo del inglés se vuelve innecesario en español.
- source_word: τῇ πόρνῃ
  english_pob_choice: to a prostitute
  chosen_spanish: con una prostituta
  alternatives_spanish:
  - a una prostituta
  - con la prostituta
  lexicon: BDAG
  rationale: πόρνη designa específicamente a una prostituta. En español, la preposición «con» hace más natural la relación de unión sexual implicada por el contexto y preserva la conexión interpersonal del texto.
- source_word: ἓν σῶμά ἐστιν
  english_pob_choice: is one body with her
  chosen_spanish: es un solo cuerpo con ella
  alternatives_spanish:
  - es un cuerpo con ella
  - se hace un solo cuerpo con ella
  lexicon: BDAG
  rationale: La construcción predicativa afirma unidad corporal real; «un solo cuerpo» expresa mejor la singularidad enfática de ἓν σῶμα y «con ella» aclara la referencia relacional implícita.
- source_word: Ἔσονται γάρ
  english_pob_choice: For ... will become
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, como
  lexicon: BDAG
  rationale: La cita de Génesis introduce la base de la afirmación previa. En español, «Porque» mantiene la función causal y permite conectar la cita con el argumento sin sobrecargar el futuro verbal en la introducción.
- source_word: φησίν
  english_pob_choice: as he says
  chosen_spanish: como dice
  alternatives_spanish:
  - dice
  - según dice
  lexicon: BDAG
  rationale: El singular griego se conserva de modo natural con «como dice»; evita especificar innecesariamente el sujeto en la glosa principal y suena idiomático en español.
- source_word: οἱ δύο
  english_pob_choice: The two
  chosen_spanish: Los dos
  alternatives_spanish:
  - Ambos
  - Los dos de ellos
  lexicon: BDAG
  rationale: La cita bíblica usa una expresión directa y breve; «Los dos» es la forma más natural en español para mantener la concisión del texto citado.
- source_word: εἰς σάρκα μίαν
  english_pob_choice: one flesh
  chosen_spanish: una sola carne
  alternatives_spanish:
  - una carne sola
  - en una sola carne
  lexicon: BDAG
  rationale: La frase de Génesis se ha recibido tradicionalmente como «una sola carne»; en español sigue siendo clara y fiel. «Carne» conserva el valor literal-relacional de σάρξ en este contexto, sin desplazarlo a un sentido moral abstracto.
theological_decisions:
- issue: Aplicación de Génesis 2:24 al vínculo sexual con una prostituta
  english_pob_reading: Render the citation straightforwardly as grounding Paul's claim that sexual union creates a real bodily 'one flesh' union, without importing a fuller doctrinal statement about marriage into the verse itself.
  chosen_spanish_reading: Presentar la cita como fundamento directo de la afirmación de Pablo sobre una unión corporal real, sin añadir en la traducción una explicación doctrinal más amplia sobre el matrimonio.
  alternative_spanish_readings:
  - Limitar la cita solo al matrimonio y no a la unión sexual fuera de él
  - Expandir la traducción para explicitar una conclusión moral no dicha en el versículo
  rationale: El griego aplica Génesis 2:24 de manera argumentativa al caso de la prostitución. La traducción debe conservar esa fuerza teológica sin resolver ni ampliar la tensión más allá de lo que dice el texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el expediente auditado en inglés POB. Mantiene la lectura retórica de la pregunta inicial, conserva la especificidad de πόρνη como «prostituta», y traduce la cita de Génesis 2:24 con la forma establecida «una sola carne», sin suavizar la afirmación de unión corporal ni añadir interpretaciones doctrinales no explicitadas en el versículo.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ en la cita, por coherencia con el valor relacional/literal del pasaje.
  - Se usa «prostituta» para πόρνη por precisión léxica, no el más amplio «mujer sexualmente inmoral».
  - La pregunta retórica conserva el tono argumentativo de Pablo mediante interrogación directa.
  - Las notas usan marcadores únicos y aparecen ancladas en el texto donde corresponde.
