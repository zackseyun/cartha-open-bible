translation:
  language: es
  text: ¿Se atreve alguno de ustedes, cuando tiene un caso contra otro, a ser juzgado ante los injustos[a] y no ante los santos[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante los injustos». Algunas traducciones lo interpretan como «ante incrédulos», pero el griego dice «los injustos».
    reason: lexical_alternative
  - marker: b
    text: «Santos» aquí se refiere al pueblo santo de Dios, es decir, a los creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τολμᾷ
  english_pob_choice: Does ... dare
  chosen_spanish: ¿Se atreve...
  alternatives_spanish:
  - ¿Dará la osadía...
  - ¿Se atreve a hacerlo...
  lexicon: BDAG
  rationale: τολμάω expresa atrevimiento u osadía en un tono retórico de reprensión; «¿Se atreve...?» conserva ese valor sin suavizarlo ni volverlo mecánico.
- source_word: τις ὑμῶν
  english_pob_choice: any one of you
  chosen_spanish: alguno de ustedes
  alternatives_spanish:
  - cualquiera de ustedes
  - uno de ustedes
  lexicon: BDAG
  rationale: El griego usa un indefinido singular con genitivo partitivo; en español, «alguno de ustedes» comunica bien la referencia indefinida del grupo con naturalidad.
- source_word: πρᾶγμα ἔχων
  english_pob_choice: when he has a case
  chosen_spanish: cuando tiene un caso
  alternatives_spanish:
  - cuando tiene un asunto
  - cuando tiene una disputa
  - cuando tiene una causa
  lexicon: BDAG
  rationale: πρᾶγμα puede ser asunto, caso o litigio. «Caso» conserva el matiz jurídico sin sobreespecificar más allá del texto griego.
- source_word: πρὸς τὸν ἕτερον
  english_pob_choice: against another
  chosen_spanish: contra otro
  alternatives_spanish:
  - con otro
  - contra el otro
  lexicon: BDAG
  rationale: En este contexto de litigio, πρός con acusativo expresa oposición. «Contra otro» mantiene esa relación adversativa de forma clara en español.
- source_word: κρίνεσθαι
  english_pob_choice: to be judged
  chosen_spanish: ser juzgado
  alternatives_spanish:
  - ir a juicio
  - tener el caso decidido
  - ser llevado a juicio
  lexicon: BDAG
  rationale: La forma pasiva infinitiva se conserva con «ser juzgado», manteniendo el sentido judicial del verbo κρίνω.
- source_word: ἐπὶ τῶν ἀδίκων
  english_pob_choice: before the unrighteous
  chosen_spanish: ante los injustos
  alternatives_spanish:
  - ante los injustos hombres
  - ante los impíos
  - ante los no creyentes
  lexicon: BDAG
  rationale: ἀδίκων significa literalmente «injustos / injustos». Se mantiene el término evaluativo del griego; «ante» reproduce la preposición judicial de modo natural en español. No se reemplaza por «no creyentes», porque eso interpreta más de lo que dice el texto.
- source_word: καὶ οὐχὶ
  english_pob_choice: and not
  chosen_spanish: y no
  alternatives_spanish:
  - y no más bien
  - y no antes bien
  lexicon: BDAG
  rationale: La simple coordinación negativa preserva el contraste retórico sin añadir matices no expresados explícitamente en la sintaxis griega.
- source_word: ἐπὶ τῶν ἁγίων
  english_pob_choice: before the saints
  chosen_spanish: ante los santos
  alternatives_spanish:
  - ante los consagrados
  - ante los santos de Dios
  - ante el pueblo santo
  lexicon: BDAG
  rationale: ἅγιοι es la designación paulina habitual para los creyentes. «Santos» conserva el término establecido y su fuerza comunitaria y teológica.
theological_decisions:
- issue: Contraste entre ἀδίκων y ἁγίων
  english_pob_reading: the unrighteous ... the saints
  chosen_spanish_reading: los injustos ... los santos
  alternative_spanish_readings:
  - los injustos ... los creyentes
  - los impíos ... los santos
  rationale: 'Se preserva la tensión lexical del griego: Pablo no dice «incrédulos», sino «injustos», y contrapone ese término a «santos». La versión deja que el contraste moral y comunitario permanezca visible.'
  doctrine_reference: Primacía del texto original; mantener la tensión semántica sin resolverla interpretativamente.
- issue: Valor representativo del singular masculino ἔχων
  english_pob_reading: when he has a case
  chosen_spanish_reading: cuando tiene un caso
  alternative_spanish_readings:
  - cuando tienen un caso
  - cuando uno tiene un caso
  rationale: El participio griego es singular masculino y representativo. El español mantiene la referencia singular sin forzar pluralización, conservando la concordancia con el original.
  doctrine_reference: Precisión gramatical sobre neutralización innecesaria.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el texto griego y el audit trail inglés: conserva el valor retórico de τολμᾷ, el sentido jurídico de πρᾶγμα y κρίνεσθαι, y la tensión moral de ἀδίκων frente a ἁγίων sin reinterpretarla como «no creyentes».'
  spanish_consistency_notes:
  - Se usa «santos» como término paulino para los creyentes, en continuidad con la terminología del proyecto.
  - Se prefiere «injustos» para ἀδίκων por fidelidad léxica, aunque «impíos» sería posible en algunos contextos.
  - «Ante» se usa para ambos grupos por el valor judicial de ἐπί en este versículo.
  - El estilo mantiene español moderno, sobrio y apto para lectura eclesial.
