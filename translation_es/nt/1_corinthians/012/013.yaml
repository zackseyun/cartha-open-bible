base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/013.yaml
  text: For indeed[a], in one Spirit we all were baptized into one body—whether Jews or Greeks[c][b], whether slaves or free—and we all were given to drink one Spirit.
  footnotes:
  - marker: a
    text: Or 'by one Spirit'; the Greek ἐν can indicate sphere ('in') or means/agency ('by').
    reason: alternative_reading
  - marker: b
    text: Or 'we all were given one Spirit to drink.'
    reason: lexical_alternative
  - marker: c
    text: Or 'one spirit' if taken less specifically, though the context strongly points to the Holy Spirit.
    reason: alternative_reading
