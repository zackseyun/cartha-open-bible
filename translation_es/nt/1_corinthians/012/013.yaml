translation:
  language: es
  text: Porque de hecho[a], todos nosotros fuimos bautizados en un solo Espíritu[b] para formar un solo cuerpo, ya seamos judíos o griegos, esclavos o libres; y a todos se nos dio a beber de un solo Espíritu[c][d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente «Porque». La combinación griega καὶ γὰρ tiene fuerza explicativa con énfasis.
    reason: alternative_reading
  - marker: b
    text: O «por un solo Espíritu»; el griego ἐν puede indicar esfera («en») o medio/agencia («por»).
    reason: alternative_reading
  - marker: c
    text: O «se nos dio un solo Espíritu para beber».
    reason: lexical_alternative
  - marker: d
    text: O «un espíritu», si se toma de modo menos específico; aunque el contexto apunta con fuerza al Espíritu Santo.
    reason: alternative_reading
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For indeed
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en verdad
  lexicon: BDAG
  rationale: La combinación introduce una explicación con énfasis. En español, «Porque» comunica bien la relación causal/explanatoria sin recargar la frase; el matiz enfático se conserva en el flujo del versículo.
- source_word: ἐν ἑνὶ πνεύματι
  english_pob_choice: in one Spirit
  chosen_spanish: en un solo Espíritu
  alternatives_spanish:
  - por un solo Espíritu
  - con un solo Espíritu
  lexicon: BDAG
  rationale: «ἐν» permite esfera, medio o agencia. «En un solo Espíritu» sigue de cerca la construcción griega y preserva la tensión interpretativa sin decidir prematuramente entre esfera y medio/agencia.
- source_word: ἐβαπτίσθημεν
  english_pob_choice: we all were baptized
  chosen_spanish: fuimos bautizados
  alternatives_spanish:
  - fuimos sumergidos
  lexicon: BDAG
  rationale: En el uso paulino, «bautizados» es la equivalencia natural y precisa. «Sumergidos» es posible léxicamente, pero introduciría un énfasis modal no explícito en el contexto.
- source_word: εἰς ἓν σῶμα
  english_pob_choice: into one body
  chosen_spanish: en un solo cuerpo
  alternatives_spanish:
  - hacia un solo cuerpo
  - dentro de un solo cuerpo
  lexicon: BDAG
  rationale: En español, «en un solo cuerpo» transmite la incorporación resultante y mantiene la imagen corporativa de Pablo. La preposición puede reflejar el resultado de la acción sin sonar forzada.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En este contraste étnico-religioso con «griegos», «judíos» es la forma más exacta y clara.
- source_word: Ἕλληνες
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - gentiles
  lexicon: BDAG
  rationale: El término griego dice «griegos»; en este paralelismo étnico directo conviene conservar esa forma en español, en vez de generalizarla como «gentiles».
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  lexicon: BDAG
  rationale: En la oposición «esclavos o libres», el rasgo de sujeción legal/social es central. «Esclavos» reproduce mejor la fuerza lexical que «siervos».
- source_word: ἐλεύθεροι
  english_pob_choice: free
  chosen_spanish: libres
  alternatives_spanish:
  - hombres libres
  lexicon: BDAG
  rationale: «Libres» es el contraste natural y claro de «esclavos» en español moderno.
- source_word: πάντες
  english_pob_choice: we all
  chosen_spanish: todos nosotros
  alternatives_spanish:
  - todos
  lexicon: BDAG
  rationale: El pronombre explícito ἡμεῖς más πάντες es enfático. «Todos nosotros» conserva ese énfasis colectivo mejor que un simple «todos».
- source_word: ἐποτίσθημεν
  english_pob_choice: were given to drink
  chosen_spanish: se nos dio a beber
  alternatives_spanish:
  - fuimos hechos beber
  - se nos dio de beber
  lexicon: BDAG
  rationale: El pasivo de ποτίζω significa dar a beber o hacer beber. «Se nos dio a beber» conserva la pasiva y suena natural en español, sin perder la metáfora de participación compartida. Aquí el complemento «de un solo Espíritu» deja abierto el enlace con el Espíritu Santo o con la unidad espiritual recibida, según el contexto.
- source_word: ἓν πνεῦμα
  english_pob_choice: one Spirit
  chosen_spanish: un solo Espíritu
  alternatives_spanish:
  - un espíritu
  lexicon: BDAG
  rationale: En la segunda cláusula, el contexto favorece el Espíritu Santo como referente, y la mayúscula en español ayuda a señalarlo. Se mantiene la alternativa de lectura menos específica en la nota.
theological_decisions:
- issue: 'Valor de ἐν ἑνὶ πνεύματι: esfera, medio o agencia'
  english_pob_reading: in one Spirit
  chosen_spanish_reading: en un solo Espíritu
  alternative_spanish_readings:
  - por un solo Espíritu
  - con un solo Espíritu
  rationale: La construcción admite más de un matiz legítimo. Se conserva la ambigüedad teológica en vez de fijar dogmáticamente una sola función instrumental.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Referencia de ἓν πνεῦμα en la segunda cláusula
  english_pob_reading: one Spirit
  chosen_spanish_reading: un solo Espíritu
  alternative_spanish_readings:
  - un espíritu
  rationale: El contexto inmediato de 1 Corintios 12 favorece la referencia al Espíritu Santo, pero se evita borrar la posibilidad interpretativa menos específica que la lengua permite.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: Traducción de δοῦλοι en contraste social
  english_pob_reading: slaves
  chosen_spanish_reading: esclavos
  alternative_spanish_readings:
  - siervos
  rationale: La oposición con «libres» indica un estatus social y legal de dependencia; por eso «esclavos» es la traducción más fiel y no suaviza la fuerza del término.
  doctrine_reference: 'DOCTRINE.md Contested terms table: δοῦλος'
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del audit trail, que favorece una formulación pasiva natural para ἐποτίσθημεν y mantiene «in one Spirit» como decisión principal. En español se ajustó a «se nos dio a beber» para reflejar con claridad la pasiva sin perder naturalidad.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu» con mayúscula en las dos apariciones para señalar la lectura preferente del Espíritu Santo en el contexto.
  - Se evitó «SEÑOR» o sustituciones devocionales no presentes en el texto griego.
  - «Esclavos» se conservó por la fuerza social del contraste con «libres».
  - La frase «un solo Espíritu» se repite de forma consistente para reflejar la estructura paralela del versículo.
