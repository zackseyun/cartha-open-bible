review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura principal del griego y mantiene decisiones importantes del POB: «un solo Espíritu», «judíos o griegos», y especialmente «esclavos o libres» para δοῦλοι / ἐλεύθεροι. También conserva correctamente la ambigüedad de ἐν con nota. Sin embargo, no preserva con suficiente fidelidad dos rasgos del original: (1) εἰς ἓν σῶμα expresa incorporación «a/hacia/into un solo cuerpo», no meramente ubicación «en un solo cuerpo»; y (2) el borrador omite el énfasis explicativo de γὰρ con una formulación menos completa que la auditada, y además reutiliza el marcador [a] para dos lugares distintos sin nota correspondiente para la segunda cláusula alternativa del inglés.'
  spanish_quality_summary: 'El español es legible y digno, pero presenta dos problemas de calidad editorial: la repetición impropia del marcador [a] para dos funciones distintas, y la secuencia «en un solo Espíritu en un solo cuerpo», que suena trabada y además debilita la distinción entre esfera/instrumento y resultado de incorporación. «Fuimos bautizados ... para formar un solo cuerpo» suena más natural y expresa mejor el sentido de εἰς. También conviene mantener el paralelismo con «todos nosotros ... todos».'
  glossary_alignment: 'Alineación generalmente buena con la terminología del proyecto: πνεῦμα -> «Espíritu» por contexto; δοῦλοι -> «esclavos» correctamente; Ἕλληνες -> «griegos» correctamente. La principal desalineación no es terminológica sino semántico-sintáctica en εἰς ἓν σῶμα, donde «en un solo cuerpo» no refleja bien el valor de incorporación. Las notas deben ajustarse para preservar también la alternativa documentada de la segunda cláusula («se nos dio un solo Espíritu para beber»).'
  issues:
  - severity: high
    issue: «en un solo cuerpo» no refleja adecuadamente εἰς ἓν σῶμα
    rationale: εἰς marca movimiento/resultado de incorporación. En español, «en un solo cuerpo» suena locativo y borra parte del sentido de entrar a/formar un solo cuerpo. «Para formar un solo cuerpo» o «en un solo cuerpo» no son equivalentes aquí; la primera preserva mejor el resultado incorporativo sin dureza.
  - severity: high
    issue: Reutilización incorrecta del marcador de nota [a]
    rationale: La instrucción exige marcadores únicos por nota dentro del registro. El texto ancla [a] en «Espíritu» y otra vez en «se nos dio[a]», pero solo hay una nota a. Eso es un error formal que debe corregirse.
  - severity: medium
    issue: Falta la alternativa documentada para la segunda cláusula
    rationale: El inglés POB preserva la alternativa «we all were given one Spirit to drink». El borrador español no la refleja en nota, aunque la redacción española introduce precisamente un punto donde esa alternativa puede expresarse claramente.
  - severity: low
    issue: «Porque» por sí solo atenúa el matiz de καὶ γὰρ
    rationale: No es un error grave, pero «Porque de hecho» o similar preserva mejor la fuerza explicativa y enfática documentada en el audit trail.
