  to: 'Por tanto, les hago saber que nadie que habla por el Espíritu de Dios dice: «Jesús está bajo maldición»[a], y nadie puede decir: «Jesús es Señor»[b], sino por el Espíritu Santo.'
  rationale: 'Se revisa únicamente la primera cita directa para alinear el español con la decisión principal documentada por la POB: una formulación indicativa no técnica para Ἀνάθεμα Ἰησοῦς en el texto principal, y la alternativa exclamativa/volitiva en nota. «Jesús está bajo maldición» preserva el sentido de condena sin recurrir al tecnicismo «anatema» ni introducir como principal una maldición optativa.'
