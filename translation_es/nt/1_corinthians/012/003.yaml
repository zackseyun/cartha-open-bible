review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego y sigue de cerca la auditoría inglesa: inferencia inicial, doble negación universal, valor instrumental de ἐν πνεύματι, y sentido confesional de «Κύριος Ἰησοῦς». Sin embargo, en Ἀνάθεμα Ἰησοῦς el inglés POB escogió como principal una formulación indicativa («Jesus is accursed»), dejando la volitiva/exclamativa en nota. El español invierte esa decisión al poner «Jesús sea maldito» en el texto principal. Dado el rastro auditado, conviene alinear el texto principal con una formulación indicativa en español y conservar la alternativa volitiva en nota.'
  spanish_quality_summary: El español es claro, natural y digno. «Por tanto», «les hago saber», «por el Espíritu de Dios» y «Jesús es Señor» funcionan bien. El único ajuste necesario es lexical/estilístico en la primera cita directa, donde «Jesús sea maldito» suena más imprecatorio que la opción principal documentada por la POB. «Jesús es maldito» suena menos natural en español; «Jesús es anatema» sería demasiado técnico. La mejor solución idiomática y fiel es «Jesús está bajo maldición», con nota para «Jesús sea maldito».
  glossary_alignment: 'La terminología principal está bien alineada: πνεῦμα θεοῦ → «Espíritu de Dios»; πνεῦμα ἅγιον → «Espíritu Santo»; κύριος en la confesión → «Señor». No hay conflicto con Yahvé/Mesías/esclavo u otras políticas globales. El punto a corregir es la priorización de la alternativa de ἀνάθεμα: mantener en el texto una expresión no técnica pero indicativa, y relegar la formulación volitiva a nota, como hace la auditoría inglesa.'
  issues:
  - severity: medium
    issue: La cláusula principal para Ἀνάθεμα Ἰησοῦς no sigue la decisión principal auditada por la POB
    rationale: El inglés POB eligió «Jesus is accursed» como texto base y dejó «Jesus be accursed» en nota. El borrador español hace lo contrario con «Jesús sea maldito» en el texto principal. Para conservar la racionalidad documentada, el español debería usar una formulación indicativa principal y dejar la exclamativa/volitiva como alternativa.
  - severity: low
    issue: La nota a podría ajustarse para reflejar mejor la alternativa principal/secundaria
    rationale: Si el texto principal pasa a una formulación indicativa, la nota debe preservar la alternativa «Jesús sea maldito» o «Jesús sea anatema» como lectura posible de la exclamación griega, en lugar de presentar el texto principal actual como si fuera la mejor opción base.
