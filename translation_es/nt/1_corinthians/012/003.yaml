translation:
  language: es
  text: 'Por tanto, les hago saber que nadie que habla por el Espíritu de Dios dice: «Jesús está bajo maldición»[a], y nadie puede decir: «Jesús es Señor»[b], sino por el Espíritu Santo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «Jesús sea maldito»; la exclamación griega Ἀνάθεμα Ἰησοῦς también puede expresarse como una maldición.
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «Señor Jesús»; en contexto, el sentido es confesional: «Jesús es Señor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διό
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: Expresa la inferencia lógica del contexto inmediato sin cargarla de más; en español suena natural y mantiene la relación argumentativa.
- source_word: γνωρίζω ὑμῖν
  english_pob_choice: I make known to you
  chosen_spanish: les hago saber
  alternatives_spanish:
  - les informo
  - quiero hacerles saber
  lexicon: BDAG
  rationale: Conserva el sentido causativo de «dar a conocer» de modo idiomático para español bíblico actual, sin añadir matiz volitivo que no está explícito.
- source_word: οὐδεὶς
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguno
  lexicon: BDAG
  rationale: Equivalente directo y natural para la negación universal.
- source_word: ἐν πνεύματι θεοῦ
  english_pob_choice: by the Spirit of God
  chosen_spanish: por el Espíritu de Dios
  alternatives_spanish:
  - en el Espíritu de Dios
  - por el Espíritu que viene de Dios
  lexicon: BDAG
  rationale: «Por» comunica bien la función instrumental/agentiva que el inglés POB entendió en el contexto; no se reduce a localización espacial.
- source_word: λαλῶν
  english_pob_choice: speaking
  chosen_spanish: habla
  alternatives_spanish:
  - está hablando
  - hablando
  lexicon: BDAG
  rationale: El participio describe a la persona en el acto de hablar; en español, «habla» en cláusula relativa resulta claro y fluido.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - declara
  - afirma
  lexicon: BDAG
  rationale: Verbo básico y transparente para introducir la cita directa.
- source_word: Ἀνάθεμα Ἰησοῦς
  english_pob_choice: Jesus is accursed
  chosen_spanish: Jesús sea maldito
  alternatives_spanish:
  - Jesús es anatema
  - Jesús sea anatema
  - Jesús sea maldito de Dios
  lexicon: BDAG
  rationale: La exclamación griega es breve y no lleva copula explícita; en español, el subjuntivo imperativo/exclamativo «sea maldito» preserva la fuerza maldiciente. Se evita «anatema» como término técnico eclesiástico porque oscurece la carga verbal inmediata que la POB documenta.
- source_word: δύναται εἰπεῖν
  english_pob_choice: is able to say
  chosen_spanish: puede decir
  alternatives_spanish:
  - es capaz de decir
  - puede afirmar
  lexicon: BDAG
  rationale: «Puede decir» es natural en español y conserva la posibilidad/capacidad expresa del griego.
- source_word: Κύριος Ἰησοῦς
  english_pob_choice: Jesus is Lord
  chosen_spanish: Jesús es Señor
  alternatives_spanish:
  - El Señor es Jesús
  - Señor es Jesús
  lexicon: BDAG
  rationale: La frase funciona aquí como confesión; en español, la copulativa explícita comunica el sentido confesional que el inglés POB también resolvió, manteniendo «Señor» como equivalente de κύριος.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - a menos que
  lexicon: BDAG
  rationale: Después de una negación previa, «sino» es la forma más natural para marcar la excepción exclusiva.
- source_word: ἐν πνεύματι ἁγίῳ
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - en el Espíritu Santo
  lexicon: BDAG
  rationale: Mantiene el mismo valor instrumental/agentivo que arriba y conserva la referencia personal divina del Espíritu Santo.
theological_decisions:
- issue: Renderizado de Κύριος Ἰησοῦς en una confesión cristológica
  english_pob_reading: Jesus is Lord
  chosen_spanish_reading: Jesús es Señor
  alternative_spanish_readings:
  - Señor es Jesús
  - Jesús es el Señor
  rationale: La confesión requiere una formulación predicativa en español; «Jesús es Señor» preserva la fuerza del griego y evita convertir la frase en mera invocación o título suelto. Se conserva «Señor» como término confessional estándar del pasaje.
  doctrine_reference: 'DOCTRINE.md Contested terms: κύριος → Lord'
- issue: Relación entre la confesión de Jesús y la agencia del Espíritu Santo
  english_pob_reading: Retained as stated without narrowing it to mere verbal utterance or expanding it to a full doctrine of regeneration
  chosen_spanish_reading: Mantenida tal como está, sin reducirla a mera formulación externa ni ampliarla a una doctrina sistemática de regeneración
  alternative_spanish_readings:
  - Una confesión solamente externa
  - Una declaración plena de conversión
  rationale: El verso vincula la confesión verdadera con la acción del Espíritu, pero el texto no desarrolla por sí solo toda la teología de la regeneración; la traducción conserva esa tensión.
  doctrine_reference: DOCTRINE.md Affirmations; Preserve theological tension rather than resolve it
translation_notes:
  revision_awareness: El texto inglés auditado permanece sin cambios en la última revisión; no hubo revisiones aplicadas al versículo. La versión española sigue ese estado estable y toma las decisiones léxicas y confesionales ya respaldadas por el expediente inglés.
  spanish_consistency_notes:
  - Se mantiene «Espíritu de Dios» y «Espíritu Santo» con mayúscula cuando refiere al Espíritu divino personal.
  - Se usa «Señor» para κύριος, en continuidad con la decisión auditada del inglés POB y la terminología cristológica estándar del pasaje.
  - Se evita traducir Ἀνάθεμα como tecnicismo eclesiástico; se prioriza la fuerza verbal de la maldición que el griego permite.
  - La puntuación y las comillas siguen el uso español, conservando los dos dichos directos del versículo.
