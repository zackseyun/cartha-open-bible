  glossary_alignment: No hay conflictos con la terminología base del proyecto. Los términos clave aquí («cuerpo», «honor», «decoro») están bien resueltos y no afectan los glosarios teológicos principales. La decisión de mantener lenguaje corporal concreto concuerda con la filosofía documentada.
