translation:
  language: es
  text: y aquellas partes del cuerpo que nos parecen menos honrosas[a], a estas les damos mayor honor, y nuestras partes menos presentables tienen mayor decoro[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «menos honorables» o «más deshonrosas».
    reason: lexical_alternative
  - marker: b
    text: O «mayor presentabilidad» o «mayor comedimiento».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἃ δοκοῦμεν
  english_pob_choice: those ... that we think
  chosen_spanish: aquellas partes ... que nos parecen
  alternatives_spanish:
  - aquellas partes ... que consideramos
  - aquellas partes ... que juzgamos
  lexicon: BDAG
  rationale: δοκέω expresa percepción o juicio humano, no una realidad objetiva. En español, «nos parecen» conserva ese matiz sin volver la frase rígida ni añadir explicaciones ajenas al texto.
- source_word: ἀτιμότερα
  english_pob_choice: less honorable
  chosen_spanish: menos honrosas
  alternatives_spanish:
  - menos honorables
  - más deshonrosas
  lexicon: BDAG
  rationale: El comparativo de ἄτιμος pide una forma comparativa suave y relacional. «Menos honrosas» mantiene el contraste con τιμή/honor y evita endurecer el sentido hacia «deshonrosas», que sería más fuerte de lo que el contexto exige.
- source_word: τοῦ σώματος
  english_pob_choice: of the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - del cuerpo entero
  - del organismo
  lexicon: BDAG
  rationale: Se conserva el genitivo simple con el sustantivo central del pasaje. «Del cuerpo» es natural en español y preserva la metáfora corporal que sostiene la argumentación.
- source_word: τούτοις
  english_pob_choice: on these
  chosen_spanish: a estas
  alternatives_spanish:
  - sobre estas
  - en estas
  lexicon: BDAG
  rationale: Con περιτίθεμεν, la imagen es la de colocar o asignar honor a ciertos miembros. En español, «a estas» funciona bien con «dar» y mantiene el gesto de conferir honor sin forzar una preposición corporal literal poco natural.
- source_word: τιμὴν περισσοτέραν
  english_pob_choice: greater honor
  chosen_spanish: mayor honor
  alternatives_spanish:
  - honor más grande
  - honor abundante
  lexicon: BDAG
  rationale: τιμή es «honor» y el comparativo περισσοτέραν requiere «mayor» o equivalente. «Mayor honor» es idiomático y fiel a la comparación.
- source_word: περιτίθεμεν
  english_pob_choice: we bestow
  chosen_spanish: les damos
  alternatives_spanish:
  - les otorgamos
  - les conferimos
  lexicon: BDAG
  rationale: Aunque el verbo puede sugerir «poner sobre», en este contexto la acción se entiende como asignar o conceder honor. «Les damos» es una solución natural en español que preserva la idea de conferir honor sin introducir una metáfora extraña.
- source_word: τὰ ἀσχήμονα ἡμῶν
  english_pob_choice: our unpresentable parts
  chosen_spanish: nuestras partes menos presentables
  alternatives_spanish:
  - nuestras partes indecorosas
  - nuestras partes no aptas para ser mostradas
  lexicon: BDAG
  rationale: ἀσχήμων apunta a lo que no conviene mostrar públicamente o no es estéticamente/propiamente presentable. «Menos presentables» sigue de cerca el matiz del inglés POB y evita cargarlo innecesariamente con indecencia moral.
- source_word: εὐσχημοσύνην
  english_pob_choice: greater decorum
  chosen_spanish: mayor decoro
  alternatives_spanish:
  - mayor presentabilidad
  - mayor comedimiento
  - mayor decencia
  lexicon: BDAG
  rationale: El sustantivo designa decoro, buena forma o correcta presentación. «Decoro» capta el campo semántico con naturalidad en español y refleja la revisión inglesa de «propriety» a «decorum».
- source_word: ἔχει
  english_pob_choice: have
  chosen_spanish: tienen
  alternatives_spanish:
  - poseen
  - muestran
  lexicon: BDAG
  rationale: Con sujeto neutro plural, el español requiere concordancia plural. «Tienen» conserva el sentido de posesión/estado sin añadir interpretación.
theological_decisions:
- issue: Imagen corporal concreta y aplicación eclesial
  english_pob_reading: Retain the concrete body-part language without softening it into a purely abstract statement about church members.
  chosen_spanish_reading: Mantener el lenguaje concreto de las partes del cuerpo sin convertirlo en una paráfrasis abstracta sobre miembros de la iglesia.
  alternative_spanish_readings:
  - Parafrasear como una referencia general a los miembros menos visibles de la comunidad
  - Espiritualizar la imagen para evitar la referencia corporal literal
  rationale: El argumento paulino depende de la analogía entre el cuerpo físico y el cuerpo de Cristo. La traducción conserva la imagen corporal para que la aplicación teológica surja del texto y no de una explicación añadida.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La versión inglesa revisada sustituyó «propriety» por «decorum» para εὐσχημοσύνην. El español refleja esa revisión con «decoro», manteniendo el resto del versículo alineado con la última lectura auditada y con la metáfora corporal intacta.
  spanish_consistency_notes:
  - Se usó «honor» como término base para τιμή, en continuidad con la terminología POB y con el contraste honor/vergüenza del pasaje.
  - Se evitó «siervo», «gloria» o «decencia» como sustitutos gratuitos, porque el contexto lexical exige honor y decoro.
  - Se mantuvo la pluralidad del sujeto neutro griego con verbos plurales en español.
  - Se preservó la distinción entre «menos presentables» y «mayor decoro» para no aplanar el paralelismo del verso.
