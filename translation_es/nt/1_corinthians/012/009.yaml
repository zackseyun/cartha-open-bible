translation:
  language: es
  text: a otro[a], fe por el mismo Espíritu; a otro, dones de sanidades por un mismo Espíritu[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'fidelidad' o 'confianza' para πίστις.
    reason: lexical_alternative
  - marker: b
    text: Literalmente, 'dones de sanidades', con ambos sustantivos en plural.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑτέρῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro diferente
  - a un distinto
  lexicon: BDAG
  rationale: El dativo mantiene el patrón distributivo de la lista de dones. 'A otro' es natural en español y conserva la repetición de la distribución sin forzar una distinción rígida entre ἕτερος y ἄλλος que el español no expresa con claridad en este contexto.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: En este contexto de dones espirituales, 'fe' es la equivalencia más directa y legible. Se preservan 'fidelidad' y 'confianza' como alternativas porque πίστις puede abarcar esos matices, pero el texto no exige desplazar el sentido principal de 'fe'.
- source_word: ἐν τῷ αὐτῷ πνεύματι
  english_pob_choice: by the same Spirit
  chosen_spanish: por el mismo Espíritu
  alternatives_spanish:
  - en el mismo Espíritu
  lexicon: BDAG
  rationale: El ἐν puede ser instrumental en esta fórmula repetida. 'Por el mismo Espíritu' suena natural en español y comunica bien la agencia o fuente de los dones, manteniendo la referencia al Espíritu Santo.
- source_word: ἄλλῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - a otro más
  - a un otro
  lexicon: BDAG
  rationale: Continúa la distribución de los dones. En español, tanto ἑτέρῳ como ἄλλῳ se traducen normalmente como 'a otro' en este pasaje, sin intentar marcar una diferencia léxica que el idioma no sostiene de forma idiomática.
- source_word: χαρίσματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - gracias
  lexicon: BDAG
  rationale: En la lista de carismas, 'dones' es la forma más natural y fiel al campo semántico de χάρισμα. 'Gratos/regalados' sería más explicativo de la etimología, pero menos adecuado para el registro bíblico aquí.
- source_word: ἰαμάτων
  english_pob_choice: of healings
  chosen_spanish: de sanidades
  alternatives_spanish:
  - de curaciones
  - de sanación
  lexicon: BDAG
  rationale: Se conserva el plural griego con 'sanidades', como en el audit trail inglés con 'healings'. 'Curaciones' y 'sanación' son posibles, pero 'sanidades' refleja mejor el paralelismo formal y el plural del original en un registro bíblico comprensible.
- source_word: ἐν τῷ ἑνὶ πνεύματι
  english_pob_choice: by the one Spirit
  chosen_spanish: por el único Espíritu
  alternatives_spanish:
  - por el uno Espíritu
  - en el único Espíritu
  lexicon: BDAG
  rationale: Se mantiene el valor instrumental y la insistencia en la unidad del Espíritu. 'Único' traduce bien ἑνί en un castellano natural, y diferencia el segundo miembro del primero sin perder el énfasis en que es el mismo donador.
theological_decisions:
- issue: Referencia de πνεύματι
  english_pob_reading: Spirit (Holy Spirit)
  chosen_spanish_reading: Espíritu (el Espíritu Santo, por el contexto)
  alternative_spanish_readings:
  - espíritu
  rationale: En 1 Corintios 12, el contexto identifica claramente al Espíritu Santo como dador de los dones. Se capitaliza 'Espíritu' para señalar ese referente sin añadir contenido doctrinal extra al texto.
  doctrine_reference: Contexto inmediato de 1 Corintios 12:4-11; preservación del referente pneumatológico
- issue: Pluralidad de χαρίσματα ἰαμάτων
  english_pob_reading: gifts of healings
  chosen_spanish_reading: dones de sanidades
  alternative_spanish_readings:
  - don de sanidad
  - dones de curación
  rationale: Se conserva la pluralidad del griego, como en el texto inglés auditado. Esto evita suavizar la forma del original en un singular más idiomático que perdería parte de la tensión textual.
  doctrine_reference: Decisión lexical guiada por el plural griego; no implica una doctrina distinta sobre los dones
translation_notes:
  revision_awareness: 'Se corrigió la validación previa asegurando que cada marcador de nota aparezca en el texto español exactamente donde corresponde: [a] junto a ''fe'' y [b] junto a ''Espíritu''. No se añadieron notas sin ancla en el texto.'
  spanish_consistency_notes:
  - Se mantuvo el patrón distributivo 'a otro... a otro...' para reflejar la repetición del griego.
  - Se preservó el plural de ἰαμάτων mediante 'sanidades' y se explicó en nota.
  - Se usó 'Espíritu' con mayúscula por el referente contextual al Espíritu Santo.
  - El registro es bíblico y moderno, evitando calcos innecesarios pero sin paraphrasear más allá del original.
