revisions:
- from: Y hay diversas manifestaciones de obras[a], pero el mismo Dios es el que produce todas las cosas[b] en todos[c].
  to: Y hay variedades de obras[a], pero el mismo Dios obra todas las cosas en todos[b].
  rationale: Se reemplaza «diversas manifestaciones» por «variedades» para representar con más fidelidad διαιρέσεις sin añadir una noción ajena al texto principal. Se cambia «produce» a «obra» para conservar mejor la relación léxica entre ἐνεργημάτων y ὁ ἐνεργῶν, en línea con la rationale auditada. Se mantiene «todas las cosas en todos» por su fidelidad al griego y a la decisión inglesa revisada, y se simplifican las notas a las ambigüedades realmente relevantes.
