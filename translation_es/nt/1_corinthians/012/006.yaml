  glossary_alignment: No hay conflicto con la terminología principal del proyecto. La mejora clave es alinear mejor la pareja ἐνεργημάτων / ὁ ἐνεργῶν con una solución española coherente como «obras ... obra», en vez de «obras ... produce».
