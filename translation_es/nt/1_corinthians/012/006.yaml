translation:
  language: es
  text: Y hay variedades de obras[a], pero el mismo Dios obra todas las cosas en todos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «diversidades de obras» o «variedades de operaciones». El griego expresa diferencias o clases distintas de acciones eficaces, y esta redacción procura conservar también el vínculo con «obra» más adelante en el versículo.
    reason: lexical_alternative
  - marker: b
    text: Más literalmente, «en todos». El griego no explicita el sustantivo subentendido; el contexto sugiere a los miembros de la comunidad, pero el texto no lo dice de forma explícita.
    reason: lexical_alternative
lexical_decisions:
- source_word: διαιρέσεις
  english_pob_choice: varieties
  chosen_spanish: diversas manifestaciones
  alternatives_spanish:
  - variedades
  - diversidades
  - distinciones
  lexicon: BDAG
  rationale: En este contexto Pablo habla de diferencias dentro de una misma obra del Espíritu; «diversas manifestaciones» conserva la idea de distintos modos o expresiones sin sugerir división conflictiva. «Variedades» también sería posible, pero en español puede sonar algo más abstracto o menos natural en este sintagma.
- source_word: ἐνεργημάτων
  english_pob_choice: workings
  chosen_spanish: obras
  alternatives_spanish:
  - operaciones
  - efectos
  - actividades
  lexicon: BDAG
  rationale: El sustantivo apunta a resultados o manifestaciones de una acción eficaz. «Obras» mantiene una referencia concreta y natural en español, y puede enlazarse con el verbo siguiente «produce» para conservar la relación conceptual con ἐνεργῶν. «Operaciones» sería más técnico y menos idiomático aquí.
- source_word: ὁ δὲ αὐτὸς θεός
  english_pob_choice: but the same God
  chosen_spanish: pero el mismo Dios
  alternatives_spanish:
  - y el mismo Dios
  - sin embargo, el mismo Dios
  lexicon: BDAG
  rationale: '«δὲ» introduce un leve contraste dentro de la serie: hay diversidades, pero la fuente permanece una. «Pero» expresa bien ese matiz en español. «El mismo Dios» conserva el valor enfático de αὐτός como identidad continua.'
- source_word: ὁ ἐνεργῶν
  english_pob_choice: who works
  chosen_spanish: es el que produce
  alternatives_spanish:
  - es quien obra
  - obra
  - es el que actúa
  lexicon: BDAG
  rationale: El participio presente pide una forma relativa en español. «Produce» comunica la acción eficaz de Dios y mantiene la conexión léxica con ἐνεργήματα; «obra» también es posible, pero puede sonar más tradicional y menos precisa para este contexto de manifestaciones.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo lo demás
  - todas las cosas estas
  lexicon: BDAG
  rationale: «Todas las cosas» reproduce la amplitud de la expresión griega y conserva un registro elevado y claro. No se restringe a los dones, aunque el contexto inmediato trate de ellos.
- source_word: ἐν πᾶσιν
  english_pob_choice: in all
  chosen_spanish: en todos
  alternatives_spanish:
  - entre todos
  - en todos los miembros
  - en cada uno
  lexicon: BDAG
  rationale: El griego no explicita el sustantivo que se sobreentiende. «En todos» mantiene la amplitud y deja abierta la referencia contextual a las personas en la comunidad. Se evita añadir «personas» en el texto principal, aunque el sentido apunta a los miembros entre quienes Dios actúa.
theological_decisions:
- issue: Alcance de τὰ πάντα ἐν πᾶσιν
  english_pob_reading: Rendered broadly as 'who works all things in all people' while keeping the immediate context of spiritual manifestations in view.
  chosen_spanish_reading: «el que produce todas las cosas en todos» mantiene la amplitud del griego sin restringirlo artificialmente ni explicitar «personas» en el texto principal.
  alternative_spanish_readings:
  - «el que produce todo en todos»
  - «el que produce todas estas cosas en todos los miembros»
  - «el que produce todas las cosas en cada uno»
  rationale: 'En 1 Corintios 12:6 el contexto inmediato son los diversos dones y manifestaciones, pero la frase griega es más amplia que una simple lista de carismas. La traducción conserva esa tensión: «todas las cosas» mantiene la amplitud, y «en todos» deja abierta la referencia contextual sin introducir una precisión que el texto no enuncia.'
  doctrine_reference: Preservar la tensión teológica y contextual sin resolverla de antemano.
translation_notes:
  revision_awareness: El inglés auditado pasó de una formulación con 'in all people' a otra más cercana al griego, 'in all'. La presente versión española sigue esa última decisión al no añadir 'personas' en el cuerpo principal, pero conserva en nota la posibilidad contextual de entenderlo como referencia a los miembros de la comunidad.
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεός conforme al estándar del proyecto.
  - Se evitó «SEÑOR» porque el texto griego aquí no usa κύριος.
  - Se prefirió un verbo dinámico («produce») para ἐνεργῶν a fin de conservar el vínculo con ἐνεργημάτων.
  - «En todos» refleja la amplitud del dativo plural πᾶσιν sin sobreespecificación.
