  glossary_alignment: Alinea bien con la política del proyecto al usar 'Mesías' para Χριστός como título y 'ustedes' como segunda persona plural neutral. No hay conflicto con la terminología principal. La revisión propuesta mantiene 'Mesías' y mejora la naturalidad con 'del Mesías' sin abandonar la decisión teológica documentada.
