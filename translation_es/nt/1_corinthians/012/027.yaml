translation:
  language: es
  text: Ahora ustedes son el cuerpo del Mesías[a], y miembros individualmente[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'Cristo'. Χριστός puede traducirse como título mesiánico o como forma tradicionalizada; aquí se ha optado por 'Mesías'.
    reason: alternative_reading
  - marker: b
    text: 'Literalmente, ''miembros de una parte'' o ''miembros en particular''; el sentido es distributivo: cada uno pertenece al cuerpo como miembro dentro del todo.'
    reason: lexical_alternative
  - marker: c
    text: O 'y miembros de él individualmente'.
    reason: alternative_reading
lexical_decisions:
- source_word: Ὑμεῖς
  english_pob_choice: you
  chosen_spanish: ustedes
  alternatives_spanish:
  - vosotros
  - ustedes mismos
  lexicon: BDAG
  rationale: El pronombre plural de segunda persona en español moderno y neutral es 'ustedes'. Conserva el énfasis del sujeto explícito sin volverlo artificial.
- source_word: δέ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: '''δέ'' introduce una transición discursiva desde la metáfora previa hacia la aplicación directa. ''Ahora'' expresa mejor ese giro en español que ''Pero''.'
- source_word: σῶμα Χριστοῦ
  english_pob_choice: the body of Messiah
  chosen_spanish: el cuerpo de Mesías
  alternatives_spanish:
  - el cuerpo de Cristo
  - el cuerpo del Mesías
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como 'Mesías', siguiendo el criterio del proyecto. La construcción 'cuerpo de Mesías' es menos natural que 'cuerpo del Mesías', pero evita introducir artículo donde el griego no lo marca y mantiene la identificación titular.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título mesiánico. Se mantiene 'Mesías' por la pauta del proyecto, en vez de la forma litúrgica tradicional 'Cristo'.
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - miembros del cuerpo
  lexicon: BDAG
  rationale: En la metáfora del cuerpo, μέλη designa las partes constitutivas del cuerpo y, por extensión, a los integrantes de la comunidad. 'Miembros' conserva ambas capas sin sobreexplicar.
- source_word: ἐκ μέρους
  english_pob_choice: individually
  chosen_spanish: individualmente
  alternatives_spanish:
  - en particular
  - cada uno por su parte
  - como miembros individuales
  lexicon: BDAG
  rationale: 'La frase es distributiva: cada creyente es miembro dentro del todo. ''Individualmente'' comunica mejor esa distribución en español moderno que ''en parte'', que podría sugerir incompletitud.'
theological_decisions:
- issue: Título Χριστός en contexto eclesiológico
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El griego usa Χριστοῦ como título, no como simple componente nominal. Mantener 'Mesías' preserva la carga semántica del término y sigue la política del proyecto para títulos cristológicos.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
- issue: Sentido de ἐκ μέρους en la cláusula final
  english_pob_reading: 'distributive: individually members of it'
  chosen_spanish_reading: 'distributivo: miembros individualmente'
  alternative_spanish_readings:
  - miembros en parte
  - miembros en particular
  rationale: Pablo afirma simultáneamente la unidad del cuerpo y la diversidad de sus miembros. 'Individualmente' mantiene la tensión entre lo colectivo y lo particular sin reducir la frase a 'partes' incompletas.
  doctrine_reference: 'DOCTRINE.md: preservar la tensión teológica en vez de resolverla'
translation_notes:
  revision_awareness: El audit trail en inglés muestra una oscilación reciente entre 'Messiah' y 'Christ', con corrección final a 'Messiah'. La versión española sigue esa decisión final del proyecto y no adopta la forma tradicional 'Cristo' en el texto principal. También respeta el matiz distributivo de ἐκ μέρους con una solución natural en español.
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en concordancia con el estándar del proyecto.
  - Se evita suplir un posesivo no explícito en el griego; la relación con 'el cuerpo' queda dada por el contexto.
  - '''Individualmente'' conserva el valor distributivo sin convertir la frase en una explicación interpretativa.'
  - El estilo es bíblico-formal, pero con español actual y legible.
