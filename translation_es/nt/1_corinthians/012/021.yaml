  - severity: low
    issue: La nota al pie está anclada al cierre de la cita en vez de al pronombre plural
    rationale: El contenido de la nota explica específicamente «ustedes» como plural griego; anclarla directamente allí mejora la claridad editorial sin cambiar el sentido.
