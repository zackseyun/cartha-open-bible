translation:
  language: es
  text: 'Pero el ojo no puede decir a la mano: «No tengo necesidad de ti»; o de nuevo la cabeza a los pies: «No tengo necesidad de ustedes[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: El griego de la segunda cláusula usa un plural («ustedes»), dirigido a los pies.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύναται
  english_pob_choice: cannot
  chosen_spanish: no puede
  alternatives_spanish:
  - no es capaz de
  - no le es posible
  lexicon: BDAG
  rationale: Combina la negación con δύναμαι en un español natural, conservando la idea de incapacidad y no solo de impropiedad.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca contraste con el argumento anterior sobre la interdependencia del cuerpo; «Pero» transmite bien el valor adversativo.
- source_word: ὁ ὀφθαλμός
  english_pob_choice: the eye
  chosen_spanish: el ojo
  alternatives_spanish:
  - la vista
  lexicon: BDAG
  rationale: Se mantiene la imagen corporal literal, necesaria para conservar la metáfora paulina.
- source_word: εἰπεῖν
  english_pob_choice: say
  chosen_spanish: decir
  alternatives_spanish:
  - hablar
  - afirmar
  lexicon: BDAG
  rationale: Es la equivalencia natural e idiomática del infinitivo en esta construcción indirecta.
- source_word: τῇ χειρί
  english_pob_choice: to the hand
  chosen_spanish: a la mano
  alternatives_spanish:
  - para la mano
  lexicon: BDAG
  rationale: La dativo de destinatario se expresa de forma directa en español con «a la mano», preservando la metáfora corporal.
- source_word: Χρείαν σου οὐκ ἔχω
  english_pob_choice: I have no need of you
  chosen_spanish: No tengo necesidad de ti
  alternatives_spanish:
  - No te necesito
  - No tengo necesidad tuya
  lexicon: BDAG
  rationale: Se conserva el sustantivo χρεία con «necesidad» para no aplanar el matiz léxico a un verbo puramente funcional. «De ti» reproduce el sentido del pronombre en genitivo.
- source_word: ἢ πάλιν
  english_pob_choice: or again
  chosen_spanish: ni tampoco
  alternatives_spanish:
  - o de nuevo
  - o bien otra vez
  lexicon: BDAG
  rationale: Aquí la segunda cláusula introduce un ejemplo paralelo; en español, «ni tampoco» comunica con naturalidad la continuidad negativa entre las dos escenas sin perder el valor aditivo de πάλιν.
- source_word: ἡ κεφαλή
  english_pob_choice: the head
  chosen_spanish: la cabeza
  alternatives_spanish:
  - el jefe
  lexicon: BDAG
  rationale: Se conserva la imagen corporal literal y no se traslada a un uso figurado ajeno al contexto.
- source_word: τοῖς ποσίν
  english_pob_choice: to the feet
  chosen_spanish: a los pies
  alternatives_spanish:
  - para los pies
  lexicon: BDAG
  rationale: El plural se mantiene porque es parte de la imagen; el dativo se vierte naturalmente con «a».
- source_word: Χρείαν ὑμῶν οὐκ ἔχω
  english_pob_choice: I have no need of you
  chosen_spanish: No tengo necesidad de ustedes
  alternatives_spanish:
  - No los necesito
  - No tengo necesidad de vosotros
  lexicon: BDAG
  rationale: Se refleja el plural griego ὑμῶν, que el audit trail inglés señaló con nota. En español, «ustedes» hace explícito ese plural sin introducir una lectura singular.
theological_decisions:
- issue: Metáfora del cuerpo y la interdependencia eclesial
  english_pob_reading: Preserve the literal body-part imagery without interpretive expansion
  chosen_spanish_reading: Conservar la imaginería corporal literal sin explicación interpretativa en el texto principal
  alternative_spanish_readings:
  - Explicitar que se trata de los miembros de la iglesia
  - Añadir una paráfrasis explicativa sobre la comunidad
  rationale: La fuerza teológica del pasaje depende de la metáfora misma; explicarla dentro del versículo iría más allá de la traducción y diluiría la tensión retórica que Pablo emplea.
  doctrine_reference: 'Translation philosophy: preserve source imagery; do not paraphrase beyond what the source text warrants.'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran un acuerdo alto y sin revisiones aplicadas; la versión española conserva la estructura retórica y la diferencia singular/plural señalada en la nota inglesa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «no puede» para οὐ δύναται, acorde con la preferencia del proyecto por una incapacidad real, no meramente una prohibición.
  - Se conserva el lenguaje corporal literal («ojo», «mano», «cabeza», «pies») sin glosas interpretativas.
  - Se refleja el plural griego de ὑμῶν con «ustedes» en la segunda cláusula, siguiendo la nota auditada del inglés.
