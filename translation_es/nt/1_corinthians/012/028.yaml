translation:
  language: es
  text: Y Dios ha puesto en la iglesia, primero apóstoles, segundo profetas, tercero maestros, luego milagros[a], luego dones de sanidades, ayudas, administraciones[b], clases de lenguas[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'obras de poder' para 'milagros'.
    reason: lexical_alternative
  - marker: b
    text: O 'dirección' o 'formas de liderazgo' para 'administraciones'.
    reason: lexical_alternative
  - marker: c
    text: O 'clases de idiomas'. El término griego puede significar 'lenguas' o 'idiomas'; el texto principal preserva la ambigüedad de la formulación de Pablo en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἔθετο
  english_pob_choice: has appointed
  chosen_spanish: ha puesto
  alternatives_spanish:
  - ha nombrado
  - ha designado
  - ha establecido
  lexicon: BDAG
  rationale: τίθημι aquí expresa que Dios dispone o asigna personas y funciones dentro de la iglesia. 'Ha puesto' mantiene la idea de colocación/nombramiento divino con un español natural y sobrio, sin perder la fuerza de la iniciativa de Dios.
- source_word: ἐν τῇ ἐκκλησίᾳ
  english_pob_choice: in the church
  chosen_spanish: en la iglesia
  alternatives_spanish:
  - en la asamblea
  - en la congregación
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία se refiere al pueblo reunido de Dios, y en este contexto de dones y funciones 'iglesia' es la equivalencia más natural y transparente para el lector en español.
- source_word: πρῶτον ... δεύτερον ... τρίτον
  english_pob_choice: first ... second ... third
  chosen_spanish: primero ... segundo ... tercero
  alternatives_spanish:
  - primeramente ... en segundo lugar ... en tercer lugar
  lexicon: BDAG
  rationale: Los acusativos adverbiales ordinales marcan secuencia o rango. 'Primero, segundo, tercero' conserva la estructura del griego sin añadir interpretación sobre si el orden es jerárquico, cronológico o retórico.
- source_word: ἀποστόλους
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - mensajeros
  - enviados
  lexicon: BDAG
  rationale: En esta lista eclesial el término designa el rol apostólico reconocido. 'Apóstoles' preserva el valor técnico del término mejor que equivalentes más genéricos.
- source_word: προφήτας
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - videntes
  lexicon: BDAG
  rationale: Es la traducción estándar y más fiel para quienes hablan con palabra profética. No hay razón contextual para variar el término.
- source_word: διδασκάλους
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - enseñadores
  - doctores
  lexicon: BDAG
  rationale: En español eclesial contemporáneo, 'maestros' comunica bien la función de instrucción y evita la posible resonancia académica demasiado estrecha de 'doctores'.
- source_word: δυνάμεις
  english_pob_choice: miracles
  chosen_spanish: milagros
  alternatives_spanish:
  - obras de poder
  - poderes
  - hechos poderosos
  lexicon: BDAG
  rationale: Aunque literalmente puede sugerir 'poderes', en listas de dones y por el paralelo con sanidades se refiere a obras milagrosas. 'Milagros' expresa el sentido con claridad; la alternativa más literal queda implícita en la base léxica.
- source_word: χαρίσματα ἰαμάτων
  english_pob_choice: gifts of healings
  chosen_spanish: dones de sanidades
  alternatives_spanish:
  - dones de sanación
  - dones de curaciones
  lexicon: BDAG
  rationale: Ambos sustantivos son plurales en griego, y la combinación mantiene la variedad de expresiones del original. 'Dones de sanidades' conserva esa pluralidad y suena suficientemente natural en español eclesial.
- source_word: ἀντιλήμψεις
  english_pob_choice: helps
  chosen_spanish: ayudas
  alternatives_spanish:
  - socorros
  - asistencias
  lexicon: BDAG
  rationale: El término denota asistencia o apoyo práctico. 'Ayudas' es breve, claro y fiel en el contexto de una lista de ministerios o carismas.
- source_word: κυβερνήσεις
  english_pob_choice: administrations
  chosen_spanish: administraciones
  alternatives_spanish:
  - gobiernos
  - dirección
  - formas de liderazgo
  lexicon: BDAG
  rationale: El término evoca la acción de dirigir/steer. 'Administraciones' reproduce el matiz de gobierno u संगठनación sin convertirlo demasiado pronto en un título jerárquico fijo; se preserva así la ambigüedad funcional del griego.
- source_word: γένη γλωσσῶν
  english_pob_choice: kinds of tongues
  chosen_spanish: clases de lenguas
  alternatives_spanish:
  - diversos tipos de lenguas
  - clases de idiomas
  - lenguas
  lexicon: BDAG
  rationale: γένη significa clases o tipos, y γλῶσσαι puede referirse a 'lenguas' o 'tongues'. 'Clases de lenguas' conserva la ambigüedad del original y permite tanto la lectura tradicional de 'lenguas' como la posible referencia a distintos tipos de habla.
theological_decisions:
- issue: Si la secuencia implica rango permanente, orden cronológico o prominencia funcional
  english_pob_reading: 'Render the sequence straightforwardly without interpreting beyond the text: ''first ... second ... third ... then ... then.'''
  chosen_spanish_reading: 'Traducir la secuencia de manera directa: ''primero ... segundo ... tercero ... luego ... luego'', sin especificar más el sentido del orden.'
  alternative_spanish_readings:
  - una jerarquía de autoridad
  - un orden cronológico de aparición
  - un orden retórico de importancia relativa
  rationale: El texto presenta una lista ordenada, pero no explica si el orden es jerárquico, temporal o funcional. La traducción mantiene esa tensión teológica sin resolverla artificialmente.
  doctrine_reference: Preserve theological tension rather than resolve it.
- issue: Sentido de γλῶσσαι en este contexto
  english_pob_reading: Use 'tongues' in the main text.
  chosen_spanish_reading: Usar 'lenguas' en la frase final, con una formulación que no cierre el debate sobre la naturaleza exacta del fenómeno.
  alternative_spanish_readings:
  - lenguas humanas
  - idiomas
  - hablas extáticas
  rationale: En 1 Corintios 12, el fenómeno sigue siendo debatido. 'Lenguas' conserva la ambigüedad bíblica sin imponer una explicación que el texto no explicita.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el último pasaje auditado en inglés y conserva sus decisiones principales: secuencia ordinal sin interpretación añadida, ''milagros'' para δυνάμεις, pluralidad explícita en ''dones de sanidades'', y ambigüedad preservada en γένη γλωσσῶν. No se requirieron revisiones adicionales según el informe más reciente.'
  spanish_consistency_notes:
  - Se usa 'Y Dios' para respetar la apertura coordinada del griego con καί.
  - '''Apóstoles'', ''profetas'' y ''maestros'' mantienen el paralelismo de la lista.'
  - '''Administraciones'' y ''ayudas'' quedan en plural para reflejar la enumeración de carismas/funciones.'
  - La nota de 'clases de lenguas' conserva la alternativa 'idiomas' sin resolver el significado del don.
  - La puntuación sigue la cadencia enumerativa del original y es apta para lectura pública.
