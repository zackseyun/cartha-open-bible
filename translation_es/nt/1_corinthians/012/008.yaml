translation:
  language: es
  text: Porque a uno se le da por el Espíritu un mensaje de sabiduría[a], y a otro un mensaje de conocimiento[b] según el mismo Espíritu[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una palabra de sabiduría» / «una expresión de sabiduría».
    reason: lexical_alternative
  - marker: b
    text: O «una palabra de conocimiento» / «una expresión de conocimiento».
    reason: lexical_alternative
  - marker: c
    text: O «por el mismo Espíritu». El griego usa aquí una preposición distinta de la de «por el Espíritu», subrayando la conformidad con el mismo Espíritu como fuente común.
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: to one
  chosen_spanish: a uno
  alternatives_spanish:
  - a uno de ellos
  - a una persona
  lexicon: BDAG
  rationale: El dativo distributivo se expresa con naturalidad en español como «a uno», conservando el contraste con «a otro» sin forzar una construcción relativa.
- source_word: διὰ τοῦ πνεύματος
  english_pob_choice: through the Spirit
  chosen_spanish: por el Espíritu
  alternatives_spanish:
  - a través del Espíritu
  - mediante el Espíritu
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o agencia. «Por el Espíritu» es una equivalencia natural en español y preserva la idea de mediación sin perder fluidez.
- source_word: πνεύματος / πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  - Espíritu Santo
  lexicon: BDAG
  rationale: En 1 Corintios 12 el referente es el Espíritu Santo que distribuye dones. Se usa mayúscula en español para señalar ese referente contextual, sin añadir más que el contexto exige.
- source_word: δίδοται
  english_pob_choice: is given
  chosen_spanish: le es dada
  alternatives_spanish:
  - es dada
  - le es concedida
  lexicon: BDAG
  rationale: El pasivo presente indica algo que se recibe, no que se genera. «Le es dada» reproduce bien el pasivo y su matiz receptivo en español.
- source_word: λόγος σοφίας
  english_pob_choice: a message of wisdom
  chosen_spanish: una palabra de sabiduría
  alternatives_spanish:
  - un mensaje de sabiduría
  - una expresión de sabiduría
  lexicon: BDAG
  rationale: «λόγος» puede referirse aquí a una palabra, dicho o expresión inspirada. La POB inglesa preserva la alternativa tradicional «word of wisdom»; en español, «palabra de sabiduría» mantiene esa fuerza y la lectura carismática familiar sin estrechar demasiado el sentido.
- source_word: ἄλλῳ
  english_pob_choice: to another
  chosen_spanish: y a otro
  alternatives_spanish:
  - a otro
  - a otra persona
  lexicon: BDAG
  rationale: La repetición distributiva del dativo se mantiene con «y a otro», que suena natural en español y conserva el paralelismo con la primera cláusula.
- source_word: λόγος γνώσεως
  english_pob_choice: a message of knowledge
  chosen_spanish: una palabra de conocimiento
  alternatives_spanish:
  - un mensaje de conocimiento
  - una expresión de conocimiento
  lexicon: BDAG
  rationale: Se conserva la correspondencia con la primera frase. «Palabra de conocimiento» refleja bien el giro lexical y la expresión tradicional sin convertirla en paráfrasis.
- source_word: κατὰ τὸ αὐτὸ πνεῦμα
  english_pob_choice: according to the same Spirit
  chosen_spanish: según el mismo Espíritu
  alternatives_spanish:
  - por el mismo Espíritu
  - de acuerdo con el mismo Espíritu
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad o acuerdo. «Según» preserva esa idea y permite distinguirla de la preposición anterior, reflejando la variación griega y la fuente común.
theological_decisions:
- issue: Referencia de «Espíritu»
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo implícito en el contexto, señalado como «Espíritu»
  alternative_spanish_readings:
  - espíritu humano
  - espíritu
  rationale: El contexto inmediato trata de dones espirituales distribuidos en la comunidad por una única fuente divina. La mayúscula en «Espíritu» comunica ese referente sin añadir una glosa ajena al versículo.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Traducción de λόγος en expresiones carismáticas
  english_pob_reading: message
  chosen_spanish_reading: palabra
  alternative_spanish_readings:
  - mensaje
  - expresión
  - palabra de sabiduría / de conocimiento
  rationale: La POB inglesa opta por «message» pero conserva en nota la alternativa literal «word». En español, «palabra» es la forma más natural y también preserva la terminología tradicional que sigue siendo comprensible; la nota registra la alternativa inglesa de «word/utterance».
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los tres marcadores de nota directamente en el texto español y ajustando la puntuación para que cada marcador aparezca exactamente una vez junto a la frase correspondiente.
  spanish_consistency_notes:
  - Se mantuvo «Espíritu» con mayúscula por el referente contextual al Espíritu Santo.
  - Se evitó «SEÑOR» porque el texto no contiene el nombre divino.
  - Se conservó el paralelismo distributivo «a uno ... y a otro ...».
  - Se usó «palabra» para λόγος en armonía con la terminología carismática tradicional, sin perder la opción alternativa registrada en notas.
