lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: On the contrary
  chosen_spanish: Al contrario
  alternatives_spanish:
  - Pero
  - Más bien
  lexicon: BDAG
  rationale: La partícula introduce un contraste correctivo fuerte; «Al contrario» reproduce mejor ese giro que un simple «pero».
- source_word: πολλῷ μᾶλλον
  english_pob_choice: the parts of the body that seem to be weaker are necessary
  chosen_spanish: más débiles
  alternatives_spanish:
  - mucho más débiles
  - aún más débiles
  lexicon: BDAG
  rationale: El intensificador comparativo queda integrado de forma natural en español con el comparativo «más débiles», manteniendo el énfasis del griego sin sonar forzado. El sentido de «mucho más» queda sugerido por el contraste retórico del contexto y la nota textual.
- source_word: τὰ δοκοῦντα
  english_pob_choice: that seem
  chosen_spanish: que parecen
  alternatives_spanish:
  - que parecen ser
  - que se consideran
  lexicon: BDAG
  rationale: δοκέω expresa apariencia o percepción, no una realidad objetiva; «parecen» conserva esa tensión sin resolverla.
- source_word: μέλη
  english_pob_choice: parts
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  lexicon: BDAG
  rationale: En español eclesial y corporal, «miembros» mantiene mejor la metáfora orgánica y el posible eco comunitario que «partes», sin abandonar el sentido anatómico del conjunto.
- source_word: τοῦ σώματος
  english_pob_choice: of the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - del organismo
  lexicon: BDAG
  rationale: Es la referencia directa al cuerpo como totalidad a la que pertenecen los miembros.
- source_word: ἀσθενέστερα
  english_pob_choice: weaker
  chosen_spanish: más débiles
  alternatives_spanish:
  - menos fuertes
  - más frágiles
  lexicon: BDAG
  rationale: El comparativo de ἀσθενής se expresa con naturalidad como «más débiles»; conserva la gradación relativa del término.
- source_word: ὑπάρχειν
  english_pob_choice: to be
  chosen_spanish: son
  alternatives_spanish:
  - existen
  - resultan ser
  lexicon: BDAG
  rationale: Con δοκοῦντα forma una construcción de apariencia/identidad; en español la cópula simple es la solución más natural y fiel.
- source_word: ἀναγκαῖά ἐστιν
  english_pob_choice: are necessary
  chosen_spanish: son necesarios
  alternatives_spanish:
  - son indispensables
  - son imprescindibles
  lexicon: BDAG
  rationale: «Necesarios» transmite la fuerza de ἀναγκαῖος sin intensificar más allá del texto; preserva la afirmación de necesidad con sobriedad.
theological_decisions:
- issue: Mantener la metáfora corporal sin explicarla como membresía eclesial en el versículo mismo
  english_pob_reading: Retain the concrete body metaphor without importing explicit ecclesiological explanation into the verse itself.
  chosen_spanish_reading: Conservar la imagen concreta del cuerpo y sus miembros, sin convertirla en una paráfrasis explícita sobre la iglesia en el versículo.
  alternative_spanish_readings:
  - los miembros de la iglesia
  - las personas de la iglesia
  rationale: El contexto paulino aplica la metáfora a la comunidad, pero este versículo nombra cuerpo y miembros; la traducción debe preservar esa concreción y dejar la explicación para el contexto inmediato.
  doctrine_reference: 'Translation philosophy: Never paraphrase beyond what the source text warrants; preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios sustanciales; este borrador corrige además la anclaje explícito de notas para que cada marcador aparezca en el texto.
  spanish_consistency_notes:
  - Se usa «cuerpo» para σώμα y «miembros» para μέλη, manteniendo la metáfora orgánica.
  - Se conserva el comparativo con «más débiles» para ἀσθενέστερα.
  - «Necesarios» preserva la fuerza de ἀναγκαῖος sin sobrerinterpretar.
  - Las notas a pie de página están ancladas en el texto con [a], [b] y [c] para cumplir la validación.
