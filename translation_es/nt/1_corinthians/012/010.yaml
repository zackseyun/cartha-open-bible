translation:
  language: es
  text: a otro[a], manifestaciones de milagros; a otro, profecía; a otro, discernimientos de espíritus; a otro, géneros de lenguas[b]; a otro, interpretación de lenguas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «manifestaciones de poderes» o «manifestaciones de hechos poderosos».
    reason: lexical_alternative
  - marker: b
    text: O «géneros de idiomas» e «interpretación de idiomas». El término griego puede significar tanto «lenguas» como «idiomas»; se mantiene «lenguas» para preservar la ambigüedad en la discusión paulina de los dones espirituales.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐνεργήματα
  english_pob_choice: workings
  chosen_spanish: operaciones
  alternatives_spanish:
  - obras
  - acciones
  - efectos
  lexicon: BDAG
  rationale: Denota resultados o manifestaciones producidas. En español, «operaciones» conserva bien la idea de funcionamiento o actuación efectiva sin sonar forzado.
- source_word: δυνάμεων
  english_pob_choice: of miracles
  chosen_spanish: de milagros
  alternatives_spanish:
  - de poderes
  - de hechos poderosos
  - de fuerzas
  lexicon: BDAG
  rationale: En este contexto carismático, el genitivo apunta a acciones milagrosas. «De milagros» comunica con claridad el sentido contextual que el audit trail inglés ya decidió.
- source_word: προφητεία
  english_pob_choice: prophecy
  chosen_spanish: profecía
  alternatives_spanish:
  - mensaje profético
  - hablar profético
  lexicon: BDAG
  rationale: Término técnico del don mencionado por Pablo; «profecía» es el equivalente directo, claro y fiel.
- source_word: διακρίσεις
  english_pob_choice: discernments
  chosen_spanish: discernimientos
  alternatives_spanish:
  - distinciones
  - evaluaciones
  - discriminaciones
  lexicon: BDAG
  rationale: El plural conserva la variedad o repetición implícita. «Discernimientos» es natural en español y refleja bien el matiz plural.
- source_word: πνευμάτων
  english_pob_choice: of spirits
  chosen_spanish: de espíritus
  alternatives_spanish:
  - de espíritus humanos
  - de espíritus malos
  - de realidades espirituales
  lexicon: BDAG
  rationale: Se mantiene amplio, sin precisar el referente. Así se preserva la tensión lexical y teológica del griego.
- source_word: γένη
  english_pob_choice: kinds
  chosen_spanish: géneros
  alternatives_spanish:
  - clases
  - variedades
  - tipos
  lexicon: BDAG
  rationale: «Géneros» reproduce bien el plural colectivo de γένη y suena natural en la lista de dones.
- source_word: γλωσσῶν
  english_pob_choice: tongues
  chosen_spanish: lenguas
  alternatives_spanish:
  - tongues
  - idiomas
  - lenguajes
  lexicon: BDAG
  rationale: La POB inglesa retiene la ambigüedad de γλῶσσαι entre «tongues» y «languages». En español, «lenguas» preserva esa misma apertura sin resolverla prematuramente.
- source_word: ἑρμηνεία
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - traducción
  - explicación
  lexicon: BDAG
  rationale: Es el equivalente más natural para el acto de volver inteligible lo dicho en lenguas.
- source_word: ἄλλῳ / ἑτέρῳ
  english_pob_choice: to another
  chosen_spanish: a otro
  alternatives_spanish:
  - para otro
  - a una persona distinta
  - a diferente otro
  lexicon: BDAG
  rationale: La dative repetida distribuye dones entre distintas personas. «A otro» mantiene la fluidez y el patrón distributivo del texto.
theological_decisions:
- issue: Sentido de δυνάμεων en la lista de dones
  english_pob_reading: Rendered as 'miracles' rather than the more literal 'powers.'
  chosen_spanish_reading: «milagros» en vez de «poderes»
  alternative_spanish_readings:
  - poderes
  - hechos poderosos
  rationale: La lista de Pablo se refiere a manifestaciones del Espíritu, y en este contexto el término suele apuntar a obras milagrosas. «Milagros» comunica mejor ese uso sin introducir una teología ajena al texto.
  doctrine_reference: 'Translation philosophy: preserve source sense over overly literal masking when the context is clear.'
- issue: Ambigüedad de γλωσσῶν
  english_pob_reading: Rendered as 'tongues' in both occurrences.
  chosen_spanish_reading: «lenguas» para conservar la ambigüedad
  alternative_spanish_readings:
  - idiomas
  - hablas
  - tongues
  rationale: El término sigue debatido; «lenguas» en español retiene la misma tensión entre lenguaje extático, idiomas humanos o una categoría más amplia. No se resuelve la cuestión en la traducción.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
- issue: Sentido de πνευμάτων
  english_pob_reading: Left broad as 'spirits.'
  chosen_spanish_reading: «espíritus» sin especificación
  alternative_spanish_readings:
  - espíritus malos
  - espíritus humanos
  - manifestaciones espirituales
  rationale: El griego no precisa el referente exacto; la traducción evita añadir una interpretación que el texto no explicita.
  doctrine_reference: 'Translation philosophy §3: preserve theological tension rather than resolve it.'
translation_notes:
