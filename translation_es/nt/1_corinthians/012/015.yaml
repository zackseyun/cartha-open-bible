  source_alignment_summary: 'El borrador español refleja fielmente el griego y el rastro de auditoría inglés: mantiene la condición general («Si ... dice»), la metáfora concreta del cuerpo («el pie», «mano»), la causalidad de «Porque», la repetición de «del cuerpo» y la fuerza de la pregunta retórica que niega la conclusión del pie. La ligera reexpresión española «¿no por eso deja de ser del cuerpo?» transmite adecuadamente la doble negación griega sin perder el sentido.'
  spanish_quality_summary: 'El español es natural, claro y digno. «Si el pie dice[a]: «Porque no soy mano, no soy del cuerpo», ¿no por eso deja de ser del cuerpo?» suena idiomático y conserva bien el razonamiento de Pablo. La omisión de «una» antes de «mano» es aceptable en español dentro de la cita, y la nota alternativa ayuda a lectores que prefieran una formulación más explícita.'
  glossary_alignment: 'No hay términos de glosario sensible del proyecto en este versículo. Las decisiones léxicas son coherentes con el POB: se preserva la imaginería corporal literal y se evita suavizar «del cuerpo» a «parte del cuerpo» en el texto principal, reservando esa opción para la nota.'
