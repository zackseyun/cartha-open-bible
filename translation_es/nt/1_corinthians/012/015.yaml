translation:
  language: es
  text: 'Si el pie dice[a]: «Porque no soy mano, no soy del cuerpo», ¿no por eso deja de ser del cuerpo?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: «Porque no soy mano, no pertenezco al cuerpo ... eso no me hace menos parte del cuerpo.»'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐὰν εἴπῃ
  english_pob_choice: If ... says
  chosen_spanish: Si ... dice
  alternatives_spanish:
  - Si ... llegara a decir
  - Si ... dijera
  lexicon: BDAG
  rationale: La construcción condicional hipotética se expresa de forma natural con «si ... dice» en español, conservando el valor general sin volverlo más pesado de lo necesario.
- source_word: ὁ πούς
  english_pob_choice: the foot
  chosen_spanish: el pie
  alternatives_spanish:
  - el pie del cuerpo
  lexicon: BDAG
  rationale: «πούς» corresponde literalmente a «pie»; mantener el miembro corporal concreto conserva la metáfora paulina.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Que
  lexicon: BDAG
  rationale: Aquí introduce el contenido con matiz causal de la queja del miembro, y «porque» reproduce bien esa lógica en español.
- source_word: χείρ
  english_pob_choice: a hand
  chosen_spanish: mano
  alternatives_spanish:
  - una mano
  lexicon: BDAG
  rationale: Se preserva la oposición pie/mano. En español, dentro de la cita directa, el artículo indefinido puede omitirse sin perder naturalidad.
- source_word: ἐκ τοῦ σώματος
  english_pob_choice: of the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - de el cuerpo
  - del organismo
  lexicon: BDAG
  rationale: La revisión inglesa prefirió «of the body» por naturalidad; en español, «del cuerpo» conserva la pertenencia relacional y el eco repetido de la frase sin sonar forzado.
- source_word: οὐ παρὰ τοῦτο
  english_pob_choice: not for this reason
  chosen_spanish: no por eso
  alternatives_spanish:
  - no por este motivo
  - no por ello
  lexicon: BDAG
  rationale: «οὐ παρὰ τοῦτο» niega la conclusión basada en la premisa anterior; «no por eso» es una equivalencia idiomática breve y clara.
- source_word: οὐκ ἔστιν ἐκ τοῦ σώματος
  english_pob_choice: it is not ... not of the body, is it?
  chosen_spanish: deja de ser del cuerpo
  alternatives_spanish:
  - deja de pertenecer al cuerpo
  - no es del cuerpo
  lexicon: BDAG
  rationale: El griego usa una pregunta retórica con doble negación. En español, «¿no por eso deja de ser del cuerpo?» preserva la fuerza retórica y evita una repetición artificial de negaciones.
theological_decisions:
- issue: Metáfora de pertenencia al cuerpo y doble negación retórica
  english_pob_reading: Preserve the repeated 'of/from the body' phrasing and the rhetorical double negation rather than paraphrasing to 'part of the body.'
  chosen_spanish_reading: Conservar la pertenencia al cuerpo mediante «del cuerpo» y la pregunta retórica negativa, en lugar de suavizarla a «parte del cuerpo».
  alternative_spanish_readings:
  - «... no soy parte del cuerpo»
  - «... no pertenezco al cuerpo»
  rationale: 'No hay controversia doctrinal, pero sí una tensión estilística y exegética: Pablo formula la objeción y la rebate con una negación retórica. La traducción mantiene esa estructura para que el lector vea el razonamiento del texto.'
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Tomo en cuenta la revisión inglesa más reciente, que prefirió «of the body» por naturalidad, y la cruzo con el griego ἐκ τοῦ σώματος. En español, «del cuerpo» expresa esa relación con naturalidad y mantiene la repetición del miembro corporal y la respuesta retórica.
  spanish_consistency_notes:
  - Se mantiene «cuerpo» para σῶμα, sin sustituirlo por «organismo» o «iglesia», porque el contexto es metafórico-corporal.
  - Se conserva «pie» y «mano» de manera literal para sostener la imagen paulina.
  - No se introduce «Cristo» ni terminología eclesial adicional, porque el versículo solo contiene la metáfora del cuerpo.
  - La pregunta final queda en forma retórica para reflejar el doble negativo griego.
