translation:
  language: es
  text: Porque el cuerpo no es un solo miembro, sino muchos.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Καὶ γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque, en efecto
  - Ya que
  lexicon: BDAG
  rationale: La combinación introduce una explicación o razón ligada al argumento anterior. En español, «Porque» expresa con naturalidad esa relación causal/expositiva sin sobrecargar la frase ni añadir énfasis no explícito en el griego.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo de Cristo
  - el organismo
  lexicon: BDAG
  rationale: Se conserva la metáfora corporal de Pablo sin expandirla en el texto principal. «El cuerpo» es la correspondencia directa y mantiene abierta la referencia metafórica del contexto.
- source_word: οὐκ ἔστιν
  english_pob_choice: is not
  chosen_spanish: no es
  alternatives_spanish:
  - no está constituido por
  - no consiste en
  lexicon: BDAG
  rationale: El copulativo negativo se traduce de manera directa y sobria. Opciones más explicativas introducirían material interpretativo que el griego no dice de forma explícita.
- source_word: ἓν μέλος
  english_pob_choice: one member
  chosen_spanish: un solo miembro
  alternatives_spanish:
  - un miembro
  - una sola parte
  lexicon: BDAG
  rationale: «Miembro» preserva la imagen paulina del cuerpo y es natural en español eclesial. Se añade «solo» para reflejar con claridad el valor enfático de ἓν sin perder fluidez.
- source_word: ἀλλὰ πολλά
  english_pob_choice: but many
  chosen_spanish: sino muchos
  alternatives_spanish:
  - pero muchos
  - sino muchos miembros
  - sino muchas partes
  lexicon: BDAG
  rationale: «Sino» reproduce mejor el contraste negativo del griego tras una negación previa. «Muchos» mantiene la elipsis del original, donde «miembros» se sobreentiende del miembro anterior.
theological_decisions:
- issue: Metáfora del cuerpo
  english_pob_reading: Retain 'the body' as Paul's metaphor without expanding it to 'the body of Christ' in the main text.
  chosen_spanish_reading: Mantener «el cuerpo» como metáfora paulina sin expandirla a «el cuerpo de Cristo» en el texto principal.
  alternative_spanish_readings:
  - el cuerpo de Cristo
  rationale: El versículo griego dice solo «el cuerpo». Ampliarlo resolvería interpretativamente una referencia que el texto inmediato no formula. La metáfora queda abierta para que el contexto la desarrolle.
  doctrine_reference: 'Translation philosophy: Original-language primacy over translation tradition; Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión auditada indica que no hubo cambios en la última pasada y que el acuerdo con el control de calidad fue alto; por tanto, esta redacción sigue de cerca el griego y la decisión inglesa de no expandir la metáfora.
  spanish_consistency_notes:
  - Se conservó «miembro» para μέλος, en coherencia con el uso repetido de la imagen corporal en el pasaje.
  - Se prefirió «Porque»/«sino» para reflejar la lógica argumentativa del griego y el contraste de la cláusula.
  - No se añadió «Cristo» en la traducción principal, de acuerdo con la disciplina de primacía del texto fuente.
