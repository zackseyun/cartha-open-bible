  source_alignment_summary: El borrador refleja bien la estructura retórica de μή πάντες con preguntas que esperan respuesta negativa, y conserva adecuadamente 'dones', 'en lenguas' e 'interpretan'. Sin embargo, la segunda nota al pie está anclada en 'lenguas' pero dice 'O en idiomas', lo cual sugiere erróneamente una alternativa para la preposición completa en vez de para γλώσσαις; conviene reformularla como 'O “lenguas/idiomas”' o ajustar el texto. Además, 'sanidades' es comprensible y preserva el plural, pero en español general 'curaciones' suena más natural sin perder el matiz plural del griego.
  spanish_quality_summary: El español es claro y eclesialmente inteligible. La sintaxis interrogativa funciona bien. La principal mejora es naturalidad léxica en 'dones de curaciones' frente a 'dones de sanidades', que puede sonar más marcado o regional/carismático de forma innecesaria para un registro amplio. También se debe pulir la nota b para que corresponda exactamente al segmento anclado.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Dones', 'lenguas' e 'interpretan' están alineados con el rastro léxico inglés y el contexto paulino. Se recomienda 'curaciones' como mejor equivalente español general para ἰαμάτων, manteniendo en nota la alternativa 'sanidades' y la observación de plural.
  issues:
  - severity: medium
    issue: '''Sanidades'' suena menos natural que ''curaciones'' en español general.'
    rationale: Aunque preserva el plural de ἰαμάτων, 'sanidades' puede sonar técnico o regional. 'Curaciones' mantiene el plural exigido por el griego y resulta más ampliamente natural y legible en español neutro.
  - severity: medium
    issue: La nota b no corresponde con precisión al anclaje textual.
    rationale: El texto tiene 'en lenguas[b]', pero la nota dice 'O "en idiomas"'. Como la alternancia léxica recae sobre γλώσσαις más que sobre toda la locución preposicional, conviene formular la nota de modo que no cree una falsa equivalencia o ambigüedad de anclaje.
