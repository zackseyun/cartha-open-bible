translation:
  language: es
  text: ¿No tienen todos dones de curaciones[a]? ¿No hablan todos en lenguas[b]? ¿No interpretan todos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O "dones de sanidades". El griego usa el plural: "dones de curaciones/sanidades".'
    reason: lexical_alternative
  - marker: b
    text: O "idiomas". En este contexto, el término se refiere al don comúnmente llamado "lenguas".
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ πάντες
  english_pob_choice: Not all ... do they?
  chosen_spanish: ¿No tienen todos ...? / ¿No hablan todos ...? / ¿No interpretan todos?
  alternatives_spanish:
  - ¿Acaso todos no ...?
  - ¿No es verdad que no todos ...?
  lexicon: BDAG
  rationale: La partícula μή en estas preguntas espera una respuesta negativa. En español, la forma interrogativa con negación inicial conserva mejor el valor retórico que un enunciado plano, y mantiene el énfasis paulino en que no todos poseen los mismos dones.
- source_word: χαρίσματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - dádivas
  lexicon: BDAG
  rationale: En este contexto de 1 Corintios 12, χαρίσματα se refiere a dones carismáticos dados por gracia. 'Dones' es el término natural y eclesialmente inteligible en español, sin perder la idea de concesión gratuita.
- source_word: ἰαμάτων
  english_pob_choice: of healings
  chosen_spanish: de sanidades
  alternatives_spanish:
  - de curaciones
  - de sanación
  lexicon: BDAG
  rationale: El griego usa el plural ἰαμάτων, por lo que conviene preservar la pluralidad. 'Sanidades' mantiene la forma plural y evita reducir la expresión a una abstracción singular; 'curaciones' sería posible, pero menos afín al registro carismático del pasaje.
- source_word: γλώσσαις
  english_pob_choice: in tongues
  chosen_spanish: en lenguas
  alternatives_spanish:
  - en idiomas
  lexicon: BDAG
  rationale: En el contexto paulino de 1 Corintios 12–14, γλῶσσα designa el fenómeno carismático tradicionalmente llamado 'lenguas'. 'En lenguas' conserva ese uso; 'en idiomas' es lexicamente posible, pero diluye el término técnico del pasaje.
- source_word: διερμηνεύουσιν
  english_pob_choice: interpret
  chosen_spanish: interpretan
  alternatives_spanish:
  - traducen
  - explican
  lexicon: BDAG
  rationale: Dentro del contexto de las lenguas, διερμηνεύω significa hacer inteligible el mensaje para otros. 'Interpretan' es el equivalente preciso y usual en español bíblico para este don.
theological_decisions:
- issue: Preguntas retóricas con μή y la diversidad de dones
  english_pob_reading: Render as questions expecting a negative answer
  chosen_spanish_reading: Mantener preguntas que esperan respuesta negativa
  alternative_spanish_readings:
  - 'Convertirlas en afirmaciones: ''No todos tienen ...'''
  - Usar interrogativas neutras sin valor retórico
  rationale: 'La sintaxis griega subraya que no todos reciben los mismos dones. La traducción debe conservar esa tensión teológica: diversidad real dentro del mismo cuerpo, sin uniformar los carismas.'
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada del POB en inglés: conserva el valor negativo esperado de μή, mantiene la pluralidad de ἰαμάτων y la referencia carismática de γλώσσαις, y no introduce cambios doctrinales ni suaviza la diversidad de dones que el versículo afirma.'
  spanish_consistency_notes:
  - Se prefirió 'sanidades' para reflejar el plural griego y el uso carismático del pasaje.
  - '''Lenguas'' se mantiene como término técnico del contexto paulino; ''idiomas'' queda registrado solo como alternativa.'
  - '''Interpretan'' reproduce el sentido de διερμηνεύω en el marco de 1 Corintios 12–14.'
  - La puntuación interrogativa mantiene el tono retórico de las preguntas con μή.
