translation:
  language: es
  text: Ustedes saben que cuando eran gentiles, eran llevados[a] a los ídolos mudos[b], como los llevaran.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «arrastrados» o «conducidos». El griego enfatiza que estaban bajo una influencia pasiva que los movía hacia los ídolos.
    reason: lexical_alternative
  - marker: b
    text: O «los ídolos sin voz» o «ídolos que no pueden hablar».
    reason: lexical_alternative
lexical_decisions:
- source_word: οἴδατε
  english_pob_choice: You know
  chosen_spanish: Ustedes saben
  alternatives_spanish:
  - Saben
  - Ya saben
  lexicon: BDAG
  rationale: El presente de segunda persona plural expresa una apelación directa a la memoria compartida; «Ustedes saben» es natural en español y conserva el valor discursivo de la frase.
- source_word: ἔθνη
  english_pob_choice: Gentiles
  chosen_spanish: gentiles
  alternatives_spanish:
  - naciones
  - paganos
  lexicon: BDAG
  rationale: En este contexto paulino, el término señala la identidad étnico-religiosa anterior de los corintios. «Gentiles» mantiene esa referencia sin añadir una carga moral más fuerte que la del griego.
- source_word: πρὸς τὰ εἴδωλα
  english_pob_choice: to the idols
  chosen_spanish: hacia los ídolos
  alternatives_spanish:
  - a los ídolos
  - hacia las imágenes
  lexicon: BDAG
  rationale: La preposición con acusativo comunica dirección o movimiento orientado a un objeto de devoción. «Hacia» conserva mejor esa dinámica que un simple dativo español.
- source_word: τὰ ἄφωνα
  english_pob_choice: the mute
  chosen_spanish: mudos
  alternatives_spanish:
  - sin voz
  - que no hablan
  - mudos y sin habla
  lexicon: BDAG
  rationale: El adjetivo subraya que los ídolos no pueden hablar; «mudos» es breve, claro y mantiene el contraste implícito con la palabra inspirada del contexto.
- source_word: εἴδωλα τὰ ἄφωνα
  english_pob_choice: the mute idols
  chosen_spanish: los ídolos mudos
  alternatives_spanish:
  - los ídolos que no hablan
  - los ídolos sin voz
  lexicon: BDAG
  rationale: La construcción atributiva se conserva de forma compacta en español. Mantener «ídolos mudos» preserva la fuerza retórica y la concisión del griego.
- source_word: ὡς ἂν
  english_pob_choice: however
  chosen_spanish: de la manera en que
  alternatives_spanish:
  - comoquiera que
  - según como
  - de cualquier modo que
  lexicon: BDAG
  rationale: La combinación tiene un matiz indefinido/modal de «en cualquier forma que»; «de la manera en que» transmite esa indeterminación sin sonar artificial en español.
- source_word: ἤγεσθε
  english_pob_choice: you were led
  chosen_spanish: eran llevados
  alternatives_spanish:
  - eran conducidos
  - los llevaban
  - eran guiados
  lexicon: BDAG
  rationale: El imperfecto pasivo presenta una acción continua en el pasado. «Eran llevados» conserva la pasividad y el movimiento impuesto desde afuera.
- source_word: ἀπαγόμενοι
  english_pob_choice: being led away
  chosen_spanish: llevados
  alternatives_spanish:
  - arrastrados
  - alejados
  - llevados lejos
  lexicon: BDAG
  rationale: El participio refuerza la idea de desplazamiento pasivo bajo influencia ajena. En español se integra naturalmente con el verbo principal para evitar sobrecarga sintáctica, manteniendo la noción de ser conducidos fuera del camino verdadero.
theological_decisions:
- issue: Valor de ἔθνη en el recuerdo del pasado de los corintios
  english_pob_reading: Rendered as 'Gentiles' to preserve the ethnic-religious identity of their pre-Christian state without importing a stronger moral label.
  chosen_spanish_reading: «gentiles» para preservar la identidad étnico-religiosa previa sin convertir el término en una acusación añadida.
  alternative_spanish_readings:
  - paganos
  - naciones
  rationale: En Pablo, el contraste recuerda su condición anterior fuera del pueblo de Dios, no simplemente una etiqueta moral. «Gentiles» conserva ese valor sin cargar el texto con una interpretación más fuerte de la que el versículo explicita.
  doctrine_reference: Translation philosophy §1, §6
- issue: Contraste retórico entre ídolos mudos y el habla inspirada en el contexto inmediato
  english_pob_reading: Preserved with 'mute idols' rather than a looser paraphrase.
  chosen_spanish_reading: Preservado con «ídolos mudos» en vez de una explicación ampliada.
  alternative_spanish_readings:
  - ídolos que no hablan
  - ídolos sin voz
  rationale: La formulación breve mantiene el contraste de Pablo con el contexto de dones espirituales y habla inspirada, sin introducir una paráfrasis doctrinal ajena al verso.
  doctrine_reference: Translation philosophy §1, §3
- issue: Matiz de ὡς ἂν en la clausula final
  english_pob_reading: '''however you were led'' as an indefinite/modal force.'
  chosen_spanish_reading: «de la manera en que fueran llevados» para reflejar la indeterminación del modo.
  alternative_spanish_readings:
  - comoquiera que fueran llevados
  - según como fueran llevados
  - de cualquier modo que fueran llevados
  rationale: El griego no fija un modo concreto, sino que subraya la pasividad y la variabilidad del arrastre anterior. La redacción española intenta conservar esa tensión sin volverla explicativa de más.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó 'being' para reflejar mejor el imperfecto pasivo sin una progresividad artificial, y mantuvo 'however you were led' para ὡς ἂν ἤγεσθε. En español, se reflejó esa misma decisión con un pasivo imperfectivo natural («eran llevados») y una cláusula final que conserva la indeterminación modal («de la manera en que fueran llevados»).
  spanish_consistency_notes:
  - Se mantuvo «gentiles» en minúscula cuando funciona como sustantivo común en español.
  - Se prefirió «ídolos mudos» para conservar la concisión y el contraste retórico del griego.
  - La pasividad del verbo principal y el participio se integraron en un español fluido sin borrar la idea de influencia externa.
  - No se usó «Señor» ni vocabulario de sustitución de nombre divino porque el versículo no lo requiere.
