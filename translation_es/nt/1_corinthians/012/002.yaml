review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien el sentido general del griego: conocimiento compartido del pasado, identidad anterior como gentiles, dirección hacia los ídolos y pasividad bajo influencia ajena. Sin embargo, la cláusula final «de la manera en que fueran llevados» no refleja con naturalidad ni precisión el valor de ὡς ἂν ἤγεσθε; suena forzada en español y además cambia innecesariamente el tiempo/modalidad. También conviene ajustar «hacia los ídolos» a «a los ídolos» para una lectura más natural sin perder el sentido direccional.'
  spanish_quality_summary: 'El español es mayormente claro y fiel, pero algo rígido. «Eran llevados» funciona, y «ídolos mudos» es una buena solución. No obstante, «de la manera en que fueran llevados» resulta poco idiomático y pesado; «como los llevaran» preserva mejor la indeterminación modal y la pasividad en un español más natural. La nota a pie a está mal anclada en relación con su contenido: comenta una alternativa para τὰ ἄφωνα, no para «gentiles».'
  glossary_alignment: Alinea bien con la terminología del proyecto en «gentiles», «ídolos», y «mudos». No hay conflicto con términos teológicos mayores. Debe corregirse la distribución de notas para que la nota sobre «ídolos mudos» se ancle en esa frase y la nota sobre la pasividad/arrastre se ancle en la cláusula verbal pertinente.
  issues:
  - severity: medium
    issue: Cláusula final poco natural y semánticamente imprecisa
    rationale: «de la manera en que fueran llevados» no suena idiomático en español bíblico moderno y no representa bien el indefinido/modal de ὡς ἂν; «como los llevaran» o «de cualquier manera que los llevaran» expresa mejor «however you were led».
  - severity: medium
    issue: Anclaje de nota al pie incorrecto
    rationale: La nota marcada con [a] está puesta sobre «gentiles», pero su contenido habla de alternativas para «ídolos mudos» / «speechless idols». Eso confunde la evidencia léxica y debe corregirse.
  - severity: low
    issue: «hacia los ídolos» es menos natural que «a los ídolos»
    rationale: Aunque «hacia» puede reflejar dirección, en español aquí «llevar a los ídolos» es más idiomático y no pierde el valor de πρός con acusativo en este contexto.
  revised_spanish_text: Ustedes saben que cuando eran gentiles, eran llevados[a] a los ídolos mudos[b], como los llevaran.
  revised_footnotes:
