translation:
  language: es
  text: Pero a cada uno se le da la manifestación del Espíritu para el bien común[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "para lo que es beneficioso" o "para el beneficio de todos".'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκάστῳ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada persona
  - a cada uno de ustedes
  lexicon: BDAG
  rationale: El dativo distributivo se expresa con naturalidad en español como 'a cada uno', preservando la distribución individual sin añadir un matiz colectivo que el griego no exige.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: '''Pero'' reproduce el giro leve de contraste o transición que introduce este versículo respecto del contexto previo.'
- source_word: δίδοται
  english_pob_choice: is given
  chosen_spanish: se le da
  alternatives_spanish:
  - le es dada
  - se otorga
  lexicon: BDAG
  rationale: La pasiva presente de δίδωμι se vierte con una pasiva impersonal natural en español, manteniendo la idea de don concedido sin forzar una construcción más rígida.
- source_word: ἡ φανέρωσις
  english_pob_choice: the manifestation
  chosen_spanish: la manifestación
  alternatives_spanish:
  - la evidencia
  - la revelación
  lexicon: BDAG
  rationale: '''Manifestación'' es el equivalente directo y ya establecido para φανέρωσις; conserva la idea de una realidad puesta de manifiesto o hecha visible.'
- source_word: τοῦ πνεύματος
  english_pob_choice: of the Spirit
  chosen_spanish: del Espíritu
  alternatives_spanish:
  - del espíritu
  - del Espíritu Santo
  lexicon: BDAG
  rationale: En 1 Corintios 12 el contexto identifica claramente al Espíritu como el Espíritu Santo. En español, 'del Espíritu' conserva cercanía al griego y, por el contexto inmediato, no deja ambiguo el referente.
- source_word: πρὸς τὸ συμφέρον
  english_pob_choice: for the common good
  chosen_spanish: para el bien común
  alternatives_spanish:
  - para lo que es beneficioso
  - para el beneficio de todos
  - para lo provechoso
  lexicon: BDAG
  rationale: La frase apunta al beneficio comunitario dentro del cuerpo; 'bien común' expresa bien esa orientación colectiva sin reducir el sentido a utilidad meramente individual.
theological_decisions:
- issue: Referente de 'el Espíritu'
  english_pob_reading: The phrase refers to the Holy Spirit.
  chosen_spanish_reading: La frase se refiere al Espíritu Santo.
  alternative_spanish_readings:
  - La frase se refiere a un espíritu en sentido genérico.
  rationale: El contexto inmediato de 1 Corintios 12:4-11 presenta un solo y mismo Espíritu como fuente de los dones. Por eso 'del Espíritu' en español puede leerse con seguridad como el Espíritu Santo sin necesidad de explicitación adicional en el texto principal.
  doctrine_reference: Affirmations; Translation philosophy §1
- issue: Alcance de συμφέρον
  english_pob_reading: The benefit is communal, hence 'for the common good.'
  chosen_spanish_reading: El beneficio es comunitario, de ahí 'para el bien común'.
  alternative_spanish_readings:
  - para el beneficio de todos
  - para lo que es beneficioso en general
  rationale: El capítulo trata de dones repartidos para la edificación del cuerpo; por eso el sentido no es meramente personal sino compartido. 'Bien común' conserva esa orientación eclesial sin introducir una paráfrasis excesiva.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el griego SBLGNT y el criterio óptimo-equivalente del POB inglés, sin necesidad de cambios respecto al último pase revisado; se mantiene la fuerza distributiva de ἑκάστῳ, la pasiva de δίδοται, el valor visible de φανέρωσις y la orientación comunitaria de πρὸς τὸ συμφέρον.
  spanish_consistency_notes:
  - Se mantiene 'Espíritu' con mayúscula por el referente contextual al Espíritu Santo.
  - '''Bien común'' conserva el matiz corporativo de συμφέρον en un registro natural para español bíblico contemporáneo.'
  - La cláusula inicial con 'Pero' reproduce el leve contraste de δέ sin sobreactuar la transición.
