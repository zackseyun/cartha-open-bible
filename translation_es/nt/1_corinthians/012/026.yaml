translation:
  language: es
  text: Y si un miembro sufre[a], todos los miembros sufren con él; si un miembro es honrado, todos los miembros se alegran con él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es glorificado». Aquí probablemente el sentido es que un miembro recibe honor, y todo el cuerpo comparte la alegría.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴτε
  english_pob_choice: if
  chosen_spanish: y si
  alternatives_spanish:
  - si
  - sea que
  lexicon: BDAG
  rationale: En esta construcción correlativa, el valor condicional se conserva mejor en español con repetición de «si... si...». Se añade «y» para dar fluidez natural sin cambiar la relación sintáctica de las dos cláusulas.
- source_word: πάσχει
  english_pob_choice: suffers
  chosen_spanish: padece
  alternatives_spanish:
  - sufre
  - está sufriendo
  - experimenta dolor
  lexicon: BDAG
  rationale: «Padece» comunica bien el sufrir general o el atravesar aflicción, con un registro digno y bíblico en español. Evita reducir el sentido a dolor físico בלבד o sonar más coloquial que el contexto requiere.
- source_word: ἓν μέλος
  english_pob_choice: one member
  chosen_spanish: un miembro
  alternatives_spanish:
  - una parte
  - un solo miembro
  lexicon: BDAG
  rationale: «Miembro» preserva la metáfora del cuerpo y corresponde al uso establecido en el pasaje. «Parte» sería más genérico y perdería parte de la imagen corporal.
- source_word: συμπάσχει
  english_pob_choice: suffer with it
  chosen_spanish: padecen con él
  alternatives_spanish:
  - sufren con él
  - padecen juntamente
  - comparten su padecimiento
  lexicon: BDAG
  rationale: El compuesto expresa sufrimiento compartido; «padecen con él» hace explícita la solidaridad corporal. Se mantiene el pronombre singular de referencia implícita al miembro afectado.
- source_word: πάντα τὰ μέλη
  english_pob_choice: all the members
  chosen_spanish: todos los miembros
  alternatives_spanish:
  - todos los miembros del cuerpo
  - todos los partes
  lexicon: BDAG
  rationale: La repetición de la frase se conserva para mantener el paralelismo retórico. «Miembros» sigue sosteniendo la metáfora orgánica del cuerpo.
- source_word: δοξάζεται
  english_pob_choice: is honored
  chosen_spanish: es honrado
  alternatives_spanish:
  - es glorificado
  - recibe honra
  - es alabado
  lexicon: BDAG
  rationale: En este contexto de interdependencia del cuerpo, δοξάζω apunta a recibir honor o estima, no necesariamente a una glorificación técnica. «Es honrado» reproduce con claridad ese sentido social-relacional.
- source_word: μέλος
  english_pob_choice: a member
  chosen_spanish: un miembro
  alternatives_spanish:
  - un miembro del cuerpo
  - una parte
  lexicon: BDAG
  rationale: La segunda cláusula no repite explícitamente ἕν, pero el español puede mantener la simetría con «un miembro» sin sugerir una adición textual. Así se conserva el paralelismo del griego.
- source_word: συγχαίρει
  english_pob_choice: rejoice with it
  chosen_spanish: se alegran con él
  alternatives_spanish:
  - se regocijan con él
  - comparten su alegría
  lexicon: BDAG
  rationale: El verbo compuesto expresa alegría compartida. «Se alegran con él» es natural en español y mantiene la idea de participación solidaria en la alegría del miembro honrado.
theological_decisions:
- issue: Sentido de δοξάζεται en la metáfora del cuerpo
  english_pob_reading: social honor within the body ('is honored')
  chosen_spanish_reading: honra relacional dentro del cuerpo ('es honrado')
  alternative_spanish_readings:
  - es glorificado
  - recibe gloria
  rationale: El contexto inmediato trata de sufrimiento y gozo compartidos entre miembros de un mismo cuerpo; por eso se conserva el valor de honor/estima. Se evita trasladar aquí un sentido más alto o técnico de glorificación que el texto no exige.
  doctrine_reference: Mantener la tensión léxica del original y no resolverla con terminología eclesial posterior; primacía del griego en el contexto inmediato.
translation_notes:
  revision_awareness: 'Coincide con el audit trail inglés en mantener el paralelismo condicional, el lenguaje corporal de «miembro/miembros» y el sentido social de δοξάζεται como honor. La única adaptación principal es lexical en español: «padece» y «se alegran» para una lectura natural y digna.'
  spanish_consistency_notes:
  - Se conservó la metáfora orgánica de «miembro/miembros» en ambas cláusulas.
  - Se evitó «Cristo» o vocabulario de glorificación técnica para δοξάζεται, porque el contexto es de honor relacional.
  - El pronombre singular «él» mantiene la referencia al miembro afectado/honrado y evita ambigüedad en español.
  - La nota a pie conserva la alternativa «glorificado» documentada en el audit trail inglés.
