revisions:
- from: Y si un miembro padece[a], todos los miembros padecen con él; y si un miembro es honrado, todos los miembros se alegran con él.
  to: Y si un miembro sufre[a], todos los miembros sufren con él; si un miembro es honrado, todos los miembros se alegran con él.
  rationale: Se ajusta el verbo principal a «sufre / sufren» para una lectura más natural y ampliamente comprensible en español, sin pérdida de sentido. También se elimina la conjunción «y» antes de la segunda cláusula condicional para reflejar mejor el paralelismo del griego en un español más fluido. No se requieren cambios doctrinales ni de terminología principal.
