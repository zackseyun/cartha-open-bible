translation:
  language: es
  text: Pero uno y el mismo Espíritu[a] realiza[b] todas estas cosas, distribuyendo[c] a cada uno individualmente, tal como quiere[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «uno y el mismo Espíritu» enfatiza que los diversos dones proceden de una sola fuente.
    reason: cross_reference
  - marker: b
    text: O «obra», «produce» o «efectúa» todas estas cosas.
    reason: lexical_alternative
  - marker: c
    text: O «repartiendo» o «asignando» a cada uno.
    reason: lexical_alternative
  - marker: d
    text: O «como él quiere» o «según su voluntad». El verbo griego puede expresar voluntad, elección o deseo.
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα δὲ ταῦτα
  english_pob_choice: But ... all these things
  chosen_spanish: Pero ... todas estas cosas
  alternatives_spanish:
  - Ahora ... todas estas cosas
  - Y ... todas estas cosas
  lexicon: BDAG
  rationale: πάντα ταῦτα reúne la totalidad de las manifestaciones mencionadas; por eso se conserva con «todas estas cosas». δέ introduce una transición suave con matiz de contraste o continuación, que en español se expresa bien con «Pero».
- source_word: ἐνεργεῖ
  english_pob_choice: works
  chosen_spanish: realiza
  alternatives_spanish:
  - obra
  - produce
  - efectúa
  lexicon: BDAG
  rationale: El verbo expresa la actividad efectiva del Espíritu en estas manifestaciones. «Realiza» conserva la acción eficaz sin forzar el mecanismo. «Obra» también sería posible, pero puede sonar más marcado en español eclesial; «realiza» mantiene naturalidad y fuerza verbal.
- source_word: τὸ ἓν καὶ τὸ αὐτὸ πνεῦμα
  english_pob_choice: one and the same Spirit
  chosen_spanish: uno y el mismo Espíritu
  alternatives_spanish:
  - el uno y el mismo Espíritu
  - uno y el mismo Espíritu, el Espíritu
  lexicon: BDAG
  rationale: 'La construcción con artículo y adjetivo enfatiza identidad y unidad: no varios espíritus, sino uno solo. En español, «uno y el mismo Espíritu» reproduce esa insistencia de manera idiomática. Se conserva «Espíritu» con mayúscula por el contexto paulino del Espíritu Santo.'
- source_word: διαιροῦν
  english_pob_choice: distributing
  chosen_spanish: distribuyendo
  alternatives_spanish:
  - repartiendo
  - asignando
  - apportionando
  lexicon: BDAG
  rationale: El participio explica cómo actúa el Espíritu al conceder los dones. «Distribuyendo» mantiene la idea de repartir o asignar sin sugerir división conflictiva. Es el equivalente más transparente para lectores actuales.
- source_word: ἰδίᾳ
  english_pob_choice: individually
  chosen_spanish: individualmente
  alternatives_spanish:
  - personalmente
  - en particular
  - separadamente
  lexicon: BDAG
  rationale: ἰδίᾳ modifica la distribución hacia cada persona en forma particular. «Individualmente» conserva el sentido distributivo y se ajusta de modo natural a «a cada uno».
- source_word: ἑκάστῳ
  english_pob_choice: to each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - a cada uno de manera personal
  - a cada cual
  lexicon: BDAG
  rationale: El dativo señala los destinatarios de la distribución. «A cada uno» reproduce el sentido singular distributivo y fluye con claridad en español.
- source_word: καθὼς βούλεται
  english_pob_choice: just as he wills
  chosen_spanish: tal como quiere
  alternatives_spanish:
  - según quiere
  - como él quiere
  - tal como desea
  lexicon: BDAG
  rationale: καθώς establece la norma de la distribución y βούλομαι expresa voluntad/intención. En español, «tal como quiere» conserva la idea de decisión soberana sin añadir una formulación más marcada que el griego. Se evita introducir un pronombre explícito porque el español puede sostener el sujeto implícito con naturalidad, manteniendo la referencia personal del Espíritu.
theological_decisions:
- issue: Persona y agencia del Espíritu en βούλεται
  english_pob_reading: The Spirit is a personal divine agent who distributes gifts according to his will; English uses 'he' to reflect personhood.
  chosen_spanish_reading: 'El Espíritu es presentado como agente personal divino que distribuye los dones según su voluntad; en español se deja el verbo con sujeto implícito: «tal como quiere».'
  alternative_spanish_readings:
  - tal como él quiere
  - tal como desea
  - según su voluntad
  rationale: Aunque πνεῦμα es neutro en griego, el contexto atribuye voluntad y acción al Espíritu. El español puede conservar esa personificación sin forzar un pronombre explícito. «Tal como quiere» mantiene la referencia personal y la soberanía del Espíritu con naturalidad.
  doctrine_reference: 'Credo Niceno-Constantinopolitano: el Espíritu Santo como persona divina; mantener la agencia personal sin borrar la tensión gramatical del neutro griego.'
translation_notes:
  revision_awareness: 'Se siguió el pasaje griego SBLGNT y el auditrastro inglés POB sin calcar mecánicamente el inglés. No hubo revisiones previas aplicadas en esta entrega; se preservaron las tensiones léxicas relevantes: ἐνεργεῖ como acción eficaz, πνεῦμα como el Espíritu personal, y βούλεται como voluntad/elección/ deseo, resuelto en español con una formulación natural y auditable.'
  spanish_consistency_notes:
  - Se usa «Espíritu» con mayúscula por coherencia con el referente pneumatológico paulino.
  - Se prefirió «distribuyendo» para el participio διαιροῦν en lugar de «dividiendo», evitando una connotación negativa que el contexto no sugiere.
  - «A cada uno» mantiene el valor distributivo singular de ἑκάστῳ.
  - Se evitó «SEÑOR» o cualquier sustituto para el referente divino, pues aquí el sujeto explícito es el Espíritu.
  - La puntuación conserva el ritmo de una afirmación principal seguida de participio explicativo, natural en español bíblico contemporáneo.
