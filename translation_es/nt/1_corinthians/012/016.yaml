  glossary_alignment: No hay conflictos con la terminología del proyecto. «Del cuerpo» preserva adecuadamente ἐκ τοῦ σώματος en este contexto. La decisión de no usar una paráfrasis más interpretativa como «parte del cuerpo» en el texto principal coincide con la filosofía POB, siempre que la alternativa quede en nota correctamente anclada.
