translation:
  language: es
  text: 'Y si el oído dice: «Porque no soy ojo, no soy del cuerpo[a]», no por eso deja de ser del cuerpo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «no soy parte del cuerpo» ... «eso no significa que deje de ser parte del cuerpo». El griego repite «del cuerpo» con efecto retórico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Y también
  - Y además
  lexicon: BDAG
  rationale: La conjunción coordinante simple mantiene la continuidad del argumento y su enlace con el versículo anterior.
- source_word: ἐὰν εἴπῃ
  english_pob_choice: if ... says
  chosen_spanish: si ... dice
  alternatives_spanish:
  - si llegara a decir
  - si dijere
  lexicon: BDAG
  rationale: La condición hipotética queda bien reflejada en español con una construcción natural y directa; evita un tono arcaico sin perder el valor hipotético.
- source_word: τὸ οὖς
  english_pob_choice: the ear
  chosen_spanish: el oído
  alternatives_spanish:
  - la oreja
  lexicon: BDAG
  rationale: Se prefiere «oído» para el órgano en el contexto corporal general y por su uso más amplio y digno en español bíblico contemporáneo.
- source_word: Ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Que
  lexicon: BDAG
  rationale: Aquí introduce la razón de la afirmación del miembro personificado; «Porque» expresa con claridad la relación causal o explicativa.
- source_word: ὀφθαλμός
  english_pob_choice: an eye
  chosen_spanish: ojo
  alternatives_spanish:
  - un ojo
  lexicon: BDAG
  rationale: Como predicado nominal en español, el artículo indefinido no es necesario; «ojo» transmite el sustantivo anatómico con naturalidad.
- source_word: ἐκ τοῦ σώματος
  english_pob_choice: of the body
  chosen_spanish: del cuerpo
  alternatives_spanish:
  - parte del cuerpo
  - de este cuerpo
  lexicon: BDAG
  rationale: «Del cuerpo» conserva la repetición de ἐκ τοῦ σώματος sin forzar una paráfrasis interpretativa; en español suena natural y mantiene la transparencia del paralelismo retórico.
- source_word: οὐ παρὰ τοῦτο
  english_pob_choice: not for this reason
  chosen_spanish: no por esto
  alternatives_spanish:
  - no por esa razón
  - no por ello
  lexicon: BDAG
  rationale: La locución española reproduce la negación causal de forma breve y fiel, preservando la refutación del argumento del miembro personificado.
- source_word: οὐκ ἔστιν ἐκ τοῦ σώματος
  english_pob_choice: it is not ... not of the body
  chosen_spanish: deja de ser del cuerpo
  alternatives_spanish:
  - no es del cuerpo
  - no por esto deja de pertenecer al cuerpo
  lexicon: BDAG
  rationale: La doble negación griega funciona retóricamente como corrección enfática. En español, «deja de ser del cuerpo» comunica con naturalidad que la conclusión negativa no se sigue, sin borrar la lógica del original.
theological_decisions:
- issue: Metáfora del cuerpo y pertenencia eclesial
  english_pob_reading: Retain the source-text logic and repeated 'from/of the body' language rather than paraphrasing into a more idiomatic ecclesiological statement.
  chosen_spanish_reading: Conservar la lógica del argumento y la repetición de «del cuerpo» en lugar de convertirla en una explicación más interpretativa.
  alternative_spanish_readings:
  - no por esto sigue siendo parte del cuerpo
  - eso no lo hace menos miembro del cuerpo
  rationale: El versículo ilustra la pertenencia de cada miembro al cuerpo sin hacer una explicación doctrinal adicional. Mantener la forma argumentativa protege la transparencia del texto y la fuerza retórica de la imagen.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, pero se ajustó la dicción al español para que el predicado nominal y la doble negación suenen naturales sin perder la repetición retórica de ἐκ τοῦ σώματος. Se optó por mantener la línea formal-equivalente del versículo, con una única nota para registrar la alternativa idiomática que el inglés POB también preserva.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde corresponda al nombre divino; este versículo no lo contiene.
  - Se mantuvo «cuerpo» para σῶμα y la repetición de «del cuerpo» para transparentar el paralelismo griego.
  - «Oído» se eligió por contexto anatómico personificado; no requiere capitalización ni glosa adicional en el texto principal.
  - La nota al pie recoge la alternativa idiomática sin sustituir el giro más cercano al griego en el cuerpo del texto.
