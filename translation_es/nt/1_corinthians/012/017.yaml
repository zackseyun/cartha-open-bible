translation:
  language: es
  text: Si todo el cuerpo fuera ojo, ¿dónde estaría la audición[a]? Si todo fuera audición, ¿dónde estaría el olfato[a]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿dónde estaría el oído?... ¿dónde estaría la nariz?». El griego habla más literalmente de las facultades de oír y oler, no de los órganos físicos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅλον τὸ σῶμα
  english_pob_choice: the whole body
  chosen_spanish: todo el cuerpo
  alternatives_spanish:
  - el cuerpo entero
  lexicon: BDAG
  rationale: «ὅλον τὸ σῶμα» describe la totalidad del cuerpo; «todo el cuerpo» es natural en español y conserva la imagen hipotética de un cuerpo compuesto únicamente por una sola parte.
- source_word: ὀφθαλμός
  english_pob_choice: an eye
  chosen_spanish: ojo
  alternatives_spanish:
  - un ojo
  lexicon: BDAG
  rationale: En español, en una construcción condicional hipotética, «Si todo el cuerpo fuera ojo» suena más idiomático y mantiene la metáfora sin añadir más concreción de la necesaria. El sentido de «un ojo» queda implícito por el singular predicativo.
- source_word: ποῦ
  english_pob_choice: where would ... be?
  chosen_spanish: ¿dónde estaría ...?
  alternatives_spanish:
  - ¿dónde estaría entonces ...?
  lexicon: BDAG
  rationale: La partícula interrogativa expresa lugar; en una condición irreal, «¿dónde estaría...?» transmite bien la fuerza hipotética en español sin recargar la frase.
- source_word: ἀκοή
  english_pob_choice: the hearing / hearing
  chosen_spanish: el oído
  alternatives_spanish:
  - la audición
  - la capacidad de oír
  lexicon: BDAG
  rationale: Aunque el griego apunta a la facultad de oír, en español «oído» puede funcionar como órgano y como sentido. Aquí lo elegimos para conservar la naturalidad de la pregunta y la imagen corporal, sin perder la referencia funcional del contexto.
- source_word: ὅλον
  english_pob_choice: the whole
  chosen_spanish: todo
  alternatives_spanish:
  - lo entero
  lexicon: BDAG
  rationale: En la segunda cláusula el adjetivo aparece sin sustantivo explícito; «todo» reproduce esa elipsis de forma breve y clara en español.
- source_word: ὄσφρησις
  english_pob_choice: the sense of smell
  chosen_spanish: el olfato
  alternatives_spanish:
  - la capacidad de oler
  - la facultad del olfato
  lexicon: BDAG
  rationale: El término griego nombra la facultad de oler. «Olfato» es la forma más natural y precisa en español para esa capacidad sensorial, y evita forzar una terminología anatómica no presente en el texto.
theological_decisions:
- issue: Facultades sensoriales versus órganos físicos
  english_pob_reading: Translate ἀκοή and ὄσφρησις as sensory functions rather than as organs.
  chosen_spanish_reading: Traducir ἀκοή con «oído» y ὄσφρησις con «olfato», manteniendo la referencia al sentido/facultad y no a una anatomía detallada.
  alternative_spanish_readings:
  - «audición» y «sentido del olfato»
  - «el oído» y «la nariz»
  rationale: El griego usa sustantivos que expresan funciones sensoriales, no los órganos concretos. En español, «oído» y «olfato» permiten una lectura clara y natural, y preservan el argumento de Pablo sobre la diversidad de miembros y funciones del cuerpo.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: Coincide con el texto griego y con el audit trail inglés en la preferencia por lenguaje funcional/sensorial frente a una explicitación anatómica excesiva. No se registran revisiones adicionales.
  spanish_consistency_notes:
  - Se mantuvo «cuerpo» para σῶμα y se evitó introducir «miembro» donde el griego no lo dice en este versículo.
  - La alternancia entre «ojo», «oído» y «olfato» conserva el paralelismo retórico del original.
  - Se evitó «SEÑOR» u այլ terminología no pertinente; este versículo no contiene vocabulario divino o cristológico.
