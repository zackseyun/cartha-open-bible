revisions:
- from: Si todo el cuerpo fuera ojo[a], ¿dónde estaría el oído? Si todo fuera oído, ¿dónde estaría el olfato?
  to: Si todo el cuerpo fuera ojo, ¿dónde estaría la audición[a]? Si todo fuera audición, ¿dónde estaría el olfato[a]?
  rationale: Se revisa «el oído» a «la audición» para reflejar mejor ἀκοή como facultad sensorial, en línea con la decisión léxica y teológica auditada. Se conserva «olfato» para ὄσφρησις. La nota al pie se reorienta a la alternativa realmente documentada («oído / nariz») y se elimina la mención impropia de «ver». No se requiere adjudicación adicional porque la corrección es clara y de bajo riesgo doctrinal.
