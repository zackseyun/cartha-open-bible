translation:
  language: es
  text: No todos son apóstoles, ¿verdad? No todos son profetas, ¿verdad? No todos son maestros, ¿verdad? No todos realizan milagros[a], ¿verdad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «No todos son poderes/milagros, ¿verdad?». El griego usa «poderes» como abreviatura de obras milagrosas o de quienes las realizan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ... πάντες
  english_pob_choice: Not all ... are they?
  chosen_spanish: ¿Acaso no todos ...?
  alternatives_spanish:
  - ¿No todos ...?
  - ¿Acaso todos no ...?
  lexicon: μή + πᾶς (uso interrogativo negativo)
  rationale: En español, una pregunta negativa con valor de respuesta esperada negativa se expresa de forma natural con «¿Acaso no...?»; conserva la fuerza retórica del griego sin sonar artificial.
- source_word: ἀπόστολοι
  english_pob_choice: apostles
  chosen_spanish: apóstoles
  alternatives_spanish:
  - enviados
  - mensajeros
  lexicon: BDAG ἀπόστολος
  rationale: Aquí el contexto paulino apunta al ministerio/función reconocida de apóstol, no a un simple mensajero. «Apóstoles» mantiene el valor eclesial del término.
- source_word: προφῆται
  english_pob_choice: prophets
  chosen_spanish: profetas
  alternatives_spanish:
  - personas que profetizan
  lexicon: BDAG προφήτης
  rationale: «Profetas» es la equivalencia directa y clara en un listado de ministerios/dones.
- source_word: διδάσκαλοι
  english_pob_choice: teachers
  chosen_spanish: maestros
  alternatives_spanish:
  - enseñantes
  - instructores
  lexicon: BDAG διδάσκαλος
  rationale: «Maestros» suena natural en español bíblico y conserva el sentido de quienes enseñan en la comunidad; evita el calco «profesores», que sería demasiado moderno y escolar.
- source_word: δυνάμεις
  english_pob_choice: work miracles
  chosen_spanish: realizan milagros
  alternatives_spanish:
  - hacen milagros
  - obran milagros
  - son trabajadores de milagros
  - tienen poderes
  lexicon: BDAG δύναμις
  rationale: El griego usa un sustantivo plural abreviado dentro de una serie de funciones; en español conviene verbalizarlo para comunicar la acción milagrosa sin volver el texto poco natural. «Realizan milagros» refleja el uso metonímico señalado en el audit trail y evita una traducción demasiado literal como «son poderes».
theological_decisions:
- issue: Valor de la pregunta negativa en cadena retórica
  english_pob_reading: Not all are X, are they?
  chosen_spanish_reading: ¿Acaso no todos son X?
  alternative_spanish_readings:
  - ¿No todos son X?
  - ¿Acaso todos son X?
  rationale: La serie de preguntas presupone una respuesta negativa y refuerza que no todos poseen la misma función o don. La forma elegida preserva esa fuerza retórica en español.
  doctrine_reference: 1 Co 12:29; traducción de preguntas retóricas con expectativa negativa.
- issue: Interpretación de δυνάμεις dentro de una lista de ministerios/dones
  english_pob_reading: Not all work miracles, do they?
  chosen_spanish_reading: ¿Acaso no todos realizan milagros?
  alternative_spanish_readings:
  - ¿Acaso no todos obran milagros?
  - ¿Acaso no todos tienen poderes milagrosos?
  rationale: Siguiendo el audit trail inglés, el sustantivo funciona como atajo para obras milagrosas o quienes las realizan. En español se expresa verbalmente para mantener la claridad y no sugerir que las personas «son milagros».
  doctrine_reference: Principio de equivalencia óptima; sentido contextual de δύναμις en listas carismáticas.
translation_notes:
  revision_awareness: La redacción sigue de cerca la revisión más reciente del audit trail inglés, que prefirió una formulación verbal para δυνάμεις ('work miracles') por ser más natural y exacta en contexto. En español se adoptó un equivalente igualmente verbal ('realizan milagros') para preservar esa decisión y evitar un calco nominal ininteligible.
  spanish_consistency_notes:
  - Se mantiene «apóstoles», «profetas» y «maestros» para conservar paralelismo léxico en la serie.
  - Se optó por «realizan milagros» en vez de «obran milagros» solo por fluidez; ambas son válidas en español bíblico.
  - No se usó «Cristo», «Señor» ni otros términos especiales porque el versículo no los contiene.
