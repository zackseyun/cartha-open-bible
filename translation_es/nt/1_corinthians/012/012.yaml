review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la sintaxis y el sentido del griego: unidad del cuerpo, pluralidad de miembros, fuerza concesiva en «aunque son muchos» y la expresión comprimida final «así también es el Mesías». También preserva correctamente la decisión doctrinal de traducir ὁ Χριστός como «el Mesías».'
  spanish_quality_summary: 'El español es claro y legible, pero hay un ajuste menor de naturalidad y fidelidad: «tiene muchos miembros[a]» expresa explícitamente el objeto μέλη y evita que «tiene muchos» suene algo incompleto en español. El resto del versículo fluye bien y mantiene un registro digno y natural.'
  glossary_alignment: 'Alineado con la terminología del proyecto: σῶμα→«cuerpo», μέλη→«miembros», Χριστός→«Mesías». Las notas también respetan la distinción título/nombre. No hay conflicto con glosario principal.'
  issues:
  - severity: medium
    issue: En el texto principal se omite el sustantivo en «tiene muchos miembros[a]» solo si se sigue literalmente el borrador actual, pero la traducción dada ya lo incluye; sin embargo, la decisión léxica documentada para πολλὰ ἔχει dice «tiene muchos», creando inconsistencia interna.
    rationale: El texto español debe corresponder con sus propias decisiones léxicas y con el griego, donde el objeto «miembros» está explícito en la cláusula. Conviene armonizar la documentación y mantener la formulación natural completa en el texto.
  - severity: low
    issue: La nota [a] podría sonar un poco más precisa al hablar de «función de título» en vez de solo «valor de título».
    rationale: Es un refinamiento estilístico menor; mejora claridad sin cambiar el contenido.
  revised_spanish_text: Porque así como el cuerpo es uno y tiene muchos miembros[a], y todos los miembros del cuerpo, aunque son muchos, son un solo cuerpo[b], así también es el Mesías.
  revised_footnotes:
  - marker: a
    text: O «Cristo». Aquí Χριστός se traduce como «Mesías» para conservar su función de título.
    reason: alternative_reading
  - marker: b
    text: La frase griega dice literalmente «así también es el Mesías», una expresión condensada que los versículos siguientes explican en términos de muchos miembros que forman un solo cuerpo.
    reason: cross_reference
  revision_rationale: El versículo solo necesita una reparación menor de consistencia documental y un leve pulido de redacción en las notas. El texto principal queda sustancialmente igual, manteniendo la formulación fiel al griego y la política del proyecto sobre «Mesías».
