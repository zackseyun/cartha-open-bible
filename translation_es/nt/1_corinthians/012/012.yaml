translation:
  language: es
  text: Porque así como el cuerpo es uno y tiene muchos miembros[a], y todos los miembros del cuerpo, aunque son muchos, son un solo cuerpo[b], así también es el Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo». Aquí Χριστός se traduce como «Mesías» para conservar su valor de título.
    reason: alternative_reading
  - marker: b
    text: La frase griega dice literalmente «así también es el Mesías», una expresión condensada que los versículos siguientes explican en términos de muchos miembros formando un solo cuerpo.
    reason: cross_reference
lexical_decisions:
- source_word: Καθάπερ γὰρ
  english_pob_choice: For just as
  chosen_spanish: Porque así como
  alternatives_spanish:
  - Así como
  - Pues así como
  lexicon: BDAG
  rationale: Conserva la fuerza comparativa de καθάπερ y el enlace explicativo de γάρ. «Porque así como» suena natural en español y mantiene la progresión argumentativa.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo físico
  lexicon: BDAG
  rationale: El símil paulino es corporal y eclesial a la vez; «cuerpo» mantiene la metáfora literal y su alcance teológico sin añadir interpretación.
- source_word: ἕν
  english_pob_choice: one
  chosen_spanish: uno
  alternatives_spanish:
  - único
  - un solo
  lexicon: BDAG
  rationale: «Uno» preserva la unidad numérica y la fuerza conceptual del pasaje; aquí funciona mejor que «único».
- source_word: μέλη
  english_pob_choice: members
  chosen_spanish: miembros
  alternatives_spanish:
  - partes
  - extremidades
  lexicon: BDAG
  rationale: «Miembros» es el equivalente natural en español para la metáfora paulina del cuerpo y conserva la relación orgánica entre las partes.
- source_word: πολλὰ ἔχει
  english_pob_choice: has many
  chosen_spanish: tiene muchos
  alternatives_spanish:
  - posee muchos
  - tiene muchos miembros
  lexicon: BDAG
  rationale: La construcción española reproduce de forma directa el verbo y el cuantificador, manteniendo la concisión del griego. El objeto explícito se sobreentiende por el contexto inmediato de «miembros».
- source_word: πάντα δὲ τὰ μέλη τοῦ σώματος
  english_pob_choice: and all the members of the body
  chosen_spanish: y todos los miembros del cuerpo
  alternatives_spanish:
  - pero todos los miembros del cuerpo
  lexicon: BDAG
  rationale: Aquí δέ introduce continuidad más que oposición fuerte; «y» mantiene el flujo del argumento sin endurecer el contraste.
- source_word: πολλὰ ὄντα
  english_pob_choice: though they are many
  chosen_spanish: aunque son muchos
  alternatives_spanish:
  - siendo muchos
  - aunque sean muchos
  lexicon: BDAG
  rationale: La lectura concesiva se expresa con naturalidad en español con «aunque son muchos», preservando el matiz de contraste del participio.
- source_word: ἕν ἐστιν σῶμα
  english_pob_choice: are one body
  chosen_spanish: son un solo cuerpo
  alternatives_spanish:
  - es un solo cuerpo
  - son un cuerpo
  lexicon: BDAG
  rationale: Aunque el griego usa un predicado singular, el sujeto plural en español pide «son». «Un solo cuerpo» preserva con claridad la unidad corporativa.
- source_word: οὕτως καὶ
  english_pob_choice: so also
  chosen_spanish: así también
  alternatives_spanish:
  - de igual manera también
  - de ese modo también
  lexicon: BDAG
  rationale: «Así también» es la correspondencia más natural para cerrar la analogía con brevedad y claridad.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», de acuerdo con la política terminológica del proyecto y con el contraste entre título y nombre propio que el contexto permite.
theological_decisions:
- issue: Cómo traducir ὁ Χριστός
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto usa Χριστός como título, no simplemente como nombre propio. «El Mesías» preserva su sentido mesiánico y evita vaciar el término de su contenido teológico.
  doctrine_reference: 'DOCTRINE.md: Contested terms — Χριστός default rendering'
- issue: Mantener la tensión de la identificación final
  english_pob_reading: so also is the Messiah
  chosen_spanish_reading: así también es el Mesías
  alternative_spanish_readings:
  - así también es el cuerpo del Mesías
  - así también es la iglesia
  rationale: Se conserva la formulación comprimida del griego sin expandirla interpretativamente. La identificación corporativa se deja en tensión para que el contexto inmediato la desarrolle.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto inglés auditado tuvo una oscilación entre «the Messiah» y «Christ», con una corrección posterior que restauró «Messiah» conforme a la política doctrinal. La versión española sigue esa decisión y mantiene la expresión final sin expandirla, en coherencia con el griego y con el comentario de contexto.
  spanish_consistency_notes:
  - Se conserva «Mesías» para Χριστός en todo el versículo.
  - «Cuerpo» y «miembros» se mantienen de forma consistente para la metáfora paulina.
  - La concesión «aunque son muchos» refleja el contraste del griego sin añadir elementos ajenos al texto.
  - La puntuación sigue el ritmo de la comparación original y separa claramente la conclusión final.
