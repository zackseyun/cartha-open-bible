  text: Καθάπερ γὰρ τὸ σῶμα ἕν ἐστιν καὶ μέλη ⸂πολλὰ ἔχει⸃, πάντα δὲ τὰ μέλη τοῦ ⸀σώματος πολλὰ ὄντα ἕν ἐστιν σῶμα, οὕτως καὶ ὁ Χριστός·
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/012/012.yaml
  text: For just as the body is one and has many members[a], and all the members of the body, though they are many, are one body[b], so also is Messiah.
  footnotes:
  - marker: a
    text: Or 'Christ.' The Greek title Χριστός is rendered 'Messiah' here to preserve its meaning as a title rather than treating it merely as a proper name.
    reason: alternative_reading
  - marker: b
    text: Paul's wording is literally 'so also the Messiah,' a compressed expression that the following verses unpack in terms of the many members forming one body.
    reason: cross_reference
