translation:
  language: es
  text: Ahora hay variedades de dones[a], pero el mismo Espíritu.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «distribuciones» o «diferencias de dones». El griego enfatiza la diversidad dentro de los dones, no la división en la iglesia.
    reason: lexical_alternative
lexical_decisions:
- source_word: Διαιρέσεις
  english_pob_choice: varieties
  chosen_spanish: variedades
  alternatives_spanish:
  - distribuciones
  - diferencias
  - divisiones
  lexicon: BDAG
  rationale: El sustantivo expresa distinciones o clases dentro de un conjunto, no rupturas entre creyentes. «Variedades» comunica diversidad legítima y mantiene el contraste con la unidad que sigue.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: Aquí δέ introduce un nuevo paso del argumento. «Ahora» fluye de modo natural en español y conserva el valor discursivo de transición.
- source_word: χαρισμάτων
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - regalos
  - dones de gracia
  - capacidades dadas por gracia
  lexicon: BDAG
  rationale: χάρισμα alude a un don concedido por gracia, en este contexto a capacidades espirituales. «Dones» es el equivalente más natural y fiel; el matiz de gracia queda implícito en la raíz y en el contexto.
- source_word: τὸ ... αὐτὸ
  english_pob_choice: the same
  chosen_spanish: el mismo
  alternatives_spanish:
  - uno y el mismo
  lexicon: BDAG
  rationale: La construcción subraya identidad y unidad de origen. «El mismo» es la forma más clara y sobria en español para conservar ese énfasis.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: Por el contexto inmediato de 1 Corintios 12:3-11, el referente es el Espíritu Santo. Se capitaliza «Espíritu» para reflejar ese referente personal sin añadir explicación ajena al texto.
theological_decisions:
- issue: Referente de πνεῦμα
  english_pob_reading: Holy Spirit
  chosen_spanish_reading: Espíritu Santo
  alternative_spanish_readings:
  - espíritu humano
  - principio espiritual
  rationale: El contexto inmediato presenta al Espíritu como la fuente de los dones. Traducir con mayúscula preserva la lectura teológica del pasaje y evita ambigüedad innecesaria.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador sigue de cerca el texto inglés auditado y conserva su decisión léxica principal con adaptación natural al español.
  spanish_consistency_notes:
  - Se mantiene «Espíritu» con mayúscula por el referente contextual al Espíritu Santo.
  - «Dones» conserva la fuerza de χάρισμα sin introducir una perífrasis innecesaria.
  - «Variedades» evita el falso sentido de divisiones eclesiales que el contexto no sugiere.
