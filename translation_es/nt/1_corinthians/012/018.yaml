translation:
  language: es
  text: Pero en realidad[a], Dios dispuso los miembros, cada uno de ellos, en el cuerpo, como quiso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ahora»; también «en realidad», para la fuerza contrastiva de νυνὶ δὲ.
    reason: lexical_alternative
  - marker: b
    text: O «según su voluntad»; también «como lo quiso».
    reason: lexical_alternative
lexical_decisions:
- source_word: νυνὶ δὲ
  english_pob_choice: But as it is
  chosen_spanish: Pero, tal como está
  alternatives_spanish:
  - Pero ahora
  - Pero en realidad
  lexicon: BDAG
  rationale: La expresión marca contraste con la situación hipotética anterior y vuelve a la realidad presente. «Tal como está» conserva ese giro adversativo y su valor discursivo sin sonar demasiado temporal, de manera análoga a la opción inglesa «But as it is».
- source_word: ὁ θεὸς
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Es el equivalente directo y natural del sujeto griego. El artículo no necesita reproducirse en español.
- source_word: ἔθετο
  english_pob_choice: arranged
  chosen_spanish: dispuso
  alternatives_spanish:
  - colocó
  - puso
  - ordenó
  lexicon: BDAG
  rationale: τίθημι puede significar poner, colocar o establecer, pero en este contexto de metáfora corporal la idea no es solo ubicación física sino distribución intencional. «Dispuso» comunica ese ordenamiento deliberado con buena naturalidad en español.
- source_word: τὰ μέλη
  english_pob_choice: the members
  chosen_spanish: los miembros
  alternatives_spanish:
  - las partes
  - los miembros del cuerpo
  lexicon: BDAG
  rationale: «Miembros» es el término más preciso en la metáfora del cuerpo y mantiene la terminología paulina. «Partes» es posible, pero menos específica.
- source_word: ἓν ἕκαστον αὐτῶν
  english_pob_choice: each one of them
  chosen_spanish: uno cada uno de ellos
  alternatives_spanish:
  - cada uno de ellos
  - uno por uno
  lexicon: BDAG
  rationale: La secuencia distributiva resalta la individualidad de cada miembro. En español, «uno cada uno de ellos» conserva esa fuerza distributiva y el referente explícito a los miembros; aunque suene menos idiomático que «cada uno de ellos», es más cercano a la estructura enfática del griego.
- source_word: ἐν τῷ σώματι
  english_pob_choice: in the body
  chosen_spanish: en el cuerpo
  alternatives_spanish:
  - dentro del cuerpo
  lexicon: BDAG
  rationale: Es una traducción directa y natural. En el contexto inmediato, «el cuerpo» designa la metáfora del conjunto de miembros.
- source_word: καθὼς ἠθέλησεν
  english_pob_choice: just as he desired
  chosen_spanish: como quiso
  alternatives_spanish:
  - como lo quiso
  - según quiso
  - como deseó
  lexicon: BDAG
  rationale: La cláusula expresa correspondencia con la voluntad de Dios. «Como quiso» preserva bien el sentido volitivo sin añadir matices ajenos; «como deseó» es posible, pero menos natural en este contexto teológico.
theological_decisions:
- issue: Intencionalidad divina en la distribución de los miembros
  english_pob_reading: The verse states that God intentionally arranged each member in the body according to his own desire.
  chosen_spanish_reading: El versículo afirma que Dios dispuso intencionalmente a cada miembro en el cuerpo según su voluntad.
  alternative_spanish_readings:
  - El versículo solo indicaría que Dios los colocó, sin subrayar orden intencional.
  - El versículo podría leerse principalmente como una observación descriptiva, no teleológica.
  rationale: En el contexto, Pablo contrasta la diversidad real con la idea de que el cuerpo funciona por diseño divino. «Dispuso» y «como quiso» preservan esa intención ordenadora sin forzar una formulación doctrinal más amplia que el texto no exige.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: No se detectaron revisiones textuales relevantes en el historial de la POB inglesa; el pasaje mantiene alta concordancia con el griego SBLGNT y no requiere ajustes especiales.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «cuerpo» para σῶμα, en coherencia con la terminología paulina del pasaje.
  - Se conserva «miembros» para μέλη, que es el término técnico más adecuado en la metáfora corporal.
  - «Quiso» refleja la voluntad divina sin sustituir innecesariamente el matiz intencional del original.
