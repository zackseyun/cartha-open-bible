translation:
  language: es
  text: pero nuestras partes presentables no tienen necesidad. Al contrario[a], Dios ha compuesto el cuerpo, dando mayor honor a la parte que carecía de él,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ha mezclado el cuerpo». El verbo griego puede destacar la idea de mezclar o combinar en un todo unificado.'
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσχήμονα
  english_pob_choice: presentable parts
  chosen_spanish: partes presentables
  alternatives_spanish:
  - partes decentes
  - partes comedidas
  - partes respetables
  lexicon: BDAG
  rationale: El adjetivo neutro plural describe las partes del cuerpo con apariencia decente o decorosa en el contraste del contexto. «Presentables» conserva esa idea en español moderno sin añadir una valoración moral ajena.
- source_word: χρείαν ἔχει
  english_pob_choice: have no need
  chosen_spanish: no tienen necesidad
  alternatives_spanish:
  - no necesitan
  - no tienen necesidad alguna
  lexicon: BDAG
  rationale: La expresión idiomática se expresa naturalmente como «no tienen necesidad». Mantiene el sentido directo de falta de necesidad sin sobrerreforzar el texto.
- source_word: συνεκέρασεν
  english_pob_choice: has composed
  chosen_spanish: ha compuesto
  alternatives_spanish:
  - ha mezclado
  - ha combinado
  - ha ensamblado
  lexicon: BDAG
  rationale: «Componer» comunica una acción intencional de ordenar e integrar las partes en un todo, acorde con la metáfora del cuerpo y con la lectura auditada de una acción deliberada de Dios.
- source_word: σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo como un todo
  lexicon: BDAG
  rationale: Se conserva la metáfora central paulina sin expansión innecesaria.
- source_word: τῷ ὑστεροῦντι
  english_pob_choice: to the part that lacked it
  chosen_spanish: a la parte que lo carecía
  alternatives_spanish:
  - a la parte que le faltaba
  - a la parte que estaba faltando
  lexicon: BDAG
  rationale: El participio indica la parte que carecía de algo en el contexto inmediato; el antecedente implícito es el honor. En español, el relativo con «lo» hace visible ese complemento implícito, aunque también puede sonar algo literal; por eso se deja la tensión en la formulación.
- source_word: περισσοτέραν τιμήν
  english_pob_choice: greater honor
  chosen_spanish: mayor honor
  alternatives_spanish:
  - honor más abundante
  - honor superior
  lexicon: BDAG
  rationale: «Mayor honor» reproduce de forma clara y natural el comparativo griego, preservando la fuerza de la comparación.
- source_word: δοὺς
  english_pob_choice: giving
  chosen_spanish: dando
  alternatives_spanish:
  - al dar
  - habiendo dado
  lexicon: BDAG
  rationale: 'El participio aoristo se vierte de manera instrumental o concomitante con la acción principal: Dios compuso el cuerpo dando honor. «Dando» es la opción más fluida en español.'
theological_decisions:
- issue: Sentido de la acción divina en la composición del cuerpo
  english_pob_reading: God is described as purposefully ordering the members of the body so that less-honored parts receive greater honor.
  chosen_spanish_reading: Dios es presentado como quien ordena intencionalmente el cuerpo de modo que la parte con menos honor reciba mayor honor.
  alternative_spanish_readings:
  - Dios solo mezcla físicamente las partes del cuerpo
  - la referencia es únicamente anatómica y no eclesial
  rationale: La metáfora sigue el argumento de Pablo sobre el cuerpo de Cristo. La traducción mantiene la idea de una ordenación deliberada y no reduce el verbo a una mezcla física sin propósito.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica sin resolverla artificialmente
translation_notes:
  revision_awareness: El texto sigue de cerca el packet griego y coincide con la lectura de alta concordancia del audit trail en inglés. Se mantuvo la alternativa verbal de συνεκέρασεν en nota, porque el campo semántico permite tanto «componer» como «mezclar/combinar», y el español principal favorece una formulación natural sin perder la intención unificadora.
  spanish_consistency_notes:
  - Se usa «Dios» para ὁ θεός, conforme al estándar del proyecto.
  - Se conserva «cuerpo» para σῶμα como metáfora paulina central.
  - Se evita «SEÑOR» porque aquí no aparece κύριος; no hay necesidad de una convención de ocultamiento del nombre divino.
  - Se mantiene el comparativo con «mayor», preservando la relación entre περισσοτέραν y τιμήν.
