translation:
  language: es
  text: Si todos fueran un solo miembro, ¿dónde estaría el cuerpo?
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εἰ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Si acaso
  - En caso de que
  lexicon: BDAG
  rationale: Introduce una condición hipotética de manera natural en español, preservando el argumento retórico de Pablo.
- source_word: δὲ
  english_pob_choice: —
  chosen_spanish: —
  alternatives_spanish:
  - pero
  - ahora
  - y
  lexicon: BDAG
  rationale: Como en el inglés auditado, δὲ funciona como conector leve y no requiere un equivalente explícito en español para mantener fluidez.
- source_word: ἦν
  english_pob_choice: were
  chosen_spanish: fueran
  alternatives_spanish:
  - eran
  - estuvieran
  lexicon: BDAG
  rationale: El imperfecto en una condición hipotética se rinde de forma natural con el subjuntivo imperfecto en español.
- source_word: τὰ πάντα
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las partes
  - todo
  lexicon: BDAG
  rationale: En el contexto de la metáfora del cuerpo, el plural apunta a la totalidad de los miembros; 'todos' conserva esa fuerza colectiva sin convertirlo en 'todas las cosas'.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: un
  alternatives_spanish:
  - uno
  - único
  lexicon: BDAG
  rationale: Concuerda naturalmente con 'miembro' y mantiene el contraste numérico de la pregunta retórica.
- source_word: μέλος
  english_pob_choice: member
  chosen_spanish: miembro
  alternatives_spanish:
  - parte
  - miembro del cuerpo
  lexicon: BDAG
  rationale: '''Miembro'' preserva la metáfora paulina del cuerpo y es el equivalente más directo en español para μέλος en este contexto.'
- source_word: ποῦ
  english_pob_choice: where would ... be?
  chosen_spanish: ¿dónde estaría ...?
  alternatives_spanish:
  - ¿dónde se hallaría ...?
  - ¿qué sería de ...?
  lexicon: BDAG
  rationale: La pregunta retórica sobre la existencia o ubicación del cuerpo se expresa con naturalidad en español mediante '¿dónde estaría...?'.
- source_word: τὸ σῶμα
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - el cuerpo colectivo
  - el organismo
  lexicon: BDAG
  rationale: '''El cuerpo'' reproduce directamente la imagen paulina sin añadir una especificación eclesiológica que no aparece en la frase griega.'
theological_decisions:
- issue: Extensión de la metáfora del cuerpo
  english_pob_reading: Translate the verse as a rhetorical statement about the necessity of diversity within one body, without importing ecclesiological specifics into the translation itself.
  chosen_spanish_reading: Traducir el versículo como una pregunta retórica sobre la necesidad de diversidad dentro de un solo cuerpo, sin introducir precisiones eclesiológicas que el texto no expresa aquí.
  alternative_spanish_readings:
  - '''cuerpo de Cristo'''
  - '''cuerpo de la iglesia'''
  rationale: El griego dice simplemente 'el cuerpo'; la traducción conserva esa literalidad funcional y deja que el contexto amplio determine la aplicación.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: El texto griego y el auditoría inglesa muestran un versículo estable, sin notas textuales ni revisiones aplicadas; por eso la redacción española sigue de cerca la construcción retórica sin añadidos interpretativos.
  spanish_consistency_notes:
  - Se conserva 'miembro' para μέλος y 'cuerpo' para σῶμα, manteniendo la metáfora corporal de Pablo.
  - Se usa subjuntivo imperfecto ('fueran', 'estaría') para reflejar la hipótesis contraria a los hechos.
  - No se introduce 'Cristo' ni un calificativo eclesial porque no aparece en este versículo concreto.
