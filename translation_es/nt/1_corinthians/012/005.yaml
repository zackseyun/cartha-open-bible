translation:
  language: es
  text: Y hay diversas clases de ministerios[a], y el mismo Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «servicios» o «formas de servicio».
    reason: lexical_alternative
lexical_decisions:
- source_word: διαιρέσεις
  english_pob_choice: varieties
  chosen_spanish: diversas clases
  alternatives_spanish:
  - variedades
  - divisiones
  - diferencias
  lexicon: BDAG
  rationale: En este contexto, Pablo habla de manifestaciones distintas dentro de una unidad, no de cismas. «Diversas clases» comunica diferenciación real sin sugerir conflicto, y resulta natural en español bíblico actual.
- source_word: διακονιῶν
  english_pob_choice: ministries
  chosen_spanish: ministerios
  alternatives_spanish:
  - servicios
  - formas de servicio
  lexicon: BDAG
  rationale: El sustantivo puede denotar servicio, ministerio u oficio de servicio. «Ministerios» conserva la idea de funciones dadas para la obra en la iglesia y sigue de cerca la decisión inglesa sin sonar demasiado abstracto.
- source_word: ὁ αὐτὸς
  english_pob_choice: the same
  chosen_spanish: el mismo
  alternatives_spanish:
  - uno y el mismo
  lexicon: BDAG
  rationale: La expresión subraya continuidad y unidad entre funciones diversas. «El mismo» es la equivalencia natural en español y preserva el paralelismo con los versículos vecinos.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es el equivalente habitual de κύριος en el NT y mantiene el peso teológico del título. En este contexto paulino, el referente más probable es el Señor Jesús dentro del patrón trinitario de vv. 4–6.
- source_word: καὶ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - También
  - Ahora
  lexicon: BDAG
  rationale: La conjunción enlaza este versículo con las afirmaciones paralelas del contexto inmediato. «Y» preserva la estructura aditiva simple del griego.
- source_word: εἰσιν
  english_pob_choice: there are
  chosen_spanish: hay
  alternatives_spanish:
  - existen
  lexicon: BDAG
  rationale: La traducción existencial «hay» reproduce con naturalidad la estructura de la cláusula y expresa bien el sentido de enumeración de Pablo.
theological_decisions:
- issue: Referente de «Señor» en la formulación triádica de 1 Corintios 12:4–6
  english_pob_reading: '''Lord'' is rendered as a title without expanding it in the text; contextually it most likely refers to the Lord Jesus.'
  chosen_spanish_reading: «Señor» se mantiene como título sin expansión interpretativa en el texto; por el contexto, probablemente refiere al Señor Jesús.
  alternative_spanish_readings:
  - Una referencia más genérica al Señor/Dios
  rationale: 'La traducción conserva la redacción de Pablo y no resuelve explícitamente la referencia, pero reconoce en la nota teológica la lectura cristológica más probable dentro del patrón: el mismo Espíritu, el mismo Señor y el mismo Dios.'
  doctrine_reference: Credo Niceno; principio de preservar la tensión teológica en vez de resolverla de antemano
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: se mantiene la estructura aditiva, el valor existencial de εἰσιν y el título κύριος como «Señor», sin expansion interpretativa en el cuerpo del texto. La principal adaptación es española: «diversas clases» por διαιρέσεις para evitar la sugerencia de divisiones sectarias.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en armonía con el patrón paulino del contexto inmediato.
  - «Hay» funciona de manera natural para εἰσιν y conserva el sentido de existencia/présentación de hechos.
  - La nota a pie de página preserva la alternativa léxica principal documentada por la POB inglesa.
