translation:
  language: es
  text: Pero deseen ardientemente los dones[a] mayores. Y aún les muestro un camino[b] más excelente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero ustedes están deseando ardientemente los dones mayores». La forma griega ζηλοῦτε puede leerse aquí como imperativo o como indicativo.'
    reason: alternative_reading
  - marker: b
    text: 'O tradicionalmente: «un camino aún más excelente».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ζηλοῦτε
  english_pob_choice: earnestly desire
  chosen_spanish: anhelen con celo
  alternatives_spanish:
  - deseen ardientemente
  - sean celosos por
  - aspiren con empeño
  lexicon: BDAG
  rationale: ζηλόω puede expresar deseo intenso, celo o aspiración. En español, «anhelen con celo» comunica una intensidad positiva sin sonar mecánico. Conserva el matiz exhortativo que el contexto favorece, sin borrar la alternativa indicativa documentada por la POB en inglés.
- source_word: χαρίσματα
  english_pob_choice: gifts
  chosen_spanish: dones
  alternatives_spanish:
  - gifts espirituales
  - carismas
  - regalos
  lexicon: BDAG
  rationale: χάρισμα es un don concedido por gracia. En español, «dones» es natural y eclesialmente claro. Evita añadir «espirituales» al texto principal, ya que esa precisión proviene del contexto inmediato más que de la palabra misma.
- source_word: μείζονα
  english_pob_choice: greater
  chosen_spanish: mayores
  alternatives_spanish:
  - más grandes
  - superiores
  - de mayor importancia
  lexicon: BDAG
  rationale: El comparativo griego expresa superioridad o mayor importancia. «Mayores» conserva la comparación de manera breve y natural en español.
- source_word: καθ’ ὑπερβολὴν
  english_pob_choice: more excellent / more surpassing
  chosen_spanish: más excelente
  alternatives_spanish:
  - más sobresaliente
  - de excelencia mayor
  - más sobresaliente aún
  lexicon: BDAG
  rationale: La expresión comunica un grado extraordinario o que sobrepasa. En español, «más excelente» es fiel, idiomático y mantiene el tono tradicional sin depender de una paráfrasis.
- source_word: ὁδὸν
  english_pob_choice: way
  chosen_spanish: camino
  alternatives_spanish:
  - modo de vivir
  - sendero
  - vía
  lexicon: BDAG
  rationale: ὁδός funciona aquí metafóricamente como un modo o ruta de vida. «Camino» preserva la metáfora que introduce el desarrollo del capítulo 13 y su carga conceptual.
- source_word: δείκνυμι
  english_pob_choice: I show
  chosen_spanish: les muestro
  alternatives_spanish:
  - les estoy mostrando
  - les indicaré
  - les enseño
  lexicon: BDAG
  rationale: El presente griego δείκνυμι se refleja mejor con presente en español. «Les muestro» mantiene la inmediatez del texto y evita convertir el verbo en futuro sin necesidad.
theological_decisions:
- issue: Fuerza verbal de ζηλοῦτε
  english_pob_reading: 'imperative: ''earnestly desire'' with an alternative indicative footnote'
  chosen_spanish_reading: 'imperativo: «anhelen con celo»'
  alternative_spanish_readings:
  - «están anhelando con celo»
  - «anhelan con celo»
  rationale: La forma griega admite lectura imperativa o indicativa. La exhortación encaja con el flujo parenético de la sección y con la transición hacia el amor como camino superior. La alternativa indicativa queda preservada en nota para no resolver artificialmente la tensión textual.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Relación entre 'dones mayores' y 'camino más excelente'
  english_pob_reading: greater gifts ... a still more excellent way
  chosen_spanish_reading: «los dones mayores... un camino más excelente»
  alternative_spanish_readings:
  - «los dones más grandes... un camino todavía más excelente»
  - «los dones superiores... un camino más excelente aún»
  rationale: La POB inglesa mantiene la comparación entre los dones y el camino que sigue. En español, «más excelente» conserva la escalada retórica sin sobreexplicar la jerarquía, y «camino» preserva la metáfora que prepara el capítulo 13.
  doctrine_reference: Translation philosophy §2 (Maintain source-level rhetorical force)
translation_notes:
  revision_awareness: 'La versión inglesa revisada corrigió ''will show'' a ''show'' para reflejar el presente δείκνυμι, y ajustó la frase de καθ’ ὑπερβολήν hacia una formulación más natural. Esta propuesta española sigue ese mismo criterio: mantiene presente verbal y un superlativo/comparativo idiomático sin perder el matiz de excedencia.'
  spanish_consistency_notes:
  - Se evita 'SEÑOR' u otras sustituciones de nombres divinos porque no hay aquí léxico para el nombre divino.
  - «Dones» se usa de forma consistente con χάρισμα en contextos paulinos, sin añadir 'espirituales' al texto principal.
  - «Camino» conserva la metáfora bíblica y prepara la continuidad temática con 1 Corintios 13.
