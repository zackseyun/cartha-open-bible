revisions:
- from: Pero anhelen con celo los dones[a] mayores. Y todavía les muestro un camino[b] más excelente.
  to: Pero deseen ardientemente los dones[a] mayores. Y aún les muestro un camino[b] más excelente.
  rationale: Se ajusta ζηλοῦτε a «deseen ardientemente» para un español más natural y fiel al matiz intensivo exhortativo, y se cambia «todavía» por «aún» para reflejar mejor la progresión de καὶ ἔτι. Se conservan la estructura, la nota sobre la ambigüedad imperativo/indicativo y la alternativa tradicional de la segunda cláusula.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:12:45Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido básico del griego y conserva correctamente la tensión de ζηλοῦτε mediante nota al pie. «Dones mayores» para τὰ χαρίσματα τὰ μείζονα y «les muestro un camino más excelente» para ὁδὸν ὑμῖν δείκνυμι son fieles. Sin embargo, «anhelen con celo» suena algo redundante y menos natural que una formulación española más directa para el imperativo exhortativo. Además, «todavía» no es la mejor correspondencia de καὶ ἔτι en esta construcción; «aún» o «y aún» encaja mejor con la escalada retórica documentada por la POB.
  spanish_quality_summary: El español es generalmente claro y digno, pero «anhelen con celo» resulta algo forzado en registro bíblico natural. «Deseen ardientemente» comunica mejor el valor intensivo sin calco innecesario. También conviene ajustar «todavía» a «aún» para mejorar fluidez y precisión estilística. El resto del versículo es legible y eclesialmente adecuado.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dones» para χαρίσματα, «camino» para ὁδός y «más excelente» para καθ’ ὑπερβολήν están alineados con la auditoría inglesa y son apropiados en español. No intervienen términos sensibles del glosario mayor como Yahvé, Mesías o esclavo.
  issues:
  - severity: medium
    issue: «anhelen con celo» es poco natural y semánticamente redundante
    rationale: ζηλοῦτε expresa deseo celoso/intenso, pero en español «anhelar» ya aporta intensidad; añadir «con celo» produce una combinación algo pesada y menos idiomática que «deseen ardientemente».
  - severity: low
    issue: «todavía» no es la mejor opción para καὶ ἔτι en este contexto
    rationale: Aquí la frase introduce una escalada retórica hacia el capítulo 13. En español bíblico natural, «Y aún les muestro...» o «Y además les muestro...» transmite mejor continuidad con intensificación que «Y todavía les muestro...».
  revised_spanish_text: Pero deseen ardientemente los dones[a] mayores. Y aún les muestro un camino[b] más excelente.
  revised_footnotes:
  - marker: a
    text: 'O: «Pero ustedes están deseando ardientemente los dones mayores». La forma griega ζηλοῦτε puede leerse aquí como imperativo o como indicativo.'
    reason: alternative_reading
  - marker: b
    text: 'O tradicionalmente: «un camino aún más excelente».'
    reason: lexical_alternative
  revision_rationale: Se ajusta ζηλοῦτε a «deseen ardientemente» para un español más natural y fiel al matiz intensivo exhortativo, y se cambia «todavía» por «aún» para reflejar mejor la progresión de καὶ ἔτι. Se conservan la estructura, la nota sobre la ambigüedad imperativo/indicativo y la alternativa tradicional de la segunda cláusula.
