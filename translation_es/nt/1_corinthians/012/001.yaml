- from: En cuanto a las cosas espirituales[a], hermanos[b], no quiero que estén sin conocimiento.
  to: En cuanto a las cosas espirituales[a], hermanos[b], no quiero que lo ignoren.
  rationale: Se mantiene la amplitud semántica de τῶν πνευματικῶν con «las cosas espirituales» y se conserva «hermanos» con su nota cultural. Se reemplaza «no quiero que estén sin conocimiento» por «no quiero que lo ignoren», que comunica con naturalidad la idea de οὐ θέλω ὑμᾶς ἀγνοεῖν en español moderno y evita el sentido equívoco de la redacción anterior.
