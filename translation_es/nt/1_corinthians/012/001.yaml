translation:
  language: es
  text: En cuanto a las cosas espirituales[a], hermanos[b], no quiero que lo ignoren.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «realidades espirituales»; el griego es más amplio que «dones», aunque el contexto de este capítulo se concentra en dones dados por el Espíritu.
    reason: alternative_reading
  - marker: b
    text: «Hermanos» aquí es la forma de Pablo para dirigirse a la congregación y probablemente incluye también a las mujeres.
    reason: cultural_note
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: En cuanto a
  alternatives_spanish:
  - Ahora sobre
  - Con respecto a
  lexicon: BDAG
  rationale: La expresión introduce un nuevo tema con valor discursivo. «En cuanto a» reproduce de manera natural en español el cambio de asunto de περί + δέ sin añadir un «ahora» innecesario.
- source_word: τῶν πνευματικῶν
  english_pob_choice: spiritual things
  chosen_spanish: las cosas espirituales
  alternatives_spanish:
  - los asuntos espirituales
  - las realidades espirituales
  - los dones espirituales
  lexicon: BDAG
  rationale: El griego es sustantivado y amplio; no dice explícitamente «dones». «Las cosas espirituales» conserva esa amplitud en español y evita resolver de antemano la ambigüedad que el propio texto deja abierta.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos, hermanas
  lexicon: BDAG
  rationale: Aunque la forma griega es masculina plural, en el uso paulino funciona como vocativo para la congregación y probablemente incluye a mujeres. «Hermanos» mantiene la forma de dirección del original y su uso eclesial común en español.
- source_word: οὐ θέλω ὑμᾶς ἀγνοεῖν
  english_pob_choice: I do not want you to be uninformed
  chosen_spanish: no quiero que estén sin conocimiento
  alternatives_spanish:
  - no quiero que sean ignorantes
  - no quiero que lo desconozcan
  - no quiero que estén desinformados
  lexicon: BDAG
  rationale: La construcción idiomática paulina expresa que la comunidad no debe carecer de conocimiento sobre el tema. «Estén sin conocimiento» conserva el sentido básico de ἀγνοεῖν sin cargar con el matiz peyorativo que «ignorantes» puede tener en español.
theological_decisions:
- issue: Alcance de τῶν πνευματικῶν
  english_pob_reading: Rendered as 'spiritual things' in the main text, with 'spiritual gifts' preserved only as a contextual alternative in the audit trail.
  chosen_spanish_reading: «las cosas espirituales» en el texto principal
  alternative_spanish_readings:
  - los dones espirituales
  - las realidades espirituales
  - las personas espirituales
  rationale: La frase griega es deliberadamente amplia y no contiene la palabra «dones». Dado que el contexto inmediato desarrollará dones y manifestaciones del Espíritu, la traducción principal debe seguir siendo amplia para no cerrar la tensión léxica demasiado pronto.
  doctrine_reference: 'DOCTRINE.md Translation philosophy #3 (Preserve theological tension rather than resolve it)'
- issue: Inclusividad de ἀδελφοί
  english_pob_reading: '''Brothers'' is Paul’s form of address to the congregation and likely includes women as well.'
  chosen_spanish_reading: «hermanos» como vocativo congregacional
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanas y hermanos
  rationale: La forma masculina plural se mantiene como apelación paulina al conjunto de la iglesia, sin neutralizarla artificialmente. La nota preserva la observación de que el destinatario probablemente incluye a mujeres.
  doctrine_reference: POB translation policy on gender-accurate address and cultural notes
translation_notes:
  revision_awareness: El texto inglés revisado pasó de «spiritual gifts» a «spiritual things» porque τῶν πνευματικῶν es más amplio y no nombra explícitamente «dones». La versión española sigue esa revisión y evita introducir «dones» en el texto principal, reservando cualquier matiz interpretativo para la nota.
  spanish_consistency_notes:
  - Se mantuvo el registro bíblico sobrio y contemporáneo.
  - No se usó «Señor» ni otros términos no presentes en el versículo.
  - La ambigüedad de τῶν πνευματικῶν quedó preservada en el texto principal y aclarada solo en nota.
  - «Hermanos» se conservó como vocativo paulino, con nota de alcance inclusivo.
