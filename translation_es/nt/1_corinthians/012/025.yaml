translation:
  language: es
  text: para que no haya división[a] en el cuerpo, sino que los miembros tengan el mismo cuidado[b] unos por otros.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cisma». El término griego puede denotar una ruptura o desgarro; aquí se refiere a una división dentro del cuerpo.
    reason: lexical_alternative
  - marker: b
    text: O «cuiden unos de otros igualmente».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa la finalidad/resultación del griego de manera natural en español moderno y conserva el valor purposivo del contexto.
- source_word: σχίσμα
  english_pob_choice: division
  chosen_spanish: división
  alternatives_spanish:
  - cisma
  - ruptura
  lexicon: BDAG
  rationale: En este contexto paulino, el término señala una división o escisión dentro del cuerpo; 'división' es claro, directo y evita cargar el verso con el tecnicismo eclesiástico posterior de 'cisma'.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: Mantiene la metáfora corporal de Pablo sin explicarla ni neutralizarla. En el contexto de 1 Corintios 12, 'cuerpo' es la equivalencia directa y transparente.
- source_word: τὸ αὐτό
  english_pob_choice: the same concern
  chosen_spanish: la misma preocupación
  alternatives_spanish:
  - la misma atención
  - el mismo cuidado
  lexicon: BDAG
  rationale: El giro neutro funciona adverbialmente con μεριμνῶσι y comunica una actitud compartida e igual hacia los demás. 'Preocupación' conserva la idea de atención activa, aunque en español puede sonar algo más fuerte que 'cuidado'.
- source_word: ὑπὲρ ἀλλήλων
  english_pob_choice: for one another
  chosen_spanish: los unos por los otros
  alternatives_spanish:
  - unos por otros
  - unos a otros
  lexicon: BDAG
  rationale: Reproduce el sentido recíproco de ἀλλήλων y el matiz de interés dirigido hacia los demás. La formulación es idiomática en español bíblico sin volverse arcaica.
- source_word: μεριμνῶσι
  english_pob_choice: may have ... concern
  chosen_spanish: tengan ... preocupación
  alternatives_spanish:
  - se preocupen
  - cuiden
  lexicon: BDAG
  rationale: Aquí el verbo expresa cuidado/solicitud positiva, no ansiedad pecaminosa. 'Tengan ... preocupación' refleja esa actitud sostenida sin diluir la fuerza verbal.
- source_word: μέλη
  english_pob_choice: the members
  chosen_spanish: los miembros
  alternatives_spanish:
  - las partes
  - las extremidades
  lexicon: BDAG
  rationale: Dentro de la metáfora del cuerpo, 'miembros' es el término más preciso para las partes del cuerpo y, por extensión, los componentes de la comunidad.
theological_decisions:
- issue: Cómo traducir σχίσμα en un contexto eclesial sin imponer un tecnicismo posterior
  english_pob_reading: division
  chosen_spanish_reading: división
  alternative_spanish_readings:
  - cisma
  - escisión
  rationale: La POB inglesa evita 'schism' y elige 'division' para mantener el sentido inmediato de ruptura interna sin cargar el texto con una categoría eclesiástica posterior. En español, 'división' preserva ese equilibrio.
  doctrine_reference: 'Principio POB: primacía del original y claridad moderna, evitando tecnicismos heredados cuando el griego no los exige.'
- issue: 'Matiz de μεριμνῶσι: cuidado mutuo, no ansiedad'
  english_pob_reading: have the same concern for one another
  chosen_spanish_reading: tengan la misma preocupación los unos por los otros
  alternative_spanish_readings:
  - se cuiden mutuamente
  - tengan el mismo cuidado
  rationale: El contexto es la edificación del cuerpo y la cooperación entre sus miembros; por eso el verbo se entiende como cuidado solidario. 'Preocupación' conserva la dimensión activa del interés mutuo, sin convertirla en temor o ansiedad desordenada.
  doctrine_reference: 'Uso contextual de μεριμνάω: preocupación/cuidado positivos según el contexto.'
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la lectura auditada en inglés: σχίσμα como ''división'', σῶμα como ''cuerpo'', μεριμνῶσι como cuidado mutuo positivo y τὸ αὐτό como igualdad o identidad de atención. No se introdujeron cambios textuales respecto del pasaje base; solo se ajustó el español para naturalidad y precisión semántica.'
  spanish_consistency_notes:
  - Se mantiene 'cuerpo' para σῶμα y 'miembros' para μέλη, en coherencia con la metáfora paulina.
  - Se evita 'SEÑOR' u otras sustituciones irrelevantes porque el verso no contiene el nombre divino.
  - '''División'' se usa en vez de ''cisma'' en el texto principal para seguir la decisión auditada de la POB inglesa.'
  - La construcción 'los unos por los otros' conserva la reciprocidad de ἀλλήλων sin perder fluidez en español.
