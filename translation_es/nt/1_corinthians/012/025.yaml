    issue: «la misma preocupación» sugiere ansiedad más que cuidado mutuo
    rationale: μεριμνῶσι aquí describe solicitud positiva entre los miembros del cuerpo. En español bíblico y general, «preocupación» suele inclinarse a inquietud o ansiedad; «cuidado» o «solicitud» preserva mejor el sentido contextual y la intención de la POB inglesa.
  - severity: medium
    issue: La nota [b] está mal anclada
    rationale: El marcador [b] aparece sobre «miembros», pero la nota ofrece una alternativa para la cláusula «tengan la misma preocupación/cuidado...», no para «miembros». Los marcadores deben aparecer en la palabra o frase pertinente.
  - severity: low
