    rationale: La nota de estilo existe solo para defender una elección menos natural. Con «cuidado» en el texto, la explicación adicional deja de aportar valor y simplifica el aparato de notas.
  revised_spanish_text: para que no haya división[a] en el cuerpo, sino que los miembros tengan el mismo cuidado[b] unos por otros.
