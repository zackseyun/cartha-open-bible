translation:
  language: es
  text: Pero, tal como es[a], hay muchos miembros, pero un solo cuerpo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «muchas partes, pero un solo cuerpo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν
  english_pob_choice: as it is
  chosen_spanish: así es
  alternatives_spanish:
  - ahora
  - tal como está
  lexicon: BDAG
  rationale: En este contexto argumentativo, νῦν expresa el estado real de las cosas más que un simple valor temporal. «Así es» conserva esa fuerza de realidad presente con naturalidad en español.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con la afirmación implícita anterior. «Pero» refleja bien ese giro adversativo sin sonar forzado.
- source_word: πολλὰ ... μέλη
  english_pob_choice: many parts
  chosen_spanish: muchos miembros
  alternatives_spanish:
  - muchas partes
  - muchos miembros del cuerpo
  lexicon: BDAG
  rationale: En el símil corporal de Pablo, μέλη se refiere a los componentes del cuerpo. «Miembros» preserva mejor la metáfora corporal tradicional en español y mantiene la tensión semántica que el inglés resolvió con «parts».
- source_word: μὲν ... δὲ
  english_pob_choice: many parts, yet one body
  chosen_spanish: muchos miembros, y un solo cuerpo
  alternatives_spanish:
  - muchos miembros, pero un solo cuerpo
  - por una parte, muchos miembros; por la otra, un solo cuerpo
  lexicon: BDAG
  rationale: La correlación μέν...δέ contrapone pluralidad y unidad. En español, «y» con la estructura paralela comunica la antítesis de manera fluida; «pero» también sería posible y se conserva como alternativa.
- source_word: ἓν
  english_pob_choice: one
  chosen_spanish: un solo
  alternatives_spanish:
  - uno
  - único
  lexicon: BDAG
  rationale: El numeral resalta la unidad frente a la pluralidad. «Un solo» enfatiza esa unidad exclusiva de forma natural en español.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - cuerpo humano
  - organismo
  lexicon: BDAG
  rationale: σῶμα es literal dentro de la metáfora paulina. «Cuerpo» preserva la imagen y el valor teológico de unidad orgánica.
theological_decisions:
- issue: μέλη en la metáfora del cuerpo
  english_pob_reading: parts
  chosen_spanish_reading: miembros
  alternative_spanish_readings:
  - partes
  rationale: Aunque la POB inglesa optó por «parts» para claridad contemporánea, en español «miembros» sigue siendo natural, exacto y mantiene la resonancia corporal y eclesial del pasaje. No se usa como jerga institucional, sino como parte del cuerpo metafórico de Pablo.
  doctrine_reference: Translation philosophy §§5–6
translation_notes:
  revision_awareness: 'El texto griego es breve y estable; la versión inglesa auditada también se mantuvo sin cambios en su revisión más reciente. La decisión principal en español es léxica: recuperar «miembros» en lugar de «partes» sin alterar la antítesis ni la unidad del enunciado.'
  spanish_consistency_notes:
  - Se mantuvo «cuerpo» para σῶμα por coherencia con la metáfora paulina.
  - Se evitó «Cristo» o terminología doctrinal añadida porque el versículo no la contiene.
  - La puntuación reproduce una cláusula breve y balanceada, conforme al paralelismo del griego.
