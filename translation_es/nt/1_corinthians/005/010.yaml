review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: Pablo aclara que no se refería en absoluto a evitar a todos los inmorales del mundo, porque eso implicaría salir del mundo. La lista de vicios está bien representada en conjunto. Sin embargo, hay dos desajustes importantes: (1) «no significa en absoluto» suena impersonal y menos natural que una formulación que explicite el verbo elidido de aclaración contextual; (2) el sujeto de «tendrían que» cambia indebidamente de segunda persona plural a tercera plural, mientras que ὠφείλετε es claramente «ustedes». Además, la nota [a] está anclada en «sexualmente inmorales», pero su contenido trata de ἅρπαξιν, por lo que el anclaje es incorrecto.'
  spanish_quality_summary: El español es generalmente claro y legible, pero presenta detalles de naturalidad y coherencia. «Los sexualmente inmorales» resulta comprensible pero algo calcado; «los que son sexualmente inmorales» o «los inmorales sexuales» sería más idiomático, aunque el primero es más pesado. La reparación más necesaria es «tendrían que» → «tendrían que ustedes» no es natural; lo correcto es reformular toda la cláusula como «pues entonces ustedes tendrían que salir del mundo». También debe moverse la marca [a] a «estafadores» para que coincida con la nota léxica.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. «Idólatras» y «mundo» están bien. «Avaros» es aceptable para πλεονέκταις, aunque «codiciosos» también sería posible. «Estafadores» para ἅρπαξιν encaja con la decisión inglesa, siempre que la nota alternativa quede anclada en ese término.
  issues:
  - severity: high
    issue: Cambio indebido de persona gramatical en «tendrían que»
    rationale: El griego ὠφείλετε está en segunda persona plural («ustedes tendrían que»), pero el borrador usa tercera plural sin sujeto expreso, lo que debilita la relación directa con los destinatarios.
  - severity: high
    issue: La nota [a] está anclada en la frase equivocada
    rationale: La nota explica alternativas para ἅρπαξιν («estafadores»), pero el marcador [a] aparece en «sexualmente inmorales». Esto incumple la disciplina de notas y puede confundir al lector.
  - severity: medium
    issue: «no significa en absoluto» es menos natural en este contexto epistolar que «no quise decir en absoluto»
    rationale: El contexto es una aclaración de lo que Pablo quiso decir en la instrucción anterior. La formulación impersonal no es errónea, pero una expresión verbal personal preserva mejor la fuerza contextual del original y del sentido auditado.
