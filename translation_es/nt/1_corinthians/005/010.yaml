  to: no quise decir en absoluto a los sexualmente inmorales de este mundo, ni a los avaros y estafadores[a], ni a los idólatras[b], pues entonces ustedes tendrían que salir del mundo.
  rationale: Se corrige la persona gramatical para reflejar ὠφείλετε («ustedes tendrían que»), se mueve la nota léxica al término que realmente comenta («estafadores»), y se mejora la naturalidad contextual con «no quise decir en absoluto», que expresa mejor la aclaración de la instrucción previa. También se ajusta la coordinación a «ni... ni...» para una lista más natural en español.
