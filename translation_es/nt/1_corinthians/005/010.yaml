translation:
  language: es
  text: no quise decir en absoluto a los sexualmente inmorales de este mundo, ni a los avaros y estafadores[a], ni a los idólatras[b], pues entonces ustedes tendrían que salir del mundo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ladrones» o «extorsionadores» para ἅρπαξιν; el término puede referirse a quienes se apropian de lo ajeno por la fuerza o mediante explotación.
    reason: lexical_alternative
  - marker: b
    text: Pablo está aclarando que no quiso decir que los creyentes deban evitar a toda persona inmoral fuera de la iglesia; compárese la aplicación en 1 Corintios 5:11.
    reason: cross_reference
lexical_decisions:
- source_word: οὐ πάντως
  english_pob_choice: not at all meaning
  chosen_spanish: no significa en absoluto
  alternatives_spanish:
  - no quiere decir en absoluto
  - de ningún modo significa
  - no significa nada menos que
  lexicon: BDAG
  rationale: La frase griega aclara y corrige una posible mala lectura de lo anterior; en español, «no significa en absoluto» conserva la fuerza enfática y la función aclaratoria sin volverlo rígido.
- source_word: πόρνοις
  english_pob_choice: the sexually immoral
  chosen_spanish: los sexualmente inmorales
  alternatives_spanish:
  - los inmorales sexuales
  - los fornicarios
  - los inmorales
  lexicon: BDAG
  rationale: «Sexualmente inmorales» preserva la especificidad sexual del término πόρνος mejor que un genérico como «inmorales» y evita un tecnicismo eclesiástico menos transparente.
- source_word: τοῦ κόσμου τούτου
  english_pob_choice: of this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este siglo
  - de este orden del mundo
  - mundanos
  lexicon: BDAG
  rationale: La expresión natural «de este mundo» conserva la referencia al entorno humano fuera de la iglesia y sigue de cerca el griego sin forzar una paráfrasis.
- source_word: πλεονέκταις
  english_pob_choice: the greedy
  chosen_spanish: los avaros
  alternatives_spanish:
  - los codiciosos
  - los ávidos
  - los codiciosos de más
  lexicon: BDAG
  rationale: Aunque el inglés POB usa «greedy», en español «avaros» comunica con mayor naturalidad la disposición de querer más; aquí el término conserva el valor moral de explotación potencial.
- source_word: καὶ ἅρπαξιν
  english_pob_choice: and swindlers
  chosen_spanish: y estafadores
  alternatives_spanish:
  - y rapaces
  - y ladrones
  - y extorsionadores
  lexicon: BDAG
  rationale: ἅρπαξιν puede abarcar a quienes toman por fuerza o por explotación; «estafadores» refleja bien el matiz de apropiación fraudulenta en español contemporáneo. Se mantiene la tensión semántica amplia sin estrecharlo solo a robo violento.
- source_word: εἰδωλολάτραις
  english_pob_choice: idolaters
  chosen_spanish: idólatras
  alternatives_spanish:
  - adoradores de ídolos
  - personas idólatras
  lexicon: BDAG
  rationale: «Idólatras» es el equivalente directo, claro y tradicional del término, sin necesidad de explicitarlo más en el texto principal.
- source_word: ἐπεὶ
  english_pob_choice: since then
  chosen_spanish: pues entonces
  alternatives_spanish:
  - porque entonces
  - ya que entonces
  - de otra manera
  lexicon: BDAG
  rationale: La partícula introduce la consecuencia lógica del argumento; «pues entonces» reproduce bien ese enlace inferencial en español natural.
- source_word: ὠφείλετε
  english_pob_choice: you would have to
  chosen_spanish: tendrían que
  alternatives_spanish:
  - habrían de
  - estarían obligados a
  - les tocaría
  lexicon: BDAG
  rationale: En este razonamiento hipotético, la forma expresa necesidad práctica más que deuda literal; «tendrían que» comunica la fuerza argumentativa de manera idiomática.
- source_word: ἐκ τοῦ κόσμου ἐξελθεῖν
  english_pob_choice: go out of the world
  chosen_spanish: salir del mundo
  alternatives_spanish:
  - abandonar el mundo
  - irse del mundo
  - salir de este mundo
  lexicon: BDAG
  rationale: La imagen es deliberadamente tajante; «salir del mundo» preserva la literalidad y el tono hiperbólico del argumento, igual que en el inglés POB.
theological_decisions:
- issue: Alcance de la separación de los creyentes respecto de los inmorales fuera de la iglesia
  english_pob_reading: Paul denies that his earlier instruction meant total social withdrawal from all immoral people in society.
  chosen_spanish_reading: Pablo niega que su instrucción anterior implicara un retiro total de todos los inmorales de la sociedad.
  alternative_spanish_readings:
  - Pablo ordena aislarse por completo de toda persona inmoral
  - Pablo enseña separación total de los incrédulos inmorales
  rationale: El griego afirma que, si esa fuera la interpretación, sería necesario salir del mundo. La redacción española preserva esa aclaración y evita sugerir un separatismo que el verso descarta explícitamente.
  doctrine_reference: 1 Corintios 5:10–11; principio de lectura contextual
- issue: Relación entre «avaros» y «estafadores» en la lista de vicios
  english_pob_reading: The Greek term ἅρπαξ can denote those who seize from others by force or exploitation.
  chosen_spanish_reading: «Estafadores» se usa como equivalente funcional para ἅρπαξιν, manteniendo la idea de apropiación explotadora.
  alternative_spanish_readings:
  - ladrones
  - rapaces
  - extorsionadores
  rationale: La lista reúne formas de apropiación injusta; en español, «estafadores» comunica con claridad la explotación fraudulenta sin reducir el término solo al hurto violento. Se preserva así la amplitud moral del vocablo.
  doctrine_reference: BDAG; nota lexical del POB inglés
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente, que indica que no hubo cambios necesarios y que existe alto acuerdo entre la traducción inglesa POB y la verificación externa; por eso la redacción española sigue de cerca la decisión léxica ya auditada sin introducir variantes no justificadas.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no hay nombres divinos en este versículo.
  - Se conserva el valor de lista de vicios con términos moralmente fuertes y contemporáneos.
  - La nota a pie de página a aclara la amplitud semántica de ἅρπαξιν sin reemplazar el término principal.
  - La nota b preserva el sentido aclaratorio del verso y su vínculo con el contexto inmediato.
