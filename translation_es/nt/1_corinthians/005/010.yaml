  - marker: b
    text: Pablo está aclarando que no quiso decir que los creyentes deban evitar a toda persona inmoral fuera de la iglesia; compárese la aplicación en 1 Corintios 5:11.
    reason: cross_reference
  revision_rationale: Se corrige la persona gramatical para reflejar ὠφείλετε («ustedes tendrían que»), se mueve la nota léxica al término que realmente comenta («estafadores»), y se mejora la naturalidad contextual con «no quise decir en absoluto», que expresa mejor la aclaración de la instrucción previa. También se ajusta la coordinación a «ni... ni...» para una lista más natural en español.
