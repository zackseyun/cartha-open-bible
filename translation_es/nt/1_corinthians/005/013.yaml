translation:
  language: es
  text: Pero Dios juzga a los de afuera[a][b]. Saquen[c] a la persona malvada de entre ustedes mismos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los que están afuera».
    reason: lexical_alternative
  - marker: b
    text: El verbo griego está en presente («juzga»), aunque algunas traducciones lo vierten como futuro por el contexto.
    reason: lexical_alternative
  - marker: c
    text: O «Expulsen a la persona malvada de entre ustedes mismos». La formulación evoca las fórmulas de purga del pacto en Deuteronomio.
    reason: cross_reference
lexical_decisions:
- source_word: τοὺς ... ἔξω
  english_pob_choice: those outside
  chosen_spanish: los de afuera
  alternatives_spanish:
  - los que están afuera
  - los de fuera
  lexicon: BDAG
  rationale: El adverbio sustantivado funciona como designación de personas fuera de la comunidad. «Los de afuera» conserva esa referencia relacional de manera natural en español sin añadir más especificación de la que ofrece el griego.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca contraste con el mandato inmediato anterior sobre los de adentro. «Pero» transmite bien esa oposición en español actual.
- source_word: κρίνει
  english_pob_choice: judges
  chosen_spanish: juzga
  alternatives_spanish:
  - juzgará
  lexicon: BDAG
  rationale: El presente indicativo griego se conserva como presente en español. Aunque el contexto podría sugerir futuro en algunas versiones, la forma verbal apunta a una afirmación presente y general.
- source_word: ἐξάρατε
  english_pob_choice: Remove
  chosen_spanish: Saquen
  alternatives_spanish:
  - Quítenlo
  - Expulsen
  - Retiren
  lexicon: BDAG
  rationale: El imperativo aoristo exige una acción decisiva. «Saquen» es idiomático y comunica exclusión efectiva de la comunidad sin imponer un tecnicismo eclesiástico no presente en el griego.
- source_word: τὸν πονηρὸν
  english_pob_choice: the evil person
  chosen_spanish: al malo
  alternatives_spanish:
  - a la persona mala
  - al perverso
  - al impío
  lexicon: BDAG
  rationale: El griego usa masculino singular con artículo, pero el audit trail inglés revisó «man» por «person» para evitar sobredeterminar el sexo. En español, «al malo» mantiene la caracterización moral y deja abierta la referencia concreta al ofensor del contexto inmediato.
- source_word: ἐξ ὑμῶν αὐτῶν
  english_pob_choice: from among yourselves
  chosen_spanish: de entre ustedes mismos
  alternatives_spanish:
  - de entre ustedes
  - de su propio medio
  lexicon: BDAG
  rationale: La expresión idiomática señala extracción del seno de la comunidad. «De entre ustedes mismos» reproduce el sentido comunitario con naturalidad en español.
theological_decisions:
- issue: Disciplina comunitaria frente al juicio de los de afuera
  english_pob_reading: The verse commands the congregation to exclude the offending person from their fellowship, while leaving judgment of outsiders to God.
  chosen_spanish_reading: El versículo ordena a la congregación excluir a la persona ofensora de su comunión, mientras deja el juicio de los de afuera en manos de Dios.
  alternative_spanish_readings:
  - El versículo ordena simplemente apartar el mal de la comunidad.
  - El versículo puede entenderse de forma más general como una purificación comunitaria.
  rationale: El contexto de 1 Corintios 5 contrapone claramente a los de adentro con los de afuera. La traducción evita imponer terminología eclesiástica posterior, pero sí hace explícita la exclusión comunitaria que el imperativo implica.
  doctrine_reference: Translation philosophy §§1, 3, 4, 6
translation_notes:
  revision_awareness: El inglés POB revisó «evil man» a «evil person» para no imponer masculinidad semántica al sintagma; en español, el griego permite una referencia concreta al ofensor del contexto, pero se eligió «al malo» para conservar la fuerza moral sin sobredeterminar el género. También se preservó el presente de κρίνει, como en el audit trail inglés.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y no se usa una forma velada como «Señor» porque aquí el texto griego nombra explícitamente a Dios.
  - Se usa «de afuera» / «de entre ustedes» para conservar la oposición comunitaria de ἔξω y ἐξ ὑμῶν αὐτῶν.
  - No se introduce «Cristo» ni terminología litúrgica ajena al versículo.
  - La puntuación sigue el tono sentencioso del griego, con dos cláusulas breves y paralelas.
