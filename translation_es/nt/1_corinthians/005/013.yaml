  source_alignment_summary: El borrador transmite correctamente el contraste de δὲ, conserva el presente de κρίνει como «juzga», y refleja bien la idea comunitaria de ἐξ ὑμῶν αὐτῶν. También mantiene la nota alternativa sobre «los de afuera» y la observación verbal. Sin embargo, el anclaje de la nota [c] está colocado sobre «ustedes mismos» cuando la alternativa y la alusión deuteronómica pertenecen al imperativo completo «Saquen… de entre ustedes». Además, «al malo» suena algo reducido y menos natural/digno en español bíblico que «a la persona malvada» o similar.
  spanish_quality_summary: El español es claro y legible, pero requiere un ajuste menor de naturalidad y de manejo de notas. «Los de afuera» funciona bien en español general. «Saquen» es idiomático. «Al malo» es comprensible, pero en registro bíblico moderno puede sonar coloquial o categorial; «a la persona malvada» expresa mejor la caracterización moral sin forzar masculino específico. La nota [c] debe anclarse en la cláusula imperativa, no solo al sintagma final.
  glossary_alignment: No hay conflicto con la terminología principal del proyecto. «Dios» para θεός es correcto. No aparecen términos sensibles como Yahvé, Mesías, Espíritu, etc. La decisión de evitar masculino específico sigue el audit trail inglés revisado.
  issues:
