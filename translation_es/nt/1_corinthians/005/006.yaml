translation:
  language: es
  text: No es buena su jactancia[a]. ¿No saben que un poco de levadura leuda toda la masa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la masa entera».
    reason: lexical_alternative
lexical_decisions:
- source_word: καλὸν
  english_pob_choice: good
  chosen_spanish: bueno
  alternatives_spanish:
  - apropiado
  - correcto
  lexicon: BDAG
  rationale: καλός aquí evalúa negativamente la jactancia de los corintios. «Bueno» conserva el juicio directo y natural sin sobreexplicar.
- source_word: καύχημα
  english_pob_choice: boasting
  chosen_spanish: jactancia
  alternatives_spanish:
  - gloriarse
  - boast
  - orgullo
  lexicon: BDAG
  rationale: El sustantivo puede referir al acto o al motivo de gloriarse. En español, «jactancia» comunica mejor el tono reprobatorio que «boasting» en inglés y evita suavizar la carga del término.
- source_word: οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben?
  alternatives_spanish:
  - ¿No entienden?
  - ¿No se dan cuenta?
  lexicon: BDAG
  rationale: La fórmula retórica paulina se conserva en forma interrogativa directa. «Saben» mantiene la función de οἶδα como conocimiento esperado, sin añadir explicación interpretativa.
- source_word: μικρὰ
  english_pob_choice: a little
  chosen_spanish: un poco de
  alternatives_spanish:
  - una pequeña cantidad de
  lexicon: BDAG
  rationale: «Un poco de» reproduce la cantidad mínima con naturalidad en español y encaja con la imagen proverbial.
- source_word: ζύμη
  english_pob_choice: leaven
  chosen_spanish: levadura
  alternatives_spanish:
  - fermento
  lexicon: BDAG
  rationale: «Levadura» es el equivalente transparente y bíblicamente inteligible en español moderno. Conserva la imagen de la metáfora sin necesidad de calco arcaico.
- source_word: ὅλον
  english_pob_choice: the whole
  chosen_spanish: toda
  alternatives_spanish:
  - todo el
  - la entera
  lexicon: BDAG
  rationale: El adjetivo expresa totalidad. En español, concuerda naturalmente con «masa» y mantiene la fuerza totalizante.
- source_word: φύραμα
  english_pob_choice: batch of dough
  chosen_spanish: masa
  alternatives_spanish:
  - lump of dough
  - mezcla
  lexicon: BDAG
  rationale: φύραμα se refiere a masa amasada. «Masa» es más transparente que «lump» en español y preserva la imagen del panificación sin ampliar el sentido.
- source_word: ζυμοῖ
  english_pob_choice: leavens
  chosen_spanish: leuda
  alternatives_spanish:
  - fermenta
  - hace leudar
  lexicon: BDAG
  rationale: «Leuda» mantiene la relación léxica con «levadura» y refleja el verbo causativo del griego. Aunque menos común que «fermenta», es más preciso para la imagen panadera.
theological_decisions:
- issue: Imagen metafórica de la levadura
  english_pob_reading: Retain the leaven metaphor without explicating its moral referent in the translation.
  chosen_spanish_reading: Conservar la metáfora de la levadura sin explicitar en la traducción que alude al pecado o a la corrupción moral.
  alternative_spanish_readings:
  - 'Explicar interpretativamente: «un poco de pecado corrompe todo el grupo»'
  - Sustituir la imagen por una paráfrasis moral
  rationale: La frase de Pablo funciona como proverbio y deja que el contexto inmediato determine la aplicación. Mantener la metáfora respeta la forma del argumento y la transparencia al texto fuente.
  doctrine_reference: Translation philosophy items 1 and 3
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto principal y la nota correspondiente queda anclada. No se introdujeron otros marcadores ni notas sin ancla.'
  spanish_consistency_notes:
  - Se prefirió «jactancia» para καύχημα por su tono reprochatorio.
  - Se mantuvo la metáfora panadera con «levadura» y «masa», evitando una expansión interpretativa.
  - La fórmula retórica se conservó como pregunta directa para reflejar οὐκ οἴδατε.
  - Se usó un español neutral, bíblico y contemporáneo, sin calcos innecesarios.
