translation:
  language: es
  text: Y ustedes están engreídos[a], y ¿no deberían más bien haber hecho duelo, para que sea quitado de en medio de ustedes el que hizo este hecho?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «inflados de orgullo». El griego conserva la metáfora de estar «hinchados»; en este contexto se entiende como soberbia.
    reason: lexical_alternative
lexical_decisions:
- source_word: πεφυσιωμένοι
  english_pob_choice: puffed up
  chosen_spanish: están engreídos
  alternatives_spanish:
  - están inflados de orgullo
  - están llenos de soberbia
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa un estado ya establecido. «Engreídos» conserva la idea de orgullo inflado sin sonar mecánico en español; evita volverlo simplemente «arrogantes», que suena más interpretativo y menos metafórico.
- source_word: οὐχὶ μᾶλλον
  english_pob_choice: should you not rather
  chosen_spanish: ¿no más bien debieron haberse lamentado?
  alternatives_spanish:
  - ¿no deberían más bien haberse lamentado?
  - ¿no era mejor que se lamentaran?
  lexicon: BDAG
  rationale: La combinación introduce una pregunta de reprensión. En español, «¿no más bien debieron haberse lamentado?» mantiene el contraste retórico y el tono correctivo, sin perder naturalidad.
- source_word: ἐπενθήσατε
  english_pob_choice: have mourned
  chosen_spanish: haberse lamentado
  alternatives_spanish:
  - haber llorado
  - haber hecho duelo
  lexicon: BDAG
  rationale: El aoristo pide una respuesta puntual ya esperable. «Lamentado» conserva el campo semántico del duelo o tristeza intensa, y funciona bien en español comunitario; «hecho duelo» sería más formal pero menos idiomático.
- source_word: ἵνα ἀρθῇ
  english_pob_choice: so that ... might be removed
  chosen_spanish: para que sea quitado
  alternatives_spanish:
  - para que sea removido
  - a fin de que sea tomado
  lexicon: BDAG
  rationale: «Ἀρθῇ» puede significar «ser quitado» o «ser removido». «Sea quitado» conserva la pasiva y la amplitud del verbo, y en contexto deja abierta la aplicación disciplinaria que el auditorio entendería.
- source_word: ἐκ μέσου ὑμῶν
  english_pob_choice: from among you
  chosen_spanish: de en medio de ustedes
  alternatives_spanish:
  - de entre ustedes
  - de su medio
  lexicon: BDAG
  rationale: La locución es idiomática de exclusión comunitaria. «De en medio de ustedes» refleja con claridad el valor colectivo y espacial del griego, sin introducir una terminología eclesiástica más específica de la que el verso mismo da.
- source_word: ὁ τὸ ἔργον τοῦτο ποιήσας
  english_pob_choice: the one who did this deed
  chosen_spanish: el que hizo esta obra
  alternatives_spanish:
  - el que cometió este hecho
  - el que hizo esta cosa
  lexicon: BDAG
  rationale: El participio sustantivado identifica al ofensor. «Obra» conserva la carga seria de ἔργον mejor que un simple «acto»; «hizo esta obra» suena algo más literal pero sigue siendo natural y mantiene la gravedad del lenguaje paulino.
theological_decisions:
- issue: 'Alcance de ἀρθῇ: remoción comunitaria vs. acción divina'
  english_pob_reading: removed from among you
  chosen_spanish_reading: sea quitado de en medio de ustedes
  alternative_spanish_readings:
  - sea removido de en medio de ustedes
  - sea apartado de entre ustedes
  rationale: El contexto inmediato apunta a disciplina de la congregación; por eso la versión conserva una lectura amplia de remoción sin especificar excomunión ni muerte. «Sea quitado» mantiene la ambigüedad útil del pasivo y se alinea con el audit trail inglés.
  doctrine_reference: Mantener la tensión interpretativa del texto; disciplina congregacional en contexto (vv. 3–5, 13)
translation_notes:
  revision_awareness: Se siguió el pasaje fuente griego SBLGNT y el rastro de auditoría inglés. No se dependió de una traducción inglesa como base mecánica; se preservó la metáfora de orgullo, la reprensión retórica y la ambigüedad de ἀρθῇ en un español publicable.
  spanish_consistency_notes:
  - Se usó «Y ustedes» para reflejar el énfasis enfático de ὑμεῖς.
  - Se mantuvo un registro neutral y eclesialmente legible, sin introducir «excomulgado» o «expulsado» porque el verso no los explicita.
  - «De en medio de ustedes» y la nota preservan la alternativa de «ser quitado» en sentido comunitario.
