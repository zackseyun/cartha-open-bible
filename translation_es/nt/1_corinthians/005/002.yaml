- from: Y ustedes están engreídos[a], y ¿no más bien debieron haberse lamentado, para que sea quitado de en medio de ustedes el que hizo esta obra?
  to: Y ustedes están engreídos[a], y ¿no deberían más bien haber hecho duelo, para que sea quitado de en medio de ustedes el que hizo este hecho?
  rationale: Se ajusta la pregunta retórica a un español más natural y más fiel al matiz de reprensión de οὐχὶ μᾶλλον; se fortalece ἐπενθήσατε con «haber hecho duelo», que refleja mejor el sentido de duelo intenso; y se reemplaza «esta obra» por «este hecho», que suena más idiomático y adecuado al contexto sin sobreinterpretar el griego.
