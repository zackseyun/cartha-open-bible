    reason: lexical_alternative
  - marker: b
    text: Griego «Christos»; se traduce «Mesías» aquí porque el sentido de título es prominente en el contexto pascual.
    reason: alternative_reading
  revision_rationale: 'Se revisa para ajustarse a la decisión léxica y teológica del POB auditado: πάσχα se explicita como «cordero pascual» en este contexto, y Χριστός se mantiene como «Mesías». También se mejora la naturalidad del español con una aposición más clara y con notas que reflejan las alternativas realmente documentadas.'
