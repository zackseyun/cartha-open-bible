review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura principal del griego: imperativo de remover, propósito de llegar a ser una masa nueva, y base teológica en el sacrificio del Mesías. Sin embargo, en τὸ πάσχα ἡμῶν el borrador se aparta de la decisión auditada del POB inglés, que explicitó correctamente el referente sacrificial como «our Passover lamb» por causa de ἐτύθη y del contexto pascual. En español, «nuestra Pascua» es posible como literalidad, pero aquí deja demasiado implícito el referente y no preserva de forma suficiente la decisión semántica documentada.'
  spanish_quality_summary: El español es claro y legible, pero puede mejorar en naturalidad y precisión. «Quiten la levadura vieja» funciona, aunque «la vieja levadura» suena algo más idiomático en registro bíblico. El problema principal es «Porque nuestra Pascua, el Mesías, ha sido sacrificado», que resulta menos natural y algo opaco en español. «Porque el Mesías, nuestro cordero pascual, ha sido sacrificado» suena más claro, digno y coherente con el contexto.
  glossary_alignment: 'Se alinea bien con «Mesías» para Χριστός, conforme a la política del proyecto. No hay términos divinos en conflicto. La desviación importante está en πάσχα: el borrador prefirió una literalidad («nuestra Pascua») frente a la explicitación contextual auditada («our Passover lamb»). Dado que el POB ya documentó la razón teológica/lexical, el español debe seguir esa explicitación con «nuestro cordero pascual» o equivalente.'
  issues:
  - severity: high
    issue: τὸ πάσχα ἡμῶν se tradujo como «nuestra Pascua» en vez de explicitar el referente sacrificial.
    rationale: El griego puede decir literalmente «nuestra Pascua», pero el POB auditado decidió «our Passover lamb» por el contexto sacrificial reforzado por ἐτύθη. En español, mantener solo «nuestra Pascua» vuelve más opaco el sentido y no preserva la decisión semántica ya establecida.
  - severity: medium
    issue: La cláusula final «Porque nuestra Pascua, el Mesías, ha sido sacrificado» suena forzada en español.
    rationale: La aposición queda menos natural que en griego/inglés. Reordenar a «Porque el Mesías, nuestro cordero pascual, ha sido sacrificado» conserva mejor la relación appositiva y mejora la fluidez.
  - severity: low
    issue: La nota [a] no preserva la alternativa léxica relevante del inglés.
    rationale: La nota inglesa sobre «old leaven» conserva una alternativa para la cláusula de Pascua/Christos, no una explicación homilética sobre influencia corruptora. La nota española actual introduce interpretación en vez de reflejar la alternativa textual/lexical auditada.
  revised_spanish_text: Quiten la vieja levadura, para que sean una masa nueva, así como son sin levadura. Porque el Mesías, nuestro cordero pascual[a], ha sido sacrificado.[b]
  revised_footnotes:
