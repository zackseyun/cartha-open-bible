translation:
  language: es
  text: En el nombre de nuestro Señor Jesús[a], cuando ustedes se hayan reunido, y mi espíritu esté con ustedes, con el poder de nuestro Señor Jesús,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando ustedes estén reunidos, y mi espíritu esté con ustedes». El griego usa una construcción de genitivo absoluto algo comprimida, que en español puede expresarse como cláusula temporal o como participio circunstancial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ ὀνόματι
  english_pob_choice: In the name
  chosen_spanish: En el nombre
  alternatives_spanish:
  - en la autoridad de
  - por el nombre de
  lexicon: BDAG
  rationale: Se conserva la fórmula idiomática directa del griego y del POB inglés. En español, «en el nombre de» puede comunicar representación y autoridad sin forzar una paráfrasis.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Para κύριος aplicado a Jesús, «Señor» es la forma española natural y fiel al valor cristológico del título.
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: standard transliteration
  rationale: Nombre propio transliterado de manera estándar al español.
- source_word: συναχθέντων ὑμῶν
  english_pob_choice: when you are assembled
  chosen_spanish: cuando ustedes estén reunidos
  alternatives_spanish:
  - cuando ustedes se hayan reunido
  - cuando hayan sido reunidos
  lexicon: BDAG
  rationale: La construcción de genitivo absoluto se vierte como cláusula temporal natural en español. «Estén reunidos» expresa bien el sentido procedimental de la reunión sin introducir matices innecesarios.
- source_word: τοῦ ἐμοῦ πνεύματος
  english_pob_choice: my spirit is with you
  chosen_spanish: mi espíritu esté con ustedes
  alternatives_spanish:
  - mi espíritu está con ustedes
  - mi espíritu, estando con ustedes
  lexicon: BDAG
  rationale: El griego es elíptico dentro de la construcción absoluta. El español requiere completar el predicado para que el sentido sea claro y natural, manteniendo la afirmación de la participación espiritual de Pablo sin definir su mecanismo metafísico.
- source_word: σὺν
  english_pob_choice: with
  chosen_spanish: con
  alternatives_spanish:
  - juntamente con
  lexicon: BDAG
  rationale: «Con» expresa de manera directa la idea de acompañamiento presente en σὺν.
- source_word: δυνάμει
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - autoridad
  lexicon: BDAG
  rationale: En este contexto, δύναμις comunica eficacia operante; «poder» conserva bien esa fuerza semántica en español.
- source_word: τοῦ κυρίου ἡμῶν Ἰησοῦ
  english_pob_choice: of our Lord Jesus
  chosen_spanish: de nuestro Señor Jesús
  alternatives_spanish:
  - de nuestro Señor Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene el genitivo de pertenencia o relación de modo sencillo y transparente después de «poder».
theological_decisions:
- issue: Presencia de Pablo en la asamblea
  english_pob_reading: Paul speaks of his spirit as present with the congregation in a real but non-physical sense, rendered explicitly as 'my spirit is with you.'
  chosen_spanish_reading: «mi espíritu esté con ustedes» mantiene una presencia espiritual real, pero no corporal, sin especificar su mecanismo.
  alternative_spanish_readings:
  - mi espíritu está con ustedes
  - mi espíritu, estando con ustedes
  rationale: El texto afirma la participación de Pablo en la acción disciplinaria de la comunidad mediante su espíritu. La traducción conserva esa afirmación sin resolver la tensión metafísica que el original deja abierta.
  doctrine_reference: Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión inglesa reciente eliminó los guiones largos para mantener un tono más formal y directo; el español sigue esa decisión con una sintaxis continua y sobria, sin introducir pausas enfáticas innecesarias. También se mantuvo el sentido del genitivo absoluto como cláusula temporal, sin convertirlo en una paráfrasis explicativa excesiva.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος aplicado a Jesús, conforme al valor cristológico del término en el proyecto.
  - Se mantiene «Jesús» como nombre propio y no se sustituye por una forma litúrgica compuesta.
  - «Poder» se conserva para δύναμις por su adecuación semántica y su transparencia en español.
  - La puntuación evita recursos estilísticos ajenos al registro formal del POB.
