review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite correctamente la estructura y el sentido general del griego: actuación «en el nombre» de Jesús, la reunión de la iglesia, la presencia no corporal del espíritu de Pablo y la acción «con el poder» del Señor Jesús. Sin embargo, el modo subjuntivo repetido («estén… esté») suena menos directo que el original y que el POB inglés, que expresa la cláusula temporal/procedimental de forma más simple. Además, el punto final no corresponde al hecho de que el versículo griego continúa en el v. 5.'
  spanish_quality_summary: El español es claro y eclesialmente legible, pero puede mejorarse para mayor naturalidad y precisión discursiva. «Cuando ustedes se hayan reunido, y mi espíritu esté con ustedes» fluye mejor que «cuando ustedes estén reunidos, y mi espíritu esté con ustedes» en esta construcción, y evita un tono algo forzado por la secuencia de subjuntivos. También conviene conservar la coma final, no un punto, porque la oración sigue en el siguiente versículo.
  glossary_alignment: 'La terminología clave está bien alineada: κύριος -> «Señor», Ἰησοῦ -> «Jesús», πνεῦμα -> «espíritu», δύναμις -> «poder». No hay conflicto con los glosarios del proyecto. La nota alternativa debe seguir anclada en «Jesús[a]» como en el POB inglés.'
  issues:
  - severity: medium
    issue: Modo verbal algo rígido en la cláusula temporal/elíptica
    rationale: El griego usa un genitivo absoluto; el POB inglés lo resuelve con una cláusula temporal sencilla. En español, «cuando ustedes se hayan reunido, y mi espíritu esté con ustedes» suena más natural y procesual que «cuando ustedes estén reunidos, y mi espíritu esté con ustedes», sin perder sentido.
  - severity: medium
    issue: Puntuación final incorrecta para una oración continuada
    rationale: El texto fuente termina con coma, no con punto, porque la frase continúa en 1 Co 5:5. En una traducción segmentada conviene conservar esa apertura sintáctica con coma final.
  - severity: low
    issue: La nota usa «hayan sido reunidos» como alternativa principal
    rationale: Aunque posible por la forma pasiva del participio, en contexto eclesial puede sonar menos idiomático en español que «se hayan reunido». Puede mantenerse como alternativa secundaria o junto con otra explicación, pero no debería desplazar la opción más natural.
  revised_spanish_text: En el nombre de nuestro Señor Jesús[a], cuando ustedes se hayan reunido, y mi espíritu esté con ustedes, con el poder de nuestro Señor Jesús,
  revised_footnotes:
  - marker: a
    text: 'O: «cuando ustedes estén reunidos, y mi espíritu esté con ustedes». El griego usa una construcción de genitivo absoluto algo comprimida, que en español puede expresarse como cláusula temporal o como participio circunstancial.'
    reason: lexical_alternative
  revision_rationale: Se ajustó la cláusula temporal para un español más natural y fiel al valor procedimental del genitivo absoluto, y se restauró la coma final para reflejar que la oración continúa en el siguiente versículo. La nota se conservó, pero con una alternativa más idiomática en español y una razón alineada con el POB inglés.
