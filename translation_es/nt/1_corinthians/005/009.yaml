translation:
  language: es
  text: Les escribí en la carta[c] no asociarse con personas sexualmente inmorales[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las personas sexualmente inmorales». El griego πόρνοις se refiere a personas caracterizadas por inmoralidad sexual.
    reason: lexical_alternative
  - marker: b
    text: O «no mantener compañía con» o «no mezclarse con».
    reason: lexical_alternative
  - marker: c
    text: O «en mi carta». El griego puede referirse tanto a una carta anterior que Pablo había enviado como a esta misma carta en un punto previo.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἔγραψα
  english_pob_choice: I wrote
  chosen_spanish: Les escribí
  alternatives_spanish:
  - Escribí
  - Les he escrito
  lexicon: BDAG
  rationale: El aoristo Ἔγραψα se vierte de manera natural con pretérito perfecto simple en español. «Les escribí» conserva la referencia a un acto de escritura ya realizado sin forzar un valor aspectual más fuerte del que exige el griego.
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: BDAG
  rationale: El dativo plural de destinatario se expresa de forma natural con el clítico de objeto indirecto «les» en español. La forma mantiene la fluidez de la oración y deja el destinatario explícito por el contexto.
- source_word: ἐν τῇ ἐπιστολῇ
  english_pob_choice: in the letter
  chosen_spanish: en la carta
  alternatives_spanish:
  - en mi carta
  - en la epístola
  lexicon: BDAG
  rationale: «Carta» es el equivalente moderno más claro para ἐπιστολή. Conserva el artículo definido y, como en la versión inglesa, deja abierta la cuestión de si se trata de una carta anterior o de esta misma carta en una sección previa.
- source_word: μὴ συναναμίγνυσθαι
  english_pob_choice: not to associate with
  chosen_spanish: que no se mezclen con
  alternatives_spanish:
  - que no se asocien con
  - que no mantengan compañía con
  lexicon: BDAG
  rationale: El infinitivo presente medio con μή expresa la instrucción de evitar trato o mezcla cercana. «No se mezclen con» reproduce bien la fuerza de συναναμίγνυμι sin sonar arcaico, y conserva la amplitud social de la prohibición.
- source_word: πόρνοις
  english_pob_choice: sexually immoral people
  chosen_spanish: personas sexualmente inmorales
  alternatives_spanish:
  - los sexualmente inmorales
  - fornicarios
  lexicon: BDAG
  rationale: πόρνος designa a personas caracterizadas por inmoralidad sexual. «Personas sexualmente inmorales» preserva el referente personal plural y evita estrechar indebidamente el término a «fornicarios», que en español puede sonar más restrictivo o tradicional que el griego.
theological_decisions:
- issue: Referencia de «la carta»
  english_pob_reading: Paul refers to a specific letter known to the Corinthians, without specifying in translation whether it is a previous letter or this present correspondence.
  chosen_spanish_reading: Pablo se refiere a una carta concreta conocida por los corintios, sin resolver en la traducción si fue una carta anterior o esta misma correspondencia en un punto previo.
  alternative_spanish_readings:
  - Pablo alude a una carta anterior ya perdida
  - Pablo alude a una sección anterior de 1 Corintios
  rationale: La frase griega ἐν τῇ ἐπιστολῇ es definida, pero no determina por sí sola la situación histórica. «En la carta» preserva la ambigüedad textual en vez de resolverla interpretativamente.
  doctrine_reference: Preservar tensión histórica y textual sin sobreinterpretar el alcance de la referencia.
translation_notes:
  revision_awareness: Sin revisiones aplicadas en el último pase; el consenso de auditoría en inglés fue alto y no requirió cambios. La traducción española sigue ese trazado, preservando la ambigüedad de ἐν τῇ ἐπιστολῇ y la fuerza social de συναναμίγνυμι.
  spanish_consistency_notes:
  - Se mantiene «carta» en lugar de «epístola» por claridad y coherencia con el registro moderno digno del proyecto.
  - Se evita «fornicarios» como término principal porque no refleja con suficiente amplitud el campo semántico de πόρνοις en este contexto.
  - La construcción con «les» y «que no se mezclen con» reproduce de modo natural el destinatario plural y la prohibición de asociación social cercana.
