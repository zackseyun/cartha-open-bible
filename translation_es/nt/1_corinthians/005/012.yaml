translation:
  language: es
  text: ¿Qué tengo yo que ver con juzgar a los de afuera?[a] ¿No juzgan ustedes a los de adentro?[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «¿Qué tengo yo que ver con juzgar a los que están afuera?»'
    reason: lexical_alternative
  - marker: b
    text: Es decir, a los que están dentro de la comunidad cristiana.
    reason: cultural_note
lexical_decisions:
- source_word: τί γάρ μοι
  english_pob_choice: For what have I to do with
  chosen_spanish: ¿Qué tengo yo que ver con
  alternatives_spanish:
  - ¿Qué tengo yo que ver con juzgar
  - ¿Qué me toca a mí con
  lexicon: BDAG
  rationale: La expresión griega es idiomática y pregunta qué relación o incumbencia tiene el hablante respecto de la acción. En español, «¿Qué tengo yo que ver con…?» conserva bien ese valor idiomático sin volverse rígido ni perder el tono retórico.
- source_word: τοὺς ἔξω
  english_pob_choice: outsiders
  chosen_spanish: los de afuera
  alternatives_spanish:
  - los de afuera de la comunidad
  - los externos
  lexicon: BDAG
  rationale: El sustantivado de ἔξω señala a quienes están fuera del ámbito comunitario cristiano. «Los de afuera» es natural en español y mantiene el contraste comunitario del texto.
- source_word: κρίνειν
  english_pob_choice: to judge
  chosen_spanish: juzgar
  alternatives_spanish:
  - sentenciar
  - emitir juicio sobre
  lexicon: BDAG
  rationale: κρίνω aquí tiene sentido de juicio/disciplina. «Juzgar» es el equivalente más directo y suficientemente amplio en español para reflejar la función judicial y disciplinaria del verbo.
- source_word: οὐχὶ
  english_pob_choice: Is it not
  chosen_spanish: ¿No son
  alternatives_spanish:
  - ¿No es acaso
  - ¿No es verdad que
  lexicon: BDAG
  rationale: La partícula introduce una pregunta retórica que espera respuesta afirmativa. En español, «¿No son…?» mantiene esa fuerza interrogativa de manera fluida y natural.
- source_word: τοὺς ἔσω
  english_pob_choice: those inside
  chosen_spanish: a los de adentro
  alternatives_spanish:
  - a los de dentro
  - a los que están dentro
  lexicon: BDAG
  rationale: Como contraparte de «los de afuera», la frase debe conservar el paralelo comunitario. «Los de adentro» comunica con claridad a quienes pertenecen a la comunidad cristiana.
- source_word: ὑμεῖς κρίνετε
  english_pob_choice: you are to judge
  chosen_spanish: ustedes juzgan
  alternatives_spanish:
  - ustedes deben juzgar
  - ustedes han de juzgar
  lexicon: BDAG
  rationale: El presente indicativo en la pregunta retórica puede tener fuerza de obligación según el contexto. «Ustedes juzgan» preserva el enunciado interrogativo sin sobreexplicitar el matiz, dejando que el contexto de disciplina eclesial lo determine.
theological_decisions:
- issue: Alcance del juicio de la iglesia frente al mundo
  english_pob_reading: The verse distinguishes those outside the church from those inside it, limiting the church's disciplinary judgment to its own community.
  chosen_spanish_reading: El versículo distingue entre los de afuera y los de adentro, restringiendo el juicio disciplinario de la iglesia a su propia comunidad.
  alternative_spanish_readings:
  - Una prohibición general de juzgar a cualquier persona
  - Una autorización para juzgar a todos sin distinción
  rationale: El contexto inmediato (1 Co 5:9-13) trata de disciplina eclesial. La traducción conserva la oposición afuera/adentro sin ampliar indebidamente el alcance a una norma universal sobre todo juicio moral.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del contexto inmediato.
translation_notes:
  revision_awareness: Ajusté el inicio para reflejar mejor el giro idiomático de τί γάρ μοι y corregí la formulación para que ambos marcadores de nota aparezcan anclados en el texto. También mantuve el contraste comunitario explícito entre afuera y adentro, conforme al contexto de 1 Corintios 5.
  spanish_consistency_notes:
  - Conservé el paralelismo «los de afuera / los de adentro» para reflejar la antítesis griega.
  - Usé «juzgar» para κρίνειν por su adecuación al contexto disciplinario.
  - Mantuve un tono bíblico actual, digno y publicable, sin recurrir a la máscara «SEÑOR» ni a un lenguaje eclesiástico innecesariamente tradicional.
