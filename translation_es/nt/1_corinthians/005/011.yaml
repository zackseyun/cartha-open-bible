translation:
  language: es
  text: Pero ahora les escribí[b] que no se asocien con nadie que es llamado hermano[a] si es sexualmente inmoral, o avaro, o idólatra, o injurioso[c], o borracho, o estafador[d]; ni siquiera coman con tal persona.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «un supuesto hermano». La expresión griega puede dar la idea de alguien que lleva el nombre de hermano, es decir, un creyente profesante.
    reason: lexical_alternative
  - marker: b
    text: «Les escribí» puede referirse ya sea a la carta presente en estilo epistolar, o a una carta anterior; el griego mismo no lo especifica.
    reason: alternative_reading
  - marker: c
    text: O, «revilador». El término griego enfatiza un habla insultante o verbalmente abusiva.
    reason: lexical_alternative
  - marker: d
    text: O, «extorsionador». El término griego se refiere a quien arrebata o explota lo que pertenece a otros.
    reason: lexical_alternative
lexical_decisions:
- source_word: νῦν δὲ
  english_pob_choice: But now
  chosen_spanish: Pero ahora
  alternatives_spanish:
  - Mas ahora
  - Y ahora
  lexicon: BDAG
  rationale: Conserva el valor adversativo de δέ y el matiz temporal/discursivo de νῦν con una forma natural en español.
- source_word: ἔγραψα
  english_pob_choice: I am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - les he escrito
  - les escribí
  lexicon: BDAG
  rationale: Aunque el griego es aoristo, el contexto epistolar admite una referencia a la carta presente; 'les escribo' mantiene esa fuerza sin resolverla en el texto principal.
- source_word: μὴ συναναμίγνυσθαι
  english_pob_choice: not to associate
  chosen_spanish: para que no se asocien
  alternatives_spanish:
  - para no mezclarse
  - para no tener trato con
  lexicon: BDAG
  rationale: '''Asociarse'' comunica bien la prohibición de trato cercano o compañerismo, y funciona naturalmente con el infinitivo de finalidad en español.'
- source_word: ἐάν τις
  english_pob_choice: if anyone
  chosen_spanish: con nadie que
  alternatives_spanish:
  - si alguien
  - si una persona
  lexicon: BDAG
  rationale: La construcción española se adapta mejor con 'con nadie que' en el contexto negativo, manteniendo la generalidad indefinida del griego.
- source_word: ἀδελφὸς ὀνομαζόμενος
  english_pob_choice: who is called a brother
  chosen_spanish: llamándose hermano[a]
  alternatives_spanish:
  - que es llamado hermano
  - que lleva el nombre de hermano
  lexicon: BDAG
  rationale: La expresión preserva el participio pasivo y la idea de una profesión pública de fraternidad cristiana. El marcador remite a la alternativa lexical documentada.
- source_word: πόρνος
  english_pob_choice: sexually immoral
  chosen_spanish: sexualmente inmoral
  alternatives_spanish:
  - fornicario
  - inmoral sexual
  lexicon: BDAG
  rationale: Expresa el sentido amplio de conducta sexual ilícita sin reducirlo a una sola práctica específica.
- source_word: πλεονέκτης
  english_pob_choice: greedy
  chosen_spanish: avaro
  alternatives_spanish:
  - codicioso
  - codicia­dor
  lexicon: BDAG
  rationale: '''Avaro'' comunica bien la avidez posesiva o codiciosa del término en un registro bíblico claro y natural.'
- source_word: εἰδωλολάτρης
  english_pob_choice: an idolater
  chosen_spanish: idólatra
  alternatives_spanish:
  - adorador de ídolos
  lexicon: BDAG
  rationale: Coincide directamente con el sustantivo griego y es el equivalente más transparente en español.
- source_word: λοίδορος
  english_pob_choice: reviling
  chosen_spanish: injurioso
  alternatives_spanish:
  - insultador
  - maledicente
  - revilón
  lexicon: BDAG
  rationale: '''Injurioso'' recoge el campo de habla ofensiva o abusiva del término y suena natural en español contemporáneo.'
- source_word: μέθυσος
  english_pob_choice: a drunkard
  chosen_spanish: borracho
  alternatives_spanish:
  - ebrio habitual
  - dado a la bebida
  lexicon: BDAG
  rationale: En español, 'borracho' puede funcionar como carácter habitual en una lista de vicios; comunica la idea sin circunloquio excesivo.
- source_word: ἅρπαξ
  english_pob_choice: a swindler
  chosen_spanish: estafador
  alternatives_spanish:
  - extorsionador
  - rapaz
  - ladronzuelo
  lexicon: BDAG
  rationale: '''Estafador'' expresa mejor en español moderno la idea de quien se apodera de lo ajeno mediante engaño o explotación, en línea con la nota de ''swindler/extortioner''.'
- source_word: τῷ τοιούτῳ
  english_pob_choice: such a person
  chosen_spanish: tal persona
  alternatives_spanish:
  - a ese tal
  - a uno así
  lexicon: BDAG
  rationale: Mantiene la referencia resumptiva y la fuerza despectiva o clasificatoria del demostrativo.
- source_word: μηδὲ συνεσθίειν
  english_pob_choice: not even to eat with
  chosen_spanish: ni siquiera comer con
  alternatives_spanish:
  - ni siquiera sentarse a la mesa con
  - ni aun comer con
  lexicon: BDAG
  rationale: Conserva la concreción del gesto social de comer juntos y el énfasis de μηδέ con una construcción natural en español.
theological_decisions:
- issue: Referencia de ἔγραψα en contexto epistolar
  english_pob_reading: Rendered simply as past 'I wrote' without specifying whether Paul means this present letter or an earlier letter.
  chosen_spanish_reading: '''les escribo'' en el cuerpo principal, sin decidir explícitamente si el verbo mira a la carta actual o a una carta anterior.'
  alternative_spanish_readings:
  - '''les escribí'''
  - '''les he escrito'''
  rationale: El contexto permite la lectura epistolar presente, y el español puede reflejarla con naturalidad. La decisión no elimina la ambigüedad histórica; solo evita fijarla innecesariamente en la línea principal.
  doctrine_reference: 'Translation philosophy: preserve interpretive tension when the source is not explicit.'
- issue: Fuerza de ἀδελφὸς ὀνομαζόμενος
  english_pob_reading: A professing fellow believer, rendered 'who is called a brother.'
  chosen_spanish_reading: '''llamándose hermano[a]'' para reflejar una profesión pública de pertenencia.'
  alternative_spanish_readings:
  - '''que es llamado hermano'''
  - '''llamado hermano'''
  rationale: La frase griega no afirma necesariamente autenticidad espiritual plena, pero sí una designación reconocida dentro de la comunidad. El español elegido conserva esa tensión sin introducir más juicio del que el texto da.
  doctrine_reference: 'Translation philosophy: keep lexical and theological tension visible in the rendering.'
translation_notes:
  revision_awareness: La redacción incorpora el ajuste de la revisión más reciente al valor epistolar de ἔγραψα mediante un presente de escritura ('les escribo'), y conserva la equivalencia más estrecha para λοίδορος como conducta verbal ofensiva. También mantiene la tensión interpretativa sobre ἀδελφὸς ὀνομαζόμενος y la nota léxica equivalente a la alternativa inglesa de 'swindler/extortioner' para ἅρπαξ, sin convertirla en glosa interpretativa dominante.
  spanish_consistency_notes:
  - Se preserva un registro bíblico claro y contemporáneo, evitando 'fornicario' y 'reviler' por ser menos naturales para lectores generales.
  - '''Avaro'' se usa como equivalente de πλεονέκτης en lugar de ''codicioso'' porque en español eclesial suele comunicar mejor la idea de apego desordenado a ganar o poseer.'
  - No se introduce 'Cristo' ni terminología litúrgica, porque el versículo no lo requiere.
  - La lista de vicios se mantiene en paralelo y sin suavizar las categorías morales del griego.
