review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura general y la lista de vicios del griego, pero no preserva plenamente dos decisiones auditadas del POB inglés: ἔγραψα queda mejor como pasado simple no resuelto (''les escribí'') para conservar la tensión documentada, y faltan notas para esa ambigüedad verbal y para las alternativas de λοίδορος y ἅρπαξ. Además, la cláusula final necesita ajuste sintáctico en español para expresar con claridad el infinitivo dependiente: ''ni siquiera comer con tal persona'' suena elíptico; ''ni siquiera coman con tal persona'' o ''ni siquiera comer con una persona así'' la resuelve.'
  spanish_quality_summary: El español es generalmente claro y digno, pero presenta una construcción algo forzada en 'llamándose hermano' y una elipsis poco natural en 'ni siquiera comer con tal persona'. 'Que es llamado hermano' o 'que lleva el nombre de hermano' suena más natural y más cercano al participio pasivo. El resto del registro es adecuado; 'injurioso' es defendible, aunque conviene conservar la alternativa 'revilador/reviler' en nota, y 'estafador' funciona bien con nota alternativa 'extorsionador'.
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto. Los términos clave se manejan bien en general: ''hermano'', ''idólatra'', etc. La principal desalineación es metodológica con la decisión auditada sobre ἔγραψα: el español principal no debería resolver hacia presente epistolar sin nota, cuando el expediente inglés documenta la tensión y favorece mantener el pasado simple en el texto.'
  issues:
  - severity: high
    issue: ἔγραψα se vertió como presente ('les escribo') en vez de preservar el pasado simple no resuelto.
    rationale: El expediente inglés documenta como decisión teológica/lexical mantener el pasado simple 'I wrote' y no decidir en el texto entre aoristo epistolar o carta previa. El español puede preservar esto naturalmente con 'les escribí' y una nota sobre la alternativa 'les escribo'/'les he escrito'.
  - severity: medium
    issue: Faltan las notas equivalentes a las inglesas sobre ἔγραψα, λοίδορος y ἅρπαξ.
    rationale: El POB inglés conservó alternativas significativas; el español debe preservarlas cuando siguen siendo relevantes. Aquí ayudan tanto a fidelidad audit trail como a claridad léxica.
  - severity: medium
    issue: '''Llamándose hermano'' no refleja tan bien el participio pasivo ὀνομαζόμενος y suena menos natural.'
    rationale: La idea es 'que es llamado hermano' / 'llamado hermano', no principalmente 'autodenominándose'. El borrador puede inducir una lectura reflexiva no necesaria.
  - severity: medium
    issue: La cláusula final 'ni siquiera comer con tal persona' queda sintácticamente incompleta en español.
    rationale: Aunque calca el infinitivo griego, en español después de la cláusula principal negativa suena abrupto. 'Ni siquiera coman con tal persona' expresa bien la prohibición y mantiene claridad.
