  rationale: 'Se revisa para alinear el español con el expediente fuente y el audit trail del POB: se restituye el pasado de ἔγραψα con nota que preserva la ambigüedad contextual; se cambia ''llamándose hermano'' por una formulación pasiva más fiel a ὀνομαζόμενος; se completa la cláusula final con un imperativo natural en español; y se añaden las notas léxicas/interpretativas significativas que el inglés preservó.'
