  text: νῦν δὲ ἔγραψα ὑμῖν μὴ συναναμίγνυσθαι ἐάν τις ἀδελφὸς ὀνομαζόμενος ᾖ πόρνος ἢ πλεονέκτης ἢ εἰδωλολάτρης ἢ λοίδορος ἢ μέθυσος ἢ ἅρπαξ, τῷ τοιούτῳ μηδὲ συνεσθίειν.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/011.yaml
  text: But now I am writing to you not to associate with anyone who is called a brother if he is sexually immoral or greedy or an idolater or reviling or a drunkard or a swindler—not even to eat with such a person[a][b][c][d].
  footnotes:
  - marker: a
    text: Or, 'a so-called brother.' The Greek expression can carry the sense of someone who bears the name of a brother, that is, a professing believer.
    reason: lexical_alternative
  - marker: b
    text: '''I wrote'' may refer either to Paul''s present letter in epistolary style or to an earlier letter; the Greek itself does not specify.'
    reason: alternative_reading
  - marker: c
    text: Or, 'reviler' for 'abusive,' emphasizing insulting or verbally abusive speech.
    reason: lexical_alternative
  - marker: d
    text: Or, 'extortioner' for 'swindler.' The Greek term refers to one who seizes or exploits what belongs to others.
    reason: lexical_alternative
