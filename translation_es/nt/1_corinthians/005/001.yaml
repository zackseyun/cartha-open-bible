review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue en general el sentido del griego y las decisiones del POB inglés: conserva el énfasis de Ὅλως, el ámbito comunitario de ἐν ὑμῖν, el valor amplio de πορνεία, el contraste con ἔθνεσιν como «gentiles», y evita sobreinterpretar γυναῖκά τινα τοῦ πατρὸς como «madrastra» en el texto principal. Sin embargo, la cláusula final no está bien integrada sintácticamente: el griego expresa el contenido específico del escándalo como proposición finita/infinitiva dependiente de ὥστε, y el español «: tener la mujer de su padre» suena fragmentario e impersonal, perdiendo el referente implícito de «un hombre».'
  spanish_quality_summary: El español es mayormente claro y natural, pero la frase final necesita reparación para sonar idiomática y completa en español bíblico moderno. «Se oye realmente» es aceptable, aunque menos idiomático que «De hecho, se oye decir» o «Se informa». El problema principal es «tener la mujer de su padre», que en español queda como infinitivo suelto; debe formularse como «que alguien tiene la mujer de su padre» o similar. También conviene anclar la nota [b] en la frase relevante, no dejarla solo al final de una construcción deficiente.
  glossary_alignment: 'Alinea bien con la terminología del proyecto en los puntos relevantes: «gentiles» para ἔθνεσιν, «inmoralidad sexual» para πορνεία, y sin introducir términos no justificados. No hay términos de glosario mayores en conflicto. La revisión propuesta preserva esas decisiones y mejora solo la sintaxis y la legibilidad.'
  issues:
  - severity: high
    issue: 'La cláusula final «: tener la mujer de su padre» es sintácticamente deficiente en español.'
    rationale: El griego especifica el caso escandaloso; en español, dejar un infinitivo suelto tras dos puntos no comunica de manera natural que se reporta que cierto hombre está en esa relación. Se pierde claridad y fuerza discursiva.
  - severity: medium
    issue: Falta un sujeto explícito o indefinido en la especificación del caso.
    rationale: Aunque el griego usa infinitivo, el español normalmente requiere explicitar «que alguien / que uno» o reformular para que el lector entienda inmediatamente el contenido del reporte.
  - severity: low
    issue: «Se oye realmente» es comprensible, pero algo menos idiomático que otras opciones.
    rationale: No es un error de fidelidad; simplemente suena un poco más literal y menos natural que una formulación como «De hecho, se oye decir». Puede mantenerse si se prefiere cercanía formal.
