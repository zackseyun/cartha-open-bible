translation:
  language: es
  text: 'Se oye realmente que hay inmoralidad sexual entre ustedes[a], y una inmoralidad sexual de tal clase que ni siquiera entre los gentiles: que alguien tiene la mujer de su padre[b].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «entre las naciones»; algunas traducciones dicen «entre los paganos».
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «tener la mujer de su padre»; es decir, estar en una relación sexual con la mujer de su padre. Posiblemente su madrastra.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ὅλως
  english_pob_choice: actually
  chosen_spanish: realmente
  alternatives_spanish:
  - en realidad
  - de veras
  - de hecho
  lexicon: BDAG
  rationale: Ὅλως aquí expresa énfasis y sorpresa. «Realmente» comunica ese matiz enfático de modo natural en español sin volverlo meramente cuantitativo como «completamente».
- source_word: ἀκούεται
  english_pob_choice: is reported
  chosen_spanish: se oye
  alternatives_spanish:
  - se informa
  - se reporta
  - se dice
  lexicon: BDAG
  rationale: El pasivo de ἀκούω puede indicar algo que circula como noticia o rumor. «Se oye» conserva la pasividad y la idea de circulación pública, sin añadir explícitamente un agente que el griego no da.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - entre vosotros
  lexicon: BDAG
  rationale: La expresión señala la comunidad corintia como ámbito donde ocurre el hecho. «Entre ustedes» preserva bien ese sentido comunitario y resulta natural en español latinoamericano.
- source_word: πορνεία
  english_pob_choice: sexual immorality
  chosen_spanish: inmoralidad sexual
  alternatives_spanish:
  - fornicación
  - pecado sexual
  lexicon: BDAG
  rationale: πορνεία es un término amplio para conducta sexual ilícita. «Inmoralidad sexual» mantiene ese campo semántico amplio y evita estrecharlo a una sola práctica con «fornicación».
- source_word: τοιαύτη πορνεία
  english_pob_choice: sexual immorality of such a kind
  chosen_spanish: una inmoralidad sexual de tal clase
  alternatives_spanish:
  - una inmoralidad sexual tan grave
  - tal inmoralidad sexual
  lexicon: BDAG
  rationale: La construcción intensifica el escándalo del caso. «De tal clase» conserva la cualidad enfática de τοιαύτη sin añadir juicio interpretativo extra.
- source_word: ἥτις
  english_pob_choice: as is
  chosen_spanish: que
  alternatives_spanish:
  - tal que
  - como
  lexicon: BDAG
  rationale: Aquí introduce una cláusula relativa que explica la clase de inmoralidad. En español, «que» permite una continuidad natural con el complemento siguiente y evita una estructura forzada.
- source_word: οὐδὲ ἐν τοῖς ἔθνεσιν
  english_pob_choice: not even among the Gentiles
  chosen_spanish: ni siquiera entre los gentiles
  alternatives_spanish:
  - ni siquiera entre las naciones
  - ni siquiera entre los paganos
  lexicon: BDAG
  rationale: «Gentiles» es el equivalente más directo de ἔθνη en el contraste paulino judío-cristiano. «Ni siquiera entre los gentiles» sigue de cerca la fuerza comparativa del griego y evita la carga más evaluativa de «paganos».
- source_word: ὥστε
  english_pob_choice: ':'
  chosen_spanish: ':'
  alternatives_spanish:
  - de modo que
  - así que
  lexicon: BDAG
  rationale: En esta cláusula, ὥστε introduce la concreción del caso reportado. Dos puntos son una solución editorial fiel y legible en español para presentar la especificación que sigue.
- source_word: γυναῖκά τινα τοῦ πατρὸς
  english_pob_choice: his father’s wife
  chosen_spanish: la mujer de su padre
  alternatives_spanish:
  - la esposa de su padre
  - su madrastra
  lexicon: BDAG
  rationale: El griego dice literalmente «una mujer del padre», un giro idiomático para la esposa del padre. «La mujer de su padre» conserva la cercanía al sintagma original sin introducir la precisión interpretativa de «madrastra».
- source_word: ἔχειν
  english_pob_choice: has
  chosen_spanish: tener
  alternatives_spanish:
  - poseer
  - mantener relaciones con
  lexicon: BDAG
  rationale: Aquí ἔχω funciona como eufemismo para una relación sexual ilícita. «Tener» conserva la tersa ambigüedad del griego, mientras que explicitar «mantener relaciones con» sería más interpretativo de lo que el texto exige.
theological_decisions:
- issue: Cómo traducir ἔθνεσιν sin imponer una valoración moral adicional
  english_pob_reading: not even among the Gentiles
  chosen_spanish_reading: ni siquiera entre los gentiles
  alternative_spanish_readings:
  - ni siquiera entre las naciones
  - ni siquiera entre los paganos
  rationale: El término ἔθνη aquí es descriptivo del grupo no judío, no necesariamente un insulto. «Gentiles» preserva el contraste identitario paulino sin cargar el texto con una valoración extra que el griego no explicita.
  doctrine_reference: 'Translation philosophy: original-language primacy; preserve lexical and rhetorical force without importing extra evaluative meaning.'
- issue: Si debe explicitarse en el cuerpo principal la relación como incesto o añadirse una precisión interpretativa
  english_pob_reading: a man has his father’s wife
  chosen_spanish_reading: tener la mujer de su padre
  alternative_spanish_readings:
  - su madrastra
  - la esposa de su padre
  rationale: La expresión griega no usa un término técnico de parentesco como «madrastra». Mantener una formulación cercana al original evita cerrar el sentido con una identificación más específica de la que el texto da, aunque el caso sea claramente incestuoso.
  doctrine_reference: 'Translation philosophy: never paraphrase beyond what the source text warrants; preserve documented lexical tension.'
translation_notes:
  revision_awareness: La revisión más reciente en el expediente inglés ajustó la cláusula comparativa para acercarla más al griego, eliminando una expansión implícita como 'found'. En español, por eso se evita agregar verbos como 'hallarse' o 'encontrarse' en la comparación y se conserva la concisión de 'ni siquiera entre los gentiles'.
  spanish_consistency_notes:
  - Se mantiene «gentiles» para ἔθνη de manera consistente con el criterio del expediente inglés y con el contraste paulino.
  - Se usa «inmoralidad sexual» para πορνεία como equivalente amplio y actual, evitando estrechar el término a «fornicación».
  - Se conserva una estructura breve y directa para ὥστε, con dos puntos, siguiendo la función explicativa del griego.
  - Se evita «madrastra» en el texto principal para no añadir una precisión no explícita en el sintagma griego.
