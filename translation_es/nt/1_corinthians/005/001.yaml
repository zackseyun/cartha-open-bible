base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/005/001.yaml
  text: 'It is actually reported that there is sexual immorality among you[b][a], and sexual immorality of such a kind as is not even among the Gentiles: a man has his father’s wife.'
  footnotes:
  - marker: a
    text: Or 'not even among the nations'; some translations render 'not even among the pagans.'
    reason: lexical_alternative
  - marker: b
    text: Literally, 'to have his father’s wife'; that is, to be in a sexual relationship with his father’s wife. Possibly his stepmother.
    reason: lexical_alternative
