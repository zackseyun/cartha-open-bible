translation:
  language: es
  text: Porque yo[a], aunque estoy ausente en el cuerpo, estoy presente en espíritu, y ya he juzgado, como si estuviera presente[b], al que ha hecho esto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya he dictado juicio».'
    reason: lexical_alternative
  - marker: b
    text: La expresión «presente en espíritu» probablemente se refiere al propio espíritu de Pablo, no al Espíritu Santo.
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐγὼ μὲν γάρ
  english_pob_choice: For I
  chosen_spanish: Porque yo
  alternatives_spanish:
  - Pues yo
  - Porque yo, por mi parte
  lexicon: BDAG
  rationale: «Porque» conserva la relación explicativa de γάρ, y «yo» mantiene el énfasis del pronombre explícito sin volver mecánica la construcción de μὲν.
- source_word: ἀπὼν τῷ σώματι
  english_pob_choice: absent in body
  chosen_spanish: ausente en el cuerpo
  alternatives_spanish:
  - ausente de cuerpo
  - no presente corporalmente
  lexicon: BDAG
  rationale: «En el cuerpo» reproduce de forma natural el contraste con «en el espíritu» y evita sugerir una separación distinta de la ausencia física expresada por el griego.
- source_word: παρὼν δὲ τῷ πνεύματι
  english_pob_choice: but present in spirit
  chosen_spanish: pero presente en el espíritu
  alternatives_spanish:
  - y presente en el espíritu
  - mas presente en el espíritu
  lexicon: BDAG
  rationale: Se conserva el contraste retórico y la expresión idiomática. «El espíritu» mantiene la ambigüedad controlada del griego, sin resolverla en favor del Espíritu Santo si el contexto apunta al espíritu de Pablo.
- source_word: ἤδη κέκρικα
  english_pob_choice: have already judged
  chosen_spanish: ya he juzgado
  alternatives_spanish:
  - ya he tomado una decisión
  - ya he dictaminado
  lexicon: BDAG
  rationale: El perfecto expresa una decisión/jucio ya emitido con efecto presente. «He juzgado» sigue de cerca κρίνω y mantiene la fuerza disciplinaria del pasaje.
- source_word: ὡς παρὼν
  english_pob_choice: as though present
  chosen_spanish: como si estuviera presente
  alternatives_spanish:
  - como presente
  - como si fuera presente
  lexicon: BDAG
  rationale: «Como si estuviera presente» expresa con naturalidad el valor comparativo de ὡς y evita una traducción demasiado rígida o artificial.
- source_word: τὸν οὕτως τοῦτο κατεργασάμενον
  english_pob_choice: the one who has done this thing
  chosen_spanish: al que ha hecho esto
  alternatives_spanish:
  - al que ha cometido esto
  - al que ha realizado esto
  lexicon: BDAG
  rationale: El participio funciona sustantivamente; en español, «al que ha hecho esto» reproduce el referente sin añadir términos no presentes en el griego. «Esto» preserva τοῦτο de manera directa.
- source_word: μὲν ... δὲ
  english_pob_choice: though ... but
  chosen_spanish: aunque ... pero
  alternatives_spanish:
  - por un lado ... pero
  - si bien ... pero
  lexicon: BDAG
  rationale: En español, la pareja «aunque ... pero» transmite de forma clara el contraste entre ausencia corporal y presencia espiritual sin forzar una copia de partículas.
theological_decisions:
- issue: Sentido de «presente en el espíritu»
  english_pob_reading: Paul means he is not physically present but is nevertheless spiritually present with the congregation in concern and judgment.
  chosen_spanish_reading: Pablo afirma una presencia no corporal, en contraste con su ausencia física, sin especificar si se trata de su propio espíritu o de una acción del Espíritu Santo.
  alternative_spanish_readings:
  - Pablo habla de la presencia de su propio espíritu
  - Pablo alude a la presencia del Espíritu Santo
  rationale: El texto inmediato contrasta cuerpo y espíritu, por lo que conviene conservar la tensión sin resolverla indebidamente. El español mantiene la ambigüedad del griego y permite las opciones discutidas por la tradición interpretativa.
  doctrine_reference: Preservar la tensión interpretativa sin imponer una explicación dogmática no explícita en el versículo.
- issue: Valor de κέκρικα en contexto disciplinario
  english_pob_reading: have already judged
  chosen_spanish_reading: ya he juzgado
  alternative_spanish_readings:
  - ya he dictaminado
  - ya he tomado juicio
  rationale: La forma verbal indica una determinación ya establecida. «Juzgado» conserva la conexión con κρίνω y con el acto disciplinario eclesial implícito en el contexto inmediato.
  doctrine_reference: Disciplina eclesial y juicio apostólico en contexto de santidad comunitaria.
translation_notes:
  revision_awareness: 'Se corrigió la validación anterior asegurando que cada nota tenga anclaje explícito en el texto español: [a] acompaña a «yo» y [b] acompaña a «presente en el espíritu». La redacción sigue el texto griego y el audit trail inglés, manteniendo la tensión entre ausencia corporal y presencia espiritual.'
  spanish_consistency_notes:
  - Se mantiene «espíritu» en minúscula por el contraste con «cuerpo» y por la ambigüedad controlada del griego.
  - Se usa «he juzgado» para κέκρικα, no «he condenado», porque el griego y el contexto apuntan a juicio/decisión disciplinaria, no necesariamente a condena formal.
  - Se traduce τοῦτο de forma directa con «esto», evitando expandirlo a «en tal manera» o «en esta forma» sin apoyo textual.
