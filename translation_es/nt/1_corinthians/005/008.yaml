review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja bien la estructura inferencial, el tono exhortativo y la metáfora pascual del griego. Conserva correctamente la repetición de 'levadura' y la oposición con 'sinceridad y verdad'. Sin embargo, ἑορτάζωμεν está mejor representado por una formulación que preserve más claramente 'guardar/celebrar la fiesta' como imagen pascual continuada, y la nota b debe corregirse porque el griego no dice explícitamente 'panes'.
  spanish_quality_summary: El español es claro y legible, pero 'celebremos la fiesta' suena un poco menos preciso que 'celebremos/guardemos esta fiesta' dentro del marco pascual. 'Los panes sin levadura' es comprensible y natural en contexto, aunque conviene ajustar la nota para indicar que 'panes' se suple en español para aclarar la imagen, no que el griego lo diga. El resto del verso fluye bien en español eclesial moderno.
  glossary_alignment: 'No hay conflictos con los términos base del proyecto. ''Levadura'', ''sinceridad'' y ''verdad'' están bien. La decisión sobre ἑορτάζωμεν debe alinearse mejor con la justificación auditada del POB inglés: no solo ''celebremos'', sino una expresión que mantenga la idea de la fiesta pascual en continuidad con el v. 7. También conviene evitar afirmar en la nota que el griego contiene ''panes''.'
  issues:
  - severity: medium
    issue: ἑορτάζωμεν se ha reducido a 'celebremos la fiesta' sin reflejar del todo el matiz de 'keep the feast' destacado en el audit trail.
    rationale: Aunque 'celebremos la fiesta' no es incorrecto, el POB inglés documenta que la elección busca preservar explícitamente la imagen de guardar/observar la fiesta pascual. En español, 'celebremos esta fiesta' o 'guardemos la fiesta' mantiene mejor ese valor contextual.
  - severity: medium
    issue: 'La nota [b] afirma ''Griego: «con los panes sin levadura de sinceridad y verdad»'', pero ''panes'' no está en el griego.'
    rationale: El audit trail inglés aclara que 'bread' es suplido en inglés para hacer clara la imagen pascual. La nota española debe decir lo mismo, no presentar 'panes' como contenido explícito del original.
  - severity: low
    issue: La nota [a] ofrece como alternativa 'celebremos', que repite esencialmente la lectura principal y no aporta la alternativa principal documentada.
    rationale: La documentación inglesa preserva como alternativas 'let us celebrate' o 'let us observe the festival'. En español conviene ofrecer una alternativa realmente distinta, como 'guardemos la fiesta' u 'observemos la festividad'.
  revised_spanish_text: Por tanto, celebremos esta fiesta[a], no con la vieja levadura, ni con la levadura de malicia y maldad, sino con los panes sin levadura[b] de sinceridad y verdad.
