translation:
  language: es
  text: Por tanto, celebremos esta fiesta[a], no con la vieja levadura, ni con la levadura de malicia y maldad, sino con los panes sin levadura[b] de sinceridad y verdad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «guardemos la fiesta» o «observemos la festividad». El griego conserva la imagen de la fiesta de la Pascua del versículo anterior.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «con lo no leudado de sinceridad y verdad». «Panes» se suple en español para hacer más clara la imagen pascual implícita en ἀζύμοις.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por consiguiente
  lexicon: BDAG
  rationale: Expresa la conclusión inferida del argumento anterior con naturalidad en español y conserva la fuerza lógica del texto.
- source_word: ἑορτάζωμεν
  english_pob_choice: let us keep the feast
  chosen_spanish: celebremos la fiesta
  alternatives_spanish:
  - observemos la fiesta
  - guardemos la fiesta
  lexicon: BDAG
  rationale: El verbo es hortatorio y se refiere a celebrar una festividad. 'Celebremos la fiesta' mantiene la imagen pascual sin sonar forzado en español.
- source_word: ζύμῃ παλαιᾷ
  english_pob_choice: with old leaven
  chosen_spanish: con la vieja levadura
  alternatives_spanish:
  - con la levadura vieja
  - con antigua levadura
  lexicon: BDAG
  rationale: '''Levadura'' preserva la metáfora pascual. ''Vieja'' traduce παλαιᾷ de forma directa y natural.'
- source_word: κακίας
  english_pob_choice: malice
  chosen_spanish: malicia
  alternatives_spanish:
  - maldad
  - mal
  lexicon: BDAG
  rationale: '''Malicia'' conserva el matiz de mala intención o disposición perversa, distinto de πονηρίας.'
- source_word: πονηρίας
  english_pob_choice: wickedness
  chosen_spanish: maldad
  alternatives_spanish:
  - perversidad
  - maldad moral
  lexicon: BDAG
  rationale: Se distingue de κακία con un término amplio y comprensible. 'Maldad' comunica la idea de mal moral de manera natural en español.
- source_word: ἀλλ’ ἐν ἀζύμοις
  english_pob_choice: but with the unleavened bread
  chosen_spanish: sino con los panes sin levadura
  alternatives_spanish:
  - sino con lo sin levadura
  - sino con lo unleudado
  lexicon: BDAG
  rationale: En español, 'panes sin levadura' hace explícita la imagen pascual que en griego aparece de manera elíptica. Se mantiene el sustantivo plural para reflejar ἀζύμοις como 'cosas sin levadura' y evitar una abstracción artificial.
- source_word: εἰλικρινείας
  english_pob_choice: sincerity
  chosen_spanish: sinceridad
  alternatives_spanish:
  - integridad
  - pureza
  lexicon: BDAG
  rationale: '''Sinceridad'' comunica bien la idea de genuinidad sin mezcla, acorde con el contraste moral del pasaje.'
- source_word: ἀληθείας
  english_pob_choice: truth
  chosen_spanish: verdad
  alternatives_spanish:
  - veracidad
  lexicon: BDAG
  rationale: Término directo y natural que mantiene el paralelismo con εἰλικρινείας.
theological_decisions:
- issue: Mantenimiento de la metáfora pascual y del pan sin levadura
  english_pob_reading: Render ἑορτάζωμεν as 'let us keep the feast' and ἀζύμοις as 'the unleavened bread' to preserve the explicit Passover metaphor rather than flattening it to a generic moral exhortation.
  chosen_spanish_reading: Traducir ἑορτάζωμεν como 'celebremos la fiesta' y ἀζύμοις como 'los panes sin levadura' para conservar la imagen pascual explícita en lugar de reducirla a una exhortación moral genérica.
  alternative_spanish_readings:
  - celebremos
  - observemos la festividad
  - sino con sinceridad y verdad sin levadura
  rationale: El contexto inmediato presenta a Mesías como el cordero pascual (v. 7), así que conviene conservar el lenguaje de fiesta y de panes sin levadura. 'Panes sin levadura' es una clarificación contextual, no una ampliación doctrinal.
  doctrine_reference: Translation philosophy §§1, 5, 6
translation_notes:
  revision_awareness: 'Coincide con el último pase revisado: no se requieren cambios respecto del análisis fuente-auditado; se preserva la metáfora pascual, la distinción léxica entre κακία y πονηρία, y la elipsis de ἀζύμοις se aclara con ''panes sin levadura''.'
  spanish_consistency_notes:
  - Se usa 'Mesías' en el contexto inmediato del pasaje según la terminología POB, aunque este versículo no lo nombra explícitamente.
  - '''Levadura'' se conserva de forma consistente como metáfora moral y pascual.'
  - '''Sinceridad'' y ''verdad'' mantienen el paralelismo del griego sin introducir sinónimos que diluyan la distinción.'
