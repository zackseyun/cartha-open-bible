translation:
  language: es
  text: entregar a tal hombre a Satanás para destrucción[a] de la carne, a fin de que el espíritu sea salvo en el día del Señor.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «para ruina de la carne». La frase puede aludir a un juicio corporal severo, o más figuradamente a la destrucción de la orientación carnal o pecaminosa del hombre.'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «de nuestro Señor Jesús» o «del Señor Jesús» en lugar de simplemente «del Señor».
    reason: textual_variant
lexical_decisions:
- source_word: παραδοῦναι
  english_pob_choice: to hand ... over
  chosen_spanish: entregar
  alternatives_spanish:
  - poner en manos de
  - dar a
  - entregarlo a
  lexicon: BDAG
  rationale: El infinitivo aoristo expresa la acción que Pablo ordena a la asamblea. «Entregar» conserva la fuerza de παραδίδωμι en español natural y bíblico, sin añadir matices ajenos como abandono o traición.
- source_word: τὸν τοιοῦτον
  english_pob_choice: such a man
  chosen_spanish: tal hombre
  alternatives_spanish:
  - esa clase de hombre
  - tal persona
  - ese hombre
  lexicon: BDAG
  rationale: La expresión señala al ofensor concreto y a la vez lo clasifica. «Tal hombre» mantiene el valor deíctico y la carga categórica del griego, con estilo publicable en español.
- source_word: Σατανᾷ
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - Satan
  - el Satanás
  lexicon: BDAG
  rationale: Se translitera el nombre propio en la forma usual en español eclesial. No se traduce ni se parafrasea como apelativo común.
- source_word: εἰς ὄλεθρον
  english_pob_choice: for the destruction
  chosen_spanish: para destrucción
  alternatives_spanish:
  - para ruina
  - para la destrucción
  lexicon: BDAG
  rationale: «ὄλεθρος» puede ser ruina o destrucción. La versión española conserva la gravedad del acto disciplinario y deja abierta la forma exacta del efecto, como en el inglés POB.
- source_word: τῆς σαρκός
  english_pob_choice: of the flesh
  chosen_spanish: de la carne
  alternatives_spanish:
  - de su carne
  - de la naturaleza pecaminosa
  - de la orientación carnal
  lexicon: BDAG
  rationale: Se mantiene «carne» para σάρξ, siguiendo el valor léxico básico y preservando la ambigüedad entre aflicción corporal y destrucción de la inclinación carnal/pecaminosa. «Naturaleza pecaminosa» aclara demasiado una tensión que el texto no resuelve.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: a fin de que
  alternatives_spanish:
  - para que
  - de modo que
  lexicon: BDAG
  rationale: La conjunción final se expresa con una forma natural en español que conserva el valor de propósito/resultado. «A fin de que» suena más formal y preciso que «para que» en este contexto.
- source_word: τὸ πνεῦμα
  english_pob_choice: the spirit
  chosen_spanish: el espíritu
  alternatives_spanish:
  - su espíritu
  - el alma
  lexicon: BDAG
  rationale: El griego no añade pronombre posesivo. «El espíritu» respeta la sobriedad del original y evita decidir de antemano si se trata específicamente del espíritu del ofensor, aunque el contexto lo sugiera.
- source_word: σωθῇ
  english_pob_choice: may be saved
  chosen_spanish: sea salvo
  alternatives_spanish:
  - pueda ser salvo
  - sea rescatado
  lexicon: BDAG
  rationale: El pasivo subjuntivo de propósito se traduce con «sea salvo», que conserva la voz pasiva y el lenguaje de salvación sin sobreexplicar el medio.
- source_word: ἐν τῇ ἡμέρᾳ
  english_pob_choice: in the day
  chosen_spanish: en el día
  alternatives_spanish:
  - el día
  - para el día
  lexicon: BDAG
  rationale: La frase temporal se vierte de manera directa y sobria. «En el día» mantiene la formulación esjatológica del griego y del inglés auditado.
- source_word: τοῦ κυρίου
  english_pob_choice: of the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - de nuestro Señor
  - del Señor Jesús
  lexicon: BDAG
  rationale: Aunque el texto base griego lee simplemente κυρίου, en español la expresión fija «el Señor» reproduce bien el referente sin añadir material no atestiguado. Se conserva la restricción textual observada en el POB inglés.
theological_decisions:
- issue: Sentido de «destrucción de la carne»
  english_pob_reading: Retain the ambiguous phrase 'destruction of the flesh' in the main text.
  chosen_spanish_reading: Mantener «destrucción de la carne» en el texto principal.
  alternative_spanish_readings:
  - ruina de la carne
  - destrucción del cuerpo
  - mortificación de la naturaleza pecaminosa
  rationale: 'El griego admite más de una lectura: castigo corporal severo o debilitamiento de la orientación carnal/pecaminosa. La redacción española conserva la tensión en vez de decidir entre interpretaciones que el original no fuerza.'
  doctrine_reference: Translation philosophy §3; tabla de términos en tensión para σάρξ
- issue: Referente de «el espíritu»
  english_pob_reading: Translate as 'the spirit' without adding 'his.'
  chosen_spanish_reading: Traducir como «el espíritu» sin agregar «su» ni «de él».
  alternative_spanish_readings:
  - su espíritu
  - el espíritu de él
  rationale: El griego no incluye posesivo explícito. La versión española mantiene esa restricción y evita cerrar la referencia más de lo que lo hace el texto fuente.
  doctrine_reference: Translation philosophy §1, §3
- issue: Lectura de «el día del Señor»
  english_pob_reading: Render τοῦ κυρίου as 'of the Lord' exactly as attested.
  chosen_spanish_reading: Verterlo como «del Señor» conforme al texto atestiguado.
  alternative_spanish_readings:
  - de nuestro Señor
  - del Señor Jesús
  rationale: Aunque existen variantes manuscritas con una expansión cristológica, el texto base dado lee solo κυρίου. La traducción sigue esa forma y evita armonizaciones no sustentadas por el testimonio base.
  doctrine_reference: Translation philosophy §1
translation_notes:
  revision_awareness: 'El pasaje fue revisado en una pasada reciente con resultado «sin cambios». La redacción española respeta esa estabilidad: mantiene la ambigüedad de σάρξ, no añade posesivos a πνεῦμα, y sigue el texto base de κυρίου sin expansión manuscrita.'
  spanish_consistency_notes:
  - Se usa «Satanás» como nombre propio transliterado, coherente con la práctica proyectual.
  - Se prefiere «carne» para σάρξ por consistencia con el valor léxico básico y para no introducir «naturaleza pecaminosa» como interpretación cerrada.
  - «Señor» se mantiene para κύριος en la frase esjatológica, sin añadir «Jesús» porque el testimonio base no lo incluye.
  - La puntuación separa claramente la cláusula de propósito con coma antes de «a fin de que», siguiendo el flujo sintáctico del griego.
