  language: en
  yaml_path: translation/nt/1_corinthians/008/006.yaml
  text: yet for us there is one God[a], the Father, from whom are all things and we for him, and one Lord, Jesus the Messiah[c][b], through whom are all things and we through him.
  footnotes:
  - marker: a
    text: Or 'Jesus Christ.' The Greek Χριστός can function as a title ('Messiah') or, in some contexts, as a name-like form ('Christ').
    reason: alternative_reading
  - marker: b
    text: Or 'and we to him.' The phrase can express direction, goal, or purpose; 'for him' was chosen to convey that believers are oriented toward God as their end.
    reason: lexical_alternative
  - marker: c
    text: The paired phrases 'from whom are all things' and 'through whom are all things' preserve a distinction between the Father as source and Jesus Messiah as mediating agent.
    reason: cross_reference
