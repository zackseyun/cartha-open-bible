translation:
  language: es
  text: pero para nosotros hay un solo Dios, el Padre, de quien proceden todas las cosas y nosotros para él[a], y un solo Señor, Jesús el Mesías[b][c], por medio de quien proceden todas las cosas y nosotros por medio de él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «y nosotros hacia él». La expresión puede indicar dirección, meta o propósito; «para él» fue elegida para expresar que los creyentes están orientados hacia Dios como su fin.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «Jesús el Cristo». Χριστός puede funcionar como título («Mesías») o, en algunos contextos, como forma fija similar a un nombre propio («Cristo»).'
    reason: alternative_reading
  - marker: c
    text: Las frases paralelas «de quien proceden todas las cosas» y «por medio de quien proceden todas las cosas» preservan la distinción entre el Padre como fuente y Jesús el Mesías como agente mediador.
    reason: cross_reference
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: yet
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: La partícula adversativa introduce contraste con la enumeración previa; en español, «pero» expresa con naturalidad esa oposición sin añadir intensidad innecesaria.
- source_word: ἡμῖν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - a nosotros
  - por nosotros
  lexicon: BDAG
  rationale: El dativo de referencia se vierte mejor como «para nosotros» en una confesión formulada desde la perspectiva creyente.
- source_word: εἷς θεός
  english_pob_choice: one God
  chosen_spanish: un solo Dios
  alternatives_spanish:
  - un Dios
  - uno es Dios
  lexicon: BDAG
  rationale: «Un solo Dios» preserva el valor monoteísta y la fuerza confesional de εἷς sin sonar artificial en español.
- source_word: ὁ πατήρ
  english_pob_choice: the Father
  chosen_spanish: el Padre
  alternatives_spanish:
  - el padre
  lexicon: BDAG
  rationale: Se trata de un título divino definido dentro de la confesión paulina; «el Padre» conserva esa identificación relacional.
- source_word: ἐξ οὗ
  english_pob_choice: from whom
  chosen_spanish: de quien
  alternatives_spanish:
  - de él de quien
  - desde quien
  lexicon: BDAG
  rationale: La preposición con genitivo expresa origen o fuente; «de quien» es idiomático en español y mantiene la relación de procedencia.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - el universo
  lexicon: BDAG
  rationale: La expresión abarca la totalidad de lo existente; «todas las cosas» conserva la amplitud formal y la resonancia paulina.
- source_word: καὶ ἡμεῖς εἰς αὐτόν
  english_pob_choice: and we for him
  chosen_spanish: y nosotros para él
  alternatives_spanish:
  - y nosotros hacia él
  - y nosotros a él
  lexicon: BDAG
  rationale: «Para él» comunica bien la orientación/fin que el griego εἰς puede expresar, y preserva la apertura semántica sin forzar una sola paráfrasis.
- source_word: καὶ εἷς κύριος
  english_pob_choice: and one Lord
  chosen_spanish: y un solo Señor
  alternatives_spanish:
  - y un Señor
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con «un solo Dios» y la fórmula confesional con peso cristológico.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la equivalencia usual y teológicamente adecuada para κύριος en este contexto cristológico.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús el Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesucristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título, no solo como forma nominal fija; por eso se vierte «el Mesías» para conservar el contenido titular y el eco confesional.
- source_word: δι’ οὗ
  english_pob_choice: through whom
  chosen_spanish: por medio de quien
  alternatives_spanish:
  - por quien
  - a través de quien
  lexicon: BDAG
  rationale: διά con genitivo expresa mediación o agencia; «por medio de quien» es claro en español y conserva el papel mediador del Hijo.
- source_word: καὶ ἡμεῖς δι’ αὐτοῦ
  english_pob_choice: and we through him
  chosen_spanish: y nosotros por medio de él
  alternatives_spanish:
  - y nosotros por él
  - y nosotros a través de él
  lexicon: BDAG
  rationale: Se mantiene la brevedad del griego y la misma relación mediadora ya expresada en la cláusula anterior.
theological_decisions:
- issue: Confesión monoteísta y distinción entre el Padre y Jesús
  english_pob_reading: Retained the parallel wording 'one God, the Father ... and one Lord, Jesus Messiah' without weakening either side or collapsing the distinction.
  chosen_spanish_reading: Se conserva el paralelismo «un solo Dios, el Padre ... y un solo Señor, Jesús el Mesías», sin diluir ni fusionar las dos designaciones.
  alternative_spanish_readings:
  - un solo Dios y un solo Señor, que son lo mismo
  - un Dios, el Padre, y un Señor, Jesús
  rationale: La frase articula una confesión monoteísta reformulada cristológicamente, pero distingue al Padre y a Jesús por sus relaciones («de quien» / «por medio de quien»). La traducción debe preservar esa tensión sin explicitar más de lo que el texto dice.
  doctrine_reference: 'Affirmations; Translation philosophy #3'
- issue: Relaciones expresadas por ἐξ, εἰς y διά
  english_pob_reading: Translated ἐξ as 'from,' εἰς as 'for,' and διά as 'through,' preserving distinct relations.
  chosen_spanish_reading: Se traduce ἐξ como «de», εἰς como «para» y διά como «por medio de», conservando relaciones distintas de origen, orientación y mediación.
  alternative_spanish_readings:
  - de donde / hacia él / por él
  - desde quien / a él / a través de él
  rationale: Estas preposiciones sostienen la diferenciación paulina entre el Padre como fuente y fin y el Hijo como agente mediador. Mantenerlas distintas evita nivelar el argumento teológico del versículo.
  doctrine_reference: 'Translation philosophy #1, #3'
- issue: Uso de «Mesías» frente a «Cristo»
  english_pob_reading: The English audit trail chose 'Jesus Messiah' while noting the alternative 'Jesus Christ.'
  chosen_spanish_reading: Se usa «Jesús el Mesías» en el texto principal.
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesucristo
  rationale: Dado que Χριστός aquí funciona como título confesional, «Mesías» comunica mejor el valor semántico original en español; «Cristo» queda como posibilidad si el nombre fijo fuera el principal criterio contextual, pero aquí el título es relevante.
  doctrine_reference: DOCTRINE.md contested terms; title/function distinction
translation_notes:
  revision_awareness: El texto sigue de cerca el audit trail inglés más reciente, que permaneció sin cambios tras la última revisión. Se mantuvo la distinción relacional entre las cláusulas, la lectura titulativa de Χριστός y la brevedad del cierre «y nosotros por medio de él» sin expandir el sentido más allá del griego.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y «Señor» para κύριος, conforme a los valores teológicos ya establecidos.
  - Se usa «Mesías» como traducción titular de Χριστός en este contexto confesional; no se sustituye por «Cristo» salvo que una futura revisión lexical lo documente.
  - «Para él» conserva la ambigüedad controlada de εἰς αὐτόν sin cerrar innecesariamente la relación semántica.
  - La frase «por medio de» se conserva en ambas ocurrencias de διά para reflejar mediación de forma consistente.
