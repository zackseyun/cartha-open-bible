  text: διόπερ εἰ βρῶμα σκανδαλίζει τὸν ἀδελφόν μου, οὐ μὴ φάγω κρέα εἰς τὸν αἰῶνα, ἵνα μὴ τὸν ἀδελφόν μου σκανδαλίσω.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/013.yaml
  text: Therefore[a], if food causes my brother to stumble, I will certainly never eat meat again[b], so that I may not cause my brother to stumble.
  footnotes:
  - marker: a
    text: Or 'causes my brother or sister to stumble.' The Greek says 'my brother' (masculine singular), but the term can refer more broadly to a fellow believer depending on context.
    reason: lexical_alternative
  - marker: b
    text: Or 'I will never eat meat again.' Literally, 'I will certainly never eat meat forever.'
    reason: lexical_alternative
  ai_draft:
