    issue: La nota [b] ofrece «nunca comeré carne otra vez», mientras el texto principal usa «nunca volveré a comer carne».
    rationale: No es un problema de fidelidad; ambas opciones son equivalentes y naturales. La diferencia estilística no requiere revisión.
