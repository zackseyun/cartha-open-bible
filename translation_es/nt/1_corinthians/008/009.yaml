  glossary_alignment: 'No hay conflictos con los términos base del proyecto. La decisión clave es ἐξουσία: el borrador privilegia «libertad», mientras que el expediente POB privilegia «right»; en español, «derecho» preserva mejor esa decisión, dejando «libertad» como alternativa en nota. «Tropiezo» y «los débiles» concuerdan bien con el expediente.'
