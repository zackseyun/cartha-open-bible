    text: Or 'this freedom of yours.' The Greek word can mean 'authority,' 'right,' or 'freedom'; here it refers to the liberty some believers claimed in eating food associated with idols.
    reason: lexical_alternative
  - marker: b
    text: '''The weak'' here means those whose conscience is weak in this matter.'
    reason: cultural_note
