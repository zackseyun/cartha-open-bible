translation:
  language: es
  text: Pero tengan cuidado de que este derecho[a] de ustedes no se convierta en tropiezo para los débiles[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esta libertad de ustedes». El término griego puede significar «autoridad», «derecho» o «libertad»; aquí se refiere a la libertad que algunos creyentes reclamaban al comer alimentos asociados con ídolos.
    reason: lexical_alternative
  - marker: b
    text: «Los débiles» aquí se refiere a los que tienen la conciencia débil en este asunto.
    reason: cultural_note
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: take care
  chosen_spanish: cuiden
  alternatives_spanish:
  - tengan cuidado
  - miren bien
  - estén atentos
  lexicon: BDAG
  rationale: El imperativo llama a la vigilancia y a la precaución. «Cuiden» conserva el tono exhortativo y funciona de manera natural en español sin perder la fuerza admonitoria.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora
  - Y
  lexicon: BDAG
  rationale: Marca un giro de advertencia en relación con el contexto anterior. «Pero» transmite bien el matiz de transición contrastiva.
- source_word: μή πως
  english_pob_choice: does not somehow
  chosen_spanish: no llegue a ser
  alternatives_spanish:
  - no sea de algún modo
  - no llegue por casualidad a ser
  - no suceda que
  lexicon: BDAG
  rationale: La construcción expresa una precaución negativa. En español, «no llegue a ser» comunica de forma idiomática la posibilidad advertida sin añadir más interpretación de la necesaria.
- source_word: ἡ ἐξουσία ὑμῶν αὕτη
  english_pob_choice: this right of yours
  chosen_spanish: esta libertad[a] de ustedes
  alternatives_spanish:
  - este derecho de ustedes
  - esta autoridad de ustedes
  - esta licencia de ustedes
  lexicon: BDAG
  rationale: En el contexto de 1 Corintios 8, ἐξουσία se refiere a la libertad práctica que algunos creyentes reclamaban al comer alimentos vinculados con ídolos. «Libertad» refleja bien esa noción en español, mientras que la nota conserva la alternativa semántica de «derecho/autoridad».
- source_word: πρόσκομμα
  english_pob_choice: a stumbling block
  chosen_spanish: tropiezo
  alternatives_spanish:
  - piedra de tropiezo
  - obstáculo
  - causa de tropiezo
  lexicon: BDAG
  rationale: «Tropiezo» reproduce de forma breve y natural la imagen de algo que hace caer espiritualmente o moralmente. Mantiene la metáfora paulina sin sonar forzado.
- source_word: γένηται
  english_pob_choice: become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - se convierta en
  - se haga
  - se vuelva
  lexicon: BDAG
  rationale: La forma verbal expresa un posible resultado. «Llegue a ser» conserva la idea de devenir en un estado perjudicial.
- source_word: τοῖς ἀσθενέσιν
  english_pob_choice: to the weak
  chosen_spanish: para los débiles[b]
  alternatives_spanish:
  - a los débiles
  - para quienes son débiles
  - para los de conciencia débil
  lexicon: BDAG
  rationale: «Los débiles» conserva la concisión del griego y de la traducción inglesa. En español, «para» comunica con naturalidad el efecto dañino que algo puede tener sobre ellos; la nota aclara que se trata de débiles en la conciencia respecto de este asunto.
theological_decisions:
- issue: Sentido de ἐξουσία en el contexto de 1 Corintios 8
  english_pob_reading: Refers to the Corinthians' claimed liberty/right regarding food offered to idols.
  chosen_spanish_reading: Se entiende como la libertad o el derecho que algunos creyentes reclamaban para comer alimentos asociados con ídolos.
  alternative_spanish_readings:
  - autoridad
  - poder
  - facultad
  rationale: El contexto inmediato no trata de autoridad institucional, sino de una prerrogativa práctica. «Libertad» comunica bien la cuestión ética y preserva la tensión lexical al dejar la alternativa en la nota.
  doctrine_reference: Translation philosophy §1, §6
- issue: Sentido de τοῖς ἀσθενέσιν
  english_pob_reading: Refers to spiritually or conscientiously weak fellow believers, not merely physically weak people.
  chosen_spanish_reading: Se refiere a creyentes con conciencia débil en este asunto, no simplemente a personas físicamente débiles.
  alternative_spanish_readings:
  - a los frágiles
  - a los débiles en la fe
  - a los de conciencia vulnerable
  rationale: El capítulo usa «los débiles» para quienes pueden tropezar moral o conscientemente. La redacción principal mantiene la brevedad paulina y la nota precisa el sentido.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego y coincide con el sentido auditado de la POB inglesa. Se preserva la advertencia negativa, la metáfora de tropiezo y la ambigüedad lexical de ἐξουσία mediante nota, sin introducir una paráfrasis más amplia que la que permite el original.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, pero este versículo no la contiene.
  - Se usa «libertad» como opción principal para ἐξουσία, conforme al contexto ético de 1 Corintios 8.
  - «Los débiles» conserva la brevedad del original y deja la aclaración contextual en nota.
  - La puntuación y el tono siguen un registro bíblico moderno y digno, sin depender de formas arcaizantes.
