translation:
  language: es
  text: Por tanto, en cuanto al comer de lo sacrificado a los ídolos, sabemos que un ídolo no es nada en el mundo[a], y que no hay Dios sino uno[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «un ídolo no tiene existencia real en el mundo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no hay dios sino uno».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ τῆς βρώσεως
  english_pob_choice: concerning the eating of
  chosen_spanish: en cuanto al comer de
  alternatives_spanish:
  - acerca del comer de
  - en cuanto a la comida de
  - respecto de la ingestión de
  lexicon: BDAG
  rationale: βρώσεως nombra la acción de comer, no la comida como objeto; por eso conviene un sustantivo verbal en español. "En cuanto al" conserva el valor de tema o asunto introducido por περὶ sin volver la frase pesada.
- source_word: τῶν εἰδωλοθύτων
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - alimentos sacrificados a los ídolos
  - carne sacrificada a los ídolos
  - cosas sacrificadas a los ídolos
  lexicon: BDAG
  rationale: εἰδωλόθυτα abarca lo ofrecido en sacrificio a ídolos, no solo carne. "Lo sacrificado a los ídolos" mantiene esa amplitud y evita restringir el término en español.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - estamos seguros
  lexicon: BDAG
  rationale: Es la equivalencia directa y natural en español, conservando el tono de conocimiento compartido que Pablo apela en el argumento.
- source_word: οὐδὲν εἴδωλον
  english_pob_choice: an idol is nothing
  chosen_spanish: un ídolo no es nada
  alternatives_spanish:
  - un ídolo no tiene existencia real
  - un ídolo no es nada en absoluto
  lexicon: BDAG
  rationale: La frase griega es concisa y predicativa; en español, "no es nada" reproduce bien su fuerza. Evita convertir de más el matiz ontológico, pero deja abierta la alternativa implícita de irrealidad del ídolo.
- source_word: ἐν κόσμῳ
  english_pob_choice: in the world
  chosen_spanish: en el mundo
  alternatives_spanish:
  - en la creación
  - en el cosmos
  lexicon: BDAG
  rationale: '"Mundo" es el equivalente natural y mantiene el marco de realidad en el que Pablo afirma la nulidad del ídolo.'
- source_word: οὐδεὶς θεὸς εἰ μὴ εἷς
  english_pob_choice: there is no God except one
  chosen_spanish: no hay Dios sino uno
  alternatives_spanish:
  - no hay dios sino uno
  - no existe Dios excepto uno
  lexicon: BDAG
  rationale: Esta forma es idiomática en español y conserva la afirmación monoteísta. Se capitaliza "Dios" porque θεός aquí señala al verdadero Dios frente a los ídolos, siguiendo la decisión auditada en inglés.
theological_decisions:
- issue: Nulidad de los ídolos y monoteísmo exclusivo
  english_pob_reading: Render the verse as a strong monotheistic claim without softening or expanding it beyond the text.
  chosen_spanish_reading: Presentar el versículo como una afirmación fuerte de la nulidad de los ídolos y de la unicidad de Dios, sin suavizar ni ampliar el alcance del texto.
  alternative_spanish_readings:
  - un ídolo no tiene existencia real
  - no hay dios sino uno
  rationale: El griego afirma tanto que el ídolo no cuenta como realidad en este argumento como que el Dios verdadero es uno solo. La redacción española mantiene ambas afirmaciones sin introducir formulaciones doctrinales ajenas al verso.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: El texto sigue de cerca el estado final del audit trail inglés, sin revisiones pendientes; se preservó la equivalencia óptima aprobada para 1 Corintios 8:4 y se ajustó a un español natural sin perder las tensiones léxicas relevantes.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera; aquí no aparece el Tetragrámaton.
  - Se mantiene «Dios» con mayúscula en la segunda cláusula por la referencia al único Dios verdadero.
  - «Ídolo» conserva el valor concreto del sustantivo griego sin sustituirlo por un término devocional más abstracto.
  - La nota a pie de página a presenta la alternativa semántica ya documentada en el inglés; la nota b conserva la variante de minúscula para reflejar la opción alternativa sin alterar el texto principal.
