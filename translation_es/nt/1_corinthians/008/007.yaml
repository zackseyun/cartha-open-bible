  to: Pero no en todos hay ese conocimiento[a]. Algunos, por la costumbre hasta ahora con el ídolo, lo comen como algo sacrificado a un ídolo, y su conciencia, siendo débil[b], se contamina.
  rationale: 'Se hizo una reparación menor para alinear mejor el español con el griego y con la auditoría inglesa: se reordenó la frase difícil para mayor naturalidad sin perder literalidad, y se cambió «lo sacrificado a los ídolos» por «lo comen como algo sacrificado a un ídolo» para reflejar mejor ὡς εἰδωλόθυτον ἐσθίουσιν y la decisión teológica documentada sobre la percepción cultual del alimento.'
