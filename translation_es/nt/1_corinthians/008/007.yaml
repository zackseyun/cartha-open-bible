  source_alignment_summary: 'El borrador español capta bien la estructura general del griego: contraste con «no en todos», presencia de «conocimiento», la dificultad de συνήθεια + ἕως ἄρτι τοῦ εἰδώλου, y el resultado ético de que la conciencia débil queda contaminada. Sin embargo, «comen lo sacrificado a los ídolos» no refleja con suficiente precisión el singular del inglés auditado («food sacrificed to an idol») ni la construcción ὡς εἰδωλόθυτον ἐσθίουσιν, que expresa que lo comen como alimento sacrificado a un ídolo. También «por la costumbre con el ídolo hasta ahora» suena algo rígido en español; conviene un ajuste menor de orden para conservar la dificultad sin perder naturalidad.'
  spanish_quality_summary: 'El español es en general claro y digno, pero requiere una pequeña mejora de naturalidad y precisión. «Pero no en todos hay ese conocimiento» es aceptable. La frase media necesita pulido para sonar más idiomática: «por su costumbre hasta ahora con el ídolo» o «por la costumbre que tienen hasta ahora con el ídolo» funciona mejor que «por la costumbre con el ídolo hasta ahora». Además, «lo sacrificado a los ídolos» conviene ajustarlo a singular para alinearse mejor con la auditoría y evitar ampliar el referente.'
  glossary_alignment: 'La terminología principal está bien alineada: γνῶσις -> «conocimiento», συνείδησις -> «conciencia», ἀσθενής -> «débil», μολύνεται -> «se contamina». No hay conflictos con los términos teológicos globales del proyecto. El único desajuste relevante es εἰδωλόθυτον, donde el español debería acercarse más a «comida/alimento sacrificado a un ídolo» o «lo sacrificado a un ídolo» según la auditoría inglesa revisada.'
