translation:
  language: es
  text: Pero no en todos hay ese conocimiento[a]. Algunos, por la costumbre hasta ahora con el ídolo, lo comen como algo sacrificado a un ídolo, y su conciencia, siendo débil[b], se contamina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «por la costumbre hasta ahora con el ídolo». La expresión griega es difícil; el sentido es que algunos siguen bajo la influencia de su antigua relación con el culto a los ídolos.'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «conciencia del ídolo» o presentan una variante afín en esta cláusula; el texto principal sigue la lectura de SBLGNT.
    reason: textual_variant
lexical_decisions:
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - entendimiento
  lexicon: BDAG
  rationale: En 1 Corintios, γνῶσις conserva el sentido de conocimiento reconocido intelectualmente y también el contraste con quienes creen saber algo acerca de los ídolos. «Conocimiento» es natural en español y mantiene ese vínculo contextual.
- source_word: συνήθεια
  english_pob_choice: former association / familiarity
  chosen_spanish: costumbre
  alternatives_spanish:
  - hábito
  - familiaridad
  - antigua relación
  lexicon: BDAG
  rationale: El griego es difícil y el contexto apunta a una práctica arraigada vinculada con el culto idolátrico. «Costumbre» deja oír el sentido de práctica habitual sin imponer una interpretación excesiva; la nota explica la fuerza contextual más precisa.
- source_word: ἕως ἄρτι τοῦ εἰδώλου
  english_pob_choice: with the idol until now
  chosen_spanish: con el ídolo hasta ahora
  alternatives_spanish:
  - hasta ahora con el ídolo
  - en relación con el ídolo
  - del ídolo
  lexicon: BDAG
  rationale: 'La frase es sintácticamente difícil. «Con el ídolo hasta ahora» conserva los dos elementos relevantes: la conexión con el ídolo y la duración «hasta ahora», sin cerrar la ambigüedad que el griego presenta.'
- source_word: εἰδωλόθυτον
  english_pob_choice: food sacrificed to an idol
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - comida sacrificada a los ídolos
  - carne sacrificada a los ídolos
  - alimento sacrificado a un ídolo
  lexicon: BDAG
  rationale: El término designa lo ofrecido en sacrificio a ídolos, con énfasis cultual. «Lo sacrificado a los ídolos» es breve, idiomático y mantiene la referencia sacrificial sin añadir un sustantivo que el griego no exige.
- source_word: συνείδησις
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conciencia moral
  lexicon: BDAG
  rationale: «Conciencia» es la equivalencia normal y precisa en español para la función ética de συνείδησις en Pablo.
- source_word: ἀσθενής
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - enferma
  - frágil
  - poco firme
  lexicon: BDAG
  rationale: Pablo usa ἀσθενής aquí para la falta de firmeza moral en este asunto. «Débil» reproduce esa cualidad de manera directa y tradicionalmente comprensible.
- source_word: μολύνεται
  english_pob_choice: is defiled
  chosen_spanish: se contamina
  alternatives_spanish:
  - se mancha
  - se profana
  - queda contaminada
  lexicon: BDAG
  rationale: El pasivo indica contaminación moral o ritual de la conciencia. «Se contamina» transmite bien esa idea en español actual y conserva la fuerza ética del verbo.
theological_decisions:
- issue: Cómo expresar la comida dedicada a ídolos sin sugerir que los ídolos sean dioses reales
  english_pob_reading: eat the food as idol-sacrificed
  chosen_spanish_reading: comen lo sacrificado a los ídolos
  alternative_spanish_readings:
  - lo comen como sacrificio a un ídolo
  - comen comida sacrificada a los ídolos
  rationale: 'La formulación describe la percepción cultual del alimento sin afirmar la realidad de los ídolos. Así se conserva la tensión paulina: el ídolo no es nada, pero la práctica sigue afectando la conciencia.'
  doctrine_reference: Preservar la tensión teológica del capítulo sin resolverla prematuramente.
translation_notes:
  revision_awareness: La traducción sigue la última revisión inglesa, que afinó la idea de ἕως ἄρτι como «hasta ahora» y ajustó εἰδωλόθυτον para expresar de forma más natural «food sacrificed to an idol». En español se conservó esa precisión, evitando una paráfrasis más libre y manteniendo la ambigüedad contextual de συνήθεια mediante una nota.
  spanish_consistency_notes:
  - Se usó «Dios» para θεός cuando corresponda; aquí no aparece.
  - Se mantuvo «ídolo/ídolos» en lugar de un término más interpretativo para conservar el campo léxico del pasaje.
  - «Conciencia» se usó de manera consistente con el uso paulino de συνείδησις.
  - La frase principal evita explicar demasiado la relación con el ídolo, dejando la aclaración para la nota textual/lexical.
