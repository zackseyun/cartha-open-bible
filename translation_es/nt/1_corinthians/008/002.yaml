revisions:
- from: Si alguien cree que sabe algo[a], todavía no sabe como debe saberlo.
  to: Si alguien cree que sabe algo[a], todavía no sabe como debe saberse.
  rationale: Se revisa para eliminar el pronombre objeto añadido («lo»), que no está en el griego, y para expresar con más naturalidad en español el valor modal/normativo de καθὼς δεῖ γνῶναι. También se corrige y normaliza la nota alternativa para que refleje fielmente la opción léxica documentada por el English POB.
