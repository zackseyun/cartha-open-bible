translation:
  language: es
  text: Si alguien cree que sabe algo[a], todavía no sabe como debe saberse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Si alguien cree que ha llegado a saber algo, todavía no sabe como debe saberse»'
    reason: lexical_alternative
lexical_decisions:
- source_word: εἴ
  english_pob_choice: If
  chosen_spanish: Si
  alternatives_spanish:
  - Supongamos que
  lexicon: BDAG
  rationale: Introduce una condición real e hipotética, y en español «Si» conserva con naturalidad la fuerza condicional directa del griego.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguien
  alternatives_spanish:
  - cualquiera
  - una persona
  lexicon: BDAG
  rationale: El indefinido griego tiene valor genérico; «alguien» mantiene la referencia abierta y suena natural en español bíblico contemporáneo.
- source_word: δοκεῖ
  english_pob_choice: thinks
  chosen_spanish: cree
  alternatives_spanish:
  - piensa
  - supone
  lexicon: BDAG
  rationale: Aquí el verbo expresa una estimación subjetiva sobre sí mismo. «Cree» comunica bien la convicción interior sin forzar un matiz meramente intelectual de «piensa».
- source_word: ἐγνωκέναι
  english_pob_choice: knows
  chosen_spanish: sabe
  alternatives_spanish:
  - ha llegado a saber
  - ha conocido
  lexicon: BDAG
  rationale: El infinitivo perfecto de γινώσκω denota poseer conocimiento como estado adquirido; en español «sabe» es la forma más natural y breve para esa pretensión de conocimiento.
- source_word: τι
  english_pob_choice: something
  chosen_spanish: algo
  alternatives_spanish:
  - algo más
  - alguna cosa
  lexicon: BDAG
  rationale: El objeto indefinido se vierte con «algo», que reproduce la minimización retórica del griego con una formulación natural y concisa.
- source_word: οὔπω
  english_pob_choice: not yet
  chosen_spanish: todavía no
  alternatives_spanish:
  - aún no
  lexicon: BDAG
  rationale: Marca una carencia temporal en curso; «todavía no» conserva con claridad el valor de estado incompleto.
- source_word: ἔγνω
  english_pob_choice: know
  chosen_spanish: sabe
  alternatives_spanish:
  - ha sabido
  - ha llegado a saber
  lexicon: BDAG
  rationale: 'Aunque el verbo está en aoristo, en este giro español fluido se expresa mejor con presente: «todavía no sabe». Conserva la idea evaluativa de insuficiencia de conocimiento.'
- source_word: καθὼς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - del modo en que
  lexicon: BDAG
  rationale: Introduce el estándar o modo correcto; «como» es la equivalencia más natural y precisa en español.
- source_word: δεῖ
  english_pob_choice: ought to
  chosen_spanish: debe
  alternatives_spanish:
  - es necesario
  - tiene que
  lexicon: BDAG
  rationale: Expresa necesidad normativa. «Debe» transmite con claridad el deber o la conveniencia requerida por el contexto.
- source_word: γνῶναι
  english_pob_choice: know
  chosen_spanish: saber
  alternatives_spanish:
  - llegar a saber
  - conocer
  lexicon: BDAG
  rationale: El infinitivo complementa a δεῖ y en español se expresa naturalmente con «saber». Mantiene la relación verbal con «sabe» sin redundancia innecesaria.
theological_decisions:
- issue: El alcance de la reprensión de Pablo
  english_pob_reading: epistemic humility rather than denial of all knowledge
  chosen_spanish_reading: humildad epistémica, no negación absoluta del conocimiento
  alternative_spanish_readings:
  - rechazo absoluto de todo conocimiento humano
  - simple crítica al orgullo
  rationale: La frase no niega que la persona tenga algún conocimiento; corrige la autocomplacencia y la insuficiencia del modo en que cree saber. «Todavía no sabe como debe saberlo» conserva esa tensión.
  doctrine_reference: DOCTRINE.md §Translation philosophy 3
- issue: Referencia genérica del sujeto
  english_pob_reading: he knows
  chosen_spanish_reading: referencia indefinida y genérica sin marca de género
  alternative_spanish_readings:
  - él sabe
  - uno sabe
  rationale: El griego usa τις con fuerza genérica. «Alguien» evita un sujeto masculino marcado y conserva la apertura del original.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
translation_notes:
  revision_awareness: Se siguió el cierre del audit trail inglés sin cambios sustantivos; la revisión más reciente confirmó alta concordancia y no registró enmiendas. La redacción española adapta la sintaxis al uso natural sin perder la tensión entre conocimiento real y conocimiento insuficiente.
  spanish_consistency_notes:
  - Se mantuvo «sabe» para γινώσκω en ambos miembros para conservar la correspondencia léxica del argumento.
  - Se evitó «Cristo»/«Señor» y otros términos no pertinentes al versículo.
  - La nota alternativa preserva la posibilidad de traducir el perfecto con una perífrasis más explícita sin alterar el sentido.
