  verdict: revise
  source_alignment_summary: 'El borrador refleja correctamente la estructura condicional y el sentido principal del griego: una reprensión a la presunción de conocer, no una negación absoluta del conocimiento. Sin embargo, necesita ajustes menores para expresar con más naturalidad y precisión el estándar modal de καθὼς δεῖ γνῶναι y para corregir detalles ortográficos y de la nota alternativa.'
  spanish_quality_summary: 'La redacción es clara y ampliamente comprensible, pero «como» debe llevar tilde en este contexto («cómo» no; aquí en realidad corresponde «como» sin tilde solo si comparativo, pero la construcción suena mejor y más idiomática como «como debe saberse» o «como debe conocer»). El principal problema es estilístico-sintáctico: «como debe saberlo» añade un objeto directo no explícito en el griego y suena algo forzado. También la nota al pie contiene una forma poco natural: «como debe saber».'
  glossary_alignment: 'No hay términos de glosario mayor involucrados. Las decisiones léxicas básicas están alineadas con el POB: εἴ→«Si», τις→«alguien», δοκεῖ→«cree/piensa», γινώσκω→«saber/conocer». Conviene mantener la repetición verbal de γινώσκω con una formulación española más natural, sin introducir un pronombre objeto añadido.'
  issues:
