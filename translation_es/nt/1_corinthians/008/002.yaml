    issue: La frase «todavía no sabe como debe saberlo» suena poco natural y añade «lo», no expreso en el griego.
    rationale: El texto griego dice «no conoce/sabe como debe conocer/saber», con énfasis en la manera o medida del conocer, no en un objeto directo específico. «Saberlo» puede sugerir un referente concreto ausente del original.
  - severity: medium
    issue: La nota al pie alternativa está mal formulada en español.
    rationale: '«ha llegado a saber algo, todavía no sabe como debe saber» omite una formulación natural del segundo infinitivo y repite una construcción torpe. Debe reflejar mejor la alternativa inglesa: «ha llegado a saber» / «de la manera que debe saber».'
  - severity: low
    issue: Falta pulido ortográfico y tipográfico en la nota al pie.
    rationale: 'La nota empieza con comillas y abreviatura poco natural: «''O: ...''». Conviene usar una formulación editorial limpia y consistente en español.'
  revised_spanish_text: Si alguien cree que sabe algo[a], todavía no sabe como debe saberse.
