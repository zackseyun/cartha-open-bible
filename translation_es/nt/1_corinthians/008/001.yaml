translation:
  language: es
  text: En cuanto a lo sacrificado a los ídolos, sabemos que todos tenemos conocimiento[a]. El conocimiento envanece[b], pero el amor edifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «carne sacrificada a los ídolos» o «cosas sacrificadas a los ídolos».
    reason: lexical_alternative
  - marker: b
    text: Pablo quizá está repitiendo un lema corintio en «todos tenemos conocimiento».
    reason: alternative_reading
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Y en cuanto a
  alternatives_spanish:
  - Ahora respecto a
  - En cuanto a
  lexicon: BDAG
  rationale: La expresión introduce un nuevo tema en la carta; «Y en cuanto a» reproduce bien el giro discursivo sin sonar forzado en español.
- source_word: τῶν εἰδωλοθύτων
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - alimentos sacrificados a los ídolos
  - carne sacrificada a los ídolos
  - cosas sacrificadas a los ídolos
  lexicon: BDAG
  rationale: El griego refiere cosas ofrecidas en culto idolátrico; el español «lo sacrificado a los ídolos» conserva el alcance general y no estrecha de entrada el sentido a carne únicamente.
- source_word: οἴδαμεν
  english_pob_choice: we know
  chosen_spanish: sabemos
  alternatives_spanish:
  - conocemos
  - sabemos con certeza
  lexicon: BDAG
  rationale: Verbo de conocimiento directo; «sabemos» es natural y fiel al valor presente de la forma perfecta con sentido actual.
- source_word: ὅτι πάντες γνῶσιν ἔχομεν
  english_pob_choice: that we all have knowledge
  chosen_spanish: que todos tenemos conocimiento
  alternatives_spanish:
  - que todos poseemos conocimiento
  - que todos sabemos
  lexicon: BDAG
  rationale: Se conserva la afirmación general y la posible resonancia retórica de una consigna corintia. «Conocimiento» mantiene el vínculo léxico con γνῶσις.
- source_word: ἡ γνῶσις
  english_pob_choice: Knowledge
  chosen_spanish: El conocimiento
  alternatives_spanish:
  - La ciencia
  - El saber
  lexicon: BDAG
  rationale: Se usa el sustantivo abstracto más transparente para el lector moderno y más consistente con γνῶσις en el versículo.
- source_word: φυσιοῖ
  english_pob_choice: puffs up
  chosen_spanish: envanece
  alternatives_spanish:
  - hincha
  - infla de orgullo
  lexicon: BDAG
  rationale: Aunque la imagen literal es «hinchar», en español «envanece» comunica el efecto figurado con claridad y dignidad; se evita un calco poco natural.
- source_word: ἡ δὲ ἀγάπη
  english_pob_choice: but love
  chosen_spanish: pero el amor
  alternatives_spanish:
  - pero el amor cristiano
  - pero la caridad
  lexicon: BDAG
  rationale: «ἀγάπη» se traduce por el valor básico «amor»; «caridad» podría sonar eclesiástico y menos transparente en español actual.
- source_word: οἰκοδομεῖ
  english_pob_choice: builds up
  chosen_spanish: edifica
  alternatives_spanish:
  - edifica sobre
  - construye
  lexicon: BDAG
  rationale: Se conserva la metáfora de construcción de Pablo. En español, «edifica» transmite la idea de fortalecer y construir a la vez, con registro bíblico claro.
theological_decisions:
- issue: Si πάντες debe leerse como una afirmación universal sin matiz o como posible consigna corintia citada por Pablo
  english_pob_reading: Rendered as 'we all have knowledge' in the main text without added qualification
  chosen_spanish_reading: «todos tenemos conocimiento» en el texto principal, sin resolver la tensión
  alternative_spanish_readings:
  - «todos decimos tener conocimiento»
  - «todos creemos saber»
  rationale: El griego presenta la cláusula de forma directa. Mantenerla así preserva la tensión retórica sin introducir una explicación interpretativa que el texto no explicita.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla interpretativamente.
translation_notes:
  revision_awareness: La versión española sigue de cerca el paquete original griego y el rastro auditado en inglés. Se mantuvo la metáfora de «edifica», se evitó estrechar τῶν εἰδωλοθύτων solo a «carne», y se conservó la posible tensión retórica de «todos tenemos conocimiento» sin resolverla en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, aunque este versículo no contiene el nombre divino.
  - Se usa «conocimiento» para γνῶσις y «edifica» para οἰκοδομεῖ, siguiendo la terminología preferente del proyecto.
  - Se evita «caridad» para ἀγάπη, ya que el contexto favorece el valor general de «amor».
