translation:
  language: es
  text: Porque el débil es destruido[a] por tu conocimiento—el hermano[b] por quien el Mesías[c] murió.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «perece» o «se pierde». El verbo griego puede expresar ruina grave o destrucción; el texto principal evita decidir si Pablo habla de daño temporal, devastación espiritual o perdición final.
    reason: alternative_reading
  - marker: b
    text: «Hermano» aquí designa a un creyente; en el contexto, la aplicación puede incluir a una hermana en la fe.
    reason: lexical_alternative
  - marker: c
    text: Griego «Cristo»; se traduce «Mesías» porque Χριστός funciona aquí como título.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόλλυται
  english_pob_choice: is being ruined / is destroyed
  chosen_spanish: es destruido
  alternatives_spanish:
  - está siendo arruinado
  - perece
  - se pierde
  lexicon: BDAG
  rationale: El verbo griego puede expresar ruina o destrucción grave; en el contexto Pablo describe el daño real que sufre el hermano débil por la conducta del que tiene conocimiento. «Es destruido» conserva la fuerza del verbo sin añadir una explicación doctrinal que resuelva la tensión del pasaje.
- source_word: ὁ ἀσθενῶν
  english_pob_choice: the weak one
  chosen_spanish: el débil
  alternatives_spanish:
  - el que es débil
  - el hermano débil
  lexicon: BDAG
  rationale: El participio sustantivado significa «el que es débil». En español, «el débil» es natural, breve y mantiene el enfoque singular. No se añade «hermano» aquí porque el griego lo introduce aparte después.
- source_word: ἐν τῇ σῇ γνώσει
  english_pob_choice: by your knowledge
  chosen_spanish: por tu conocimiento
  alternatives_spanish:
  - en tu conocimiento
  - a causa de tu conocimiento
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», aquí la relación es instrumental o causal en el efecto del acto de conocimiento sobre el débil. «Por tu conocimiento» comunica bien esa fuerza en español, de modo idiomático y fiel.
- source_word: γνῶσις
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  lexicon: BDAG
  rationale: 'Se conserva «conocimiento» porque corresponde al vocabulario inmediato de 1 Corintios 8 y mantiene la ironía paulina: el conocimiento reclamado termina dañando al hermano.'
- source_word: ὁ ἀδελφός
  english_pob_choice: the brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - el creyente
  - el hermano o la hermana
  lexicon: BDAG
  rationale: La forma gramatical es masculina singular y el proyecto pide precisión gramatical. «El hermano» refleja la forma del texto y mantiene el sentido de un miembro de la comunidad cristiana.
- source_word: δι’ ὃν
  english_pob_choice: for whom
  chosen_spanish: por quien
  alternatives_spanish:
  - a favor de quien
  - para quien
  lexicon: BDAG
  rationale: La construcción διά + acusativo con relativo aquí expresa referencia/beneficio respecto del hermano. «Por quien» es la equivalencia más natural y precisa en español.
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona como título, no solo como nombre propio. Esto sigue la convención del proyecto y evita ocultar el valor titular del término en este contexto de la muerte de Jesús.
- source_word: ἀπέθανεν
  english_pob_choice: died
  chosen_spanish: murió
  alternatives_spanish:
  - ha muerto
  lexicon: BDAG
  rationale: El aoristo se vierte con pasado simple en español. «Murió» es directo, claro y suficiente.
theological_decisions:
- issue: Sentido de ἀπόλλυται y posible implicación sobre la perdición final del creyente débil
  english_pob_reading: Main text keeps the severe harm language without resolving whether the verb denotes temporal ruin, spiritual devastation, or eschatological destruction.
  chosen_spanish_reading: La traducción mantiene «es destruido» y no especifica si se trata de ruina temporal, devastación espiritual o destrucción final.
  alternative_spanish_readings:
  - está siendo arruinado
  - perece
  - se pierde
  rationale: El pasaje se usa en debates sobre apostasía y perseverancia. La traducción española debe conservar esa tensión sin forzar una lectura dogmática. «Es destruido» deja abierto el alcance exacto del daño, como hace el audit trail inglés.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla de antemano.
- issue: 'Alcance de ὁ ἀδελφός: masculino singular gramatical pero posible referencia inclusiva a un miembro de la comunidad'
  english_pob_reading: Retains 'brother' in the main text with inclusive sense noted in a footnote.
  chosen_spanish_reading: Se conserva «el hermano» en el texto principal y se aclara que puede referirse en aplicación a un creyente de cualquier sexo.
  alternative_spanish_readings:
  - el creyente
  - el hermano o la hermana
  rationale: Se mantiene la precisión gramatical del griego sin perder el alcance comunitario del término. La nota evita una neutralización que no está en la forma gramatical original.
  doctrine_reference: Precisión gramatical sobre neutralización automática.
- issue: Χριστός como título mesiánico
  english_pob_reading: Rendered as 'Messiah' because Χριστός functions as a title.
  chosen_spanish_reading: Se traduce como «Mesías» en vez de «Cristo».
  alternative_spanish_readings:
  - Cristo
  rationale: En este contexto Χριστός tiene fuerza titular y apunta al significado redentor de la muerte de Jesús. «Mesías» lo hace explícito en español y evita tratarlo como mero nombre litúrgico.
  doctrine_reference: Mantener el valor titular de Χριστός cuando el contexto lo exige.
translation_notes:
  revision_awareness: 'El expediente inglés registra un vaivén entre ''is being ruined'', ''is destroyed'' y el retorno a ''Messiah''. La versión española sigue la línea más reciente y doctrinalmente consistente: mantiene la fuerza de ἀπόλλυται sin sobrerresolverla y conserva «Mesías» para Χριστός.'
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para Χριστός en el texto principal.
  - Se evita «SEÑOR» porque no aparece en este versículo.
  - «Conocimiento» conserva la repetición conceptual de 1 Corintios 8.
  - El tono es sobrio y apto para lectura pública, sin calco excesivo.
