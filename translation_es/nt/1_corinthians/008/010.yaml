translation:
  language: es
  text: Porque si alguien te ve, que tienes conocimiento, reclinado[a] en un templo de ídolos, ¿no será edificada su conciencia, siendo débil, para comer lo sacrificado a los ídolos?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «será animada». El griego dice literalmente «será edificada», usando el lenguaje habitual de Pablo para la edificación, probablemente con ironía.
    reason: lexical_alternative
lexical_decisions:
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque entonces
  lexicon: BDAG
  rationale: Introduce la razón o explicación del aviso anterior. «Porque» conserva el enlace argumentativo natural en español y mantiene la relación causal/explicativa del griego.
- source_word: τις
  english_pob_choice: someone
  chosen_spanish: alguien
  alternatives_spanish:
  - uno
  - alguna persona
  lexicon: BDAG
  rationale: Sustantivo indefinido singular que conserva el carácter hipotético del enunciado. «Alguien» es natural y claro en español.
- source_word: ἴδῃ
  english_pob_choice: sees
  chosen_spanish: ve
  alternatives_spanish:
  - llegue a ver
  - viera
  lexicon: BDAG
  rationale: 'La cláusula condicional con ἐὰν se expresa naturalmente en español con presente: «si alguien ve». Mantiene la vividez futura sin forzar una perífrasis.'
- source_word: σὲ τὸν ἔχοντα γνῶσιν
  english_pob_choice: you, who have knowledge
  chosen_spanish: a ti, que tienes conocimiento
  alternatives_spanish:
  - a ti, el que tiene conocimiento
  - a ti, poseedor de conocimiento
  lexicon: BDAG
  rationale: La construcción participial articular identifica al interlocutor por su rasgo distintivo. «Que tienes conocimiento» conserva la ironía y la cercanía sintáctica sin sonar artificial en español.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - saber
  lexicon: BDAG
  rationale: Término clave en 1 Corintios 8. «Conocimiento» preserva la red léxica del pasaje y la discusión paulina sobre la gnosis.
- source_word: ἐν εἰδωλείῳ
  english_pob_choice: in an idol’s temple
  chosen_spanish: en un templo de ídolos
  alternatives_spanish:
  - en un santuario de ídolos
  - en un templo idolátrico
  lexicon: BDAG
  rationale: εἰδωλεῖον designa un recinto/templo asociado con un ídolo. «Templo de ídolos» es claro y reproduce el ámbito cultual sin suavizarlo.
- source_word: κατακείμενον
  english_pob_choice: reclining
  chosen_spanish: recostado
  alternatives_spanish:
  - reclinándote
  - sentado a la mesa
  lexicon: BDAG
  rationale: El verbo alude a la postura de comer reclinado. «Recostado» comunica la imagen concreta en español moderno; el contexto ya sugiere la comida.
- source_word: οὐχὶ
  english_pob_choice: will not
  chosen_spanish: ¿no será... ?
  alternatives_spanish:
  - ¿acaso no será... ?
  - ¿no quedará... ?
  lexicon: BDAG
  rationale: La partícula introduce una pregunta retórica que espera afirmación. La forma interrogativa en español preserva la fuerza retórica del griego.
- source_word: ἡ συνείδησις αὐτοῦ
  english_pob_choice: his conscience
  chosen_spanish: su conciencia
  alternatives_spanish:
  - la conciencia de él
  - la conciencia de esa persona
  lexicon: BDAG
  rationale: «Conciencia» es el equivalente directo de συνείδησις. El posesivo español conserva la referencia al observador del versículo.
- source_word: ἀσθενοῦς ὄντος
  english_pob_choice: being weak
  chosen_spanish: siendo débil
  alternatives_spanish:
  - por ser débil
  - como es débil
  lexicon: BDAG
  rationale: Participio en genitivo que describe la condición del sujeto. «Siendo débil» mantiene la relación descriptiva sin añadir interpretación causal no explicitada.
- source_word: οἰκοδομηθήσεται
  english_pob_choice: be built up
  chosen_spanish: será edificada
  alternatives_spanish:
  - será edificada en su conciencia
  - será fortalecida
  - será animada
  lexicon: BDAG
  rationale: Se preserva la metáfora paulina de edificación con «edificada», siguiendo el valor literal de οἰκοδομέω y la tensión irónica documentada en el audit trail. «Fortalecida» o «animada» serían más interpretativas.
- source_word: εἰς τὸ ... ἐσθίειν
  english_pob_choice: to eat
  chosen_spanish: para comer
  alternatives_spanish:
  - con el fin de comer
  - a comer
  lexicon: BDAG
  rationale: La construcción de resultado/tendencia se expresa naturalmente con «para + infinitivo». Conserva la finalidad o consecuencia sin volverla más explícita de lo que el griego requiere.
- source_word: τὰ εἰδωλόθυτα
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - alimentos sacrificados a los ídolos
  - carne sacrificada a los ídolos
  lexicon: BDAG
  rationale: Evita reducir el término a «carne», porque el griego no la especifica. «Lo sacrificado a los ídolos» conserva el alcance amplio del sustantivo neutro plural.
theological_decisions:
- issue: Mantener la ironía de οἰκοδομηθήσεται en vez de resolverla interpretativamente
  english_pob_reading: be built up
  chosen_spanish_reading: será edificada
  alternative_spanish_readings:
  - será animada
  - será fortalecida
  - será alentada
  rationale: La frase griega usa el vocabulario habitual de edificación espiritual, pero aquí el resultado es moralmente perjudicial. «Será edificada» preserva la tensión lexical y la ironía paulina documentadas por el POB; la lectura más idiomática se deja abierta en nota.
  doctrine_reference: Translation philosophy §3, §5
- issue: Preservar el valor de συνείδησις como facultad moral y no como simple opinión
  english_pob_reading: his conscience
  chosen_spanish_reading: su conciencia
  alternative_spanish_readings:
  - su sentido moral
  - su conciencia moral
  rationale: El contexto exige la facultad interior que discierne y acusa. «Conciencia» es el término bíblico y teológicamente más preciso; añadir «moral» sería explicativo pero no necesario.
  doctrine_reference: 1 Corintios 8:7-12; Romanos 14:23
- issue: No especificar «carne» para τὰ εἰδωλόθυτα
  english_pob_reading: food sacrificed to idols
  chosen_spanish_reading: lo sacrificado a los ídolos
  alternative_spanish_readings:
  - alimentos sacrificados a los ídolos
  - carne sacrificada a los ídolos
  rationale: El griego habla de lo ofrecido a ídolos, no solo de carne. La formulación escogida mantiene amplitud semántica y evita estrechar indebidamente el referente.
  doctrine_reference: 1 Corintios 8:1-13
translation_notes:
  revision_awareness: El texto inglés auditado fue revisado de «the one having knowledge» a «who have knowledge» por naturalidad. La versión española sigue esa naturalidad con la cláusula relativa «que tienes conocimiento», conservando la identificación directa del interlocutor. También se retuvo la lectura literal-irónica de «be built up», reflejada en «será edificada» y aclarada en nota.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se conserva «conocimiento» para γνῶσις por coherencia con el discurso de 1 Corintios 8.
  - «Templo de ídolos» y «lo sacrificado a los ídolos» mantienen el campo cultual sin suavizarlo.
  - La pregunta retórica en español preserva la expectativa afirmativa del original.
