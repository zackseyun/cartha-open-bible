    rationale: 'En español, «pecan» se entiende naturalmente como tercera persona plural. El griego interpela directamente a los destinatarios: «ustedes pecan/están pecando». Esto afecta la fidelidad sintáctica y el sentido exhortativo del versículo.'
  - severity: low
