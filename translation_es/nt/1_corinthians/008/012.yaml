    changes_summary: 'Replaced ''striking'' with ''wounding'' for a more natural rendering of τύπτοντες in this context, and changed ''the Messiah'' to ''Christ'' to reflect the Greek Χριστόν in standard formal register and Pauline usage. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Y así, al pecar contra los hermanos de esta manera y herir su conciencia débil[a], ustedes pecan contra el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se refiere a creyentes; por el contexto puede incluir tanto a hombres como a mujeres.
    reason: lexical_alternative
  - marker: b
    text: O «Cristo». El título griego es Χριστός.
    reason: alternative_reading
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: in this way / And so
  chosen_spanish: Y así
  alternatives_spanish:
  - De esta manera
  - Así pues
  lexicon: BDAG
  rationale: El adverbio retoma la manera descrita en el contexto previo. 'Y así' conserva el enlace discursivo y la referencia a la forma de actuar ya explicada.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora
  lexicon: BDAG
  rationale: Aquí δέ conecta suavemente con la argumentación anterior; 'Y' mantiene la continuidad sin introducir contraste fuerte.
- source_word: ἁμαρτάνοντες
  english_pob_choice: by sinning
  chosen_spanish: al pecar
  alternatives_spanish:
  - pecando
  - por pecar
  lexicon: BDAG
  rationale: El participio presente expresa acción concomitante o de modo respecto del verbo principal. 'Al pecar' transmite bien esa relación en español natural sin perder la fuerza aspectual.
- source_word: εἰς τοὺς ἀδελφοὺς
  english_pob_choice: against the brothers
  chosen_spanish: contra los hermanos
  alternatives_spanish:
  - contra los hermanos y hermanas
  - contra los creyentes
  lexicon: BDAG
  rationale: εἰς con ἁμαρτάνω tiene dirección hostil, por eso 'contra'. 'Hermanos' preserva la forma masculina plural del griego y la nota puede aclarar su alcance comunitario.
- source_word: τύπτοντες
  english_pob_choice: wounding
  chosen_spanish: herir
  alternatives_spanish:
  - golpear
  - lastimar
  lexicon: BDAG
  rationale: Aunque el verbo conserva una imagen física concreta, en este contexto la acción es metafórica respecto de la conciencia. 'Herir' comunica el efecto sin sonar artificial en español.
- source_word: αὐτῶν τὴν συνείδησιν
  english_pob_choice: their conscience
  chosen_spanish: su conciencia
  alternatives_spanish:
  - su conciencia
  - la conciencia de ellos
  lexicon: BDAG
  rationale: El griego usa singular con genitivo plural; en español, el posesivo singular distributivo 'su conciencia' suena natural y mantiene el matiz colectivo.
- source_word: ἀσθενοῦσαν
  english_pob_choice: weak
  chosen_spanish: débil
  alternatives_spanish:
  - enferma
  - floja
  lexicon: BDAG
  rationale: El participio funciona adjetivalmente. 'Débil' es la equivalencia más directa y clara para la conciencia, sin ampliar indebidamente el sentido.
- source_word: εἰς Χριστόν
  english_pob_choice: against Messiah
  chosen_spanish: contra el Mesías
  alternatives_spanish:
  - contra Cristo
  lexicon: BDAG
  rationale: 'Se mantiene el valor direccional de εἰς con ἁμαρτάνω: ''contra''. Para Χριστός, la política terminológica pide ''Mesías'' cuando el título es activo; por eso se conserva esa forma en el texto principal.'
- source_word: ἁμαρτάνετε
  english_pob_choice: you are sinning
  chosen_spanish: pecan
  alternatives_spanish:
  - están pecando
  - pecáis
  lexicon: BDAG
  rationale: El presente indicativo plural puede expresarse de forma simple en español; 'pecan' es natural y conserva la acusación directa del texto.
theological_decisions:
- issue: Sentido inclusivo de ἀδελφοὺς en contexto eclesial
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - creyentes
  rationale: Se conserva la forma masculina plural del original en el texto principal. El alcance puede ser inclusivo según el contexto comunitario, pero no se sustituye el término del griego sin una razón textual explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Traducción de Χριστόν como título
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La forma griega Χριστός funciona aquí como título con fuerza teológica, no meramente como nombre propio. En consonancia con la terminología española del proyecto, se traduce 'Mesías' y se deja 'Cristo' como alternativa de nota.
  doctrine_reference: DOCTRINE.md Translation philosophy §2; Contested terms table for Χριστός
translation_notes:
  revision_awareness: 'La redacción española sigue de cerca la relación sintáctica del griego: el participio inicial se vierte con valor circunstancial (''al pecar''), el segundo participio con un verbo concreto y natural (''herir''), y el remate conserva la dirección hostil de εἰς tanto en ''contra los hermanos'' como en ''contra el Mesías''. También se tuvo en cuenta la tensión auditada entre la tradición inglesa reciente y la política terminológica del proyecto para Χριστός, optando por ''Mesías'' en el texto principal.'
  spanish_consistency_notes:
  - Se mantiene 'Mesías' para Χριστός en el texto principal, conforme a la política terminológica del proyecto.
  - Se conserva 'hermanos' en el texto principal y se aclara su posible alcance inclusivo en nota.
  - La puntuación y el orden reflejan el encadenamiento del griego sin calco excesivo.
  - El estilo busca ser bíblico y claro en español latinoamericano, sin arcaísmos innecesarios.
