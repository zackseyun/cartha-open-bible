  text: οὕτως δὲ ἁμαρτάνοντες εἰς τοὺς ἀδελφοὺς καὶ τύπτοντες αὐτῶν τὴν συνείδησιν ἀσθενοῦσαν εἰς Χριστὸν ἁμαρτάνετε.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/012.yaml
  text: And so[a], by sinning against the brothers in this way and wounding their weak conscience[c][b], you are sinning against Messiah.
  footnotes:
  - marker: a
    text: '''Brothers'' here refers to fellow believers; the context may include both men and women.'
