translation:
  language: es
  text: Pero si alguno ama a Dios[a], este es conocido por él.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «es reconocido por él» o «ha sido conocido por él». El perfecto pasivo griego puede sugerir un estado duradero de ser conocido por Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: εἰ δέ
  english_pob_choice: But if
  chosen_spanish: Pero si
  alternatives_spanish:
  - Ahora bien, si
  - Pero si en verdad
  lexicon: BDAG
  rationale: La combinación εἰ δέ introduce una condición con matiz de contraste suave. «Pero si» preserva la fuerza condicional y el giro adversativo de manera natural en español.
- source_word: τις
  english_pob_choice: anyone
  chosen_spanish: alguno
  alternatives_spanish:
  - cualquiera
  - alguien
  lexicon: BDAG
  rationale: El indefinido es genérico. «Alguno» funciona bien en español bíblico neutro y evita un masculino específico.
- source_word: ἀγαπᾷ
  english_pob_choice: loves
  chosen_spanish: ama
  alternatives_spanish:
  - ama profundamente
  - tiene amor por
  lexicon: BDAG
  rationale: ἀγαπάω expresa amor; «ama» es directo y fiel. Se evita endurecerlo a una formulación más explicativa que el griego no requiere.
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios
  lexicon: BDAG
  rationale: En español el objeto personal con verbos de afecto normalmente lleva la preposición «a». Se mantiene la referencia directa a Dios sin añadir artículo innecesario.
- source_word: οὗτος
  english_pob_choice: this one
  chosen_spanish: este
  alternatives_spanish:
  - este hombre
  - esa persona
  lexicon: BDAG
  rationale: El demostrativo tiene énfasis. «Este» conserva la referencia enfática y suena natural en español sin perder la fuerza deíctica del griego.
- source_word: ἔγνωσται
  english_pob_choice: is known
  chosen_spanish: es conocido
  alternatives_spanish:
  - ha sido conocido
  - es reconocido
  lexicon: BDAG
  rationale: El perfecto pasivo comunica un estado presente resultante. «Es conocido» reproduce ese valor de forma clara y evita resolver indebidamente la amplitud del verbo.
- source_word: ὑπ’ αὐτοῦ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - por Dios
  lexicon: BDAG
  rationale: El pronombre remite naturalmente a Dios. «Por él» conserva la cohesión pronominal del griego; el antecedente queda claro por el contexto inmediato.
theological_decisions:
- issue: El sentido teológico de ser conocido por Dios
  english_pob_reading: Relational divine recognition/covenantal knowing is left broad as 'is known by him'
  chosen_spanish_reading: Reconocimiento relacional por Dios, mantenido en amplitud como «es conocido por él»
  alternative_spanish_readings:
  - es reconocido por él
  - ha sido conocido por él
  - es aprobado por él
  rationale: γινώσκω con Dios como sujeto puede implicar más que conocimiento intelectual. La traducción conserva la amplitud teológica en vez de estrecharla a una sola idea dogmática.
  doctrine_reference: Mantener la tensión teológica sin resolverla
- issue: Referencia del pronombre final
  english_pob_reading: The pronoun most naturally refers back to God
  chosen_spanish_reading: El «él» final se refiere a Dios y se mantiene la cohesión pronominal
  alternative_spanish_readings:
  - por Dios
  - por él
  rationale: El contexto ya identifica a Dios; por eso el pronombre puede conservarse en español. Esto respeta la estructura del griego y evita sobreexplicar.
  doctrine_reference: Claridad referencial sin expansión interpretativa
translation_notes:
  revision_awareness: Se comparó con el borrador inglés POB y no se detectaron cambios de fondo necesarios; se mantuvo la amplitud semántica de γινώσκω y el enlace pronominal final.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός, según el estándar del proyecto.
  - Se prefirió «ama» para ἀγαπᾷ por ser el equivalente natural y fiel en español.
  - Se conservó «es conocido» para reflejar el perfecto pasivo sin forzar una paráfrasis interpretativa.
  - El demostrativo «este» reproduce el énfasis de οὗτος sin añadir contenido.
