translation:
  language: es
  text: Porque aun si hay los llamados dioses[a], ya sea en el cielo o en la tierra—como en efecto hay muchos dioses y muchos señores[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llamados dioses». El participio griego puede traducirse «llamados» o, por el contexto, «los llamados»; esta última opción ayuda a conservar la distancia retórica de Pablo frente a esas supuestas deidades.
    reason: lexical_alternative
  - marker: b
    text: «Señores» traduce el plural de la misma palabra griega que a menudo se vierte «Señor». Aquí se refiere a múltiples seres o poderes reconocidos con ese título, no al único Señor del versículo 6.
    reason: cross_reference
lexical_decisions:
- source_word: καὶ γὰρ
  english_pob_choice: For even
  chosen_spanish: Porque aun
  alternatives_spanish:
  - Pues aun
  - Porque incluso
  lexicon: BDAG
  rationale: γάρ introduce una explicación o fundamentación, y καί añade énfasis. «Porque aun» conserva ese vínculo explicativo con un matiz concesivo natural en español.
- source_word: εἴπερ
  english_pob_choice: if
  chosen_spanish: si aun
  alternatives_spanish:
  - si en verdad
  - si de hecho
  lexicon: BDAG
  rationale: 'El valor es concesivo: Pablo acepta la premisa para argumentar. «Aun» ayuda a marcar esa concesión sin volver la frase rígida.'
- source_word: λεγόμενοι
  english_pob_choice: so-called
  chosen_spanish: llamados
  alternatives_spanish:
  - así llamados
  - denominados
  lexicon: BDAG
  rationale: El participio señala designación. En español, «llamados» es natural y permite la distancia contextual; la ironía/reticencia de «so-called» queda sostenida por el contexto de vv. 4–6.
- source_word: θεοὶ
  english_pob_choice: gods
  chosen_spanish: dioses
  alternatives_spanish:
  - deidades
  lexicon: BDAG
  rationale: Se mantiene el plural de seres tenidos por divinos sin capitalización, para no sugerir deidad verdadera. «Deidades» sería más interpretativo y menos directo.
- source_word: ἐν οὐρανῷ εἴτε ἐπὶ γῆς
  english_pob_choice: whether in heaven or on earth
  chosen_spanish: ya sea en el cielo o en la tierra
  alternatives_spanish:
  - sea en el cielo o en la tierra
  - ya sea en los cielos o en la tierra
  lexicon: BDAG
  rationale: «Ya sea... o...» reproduce la alternancia distributiva de εἴτε... εἴτε. «Cielo» es el equivalente español más idiomático y fiel al contraste de ámbitos; «cielos» introduciría un matiz no exigido por el texto.
- source_word: ὥσπερ
  english_pob_choice: as indeed
  chosen_spanish: como en efecto
  alternatives_spanish:
  - tal como
  - como de hecho
  lexicon: BDAG
  rationale: La partícula confirma o concede la realidad mencionada. «Como en efecto» transmite bien la matización confirmatoria sin excesiva literalidad.
- source_word: θεοὶ πολλοὶ καὶ κύριοι πολλοί
  english_pob_choice: many gods and many lords
  chosen_spanish: muchos dioses y muchos señores
  alternatives_spanish:
  - muchos dioses y muchos amos
  - muchos dioses y muchos soberanos
  lexicon: BDAG
  rationale: «Señores» conserva la correspondencia léxica con κύριοι y el eco religioso-social de títulos de autoridad. «Amos» debilitaría ese eco; «soberanos» sería demasiado interpretativo.
theological_decisions:
- issue: Distancia retórica frente a los dioses paganos llamados así por la gente
  english_pob_reading: Render λεγόμενοι θεοὶ as 'so-called gods'
  chosen_spanish_reading: «llamados dioses» con distancia contextual
  alternative_spanish_readings:
  - «así llamados dioses»
  - «presuntos dioses»
  rationale: El griego marca una designación humana, no una afirmación de realidad divina. «Llamados dioses» conserva la ambigüedad controlada y deja que el contexto haga la crítica sin añadir un juicio más fuerte que el del original.
  doctrine_reference: 1 Corintios 8:4–6; monoteísmo paulino
- issue: κύριοι en plural frente al único Señor confesado en el contexto inmediato
  english_pob_reading: Use 'lords' in lowercase
  chosen_spanish_reading: «señores» en plural y sin mayúscula
  alternative_spanish_readings:
  - «amos»
  - «señoríos»
  rationale: El plural de κύριος aquí alude a múltiples figuras de autoridad o poderes reconocidos, no al Señor único del v. 6. «Señores» mantiene la tensión léxica y evita confundirlo con el título cristológico singular.
  doctrine_reference: 1 Corintios 8:6; distinción entre πολλοὶ κύριοι y εἷς κύριος
translation_notes:
  revision_awareness: 'Se siguió de cerca el audit trail en inglés: se mantuvo la concesión de εἴπερ, la distancia retórica de λεγόμενοι y el contraste entre πολλοὶ θεοὶ / πολλοὶ κύριοι. No se requirieron revisiones respecto del sentido base; la redacción española busca naturalidad sin suavizar la tensión monoteísta.'
  spanish_consistency_notes:
  - Se emplea «Dios» para θεός en singular y «dioses» en plural cuando el texto alude a supuestas divinidades.
  - Se usa «señores» para κύριοι en plural, reservando «Señor» para el título singular cristológico o divino cuando el contexto lo exija.
  - «Cielo» se prefiere aquí por naturalidad y por el contraste de ámbitos; no implica una lectura meteorológica sino espacial/cósmica.
