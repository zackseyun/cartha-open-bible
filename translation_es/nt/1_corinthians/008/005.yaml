base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/008/005.yaml
  text: For even if there are so-called gods[b][a], whether in heaven or on earth—as indeed there are many gods and many lords—
  footnotes:
  - marker: a
    text: Or 'called gods.' The Greek participle can mean 'called' or, in context, 'so-called'; the latter preserves Paul's distancing from these alleged deities.
    reason: lexical_alternative
  - marker: b
    text: '''Lords'' translates the plural of the same Greek word often rendered ''Lord.'' Here it refers to the many beings or powers people recognize by that title, not to the one true Lord of verse 6.'
    reason: cross_reference
