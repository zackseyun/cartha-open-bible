review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: ἕκαστος = «cada uno», ἐκλήθη = «fue llamado», ἀδελφοί = «Hermanos», μενέτω = «permanezca». Sin embargo, se aparta del rastro auditado del POB en un punto significativo: παρὰ θεῷ fue decidido en inglés como «with God», con «before God / in God''s presence» solo como alternativas de nota. El español principal «delante de Dios» convierte una alternativa en texto base y además desplaza el orden enfático de ἐν τούτῳ μενέτω παρὰ θεῷ. También conviene reflejar mejor el demostrativo «en esa condición».'
  spanish_quality_summary: El español es claro y digno, pero «permanezca en la condición en que fue llamado, delante de Dios» suena algo más pesado y menos natural que «permanezca con Dios en esa condición en que fue llamado». La redacción revisada conserva mejor el flujo, la relación sintáctica y la decisión léxica documentada. Las notas son útiles, pero el marcador de la nota léxica debe anclarse al sintagma correspondiente en el texto revisado.
  glossary_alignment: 'Sin problemas con terminología principal: θεῷ = «Dios», ἀδελφοί = «Hermanos». La cuestión clave es de decisión léxica puntual, no de glosario global: παρὰ θεῷ debe mantenerse como «con Dios» en el texto principal, preservando «ante/delante de Dios» y «en la presencia de Dios» como alternativas en nota, conforme al audit trail inglés.'
  issues:
  - severity: medium
    issue: παρὰ θεῷ se tradujo en el texto principal como «delante de Dios» en vez de «con Dios».
    rationale: El POB inglés documentó «with God» como elección principal y reservó «before God / in God's presence» para nota. El español debe seguir esa decisión salvo necesidad fuerte, que aquí no se demuestra.
  - severity: low
    issue: No se refleja explícitamente el matiz demostrativo de ἐν τούτῳ.
    rationale: El borrador dice «en la condición», pero la evidencia y la revisión inglesa prefieren «en esa condición» / «that condition», que representa mejor τούτῳ.
  - severity: low
    issue: La nota léxica está anclada a «Hermanos» en vez de al sintagma de παρὰ θεῷ.
    rationale: Las notas deben marcar el lugar pertinente en el texto. La alternativa «ante Dios / en la presencia de Dios» corresponde a «con Dios», no al vocativo inicial.
  revised_spanish_text: Hermanos[a], que cada uno permanezca con Dios[b] en esa condición en que fue llamado.
