translation:
  language: es
  text: Hermanos[a], que cada uno permanezca con Dios[b] en esa condición en que fue llamado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se dirige a la congregación en conjunto, incluyendo a las mujeres.
    reason: cultural_note
  - marker: b
    text: 'O: «delante de Dios», «ante Dios» o «en la presencia de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: each one
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: BDAG
  rationale: El valor distributivo singular se expresa de manera natural en español con «cada uno», que conserva la aplicación individual de la exhortación.
- source_word: ἐν ᾧ ... ἐν τούτῳ
  english_pob_choice: in the condition in which ... that condition
  chosen_spanish: en la condición en que ... en esa condición
  alternatives_spanish:
  - en el estado en que ... en ese estado
  - en la situación en que ... en esa situación
  lexicon: BDAG
  rationale: La repetición de ἐν + relativo/demostrativo apunta al estado o circunstancia de vida, no a un lugar físico. «Condición» es una forma idiomática y precisa en español para este contexto.
- source_word: ἐκλήθη
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - fue llamado por Dios
  - fue convocado
  lexicon: BDAG
  rationale: El pasivo se conserva sin explicitar el agente. En el contexto paulino el llamado es divino, pero el griego no lo nombra aquí.
- source_word: ἀδελφοί
  english_pob_choice: Brothers
  chosen_spanish: Hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanas y hermanos
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino plural como forma representativa dirigida a la congregación, con nota para aclarar el alcance inclusivo.
- source_word: μενέτω
  english_pob_choice: let ... remain
  chosen_spanish: permanezca
  alternatives_spanish:
  - se quede
  - continúe
  lexicon: BDAG
  rationale: El imperativo de μένω pide una idea de permanencia o continuidad; «permanezca» es la opción más directa y formal en español.
- source_word: παρὰ θεῷ
  english_pob_choice: with God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - con Dios
  - en la presencia de Dios
  lexicon: BDAG
  rationale: παρά con dativo puede expresar cercanía o relación. «Delante de Dios» conserva el matiz relacional y deja abierta la alternativa de 'ante/en la presencia de Dios', sin reducirlo solo a compañía.
theological_decisions:
- issue: Si explicitar o no el agente divino en «fue llamado»
  english_pob_reading: retain the passive 'was called' without adding 'by God'
  chosen_spanish_reading: conservar el pasivo «fue llamado» sin añadir «por Dios»
  alternative_spanish_readings:
  - fue llamado por Dios
  rationale: El contexto paulino presupone la llamada divina, pero el texto griego no la formula explícitamente. Se conserva el pasivo para no añadir contenido no dicho de forma directa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Cómo tratar ἀδελφοί en un saludo congregacional mixto
  english_pob_reading: Brothers
  chosen_spanish_reading: Hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se conserva la forma masculina representativa por fidelidad al vocativo griego y por la decisión doctrinal de no sustituirla automáticamente por un equivalente neutral; la nota preserva el sentido inclusivo.
  doctrine_reference: Translation philosophy §4
- issue: Cómo verter παρὰ θεῷ
  english_pob_reading: with God
  chosen_spanish_reading: delante de Dios
  alternative_spanish_readings:
  - con Dios
  - en la presencia de Dios
  rationale: La construcción es comprimida y admite matiz relacional o de presencia. «Delante de Dios» recoge bien la cercanía reverente y evita limitar el sentido a mera compañía.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la estructura griega: vocativo inicial, exhortación distributiva, y la frase final con παρά + dativo. Se mantiene el pasivo «fue llamado» y se traduce ἐν τούτῳ con «en esa condición» para reflejar el demostrativo. La elección de «delante de Dios» preserva la ambigüedad relacional señalada por el audit trail inglés.'
  spanish_consistency_notes:
  - Se usa «Hermanos» como vocativo congregacional representativo, coherente con el criterio del proyecto para ἀδελφοί.
  - «Condición» se mantiene como término técnico contextual para el estado o situación de vida.
  - «Delante de Dios» queda acompañado de nota para preservar la alternativa semántica de παρά + dativo.
  - No se explicita «por Dios» en «fue llamado» para respetar el pasivo del original.
