review_pass:
  verdict: revise
  source_alignment_summary: El borrador refleja bien el sentido general del griego y sigue la decisión auditada de leer γυνὴ ἡ ἄγαμος καὶ ἡ παρθένος en aposición, preservando correctamente la alternativa en nota. También mantiene bien los contrastes «las cosas del Señor / las cosas del mundo» y «santa tanto en el cuerpo como en el espíritu». Sin embargo, «cómo agradar a su esposo» queda sintácticamente menos completo en español que el griego deliberativo y que el inglés auditado; conviene explicitar «puede» o «ha de» para mejor naturalidad y fidelidad funcional.
  spanish_quality_summary: 'El español es claro y digno, pero presenta un pequeño tropiezo de puntuación y fluidez: la coma tras la nota en «la mujer no casada[a], es decir» no es ideal, y el cierre «cómo agradar a su esposo» suena algo telegráfico. «No casada» es comprensible, pero «soltera» podría sonar más natural; con todo, la elección actual preserva mejor la amplitud semántica de γυνή + ἄγαμος, así que no requiere cambio. La revisión propuesta mejora naturalidad sin alterar la base léxica.'
  glossary_alignment: No hay conflictos relevantes con la terminología del proyecto. κύριος como «Señor» es apropiado aquí; πνεῦμα como «espíritu» está bien contextualizado; no aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La nota alternativa está bien planteada y conserva la tensión sintáctica documentada.
  issues:
  - severity: medium
    issue: La frase final «cómo agradar a su esposo» queda elíptica en español.
    rationale: πῶς ἀρέσῃ τῷ ἀνδρί expresa la cuestión de cómo ella puede/ha de agradar a su esposo. En español, el infinitivo desnudo después de «se preocupa por» suena menos natural y ligeramente incompleto. «Cómo puede agradar a su esposo» comunica mejor el sentido deliberativo.
  - severity: low
    issue: La puntuación alrededor de la aposición y la nota puede pulirse.
    rationale: En «la mujer no casada[a], es decir, la virgen», la colocación de la coma tras el anclaje de nota no es la opción más limpia. Reubicar el marcador después de «virgen» evita una pequeña aspereza tipográfica y sigue anclando la nota a la expresión relevante.
  revised_spanish_text: Y ella está dividida. Y la mujer no casada, es decir, la virgen[a], se preocupa por las cosas del Señor, para que sea santa tanto en el cuerpo como en el espíritu. Pero la mujer casada se preocupa por las cosas del mundo, cómo puede agradar a su esposo.
  revised_footnotes:
