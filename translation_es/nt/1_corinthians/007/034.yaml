translation:
  language: es
  text: Y ella está dividida. Y la mujer no casada, es decir, la virgen[a], se preocupa por las cosas del Señor, para que sea santa tanto en el cuerpo como en el espíritu. Pero la mujer casada se preocupa por las cosas del mundo, cómo puede agradar a su esposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Y la mujer no casada y la virgen se preocupan por las cosas del Señor». El griego puede leerse como dos categorías coordinadas en vez de identificar a la mujer no casada con la virgen.'
    reason: alternative_reading
lexical_decisions:
- source_word: μεμέρισται
  english_pob_choice: is divided
  chosen_spanish: está dividida
  alternatives_spanish:
  - ha sido dividida
  - está distraída
  lexicon: BDAG
  rationale: El perfecto pasivo conserva el estado resultante de división o desgarro interior. En español, «está dividida» comunica mejor la idea de estado presente que «ha sido dividida», y evita suavizarla como mera distracción.
- source_word: γυνὴ ἡ ἄγαμος
  english_pob_choice: the unmarried woman
  chosen_spanish: la mujer no casada
  alternatives_spanish:
  - la mujer soltera
  - la esposa no casada
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa»; con ἄγαμος, la referencia es a la condición de no estar casada. «Mujer no casada» mantiene la amplitud de γυνή sin introducir «esposa» donde el contexto no la exige.
- source_word: παρθένος
  english_pob_choice: the virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la doncella
  - la joven virgen
  lexicon: BDAG
  rationale: «Virgen» es el equivalente más directo y específico de παρθένος. Se conserva la especificidad léxica del griego en lugar de diluirla en una palabra más general.
- source_word: μεριμνᾷ
  english_pob_choice: is concerned about
  chosen_spanish: se preocupa por
  alternatives_spanish:
  - se ocupa de
  - anda preocupada por
  lexicon: BDAG
  rationale: Aquí el verbo expresa preocupación o atención concentrada, no necesariamente ansiedad pecaminosa. «Se preocupa por» funciona de modo natural en español y conserva el matiz de ocupación mental.
- source_word: τὰ τοῦ κυρίου
  english_pob_choice: the things of the Lord
  chosen_spanish: las cosas del Señor
  alternatives_spanish:
  - los intereses del Señor
  - lo que pertenece al Señor
  lexicon: BDAG
  rationale: Se mantiene la estructura nominal cercana al griego para conservar el contraste con «las cosas del mundo». «Señor» sigue el valor habitual de κύριος en este contexto.
- source_word: ἵνα ᾖ ἁγία
  english_pob_choice: so that she may be holy
  chosen_spanish: para que sea santa
  alternatives_spanish:
  - a fin de que sea santa
  - para que esté consagrada
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Sea santa» conserva la fuerza de ἁγία y evita reducirla a una mera disposición interna.
- source_word: ἁγία
  english_pob_choice: holy
  chosen_spanish: santa
  alternatives_spanish:
  - santificada
  - consagrada
  lexicon: BDAG
  rationale: «Santa» es el equivalente natural de ἁγία en español bíblico y moderno. Las alternativas introducen matices interpretativos mayores.
- source_word: τῷ σώματι καὶ τῷ πνεύματι
  english_pob_choice: both in body and in spirit
  chosen_spanish: tanto en el cuerpo como en el espíritu
  alternatives_spanish:
  - en cuerpo y espíritu
  - en su cuerpo y en su espíritu
  lexicon: BDAG
  rationale: La correlación «tanto... como...» reproduce naturalmente el doble dativo y preserva la distinción de ámbitos sin forzar una explicación antropológica adicional.
- source_word: ἡ δὲ γαμήσασα
  english_pob_choice: the married woman
  chosen_spanish: la mujer casada
  alternatives_spanish:
  - la que se ha casado
  - la esposa
  lexicon: BDAG
  rationale: El participio aoristo funciona sustantivamente para la mujer en estado de casada. «Mujer casada» es idiomático y corresponde al contraste con «la mujer no casada».
- source_word: τὰ τοῦ κόσμου
  english_pob_choice: the things of the world
  chosen_spanish: las cosas del mundo
  alternatives_spanish:
  - los asuntos del mundo
  - las preocupaciones del mundo
  lexicon: BDAG
  rationale: Se mantiene la paralelismo con «las cosas del Señor» y se conserva el contraste léxico directo de κόσμος sin intensificar su posible sentido negativo.
- source_word: πῶς ἀρέσῃ τῷ ἀνδρί
  english_pob_choice: how she may please her husband
  chosen_spanish: cómo agradar a su esposo
  alternatives_spanish:
  - cómo puede agradar a su marido
  - cómo podría agradar al hombre
  lexicon: BDAG
  rationale: En el contexto matrimonial, ἀνήρ significa «esposo». Se prefiere una formulación española natural y breve; el infinitivo «agradar» mantiene el matiz deliberativo del griego.
theological_decisions:
- issue: Si γυνὴ ἡ ἄγαμος καὶ ἡ παρθένος debe leerse como dos categorías coordinadas o como una aclaración apposicional
  english_pob_reading: 'Appositional in the main text: ''the unmarried woman, that is, the virgin''; alternative coordinated reading preserved in a footnote.'
  chosen_spanish_reading: 'En el texto principal: ''la mujer no casada[a], es decir, la virgen'''
  alternative_spanish_readings:
  - la mujer no casada y la virgen
  - la mujer no casada, o sea, la virgen
  rationale: La sintaxis griega es comprimida y el verbo singular favorece una lectura unificada. El español principal adopta la aclaración apposicional para legibilidad, pero la nota preserva la lectura coordinada viable y no resuelve artificialmente la tensión textual.
  doctrine_reference: 'Translation philosophy §3: Preservar la tensión textual cuando el griego admite más de una lectura viable.'
translation_notes:
  revision_awareness: Se mantuvo el valor resultativo de μεμέρισται, la ambigüedad sintáctica de γυνὴ ἡ ἄγαμος καὶ ἡ παρθένος, y el paralelismo retórico entre «las cosas del Señor» y «las cosas del mundo» conforme al audit trail inglés; no se registraron revisiones posteriores relevantes en el expediente.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος según el patrón POB, sin sustituirlo por una paráfrasis.
  - Se conserva «espíritu» en sentido antropológico general, sin mayúscula, porque el contexto no exige una referencia explícita al Espíritu Santo.
  - Se prefirió «mujer» y «esposo» en el contraste matrimonial para reflejar el griego sin introducir arcaísmos.
