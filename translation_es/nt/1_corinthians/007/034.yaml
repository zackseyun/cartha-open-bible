revisions:
- from: Y ella está dividida. Y la mujer no casada[a], es decir, la virgen, se preocupa por las cosas del Señor, para que sea santa tanto en el cuerpo como en el espíritu. Pero la mujer casada se preocupa por las cosas del mundo, cómo agradar a su esposo.
  to: Y ella está dividida. Y la mujer no casada, es decir, la virgen[a], se preocupa por las cosas del Señor, para que sea santa tanto en el cuerpo como en el espíritu. Pero la mujer casada se preocupa por las cosas del mundo, cómo puede agradar a su esposo.
  rationale: 'Se conserva la traducción base porque es fiel al griego y al rastro de auditoría, pero se hacen dos ajustes menores: 1) se mueve el marcador de nota al final de la aposición para una puntuación más limpia en español; 2) se cambia «cómo agradar a su esposo» por «cómo puede agradar a su esposo» para expresar de manera más natural el sentido deliberativo de πῶς ἀρέσῃ.'
  reviewer_model: gpt-5.4
