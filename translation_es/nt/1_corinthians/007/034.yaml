base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/034.yaml
  text: And she is divided. And the unmarried woman[a], that is, the virgin, is concerned about the things of the Lord, so that she may be holy both in body and in spirit. But the married woman is concerned about the things of the world, how she may please her husband.
  footnotes:
