revisions:
- from: Pero si ella también se separa[a], permanezca soltera[b], o reconcíliese con su marido; y un marido no debe abandonar a su mujer.
  to: Pero si ella se separa[a], permanezca soltera, o reconcíliese con su marido; y un marido no debe divorciarse de su esposa[b].
  rationale: Se quitó 'también' del texto principal para no hacer explícito en exceso el valor concesivo posible de καί, conservándolo en nota. Se reemplazó 'abandonar' por 'divorciarse de su esposa' para reflejar la fuerza contextual de ἀφιέναι en matrimonio, conforme al rastro léxico inglés, y se añadió una nota con la alternativa más literal 'despedir/enviar lejos'. Se mantuvo 'soltera' por ser idiomático y suficientemente fiel sin necesidad de nota obligatoria.
  reviewer_model: gpt-5.4
