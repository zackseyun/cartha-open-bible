translation:
  language: es
  text: Pero si ella se separa[a], permanezca soltera, o reconcíliese con su marido; y un marido no debe divorciarse de su esposa[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Pero aun si ella se separa». El καί puede aportar un matiz concesivo.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no debe despedir a su esposa» o, más literalmente, «no debe enviar lejos a su esposa». El verbo puede significar «despedir/enviar lejos»; en este contexto matrimonial suele referirse al divorcio.'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ καὶ χωρισθῇ
  english_pob_choice: But if she does separate
  chosen_spanish: Pero si ella también se separa[a]
  alternatives_spanish:
  - Pero si ella se separa
  - Pero aun si se separa
  lexicon: BDAG
  rationale: χωρίζω puede significar separarse o apartarse. En español, «se separa» conserva el sentido relacional y la voz no pasiva. Se añadió «también» para reflejar con naturalidad la posible fuerza concesiva de καί, sin convertirla en una paráfrasis más fuerte de lo que exige el griego.
- source_word: μενέτω
  english_pob_choice: let her remain
  chosen_spanish: permanezca
  alternatives_spanish:
  - que permanezca
  - quede
  lexicon: BDAG
  rationale: μένω expresa permanecer, continuar o quedarse. En español, el imperativo «permanezca» reproduce con claridad la instrucción y mantiene el tono exhortativo del pasaje.
- source_word: ἄγαμος
  english_pob_choice: unmarried
  chosen_spanish: soltera[b]
  alternatives_spanish:
  - sin casarse
  - no casada
  lexicon: BDAG
  rationale: ἄγαμος significa «no casada / no casado», es decir, unmarried. Aquí se eligió «soltera» porque es la forma idiomática y breve en español para el estado civil exigido en el contexto; no se usa en sentido moderno restringido de ‘nunca casada’ sino como estado de no estar casada, que es lo que el contexto demanda. Se marca la alternativa en nota porque «unmarried» admite varias equivalencias españolas cercanas.
- source_word: καταλλαγήτω
  english_pob_choice: be reconciled
  chosen_spanish: reconcíliese
  alternatives_spanish:
  - sea reconciliada
  - vuelva a reconciliarse
  lexicon: BDAG
  rationale: καταλλάσσω en pasiva imperativa pide la idea de reconciliación. «Reconcíliese» conserva el sentido relacional y el mandato directo, sin pasar a una interpretación más amplia como «restaurarse».
- source_word: τῷ ἀνδρὶ
  english_pob_choice: to her husband
  chosen_spanish: con su marido
  alternatives_spanish:
  - con su esposo
  - a su marido
  lexicon: BDAG
  rationale: ἀνήρ aquí significa husband. «Con su marido» comunica el vínculo matrimonial de manera natural en español. Se eligió «marido» porque el texto contrasta con «mujer» y mantiene la correspondencia relacional del pasaje.
- source_word: ἄνδρα γυναῖκα μὴ ἀφιέναι
  english_pob_choice: a husband must not divorce his wife
  chosen_spanish: un marido no debe abandonar a su mujer
  alternatives_spanish:
  - un marido no debe divorciarse de su mujer
  - un marido no debe despedir a su mujer
  lexicon: BDAG
  rationale: ἀφίημι en contexto matrimonial puede referirse a dejar, despedir o divorciar. Se eligió «abandonar» porque en español capta con naturalidad la fuerza de «soltar/dejar ir» sin imponer de inmediato el tecnicismo legal de «divorciar», que en el griego puede estar presente pero no debe sobreespecificarse si el verbo mismo se mantiene distinto de χωρισθῇ. «Marido» y «mujer» reflejan el paralelo directo del griego.
theological_decisions:
- issue: Distinguir χωρισθῇ de ἀφιέναι sin colapsar ambos en una sola idea de divorcio
  english_pob_reading: Render χωρισθῇ as 'separate' and ἀφιέναι as 'divorce'
  chosen_spanish_reading: Render χωρισθῇ como «se separa» y ἀφιέναι como «abandonar»
  alternative_spanish_readings:
  - Render both as «divorciarse»
  - Render both as «separarse/dejar»
  rationale: El texto griego usa dos verbos distintos. Mantener «se separa» para χωρισθῇ y «abandonar» para ἀφιέναι preserva la tensión textual entre separación y el acto de dejar/repudiar al cónyuge, sin aplanar la diferencia semántica. En español, «abandonar» comunica bien la fuerza relacional y social del verbo sin forzar un término técnico no explícito en el segundo miembro.
  doctrine_reference: Translation philosophy §1, §5
- issue: Explicitar el sujeto femenino implícito en la primera cláusula
  english_pob_reading: Use 'she' and 'her' in the first clause
  chosen_spanish_reading: Usar «ella» y «su» en la primera cláusula
  alternative_spanish_readings:
  - 'omitir el sujeto explícito: «si se separa»'
  - usar «la mujer»
  rationale: El griego presenta un verbo en tercera persona singular sin sustantivo expreso, pero el contexto inmediato la identifica como la esposa. El español necesita un sujeto más explícito para sonar natural; «ella» conserva el hilo discursivo y la correspondencia con el texto fuente.
  doctrine_reference: Translation philosophy §4
translation_notes:
  revision_awareness: El pasaje fue revisado en la fuente inglesa y quedó sin cambios en la última pasada; la concordancia externa indica alto acuerdo. Esta versión española sigue de cerca la distinción verbal del griego y conserva el matiz concesivo posible de καί sin recargarlo.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton.
  - Se conserva la distinción entre «separarse» y el verbo de ‘dejar/abandonar’ para no colapsar dos movimientos distintos del texto.
  - Se usa «marido/mujer» por la simetría del contexto matrimonial y la naturalidad del español bíblico contemporáneo.
