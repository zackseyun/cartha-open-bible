review_pass:
  verdict: revise
  source_alignment_summary: El borrador acierta al distinguir χωρισθῇ ('se separa') de ἀφιέναι, y refleja bien μενέτω, καταλλαγήτω y ἀνδρί en contexto marital. Sin embargo, no preserva adecuadamente la decisión léxica auditada para ἀφιέναι, que en este contexto debe comunicar fuerza de divorcio/despedir, no solo 'abandonar'. También 'también' en el texto principal hace demasiado explícito el matiz de καί; el rastro inglés lo deja en nota como posibilidad concesiva, no como elección principal.
  spanish_quality_summary: El español es claro y legible, pero 'también' suena algo forzado en la condicional, y 'abandonar' debilita la instrucción matrimonial al poder sonar meramente relacional y no marital-legal. 'Permanezca soltera' es idiomático y aceptable con nota, aunque 'no casada' sería más formalmente cercano; no requiere cambio.
  glossary_alignment: Sin términos del glosario mayor en juego. La principal desalineación es con la decisión POB documentada de mantener la diferencia entre χωρισθῇ = separarse y ἀφιέναι = divorciar / despedir / enviar lejos en contexto matrimonial. En español, 'no debe divorciarse de su mujer' es incorrecto idiomáticamente; 'no debe divorciar a su mujer' tampoco. La opción natural y fiel es 'no debe divorciar a su esposa' o mejor 'no debe divorciarse de su esposa' solo si el verbo español se reestructura; pero como el objeto directo está en griego, la forma más natural es 'no debe divorciarse de su esposa' aunque cambia la sintaxis. Para mantener claridad y fuerza contextual, 'no debe divorciarse de su esposa' es preferible en español moderno.
  issues:
  - severity: medium
    issue: '''también'' en ''Pero si ella también se separa'' sobreinterpreta καί en el texto principal'
    rationale: El rastro inglés adopta 'But if' en el texto principal y reserva el matiz concesivo 'even if' para nota. En español, 'también' no expresa bien ese matiz y puede sugerir adición más que concesión.
  - severity: high
    issue: '''abandonar'' para ἀφιέναι no preserva la fuerza marital contextual documentada'
    rationale: La auditoría inglesa especifica que ἀφιέναι en este contexto comúnmente se refiere a divorciar/despedir al cónyuge, con 'send away' como alternativa literal. 'Abandonar' puede implicar descuido o deserción, pero no comunica con suficiente precisión la prohibición matrimonial que Pablo formula.
  - severity: low
    issue: Desajuste de nota b frente al rastro inglés
    rationale: 'La nota b inglesa corresponde a la alternativa más literal para ἀφιέναι (''send away''), no a ἄγαμος. La nota española sobre ''soltera/no casada'' es posible como ayuda local, pero no refleja la preservación de alternativa significativa donde más falta hace en español: el segundo miembro.'
  revised_spanish_text: Pero si ella se separa[a], permanezca soltera, o reconcíliese con su marido; y un marido no debe divorciarse de su esposa[b].
