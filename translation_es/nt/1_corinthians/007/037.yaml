translation:
  language: es
  text: 'Pero el que se mantiene firme en su corazón, sin ninguna necesidad[a], sino que tiene autoridad sobre su propia voluntad, y ha decidido esto en su propio corazón: guardar a su propia virgen[b], hará bien.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «sin compulsión».'
    reason: lexical_alternative
  - marker: b
    text: «Su propia virgen» puede referirse a una hija virgen o a una prometida/desposada virgen; el griego está debatido.
    reason: alternative_reading
lexical_decisions:
- source_word: ἕστηκεν ... ἑδραῖος
  english_pob_choice: stands firm
  chosen_spanish: se mantiene firme
  alternatives_spanish:
  - permanece firme
  - está firme
  lexicon: BDAG
  rationale: La construcción perfecta de ἵστημι con ἑδραῖος expresa resolución estable y asentada. «Se mantiene firme» suena natural en español y conserva la idea de firmeza interior.
- source_word: ἐν τῇ καρδίᾳ αὐτοῦ
  english_pob_choice: in his heart
  chosen_spanish: en su corazón
  alternatives_spanish:
  - dentro de sí
  - en su interior
  lexicon: BDAG
  rationale: καρδία aquí designa el centro de la decisión y la voluntad. «En su corazón» conserva el giro bíblico y la repetición del texto.
- source_word: μὴ ἔχων ἀνάγκην
  english_pob_choice: having no necessity
  chosen_spanish: sin necesidad
  alternatives_spanish:
  - sin compulsión
  - sin presión
  lexicon: BDAG
  rationale: ἀνάγκη puede implicar necesidad, presión o compulsión. «Sin necesidad» es cercano al griego; el matiz alternativo de compulsión queda reflejado en la nota.
- source_word: ἐξουσίαν ... ἔχει περὶ τοῦ ἰδίου θελήματος
  english_pob_choice: has authority over his own will
  chosen_spanish: tiene autoridad sobre su propia voluntad
  alternatives_spanish:
  - tiene control sobre su propio deseo
  - tiene derecho respecto de su propia intención
  lexicon: BDAG
  rationale: ἐξουσία comunica autoridad o derecho; θέλημα puede ser voluntad, deseo o intención. «Autoridad sobre su propia voluntad» preserva la fuerza de autodominio sin redefinir el término.
- source_word: κέκρικεν
  english_pob_choice: has decided
  chosen_spanish: ha decidido
  alternatives_spanish:
  - ha resuelto
  - ha juzgado
  lexicon: BDAG
  rationale: El perfecto indica una decisión ya tomada y establecida. «Ha decidido» es claro y fiel al valor aspectual.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: guardar
  alternatives_spanish:
  - mantener
  - conservar
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, preservar o mantener. «Guardar» funciona bien en español para el sentido de mantener en cierto estado o condición.
- source_word: τὴν ἑαυτοῦ παρθένον
  english_pob_choice: his own virgin
  chosen_spanish: a su propia virgen
  alternatives_spanish:
  - a su propia hija virgen
  - a su propia prometida virgen
  lexicon: BDAG
  rationale: 'παρθένος es literalmente «virgen» y el referente es debatido: puede ser una hija o una prometida/desposada. La traducción principal conserva la ambigüedad del original sin resolverla; las alternativas se preservan en la nota.'
- source_word: καλῶς ποιήσει
  english_pob_choice: he will do well
  chosen_spanish: hará bien
  alternatives_spanish:
  - obrará bien
  - actuará bien
  lexicon: BDAG
  rationale: La expresión es un modismo de aprobación. «Hará bien» es idiomático, breve y fiel.
theological_decisions:
- issue: Referente de τὴν ἑαυτοῦ παρθένον
  english_pob_reading: Retain the more literal and ambiguous expression in the main text rather than specifying 'daughter' or 'fiancée.'
  chosen_spanish_reading: Conservar una expresión literal y ambigua en el texto principal, sin decidir entre hija o prometida.
  alternative_spanish_readings:
  - a su hija virgen
  - a su prometida virgen / desposada
  rationale: El griego no resuelve de manera inequívoca si Pablo habla de una hija bajo la decisión del padre/guardián o de una prometida. Siguiendo la filosofía de la POB, la traducción principal preserva la tensión interpretativa en vez de cerrarla.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Valor de μὴ ἔχων ἀνάγκην
  english_pob_reading: having no necessity / under no compulsion
  chosen_spanish_reading: sin necesidad
  alternative_spanish_readings:
  - sin compulsión
  - sin presión
  rationale: El término puede expresar necesidad, compulsion o presión externa. El texto principal usa «sin necesidad» y la nota conserva la lectura alternativa más interpretativa.
  doctrine_reference: Lexical ambiguity in ἀνάγκη (BDAG)
- issue: Sentido de ἐξουσίαν ... ἔχει περὶ τοῦ ἰδίου θελήματος
  english_pob_reading: has authority over his own will
  chosen_spanish_reading: tiene autoridad sobre su propia voluntad
  alternative_spanish_readings:
  - tiene control sobre su propio deseo
  - tiene derecho respecto de su propia intención
  rationale: Se mantiene la idea de autoridad/competencia para decidir, sin reducir el término a simple preferencia emocional ni introducir una idea ajena al contexto.
  doctrine_reference: Lexical range of ἐξουσία and θέλημα
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que eliminó una expansión interpretativa no explícita en el griego ('unmarried'). En español se evita igualmente añadir 'soltera/desposada' en el cuerpo del texto, conservando la ambigüedad del original y reflejando la decisión revisada.
  spanish_consistency_notes:
  - Se usó «Yahvé» como terminología por defecto, pero este versículo no contiene el nombre divino.
  - Se eligió «virgen» en singular para mantener la literalidad de παρθένον y la ambigüedad del referente.
  - «Hará bien» conserva el valor idiomático de καλῶς ποιήσει sin sobreinterpretar.
  - No se introdujo «Cristo» ni otra terminología eclesial ajena al versículo.
