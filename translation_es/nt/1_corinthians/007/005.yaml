  source_alignment_summary: 'El borrador español refleja bien el sentido global del griego: prohibición recíproca, excepción calificada por acuerdo mutuo y tiempo limitado, dedicación a la oración, reanudación de la vida conyugal y prevención de la tentación satánica por falta de dominio propio. Sin embargo, hay un problema de anclaje de nota y una ligera mejora de naturalidad y fidelidad idiomática en la cláusula inicial.'
  spanish_quality_summary: El español es claro y digno, pero «No se priven uno[a] al otro» suena algo forzado; en español bíblico natural funciona mejor «No se priven el uno al otro». Además, la nota [a] está anclada en «uno», aunque su contenido comenta la cláusula de excepción «salvo quizá por mutuo acuerdo», por lo que el marcador está mal ubicado.
  glossary_alignment: No hay conflictos con la terminología del proyecto. «Satanás», «oración» y «dominio propio» están bien. La elección «volver a estar juntos» mantiene la modestia del original y concuerda con la decisión documentada del POB.
