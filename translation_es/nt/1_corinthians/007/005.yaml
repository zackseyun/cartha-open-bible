translation:
  language: es
  text: No se priven el uno al otro, salvo quizá[a] por mutuo acuerdo, por un tiempo, para dedicarse a la oración, y luego volver a estar juntos[b], para que Satanás no los tiente a causa de su falta de dominio propio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «salvo quizá por consentimiento mutuo».
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «volver a estar juntos»; en el contexto se refiere a reanudar la vida conyugal.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ ἀποστερεῖτε ἀλλήλους
  english_pob_choice: Do not deprive one another
  chosen_spanish: No se priven uno al otro
  alternatives_spanish:
  - No se defrauden el uno al otro
  - No se nieguen el uno al otro
  lexicon: BDAG
  rationale: ἀποστερέω en este contexto matrimonial expresa privar a la otra persona de lo que le corresponde. «Privar» conserva esa fuerza ética sin introducir un matiz comercial innecesario como «defraudar».
- source_word: εἰ μήτι ἂν
  english_pob_choice: except perhaps
  chosen_spanish: salvo quizá
  alternatives_spanish:
  - a menos quizá
  - excepto quizá
  lexicon: BDAG
  rationale: La combinación introduce una excepción limitada y tentativa, no una prohibición absoluta. «Salvo quizá» mantiene esa cautela en español natural.
- source_word: ἐκ συμφώνου
  english_pob_choice: by mutual agreement
  chosen_spanish: por mutuo acuerdo
  alternatives_spanish:
  - de común acuerdo
  - por consentimiento mutuo
  lexicon: BDAG
  rationale: La frase señala consentimiento compartido entre ambos cónyuges. «Por mutuo acuerdo» comunica bien la bilateralidad y suena natural en español contemporáneo.
- source_word: πρὸς καιρόν
  english_pob_choice: for a time
  chosen_spanish: por un tiempo
  alternatives_spanish:
  - temporalmente
  - por un tiempo limitado
  lexicon: BDAG
  rationale: El griego marca duración limitada. «Por un tiempo» es claro y evita un tono arcaico.
- source_word: σχολάσητε τῇ προσευχῇ
  english_pob_choice: you may devote yourselves to prayer
  chosen_spanish: dedicarse a la oración
  alternatives_spanish:
  - consagrarse a la oración
  - ocuparse de la oración
  lexicon: BDAG
  rationale: σχολάζω aquí implica quedar libres para una actividad. «Dedicarse a la oración» transmite esa disponibilidad intencional sin sonar rígido.
- source_word: τῇ προσευχῇ
  english_pob_choice: to prayer
  chosen_spanish: a la oración
  alternatives_spanish:
  - para la oración
  lexicon: BDAG
  rationale: El dativo con σχολάζω se vierte de manera natural con «a». El singular «oración» conserva la forma griega y alude a la práctica en general.
- source_word: πάλιν ἐπὶ τὸ αὐτὸ ἦτε
  english_pob_choice: come together again
  chosen_spanish: volver a estar juntos
  alternatives_spanish:
  - estar juntos otra vez
  - reunirse de nuevo
  lexicon: BDAG
  rationale: La expresión es idiomática y en contexto se refiere al restablecimiento de la vida conyugal, sin necesidad de explicitar más de lo que el griego dice. «Volver a estar juntos» preserva la modestia del original.
- source_word: πειράζῃ
  english_pob_choice: tempt
  chosen_spanish: tiente
  alternatives_spanish:
  - pruebe
  - ponga a prueba
  lexicon: BDAG
  rationale: Con Satanás como sujeto y el contexto de abstinencia sexual, el sentido es incitar al pecado, no una prueba neutral. «Tiente» expresa bien ese valor.
- source_word: Σατανᾶς
  english_pob_choice: Satan
  chosen_spanish: Satanás
  alternatives_spanish:
  - el Adversario
  lexicon: BDAG
  rationale: Se translitera el nombre propio, siguiendo el principio del proyecto y manteniendo la referencia personal.
- source_word: ἀκρασίαν
  english_pob_choice: lack of self-control
  chosen_spanish: falta de dominio propio
  alternatives_spanish:
  - falta de autocontrol
  - incontinencia
  lexicon: BDAG
  rationale: ἀκρασία alude a falta de dominio sobre los impulsos, especialmente en este contexto sexual. «Dominio propio» es idiomático y claro en español bíblico contemporáneo.
theological_decisions:
- issue: Cómo reflejar πάλιν ἐπὶ τὸ αὐτὸ ἦτε sin volver demasiado explícito el sentido conyugal/sexual
  english_pob_reading: Rendered as 'come together again' with the marital/sexual implication left implicit in context
  chosen_spanish_reading: volver a estar juntos, dejando implícita la referencia conyugal en el contexto
  alternative_spanish_readings:
  - volver a unirse de nuevo
  - reanudar la convivencia conyugal
  rationale: El griego usa una expresión indirecta y modesta. La traducción debe mantener esa reserva, aunque el contexto apunte al restablecimiento de la unión matrimonial.
  doctrine_reference: 'Translation philosophy: optimal equivalence; never paraphrase beyond what the source text warrants.'
- issue: Cómo entender ὁ Σατανᾶς
  english_pob_reading: Rendered as the proper name 'Satan'
  chosen_spanish_reading: Satanás como nombre propio de una persona espiritual maligna
  alternative_spanish_readings:
  - el adversario
  - el tentador
  rationale: En este pasaje Pablo nombra a Satanás como agente personal de tentación. La transliteración preserva esa referencia sin reinterpretarla como mera abstracción.
  doctrine_reference: Historic ecumenical Christian orthodoxy; translate titles, transliterate names.
translation_notes:
  revision_awareness: 'El texto coincide con el último pase revisado del contexto en inglés: no se registran cambios posteriores en el audit trail y el veredicto de revisión fue de alta concordancia.'
  spanish_consistency_notes:
  - Se mantuvo «Satanás» como transliteración del nombre propio, conforme al criterio POB.
  - Se evitó «SEÑOR» o equivalentes de máscara divina porque no aparece aquí κύριος ni un referente del nombre divino.
  - «Falta de dominio propio» conserva el matiz ético-sexual de ἀκρασία sin usar un latinismo poco natural como «incontinencia».
  - La nota b se ancla en la frase «volver a estar juntos» para señalar la lectura idiomática sin sobreexplicar en el cuerpo principal.
