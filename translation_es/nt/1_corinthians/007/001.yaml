translation:
  language: es
  text: 'Ahora bien, en cuanto a las cosas que ustedes escribieron: es bueno para un hombre no tocar a una mujer.[a]'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: "no tener relaciones sexuales con una mujer". El griego dice literalmente "no tocar a una mujer"; "mujer" también puede entenderse como "esposa".'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora bien, respecto de
  alternatives_spanish:
  - En cuanto a
  - Respecto de
  lexicon: BDAG
  rationale: Expresa el giro discursivo de apertura de tema de manera natural en español y conserva el matiz de transición introducido por δὲ sin forzar una fórmula eclesiástica fija.
- source_word: ὧν ἐγράψατε
  english_pob_choice: the matters about which you wrote
  chosen_spanish: las cosas acerca de las cuales escribieron
  alternatives_spanish:
  - lo que escribieron
  - los asuntos que escribieron
  lexicon: BDAG
  rationale: El relativo plural ὧν con ἐγράψατε apunta a asuntos o temas tratados en la carta. Mantengo el plural y una estructura formal precisa, evitando simplificar a singular o a una paráfrasis menos transparente.
- source_word: καλὸν
  english_pob_choice: it is good
  chosen_spanish: es bueno
  alternatives_spanish:
  - es apropiado
  - es correcto
  lexicon: BDAG
  rationale: καλός aquí evalúa algo como bueno/favorable/adecuado. 'Es bueno' preserva la amplitud semántica sin convertir la frase en un mandato más fuerte de lo que el griego exige.
- source_word: ἀνθρώπῳ
  english_pob_choice: for a man
  chosen_spanish: para un hombre
  alternatives_spanish:
  - para una persona
  - para el varón
  lexicon: BDAG
  rationale: En este contexto de contraste con γυνή, 'hombre' reproduce la referencia masculina directa sin neutralizar el término. 'Varón' sería posible, pero resulta menos natural en español corriente.
- source_word: γυναικὸς
  english_pob_choice: a woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa'. Siguiendo la cautela del POB inglés, conservo 'mujer' en el texto principal porque la restricción marital es discutida y no debe resolverse por traducción sola.
- source_word: μὴ ἅπτεσθαι
  english_pob_choice: not to touch
  chosen_spanish: no tocar
  alternatives_spanish:
  - no tener relaciones sexuales con
  - no casarse con
  lexicon: BDAG
  rationale: La expresión es literalmente 'no tocar'. Mantengo la metáfora verbal en el cuerpo del texto por transparencia, mientras la ambigüedad idiomática queda disponible para nota. La alternativa sexual es interpretativa y se reserva como explicación secundaria.
theological_decisions:
- issue: Si la frase debe presentarse como un lema paulino o como una posible cita/sentencia corintia
  english_pob_reading: Render as Paul's reported topic statement without quotation marks, preserving ambiguity.
  chosen_spanish_reading: Presentarlo sin comillas, como una introducción temática de Pablo, preservando la ambigüedad.
  alternative_spanish_readings:
  - Ponerlo entre comillas como una consigna corintia.
  - Insertar una aclaración editorial que resuelva la autoría de la sentencia.
  rationale: El griego no marca comillas ni cita explícita. La traducción española mantiene esa tensión interpretativa, evitando decidir en el texto principal una cuestión debatida sobre si Pablo cita o asume la formulación.
  doctrine_reference: Preservar la tensión exegética sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'Se siguió la revisión más reciente del POB inglés: se mantuvo una formulación formal y precisa para Περὶ δὲ ὧν ἐγράψατε y se conservó la literalidad de ''touch a woman'' en el texto principal, dejando la fuerza idiomática para la nota.'
  spanish_consistency_notes:
  - Se evitó 'Señor' o cualquier sustituto no presente en el versículo.
  - '''Bueno'' se mantuvo en sentido evaluativo amplio, no como aprobación moral absoluta.'
  - La ambigüedad de γυνή ('mujer/esposa') se conserva en la nota, no se resuelve en el texto principal.
  - El giro discursivo 'Ahora bien, respecto de' busca fluidez natural en español sin perder la transición temática del griego.
