review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien la estructura del griego: conserva ἕκαστος como distributivo singular, refleja la doble referencia de κλῆσις / ἐκλήθη y traduce μενέτω con fuerza imperativa. Sin embargo, «vocación» en español tiende a oírse como inclinación u oficio, y aquí debilita el eco verbal con «fue llamado» más de lo deseable. «Llamamiento» preserva mejor la tensión teológica y el juego léxico documentado por el POB.'
  spanish_quality_summary: 'La frase es clara y natural, pero «en la vocación en la que fue llamado» suena algo menos bíblico-natural y más especializada que «en el llamamiento en que fue llamado». También conviene alinear la nota b con el texto real: no hay construcción impersonal; simplemente se omite un pronombre explícito, algo normal en español.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. La decisión clave es κλήσει: el inglés auditado exige preservar ''calling''. En español, «llamamiento» es la mejor equivalencia aquí; «vocación» queda como alternativa posible en nota, no como texto principal.'
  issues:
  - severity: medium
    issue: «Vocación» para κλήσει en el texto principal
    rationale: Aunque defendible, en español contemporáneo «vocación» suele asociarse a profesión, ministerio o inclinación interior. Aquí conviene mantener más explícitamente el nexo con «fue llamado», tal como exige la rationale inglesa.
  - severity: low
    issue: Nota b describe incorrectamente la construcción española
    rationale: El texto no usa una 'construcción impersonal'; usa una cláusula relativa normal sin pronombre sujeto expreso. La nota debe explicarlo con precisión.
