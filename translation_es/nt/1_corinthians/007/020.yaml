revisions:
- from: Cada uno[a] debe permanecer en la vocación en la que fue llamado[b].
  to: Cada uno[a] debe permanecer en el llamamiento en que fue llamado[b].
  rationale: Se cambia «vocación» por «llamamiento» para conservar con mayor fidelidad el eco léxico entre κλήσει y ἐκλήθη, que es central en la decisión auditada del POB. Se ajustan las notas para reflejar mejor esa elección y para describir con precisión el valor representativo del masculino singular griego sin atribuir al español una construcción que el texto no usa.
