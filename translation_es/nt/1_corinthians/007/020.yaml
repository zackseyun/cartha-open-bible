translation:
  language: es
  text: Cada uno[a] debe permanecer en el llamamiento en que fue llamado[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «condición», «situación» o «estado de vida». El griego dice «llamamiento», en eco con «fue llamado» en este mismo versículo.
    reason: lexical_alternative
  - marker: b
    text: El griego usa una forma masculina singular («fue llamado») de manera representativa, aplicando la instrucción a cada creyente.
    reason: cultural_note
lexical_decisions:
- source_word: ἕκαστος
  english_pob_choice: Each one
  chosen_spanish: Cada uno
  alternatives_spanish:
  - Cada persona
  - Todos
  lexicon: BDAG
  rationale: El distributivo singular se conserva mejor con «Cada uno», que refleja la aplicación individual de la instrucción sin volverla genérica de más.
- source_word: κλήσει
  english_pob_choice: calling
  chosen_spanish: vocación
  alternatives_spanish:
  - llamado
  - condición
  - situación
  - estado
  lexicon: BDAG
  rationale: En español, «vocación» conserva el vínculo con el acto de llamar y permite mantener la tensión teológica y circunstancial del término, aunque el contexto también puede sugerir condición o estado de vida.
- source_word: ᾗ ἐκλήθη
  english_pob_choice: in which he was called
  chosen_spanish: en la que fue llamado
  alternatives_spanish:
  - cuando fue llamado
  - a la que fue llamado
  lexicon: BDAG
  rationale: La relación preposicional con ἐν se refleja con «en la que», manteniendo el paralelismo estructural. «Fue llamado» preserva la pasiva divina sin especificar de más el agente.
- source_word: μενέτω
  english_pob_choice: should remain
  chosen_spanish: debe permanecer
  alternatives_spanish:
  - que permanezca
  - debería permanecer
  - ha de permanecer
  lexicon: BDAG
  rationale: El imperativo presente pide continuidad en la situación actual; «debe permanecer» transmite esa fuerza normativa de forma clara y natural en español.
theological_decisions:
- issue: Sentido de κλῆσις en contexto
  english_pob_reading: Retain 'calling' in the main text while allowing the contextual sense of one's present life situation/social condition to remain implicit.
  chosen_spanish_reading: Retener un término de «llamamiento/vocación» en el texto principal, dejando implícito el matiz de situación de vida.
  alternative_spanish_readings:
  - condición
  - estado de vida
  - situación
  rationale: El contexto habla de circunstancias vitales, pero Pablo enlaza κλήσει con ἐκλήθη; por eso conviene conservar el campo semántico de la vocación y no resolverlo solo como estado social.
  doctrine_reference: Translation philosophy §3, Preserve theological tension rather than resolve it; §5, Consistency of key terms, or documented exception.
- issue: Forma representativa del masculino singular
  english_pob_reading: Use 'he' in the main text.
  chosen_spanish_reading: Usar la pasiva impersonal «fue llamado» en lugar de marcar género en la traducción principal.
  alternative_spanish_readings:
  - él fue llamado
  - la persona fue llamada
  rationale: El griego usa una forma masculina singular representativa; en español, la pasiva impersonal evita añadir un pronombre innecesario y mantiene la aplicación universal sin perder la referencia al llamado.
  doctrine_reference: Translation philosophy §4, Gender-accurate over gender-neutral.
translation_notes:
  revision_awareness: Se corrigió la validación anterior integrando los marcadores de nota [a] y [b] directamente en el texto español. No se añadieron notas sin anclaje en el versículo.
  spanish_consistency_notes:
  - Se mantiene un tono bíblico moderno y digno, con sintaxis natural para el español.
  - Se evita «SEÑOR» y no aplica el uso del Tetragrámaton en este versículo.
  - La decisión léxica principal preserva el paralelismo entre «vocación» y «fue llamado».
