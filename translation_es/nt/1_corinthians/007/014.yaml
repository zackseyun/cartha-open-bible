revisions:
- from: Porque el esposo incrédulo ha sido hecho santo[a] por medio de su esposa, y la esposa incrédula ha sido hecha santa por medio del hermano; de otro modo, sus hijos serían inmundos, pero ahora son santos.
  to: Porque el esposo incrédulo ha sido hecho santo por medio de su esposa, y la esposa incrédula ha sido hecha santa por medio del hermano[a]; de otro modo, sus hijos son inmundos, pero ahora son santos.[b]
  rationale: Se corrige 'serían inmundos' a 'son inmundos' para ajustarse al presente griego ἐστιν y a la auditoría inglesa. Se reubica la nota [a] en 'el hermano' y se corrige su contenido para que preserve la alternativa explicativa documentada ('el esposo creyente') mientras mantiene el griego literal en el texto principal. Se añade la nota [b] porque el POB inglés preserva una aclaración teológica importante sobre 'ha sido hecho santo', y esa misma aclaración sigue siendo útil en español para evitar una lectura de salvación automática.
