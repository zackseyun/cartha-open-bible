translation:
  language: es
  text: Porque el esposo incrédulo ha sido hecho santo por medio de su esposa, y la esposa incrédula ha sido hecha santa por medio del hermano[a]; de otro modo, sus hijos son inmundos, pero ahora son santos.[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “por medio del esposo creyente”. Griego: “por medio del hermano”, probablemente usando “hermano” en el sentido habitual de Pablo para un creyente.'
    reason: lexical_alternative
  - marker: b
    text: “Ha sido hecho santo” aquí se refiere a una condición de consagración o de estar apartado en relación con el cónyuge creyente y la familia, no necesariamente a la salvación personal.
    reason: cultural_note
lexical_decisions:
- source_word: ἡγίασται
  english_pob_choice: has been made holy
  chosen_spanish: ha sido hecho santo / ha sido hecha santa
  alternatives_spanish:
  - ha sido santificado / santificada
  - está santificado / santificada
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado resultante; en español, 'ha sido hecho santo/a' comunica bien esa condición sin forzar la idea de salvación personal. 'Santificado' es una alternativa válida, pero puede sonar más técnica o eclesiástica.
- source_word: ἄπιστος
  english_pob_choice: unbelieving
  chosen_spanish: incrédulo / incrédula
  alternatives_spanish:
  - no creyente
  - sin fe
  lexicon: BDAG
  rationale: En este contexto matrimonial, el adjetivo describe a quien no cree. 'Incrédulo' conserva la relación con la fe y funciona con naturalidad en español.
- source_word: ἐν / διὰ
  english_pob_choice: through
  chosen_spanish: por medio de
  alternatives_spanish:
  - a través de
  - por
  lexicon: BDAG
  rationale: Aunque el griego usa ἐν, el valor relacional/instrumental está claro en el contexto. 'Por medio de' expresa esa mediación de manera natural en español y evita un calco forzado.
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - mujer casada
  lexicon: BDAG
  rationale: El contexto es marital; 'esposa' es el equivalente específico y claro en español.
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - hombre
  lexicon: BDAG
  rationale: El contexto es marital; 'esposo' es natural, neutral y preciso en español.
- source_word: ἀδελφῷ
  english_pob_choice: the brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - el hermano creyente
  - el esposo creyente
  lexicon: BDAG
  rationale: La traducción mantiene la forma del texto fuente. 'El hermano' preserva la transparencia al griego y la forma paulina habitual para un creyente; el referente probable se entiende por el contexto.
- source_word: ἐπεὶ ἄρα
  english_pob_choice: otherwise
  chosen_spanish: de otro modo
  alternatives_spanish:
  - porque entonces
  - si no
  lexicon: BDAG
  rationale: La combinación introduce una consecuencia lógica hipotética. 'De otro modo' comunica bien el enlace inferencial en español.
- source_word: ἀκάθαρτά
  english_pob_choice: unclean
  chosen_spanish: inmundos
  alternatives_spanish:
  - impuros
  - inmundos ritualmente
  lexicon: BDAG
  rationale: '''Inmundos'' conserva el peso cultual y de pureza ritual mejor que ''impuros'' en este contexto.'
- source_word: νῦν δὲ
  english_pob_choice: but as it is
  chosen_spanish: pero ahora
  alternatives_spanish:
  - pero de hecho
  - pero tal como están las cosas
  lexicon: BDAG
  rationale: La contraposición con la hipótesis anterior se mantiene de forma breve y natural. 'Pero ahora' es idiomático en español y se ajusta al contraste del versículo.
- source_word: ἅγιά
  english_pob_choice: holy
  chosen_spanish: santos
  alternatives_spanish:
  - sagrados
  - consagrados
  lexicon: BDAG
  rationale: Mantiene la continuidad léxica con 'santo/a' en la primera cláusula. 'Santos' es claro y conserva la resonancia de consagración sin añadir explicación doctrinal al texto principal.
theological_decisions:
- issue: Sentido de que el cónyuge incrédulo 'ha sido hecho santo'
  english_pob_reading: The phrase denotes a relational/covenantal holiness or set-apart status within the marriage, not automatic salvation of the unbelieving spouse.
  chosen_spanish_reading: La frase indica una santidad relacional o de consagración dentro del matrimonio, no la salvación automática del cónyuge incrédulo.
  alternative_spanish_readings:
  - El cónyuge incrédulo es salvo por el matrimonio
  - La frase solo alude a la legitimidad sexual del matrimonio
  rationale: El argumento de Pablo trata del estado del matrimonio y de los hijos en contraste con la impureza, no de una declaración directa de regeneración. 'Ha sido hecho santo/a' preserva el lenguaje del texto sin imponer una doctrina que el versículo no formula.
  doctrine_reference: Preservar la tensión teológica del texto; no sobreinterpretar la santidad como salvación personal.
- issue: Referente de 'el hermano'
  english_pob_reading: Retain 'the brother' in the main text, understood as the believing husband.
  chosen_spanish_reading: Se conserva 'el hermano' en el texto principal, entendido como el esposo creyente.
  alternative_spanish_readings:
  - el esposo
  - el cónyuge creyente
  rationale: El griego dice literalmente 'el hermano'. Mantenerlo conserva la transparencia al original y refleja el uso paulino de 'hermano' para un creyente. Una nota puede aclarar el referente probable.
  doctrine_reference: Primacía del idioma fuente sobre la nivelación interpretativa; fidelidad al léxico paulino.
translation_notes:
  revision_awareness: El audit trail inglés corrigió un tiempo verbal anterior que decía 'would be unclean' a 'are unclean'; por eso el español usa 'son inmundos' para reflejar el presente de ἐστιν. También se mantuvo la decisión de preservar 'el hermano' en la segunda cláusula para reflejar con transparencia ἀδελφῷ, en lugar de normalizarlo a 'esposo' en el texto principal.
  spanish_consistency_notes:
  - Se mantuvo la correspondencia de 'santo/a' y 'santos' para ἡγίασται / ἅγια.
  - '''Esposo/esposa'' se usa en la primera parte por el contexto matrimonial; ''el hermano'' se conserva donde el griego cambia deliberadamente el término.'
  - '''Inmundos'' se eligió para conservar el matiz de pureza ritual del contraste con ''santos''.'
  - La nota al pie aclara la alternativa de lectura sin borrar la forma fuente del texto.
