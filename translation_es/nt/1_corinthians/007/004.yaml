translation:
  language: es
  text: La esposa no tiene autoridad sobre su propio cuerpo[a], sino el esposo; de igual manera también el esposo no tiene autoridad sobre su propio cuerpo, sino la esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'ejerce autoridad sobre'. El verbo griego puede indicar ejercer o tener autoridad; aquí el sentido es la autoridad recíproca en el matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: En el contexto inmediato de 1 Corintios 7, γυνή se refiere a la mujer en relación matrimonial. 'Esposa' preserva esa especificidad mejor que el más general 'mujer'.
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - hombre
  lexicon: BDAG
  rationale: Aquí ἀνήρ está en paralelo con γυνή dentro del marco conyugal; por eso 'esposo' expresa con más precisión la relación matrimonial que el genérico 'hombre'.
- source_word: ἰδίου σώματος
  english_pob_choice: her own body / his own body
  chosen_spanish: su propio cuerpo
  alternatives_spanish:
  - el cuerpo que le pertenece
  - su cuerpo
  lexicon: BDAG
  rationale: ἴδιος enfatiza pertenencia personal y exclusividad. 'Su propio cuerpo' conserva ese énfasis de posesión sin volver la frase pesada en español.
- source_word: ἐξουσιάζει
  english_pob_choice: have authority over
  chosen_spanish: tiene autoridad sobre
  alternatives_spanish:
  - ejerce autoridad sobre
  - tiene control sobre
  - tiene derecho sobre
  lexicon: BDAG
  rationale: El verbo expresa autoridad o ejercicio de autoridad. 'Tiene autoridad sobre' reproduce de modo directo la fuerza relacional y recíproca del griego, sin intensificarla hacia dominación.
- source_word: ὁμοίως δὲ καὶ
  english_pob_choice: likewise also
  chosen_spanish: de igual manera también
  alternatives_spanish:
  - asimismo también
  - de la misma manera también
  lexicon: BDAG
  rationale: La secuencia subraya simetría y paralelismo. 'De igual manera también' conserva el enlace enfático y natural en español.
- source_word: ἀλλά
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Tras una negación previa, 'sino' expresa mejor el contraste correctivo que 'pero' en español. Mantiene la oposición marcada del griego sin introducir matices adicionales.
theological_decisions:
- issue: Naturaleza de la autoridad conyugal en el versículo
  english_pob_reading: Mutual authority without importing hierarchical or coercive implications beyond the text.
  chosen_spanish_reading: Autoridad recíproca entre los cónyuges, sin añadir jerarquía unilateral ni coerción que el texto no diga.
  alternative_spanish_readings:
  - Pertenencia mutua del cuerpo del cónyuge
  - Control del cuerpo del otro cónyuge
  rationale: 'El griego presenta una afirmación simétrica: cada cónyuge no ejerce autoridad sobre su propio cuerpo, sino el otro. La traducción debe conservar esa reciprocidad y no suavizarla hasta mera pertenencia ni endurecerla en términos de control absoluto.'
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene en alto acuerdo con la auditoría inglesa y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantuvo 'esposa/esposo' por la especificidad matrimonial del contexto.
  - Se conservó la simetría del verso con una estructura paralela en ambas mitades.
  - '''Sino'' refleja mejor el contraste correctivo tras la negación que ''pero''.'
  - No se introdujo vocabulario eclesiástico tradicional ajeno al griego del pasaje.
