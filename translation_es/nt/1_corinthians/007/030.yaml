translation:
  language: es
  text: y los que lloran, como si no lloraran[a], y los que se regocijan, como si no se regocijaran, y los que compran, como si no poseyeran,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “como no llorando ... como no regocijándose ... como no poseyendo”. El griego repite una construcción de “como no” para expresar una manera de vivir, no para negar que el llanto, el gozo o la compra sucedan.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κλαίοντες
  english_pob_choice: those who weep
  chosen_spanish: los que lloran
  alternatives_spanish:
  - los que se lamentan
  - los que están llorando
  lexicon: BDAG
  rationale: 'El participio presente con artículo funciona de modo sustantivo: ''los que están llorando''. ''Lloran'' es la equivalencia más directa y natural en español, y conserva la acción concreta sin intensificarla a ''lamentan'', que interpretaría más de lo que el griego exige.'
- source_word: ὡς μὴ κλαίοντες
  english_pob_choice: as not weeping
  chosen_spanish: como no llorando
  alternatives_spanish:
  - como si no lloraran
  - como no estuvieran llorando
  lexicon: BDAG
  rationale: La construcción ὡς μή + participio expresa modo o actitud, no una negación de que haya llanto. 'Como no llorando' conserva la forma comprimida y paralela del griego; la alternativa más idiomática 'como si no lloraran' se reserva para una nota porque añade explícitamente el matiz inferencial.
- source_word: χαίροντες
  english_pob_choice: those who rejoice
  chosen_spanish: los que se regocijan
  alternatives_spanish:
  - los que se alegran
  - los que gozan
  lexicon: BDAG
  rationale: En uso paulino, χαίρω suele tener el sentido elevado de 'regocijarse'. 'Regocijan' mantiene ese registro y el paralelismo con 'lloran' mejor que 'se alegran', que en español puede sonar más leve.
- source_word: ὡς μὴ χαίροντες
  english_pob_choice: as not rejoicing
  chosen_spanish: como no regocijándose
  alternatives_spanish:
  - como si no se regocijaran
  - como no alegrándose
  lexicon: BDAG
  rationale: Se mantiene el mismo valor de modo/actitud que en la primera cláusula y la simetría retórica del versículo. 'Regocijándose' conserva el vínculo verbal con χαίροντες y evita suavizar el contraste.
- source_word: ἀγοράζοντες
  english_pob_choice: those who buy
  chosen_spanish: los que compran
  alternatives_spanish:
  - los que adquieren
  - los que hacen compras
  lexicon: BDAG
  rationale: El participio alude a la compra ordinaria. 'Compran' es la forma más natural y directa en español, sin introducir un matiz comercial más técnico como 'adquieren'.
- source_word: κατέχοντες
  english_pob_choice: possessing
  chosen_spanish: poseyendo
  alternatives_spanish:
  - reteniendo
  - poseyendo como dueños
  lexicon: BDAG
  rationale: κατέχω puede significar tener, poseer, retener o sostener. En contraste con 'compran', el sentido aquí es tratar lo comprado como algo efectivamente poseído. 'Poseyendo' conserva la relación verbal y la tensión del original; 'reteniendo' sería posible pero desplazaría el énfasis hacia mantener en vez de poseer.
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  lexicon: BDAG
  rationale: Se conserva la repetición de καὶ con 'y' para mantener la cadencia acumulativa del texto griego.
theological_decisions:
- issue: Valor de las construcciones 'como no' en una exhortación sobre lágrimas, gozo y compras
  english_pob_reading: The verse exhorts believers to hold ordinary emotional and economic experiences with detachment in light of the present age's transience, not to deny the legitimacy of weeping, rejoicing, or buying.
  chosen_spanish_reading: El versículo exhorta a vivir el llanto, el gozo y las compras con desapego relativo, a la luz de la transitoriedad del tiempo presente, sin negar que esas experiencias ocurran.
  alternative_spanish_readings:
  - Prohibición ascética de llorar, alegrarse o comprar
  - Lectura meramente psicológica sin trasfondo escatológico
  rationale: 'La secuencia ὡς μή + participio mantiene la realidad de las acciones pero corrige su modo de ser vividas. La traducción española conserva esa tensión: no suprime las emociones ni las actividades, pero tampoco las convierte en absolutos. El contexto inmediato de 1 Corintios 7:26, 31 respalda ese sentido.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla en prohibición ni banalización
- issue: Registro verbal para χαίροντες en contexto paulino
  english_pob_reading: Those who rejoice
  chosen_spanish_reading: los que se regocijan
  alternative_spanish_readings:
  - los que se alegran
  - los que están contentos
  rationale: '''Regocijarse'' preserva el tono paulino y el paralelismo con ''lloran''. También evita reducir el término a una alegría ligera o circunstancial.'
  doctrine_reference: Lexical force in Pauline exhortation
translation_notes:
  revision_awareness: La redacción sigue el pasaje griego y el audit trail inglés sin depender mecánicamente de la versión inglesa. Se mantuvo la repetición de καὶ y la estructura breve de ὡς μή + participio, ajustando solo el español necesario para que el paralelismo suene natural sin perder la tensión semántica del original.
  spanish_consistency_notes:
  - Se usó 'Yahvé' solo cuando corresponda; este versículo no contiene el nombre divino.
  - Se evitó 'Cristo' y otras terminologías no presentes en el versículo.
  - Se mantuvo un registro sobrio y publicable, con paralelismo explícito y sin paráfrasis expansiva.
  - '''Regocijarse'' se eligió por consistencia con el valor paulino de χαίρω y para conservar simetría con ''llorar''.'
