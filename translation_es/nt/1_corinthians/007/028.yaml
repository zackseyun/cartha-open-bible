  - severity: medium
    issue: La nota al pie [a] no refleja una alternativa especialmente útil
    rationale: «te casas en matrimonio» es redundante y poco natural en español. Si se mantiene una nota, conviene reservarla para una alternativa real; en este versículo las notas más justificadas son sobre «en la carne» y sobre el valor de φείδομαι.
  - severity: medium
