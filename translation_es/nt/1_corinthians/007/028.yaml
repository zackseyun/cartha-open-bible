  source_alignment_summary: 'La mayor parte del borrador sigue bien el griego y el rastro POB: preserva la estructura condicional, «la virgen», «tribulación», y «en la carne» con la aclaración correcta de que no se refiere a la naturaleza pecaminosa. Sin embargo, φείδομαι no significa «me compadezco de ustedes», sino «los ahorro / les evito / los estoy perdonando de eso» en el sentido de ahorrarles sufrimiento o advertir para evitarles esa carga. Ese cambio altera de manera significativa el sentido verbal y la intención pastoral expresada en el original.'
  spanish_quality_summary: 'El español es generalmente claro y digno. «Te casas» / «se casa» es idiomático, aunque en un registro más formal también sería posible «si llegas a casarte». «Tales personas» y «tribulación en la carne» son comprensibles. El problema principal de calidad es semántico, no estilístico: «me compadezco de ustedes» suena natural, pero traduce otra idea distinta de la del griego.'
  glossary_alignment: 'Buena alineación con los defaults del proyecto en los términos relevantes: παρθένος -> «la virgen»; σάρξ -> «carne»; θλῖψις -> «tribulación». La única desalineación importante es φείδομαι, que debe reflejar la noción de ahorrar/evitar por el bien del receptor, no compasión.'
  issues:
