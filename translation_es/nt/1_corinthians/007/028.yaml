  text: ἐὰν δὲ καὶ ⸀γαμήσῃς, οὐχ ἥμαρτες. καὶ ἐὰν γήμῃ ἡ παρθένος, οὐχ ἥμαρτεν. θλῖψιν δὲ τῇ σαρκὶ ἕξουσιν οἱ τοιοῦτοι, ἐγὼ δὲ ὑμῶν φείδομαι.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/028.yaml
  text: But even if you marry[a], you have not sinned; and if the virgin marries, she has not sinned. Yet such people will have tribulation in the flesh[b], and I am sparing you.
  footnotes:
  - marker: a
    text: Or 'will have affliction/distress in the flesh.' The phrase likely refers to earthly or bodily hardships associated with marriage, not specifically to the 'sinful nature.'
    reason: lexical_alternative
  - marker: b
    text: Or 'I spare you' or 'I want to spare you.' Paul states his pastoral aim in warning them about such trouble.
    reason: lexical_alternative
