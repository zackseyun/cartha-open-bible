translation:
  language: es
  text: Pero aun si te casas, no has pecado; y si la virgen se casa, no ha pecado. Pero tales personas tendrán tribulación en la carne[a], y yo les evito eso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aflicción» o «angustia» en la carne. La frase probablemente se refiere a dificultades terrenales o corporales asociadas con el matrimonio, no a la «naturaleza pecaminosa».
    reason: lexical_alternative
  - marker: b
    text: O «los estoy ahorrando de eso» o «quiero evitarles eso». Pablo expresa su propósito pastoral al advertirles sobre tal tribulación.
    reason: lexical_alternative
lexical_decisions:
- source_word: γαμήσῃς
  english_pob_choice: you marry
  chosen_spanish: te casas
  alternatives_spanish:
  - te cases
  - te casás
  - te casas en matrimonio
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἐάν expresa una condición futura posible; en español, «te casas» comunica de forma natural esa condición sin sonar forzado. Se evita «te cases» en el texto principal porque el presente del indicativo funciona mejor en español en este tipo de condición prospectiva y mantiene la claridad.
- source_word: ἥμαρτες / ἥμαρτεν
  english_pob_choice: you have not sinned / she has not sinned
  chosen_spanish: no has pecado / no ha pecado
  alternatives_spanish:
  - no pecaste / no pecó
  - no has cometido pecado / no ha cometido pecado
  lexicon: BDAG
  rationale: El aoristo indica la negación de que el acto constituya pecado. «No has pecado» y «no ha pecado» conservan esa valoración moral directa con un español claro y sobrio.
- source_word: ἡ παρθένος
  english_pob_choice: the virgin
  chosen_spanish: la virgen
  alternatives_spanish:
  - la muchacha virgen
  - la joven virgen
  - la mujer virgen
  lexicon: BDAG
  rationale: Se preserva «la virgen» para mantener el valor léxico de παρθένος y no generalizar indebidamente a «mujer soltera» o «prometida». El artículo definido se conserva porque el griego parece referirse a la mujer ya en discusión.
- source_word: γήμῃ
  english_pob_choice: marries
  chosen_spanish: se casa
  alternatives_spanish:
  - se case
  - se casa en matrimonio
  lexicon: BDAG
  rationale: Se usa el mismo verbo natural en español que en la primera cláusula para sostener el paralelismo. «Se casa» resulta idiomático y fiel al sentido condicional.
- source_word: θλῖψιν
  english_pob_choice: tribulation
  chosen_spanish: tribulación
  alternatives_spanish:
  - aflicción
  - angustia
  - tribulación
  lexicon: BDAG
  rationale: La revisión inglesa prefirió «tribulation» para una correspondencia más cercana con θλῖψιν. En español, «tribulación» conserva esa cercanía semántica y el tono del pasaje sin rebajar el término a una simple molestia.
- source_word: τῇ σαρκὶ
  english_pob_choice: in the flesh
  chosen_spanish: en la carne
  alternatives_spanish:
  - en la carne
  - en el cuerpo
  - en su vida corporal
  lexicon: BDAG
  rationale: Se mantiene «carne» para reflejar σάρξ de manera literal y evitar introducir «naturaleza pecaminosa», que aquí no corresponde al contexto. La frase apunta a la esfera corporal o terrenal de la experiencia humana.
- source_word: οἱ τοιοῦτοι
  english_pob_choice: such people
  chosen_spanish: tales personas
  alternatives_spanish:
  - esas personas
  - los que son así
  - personas de ese tipo
  lexicon: BDAG
  rationale: «Tales personas» reproduce el carácter referencial general de οἱ τοιοῦτοι sin especificar más de lo que el texto dice. Suena natural en español y mantiene el enlace con los que acaban de ser mencionados.
- source_word: φείδομαι
  english_pob_choice: I am sparing you
  chosen_spanish: me compadezco de ustedes
  alternatives_spanish:
  - los estoy perdonando
  - los estoy preservando
  - les tengo consideración
  lexicon: BDAG
  rationale: El campo semántico de φείδομαι incluye ahorrar, dispensar, perdonar o reservar algo a favor de alguien. Dado el contexto pastoral, «me compadezco de ustedes» expresa la intención benéfica de Pablo, aunque reconoce cierta distancia respecto a un literal «los estoy preservando». Se opta por una formulación natural y reverente en español, sin perder el matiz de consideración pastoral.
theological_decisions:
- issue: Sentido de σάρξ en τῇ σαρκί
  english_pob_reading: non-metaphorical 'in the flesh' referring to earthly/embodied circumstances
  chosen_spanish_reading: «en la carne» como referencia a circunstancias corporales o terrenales, no a la "naturaleza pecaminosa"
  alternative_spanish_readings:
  - en el cuerpo
  - en la vida terrenal
  - en la naturaleza pecaminosa
  rationale: El contexto habla de dificultades prácticas asociadas al matrimonio, no de una afirmación antropológica sobre la depravación humana. Por eso se conserva el lenguaje de «carne» y se evita reinterpretarlo como «naturaleza pecaminosa».
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos para σάρξ; principios 3 y 5 de filosofía de traducción'
- issue: Matiz pastoral de φείδομαι
  english_pob_reading: I am sparing you
  chosen_spanish_reading: «me compadezco de ustedes» como expresión pastoral del deseo de evitarles dificultades
  alternative_spanish_readings:
  - los estoy preservando
  - quiero evitarles esto
  - los estoy perdonando
  rationale: La lectura inglesa subraya la intención pastoral. En español, «me compadezco de ustedes» comunica benevolencia y cuidado, aunque no reproduce de manera tan mecánica el verbo de ahorro/evitación. Se adopta por claridad y tono pastoral; el sentido de advertencia queda en el contexto inmediato.
  doctrine_reference: 'DOCTRINE.md: notas sobre verbos de consideración pastoral y preservación'
translation_notes:
  revision_awareness: La redacción sigue de cerca el paso revisado del audit trail inglés, que sustituyó «trouble» por «tribulation» para θλῖψιν y ajustó φείδομαι a una formulación más directa. En español se refleja esa cercanía con «tribulación» y una expresión pastoral que intenta conservar el matiz benévolo del verbo.
  spanish_consistency_notes:
  - Se mantiene «carne» para σάρξ en línea con el estándar del proyecto, sin sustituirlo por «naturaleza pecaminosa».
  - Se conserva «virgen» para παρθένος, evitando suavizar el término a «soltera» o «prometida».
  - Se usa «Jesús», «Dios» y «Yahvé» según el estándar general del proyecto, aunque no aparezcan en este versículo.
  - El registro es sobrio y eclesial, con puntuación española y paralelismo sintáctico entre las dos cláusulas condicionales.
