revisions:
- from: Pero aun si te casas[a], no has pecado; y si la virgen se casa, no ha pecado. Pero tales personas tendrán tribulación en la carne[b], y yo me compadezco de ustedes.
  to: Pero aun si te casas, no has pecado; y si la virgen se casa, no ha pecado. Pero tales personas tendrán tribulación en la carne[a], y yo les evito eso[b].
  rationale: Se corrigió φείδομαι para reflejar el sentido de ahorrar o evitarles una carga, que es el valor contextual del griego y del rastro POB en inglés. También se eliminaron la nota innecesaria sobre «te casas» y se añadió una nota en el verbo final, donde sí existe una alternativa léxica significativa. Se mantuvieron «la virgen», «tribulación» y «en la carne» por fidelidad al original y a las decisiones del proyecto.
