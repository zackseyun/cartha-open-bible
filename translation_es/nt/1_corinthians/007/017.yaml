translation:
  language: es
  text: Solo[a], como el Señor ha asignado a cada uno, como Dios ha llamado a cada uno, así ande[b]. Y así doy instrucciones en todas las iglesias.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ha repartido» o «ha distribuido». El verbo griego puede referirse a lo que el Señor ha distribuido o asignado a cada persona.
    reason: lexical_alternative
  - marker: b
    text: «Andar» es una metáfora bíblica común para el modo de vida de una persona; alternativamente, «vivir» o «conducirse».
    reason: lexical_alternative
lexical_decisions:
- source_word: Εἰ μὴ
  english_pob_choice: Only
  chosen_spanish: Solo
  alternatives_spanish:
  - Excepto
  - Más bien
  - Pero
  lexicon: BDAG
  rationale: La construcción funciona de manera exceptiva/adversativa en el flujo del argumento, no como una condición literal. «Solo» conserva la concisión y el matiz de transición principal sin sobreexplicar.
- source_word: ἑκάστῳ / ἕκαστον
  english_pob_choice: each one
  chosen_spanish: a cada uno
  alternatives_spanish:
  - cada persona
  - cada uno
  lexicon: BDAG
  rationale: La repetición de ἕκαστος enfatiza la aplicación individual. «A cada uno» conserva la distribución personal y suena natural en español.
- source_word: ἐμέρισεν
  english_pob_choice: has assigned
  chosen_spanish: ha asignado
  alternatives_spanish:
  - ha repartido
  - ha distribuido
  - ha asignado a cada uno su parte
  lexicon: BDAG
  rationale: μερίζω aquí alude a lo que el Señor ha distribuido o asignado en la situación de vida de cada persona. «Ha asignado» es claro y mantiene el sentido de designación soberana.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: 'Se conserva el título relacional y reverencial habitual para κύριος. En este contexto, la forma con artículo es natural en español: «el Señor».'
- source_word: κέκληκεν
  english_pob_choice: has called
  chosen_spanish: ha llamado
  alternatives_spanish:
  - llamó
  - ha convocado
  lexicon: BDAG
  rationale: El perfecto indica una llamada hecha con efecto vigente. «Ha llamado» preserva mejor ese valor que un simple pasado.
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: «Dios» es la equivalencia directa y natural. No se fuerza el artículo en español porque no aporta claridad adicional aquí.
- source_word: οὕτως
  english_pob_choice: so
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - entonces
  lexicon: BDAG
  rationale: «Así» reproduce bien la fuerza adverbial e inferencial y permite conservar la repetición del griego.
- source_word: περιπατείτω
  english_pob_choice: let him walk
  chosen_spanish: ande
  alternatives_spanish:
  - viva
  - se conduzca
  - ande en su vida
  lexicon: BDAG
  rationale: «Ande» conserva la metáfora bíblica de conducta o modo de vida que el inglés POB preserva con «walk». Aunque en español moderno puede sonar algo marcado, es fiel y reconocible en registro bíblico.
- source_word: διατάσσομαι
  english_pob_choice: I direct
  chosen_spanish: ordeno
  alternatives_spanish:
  - doy instrucciones
  - dispongo
  - prescribo
  lexicon: BDAG
  rationale: El verbo expresa una disposición autoritativa sobre la práctica eclesial. «Ordeno» conserva la fuerza normativa sin introducir una formulación más blanda que debilite el peso del verbo.
- source_word: ἐν ταῖς ἐκκλησίαις πάσαις
  english_pob_choice: in all the churches
  chosen_spanish: en todas las iglesias
  alternatives_spanish:
  - en todas las congregaciones
  - en todas las asambleas
  lexicon: BDAG
  rationale: En contexto paulino, ἐκκλησίαις se refiere a comunidades cristianas locales. «Iglesias» es la equivalencia clara y estable en español eclesial.
theological_decisions:
- issue: Distinción entre «el Señor» y «Dios»
  english_pob_reading: 'Retain both titles distinctly: ''as the Lord has assigned ... as God has called'''
  chosen_spanish_reading: 'Conservar ambos títulos de manera distinta: «como el Señor ha asignado... como Dios ha llamado»'
  alternative_spanish_readings:
  - Tratar ambos como variación estilística para el mismo referente divino
  rationale: El griego presenta dos designaciones divinas diferentes en cláusulas paralelas. La traducción conserva esa distinción en lugar de fusionarlas, para no borrar una tensión/referencia que el texto mismo mantiene.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla artificialmente.
- issue: Valor metafórico de περιπατείτω
  english_pob_reading: Preserve the metaphor with 'let him walk'
  chosen_spanish_reading: Preservar la metáfora con «ande»
  alternative_spanish_readings:
  - «viva»
  - «se conduzca»
  rationale: La metáfora de caminar/andar es común en la Biblia y comunica modo de vida. «Ande» mantiene la imagen y la forma exhortativa sin eliminar el eco figurado del griego.
  doctrine_reference: Mantener la metáfora bíblica cuando sigue siendo comprensible y fiel.
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete fuente griego y el auditorio inglés ya revisado, conservando la distinción entre κύριος y θεός, la repetición de ἕκαστος, el valor aspectual de κέκληκεν y la metáfora de περιπατείτω. También incorpora la revisión del cierre con καὶ οὕτως como «Y así» en vez de una expansión no explícita.
  spanish_consistency_notes:
  - Se usa «el Señor» para κύριος y «Dios» para θεός, sin fusionarlos.
  - Se mantiene «iglesias» para ἐκκλησίαις en sentido comunitario paulino.
  - Se conserva la metáfora de conducta con «ande» en lugar de neutralizarla con una paráfrasis.
  - La puntuación separa claramente las dos cláusulas paralelas y el mandato final, en línea con el griego y el POB inglés.
