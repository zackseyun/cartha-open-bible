    text: Or 'has apportioned' or 'has allotted.' The Greek verb can refer to what the Lord has distributed or assigned to each person.
    reason: lexical_alternative
  - marker: b
    text: '''Walk'' is a common biblical metaphor for one''s manner of life; alternatively, ''live'' or ''conduct his life.'''
    reason: lexical_alternative
