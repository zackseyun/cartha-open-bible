    issue: La frase «de cómo agradar al Señor» no refleja de la manera más natural la cláusula πῶς ἀρέσῃ τῷ κυρίῳ.
    rationale: El griego expresa una consideración/objetivo con πῶς + subjuntivo («cómo puede/pueda agradar al Señor»). En español, una cláusula verbal finita suena más natural y más cercana al original que la construcción nominalizada con infinitivo.
  - severity: low
    issue: Formato mejorable de la nota al pie.
    rationale: 'La nota comienza con comillas simples innecesarias antes de «O: …»; conviene normalizarla para legibilidad y estilo editorial.'
