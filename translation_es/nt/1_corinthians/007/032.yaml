translation:
  language: es
  text: Pero quiero que estén libres de preocupaciones. El soltero[a] se ocupa de las cosas del Señor, de cómo puede agradar al Señor;
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la persona soltera». El griego es masculino singular («el soltero»), aunque Pablo trata el estado de no casarse de manera más amplia en el contexto circundante.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Θέλω δὲ
  english_pob_choice: But I want
  chosen_spanish: Pero quiero
  alternatives_spanish:
  - Y quiero
  - Ahora quiero
  lexicon: BDAG
  rationale: θέλω expresa voluntad o deseo; «quiero» es la equivalencia natural en español. δέ aporta transición o contraste suave, y «Pero» conserva bien esa relación con el contexto anterior sin volver la frase pesada.
- source_word: ὑμᾶς ἀμερίμνους εἶναι
  english_pob_choice: you to be free from anxieties
  chosen_spanish: estén libres de preocupaciones
  alternatives_spanish:
  - estén sin preocupaciones
  - estén libres de ansiedades
  lexicon: BDAG
  rationale: ἀμέριμνος expresa la ausencia de preocupación o ansiedad. «Libres de preocupaciones» comunica el sentido de manera idiomática en español y mantiene la idea de no estar cargados por inquietudes.
- source_word: ὁ ἄγαμος
  english_pob_choice: The unmarried man
  chosen_spanish: El soltero
  alternatives_spanish:
  - El no casado
  - La persona no casada
  lexicon: BDAG
  rationale: El griego es masculino singular, y en este contexto Pablo habla del estado de no casado. «Soltero» es natural en español y conserva el rasgo singular masculino del texto; se añade nota para no perder la posibilidad contextual más amplia.
- source_word: μεριμνᾷ
  english_pob_choice: is concerned with
  chosen_spanish: se ocupa de
  alternatives_spanish:
  - se preocupa por
  - está atento a
  lexicon: BDAG
  rationale: μεριμνάω puede significar preocuparse o atender con interés. Dado que el versículo ya usa ἀμερίμνους para «sin preocupaciones», «se ocupa de» evita repetir una forma de ansiedad y preserva el sentido de atención concentrada.
- source_word: τὰ τοῦ κυρίου
  english_pob_choice: the things of the Lord
  chosen_spanish: las cosas del Señor
  alternatives_spanish:
  - los asuntos del Señor
  - lo que pertenece al Señor
  lexicon: BDAG
  rationale: La expresión griega es amplia e idiomática. «Las cosas del Señor» reproduce esa amplitud con una formulación clara y fiel, sin estrechar indebidamente la referencia.
- source_word: κυρίου / κυρίῳ
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este pasaje κύριος se refiere al Señor en sentido cristiano/devocional. «Señor» preserva el valor teológico y la lectura usual del término en el NT.
- source_word: πῶς ἀρέσῃ τῷ κυρίῳ
  english_pob_choice: how he may please the Lord
  chosen_spanish: de cómo agradar al Señor
  alternatives_spanish:
  - de cómo pueda agradar al Señor
  - de la manera de agradar al Señor
  lexicon: BDAG
  rationale: πῶς introduce el modo o la intención, y el subjuntivo aoristo expresa acción contemplada. En español, la construcción nominal «de cómo agradar» resulta natural y conserva la intención sin forzar un auxiliar modal.
theological_decisions:
- issue: Referencia masculina singular en ὁ ἄγαμος
  english_pob_reading: 'Retain masculine singular in the main text: ''The unmarried man'''
  chosen_spanish_reading: 'Mantener el singular masculino en el texto principal: «El soltero»'
  alternative_spanish_readings:
  - La persona soltera
  - El no casado
  rationale: La forma griega es masculino singular, y el contexto inmediato contrasta estados con marcación de género. Se mantiene la huella gramatical en el texto principal, mientras la nota aclara que la aplicación contextual no se limita necesariamente a varones.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (precisión de género sobre neutralización indebida)
- issue: Valor de ἀμέριμνος como ausencia de ansiedad, no indiferencia
  english_pob_reading: you to be free from anxieties
  chosen_spanish_reading: libres de preocupaciones
  alternative_spanish_readings:
  - sin preocupaciones
  - libres de ansiedades
  rationale: La frase no sugiere apatía, sino ausencia de cargas ansiosas. «Libres de preocupaciones» conserva la tensión lexical y evita una lectura de indiferencia espiritual.
  doctrine_reference: BDAG ἀμέριμνος; contexto inmediato de 1 Corintios 7:32
translation_notes:
  revision_awareness: 'Sin cambios respecto al último pase revisado: el borrador sigue alineado con la lectura griega y con el audit trail inglés; no se identificaron revisiones necesarias.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος de manera consistente con el NT y con la práctica POB documentada.
  - «Libres de preocupaciones» mantiene el vínculo semántico con ἀμερίμνους sin introducir una idea de indiferencia.
  - «El soltero» conserva la marcación masculina singular del griego; la nota evita una neutralización no justificada en el texto principal.
