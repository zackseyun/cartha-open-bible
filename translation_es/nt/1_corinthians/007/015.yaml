translation:
  language: es
  text: Pero si el incrédulo se separa[a], que se separe. El hermano o la hermana no está esclavizado[b] en tales casos[c], pero Dios nos ha llamado en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, según el contexto, «el cónyuge incrédulo».
    reason: lexical_alternative
  - marker: b
    text: O «no está ligado». El verbo griego es δουλόω («esclavizar»), no el verbo más común para «atar».
    reason: lexical_alternative
  - marker: c
    text: Algunos manuscritos leen «ustedes» en lugar de «nosotros».
    reason: textual_variant
lexical_decisions:
- source_word: ὁ ἄπιστος
  english_pob_choice: the unbeliever
  chosen_spanish: el incrédulo
  alternatives_spanish:
  - el no creyente
  - el incrédulo cónyuge
  lexicon: BDAG
  rationale: ἄπιστος funciona aquí como sustantivo y, por el contexto matrimonial, se refiere al cónyuge no creyente. «El incrédulo» conserva la forma sustantiva sin añadir «cónyuge» al texto principal, que sería interpretativo. «El no creyente» es posible, pero menos idiomático en español bíblico actual.
- source_word: χωρίζεται
  english_pob_choice: separates
  chosen_spanish: se separa
  alternatives_spanish:
  - se va
  - se aparta
  lexicon: BDAG
  rationale: En este contexto marital χωρίζω expresa separación. «Se separa» mantiene la relación verbal con el imperativo siguiente y no especifica más de lo que el griego dice.
- source_word: χωριζέσθω
  english_pob_choice: let him separate
  chosen_spanish: que se separe
  alternatives_spanish:
  - que se vaya
  - déjelo separarse
  lexicon: BDAG
  rationale: El imperativo concesivo permite la separación; no manda el divorcio. «Que se separe» reproduce con naturalidad la fuerza permisiva y conserva la repetición léxica con χωρίζεται.
- source_word: οὐ δεδούλωται
  english_pob_choice: is not enslaved
  chosen_spanish: no está esclavizado
  alternatives_spanish:
  - no está ligado
  - no está bajo servidumbre
  lexicon: BDAG
  rationale: El verbo procede de δουλόω, no del verbo habitual para «atar» o «ligar». «Esclavizado» preserva la fuerza lexical y evita suavizar la imagen. En español, la pasiva perifrástica «no está esclavizado» comunica bien el estado resultante.
- source_word: ὁ ἀδελφὸς ἢ ἡ ἀδελφὴ
  english_pob_choice: The brother or the sister
  chosen_spanish: el hermano o la hermana
  alternatives_spanish:
  - el hermano o la hermana creyentes
  - el hermano o la hermana en la fe
  lexicon: BDAG
  rationale: Pablo usa lenguaje fraternal para el creyente de cualquiera de los dos sexos. Mantener «el hermano o la hermana» refleja el griego de forma directa y evita introducir una glosa explicativa en el cuerpo del texto.
- source_word: ἐν τοῖς τοιούτοις
  english_pob_choice: in such cases
  chosen_spanish: en tales casos
  alternatives_spanish:
  - en circunstancias tales
  - en cosas así
  lexicon: BDAG
  rationale: La expresión es idiomática y apunta a situaciones como la descrita. «En tales casos» es claro, natural y conserva el plural demostrativo.
- source_word: ἐν δὲ εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz y tranquilidad
  - para paz
  lexicon: BDAG
  rationale: «Paz» aquí expresa el ámbito o condición del llamado de Dios. «En paz» es la correspondencia más directa y natural en español.
- source_word: κέκληκεν ἡμᾶς ὁ θεός
  english_pob_choice: God has called us
  chosen_spanish: Dios nos ha llamado
  alternatives_spanish:
  - Dios nos llamó
  - Dios os ha llamado
  lexicon: BDAG
  rationale: El perfecto κέκληκεν comunica un acto con resultado vigente; «ha llamado» lo refleja bien. Se sigue el plural inclusivo «nos» conforme al texto crítico griego.
theological_decisions:
- issue: Alcance de οὐ δεδούλωται respecto a la disolución matrimonial y el posible nuevo matrimonio
  english_pob_reading: Rendered lexically as 'is not enslaved' without specifying a full doctrine of remarriage.
  chosen_spanish_reading: Traducido como «no está esclavizado» sin definir en el texto principal si esto implica o no permiso de volver a casarse.
  alternative_spanish_readings:
  - no está ligado
  - no está bajo servidumbre
  rationale: El versículo afirma una falta de esclavitud en estas circunstancias, pero no expone de manera explícita toda la teología de la separación o el nuevo matrimonio. La traducción conserva la tensión doctrinal sin resolverla por adelantado.
  doctrine_reference: Preservar la tensión teológica sin importar una conclusión denominacional.
- issue: Referencia de ὁ ἄπιστος
  english_pob_reading: Generic 'the unbelieving one' in the main text, understood from context as the unbelieving spouse.
  chosen_spanish_reading: «el incrédulo» en el texto principal, entendido por el contexto como el cónyuge incrédulo.
  alternative_spanish_readings:
  - el no creyente
  - el incrédulo cónyuge
  rationale: El contexto matrimonial aclara el referente, pero añadir «cónyuge» al texto principal iría más allá de la formulación griega. La traducción conserva la forma sustantiva y deja la inferencia contextual al lector.
  doctrine_reference: Primacía del original sobre la explicitación interpretativa.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del audit trail que prefirió «the unbeliever» por ser más natural en inglés, pero en español se conservó «el incrédulo» porque es natural, compacto y mantiene mejor la sustantivación del griego en este contexto. También se mantuvo la decisión de traducir δουλόω con un término de esclavitud para no suavizar el valor léxico del verbo.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no se introduce una sustitución litúrgica.
  - Se mantiene la repetición léxica de χωρίζω / χωριζέσθω con «se separa / que se separe».
  - «En paz» conserva el sentido relacional/estado de εἰρήνῃ sin añadir matices ajenos al texto.
  - La nota manuscrita sobre «nosotros/ustedes» se deja en pie como variante textual, porque el griego recibido apoya «nos».
