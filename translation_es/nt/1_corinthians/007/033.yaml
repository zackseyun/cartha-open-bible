translation:
  language: es
  text: Pero el hombre casado se preocupa por las cosas del mundo[a], cómo agradar a su esposa,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los asuntos del mundo» o «los asuntos de este mundo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὁ δὲ γαμήσας
  english_pob_choice: the married man
  chosen_spanish: el hombre casado
  alternatives_spanish:
  - el casado
  - el que se ha casado
  lexicon: BDAG
  rationale: El participio aoristo con artículo funciona sustantivamente y designa al varón casado en contraste con el no casado del contexto. «El hombre casado» conserva esa referencia masculina singular en un español natural y claro.
- source_word: μεριμνᾷ
  english_pob_choice: is concerned with
  chosen_spanish: se preocupa por
  alternatives_spanish:
  - está preocupado por
  - se ocupa de
  lexicon: BDAG
  rationale: El verbo puede abarcar preocupación, cuidado o ansiedad. Aquí expresa la atención dividida del casado respecto de responsabilidades terrenales; «se preocupa por» comunica bien esa carga sin volverla excesivamente psicológica ni moralizarla.
- source_word: τὰ τοῦ κόσμου
  english_pob_choice: the things of the world
  chosen_spanish: las cosas del mundo
  alternatives_spanish:
  - los asuntos del mundo
  - los asuntos mundanos
  lexicon: BDAG
  rationale: La construcción genitiva se refiere a asuntos pertenecientes a la vida ordinaria del mundo. «Las cosas del mundo» sigue de cerca la forma concreta del griego y mantiene el sentido neutral de κόσμος sin imponer una lectura despectiva.
- source_word: πῶς ἀρέσῃ
  english_pob_choice: how he may please
  chosen_spanish: por cómo agradar
  alternatives_spanish:
  - cómo puede agradar
  - de qué manera agradar
  lexicon: BDAG
  rationale: 'La interrogativa con subjuntivo expresa el contenido de la preocupación: la manera de agradar. En español, «por cómo agradar» conserva la idea deliberativa y fluye de modo natural dentro de la frase.'
- source_word: τῇ γυναικί
  english_pob_choice: his wife
  chosen_spanish: a su esposa
  alternatives_spanish:
  - a la esposa
  - a su mujer
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή significa «esposa». El posesivo es implícito en griego; en español se expresa con naturalidad como «su esposa». «Mujer» sería posible, pero menos preciso y más ambiguo en registro contemporáneo.
theological_decisions:
- issue: Sentido de κόσμος en un contexto matrimonial
  english_pob_reading: Rendered neutrally as 'the world' / 'the things of the world'
  chosen_spanish_reading: 'Se mantiene un sentido neutral: «las cosas del mundo».'
  alternative_spanish_readings:
  - «las cosas mundanas» con matiz negativo
  - «los asuntos de este mundo»
  rationale: El contexto no condena el matrimonio; contrasta las responsabilidades del casado con la devoción indivisa al Señor. Por eso conviene conservar la tensión sin cargar κόσμος con un juicio moral que el texto aquí no explicita.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: El expediente inglés de POB no muestra revisiones aplicadas y el último pase quedó sin cambios; por tanto, la redacción española sigue de cerca la lectura auditada estable.
  spanish_consistency_notes:
  - Se mantiene la correspondencia masculina singular de ὁ δὲ γαμήσας con «el hombre casado».
  - «Mundo» se usa en sentido neutral, coherente con la decisión teológica auditada.
  - El posesivo de τῇ γυναικί se explicita como «su esposa» por naturalidad del español.
  - La puntuación reproduce la coordinación y la pausa antes de la frase final, de forma publicable en español.
