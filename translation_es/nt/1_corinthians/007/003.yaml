translation:
  language: es
  text: El marido debe dar a su esposa lo que le corresponde[a], y asimismo la esposa a su marido.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la deuda / obligación»; más literalmente, «lo debido». En este contexto, se refiere a la obligación conyugal recíproca.
    reason: lexical_alternative
lexical_decisions:
- source_word: γυναικί / γυνή
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή se refiere a la esposa, no a una mujer en general. «Esposa» mantiene esa relación con claridad y corresponde al paralelismo con ἀνήρ.
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: marido
  alternatives_spanish:
  - esposo
  - varón
  lexicon: BDAG
  rationale: En paralelo con γυνή dentro de una instrucción matrimonial, ἀνήρ designa al esposo. «Marido» es natural en español y conserva el sentido relacional sin perder dignidad estilística.
- source_word: ὀφειλήν
  english_pob_choice: her due
  chosen_spanish: lo que le corresponde
  alternatives_spanish:
  - su deber
  - la deuda que se le debe
  - su derecho conyugal
  lexicon: BDAG
  rationale: ὀφειλή denota primariamente lo debido u obligado. La formulación «lo que le corresponde» reproduce esa idea de deuda/obligación sin imponer demasiado pronto una especificación jurídica o eufemística; además deja abierta la referencia conyugal que el contexto inmediato aporta.
- source_word: ἀποδιδότω
  english_pob_choice: must give
  chosen_spanish: debe dar
  alternatives_spanish:
  - debe rendir
  - ha de dar
  - debe entregar
  lexicon: BDAG
  rationale: El imperativo presente expresa obligación continua. «Debe dar» comunica bien la fuerza obligatoria en español actual y evita una calca rígida como «rendir».
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: asimismo
  alternatives_spanish:
  - igualmente
  - de la misma manera
  lexicon: BDAG
  rationale: «Asimismo» preserva la reciprocidad y el paralelismo entre las dos cláusulas con un tono claro y sobrio.
- source_word: δὲ καὶ
  english_pob_choice: and likewise
  chosen_spanish: y asimismo
  alternatives_spanish:
  - y también
  - pero también
  - asimismo
  lexicon: BDAG
  rationale: La combinación enlaza la segunda cláusula de forma aditiva y recíproca. «Y asimismo» refleja bien ese valor coordinante sin sobrecargar la frase.
theological_decisions:
- issue: Cómo expresar ὀφειλή en un pasaje sobre deber conyugal sin estrecharlo demasiado
  english_pob_reading: Use 'her due' in the main text, with a note that more literally it is 'the debt/obligation' and that the context refers to conjugal obligation.
  chosen_spanish_reading: Usar «lo que le corresponde» en el texto principal, con nota que explique que el sentido más literal es «la deuda / obligación» y que el contexto apunta a la obligación conyugal recíproca.
  alternative_spanish_readings:
  - su deuda
  - su obligación
  - su derecho conyugal
  - su deber conyugal
  rationale: La palabra griega conserva tensión entre deuda, obligación y lo debido. «Lo que le corresponde» es suficientemente abierto para no resolver prematuramente la precisión semántica, pero en la nota se preserva la fuerza lexical y la lectura conyugal del contexto cercano (vv. 2, 4–5).
  doctrine_reference: 'Translation philosophy: optimal equivalence; preserve lexical/theological tension rather than flattening it'
- issue: Si conviene hacer explícita la relación matrimonial con los sustantivos griegos γυνή y ἀνήρ
  english_pob_reading: wife / husband
  chosen_spanish_reading: esposa / marido
  alternative_spanish_readings:
  - mujer / hombre
  - esposa / esposo
  rationale: El pasaje trata de instrucciones matrimoniales, por lo que en español «esposa» y «marido» expresan con naturalidad la relación implícita en el griego. Esto evita ambigüedad y mantiene el paralelismo recíproco del versículo.
  doctrine_reference: Contextual lexical choice grounded in marital discourse
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del audit trail en cuanto a evitar expandir ὀφειλήν hacia una formulación demasiado interpretativa. Por eso se evitó «deber conyugal» en el cuerpo principal y se optó por una expresión más literal y abierta, mientras la nota conserva la precisión semántica documentada.
  spanish_consistency_notes:
  - Se mantuvo un paralelismo sintáctico claro entre las dos mitades del versículo.
  - Se prefirió vocabulario matrimonial directo («esposa», «marido») porque el contexto inmediato ya restringe γυνή y ἀνήρ.
  - La nota al pie usa una alternativa léxica explícita para preservar la tensión entre 'deuda', 'obligación' y 'lo debido'.
