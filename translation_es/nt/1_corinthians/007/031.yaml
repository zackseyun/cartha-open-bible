translation:
  language: es
  text: y los que usan el mundo, como si no hicieran pleno uso de él[a]; porque la forma presente[b] de este mundo va pasando.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «como si no lo usaran al máximo»; el verbo también puede llevar el sentido de «como si no abusaran de él».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «la forma exterior» o «la apariencia» de este mundo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χρώμενοι
  english_pob_choice: use
  chosen_spanish: usan
  alternatives_spanish:
  - hacen uso de
  - se sirven de
  lexicon: BDAG
  rationale: χράομαι expresa el acto de usar o servirse de algo. «Usan» es natural en español y conserva la relación directa con el verbo intensificado que sigue.
- source_word: κόσμον
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - el orden actual del mundo
  lexicon: BDAG
  rationale: κόσμος aquí designa el mundo en su orden presente; «el mundo» es la forma más directa y comprensible en español, sin perder la referencia al orden social y material vigente.
- source_word: ὡς μὴ καταχρώμενοι
  english_pob_choice: as not making full use of it
  chosen_spanish: como si no lo usaran
  alternatives_spanish:
  - como no haciendo pleno uso de él
  - como si no se sirvieran de él al máximo
  - como si no lo explotaran
  lexicon: BDAG
  rationale: καταχράομαι intensifica χράομαι. En español, «como si no lo usaran» mantiene el contraste y deja abierta la tensión semántica entre uso pleno, uso excesivo o abuso, sin fijar demasiado una sola interpretación.
- source_word: παράγει
  english_pob_choice: is passing away
  chosen_spanish: va pasando
  alternatives_spanish:
  - está pasando
  - pasa
  - está desapareciendo
  lexicon: BDAG
  rationale: El presente de παράγει comunica un proceso en curso. «Va pasando» expresa ese carácter progresivo y conserva la idea de transitoriedad.
- source_word: σχῆμα
  english_pob_choice: present form
  chosen_spanish: forma presente
  alternatives_spanish:
  - forma exterior
  - apariencia
  - configuración presente
  lexicon: BDAG
  rationale: σχῆμα se refiere a la forma o apariencia externa y temporal. «Forma presente» refleja bien el matiz de actualidad transitoria y evita un giro demasiado arcaico.
- source_word: τοῦ κόσμου τούτου
  english_pob_choice: of this world
  chosen_spanish: de este mundo
  alternatives_spanish:
  - de este orden del mundo
  - de este mundo actual
  lexicon: BDAG
  rationale: El demostrativo τούτου es importante y se conserva con «este». «De este mundo» mantiene la fuerza de la referencia al orden presente y pasajero.
theological_decisions:
- issue: Sentido de καταχρώμενοι frente a χρώμενοι
  english_pob_reading: Paul instructs believers to engage the world without becoming fully absorbed in or overusing it, rather than primarily condemning immoral abuse.
  chosen_spanish_reading: Pablo exhorta a relacionarse con el mundo sin quedar absorbidos por él ni absolutizar su uso; la frase no se limita a una censura moral de abuso.
  alternative_spanish_readings:
  - Pablo condena el abuso del mundo
  - Pablo quiere decir simplemente que no se use en absoluto
  rationale: El par verbal crea un juego entre «usar» y «usar plenamente». La traducción conserva esa tensión sin cerrarla a una sola lectura moralizante.
  doctrine_reference: Translation philosophy §3, preservar la tensión teológica en vez de resolverla.
- issue: Sentido de σχῆμα
  english_pob_reading: The phrase refers to the transient present mode or outward form of the world order.
  chosen_spanish_reading: La frase se refiere a la forma o modo presente y transitorio del mundo.
  alternative_spanish_readings:
  - la apariencia del mundo
  - la naturaleza esencial del mundo
  rationale: En contexto, σχῆμα apunta a la configuración visible y pasajera del mundo, no a su esencia. «Forma presente»/«forma o modo presente» preserva ese carácter temporal.
  doctrine_reference: Translation philosophy §3, eschatological detachment without denying creation’s goodness.
translation_notes:
  revision_awareness: 'Coincide con el último pase de revisión: no se requirieron cambios sustanciales; la redacción conserva el paralelismo verbal χρώμενοι / καταχρώμενοι y el matiz progresivo de παράγει.'
  spanish_consistency_notes:
  - Se mantuvo «mundo» para κόσμος conforme al criterio POB y porque el contexto inmediato habla del orden presente, no de la creación en abstracto.
  - Se evitó «Cristo»/«Mesías» porque no aparecen en el versículo.
  - «Va pasando» conserva el presente progresivo de παράγει mejor que un perfecto o un simple presente puntual.
  - Se usó «de este mundo» para retener el demostrativo τούτου sin sobreexplicar con perífrasis interpretativa.
