    rationale: En el texto, [a] aparece en «esclavo[a]», pero la nota explica el término griego ἀπελεύθερος y la elección de «liberto». Esto induce a error y rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: La redacción «el libre llamado» es algo forzada en español.
    rationale: Aunque no es incorrecta, suena menos natural que una formulación verbal como «el que fue llamado siendo libre», que conserva mejor el sentido del participio y el contraste de estatus.
  - severity: low
