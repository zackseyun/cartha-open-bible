translation:
  language: es
  text: Porque el esclavo llamado en el Señor es liberto[a] del Señor; de igual manera[b], el que fue llamado siendo libre es esclavo de Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «persona libre del Señor». El griego ἀπελεύθερος designa específicamente a una persona liberada de la esclavitud; por eso se eligió «liberto» para conservar ese matiz social.
    reason: lexical_alternative
  - marker: b
    text: O «igualmente». Se conserva la transición paralela del griego ὁμοίως; «de igual manera» mantiene el equilibrio retórico con naturalidad en español.
    reason: lexical_alternative
lexical_decisions:
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Se conserva la fuerza social y legal del término, que es central en el contraste paulino. «Esclavo» comunica mejor la paradoja del versículo que «siervo», que suaviza el vínculo de propiedad o subordinación.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - perteneciente al Señor
  lexicon: BDAG
  rationale: La frase se mantiene de forma directa para conservar el matiz paulino de esfera o unión con el Señor, sin explicar en exceso el vínculo.
- source_word: κληθεὶς
  english_pob_choice: was called
  chosen_spanish: llamado
  alternatives_spanish:
  - habiendo sido llamado
  - fue llamado
  lexicon: BDAG
  rationale: El participio aoristo pasivo se refleja con un participio adjetival natural en español. En este contexto, «llamado» preserva la idea de llamada divina sin forzar la sintaxis.
- source_word: ἀπελεύθερος
  english_pob_choice: freedman
  chosen_spanish: liberto
  alternatives_spanish:
  - liberado
  - persona libre
  lexicon: BDAG
  rationale: «Liberto» expresa con precisión el estado jurídico-social de quien ha sido liberado de la esclavitud. Es más específico que «liberado» y evita diluir el contraste con δοῦλος.
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: del Señor
  alternatives_spanish:
  - de el Señor
  lexicon: BDAG
  rationale: Se conserva la relación posesiva directa. En español, «del Señor» reproduce con naturalidad el genitivo y mantiene la pertenencia teológica.
- source_word: ὁμοίως
  english_pob_choice: likewise
  chosen_spanish: de igual manera
  alternatives_spanish:
  - así mismo
  - igualmente
  lexicon: BDAG
  rationale: «De igual manera» reproduce el valor de transición y paralelismo con claridad, manteniendo el equilibrio retórico entre ambas mitades del versículo.
- source_word: ἐλεύθερος
  english_pob_choice: free man
  chosen_spanish: el libre
  alternatives_spanish:
  - hombre libre
  - persona libre
  lexicon: BDAG
  rationale: Se evita «hombre libre» para no introducir innecesariamente un sustantivo de género que el español puede omitir. «El libre» conserva el contraste social sin añadir contenido ajeno.
- source_word: Χριστοῦ
  english_pob_choice: Messiah’s
  chosen_spanish: de Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: 'Se sigue el criterio del proyecto de traducir Χριστός como «Mesías» cuando funciona como título. El genitivo expresa pertenencia: el libre llamado pertenece a Mesías como esclavo.'
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - amo
  lexicon: BDAG
  rationale: Se mantiene «Señor» como título teológicamente cargado. «Amo» no se elige porque en este contexto κύριος no se reduce a una relación social de dominio.
theological_decisions:
- issue: Paradoja de estatus social y pertenencia espiritual
  english_pob_reading: The called slave is the Lord’s freedman, and the called free man is Messiah’s slave.
  chosen_spanish_reading: El esclavo llamado en el Señor es liberto del Señor, y el libre llamado es esclavo de Mesías.
  alternative_spanish_readings:
  - El esclavo llamado en el Señor es libre del Señor
  - el libre llamado es siervo de Mesías
  rationale: 'Se mantiene la tensión del texto: la esclavitud social no anula la libertad espiritual en el Señor, y la libertad social no elimina la pertenencia a Mesías. Suavizar cualquiera de los dos términos desdibujaría el contraste intencional de Pablo.'
  doctrine_reference: Translation philosophy §1; tabla de términos controvertidos para δοῦλος y Χριστός
- issue: Traducción del título Χριστός
  english_pob_reading: Messiah’s
  chosen_spanish_reading: de Mesías
  alternative_spanish_readings:
  - de Cristo
  rationale: Se sigue el principio del proyecto de traducir Χριστός como «Mesías» cuando actúa como título. En este versículo la referencia expresa pertenencia al Mesías, no un mero nombre propio.
  doctrine_reference: Translation philosophy §2; glossary cristológico del proyecto
- issue: Valor de κύριος aplicado a Jesús
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - el Dueño
  - el Amo
  rationale: «Señor» conserva la carga cristológica del término y evita rebajar el texto a una mera relación patronal. En el contexto paulino, la palabra remite a la autoridad de Jesús exaltado.
  doctrine_reference: Translation philosophy §2; tabla de términos para κύριος
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que osciló entre «Messiah» y «Christ» para Χριστοῦ, y luego volvió a «Messiah» por la política doctrinal del proyecto. También hubo una revisión menor sobre la naturalidad de la formulación. En español se adopta «Mesías» por coherencia con la decisión doctrinal final, y se mantiene el contraste social fuerte de δοῦλος/ἀπελεύθερος sin suavizarlo.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος y no «Señor» como máscara indiferenciada de Yahvé; aquí el contexto es la relación del creyente con el Señor Jesús.
  - «Mesías» se conserva para Χριστοῦ por la política terminológica del proyecto.
  - «esclavo» se usa de manera consistente para δοῦλος, dado que la fuerza del contraste depende del estatus social real.
  - «liberto» refleja mejor ἀπελεύθερος que «persona libre», porque mantiene la referencia a liberación de esclavitud.
