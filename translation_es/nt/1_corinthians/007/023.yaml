translation:
  language: es
  text: Ustedes fueron comprados por un precio[a]; no se hagan esclavos de los hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esclavos de las personas» o «esclavos de los seres humanos». El griego dice «hombres» en sentido representativo, en contraste con amos humanos y con el Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: τιμῆς
  english_pob_choice: with a price
  chosen_spanish: por precio
  alternatives_spanish:
  - a precio de
  - con un precio
  lexicon: BDAG
  rationale: El genitivo con ἀγοράζω expresa costo o precio. En español, «por precio» conserva de forma natural la idea de compra costosa sin añadir un artículo ni precisar una cuantía que el griego no da.
- source_word: ἠγοράσθητε
  english_pob_choice: you were bought
  chosen_spanish: fueron comprados
  alternatives_spanish:
  - fueron adquiridos
  - fueron comprados como posesión
  lexicon: BDAG
  rationale: El aoristo pasivo de segunda persona plural se expresa con pasado pasivo. «Comprados» mantiene la metáfora comercial-redentora del contexto y suena más directo que «adquiridos».
- source_word: μὴ γίνεσθε
  english_pob_choice: do not become
  chosen_spanish: no se hagan
  alternatives_spanish:
  - no se conviertan
  - no lleguen a ser
  lexicon: BDAG
  rationale: γίνομαι aquí conserva la idea de entrar en un estado. «No se hagan» refleja esa fuerza aspectual y prohibitiva mejor que un simple «no sean».
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - criados
  lexicon: BDAG
  rationale: Siguiendo la pauta del proyecto, δοῦλος se traduce por «esclavo» cuando el vínculo de pertenencia y sujeción es central. Aquí el contraste con haber sido comprados hace que la carga de propiedad sea esencial.
- source_word: ἀνθρώπων
  english_pob_choice: of men
  chosen_spanish: de los hombres
  alternatives_spanish:
  - de las personas
  - de los seres humanos
  lexicon: BDAG
  rationale: 'El genitivo depende de δοῦλοι: «esclavos de hombres». «Hombres» conserva la forma representativa del griego y el contraste con el Señor, sin borrar la referencia general a seres humanos.'
theological_decisions:
- issue: Relación entre la compra redentora y la prohibición de someterse a dominio humano último
  english_pob_reading: You were bought with a price; do not become slaves of men.
  chosen_spanish_reading: Ustedes fueron comprados por precio; no se hagan esclavos de los hombres.
  alternative_spanish_readings:
  - Ustedes fueron comprados a precio; no se conviertan en esclavos de hombres
  - Ustedes fueron adquiridos por precio; no se hagan esclavos de personas
  rationale: La formulación española debe conservar el nexo entre la compra sufrida y la libertad frente a señores humanos. «Esclavos» preserva la fuerza del conflicto de lealtades y propiedad implícito en el versículo, sin suavizarlo hacia «siervos».
  doctrine_reference: 'DOCTRINE.md: Contested terms (δοῦλος); ownership/allegiance in Pauline metaphor'
- issue: Valor representativo de ἀνθρώπων frente a una lectura exclusivamente masculina
  english_pob_reading: slaves of men / slaves of people / slaves of human beings
  chosen_spanish_reading: esclavos de los hombres
  alternative_spanish_readings:
  - esclavos de las personas
  - esclavos de los seres humanos
  rationale: La forma griega usa el plural genérico ἀνθρώπων en contraste con el Señor. En el texto principal se conserva «los hombres» por fidelidad formal y porque funciona como término representativo; la amplitud inclusiva queda explícita en la nota.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
translation_notes:
  revision_awareness: El cotejo con el texto griego y el audit trail inglés muestra alta concordancia y sin revisiones pendientes; por eso se mantiene la metáfora comercial y la fuerza de δοῦλοι sin atenuación.
  spanish_consistency_notes:
  - Se mantiene «esclavos» para δοῦλοι conforme a la terminología del proyecto.
  - Se usa «por precio» para τιμῆς por naturalidad en español y fidelidad al sentido de costo.
  - «Hombres» se conserva en el texto principal y la amplitud inclusiva se aclara en nota.
  - La segunda persona plural se traduce con «ustedes» para claridad y registro neutro latinoamericano.
