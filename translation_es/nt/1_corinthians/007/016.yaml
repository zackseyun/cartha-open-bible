translation:
  language: es
  text: Pues, ¿cómo sabes, esposa[a], si salvarás a tu esposo? ¿O cómo sabes, esposo, si salvarás a tu esposa?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de forma más idiomática: ‘¿cómo puedes saber ... si podrás salvar ...?’. El griego usa un futuro (‘salvarás’) dentro de una pregunta indirecta.'
    reason: lexical_alternative
lexical_decisions:
- source_word: τί γὰρ οἶδας
  english_pob_choice: For how do you know
  chosen_spanish: Porque, ¿cómo sabes
  alternatives_spanish:
  - Porque, ¿qué sabes
  - Porque, ¿cómo puedes saber
  lexicon: BDAG
  rationale: τί + οἶδα funciona aquí como una pregunta retórica idiomática; en español, ‘¿cómo sabes?’ comunica la fuerza natural de la expresión mejor que una traducción literal de ‘qué sabes’. ‘Porque’ conserva el valor explicativo de γάρ.
- source_word: γύναι
  english_pob_choice: wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  - esposo
  lexicon: BDAG
  rationale: En el contexto matrimonial de 1 Corintios 7, γύναι se refiere a la cónyuge femenina. ‘Esposa’ es más preciso y más natural que ‘mujer’ para la relación marcada por el pasaje.
- source_word: ἄνδρα / ἄνερ
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - hombre
  lexicon: BDAG
  rationale: Las dos formas de ἀνήρ aquí apuntan al cónyuge masculino dentro del contexto marital. ‘Esposo’ es claro, bíblicamente sobrio y evita la ambigüedad de ‘hombre’.
- source_word: σώσεις
  english_pob_choice: you will save
  chosen_spanish: salvarás
  alternatives_spanish:
  - podrás salvar
  - vas a salvar
  lexicon: BDAG
  rationale: El futuro de σῴζω se conserva con ‘salvarás’. No se reduce a ‘preservar el matrimonio’ ni se aclara con un glosa interpretativa, para mantener la tensión teológica del verbo en Pablo.
- source_word: τὸν ἄνδρα
  english_pob_choice: your husband
  chosen_spanish: a tu esposo
  alternatives_spanish:
  - a tu marido
  - a tu hombre
  lexicon: BDAG
  rationale: El artículo con el sustantivo en este vocativo indirecto apunta al cónyuge en vista; el español idiomático expresa esa relación con el posesivo ‘tu’.
- source_word: τὴν γυναῖκα
  english_pob_choice: your wife
  chosen_spanish: a tu esposa
  alternatives_spanish:
  - a tu mujer
  lexicon: BDAG
  rationale: Como en la primera cláusula, el español necesita el posesivo para expresar de forma natural la relación conyugal.
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - O
  lexicon: BDAG
  rationale: La conjunción disyuntiva se mantiene con ‘¿O’ para enlazar la segunda pregunta paralela sin añadir matices no presentes en el griego.
theological_decisions:
- issue: Alcance de σῴζω ('save') en el contexto matrimonial
  english_pob_reading: Retain 'save' as the text's wording, allowing its evangelistic/salvific force to stand without reduction.
  chosen_spanish_reading: Conservar ‘salvar’ sin reducirlo a ‘preservar el matrimonio’ ni a una simple influencia doméstica.
  alternative_spanish_readings:
  - ganar para la fe
  - preservar el matrimonio
  - rescatar espiritualmente
  rationale: En Pablo, σῴζω conserva fuerza soteriológica real. La traducción española debe dejar abierta esa tensión, en lugar de resolverla con una paráfrasis que estreche el sentido.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indica que no hubo cambios necesarios; el presente borrador sigue el acuerdo alto del control cruzado y conserva la tensión lexical de σῴζω, ajustando la formulación al español natural sin perder la forma interrogativa del griego.
  spanish_consistency_notes:
  - Se mantuvo ‘salvar’ en ambos miembros del versículo para reflejar σῴζω de manera consistente.
  - Se optó por ‘esposa/esposo’ en lugar de ‘mujer/hombre’ para desambiguar el contexto matrimonial.
  - Se conservó la repetición paralela de la pregunta retórica en español, incluyendo la disyunción ‘¿O’.
