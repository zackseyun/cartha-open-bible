translation:
  language: es
  text: La esposa está ligada mientras vive su marido; pero si su marido muere[a], es libre para casarse con quien quiera[b], solo en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “si su marido se duerme”. El griego usa “se duerme” como eufemismo común de la muerte.'
    reason: lexical_alternative
  - marker: b
    text: 'La frase “solo en el Señor” suele entenderse como: solo con alguien que pertenece al Señor, es decir, con otro creyente.'
    reason: alternative_reading
lexical_decisions:
- source_word: Γυνή
  english_pob_choice: A wife
  chosen_spanish: La esposa
  alternatives_spanish:
  - La mujer
  lexicon: BDAG
  rationale: En este contexto marital, γυνή se refiere a la cónyuge y no a 'mujer' en sentido general. 'Esposa' comunica con naturalidad la relación con 'su marido' y conserva la precisión contextual.
- source_word: δέδεται
  english_pob_choice: is bound
  chosen_spanish: está ligada
  alternatives_spanish:
  - está atada
  - está vinculada
  lexicon: BDAG
  rationale: El perfecto pasivo expresa un estado continuo de obligación o sujeción. 'Está ligada' mantiene la fuerza relacional/legal sin endurecer el registro con una calca demasiado mecánica.
- source_word: ἐφ’ ὅσον χρόνον
  english_pob_choice: for as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - por todo el tiempo que
  - por cuanto tiempo
  lexicon: BDAG
  rationale: La expresión marca duración. 'Mientras' es la forma española más natural y clara para expresar la extensión temporal del vínculo.
- source_word: ζῇ
  english_pob_choice: lives
  chosen_spanish: vive
  alternatives_spanish:
  - está vivo
  lexicon: BDAG
  rationale: ζάω aquí designa simplemente estar con vida. 'Vive' es directo y sobrio.
- source_word: ἀνήρ
  english_pob_choice: husband
  chosen_spanish: marido
  alternatives_spanish:
  - esposo
  - hombre
  lexicon: BDAG
  rationale: En esta relación conyugal, ἀνήρ significa 'marido'. 'Marido' es la opción más natural en español y mantiene la relación legal del pasaje.
- source_word: κοιμηθῇ
  english_pob_choice: dies
  chosen_spanish: muere
  alternatives_spanish:
  - fallece
  - se duerme
  lexicon: BDAG
  rationale: Aunque el griego usa un eufemismo común de muerte, el español aquí suena más natural con el sentido idiomático directo. 'Muere' sigue la revisión inglesa y evita oscurecer el punto legal del versículo.
- source_word: ἐλευθέρα ἐστίν
  english_pob_choice: she is free
  chosen_spanish: es libre
  alternatives_spanish:
  - queda libre
  - tiene libertad
  lexicon: BDAG
  rationale: La expresión indica liberación del vínculo anterior. 'Es libre' reproduce bien la afirmación principal sin añadir matices no presentes.
- source_word: ᾧ θέλει
  english_pob_choice: to whom she wishes
  chosen_spanish: con quien quiera
  alternatives_spanish:
  - con quien desee
  - a quien quiera
  lexicon: BDAG
  rationale: El relativo con θέλω expresa elección respecto de un nuevo cónyuge. En español, 'con quien quiera' suena natural y apunta al matrimonio implícito del infinitivo siguiente.
- source_word: γαμηθῆναι
  english_pob_choice: to be married
  chosen_spanish: casarse
  alternatives_spanish:
  - ser dada en matrimonio
  - ser desposada
  lexicon: BDAG
  rationale: El pasivo infinitivo puede expresarse idiomáticamente como 'casarse' en español para esta clase de relación conyugal. Aunque pierde la pasividad formal, conserva el sentido de contraer nuevo matrimonio con claridad natural.
- source_word: μόνον
  english_pob_choice: only
  chosen_spanish: solo
  alternatives_spanish:
  - solamente
  - únicamente
  lexicon: BDAG
  rationale: '''Solo'' conserva el valor restrictivo de μόνον de manera breve y elegante.'
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en el Señor Mesías
  - como perteneciente al Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina 'en el Señor'. En español, 'Señor' es la forma establecida para κύριος en este contexto cristológico y mantiene la densidad teológica de la expresión.
theological_decisions:
- issue: Sentido de ἐν κυρίῳ al final del versículo
  english_pob_reading: Rendered literally as 'only in the Lord' without expanding it in the main text.
  chosen_spanish_reading: solo en el Señor
  alternative_spanish_readings:
  - solo con un creyente
  - solo de manera coherente con el Señor
  rationale: La expresión es teológicamente cargada y algo comprimida. Mantenerla literal preserva la tensión interpretativa sin convertir en explicación lo que el texto no explicita directamente.
  doctrine_reference: 'Translation philosophy §3; Contested terms: κύριος → Señor'
- issue: Eufemismo de la muerte en κοιμηθῇ
  english_pob_reading: Preserved the metaphor 'falls asleep' in the main text.
  chosen_spanish_reading: muere
  alternative_spanish_readings:
  - se duerme
  - fallece
  rationale: La revisión inglesa privilegió el sentido idiomático. En español, 'muere' comunica el hecho con naturalidad y precisión, mientras que la metáfora 'se duerme' podría sonar forzada en esta cláusula legal.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción española sigue la revisión inglesa más reciente al traducir κοιμηθῇ por 'muere' en vez de conservar el eufemismo 'se duerme' en el texto principal. También conserva la restricción final de ἐν κυρίῳ de manera literal, con nota explicativa, tal como el audit trail inglés decidió no expandirla en el cuerpo principal.
  spanish_consistency_notes:
  - Se usó 'esposa' y 'marido' por coherencia con el contexto matrimonial y por naturalidad en español.
  - Se mantuvo 'en el Señor' como fórmula paulina estable, sin reemplazarla por una paráfrasis doctrinal en el texto principal.
  - La nota a explica la variante léxica de κοιμηθῇ sin alterar el texto base.
  - La nota b preserva la ambigüedad interpretativa de ἐν κυρίῳ en español, como hizo el inglés auditado.
