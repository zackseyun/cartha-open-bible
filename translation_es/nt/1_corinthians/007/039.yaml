base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/007/039.yaml
  text: A wife is bound for as long as her husband lives[a]; but if her husband dies, she is free to be married to whom she wishes[b], only in the Lord.
  footnotes:
  - marker: a
    text: 'Or: ''dies.'' The Greek uses ''falls asleep'' as a common euphemism for death.'
    reason: lexical_alternative
  - marker: b
    text: '''Only in the Lord'' is commonly understood to mean only to someone who belongs to the Lord, that is, a fellow believer.'
    reason: alternative_reading
