revisions:
- from: Pero si alguien piensa que se está comportando indebidamente[a] con su virgen, si ella ha pasado su juventud y así conviene que sea, haga lo que quiere; no peca. Que se casen.
  to: Pero si alguien piensa que se está comportando indebidamente[a] hacia su virgen, si ella ya ha pasado su juventud y así conviene que sea, haga lo que quiere; no peca. Que se casen.
  rationale: Se ajusta «con su virgen» a «hacia su virgen» para reflejar mejor ἐπὶ y el sentido de conducta dirigida hacia ella, manteniendo a la vez la ambigüedad interpretativa documentada por el POB. Se añade «ya» en «ya ha pasado su juventud» solo por fluidez natural en español, sin cambiar el sentido. No se requiere adjudicación adicional porque la corrección es pequeña y no altera la decisión teológica principal.
