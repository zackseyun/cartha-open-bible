translation:
  language: es
  text: Pero si alguien piensa que se está comportando indebidamente[a] hacia su virgen, si ella ya ha pasado su juventud y así conviene que sea, haga lo que quiere; no peca. Que se casen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hacia su prometida/novia virgen»; tradicionalmente también se entiende como «hacia su hija virgen». El griego es ambiguo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀσχημονεῖν
  english_pob_choice: behaving improperly
  chosen_spanish: se está comportando indebidamente
  alternatives_spanish:
  - se está portando indecorosamente
  - se está comportando impropiamente
  lexicon: BDAG
  rationale: El verbo expresa una conducta impropia o indecorosa. «Comportarse indebidamente» conserva el matiz moral/social sin exagerarlo ni suavizarlo demasiado.
- source_word: ἐπὶ τὴν παρθένον αὐτοῦ
  english_pob_choice: toward his virgin
  chosen_spanish: con su virgen
  alternatives_spanish:
  - hacia su virgen
  - con su joven virgen
  - con su prometida virgen
  lexicon: BDAG
  rationale: «παρθένος» significa «virgen». En español, «con su virgen» mantiene la ambigüedad del genitivo griego y suena más natural que calcar «hacia». Se conserva la tensión interpretativa del texto sin resolverla en el cuerpo principal.
- source_word: ὑπέρακμος
  english_pob_choice: past her youth
  chosen_spanish: ha pasado su juventud
  alternatives_spanish:
  - está pasada de juventud
  - ha pasado la flor de su edad
  lexicon: BDAG
  rationale: El adjetivo indica estar más allá del tiempo de juventud o plenitud. «Ha pasado su juventud» comunica esa idea de manera formal y clara, sin introducir una edad precisa que el griego no da.
- source_word: καὶ οὕτως ὀφείλει γίνεσθαι
  english_pob_choice: and it ought to be so
  chosen_spanish: y así conviene que sea
  alternatives_spanish:
  - y así debe ser
  - y así tiene que suceder
  lexicon: BDAG
  rationale: «ὀφείλει» expresa obligación o conveniencia; «γίνεσθαι» es amplio. «Conviene que sea» conserva la generalidad de la expresión y evita especificar más de lo que el griego dice.
- source_word: ὃ θέλει ποιείτω
  english_pob_choice: let him do what he wants
  chosen_spanish: haga lo que quiere
  alternatives_spanish:
  - haga lo que desea
  - que haga lo que quiera
  lexicon: BDAG
  rationale: El imperativo permisivo se expresa en español con naturalidad como «haga lo que quiere». Conserva el sentido de permiso sin volverlo meramente exhortativo.
- source_word: οὐχ ἁμαρτάνει
  english_pob_choice: he is not sinning
  chosen_spanish: no peca
  alternatives_spanish:
  - no está pecando
  - no comete pecado
  lexicon: BDAG
  rationale: La forma griega declara ausencia de pecado; «no peca» es breve, directa y fiel. Se evita añadir matices ajenos al enunciado.
- source_word: γαμείτωσαν
  english_pob_choice: Let them marry
  chosen_spanish: Que se casen
  alternatives_spanish:
  - Cásense
  - Que contraigan matrimonio
  lexicon: BDAG
  rationale: El imperativo plural indica que los dos involucrados entren en matrimonio. «Que se casen» preserva el mandato y su naturalidad en español contemporáneo.
theological_decisions:
- issue: Ambigüedad de «su virgen» (παρθένον αὐτοῦ)
  english_pob_reading: The main text preserves the ambiguity between a man and his betrothed/fiancée or a father/guardian and his virgin daughter.
  chosen_spanish_reading: El texto principal conserva la ambigüedad con «su virgen», sin decidir si se trata de su prometida o de su hija virgen bajo su cuidado.
  alternative_spanish_readings:
  - su prometida
  - su hija virgen
  rationale: El griego es genuinamente ambiguo y la tradición cristiana ha entendido el pasaje de más de una manera. Para respetar esa tensión interpretativa, el español principal no la resuelve; la nota recoge las lecturas principales.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del audit trail: se prefirió un verbo más directo para ἀσχημονεῖν y una formulación más natural para ὑπέρακμος, sin perder la ambigüedad central de παρθένον αὐτοῦ. Se mantuvo la lectura permisiva de ὃ θέλει ποιείτω y el cierre imperativo plural de γαμείτωσαν.'
  spanish_consistency_notes:
  - Se usó «virgen» para παρθένος, en continuidad con el criterio POB de preservar la ambigüedad del griego.
  - Se eligió «no peca» para οὐχ ἁμαρτάνει por ser la forma más natural y fiel en español.
  - «Que se casen» conserva el valor imperativo de γαμείτωσαν y evita diluirlo en mera sugerencia.
  - No se introdujo terminología eclesiástica tradicional donde el griego y el audit trail piden ambigüedad interpretativa.
