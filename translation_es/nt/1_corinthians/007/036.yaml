review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: conserva la ambigüedad de παρθένον αὐτοῦ, mantiene la generalidad de καὶ οὕτως ὀφείλει γίνεσθαι, y traduce correctamente el cierre imperativo γαμείτωσαν como una permisiva plural. Sin embargo, «con su virgen» debilita el matiz direccional de ἐπὶ y suena menos preciso que una formulación con «hacia».'
  spanish_quality_summary: El texto es mayormente natural y claro, pero «con su virgen» suena algo extraño en español y puede leerse como mera compañía más que como trato/comportamiento dirigido hacia ella. «Si ella ha pasado su juventud» es comprensible, aunque «si ya ha pasado su juventud» fluye un poco mejor. El resto del verso es legible, digno y eclesialmente claro.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «virgen» preserva correctamente παρθένος y la nota mantiene las alternativas interpretativas. «Que se casen» refleja adecuadamente γαμείτωσαν. La única mejora necesaria es lexical/sintáctica en la preposición para reflejar mejor ἐπὶ.
  issues:
  - severity: medium
    issue: «con su virgen» no refleja tan bien el matiz de ἐπὶ τὴν παρθένον αὐτοῦ
    rationale: El griego expresa comportamiento dirigido hacia la virgen. En español, «con» es posible pero menos preciso y menos natural en este contexto; «hacia su virgen» o «para con su virgen» preserva mejor la relación direccional y el sentido de trato impropio.
  - severity: low
    issue: Ligera aspereza en «si ella ha pasado su juventud»
    rationale: La frase es fiel, pero «si ella ya ha pasado su juventud» mejora un poco la fluidez sin añadir significado.
  revised_spanish_text: Pero si alguien piensa que se está comportando indebidamente[a] hacia su virgen, si ella ya ha pasado su juventud y así conviene que sea, haga lo que quiere; no peca. Que se casen.
  revised_footnotes:
  - marker: a
    text: O «hacia su prometida/novia virgen»; tradicionalmente también se entiende como «hacia su hija virgen». El griego es ambiguo.
    reason: alternative_reading
  revision_rationale: Se ajusta «con su virgen» a «hacia su virgen» para reflejar mejor ἐπὶ y el sentido de conducta dirigida hacia ella, manteniendo a la vez la ambigüedad interpretativa documentada por el POB. Se añade «ya» en «ya ha pasado su juventud» solo por fluidez natural en español, sin cambiar el sentido. No se requiere adjudicación adicional porque la corrección es pequeña y no altera la decisión teológica principal.
