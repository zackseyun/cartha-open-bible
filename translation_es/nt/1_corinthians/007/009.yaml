translation:
  language: es
  text: Pero si no tienen dominio propio, que se casen; porque mejor es casarse que arder[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O simplemente, «que arder». La expresión griega puede dejarse más implícita, pero en este contexto probablemente se refiere a arder con deseo sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγκρατεύονται
  english_pob_choice: have self-control
  chosen_spanish: tienen dominio propio
  alternatives_spanish:
  - se dominan
  - tienen autocontrol
  lexicon: BDAG
  rationale: El verbo medio/pasivo expresa la capacidad de contenerse; en español, «tener dominio propio» es natural y comunica la idea de autocontrol sin sonar demasiado técnico. Mantiene el matiz de autocontrol en el contexto sexual inmediato.
- source_word: γαμησάτωσαν
  english_pob_choice: let them marry
  chosen_spanish: que se casen
  alternatives_spanish:
  - que contraigan matrimonio
  - que se casen entre sí
  lexicon: BDAG
  rationale: El imperativo de tercera plural se conserva con una exhortación directa. «Que se casen» es idiomático, claro y fiel al mandato; «contraer matrimonio» sería más formal pero menos natural.
- source_word: κρεῖττον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - más conveniente
  - preferible
  lexicon: BDAG
  rationale: El comparativo predicativo se rinde de forma simple con «mejor», que es la equivalencia más directa y transparente en español.
- source_word: γαμῆσαι
  english_pob_choice: to marry
  chosen_spanish: casarse
  alternatives_spanish:
  - contraer matrimonio
  - tomar esposa / tomar marido
  lexicon: BDAG
  rationale: El infinitivo aoristo paralelo a πυροῦσθαι se expresa con el infinitivo reflexivo natural en español. «Casarse» mantiene la referencia general al acto matrimonial sin añadir matices no presentes en el griego.
- source_word: πυροῦσθαι
  english_pob_choice: to burn
  chosen_spanish: arder
  alternatives_spanish:
  - quemarse
  - arder de pasión
  - estar ardiendo
  lexicon: BDAG
  rationale: La revisión inglesa retiró la glosa explícita «with passion» por no estar en el griego, aunque el contexto la sugiera. En español, «arder» preserva la metáfora abierta y deja la tensión lexical al lector, como en el texto griego.
theological_decisions:
- issue: Sentido de πυροῦσθαι en contexto sexual
  english_pob_reading: burn; the context most likely refers to burning with sexual desire, but the main text stays concise and the note preserves the lexical alternative
  chosen_spanish_reading: arder
  alternative_spanish_readings:
  - arder de deseo
  - arder de pasión
  - quemarse
  rationale: El contexto de 1 Corintios 7 favorece la referencia al deseo sexual, pero el griego permanece metafórico y algo implícito. Por eso el texto principal conserva la imagen breve «arder», y la nota aclara la lectura contextual sin convertirla en paráfrasis.
  doctrine_reference: No se resuelve una doctrina aquí; se preserva la imagen metafórica con una nota de alternativa léxica conforme al contexto inmediato.
translation_notes:
  revision_awareness: La revisión inglesa reciente retiró la explicitación «with passion» de la traducción principal porque no está expresada de manera explícita en el griego; por eso el español principal también conserva la metáfora concisa «arder» y desplaza la explicitación al aparato de nota.
  spanish_consistency_notes:
  - Se usó «Yahvé» como norma POB, pero este versículo no contiene el nombre divino.
  - Se mantuvo el imperativo exhortativo con «que se casen» para reflejar la fuerza de γαμησάτωσαν.
  - «Tener dominio propio» y «arder» preservan el contraste semántico central del versículo sin sobreinterpretar el texto.
