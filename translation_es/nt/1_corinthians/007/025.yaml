translation:
  language: es
  text: Ahora, en cuanto a las vírgenes[a], no tengo mandamiento del Señor, pero doy mi juicio[b], como uno que ha recibido misericordia del Señor y es digno de confianza[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las mujeres solteras» o, en algunas interpretaciones del contexto, «las hijas vírgenes». El griego dice «vírgenes».
    reason: lexical_alternative
  - marker: b
    text: O «mi opinión» o «mi consejo». Pablo contrasta aquí su juicio reflexivo con un «mandamiento del Señor».
    reason: alternative_reading
  - marker: c
    text: O «fiel» o «confiable». El griego puede significar cualquiera de esas dos ideas; aquí el sentido probable es que Pablo es un guía digno de confianza por la misericordia del Señor.
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora, en cuanto a
  alternatives_spanish:
  - En cuanto a
  - Y en cuanto a
  lexicon: BDAG
  rationale: La fórmula introduce un nuevo tema de discusión. «Ahora, en cuanto a» conserva el giro discursivo de περί + δέ y suena natural en español bíblico contemporáneo.
- source_word: τῶν παρθένων
  english_pob_choice: virgins
  chosen_spanish: las vírgenes
  alternatives_spanish:
  - las mujeres solteras
  - las hijas vírgenes
  lexicon: BDAG
  rationale: παρθένος significa básicamente «virgen»; el referente contextual exacto es debatido, así que en el texto principal se mantiene el sentido más directo y menos interpretativo.
- source_word: ἐπιταγὴν κυρίου
  english_pob_choice: command from the Lord
  chosen_spanish: mandamiento del Señor
  alternatives_spanish:
  - orden del Señor
  - instrucción del Señor
  lexicon: BDAG
  rationale: ἐπιταγή expresa una orden o mandamiento con autoridad. «Mandamiento del Señor» comunica bien esa fuerza en español y preserva el contraste con la siguiente cláusula.
- source_word: γνώμην
  english_pob_choice: my judgment
  chosen_spanish: mi juicio
  alternatives_spanish:
  - mi opinión
  - mi consejo
  lexicon: BDAG
  rationale: γνώμη puede significar opinión, juicio o criterio. «Mi juicio» refleja una evaluación reflexiva sin convertirla en un mandato directo, en línea con la contraposición del versículo.
- source_word: δίδωμι
  english_pob_choice: I give
  chosen_spanish: doy
  alternatives_spanish:
  - ofrezco
  lexicon: BDAG
  rationale: El verbo es simple y directo; «doy mi juicio» conserva la fuerza idiomática sin añadir explicaciones innecesarias.
- source_word: ὡς
  english_pob_choice: as one who
  chosen_spanish: como uno que
  alternatives_spanish:
  - como
  - puesto que soy uno que
  lexicon: BDAG
  rationale: La construcción introduce la base personal desde la cual Pablo emite su juicio. «Como uno que» hace explícita esa referencia implícita y funciona con naturalidad en español.
- source_word: ἠλεημένος ὑπὸ κυρίου
  english_pob_choice: by the Lord’s mercy
  chosen_spanish: ha recibido misericordia del Señor
  alternatives_spanish:
  - ha sido objeto de la misericordia del Señor
  - por la misericordia del Señor
  lexicon: BDAG
  rationale: El participio pasivo perfecto de ἐλεάω indica haber recibido misericordia. En español, la formulación verbal mantiene la acción recibida y evita una construcción demasiado abstracta.
- source_word: πιστὸς εἶναι
  english_pob_choice: is trustworthy
  chosen_spanish: es digno de confianza
  alternatives_spanish:
  - es fiel
  - es confiable
  lexicon: BDAG
  rationale: πιστός puede ser «fiel» o «digno de confianza/confiable». Aquí la función es fundamentar la credibilidad del juicio de Pablo, por eso «digno de confianza» capta mejor el matiz.
theological_decisions:
- issue: Relación entre el mandamiento del Señor y el juicio apostólico de Pablo
  english_pob_reading: Paul distinguishes between lacking a direct command from the Lord and still offering an authoritative apostolic judgment.
  chosen_spanish_reading: Pablo distingue entre no tener un mandamiento directo del Señor y, aun así, ofrecer un juicio apostólico con fundamento en la misericordia del Señor.
  alternative_spanish_readings:
  - Pablo expresa solo una opinión privada sin autoridad
  - Pablo alude indirectamente a un mandamiento de Jesús que no formula de manera explícita
  rationale: 'La oposición entre ἐπιταγή y γνώμη debe quedar visible. La traducción conserva la tensión: no hay un mandamiento directo, pero el juicio de Pablo no queda rebajado a mera opinión privada, pues está enmarcado por la misericordia recibida del Señor.'
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: 'Revisión concordante con el último pase: no se registraron cambios en la decisión base; la redacción española mantiene el contraste entre ἐπιταγή y γνώμη y la ambigüedad de πιστός dentro del marco de la misericordia recibida.'
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος en este pasaje porque el contexto paulino y la audit trail inglesa lo presentan como referencia al Señor sin necesidad de expandirlo a Yahvé en el texto principal.
  - Se mantiene «vírgenes» en el cuerpo principal por fidelidad léxica y se documentan las alternativas contextuales en nota.
  - «Mandamiento» y «juicio» conservan la oposición retórica del versículo sin suavizarla.
  - «Digno de confianza» expresa bien πιστός en función de credibilidad, mientras la nota conserva «fiel/confiable» como alternativas legítimas.
