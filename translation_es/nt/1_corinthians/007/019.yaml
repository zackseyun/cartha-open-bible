translation:
  language: es
  text: La circuncisión no es nada[a], y la incircuncisión no es nada, sino el cumplimiento de los mandamientos de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no cuenta para nada» para ambas apariciones de «no es nada».'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτομή
  english_pob_choice: Circumcision
  chosen_spanish: la circuncisión
  alternatives_spanish:
  - el ser circuncidado
  - la circuncisión ritual
  lexicon: BDAG
  rationale: Se mantiene el sustantivo abstracto para conservar el contraste retórico de estado o marca de pacto, no el acto físico. 'La circuncisión' es el equivalente natural y fiel en español.
- source_word: οὐδέν ἐστιν
  english_pob_choice: is nothing
  chosen_spanish: no es nada
  alternatives_spanish:
  - no cuenta para nada
  - no significa nada
  lexicon: BDAG
  rationale: '''No es nada'' reproduce con claridad la sentencia evaluativa breve y paralela del griego. ''No cuenta para nada'' explicita el sentido, pero es más interpretativo.'
- source_word: ἀκροβυστία
  english_pob_choice: uncircumcision
  chosen_spanish: la incircuncisión
  alternatives_spanish:
  - el ser incircunciso
  lexicon: BDAG
  rationale: Se conserva el término nominal paralelo a 'circuncisión' para mantener la simetría del verso y su fuerza argumentativa.
- source_word: ἀλλά
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: '''Sino'' expresa mejor en español la oposición correctiva del griego aquí: no solo contrapone, sino que reemplaza la valoración de los marcadores externos por lo verdaderamente decisivo.'
- source_word: τήρησις
  english_pob_choice: keeping
  chosen_spanish: el cumplimiento
  alternatives_spanish:
  - la observancia
  - la obediencia
  lexicon: BDAG
  rationale: '''Cumplimiento'' comunica de forma natural la idea de guardar o observar mandamientos y conserva un tono formal. ''Observancia'' es viable, pero suena más técnico; ''obediencia'' enfatiza la actitud más que el acto de guardar.'
- source_word: ἐντολῶν θεοῦ
  english_pob_choice: the commandments of God
  chosen_spanish: los mandamientos de Dios
  alternatives_spanish:
  - los mandamientos de Yahvé
  - los mandatos de Dios
  lexicon: BDAG
  rationale: '''Mandamientos'' conserva el plural concreto del griego y el registro bíblico normal en español. Se usa ''Dios'' porque el genitivo griego es explícito; no hace falta sustituirlo por ''Yahvé'' en este verso, ya que no aparece el nombre divino en el texto base.'
theological_decisions:
- issue: Valor relativo de la circuncisión y la incircuncisión
  english_pob_reading: The verse relativizes both circumcision and uncircumcision as covenant-status markers in comparison with obedience to God.
  chosen_spanish_reading: El versículo relativiza la circuncisión y la incircuncisión como marcas de estatus del pacto frente al cumplimiento de los mandamientos de Dios.
  alternative_spanish_readings:
  - El versículo elimina toda relevancia de la circuncisión en cualquier sentido.
  - El versículo enseña que solo importa obedecer a Dios, sin ninguna referencia al pacto.
  rationale: 'La traducción conserva la tensión del contexto paulino: ambos marcadores externos son declarados ''nada'' dentro del argumento presente, pero el versículo no obliga a una conclusión más amplia que el texto no dice explícitamente. ''Cumplimiento de los mandamientos'' mantiene el contraste sin suavizarlo ni expandirlo.'
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla más allá de su alcance inmediato.
translation_notes:
  revision_awareness: La redacción española sigue de cerca la revisión más reciente del POB en inglés, que prefirió 'the commandments of God' por un registro más formal y por corresponder mejor al orden y fraseología del griego. En español se reflejó esa misma decisión con 'los mandamientos de Dios' y se mantuvo la doble afirmación breve 'no es nada' para conservar la estructura repetida.
  spanish_consistency_notes:
  - Se mantiene 'Dios' en lugar de 'Yahvé' porque el texto griego dice θεοῦ y no contiene el nombre divino.
  - Se usa 'incircuncisión' como antónimo nominal de 'circuncisión' para conservar la simetría retórica.
  - Se prefirió 'sino' sobre 'pero' para reflejar el contraste correctivo de ἀλλά en este contexto.
  - No se introdujo lenguaje doctrinal adicional; el verso queda limitado al contraste presente en el griego.
