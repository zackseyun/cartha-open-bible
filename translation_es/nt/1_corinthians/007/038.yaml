translation:
  language: es
  text: Así que[a], el que da en matrimonio a su propia virgen hace bien, y el que no la da en matrimonio hará algo mejor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Por tanto, el que da en matrimonio a su propia virgen hace bien, y el que no la da en matrimonio hará algo mejor». Otra interpretación común es: «el que se casa con su virgen prometida hace bien, y el que no se casa con ella hará algo mejor». También se propone: «su hija virgen». El verbo griego aquí favorece más naturalmente «dar en matrimonio», por lo que el texto principal conserva ese sentido y deja sin especificar el vínculo exacto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - De modo que
  lexicon: BDAG
  rationale: Introduce la conclusión inferida de lo anterior con una expresión natural en español que conserve el valor consecutivo de ὥστε sin sonar forzada.
- source_word: γαμίζων
  english_pob_choice: gives ... in marriage
  chosen_spanish: da en matrimonio
  alternatives_spanish:
  - casa
  - marea en matrimonio
  lexicon: BDAG
  rationale: 'γαμίζω tiene sentido causativo: no simplemente «casarse», sino «dar en matrimonio». «Da en matrimonio» conserva esa fuerza verbal en español.'
- source_word: τὴν παρθένον ἑαυτοῦ
  english_pob_choice: his own virgin
  chosen_spanish: a su propia virgen
  alternatives_spanish:
  - a su hija virgen
  - a su virgen prometida
  lexicon: BDAG
  rationale: παρθένος significa «virgen» y ἑαυτοῦ marca posesión/reflexividad. Se mantiene la ambigüedad del referente, como en el inglés POB, sin resolverla en el texto principal.
- source_word: καλῶς ποιεῖ
  english_pob_choice: does well
  chosen_spanish: hace bien
  alternatives_spanish:
  - obra bien
  - hace lo correcto
  lexicon: BDAG
  rationale: Es una equivalencia idiomática natural en español para el juicio evaluativo de la frase, sin intensificarla más allá del comparativo del contexto.
- source_word: μὴ γαμίζων
  english_pob_choice: does not give her in marriage
  chosen_spanish: no la da en matrimonio
  alternatives_spanish:
  - no se casa con ella
  - no la casa
  lexicon: BDAG
  rationale: Se mantiene el mismo valor causativo de γαμίζω y se recupera el objeto implícito «la» a partir del contexto inmediato.
- source_word: κρεῖσσον ποιήσει
  english_pob_choice: will do better
  chosen_spanish: hará mejor
  alternatives_spanish:
  - hará algo mejor
  - obrará mejor
  lexicon: BDAG
  rationale: κρεῖσσον es comparativo, no superlativo; «hará mejor» preserva la comparación sin convertirla en una evaluación absoluta.
theological_decisions:
- issue: Identidad de «su propia virgen» y alcance de γαμίζω en 1 Corintios 7:38
  english_pob_reading: Main text preserves the causative sense ('gives ... in marriage') and leaves the referent somewhat open rather than specifying 'daughter' in the translation.
  chosen_spanish_reading: El texto principal conserva el sentido causativo («da en matrimonio») y deja abierto el referente de «su propia virgen», sin especificar «hija».
  alternative_spanish_readings:
  - «el que se casa con su virgen prometida hace bien, y el que no se casa con ella hará mejor»
  - «el que da en matrimonio a su hija virgen hace bien, y el que no la da en matrimonio hará mejor»
  rationale: Se trata de un pasaje con una crux interpretativa reconocida. La forma verbal favorece el sentido causativo, pero la identidad social exacta del referente sigue debatida. La redacción española preserva esa tensión en vez de resolverla de antemano.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el texto se mantiene alineado con el consenso alto del control cruzado y con la decisión inglesa de conservar el sentido causativo de γαμίζω sin resolver el referente.
  spanish_consistency_notes:
  - Se mantuvo «dar en matrimonio» para γαμίζω, en coherencia con el valor causativo documentado.
  - Se evitó sustituir «virgen» por una reconstrucción interpretativa en el cuerpo principal.
  - Se usó una comparación explícita con «hará mejor» para reflejar κρεῖσσον sin superlativo.
  - La nota al pie preserva las alternativas relevantes sin duplicar el sentido del texto principal.
