translation:
  language: es
  text: 'Ahora digo a los no casados y a las viudas: es bueno para ellos si permanecen como yo[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Literalmente: «como yo también».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Λέγω δὲ
  english_pob_choice: Now I say
  chosen_spanish: Ahora digo
  alternatives_spanish:
  - Y digo
  - Pero digo
  lexicon: BDAG
  rationale: δὲ aquí enlaza el dicho con lo anterior de manera suave; en español, «Ahora» comunica bien el cambio de turno discursivo sin forzar una oposición fuerte. «Digo» conserva el presente exhortativo de la primera persona.
- source_word: τοῖς ἀγάμοις
  english_pob_choice: to the unmarried
  chosen_spanish: a los no casados
  alternatives_spanish:
  - a los solteros
  - a los no casados varones
  lexicon: BDAG
  rationale: ἄγαμος significa literalmente «no casado». En español, «no casados» preserva la amplitud del término sin limitarlo solo a varones ni cargarlo con un matiz moderno de «solteros» que puede sonar menos preciso en contexto pastoral.
- source_word: ταῖς χήραις
  english_pob_choice: to the widows
  chosen_spanish: y a las viudas
  alternatives_spanish:
  - y a las viudas mujeres
  - y a las viudas
  lexicon: BDAG
  rationale: χήραις designa específicamente viudas. La coordinación con «y» reproduce la lista de destinatarios y mantiene la distinción entre la categoría general y el grupo explícito de viudas.
- source_word: καλὸν
  english_pob_choice: it is good
  chosen_spanish: les es bueno
  alternatives_spanish:
  - es bueno
  - les conviene
  lexicon: BDAG
  rationale: El adjetivo καλός aquí expresa que algo es bueno/apropiado, no necesariamente una comparación. «Les es bueno» conserva la valoración sin introducir un comparativo como «mejor».
- source_word: ἐὰν μείνωσιν
  english_pob_choice: if they remain
  chosen_spanish: que permanezcan
  alternatives_spanish:
  - si permanecen
  - si se quedan
  lexicon: BDAG
  rationale: En este contexto, el sentido es continuar en el estado actual de soltería/no matrimonio. El español «que permanezcan» funciona bien con la construcción impersonal «les es bueno que...» y evita una repetición demasiado literal de «si» dentro de la oración.
- source_word: ὡς κἀγώ
  english_pob_choice: as I am
  chosen_spanish: como yo
  alternatives_spanish:
  - como yo también
  - como también yo estoy
  lexicon: BDAG
  rationale: κἀγώ = «yo también». En español, «como yo» comunica de forma natural la referencia a la condición de Pablo. La nota de pie conserva la alternativa literal para no perder el matiz aditivo.
theological_decisions:
- issue: Alcance de ἀγάμοις en 1 Corintios 7:8
  english_pob_reading: Render ἀγάμοις as the broader category 'the unmarried,' while keeping 'widows' as a distinct subgroup explicitly named.
  chosen_spanish_reading: Traducir ἀγάμοις como «los no casados», manteniendo «viudas» como grupo distinto nombrado explícitamente.
  alternative_spanish_readings:
  - «los solteros»
  - «los varones no casados»
  rationale: El plural masculino puede reflejar un uso representativo, pero el contexto distingue pastoralmente una categoría general y un subgrupo explícito. «Los no casados» preserva esa amplitud sin borrar la mención separada de las viudas.
  doctrine_reference: Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Fuerza de καλὸν en el consejo de Pablo
  english_pob_reading: Translate as 'it is good' rather than a stronger comparative such as 'it is better.'
  chosen_spanish_reading: Traducir como «les es bueno» y no como «les es mejor».
  alternative_spanish_readings:
  - «es mejor»
  - «les conviene»
  rationale: El adjetivo griego no expresa comparación aquí. Una forma comparativa en español introduciría un matiz que el texto no exige. «Les es bueno» mantiene la valoración amplia y fiel al original.
  doctrine_reference: Translation philosophy §1 (Original-language primacy over translation tradition)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca la última lectura aprobada del texto griego y del audit trail en inglés, sin cambios sustanciales respecto a la evaluación de alta concordancia; las decisiones principales son de ajuste natural en español: «no casados» para ἀγάμοις, «les es bueno» para καλὸν y «como yo» con nota para κἀγώ.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé» por coherencia general del proyecto, aunque este versículo no los contiene.
  - Se evita «solteros» porque puede sonar más moderno y menos técnico que «no casados» en este contexto.
  - La nota a conserva la alternativa condicional literal sin imponerla en la línea principal.
  - La nota b preserva el matiz aditivo de κἀγώ sin volver pesado el texto principal.
