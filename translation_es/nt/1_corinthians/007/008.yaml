review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: destinatarios dobles (''los no casados'' / ''las viudas''), valoración no comparativa de καλὸν, y referencia al estado actual de Pablo. Sin embargo, la cláusula condicional ἐὰν μείνωσιν no queda preservada con suficiente fidelidad en el texto principal al traducirse como ''que permanezcan'' en vez de una condición explícita (''si permanecen'').'
  spanish_quality_summary: El español es comprensible, pero 'les es bueno que permanezcan' suena poco natural y además debilita la sintaxis condicional del original. Una formulación como 'es bueno para ellos si permanecen...' o 'les es bueno si permanecen...' mejora la naturalidad y la fidelidad. 'Los no casados' es aceptable, aunque algo rígido; se puede mantener por precisión.
  glossary_alignment: No hay conflictos con la terminología doctrinal del proyecto. La decisión de usar 'los no casados' para ἀγάμοις y 'viudas' para χήραις es defendible y coincide con la justificación inglesa. No hay términos de glosario mayor implicados. La nota sobre κἀγώ está bien orientada; la nota sobre ἐὰν μείνωσιν debe dejar de presentar la condición como mera alternativa estilística, porque es parte del sentido principal.
  issues:
  - severity: high
    issue: La condición ἐὰν μείνωσιν no aparece explícitamente en el texto principal.
    rationale: 'El griego expresa una condición real con ἐὰν + subjuntivo: ''si permanecen''. Convertirlo en ''que permanezcan'' cambia la relación lógica y presenta la permanencia más como contenido exhortativo que como condición para la valoración.'
  - severity: medium
    issue: '''Les es bueno que permanezcan'' suena forzado en español.'
    rationale: Aunque intenta reflejar αὐτοῖς + καλόν, la frase no es idiomática. 'Es bueno para ellos si permanecen...' conserva mejor el sentido y lee con más claridad en español neutral.
  - severity: low
    issue: La nota [a] relega a nota una lectura que debería estar en el texto principal.
    rationale: La nota actual dice 'O «si permanecen»', pero esa es precisamente la forma que más fielmente representa el original. La nota puede eliminarse si el texto se corrige.
  revised_spanish_text: 'Ahora digo a los no casados y a las viudas: es bueno para ellos si permanecen como yo[a].'
  revised_footnotes:
  - marker: a
    text: 'Literalmente: «como yo también».'
    reason: lexical_alternative
  revision_rationale: Se corrige la cláusula condicional para reflejar explícitamente ἐὰν μείνωσιν ('si permanecen') y se ajusta la sintaxis a un español más natural con 'es bueno para ellos'. Se conserva 'los no casados' por coherencia con la decisión documentada sobre ἀγάμοις. La única nota necesaria preserva el matiz literal de κἀγώ.
