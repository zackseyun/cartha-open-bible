translation:
  language: es
  text: ¿Fue llamado alguien cuando ya estaba circuncidado? No debe intentar revertirlo[a]. ¿Fue llamado alguien cuando no estaba circuncidado? No debe circuncidarse.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «No debe volverse incircunciso»; es decir, no debe intentar ocultar o revertir las marcas de la circuncisión.'
    reason: lexical_alternative
lexical_decisions:
- source_word: περιτετμημένος
  english_pob_choice: while circumcised
  chosen_spanish: estando circuncidado
  alternatives_spanish:
  - circuncidado
  - después de ser circuncidado
  lexicon: BDAG
  rationale: El participio perfecto expresa un estado resultante; por eso se rinde con una construcción de estado vigente, no solo con un adjetivo suelto. 'Estando circuncidado' conserva la simultaneidad/estado que la revisión inglesa destacó al pasar de 'after being circumcised' a 'while circumcised'.
- source_word: ἐκλήθη / κέκληταί
  english_pob_choice: was called
  chosen_spanish: fue llamado
  alternatives_spanish:
  - ha sido llamado
  - fue convocado
  lexicon: BDAG
  rationale: En Pablo, καλέω alude al llamado de Dios dentro de la vida cristiana. 'Fue llamado' suena natural en español y conserva el sentido de llamado, sin explicar de más ni reducirlo a una mera convocatoria.
- source_word: ἐπισπάσθω
  english_pob_choice: should not try to reverse it
  chosen_spanish: No debe intentar revertirlo
  alternatives_spanish:
  - No debe volverse incircunciso
  - No debe tratar de ocultar las marcas de la circuncisión
  lexicon: BDAG
  rationale: El verbo apunta a deshacer o alterar las marcas visibles de la circuncisión. 'Revertirlo' comunica esa idea en español actual sin forzar al lector con una explicación técnica en el cuerpo del texto.
- source_word: ἐν ἀκροβυστίᾳ
  english_pob_choice: while uncircumcised
  chosen_spanish: estando incircunciso
  alternatives_spanish:
  - en incircuncisión
  - siendo incircunciso
  lexicon: BDAG
  rationale: La frase dativa indica el estado en que alguien fue llamado. 'Estando incircunciso' reproduce con claridad el valor de estado/condición y evita un giro menos natural en español.
- source_word: περιτεμνέσθω
  english_pob_choice: should not be circumcised
  chosen_spanish: No debe circuncidarse
  alternatives_spanish:
  - No debe ser circuncidado
  - No debe someterse a la circuncisión
  lexicon: BDAG
  rationale: El imperativo con μή expresa prohibición. 'No debe circuncidarse' es fiel, claro y mantiene el acto en forma verbal directa, como exige el paralelismo del verso.
theological_decisions:
- issue: Sentido de 'llamado' en ambos miembros del versículo
  english_pob_reading: Called by God into the Christian life while in a given social-religious condition
  chosen_spanish_reading: Llamado por Dios a la vida cristiana estando en una determinada condición social-religiosa
  alternative_spanish_readings:
  - llamado en un sentido general
  - llamado solo como invitación humana
  rationale: En el contexto de 1 Corintios 7, el lenguaje de llamado remite al momento de la vocación divina del creyente. Se conserva 'llamado' sin sustituirlo por 'convertido' para no estrechar indebidamente el alcance del término, pero la lectura teológica se aclara en la decisión.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: La versión inglesa revisada corrigió 'after being circumcised' por 'while circumcised' para reflejar mejor el participio perfecto griego y paralelizar la segunda cláusula. La redacción española sigue esa revisión con una construcción de estado ('estando circuncidado') y mantiene el paralelismo con 'estando incircunciso'.
  spanish_consistency_notes:
  - Se usa 'circuncidado/incircunciso' para mantener el contraste lexical del versículo y la naturalidad en español.
  - Se mantiene 'llamado' en ambas cláusulas para reflejar καλέω y su carga paulina.
  - '''Revertirlo'' queda explicado en nota para no perder la tensión lexical del verbo ἐπισπάσθω.'
