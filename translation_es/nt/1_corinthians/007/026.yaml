  glossary_alignment: No hay términos del glosario principal en disputa. Se respeta la decisión documentada de mantener «hombre» por ἀνθρώπῳ con nota aclaratoria, y «permanecer así» transmite correctamente τὸ οὕτως εἶναι. «Angustia» es aceptable para ἀνάγκη en este contexto, con alternativas bien preservadas en nota.
