review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: una mujer con esposo incrédulo, si él acepta convivir con ella, no debe poner fin a la relación matrimonial. Las decisiones principales para γυνή, ἄνδρα, ἄπιστον, συνευδοκεῖ y οἰκεῖν μετ’ αὐτῆς son fieles al contexto y al audit trail inglés. La única corrección necesaria es en la nota: el inglés preserva como alternativa ''leave/send away'', no ''separarse de''; además la nota española actual introduce comillas y puntuación poco naturales.'
  spanish_quality_summary: El texto principal es claro, natural y digno en español eclesial general. 'Esposo incrédulo', 'consiente en vivir con ella' y 'no debe dejar a su esposo' suenan bien. La calidad baja solo en la redacción de la nota al pie, que está torpe tipográficamente y desplaza la alternativa documentada.
  glossary_alignment: No hay términos de glosario mayor en juego. 'Incrédulo' para ἄπιστον y 'esposo' para ἄνδρα son adecuados. La elección 'dejar' para ἀφιέτω sigue la revisión inglesa auditada y evita sobreinterpretar con 'divorciar'.
  issues:
  - severity: medium
    issue: La nota al pie no refleja con precisión la alternativa preservada en el audit trail inglés.
    rationale: La nota inglesa conserva 'leave' / 'send away' como alternativas literales. La española ofrece 'separarse de su esposo' como alternativa principal, que ya es más interpretativa y no corresponde exactamente a la documentación base.
  - severity: low
    issue: La redacción y puntuación de la nota al pie son poco naturales en español.
    rationale: La apertura con comilla simple antes de O y el uso de dos puntos dentro de la cita se ven descuidados. Conviene normalizar la nota para legibilidad y estilo editorial.
  revised_spanish_text: Y si una mujer tiene un esposo incrédulo, y él consiente en vivir con ella, no debe dejar a su esposo[a].
  revised_footnotes:
  - marker: a
    text: 'O: «no debe despedir a su esposo». El verbo griego puede traducirse más literalmente como «dejar» o «despedir»; aquí se refiere a poner fin a la relación matrimonial.'
    reason: lexical_alternative
  revision_rationale: Se conserva el texto principal porque es fiel, natural y alineado con la decisión inglesa revisada. Solo se corrige la nota para reflejar con mayor precisión las alternativas léxicas documentadas para ἀφιέτω ('dejar' / 'despedir, send away') y para mejorar el estilo editorial en español.
