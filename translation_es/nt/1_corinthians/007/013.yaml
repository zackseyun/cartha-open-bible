translation:
  language: es
  text: Y si una mujer tiene un esposo incrédulo, y él consiente en vivir con ella, no debe dejar a su esposo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «no debe separarse de su esposo». El verbo griego puede traducirse de manera más literal como «dejar»; aquí se refiere al fin de la relación matrimonial.'
    reason: lexical_alternative
lexical_decisions:
- source_word: γυνή
  english_pob_choice: woman
  chosen_spanish: una mujer
  alternatives_spanish:
  - una esposa
  lexicon: BDAG
  rationale: γυνή puede significar 'mujer' o 'esposa'. Aquí el contexto matrimonial queda suficientemente claro por ἔχει ἄνδρα y por la continuidad con el versículo anterior; en español, 'una mujer tiene un esposo' suena más natural que 'una esposa tiene un esposo', sin perder el sentido marital.
- source_word: εἴ τις
  english_pob_choice: if a woman has
  chosen_spanish: si una mujer tiene
  alternatives_spanish:
  - si alguna mujer tiene
  - si alguien tiene
  lexicon: BDAG
  rationale: La condición es genérica e indefinida. 'Si una mujer tiene' expresa de modo claro y natural el caso hipotético sin añadir énfasis innecesario.
- source_word: ἄνδρα
  english_pob_choice: husband
  chosen_spanish: esposo
  alternatives_spanish:
  - marido
  - hombre
  lexicon: BDAG
  rationale: En este contexto matrimonial, ἀνήρ significa 'esposo'. 'Esposo' es claro y dignificado en español; 'hombre' sería demasiado general y podría ocultar el sentido relacional.
- source_word: ἄπιστον
  english_pob_choice: unbelieving
  chosen_spanish: incrédulo
  alternatives_spanish:
  - no creyente
  - sin fe
  lexicon: BDAG
  rationale: En contexto paulino, describe a quien no comparte la fe cristiana. 'Incrédulo' conserva ese valor religioso de manera natural en español y evita la posible ambigüedad de 'infiel'.
- source_word: συνευδοκεῖ
  english_pob_choice: consents
  chosen_spanish: consiente
  alternatives_spanish:
  - está de acuerdo
  - aprueba
  lexicon: BDAG
  rationale: El verbo expresa acuerdo voluntario. 'Consiente' reproduce bien esa disposición y mantiene el tono de decisión consciente.
- source_word: οἰκεῖν μετ’ αὐτῆς
  english_pob_choice: to live with her
  chosen_spanish: vivir con ella
  alternatives_spanish:
  - habitar con ella
  - residir con ella
  lexicon: BDAG
  rationale: La frase alude a continuar la vida doméstica compartida. 'Vivir con ella' es natural y suficientemente preciso en español.
- source_word: μὴ ἀφιέτω
  english_pob_choice: she must not leave
  chosen_spanish: no debe dejar
  alternatives_spanish:
  - no debe separarse de
  - no debe abandonar
  lexicon: BDAG
  rationale: En este contexto, ἀφίημι se refiere a poner fin a la relación matrimonial. El audit trail inglés optó por 'leave' para no sobreespecificar; en español, 'dejar' conserva esa cercanía al griego y evita introducir de manera directa la palabra 'divorciar', que sería más interpretativa.
- source_word: τὸν ἄνδρα
  english_pob_choice: her husband
  chosen_spanish: a su esposo
  alternatives_spanish:
  - a su marido
  - a el esposo
  lexicon: BDAG
  rationale: El artículo griego señala al cónyuge ya mencionado; en español, el posesivo es la forma natural para expresar esa referencia. 'A su esposo' mantiene la claridad relacional.
theological_decisions:
- issue: Force de ἀφιέτω en un matrimonio mixto
  english_pob_reading: she must not leave her husband
  chosen_spanish_reading: no debe dejar a su esposo
  alternative_spanish_readings:
  - no debe divorciarse de su esposo
  - no debe abandonarlo
  rationale: La instrucción ética del pasaje es mantener el matrimonio cuando el cónyuge incrédulo acepta convivir. 'No debe dejar' sigue de cerca el griego y evita imponer una formulación legal más explícita que el texto no usa en esta frase.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: La redacción inglesa auditada fue revisada de 'divorce her husband' a 'leave her husband' para reflejar más directamente ἀφιέτω y evitar sobreespecificar la acción. La versión española sigue esa misma decisión, optando por 'dejar' en lugar de 'divorciarse'.
  spanish_consistency_notes:
  - Se mantiene 'esposo' para ἄνδρα en este contexto matrimonial, en armonía con el sentido auditado del inglés.
  - '''Incrédulo'' conserva el contraste de fe del pasaje sin introducir la idea de infidelidad conyugal.'
  - No se usa 'SEÑOR' ni terminología eclesiástica ajena al versículo; el texto sigue la evidencia inmediata del griego.
