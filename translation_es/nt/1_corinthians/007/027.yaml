translation:
  language: es
  text: ¿Estás atado[a] a una esposa? No busques liberación. ¿Estás liberado de una esposa? No busques esposa.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más interpretativa: «¿Estás casado? No busques divorcio. ¿Estás divorciado? No busques esposa». El griego habla más literalmente de estar «atado» y «liberado».'
    reason: alternative_reading
lexical_decisions:
- source_word: δέδεσαι
  english_pob_choice: are you bound
  chosen_spanish: ¿Estás atado
  alternatives_spanish:
  - ¿Estás ligado
  - ¿Estás unido
  lexicon: BDAG
  rationale: Conserva la imagen de estar sujeto/bound, que en español se expresa naturalmente con «atado» y mantiene el contraste con λύσις / λέλυσαι. «Casado» sería más interpretativo y debilitaría esa correspondencia léxica.
- source_word: γυναικί
  english_pob_choice: to a wife
  chosen_spanish: a una esposa
  alternatives_spanish:
  - a una mujer
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή funciona como «esposa». «Esposa» evita la ambigüedad de «mujer» y hace explícito el referente relacional sin añadir más de lo que el contexto permite.
- source_word: ζήτει
  english_pob_choice: seek
  chosen_spanish: busques
  alternatives_spanish:
  - procures
  - trates de
  lexicon: BDAG
  rationale: «Buscar» reproduce de forma directa el imperativo de ζητέω y su fuerza exhortativa en español.
- source_word: λύσιν
  english_pob_choice: release
  chosen_spanish: liberación
  alternatives_spanish:
  - libertad
  - separación
  lexicon: BDAG
  rationale: «Liberación» comunica la idea de soltura/liberación y conserva la relación semántica con λέλυσαι («libre/soltado»). «Divorcio» sería demasiado específico frente al vocabulario más general del griego.
- source_word: λέλυσαι
  english_pob_choice: are you released
  chosen_spanish: ¿Estás libre
  alternatives_spanish:
  - ¿Estás soltado
  - ¿Estás liberado
  lexicon: BDAG
  rationale: «Libre» es una manera natural en español de expresar el estado resultante de λύω en perfecto, manteniendo el paralelismo con «atado» sin fijar prematuramente la situación jurídica exacta.
- source_word: ἀπὸ γυναικός
  english_pob_choice: from a wife
  chosen_spanish: de una esposa
  alternatives_spanish:
  - de una mujer
  lexicon: BDAG
  rationale: La preposición ἀπό se puede expresar con «de» en español idiomático. En este contexto, γυνή sigue siendo «esposa».
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: esposa
  alternatives_spanish:
  - mujer
  lexicon: BDAG
  rationale: En la prohibición final el contexto sigue siendo matrimonial; «esposa» es más preciso que «mujer» y evita una lectura genérica en español.
theological_decisions:
- issue: Mantener en español la imagen de estar atado/libre en vez de reemplazarla por casado/divorciado.
  english_pob_reading: Retain the imagery of being 'bound' and 'released' in the main text.
  chosen_spanish_reading: Conservar la imagen de «atado» y «libre/liberación» en el texto principal.
  alternative_spanish_readings:
  - ¿Estás casado? No busques divorcio. ¿Estás divorciado? No busques esposa.
  rationale: El griego usa el lenguaje de δέω/λύω, no el vocabulario explícito de matrimonio y divorcio. Mantener la metáfora evita introducir una categoría legal más estrecha que la del texto y preserva la tensión lexical documentada por la POB inglesa.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: 'La redacción sigue el acuerdo alto del repaso más reciente: no se requieren cambios adicionales respecto del criterio inglés de conservar δέδεσαι/λύσις/λέλυσαι como metáfora de atadura y liberación.'
  spanish_consistency_notes:
  - 'Se mantiene una terminología coherente de relación conyugal: «esposa» para γυνή en contexto matrimonial.'
  - Se conserva la correspondencia léxica atado/libre/liberación para reflejar el paralelismo del griego.
  - No se introduce «divorcio» en el texto principal porque esa explicitación pertenece a la nota alternativa, no al lexis principal.
