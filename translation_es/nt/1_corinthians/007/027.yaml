  glossary_alignment: No hay conflictos con la terminología de proyecto. La decisión 'esposa' para γυνή en contexto matrimonial es defendible. Se mantiene la filosofía documentada de preservar la imaginería de 'atado/liberado' en vez de 'casado/divorciado'.
