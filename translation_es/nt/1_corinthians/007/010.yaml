translation:
  language: es
  text: 'Ahora, a los casados les doy esta orden: no yo, sino el Señor, que una esposa no se separe[a] de su marido—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'no se divorcie de su marido'. El verbo griego puede entenderse en el sentido de separación matrimonial, lo que en este contexto puede incluir el divorcio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς ... γεγαμηκόσιν
  english_pob_choice: to the married
  chosen_spanish: a los casados
  alternatives_spanish:
  - a los que están casados
  - a los matrimonios
  lexicon: BDAG
  rationale: El participio perfecto de γαμέω describe a quienes están en el estado de casados. En español, 'a los casados' conserva la idea de destinatarios y resulta natural y conciso.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición discursiva. 'Ahora' funciona bien en español para marcar el cambio de instrucción sin imponer una oposición más fuerte de la que el contexto exige.
- source_word: παραγγέλλω
  english_pob_choice: I give this command
  chosen_spanish: les doy esta orden
  alternatives_spanish:
  - les doy este mandato
  - les mando
  lexicon: BDAG
  rationale: παραγγέλλω expresa una instrucción con autoridad. 'Les doy esta orden' preserva el tono imperativo sin sonar excesivamente rígido en español.
- source_word: οὐκ ἐγὼ ἀλλὰ ὁ κύριος
  english_pob_choice: not I, but the Lord
  chosen_spanish: no yo, sino el Señor
  alternatives_spanish:
  - no yo, sino el Señor Jesús
  - no yo, pero el Señor
  lexicon: BDAG
  rationale: La forma española mantiene el contraste enfático entre la voz de Pablo y la del Señor. 'El Señor' sigue el uso habitual para κύριος y conserva la referencia dominical del dicho.
- source_word: γυναῖκα
  english_pob_choice: a wife
  chosen_spanish: la esposa
  alternatives_spanish:
  - una esposa
  - la mujer
  lexicon: BDAG
  rationale: En este contexto matrimonial, γυνή se refiere claramente a la esposa. 'La esposa' evita ambigüedad y corresponde al contraste con ἀνήρ.
- source_word: ἀπὸ ἀνδρὸς
  english_pob_choice: from her husband
  chosen_spanish: de su marido
  alternatives_spanish:
  - de su esposo
  - de un marido
  lexicon: BDAG
  rationale: ἀνήρ aquí significa 'esposo/marido'. 'De su marido' es idiomático y hace explícita la relación poseída por el contexto.
- source_word: μὴ χωρισθῆναι
  english_pob_choice: must not separate
  chosen_spanish: no se separe
  alternatives_spanish:
  - no debe separarse
  - no se divorcie
  lexicon: BDAG
  rationale: χωρίζω en este contexto apunta a la separación conyugal. 'No se separe' preserva el sentido léxico y deja abierta la posible implicación legal sin estrecharla prematuramente a 'divorcie'.
theological_decisions:
- issue: Sentido de 'no yo, sino el Señor'
  english_pob_reading: Paul distinguishes a command already given by the Lord Jesus from his own apostolic application in the following verse, not a contrast between inspired and uninspired speech.
  chosen_spanish_reading: Pablo distingue una orden ya dada por el Señor de su propia aplicación apostólica, sin negar su autoridad inspirada.
  alternative_spanish_readings:
  - Pablo se desentiende de la autoridad de sus palabras
  - Pablo contrapone su opinión a la palabra de Dios
  rationale: 'La traducción conserva la tensión del pasaje: el contenido procede del Señor y Pablo lo comunica sin presentarse como la fuente primaria de esa orden. No se debe leer como una desautorización de su apostolado.'
  doctrine_reference: Preservar la tensión teológica del texto; no resolverla indebidamente
- issue: Alcance de χωρισθῆναι en el matrimonio
  english_pob_reading: The term is rendered 'separate' rather than 'divorce' to preserve the text's wording and leave the exact legal/social nuance open within the immediate context.
  chosen_spanish_reading: Se traduce 'separe' para conservar el lenguaje del texto y dejar abierta la relación exacta entre separación conyugal y divorcio legal en el contexto inmediato.
  alternative_spanish_readings:
  - se divorcie
  - abandone a su marido
  rationale: El contexto inmediato (vv. 10–11) mantiene el lenguaje de separación y luego trata la situación resultante. 'Se separe' preserva esa amplitud sin imponer una lectura más estrecha.
  doctrine_reference: Primacía del original; preservar la tensión lexical y contextual
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior asegurando que el marcador [a] aparezca exactamente en el texto español donde corresponde. La redacción mantiene la distinción entre separación y divorcio sin forzar una equivalencia única.
  spanish_consistency_notes:
  - Se usó 'Señor' para κύριος conforme al uso doctrinal establecido, sin sustituirlo por 'Señor Jesús' en el texto principal.
  - Se eligió 'marido'/'esposo' en el campo léxico, pero el texto principal usa 'marido' por ser más idiomático en esta construcción.
  - Se mantuvo 'casados' para γεγαμηκόσιν por ser una forma natural y fiel al estado marital descrito.
  - La nota al pie está anclada en 'marido[a]' para reflejar la alternativa léxica sobre χωρισθῆναι sin agregar una marca huérfana.
