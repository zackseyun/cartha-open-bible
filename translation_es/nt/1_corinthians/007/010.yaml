    issue: '''la esposa'' suena demasiado definida para un enunciado genérico'
    rationale: γυναῖκα aquí expresa la clase de persona dentro de la instrucción matrimonial, no una esposa específica. En español, 'una esposa' o 'la mujer' (si el contexto lo aclarara) reproduce mejor el valor genérico.
  - severity: low
    issue: La nota al pie está anclada a 'marido' en vez de al verbo 'se separe'
    rationale: La alternativa documentada ('divorciarse') corresponde a χωρισθῆναι, no a ἀνδρός. Conviene mover el marcador al verbo para mayor precisión editorial y semántica.
