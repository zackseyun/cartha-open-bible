translation:
  language: es
  text: ¿Fuiste llamado siendo esclavo? No te preocupes por ello. Pero si de verdad puedes llegar a ser libre, más bien aprovecha esa oportunidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «más bien aprovecha tu condición actual», es decir, permanece como estás. El griego «más bien aprovecha» deja el objeto sin expresar y se ha entendido de ambas maneras.'
    reason: alternative_reading
lexical_decisions:
- source_word: Δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - siervo esclavo
  - esclavo/a
  lexicon: BDAG
  rationale: δοῦλος señala un estatus de sujeción servil real, no solo una función religiosa; en este contexto Pablo contrasta esa condición con la posibilidad de libertad. En español, 'esclavo' conserva mejor la fuerza léxica que 'siervo'.
- source_word: ἐκλήθης
  english_pob_choice: were you called
  chosen_spanish: fuiste llamado
  alternatives_spanish:
  - fuiste llamado por Dios
  - fuiste llamado a la fe
  lexicon: BDAG
  rationale: Se mantiene el llamado de manera simple, sin añadir explicaciones que el griego no expresa explícitamente. En contexto paulino, el llamado es de Dios, pero la frase básica preserva mejor la forma del texto.
- source_word: μή σοι μελέτω
  english_pob_choice: do not let it trouble you
  chosen_spanish: No te preocupes por ello
  alternatives_spanish:
  - No te inquietes por ello
  - No te cause preocupación
  lexicon: BDAG
  rationale: La expresión idiomática apunta a preocupación o inquietud, no solo a atención mental. 'No te preocupes por ello' es natural en español y mantiene el tono pastoral.
- source_word: ἐλεύθερος γενέσθαι
  english_pob_choice: to become free
  chosen_spanish: llegar a ser libre
  alternatives_spanish:
  - hacerse libre
  - obtener la libertad
  - ser hecho libre
  lexicon: BDAG
  rationale: La construcción de cambio de estado se refleja bien con 'llegar a ser libre', que suena natural en español y conserva la idea de pasar a una nueva condición social.
- source_word: μᾶλλον χρῆσαι
  english_pob_choice: rather make use of it
  chosen_spanish: más bien aprovecha eso
  alternatives_spanish:
  - más bien úsalo
  - más bien haz uso de ello
  - más bien permanece así
  lexicon: BDAG
  rationale: χράομαι es deliberadamente ambiguo en cuanto a su objeto. Dado el antecedente inmediato ('llegar a ser libre'), la lectura principal es que se debe aprovechar esa posibilidad; por eso se traduce 'aprovecha eso'. La ambigüedad alternativa se conserva en nota.
theological_decisions:
- issue: Ambigüedad de μᾶλλον χρῆσαι
  english_pob_reading: 'Paul encourages taking freedom if it is available: ''rather make use of it.'''
  chosen_spanish_reading: 'Pablo anima a aprovechar la posibilidad de libertad si está disponible: ''más bien aprovecha eso.'''
  alternative_spanish_readings:
  - más bien aprovecha tu condición actual
  - más bien permanece como estás
  rationale: El objeto implícito de χρῆσαι se entiende con más naturalidad como la oportunidad de ser libre, porque depende inmediatamente de 'si de verdad puedes llegar a ser libre'. Aun así, la sintaxis griega deja una apertura real, así que se conserva la lectura alternativa en nota sin resolverla silenciosamente.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it); Contested terms table for δοῦλος
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el último ajuste del audit trail en cuanto al énfasis de εἰ καὶ: «si de verdad puedes». También conserva la ambigüedad de χρῆσαι mediante nota, en paralelo con el tratamiento del texto inglés POB.'
  spanish_consistency_notes:
  - Se usa 'esclavo' para δοῦλος, conforme al valor social del término en este contexto.
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - La frase 'No te preocupes por ello' mantiene el valor idiomático de μή σοι μελέτω.
  - La lectura principal de μᾶλλον χρῆσαι se expresa como exhortación a aprovechar la posibilidad de libertad, sin borrar la alternativa histórica de permanecer como estás.
  - El estilo busca ser bíblico y claro en español latinoamericano, sin calcos innecesarios.
