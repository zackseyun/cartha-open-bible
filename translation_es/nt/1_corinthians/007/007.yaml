translation:
  language: es
  text: Pero yo quiero que todas las personas[a] sean como yo mismo soy. Sin embargo, cada uno tiene su propio don de Dios[b], uno de una manera y otro de otra.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'todos'. El griego usa un plural masculino con fuerza representativa, pero aquí se refiere a las personas en general, no solo a los varones.
    reason: lexical_alternative
  - marker: b
    text: Es decir, en el contexto inmediato, como no casado, como Pablo; o, de manera más amplia, 'como yo soy'.
    reason: alternative_reading
lexical_decisions:
- source_word: θέλω
  english_pob_choice: I want
  chosen_spanish: yo quiero
  alternatives_spanish:
  - yo deseo
  - yo quisiera
  lexicon: BDAG
  rationale: Expresa la preferencia personal presente de Pablo con naturalidad en español. 'Quiero' conserva la franqueza del original mejor que una formulación más atenuada.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Marca un giro leve de contraste con el contexto anterior. 'Pero' es la correspondencia más directa y natural en español.
- source_word: πάντας ἀνθρώπους
  english_pob_choice: all people
  chosen_spanish: todos los hombres[a]
  alternatives_spanish:
  - todas las personas
  - todos
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del griego como plural representativo, tal como la POB inglesa conservó la fuerza formal de la expresión antes de revisarla por precisión lexical. En español, 'hombres' puede sonar masculino genérico; se añade nota para aclarar el alcance universal de ἀνθρώπους y evitar que se lea como referencia exclusiva a varones.
- source_word: εἶναι ὡς καὶ ἐμαυτόν
  english_pob_choice: to be as I myself am
  chosen_spanish: sean como yo mismo soy
  alternatives_spanish:
  - sean como yo soy
  - estén como yo mismo estoy
  lexicon: BDAG
  rationale: La frase infinitiva expresa el contenido del deseo de Pablo. 'Como yo mismo soy' conserva el énfasis reflexivo de ἐμαυτόν sin sonar forzado en español.
- source_word: ἀλλὰ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - No obstante
  lexicon: BDAG
  rationale: Introduce la limitación importante al deseo de Pablo. 'Sin embargo' transmite bien el contraste y la matización.
- source_word: ἕκαστος
  english_pob_choice: each
  chosen_spanish: cada uno
  alternatives_spanish:
  - cada persona
  - cada cual
  lexicon: BDAG
  rationale: Reproduce el sentido distributivo singular de forma natural y clara en español.
- source_word: ἴδιον
  english_pob_choice: his own
  chosen_spanish: su propio
  alternatives_spanish:
  - propio
  - personal
  lexicon: BDAG
  rationale: Conserva la idea de lo que es particular o propio de cada persona. En español, 'su propio' mantiene la relación distributiva sin cargar el texto.
- source_word: ἔχει χάρισμα
  english_pob_choice: has his own gift
  chosen_spanish: tiene su propio don
  alternatives_spanish:
  - tiene un don
  - posee un don de gracia
  lexicon: BDAG
  rationale: χάρισμα se rinde con 'don' para conservar la noción de un regalo concedido por Dios sin introducir la terminología técnica de 'don espiritual'. 'Su propio' adelanta el matiz de ἴδιον.
- source_word: ἐκ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - por parte de Dios
  lexicon: BDAG
  rationale: Expresa el origen divino de manera directa y natural en español. 'De Dios' es suficiente sin sobreexplicación.
- source_word: ὁ μὲν οὕτως, ὁ δὲ οὕτως
  english_pob_choice: one in this way and another in that way
  chosen_spanish: uno de una manera y otro de otra
  alternatives_spanish:
  - uno así y otro así
  - uno de esta manera y otro de aquella
  lexicon: BDAG
  rationale: Conserva la paralela correlativa del griego y su apertura semántica. La formulación es idiomática en español y evita especificar indebidamente el tipo de diferencia.
theological_decisions:
- issue: Sentido de 'como yo mismo soy'
  english_pob_reading: Paul refers to his unmarried/celibate state in the immediate context, without making celibacy universally normative.
  chosen_spanish_reading: Pablo alude a su estado no casado en el contexto inmediato, sin convertirlo en norma universal.
  alternative_spanish_readings:
  - Pablo se refiere más ampliamente a su modo de vida
  - Pablo habla solo de su libertad personal
  rationale: 'El contexto de 1 Corintios 7 trata el matrimonio y la soltería, por lo que la lectura inmediata es la de su situación no casada. La traducción debe preservar esa tensión: deseo personal, no mandamiento universal.'
  doctrine_reference: Mantener la tensión teológica del pasaje sin resolverla artificialmente.
- issue: Rango semántico de χάρισμα
  english_pob_reading: gift
  chosen_spanish_reading: don
  alternative_spanish_readings:
  - don de gracia
  - regalo
  rationale: '''Don'' preserva el origen divino y evita importar un sentido técnico posterior de ''don espiritual''. Dado que el contexto contrasta distintas condiciones concedidas por Dios, el término debe quedar abierto.'
  doctrine_reference: La diversidad de estados o capacidades proviene de Dios.
translation_notes:
  revision_awareness: 'La POB inglesa revisó ''all men'' a ''all people'' para precisión léxica. En español, la forma masculina plural ''hombres'' puede funcionar como genérico, pero crea una ambigüedad mayor que en inglés; por eso se mantiene una nota para transparentar el alcance universal del griego y no masculinizar indebidamente el referente. También se conserva la tensión interpretativa sobre el estado de Pablo: el texto sugiere su condición no casada, pero el don de Dios distribuye las situaciones sin imponer una sola como normativa.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al estándar del proyecto.
  - Se traduce χάρισμα como 'don' para evitar la carga técnica de 'don espiritual'.
  - Se mantiene 'hombres' con nota explicativa porque el griego es πάντας ἀνθρώπους y el texto requiere transparencia sobre el alcance representativo.
  - '''Sin embargo'' reproduce el contraste suave de ἀλλὰ sin introducir una ruptura más fuerte de la necesaria.'
