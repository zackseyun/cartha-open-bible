revisions:
- from: Pero yo quiero que todos los hombres[a] sean como yo mismo soy. Sin embargo, cada uno tiene su propio don de Dios[b], uno de una manera y otro de otra.
  to: Pero yo quiero que todas las personas[a] sean como yo mismo soy. Sin embargo, cada uno tiene su propio don de Dios[b], uno de una manera y otro de otra.
  rationale: Se reemplaza 'todos los hombres' por 'todas las personas' para reflejar con mayor precisión el sentido general de ἀνθρώπους y alinearse con la revisión documentada de la POB inglesa. Se conserva 'como yo mismo soy' por su fidelidad al énfasis del griego. También se pule la nota b para que suene natural en español y explique mejor la referencia contextual al estado de Pablo.
