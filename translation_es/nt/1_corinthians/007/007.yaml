    reason: lexical_alternative
  - marker: b
    text: Es decir, en el contexto inmediato, como no casado, como Pablo; o, de manera más amplia, 'como yo soy'.
    reason: alternative_reading
  revision_rationale: Se reemplaza 'todos los hombres' por 'todas las personas' para reflejar con mayor precisión el sentido general de ἀνθρώπους y alinearse con la revisión documentada de la POB inglesa. Se conserva 'como yo mismo soy' por su fidelidad al énfasis del griego. También se pule la nota b para que suene natural en español y explique mejor la referencia contextual al estado de Pablo.
