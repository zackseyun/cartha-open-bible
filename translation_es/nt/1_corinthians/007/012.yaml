translation:
  language: es
  text: 'Pero a los demás digo yo —no el Señor—: si algún hermano tiene una esposa incrédula, y ella consiente en vivir con él, no se divorcie de ella[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «no la deje» o «no la despida». El verbo griego puede verterse más literalmente como «dejar» o «despedir», pero aquí se refiere a poner fin al matrimonio.
    reason: lexical_alternative
lexical_decisions:
- source_word: Τοῖς δὲ λοιποῖς
  english_pob_choice: But to the rest
  chosen_spanish: Pero a los demás
  alternatives_spanish:
  - Ahora, a los demás
  - Y a los demás
  lexicon: BDAG
  rationale: λοιποί designa al grupo restante no abordado antes; «a los demás» conserva esa referencia. Se usa «Pero» para reflejar δέ como transición suave con matiz contrastivo, de modo natural en español.
- source_word: λέγω ἐγώ, οὐχ ὁ κύριος
  english_pob_choice: I say—I, not the Lord—
  chosen_spanish: yo digo[a], no el Señor
  alternatives_spanish:
  - yo digo, no el Señor
  - yo digo yo, no el Señor
  lexicon: BDAG
  rationale: Se mantiene la distinción entre la instrucción apostólica de Pablo y una cita directa de Jesús, sin implicar menor autoridad. El sujeto enfático ἐγώ se expresa con «yo» explícito, y la puntuación reproduce el carácter parentético.
- source_word: ἀδελφὸς
  english_pob_choice: brother
  chosen_spanish: hermano
  alternatives_spanish:
  - creyente
  - varón creyente
  lexicon: BDAG
  rationale: El contexto contrasta con «esposa», por lo que el masculino singular apunta a un hombre creyente. «Hermano» conserva la relación intraeclesial y la precisión de género que exige el texto.
- source_word: γυναῖκα ἔχει ἄπιστον
  english_pob_choice: has an unbelieving wife
  chosen_spanish: tiene una esposa incrédula
  alternatives_spanish:
  - está casado con una esposa incrédula
  - tiene una mujer incrédula
  lexicon: BDAG
  rationale: ἔχει con γυναῖκα es una expresión marital estándar; «tiene una esposa» resulta natural y fiel. «Incrédula» traduce ἄπιστον como falta de fe, no como infidelidad conyugal.
- source_word: ἄπιστον
  english_pob_choice: unbelieving
  chosen_spanish: incrédula
  alternatives_spanish:
  - no creyente
  - sin fe
  lexicon: BDAG
  rationale: En este contexto ἄπιστος describe a quien no comparte la fe cristiana. «Incrédula» mantiene el valor adjetival junto a «esposa» y evita ampliar indebidamente el sentido.
- source_word: καὶ αὕτη συνευδοκεῖ
  english_pob_choice: and she consents
  chosen_spanish: y ella consiente
  alternatives_spanish:
  - y ella está de acuerdo
  - y ella acepta
  lexicon: BDAG
  rationale: συνευδοκέω indica aprobar o consentir. «Consiente» conserva el matiz de aceptación voluntaria en un marco matrimonial.
- source_word: οἰκεῖν μετ’ αὐτοῦ
  english_pob_choice: to live with him
  chosen_spanish: en vivir con él
  alternatives_spanish:
  - a vivir con él
  - a seguir viviendo con él
  lexicon: BDAG
  rationale: La construcción infinitiva expresa continuar la vida en común; «vivir con él» es claro y sobrio en español. Se evita una paráfrasis más interpretativa.
- source_word: μὴ ἀφιέτω αὐτήν
  english_pob_choice: he must not divorce her
  chosen_spanish: no la abandone
  alternatives_spanish:
  - no la deje
  - no la despida
  - no se divorcie de ella
  lexicon: BDAG
  rationale: En este contexto ἀφίημι puede significar dejar, despedir o disolver la unión marital. Se conserva la tensión léxica con «abandone», mientras la nota aclara que el sentido práctico apunta al quiebre del matrimonio.
theological_decisions:
- issue: «yo digo, no el Señor»
  english_pob_reading: A distinction between Paul's instruction and a direct saying of Jesus during his earthly ministry, not a denial of apostolic authority or inspiration.
  chosen_spanish_reading: Una distinción entre la instrucción apostólica de Pablo y una enseñanza directa de Jesús en su ministerio terrenal, sin negar la autoridad inspirada del apóstol.
  alternative_spanish_readings:
  - una opinión meramente personal sin autoridad
  - una oposición entre Pablo y el Señor
  rationale: El texto distingue fuente inmediata de enseñanza, no valor doctrinal. La redacción española preserva la tensión sin rebajar la autoridad apostólica ni armonizar artificialmente la frase.
  doctrine_reference: Preservar la tensión teológica; la inspiración apostólica no queda anulada por la distinción de origen inmediato.
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el texto griego y el audit trail en inglés: conserva el contraste «yo digo, no el Señor», la referencia masculina singular «hermano», el sentido de «esposa incrédula», y mantiene en nota la tensión semántica de ἀφίημι en contexto matrimonial.'
  spanish_consistency_notes:
  - Se usa «Dios» y «Señor» según el texto presente; no aparece el Tetragrámaton en este versículo.
  - «Incrédula» se mantiene para ἄπιστον como término estable y comprensible.
  - La puntuación con dos puntos y coma respeta la estructura condicional del griego y la pausa parentética de la cláusula apostólica.
