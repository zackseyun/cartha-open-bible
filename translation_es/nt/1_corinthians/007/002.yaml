translation:
  language: es
  text: Pero a causa de las inmoralidades sexuales[a], que cada hombre tenga su propia esposa, y que cada mujer tenga su propio esposo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «la inmoralidad sexual» (singular). El griego tiene el plural: «las inmoralidades sexuales».'
    reason: lexical_alternative
lexical_decisions:
- source_word: διὰ δὲ
  english_pob_choice: But because of
  chosen_spanish: Pero a causa de
  alternatives_spanish:
  - Ahora, a causa de
  - Sin embargo, a causa de
  lexicon: BDAG
  rationale: διά con acusativo expresa causa; δέ añade una leve transición adversativa. «Pero a causa de» conserva ambas fuerzas de manera natural en español.
- source_word: τὰς πορνείας
  english_pob_choice: sexual immoralities
  chosen_spanish: las inmoralidades sexuales
  alternatives_spanish:
  - la inmoralidad sexual
  - las fornicaciones
  lexicon: BDAG
  rationale: πορνεία se refiere a conducta sexual inmoral. El plural griego se refleja mejor con «las inmoralidades sexuales»; la singular sería más idiomática pero perdería el plural. «Fornicaciones» es más arcaico y menos amplio.
- source_word: ἕκαστος
  english_pob_choice: each man
  chosen_spanish: cada hombre
  alternatives_spanish:
  - cada uno
  - cada esposo
  lexicon: BDAG
  rationale: El masculino singular distributivo, en paralelo con ἑκάστη y con γυναῖκα/ἄνδρα, apunta a un referente masculino. «Cada hombre» preserva esa referencia sin sobreespecificar «esposo».
- source_word: τὴν ἑαυτοῦ γυναῖκα
  english_pob_choice: his own wife
  chosen_spanish: a su propia esposa
  alternatives_spanish:
  - a su propia mujer
  lexicon: BDAG
  rationale: γυνή puede significar «mujer» o «esposa»; en este contexto matrimonial, «esposa» es el sentido natural. ἑαυτοῦ expresa posesión reflexiva, bien reproducida por «su propia».
- source_word: ἐχέτω
  english_pob_choice: let ... have
  chosen_spanish: que ... tenga
  alternatives_spanish:
  - debe tener
  - deje ... tener
  lexicon: BDAG
  rationale: El imperativo presente de tercera persona se vierte de forma natural como «que ... tenga», manteniendo el valor exhortativo sin convertirlo en una obligación más fuerte de lo que dice el griego.
- source_word: καὶ ἑκάστη
  english_pob_choice: and let each woman
  chosen_spanish: y que cada mujer
  alternatives_spanish:
  - y cada mujer
  - y que cada esposa
  lexicon: BDAG
  rationale: La forma femenina distributiva corresponde al primer miembro. «Cada mujer» refleja mejor la forma griega, dejando que el complemento siguiente especifique la relación matrimonial.
- source_word: τὸν ἴδιον ἄνδρα
  english_pob_choice: her own husband
  chosen_spanish: a su propio esposo
  alternatives_spanish:
  - a su propio hombre
  lexicon: BDAG
  rationale: ἀνήρ puede significar «hombre» o «esposo»; aquí, por el paralelismo con γυναῖκα y el contexto, «esposo» es el sentido adecuado. ἴδιον intensifica la pertenencia personal, bien expresada por «su propio».
theological_decisions:
- issue: Si el versículo debe sonar como una concesión para evitar pecado sexual o como una orden sobre la vida conyugal
  english_pob_reading: Render the imperative straightforwardly as an instruction about each man and woman having their own spouse because of sexual immoralities, without importing broader doctrinal claims about marriage beyond the text.
  chosen_spanish_reading: 'Se mantiene la instrucción de manera directa: cada hombre y cada mujer deben tener a su propio cónyuge a causa de las inmoralidades sexuales, sin añadir una interpretación más amplia sobre el matrimonio que no esté explícita en el verso.'
  alternative_spanish_readings:
  - Interpretar más libremente como «que se casen»
  - Suavizarlo como referencia a «deberes conyugales»
  rationale: El griego usa ἐχέτω («que tenga»), no un verbo explícito de casarse ni una perífrasis sobre deberes sexuales. La traducción debe conservar esa directez y dejar la conclusión doctrinal al contexto.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'La revisión más reciente no introdujo cambios: el análisis mantiene alta concordancia con el texto fuente y con la decisión inglesa POB de preservar el plural griego en τὰς πορνείας.'
  spanish_consistency_notes:
  - Se prefiere «esposa/esposo» en el contexto matrimonial, no «mujer/hombre», para evitar ambigüedad en español.
  - Se mantiene «inmoralidades sexuales» en plural para reflejar la forma griega sin borrar la alternativa singular documentada.
  - La construcción exhortativa «que ... tenga» conserva el tono imperativo del original sin intensificarlo a «debe» o «tiene que».
