translation:
  language: es
  text: 'Esto es lo que quiero decir, hermanos[a]: el tiempo ha sido acortado[b], de modo que desde ahora aun los que tienen esposas sean como si no las tuvieran.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» traduce el plural masculino ἀδελφοί, que puede dirigirse a un grupo mixto de creyentes.
    reason: cultural_note
  - marker: b
    text: 'O: «El tiempo señalado se ha acortado»; también puede entenderse: «El tiempo señalado se ha hecho corto».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο δέ φημι
  english_pob_choice: This is what I mean
  chosen_spanish: Esto es lo que quiero decir
  alternatives_spanish:
  - Esto digo
  - Lo que quiero decir es esto
  lexicon: BDAG
  rationale: La fórmula introduce la explicación de Pablo de manera idiomática. «Quiero decir» conserva el valor discursivo de aclaración sin volverlo rígidamente literal ni introducir paráfrasis excesiva.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: Se mantiene el vocativo masculino plural como «hermanos», que en español bíblico puede dirigirse a una asamblea mixta. Es fiel al marcador formal del griego y natural en registro eclesial.
- source_word: ὁ καιρός
  english_pob_choice: the time
  chosen_spanish: el tiempo
  alternatives_spanish:
  - el tiempo señalado
  - la época
  lexicon: BDAG
  rationale: «καιρός» aquí señala un tiempo decisivo o cualificado. «El tiempo» es la forma más breve y natural en español; la fuerza cualitativa queda dada por el contexto y por la oración siguiente.
- source_word: συνεσταλμένος ἐστίν
  english_pob_choice: has been shortened
  chosen_spanish: ha sido acortado
  alternatives_spanish:
  - está acortado
  - se ha acortado
  lexicon: BDAG
  rationale: El perfecto perifrástico expresa un estado presente resultante de un acortamiento ya ocurrido. «Ha sido acortado» conserva mejor ese valor que un presente simple.
- source_word: τὸ λοιπὸν
  english_pob_choice: from now on
  chosen_spanish: desde ahora
  alternatives_spanish:
  - por lo demás
  - en adelante
  lexicon: BDAG
  rationale: La frase marca la consecuencia práctica para el tiempo restante. «Desde ahora» transmite con claridad la transición temporal que introduce la aplicación pastoral.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - para que
  - así que
  lexicon: BDAG
  rationale: Aquí la conjunción enlaza la premisa con la conducta consecuente. «De modo que» conserva la relación de resultado/implicación sin forzar una lectura puramente final.
- source_word: οἱ ἔχοντες γυναῖκας
  english_pob_choice: those who have wives
  chosen_spanish: los que tienen esposa
  alternatives_spanish:
  - los que tienen mujeres
  - los casados
  lexicon: BDAG
  rationale: Se sigue la referencia concreta de γυναῖκας como «esposa/esposas» en este contexto. En singular colectivo, «esposa» suena más natural en español que repetir el plural, y evita la ambigüedad de «mujeres».
- source_word: ὡς μὴ ἔχοντες
  english_pob_choice: as though they had none
  chosen_spanish: como si no la tuvieran
  alternatives_spanish:
  - como si no tuvieran ninguna
  - como no teniendo
  lexicon: BDAG
  rationale: La comparación retórica se preserva con fuerza y naturalidad. El pronombre «la» remite a «esposa» y evita una repetición áspera, sin suavizar la tensión del enunciado.
theological_decisions:
- issue: Tensión pastoral acerca del matrimonio y la relativización escatológica
  english_pob_reading: Render the clause straightforwardly without softening it into emotional detachment or abolishing marital obligations.
  chosen_spanish_reading: Traducir la exhortación de forma directa, manteniendo la relativización de las condiciones de vida sin convertirla en una negación del matrimonio o en una paráfrasis suavizada.
  alternative_spanish_readings:
  - Vivir con desapego del matrimonio
  - Como si no estuvieran casados
  rationale: El versículo presenta una urgencia escatológica que relativiza las realidades presentes. La traducción debe conservar esa tensión, no resolverla interpretativamente dentro del texto.
  doctrine_reference: Mantener la tensión teológica del pasaje sin neutralizarla.
translation_notes:
  revision_awareness: 'Coincide con el último pase auditado: no hubo cambios en la revisión más reciente, y la solución española conserva el valor aspectual del perfecto, el matiz decisivo de καιρός y la fuerza retórica de la comparación final.'
  spanish_consistency_notes:
  - Se usa «Yahvé» en la serie POB cuando corresponda, pero este versículo no contiene el nombre divino.
  - Se mantiene «hermanos» para ἀδελφοί conforme al criterio del proyecto y la nota cultural del POB en inglés.
  - «Esposa» se eligió por claridad y naturalidad en español frente a una repetición literal de «mujeres», sin perder la referencia contextual.
  - La estructura final conserva la relación de consecuencia introducida por ἵνα sin volverla una paráfrasis doctrinal.
