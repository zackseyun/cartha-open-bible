translation:
  language: es
  text: Pero yo digo esto como una concesión[a], no como un mandato.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «por vía de concesión» o «como un permiso».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο
  english_pob_choice: this
  chosen_spanish: esto
  alternatives_spanish:
  - esto mismo
  - esta cosa
  - lo que digo
  lexicon: BDAG
  rationale: El demostrativo se refiere a lo inmediatamente dicho o por decir; «esto» es natural en español y no fuerza más de lo que el griego indica.
- source_word: δέ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: Aquí δέ introduce un leve contraste con lo que sigue; «Pero» conserva bien ese matiz en español.
- source_word: λέγω
  english_pob_choice: I say
  chosen_spanish: yo digo
  alternatives_spanish:
  - digo
  - estoy diciendo
  lexicon: BDAG
  rationale: El presente verbal se expresa de forma directa y sobria; el pronombre explícito ayuda a la claridad en una frase breve y enfática.
- source_word: κατὰ συγγνώμην
  english_pob_choice: as a concession
  chosen_spanish: como una concesión
  alternatives_spanish:
  - por vía de concesión
  - como una अनुमति/permiso
  - como una tolerancia
  lexicon: BDAG
  rationale: La expresión indica una अनुमति o permiso implícito, no un mandato. «Concesión» reproduce el contraste con la orden y evita cargar la frase con el sentido común de «perdón» de συγγνώμη.
- source_word: συγγνώμην
  english_pob_choice: concession
  chosen_spanish: concesión
  alternatives_spanish:
  - permiso
  - tolerancia
  - indulgencia
  lexicon: BDAG
  rationale: En este contexto el sustantivo designa algo permitido o concedido. «Concesión» mantiene la tensión lexical con ἐπιταγή y suena natural en español bíblico moderno.
- source_word: οὐ
  english_pob_choice: not
  chosen_spanish: 'no'
  alternatives_spanish:
  - 'no'
  lexicon: BDAG
  rationale: Negación simple y directa.
- source_word: κατ’ ἐπιταγήν
  english_pob_choice: as a command
  chosen_spanish: como una orden
  alternatives_spanish:
  - como un mandato
  - por orden
  - como un precepto
  lexicon: BDAG
  rationale: La expresión contrasta con la concesión y denota instrucción autoritativa. «Orden» es claro en español y preserva la oposición retórica del verso.
- source_word: ἐπιταγήν
  english_pob_choice: command
  chosen_spanish: orden
  alternatives_spanish:
  - mandato
  - injunción
  - precepto
  lexicon: BDAG
  rationale: «Orden» comunica bien la idea de una exigencia vinculante; en español contemporáneo resulta más transparente que una formulación más técnica.
theological_decisions:
- issue: 'Naturaleza de la declaración paulina: concesión frente a mandato'
  english_pob_reading: Paul explicitly frames this statement as a concession, not a binding command.
  chosen_spanish_reading: Pablo presenta esta afirmación como una concesión, no como una orden obligatoria.
  alternative_spanish_readings:
  - Pablo da un consejo que conserva autoridad apostólica indirecta
  - Pablo expresa una permisión sin valor normativo
  rationale: La traducción debe conservar la distinción explícita del texto entre lo concedido y lo mandado, sin borrar la autoridad apostólica de Pablo ni convertir la concesión en mandato.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: 'El texto griego y el audit trail inglés muestran alta concordancia: el punto decisivo es mantener el contraste entre συγγνώμη y ἐπιταγή sin suavizarlo. La redacción española sigue esa oposición con «concesión» y «orden», en un registro claro y publicable.'
  spanish_consistency_notes:
  - Se usa «Pablo» implícito por el contexto inmediato y la primera persona del verbo, sin añadir sujeto explícito innecesario.
  - «Concesión» se mantiene como término clave para συγγνώμη, evitando «perdón» por su ambigüedad en español.
  - «Orden» se elige para ἐπιταγή por claridad moderna, aunque «mandato» queda como alternativa válida.
  - La puntuación sigue el contraste breve del griego y conserva el tono sentencioso del verso.
