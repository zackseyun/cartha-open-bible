translation:
  language: es
  text: Ahora digo esto para su propio bien[a], no para imponerles una restricción[b], sino para promover lo que es correcto y una devoción al Señor sin distracciones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su beneficio». El griego dice literalmente «lo que les es provechoso» o «ventajoso», con tono pastoral.
    reason: lexical_alternative
  - marker: b
    text: O «no para ponerles un lazo». βρόχος es literalmente un «lazo» o «soga»; la imagen es vívida y habla de limitación o restricción, no de daño físico.
    reason: lexical_alternative
lexical_decisions:
- source_word: σύμφορον
  english_pob_choice: benefit
  chosen_spanish: propio bien
  alternatives_spanish:
  - beneficio
  - provecho
  - lo que les conviene
  lexicon: BDAG
  rationale: El sintagma πρὸς τὸ ὑμῶν αὐτῶν σύμφορον expresa lo que resulta ventajoso o beneficioso para ellos mismos. «Su propio bien» conserva la idea pastoral y evita un tono demasiado técnico o mercantil de «beneficio».
- source_word: βρόχον
  english_pob_choice: noose / restraint
  chosen_spanish: lazo
  alternatives_spanish:
  - restricción
  - cuerda
  - trampa
  lexicon: BDAG
  rationale: βρόχος es literalmente un lazo o soga, y en sentido figurado una atadura o restricción. «Lazo» conserva la imagen concreta y permite captar la fuerza metafórica sin exagerar con una imagen de daño físico.
- source_word: ἐπιβάλω
  english_pob_choice: put ... on / impose
  chosen_spanish: ponerles
  alternatives_spanish:
  - imponerles
  - echarles
  - colocarles
  lexicon: BDAG
  rationale: Con βρόχον, ἐπιβάλλω pide la idea de poner o echar un lazo sobre alguien. «Ponerles» es natural en español y mantiene la imagen de algo impuesto sobre ellos.
- source_word: εὔσχημον
  english_pob_choice: what is proper
  chosen_spanish: lo que es correcto
  alternatives_spanish:
  - lo que es apropiado
  - lo que es conveniente
  - lo que es decoroso
  lexicon: BDAG
  rationale: El articular πρὸς τὸ εὔσχημον apunta a lo decente, apropiado o correcto. «Lo que es correcto» es claro y sobrio en español, aunque «apropiado» también sería posible.
- source_word: εὐπάρεδρον
  english_pob_choice: devotion
  chosen_spanish: una entrega
  alternatives_spanish:
  - una atención constante
  - un servicio constante
  - una devoción
  lexicon: BDAG
  rationale: Este término raro comunica una permanencia al lado de alguien, con la idea de atención o dedicación firme. En contexto con τῷ κυρίῳ, «una entrega» transmite bien la orientación personal y sostenida al Señor sin sonar artificioso.
- source_word: ἀπερισπάστως
  english_pob_choice: undistracted
  chosen_spanish: sin distracciones
  alternatives_spanish:
  - sin estorbos
  - sin ser distraídos
  - libre de distracciones
  lexicon: BDAG
  rationale: El adverbio describe estar libre de ser arrastrado por preocupaciones competidoras. «Sin distracciones» es natural en español y preserva la idea de atención no dividida.
- source_word: τῷ κυρίῳ
  english_pob_choice: to the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - para el Señor
  - para el Señor Jesús
  lexicon: BDAG
  rationale: κύριος se traduce «Señor» según el uso cristiano estándar cuando no hay señal inmediata de que deba explicitarse el nombre divino. Aquí el sentido personal de dedicación se expresa bien con «al Señor».
- source_word: τοῦτο δὲ ... λέγω
  english_pob_choice: Now I say this
  chosen_spanish: Ahora digo esto
  alternatives_spanish:
  - Y digo esto ahora
  - Pero digo esto
  - Les digo esto
  lexicon: BDAG
  rationale: δὲ funciona aquí como transición suave. «Ahora digo esto» reproduce el flujo explicativo de Pablo con naturalidad y sin añadir énfasis innecesario.
theological_decisions:
- issue: Naturaleza del consejo de Pablo sobre matrimonio y dedicación
  english_pob_reading: Paul presents his instruction as pastoral guidance for the Corinthians' good, not as a restrictive rule.
  chosen_spanish_reading: Pablo presenta su instrucción como consejo pastoral para el bien de los corintios, no como una regla restrictiva.
  alternative_spanish_readings:
  - Pablo impone una limitación ascética vinculante.
  - Pablo da una orden que restringe el matrimonio.
  rationale: La oposición explícita entre «no para ponerles un lazo» y la finalidad positiva del versículo muestra que el propósito no es coercitivo sino orientado al bien y a la devoción enfocada al Señor. La traducción conserva esa tensión sin convertirla en una norma más rígida de lo que el texto dice.
  doctrine_reference: Translation philosophy §1, §3
translation_notes:
  revision_awareness: El audit trail inglés revisó «put a noose on you» por «put a restraint on you» para mayor naturalidad formal, pero mantuvo la fuerza metafórica de βρόχον ἐπιβάλω. La versión española conserva la imagen básica de «lazo» y la combina con una formulación fluida; en la cláusula final sigue la revisión que unifica εὔσχημον y εὐπάρεδρον ... ἀπερισπάστως como una meta positiva de corrección y dedicación sin distracción.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος, conforme al uso cristiano estándar y al contexto inmediato.
  - Se traduce βρόχον con una imagen concreta («lazo») para no borrar la metáfora del original.
  - «Sin distracciones» comunica ἀπερισπάστως de forma natural y conserva la idea de atención no dividida.
  - La frase «lo que es correcto» intenta abarcar εὔσχημον sin cargarla con una interpretación moral más específica que la del contexto.
