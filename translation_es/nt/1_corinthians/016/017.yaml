translation:
  language: es
  text: Y me alegro por la llegada de Estéfanas, Fortunato y Acaico, porque estos hombres han suplido[a] lo que faltaba de parte de ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «estos hombres suplieron lo que faltaba de parte de ustedes». Pablo probablemente se refiere a la imposibilidad de los corintios de estar presentes con él personalmente, no a una deficiencia moral.'
    reason: lexical_alternative
lexical_decisions:
- source_word: χαίρω
  english_pob_choice: I rejoice
  chosen_spanish: me gozo
  alternatives_spanish:
  - me alegro
  - me regocijo
  lexicon: BDAG
  rationale: El presente de primera persona expresa gozo personal y directo. «Me gozo» conserva el matiz de alegría activa y epistolar sin sonar excesivamente rígido en español.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Pero
  - Ahora bien
  lexicon: BDAG
  rationale: Aquí δέ funciona como conector suave; «Y» mantiene la continuidad del discurso sin introducir contraste indebido.
- source_word: ἐπὶ τῇ παρουσίᾳ
  english_pob_choice: at the coming
  chosen_spanish: con la llegada
  alternatives_spanish:
  - por la presencia
  - ante la venida
  lexicon: BDAG
  rationale: παρουσία en este contexto se refiere a la llegada/presencia personal de estos colaboradores, no al sentido escatológico técnico. «Llegada» comunica bien ese valor contextual en español.
- source_word: Στεφανᾶ καὶ Φορτουνάτου καὶ Ἀχαϊκοῦ
  english_pob_choice: Stephanas and Fortunatus and Achaicus
  chosen_spanish: Estéfanas, Fortunato y Acaico
  alternatives_spanish:
  - Estéfanas, Fortunato y Aqueico
  lexicon: Transliteration conventions
  rationale: Se usan transliteraciones corrientes y publicables en español. «Acaico» refleja el nombre griego Ἀχαϊκός de manera natural y reconocible.
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: Introduce la razón del gozo de Pablo; «porque» es la relación causal más clara y directa en español.
- source_word: τὸ ὑμέτερον ὑστέρημα
  english_pob_choice: what was lacking from you
  chosen_spanish: lo que les faltaba
  alternatives_spanish:
  - lo que faltaba de ustedes
  - su carencia
  lexicon: BDAG
  rationale: ὑστέρημα denota falta o carencia. Siguiendo el juicio revisado del inglés POB, el sentido contextual no es reproche moral sino la carencia de presencia personal; en español conviene una formulación idiomática que conserve ese valor de «lo que faltaba».
- source_word: οὗτοι
  english_pob_choice: these men
  chosen_spanish: estos hombres
  alternatives_spanish:
  - estos
  - ellos
  lexicon: BDAG
  rationale: El demostrativo subraya con énfasis a los tres enviados. «Estos hombres» hace explícito el referente sin perder la fuerza deíctica.
- source_word: ἀνεπλήρωσαν
  english_pob_choice: have supplied
  chosen_spanish: han suplido
  alternatives_spanish:
  - han llenado
  - han provisto
  lexicon: BDAG
  rationale: El verbo significa llenar o suplir lo que falta. «Han suplido» mantiene la relación semántica con la carencia expresada por ὑστέρημα y evita una paráfrasis excesiva.
translation_notes:
  revision_awareness: La redacción sigue de cerca el texto griego y toma en cuenta la revisión del POB en inglés que ajustó la primera solución más interpretativa («made up for your absence») hacia una expresión más precisa de ὑστέρημα y ἀνεπλήρωσαν. Se evita traducir mecánicamente desde el inglés y se preserva el valor contextual de παρουσία como llegada/presencia personal.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se usa «suplido» para ἀνεπλήρωσαν por su relación directa con la idea de llenar lo que faltaba.
  - Los nombres propios se transliteran de forma estable y publicable para lectorado hispanohablante.
  - La nota al pie conserva la tensión interpretativa entre carencia material/general y ausencia personal, sin resolverla de manera unilateral.
