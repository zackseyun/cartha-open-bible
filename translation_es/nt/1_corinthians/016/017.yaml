    rationale: El posesivo griego se refiere a los corintios, no a los tres visitantes. En español, «les» puede entenderse como referido a Estéfanas, Fortunato y Acaico, alterando el sentido.
  - severity: medium
    issue: «me gozo» suena menos natural que «me alegro» en español neutral contemporáneo
    rationale: Aunque no es incorrecto, «me alegro» comunica χαίρω con mayor naturalidad y legibilidad eclesial amplia, sin pérdida de sentido.
  - severity: low
    issue: La nota al pie puede formular mejor la alternativa contextual
    rationale: La explicación es correcta, pero conviene armonizarla con el texto revisado y con un español más fluido.
