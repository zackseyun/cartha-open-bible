translation:
  language: es
  text: Porque no quiero verlos ahora de paso[a], pues espero permanecer con ustedes algún tiempo, si el Señor lo permite.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras paso», o «en tránsito».
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ θέλω
  english_pob_choice: I do not want
  chosen_spanish: no quiero
  alternatives_spanish:
  - no deseo
  - no estoy dispuesto a
  lexicon: BDAG
  rationale: θέλω expresa aquí intención/deseo personal. «No quiero» es natural en español moderno y conserva la fuerza personal del verbo sin endurecerlo excesivamente.
- source_word: ἄρτι
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - por ahora
  lexicon: BDAG
  rationale: ἄρτι señala el momento presente; «ahora» transmite esa referencia temporal de forma breve e idiomática.
- source_word: ἐν παρόδῳ
  english_pob_choice: in passing
  chosen_spanish: de paso
  alternatives_spanish:
  - mientras paso
  - en tránsito
  lexicon: BDAG
  rationale: La expresión indica una visita breve en ruta, no una permanencia. «De paso» comunica bien esa idea en español y evita un calco rígido.
- source_word: ἰδεῖν
  english_pob_choice: to see
  chosen_spanish: verlos
  alternatives_spanish:
  - visitarlos
  - conocerlos
  lexicon: BDAG
  rationale: El infinitivo es literalmente «ver». En contexto implica una visita; «verlos» mantiene la cercanía al griego y funciona de manera natural en español.
- source_word: ἐλπίζω
  english_pob_choice: I hope
  chosen_spanish: espero
  alternatives_spanish:
  - tengo la esperanza de
  - confío en
  lexicon: BDAG
  rationale: Pablo expresa expectativa sin certeza. «Espero» conserva esa apertura y es el equivalente más directo y natural.
- source_word: χρόνον τινά
  english_pob_choice: for some time
  chosen_spanish: algún tiempo
  alternatives_spanish:
  - un tiempo
  - por un tiempo
  lexicon: BDAG
  rationale: La frase denota una duración indefinida pero real. «Algún tiempo» mantiene ese matiz sin precisar más de lo que el texto permite.
- source_word: ἐπιμεῖναι
  english_pob_choice: to remain
  chosen_spanish: permanecer
  alternatives_spanish:
  - quedarme
  - quedar
  lexicon: BDAG
  rationale: ἐπιμένω expresa quedarse o permanecer. «Permanecer» preserva la idea de continuidad de presencia y suena digno en español bíblico contemporáneo.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: with you
  chosen_spanish: con ustedes
  alternatives_spanish:
  - entre ustedes
  - a su lado
  lexicon: BDAG
  rationale: Con verbos de permanecer, πρὸς + personas comunica compañía/presencia. «Con ustedes» es la forma más idiomática en español.
- source_word: ἐὰν ὁ κύριος ἐπιτρέψῃ
  english_pob_choice: if the Lord permits
  chosen_spanish: si el Señor lo permite
  alternatives_spanish:
  - si el Señor permite
  - si el Señor me lo permite
  lexicon: BDAG
  rationale: La expresión condicional muestra dependencia de la voluntad del Señor. «Lo permite» traduce bien ἐπιτρέψῃ y mantiene el tono reverente sin añadir información.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Se conserva el título «Señor» tal como exige el valor de κύριος en este contexto y conforme al audit trail inglés, sin especificar más al referente.
theological_decisions:
- issue: Referente de «el Señor»
  english_pob_reading: Render simply as 'the Lord' without specifying Jesus or God the Father.
  chosen_spanish_reading: Traducir simplemente «el Señor» sin identificar explícitamente a Jesús o al Padre.
  alternative_spanish_readings:
  - el Señor Jesús
  - Dios
  rationale: El griego usa κύριος sin precisar el referente. La traducción conserva esa apertura teológica y no resuelve una ambigüedad que el texto no resuelve.
  doctrine_reference: 'DOCTRINE.md: Contested terms table (κύριος → ''Lord''); Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; la presente redacción sigue el texto griego y el audit trail inglés sin introducir modificaciones no justificadas.
  spanish_consistency_notes:
  - Se usó «Señor» para κύριος, manteniendo la apertura del referente tal como en el audit trail inglés.
  - Se prefirió «de paso» para ἐν παρόδῳ por ser un equivalente natural y fiel al matiz de visita breve en ruta.
  - Se mantuvo el registro bíblico contemporáneo con construcción clara y sin arcaísmos innecesarios.
  - «Con ustedes» refleja la relación de compañía implícita en πρὸς ὑμᾶς sin sobreinterpretar la preposición.
