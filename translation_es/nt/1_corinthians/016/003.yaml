translation:
  language: es
  text: Y cuando yo llegue, enviaré con cartas a los que ustedes aprueben para que lleven a Jerusalén su don generoso[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'su regalo generoso'; la palabra griega también puede significar 'gracia', pero aquí se refiere a la contribución que se envía a Jerusalén.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅταν δὲ παραγένωμαι
  english_pob_choice: And when I arrive
  chosen_spanish: Y cuando yo llegue
  alternatives_spanish:
  - Pero cuando yo llegue
  - Ahora, cuando yo llegue
  lexicon: BDAG
  rationale: ὅταν con el subjuntivo aoristo introduce una situación futura contingente; en español, 'cuando yo llegue' expresa bien esa llegada futura. Se conserva δέ con 'Y' por su valor conectivo leve, sin cargarlo de contraste.
- source_word: οὓς ἐὰν δοκιμάσητε
  english_pob_choice: those whom you approve
  chosen_spanish: a los que ustedes aprueben
  alternatives_spanish:
  - a quienes ustedes aprueben
  - a los que ustedes examinen y aprueben
  lexicon: BDAG
  rationale: δοκιμάζω puede implicar probar, examinar y luego aprobar. En este contexto de selección de delegados, 'aprueben' comunica con naturalidad el resultado de ese discernimiento; el matiz de examen previo queda implícito.
- source_word: δι’ ἐπιστολῶν
  english_pob_choice: with letters
  chosen_spanish: con cartas
  alternatives_spanish:
  - por medio de cartas
  - mediante cartas
  - con cartas de recomendación
  lexicon: BDAG
  rationale: διά con genitivo expresa medio o instrumento. 'Con cartas' es la forma más natural y fiel en español; 'cartas de recomendación' interpreta el tipo de cartas y por eso queda solo como alternativa.
- source_word: τούτους πέμψω
  english_pob_choice: I will send
  chosen_spanish: enviaré
  alternatives_spanish:
  - los enviaré
  - a estos enviaré
  lexicon: BDAG
  rationale: τούτους retoma enfáticamente a los aprobados, pero en español no hace falta repetir el pronombre objeto explícito si ya está claro en la frase anterior. 'Enviaré' mantiene el flujo natural sin perder el referente.
- source_word: ἀπενεγκεῖν
  english_pob_choice: to carry
  chosen_spanish: para que lleven
  alternatives_spanish:
  - para llevar
  - para transportar
  lexicon: BDAG
  rationale: 'El infinitivo expresa propósito: los enviados han de transportar la colecta. En español, ''para que lleven'' suena natural y transmite el movimiento concreto hacia Jerusalén.'
- source_word: τὴν χάριν ὑμῶν
  english_pob_choice: your gift
  chosen_spanish: su ofrenda
  alternatives_spanish:
  - su don
  - su gracia
  - su regalo
  lexicon: BDAG
  rationale: Aquí χάρις alude a la contribución material destinada a Jerusalén, no a la gracia abstracta. 'Ofrenda' comunica bien el acto de dar en contexto eclesial sin convertirlo en un término técnico más fuerte de lo que exige el texto. El posesivo plural de cortesía 'su' refleja el tratamiento natural a la comunidad; la referencia sigue siendo de ustedes.
- source_word: εἰς Ἰερουσαλήμ
  english_pob_choice: to Jerusalem
  chosen_spanish: a Jerusalén
  alternatives_spanish:
  - hacia Jerusalén
  - hasta Jerusalén
  lexicon: BDAG
  rationale: εἰς con nombre de ciudad se rinde idiomáticamente como 'a' en español.
theological_decisions:
- issue: Sentido de χάρις en el contexto de la colecta
  english_pob_reading: Material gift/contribution for the Jerusalem believers
  chosen_spanish_reading: Ofrenda material destinada a Jerusalén
  alternative_spanish_readings:
  - gracia en sentido abstracto
  - acto generoso
  - don
  rationale: En 1 Corintios 16 el contexto inmediato es la colecta para los santos de Jerusalén. Por eso χάρις debe entenderse como una contribución concreta, aunque conserve un trasfondo de generosidad. 'Ofrenda' evita imponer una abstracción teológica ajena al pasaje, sin borrar la tonalidad de gracia implícita en el término.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa que aclaró la relación de ''with letters'' con los delegados enviados y mantiene el orden griego de manera natural en español. También conserva la decisión auditable sobre χάρις: en el texto principal se traduce como ''ofrenda'', dejando la alternativa ''gracia'' en nota.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se usó 'Jesús/Mesías' según corresponda; este versículo no presenta esas formas.
  - '''Cartas'' se eligió en lugar de ''epístolas'' por registro más natural y fiel al medio de envío.'
  - '''Ofrenda'' funciona aquí como equivalente contextual de la colecta; no se usa como término litúrgico técnico más allá de lo exigido por el pasaje.'
