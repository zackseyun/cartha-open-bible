revisions:
- from: Y cuando yo llegue, enviaré con cartas a los que ustedes aprueben para que lleven a Jerusalén su ofrenda[a].
  to: Y cuando yo llegue, enviaré con cartas a los que ustedes aprueben para que lleven a Jerusalén su don generoso[a].
  rationale: 'Se ajusta χάρις de ''ofrenda'' a ''don generoso'' para reflejar mejor la decisión léxica auditada: una contribución material con matiz de generosidad, no necesariamente una ofrenda cultual. También se mejora la nota para evitar la alternativa poco idiomática ''su gracia'' en español, preservando a la vez el trasfondo semántico del término griego.'
