  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura básica del griego: llegada futura, aprobación de delegados, envío con cartas y propósito de llevar la contribución a Jerusalén. Sin embargo, ''ofrenda'' introduce un matiz más cultual/eclesial que el inglés auditado (''gift'') y que la explicación léxica de χάρις como contribución material; además, la nota ''su gracia'' suena menos natural y más ambigua en español que ''su don generoso'' o ''su regalo generoso''.'
  spanish_quality_summary: 'La frase es natural y clara en español general. ''Y cuando yo llegue'' es aceptable, aunque ''yo'' no es necesario; ''con cartas'' está bien ubicado. El principal ajuste es léxico: ''regalo/don generoso'' o ''contribución'' preserva mejor el sentido de χάρις sin sugerir necesariamente una ofrenda litúrgica.'
  glossary_alignment: 'No hay conflicto con los términos base del proyecto. La decisión clave es χάρις: conviene evitar ''ofrenda'' por su posible matiz interpretativo y mantener una opción más cercana a ''don/gift'' con nota léxica que preserve el trasfondo de generosidad.'
  issues:
  - severity: medium
    issue: '''su ofrenda'' para τὴν χάριν ὑμῶν'
    rationale: Aunque posible en contexto eclesial, 'ofrenda' puede sonar más cultual o litúrgico que el griego aquí, donde χάρις apunta a la contribución/gift para Jerusalén. Una formulación como 'su don generoso' preserva mejor el valor léxico y el matiz de generosidad documentado en el POB.
  - severity: medium
    issue: Nota al pie 'O "su gracia"'
    rationale: En español, 'su gracia' suena poco idiomático y puede malentenderse como atributo abstracto o favor personal. Conviene una alternativa que preserve el matiz léxico sin crear ambigüedad innecesaria, por ejemplo 'su regalo generoso'.
  - severity: low
    issue: Pronombre explícito 'yo'
    rationale: 'No es incorrecto, pero en español natural no hace falta: ''Y cuando llegue'' o ''Y cuando yo llegue'' ambos funcionan. Se puede conservar si se desea ligera énfasis personal.'
  revised_spanish_text: Y cuando yo llegue, enviaré con cartas a los que ustedes aprueben para que lleven a Jerusalén su don generoso[a].
  revised_footnotes:
  - marker: a
    text: O 'su regalo generoso'; la palabra griega también puede significar 'gracia', pero aquí se refiere a la contribución que se envía a Jerusalén.
    reason: lexical_alternative
  revision_rationale: 'Se ajusta χάρις de ''ofrenda'' a ''don generoso'' para reflejar mejor la decisión léxica auditada: una contribución material con matiz de generosidad, no necesariamente una ofrenda cultual. También se mejora la nota para evitar la alternativa poco idiomática ''su gracia'' en español, preservando a la vez el trasfondo semántico del término griego.'
