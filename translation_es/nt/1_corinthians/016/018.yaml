translation:
  language: es
  text: Porque ellos reconfortaron mi espíritu y el de ustedes. Por tanto, reconozcan[a] a tales hombres.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «aprecien a tales hombres»; también puede entenderse «reconozcan» o «aprecien a tales personas». El griego es masculino («tales hombres») y aquí se refiere específicamente a los hombres recién mencionados.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνέπαυσαν
  english_pob_choice: refreshed
  chosen_spanish: restauraron
  alternatives_spanish:
  - refrescaron
  - dieron descanso a
  lexicon: BDAG
  rationale: El verbo ἀναπαύω aquí es metafórico y expresa alivio o renovación interior. En español, "restauraron" comunica esa acción de renovar/reconfortar sin sonar forzado, aunque "refrescaron" también sería posible. "Dieron descanso a" preserva más literalmente la idea de descanso, pero suena menos natural en este contexto.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón de la exhortación anterior. "Porque" expresa con claridad la relación causal en español y mantiene el enlace discursivo.
- source_word: πνεῦμα
  english_pob_choice: spirit
  chosen_spanish: espíritu
  alternatives_spanish:
  - ánimo
  - ser interior
  lexicon: BDAG
  rationale: Aquí πνεῦμα se refiere al estado interior de la persona, no al Espíritu Santo. "Espíritu" conserva la equivalencia estándar y respeta el lenguaje paulino; "ánimo" explicita la idea, pero debilita el eco léxico del original.
- source_word: τὸ ἐμὸν πνεῦμα καὶ τὸ ὑμῶν
  english_pob_choice: my spirit and yours
  chosen_spanish: mi espíritu y el de ustedes
  alternatives_spanish:
  - mi espíritu y el suyo
  - mi espíritu y el de ustedes mismos
  lexicon: BDAG
  rationale: El griego omite la repetición de πνεῦμα al final; en español conviene suplirla para evitar ambigüedad. "El de ustedes" mantiene la brevedad y refleja bien la elipsis del original.
- source_word: ἐπιγινώσκετε
  english_pob_choice: acknowledge
  chosen_spanish: reconozcan
  alternatives_spanish:
  - reconózcanlos
  - aprecien
  - den debido reconocimiento a
  lexicon: BDAG
  rationale: ἐπιγινώσκω aquí implica reconocer debidamente a estas personas, más que solo identificarlas. "Reconozcan" conserva esa fuerza exhortativa sin cargar el texto con una paráfrasis más larga. El contexto inmediato permite entender que el objeto son varones concretos.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Entonces
  - Así que
  lexicon: BDAG
  rationale: οὖν marca una inferencia. "Por tanto" es una forma clara y formal en español que reproduce bien la conclusión lógica.
- source_word: τοὺς τοιούτους
  english_pob_choice: such men
  chosen_spanish: tales hombres
  alternatives_spanish:
  - tales personas
  - gente como ellos
  lexicon: BDAG
  rationale: La forma griega es masculina y remite específicamente a los hombres mencionados en el contexto inmediato. "Tales hombres" preserva la referencia masculina y evita neutralizar indebidamente el género gramatical del original.
theological_decisions:
- issue: Referencia masculina de τοὺς τοιούτους
  english_pob_reading: such men
  chosen_spanish_reading: tales hombres
  alternative_spanish_readings:
  - tales personas
  - gente como ellos
  rationale: El contexto inmediato nombra a varones concretos, por lo que la traducción conserva la referencia masculina sin generalizarla. Esto sigue la lectura auditada del POB inglés y respeta la forma gramatical del griego.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: La revisión auditada más reciente indica que no se requirieron cambios (high_agreement; pass_count 3; unchanged true). Esta versión conserva ese acuerdo general y solo adapta el texto al español con equivalencias naturales y fieles al griego.
  spanish_consistency_notes:
  - Se mantiene "espíritu" para πνεῦμα, distinguiéndolo del Espíritu Santo por contexto.
  - Se conserva la referencia masculina de τοὺς τοιούτους conforme al contexto inmediato y al audit trail en inglés.
  - '"Por tanto" y "Porque" reproducen la relación lógica de γάρ y οὖν sin sobreexplicar.'
  - No se introduce terminología eclesiástica tradicional no respaldada por el texto; se usa vocabulario directo y auditable.
