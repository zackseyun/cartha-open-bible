translation:
  language: es
  text: Por tanto[a], que nadie lo menosprecie. Pero ayúdenlo a seguir su viaje en paz, para que venga a mí, porque lo estoy esperando con los hermanos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Así que» o «Entonces»; conserva la conexión inferencial de οὖν.
    reason: alternative_reading
  - marker: b
    text: O «con los hermanos y hermanas», si Pablo se refiere al grupo más amplio de creyentes o colaboradores que lo acompañan o lo esperan.
    reason: lexical_alternative
lexical_decisions:
- source_word: μή τις οὖν
  english_pob_choice: So then, let no one
  chosen_spanish: Así que, que nadie
  alternatives_spanish:
  - Por tanto, que nadie
  - Entonces, que nadie
  lexicon: BDAG
  rationale: μή con subjuntivo expresa prohibición; en español, «que nadie» comunica bien el mandato negativo. «Así que» conserva la conexión inferencial de οὖν con un giro natural y publicable.
- source_word: ἐξουθενήσῃ
  english_pob_choice: despise
  chosen_spanish: menosprecie
  alternatives_spanish:
  - desprecie
  - trate con desprecio
  lexicon: BDAG
  rationale: El verbo expresa considerar a alguien como de poco valor o tratarlo con desdén. «Menosprecie» mantiene esa fuerza sin sonar excesivamente arcaico en español.
- source_word: προπέμψατε
  english_pob_choice: send him on his way
  chosen_spanish: despídanlo en paz
  alternatives_spanish:
  - acompáñenlo en su camino
  - envíenlo en su camino
  lexicon: BDAG
  rationale: El verbo puede implicar ayudar o acompañar a alguien en el viaje. «Despídanlo en paz» transmite la idea de facilitar su partida de manera cordial y pacífica en un español natural.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - pacíficamente
  - con paz
  lexicon: BDAG
  rationale: La preposición conserva su sentido directo. «En paz» reproduce bien la frase preposicional y sugiere una salida sin conflicto ni estorbo.
- source_word: ἵνα ἔλθῃ πρός με
  english_pob_choice: so that he may come to me
  chosen_spanish: para que llegue a mí
  alternatives_spanish:
  - para que venga a mí
  - a fin de que llegue a mí
  lexicon: BDAG
  rationale: ἵνα con subjuntivo expresa propósito. «Para que llegue a mí» es natural en español y conserva la finalidad del viaje hacia el hablante.
- source_word: ἐκδέχομαι
  english_pob_choice: I am expecting
  chosen_spanish: lo espero
  alternatives_spanish:
  - lo estoy esperando
  - lo aguardo
  lexicon: BDAG
  rationale: El presente medio indica expectativa continua. «Lo espero» comunica expectativa activa de forma sobria y fluida en español.
- source_word: μετὰ τῶν ἀδελφῶν
  english_pob_choice: with the brothers
  chosen_spanish: con los hermanos
  alternatives_spanish:
  - con los hermanos y hermanas
  - con los creyentes
  lexicon: BDAG
  rationale: El plural masculino griego puede referirse a un grupo mixto, pero el texto base conserva la forma masculina. «Con los hermanos» mantiene la correspondencia de género-accurate y deja abierta la posible extensión colectiva.
theological_decisions:
- issue: Alcance de ἀδελφῶν en un contexto cristiano posiblemente mixto
  english_pob_reading: brothers
  chosen_spanish_reading: los hermanos
  alternative_spanish_readings:
  - los hermanos y hermanas
  - los creyentes
  rationale: La forma griega es masculina plural. Se conserva en la línea principal para no borrar la forma del original ni resolverla por paráfrasis inclusiva; el contexto puede sugerir un grupo más amplio de colaboradores o creyentes.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
translation_notes:
  revision_awareness: Se revisó el pasaje y no se aplicaron cambios adicionales respecto del estado de alta concordancia del audit trail; la redacción española sigue de cerca las decisiones léxicas y teológicas ya auditadas.
  spanish_consistency_notes:
  - Se mantuvo «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se evitó «Cristo» o «Mesías» porque no aparecen en el versículo.
  - Se usó «hermanos» como equivalente del plural masculino ἀδελφῶν, con nota para la posible lectura inclusiva.
  - La puntuación y el orden reflejan una sintaxis española natural sin borrar la relación de propósito del griego.
