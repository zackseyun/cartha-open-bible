  source_alignment_summary: 'El borrador español refleja bien la secuencia de cuatro imperativos y acierta en «en la fe» y en la opción idiomática para ἀνδρίζεσθε. Sin embargo, «Manténganse alertas» añade un matiz más psicológico que vigilante, y «sean fuertes» suena menos natural y menos cercano al matiz pasivo/resultativo de κραταιοῦσθε que «sean fortalecidos» o una formulación equivalente. Además, la nota b está anclada al verbo equivocado: la pasividad pertenece a κραταιοῦσθε, no a ἀνδρίζεσθε.'
  spanish_quality_summary: El español es claro y legible, pero requiere un ajuste menor para mejorar precisión y fluidez. «Estén vigilantes» encaja mejor con γρηγορεῖτε en contexto exhortativo. «Actúen con valentía» es natural y digno. Conviene mover la nota sobre la voz pasiva al último imperativo, donde corresponde.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «La fe» respeta la decisión para ἐν τῇ πίστει. La revisión inglesa ya optó por el sentido idiomático de ἀνδρίζεσθε, por lo que «actúen con valentía» está alineado con el rastro auditado. El ajuste principal es gramatical/lexical, no terminológico.
  issues:
  - severity: medium
    issue: La nota [b] está colocada sobre «actúen con valentía», pero explica la voz pasiva de κραταιοῦσθε.
    rationale: ἀνδρίζεσθε no es el verbo pasivo del que habla la nota; esa observación pertenece al cuarto imperativo. Mantenerla donde está induce a error sobre el griego.
  - severity: low
    issue: «Manténganse alertas» no es la mejor equivalencia de Γρηγορεῖτε.
    rationale: Aunque comunica vigilancia, «estar alerta» en español puede sonar más a estado de alerta que a velar/vigilar continuamente. «Estén vigilantes» conserva mejor el campo semántico del verbo.
  - severity: low
    issue: «Sean fuertes» es menos idiomático y menos fiel al matiz de fortalecimiento que el verbo admite.
    rationale: La forma griega es pasiva/media en superficie. Una nota ya preserva ese matiz; en español, al menos conviene anclar esa nota al verbo final correspondiente.
  revised_spanish_text: Estén vigilantes[a], permanezcan firmes en la fe, actúen con valentía, sean fuertes[b].
