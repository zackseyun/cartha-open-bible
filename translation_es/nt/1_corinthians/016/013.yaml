translation:
  language: es
  text: Estén vigilantes[a], permanezcan firmes en la fe, actúen con valentía, sean fuertes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Manténganse alertas» o «permanezcan despiertos». El griego llama a una vigilancia continua.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «sean fortalecidos». La forma verbal griega es pasiva, aunque en español una exhortación directa resulta más natural.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Γρηγορεῖτε
  english_pob_choice: Stay alert
  chosen_spanish: Manténganse alertas
  alternatives_spanish:
  - Velen
  - Permanezcan despiertos
  - Estén atentos
  lexicon: BDAG
  rationale: El imperativo plural pide vigilancia continua. «Manténganse alertas» conserva la fuerza exhortativa y suena natural en español actual, sin perder el matiz de atención persistente.
- source_word: στήκετε
  english_pob_choice: stand firm
  chosen_spanish: permanezcan firmes
  alternatives_spanish:
  - manténganse firmes
  - estén firmes
  - permanezcan de pie
  lexicon: BDAG
  rationale: El verbo expresa firmeza y estabilidad, no solo la acción física de estar de pie. «Permanezcan firmes» reproduce bien la imagen metafórica de perseverar sin ceder.
- source_word: ἐν τῇ πίστει
  english_pob_choice: in the faith
  chosen_spanish: en la fe
  alternatives_spanish:
  - en la fe cristiana
  - en la fe recibida
  - en la fe
  lexicon: BDAG
  rationale: El artículo sugiere aquí el ámbito o contenido de la fe cristiana compartida, no solo un acto subjetivo de creer. «En la fe» mantiene la concisión del griego y permite esa lectura comunitaria.
- source_word: ἀνδρίζεσθε
  english_pob_choice: act courageously
  chosen_spanish: actúen con valentía
  alternatives_spanish:
  - sean valientes
  - obren con coraje
  - comporténse con valentía
  lexicon: BDAG
  rationale: Aunque la forma griega es literalmente masculina en su imaginería, el uso idiomático exhorta a la valentía. En español, «actúen con valentía» preserva el valor exhortativo sin forzar un calco sexualizado que la lengua meta no usa de manera natural.
- source_word: κραταιοῦσθε
  english_pob_choice: be strong
  chosen_spanish: sean fuertes
  alternatives_spanish:
  - fortalézcanse
  - háganse fuertes
  - cobren fuerza
  lexicon: BDAG
  rationale: La forma puede reflejar una exhortación pasiva o resultativa. «Sean fuertes» funciona como imperativo idiomático en español y conserva la brevedad paralela del verso; las alternativas expresan de modo más explícito el matiz de fortalecimiento.
theological_decisions:
- issue: Sentido de πίστις con artículo
  english_pob_reading: the faith
  chosen_spanish_reading: la fe
  alternative_spanish_readings:
  - fe
  - la fe cristiana
  rationale: El artículo griego favorece una referencia al cuerpo o esfera de la fe cristiana, no meramente a la confianza interior momentánea. En español, «la fe» comunica ese sentido de modo natural y suficientemente preciso.
  doctrine_reference: 'DOCTRINE.md: πίστις (faith) con lecturas contextuales; filosofía de equivalencia óptima'
- issue: Fuerza idiomática de ἀνδρίζεσθε
  english_pob_reading: act courageously
  chosen_spanish_reading: actúen con valentía
  alternative_spanish_readings:
  - sean valientes
  - obren con coraje
  rationale: La revisión inglesa prefirió una formulación idiomática sobre la literalidad de género. En español, la mejor equivalencia es una exhortación directa a la valentía, preservando el tono imperativo sin introducir una expresión extraña o potencialmente distractora.
  doctrine_reference: 'DOCTRINE.md: principio de precisión semántica y legibilidad contemporánea'
translation_notes:
  revision_awareness: El contexto inglés pasó de «act like men» a «act courageously» para reflejar mejor el sentido idiomático de ἀνδρίζεσθε. La presente versión española sigue esa revisión y evita un calco de género que el español contemporáneo leería de forma más ruda o menos clara que el original pretende.
  spanish_consistency_notes:
  - Se conserva el paralelismo de cuatro imperativos breves.
  - Se usa «la fe» para mantener el valor articulado de πίστει.
  - Se evita «Cristo»/«SEÑOR» porque no aparecen en este versículo.
  - La nota sobre ἀνδρίζεσθε ofrece alternativas sin borrar el matiz de valentía del audit trail.
