translation:
  language: es
  text: Y si es apropiado[a] que yo vaya también, irán conmigo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «si es conveniente que yo vaya también». La expresión griega puede denotar lo que es apropiado, conveniente o adecuado en las circunstancias.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐὰν δὲ
  english_pob_choice: And if
  chosen_spanish: Y si
  alternatives_spanish:
  - Pero si
  - Ahora bien, si
  lexicon: BDAG
  rationale: ἐὰν introduce una condición; δὲ funciona aquí como un conector suave. «Y si» conserva la continuidad discursiva sin cargar el pasaje con un contraste más fuerte que el del griego.
- source_word: ἄξιον ᾖ
  english_pob_choice: it is fitting
  chosen_spanish: es conveniente
  alternatives_spanish:
  - es fitting
  - es apropiado
  - vale la pena
  lexicon: BDAG
  rationale: El adjetivo neutro con εἰμί forma una expresión impersonal que en contexto apunta a lo apropiado o adecuado de la acción. «Conveniente» comunica en español una adecuación práctica y natural, sin reducirlo a mera utilidad ni a dignidad moral.
- source_word: τοῦ κἀμὲ πορεύεσθαι
  english_pob_choice: for me to go also
  chosen_spanish: que yo vaya también
  alternatives_spanish:
  - que yo también vaya
  - para que yo vaya también
  - para que yo también vaya
  lexicon: BDAG
  rationale: El infinitivo articular expresa el contenido de lo que se considera conveniente. En español, una subordinada con «que yo vaya también» resulta más natural y mantiene el valor aditivo de κἀμέ («yo también / a mí también»).
- source_word: σὺν ἐμοὶ
  english_pob_choice: with me
  chosen_spanish: conmigo
  alternatives_spanish:
  - conmigo mismo
  - junto conmigo
  lexicon: BDAG
  rationale: σύν con dativo indica acompañamiento directo. «Conmigo» es la forma natural y concisa en español.
- source_word: πορεύσονται
  english_pob_choice: they will go
  chosen_spanish: irán
  alternatives_spanish:
  - viajarán
  - acompañarán
  lexicon: BDAG
  rationale: El futuro medio denota el desplazamiento de los delegados. «Irán» conserva la repetición verbal con πορεύεσθαι y evita introducir una especificidad mayor que la del griego.
theological_decisions:
- issue: Sentido de la condición sobre el viaje de Pablo y los delegados
  english_pob_reading: Paul states that if his own journey is judged appropriate, the delegates will travel with him.
  chosen_spanish_reading: Pablo dice que, si su ida se considera conveniente, los delegados irán con él.
  alternative_spanish_readings:
  - si yo soy digno de ir
  - si el regalo merece que yo vaya
  - si es necesario que yo vaya
  rationale: ἄξιον es impersonal y la cláusula infinitiva especifica la acción evaluada, no la dignidad moral de Pablo. El contexto es logístico y práctico respecto de la colecta y su entrega; por eso «conveniente» preserva la idea de adecuación sin introducir una lectura ética que el texto no exige.
  doctrine_reference: Translation philosophy §3 (preserve ambiguity where genuine, but do not import doctrinal claims)
translation_notes:
  revision_awareness: La base inglesa había oscilado entre «worthwhile» y «fitting» para ἄξιον ᾖ; la revisión más reciente favorece «fitting/appropriate». En español, «conveniente» recoge mejor esa adecuación circunstancial y mantiene abierta la alternativa de «apropiado» indicada en la nota.
  spanish_consistency_notes:
  - He mantenido el tono sobrio y eclesialmente legible del POB en español.
  - He evitado «SEÑOR» u otras sustituciones innecesarias, aunque este versículo no contiene el nombre divino.
  - He preservado la repetición de «ir» / «vaya» para reflejar πορεύομαι sin sobreinterpretar el matiz de acompañamiento.
