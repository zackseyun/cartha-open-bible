translation:
  language: es
  text: Mi amor esté con todos ustedes en Mesías Jesús[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Cristo Jesús». El título griego Χριστός puede traducirse como «Mesías» o, en una forma más tradicional, «Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀγάπη
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - caridad
  lexicon: BDAG
  rationale: En español contemporáneo, "amor" comunica de manera directa el sentido básico de ἀγάπη como afecto y entrega benevolente. "Caridad" sería más arcaico y podría sonar restrictivo o eclesiástico en exceso.
- source_word: μου
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mío
  lexicon: BDAG
  rationale: El posesivo átono "mi" es la forma natural en español y refleja la relación personal de Pablo con los destinatarios.
- source_word: μετὰ πάντων ὑμῶν
  english_pob_choice: be with all of you
  chosen_spanish: sea con todos ustedes
  alternatives_spanish:
  - esté con todos ustedes
  - esté con todos vosotros
  lexicon: BDAG
  rationale: El griego carece de verbo explícito y funciona como deseo o bendición de despedida. En español, "sea con" conserva el matiz optativo sin forzar un presente declarativo.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - dentro de
  - por medio de
  lexicon: BDAG
  rationale: '"En" reproduce la relación esférica/local de la frase paulina sin añadir una interpretación más específica que la del texto.'
- source_word: Χριστῷ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como "Mesías", siguiendo la norma del proyecto de traducir títulos. En español, "Mesías Jesús" conserva la transparencia semántica mejor que la forma tradicionalizada "Cristo Jesús".
theological_decisions:
- issue: Cómo rendir Χριστῷ Ἰησοῦ en la fórmula final
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La decisión del POB en inglés traduce Χριστός como "Messiah" cuando funciona como título. En español se preserva esa elección para no ocultar el contenido mesiánico del título y para mantener coherencia con la política del proyecto.
  doctrine_reference: 'Translate titles; transliterate names. Χριστός default: Mesías cuando conserva fuerza titular.'
- issue: Verbo implícito en una despedida benedictoria
  english_pob_reading: My love be with all of you
  chosen_spanish_reading: Mi amor sea con todos ustedes
  alternative_spanish_readings:
  - Mi amor está con todos ustedes
  - Mi amor esté con todos ustedes
  rationale: El griego es nominal y no expresa un verbo copulativo. "Sea con" reproduce en español el tono optativo de una despedida/aparte de bendición mejor que una simple afirmación de estado.
  doctrine_reference: Optimal equivalence; preserve source sense without paraphrase.
translation_notes:
  revision_awareness: El paquete en inglés pasó por una oscilación entre "Messiah" y "Christ"; la corrección posterior restauró "Messiah" conforme a la política doctrinal del proyecto. Por eso la versión española sigue la línea final auditable y no la forma tradicionalizada.
  spanish_consistency_notes:
  - Se usa "Mesías" de forma consistente para Χριστός en la línea principal, conforme a la norma del proyecto.
  - Se mantiene "Jesús" como nombre propio sin transliteración adicional.
  - No se introduce nota al pie porque no hay ambigüedad textual adicional que requiera alternativa visible en este verso único.
