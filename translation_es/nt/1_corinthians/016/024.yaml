revisions:
- from: Mi amor sea con todos ustedes en Mesías Jesús.
  to: Mi amor esté con todos ustedes en Mesías Jesús[a].
  rationale: Se cambia «sea con» por «esté con» para lograr un español más natural en una despedida benedictoria, sin apartarse del sentido del griego ni de la decisión inglesa de suplir un verbo implícito en tono optativo. Se añade una nota con la alternativa tradicional «Cristo Jesús» para conservar en español la misma información léxica documentada en el POB inglés.
  reviewer_model: gpt-5.4
