translation:
  language: es
  text: 'El saludo[a] es de mi propia mano: Pablo.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «El saludo con mi propia mano: Pablo.»'
