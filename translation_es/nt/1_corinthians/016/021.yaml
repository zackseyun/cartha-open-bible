lexical_decisions:
- source_word: ἀσπασμὸς
  english_pob_choice: greeting
  chosen_spanish: saludo
  alternatives_spanish:
  - salutación
  - greeting
  lexicon: BDAG
  rationale: ἀσπασμός designa una fórmula de saludo o salutación epistolar. En español, «saludo» es natural y digno en este cierre de carta; «salutación» es posible pero algo más formal y menos corriente.
- source_word: τῇ ἐμῇ χειρὶ
  english_pob_choice: in my own hand
  chosen_spanish: de mi propia mano
  alternatives_spanish:
  - con mi propia mano
  - en mi propia mano
  lexicon: BDAG
  rationale: La frase dativa funciona como fórmula de autógrafo, indicando que Pablo escribe personalmente. «De mi propia mano» comunica bien esa idea en español y conserva el matiz epistolar.
- source_word: Παύλου
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - de Pablo
  lexicon: BDAG
  rationale: El genitivo al final funciona como identificación/firma del autor. En español, el nombre propio simple «Pablo» reproduce el efecto de firma de manera natural; añadir «de» sería demasiado literal.
- source_word: Ὁ
  english_pob_choice: The
  chosen_spanish: El
  alternatives_spanish:
  - Este
  lexicon: BDAG
  rationale: El artículo griego puede reflejarse de forma directa con «El» para mantener el tono formal y la cercanía al texto fuente. Aunque «Este» sería idiomático en algunos contextos, aquí «El saludo» resulta más sobrio y preciso.
translation_notes:
  revision_awareness: La revisión inglesa sustituyó «This greeting» por «The greeting» para reflejar más directamente el artículo griego y mantener concisión. La versión española sigue ese ajuste con «El saludo».
  spanish_consistency_notes:
  - Se mantiene la fórmula epistolar final como una frase breve y directa.
  - No se usa «Señor» ni otras convenciones no presentes en el texto griego.
  - El nombre «Pablo» queda como firma final, en paralelo con el valor apposicional del genitivo griego.
