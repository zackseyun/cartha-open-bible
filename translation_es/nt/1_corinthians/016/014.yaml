  to: Que todo lo que ustedes hagan se haga con amor[a].
  rationale: Se ajusta la cláusula principal para lograr español natural y digno, manteniendo el alcance universal de πάντα, la explicitación idiomática de ὑμῶν como acciones/procederes de la comunidad, y el valor exhortativo de γινέσθω. Se cambia 'en amor' por 'con amor' en el texto principal por claridad y legibilidad; la formulación más literal con 'en amor' se conserva en nota.
