translation:
  language: es
  text: Que todo lo que ustedes hagan se haga con amor[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Que todas las cosas de ustedes sean en amor».'
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all that you do
  chosen_spanish: todo lo que ustedes hagan
  alternatives_spanish:
  - todas las cosas
  - todo
  lexicon: BDAG
  rationale: El plural neutro πάντα expresa alcance total. En español, "todo lo que ustedes hagan" conserva la amplitud de la expresión y hace natural la referencia implícita a las acciones de la comunidad, sin reducirla a un mero sustantivo abstracto.
- source_word: ὑμῶν
  english_pob_choice: you do
  chosen_spanish: ustedes hagan
  alternatives_spanish:
  - de ustedes
  - sus cosas
  - ustedes
  lexicon: BDAG
  rationale: El genitivo pronominal con πάντα es elíptico; la idea es lo que pertenece o procede de los corintios. En español, el verbo explícito "hagan" comunica esa fuerza verbal implícita de manera idiomática y mantiene el sentido colectivo.
- source_word: ἐν ἀγάπῃ
  english_pob_choice: in love
  chosen_spanish: en amor
  alternatives_spanish:
  - con amor
  - dentro del amor
  lexicon: BDAG
  rationale: ἀγάπη se traduce por el valor doctrinal habitual "amor". La preposición ἐν señala esfera o modo; "en amor" sigue de cerca la estructura griega y es plenamente comprensible en español bíblico contemporáneo.
- source_word: γινέσθω
  english_pob_choice: let ... be done
  chosen_spanish: sea
  alternatives_spanish:
  - hágase
  - esté
  - ocurra
  lexicon: BDAG
  rationale: El imperativo de γίνομαι exige en español una forma exhortativa que exprese estado/resultados. "Sea" preserva la brevedad y la fuerza exhortativa del original, y encaja naturalmente con el complemento "en amor".
theological_decisions:
- issue: 'Alcance de πάντα ὑμῶν: acciones versus cosas poseídas'
  english_pob_reading: all that you do
  chosen_spanish_reading: todo lo que ustedes hagan
  alternative_spanish_readings:
  - todas sus cosas
  - todo lo de ustedes
  rationale: 'El contexto exhorta al comportamiento cristiano, por lo que la lectura más natural es distributiva y práctica: todo lo que hagan. La alternativa posesiva literal se conserva como posibilidad implícita, pero en español puede sonar más extraña y menos clara.'
  doctrine_reference: Ética cristiana y amor como principio rector (cf. 1 Corintios 13; 14:1)
- issue: Relación entre modo y esfera en ἐν ἀγάπῃ
  english_pob_reading: in love
  chosen_spanish_reading: en amor
  alternative_spanish_readings:
  - con amor
  - por amor
  rationale: La frase puede entenderse como esfera o modo de acción. "En amor" mantiene la ambigüedad productiva del griego sin forzar una paráfrasis causal o instrumental. Si bien "con amor" es más idiomático, atenúa la correspondencia formal con ἐν.
  doctrine_reference: Amor ágape como principio definitorio de la conducta cristiana (1 Corintios 13:1-13)
- issue: Valor exhortativo de γινέσθω
  english_pob_reading: let ... be done
  chosen_spanish_reading: sea
  alternative_spanish_readings:
  - hágase
  - debe ser
  rationale: El griego usa un imperativo de tercera persona con valor exhortativo. En español, "sea" transmite mejor la idea de que todas las acciones han de caracterizarse por el amor, sin convertir el verso en una orden demasiado pesada o ajena al registro.
  doctrine_reference: Llamado apostólico a una vida regida por el amor en la comunidad
translation_notes:
  revision_awareness: El texto inglés revisado pasó de "Let everything you do be done in love" a "Let all that you do be done in love" para acercarse más a πάντα ὑμῶν. La versión española sigue esa revisión con "todo lo que ustedes hagan", evitando una paráfrasis excesiva y conservando el matiz colectivo y comprensivo del griego.
  spanish_consistency_notes:
  - Se mantiene "amor" para ἀγάπη, no "caridad", por consistencia doctrinal y lexical en el POB español.
  - Se evita "Señor" o equivalentes para este verso porque no aparece un término divino en el texto fuente.
  - Se conserva un registro claro y eclesial, pero no arcaizante, acorde con el estilo público del proyecto.
