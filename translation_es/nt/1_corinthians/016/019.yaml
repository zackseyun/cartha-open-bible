translation:
  language: es
  text: Las iglesias de Asia[a] les saludan. Aquila y Prisca[b], con la iglesia en su casa, les saludan con mucho afecto en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Aquí «Asia» se refiere a la provincia romana de Asia, en el occidente de Asia Menor, no al continente moderno.
    reason: cultural_note
  - marker: b
    text: El griego tiene «Prisca»; en otros pasajes también aparece como «Priscila» (por ejemplo, Hechos 18:2, 18, 26; Romanos 16:3).
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἀσπάζονται / ἀσπάζεται
  english_pob_choice: greet / greet
  chosen_spanish: saludan
  alternatives_spanish:
  - les saludan
  - les envían saludos
  - saludan cordialmente
  lexicon: BDAG
  rationale: ἀσπάζομαι expresa saludar o enviar saludos. En español, «saludan» comunica bien la acción sin añadir un matiz más interpretativo que el griego no exige. El pronombre «les» mantiene el complemento directo plural de destino en un registro natural.
- source_word: αἱ ἐκκλησίαι
  english_pob_choice: the churches
  chosen_spanish: las iglesias
  alternatives_spanish:
  - las congregaciones
  - las asambleas
  lexicon: BDAG
  rationale: En el uso paulino, ἐκκλησία designa normalmente comunidades cristianas locales. «Iglesias» es la forma más idiomática y clara en español para ese referente.
- source_word: τῆς Ἀσίας
  english_pob_choice: of Asia
  chosen_spanish: de Asia
  alternatives_spanish:
  - de la provincia de Asia
  lexicon: BDAG
  rationale: Se conserva el topónimo simple en el texto principal. El sentido de provincia romana en Asia Menor queda mejor aclarado en nota, como hace el audit trail en inglés.
- source_word: πολλὰ
  english_pob_choice: warmly
  chosen_spanish: mucho
  alternatives_spanish:
  - cordialmente
  - con gran afecto
  - calurosamente
  lexicon: BDAG
  rationale: El acusativo adverbial intensifica el saludo. En español, «mucho» refleja con más cercanía la fuerza literal del griego que una adverbialización más libre; el tono cordial queda en el conjunto de la frase.
- source_word: Ἀκύλας καὶ Πρίσκα
  english_pob_choice: Aquila and Prisca
  chosen_spanish: Aquila y Priscila
  alternatives_spanish:
  - Aquila y Prisca
  lexicon: BDAG
  rationale: Los nombres propios se transliteran de forma reconocible para el lector español. Aunque el griego aquí tiene Πρίσκα, la forma «Priscila» es la más conocida en español y corresponde a la misma persona; se conserva la variante griega en nota.
- source_word: σὺν τῇ κατ’ οἶκον αὐτῶν ἐκκλησίᾳ
  english_pob_choice: together with the church in their house
  chosen_spanish: con la iglesia en su casa
  alternatives_spanish:
  - junto con la iglesia que se reúne en su casa
  - con la iglesia doméstica de ellos
  lexicon: BDAG
  rationale: La construcción κατ’ οἶκον apunta a una reunión en casa. «La iglesia en su casa» sigue de cerca la imagen del texto y evita introducir explícitamente «se reúne» en el cuerpo principal, como en el audit trail inglés.
theological_decisions:
- issue: Sentido de ἐκκλησία en un contexto doméstico
  english_pob_reading: '''the church in their house'' refers to a local Christian congregation gathering in Aquila and Prisca''s home'
  chosen_spanish_reading: «la iglesia en su casa» se refiere a una congregación cristiana local reunida en el hogar de Aquila y Priscila
  alternative_spanish_readings:
  - su familia/ casa como entidad doméstica
  - la iglesia doméstica como etiqueta institucional
  rationale: La frase naturalmente señala una congregación local que se reúne en una vivienda, no solo la familia o la casa como propiedad. Se preserva así la lectura eclesiológica sin imponer una formulación denominacional.
  doctrine_reference: Translation philosophy §§1, 5
- issue: Renderización de κύριος
  english_pob_reading: Lord
  chosen_spanish_reading: Señor
  alternative_spanish_readings:
  - Dueño
  - Maestro
  rationale: «Señor» es la correspondencia estándar de κύριος en el contexto paulino y conserva el valor confesional y relacional de la expresión «en el Señor».
  doctrine_reference: 'Términos en disputa: κύριος *Kyrios*'
- issue: Identidad de Πρίσκα
  english_pob_reading: Greek has 'Prisca'; elsewhere she is also called 'Priscilla'
  chosen_spanish_reading: Se usa «Priscila» en el texto por ser la forma más reconocible en español, con nota sobre la forma griega «Prisca»
  alternative_spanish_readings:
  - Prisca
  - Priscila
  rationale: El griego de este versículo presenta Πρίσκα, forma más breve. Para el español eclesial, «Priscila» facilita la identificación del personaje sin negar la variante textual, que se documenta en nota.
  doctrine_reference: Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La comparación con el texto inglés auditado muestra acuerdo alto y ninguna revisión aplicada; se mantuvieron las mismas decisiones de fondo: saludo plural de las iglesias de Asia, nombre breve Prisca/Priscila, y la iglesia doméstica expresada sin ampliar innecesariamente el texto.'
  spanish_consistency_notes:
  - Se mantuvo «iglesias» para ἐκκλησίαι en plural, coherente con el uso paulino.
  - Se preservó «Señor» para κύριος, en línea con la terminología doctrinal del proyecto.
  - No se introdujo «Cristo» ni otras expansiones cristológicas, porque el griego no las exige aquí.
  - Se evitó «se reúne» en el cuerpo principal para no sobreinterpretar κατ’ οἶκον, aunque la nota aclaratoria permite la lectura congregacional.
  - Se usó un tono moderno y digno, con puntuación y colocación de pronombres naturales en español.
