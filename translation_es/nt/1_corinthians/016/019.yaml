    rationale: Aunque intenta reflejar el acusativo adverbial intensivo, en español moderno esa construcción es torpe. Una expresión como «les saludan con mucho afecto» comunica mejor la intensidad sin paráfrasis excesiva.
  revised_spanish_text: Las iglesias de Asia[a] les saludan. Aquila y Prisca[b], con la iglesia en su casa, les saludan con mucho afecto en el Señor.
