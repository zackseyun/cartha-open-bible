revisions:
- from: 'Ahora les ruego, hermanos[a]: ustedes conocen la casa de Estefanas, que es las primicias de Acaya[b], y se han dedicado al servicio de los santos.'
  to: 'Ahora les ruego, hermanos[a]: ustedes conocen la familia de Estéfanas, que son las primicias de Acaya[b], y se han dedicado al servicio de los santos.'
  rationale: Se corrigió la concordancia gramatical de «que es las primicias» a «que son las primicias». También se reemplazó «la casa de Estefanas» por «la familia de Estéfanas» para reflejar mejor el sentido de οἰκία como unidad doméstica y no meramente edificio, y se normalizó el nombre propio al español.
