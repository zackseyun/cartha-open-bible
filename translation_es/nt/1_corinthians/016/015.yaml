translation:
  language: es
  text: 'Ahora les ruego, hermanos[a]: ustedes conocen la familia de Estéfanas, que son las primicias de Acaya[b], y se han dedicado al servicio de los santos.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas»; el griego dice «hermanos», una forma común de dirigirse a toda la congregación.
    reason: lexical_alternative
  - marker: b
    text: «Primicias» probablemente alude a los primeros creyentes en Acaya, preservando a la vez la metáfora de una porción inicial apartada para Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les suplico
  lexicon: BDAG
  rationale: παρακαλέω expresa aquí una súplica/apelación seria. «Les ruego» conserva el tono pastoral y urgente sin volverlo demasiado técnico o rígido en español.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora
  alternatives_spanish:
  - Y
  - Pues
  lexicon: BDAG
  rationale: δέ marca transición discursiva suave. «Ahora» comunica ese cambio con naturalidad en español.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  lexicon: BDAG
  rationale: Se mantiene la forma masculina plural del vocativo como en el griego. «Hermanos» puede incluir a toda la congregación; el alcance inclusivo se aclara en nota.
- source_word: οἴδατε
  english_pob_choice: you know
  chosen_spanish: ustedes conocen
  alternatives_spanish:
  - ustedes saben
  - conocen
  lexicon: BDAG
  rationale: El perfecto con sentido presente se traduce de manera idiomática como conocimiento compartido y actual. «Ustedes conocen» suena natural y conserva el valor relacional del verbo.
- source_word: τὴν οἰκίαν Στεφανᾶ
  english_pob_choice: the household of Stephanas
  chosen_spanish: la casa de Estefanas
  alternatives_spanish:
  - el hogar de Estefanas
  - la familia de Estefanas
  lexicon: BDAG
  rationale: οἰκία puede abarcar casa, familia o unidad doméstica. Aquí opto por «la casa de Estefanas» por ser breve y tradicionalmente comprensible, sin limitarlo solo al edificio ni volverlo demasiado sociológico.
- source_word: ἀπαρχὴ τῆς Ἀχαΐας
  english_pob_choice: the firstfruits of Achaia
  chosen_spanish: las primicias de Acaya
  alternatives_spanish:
  - los primeros convertidos de Acaya
  - la primera porción de Acaya
  lexicon: BDAG
  rationale: ἀπαρχή se conserva como metáfora agrícola-cultual. «Primicias» mantiene la imagen de lo primero ofrecido a Dios y puede sugerir también los primeros creyentes, tal como refleja la nota inglesa.
- source_word: εἰς διακονίαν
  english_pob_choice: to service
  chosen_spanish: al servicio
  alternatives_spanish:
  - para el servicio
  - para el ministerio
  lexicon: BDAG
  rationale: διακονία es un sustantivo amplio de servicio/ministerio. «Al servicio» refleja bien la idea de dedicación orientada a una tarea continua, sin imponer lenguaje eclesiástico posterior.
- source_word: τοῖς ἁγίοις
  english_pob_choice: for the saints
  chosen_spanish: de los santos
  alternatives_spanish:
  - para los santos
  - de los creyentes
  lexicon: BDAG
  rationale: El dativo expresa la esfera o destinatario del servicio. «De los santos» en español funciona bien con «servicio» y conserva la referencia paulina habitual a los creyentes como santos.
- source_word: ἔταξαν ἑαυτούς
  english_pob_choice: they devoted themselves
  chosen_spanish: se han dedicado
  alternatives_spanish:
  - se dedicaron
  - se consagraron
  - se pusieron
  lexicon: BDAG
  rationale: τάσσω con reflexivo indica que ellos mismos se dispusieron para una tarea. «Se han dedicado» comunica compromiso voluntario y sostenido en un español natural, más cercano al sentido que una simple auto-nombramiento.
theological_decisions:
- issue: Alcance inclusivo de ἀδελφοί
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se conserva la forma masculina del vocativo como en el texto fuente. La posible inclusión de toda la congregación se deja explícita en nota para no borrar la forma léxica del griego.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
- issue: Metáfora y posible sentido temporal de ἀπαρχὴ τῆς Ἀχαΐας
  english_pob_reading: the firstfruits of Achaia
  chosen_spanish_reading: las primicias de Acaya
  alternative_spanish_readings:
  - los primeros convertidos de Acaya
  rationale: «Primicias» preserva la metáfora y su posible carga de consagración, sin reducirla a un mero dato cronológico. La nota puede señalar el sentido de primeros creyentes.
  doctrine_reference: DOCTRINE.md Translation philosophy §1, §3
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión reciente del inglés POB que ajustó el verbo colectivo a «they are» y afinó «the service of the saints». En español, eso se refleja manteniendo el sujeto colectivo («la casa de Estefanas») con verbo de estado/identidad («es») y expresando la dedicación con una construcción natural de compromiso («se han dedicado al servicio de los santos»).
  spanish_consistency_notes:
  - Se usó «Yahvé» solo donde el texto no lo exige; este versículo no contiene el nombre divino.
  - Se mantuvo «Acaya» como topónimo habitual en español bíblico.
  - Se eligió «santos» para ἅγιοι, siguiendo el uso paulino estándar.
  - Se prefirió «casa de Estefanas» sobre «familia» para conservar la amplitud de οἰκία sin sobreexplicar.
