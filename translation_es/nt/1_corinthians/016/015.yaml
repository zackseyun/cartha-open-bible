  timestamp: '2026-05-07T21:12:59Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja en general la estructura y el sentido del griego: una exhortación a los corintios, referencia a la casa/hogar de Estéfanas, su condición de primicias de Acaya y su dedicación al servicio de los santos. Sin embargo, contiene un problema gramatical importante en «que es las primicias», donde el singular «es» no concuerda con «las primicias» ni con la referencia colectiva al hogar/la casa. Además, «la casa de Estefanas» es menos fiel que «la familia/hogar de Estéfanas» al valor social de οἰκία.'
  spanish_quality_summary: El texto es mayormente legible, pero «que es las primicias» resulta incorrecto y entorpece la lectura. También conviene normalizar el nombre a «Estéfanas», forma más natural en español bíblico, y preferir «la familia de Estéfanas» para evitar que «casa» se entienda como edificio. El resto del verso suena natural y digno.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Hermanos» con nota es adecuado para ἀδελφοί; «primicias» preserva bien ἀπαρχή; «santos» mantiene el uso paulino. La mejora principal es léxica y sintáctica en οἰκίαν Στεφανᾶ y la concordancia con ἀπαρχὴ.
  issues:
  - severity: high
    issue: Concordancia incorrecta en «que es las primicias»
    rationale: El español es gramaticalmente incorrecto. Además, el inglés POB revisado explicitó el valor colectivo con plural («they are»). En español debe resolverse como «que son las primicias» o reformularse con un sustantivo singular distinto.
  - severity: medium
    issue: «La casa de Estefanas» puede sonar demasiado literal y física
    rationale: οἰκία aquí apunta al hogar/familia/unidad doméstica. «La familia de Estéfanas» comunica mejor el referente social y evita ambigüedad con el edificio.
  - severity: low
    issue: Forma del nombre «Estefanas»
    rationale: «Estéfanas» con tilde es la adaptación más natural en español para Stephanas y mejora la legibilidad.
