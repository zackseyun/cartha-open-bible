translation:
  language: es
  text: Y si Timoteo llega[a], procuren que esté con ustedes sin temor, porque hace la obra del Señor[b], como también yo lo hago.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vean que esté entre ustedes sin temor». La expresión griega puede destacar la presencia de Timoteo en medio de ellos, además de su estado libre de temor.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «porque trabaja la obra del Señor, como también yo». El griego puede expresarse también de manera más literal con el verbo y el sustantivo emparentados.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐὰν δὲ
  english_pob_choice: Now if
  chosen_spanish: Y si
  alternatives_spanish:
  - Ahora, si
  - Pero si
  lexicon: BDAG
  rationale: ἐάν con δέ introduce una condición con transición suave. En español, «Y si» conserva la apertura condicional y el enlace discursivo sin volver adversativo el giro más de lo que pide el griego.
- source_word: ἔλθῃ Τιμόθεος
  english_pob_choice: Timothy comes
  chosen_spanish: Timoteo llega
  alternatives_spanish:
  - Timoteo venga
  - Timoteo arrive
  lexicon: BDAG
  rationale: El aoristo subjuntivo con ἐάν expresa eventualidad futura. «Llega» es natural en español y mantiene el sentido de llegada/presencia contingente sin sobrecargar el matiz.
- source_word: βλέπετε
  english_pob_choice: see that
  chosen_spanish: procuren que
  alternatives_spanish:
  - vean que
  - asegúrense de que
  - tengan cuidado de que
  lexicon: BDAG
  rationale: El imperativo plural pide vigilancia activa o diligencia pastoral. «Procuren que» comunica bien la responsabilidad de velar por la situación de Timoteo en un español fluido y digno.
- source_word: ἵνα ἀφόβως γένηται πρὸς ὑμᾶς
  english_pob_choice: he may be with you without fear
  chosen_spanish: esté con ustedes sin temor
  alternatives_spanish:
  - sea con ustedes sin temor
  - esté entre ustedes sin temor
  - pueda estar con ustedes sin temor
  lexicon: BDAG
  rationale: Con ἵνα + subjuntivo y γένηται, el griego expresa el estado deseado de Timoteo en relación con ellos. «Esté con ustedes sin temor» preserva la finalidad y la relación interpersonal, con un español idiomático.
- source_word: ἀφόβως
  english_pob_choice: without fear
  chosen_spanish: sin temor
  alternatives_spanish:
  - sin miedo
  - valientemente
  - sin temor alguno
  lexicon: BDAG
  rationale: ἀφόβως denota ausencia de temor. «Sin temor» es más sobrio y eclesiásticamente natural que «sin miedo», y evita convertir el adverbio en un rasgo de valentía no explícito.
- source_word: τὸ γὰρ ἔργον κυρίου
  english_pob_choice: the Lord’s work
  chosen_spanish: la obra del Señor
  alternatives_spanish:
  - la obra de Yahvé
  - la obra del Señor Jesús
  - la obra del Dueño
  lexicon: BDAG
  rationale: El genitivo κυρίου se traduce con la forma reverente y directa «el Señor», siguiendo la decisión inglesa de no explicitar más de lo que el griego dice. «Obra» conserva ἔργον sin forzar un tecnicismo.
- source_word: ἐργάζεται
  english_pob_choice: he is doing
  chosen_spanish: está realizando
  alternatives_spanish:
  - está haciendo
  - trabaja en
  - lleva a cabo
  lexicon: BDAG
  rationale: El presente medio indica acción en curso. «Está realizando» refleja mejor el aspecto progresivo y la seriedad de la labor que un simple «hace», manteniendo un tono formal.
- source_word: ὡς κἀγώ
  english_pob_choice: as I also am
  chosen_spanish: como también yo
  alternatives_spanish:
  - igual que yo también
  - como yo también
  - tal como yo
  lexicon: BDAG
  rationale: κἀγώ significa «también yo». En español, la elipsis del verbo se puede resolver de modo natural en el contexto. «Como también yo» conserva la comparación y la coordinación sin añadir un verbo no explicitado por el griego.
theological_decisions:
- issue: Referencia de κυρίου
  english_pob_reading: '''the Lord'' is retained without specifying beyond the Greek text'
  chosen_spanish_reading: «el Señor» se conserva sin identificarlo explícitamente en el cuerpo del texto
  alternative_spanish_readings:
  - «el Señor Jesús»
  - «Yahvé»
  - «el Dueño»
  rationale: El texto griego dice simplemente κυρίου. Aunque en contexto paulino es probable que se refiera a Jesús, la traducción no debe introducir esa identificación en el texto principal sin apoyo explícito del pasaje. «El Señor» mantiene la ambigüedad documentada.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
- issue: Función de ἵνα + γένηται
  english_pob_reading: '''he may be with you without fear'''
  chosen_spanish_reading: «esté con ustedes sin temor» expresa finalidad/deseo sin convertir el subjuntivo en mera certeza
  alternative_spanish_readings:
  - «pueda estar con ustedes sin temor»
  - «para que esté con ustedes sin temor»
  rationale: El griego con ἵνα marca propósito o resultado deseado. En español, el subjuntivo basta para preservar esa fuerza; añadir «pueda» o «para que» sería posible, pero no necesario. La formulación elegida mantiene la tensión entre mandato pastoral y propósito.
  doctrine_reference: 'Translation philosophy #2 and #4'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el criterio de revisión del POB inglés: se conservó la condición con ἐάν, se reflejó mejor la finalidad de ἵνα + γένηται con un subjuntivo natural en español, y se mantuvo la referencia indefinida de κυρίου como «el Señor» sin especificación añadida.'
  spanish_consistency_notes:
  - Se usa «Timoteo» y no una forma abreviada, en coherencia con el nombre propio del texto griego.
  - Se mantiene «Señor» como término reverente para κυρίου, de acuerdo con la práctica del POB y sin introducir una glosa doctrinal en el texto principal.
  - «Sin temor» conserva el valor lexical de ἀφόβως sin añadir matices de valentía que no están explícitos.
  - La elipsis de ὡς κἀγώ se resuelve con «como también yo», que es breve y natural en español.
  - «Obra» se conserva para ἔργον, evitando una paráfrasis como «ministerio» que sería más interpretativa.
