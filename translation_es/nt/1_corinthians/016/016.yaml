review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido del griego: ἵνα como cláusula subordinada (''para que''), καὶ ὑμεῖς como inclusión enfática (''ustedes también''), ὑποτάσσησθε con sentido reflexivo/voluntario, τοῖς τοιούτοις como referencia de clase, y la secuencia final dirigida a todos los que participan en la obra. Sin embargo, ''se afana'' para κοπιῶντι es menos directo que el paralelo verbal griego y puede sonar algo idiomático frente al registro digno del pasaje.'
  spanish_quality_summary: El español es claro y natural, pero 'trabaja y se afana' mezcla dos verbos de textura distinta; 'trabaja y labora' sería redundante, pero 'trabaja arduamente' o 'trabaja y se esfuerza' suenan más naturales en español general. Además, la nota 'a personas como estas' conviene ajustarla a un demostrativo menos deíctico y más idiomático en este contexto.
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. 'Se sometan' es aceptable para ὑποτάσσησθε en este contexto. 'Tales personas' también encaja bien. La revisión propuesta mantiene la decisión inglesa revisada de no sobretraducir συνεργοῦντι como 'trabaja junto con otros'.
  issues:
  - severity: medium
    issue: '''se afana'' para κοπιῶντι suena menos preciso y menos paralelo al griego'
    rationale: κοπιῶντι enfatiza labor esforzada o ardua. 'Se afana' puede comunicar esfuerzo, pero en español actual puede sentirse algo más interpretativo o idiomático que una formulación como 'trabaja arduamente', que conserva mejor la idea de labor intensa con mayor naturalidad y dignidad.
  - severity: low
    issue: La nota 'a personas como estas' puede mejorarse
    rationale: Como alternativa a 'tales personas', 'personas como esas' o 'personas así' suena más natural que 'como estas' cuando no se está señalando físicamente a referentes presentes en el discurso español.
