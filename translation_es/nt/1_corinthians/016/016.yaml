- from: para que ustedes también se sometan a tales personas[a], y a todo el que trabaja y se afana.
  to: para que ustedes también se sometan a tales personas[a], y a todo el que trabaja arduamente.
  rationale: Se ajusta κοπιῶντι a 'trabaja arduamente' para expresar con más precisión la idea de labor esforzada sin producir una coordinación española menos natural ('trabaja y se afana'). Se conserva 'trabaja' para συνεργοῦντι, siguiendo la revisión inglesa que evita explicitar 'juntamente'. La nota alternativa se pule para un español más idiomático.
