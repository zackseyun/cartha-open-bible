lexical_decisions:
- source_word: ἵνα
  english_pob_choice: that
  chosen_spanish: para que
  alternatives_spanish:
  - que
  lexicon: BDAG
  rationale: El griego introduce una cláusula de propósito/resultado dependiente del llamado previo; en español, «para que» expresa con naturalidad esa dependencia sin perder el valor subordinante.
- source_word: καὶ ὑμεῖς
  english_pob_choice: you also
  chosen_spanish: ustedes también
  alternatives_spanish:
  - ustedes también
  - también ustedes
  lexicon: BDAG
  rationale: Conserva la inclusión enfática de los corintios en el mismo patrón de respuesta; «ustedes también» suena natural y mantiene el énfasis.
- source_word: ὑποτάσσησθε
  english_pob_choice: submit yourselves
  chosen_spanish: se sometan
  alternatives_spanish:
  - se sujeten
  - se sometan voluntariamente
  lexicon: BDAG
  rationale: 'El verbo medio/pasivo aquí pide una lectura reflexiva: colocarse uno mismo bajo una autoridad o reconocimiento. «Se sometan» comunica la fuerza verbal sin endurecerla como mera pasividad.'
- source_word: τοῖς τοιούτοις
  english_pob_choice: to such people
  chosen_spanish: a tales personas
  alternatives_spanish:
  - a personas como estas
  - a gente como esa
  lexicon: BDAG
  rationale: Recoge la referencia de clase a quienes acaban de ser descritos, sin añadir un matiz masculino que el sintagma no exige.
- source_word: παντὶ τῷ συνεργοῦντι
  english_pob_choice: to everyone who works
  chosen_spanish: a todo el que trabaja
  alternatives_spanish:
  - a todo el que colabora
  - a cada uno que trabaja junto con otros
  lexicon: BDAG
  rationale: La revisión inglesa evitó introducir «together» por no estar explícito en el griego; en español, «trabaja» preserva el valor participial amplio de συνεργέω sin forzar un complemento no expresado.
- source_word: κοπιῶντι
  english_pob_choice: labors
  chosen_spanish: se afana
  alternatives_spanish:
  - labora
  - se esfuerza
  lexicon: BDAG
  rationale: κοπιάω implica trabajo fatigoso, intenso. «Se afana» transmite bien el desgaste del esfuerzo y resulta natural en español eclesial moderno.
theological_decisions:
- issue: Naturaleza de la sumisión exigida
  english_pob_reading: A call to voluntary deference toward recognized Christian workers like those just mentioned, not an unqualified doctrine of absolute subordination.
  chosen_spanish_reading: Un llamado a una sujeción voluntaria y respetuosa hacia obreros cristianos reconocidos como los mencionados, no una doctrina general de subordinación absoluta.
  alternative_spanish_readings:
  - Una obediencia jerárquica más amplia
  - Una sumisión institucionalizada
  rationale: El contexto inmediato trata de Estéfanas y de quienes se dedican al servicio; por eso conviene mantener la tensión del texto sin convertirlo en una regla eclesiástica más amplia de lo que dice.
  doctrine_reference: Conservar la tensión teológica del pasaje sin expandir su alcance más allá del contexto inmediato.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del POB inglés al evitar equivalentes que implicaran un complemento no explicitado por el griego en συνεργοῦντι. Se conservó la fuerza reflexiva de ὑποτάσσησθε, la referencia de clase de τοιούτοις y el matiz de esfuerzo de κοπιῶντι.
  spanish_consistency_notes:
  - Se prefirió «ustedes» en un registro plural neutral latinoamericano y eclesial.
  - Se mantuvo «se sometan» para preservar la voz media/reflexiva sin caer en un calco rígido.
  - «Se afana» equilibra dignidad y claridad para κοπιῶντι en un contexto ministerial.
  - La nota a pie de página marca la alternativa semántica principal sin duplicar el sentido del texto principal.
