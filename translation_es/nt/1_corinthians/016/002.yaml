- from: Cada uno de ustedes, el primer día de la semana[a], ponga aparte algo[b], atesorando lo que haya prosperado[c], para que no se hagan colectas cuando yo vaya.
  to: El primer día de cada semana[a], cada uno de ustedes ponga aparte algo[b], atesorando según haya prosperado[c], para que no se hagan colectas cuando yo venga.
