translation:
  language: es
  text: El primer día de cada semana[a], cada uno de ustedes ponga aparte algo[b], atesorando según haya prosperado[c], para que no se hagan colectas cuando yo venga.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el primer día de la semana». La expresión griega es distributiva aquí y señala una práctica semanal regular.'
    reason: lexical_alternative
  - marker: b
    text: 'Literalmente: «por sí mismo» o «consigo mismo». Puede indicar que cada persona aparte el dinero personalmente, quizá en su casa.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «en la medida en que haya prosperado». El sentido es que cada uno dé conforme a la prosperidad que haya recibido.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κατὰ μίαν σαββάτου
  english_pob_choice: On the first day of every week
  chosen_spanish: el primer día de la semana
  alternatives_spanish:
  - cada primer día de la semana
  - el primer día de cada semana
  lexicon: BDAG
  rationale: La expresión griega es distributiva y señala una práctica semanal regular. En español, «el primer día de la semana» comunica de forma natural esa recurrencia sin perder la referencia temporal.
- source_word: ἕκαστος ὑμῶν
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno de vosotros
  - todos ustedes, cada uno
  lexicon: BDAG
  rationale: La fuerza distributiva del griego aplica la instrucción a cada miembro individualmente. «Cada uno de ustedes» conserva esa aplicación personal en español neutro.
- source_word: παρ’ ἑαυτῷ
  english_pob_choice: set something aside
  chosen_spanish: ponga aparte algo[b]
  alternatives_spanish:
  - por sí mismo
  - en su casa
  lexicon: BDAG
  rationale: El griego literalmente significa «junto a sí / consigo mismo», pero en contexto indica apartar el dinero personalmente. En español, «ponga aparte algo» expresa esa acción de manera idiomática sin perder la nota de separación individual, y la nota conserva las alternativas literales.
- source_word: τιθέτω
  english_pob_choice: is to set
  chosen_spanish: ponga aparte
  alternatives_spanish:
  - que ponga
  - debe poner
  lexicon: BDAG
  rationale: El imperativo presente singular pide una acción continua o repetida. «Ponga aparte» mantiene el tono exhortativo y suena natural en español.
- source_word: θησαυρίζων
  english_pob_choice: storing up
  chosen_spanish: atesorando
  alternatives_spanish:
  - ahorrando
  - guardando
  lexicon: BDAG
  rationale: El participio añade la idea de acumular gradualmente. «Atesorando» conserva la imagen de reservar para el futuro y la relación con el verbo de «tesoro» mejor que un simple «ahorrando».
- source_word: ὅ τι ἐὰν εὐοδῶται
  english_pob_choice: whatever he may prosper in
  chosen_spanish: lo que haya prosperado[c]
  alternatives_spanish:
  - según prospere
  - en la medida en que prospere
  lexicon: BDAG
  rationale: La construcción es indefinida y condicionada; en español, «lo que haya prosperado» mantiene la referencia al aumento o prosperidad recibida. La nota recoge la alternativa semántica «en la medida en que prospere», que explicita el sentido distributivo de la cláusula.
- source_word: ἵνα μὴ ὅταν ἔλθω τότε λογεῖαι γίνωνται
  english_pob_choice: so that collections will not be made when I come
  chosen_spanish: para que no se hagan colectas cuando yo vaya
  alternatives_spanish:
  - para que no haya que hacer colectas cuando yo vaya
  - para que no se realicen colectas cuando yo venga
  lexicon: BDAG
  rationale: La finalidad es evitar una colecta improvisada al llegar Pablo. «No se hagan colectas» reproduce bien λογεῖαι γίνωνται en español y conserva el sentido práctico del pasaje.
translation_notes:
  revision_awareness: Se siguió el texto griego SBLGNT y el expediente auditado en inglés; la redacción española conserva la lectura distributiva de «el primer día de la semana», la instrucción individual, la idea de apartar/atesorar personalmente y el propósito de evitar colectas de último momento cuando Pablo llegue. No se detectaron cambios revisados en el expediente inglés final.
  spanish_consistency_notes:
  - Se mantiene «colectas» para λογεῖαι, en línea con el valor monetario del contexto.
  - Se usa «cada uno de ustedes» para la fuerza distributiva de ἕκαστος ὑμῶν.
  - «Ponga aparte» y «atesorando» trabajan juntos para expresar la acumulación paulatina implícita en τιθέτω + θησαυρίζων.
  - «Cuando yo vaya» conserva la referencia temporal de ὅταν ἔλθω sin sobrecargar el español con una perífrasis más literal.
