review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador capta en general el sentido del griego, pero no preserva bien dos decisiones clave del expediente inglés: la fuerza distributiva de κατὰ μίαν σαββάτου y el matiz de ὅ τι ἐὰν εὐοδῶται. «El primer día de la semana» en el texto principal no refleja suficientemente la recurrencia semanal que el POB fijó como principal; además la nota a no ofrece exactamente una alternativa real, pues repite la misma frase. También «lo que haya prosperado» suena poco natural y desplaza el sentido desde dar conforme a la prosperidad recibida hacia «lo que prosperó» como objeto. El resto del versículo está mayormente alineado.'
  spanish_quality_summary: 'El español es legible, pero el orden inicial «Cada uno de ustedes, el primer día...» resulta algo trabado, y «atesorando lo que haya prosperado» suena poco idiomático en español bíblico natural. Conviene una redacción más fluida: comenzar con la referencia temporal, mantener «cada uno de ustedes», y expresar la medida de la prosperidad de forma clara y digna. También es preferible «venga» frente a «vaya» para ἔλθω.'
  glossary_alignment: 'No hay conflictos con la terminología doctrinal del proyecto. Las decisiones relevantes son más bien léxicas y sintácticas: conviene alinear κατὰ μίαν σαββάτου con «el primer día de cada semana» y ὅ τι ἐὰν εὐοδῶται con «según haya prosperado» o equivalente. La nota sobre παρ’ ἑαυτῷ debe mantener el literal, pero el texto principal puede seguir con «aparte algo».'
  issues:
  - severity: medium
    issue: La frase principal no refleja bien la recurrencia distributiva de κατὰ μίαν σαββάτου.
    rationale: El expediente inglés escogió como principal «On the first day of every week». En español, «el primer día de la semana» puede leerse como mera referencia temporal singular. «El primer día de cada semana» preserva mejor la práctica regular.
  - severity: medium
    issue: La nota [a] no presenta una alternativa distinta y por tanto no cumple bien su función.
    rationale: 'Actualmente la nota dice «O: el primer día de la semana», que es igual al texto principal. Si el texto principal se corrige a «de cada semana», entonces la alternativa «de la semana» sí queda correctamente preservada.'
  - severity: medium
    issue: «Lo que haya prosperado» es poco natural y puede malentender ὅ τι ἐὰν εὐοδῶται.
    rationale: La cláusula expresa dar conforme a la prosperidad recibida, no «atesorar lo que prosperó» como si fuera el objeto mismo. «Según haya prosperado» o «en la medida en que haya prosperado» comunica mejor el sentido.
  - severity: low
    issue: «Cuando yo vaya» es menos natural que «cuando yo venga» para ἔλθω en este contexto epistolar.
    rationale: Desde la perspectiva del autor que habla de su futura llegada, «venga» es la forma idiomática habitual en español bíblico y refleja bien «when I come» del expediente inglés.
