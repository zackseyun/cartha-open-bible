translation:
  language: es
  text: Si alguien no ama al Señor, sea anatema[a]. Marana tha[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, en sentido tradicional: «anatema»; es decir, bajo maldición.'
    reason: lexical_alternative
  - marker: b
    text: 'Arameo. Posiblemente: «¡Nuestro Señor, ven!» o «¡Nuestro Señor ha venido!»'
    reason: alternative_reading
lexical_decisions:
- source_word: φιλεῖ
  english_pob_choice: does not love
  chosen_spanish: no ama
  alternatives_spanish:
  - no tiene afecto por
  - no aprecia
  lexicon: BDAG
  rationale: φιλέω expresa amor/afecto personal. En español, «amar» comunica de forma natural y fiel la fuerza de la advertencia paulina sin debilitarla ni volverla técnica.
- source_word: κύριον
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el amo
  lexicon: BDAG
  rationale: En este contexto paulino, κύριος se refiere a Jesús con peso cristológico. «Señor» preserva el título establecido en español bíblico y mantiene esa carga.
- source_word: ἤτω
  english_pob_choice: let him be
  chosen_spanish: sea
  alternatives_spanish:
  - sea tenido por
  - quede
  lexicon: BDAG
  rationale: El imperativo de εἰμί funciona aquí con valor jussivo. En español, «sea» reproduce bien la fuerza de sentencia/judicial de la cláusula.
- source_word: ἀνάθεμα
  english_pob_choice: accursed
  chosen_spanish: anatema
  alternatives_spanish:
  - maldito
  - bajo maldición
  lexicon: BDAG
  rationale: ἀνάθεμα designa algo o alguien entregado a destrucción o maldición divina. En español, «anatema» conserva el término tradicional y la solemnidad técnica; la nota permite explicitar su valor de condena/maldición.
- source_word: Μαράνα θά
  english_pob_choice: Marana tha
  chosen_spanish: Marana tha
  alternatives_spanish:
  - ¡Nuestro Señor, ven!
  - ¡Nuestro Señor ha venido!
  lexicon: BDAG
  rationale: La expresión aramea se mantiene transliterada para preservar su forma litúrgica y su ambigüedad interpretativa. No se resuelve de antemano entre sus dos lecturas principales.
theological_decisions:
- issue: Sentido de la expresión aramea Μαράνα θά
  english_pob_reading: 'Retain as transliteration in the main text: ''Marana tha.'''
  chosen_spanish_reading: 'Conservar la transliteración en el texto principal: «Marana tha».'
  alternative_spanish_readings:
  - «¡Nuestro Señor, ven!»
  - «¡Nuestro Señor ha venido!»
  rationale: La frase es estable en la tradición textual, pero su división y sentido siguen debatidos. Mantenerla transliterada preserva su carácter original y evita cerrar indebidamente la tensión interpretativa.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
- issue: Fuerza de ἀνάθεμα
  english_pob_reading: accursed
  chosen_spanish_reading: anatema
  alternative_spanish_readings:
  - maldito
  - bajo maldición
  rationale: «Anatema» conserva el valor de sentencia solemne y la relación con el vocabulario tradicional sin neutralizar la dureza del término. La nota aclara el sentido de maldición/juzgamiento.
  doctrine_reference: 'Terminología POB: conservar fuerza léxica sin diluir el juicio divino'
translation_notes:
  revision_awareness: Coincide con el pasaje fuente y con el acuerdo alto del control cruzado; no se observaron revisiones aplicadas en el expediente inglés, así que se mantiene la solución estable con conservación de la tensión interpretativa en Μαράνα θά y la fuerza lexical de ἀνάθεμα.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος conforme al uso cristológico del NT en español.
  - Se conserva «anatema» en el texto con nota explicativa para no perder la carga jurídica y tradicional del término.
  - La transliteración «Marana tha» evita resolver una ambigüedad real del arameo en el cuerpo del texto.
