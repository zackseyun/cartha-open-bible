translation:
  language: es
  text: Pero vendré a ustedes cuando haya pasado por Macedonia[a], porque voy a pasar por Macedonia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «cuando pase por Macedonia». El aoristo subjuntivo griego puede expresarse de modo más simple en español, pero «haya pasado por» conserva mejor la idea de una acción completada antes de la visita de Pablo.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Ἐλεύσομαι
  english_pob_choice: I will come
  chosen_spanish: iré
  alternatives_spanish:
  - vendré
  - me acercaré
  lexicon: BDAG
  rationale: El verbo de movimiento futuro se vierte de forma natural con futuro de ‘ir’. Aunque ‘vendré’ sigue mejor el matiz de dirección hacia los corintios, ‘iré a ustedes’ evita una calcificación y conserva la orientación de movimiento hacia su destino.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Ahora bien
  - Y
  lexicon: BDAG
  rationale: δέ introduce una transición suave desde el plan inmediato anterior. ‘Pero’ reproduce ese giro de manera clara y natural en español.
- source_word: πρὸς ὑμᾶς
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - con ustedes
  - hacia ustedes
  lexicon: BDAG
  rationale: Con un verbo de desplazamiento, πρός + acusativo expresa movimiento hacia personas. ‘A ustedes’ es idiomático en español y conserva la dirección hacia los destinatarios.
- source_word: ὅταν
  english_pob_choice: when
  chosen_spanish: cuando
  alternatives_spanish:
  - cuandoquiera que
  - tan pronto como
  lexicon: BDAG
  rationale: Con el subjuntivo aoristo, ὅταν marca una eventualidad futura. ‘Cuando’ comunica bien la referencia temporal sin sobrecargar la frase.
- source_word: Μακεδονίαν
  english_pob_choice: Macedonia
  chosen_spanish: Macedonia
  alternatives_spanish:
  - Macedonia (como provincia romana)
  lexicon: BDAG
  rationale: Se conserva el topónimo transliterado estándar, conforme al tratamiento habitual de nombres geográficos propios.
- source_word: διέλθω
  english_pob_choice: I have gone through
  chosen_spanish: haya pasado por
  alternatives_spanish:
  - haya atravesado
  - pase por
  lexicon: BDAG
  rationale: El aoristo subjuntivo bajo ὅταν expresa el paso previo y completado antes de la visita principal. ‘Haya pasado por’ preserva mejor esa anterioridad que un presente simple.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce la razón del momento de su visita. ‘Porque’ expresa claramente la explicación causal en español.
- source_word: διέρχομαι
  english_pob_choice: I am going through
  chosen_spanish: voy pasando por
  alternatives_spanish:
  - estoy pasando por
  - estoy transitando por
  lexicon: BDAG
  rationale: El presente de διέρχομαι describe la ruta en curso o el itinerario ya asumido. ‘Voy pasando por’ mantiene el valor progresivo y evita reducirlo a un simple presente estático.
translation_notes:
  revision_awareness: La versión española sigue de cerca el griego y el expediente auditado en inglés, preservando la secuencia temporal entre el paso por Macedonia y la visita a los corintios, sin introducir matices interpretativos no respaldados por el texto.
  spanish_consistency_notes:
  - Se mantiene la distinción aspectual entre διέλθω («haya pasado por») y διέρχομαι («voy pasando por»).
  - Se evita ‘SEÑOR’ u այլ equivalentes innecesarios porque el pasaje no contiene referencia al nombre divino.
  - El pronombre de segunda persona se vierte en forma de cortesía plural ‘ustedes’, adecuada para lectura eclesial neutral latinoamericana.
