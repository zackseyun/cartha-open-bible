    rationale: La frase es poco natural en español bíblico moderno y puede sugerir una acción físicamente en progreso en ese instante. El presente griego aquí describe mejor una ruta o plan vigente; «voy a pasar por Macedonia» o «paso por Macedonia» resultan más idiomáticos. Dado el contexto de planes futuros, «voy a pasar por Macedonia» comunica bien la explicación causal.
