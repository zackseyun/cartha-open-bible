  source_alignment_summary: 'El borrador capta bien la estructura básica del griego: contraste suave con δέ, llegada futura a los corintios, anterioridad de διέλθω bajo ὅταν, y explicación con γάρ. Sin embargo, Ἐλεύσομαι + πρὸς ὑμᾶς se alinea mejor con «vendré a ustedes» que con «iré a ustedes», y el presente διέρχομαι se expresa de modo más natural como itinerario vigente («estoy pasando por / voy a pasar por / pasaré por») que con «voy pasando por», que suena poco idiomático en este contexto epistolar.'
  spanish_quality_summary: El texto es generalmente claro, pero «iré a ustedes» pierde la orientación deíctica del griego y del POB inglés, y «voy pasando por Macedonia» suena forzado en español neutral. Una leve revisión mejora fidelidad y naturalidad sin cambiar el sentido.
  glossary_alignment: 'No hay términos teológicos de proyecto en juego. El principal ajuste léxico es de verbo de movimiento: preferir «vendré» para Ἐλεύσομαι con πρὸς ὑμᾶς, y una forma más idiomática para el presente διέρχομαι.'
