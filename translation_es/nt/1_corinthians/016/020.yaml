translation:
  language: es
  text: Todos los hermanos[a] les envían saludos. Salúdense unos a otros con un beso santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Todos los hermanos y hermanas», ya que «hermanos» puede referirse colectivamente a los creyentes de ambos sexos.'
    reason: lexical_alternative
  - marker: b
    text: El «beso santo» era un saludo habitual entre los creyentes, marcado por la santidad y la comunión mutua.
    reason: cultural_note
lexical_decisions:
- source_word: ἀσπάζονται
  english_pob_choice: greet
  chosen_spanish: saludan
  alternatives_spanish:
  - les envían saludos
  - les saludan cordialmente
  lexicon: BDAG
  rationale: ἀσπάζονται expresa el acto de enviar saludos en un contexto epistolar. En español, «saludan» comunica con naturalidad ese gesto de cortesía sin añadir más contenido del que ofrece el griego.
- source_word: ὑμᾶς
  english_pob_choice: you
  chosen_spanish: les
  alternatives_spanish:
  - a ustedes
  - a vosotros
  lexicon: Pronombre personal de 2.ª persona plural
  rationale: En español, el objeto indirecto plural se expresa con «les» en este saludo epistolar. Mantiene el tono directo y natural de la carta.
- source_word: οἱ ἀδελφοὶ πάντες
  english_pob_choice: All the brothers
  chosen_spanish: Todos los hermanos
  alternatives_spanish:
  - Todos los hermanos y hermanas
  - Todos los creyentes
  lexicon: BDAG
  rationale: Se conserva «hermanos» porque el plural masculino griego es la forma documentada en el texto y puede abarcar al conjunto de creyentes. La expansión inclusiva se reserva como alternativa contextual, no como sustitución del texto base.
- source_word: ἀσπάσασθε
  english_pob_choice: Greet
  chosen_spanish: Salúdense
  alternatives_spanish:
  - Saluden
  - Exhórtense a saludarse
  lexicon: BDAG
  rationale: El imperativo aoristo medio se refleja como mandato recíproco en español. «Salúdense» conserva la reciprocidad de ἀλλήλους y la naturalidad del saludo comunitario.
- source_word: ἀλλήλους
  english_pob_choice: one another
  chosen_spanish: unos a otros
  alternatives_spanish:
  - unos con otros
  - entre ustedes
  lexicon: BDAG
  rationale: «Unos a otros» es la forma más estable y transparente para el pronombre recíproco en español, sin perder el carácter mutuo del mandato.
- source_word: ἐν φιλήματι ἁγίῳ
  english_pob_choice: with a holy kiss
  chosen_spanish: con un beso santo
  alternatives_spanish:
  - con un beso sagrado
  - con el santo beso
  lexicon: BDAG
  rationale: La preposición ἐν expresa aquí modo o medio. «Con un beso santo» reproduce de forma fiel y comprensible el saludo físico y su cualidad consagrada; «santo» conserva la fuerza moral y comunitaria de ἁγίῳ.
theological_decisions:
- issue: Alcance de ἀδελφοί en una congregación mixta
  english_pob_reading: All the brothers
  chosen_spanish_reading: Todos los hermanos
  alternative_spanish_readings:
  - Todos los hermanos y hermanas
  - Todos los creyentes
  rationale: La lectura principal conserva la forma masculina plural del griego, como hace el POB en inglés, para no neutralizar indebidamente el término. La posible referencia a la comunidad mixta queda disponible como alternativa interpretativa sin imponerla en el texto principal.
  doctrine_reference: DOCTRINE.md Translation philosophy §4
translation_notes:
  revision_awareness: La versión en inglés auditada presenta acuerdo alto y no registra revisiones aplicadas; esta propuesta sigue esa lectura sin introducir cambios textuales o interpretativos adicionales.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención del proyecto solo cuando aparezca el tetragrámaton; aquí no aplica.
  - Se evita «Cristo» porque el pasaje no contiene Χριστός.
  - Se conserva un registro eclesial claro y moderno, evitando arcaísmos innecesarios como «beso santo» convertido en fórmula litúrgica fija.
