review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego y sigue correctamente la lectura de que la falta de voluntad es la de Apolos, no una voluntad divina. Conserva bien «con los hermanos» y «cuando tenga oportunidad». Sin embargo, hay dos ajustes de fidelidad/estilo: (1) «le rogué mucho» suena menos preciso que el valor de πολλὰ παρεκάλεσα, que aquí expresa insistencia fuerte más que súplica; (2) la colocación de la nota [a] separada del nombre es poco natural. Además, «era su voluntad» resulta algo rígido en español; puede conservarse el sustantivo θέλημα con una formulación más idiomática.'
  spanish_quality_summary: El español es claro y digno, pero «le rogué mucho» puede sonar coloquial o implicar súplica excesiva, mientras que «le insistí mucho» o «le insistí bastante» comunica mejor la fuerza contextual. «De ningún modo era su voluntad» es comprensible, pero «de ningún modo era su deseo» o «de ningún modo quiso venir ahora» sería más natural; no obstante, dado que la auditoría inglesa quiso preservar el sustantivo «will», conviene mantener un sustantivo en español con una redacción más fluida. También debe anclarse la nota [a] directamente en «Apolos[a]».
  glossary_alignment: No hay conflictos con la terminología de proyecto. «hermano», «hermanos» y «oportunidad» están bien. No aparecen términos sensibles del glosario mayor. La decisión de «nuestro hermano» con nota alternativa está en línea con la revisión inglesa documentada.
  issues:
  - severity: medium
    issue: «le rogué mucho» no refleja óptimamente πολλὰ παρεκάλεσα
    rationale: παρακαλέω aquí, con πολλὰ, comunica insistencia/apremio fuerte. «Rogar» puede sugerir súplica más emocional que exhortación insistente. «Le insistí mucho» o «le rogué con insistencia» se acercan mejor al matiz.
  - severity: low
    issue: La nota [a] está mal colocada tipográficamente
    rationale: 'El marcador debe ir pegado al término/frase relevante: «Apolos[a]», no «Apolos [a], nuestro hermano».'
  - severity: medium
    issue: «de ningún modo era su voluntad» es algo forzado en español
    rationale: Aunque preserva θέλημα, la frase suena menos natural. «De ningún modo era su deseo venir ahora» mantiene el sustantivo y mejora la legibilidad sin perder la decisión léxica documentada.
  revised_spanish_text: Ahora, acerca de Apolos[a], nuestro hermano, le insistí mucho en que fuera a ustedes con los hermanos; pero de ningún modo era su deseo venir ahora[b]. Sin embargo, vendrá cuando tenga oportunidad.
  revised_footnotes:
