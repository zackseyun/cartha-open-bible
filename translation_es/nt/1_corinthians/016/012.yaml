translation:
  language: es
  text: Ahora, acerca de Apolos[a], nuestro hermano, le insistí mucho en que fuera a ustedes con los hermanos; pero de ningún modo era su deseo venir ahora[b]. Sin embargo, vendrá cuando tenga oportunidad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el hermano». El griego dice literalmente «el hermano» sin un posesivo explícito.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «no estaba de ningún modo dispuesto a venir ahora». El griego dice más literalmente: «no era de ningún modo su voluntad venir ahora».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora, acerca de
  alternatives_spanish:
  - Ahora, respecto de
  - En cuanto a
  lexicon: BDAG
  rationale: La expresión introduce un nuevo asunto en la carta. «Ahora, acerca de» conserva el giro epistolar sin sonar rígido y refleja bien la fuerza discursiva de περὶ δέ.
- source_word: Ἀπολλῶ
  english_pob_choice: Apollos
  chosen_spanish: Apolos
  alternatives_spanish:
  - Apolo
  lexicon: Convención onomástica
  rationale: El nombre propio se translitera de manera estándar al español bíblico como «Apolos», manteniendo la forma reconocible y no confundiendo con otras formas españolas del nombre griego.
- source_word: τοῦ ἀδελφοῦ
  english_pob_choice: the brother / our brother
  chosen_spanish: nuestro hermano
  alternatives_spanish:
  - el hermano
  - el hermano nuestro
  lexicon: BDAG
  rationale: El griego tiene el artículo con ἀδελφός, sin posesivo explícito. Siguiendo el contexto eclesial y la revisión inglesa que adoptó «our brother», «nuestro hermano» suena natural en español y comunica la relación fraterna cristiana sin perder la referencia al sustantivo.
- source_word: πολλὰ παρεκάλεσα
  english_pob_choice: I strongly urged
  chosen_spanish: le rogué mucho
  alternatives_spanish:
  - le rogué con insistencia
  - le insistí mucho
  lexicon: BDAG
  rationale: πολλὰ intensifica παρακαλέω. En español, «le rogué mucho» transmite la insistencia con dignidad y evita un calco torpe como «le exhorté mucho» o «le rogué fuertemente».
- source_word: ἵνα ἔλθῃ πρὸς ὑμᾶς
  english_pob_choice: to come to you
  chosen_spanish: que fuera a ustedes
  alternatives_spanish:
  - que viniera a ustedes
  - que fuera a visitarlos
  lexicon: BDAG
  rationale: La cláusula ἵνα expresa el contenido del ruego. «Que fuera a ustedes» comunica el movimiento hacia los corintios con un español natural; «a visitarlos» añade una matiz no explícita en el texto.
- source_word: μετὰ τῶν ἀδελφῶν
  english_pob_choice: with the brothers
  chosen_spanish: con los hermanos
  alternatives_spanish:
  - con los hermanos y hermanas
  - con los demás hermanos
  lexicon: BDAG
  rationale: ἀδελφῶν está en masculino plural. En este contexto puede referirse a compañeros masculinos de viaje, así que «los hermanos» preserva la forma gramatical y el valor inmediato sin expandirlo a un inclusivo no señalado por el griego.
- source_word: καὶ πάντως οὐκ ἦν θέλημα
  english_pob_choice: but it was not at all his will
  chosen_spanish: pero de ningún modo era su voluntad
  alternatives_spanish:
  - pero no estaba nada dispuesto
  - pero no era su voluntad en absoluto
  lexicon: BDAG
  rationale: El griego habla literalmente de «voluntad» y la negación es enfática. «De ningún modo era su voluntad» preserva tanto la fuerza de πάντως οὐκ como el sustantivo θέλημα, manteniendo la tensión léxica sin convertirla prematuramente en una paráfrasis psicológica.
- source_word: νῦν
  english_pob_choice: now
  chosen_spanish: ahora
  alternatives_spanish:
  - en este momento
  - por ahora
  lexicon: BDAG
  rationale: Adverbio temporal directo; «ahora» es la equivalencia más natural y clara.
- source_word: ἐλεύσεται δὲ
  english_pob_choice: Yet he will come
  chosen_spanish: Sin embargo, vendrá
  alternatives_spanish:
  - Pero vendrá
  - No obstante, vendrá
  lexicon: BDAG
  rationale: δὲ introduce un contraste suave. «Sin embargo» mantiene el giro adversativo y fluido en español.
- source_word: ὅταν εὐκαιρήσῃ
  english_pob_choice: when he has opportunity
  chosen_spanish: cuando tenga oportunidad
  alternatives_spanish:
  - cuando encuentre oportunidad
  - cuando le sea conveniente
  lexicon: BDAG
  rationale: εὐκαιρέω significa tener una ocasión favorable o un tiempo oportuno. «Cuando tenga oportunidad» es conciso y evita la posible lectura moderna de simple conveniencia personal.
theological_decisions:
- issue: Sentido de οὐκ ἦν θέλημα
  english_pob_reading: The clause refers to Apollos's own will/desire, not to an impersonal divine prohibition.
  chosen_spanish_reading: La frase se refiere a la voluntad de Apolos, no a una prohibición divina implícita.
  alternative_spanish_readings:
  - no era la voluntad de Dios que viniera ahora
  - no tenía ninguna gana de venir ahora
  rationale: El referente más inmediato es Apolos, mencionado justo antes y objeto del ruego de Pablo. El contexto no señala un cambio a la voluntad divina; por fidelidad al texto, la traducción no debe introducir una afirmación teológica que el griego no expresa de forma explícita.
  doctrine_reference: 'Principio de transparencia textual: no añadir contenido doctrinal que no esté señalado por el pasaje.'
translation_notes:
  revision_awareness: La base inglesa revisada añadió «our» antes de «brother» para reflejar más naturalmente τοῦ ἀδελφοῦ. En español, «nuestro hermano» recoge esa decisión revisada y mantiene la lectura relacional sin perder la ausencia de un posesivo explícito en el griego.
  spanish_consistency_notes:
  - Se mantiene «Apolos» como transliteración estándar y «hermano» como término eclesial directo.
  - Se conserva la distinción entre voluntad/desear y no se la convierte en una negación meramente emotiva.
  - «Oportunidad» traduce εὐκαιρήσῃ sin cargarlo con el matiz moderno de conveniencia personal.
  - Los marcadores de nota [a] y [b] están anclados en el texto exactamente donde corresponde.
