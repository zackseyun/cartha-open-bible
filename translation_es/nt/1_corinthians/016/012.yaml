  text: Περὶ δὲ Ἀπολλῶ τοῦ ἀδελφοῦ, πολλὰ παρεκάλεσα αὐτὸν ἵνα ἔλθῃ πρὸς ὑμᾶς μετὰ τῶν ἀδελφῶν· καὶ πάντως οὐκ ἦν θέλημα ἵνα νῦν ἔλθῃ, ἐλεύσεται δὲ ὅταν εὐκαιρήσῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/016/012.yaml
  text: Now concerning Apollos our brother[a], I strongly urged him to come to you with the brothers; but it was not at all his will to come now[b]. Yet he will come when he has opportunity.
  footnotes:
  - marker: a
    text: Or, 'our brother.' The Greek reads 'the brother' without an explicit possessive pronoun.
    reason: lexical_alternative
  - marker: b
    text: Or, 'he was not at all willing to come now.' The Greek more literally says, 'it was not at all his will to come now.'
    reason: lexical_alternative
