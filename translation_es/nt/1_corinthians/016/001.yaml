review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: transición epistolar, colecta destinada a los santos, referencia a las iglesias de Galacia, y exhortación paralela. Sin embargo, «lo ordené» intensifica innecesariamente διέταξα frente al matiz mejor equilibrado de ‘dirigí/instruí’, y «así también ustedes hagan» suena poco natural en español.'
  spanish_quality_summary: 'El español es mayormente claro y fiel, pero hay dos mejoras importantes de naturalidad y precisión: cambiar «lo ordené» por «di instrucciones» y reformular la clausula final a «así también hagan ustedes» o equivalente. También conviene evitar la redundancia discursiva de «Ahora, en cuanto a» y preferir «En cuanto a», que suena más natural en español epistolar.'
  glossary_alignment: 'Alinea bien con los términos del proyecto: «colecta», «santos», «iglesias», «Galacia». No hay conflicto con glosario mayor. La nota alternativa «pueblo de Dios» está bien preservada.'
  issues:
  - severity: medium
    issue: «lo ordené» sobretraduce διέταξα
    rationale: Aunque διατάσσω puede implicar autoridad, en este contexto paulino «di instrucciones» o «indiqué» preserva mejor el equilibrio entre autoridad y tono natural, en línea con el audit trail inglés ‘I directed’.
  - severity: medium
    issue: «así también ustedes hagan» es poco idiomático
    rationale: La secuencia comunica el sentido, pero suena forzada en español. «Así también hagan ustedes» conserva el imperativo y la comparación con mejor fluidez.
  - severity: low
    issue: «Ahora, en cuanto a» es algo recargado
    rationale: Περὶ δὲ introduce nuevo tema; en español «En cuanto a» basta y suena más natural sin perder la función discursiva.
  revised_spanish_text: En cuanto a la colecta para los santos[a], como di instrucciones a las iglesias de Galacia, así también hagan ustedes.
  revised_footnotes:
