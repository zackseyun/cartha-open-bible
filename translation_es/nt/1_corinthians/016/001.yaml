revisions:
- from: Ahora, en cuanto a la colecta para los santos[a], como lo ordené a las iglesias de Galacia, así también ustedes hagan.
  to: En cuanto a la colecta para los santos[a], como di instrucciones a las iglesias de Galacia, así también hagan ustedes.
  rationale: Se ajusta el tono de διέταξα a un español más fiel al equilibrio del original y del audit trail inglés («di instrucciones» en lugar de «lo ordené»), se mejora la naturalidad de la exhortación final («así también hagan ustedes»), y se simplifica la transición epistolar a un giro español más fluido sin pérdida de sentido.
