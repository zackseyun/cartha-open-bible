translation:
  language: es
  text: En cuanto a la colecta para los santos[a], como di instrucciones a las iglesias de Galacia, así también hagan ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «En cuanto a la colecta para el pueblo de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: Περὶ δὲ
  english_pob_choice: Now concerning
  chosen_spanish: Ahora, en cuanto a
  alternatives_spanish:
  - Ahora sobre
  - En cuanto a
  lexicon: BDAG
  rationale: La frase introduce un nuevo asunto en la carta. «Ahora, en cuanto a» conserva el giro epistolar y la fuerza discursiva de περὶ δέ sin sonar artificial en español.
- source_word: τῆς λογείας
  english_pob_choice: collection
  chosen_spanish: la colecta
  alternatives_spanish:
  - la colección
  - la contribución
  - la ofrenda
  lexicon: BDAG
  rationale: λογεία designa una recolección de dinero. «Colecta» expresa bien esa acción en español y evita cargar el término con un matiz cultual que el griego no exige aquí.
- source_word: τῆς εἰς τοὺς ἁγίους
  english_pob_choice: for the saints
  chosen_spanish: para los santos
  alternatives_spanish:
  - para los santos de Dios
  - para los creyentes
  - para los santos de la iglesia
  lexicon: BDAG
  rationale: La preposición indica destino o beneficiarios. «Santos» mantiene el valor paulino de ἅγιοι y evita sustituirlo por una paráfrasis más explicativa que el texto no requiere.
- source_word: διέταξα
  english_pob_choice: I directed
  chosen_spanish: lo ordené
  alternatives_spanish:
  - lo dirigí
  - lo instruí
  - lo indiqué
  lexicon: BDAG
  rationale: διατάσσω puede abarcar la idea de dar instrucciones con autoridad. «Lo ordené» conserva mejor la fuerza directiva del aoristo que una forma más débil, aunque en español puede sonar más fuerte que el inglés; aquí se justifica por la autoridad apostólica del contexto.
- source_word: ἐκκλησίαις
  english_pob_choice: churches
  chosen_spanish: iglesias
  alternatives_spanish:
  - congregaciones
  - asambleas
  lexicon: BDAG
  rationale: En Pablo, ἐκκλησία se refiere a comunidades cristianas. «Iglesias» es el equivalente habitual y claro en español.
- source_word: Γαλατίας
  english_pob_choice: Galatia
  chosen_spanish: Galacia
  alternatives_spanish:
  - la región de Galacia
  lexicon: BDAG
  rationale: Nombre geográfico estándar, transliterado al español como «Galacia».
- source_word: οὕτως καὶ ὑμεῖς ποιήσατε
  english_pob_choice: so you also are to do
  chosen_spanish: así también ustedes hagan
  alternatives_spanish:
  - así también ustedes deben hacer
  - háganlo ustedes también
  lexicon: BDAG
  rationale: El imperativo aoristo pide una acción correspondiente. «Así también ustedes hagan» conserva la exhortación directa y la relación comparativa de οὕτως καί sin añadir palabras innecesarias.
theological_decisions:
- issue: ἁγίοις en contexto de ayuda económica
  english_pob_reading: saints
  chosen_spanish_reading: santos
  alternative_spanish_readings:
  - santos de Dios
  - creyentes
  - pueblo de Dios
  rationale: Se preserva el término paulino tradicional sin introducir una glosa interpretativa. En español, «santos» mantiene la continuidad léxica y teológica con el uso de Pablo y no sugiere canonización posterior.
  doctrine_reference: Translation philosophy §5 (consistency of key terms)
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés están en alto acuerdo y no muestran revisiones sustantivas. Esta versión sigue de cerca las decisiones inglesas, pero ajusta la expresión al español natural, preservando la distinción entre una colecta monetaria y un término cultual más cargado. La nota alternativa mantiene la ambigüedad léxica documentada para ἅγιοι.
  spanish_consistency_notes:
  - Se usa «santos» para ἅγιοι de manera consistente con el registro paulino.
  - Se usa «colecta» para λογεία para evitar confundir el pasaje con una ofrenda litúrgica.
  - Se mantiene «Galacia» como topónimo estándar en español.
  - La puntuación y el orden reflejan un español natural sin perder la estructura del original.
