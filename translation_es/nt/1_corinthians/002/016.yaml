translation:
  language: es
  text: Porque ¿quién ha conocido la mente de Yahvé[a], para instruirle? Pero nosotros tenemos la mente del Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Pablo hace eco de Isaías 40:13, donde el «Señor» de la cita remite a Yahvé.
    reason: cross_reference
lexical_decisions:
- source_word: τίς
  english_pob_choice: who
  chosen_spanish: ¿quién
  alternatives_spanish:
  - ¿quién es el que
  lexicon: BDAG
  rationale: La pregunta retórica se expresa con la forma natural y directa del español; conserva el carácter universal de la pregunta.
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa con lo anterior sin perder fluidez en español.
- source_word: ἔγνω
  english_pob_choice: has known
  chosen_spanish: ha conocido
  alternatives_spanish:
  - conoció
  - llegó a conocer
  lexicon: BDAG
  rationale: El perfecto compuesto conserva la fuerza de relevancia actual del enunciado retórico, como en la decisión inglesa auditada.
- source_word: νοῦν
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: BDAG
  rationale: '"Mente" comunica con claridad el campo semántico de νοῦς aquí, abarcando intelecto y disposición interior sin sonar artificial.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Yahvé
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: En esta cita alude a la cita de Isaías 40:13 y, por tanto, al nombre divino; se sigue el convenio del proyecto de traducir יהוה / YHWH como "Yahvé" en el texto principal.
- source_word: ὃς συμβιβάσει αὐτόν
  english_pob_choice: that he may instruct him
  chosen_spanish: para instruirle
  alternatives_spanish:
  - que le instruya
  - para enseñarle
  lexicon: BDAG
  rationale: El relativo con valor de resultado/aptitud se naturaliza en español con "para" + infinitivo, sin perder la idea de instrucción o dirección.
- source_word: ἡμεῖς δὲ
  english_pob_choice: But we
  chosen_spanish: Pero nosotros
  alternatives_spanish:
  - Y nosotros
  - Mas nosotros
  lexicon: BDAG
  rationale: Marca el contraste fuerte entre la imposibilidad humana y la afirmación apostólica; "Pero" es claro y digno en español actual.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el valor titular de Χριστός como "Mesías" según el criterio del proyecto, ya que aquí funciona como título y no como mero nombre propio.
- source_word: ἔχομεν
  english_pob_choice: have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: El presente simple mantiene la afirmación directa y declarativa de Pablo; "tenemos" es más natural que una versión más marcada como "poseemos".
theological_decisions:
- issue: Referencia al Señor de la cita y el trasfondo de Isaías 40:13
  english_pob_reading: Paul echoes Isaiah 40:13.
  chosen_spanish_reading: Pablo ecoa Isaías 40:13, donde el referente es Yahvé.
  alternative_spanish_readings:
  - Pablo alude a Isaías 40:13
  - Pablo cita Isaías 40:13
  rationale: Como el contexto es una cita/eco de Isaías, "Señor" puede ocultar el nombre divino; en español se explicita "Yahvé" para preservar la transparencia del texto base y la continuidad intertextual.
  doctrine_reference: 'Convención del proyecto: יהוה / YHWH → Yahvé; citas del AT con κύριος que remiten al nombre divino deben aclararse en notas si es necesario.'
- issue: Renderización de Χριστοῦ en νοῦν Χριστοῦ
  english_pob_reading: the mind of Messiah
  chosen_spanish_reading: la mente del Mesías
  alternative_spanish_readings:
  - la mente de Cristo
  rationale: Se mantiene la distinción titular señalada en el marco del proyecto; en este contexto el genitivo expresa pertenencia/relación con el Mesías, no solo un nombre litúrgico fijo.
  doctrine_reference: 'Contested terms table: Χριστός → Mesías cuando el título está activo'
translation_notes:
  revision_awareness: El dossier inglés pasó por una revisión que osciló entre "Messiah" y "Christ" para Χριστοῦ; se restauró "Messiah" por política doctrinal del proyecto. La versión española sigue esa decisión con "Mesías". También se mantuvo el valor resultativo de συμβιβάσει mediante una estructura final natural en español.
  spanish_consistency_notes:
  - Se usa "Yahvé" en lugar de "Señor" para el referente divino del eco de Isaías, conforme al estándar del proyecto.
  - Se usa "Mesías" para Χριστοῦ, consistente con el criterio titular del paquete auditado.
  - '"Mente" se conserva para νοῦς por su amplitud cognitiva y por paralelismo con el texto fuente.'
  - La construcción "para instruirle" preserva el matiz de dirección/instrucción sin forzar una paráfrasis más extensa.
