translation:
  language: es
  text: Y yo[a], cuando vine a ustedes, hermanos, no vine con elocuencia o sabiduría, proclamándoles el testimonio de Dios[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» puede referirse a los creyentes en general, incluidas las mujeres de la congregación.
    reason: cultural_note
  - marker: b
    text: Algunos manuscritos leen «misterio de Dios».
    reason: textual_variant
lexical_decisions:
- source_word: Κἀγὼ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  - Y en cuanto a mí
  lexicon: κἀγώ
  rationale: Conserva la fuerza conectiva de καί y el sujeto enfático de primera persona sin sobrerrecalcar la expresión en español.
- source_word: ἐλθὼν … ἦλθον
  english_pob_choice: when I came … did not come
  chosen_spanish: cuando fui … no fui
  alternatives_spanish:
  - habiendo venido … no vine
  - cuando vine … no vine
  lexicon: ἔρχομαι
  rationale: El participio aoristo seguido del verbo principal se expresa naturalmente en español con una cláusula temporal y la repetición verbal; 'fui' mantiene el movimiento de llegada sin sonar forzado.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos/as
  lexicon: ἀδελφός
  rationale: Preserva la forma masculina vocativa del original y el uso eclesial amplio; la posible inclusión de mujeres queda indicada en nota.
- source_word: καθ’ ὑπεροχὴν λόγου ἢ σοφίας
  english_pob_choice: with lofty speech or wisdom
  chosen_spanish: con excelencia de palabra o de sabiduría
  alternatives_spanish:
  - con superioridad de palabra o de sabiduría
  - con elocuencia o sabiduría sobresaliente
  lexicon: ὑπεροχή / λόγος / σοφία
  rationale: '''Excelencia'' comunica la idea de altura o sobresaliencia del griego sin reducirla solo a estilo retórico; ''palabra'' reproduce λόγος con suficiente amplitud y deja abierta la referencia a discurso/expresión.'
- source_word: καταγγέλλων
  english_pob_choice: proclaiming
  chosen_spanish: proclamándoles
  alternatives_spanish:
  - anunciándoles
  - declarándoles
  lexicon: καταγγέλλω
  rationale: Mantiene el matiz público y declarativo del participio, y el dativo ὑμῖν se expresa naturalmente con el pronombre enclítico 'les'.
- source_word: μαρτύριον
  english_pob_choice: the testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio solemne
  - el testimonio dado
  lexicon: μαρτύριον
  rationale: Sigue la lectura base del SBLGNT y conserva el sustantivo formal de valor teológico/testimonial sin sustituirlo por una paráfrasis.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - acerca de Dios
  lexicon: θεός
  rationale: La construcción posesiva/genitiva queda abierta en español como en el original; 'de Dios' no fuerza una relación interpretativa específica.
theological_decisions:
- issue: Lectura textual variante en μαρτύριον / μυστήριον
  english_pob_reading: the testimony of God
  chosen_spanish_reading: el testimonio de Dios
  alternative_spanish_readings:
  - el misterio de Dios
  rationale: La base SBLGNT sigue μαρτύριον, por lo que la traducción principal debe reflejar 'testimonio'. La variante μυστήριον se preserva en nota para no borrar la tensión textual documentada.
  doctrine_reference: Crítica textual del Nuevo Testamento; variante conocida en 1 Co 2:1
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la revisión final del contexto inglés: mantiene ''proclamando'' como participio, conserva ''testimonio de Dios'' como lectura base y añade la nota de variante textual para μαρτύριον/μυστήριον. También evita una traducción demasiado literal de ''lofty speech'' optando por ''excelencia de palabra'', más natural en español y fiel al contraste retórico de Pablo.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός conforme al estándar del proyecto.
  - Se usa 'hermanos' en el texto principal y se explicita su posible alcance inclusivo en nota.
  - '''Palabra'' se eligió para λόγος por su amplitud semántica en contexto retórico.'
  - '''Testimonio'' conserva la terminología formal y evita resolver interpretativamente la relación del genitivo ''de Dios''.'
