translation:
  language: es
  text: Pero la persona natural no acepta las cosas del Espíritu de Dios[a], porque para él son locura, y no puede conocerlas, porque se disciernen espiritualmente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la persona no espiritual».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ψυχικὸς
  english_pob_choice: natural
  chosen_spanish: natural
  alternatives_spanish:
  - no espiritual
  - de naturaleza meramente humana
  - anímico
  lexicon: BDAG
  rationale: En este contexto ψυχικός contrasta con πνευματικός. “Natural” comunica en español la condición humana ordinaria, limitada a lo meramente humano, sin explicitar más de lo que el término griego exige.
- source_word: ἄνθρωπος
  english_pob_choice: person
  chosen_spanish: persona
  alternatives_spanish:
  - hombre
  - ser humano
  lexicon: BDAG
  rationale: Aunque el sustantivo griego es masculino singular, funciona de manera representativa y no necesariamente masculina en sentido exclusivo. “Persona” conserva el valor genérico en español.
- source_word: δέχεται
  english_pob_choice: accept
  chosen_spanish: acepta
  alternatives_spanish:
  - recibe
  - acoge
  lexicon: BDAG
  rationale: “Aceptar” expresa no solo recibir, sino admitir como válido, lo cual corresponde al rechazo implícito del verso.
- source_word: τὰ τοῦ πνεύματος τοῦ θεοῦ
  english_pob_choice: the things of the Spirit of God
  chosen_spanish: las cosas del Espíritu de Dios
  alternatives_spanish:
  - las cosas que pertenecen al Espíritu de Dios
  - las realidades del Espíritu de Dios
  lexicon: BDAG
  rationale: La construcción griega es amplia. “Las cosas del Espíritu de Dios” preserva esa amplitud sin estrecharla indebidamente.
- source_word: μωρία
  english_pob_choice: foolishness
  chosen_spanish: locura
  alternatives_spanish:
  - necedad
  - tontería
  lexicon: BDAG
  rationale: En 1 Corintios, μωρία forma parte del contraste paulino entre la sabiduría humana y la sabiduría de Dios. “Locura” reproduce con fuerza ese juicio despectivo, aunque “necedad” también sería posible.
- source_word: γνῶναι
  english_pob_choice: know
  chosen_spanish: conocer
  alternatives_spanish:
  - saber
  - entender
  - reconocer
  lexicon: BDAG
  rationale: El infinitivo apunta al acto de llegar a conocer o captar estas realidades. “Conocer” es la forma más directa y mantiene mejor la decisión revisada del POB inglés que “entender”.
- source_word: πνευματικῶς
  english_pob_choice: spiritually
  chosen_spanish: espiritualmente
  alternatives_spanish:
  - por el Espíritu
  - de manera espiritual
  lexicon: BDAG
  rationale: El adverbio indica el modo de discernimiento. “Espiritualmente” es el equivalente natural y directo en español.
- source_word: ἀνακρίνεται
  english_pob_choice: are discerned
  chosen_spanish: se disciernen
  alternatives_spanish:
  - se examinan
  - se evalúan
  - son examinadas
  lexicon: BDAG
  rationale: ἀνακρίνω puede significar examinar, evaluar o discernir. Aquí “se disciernen” conserva la idea de que estas realidades solo se captan correctamente en el ámbito del Espíritu.
theological_decisions:
- issue: Renderizar ψυχικὸς ἄνθρωπος en contraste con discernimiento espiritual
  english_pob_reading: the natural person
  chosen_spanish_reading: la persona natural
  alternative_spanish_readings:
  - la persona no espiritual
  - la persona sin el Espíritu
  rationale: La frase mantiene la tensión teológica entre una condición meramente natural y la necesidad del Espíritu para percibir las realidades divinas. “Persona natural” evita resolver el contraste con una explicación más amplia de la que el griego da.
  doctrine_reference: Preservar la tensión teológica sin sobreexplicarla; preferir una formulación genérica adecuada al sentido representativo.
translation_notes:
  revision_awareness: La versión inglesa revisada cambió “understand them” por “know them” para reflejar más directamente γνῶναι; por eso se eligió “conocer” y no “entender”. También se mantuvo el contraste básico de ψυχικός con πνευματικός sin sustituirlo por una explicación doctrinal más amplia.
  spanish_consistency_notes:
  - Se emplea “Dios” para θεοῦ y no un recurso litúrgico de sustitución del nombre divino, porque el texto griego aquí no usa el tetragrámaton ni una cita explícita de יהוה.
  - Se traduce πνεῦμα como “Espíritu” con mayúscula en la expresión “Espíritu de Dios”, por referirse al Espíritu divino.
  - Se conserva el tono sobrio y argumentativo de 1 Corintios, evitando un estilo devocional añadido.
