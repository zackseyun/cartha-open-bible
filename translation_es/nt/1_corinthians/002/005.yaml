translation:
  language: es
  text: para que vuestra fe no esté en la sabiduría de los hombres[a], sino en el poder de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sabiduría humana». «Hombres» aquí significa seres humanos en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce aquí una cláusula de propósito; en español, «para que» expresa con naturalidad esa finalidad sin perder la fuerza teleológica del griego.
- source_word: πίστις
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: El contexto apunta a la respuesta creyente de los corintios, no a la fidelidad de Cristo. «Fe» es el equivalente español directo y natural para πίστις aquí.
- source_word: μὴ ᾖ
  english_pob_choice: might not be
  chosen_spanish: no esté
  alternatives_spanish:
  - no sea
  - no llegue a estar
  lexicon: BDAG
  rationale: El subjuntivo con ἵνα expresa propósito; en español, «no esté» comunica adecuadamente ese estado/situación sin sonar forzado.
- source_word: ἐν σοφίᾳ ἀνθρώπων
  english_pob_choice: in the wisdom of men
  chosen_spanish: en la sabiduría de los hombres[a]
  alternatives_spanish:
  - en la sabiduría humana
  - en la sabiduría de la gente
  lexicon: BDAG
  rationale: Se conserva el contraste literal entre «sabiduría» y el ámbito humano. «Hombres» refleja la lectura auditada del inglés POB; la nota aclara que el sentido es genérico para seres humanos.
- source_word: δυνάμει θεοῦ
  english_pob_choice: in the power of God
  chosen_spanish: en el poder de Dios
  alternatives_spanish:
  - en la fuerza de Dios
  lexicon: BDAG
  rationale: «Poder» es la equivalencia más natural y fiel para δύναμις en este contraste retórico con la sabiduría humana.
theological_decisions:
- issue: Renderizado de ἀνθρώπων con forma masculina en la frase contrastiva
  english_pob_reading: The English POB keeps 'men' in the main text and clarifies in a footnote that it means human beings generally.
  chosen_spanish_reading: «los hombres» en el texto principal, con nota que explicita el sentido genérico humano.
  alternative_spanish_readings:
  - la sabiduría humana
  - la sabiduría de la gente
  - la sabiduría de los seres humanos
  rationale: El griego usa ἀνθρώπων de manera genérica; mantener una forma representativa en el texto principal preserva el paralelismo y la tensión lexical documentada, mientras la nota evita una lectura exclusivamente masculina.
  doctrine_reference: Translation philosophy §4
- issue: Alcance de la expresión de propósito con ἵνα
  english_pob_reading: '''so that'' introduces the purpose clause.'
  chosen_spanish_reading: «para que» como cláusula de propósito.
  alternative_spanish_readings:
  - a fin de que
  - de modo que
  rationale: La cláusula final de Pablo queda clara en español con «para que», que además mantiene el tono directo y relacional del argumento.
  doctrine_reference: Syntactic purpose clause / ἵνα in Pauline discourse
translation_notes:
  revision_awareness: No se reportan revisiones aplicadas en el expediente; la concordancia de revisión indica alta armonía y sin cambios necesarios. La propuesta española sigue de cerca la lectura auditada del inglés POB y la tensión léxica entre una forma representativa («hombres») y su sentido genérico.
  spanish_consistency_notes:
  - Se mantiene «Dios» y no se introduce «Señor», conforme al texto griego θεοῦ.
  - Se usa «fe» para πίστις, coherente con el valor doctrinal y contextual del pasaje.
  - Se conserva la oposición retórica entre sabiduría humana y poder divino sin ampliar el sentido más allá del griego.
