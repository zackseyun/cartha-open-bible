translation:
  language: es
  text: Y yo estuve con ustedes en debilidad[a], en temor y en gran temblor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «vine a ustedes en debilidad, en temor y en gran temblor».'
    reason: alternative_reading
lexical_decisions:
- source_word: κἀγώ
  english_pob_choice: And I
  chosen_spanish: Y yo
  alternatives_spanish:
  - Y yo mismo
  lexicon: BDAG
  rationale: La conjunción inicial conserva el enlace con lo anterior, y el pronombre explícito mantiene la auto-referencia paulina sin añadir énfasis indebido.
- source_word: ἐν ἀσθενείᾳ
  english_pob_choice: in weakness
  chosen_spanish: en debilidad
  alternatives_spanish:
  - en flaqueza
  - en fragilidad
  lexicon: BDAG
  rationale: ἀσθένεια puede expresar debilidad o fragilidad. 'Debilidad' es claro y natural en español, y preserva la amplitud semántica del término.
- source_word: ἐν φόβῳ
  english_pob_choice: in fear
  chosen_spanish: en temor
  alternatives_spanish:
  - con temor
  - en miedo
  lexicon: BDAG
  rationale: '''Temor'' comunica bien el estado descrito por la frase preposicional sin reducirlo a pánico ni suavizarlo hacia mera reverencia.'
- source_word: ἐν τρόμῳ πολλῷ
  english_pob_choice: in great trembling
  chosen_spanish: en gran temblor
  alternatives_spanish:
  - con mucho temblor
  - en mucho temblor
  lexicon: BDAG
  rationale: τρόμος es 'temblor' y πολλῷ intensifica la expresión. 'Gran temblor' conserva la fuerza del intensificador en un español idiomático.
- source_word: ἐγενόμην πρὸς ὑμᾶς
  english_pob_choice: I was with you
  chosen_spanish: estuve con ustedes
  alternatives_spanish:
  - vine a ustedes
  - estuve entre ustedes
  lexicon: BDAG
  rationale: La lectura contextual de la POB inglesa entiende la frase como la condición de Pablo entre los corintios. 'Estuve con ustedes' comunica esa presencia relacional en español actual; la alternativa de llegada se refleja en la nota.
translation_notes:
  revision_awareness: El texto griego presenta ἐγενόμην πρὸς ὑμᾶς, que puede entenderse de manera contextual como presencia entre los destinatarios o como movimiento hacia ellos. La POB inglesa opta por la primera lectura en el cuerpo del texto y conserva la alternativa de llegada en una nota; esta versión española sigue ese mismo criterio.
  spanish_consistency_notes:
  - Se mantiene 'ustedes' para concordar con el español neutro latinoamericano.
  - '''Debilidad'', ''temor'' y ''temblor'' conservan el paralelismo de las tres frases preposicionales del griego.'
  - No se traduce ἐν como 'con' en el cuerpo del texto, para mantener la estructura más cercana al original y alineada con la decisión inglesa de 'in'.
