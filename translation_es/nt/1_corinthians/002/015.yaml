translation:
  language: es
  text: Pero la persona espiritual[a] discierne todas las cosas, pero ella misma no es evaluada por nadie.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «La persona espiritual» traduce un adjetivo masculino singular usado como sustantivo, con referencia genérica a una persona caracterizada por el Espíritu.
    reason: cultural_note
lexical_decisions:
- source_word: πνευματικὸς
  english_pob_choice: spiritual person
  chosen_spanish: el espiritual
  alternatives_spanish:
  - la persona espiritual
  - el hombre espiritual
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivado en griego. En español, «el espiritual» conserva la concisión del original y el sentido genérico de una persona caracterizada por el Espíritu, sin limitarlo a un varón.
- source_word: ἀνακρίνει
  english_pob_choice: evaluates
  chosen_spanish: discierne
  alternatives_spanish:
  - evalúa
  - examina
  - juzga
  lexicon: BDAG
  rationale: En este contexto el verbo expresa un discernimiento o valoración cuidadosa más que una sentencia condenatoria. «Discierne» comunica bien esa función y se usa de manera natural en español cristiano sin volverlo más fuerte que el griego.
- source_word: τὰ πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: BDAG
  rationale: La expresión es amplia y debe mantenerse amplia. «Todas las cosas» preserva la totalidad del alcance con una formulación transparente en español.
- source_word: αὐτὸς
  english_pob_choice: he himself
  chosen_spanish: él mismo
  alternatives_spanish:
  - ese mismo
  - él
  lexicon: BDAG
  rationale: El pronombre es enfático; «él mismo» conserva ese énfasis y mantiene la referencia personal genérica del sustantivo implícito.
- source_word: ὑπ’ οὐδενὸς
  english_pob_choice: by no one
  chosen_spanish: por nadie
  alternatives_spanish:
  - por ningún hombre
  - por ninguna persona
  lexicon: BDAG
  rationale: La construcción negativa absoluta se expresa de forma natural como «por nadie», preservando el alcance total de la negación.
- source_word: ἀνακρίνεται
  english_pob_choice: is evaluated
  chosen_spanish: es discernido
  alternatives_spanish:
  - es evaluado
  - es examinado
  - es juzgado
  lexicon: BDAG
  rationale: Mantener la misma raíz semántica en ambas ocurrencias ayuda a reflejar la repetición del verbo griego. «Es discernido» suena natural en español y respeta el sentido de ser objeto de examen o valoración, no de condena.
theological_decisions:
- issue: Alcance de «todas las cosas» y de la negación final
  english_pob_reading: Retain the unqualified wording “all things” and “by no one” without softening the statement.
  chosen_spanish_reading: Conservar «todas las cosas» y «por nadie» sin limitar explícitamente el alcance en el texto principal.
  alternative_spanish_readings:
  - Limitar a «las cosas espirituales» en el texto principal
  - Suavizar a «por los demás»
  rationale: El versículo presenta la afirmación de forma absoluta, y el contexto inmediato provee el marco interpretativo. Limitarla en el texto principal resolvería la tensión más allá de lo que dice el griego.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requirieron cambios; esta propuesta sigue la lectura consolidada del archivo auditado en inglés y mantiene la tensión lexical de ἀνακρίνω sin ampliarla ni suavizarla.
  spanish_consistency_notes:
  - Se mantiene «discierne» / «es discernido» para reflejar la repetición de ἀνακρίνω en ambas cláusulas.
  - Se evita «SEÑOR» u otra terminología no pertinente; no hay nombres divinos en este versículo.
  - La nota al pie marca el uso sustantivado de «el espiritual» para evitar una lectura exclusivamente masculina.
