translation:
  language: es
  text: Pero nosotros no hemos recibido el espíritu del mundo, sino el Espíritu que viene de Dios, para que sepamos[a] las cosas que Dios nos ha concedido por gracia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para que entendamos».
    reason: lexical_alternative
  - marker: b
    text: O «nos ha dado gratuitamente» o «nos ha dado como regalo».
    reason: lexical_alternative
lexical_decisions:
- source_word: πνεῦμα τοῦ κόσμου
  english_pob_choice: the spirit of the world
  chosen_spanish: el espíritu del mundo
  alternatives_spanish:
  - el espíritu del mundo presente
  - el espíritu del sistema del mundo
  lexicon: BDAG
  rationale: 'Conservo el contraste directo entre el principio animador del mundo y el Espíritu de Dios. En español, «espíritu del mundo» es natural y mantiene la fuerza del genitivo sin ampliar indebidamente a «sistema». '
- source_word: πνεῦμα τὸ ἐκ τοῦ θεοῦ
  english_pob_choice: the Spirit from God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  - el Espíritu que procede de Dios
  lexicon: BDAG
  rationale: El contexto contrasta este «espíritu» con el del mundo y, siguiendo la lectura auditada del POB en inglés, se entiende como el Espíritu Santo. Por eso capitalizo «Espíritu» y uso «de Dios» para expresar el origen con naturalidad en español.
- source_word: ἐλάβομεν
  english_pob_choice: have received
  chosen_spanish: hemos recibido
  alternatives_spanish:
  - recibimos
  - recibido
  lexicon: BDAG
  rationale: El perfecto compuesto expresa bien una acción pasada con relevancia presente en el argumento de Pablo. «Hemos recibido» suena natural y conserva ese valor aspectual mejor que un pasado simple.
- source_word: ἵνα εἰδῶμεν
  english_pob_choice: so that we may know
  chosen_spanish: para que conozcamos
  alternatives_spanish:
  - para que sepamos
  - a fin de que entendamos
  lexicon: BDAG
  rationale: «Conozcamos» reproduce el propósito explícito del griego y mantiene el sentido cognitivo de οἶδα sin forzar una paráfrasis. «Entendamos» quedaría como alternativa interpretativa, no como principal.
- source_word: χαρισθέντα
  english_pob_choice: graciously given
  chosen_spanish: dado gratuitamente
  alternatives_spanish:
  - concedido gratuitamente
  - dado como regalo
  lexicon: BDAG
  rationale: El participio pasivo de χαρίζομαι incluye la idea de dar por gracia o como don. «Dado gratuitamente» preserva esa gratuidad y evita empobrecer el matiz teológico a un simple «dado».
- source_word: τὰ ... χαρισθέντα ἡμῖν
  english_pob_choice: the things graciously given to us
  chosen_spanish: las cosas ... que Dios nos ha dado gratuitamente
  alternatives_spanish:
  - las cosas concedidas gratuitamente a nosotros
  - los dones que Dios nos ha dado
  lexicon: BDAG
  rationale: El neutro plural es amplio; «las cosas» conserva ese alcance sin restringirlo a dones espirituales específicos. Añadir «que Dios» explicita el agente ya presente en la frase griega y mantiene el flujo natural del español.
theological_decisions:
- issue: Identificación del Espíritu en contraste con el espíritu del mundo
  english_pob_reading: Render as "the Spirit from God" with capitalization
  chosen_spanish_reading: «el Espíritu de Dios» con mayúscula
  alternative_spanish_readings:
  - «el espíritu de Dios» con minúscula
  - «el Espíritu que viene de Dios»
  rationale: La oposición con «el espíritu del mundo» favorece leer aquí al Espíritu Santo. La mayúscula en español comunica esa identificación sin perder la cercanía al texto griego ni introducir una glosa excesiva.
  doctrine_reference: Neumología paulina / Espíritu Santo en contraste con el mundo (1 Co 2:12)
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el texto griego y el audit trail inglés: conserva el contraste entre «espíritu del mundo» y «Espíritu de Dios», mantiene el propósito de ἵνα con «para que», y traduce χαρισθέντα con un matiz de gracia/gratuidad. No se requieren revisiones adicionales respecto del pasaje base.'
  spanish_consistency_notes:
  - Usé «Dios» y no una perífrasis, conforme al estándar del proyecto.
  - Mantuve «Espíritu» con mayúscula solo en la referencia divina, para reflejar la decisión teológica auditada.
  - Elegí «hemos recibido» por claridad temporal y concordancia con el registro bíblico en español.
  - «Dado gratuitamente» preserva la fuerza de χαρίζομαι sin introducir una terminología eclesiástica no presente en el griego.
