revisions:
- from: Pero nosotros no hemos recibido el espíritu del mundo[a], sino el Espíritu de Dios[b], para que conozcamos las cosas que Dios nos ha dado gratuitamente.
  to: Pero nosotros no hemos recibido el espíritu del mundo, sino el Espíritu que viene de Dios, para que sepamos[a] las cosas que Dios nos ha concedido por gracia[b].
  rationale: 'Se ajusta «el Espíritu que viene de Dios» para preservar el valor de ἐκ («from God») sin perder naturalidad en español. Se reubican y corrigen las notas al pie para reflejar las alternativas léxicas auditadas del inglés: εἰδῶμεν = «entendamos» y χαρισθέντα = «dado gratuitamente / como regalo». Además, «nos ha concedido por gracia» comunica mejor el matiz teológico de χαρίζομαι que el simple «ha dado gratuitamente».'
