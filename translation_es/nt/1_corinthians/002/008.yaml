review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: relativo femenino referido a la sabiduría, negación universal, referencia neutral a «los gobernantes de esta era», condición contrafactual y «el Señor de gloria». Sin embargo, «esta era» suena menos natural en español bíblico general que «este siglo», y el pie de nota tiene un desajuste de concordancia verbal con el sujeto compuesto alternativo («autoridades humanas, poderes espirituales o ambos»), por lo que conviene una reparación menor.'
  spanish_quality_summary: El texto es claro y digno, pero «la cual» al inicio resulta algo rígido y «esta era» suena más calcado que idiomático en español eclesial amplio. «Que» y «este siglo» mejoran la fluidez sin perder precisión semántica. La puntuación con punto y coma es aceptable; la oración fluye mejor con coma antes de «porque».
  glossary_alignment: 'No hay conflictos con la terminología base del proyecto: κύριος se mantiene como «Señor», δόξα como «gloria», y la ambigüedad de ἀρχόντων se preserva. La elección de «gobernantes» es defendible, aunque «los gobernantes de este siglo» suena más natural que «de esta era».'
  issues:
  - severity: medium
    issue: «esta era» suena poco idiomático en este contexto
    rationale: Aunque αἰών significa «age», en español bíblico y religioso «este siglo» comunica mejor el orden temporal presente sin sonar calco del inglés.
  - severity: low
    issue: «la cual» al inicio es algo rígido
    rationale: «Que» conserva la referencia y produce una lectura más natural en español continuo, especialmente al enlazar con el versículo anterior.
  - severity: low
    issue: La nota al pie usa «puede referirse» con una lista mixta
    rationale: Con «autoridades humanas, poderes espirituales o ambos», la formulación más natural es «puede referirse tanto a ... como a ... o a ambos», evitando una leve aspereza sintáctica.
  revised_spanish_text: que ninguno de los gobernantes de este siglo[a] ha conocido; porque, si la hubieran conocido, no habrían crucificado al Señor de gloria.
  revised_footnotes:
