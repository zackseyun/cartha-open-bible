translation:
  language: es
  text: que ninguno de los gobernantes de este siglo[a] ha conocido; porque, si la hubieran conocido, no habrían crucificado al Señor de gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Los gobernantes de este siglo» puede referirse tanto a autoridades humanas como a poderes espirituales, o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: ἣν
  english_pob_choice: which
  chosen_spanish: la cual
  alternatives_spanish:
  - que
  lexicon: pronombre relativo
  rationale: El antecedente es femenino singular y remite a la sabiduría mencionada antes; «la cual» preserva la referencia con claridad y un tono más formal.
- source_word: ἀρχόντων
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - rulers
  - dirigentes
  - autoridades
  lexicon: BDAG
  rationale: «Gobernantes» comunica bien ἄρχοντες en español y mantiene la amplitud semántica sin estrecharlo a un solo ámbito institucional.
- source_word: αἰῶνος τούτου
  english_pob_choice: this age
  chosen_spanish: esta era
  alternatives_spanish:
  - este siglo
  - este mundo
  lexicon: BDAG
  rationale: «αἰών» se refiere más propiamente a una era/orden temporal que a un mundo físico; «esta era» conserva ese matiz.
- source_word: ἔγνωκεν / ἔγνωσαν
  english_pob_choice: has known / had known
  chosen_spanish: ha conocido / la hubieran conocido
  alternatives_spanish:
  - ha comprendido / la hubieran comprendido
  - ha sabido / la hubieran sabido
  lexicon: BDAG
  rationale: El verbo γινώσκω aquí implica más que mera información; puede incluir reconocimiento/entendimiento de su significado. En español, «conocer» mantiene esa amplitud sin forzar una sola explicación.
- source_word: κύριον
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Señor soberano
  - Dueño
  lexicon: BDAG
  rationale: Se sigue el valor titular de κύριος con «Señor», el equivalente natural y teológicamente cargado en español.
- source_word: δόξης
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  lexicon: BDAG
  rationale: «Gloria» es la correspondencia estándar y conserva el peso bíblico del genitivo.
- source_word: κύριον τῆς δόξης
  english_pob_choice: the Lord of glory
  chosen_spanish: el Señor de gloria
  alternatives_spanish:
  - el Señor glorioso
  lexicon: BDAG
  rationale: Se preserva la construcción genitiva casi literalmente para retener la fuerza elevada del original y la relación sintáctica entre «Señor» y «gloria».
- source_word: ἐσταύρωσαν
  english_pob_choice: crucified
  chosen_spanish: crucificado
  alternatives_spanish:
  - ejecutado en una cruz
  lexicon: BDAG
  rationale: «Crucificado» es la forma directa y precisa para σταυρόω, conservando la especificidad histórica y teológica.
theological_decisions:
- issue: Alcance de «los gobernantes de esta era»
  english_pob_reading: Rendered neutrally as “the rulers of this age” without specifying whether Paul means human authorities, spiritual powers, or both.
  chosen_spanish_reading: Se vierte de manera neutral como «los gobernantes de esta era», sin decidir si Pablo alude a autoridades humanas, poderes espirituales o ambos.
  alternative_spanish_readings:
  - las autoridades de esta era
  - los poderes de esta era
  - los gobernantes humanos y espirituales de esta era
  rationale: El griego permite más de una lectura en el uso paulino. La traducción mantiene esa tensión interpretativa sin resolverla de antemano.
  doctrine_reference: Preservar la ambigüedad teológica donde el texto la permite.
translation_notes:
  revision_awareness: La redacción sigue la revisión más reciente del POB en inglés, que ajustó el verbo principal a una forma más directa de «has known / had known» para reflejar ἔγνωκεν / ἔγνωσαν con mayor precisión. Por eso se emplea «ha conocido / la hubieran conocido» en vez de una paráfrasis más interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος según el estándar del proyecto.
  - Se conserva «gloria» para δόξα y la construcción «Señor de gloria» para reflejar el genitivo sin suavizarlo.
  - «Era» traduce αἰών con sentido temporal, no geográfico.
  - La nota al pie preserva la ambigüedad interpretativa documentada en el audit trail.
