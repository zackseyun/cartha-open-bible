revisions:
- from: la cual ninguno de los gobernantes de esta era[a] ha conocido; porque, si la hubieran conocido, no habrían crucificado al Señor de gloria.
  to: que ninguno de los gobernantes de este siglo[a] ha conocido; porque, si la hubieran conocido, no habrían crucificado al Señor de gloria.
  rationale: 'Se ajusta la redacción para mayor naturalidad y legibilidad en español ampliamente eclesial: «que» en lugar de «la cual» y «este siglo» en lugar de «esta era». Se conserva la ambigüedad interpretativa del original y la formulación teológica «el Señor de gloria». También se pule la nota al pie para una sintaxis más natural en español.'
