translation:
  language: es
  text: Sin embargo, hablamos sabiduría entre los maduros[a], pero no una sabiduría de este siglo, ni de los gobernantes de este siglo[c][b], que están siendo reducidos a nada.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los perfectos»; aquí probablemente se refiere a los espiritualmente maduros.
    reason: lexical_alternative
  - marker: b
    text: O «que están pasando», «que están siendo abolidos» o «que están siendo anulados».
    reason: lexical_alternative
  - marker: c
    text: «Los gobernantes de este siglo» puede referirse a autoridades humanas, poderes espirituales o a ambos.
    reason: alternative_reading
lexical_decisions:
- source_word: Σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría divina
  - sabiduría
  lexicon: BDAG
  rationale: σοφία se traduce naturalmente como 'sabiduría'. Se conserva la repetición del término en ambas apariciones para mantener el énfasis del griego y del POB inglés.
- source_word: δὲ
  english_pob_choice: Yet
  chosen_spanish: Sin embargo
  alternatives_spanish:
  - Pero
  - Y
  lexicon: BDAG
  rationale: Marca contraste con el contexto inmediato. 'Sin embargo' expresa bien el valor adversativo en español moderno y mantiene el tono del inglés 'Yet'.
- source_word: λαλοῦμεν
  english_pob_choice: we do speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - sí hablamos
  - proclamamos
  - decimos
  lexicon: BDAG
  rationale: λαλέω significa básicamente 'hablar'. En español, el auxiliar enfático 'do' se expresa de forma natural con 'sí' implícito por el contexto adversativo; aquí 'hablamos' evita sobrecargar la frase.
- source_word: ἐν τοῖς τελείοις
  english_pob_choice: among the mature
  chosen_spanish: entre los maduros
  alternatives_spanish:
  - entre los perfectos
  - entre los adultos espirituales
  - entre los completos
  lexicon: BDAG
  rationale: τέλειος aquí se entiende mejor como madurez espiritual que como perfección sin pecado. 'Entre' refleja mejor la construcción idiomática que un literal 'en'.
- source_word: οὐ τοῦ αἰῶνος τούτου
  english_pob_choice: not a wisdom of this age
  chosen_spanish: no una sabiduría de este siglo
  alternatives_spanish:
  - no una sabiduría de esta edad
  - no una sabiduría de este mundo
  lexicon: BDAG
  rationale: αἰών suele indicar 'edad' o 'era'. 'Siglo' es un equivalente español posible y comprensible para el trasfondo temporal de 'this age' sin convertirlo en κόσμος ('mundo').
- source_word: ἀρχόντων
  english_pob_choice: rulers
  chosen_spanish: gobernantes
  alternatives_spanish:
  - rulers
  - autoridades
  - príncipes
  lexicon: BDAG
  rationale: ἄρχων designa a quienes ejercen poder o mando. 'Gobernantes' es claro en español y conserva la amplitud del término sin decidir si son autoridades humanas, espirituales o ambas.
- source_word: τῶν καταργουμένων
  english_pob_choice: who are being brought to nothing
  chosen_spanish: los cuales están siendo reducidos a nada
  alternatives_spanish:
  - los cuales están siendo abolidos
  - los cuales están siendo anulados
  - los cuales están pasando
  lexicon: BDAG
  rationale: καταργέω puede significar 'anular', 'abolir' o 'dejar sin efecto'. 'Reducidos a nada' conserva el matiz de ser llevados a la inutilidad o inexistencia, y refleja el presente progresivo del participio.
theological_decisions:
- issue: Alcance de 'los gobernantes de este siglo'
  english_pob_reading: Render broadly as 'rulers' without specifying human or demonic referent.
  chosen_spanish_reading: '''Los gobernantes de este siglo'' se deja abierto, sin precisar si son autoridades humanas, poderes espirituales o ambos.'
  alternative_spanish_readings:
  - autoridades humanas
  - poderes espirituales
  - ambos, humanos y espirituales
  rationale: El griego no obliga a una sola identificación. La traducción preserva la tensión interpretativa tal como hace el POB inglés con 'rulers'.
  doctrine_reference: Preservar ambigüedad interpretativa donde el texto no la resuelve.
translation_notes:
  revision_awareness: No se registran revisiones posteriores que alteren el sentido base; se mantiene el alto grado de acuerdo del pasaje y la solución del POB inglés.
  spanish_consistency_notes:
  - Se mantiene 'sabiduría' en ambas repeticiones para reflejar la estructura enfática del griego.
  - Se evita 'mundo' para αἰών, preservando la idea de 'edad/era'.
  - '''Maduros'' traduce τέλειοι en sentido de madurez espiritual, no de perfección moral sin pecado.'
  - La nota sobre τῶν καταργουμένων se ancla en el participio final y preserva sus alternativas semánticas.
  - Se conserva la ambigüedad de 'gobernantes' sin resolver el referente teológico en el texto principal.
