translation:
  language: es
  text: Porque Dios nos las reveló[a] por medio del Espíritu; porque el Espíritu escudriña todas las cosas[b], incluso las profundidades de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Dios nos reveló estas cosas»; el objeto directo está implícito en el griego y se sobreentiende por el contexto precedente.
    reason: alternative_reading
  - marker: b
    text: O «las cosas profundas de Dios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπεκάλυψεν
  english_pob_choice: has revealed
  chosen_spanish: reveló
  alternatives_spanish:
  - ha revelado
  lexicon: BDAG
  rationale: El aoristo griego admite en español un pretérito perfecto simple natural y preciso. Mantengo el hecho consumado de la revelación sin forzar un perfecto compuesto que en español no es necesario.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - a nosotros
  lexicon: BDAG
  rationale: El dativo de destinatario se expresa de forma idiomática en español con el clítico de objeto indirecto 'nos'.
- source_word: '[implicit object of ἀπεκάλυψεν]'
  english_pob_choice: these things
  chosen_spanish: lo
  alternatives_spanish:
  - esto
  - las cosas
  lexicon: contextual inference from preceding discourse
  rationale: El griego omite el objeto directo porque queda suplido por el contexto. En español, 'lo' conserva esa referencia implícita sin introducir una explicación más amplia que el texto no formula aquí.
- source_word: διὰ τοῦ πνεύματος
  english_pob_choice: through the Spirit
  chosen_spanish: por medio del Espíritu
  alternatives_spanish:
  - por el Espíritu
  - mediante el Espíritu
  lexicon: BDAG
  rationale: διά con genitivo indica medio/mediación. 'Por medio del Espíritu' preserva el sentido mediador con fluidez en español y evita una lectura meramente instrumental.
- source_word: πνεῦμα
  english_pob_choice: Spirit
  chosen_spanish: Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: El contexto de revelación divina y conocimiento de 'las profundidades de Dios' favorece la referencia al Espíritu Santo. La mayúscula ayuda a comunicar esa lectura en español.
- source_word: ἐραυνᾷ
  english_pob_choice: searches
  chosen_spanish: escudriña
  alternatives_spanish:
  - investiga
  - examina
  - busca
  lexicon: BDAG
  rationale: '''Escudriña'' conserva el matiz de sondeo penetrante y exhaustivo que tiene ἐραυνάω, y es un equivalente bíblico claro en español sin perder fuerza verbal.'
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo
  lexicon: BDAG
  rationale: La expresión amplia del griego se vierte con 'todas las cosas' para mantener el alcance total, en paralelo con la frase final del versículo.
- source_word: καὶ
  english_pob_choice: even
  chosen_spanish: incluso
  alternatives_spanish:
  - y
  - hasta
  lexicon: BDAG
  rationale: Aquí καί es intensivo, no meramente aditivo. 'Incluso' conserva el énfasis climáctico que introduce la frase final.
- source_word: τὰ βάθη τοῦ θεοῦ
  english_pob_choice: the depths of God
  chosen_spanish: las profundidades de Dios
  alternatives_spanish:
  - los profundos asuntos de Dios
  - las cosas profundas de Dios
  lexicon: BDAG
  rationale: '''Profundidades'' mantiene la metáfora espacial del griego y sigue de cerca la imagen del texto, sin explicarla de forma interpretativa.'
theological_decisions:
- issue: Referente de πνεῦμα en ambos usos
  english_pob_reading: Holy Spirit in both occurrences
  chosen_spanish_reading: el Espíritu Santo en ambos casos
  alternative_spanish_readings:
  - un espíritu humano
  - el espíritu en sentido general
  rationale: El contexto inmediato atribuye la revelación de Dios al Espíritu y luego afirma que ese Espíritu escudriña aun las profundidades de Dios. Esa combinación favorece claramente la referencia al Espíritu Santo, no al espíritu humano.
  doctrine_reference: 1 Corintios 2:10; cf. 1 Corintios 2:11-12
translation_notes:
  revision_awareness: 'La redacción sigue de cerca la decisión inglesa auditada y conserva la misma tensión textual: objeto directo implícito de ἀπεκάλυψεν y lectura pneumatológica de πνεῦμα. No se aplicaron revisiones posteriores en el paquete, y la concordancia de revisión indica estabilidad alta.'
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto fuente lo requiera; aquí no aparece.
  - Se mantiene 'Espíritu' con mayúscula por referencia al Espíritu Santo, coherente con el contexto.
  - '''Escudriña'' se eligió por su fuerza bíblica y por reproducir el matiz de examen exhaustivo de ἐραυνᾷ.'
  - '''Profundidades de Dios'' conserva la metáfora sin convertirla en paráfrasis doctrinal.'
