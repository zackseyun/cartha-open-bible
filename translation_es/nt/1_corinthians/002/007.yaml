- from: Pero nosotros hablamos la sabiduría de Dios en un misterio[c][b][a], la sabiduría escondida que Dios predestinó antes de los siglos para nuestra gloria.
  to: Pero nosotros hablamos la sabiduría de Dios en un misterio[a], la sabiduría oculta que Dios predestinó[b] antes de los siglos[c] para nuestra gloria.
  rationale: La traducción base es fiel, pero las notas deben reanclarse al lugar correcto y corregirse para que correspondan a las alternativas documentadas del inglés POB. También se ajusta «escondida» a «oculta» por mayor naturalidad en español bíblico contemporáneo sin cambiar el sentido.
