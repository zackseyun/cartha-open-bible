review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: contraste con ἀλλὰ, «hablamos» para λαλοῦμεν, «la sabiduría de Dios», la apposición explicativa sobre la sabiduría escondida, «predestinó» para προώρισεν, «antes de los siglos» para πρὸ τῶν αἰώνων y «para nuestra gloria» para εἰς δόξαν ἡμῶν. La principal desalineación está en las notas: la nota b ancla en «misterio» pero comenta «predestinó», y la nota c ancla en «misterio» pero comenta «antes de todos los siglos».'
  spanish_quality_summary: El español es claro y digno. Sin embargo, la secuencia de notas sobre «misterio» es incorrecta y confusa para el lector. Además, «escondida» es aceptable, pero «oculta» suena algo más natural y teológicamente ajustada en este contexto paulino, aunque no es un error grave. La reparación necesaria es menor y no requiere replantear la traducción completa.
  glossary_alignment: Se mantiene «Dios», «predestinó», «misterio» y «gloria» de forma consistente con las decisiones auditadas. No hay conflicto con la terminología base del proyecto. La única corrección necesaria es alinear las notas y sus anclajes con las decisiones léxicas documentadas.
  issues:
  - severity: medium
    issue: Las notas al pie están mal ancladas y desordenadas.
    rationale: En el texto, [c][b][a] aparece tras «misterio», pero la nota b trata de «predestinó» y la c de «antes de todos los siglos». Esto incumple la disciplina de anclaje y crea confusión exegética.
  - severity: low
    issue: La nota b repite como alternativa la misma forma principal «predestinó».
    rationale: Si la lectura principal ya es «predestinó», esa no debe figurar como alternativa. Las alternativas documentadas son «determinó de antemano», «decidió de antemano» o «ordenó/dispuso de antemano».
  - severity: low
    issue: «Sabiduría escondida» es menos idiomático que «sabiduría oculta» en este contexto.
    rationale: Ambas son fieles a ἀποκεκρυμμένην, pero «oculta» suena más natural en registro bíblico moderno y enlaza mejor con la explicación del misterio como plan antes oculto y ahora revelado.
  revised_spanish_text: Pero nosotros hablamos la sabiduría de Dios en un misterio[a], la sabiduría oculta que Dios predestinó[b] antes de los siglos[c] para nuestra gloria.
  revised_footnotes:
  - marker: a
    text: O «en secreto»; el griego usa «misterio», término que Pablo emplea a menudo para el plan de Dios antes oculto y ahora revelado.
    reason: lexical_alternative
  - marker: b
    text: O «determinó de antemano» o «decidió de antemano».
    reason: lexical_alternative
  - marker: c
    text: O «antes de todos los siglos».
    reason: lexical_alternative
  revision_rationale: La traducción base es fiel, pero las notas deben reanclarse al lugar correcto y corregirse para que correspondan a las alternativas documentadas del inglés POB. También se ajusta «escondida» a «oculta» por mayor naturalidad en español bíblico contemporáneo sin cambiar el sentido.
