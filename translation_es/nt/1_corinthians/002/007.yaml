translation:
  language: es
  text: Pero nosotros hablamos la sabiduría de Dios en un misterio[a], la sabiduría oculta que Dios predestinó[b] antes de los siglos[c] para nuestra gloria.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en secreto»; el griego usa «misterio», término que Pablo emplea a menudo para el plan de Dios antes oculto y ahora revelado.
    reason: lexical_alternative
  - marker: b
    text: O «determinó de antemano» o «decidió de antemano».
    reason: lexical_alternative
  - marker: c
    text: O «antes de todos los siglos».
    reason: lexical_alternative
lexical_decisions:
- source_word: λαλοῦμεν
  english_pob_choice: we speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - proclamamos
  - decimos
  lexicon: BDAG
  rationale: «Hablar» conserva el sentido básico de λαλέω y funciona bien en el contraste paulino sin añadir el matiz más formal de «proclamar».
- source_word: θεοῦ σοφίαν
  english_pob_choice: God's wisdom
  chosen_spanish: la sabiduría de Dios
  alternatives_spanish:
  - la sabiduría de Dios
  - la sabiduría que viene de Dios
  lexicon: BDAG
  rationale: El genitivo se vierte de forma natural en español como posesivo, preservando que la sabiduría pertenece a Dios y procede de él.
- source_word: ἐν μυστηρίῳ
  english_pob_choice: in a mystery
  chosen_spanish: en un misterio
  alternatives_spanish:
  - en misterio
  - como un misterio
  - en secreto
  lexicon: BDAG
  rationale: «Misterio» preserva el valor paulino de una realidad antes oculta y ahora revelada. El artículo indefinido mantiene la fluidez del español y corresponde al uso idiomático indicado por la tradición de traducción auditada.
- source_word: τὴν ἀποκεκρυμμένην
  english_pob_choice: the hidden wisdom
  chosen_spanish: la sabiduría escondida
  alternatives_spanish:
  - la sabiduría oculta
  - la que ha sido escondida
  lexicon: BDAG
  rationale: El participio femenino singular retoma «sabiduría»; en español conviene explicitar el sustantivo para que el referente quede claro y la frase siga siendo natural.
- source_word: προώρισεν
  english_pob_choice: predestined
  chosen_spanish: predestinó
  alternatives_spanish:
  - determinó de antemano
  - ordenó de antemano
  - decidió de antemano
  lexicon: BDAG
  rationale: «Predestinar» conserva la fuerza de προορίζω y corresponde al valor semántico fuerte del verbo sin suavizarlo indebidamente.
- source_word: πρὸ τῶν αἰώνων
  english_pob_choice: before the ages
  chosen_spanish: antes de los siglos
  alternatives_spanish:
  - antes de las eras
  - antes de todos los siglos
  lexicon: BDAG
  rationale: «Ages» se puede verter como «siglos» en español bíblico contemporáneo, manteniendo el marco temporal cósmico sin pasar a una paráfrasis interpretativa.
- source_word: εἰς δόξαν ἡμῶν
  english_pob_choice: for our glory
  chosen_spanish: para nuestra gloria
  alternatives_spanish:
  - para nuestra honra
  - para nuestra glorificación
  lexicon: BDAG
  rationale: «Para nuestra gloria» es la equivalencia más directa de δόξα; «glorificación» sería más explicativo y «honra» debilitaría el peso teológico del término.
theological_decisions:
- issue: Valor paulino de μυστήριον como realidad divina escondida y revelada
  english_pob_reading: mystery
  chosen_spanish_reading: misterio
  alternative_spanish_readings:
  - secreto
  - en secreto
  rationale: Se conserva «misterio» para no reducir el término a simple secreto humano. La nota permite la alternativa «en secreto» sin borrar la tensión semántica documentada.
  doctrine_reference: Mantener la tensión léxica paulina sobre el plan de Dios oculto y revelado.
- issue: Determinación previa de Dios en προώρισεν
  english_pob_reading: predestined
  chosen_spanish_reading: predestinó
  alternative_spanish_readings:
  - determinó de antemano
  - decidió de antemano
  rationale: El verbo expresa una decisión anterior y firme de Dios. «Predestinó» preserva esa fuerza sin imponer un sistema doctrinal más amplio que el texto no explicita por sí mismo.
  doctrine_reference: Preservar la tensión teológica sin resolverla por adelantado.
translation_notes:
  revision_awareness: El texto inglés revisado sustituyó el guion por una coma para acercarse más a la aposición griega; el español sigue esa misma decisión estructural con una coma entre «misterio» y «la sabiduría escondida», conservando la relación explicativa sin añadir ruptura retórica.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός y el genitivo posesivo «sabiduría de Dios» como en el sentido del original.
  - «Misterio» se conserva como término técnico paulino; la nota ofrece la alternativa «en secreto» sin reemplazar el término principal.
  - «Predestinó» conserva la fuerza semántica del verbo; la nota recoge alternativas menos cargadas doctrinalmente.
  - «Antes de los siglos» sigue el marco temporal cósmico del griego y la elección auditada en inglés.
  - La puntuación con coma después de «misterio» respeta la aposición griega y la revisión inglesa reciente.
