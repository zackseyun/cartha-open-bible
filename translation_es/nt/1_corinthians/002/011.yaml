translation:
  language: es
  text: Porque, entre los seres humanos, ¿quién conoce las cosas de una persona[a] sino el espíritu de la persona que está en su interior? Así también, nadie ha conocido las cosas de Dios sino el Espíritu de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los pensamientos de una persona» para «las cosas de una persona».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀνθρώπων / ἀνθρώπου
  english_pob_choice: people / a person
  chosen_spanish: los seres humanos / una persona
  alternatives_spanish:
  - la gente / una persona
  - los hombres / un hombre
  - la humanidad / un ser humano
  lexicon: BDAG
  rationale: El griego usa ἄνθρωπος con referencia genérica humana, no masculina específica. «Los seres humanos» y «una persona» conservan esa amplitud en español sin volver el texto rígido.
- source_word: τὰ τοῦ ἀνθρώπου
  english_pob_choice: the things of a person
  chosen_spanish: las cosas de una persona
  alternatives_spanish:
  - los pensamientos de una persona
  - lo que pertenece a una persona
  - las cosas interiores de una persona
  lexicon: BDAG
  rationale: La expresión es amplia y no debe reducirse solo a «pensamientos». «Las cosas de una persona» preserva el paralelismo con «las cosas de Dios» y mantiene abierta la extensión semántica.
- source_word: πνεῦμα τοῦ ἀνθρώπου
  english_pob_choice: the spirit of the person
  chosen_spanish: el espíritu de la persona
  alternatives_spanish:
  - el espíritu humano
  - el espíritu de esa persona
  lexicon: BDAG
  rationale: Se conserva la relación posesiva del genitivo y el contraste antropológico con «el Espíritu de Dios». En español, «el espíritu de la persona» es claro y fiel al orden del griego.
- source_word: τὸ ἐν αὐτῷ
  english_pob_choice: that person’s spirit within them
  chosen_spanish: que está en ella
  alternatives_spanish:
  - que está en él
  - que está dentro de ella
  - que reside en ella
  lexicon: BDAG
  rationale: La frase indica interioridad/inhabitación. Elegí «que está en ella» para reflejar el griego con naturalidad en español y evitar una expansión interpretativa.
- source_word: οὕτως καὶ
  english_pob_choice: In the same way
  chosen_spanish: Así también
  alternatives_spanish:
  - De la misma manera
  - Igualmente
  - Del mismo modo
  lexicon: BDAG
  rationale: Es una equivalencia idiomática natural para marcar la comparación estrecha entre el ámbito humano y el divino.
- source_word: ἔγνωκεν
  english_pob_choice: has known
  chosen_spanish: ha conocido
  alternatives_spanish:
  - conoce
  - ha llegado a conocer
  - conoció
  lexicon: BDAG
  rationale: El perfecto griego tiene fuerza de estado resultante; «ha conocido» conserva esa referencia sin perder fluidez en español.
- source_word: τὰ τοῦ θεοῦ
  english_pob_choice: the things of God
  chosen_spanish: las cosas de Dios
  alternatives_spanish:
  - los pensamientos de Dios
  - lo que pertenece a Dios
  - las cosas divinas
  lexicon: BDAG
  rationale: Se mantiene la amplitud deliberada de la expresión y el paralelismo con la primera mitad del versículo.
- source_word: πνεῦμα τοῦ θεοῦ
  english_pob_choice: the Spirit of God
  chosen_spanish: el Espíritu de Dios
  alternatives_spanish:
  - el espíritu de Dios
  lexicon: BDAG
  rationale: En este contexto paulino se refiere al Espíritu divino personal; la mayúscula en español señala ese referente sin añadir contenido ajeno al texto.
theological_decisions:
- issue: Referencia del «Espíritu de Dios» como sujeto exclusivo del conocimiento de las cosas de Dios
  english_pob_reading: no one has known the things of God except the Spirit of God
  chosen_spanish_reading: nadie ha conocido las cosas de Dios sino el Espíritu de Dios
  alternative_spanish_readings:
  - nadie conoce las cosas de Dios sino el Espíritu de Dios
  - nadie ha llegado a conocer las cosas de Dios sino el Espíritu de Dios
  rationale: 'La traducción conserva la exclusividad del paralelo: así como solo el espíritu humano conoce lo humano, solo el Espíritu de Dios conoce lo divino. «Ha conocido» refleja el perfecto sin perder la idea de conocimiento establecida en el contexto.'
  doctrine_reference: Ortodoxia ecuménica histórica; mantener la referencia personal al Espíritu de Dios conforme al contexto paulino inmediato.
- issue: Alcance de τὰ τοῦ ἀνθρώπου y τὰ τοῦ θεοῦ
  english_pob_reading: the things of a person / the things of God
  chosen_spanish_reading: las cosas de una persona / las cosas de Dios
  alternative_spanish_readings:
  - los pensamientos de una persona / los pensamientos de Dios
  - lo que pertenece a una persona / lo que pertenece a Dios
  rationale: No se estrecha el campo semántico a «pensamientos», porque el texto presenta una categoría más amplia de realidades internas o propias de cada esfera. Mantener «cosas» preserva la simetría retórica y la tensión lexical documentada.
  doctrine_reference: Principio de paralelismo semántico en 1 Corintios 2:11; la formulación no debe reducir indebidamente el alcance del griego.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta la revisión más reciente del contexto inglés: se evitó una paráfrasis expansiva de «indwelling spirit» y se conservó la referencia más literal de «τὸ ἐν αὐτῷ» con una construcción española natural. También se respetó el valor del perfecto ἔγνωκεν con «ha conocido».'
  spanish_consistency_notes:
  - Se usó «Espíritu de Dios» con mayúscula para el referente personal divino, coherente con el contexto paulino.
  - Se evitó «SEÑOR» o sustituciones tradicionales por «Yahvé» porque el versículo no contiene el nombre divino.
  - Se mantuvo «las cosas de ...» para conservar el paralelismo formal y semántico del texto griego.
  - Se eligió lenguaje genérico humano («seres humanos», «persona») para reflejar ἄνθρωπος sin sesgo masculino.
