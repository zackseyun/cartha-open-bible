    text: O «espíritu».
    reason: alternative_reading
  - marker: b
    text: O «en palabras persuasivas de sabiduría».
    reason: lexical_alternative
lexical_decisions:
- source_word: λόγος
  english_pob_choice: speech
  chosen_spanish: palabra
  alternatives_spanish:
  - discurso
  - habla
  lexicon: BDAG
  rationale: En este contexto Pablo contrasta su manera de expresarse con la persuasión retórica; «palabra» conserva la amplitud de λόγος sin duplicar demasiado «proclamación» y suena natural en español bíblico.
- source_word: κήρυγμα
  english_pob_choice: proclamation
  chosen_spanish: proclamación
  alternatives_spanish:
  - predicación
  - mensaje
  lexicon: BDAG
  rationale: «Proclamación» preserva el matiz de anuncio público y heraldico de κήρυγμα, distinguiéndolo de λόγος en la misma cláusula.
- source_word: πειθοῖ σοφίας
  english_pob_choice: persuasive words of wisdom
  chosen_spanish: palabras persuasivas de sabiduría
  alternatives_spanish:
  - retórica persuasiva de sabiduría
  - palabras convincentes de sabiduría
  lexicon: BDAG
  rationale: El griego presenta un sintagma breve y algo condensado; en español, «palabras persuasivas de sabiduría» mantiene el valor adjetival de πειθοῖ y refleja el contraste con la demostración, sin exigir una paráfrasis mayor.
- source_word: ἀπόδειξει
  english_pob_choice: demonstration
  chosen_spanish: demostración
  alternatives_spanish:
  - prueba
  - evidencia
  - manifestación
  lexicon: BDAG
  rationale: «Demostración» reproduce bien la idea de una manifestación o evidencia convincente que se opone a la mera persuasión verbal.
- source_word: πνεύματος
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - espíritu
  lexicon: BDAG
  rationale: En el flujo del argumento paulino, la referencia apunta al Espíritu de Dios; por eso se capitaliza «Espíritu». Se conserva la alternativa «espíritu» en nota porque el griego permite esa ambigüedad léxica.
- source_word: δυνάμεως
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - fuerza
  - poderío
  lexicon: BDAG
  rationale: «Poder» es el equivalente natural en español para δύναμις en este contexto y funciona bien en la coordinación con «Espíritu».
theological_decisions:
- issue: Si πνεύματος debe leerse como el Espíritu Santo o como espíritu en sentido más general
  english_pob_reading: the Spirit
  chosen_spanish_reading: el Espíritu
  alternative_spanish_readings:
  - espíritu
  rationale: La lectura inmediata y el contexto de 1 Corintios 2 favorecen entender una acción divina, no meramente una disposición humana. Aun así, se deja visible la posibilidad léxica de «espíritu» para no borrar la ambigüedad del griego.
  doctrine_reference: Preservar la tensión léxica sin resolverla de modo indebido; documentar la lectura preferida y la alternativa viable.
translation_notes:
  revision_awareness: El borrador sigue la revisión más reciente del POB en inglés, que ajustó la frase de una traducción más genérica a «persuasive words of wisdom» para reflejar con más precisión πειθοῖ σοφίας y mantener el contraste con «demonstration». La versión española conserva ese contraste y evita añadir contenido no presente en el griego.
  spanish_consistency_notes:
  - Se mantuvo una distinción clara entre λόγος («palabra») y κήρυγμα («proclamación»), sin fusionarlos.
  - Se prefirió «demostración» para ἀπόδειξις por su valor de evidencia mostrada y no solo argumentada.
  - Se usó «Espíritu» con mayúscula por coherencia teológica con el contexto paulino, pero se dejó nota para la lectura menor «espíritu».
  - Se eligió «poder» para δύναμις por ser el término más natural y fiel en español bíblico contemporáneo.
