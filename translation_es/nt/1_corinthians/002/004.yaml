  - severity: medium
    issue: Uso de «con ... sino con ...» en vez de «en ... sino en ...»
    rationale: El griego repite ἐν en ambos miembros. La revisión inglesa final también preserva esta estructura. «En» funciona naturalmente aquí y sostiene mejor el contraste entre ámbito/modo retórico y demostración espiritual.
