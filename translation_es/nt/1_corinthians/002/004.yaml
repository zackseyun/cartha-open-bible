- from: Y mi palabra y mi proclamación no fueron con palabras persuasivas de sabiduría[a], sino con demostración del Espíritu y de poder[b].
  to: Y mi discurso y mi proclamación no fueron en palabras persuasivas de sabiduría[a], sino en demostración del Espíritu y de poder[b].
  rationale: Se cambió «mi palabra» por «mi discurso» para reflejar mejor λόγος como manera de hablar en contraste retórico con κήρυγμα. También se ajustó «con ... sino con ...» a «en ... sino en ...» para seguir más de cerca el doble ἐν del griego y la auditoría inglesa. Se conservaron las notas existentes porque la ambigüedad de πνεύματος sigue vigente y la alternativa léxica ya documentada debe mantenerse.
