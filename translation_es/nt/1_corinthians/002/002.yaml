translation:
  language: es
  text: Pues no me propuse saber entre ustedes nada, sino a Jesús Mesías[a] y a este, crucificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O «Jesús Cristo». Griego: «Jesús Mesías».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔκρινά
  english_pob_choice: decided
  chosen_spanish: me propuse
  alternatives_spanish:
  - decidí
  - resolví
  lexicon: BDAG
  rationale: κρίνω expresa aquí una determinación tomada; en español, «me propuse» comunica bien esa resolución personal y mantiene el matiz volitivo sin sonar judicial.
- source_word: τι εἰδέναι
  english_pob_choice: to know nothing
  chosen_spanish: saber ... nada
  alternatives_spanish:
  - conocer ... nada
  - no saber nada
  lexicon: BDAG
  rationale: La construcción negativa con infinitivo transmite una exclusión total del contenido de conocimiento. «Saber ... nada» reproduce la fuerza restrictiva de la frase sin perder naturalidad en español.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en medio de ustedes
  - en ustedes
  lexicon: BDAG
  rationale: La expresión apunta al ámbito relacional y ministerial de Pablo con los corintios; «entre ustedes» conserva ese sentido de presencia y trato, con español natural.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: sino
  alternatives_spanish:
  - excepto
  - salvo
  lexicon: BDAG
  rationale: En español, tras una negación, «sino» expresa con precisión la construcción exceptiva y evita una formulación rígida.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la preferencia del proyecto para Χριστός como título, «Mesías» conserva el valor titulado y evita convertirlo en mero nombre fijo. La nota permite la alternativa tradicional «Cristo».
- source_word: τοῦτον ἐσταυρωμένον
  english_pob_choice: him crucified
  chosen_spanish: a este crucificado
  alternatives_spanish:
  - y a este crucificado
  - y a este como crucificado
  - a este, crucificado
  lexicon: BDAG
  rationale: «A este crucificado» mantiene el énfasis del demostrativo y la condensación del participio pasivo, sin añadir explicación que el griego no requiere.
theological_decisions:
- issue: Renderizado de Χριστός como título
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: La guía doctrinal del proyecto favorece «Mesías» cuando Χριστός funciona como título mesiánico. Aquí Pablo centra la proclamación en la identidad y obra mesiánica de Jesús; la nota registra la alternativa tradicional.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando conserva fuerza titular'
- issue: Énfasis cristológico de «y este crucificado»
  english_pob_reading: and him crucified
  chosen_spanish_reading: y a este crucificado
  alternative_spanish_readings:
  - y a este, crucificado
  - y a este como crucificado
  rationale: 'La forma breve conserva el golpe retórico de Pablo: no solo Jesús como Mesías, sino Jesús en su condición de crucificado. No se suaviza el participio ni se añade desarrollo interpretativo.'
  doctrine_reference: Énfasis paulino en la cruz y la proclamación centrada en Cristo crucificado
translation_notes:
  revision_awareness: El contexto auditado muestra una oscilación entre «Mesiah/Mesías» y «Christ/Cristo» por revisión, con restauración final de «Messiah» conforme a la política doctrinal. La redacción española sigue esa decisión final y la hace explícita con nota para la alternativa tradicional.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al criterio del proyecto, y no «Cristo» en el texto principal.
  - Se conserva la estructura restrictiva de la frase con negación + excepción, evitando paráfrasis amplificadas.
  - «Entre ustedes» refleja el marco ministerial de ἐν ὑμῖν sin introducir matices inexistentes.
  - La construcción «a este crucificado» mantiene la referencia demostrativa enfática del griego.
