revisions:
- from: Estas cosas también hablamos[a], no con palabras enseñadas por sabiduría humana, sino con las enseñadas por el Espíritu[ b ], interpretando[b] cosas espirituales a personas espirituales.
  to: Estas cosas también hablamos[a], no con palabras enseñadas por sabiduría humana, sino con las que enseña el Espíritu, interpretando cosas espirituales a personas espirituales.
  rationale: Se corrige la nota para reflejar la verdadera alternativa preservada por la auditoría inglesa y se elimina la contradicción entre texto y nota. También se mejora la naturalidad del español en la segunda mitad del versículo sin cambiar la decisión exegética principal. Se deja un solo marcador, correctamente anclado, porque la nota relevante afecta la lectura de la cláusula final completa.
