translation:
  language: es
  text: Estas cosas también hablamos[a], no con palabras enseñadas por sabiduría humana, sino con las que enseña el Espíritu, interpretando cosas espirituales a personas espirituales.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «expresando cosas espirituales con palabras espirituales». El griego también puede entenderse así, porque πνευματικοῖς puede leerse no como referencia a personas espirituales, sino de manera implícita a palabras espirituales.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἃ
  english_pob_choice: These things
  chosen_spanish: Estas cosas
  alternatives_spanish:
  - Lo que
  - Aquello
  lexicon: BDAG
  rationale: El demostrativo plural se vuelve naturalmente «estas cosas» en español para referirse a las realidades mencionadas antes, sin endurecer la frase.
- source_word: λαλοῦμεν
  english_pob_choice: we speak
  chosen_spanish: hablamos
  alternatives_spanish:
  - decimos
  - pronunciamos
  lexicon: BDAG
  rationale: «Hablar» conserva el matiz oral de λαλέω y suena más natural en español que una traducción demasiado literal con «decir».
- source_word: ἐν διδακτοῖς ἀνθρωπίνης σοφίας λόγοις
  english_pob_choice: in words taught by human wisdom
  chosen_spanish: con palabras enseñadas por sabiduría humana
  alternatives_spanish:
  - en palabras enseñadas por sabiduría humana
  - con palabras instruidas por sabiduría humana
  lexicon: BDAG
  rationale: «Con palabras» expresa con fluidez el valor instrumental de ἐν en español. «Sabiduría humana» mantiene el contraste con la fuente divina y evita suavizar el genitivo.
- source_word: ἐν διδακτοῖς πνεύματος
  english_pob_choice: in those taught by the Spirit
  chosen_spanish: con las enseñadas por el Espíritu
  alternatives_spanish:
  - con palabras enseñadas por el Espíritu
  - en las enseñadas por el Espíritu
  lexicon: BDAG
  rationale: La elipsis de «palabras» puede mantenerse en español sin perder claridad. «El Espíritu» se capitaliza por el referentе personal del Espíritu Santo en el contexto inmediato.
- source_word: πνεύματος
  english_pob_choice: the Spirit
  chosen_spanish: el Espíritu
  alternatives_spanish:
  - el espíritu
  lexicon: BDAG
  rationale: El contraste con la sabiduría humana en 1 Corintios 2 apunta al Espíritu Santo, no a un espíritu genérico.
- source_word: πνευματικοῖς πνευματικὰ συγκρίνοντες
  english_pob_choice: interpreting spiritual things to spiritual people
  chosen_spanish: interpretando cosas espirituales a personas espirituales
  alternatives_spanish:
  - explicando cosas espirituales con palabras espirituales
  - combinando cosas espirituales con cosas espirituales
  lexicon: BDAG
  rationale: Se adopta la lectura que toma πνευματικοῖς como dativo de personas, siguiendo la revisión auditada del inglés POB. «Interpretando» conserva el posible sentido de συγκρίνω como exponer/relacionar/comunicar, sin reducir indebidamente la ambigüedad del griego.
theological_decisions:
- issue: Referente de πνεύματος
  english_pob_reading: the Holy Spirit
  chosen_spanish_reading: el Espíritu Santo
  alternative_spanish_readings:
  - un espíritu genérico
  - el espíritu
  rationale: El contexto inmediato contrasta revelación divina con sabiduría humana; por eso el referente personal del Espíritu Santo es el más coherente y fiel al argumento de Pablo.
  doctrine_reference: 1 Corintios 2:10-13; pneumatología paulina
- issue: Sentido de πνευματικοῖς πνευματικὰ συγκρίνοντες
  english_pob_reading: interpreting spiritual things to spiritual people
  chosen_spanish_reading: interpretando cosas espirituales a personas espirituales
  alternative_spanish_readings:
  - interpretando cosas espirituales con palabras espirituales
  - explicando cosas espirituales a personas espirituales
  rationale: La auditoría inglesa privilegia la lectura con dativo de personas; la versión española la sigue para no imponer una lectura de «palabras» que no es obligatoria en el griego.
  doctrine_reference: hermenéutica paulina; 1 Corintios 2:13
translation_notes:
  revision_awareness: La revisión auditada del inglés POB cambió la última cláusula de una idea de «expresar cosas espirituales con palabras espirituales» a «interpretar cosas espirituales a personas espirituales», privilegiando la lectura sintáctica en la que πνευματικοῖς es dativo de personas. La versión española sigue esa decisión y conserva la ambigüedad relevante mediante nota.
  spanish_consistency_notes:
  - Se evita «Cristo» o terminología litúrgica ajena al verso; el foco léxico permanece en λόγοι/λαλοῦμεν y en la oposición entre sabiduría humana y el Espíritu.
  - «El Espíritu» se mantiene en mayúscula por coherencia con el referente personal del contexto.
  - Se usa «sabiduría humana» para reflejar el genitivo griego sin convertirlo en una paráfrasis de sentido más amplio.
  - 'La puntuación y el orden buscan conservar el paralelismo contrastivo del griego: no... sino....'
