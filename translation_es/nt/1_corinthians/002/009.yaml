    text: O «como está escrito».
    reason: alternative_reading
  - marker: b
    text: Lit. «oído», singular genérico en paralelismo con «ojo»; en español se expresa naturalmente como «ningún oído».
    reason: lexical_alternative
  - marker: c
    text: O «ha subido al corazón del hombre»; el griego es literalmente «no subió sobre/al corazón del hombre».
    reason: lexical_alternative
  revision_rationale: Se corrige la frase auditivamente más débil («ni oído ha oído») por una formulación idiomática y fiel en español. También se alinea la cláusula del corazón con la revisión inglesa documentada, manteniendo en nota la opción más literal. La puntuación se ajusta para una lectura más natural y para reflejar mejor la estructura correlativa del griego.
