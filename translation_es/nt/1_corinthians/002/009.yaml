translation:
  language: es
  text: 'Pero, tal como está escrito[a]: «Lo que ningún ojo ha visto, y ningún oído ha oído[b], y no ha entrado en el corazón del hombre[c]—lo que Dios ha preparado para los que lo aman»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como está escrito».
    reason: alternative_reading
  - marker: b
    text: Lit. «oído», singular genérico en paralelismo con «ojo»; en español se expresa naturalmente como «ningún oído».
    reason: lexical_alternative
  - marker: c
    text: O «ha subido al corazón del hombre»; el griego es literalmente «no subió sobre/al corazón del hombre».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Más bien
  - Sino
  lexicon: BDAG
  rationale: Introduce un contraste directo con lo anterior; «Pero» es la equivalencia natural y sobria en español.
- source_word: καθὼς γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justo como está escrito
  lexicon: BDAG
  rationale: Conserva la fórmula de cita bíblica con un español idiomático y fiel al valor perfecto de γέγραπται.
- source_word: Ἃ ... ὅσα
  english_pob_choice: What ... what
  chosen_spanish: Lo que ... lo que
  alternatives_spanish:
  - Las cosas que ... las cosas que
  - Aquello que ... aquello que
  lexicon: BDAG
  rationale: Mantiene la estructura correlativa neutra y su efecto resumptivo sin volverla innecesariamente rígida.
- source_word: ὀφθαλμὸς
  english_pob_choice: eye
  chosen_spanish: ojo
  alternatives_spanish:
  - vista
  lexicon: BDAG
  rationale: «Ojo» reproduce el sustantivo singular genérico del griego y preserva el paralelismo poético con «oído».
- source_word: οὖς
  english_pob_choice: ear
  chosen_spanish: oído
  alternatives_spanish:
  - oído humano
  - oreja
  lexicon: BDAG
  rationale: «Oído» funciona de modo natural en español para el órgano de la audición y conserva el paralelismo con «ojo».
- source_word: ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη
  english_pob_choice: has not entered into the heart of man
  chosen_spanish: ha subido al corazón del hombre
  alternatives_spanish:
  - ha entrado en el corazón del hombre
  - ha llegado al corazón del hombre
  - ha pasado por el corazón del hombre
  lexicon: BDAG
  rationale: «Subir al corazón» sigue más de cerca la imagen verbal de ἀνέβη (subió) y conserva la metáfora sin sustituirla por una paráfrasis menos transparente. Se mantiene «corazón» para no rebajar la antropología bíblica a «mente».
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Nombre común teológico estándar y directamente equivalente al griego.
- source_word: τοῖς ἀγαπῶσιν αὐτόν
  english_pob_choice: for those who love him
  chosen_spanish: para los que lo aman
  alternatives_spanish:
  - para quienes lo aman
  - para los que le aman
  lexicon: BDAG
  rationale: Respeta el participio presente como descripción continua y usa una construcción natural en español.
theological_decisions:
- issue: Metáfora de la percepción y del movimiento hacia el corazón
  english_pob_reading: has not entered into the heart of man
  chosen_spanish_reading: ha subido al corazón del hombre
  alternative_spanish_readings:
  - ha entrado en el corazón del hombre
  - ha ocurrido al corazón del hombre
  rationale: La elección conserva la imagen verbal del griego y la tensión poética entre lo percibido por los sentidos y lo que Dios prepara; no se sustituye por una explicación conceptualizante.
  doctrine_reference: Translation philosophy §2 (source transparency and metaphor retention)
- issue: Forma genérica singular de ἀνθρώπου
  english_pob_reading: man’s heart
  chosen_spanish_reading: del hombre
  alternative_spanish_readings:
  - humano
  - de la persona
  rationale: Se conserva el singular genérico presente en el griego, siguiendo la práctica del POB de no aplanar el valor representativo cuando la forma fuente lo marca.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Cita escrita y cierre con promesa divina
  english_pob_reading: what God has prepared for those who love him
  chosen_spanish_reading: lo que Dios ha preparado para los que lo aman
  alternative_spanish_readings:
  - lo que Dios tiene preparado para los que lo aman
  - lo que Dios preparó para los que lo aman
  rationale: La forma elegida conserva el perfecto con relevancia actual sin forzar una explicación adicional; el sentido es de una preparación ya realizada con efecto presente.
  doctrine_reference: Translation philosophy §1 (tense and aspect preservation)
translation_notes:
  revision_awareness: El inglés POB revisó la cláusula central de «has not arisen in man’s heart» a «has not entered into the heart of man» para mayor correspondencia con ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη. La versión española sigue esa línea al conservar la metáfora de movimiento («ha subido al corazón del hombre») en vez de convertirla en una explicación abstracta.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no un equivalente ceremonial distinto, porque el texto no requiere máscara nominal.
  - Se conserva la secuencia poética de tres miembros negativos y una cláusula final explicativa.
  - «Lo que» evita introducir sustantivos no presentes en el griego y mantiene el carácter neutro plural de Ἃ / ὅσα.
  - Se opta por «el hombre» en singular genérico para reflejar ἀνθρώπου sin convertirlo en plural o en una formulación abstracta.
