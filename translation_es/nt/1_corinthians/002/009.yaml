revisions:
- from: 'Pero, tal como está escrito[a]: «Lo que ningún ojo ha visto, ni oído ha oído[b], ni ha subido al corazón del hombre: lo que Dios ha preparado para los que lo aman»'
  to: 'Pero, tal como está escrito[a]: «Lo que ningún ojo ha visto, y ningún oído ha oído[b], y no ha entrado en el corazón del hombre[c]—lo que Dios ha preparado para los que lo aman»'
  rationale: Se corrige la frase auditivamente más débil («ni oído ha oído») por una formulación idiomática y fiel en español. También se alinea la cláusula del corazón con la revisión inglesa documentada, manteniendo en nota la opción más literal. La puntuación se ajusta para una lectura más natural y para reflejar mejor la estructura correlativa del griego.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:11:52Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien la estructura principal del griego: contraste inicial, fórmula de cita, paralelismo de ojo/oído/corazón, y cierre con la acción de Dios para quienes lo aman. Sin embargo, hay dos desajustes importantes: «ni oído ha oído» es una formulación antinatural y menos fiel al singular genérico esperado en español; y la nota [a] no corresponde al matiz de «tal como» frente a «como» con suficiente precisión. Además, la puntuación puede ajustarse para reflejar mejor la cita y la pausa antes de la cláusula resumptiva final.'
  spanish_quality_summary: El español es mayormente claro, pero «ni oído ha oído» suena forzado y poco idiomático; «ningún oído ha oído» o «ningún oído ha escuchado» sería mejor, y la primera opción preserva más estrechamente el verbo de percepción auditiva del patrón. «Ha subido al corazón del hombre» es comprensible, aunque algo marcado; dado que el proyecto inglés revisado prefirió «ha entrado en el corazón del hombre», conviene alinear el español con esa decisión documentada para mayor naturalidad y coherencia audit trail. También es preferible usar coma larga o raya antes de la cláusula final en vez de dos puntos dentro de la cita.
  glossary_alignment: 'No hay conflictos con la terminología del proyecto: θεός -> «Dios» está bien; ἀνθρώπου como singular genérico puede mantenerse como «del hombre» según la decisión teológica documentada. No hay términos sensibles como Yahvé/Mesías/Espíritu en este versículo. La única alineación pendiente es respetar mejor la decisión inglesa auditada para ἐπὶ καρδίαν ἀνθρώπου οὐκ ἀνέβη mediante «ha entrado en el corazón del hombre», con nota alternativa si se desea conservar la literalidad posible.'
  issues:
  - severity: high
    issue: «ni oído ha oído» es una construcción deficiente
    rationale: Aunque intenta mantener el singular genérico, en español resulta extraña y menos inteligible que «ningún oído ha oído». La versión actual afecta la legibilidad y no reproduce bien el paralelismo idiomático con «ningún ojo ha visto».
  - severity: medium
    issue: La traducción «ha subido al corazón del hombre» no sigue la revisión auditada del POB inglés
    rationale: El historial inglés revisó la cláusula a «has not entered into the heart of man» por correspondencia léxica y naturalidad formal. En español, «ha entrado en el corazón del hombre» refleja mejor esa decisión documentada y evita una expresión menos natural.
  - severity: low
    issue: La nota [a] es demasiado débil en relación con «tal como está escrito»
    rationale: La alternativa «como está escrito» sí es válida, pero la nota puede formularse con mayor claridad como variante más breve de la fórmula de cita, no como simple repetición mínima.
  - severity: low
    issue: Los dos puntos dentro de la cita son menos naturales que una raya
    rationale: La cláusula final «lo que Dios ha preparado...» retoma y explica el relativo inicial; una raya larga refleja mejor la pausa resumptiva que un colon en español bíblico moderno.
  revised_spanish_text: 'Pero, tal como está escrito[a]: «Lo que ningún ojo ha visto, y ningún oído ha oído[b], y no ha entrado en el corazón del hombre[c]—lo que Dios ha preparado para los que lo aman»'
  revised_footnotes:
