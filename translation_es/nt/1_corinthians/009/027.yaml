translation:
  language: es
  text: Pero disciplino mi cuerpo y lo hago mi esclavo[a], no sea que, después de haber predicado a otros[c][b], yo mismo quede descalificado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «lo aporreo» o «lo golpeo bajo el ojo»; el verbo griego literalmente se refiere a golpear debajo del ojo, y aquí se usa metafóricamente para una disciplina severa.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «lo esclavizo» / «lo pongo en esclavitud».'
    reason: lexical_alternative
  - marker: c
    text: 'O: «rechazado» o «no aprobado»; «descalificado» encaja mejor con la imagen atlética del contexto.'
    reason: alternative_reading
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Mas
  - Sino
  lexicon: BDAG
  rationale: La idea es de fuerte contraste con la imagen anterior; en español, «Pero» suena natural y conserva la oposición retórica sin endurecer innecesariamente el tono.
- source_word: ὑπωπιάζω
  english_pob_choice: discipline
  chosen_spanish: disciplino
  alternatives_spanish:
  - golpeo bajo el ojo
  - maltrato
  - castigo
  lexicon: BDAG
  rationale: El verbo griego alude literalmente a golpear debajo del ojo, pero aquí funciona metafóricamente para una disciplina severa del propio cuerpo. «Disciplino» conserva la fuerza ascética sin introducir una imagen demasiado cruda o física como sentido principal.
- source_word: σῶμα
  english_pob_choice: body
  chosen_spanish: cuerpo
  alternatives_spanish:
  - persona
  - yo
  - naturaleza humana
  lexicon: BDAG
  rationale: Pablo nombra explícitamente el cuerpo como objeto de la disciplina; «cuerpo» mantiene la concreción del término griego y evita diluir la imagen.
- source_word: δουλαγωγῶ
  english_pob_choice: make it my slave
  chosen_spanish: lo hago mi esclavo
  alternatives_spanish:
  - lo esclavizo
  - lo pongo en esclavitud
  - lo hago servir
  lexicon: BDAG
  rationale: Se preserva el lenguaje fuerte de esclavitud que el griego expresa. En este contexto, «mi esclavo» comunica con claridad la metáfora de sujeción total, sin suavizarla a «controlarlo» o «domarlo».
- source_word: μή πως
  english_pob_choice: lest somehow
  chosen_spanish: no sea que
  alternatives_spanish:
  - para que no
  - por si acaso no
  - de modo que no
  lexicon: BDAG
  rationale: La expresión introduce una finalidad temida o una posible consecuencia negativa. «No sea que» reproduce bien esa cautela en español.
- source_word: ἄλλοις
  english_pob_choice: to others
  chosen_spanish: a otros
  alternatives_spanish:
  - a los demás
  - a otras personas
  lexicon: BDAG
  rationale: El dativo con el verbo de anunciar se vierte de forma natural como «a otros», manteniendo la referencia amplia sin añadir matices no presentes.
- source_word: κηρύξας
  english_pob_choice: after preaching
  chosen_spanish: después de haber predicado
  alternatives_spanish:
  - tras predicar
  - habiendo predicado
  - después de proclamar
  lexicon: BDAG
  rationale: El participio aoristo antecede a la acción principal; «después de haber predicado» expresa con claridad esa relación temporal y conserva el sentido de anuncio público de κηρύσσω.
- source_word: ἀδόκιμος
  english_pob_choice: disqualified
  chosen_spanish: descalificado
  alternatives_spanish:
  - reprobado
  - rechazado
  - no aprobado
  lexicon: BDAG
  rationale: En el marco atlético y de autoevaluación del pasaje, «descalificado» transmite la idea de no quedar apto tras la prueba sin resolver la tensión teológica sobre salvación o recompensa. Es una opción natural en español para conservar la imagen competitiva.
- source_word: γένωμαι
  english_pob_choice: should become
  chosen_spanish: quede
  alternatives_spanish:
  - llegue a ser
  - me vuelva
  - resulto
  lexicon: BDAG
  rationale: El subjuntivo aoristo con μή πως expresa un resultado temido. «Quede descalificado» suena natural en español y preserva el valor prospectivo del verbo.
theological_decisions:
- issue: Sentido de ἀδόκιμος en el temor de Pablo
  english_pob_reading: Rendered as 'disqualified' in an athletic/ministry-testing sense, without specifying loss of salvation or mere loss of reward.
  chosen_spanish_reading: «Descalificado» en sentido atlético y de examen/aprobación, sin precisar si se trata de pérdida de recompensa, incapacidad ministerial o un rechazo final.
  alternative_spanish_readings:
  - reprobado en sentido salvífico
  - no aprobado para el ministerio
  - rechazado definitivamente
  rationale: El contexto inmediato es el de disciplina corporal y competencia atlética; por eso conviene mantener la ambigüedad respetando la seriedad de la advertencia. «Descalificado» evita cerrar una discusión doctrinal que el griego no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica sin resolverla más allá del texto.
translation_notes:
  revision_awareness: El cotejo más reciente indica alta concordancia y no señala cambios necesarios; este borrador sigue la lectura de la POB inglesa, preservando sus decisiones léxicas y la tensión teológica de ἀδόκιμος sin suavizar el lenguaje de esclavitud ni resolver el matiz final del pasaje.
  spanish_consistency_notes:
  - Se mantiene «cuerpo» para σῶμα, no una paráfrasis como «yo» o «naturaleza humana».
  - Se conserva el lenguaje fuerte de esclavitud en δουλαγωγῶ, coherente con la terminología POB.
  - «Descalificado» se eligió por su naturalidad en español y su correspondencia con el marco atlético del contexto.
  - La puntuación reproduce una cláusula de propósito negativa natural en español con «no sea que».
