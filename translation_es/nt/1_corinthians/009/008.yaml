translation:
  language: es
  text: ¿Acaso hablo de estas cosas desde una perspectiva meramente humana[a], o no dice también la Ley estas cosas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'según el hombre' / 'desde un punto de vista humano'.
    reason: lexical_alternative
lexical_decisions:
- source_word: Μὴ κατὰ ἄνθρωπον
  english_pob_choice: from a merely human perspective
  chosen_spanish: según el hombre
  alternatives_spanish:
  - desde una perspectiva meramente humana
  - de un modo puramente humano
  - según criterios humanos
  lexicon: BDAG; uso idiomático de κατά + acusativo
  rationale: La pregunta griega espera una respuesta negativa y contrasta el origen humano con la autoridad de la Ley. 'Según el hombre' conserva la fuerza idiomática y la oposición de fuente/criterio sin añadir explicaciones al texto principal.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  lexicon: BDAG
  rationale: El plural demuestra que Pablo alude a su argumentación precedente. 'Estas cosas' conserva el número y la referencia discursiva.
- source_word: λαλῶ
  english_pob_choice: am saying
  chosen_spanish: hablo
  alternatives_spanish:
  - estoy diciendo
  - estoy hablando
  lexicon: BDAG
  rationale: En español, 'hablo de estas cosas' comunica de forma natural la acción discursiva presente de Pablo. Se mantiene el matiz de exposición actual sin forzar un calco.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - o más bien
  lexicon: BDAG
  rationale: La conjunción introduce la alternativa retórica entre una fuente meramente humana y el testimonio de la Ley.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - incluso
  lexicon: BDAG
  rationale: '''También'' reproduce la suma argumentativa: la Ley se añade como testigo adicional.'
- source_word: ὁ νόμος
  english_pob_choice: the Law
  chosen_spanish: la Ley
  alternatives_spanish:
  - la ley
  - la Ley de Moisés
  lexicon: BDAG
  rationale: En este contexto paulino, el referente es la Ley escritural que se citará en el versículo siguiente. 'La Ley' conserva el valor canónico sin sobreespecificar.
- source_word: οὐ λέγει
  english_pob_choice: does not ... say
  chosen_spanish: no dice
  alternatives_spanish:
  - ¿no dice?
  - ¿acaso no dice?
  lexicon: BDAG
  rationale: La pregunta retórica en español se expresa naturalmente con '¿acaso... o no dice...?', preservando la expectativa de respuesta afirmativa implícita en el griego.
theological_decisions:
- issue: Referencia de 'la Ley'
  english_pob_reading: '''the Law'' refers to the Mosaic Law / scriptural legal corpus, not merely law in a general sense'
  chosen_spanish_reading: '''la Ley'' refiere al corpus escritural mosaico, no a la ley en sentido genérico'
  alternative_spanish_readings:
  - la ley como principio general
  - la ley humana
  rationale: El contexto inmediato citará Deuteronomio 25:4, así que la alusión es a la Ley bíblica. Mantener 'la Ley' respeta el vínculo canónico y evita diluirlo en una noción abstracta.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: El pasaje griego y el audit trail inglés muestran alta concordancia; no se requieren revisiones textuales. La principal decisión española es conservar el giro idiomático κατὰ ἄνθρωπον con una formulación breve y natural que no borre el contraste retórico con 'la Ley'.
  spanish_consistency_notes:
  - Se usa 'Ley' con mayúscula para reflejar el referente escriturario paulino.
  - Se evita 'Cristo', 'SEÑOR' u այլ terminología no presente en el versículo.
  - Se mantiene el plural 'estas cosas' para reflejar ταῦτα.
  - La pregunta se vierte con estructura interrogativa natural en español sin perder la expectativa de negación implícita.
