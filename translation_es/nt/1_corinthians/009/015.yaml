translation:
  language: es
  text: Pero no me he servido de ninguna de estas cosas[a]. Sin embargo, no escribí estas cosas para que así se haga conmigo; porque prefiero morir antes que—nadie anulará mi jactancia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más explícitamente según el contexto, «ninguno de estos derechos».
    reason: lexical_alternative
  - marker: b
    text: 'El griego se interrumpe después de «antes que—» y luego retoma: «mi jactancia nadie la anulará». Muchas traducciones suavizan la frase como «antes que alguien anule mi jactancia».'
    reason: alternative_reading
lexical_decisions:
- source_word: κέχρημαι
  english_pob_choice: have made use of
  chosen_spanish: me he servido de
  alternatives_spanish:
  - he usado
  - he aprovechado
  lexicon: BDAG
  rationale: El perfecto medio indica una acción pasada con efecto presente. En español, «me he servido de» comunica el uso efectivo de algo sin introducir la idea de abuso. Conserva el matiz relacional y práctico del griego.
- source_word: οὐδενὶ τούτων
  english_pob_choice: none of these things
  chosen_spanish: ninguna de estas cosas
  alternatives_spanish:
  - ninguno de estos derechos
  - ninguna de estas provisiones
  lexicon: BDAG
  rationale: El referente inmediato son los derechos de sostén y prerrogativas tratados en el contexto. «Cosas» sigue de cerca el griego y deja visible que el referente se determina por el contexto, no por una glosa interpretativa en el texto principal.
- source_word: ἔγραψα ... ταῦτα
  english_pob_choice: I did not write these things
  chosen_spanish: no escribí esto
  alternatives_spanish:
  - no he escrito esto
  lexicon: BDAG
  rationale: El aoristo se vierte naturalmente como pasado simple. En español, «esto» recoge el bloque argumentativo anterior sin sobrecargar el verso con repetición.
- source_word: ἵνα οὕτως γένηται ἐν ἐμοί
  english_pob_choice: so that it should be done this way for me
  chosen_spanish: para que así se haga en mí
  alternatives_spanish:
  - para que así me suceda
  - para que así ocurra en mi caso
  lexicon: BDAG
  rationale: La cláusula es compacta y algo abrupta. «Para que así se haga en mí» mantiene la finalidad de ἵνα y la pasiva/resultativa de γένηται con ἐν ἐμοί, sin suavizar demasiado el giro ni reemplazarlo por una paráfrasis explicativa.
- source_word: καλὸν ... μᾶλλον ἀποθανεῖν
  english_pob_choice: for I would rather die
  chosen_spanish: porque mejor me es morir
  alternatives_spanish:
  - porque prefiero morir
  - porque me sería mejor morir
  lexicon: BDAG
  rationale: El griego expresa preferencia con una formulación evaluativa. «Mejor me es morir» conserva el valor comparativo de καλὸν ... μᾶλλον y su tono enfático, más cercano al relieve retórico del original que una simple paráfrasis de preferencia.
- source_word: τὸ καύχημά μου
  english_pob_choice: my boasting
  chosen_spanish: mi jactancia
  alternatives_spanish:
  - mi motivo de jactancia
  - mi razón de gloriarme
  lexicon: BDAG
  rationale: καύχημα puede referir el acto, el objeto o la base del jactarse. Aquí se trata del contenido de la jactancia paulina, y «jactancia» conserva la fuerza verbal de καυχάομαι sin recurrir de forma automática a «gloria» o «boast» en sentido devocional más suave.
- source_word: κενώσει
  english_pob_choice: will nullify
  chosen_spanish: nadie la dejará vacía
  alternatives_spanish:
  - nadie la anulará
  - nadie la vaciará
  lexicon: BDAG
  rationale: El verbo significa literalmente «vaciar» y, por extensión, «anular» o dejar sin efecto. En español, «dejará vacía» conserva la metáfora del vacío y encaja bien con el antecedente «mi jactancia», manteniendo el impacto retórico de la imagen.
theological_decisions:
- issue: Sintaxis abrupta tras ἤ
  english_pob_reading: Represent the dash to preserve Paul's emotional interruption rather than smoothing into a fully regular sentence.
  chosen_spanish_reading: 'Conservar el guion largo y la frase inconclusa: «que—mi jactancia, nadie la dejará vacía».'
  alternative_spanish_readings:
  - porque mejor me es morir que nadie vacíe mi jactancia
  - porque mejor me es morir—nadie vaciará mi jactancia
  rationale: El griego se interrumpe después de ἤ («que—»), produciendo un anacoluto visible. Mantener esa quiebra en español preserva la intensidad retórica y evita resolver artificialmente una sintaxis que el propio texto deja abierta.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego SBLGNT y toma como contexto auditado la solución inglesa revisada: contraste con δέ como «Pero / Y», verbo κενόω con valor metafórico de vaciar/anular, y preservación del quiebre sintáctico tras ἤ. Se eligieron equivalentes españoles que sostienen el mismo relieve retórico sin traducir mecánicamente desde el inglés.'
  spanish_consistency_notes:
  - Se mantiene «Dios/Yahvé/Mesías» como norma del proyecto, pero este verso no los contiene.
  - «Jactancia» se usa para καύχημα siguiendo el valor lexical, no como elogio pío.
  - El orden y la puntuación intentan reproducir la interrupción final del griego sin hacerlo opaco para un lector de iglesia.
