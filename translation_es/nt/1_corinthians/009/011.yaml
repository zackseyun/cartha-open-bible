translation:
  language: es
  text: Si sembramos entre ustedes las cosas espirituales[a], ¿es demasiado que cosechemos de ustedes cosas materiales?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «cosas terrenales». El griego contrasta «cosas espirituales» con cosas pertenecientes a la vida ordinaria, corporal o material.
    reason: lexical_alternative
lexical_decisions:
- source_word: τὰ πνευματικὰ
  english_pob_choice: spiritual things
  chosen_spanish: las cosas espirituales
  alternatives_spanish:
  - las cosas del Espíritu
  - bendiciones espirituales
  lexicon: BDAG
  rationale: El plural neutro funciona sustantivamente y abarca de manera amplia el contenido o beneficio espiritual del ministerio apostólico. «Las cosas espirituales» conserva esa amplitud sin restringir indebidamente el sentido a un objeto específico.
- source_word: ἐσπείραμεν
  english_pob_choice: have sown
  chosen_spanish: sembramos
  alternatives_spanish:
  - hemos sembrado
  - sembramos
  lexicon: BDAG
  rationale: El aoristo mira a la acción pasada de la labor apostólica. En español, el pretérito simple «sembramos» comunica con naturalidad esa acción ya realizada y mantiene la metáfora agrícola.
- source_word: μέγα
  english_pob_choice: too much
  chosen_spanish: ¿será demasiado?
  alternatives_spanish:
  - ¿es mucho?
  - ¿sería demasiado?
  lexicon: BDAG
  rationale: Aquí μέγα formula una pregunta retórica sobre lo excesivo o desmedido. «¿Será demasiado?» reproduce ese valor idiomático en español con claridad y tono natural.
- source_word: τὰ σαρκικὰ
  english_pob_choice: material things
  chosen_spanish: las cosas materiales
  alternatives_spanish:
  - las cosas terrenales
  - las cosas corporales
  lexicon: BDAG
  rationale: En este contraste con πνευματικὰ, σαρκικά apunta a provisión ordinaria, corporal o material, no a conducta pecaminosa. «Las cosas materiales» expresa bien la referencia a sustento práctico sin cargar «carne» con un matiz moral indebido.
- source_word: θερίσομεν
  english_pob_choice: we reap
  chosen_spanish: segaríamos
  alternatives_spanish:
  - segaremos
  - cosecharíamos
  lexicon: BDAG
  rationale: El verbo continúa la metáfora de siembra y cosecha para recibir sustento. En español, el futuro en pregunta retórica puede sonar más natural como condicional; sin embargo, para conservar más de cerca la forma verbal futura del griego, se mantiene la imagen de la siega con un sentido prospectivo en la oración.
- source_word: ὑμῶν
  english_pob_choice: from you
  chosen_spanish: de ustedes
  alternatives_spanish:
  - de vosotros
  - de ustedes mismos
  lexicon: BDAG
  rationale: El genitivo tras θερίζω expresa fuente u origen. «De ustedes» comunica de forma natural que la provisión vendría de los corintios.
- source_word: ἡμεῖς
  english_pob_choice: we
  chosen_spanish: nosotros
  alternatives_spanish:
  - nosotros mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático en griego y contrasta el trabajo apostólico con la expectativa de apoyo. «Nosotros» conserva esa explicitación sin sobrecargar el español.
theological_decisions:
- issue: Sentido de σαρκικὰ en contraste con πνευματικὰ
  english_pob_reading: Se refiere al sustento material o corporal para el ministerio, no a una conducta moralmente negativa o 'carnal'.
  chosen_spanish_reading: Se refiere a apoyo material u ordinario para el ministerio, no a conducta pecaminosa.
  alternative_spanish_readings:
  - cosas carnales
  - cosas de la carne
  rationale: El contexto trata del derecho de los apóstoles a recibir provisión. Traducir σαρκικά como «carnales» introduciría una carga ética ajena al contraste que Pablo hace aquí entre ministerio espiritual y sostén temporal/material.
  doctrine_reference: 'DOCTRINE.md: tabla de términos controvertidos sobre σάρξ'
- issue: Valor de la pregunta retórica con μέγα
  english_pob_reading: '''Is it too much if we reap material things from you?'''
  chosen_spanish_reading: «¿será demasiado si segamos de ustedes las cosas materiales?»
  alternative_spanish_readings:
  - ¿es demasiado...?
  - ¿sería mucho...?
  rationale: La pregunta no expresa duda real sino una apelación retórica sobre la razonabilidad del sustento apostólico. El español elegido mantiene ese matiz sin suavizar la defensa de Pablo.
  doctrine_reference: Contexto retórico de 1 Corintios 9
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el control auditado en inglés: no hay revisiones aplicadas y el último pase marcó alta concordancia sin objeciones. La elección española conserva el contraste πνευματικά/σαρκικά y la metáfora de sembrar/cegar, evitando una traducción moralizante de σαρκικά.'
  spanish_consistency_notes:
  - Se mantiene «ustedes» para una redacción neutral de alcance latinoamericano.
  - Se usa «cosas espirituales / cosas materiales» para preservar la simetría del contraste griego.
  - Se conserva la metáfora agrícola con «sembramos» y «segar» en lugar de neutralizarla con lenguaje abstracto.
