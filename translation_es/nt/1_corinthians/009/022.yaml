review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: repetición de «débil/débiles», propósito con «para», perfecto en «me he hecho», y finalidad evangelística con «salve a algunos». También conserva adecuadamente la nota sobre «los débiles en conciencia». Sin embargo, dos elecciones españolas debilitan la alineación fina con el audit trail: «para todos» debería ser «a todos» para corresponder mejor a τοῖς πᾶσιν (‘to all [people]’), y «de todos modos» no comunica con suficiente precisión el valor de πάντως como ‘por todos los medios / de toda manera posible’.'
  spanish_quality_summary: El español es claro y legible, pero «Me he hecho todo para todos» suena menos natural y menos fiel al giro conocido que «todo a todos». Además, «de todos modos» en español suele entenderse como ‘de cualquier manera / anyway’, lo que introduce una ambigüedad ajena al texto. Un ajuste menor mejora naturalidad y precisión sin perder dignidad.
  glossary_alignment: 'No hay conflictos con la terminología principal del proyecto. «Débiles», «ganar» y «salve» están bien escogidos. La única desviación relevante es la decisión léxica para τοῖς πᾶσιν: el propio expediente inglés justifica ‘to all people’, por lo que en español conviene «a todos», no «para todos». Para πάντως, la alternativa documentada «por todos los medios» es preferible en español a «de todos modos».'
  issues:
  - severity: medium
    issue: «para todos» para τοῖς πᾶσιν
    rationale: El dativo relacional se vierte mejor como «a todos». «Para todos» sugiere finalidad o beneficio, no adaptación hacia todas las personas.
  - severity: medium
    issue: «de todos modos» para πάντως
    rationale: En español, «de todos modos» suele significar ‘anyway’, mientras que aquí πάντως expresa usar todos los medios posibles para alcanzar el fin. «Por todos los medios» o «de toda manera» comunica mejor el sentido documentado.
  - severity: low
    issue: Naturalidad idiomática de «todo para todos»
    rationale: Aunque entendible, la expresión más natural y estable en español bíblico actual es «todo a todos», que además armoniza con el ajuste de τοῖς πᾶσιν.
  revised_spanish_text: A los débiles me hice débil[a], para ganar a los débiles. Me he hecho todo a todos[b], para que por todos los medios salve a algunos.
  revised_footnotes:
  - marker: a
    text: O «los débiles en conciencia»; en 1 Corintios esta expresión puede referirse específicamente a quienes tienen una conciencia vulnerable.
    reason: alternative_reading
  - marker: b
    text: O «en toda manera» o «a toda costa»; la frase expresa el uso de todos los medios posibles en busca del objetivo.
    reason: lexical_alternative
  revision_rationale: 'La revisión corrige dos puntos de precisión semántica y de idiomaticidad: «a todos» refleja mejor τοῖς πᾶσιν, y «por todos los medios» transmite con mayor fidelidad el valor de πάντως según el expediente inglés y el griego. También se ajusta el giro a la forma más natural «todo a todos».'
