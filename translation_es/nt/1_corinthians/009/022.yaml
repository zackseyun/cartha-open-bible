translation:
  language: es
  text: A los débiles me hice débil[a], para ganar a los débiles. Me he hecho todo a todos[b], para que por todos los medios salve a algunos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los débiles en conciencia»; en 1 Corintios esta expresión puede referirse específicamente a quienes tienen una conciencia vulnerable.
    reason: alternative_reading
  - marker: b
    text: O «en toda manera» o «a toda costa»; la frase expresa el uso de todos los medios posibles en busca del objetivo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐγενόμην
  english_pob_choice: I became
  chosen_spanish: me hice
  alternatives_spanish:
  - me volví
  - llegué a ser
  lexicon: BDAG
  rationale: El aoristo medio de γίνομαι expresa que Pablo entró en una condición o postura adaptativa; en español, «me hice» comunica bien ese cambio asumido en su ministerio sin sonar demasiado rígido.
- source_word: ἀσθενέσιν / ἀσθενής / ἀσθενεῖς
  english_pob_choice: weak
  chosen_spanish: débiles
  alternatives_spanish:
  - los débiles en conciencia
  - los que son débiles
  lexicon: BDAG
  rationale: Se conserva la repetición retórica del adjetivo con «débiles». No se restringe en el texto principal a «en conciencia», porque el griego y el contexto inmediato permiten un alcance más amplio, aunque esa posibilidad queda abierta por nota.
- source_word: κερδήσω
  english_pob_choice: I might win
  chosen_spanish: ganar
  alternatives_spanish:
  - ganar para Cristo
  - obtener
  lexicon: BDAG
  rationale: En el contexto paulino, κερδαίνω tiene fuerza de ganar a personas, no solo de obtener ventaja. «Ganar» reproduce esa idea de manera natural en español.
- source_word: τοῖς πᾶσιν
  english_pob_choice: to all people
  chosen_spanish: para todos
  alternatives_spanish:
  - a todos
  - para toda clase de personas
  lexicon: BDAG
  rationale: La construcción griega es elíptica; en español, «para todos» transmite la amplitud sin añadir innecesariamente una palabra como «personas», que no está explícita en el griego.
- source_word: γέγονα
  english_pob_choice: I have become
  chosen_spanish: me he hecho
  alternatives_spanish:
  - me hice
  - he llegado a ser
  lexicon: BDAG
  rationale: El perfecto indica un estado resultante de una conducta ya asumida; «me he hecho» preserva mejor ese matiz que un simple pasado.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - todo cuanto
  lexicon: BDAG
  rationale: La expresión idiomática «todo para todos» suena más natural en español y conserva la amplitud del griego sin forzar una literalidad pesada.
- source_word: πάντως
  english_pob_choice: by all means
  chosen_spanish: de todos modos
  alternatives_spanish:
  - por todos los medios
  - en toda manera
  lexicon: BDAG
  rationale: «De todos modos» comunica la idea de emplear cualquier medio posible dentro del propósito, sin introducir una noción de concesión moral indebida. Se mantiene la cautela del valor adverbial griego.
- source_word: τινὰς
  english_pob_choice: some
  chosen_spanish: algunos
  alternatives_spanish:
  - unos pocos
  - ciertos
  lexicon: BDAG
  rationale: «Algunos» reproduce la modestia del indefinido griego y evita exagerar el alcance de la acción de Pablo.
- source_word: σώσω
  english_pob_choice: I might save
  chosen_spanish: salve
  alternatives_spanish:
  - salvar
  - traer a salvación
  lexicon: BDAG
  rationale: En este contexto evangelístico, σῴζω conserva su peso soteriológico. «Salve» mantiene la relación con la salvación sin convertir a Pablo en agente último.
theological_decisions:
- issue: Alcance de «los débiles»
  english_pob_reading: Render broadly as 'the weak' without narrowing in the main text.
  chosen_spanish_reading: Mantener «los débiles» sin cerrar el sentido a «los débiles en conciencia» en el texto principal.
  alternative_spanish_readings:
  - los débiles en conciencia
  - los incapaces
  rationale: En 1 Corintios el término puede incluir a los de conciencia vulnerable, especialmente en el bloque 8–10, pero el versículo por sí solo no obliga a esa restricción. Se preserva la tensión interpretativa.
  doctrine_reference: Mantener la amplitud del texto; no resolver más de lo que el griego dice.
- issue: Fuerza de «salvar»
  english_pob_reading: Use 'save' in the main text for Paul's evangelistic aim.
  chosen_spanish_reading: Usar «salve» en el texto principal para conservar el lenguaje de salvación.
  alternative_spanish_readings:
  - ayude a salvar
  - lleve a salvación
  rationale: σῴζω aquí tiene fuerza real de salvación; suavizarlo debilitaría el enunciado. Al mismo tiempo, la redacción no convierte a Pablo en la causa final de la salvación, sino en un medio instrumental.
  doctrine_reference: Equivalencia óptima; no importar afirmaciones doctrinales que el versículo no formula.
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del criterio auditado en la fuente inglesa, y se preserva la misma amplitud semántica y la misma tensión lexical en español.'
  spanish_consistency_notes:
  - Se mantiene «débiles» de forma reiterada para reflejar el paralelismo del griego.
  - Se conserva el contraste entre el estado asumido por Pablo («me hice / me he hecho») y su propósito («ganar», «salve»).
  - La expresión final «de todos modos» se usa como equivalente idiomático de πάντως sin introducir una concesión ética.
  - La puntuación respeta el flujo de dos cláusulas finales con «para que».
