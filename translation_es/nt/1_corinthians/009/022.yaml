revisions:
- from: A los débiles me hice débil[a], para ganar a los débiles. Me he hecho todo para todos[b], para que de todos modos salve a algunos.
  to: A los débiles me hice débil[a], para ganar a los débiles. Me he hecho todo a todos[b], para que por todos los medios salve a algunos.
  rationale: 'La revisión corrige dos puntos de precisión semántica y de idiomaticidad: «a todos» refleja mejor τοῖς πᾶσιν, y «por todos los medios» transmite con mayor fidelidad el valor de πάντως según el expediente inglés y el griego. También se ajusta el giro a la forma más natural «todo a todos».'
  reviewer_model: gpt-5.4
