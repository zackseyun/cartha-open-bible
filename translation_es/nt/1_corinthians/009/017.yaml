revisions:
- from: Porque si hago esto voluntariamente[a], tengo una recompensa; pero si involuntariamente, se me ha confiado una mayordomía.
  to: Porque si hago esto voluntariamente[a], tengo una recompensa; pero si no lo hago de buena voluntad, se me ha confiado una mayordomía.
  rationale: Se recomienda un ajuste menor para representar mejor ἄκων en español. «No lo hago de buena voluntad» preserva con más fidelidad el contraste con ἑκών y evita el falso matiz de accidentalidad que puede tener «involuntariamente». El resto del versículo puede mantenerse, incluida «mayordomía» como reflejo de οἰκονομία.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:01Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el griego y el rastro de auditoría en casi todo: «hago esto», «una recompensa» y «se me ha confiado» reflejan adecuadamente πράσσω, μισθόν y πεπίστευμαι. También preserva la tensión teológica entre servicio voluntario y responsabilidad encomendada. Sin embargo, «involuntariamente» para ἄκων en este contexto puede sugerir accidentalidad o falta de intención, mientras que el griego contrasta más bien «de buena gana / contra la voluntad».'
  spanish_quality_summary: El español es claro y digno, pero «si involuntariamente» suena algo brusco y menos natural que «si no lo hago de buena gana» o «si lo hago contra mi voluntad». Además, «mayordomía» es posible y fiel al proyecto, aunque en español eclesial contemporáneo puede sonar abstracto; aquí sigue siendo aceptable por su valor metafórico tradicional.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección de «mayordomía» para οἰκονομία concuerda con la decisión inglesa «stewardship». La mejora principal es ajustar ἄκων a una expresión española que preserve mejor la oposición con ἑκών sin introducir el matiz de acto no intencional.
  issues:
  - severity: medium
    issue: «involuntariamente» no representa con precisión ideal ἄκων en este contexto
    rationale: En español, «involuntariamente» suele sugerir «sin intención» o «accidentalmente». El griego ἄκων contrasta con ἑκών como «sin querer / contra la propia voluntad / no de buena gana», no como acción involuntaria en sentido mecánico.
  - severity: low
    issue: La nota al pie sobre ἑκών podría armonizar mejor con la cláusula opuesta
    rationale: La nota actual «de buena voluntad» es válida, y además ayuda a justificar una mejor formulación de la segunda cláusula en español, donde conviene mantener la oposición semántica más explícitamente.
  revised_spanish_text: Porque si hago esto voluntariamente[a], tengo una recompensa; pero si no lo hago de buena voluntad, se me ha confiado una mayordomía.
  revised_footnotes:
  - marker: a
    text: O «de buena voluntad».
    reason: lexical_alternative
  revision_rationale: Se recomienda un ajuste menor para representar mejor ἄκων en español. «No lo hago de buena voluntad» preserva con más fidelidad el contraste con ἑκών y evita el falso matiz de accidentalidad que puede tener «involuntariamente». El resto del versículo puede mantenerse, incluida «mayordomía» como reflejo de οἰκονομία.
