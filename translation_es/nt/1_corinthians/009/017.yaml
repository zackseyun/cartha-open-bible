translation:
  language: es
  text: Porque si hago esto voluntariamente[a], tengo una recompensa; pero si no lo hago de buena voluntad, se me ha confiado una mayordomía.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de buena voluntad».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἑκὼν
  english_pob_choice: willingly
  chosen_spanish: voluntariamente
  alternatives_spanish:
  - de buena voluntad
  - de manera voluntaria
  lexicon: BDAG
  rationale: ἑκών expresa acción hecha por propia voluntad, en contraste directo con ἄκων. «Voluntariamente» conserva ese contraste y resulta natural en español sin añadir matices emocionales que el griego no exige.
- source_word: τοῦτο πράσσω
  english_pob_choice: do this
  chosen_spanish: hago esto
  alternatives_spanish:
  - llevo a cabo esto
  - practico esto
  lexicon: BDAG
  rationale: πράσσω aquí señala la acción concreta que Pablo está realizando en el contexto inmediato. «Hago esto» es breve, idiomático y no sobredetermina el contenido más allá del pasaje.
- source_word: μισθὸν
  english_pob_choice: a reward
  chosen_spanish: una recompensa
  alternatives_spanish:
  - un salario
  - un pago
  lexicon: BDAG
  rationale: μισθός puede significar salario o recompensa. En este contexto, Pablo contrapone la idea de recompensa al trabajo voluntario, por lo que «una recompensa» preserva mejor el alcance semántico que un término meramente laboral.
- source_word: ἄκων
  english_pob_choice: unwillingly
  chosen_spanish: involuntariamente
  alternatives_spanish:
  - de mala gana
  - sin querer
  lexicon: BDAG
  rationale: ἄκων es el antónimo directo de ἑκών. «Involuntariamente» mantiene la simetría formal y evita añadir una carga subjetiva más fuerte que la del griego.
- source_word: οἰκονομίαν
  english_pob_choice: a stewardship
  chosen_spanish: una mayordomía
  alternatives_spanish:
  - una administración
  - una comisión
  - un encargo
  lexicon: BDAG
  rationale: οἰκονομία denota la administración de una encomienda o responsabilidad confiada. «Mayordomía» conserva la imagen de encargo administrado y es la opción más cercana al campo semántico sin reducirlo a «comisión».
- source_word: πεπίστευμαι
  english_pob_choice: I have been entrusted
  chosen_spanish: se me ha confiado
  alternatives_spanish:
  - he sido puesto a cargo de
  - se me ha encomendado
  lexicon: BDAG
  rationale: El perfecto pasivo de πιστεύω expresa que Pablo permanece en el estado de alguien a quien se le ha confiado algo. «Se me ha confiado» refleja la pasiva y el sentido resultativo de forma natural en español.
theological_decisions:
- issue: Tensión entre recompensa voluntaria y responsabilidad impuesta
  english_pob_reading: Paul states that even if he does not act willingly, he still remains under a divinely entrusted stewardship.
  chosen_spanish_reading: Pablo dice que, si actúa voluntariamente, tiene recompensa; pero si actúa involuntariamente, aun así permanece bajo una mayordomía confiada.
  alternative_spanish_readings:
  - '... aun así tiene un encargo confiado.'
  - '... aun así se le ha confiado una comisión.'
  rationale: La segunda cláusula no elimina la vocación o el llamamiento, sino que mantiene la tensión entre servicio voluntario y responsabilidad confiada. «Mayordomía» preserva esa relación sin resolverla con una lectura más denominacional o más administrativa de la necesaria.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; el estado de revisión más reciente indica que el texto permanece sin cambios y con alto acuerdo en la auditoría comparada.
  spanish_consistency_notes:
  - Se usa «recompensa» para μισθός, en coherencia con el valor recompensatorio del contexto.
  - Se usa «mayordomía» para οἰκονομία, manteniendo el matiz de responsabilidad administrada y no solo el de «comisión».
  - Se mantiene la antítesis voluntariamente / involuntariamente para reflejar ἑκών / ἄκων.
  - Se conserva una sintaxis sobria y publicable, sin introducir terminología eclesiástica no sustentada por el griego.
