translation:
  language: es
  text: 'Así que[a], yo corro de esta manera: no sin rumbo; de esta manera boxeo: no golpeando al aire.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'inciertamente'. El adverbio griego puede enfatizar falta de claridad o falta de una meta definida; en la imagen de la carrera, 'sin rumbo' destaca la idea de correr sin un objetivo claro.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοίνυν
  english_pob_choice: So then
  chosen_spanish: Así que
  alternatives_spanish:
  - Entonces
  - Por tanto
  lexicon: BDAG
  rationale: Expresa la transición inferencial y resumitiva del griego con una fórmula natural en español. 'Así que' conserva el enlace lógico sin sonar excesivamente formal.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: El adverbio aparece dos veces para subrayar el modo; 'de esta manera' mantiene la repetición y la idea de manera explícita en español.
- source_word: τρέχω
  english_pob_choice: I run
  chosen_spanish: corro
  alternatives_spanish:
  - voy corriendo
  - corro la carrera
  lexicon: BDAG
  rationale: Mantiene la metáfora atlética directa y el presente vivaz del original.
- source_word: ἀδήλως
  english_pob_choice: aimlessly
  chosen_spanish: sin dirección
  alternatives_spanish:
  - sin claridad
  - sin meta definida
  lexicon: BDAG
  rationale: El adverbio puede indicar falta de claridad o de objetivo definido. En la imagen de la carrera, 'sin dirección' comunica con claridad la idea de no correr con meta precisa, sin introducir un matiz psicológico más fuerte que el griego exige.
- source_word: πυκτεύω
  english_pob_choice: I box
  chosen_spanish: boxeo
  alternatives_spanish:
  - peleo a puño limpio
  - lucho a puñetazos
  lexicon: BDAG
  rationale: La referencia es específicamente al boxeo, no a una pelea genérica. 'Boxeo' conserva el deporte y la metáfora atlética.
- source_word: ἀέρα
  english_pob_choice: the air
  chosen_spanish: al aire
  alternatives_spanish:
  - el aire
  lexicon: BDAG
  rationale: En español, la construcción idiomática natural es 'golpear al aire', que conserva la imagen de golpes sin impacto real.
- source_word: δέρων
  english_pob_choice: beating
  chosen_spanish: golpeando
  alternatives_spanish:
  - pegando
  - azotando
  lexicon: BDAG
  rationale: El participio describe la acción de dar golpes en vano. 'Golpeando' es fiel y idiomático en español; evita endurecer innecesariamente la imagen con 'azotando'.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés de POB sin cambios sustantivos: se preservó la estructura paralela ''I run... I box...'' y la imagen de ''beating the air''. La nota inglesa sobre ἀδήλως se reflejó en una nota española con una alternativa semántica cercana.'
  spanish_consistency_notes:
  - Se mantuvo un registro digno y contemporáneo, evitando calcos rígidos.
  - '''Así que'' reproduce el valor inferencial de τοίνυν mejor que un simple ''pues''.'
  - La expresión 'golpeando al aire' conserva la imagen idiomática reconocible en español.
  - Se respetó la repetición de 'de esta manera' para reflejar el énfasis del original.
