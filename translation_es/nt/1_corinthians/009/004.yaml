translation:
  language: es
  text: ¿No tenemos derecho[a] a comer y a beber?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «autoridad para comer y beber». Aquí «derecho» se refiere a una legítima prerrogativa o libertad, probablemente en el sentido de recibir sostén material en el argumento de Pablo.
    reason: lexical_alternative
lexical_decisions:
- source_word: μὴ οὐκ
  english_pob_choice: Do we not
  chosen_spanish: ¿No tenemos... ?
  alternatives_spanish:
  - ¿Acaso no tenemos... ?
  - ¿No es verdad que tenemos... ?
  lexicon: BDAG
  rationale: La doble negación griega forma una pregunta retórica que espera afirmación. En español, «¿No tenemos...?» conserva la forma interrogativa y el sentido esperado sin añadir énfasis ajeno al texto.
- source_word: ἔχομεν
  english_pob_choice: have
  chosen_spanish: tenemos
  alternatives_spanish:
  - poseemos
  lexicon: BDAG
  rationale: «Tener» es la opción natural y directa en español para expresar posesión o disponibilidad en una pregunta retórica. «Poseemos» suena más formal y menos idiomático.
- source_word: ἐξουσίαν
  english_pob_choice: the right
  chosen_spanish: derecho
  alternatives_spanish:
  - autoridad
  - libertad
  - poder
  lexicon: BDAG
  rationale: En este contexto Pablo habla de una prerrogativa o legítima reclamación apostólica. «Derecho» comunica mejor esa idea en español que «autoridad», que podría sonar a autoridad de gobierno, o «poder», que sugiere capacidad y no legitimidad.
- source_word: φαγεῖν
  english_pob_choice: to eat
  chosen_spanish: a comer
  alternatives_spanish:
  - comer
  lexicon: BDAG
  rationale: El infinitivo del griego se vierte de manera natural con «a + infinitivo» en español después de «derecho». Mantiene la actividad sin sobrecargar la frase.
- source_word: πεῖν
  english_pob_choice: and drink
  chosen_spanish: y a beber
  alternatives_spanish:
  - y beber
  lexicon: BDAG
  rationale: Se conserva el paralelismo de los infinitivos coordinados. El segundo «a» hace la frase más natural en español jurídico/retórico y mantiene la simetría del griego.
theological_decisions:
- issue: Alcance del derecho apostólico
  english_pob_reading: Paul refers to the legitimate right of apostles/workers to receive food and drink, likely as material support from those they serve.
  chosen_spanish_reading: Pablo se refiere al derecho legítimo de los apóstoles a recibir comida y bebida, probablemente como sostén material de quienes los sirven.
  alternative_spanish_readings:
  - Una afirmación general sobre la libertad humana de comer y beber
  rationale: El contexto inmediato de 1 Corintios 9 trata de los derechos apostólicos de Pablo. «Derecho» permite mantener esa fuerza jurídica/relacional sin añadir en el texto principal una explicitación interpretativa como «sostén material», que queda sólo como posibilidad contextual.
  doctrine_reference: 1 Corintios 9:1-14
translation_notes:
  revision_awareness: 'Coincide con la revisión más reciente: no se requieren cambios respecto del texto fuente ni del juicio de alta concordancia. Se mantiene la equivalencia óptima y la lectura retórica de la pregunta.'
  spanish_consistency_notes:
  - Se usa «derecho» para ἐξουσία, en línea con la decisión inglesa de «the right».
  - Se mantiene el paralelismo verbal «comer y beber» sin introducir explicaciones en el texto principal.
  - La nota aclara la alternativa «autoridad» y el matiz contextual de prerrogativa legítima, preservando la tensión lexical documentada.
