review_pass:
  verdict: revise
  source_alignment_summary: El borrador español refleja fielmente la pregunta retórica griega μὴ οὐκ con «¿No tenemos…?», mantiene bien ἔχομεν como «tenemos» y ἐξουσίαν como «derecho», en línea con el sentido contextual de prerrogativa legítima. «A comer y a beber» también reproduce adecuadamente los infinitivos coordinados.
  spanish_quality_summary: 'El texto principal es natural, claro y plenamente legible en español eclesial contemporáneo. La única reparación necesaria está en la explicación teológica adjunta, donde «de quienes los sirven» invierte el sentido contextual: los apóstoles reciben sostén material de aquellos a quienes sirven. Conviene además pulir levemente la nota para mayor naturalidad.'
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Derecho» para ἐξουσίαν está bien justificado; la nota alternativa con «autoridad» preserva la decisión léxica del POB inglés.
  issues:
  - severity: medium
    issue: La decisión teológica en español dice «como sostén material de quienes los sirven»
    rationale: Esto invierte la relación del contexto de 1 Corintios 9. Pablo habla de recibir sustento material de aquellos a quienes él y otros obreros sirven, no de quienes sirven a los apóstoles.
  - severity: low
    issue: La nota al pie usa «prerrogativa»
    rationale: No es incorrecto, pero «derecho legítimo o libertad» suena más claro y se alinea más estrechamente con la explicación inglesa de «legitimate claim or freedom».
  revised_spanish_text: ¿No tenemos derecho[a] a comer y a beber?
  revised_footnotes:
  - marker: a
    text: O «autoridad para comer y beber». Aquí «derecho» se refiere a un derecho legítimo o libertad, probablemente en el sentido de recibir sostén material en el argumento de Pablo.
    reason: lexical_alternative
  revision_rationale: Se mantiene intacto el texto principal porque es fiel al griego, natural en español y coherente con las decisiones léxicas del POB. Se revisa la nota para una formulación más clara y ajustada al matiz del inglés auditado, y debe corregirse también la explicación teológica de apoyo para que diga que los apóstoles reciben sostén material de aquellos a quienes sirven.
