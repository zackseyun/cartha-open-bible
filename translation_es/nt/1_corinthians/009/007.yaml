translation:
  language: es
  text: ¿Quién sirve alguna vez como soldado a sus propias expensas? ¿Quién planta una viña y no come de su fruto? ¿O quién apacienta un rebaño y no come[a] de la leche del rebaño?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «no come de la leche del rebaño»; en español normal, con leche se diría «no bebe».
    reason: lexical_alternative
lexical_decisions:
- source_word: στρατεύεται
  english_pob_choice: serves as a soldier
  chosen_spanish: sirve como soldado
  alternatives_spanish:
  - hace servicio militar
  - sirve en el ejército
  lexicon: BDAG
  rationale: El verbo denota prestar servicio militar. «Sirve como soldado» conserva la imagen ocupacional y suena natural en español sin forzar una lectura de combate activo.
- source_word: ἰδίοις ὀψωνίοις
  english_pob_choice: at his own expense
  chosen_spanish: a sus propias expensas
  alternatives_spanish:
  - con su propio salario
  - con sus propias raciones
  lexicon: BDAG
  rationale: ὀψώνιον puede referirse a paga o raciones, especialmente en contexto militar. La frase española expresa con claridad que el soldado no costea su propio servicio.
- source_word: ποτέ
  english_pob_choice: ever
  chosen_spanish: nunca
  alternatives_spanish:
  - alguna vez
  - en algún momento
  lexicon: BDAG
  rationale: En una pregunta retórica, ποτέ intensifica la negación implícita. «Nunca» comunica bien la fuerza idiomática y evita una construcción menos natural como «¿quién alguna vez…?».
- source_word: φυτεύει ἀμπελῶνα
  english_pob_choice: plants a vineyard
  chosen_spanish: planta una viña
  alternatives_spanish:
  - cultiva una viña
  - planta un viñedo
  lexicon: BDAG
  rationale: ἀμπελών es una plantación/vineya. «Viña» es el equivalente bíblico natural en español y mantiene la imagen agrícola directa.
- source_word: τὸν καρπὸν αὐτοῦ
  english_pob_choice: its fruit
  chosen_spanish: su fruto
  alternatives_spanish:
  - el fruto de ella
  - su producción
  lexicon: BDAG
  rationale: καρπός se refiere aquí al producto de la viña. «Su fruto» es literal y comprensible en español.
- source_word: ποιμαίνει ποίμνην
  english_pob_choice: shepherds a flock
  chosen_spanish: apacienta un rebaño
  alternatives_spanish:
  - pastorea un rebaño
  - cuida un rebaño
  lexicon: BDAG
  rationale: ποιμαίνω incluye la idea de pastorear/apacentar. «Apacienta» conserva el matiz pastoral clásico y sigue siendo entendible en español bíblico contemporáneo.
- source_word: ἐκ τοῦ γάλακτος τῆς ποίμνης
  english_pob_choice: from the milk of the flock
  chosen_spanish: de la leche del rebaño
  alternatives_spanish:
  - de la leche del rebaño
  - del ordeño del rebaño
  lexicon: BDAG
  rationale: La expresión es de fuente o procedencia. En español, con leche normalmente se dice «comer de» solo en estilo figurado; aquí se mantiene la imagen mediante «de la leche del rebaño» y se aclara con nota la literalidad griega.
- source_word: ἐσθίει
  english_pob_choice: eat / drink
  chosen_spanish: come
  alternatives_spanish:
  - bebe
  - participa de
  lexicon: BDAG
  rationale: El verbo significa literalmente «comer» en ambas cláusulas. En español, con leche lo natural sería «beber», pero se conserva «come» en el texto y se explica la equivalencia idiomática en nota para no perder la repetición del original.
theological_decisions:
- issue: Generic masculine singular in repeated τίς clauses
  english_pob_reading: Rendered with 'his' in 'at his own expense'
  chosen_spanish_reading: Sujeto genérico singular implícito en las preguntas retóricas; se traduce de modo no marcado en la forma verbal y posesiva española.
  alternative_spanish_readings:
  - ¿Quién sirve… a sus propias expensas?
  - ¿Quién sirve… a sus propios gastos?
  rationale: El griego usa formas singulares masculinas genéricas en ejemplos retóricos. En español, el posesivo «sus» evita introducir un género innecesario y conserva el valor representativo de la pregunta sin alterar el sentido.
  doctrine_reference: DOCTRINE.md §Translation philosophy 4
- issue: Literal eating with milk versus natural Spanish idiom
  english_pob_reading: Literally 'does not eat from the milk of the flock.' English normally says 'drink' with milk.
  chosen_spanish_reading: Se mantiene el verbo «come» en el texto, con nota que señala la lectura literal y la adaptación idiomática esperable.
  alternative_spanish_readings:
  - no bebe de la leche del rebaño
  - no toma de la leche del rebaño
  rationale: El griego repite ἐσθίει («come») en ambas cláusulas. Para no borrar la simetría verbal, el texto conserva la literalidad y la nota hace explícito que el español ordinario usaría «beber» con leche.
  doctrine_reference: Principio POB de preservación de paralelismo y tensión léxica
translation_notes:
  revision_awareness: Se mantuvo la estructura retórica triple del griego y la lectura ya auditada del inglés POB. La principal decisión de revisión fue conservar la literalidad de ἐσθίει con una nota explicativa, en lugar de convertirla por completo en «bebe» y perder la repetición verbal del original.
  spanish_consistency_notes:
  - Se emplea «Yahvé» por norma del proyecto, pero este versículo no contiene el nombre divino.
  - «Viña» se usa para ἀμπελῶνα siguiendo el uso bíblico natural en español.
  - «Rebaño» y «apacienta» conservan el campo semántico pastoral del original.
  - La pregunta inicial se vierte con «¿Quién nunca…?» para reflejar la fuerza retórica de ποτέ en este contexto.
