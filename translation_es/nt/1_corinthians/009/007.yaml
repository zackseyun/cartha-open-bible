revisions:
- from: ¿Quién nunca sirve como soldado a sus propias expensas? ¿Quién planta una viña y no come de su fruto? ¿O quién apacienta un rebaño y no come[a] de la leche del rebaño[b]?
  to: ¿Quién sirve alguna vez como soldado a sus propias expensas? ¿Quién planta una viña y no come de su fruto? ¿O quién apacienta un rebaño y no come[a] de la leche del rebaño?
  rationale: Se corrige «nunca» a «alguna vez» para reflejar adecuadamente ποτέ en una pregunta retórica española. Se elimina la nota b porque introduce alternativas sin base en el griego y mantiene solo la nota útil sobre «come»/«bebe». No se cambian las demás imágenes ni el paralelismo del original.
