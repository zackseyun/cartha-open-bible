review_pass:
  verdict: revise
  source_alignment_summary: El borrador sigue bien las tres preguntas retóricas y preserva las imágenes de soldado, viña y rebaño. Sin embargo, «¿Quién nunca sirve...?» no refleja bien ποτέ en español idiomático; aquí corresponde «alguna vez/jamás» en la pregunta retórica, no «nunca» tras «quién». Además, la nota b del borrador introduce alternativas erróneas («oveja/cabaña») que no proceden del griego, donde ποίμνη es «rebaño/flock».
  spanish_quality_summary: El texto es generalmente claro, pero «¿Quién nunca sirve como soldado a sus propias expensas?» suena poco natural y confuso en español. También «apacienta» es aceptable, aunque «pastorea» sería más natural; no obstante, no exige cambio. En la última cláusula, conservar «come» por paralelismo es defendible si se explica en nota; la redacción resultante sigue siendo comprensible en registro bíblico.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. Las decisiones léxicas principales son consistentes con el griego y con el rastro POB, salvo la mala aplicación de ποτέ como «nunca» y la nota b, que no respeta el sentido de ποίμνη.
  issues:
  - severity: medium
    issue: «¿Quién nunca sirve...?» traduce mal ποτέ en esta pregunta retórica.
    rationale: ποτέ aquí aporta el sentido de «alguna vez / jamás / ever». En español, «¿Quién nunca...?» suena como una pregunta sobre alguien que nunca hace algo, no como la negación retórica «¿Quién jamás hace esto?». Mejor «¿Quién sirve alguna vez como soldado a sus propias expensas?».
  - severity: high
    issue: 'La nota b propone alternativas incorrectas: «oveja/cabaña».'
    rationale: El griego τῆς ποίμνης significa «del rebaño». No hay base para «oveja» ni para «cabaña», y la nota puede inducir error semántico.
  - severity: low
    issue: La repetición literal de «come» con «leche» es poco natural en español.
    rationale: Es una decisión defendible por paralelismo con ἐσθίει, pero requiere una nota bien formulada. La nota a ya lo hace; basta conservarla y eliminar la nota defectuosa b.
  revised_spanish_text: ¿Quién sirve alguna vez como soldado a sus propias expensas? ¿Quién planta una viña y no come de su fruto? ¿O quién apacienta un rebaño y no come[a] de la leche del rebaño?
  revised_footnotes:
  - marker: a
    text: Literalmente, «no come de la leche del rebaño»; en español normal, con leche se diría «no bebe».
    reason: lexical_alternative
  revision_rationale: Se corrige «nunca» a «alguna vez» para reflejar adecuadamente ποτέ en una pregunta retórica española. Se elimina la nota b porque introduce alternativas sin base en el griego y mantiene solo la nota útil sobre «come»/«bebe». No se cambian las demás imágenes ni el paralelismo del original.
