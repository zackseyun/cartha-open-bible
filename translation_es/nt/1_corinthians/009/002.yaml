translation:
  language: es
  text: Si no soy apóstol para otros, ciertamente lo soy para ustedes; porque ustedes son el sello[a] de mi apostolado en el Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» o «autenticación» de mi apostolado. El griego usa «sello», conservando la imagen de algo que confirma autenticidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  lexicon: BDAG
  rationale: En el marco paulino, el término conserva la fuerza técnica de un cargo o comisión reconocida. «Apóstol» mantiene esa carga institucional y polémica mejor que «mensajero».
- source_word: ἀλλά γε
  english_pob_choice: yet I certainly am
  chosen_spanish: ciertamente lo soy
  alternatives_spanish:
  - pero ciertamente lo soy
  - mas ciertamente lo soy
  - pero sin duda lo soy
  lexicon: BDAG
  rationale: La combinación introduce contraste con énfasis. En español, «ciertamente» reproduce bien la fuerza reforzadora de γε sin sonar forzado; el contraste previo queda expresado por la primera cláusula negativa.
- source_word: σφραγίς
  english_pob_choice: seal
  chosen_spanish: sello
  alternatives_spanish:
  - prueba
  - autenticación
  - marca
  lexicon: BDAG
  rationale: Se conserva la metáfora de autenticidad con «sello», que es el equivalente natural en español y permite mantener la imagen del original, como hacía la traducción inglesa.
- source_word: ἀποστολή
  english_pob_choice: apostleship
  chosen_spanish: apostolado
  alternatives_spanish:
  - comisión apostólica
  - misión
  lexicon: BDAG
  rationale: Aquí el sustantivo se refiere al oficio o condición apostólica de Pablo. «Apostolado» comunica ese sentido de manera natural en español y conserva la referencia institucional.
- source_word: ἄλλοις
  english_pob_choice: to others
  chosen_spanish: para otros
  alternatives_spanish:
  - a otros
  lexicon: BDAG
  rationale: Aunque el griego es dativo, en español «para otros» suena más natural con «soy apóstol» y conserva la relación de esfera o referencia defendida en el argumento.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - por el Señor
  - unidos al Señor
  lexicon: BDAG
  rationale: Se conserva la fórmula paulina literal, porque el contexto apunta a una relación de pertenencia y validación dentro del ámbito del Señor, no solo a una agencia instrumental.
theological_decisions:
- issue: Alcance de la afirmación de Pablo sobre su apostolado
  english_pob_reading: Pablo no niega realmente ser apóstol; responde retóricamente a quienes pudieran cuestionarlo, y presenta a los corintios como evidencia confirmatoria de su apostolado.
  chosen_spanish_reading: Pablo no está limitando su apostolado a los corintios ni negándolo en sentido absoluto; está usando una defensa retórica que apela a ellos como prueba viva de su llamado apostólico.
  alternative_spanish_readings:
  - Pablo solo sería apóstol para los corintios
  - Pablo afirma que su apostolado depende de la comunidad corintia
  rationale: La sintaxis y la lógica del argumento exigen una lectura defensiva y testimonial, no una restricción literal del apostolado. «Ustedes son el sello de mi apostolado» preserva esa función probatoria.
  doctrine_reference: 1 Corintios 9:1–3; 2 Corintios 3:1–3
translation_notes:
  revision_awareness: Coincide con la revisión más reciente sin cambios sustantivos; se conserva la solución inglesa y se la adapta al español con un registro natural y fiel al valor retórico del pasaje.
  spanish_consistency_notes:
  - Se mantiene «apóstol» y «apostolado» para la terminología paulina técnica.
  - Se conserva «Señor» como equivalente de κύριος en la fórmula paulina.
  - La nota de pie de página se ancla en «sello» para preservar la alternativa semántica sin perder la metáfora.
  - El tono es formal y publicable, con una sintaxis clara para lectura eclesial contemporánea.
