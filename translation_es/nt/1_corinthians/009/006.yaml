translation:
  language: es
  text: ¿O somos solamente Bernabé y yo los que no tenemos derecho a abstenernos de trabajar?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «autoridad para no trabajar» o «libertad para no laborar». El sentido aquí es el derecho a abstenerse del trabajo manual para ser sostenidos en el ministerio.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿Acaso
  - ¿O es que
  lexicon: BDAG
  rationale: Introduce una alternativa retórica en la argumentación de Pablo; en español, «¿O» conserva de modo natural la fuerza de enlace y la forma interrogativa.
- source_word: μόνος
  english_pob_choice: only
  chosen_spanish: solamente
  alternatives_spanish:
  - solo
  - únicamente
  lexicon: BDAG
  rationale: Modifica al sujeto coordinado para marcar exclusividad. «Solamente» es claro y mantiene el énfasis retórico sin añadir matices no presentes.
- source_word: ἐγὼ καὶ Βαρναβᾶς
  english_pob_choice: Barnabas and I
  chosen_spanish: Bernabé y yo
  alternatives_spanish:
  - yo y Bernabé
  - Bernabé e yo
  lexicon: BDAG
  rationale: Se invierte al orden natural del español. «Bernabé» sigue la transliteración habitual en español bíblico; «y yo» evita una construcción menos idiomática sin cambiar el sentido.
- source_word: οὐκ ἔχομεν
  english_pob_choice: have no
  chosen_spanish: no tenemos
  alternatives_spanish:
  - carecemos de
  - no poseemos
  lexicon: BDAG
  rationale: La negación verbal simple es la forma más natural y fiel en español. Mantiene la afirmación de carencia de derecho sin sobrecargarla.
- source_word: ἐξουσίαν
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - autoridad
  - libertad
  lexicon: BDAG
  rationale: En este contexto Pablo habla de una prerrogativa o reclamo legítimo, no de autoridad de gobierno. «Derecho» reproduce bien el sentido práctico-jurídico que el audit trail inglés ya identificó.
- source_word: μὴ ἐργάζεσθαι
  english_pob_choice: refrain from working
  chosen_spanish: dejar de trabajar
  alternatives_spanish:
  - abstenernos de trabajar
  - no trabajar
  lexicon: BDAG
  rationale: «Dejar de trabajar» expresa con naturalidad la idea de abstenerse del trabajo manual mencionado en el contexto, sin volverla rígida ni meramente literal. Conserva la noción de renuncia voluntaria a trabajar para sostenerse.
theological_decisions:
- issue: Sentido de ἐξουσία en el contexto apostólico
  english_pob_reading: Paul refers to the apostolic right to forgo manual labor and receive material support from the churches.
  chosen_spanish_reading: Pablo se refiere al derecho apostólico de no realizar trabajo manual para sostenerse, y así recibir apoyo material de las iglesias.
  alternative_spanish_readings:
  - Pablo habla más en general de autoridad o capacidad para no trabajar
  - Pablo alude solo a una libertad personal sin implicación de apoyo material
  rationale: El contexto inmediato de 1 Corintios 9 trata de los derechos de los apóstoles y del sostén material. «Derecho» y «dejar de trabajar» conservan esa referencia concreta sin expandir indebidamente el texto.
  doctrine_reference: 1 Corintios 9:1-14
translation_notes:
  revision_awareness: 'El inglés POB revisó la redacción desde una fórmula más literal («no right not to work») a una más natural («no right to refrain from working»). En español se siguió esa misma orientación: se evitó una doble negación torpe y se optó por «no tenemos derecho a dejar de trabajar», que conserva la idea de abstención voluntaria y el trasfondo de sostenimiento ministerial.'
  spanish_consistency_notes:
  - Se usa «Bernabé» como forma española estándar del nombre propio.
  - Se mantiene «derecho» para ἐξουσία siguiendo la decisión contextual del POB en inglés.
  - «Dejar de trabajar» se eligió para preservar la idea de abstenerse del trabajo manual sin introducir una paráfrasis más amplia.
  - La pregunta retórica se conserva con «¿O…?» para reflejar el enlace discursivo del griego.
