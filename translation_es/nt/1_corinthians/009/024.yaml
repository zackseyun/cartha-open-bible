base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/009/024.yaml
  text: Do you not know that those who run in a stadium all run[a], but one receives the prize? Run in this way[b], so that you may obtain it.
  footnotes:
  - marker: a
    text: Or 'in a racecourse.' The Greek στάδιον refers to the place of the race, a stadium or track.
    reason: lexical_alternative
  - marker: b
    text: Or 'so run that you may win' or 'so that you may seize it.' The Greek καταλάβητε can mean 'obtain,' 'grasp,' or 'attain.'
    reason: lexical_alternative
