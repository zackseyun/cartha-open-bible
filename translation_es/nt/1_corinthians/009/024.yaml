translation:
  language: es
  text: ¿No saben que los que corren en el estadio todos corren, pero uno solo recibe el premio? Corran de esta manera[a], para que lo alcancen[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en una pista de carreras»; el griego στάδιον se refiere al lugar de la carrera, un estadio o pista.
    reason: lexical_alternative
  - marker: b
    text: O «para que lo obtengan», «para que ganen» o «para que se apoderen de él». El griego καταλάβητε puede significar «obtener», «alcanzar» o «asir/apoderarse».
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben?
  alternatives_spanish:
  - ¿No conocen?
  - ¿No se dan cuenta?
  lexicon: BDAG
  rationale: La pregunta retórica conserva el sentido de οἶδα como saber/conocer y su fuerza exhortativa en Pablo, sin volverla más explicativa de lo que pide el griego.
- source_word: ἐν σταδίῳ
  english_pob_choice: in a stadium
  chosen_spanish: en el estadio
  alternatives_spanish:
  - en la pista
  - en la carrera
  lexicon: BDAG
  rationale: στάδιον nombra el lugar de la competencia; 'estadio' conserva la imagen concreta atlética. 'Pista' o 'carrera' suavizan o desplazan ese valor espacial.
- source_word: τρέχοντες ... τρέχουσιν
  english_pob_choice: those who run ... all run
  chosen_spanish: los que corren ... todos corren
  alternatives_spanish:
  - los corredores ... todos corren
  lexicon: BDAG
  rationale: Se preserva la repetición de correr y la construcción participial de manera natural en español, manteniendo el énfasis retórico del texto.
- source_word: πάντες μὲν ... εἷς δὲ
  english_pob_choice: all ... but one
  chosen_spanish: todos corren, pero uno solo
  alternatives_spanish:
  - todos, ciertamente, corren, pero uno solo
  - todos corren; pero uno solo
  lexicon: BDAG
  rationale: '''Pero uno solo'' reproduce el contraste μέν...δέ de forma idiomática. ''Uno solo'' hace explícita la exclusividad del premio sin añadir interpretación.'
- source_word: λαμβάνει τὸ βραβεῖον
  english_pob_choice: receives the prize
  chosen_spanish: recibe el premio
  alternatives_spanish:
  - obtiene el premio
  - gana el premio
  lexicon: BDAG
  rationale: '''Recibe'' mantiene el sentido básico de λαμβάνει. ''Premio'' expresa βραβεῖον en forma natural; ''gana'' sería más interpretivo desde el contexto atlético.'
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de ese modo
  lexicon: BDAG
  rationale: Explicita la analogía entre la carrera y la exhortación cristiana con una fórmula clara y moderna en español.
- source_word: τρέχετε
  english_pob_choice: Run
  chosen_spanish: Corran
  alternatives_spanish:
  - Corran así
  - Sigan corriendo
  lexicon: BDAG
  rationale: El imperativo plural conserva el impulso exhortativo. En español, 'Corran' suena directo y natural para la exhortación comunitaria.
- source_word: ἵνα καταλάβητε
  english_pob_choice: so that you may obtain it
  chosen_spanish: para que lo alcancen
  alternatives_spanish:
  - para que lo obtengan
  - para que lo ganen
  - para que lo asalten
  lexicon: BDAG
  rationale: καταλάβητε puede significar obtener, alcanzar o seize/grasp. 'Lo alcancen' preserva el matiz de alcanzar/obtener y evita fijarlo demasiado como 'ganar'. El pronombre 'lo' remite naturalmente al premio.
theological_decisions:
- issue: Metáfora atlética y exhortación a la perseverancia
  english_pob_reading: Preserve the competitive race imagery without specifying a doctrinal system of salvation or reward beyond the text's exhortation.
  chosen_spanish_reading: Conservar la imagen competitiva de la carrera sin convertirla en una formulación doctrinal sobre mérito o salvación.
  alternative_spanish_readings:
  - Corran para ganar
  - Corran para obtener la salvación
  rationale: El griego exhorta a correr con propósito para alcanzar el premio, pero no desarrolla aquí el debate teológico sobre mérito, perseverancia o recompensa. La traducción debe mantener esa tensión.
  doctrine_reference: Preservar la tensión teológica del texto; no resolverla por paráfrasis.
translation_notes:
  revision_awareness: No se aplicaron revisiones posteriores; la lectura coincide con el pasaje griego y con el criterio auditado de la POB inglesa, manteniendo la metáfora atlética y la ambigüedad de καταλάβητε sin sobreinterpretarla.
  spanish_consistency_notes:
  - Se usa 'premio' para βραβεῖον, en continuidad con el valor atlético del término.
  - Se usa 'alcancen' para καταλάβητε para preservar el rango semántico de obtener/alcanzar y mantener la imagen de meta.
  - Se mantiene 'estadio' como equivalente espacial de στάδιον, no como generalización a 'carrera'.
  - Se evita 'Cristo' o lenguaje teológico ajeno al versículo, porque no aparece en el texto fuente.
