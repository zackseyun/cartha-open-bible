    unchanged: false
    changes_summary: 'Replaced “Messiah’s law” with “Christ’s law” to reflect the Greek Χριστοῦ more directly and maintain natural, formal register in this context. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: A los que están fuera de la ley[a], como uno fuera de la ley, aunque no estoy fuera de la ley de Dios, sino bajo la ley del Mesías[b], para ganar a los que están fuera de la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sin ley”; aquí la expresión se refiere a quienes no están bajo la ley mosaica, no necesariamente a personas moralmente malas.'
    reason: lexical_alternative
  - marker: b
    text: 'O: “bajo la ley del Mesías”; también puede entenderse “dentro de la ley del Mesías”.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῖς ἀνόμοις / ἄνομος / ἀνόμους
  english_pob_choice: outside the law
  chosen_spanish: fuera de la ley
  alternatives_spanish:
  - sin ley
  - ilegales
  - sin la ley
  lexicon: BDAG
  rationale: La POB inglesa entiende ἄνομος en sentido relacional, como personas no sujetas a la ley mosaica, no como personas moralmente perversas. En español, 'fuera de la ley' conserva esa relación sin cargar el término con la idea de 'malvado' que podría sugerir 'sin ley' en algunos contextos. Se repite la misma solución para mantener la coherencia con el paralelo del versículo.
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - igual que
  - cual
  lexicon: BDAG
  rationale: '''Como'' reproduce de forma natural el matiz comparativo de la postura adaptable de Pablo: actúa ''como'' uno fuera de la ley, sin afirmarlo absolutamente.'
- source_word: μὴ ὢν
  english_pob_choice: though not being
  chosen_spanish: aunque no estoy
  alternatives_spanish:
  - aunque no siendo
  - sin estar
  lexicon: BDAG
  rationale: El participio tiene fuerza concesiva en contexto. En español, 'aunque no estoy' expresa con claridad esa concesión y mantiene la primera persona implícita del discurso paulino.
- source_word: θεοῦ
  english_pob_choice: God’s
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios
  - perteneciente a Dios
  lexicon: BDAG
  rationale: 'Se conserva la relación posesiva del genitivo de manera directa y natural en español: ''la ley de Dios''.'
- source_word: ἔννομος
  english_pob_choice: under
  chosen_spanish: bajo
  alternatives_spanish:
  - dentro de
  - sujeto a
  - bajo la autoridad de
  lexicon: BDAG
  rationale: '''Bajo'' comunica con naturalidad la esfera de sujeción o pertenencia legal y mantiene el contraste con ''fuera de la ley''.'
- source_word: Χριστοῦ
  english_pob_choice: Messiah’s
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - del Cristo
  lexicon: BDAG
  rationale: Se sigue la decisión del proyecto de traducir Χριστός como 'Mesías' cuando funciona como título. Aquí el genitivo es titular y relacional, por lo que 'del Mesías' conserva la referencia sin borrar la carga mesiánica del término.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - para que
  - a fin de que
  lexicon: BDAG
  rationale: En este contexto de propósito, 'para' es una solución breve y natural en español, equivalente al valor final de ἵνα y compatible con la economía retórica del versículo.
- source_word: κερδαίνω
  english_pob_choice: I might win
  chosen_spanish: ganar
  alternatives_spanish:
  - conseguir
  - ganar para Cristo
  - obtener
  lexicon: BDAG
  rationale: En el contexto paulino evangelístico, κερδαίνω indica ganar personas, es decir, atraerlas o incorporarlas. 'Ganar' preserva ese valor sin añadir explícitamente una expansión interpretativa que no está en el griego.
theological_decisions:
- issue: Sentido de ἄνομος en este contexto
  english_pob_reading: Refers to those outside the Mosaic law/Gentiles rather than morally 'lawless' people in a general ethical sense.
  chosen_spanish_reading: Se refiere a quienes están fuera de la ley mosaica, no necesariamente a personas moralmente anárquicas.
  alternative_spanish_readings:
  - personas sin ley en sentido moral
  - personas impías o rebeldes
  rationale: El contexto de 1 Corintios 9:20–21 contrasta judíos, los que están bajo la ley, y los que están fuera de la ley. La formulación española evita trasladar indebidamente una carga ética que el contexto no exige.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Alcance de ἔννομος Χριστοῦ
  english_pob_reading: Paul denies antinomianism by affirming that he is under/in relation to Messiah's law.
  chosen_spanish_reading: Pablo afirma que sigue bajo la ley del Mesías, es decir, bajo una relación normativa con él y no en antinomianismo.
  alternative_spanish_readings:
  - dentro de la ley del Mesías
  - sujeto a la ley del Mesías
  rationale: La expresión mantiene el contraste con 'fuera de la ley' y evita borrar la tensión entre libertad respecto de la ley mosaica y continuidad en la obligación moral ante el Mesías.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3, 6
- issue: Traducción de Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se conserva la política terminológica del proyecto: Χριστός se traduce como ''Mesías'' cuando se usa como título, no como nombre devocional fijo.'
  doctrine_reference: 'Contested terms: Χριστός → Mesías (where title; Cristo where name-like)'
translation_notes:
  revision_awareness: 'La redacción española sigue la lectura final restaurada del audit trail: Χριστοῦ se toma como genitivo titular y se vierte como ''del Mesías'', no ''de Cristo'', para mantener la política terminológica del proyecto. También conserva el matiz concesivo de μὴ ὢν y el contraste relacional entre ''fuera de la ley'' y ''bajo la ley''.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός en la cláusula final, en armonía con la terminología del proyecto.
  - '''fuera de la ley'' se usó de forma consistente para ἀνόμοις / ἄνομος / ἀνόμους.'
  - La estructura del versículo respeta la repetición retórica del griego sin ampliar el sentido más allá de la evidencia textual.
