translation:
  language: es
  text: ¿No tenemos derecho a llevar con nosotros una hermana como esposa[a], así como también los demás apóstoles y los hermanos del Señor y Cefas?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «una hermana, una esposa»; es decir, una esposa que también es hermana en la fe.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξουσίαν
  english_pob_choice: the right
  chosen_spanish: derecho
  alternatives_spanish:
  - autoridad
  - libertad
  - facultad
  lexicon: BDAG
  rationale: En este contexto Pablo defiende una prerrogativa legítima, no la idea abstracta de autoridad. "Derecho" expresa bien una reclamación válida y es natural en español contemporáneo.
- source_word: ἀδελφὴν γυναῖκα
  english_pob_choice: a sister as a wife
  chosen_spanish: una hermana como esposa
  alternatives_spanish:
  - una esposa creyente
  - una esposa que es hermana
  - una hermana-esposa
  lexicon: BDAG
  rationale: 'La construcción griega es inusual y conserva dos rasgos: "hermana" y "mujer/esposa". "Una hermana como esposa" refleja esa tensión sin resolverla interpretativamente. "Esposa creyente" explicita demasiado y se aleja del valor literal preservado por la revisión inglesa.'
- source_word: περιάγειν
  english_pob_choice: to take along
  chosen_spanish: llevar con nosotros
  alternatives_spanish:
  - llevar consigo
  - tomar consigo
  - acompañar
  lexicon: BDAG
  rationale: El verbo apunta a viajar con alguien o llevarlo en los recorridos ministeriales. "Llevar con nosotros" comunica la acción de acompañamiento de manera idiomática en español.
- source_word: ὡς καὶ
  english_pob_choice: as also
  chosen_spanish: así como también
  alternatives_spanish:
  - como también
  - igual que también
  - así también
  lexicon: BDAG
  rationale: La comparación introduce ejemplos paralelos y añade énfasis sin forzar la sintaxis. "Así como también" mantiene la relación aditiva del griego.
- source_word: οἱ λοιποὶ ἀπόστολοι
  english_pob_choice: the rest of the apostles
  chosen_spanish: los demás apóstoles
  alternatives_spanish:
  - el resto de los apóstoles
  - los otros apóstoles
  lexicon: BDAG
  rationale: '"Los demás" conserva la distinción entre los ya mencionados y el resto del grupo, con un giro natural en español.'
- source_word: οἱ ἀδελφοὶ τοῦ κυρίου
  english_pob_choice: the brothers of the Lord
  chosen_spanish: los hermanos del Señor
  alternatives_spanish:
  - los hermanos de Jesús
  - los hermanos de Yahvé
  lexicon: BDAG
  rationale: Se traduce κύριος por "Señor" porque aquí funciona como título aplicado a Jesús, conforme al texto griego y al audit trail en inglés. Se mantiene la forma directa sin resolver debates sobre parentesco.
- source_word: Κηφᾶς
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: El texto griego usa Κηφᾶς, por lo que se conserva la transliteración "Cefas" en lugar de sustituirla por el nombre más conocido "Pedro".
theological_decisions:
- issue: Identidad de los "hermanos del Señor"
  english_pob_reading: Translate the phrase straightforwardly without resolving debates about whether these were biological brothers, stepbrothers, or kin more broadly.
  chosen_spanish_reading: Traducir la frase de manera directa, sin resolver si se trata de hermanos biológicos, medios hermanos o parientes en sentido amplio.
  alternative_spanish_readings:
  - los hermanos biológicos del Señor
  - los medios hermanos del Señor
  - los parientes del Señor
  rationale: El griego nombra a "los hermanos del Señor" pero no define por sí mismo el tipo exacto de parentesco. La traducción preserva esa tensión textual sin imponer una conclusión doctrinal.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
- issue: Sentido de ἀδελφὴν γυναῖκα
  english_pob_reading: Render as 'a sister as a wife' in the main text.
  chosen_spanish_reading: Mantener "una hermana como esposa" en el texto principal.
  alternative_spanish_readings:
  - una esposa creyente
  - una mujer creyente como esposa
  - una hermana esposa
  rationale: La estructura griega combina dos sustantivos y la revisión inglesa decidió no colapsarlos en una paráfrasis interpretativa. El español conserva ambos elementos y, con ello, la ambigüedad lexical original.
  doctrine_reference: Primacía del texto original sobre la tradición de traducción; conservar la ambigüedad real.
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa, que pasó de una paráfrasis interpretativa ('a believing wife') a una forma más cercana al griego ('a sister as a wife'). Por eso el español evita "esposa creyente" como lectura principal y conserva la duplicidad semántica de ἀδελφὴν γυναῖκα. También se mantuvo "Cefas" por corresponder directamente a Κηφᾶς, y "Señor" para κύριος según el audit trail.
  spanish_consistency_notes:
  - Se usa "derecho" para ἐξουσίαν, coherente con el uso POB de entitlement legítimo.
  - '"Señor" se conserva para κύριος en la expresión fija "los hermanos del Señor".'
  - '"Cefas" mantiene la forma transliterada del nombre griego.'
  - La nota al pie marca la rareza de "una hermana como esposa" sin sustituirla en el texto principal.
