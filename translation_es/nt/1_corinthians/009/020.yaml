translation:
  language: es
  text: Y a los judíos me hice como judío, para ganar[a] judíos; a los que están bajo la ley[b], como bajo la ley —aunque yo mismo no estoy bajo la ley—, para ganar a los que están bajo la ley.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «obtener para sí»; el verbo puede significar ganar u obtener para sí.
    reason: lexical_alternative
  - marker: b
    text: Aquí «la ley» probablemente se refiere a la ley mosaica.
    reason: cultural_note
lexical_decisions:
- source_word: ἐγενόμην
  english_pob_choice: I became
  chosen_spanish: me hice
  alternatives_spanish:
  - llegué a ser
  - me volví
  lexicon: BDAG
  rationale: El aoristo medio de γίνομαι aquí expresa que Pablo adoptó una conducta o postura adaptada a ciertos grupos. En español, «me hice» comunica bien esa adaptación sin sonar forzado ni sugerir que dejó de ser judío en sentido étnico.
- source_word: τοῖς Ἰουδαίοις ... ὡς Ἰουδαῖος
  english_pob_choice: to the Jews ... as a Jew
  chosen_spanish: a los judíos ... como judío
  alternatives_spanish:
  - para los judíos ... como judío
  - ante los judíos ... como judío
  lexicon: BDAG
  rationale: La construcción con dativo y ὡς indica conducta acomodada hacia un grupo. «Como judío» conserva el valor comparativo y la idea de adaptación, sin implicar que Pablo dejara de ser judío.
- source_word: ἵνα ... κερδήσω
  english_pob_choice: so that I might win
  chosen_spanish: para ganar
  alternatives_spanish:
  - para ganar a
  - a fin de ganar
  lexicon: BDAG
  rationale: κερδαίνω puede significar literalmente «ganar/obtener», y en contexto paulino funciona idiomáticamente como «ganar personas para la fe». En español, «para ganar» es natural y fiel; el complemento «judíos» ya queda explícito en la frase.
- source_word: τοῖς ὑπὸ νόμον
  english_pob_choice: to those under the law
  chosen_spanish: a los que están bajo la ley
  alternatives_spanish:
  - a los sometidos a la ley
  - a los que están bajo ley
  lexicon: BDAG
  rationale: La frase funciona sustantivamente. «Los que están bajo la ley» reproduce bien la idea de pertenencia o sujeción a un marco legal reconocido; en este contexto, el referente más probable es la ley mosaica, pero el texto español mantiene la formulación amplia del original.
- source_word: ὡς ὑπὸ νόμον
  english_pob_choice: as under the law
  chosen_spanish: como bajo la ley
  alternatives_spanish:
  - como uno bajo la ley
  - como sometido a la ley
  lexicon: BDAG
  rationale: Se conserva la expresión comprimida del griego y el paralelismo con «como judío». La frase comunica identificación adaptativa sin afirmar que Pablo estuviera efectivamente sujeto a la ley en ese momento.
- source_word: μὴ ὢν αὐτὸς ὑπὸ νόμον
  english_pob_choice: though I myself am not under the law
  chosen_spanish: aunque yo mismo no estoy bajo la ley
  alternatives_spanish:
  - aunque yo mismo no soy sujeto a la ley
  - aunque yo no estoy bajo la ley
  lexicon: BDAG
  rationale: El participio con μή introduce una acotación parentética contemporánea. «Aunque yo mismo no estoy bajo la ley» mantiene el contraste y el matiz presente del griego, sin armonizarlo con el versículo siguiente.
- source_word: αὐτὸς
  english_pob_choice: I myself
  chosen_spanish: yo mismo
  alternatives_spanish:
  - yo
  - en persona
  lexicon: BDAG
  rationale: αὐτός es enfático. «Yo mismo» conserva esa fuerza personal y subraya que la afirmación se refiere directamente a Pablo.
- source_word: νόμος
  english_pob_choice: the law
  chosen_spanish: la ley
  alternatives_spanish:
  - ley
  - la ley mosaica
  lexicon: BDAG
  rationale: En este contexto, especialmente en relación con «judíos», νόμος probablemente alude a la ley mosaica. El texto principal mantiene «la ley» para preservar la formulación paulina sin añadir una expansión interpretativa que el griego no expresa explícitamente.
theological_decisions:
- issue: La afirmación de Pablo de no estar bajo la ley
  english_pob_reading: 'Render straightforwardly as Paul''s own status: ''though I myself am not under the law,'' without adding explanatory qualifiers.'
  chosen_spanish_reading: 'Traducirla de manera directa: «aunque yo mismo no estoy bajo la ley», sin añadir aclaraciones interpretativas en el texto principal.'
  alternative_spanish_readings:
  - aunque yo mismo no estoy bajo la ley de Moisés
  - aunque yo mismo no estoy sin la ley de Dios, sino bajo la ley de Cristo
  rationale: El griego de este versículo afirma solamente que Pablo no está bajo la ley. La traducción no debe estrechar ni armonizar la frase con el versículo siguiente en el texto principal. Así se preserva la tensión retórica y teológica del pasaje.
  doctrine_reference: Translation philosophy §3 Preserve theological tension rather than resolve it.
translation_notes:
  revision_awareness: La revisión más reciente indicó alto acuerdo y no requirió cambios; esta versión sigue esa línea, manteniendo la equivalencia óptima y la tensión teológica sin añadidos explicativos en el cuerpo del texto.
  spanish_consistency_notes:
  - Se mantiene «judíos» y «la ley» de forma consistente con el registro paulino y con el criterio POB de no ocultar la referencia al marco legal subyacente.
  - Se conserva el paralelismo «como judío / como bajo la ley» para reflejar la simetría del griego.
  - La nota sobre νόμος se formula con cautela («probablemente») para respetar el alcance del texto sin convertir una inferencia contextual en una identificación absoluta.
