  glossary_alignment: No hay conflicto con la terminología del proyecto. «La ley» preserva adecuadamente νόμος, con nota cultural que aclara la probable referencia mosaica. No aparecen términos sensibles como Yahvé/Mesías/esclavo en este versículo.
