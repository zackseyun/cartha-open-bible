    issue: 'Frase retórica poco natural: «¿no mucho más nosotros?»'
    rationale: Aunque cercana al orden griego, en español resulta rígida y poco idiomática. El sentido comparativo de οὐ μᾶλλον ἡμεῖς se expresa mejor con «¿no nosotros aún más?».
  - severity: low
    issue: «al contrario» puede mejorarse a «más bien»
    rationale: ἀλλὰ aquí introduce contraste argumentativo, no necesariamente contradicción frontal. «Más bien» suena más natural y preciso en este contexto.
  - severity: low
    issue: 'Error gramatical en alternativa léxica interna: «ninguna estorbo»'
    rationale: Debe ser «ningún estorbo» o mejor omitirse. No afecta el texto bíblico, pero sí la calidad del registro léxico.
