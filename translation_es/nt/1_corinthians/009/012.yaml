translation:
  language: es
  text: Si otros participan de este derecho sobre ustedes[a], ¿no nosotros aún más? Pero no hemos hecho uso de este derecho; más bien[b], soportamos todo para no dar ningún obstáculo al evangelio del Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este reclamo sobre ustedes» / «esta autoridad en relación con ustedes». La frase griega probablemente se refiere al derecho de los apóstoles a recibir apoyo material de los corintios.'
    reason: lexical_alternative
  - marker: b
    text: 'Griego: «el evangelio del Cristo»; aquí se usa «Mesías» porque Χριστός funciona como título. En español tradicional suele aparecer «Cristo».'
    reason: alternative_reading
lexical_decisions:
- source_word: ἐξουσίας / ἐξουσίᾳ
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - autoridad
  - reclamo
  - pretensión
  lexicon: BDAG
  rationale: En este contexto Pablo habla de una legítima prerrogativa para recibir sostén material. En español, 'derecho' comunica mejor la idea de una facultad legítima que puede ejercerse, sin reducirla a mera autoridad abstracta.
- source_word: τῆς ὑμῶν ἐξουσίας
  english_pob_choice: this right over you
  chosen_spanish: este derecho sobre ustedes
  alternatives_spanish:
  - su derecho
  - el derecho de ustedes
  - este reclamo sobre ustedes
  lexicon: BDAG
  rationale: La construcción griega apunta a un derecho en relación con los corintios, probablemente un reclamo para recibir apoyo. 'Sobre ustedes' conserva la relación directa del genitivo, sin hacer pensar que los corintios poseen ese derecho.
- source_word: μετέχουσιν
  english_pob_choice: share in
  chosen_spanish: participan de
  alternatives_spanish:
  - tienen parte en
  - comparten
  - participan en
  lexicon: BDAG
  rationale: El verbo expresa participación o beneficio compartido. 'Participan de' suena natural en español y preserva la idea de tener parte en un derecho.
- source_word: οὐ μᾶλλον ἡμεῖς;
  english_pob_choice: do not we even more?
  chosen_spanish: ¿no mucho más nosotros?
  alternatives_spanish:
  - ¿no nosotros todavía más?
  - ¿no deberíamos nosotros con mayor razón?
  - ¿no muchísimo más nosotros?
  lexicon: BDAG
  rationale: La pregunta retórica conserva la fuerza comparativa de μᾶλλον. El orden elegido es idiomático en español y mantiene el énfasis sin añadir matices ajenos.
- source_word: ἐχρησάμεθα
  english_pob_choice: have not made use of
  chosen_spanish: hemos hecho uso
  alternatives_spanish:
  - nos hemos valido de
  - hemos usado
  - hemos ejercido
  lexicon: BDAG
  rationale: χράομαι aquí significa 'hacer uso de'. 'Hemos hecho uso' es claro y suficientemente cercano al giro griego, con un tono formal adecuado.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todas las cosas
  - lo soportamos todo
  - todo cuanto
  lexicon: BDAG
  rationale: El acusativo neutro plural tiene valor comprehensivo. 'Todo' es la forma más natural en español y conserva la amplitud de la afirmación.
- source_word: στέγομεν
  english_pob_choice: endure
  chosen_spanish: soportamos
  alternatives_spanish:
  - aguantamos
  - sufrimos
  - toleramos
  lexicon: BDAG
  rationale: En este contexto el verbo expresa soportar cargas o privaciones por una causa. 'Soportamos' refleja el sentido de resistencia sostenida sin sugerir ocultamiento.
- source_word: τινα ἐγκοπὴν
  english_pob_choice: no hindrance
  chosen_spanish: ningún obstáculo
  alternatives_spanish:
  - ningún impedimento
  - ninguna estorbo
  - ninguna interrupción
  lexicon: BDAG
  rationale: ἐγκοπή es un impedimento u obstáculo. 'Obstáculo' es claro en español y conserva bien la idea de algo que estorba el avance del evangelio.
- source_word: δῶμεν
  english_pob_choice: we may give
  chosen_spanish: dar
  alternatives_spanish:
  - causar
  - poner
  - provocar
  lexicon: BDAG
  rationale: 'El subjuntivo aoristo con ἵνα μή expresa propósito: evitar ser la causa de un obstáculo. En español, ''dar'' con ''obstáculo'' reproduce de forma natural ese valor.'
- source_word: εὐαγγελίῳ
  english_pob_choice: gospel
  chosen_spanish: evangelio
  alternatives_spanish:
  - buena noticia
  - buenas nuevas
  lexicon: BDAG
  rationale: '''Evangelio'' es el equivalente estable y teológicamente cargado en el contexto paulino, y su uso aquí resulta natural y fiel.'
- source_word: Χριστοῦ
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Siguiendo la pauta del proyecto, Χριστός funciona como título en este contexto. 'Mesías' conserva el sentido titular y evita ocultar la referencia mesiánica.
theological_decisions:
- issue: Χριστοῦ como título mesiánico
  english_pob_reading: the gospel of the Messiah
  chosen_spanish_reading: el evangelio del Mesías
  alternative_spanish_readings:
  - el evangelio de Cristo
  - el evangelio del Ungido
  rationale: El texto griego usa Χριστός de modo titular, no meramente como nombre fijo. 'Mesías' preserva la carga bíblica del título en español y sigue la decisión doctrinal del proyecto.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías cuando funciona como título'
- issue: Ἐξουσία como derecho legítimo de sostén
  english_pob_reading: this right over you
  chosen_spanish_reading: este derecho sobre ustedes
  alternative_spanish_readings:
  - este reclamo sobre ustedes
  - esta autoridad respecto de ustedes
  rationale: La frase se refiere al derecho apostólico de recibir apoyo material, no a dominación. 'Derecho' evita un tono autoritario y mantiene la tensión lexical documentada en el audit trail.
  doctrine_reference: BDAG / English POB lexical note on ἐξουσία
- issue: στέγομεν como soportar por causa del evangelio
  english_pob_reading: we endure everything
  chosen_spanish_reading: soportamos todo
  alternative_spanish_readings:
  - aguantamos todo
  - lo soportamos todo
  rationale: El contexto exige la idea de resistencia y privación aceptada voluntariamente. 'Soportamos' conserva ese valor y la motivación misionera indicada por la cláusula final.
  doctrine_reference: Contexto inmediato de 1 Corintios 9:12
translation_notes:
  revision_awareness: 'Coincide con la última pasada revisada: no se requieren cambios sustantivos. Se mantiene la decisión del audit trail sobre ἐξουσία como ''derecho'' y Χριστός como ''Mesías'', con el matiz de que en español ''derecho'' funciona más naturalmente que ''autoridad'' para la prerrogativa apostólica.'
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente pero moderno de la segunda persona plural como 'ustedes'.
  - '''Evangelio'' se conserva como término técnico paulino, sin sustituirlo por ''buena noticia'' para no diluir la formulación estable.'
  - '''Mesías'' se usa de manera consistente para Χριστός como título, conforme al proyecto.'
  - Se evita 'SEÑOR' como sustituto de nombres divinos porque aquí no aparece κύριος.
