translation:
  language: es
  text: De la misma manera[a][b], el Señor también ordenó que quienes proclaman el evangelio vivan del evangelio.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'predican el evangelio'.
    reason: lexical_alternative
  - marker: b
    text: O 'se ganen la vida con el evangelio'.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: In the same way
  chosen_spanish: De la misma manera
  alternatives_spanish:
  - Así
  - De igual modo
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la relación comparativa con los ejemplos anteriores, sin perder el valor de analogía del original.
- source_word: καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y
  - incluso
  lexicon: BDAG
  rationale: En español, 'también' conserva el matiz aditivo junto con 'el Señor', tal como en el audit trail inglés.
- source_word: ὁ κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - el Amo
  - el Maestro
  lexicon: BDAG
  rationale: Se mantiene el término doctrinal estándar 'Señor', que corresponde a κύριος y preserva la referencia del texto sin expandirla innecesariamente.
- source_word: διέταξεν
  english_pob_choice: commanded
  chosen_spanish: ordenó
  alternatives_spanish:
  - mandó
  - dispuso
  - dio la orden
  lexicon: BDAG
  rationale: '''Ordenó'' comunica una instrucción con autoridad. En español suena natural y conserva la fuerza imperativa del verbo.'
- source_word: τοῖς ... καταγγέλλουσιν
  english_pob_choice: those who proclaim
  chosen_spanish: quienes proclaman
  alternatives_spanish:
  - los que proclaman
  - quienes predican
  - los que anuncian
  lexicon: BDAG
  rationale: La participial articular se vierte como relativo sustantivado. 'Proclaman' preserva el sentido de anuncio público de καταγγέλλω.
- source_word: τὸ εὐαγγέλιον
  english_pob_choice: the gospel
  chosen_spanish: el evangelio
  alternatives_spanish:
  - la buena noticia
  - el mensaje del evangelio
  lexicon: BDAG
  rationale: '''Evangelio'' es el equivalente establecido y permite coherencia terminológica con el uso paulino.'
- source_word: ἐκ τοῦ εὐαγγελίου
  english_pob_choice: from the gospel
  chosen_spanish: del evangelio
  alternatives_spanish:
  - a partir del evangelio
  - por medio del evangelio
  - viviendo del evangelio
  lexicon: BDAG
  rationale: La preposición ἐκ se traduce de modo conciso con 'del', manteniendo la fuente/medio del sustento sin sobreexplicar el mecanismo.
- source_word: ζῆν
  english_pob_choice: should live
  chosen_spanish: vivan
  alternatives_spanish:
  - deben vivir
  - han de vivir
  - vivan de
  lexicon: BDAG
  rationale: En español, el subjuntivo en dependencia de 'ordenó que' expresa la fuerza normativa del infinitivo griego y suena idiomático.
theological_decisions:
- issue: Referent of 'the Lord'
  english_pob_reading: the Lord refers to Jesus, likely alluding to his teaching that gospel workers receive support
  chosen_spanish_reading: el Señor se deja sin expansión, manteniendo la posible referencia a Jesús sin añadirla al texto
  alternative_spanish_readings:
  - el Señor Jesús
  - el Señor, es decir, Jesús
  rationale: El texto fuente no explicita el nombre propio; en español se conserva 'el Señor' para respetar la forma del original y dejar la identificación contextual a la nota y al entorno literario.
  doctrine_reference: 'Contested terms: κύριος → ''Señor''; evitar importar palabras que el texto no da.'
- issue: Nature of support implied by 'live from the gospel'
  english_pob_reading: material/livelihood support for those engaged in gospel proclamation
  chosen_spanish_reading: sostén material para quienes anuncian el evangelio, sugerido por 'vivan del evangelio'
  alternative_spanish_readings:
  - que vivan espiritualmente del evangelio
  - que obtengan su vida del evangelio
  rationale: Se conserva la expresión fuente/medio sin paraphrasear en exceso. El contexto paulino determina que se trata de sustento material, no de una vida espiritual derivada del evangelio.
  doctrine_reference: 'Translation philosophy: preserve theological tension and avoid paraphrase beyond what the source warrants.'
translation_notes:
  revision_awareness: Revisión final sin cambios sustantivos respecto del pasaje auditado en inglés; se conservó la misma lectura de la relación comparativa, del mandato del Señor y del sustento 'del evangelio', con adaptación idiomática natural al español.
  spanish_consistency_notes:
  - Se mantuvo 'evangelio' de forma uniforme para τὸ εὐαγγέλιον y ἐκ τοῦ εὐαγγελίου.
  - Se usó 'Señor' como equivalente estable de κύριος, sin añadir 'Jesús' en el cuerpo del versículo.
  - '''Proclaman'' se eligió para conservar la amplitud de καταγγέλλω, dejando abierta la alternativa ''predican'' en nota.'
  - '''Vivan del evangelio'' conserva la ambigüedad fuente/medio del original y permite que el contexto determine el tipo de sostén.'
