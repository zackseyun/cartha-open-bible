lexical_decisions:
- source_word: ἀπολογία
  english_pob_choice: defense
  chosen_spanish: defensa
  alternatives_spanish:
  - respuesta
  - vindicación
  lexicon: BDAG
  rationale: En este contexto, Pablo presenta una respuesta formal ante cuestionamientos sobre su apostolado y su conducta. «Defensa» conserva el valor de contestación ante críticas o acusaciones sin sonar técnico de más. Evita además el falso amigo «apología» en español moderno.
- source_word: ἀνακρίνουσίν
  english_pob_choice: examine
  chosen_spanish: examinan
  alternatives_spanish:
  - juzgan
  - interrogan
  - investigan
  lexicon: BDAG
  rationale: El participio señala a quienes someten a Pablo a escrutinio o evaluación. «Examinan» conserva la idea de valoración crítica sin imponer tan fuertemente un veredicto judicial como «juzgan».
- source_word: Ἡ ἐμὴ
  english_pob_choice: my
  chosen_spanish: mi
  alternatives_spanish:
  - mi propia
  lexicon: BDAG
  rationale: El posesivo es directo y no requiere énfasis adicional en español. «Mi» reproduce con naturalidad el sentido del griego sin sobrecargar la frase.
- source_word: τοῖς ἐμὲ ἀνακρίνουσίν
  english_pob_choice: to those who examine me
  chosen_spanish: ante los que me examinan
  alternatives_spanish:
  - a los que me examinan
  - para los que me examinan
  lexicon: BDAG
  rationale: Aunque el dativo puede entenderse como destinatario, en español «ante» expresa bien el matiz de defensa dirigida a quienes lo evalúan o cuestionan. Mantiene la relación discursiva implícita en la construcción griega y la alternativa inglesa documentada «before those who judge me».
- source_word: ἐστιν αὕτη
  english_pob_choice: This is
  chosen_spanish: Esta es
  alternatives_spanish:
  - Ésta es
  lexicon: BDAG
  rationale: El orden natural del español es «Esta es», que identifica con claridad la afirmación. Se conserva la estructura identificativa del griego sin calcar el orden de palabras.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alta concordancia; no hubo cambios de revisión relevantes. La versión española sigue de cerca la identificación retórica del versículo y conserva la alternativa semántica más fuerte de ἀνακρίνω en una nota.
  spanish_consistency_notes:
  - Se usa «defensa» para ἀπολογία en coherencia con el valor forense/documentado por el POB en inglés.
  - Se evita «Cristo» o terminología no presente en el versículo.
  - La nota mantiene la tensión entre «examinar» y «juzgar» documentada en el inglés, sin diluirla.
