translation:
  language: es
  text: ¿O acaso habla ciertamente[a] para nuestro bien? Pues fue escrito para nuestro bien, porque el que ara debe arar con esperanza[b], y el que trilla debe trillar con esperanza de participar.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «enteramente» o «por completo». El adverbio griego intensifica la pregunta retórica.
    reason: lexical_alternative
  - marker: b
    text: Literalmente «en esperanza». El griego repite la misma expresión y no explicita el objeto de «participar».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντως
  english_pob_choice: entirely
  chosen_spanish: en todo sentido
  alternatives_spanish:
  - enteramente
  - por completo
  - ciertamente
  lexicon: BDAG
  rationale: En la pregunta retórica, πάντως intensifica la idea de que la afirmación se aplica plenamente a los creyentes. «En todo sentido» comunica esa fuerza sin sonar tan absoluto o categórico como «por completo» en este contexto argumentativo.
- source_word: δι’ ἡμᾶς
  english_pob_choice: for our sake
  chosen_spanish: por nosotros
  alternatives_spanish:
  - para nosotros
  - en favor nuestro
  - por causa nuestra
  lexicon: BDAG
  rationale: διά con acusativo puede expresar causa o beneficio. «Por nosotros» es natural en español y conserva la idea de referencia beneficiaria/causal que Pablo está defendiendo.
- source_word: ἐγράφη
  english_pob_choice: it was written
  chosen_spanish: fue escrito
  alternatives_spanish:
  - ha sido escrito
  - está escrito
  lexicon: BDAG
  rationale: El aoristo pasivo se vierte de manera directa y idiomática con pretérito pasivo. «Está escrito» es posible en fórmula citacional, pero aquí «fue escrito» refleja mejor la forma verbal griega y mantiene la claridad.
- source_word: ὀφείλει
  english_pob_choice: ought to
  chosen_spanish: debe
  alternatives_spanish:
  - debería
  - tiene que
  - está obligado a
  lexicon: BDAG
  rationale: ὀφείλω expresa obligación o conveniencia normativa. «Debe» conserva esa fuerza sin volverla excesivamente rígida; en español suena natural en un enunciado proverbial.
- source_word: ἐπ’ ἐλπίδι
  english_pob_choice: in hope
  chosen_spanish: en esperanza
  alternatives_spanish:
  - con esperanza
  - sobre la base de la esperanza
  lexicon: BDAG
  rationale: La frase se repite dos veces y conviene preservarla de modo uniforme. «En esperanza» es fiel y mantiene el paralelismo; aunque menos usual que «con esperanza», evita introducir un matiz distinto.
- source_word: ὁ ἀροτριῶν ἀροτριᾶν
  english_pob_choice: the one who plows ought to plow
  chosen_spanish: el que ara debe arar
  alternatives_spanish:
  - el arador debe arar
  - quien ara debe arar
  lexicon: BDAG
  rationale: El participio articular y el infinitivo se traducen con una construcción genérica y paralela. «El que ara» conserva el valor representativo sin marcar género de forma innecesaria.
- source_word: ὁ ἀλοῶν
  english_pob_choice: the one who threshes
  chosen_spanish: el que trilla
  alternatives_spanish:
  - el trillador
  - quien trilla
  lexicon: BDAG
  rationale: Se mantiene el paralelismo con la primera mitad de la sentencia. «El que trilla» es claro y conserva la referencia al trabajador agrícola sin añadir especificaciones.
- source_word: τοῦ μετέχειν
  english_pob_choice: of sharing
  chosen_spanish: de participar
  alternatives_spanish:
  - de compartir
  - de participar en ello
  - de tomar parte
  lexicon: BDAG
  rationale: μετέχω significa participar en, compartir, tener parte en. Como el griego no explicita el objeto, «de participar» conserva la apertura semántica y sigue la revisión más reciente del POB en inglés, evitando agregar «la cosecha» o «el grano» sin base explícita.
theological_decisions:
- issue: Alcance de la pregunta retórica inicial
  english_pob_reading: Or is he speaking entirely for our sake?
  chosen_spanish_reading: ¿O habla en todo sentido por nosotros?
  alternative_spanish_readings:
  - ¿O habla enteramente por nosotros?
  - ¿O habla ciertamente por nosotros?
  rationale: La construcción retórica busca afirmar que la escritura no es accidentalmente citada, sino que realmente se orienta a los creyentes. «En todo sentido» preserva la intensidad sin convertir la inferencia en certeza lógica absoluta.
  doctrine_reference: 1 Corintios 9:10; principio de lectura argumentativa del texto inspirada en el contexto inmediato.
- issue: Objeto implícito de μετέχειν
  english_pob_reading: of sharing
  chosen_spanish_reading: de participar
  alternative_spanish_readings:
  - de compartir
  - de participar en ello
  - de tomar parte
  rationale: El griego deja el objeto implícito. Dado que la última revisión inglesa evitó añadir 'the harvest,' la versión española también evita concretarlo. «Participar» conserva el sentido de tener parte en algo sin imponer un objeto no expresado.
  doctrine_reference: 1 Corintios 9:10; economía del texto y respeto por la elipsis griega.
translation_notes:
  revision_awareness: He seguido la revisión más reciente del POB en inglés al no añadir ningún objeto explícito a «participar»; por eso no se traduce como «participar de la cosecha». También mantuve el paralelismo verbal completo con «debe arar» y «debe trillar», y conservé la repetición de ἐπ’ ἐλπίδι con una fórmula uniforme en español.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto fuente lo requiera; aquí no aplica.
  - Se conserva «esperanza» para ἐλπίς y no se reemplaza por un giro interpretativo más amplio.
  - «Participar» mantiene la elipsis del griego y evita sobreespecificar el objeto implícito.
  - El tono es sobrio y publicable, con sintaxis natural en español y paralelismo retórico visible.
