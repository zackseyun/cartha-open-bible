translation:
  language: es
  text: Pero yo hago todas las cosas por causa de la buena noticia[a], para que llegue a ser copartícipe de ella[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'por causa del evangelio'.
    reason: lexical_alternative
  - marker: b
    text: O 'para que participe en ella' o 'para que llegue a ser un partícipe de ella'.
    reason: alternative_reading
lexical_decisions:
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo cuanto
  lexicon: BDAG
  rationale: El neutro plural abarcador de πᾶς se vierte mejor con una expresión totalizante en español. 'Todas las cosas' preserva la amplitud sin reducirla a un resumen menos concreto como 'todo cuanto'.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un leve giro o transición respecto del contexto anterior. 'Pero' comunica bien ese matiz adversativo o de contraste en español contemporáneo.
- source_word: ποιῶ
  english_pob_choice: I do
  chosen_spanish: hago
  alternatives_spanish:
  - estoy haciendo
  - practico
  lexicon: BDAG
  rationale: El presente indicativo de ποιέω se expresa naturalmente con 'hago'. Mantiene el valor habitual/actual sin sonar forzado.
- source_word: διὰ τὸ εὐαγγέλιον
  english_pob_choice: for the sake of the good news
  chosen_spanish: por causa de la buena noticia
  alternatives_spanish:
  - por causa del evangelio
  - a causa de la buena noticia
  lexicon: BDAG
  rationale: διά con acusativo puede indicar motivo o propósito. 'Por causa de' conserva esa orientación. Se traduce εὐαγγέλιον como 'buena noticia' para seguir una opción más fuente-orientada y evitar imponer 'evangelio' como término eclesial fijo cuando el contexto admite una equivalencia más transparente.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα introduce una cláusula de propósito. 'Para que' es el equivalente natural y claro en español.
- source_word: συγκοινωνὸς
  english_pob_choice: a fellow participant
  chosen_spanish: un[a] compañero participante
  alternatives_spanish:
  - un partícipe
  - un copartícipe
  - un compañero de participación
  lexicon: BDAG
  rationale: El compuesto con συν- enfatiza participación compartida. 'Compañero participante' intenta conservar la idea de alguien que participa junto con otros, sin estrechar el sentido a una sola esfera teológica. Se mantiene la rareza del término con una solución transparente en español.
- source_word: αὐτοῦ
  english_pob_choice: in it
  chosen_spanish: en ella
  alternatives_spanish:
  - en él
  - de ella
  - de él
  lexicon: BDAG
  rationale: El antecedente inmediato es τὸ εὐαγγέλιον, neutro en griego; en español se alude naturalmente como 'la buena noticia'. Por eso se usa 'en ella' para referirse a esa noticia, manteniendo la referencia pronominal y la relación de participación.
- source_word: γένωμαι
  english_pob_choice: I may become
  chosen_spanish: llegue a ser
  alternatives_spanish:
  - me haga
  - pueda llegar a ser
  - sea
  lexicon: BDAG
  rationale: El aoristo subjuntivo de γίνομαι después de ἵνα expresa un resultado/finalidad con matiz de llegada a un estado. 'Llegue a ser' conserva ese valor inceptivo mejor que un simple 'sea'.
theological_decisions:
- issue: Alcance de la participación de Pablo en 'la buena noticia'
  english_pob_reading: Paul speaks of sharing in the blessings/advance of the good news rather than making a technical doctrinal claim about sacramental or mystical union.
  chosen_spanish_reading: Pablo expresa que participa de la buena noticia y busca quedar incluido como compañero en esa participación, sin estrechar el sentido a una doctrina técnica específica.
  alternative_spanish_readings:
  - participar en sus bendiciones
  - participar en su avance
  - ser un colaborador del evangelio
  rationale: 'συγκοινωνός admite un rango amplio: compartir, participar junto con otros, tener parte en algo. La formulación española conserva esa amplitud y evita restringir el texto a ministerio solamente o a un sistema doctrinal preciso.'
  doctrine_reference: Preservar la tensión teológica sin resolverla de antemano.
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el griego SBLGNT y la auditoría inglesa: mantiene el contraste de δέ, el propósito de ἵνα y la amplitud de συγκοινωνός sin reducirla a una sola interpretación teológica. Se eligió ''buena noticia'' como equivalente transparente de εὐαγγέλιον, coherente con el criterio POB documentado en inglés.'
  spanish_consistency_notes:
  - Se mantiene 'buena noticia' para εὐαγγέλιον, en lugar de imponer 'evangelio' como fórmula fija.
  - '''Por causa de'' conserva la motivación expresa por διά + acusativo.'
  - La referencia pronominal se adapta al género natural de 'noticia' en español ('en ella') sin perder el antecedente neutro del griego.
  - '''Llegue a ser'' conserva el matiz de resultado/incoación del subjuntivo aoristo tras ἵνα.'
