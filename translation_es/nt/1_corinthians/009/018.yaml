translation:
  language: es
  text: ¿Cuál es entonces mi recompensa? Que, al anunciar la buena noticia, la presente gratis[a][b], para no hacer pleno uso de mi derecho en la buena noticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el evangelio» en todo este versículo.
    reason: lexical_alternative
  - marker: b
    text: O «para no hacer pleno uso de mi derecho en el ministerio de la buena noticia».
    reason: lexical_alternative
lexical_decisions:
- source_word: μισθός
  english_pob_choice: reward
  chosen_spanish: recompensa
  alternatives_spanish:
  - salario
  - paga
  lexicon: BDAG
  rationale: En este contexto Pablo contrapone su recompensa con el recibir sustento; «recompensa» reproduce bien la pregunta retórica y evita restringir el sentido a un salario literal.
- source_word: εὐαγγελιζόμενος
  english_pob_choice: in preaching the good news
  chosen_spanish: al anunciar la buena noticia
  alternatives_spanish:
  - mientras predico la buena noticia
  - al evangelizar
  lexicon: BDAG
  rationale: El participio expresa la acción concomitante de Pablo. «Al anunciar» conserva el valor verbal y suena natural en español; «buena noticia» refleja el sentido básico de εὐαγγέλιον.
- source_word: ἀδάπανον
  english_pob_choice: free of charge
  chosen_spanish: gratis
  alternatives_spanish:
  - sin costo
  - sin gasto
  lexicon: BDAG
  rationale: El adjetivo significa «sin costo / sin gasto». «Gratis» es la forma breve y clara en español moderno para comunicar que no exige pago.
- source_word: θήσω τὸ εὐαγγέλιον
  english_pob_choice: present the good news
  chosen_spanish: la presente la buena noticia
  alternatives_spanish:
  - la ofrezca la buena noticia
  - la coloque la buena noticia
  lexicon: BDAG
  rationale: La imagen literal es «poner / colocar el evangelio», pero el sentido idiomático en contexto es exponerlo o presentarlo. En español, «la presente» mantiene el gesto de ponerla delante sin calco pesado.
- source_word: εὐαγγέλιον
  english_pob_choice: good news
  chosen_spanish: buena noticia
  alternatives_spanish:
  - evangelio
  lexicon: BDAG
  rationale: Se privilegia el sentido léxico directo de εὐαγγέλιον. «Buena noticia» es transparente y conserva la preferencia del proyecto por español moderno cuando el contexto lo permite.
- source_word: καταχρήσασθαι
  english_pob_choice: make full use of
  chosen_spanish: hacer pleno uso de
  alternatives_spanish:
  - usar plenamente
  - aprovechar al máximo
  lexicon: BDAG
  rationale: El verbo puede implicar uso pleno o abuso según contexto. Aquí la idea es que Pablo no ejercerá plenamente su derecho; «hacer pleno uso de» mantiene esa tensión sin imponer la noción de abuso.
- source_word: ἐξουσίᾳ
  english_pob_choice: right
  chosen_spanish: derecho
  alternatives_spanish:
  - autoridad
  - facultad
  - reclamo
  lexicon: BDAG
  rationale: En 1 Corintios 9, ἐξουσία se refiere al derecho legítimo de recibir apoyo. «Derecho» comunica mejor esa nuance que «autoridad» en español.
- source_word: ἐν τῷ εὐαγγελίῳ
  english_pob_choice: in the good news
  chosen_spanish: en la buena noticia
  alternatives_spanish:
  - en el evangelio
  - en mi ministerio de la buena noticia
  lexicon: BDAG
  rationale: Se mantiene la correspondencia directa con el griego. «En la buena noticia» conserva la preposición y la repetición del término en el verso.
theological_decisions:
- issue: Naturaleza de la ἐξουσία de Pablo en el contexto
  english_pob_reading: Paul refers to his legitimate right to receive support in gospel ministry, which he voluntarily declines to use fully.
  chosen_spanish_reading: Pablo se refiere a su derecho legítimo a recibir sustento en la proclamación de la buena noticia, derecho que decide no ejercer plenamente.
  alternative_spanish_readings:
  - Pablo habla de su autoridad apostólica en general
  - Pablo insinúa un uso indebido de su autoridad
  rationale: El contexto inmediato trata del sustento material del apóstol. Por eso se usa «derecho» y «hacer pleno uso de», evitando sugerir dominación o abuso no presente en el argumento.
  doctrine_reference: Translation philosophy §1, §5
- issue: Traducción de εὐαγγέλιον
  english_pob_reading: good news
  chosen_spanish_reading: buena noticia
  alternative_spanish_readings:
  - evangelio
  rationale: No hay una cuestión doctrinal disputada aquí, pero la traducción busca legibilidad moderna. «Buena noticia» preserva el sentido básico sin recurrir automáticamente al tecnicismo eclesial.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se siguió el estado final sin revisiones aplicadas y el veredicto de alta concordancia. La traducción española mantiene el contraste retórico entre «recompensa», la acción de anunciar y la renuncia a ejercer plenamente el derecho; también preserva la ambigüedad léxica de εὐαγγέλιον con una nota alternativa.
  spanish_consistency_notes:
  - Se optó por «buena noticia» para εὐαγγέλιον en el texto principal, coherente con el criterio del proyecto y con la claridad contemporánea.
  - Se escogió «derecho» para ἐξουσία en lugar de «autoridad», porque el contexto trata del sustento apostólico.
  - Se mantuvo la tensión de καταχράομαι como «hacer pleno uso de» sin cargar el texto con una idea de abuso que no es necesaria en este versículo.
  - La nota b preserva la alternativa contextual de «ministerio de la buena noticia», equivalente al matiz explicativo del inglés auditado.
