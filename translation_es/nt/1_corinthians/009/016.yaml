review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador comunica bien el sentido básico del griego: Pablo no tiene base para gloriarse al anunciar el evangelio, porque una necesidad pesa sobre él, y le espera un ''¡ay!'' si no lo hace. Sin embargo, la nota b no preserva fielmente la alternativa inglesa; cambia el punto de la alternativa desde ''me es impuesta una necesidad / recae sobre mí'' a ''me es impuesto anunciar el evangelio'', lo cual interpreta más de lo que dice la cláusula griega ἀνάγκη... ἐπίκειται. Además, en español conviene expresar con más naturalidad la combinación de ἀνάγκη + ἐπίκειται.'
  spanish_quality_summary: El texto es claro, digno y legible. 'Anuncio el evangelio' funciona bien para εὐαγγελίζωμαι, y '¡ay de mí!' preserva el tono solemne. La principal mejora estilística es cambiar 'me es impuesta una necesidad' por una formulación más natural como 'una necesidad recae sobre mí', que conserva mejor la imagen de algo que pesa sobre Pablo y evita una construcción algo forzada.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. La elección 'anuncio el evangelio' es aceptable como equivalente contextual de εὐαγγελίζωμαι, con la alternativa 'proclamo la buena noticia' bien documentada. No aparecen términos sensibles como Yahvé, Mesías, esclavo, etc. La revisión se centra en precisión semántica y naturalidad, no en glosario mayor.
  issues:
  - severity: medium
    issue: La nota b no corresponde a la alternativa documentada en el inglés POB.
    rationale: La nota inglesa ofrece una alternativa a la cláusula principal de obligación/amenaza ('Or “woe to me if I do not preach the gospel.”' según el expediente dado, aunque está marcada en b junto a 'is laid upon me'). La nota española actual introduce 'porque me es impuesto anunciar el evangelio', que desplaza el sentido desde ἀνάγκη/ἐπίκειται a una paráfrasis interpretativa del deber de predicar.
  - severity: low
    issue: '''Me es impuesta una necesidad'' suena algo rígido en español.'
    rationale: Aunque no es incorrecto, 'una necesidad recae sobre mí' o 'me ha sido impuesta una necesidad' suena más natural y refleja mejor ἐπίκειται ('está sobre mí', 'pesa sobre mí').
  - severity: low
    issue: La repetición inicial/final de 'porque' puede aligerarse sin perder γάρ.
    rationale: Mantener un γάρ como 'porque' y el otro como 'pues' o 'porque' es cuestión de estilo. No es error, pero una cadencia más natural mejora la lectura española.
  revised_spanish_text: Porque si anuncio el evangelio[a], no tengo de qué gloriarme, pues una necesidad recae sobre mí[b]; porque ¡ay de mí si no anuncio el evangelio!
  revised_footnotes:
  - marker: a
    text: O «proclamo la buena noticia» para ambas ocurrencias de «anuncio el evangelio».
    reason: lexical_alternative
  - marker: b
    text: O «me ha sido impuesta una necesidad».
    reason: lexical_alternative
  revision_rationale: Se revisa la cláusula de ἀνάγκη... ἐπίκειται para lograr un español más natural y más cercano a la imagen del griego ('recae sobre mí'). También se corrige la nota b para que sea una alternativa léxica genuina de la expresión de necesidad impuesta, en vez de una paráfrasis interpretativa sobre anunciar el evangelio. El resto del versículo puede mantenerse.
