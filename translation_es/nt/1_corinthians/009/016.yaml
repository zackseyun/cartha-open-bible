revisions:
- from: Porque si anuncio el evangelio[a], no tengo de qué gloriarme, pues me es impuesta una necesidad[b]; porque ¡ay de mí si no anuncio el evangelio!
  to: Porque si anuncio el evangelio[a], no tengo de qué gloriarme, pues una necesidad recae sobre mí[b]; porque ¡ay de mí si no anuncio el evangelio!
  rationale: Se revisa la cláusula de ἀνάγκη... ἐπίκειται para lograr un español más natural y más cercano a la imagen del griego ('recae sobre mí'). También se corrige la nota b para que sea una alternativa léxica genuina de la expresión de necesidad impuesta, en vez de una paráfrasis interpretativa sobre anunciar el evangelio. El resto del versículo puede mantenerse.
