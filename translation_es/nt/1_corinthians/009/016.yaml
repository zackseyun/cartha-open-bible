translation:
  language: es
  text: Porque si anuncio el evangelio[a], no tengo de qué gloriarme, pues una necesidad recae sobre mí[b]; porque ¡ay de mí si no anuncio el evangelio!
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «proclamo la buena noticia» para ambas ocurrencias de «anuncio el evangelio».
    reason: lexical_alternative
  - marker: b
    text: O «me ha sido impuesta una necesidad».
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐαγγελίζωμαι / εὐαγγελίσωμαι
  english_pob_choice: preach the gospel
  chosen_spanish: anuncio el evangelio
  alternatives_spanish:
  - predico el evangelio
  - proclamo la buena noticia
  lexicon: BDAG
  rationale: El verbo griego significa anunciar buenas noticias. En este contexto paulino, el contenido es claramente el evangelio. «Anuncio el evangelio» conserva el sentido proclamativo y resulta natural en español actual; evita un calco pesado y mantiene la misma opción para ambas ocurrencias.
- source_word: καύχημα
  english_pob_choice: ground for boasting
  chosen_spanish: de qué gloriarme
  alternatives_spanish:
  - motivo de jactarme
  - base para gloriarme
  lexicon: BDAG
  rationale: καύχημα señala aquello en lo cual uno se gloría o un fundamento para ello. «De qué gloriarme» expresa de modo natural que Pablo niega tener motivo legítimo para la autoexaltación, no solo el acto de hablar con jactancia.
- source_word: ἀνάγκη
  english_pob_choice: necessity
  chosen_spanish: una necesidad
  alternatives_spanish:
  - una compulsión
  - una obligación
  lexicon: BDAG
  rationale: El sustantivo indica una necesidad o compulsión impuesta. «Una necesidad» es claro y sobrio en español; conserva la fuerza de obligación sin especificar indebidamente si procede de una causa interna o externa.
- source_word: ἐπίκειται
  english_pob_choice: is laid upon me
  chosen_spanish: me es impuesta
  alternatives_spanish:
  - recae sobre mí
  - se me impone
  lexicon: BDAG
  rationale: El verbo comunica algo que pesa sobre Pablo o le es impuesto. «Me es impuesta» reproduce bien esa idea de carga obligatoria con un español idiomático y digno.
- source_word: οὐαί
  english_pob_choice: woe
  chosen_spanish: ¡ay!
  alternatives_spanish:
  - ¡ay de mí!
  - ¡desgracia!
  lexicon: BDAG
  rationale: La interjección transmite lamento severo y tono profético. «¡Ay!» conserva la fuerza exclamativa; completado con «de mí» en la frase siguiente, mantiene el efecto retórico sin sonar artificial.
- source_word: οὐαὶ γάρ μοί ἐστιν
  english_pob_choice: woe is me
  chosen_spanish: ¡ay de mí!
  alternatives_spanish:
  - ¡desgracia sobre mí!
  - ¡pobre de mí!
  lexicon: BDAG
  rationale: La expresión es idiomática. «¡Ay de mí!» preserva el tono solemne y profético del griego; en español resulta más natural y reverente que una paráfrasis explicativa.
- source_word: ἐὰν μὴ
  english_pob_choice: if I do not
  chosen_spanish: si no
  alternatives_spanish:
  - a menos que
  - si no llego a
  lexicon: BDAG
  rationale: La construcción condicional es directa. «Si no» es la traducción más clara y compacta en este contexto, sin recargar la sintaxis.
- source_word: γάρ
  english_pob_choice: for
  chosen_spanish: porque
  alternatives_spanish:
  - pues
  - en efecto
  lexicon: BDAG
  rationale: γάρ introduce explicación. «Porque» comunica con claridad la relación causal y funciona bien al inicio de las cláusulas en español; donde la cadencia lo requiere, también puede percibirse como «pues».
theological_decisions:
- issue: Naturaleza de la obligación de Pablo para anunciar el evangelio
  english_pob_reading: Rendered as an imposed necessity without specifying whether it is divine commission, internal compulsion, or external circumstance alone.
  chosen_spanish_reading: «Me es impuesta una necesidad» sin precisar si esa necesidad proviene de un mandato divino, de una compulsión interna o de una circunstancia externa.
  alternative_spanish_readings:
  - «Tengo que anunciar el evangelio porque Dios me lo ha encargado»
  - «Siento una compulsión interior por anunciar el evangelio»
  - «Estoy obligado por las circunstancias a anunciar el evangelio»
  rationale: El griego afirma que la necesidad recae sobre Pablo, pero no explicita aquí su origen. La redacción española conserva esa tensión y evita introducir una explicación doctrinal que el versículo no formula.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Revisado contra el texto griego SBLGNT y el audit trail inglés de la POB. Se mantuvo la misma decisión léxica para εὐαγγελίζωμαι / εὐαγγελίσωμαι, se preservó la tensión teológica sobre el origen de la necesidad, y no se introdujeron ampliaciones interpretativas ajenas al versículo.
  spanish_consistency_notes:
  - Se usó «evangelio» como objeto implícito de εὐαγγελίζωμαι / εὐαγγελίσωμαι, en continuidad con la decisión auditada en inglés.
  - Se evitó «SEÑOR» y otras sustituciones no pertinentes; no hay términos divinos explícitos en este versículo.
  - «Gloriarme» conserva la fuerza de καύχημα en un registro bíblico claro y natural para español.
  - La exclamación «¡ay de mí!» preserva el tono profético de οὐαί sin suavizarlo.
