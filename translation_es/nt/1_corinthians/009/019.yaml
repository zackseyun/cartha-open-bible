translation:
  language: es
  text: Porque, aunque soy libre de todos[a], me hice esclavo de todos, para ganar a más personas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «me hice siervo de todos». El griego usa lenguaje de esclavitud; se mantiene en el texto principal porque el contraste con «libre» es central para el argumento de Pablo.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - independiente
  lexicon: BDAG
  rationale: El adjetivo expresa ausencia de sujeción o dependencia. «Libre» es el equivalente natural en español y conserva el contraste con la esclavitud que sigue.
- source_word: ἐκ πάντων
  english_pob_choice: from all
  chosen_spanish: de todos
  alternatives_spanish:
  - respecto de todos
  - de parte de todos
  lexicon: BDAG
  rationale: La preposición ἐκ con πάντων comunica libertad en relación con todos. «De todos» preserva la brevedad y el paralelismo con «a todos».
- source_word: πᾶσιν
  english_pob_choice: to all
  chosen_spanish: a todos
  alternatives_spanish:
  - a cada uno
  - a todos ellos
  lexicon: BDAG
  rationale: El dativo marca el ámbito de la autoesclavización de Pablo. «A todos» conserva el paralelismo retórico con «de todos» y la amplitud del referente.
- source_word: ἐμαυτὸν ἐδούλωσα
  english_pob_choice: I made myself a slave
  chosen_spanish: me hice esclavo
  alternatives_spanish:
  - me esclavicé
  - me hice siervo
  lexicon: BDAG
  rationale: δουλόω significa hacer esclavo o someter a esclavitud. Se mantiene «esclavo» porque el contraste con «libre» es central y la fuerza retórica del verbo debe conservarse.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - para que
  lexicon: BDAG
  rationale: La cláusula expresa propósito. En español, «para» transmite con naturalidad el valor final sin forzar la sintaxis.
- source_word: τοὺς πλείονας
  english_pob_choice: more of them
  chosen_spanish: a más
  alternatives_spanish:
  - a un mayor número
  - a muchos más
  lexicon: BDAG
  rationale: El comparativo indica un número mayor de personas. «A más» es breve y respeta el carácter elíptico del griego sin añadir contenido extra.
- source_word: κερδήσω
  english_pob_choice: might win
  chosen_spanish: ganar
  alternatives_spanish:
  - ganar para Cristo
  - conquistar
  lexicon: BDAG
  rationale: En contexto paulino, κερδαίνω tiene el sentido figurado de ganar personas mediante la misión. «Ganar» comunica esa idea en español sin sobreespecificar.
theological_decisions:
- issue: Lenguaje de esclavitud frente a alternativa más suave
  english_pob_reading: slave
  chosen_spanish_reading: esclavo
  alternative_spanish_readings:
  - siervo
  - servidor
  rationale: Se conserva la imagen de esclavitud porque el contraste con «libre» es deliberado y teológicamente importante en el argumento de Pablo. Suavizarla borraría la tensión lexical documentada.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
translation_notes:
  revision_awareness: La revisión auditada no requirió cambios; se conserva el acuerdo alto del control cruzado y se corrige únicamente la ancladura de la nota para que [a] aparezca en el texto español.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto cuando aparezca el nombre divino; aquí no interviene.
  - Se preserva la oposición libre/esclavo, evitando sustituirla por «siervo» en el texto principal.
  - «Ganar» traduce el valor figurado de κερδήσω sin añadir una referencia explícita a Cristo que el verso no menciona.
