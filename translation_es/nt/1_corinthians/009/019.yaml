    issue: «para ganar a más» es poco natural y semánticamente escueto en español
    rationale: Aunque reproduce la elipsis del inglés, en español suena truncado. τοὺς πλείονας se entiende mejor como «a más personas» o «al mayor número», conservando el sentido comparativo sin sobreinterpretar.
  - severity: low
    issue: Redacción de la nota al pie mejorable
    rationale: 'La nota comienza con comillas y dos puntos de manera poco limpia: «''O: ...''». Conviene normalizarla a «O: “me hice siervo de todos”...» para mayor claridad editorial.'
