translation:
  language: es
  text: Ahora bien, todo el que compite ejerce dominio propio en todo. Ellos lo hacen para recibir una corona[a] perecedera, pero nosotros, una impercedera.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «guirnalda»; el término griego se refiere a la corona otorgada al vencedor en competencias atléticas.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶς
  english_pob_choice: everyone
  chosen_spanish: todo el que
  alternatives_spanish:
  - cada uno que
  - todo aquel que
  lexicon: BDAG
  rationale: La construcción griega con participio singular tiene valor genérico y representativo. En español, «todo el que» conserva la amplitud inclusiva sin volver masculino el referente ni sonar forzado.
- source_word: ἀγωνιζόμενος
  english_pob_choice: who competes
  chosen_spanish: compite
  alternatives_spanish:
  - se esfuerza
  - contiende
  - entrena para la competencia
  lexicon: BDAG
  rationale: El contexto inmediato es atlético. «Compite» reproduce de forma natural la imagen de la carrera/contienda y evita suavizar el matiz competitivo.
- source_word: πάντα
  english_pob_choice: in all things
  chosen_spanish: en todo
  alternatives_spanish:
  - en todas las cosas
  - en todo aspecto
  lexicon: BDAG
  rationale: Como acusativo de alcance con ἐγκρατεύεται, la frase expresa amplitud de autodominio. «En todo» es idiomático en español y mantiene el alcance general sin restringirlo a dieta o entrenamiento.
- source_word: ἐγκρατεύεται
  english_pob_choice: exercises self-control
  chosen_spanish: se domina
  alternatives_spanish:
  - se ejerce autocontrol
  - practica disciplina
  - es disciplinado
  lexicon: BDAG
  rationale: La forma verbal indica práctica habitual de contención. «Se domina» transmite autodominio activo y breve en español, cercano al campo semántico de ἐγκρατεύομαι.
- source_word: ἐκεῖνοι μὲν οὖν
  english_pob_choice: They do so
  chosen_spanish: Ellos lo hacen
  alternatives_spanish:
  - Esos, pues, lo hacen
  - Ellos, en efecto, lo hacen
  lexicon: BDAG
  rationale: El griego retoma implícitamente el verbo de la oración anterior. «Ellos lo hacen» hace explícita esa referencia en español y conserva el contraste con «nosotros».
- source_word: ἵνα
  english_pob_choice: in order to
  chosen_spanish: para
  alternatives_spanish:
  - a fin de
  - con el fin de
  lexicon: BDAG
  rationale: La cláusula expresa propósito. «Para» es la forma más natural y directa en español para este valor final.
- source_word: φθαρτὸν
  english_pob_choice: perishable
  chosen_spanish: perecedera
  alternatives_spanish:
  - corruptible
  - caduca
  - que se descompone
  lexicon: BDAG
  rationale: La serie contrasta con ἄφθαρτον. «Perecedera» reproduce bien el antónimo «impercedera» y mantiene la idea de algo destinado a pasar.
- source_word: στέφανον
  english_pob_choice: crown
  chosen_spanish: corona
  alternatives_spanish:
  - guirnalda
  - cinta victoriosa
  - corona de vencedor
  lexicon: BDAG
  rationale: En contexto atlético, στέφανος es la corona o guirnalda del vencedor. «Corona» es claro y digno en español; la nota preserva la alternativa más específica.
- source_word: λάβωσιν
  english_pob_choice: receive
  chosen_spanish: recibir
  alternatives_spanish:
  - obtener
  - alcanzar
  - ganar
  lexicon: BDAG
  rationale: El subjuntivo aoristo con ἵνα expresa finalidad. «Recibir» comunica bien la idea de un premio otorgado.
- source_word: ἡμεῖς δὲ ἄφθαρτον
  english_pob_choice: but we an imperishable one
  chosen_spanish: pero nosotros, una impercedera
  alternatives_spanish:
  - pero nosotros, una incorruptible
  - pero nosotros, una corona impercedera
  - pero nosotros, una que no perece
  lexicon: BDAG
  rationale: El griego elide el sustantivo «corona» en la segunda cláusula. En español, la elipsis es posible tras el antecedente inmediato, y «una impercedera» preserva la abreviación y el contraste con «perecedera».
theological_decisions:
- issue: Naturaleza del galardón final
  english_pob_reading: Retain the athletic prize image as 'crown' without specifying a doctrinal referent beyond Paul's contrast between temporary and enduring reward.
  chosen_spanish_reading: Mantener la imagen atlética de la «corona» sin identificar de forma explícita el galardón con vida eterna, recompensas celestiales u otra formulación doctrinal.
  alternative_spanish_readings:
  - Interpretar explícitamente como vida eterna
  - Interpretarlo como recompensas celestiales
  - Reformularlo como una promesa escatológica concreta
  rationale: El versículo presenta una metáfora y no define el premio con precisión doctrinal. La traducción debe conservar esa tensión y no resolverla con una explicación teológica que el texto no da.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: 'La redacción sigue el pasaje griego de SBLGNT y concuerda con el audit trail inglés: mantiene la metáfora atlética, la oposición perecedero/impercedero y la elipsis del sustantivo en la segunda cláusula. No se introdujeron cambios respecto del último pase de revisión, que quedó sin modificaciones.'
  spanish_consistency_notes:
  - Se usó «corona» para στέφανος y se dejó la alternativa específica «guirnalda» en nota.
  - Se mantuvo «perecedera/impercedera» para reproducir el contraste φθαρτός/ἄφθαρτος.
  - La elipsis en «una impercedera» preserva la concisión del griego y el paralelismo retórico.
  - «Todo el que» refleja el valor genérico de πᾶς con participio singular sin cargar género masculino.
  - «Se domina en todo» conserva el alcance de πάντα con ἐγκρατεύεται.
