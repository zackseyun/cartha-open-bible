review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido general del griego: universal genérico (πᾶς), metáfora atlética de competir, autodisciplina amplia, propósito de obtener un premio temporal frente a uno duradero. También conserva adecuadamente la elipsis final de στέφανον. Sin embargo, «se domina» suena menos natural y algo ambiguo para ἐγκρατεύεται; el sentido habitual y activo de restricción propia se expresa mejor como «ejerce dominio propio».'
  spanish_quality_summary: El español es claro y digno en general. «Todo el que compite» y la estructura contrastiva funcionan bien. La principal mejora necesaria es estilística-semántica en «se domina en todo», que en español puede sugerir simplemente control emocional o incluso un matiz reflexivo raro, mientras que «ejerce dominio propio en todo» comunica con más precisión el hábito disciplinado del atleta. La nota al pie es adecuada, aunque «distintivo» es menos preciso que «guirnalda/corona del vencedor».
  glossary_alignment: No hay términos del glosario base particularmente conflictivos en este versículo. «Corona» para στέφανος concuerda con la decisión POB, con nota para «guirnalda». La conservación de la elipsis en «una impercedera» está justificada y es natural en español.
  issues:
  - severity: medium
    issue: «se domina en todo» para ἐγκρατεύεται
    rationale: Aunque no es imposible, en español suena menos idiomático y menos preciso que la idea de autodisciplina habitual. El griego expresa práctica de restricción propia; «ejerce dominio propio en todo» lo comunica mejor y conserva el matiz activo.
  - severity: low
    issue: Redacción de la nota al pie
    rationale: «Distintivo del vencedor» es más vago que la explicación inglesa auditada. Conviene precisar que se trata de la guirnalda o corona otorgada al vencedor en competencias atléticas.
  revised_spanish_text: Ahora bien, todo el que compite ejerce dominio propio en todo. Ellos lo hacen para recibir una corona[a] perecedera, pero nosotros, una impercedera.
  revised_footnotes:
