translation:
  language: es
  text: 'Porque en la ley de Moisés está escrito: «No pondrás bozal al buey mientras trilla[a]». ¿Acaso le importan a Dios los bueyes?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «mientras pisa el grano».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν γὰρ τῷ Μωϋσέως νόμῳ
  english_pob_choice: in the law of Moses
  chosen_spanish: en la ley de Moisés
  alternatives_spanish:
  - en la ley mosaica
  - en la ley de Moisés de
  lexicon: BDAG
  rationale: Conserva la fórmula bíblica natural en español y refleja el genitivo de pertenencia sin volverla técnica o forzada. 'Ley de Moisés' comunica bien el valor idiomático del griego y el audit trail en inglés.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - se ha escrito
  - queda escrito
  lexicon: BDAG
  rationale: Es la equivalencia idiomática normal en español para la fórmula de cita escrituraria. Mantiene el carácter de autoridad textual sin añadir matices ajenos.
- source_word: Οὐ κημώσεις
  english_pob_choice: You shall not muzzle
  chosen_spanish: No pondrás bozal
  alternatives_spanish:
  - No amordazarás
  - No le pondrás bozal
  lexicon: BDAG
  rationale: '''Poner bozal'' expresa con precisión la acción de κημόω y suena natural en español bíblico actual. Se mantiene el valor prohibitivo con futuro negativo, como en la cita legal.'
- source_word: βοῦν
  english_pob_choice: an ox
  chosen_spanish: al buey
  alternatives_spanish:
  - al toro de labor
  - al buey de trabajo
  lexicon: BDAG
  rationale: '''Buey'' es el término bíblico y funcionalmente preciso para un animal de labor. En este contexto resulta más natural que ''ox'' o expresiones perifrásticas.'
- source_word: ἀλοῶντα
  english_pob_choice: while it is threshing
  chosen_spanish: mientras trilla
  alternatives_spanish:
  - mientras está trillando
  - mientras trilla el grano
  lexicon: BDAG
  rationale: '''Trilla'' mantiene el sentido del participio presente y suena más natural que una perífrasis pesada. Conserva la acción agrícola sin explicitar ''el grano'', que el griego no dice aquí de forma explícita.'
- source_word: μὴ τῶν βοῶν μέλει τῷ θεῷ
  english_pob_choice: Is God concerned about oxen?
  chosen_spanish: ¿Acaso le importan a Dios los bueyes?
  alternatives_spanish:
  - ¿Es que Dios se preocupa por los bueyes?
  - ¿Le importan a Dios los bueyes?
  lexicon: BDAG
  rationale: '''Le importan'' comunica de forma natural el valor de μέλει en una pregunta retórica. Se conserva la fuerza argumentativa sin resolver la tensión interpretativa del dicho de Pablo.'
theological_decisions:
- issue: La pregunta retórica sobre el interés de Dios por los bueyes
  english_pob_reading: Render the question straightforwardly as a rhetorical question without adding interpretive qualifiers.
  chosen_spanish_reading: Traducirla como pregunta retórica directa, sin agregar 'solo' ni suavizarla con una paráfrasis explicativa.
  alternative_spanish_readings:
  - ¿Acaso Dios solo se preocupa por los bueyes?
  - ¿No es cierto que Dios no se preocupa por los bueyes?
  rationale: 'El griego usa μή en una pregunta retórica; el español debe conservar esa fuerza sin cerrar el argumento de Pablo. La formulación elegida mantiene la tensión: el dicho no niega providencia divina sobre los animales en absoluto, sino que impulsa el argumento desde la Escritura.'
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'La redacción sigue de cerca el texto griego y el audit trail inglés: mantiene la fórmula escritural, la cita legal y la pregunta retórica sin añadir especificaciones ausentes. No hay revisiones aplicadas en el pase más reciente; el acuerdo de revisión fue alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa 'Dios' para θεός, conforme al estándar del proyecto.
  - Se usa 'buey' para βοῦς por ser el término natural y bíblicamente preciso en español.
  - Se usa 'trilla' para ἀλοῶντα, preservando el aspecto continuo del participio presente.
  - Se evita 'Mesías/Cristo' y no hay otras decisiones terminológicas conflictivas en este versículo.
