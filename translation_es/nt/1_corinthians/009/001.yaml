translation:
  language: es
  text: ¿No soy libre? ¿No soy apóstol? ¿No he visto a Jesús nuestro Señor? ¿No son ustedes mi obra en el Señor?[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más idiomáticamente: «nuestro Señor Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλεύθερος
  english_pob_choice: free
  chosen_spanish: libre
  alternatives_spanish:
  - independiente
  lexicon: BDAG
  rationale: En este contexto Pablo afirma su libertad/autoridad apostólica; «libre» comunica de forma natural el sentido principal y sigue de cerca la elección inglesa de la POB. «Independiente» sería posible, pero atenúa la fuerza retórica del término.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: Aquí el término funciona como título técnico del ministerio de Pablo, no como simple «enviado». «Apóstol» preserva el valor eclesial consolidado en el NT y en la audit trail inglesa.
- source_word: Ἰησοῦν τὸν κύριον ἡμῶν
  english_pob_choice: Jesus our Lord
  chosen_spanish: Jesús, nuestro Señor
  alternatives_spanish:
  - Jesús nuestro Señor
  - nuestro Señor Jesús
  lexicon: BDAG
  rationale: Se conserva «Jesús» y «Señor» para κύριος según el criterio del proyecto. En español, la posposición con coma («Jesús, nuestro Señor») suena más natural y evita un calco rígido; mantiene la tensión entre el orden griego y la fluidez idiomática.
- source_word: ἑόρακα
  english_pob_choice: have ... seen
  chosen_spanish: he visto
  alternatives_spanish:
  - vi
  lexicon: BDAG
  rationale: El perfecto griego expresa una acción pasada con relevancia presente. En español, «he visto» reproduce mejor esa vigencia que un simple pretérito «vi», siguiendo la lógica explicativa de la POB inglesa.
- source_word: ἔργον
  english_pob_choice: work
  chosen_spanish: obra
  alternatives_spanish:
  - trabajo
  - resultado
  lexicon: BDAG
  rationale: Aunque «trabajo» es posible, «obra» funciona mejor en español para referirse a los creyentes como el producto de la labor apostólica de Pablo. Además conserva la amplitud semántica de ἔργον sin sonar meramente laboral.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - unidos al Señor
  - en unión con el Señor
  lexicon: BDAG
  rationale: Se preserva la frase paulina establecida «en el Señor», que en español es transparente y mantiene la esfera relacional indicada por ἐν. Es la mejor correspondencia con la tradición auditada de la POB inglesa.
- source_word: οὐκ / οὐχὶ / οὐ
  english_pob_choice: Am I not ... ? / Have I not ... ? / Are you not ... ?
  chosen_spanish: ¿No soy ...? / ¿No he ...? / ¿No son ustedes ...?
  alternatives_spanish:
  - ¿Acaso no soy ...? / ¿Acaso no he ...? / ¿Acaso no son ustedes ...?
  lexicon: BDAG
  rationale: Las negaciones introducen preguntas retóricas que esperan respuesta afirmativa. El español expresa esta fuerza de manera natural con interrogativas negativas directas; «acaso» sería válido, pero añade un matiz no exigido por el griego.
theological_decisions:
- issue: Fuerza de la afirmación de haber visto a Jesús
  english_pob_reading: A reference to Paul's seeing the risen Jesus as support for his apostolic status
  chosen_spanish_reading: Una referencia a que Pablo vio a Jesús como respaldo de su apostolado
  alternative_spanish_readings:
  - Una afirmación más general de haber visto a Jesús
  rationale: La frase funciona como credencial apostólica, pero el griego no añade explícitamente «resucitado». Por eso la traducción principal no lo incorpora al texto, conservando la tensión teológica y el alcance del enunciado.
  doctrine_reference: Preservar la tensión teológica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Se tuvo en cuenta el estado de revisión más reciente de la POB inglesa, que no introdujo cambios y recibió acuerdo alto en la revisión cruzada; por tanto, la versión española sigue de cerca la formulación auditada sin expandirla ni corregirla innecesariamente.
  spanish_consistency_notes:
  - Se mantiene «apóstol» como término técnico, no «enviado».
  - Se conserva «en el Señor» como frase paulina estándar.
  - Se usa «Jesús, nuestro Señor» en el orden más natural para el español, con nota alternativa para reflejar la opción más idiomática señalada por la POB inglesa.
  - Se opta por «obra» para ἔργον, porque comunica mejor el resultado del ministerio apostólico en este contexto.
