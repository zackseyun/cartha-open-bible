    text: 'O más literalmente: «los que trabajan con las cosas sagradas comen las cosas del templo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que sirven al altar comparten con el altar», es decir, reciben una porción de los sacrificios ofrecidos allí.'
    reason: alternative_reading
  revision_rationale: 'La revisión hace dos mejoras puntuales: sustituye un giro poco natural («de lo del templo») por uno idiomático y fiel («del templo»), y reemplaza «comparten en» por «participan de», que comunica mejor la idea de recibir una porción de las ofrendas. Se conservan las notas del POB para mantener las alternativas literales importantes.'
