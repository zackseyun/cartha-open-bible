revisions:
- from: ¿No saben que los que trabajan en el templo comen[b][a] de lo del templo, y los que sirven junto al altar comparten en lo que se ofrece sobre el altar?
  to: ¿No saben que los que trabajan en el templo comen[b][a] del templo, y los que sirven junto al altar participan de lo que se ofrece en el altar?
  rationale: 'La revisión hace dos mejoras puntuales: sustituye un giro poco natural («de lo del templo») por uno idiomático y fiel («del templo»), y reemplaza «comparten en» por «participan de», que comunica mejor la idea de recibir una porción de las ofrendas. Se conservan las notas del POB para mantener las alternativas literales importantes.'
