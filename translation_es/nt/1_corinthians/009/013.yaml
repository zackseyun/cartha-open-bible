review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido del griego y del POB inglés: mantiene la pregunta retórica, el servicio del templo, el altar y la idea de recibir sustento de ese servicio. Sin embargo, dos giros no son los más naturales ni precisos en español: «comen de lo del templo» suena torpe, y «comparten en lo que se ofrece» no expresa bien en español la idea de recibir una parte o participación.'
  spanish_quality_summary: La redacción es generalmente clara, pero necesita un ajuste de naturalidad y fidelidad idiomática. «Comen del templo» reproduce mejor el sentido de origen/provisión que «comen de lo del templo», y «participan de lo que se ofrece en el altar» suena más natural y exacto que «comparten en lo que se ofrece sobre el altar». Además, «en el altar» encaja mejor que «sobre el altar» en español bíblico general.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Templo» para ἱερόν y «altar» para θυσιαστήριον están bien. No aparecen términos sensibles como Yahvé, Mesías o δοῦλος. La revisión propuesta preserva la lógica cultual documentada en el POB inglés.
  issues:
  - severity: medium
    issue: «comen de lo del templo» es poco idiomático
    rationale: Aunque intenta reflejar τὰ ἐκ τοῦ ἱεροῦ, en español suena forzado. «Comen del templo» conserva la metáfora de sustento derivado del templo de manera más natural, y la nota al pie ya preserva la formulación más literal.
  - severity: medium
    issue: «comparten en lo que se ofrece sobre el altar» es una construcción antinatural
    rationale: En español, «compartir en» no comunica bien συμμερίζονται. «Participan de» o «reciben una parte de» expresa mejor la idea de recibir una porción de las ofrendas.
  - severity: low
    issue: «sobre el altar» puede sonar demasiado espacial
    rationale: Aunque no es incorrecto, «en el altar» funciona mejor en español bíblico corriente para referirse a las ofrendas presentadas allí.
  revised_spanish_text: ¿No saben que los que trabajan en el templo comen[b][a] del templo, y los que sirven junto al altar participan de lo que se ofrece en el altar?
  revised_footnotes:
