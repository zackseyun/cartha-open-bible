translation:
  language: es
  text: ¿No saben que los que trabajan en el templo comen[b][a] del templo, y los que sirven junto al altar participan de lo que se ofrece en el altar?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O más literalmente: «los que trabajan con las cosas sagradas comen las cosas del templo».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «los que sirven al altar comparten con el altar», es decir, reciben una porción de los sacrificios ofrecidos allí.'
    reason: alternative_reading
lexical_decisions:
- source_word: οὐκ οἴδατε
  english_pob_choice: Do you not know
  chosen_spanish: ¿No saben
  alternatives_spanish:
  - ¿No conocen
  - ¿No se dan cuenta
  lexicon: BDAG
  rationale: La pregunta retórica de Pablo se expresa con naturalidad en español con «¿No saben?», conservando el tono formal y exhortativo sin volverla demasiado coloquial.
- source_word: οἱ τὰ ἱερὰ ἐργαζόμενοι
  english_pob_choice: those who work in the temple
  chosen_spanish: los que trabajan en el templo
  alternatives_spanish:
  - los que realizan los servicios sagrados
  - los que trabajan con las cosas sagradas
  lexicon: BDAG
  rationale: Aunque el griego menciona literalmente «las cosas sagradas», el contexto alude a personal de servicio del templo. «Trabajan en el templo» conserva esa referencia institucional de forma clara y fiel.
- source_word: τὰ ἐκ τοῦ ἱεροῦ ἐσθίουσιν
  english_pob_choice: eat from the temple
  chosen_spanish: comen de lo del templo
  alternatives_spanish:
  - comen del templo
  - reciben su alimento del templo
  lexicon: BDAG
  rationale: La expresión en griego comunica que obtienen sustento de los recursos del templo. «De lo del templo» mantiene la relación de origen sin añadir explicaciones ajenas al verso.
- source_word: ἱεροῦ
  english_pob_choice: temple
  chosen_spanish: templo
  alternatives_spanish:
  - santuario
  - recinto sagrado
  lexicon: BDAG
  rationale: En este contexto ἱερόν designa el complejo del templo, no el lugar más interior. «Templo» es la equivalencia más precisa y natural en español.
- source_word: παρεδρεύοντες
  english_pob_choice: those who serve at
  chosen_spanish: los que sirven junto al
  alternatives_spanish:
  - los que atienden en
  - los que están al servicio de
  lexicon: BDAG
  rationale: El participio sugiere estar en servicio o asistencia junto al altar. «Sirven junto al» conserva la idea de ministerio cercano sin forzar un tecnicismo.
- source_word: θυσιαστηρίῳ
  english_pob_choice: altar
  chosen_spanish: altar
  alternatives_spanish:
  - altar de sacrificio
  lexicon: BDAG
  rationale: «Altar» es el equivalente directo y claro para θυσιαστήριον en este contexto sacrificial.
- source_word: συμμερίζονται
  english_pob_choice: share in what is offered on the altar
  chosen_spanish: comparten en lo que se ofrece sobre el altar
  alternatives_spanish:
  - reciben una porción del altar
  - participan de las ofrendas del altar
  lexicon: BDAG
  rationale: El verbo expresa recibir parte o participar conjuntamente. En español conviene explicitar el objeto implícito para que el sentido sacrificial quede claro sin traducir de modo oscuro.
theological_decisions:
- issue: Imagen cultual y sustento de quienes sirven en lo sagrado
  english_pob_reading: The verse is rendered to preserve Paul's analogy from temple and altar service to material support derived from sacred ministry, without importing later ecclesial structures into the wording.
  chosen_spanish_reading: El verso preserva la analogía de Pablo entre el servicio en el templo y en el altar y el sustento que proviene de ese servicio, sin introducir estructuras eclesiales posteriores en la redacción.
  alternative_spanish_readings:
  - Una versión más literal podría dejar «comparten con el altar»
  - Podría decirse «participan de las ofrendas del altar»
  rationale: La decisión principal es mantener la lógica cultual y económica del argumento de Pablo. La redacción española aclara el sentido de participación en las ofrendas sin desplazar el foco hacia instituciones posteriores ni oscurecer la analogía.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: Se siguió de cerca el texto griego SBLGNT y el criterio auditado de la POB en inglés. No hubo revisiones textuales en el pasaje base; la principal adaptación fue hacer explícito en español el objeto implícito de συμμερίζονται para conservar la claridad del sentido sacrificial sin sobreinterpretar el verso.
  spanish_consistency_notes:
  - Se mantiene «templo» para ἱερόν y «altar» para θυσιαστήριον, siguiendo la distinción cultual del griego.
  - Se usa una formulación no arcaizante pero digna, en consonancia con el español bíblico público del proyecto.
  - Se conserva la doble nota lexical y alternativa porque el griego admite una lectura más literal sobre «las cosas sagradas» y una lectura más explicativa sobre la participación en las ofrendas.
