review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: el mundo no conoció a Dios por medio de la sabiduría, y Dios tuvo a bien salvar a los creyentes por medio de lo que el mundo considera necedad en la proclamación. También preserva adecuadamente la preferencia de POB por ''proclamación'' para κήρυγμα, con nota alternativa para ''predicación''.'
  spanish_quality_summary: La principal dificultad está en la sintaxis de 'agradó a Dios salvar', que en español suena poco natural y menos fiel al valor de εὐδόκησεν ὁ θεὸς que 'Dios tuvo a bien' o 'Dios se complació'. Además, 'Porque' por sí solo comprime la doble fuerza causal de ἐπειδὴ γὰρ; 'Porque, puesto que' sería demasiado pesado, pero 'Pues' o 'Porque' pueden funcionar. El resto del texto es claro y legible.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. 'Dios', 'salvar', 'proclamación' y 'los que creen' están alineados con las decisiones auditadas. La nota alternativa conserva correctamente 'predicación'.
  issues:
  - severity: medium
    issue: '''agradó a Dios salvar'' es poco idiomático en español'
    rationale: Aunque intenta reflejar 'God was pleased', en español moderno y digno esa construcción suena forzada. εὐδόκησεν ὁ θεὸς se expresa mejor como 'Dios tuvo a bien' o 'Dios se complació', lo que además mantiene al sujeto explícito y evita una lectura torpe.
  - severity: low
    issue: La apertura con 'Porque' simplifica la doble conexión de ἐπειδὴ γὰρ
    rationale: No es una falla grave, pero 'Pues' suele conservar mejor el matiz explicativo enlazado al contexto previo sin sonar redundante. Aun así, el problema principal no está aquí sino en la cláusula principal.
  revised_spanish_text: Pues, en la sabiduría de Dios, el mundo no conoció a Dios mediante la sabiduría, Dios tuvo a bien salvar por la necedad de la proclamación[a] a los que creen.
  revised_footnotes:
