revisions:
- from: Porque, en la sabiduría de Dios, el mundo no conoció a Dios mediante la sabiduría, agradó a Dios salvar por la necedad de la proclamación[a] a los que creen.
  to: Pues, en la sabiduría de Dios, el mundo no conoció a Dios mediante la sabiduría, Dios tuvo a bien salvar por la necedad de la proclamación[a] a los que creen.
  rationale: Se ajusta la cláusula principal para que εὐδόκησεν ὁ θεὸς suene natural y fiel en español ('Dios tuvo a bien'). También se mejora levemente la conexión discursiva inicial con 'Pues'. Se conserva 'proclamación' como decisión principal para κήρυγμα y la nota alternativa documentada.
