translation:
  language: es
  text: Pues, en la sabiduría de Dios, el mundo no conoció a Dios mediante la sabiduría, Dios tuvo a bien salvar por la necedad de la proclamación[a] a los que creen.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «por la necedad de la predicación».
    reason: alternative_reading
lexical_decisions:
- source_word: ἐπειδὴ γὰρ
  english_pob_choice: For since
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues, puesto que
  - Ya que
  lexicon: BDAG
  rationale: Mantiene la relación causal y explicativa de γάρ + ἐπειδή en una forma natural en español, sin volver la frase pesada.
- source_word: ἐν τῇ σοφίᾳ τοῦ θεοῦ
  english_pob_choice: in the wisdom of God
  chosen_spanish: en la sabiduría de Dios
  alternatives_spanish:
  - por la sabiduría de Dios
  - dentro de la sabiduría de Dios
  lexicon: BDAG
  rationale: 'Conserva la ambigüedad útil de ἐν: ámbito/esfera de la sabiduría divina, sin forzar una lectura instrumental.'
- source_word: οὐκ ἔγνω
  english_pob_choice: did not know
  chosen_spanish: no conoció
  alternatives_spanish:
  - no llegó a conocer
  - no llegó a reconocer
  lexicon: BDAG
  rationale: El aoristo se expresa bien como pasado simple; 'conocer' preserva la amplitud relacional y cognitiva de γινώσκω.
- source_word: ὁ κόσμος
  english_pob_choice: the world
  chosen_spanish: el mundo
  alternatives_spanish:
  - la humanidad
  - el sistema del mundo
  lexicon: BDAG
  rationale: Es la equivalencia paulina estándar y mantiene el valor representativo de la humanidad en su orden mundano.
- source_word: διὰ τῆς σοφίας
  english_pob_choice: through wisdom
  chosen_spanish: mediante la sabiduría
  alternatives_spanish:
  - por medio de la sabiduría
  - a través de la sabiduría
  lexicon: BDAG
  rationale: '''Mediante'' comunica bien el medio y evita sobrecargar la frase con una calidez idiomática que pudiera ocultar la estructura griega.'
- source_word: τὸν θεόν
  english_pob_choice: God
  chosen_spanish: a Dios
  alternatives_spanish:
  - a Dios mismo
  lexicon: BDAG
  rationale: El acusativo con verbo de conocer se expresa naturalmente con objeto directo personal en español; el artículo y mayúscula se conservan por claridad reverente.
- source_word: εὐδόκησεν ὁ θεὸς
  english_pob_choice: God was pleased
  chosen_spanish: agradó a Dios
  alternatives_spanish:
  - Dios se complació
  - Dios tuvo a bien
  lexicon: BDAG
  rationale: Respeta la idea de beneplácito divino sin hacerla más fuerte o más psicológica de lo que exige εὐδοκέω.
- source_word: διὰ τῆς μωρίας τοῦ κηρύγματος
  english_pob_choice: through the foolishness of the proclamation
  chosen_spanish: por la necedad de la proclamación
  alternatives_spanish:
  - por la locura de la predicación
  - mediante la necedad del anuncio
  lexicon: BDAG
  rationale: '''Necedad'' conserva el juicio de insensatez de μωρία; ''proclamación'' reproduce κήρυγμα como contenido anunciado, no sólo el acto de predicar. ''Por'' funciona bien con el medio causal de διά.'
- source_word: σῶσαι
  english_pob_choice: to save
  chosen_spanish: salvar
  alternatives_spanish:
  - rescatar
  lexicon: BDAG
  rationale: '''Salvar'' es el término soteriológico normal en español y preserva la terminología teológica paulina.'
- source_word: τοὺς πιστεύοντας
  english_pob_choice: those who believe
  chosen_spanish: a los que creen
  alternatives_spanish:
  - a los creyentes
  - a los que están creyendo
  lexicon: BDAG
  rationale: La construcción participial se vuelve natural en español con una relativa; el presente mantiene la acción actual/persistente del creyente.
theological_decisions:
- issue: Sentido de διὰ τῆς μωρίας τοῦ κηρύγματος
  english_pob_reading: the phrase refers primarily to the proclaimed message as perceived to be foolish
  chosen_spanish_reading: la frase se refiere principalmente al mensaje proclamado, visto como necedad
  alternative_spanish_readings:
  - la necedad del acto de predicar
  - una ambigüedad deliberada entre mensaje y acto
  rationale: '''Proclamación'' permite retener el contenido anunciado de κήρυγμα, mientras ''necedad'' deja claro que el calificativo proviene de la perspectiva humana. No se resuelve la tensión entre mensaje y acto más allá de lo que el contexto exige.'
  doctrine_reference: Preservar la tensión teológica y retórica del texto sin neutralizarla.
translation_notes:
  revision_awareness: 'Se corrigió el problema de validación anterior: el marcador [a] ahora aparece exactamente en el texto principal junto a la frase correspondiente. No se incluyen notas huérfanas.'
  spanish_consistency_notes:
  - Se mantiene 'Dios' para θεός en ambos usos, con objeto directo 'a Dios' donde el griego lo exige.
  - '''Sabiduría'' traduce σοφία de forma consistente; ''necedad'' traduce μωρία sin suavizar su fuerza peyorativa.'
  - '''Proclamación'' refleja κήρυγμα como mensaje anunciado, en línea con el audit trail inglés.'
  - '''Salvar'' conserva el lenguaje soteriológico de Pablo.'
  - La puntuación española se ajusta a una sola oración fluida con comas internas equivalentes a la estructura causal del griego.
