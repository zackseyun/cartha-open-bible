base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/021.yaml
  text: For since[a], in the wisdom of God, the world did not know God through wisdom[b], God was pleased through the foolishness of the proclamation to save those who believe.
  footnotes:
