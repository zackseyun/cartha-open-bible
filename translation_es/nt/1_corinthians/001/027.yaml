- from: Pero Dios escogió lo necio del mundo para avergonzar a los sabios[a][b], y Dios escogió lo débil del mundo para avergonzar a lo fuerte[c].
  to: Pero Dios escogió lo necio del mundo[a], para avergonzar a los sabios[b], y Dios escogió lo débil[c] del mundo, para avergonzar a los fuertes.
  rationale: Se corrigieron las notas para que preserven las alternativas reales del expediente inglés y se reubicó la nota del neutro sustantivado en “lo débil”. Además, se cambió “a lo fuerte” por “a los fuertes” para mejorar la naturalidad del español sin perder el contraste retórico ni el sentido del griego.
