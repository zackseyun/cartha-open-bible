review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien el contraste y la finalidad del griego: Dios escoge lo que el mundo considera necio y débil para avergonzar a los sabios y a los fuertes. Sin embargo, hay dos desajustes con el expediente inglés y con la claridad del español: (1) las notas a y c no preservan correctamente las alternativas documentadas en inglés; repiten la lectura principal en vez de ofrecer la alternativa real, y además la nota c quedó asociada al segundo hemistiquio cuando en el expediente inglés la nota sobre el neutro sustantivado de ἀσθενῆ corresponde a “lo débil”; (2) “a lo fuerte” suena menos natural en español que “a los fuertes” o “a los poderosos”. Dado que el griego usa neutro plural sustantivado, pero en español ese giro resulta torpe en el complemento directo final, conviene priorizar la legibilidad con una nota aclaratoria o con la decisión ya documentada de suavizar el neutro en el elemento antitético final.'
  spanish_quality_summary: El texto es mayormente claro y digno, pero necesita un ajuste menor para sonar más idiomático y para ordenar las notas correctamente. “Lo necio del mundo” y “lo débil del mundo” funcionan bien en español bíblico moderno; “a lo fuerte” en cambio suena forzado. También la nota a es redundante porque ofrece como alternativa exactamente la misma frase del texto principal, y la nota c debe anclarse a “lo débil”, no a “lo fuerte”.
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός = “Dios”, y no aparecen términos sensibles como Yahvé, Mesías/Cristo, δοῦλος, etc. La decisión de usar “escogió” y “avergonzar” se alinea bien con el expediente POB. La principal cuestión léxica es el manejo del neutro plural sustantivado: “lo necio / lo débil” está bien; para τὰ ἰσχυρά, el español idiomático favorece “a los fuertes” o “a los poderosos”.'
  issues:
  - severity: medium
    issue: La nota a no ofrece una alternativa real.
    rationale: 'El texto principal ya dice “lo necio del mundo”, pero la nota a repite “O «lo necio del mundo»”. Debe reflejar la alternativa documentada: “las cosas necias” o “lo que es necio en el mundo”.'
  - severity: medium
    issue: La nota c está mal ubicada y mal formulada.
    rationale: En el expediente inglés, la nota paralela sobre el neutro sustantivado corresponde a ἀσθενῆ (“the weak things”), no a τὰ ἰσχυρά. En español debe anclarse a “lo débil”, no a “lo fuerte”.
  - severity: low
    issue: “A lo fuerte” suena poco natural en español.
    rationale: Aunque intenta reflejar el neutro griego, en español el giro es rígido y menos legible. “A los fuertes” mantiene bien el contraste retórico y mejora la fluidez sin traicionar el sentido.
  revised_spanish_text: Pero Dios escogió lo necio del mundo[a], para avergonzar a los sabios[b], y Dios escogió lo débil[c] del mundo, para avergonzar a los fuertes.
  revised_footnotes:
  - marker: a
    text: O «las cosas necias del mundo»; el griego usa un adjetivo neutro plural sustantivado.
    reason: lexical_alternative
  - marker: b
    text: O «poner en vergüenza» para el verbo traducido «avergonzar».
    reason: lexical_alternative
  - marker: c
    text: O «las cosas débiles» o «lo que es débil»; el griego nuevamente usa un adjetivo neutro plural sustantivado.
    reason: lexical_alternative
  revision_rationale: Se corrigieron las notas para que preserven las alternativas reales del expediente inglés y se reubicó la nota del neutro sustantivado en “lo débil”. Además, se cambió “a lo fuerte” por “a los fuertes” para mejorar la naturalidad del español sin perder el contraste retórico ni el sentido del griego.
