translation:
  language: es
  text: Pero Dios escogió lo necio del mundo[a], para avergonzar a los sabios[b], y Dios escogió lo débil[c] del mundo, para avergonzar a los fuertes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las cosas necias del mundo»; el griego usa un adjetivo neutro plural sustantivado.
    reason: lexical_alternative
  - marker: b
    text: O «poner en vergüenza» para el verbo traducido «avergonzar».
    reason: lexical_alternative
  - marker: c
    text: O «las cosas débiles» o «lo que es débil»; el griego nuevamente usa un adjetivo neutro plural sustantivado.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλὰ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Sin embargo
  - Mas
  lexicon: BDAG
  rationale: Marca un contraste fuerte con la afirmación anterior; «Pero» es la equivalencia natural y concisa en español bíblico moderno.
- source_word: μωρὰ
  english_pob_choice: the foolish things
  chosen_spanish: lo necio
  alternatives_spanish:
  - las cosas necias
  - lo insensato
  lexicon: BDAG
  rationale: El griego usa un neutro plural sustantivado. En español, «lo necio» conserva bien el valor abstracto/sustantivado sin obligar a leer «cosas» de manera pesada; también mantiene la tensión retórica del pasaje.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - en el mundo
  - según el mundo
  lexicon: BDAG
  rationale: El genitivo señala la esfera u orden mundano al que pertenecen estas realidades desde la perspectiva de Pablo. «Del mundo» preserva esa relación y su paralelismo con la segunda cláusula.
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: «Escogió» expresa de forma natural y solemne la acción deliberada de Dios, sin perder la fuerza electiva del verbo.
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para
  alternatives_spanish:
  - a fin de que
  - con el propósito de que
  lexicon: BDAG
  rationale: Aquí introduce finalidad. En español, «para» comunica bien el propósito sin recargar la sintaxis.
- source_word: καταισχύνῃ
  english_pob_choice: he might shame
  chosen_spanish: avergonzar
  alternatives_spanish:
  - poner en vergüenza
  - hacer avergonzar
  lexicon: BDAG
  rationale: El verbo puede significar «avergonzar» o «poner en vergüenza». Se eligió «avergonzar» por su naturalidad y porque reproduce el efecto de humillación/vergüenza del texto.
- source_word: τοὺς σοφούς
  english_pob_choice: the wise
  chosen_spanish: a los sabios
  alternatives_spanish:
  - a los sabios de este mundo
  - a los prudentes
  lexicon: BDAG
  rationale: Aunque el inglés POB dice «the wise», en español «los sabios» y «a los sabios» resulta plenamente idiomático; el acusativo se marca con la preposición según la norma española. «Sabios» conserva el contraste retórico con «lo necio».
- source_word: ἀσθενῆ
  english_pob_choice: the weak things
  chosen_spanish: lo débil
  alternatives_spanish:
  - las cosas débiles
  - lo flaco
  lexicon: BDAG
  rationale: Como en la primera mitad, el neutro plural sustantivado se rinde de manera natural con un abstracto sustantivado. «Lo débil» mantiene el paralelismo con «lo necio» y evita una traducción demasiado concreta.
- source_word: τὰ ἰσχυρά
  english_pob_choice: the strong
  chosen_spanish: a lo fuerte
  alternatives_spanish:
  - a los fuertes
  - a las cosas fuertes
  lexicon: BDAG
  rationale: El griego vuelve a usar un neutro plural sustantivado. «A lo fuerte» conserva el paralelo con «lo débil» y refleja mejor la forma griega que una lectura personalizante.
theological_decisions:
- issue: El valor sustantivado neutro de μωρά / ἀσθενῆ / ἰσχυρά y su efecto retórico
  english_pob_reading: the foolish things / the weak things / the strong
  chosen_spanish_reading: lo necio / lo débil / lo fuerte
  alternative_spanish_readings:
  - las cosas necias / las cosas débiles / los fuertes
  - lo insensato / lo débil / los fuertes
  rationale: La estructura griega es neutra plural usada sustantivamente y no obliga a personalizar el referente. En español, «lo necio», «lo débil» y «lo fuerte» preservan ese carácter general y abstracto, manteniendo la ironía paulina sin añadir «cosas» donde suena innecesario.
  doctrine_reference: 1 Corintios 1:26–29; soberanía divina en la elección y reversión de valores humanos.
- issue: 'καταισχύνῃ: avergonzar / poner en vergüenza'
  english_pob_reading: he might shame
  chosen_spanish_reading: avergonzar
  alternative_spanish_readings:
  - poner en vergüenza
  - humillar
  rationale: El punto no es mera emoción subjetiva sino la deshonra pública o la inversión de honor. «Avergonzar» comunica adecuadamente el efecto relacional y retórico del verbo en este contexto.
  doctrine_reference: 1 Corintios 1:27–29; Dios frustra la jactancia humana.
translation_notes:
  revision_awareness: 'Se revisó el pasaje a la luz del texto griego SBLGNT y del audit trail inglés: se mantuvo la oposición retórica y la idea de finalidad, pero en español se optó por sustantivos abstractos («lo necio», «lo débil», «lo fuerte») para reflejar mejor el neutro plural sustantivado sin añadir «cosas» donde el español puede sonar más natural así. La traducción verbal de καταισχύνῃ se ajustó a «avergonzar» por claridad idiomática.'
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se conservó la repetición de «escogió» para reflejar el paralelismo del original.
  - La preposición «a» delante de «los sabios» se añade por sintaxis española, sin cambiar el referente griego.
  - «Lo fuerte» se eligió para preservar el paralelismo con «lo débil» en vez de personalizar la antítesis.
