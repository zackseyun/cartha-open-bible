source:
  edition: SBLGNT
  text: Παρακαλῶ δὲ ὑμᾶς, ἀδελφοί, διὰ τοῦ ὀνόματος τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἵνα τὸ αὐτὸ λέγητε πάντες, καὶ μὴ ᾖ ἐν ὑμῖν σχίσματα, ἦτε δὲ κατηρτισμένοι ἐν τῷ αὐτῷ νοῒ καὶ ἐν τῇ αὐτῇ γνώμῃ.
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/001/010.yaml
  text: Now I urge you[a], brothers, by the name of our Lord Jesus Messiah, that you all say the same thing, and that there be no divisions among you[e][d][c][b], but that you be joined together in the same mind and in the same judgment.
  footnotes:
  - marker: a
    text: Or brothers and sisters; the Greek masculine plural may address the whole believing community.
    reason: cultural_note
  - marker: b
    text: Messiah, traditionally 'Christ.'
    reason: lexical_alternative
  - marker: c
    text: Or 'there be no schisms among you.'
    reason: lexical_alternative
  - marker: d
    text: Or 'be restored' or 'be mended together.'
    reason: lexical_alternative
  - marker: e
    text: Or 'the same judgment' or 'the same conviction.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4
    prompt_id: nt_draft_v1
    prompt_sha256: 51c33a920cda8f94fae72eb83f14069f717dbc421860c156b542b68184a11d78
    timestamp: '2026-04-18T05:15:01Z'
    output_hash: 70c42040609798c9724b5e4c6303ffc2c1a1f6c29c02151250dd39351cce18df
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:34:57Z'
    unchanged: false
    changes_summary: 'Replaced ''the Messiah'' with ''Christ'' for closer correspondence to Χριστοῦ and more formal register; changed ''speak the same thing'' to ''say the same thing'' for a more direct rendering of λέγητε; changed ''purpose'' to ''judgment'' to better reflect γνώμῃ. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Ahora les ruego[a], hermanos, por el nombre de nuestro Señor Jesús Mesías[b], que todos digan lo mismo, y que no haya entre ustedes divisiones[c], sino que estén unidos[d] en la misma mente y en el mismo juicio[e].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: También puede entenderse «hermanos y hermanas»; el plural masculino griego puede abarcar a toda la comunidad creyente.
    reason: cultural_note
  - marker: b
    text: «Mesías» conserva el valor titular de Χριστός; la forma tradicional es «Cristo».
    reason: lexical_alternative
  - marker: c
    text: O «cisma(s)».
    reason: lexical_alternative
  - marker: d
    text: O «restaurados», «reparados» o «remendados juntos».
    reason: lexical_alternative
  - marker: e
    text: O «convicción».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παρακαλῶ
  english_pob_choice: I urge
  chosen_spanish: les ruego
  alternatives_spanish:
  - les exhorto
  - les insto
  lexicon: BDAG
  rationale: παρακαλῶ expresa una apelación pastoral y apremiante. En español, «les ruego» comunica bien la intensidad respetuosa del verbo sin endurecerlo como un mandato formal.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos en la fe
  lexicon: BDAG
  rationale: El griego masculino plural puede abarcar a toda la comunidad creyente; «hermanos» conserva la forma gramatical y funciona naturalmente en español, con la amplitud comunitaria implícita por el contexto.
- source_word: διὰ τοῦ ὀνόματος
  english_pob_choice: by the name of
  chosen_spanish: por el nombre de
  alternatives_spanish:
  - en el nombre de
  - a causa del nombre de
  lexicon: BDAG
  rationale: διά con genitivo expresa base, medio o apelación. «Por el nombre de» mantiene la fuerza de invocación/autoridad sin forzar una equivalencia litúrgica que no está en el griego.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la correspondencia establecida para κύριος y conserva el reconocimiento de autoridad sobre la comunidad.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se conserva el sentido titular de Χριστός como «Mesías», según la política del proyecto para los títulos cuando su fuerza semántica sigue activa. «Cristo» queda como alternativa tradicional.
- source_word: τὸ αὐτὸ λέγητε πάντες
  english_pob_choice: that you all say the same thing
  chosen_spanish: que todos digan lo mismo
  alternatives_spanish:
  - que todos hablen lo mismo
  - que todos estén de acuerdo
  lexicon: BDAG
  rationale: 'La construcción griega es bastante literal: decir la misma cosa. «Que todos digan lo mismo» preserva el énfasis en una confesión compartida, sin reducirlo de entrada a una mera idea abstracta de acuerdo.'
- source_word: σχίσματα
  english_pob_choice: divisions
  chosen_spanish: divisiones
  alternatives_spanish:
  - cisma
  - schisms
  lexicon: BDAG
  rationale: «Divisiones» es claro, actual y suficientemente preciso para el quiebre relacional interno que denuncia el pasaje. «Cisma» sería más técnico y eclesiástico.
- source_word: κατηρτισμένοι
  english_pob_choice: be joined together
  chosen_spanish: estén perfectamente unidos
  alternatives_spanish:
  - sean restaurados
  - sean remendados
  lexicon: BDAG
  rationale: καταρτίζω puede sugerir ser ajustado, restablecido o puesto en condiciones correctas. «Estén perfectamente unidos» comunica la idea de unidad reparada y bien ajustada en español natural.
- source_word: νοῒ
  english_pob_choice: mind
  chosen_spanish: mente
  alternatives_spanish:
  - entendimiento
  - pensamiento
  lexicon: BDAG
  rationale: νοῦς aquí apunta a la disposición mental o manera de pensar. «Mente» mantiene la correspondencia básica con el inglés auditado y funciona bien en paralelo con γνώμη.
- source_word: γνώμῃ
  english_pob_choice: judgment
  chosen_spanish: opinión
  alternatives_spanish:
  - juicio
  - convicción
  lexicon: BDAG
  rationale: γνώμη puede abarcar juicio, opinión o convicción. En este contexto de concordia comunitaria, «opinión» comunica la segunda dimensión del paralelismo sin sobrecargarla con lenguaje técnico.
theological_decisions:
- issue: Título cristológico Χριστός
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: Se mantiene el valor titular de Χριστός, siguiendo el principio del proyecto de traducir el título cuando su fuerza semántica es viva. En este versículo, «Jesús Mesías» conserva la carga confesional sin perder transparencia.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando funciona como título'
- issue: Alcance de ἀδελφοί
  english_pob_reading: brothers with an inclusive footnote
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  - hermanos y hermanas (nota explicativa)
  rationale: El masculino plural griego se conserva en la línea principal por fidelidad gramatical. El contexto permite entender que Pablo se dirige a toda la congregación, y esa amplitud queda reflejada en la traducción sin añadir una expansión no presente en el texto base.
  doctrine_reference: 'DOCTRINE.md: Gender-accurate over gender-neutral'
- issue: Relación entre νοῦς y γνώμη
  english_pob_reading: same mind and same judgment
  chosen_spanish_reading: la misma mente y la misma opinión
  alternative_spanish_readings:
  - la misma mente y el mismo juicio
  - el mismo sentir y la misma convicción
  rationale: El griego distingue dos términos relacionados pero no idénticos. «Mente» y «opinión» conservan esa distinción en español, y evitan colapsar ambos en una sola idea de armonía genérica.
  doctrine_reference: 1 Corintios 1:10; distinción léxica de νοῦς / γνώμη
translation_notes:
  revision_awareness: La redacción toma como base la última revisión auditada que restablece «Messiah/Mesías» para Χριστός y ajusta el paralelismo final de γνώμῃ a «judgment». En español, se decidió preservar la distinción entre νοῦς y γνώμη con «mente» y «opinión», y mantener un registro bíblico claro sin caer en calco excesivo.
  spanish_consistency_notes:
  - Se mantiene Yahvé para el nombre divino cuando aparezca en otros pasajes, aunque este versículo no lo contiene.
  - «Mesías» se usa para Χριστός conforme a la política del proyecto; no se sustituyó por «Cristo».
  - La puntuación mantiene el paralelismo de las cláusulas y el contraste entre división/unidad.
  - «Hermanos» se conserva por fidelidad al masculino plural griego, con nota explicativa sobre el alcance comunitario.
