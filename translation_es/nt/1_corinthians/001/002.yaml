    model: gpt-5.4
    timestamp: '2026-04-23T09:34:57Z'
    unchanged: false
    changes_summary: 'Replaced ''Messiah'' with ''Christ'' for consistency with the Greek and standard register; changed ''called saints'' to ''called to be saints'' to reflect the sense of κλητοῖς ἁγίοις more naturally in English; adjusted punctuation for smoother formal English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: A la iglesia de Dios que está en Corinto, a los santificados en Mesías Jesús[a], llamados santos[b], junto con todos los que invocan el nombre de nuestro Señor Jesús Mesías[c] en todo lugar[d] —de ellos y de nosotros—.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en Cristo Jesús».
    reason: lexical_alternative
  - marker: b
    text: O «llamados a ser santos».
    reason: lexical_alternative
  - marker: c
    text: O «Jesucristo».
    reason: lexical_alternative
  - marker: d
    text: La frase «en todo lugar —de ellos y de nosotros—» puede significar todo lugar donde los creyentes invocan al Señor, o todo lugar que es de ellos y de nosotros; el griego es deliberadamente compacto y ambiguo.
    reason: alternative_reading
lexical_decisions:
- source_word: ἐκκλησίᾳ
  english_pob_choice: church
  chosen_spanish: iglesia
  alternatives_spanish:
  - asamblea
  - congregación
  lexicon: BDAG
  rationale: «Iglesia» es el equivalente natural en español para el destinatario colectivo de la carta y conserva el sentido comunitario del griego ἐκκλησία sin volverla demasiado técnica.
- source_word: ἡγιασμένοις
  english_pob_choice: sanctified
  chosen_spanish: santificados
  alternatives_spanish:
  - hechos santos
  - consagrados
  lexicon: BDAG
  rationale: El participio perfecto pasivo expresa una acción ya realizada con efecto presente. «Santificados» conserva la pasividad y el peso teológico mejor que una paráfrasis más libre.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se mantiene «Mesías» para Χριστός conforme al criterio doctrinal del proyecto cuando el título tiene fuerza activa. En español, la preposición «en» reproduce la unión o esfera de pertenencia indicada por el griego.
- source_word: κλητοῖς ἁγίοις
  english_pob_choice: called saints
  chosen_spanish: llamados santos
  alternatives_spanish:
  - llamados a ser santos
  - llamados santos de Dios
  lexicon: BDAG
  rationale: La construcción griega presenta dos adjetivos, no una perífrasis infinitiva. «Llamados santos» conserva mejor la forma breve y la relación entre llamado e identidad.
- source_word: ἁγίοις
  english_pob_choice: saints
  chosen_spanish: santos
  alternatives_spanish:
  - santos de Dios
  - los santos
  lexicon: BDAG
  rationale: «Santos» es la equivalencia bíblica estable en español y comunica pertenencia consagrada a Dios sin explicar de más.
- source_word: ἐπικαλουμένοις τὸ ὄνομα
  english_pob_choice: who call on the name
  chosen_spanish: que invocan el nombre
  alternatives_spanish:
  - que llaman sobre el nombre
  - que llaman al nombre
  lexicon: BDAG
  rationale: «Invocar el nombre» conserva el matiz bíblico de apelación reverente y de culto; «llamar» puede sonar menos preciso en español religioso.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí se mantiene la traducción estable de κύριος como «Señor», porque el contexto confesional cristiano en esta fórmula de saludo lo exige claramente.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesucristo
  alternatives_spanish:
  - Jesús Mesías
  - Jesús el Mesías
  lexicon: BDAG
  rationale: En la fórmula fija «el nombre de nuestro Señor…», el español eclesial natural usa «Jesucristo». La relación titulativa ya está visible en «Mesías Jesús» al inicio; aquí un nombre compuesto fluye mejor y evita una repetición forzada.
- source_word: ἐν παντὶ τόπῳ αὐτῶν καὶ ἡμῶν
  english_pob_choice: in every place—theirs and ours
  chosen_spanish: en todo lugar, de ellos y de nosotros
  alternatives_spanish:
  - en todo lugar, suyo y nuestro
  - en todo lugar, tanto de ellos como de nosotros
  lexicon: BDAG
  rationale: 'La frase es comprimida y admite varias lecturas. El español mantiene la ambigüedad básica con una aposición clara: puede referirse a los creyentes de cualquier lugar o a los lugares que pertenecen a ellos y a nosotros.'
theological_decisions:
- issue: Renderizado de Χριστός
  english_pob_reading: Messiah in both occurrences
  chosen_spanish_reading: Mesías en la primera ocurrencia; Jesucristo en la segunda fórmula nominal
  alternative_spanish_readings:
  - Cristo en ambas ocurrencias
  - Mesías Jesús / Jesús Mesías en ambas ocurrencias
  rationale: Se preserva la decisión doctrinal de traducir Χριστός como «Mesías» cuando el título tiene fuerza activa. En la cláusula final, sin embargo, la combinación con «Señor» y la fijación litúrgica de la expresión justifican «Jesucristo» como forma nominal natural en español, sin negar el sentido mesiánico del término.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Mesías (where title); fixed name-like formula may use Christ/Jesucristo when idiomatic and auditable'
translation_notes:
  revision_awareness: El audio de revisión en inglés osciló entre «Messiah» y «Christ» por motivos de registro y coherencia; aquí se conserva «Mesías» donde la decisión doctrinal del proyecto lo pide, pero se usa «Jesucristo» en la fórmula final por naturalidad del español y porque la combinación nominal está plenamente asentada en el uso eclesial. También se evitó expandir κλητοῖς ἁγίοις a una perífrasis más interpretativa para no borrar la tensión entre llamado e identidad.
  spanish_consistency_notes:
  - Se mantiene «Dios» para τοῦ θεοῦ y «Señor» para κύριος.
  - 'La puntuación conserva el tono epistolar: vocativo inicial, comas seriales y una cláusula final que deja abierta la ambigüedad de ἐν παντὶ τόπῳ αὐτῶν καὶ ἡμῶν.'
  - Se usa «Mesías» solo donde la decisión titulativa es explícita y auditada; no se reemplaza automáticamente toda forma tradicional de «Cristo».
