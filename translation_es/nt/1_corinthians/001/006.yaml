lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - igual que
  lexicon: BDAG
  rationale: Marca una comparación o correspondencia con lo dicho antes. 'Tal como' conserva bien ese valor correlativo en español moderno sin endurecer el ritmo.
- source_word: τὸ μαρτύριον
  english_pob_choice: testimony
  chosen_spanish: el testimonio
  alternatives_spanish:
  - el testimonio dado
  - el testimonio proclamado
  - el testimonio
  lexicon: BDAG
  rationale: '''μαρτύριον'' señala testimonio en sentido evidencial y proclamado. ''Testimonio'' es la equivalencia más natural y fiel en español.'
- source_word: τοῦ Χριστοῦ
  english_pob_choice: about Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  - acerca del Mesías
  - acerca de Cristo
  lexicon: BDAG
  rationale: 'Se mantiene ''Mesías'' para Χριστός conforme a la terminología POB y la política de traducir el título en lugar de fijar ''Cristo'' por defecto. El genitivo puede leerse como objetivo: el testimonio acerca del Mesías.'
- source_word: ἐβεβαιώθη
  english_pob_choice: was confirmed
  chosen_spanish: fue confirmado
  alternatives_spanish:
  - fue establecido
  - quedó confirmado
  - se confirmó
  lexicon: BDAG
  rationale: El pasivo comunica que el testimonio fue hecho firme o validado. 'Fue confirmado' es claro, sobrio y conserva la fuerza del verbo sin sobrerinterpretar.
- source_word: ἐν ὑμῖν
  english_pob_choice: among you
  chosen_spanish: entre ustedes
  alternatives_spanish:
  - en ustedes
  - en medio de ustedes
  lexicon: BDAG
  rationale: En plural, la frase apunta naturalmente a la comunidad corintia en conjunto. 'Entre ustedes' expresa mejor ese sentido comunitario que una lectura estrictamente interior.
theological_decisions:
- issue: Genitivo de τοῦ Χριστοῦ
  english_pob_reading: 'objective genitive: ''the testimony about the Messiah'''
  chosen_spanish_reading: '''el testimonio del Mesías'' con sentido objetivo: testimonio acerca del Mesías'
  alternative_spanish_readings:
  - 'el testimonio del Mesías con sentido subjetivo: testimonio dado por el Mesías'
  rationale: El contexto de Pablo apunta al testimonio apostólico validado entre los corintios, no principalmente al testimonio que el Mesías da sobre sí mismo. Aun así, el griego permite la ambigüedad, por lo que no se elimina completamente la alternativa subjetiva.
  doctrine_reference: Preservar la tensión exegética del genitivo sin cerrarla indebidamente; cf. la nota alternativa del audit trail inglés.
- issue: Valor de ἐν ὑμῖν
  english_pob_reading: among you
  chosen_spanish_reading: entre ustedes
  alternative_spanish_readings:
  - en ustedes
  rationale: La lectura comunitaria encaja mejor con el plural y con el flujo del argumento. 'Entre ustedes' evita una interiorización excesiva que podría oscurecer el carácter eclesial del enunciado.
  doctrine_reference: Coherencia contextual y eclesial del pasaje.
translation_notes:
  revision_awareness: El audit trail inglés mostró una oscilación entre 'about the Messiah' y 'of the Messiah', y entre 'among you' e 'in you'. La versión española conserva esas tensiones mediante una redacción principal que favorece la lectura comunitaria y una nota que mantiene la alternativa genitiva y la posibilidad local ('en ustedes').
  spanish_consistency_notes:
  - Se emplea 'Mesías' para Χριστός conforme al estándar POB en español, no 'Cristo', salvo que el contexto exija un nombre fijo.
  - '''Testimonio'' se mantiene como sustantivo clave para μαρτύριον por su valor evidencial y proclamado.'
  - La preposición 'entre' refleja mejor el matiz comunitario plural de ἐν ὑμῖν que una traducción demasiado interiorizada.
