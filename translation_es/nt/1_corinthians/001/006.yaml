translation:
  language: es
  text: tal como el testimonio acerca del Mesías fue confirmado[b][a] entre ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'También puede entenderse: «el testimonio del Mesías», es decir, el testimonio dado por el Mesías.'
    reason: alternative_reading
  - marker: b
