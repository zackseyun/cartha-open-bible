translation:
  language: es
  text: 'Porque consideren su llamamiento[a], hermanos: no muchos de ustedes eran sabios según la carne, no muchos eran poderosos, no muchos eran de noble nacimiento.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Hermanos» aquí se dirige a la congregación en conjunto e incluye a las creyentes junto con los creyentes.
    reason: cultural_note
lexical_decisions:
- source_word: Βλέπετε
  english_pob_choice: consider
  chosen_spanish: consideren
  alternatives_spanish:
  - miren
  - vean
  - piensen en
  lexicon: BDAG
  rationale: El imperativo invita a reflexionar sobre la propia situación. «Consideren» comunica bien la exhortación y conserva el tono retórico sin sonar forzado en español.
- source_word: τὴν κλῆσιν ὑμῶν
  english_pob_choice: your calling
  chosen_spanish: su llamamiento
  alternatives_spanish:
  - su llamado
  - su vocación
  lexicon: BDAG
  rationale: «Llamamiento» mantiene el sentido paulino de la acción de Dios al llamar a la comunidad. «Vocación» puede sonar más técnico o moderno; «llamado» sería posible, pero «llamamiento» preserva mejor el registro bíblico y la referencia a la identidad recibida.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos y hermanas en la fe
  lexicon: BDAG
  rationale: Se conserva el masculino plural como forma gramatical del griego y como vocativo colectivo. En español puede incluir a toda la congregación sin añadir una expansión que el texto no expresa de manera explícita.
- source_word: οὐ πολλοὶ ... σοφοὶ
  english_pob_choice: not many of you were wise
  chosen_spanish: no muchos de ustedes son sabios
  alternatives_spanish:
  - no muchos de ustedes eran sabios
  - no muchos eran sabios entre ustedes
  lexicon: BDAG
  rationale: El griego presenta una descripción general de su condición al momento de la llamada; en español, el presente puede funcionar como presente gnómico/actual de caracterización. También sería posible el pretérito imperfecto, pero «son» mantiene la observación más directa y natural en una formulación breve.
- source_word: κατὰ σάρκα
  english_pob_choice: according to the flesh
  chosen_spanish: según la carne
  alternatives_spanish:
  - conforme a la carne
  - desde una perspectiva humana
  lexicon: BDAG
  rationale: Se conserva la expresión paulina «carne» para no diluir la tensión lexical y teológica del texto. Aunque en este contexto apunta a una evaluación meramente humana, la traducción no sustituye la frase por una paráfrasis interpretativa.
- source_word: δυνατοί
  english_pob_choice: powerful
  chosen_spanish: poderosos
  alternatives_spanish:
  - fuertes
  - influyentes
  - mientras tienen poder
  lexicon: BDAG
  rationale: «Poderosos» reproduce bien la amplitud social y política del término sin precisar indebidamente qué tipo de poder está en vista.
- source_word: εὐγενεῖς
  english_pob_choice: of noble birth
  chosen_spanish: de noble nacimiento
  alternatives_spanish:
  - de linaje noble
  - bien nacidos
  lexicon: BDAG
  rationale: La referencia es al origen social elevado. «De noble nacimiento» es claro, digno y suficientemente literal para el contexto.
theological_decisions:
- issue: Sentido de κατὰ σάρκα
  english_pob_reading: wise according to the flesh
  chosen_spanish_reading: sabios según la carne
  alternative_spanish_readings:
  - sabios desde una perspectiva humana
  - sabios conforme a criterios humanos
  rationale: La decisión preserva la formulación paulina y evita suavizarla hacia una explicación interpretativa. Esto deja visible la oposición entre la evaluación humana y la lógica de Dios en el pasaje.
  doctrine_reference: 1 Corintios 1:27-29; Romanos 8:5-8
translation_notes:
  revision_awareness: El contexto inglés pasó de «wise by human standards» a «wise according to the flesh» para ajustarse más de cerca a κατὰ σάρκα. La versión española sigue esa revisión y conserva la misma tensión lexical con «según la carne» en lugar de una paráfrasis interpretativa.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - Se conservó «carne» por coherencia con el vocabulario paulino del proyecto y para no neutralizar el contraste conceptual del pasaje.
  - Se evitó ampliar «hermanos» en el texto principal, dejando la inclusión congregacional en la nota.
  - Se eligió un registro moderno y eclesialmente legible, sin depender de fórmulas arcaicas.
