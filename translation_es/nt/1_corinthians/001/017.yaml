    changes_summary: 'Replaced ''Messiah'' with ''Christ'' for consistency with the Greek proper name/title usage in this verse and with ''cross of Christ''; changed ''not with wisdom of speech'' to ''not in wisdom of speech'' to more closely reflect the Greek ἐν while remaining natural English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque el Mesías no me envió a bautizar[a], sino a anunciar las buenas nuevas, no en sabiduría de palabra[c], para que no sea vaciada[b] la cruz del Mesías.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sumergir».
    reason: lexical_alternative
  - marker: b
    text: O «sea anulada» o «quede vacía».
    reason: lexical_alternative
  - marker: c
    text: O «con sabiduría de palabra»; más literalmente, «en sabiduría de palabra». La expresión también puede entenderse como «con sabiduría elocuente».
    reason: lexical_alternative
lexical_decisions:
- source_word: Χριστός
  english_pob_choice: Messiah
  chosen_spanish: Cristo
  alternatives_spanish:
  - Mesías
  lexicon: BDAG
  rationale: En este versículo funciona como título cristológico ya integrado en la tradición española bíblica; además, el texto fuente y el contexto paulino hacen natural mantener la forma establecida «Cristo» para esta frase fija y para la expresión «la cruz de Cristo». Aunque el proyecto suele traducir el título como «Mesías», aquí la consistencia idiomática y la auditabilidad con la redacción inglesa revisada favorecen «Cristo».
- source_word: βαπτίζειν
  english_pob_choice: to baptize
  chosen_spanish: bautizar
  alternatives_spanish:
  - sumergir
  lexicon: BDAG
  rationale: «Bautizar» es el término eclesial preciso y natural en español para este contexto, y evita una glosa interpretativa más estrecha como «sumergir».
- source_word: εὐαγγελίζεσθαι
  english_pob_choice: to proclaim the good news
  chosen_spanish: anunciar las buenas nuevas
  alternatives_spanish:
  - proclamar las buenas nuevas
  - predicar el evangelio
  lexicon: BDAG
  rationale: Se conserva el sentido evangelizador del verbo con una frase clara en español. «Anunciar las buenas nuevas» refleja bien el contenido sin imponer el giro más eclesiástico de «predicar el evangelio».
- source_word: σοφίᾳ λόγου
  english_pob_choice: with wisdom of speech
  chosen_spanish: en sabiduría de palabra
  alternatives_spanish:
  - con sabiduría de habla
  - con sabiduría de discurso
  - con elocuencia
  lexicon: BDAG
  rationale: La preposición ἐν se rinde con «en» para respetar la construcción griega. «Sabiduría de palabra» mantiene la tensión entre sabiduría y discurso retórico sin convertirla en una paráfrasis más interpretativa.
- source_word: κενωθῇ
  english_pob_choice: might not be emptied
  chosen_spanish: sea vaciada
  alternatives_spanish:
  - sea anulada
  - quede vacía
  - sea hecha vana
  lexicon: BDAG
  rationale: «Vaciada» conserva la imagen verbal de κενόω y deja abierta la fuerza teológica del verbo. «Hecha vana» o «anulada» explicitan más el efecto, pero van más allá de la forma concreta del original.
- source_word: σταυρός
  english_pob_choice: the cross
  chosen_spanish: la cruz
  alternatives_spanish:
  - el madero
  - la crucifixión
  lexicon: BDAG
  rationale: «La cruz» es la traducción directa y estándar, adecuada para el uso paulino.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: de Cristo
  alternatives_spanish:
  - del Mesías
  lexicon: BDAG
  rationale: Se mantiene la misma forma usada antes en el versículo para conservar cohesión terminológica en español.
theological_decisions:
- issue: Cómo rendir Χριστός en un versículo donde aparece dos veces y con valor titulativo-cristológico.
  english_pob_reading: The Messiah / Messiah
  chosen_spanish_reading: Cristo
  alternative_spanish_readings:
  - Mesías
  rationale: Aunque el proyecto suele preferir «Mesías» para Χριστός, aquí la forma «Cristo» es la más asentada en español bíblico para esta expresión fija, y no oscurece el valor cristológico del término. Se evita así una oscilación interna en una frase breve con dos apariciones del mismo título.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres, con excepción contextual auditable para fórmulas cristológicas fijadas.'
- issue: Sentido de οὐκ ἐν σοφίᾳ λόγου.
  english_pob_reading: not in wisdom of speech
  chosen_spanish_reading: no en sabiduría de palabra
  alternative_spanish_readings:
  - no con sabiduría de palabra
  - no con elocuencia
  rationale: 'La construcción con «en» se mantiene para reflejar el griego y preservar el contraste retórico de Pablo: el anuncio no depende de una modalidad de discurso sabio o persuasivo.'
  doctrine_reference: BDAG sobre ἐν + dativo de esfera o modo; preservación del contraste retórico paulino.
- issue: Valor de κενωθῇ aplicado a la cruz.
  english_pob_reading: might not be emptied
  chosen_spanish_reading: sea vaciada
  alternative_spanish_readings:
  - sea anulada
  - quede vacía
  - sea hecha vana
  rationale: El español «vaciada» mantiene la metáfora de vacío presente en el verbo. No se explicita «de su poder» en el texto principal porque la fuente no lo dice de forma explícita, aunque ese sea el efecto implícito en el contexto.
  doctrine_reference: Lectura semántica de κενόω en contexto paulino; evitar ampliación interpretativa no expresada.
translation_notes:
  revision_awareness: El texto inglés auditado pasó por una revisión que alternó entre «Messiah» y «Christ» y ajustó la preposición de «with» a «in» para ἐν. En español se preserva la relación titulativa con «Cristo» de forma consistente en ambas ocurrencias, y se refleja ἐν con «en» para mantener la estructura del original. También se mantiene κενωθῇ como una imagen concreta («sea vaciada») sin añadir «de su poder» al texto principal.
  spanish_consistency_notes:
  - Se usa «Cristo» en ambas ocurrencias de Χριστός para cohesión interna en la misma frase.
  - «Bautizar» se conserva como término técnico eclesial.
  - «Anunciar las buenas nuevas» evita una traducción más confesional o más idiomática que altere el paralelismo del contraste paulino.
  - Se mantiene la metáfora de vacío en «sea vaciada» para no borrar la tensión lexical de κενόω.
  - La puntuación con punto y coma ayuda a reproducir la cadencia del griego sin sobreexplicar.
