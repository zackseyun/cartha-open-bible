translation:
  language: es
  text: Y es de él que ustedes están en el Mesías Jesús[a], quien llegó a ser para nosotros sabiduría de Dios, y justicia y santificación y redención.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐξ αὐτοῦ
  english_pob_choice: from him
  chosen_spanish: de él
  alternatives_spanish:
  - desde él
  - a causa de él
  lexicon: BDAG
  rationale: La preposición ἐκ/ἐξ expresa origen o fuente; «de él» conserva de manera natural en español la idea de procedencia y mantiene el énfasis paulino en Dios como fuente de la nueva posición de los creyentes.
- source_word: ὑμεῖς ἐστε
  english_pob_choice: you are
  chosen_spanish: ustedes están
  alternatives_spanish:
  - ustedes son
  - vosotros sois
  lexicon: BDAG
  rationale: Se usa una forma natural y reverente de segunda persona plural en español latinoamericano. «Están en» conserva la formulación relacional del griego sin volverla explicativa en exceso.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - unidos a
  - en unión con
  lexicon: BDAG
  rationale: «En» preserva la expresión paulina de esfera/unión con Cristo sin ampliar interpretativamente el texto más allá de la evidencia inmediata.
- source_word: Χριστῷ
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se mantiene «Mesías» según el criterio terminológico del proyecto para Χριστός cuando funciona como título y no como simple nombre fijo; en español, además, comunica mejor el sentido titular hebraico del término.
- source_word: ἐγενήθη
  english_pob_choice: became
  chosen_spanish: llegó a ser
  alternatives_spanish:
  - se hizo
  - fue hecho
  lexicon: BDAG
  rationale: «Llegó a ser» reproduce con claridad el valor de γίνομαι en este contexto y evita una pasiva artificiosa; mantiene la idea de una realidad constituida para nosotros por la acción de Dios.
- source_word: σοφία
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - prudencia
  lexicon: BDAG
  rationale: «Sabiduría» es la correspondencia directa y adecuada en el contraste de 1 Corintios 1, donde Pablo contrapone la sabiduría humana con la de Dios.
- source_word: ἀπὸ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: 'La construcción se entiende de manera más natural como complemento de «sabiduría» en español: «sabiduría de Dios». Se conserva la fuerza de procedencia sin sobrecargar la frase.'
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Se elige «justicia» porque en español puede abarcar mejor el peso forense y relacional del término; además, el audit trail inglés preservó una nota de alternativa («justice») que aquí se refleja como opción lexical válida.
- source_word: ἁγιασμός
  english_pob_choice: sanctification
  chosen_spanish: santificación
  alternatives_spanish:
  - consagración
  - santidad
  lexicon: BDAG
  rationale: «Santificación» es el equivalente técnico más claro en contexto paulino y preserva el proceso/estado de ser hecho santo sin reducirlo a una mera cualidad abstracta.
- source_word: ἀπολύτρωσις
  english_pob_choice: redemption
  chosen_spanish: redención
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: «Redención» es el equivalente estándar en este marco soteriológico y conserva el trasfondo de liberación mediante rescate sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: Relación de «sabiduría de Dios» con la lista siguiente
  english_pob_reading: The translation treats 'righteousness and sanctification and redemption' as appositional elaboration of how Christ became 'wisdom from God' for believers.
  chosen_spanish_reading: 'La frase se lee como una ampliación explicativa: el Mesías Jesús llegó a ser para nosotros sabiduría de Dios, expresada en justicia, santificación y redención.'
  alternative_spanish_readings:
  - La expresión «de Dios» podría modificar también los tres sustantivos siguientes.
  - Los tres sustantivos podrían entenderse como una lista coordinada independiente de «sabiduría de Dios».
  rationale: El griego permite una relación muy cercana entre «sabiduría de Dios» y la serie que sigue. En español, la puntuación simple mantiene esa cercanía sin forzar una reconstrucción interpretativa excesiva, pero deja abierta la tensión sintáctica del original.
  doctrine_reference: Preservar la tensión textual sin resolverla dogmáticamente
- issue: Uso de «Mesías» en lugar de «Cristo»
  english_pob_reading: English POB chose 'Messiah' for Χριστός in this verse.
  chosen_spanish_reading: Se conserva «Mesías» para Χριστός en la línea terminológica del proyecto.
  alternative_spanish_readings:
  - Cristo
  - ungido
  rationale: El texto fuente usa el título χριστός, y el proyecto prioriza «Mesías» como reflejo titular cuando el sentido no es meramente nominal. Esto evita la importación automática del equivalente eclesiástico tradicional sin perder inteligibilidad.
  doctrine_reference: Terminología cristológica del proyecto
translation_notes:
  revision_awareness: El borrador sigue la lectura más reciente del audit trail, que restauró «Mesías» como equivalente de Χριστός y suavizó la puntuación para dejar fluir la enumeración. La versión española conserva esa decisión terminológica y refleja la relación apposicional sin introducir guiones o paráfrasis adicionales.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός conforme al estándar del proyecto.
  - Se usa «justicia» para δικαιοσύνη, con nota alternativa, siguiendo el valor lexical admitido por el audit trail.
  - La secuencia «sabiduría de Dios, y justicia y santificación y redención» conserva la coordinación del griego sin añadir nexos explicativos extra.
  - «Redención» y «santificación» siguen terminología paulina usual en español, pero sin sustituir el tenor del original por formulaciones devocionales más libres.
