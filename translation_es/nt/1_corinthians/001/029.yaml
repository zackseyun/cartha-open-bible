lexical_decisions:
- source_word: ὅπως
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  lexicon: BDAG
  rationale: Expresa la finalidad de la cláusula con una forma natural y fiel en español, equivalente al valor telic del griego.
- source_word: μὴ
  english_pob_choice: 'no'
  chosen_spanish: ninguna
  alternatives_spanish:
  - 'no'
  lexicon: BDAG
  rationale: 'Con el subjuntivo en la cláusula final, el negativo se integra naturalmente como restricción universal: ''ninguna carne'' comunica mejor el alcance que una negación literal separada.'
- source_word: καυχήσηται
  english_pob_choice: may boast
  chosen_spanish: se gloríe
  alternatives_spanish:
  - se jacte
  - se gloríe
  lexicon: BDAG
  rationale: El campo semántico incluye jactarse/vanagloriarse. 'Se gloríe' mantiene un registro bíblico claro en español y evita un tono demasiado coloquial de 'jactarse'.
- source_word: πᾶσα σὰρξ
  english_pob_choice: no flesh
  chosen_spanish: ninguna carne
  alternatives_spanish:
  - ningún ser humano
  - nadie
  lexicon: BDAG
  rationale: Se conserva 'carne' para σάρξ, como en la decisión inglesa, porque aquí apunta a la humanidad en su condición creatural y débil ante Dios, no a 'naturaleza pecaminosa'.
- source_word: σὰρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - humanidad
  - ser humano
  lexicon: BDAG
  rationale: Mantiene la textura paulina del término y la tensión interpretativa documentada; 'carne' es la correspondencia más directa y evita aplanar el término a 'humanidad'.
- source_word: ἐνώπιον τοῦ θεοῦ
  english_pob_choice: before God
  chosen_spanish: delante de Dios
  alternatives_spanish:
  - en presencia de Dios
  - ante Dios
  lexicon: BDAG
  rationale: '''Delante de Dios'' reproduce bien el sentido idiomático de estar en la presencia de Dios y suena natural en español bíblico contemporáneo.'
theological_decisions:
- issue: Renderización de σάρξ en este contexto paulino
  english_pob_reading: Keep 'flesh' rather than 'human being' or 'sinful nature'.
  chosen_spanish_reading: Conservar 'carne' en vez de 'ser humano' o 'naturaleza pecaminosa'.
  alternative_spanish_readings:
  - ser humano
  - humanidad
  - naturaleza pecaminosa
  rationale: El contexto contrasta la criatura humana con Dios y no introduce aquí una oposición moral interna. 'Carne' preserva la resonancia paulina y la tensión semántica que el texto exige.
  doctrine_reference: 'DOCTRINE.md: contested term σάρξ → ''carne'' (literal) / ''naturaleza pecaminosa'' (metafórica)'
translation_notes:
  revision_awareness: El contexto auditado muestra alta concordancia con el inglés POB y sin revisiones aplicadas; la versión española sigue esa decisión principal, manteniendo la tensión de σάρξ y la finalidad de la cláusula.
  spanish_consistency_notes:
  - Se mantiene 'carne' para σάρξ conforme al criterio POB documentado.
  - '''Delante de Dios'' conserva el valor idiomático de ἐνώπιον τοῦ θεοῦ sin añadir matices no sustentados.'
  - La negación universal se expresa de forma natural en español con 'ninguna' para evitar una estructura rígida y seguir el sentido de exclusión total.
