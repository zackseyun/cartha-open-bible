lexical_decisions:
- source_word: ὅτι
  english_pob_choice: because
  chosen_spanish: porque
  alternatives_spanish:
  - ya que
  - pues
  lexicon: BDAG
  rationale: En este contexto, la cláusula expresa la base de la acción de gracias anterior; 'porque' comunica con claridad la relación causal sin forzar una subordinación demasiado rígida.
- source_word: ἐν παντὶ
  english_pob_choice: in every way
  chosen_spanish: en todo
  alternatives_spanish:
  - en todo aspecto
  - de todas maneras
  lexicon: BDAG
  rationale: La expresión neutra con ἐν es amplia y idiomática. 'En todo' conserva la amplitud del griego y suena natural en español, manteniendo la idea de enriquecimiento integral.
- source_word: ἐπλουτίσθητε
  english_pob_choice: were enriched
  chosen_spanish: fueron enriquecidos
  alternatives_spanish:
  - han sido enriquecidos
  - se enriquecieron
  lexicon: BDAG
  rationale: El aoristo pasivo indica recepción de riqueza desde una fuente externa. 'Fueron enriquecidos' preserva el pasivo y la metáfora sin sugerir que ellos mismos se hicieron ricos por cuenta propia.
- source_word: ἐν αὐτῷ
  english_pob_choice: in him
  chosen_spanish: en él
  alternatives_spanish:
  - por medio de él
  - a través de él
  lexicon: BDAG
  rationale: '''En él'' respeta el valor local/de esfera de ἐν y conserva el lenguaje paulino de unión con Cristo, sin convertirlo en una relación meramente instrumental.'
- source_word: ἐν παντὶ λόγῳ
  english_pob_choice: in all speech
  chosen_spanish: en toda palabra
  alternatives_spanish:
  - en todo discurso
  - en toda expresión
  lexicon: BDAG
  rationale: λόγος aquí puede referirse a palabra, discurso o expresión verbal. 'En toda palabra' sigue de cerca la forma griega y mantiene la relación paralela con 'conocimiento'; no se traduce por 'mensaje' porque el contexto apunta más a capacidad o expresión verbal.
- source_word: πάσῃ γνώσει
  english_pob_choice: all knowledge
  chosen_spanish: en todo conocimiento
  alternatives_spanish:
  - en todo saber
  lexicon: BDAG
  rationale: γνῶσις se refiere aquí al conocimiento en sentido amplio. 'En todo conocimiento' conserva el paralelismo con la frase anterior y reproduce la estructura repetida de ἐν παντὶ / πάσῃ.
translation_notes:
  revision_awareness: La versión anterior fue corregida eliminando notas al pie no ancladas en el texto. Ahora el texto español no incluye marcadores de nota, y el registro de notas queda vacío para cumplir la validación.
  spanish_consistency_notes:
  - Se mantuvo 'en él' para ἐν αὐτῷ, conforme al lenguaje de unión con Cristo y a la decisión inglesa 'in him'.
  - 'Se conservó la doble repetición de ἐν con un paralelismo claro: ''en todo, en toda palabra y en todo conocimiento''.'
  - Se prefirió 'palabra' sobre 'discurso' o 'mensaje' por cercanía formal al griego y por la estructura sintáctica del verso.
