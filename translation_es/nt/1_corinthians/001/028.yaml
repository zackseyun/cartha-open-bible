translation:
  language: es
  text: Y Dios escogió las cosas de humilde condición del mundo y las cosas despreciadas[a], las cosas que no son, para anular las cosas que son[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las que son tenidas por nada».
    reason: lexical_alternative
  - marker: b
    text: O «reducir a nada».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγενῆ
  english_pob_choice: lowborn things
  chosen_spanish: las cosas de baja condición
  alternatives_spanish:
  - las cosas de origen humilde
  - las cosas de bajo linaje
  - las cosas de poca categoría
  lexicon: BDAG
  rationale: El griego se refiere a lo que carece de nobleza o estatus social. En español, «de baja condición» comunica bien esa idea de rango social sin sonar arcaico ni demasiado interpretativo.
- source_word: ἐξουθενημένα
  english_pob_choice: despised things
  chosen_spanish: las cosas despreciadas
  alternatives_spanish:
  - las cosas tratadas con desprecio
  - las cosas tenidas en poco
  - las cosas despreciadas por todos
  lexicon: BDAG
  rationale: El participio perfecto expresa cosas que han sido tratadas como despreciables o sin valor. «Despreciadas» preserva esa fuerza y mantiene la concisión del texto.
- source_word: τὰ μὴ ὄντα
  english_pob_choice: the things that are not
  chosen_spanish: las cosas que no son
  alternatives_spanish:
  - las cosas que no existen
  - los que no son nada
  - los que cuentan como nada
  lexicon: BDAG
  rationale: La forma española mantiene de cerca el contraste retórico del griego con «las cosas que son». Aunque el contexto apunta a insignificancia social, la redacción literal conserva esa tensión sin resolverla demasiado pronto.
- source_word: τὰ ὄντα
  english_pob_choice: the things that are
  chosen_spanish: las cosas que son
  alternatives_spanish:
  - las cosas que existen
  - las que son algo
  lexicon: BDAG
  rationale: Conviene conservar la simetría con «las cosas que no son». Una paráfrasis más idiomática debilitaría el antítesis marcada de Pablo.
- source_word: καταργήσῃ
  english_pob_choice: nullify
  chosen_spanish: anular
  alternatives_spanish:
  - dejar sin efecto
  - hacer ineficaces
  - abolir
  lexicon: BDAG
  rationale: El verbo indica volver ineficaz o sin validez algo. «Anular» expresa bien esa idea en español moderno sin implicar necesariamente destrucción física.
- source_word: ἐξελέξατο
  english_pob_choice: chose
  chosen_spanish: escogió
  alternatives_spanish:
  - eligió
  - seleccionó
  lexicon: BDAG
  rationale: «Escogió» es natural, claro y fiel al acto deliberado de Dios en el contexto inmediato.
theological_decisions:
- issue: 'Cómo traducir τὰ μὴ ὄντα / τὰ ὄντα: categorías sociales o afirmaciones ontológicas absolutas.'
  english_pob_reading: 'Preserve the literal contrast: “the things that are not” / “the things that are.”'
  chosen_spanish_reading: 'Preservar el contraste literal: «las cosas que no son» / «las cosas que son».'
  alternative_spanish_readings:
  - Interpretar dinámicamente como «los que no cuentan para nada» / «los que cuentan para algo»
  - usar «los insignificantes» / «los importantes»
  rationale: El contexto trata del estatus ante el mundo, pero Pablo formula la oposición con una expresión más amplia y provocadora. La traducción literal conserva la agudeza retórica y deja abierta la tensión semántica que el griego presenta.
  doctrine_reference: Preservar la tensión textual en lugar de resolverla en la paráfrasis.
translation_notes:
  revision_awareness: El contexto inglés revisó la puntuación para suavizar el ritmo; en español se adoptó una sola cláusula continua con comas, manteniendo la estructura paralela del griego y la misma decisión de no resolver la tensión de τὰ μὴ ὄντα / τὰ ὄντα.
  spanish_consistency_notes:
  - Se mantiene «Dios» para ὁ θεός, conforme al criterio del proyecto.
  - Se conserva la serie repetida «las cosas... las cosas...» para reflejar el paralelismo del griego.
  - Se evita «SEÑOR» porque aquí no aparece κύριος en el texto fuente.
  - «Anular» se usa de manera consistente con el valor de καταργέω en contextos paulinos de invalidación o ineficacia.
