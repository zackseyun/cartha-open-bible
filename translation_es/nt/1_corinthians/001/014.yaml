translation:
  language: es
  text: Doy gracias porque no bauticé a ninguno de ustedes, excepto a Crispo y Gayo,
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: εὐχαριστῶ
  english_pob_choice: I am thankful
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Estoy agradecido
  - Agradezco
  lexicon: BDAG
  rationale: La forma griega expresa gratitud en primera persona presente. En español, «doy gracias» conserva el valor verbal de la acción de agradecer y resulta natural en un registro bíblico y público; evita la frialdad de una calca y mantiene la fuerza del agradecimiento.
- source_word: ὅτι
  english_pob_choice: that
  chosen_spanish: de que
  alternatives_spanish:
  - porque
  lexicon: BDAG
  rationale: Aquí introduce el contenido de la gratitud, no una causa independiente. En español, «de que» encaja con «doy gracias» y refleja bien la relación subordinada sin convertirla en explicación causal.
- source_word: οὐδένα ὑμῶν
  english_pob_choice: none of you
  chosen_spanish: a ninguno de ustedes
  alternatives_spanish:
  - a nadie de ustedes
  - a ninguno de vosotros
  lexicon: BDAG
  rationale: La construcción negada funciona como objeto directo de «bauticé». «A ninguno de ustedes» es claro y neutral para el español latinoamericano; conserva el alcance total de la negación sin añadir matices no presentes en el griego.
- source_word: ἐβάπτισα
  english_pob_choice: baptized
  chosen_spanish: bauticé
  alternatives_spanish:
  - inmersé
  - sumergí
  lexicon: BDAG
  rationale: «Bauticé» es el equivalente cristiano normal y fiel en español. «Inmersé» o «sumergí» introducen una interpretación de modo que el texto no exige.
- source_word: εἰ μὴ
  english_pob_choice: except
  chosen_spanish: excepto
  alternatives_spanish:
  - salvo
  - sino
  lexicon: BDAG
  rationale: En esta construcción de exclusión, «excepto» reproduce con naturalidad la excepción indicada por el griego y coincide con la decisión inglesa de «except».
- source_word: Κρίσπον
  english_pob_choice: Crispus
  chosen_spanish: Crispo
  alternatives_spanish:
  - Crispus
  lexicon: standard proper-name transliteration
  rationale: El nombre propio se adapta a la forma habitual en español bíblico, «Crispo», que es transparente y reconocible para lectores en español.
- source_word: Γάϊον
  english_pob_choice: Gaius
  chosen_spanish: Gayo
  alternatives_spanish:
  - Gaio
  lexicon: standard proper-name transliteration
  rationale: Se usa la forma española tradicional y clara «Gayo» para el nombre propio, en lugar de conservar la grafía inglesa o griega.
translation_notes:
  revision_awareness: El texto griego y la traducción inglesa están en alto acuerdo; no hay variantes textuales ni decisiones teológicas adicionales que requieran nota. La principal tarea fue expresar con español natural la gratitud y la excepción sin perder la precisión del original.
  spanish_consistency_notes:
  - Se mantiene el verbo en primera persona singular («Doy gracias»), coherente con el sujeto implícito del griego.
  - Se conserva el orden lógico de gratitud + contenido subordinado + excepción final, que coincide con la estructura del original.
  - Se eligieron nombres propios adaptados al uso español bíblico («Crispo», «Gayo») para facilitar lectura pública sin alterar la referencia histórica.
