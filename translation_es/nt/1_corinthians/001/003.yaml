translation:
  language: es
  text: Gracia a ustedes y paz de parte de Dios nuestro Padre y del Señor Jesús Mesías[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «el Señor Jesús Cristo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En saludos paulinos, χάρις funciona como saludo teológico establecido; «gracia» conserva el valor doctrinal y el uso natural en español cristiano mejor que «favor».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  lexicon: BDAG
  rationale: El dativo epistolar se vierte de forma natural en español con «a ustedes»; mantiene el destinatario del saludo sin añadir contenido.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: «Paz» es el equivalente normal y más fiel en este saludo paulino; conserva resonancia relacional y bíblica.
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de parte de
  alternatives_spanish:
  - de
  - procedente de
  lexicon: BDAG
  rationale: «De parte de» expresa con naturalidad en español la procedencia personal del saludo y evita una literalidad rígida de «de» que puede sonar menos idiomática en este contexto.
- source_word: θεοῦ πατρὸς ἡμῶν
  english_pob_choice: God our Father
  chosen_spanish: Dios nuestro Padre
  alternatives_spanish:
  - Dios, nuestro Padre
  - nuestro Dios y Padre
  lexicon: BDAG
  rationale: 'La construcción griega se refleja bien con una aposición en español: «Dios nuestro Padre». «Nuestro Dios y Padre» sugeriría otra estructura; la coma opcional no es necesaria.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título tradicional y bíblicamente cargado «Señor», que reproduce adecuadamente κύριος en este contexto.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah / Lord Jesus Christ
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστοῦ se vierte como «Mesías» para conservar el sentido titular del griego y la política del proyecto; se evita «Cristo» como forma litúrgica fija no necesaria aquí.
theological_decisions:
- issue: Si la preposición ἀπό debe gobernar tanto a Dios Padre como al Señor Jesús Mesías.
  english_pob_reading: A single 'from' governs both 'God our Father' and 'the Lord Jesus Messiah/Christ.'
  chosen_spanish_reading: Una sola expresión de procedencia («de parte de») gobierna tanto a Dios nuestro Padre como al Señor Jesús Mesías.
  alternative_spanish_readings:
  - Repetir «de parte de» antes de «el Señor Jesús Mesías»
  - Separar las fuentes con otra reestructuración
  rationale: El griego presenta ambos referentes bajo la misma preposición; la traducción conserva esa coordinación sin explicarla doctrinalmente ni debilitarla.
  doctrine_reference: Nicene Creed (381 AD), within bounds but not imported beyond the text
translation_notes:
  revision_awareness: El paquete de auditoría inglés muestra una oscilación entre «Christ» y «Messiah» para Χριστοῦ; la decisión final de la POB fue restaurar «Messiah» por política del proyecto. Esta versión española sigue esa línea y evita «Cristo» como forma por defecto. También se refleja la coordinación gramatical del griego con una sola marca de procedencia.
  spanish_consistency_notes:
  - Se usa «Mesías» de manera consistente para Χριστός en el texto principal.
  - «Señor» mantiene la terminología POB para κύριος.
  - La fórmula epistolar queda natural en español sin perder la estructura fuente.
  - La nota al pie conserva la alternativa léxica relevante sin duplicar marcadores.
