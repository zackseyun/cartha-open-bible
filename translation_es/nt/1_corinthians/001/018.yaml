translation:
  language: es
  text: Porque el mensaje[a] de la cruz es locura para los que están pereciendo, pero para nosotros, los que estamos siendo salvos[b], es poder de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «palabra de la cruz».
    reason: lexical_alternative
  - marker: b
    text: El griego dice literalmente «nosotros, los que están siendo salvados»; la forma presente presenta la salvación aquí como una realidad en desarrollo.
    reason: alternative_reading
lexical_decisions:
- source_word: λόγος
  english_pob_choice: message
  chosen_spanish: mensaje
  alternatives_spanish:
  - palabra
  lexicon: BDAG
  rationale: «Mensaje» comunica mejor que el referente aquí es el contenido proclamado acerca de la cruz, no una sola palabra aislada. Mantiene la fuerza comunicativa del griego sin volverlo rígido en español.
- source_word: σταυροῦ
  english_pob_choice: cross
  chosen_spanish: cruz
  alternatives_spanish:
  - crucifixión
  lexicon: BDAG
  rationale: «Cruz» conserva la expresión breve y teológicamente cargada de Pablo. «Crucifixión» explicita el evento, pero pierde la forma compacta del sustantivo y su valor simbólico.
- source_word: ἀπολλυμένοις
  english_pob_choice: those who are perishing
  chosen_spanish: los que se pierden
  alternatives_spanish:
  - los que perecen
  - los que están pereciendo
  - los que se están perdiendo
  lexicon: BDAG
  rationale: La forma presente expresa una condición en curso. En español, «los que se pierden» preserva esa progresividad de manera natural; «perecen» sería más estático y «están pereciendo» suena más forzado.
- source_word: μωρία
  english_pob_choice: foolishness
  chosen_spanish: locura
  alternatives_spanish:
  - necedad
  - insensatez
  lexicon: BDAG
  rationale: «Locura» reproduce la valoración despectiva del contraste paulino y funciona bien con el paralelo con «poder de Dios». «Necedad» sería posible, pero suena más literaria y menos directa.
- source_word: σῳζομένοις
  english_pob_choice: us who are being saved
  chosen_spanish: los que estamos siendo salvos
  alternatives_spanish:
  - los que somos salvos
  - los que estamos siendo rescatados
  lexicon: BDAG
  rationale: El participio presente debe conservarse como realidad en proceso. «Estamos siendo salvos» mantiene el aspecto progresivo y la tensión teológica; «somos salvos» lo reduce a un estado ya cerrado.
- source_word: δύναμις θεοῦ
  english_pob_choice: the power of God
  chosen_spanish: poder de Dios
  alternatives_spanish:
  - la potencia de Dios
  - la fuerza de Dios
  lexicon: BDAG
  rationale: «Poder de Dios» es la equivalencia más clara y formalmente cercana para la construcción nominal griega, sin añadir matices ajenos.
theological_decisions:
- issue: Aspecto de la salvación en σῳζομένοις
  english_pob_reading: us who are being saved
  chosen_spanish_reading: los que estamos siendo salvos
  alternative_spanish_readings:
  - los que somos salvos
  - los que estamos siendo rescatados
  rationale: Se conserva la idea de una salvación en desarrollo o en curso, evitando resolver la frase como un estado meramente consumado. Esto refleja la tensión paulina del presente participio y mantiene abierta la dimensión procesual.
  doctrine_reference: Preservar la tensión teológica del tiempo verbal sin reducirla a una formulación sistemática cerrada.
translation_notes:
  revision_awareness: 'El texto sigue de cerca el griego SBLGNT y el criterio de la POB inglesa: λόγος como contenido proclamado («mensaje»), σταυρός como «cruz», μωρία como «locura», y σῳζομένοις con aspecto progresivo preservado en español. Se evitó suavizar la tensión entre perecer y ser salvados.'
  spanish_consistency_notes:
  - Se mantuvo «Dios» para θεοῦ conforme al estándar del proyecto.
  - Se evitó «Cristo» porque el versículo no lo contiene; el centro semántico es «la cruz».
  - Se usó «poder» en lugar de una paráfrasis explicativa para conservar la estructura nominal del predicado.
  - Las notas a pie de página reflejan alternativas reales del griego y del español, sin introducir lecturas no documentadas.
