review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: «mensaje de la cruz», «locura», «para nosotros», y «poder de Dios» están bien alineados con λόγος, σταυροῦ, μωρία, ἡμῖν y δύναμις θεοῦ. Sin embargo, el anclaje de las notas no sigue fielmente la lógica del texto auditado: la nota sobre la condición en curso de ἀπολλυμένοις debe asociarse al grupo verbal correspondiente, y falta en español la alternativa léxica documentada para λόγος («palabra»), que el inglés preservó con nota.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. «Porque el mensaje de la cruz…» fluye bien. No obstante, «los que se pierden» puede entenderse como reflexivo/resultativo más que como proceso continuo; «los que están pereciendo» es más explícito respecto al participio presente, aunque algo más pesado. También conviene conservar la alternativa «palabra de la cruz» en nota, porque en español esa opción sigue siendo inteligible y cercana al griego.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Dios» y «cruz» están bien. La decisión «mensaje» para λόγος es válida en español, pero debe acompañarse de la alternativa «palabra» como nota, siguiendo el rastro auditado del POB. La formulación progresiva de σῳζομένοις se preserva correctamente con «estamos siendo salvos».
  issues:
  - severity: medium
    issue: Falta la nota léxica para λόγος
    rationale: El English POB preserva explícitamente la alternativa «word of the cross». Dado que el español usa «mensaje», debe conservarse la alternativa «palabra de la cruz» en nota para mantener el rastro léxico documentado.
  - severity: medium
    issue: La nota [a] actual no corresponde al mejor lugar ni al mejor contenido
    rationale: La nota [a] está puesta en «se pierden» y ofrece «perecen», pero la alternativa principal documentada en el POB para esa posición de nota era sobre λόγος («word/message»), no sobre ἀπολλυμένοις. La gestión de notas debe rehacerse para que refleje el audit trail y las anclas correctas.
  - severity: low
    issue: «los que se pierden» puede suavizar el aspecto progresivo de ἀπολλυμένοις
    rationale: Aunque idiomático, puede leerse como descripción general más que como proceso en curso. «los que están pereciendo» o «los que perecen» marcan mejor el valor aspectual; si se mantiene una forma más natural, conviene explicitar el matiz en nota.
  revised_spanish_text: Porque el mensaje[a] de la cruz es locura para los que están pereciendo, pero para nosotros, los que estamos siendo salvos[b], es poder de Dios.
