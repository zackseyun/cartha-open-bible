revisions:
- from: Porque el mensaje de la cruz es locura para los que se pierden[a], pero para nosotros, los que estamos siendo salvos[b], es poder de Dios.
  to: Porque el mensaje[a] de la cruz es locura para los que están pereciendo, pero para nosotros, los que estamos siendo salvos[b], es poder de Dios.
  rationale: Se revisa para alinear las notas con el audit trail del POB y con los anclajes correctos en el texto. Se añade la alternativa léxica «palabra de la cruz» para λόγος, y se conserva explícitamente la dimensión progresiva de σῳζομένοις. Además, se ajusta «los que se pierden» a «los que están pereciendo» para reflejar mejor el participio presente de ἀπολλυμένοις sin alterar el sentido.
