translation:
  language: es
  text: Doy gracias a mi Dios siempre por ustedes, a causa de la gracia de Dios que les fue dada en Mesías Jesús[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Doy gracias a mi Dios siempre con respecto a ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «en Cristo Jesús».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Εὐχαριστῶ
  english_pob_choice: I thank
  chosen_spanish: Doy gracias
  alternatives_spanish:
  - Te agradezco
  - Agradezco
  lexicon: BDAG
  rationale: En español, la fórmula natural y reverente en una oración de gratitud es «doy gracias». Conserva el presente continuo de la acción de Pablo y evita un calco rígido de la sintaxis inglesa.
- source_word: τῷ θεῷ μου
  english_pob_choice: my God
  chosen_spanish: a mi Dios
  alternatives_spanish:
  - a Dios mío
  - a mi Dios
  lexicon: BDAG
  rationale: El dativo griego se expresa naturalmente con «a» en español dentro de esta construcción de agradecimiento. Se mantiene «mi Dios» porque el posesivo es explícito y personal en el griego.
- source_word: πάντοτε
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - constantemente
  - todo el tiempo
  lexicon: BDAG
  rationale: «Siempre» es el equivalente más directo y natural, y conserva el alcance temporal amplio del adverbio.
- source_word: περὶ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - acerca de ustedes
  - en favor de ustedes
  lexicon: BDAG
  rationale: En fórmulas de acción de gracias, περί con genitivo puede expresar referencia u ocasión; «por ustedes» comunica con naturalidad la orientación del agradecimiento sin forzar una paráfrasis explicativa.
- source_word: ἐπὶ τῇ χάριτι
  english_pob_choice: because of the grace
  chosen_spanish: a causa de la gracia
  alternatives_spanish:
  - por la gracia
  - debido a la gracia
  lexicon: BDAG
  rationale: ἐπί con dativo indica aquí base u ocasión. «A causa de» refleja bien ese valor causal en español, manteniendo la relación lógica del agradecimiento.
- source_word: χάριτι
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: «Gracia» es la traducción estándar y más adecuada teológicamente para χάρις en Pablo, especialmente cuando la referencia es al don salvífico de Dios.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - procedente de Dios
  - de parte de Dios
  lexicon: BDAG
  rationale: El genitivo se conserva de modo formal y natural con «de Dios», dejando abierta tanto la relación posesiva como la fuente del don.
- source_word: τῇ δοθείσῃ ὑμῖν
  english_pob_choice: given to you
  chosen_spanish: que les fue dada
  alternatives_spanish:
  - otorgada a ustedes
  - concedida a ustedes
  lexicon: BDAG
  rationale: El participio pasivo de δίδωμι se vierte con voz pasiva en español para conservar el énfasis en Dios como dador implícito. «Les fue dada» es claro y fiel al aoristo pasivo.
- source_word: ἐν Χριστῷ Ἰησοῦ
  english_pob_choice: in Messiah Jesus
  chosen_spanish: en Mesías Jesús
  alternatives_spanish:
  - en Cristo Jesús
  lexicon: BDAG
  rationale: Se conserva «Mesías» según la terminología del proyecto para Χριστός, evitando la forma eclesiástica tradicional cuando el título aún tiene fuerza semántica. «En Mesías Jesús» reproduce de manera transparente la frase preposicional del griego.
theological_decisions:
- issue: Título Χριστός en la fórmula cristológica final
  english_pob_reading: in Messiah Jesus
  chosen_spanish_reading: en Mesías Jesús
  alternative_spanish_readings:
  - en Cristo Jesús
  rationale: La política del proyecto favorece «Mesías» cuando Χριστός funciona como título. Aquí no hay una razón de idioma español que obligue a la forma tradicional «Cristo», así que se preserva el valor titular y la transparencia del término.
  doctrine_reference: DOCTRINE.md / política de Χριστός → Mesías
- issue: Relación causal de la gratitud con la gracia recibida
  english_pob_reading: because of the grace of God given to you
  chosen_spanish_reading: a causa de la gracia de Dios que les fue dada
  alternative_spanish_readings:
  - por la gracia de Dios que les fue dada
  - debido a la gracia de Dios que les fue dada
  rationale: La preposición ἐπί con dativo expresa fundamento u ocasión. «A causa de» mantiene explícita esa relación sin convertirla en una simplificación meramente ornamental.
  doctrine_reference: Lectura sintáctica de ἐπί + dativo en contexto paulino
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisiones inglés/audit trail. El texto español sigue la lectura restaurada de Χριστός como «Mesías» y no adopta la forma inglesa revisada «Christ»; además, conserva el valor causal de ἐπί con dativo mediante una construcción natural en español.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y no un sustituto reverencial que oculte el nombre común del texto.
  - Se mantiene el posesivo explícito «mi Dios», como en el griego.
  - «Siempre» conserva el adverbio πάντοτε sin intensificación indebida.
  - La frase final mantiene la preposición «en» para ἐν Χριστῷ Ἰησοῦ, con la opción de nota alternativa para la lectura tradicional.
  - El registro es solemne pero no arcaizante; evita calcos innecesarios y sigue la sintaxis natural del español bíblico contemporáneo.
