translation:
  language: es
  text: También bauticé a la casa[a] de Estéfanas; fuera de eso, no sé si bauticé a algún otro[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hogar de Estéfanas». El término griego puede designar una unidad doméstica, no solo un edificio.
    reason: lexical_alternative
  - marker: b
    text: O «si bauticé a alguien más».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐβάπτισα
  english_pob_choice: baptized
  chosen_spanish: bauticé
  alternatives_spanish:
  - inmergí
  - sumergí
  lexicon: BDAG
  rationale: El verbo aoristo describe la acción de administrar el bautismo. En español, «bauticé» es la equivalencia clara y natural; las opciones «inmergí/sumergí» introducirían un matiz modal no exigido por el texto ni por el audit trail inglés.
- source_word: δὲ καὶ
  english_pob_choice: also
  chosen_spanish: también
  alternatives_spanish:
  - y también
  - además
  lexicon: BDAG
  rationale: La combinación δὲ καὶ añade a Estéfanas a lo ya mencionado. «También» comunica bien el valor aditivo sin forzar una oposición que el contexto no exige.
- source_word: τὸν Στεφανᾶ οἶκον
  english_pob_choice: the household of Stephanas
  chosen_spanish: la casa de Estéfanas
  alternatives_spanish:
  - el hogar de Estéfanas
  - la familia de Estéfanas
  - la casa-hogar de Estéfanas
  lexicon: BDAG
  rationale: Οἶκος puede referirse al conjunto doméstico o unidad social, no solo al edificio. En español, «la casa de Estéfanas» conserva esa amplitud y sigue de cerca la alternativa señalada en el registro inglés, sin perder claridad; «familia» estrecharía demasiado el sentido.
- source_word: λοιπὸν
  english_pob_choice: beyond that
  chosen_spanish: fuera de eso
  alternatives_spanish:
  - por lo demás
  - además de eso
  - después de eso
  lexicon: BDAG
  rationale: Λοιπόν introduce lo que queda aparte de la excepción anterior. «Fuera de eso» transmite con naturalidad la idea de exclusión/reserva que el inglés POB captó con «beyond that».
- source_word: οὐκ οἶδα
  english_pob_choice: I do not know
  chosen_spanish: no sé
  alternatives_spanish:
  - no lo recuerdo
  - no conozco
  lexicon: BDAG
  rationale: El griego afirma directamente falta de conocimiento; en contexto, la idea de memoria está implícita, pero «no sé» permanece más cercano y más natural en español.
- source_word: εἴ τινα ἄλλον
  english_pob_choice: if I baptized anyone else
  chosen_spanish: si bauticé a algún otro
  alternatives_spanish:
  - si bauticé a otra persona
  - si bauticé a alguien más
  - si bauticé a cualquier otro
  lexicon: BDAG
  rationale: La cláusula expresa incertidumbre sobre si hubo otra persona. «Si bauticé a algún otro» mantiene el valor condicional/indirecto del griego y reproduce de manera sobria la misma indeterminación que el inglés POB preservó con «if I baptized anyone else».
translation_notes:
  revision_awareness: La redacción sigue de cerca el sentido ya auditado en la versión inglesa POB y conserva la misma ambigüedad lexical de οἶκος y la incertidumbre de εἴ τινα ἄλλον. No se detectaron cambios textuales en la revisión más reciente; el ajuste principal es de equivalencia natural al español.
  spanish_consistency_notes:
  - Se evita «SEÑOR» o terminología no pertinente porque el versículo no contiene vocabulario divino.
  - Se mantiene «bauticé» para preservar el acto sacramental/ritual sin añadir información sobre el modo.
  - «Casa de Estéfanas» deja abierta la alternativa social-doméstica que el propio audit trail inglés documenta.
  - La construcción «fuera de eso» funciona como equivalente idiomático de la reserva de λοιπὸν en este contexto.
