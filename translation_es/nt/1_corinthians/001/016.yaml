  to: También bauticé a la casa[a] de Estéfanas; fuera de eso, no sé si bauticé a algún otro[b].
  rationale: Se corrige la nota [a] para que aporte una alternativa léxica real y explique claramente el valor de οἶκος como unidad doméstica. Se ancla la nota en «casa» para resolver la posible ambigüedad en español sin sobreinterpretar el texto principal. La nota [b] se reubica sobre «algún otro» para reflejar mejor el segmento griego εἴ τινα ἄλλον y mantener la alternativa ya documentada en el POB inglés.
