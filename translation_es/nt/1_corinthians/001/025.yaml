translation:
  language: es
  text: Porque la necedad[a] de Dios es más sabia que los seres humanos[b], y la debilidad de Dios es más fuerte que la fuerza humana.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «lo necio de Dios» / «lo que parece necio en Dios».
    reason: lexical_alternative
  - marker: b
    text: Lit. «los humanos» o «los hombres»; el griego es genérico para la humanidad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: En este contexto causal/conclusivo, «Porque» expresa con naturalidad la conexión con la afirmación anterior y mantiene el valor explicativo del griego sin volverla demasiado interpretativa.
- source_word: τὸ μωρὸν
  english_pob_choice: the foolishness
  chosen_spanish: la necedad
  alternatives_spanish:
  - la locura
  - lo necio
  - la insensatez
  lexicon: BDAG
  rationale: El neutro sustantivado pide una forma nominal en español. «Nece​dad» conserva el valor abstracto y el tono paradójico del pasaje sin convertirlo en una explicación parenética.
- source_word: τοῦ θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de parte de Dios
  - en Dios
  lexicon: BDAG
  rationale: Se conserva el genitivo tal como está en el griego. No se parafrasea para no resolver la tensión retórica de Pablo.
- source_word: σοφώτερον
  english_pob_choice: wiser
  chosen_spanish: más sabia
  alternatives_spanish:
  - más sabia que
  - más prudente
  lexicon: BDAG
  rationale: «Más sabia» reproduce el comparativo de σοφός con naturalidad en español y mantiene el contraste con la necedad precedente.
- source_word: ἀνθρώπων
  english_pob_choice: men
  chosen_spanish: los hombres
  alternatives_spanish:
  - las personas
  - la humanidad
  - los seres humanos
  lexicon: BDAG
  rationale: Aunque el término es genérico para la humanidad, «los hombres» conserva la comparación colectiva y el registro relativamente formal del POB inglés auditado. En nota se aclara el alcance genérico.
- source_word: τὸ ἀσθενὲς
  english_pob_choice: the weakness
  chosen_spanish: la debilidad
  alternatives_spanish:
  - lo débil
  - la flaqueza
  lexicon: BDAG
  rationale: Como con τὸ μωρόν, el adjetivo sustantivado funciona mejor como abstracto en español. «Debilidad» mantiene el paralelismo con «necedad» y la oposición con «más fuerte».
- source_word: ἰσχυρότερον
  english_pob_choice: stronger
  chosen_spanish: más fuerte
  alternatives_spanish:
  - más poderosa
  - más vigorosa
  lexicon: BDAG
  rationale: «Más fuerte» es el comparativo directo y el más transparente en español; preserva el contraste léxico con «debilidad».
theological_decisions:
- issue: Cómo rendir las expresiones paradójicas «la necedad de Dios» y «la debilidad de Dios» sin suavizarlas
  english_pob_reading: Retain the paradoxical phrases as 'the foolishness of God' and 'the weakness of God'
  chosen_spanish_reading: Conservar «la necedad de Dios» y «la debilidad de Dios» como expresiones paradójicas
  alternative_spanish_readings:
  - lo que parece necio en Dios
  - lo que los humanos consideran necio en Dios
  - lo que parece débil en el actuar de Dios
  rationale: Pablo usa un lenguaje deliberadamente chocante para afirmar la superioridad divina sobre la sabiduría y la fuerza humanas. En español, conviene preservar esa tensión sin explicar el texto dentro del texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente al preferir un conector causal natural y al mantener el sustantivo colectivo genérico para ἀνθρώπων, pero en español se eligió «Porque» y «los hombres» por fluidez y paralelismo retórico.
  spanish_consistency_notes:
  - 'Se mantuvo el patrón paralelo: «la necedad de Dios / la debilidad de Dios»; «más sabia / más fuerte».'
  - No se usó «Cristo» ni terminología eclesiástica añadida; el verso no la requiere.
  - «los hombres» se entiende aquí en sentido genérico de humanidad, no restrictivamente masculino, y la nota lo explicita.
  - Se preservó el tono paradójico sin convertir el genitivo en una paráfrasis explicativa.
