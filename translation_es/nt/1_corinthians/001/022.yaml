translation:
  language: es
  text: Pues[a] los judíos piden señales[b], y los griegos buscan sabiduría[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «ya que».'
    reason: alternative_reading
  - marker: b
    text: «Señales» también puede entenderse como «señales milagrosas».
    reason: lexical_alternative
  - marker: c
    text: «Griegos» puede traducirse de manera más amplia como «gentiles», pero aquí se conserva el marco cultural griego por la referencia a la sabiduría.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπειδή
  english_pob_choice: For
  chosen_spanish: Pues
  alternatives_spanish:
  - Porque
  - Ya que
  - Puesto que
  lexicon: BDAG
  rationale: La conjunción introduce la razón explicativa del contraste anterior. «Pues» suena natural en español y conserva bien el valor explicativo/causal sin volver demasiado rígida la sintaxis.
- source_word: Ἰουδαῖοι
  english_pob_choice: Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  - los judeos
  lexicon: BDAG
  rationale: Aquí funciona como designación de un grupo reconocible en contraste con «los griegos», por lo que «los judíos» es la opción más clara y fiel en español.
- source_word: σημεῖα
  english_pob_choice: signs
  chosen_spanish: señales
  alternatives_spanish:
  - signos
  - señales milagrosas
  lexicon: BDAG
  rationale: «Señales» reproduce el campo semántico básico de σημεῖα y permite mantener la expresión sin expandirla en el texto principal. La dimensión milagrosa queda implícita por el contexto paulino.
- source_word: αἰτοῦσιν
  english_pob_choice: ask for
  chosen_spanish: piden
  alternatives_spanish:
  - solicitan
  - requieren
  - piden de
  lexicon: BDAG
  rationale: «Piden» expresa bien la acción de solicitar o reclamar algo de manera natural en español, con un tono cercano al verbo griego sin sobrecargarlo.
- source_word: Ἕλληνες
  english_pob_choice: Greeks
  chosen_spanish: los griegos
  alternatives_spanish:
  - los gentiles
  lexicon: BDAG
  rationale: Se conserva «los griegos» porque el contraste retórico con «los judíos» y la referencia a la sabiduría preservan mejor el marco cultural específico del texto.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sabiduría filosófica
  lexicon: BDAG
  rationale: «Sabiduría» es el equivalente directo y suficientemente amplio. No se estrecha a «filosofía» en el texto principal para no limitar el alcance del término griego.
- source_word: ζητοῦσιν
  english_pob_choice: seek
  chosen_spanish: buscan
  alternatives_spanish:
  - buscan con empeño
  - persiguen
  - procuran
  lexicon: BDAG
  rationale: Aunque «buscar» es la correspondencia más literal, «buscan» suena más idiomático en español con el objeto «sabiduría» y mantiene el sentido continuo del presente.
theological_decisions:
- issue: Alcance de σημεῖα
  english_pob_reading: '''Signs'' may also be understood as ''miraculous signs.'''
  chosen_spanish_reading: «Señales» puede entenderse también como «señales milagrosas».
  alternative_spanish_readings:
  - «milagros»
  - «prodigios»
  rationale: El texto griego usa el término general σημεῖα; el contexto paulino permite la lectura de señales con carácter milagroso, pero el versículo no obliga a expandirlo en la línea principal. Se preserva así la tensión lexical documentada.
  doctrine_reference: 1 Corintios 1:22; BDAG σημεῖον
- issue: Valor de Ἕλληνες
  english_pob_reading: '''Greeks'' could be rendered more broadly as ''Gentiles,'' but Paul likely preserves the specific Greek cultural frame because of the reference to wisdom.'
  chosen_spanish_reading: «Griegos» se conserva, en vez de ampliarlo a «gentiles», para mantener el marco cultural específico ligado a la «sabiduría».
  alternative_spanish_readings:
  - «gentiles»
  rationale: El contraste no es solo étnico sino también retórico-cultural. Como la sabiduría aparece como rasgo distintivo del segundo miembro, traducir literalmente ayuda a preservar el efecto del texto.
  doctrine_reference: 1 Corintios 1:22; BDAG Ἕλλην
translation_notes:
  revision_awareness: El contexto auditado en inglés muestra acuerdo alto y sin cambios recientes; por ello la redacción española sigue de cerca la estructura griega y las decisiones léxicas documentadas, sin ampliar innecesariamente el alcance semántico.
  spanish_consistency_notes:
  - Se mantiene el contraste paralelo «los judíos... y los griegos...».
  - Se evita sustituir «Yahvé» o «Cristo» porque este versículo no los contiene.
  - 'Se conserva el presente gnómico/iterativo con verbos en presente: «piden» y «buscan».'
  - La puntuación y el orden siguen el paralelismo del griego y de la POB inglesa auditada.
