translation:
  language: es
  text: Él también los afirmará hasta el fin, irreprensibles en el día de nuestro Señor Jesús el Mesías.[a][b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «confirmará» o «fortalecerá».
    reason: lexical_alternative
  - marker: b
    text: O «sin reproche», «sin acusación» o «libres de acusación».
    reason: lexical_alternative
  - marker: c
    text: Griego «Cristo»; aquí se traduce «Mesías» para preservar el sentido titular.
    reason: lexical_alternative
lexical_decisions:
- source_word: βεβαιώσει
  english_pob_choice: will also establish
  chosen_spanish: los afirmará
  alternatives_spanish:
  - los establecerá
  - los confirmará
  - los fortalecerá
  lexicon: BDAG
  rationale: βεβαιόω expresa hacer firme, asegurar o afirmar. En español, «afirmará» conserva la idea de dar firmeza sin sonar tan técnico como «establecerá» ni tan evidencial como «confirmará». La dirección del acto divino hacia los creyentes queda clara.
- source_word: ἕως τέλους
  english_pob_choice: to the end / until the end
  chosen_spanish: hasta el fin
  alternatives_spanish:
  - hasta el final
  - hasta el término
  lexicon: BDAG
  rationale: La expresión temporal apunta al límite escatológico o al desenlace final. «Hasta el fin» es natural en español bíblico contemporáneo y conserva la fuerza de duración hasta ese punto.
- source_word: ἀνεγκλήτους
  english_pob_choice: blameless
  chosen_spanish: irreprensibles
  alternatives_spanish:
  - sin culpa
  - sin acusación
  - libres de acusación
  lexicon: BDAG
  rationale: ἀνέγκλητος tiene un matiz legal de no ser susceptible de acusación. «Irreprensibles» es una equivalencia natural y digna en español; la nota preserva la alternativa más jurídica.
- source_word: ἐν τῇ ἡμέρᾳ
  english_pob_choice: in the day
  chosen_spanish: en el día
  alternatives_spanish:
  - para el día
  - el día
  lexicon: BDAG
  rationale: Se mantiene la construcción idiomática «en el día» para conservar el marco escatológico del texto y su formulación reconocible.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Para κύριος, el equivalente natural y reverente en español es «Señor». Aquí nombra al Señor en sentido confesional y no se oculta el término con sustitutos.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se preserva el valor titular de Χριστός como «Mesías», conforme a la política del proyecto y al audit trail inglés. Esto evita convertirlo en mero nombre propio y mantiene la tensión cristológica del pasaje.
theological_decisions:
- issue: Referente de «Él» / ὃς
  english_pob_reading: The relative pronoun refers to 'our Lord Jesus Messiah' in verse 7.
  chosen_spanish_reading: «Él» se entiende como referencia a «nuestro Señor Jesús Mesías» del contexto inmediato.
  alternative_spanish_readings:
  - «Él» podría referirse más ampliamente a Dios mencionado antes en el contexto.
  rationale: La referencia inmediata y más natural del pronombre relativo es la frase precedente sobre nuestro Señor Jesús Mesías. La traducción mantiene esa lectura sin borrar la posibilidad contextual más amplia, pero sin forzarla en el texto principal.
  doctrine_reference: Preservar la tensión referencial cuando el contexto inmediato permite una lectura clara.
translation_notes:
  revision_awareness: El audit trail inglés pasó por una revisión que favoreció una formulación más natural de ἕως τέλους y luego restauró «Messiah» para Χριστός por coherencia doctrinal del proyecto. En español se sigue esa decisión final con «hasta el fin» y «Mesías», evitando una equivalencia mecánica con «Cristo» donde el título sigue vivo.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός en concordancia con la política del proyecto.
  - Se usa «Señor» para κύριος, sin sustituirlo por un tratamiento paraprástico.
  - Se evita «SEÑOR» como máscara tipográfica, ya que el texto griego no requiere ocultar el nombre divino en este versículo.
  - El pronombre inicial se mantiene explícito con «Él» para claridad natural en español, apoyado por el referente contextual inmediato.
