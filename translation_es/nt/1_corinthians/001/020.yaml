translation:
  language: es
  text: ¿Dónde está el sabio[a]? ¿Dónde está el escriba? ¿Dónde está el disputador de este siglo? ¿No ha vuelto Dios necia la sabiduría del mundo?[b][c]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el hombre sabio». El griego es masculino singular y probablemente funciona de manera representativa.
    reason: lexical_alternative
  - marker: b
    text: «De este siglo» traduce un término griego distinto del que aparece después en «del mundo».
    reason: cross_reference
  - marker: c
    text: O «¿No ha mostrado Dios la sabiduría del mundo como necia?»
    reason: lexical_alternative
lexical_decisions:
- source_word: ποῦ
  english_pob_choice: Where is
  chosen_spanish: ¿Dónde está
  alternatives_spanish:
  - ¿Dónde se halla
  - ¿Dónde quedó
  lexicon: BDAG
  rationale: La interrogación retórica en español se expresa de forma natural con «¿Dónde está...?» y conserva el tono de desafío del griego.
- source_word: σοφός
  english_pob_choice: the wise man
  chosen_spanish: el sabio
  alternatives_spanish:
  - la persona sabia
  - el hombre sabio
  lexicon: BDAG
  rationale: «El sabio» mantiene el sustantivo masculino singular representativo sin forzar un calco innecesario; el valor genérico queda claro en el contexto retórico.
- source_word: γραμματεύς
  english_pob_choice: the scribe
  chosen_spanish: el escriba
  alternatives_spanish:
  - el letrado
  - el experto en la Ley
  lexicon: BDAG
  rationale: «Escriba» es el equivalente más directo y conserva la figura histórica concreta del término griego.
- source_word: συζητητής
  english_pob_choice: the debater
  chosen_spanish: el disputador
  alternatives_spanish:
  - el debatiente
  - el razonador
  lexicon: BDAG
  rationale: «Disputador» transmite mejor el matiz de controversia y contienda intelectual que «debatiente» en este contexto paulino.
- source_word: τοῦ αἰῶνος τούτου
  english_pob_choice: of this age
  chosen_spanish: de este siglo
  alternatives_spanish:
  - de esta era
  - del tiempo presente
  lexicon: BDAG
  rationale: Se mantiene la distinción entre αἰών y κόσμος. «Siglo» comunica aquí el sentido de la época presente, distinto de «mundo» en la segunda mitad del versículo.
- source_word: ἐμώρανεν
  english_pob_choice: made ... foolish
  chosen_spanish: ha vuelto ... necia
  alternatives_spanish:
  - ha hecho ... necia
  - ha mostrado ... como necia
  lexicon: BDAG
  rationale: El verbo causativo se vierte de manera natural en español como «ha vuelto ... necia», preservando la idea de hacer caer en necedad o mostrar como necio sin diluir la fuerza verbal.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: la sabiduría
  alternatives_spanish:
  - la inteligencia
  - la sapiencia
  lexicon: BDAG
  rationale: «Sabiduría» es el equivalente normal y mantiene el contraste paulino con la supuesta sabiduría humana.
- source_word: κόσμου
  english_pob_choice: the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - de este mundo
  lexicon: BDAG
  rationale: Se conserva «mundo» para reflejar el segundo término distinto de αἰών y mantener la diferencia semántica resaltada en el texto base.
theological_decisions:
- issue: Distinguir αἰών y κόσμος en la misma frase
  english_pob_reading: ‘of this age’ / ‘of the world’
  chosen_spanish_reading: ‘de este siglo’ / ‘del mundo’
  alternative_spanish_readings:
  - ‘de esta era’ / ‘del mundo’
  - ‘de este tiempo’ / ‘del mundo’
  rationale: La traducción española preserva la oposición intencional del griego entre la época presente y el orden del mundo, en lugar de homogeneizar ambas expresiones con una sola palabra.
  doctrine_reference: 'Translation philosophy #1 y #5'
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el auditor inglés de la POB, manteniendo la distinción entre αἰών y κόσμος, la fuerza retórica de las preguntas y la ambigüedad lexical del verbo ἐμώρανεν con una solución española natural pero auditable. No se introdujeron cambios de contenido respecto del pasaje fuente.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός sin ocultar el nombre divino.
  - Se prefiere «siglo» para αἰών en contraste con «mundo» para κόσμος, siguiendo la distinción documentada en la POB en inglés.
  - «Escriba» conserva el peso histórico del término y evita una paráfrasis excesiva.
  - El marcador [a] aparece en el texto donde la alternativa afecta directamente al sustantivo masculino singular.
