translation:
  language: es
  text: 'Porque está escrito: «Destruiré la sabiduría de los sabios, y anularé[a] el entendimiento de los inteligentes[b]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «rechazaré», «invalidaré» o «dejaré sin efecto».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «de los discernientes».'
    reason: lexical_alternative
lexical_decisions:
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  lexicon: BDAG
  rationale: La fórmula introductoria de cita bíblica en español natural y fiel al valor perfecto-resultativo de γέγραπται es «está escrito».
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  lexicon: BDAG
  rationale: Mantiene la conexión explicativa o de fundamento con lo anterior, con una partícula causal natural en español.
- source_word: Ἀπολῶ
  english_pob_choice: I will destroy
  chosen_spanish: Destruiré
  alternatives_spanish:
  - Arruinaré
  - Haré desaparecer
  lexicon: BDAG
  rationale: El futuro activo de ἀπόλλυμι aquí expresa destrucción o ruina; «destruiré» es directo y conserva la fuerza profética de la cita.
- source_word: σοφίαν
  english_pob_choice: wisdom
  chosen_spanish: sabiduría
  alternatives_spanish:
  - sapiencia
  lexicon: BDAG
  rationale: «Sabiduría» es el equivalente normal y claro para σοφία, y preserva el contraste temático de la carta.
- source_word: τῶν σοφῶν
  english_pob_choice: of the wise
  chosen_spanish: de los sabios
  alternatives_spanish:
  - de los sabios hombres
  - de los prudentes
  lexicon: BDAG
  rationale: «Sabios» reproduce el paralelismo y el juego de palabras con σοφία/σοφοί sin sobreexplicar.
- source_word: σύνεσιν
  english_pob_choice: understanding
  chosen_spanish: entendimiento
  alternatives_spanish:
  - discernimiento
  - inteligencia
  lexicon: BDAG
  rationale: «Entendimiento» comunica bien la capacidad de comprender o discernir y funciona en paralelo con «sabiduría» en español.
- source_word: τῶν συνετῶν
  english_pob_choice: of the intelligent
  chosen_spanish: de los entendidos
  alternatives_spanish:
  - de los inteligentes
  - de los discernidores
  lexicon: BDAG
  rationale: συνετός puede significar discerniente o inteligente; «entendidos» preserva el paralelismo con «sabios» y suena natural en español bíblico contemporáneo.
- source_word: ἀθετήσω
  english_pob_choice: I will set aside
  chosen_spanish: anularé
  alternatives_spanish:
  - rechazaré
  - invalidaré
  - dejaré sin efecto
  lexicon: BDAG
  rationale: ἀθετέω puede significar rechazar, invalidar o dejar sin efecto; «anularé» transmite bien la idea de deshacer o desautorizar decisivamente sin endurecer el estilo.
theological_decisions:
- issue: Intensidad de la cita sobre la acción de Dios respecto de la sabiduría humana
  english_pob_reading: Use straightforward future verbs ('I will destroy' / 'I will set aside') without intensifying beyond the Greek
  chosen_spanish_reading: Usar futuros directos («Destruiré» / «anularé») sin añadir matices interpretativos más fuertes que el griego
  alternative_spanish_readings:
  - «frustraré»
  - «pondré a un lado»
  - «reduciré a nada»
  rationale: La cita apoya el argumento de Pablo sobre el derribo de la sabiduría humana; una traducción sobria conserva el golpe retórico sin importar una lectura doctrinal adicional.
  doctrine_reference: 1 Corintios 1:18-25; Isaías 29:14
translation_notes:
  revision_awareness: Coincide con el pasaje base en el sentido y la estructura; se mantiene el paralelismo de la cita y la fuerza futura de los verbos, sin necesidad de revisiones respecto al audit trail inglés.
  spanish_consistency_notes:
  - Se conservó el paralelismo retórico entre «sabiduría/sabios» y «entendimiento/entendidos».
  - Se prefirió «anularé» como equivalente idiomático de ἀθετήσω, evitando una paráfrasis demasiado explicativa.
  - La partícula causal «Porque» reproduce el enlace discursivo de γάρ con naturalidad en español.
  - La nota al pie se ancla en «entendidos» para reflejar la alternativa semántica de συνετός y de ἀθετέω documentada en el audit trail.
