translation:
  language: es
  text: Pero a los llamados[a], tanto judíos como griegos, el Mesías es el poder de Dios y la sabiduría de Dios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «los que han sido llamados».'
    reason: lexical_alternative
lexical_decisions:
- source_word: κλητοῖς
  english_pob_choice: those who are called
  chosen_spanish: los llamados
  alternatives_spanish:
  - los que son llamados
  - los que han sido llamados
  lexicon: BDAG
  rationale: El adjetivo funciona sustantivamente para designar a un grupo definido por el llamado de Dios. «Los llamados» conserva esa fuerza nominal y suena natural en español; la nota permite la alternativa más explícita si se desea resaltar la pasividad del llamado.
- source_word: Ἰουδαίοις
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judeanos
  lexicon: BDAG
  rationale: En el contraste paulino con «griegos», el sentido etnorreligioso es primario. «Judíos» es la equivalencia más clara y reconocible en español.
- source_word: Ἕλλησιν
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - gentiles
  lexicon: BDAG
  rationale: Pablo nombra explícitamente a los «griegos», y la pareja judíos/griegos preserva mejor el contraste del texto que una generalización interpretativa como «gentiles».
- source_word: Χριστόν
  english_pob_choice: Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Conforme al criterio del proyecto, Χριστός se traduce como título, no como nombre fijo. «El Mesías» conserva el contenido semántico del título y evita perder la referencia mesiánica del término griego.
- source_word: θεοῦ δύναμιν
  english_pob_choice: the power of God
  chosen_spanish: poder de Dios
  alternatives_spanish:
  - el poder de Dios
  - la fuerza de Dios
  lexicon: BDAG
  rationale: El genitivo se vierte de modo natural en español como complemento del nombre. «Poder de Dios» mantiene la relación genitiva y suena más fluido en esta construcción predicativa.
- source_word: θεοῦ σοφίαν
  english_pob_choice: the wisdom of God
  chosen_spanish: sabiduría de Dios
  alternatives_spanish:
  - la sabiduría de Dios
  lexicon: BDAG
  rationale: Se conserva el paralelo con la frase anterior y la fuerza del genitivo. «Sabiduría de Dios» es directo y transparente en español.
- source_word: implicit copula / verbless predicate relation
  english_pob_choice: Messiah is the power of God and the wisdom of God
  chosen_spanish: el Mesías es poder de Dios y sabiduría de Dios
  alternatives_spanish:
  - el Mesías, poder de Dios y sabiduría de Dios
  - para ellos, el Mesías es poder de Dios y sabiduría de Dios
  lexicon: syntax
  rationale: El griego es elíptico; en español hace falta suplir la cópula para expresar con claridad la relación predicativa. Se mantiene la simetría de los dos sustantivos sin añadir explicaciones ajenas al texto.
theological_decisions:
- issue: Traducción de Χριστός como título mesiánico
  english_pob_reading: Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La política del proyecto favorece traducir el título cuando funciona como designación semántica. En este versículo, Χριστόν describe la identidad mesiánica de Jesús, por lo que «el Mesías» comunica mejor ese valor que una transliteración ya lexicalizada.
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres.'
- issue: Conservación del contraste judíos/griegos
  english_pob_reading: both Jews and Greeks
  chosen_spanish_reading: tanto judíos como griegos
  alternative_spanish_readings:
  - judíos y griegos
  rationale: Se conserva el binomio étnico-religioso tal como aparece en Pablo, sin sustituirlo por un término más interpretativo como «gentiles». La partícula «tanto... como...» refuerza el paralelismo.
  doctrine_reference: Uso paulino de la pareja judíos/griegos en 1 Corintios.
translation_notes:
  revision_awareness: El paquete inglés muestra una oscilación editorial entre «Messiah» y «Christ» para Χριστός, con una corrección posterior que restaura «Messiah» conforme a la política doctrinal del proyecto. La versión española sigue esa línea y traduce el título como «el Mesías». También se tuvo en cuenta que el inglés optó por una posesión natural («power of God», «wisdom of God»), mientras que el español permite una construcción igualmente transparente sin forzar calcos.
  spanish_consistency_notes:
  - Se mantiene «Mesías» para Χριστός según la política del proyecto y la lectura titulativa del contexto.
  - «Judíos» y «griegos» conservan la pareja paulina estándar sin ampliar a «gentiles».
  - La frase se formula con cópula explícita para que la relación predicativa quede natural en español.
  - No se introduce «SEÑOR» ni otras sustituciones devocionales que no correspondan al griego de este versículo.
