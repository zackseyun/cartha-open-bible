translation:
  language: es
  text: pero nosotros predicamos al Mesías[a] crucificado, para los judíos una piedra de tropiezo y para los gentiles una necedad[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo».
    reason: alternative_reading
  - marker: b
    text: 'Griego: «naciones»; aquí probablemente significa los gentiles en contraste con los judíos.'
    reason: lexical_alternative
lexical_decisions:
- source_word: κηρύσσομεν
  english_pob_choice: preach
  chosen_spanish: predicamos
  alternatives_spanish:
  - proclamamos
  - anunciamos
  lexicon: BDAG
  rationale: «Predicamos» es el equivalente natural en español para la proclamación pública y apostólica que expresa κηρύσσομεν, y conserva el matiz de anuncio autorizado sin volverlo meramente informativo.
- source_word: Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Se mantiene el valor titular de Χριστός como «Mesías», conforme al criterio del proyecto; en español se añade la preposición «a» por régimen verbal, sin convertirlo en nombre litúrgico fijo.
- source_word: ἐσταυρωμένον
  english_pob_choice: crucified
  chosen_spanish: crucificado
  alternatives_spanish:
  - habiendo sido crucificado
  lexicon: BDAG
  rationale: «Crucificado» comunica de forma directa y sobria el estado/resultante del participio perfecto pasivo, preservando el peso retórico del escándalo de la cruz sin sobrecargar la frase.
- source_word: Ἰουδαίοις
  english_pob_choice: Jews
  chosen_spanish: los judíos
  alternatives_spanish:
  - los judeanos
  lexicon: BDAG
  rationale: En el contraste retórico con ἔθνεσιν, «judíos» es el término español más claro y natural para el grupo étnico-religioso aludido.
- source_word: σκάνδαλον
  english_pob_choice: stumbling block
  chosen_spanish: un tropiezo
  alternatives_spanish:
  - un escándalo
  - una piedra de tropiezo
  lexicon: BDAG
  rationale: «Tropiezo» conserva la metáfora de obstáculo y caída que contiene σκάνδαλον; «escándalo» sería posible, pero en español moderno tiende a desplazar el sentido hacia una simple indignación social.
- source_word: ἔθνεσιν
  english_pob_choice: Gentiles
  chosen_spanish: los gentiles
  alternatives_spanish:
  - las naciones
  lexicon: BDAG
  rationale: Aunque el sentido léxico básico es «naciones», aquí el contraste con «judíos» señala claramente a los gentiles; por eso se conserva la equivalencia funcional en español.
- source_word: μωρίαν
  english_pob_choice: foolishness
  chosen_spanish: una necedad
  alternatives_spanish:
  - una locura
  - una tontería
  lexicon: BDAG
  rationale: «Necedad» mantiene el tono valorativo y paulino de μωρίαν mejor que «foolishness» traducido como una mera idea de error; además deja intacta la carga retórica de desprecio percibido por el mundo.
theological_decisions:
- issue: Χριστός como título mesiánico, no como nombre propio fijo
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El griego presenta Χριστόν en función titulativa dentro de la proclamación apostólica. Traducirlo como «Mesías» conserva el contenido semántico y evita ocultar el valor confesional del término tras una forma ya lexicalizada como nombre.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Χριστός default "Messiah" where title.'
- issue: ἔθνεσιν y el contraste judíos/gentiles
  english_pob_reading: Gentiles
  chosen_spanish_reading: gentiles
  alternative_spanish_readings:
  - naciones
  rationale: Aunque «naciones» refleja el sentido léxico amplio, el contexto antitético con «judíos» hace que «gentiles» exprese con mayor precisión la referencia histórica y retórica de Pablo.
  doctrine_reference: BDAG ἔθνος; Romanos/Gálatas/1 Corintios contrastive usage.
translation_notes:
  revision_awareness: El texto griego presenta una estructura apposicional sin puntuación fuerte entre «crucificado» y los dos complementos dativos. La redacción española sigue esa relación con una coma simple y evita introducir dos puntos u otra división interpretativa. Se preserva además la decisión auditada del inglés de mantener la metáfora de σκάνδαλον y el valor contrastivo de ἔθνεσιν, ajustándolos a un español natural y fiel al registro paulino.
  spanish_consistency_notes:
  - Se usa «Mesías» para Χριστός conforme al estándar del proyecto y se reserva «Cristo» solo como alternativa anotada.
  - Se mantiene «gentiles» para ἔθνεσιν por el contraste explícito con «judíos».
  - Se eligió «necedad» en lugar de «locura» para conservar mejor el matiz evaluativo de μωρίαν.
  - La puntuación sigue la sintaxis griega sin colon explicativo.
  - No se emplea «SEÑOR» ni otras sustituciones no presentes en el versículo.
