lexical_decisions:
- source_word: λέγω δὲ τοῦτο
  english_pob_choice: What I mean is this
  chosen_spanish: Lo que quiero decir es esto
  alternatives_spanish:
  - Esto es lo que digo
  - Quiero decir esto
  lexicon: BDAG
  rationale: Reproduce con naturalidad en español la función aclaratoria de Pablo y conserva el matiz explicativo de la cláusula introductoria.
- source_word: ὅτι
  english_pob_choice: 'is this:'
  chosen_spanish: 'es esto:'
  alternatives_spanish:
  - que
  - 'esto:'
  lexicon: BDAG
  rationale: Se integra en la fórmula introductoria con dos puntos, como marcador de que sigue el contenido de la explicación.
- source_word: ἕκαστος ὑμῶν
  english_pob_choice: each of you
  chosen_spanish: cada uno de ustedes
  alternatives_spanish:
  - cada uno de vosotros
  - todos ustedes
  lexicon: BDAG
  rationale: Expresa con claridad el valor distributivo de ἕκαστος y mantiene un español general, neutral y eclesialmente legible.
- source_word: λέγει
  english_pob_choice: says
  chosen_spanish: dice
  alternatives_spanish:
  - está diciendo
  - afirma
  lexicon: BDAG
  rationale: El presente simple comunica el patrón repetido o característico que Pablo describe sin cargarlo innecesariamente.
- source_word: Ἐγὼ μέν εἰμι Παύλου / Ἐγὼ δὲ Ἀπολλῶ / Ἐγὼ δὲ Κηφᾶ / Ἐγὼ δὲ Χριστοῦ
  english_pob_choice: I belong to Paul ... I belong to Apollos ... I belong to Cephas ... I belong to Messiah
  chosen_spanish: Yo soy de Pablo ... yo soy de Apolos ... yo soy de Cefas ... yo soy de Mesías
  alternatives_spanish:
  - Soy de Pablo
  - Pertenezco a Pablo
  - Yo sigo a Pablo
  lexicon: BDAG
  rationale: La construcción griega con genitivo después de εἰμί expresa afiliación/pertenencia; en español, «soy de» comunica esa pertenencia de manera directa sin forzar una interpretación más técnica. Se conserva también la repetición enfática de «yo».
- source_word: Κηφᾶ
  english_pob_choice: Cephas
  chosen_spanish: Cefas
  alternatives_spanish:
  - Pedro
  lexicon: BDAG
  rationale: Se translitera el nombre propio según la forma griega presente en el texto; no se sustituye por «Pedro» porque aquí Pablo usa Κηφᾶς, no Πέτρος.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se traduce el título con el valor mesiánico que el POB inglés documenta para Χριστός. En español, «Mesías» evita convertir el término en un mero nombre fijo y preserva la decisión teológica de traducir títulos.
theological_decisions:
- issue: Χριστοῦ al final del eslogan de facción
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: 'Se mantiene el valor titular de Χριστός conforme a la política del proyecto: traducir títulos y no ocultar la carga mesiánica del término. «Cristo» queda como alternativa registrada, pero no como texto principal.'
  doctrine_reference: 'DOCTRINE.md: traducir títulos; transliterar nombres; tabla de términos debatidos para Χριστός.'
translation_notes:
  revision_awareness: El dossier inglés atravesó una revisión que primero cambió «Messiah» por «Christ» y luego restituyó «Messiah» conforme a la política doctrinal del proyecto. La versión española sigue esa decisión final y la hace explícita con «Mesías» en el texto principal y «Cristo» en nota alternativa.
  spanish_consistency_notes:
  - Se mantiene la repetición de primera persona singular para reproducir el tono partidista del original.
  - Se usa «de» para la pertenencia/afiliación, no como una traducción mecanicista del inglés «belong to», sino como equivalente natural del genitivo griego.
  - Se conserva «Cefas» y no «Pedro» por fidelidad al nombre griego del versículo.
  - Se usa puntuación española con comillas angulares y dos puntos introduciendo el discurso citado.
