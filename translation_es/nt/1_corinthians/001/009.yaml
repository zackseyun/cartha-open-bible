review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: πιστὸς ὁ θεὸς = «Dios es fiel»; δι’ οὗ ἐκλήθητε = «por quien ustedes fueron llamados»; y mantiene correctamente «Mesías» para Χριστοῦ conforme al criterio del proyecto. Sin embargo, «la comunión de su Hijo» no representa bien la fuerza idiomática de κοινωνίαν τοῦ υἱοῦ αὐτοῦ en este contexto, donde el sentido relacional/participativo es «comunión con su Hijo», como ya reconoce el audit trail inglés. Además, la nota c está anclada en «Hijo» cuando en realidad comenta «Jesús Mesías».'
  spanish_quality_summary: El español es claro y digno, pero «comunión de su Hijo» suena poco natural y puede sugerir posesión o contenido de la comunión, no la relación con el Hijo. «Comunión con su Hijo» es más idiomático y fiel al sentido. También conviene mover la nota [c] a «Mesías», que es donde se explica la decisión léxica. El resto del registro es adecuado y legible para un público eclesial amplio.
  glossary_alignment: 'Hay buena alineación con el glosario del proyecto en «Dios», «Jesús», «Mesías» y «Señor». La principal desviación no es terminológica sino sintáctico-semántica: el genitivo dependiente de κοινωνία debe expresarse en español de forma idiomática como relación «con su Hijo», no literalmente «de su Hijo».'
  issues:
  - severity: high
    issue: «de su Hijo» debe cambiarse a «con su Hijo»
    rationale: Aunque el griego usa genitivo con κοινωνία, en español «comunión de su Hijo» no transmite naturalmente el sentido de participación/relación con la persona del Hijo. El audit trail inglés ya documenta esta necesidad idiomática con «with his Son».
  - severity: medium
    issue: La nota [c] está anclada en el lugar equivocado
    rationale: La nota explica la traducción de Χριστός como «Mesías», por lo que debe ir sobre «Mesías», no sobre «Hijo».
  - severity: low
    issue: La justificación léxica de «de su Hijo» contradice la idiomaticidad del español
    rationale: La explicación actual privilegia una literalidad no natural en español. Debe ajustarse al principio del proyecto de evitar calcos rígidos cuando afecten claridad y fidelidad semántica.
  revised_spanish_text: Dios es fiel[a], por quien ustedes fueron llamados a la comunión[b] con su Hijo, Jesús Mesías[c], nuestro Señor.
