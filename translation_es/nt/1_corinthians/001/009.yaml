translation:
  language: es
  text: Dios es fiel[a], por quien ustedes fueron llamados a la comunión[b] con su Hijo, Jesús Mesías[c], nuestro Señor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio de quien».
    reason: lexical_alternative
  - marker: b
    text: O «participación» o «compartir».
    reason: lexical_alternative
  - marker: c
    text: 'Griego: «Jesús Cristo»; «Mesías» traduce el título Χριστός.'
    reason: alternative_reading
lexical_decisions:
- source_word: πιστὸς
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - fidedigno
  lexicon: BDAG
  rationale: El adjetivo predicativo describe el carácter fiable de Dios; «fiel» es la equivalencia natural en español y conserva el peso teológico de la fidelidad divina.
- source_word: δι’ οὗ
  english_pob_choice: by whom
  chosen_spanish: por quien
  alternatives_spanish:
  - por medio de quien
  - a través de quien
  lexicon: BDAG
  rationale: διά con genitivo puede expresar medio o agencia personal. «Por quien» mantiene la relación causal/agencial sin sonar forzado en español, y deja abierta la matización de mediación.
- source_word: ἐκλήθητε
  english_pob_choice: you were called
  chosen_spanish: fueron llamados
  alternatives_spanish:
  - fueron convocados
  - fueron invitados
  lexicon: BDAG
  rationale: El aoristo pasivo de καλέω es una fórmula paulina estable para el llamamiento eficaz de Dios. «Fueron llamados» conserva el valor léxico y la resonancia paulina.
- source_word: κοινωνίαν
  english_pob_choice: fellowship
  chosen_spanish: comunión
  alternatives_spanish:
  - participación
  - compartir
  - fellowship
  lexicon: BDAG
  rationale: κοινωνία abarca participación compartida y comunión relacional. «Comunión» es una opción amplia y natural en español; no se restringe indebidamente a una sola esfera, aunque admite esa lectura.
- source_word: τοῦ υἱοῦ αὐτοῦ
  english_pob_choice: with his Son
  chosen_spanish: de su Hijo
  alternatives_spanish:
  - con su Hijo
  lexicon: BDAG
  rationale: El genitivo griego depende de κοινωνία, y en español la construcción más directa es «la comunión de su Hijo». Se evita «con» para no forzar una paráfrasis relacional que el griego no exige literalmente.
- source_word: Χριστοῦ
  english_pob_choice: Messiah
  chosen_spanish: Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Se preserva el criterio del proyecto de traducir Χριστός como título. «Mesías» mantiene el valor semántico titulado y evita convertirlo en un nombre fijo sin necesidad.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» es la traducción habitual y reverente de κύριος en contexto cristológico; mantiene la fórmula confesional reconocible en español.
theological_decisions:
- issue: Cómo verter el llamado de Dios sin perder su eficacia paulina.
  english_pob_reading: you were called
  chosen_spanish_reading: fueron llamados
  alternative_spanish_readings:
  - fueron convocados
  - fueron invitados
  rationale: En Pablo, el llamamiento no es mera invitación social sino acto eficaz de Dios. «Fueron llamados» conserva esa fuerza sin añadir explicaciones ajenas al texto.
  doctrine_reference: Romanos 8:30; 1 Corintios 1:1-2 (llamamiento eficaz en Pablo)
- issue: Si Χριστοῦ debe sonar como nombre fijo o como título traducido.
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El audit trail inglés restauró «Messiah» para respetar el valor titular de Χριστός. En español, «Mesías» mantiene ese mismo criterio de título traducido y evita la domesticación litúrgica de «Cristo» como si fuera solo nombre propio.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Cómo entender κοινωνία sin reducirla a un solo matiz.
  english_pob_reading: fellowship
  chosen_spanish_reading: comunión
  alternative_spanish_readings:
  - participación
  - compartir
  rationale: «Comunión» preserva la amplitud relacional y participativa de κοινωνία. No se estrecha a un sentido sacramental exclusivo ni se diluye en una abstracción moderna.
  doctrine_reference: 'BDAG: κοινωνία'
- issue: Cómo reflejar el valor de δι’ οὗ como medio o agencia.
  english_pob_reading: by whom
  chosen_spanish_reading: por quien
  alternative_spanish_readings:
  - por medio de quien
  - a través de quien
  rationale: La preposición puede expresar mediación o agencia personal. «Por quien» es una solución idiomática que conserva la ambigüedad útil del griego sin perder claridad.
  doctrine_reference: 'BDAG: διά con genitivo'
translation_notes:
  revision_awareness: El registro inglés muestra una oscilación entre «Jesus the Messiah», «Jesus Christ» y la restauración final de «Messiah» por fidelidad doctrinal al título Χριστός. La versión española sigue la decisión final y mantiene «Mesías» como traducción del título, con nota explicativa. También se tuvo en cuenta el consenso alto del proceso de revisión y la lectura estable de 1 Corintios 1:9 en el griego SBLGNT.
  spanish_consistency_notes:
  - Se usa «Dios» para θεός sin mayúsculas honoríficas especiales fuera del inicio de oración.
  - Se conserva «Señor» para κύριος en clave cristológica, coherente con el español bíblico y el proyecto.
  - La puntuación y el orden sintáctico buscan naturalidad pública en español sin alejarse del orden informativo del griego.
  - «Comunión» se mantiene sin matiz sacramental explícito; la nota ofrece la alternativa «participación» para preservar la amplitud semántica.
