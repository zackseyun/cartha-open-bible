    reason: alternative_reading
  revision_rationale: Se corrige «de su Hijo» a «con su Hijo» para expresar de manera idiomática y fiel el sentido de κοινωνία en español. También se reubica la nota sobre Χριστός/«Mesías» al término pertinente. No se requieren cambios doctrinales adicionales.
