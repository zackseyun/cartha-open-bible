translation:
  language: es
  text: Pablo[a], apóstol llamado del Mesías Jesús, por la voluntad de Dios, y Sóstenes el hermano.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Cristo Jesús».
    reason: lexical_alternative
lexical_decisions:
- source_word: Παῦλος
  english_pob_choice: Paul
  chosen_spanish: Pablo
  alternatives_spanish:
  - Paulo
  lexicon: uso estándar de nombres propios bíblicos
  rationale: Nombre propio transliterado de forma estándar al español bíblico.
- source_word: κλητὸς
  english_pob_choice: a called
  chosen_spanish: llamado
  alternatives_spanish:
  - llamado a ser
  - llamado para ser
  lexicon: BDAG
  rationale: El adjetivo modifica el estatus apostólico de Pablo; en español, 'llamado' conserva la fuerza participial sin añadir una perífrasis no explicitada por el griego.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - mensajero
  - enviado
  lexicon: BDAG
  rationale: Aquí el término tiene sentido técnico de oficio/autoridad apostólica; 'apóstol' es la equivalencia más precisa y reconocible.
- source_word: Χριστοῦ Ἰησοῦ
  english_pob_choice: Messiah Jesus
  chosen_spanish: Mesías Jesús
  alternatives_spanish:
  - Cristo Jesús
  - Jesucristo
  lexicon: BDAG
  rationale: Χριστός funciona como título mesiánico; por la política doctrinal de la POB se mantiene 'Mesías' para preservar el valor titular, y 'Jesús' traduce el nombre propio Ἰησοῦς.
- source_word: διὰ θελήματος θεοῦ
  english_pob_choice: by the will of God
  chosen_spanish: por la voluntad de Dios
  alternatives_spanish:
  - mediante la voluntad de Dios
  - a causa de la voluntad de Dios
  lexicon: BDAG
  rationale: Con διά + genitivo, la frase expresa medio/causa instrumental en este encabezado epistolar; 'por la voluntad de Dios' suena natural y fiel en español.
- source_word: Σωσθένης
  english_pob_choice: Sosthenes
  chosen_spanish: Sóstenes
  alternatives_spanish:
  - Sostenes
  lexicon: uso estándar de nombres propios bíblicos
  rationale: Nombre propio transliterado al español con acento prosódico gráfico para lectura natural.
- source_word: ὁ ἀδελφὸς
  english_pob_choice: the brother
  chosen_spanish: el hermano
  alternatives_spanish:
  - nuestro hermano
  - un hermano
  lexicon: BDAG
  rationale: El griego presenta artículo definido sin posesivo; se conserva 'el hermano' para reflejar de forma más directa la forma fuente, evitando añadir posesivo no presente en el texto griego.
theological_decisions:
- issue: Renderizar Χριστός como título mesiánico en un saludo paulino
  english_pob_reading: Messiah Jesus
  chosen_spanish_reading: Mesías Jesús
  alternative_spanish_readings:
  - Cristo Jesús
  rationale: La guía doctrinal de la POB favorece 'Mesías' cuando Χριστός funciona como título y no como nombre fijo. En este verso es una designación cristológica titulada, por lo que se conserva la distinción entre el título y el nombre propio.
  doctrine_reference: 'DOCTRINE.md: Χριστός → Mesías cuando es título'
translation_notes:
  revision_awareness: El registro inglés pasó por una oscilación entre 'Messiah Jesus' y 'Christ Jesus' en revisiones automáticas; la decisión final auditada restaura 'Messiah' por la política doctrinal. En español, esto se refleja con 'Mesías' para seguir la misma distinción titular, sin depender de la forma litúrgica fusionada.
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' para Χριστός conforme a la terminología doctrinal del proyecto.
  - Se evitó introducir 'llamado a ser' porque el griego solo requiere el participio 'llamado'.
  - Se conservó 'el hermano' para respetar el artículo definido del griego; no se añadió 'nuestro' por no estar en la fuente.
  - 'Los nombres propios se adaptaron a la ortografía bíblica habitual del español: Pablo, Sóstenes, Jesús.'
