review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: Pablo como apóstol llamado, la frase instrumental «por la voluntad de Dios», y la mención de Sóstenes. También preserva correctamente la decisión doctrinal de traducir Χριστοῦ Ἰησοῦ como «Mesías Jesús», con nota alternativa para «Cristo Jesús». Sin embargo, «apóstol llamado de Mesías Jesús» no expresa con naturalidad ni precisión la relación sintáctica en español; sugiere erróneamente que Pablo fue llamado por el Mesías Jesús, en vez de ser «apóstol llamado» perteneciente/de «Mesías Jesús».'
  spanish_quality_summary: La frase actual suena forzada y algo ambigua en español. La secuencia «apóstol llamado de Mesías Jesús» es poco idiomática y puede malinterpretarse. Además, la coma antes de «el hermano» separa innecesariamente el aposicional. Una redacción más clara y fiel es «Pablo[a], apóstol llamado del Mesías Jesús, por la voluntad de Dios, y Sóstenes el hermano». Aunque «el hermano» es algo rígido, sí refleja la forma griega y la decisión lexical documentada; por eso puede conservarse aquí.
  glossary_alignment: Alinea bien con los términos del proyecto en «Mesías Jesús», «Dios» y «apóstol». No hay uso de «Yahvé» ni otros términos controvertidos en este versículo. El ajuste principal es gramatical/sintáctico en español, no terminológico.
  issues:
  - severity: high
    issue: «apóstol llamado de Mesías Jesús» es sintácticamente ambiguo e impropio en español
    rationale: 'En español, «de Mesías Jesús» puede leerse como complemento de «llamado» (llamado por/de parte de), en lugar de complemento de «apóstol». El genitivo griego Χριστοῦ Ἰησοῦ modifica «ἀπόστολος», por lo que conviene marcarlo con contracción/artículo: «del Mesías Jesús».'
  - severity: medium
    issue: Coma innecesaria en «Sóstenes, el hermano»
    rationale: El griego presenta una aposición simple «Σωσθένης ὁ ἀδελφός» sin pausa requerida. En español, «Sóstenes el hermano» refleja más de cerca la construcción fuente; la coma introduce un inciso no necesario.
  revised_spanish_text: Pablo[a], apóstol llamado del Mesías Jesús, por la voluntad de Dios, y Sóstenes el hermano.
  revised_footnotes:
  - marker: a
    text: O «Cristo Jesús».
    reason: lexical_alternative
  revision_rationale: Se ajusta la sintaxis española para que el complemento «del Mesías Jesús» modifique claramente a «apóstol» y no a «llamado». También se elimina la coma antes de «el hermano» para reflejar mejor la aposición griega. Se conserva «Mesías Jesús» conforme a la política doctrinal y la nota alternativa existente.
