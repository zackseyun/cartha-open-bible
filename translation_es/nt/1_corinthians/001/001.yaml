- from: Pablo[a], apóstol llamado de Mesías Jesús por la voluntad de Dios, y Sóstenes, el hermano.
  to: Pablo[a], apóstol llamado del Mesías Jesús, por la voluntad de Dios, y Sóstenes el hermano.
  rationale: Se ajusta la sintaxis española para que el complemento «del Mesías Jesús» modifique claramente a «apóstol» y no a «llamado». También se elimina la coma antes de «el hermano» para reflejar mejor la aposición griega. Se conserva «Mesías Jesús» conforme a la política doctrinal y la nota alternativa existente.
