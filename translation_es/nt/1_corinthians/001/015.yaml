lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: ἵνα expresa finalidad/resultado; en español, «para que» comunica de forma natural ese valor final sin perder la relación lógica del texto.
- source_word: μή τις
  english_pob_choice: no one
  chosen_spanish: nadie
  alternatives_spanish:
  - ninguna persona
  - no alguien
  lexicon: BDAG
  rationale: La combinación negativa se expresa de manera idiomática y clara con «nadie».
- source_word: εἴπῃ
  english_pob_choice: may say
  chosen_spanish: diga
  alternatives_spanish:
  - pueda decir
  - llegue a decir
  lexicon: BDAG
  rationale: El subjuntivo aoristo tras ἵνα se vierte naturalmente con subjuntivo en español; «diga» preserva el sentido prospectivo sin sobrecargar la frase.
- source_word: εἰς
  english_pob_choice: into
  chosen_spanish: en
  alternatives_spanish:
  - hacia
  - dentro de
  lexicon: BDAG
  rationale: Aunque εἰς puede sugerir movimiento «hacia/into», en español «bautizados en mi nombre» mantiene la relación de identificación de forma fluida y reconoce la alternativa tradicional que el POB inglés dejó en nota.
- source_word: τὸ ἐμὸν ὄνομα
  english_pob_choice: my name
  chosen_spanish: mi nombre
  alternatives_spanish:
  - el nombre mío
  lexicon: BDAG
  rationale: Construcción posesiva directa y natural en español, fiel al griego.
- source_word: ἐβαπτίσθητε
  english_pob_choice: you were baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - fueron sumergidos
  - recibieron el bautismo
  lexicon: BDAG
  rationale: Se conserva la pasiva y el término transparente «bautizados», que corresponde al uso eclesial común y al valor léxico del contexto.
theological_decisions:
- issue: Valor de εἰς τὸ ἐμὸν ὄνομα en contexto bautismal
  english_pob_reading: into my name
  chosen_spanish_reading: en mi nombre
  alternative_spanish_readings:
  - en mi nombre
  - dentro de mi nombre
  rationale: La preposición εἰς puede traducirse de modo más literal como «en/into» según el contexto. En español, «en mi nombre» conserva la lectura relacional e identitaria y permite mantener la tensión interpretativa que el POB inglés señaló con su nota alternativa; «a mi nombre» o una paráfrasis más explicativa resolverían en exceso la frase.
  doctrine_reference: Preservar la tensión textual y la identificación bautismal sin normalizarla según una fórmula litúrgica fija.
translation_notes:
  revision_awareness: Este borrador sigue de cerca el texto griego y el marco auditado del POB inglés. La única decisión interpretativa relevante es εἰς, mantenido como «en» en el texto principal y explicado en nota como alternativa «en mi nombre», para preservar la tensión entre literalidad y fluidez española.
  spanish_consistency_notes:
  - Se usa «bautizados» como forma pasiva transparente y no «sumergidos», para no introducir una precisión denominacional que el contexto no exige.
  - Se mantiene «mi nombre» sin mayúscula, conforme al estilo español normal cuando no se trata del nombre divino revelado sino del posesivo de Jesús en el contexto.
  - La nota recoge la alternativa ya documentada en el POB inglés y evita ampliar indebidamente el rango semántico de εἰς.
