lexical_decisions:
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la fuerza de propósito/resultando de la cláusula anterior, conservando la relación lógica del griego.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - como
  - así como
  lexicon: BDAG
  rationale: Introduce la cita bíblica como correspondencia exacta o conforme a lo escrito; «tal como» suena natural y mantiene el matiz comparativo.
- source_word: γέγραπται
  english_pob_choice: it is written
  chosen_spanish: está escrito
  alternatives_spanish:
  - ha sido escrito
  - se ha escrito
  lexicon: BDAG
  rationale: La fórmula bíblica estándar en español preserva la autoridad permanente de la cita sin sonar artificial.
- source_word: Ὁ καυχώμενος
  english_pob_choice: The one who boasts
  chosen_spanish: El que se gloría
  alternatives_spanish:
  - Quien se gloría
  - El que se jacta
  lexicon: BDAG
  rationale: «Gloriarse» comunica mejor la autoexaltación positiva/negativa del verbo griego en este contexto paulino que «jactarse», y evita una carga excesivamente coloquial.
- source_word: ἐν κυρίῳ
  english_pob_choice: in the Lord
  chosen_spanish: en el Señor
  alternatives_spanish:
  - en Yahvé
  - en el Señor Dios
  lexicon: BDAG
  rationale: En la cita paulina, κύριος funciona como el término cristológico convencional del texto fuente inmediato; en español, «el Señor» conserva la expresión bíblica y la referencia personal del contexto de cita sin forzar una sustitución al nombre divino donde el griego cita literalmente κύριος.
- source_word: καυχάσθω
  english_pob_choice: must boast
  chosen_spanish: gloríese
  alternatives_spanish:
  - debe gloriarse
  - que se gloríe
  lexicon: BDAG
  rationale: El imperativo exhortativo en español se expresa de manera natural con el imperativo reflexivo; mantiene la fuerza normativa sin añadir la modalidad «debe» de forma innecesaria.
theological_decisions:
- issue: How to render the citation’s imperative force in Spanish
  english_pob_reading: must boast
  chosen_spanish_reading: gloríese
  alternative_spanish_readings:
  - debe gloriarse
  - que se gloríe
  rationale: La forma imperativa española transmite la exhortación normativa sin pérdida de intensidad y evita una construcción menos idiomática. No se añade doctrina extra; el mandato dirige toda gloria legítima al Señor.
  doctrine_reference: 'Translation philosophy: readable modern Spanish, faithful to exhortational force'
- issue: How to handle κύριος in the quotation
  english_pob_reading: the Lord
  chosen_spanish_reading: el Señor
  alternative_spanish_readings:
  - Yahvé
  - el Señor Dios
  rationale: Aunque el proyecto distingue Yahvé para YHWH en el texto principal, aquí el griego cita la forma κύριος dentro de una fórmula paulina estable. «El Señor» preserva la cita bíblica y la terminología cristiana del pasaje, sin eliminar la referencia al texto citado.
  doctrine_reference: 'Contested terms: κύριος → Lord / contextual quotation usage'
translation_notes:
  revision_awareness: 'Coincide sustancialmente con el audit trail inglés: cláusula de propósito con ἵνα, correspondencia con καθὼς, fórmula escritural con γέγραπται, y exhortación final que reorienta la gloria hacia el Señor. No se registraron revisiones posteriores en el paquete fuente.'
  spanish_consistency_notes:
  - Se mantiene «Señor» para κύριος en la cita, coherente con el valor formulístico del pasaje y con el contexto paulino.
  - Se usa «gloriarse» de forma consistente para καυχάομαι, evitando alternar con «jactarse» dentro del mismo versículo.
  - La puntuación reproduce la relación de cita directa con comillas y dos puntos, conforme al estilo bíblico en español.
