review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura del griego: ἵνα = «para que», καθὼς γέγραπται = «tal como está escrito», y la cita imperativa está bien conservada. Sin embargo, «se gloría / gloríese» suena más tradicional que claro en español moderno y no sigue tan de cerca la decisión léxica inglesa de «boasts». Además, el inglés POB preserva una alternativa significativa para el participio/imperativo, y conviene mantenerla en una nota en español.'
  spanish_quality_summary: El texto es comprensible y digno, pero «El que se gloría, gloríese» resulta algo acartonado para un registro moderno y ampliamente legible. «El que se jacta debe jactarse en el Señor» comunica con más claridad la idea de jactancia/redirección del orgullo, aunque conviene anotar la alternativa más tradicional «se gloría / gloríese».
  glossary_alignment: 'No hay conflicto con Yahvé, porque la fuente inmediata griega tiene κύριος y la justificación contextual para «el Señor» es aceptable. No hay otros términos del glosario mayor en juego. La mejora principal es léxica y estilística: preferir «jactarse» en este contexto paulino, con nota para «gloriarse».'
  issues:
  - severity: medium
    issue: «se gloría / gloríese» es menos natural y menos transparente que una opción moderna en español.
    rationale: Aunque es tradicional, puede sonar formulaico o eclesiástico para lectores generales. El sentido de καυχάομαι aquí es presumir/jactarse/boast; «jactarse» expresa mejor el contraste paulino de redirigir toda jactancia al Señor.
  - severity: low
    issue: Falta una nota que preserve la alternativa sustantival/imperativa documentada en el inglés POB.
    rationale: El inglés incluye «Whoever boasts, let him boast in the Lord». En español conviene reflejar esa alternativa, especialmente si el texto principal se formula de otra manera.
