revisions:
- from: 'para que, tal como está escrito: «El que se gloría, gloríese en el Señor».'
  to: 'para que[a], tal como está escrito: «El que se jacta debe jactarse en el Señor».[b]'
  rationale: 'Se mantiene la sintaxis y fuerza del griego, pero se ajusta el español para mayor claridad moderna: «jacta / debe jactarse» comunica mejor καυχάομαι que la formulación más arcaizante «se gloría / gloríese». Se conserva en nota la alternativa tradicional, que además refleja la opción alterna registrada en el inglés POB. «El Señor» sigue siendo defendible porque la fuente inmediata es κύριος en una cita paulina.'
