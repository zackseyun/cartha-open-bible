    rationale: La nota explica la alternativa inclusiva de ἀδελφοί, por lo que debe aparecer en el sustantivo o frase correspondiente, no en el verbo.
  - severity: medium
    issue: «Se me ha dado a conocer» es correcto pero poco natural en este contexto.
    rationale: El inglés auditado privilegia una expresión idiomática de reporte recibido. En español moderno y eclesial, «se me ha informado» preserva el pasivo/recepción de información y suena más limpio.
  - severity: low
    issue: La nota [b] sobre «hay» no corresponde bien al punto léxico principal.
    rationale: La variación léxica documentada está en ἔριδες, no en «hay». Si se conserva una nota alternativa, debe anclarse en «pleitos».
