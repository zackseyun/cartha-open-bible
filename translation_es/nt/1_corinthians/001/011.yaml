translation:
  language: es
  text: Porque se me ha informado acerca de ustedes, hermanos míos[a], por los de Cloé, que hay pleitos[b] entre ustedes.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «hermanos y hermanas míos». El griego dice «hermanos» y puede dirigirse a toda la comunidad creyente de manera inclusiva.
    reason: lexical_alternative
  - marker: b
    text: O «discordias» o «contiendas». El griego usa un plural de conflictos interpersonales.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐδηλώθη
  english_pob_choice: it has been reported
  chosen_spanish: se me ha dado a conocer
  alternatives_spanish:
  - se me ha informado
  - se me ha reportado
  - me ha sido hecho saber
  lexicon: BDAG δηλόω
  rationale: El pasivo comunica que la información llegó a Pablo desde fuera. «Se me ha dado a conocer» conserva el valor pasivo y suena natural en español sin perder el matiz de comunicación recibida.
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Porque en efecto
  - Ya que
  lexicon: BDAG γάρ
  rationale: Mantiene la conexión explicativa con lo anterior. «Porque» es la equivalencia más clara y directa en español aquí.
- source_word: περὶ ὑμῶν
  english_pob_choice: about you
  chosen_spanish: acerca de ustedes
  alternatives_spanish:
  - con respecto a ustedes
  - sobre ustedes
  lexicon: BDAG περί
  rationale: «Acerca de» reproduce bien la relación temática de la preposición y resulta natural en español contemporáneo.
- source_word: ἀδελφοί μου
  english_pob_choice: my brothers
  chosen_spanish: hermanos míos
  alternatives_spanish:
  - mis hermanos
  - hermanos y hermanas míos
  lexicon: BDAG ἀδελφός
  rationale: Se conserva el plural masculino del griego como forma marcada del texto. En el contexto de la comunidad creyente puede incluir a toda la iglesia, pero la redacción principal mantiene la forma gramatical de origen; la posible inclusión queda señalada en nota.
- source_word: ὑπὸ τῶν Χλόης
  english_pob_choice: by Chloe’s people
  chosen_spanish: por los de Cloé
  alternatives_spanish:
  - por la gente de Cloé
  - por los de la casa de Cloé
  - por los de Cloe
  lexicon: BDAG ὑπό; Χλόη
  rationale: La expresión griega señala personas asociadas con Cloé. «Los de Cloé» es breve, claro y no fuerza una identificación más específica que la que el texto permite.
- source_word: ἔριδες
  english_pob_choice: quarrels
  chosen_spanish: pleitos
  alternatives_spanish:
  - rencillas
  - disputas
  - contiendas
  lexicon: BDAG ἔρις
  rationale: El plural describe conflictos interpersonales. «Pleitos» comunica bien el sentido de rivalidad o disputa visible en una comunidad, sin ampliar innecesariamente el término.
- source_word: ἐν ὑμῖν εἰσιν
  english_pob_choice: there are ... among you
  chosen_spanish: entre ustedes hay
  alternatives_spanish:
  - hay ... entre ustedes
  - se hallan ... entre ustedes
  - existen ... entre ustedes
  lexicon: BDAG ἐν; εἰμί
  rationale: En español, el orden «hay ... entre ustedes» o su inversión natural da mejor fluidez que un calco directo. Se eligió una estructura idiomática que conserva la relación locativa/comunitaria.
theological_decisions:
- issue: Valor inclusivo de ἀδελφοί en una dirección a la iglesia
  english_pob_reading: my brothers; the Greek may address the whole believing community inclusively
  chosen_spanish_reading: hermanos míos
  alternative_spanish_readings:
  - hermanos y hermanas míos
  - hermanos y hermanas
  rationale: Se mantiene la forma masculina plural del griego en el texto principal, siguiendo la elección de POB de respetar el marcador morfológico. La posible inclusión de toda la comunidad se preserva mediante la nota, sin borrar la tensión lingüística.
  doctrine_reference: Translation philosophy §4 (gender-accurate over gender-neutral)
- issue: Relación entre 'pleitos' y el referente de ἔριδες
  english_pob_reading: quarrels
  chosen_spanish_reading: pleitos
  alternative_spanish_readings:
  - divisiones
  - rencillas
  - contiendas
  rationale: No se optó por «divisiones» como lectura principal porque en el contexto griego ἔριδες señala disputas o querellas, no necesariamente una fractura estructural ya consumada. «Pleitos» mantiene la fuerza conflictiva sin sobreactuar el alcance teológico.
  doctrine_reference: BDAG ἔρις; contexto inmediato de 1 Corintios 1
translation_notes:
  revision_awareness: La versión española sigue el estado revisado más reciente del testimonio inglés, sin cambios sustanciales pendientes, y conserva las decisiones léxicas y de tono ya validadas en el audit trail.
  spanish_consistency_notes:
  - Se usa «Cloé» con tilde, conforme al uso habitual en español para el nombre propio.
  - Se preserva «hermanos» como forma gramatical del original y se explicita su posible alcance inclusivo en nota.
  - Se evita «SEÑOR» u այլ sustituciones innecesarias porque el versículo no contiene el tetragrámaton ni κύριος.
  - La puntuación reproduce una sola oración causal con la subordinada final introducida por «que».
