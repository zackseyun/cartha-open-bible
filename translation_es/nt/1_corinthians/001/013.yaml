translation:
  language: es
  text: ¿Se ha dividido el Mesías? ¿Acaso Pablo fue crucificado por ustedes, o fueron bautizados para el nombre de Pablo?[a][b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «¿Ha sido dividido el Cristo?»
    reason: lexical_alternative
  - marker: b
    text: O «¿o fueron bautizados en el nombre de Pablo?»
    reason: lexical_alternative
lexical_decisions:
- source_word: μεμέρισται
  english_pob_choice: has been divided
  chosen_spanish: se ha dividido
  alternatives_spanish:
  - ha sido dividido
  - está dividido
  lexicon: BDAG
  rationale: El perfecto pasivo comunica un estado resultante; en español, «se ha dividido» transmite bien la idea de una división ya consumada sin añadir explicaciones. Mantiene el reproche paulino contra la facción.
- source_word: Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: DOCTRINE.md contested terms
  rationale: El sustantivo con artículo funciona aquí como título, no como simple nombre propio. Se conserva «Mesías» conforme a la pauta del proyecto para Χριστός en uso titular, manteniendo visible la carga semántica original.
- source_word: ἐσταυρώθη
  english_pob_choice: was crucified
  chosen_spanish: fue crucificado
  alternatives_spanish:
  - estuvo crucificado
  lexicon: BDAG
  rationale: Es la equivalencia directa y natural del aoristo pasivo, sin expansión interpretativa.
- source_word: ὑπὲρ ὑμῶν
  english_pob_choice: for you
  chosen_spanish: por ustedes
  alternatives_spanish:
  - en favor de ustedes
  - a favor de ustedes
  lexicon: BDAG
  rationale: «Por ustedes» conserva el sentido relacional y la posible fuerza representativa o sustitutiva sin fijarla excesivamente. Se prefiere «ustedes» por claridad y registro neutral latinoamericano.
- source_word: εἰς τὸ ὄνομα
  english_pob_choice: into the name
  chosen_spanish: en el nombre
  alternatives_spanish:
  - dentro del nombre
  - hacia el nombre
  lexicon: BDAG
  rationale: Aunque εἰς puede ser más literalmente «hacia/into», en contexto bautismal el español «en el nombre» es la formulación idiomática más clara y fiel a la referencia de pertenencia y asociación. La alternativa literal suena forzada en español.
- source_word: ἐβαπτίσθητε
  english_pob_choice: were you baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - fueron sumergidos en el bautismo
  - recibieron el bautismo
  lexicon: BDAG
  rationale: Se mantiene el pasivo y el verbo técnico estándar. «Bautizados» es la forma transparente y eclesialmente inteligible en español.
theological_decisions:
- issue: Renderización de Χριστός como título mesiánico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto griego usa ὁ Χριστός con artículo, favoreciendo el sentido titular. Traducir «Mesías» preserva el valor semántico de «ungido» y evita que se diluya en un mero nombre propio. Se retiene la alternativa tradicional como lectura posible en notas si se requiere para comparación interconfesional.
  doctrine_reference: 'DOCTRINE.md Contested terms: Χριστός → Messiah (where title; Christ where name-like)'
translation_notes:
  revision_awareness: El expediente inglés muestra una oscilación revisada entre «the Messiah» y «Christ», con una corrección regresiva que restablece «Messiah» según la política doctrinal. La versión española sigue esa decisión restaurada y la hace explícita con nota alternativa a «Cristo» para preservar la tensión lexical documentada. También se observa que el inglés adoptó «into the name» como opción más precisa; en español se opta por la forma idiomática «en el nombre» por naturalidad sin perder el sentido bautismal.
  spanish_consistency_notes:
  - Se mantiene el tratamiento reverente/neutral de Pablo sin añadir artículo innecesario.
  - Se usa puntuación interrogativa española completa y el orden retórico del griego se conserva en la medida en que el español lo permite.
  - «Mesías» se reserva para el valor titular de Χριστός en esta línea; si otras perícopas del libro documentan un uso cristológico fijado como nombre, deberá seguirse la evidencia local de cada caso.
  - «Bautizados en el nombre de...» es una fórmula estable en español eclesial y no introduce una lectura doctrinal nueva más allá de la asociación/pertenencia indicada por el griego.
