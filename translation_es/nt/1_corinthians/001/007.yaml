    reason: lexical_alternative
  - marker: c
    text: Griego «Jesús Cristo»; alternativamente, «Jesús el Mesías» si se hace más explícito el título.
    reason: alternative_reading
  revision_rationale: Se corrige la designación final a «Jesucristo» para reflejar la decisión documentada en el audit trail de que Χριστοῦ aquí funciona como forma fija nombre-like, a la vez que se mantiene en nota la alternativa más explícita «Jesús el Mesías». Se conserva el resto del versículo, que ya representaba bien el griego y sonaba natural en español.
