translation:
  language: es
  text: de modo que no carezcan de ningún don[a], mientras esperan con anhelo la revelación de nuestro Señor Jesucristo[b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «ningún don espiritual» o «ningún don de gracia».
    reason: lexical_alternative
  - marker: b
    text: O, «la aparición de nuestro Señor Jesucristo».
    reason: lexical_alternative
  - marker: c
    text: Griego «Jesús Cristo»; alternativamente, «Jesús el Mesías» si se hace más explícito el título.
    reason: alternative_reading
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: so that
  chosen_spanish: de modo que
  alternatives_spanish:
  - así que
  - de manera que
  lexicon: BDAG
  rationale: Marca el resultado de lo anterior en un español natural y formal, preservando la relación consecutiva sin forzar una calca.
- source_word: ὑστερεῖσθαι
  english_pob_choice: do not lack
  chosen_spanish: no carezcan de
  alternatives_spanish:
  - no les falte
  - no estén faltos de
  lexicon: BDAG
  rationale: Conserva la idea de ausencia de carencia en un registro bíblico claro; en plural y con subjuntivo por la construcción consecutiva española.
- source_word: ἐν μηδενὶ χαρίσματι
  english_pob_choice: any gift
  chosen_spanish: ningún don
  alternatives_spanish:
  - ningún don espiritual
  - ningún don de gracia
  lexicon: BDAG
  rationale: '"Χάρισμα" puede ser "don" en español sin perder su procedencia de gracia; se evita añadir "espiritual" como interpretación no explícita en el griego, pero se reconoce la alternativa en nota.'
- source_word: ἀπεκδεχομένους
  english_pob_choice: as you eagerly await
  chosen_spanish: mientras esperan con anhelo
  alternatives_spanish:
  - mientras aguardan con anhelo
  - mientras esperan expectantes
  lexicon: BDAG
  rationale: La forma participial expresa espera continua y expectante; "con anhelo" comunica el matiz intensivo de expectativa sin exagerar el verbo.
- source_word: ἀποκάλυψιν
  english_pob_choice: revelation
  chosen_spanish: la revelación
  alternatives_spanish:
  - la manifestación
  - la aparición
  lexicon: BDAG
  rationale: '"Revelación" reproduce de manera directa el sustantivo griego y mantiene el lenguaje escatológico paulino. "Aparición" queda como alternativa contextual, pero no se impone en el texto principal.'
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Soberano
  - Dueño
  lexicon: BDAG
  rationale: En el contexto del NT, κύριος se vierte de forma estable como "Señor"; en español es la forma litúrgica y semántica más reconocible.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  - Jesús el Mesías
  lexicon: BDAG
  rationale: Se sigue la pauta del proyecto de traducir Χριστός como "Mesías" cuando el término aparece como título; aquí la secuencia admite lectura titular y el español lo hace explícito sin oscurecer el nombre propio.
theological_decisions:
- issue: Cómo verter Χριστοῦ en esta doxología/espera escatológica
  english_pob_reading: Jesus Christ
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  - Jesús el Mesías
  rationale: Aunque el audit trail inglés conservó "Christ" por la lectura más fija/nombre-forma, la directriz española del proyecto favorece "Mesías" para Χριστός salvo excepciones justificadas. En este versículo, el título puede quedar transparente y no hay motivo textual para ocultarlo bajo el préstamo "Cristo".
  doctrine_reference: 'DOCTRINE.md: traducir títulos; Χριστός se rinde normalmente como "Mesías" en español'
- issue: Valor de χάρισμα en el contexto corintio
  english_pob_reading: any gift
  chosen_spanish_reading: ningún don
  alternative_spanish_readings:
  - ningún don espiritual
  - ningún don de gracia
  rationale: El griego no añade aquí el adjetivo "espiritual"; el contexto de 1 Corintios sí puede sugerirlo, pero el texto no lo exige. "Don" mantiene la amplitud y deja visible la relación con la gracia sin sobreinterpretar.
  doctrine_reference: 'DOCTRINE.md: evitar explicitar rasgos no presentes en el texto salvo necesidad contextual clara'
translation_notes:
  revision_awareness: El contexto inglés pasó por una oscilación entre «Christ» y «Messiah» en la frase final; la corrección más reciente del auditor restauró «Messiah» por coherencia con la política doctrinal. En esta versión española se adopta de manera consistente «Mesías», y se mantiene la nota alternativa de «aparición» para ἀποκάλυψιν, reflejando el margen semántico documentado.
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος conforme al uso neotestamentario establecido.
  - Se evita «Cristo» en favor de «Mesías» para Χριστός, en línea con la terminología española del proyecto.
  - «Don» se prefiere a «regalo» por el registro paulino y la cercanía semántica de χάρισμα.
  - Se conserva el matiz progresivo de la espera con «mientras esperan con anhelo».
