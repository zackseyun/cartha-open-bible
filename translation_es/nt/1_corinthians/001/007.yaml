- from: de modo que no carezcan de ningún don[a], mientras esperan con anhelo la revelación de nuestro Señor Jesús Mesías[b][c].
  to: de modo que no carezcan de ningún don[a], mientras esperan con anhelo la revelación de nuestro Señor Jesucristo[b][c].
  rationale: Se corrige la designación final a «Jesucristo» para reflejar la decisión documentada en el audit trail de que Χριστοῦ aquí funciona como forma fija nombre-like, a la vez que se mantiene en nota la alternativa más explícita «Jesús el Mesías». Se conserva el resto del versículo, que ya representaba bien el griego y sonaba natural en español.
