translation:
  language: es
  text: 'No se hagan idólatras, como algunos de ellos; tal como está escrito: «El pueblo se sentó a comer y a beber, y se levantó para jugar[a]».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «para entregarse al desenfreno»; la redacción citada proviene de Éxodo 32:6, donde «jugar» se asocia con la fiesta idolátrica de Israel alrededor del becerro de oro.
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: Do not
  chosen_spanish: No se hagan
  alternatives_spanish:
  - No sean
  - Y no se hagan
  lexicon: BDAG
  rationale: El griego continúa una prohibición. En español, «No se hagan» conserva el valor exhortativo del imperativo y el matiz de llegar a ser, que corresponde a γίνεσθε.
- source_word: εἰδωλολάτραι
  english_pob_choice: idolaters
  chosen_spanish: idolátras
  alternatives_spanish:
  - adoradores de ídolos
  - idólatras
  lexicon: BDAG
  rationale: «Idólatras» es el equivalente natural y compacto en español para εἰδωλολάτραι, manteniendo el sustantivo personal y la fuerza moral del término sin expansión innecesaria.
- source_word: γίνεσθε
  english_pob_choice: become
  chosen_spanish: se hagan
  alternatives_spanish:
  - lleguen a ser
  - se vuelvan
  lexicon: BDAG
  rationale: El imperativo presente de γίνομαι expresa entrada o llegada a una condición. «Se hagan» preserva ese movimiento mejor que un simple «sean».
- source_word: καθώς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: Aquí introduce comparación con el ejemplo de algunos de Israel. «Como» es natural y fiel a la relación comparativa del griego.
- source_word: τινες αὐτῶν
  english_pob_choice: some of them were
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - algunos entre ellos
  - ciertos de ellos
  lexicon: BDAG
  rationale: La frase refiere a un subconjunto de Israel. En español puede omitirse el verbo «eran» por fluidez, porque la idea comparativa ya queda clara en el contexto.
- source_word: ὥσπερ γέγραπται
  english_pob_choice: just as it is written
  chosen_spanish: tal como está escrito
  alternatives_spanish:
  - como está escrito
  - justamente como está escrito
  lexicon: BDAG
  rationale: La fórmula de cita se expresa de modo idiomático en español con «tal como está escrito», que mantiene el peso de la referencia escrita y el tono solemne de la cita.
- source_word: Ἐκάθισεν ὁ λαὸς
  english_pob_choice: The people sat down
  chosen_spanish: El pueblo se sentó
  alternatives_spanish:
  - La gente se sentó
  - El pueblo se reclinó
  lexicon: BDAG
  rationale: ὁ λαός designa al pueblo colectivo. «El pueblo se sentó» reproduce de manera directa la escena citada de Éxodo 32:6.
- source_word: φαγεῖν καὶ πεῖν
  english_pob_choice: to eat and drink
  chosen_spanish: a comer y a beber
  alternatives_spanish:
  - para comer y beber
  - para comer y para beber
  lexicon: BDAG
  rationale: Las infinitivas griegas se traducen con una coordinación natural en español. Se conserva la simetría verbal del original.
- source_word: ἀνέστησαν
  english_pob_choice: rose up
  chosen_spanish: se levantó
  alternatives_spanish:
  - se alzó
  - se pusieron en pie
  lexicon: BDAG
  rationale: Aunque el griego es plural, en la cita española el sujeto colectivo «el pueblo» permite la concordancia singular natural en una construcción bíblica fluida. «Se levantó» mantiene el movimiento narrativo.
- source_word: παίζειν
  english_pob_choice: to play
  chosen_spanish: para jugar
  alternatives_spanish:
  - para festejar
  - para entregarse a la juerga
  lexicon: BDAG
  rationale: Se conserva el verbo básico «jugar» para respetar la forma léxica de la cita de Éxodo 32:6. En este contexto, el término puede connotar diversión festiva con trasfondo idolátrico, pero el texto principal mantiene la forma más cercana al griego.
theological_decisions:
- issue: Cómo rendir el eco de Éxodo 32:6 en παίζειν sin borrar su posible carga idolátrica
  english_pob_reading: Retain the lexical rendering 'to play' in the main text while preserving the likely sense of revelry in a footnote.
  chosen_spanish_reading: Conservar «para jugar» en el texto principal y explicitar en nota que puede significar también «para festejar / para entregarse a la juerga» según el contexto de idolatría.
  alternative_spanish_readings:
  - para festejar
  - para entregarse a la juerga
  - para regocijarse
  rationale: El texto cita el relato del becerro de oro; por eso no conviene neutralizar el verbo hasta convertirlo de entrada en una interpretación. Mantener «jugar» preserva la huella intertextual, mientras la nota deja visible la tensión semántica y su posible matiz de desenfreno idolátrico.
  doctrine_reference: 'Translation philosophy §3: conservar la tensión teológica y textual en lugar de resolverla prematuramente'
translation_notes:
  revision_awareness: 'Se siguió el audit trail en inglés: se conservó el valor imperativo de μηδὲ γίνεσθε, la cita formulaica de ὥσπερ γέγραπται, y el léxico literal de παίζειν con la tensión contextual expuesta en nota. No hubo revisiones posteriores en el registro inglés.'
  spanish_consistency_notes:
  - Se usó «idólatras» en el texto principal por ser el equivalente natural de εἰδωλολάτραι en español.
  - Se mantuvo la cita bíblica con registro digno y fluido, evitando una transliteración rígida del griego.
  - La concordancia singular en «el pueblo se sentó... y se levantó» busca naturalidad en español dentro de una cita colectiva, sin alterar el contenido del original.
