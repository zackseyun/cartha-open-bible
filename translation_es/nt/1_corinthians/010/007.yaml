    rationale: El marcador [a] aparece junto a «idolátras», pero el contenido de la nota trata principalmente del verbo de Éxodo 32:6 («jugar» / «revelarse en fiesta»), no del sustantivo «idólatras». Esto rompe la trazabilidad entre texto y nota.
  - severity: medium
    issue: La nota mezcla una falsa alternativa léxica para «idólatras» con la explicación de «jugar»
    rationale: «O “idólatras”» no aporta una alternativa real, y además distrae del punto documentado en la auditoría inglesa, que es la posible connotación de παίζειν. La nota debe enfocarse en ese verbo.
