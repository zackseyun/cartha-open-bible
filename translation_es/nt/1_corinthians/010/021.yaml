translation:
  language: es
  text: No pueden beber la copa del Señor y la copa de los demonios; no pueden tener parte[a] en la mesa del Señor y en la mesa de los demonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participar en» la mesa del Señor y en la mesa de los demonios.
    reason: lexical_alternative
lexical_decisions:
- source_word: οὐ δύνασθε
  english_pob_choice: you cannot
  chosen_spanish: no pueden
  alternatives_spanish:
  - no son capaces de
  - no les es posible
  lexicon: BDAG
  rationale: En segunda persona plural, «no pueden» comunica la imposibilidad/categórica negación de forma natural en español y conserva el valor absoluto de la construcción griega sin añadir matiz explicativo.
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - vaso
  - cáliz
  lexicon: BDAG
  rationale: «Copa» es el equivalente más natural y transparente en español para ποτήριον; mantiene además la resonancia ritual/participativa del contexto sin imponer una terminología eclesiástica más estrecha.
- source_word: κυρίου
  english_pob_choice: the Lord
  chosen_spanish: del Señor
  alternatives_spanish:
  - del Señor Jesús
  - del Amo
  lexicon: BDAG
  rationale: La traducción habitual y fiel de κύριος aquí es «Señor». El genitivo se expresa naturalmente como «de/ del Señor», preservando el paralelismo con «de los demonios».
- source_word: πίνειν
  english_pob_choice: drink
  chosen_spanish: beber
  alternatives_spanish:
  - tomar
  lexicon: BDAG
  rationale: «Beber» es la equivalencia directa y idiomática de πίνειν; en español suena natural junto a «copa» y conserva la referencia literal sin amplificación.
- source_word: δαιμονίων
  english_pob_choice: demons
  chosen_spanish: demonios
  alternatives_spanish:
  - espíritus malignos
  lexicon: BDAG
  rationale: «Demonios» preserva la fuerza personal y espiritual del término griego y coincide con la decisión auditable del POB en inglés. «Espíritus malignos» sería más interpretativo.
- source_word: τραπέζης
  english_pob_choice: table
  chosen_spanish: mesa
  alternatives_spanish:
  - banquete
  - comida
  lexicon: BDAG
  rationale: «Mesa» es el equivalente directo y mantiene la imagen cultual/comunitaria. En español, como en griego, la mesa puede implicar la comida compartida sin explicitar más de lo que el texto dice.
- source_word: μετέχειν
  english_pob_choice: partake of
  chosen_spanish: participar de
  alternatives_spanish:
  - tomar parte en
  - participar en
  lexicon: BDAG
  rationale: La POB en inglés optó finalmente por «partake of» para reflejar con mayor cercanía el verbo. En español, «participar de» conserva bien la noción de compartir/ser partícipe de una mesa, suena natural en registro bíblico moderno y evita el tono más genérico de «participar en».
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  lexicon: BDAG
  rationale: Se mantiene la conjunción simple para conservar el paralelismo retórico de las dos prohibiciones y de los dos ámbitos contrapuestos.
theological_decisions:
- issue: Incompatibilidad categórica entre la mesa del Señor y la mesa de los demonios
  english_pob_reading: A categorical incompatibility of participation in the Lord's table with participation in demonic worship.
  chosen_spanish_reading: Una incompatibilidad categórica entre participar de la mesa del Señor y participar de la mesa de los demonios.
  alternative_spanish_readings:
  - Una simple advertencia moral o pastoral
  - Una mera desaconsejación retórica
  rationale: Las dos cláusulas con οὐ δύνασθε expresan una imposibilidad real y no solo una preferencia prudencial. La traducción conserva ese tono absoluto con «no pueden» y mantiene la tensión teológica sin resolverla o suavizarla.
  doctrine_reference: 1 Corintios 10:14–22; preservar la tensión teológica del texto paulino sobre participación y comunión
translation_notes:
  revision_awareness: La redacción sigue la revisión inglesa más reciente, que prefirió una equivalencia más cercana de μετέχειν con «partake of». En español se refleja con «participar de», que conserva la misma cercanía semántica y un registro bíblico sobrio. También se mantiene el paralelismo doble de las prohibiciones, sin añadir explicaciones que no estén en el texto fuente.
  spanish_consistency_notes:
  - Se evita «SEÑOR» en mayúsculas como sustituto de Yahvé, porque aquí κύριος traduce el título «Señor» en contexto cristológico/paulino.
  - Se conserva «demonios» para δαιμονίων por coherencia con la decisión auditada en inglés y para no diluir el referente espiritual.
  - «Mesa» se mantiene literal para respetar la imagen participativa del texto, sin convertirla en explicación sacramental o cultual más amplia.
  - La negación se formula con «no pueden» para reflejar la imposibilidad expresada por οὐ δύνασθε en ambas cláusulas.
