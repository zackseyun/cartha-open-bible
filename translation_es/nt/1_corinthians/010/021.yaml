  to: No pueden beber la copa del Señor y la copa de los demonios; no pueden tener parte[a] en la mesa del Señor y en la mesa de los demonios.
  rationale: Se elimina una nota espuria sobre «copa», se corrige la nota alternativa de μετέχειν y se mejora el texto principal con «tener parte en», que expresa de manera más natural en español la participación real implicada por μετέχειν, manteniendo el paralelismo y la incompatibilidad categórica del griego.
