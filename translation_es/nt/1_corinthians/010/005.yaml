translation:
  language: es
  text: No obstante[a], Dios no se complació con la mayoría de ellos, porque quedaron tendidos en el desierto.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fueron abatidos» o «fueron derribados» en el desierto.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’
  english_pob_choice: Nevertheless
  chosen_spanish: No obstante
  alternatives_spanish:
  - Pero
  - Sin embargo
  lexicon: BDAG
  rationale: La partícula adversativa introduce un contraste fuerte con los privilegios mencionados antes. «No obstante» conserva ese giro contrastivo con un tono natural en español bíblico contemporáneo.
- source_word: οὐκ ἐν τοῖς πλείοσιν αὐτῶν
  english_pob_choice: with most of them
  chosen_spanish: de la mayoría de ellos
  alternatives_spanish:
  - en la mayoría de ellos
  - con la mayoría de ellos
  lexicon: BDAG
  rationale: La construcción griega es idiomática y el sentido no es locativo en español. «De la mayoría de ellos» conserva la referencia cuantitativa y permite completar el sentido con el verbo de complacencia de manera natural.
- source_word: ηὐδόκησεν
  english_pob_choice: was not pleased
  chosen_spanish: no se agradó
  alternatives_spanish:
  - no estuvo complacido
  - no se deleitó
  - no les aprobó
  lexicon: BDAG
  rationale: El verbo εὐδοκέω aquí expresa complacencia o agrado. «No se agradó» mantiene el matiz de disposición favorable sin sonar rígido; evita una paráfrasis más interpretativa como «no aprobó».
- source_word: ὁ θεός
  english_pob_choice: God
  chosen_spanish: Dios
  alternatives_spanish:
  - el Dios
  lexicon: BDAG
  rationale: Sujeto nominativo directo y término teológicamente inequívoco. En español, «Dios» es la forma más natural y fiel.
- source_word: κατεστρώθησαν
  english_pob_choice: were struck down
  chosen_spanish: fueron derribados
  alternatives_spanish:
  - fueron abatidos
  - cayeron muertos
  - fueron abatidos y tendidos
  lexicon: BDAG
  rationale: El pasivo indica que sufrieron una caída o muerte bajo juicio. «Fueron derribados» conserva la fuerza del golpe/caída y sigue de cerca el rango semántico que el audit trail inglés captó con «were struck down», sin añadir detalles no explicitados por el texto.
- source_word: ἐν τῇ ἐρήμῳ
  english_pob_choice: in the wilderness
  chosen_spanish: en el desierto
  alternatives_spanish:
  - en el desierto solitario
  - en la soledad del desierto
  lexicon: BDAG
  rationale: En el contexto del éxodo, ἔρημος remite al escenario del desierto/wilderness. «Desierto» es claro en español y mantiene la referencia histórica; no es necesario expandirlo a «desierto solitario».
theological_decisions:
- issue: Carácter del juicio implícito en κατεστρώθησαν
  english_pob_reading: A reference to God's judgment resulting in the Israelites being struck down during the wilderness wanderings.
  chosen_spanish_reading: Una referencia al juicio de Dios que resultó en que los israelitas fueran derribados en el desierto.
  alternative_spanish_readings:
  - Una imagen más neutral de que quedaron tendidos o esparcidos en el desierto.
  - Una formulación menos explícita sobre juicio divino.
  rationale: El contexto de 1 Corintios 10 usa el ejemplo de Israel como advertencia. «Fueron derribados» preserva la idea de castigo/jucio sin agregar elementos narrativos externos al versículo.
  doctrine_reference: 1 Corintios 10:1–11; juicio divino en la historia de Israel como advertencia para la iglesia.
translation_notes:
  revision_awareness: El pasaje coincide sustancialmente con el audit trail inglés más reciente, que mantiene «Nevertheless» para el contraste, «was not pleased» para εὐδοκέω y «were struck down» para κατεστρώθησαν. La presente versión ajusta el español para naturalidad y fidelidad, sin introducir cambios textuales adicionales.
  spanish_consistency_notes:
  - Se mantiene «Dios» sin expansión ni sustitución por una forma reverencial velada.
  - «No obstante» conserva el adversativo fuerte del griego inicial.
  - «Desierto» se usa de manera consistente con el trasfondo del éxodo y con la resonancia bíblica de ἔρημος.
  - La nota de pie de página se ancla únicamente al segmento verbal «fueron derribados» para reflejar la alternativa léxica documentada.
