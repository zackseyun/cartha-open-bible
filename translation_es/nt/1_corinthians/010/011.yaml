translation:
  language: es
  text: Estas cosas sucedieron a ellos como ejemplos[a], pero fueron escritas para nuestra instrucción[b], a quienes han llegado los fines de los siglos[c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como tipos» o «tipológicamente»; Pablo presenta estos acontecimientos como patrones con significado instructivo para creyentes posteriores.
    reason: lexical_alternative
  - marker: b
    text: O «para nuestra amonestación» o «para nuestra advertencia»; el griego incluye tanto instrucción correctiva como advertencia.
    reason: lexical_alternative
  - marker: c
    text: O «el fin de los siglos ha llegado»; el griego es plural, «los fines de los siglos», lo cual preserva el lenguaje salvífico-histórico de Pablo.
    reason: alternative_reading
lexical_decisions:
- source_word: τυπικῶς
  english_pob_choice: as examples
  chosen_spanish: como ejemplos
  alternatives_spanish:
  - como tipos
  - tipológicamente
  lexicon: BDAG
  rationale: τυπικῶς indica que los acontecimientos funcionaron como patrones o ejemplos para otros. 'Como ejemplos' transmite con claridad esa función formativa sin volver el texto innecesariamente técnico.
- source_word: συνέβαινεν
  english_pob_choice: happened
  chosen_spanish: sucedieron
  alternatives_spanish:
  - acontecieron
  - pasaron
  lexicon: BDAG
  rationale: El imperfecto expresa la ocurrencia de esos hechos en el pasado. 'Sucedieron' es natural en español y conserva el sentido narrativo sin añadir matices ajenos.
- source_word: ἐκείνοις
  english_pob_choice: to them
  chosen_spanish: a ellos
  alternatives_spanish:
  - para ellos
  - a aquellas personas
  lexicon: BDAG
  rationale: El dativo se refiere a la generación del desierto mencionada antes. 'A ellos' es la forma más directa y clara en español.
- source_word: ἐγράφη
  english_pob_choice: they were written
  chosen_spanish: fueron escritas
  alternatives_spanish:
  - se escribieron
  - fueron redactadas
  lexicon: BDAG
  rationale: Aunque el griego está en singular pasivo, el referente son estas cosas/hechos, por lo que el plural español resulta natural y sigue la decisión auditada del POB inglés.
- source_word: πρὸς νουθεσίαν
  english_pob_choice: for our instruction
  chosen_spanish: para nuestra amonestación
  alternatives_spanish:
  - para nuestra instrucción
  - para nuestra advertencia
  lexicon: BDAG
  rationale: νουθεσία combina instrucción correctiva y advertencia. 'Amonestación' preserva mejor esa tensión que 'instrucción', aunque sigue siendo legible en español.
- source_word: εἰς οὓς
  english_pob_choice: on whom
  chosen_spanish: sobre quienes
  alternatives_spanish:
  - para quienes
  - a quienes
  lexicon: BDAG
  rationale: La preposición con valor de llegada o recaída es más fuerte que un simple destinatario. 'Sobre quienes' refleja mejor la idea de que la realidad escatológica ha alcanzado a esos creyentes.
- source_word: τὰ τέλη τῶν αἰώνων
  english_pob_choice: the ends of the ages
  chosen_spanish: los fines de los siglos
  alternatives_spanish:
  - el fin de los siglos
  - los fines de las eras
  lexicon: BDAG
  rationale: Se conserva el plural de τέλη y αἰώνων para no suavizar la formulación paulina. 'Los fines de los siglos' reproduce ese plural de manera más formal y auditable que una singularización.
- source_word: κατήντηκεν
  english_pob_choice: have come
  chosen_spanish: han llegado
  alternatives_spanish:
  - han venido
  - han arribado
  lexicon: BDAG
  rationale: El perfecto indica una llegada consumada con relevancia presente. 'Han llegado' expresa bien esa culminación sin forzar una imagen extraña en español.
theological_decisions:
- issue: Preservación del plural escatológico τὰ τέλη τῶν αἰώνων
  english_pob_reading: the ends of the ages have come
  chosen_spanish_reading: los fines de los siglos han llegado
  alternative_spanish_readings:
  - el fin de los siglos ha llegado
  - la consumación de los siglos ha llegado
  rationale: Se mantiene el plural para conservar la expresión salvífico-histórica de Pablo y no resolverla prematuramente en un singular más fluido. Esto respeta la tensión ya/not yet señalada en el audit trail.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: El borrador sigue el pasaje sin cambios respecto del último repaso auditado; se conservan las decisiones lexicográficas y la tensión escatológica del texto griego. Se ajustó el español para que suene publicable sin perder el plural ni el valor correctivo de νουθεσία.
  spanish_consistency_notes:
  - Se usa 'ejemplos' para τυπικῶς, en línea con la elección auditada del POB inglés.
  - '''Amonestación'' conserva el tono correctivo de νουθεσία mejor que una mera ''instrucción''.'
  - Se mantiene el plural en 'los fines de los siglos' para respetar la formulación griega y la lectura teológica documentada.
  - La frase final se construye con 'han llegado' para reflejar el perfecto de κατήντηκεν con fuerza de presente.
