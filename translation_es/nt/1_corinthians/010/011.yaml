    reason: alternative_reading
  revision_rationale: Se revisa el texto principal para alinearlo mejor con la decisión léxica auditada del POB y con el español natural. «Para nuestra instrucción» conserva bien νουθεσία y deja en nota los matices de amonestación/advertencia. «A quienes han llegado» evita el calco poco idiomático «sobre quienes han llegado» sin perder la idea de que la consumación escatológica ha alcanzado a los creyentes. Se mantiene «los fines de los siglos» para preservar el plural teológico del griego.
