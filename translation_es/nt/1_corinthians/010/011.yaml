revisions:
- from: Estas cosas sucedieron a ellos como ejemplos[a], pero fueron escritas para nuestra amonestación[b], sobre quienes han llegado los fines de los siglos[c].
  to: Estas cosas sucedieron a ellos como ejemplos[a], pero fueron escritas para nuestra instrucción[b], a quienes han llegado los fines de los siglos[c].
  rationale: Se revisa el texto principal para alinearlo mejor con la decisión léxica auditada del POB y con el español natural. «Para nuestra instrucción» conserva bien νουθεσία y deja en nota los matices de amonestación/advertencia. «A quienes han llegado» evita el calco poco idiomático «sobre quienes han llegado» sin perder la idea de que la consumación escatológica ha alcanzado a los creyentes. Se mantiene «los fines de los siglos» para preservar el plural teológico del griego.
  reviewer_model: gpt-5.4
