translation:
  language: es
  text: Así como yo también trato de agradar a todos en todo[a], no buscando mi propio provecho[b], sino el de los muchos, para que sean salvos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a todos en todas las cosas». El griego dice más literalmente «a todos en todo», expresando una amplia acomodación para el bien de otros.
    reason: lexical_alternative
  - marker: b
    text: O «mi propia ventaja ... la ventaja de los muchos».
    reason: lexical_alternative
lexical_decisions:
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: Así como
  alternatives_spanish:
  - como
  - tal como
  lexicon: BDAG
  rationale: La comparación introduce un paralelismo con el contexto anterior; «así como» conserva la relación comparativa de manera natural en español.
- source_word: κἀγὼ
  english_pob_choice: I also
  chosen_spanish: yo también
  alternatives_spanish:
  - también yo
  - yo asimismo
  lexicon: BDAG
  rationale: La crasis tiene valor aditivo; «yo también» mantiene la autoejemplaridad de Pablo sin sobrecargar la sintaxis.
- source_word: πάντα πᾶσιν
  english_pob_choice: everyone in everything
  chosen_spanish: a todos en todo
  alternatives_spanish:
  - en todo a todos
  - todo para todos
  lexicon: BDAG
  rationale: La secuencia griega es amplia y algo idiomática; «a todos en todo» conserva la amplitud de alcance y evita importar la formulación de 1 Co 9:22.
- source_word: ἀρέσκω
  english_pob_choice: please
  chosen_spanish: agrado
  alternatives_spanish:
  - complo
  - trato de agradar
  lexicon: BDAG
  rationale: «Agradar» reproduce el verbo de forma natural en español y mantiene el valor relacional del griego; el participio siguiente evita leerlo como simple complacencia humana.
- source_word: μὴ ζητῶν
  english_pob_choice: not seeking
  chosen_spanish: no buscando
  alternatives_spanish:
  - no procurando
  - no tratando de buscar
  lexicon: BDAG
  rationale: El participio presente expresa modo o intención concomitante; «no buscando» es una correspondencia directa y fluida.
- source_word: τὸ ἐμαυτοῦ σύμφορον
  english_pob_choice: my own advantage
  chosen_spanish: mi propio provecho
  alternatives_spanish:
  - mi propia ventaja
  - mi propio beneficio
  lexicon: BDAG
  rationale: σύμφορον denota lo conveniente, beneficioso o ventajoso; «provecho» es un equivalente idiomático que conserva la idea de ganancia personal sin rigidizar el contraste.
- source_word: ἀλλὰ τὸ τῶν πολλῶν
  english_pob_choice: but that of the many
  chosen_spanish: sino el de los muchos
  alternatives_spanish:
  - sino el provecho de muchos
  - sino el de la mayoría
  lexicon: BDAG
  rationale: Se conserva la expresión elíptica del griego; «los muchos» mantiene el matiz cuantitativo del original y el paralelismo con «mi propio provecho».
- source_word: ἵνα σωθῶσιν
  english_pob_choice: so that they may be saved
  chosen_spanish: para que sean salvos
  alternatives_spanish:
  - a fin de que sean salvos
  - para que sean rescatados
  lexicon: BDAG
  rationale: En 1 Corintios, σῴζω conserva con frecuencia sentido salvífico; «sean salvos» mantiene el pasivo y el peso teológico sin añadir explicaciones no presentes en el texto.
theological_decisions:
- issue: Sentido de ἀρέσκω en relación con la acomodación pastoral
  english_pob_reading: accommodating others for their good rather than people-pleasing compromise
  chosen_spanish_reading: agradar a todos como acomodación para su bien, no como búsqueda de aprobación humana
  alternative_spanish_readings:
  - complacer a todos
  - buscar agradar a la gente
  rationale: El complemento participial «no buscando mi propio provecho» gobierna el sentido del verbo. Por eso se mantiene «agradar» sin cargarlo de connotación servil o de complacencia moralmente dudosa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Alcance de σωθῶσιν
  english_pob_reading: they may be saved in its ordinary Pauline salvific sense
  chosen_spanish_reading: sean salvos en sentido salvífico ordinario
  alternative_spanish_readings:
  - sean ayudados
  - sean preservados
  rationale: El uso paulino de σῴζω favorece la lectura de salvación, no solo de beneficio temporal. El español «sean salvos» preserva el pasivo y la fuerza teológica del aoristo subjuntivo.
  doctrine_reference: Affirmations; Translation philosophy §3
translation_notes:
  revision_awareness: No se aplicaron revisiones al borrador base; el chequeo reciente indicó alto acuerdo y solo observaciones menores, sin cambios necesarios. Se mantuvo la lectura salvífica de σωθῶσιν y la amplitud idiomática de πάντα πᾶσιν.
  spanish_consistency_notes:
  - Se prefirió «Yahvé» solo cuando el texto lo exigiera; este versículo no contiene el nombre divino.
  - Se evitó «Cristo» porque el versículo no lo contiene.
  - Se mantuvo un registro bíblico claro y contemporáneo, sin recurrir a formulaciones eclesiásticas arcaizantes.
  - «Los muchos» conserva la elipsis del griego y el contraste con «mi propio provecho».
