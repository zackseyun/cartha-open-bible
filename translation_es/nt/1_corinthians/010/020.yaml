translation:
  language: es
  text: No, más bien, lo que sacrifican, lo sacrifican a demonios y no a Dios; y no quiero que ustedes lleguen a ser partícipes[a] con los demonios.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «participantes con los demonios» o «copartícipes con los demonios».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀλλ’ ὅτι
  english_pob_choice: No, but
  chosen_spanish: No, sino que
  alternatives_spanish:
  - Pero que
  - Más bien, que
  lexicon: BDAG
  rationale: 'La fuerza es correctiva y adversativa: Pablo corrige la inferencia del versículo anterior. En español, «No, sino que» reproduce con naturalidad ese giro, más claramente que un simple «pero».'
- source_word: ἃ θύουσιν
  english_pob_choice: what they sacrifice
  chosen_spanish: lo que sacrifican
  alternatives_spanish:
  - las cosas que sacrifican
  - lo que están sacrificando
  lexicon: BDAG
  rationale: El relativo neutro plural ἃ funciona de manera general sobre las ofrendas sacrificiales. «Lo que sacrifican» es natural en español y conserva el sentido sin añadir especificaciones.
- source_word: θύουσιν
  english_pob_choice: they sacrifice
  chosen_spanish: sacrifican
  alternatives_spanish:
  - ofrecen en sacrificio
  - están sacrificando
  lexicon: BDAG
  rationale: En contexto cultual, θύω significa sacrificar. «Sacrifican» preserva el acto ritual de forma directa y fiel.
- source_word: δαιμονίοις
  english_pob_choice: to demons
  chosen_spanish: a demonios
  alternatives_spanish:
  - a seres demoníacos
  lexicon: BDAG
  rationale: δαιμόνιον en el NT designa demonios, no deidades menores neutrales. «A demonios» mantiene el sentido teológico y léxico del original.
- source_word: καὶ οὐ θεῷ
  english_pob_choice: and not to God
  chosen_spanish: y no a Dios
  alternatives_spanish:
  - y no al Dios verdadero
  lexicon: BDAG
  rationale: Aunque θεῷ carece de artículo, el contraste en el contexto es con el Dios único y verdadero. «Dios» comunica correctamente esa oposición sin sobrecargar el texto.
- source_word: οὐ θέλω δὲ
  english_pob_choice: and I do not want
  chosen_spanish: y no quiero
  alternatives_spanish:
  - pero no quiero
  - y no deseo
  lexicon: BDAG
  rationale: «Y no quiero» conserva la continuidad del discurso y el valor de δέ como avance leve del razonamiento.
- source_word: κοινωνοὺς
  english_pob_choice: sharers
  chosen_spanish: partícipes
  alternatives_spanish:
  - participantes
  - compañeros
  - socios
  lexicon: BDAG
  rationale: κοινωνός expresa participación real en algo. «Partícipes» conserva esa idea de compartir/participar con suficiente solemnidad en español bíblico actual, sin convertirlo en lenguaje eclesiástico fijo.
- source_word: τῶν δαιμονίων
  english_pob_choice: with demons
  chosen_spanish: con los demonios
  alternatives_spanish:
  - en comunión con los demonios
  - entre los demonios
  lexicon: BDAG
  rationale: El genitivo tras κοινωνοὺς se expresa idiomáticamente como asociación compartida. «Con los demonios» transmite la relación participativa sin forzar una construcción más interpretativa.
- source_word: γίνεσθαι
  english_pob_choice: to become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - se hagan
  - se conviertan
  lexicon: BDAG
  rationale: γίνομαι señala entrar en un estado. «Lleguen a ser» conserva el matiz de proceso y advertencia, con buen español de registro bíblico.
theological_decisions:
- issue: Naturaleza del sacrificio pagano
  english_pob_reading: Paul affirms that pagan sacrifices are directed to demons, not to God.
  chosen_spanish_reading: Pablo afirma que los sacrificios paganos están dirigidos a demonios y no a Dios.
  alternative_spanish_readings:
  - Pablo solo está hablando de una significación social de los banquetes idolátricos
  - Pablo usa «demonios» en sentido meramente metafórico
  rationale: La construcción explícita «a demonios y no a Dios» debe mantenerse sin atenuación. El español conserva la afirmación teológica directa del versículo.
  doctrine_reference: 1 Co 10:20; filosofía de traducción POB §1, §3
- issue: Fuerza de κοινωνοὺς τῶν δαιμονίων
  english_pob_reading: participatory association/fellowship with demons
  chosen_spanish_reading: participación real o comunión con los demonios, sin reducirla a mera cercanía social
  alternative_spanish_readings:
  - mera asociación social con idólatras
  - lealtad cultual total a los demonios
  rationale: El contexto de κοινωνία en los versículos cercanos implica participación efectiva. «Partícipes con los demonios» conserva la gravedad sin imponer una lectura más fuerte de la que el griego exige.
  doctrine_reference: 1 Co 10:16-21; filosofía de traducción POB §3
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el audit trail inglés de la POB, con acuerdo alto y sin cambios de revisión necesarios en la pasada más reciente.
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεῷ en contraste con «demonios», conforme al uso POB y al contexto monoteísta.
  - Se traduce θύω con «sacrifican» para conservar el sentido cultual.
  - Se evita «SEÑOR» porque aquí el contraste explícito es con Dios, no con un sustituto reverencial del nombre divino.
  - «Partícipes» preserva la carga participativa de κοινωνός; la nota ofrece alternativas semánticas equivalentes.
