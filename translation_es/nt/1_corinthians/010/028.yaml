  source_alignment_summary: 'El borrador español refleja bien la estructura del griego: condición hipotética, identificación de la comida, prohibición de comer, y la razón doble relacionada con el informante y la conciencia. Sin embargo, la frase «carne ofrecida en sacrificio a un ídolo» introduce «ídolo» en el texto principal, aunque ἱερόθυτον en sí significa carne/ofrenda sacrificial y el propio rastro léxico inglés reconoce que «to an idol» es interpretativo. Esa expansión puede conservarse mejor en nota, no en el texto principal.'
  spanish_quality_summary: El español es claro y natural, pero «por consideración a la conciencia» suena algo pesado por repetición y menos idiomático que «por causa de la conciencia» o «por motivo de conciencia». También conviene mantener una nota léxica para la alternativa contextual de ἱερόθυτον, ya que el inglés la preserva y el español pierde ese matiz si no la incluye.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Conciencia» está bien. No aparecen términos sensibles como Yahvé, Mesías o esclavo. La principal cuestión es no sobreinterpretar ἱερόθυτον con «a un ídolo» en el cuerpo del texto cuando el término griego no lo dice explícitamente.
  issues:
  - severity: medium
    issue: Sobreinterpretación de ἱερόθυτον en el texto principal
    rationale: El griego se refiere a algo ofrecido en sacrificio, especialmente carne sacrificial. «A un ídolo» proviene del contexto amplio, no de la palabra misma. Dado el principio de trabajar primero desde la fuente, conviene usar una formulación más directa y dejar la alternativa contextual en nota.
  - severity: low
    issue: Falta la nota léxica equivalente a la nota inglesa sobre ἱερόθυτον
    rationale: 'El English POB conserva una alternativa importante: «This is sacrificial meat». En español, una nota puede preservar «carne ofrecida a un ídolo» como lectura contextual sin cargar el texto principal.'
  - severity: low
    issue: «Por consideración a la conciencia» es menos idiomático
    rationale: Aunque comprensible, la repetición de «por consideración a» suena forzada en español. «Por causa de la conciencia» mantiene bien la elipsis y resulta más natural.
