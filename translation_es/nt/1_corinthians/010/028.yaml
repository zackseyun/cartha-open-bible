revisions:
- from: 'Pero si alguien les dice: «Esto es carne ofrecida en sacrificio a un ídolo», no la coman, por consideración al que se lo informó y por consideración a la conciencia[a].'
  to: 'Pero si alguien les dice[a]: «Esto es carne de sacrificio[b]», no la coman[c], por consideración al que se lo informó y por causa de la conciencia[d].'
  rationale: Se ajusta ἱερόθυτον a una formulación española más cercana al griego («carne de sacrificio») y se traslada la lectura contextual «ofrecida a un ídolo» a nota, evitando sobreinterpretación en el texto principal. También se mejora la naturalidad de la última frase con «por causa de la conciencia» y se preservan las aclaraciones útiles mediante notas con anclajes correctos.
