translation:
  language: es
  text: 'Pero si alguien les dice[a]: «Esto es carne de sacrificio[b]», no la coman[c], por consideración al que se lo informó y por causa de la conciencia[d].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Esto es carne ofrecida en sacrificio». El adjetivo griego se refiere a algo ofrecido como sacrificio.'
    reason: lexical_alternative
  - marker: b
    text: 'O, según el contexto: «Esto es carne ofrecida a un ídolo».'
    reason: lexical_alternative
  - marker: c
    text: Es decir, no coman esa carne.
    reason: clarification
  - marker: d
    text: Es decir, la conciencia de la otra persona, no la propia; véase el versículo siguiente.
    reason: cross_reference
lexical_decisions:
- source_word: ἐὰν δέ τις ὑμῖν εἴπῃ
  english_pob_choice: But if someone says to you
  chosen_spanish: Pero si alguien les dice
  alternatives_spanish:
  - Pero si cualquiera les dice
  - Pero si alguien les dijera
  lexicon: BDAG
  rationale: La construcción condicional con ἐάν + subjuntivo introduce un caso hipotético; 'si alguien' conserva la indefinición natural de τις y el contraste de δέ con 'Pero'.
- source_word: Τοῦτο ἱερόθυτόν ἐστιν
  english_pob_choice: This is meat offered to an idol
  chosen_spanish: Esto es carne ofrecida en sacrificio a un ídolo
  alternatives_spanish:
  - Esto es carne sacrificial
  - Esto es algo ofrecido en sacrificio
  - Esto es carne de sacrificio
  lexicon: BDAG
  rationale: ἱερόθυτος describe algo ofrecido en sacrificio; en este contexto, la referencia es a carne asociada con un sacrificio cultual. 'A un ídolo' explicita el marco contextual del pasaje y sigue la decisión inglesa revisada, sin convertir el adjetivo en una paráfrasis más libre.
- source_word: μὴ ἐσθίετε
  english_pob_choice: do not eat it
  chosen_spanish: no la coman
  alternatives_spanish:
  - no coman de ello
  - no lo coman
  lexicon: BDAG
  rationale: El imperativo negativo expresa prohibición. En español, 'la' concuerda con 'carne' y evita una referencia neutra poco natural; el objeto implícito del griego se hace explícito por claridad idiomática.
- source_word: δι’ ἐκεῖνον τὸν μηνύσαντα
  english_pob_choice: for the sake of the one who informed you
  chosen_spanish: por consideración al que se lo informó
  alternatives_spanish:
  - por causa del que se lo dijo
  - por el bien del que se lo informó
  - por respeto al que se lo comunicó
  lexicon: BDAG
  rationale: διά con acusativo expresa aquí motivo o consideración. 'Por consideración a' conserva ese matiz relacional mejor que una causalidad más dura; 'informó' mantiene el sentido de μηνύω sin hacerlo más solemne de lo que exige el contexto.
- source_word: καὶ τὴν συνείδησιν
  english_pob_choice: and for conscience’ sake
  chosen_spanish: y por consideración a la conciencia[a]
  alternatives_spanish:
  - y por causa de la conciencia
  - y por la conciencia
  - y por respeto a la conciencia
  lexicon: BDAG
  rationale: συνείδησις se traduce por 'conciencia'. La elipsis griega permite en español una repetición de la misma construcción ('por consideración a') para mantener el paralelo con la frase anterior y hacer audible la fuerza ética del mandato.
theological_decisions:
- issue: A qué conciencia se refiere τὴν συνείδησιν
  english_pob_reading: The conscience in view is the other person's, not the eater's own conscience.
  chosen_spanish_reading: La conciencia en vista es la del otro, no la propia del que come.
  alternative_spanish_readings:
  - La conciencia del que come
  - Una referencia general a la conciencia sin especificar de quién
  rationale: El versículo siguiente aclara explícitamente que no se trata de la conciencia propia sino de la del otro. Por eso el texto principal permanece breve, pero la formulación española puede sugerir esa dirección mediante el contexto inmediato y la nota.
  doctrine_reference: Principio POB de preservar la tensión hasta que el contexto la aclare; la explicación pertenece al verso siguiente.
translation_notes:
  revision_awareness: Se siguió la revisión más reciente del audit trail inglés, que precisó ἱερόθυτόν como carne ofrecida en sacrificio a un ídolo, manteniendo el tono formal y la claridad idiomática en español.
  spanish_consistency_notes:
  - Se conserva 'conciencia' para συνείδησις, conforme al uso POB de mantener el término técnico y dejar la precisión contextual al versículo siguiente.
  - '''Ídolo'' se incluye por el contexto del pasaje y por la decisión inglesa revisada; no se sustituye el valor sacrificial de ἱερόθυτόν.'
  - Se usa 'consideración' para reflejar el matiz de διά con acusativo como motivo relacional, sin convertirlo en mera causa mecánica.
