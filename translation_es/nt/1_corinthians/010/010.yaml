translation:
  language: es
  text: Y no murmuren[a], tal como algunos de ellos murmuraron y fueron destruidos por el destructor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, «se quejen». El verbo griego γογγύζω puede expresar la queja descontenta o el murmullo de resentimiento.
    reason: alternative_reading
  - marker: b
    text: O, «por el ángel destructor». El griego dice «el destructor», lo que puede aludir al agente destructor de los juicios de Yahvé en el desierto.
    reason: alternative_reading
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: And do not
  chosen_spanish: Y no
  alternatives_spanish:
  - Ni
  - Y ni
  lexicon: BDAG
  rationale: En una serie de advertencias, μηδέ enlaza esta prohibición con las anteriores. En español, «Y no» conserva ese enlace y suena natural; «Ni» podría sonar más abrupto o depender demasiado del contexto previo.
- source_word: γογγύζετε
  english_pob_choice: grumble
  chosen_spanish: se quejen
  alternatives_spanish:
  - murmuren
  - se quejen
  lexicon: BDAG
  rationale: γογγύζω expresa descontento y queja hostil o resentida. «Se quejen» comunica bien esa idea en español actual; «murmuren» es más tradicional, pero menos claro para lectores modernos.
- source_word: καθάπερ
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: La comparación ejemplar funciona con «como» en español y mantiene el valor de advertencia sin forzar una calca. «Tal como» también sería posible, pero suena un poco más enfático de lo necesario.
- source_word: τινὲς αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - algunos entre ellos
  - algunos de entre ellos
  lexicon: BDAG
  rationale: La expresión partitiva se rinde de forma directa y natural con «algunos de ellos», preservando el referente colectivo a Israel.
- source_word: ἐγόγγυσαν
  english_pob_choice: grumbled
  chosen_spanish: se quejaron
  alternatives_spanish:
  - murmuraron
  - refunfuñaron
  lexicon: BDAG
  rationale: Se mantiene la misma raíz conceptual que en γογγύζετε. «Se quejaron» comunica el mismo acto de protesta descontenta en español; «refunfuñaron» es posible, pero menos sobrio.
- source_word: ἀπώλοντο
  english_pob_choice: were destroyed
  chosen_spanish: fueron destruidos
  alternatives_spanish:
  - perecieron
  - murieron
  lexicon: BDAG
  rationale: El contexto presenta una destrucción causada por un agente externo. «Fueron destruidos» conserva esa fuerza causal; «perecieron» sería posible, pero menos explícito respecto del agente.
- source_word: ὑπὸ τοῦ ὀλοθρευτοῦ
  english_pob_choice: by the destroyer
  chosen_spanish: por el destructor
  alternatives_spanish:
  - por el ángel destructor
  - por el destructor, es decir, el ángel que destruye
  lexicon: BDAG
  rationale: El griego dice literalmente «el destructor», y la traducción principal preserva ese título sin resolverlo interpretativamente. «Ángel destructor» queda como posibilidad explicativa, pero no debe desplazar la forma más directa del texto.
theological_decisions:
- issue: Identidad de ὁ ὀλοθρευτής
  english_pob_reading: the destroyer
  chosen_spanish_reading: el destructor
  alternative_spanish_readings:
  - el ángel destructor
  rationale: El texto nombra al agente sólo con su función/título. Se mantiene «el destructor» en el texto principal para no precisar más de lo que dice el griego y para conservar la tensión exegética documentada en el POB inglés. La lectura «ángel destructor» puede darse como explicación, pero no como sustituto del original.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: La versión inglesa revisada eliminó una coma antes de «and were destroyed» por fluidez; en español se refleja con una sola coordinación continua («y fueron destruidos») sin coma innecesaria, manteniendo el paralelismo del verso.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como nombre divino cuando corresponda en notas, conforme a la terminología POB; aquí no aparece en el texto principal porque el versículo no lo nombra explícitamente.
  - Se eligió «destructor» para ὀλοθρευτής siguiendo el valor titular del griego, evitando sustituirlo directamente por «ángel» en el cuerpo del texto.
  - El registro busca ser sobrio y bíblico en español moderno, evitando tanto el arcaísmo rígido como la paráfrasis libre.
