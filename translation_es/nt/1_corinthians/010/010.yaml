  to: Y no murmuren[a], tal como algunos de ellos murmuraron y fueron destruidos por el destructor[b].
  rationale: Se ajusta γογγύζω a «murmurar» para conservar mejor la resonancia bíblica e intertextual del descontento rebelde de Israel en el desierto; «se quejen» pasa a nota como alternativa más coloquial. También se afina καθάπερ con «tal como», que refleja mejor la comparación ejemplar sin perder naturalidad. Se conserva «el destructor» en el texto principal conforme a la decisión teológica auditada.
