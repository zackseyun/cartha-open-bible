translation:
  language: es
  text: No ofendan ni a judíos, ni a griegos, ni a la iglesia de Dios[a][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sin dar ofensa' o 'inofensivos'.
    reason: lexical_alternative
  - marker: b
    text: Aquí 'griegos' probablemente se refiere en sentido amplio a los no judíos en el contexto de Pablo; el texto griego dice literalmente 'griegos'.
    reason: cultural_note
lexical_decisions:
- source_word: ἀπρόσκοποι
  english_pob_choice: without causing offense
  chosen_spanish: No den ocasión de tropiezo
  alternatives_spanish:
  - Sean sin ofensa
  - No sean de tropiezo
  - Sean inofensivos
  lexicon: BDAG
  rationale: La idea es estar libres de causar tropiezo u ofensa. En español, 'dar ocasión de tropiezo' comunica bien el valor relacional y moral del término sin volverlo una abstracción poco natural.
- source_word: γίνεσθε
  english_pob_choice: Be
  chosen_spanish: den
  alternatives_spanish:
  - sean
  - lleguen a ser
  lexicon: BDAG
  rationale: El imperativo exhorta a un estado continuo; en español, 'no den' con sujeto implícito plural funciona de manera natural y preserva el tono exhortativo.
- source_word: Ἰουδαίοις
  english_pob_choice: Jews
  chosen_spanish: judíos
  alternatives_spanish:
  - judíos y judías
  - pueblo judío
  - judeanos
  lexicon: BDAG
  rationale: Aquí se refiere al grupo étnico-religioso judío como tal. 'Judíos' es claro, fiel y el equivalente estándar en español.
- source_word: Ἕλλησιν
  english_pob_choice: Greeks
  chosen_spanish: griegos
  alternatives_spanish:
  - gentiles
  - no judíos
  - griegos/no judíos
  lexicon: BDAG
  rationale: Se conserva el término literal 'griegos', como en el griego, sin generalizarlo en el texto principal. Eso mantiene la distinción explícita del versículo; la ampliación contextual queda para nota.
- source_word: ἐκκλησίᾳ τοῦ θεοῦ
  english_pob_choice: the church of God
  chosen_spanish: la iglesia de Dios
  alternatives_spanish:
  - la asamblea de Dios
  - la congregación de Dios
  - la iglesia perteneciente a Dios
  lexicon: BDAG
  rationale: '''Iglesia'' es el equivalente establecido para ἐκκλησία en Pablo. Se conserva el genitivo simple ''de Dios'' para no recastizar la expresión y mantener la formulación tradicional y precisa.'
theological_decisions:
- issue: Relación entre 'griegos' y 'gentiles'
  english_pob_reading: '''Greeks'' here likely refers broadly to non-Jews in Paul''''s setting; the Greek text specifically says ''Greeks.'''
  chosen_spanish_reading: Se mantiene 'griegos' en el texto, con nota que aclara que probablemente abarca ampliamente a los no judíos en este contexto.
  alternative_spanish_readings:
  - gentiles
  - no judíos
  rationale: El texto griego nombra 'griegos', y la traducción debe preservar esa categoría. La posible referencia amplia a los no judíos es una inferencia contextual válida, pero no debe sustituir el término explícito del original.
  doctrine_reference: Prioridad del texto original; preservar categorías sociales sin resolverlas por expansión interpretativa.
- issue: Tono ético de ἀπρόσκοποι γίνεσθε
  english_pob_reading: Give no offense
  chosen_spanish_reading: No den ocasión de tropiezo
  alternative_spanish_readings:
  - Sean sin ofensa
  - No causen ofensa
  - Sean inofensivos
  rationale: La exhortación no solo evita una ofensa emocional, sino un tropiezo ético-relacional. 'Ocasión de tropiezo' conserva mejor esa tensión bíblica que un simple 'ofensa'.
  doctrine_reference: Mantener la fuerza moral del texto sin suavizarla ni moralizarla excesivamente.
translation_notes:
  revision_awareness: La redacción sigue el último ajuste del audit trail, que prefirió una exhortación más idiomática para ἀπρόσκοποι ... γίνεσθε. Conservo los tres grupos explícitos y un registro formal, evitando traducir mecánicamente desde el inglés cuando el español pide una construcción exhortativa más natural.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, y 'iglesia' para ἐκκλησία, en línea con la terminología POB.
  - Se mantiene la distinción entre 'judíos' y 'griegos' sin convertir automáticamente 'griegos' en 'gentiles' en el texto principal.
  - La frase 'dar ocasión de tropiezo' preserva la imagen moral de πρόσκομμα/ἀπρόσκοπος sin introducir un sentido doctrinal ajeno.
