translation:
  language: es
  text: 'Consideren a Israel según la carne[a]: ¿no son los que comen los sacrificios participantes del altar[b][c]?'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «a Israel físico» o «a Israel por descendencia natural».
    reason: lexical_alternative
  - marker: b
    text: O «partícipes del altar» o «participantes con el altar».
    reason: lexical_alternative
  - marker: c
    text: O «participantes en el altar».
    reason: previous_rendering
lexical_decisions:
- source_word: βλέπετε
  english_pob_choice: Consider
  chosen_spanish: Consideren
  alternatives_spanish:
  - Miren
  - Observen
  lexicon: BDAG
  rationale: El imperativo plural aquí llama a una atención reflexiva dentro del argumento paulino; «Consideren» conserva ese matiz mejor que un simple llamado visual.
- source_word: τὸν Ἰσραὴλ κατὰ σάρκα
  english_pob_choice: Israel according to the flesh
  chosen_spanish: a Israel según la carne
  alternatives_spanish:
  - a Israel físico
  - a Israel por descendencia natural
  lexicon: BDAG
  rationale: Mantiene la expresión paulina y el valor de σάρξ como referencia étnica/natural, sin convertirlo en una paráfrasis interpretativa.
- source_word: οὐχ ... εἰσίν;
  english_pob_choice: are not ... ?
  chosen_spanish: ¿no son ...?
  alternatives_spanish:
  - ¿acaso no son ...?
  - ¿no están ...?
  lexicon: BDAG
  rationale: La pregunta retórica con οὐχ espera una respuesta afirmativa; en español, la forma negativa interrogativa reproduce bien ese efecto.
- source_word: οἱ ἐσθίοντες
  english_pob_choice: those who eat
  chosen_spanish: los que comen
  alternatives_spanish:
  - los que están comiendo
  - los que participan al comer
  lexicon: BDAG
  rationale: El participio sustantivado se vierte de manera natural como una relativa; «comen» conserva el acto concreto de comer.
- source_word: τὰς θυσίας
  english_pob_choice: the sacrifices
  chosen_spanish: los sacrificios
  alternatives_spanish:
  - las ofrendas sacrificadas
  - los sacrificios ofrecidos
  lexicon: BDAG
  rationale: Es la correspondencia directa y clara de θυσία en este contexto cultual.
- source_word: κοινωνοὶ
  english_pob_choice: participants
  chosen_spanish: participantes
  alternatives_spanish:
  - partícipes
  - socios
  lexicon: BDAG
  rationale: «Participantes» expresa la idea de compartir real y efectivamente en algo, sin perder el peso cultual del argumento.
- source_word: τοῦ θυσιαστηρίου
  english_pob_choice: in the altar
  chosen_spanish: del altar
  alternatives_spanish:
  - con el altar
  - en relación con el altar
  lexicon: BDAG
  rationale: En español, «participantes del altar» resulta más natural que un calco como «en el altar»; la relación genitiva se entiende como participación vinculada al altar y a su esfera sacrificial.
theological_decisions:
- issue: Sentido de «según la carne»
  english_pob_reading: A reference to ethnic/natural Israel in contrast to a more spiritual or typological category, without making a broader doctrinal claim beyond this context.
  chosen_spanish_reading: Referencia a Israel étnico/natural, en contraste con una categoría espiritual o tipológica más amplia, sin resolver debates doctrinales mayores.
  alternative_spanish_readings:
  - Israel en términos meramente externos
  - el pueblo judío en distinción de la iglesia
  rationale: La traducción conserva la tensión de la frase paulina y evita explicar de más lo que el contexto inmediato no desarrolla.
  doctrine_reference: Fil. de traducción §3; tabla de términos debatidos para σάρξ
- issue: Relación entre los comensales sacrificiales y el altar
  english_pob_reading: participants in the altar / participants with the altar
  chosen_spanish_reading: participantes del altar
  alternative_spanish_readings:
  - partícipes del altar
  - participantes con el altar
  rationale: La preposición española más idiomática para esta relación es «del», que comunica pertenencia/relación cultual sin forzar un calco poco natural.
  doctrine_reference: BDAG; contexto cultual de 1 Co 10:18
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés que ajustó la relación con el altar. En español, se evitó el calco problemático «en el altar» y se optó por una construcción natural («participantes del altar») que mantiene la fuerza de κοινωνοί + genitivo en un contexto sacrificial.
  spanish_consistency_notes:
  - Se mantuvo «carne» para σάρξ, conforme al valor paulino y al término debatido en la fuente.
  - Se usó «participantes» para κοινωνοὶ, en línea con la elección inglesa y con el sentido de participación real.
  - Se evitó «Cristo»/«Mesías» y cualquier terminología no presente en el versículo.
  - La puntuación reproduce la pregunta retórica y la pausa fuerte tras «la carne».
