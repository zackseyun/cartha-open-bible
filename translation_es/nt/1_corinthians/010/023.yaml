translation:
  language: es
  text: «Todo está permitido», pero no todo es beneficioso[a]. «Todo está permitido», pero no todo edifica.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Todo es lícito». La expresión griega puede denotar lo que está permitido o lo que es lícito; las comillas reflejan la probabilidad de que Pablo esté citando un eslogan corintio al que luego responde.
    reason: lexical_alternative
lexical_decisions:
- source_word: Πάντα
  english_pob_choice: All things
  chosen_spanish: Todas las cosas
  alternatives_spanish:
  - Todo
  - Todo lo demás
  lexicon: BDAG
  rationale: El plural neutro sustantivado se refleja mejor con una expresión inclusiva y categórica. «Todas las cosas» conserva el alcance amplio y la repetición enfática del dicho.
- source_word: ἔξεστιν
  english_pob_choice: are permitted
  chosen_spanish: son permitidas
  alternatives_spanish:
  - son lícitas
  - están permitidas
  lexicon: BDAG
  rationale: El verbo expresa lo que está permitido o es lícito. «Son permitidas» comunica la idea de permiso de manera clara y natural en español, sin imponer de entrada el matiz jurídico de «lícitas».
- source_word: ἀλλ’
  english_pob_choice: but
  chosen_spanish: pero
  alternatives_spanish:
  - sin embargo
  - mas
  lexicon: BDAG
  rationale: Conjunción adversativa simple; «pero» reproduce bien el contraste breve del griego.
- source_word: συμφέρει
  english_pob_choice: are beneficial
  chosen_spanish: son beneficiosas
  alternatives_spanish:
  - son provechosas
  - son útiles
  - son ventajosas
  lexicon: BDAG
  rationale: Aunque el verbo es singular en griego con sujeto neutro plural, en español la concordancia plural resulta natural y transparente. «Beneficiosas» expresa la idea de conveniencia/ventaja ética mejor que un término más comercial como «provechosas».
- source_word: οἰκοδομεῖ
  english_pob_choice: build up
  chosen_spanish: edifican
  alternatives_spanish:
  - edifican espiritualmente
  - construyen
  - edifican a otros
  lexicon: BDAG
  rationale: Pablo usa οἰκοδομέω de forma metafórica para fortalecer a la comunidad. «Edifican» mantiene el verbo tradicional y la imagen, en un registro claro para lectores de iglesia.
theological_decisions:
- issue: Si la primera afirmación debe presentarse como un eslogan corintio citado por Pablo
  english_pob_reading: 'Render with quotation marks: “All things are permitted”'
  chosen_spanish_reading: 'Se conserva entre comillas: «Todas las cosas son permitidas»'
  alternative_spanish_readings:
  - Todas las cosas son permitidas, pero no todas las cosas son beneficiosas.
  - Todo me es permitido, pero no todo conviene.
  rationale: 'La puntuación con comillas ayuda a reflejar la estructura retórica probablemente citacional del verso sin alterar el texto. Esto preserva la tensión interpretativa: la frase puede sonar como un lema que Pablo matiza, en vez de una declaración suya sin más.'
  doctrine_reference: Preservar la tensión retórica e interpretativa del pasaje, según la práctica POB de documentar la ambigüedad sin resolverla artificialmente.
translation_notes:
  revision_awareness: El texto sigue de cerca la versión auditada en inglés y el griego SBLGNT. Se mantiene la duplicación retórica de la frase inicial y la segunda cláusula con el mismo valor contrastivo, sin suavizar la tensión entre permiso y conveniencia.
  spanish_consistency_notes:
  - Se mantiene «permitidas» para ἔξεστιν en ambas ocurrencias, siguiendo la misma decisión léxica.
  - Se conserva la metáfora de οἰκοδομέω con «edifican», en vez de sustituirla por una paráfrasis explicativa.
  - La puntuación con comillas reproduce la decisión interpretativa del POB inglés sobre el posible eslogan corintio.
