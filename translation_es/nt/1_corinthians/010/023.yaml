  - severity: medium
    issue: Repetición pesada de «todas las cosas»
    rationale: El griego repite Πάντα, pero en español la repetición literal produce torpeza. «Todo» preserva el alcance general y la forma sentenciosa del eslogan sin calco innecesario.
  - severity: low
