translation:
  language: es
  text: Por tanto[a], mis amados, huyan de la idolatría.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «culto a los ídolos».
    reason: lexical_alternative
lexical_decisions:
- source_word: Διόπερ
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Así que
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión lógica del argumento anterior. «Por tanto» conserva bien esa fuerza conclusiva en español moderno y suena natural en registro bíblico.
- source_word: ἀγαπητοί μου
  english_pob_choice: my beloved
  chosen_spanish: mis amados
  alternatives_spanish:
  - mis amados hermanos
  - mis queridos
  lexicon: BDAG
  rationale: El vocativo expresa afecto pastoral. «Mis amados» reproduce la cercanía y evita añadir «hermanos», que no está en el griego. En español, el posesivo plural concuerda con el vocativo dirigido a toda la comunidad.
- source_word: φεύγετε
  english_pob_choice: flee
  chosen_spanish: huyan
  alternatives_spanish:
  - huyan de
  - escapen
  lexicon: BDAG
  rationale: El imperativo presente de segunda plural pide una acción urgente. «Huyan» preserva la fuerza de alejamiento inmediato mejor que opciones más débiles como «eviten» o «aléjense».
- source_word: ἀπὸ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - de parte de
  - lejos de
  lexicon: BDAG
  rationale: Después de un verbo de movimiento como φεύγω, la preposición marca separación. En español, «de» con el verbo «huir» comunica adecuadamente esa relación sin sobrecargar la frase.
- source_word: τῆς εἰδωλολατρίας
  english_pob_choice: idolatry
  chosen_spanish: la idolatría
  alternatives_spanish:
  - el culto a los ídolos
  - la adoración de ídolos
  lexicon: BDAG
  rationale: εἰδωλολατρία nombra la práctica de rendir culto a ídolos. «Idolatría» es el equivalente conciso y ya carga en español la dimensión de culto indebido; por eso no se expande en el texto principal.
theological_decisions:
- issue: Alcance de la prohibición
  english_pob_reading: A direct imperative to avoid participation in idol worship and its associated practices
  chosen_spanish_reading: Un mandato directo para apartarse de la idolatría y de toda participación en ella
  alternative_spanish_readings:
  - Una advertencia solo contra la devoción interior a los ídolos
  - Un mandato limitado únicamente al culto ritual formal
  rationale: El contexto inmediato de 1 Corintios 10 amplía la advertencia hacia prácticas concretas vinculadas con el culto pagano. Por eso «idolatría» se mantiene como término general, sin restringirlo a una mera actitud interna ni suavizarlo a un sentido solo ritual.
  doctrine_reference: 1 Corintios 10:14–22
translation_notes:
  revision_awareness: El texto inglés POB vigente muestra alta concordancia con el griego y no requiere revisiones sustantivas; se conserva la misma estructura inferencial, el vocativo afectivo y el imperativo fuerte. La nota alternativa en inglés («idol worship») se refleja en español como opción léxica equivalente.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general del proyecto, pero este versículo no contiene el nombre divino.
  - «Idolatría» funciona aquí como término técnico y natural en español, equivalente al griego sin perder la referencia cultual.
  - «Huyan» conserva el valor de urgencia del imperativo plural y evita diluirlo en una mera recomendación.
