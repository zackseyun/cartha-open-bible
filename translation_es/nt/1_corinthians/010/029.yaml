translation:
  language: es
  text: Ahora me refiero a la conciencia del otro[a], no a la tuya[b]. Pues ¿por qué mi libertad es juzgada por otra conciencia?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «no la suya propia, sino la del otro». El contexto favorece el sentido «la conciencia del otro, no la tuya».'
    reason: lexical_alternative
  - marker: b
    text: Esta pregunta retórica puede entenderse como el propio cuestionamiento de Pablo o como una objeción que él expresa sin marcas explícitas de cita en griego.
    reason: alternative_reading
lexical_decisions:
- source_word: συνείδησιν
  english_pob_choice: conscience
  chosen_spanish: conciencia
  alternatives_spanish:
  - conocimiento interior
  - conciencia moral
  lexicon: BDAG
  rationale: En este contexto paulino, συνείδησις designa la capacidad interior de evaluar moralmente una acción; en español, 'conciencia' es el equivalente directo y natural. 'Conciencia moral' explicita la función, pero añade algo que el griego no necesita aquí.
- source_word: δὲ λέγω
  english_pob_choice: Now I mean
  chosen_spanish: Ahora me refiero a
  alternatives_spanish:
  - Pero digo
  - Ahora digo
  lexicon: BDAG
  rationale: La expresión no introduce un nuevo tema sino una aclaración de lo dicho antes. 'Ahora me refiero a' comunica mejor esa función explicativa en español que un simple 'digo'.
- source_word: οὐχὶ τὴν ἑαυτοῦ ἀλλὰ τὴν τοῦ ἑτέρου
  english_pob_choice: the other person's conscience, not your own
  chosen_spanish: la conciencia del otro, no la propia
  alternatives_spanish:
  - no la suya, sino la del otro
  - no la propia, sino la del otro
  lexicon: BDAG
  rationale: 'El griego contrasta dos conciencias: la del lector y la del otro. En español, ''la conciencia del otro, no la propia'' conserva el contraste sin una literalidad pesada. ''La propia'' refleja bien ἑαυτοῦ en contexto discursivo.'
- source_word: ἱνατί γὰρ
  english_pob_choice: For why
  chosen_spanish: Pues ¿por qué
  alternatives_spanish:
  - Porque ¿por qué
  - Ya que ¿por qué
  lexicon: BDAG
  rationale: ἱνατί mantiene una pregunta retórica y γάρ la enlaza con la aclaración anterior. 'Pues ¿por qué' conserva el nexo explicativo y el tono retórico en un español natural.
- source_word: ἐλευθερία
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - libre albedrío
  - licencia
  lexicon: BDAG
  rationale: '''Libertad'' es la equivalencia más natural y fiel para ἐλευθερία en este argumento paulino sobre la conducta permitida. ''Licencia'' sugeriría una connotación distinta que el contexto no exige.'
- source_word: κρίνεται
  english_pob_choice: is judged
  chosen_spanish: es juzgada
  alternatives_spanish:
  - es evaluada
  - es condenada
  lexicon: BDAG
  rationale: El pasivo de κρίνω aquí expresa ser sometido a juicio o evaluación por otra conciencia. 'Es juzgada' mantiene el valor amplio sin restringirlo a condena.
- source_word: ὑπὸ ἄλλης συνειδήσεως
  english_pob_choice: by another conscience
  chosen_spanish: por otra conciencia
  alternatives_spanish:
  - por la conciencia de otro
  - por la conciencia ajena
  lexicon: BDAG
  rationale: 'La construcción indica el agente del juicio. ''Por otra conciencia'' sigue de cerca el griego y preserva la ambigüedad útil: la conciencia de otra persona como criterio de juicio.'
theological_decisions:
- issue: Referente del contraste posesivo en la primera cláusula
  english_pob_reading: Paul clarifies that he means the conscience of the other person, not the reader's own conscience.
  chosen_spanish_reading: Pablo aclara que se refiere a la conciencia del otro, no a la propia del interlocutor.
  alternative_spanish_readings:
  - Pablo se refiere a su propia conciencia, no a la del otro
  - Pablo se refiere a la conciencia de otro, no a la del lector
  rationale: El griego usa un contraste posesivo que en español conviene naturalizar. Dado el contexto, 'la propia' expresa bien la conciencia del lector/interlocutor sin forzar una formulación extraña. La intención aclaratoria se conserva sin convertir el contraste en una tesis doctrinal nueva.
  doctrine_reference: Translation philosophy §1, §5
- issue: Función de la pregunta retórica final
  english_pob_reading: The question is left as a rhetorical challenge without resolving whether Paul endorses or rejects the premise in a systematic way.
  chosen_spanish_reading: La pregunta queda como desafío retórico, sin decidir explícitamente en la traducción si Pablo habla como objeción o como resumen propio.
  alternative_spanish_readings:
  - La pregunta se entiende como una objeción puesta en boca de un interlocutor corintio
  - La pregunta se entiende como la propia formulación retórica de Pablo
  rationale: El griego no marca un cambio de hablante. Por eso la traducción deja la pregunta abierta, manteniendo la fuerza retórica sin añadir una interpretación que el texto no señala de manera explícita.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La fuente griega y el audit trail inglés muestran alta concordancia; no se detectaron revisiones aplicadas en el expediente más reciente. La versión española mantiene esa estabilidad, naturalizando solo el orden y los posesivos para que la aclaración paulina suene idiomática en español.
  spanish_consistency_notes:
  - Se mantiene 'conciencia' para συνείδησις, coherente con el uso paulino y con la decisión inglesa auditada.
  - Se usa 'libertad' para ἐλευθερία, evitando 'licencia' por su matiz no apoyado por el contexto.
  - '''Juzgada'' conserva el alcance amplio de κρίνεται y no se restringe a ''condenada''.'
  - El marcador [a] se ancla en 'del otro' para señalar la alternativa literal documentada sin interrumpir la lectura principal.
