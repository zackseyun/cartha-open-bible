translation:
  language: es
  text: Ni cometamos inmoralidad sexual, como algunos de ellos cometieron inmoralidad sexual, y en un solo día cayeron[a] veintitrés mil[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «murieron» o «fueron derribados»; el griego dice «cayeron», una forma común de referirse a la muerte bajo juicio.
    reason: lexical_alternative
  - marker: b
    text: Números 25:9 informa veinticuatro mil. Aquí Pablo dice que veintitrés mil cayeron «en un solo día», lo cual puede distinguir a los que murieron ese día del total mayor; la traducción conserva la redacción de Pablo sin armonizarla.
    reason: cross_reference
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: Nor should
  chosen_spanish: Ni cometamos
  alternatives_spanish:
  - Y no cometamos
  - Tampoco cometamos
  lexicon: BDAG
  rationale: La partícula μηδὲ introduce una prohibición continuada dentro de la serie exhortativa. «Ni» conserva bien el enlace negativo con la advertencia anterior y permite un español natural sin perder el valor de continuación; el subjuntivo exhortativo «cometamos» refleja el mandato inclusivo del griego.
- source_word: πορνεύωμεν
  english_pob_choice: we commit sexual immorality
  chosen_spanish: cometamos inmoralidad sexual
  alternatives_spanish:
  - practiquemos inmoralidad sexual
  - seamos sexualmente inmorales
  - forniquemos
  lexicon: BDAG
  rationale: El verbo πορνεύω designa conducta sexual ilícita en sentido amplio. «Cometer inmoralidad sexual» mantiene la fuerza moral del término, suena claro en español moderno y evita restringir el sentido a una sola práctica concreta o a una expresión arcaica.
- source_word: καθώς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: καθώς introduce comparación con el ejemplo de Israel. «Como» es la equivalencia más natural y suficiente en español.
- source_word: τινες αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - algunos entre ellos
  - ciertos de ellos
  lexicon: BDAG
  rationale: La referencia es a una parte de Israel en el desierto. «Algunos de ellos» es la forma más clara y directa en español.
- source_word: ἐπόρνευσαν
  english_pob_choice: committed sexual immorality
  chosen_spanish: cometieron inmoralidad sexual
  alternatives_spanish:
  - fueron sexualmente inmorales
  - fornicaron
  lexicon: BDAG
  rationale: Mantengo la misma base léxica que en πορνεύωμεν para preservar la repetición retórica del pasaje. «Cometieron inmoralidad sexual» reproduce bien el paralelismo y la gravedad del verbo.
- source_word: ἔπεσαν
  english_pob_choice: fell
  chosen_spanish: cayeron
  alternatives_spanish:
  - murieron
  - fueron derribados
  lexicon: BDAG
  rationale: πίπτω significa literalmente «caer». «Cayeron» conserva el lenguaje del griego y deja implícito, por el contexto de juicio, que se trata de muerte o caída bajo el juicio divino; una explicitación iría más allá del texto principal.
- source_word: μιᾷ ἡμέρᾳ
  english_pob_choice: in one day
  chosen_spanish: en un solo día
  alternatives_spanish:
  - en un día
  - dentro de un solo día
  lexicon: BDAG
  rationale: La expresión indica el tiempo en que ocurrió la acción. «En un solo día» es idiomático en español y conserva el énfasis en la concentración temporal del juicio.
- source_word: εἴκοσι τρεῖς χιλιάδες
  english_pob_choice: twenty-three thousand
  chosen_spanish: veintitrés mil
  alternatives_spanish:
  - '23.000'
  lexicon: BDAG
  rationale: El número griego debe trasladarse de forma directa en el texto principal. Se mantiene en palabras por fluidez bíblica y por consistencia con el estilo narrativo/epistolar.
theological_decisions:
- issue: Tensión numérica con Números 25:9
  english_pob_reading: Retain Paul's stated number 'twenty-three thousand' in the main text without harmonizing.
  chosen_spanish_reading: Conservar «veintitrés mil» en el texto principal sin armonizar con Números 25:9.
  alternative_spanish_readings:
  - armonizar a «veinticuatro mil»
  - explicar como subtotal frente a total
  rationale: El griego de 1 Corintios lee claramente «veintitrés mil». La traducción debe reflejar el dato de Pablo tal como está en el texto, y cualquier intento de resolver la tensión numérica debe quedar, si acaso, en una nota explicativa, no en el cuerpo del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
translation_notes:
  revision_awareness: No hay revisiones aplicadas en el historial más reciente; el estado de revisión indica estabilidad del texto fuente y acuerdo alto con la auditoría inglesa.
  spanish_consistency_notes:
  - Se mantiene la repetición verbal entre «cometamos» y «cometieron» para conservar el paralelismo retórico del griego.
  - «Inmoralidad sexual» se usa de manera consistente para πορνεία/πορνεύω en esta cláusula, evitando arcaísmos innecesarios.
  - Se conserva el sentido literal de «cayeron» en el cuerpo del texto, con la alternativa de muerte explicada solo en nota.
  - El número se escribe con palabras en el texto bíblico principal por estilo de lectura y para mantener el registro bíblico formal.
