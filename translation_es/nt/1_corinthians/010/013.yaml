review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador sigue bien el sentido general del griego y del audit trail inglés: mantiene πειρασμός/πειρασθῆναι como «tentación/ser tentados», expresa la fidelidad de Dios, y conserva la idea de la ἔκβασις como provisión divina que permite soportar. Sin embargo, hay ajustes necesarios para alinear mejor el español con el matiz fuente y con el expediente inglés: «más allá de lo que pueden resistir» adelanta interpretativamente el sentido de δύνασθε donde el inglés preserva «beyond what you are able»; además, el borrador omite en el texto el relativo explicativo de ὃς («quien») tras «Dios es fiel», y una de las notas usa «test», anglicismo impropio aquí.'
  spanish_quality_summary: 'El texto es legible y digno, pero puede sonar más natural y más cercano al original con una leve reestructuración: «pero Dios es fiel, quien no permitirá...» evita una coordinación menos precisa. «Más allá de lo que pueden» conserva claridad sin sobreespecificar. Las notas necesitan pequeña limpieza léxica: «test» y una alternativa mal formada en las decisiones léxicas («tentação», «تحملarla») evidencian descuido editorial, aunque esas formas no están en el texto bíblico principal.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto: θεός = «Dios», πειρασμός = «tentación» con alternativas preservadas. No intervienen Yahvé/Mesías ni otros términos de glosario prioritario. La decisión principal sobre πειρασμός concuerda con la rationale inglesa y la nota debe seguir preservando «prueba».'
