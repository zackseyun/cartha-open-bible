translation:
  language: es
  text: No les ha sobrevenido ninguna tentación[a] que no sea humana[b]; pero Dios es fiel, quien no permitirá que sean tentados[c] más allá de lo que pueden, sino que con la tentación[d] dará también la salida[e], para que puedan soportarla.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «prueba» o «ensayo»; el término griego puede abarcar una prueba de fe además de una tentación moral.
    reason: lexical_alternative
  - marker: b
    text: O «común a la humanidad»; el adjetivo griego significa «humano» o «propio de seres humanos».
    reason: lexical_alternative
  - marker: c
    text: O «ser probados»; el verbo griego puede traducirse también «ser puestos a prueba».
    reason: lexical_alternative
  - marker: d
    text: O «la prueba»; el sustantivo griego puede referirse también a una prueba o puesta a prueba.
    reason: lexical_alternative
  - marker: e
    text: O «el escape» o «el desenlace»; la palabra griega ἔκβασις puede significar una salida, una vía de escape o el resultado final.
    reason: lexical_alternative
lexical_decisions:
- source_word: πειρασμός
  english_pob_choice: temptation
  chosen_spanish: tentación
  alternatives_spanish:
  - prueba
  - tentação
  lexicon: BDAG
  rationale: En este contexto, el griego puede abarcar tentación, prueba o prueba/aflicción; sin embargo, la mención de ser «tentados» y el marco inmediato de exhortación moral favorecen «tentación» como sentido principal. Se conserva el rango semántico en decisiones y notas donde corresponde.
- source_word: εἴληφεν
  english_pob_choice: has overtaken
  chosen_spanish: ha sobrevenido
  alternatives_spanish:
  - ha alcanzado
  - ha tomado por sorpresa
  lexicon: BDAG
  rationale: El perfecto de λαμβάνω expresa una realidad que ha llegado a ellos y los ha invadido o alcanzado. «Ha sobrevenido» comunica bien en español la idea de una experiencia que les ha llegado encima sin forzar una imagen demasiado literal.
- source_word: εἰ μὴ ἀνθρώπινος
  english_pob_choice: except what is common to man
  chosen_spanish: que no sea humana
  alternatives_spanish:
  - común a la humanidad
  - propia de seres humanos
  lexicon: BDAG
  rationale: ἀνθρώπινος significa «humano» o «propio de seres humanos». La frase griega no afirma algo excepcional o sobrehumano; por eso «no sea humana» preserva la idea de que es una tentación común a la experiencia humana. Se documenta la alternativa más explícita «común a la humanidad».
- source_word: πιστός
  english_pob_choice: faithful
  chosen_spanish: fiel
  alternatives_spanish:
  - confiable
  - digno de confianza
  lexicon: BDAG
  rationale: Para Dios, πιστός se vierte naturalmente como «fiel», destacando su fiabilidad y constancia en cumplir lo que promete.
- source_word: ἐάσει
  english_pob_choice: will not allow
  chosen_spanish: no permitirá
  alternatives_spanish:
  - no dejará
  - no consentirá
  lexicon: BDAG
  rationale: ἐάω significa permitir o dejar. «No permitirá» es claro, solemne y fiel al sentido de una restricción divina activa.
- source_word: πειρασθῆναι
  english_pob_choice: to be tempted
  chosen_spanish: ser tentados
  alternatives_spanish:
  - ser probados
  lexicon: BDAG
  rationale: Se mantiene el mismo campo semántico que πειρασμός. Dado el contexto inmediato, la traducción principal conserva «tentados»; «probados» queda como posibilidad léxica secundaria.
- source_word: ὑπὲρ ὃ δύνασθε
  english_pob_choice: beyond what you are able
  chosen_spanish: más allá de lo que pueden resistir
  alternatives_spanish:
  - más allá de lo que pueden
  - por encima de su capacidad
  lexicon: BDAG
  rationale: 'La frase marca un límite de capacidad. En español, «más allá de lo que pueden resistir» explicita el sentido práctico de δύνασθε en este contexto: no simplemente capacidad abstracta, sino la posibilidad de soportar la presión sin sucumbir.'
- source_word: ποιήσει
  english_pob_choice: will also provide
  chosen_spanish: dará también
  alternatives_spanish:
  - proveerá también
  - hará también
  lexicon: BDAG
  rationale: ποιέω es amplio; en la construcción con ἔκβασις, el español natural es «dar» en el sentido de conceder o proveer. «Dará también» evita una formulación rígida y mantiene la idea de provisión divina.
- source_word: σὺν τῷ πειρασμῷ
  english_pob_choice: with the temptation
  chosen_spanish: con la tentación
  alternatives_spanish:
  - junto con la tentación
  - junto a la tentación
  lexicon: BDAG
  rationale: σύν indica acompañamiento. «Con la tentación» reproduce con naturalidad que la provisión de Dios acompaña la prueba y no necesariamente la elimina de inmediato.
- source_word: ἔκβασιν
  english_pob_choice: the way out
  chosen_spanish: la salida
  alternatives_spanish:
  - la vía de escape
  - el escape
  - el desenlace
  lexicon: BDAG
  rationale: ἔκβασις puede significar salida, escape u outcome. «La salida» es una forma idiomática en español que conserva la imagen de un camino de escape o salida sin restringir indebidamente el matiz a huida inmediata.
- source_word: τοῦ δύνασθαι ὑπενεγκεῖν
  english_pob_choice: so that you may be able to endure it
  chosen_spanish: para que puedan soportarla
  alternatives_spanish:
  - para que puedan resistirla
  - para que sean capaces de تحملarla
  lexicon: BDAG
  rationale: El infinitivo articular expresa propósito o resultado. ὑποφέρω significa soportar, llevar sobre sí o resistir bajo carga; «soportarla» comunica bien la idea de perseverar bajo la presión de la tentación. La referencia implícita apunta a la tentación/situación en singular, por eso se usa el pronombre femenino concordante con «tentación».
theological_decisions:
- issue: Rango semántico de πειρασμός y πειρασθῆναι
  english_pob_reading: Rendered as 'temptation'/'to be tempted' while preserving 'testing' as an alternative.
  chosen_spanish_reading: Se traduce principalmente como «tentación»/«ser tentados», preservando «prueba»/«ser probados» como alternativa.
  alternative_spanish_readings:
  - prueba
  - ser probados
  - ensayo
  rationale: El contexto inmediato favorece la dimensión moral de la tentación, pero el término griego puede abarcar también prueba o test. La versión española conserva esa tensión mediante la nota lexical, sin cerrar artificialmente el sentido.
  doctrine_reference: Mantener la tensión lexical y teológica; equivalencia óptima.
- issue: Relación entre la fidelidad de Dios y el límite de la prueba
  english_pob_reading: God will not allow temptation beyond what you are able, but will provide the way out.
  chosen_spanish_reading: Dios limita la tentación y, al mismo tiempo, provee la salida para poder soportarla.
  alternative_spanish_readings:
  - Dios no dejará que sean tentados más de lo que pueden
  - Dios proveerá el escape
  rationale: La frase no enseña que Dios elimine toda tentación, sino que fielmente la limita y acompaña con una salida que permite perseverar. «La salida» mantiene abierto si se trata de escape, desenlace o vía de paso, conforme al griego y al audit trail inglés.
  doctrine_reference: 1 Corintios 10:13; perseverancia bajo la fidelidad de Dios.
- issue: Verbo de capacidad en ὑπὲρ ὃ δύνασθε
  english_pob_reading: Beyond what you are able
  chosen_spanish_reading: Más allá de lo que pueden resistir
  alternative_spanish_readings:
  - más allá de lo que pueden
  - más allá de su capacidad
  rationale: En español, «resistir» explicita la fuerza de la construcción en este contexto de prueba moral. No cambia el sentido, sino que lo hace comunicativo para el lector actual.
  doctrine_reference: Suficiencia de la gracia/provisión divina para perseverar.
translation_notes:
  revision_awareness: 'Se siguió el audit trail inglés sin traducir mecánicamente: se mantuvo la tensión léxica de πειρασμός/πειρασθῆναι, se preservó la idea de provisión divina con ἔκβασις, y se eligieron equivalentes españoles naturales pero transparentes. No se reportaron revisiones aplicadas en el contexto de origen; la redacción busca ser publicable y auditable en una sola pasada.'
  spanish_consistency_notes:
  - Se usa «Dios» para θεός y «fiel» para πιστός.
  - Se evita «SEÑOR» porque aquí no aparece κύριος.
  - Se mantiene «tentación» como término principal y se consignan alternativas en notas.
  - «La salida» se deja sin especificar como escape mecánico para respetar la amplitud de ἔκβασις.
  - El pronombre femenino «la» en «soportarla» concuerda con «tentación», aunque el referente conceptual abarca toda la situación de prueba.
