translation:
  language: es
  text: y todos comieron el mismo alimento espiritual[a]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'sobrenatural'; la expresión probablemente alude al maná en el desierto y puede tener fuerza tipológica en el contexto.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - también
  lexicon: BDAG
  rationale: Conjunción coordinante simple; en español, 'y' reproduce de manera natural la conexión con el contexto anterior.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - ellos todos
  - todos ellos
  lexicon: BDAG
  rationale: El plural nominativo enfatiza la totalidad del grupo. 'Todos' conserva esa amplitud sin añadir un sujeto explícito innecesario.
- source_word: τὸ αὐτὸ
  english_pob_choice: the same
  chosen_spanish: el mismo
  alternatives_spanish:
  - ese mismo
  - el mismo de siempre
  lexicon: BDAG
  rationale: La construcción con artículo y αὐτός expresa identidad/similitud; 'el mismo' es la forma más clara y natural en español.
- source_word: πνευματικὸν
  english_pob_choice: spiritual
  chosen_spanish: espiritual
  alternatives_spanish:
  - sobrenatural
  - del Espíritu
  lexicon: BDAG
  rationale: En el contexto paulino, πνευματικός suele significar 'espiritual'. 'Sobrenatural' explicita demasiado la idea y 'del Espíritu' estrecha indebidamente el sentido.
- source_word: βρῶμα
  english_pob_choice: food
  chosen_spanish: alimento
  alternatives_spanish:
  - comida
  - nourishment
  lexicon: BDAG
  rationale: βρῶμα designa alimento/comida en sentido general. 'Alimento' suena natural en español y preserva el valor genérico del término.
- source_word: ἔφαγον
  english_pob_choice: ate
  chosen_spanish: comieron
  alternatives_spanish:
  - estuvieron comiendo
  - comían
  lexicon: BDAG
  rationale: El aoristo narrativo pide un pretérito simple en español. 'Comieron' expresa con precisión la acción pasada sin sobreinterpretarla.
theological_decisions:
- issue: Sentido de 'alimento espiritual' en la tipología del desierto
  english_pob_reading: Retain 'spiritual food' in the main text without specifying 'manna' or making the sacramental connection explicit.
  chosen_spanish_reading: Mantener 'alimento espiritual' sin identificarlo explícitamente como maná ni como alusión sacramental.
  alternative_spanish_readings:
  - el maná del desierto
  - alimento dado por el Espíritu
  - alusión al pan de la Cena del Señor
  rationale: Pablo probablemente alude a la provisión del desierto, pero el adjetivo 'espiritual' también sostiene una carga tipológica. La traducción conserva esa tensión sin resolverla prematuramente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: 'El pasaje coincide con el texto griego recibido y con el control de revisión más reciente: no se requieren cambios respecto del enfoque auditado en inglés.'
  spanish_consistency_notes:
  - Se mantiene 'espiritual' para πνευματικός, coherente con el uso paulino y con el audit trail inglés.
  - '''Alimento'' evita una especificación más estrecha como ''maná'' en el texto principal, pero la nota conserva la alternativa interpretativa.'
  - No se usa 'Cristo' ni terminología eclesiástica que no aparezca en el verso; la frase es breve y directa.
  - El registro es formal y publicable, con sintaxis natural en español latinoamericano.
