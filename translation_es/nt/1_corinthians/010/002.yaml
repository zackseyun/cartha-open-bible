translation:
  language: es
  text: y todos fueron bautizados para Moisés[a] en la nube y en el mar[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «identificados con Moisés» o «en lealtad a Moisés». El griego dice literalmente «para Moisés», preservando el paralelismo tipológico que Pablo establece con el bautismo.
    reason: alternative_reading
  - marker: b
    text: Pablo dice «en el mar», no «a través del mar», preservando el paralelismo con «en la nube».
    reason: lexical_alternative
lexical_decisions:
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - todos los israelitas
  lexicon: BDAG
  rationale: «Todos» conserva la referencia colectiva y la repetición enfática del contexto inmediato sin añadir precisión interpretativa que el griego no explicita aquí.
- source_word: εἰς τὸν Μωϋσῆν
  english_pob_choice: into Moses
  chosen_spanish: en Moisés
  alternatives_spanish:
  - hacia Moisés
  - en relación con Moisés
  - unidos a Moisés
  lexicon: BDAG
  rationale: El español «bautizados en Moisés» mantiene la construcción extraña y la tensión tipológica del griego, sin resolverla en una paráfrasis doctrinal. Se evita «hasta» o «hacia» para no desplazar el valor relacional de εἰς, pero se prefiere una formulación natural en español que siga la imagen de incorporación/identificación sugerida por el pasaje.
- source_word: ἐβαπτίσαντο
  english_pob_choice: were baptized
  chosen_spanish: fueron bautizados
  alternatives_spanish:
  - se bautizaron
  - fueron sumergidos
  lexicon: BDAG
  rationale: «Fueron bautizados» reproduce el valor léxico de βαπτίζω en forma idiomática y conserva la referencia sacramental-tipológica que Pablo establece. «Se bautizaron» haría demasiado explícita la voz media, y «fueron sumergidos» estrecharía indebidamente el sentido.
- source_word: ἐν τῇ νεφέλῃ
  english_pob_choice: in the cloud
  chosen_spanish: en la nube
  alternatives_spanish:
  - por la nube
  - con la nube
  lexicon: BDAG
  rationale: «En la nube» respeta la preposición ἐν y mantiene la imagen de esfera/asociación presente en el texto, como en la auditoría inglesa.
- source_word: ἐν τῇ θαλάσσῃ
  english_pob_choice: in the sea
  chosen_spanish: en el mar
  alternatives_spanish:
  - por el mar
  - a través del mar
  lexicon: BDAG
  rationale: «En el mar» sigue el griego ἐν y preserva el paralelo con «en la nube». Se evita «a través del mar» porque introduciría la idea narrativa de paso que Pablo no formula con la preposición usada aquí.
theological_decisions:
- issue: Sentido de «bautizados en Moisés»
  english_pob_reading: Retain the typological and representative language without explicating it beyond the text.
  chosen_spanish_reading: Conservar el lenguaje tipológico y representativo sin explicarlo en la línea principal.
  alternative_spanish_readings:
  - identificados con Moisés
  - iniciados en la autoridad de Moisés
  - en lealtad a Moisés
  rationale: La expresión de Pablo es intencionalmente sobria y mantiene una analogía tipológica con el bautismo cristiano. La traducción española debe preservar esa tensión en lugar de resolverla con una explicación interpretativa única.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el pasaje quedó en alta concordancia y sin observaciones pendientes.
  spanish_consistency_notes:
  - Se mantiene «bautizados» para βαπτίζω, en coherencia con el uso técnico-tipológico del pasaje.
  - Se preserva la preposición «en» tanto para la nube como para el mar, conservando el paralelismo del griego y la nota auditada en inglés.
  - Se usa «Moisés» sin glosa adicional en el texto principal para no debilitar la fuerza de la construcción εἰς τὸν Μωϋσῆν.
