review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien el sentido general del griego y del POB inglés: «estas cosas», «ejemplos», «para nosotros» y la comparación final están bien encaminados. Sin embargo, la clausula de propósito simplifica demasiado εἰς τὸ μὴ εἶναι ἡμᾶς ἐπιθυμητὰς κακῶν al pasar de «no ser deseadores de cosas malas» a «no deseemos cosas malas». Esa simplificación fue aceptada en inglés por naturalidad, pero en español aún puede preservarse mejor el matiz de estado/caracterización sin sonar torpe. Además, el pronombre final debe concordar con «cosas» como «las».'
  spanish_quality_summary: El español es claro y eclesialmente legible. «Ahora bien» y «llegaron a ser» funcionan, y la nota léxica sobre «ejemplos» está bien ubicada. No obstante, «como también ellos las desearon» suena un poco pesado; «tal como ellos también las desearon» o una estructura semejante fluye mejor. También hay una inconsistencia entre el texto («las desearon») y la decisión léxica listada para ἐπεθύμησαν («los desearon»).
  glossary_alignment: No hay términos del glosario principal especialmente controvertidos en este versículo. «Ejemplos» para τύποι concuerda con la decisión del POB. «Desear» para ἐπιθυμία/ἐπιθυμέω también concuerda con la rationale teológica de evitar restringir el sentido a lo sexual. La nota alternativa «tipos / patrones» está correctamente conservada.
  issues:
  - severity: medium
    issue: La cláusula «para que no deseemos cosas malas» reduce el matiz de ἡμᾶς ἐπιθυμητὰς
    rationale: El griego expresa más literalmente «para que no seamos deseadores de cosas malas». Aunque el inglés auditado simplificó a un verbo finito por naturalidad, en español conviene retener algo del valor caracterizador del sustantivo ἐπιθυμητὰς.
  - severity: low
    issue: La secuencia final «como también ellos las desearon» es algo rígida
    rationale: La posición de «también» después de «como» no es incorrecta, pero una formulación como «tal como ellos también las desearon» resulta más natural y mantiene κἀκεῖνοι.
  - severity: low
    issue: Inconsistencia interna en la documentación léxica de ἐπεθύμησαν
    rationale: El texto dice «las desearon», que es correcto por concordancia con «cosas», pero la decisión léxica anota «los desearon». Debe armonizarse.
  revised_spanish_text: Ahora bien, estas cosas llegaron a ser ejemplos[a] para nosotros, para que no seamos deseosos de cosas malas, tal como ellos también las desearon.
  revised_footnotes:
  - marker: a
    text: O «tipos para nosotros» o «patrones para nosotros».
    reason: lexical_alternative
  revision_rationale: Se ajusta la cláusula de propósito para reflejar mejor el valor caracterizador de ἐπιθυμητὰς («deseosos de cosas malas») sin caer en un calco torpe. También se mejora la fluidez de la comparación final y se mantiene la nota léxica del POB inglés. No se requiere adjudicación adicional porque el cambio es menor, claro y apoyado por el griego.
