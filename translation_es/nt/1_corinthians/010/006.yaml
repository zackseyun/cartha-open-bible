- from: Ahora bien, estas cosas llegaron a ser ejemplos[a] para nosotros, para que no deseemos cosas malas, como también ellos las desearon.
  to: Ahora bien, estas cosas llegaron a ser ejemplos[a] para nosotros, para que no seamos deseosos de cosas malas, tal como ellos también las desearon.
  rationale: Se ajusta la cláusula de propósito para reflejar mejor el valor caracterizador de ἐπιθυμητὰς («deseosos de cosas malas») sin caer en un calco torpe. También se mejora la fluidez de la comparación final y se mantiene la nota léxica del POB inglés. No se requiere adjudicación adicional porque el cambio es menor, claro y apoyado por el griego.
