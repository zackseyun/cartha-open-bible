translation:
  language: es
  text: Ahora bien, estas cosas llegaron a ser ejemplos[a] para nosotros, para que no seamos deseosos de cosas malas, tal como ellos también las desearon.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tipos para nosotros» o «patrones para nosotros».
    reason: lexical_alternative
lexical_decisions:
- source_word: Ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos eventos
  lexicon: BDAG
  rationale: El neutro plural demostrativo se refiere a los episodios del desierto ya narrados. «Estas cosas» reproduce de modo natural la referencia retrospectiva sin añadir interpretación.
- source_word: δὲ
  english_pob_choice: Now
  chosen_spanish: Ahora bien
  alternatives_spanish:
  - Y
  - Pero
  lexicon: BDAG
  rationale: Marca transición discursiva más que contraste fuerte. «Ahora bien» funciona en español como giro explicativo y mantiene el avance argumental de Pablo.
- source_word: τύποι
  english_pob_choice: examples
  chosen_spanish: ejemplos
  alternatives_spanish:
  - tipos
  - patrones
  - advertencias
  lexicon: BDAG
  rationale: En este contexto exhortativo, el sentido práctico es el de precedentes instructivos. «Ejemplos» comunica mejor la fuerza admonitiva que un tecnicismo como «tipos».
- source_word: ἡμῶν
  english_pob_choice: for us
  chosen_spanish: para nosotros
  alternatives_spanish:
  - de nosotros
  - como nuestros
  lexicon: BDAG
  rationale: 'El genitivo con τύποι se expresa con naturalidad en español como finalidad/aplicación: «para nosotros». Preserva el valor comunitario y exhortativo.'
- source_word: ἐγενήθησαν
  english_pob_choice: became
  chosen_spanish: llegaron a ser
  alternatives_spanish:
  - se hicieron
  - fueron
  lexicon: BDAG
  rationale: La forma sugiere que estos acontecimientos pasaron a funcionar como algo. «Llegaron a ser» conserva ese matiz mejor que un simple «fueron».
- source_word: εἰς τὸ μὴ εἶναι
  english_pob_choice: so that we might not be
  chosen_spanish: para que no deseemos
  alternatives_spanish:
  - con el fin de que no seamos
  - a fin de no ser
  lexicon: BDAG
  rationale: La construcción expresa propósito. En español, «para que no deseemos» es idiomático y retiene el sentido exhortativo sin volverse pesado.
- source_word: ἐπιθυμητὰς
  english_pob_choice: people who desire
  chosen_spanish: los que desean
  alternatives_spanish:
  - deseadores
  - los codiciosos
  - los que anhelan
  lexicon: BDAG
  rationale: El sustantivo indica personas caracterizadas por el deseo intenso. «Los que desean» evita estrechar el sentido a lo meramente sexual y conserva la fuerza moral.
- source_word: κακῶν
  english_pob_choice: evil things
  chosen_spanish: cosas malas
  alternatives_spanish:
  - cosas malas y perversas
  - el mal
  lexicon: BDAG
  rationale: El plural neutro apunta a objetos de deseo. «Cosas malas» es claro y fiel; «el mal» sería demasiado abstracto en este contexto.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: como
  alternatives_spanish:
  - tal como
  - así como
  lexicon: BDAG
  rationale: Introduce comparación directa. «Como» es suficiente y natural en español; el valor comparativo queda claro por la estructura de la frase.
- source_word: κἀκεῖνοι
  english_pob_choice: they also
  chosen_spanish: ellos también
  alternatives_spanish:
  - también ellos
  - aquellos también
  lexicon: BDAG
  rationale: La contracción conserva el añadido enfático. «Ellos también» mantiene la referencia a la generación del desierto sin sobrecargar el estilo.
- source_word: ἐπεθύμησαν
  english_pob_choice: desired them
  chosen_spanish: los desearon
  alternatives_spanish:
  - los codiciaron
  - los anhelaron
  lexicon: BDAG
  rationale: Retoma el campo léxico de ἐπιθυμέω. «Los desearon» mantiene la conexión con «los que desean» y evita introducir una intensidad no explicitada por el texto.
theological_decisions:
- issue: Valor de τύποι en la historia de Israel
  english_pob_reading: Rendered as 'examples' in an ethical-warning sense rather than as a technical typological term.
  chosen_spanish_reading: «Ejemplos» en sentido admonitorio, no como tecnicismo tipológico.
  alternative_spanish_readings:
  - tipos
  - patrones
  - figuras
  rationale: El contexto inmediato busca advertir a la iglesia mediante los hechos narrados. «Ejemplos» transmite la función pedagógica sin imponer una sistematización teológica más estrecha que la del pasaje.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Alcance moral de ἐπιθυμία
  english_pob_reading: Rendered with 'desire' rather than 'lust' to avoid narrowing the term to sexual desire while retaining moral seriousness.
  chosen_spanish_reading: «Deseemos / desearon» en vez de «codiciemos» o «lujuria».
  alternative_spanish_readings:
  - codiciemos
  - lujuriemos
  - apetecemos
  rationale: Aquí el texto habla de deseo maligno de manera amplia. «Desear» conserva el paralelo verbal y no restringe indebidamente el campo semántico a lo sexual.
  doctrine_reference: Translation philosophy §§1, 6
translation_notes:
  revision_awareness: 'La versión inglesa revisada simplificó una formulación más pesada sobre «ser personas que desean cosas malas» hacia «desear cosas malas». La redacción española sigue esa revisión: mantiene el paralelismo entre el sustantivo τύποι y el verbo ἐπεθύμησαν, y evita una perífrasis innecesaria.'
  spanish_consistency_notes:
  - Se conserva «Yahvé» como norma general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita directa que lo requiera.
  - Se usa «ejemplos» para τύποι conforme al valor exhortativo documentado en el expediente inglés.
  - «Cosas malas» refleja el plural neutro de κακῶν sin abstraerlo a «el mal».
  - La nota al pie ofrece la alternativa léxica preservada por el POB inglés entre «examples», «types» y «patterns».
