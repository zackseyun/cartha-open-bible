translation:
  language: es
  text: Porque no quiero que ignoren, hermanos[a], que todos nuestros padres estuvieron bajo la nube, y todos pasaron por el mar,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego 'hermanos' puede dirigirse a una congregación mixta.
    reason: lexical_alternative
lexical_decisions:
- source_word: Οὐ θέλω ... ἀγνοεῖν
  english_pob_choice: I do not want you to be unaware
  chosen_spanish: no quiero que ignoren
  alternatives_spanish:
  - no quiero que estén ignorantes
  - quiero que sepan
  lexicon: BDAG
  rationale: La construcción negativa con infinitivo se conserva en español con una formulación natural y pública. 'No quiero que ignoren' mantiene la fuerza de la negación y la intención exhortativa sin sonar tan dura como 'ser ignorantes'. 'Quiero que sepan' sería más fluido, pero perdería el matiz marcado del griego.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: γάρ introduce explicación y enlace con el argumento anterior; 'Porque' reproduce bien esa relación causal-explicativa en español bíblico moderno.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  - hermanos,
  lexicon: BDAG
  rationale: Se conserva la forma masculina plural del griego como vocativo dirigido a la congregación. En español, 'hermanos' es la forma natural y transparente para este uso; la inclusión de mujeres queda implícita por el valor representativo del plural.
- source_word: οἱ πατέρες ἡμῶν
  english_pob_choice: our fathers
  chosen_spanish: nuestros padres
  alternatives_spanish:
  - nuestros antepasados
  - nuestros padres de antaño
  lexicon: BDAG
  rationale: '''Padres'' conserva el parentesco histórico y la identificación comunitaria con Israel. ''Antepasados'' explicita el sentido, pero suaviza la fuerza familiar y covenantal del texto.'
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: La repetición de πάντες es retóricamente importante y se preserva con 'todos' en ambos casos.
- source_word: ὑπὸ τὴν νεφέλην ἦσαν
  english_pob_choice: were all under the cloud
  chosen_spanish: estuvieron bajo la nube
  alternatives_spanish:
  - estaban bajo la nube
  - se hallaron bajo la nube
  lexicon: BDAG
  rationale: '''Bajo la nube'' mantiene la referencia al relato del éxodo y a la presencia guía de Dios. Se usa ''estuvieron'' para reflejar el estado histórico narrado sin introducir una perífrasis innecesaria.'
- source_word: διὰ τῆς θαλάσσης διῆλθον
  english_pob_choice: all passed through the sea
  chosen_spanish: pasaron por el mar
  alternatives_spanish:
  - atravesaron el mar
  - cruzaron por el mar
  lexicon: BDAG
  rationale: '''Pasaron por el mar'' es idiomático en español y conserva el movimiento a través del mar sin sobreespecificar el modo. ''Atravesaron'' o ''cruzaron'' son posibles, pero ''pasaron por'' se ajusta bien al paralelismo narrativo.'
theological_decisions:
- issue: Vocativo ἀδελφοί dirigido a una congregación mixta
  english_pob_reading: brothers
  chosen_spanish_reading: hermanos
  alternative_spanish_readings:
  - hermanos y hermanas
  rationale: Se mantiene la forma masculina plural del texto griego en el cuerpo principal, siguiendo la política de precisión de género del proyecto. En español, el vocativo 'hermanos' sigue siendo comprensible y eclesialmente natural sin neutralizar el término.
  doctrine_reference: DOCTRINE.md Translation philosophy §4 (Gender-accurate over gender-neutral)
- issue: Identificación corporativa de la iglesia con la historia de Israel en 'nuestros padres'
  english_pob_reading: our fathers
  chosen_spanish_reading: nuestros padres
  alternative_spanish_readings:
  - nuestros antepasados
  rationale: La expresión preserva la conexión pactual y retórica que Pablo establece entre los creyentes y la historia de Israel. 'Antepasados' sería más explicativo, pero perdería la resonancia familiar del original.
  doctrine_reference: DOCTRINE.md Translation philosophy §1 (Original-language primacy over translation tradition) y §5 (Consistency of key terms, or documented exception)
translation_notes:
  revision_awareness: El pasaje coincide con el texto fuente y con la auditoría inglesa aprobada; la corrección requerida era anclar la nota de pie [a] dentro del texto español. Se mantuvo la misma lectura sintáctica y léxica, añadiendo el marcador junto al vocativo para que la alternativa inclusiva quede debidamente vinculada.
  spanish_consistency_notes:
  - Se conservó la repetición de 'todos' en ambos miembros para reflejar el énfasis retórico del griego.
  - Se evitó 'SEÑOR' u otra sustitución teológica no presente en este versículo.
  - '''Mar'' se prefirió a ''mar Rojo'' porque el versículo no lo especifica explícitamente.'
