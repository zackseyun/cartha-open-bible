review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador transmite bien el sentido general del griego: mandato plural de comer lo que se vende en un mercado de carne, sin indagar, y mantiene la ambigüedad de «la conciencia». También preserva correctamente el valor específico de μάκελλον como mercado de carne y refleja adecuadamente μηδὲν ἀνακρίνοντες con una expresión idiomática.'
  spanish_quality_summary: La redacción es clara y natural, pero «de todo lo que se vende» introduce una preposición no exigida por el original y suena menos directa que una formulación más fiel al sustantivo neutro totalizador. Además, «por motivo de la conciencia» es comprensible, pero «por causa de la conciencia» o «a causa de la conciencia» suena más natural y más cercano al valor de διά con acusativo en este contexto.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Conciencia» preserva correctamente la indefinición contextual. La nota léxica sobre ἀνακρίνω está bien planteada y puede conservarse sin cambios sustanciales.
  issues:
  - severity: medium
    issue: «Coman de todo lo que se vende» añade «de» y debilita la fuerza directa de πᾶν τὸ ... πωλούμενον.
    rationale: El griego dice literalmente «todo lo que se vende ... coman». En español bíblico natural, «Coman todo lo que se vende...» refleja mejor la estructura y evita una ligera paráfrasis partitiva.
  - severity: low
    issue: «por motivo de la conciencia» suena algo forzado en español eclesial general.
    rationale: Aunque semánticamente defendible, «por causa de la conciencia» comunica mejor la motivación ética sin resolver el referente de «la conciencia».
  revised_spanish_text: Coman todo lo que se vende en el mercado de carnes[a], sin hacer preguntas por causa de la conciencia.
