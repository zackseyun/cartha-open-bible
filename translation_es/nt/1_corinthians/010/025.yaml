translation:
  language: es
  text: Coman todo lo que se vende en el mercado de carnes[a], sin hacer preguntas por causa de la conciencia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «sin hacer averiguaciones» o «sin examinar nada»; el sentido es no investigar el origen de la carne.
    reason: lexical_alternative
lexical_decisions:
- source_word: πᾶν τὸ ἐν μακέλλῳ πωλούμενον
  english_pob_choice: whatever is sold in the meat market
  chosen_spanish: de todo lo que se vende en el mercado de carnes
  alternatives_spanish:
  - de todo lo que se vende
  - de todo lo que se vende en el mercado
  lexicon: BDAG
  rationale: 'La frase articular neutra funciona como un sustantivo colectivo: no se trata de “todo” en abstracto, sino de cualquier cosa que esté siendo vendida en ese lugar. “De todo lo que se vende” conserva la amplitud; “mercado de carnes” refleja el valor específico de μάκελλον, no un mercado genérico.'
- source_word: ἐσθίετε
  english_pob_choice: Eat
  chosen_spanish: Coman
  alternatives_spanish:
  - Comed
  - Debéis comer
  lexicon: BDAG
  rationale: Es un imperativo presente, segunda plural. “Coman” es la forma natural y digna en español moderno para dar la orden/exhortación sin añadir matices no presentes en el griego.
- source_word: μηδὲν ἀνακρίνοντες
  english_pob_choice: asking no questions
  chosen_spanish: sin hacer preguntas
  alternatives_spanish:
  - sin examinar nada
  - sin investigar nada
  - sin preguntar nada
  lexicon: BDAG
  rationale: ἀνακρίνω puede significar examinar, investigar o preguntar. En este contexto, Pablo manda no indagar sobre el trasfondo de la carne. “Sin hacer preguntas” comunica esa fuerza práctica de manera idiomática en español.
- source_word: διὰ τὴν συνείδησιν
  english_pob_choice: for the sake of conscience
  chosen_spanish: por motivo de la conciencia
  alternatives_spanish:
  - por la conciencia
  - a causa de la conciencia
  - por respeto a la conciencia
  lexicon: BDAG
  rationale: διά con acusativo expresa aquí razón o motivación. “Por motivo de la conciencia” mantiene el valor causal sin decidir prematuramente de quién es la conciencia; preserva la tensión interpretativa que el contexto inmediato desarrollará.
theological_decisions:
- issue: Referente de 'la conciencia'
  english_pob_reading: Render generically as 'conscience' without specifying whether it is the eater's conscience or another person's until the following context clarifies it.
  chosen_spanish_reading: Traducir simplemente “la conciencia”, sin especificar todavía si es la del que come o la de otra persona.
  alternative_spanish_readings:
  - tu conciencia
  - la conciencia del otro
  rationale: El griego dice μόνο τὴν συνείδησιν sin identificar explícitamente el referente. La traducción conserva esa ambigüedad teológica y discursiva, en lugar de resolverla antes de tiempo.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla prematuramente.
translation_notes:
  revision_awareness: No hubo revisiones aplicadas en el control de calidad más reciente; la lectura se mantiene estable y en alta concordancia con la auditoría inglesa.
  spanish_consistency_notes:
  - He usado “mercado de carnes” para reflejar el sentido específico de μάκελλον, evitando el más genérico “mercado”.
  - He preferido “Coman” en un registro neutral latinoamericano, coherente con el tono bíblico actual en español.
  - La fórmula “sin hacer preguntas” mantiene la naturalidad española y el valor contextual de ἀνακρίνω sin sobreexplicar.
  - “Por motivo de la conciencia” conserva la ambigüedad del referente, en continuidad con la decisión inglesa de no especificarlo.
