translation:
  language: es
  text: Porque hay un solo pan[a], nosotros que somos muchos somos un solo cuerpo, pues todos participamos del único pan.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «una sola hogaza» en ambas apariciones de «pan». El griego ἄρτος puede designar un pan como unidad, lo cual puede hacer más concreta la imagen de muchos compartiendo una sola fuente.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὅτι
  english_pob_choice: Because
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introduce la explicación causal del verso anterior. En español, «Porque» conserva con naturalidad el valor explicativo/causal que el POB inglés expresa con «Because».
- source_word: εἷς ἄρτος
  english_pob_choice: one bread
  chosen_spanish: un solo pan
  alternatives_spanish:
  - un pan
  - una sola hogaza
  lexicon: BDAG
  rationale: ἄρτος puede significar «pan» o «hogaza» como unidad concreta. En español, «un solo pan» preserva la singularidad y suena natural; mantiene la posible resonancia sacramental sin forzar «hogaza» en el texto principal.
- source_word: ἓν σῶμα
  english_pob_choice: one body
  chosen_spanish: un solo cuerpo
  alternatives_spanish:
  - un cuerpo
  - un cuerpo solo
  lexicon: BDAG
  rationale: «Cuerpo» conserva el valor eclesial y teológico de σῶμα. Añadir «solo» refuerza la unidad que el griego subraya entre el pan único y el cuerpo único.
- source_word: οἱ πολλοί
  english_pob_choice: we who are many
  chosen_spanish: nosotros, siendo muchos
  alternatives_spanish:
  - los muchos
  - muchos de nosotros
  lexicon: BDAG
  rationale: El griego contrasta la pluralidad del grupo con su unidad. «Nosotros, siendo muchos» mantiene la referencia inclusiva a la comunidad y evita la frialdad de «los muchos».
- source_word: γὰρ
  english_pob_choice: for
  chosen_spanish: pues
  alternatives_spanish:
  - porque
  - ya que
  lexicon: BDAG
  rationale: Marca una segunda explicación. «Pues» funciona de manera natural en español y enlaza bien la razón con la afirmación anterior.
- source_word: πάντες
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todos nosotros
  - la totalidad
  lexicon: BDAG
  rationale: Conserva el énfasis de participación compartida de todo el grupo.
- source_word: ἐκ τοῦ ἑνὸς ἄρτου
  english_pob_choice: of the one bread
  chosen_spanish: del único pan
  alternatives_spanish:
  - de un solo pan
  - del un pan
  lexicon: BDAG
  rationale: Con μετέχομεν, ἐκ expresa la fuente o el objeto compartido. En español, «participamos del único pan» reproduce de forma idiomática esa relación sin perder la singularidad del pan.
- source_word: μετέχομεν
  english_pob_choice: partake
  chosen_spanish: participamos
  alternatives_spanish:
  - participamos de
  - tomamos parte
  lexicon: BDAG
  rationale: «Participar» transmite la idea de compartir realmente en algo común. En esta construcción, «participamos del» es idiomático en español y conserva el sentido de participación conjunta del pan.
theological_decisions:
- issue: Relación entre el pan único y el cuerpo único
  english_pob_reading: The verse preserves Paul's linkage between the shared bread and the unity of believers without specifying a denominational doctrine of the Lord's Supper.
  chosen_spanish_reading: El verso mantiene la unión entre el pan compartido y la unidad de los creyentes sin fijar una doctrina denominacional de la Cena del Señor.
  alternative_spanish_readings:
  - Una lectura más memorialista que subraye solo el símbolo de unidad.
  - Una lectura más sacramental que afirme un efecto eclesial fuerte por medio del pan.
  rationale: El griego afirma una relación real entre el pan único y el cuerpo único, pero no obliga a resolver debates posteriores sobre la ontología eucarística. La redacción española conserva esa tensión sin imponer una precisión doctrinal ajena al texto.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla.
translation_notes:
  revision_awareness: 'La versión sigue de cerca el análisis del POB inglés: conserva la causalidad de ὅτι y γὰρ, el contraste entre muchos/un solo cuerpo, y la idea de participación común en el pan único. No se introdujeron cambios de revisión respecto del contexto auditado.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto lo requiera; aquí no aparece ninguna referencia al nombre divino.
  - Se mantuvo «pan» en lugar de «hogaza» en el texto principal por naturalidad y continuidad litúrgica, dejando la alternativa en nota.
  - «Cuerpo» se conservó por la densidad eclesial de σῶμα; no se sustituyó por una paráfrasis como «comunidad».
  - «Participamos del» preserva la relación de compartir de μετέχομεν sin perder fluidez en español.
