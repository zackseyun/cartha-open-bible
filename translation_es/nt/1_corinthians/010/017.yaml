revisions:
- from: Porque hay un solo pan[a], nosotros, siendo muchos, somos un solo cuerpo, pues todos participamos del único pan.
  to: Porque hay un solo pan[a], nosotros que somos muchos somos un solo cuerpo, pues todos participamos del único pan.
  rationale: Se conserva la elección principal «hay un solo pan» por su claridad y cercanía al POB inglés, pero se mejora la fluidez y la cohesión sintáctica cambiando «nosotros, siendo muchos» por «nosotros que somos muchos», que refleja mejor οἱ πολλοί en español natural sin alterar el sentido. También se afina la nota para que «hogaza» concuerde con el femenino de la alternativa española.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:58Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite fielmente la estructura causal del griego: la unidad de los muchos como un solo cuerpo se fundamenta en la participación compartida en el único pan. Conserva bien εἷς ἄρτος / ἓν σῶμα / οἱ πολλοί / πάντες / μετέχομεν, y mantiene la tensión teológica sin resolver debates eucarísticos posteriores. Sin embargo, «hay» no está expresado en el griego y debilita ligeramente la relación más directa y aforística de «un solo pan».'
  spanish_quality_summary: El español es claro y legible, pero la apertura «Porque hay un solo pan» suena un poco explicativa de existencia más que identificativa, y se aleja de la compresión retórica del original. «Nosotros, siendo muchos» es comprensible, aunque «aunque somos muchos» o «siendo muchos» podrían funcionar; no exige cambio. El resto del verso es natural y digno.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Pan», «cuerpo» y «participamos» encajan bien. La nota con «hogaza» preserva correctamente la alternativa léxica documentada para ἄρτος.
  issues:
  - severity: medium
    issue: «Porque hay un solo pan» añade un verbo existencial no explícito en el griego
    rationale: 'ὅτι εἷς ἄρτος, ἓν σῶμα οἱ πολλοί ἐσμεν es más compacto: «Porque un solo pan, un solo cuerpo somos los muchos» en estructura subyacente. En español natural conviene explicitar parcialmente, pero «hay» desplaza el énfasis hacia la mera existencia del pan. «Porque hay un solo pan» es entendible, pero menos ceñido que «Porque es un solo pan…» o, mejor en español idiomático, «Porque hay un solo pan, nosotros que somos muchos…». Aun así, la mejor reparación es eliminar el giro parentético y hacer la cláusula más directa.'
  - severity: low
    issue: Leve pesadez estilística en «nosotros, siendo muchos»
    rationale: Es fiel a οἱ πολλοί, pero en español bíblico contemporáneo «nosotros, aunque somos muchos» o «nosotros que somos muchos» fluye un poco mejor. No obstante, esto es preferencia de estilo y no un error sustantivo.
  revised_spanish_text: Porque hay un solo pan[a], nosotros que somos muchos somos un solo cuerpo, pues todos participamos del único pan.
  revised_footnotes:
  - marker: a
    text: O «una sola hogaza» en ambas apariciones de «pan». El griego ἄρτος puede designar un pan como unidad, lo cual puede hacer más concreta la imagen de muchos compartiendo una sola fuente.
    reason: lexical_alternative
  revision_rationale: Se conserva la elección principal «hay un solo pan» por su claridad y cercanía al POB inglés, pero se mejora la fluidez y la cohesión sintáctica cambiando «nosotros, siendo muchos» por «nosotros que somos muchos», que refleja mejor οἱ πολλοί en español natural sin alterar el sentido. También se afina la nota para que «hogaza» concuerde con el femenino de la alternativa española.
