translation:
  language: es
  text: Tampoco debemos poner a prueba al Mesías[a], como algunos de ellos lo pusieron a prueba, y iban siendo destruidos por las serpientes[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Algunos manuscritos leen «el Señor» en vez de «el Mesías».
    reason: textual_variant
  - marker: b
    text: O «serpientes».
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδὲ
  english_pob_choice: Nor should
  chosen_spanish: Ni debemos
  alternatives_spanish:
  - Y no debemos
  - Tampoco debemos
  lexicon: BDAG
  rationale: Conserva la continuación prohibitiva del contexto inmediato y suena natural en español sin perder el valor exhortativo.
- source_word: ἐκπειράζωμεν
  english_pob_choice: put ... to the test
  chosen_spanish: poner a prueba
  alternatives_spanish:
  - tentar
  - probar
  lexicon: BDAG
  rationale: La expresión española mantiene el sentido de someter a alguien a una prueba impropia; evita 'tentar', que en español puede sugerir incitación al mal más que prueba.
- source_word: τὸν Χριστόν
  english_pob_choice: the Messiah
  chosen_spanish: al Mesías
  alternatives_spanish:
  - a Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título; por eso se traduce 'Mesías' según la política terminológica, preservando el valor titulado y no meramente nominal.
- source_word: καθώς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  lexicon: BDAG
  rationale: Introduce la comparación histórica de modo claro y directo en español.
- source_word: τινες αὐτῶν
  english_pob_choice: some of them
  chosen_spanish: algunos de ellos
  alternatives_spanish:
  - unos de ellos
  - algunos entre ellos
  lexicon: BDAG
  rationale: Renderiza con naturalidad la referencia a una parte de la generación del desierto.
- source_word: ἐπείρασαν
  english_pob_choice: tested him
  chosen_spanish: lo pusieron a prueba
  alternatives_spanish:
  - lo probaron
  - lo tentaron
  lexicon: BDAG
  rationale: Retoma el mismo campo semántico del verbo anterior para conservar el paralelismo y el objeto implícito de la acción.
- source_word: ὑπὸ τῶν ὄφεων
  english_pob_choice: by the snakes
  chosen_spanish: por las serpientes
  alternatives_spanish:
  - por las culebras
  lexicon: BDAG
  rationale: ὄφις puede ser 'serpiente' o 'culebra'; 'serpientes' es la opción más amplia y natural en español bíblico contemporáneo.
- source_word: ἀπώλλυντο
  english_pob_choice: were being destroyed
  chosen_spanish: eran destruidos
  alternatives_spanish:
  - perecían
  - iban siendo destruidos
  lexicon: BDAG
  rationale: Refleja el aspecto imperfectivo del griego como una acción en desarrollo, sin forzar una perífrasis demasiado pesada.
theological_decisions:
- issue: Lectura de Χριστόν como título mesiánico y no como nombre litúrgico
  english_pob_reading: the Messiah
  chosen_spanish_reading: el Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: El texto griego usa el título Χριστός en una referencia teológica al objeto del acto de prueba. En español, 'Mesías' preserva el carácter titular conforme a la política del proyecto, evitando el uso automático de un nombre eclesiástico.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names. Χριστός → Mesías cuando funciona como título.'
- issue: Variación textual de τὸν Χριστόν / τὸν κύριον
  english_pob_reading: Some manuscripts read 'the Lord' instead of 'the Messiah' (or 'Christ').
  chosen_spanish_reading: al Mesías
  alternative_spanish_readings:
  - al Señor
  rationale: La lectura base sigue SBLGNT, pero la variante textual importante se conserva en nota para no borrar el testimonio manuscrito relevante.
  doctrine_reference: 'Textual criticism policy: preserve significant variants in footnotes rather than harmonizing them silently.'
translation_notes:
  revision_awareness: 'La redacción se alinea con la última restauración de la política terminológica: Χριστός se vierte como ''Mesías'' en el texto principal, mientras la variante manuscrita ''el Señor'' queda preservada en nota. También se mantuvo el valor aspectual del imperfecto en una forma española natural.'
  spanish_consistency_notes:
  - Se mantuvo 'Mesías' en lugar de 'Cristo' para Χριστός cuando funciona como título.
  - '''Poner a prueba'' se usó de manera consistente para ἐκπειράζω/πειράζω en este contexto.'
  - '''Serpientes'' se eligió como término neutral y ampliamente inteligible frente a ''culebras''.'
  - La pasiva imperfectiva griega se reflejó con 'eran destruidos', aceptando una solución española fluida.
