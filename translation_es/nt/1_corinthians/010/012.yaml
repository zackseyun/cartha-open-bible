  rationale: Se reemplaza «está firme» por «está en pie» para no añadir el matiz de firmeza que el griego no explicita y que la auditoría inglesa rechazó. También se ajusta «mire que no caiga» a «tenga cuidado de no caer» para una advertencia más natural y ampliamente legible en español. La nota alternativa se actualiza en la misma línea.
