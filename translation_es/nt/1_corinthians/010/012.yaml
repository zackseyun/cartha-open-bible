    rationale: Aunque comprensible, no es la opción más natural ni más clara en español eclesial amplio para βλεπέτω μὴ πέσῃ. «Tenga cuidado de no caer» transmite mejor la advertencia continua y la relación con la cláusula negativa.
  - severity: low
