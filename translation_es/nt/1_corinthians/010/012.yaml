translation:
  language: es
  text: Por tanto[a], el que piensa que está en pie, tenga cuidado de no caer.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «Así que, el que piensa que está de pie, esté atento para no caer»'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὥστε
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Así que
  - Por eso
  lexicon: BDAG
  rationale: La partícula inferencial introduce una conclusión lógica. «Por tanto» mantiene ese valor conclusivo en español con tono natural y digno.
- source_word: ὁ δοκῶν
  english_pob_choice: the one who thinks
  chosen_spanish: el que piensa
  alternatives_spanish:
  - quien piensa
  - el que supone
  lexicon: BDAG
  rationale: El participio con artículo funciona de manera sustantiva y singular representativa. «El que piensa» conserva esa estructura sin generalizar indebidamente.
- source_word: ἑστάναι
  english_pob_choice: he stands
  chosen_spanish: está firme
  alternatives_spanish:
  - está de pie
  - está en pie
  lexicon: BDAG
  rationale: El infinitivo perfecto expresa un estado de estar en pie/firmemente establecido. En español, «está firme» comunica de modo idiomático la idea de estabilidad implícita en el contexto de advertencia.
- source_word: βλεπέτω
  english_pob_choice: watch out
  chosen_spanish: mire que
  alternatives_spanish:
  - esté atento a
  - tenga cuidado de
  lexicon: BDAG
  rationale: El imperativo presente pide vigilancia continua. «Mire que» reproduce bien la advertencia directa y mantiene un registro natural en español bíblico contemporáneo.
- source_word: μὴ πέσῃ
  english_pob_choice: lest he fall
  chosen_spanish: no caiga
  alternatives_spanish:
  - no llegue a caer
  - no se caiga
  lexicon: BDAG
  rationale: La combinación μή + subjuntivo aoristo expresa una advertencia negativa sin especificar el tipo de caída. «No caiga» conserva esa amplitud y evita precisar más de lo que el griego dice.
theological_decisions:
- issue: Alcance de «caer»
  english_pob_reading: Retain the general warning 'fall' without specifying whether it means apostasy, moral failure, or participation in idolatrous judgment.
  chosen_spanish_reading: Mantener «caiga» de manera general, sin determinar si se trata de apostasía, fracaso moral o juicio.
  alternative_spanish_readings:
  - caiga en pecado
  - caiga bajo juicio
  - se aparte
  rationale: El verbo griego πέσῃ no especifica el alcance teológico de la caída. Conservar la amplitud preserva la tensión del contexto sin resolver una cuestión debatida.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
- issue: Representación singular masculina
  english_pob_reading: Use 'he' in 'he stands ... he fall' to reflect the singular masculine Greek while intending a generic representative sense.
  chosen_spanish_reading: Usar «el que» y la concordancia verbal singular masculina implícita en el sujeto representativo.
  alternative_spanish_readings:
  - la persona que piensa que está firme
  - quien piensa que está firme
  rationale: El griego es masculino singular y funciona de forma representativa. El español puede conservar esa forma sin perder claridad ni forzar neutralizaciones ajenas al texto.
  doctrine_reference: 'Translation philosophy §4: Gender-accurate over gender-neutral.'
translation_notes:
  revision_awareness: 'Se corrigió la falta del ancla de nota al pie: el marcador [a] ahora aparece en el texto español. Se mantuvo la lectura general de la advertencia sin concretar el tipo de caída, de acuerdo con el audit trail inglés.'
  spanish_consistency_notes:
  - Se evitó «SEÑOR» porque no aplica en este versículo.
  - Se mantuvo un español bíblico moderno y natural, sin calco innecesario.
  - «Está firme» recoge mejor el matiz de estado estable que una simple presencia física.
