    issue: Las notas al pie están ancladas en las frases equivocadas.
    rationale: La nota [a] explica ἀνακρίνοντες (‘sin examinar nada’, ‘sin hacer averiguaciones’), pero está colocada después de “delante”. La nota [b] trata de “conciencia”, pero el marcador no está sobre esa palabra. Esto rompe la trazabilidad exigida entre texto y notas.
  - severity: low
    issue: “Coman de todo lo que les pongan delante” suena menos directo que el original.
    rationale: La preposición “de” introduce una matiz partitivo no requerido por πᾶν τὸ παρατιθέμενον. “Coman todo lo que les pongan delante” o “coman lo que les pongan delante” representa mejor el alcance de la instrucción y suena más limpio en español.
  revised_spanish_text: Si alguno de los incrédulos los invita y ustedes quieren ir, coman todo lo que les pongan delante, sin hacer preguntas[a] por causa de la conciencia[b].
