  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido del griego: invitación de parte de no creyentes, voluntad de asistir, mandato de comer lo servido, y prohibición de indagar por consideración de la conciencia. Sin embargo, el anclaje de las notas está invertido respecto del contenido: la nota léxica sobre ἀνακρίνοντες debe ir con “sin hacer preguntas”, no con “delante”; y la nota sobre conciencia debe anclarse en “conciencia”, no en la comida servida.'
  spanish_quality_summary: El español es claro, natural y apropiado para un registro bíblico moderno. “Los incrédulos”, “los invita”, “ustedes quieren ir” y “sin hacer preguntas” son legibles. Hay una mejora menor de naturalidad y precisión en “coman todo lo que les pongan delante” frente a “coman de todo lo que les pongan delante”, que evita una partitiva innecesaria y se acerca mejor al mandato amplio del original.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. “Incrédulos” concuerda con ἀπίστων; “conciencia” preserva συνείδησις sin resolver prematuramente la referencia. No aparecen términos sensibles del glosario mayor. La decisión de mantener la ambigüedad teológica está bien aplicada.
  issues:
