    text: Or, 'without examining anything' or 'without making inquiries.' The sense is not to investigate the food's background.
    reason: lexical_alternative
  - marker: b
    text: '''Conscience'' is clarified in the following verse, where Paul distinguishes the other person''s conscience from your own.'
