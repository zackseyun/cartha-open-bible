translation:
  language: es
  text: Si alguno de los incrédulos los invita y ustedes quieren ir, coman todo lo que les pongan delante, sin hacer preguntas[a] por causa de la conciencia[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: “sin examinar nada” o “sin hacer averiguaciones”. La idea no es investigar el origen de la comida.'
    reason: lexical_alternative
  - marker: b
    text: “Conciencia” queda más claro en el versículo siguiente, donde Pablo distingue la conciencia de la otra persona de la propia.
    reason: cross_reference
lexical_decisions:
- source_word: καλεῖ
  english_pob_choice: invites
  chosen_spanish: los invita
  alternatives_spanish:
  - los llama
  - los convoca
  lexicon: BDAG
  rationale: En un contexto de comida en casa, καλέω significa una invitación social, no simplemente “llamar”. “Invita” transmite de forma natural el escenario doméstico del versículo.
- source_word: ἀπίστων
  english_pob_choice: unbelievers
  chosen_spanish: los incrédulos
  alternatives_spanish:
  - los no creyentes
  - los no creyentes en la fe
  lexicon: BDAG
  rationale: “Incrédulos” conserva la distinción paulina entre dentro y fuera de la comunidad de fe. Es una forma idiomática en español y no añade una hostilidad que el texto no expresa.
- source_word: θέλετε πορεύεσθαι
  english_pob_choice: you want to go
  chosen_spanish: ustedes quieren ir
  alternatives_spanish:
  - ustedes desean ir
  - ustedes están dispuestos a ir
  lexicon: BDAG
  rationale: La combinación expresa voluntad o disposición para aceptar la invitación. “Quieren ir” es natural y mantiene la condicionalidad del enunciado.
- source_word: πᾶν τὸ παρατιθέμενον ὑμῖν
  english_pob_choice: whatever is set before you
  chosen_spanish: de todo lo que les pongan delante
  alternatives_spanish:
  - todo lo que les sirvan
  - lo que sea puesto delante de ustedes
  lexicon: BDAG
  rationale: El participio articular se refiere a lo servido en la mesa. “De todo lo que les pongan delante” conserva el alcance general de πᾶν y suena natural en español bíblico contemporáneo.
- source_word: ἐσθίετε
  english_pob_choice: eat
  chosen_spanish: coman
  alternatives_spanish:
  - estén comiendo
  - coman de ello
  lexicon: BDAG
  rationale: El imperativo presente da una instrucción general. “Coman” comunica el mandato con claridad sin sobrecargar el aspecto verbal.
- source_word: μηδὲν ἀνακρίνοντες
  english_pob_choice: asking no questions
  chosen_spanish: sin hacer preguntas
  alternatives_spanish:
  - sin examinar nada
  - sin investigar nada
  - sin preguntar nada
  lexicon: BDAG
  rationale: ἀνακρίνω puede significar examinar, investigar o preguntar. En este contexto, la idea práctica es no indagar sobre el origen de la comida; “sin hacer preguntas” preserva esa fuerza de manera natural.
- source_word: διὰ τὴν συνείδησιν
  english_pob_choice: for the sake of conscience
  chosen_spanish: por causa de la conciencia
  alternatives_spanish:
  - a causa de la conciencia
  - en consideración a la conciencia
  lexicon: BDAG
  rationale: διά con acusativo expresa motivo o consideración. “Por causa de la conciencia” es fiel y mantiene abierta la referencia que el versículo siguiente aclara.
theological_decisions:
- issue: Sentido de συνείδησις en el contexto inmediato
  english_pob_reading: La frase se refiere de manera general a la conciencia como consideración moral en la situación de la comida, y la aclaración más completa llega en el versículo siguiente.
  chosen_spanish_reading: La frase se entiende de manera general como una consideración de conciencia en la situación de la comida, dejando que el versículo siguiente precise el alcance.
  alternative_spanish_readings:
  - Se refiere específicamente a la propia conciencia del creyente
  - Anticipa la conciencia de la otra persona mencionada en el versículo siguiente
  rationale: El griego es deliberadamente breve. Conviene conservar la ambigüedad productiva del texto en el cuerpo principal y no resolver aquí una identificación que el contexto inmediato todavía está desarrollando.
  doctrine_reference: Preservar la tensión teológica sin resolverla prematuramente.
translation_notes:
  revision_awareness: 'La redacción sigue la revisión más reciente del POB inglés: se prefirió un equivalente natural y preciso de πᾶν τὸ παρατιθέμενον, aquí expresado como “de todo lo que les pongan delante”, manteniendo la instrucción general y la ausencia de indagación sobre la comida.'
  spanish_consistency_notes:
  - Se conservó “incrédulos” como término de distinción comunitaria, coherente con el audit trail inglés.
  - Se evitó “SEÑOR” o vocabulario eclesiástico tradicional no pertinente; el versículo no contiene esos términos.
  - “Conciencia” se mantuvo sin especificarla indebidamente en el texto principal, y la nota remite al versículo siguiente.
  - La construcción “sin hacer preguntas” refleja la función práctica de ἀνακρίνοντες sin cargarla con tecnicismos innecesarios.
