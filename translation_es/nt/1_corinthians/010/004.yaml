translation:
  language: es
  text: y todos bebieron la misma bebida espiritual, porque bebían de una roca espiritual que los seguía[a], y la roca era el Mesías[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la roca espiritual que los seguía». El participio griego puede verterse de forma más simple como «seguía», pero una formulación progresiva como «iba siguiendo» reflejaría mejor el aspecto durativo.
    reason: lexical_alternative
  - marker: b
    text: Griego «Cristo». Aquí se traduce «Mesías» porque Χριστός funciona como título y no como forma meramente nominal.
    reason: alternative_reading
lexical_decisions:
- source_word: πνευματικὸν ... πόμα
  english_pob_choice: spiritual drink
  chosen_spanish: bebida espiritual
  alternatives_spanish:
  - beber espiritual
  - bebida del Espíritu
  lexicon: BDAG
  rationale: πόμα designa una bebida; en español, «bebida espiritual» conserva la relación con el paralelismo del contexto y mantiene el valor de πνευματικός como cualidad de la provisión divina sin convertirlo en una paráfrasis interpretativa.
- source_word: ἔπιον
  english_pob_choice: drank
  chosen_spanish: bebieron
  alternatives_spanish:
  - tomaron
  - bebieron de
  lexicon: BDAG
  rationale: El aoristo resume la acción compartida de todo el grupo; el pasado simple «bebieron» es natural en español y suficientemente preciso.
- source_word: ἔπινον
  english_pob_choice: were drinking
  chosen_spanish: bebían
  alternatives_spanish:
  - estaban bebiendo
  - bebieron
  lexicon: BDAG
  rationale: El imperfecto expresa acción continua o repetida; «bebían» comunica bien ese aspecto sin sonar forzado en español.
- source_word: ἐκ πνευματικῆς ἀκολουθούσης πέτρας
  english_pob_choice: from a spiritual rock that was following them
  chosen_spanish: de una roca espiritual que los seguía
  alternatives_spanish:
  - de una roca espiritual que iba siguiéndolos
  - de una roca espiritual que los acompañaba
  lexicon: BDAG
  rationale: «De una roca espiritual» refleja el genitivo con artículo ausente y evita imponer definitud que el griego no marca aquí. «Que los seguía» conserva el participio presente ἀκολουθούσης con un valor durativo razonable en español, manteniendo la tensión teológica/figurativa del texto.
- source_word: πέτρα
  english_pob_choice: rock
  chosen_spanish: roca
  alternatives_spanish:
  - peña
  - piedra
  lexicon: BDAG
  rationale: πέτρα se refiere a una roca/peña grande, no a una piedra pequeña; «roca» es la opción más clara y fiel.
- source_word: ἡ πέτρα δὲ ἦν
  english_pob_choice: and the rock was
  chosen_spanish: y la roca era
  alternatives_spanish:
  - y la roca fue
  - pero la roca era
  lexicon: BDAG
  rationale: «Y» reproduce de forma sobria la transición de δέ sin exagerar contraste; «era» mantiene bien la copulación identitaria en español.
- source_word: ὁ Χριστός
  english_pob_choice: the Messiah
  chosen_spanish: el Mesías
  alternatives_spanish:
  - Cristo
  lexicon: BDAG
  rationale: Dado que el audit trail inglés ya justifica Χριστός como título, «Mesías» preserva el valor titular y evita un nombre-forma meramente tradicional. En español, además, resulta más transparente para lectores que no quieran asumir de entrada el uso confesional de «Cristo».
- source_word: πάντες τὸ αὐτὸ
  english_pob_choice: all ... the same
  chosen_spanish: todos ... la misma
  alternatives_spanish:
  - todos ... igual
  - cada uno ... la misma
  lexicon: BDAG
  rationale: La combinación «todos» + «la misma» expresa con claridad la experiencia compartida por todo el grupo, en línea con el énfasis paulino.
theological_decisions:
- issue: Identificación de «la roca» con el Mesías
  english_pob_reading: 'Typological identification: the wilderness rock is identified with the Messiah in a real theological sense within Paul''s argument, without flattening the metaphor into a mere equation of material object and person.'
  chosen_spanish_reading: 'Identificación tipológica: la roca del desierto es identificada con el Mesías en el argumento de Pablo, sin reducir la metáfora a una simple equivalencia material.'
  alternative_spanish_readings:
  - La roca representaba al Mesías.
  - La roca aludía al Mesías.
  rationale: La cláusula copulativa griega es directa; la traducción debe conservar esa fuerza sin resolver la relación de manera más débil de lo que el texto permite. «Era el Mesías» mantiene la tensión cristológica y tipológica tal como la expresa Pablo.
  doctrine_reference: Translation philosophy §3; Contested terms table for Χριστός
- issue: Sentido de «espiritual» en la bebida y la roca
  english_pob_reading: '''Spiritual'' is retained as Paul''s descriptor of divinely given, typologically significant provision, rather than reduced to ''symbolic'' or ''miraculous'' in the main text.'
  chosen_spanish_reading: «Espiritual» se mantiene como descriptor de la provisión dada por Dios y cargada de sentido tipológico, no como mera equivalencia de «simbólica» o «milagrosa».
  alternative_spanish_readings:
  - simbólica
  - milagrosa
  rationale: Pablo usa πνευματικός para marcar una cualidad relacionada con el ámbito del Espíritu y con el significado teológico de la provisión; conservar «espiritual» evita estrechar indebidamente el término.
  doctrine_reference: Translation philosophy §1, §3, §5
translation_notes:
  revision_awareness: He tenido en cuenta la revisión más reciente del inglés POB, que prefirió una expresión más natural para el participio ἀκολουθούσης sin perder el aspecto durativo. En español, «que los seguía» cumple esa misma función de forma natural y formal, sin necesidad de una perífrasis más pesada. También conservé la lectura cristológica titular de Χριστός como «Mesías», coherente con el audit trail y con la política terminológica del proyecto.
  spanish_consistency_notes:
  - Usé «Mesías» en lugar de «Cristo» en el texto principal para seguir la decisión auditada del POB inglés y evitar una forma meramente eclesiástica.
  - Mantuve «espiritual» en ambos usos para respetar el paralelismo paulino con el versículo anterior.
  - Elegí «roca» de manera consistente para πέτρα, evitando alternar con «piedra» o «peña» porque el contexto tipológico favorece una sola imagen estable.
