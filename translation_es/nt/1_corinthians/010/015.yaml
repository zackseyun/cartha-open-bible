translation:
  language: es
  text: Les hablo como a personas sensatas[a]; juzguen ustedes[b] lo que digo.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «personas sabias» o «personas prudentes».
    reason: lexical_alternative
  - marker: b
    text: O «ustedes mismos juzguen lo que digo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as to
  chosen_spanish: Como a
  alternatives_spanish:
  - como
  - en calidad de
  lexicon: BDAG
  rationale: En español, "como a" comunica de manera natural que Pablo se dirige a ellos en cierta condición o perspectiva, equivalente al valor de dirección/relación de ὡς sin sonar rígido.
- source_word: φρονίμοις
  english_pob_choice: sensible people
  chosen_spanish: personas sensatas
  alternatives_spanish:
  - personas sabias
  - personas prudentes
  lexicon: BDAG
  rationale: φρόνιμος expresa sensatez, prudencia y buen juicio práctico. "Sensatas" conserva ese matiz de discernimiento cotidiano sin elevar innecesariamente el tono a "sabias".
- source_word: λέγω
  english_pob_choice: I speak
  chosen_spanish: les hablo
  alternatives_spanish:
  - digo
  - les digo
  lexicon: BDAG
  rationale: En español, "les hablo" mantiene el acto retórico de dirigirse a ellos y suena más natural con la construcción "como a..."; no desplaza el sentido de λέγω.
- source_word: κρίνατε
  english_pob_choice: judge
  chosen_spanish: juzguen
  alternatives_spanish:
  - decidan
  - disciernan
  lexicon: BDAG
  rationale: El imperativo aoristo llama a una evaluación. "Juzguen" conserva la conexión léxica con κρίνω y la fuerza exhortativa del texto.
- source_word: ὑμεῖς
  english_pob_choice: for yourselves
  chosen_spanish: ustedes
  alternatives_spanish:
  - ustedes mismos
  - por ustedes mismos
  lexicon: BDAG
  rationale: El pronombre explícito es enfático. En español, ese énfasis puede mantenerse con el sujeto expreso "ustedes"; si se quisiera reforzar más, "ustedes mismos" sería posible, pero no es necesario para la claridad.
- source_word: ὅ
  english_pob_choice: what
  chosen_spanish: lo que
  alternatives_spanish:
  - aquello que
  - lo cual
  lexicon: BDAG
  rationale: El relativo neutro funciona como objeto de φημί. "Lo que" es la correspondencia natural y clara en español.
- source_word: φημι
  english_pob_choice: I say
  chosen_spanish: digo
  alternatives_spanish:
  - estoy diciendo
  - afirmo
  lexicon: BDAG
  rationale: φημί suele equivaler a "decir/afirmar". "Digo" es breve, idiomático y mantiene el paralelismo con el primer verbo sin sobreinterpretar.
theological_decisions:
- issue: Carácter del apelativo a los corintios
  english_pob_reading: Paul addresses the Corinthians as capable of sound discernment without implying moral approval of all their behavior.
  chosen_spanish_reading: Pablo se dirige a los corintios como personas capaces de discernir bien, sin que eso signifique aprobar toda su conducta.
  alternative_spanish_readings:
  - Pablo los llama sabios de manera irónica
  - Pablo los elogia sin reservas como sabios
  rationale: '"Personas sensatas" conserva una valoración positiva moderada y deja abierta la tensión retórica del contexto. No fuerza una ironía que el verso no exige ni suaviza el llamado a evaluar el argumento.'
  doctrine_reference: Preservar la tensión retórica y el juicio prudente del contexto apostólico.
translation_notes:
  revision_awareness: Se siguió el pasaje griego directo y el audit trail en inglés; no se requirieron revisiones previas, y se mantuvo la apelación retórica sin explicitar ironía ni elogio pleno.
  spanish_consistency_notes:
  - Se mantiene «Dios», «Jesús», «Mesías» y «Yahvé» como terminología base del proyecto, aunque este versículo no los contiene.
  - Se preserva la conexión léxica con κρίνω mediante «juzguen».
  - Se optó por un español natural y eclesialmente readable, evitando calcos excesivos como «yo digo como a» o «juzguen para ustedes mismos» si no era necesario.
