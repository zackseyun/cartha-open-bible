translation:
  language: es
  text: Por tanto, ya sea que coman o beban, o cualquier cosa que hagan, hagan todo para la gloria de Dios.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Εἴτε ... εἴτε ... εἴτε
  english_pob_choice: whether ... or ... or
  chosen_spanish: ya sea que ... o ... o ...
  alternatives_spanish:
  - si ... o ... o ...
  - ya sea ... o ... o ...
  lexicon: BDAG
  rationale: La serie correlativa introduce casos alternativos. En español, 'ya sea que ... o ... o ...' conserva bien la estructura distributiva y suena natural en un registro bíblico actual.
- source_word: οὖν
  english_pob_choice: Therefore
  chosen_spanish: Así que
  alternatives_spanish:
  - Por tanto
  - Entonces
  lexicon: BDAG
  rationale: οὖν marca inferencia. 'Así que' expresa la conclusión de manera clara y fluida en español contemporáneo, manteniendo el valor inferencial sin sonar excesivamente técnico.
- source_word: ἐσθίετε
  english_pob_choice: you eat
  chosen_spanish: coman
  alternatives_spanish:
  - comen
  - ustedes comen
  lexicon: BDAG
  rationale: El presente aquí es genérico y exhortativo en contexto. En español, el subjuntivo exhortativo plural comunica naturalmente la instrucción general.
- source_word: πίνετε
  english_pob_choice: drink
  chosen_spanish: beban
  alternatives_spanish:
  - tomen
  - ustedes beban
  lexicon: BDAG
  rationale: Como con 'coman', el contexto pide una forma exhortativa general. 'Beban' conserva el paralelismo con 'coman' y evita un giro poco natural.
- source_word: τι
  english_pob_choice: whatever
  chosen_spanish: cualquier otra cosa
  alternatives_spanish:
  - lo que sea
  - cualquier cosa
  lexicon: BDAG
  rationale: En esta construcción, τι amplía el alcance más allá de comer y beber. 'Cualquier otra cosa' transmite bien la amplitud total en español sin perder la referencia a acciones concretas.
- source_word: ποιεῖτε
  english_pob_choice: you do / do
  chosen_spanish: hagan
  alternatives_spanish:
  - hacen
  - ustedes hagan
  lexicon: BDAG
  rationale: El verbo se usa primero en la cláusula relativa y luego en la exhortación principal. En español, 'hagan' funciona de forma natural como imperativo exhortativo plural y mantiene la fuerza general del texto.
- source_word: πάντα
  english_pob_choice: everything
  chosen_spanish: todo
  alternatives_spanish:
  - todo esto
  - todas las cosas
  lexicon: BDAG
  rationale: El plural neutro abarca la totalidad de acciones. 'Todo' es la forma más idiomática y concisa en español para expresar esa totalidad.
- source_word: εἰς δόξαν
  english_pob_choice: for the glory
  chosen_spanish: para la gloria
  alternatives_spanish:
  - para gloria
  - hacia la gloria
  lexicon: BDAG
  rationale: εἰς con δόξαν expresa propósito o meta. 'Para la gloria' comunica ese fin de manera natural y fiel en español.
- source_word: θεοῦ
  english_pob_choice: of God
  chosen_spanish: de Dios
  alternatives_spanish:
  - de Dios mismo
  lexicon: BDAG
  rationale: El genitivo se traduce de forma directa como 'de Dios', preservando la relación posesiva/relacional del sintagma 'la gloria de Dios'.
theological_decisions:
- issue: Alcance de la exhortación
  english_pob_reading: 'A universal ethical principle: all ordinary actions are to be directed toward God''s glory.'
  chosen_spanish_reading: 'Un principio ético universal: todas las acciones ordinarias deben orientarse a la gloria de Dios.'
  alternative_spanish_readings:
  - Una instrucción limitada solo a comer y beber
  - Un principio general que nace del caso específico pero lo supera
  rationale: El movimiento del versículo va de ejemplos concretos a la fórmula totalizante 'cualquier otra cosa' y 'todo'. La traducción debe conservar ese alcance universal sin reducirlo al tema alimentario inmediato.
  doctrine_reference: Translation philosophy §3 (preservar la tensión teológica y no resolverla prematuramente)
translation_notes:
  revision_awareness: El texto griego y el contexto auditado en inglés están en alto acuerdo; no se reportan revisiones aplicadas. Se conservó la expansión universal del cierre y el valor inferencial de οὖν.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, conforme al estándar del proyecto.
  - Se evitó 'Cristo' o 'Señor' porque el versículo no los contiene.
  - Se eligió una exhortación plural natural en español ('coman', 'beban', 'hagan') para reflejar la generalidad del griego sin forzar un calco sintáctico.
