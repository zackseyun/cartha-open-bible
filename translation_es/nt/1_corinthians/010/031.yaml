revisions:
- from: Así que, ya sea que coman o beban, o cualquier otra cosa que hagan, háganlo todo para la gloria de Dios.
  to: Por tanto, ya sea que coman o beban, o cualquier cosa que hagan, hagan todo para la gloria de Dios.
  rationale: La revisión elimina un matiz no sustentado por el griego ('otra'), fortalece la conexión inferencial de οὖν con 'Por tanto' y alisa la exhortación final para una expresión más natural y fiel del alcance universal de πάντα.
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:29Z'
review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido global del griego: una inferencia conclusiva seguida de una serie correlativa (''ya sea... o... o...'') que culmina en una exhortación universal a hacerlo todo para la gloria de Dios. Sin embargo, introduce ''otra'' en ''cualquier otra cosa'', matiz que no está en τι y que puede sugerir una distinción innecesaria frente a comer y beber. También la secuencia verbal mezcla subordinadas con subjuntivo (''coman'', ''beban'', ''hagan'') y luego un imperativo (''háganlo''), lo cual es posible en español, pero puede afinarse para reflejar con mayor naturalidad el patrón del original y la amplitud de ''whatever you do''.'
  spanish_quality_summary: El texto es claro y legible en español eclesial contemporáneo. 'Así que' funciona, aunque 'Por tanto' refleja con algo más de precisión y solemnidad el valor inferencial de οὖν. La frase 'o cualquier otra cosa que hagan' suena natural, pero 'o cualquier cosa que hagan' es más fiel y más limpia. Además, 'háganlo todo' puede interpretarse como retomar solo lo anterior; 'háganlo todo para la gloria de Dios' es entendible, pero 'hagan todo para la gloria de Dios' suena más directo y natural.
  glossary_alignment: No hay conflictos mayores con el glosario del proyecto. θεοῦ está bien como 'Dios'. No hay términos teológicos de alto riesgo. La principal observación léxica es evitar añadir 'otra', ya que el griego τι no exige ese matiz.
  issues:
  - severity: medium
    issue: Se añadió 'otra' en 'cualquier otra cosa'.
    rationale: El griego τι en εἴτε τι ποιεῖτε significa 'cualquier cosa' o 'lo que sea que hagan', no necesariamente 'alguna otra cosa' distinta de comer y beber. 'Otra' estrecha o matiza el alcance sin base textual.
  - severity: low
    issue: La inferencia de οὖν podría representarse mejor con 'Por tanto'.
    rationale: '''Así que'' es aceptable, pero ''Por tanto'' se alinea mejor con el tono exhortativo y con el ''Therefore'' documentado en la auditoría inglesa.'
  - severity: low
    issue: La formulación final puede hacerse más natural en español.
    rationale: '''Háganlo todo'' es comprensible, pero ''hagan todo para la gloria de Dios'' fluye mejor y expresa directamente πάντα ... ποιεῖτε.'
  revised_spanish_text: Por tanto, ya sea que coman o beban, o cualquier cosa que hagan, hagan todo para la gloria de Dios.
  revision_rationale: La revisión elimina un matiz no sustentado por el griego ('otra'), fortalece la conexión inferencial de οὖν con 'Por tanto' y alisa la exhortación final para una expresión más natural y fiel del alcance universal de πάντα.
