translation:
  language: es
  text: ¿Qué, entonces, digo? ¿Que la comida sacrificada a los ídolos es algo[a][b], o que un ídolo es algo?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «que una ofrenda a los ídolos equivale a algo».
    reason: lexical_alternative
  - marker: b
    text: Es decir, Pablo no está afirmando que los ídolos tengan existencia divina real ni que la comida sacrificada tenga en sí misma un significado espiritual intrínseco.
    reason: cross_reference
lexical_decisions:
- source_word: τί οὖν φημι
  english_pob_choice: What then am I saying?
  chosen_spanish: ¿Qué, pues, digo?
  alternatives_spanish:
  - ¿Qué, pues, estoy diciendo?
  - ¿Qué, entonces, digo?
  lexicon: BDAG
  rationale: La pregunta retórica se vierte de manera natural en español, conservando el presente y la primera persona de φημί. «¿Qué, pues, digo?» reproduce bien el tono argumentativo de Pablo sin añadir explicaciones.
- source_word: ὅτι
  english_pob_choice: That
  chosen_spanish: ¿Que
  alternatives_spanish:
  - que
  - es decir que
  lexicon: BDAG
  rationale: Introduce el contenido de la pregunta retórica con una subordinación simple. En español, «¿Que...?» mantiene la estructura directa y el ritmo del griego sin sobreexplicar.
- source_word: εἰδωλόθυτόν
  english_pob_choice: food sacrificed to idols
  chosen_spanish: lo sacrificado a los ídolos
  alternatives_spanish:
  - alimento sacrificado a los ídolos
  - carne sacrificada a los ídolos
  - lo ofrecido a los ídolos
  lexicon: BDAG
  rationale: El término designa la comida/alimento vinculado al sacrificio pagano. «Lo sacrificado a los ídolos» conserva la referencia al acto sacrificial y evita estrechar innecesariamente el sentido a solo «carne» o solo «alimento».
- source_word: τί ἐστιν
  english_pob_choice: is anything
  chosen_spanish: es algo
  alternatives_spanish:
  - es algo de provecho
  - tiene alguna importancia
  - es algo realmente
  lexicon: BDAG
  rationale: La expresión pregunta si tiene realidad o importancia en el sentido relevante del argumento. «Es algo» preserva la brevedad retórica del griego y la ambigüedad teológica que Pablo deja abierta en el contexto.
- source_word: ἢ
  english_pob_choice: or
  chosen_spanish: o
  alternatives_spanish:
  - o bien
  - u
  lexicon: BDAG
  rationale: Conjunción disyuntiva simple, equivalente directo en español.
- source_word: εἴδωλον
  english_pob_choice: an idol
  chosen_spanish: un ídolo
  alternatives_spanish:
  - una imagen idolátrica
  - un dios falso
  lexicon: BDAG
  rationale: «Ídolo» es el equivalente normal y preciso en español para εἴδωλον en este contexto. Mantiene la fuerza lexical y el contraste con «lo sacrificado a los ídolos».
theological_decisions:
- issue: Si el versículo afirma o niega alguna realidad o significación de los ídolos y de lo sacrificado a ellos
  english_pob_reading: 'Render the questions straightforwardly and rhetorically: ''That food sacrificed to idols is anything, or that an idol is anything?'''
  chosen_spanish_reading: 'Traducir las preguntas de modo directo y retórico: «¿Que lo sacrificado a los ídolos es algo, o que un ídolo es algo?»'
  alternative_spanish_readings:
  - ¿Que lo sacrificado a los ídolos tiene alguna realidad, o que un ídolo tiene alguna realidad?
  - ¿Que lo sacrificado a los ídolos importa algo, o que un ídolo importa algo?
  rationale: El versículo forma parte del argumento de Pablo para aclarar que no está afirmando que los ídolos sean dioses reales ni que la comida sacrificada tenga valor espiritual intrínseco. «Es algo» conserva la pregunta retórica y la tensión doctrinal sin resolverla en el texto principal.
  doctrine_reference: 1 Corintios 8–10; preservar la tensión teológica sin explicitarla en exceso en el cuerpo del versículo.
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran acuerdo alto y no requieren revisión sustantiva; se conserva la pregunta retórica breve y la ambigüedad de τί ἐστιν con una formulación española igualmente sobria.
  spanish_consistency_notes:
  - Se mantuvo «ídolos» para εἴδωλα/εἴδωλον según el uso contextual normal en español.
  - Se evitó «SEÑOR» u այլ terminología no pertinente al versículo.
  - «Lo sacrificado a los ídolos» conserva el valor sacrificial del compuesto εἰδωλόθυτόν sin imponer una glosa interpretativa larga en el texto principal.
  - La nota b resguarda la lectura teológica del POB inglés sobre la intención de Pablo.
