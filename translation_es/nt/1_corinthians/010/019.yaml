revisions:
- from: ¿Qué, pues, digo? ¿Que lo sacrificado a los ídolos es algo[a][b], o que un ídolo es algo?
  to: ¿Qué, entonces, digo? ¿Que la comida sacrificada a los ídolos es algo[a][b], o que un ídolo es algo?
  rationale: La revisión mantiene intacto el sentido del griego y del POB inglés, pero mejora la naturalidad del español y alinea mejor la nota alternativa con la decisión lexical documentada. «¿Qué, entonces, digo?» suena más idiomático que «¿Qué, pues, digo?», y «la comida sacrificada a los ídolos» expresa con mayor claridad el referente de εἰδωλόθυτόν en 1 Corintios 8–10. También se ajustó la nota a para reflejar la alternativa inglesa auditada («idol-offering amounts to anything») sin introducir un singular discordante.
