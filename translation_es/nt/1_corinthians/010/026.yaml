translation:
  language: es
  text: Porque de Yahvé es la tierra y todo lo que la llena[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Cita de Salmo 24:1. O, de manera más dinámica, 'todo lo que hay en ella'.
    reason: cross_reference
lexical_decisions:
- source_word: κυρίου
  english_pob_choice: the Lord’s
  chosen_spanish: de Yahvé
  alternatives_spanish:
  - del Señor
  - del Amo
  lexicon: BDAG
  rationale: 'En este contexto, el genitivo expresa pertenencia: la tierra pertenece a Yahvé. Aunque el texto griego usa κύριος, el proyecto español prescribe Yahvé para el nombre divino cuando la cita remite al Salmo 24:1. ''Del Señor'' sería una opción posible por el griego y por el eco neotestamentario, pero aquí se prioriza la referencia directa al nombre divino del salmo citado.'
- source_word: γάρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - ya que
  lexicon: BDAG
  rationale: γάρ introduce la base argumentativa de lo dicho antes. En español, 'Porque' comunica bien la relación explicativa y mantiene la fuerza de fundamento sin sonar artificioso.
- source_word: γῆ
  english_pob_choice: earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - el mundo
  - la tierra habitada
  lexicon: BDAG
  rationale: Aquí γῆ conserva el sentido cosmológico de 'earth', pero en español 'la tierra' es la forma más natural y fiel. 'El mundo' sería más interpretativo y menos ajustado al paralelismo del salmo.
- source_word: πλήρωμα
  english_pob_choice: all that fills it
  chosen_spanish: todo lo que la llena
  alternatives_spanish:
  - su plenitud
  - todo lo que hay en ella
  - todo su contenido
  lexicon: BDAG
  rationale: El audit trail inglés revisó 'its fullness' hacia 'all that fills it' para evitar una abstracción innecesaria. En español, 'todo lo que la llena' conserva la idea de πλήρωμα como aquello que llena la tierra, sin perder el eco bíblico ni convertirlo en una paráfrasis amplia.
- source_word: αὐτῆς
  english_pob_choice: its
  chosen_spanish: la
  alternatives_spanish:
  - de ella
  - su
  lexicon: BDAG
  rationale: El pronombre femenino retoma 'la tierra'. En español, el objeto directo 'la' en 'lo que la llena' expresa esa referencia de manera natural y clara.
theological_decisions:
- issue: Renderizar κύριος en una cita que alude al nombre divino del Salmo 24:1
  english_pob_reading: Lord / the Lord’s
  chosen_spanish_reading: Yahvé
  alternative_spanish_readings:
  - Señor
  - el Señor
  rationale: Aunque el inglés POB mantiene 'Lord' por la forma griega κύριος, en español este pasaje cita explícitamente el salmo hebreo de origen, donde el referente es el nombre divino. Por eso se usa 'Yahvé' en el texto principal. Se evita la convención de ocultamiento con 'SEÑOR' porque el proyecto español pide transparencia y porque aquí la cita es intertextual y reconocible.
  doctrine_reference: 'DOCTRINE.md: Nombre divino YHWH → Yahvé; κύριος en citas de YHWH se explica por referencia al texto fuente'
translation_notes:
  revision_awareness: El inglés POB revisó una lectura más literal ('its fullness') hacia una forma más natural ('all that fills it'). Esta versión española sigue esa revisión al expresar πλήρωμα con una construcción verbal natural, sin perder la correspondencia con el salmo citado.
  spanish_consistency_notes:
  - Se mantuvo la cita breve y aforística, sin añadir verbos inexistentes en el griego.
  - '''Yahvé'' se usa conforme al estándar del proyecto para el nombre divino; no se empleó ''SEÑOR'' como convención de ocultamiento.'
  - '''Todo lo que la llena'' preserva el sentido de πλήρωμα sin convertirlo en una generalización interpretativa mayor que la del texto fuente.'
