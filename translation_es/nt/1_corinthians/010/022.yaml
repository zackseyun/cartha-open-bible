revisions:
- from: ¿O estamos provocando a celos al Señor? No somos más fuertes que él, ¿verdad?
  to: ¿O estamos provocando al Señor[a] a celos?[b] No somos más fuertes que él, ¿verdad?
  rationale: 'Se reemplaza la expresión no idiomática «provocando a celos» por «provocando al Señor a celos», que preserva mejor la relación verbal del griego y resulta más natural en español. Se añaden las dos notas que el POB inglés documenta: la resonancia teológica de «el Señor» y la alternativa léxica del verbo.'
  reviewer_model: gpt-5.4
  timestamp: '2026-05-07T21:13:46Z'
review_pass:
  verdict: revise
  source_alignment_summary: El borrador conserva bien la estructura retórica del griego y mantiene correctamente «el Señor» sin sobreespecificar el referente de κύριος. También refleja adecuadamente la expectativa de respuesta negativa en la segunda pregunta. Sin embargo, «provocando a celos» no es una expresión española natural ni fielmente idiomática para παραζηλοῦμεν; debe expresarse como «provocando a celos al Señor» → mejor «provocando a celos al Señor» no funciona, y el sentido fuente se preserva mejor con «provocando al Señor a celos» o «provocando los celos del Señor».
  spanish_quality_summary: 'La segunda cláusula («No somos más fuertes que él, ¿verdad?») es natural y clara. El principal problema de legibilidad y corrección idiomática está en la primera cláusula: «provocando a celos» suena forzada y poco española. Una pequeña reparación deja el versículo claro, digno y fiel.'
  glossary_alignment: Se respeta «Señor» para κύριος, lo cual concuerda con la decisión teológica auditada de preservar la tensión entre el Señor Jesús y la resonancia veterotestamentaria. No hay conflicto con otros términos del glosario. Conviene añadir notas para reflejar la alternativa léxica de παραζηλοῦμεν y la resonancia de «el Señor», ya que el inglés POB las conserva.
  issues:
  - severity: high
    issue: Expresión no idiomática «provocando a celos»
    rationale: En español bíblico legible, «provocar a celos» no suena natural. El griego παραζηλοῦμεν exige una formulación como «provocar ... a celos» con objeto directo personal antes del complemento, o una alternativa como «despertar celos en». La forma actual entorpece la comprensión.
  - severity: medium
    issue: Faltan notas que preserven decisiones auditadas del inglés POB
    rationale: El inglés POB conserva una nota léxica sobre el verbo y otra teológica/intertextual sobre «the Lord». Dado que la traducción española también mantiene esa tensión, conviene preservar esas notas en español.
  revised_spanish_text: ¿O estamos provocando al Señor[a] a celos?[b] No somos más fuertes que él, ¿verdad?
  revised_footnotes:
  - marker: a
    text: «El Señor» puede evocar tanto al Señor Jesús en el contexto inmediato como el lenguaje del Antiguo Testamento sobre provocar a celos al Señor Dios.
    reason: cross_reference
  - marker: b
    text: O «despertando los celos del Señor». El verbo lleva la idea de provocar celo celoso o celos.
    reason: lexical_alternative
  revision_rationale: 'Se reemplaza la expresión no idiomática «provocando a celos» por «provocando al Señor a celos», que preserva mejor la relación verbal del griego y resulta más natural en español. Se añaden las dos notas que el POB inglés documenta: la resonancia teológica de «el Señor» y la alternativa léxica del verbo.'
