translation:
  language: es
  text: ¿O estamos provocando al Señor[a] a celos?[b] No somos más fuertes que él, ¿verdad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «El Señor» puede evocar tanto al Señor Jesús en el contexto inmediato como el lenguaje del Antiguo Testamento sobre provocar a celos al Señor Dios.
    reason: cross_reference
  - marker: b
    text: O «despertando los celos del Señor». El verbo lleva la idea de provocar celo celoso o celos.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἢ
  english_pob_choice: Or
  chosen_spanish: ¿O
  alternatives_spanish:
  - ¿O bien
  - ¿O acaso
  lexicon: BDAG
  rationale: Introduce la alternativa retórica en continuidad con la pregunta anterior; en español, la partícula interrogativa inicial natural es «¿O».
- source_word: παραζηλοῦμεν
  english_pob_choice: are we provoking ... to jealousy
  chosen_spanish: estamos provocando a celos
  alternatives_spanish:
  - provocamos a celos
  - despertamos celos en
  lexicon: BDAG
  rationale: El verbo expresa provocar celos o celo celoso; «provocando a celos» conserva el valor verbal y la tensión de la expresión, de modo natural en español.
- source_word: τὸν κύριον
  english_pob_choice: the Lord
  chosen_spanish: al Señor
  alternatives_spanish:
  - al Señor Jesús
  - a Yahvé
  lexicon: BDAG
  rationale: Se mantiene el título ambiguo «Señor» para preservar la tensión teológica del contexto inmediato y la posible resonancia veterotestamentaria, sin resolverla más allá del griego.
- source_word: μὴ
  english_pob_choice: We are not ... , are we?
  chosen_spanish: No ... , ¿verdad?
  alternatives_spanish:
  - ¿No ...?
  - No somos ... , ¿o sí?
  lexicon: BDAG
  rationale: La partícula μή en esta pregunta espera una respuesta negativa; en español, la forma natural es una pregunta retórica con cola confirmatoria.
- source_word: ἰσχυρότεροι
  english_pob_choice: stronger
  chosen_spanish: más fuertes
  alternatives_spanish:
  - más poderosos
  - más vigorosos
  lexicon: BDAG
  rationale: El comparativo se vierte con el adjetivo natural «más fuertes», conservando la comparación de capacidad o poder.
- source_word: αὐτοῦ
  english_pob_choice: than he is
  chosen_spanish: que él
  alternatives_spanish:
  - que él es
  - que él mismo
  lexicon: BDAG
  rationale: El genitivo comparativo se expresa idiomáticamente en español con «que él»; el referente queda claro por el contexto.
- source_word: ἐσμεν
  english_pob_choice: we are
  chosen_spanish: somos
  alternatives_spanish:
  - estamos
  lexicon: BDAG
  rationale: El verbo copulativo en la comparación final se expresa de forma directa con «somos», evitando una perífrasis innecesaria.
theological_decisions:
- issue: Referente de «el Señor» (κύριος)
  english_pob_reading: Rendered simply as 'the Lord' without specifying 'Christ' or 'God.'
  chosen_spanish_reading: «el Señor» sin especificación adicional
  alternative_spanish_readings:
  - «el Señor Jesús»
  - «Dios el Señor»
  rationale: 'Se preserva la ambigüedad deliberada: en el contexto inmediato puede aludir al Señor Jesús, pero también evoca el lenguaje bíblico de provocar a celos al Señor Dios. La traducción no resuelve esa tensión.'
  doctrine_reference: 'Contested term: κύριος → Señor; preserve intertextual/theological tension'
- issue: Valor de la pregunta final con μή
  english_pob_reading: We are not stronger than he is, are we?
  chosen_spanish_reading: No somos más fuertes que él, ¿verdad?
  alternative_spanish_readings:
  - ¿No somos más fuertes que él?
  - No somos más fuertes que él, ¿o sí?
  rationale: La formulación castellana reproduce el carácter retórico de la pregunta y su expectativa de negación sin añadir inferencias doctrinales.
  doctrine_reference: Rhetorical question expecting a negative answer
translation_notes:
  revision_awareness: Se corrigió el problema de validación anterior eliminando notas no ancladas. No se usan marcas de nota al pie porque el texto español no requiere una alternativa textual obligatoria en este versículo.
  spanish_consistency_notes:
  - Se mantiene «Señor» como término teológico estándar del proyecto, evitando reemplazos interpretativos.
  - «a celos» conserva el matiz verbal de provocar celos sin convertirlo en una expresión meramente emocional.
  - La pregunta final conserva una cola interrogativa natural en español para reflejar μή con expectativa negativa.
