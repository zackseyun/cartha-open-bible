  text: τὸ ποτήριον τῆς εὐλογίας ὃ εὐλογοῦμεν, οὐχὶ κοινωνία ⸂ἐστὶν τοῦ αἵματος τοῦ Χριστοῦ⸃; τὸν ἄρτον ὃν κλῶμεν, οὐχὶ κοινωνία τοῦ σώματος τοῦ Χριστοῦ ἐστιν;
base_translation:
  language: en
  yaml_path: translation/nt/1_corinthians/010/016.yaml
  text: The cup of blessing that we bless—is it not a sharing in the blood of Messiah? The bread that we break—is it not a sharing in the body of Messiah?[a][b]
