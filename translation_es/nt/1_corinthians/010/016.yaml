translation:
  language: es
  text: La copa de bendición que bendecimos, ¿no es una participación[a] en la sangre del Mesías[b]? El pan que partimos, ¿no es una participación en el cuerpo del Mesías[b]?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «tener parte en»; también tradicionalmente «comunión de».
    reason: lexical_alternative
  - marker: b
    text: Griego Χριστοῦ; se traduce «Mesías» aquí porque Χριστός funciona como título. Tradicionalmente, «Cristo».
    reason: alternative_reading
lexical_decisions:
- source_word: ποτήριον
  english_pob_choice: cup
  chosen_spanish: copa
  alternatives_spanish:
  - cáliz
  lexicon: BDAG
  rationale: «Copa» es el equivalente natural y transparente en español actual. «Cáliz» introduce un registro eclesiástico posterior que no está requerido por el griego.
- source_word: τῆς εὐλογίας
  english_pob_choice: of blessing
  chosen_spanish: de bendición
  alternatives_spanish:
  - de alabanza
  - de acción de gracias
  lexicon: BDAG
  rationale: El genitivo se conserva de modo directo como «de bendición», manteniendo el sustantivo εὐλογία sin convertirlo en una explicación litúrgica más específica.
- source_word: ὃ εὐλογοῦμεν
  english_pob_choice: that we bless
  chosen_spanish: que bendecimos
  alternatives_spanish:
  - que damos bendición
  - sobre la cual damos bendición
  lexicon: BDAG
  rationale: «Que bendecimos» reproduce de forma natural el verbo y preserva la repetición léxica con «bendición» en la línea anterior.
- source_word: κοινωνία
  english_pob_choice: sharing in
  chosen_spanish: participación
  alternatives_spanish:
  - participación en
  - comunión
  - compartir
  lexicon: BDAG
  rationale: Aquí κοινωνία expresa participación real, no mera convivencia. «Participación» es el equivalente español más directo y conserva la tensión sacramental sin resolverla en una terminología confesional fija.
- source_word: τοῦ αἵματος
  english_pob_choice: the blood
  chosen_spanish: la sangre
  alternatives_spanish:
  - sangre
  lexicon: BDAG
  rationale: «La sangre» mantiene el sentido sacrificial y pactal del texto sin ampliarlo interpretativamente.
- source_word: τοῦ Χριστοῦ
  english_pob_choice: of the Messiah
  chosen_spanish: del Mesías
  alternatives_spanish:
  - de Cristo
  lexicon: BDAG
  rationale: Se conserva «Mesías» porque Χριστός funciona aquí como título. La forma tradicional «Cristo» queda como alternativa documentada, pero no como la principal.
- source_word: ἄρτον
  english_pob_choice: bread
  chosen_spanish: pan
  alternatives_spanish:
  - hogaza
  lexicon: BDAG
  rationale: «Pan» es la equivalencia estándar y suficientemente amplia; «hogaza» sería demasiado específica.
- source_word: ὃν κλῶμεν
  english_pob_choice: that we break
  chosen_spanish: que partimos
  alternatives_spanish:
  - que quebramos
  - que rompemos
  lexicon: BDAG
  rationale: «Partimos» es el verbo natural en español para el acto ritual del pan y conserva la imagen concreta del griego κλῶμεν.
- source_word: τοῦ σώματος
  english_pob_choice: the body
  chosen_spanish: el cuerpo
  alternatives_spanish:
  - cuerpo
  lexicon: BDAG
  rationale: La traducción literal «el cuerpo» preserva el peso eucarístico y cristológico del término σῶμα sin atenuarlo.
theological_decisions:
- issue: Cómo rendir κοινωνία en un contexto sacramental
  english_pob_reading: sharing in
  chosen_spanish_reading: participación
  alternative_spanish_readings:
  - comunión
  - participación en
  rationale: El pasaje afirma una relación real con la sangre y el cuerpo del Mesías, pero sin especificar aquí el modo exacto de esa relación. «Participación» preserva la fuerza de κοινωνία y deja abierta la tensión doctrinal documentada en el POB en vez de resolverla con una fórmula confesional.
  doctrine_reference: Preservar la tensión teológica; no imponer una lectura denominacional del sacramento.
- issue: Cómo traducir Χριστοῦ
  english_pob_reading: Messiah
  chosen_spanish_reading: Mesías
  alternative_spanish_readings:
  - Cristo
  rationale: La política terminológica del proyecto favorece «Mesías» cuando Χριστός funciona como título. En este versículo la referencia es titular y no meramente nominal, por lo que «Mesías» comunica mejor la carga semántica original.
  doctrine_reference: Χριστός → Mesías cuando funciona como título.
translation_notes:
  revision_awareness: 'Se tuvo en cuenta el expediente de revisión: una pasada posterior cambió temporalmente Χριστός a «Christ» por registro natural, pero la corrección regresó a «Messiah» conforme a la política doctrinal del proyecto. La presente versión sigue esa decisión final y la adapta al español con «Mesías».'
  spanish_consistency_notes:
  - Se mantuvo «Mesías» de forma consistente en ambas ocurrencias de Χριστοῦ.
  - «Participación» se repite en ambos miembros de la frase para reflejar la simetría del griego κοινωνία... κοινωνία.
  - Se eligió «copa» en vez de «cáliz» para evitar un término litúrgico más marcado que el original.
  - «Partimos» se prefirió por su uso natural en español bíblico y su correspondencia con κλῶμεν.
