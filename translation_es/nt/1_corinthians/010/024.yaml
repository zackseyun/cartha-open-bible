translation:
  language: es
  text: Que nadie busque su propio bien[a], sino el del otro.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, más literalmente: «Que nadie busque lo que es suyo, sino lo que es del otro».'
    reason: lexical_alternative
lexical_decisions:
- source_word: μηδεὶς
  english_pob_choice: Let no one
  chosen_spanish: Que nadie
  alternatives_spanish:
  - Nadie
  - Que no busque nadie
  lexicon: BDAG
  rationale: La forma negativa indefinida introduce una prohibición general. En español, «Que nadie» comunica con naturalidad el valor exhortativo/imperativo de la construcción sin volverla pesada.
- source_word: ζητείτω
  english_pob_choice: seek
  chosen_spanish: busque
  alternatives_spanish:
  - busque tras
  - procure
  - se afane por
  lexicon: BDAG
  rationale: ζητέω puede significar «buscar» o «procurar». «Busque» mantiene la sencillez verbal y funciona bien en la exhortación ética del contexto.
- source_word: τὸ ἑαυτοῦ
  english_pob_choice: his own good
  chosen_spanish: lo suyo propio
  alternatives_spanish:
  - su propio bien
  - sus propios intereses
  - lo que es suyo
  lexicon: BDAG
  rationale: 'El griego es elíptico: literalmente, «lo de sí mismo / lo suyo». En español, «lo suyo propio» conserva esa elipsis sin añadir «bien» como si el texto lo explicitara. Así se mantiene la tensión léxica documentada en el audit trail.'
- source_word: ἀλλὰ
  english_pob_choice: but
  chosen_spanish: sino
  alternatives_spanish:
  - pero
  - más bien
  lexicon: BDAG
  rationale: Después de una negación, «sino» expresa mejor el contraste exclusivista que «pero».
- source_word: τὸ τοῦ ἑτέρου
  english_pob_choice: that of the other person
  chosen_spanish: lo del otro
  alternatives_spanish:
  - lo que es del otro
  - el bien del otro
  - lo ajeno
  lexicon: BDAG
  rationale: La frase también es elíptica. «Lo del otro» reproduce con brevedad el contraste con «lo suyo propio» y evita imponer una glosa interpretativa no presente en el griego.
theological_decisions:
- issue: Cómo resolver en español la elipsis de τὸ ἑαυτοῦ / τὸ τοῦ ἑτέρου sin estrechar el sentido moral del mandato
  english_pob_reading: Express the sense as 'his own good' and 'that of the other person'
  chosen_spanish_reading: Expresar la elipsis como «lo suyo propio» / «lo del otro», sin añadir «bien» en el texto principal
  alternative_spanish_readings:
  - su propio bien ... el bien del otro
  - sus propios intereses ... los del otro
  - lo que es suyo ... lo que es del otro
  rationale: El contexto inmediato habla de conducta y consideración por el prójimo, pero el griego conserva la formulación abreviada. En español, mantener la elipsis evita resolver de antemano si el foco es «bien», «intereses» o «propiedad», y deja abierta la amplitud ética del dicho.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El texto griego y el contexto auditado están en alto acuerdo con la versión inglesa POB. No se registran revisiones aplicadas; la principal decisión en español fue conservar la elipsis del original con una formulación natural y publicable.
  spanish_consistency_notes:
  - Se mantiene «otro» en singular para reflejar ἑτέρου y el contraste individual del verso.
  - Se evita «Cristo», «SEÑOR» u այլ terminología no pertinente; el verso no contiene vocabulario teológico de nombre propio.
  - Se usa «sino» tras la negación inicial, conforme al contraste directo del griego.
  - La nota al pie ofrece la alternativa más literal sin imponerla en el texto principal.
