translation:
  language: es
  text: 'sabiendo primero esto: que ninguna profecía de la Escritura proviene de su propia interpretación[a].'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «es asunto de interpretación privada» o «proviene de interpretación privada». El griego puede entenderse como referido al origen o a la explicación de la profecía, o a la manera en que se interpreta.'
    reason: alternative_reading
lexical_decisions:
- source_word: τοῦτο πρῶτον γινώσκοντες
  english_pob_choice: knowing this first
  chosen_spanish: sabiendo primero esto
  alternatives_spanish:
  - conociendo primero esto
  - sabiendo esto en primer lugar
  lexicon: BDAG
  rationale: El participio introduce una afirmación fundamental; «sabiendo» conserva el valor de conocimiento del verbo y «primero» mantiene la prioridad de πρῶτον en una sintaxis natural para el español.
- source_word: πᾶσα προφητεία γραφῆς
  english_pob_choice: every prophecy of Scripture
  chosen_spanish: ninguna profecía de la Escritura
  alternatives_spanish:
  - toda profecía de la Escritura
  - cada profecía de la Escritura
  lexicon: BDAG
  rationale: La combinación griega con negación final funciona idiomáticamente en español como una afirmación universal negativa. «Profecía de la Escritura» conserva el genitivo γραφῆς como pertenencia o procedencia escritural.
- source_word: ἰδίας
  english_pob_choice: one's own
  chosen_spanish: propia
  alternatives_spanish:
  - privada
  - suya
  lexicon: BDAG
  rationale: «Propia» expresa el valor de ἰδίας sin forzar la referencia hacia el lector o hacia el profeta. Evita también fijar prematuramente la discusión con el adjetivo «privada» en el texto principal.
- source_word: ἐπιλύσεως
  english_pob_choice: interpretation
  chosen_spanish: interpretación
  alternatives_spanish:
  - explicación
  - desatadura
  lexicon: BDAG
  rationale: En este contexto el sentido más probable es interpretativo/explanatorio. En español «interpretación» es claro y mantiene abierta la tensión entre origen del mensaje y su explicación.
- source_word: οὐ γίνεται
  english_pob_choice: does not come about
  chosen_spanish: no surge
  alternatives_spanish:
  - no llega a ser
  - no proviene
  lexicon: BDAG
  rationale: «Surge» conserva el matiz de llegar a existir o proceder sin convertir el verbo en una simple copulativa. En español suena natural y puede abarcar la ambigüedad del griego sobre origen o lectura.
theological_decisions:
- issue: Ambigüedad de ἰδίας ἐπιλύσεως οὐ γίνεται
  english_pob_reading: The verse speaks of prophecy not arising from one's own interpretation/explanation, while remaining broad enough to preserve the ambiguity between origin and readerly interpretation.
  chosen_spanish_reading: La profecía de la Escritura no procede de una interpretación meramente propia; la frase queda abierta para no resolver si el énfasis recae en el origen de la profecía o en su interpretación privada.
  alternative_spanish_readings:
  - ninguna profecía de la Escritura es asunto de interpretación privada
  - ninguna profecía de la Escritura procede de la explicación propia del profeta
  - ninguna profecía de la Escritura surge de interpretación privada
  rationale: La nota debe conservar la tensión histórica del pasaje. 2 Pedro 1:21 orienta el contexto hacia el origen divino de la profecía, pero la gramática también permite una lectura sobre interpretación. Por eso el texto principal evita cerrarse con una solución exclusiva.
  doctrine_reference: 'POB translation philosophy: preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión inglesa que prefirió «no prophecy ... comes about» frente a una formulación negativa menos natural. En español se buscó un equivalente igualmente natural («ninguna profecía ... surge») sin perder la amplitud semántica de γίνεται ni decidir prematuramente entre origen e interpretación.
  spanish_consistency_notes:
  - Se mantiene «Escritura» para γραφή, coherente con el uso bíblico formal del término.
  - Se prefirió «interpretación» en el texto base, con nota que preserva la alternativa tradicional «privada».
  - La negación se expresa de forma idiomática en español para reflejar la lectura universal del griego.
  - «Sabiendo primero esto» sigue la estructura participial sin sobrecargarla con una subordinación explicativa.
