translation:
  language: es
  text: Porque ninguna profecía jamás fue producida por voluntad de hombre[a][c], sino que los hombres hablaron de Dios mientras eran llevados por el Espíritu Santo[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue traída» para «fue producida»; el verbo griego es pasivo y se relaciona con el participio posterior del versículo.
    reason: lexical_alternative
  - marker: b
    text: O «siendo movidos por el Espíritu Santo». El griego dice más literalmente «siendo llevados», destacando la guía activa del Espíritu.
    reason: lexical_alternative
  - marker: c
    text: «Hombre» y «hombres» representan aquí ἄνθρωπος/ἄνθρωποι en sentido humano representativo, no para excluir a las mujeres donde el contexto es genérico.
    reason: cultural_note
lexical_decisions:
- source_word: θελήματι ἀνθρώπου
  english_pob_choice: by the will of man
  chosen_spanish: por voluntad de hombre
  alternatives_spanish:
  - por voluntad humana
  - por la voluntad de un ser humano
  lexicon: BDAG
  rationale: 'El dativo con el pasivo expresa el medio u origen instrumental: la profecía no surgió de la volición humana. «Por voluntad de hombre» conserva la cercanía formal al griego y mantiene el singular genérico ἀνθρώπου sin neutralizar demasiado la forma original.'
- source_word: ἠνέχθη
  english_pob_choice: was brought forth
  chosen_spanish: fue traída
  alternatives_spanish:
  - fue producida
  - vino
  lexicon: BDAG
  rationale: El aoristo pasivo de φέρω pide una solución pasiva en español. «Fue traída» preserva el sentido de origen o surgimiento sin volverlo mecánico ni demasiado interpretativo. «Fue producida» es posible, pero menos cercana al verbo; «vino» es demasiado débil.
- source_word: προφητεία
  english_pob_choice: prophecy
  chosen_spanish: la profecía
  alternatives_spanish:
  - el mensaje profético
  - la palabra profética
  lexicon: BDAG
  rationale: «Profecía» es el equivalente más directo y natural en español. El artículo definido ayuda a la fluidez sin alterar el referente general del sustantivo.
- source_word: ποτέ
  english_pob_choice: never
  chosen_spanish: nunca
  alternatives_spanish:
  - jamás
  - en ningún tiempo
  lexicon: BDAG
  rationale: 'Con οὐ, ποτέ expresa negación enfática: «nunca» transmite bien esa fuerza en español moderno y es plenamente idiomático.'
- source_word: ὑπὸ πνεύματος ἁγίου
  english_pob_choice: by the Holy Spirit
  chosen_spanish: por el Espíritu Santo
  alternatives_spanish:
  - por Espíritu Santo
  - bajo el Espíritu Santo
  lexicon: BDAG
  rationale: ὑπό con genitivo marca agencia. En español, «por el Espíritu Santo» expresa claramente la acción agente; el artículo es natural en español aunque el griego sea anartro.
- source_word: φερόμενοι
  english_pob_choice: as they were carried along
  chosen_spanish: siendo llevados
  alternatives_spanish:
  - llevados
  - mientras eran llevados
  lexicon: BDAG
  rationale: El participio de φέρω repite la imagen de movimiento/impulso del verbo anterior. «Siendo llevados» preserva ese matiz de conducción activa sin reducirlo a «inspirados» o «movidos» en sentido abstracto.
- source_word: ἐλάλησαν
  english_pob_choice: spoke
  chosen_spanish: hablaron
  alternatives_spanish:
  - hablaron
  - dijeron
  lexicon: BDAG
  rationale: λαλέω significa «hablar» de manera directa. «Hablaron» mantiene el paralelismo con el texto griego y su sencillez.
- source_word: ἀπὸ θεοῦ
  english_pob_choice: from God
  chosen_spanish: de parte de Dios
  alternatives_spanish:
  - de Dios
  - desde Dios
  lexicon: BDAG
  rationale: ἀπό indica origen o procedencia. En español, «de parte de Dios» comunica bien la fuente/origen del hablar profético sin confundirla con la agencia expresada por ὑπό. «De Dios» también sería posible, pero «de parte de» hace más explícita la procedencia.
- source_word: ἄνθρωποι
  english_pob_choice: men
  chosen_spanish: hombres
  alternatives_spanish:
  - personas
  - seres humanos
  lexicon: BDAG
  rationale: La pluralidad masculina griega se conserva con «hombres» siguiendo la política de fidelidad formal. En este contexto es un plural representativo humano, no una exclusión deliberada de mujeres.
theological_decisions:
- issue: Relación entre agencia divina y humana en la profecía
  english_pob_reading: La profecía no se originó en voluntad humana; los hombres hablaron de parte de Dios mientras eran llevados por el Espíritu Santo.
  chosen_spanish_reading: La profecía no procede de iniciativa humana; hombres hablaron de parte de Dios mientras eran llevados por el Espíritu Santo.
  alternative_spanish_readings:
  - La profecía fue dictada mecánicamente por el Espíritu Santo.
  - La profecía surgió parcialmente de iniciativa humana y parcialmente de influencia divina.
  rationale: 'La formulación española debe conservar ambas afirmaciones del versículo: ni origen autónomo humano ni dictado mecánico. «Siendo llevados» preserva la iniciativa del Espíritu sin borrar el hecho de que «hombres hablaron» realmente. «De parte de Dios» sostiene la procedencia divina sin fusionar al Espíritu y a Dios.'
  doctrine_reference: 'Translation philosophy §3: preservar la tensión teológica en lugar de resolverla.'
translation_notes:
  revision_awareness: Se revisó la correspondencia entre el griego y la redacción española para mantener el pasivo de ἠνέχθη, la imagen de movimiento de φερόμενοι y la doble agencia divina/humana. No hubo cambios respecto del criterio auditado más reciente; la redacción sigue alineada con la evaluación de alta concordancia.
  spanish_consistency_notes:
  - Se mantiene «Espíritu Santo» con artículo natural en español, aunque el griego sea anartro.
  - Se conserva la distinción entre «por» para agencia del Espíritu y «de parte de» para origen en Dios.
  - «Hombres» se usa en sentido representativo humano conforme a la política de género-accurado.
  - 'El orden y la puntuación buscan reflejar el contraste del griego: negación absoluta, contraste adversativo y clausula final de origen divino.'
