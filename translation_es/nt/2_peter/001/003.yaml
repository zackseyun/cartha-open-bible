translation:
  language: es
  text: Como su poder divino nos ha concedido todas las cosas para la vida y la piedad, mediante el conocimiento del que nos llamó por[a] su propia gloria y excelencia,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «para su propia gloria y excelencia». La frase en dativo griego puede entenderse de otra manera.'
    reason: alternative_reading
lexical_decisions:
- source_word: Ὡς
  english_pob_choice: As
  chosen_spanish: Como
  alternatives_spanish:
  - Puesto que
  - Ya que
  lexicon: BDAG
  rationale: En este contexto introduce la base de la afirmación siguiente. «Como» conserva esa relación sin forzarla demasiado hacia una causalidad más explícita que la del griego.
- source_word: πάντα ... τὰ πρὸς ζωὴν καὶ εὐσέβειαν
  english_pob_choice: all things for life and godliness
  chosen_spanish: todas las cosas para la vida y la piedad
  alternatives_spanish:
  - todo lo necesario para la vida y la piedad
  - todas las cosas pertinentes para la vida y la piedad
  lexicon: BDAG
  rationale: La construcción τὰ πρὸς + acusativo expresa lo que está orientado a o sirve para algo. «Para la vida y la piedad» es natural en español y mantiene el alcance total de πάντα.
- source_word: θείας δυνάμεως αὐτοῦ
  english_pob_choice: his divine power
  chosen_spanish: su poder divino
  alternatives_spanish:
  - el poder divino de él
  - su poder de Dios
  lexicon: BDAG
  rationale: La relación genitiva se expresa con naturalidad como posesión en español. «Divino» traduce θείας de modo estándar y digno, sin perder la referencia al poder que procede de Dios.
- source_word: δεδωρημένης
  english_pob_choice: has granted
  chosen_spanish: ha concedido
  alternatives_spanish:
  - ha dado
  - ha otorgado
  lexicon: BDAG
  rationale: El perfecto de δωρέομαι implica un don generoso con efecto perdurable. «Ha concedido» comunica bien el matiz benefactivo y su resultado continuo en español bíblico actual.
- source_word: διὰ τῆς ἐπιγνώσεως
  english_pob_choice: through the knowledge
  chosen_spanish: mediante el conocimiento
  alternatives_spanish:
  - a través del conocimiento
  - por medio del conocimiento
  lexicon: BDAG
  rationale: διὰ con genitivo expresa medio. «Mediante» conserva ese valor instrumental con estilo sobrio y claro.
- source_word: τοῦ καλέσαντος ἡμᾶς
  english_pob_choice: of the one who called us
  chosen_spanish: del que nos llamó
  alternatives_spanish:
  - del que nos ha llamado
  - de aquel que nos llamó
  lexicon: BDAG
  rationale: El participio sustantivado se vuelve de forma natural personal en español. «El que nos llamó» mantiene la fuerza verbal y evita una construcción más pesada.
- source_word: ἰδίᾳ
  english_pob_choice: his own
  chosen_spanish: su propia
  alternatives_spanish:
  - la propia
  - su
  lexicon: BDAG
  rationale: ἴδιος añade énfasis de posesión o pertenencia. «Su propia» conserva esa intensificación mejor que un simple posesivo.
- source_word: δόξῃ
  english_pob_choice: glory
  chosen_spanish: gloria
  alternatives_spanish:
  - esplendor
  - honor
  lexicon: BDAG
  rationale: «Gloria» es la traducción estándar y teológicamente cargada de δόξα, adecuada para el lenguaje divino del pasaje.
- source_word: ἀρετῇ
  english_pob_choice: excellence
  chosen_spanish: excelencia
  alternatives_spanish:
  - virtud
  - moral excelencia
  lexicon: BDAG
  rationale: ἀρετή puede ser «virtud» o «excelencia». «Excelencia» funciona de manera más natural junto a «gloria» y evita restringir el término a mera moralidad humana.
- source_word: ζωὴν
  english_pob_choice: life
  chosen_spanish: la vida
  alternatives_spanish:
  - vida verdadera
  lexicon: BDAG
  rationale: No hay en el griego ningún modificador que justifique ampliar el sentido. Se conserva el término simple y amplio.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: la piedad
  alternatives_spanish:
  - la devoción
  - la vida piadosa
  lexicon: BDAG
  rationale: Aunque muchas versiones usan «piedad», en español conserva bien el sentido de reverencia y conducta orientada a Dios. Se evita «devoción» por sonar más subjetivo y menos estable como término bíblico.
theological_decisions:
- issue: Valor de la frase ἰδίᾳ δόξῃ καὶ ἀρετῇ
  english_pob_reading: by his own glory and excellence
  chosen_spanish_reading: por su propia gloria y excelencia
  alternative_spanish_readings:
  - para su propia gloria y excelencia
  rationale: Con el texto griego dado, el dativo puede entenderse de manera instrumental o de medio. La lectura «por su propia gloria y excelencia» conserva esa posibilidad sin fijar un sentido teleológico más fuerte de lo que exige el griego. La alternativa se mantiene porque la ambigüedad sintáctica es real.
  doctrine_reference: Preservar la tensión sintáctica sin resolverla artificialmente.
translation_notes:
  revision_awareness: Sin cambios respecto al estado de revisión más reciente disponible; la traducción sigue la lectura de alta concordancia y conserva la ambigüedad reconocida en la frase final.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto solo cuando aparece el nombre divino explícito; aquí no aplica.
  - Se usa «piedad» para εὐσέβεια, en coherencia con el registro bíblico del pasaje y con el sentido de vida orientada a Dios.
  - Se usa «gloria» y «excelencia» para respetar el binomio del griego sin convertirlo en una fórmula litúrgica fija.
