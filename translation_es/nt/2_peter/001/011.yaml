    changes_summary: 'Reordered the sentence to reflect the Greek more naturally and formally in English; changed ''Jesus Messiah'' to the standard formal rendering ''Jesus Christ''; adjusted ''you will be richly provided with entry'' to ''entry ... will be richly provided for you'' to better match the passive construction and idiomatic English. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque de este modo se les concederá abundantemente la entrada en el reino eterno de nuestro Señor y Salvador Jesús Mesías[a][b][c].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el acceso». El griego εἴσοδος puede denotar tanto el acto de entrar como la entrada o acceso mismo.
    reason: lexical_alternative
  - marker: b
    text: 'Traducción tradicional: «Jesucristo». El título griego Χριστός se traduce aquí como «Mesías» para preservar su sentido.'
    reason: alternative_reading
  - marker: c
    text: 'O: «Porque de este modo la entrada en el reino eterno de nuestro Señor y Salvador Jesús Mesías se les concederá abundantemente».'
    reason: previous_rendering
lexical_decisions:
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de este modo
  alternatives_spanish:
  - así
  - de esta manera
  lexicon: BDAG
  rationale: Conserva el valor demostrativo y de enlace con el contexto previo. «De este modo» suena natural en español y mantiene la referencia a la manera descrita anteriormente.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - pues
  - ya que
  - porque
  lexicon: BDAG
  rationale: Introduce la explicación o fundamentación del contexto anterior. «Porque» funciona bien en español bíblico contemporáneo sin sonar arcaico.
- source_word: πλουσίως
  english_pob_choice: richly
  chosen_spanish: ricamente
  alternatives_spanish:
  - abundantemente
  - generosamente
  lexicon: BDAG
  rationale: Reproduce la idea de abundancia/lavishness sin añadir contenido. «Ricamente» conserva el adverbio y enlaza bien con el pasivo de provisión.
- source_word: ἐπιχορηγηθήσεται
  english_pob_choice: will be provided
  chosen_spanish: se les proveerá
  alternatives_spanish:
  - se les suministrará
  - se les concederá
  - será provista para ustedes
  lexicon: BDAG
  rationale: El futuro pasivo indica que la entrada será dada/provista. En español, una pasiva con «se» expresa con naturalidad la acción sin perder el sentido de provisión; se mantiene el sujeto tácito implícito de los destinatarios mediante «les».
- source_word: ὑμῖν
  english_pob_choice: for you
  chosen_spanish: se les
  alternatives_spanish:
  - para ustedes
  - a ustedes
  lexicon: BDAG
  rationale: La dativa de ventaja se integra naturalmente en español con el dativo pronominal. Dado que el verbo ya lleva sentido de provisión, «se les» comunica el destinatario sin sobrecargar la frase.
- source_word: ἡ εἴσοδος
  english_pob_choice: entry
  chosen_spanish: la entrada
  alternatives_spanish:
  - el acceso
  - la entrada/ingreso
  lexicon: BDAG
  rationale: «Entrada» cubre tanto el acto de entrar como el acceso concedido. Es una opción clara y directa; «ingreso» sería posible, pero menos transparente en español bíblico.
- source_word: εἰς τὴν αἰώνιον βασιλείαν
  english_pob_choice: into the eternal kingdom
  chosen_spanish: en el reino eterno
  alternatives_spanish:
  - hacia el reino eterno
  - a el reino eterno
  lexicon: BDAG
  rationale: Aunque εἰς normalmente es «a/para/into», en español la construcción natural con «entrada» es «entrada en». «En el reino eterno» preserva la meta de acceso y evita una redundancia torpe.
- source_word: τοῦ κυρίου ἡμῶν καὶ σωτῆρος
  english_pob_choice: of our Lord and Savior
  chosen_spanish: de nuestro Señor y Salvador
  alternatives_spanish:
  - de nuestro Dueño y Salvador
  - de nuestro Señor y Liberador
  lexicon: BDAG
  rationale: «Señor» es la equivalencia estable de κύριος en este contexto cristológico, y «Salvador» comunica σωτήρ con precisión doctrinal y claridad en español.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se preserva la decisión del POB de traducir Χριστός como «Mesías» cuando funciona como título. Esto evita el transliterado tradicional y mantiene el valor semántico del término griego.
theological_decisions:
- issue: Referencia de «nuestro Señor y Salvador» a una sola persona
  english_pob_reading: Both titles refer to one person, Jesus Messiah.
  chosen_spanish_reading: 'Ambos títulos se refieren a una sola persona: Jesús Mesías.'
  alternative_spanish_readings:
  - Podrían leerse como dos referidos distintos, pero la gramática no lo favorece.
  rationale: El artículo único con dos sustantivos personales singulares unidos por καί favorece un solo referente. La traducción mantiene ese valor sintáctico y cristológico sin sobreexplicarlo.
  doctrine_reference: Credo de Nicea (381); Definición de Calcedonia (451)
- issue: Elección de «Mesías» en lugar de «Cristo»
  english_pob_reading: The Greek title Χριστοῦ is translated here as 'Messiah' to preserve its meaning.
  chosen_spanish_reading: Χριστοῦ se traduce como «Mesías» para preservar su sentido titular.
  alternative_spanish_readings:
  - Jesucristo
  - Jesús el Cristo
  rationale: La política del proyecto pide «Mesías» cuando Χριστός funciona como título. En español, esto conserva el significado y evita una transliteración que puede opacar el valor léxico original.
  doctrine_reference: Política terminológica POB para Χριστός / Mesías
translation_notes:
  revision_awareness: 'El audit trail en inglés muestra revisiones enfocadas en la naturalidad del orden oracional y en la recuperación de «Messiah» frente a «Christ». En español se siguió la misma línea: se optó por una construcción más natural con pasiva refleja («se les proveerá») y se mantuvo «Mesías» para Χριστός conforme a la política del proyecto. No se añadió ninguna paráfrasis doctrinal ajena al texto griego.'
  spanish_consistency_notes:
  - Se mantuvo el nombre divino no aplicable en este versículo; no hay κύριος con sentido de YHWH en el texto.
  - «Señor» se usa para κύριος en el título cristológico, no como sustituto del nombre divino.
  - Se evitó «Cristo» por coherencia con la terminología POB para Χριστός cuando funciona como título.
  - La estructura con «entrada en el reino» refleja el griego y suena natural en español bíblico contemporáneo.
