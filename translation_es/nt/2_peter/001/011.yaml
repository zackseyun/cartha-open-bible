    rationale: El texto principal ya usa 'entrada', y la nota dice 'O «entrada»', lo que no ofrece una alternativa real. El inglés sí contrasta 'entry' / 'entrance'; en español conviene ofrecer una alternativa distinta y válida, como 'acceso' o 'ingreso'.
  - severity: low
