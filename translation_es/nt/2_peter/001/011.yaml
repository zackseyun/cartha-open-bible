    rationale: Aunque comunica el sentido básico de ἐπιχορηγηθήσεται ὑμῖν ἡ εἴσοδος, en español suena más natural decir 'se les concederá abundantemente la entrada' o 'les será concedida abundantemente la entrada'. 'Proveer la entrada' es entendible pero torpe.
