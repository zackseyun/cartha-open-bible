  text: οὕτως γὰρ πλουσίως ἐπιχορηγηθήσεται ὑμῖν ἡ εἴσοδος εἰς τὴν αἰώνιον βασιλείαν τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/011.yaml
  text: For in this way entry into the eternal kingdom of our Lord and Savior Jesus Messiah will be richly provided for you[a][b][c].
