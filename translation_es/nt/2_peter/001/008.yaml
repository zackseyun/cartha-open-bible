    text: Or 'abound.'
    reason: lexical_alternative
  - marker: b
    text: Or 'full knowledge' of our Lord Jesus Messiah.
    reason: lexical_alternative
  - marker: c
    text: Greek 'Jesus Christ'; here rendered 'Jesus Messiah' to preserve the title's meaning.
    reason: alternative_reading
