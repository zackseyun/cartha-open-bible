revisions:
- from: Porque si estas cosas están en ustedes y van en aumento, no los dejan ociosos ni sin fruto en el conocimiento de nuestro Señor Jesús Mesías.
  to: Porque si estas cosas son de ustedes y van en aumento, no los dejan ser ineficaces ni sin fruto en el conocimiento de nuestro Señor Jesús Mesías.
  rationale: Se ajusta ὑμῖν ὑπάρχοντα a una formulación de posesión más cercana a la auditoría («son de ustedes») y ἀργούς a «ineficaces», que encaja mejor con el contraste contextual con «sin fruto». Se conserva «Jesús Mesías» según la política doctrinal y léxica del proyecto.
