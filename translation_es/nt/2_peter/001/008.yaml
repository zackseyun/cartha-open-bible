  text: ταῦτα γὰρ ὑμῖν ὑπάρχοντα καὶ πλεονάζοντα οὐκ ἀργοὺς οὐδὲ ἀκάρπους καθίστησιν εἰς τὴν τοῦ κυρίου ἡμῶν Ἰησοῦ Χριστοῦ ἐπίγνωσιν·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/008.yaml
  text: For if these things are yours and are increasing[c][b][a], they keep you from being ineffective or unfruitful in the knowledge of our Lord Jesus Messiah.
  footnotes:
