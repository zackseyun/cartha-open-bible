translation:
  language: es
  text: Porque si estas cosas son de ustedes y van en aumento, no los dejan ser ineficaces ni sin fruto en el conocimiento de nuestro Señor Jesús Mesías.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas cualidades
  lexicon: BDAG
  rationale: El demostrativo retoma las virtudes de los versículos anteriores. «Estas cosas» conserva el enlace anafórico de manera natural en español; «estas cualidades» sería más interpretativo.
- source_word: ὑμῖν ὑπάρχοντα
  english_pob_choice: are yours
  chosen_spanish: están en ustedes
  alternatives_spanish:
  - son de ustedes
  - les pertenecen
  lexicon: BDAG
  rationale: La combinación sugiere presencia/posesión de estas virtudes respecto de los lectores. En español, «están en ustedes» comunica la idea sin sonar forzado y deja abierta la matización de posesión implícita.
- source_word: πλεονάζοντα
  english_pob_choice: are increasing
  chosen_spanish: van en aumento
  alternatives_spanish:
  - abundan
  - crecen
  lexicon: BDAG
  rationale: El participio expresa crecimiento o abundancia. «Van en aumento» reproduce bien la progresión continua y suena natural en español.
- source_word: ἀργοὺς
  english_pob_choice: ineffective
  chosen_spanish: ociosos
  alternatives_spanish:
  - ineficaces
  - inútiles
  lexicon: BDAG
  rationale: En este contexto contrasta con «sin fruto» y apunta a falta de resultado/productividad. «Ociosos» mantiene una fuerza más concreta y menos técnica que «ineficaces».
- source_word: ἀκάρπους
  english_pob_choice: unfruitful
  chosen_spanish: sin fruto
  alternatives_spanish:
  - infructuosos
  - estériles
  lexicon: BDAG
  rationale: La metáfora agrícola/frutal se conserva de forma directa con «sin fruto»; es más transparente que alternativas más literarias.
- source_word: καθίστησιν
  english_pob_choice: keep you from being
  chosen_spanish: no los dejan
  alternatives_spanish:
  - no los hacen
  - no los vuelven
  lexicon: BDAG
  rationale: 'El verbo tiene sentido resultativo: estas cosas impiden que los lectores resulten ociosos y sin fruto. «No los dejan» expresa de modo idiomático esa función causal con naturalidad.'
- source_word: εἰς τὴν ... ἐπίγνωσιν
  english_pob_choice: in the knowledge
  chosen_spanish: en el conocimiento
  alternatives_spanish:
  - para el conocimiento
  - con respecto al conocimiento
  lexicon: BDAG
  rationale: εἰς con ἐπίγνωσις aquí indica esfera/relación con el conocer. «En el conocimiento» es la opción más clara y sobria en español.
- source_word: ἐπίγνωσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - pleno conocimiento
  - conocimiento pleno
  lexicon: BDAG
  rationale: «Conocimiento» es la base más natural en español; la posible intensificación de ἐπίγνωσις queda como matiz, sin imponerse en el texto principal.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: Se mantiene el título cristológico usual en español. Aquí es el equivalente más transparente para κύριος en la fórmula del versículo.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah / Jesus Christ
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se conserva el sentido titular de Χριστός con «Mesías», conforme al criterio del proyecto de no enmascarar el título. «Jesús Cristo» resultaría menos natural en español y más susceptible de leerse como nombre fijo.
theological_decisions:
- issue: Χριστός como título traducido o transliterado
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: El proyecto pide traducir Χριστός como título cuando su fuerza titular sigue viva. «Mesías» preserva ese valor semántico sin alterar la identificación cristológica.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
translation_notes:
  revision_awareness: El audio-trail inglés muestra una ida y vuelta editorial entre «Messiah» y «Christ»; aquí se sigue la política del proyecto y el criterio lexical auditado que favorece traducir Χριστός como «Mesías» en el texto principal. No se introducen notas porque el versículo no presenta una ambigüedad adicional que requiera alternativas textuales en español.
  spanish_consistency_notes:
  - Se mantiene «Jesús Mesías» para conservar la política terminológica del proyecto respecto de Χριστός.
  - «En el conocimiento» preserva la relación expresada por εἰς + ἐπίγνωσις sin sobretraducción.
  - Se evita un calco duro de la construcción griega y se usa una sintaxis española fluida, pero sin añadir contenido no sustentado por el texto.
