translation:
  language: es
  text: y en el conocimiento[a], el autocontrol; y en el autocontrol, la constancia; y en la constancia, la piedad[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'resistencia', 'perseverancia' o 'paciencia perseverante' para ὑπομονή.
    reason: lexical_alternative
  - marker: b
    text: 'El griego es elíptico: continúa la cadena de virtudes del versículo anterior, de modo que se sobreentiende un elemento con cada cualidad.'
    reason: cross_reference
lexical_decisions:
- source_word: γνώσει
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - saber
  - conocimiento
  lexicon: BDAG
  rationale: γνῶσις designa aquí conocimiento como una cualidad moral/espiritual dentro de la cadena de virtudes. 'Conocimiento' es el equivalente directo y natural en español, y mantiene la relación con la construcción acumulativa del pasaje.
- source_word: ἐγκράτειαν / ἐγκρατείᾳ
  english_pob_choice: self-control
  chosen_spanish: autocontrol
  alternatives_spanish:
  - dominio propio
  - templanza
  lexicon: BDAG
  rationale: ἐγκράτεια expresa dominio sobre impulsos y deseos. 'Autocontrol' es claro, actual y fiel al sentido ético; evita la posible arcaización de 'templanza' y el matiz más doctrinal de 'dominio propio'.
- source_word: ὑπομονήν / ὑπομονῇ
  english_pob_choice: steadfastness
  chosen_spanish: constancia
  alternatives_spanish:
  - perseverancia
  - resistencia
  - paciencia perseverante
  lexicon: BDAG
  rationale: ὑπομονή denota permanecer firme bajo dificultad. 'Constancia' comunica bien la idea de firmeza sostenida y encaja de forma natural en una lista de virtudes, sin restringirla solo a 'paciencia'.
- source_word: εὐσέβειαν
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - vida piadosa
  lexicon: BDAG
  rationale: εὐσέβεια se refiere a reverencia devota vivida delante de Dios. 'Piedad' es un equivalente tradicional y suficientemente preciso en español; en este contexto virtuosista conserva el registro moral sin forzar una paráfrasis.
- source_word: ἐν δὲ τῇ ... τὴν ...
  english_pob_choice: and in ..., ...
  chosen_spanish: y en ..., ...
  alternatives_spanish:
  - y con ..., ...
  - y en ..., se añade ...
  lexicon: BDAG
  rationale: La secuencia griega es elíptica y mantiene la estructura acumulativa. 'Y en ...' preserva esa compresión sin expandir el texto más allá de lo que el griego dice.
- source_word: δέ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ enlaza los elementos de la cadena de virtudes; 'y' refleja mejor ese flujo aditivo que 'pero' o 'ahora'.
theological_decisions:
- issue: Sintaxis elíptica de la cadena de virtudes
  english_pob_reading: Preserve the compressed list structure rather than expanding it into a full paraphrase.
  chosen_spanish_reading: Mantener la estructura comprimida de la lista sin convertirla en una paráfrasis explicativa.
  alternative_spanish_readings:
  - Y con el conocimiento, el autocontrol; y con el autocontrol, la constancia; y con la constancia, la piedad.
  - En el conocimiento, ejerced autocontrol; en el autocontrol, constancia; en la constancia, piedad.
  rationale: El griego continúa el patrón aditivo de la virtud anterior y omite elementos que el lector debe suplir por contexto. La traducción conserva esa economía sintáctica para no introducir interpretaciones ajenas al texto.
  doctrine_reference: Principio de primacía del texto original; evitar paráfrasis no autorizadas por el griego; equivalencia óptima.
translation_notes:
  revision_awareness: Se corrigió la validación anterior asegurando que todo marcador de nota aparezca exactamente en el texto español. También se ajustó la puntuación para que la nota [a] quede anclada en 'conocimiento' y la nota [b] en 'piedad'.
  spanish_consistency_notes:
  - Se mantiene 'conocimiento', 'autocontrol', 'constancia' y 'piedad' como equivalentes coherentes con el registro de lista de virtudes.
  - Se preserva la secuencia elíptica 'y en ...' para respetar la sintaxis griega.
  - Se evita 'SEÑOR' o 'Cristo' porque no aparecen en este versículo.
  - '''Piedad'' se usa aquí como equivalente de εὐσέβεια dentro de la cadena ética, no como término litúrgico técnico.'
