review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la cadena elíptica del griego y conserva adecuadamente γνώσει = conocimiento, ἐγκράτεια = autocontrol, y εὐσέβεια = piedad. Sin embargo, hay un desajuste importante en las notas: la nota [a] está anclada en ''conocimiento'' pero su contenido trata de ὑπομονή, no de γνώσει. Además, el inglés POB pone la nota léxica sobre ''knowledge'', no sobre ''steadfastness'', aunque el contenido de esa nota inglesa parece internamente inconsistente con el texto base. En español, tal como está, la nota [a] resulta incorrecta y confusa.'
  spanish_quality_summary: El español es claro, natural y de registro eclesial legible. 'Autocontrol', 'constancia' y 'piedad' funcionan bien en una lista de virtudes. La sintaxis comprimida 'y en..., ...' preserva el carácter elíptico del original sin sonar excesivamente forzada. La única reparación necesaria es corregir el sistema de notas para evitar una referencia errónea.
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. Las decisiones léxicas son razonables: ''conocimiento'' para γνῶσις, ''autocontrol'' para ἐγκράτεια, ''constancia'' para ὑπομονή y ''piedad'' para εὐσέβεια. ''Constancia'' es aceptable para ὑπομονή en este contexto, aunque ''perseverancia'' también habría sido posible. La nota léxica debe alinearse con la palabra realmente anotada en español.'
  issues:
  - severity: high
    issue: La nota [a] está anclada en 'conocimiento' pero explica ὑπομονή.
    rationale: Esto crea una incoherencia factual entre el marcador en el texto y el contenido de la nota. El lector entenderá erróneamente que la nota ofrece alternativas para 'conocimiento'.
  - severity: medium
    issue: La nota léxica heredada del inglés POB parece internamente desalineada con el texto inglés.
    rationale: El inglés coloca [a] tras 'knowledge' pero el contenido discute 'steadfastness' (ὑπομονή). Aunque no corresponde resolver el expediente inglés aquí, el español no debe perpetuar esa confusión; conviene adaptar la nota para que corresponda al anclaje español.
  revised_spanish_text: y en el conocimiento[a], el autocontrol; y en el autocontrol, la constancia; y en la constancia, la piedad[b],
  revised_footnotes:
  - marker: a
    text: O 'entendimiento' para γνώσει.
    reason: lexical_alternative
  - marker: b
    text: 'El griego es elíptico: continúa la cadena de virtudes del versículo anterior, de modo que se sobreentiende que cada cualidad debe añadirse a la anterior.'
    reason: cross_reference
  revision_rationale: Se conserva el texto principal, que es fiel y natural, pero se corrige la nota [a] para que corresponda al término español realmente marcado ('conocimiento') y se ajusta levemente la nota [b] para mayor claridad en español. No se requiere cambiar las decisiones léxicas principales del versículo.
