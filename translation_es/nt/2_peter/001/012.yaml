translation:
  language: es
  text: Por eso, siempre estaré dispuesto[a] a recordarles estas cosas, aunque ustedes ya las conocen y están establecidos en la verdad presente.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la verdad que ahora tienen».'
    reason: lexical_alternative
lexical_decisions:
- source_word: Διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por lo tanto
  - Así que
  lexicon: BDAG
  rationale: La conjunción inferencial introduce una conclusión respecto de lo anterior. «Por eso» comunica bien la relación lógica en español y suena natural sin debilitar el nexo causal-inferencial.
- source_word: μελλήσω
  english_pob_choice: I will always be ready
  chosen_spanish: estaré dispuesto
  alternatives_spanish:
  - siempre estaré listo
  - siempre me propondré
  lexicon: BDAG
  rationale: El futuro de μέλλω con infinitivo expresa intención o disposición futura, no solo simple futuridad. «Estaré dispuesto» conserva esa orientación volitiva; la idea de continuidad queda reforzada por ἀεί y por el contexto.
- source_word: ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  lexicon: BDAG
  rationale: Adverbio de repetición o continuidad. «Siempre» es la equivalencia más natural y directa en español.
- source_word: ὑπομιμνῄσκειν
  english_pob_choice: to remind
  chosen_spanish: recordarles
  alternatives_spanish:
  - seguir recordándoles
  - hacerles recordar
  lexicon: BDAG
  rationale: El verbo significa recordar a alguien o ponerle algo delante de la memoria. En español, «recordarles» transmite bien la acción sin sobrecargar la frase; el matiz durativo queda sugerido por ἀεί.
- source_word: περὶ τούτων
  english_pob_choice: about these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - acerca de estas cosas
  - sobre estas cosas
  lexicon: BDAG
  rationale: La preposición con genitivo indica tema o asunto. «Estas cosas» es idiomático en español y mantiene la referencia anafórica del texto.
- source_word: καίπερ
  english_pob_choice: even though
  chosen_spanish: aunque
  alternatives_spanish:
  - si bien
  - aun cuando
  lexicon: BDAG
  rationale: 'Concesiva clara y sobria en español. «Aunque» expresa bien la tensión: seguir recordando pese al conocimiento previo de los destinatarios.'
- source_word: εἰδότας
  english_pob_choice: you know them
  chosen_spanish: ya las conocen
  alternatives_spanish:
  - las saben
  - están al tanto de ellas
  lexicon: BDAG
  rationale: El participio perfecto de οἶδα expresa estado de conocimiento. «Ya las conocen» refleja ese estado sin forzar una construcción demasiado pesada.
- source_word: ἐστηριγμένους
  english_pob_choice: have been established
  chosen_spanish: están establecidos
  alternatives_spanish:
  - han sido establecidos
  - están firmemente establecidos
  - han sido afirmados
  lexicon: BDAG
  rationale: El participio perfecto pasivo de στηρίζω denota una condición ya producida y vigente. «Están establecidos» comunica el estado resultante de manera fluida; la opción mantiene abierta la fuerza de estabilización sin especificarla más allá del texto.
- source_word: ἐν τῇ παρούσῃ ἀληθείᾳ
  english_pob_choice: in the present truth
  chosen_spanish: en la verdad presente
  alternatives_spanish:
  - en la verdad que ahora tienen
  - en la verdad que está presente
  lexicon: BDAG
  rationale: «Presente» reproduce directamente παρούσῃ y conserva la expresión algo peculiar del griego. En español suena natural como sintagma nominal y deja abierta la posible referencia a la verdad actualmente poseída o vigente.
theological_decisions:
- issue: Alcance de «la verdad presente»
  english_pob_reading: Rendered as 'the present truth' without expanding it into a technical doctrinal phrase.
  chosen_spanish_reading: «la verdad presente», sin explicarla como término técnico.
  alternative_spanish_readings:
  - la verdad que ahora tienen
  - la verdad presente entre ustedes
  rationale: El griego no obliga a un sentido técnico o dispensacional. Se conserva la formulación breve y abierta para no resolver una tensión interpretativa que el texto no resuelve explícitamente.
  doctrine_reference: 'Translation philosophy §3: Preserve theological tension rather than resolve it.'
translation_notes:
  revision_awareness: La redacción sigue el sentido inferencial de Διὸ, el matiz volitivo de μέλλω y la concesiva de καίπερ, manteniendo la expresión compacta de ἐν τῇ παρούσῃ ἀληθείᾳ sin convertirla en una paráfrasis doctrinal.
  spanish_consistency_notes:
  - Se mantiene «verdad» para ἀλήθεια, en coherencia con el uso bíblico básico del término.
  - 'Se conserva el perfecto resultativo de ἐστηριγμένους como estado presente: «están establecidos».'
  - La nota de alternativa en el pie de página preserva la ambigüedad semántica de παρούσῃ sin introducir terminología ajena al pasaje.
