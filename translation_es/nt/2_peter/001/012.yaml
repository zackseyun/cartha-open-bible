    rationale: «Están establecidos» comunica bien el estado presente, aunque explicita menos claramente la pasividad/resultatividad que «han sido establecidos». No obstante, no distorsiona el sentido y sigue siendo una representación aceptable del perfecto pasivo en español idiomático.
