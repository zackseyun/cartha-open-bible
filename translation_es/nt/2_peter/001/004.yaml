base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/004.yaml
  text: through which he has granted to us his precious and very great promises[a], so that through these you may become sharers in the divine nature[b], having escaped the corruption that is in the world because of sinful desire.
  footnotes:
  - marker: a
    text: Or 'participants in the divine nature.' The phrase speaks of sharing in what comes from God, not of becoming divine in essence.
    reason: lexical_alternative
  - marker: b
    text: Or 'because of desire' or 'by lust.' The Greek term can mean 'desire' generally, but here it is morally negative in context.
    reason: lexical_alternative
