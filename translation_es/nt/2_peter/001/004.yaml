translation:
  language: es
  text: por medio de las cuales nos ha concedido sus preciosas y muy grandes promesas, para que por medio de ellas ustedes lleguen a ser partícipes[a] de la naturaleza divina, habiendo escapado de la corrupción que está en el mundo a causa del deseo pecaminoso[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «participantes de la naturaleza divina». La frase habla de compartir lo que proviene de Dios, no de llegar a ser divinos en esencia.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «a causa del deseo» o «por la concupiscencia». El término griego puede significar «deseo» en general, pero aquí es moralmente negativo por el contexto.'
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὧν
  english_pob_choice: through which
  chosen_spanish: por medio de las cuales
  alternatives_spanish:
  - por las cuales
  - mediante las cuales
  lexicon: BDAG
  rationale: διά con genitivo expresa medio/instrumento. En español, "por medio de las cuales" mantiene la referencia al antecedente plural y su valor mediador sin sobreespecificarlo.
- source_word: τίμια καὶ μέγιστα
  english_pob_choice: precious and very great
  chosen_spanish: preciosas y muy grandes
  alternatives_spanish:
  - valiosas y muy grandes
  - preciosas y magníficas
  lexicon: BDAG
  rationale: τίμιος comunica valor/precio; "preciosas" es natural y fiel. μέγιστα es superlativo, pero en español "muy grandes" preserva la fuerza idiomáticamente mejor que un superlativo rígido.
- source_word: ἡμῖν
  english_pob_choice: to us
  chosen_spanish: nos
  alternatives_spanish:
  - para nosotros
  - a nosotros
  lexicon: BDAG
  rationale: Con un verbo de conceder/dar, el dativo se expresa de forma natural en español con el objeto indirecto "nos".
- source_word: ἐπαγγέλματα
  english_pob_choice: promises
  chosen_spanish: promesas
  alternatives_spanish:
  - promesas solemnes
  - compromisos
  lexicon: BDAG
  rationale: '"Promesas" es el equivalente estándar y claro para ἐπαγγέλματα en este contexto, sin perder el sentido de compromiso divino.'
- source_word: δεδώρηται
  english_pob_choice: he has granted
  chosen_spanish: nos ha concedido
  alternatives_spanish:
  - nos ha dado
  - nos ha otorgado
  lexicon: BDAG
  rationale: El perfecto de δωρέομαι implica una concesión generosa con efecto vigente. "Ha concedido" conserva mejor la idea de otorgamiento benevolente que un simple "ha dado".
- source_word: ἵνα
  english_pob_choice: so that
  chosen_spanish: para que
  alternatives_spanish:
  - a fin de que
  - de modo que
  lexicon: BDAG
  rationale: Introduce finalidad; "para que" es la forma más natural y exacta en español.
- source_word: διὰ τούτων
  english_pob_choice: through these
  chosen_spanish: por medio de ellas
  alternatives_spanish:
  - por estas
  - mediante estas
  lexicon: BDAG
  rationale: Retoma las promesas como medio instrumental. "Ellas" preserva el antecedente femenino plural de "promesas" en español.
- source_word: γένησθε
  english_pob_choice: you may become
  chosen_spanish: lleguen a ser
  alternatives_spanish:
  - puedan llegar a ser
  - se hagan
  lexicon: BDAG
  rationale: γίνομαι expresa llegar a ser, no solo estar. "Lleguen a ser" conserva el matiz transformador mejor que un simple presente de estado.
- source_word: θείας κοινωνοὶ φύσεως
  english_pob_choice: sharers in the divine nature
  chosen_spanish: partícipes de la naturaleza divina
  alternatives_spanish:
  - participantes de la naturaleza divina
  - copartícipes de la naturaleza divina
  lexicon: BDAG
  rationale: '"Partícipes de" es una formulación española tradicional y precisa para κοινωνός; mantiene la idea de participación real sin sugerir divinización esencial. "Naturaleza divina" preserva el sintagma sin expandirlo interpretativamente.'
- source_word: ἀποφυγόντες
  english_pob_choice: having escaped
  chosen_spanish: habiendo escapado
  alternatives_spanish:
  - después de haber escapado
  - habiendo huido
  lexicon: BDAG
  rationale: El aoristo participio se vierte bien como acción anterior/acompañante. "Habiendo escapado" conserva la relación temporal con la participación en la naturaleza divina.
- source_word: φθορᾶς
  english_pob_choice: the corruption
  chosen_spanish: la corrupción
  alternatives_spanish:
  - la ruina
  - la decadencia
  lexicon: BDAG
  rationale: En el contexto moral, φθορά apunta a corrupción ética/espiritual; "corrupción" es la opción más directa y fiel.
- source_word: ἐν τῷ κόσμῳ
  english_pob_choice: that is in the world
  chosen_spanish: que está en el mundo
  alternatives_spanish:
  - en el mundo
  - del mundo
  lexicon: BDAG
  rationale: El giro atributivo describe la corrupción. "Que está en el mundo" explicita la relación sin alterar el sentido.
- source_word: ἐν ἐπιθυμίᾳ
  english_pob_choice: because of sinful desire
  chosen_spanish: a causa del deseo pecaminoso
  alternatives_spanish:
  - por el deseo pecaminoso
  - a causa de la concupiscencia
  lexicon: BDAG
  rationale: ἐπιθυμία puede ser neutra en otros contextos, pero aquí tiene fuerza moral negativa. "Deseo pecaminoso" comunica esa carga en español actual sin restringir indebidamente a lo sexual.
theological_decisions:
- issue: Participación en la naturaleza divina
  english_pob_reading: Rendered 'sharers in the divine nature' without explanatory expansion.
  chosen_spanish_reading: partícipes de la naturaleza divina
  alternative_spanish_readings:
  - participantes de la naturaleza divina
  - partícipes de la naturaleza divina
  rationale: 'La redacción conserva la fuerza del texto y la tensión teológica: participación real, pero no identidad esencial con Dios. No se añade una glosa doctrinal dentro del versículo; la nota puede aclarar que no implica deificación por esencia.'
  doctrine_reference: Affirmations; Translation philosophy §3
- issue: Fuerza moral de ἐπιθυμία
  english_pob_reading: Rendered as 'sinful desire' in context.
  chosen_spanish_reading: deseo pecaminoso
  alternative_spanish_readings:
  - deseo
  - concupiscencia
  rationale: El contexto vincula ἐπιθυμία con la corrupción del mundo, por lo que conviene explicitar su valor negativo. "Deseo pecaminoso" evita el estrechamiento semántico de "concupiscencia" y conserva la evaluación moral del pasaje.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: La revisión más reciente no exigió cambios; el consenso de auditoría es alto y coincide con la línea de traducción óptima ya establecida.
  spanish_consistency_notes:
  - Se mantuvo "naturaleza divina" para θείας φύσεως, conforme al audit trail inglés y la cautela doctrinal del proyecto.
  - Se eligió "partícipes de" como equivalente español estable para κοινωνοί, evitando "cristiano" o glosas interpretativas.
  - '"Corrupción" se conserva para φθορά por su uso ético en el contexto, no como mera decadencia física.'
  - El antecedente de δι’ ὧν / διὰ τούτων se expresó con referentes femeninos en español para concordar con "promesas".
  - Se evitó "SEÑOR" para este versículo porque el texto griego aquí no contiene κύριος ni un reemplazo del nombre divino.
