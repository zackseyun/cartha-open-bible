    prompt_sha256: 3baa0c88d05f583551b2998111ac0412346000afb76ce620531a1ed0c825921e
    timestamp: '2026-04-18T23:24:33Z'
    output_hash: 03f354bed6876aa365c44130e800fbb72c91dc2911586db9ab6c0be8e0a97a33
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
    timestamp: '2026-04-23T09:37:51Z'
    unchanged: false
    changes_summary: 'Changed ''slave'' to ''servant'' for more natural formal register while still accurately rendering δοῦλος in this epistolary self-description. No other changes needed. [Regression fix applied: slave restored (revision_pass had changed δοῦλος → servant against DOCTRINE.md policy)]'
translation:
  language: es
  text: 'Simeón Pedro[a], esclavo y apóstol de Jesús Mesías, a los que han obtenido una fe tan preciosa como la nuestra en la justicia[b] de nuestro Dios y Salvador Jesús Mesías[c]:'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «Simón Pedro». El griego dice Συμεών, no Σίμων; por eso se prefiere «Simeón» como reflejo más directo de la forma textual.
    reason: lexical_alternative
  - marker: b
    text: O «por la justicia» o «mediante la justicia». El griego ἐν con dativo puede expresar esfera, medio o relación, por lo que la relación exacta queda deliberadamente abierta.
    reason: lexical_alternative
  - marker: c
    text: 'El griego se lee de manera más natural como un solo referente: «nuestro Dios y Salvador, Jesús Mesías». Una lectura menos probable entiende dos personas: «nuestro Dios» y «el Salvador Jesús Mesías».'
    reason: theological_note
lexical_decisions:
- source_word: Συμεὼν Πέτρος
  english_pob_choice: Simeon Peter
  chosen_spanish: Simeón Pedro
  alternatives_spanish:
  - Simón Pedro
  lexicon: BDAG
  rationale: El griego usa Συμεών, no Σίμων. «Simeón» refleja más directamente la forma del texto fuente, mientras que «Pedro» conserva el nombre apostólico habitual.
- source_word: δοῦλος
  english_pob_choice: slave
  chosen_spanish: esclavo
  alternatives_spanish:
  - siervo
  - sirviente
  lexicon: BDAG
  rationale: Se mantiene la fuerza lexical de δοῦλος como pertenencia y sujeción total, coherente con la política POB de no suavizar el término en este contexto apostólico.
- source_word: ἀπόστολος
  english_pob_choice: apostle
  chosen_spanish: apóstol
  alternatives_spanish:
  - enviado
  - mensajero
  lexicon: BDAG
  rationale: «Apóstol» es el equivalente preciso y establecido para el oficio comisionado indicado por ἀπόστολος; «enviado» o «mensajero» serían demasiado débiles.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título; en español se traduce como «Mesías» para conservar su sentido semántico y no convertirlo sin necesidad en un nombre fijo.
- source_word: τοῖς ... λαχοῦσιν
  english_pob_choice: to those who have obtained
  chosen_spanish: a los que han obtenido
  alternatives_spanish:
  - a los que han recibido
  - a los que les ha tocado
  lexicon: BDAG
  rationale: «Han obtenido» preserva la idea de recibir/obtener sin forzar la metáfora del sorteo que puede estar presente en λαγχάνω.
- source_word: ἰσότιμον ... πίστιν
  english_pob_choice: a faith as precious as ours
  chosen_spanish: una fe tan preciosa como la nuestra
  alternatives_spanish:
  - una fe de igual valor que la nuestra
  - una fe de igual honra que la nuestra
  lexicon: BDAG
  rationale: ἰσότιμος puede expresar igual valor, honor o privilegio. «Tan preciosa como» comunica bien la igualdad de valor en español natural, sin perder la comparación con la fe apostólica.
- source_word: πίστιν
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - confianza
  - fidelidad
  lexicon: BDAG
  rationale: En este contexto πίστις se refiere a la fe compartida por los creyentes, no a la fidelidad de Cristo; por eso «fe» es la opción principal.
- source_word: ἐν δικαιοσύνῃ
  english_pob_choice: in the righteousness
  chosen_spanish: en la justicia
  alternatives_spanish:
  - por la justicia
  - mediante la justicia
  lexicon: BDAG
  rationale: Se conserva «en» para reflejar la ambigüedad de ἐν con dativo. «Justicia» es la equivalencia preferida aquí por la conexión natural del sustantivo con el sintagma preposicional en español; «rectitud» también sería posible, pero menos contextual.
- source_word: δικαιοσύνῃ
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque «rectitud» es posible, «justicia» mantiene el campo semántico bíblico usual de δικαιοσύνη y resulta más directo en esta construcción.
- source_word: τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ
  english_pob_choice: of our God and Savior Jesus Messiah
  chosen_spanish: de nuestro Dios y Salvador Jesús Mesías
  alternatives_spanish:
  - de nuestro Dios y del Salvador Jesús Mesías
  - de nuestro Dios y Salvador, Jesús Mesías
  lexicon: BDAG
  rationale: 'La construcción con un solo artículo favorece la lectura de un solo referente: Jesús. El español puede reproducir esa unidad con «nuestro Dios y Salvador Jesús Mesías», preservando el valor cristológico del pasaje.'
theological_decisions:
- issue: Si «nuestro Dios y Salvador Jesús Mesías» designa a una sola persona o a dos personas
  english_pob_reading: 'One person: Jesus is called ''our God and Savior.'''
  chosen_spanish_reading: 'Una sola persona: Jesús es llamado «nuestro Dios y Salvador».'
  alternative_spanish_readings:
  - 'Dos personas: «nuestro Dios» y «el Salvador Jesús Mesías»'
  rationale: La sintaxis griega con un solo artículo para θεοῦ y σωτῆρος, unidos por καί y seguidos por un nombre singular, favorece fuertemente una sola referencia. Se conserva la lectura cristológica principal y no se oculta la alternativa menos probable.
  doctrine_reference: Credo niceno; Calcedonia; afirmación cristológica de POB
- issue: Valor de ἐν δικαιοσύνῃ en la relación entre la fe recibida y la justicia de Dios
  english_pob_reading: in the righteousness / through the righteousness / by the righteousness
  chosen_spanish_reading: «en la justicia» mantiene abierta la relación exacta sin cerrar indebidamente la función del sintagma.
  alternative_spanish_readings:
  - por la justicia
  - mediante la justicia
  rationale: La preposición griega permite matiz locativo, instrumental o esférico. La formulación española debe conservar esa ambigüedad razonable en vez de imponer una sola lectura.
  doctrine_reference: Principio POB de no eliminar tensiones léxicas documentadas
translation_notes:
  revision_awareness: 'El contexto auditado en inglés confirma dos decisiones relevantes para este verso: la restauración de «slave» para δοῦλος y la preferencia por una lectura unitaria de «our God and Savior Jesus Messiah». También se documenta la posibilidad léxica de ἰσότιμον como «equal standing»/«equally precious», por lo que el español eligió una equivalencia idiomática que preserve la igualdad de valor sin perder naturalidad. He tenido en cuenta las revisiones recientes que suavizaron luego revirtieron δοῦλος, y mantuve la opción más fiel a la política POB.'
  spanish_consistency_notes:
  - «Mesías» se usa para Χριστός en coherencia con la política terminológica del proyecto, no como sustitución automática de un nombre propio.
  - «Esclavo» se mantiene para δοῦλος por fuerza lexical y por consistencia con el registro doctrinal del archivo auditado.
  - La puntuación con dos puntos al final refleja el encabezado epistolar y la continuación implícita del saludo.
  - Se conserva la ambigüedad de ἐν δικαιοσύνῃ en la nota, aunque el texto principal opta por la forma más natural en español bíblico contemporáneo.
