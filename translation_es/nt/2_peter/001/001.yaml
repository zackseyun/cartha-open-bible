source:
  edition: SBLGNT
  text: ⸀Συμεὼν Πέτρος δοῦλος καὶ ἀπόστολος Ἰησοῦ Χριστοῦ τοῖς ἰσότιμον ἡμῖν λαχοῦσιν πίστιν ἐν δικαιοσύνῃ τοῦ θεοῦ ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/001.yaml
  text: 'Simeon Peter[a], a slave and apostle of Jesus Messiah[d][c][b], to those who have obtained a faith as precious as ours in the righteousness of our God and Savior Jesus Messiah:'
  footnotes:
  - marker: a
    text: Or 'a faith of equal standing with ours.' The adjective can emphasize equal value, honor, or privilege.
    reason: lexical_alternative
  - marker: b
    text: Or 'through the righteousness' or 'by the righteousness.' The preposition may express sphere or means.
    reason: lexical_alternative
  - marker: c
    text: The Greek most naturally reads 'our God and Savior Jesus Messiah' as one referent, identifying Jesus as both God and Savior. A less likely alternative is 'our God and the Savior Jesus Messiah,' referring to two persons.
    reason: alternative_reading
  - marker: d
    text: Or 'equally precious with ours'.
    reason: previous_rendering
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
