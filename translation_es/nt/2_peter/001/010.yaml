revisions:
- from: Por eso[a], hermanos, esfuércense más aún por hacer firme su llamado y elección; porque, practicando estas cosas, nunca tropezarán.
  to: Por eso[a], hermanos, esfuércense más aún por hacer firme su llamado y elección; porque si hacen estas cosas, ciertamente nunca tropezarán.
  rationale: Se conserva la buena base del borrador, pero se ajusta el participio ποιοῦντες a una formulación condicional más fiel y natural en español ('si hacen estas cosas') y se refuerza la negación enfática οὐ μὴ ... ποτε con 'ciertamente nunca'. Esto mejora la correspondencia con el griego y con el audit trail inglés sin introducir interpretación doctrinal adicional.
  reviewer_model: gpt-5.4
