translation:
  language: es
  text: Por eso[a], hermanos, esfuércense más aún por hacer firme su llamado y elección; porque si hacen estas cosas, ciertamente nunca tropezarán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego dice 'hermanos' y puede dirigirse inclusivamente a toda la comunidad creyente.
    reason: lexical_alternative
lexical_decisions:
- source_word: διὸ
  english_pob_choice: Therefore
  chosen_spanish: Por eso
  alternatives_spanish:
  - Por tanto
  - Así que
  lexicon: BDAG
  rationale: Expresa con naturalidad en español la conclusión inferida del contexto anterior, sin perder la relación lógica.
- source_word: μᾶλλον
  english_pob_choice: all the more
  chosen_spanish: más aún
  alternatives_spanish:
  - todavía más
  - cuanto más
  lexicon: BDAG
  rationale: Conserva el valor intensificador del comparativo de forma idiomática y breve.
- source_word: ἀδελφοί
  english_pob_choice: brothers
  chosen_spanish: hermanos
  alternatives_spanish:
  - hermanos y hermanas
  lexicon: BDAG
  rationale: Mantiene la forma masculina plural del griego en el apelativo directo, con posibilidad inclusiva indicada en nota.
- source_word: σπουδάσατε
  english_pob_choice: be all the more diligent
  chosen_spanish: esfuércense
  alternatives_spanish:
  - aplíquense
  - esfuércense diligentemente
  lexicon: BDAG
  rationale: Transmite la idea de esfuerzo serio y diligente en un español natural; el intensificador queda en 'más aún'.
- source_word: βεβαίαν
  english_pob_choice: sure
  chosen_spanish: firme
  alternatives_spanish:
  - seguro
  - confirmado
  - segura
  lexicon: BDAG
  rationale: '''Firme'' comunica estabilidad/confirmación y evita reducir el sentido a mera certeza subjetiva.'
- source_word: κλῆσιν
  english_pob_choice: calling
  chosen_spanish: llamado
  alternatives_spanish:
  - vocación
  - llamamiento
  lexicon: BDAG
  rationale: '''Llamado'' conserva el sentido teológico del acto de Dios que convoca, sin sonar marcadamente eclesiástico.'
- source_word: ἐκλογὴν
  english_pob_choice: election
  chosen_spanish: elección
  alternatives_spanish:
  - escogimiento
  - elección divina
  lexicon: BDAG
  rationale: '''Elección'' reproduce el término teológico con precisión y sin introducir un sistema doctrinal ajeno al texto.'
- source_word: ποιεῖσθαι
  english_pob_choice: to make
  chosen_spanish: hacer
  alternatives_spanish:
  - establecer
  - confirmar
  lexicon: BDAG
  rationale: En combinación con 'firme', 'hacer firme' refleja bien la idea de confirmar/establecer sin sugerir que el llamado y la elección son originados por el esfuerzo humano.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - tales cosas
  lexicon: BDAG
  rationale: Retoma de forma explícita las virtudes y prácticas del contexto inmediato.
- source_word: ποιοῦντες
  english_pob_choice: if you do
  chosen_spanish: practicando
  alternatives_spanish:
  - si hacen
  - al practicar
  lexicon: BDAG
  rationale: El participio expresa la acción concomitante que fundamenta la promesa; 'practicando' recoge bien el matiz de conducta perseverante.
- source_word: οὐ μὴ
  english_pob_choice: certainly never
  chosen_spanish: nunca
  alternatives_spanish:
  - de ningún modo
  - jamás
  lexicon: BDAG
  rationale: La negación enfática se traduce de manera natural; el contexto y la cláusula participial ya aportan la fuerza asseverativa.
- source_word: πταίσητέ
  english_pob_choice: stumble
  chosen_spanish: tropezarán
  alternatives_spanish:
  - caerán
  - resbalarán
  lexicon: BDAG
  rationale: '''Tropezar'' conserva la metáfora de obstáculo/fallo sin cargarlo con la idea de pecado total o caída final.'
theological_decisions:
- issue: Cómo entender 'hacer firme su llamado y elección'
  english_pob_reading: Exhortation to confirm or demonstrate the reality of God's call and choice through persevering virtue, not to cause God's calling/election to come into existence.
  chosen_spanish_reading: Exhortación a confirmar o hacer visible, mediante una vida diligente, la realidad del llamado y la elección de Dios, no a producirlos por esfuerzo humano.
  alternative_spanish_readings:
  - Procurar asegurar su salvación por obras
  - Hacer que Dios los elija
  rationale: '''Hacer firme'' permite conservar la tensión del griego entre confirmación práctica y origen divino. Evita tanto un pelagianismo implícito como una resolución confesional no explicitada por el texto.'
  doctrine_reference: Preservar la tensión teológica del pasaje sin resolverla en un sistema denominacional.
- issue: Fuerza de 'nunca tropezarán'
  english_pob_reading: A promise of preservation from stumbling/falling in the course of faithful Christian living, not an absolute claim of sinless perfection.
  chosen_spanish_reading: Promesa de preservación en la vida cristiana fiel, no afirmación de perfección sin pecado.
  alternative_spanish_readings:
  - Nunca cometerán pecado alguno
  - Nunca caerán definitivamente
  rationale: πταίω es metáfora de tropiezo o caída; 'tropezarán' evita sobreinterpretar el alcance de la promesa más allá de lo que el verso afirma.
  doctrine_reference: No convertir la metáfora en una doctrina más fuerte que el texto.
translation_notes:
  revision_awareness: 'El borrador sigue de cerca el análisis auditado del inglés POB y del griego: conserva la conexión inferencial de διὸ, el intensificador de μᾶλλον, la tensión de βεβαίαν/ποιεῖσθαι como confirmación y no producción, y la negación enfática de οὐ μὴ sin volverla más fuerte que el texto.'
  spanish_consistency_notes:
  - Se mantuvo 'Yahvé' como norma del proyecto, pero este verso no contiene el Tetragrámaton.
  - Se prefirió 'llamado' y 'elección' por consistencia con terminología teológica del proyecto.
  - '''Hermanos'' se conserva en el texto principal y se aclara la posible inclusividad en nota.'
  - Se usó 'tropezarán' para preservar la metáfora de πταίω sin introducir 'pecado' ni 'apostatarán'.
