review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido general del griego: inferencia lógica (διὸ), intensificación (μᾶλλον), apelativo ''hermanos'', exhortación a diligencia, ''llamado y elección'', y la promesa de no ''tropezar''. Sin embargo, dos ajustes mejorarían la fidelidad: (1) ποιοῦντες tiene fuerza condicional/práctica mejor expresada como ''si hacen estas cosas'' que como ''practicando estas cosas''; (2) οὐ μὴ ... ποτε es una negación enfática que conviene reforzar en español más allá de un simple ''nunca''.'
  spanish_quality_summary: El español es claro, natural y eclesialmente legible. 'Por eso', 'hermanos', 'hacer firme su llamado y elección' y 'tropezarán' son buenas elecciones. La frase 'porque, practicando estas cosas' suena un poco menos directa y algo más pesada que una formulación condicional simple. También hay una pequeña mejora estilística al evitar la coma tras 'porque'.
  glossary_alignment: No hay conflicto con la terminología base del proyecto. 'Hermanos' con nota inclusiva sigue la pauta del POB. 'Llamado' y 'elección' preservan bien κλῆσις y ἐκλογή. No aparecen términos sensibles del glosario principal que requieran corrección.
  issues:
  - severity: medium
    issue: La fuerza de ποιοῦντες se vierte de forma menos precisa con 'practicando estas cosas'.
    rationale: Aunque el participio puede expresar acción concomitante, el inglés auditado explicitó correctamente su valor condicional en contexto ('if you do these things'). En español, 'si hacen estas cosas' comunica mejor la lógica exhortativa y la promesa resultante.
  - severity: medium
    issue: La negación enfática οὐ μὴ ... ποτε queda atenuada en 'nunca tropezarán'.
    rationale: El griego usa una construcción enfática fuerte. 'Nunca' no es incorrecto, pero 'ciertamente nunca' o 'jamás tropezarán' preserva mejor el énfasis sin sobreinterpretar el alcance teológico.
  - severity: low
    issue: Puntuación y fluidez en 'porque, practicando estas cosas'.
    rationale: 'La coma tras ''porque'' no ayuda a la fluidez en español y la frase suena menos natural que una cláusula simple: ''porque si hacen estas cosas...''.'
  revised_spanish_text: Por eso[a], hermanos, esfuércense más aún por hacer firme su llamado y elección; porque si hacen estas cosas, ciertamente nunca tropezarán.
  revised_footnotes:
  - marker: a
    text: O 'hermanos y hermanas'; el griego dice 'hermanos' y puede dirigirse inclusivamente a toda la comunidad creyente.
    reason: lexical_alternative
  revision_rationale: Se conserva la buena base del borrador, pero se ajusta el participio ποιοῦντες a una formulación condicional más fiel y natural en español ('si hacen estas cosas') y se refuerza la negación enfática οὐ μὴ ... ποτε con 'ciertamente nunca'. Esto mejora la correspondencia con el griego y con el audit trail inglés sin introducir interpretación doctrinal adicional.
