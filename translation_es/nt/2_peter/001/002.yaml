  spanish_quality_summary: La redacción es clara y eclesialmente natural, pero «sean multiplicadas» suena menos idiomático en un saludo de bendición que «les sean multiplicadas». Añadir el pronombre dativo mejora la naturalidad del español y representa mejor el dativo ὑμῖν sin alterar el sentido.
