translation:
  language: es
  text: Gracia a ustedes y paz les sean multiplicadas[a] en el conocimiento de Dios y de Jesús nuestro Señor[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por medio del conocimiento de Dios y de Jesús nuestro Señor». El griego ἐν puede indicar esfera («en») o medio/instrumento («por medio de»).
    reason: alternative_reading
  - marker: b
    text: O «el conocimiento pleno» para ἐπίγνωσις. El término puede llevar la idea de un conocimiento más pleno o más completo.
    reason: lexical_alternative
lexical_decisions:
- source_word: χάρις
  english_pob_choice: Grace
  chosen_spanish: Gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: Mantiene el saludo epistolar normal y la carga teológica de favor inmerecido; en español, «gracia» es el equivalente natural y más fiel que «favor».
- source_word: ὑμῖν
  english_pob_choice: to you
  chosen_spanish: a ustedes
  alternatives_spanish:
  - para ustedes
  - a vosotros
  lexicon: Greek grammar
  rationale: El dativo de destinatario se expresa de modo natural en español con «a ustedes». Se evita un tono demasiado peninsular o arcaico.
- source_word: εἰρήνη
  english_pob_choice: peace
  chosen_spanish: paz
  alternatives_spanish:
  - bienestar
  lexicon: BDAG
  rationale: «Paz» conserva el sentido epistolar y bíblico habitual, con resonancia semítica y eclesial.
- source_word: πληθυνθείη
  english_pob_choice: be multiplied
  chosen_spanish: sean multiplicadas
  alternatives_spanish:
  - sean aumentadas
  - se multipliquen
  lexicon: BDAG
  rationale: El optativo pasivo de deseo se refleja bien con una perífrasis pasiva de bendición. «Sean multiplicadas» conserva la idea de abundancia y la pasividad del verbo mejor que una forma simplemente activa.
- source_word: ἐν
  english_pob_choice: in
  chosen_spanish: en
  alternatives_spanish:
  - por medio de
  - a través de
  lexicon: BDAG
  rationale: Se conserva la preposición «en» para mantener la apertura semántica entre esfera y medio, tal como la nota inglesa la deja auditable.
- source_word: ἐπιγνώσει
  english_pob_choice: the knowledge
  chosen_spanish: el conocimiento
  alternatives_spanish:
  - el pleno conocimiento
  - el conocimiento pleno
  - el reconocimiento
  lexicon: BDAG
  rationale: «Conocimiento» es la traducción principal más natural y sobria. Se evita fijar de entrada «pleno conocimiento», aunque esa posibilidad queda como alternativa válida en el trasfondo léxico.
- source_word: θεοῦ
  english_pob_choice: God
  chosen_spanish: Dios
  lexicon: BDAG
  rationale: Renderización directa y estándar del genitivo dependiente de «conocimiento».
- source_word: Ἰησοῦ
  english_pob_choice: Jesus
  chosen_spanish: Jesús
  lexicon: BDAG
  rationale: Nombre propio transliterado conforme al proyecto.
- source_word: κυρίου
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Maestro
  lexicon: BDAG
  rationale: «Señor» preserva el título cristológico y el uso neotestamentario estándar en español. Aquí no se usa Yahvé porque el texto griego dice κύριος aplicado a Jesús, no el nombre divino.
- source_word: τοῦ θεοῦ καὶ Ἰησοῦ τοῦ κυρίου ἡμῶν
  english_pob_choice: of God and of Jesus our Lord
  chosen_spanish: de Dios y de Jesús nuestro Señor
  alternatives_spanish:
  - de Dios y de Jesús, nuestro Señor
  lexicon: Greek grammar
  rationale: Se repite la relación dependiente con «de» para evitar ambigüedad y reflejar que ambos sustantivos dependen de «conocimiento». El posesivo «nuestro» sigue de cerca el griego y su matiz relacional.
theological_decisions:
- issue: Relación semántica de ἐν con ἐπιγνώσει
  english_pob_reading: in the knowledge of God and of Jesus our Lord
  chosen_spanish_reading: en el conocimiento de Dios y de Jesús nuestro Señor
  alternative_spanish_readings:
  - por medio del conocimiento de Dios y de Jesús nuestro Señor
  - a través del conocimiento de Dios y de Jesús nuestro Señor
  rationale: La preposición griega permite tanto esfera como medio. La redacción principal conserva «en» para no resolver la relación demasiado pronto y seguir el valor formal del texto, dejando la alternativa en nota.
  doctrine_reference: Translation philosophy §3
- issue: Alcance de ἐπίγνωσις en 2 Pedro
  english_pob_reading: knowledge
  chosen_spanish_reading: conocimiento
  alternative_spanish_readings:
  - pleno conocimiento
  - conocimiento pleno
  - verdadero conocimiento
  rationale: En 2 Pedro el término puede intensificar la idea de conocimiento, pero el texto inmediato no obliga a traducirlo con un adjetivo explicativo. «Conocimiento» mantiene la tensión lexical sin sobredeterminarla.
  doctrine_reference: Translation philosophy §3, §6
- issue: Forma verbal de bendición en πληθυνθείη
  english_pob_reading: be multiplied
  chosen_spanish_reading: sean multiplicadas
  alternative_spanish_readings:
  - se multipliquen
  - sean aumentadas
  rationale: La traducción pasiva mantiene el carácter de deseo/bendición del optativo. Se evita un simple «multipliquen» porque perdería la pasividad y el tono exhortativo-benévolo.
  doctrine_reference: Greek grammar; Translation philosophy §3
translation_notes:
  revision_awareness: 'La redacción sigue el estado final del POB inglés, cuyo último pase quedó sin cambios y con alta concordancia. Se han conservado sus tensiones interpretativas principales: ἐν como esfera o medio, y ἐπίγνωσις como «conocimiento» con una alternativa de sentido más pleno en nota.'
  spanish_consistency_notes:
  - Se mantiene «Gracia... y paz» como fórmula epistolar natural y teológicamente cargada en español.
  - Se usa «Jesús nuestro Señor» sin comas internas para reflejar la dependencia continua del sintagma griego.
  - Se conserva «Dios» y «Señor» como títulos, evitando sustituciones litúrgicas no requeridas por el texto.
  - El orden del complemento final sigue el patrón español más claro, pero preserva la doble dependencia de «conocimiento» respecto de «Dios» y «Jesús nuestro Señor».
