revisions:
- from: Pero considero justo[a], mientras esté en este tabernáculo, despertarlos con recordatorio,
  to: Pero considero correcto, mientras estoy en esta tienda[a], despertarlos por medio de recordárselo,
  rationale: 'Se revisa para alinear mejor el español con el griego y con la justificación auditada del POB: ''correcto'' expresa mejor δίκαιον en este giro; ''tienda'' preserva la metáfora de σκηνώματι sin añadir connotaciones cultuales de ''tabernáculo''; y ''por medio de recordárselo'' comunica de forma natural el valor de ἐν ὑπομνήσει. La nota se ajusta para reflejar la nueva elección léxica y conservar las alternativas significativas.'
