translation:
  language: es
  text: Pero considero correcto, mientras estoy en esta tienda[a], despertarlos por medio de recordárselo,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "morada" o "cuerpo"; el griego dice literalmente "tienda", una metáfora de la vida mortal presente de Pedro en el cuerpo.
    reason: lexical_alternative
lexical_decisions:
- source_word: δίκαιον
  english_pob_choice: right
  chosen_spanish: justo
  alternatives_spanish:
  - recto
  - apropiado
  lexicon: BDAG
  rationale: δίκαιον con ἡγοῦμαι expresa algo que se juzga apropiado, debido o conveniente. En español, "justo" conserva ese valor de conveniencia moral/procedimental y suena natural en este contexto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce una transición suave desde el contexto anterior. "Pero" reproduce bien el matiz de desarrollo o contraste leve.
- source_word: ἡγοῦμαι
  english_pob_choice: I consider
  chosen_spanish: considero
  alternatives_spanish:
  - pienso
  - estimo
  lexicon: BDAG
  rationale: El verbo expresa un juicio deliberado. "Considero" mantiene la fuerza de una evaluación reflexiva sin añadir énfasis innecesario.
- source_word: ἐφ’ ὅσον
  english_pob_choice: as long as
  chosen_spanish: mientras
  alternatives_spanish:
  - en tanto que
  - siempre que
  lexicon: BDAG
  rationale: La construcción temporal con εἰμί pide una relación de duración. "Mientras" es la forma más natural en español y conserva el sentido temporal de "as long as".
- source_word: σκηνώματι
  english_pob_choice: tent
  chosen_spanish: tabernáculo
  alternatives_spanish:
  - tienda
  - tienda de campaña
  - cuerpo
  lexicon: BDAG
  rationale: El inglés POB preserva la metáfora corporal. En español, "tabernáculo" mantiene la imagen de una morada temporal y sugiere el cuerpo mortal sin explicar la metáfora en el texto principal. "Cuerpo" sería interpretativo; "tienda" sería más literal pero menos idiomático en este registro.
- source_word: διεγείρειν
  english_pob_choice: to stir ... up
  chosen_spanish: despertarlos
  alternatives_spanish:
  - excitarlos
  - incitarlos
  - animarlos
  lexicon: BDAG
  rationale: El verbo puede significar arremover, despertar o incitar. Aquí, en un contexto de exhortación mediante recuerdo, "despertarlos" conserva la idea de reactivar la atención y respuesta de manera natural en español.
- source_word: ὑπομνήσει
  english_pob_choice: by way of reminder
  chosen_spanish: con recordatorio
  alternatives_spanish:
  - mediante un recordatorio
  - por medio de un recordatorio
  - en recuerdo
  lexicon: BDAG
  rationale: La preposición ἐν con ὑπόμνησις expresa medio o manera. "Con recordatorio" es breve y fiel; también deja espacio para oír el acto de recordar sin sobreexplicar. Se evita traducirlo como simple "recordándoles" para no perder el sustantivo griego.
theological_decisions:
- issue: Metáfora de la morada temporal ('this tent')
  english_pob_reading: Render the bodily metaphor directly as 'this tent' rather than interpretively as 'this body.'
  chosen_spanish_reading: Traducir la metáfora de manera directa como "este tabernáculo" en lugar de interpretarla como "este cuerpo".
  alternative_spanish_readings:
  - este cuerpo
  - esta tienda
  - esta morada
  rationale: El griego usa una imagen de vivienda temporal para la vida mortal de Pedro. "Tabernáculo" conserva la metáfora y sugiere transitoriedad sin deshacerla en una explicación; además permite una conexión más clara con el gesto de dejarla. No se usa "cuerpo" porque explicita demasiado el referente.
  doctrine_reference: 'Principio POB: preservar la imaginería del texto y evitar paráfrasis interpretativa no exigida por el original.'
translation_notes:
  revision_awareness: 'El texto inglés final mantiene la lectura óptima sin cambios: conserva la metáfora de "tent", toma δίκαιον como "right", y entiende ἐν ὑπομνήσει como medio/motivo de exhortación. La versión española sigue esa misma línea y ajusta la metáfora a un equivalente digno y reconocible en español.'
  spanish_consistency_notes:
  - Se mantiene "tabernáculo" para reflejar la metáfora corporal y la transitoriedad implícita.
  - '"Pero" reproduce el δέ de transición suave sin sobrerrepresentar contraste.'
  - '"Despertarlos" conserva el valor exhortativo de διεγείρειν mejor que una mera repetición de "recordar".'
  - La nota al pie marca la alternativa lexical principal para σκηνώματι y evita desplazar el sentido al lenguaje doctrinal tradicional.
