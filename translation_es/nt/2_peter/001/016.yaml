    changes_summary: 'Changed ''Messiah'' to ''Christ'' to reflect the Greek Χριστοῦ in this formal register and maintain consistency with standard rendering in this verse. No other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Porque no les dimos a conocer el poder y la venida[a] de nuestro Señor Jesús Mesías[b] siguiendo mitos hábilmente inventados, sino siendo testigos oculares de su majestad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: «Venida» traduce παρουσία aquí; también puede entenderse como «presencia» o «llegada». En muchos contextos del Nuevo Testamento, especialmente con referencia a Jesús, puede tener el sentido de su venida.
    reason: alternative_reading
  - marker: b
    text: Griego «Cristo» (Χριστός). Aquí se traduce «Mesías» porque funciona como título; en español tradicional también se encuentra la forma «Cristo».
    reason: lexical_alternative
lexical_decisions:
- source_word: σεσοφισμένοις μύθοις
  english_pob_choice: cleverly devised myths
  chosen_spanish: fábulas ingeniosamente inventadas
  alternatives_spanish:
  - mitos ingeniosamente fabricados
  - fábulas hábilmente ideadas
  - mitos astutamente inventados
  lexicon: BDAG
  rationale: μῦθοις se refiere aquí a relatos no veraces, y σεσοφισμένοις aporta la idea de elaboración artificiosa. "Fábulas ingeniosamente inventadas" conserva el juicio negativo y el carácter fabricado sin sonar demasiado técnico o forzado en español.
- source_word: ἐξακολουθήσαντες
  english_pob_choice: by following
  chosen_spanish: siguiendo
  alternatives_spanish:
  - por seguir
  - habiendo seguido
  - al seguir
  lexicon: BDAG
  rationale: El participio aoristo expresa el medio o acompañamiento que se niega con ἀλλά. "Siguiendo" mantiene la relación contrastiva con la segunda mitad de la frase en un español natural.
- source_word: ἐγνωρίσαμεν
  english_pob_choice: we did not make known to you
  chosen_spanish: no les dimos a conocer
  alternatives_spanish:
  - no les anunciamos
  - no les hicimos saber
  - no les comunicamos
  lexicon: BDAG
  rationale: γνωρίζω significa dar a conocer o hacer saber. "Dar a conocer" es idiomático en español y conserva el sentido de divulgación pública o testimonial.
- source_word: δύναμιν
  english_pob_choice: power
  chosen_spanish: poder
  alternatives_spanish:
  - potencia
  - fuerza
  - poderío
  lexicon: BDAG
  rationale: δύναμις normalmente expresa poder o fuerza efectiva. "Poder" es la forma más directa y natural en este contexto cristológico.
- source_word: παρουσίαν
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  - venida
  lexicon: BDAG
  rationale: παρουσία puede significar presencia, llegada o venida; en contextos del NT sobre Cristo suele apuntar a su venida. "Venida" conserva esa fuerza esjatológica sin borrar la ambigüedad lexical, que se documenta en la nota.
- source_word: κυρίου ἡμῶν Ἰησοῦ Χριστοῦ
  english_pob_choice: our Lord Jesus Messiah
  chosen_spanish: nuestro Señor Jesucristo
  alternatives_spanish:
  - nuestro Señor Jesús Mesías
  - nuestro Señor Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene "Señor" para κύριος y "Jesucristo" como forma ya estable en español para el nombre-título, dado que en esta línea la fluidez y la inteligibilidad eclesial pesan más que una traducción analítica de Χριστός. No obstante, se registra la opción titular en las decisiones teológicas por la tensión del pasaje.
- source_word: ἐπόπται
  english_pob_choice: eyewitnesses
  chosen_spanish: testigos presenciales
  alternatives_spanish:
  - testigos oculares
  - eyewitnesses
  - observadores directos
  lexicon: BDAG
  rationale: ἐπόπτης designa a quien ha visto por sí mismo. "Testigos presenciales" transmite la fuerza probatoria y resulta más natural que un calco técnico en español bíblico.
- source_word: γενηθέντες
  english_pob_choice: by becoming
  chosen_spanish: habiendo llegado a ser
  alternatives_spanish:
  - al llegar a ser
  - llegando a ser
  - por haber llegado a ser
  lexicon: BDAG
  rationale: El participio de γίνομαι se une al contraste con los mitos para expresar el medio/condición real de la declaración apostólica. "Habiendo llegado a ser" conserva el matiz de proceso sin sobrecargar la sintaxis.
- source_word: μεγαλειότητος
  english_pob_choice: majesty
  chosen_spanish: majestad
  alternatives_spanish:
  - grandeza
  - esplendor
  - majestuosidad
  lexicon: BDAG
  rationale: μεγαλειότης expresa grandeza majestuosa o magnificencia. "Majestad" es la equivalencia española más elevada y precisa en este contexto, y armoniza con la posible alusión a la transfiguración.
- source_word: ἐκείνου
  english_pob_choice: his
  chosen_spanish: su
  alternatives_spanish:
  - de él
  - de aquel
  - de ese
  lexicon: BDAG
  rationale: El demostrativo apunta a Jesús en la cláusula previa. En español, el posesivo "su" es la forma natural para mantener la referencia sin sonar artificial.
theological_decisions:
- issue: Cómo traducir παρουσία en un contexto cristológico
  english_pob_reading: coming
  chosen_spanish_reading: venida
  alternative_spanish_readings:
  - presencia
  - llegada
  rationale: El término puede denotar presencia o llegada, pero en este contexto 2 Pedro 1:16 habla de la "poder y venida" del Señor Jesucristo. "Venida" preserva el posible sentido esjatológico dominante sin ocultar la amplitud léxica, que se documenta en la nota.
  doctrine_reference: Translation philosophy §3; la ambigüedad de παρουσία no se elimina, sino que se documenta.
- issue: Cómo reflejar Χριστοῦ en la designación de Jesús
  english_pob_reading: Messiah
  chosen_spanish_reading: Jesucristo
  alternative_spanish_readings:
  - Jesús Mesías
  - Jesús Cristo
  rationale: Aunque el audit trail en inglés privilegia "Messiah" como título, el uso consolidado en español de "Jesucristo" evita una frase rígida y sigue siendo reverente y reconocible. La tensión titular se conserva en las decisiones teológicas para no perder el valor de Χριστός como título.
  doctrine_reference: Translation philosophy §2; la equivalencia confesional y la inteligibilidad pública en español permiten esta forma estable.
translation_notes:
  revision_awareness: 'El borrador toma en cuenta el audit trail inglés: mantiene la oposición entre mitos fabricados y testimonio ocular, conserva la ambigüedad documentada de παρουσία, y registra la tensión entre el título Χριστός y la forma estable "Jesucristo" en español. También evita una traducción meramente mecánica del inglés, apoyándose directamente en el griego.'
  spanish_consistency_notes:
  - Se usó "Señor" para κύριος de manera consistente con el estándar cristológico del proyecto.
  - Se evitó "SEÑOR" como máscara para el nombre divino porque el verso no contiene יהוה.
  - '"testigos presenciales" mantiene el valor evidencial de ἐπόπται mejor que un simple "testigos".'
  - La nota de παρουσία se deja en el pie para no borrar la tensión léxica.
  - '"Jesucristo" se mantiene por inteligibilidad y uso eclesial en español, con la decisión titular registrada aparte.'
