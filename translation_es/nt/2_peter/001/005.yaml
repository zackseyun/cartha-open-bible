translation:
  language: es
  text: Y por esta misma razón, poniendo todo empeño, añadan[a] en su fe[b] virtud[c], y en la virtud conocimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «agreguen», «provean» o «suministren»; el verbo griego también puede comunicar la idea de aportar o proveer generosamente.
    reason: lexical_alternative
  - marker: b
    text: O «fidelidad» o «confianza» para «fe» (πίστις). El texto principal sigue la traducción predeterminada del proyecto.
    reason: lexical_alternative
  - marker: c
    text: O «excelencia moral» para «virtud» (ἀρετή).
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ αὐτὸ τοῦτο δὲ
  english_pob_choice: And for this very reason
  chosen_spanish: Y por esta misma razón
  alternatives_spanish:
  - Y por esta misma cosa
  - Y precisamente por esto
  lexicon: BDAG
  rationale: La expresión griega intensifica la conexión con lo anterior. «Por esta misma razón» transmite en español el valor enfático y causal con naturalidad, sin perder la referencia al motivo previo.
- source_word: σπουδὴν πᾶσαν
  english_pob_choice: every effort
  chosen_spanish: poniendo todo empeño
  alternatives_spanish:
  - con toda diligencia
  - haciendo todo esfuerzo
  lexicon: BDAG
  rationale: σπουδή comunica diligencia, empeño y seriedad. «Poniendo todo empeño» conserva la idea de esfuerzo completo y funciona bien como participio circunstancial en español.
- source_word: παρεισενέγκαντες
  english_pob_choice: making
  chosen_spanish: poniendo
  alternatives_spanish:
  - trayendo
  - aportando
  lexicon: BDAG
  rationale: El participio aoristo modifica el mandato y expresa acción concomitante. En español, «poniendo» reproduce de manera natural la idea de entrar a la acción con diligencia, sin forzar una traducción demasiado literal.
- source_word: ἐπιχορηγήσατε
  english_pob_choice: supply
  chosen_spanish: añadid
  alternatives_spanish:
  - proveed
  - suministrad
  lexicon: BDAG
  rationale: El verbo puede significar suplir, proveer o añadir generosamente. Dado que el contexto presenta una cadena de virtudes que se van sumando, «añadid» expresa bien la idea de incorporación progresiva, sin perder el matiz de provisión abundante.
- source_word: ἐν τῇ πίστει ὑμῶν
  english_pob_choice: in your faith
  chosen_spanish: en vuestra fe
  alternatives_spanish:
  - con vuestra fe
  - a vuestra fe
  lexicon: BDAG
  rationale: Se conserva la estructura ἐν + dativo con «en», porque la secuencia griega vincula una cualidad con otra de manera estrecha. «Vuestra fe» mantiene el posesivo plural y el registro eclesial sobrio.
- source_word: πίστει
  english_pob_choice: faith
  chosen_spanish: fe
  alternatives_spanish:
  - fidelidad
  - confianza
  lexicon: BDAG
  rationale: La traducción principal sigue el valor base de πίστις como «fe». En este contexto de lista de virtudes, esa es la opción más clara y acorde con el uso doctrinal habitual del término.
- source_word: ἀρετήν
  english_pob_choice: virtue
  chosen_spanish: virtud
  alternatives_spanish:
  - excelencia moral
  - excelencia
  lexicon: BDAG
  rationale: ἀρετή denota excelencia de carácter, virtud o excelencia moral. «Virtud» conserva la fuerza moral del término y encaja naturalmente en la progresión de cualidades.
- source_word: γνῶσιν
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - entendimiento
  - discernimiento
  lexicon: BDAG
  rationale: γνῶσις se traduce de modo directo por «conocimiento». Aunque puede implicar discernimiento, el sustantivo básico español refleja bien el avance de la cadena de cualidades sin añadir interpretación extra.
theological_decisions:
- issue: πίστις en una lista de virtudes
  english_pob_reading: faith
  chosen_spanish_reading: fe
  alternative_spanish_readings:
  - fidelidad
  - confianza
  rationale: Se mantiene la terminología doctrinal estándar del proyecto para πίστις. El contexto inmediato no exige desplazar el sentido principal hacia «fidelidad» o «confianza», aunque esas matizaciones siguen siendo posibles.
  doctrine_reference: 'DOCTRINE.md Contested terms: πίστις → faith; alternatives preserved where relevant'
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del inglés POB que clarifica la relación entre las cualidades como una secuencia natural. Por ello, en español se evitó una construcción literal como «en vuestra fe, añadid virtud» que resultaría pesada, y se optó por una formulación fluida que conserva el encadenamiento del griego y la idea de progresión.
  spanish_consistency_notes:
  - Se mantuvo «fe» para πίστις, conforme al criterio doctrinal del proyecto.
  - Se usó «virtud» para ἀρετή y se dejó la alternativa explicativa en nota.
  - Se tradujo γνῶσις como «conocimiento» para conservar la progresión de cualidades.
  - El mandato plural se expresó con «añadid», acorde con el tono exhortativo del pasaje.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto porque aquí no aparece el Tetragrámaton ni κύριος en sentido divino.
