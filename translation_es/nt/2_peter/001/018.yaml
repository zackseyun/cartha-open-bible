translation:
  language: es
  text: Y nosotros mismos oímos esta voz, traída del cielo, cuando estábamos con él en el monte santo[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «llevada del cielo».
    reason: lexical_alternative
lexical_decisions:
- source_word: ταύτην τὴν φωνὴν
  english_pob_choice: this voice
  chosen_spanish: esta voz
  alternatives_spanish:
  - este sonido
  lexicon: BDAG
  rationale: φωνή se refiere aquí a la declaración divina oída en la transfiguración; en español, «voz» es más preciso que el más amplio «sonido».
- source_word: ἡμεῖς
  english_pob_choice: we ourselves
  chosen_spanish: nosotros mismos
  alternatives_spanish:
  - nosotros
  lexicon: BDAG
  rationale: El pronombre explícito añade énfasis testimonial. «Nosotros mismos» conserva ese matiz enfático mejor que un simple «nosotros».
- source_word: ἠκούσαμεν
  english_pob_choice: heard
  chosen_spanish: oímos
  alternatives_spanish:
  - escuchamos
  lexicon: BDAG
  rationale: El aoristo indica el hecho puntual de oír; «oímos» comunica de manera natural la experiencia auditiva consumada.
- source_word: ἐξ οὐρανοῦ
  english_pob_choice: from heaven
  chosen_spanish: del cielo
  alternatives_spanish:
  - desde el cielo
  lexicon: BDAG
  rationale: En español bíblico, «del cielo» expresa con naturalidad el origen celestial sin perder el sentido fuente del griego.
- source_word: ἐνεχθεῖσαν
  english_pob_choice: brought
  chosen_spanish: traída
  alternatives_spanish:
  - llevada
  - portada
  lexicon: BDAG
  rationale: El participio pasivo de φέρω presenta la voz como conducida desde el cielo. «Traída» mantiene la pasividad y suena más natural en español que «portada» o «llevada».
- source_word: σὺν αὐτῷ ὄντες
  english_pob_choice: when we were with him
  chosen_spanish: cuando estábamos con él
  alternatives_spanish:
  - estando con él
  - mientras estábamos con él
  lexicon: BDAG
  rationale: La construcción participial funciona temporalmente; «cuando estábamos con él» fluye con naturalidad y conserva la referencia a la presencia de los testigos con Jesús.
- source_word: ἐν τῷ ⸂ἁγίῳ ὄρει⸃
  english_pob_choice: on the holy mountain
  chosen_spanish: en el monte santo
  alternatives_spanish:
  - sobre el monte santo
  - en la montaña santa
  lexicon: BDAG
  rationale: Aunque el inglés opta por «on», en español el complemento locativo con «en» es idiomático para ὄρος. «Monte santo» preserva el carácter bíblico y la santidad del lugar sin identificarlo por nombre.
theological_decisions:
- issue: Identidad del «monte santo»
  english_pob_reading: A descriptive reference to the mountain of Jesus' transfiguration, without identifying a specific mountain in the translation.
  chosen_spanish_reading: Una referencia descriptiva al monte de la transfiguración de Jesús, sin identificar un monte específico.
  alternative_spanish_readings:
  - Identificarlo explícitamente con el monte Tabor
  - Identificarlo explícitamente con el monte Hermón
  rationale: El griego no nombra el monte; la traducción conserva esa indeterminación y evita importar una identificación tradicional no expresada en el texto.
  doctrine_reference: Primacía del texto original y preservación de tensiones históricas cuando el pasaje no las resuelve.
translation_notes:
  revision_awareness: El texto coincide con el sentido auditado del inglés POB y del griego SBLGNT; no fue necesario introducir cambios de sentido ni resolver de manera interpretativa la referencia al monte.
  spanish_consistency_notes:
  - Se mantuvo «Y nosotros mismos» para reflejar el énfasis testimonial del pronombre explícito.
  - Se prefirió «monte» sobre «montaña» para conservar el registro bíblico y la correspondencia habitual con ὄρος.
  - Se usó «del cielo» en lugar de una construcción más literal pero menos natural para el español.
  - La nota al pie preserva la alternativa léxica documentada en el inglés POB sin añadir sentidos ajenos al texto.
