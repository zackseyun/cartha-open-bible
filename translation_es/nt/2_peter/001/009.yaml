translation:
  language: es
  text: Porque al que le faltan estas cosas es ciego[a], siendo corto de vista[b], habiendo olvidado la purificación de sus pecados pasados.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «estas cualidades». La frase remite a las virtudes nombradas en el versículo anterior.
    reason: lexical_alternative
  - marker: b
    text: O «siendo miope» o «viendo solo de cerca».
    reason: lexical_alternative
lexical_decisions:
- source_word: ᾧ
  english_pob_choice: whoever
  chosen_spanish: al que
  alternatives_spanish:
  - quien
  - el que
  - quienquiera que
  lexicon: BDAG
  rationale: El relativo dativo apunta de manera general a una persona caracterizada por carecer de las virtudes anteriores. «Al que» conserva ese referente genérico en un español natural y no marca género innecesariamente.
- source_word: πάρεστιν
  english_pob_choice: lacks
  chosen_spanish: le faltan
  alternatives_spanish:
  - no tiene
  - carece de
  - no le están presentes
  lexicon: BDAG
  rationale: El griego expresa que estas cosas no están presentes en esa persona. «Le faltan» comunica con naturalidad esa ausencia sin perder el sentido relacional del pasaje.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estas cualidades
  - estas
  lexicon: BDAG
  rationale: «Estas cosas» mantiene la referencia abierta y fiel al texto griego, apuntando a las virtudes del versículo anterior sin volverlo más interpretativo de lo que exige el original.
- source_word: τυφλός
  english_pob_choice: blind
  chosen_spanish: ciego
  alternatives_spanish:
  - ciego de vista
  lexicon: BDAG
  rationale: El adjetivo se traduce de modo directo para preservar la metáfora de la ceguera espiritual.
- source_word: μυωπάζων
  english_pob_choice: being shortsighted
  chosen_spanish: teniendo la vista corta
  alternatives_spanish:
  - siendo corto de vista
  - siendo miope
  - viendo solo de cerca
  lexicon: BDAG
  rationale: La forma participial describe o intensifica la imagen de la ceguera. «Teniendo la vista corta» conserva la idea figurada de ver solo lo cercano sin imponer un tecnicismo innecesario.
- source_word: λήθην λαβὼν
  english_pob_choice: having forgotten
  chosen_spanish: ha olvidado
  alternatives_spanish:
  - habiendo olvidado
  - habiendo recibido olvido
  - se ha olvidado
  lexicon: BDAG
  rationale: La expresión idiomática griega se vierte de forma idiomática en español. El perfecto verbal transmite el estado resultante de haber olvidado.
- source_word: καθαρισμοῦ
  english_pob_choice: the cleansing
  chosen_spanish: la purificación
  alternatives_spanish:
  - la limpieza
  - el lavado
  - la limpieza moral
  lexicon: BDAG
  rationale: Aquí «purificación» comunica bien la remoción de la impureza espiritual y conserva una posibilidad lexical reconocible en español bíblico sin caer en la vaguedad de «limpieza».
- source_word: τῶν πάλαι αὐτοῦ ἁμαρτημάτων
  english_pob_choice: of his former sins
  chosen_spanish: de sus pecados pasados
  alternatives_spanish:
  - de sus pecados antiguos
  - de sus pecados de antes
  - de sus antiguas faltas
  lexicon: BDAG
  rationale: «Pasados» reproduce el valor temporal de πάλαι. «Pecados» conserva el término moral-teológico del original, y el posesivo singular «sus» refleja con fidelidad el griego αὐτοῦ.
theological_decisions:
- issue: Alcance de 'estas cosas'
  english_pob_reading: these things / these qualities pointing back to the virtues of the previous verse
  chosen_spanish_reading: estas cosas, con referencia implícita a las virtudes del versículo anterior
  alternative_spanish_readings:
  - estas cualidades
  - estas virtudes
  rationale: El contexto inmediato determina la referencia sin necesidad de explicitarla en el cuerpo del texto. Se mantiene la apertura semántica del original y se reserva la aclaración para nota si se desea.
  doctrine_reference: DOCTRINE.md §Contextual reference and lexical transparency
- issue: Sujeto y género gramatical de αὐτοῦ
  english_pob_reading: his former sins
  chosen_spanish_reading: sus pecados pasados
  alternative_spanish_readings:
  - sus pecados pasados de él
  - sus pecados pasados de esa persona
  rationale: El singular griego es masculino genérico y no exige marcar género en español más allá del posesivo natural. «Sus» preserva la referencia sin forzar una lectura masculina exclusiva.
  doctrine_reference: DOCTRINE.md §Translation philosophy, point 4
translation_notes:
  revision_awareness: El audit trail en inglés pasó de 'the one who lacks these things' a 'whoever lacks these things' para un matiz más natural y genérico. En español se reflejó ese mismo sentido general con «al que le faltan estas cosas», sin añadir especificación de género ni perder la relación con el contexto inmediato.
  spanish_consistency_notes:
  - Se mantuvo «Dios»/«Yahvé» fuera del versículo porque no aparece en el texto fuente.
  - Se evitó «Cristo» porque no hay Ἰησοῦς/Χριστός en este pasaje.
  - 'Se conservó el orden lógico del griego: carencia -> ceguera -> cortedad de vista -> olvido de la purificación.'
  - «Purificación» se prefirió a «limpieza» por su mayor densidad teológica y su correspondencia con καθαρισμός.
