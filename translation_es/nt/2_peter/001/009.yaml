revisions:
- from: Porque al que le faltan estas cosas, es ciego[a], teniendo la vista corta[b], y ha olvidado la purificación de sus pecados pasados.
  to: Porque al que le faltan estas cosas es ciego[a], siendo corto de vista[b], habiendo olvidado la purificación de sus pecados pasados.
  rationale: Se ajustó la puntuación y se alineó la sintaxis española con la estructura participial del griego. «Siendo corto de vista» mejora la naturalidad y conserva la imagen metafórica; «habiendo olvidado» refleja mejor λήθην λαβὼν que el anterior «ha olvidado» en esta cadena descriptiva.
