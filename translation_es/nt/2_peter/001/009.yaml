    rationale: Aunque entendible, «siendo corto de vista» expresa mejor el valor descriptivo de μυωπάζων y enlaza mejor con la nota alternativa «miope».
  revised_spanish_text: Porque al que le faltan estas cosas es ciego[a], siendo corto de vista[b], habiendo olvidado la purificación de sus pecados pasados.
