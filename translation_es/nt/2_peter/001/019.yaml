  text: καὶ ἔχομεν βεβαιότερον τὸν προφητικὸν λόγον, ᾧ καλῶς ποιεῖτε προσέχοντες ὡς λύχνῳ φαίνοντι ἐν αὐχμηρῷ τόπῳ, ἕως οὗ ἡμέρα διαυγάσῃ καὶ φωσφόρος ἀνατείλῃ ἐν ταῖς καρδίαις ὑμῶν·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/019.yaml
  text: And we have the prophetic word more certain[a], to which you do well to pay attention as to a lamp shining in a dark place[b], until the day dawns and the morning star rises in your hearts.
  footnotes:
  - marker: a
    text: Or 'And we have the prophetic word more sure.' The Greek can be understood either as the prophetic word being confirmed by the apostolic witness, or as emphasizing the prophetic word's sure character.
    reason: alternative_reading
  - marker: b
    text: '''Morning star'' may echo a Messianic image; compare Rev 22:16.'
    reason: cross_reference
