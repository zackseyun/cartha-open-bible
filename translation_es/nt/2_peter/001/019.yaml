translation:
  language: es
  text: Y tenemos la palabra profética más cierta[a], a la cual ustedes hacen bien en prestar atención como a una lámpara que resplandece en un lugar oscuro, hasta que amanezca el día y el lucero de la mañana[b] salga en sus corazones.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «la palabra profética más segura». El griego puede entenderse como que el testimonio apostólico confirma la palabra profética, o como que se destaca su carácter seguro.'
    reason: alternative_reading
  - marker: b
    text: «Lucero de la mañana» puede evocar una imagen mesiánica; compárese Apocalipsis 22:16.
    reason: cross_reference
lexical_decisions:
- source_word: βεβαιότερον
  english_pob_choice: more certain
  chosen_spanish: más cierta
  alternatives_spanish:
  - más segura
  - más firme
  - más segura y firme
  lexicon: BDAG
  rationale: El comparativo de βέβαιος puede expresar mayor certeza o firmeza. En español, «más cierta» conserva el valor comparativo sin introducir una explicación causal que el griego no explicita.
- source_word: τὸν προφητικὸν λόγον
  english_pob_choice: the prophetic word
  chosen_spanish: la palabra profética
  alternatives_spanish:
  - el mensaje profético
  - la palabra de profecía
  lexicon: BDAG
  rationale: «Palabra profética» reproduce de modo natural el adjetivo προφητικός y mantiene la construcción nominal del original sin volverla más explicativa de lo que permite el texto.
- source_word: ᾧ ... προσέχοντες
  english_pob_choice: to which you do well to pay attention
  chosen_spanish: a la cual hacéis bien en prestar atención
  alternatives_spanish:
  - a la cual hacéis bien en poner atención
  - a la cual hacéis bien en atender
  lexicon: BDAG
  rationale: προσέχω aquí tiene la fuerza de prestar atención con cuidado. «Prestar atención» es idiomático en español y conserva el sentido de atención sostenida.
- source_word: λύχνῳ φαίνοντι
  english_pob_choice: a lamp shining
  chosen_spanish: una lámpara que resplandece
  alternatives_spanish:
  - una lámpara que brilla
  - una lámpara encendida
  lexicon: BDAG
  rationale: La imagen mantiene el participio presente con un verbo que expresa acción continua. «Resplandece» suena más elevado que «brilla» y conserva bien la metáfora de luz activa.
- source_word: αὐχμηρῷ τόπῳ
  english_pob_choice: a dark place
  chosen_spanish: un lugar oscuro
  alternatives_spanish:
  - un lugar sombrío
  - un sitio oscuro
  - un lugar tenebroso
  lexicon: BDAG
  rationale: αὐχμηρός puede abarcar oscuridad, penumbra o suciedad/grimidad según contexto. En esta imagen de lámpara, «lugar oscuro» es la equivalencia más clara y natural en español.
- source_word: ἕως οὗ
  english_pob_choice: until
  chosen_spanish: hasta que
  alternatives_spanish:
  - hasta el momento en que
  - hasta cuando
  lexicon: BDAG
  rationale: Marca el límite temporal de la metáfora de la lámpara de manera natural y precisa.
- source_word: ἡμέρα διαυγάσῃ
  english_pob_choice: the day dawns
  chosen_spanish: amanezca el día
  alternatives_spanish:
  - despunte el día
  - claree el día
  - amanezca
  lexicon: BDAG
  rationale: διαυγάζω expresa el clarear o despuntar del día. «Amanezca el día» conserva la imagen astral en un español claro y digno.
- source_word: φωσφόρος
  english_pob_choice: the morning star
  chosen_spanish: el lucero de la mañana
  alternatives_spanish:
  - la estrella de la mañana
  - el astro matutino
  lexicon: BDAG
  rationale: «Lucero de la mañana» es una forma sobria y bíblicamente reconocible en español, equivalente al referente astral sin sobreinterpretarlo.
- source_word: ἀνατείλῃ
  english_pob_choice: rises
  chosen_spanish: salga
  alternatives_spanish:
  - se levante
  - aparezca
  - asome
  lexicon: BDAG
  rationale: Con un astro, ἀνατέλλω admite «salga» como equivalente natural de salir/emerger sobre el horizonte.
- source_word: ἐν ταῖς καρδίαις ὑμῶν
  english_pob_choice: in your hearts
  chosen_spanish: en vuestros corazones
  alternatives_spanish:
  - dentro de vuestros corazones
  - en el corazón de ustedes
  lexicon: BDAG
  rationale: Se conserva el lenguaje bíblico de «corazones» para el interior de la persona, sin expandirlo interpretativamente.
theological_decisions:
- issue: Sentido de βεβαιότερον en relación con el testimonio apostólico y la profecía
  english_pob_reading: the prophetic word more certain
  chosen_spanish_reading: la palabra profética más cierta
  alternative_spanish_readings:
  - la palabra profética más segura
  - la palabra profética hecha más cierta
  rationale: La traducción conserva la comparativa sin imponer que el texto diga explícitamente que la palabra fue «hecha» más cierta. Así se mantiene la tensión textual entre confirmación apostólica y la cualidad segura de la profecía.
  doctrine_reference: Preservar la tensión interpretativa del pasaje.
- issue: Referente de «el lucero de la mañana»
  english_pob_reading: Kept as metaphorical 'the morning star' without explicitly identifying the referent in the main text.
  chosen_spanish_reading: Se mantiene como imagen astral sin identificar explícitamente su referente en el cuerpo del versículo.
  alternative_spanish_readings:
  - una referencia implícita al Mesías
  - una figura de iluminación escatológica
  rationale: El versículo presenta la imagen sin explicarla. La traducción conserva esa reserva para no importar una interpretación doctrinal al texto principal.
  doctrine_reference: No introducir en el texto principal una identificación que el verso no formula explícitamente.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión del POB inglés que eliminó «made» en favor de una formulación más cercana al griego. Por eso el español evita cualquier verbo causal equivalente en la cláusula principal y conserva simplemente el comparativo «más cierta».
  spanish_consistency_notes:
  - Se usa «Yahvé» por defecto cuando aparezca el nombre divino; en este versículo no ocurre.
  - Se mantiene «palabra profética» en lugar de «palabra de profecía» por ajuste de naturalidad y fidelidad al adjetivo griego.
  - Se conserva el registro bíblico de «corazones» sin explicarlo como mera emoción o interioridad psicológica.
  - Se evita «Cristo» en el texto principal porque aquí el griego no lo nombra explícitamente; la nota sobre el lucero deja la resonancia interpretativa abierta.
