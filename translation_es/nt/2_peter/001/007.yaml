translation:
  language: es
  text: y en la devoción a Dios, el afecto fraternal[a]; y en el afecto fraternal, amor.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "amor fraternal". El término griego φιλαδελφία se refiere al amor afectuoso por los hermanos, especialmente entre los creyentes.
    reason: lexical_alternative
lexical_decisions:
- source_word: εὐσεβείᾳ
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción
  - devotidad
  lexicon: BDAG
  rationale: εὐσέβεια expresa reverencia a Dios mostrada en la conducta. En español, 'piedad' es una equivalencia natural y reconocible que conserva la idea de devoción reverente, aunque puede ser algo más amplia o tradicional que 'godliness' en inglés.
- source_word: φιλαδελφίαν
  english_pob_choice: brotherly affection
  chosen_spanish: afecto fraternal
  alternatives_spanish:
  - amor fraternal
  - afecto entre hermanos
  lexicon: BDAG
  rationale: φιλαδελφία designa un amor/afecto entre hermanos, especialmente entre creyentes. 'Afecto fraternal' mantiene la distinción respecto de ἀγάπη y evita que las dos virtudes queden igualadas en español.
- source_word: ἀγάπην
  english_pob_choice: love
  chosen_spanish: amor
  alternatives_spanish:
  - amor sacrificial
  - caridad
  lexicon: BDAG
  rationale: El POB inglés traduce ἀγάπη como 'love'. En español, 'amor' es el equivalente directo y más natural, sin añadir matices interpretativos que el griego no exige aquí.
- source_word: ἐν δὲ τῇ ... τὴν ...
  english_pob_choice: and in ..., ...
  chosen_spanish: y en ..., ...
  alternatives_spanish:
  - y en la esfera de ..., ...
  - y dentro de ..., ...
  lexicon: BDAG
  rationale: La construcción repite la secuencia de virtudes y marca la esfera en la que debe añadirse la siguiente. 'Y en ...' conserva la estructura acumulativa sin introducir explicaciones ajenas al texto.
- source_word: δὲ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - pero
  - ahora
  lexicon: BDAG
  rationale: Aquí δέ es suavemente conectivo y no adversativo. 'Y' reproduce mejor el enlace progresivo de la cadena de virtudes.
theological_decisions:
- issue: Diferencia entre φιλαδελφία y ἀγάπη en la secuencia de virtudes
  english_pob_reading: Render φιλαδελφία as 'brotherly affection' and ἀγάπη as 'love'
  chosen_spanish_reading: Traducir φιλαδελφία como 'afecto fraternal' y ἀγάπη como 'amor'
  alternative_spanish_readings:
  - '''amor fraternal'' y ''amor'''
  - '''amor entre hermanos'' y ''amor'''
  rationale: El griego distingue dos términos emparentados pero no idénticos. Mantener 'afecto fraternal' y luego 'amor' preserva la progresión retórica y evita borrar la distinción léxica que el texto presenta.
  doctrine_reference: Translation philosophy §5; tabla de términos controvertidos para ἀγάπη
- issue: Valor de εὐσέβεια como virtud dirigida a Dios y visible en la vida
  english_pob_reading: godliness
  chosen_spanish_reading: piedad
  alternative_spanish_readings:
  - devoción
  - vida piadosa
  rationale: '''Piedad'' comunica reverencia y conducta conforme a Dios en un español bíblico claro. No se opta por un término más explicativo porque el contexto ya sitúa la virtud dentro de la cadena ética.'
  doctrine_reference: BDAG εὐσέβεια; principio de equivalencia óptima
translation_notes:
  revision_awareness: El borrador se ajusta a la revisión más reciente, que no requirió cambios, y corrige el problema anterior eliminando cualquier nota al pie no anclada en el texto. No se documentan revisiones textuales adicionales en el pasaje griego; la concordancia con la auditoría inglesa sigue siendo alta.
  spanish_consistency_notes:
  - 'Se mantiene la cadena de virtudes con paralelismo sintáctico: ''y en ...; y en ...''.'
  - Se evita 'caridad' para ἀγάπη porque el POB inglés no la usó y el término podría desplazar el sentido general de amor.
  - Se usa 'afecto fraternal' para conservar la distinción con 'amor' sin recurrir a calcos rígidos.
  - No se incluyen notas al pie porque no hay marcador anclado en el texto y la validación requiere correspondencia exacta.
