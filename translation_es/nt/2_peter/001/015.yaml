translation:
  language: es
  text: Y procuraré también que, después de mi partida[a], ustedes puedan en todo momento recordar estas cosas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Más explícitamente, «después de mi muerte». El griego dice «después de mi partida».
    reason: lexical_alternative
lexical_decisions:
- source_word: σπουδάσω
  english_pob_choice: I will make every effort
  chosen_spanish: procuraré
  alternatives_spanish:
  - haré todo esfuerzo
  - me esforzaré
  lexicon: BDAG
  rationale: El futuro de σπουδάζω expresa empeño intencional y diligente. «Procuraré» comunica bien la determinación personal sin sonar rígido en español, y conserva el matiz de esfuerzo activo.
- source_word: δὲ
  english_pob_choice: And
  chosen_spanish: Y
  alternatives_spanish:
  - Ahora bien
  - Pero
  lexicon: BDAG
  rationale: δέ aquí enlaza con continuidad discursiva, no con contraste fuerte. «Y» reproduce ese avance natural del argumento.
- source_word: ἑκάστοτε
  english_pob_choice: at any time
  chosen_spanish: en todo momento
  alternatives_spanish:
  - siempre
  - cada vez
  lexicon: BDAG
  rationale: ἑκάστοτε sugiere disponibilidad continua o repetida. «En todo momento» mantiene esa idea de acceso permanente para recordar.
- source_word: ἔχειν ὑμᾶς
  english_pob_choice: you may be able
  chosen_spanish: ustedes puedan
  alternatives_spanish:
  - ustedes puedan tener
  - les sea posible
  lexicon: BDAG
  rationale: La construcción ἔχειν + infinitivo puede expresar capacidad u oportunidad. En español, «puedan» expresa esa posibilidad de forma natural y clara.
- source_word: μετὰ τὴν ἐμὴν ἔξοδον
  english_pob_choice: after my departure
  chosen_spanish: después de mi partida
  alternatives_spanish:
  - después de mi muerte
  - después de mi salida
  lexicon: BDAG
  rationale: ἔξοδος es un giro reverente para la muerte inminente de Pedro. «Partida» conserva la metáfora sin explicitarla excesivamente; por eso también se ancla la alternativa más explícita en la nota.
- source_word: τὴν τούτων μνήμην ποιεῖσθαι
  english_pob_choice: to recall these things
  chosen_spanish: recordar estas cosas
  alternatives_spanish:
  - hacer memoria de estas cosas
  - traer a la memoria estas cosas
  lexicon: BDAG
  rationale: μνήμην ποιεῖσθαι es una idiomática para recordar o traer a la mente. «Recordar» es idiomático en español y conserva la fuerza activa de la expresión.
- source_word: τούτων
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - estos asuntos
  - estas verdades
  lexicon: BDAG
  rationale: τούτων remite a los contenidos inmediatos del contexto. «Estas cosas» es la forma más directa y transparente, sin precisar más de lo que el texto justifica.
theological_decisions:
- issue: Sentido de ἔξοδος respecto del final de Pedro
  english_pob_reading: departure
  chosen_spanish_reading: partida
  alternative_spanish_readings:
  - muerte
  - éxodo
  rationale: La lectura principal conserva el giro metafórico sin convertirlo en explicación interpretativa. «Partida» mantiene la referencia reverente al final de Pedro, mientras que «muerte» sería más explícito y «éxodo» demasiado opaco en el texto principal.
  doctrine_reference: Translation philosophy §1, §3, §6
translation_notes:
  revision_awareness: Se corrigió la validación previa asegurando que el marcador de nota [a] aparezca exactamente en el texto español junto a la expresión correspondiente.
  spanish_consistency_notes:
  - Se mantuvo un registro verbal en primera persona futura («procuraré») acorde con σπουδάσω.
  - Se evitó traducir ἔξοδος como «éxodo» en el texto principal para no introducir una lectura demasiado técnica o ajena al contexto.
  - «Estas cosas» conserva la referencia pronominal abierta del griego sin añadir especificaciones no justificadas.
