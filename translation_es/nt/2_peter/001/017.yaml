translation:
  language: es
  text: 'Pues, cuando recibió de Dios el Padre honra y gloria, le fue dirigida una voz como esta[a] de la Majestuosa Gloria: «Este es mi Hijo, mi Amado[b], en quien me complazco[c]»—'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «por la Majestuosa Gloria». El griego ὑπό puede indicar agente; aquí «de» expresa con más naturalidad la fuente de la voz en español.
    reason: lexical_alternative
  - marker: b
    text: 'O «Este es mi amado Hijo». El griego, más literalmente, dice: «Este es mi Hijo, mi Amado».'
    reason: lexical_alternative
  - marker: c
    text: O «con quien estoy muy complacido» o «en quien me complací». El griego dice literalmente algo como «en quien me deleité», un giro que evoca los relatos evangélicos del bautismo y la transfiguración de Jesús.
    reason: alternative_reading
lexical_decisions:
- source_word: λαβὼν
  english_pob_choice: when he received
  chosen_spanish: al recibir
  alternatives_spanish:
  - cuando recibió
  - habiendo recibido
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente; en español, «al recibir» conserva la relación circunstancial sin sonar rígido.
- source_word: παρὰ θεοῦ πατρὸς
  english_pob_choice: from God the Father
  chosen_spanish: de parte de Dios el Padre
  alternatives_spanish:
  - de Dios el Padre
  - de parte de Dios, el Padre
  lexicon: BDAG
  rationale: παρά con genitivo expresa procedencia/origen. «De parte de» comunica bien la fuente en español y mantiene unidos ambos sustantivos.
- source_word: τιμὴν καὶ δόξαν
  english_pob_choice: honor and glory
  chosen_spanish: honra y gloria
  alternatives_spanish:
  - honor y gloria
  - honra y esplendor
  lexicon: BDAG
  rationale: Se conservan dos sustantivos distintos. «Honra» y «gloria» son naturales en español bíblico y distinguen mejor el matiz relacional y la manifestación de honor.
- source_word: φωνῆς ἐνεχθείσης αὐτῷ
  english_pob_choice: such a voice was borne to him
  chosen_spanish: le fue llevada una voz tal
  alternatives_spanish:
  - le llegó una voz así
  - una voz semejante le fue llevada
  lexicon: BDAG
  rationale: La construcción pasiva y el genitivo absoluto se vuelven una cláusula natural en español. «Fue llevada» conserva la imagen de ἐνεχθείσης/φέρω sin reducirla a un simple «llegó».
- source_word: τοιᾶσδε
  english_pob_choice: such a voice
  chosen_spanish: una voz tal
  alternatives_spanish:
  - una voz de esta clase
  - una voz como esta
  lexicon: BDAG
  rationale: El deíctico catáforico apunta a lo que sigue; «tal» reproduce la fuerza de «such» sin añadir una comparación más explícita de la que exige el griego.
- source_word: ὑπὸ τῆς μεγαλοπρεποῦς δόξης
  english_pob_choice: from the Majestic Glory
  chosen_spanish: desde la Majestuosa Gloria
  alternatives_spanish:
  - desde la Gloria Majestuosa
  - por la Majestuosa Gloria
  lexicon: BDAG
  rationale: Se mantiene el origen de la voz y el tono reverente. La mayúscula en «Majestuosa Gloria» sigue la lectura auditada como circunlocución divina, evitando una paráfrasis explicativa.
- source_word: Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν
  english_pob_choice: This is my Son, my Beloved
  chosen_spanish: Este es mi Hijo, mi Amado
  alternatives_spanish:
  - Este es mi Hijo amado
  - Este es mi Hijo, el Amado mío
  lexicon: BDAG
  rationale: La apposición griega y la repetición de «mi» se conservan. «Amado» como sustantivo/adjetivo sustantivado refleja mejor el efecto de «my Beloved» que el giro más convencional «Hijo amado».
- source_word: εἰς ὃν ἐγὼ εὐδόκησα
  english_pob_choice: in whom I am well pleased
  chosen_spanish: en quien me complací
  alternatives_spanish:
  - en quien me complazco
  - en quien hallé mi complacencia
  lexicon: BDAG
  rationale: Se mantiene la preposición del griego y el valor perfecto/ingresivo posible del aoristo. «Me complací» evita imponer el presente idiomático si no es necesario y conserva la resonancia con la fórmula evangélica.
theological_decisions:
- issue: Circunloquio divino τῆς μεγαλοπρεποῦς δόξης
  english_pob_reading: the Majestic Glory
  chosen_spanish_reading: la Majestuosa Gloria
  alternative_spanish_readings:
  - la gloria majestuosa
  - la Majestad gloriosa
  rationale: La frase funciona como referencia reverente a la presencia divina sin nombrar directamente a Dios. La mayúscula comunica ese valor teológico sin expandir el sentido más allá del griego.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #6'
- issue: Fórmula de la voz celestial sobre el Hijo
  english_pob_reading: This is my Son, my Beloved, in whom I am well pleased
  chosen_spanish_reading: Este es mi Hijo, mi Amado, en quien me complací
  alternative_spanish_readings:
  - Este es mi amado Hijo, en quien me complazco
  - Este es mi Hijo amado, en quien me complací
  rationale: La formulación conserva la afirmación divina sobre la filiación y el amor/complacencia sin suavizar la estructura griega. No se introduce lenguaje confesional posterior que no esté ya sustentado por el texto.
  doctrine_reference: 'Affirmations; Translation philosophy #1 and #3'
translation_notes:
  revision_awareness: 'Se tomó en cuenta la revisión más reciente del audit trail: la sustitución de una equivalencia más vaga por «such a voice» para reflejar con mayor precisión τοιᾶσδε. La versión española adopta «una voz tal» con el mismo propósito, manteniendo el registro formal y la referencia catafórica.'
  spanish_consistency_notes:
  - Se usa «Dios el Padre» para reproducir la relación nominal sin convertirla en título litúrgico fijo.
  - Se mantiene «Majestuosa Gloria» con mayúscula por coherencia con la circunlocución divina auditada en inglés.
  - Se preserva la tensión entre una traducción idiomática de εὐδόκησα y la posibilidad de un matiz puntual del aoristo en la nota.
  - Se evita sustituir el sustantivo relacional «Amado» por una paráfrasis más libre, para conservar la apposición del griego.
