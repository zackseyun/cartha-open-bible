revisions:
- from: 'pues al recibir de parte de Dios el Padre honra y gloria, le fue llevada una voz tal[a] desde la Majestuosa Gloria: «Este es mi Hijo, mi Amado[b], en quien me complací[c]».'
  to: 'Pues, cuando recibió de Dios el Padre honra y gloria, le fue dirigida una voz como esta[a] de la Majestuosa Gloria: «Este es mi Hijo, mi Amado[b], en quien me complazco[c]»—'
  rationale: Se ajusta la frase pasiva para lograr español natural sin perder el tono elevado, se alinea la cláusula final con la decisión principal auditada del POB («en quien me complazco»), se mejora la expresión de procedencia («de la Majestuosa Gloria») y se preserva el guion final de la cita.
