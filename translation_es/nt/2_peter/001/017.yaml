source:
  edition: SBLGNT
  text: λαβὼν γὰρ παρὰ θεοῦ πατρὸς τιμὴν καὶ δόξαν φωνῆς ἐνεχθείσης αὐτῷ τοιᾶσδε ὑπὸ τῆς μεγαλοπρεποῦς δόξης· ⸂Ὁ υἱός μου ὁ ἀγαπητός μου οὗτός ἐστιν⸃, εἰς ὃν ἐγὼ εὐδόκησα—
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/017.yaml
  text: 'For when he received honor and glory from God the Father[a], such a voice was borne to him from the Majestic Glory: “This is my Son, my Beloved[c][b], in whom I am well pleased”—'
  footnotes:
  - marker: a
    text: Or “by the Majestic Glory.” The Greek ὑπό can mark agency; the translation “from” brings out the voice’s source in more natural English.
    reason: lexical_alternative
  - marker: b
    text: Or “This is my beloved Son.” The Greek more literally has “This is my Son, my Beloved.”
    reason: lexical_alternative
  - marker: c
    text: Or “with whom I am well pleased” or “in whom I took delight.” The Greek reads literally “into whom I delighted,” an idiom echoed in the Gospel accounts of Jesus’ baptism and transfiguration.
    reason: alternative_reading
