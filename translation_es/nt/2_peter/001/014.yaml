revisions:
- from: sabiendo que pronto será el desprendimiento de mi tienda[a][c][b], así como también nuestro Señor Jesús Mesías me lo ha dado a conocer.
  to: sabiendo que el dejar mi tienda[a][c][b] está cerca, así como también nuestro Señor Jesús Mesías me lo hizo saber.
  rationale: Se revisa para lograr un español más natural y fiel al matiz del griego sin perder la metáfora central. 'El dejar mi tienda está cerca' conserva la imagen de ἀπόθεσις + σκηνώματός mejor que 'desprendimiento', y evita una construcción poco idiomática. 'Me lo hizo saber' refleja con más sencillez ἐδήλωσέν. Se conserva 'Jesús Mesías' por la política del proyecto sobre Χριστός como título. También se corrige la nota alternativa para que sea español natural.
