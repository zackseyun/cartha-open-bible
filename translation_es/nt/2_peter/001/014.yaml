  text: εἰδὼς ὅτι ταχινή ἐστιν ἡ ἀπόθεσις τοῦ σκηνώματός μου, καθὼς καὶ ὁ κύριος ἡμῶν Ἰησοῦς Χριστὸς ἐδήλωσέν μοι·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/001/014.yaml
  text: knowing that the putting off of my tent is near[c][b][a], just as our Lord Jesus Messiah made clear to me.
  footnotes:
  - marker: a
    text: Or 'the removal of my tent'; that is, Peter speaks of his coming death with the metaphor of laying aside a temporary dwelling.
    reason: lexical_alternative
  - marker: b
    text: Greek 'Jesus Christ'; rendered 'Jesus Messiah' here because Χριστός is treated as a title.
    reason: alternative_reading
  - marker: c
