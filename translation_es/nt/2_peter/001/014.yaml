translation:
  language: es
  text: sabiendo que el dejar mi tienda[a][c][b] está cerca, así como también nuestro Señor Jesús Mesías me lo hizo saber.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'la remoción de mi tienda'; esto es, Pedro habla de su próxima muerte con la metáfora de dejar una morada temporal.
    reason: lexical_alternative
  - marker: b
    text: Griego 'Jesús Cristo'; aquí se traduce 'Jesús Mesías' porque Χριστός se trata como título.
    reason: alternative_reading
  - marker: c
    text: O 'sucederá pronto'.
    reason: previous_rendering
lexical_decisions:
- source_word: εἰδὼς
  english_pob_choice: knowing
  chosen_spanish: sabiendo
  alternatives_spanish:
  - porque sé
  - puesto que sé
  lexicon: BDAG
  rationale: El participio se conserva naturalmente en español con un gerundio que enlaza con el contexto anterior, sin convertirlo en una causal explícita más fuerte de lo que el griego exige.
- source_word: ταχινή
  english_pob_choice: soon / is near
  chosen_spanish: pronto
  alternatives_spanish:
  - cerca
  - está cerca
  - próxima
  lexicon: BDAG
  rationale: La predicación con adjetivo admite una solución natural en español. 'Pronto' comunica la proximidad temporal sin endurecerla en una lectura más interpretativa como 'inminente'.
- source_word: ἀπόθεσις
  english_pob_choice: putting off
  chosen_spanish: desprendimiento
  alternatives_spanish:
  - dejar
  - alejamiento
  - remoción
  lexicon: BDAG
  rationale: Se preserva la imagen de quitarse o dejar algo. 'Desprendimiento' intenta mantener la metáfora corporal sin reducirla directamente a 'muerte' ni sonar demasiado técnico.
- source_word: σκηνώματός
  english_pob_choice: tent
  chosen_spanish: tienda
  alternatives_spanish:
  - tabernáculo
  - morada
  - cuerpo
  lexicon: BDAG
  rationale: '''Tienda'' reproduce la metáfora de una morada temporal de forma clara en español. ''Cuerpo'' explicita el referente pero borra la imagen; ''tabernáculo'' sería más tradicional pero menos transparente.'
- source_word: καθὼς καὶ
  english_pob_choice: just as
  chosen_spanish: así como también
  alternatives_spanish:
  - tal como también
  - así como
  lexicon: BDAG
  rationale: La combinación comparativa y corroborativa se expresa de modo fluido en español con una fórmula que mantiene la relación sin volverla pesada.
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: En este título cristológico, 'Señor' es la equivalencia esperada y conserva el valor honorífico y confesional del griego.
- source_word: Ἰησοῦς Χριστός
  english_pob_choice: Jesus Messiah
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesucristo
  - Jesús Cristo
  lexicon: BDAG
  rationale: Se mantiene 'Mesías' para Χριστός como título, conforme al criterio POB documentado, en vez de la forma fusionada 'Jesucristo' o la transliteración tradicional que puede oscurecer el valor titular.
- source_word: ἐδήλωσέν
  english_pob_choice: made clear
  chosen_spanish: me lo ha dado a conocer
  alternatives_spanish:
  - me lo aclaró
  - me lo manifestó
  - me lo hizo saber
  lexicon: BDAG
  rationale: '''Dar a conocer'' conserva el sentido de hacer algo manifiesto o claro, en un español digno y natural. El complemento pronominal ''lo'' evita perder el objeto implícito del verbo griego.'
- source_word: μοι
  english_pob_choice: to me
  chosen_spanish: me
  alternatives_spanish:
  - a mí
  - para mí
  lexicon: BDAG
  rationale: El dativo se integra de forma natural como clítico indirecto en español.
theological_decisions:
- issue: Metáfora de la muerte inminente como abandono de una tienda
  english_pob_reading: Retain the bodily metaphor 'the putting off of my tent' rather than interpret directly as 'my death' or 'my departure.'
  chosen_spanish_reading: Conservar 'el desprendimiento de mi tienda' en vez de explicitar 'mi muerte' o 'mi partida'.
  alternative_spanish_readings:
  - mi muerte está cerca
  - mi partida está cerca
  - el dejar mi tienda
  rationale: El griego usa una metáfora vívida del cuerpo como tienda temporal. La traducción española preserva esa imagen para no aplanar el valor retórico y teológico del texto.
  doctrine_reference: Translation philosophy §§1, 3, 6
- issue: Traducción de Χριστός como título
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: Se sigue el criterio doctrinal del proyecto de traducir Χριστός como 'Mesías' cuando funciona como título, manteniendo visible su valor semántico en lugar de fosilizarlo como nombre propio.
  doctrine_reference: Translation philosophy §2; Contested terms table for Χριστός
translation_notes:
  revision_awareness: 'La base inglesa pasó por una corrección de estilo que cambió ''is soon'' por ''is near'', y después se restauró ''Messiah'' por coherencia doctrinal. Esta versión española sigue la decisión final del expediente: conservar la cercanía temporal sin forzar un verbo interpretativo, mantener la metáfora de la tienda, y traducir Χριστός como ''Mesías''.'
  spanish_consistency_notes:
  - 'Se mantiene el orden informativo del griego: conocimiento previo, proximidad del evento, metáfora de la tienda y comparación con la revelación hecha por el Señor.'
  - '''Señor Jesús Mesías'' conserva el título cristológico con ''Mesías'' visible, conforme al criterio POB.'
  - Los tres marcadores de nota aparecen anclados exactamente en el texto español y no se reutilizan.
  - No se explicita 'muerte' en el cuerpo principal para respetar la metáfora del original.
