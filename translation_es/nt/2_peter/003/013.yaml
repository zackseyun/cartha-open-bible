translation:
  language: es
  text: Pero, conforme a su promesa[a], esperamos cielos nuevos y tierra nueva, en los cuales habita la rectitud.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «justicia».
    reason: lexical_alternative
lexical_decisions:
- source_word: καινοὺς ... οὐρανοὺς / γῆν καινὴν
  english_pob_choice: new heavens and a new earth
  chosen_spanish: cielos nuevos y tierra nueva
  alternatives_spanish:
  - unos cielos nuevos y una tierra nueva
  - nuevos cielos y nueva tierra
  - cielos renovados y tierra renovada
  lexicon: BDAG
  rationale: καινός indica novedad de calidad o condición, no solo reciente. En español, «cielos nuevos y tierra nueva» conserva el paralelismo bíblico y la referencia cósmica sin restringir indebidamente el alcance. «Renovados» interpreta más de lo que el adjetivo exige; «skies/land» no refleja bien el lenguaje bíblico del texto.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: δέ introduce un contraste suave con la destrucción del orden presente en el contexto inmediato. «Pero» reproduce ese matiz de contraste de forma natural en español.
- source_word: κατὰ τὸ ἐπάγγελμα αὐτοῦ
  english_pob_choice: according to his promise
  chosen_spanish: conforme a su promesa
  alternatives_spanish:
  - según su promesa
  - de acuerdo con su promesa
  - en conformidad con su promesa
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad. «Conforme a su promesa» comunica bien esa relación y mantiene un tono sobrio. «Promesa» es la equivalencia natural de ἐπάγγελμα en este contexto.
- source_word: προσδοκῶμεν
  english_pob_choice: we are waiting for
  chosen_spanish: esperamos
  alternatives_spanish:
  - estamos esperando
  - aguardamos
  - anhelamos
  lexicon: BDAG
  rationale: El presente indica expectativa continua. En español, «esperamos» es conciso y natural; conserva la orientación futura y la continuidad del anhelo sin sobrecargar el verso.
- source_word: ἐν οἷς
  english_pob_choice: in which
  chosen_spanish: en los cuales
  alternatives_spanish:
  - en que
  - donde
  - en ellos
  lexicon: BDAG
  rationale: El relativo plural concuerda con «cielos nuevos y tierra nueva», pero la referencia es colectiva al nuevo orden creado. «En los cuales» mantiene la concordancia plural y evita una simplificación excesiva.
- source_word: δικαιοσύνη
  english_pob_choice: righteousness
  chosen_spanish: la justicia
  alternatives_spanish:
  - la rectitud
  - la justicia de Dios
  lexicon: BDAG
  rationale: La pauta doctrinal del POB favorece «righteousness», pero en español «justicia» es la opción más directa y ampliamente bíblica para δικαιοσύνη. Aquí también preserva la alternativa semántica indicada por el audit trail inglés, que admite «justice» como lectura legítima. «Rectitud» es posible, pero menos natural en este enunciado escatológico.
- source_word: κατοικεῖ
  english_pob_choice: dwells
  chosen_spanish: habita
  alternatives_spanish:
  - mora
  - reside
  - vive
  lexicon: BDAG
  rationale: κατοικέω expresa residencia estable. «Habita» mantiene dignidad estilística y la idea de permanencia mejor que «vive», que sería más débil en este contexto.
theological_decisions:
- issue: δικαιοσύνη en un contexto escatológico
  english_pob_reading: righteousness with footnoted alternative justice
  chosen_spanish_reading: la justicia
  alternative_spanish_readings:
  - la rectitud
  - la justicia de Dios
  rationale: El griego describe la cualidad que caracteriza el nuevo orden creado. En español, «justicia» comunica de manera fiel esa realidad moral y también deja espacio para la alternativa «rectitud»; no se pierde la tensión entre una lectura ética amplia y una lectura más jurídico-social. La frase sigue siendo compatible con la nota de alternativa léxica del POB inglés.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη → righteousness; alternative ''justice'' preserved in footnotes'
translation_notes:
  revision_awareness: El texto griego y el audit trail inglés muestran alto acuerdo y no registran revisiones aplicadas; se mantiene la estructura semántica central sin cambios sustantivos.
  spanish_consistency_notes:
  - Se conservó el contraste inicial con «Pero» para reflejar δέ.
  - Se mantuvo el lenguaje bíblico cósmico «cielos nuevos y tierra nueva» en lugar de una paráfrasis más explicativa.
  - Se eligió «justicia» como equivalente español principal de δικαιοσύνη, con nota alternativa, para respetar la ambigüedad lexical preservada por el POB inglés.
  - Se evitó «SEÑOR» u otras sustituciones no presentes en el texto fuente; aquí no aparece el nombre divino explícito.
  - «Habita» preserva la noción de residencia estable implícita en κατοικεῖ.
