  text: οὐ βραδύνει ⸀κύριος τῆς ἐπαγγελίας, ὥς τινες βραδύτητα ἡγοῦνται, ἀλλὰ μακροθυμεῖ εἰς ⸀ὑμᾶς, μὴ βουλόμενός τινας ἀπολέσθαι ἀλλὰ πάντας εἰς μετάνοιαν χωρῆσαι.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/003/009.yaml
  text: The Lord is not slow concerning the promise[a], as some consider slowness, but is patient toward you[c][b], not wanting any to perish but all to come to repentance.
  footnotes:
  - marker: a
    text: Or 'as some count it slowness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'is patient with you.'
    reason: lexical_alternative
  - marker: c
    text: The scope of 'any' and 'all' is left as stated in the Greek; interpreters differ on whether Peter refers specifically to his readers or more broadly to humanity.
    reason: alternative_reading
