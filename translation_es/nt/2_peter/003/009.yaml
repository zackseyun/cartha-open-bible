    rationale: El griego permite una construcción más elíptica, pero en español ‘consideran eso tardanza’ suena más completo. Así la nota alternativa ‘como algunos lo consideran tardanza’ queda también mejor anclada al texto.
  revised_spanish_text: Yahvé no se retrasa respecto a la promesa[a], como algunos consideran eso tardanza, sino que es paciente hacia ustedes[c][b], no queriendo que nadie perezca, sino que todos lleguen al arrepentimiento.
