revisions:
- from: El Señor no se retrasa respecto a la promesa[a], como algunos consideran tardanza, sino que es paciente hacia ustedes[c][b], no queriendo que nadie perezca, sino que todos lleguen al arrepentimiento.
  to: Yahvé no se retrasa respecto a la promesa[a], como algunos consideran eso tardanza, sino que es paciente hacia ustedes[c][b], no queriendo que nadie perezca, sino que todos lleguen al arrepentimiento.
  rationale: Se revisa ‘El Señor’ a ‘Yahvé’ para ajustarse a la terminología principal del proyecto en ausencia de una razón contextual suficiente para mantener el título enmascarado. Además, se mejora la naturalidad de la cláusula comparativa con ‘eso’ y se conserva intacta la tensión teológica del original, junto con las notas existentes.
