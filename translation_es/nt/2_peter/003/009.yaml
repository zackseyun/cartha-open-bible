    issue: κύριος se vierte como ‘El Señor’ en lugar de ‘Yahvé’.
    rationale: Las instrucciones del proyecto establecen ‘Yahvé’ como valor por defecto en el texto principal para יהוה / YHWH, y piden explicar los casos de κύριος griego que citen o aludan al nombre divino. En 2 Pedro 3:9 el referente es divino y no hay una justificación documentada suficiente en este expediente para apartarse del valor por defecto en español.
  - severity: low
