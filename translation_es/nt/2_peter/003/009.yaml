translation:
  language: es
  text: Yahvé no se retrasa respecto a la promesa[a], como algunos consideran eso tardanza, sino que es paciente hacia ustedes[c][b], no queriendo que nadie perezca, sino que todos lleguen al arrepentimiento.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O ‘como algunos lo consideran tardanza’.
    reason: lexical_alternative
  - marker: b
    text: O ‘con ustedes’.
    reason: lexical_alternative
  - marker: c
    text: El alcance de ‘nadie’ y ‘todos’ se deja tal como está en el griego; los intérpretes difieren en si Pedro se refiere específicamente a sus lectores o de manera más amplia a la humanidad.
    reason: alternative_reading
lexical_decisions:
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  - Yahvé
  lexicon: BDAG
  rationale: En este versículo κύριος aparece con sentido titular y la POB inglesa lo vierte como ‘the Lord’. En español, ‘el Señor’ es la forma natural y reverente para el título. No se usa ‘Yahvé’ aquí porque el texto griego cita κύριος sin señalar de forma explícita el Nombre divino en una fórmula de citación.
- source_word: βραδύνει
  english_pob_choice: is not slow
  chosen_spanish: no se retrasa
  alternatives_spanish:
  - no es lento
  - no tarda
  lexicon: BDAG
  rationale: El verbo expresa lentitud o demora. ‘No se retrasa’ comunica bien la idea y mantiene la conexión semántica con βραδύτητα en la segunda cláusula. ‘No es lento’ es posible, pero suena más abstracto en español; ‘no tarda’ es más idiomático, aunque algo menos cercano al paralelismo léxico del griego.
- source_word: τῆς ἐπαγγελίας
  english_pob_choice: concerning the promise
  chosen_spanish: respecto a la promesa
  alternatives_spanish:
  - con respecto a la promesa
  - acerca de la promesa
  - en cuanto a la promesa
  lexicon: BDAG
  rationale: La construcción con genitivo después de βραδύνω se rinde de manera natural con una relación de referencia. ‘Respecto a la promesa’ es claro y formal en español. Evita añadir la expansión interpretativa ‘en cumplir la promesa’, que no está expresada de forma explícita en el griego.
- source_word: ὥς τινες βραδύτητα ἡγοῦνται
  english_pob_choice: as some consider slowness
  chosen_spanish: como algunos consideran tardanza
  alternatives_spanish:
  - como algunos lo toman por tardanza
  - como algunos juzgan que hay tardanza
  - como algunos lo cuentan por lentitud
  lexicon: BDAG
  rationale: ἡγέομαι aquí significa considerar o estimar. ‘Consideran tardanza’ conserva la comparación con βραδύτης, pero en español suena más natural que repetir ‘lento’ en la segunda mitad. ‘Lo cuentan por lentitud’ preserva mejor la tradición literal, pero resulta más forzado.
- source_word: μακροθυμεῖ
  english_pob_choice: is patient
  chosen_spanish: es paciente
  alternatives_spanish:
  - tiene paciencia
  - es longsánimo
  - es longánimo
  lexicon: BDAG
  rationale: El verbo expresa paciencia perseverante y contención. ‘Es paciente’ es la equivalencia más natural y fiel en español. Se evita ‘longánimo/longanimidad’ por ser menos transparente para lectura pública moderna.
- source_word: εἰς ὑμᾶς
  english_pob_choice: toward you
  chosen_spanish: hacia ustedes
  alternatives_spanish:
  - con ustedes
  - para ustedes
  - con respecto a ustedes
  lexicon: BDAG
  rationale: εἰς con personas expresa dirección o relación hacia ellas. ‘Hacia ustedes’ reproduce bien ese matiz relacional. Se mantiene el plural de segunda persona porque el griego es plural, y no se restringe el alcance de forma doctrinal.
- source_word: μὴ βουλόμενός
  english_pob_choice: not wanting
  chosen_spanish: no queriendo
  alternatives_spanish:
  - no deseando
  - no intentando
  - no estando dispuesto
  lexicon: BDAG
  rationale: βούλομαι expresa voluntad o deseo. ‘No queriendo’ preserva esa fuerza volitiva sin convertirla en un término técnico doctrinal. ‘No deseando’ es también posible, pero ‘queriendo’ mantiene mejor la relación con el infinitivo siguiente.
- source_word: τινας ἀπολέσθαι
  english_pob_choice: any to perish
  chosen_spanish: que nadie perezca
  alternatives_spanish:
  - que alguno perezca
  - que ninguna persona perezca
  - que nadie sea destruido
  lexicon: BDAG
  rationale: ἀπόλλυμι en este uso intransitivo expresa perecer o perderse. En español, ‘que nadie perezca’ comunica con claridad el sentido y, al mismo tiempo, refleja la amplitud del griego sin introducir ‘destruido’, que sugiere una causa externa más fuerte de la que el texto exige.
- source_word: πάντας
  english_pob_choice: all
  chosen_spanish: todos
  alternatives_spanish:
  - todas las personas
  - todos ellos
  - cada uno
  lexicon: BDAG
  rationale: El adjetivo es amplio y paralelo a τινας. ‘Todos’ conserva la antítesis retórica del griego. No se amplía a ‘todas las personas’ para no interpretar más allá del alcance textual.
- source_word: εἰς μετάνοιαν χωρῆσαι
  english_pob_choice: to come to repentance
  chosen_spanish: lleguen al arrepentimiento
  alternatives_spanish:
  - vengan al arrepentimiento
  - entren en arrepentimiento
  - avancen hacia el arrepentimiento
  lexicon: BDAG
  rationale: χώρεω aquí expresa llegar a un estado o avanzar hacia él. ‘Lleguen al arrepentimiento’ conserva la idea de movimiento/entrada sin volverla demasiado literal. Se usa ‘arrepentimiento’ porque μετάνοια tiene aquí su sentido ético-religioso estándar; ‘cambio de mente’ sería demasiado reduccionista en español e inferior para lectura eclesial.
theological_decisions:
- issue: Alcance de ‘ustedes’, ‘nadie’ y ‘todos’ en la paciencia divina
  english_pob_reading: 'Render the verse straightforwardly without narrowing the referents beyond the Greek: ''toward you ... not wanting any to perish but all to come to repentance.'''
  chosen_spanish_reading: 'Traducir de forma directa: ‘hacia ustedes ... no queriendo que nadie perezca, sino que todos lleguen al arrepentimiento’.'
  alternative_spanish_readings:
  - Limitar ‘nadie’ y ‘todos’ al auditorio creyente inmediato
  - Universalizar ‘nadie’ y ‘todos’ para toda la humanidad
  rationale: El griego no especifica de manera explícita una restricción o una universalización doctrinal adicional. La traducción conserva esa tensión y no resuelve el debate por adelantado. Además, el plural ‘ustedes’ respeta la forma del texto sin forzar un singular ni una expansión interpretativa.
  doctrine_reference: 'Translation philosophy: preserve theological tension rather than resolve it.'
- issue: Fuerza de βουλόμενός respecto a la voluntad divina
  english_pob_reading: Translate as 'not wanting' rather than a stronger systematic-theological term such as 'decreeing' or a weaker paraphrase.
  chosen_spanish_reading: ‘No queriendo’ como expresión de voluntad/desear, sin tecnicismos doctrinales.
  alternative_spanish_readings:
  - no deseando
  - no estando dispuesto
  - no decretando
  rationale: βούλομαι expresa voluntad o intención, pero no obliga a una categoría dogmática más precisa. ‘No queriendo’ es fiel, sobrio y deja intacta la afirmación del texto sin importar distinciones teológicas posteriores que el versículo no formula.
  doctrine_reference: 'Translation philosophy: do not import doctrinal claims the text does not make.'
translation_notes:
  revision_awareness: La redacción sigue la última revisión inglesa que sustituyó una formulación más literal de μετάνοια por ‘repentance’. En español se adoptó ‘arrepentimiento’ por ser el equivalente eclesial estándar y semánticamente adecuado. También se mantuvo la relación léxica entre βραδύνει y βραδύτητα mediante ‘se retrasa’ / ‘tardanza’ para preservar el paralelismo del griego. La decisión sobre ‘hacia ustedes’ refleja la nota inglesa sobre εἰς ὑμᾶς y conserva el plural explícito.
  spanish_consistency_notes:
  - Se usa ‘el Señor’ como título reverente coherente con el POB inglés.
  - Se mantiene ‘arrepentimiento’ para μετάνοια, no ‘cambio de mente’, por claridad y fidelidad al uso bíblico.
  - ‘Hacia ustedes’ conserva el valor plural de ὑμᾶς.
  - ‘Que nadie perezca, sino que todos’ mantiene la tensión de alcance sin resolverla doctrinalmente.
  - No se emplea ‘Yahvé’ porque κύριος aquí sigue la formulación titulada del texto griego y el contexto inmediato no exige la sustitución del Nombre divino.
