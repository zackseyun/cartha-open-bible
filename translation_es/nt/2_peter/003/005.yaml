translation:
  language: es
  text: 'Porque deliberadamente pasan por alto esto[a]: que los cielos existían desde hace mucho[b], y la tierra fue formada[c] a partir de agua y por medio de agua, por la palabra de Dios[d],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «este hecho se les escapa voluntariamente» o «ignoran esto voluntariamente». La expresión griega combina la idea de no advertir algo con una disposición deliberada.'
    reason: lexical_alternative
  - marker: b
    text: 'O: «desde antiguo», «de antiguo» o «hace mucho tiempo». El griego expresa una antigüedad remota.'
    reason: lexical_alternative
  - marker: c
    text: 'O: «quedó constituida», «había sido establecida» o «estaba compuesta». El participio griego describe la constitución de la tierra en el orden creado.'
    reason: lexical_alternative
  - marker: d
    text: 'O: «por el mandato de Dios». La expresión griega dice más literalmente «por la palabra de Dios».'
    reason: lexical_alternative
lexical_decisions:
- source_word: λανθάνει γὰρ αὐτοὺς τοῦτο θέλοντας
  english_pob_choice: For they deliberately overlook this
  chosen_spanish: se les escapa a propósito
  alternatives_spanish:
  - lo pasan por alto deliberadamente
  - lo ignoran voluntariamente
  - se les oculta este hecho
  lexicon: BDAG
  rationale: La expresión griega combina una idea de no percibir con una disposición volitiva. En español, 'se les escapa a propósito' mantiene tanto el matiz de no advertir como el de hacerlo con intención, sin volverlo demasiado mecánico.
- source_word: οὐρανοὶ
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - el cielo
  - los cielos celestiales
  lexicon: BDAG
  rationale: El plural griego se preserva con 'los cielos', que refleja mejor la forma y el lenguaje cosmológico bíblico que el singular 'el cielo'.
- source_word: ἔκπαλαι
  english_pob_choice: long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - de antiguo
  - desde antiguo
  - hace mucho tiempo
  lexicon: BDAG
  rationale: '''Desde hace mucho'' es natural en español actual y conserva el sentido temporal sin tono arcaico.'
- source_word: γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra creada
  - la tierra como mundo
  lexicon: BDAG
  rationale: Aunque el griego no tiene artículo, el contexto cosmológico permite una referencia definida en español. 'La tierra' es la forma más natural y clara, sin forzar una lectura técnica sobre la ausencia del artículo.
- source_word: ἐξ ὕδατος καὶ δι’ ὕδατος
  english_pob_choice: out of water and through water
  chosen_spanish: a partir de agua y por medio de agua
  alternatives_spanish:
  - desde agua y por medio de agua
  - de agua y a través de agua
  lexicon: BDAG
  rationale: Se conserva la distinción semántica entre ἐκ y διά. 'A partir de' comunica origen; 'por medio de' refleja instrumentación sin sonar torpe en español.
- source_word: συνεστῶσα
  english_pob_choice: formed
  chosen_spanish: fue formada
  alternatives_spanish:
  - había sido constituida
  - estaba constituida
  - quedó formada
  lexicon: BDAG
  rationale: El participio describe la constitución de la tierra en el contexto de la creación. 'Fue formada' es claro y fiel, y funciona bien con las frases preposicionales que lo acompañan.
- source_word: τῷ τοῦ θεοῦ λόγῳ
  english_pob_choice: by the word of God
  chosen_spanish: por la palabra de Dios
  alternatives_spanish:
  - por el palabra de Dios
  - por el mandato de Dios
  - por la palabra de Yahvé
  lexicon: BDAG
  rationale: '''Palabra de Dios'' reproduce bien λόγος en este contexto como palabra eficaz de creación. Se evita introducir aquí ''mandato'' o una cristología implícita que el versículo no explicita.'
theological_decisions:
- issue: Si λόγῳ debe entenderse como 'la Palabra' en sentido cristológico o como la palabra eficaz de Dios en la creación
  english_pob_reading: by the word of God
  chosen_spanish_reading: por la palabra de Dios
  alternative_spanish_readings:
  - por el mandato de Dios
  - por la Palabra de Dios
  rationale: En este versículo, λόγος refiere a la palabra eficaz de Dios en la creación. Mantener 'la palabra de Dios' preserva el texto sin añadir una lectura cristológica que no está formulada explícitamente aquí.
  doctrine_reference: Preservar la tensión textual; no resolver en traducción una posible conexión teológica posterior.
translation_notes:
  revision_awareness: La redacción española sigue la forma final del texto inglés auditado, con artículos definidos en plural ('los cielos', 'la tierra') y un verbo pasivo claro ('fue formada') para reflejar mejor la construcción participial. Se mantuvo la distinción entre origen e instrumentación en ἐξ / διά y se evitó resolver el valor de λόγος con una terminología más cristológica que la que exige el versículo.
  spanish_consistency_notes:
  - Se usa 'Dios' para θεοῦ, conforme al estándar del proyecto.
  - Se usa 'palabra de Dios' en lugar de 'mandato' para conservar la formulación más literal y dejar abierta la tensión teológica.
  - Se preserva el plural 'los cielos' para οὐρανοί.
  - La ausencia de artículo en γῆ no se fuerza en español; se prioriza naturalidad y claridad en contexto cosmológico.
