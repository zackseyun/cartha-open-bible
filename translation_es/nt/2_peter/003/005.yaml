  spanish_quality_summary: El español es generalmente claro y digno, pero la apertura es torpe e idiomáticamente extraña. «Lo pasan por alto deliberadamente» comunica mejor el sentido volitivo y cognitivo. El resto del versículo es legible y fiel. Conviene además ajustar la puntuación para que la frase fluya naturalmente en español bíblico moderno.
