    changes_summary: 'Changed ''Jesus Messiah'' to ''Jesus Christ'' for standard formal register and consistency in rendering Ἰησοῦ Χριστοῦ; no other changes needed. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pero crezcan en la gracia y el conocimiento de nuestro Señor y Salvador Jesús el Mesías[a]. A él sea la gloria, tanto ahora como hasta el día de la eternidad[b]. Amén.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, siguiendo el uso cristiano tradicional, «Jesucristo».
    reason: alternative_reading
  - marker: b
    text: 'O: «ahora y para siempre». El griego dice más literalmente «ahora y hasta el día de la eternidad».'
    reason: lexical_alternative
lexical_decisions:
- source_word: αὐξάνετε
  english_pob_choice: grow
  chosen_spanish: crezcan
  alternatives_spanish:
  - sigan creciendo
  - crezcan continuamente
  lexicon: BDAG
  rationale: El imperativo presente plural pide una acción continua; «crezcan» comunica bien el sentido exhortativo en español sin volverse demasiado explicativo.
- source_word: δὲ
  english_pob_choice: But
  chosen_spanish: Pero
  alternatives_spanish:
  - Y
  - Ahora bien
  lexicon: BDAG
  rationale: Introduce una transición con matiz adversativo respecto de las advertencias previas; «Pero» conserva ese giro mejor que una simple coordinación.
- source_word: ἐν χάριτι καὶ γνώσει
  english_pob_choice: in the grace and knowledge
  chosen_spanish: en la gracia y el conocimiento
  alternatives_spanish:
  - en gracia y conocimiento
  lexicon: BDAG
  rationale: Se mantiene la idea de ámbito o esfera con «en»; en español suena natural añadir el artículo sin perder la construcción griega.
- source_word: χάριτι
  english_pob_choice: grace
  chosen_spanish: gracia
  alternatives_spanish:
  - favor
  lexicon: BDAG
  rationale: En contexto neotestamentario, «gracia» es el equivalente directo y teológicamente estable.
- source_word: γνώσει
  english_pob_choice: knowledge
  chosen_spanish: conocimiento
  alternatives_spanish:
  - conocer
  - entendimiento
  lexicon: BDAG
  rationale: γνῶσις expresa conocimiento de Cristo; «conocimiento» conserva el sustantivo sin reducirlo a mera información.
- source_word: τοῦ κυρίου ἡμῶν καὶ σωτῆρος Ἰησοῦ Χριστοῦ
  english_pob_choice: of our Lord and Savior Jesus Messiah
  chosen_spanish: de nuestro Señor y Salvador Jesús Mesías
  alternatives_spanish:
  - de nuestro Señor y Salvador Jesucristo
  - de nuestro Señor y Salvador Jesús Cristo
  lexicon: BDAG
  rationale: «Señor» y «Salvador» reflejan bien κύριος y σωτήρ. «Mesías» traduce Χριστός como título, siguiendo la política del proyecto de traducir el título cuando el contexto lo permite, sin ocultar su fuerza mesiánica.
- source_word: αὐτῷ ἡ δόξα
  english_pob_choice: To him be the glory
  chosen_spanish: A él sea la gloria
  alternatives_spanish:
  - A él pertenece la gloria
  - Suya sea la gloria
  lexicon: BDAG
  rationale: La fórmula doxológica en español se expresa con naturalidad mediante un subjuntivo exhortativo; conserva la atribución de gloria al mismo referente.
- source_word: καὶ νῦν καὶ εἰς ἡμέραν αἰῶνος
  english_pob_choice: both now and to the day of eternity
  chosen_spanish: tanto ahora como hasta el día de la eternidad
  alternatives_spanish:
  - ahora y para siempre
  - ahora y hasta el día de la eternidad
  lexicon: BDAG
  rationale: Se preserva el valor literal de «día» y la estructura correlative; «de la eternidad» evita aplanar la expresión a un simple «para siempre».
- source_word: ἀμήν
  english_pob_choice: Amen
  chosen_spanish: Amén
  alternatives_spanish:
  - Amén.
  lexicon: BDAG
  rationale: Transliteración litúrgica estándar en español.
theological_decisions:
- issue: Traducción de Χριστός en Ἰησοῦ Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesucristo
  - Jesús Cristo
  rationale: El texto griego usa Χριστός como título; «Mesías» preserva ese valor semántico y evita depender exclusivamente de la forma tradicionalizada «Cristo» cuando el proyecto privilegia traducir títulos.
  doctrine_reference: 'DOCTRINE.md: Translate titles; transliterate names; Contested terms table for Χριστός'
- issue: Un solo referente para «nuestro Señor y Salvador»
  english_pob_reading: Both titles refer to the one person, Jesus Messiah
  chosen_spanish_reading: 'Ambos títulos se refieren a una sola persona: Jesús Mesías'
  alternative_spanish_readings:
  - Ambos títulos pueden leerse de forma menos explícita
  rationale: La presencia de un solo artículo con κύριος y σωτήρ en griego apunta a un único referente; la traducción española lo deja claro sin añadir contenido doctrinal ajeno a la gramática.
  doctrine_reference: 'DOCTRINE.md: Original-language primacy over translation tradition'
- issue: Alcance de «la gloria» en la doxología
  english_pob_reading: To him be the glory
  chosen_spanish_reading: A él sea la gloria
  alternative_spanish_readings:
  - La gloria sea para él
  - A él pertenece la gloria
  rationale: La forma española reproduce una ascripción doxológica natural y reverente, manteniendo el mismo sentido de atribución que el griego.
  doctrine_reference: 'DOCTRINE.md: Preserve source force; do not over-explicate doxological formulas'
translation_notes:
  revision_awareness: La base inglesa atravesó una revisión que osciló entre «Jesus Messiah» y «Jesus Christ»; el estado final restauró «Messiah» conforme a la política del proyecto para Χριστός como título. La versión española sigue esa lectura titulada con «Mesías» y conserva la literalidad de la frase temporal final sin suavizarla a «para siempre».
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma del proyecto, aunque este versículo no contiene el tetragrámaton.
  - Se usa «Mesías» para Χριστός en coherencia con la política de traducir títulos cuando el contexto lo permite.
  - «Señor» y «Salvador» se conservan por ser equivalentes naturales y doctrinalmente estables en español.
  - La doxología final se formula con español litúrgico claro, sin archaísmos innecesarios.
