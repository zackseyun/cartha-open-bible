translation:
  language: es
  text: para recordar las palabras dichas de antemano[a] por los santos profetas y el mandamiento[b] del Señor y Salvador, por medio de los apóstoles de ustedes
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «las palabras previamente dichas».'
    reason: lexical_alternative
  - marker: b
    text: 'También: «mandato» o «orden». El griego ἐντολή conserva fuerza de autoridad; «mandamiento» la refleja mejor en español bíblico.'
    reason: lexical_alternative
lexical_decisions:
- source_word: μνησθῆναι
  english_pob_choice: to remember
  chosen_spanish: recordar
  alternatives_spanish:
  - acordarse de
  - tener presente
  lexicon: BDAG
  rationale: El infinitivo expresa el contenido del propósito y en español natural se rinde bien con un infinitivo activo. 'Recordar' conserva el sentido de traer a la memoria sin forzar una construcción pasiva.
- source_word: προειρημένων ῥημάτων
  english_pob_choice: the words spoken beforehand
  chosen_spanish: las palabras dichas de antemano
  alternatives_spanish:
  - las palabras previamente dichas
  - las palabras anunciadas de antemano
  lexicon: BDAG
  rationale: '''ῥήματα'' se entiende mejor como ''palabras''; ''proeipēmenōn'' señala anterioridad temporal, no necesariamente predicción técnica. ''Dichas de antemano'' mantiene esa neutralidad y el matiz verbal.'
- source_word: ὑπὸ τῶν ἁγίων προφητῶν
  english_pob_choice: by the holy prophets
  chosen_spanish: por los santos profetas
  alternatives_spanish:
  - por los profetas santos
  lexicon: BDAG
  rationale: La construcción instrumental pasa naturalmente a 'por'. 'Santos profetas' conserva el orden idiomático español y el valor atributivo de ἁγίων.
- source_word: ἐντολῆς
  english_pob_choice: the commandment
  chosen_spanish: el mandamiento
  alternatives_spanish:
  - el mandato
  - la orden
  lexicon: BDAG
  rationale: '''ἐντολή'' tiene fuerza de mandato autorizado; ''mandamiento'' preserva mejor ese peso formal y la posible resonancia bíblica que ''instrucción''.'
- source_word: τῶν ἀποστόλων ὑμῶν
  english_pob_choice: of your apostles
  chosen_spanish: de sus apóstoles
  alternatives_spanish:
  - de vuestros apóstoles
  - de los apóstoles de ustedes
  lexicon: BDAG
  rationale: En español, el posesivo pospuesto al sintagma puede sonar más claro como referencia a los apóstoles vinculados con los destinatarios. 'Sus' evita una dureza innecesaria, manteniendo el sentido relacional sin ampliar el texto.
- source_word: τοῦ κυρίου καὶ σωτῆρος
  english_pob_choice: of the Lord and Savior
  chosen_spanish: del Señor y Salvador
  alternatives_spanish:
  - del Señor y del Salvador
  - del Señor, el Salvador
  lexicon: BDAG
  rationale: La relación genitiva se expresa en español de modo natural con 'del'. 'Señor y Salvador' mantiene la unidad del título cristológico y evita añadir un posesivo no presente en el griego.
theological_decisions:
- issue: Relación sintáctica de τοῦ κυρίου καὶ σωτῆρος respecto de ἐντολῆς
  english_pob_reading: the commandment of the Lord and Savior through your apostles
  chosen_spanish_reading: el mandamiento del Señor y Salvador, por medio de sus apóstoles
  alternative_spanish_readings:
  - el mandamiento de los apóstoles, del Señor y Salvador
  - el mandamiento del Señor y Salvador a través de sus apóstoles
  rationale: La revisión del POB en inglés corrige la relación para que el mandamiento pertenezca al Señor y Salvador y sea transmitido mediante los apóstoles. 'Por medio de' expresa esa mediación sin sugerir que los apóstoles sean el origen del mandamiento.
  doctrine_reference: Translation philosophy §1, §3
- issue: Posesivo de ὑμῶν en τῶν ἀποστόλων ὑμῶν
  english_pob_reading: your apostles
  chosen_spanish_reading: sus apóstoles
  alternative_spanish_readings:
  - vuestros apóstoles
  - los apóstoles de ustedes
  rationale: El griego vincula naturalmente el posesivo con 'apóstoles'. En español, 'sus' puede funcionar de manera relacional y mantiene el carácter de pertenencia o asociación sin imponer una lectura institucional ajena al contexto.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'La revisión inglesa más reciente corrigió la relación final: el mandamiento pertenece al Señor y Salvador y llega por medio de los apóstoles. La versión española sigue esa línea y evita la lectura anterior que hacía depender ''de sus apóstoles'' del mandamiento como origen principal. También se preserva la ambigüedad controlada de ὑμῶν con una formulación relacional natural en español.'
  spanish_consistency_notes:
  - Se usa 'Señor' para κύριος y 'Salvador' para σωτήρ, conforme al estándar POB y al contexto cristológico.
  - Se traduce ἐντολή como 'mandamiento' para mantener la fuerza normativa; no se reemplaza por 'instrucción'.
  - No se introduce 'Cristo' porque el griego no lo contiene en este versículo.
  - '''Por medio de'' refleja la mediación apostólica sin desplazar el origen del mandamiento desde el Señor y Salvador.'
