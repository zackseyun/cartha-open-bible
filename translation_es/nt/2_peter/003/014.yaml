translation:
  language: es
  text: Por tanto[a], amados, puesto que esperan estas cosas, esfuércense por ser hallados por él sin mancha e irreprochables en paz.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «ante él» o «delante de él». El dativo griego con εὑρεθῆναι puede entenderse como agencia («por él») o como referencia/presencia («ante él»).
    reason: alternative_reading
lexical_decisions:
- source_word: Διό
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por eso
  - Por consiguiente
  lexicon: BDAG
  rationale: Conjunction inferencial que concluye a partir de lo anterior. «Por tanto» conserva la relación lógica sin sonar mecánico en español y funciona bien en registro epistolar.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados míos
  - queridos
  - amados hermanos
  lexicon: BDAG
  rationale: Vocativo afectuoso plural. «Amados» mantiene la fuerza afectiva y el tono de carta; «queridos» puede suavizar demasiado el matiz de relación querida/amada.
- source_word: ταῦτα
  english_pob_choice: these things
  chosen_spanish: estas cosas
  alternatives_spanish:
  - esto
  - estas realidades
  lexicon: BDAG
  rationale: El demostrativo apunta a lo descrito antes; «estas cosas» conserva el objeto explícito del griego sin precisar más de lo que el contexto exige.
- source_word: προσδοκῶντες
  english_pob_choice: since you are waiting for
  chosen_spanish: puesto que esperan
  alternatives_spanish:
  - mientras esperan
  - ya que esperan
  - como están esperando
  lexicon: BDAG
  rationale: El participio presente expresa expectativa continua con valor causal/temporal. «Puesto que esperan» reproduce bien esa conexión y evita un giro demasiado literal o pesado.
- source_word: σπουδάσατε
  english_pob_choice: make every effort
  chosen_spanish: esfuércense
  alternatives_spanish:
  - aplíquense con diligencia
  - procuren con empeño
  - hagan todo lo posible
  lexicon: BDAG
  rationale: Imperativo aoristo de urgencia y empeño. «Esfuércense» comunica el sentido activo, serio y exhortativo en español; el contenido de intensidad queda reforzado por el contexto de la cláusula.
- source_word: ἄσπιλοι
  english_pob_choice: spotless
  chosen_spanish: sin mancha
  alternatives_spanish:
  - sin mancha alguna
  - inmaculados
  lexicon: BDAG
  rationale: Imagen moral de pureza ética. «Sin mancha» es natural y transparenta bien la metáfora sacrificial/moral del término griego.
- source_word: ἀμώμητοι
  english_pob_choice: blameless
  chosen_spanish: sin defecto
  alternatives_spanish:
  - irreprensibles
  - sin culpa
  lexicon: BDAG
  rationale: Término emparejado con ἄσπιλοι para integridad ética. «Sin defecto» conserva la idea de ausencia de falla/defecto y distingue levemente este término del anterior sin alejarse del campo semántico.
- source_word: αὐτῷ
  english_pob_choice: by him
  chosen_spanish: por él
  alternatives_spanish:
  - ante él
  - delante de él
  lexicon: BDAG
  rationale: El dativo con εὑρεθῆναι admite lectura de agencia o de referencia/presencia. «Por él» mantiene la posibilidad de agente/divino evaluador en español, sin cerrar la ambigüedad con una formulación más interpretativa.
- source_word: εὑρεθῆναι
  english_pob_choice: to be found
  chosen_spanish: ser hallados
  alternatives_spanish:
  - ser encontrados
  - presentarse
  - ser hallados como
  lexicon: BDAG
  rationale: Infinitivo pasivo aoristo dependiente del imperativo. «Ser hallados» es una equivalencia natural y fiel al uso bíblico de hallarse en un estado al ser evaluados.
- source_word: ἐν εἰρήνῃ
  english_pob_choice: in peace
  chosen_spanish: en paz
  alternatives_spanish:
  - en paz con Dios
  - en paz
  - con paz
  lexicon: BDAG
  rationale: 'La frase preposicional describe el estado en que deben ser hallados. «En paz» conserva la forma del griego y deja abierta la gama de sentido: tranquilidad interior, reconciliación o estado pacífico.'
theological_decisions:
- issue: Alcance del dativo αὐτῷ en la evaluación escatológica
  english_pob_reading: The phrase is rendered 'by him,' while preserving the alternative 'before him' because the Greek is genuinely ambiguous.
  chosen_spanish_reading: La frase se vierte «por él», manteniendo abierta la posibilidad de lectura agente o de referencia/presencia sin nombrar de más al evaluador.
  alternative_spanish_readings:
  - ante él
  - delante de él
  - en su presencia
  rationale: El griego permite entender el dativo como agente o como relación/presencia. En español, «por él» sostiene la ambigüedad y no fuerza una identificación adicional que el versículo no explicita.
  doctrine_reference: Preservar la tensión textual sin resolverla más allá del dato gramatical.
translation_notes:
  revision_awareness: 'La redacción española sigue la revisión más reciente del inglés al unir «en paz» con la cláusula final sin pausa innecesaria, manteniendo la estructura del griego: conclusión inferencial, vocativo afectuoso, participio causal/temporal, imperativo de esfuerzo y resultado buscado en la esfera de paz.'
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando corresponde el nombre divino; este versículo no lo contiene, así que no aplica.
  - Se prefirió un vocabulario epistolar claro y formal («amados», «esfuércense», «ser hallados») acorde con el tono de la carta.
  - Se evitó traducir mecánicamente «blameless» como «irreprensibles» para no duplicar demasiado la pareja de adjetivos; «sin defecto» ayuda a distinguir el segundo término sin perder fidelidad.
  - La ambigüedad del dativo se conserva en nota porque el español exige una elección más marcada que el griego, pero la traducción principal no la cierra de manera dogmática.
