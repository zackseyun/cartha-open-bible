review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español sigue bien la estructura y el sentido del griego: inferencia («Por tanto»), vocativo afectuoso («amados»), expectativa continua de «estas cosas», exhortación a la diligencia, y el estado en que deben ser hallados. También preserva correctamente la ambigüedad de αὐτῷ mediante una nota. Sin embargo, «sin defecto» para ἀμώμητοι suena más físico/sacrificial que ético en español actual y pierde algo del matiz de «blameless» documentado en el rastro inglés. Además, «esfuércense por ser hallados» es aceptable, pero «procuren con empeño ser hallados» o «hagan todo esfuerzo por ser hallados» reflejaría mejor σπουδάσατε; aun así, no es un error grave. La principal reparación necesaria es ἀμώμητοι.'
  spanish_quality_summary: El texto es claro y legible, con tono bíblico sobrio. «Por tanto, amados» funciona bien. La frase final «en paz» también suena natural. La combinación «sin mancha y sin defecto» es comprensible, pero «sin defecto» no es la opción más idiomática ni más precisa para una exhortación ética; «irreprochables» mejora la naturalidad y la distinción semántica respecto de «sin mancha».
  glossary_alignment: No hay conflictos con la terminología base del proyecto. No aparecen términos sensibles del glosario principal. La decisión sobre αὐτῷ y su nota está bien alineada con el audit trail inglés. La mejora propuesta mantiene el contraste entre ἄσπιλοι = «sin mancha» y ἀμώμητοι = «irreprochables».
  issues:
  - severity: medium
    issue: «sin defecto» para ἀμώμητοι
    rationale: Aunque semánticamente posible, en español eclesial actual suena menos ético y más material/ritual. El rastro inglés justificó «blameless»; «irreprochables» preserva mejor ese matiz y suena más natural junto a «sin mancha».
  revised_spanish_text: Por tanto[a], amados, puesto que esperan estas cosas, esfuércense por ser hallados por él sin mancha e irreprochables en paz.
  revised_footnotes:
  - marker: a
    text: O «ante él» o «delante de él». El dativo griego con εὑρεθῆναι puede entenderse como agencia («por él») o como referencia/presencia («ante él»).
    reason: alternative_reading
  revision_rationale: Se reemplaza «sin defecto» por «irreprochables» para reflejar mejor el valor ético de ἀμώμητοι y la decisión inglesa «blameless», manteniendo a la vez una expresión natural en español. Se conserva la nota sobre la ambigüedad de αὐτῷ.
