revisions:
- from: Por tanto[a], amados, puesto que esperan estas cosas, esfuércense por ser hallados por él sin mancha y sin defecto en paz.
  to: Por tanto[a], amados, puesto que esperan estas cosas, esfuércense por ser hallados por él sin mancha e irreprochables en paz.
  rationale: Se reemplaza «sin defecto» por «irreprochables» para reflejar mejor el valor ético de ἀμώμητοι y la decisión inglesa «blameless», manteniendo a la vez una expresión natural en español. Se conserva la nota sobre la ambigüedad de αὐτῷ.
