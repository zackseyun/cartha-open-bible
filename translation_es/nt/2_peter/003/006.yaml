translation:
  language: es
  text: por medio de las cuales el mundo de entonces, al ser inundado con agua, pereció[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «fue destruido».
    reason: lexical_alternative
lexical_decisions:
- source_word: δι’ ὧν
  english_pob_choice: through which
  chosen_spanish: por medio de las cuales
  alternatives_spanish:
  - por las cuales
  - mediante las cuales
  lexicon: διά + genitivo
  rationale: La preposición con genitivo expresa medio o instrumento. El relativo plural se mantiene con «las cuales», porque remite a los medios mencionados en el versículo anterior y evita concretar demasiado la referencia.
- source_word: ὁ τότε κόσμος
  english_pob_choice: the world of that time
  chosen_spanish: el mundo de entonces
  alternatives_spanish:
  - el mundo de aquel tiempo
  - el mundo de ese tiempo
  lexicon: κόσμος
  rationale: «Mundo» conserva el sentido de orden humano/mundano del contexto, y «de entonces» refleja bien el contraste temporal con el mundo presente sin sonar pesado en español.
- source_word: ὕδατι
  english_pob_choice: with water
  chosen_spanish: con agua
  alternatives_spanish:
  - por agua
  - mediante agua
  lexicon: dativo de medio/instrumento
  rationale: El dativo expresa medio o instrumento en relación con el participio de inundación. «Con agua» es natural en español y mantiene la idea de medio sin forzar una construcción técnica.
- source_word: κατακλυσθεὶς
  english_pob_choice: having been flooded
  chosen_spanish: al ser inundado
  alternatives_spanish:
  - habiendo sido inundado
  - al ser cubierto por un diluvio
  lexicon: κατακλύζω
  rationale: El participio aoristo pasivo se vierte de forma participial para conservar su relación con el verbo principal. «Inundado» o «anegado» comunican el efecto del diluvio sin introducir un sustantivo ajeno al verbo griego.
- source_word: ἀπώλετο
  english_pob_choice: perished
  chosen_spanish: pereció
  alternatives_spanish:
  - fue destruido
  - se perdió
  lexicon: ἀπόλλυμι
  rationale: «Pereció» preserva el sentido intransitivo de juicio y ruina, y evita implicar de manera explícita una aniquilación total. Mantiene la tensión teológica del texto.
theological_decisions:
- issue: Alcance de ἀπώλετο en el juicio del diluvio
  english_pob_reading: perished
  chosen_spanish_reading: pereció
  alternative_spanish_readings:
  - fue destruido
  - quedó arrasado
  rationale: El verbo puede expresar destrucción o perdición, pero la forma intransitiva favorece «pereció». Así se conserva la severidad del juicio sin resolver más de lo que el texto dice sobre la naturaleza exacta de esa ruina.
  doctrine_reference: Preservar la tensión teológica sin sobretraducir el alcance del juicio.
translation_notes:
  revision_awareness: El texto español sigue de cerca la sintaxis y los valores léxicos del griego SBLGNT, en consonancia con la auditoría inglesa, sin depender mecánicamente de la redacción inglesa. Se preserva el plural del relativo, el valor de medio del dativo y la ambigüedad entre «perecer» y «ser destruido».
  spanish_consistency_notes:
  - Se usa «mundo» para κόσμος en sentido de orden humano/histórico, no «tierra».
  - Se mantiene «agua»/«inundado» para el medio del diluvio, sin introducir «diluvio» como sustantivo en el texto principal.
  - La nota del pie a conserva la alternativa de referencia plural del relativo.
  - La nota del pie b conserva la alternativa traductiva de ἀπώλετο sin cerrar la discusión teológica.
