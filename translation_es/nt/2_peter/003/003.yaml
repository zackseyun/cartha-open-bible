translation:
  language: es
  text: 'Sabiendo esto primero: que en los últimos días vendrán burladores con burla[a], andando según sus propios deseos[b],'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en burla»; el griego usa términos cognados para enfatizar: «burladores» y «con burla».'
    reason: lexical_alternative
  - marker: b
    text: «Deseos» también puede rendirse «pasiones»; el término griego puede abarcar apetitos intensos en sentido más amplio, no solo deseo sexual.
    reason: lexical_alternative
lexical_decisions:
- source_word: τοῦτο πρῶτον γινώσκοντες
  english_pob_choice: knowing this first
  chosen_spanish: Sabiendo esto primero
  alternatives_spanish:
  - Conociendo esto primero
  - Antes que nada, sepan esto
  lexicon: BDAG
  rationale: La construcción participial se conserva como frase adverbial inicial. «Sabiendo» comunica el valor de γινώσκοντες sin forzar un imperativo, y «primero» mantiene πρῶτον como prioridad, no como simple orden temporal.
- source_word: ἐλεύσονται
  english_pob_choice: will come
  chosen_spanish: vendrán
  alternatives_spanish:
  - vendrán y aparecerán
  - llegarán
  lexicon: BDAG
  rationale: El futuro de ἔρχομαι se expresa de manera natural con «vendrán», que es directo y fiel al valor verbal básico.
- source_word: ἐπ’ ἐσχάτων τῶν ἡμερῶν
  english_pob_choice: in the last days
  chosen_spanish: en los últimos días
  alternatives_spanish:
  - al final de los días
  - en los postreros días
  lexicon: BDAG
  rationale: Se conserva la expresión escatológica convencional sin estrecharla doctrinalmente. «Últimos días» es la equivalencia española más clara y ampliamente inteligible.
- source_word: ἐν ἐμπαιγμονῇ
  english_pob_choice: with scoffing
  chosen_spanish: con burla[a]
  alternatives_spanish:
  - en burla
  - burlándose
  lexicon: BDAG
  rationale: «Burla» comunica el sentido de ἐμπαιγμονή de forma natural en español y permite mantener el juego cognado con «burladores». La nota conserva la alternativa «mockery / mockers will come in mockery» que el audit trail deja abierta.
- source_word: ἐμπαῖκται
  english_pob_choice: scoffers
  chosen_spanish: burladores
  alternatives_spanish:
  - escarnecedores
  - bromistas despectivos
  lexicon: BDAG
  rationale: «Burladores» es claro y fiel al sentido de ἐμπαῖκται. Se prefiere frente a «escarnecedores» por ser más transparente para el lector moderno, sin perder la connotación de desprecio.
- source_word: κατὰ τὰς ἰδίας ἐπιθυμίας αὐτῶν
  english_pob_choice: according to their own desires
  chosen_spanish: según sus propios deseos[b]
  alternatives_spanish:
  - conforme a sus propios deseos
  - según sus propias pasiones
  lexicon: BDAG
  rationale: «Deseos» mantiene el rango semántico amplio de ἐπιθυμία sin reducirlo de antemano a un sentido sexual. «Sus propios» conserva el énfasis de ἰδίας αὐτῶν.
- source_word: πορευόμενοι
  english_pob_choice: walking
  chosen_spanish: andando
  alternatives_spanish:
  - caminando
  - viviendo
  - conduciéndose
  lexicon: BDAG
  rationale: «Andando» conserva la imagen metafórica de conducta o manera de vivir, de modo natural en español. Es una solución equivalente a «walking» sin aplanar el matiz de estilo de vida.
theological_decisions:
- issue: Expresión escatológica «ἐπ’ ἐσχάτων τῶν ἡμερῶν»
  english_pob_reading: in the last days
  chosen_spanish_reading: en los últimos días
  alternative_spanish_readings:
  - al final de los días
  - en los postreros días
  rationale: Se mantiene el lenguaje escatológico en su forma común y no se añade un sistema de cronología final no explicitado en el versículo. La redacción preserva la función de advertencia del texto.
  doctrine_reference: Preservar la tensión teológica sin resolverla; evitar distintivos escatológicos denominacionales cuando el texto no los formula.
translation_notes:
  revision_awareness: 'Coincide con la última revisión aprobada: no se reportan cambios necesarios y el control cruzado muestra alta concordancia. La redacción española conserva la estructura participial, el valor escatológico estándar y el paralelismo cognado entre «burladores» y «burla».'
  spanish_consistency_notes:
  - Se usa «burladores» para ἐμπαῖκται, consistente con un registro bíblico claro y moderno.
  - Se usa «deseos» para ἐπιθυμίας, manteniendo amplitud semántica sin sexualizar indebidamente el término.
  - Se evita «SEÑOR» porque el versículo no contiene el nombre divino ni κύριος.
  - 'La puntuación refleja la apertura explicativa del inglés: dos puntos tras «primero» y coma final para continuidad en la sección.'
