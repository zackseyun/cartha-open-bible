translation:
  language: es
  text: 'y diciendo[a]: «¿Dónde está la promesa de su venida? Porque desde que los padres se durmieron[b], todas las cosas permanecen así, desde el principio de la creación.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «presencia» o «llegada» para παρουσία. En este contexto se refiere al retorno futuro esperado de Cristo.
    reason: lexical_alternative
  - marker: b
    text: «Se durmieron» refleja un eufemismo griego para la muerte.
    reason: lexical_alternative
lexical_decisions:
- source_word: λέγοντες
  english_pob_choice: and saying
  chosen_spanish: y diciendo
  alternatives_spanish:
  - y al decir
  - y diciendo esto
  lexicon: BDAG
  rationale: El participio presente coordinado mantiene la continuidad sintáctica con la descripción anterior. «Y diciendo» conserva el flujo participial sin convertirlo innecesariamente en una forma finita.
- source_word: ἐπαγγελία
  english_pob_choice: promise
  chosen_spanish: promesa
  alternatives_spanish:
  - prometido cumplimiento
  - anuncio
  lexicon: BDAG
  rationale: «Promesa» es la equivalencia directa y natural en español, y expresa aquí la expectativa burlada del retorno del Señor.
- source_word: παρουσίας
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En este contexto escatológico, παρουσία se refiere al retorno esperado de Cristo. «Venida» comunica mejor ese sentido en español que «presencia», que sería demasiado estática.
- source_word: ἀφ’ ἧς
  english_pob_choice: ever since
  chosen_spanish: desde que
  alternatives_spanish:
  - desde el tiempo en que
  - desde que ocurrió
  lexicon: BDAG
  rationale: La expresión marca el punto de partida temporal de una situación continuada. «Desde que» conserva esa fuerza idiomática de manera natural en español.
- source_word: οἱ πατέρες
  english_pob_choice: the fathers
  chosen_spanish: los padres
  alternatives_spanish:
  - nuestros padres
  - los antepasados
  lexicon: BDAG
  rationale: La forma griega tiene artículo pero no posesivo. «Los padres» reproduce con transparencia la expresión del texto y mantiene la referencia a generaciones anteriores.
- source_word: ἐκοιμήθησαν
  english_pob_choice: fell asleep
  chosen_spanish: durmieron
  alternatives_spanish:
  - se durmieron
  - murieron
  lexicon: BDAG
  rationale: κοιμάομαι funciona como eufemismo de muerte. «Durmieron» preserva el recurso metafórico sin eliminar su valor lingüístico; el contexto aclara el sentido.
- source_word: πάντα
  english_pob_choice: all things
  chosen_spanish: todas las cosas
  alternatives_spanish:
  - todo
  - todo esto
  lexicon: BDAG
  rationale: El plural neutro tiene alcance comprehensivo. «Todas las cosas» reproduce ese alcance universal con un registro natural en español.
- source_word: οὕτως
  english_pob_choice: just as they have
  chosen_spanish: así
  alternatives_spanish:
  - de este modo
  - igual
  lexicon: BDAG
  rationale: 'Aquí modifica la idea de permanencia: las cosas siguen en el mismo estado. «Así» conserva la relación con διαμένει sin añadir interpretación excesiva.'
- source_word: διαμένει
  english_pob_choice: continue
  chosen_spanish: permanecen
  alternatives_spanish:
  - continúan
  - persisten
  lexicon: BDAG
  rationale: Aunque el verbo es singular con sujeto neutro plural, el sentido en español requiere concordancia natural. «Permanecen» expresa continuidad estable, muy cercana al argumento de los burladores.
- source_word: ἀπ’ ἀρχῆς κτίσεως
  english_pob_choice: from the beginning of creation
  chosen_spanish: desde el principio de la creación
  alternatives_spanish:
  - desde el comienzo de la creación
  - desde la creación misma
  lexicon: BDAG
  rationale: Es una construcción genitiva simple. «Desde el principio de la creación» es claro, cercano al griego y plenamente idiomático en español.
theological_decisions:
- issue: Sentido de παρουσία en un contexto escatológico
  english_pob_reading: his coming
  chosen_spanish_reading: su venida
  alternative_spanish_readings:
  - su presencia
  - su llegada
  rationale: El contexto trata de la burla sobre el retorno esperado del Señor; por eso παρουσία apunta a la venida futura de Cristo. «Venida» transmite mejor esa carga escatológica en español que «presencia» o «llegada».
  doctrine_reference: Translation philosophy §1, §3
- issue: Eufemismo de muerte en ἐκοιμήθησαν
  english_pob_reading: fell asleep
  chosen_spanish_reading: durmieron
  alternative_spanish_readings:
  - se durmieron
  - murieron
  rationale: El griego usa un eufemismo, no el verbo directo de morir. «Durmieron» conserva la imagen y evita borrar la textura lingüística del original; el contexto deja claro el referente a la muerte.
  doctrine_reference: Translation philosophy §1, §6
translation_notes:
  revision_awareness: 'El pasaje se mantiene en alta concordancia con el texto griego y con el registro del POB inglés. Se preservan las dos tensiones léxicas principales del verso: παρουσία como término escatológico de «venida» y ἐκοιμήθησαν como eufemismo de muerte. No se requieren revisiones respecto del último pase auditado, que marcó acuerdo alto y sin cambios.'
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; aquí no aparece.
  - Se mantiene «venida» para παρουσία en consonancia con el valor escatológico documentado por el POB.
  - Se conserva el paralelismo temporal de «desde que... desde el principio» sin suavizarlo en exceso.
  - «Los padres» sigue la transparencia formal del griego; no se amplía a «antepasados» porque el POB inglés optó por mantener la forma directa.
