translation:
  language: es
  text: Y consideren la paciencia de nuestro Señor como salvación[a], así como también nuestro amado hermano Pablo les escribió conforme a la sabiduría que le fue dada[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "forbearancia"; el sentido es que la demora del Señor está orientada a la salvación, no a la indiferencia.
    reason: lexical_alternative
  - marker: b
    text: La frase "la sabiduría que le fue dada" probablemente implica sabiduría dada por Dios, aunque el griego no nombra explícitamente al agente.
    reason: alternative_reading
lexical_decisions:
- source_word: μακροθυμίαν
  english_pob_choice: patience
  chosen_spanish: paciencia
  alternatives_spanish:
  - longanimidad
  - forbearancia
  lexicon: BDAG
  rationale: μακροθυμία expresa paciencia o demora paciente ante la ofensa o el juicio. En español, "paciencia" comunica de manera natural la idea principal y conserva la relación con la demora del Señor en el contexto inmediato. "Longanimidad" es más técnico y "forbearancia" suena menos natural aquí.
- source_word: σωτηρίαν
  english_pob_choice: salvation
  chosen_spanish: salvación
  alternatives_spanish:
  - liberación
  - rescate
  lexicon: BDAG
  rationale: En este contexto escatológico, σωτηρία no se reduce a un simple rescate momentáneo; conserva su peso teológico de salvación. "Salvación" es el equivalente español más directo y fiel.
- source_word: ἡγεῖσθε
  english_pob_choice: regard
  chosen_spanish: consideren
  alternatives_spanish:
  - tengan por
  - cuenten como
  - reconozcan
  lexicon: BDAG
  rationale: El imperativo medio pide que los lectores evalúen o tengan por algo de cierta manera. "Consideren" comunica bien esa acción mental en español y encaja con la construcción predicativa con "como".
- source_word: κύριος
  english_pob_choice: Lord
  chosen_spanish: Señor
  alternatives_spanish:
  - Dueño
  - Maestro
  lexicon: BDAG
  rationale: Aquí κύριος se refiere a Jesús en el contexto de "nuestro Señor". "Señor" conserva el título cristológico y es la forma natural en español para este uso.
- source_word: ἀγαπητὸς ἡμῶν ἀδελφὸς
  english_pob_choice: beloved brother
  chosen_spanish: nuestro amado hermano
  alternatives_spanish:
  - nuestro querido hermano
  - nuestro hermano amado
  lexicon: BDAG
  rationale: La expresión transmite afecto y vínculo fraternal. "Amado" mantiene la conexión léxica con ἀγαπητός; el orden "nuestro amado hermano" suena natural en español y preserva el tono del original.
- source_word: κατὰ τὴν δοθεῖσαν αὐτῷ σοφίαν
  english_pob_choice: according to the wisdom given to him
  chosen_spanish: conforme a la sabiduría que le fue dada
  alternatives_spanish:
  - según la sabiduría que le fue dada
  - de acuerdo con la sabiduría que recibió
  lexicon: BDAG
  rationale: κατά con acusativo expresa conformidad, por eso "conforme a" es una buena equivalencia. La pasiva "le fue dada" conserva el sentido del griego sin explicitar en el texto principal al agente, que queda implícito.
- source_word: ἔγραψεν ὑμῖν
  english_pob_choice: wrote to you
  chosen_spanish: escribió a ustedes
  alternatives_spanish:
  - les escribió
  - les ha escrito
  lexicon: BDAG
  rationale: El aoristo se puede expresar naturalmente en español con pretérito simple. "Escribió a ustedes" mantiene claridad y un registro bíblico moderno; también evita forzar un presente perfecto.
- source_word: καθὼς καὶ
  english_pob_choice: just as ... also
  chosen_spanish: así como también
  alternatives_spanish:
  - tal como también
  - como también
  lexicon: BDAG
  rationale: La combinación comparativa y aditiva queda bien en español con "así como también", que conserva ambas relaciones sin sonar rígida.
theological_decisions:
- issue: Agente implícito en "la sabiduría que le fue dada"
  english_pob_reading: Retain the passive 'given to him' without explicitly supplying 'by God' in the main text.
  chosen_spanish_reading: Mantener la pasiva "le fue dada" sin decir explícitamente "por Dios" en el texto principal.
  alternative_spanish_readings:
  - la sabiduría que Dios le dio
  - la sabiduría dada por Dios
  rationale: El griego no nombra el agente, aunque el contexto permite inferirlo. La traducción conserva esa reserva para no añadir en el cuerpo del texto lo que está implícito pero no expresado.
  doctrine_reference: Translation philosophy §1, §3
- issue: Relación entre la paciencia del Señor y la salvación
  english_pob_reading: Translate μακροθυμία as 'patience' and σωτηρία as 'salvation,' preserving the theological point that the Lord's delay serves saving ends.
  chosen_spanish_reading: Traducir μακροθυμία como "paciencia" y σωτηρία como "salvación", manteniendo la idea de que la demora del Señor tiene un fin salvífico.
  alternative_spanish_readings:
  - forbearancia ... oportunidad de salvación
  - paciencia ... liberación
  rationale: El versículo no presenta la demora como indiferencia, sino como una paciencia orientada a la salvación. La redacción española conserva esa predicación directa sin expandirla interpretativamente.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente indicó que no se requerían cambios; el borrador español sigue de cerca el griego y el audit trail inglés, sin modificaciones adicionales respecto del sentido base.
  spanish_consistency_notes:
  - Se mantiene "Señor" para κύριος en el sentido cristológico, coherente con el uso doctrinal del proyecto.
  - '"Salvación" conserva el peso teológico de σωτηρία sin reducirlo a mera "liberación".'
  - '"Paciencia" refleja la equivalencia natural de μακροθυμία en español, con nota para la alternativa "forbearancia".'
  - Se preserva la pasiva "le fue dada" para respetar la indeterminación del agente en el griego.
  - Se usa "amado" para ἀγαπητός para mantener la conexión léxica y el tono afectivo del original.
