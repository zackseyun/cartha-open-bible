translation:
  language: es
  text: 'Pero, amados, no pasen por alto esta única cosa[a]: para el Señor, un día es como mil años[b][c], y mil años como un día.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: ''no estén sin saber esta única cosa'' o ''no dejen que esta única cosa se les escape''.'
    reason: lexical_alternative
  - marker: b
    text: El griego usa ὡς, que introduce una comparación; no afirma una igualdad literal.
    reason: theological_note
  - marker: c
    text: Eco de Salmo 90:4.
    reason: cross_reference
lexical_decisions:
- source_word: Ἓν δὲ τοῦτο
  english_pob_choice: this one thing
  chosen_spanish: esto
  alternatives_spanish:
  - esta única cosa
  - este solo asunto
  lexicon: BDAG
  rationale: El neutro singular destaca un punto específico; en español, 'esto' comunica con naturalidad el foco y evita sobrecargar una expresión que luego se explicita con la oración siguiente.
- source_word: μὴ λανθανέτω ὑμᾶς
  english_pob_choice: do not let this one thing escape your notice
  chosen_spanish: no dejen que esto se les escape
  alternatives_spanish:
  - no dejen pasar esto desapercibido
  - no ignoren esto
  - no permanezcan sin saber esto
  lexicon: BDAG
  rationale: λανθάνω aquí expresa que algo pasa inadvertido. 'Se les escape' conserva la idea de algo que no debe pasar desapercibido y suena natural en español sin debilitar el mandato.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: BDAG
  rationale: Como vocativo pastoral para creyentes, 'amados' mantiene el tono afectivo y eclesial. 'Queridos' sonaría más coloquial y menos solemne.
- source_word: παρὰ κυρίῳ
  english_pob_choice: with the Lord
  chosen_spanish: para el Señor
  alternatives_spanish:
  - con el Señor
  - en la presencia del Señor
  - a los ojos del Señor
  lexicon: BDAG
  rationale: παρά con dativo puede señalar relación o perspectiva. 'Para el Señor' preserva la orientación relacional/perspectival y evita fijar indebidamente una sola matiz espacial.
- source_word: μία ἡμέρα ... ὡς χίλια ἔτη
  english_pob_choice: one day is like a thousand years
  chosen_spanish: un día es como mil años
  alternatives_spanish:
  - un día es como mil años para el Señor
  - un día es cual mil años
  lexicon: BDAG
  rationale: ὡς marca comparación, no identidad. 'Es como' reproduce la similtud con claridad y mantiene el paralelismo del griego.
- source_word: καὶ χίλια ἔτη ὡς ἡμέρα μία
  english_pob_choice: and a thousand years like one day
  chosen_spanish: y mil años como un día
  alternatives_spanish:
  - y mil años es como un día
  - y mil años cual un día
  lexicon: BDAG
  rationale: La segunda cola debe conservar el balance de la primera. La omisión de 'es' en español mantiene la tersura y refleja la elipsis del griego.
- source_word: χίλια ἔτη
  english_pob_choice: a thousand years
  chosen_spanish: mil años
  alternatives_spanish:
  - mil años
  - un millar de años
  lexicon: BDAG
  rationale: Expresión cardinal estándar; 'mil años' es la forma directa y transparente en español.
theological_decisions:
- issue: Naturaleza de la comparación temporal
  english_pob_reading: Render the statement as a simile about the Lord's relation to time, not as a literal equation or a prophetic conversion formula.
  chosen_spanish_reading: Presentar la afirmación como símil sobre la relación del Señor con el tiempo, no como ecuación literal ni como fórmula para calcular profecías.
  alternative_spanish_readings:
  - Tratar un día como equivalencia literal de mil años
  - Usar el versículo como clave cronológica para cálculos escatológicos
  rationale: Los dos ὡς señalan analogía. La traducción debe preservar esa comparación sin resolver la tensión teológica ni convertir el texto en un esquema cronológico.
  doctrine_reference: Translation philosophy §3 (Preserve theological tension rather than resolve it)
translation_notes:
  revision_awareness: Se corrigió la validación anterior incorporando los marcadores [a], [b] y [c] directamente en el texto español. No se introdujeron notas sin ancla ni marcadores sin presencia en la traducción.
  spanish_consistency_notes:
  - Se mantiene 'Yahvé' como norma POB cuando corresponda, pero aquí el griego usa κύριος y el contexto auditado de la traducción inglesa elige 'Lord'; en español se conservó 'Señor' por tratarse de una cita relacional establecida y no del nombre divino explícito.
  - Se preserva el paralelismo de las dos cláusulas comparativas.
  - Se evita una lectura de cálculo profético o equivalencia matemática.
