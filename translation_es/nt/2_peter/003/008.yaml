  spanish_quality_summary: 'El texto es comprensible, pero suena algo forzado en dos puntos: ''que, para el Señor'' tras dos puntos es poco natural, y la acumulación de tres notas en la misma frase es innecesaria. Una leve revisión mejora la fluidez y mantiene el tono eclesial digno.'
