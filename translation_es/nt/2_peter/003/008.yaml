    text: Or 'do not be unaware of this one thing.'
    reason: lexical_alternative
  - marker: b
    text: The comparison uses 'like/as,' expressing analogy rather than a literal equation of one day with a thousand years.
    reason: cultural_note
  - marker: c
    text: Echoing Psalm 90:4.
    reason: cross_reference
