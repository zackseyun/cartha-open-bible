    changes_summary: Changed 'with the error' to 'by the error' for a more natural rendering of συναπαχθέντες with the dative, while preserving the verse's meaning and formal register.
translation:
  language: es
  text: Por tanto, ustedes, amados, sabiendo esto de antemano, guárdense, para que no sean arrastrados por el error de los que no tienen ley[b] y caigan de su propia estabilidad[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «su propia firmeza». El griego στηριγμός puede denotar firmeza, estabilidad o constancia.
    reason: lexical_alternative
  - marker: b
    text: O «de los sin ley». ἀθέσμων describe a quienes viven sin someterse a la norma moral de Dios.
    reason: lexical_alternative
lexical_decisions:
- source_word: ὑμεῖς οὖν
  english_pob_choice: Therefore, you
  chosen_spanish: Por tanto, ustedes
  alternatives_spanish:
  - Así que, ustedes
  - Por eso, ustedes
  lexicon: BDAG
  rationale: οὖν introduce una inferencia o conclusión; «Por tanto» mantiene ese valor discursivo. Conservar «ustedes» refleja el énfasis del pronombre explícito ὑμεῖς.
- source_word: ἀγαπητοί
  english_pob_choice: beloved
  chosen_spanish: amados
  alternatives_spanish:
  - amados hermanos
  - queridos
  lexicon: BDAG
  rationale: Es un vocativo afectuoso y pastoral. «Amados» conserva la calidez relacional sin añadir un sustantivo que el griego no expresa aquí.
- source_word: προγινώσκοντες
  english_pob_choice: knowing this beforehand
  chosen_spanish: sabiendo esto de antemano
  alternatives_spanish:
  - conociéndolo de antemano
  - estando prevenidos
  lexicon: BDAG
  rationale: El participio comunica conocimiento previo/advertencia anticipada. «Sabiendo esto de antemano» es natural en español y conserva la fuerza temporal.
- source_word: φυλάσσεσθε
  english_pob_choice: guard yourselves
  chosen_spanish: guárdense
  alternatives_spanish:
  - manténganse en guardia
  - cuídense
  lexicon: BDAG
  rationale: El imperativo medio pide vigilancia activa y reflexiva. «Guárdense» reproduce esa fuerza de autoprotección mejor que una paráfrasis más libre.
- source_word: τῇ τῶν ἀθέσμων πλάνῃ
  english_pob_choice: by the error of the lawless
  chosen_spanish: por el error de los inicuos
  alternatives_spanish:
  - por el error de los anárquicos
  - por el engaño de los inicuos
  - por el error de los impíos
  lexicon: BDAG
  rationale: πλάνη puede ser «error» o «engaño»; aquí el sentido moral-inteligente favorece «error». ἀθέσμων apunta a los que no se someten a norma moral; «inicuos» comunica bien esa idea en español sin sonar artificial. Se mantiene la lectura instrumental/agencial con «por».
- source_word: συναπαχθέντες
  english_pob_choice: being carried away by
  chosen_spanish: sean arrastrados
  alternatives_spanish:
  - sean llevados junto con ellos
  - sean llevados de la mano
  lexicon: BDAG
  rationale: El participio pasivo compuesto expresa ser arrastrados junto con otros por una influencia. «Sean arrastrados» preserva la imagen de desplazamiento forzado sin ampliar el sentido.
- source_word: ἐκπέσητε
  english_pob_choice: fall from
  chosen_spanish: caigan de
  alternatives_spanish:
  - caigan fuera de
  - pierdan
  lexicon: BDAG
  rationale: ἐκπίπτω significa literalmente caer de/fuera de. «Caigan de» preserva la metáfora y evita especificar más de lo que el griego dice.
- source_word: τοῦ ἰδίου στηριγμοῦ
  english_pob_choice: your own stability
  chosen_spanish: su propia firmeza
  alternatives_spanish:
  - su propia estabilidad
  - su propio firme sostén
  - su propia solidez
  lexicon: BDAG
  rationale: στηριγμός puede denotar firmeza, estabilidad o firme posición. «Firmeza» suena natural y mantiene la imagen de estabilidad sin perder la abstracción del sustantivo; «su propia» conserva el énfasis posesivo de ἰδίου.
theological_decisions:
- issue: Si ἐκπέσητε debe sugerir pérdida de salvación, apostasía o simplemente pérdida de firmeza
  english_pob_reading: Rendered neutrally as 'fall from your own stability' without specifying apostasy.
  chosen_spanish_reading: Traducido de forma neutral como «caigan de su propia firmeza», sin especificar apostasía.
  alternative_spanish_readings:
  - caigan lejos de su firmeza
  - abandonen su firmeza
  - caigan de la fe
  rationale: La advertencia habla de ser arrastrados por el error y de caer de una posición firme, pero la forma verbal no obliga a concluir una doctrina específica sobre perseverancia o apostasía. Se preserva la tensión teológica sin resolverla artificialmente.
  doctrine_reference: Preservar la tensión teológica del texto sin resolverla de antemano.
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión más reciente del inglés POB, que ajustó la relación de συναπαχθέντες con la dative a «by the error» por naturalidad. En español se reflejó con «por el error», manteniendo el matiz instrumental/agencial sin cargar la frase con más interpretación de la necesaria.
  spanish_consistency_notes:
  - Se usó «Yahvé» solo cuando el texto fuente lo requiera; aquí no aparece ninguna forma del nombre divino.
  - Se evitó «Mesías/Cristo» porque el versículo no contiene ese campo léxico.
  - «Inicuos» traduce ἀθέσμων con un registro bíblico-natural en español y conserva el matiz moral de ilegalidad o sin ley.
  - «Firmeza» se eligió por fluidez y por corresponder al rango semántico de στηριγμός; «estabilidad» queda como alternativa reconocida en la nota.
  - La puntuación separa claramente el participio causal/temporal de la cláusula final para reflejar la sintaxis griega sin endurecerla.
