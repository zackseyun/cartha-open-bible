  glossary_alignment: No hay términos del glosario principal comprometidos aquí (Yahvé, Mesías, etc.). La cuestión terminológica central es ἀθέσμων, donde el borrador se aparta del razonamiento POB al elegir «inicuos» en vez de una forma que preserve el matiz de ‘sin ley/lawless’. También conviene preservar la neutralidad teológica de ἐκπέσητε con «caigan de», no «aparten/caigan de la fe».
