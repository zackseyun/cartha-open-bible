  to: Por tanto, ustedes, amados, sabiendo esto de antemano, guárdense, para que no sean arrastrados por el error de los que no tienen ley[b] y caigan de su propia estabilidad[a].
  rationale: 'Se corrigió la colocación de las notas para alinearlas con el expediente POB: la nota [a] ahora acompaña a «estabilidad», que es donde el inglés documenta la alternativa lexical para στηριγμός. También se sustituyó «inicuos» por «los que no tienen ley» para reflejar mejor ἀθέσμων y la justificación auditada (‘lawless’), manteniendo un español claro y ampliamente legible. Se conservó «caigan de» para no hacer la advertencia más teológicamente específica de lo que exige el griego.'
