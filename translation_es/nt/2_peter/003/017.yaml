  source_alignment_summary: 'El borrador sigue bien el sentido general del griego: mantiene la inferencia de οὖν, el vocativo afectuoso, el conocimiento previo, el imperativo reflexivo de vigilancia, el peligro de ser arrastrados por el error y la advertencia de no caer de una posición firme. Sin embargo, hay dos desajustes importantes con el rastro POB: (1) la nota [a] fue anclada a «Por tanto», pero la nota inglesa [a] corresponde a στηριγμός (‘stability/steadfastness’), no a οὖν; y (2) «inicuos» para ἀθέσμων debilita la razón léxica documentada (‘lawless’ = los que no se someten a la norma), por lo que conviene un término español más cercano a ‘sin ley’.'
