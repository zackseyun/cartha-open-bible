translation:
  language: es
  text: Pero los cielos y la tierra actuales están reservados por la misma palabra, guardados para fuego hasta el día de juicio y destrucción de hombres impíos[a].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de personas impías»; el griego usa un plural masculino que puede funcionar de modo representativo para la humanidad en general.
    reason: lexical_alternative
lexical_decisions:
- source_word: οἱ δὲ νῦν οὐρανοὶ καὶ ἡ γῆ
  english_pob_choice: But the present heavens and earth
  chosen_spanish: Pero los cielos y la tierra presentes
  alternatives_spanish:
  - Pero los cielos y la tierra que ahora existen
  - Y los cielos y la tierra presentes
  lexicon: SBLGNT; BDAG
  rationale: δὲ introduce contraste, por eso se traduce con «Pero». νῦν señala el orden creado actual, frente al mundo anterior del contexto inmediato. Se conserva el plural «cielos» para οὐρανοί y «tierra» para γῆ.
- source_word: τῷ αὐτῷ λόγῳ
  english_pob_choice: by the same word
  chosen_spanish: por la misma palabra
  alternatives_spanish:
  - por esa misma palabra
  - mediante la misma palabra
  lexicon: SBLGNT; BDAG
  rationale: El dativo funciona instrumentalmente; «por» comunica bien la acción eficaz de la palabra divina. «La misma» mantiene el valor anafórico de αὐτῷ respecto de la palabra ya mencionada en el contexto.
- source_word: τεθησαυρισμένοι εἰσὶν
  english_pob_choice: are stored up
  chosen_spanish: están reservados
  alternatives_spanish:
  - están almacenados
  - han sido reservados
  lexicon: SBLGNT; BDAG
  rationale: El perfecto perifrástico expresa un estado presente resultante de una acción previa. «Reservados» reproduce bien la idea de estar guardados para un fin futuro y evita redundancia con «guardados» en la siguiente expresión.
- source_word: πυρὶ τηρούμενοι
  english_pob_choice: being kept for fire
  chosen_spanish: guardados para fuego
  alternatives_spanish:
  - mantenidos para fuego
  - reservados para fuego
  lexicon: SBLGNT; BDAG
  rationale: τηρέω aquí expresa guardar/preservar con referencia al fuego como destino o ámbito de juicio. Se evita «el fuego» porque el griego no lleva artículo; «para fuego» conserva la construcción breve y la fuerza de juicio ígneo.
- source_word: εἰς ἡμέραν κρίσεως
  english_pob_choice: until the day of judgment
  chosen_spanish: hasta el día de juicio
  alternatives_spanish:
  - para el día de juicio
  - hasta el día del juicio
  lexicon: SBLGNT; BDAG
  rationale: εἰς con valor temporal se vierte naturalmente con «hasta». Se mantiene «día de juicio» sin añadir artículo innecesario, siguiendo la concisión del griego.
- source_word: καὶ ἀπωλείας
  english_pob_choice: and destruction
  chosen_spanish: y destrucción
  alternatives_spanish:
  - y ruina
  - y perdición
  lexicon: SBLGNT; BDAG
  rationale: ἀπώλεια denota destrucción, ruina o pérdida total. «Destrucción» es la equivalencia más clara en español moderno y encaja con el contexto judicial.
- source_word: τῶν ἀσεβῶν ἀνθρώπων
  english_pob_choice: of ungodly men
  chosen_spanish: de hombres impíos
  alternatives_spanish:
  - de personas impías
  - de seres humanos impíos
  lexicon: SBLGNT; BDAG
  rationale: ἀσεβής se traduce con «impíos», término bíblico claro para falta de reverencia hacia Dios. Se conserva el masculino plural «hombres» porque ἀνθρώπων está en forma masculina y puede funcionar representativamente para la humanidad; esta elección mantiene la huella formal del griego.
theological_decisions:
- issue: Destino de los cielos y la tierra en el fuego futuro
  english_pob_reading: The verse speaks of the present heavens and earth being kept for a future fiery judgment, without specifying in this verse whether that entails annihilation or transformative renewal.
  chosen_spanish_reading: El versículo afirma que los cielos y la tierra presentes están reservados para un juicio futuro por fuego, pero no especifica aquí si eso implica aniquilación total o una renovación transformadora.
  alternative_spanish_readings:
  - aniquilación cósmica completa
  - transformación purificadora de la creación
  rationale: La formulación griega sostiene con claridad el juicio escatológico, pero el sujeto explícito de «destrucción» son los hombres impíos, no necesariamente los cielos y la tierra en el mismo sentido. Por eso la traducción conserva la tensión y no resuelve más de lo que el texto dice.
  doctrine_reference: Preservar la tensión teológica del texto sin resolver un debate doctrinal mayor.
translation_notes:
  revision_awareness: El texto español sigue la revisión más reciente del POB en inglés al evitar un artículo innecesario en la pareja «cielos y tierra». No se introdujeron cambios doctrinales; se mantuvo la distinción entre «reservados» y «guardados» para reflejar dos verbos griegos relacionados pero no idénticos.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando el texto lo requiera explícitamente; este versículo no lo contiene.
  - «Impíos» se mantiene como equivalente estable de ἀσεβής en contexto judicial.
  - «Fuego» queda sin artículo para respetar el anartro del griego.
  - La puntuación separa con comas las dos descripciones participiales, siguiendo la sintaxis del original.
