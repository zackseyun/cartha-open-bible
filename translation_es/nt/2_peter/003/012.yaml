translation:
  language: es
  text: mientras esperan y apresuran la venida del día de Dios[a], a causa de ese día los cielos, siendo incendiados, serán deshechos, y los elementos, ardiendo[b], se derretirán.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «esperan con ansia la venida del día de Dios». El verbo griego puede significar tanto «apresurar» como «estar deseando con fervor».
    reason: alternative_reading
  - marker: b
    text: «Elementos» puede referirse a los componentes básicos del mundo, o quizá a los cuerpos celestes.
    reason: lexical_alternative
lexical_decisions:
- source_word: προσδοκῶντας
  english_pob_choice: wait for
  chosen_spanish: esperáis
  alternatives_spanish:
  - aguardáis
  - esperáis con anticipación
  lexicon: BDAG
  rationale: El participio presente retoma la exhortación y en español se expresa con un verbo natural de expectativa continua. «Esperáis» conserva el matiz de anticipación expectante sin volver la frase pesada.
- source_word: σπεύδοντας
  english_pob_choice: hasten
  chosen_spanish: apresuráis
  alternatives_spanish:
  - aceleráis
  - os apresuráis
  - anheláis
  lexicon: BDAG
  rationale: El griego permite la idea de apresurar activamente la llegada. «Apresuráis» mantiene esa fuerza causal en la línea principal, mientras que la lectura alternativa de anhelar/esperar con fervor queda preservada en la nota.
- source_word: παρουσίαν
  english_pob_choice: coming
  chosen_spanish: venida
  alternatives_spanish:
  - presencia
  - llegada
  lexicon: BDAG
  rationale: En contexto escatológico, «venida» es el equivalente español más claro y natural para παρουσία, conservando el sentido de arribo/manifestación futura.
- source_word: τῆς τοῦ θεοῦ ἡμέρας
  english_pob_choice: the day of God
  chosen_spanish: el día de Dios
  alternatives_spanish:
  - el día de Dios mismo
  - el día que pertenece a Dios
  lexicon: BDAG
  rationale: Se conserva la expresión inusual de manera formal y transparente. No se sustituye por «del Señor» porque el griego dice «de Dios» y la distinción tiene valor textual.
- source_word: δι’ ἣν
  english_pob_choice: because of which
  chosen_spanish: por causa del cual
  alternatives_spanish:
  - a causa del cual
  - por el cual
  lexicon: BDAG
  rationale: La construcción causal se expresa de forma clara en español y mantiene la relación entre el día de Dios y la disolución cósmica siguiente.
- source_word: οὐρανοὶ
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos del universo
  - los cielos celestiales
  lexicon: BDAG
  rationale: En plural, el término apunta al ámbito cósmico/astral. «Los cielos» respeta el plural y es la forma más idiomática en español sin reducirlo a «cielo» singular.
- source_word: πυρούμενοι
  english_pob_choice: being set on fire
  chosen_spanish: siendo puestos en fuego
  alternatives_spanish:
  - ardiendo
  - siendo incendiados
  lexicon: BDAG
  rationale: Se conserva el matiz pasivo/procesual del participio. «Siendo puestos en fuego» suena más literal, pero sigue siendo entendible; evita transformar de antemano el proceso en un simple adjetivo.
- source_word: λυθήσονται
  english_pob_choice: will be dissolved
  chosen_spanish: serán deshechos
  alternatives_spanish:
  - serán disueltos
  - serán desintegrados
  lexicon: BDAG
  rationale: «Deshechos» comunica la idea de desatado/abrogado/disuelto sin imponer una metafísica de aniquilación. Conserva la tensión del griego de quedar descompuestos o desanudados por el fuego.
- source_word: στοιχεῖα
  english_pob_choice: the elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - los cuerpos celestes
  - los principios elementales
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad controlada del término, evitando especificar más de lo que permite el texto. «Los elementos» preserva la amplitud semántica reconocida por la POB inglesa.
- source_word: καυσούμενα
  english_pob_choice: burning
  chosen_spanish: ardiendo
  alternatives_spanish:
  - quemándose
  - en combustión
  lexicon: BDAG
  rationale: El participio expresa estar en proceso de quemarse/arder. «Ardiendo» es natural, breve y mantiene la relación con el fuego sin forzar un tecnicismo.
- source_word: τήκεται
  english_pob_choice: will melt
  chosen_spanish: se derretirán
  alternatives_spanish:
  - se fundirán
  - se derretirán por el calor
  lexicon: BDAG
  rationale: Se refleja el futuro del contexto y la imagen de licuefacción por calor. «Se derretirán» es claro en español y comunica la metáfora física del griego.
theological_decisions:
- issue: 'σπεύδοντας τὴν παρουσίαν: ¿apresurar o esperar con ansia?'
  english_pob_reading: hasten / eagerly await
  chosen_spanish_reading: apresuráis / esperáis con anticipación
  alternative_spanish_readings:
  - anheláis la venida
  - deseáis intensamente la venida
  rationale: El griego admite tanto la idea de apresurar la llegada como la de desearla fervientemente. La línea principal conserva la lectura de «apresuráis», pero la nota presenta la alternativa de espera ansiosa para no cerrar indebidamente la tensión interpretativa.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
- issue: 'στοιχεῖα: referente cósmico o principios elementales'
  english_pob_reading: the elements
  chosen_spanish_reading: los elementos
  alternative_spanish_readings:
  - los cuerpos celestes
  - los principios elementales
  rationale: El término es debatido en contexto apocalíptico. La traducción mantiene la ambigüedad del original y evita imponer una cosmología específica o una lectura filosófica no explícita.
  doctrine_reference: DOCTRINE.md Translation philosophy §3
translation_notes:
  revision_awareness: La redacción sigue el texto griego SBLGNT y toma en cuenta el audit trail inglés de la POB. Se conserva la decisión revisada en inglés de futuro para τήκεται mediante «se derretirán», y se mantiene la nota de alternativa para σπεύδοντας y la ambigüedad de στοιχεῖα. No se fuerza una equivalencia con «SEÑOR» porque el griego dice explícitamente «de Dios».
  spanish_consistency_notes:
  - Se usa «Dios» y no una perífrasis devocional, para conservar la forma explícita del original.
  - Se prefiere «venida» para παρουσία en un contexto escatológico.
  - Se mantiene el plural «cielos» para οὐρανοί.
  - Las notas usan marcadores únicos y están ancladas solo donde el texto los requiere.
