translation:
  language: es
  text: Pero el día de Yahvé vendrá como ladrón, en el cual los cielos pasarán con estruendo, y los elementos[a], al arder, serán disueltos[c][b], y la tierra y las obras en ella serán halladas.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «los cuerpos celestes» para «los elementos» (στοιχεῖα); el término puede referirse aquí más específicamente a los componentes del cosmos.
    reason: lexical_alternative
  - marker: b
    text: Algunos entienden «serán halladas» como «serán puestas de manifiesto» o «serán expuestas».
    reason: alternative_reading
  - marker: c
    text: Muchos manuscritos leen «serán quemadas» en lugar de «serán halladas».
    reason: textual_variant
lexical_decisions:
- source_word: ἥξει
  english_pob_choice: will come
  chosen_spanish: vendrá
  alternatives_spanish:
  - llegará
  lexicon: BDAG
  rationale: El futuro de ἥκω expresa llegada/venida. «Vendrá» es natural en español y conserva el valor escatológico del sujeto «el día de Yahvé».
- source_word: ἡμέρα κυρίου
  english_pob_choice: the day of the Lord
  chosen_spanish: el día de Yahvé
  alternatives_spanish:
  - el día del Señor
  lexicon: BDAG
  rationale: Se sigue el criterio del proyecto para יהוה/YHWH como «Yahvé». En este contexto no se trata de una simple fórmula devocional, sino del día escatológico asociado a la intervención divina; por eso se evita la máscara «SEÑOR».
- source_word: κλέπτης
  english_pob_choice: a thief
  chosen_spanish: ladrón
  alternatives_spanish:
  - un ladrón
  lexicon: BDAG
  rationale: La comparación subraya la llegada inesperada. En español, «como ladrón» es idiomático y reproduce la fuerza proverbial del griego.
- source_word: οἱ οὐρανοί
  english_pob_choice: the heavens
  chosen_spanish: los cielos
  alternatives_spanish:
  - los cielos
  - los cielos celestes
  lexicon: BDAG
  rationale: «Cielos» conserva el plural griego y su alcance cósmico. «Los cielos» es más natural en español que «los heavens» calco o «el cielo» en singular.
- source_word: ῥοιζηδόν
  english_pob_choice: with a roar
  chosen_spanish: con estruendo
  alternatives_spanish:
  - con un rugido
  - con un gran ruido
  lexicon: BDAG
  rationale: El adverbio indica un sonido fuerte, violento y repentino. «Con estruendo» comunica bien el efecto auditivo sin forzar una imagen animal como «rugido».
- source_word: παρελεύσονται
  english_pob_choice: will pass away
  chosen_spanish: pasarán
  alternatives_spanish:
  - pasarán de largo
  - desaparecerán
  lexicon: BDAG
  rationale: En este contexto escatológico, el verbo implica desaparición o paso de la creación actual. «Pasarán» mantiene la imagen básica y es compatible con la fórmula bíblica «pasar» en juicio cósmico.
- source_word: στοιχεῖα
  english_pob_choice: the elements
  chosen_spanish: los elementos
  alternatives_spanish:
  - los cuerpos celestes
  - los componentes del cosmos
  lexicon: BDAG
  rationale: Se conserva la opción más sobria y restringida adoptada por el POB inglés. No se especifica más de lo que el texto permite; por eso se mantiene «los elementos».
- source_word: καυσούμενα
  english_pob_choice: being burned
  chosen_spanish: al arder
  alternatives_spanish:
  - mientras arden
  - siendo quemados
  lexicon: BDAG
  rationale: El participio expresa el estado/proceso concurrente con la disolución. «Al arder» suena natural en español y evita introducir un agente que el griego no menciona.
- source_word: λυθήσεται
  english_pob_choice: will be dissolved
  chosen_spanish: serán deshechos
  alternatives_spanish:
  - serán disueltos
  - se desharán
  lexicon: BDAG
  rationale: λύω aquí apunta a descomposición, desatadura o disolución de la estructura cósmica. «Serán deshechos» comunica bien esa idea sin reducirla a mera destrucción ni suavizarla excesivamente.
- source_word: γῆ
  english_pob_choice: the earth
  chosen_spanish: la tierra
  alternatives_spanish:
  - la tierra
  - la tierra firme
  lexicon: BDAG
  rationale: Dado el marco cósmico del versículo, «la tierra» es la correspondencia natural y clara en español.
- source_word: τὰ ἐν αὐτῇ ἔργα
  english_pob_choice: the works in it
  chosen_spanish: las obras en ella
  alternatives_spanish:
  - las obras de ella
  - lo que en ella se ha hecho
  lexicon: BDAG
  rationale: «ἔργα» puede abarcar obras/hechos/hechos realizados. «Las obras en ella» sigue de cerca el griego y permite retener la ambigüedad entre las cosas hechas en la tierra y las obras humanas.
- source_word: εὑρεθήσεται
  english_pob_choice: will be found
  chosen_spanish: serán halladas
  alternatives_spanish:
  - serán puestas de manifiesto
  - serán descubiertas
  lexicon: BDAG
  rationale: Se conserva la lectura difícil y textual del griego con una pasiva española directa. «Serán halladas» refleja εὑρίσκω sin cerrar la tensión interpretativa.
theological_decisions:
- issue: Lectura del final de la cláusula καὶ γῆ καὶ τὰ ἐν αὐτῇ ἔργα εὑρεθήσεται
  english_pob_reading: Keep the difficult reading 'the earth and the works in it will be found' in the main text, with footnotes for exposure/burned-up alternatives and the textual variant.
  chosen_spanish_reading: Mantener en el texto principal «la tierra y las obras en ella serán halladas», con notas para «serán puestas de manifiesto» y para la variante «serán quemadas».
  alternative_spanish_readings:
  - la tierra y las obras en ella serán puestas de manifiesto
  - la tierra y las obras en ella serán quemadas
  rationale: El griego transmitido dice εὑρεθήσεται, cuya traducción más directa es «serán halladas». Como la frase es difícil y discutida, se preserva la lectura dura en el texto principal en vez de resolverla doctrinalmente o armonizarla de antemano.
  doctrine_reference: Translation philosophy §§1, 3
- issue: Sentido de στοιχεῖα
  english_pob_reading: Translate as 'the elements' without specifying physical elements or heavenly bodies.
  chosen_spanish_reading: Traducir como «los elementos» sin especificar si se trata de elementos físicos o de cuerpos celestes.
  alternative_spanish_readings:
  - los cuerpos celestes
  - los componentes básicos del universo
  rationale: El término admite más de un alcance en contexto. Para no sobredeterminar la imagen, el texto principal conserva la amplitud del original y deja abiertas las alternativas interpretativas.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el veredicto de concordancia fue de alta coincidencia con solo observaciones menores, por lo que se mantiene una formulación conservadora y textual, especialmente en στοιχεῖα y en la lectura final difícil.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» según el estándar del proyecto para el nombre divino, evitando la máscara «SEÑOR».
  - Se conserva el plural cósmico «los cielos» para οὐρανοί.
  - «Los elementos» retiene la amplitud semántica del POB inglés y no se sustituye por un término más interpretativo en el texto principal.
  - La pasiva final «serán halladas» preserva la dificultad del griego y la tensión textual documentada.
  - 'La colocación de las notas sigue el orden solicitado: a para la alternativa léxica, b para la lectura alternativa, c para la variante textual.'
