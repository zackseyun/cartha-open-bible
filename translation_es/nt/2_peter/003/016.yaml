    rationale: Esto contradice el origen griego y el rastro de auditoría inglés. La alternativa «las otras Escrituras» corresponde a τὰς λοιπὰς γραφὰς, no a ἐπιστολαῖς.
  - severity: high
    issue: La nota [b] repite erróneamente «las otras Escrituras» en lugar de dar la alternativa para ἀμαθεῖς.
    rationale: El inglés preserva la alternativa «untaught» para «ignorant». En español debe reflejarse como «sin instrucción», «indoctos» u otra opción equivalente, no duplicar otra nota.
  - severity: medium
    issue: La secuencia de notas [c][b] es aceptable técnicamente, pero quedó asociada a un conjunto de contenidos desordenados.
    rationale: Aunque el orden visual puede mantenerse si las notas corresponden al mismo segmento, aquí la desalineación de contenido vuelve confuso el aparato. Conviene reordenar el contenido para que cada marcador explique el término correcto.
  - severity: low
