translation:
  language: es
  text: como también en todas sus cartas, hablando en ellas acerca de estas cosas. En ellas hay algunas cosas difíciles de entender, que los ignorantes[e] e inestables tuercen[c], como también las demás Escrituras[a], para su propia destrucción.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «las otras Escrituras». El griego puede significar tanto «el resto» como «las otras», aunque «las demás Escrituras» encaja mejor con la comparación que se está haciendo.
    reason: lexical_alternative
  - marker: c
    text: O «distorsionan» para «tuercen».
    reason: lexical_alternative
  - marker: e
    text: O «sin instrucción» para «ignorantes».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐπιστολαῖς
  english_pob_choice: letters
  chosen_spanish: cartas
  alternatives_spanish:
  - epístolas
  lexicon: BDAG
  rationale: «Cartas» es el equivalente español más natural y actual para ἐπιστολαῖς, y conserva el sentido de correspondencia escrita sin cargar un matiz eclesiástico o técnico que «epístolas» puede tener en español.
- source_word: λαλῶν
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - diciendo
  - escribiendo
  lexicon: BDAG
  rationale: El participio griego significa literalmente «hablando». En contexto se refiere a lo que comunica en sus cartas; «hablando» conserva la forma del original sin forzar una paráfrasis hacia «escribiendo».
- source_word: περὶ τούτων
  english_pob_choice: about these things
  chosen_spanish: acerca de estas cosas
  alternatives_spanish:
  - sobre estas cosas
  - acerca de estos asuntos
  lexicon: BDAG
  rationale: «Acerca de estas cosas» mantiene el referente demostrativo inmediato y reproduce con naturalidad el valor de περί + genitivo en español.
- source_word: δυσνόητά τινα
  english_pob_choice: some things hard to understand
  chosen_spanish: algunas cosas difíciles de entender
  alternatives_spanish:
  - algunas cosas difíciles de comprender
  - ciertas cosas difíciles de entender
  lexicon: BDAG
  rationale: La combinación conserva tanto el indefinido τινα («algunas») como el valor de δυσνόητα («difíciles de entender»). «Entender» es idiomático y claro en español.
- source_word: ἀμαθεῖς
  english_pob_choice: ignorant
  chosen_spanish: ignorantes
  alternatives_spanish:
  - sin instrucción
  - incultos
  lexicon: BDAG
  rationale: «Ignorantes» reproduce bien el sentido de falta de conocimiento o instrucción. Evita restringirlo a falta de escolaridad formal, como también ocurre en la decisión inglesa.
- source_word: ἀστήρικτοι
  english_pob_choice: unstable
  chosen_spanish: inestables
  alternatives_spanish:
  - inconstantes
  - no firmes
  lexicon: BDAG
  rationale: «Inestables» refleja con naturalidad la imagen de falta de firmeza doctrinal o moral, en paralelo con la decisión inglesa «unstable».
- source_word: στρεβλοῦσιν
  english_pob_choice: twist
  chosen_spanish: tuercen
  alternatives_spanish:
  - distorsionan
  - retuercen
  lexicon: BDAG
  rationale: «Tuercen» conserva la metáfora vívida de forzar o retorcer el sentido del texto. Es la correspondencia más directa y expresiva para στρεβλοῦσιν.
- source_word: τὰς λοιπὰς γραφὰς
  english_pob_choice: the rest of the Scriptures
  chosen_spanish: las demás Escrituras
  alternatives_spanish:
  - las otras Escrituras
  - el resto de las Escrituras
  lexicon: BDAG
  rationale: «Las demás Escrituras» comunica de forma natural la idea de λοιπὰς como «las restantes» y mantiene γραφαί como Escrituras. En español, esta opción evita la posible ambigüedad de «el resto de las Escrituras» sin perder el contraste con las cartas de Pablo.
- source_word: ἀπώλειαν
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: «Destrucción» es la traducción más clara y sobria, y preserva el resultado grave del texto sin introducir un matiz técnico adicional que el griego no exige.
theological_decisions:
- issue: Posible agrupación de las cartas de Pablo con las Escrituras
  english_pob_reading: Rendered as 'the rest of the Scriptures,' preserving the natural implication that Paul's letters are grouped alongside other scriptural writings.
  chosen_spanish_reading: «Las demás Escrituras», preservando de manera natural la comparación entre las cartas de Pablo y el conjunto de los escritos reconocidos como Escrituras.
  alternative_spanish_readings:
  - los otros escritos
  - las demás escrituras
  rationale: El griego usa γραφαί, que normalmente designa Escrituras, y λοιπάς, que sugiere continuidad con un conjunto ya reconocido. La traducción debe dejar visible esa tensión sin convertirla en una afirmación doctrinal más fuerte que el texto mismo.
  doctrine_reference: Affirmations; Translation philosophy 1 and 3
translation_notes:
  revision_awareness: 'No se requirieron cambios respecto del pase más reciente: la solución sigue alta y el análisis de revisión indicó concordancia alta con solo observaciones menores.'
  spanish_consistency_notes:
  - Se mantuvo «cartas» en lugar de «epístolas» para un español más natural y coherente con el registro moderno de la serie.
  - Se conservó «Escrituras» con mayúscula para reflejar el valor canónico del sustantivo griego en este contexto.
  - Se eligieron formas plurales naturales («las demás Escrituras», «los ignorantes y los inestables») para mantener la sintaxis española fluida sin perder el paralelo del original.
