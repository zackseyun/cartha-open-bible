translation:
  language: es
  text: Amados, esta es ya la segunda carta que les escribo; en ambas[a] estoy avivando su mente sincera[b] a modo de recordatorio,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «en ellas»; el griego está en plural y se refiere de la manera más natural a ambas cartas.
    reason: alternative_reading
  - marker: b
    text: O «su mente pura»; εἰλικρινῆ puede llevar el matiz de pureza o sinceridad.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἀγαπητοί
  english_pob_choice: Beloved
  chosen_spanish: Amados
  alternatives_spanish:
  - Queridos
  - Amados míos
  - Amados hermanos
  lexicon: BDAG
  rationale: El vocativo plural expresa afecto fuerte y tono epistolar solemne. «Amados» conserva esa fuerza mejor que una fórmula más coloquial. Se mantiene la marca de pluralidad implícita en el contexto.
- source_word: Ταύτην ἤδη ... δευτέραν ... ἐπιστολήν
  english_pob_choice: this is now the second letter
  chosen_spanish: esta es ya la segunda carta que les escribo
  alternatives_spanish:
  - esta ya es la segunda carta
  - esta es ahora la segunda carta
  lexicon: BDAG
  rationale: El griego reorganiza naturalmente en español como una cláusula identificadora. «Ya» refleja ἤδη en sentido discursivo, y «que les escribo» hace explícita la relación epistolar del original sin añadir contenido extraño.
- source_word: γράφω
  english_pob_choice: I am writing
  chosen_spanish: les escribo
  alternatives_spanish:
  - estoy escribiéndoles
  - escribo
  lexicon: BDAG
  rationale: El presente epistolar griego puede rendirse de forma natural en español con presente simple. «Les escribo» es más idiomático y sobrio que un progresivo forzado.
- source_word: ἐν αἷς
  english_pob_choice: in both of them
  chosen_spanish: en ambas
  alternatives_spanish:
  - en las cuales
  - en ellas
  lexicon: BDAG
  rationale: El relativo plural femenino se refiere con naturalidad a las dos cartas. «En ambas» evita ambigüedad y conserva el plural del antecedente, como en la nota inglesa.
- source_word: διεγείρω
  english_pob_choice: I am stirring up
  chosen_spanish: estoy despertando
  alternatives_spanish:
  - estoy agitando
  - estoy avivando
  - estoy removiendo
  lexicon: BDAG
  rationale: El verbo sugiere provocar atención o reanimar de la pasividad. «Despertando» preserva la imagen de arrebatar de la inercia sin cargarla con matices negativos de «agitar».
- source_word: ἐν ὑπομνήσει
  english_pob_choice: by way of reminder
  chosen_spanish: mediante el recordatorio
  alternatives_spanish:
  - por medio del recordatorio
  - como recordatorio
  - con un recordatorio
  lexicon: BDAG
  rationale: La frase indica medio o modo. «Mediante el recordatorio» mantiene la relación instrumental sin volverlo una paráfrasis excesiva. «Recordatorio» conserva la función memorial del sustantivo griego.
- source_word: εἰλικρινῆ διάνοιαν
  english_pob_choice: your sincere mind
  chosen_spanish: su mente sincera
  alternatives_spanish:
  - su mente pura
  - su entendimiento sincero
  - su manera sincera de pensar
  lexicon: BDAG
  rationale: διάνοια puede ser mente, entendimiento o forma de pensar; εἰλικρινής apunta a sinceridad/pureza probada. «Mente sincera» conserva esa tensión y sigue siendo natural en español. Se evita «pura» como opción principal porque puede estrechar indebidamente el matiz moral-intencional.
- source_word: ὑμῶν
  english_pob_choice: your
  chosen_spanish: su
  alternatives_spanish:
  - de ustedes
  - vuestro
  lexicon: BDAG
  rationale: En español bíblico latinoamericano, el posesivo de tercera plural «su» es la forma más neutral y natural para un destinatario plural. El contexto ya desambigua la referencia.
theological_decisions:
- issue: Referencia del relativo plural ἐν αἷς
  english_pob_reading: Refiere a ambas cartas, no solo a la carta presente.
  chosen_spanish_reading: «En ambas» conserva que el relativo apunta a las dos cartas mencionadas.
  alternative_spanish_readings:
  - «en la cual» podría hacer pensar en una sola carta
  - «en ellas» es posible pero algo menos explícito
  rationale: La lectura más directa del plural griego es referir el relativo a las dos cartas. El español debe mantener esa pluralidad sin oscurecerla. Por eso se evita singularizar la frase.
  doctrine_reference: Principios POB de transparencia textual y fidelidad al antecedente inmediato
- issue: 'εἰλικρινῆ διάνοιαν: sinceridad moral e intelectual'
  english_pob_reading: sincere mind / pure mind
  chosen_spanish_reading: «mente sincera» preserva el valor moral e intelectual sin reducirlo a una sola idea.
  alternative_spanish_readings:
  - «mente pura» enfatiza limpieza moral
  - «entendimiento sincero» enfatiza capacidad cognitiva
  - «manera sincera de pensar» explicita el sentido
  rationale: El griego combina una cualidad ética con la esfera del pensamiento. «Mente sincera» deja abierta esa doble fuerza; no elimina la posibilidad de pureza, pero tampoco la impone como sentido único.
  doctrine_reference: BDAG εἰλικρινής; BDAG διάνοια
translation_notes:
  revision_awareness: 'La versión española sigue de cerca el análisis griego y el audit trail inglés: conserva el vocativo afectuoso, explicita la relación con las dos cartas mediante una formulación plural natural, y mantiene la tensión léxica de διάνοια / εἰλικρινής sin reducirla a una sola paráfrasis. No se detectaron revisiones adicionales en el pass más reciente, así que el borrador refleja el estado estable del texto fuente.'
  spanish_consistency_notes:
  - Se usa «Amados» como vocativo afectuoso y solemne, coherente con el estilo POB.
  - Se evita «SEÑOR» u այլ sustituciones no pertinentes; no hay léxico divino en este versículo.
  - «Carta» se usa para ἐπιστολή con el sentido epistolar normal y claro en español.
  - La nota [a] se integra en el texto para reflejar la alternativa plural/afectiva sin romper la lectura principal.
  - La nota [b] preserva la alternativa «pura» documentada por el audit trail inglés, ya que el español también la admite.
