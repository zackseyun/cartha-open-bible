translation:
  language: es
  text: Puesto que todas estas cosas se están deshaciendo de esta manera, ¿qué clase[a] de personas deben ser ustedes en conducta santa[b] y piedad?
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «qué tipo de personas deben ser ustedes».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «santos modos de vivir»; el plural griego puede expresar variedad o plenitud en la manera de vivir.'
    reason: lexical_alternative
lexical_decisions:
- source_word: Τούτων ... πάντων
  english_pob_choice: all these things
  chosen_spanish: todas estas cosas
  alternatives_spanish:
  - todas estas
  lexicon: BDAG
  rationale: El genitivo plural remite a las realidades del contexto inmediato; en español, «cosas» hace explícito el referente implícito sin añadir interpretación.
- source_word: οὕτως
  english_pob_choice: in this way
  chosen_spanish: de esta manera
  alternatives_spanish:
  - así
  - de este modo
  lexicon: BDAG
  rationale: El adverbio modifica la manera del deshacer/disolución; «de esta manera» conserva ese valor de modo con español natural.
- source_word: λυομένων
  english_pob_choice: are being dissolved
  chosen_spanish: se están deshaciendo
  alternatives_spanish:
  - se están disolviendo
  - están siendo deshechas
  - se están desintegrando
  lexicon: BDAG
  rationale: El participio pasivo presente de λύω expresa una acción de desatar, deshacer o disolver. «Se están deshaciendo» preserva la idea de descomposición sin intensificar a «destruir».
- source_word: ποταποὺς
  english_pob_choice: what sort of people
  chosen_spanish: qué clase de personas
  alternatives_spanish:
  - qué tipo de personas
  - qué clase de gente
  lexicon: BDAG
  rationale: En la pregunta retórica, ποταπός pide la clase o calidad de las personas. «Qué clase de personas» mantiene el matiz ético y suena natural.
- source_word: δεῖ
  english_pob_choice: ought
  chosen_spanish: deben
  alternatives_spanish:
  - deberían
  - es necesario que
  lexicon: BDAG
  rationale: δεῖ expresa necesidad; «deben» comunica obligación moral con naturalidad en español, sin volverla más dura de lo necesario.
- source_word: ὑπάρχειν
  english_pob_choice: to be
  chosen_spanish: ser
  alternatives_spanish:
  - existir
  - resultar ser
  lexicon: BDAG
  rationale: Con δεῖ y ὑμᾶς, ὑπάρχειν funciona idiomáticamente como «ser» en cuanto a conducta o cualidad requerida.
- source_word: ἐν ἁγίαις ἀναστροφαῖς
  english_pob_choice: in holy conduct
  chosen_spanish: en santos modos de vivir
  alternatives_spanish:
  - en conducta santa
  - en santos comportamientos
  - en vida santa
  lexicon: BDAG
  rationale: ἀναστροφή denota conducta o modo de vida; el plural puede conservarse en español como plural de énfasis. «Santos modos de vivir» mantiene esa pluralidad y la referencia ética, sin perder claridad.
- source_word: εὐσεβείαις
  english_pob_choice: godliness
  chosen_spanish: piedad
  alternatives_spanish:
  - devoción reverente
  - devoción piadosa
  - temor de Dios
  lexicon: BDAG
  rationale: εὐσέβεια implica devoción reverente expresada en la vida. «Piedad» es un equivalente conciso y clásico; aquí funciona junto a «santos modos de vivir» como segundo rasgo ético.
theological_decisions:
- issue: Grado de fuerza de λύω en el contexto escatológico
  english_pob_reading: Rendered λύομένων as 'are being dissolved' rather than a stronger interpretive term such as 'are being destroyed.'
  chosen_spanish_reading: se están deshaciendo
  alternative_spanish_readings:
  - se están disolviendo
  - están siendo destruidas
  - se están destruyendo
  rationale: El griego expresa literalmente desatar/disolver. En el contexto escatológico hay desmoronamiento del orden creado, pero la traducción no debe intensificar el verbo más allá de su valor léxico.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Conservar la pregunta retórica sobre la calidad de vida de los creyentes
  english_pob_reading: what sort of people ought you to be
  chosen_spanish_reading: qué clase de personas deben ser ustedes
  alternative_spanish_readings:
  - qué clase de personas deberían ser ustedes
  - cómo de excelentes personas deben ser ustedes
  rationale: La pregunta apunta a la calidad moral y espiritual de la vida cristiana. «Qué clase de personas» mantiene el carácter exhortativo y abierto de ποταποὺς sin convertirlo en elogio superlativo.
  doctrine_reference: Translation philosophy §§1, 4
- issue: Pluralidad de ἀναστροφαῖς y εὐσεβείαις
  english_pob_reading: in holy conduct and godliness
  chosen_spanish_reading: en santos modos de vivir y en piedad
  alternative_spanish_readings:
  - en conducta santa y piedad
  - en santos modos de vida y en devoción
  rationale: El plural griego puede sugerir variedad o plenitud de maneras de vivir. El español permite mantener esa resonancia con un plural natural («modos de vivir»), sin perder inteligibilidad.
  doctrine_reference: Translation philosophy §§2, 5
translation_notes:
  revision_awareness: La revisión más reciente no introdujo cambios; el estado final del auditorio inglés quedó sin modificaciones. La presente redacción sigue de cerca esa lectura y solo adapta la elección léxica al español, preservando el valor aspectual de λύομένων y la pregunta retórica de ποταποὺς.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como convención general del proyecto, pero este versículo no contiene el tetragrámaton ni una cita explícita de κύριος.
  - Se conserva un registro bíblico contemporáneo y eclesialmente legible, evitando calcos innecesarios.
  - «Piedad» se usa en sentido de devoción reverente, no de mera compasión.
