revisions:
- from: Puesto que todas estas cosas se están deshaciendo de esta manera[a], ¿qué clase de personas deben ser ustedes en santos[b] modos de vivir y en piedad?
  to: Puesto que todas estas cosas se están deshaciendo de esta manera, ¿qué clase[a] de personas deben ser ustedes en conducta santa[b] y piedad?
  rationale: Se reubica la nota [a] para que documente correctamente ποταποὺς. Se sustituye «en santos modos de vivir» por «en conducta santa», que refleja mejor ἀναστροφή en español natural y digno, mientras una nota conserva la alternativa más literal/plural. Se suaviza la coordinación final para mejorar la legibilidad sin apartarse del griego.
