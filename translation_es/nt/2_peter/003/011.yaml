review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador conserva bien el sentido básico del griego: la disolución en curso de «todas estas cosas», la pregunta retórica sobre la clase de personas que deben ser los lectores, y la exhortación a una vida santa y piadosa. Sin embargo, el anclaje de la nota [a] está mal colocado: la nota inglesa documenta una alternativa para ποταποὺς («what sort of people»), no para «de esta manera».'
  spanish_quality_summary: El español es mayormente claro, pero «en santos modos de vivir» suena forzado y poco idiomático en español eclesial general. «En conducta santa y piedad» o «con una conducta santa y piedad» expresa mejor ἀναστροφαῖς καὶ εὐσεβείαις sin perder fidelidad. También conviene quitar la segunda preposición repetida para una lectura más natural.
  glossary_alignment: No hay conflictos con la terminología base del proyecto. «Piedad» es aceptable para εὐσεβείαις. Para λυομένων, «se están deshaciendo» es posible, aunque «se están disolviendo» refleja algo mejor el matiz léxico de disolución; aun así, no es un error grave. El punto principal a corregir es la frase española para ἐν ἁγίαις ἀναστροφαῖς y la ubicación/función de la nota.
  issues:
  - severity: high
    issue: La nota [a] está anclada en «de esta manera», pero su contenido corresponde a «qué clase de personas».
    rationale: En el rastro de auditoría inglés, la alternativa «what kind of people ought you to be» explica ποταποὺς, no οὕτως. Mantener la nota en el lugar actual distorsiona la evidencia fuente y la documentación lexical.
  - severity: medium
    issue: «En santos modos de vivir» es una expresión poco natural en español.
    rationale: Aunque intenta reflejar el plural de ἀναστροφαῖς, el resultado suena torpe. «Conducta santa» comunica mejor ἀναστροφή en español moderno y digno; una nota puede preservar el valor plural si se considera importante.
  - severity: low
    issue: La repetición «y en piedad» es menos fluida que «y piedad».
    rationale: El griego tiene una sola ἐν que gobierna ambos sustantivos; en español no hace falta repetir la preposición para mantener fidelidad.
  revised_spanish_text: Puesto que todas estas cosas se están deshaciendo de esta manera, ¿qué clase[a] de personas deben ser ustedes en conducta santa[b] y piedad?
