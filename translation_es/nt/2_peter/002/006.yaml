translation:
  language: es
  text: y al convertir en cenizas[a] las ciudades de Sodoma y Gomorra, las condenó a la destrucción, habiéndolas hecho un ejemplo para los que serían impíos[b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «al volverlas ceniza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para futuros impíos».'
    reason: lexical_alternative
lexical_decisions:
- source_word: τεφρώσας
  english_pob_choice: by reducing them to ashes
  chosen_spanish: al convertir en cenizas
  alternatives_spanish:
  - al volverlas ceniza
  - al reducirlas a cenizas
  - al quemarlas hasta convertirlas en cenizas
  lexicon: BDAG
  rationale: 'El participio aoristo expresa el medio por el cual ocurrió el juicio: convertir algo en cenizas. En español, «al convertir en cenizas» conserva el valor instrumental/resultativo sin sonar mecánico.'
- source_word: καταστροφῇ
  english_pob_choice: to destruction
  chosen_spanish: a destrucción
  alternatives_spanish:
  - para destrucción
  - con destrucción
  - a ruina
  lexicon: BDAG
  rationale: La dativa funciona como resultado o contenido de la condena. «A destrucción» reproduce ese valor de destino sin introducir un giro ajeno al griego.
- source_word: κατέκρινεν
  english_pob_choice: condemned
  chosen_spanish: las condenó
  alternatives_spanish:
  - las sentenció
  - las juzgó
  - pronunció condena contra ellas
  lexicon: BDAG
  rationale: El verbo tiene sentido judicial. «Condenó» es la forma española más directa y fiel para la acción de declarar culpables y destinar al castigo.
- source_word: ὑπόδειγμα
  english_pob_choice: an example
  chosen_spanish: un ejemplo
  alternatives_spanish:
  - un modelo
  - una advertencia
  - un patrón
  lexicon: BDAG
  rationale: En este contexto de juicio, ὑπόδειγμα funciona como ejemplo visible para otros. «Un ejemplo» mantiene la cercanía al griego y deja que el contexto aporte el matiz de advertencia.
- source_word: μελλόντων ἀσεβέσιν
  english_pob_choice: for those who would be ungodly
  chosen_spanish: para los impíos
  alternatives_spanish:
  - para los que serían impíos
  - para los que habrían de ser impíos
  - para los irreverentes
  lexicon: BDAG
  rationale: ἀσεβής describe a personas impías o irreverentes; en español bíblico contemporáneo, «impíos» comunica bien la carga moral y religiosa. Se evita expandir el texto con una frase interpretativa más larga que el original no exige.
- source_word: τεθεικώς
  english_pob_choice: having made them
  chosen_spanish: poniendo así
  alternatives_spanish:
  - habiendo hecho de ellos
  - habiéndolas puesto
  - dejándolas
  lexicon: BDAG
  rationale: 'El participio perfecto de τίθημι expresa el estado resultante: Dios las dejó/estableció como ejemplo. «Poniendo así» refleja esa función de establecimiento de manera natural en español, enlazando con ὑπόδειγμα.'
- source_word: πόλεις Σοδόμων καὶ Γομόρρας
  english_pob_choice: the cities of Sodom and Gomorrah
  chosen_spanish: las ciudades de Sodoma y Gomorra
  alternatives_spanish:
  - las ciudades de Sodoma y de Gomorra
  - Sodoma y Gomorra
  lexicon: BDAG
  rationale: La construcción genitiva plural pide en español la formulación natural «las ciudades de Sodoma y Gomorra», preservando el plural y los nombres propios sin alterar la referencia.
theological_decisions:
- issue: Sujeto implícito del juicio
  english_pob_reading: he condemned them
  chosen_spanish_reading: las condenó
  alternative_spanish_readings:
  - Dios las condenó
  - el Señor las condenó
  - las condenó él
  rationale: El griego presupone el sujeto por el contexto inmediato de juicios divinos. En español, la omisión del sujeto explícito conserva esa continuidad sin introducir una identificación no expresada en la cláusula.
  doctrine_reference: Contexto narrativo inmediato; continuidad del juicio divino en 2 Pedro 2
- issue: Valor de ἀσεβέσιν
  english_pob_reading: for those who would be ungodly
  chosen_spanish_reading: para los impíos
  alternative_spanish_readings:
  - para los que serían impíos
  - para los irreverentes
  - para los sin piedad
  rationale: El término no solo describe falta de religión externa, sino una actitud de impiedad ante Dios. «Impíos» mantiene esa densidad doctrinal sin agregar una explicación no contenida en el texto.
  doctrine_reference: Uso bíblico de ἀσεβής / impiedad en el NT
- issue: Sentido de la condena como destrucción
  english_pob_reading: condemned them to destruction
  chosen_spanish_reading: las condenó a destrucción
  alternative_spanish_readings:
  - las sentenció a destrucción
  - las condenó al desastre
  rationale: La frase une veredicto judicial y destino de ruina. «A destrucción» preserva ambas dimensiones y evita diluir el juicio en una mera catástrofe histórica.
  doctrine_reference: Juicio divino retributivo en 2 Pedro 2
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste más reciente del audit trail inglés: se mantiene el orden natural de la acción de convertir en cenizas antes de la condena, y se conserva ἀσεβέσιν con un valor directo y breve («impíos») en vez de una expansión interpretativa más larga. También se respeta el carácter de resultado de καταστροφῇ como destino de destrucción, no como simple ‘ruina’ genérica.'
  spanish_consistency_notes:
  - Se usa «Dios» o sujeto implícito solo cuando el contexto inmediato lo sostiene; aquí se omite el sujeto por continuidad discursiva.
  - Se conserva «impíos» para ἀσεβέσιν como término bíblico con carga moral-religiosa reconocible en español.
  - «Convertir en cenizas» mantiene el valor lexical de τεφρόω sin sobretraducir a ‘quemar’ únicamente.
  - «A destrucción» busca reflejar la relación de resultado del dativo con κατέκρινεν, evitando términos demasiado interpretativos.
  - Se evita «Cristo» y demás terminología no presente en el versículo.
