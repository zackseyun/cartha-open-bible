revisions:
- from: y al convertir en cenizas[a] las ciudades de Sodoma y Gomorra, las condenó a destrucción, poniendo así un ejemplo para los impíos[b].
  to: y al convertir en cenizas[a] las ciudades de Sodoma y Gomorra, las condenó a la destrucción, habiéndolas hecho un ejemplo para los que serían impíos[b].
  rationale: 'La revisión conserva el sentido del griego y del POB inglés, pero corrige tres puntos: añade el artículo en «a la destrucción» para mayor naturalidad en español, expresa mejor el valor resultativo de τεθεικώς con «habiéndolas hecho un ejemplo», y restaura la futuridad de μελλόντων ἀσεβέσιν con «para los que serían impíos».'
