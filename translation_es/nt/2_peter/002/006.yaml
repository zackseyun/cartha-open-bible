review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura principal del griego: juicio sobre las ciudades de Sodoma y Gomorra, reducción a cenizas, condena a destrucción y función ejemplar para futuros impíos. Sin embargo, «para los impíos» pierde el matiz de futuridad de μελλόντων ἀσεβέσιν, y «poniendo así un ejemplo» suena menos preciso que una formulación que exprese mejor el resultado de τεθεικώς con ὑπόδειγμα.'
  spanish_quality_summary: 'El español es claro y legible, pero dos giros pueden mejorarse: «a destrucción» suena algo duro en español y «poniendo así un ejemplo» es menos idiomático que «habiéndolas hecho un ejemplo» o «dejándolas como ejemplo». También conviene preservar el matiz futuro con una frase natural en español.'
  glossary_alignment: 'No hay conflicto con la terminología base del proyecto. «Impíos» es adecuado para ἀσεβέσιν, pero aquí debe conservarse la proyección futura: «para los que serían impíos» o equivalente. El resto de las decisiones léxicas está sustancialmente alineado con el rastro POB.'
  issues:
  - severity: medium
    issue: Se pierde el matiz de futuridad en «para los impíos».
    rationale: μελλόντων ἀσεβέσιν no se refiere simplemente a los impíos en general, sino a quienes habrían de ser impíos en relación con este ejemplo. El inglés auditado preserva ese valor con «those who would be ungodly».
  - severity: medium
    issue: «Poniendo así un ejemplo» representa de forma imprecisa τεθεικώς ὑπόδειγμα.
    rationale: El participio perfecto de τίθημι destaca el estado resultante de haberlas establecido como ejemplo. En español, «habiéndolas hecho ejemplo» o «dejándolas como ejemplo» refleja mejor esa función resultativa.
  - severity: low
    issue: «Las condenó a destrucción» es entendible pero menos natural en español corriente.
    rationale: Aunque formalmente cercano al análisis del dativo, en español bíblico natural suena mejor «las condenó a la destrucción», que conserva el sentido judicial y el destino resultante sin rigidez innecesaria.
  revised_spanish_text: y al convertir en cenizas[a] las ciudades de Sodoma y Gomorra, las condenó a la destrucción, habiéndolas hecho un ejemplo para los que serían impíos[b].
  revised_footnotes:
  - marker: a
    text: 'O: «al volverlas ceniza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «para futuros impíos».'
    reason: lexical_alternative
  revision_rationale: 'La revisión conserva el sentido del griego y del POB inglés, pero corrige tres puntos: añade el artículo en «a la destrucción» para mayor naturalidad en español, expresa mejor el valor resultativo de τεθεικώς con «habiéndolas hecho un ejemplo», y restaura la futuridad de μελλόντων ἀσεβέσιν con «para los que serían impíos».'
