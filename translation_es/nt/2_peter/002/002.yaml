translation:
  language: es
  text: Y muchos seguirán su conducta sensual[a], y por causa de ellos el camino de la verdad será blasfemado[c][b].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «desenfrenos», «libertinaje» o «conducta licenciosa». El término griego denota conducta descarada y sin freno, a menudo con matices sexuales.
    reason: lexical_alternative
  - marker: b
    text: O «el camino verdadero». Esta frase probablemente se refiere a la fe y al modo de vida cristianos como el camino verdadero.
    reason: lexical_alternative
  - marker: c
    text: O «será vilipendiado» o «se hablará mal de él».
    reason: lexical_alternative
lexical_decisions:
- source_word: πολλοὶ
  english_pob_choice: many
  chosen_spanish: muchos
  alternatives_spanish:
  - gran número de
  - multitudes de
  lexicon: BDAG
  rationale: El adjetivo cuantitativo simple se vierte con naturalidad como «muchos», manteniendo el alcance amplio sin exageración.
- source_word: ἐξακολουθήσουσιν
  english_pob_choice: will follow
  chosen_spanish: seguirán
  alternatives_spanish:
  - seguirán tras
  - imitarán
  lexicon: BDAG
  rationale: El futuro activo expresa continuidad y seguimiento en la conducta; «seguirán» conserva el valor prospectivo y suena natural en español.
- source_word: αὐτῶν
  english_pob_choice: their
  chosen_spanish: sus
  alternatives_spanish:
  - de ellos
  - las de ellos
  lexicon: BDAG
  rationale: El pronombre posesivo conecta de forma natural con el sustantivo siguiente en español y mantiene la referencia a los falsos maestros del contexto.
- source_word: ταῖς ἀσελγείαις
  english_pob_choice: sensuality
  chosen_spanish: sensualidades
  alternatives_spanish:
  - desenfrenos
  - disoluciones
  - licencias
  lexicon: BDAG
  rationale: ἀσέλγεια designa conducta descarada y sin freno, a menudo con connotación sexual. Se usa el plural «sensualidades» para reflejar el plural griego y conservar el campo semántico amplio sin estrecharlo solo a un vicio específico.
- source_word: δι’ οὓς
  english_pob_choice: because of them
  chosen_spanish: por causa de ellos
  alternatives_spanish:
  - a causa de ellos
  - por ellos
  lexicon: BDAG
  rationale: διά con acusativo aquí expresa causa o resultado. «Por causa de ellos» reproduce esa relación causal de manera clara y fiel.
- source_word: ἡ ὁδὸς τῆς ἀληθείας
  english_pob_choice: the way of the truth
  chosen_spanish: el camino de la verdad
  alternatives_spanish:
  - el camino de la verdad
  - la senda de la verdad
  - el verdadero camino
  lexicon: BDAG
  rationale: Se mantiene la metáfora de «camino» y la construcción genitiva con «de la verdad», que refleja el griego y preserva su peso teológico como designación de la vida/fe cristiana verdadera.
- source_word: βλασφημηθήσεται
  english_pob_choice: will be blasphemed
  chosen_spanish: será blasfemado
  alternatives_spanish:
  - será difamado
  - será vilipendiado
  - será hablado mal
  lexicon: BDAG
  rationale: El futuro pasivo de βλασφημέω se expresa de forma directa con «será blasfemado», preservando la gravedad del término y su vínculo con habla injuriosa contra lo sagrado.
theological_decisions:
- issue: Alcance moral de ἀσέλγεια
  english_pob_reading: Rendered as 'sensuality' to preserve broad moral and sexual shamelessness.
  chosen_spanish_reading: «sensualidades» conserva la amplitud de conducta descarada y desordenada, con posibles matices sexuales, sin reducirla a un solo tipo de exceso.
  alternative_spanish_readings:
  - «debaucherías»
  - «licencias»
  - «desenfrenos»
  rationale: El término griego abarca vergüenza moral, falta de freno y a menudo desorden sexual. El plural español ayuda a reflejar el plural griego y evita una reducción semántica indebida.
  doctrine_reference: Translation philosophy §§1, 6
- issue: Sentido de «el camino de la verdad»
  english_pob_reading: An early Christian designation for the true faith/way of life, rendered literally as 'the way of the truth.'
  chosen_spanish_reading: «el camino de la verdad» mantiene la imagen y permite entender la expresión como designación de la fe y del modo de vida cristianos verdaderos.
  alternative_spanish_readings:
  - «el camino de la verdad» con nota interpretativa
  - «el verdadero camino»
  - «el camino de la verdad cristiana»
  rationale: La frase probablemente alude a la fe y práctica cristianas como el camino conforme a la verdad. La traducción literal preserva la metáfora y no estrecha prematuramente el alcance.
  doctrine_reference: Translation philosophy §§1, 3, 6
translation_notes:
  revision_awareness: El borrador sigue de cerca el texto griego SBLGNT y el trazado del POB inglés, sin cambios revisionales conocidos en el pasaje. Se conserva la tensión lexical de ἀσέλγεια y la posible lectura eclesial de «el camino de la verdad».
  spanish_consistency_notes:
  - Se usa «verdad» y no una paráfrasis doctrinal para mantener la metáfora del griego.
  - Se prefiere el futuro pasivo «será blasfemado» para reproducir la fuerza de βλασφημηθήσεται.
  - Se mantiene el plural «sensualidades» para reflejar el plural griego y el campo semántico amplio de ἀσέλγεια.
  - Los marcadores de nota siguen el orden requerido y aparecen anclados en el texto.
