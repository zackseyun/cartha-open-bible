revisions:
- from: Y muchos seguirán sus sensualidades[a], y por causa de ellos el camino de la verdad será blasfemado[c][b].
  to: Y muchos seguirán su conducta sensual[a], y por causa de ellos el camino de la verdad será blasfemado[c][b].
  rationale: Se requiere una reparación menor para lograr español natural y fiel. La revisión sustituye «sus sensualidades» por «su conducta sensual», que transmite mejor ἀσέλγεια en español sin estrechar indebidamente su sentido. También se corrigen las notas para que sean idiomáticas y para que la nota b ofrezca una alternativa real, no una repetición.
