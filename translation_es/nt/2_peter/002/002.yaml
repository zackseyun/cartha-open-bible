review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura y el sentido global del griego: πολλοὶ = «muchos», ἐξακολουθήσουσιν = «seguirán», δι’ οὓς = «por causa de ellos», ἡ ὁδὸς τῆς ἀληθείας = «el camino de la verdad», βλασφημηθήσεται = «será blasfemado». Sin embargo, «sus sensualidades» no suena natural en español bíblico actual y distorsiona ligeramente el campo semántico de ἀσελγείαις al sugerir meramente sensualidad interna o pluralizaciones poco idiomáticas. El sentido es mejor preservado con «su conducta sensual» o «sus desenfrenos»; de esas opciones, «su conducta sensual» conserva la amplitud moral/sexual del original y mantiene la relación posesiva natural con αὐτῶν.'
  spanish_quality_summary: La frase es mayormente clara y digna, pero «sus sensualidades» resulta torpe e infrecuente en español general y eclesial. Además, la nota c contiene «será hablado mal», que es poco natural; debe ser «se hablará mal de él/ella» o mejor «será injuriado»/«será vilipendiado». El resto del versículo es legible y fiel.
  glossary_alignment: 'No hay conflictos con la terminología troncal del proyecto. La principal cuestión léxica es ἀσέλγεια: el inglés auditado eligió «sensuality» por amplitud semántica, pero en español «sensualidad» en plural suena antinatural. «Conducta sensual» preserva mejor el alcance sin caer en un calco rígido. «El camino de la verdad» y «blasfemado» están alineados con la justificación inglesa.'
