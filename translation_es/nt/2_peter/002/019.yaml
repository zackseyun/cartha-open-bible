translation:
  language: es
  text: prometiéndoles libertad[a], mientras ellos mismos son esclavos de la corrupción; porque el que es vencido por algo, por eso[b] también queda esclavizado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «libertad»; también podría expresarse «libertad civil» o «libertad» según contexto, pero aquí el sentido es simplemente libertad, no «liberalidad».
    reason: lexical_alternative
  - marker: b
    text: O «Porque por lo que alguien ha sido vencido, por eso también ha quedado esclavizado».
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐλευθερίαν
  english_pob_choice: freedom
  chosen_spanish: libertad
  alternatives_spanish:
  - libertad
  - liberalidad
  lexicon: BDAG
  rationale: ἐλευθερίαν denota el estado de ser libre; en español, «libertad» es la equivalencia natural y clara. Mantiene el contraste irónico con la esclavitud real que sigue en el versículo.
- source_word: ἐπαγγελλόμενοι
  english_pob_choice: promising
  chosen_spanish: prometiéndoles
  alternatives_spanish:
  - prometiendo
  - ofreciéndoles
  - anunciándoles
  lexicon: BDAG
  rationale: El participio expresa la acción de hacer una promesa. «Prometiéndoles» conserva la fuerza verbal y el objeto indirecto implícito del griego, sin perder naturalidad en español.
- source_word: δοῦλοι
  english_pob_choice: slaves
  chosen_spanish: esclavos
  alternatives_spanish:
  - siervos
  - siervos sujetos
  - cautivos
  lexicon: BDAG
  rationale: Como el contexto contrapone libertad prometida con verdadera sujeción, «esclavos» preserva la dureza y la ironía del término δοῦλοι. «Siervos» atenuaría el contraste y ocultaría la fuerza lexical.
- source_word: ὑπάρχοντες
  english_pob_choice: while they themselves are
  chosen_spanish: aunque ellos mismos son
  alternatives_spanish:
  - mientras ellos mismos son
  - siendo ellos mismos
  - aunque en realidad son
  lexicon: BDAG
  rationale: El participio presenta su estado real en contraste con la promesa. «Aunque» comunica el valor concesivo implícito en el giro del versículo y hace la oposición más clara en español.
- source_word: φθορᾶς
  english_pob_choice: corruption
  chosen_spanish: corrupción
  alternatives_spanish:
  - depravación
  - ruina
  - destrucción
  lexicon: BDAG
  rationale: φθορά en 2 Pedro suele abarcar corrupción moral y deterioro destructivo. «Corrupción» conserva ambas connotaciones sin especificar de más.
- source_word: ᾧ γάρ τις ἥττηται
  english_pob_choice: for whatever a person is overcome by
  chosen_spanish: porque el que es vencido por algo
  alternatives_spanish:
  - pues por lo que alguien es derrotado
  - porque cualquiera que es dominado por algo
  - ya que lo que vence a una persona
  lexicon: BDAG
  rationale: El griego formula un principio general. «El que es vencido por algo» reproduce la pasiva de ἥττηται y mantiene el carácter proverbial de la afirmación.
- source_word: τούτῳ καὶ δεδούλωται
  english_pob_choice: by this he is also enslaved
  chosen_spanish: por eso mismo también queda esclavizado
  alternatives_spanish:
  - por esto también es esclavizado
  - por ello también queda en esclavitud
  - por lo mismo también es hecho esclavo
  lexicon: BDAG
  rationale: La forma perfecta expresa un estado resultante de esclavitud. «Queda esclavizado» comunica ese estado continuo en español, y «por eso mismo» refleja bien el dativo instrumental/relacional del griego que conecta con aquello que ha vencido a la persona.
- source_word: τις
  english_pob_choice: a person ... he
  chosen_spanish: el que ... algo
  alternatives_spanish:
  - quien ... algo
  - cualquiera ... algo
  - una persona ... ella
  lexicon: BDAG
  rationale: El pronombre indefinido es genérico. En español, «el que» mantiene la generalidad y la naturalidad del refrán moral sin introducir un plural o una formulación artificial.
theological_decisions:
- issue: Fuerte lenguaje de esclavitud aplicado a la corrupción
  english_pob_reading: Use 'slaves' and 'enslaved' rather than softer terms.
  chosen_spanish_reading: Usar «esclavos» y «queda esclavizado» en vez de suavizar con «siervos» o expresiones menos intensas.
  alternative_spanish_readings:
  - siervos
  - están sujetos
  - viven bajo dominio
  rationale: El argumento del versículo depende del contraste absoluto entre la libertad prometida y la servidumbre real. La traducción debe conservar esa tensión teológica y retórica sin embellecerla.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for δοῦλος; Translation philosophy §1'
- issue: Relación causal/instrumental en la cláusula final
  english_pob_reading: by this he is also enslaved
  chosen_spanish_reading: por eso mismo también queda esclavizado
  alternative_spanish_readings:
  - por esto también es esclavizado
  - por ello también queda esclavizado
  - por este mismo medio también queda esclavizado
  rationale: El griego enlaza el estado de esclavitud con aquello por lo cual alguien ha sido vencido. «Por eso mismo» deja visible la conexión lógica y evita una lectura demasiado técnica o forzada del dativo.
  doctrine_reference: Source-based syntactic decision; revision awareness in English audit trail
translation_notes:
  revision_awareness: Se tuvo en cuenta la revisión inglesa más reciente que ajustó la última cláusula a «by this he is also enslaved», reflejando más de cerca el dativo griego. La versión española adopta ese ajuste con «por eso mismo también queda esclavizado», manteniendo el enlace lógico y el estado resultante. También se preservó la dureza lexical de δοῦλοι/δεδούλωται con «esclavos/queda esclavizado».
  spanish_consistency_notes:
  - Se mantiene «libertad» como término principal, con nota alternativa «liberalidad» para el matiz posible de ἐλευθερίαν.
  - Se conserva el lenguaje de esclavitud como equivalente fuerte de δοῦλος/δεδούλωται, coherente con el criterio POB de no suavizar el término cuando la servidumbre es central.
  - La cláusula general usa un singular genérico natural en español («el que...») para reflejar el valor indefinido de τις sin introducir pluralización innecesaria.
  - «Corrupción» se usa para φθορᾶς por su amplitud semántica moral y destructiva, adecuada al contexto de 2 Pedro.
