  text: οἶδεν κύριος εὐσεβεῖς ἐκ πειρασμοῦ ῥύεσθαι, ἀδίκους δὲ εἰς ἡμέραν κρίσεως κολαζομένους τηρεῖν,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/009.yaml
  text: then the Lord knows how to rescue the godly from trial[a], and to keep the unrighteous under punishment until the day of judgment[b],
  footnotes:
