translation:
  language: es
  text: entonces el Señor sabe cómo librar a los piadosos de la prueba[a], y mantener a los injustos bajo castigo hasta el día del juicio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «de la tentación». La palabra griega puede significar tentación o prueba; aquí el contexto favorece «prueba».
    reason: lexical_alternative
  - marker: b
    text: O «mantener a los injustos para el día del juicio para ser castigados»; el participio griego puede entenderse como describiendo un castigo en curso o un castigo asociado con el juicio venidero.
    reason: alternative_reading
lexical_decisions:
- source_word: οἶδεν
  english_pob_choice: knows how
  chosen_spanish: sabe cómo
  alternatives_spanish:
  - sabe
  - ha sabido cómo
  lexicon: BDAG
  rationale: οἶδα con infinitivo expresa capacidad o conocimiento práctico; en español, «sabe cómo» reproduce mejor ese valor idiomático que un simple «sabe».
- source_word: κύριος
  english_pob_choice: the Lord
  chosen_spanish: el Señor
  alternatives_spanish:
  - Señor
  lexicon: BDAG
  rationale: En español, el artículo definido es natural en esta construcción. Se mantiene «Señor» para κύριος, conforme al uso bíblico usual y al contexto reverente.
- source_word: εὐσεβεῖς
  english_pob_choice: the godly
  chosen_spanish: los piadosos
  alternatives_spanish:
  - los devotos
  - los justos
  lexicon: BDAG
  rationale: El adjetivo sustantivado apunta a personas caracterizadas por piedad/devoción. «Piadosos» conserva ese matiz religioso y es idiomático en español bíblico sin forzar una terminología más interpretativa.
- source_word: ἐκ πειρασμοῦ
  english_pob_choice: from trial
  chosen_spanish: de la prueba
  alternatives_spanish:
  - de la tentación
  - de la prueba o tentación
  lexicon: BDAG
  rationale: πειρασμός puede significar tentación o prueba. Aquí el contexto de rescate de situaciones adversas favorece «prueba»; se conserva la ambigüedad posible en nota.
- source_word: ῥύεσθαι
  english_pob_choice: to rescue
  chosen_spanish: librar
  alternatives_spanish:
  - rescatar
  - sacar
  lexicon: BDAG
  rationale: ῥύομαι expresa liberación de peligro. «Librar» funciona bien en español bíblico y comunica rescate sin sonar forzado.
- source_word: ἀδίκους
  english_pob_choice: the unrighteous
  chosen_spanish: los injustos
  alternatives_spanish:
  - los impíos
  - los injustos y malvados
  lexicon: BDAG
  rationale: ἄδικος conserva fuerza moral y judicial. «Injustos» es una correspondencia directa y clara en español, manteniendo el contraste con los piadosos.
- source_word: εἰς ἡμέραν κρίσεως
  english_pob_choice: until the day of judgment
  chosen_spanish: para el día del juicio
  alternatives_spanish:
  - hasta el día del juicio
  - para el día del juicio final
  lexicon: BDAG
  rationale: La preposición εἰς con τηρέω mira hacia un punto futuro; en español, «para el día del juicio» conserva esa orientación sin sobrecargar el valor temporal.
- source_word: κολαζομένους
  english_pob_choice: under punishment
  chosen_spanish: bajo castigo
  alternatives_spanish:
  - siendo castigados
  - en castigo
  lexicon: BDAG
  rationale: El participio presente sugiere un estado continuo relacionado con castigo. «Bajo castigo» preserva ese estado de sujeción y evita cerrar la opción de un matiz de castigo en curso.
- source_word: τηρεῖν
  english_pob_choice: to keep
  chosen_spanish: reservar
  alternatives_spanish:
  - guardar
  - retener
  lexicon: BDAG
  rationale: τηρέω puede significar guardar, preservar o reservar. «Reservar» encaja bien con el contexto de espera del juicio y mantiene la tensión de un destino futuro.
theological_decisions:
- issue: Sentido de πειρασμός en este contexto
  english_pob_reading: trial/testing rather than specifically temptation
  chosen_spanish_reading: prueba antes que tentación
  alternative_spanish_readings:
  - tentación
  - prueba o tentación
  rationale: El contexto inmediato trata de rescate en medio de situaciones de juicio y peligro, no de una tentación interior específica. «Prueba» evita restringir indebidamente el término, aunque la nota preserva la alternativa.
  doctrine_reference: Translation philosophy §1, §3
- issue: Fuerza de κολαζομένους
  english_pob_reading: present state of punishment prior to final judgment
  chosen_spanish_reading: estado presente de castigo en vista del juicio final
  alternative_spanish_readings:
  - reservados para ser castigados en el día del juicio
  - siendo castigados hasta el día del juicio
  rationale: La forma participial conviene reflejarla sin diluirla. «Bajo castigo» conserva la idea de un estado continuo y deja abierta la relación exacta con el juicio venidero sin imponer más de lo que dice el griego.
  doctrine_reference: Translation philosophy §3
translation_notes:
  revision_awareness: Se tuvo en cuenta el historial de revisión del inglés POB, especialmente la corrección de la relación temporal de εἰς con τηρεῖν hacia una orientación futura («until the day of judgment»). La versión española refleja esa decisión con «para el día del juicio» y mantiene el participio presente mediante «bajo castigo».
  spanish_consistency_notes:
  - Se usa «Señor» para κύριος y «Dios» no aparece en este versículo.
  - «Piadosos» e «injustos» preservan el contraste moral del original sin recurrir a paráfrasis.
  - «Prueba» mantiene la amplitud semántica de πειρασμός con nota de alternativa.
  - «Reservar» refleja τηρεῖν como retener/guardar con orientación al juicio futuro.
  - La puntuación separa los dos miembros del paralelismo griego y mantiene la cadencia del período.
