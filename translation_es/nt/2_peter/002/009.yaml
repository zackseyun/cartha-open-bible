revisions:
- from: entonces el Señor sabe cómo librar a los piadosos de la prueba[a], y a reservar a los injustos, bajo castigo, para el día del juicio[b],
  to: entonces el Señor sabe cómo librar a los piadosos de la prueba[a], y mantener a los injustos bajo castigo hasta el día del juicio[b],
  rationale: Se corrige la sintaxis para reflejar adecuadamente los infinitivos coordinados del griego y producir un español idiomático. «Mantener» reproduce mejor τηρεῖν en combinación con «bajo castigo». También se cambia «para el día del juicio» por «hasta el día del juicio» para seguir la revisión auditada del inglés y expresar mejor la orientación temporal del pasaje. Se conserva la nota sobre «tentación/prueba» y la alternativa sobre κολαζομένους.
