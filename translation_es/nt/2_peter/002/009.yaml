    text: Or "from temptation." The Greek word can mean either temptation or trial/testing; here the context favors deliverance from trial.
    reason: lexical_alternative
  - marker: b
    text: Or "to keep the unrighteous for the day of judgment to be punished"; the Greek participle may be taken as describing ongoing punishment or punishment associated with the coming judgment.
    reason: alternative_reading
