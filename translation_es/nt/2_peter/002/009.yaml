review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura básica del griego: «sabe cómo» por οἶδεν, «librar» por ῥύεσθαι, «los piadosos» por εὐσεβεῖς, y mantiene la alternativa de πειρασμοῦ en nota. Sin embargo, no preserva con suficiente fidelidad la sintaxis de los infinitivos coordinados: «y a reservar» es gramaticalmente defectuoso en español y no corresponde bien al paralelo con «librar». Además, «para el día del juicio» ya no sigue la revisión auditada del inglés, que adoptó «until the day of judgment»; en español aquí conviene «hasta el día del juicio».'
  spanish_quality_summary: 'La redacción actual suena poco natural por «y a reservar a los injustos», y la puntuación con comas alrededor de «bajo castigo» entorpece la fluidez. Una reparación breve puede producir un español claro, digno y natural: «y mantener a los injustos bajo castigo hasta el día del juicio».'
  glossary_alignment: 'No hay conflicto relevante con el glosario mayor. «Señor» para κύριος es adecuado aquí; no se trata de una aparición de Yahvé en el texto griego. «Piadosos», «prueba», «injustos» y «juicio» están bien alineados con las decisiones auditadas. El ajuste principal es lexical/sintáctico para τηρεῖν: «mantener» o «guardar» funciona mejor que «reservar» en esta construcción, especialmente junto con «bajo castigo hasta...».'
  issues:
  - severity: high
    issue: 'Construcción defectuosa: «y a reservar a los injustos»'
    rationale: Tras «sabe cómo librar...», el infinitivo coordinado debe ser paralelo y natural en español. «Y a reservar» no funciona idiomáticamente; rompe la sintaxis y oscurece τηρεῖν.
  - severity: medium
    issue: «para el día del juicio» no refleja la revisión auditada «until the day of judgment»
    rationale: Aunque εἰς puede permitir varias soluciones, el expediente inglés ya resolvió el caso en favor de «until». En español, «hasta el día del juicio» comunica mejor la orientación temporal del contexto.
  - severity: low
    issue: Comas innecesarias en «los injustos, bajo castigo, ...»
    rationale: El inciso no necesita aislarse con comas. Sin ellas, «mantener a los injustos bajo castigo» suena más natural y conserva mejor la unidad sintáctica del participio κολαζομένους con τηρεῖν.
  revised_spanish_text: entonces el Señor sabe cómo librar a los piadosos de la prueba[a], y mantener a los injustos bajo castigo hasta el día del juicio[b],
  revised_footnotes:
  - marker: a
    text: O «de la tentación». La palabra griega puede significar tentación o prueba; aquí el contexto favorece «prueba».
    reason: lexical_alternative
  - marker: b
    text: O «mantener a los injustos para el día del juicio para ser castigados»; el participio griego puede entenderse como describiendo un castigo en curso o un castigo asociado con el juicio venidero.
    reason: alternative_reading
  revision_rationale: Se corrige la sintaxis para reflejar adecuadamente los infinitivos coordinados del griego y producir un español idiomático. «Mantener» reproduce mejor τηρεῖν en combinación con «bajo castigo». También se cambia «para el día del juicio» por «hasta el día del juicio» para seguir la revisión auditada del inglés y expresar mejor la orientación temporal del pasaje. Se conserva la nota sobre «tentación/prueba» y la alternativa sobre κολαζομένους.
