    rationale: El POB inglés conserva una alternativa importante sobre la disposición de 'por lo que vio y oyó' y 'con sus obras ilícitas/sin ley'. El español debería preservar esa posibilidad, ya que el propio expediente auditado la considera significativa.
  - severity: medium
    issue: '''Obras impías'' atenúa o desplaza el matiz de ἄνομος.'
    rationale: ἄνομος enfatiza lo contrario a ley/orden moral-jurídico, no solo impiedad religiosa. 'Hechos inicuos' suena natural en español bíblico y conserva mejor el peso moral-legal.
