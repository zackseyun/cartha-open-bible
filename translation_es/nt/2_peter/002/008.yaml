    issue: La nota [a] del borrador español es incorrecta.
    rationale: En el POB inglés, la nota a corresponde a una alternativa para ἡμέραν ἐξ ἡμέρας ('from day to day'), no a ἀκοῇ. La nota española 'O de lo que oía' altera el sentido y no refleja ninguna alternativa auditada.
  - severity: medium
