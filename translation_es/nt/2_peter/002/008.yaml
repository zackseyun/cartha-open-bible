translation:
  language: es
  text: pues, por lo que veía y oía, ese hombre justo, viviendo entre ellos[a][b], atormentaba día tras día[c] su alma justa con sus hechos inicuos.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'pues, mientras ese hombre justo vivía entre ellos, día tras día atormentaba'.
    reason: previous_rendering
  - marker: b
    text: O 'se atormentaba a sí mismo en su alma justa por los hechos inicuos que veía y oía'. El orden griego coloca primero 'por vista y oído' y después 'por hechos inicuos', de modo que la disposición exacta en español es algo flexible.
    reason: lexical_alternative
  - marker: c
    text: O 'de día en día'.
    reason: lexical_alternative
lexical_decisions:
- source_word: βλέμματι γὰρ καὶ ἀκοῇ
  english_pob_choice: by what he saw and heard
  chosen_spanish: por lo que veía y oía
  alternatives_spanish:
  - por la vista y el oído
  - por lo que vio y oyó
  lexicon: BDAG
  rationale: 'Los dativos instrumentales expresan la esfera o medio de percepción: no se trata de una abstracción técnica, sino de aquello que Lot percibía visual y auditivamente. En español, ''por lo que veía y oía'' conserva el valor instrumental de manera natural y evita la rigidez de ''por vista y oído''.'
- source_word: ὁ δίκαιος
  english_pob_choice: that righteous man
  chosen_spanish: ese hombre justo
  alternatives_spanish:
  - el justo
  - aquel hombre justo
  lexicon: BDAG
  rationale: El artículo con el adjetivo funciona de modo sustantivo y remite a Lot en el contexto inmediato. 'Ese hombre justo' mantiene la referencia anafórica y el matiz demostrativo de cercanía textual sin convertirlo en una fórmula eclesiástica.
- source_word: ἐγκατοικῶν ἐν αὐτοῖς
  english_pob_choice: living among them
  chosen_spanish: viviendo entre ellos
  alternatives_spanish:
  - morando entre ellos
  - residiendo entre ellos
  lexicon: BDAG
  rationale: El participio describe residencia continuada en medio de esas personas. 'Viviendo entre ellos' reproduce bien el aspecto durativo y suena natural en español; 'morando' sería más solemne pero algo más arcaizante.
- source_word: ἡμέραν ἐξ ἡμέρας
  english_pob_choice: day after day
  chosen_spanish: día tras día
  alternatives_spanish:
  - de día en día
  - día tras día, continuamente
  lexicon: BDAG
  rationale: La expresión idiomática indica repetición sostenida. 'Día tras día' es el equivalente español más idiomático y conserva el avance acumulativo del griego.
- source_word: ψυχὴν δικαίαν
  english_pob_choice: his righteous soul
  chosen_spanish: su alma justa
  alternatives_spanish:
  - su alma recta
  - su ser justo
  - su interior justo
  lexicon: BDAG
  rationale: ψυχή aquí se refiere a la vida interior o al yo interior, no a una tesis técnica sobre la composición humana. 'Alma' mantiene el equivalente más directo y tradicional; 'justa' conserva el adjetivo repetido del original y su fuerza moral.
- source_word: ἀνόμοις ἔργοις
  english_pob_choice: their lawless deeds
  chosen_spanish: con sus obras impías
  alternatives_spanish:
  - con sus obras sin ley
  - con sus hechos inicuos
  lexicon: BDAG
  rationale: El dativo plural expresa el medio o el motivo del tormento. 'Obras impías' comunica la fuerza moral de ἄνομος con una expresión española clara y bíblica; 'sin ley' sería más literal pero menos natural. El posesivo 'sus' se deduce del contexto, donde las obras son las de los habitantes entre los que Lot vivía.
- source_word: ἐβασάνιζεν
  english_pob_choice: was tormenting
  chosen_spanish: atormentaba
  alternatives_spanish:
  - estaba atormentando
  - torturaba
  lexicon: BDAG
  rationale: El imperfecto marca acción continua en el pasado. 'Atormentaba' conserva la intensidad del verbo βασανίζω sin endurecerlo innecesariamente en español moderno; 'torturaba' sería más fuerte, pero puede sonar excesivo fuera de un contexto literal de tortura.
theological_decisions:
- issue: Sentido de ψυχή en relación con la antropología
  english_pob_reading: Rendered as 'soul' in a non-speculative sense referring to Lot's inner self/person.
  chosen_spanish_reading: Traducido como 'alma' en sentido no especulativo, refiriéndose al yo interior de Lot.
  alternative_spanish_readings:
  - yo interior
  - ser interior
  - interior
  rationale: El versículo habla del sufrimiento moral e interior de Lot, no de una definición doctrinal de la relación cuerpo-alma. 'Alma' preserva el léxico bíblico tradicional sin resolver la tensión antropológica que el texto no desarrolla.
  doctrine_reference: Mantener la tensión teológica sin sobreexplicarla.
translation_notes:
  revision_awareness: La redacción sigue la reorganización reciente del POB inglés, que coloca primero el medio de percepción y luego el sujeto justo que vivía entre ellos; también conserva la repetición de 'justo' y el aspecto continuo del imperfecto. Se evitó traducir mecánicamente desde el inglés, tomando como base la secuencia griega y la fuerza instrumental de los dativos.
  spanish_consistency_notes:
  - Se mantuvo 'Dios/Yahvé/Cristo' fuera de este versículo porque no aparecen en el texto base.
  - Se eligió 'alma' para ψυχή, coherente con el audit trail inglés, sin introducir una antropología técnica.
  - Se evitó 'SEÑOR' y otras convenciones de máscara porque no corresponden al pasaje.
  - '''Impías'' comunica el valor moral-legal de ἄνομος en un español bíblico claro, sin perder la idea de ausencia de ley divina.'
