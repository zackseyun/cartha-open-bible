translation:
  language: es
  text: Pero estos, como animales irracionales[a], criaturas de instinto[b], nacidas para ser presa y destruidas, blasfemando[c] de cosas que no entienden, también serán destruidos en su destrucción[d].
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O "animales sin razón".
    reason: lexical_alternative
  - marker: b
    text: Lit. "nacidas naturales"; la expresión apunta a criaturas gobernadas por el instinto o la naturaleza.
    reason: lexical_alternative
  - marker: c
    text: O "injuriando de cosas que no entienden".
    reason: lexical_alternative
  - marker: d
    text: El griego repite palabras afines para "destrucción" / "ser destruidos", preservando un juego de palabras entre ruina y perecer.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἄλογα ζῷα
  english_pob_choice: irrational animals
  chosen_spanish: animales irracionales
  alternatives_spanish:
  - animales sin razón
  - animales insensatos
  lexicon: BDAG
  rationale: ἄλογα con ζῷα nombra animales sin razón, no simplemente mudos. En español, "animales irracionales" conserva el contraste con la racionalidad moral sin sonar forzado.
- source_word: γεγεννημένα φυσικὰ
  english_pob_choice: creatures of instinct
  chosen_spanish: criaturas de instinto
  alternatives_spanish:
  - criaturas naturales
  - nacidas por naturaleza
  - criaturas según la naturaleza
  lexicon: BDAG
  rationale: La combinación participial concentra la idea de haber nacido y de estar gobernados por el impulso natural. "Criaturas de instinto" comunica bien φυσικά en español y mantiene el matiz de impulso no racional.
- source_word: εἰς ἅλωσιν καὶ φθοράν
  english_pob_choice: born for capture and destruction
  chosen_spanish: nacidas para presa y destrucción
  alternatives_spanish:
  - nacidas para captura y destrucción
  - para ser apresadas y destruidas
  - para presa y ruina
  lexicon: BDAG
  rationale: εἰς expresa finalidad o resultado. "Presa" recoge ἅλωσις de forma natural en español bíblico contemporáneo y, junto con "destrucción", mantiene la imagen de ser tomadas y arruinadas.
- source_word: ἐν οἷς ἀγνοοῦσιν
  english_pob_choice: about things they do not understand
  chosen_spanish: de cosas que no entienden
  alternatives_spanish:
  - en asuntos que ignoran
  - acerca de lo que no saben
  lexicon: BDAG
  rationale: El relativo neutro plural apunta a cosas o asuntos. "De cosas que no entienden" es idiomático en español y conserva la referencia a materias sobre las que hablan sin comprensión.
- source_word: βλασφημοῦντες
  english_pob_choice: blaspheming
  chosen_spanish: blasfemando
  alternatives_spanish:
  - injuriando
  - ultrajando
  - calumniando
  lexicon: BDAG
  rationale: El término griego puede abarcar habla ofensiva o blasfema. "Blasfemando" preserva la fuerza más intensa del verbo y evita suavizar el reproche.
- source_word: ἐν τῇ φθορᾷ αὐτῶν
  english_pob_choice: in their destruction
  chosen_spanish: en su destrucción
  alternatives_spanish:
  - en su ruina
  - en su corrupción
  lexicon: BDAG
  rationale: En este contexto φθορά enlaza con la ruina anunciada antes y con el verbo final. "Destrucción" mantiene el juego verbal con el siguiente futuro pasivo y evita reducirlo a decadencia moral.
- source_word: καὶ φθαρήσονται
  english_pob_choice: will also be destroyed
  chosen_spanish: también serán destruidos
  alternatives_spanish:
  - también perecerán
  - también serán corrompidos
  lexicon: BDAG
  rationale: El futuro pasivo de φθείρω aquí expresa destrucción o ruina. "También" refleja καί y conserva la repetición deliberada del campo semántico de destrucción.
theological_decisions:
- issue: Fuerza de βλασφημοῦντες
  english_pob_reading: Retain the stronger term 'blaspheming' rather than softening to 'reviling.'
  chosen_spanish_reading: Conservar "blasfemando" en vez de suavizarlo a "injuriando" o "calumniando".
  alternative_spanish_readings:
  - injuriando
  - calumniando
  - ultrajando
  rationale: El texto denuncia un habla gravemente impía. Mantener "blasfemando" evita minimizar la severidad y no especifica más de lo que el griego permite.
  doctrine_reference: Translation philosophy §1, §3
- issue: Sentido de φθορά / φθαρήσονται
  english_pob_reading: Render the cluster with 'destruction' language rather than moral 'corruption.'
  chosen_spanish_reading: Traducir el conjunto con lenguaje de "destrucción" y "destruidos".
  alternative_spanish_readings:
  - corrupción
  - ruina
  - podredumbre
  rationale: La frase usa un juego de palabras entre el sustantivo y el verbo, pero el contexto inmediato habla de animales atrapados y perdidos. "Destrucción" preserva el aviso judicial sin imponer una lectura meramente moral.
  doctrine_reference: Translation philosophy §1, §5
translation_notes:
  revision_awareness: La revisión más reciente indicó que no eran necesarios cambios; este borrador mantiene la lectura del audit trail inglés con equivalencia óptima y conserva el juego verbal de φθορά / φθαρήσονται sin suavizar la advertencia.
  spanish_consistency_notes:
  - Se usa "animales irracionales" para ἄλογα ζῷα, siguiendo la decisión léxica auditada.
  - '"Criaturas de instinto" refleja el valor de φυσικὰ sin traducir mecánicamente la estructura griega.'
  - '"Presa y destrucción" mantiene el paralelismo con el doble campo semántico de captura/ruina.'
  - '"Blasfemando" conserva la intensidad del verbo griego y la decisión teológica del POB.'
  - '"Destrucción" se mantiene para φθορά y φθαρήσονται a fin de preservar la reiteración retórica.'
