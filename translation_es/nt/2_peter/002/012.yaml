  text: οὗτοι δέ, ὡς ἄλογα ζῷα ⸂γεγεννημένα φυσικὰ⸃ εἰς ἅλωσιν καὶ φθοράν, ἐν οἷς ἀγνοοῦσιν βλασφημοῦντες, ἐν τῇ φθορᾷ αὐτῶν ⸂καὶ φθαρήσονται⸃,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/012.yaml
  text: But these[a], like irrational animals—creatures of instinct, born for capture and destruction—blaspheming about things they do not understand, will also be destroyed in their destruction[d][c][b],
