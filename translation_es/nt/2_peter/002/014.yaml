translation:
  language: es
  text: con ojos llenos de una adúltera[a] y sin cesar de pecar[b], atrayendo almas inestables, con un corazón ejercitado en la avaricia, hijos de maldición,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O, más interpretativamente, «llenos de adulterio» o «llenos de deseo adúltero». El griego dice literalmente «llenos de una adúltera», un giro muy vívido.
    reason: lexical_alternative
  - marker: b
    text: O «incapaces de dejar de pecar». La expresión también puede entenderse como «sin cesar en el pecado».
    reason: lexical_alternative
lexical_decisions:
- source_word: μεστοὺς μοιχαλίδος
  english_pob_choice: full of an adulteress
  chosen_spanish: llenos de una adúltera
  alternatives_spanish:
  - llenos de adulterio
  - llenos de deseo adultero
  lexicon: BDAG
  rationale: El griego es literalmente ‘llenos de una adúltera’, con un genitivo singular femenino que conserva una imagen concreta y sorprendente. Mantengo esa concreción en español para respetar la fuerza del original, en vez de suavizarla inmediatamente a una idea abstracta como ‘adulterio’.
- source_word: ἀκαταπαύστους ἁμαρτίας
  english_pob_choice: unceasing in sin
  chosen_spanish: sin cesar en el pecado
  alternatives_spanish:
  - incapaces de dejar de pecar
  - sin cesar de pecar
  lexicon: BDAG
  rationale: La fuerza básica es ‘no cesar’ o ‘sin descanso’ respecto del pecado. Opto por una formulación natural en español que conserve la idea de persistencia continua, sin reinterpretar el participio como una cualidad distinta.
- source_word: δελεάζοντες
  english_pob_choice: enticing
  chosen_spanish: seduciendo
  alternatives_spanish:
  - atrayendo
  - engañando
  lexicon: BDAG
  rationale: El verbo tiene matiz de atraer con engaño o con un cebo. ‘Seduciendo’ comunica bien la acción de atracción moralmente perversa y encaja con el tono denunciatorio del pasaje.
- source_word: ψυχὰς ἀστηρίκτους
  english_pob_choice: unstable souls
  chosen_spanish: almas inestables
  alternatives_spanish:
  - almas vacilantes
  - personas inestables
  lexicon: BDAG
  rationale: ψυχή aquí puede referirse a personas en su vida interior o moral; ‘almas’ mantiene la forma tradicional sin perder claridad. ἀστήρικτος expresa falta de firmeza; ‘inestables’ lo comunica de manera directa en español.
- source_word: καρδίαν γεγυμνασμένην πλεονεξίας
  english_pob_choice: a heart trained in greed
  chosen_spanish: con un corazón ejercitado en la avaricia
  alternatives_spanish:
  - con un corazón entrenado en la codicia
  - con un corazón ejercitado en la codicia
  lexicon: BDAG
  rationale: γεγυμνασμένην alude a entrenamiento o práctica habitual; ‘ejercitado’ conserva esa idea. πλεονεξία puede ser ‘avaricia’ o ‘codicia’; elijo ‘avaricia’ por su resonancia moral y porque expresa bien el vicio de desear más de lo debido.
- source_word: κατάρας τέκνα
  english_pob_choice: children of a curse
  chosen_spanish: hijos de maldición
  alternatives_spanish:
  - hijos de una maldición
  - hijos malditos
  lexicon: BDAG
  rationale: Conservo la construcción genitiva como una expresión semítica de pertenencia o caracterización. ‘Hijos de maldición’ mantiene la dureza del original mejor que la simple adjetivación ‘malditos’.
theological_decisions:
- issue: Cómo conservar la imaginería sexual de μοιχαλίδος sin volverla más abstracta
  english_pob_reading: Preserve the concrete image 'an adulteress' in the main text
  chosen_spanish_reading: Preservar ‘una adúltera’ en el texto principal
  alternative_spanish_readings:
  - ‘adulterio’
  - ‘deseo adultero’
  rationale: 'No hay una cuestión doctrinal en disputa, pero sí una tensión lexical importante: el griego es deliberadamente vívido y no meramente conceptual. Mantener la imagen concreta evita aplanar el tono profético de la reprensión.'
  doctrine_reference: Translation philosophy §1
- issue: 'Cómo reflejar ἀκαταπαύστους ἁμαρτίας: continuidad del pecado o incapacidad de cesar'
  english_pob_reading: unceasing in sin
  chosen_spanish_reading: sin cesar en el pecado
  alternative_spanish_readings:
  - incapaces de dejar de pecar
  - sin cesar de pecar
  rationale: La frase puede leerse como persistencia continua en el pecado o como incapacidad para detenerse. La redacción elegida mantiene abierta esa tensión sin imponer una lectura más psicológica que la del griego.
  doctrine_reference: Translation philosophy §6
translation_notes:
  revision_awareness: Se tomó en cuenta la revisión más reciente del audit trail inglés, que ajustó ἀκαταπαύστους ἁμαρτίας de una idea de ‘insaciable para el pecado’ a ‘sin cesar en el pecado’ para acercarse más al sentido de ‘no cesar de pecar’. La redacción española sigue esa corrección, pero conserva la ambigüedad práctica entre continuidad activa e incapacidad de cesar. También se preservó la imaginería concreta de μοιχαλίδος, la progresión retórica de los participios y el paralelismo final de pertenencia (‘hijos de maldición’).
  spanish_consistency_notes:
  - Se mantiene ‘almas’ para ψυχαί por coherencia con el registro bíblico y porque el contexto moral lo permite.
  - Se prefirió ‘avaricia’ sobre ‘codicia’ para πλεονεξία por claridad y tono moral, sin perder el sentido de deseo desmedido.
  - ‘Seduciendo’ mantiene el matiz de atracción engañosa de δελεάζοντες y combina bien con ‘almas inestables’.
  - La puntuación imita la acumulación participial del griego con una sola cadena descriptiva.
  - La nota a conserva el valor de la expresión literal sin obligar al lector a una interpretación única.
