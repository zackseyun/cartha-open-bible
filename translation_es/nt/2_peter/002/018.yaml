    text: Or 'speaking boastful words of emptiness.'
    reason: lexical_alternative
  - marker: b
    text: Or 'by desires of the flesh'; the Greek σάρξ here is rendered metaphorically in a moral sense as 'fleshly.'
    reason: lexical_alternative
  - marker: c
    text: Or 'those who are just now escaping from those who live in error.'
    reason: alternative_reading
  - marker: d
    text: Or 'by fleshly desires, by sensuality'.
    reason: previous_rendering
