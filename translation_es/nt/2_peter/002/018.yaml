revisions:
- from: Porque, hablando palabras infladas de vacío, seducen por deseos carnales y sensualidad a los que apenas escapan de los que andan en error.
  to: Porque, hablando palabras infladas y vacías, atraen por deseos carnales y sensualidad a los que apenas escapan de los que andan en error.
  rationale: 'Se hicieron dos ajustes menores: (1) ''de vacío'' se cambió a ''y vacías'' para lograr español más natural sin perder el valor semántico de ματαιότητος; (2) ''seducen'' se cambió a ''atraen'' para reflejar mejor el sentido más amplio de δελεάζουσιν como atraer con señuelo, no solo seducir sexualmente. No se requieren notas adicionales.'
