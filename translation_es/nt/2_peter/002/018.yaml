review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español refleja bien la estructura y el sentido general del griego: discurso pomposo y vacío, acción de atraer por medio de deseos carnales y sensualidad, y víctimas que apenas están escapando de quienes viven en error. Sin embargo, ''de vacío'' suena poco idiomático en español bíblico natural, y ''seducen'' puede estrechar δελεάζουσιν hacia lo sexual, cuando el verbo es más amplio: atraer con señuelo.'
  spanish_quality_summary: El texto es legible, pero requiere un ajuste menor para sonar más natural y preciso en español neutral. 'Palabras infladas y vacías' fluye mejor que 'palabras infladas de vacío', y 'atraen' evita una sobreespecificación semántica de 'seducen' sin perder la fuerza de engaño en contexto.
  glossary_alignment: Buen manejo de σάρξ como 'carnales'. No hay conflictos con la terminología principal del proyecto. La revisión propuesta preserva la metáfora moral de 'carne' y mantiene la tensión teológica documentada sobre los que 'apenas escapan'.
  issues:
  - severity: medium
    issue: La expresión 'palabras infladas de vacío' es poco natural en español.
    rationale: Aunque intenta reflejar el genitivo ματαιότητος, en español suena forzada. 'Palabras infladas y vacías' comunica con claridad la pomposidad y falta de sustancia del original sin perder sentido.
  - severity: medium
    issue: '''Seducen'' puede reducir δελεάζουσιν a un matiz principalmente sexual.'
    rationale: El contexto sí incluye sensualidad, pero el verbo en sí significa atraer o cebar con engaño. 'Atraen' o 'tienden una trampa' sería más amplio; 'atraen' es la opción más natural y sobria aquí.
  revised_spanish_text: Porque, hablando palabras infladas y vacías, atraen por deseos carnales y sensualidad a los que apenas escapan de los que andan en error.
  revision_rationale: 'Se hicieron dos ajustes menores: (1) ''de vacío'' se cambió a ''y vacías'' para lograr español más natural sin perder el valor semántico de ματαιότητος; (2) ''seducen'' se cambió a ''atraen'' para reflejar mejor el sentido más amplio de δελεάζουσιν como atraer con señuelo, no solo seducir sexualmente. No se requieren notas adicionales.'
