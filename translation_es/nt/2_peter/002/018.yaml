  text: ὑπέρογκα γὰρ ματαιότητος φθεγγόμενοι δελεάζουσιν ἐν ἐπιθυμίαις σαρκὸς ἀσελγείαις τοὺς ⸀ὀλίγως ⸀ἀποφεύγοντας τοὺς ἐν πλάνῃ ἀναστρεφομένους,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/018.yaml
  text: For[a], speaking inflated words of emptiness, they entice by fleshly desires and sensuality those who are barely escaping from those who live in error[d][c][b],
  footnotes:
