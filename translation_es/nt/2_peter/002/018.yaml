translation:
  language: es
  text: Porque, hablando palabras infladas y vacías, atraen por deseos carnales y sensualidad a los que apenas escapan de los que andan en error.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ὑπέρογκα
  english_pob_choice: inflated words
  chosen_spanish: palabras infladas
  alternatives_spanish:
  - palabras altisonantes
  - palabras vanidosas
  - palabras hinchadas
  lexicon: BDAG
  rationale: El adjetivo comunica algo exagerado, pomposo o desmedido. En español, 'palabras infladas' conserva bien la imagen de discurso sobredimensionado y se ajusta al participio de 'hablando' sin añadir contenido ajeno.
- source_word: ματαιότητος
  english_pob_choice: of emptiness
  chosen_spanish: de vacío
  alternatives_spanish:
  - de vanidad
  - de futilidad
  - vacías
  lexicon: BDAG
  rationale: '''Vacío'' mantiene la idea de contenido carente de sustancia y permite una construcción natural en español. Conserva el vínculo genitivo con el discurso sin convertirlo en una mera paráfrasis.'
- source_word: φθεγγόμενοι
  english_pob_choice: speaking
  chosen_spanish: hablando
  alternatives_spanish:
  - pronunciando
  - expresando
  - diciendo
  lexicon: BDAG
  rationale: Es el participio que describe el modo de actuar de esos falsos maestros. 'Hablando' es el equivalente más natural y claro en español contemporáneo.
- source_word: δελεάζουσιν
  english_pob_choice: they entice
  chosen_spanish: seducen
  alternatives_spanish:
  - atraen
  - engañan
  - lurean
  lexicon: BDAG
  rationale: El verbo implica atraer con señuelo o trampa. 'Seducen' conserva la fuerza moral y el matiz de atracción engañosa, y funciona bien con el resto de la oración.
- source_word: ἐν ἐπιθυμίαις σαρκὸς
  english_pob_choice: by fleshly desires
  chosen_spanish: por deseos carnales
  alternatives_spanish:
  - mediante deseos de la carne
  - por deseos de la carne
  - con deseos carnales
  lexicon: BDAG
  rationale: La preposición expresa medio o instrumento. 'Por deseos carnales' es idiomático en español y preserva el sentido metafórico de σάρξ como esfera de deseos desordenados, sin interpretar de más como 'naturaleza pecaminosa'.
- source_word: σάρξ
  english_pob_choice: fleshly
  chosen_spanish: carnales
  alternatives_spanish:
  - de la carne
  - de naturaleza carnal
  - pecaminosos
  lexicon: BDAG
  rationale: En este contexto moral, 'carnales' mantiene la metáfora de la carne y evita una explicación doctrinal más específica que el griego no impone. Responde al uso proyectivo de σάρξ en el pasaje.
- source_word: ἀσελγείαις
  english_pob_choice: sensuality
  chosen_spanish: sensualidad
  alternatives_spanish:
  - desenfreno
  - lascivia
  - incontinencia
  lexicon: BDAG
  rationale: El término señala conducta sexual o moralmente desenfrenada. 'Sensualidad' es comprensible y conserva el campo semántico sin endurecerlo innecesariamente.
- source_word: ὀλίγως
  english_pob_choice: barely
  chosen_spanish: apenas
  alternatives_spanish:
  - casi
  - escasamente
  - por poco
  lexicon: BDAG
  rationale: El adverbio indica una salida precaria, no una liberación segura. 'Apenas' expresa con claridad esa condición frágil y provisional.
- source_word: ἀποφεύγοντας
  english_pob_choice: escaping
  chosen_spanish: escapan
  alternatives_spanish:
  - huyen
  - se apartan
  - van escapando
  lexicon: BDAG
  rationale: El participio presente sugiere acción en curso. 'Escapan' conserva esa progresividad y resulta natural en una subordinada relativa en español.
- source_word: τοὺς ἐν πλάνῃ ἀναστρεφομένους
  english_pob_choice: those who live in error
  chosen_spanish: de los que andan en error
  alternatives_spanish:
  - de los que viven en error
  - de los que se conducen en error
  - de los que andan extraviados
  lexicon: BDAG
  rationale: ἀναστρέφω refiere al modo de vida o conducta habitual, y πλάνη denota error o extravío. 'Andan en error' comunica de manera idiomática una manera de vivir equivocada sin sobreexplicar el matiz.
theological_decisions:
- issue: Sentido de σάρξ en contexto moral
  english_pob_reading: Rendered metaphorically as 'fleshly' rather than literally 'flesh' or more interpretive 'sinful nature.'
  chosen_spanish_reading: '''Carnales'' / ''deseos carnales'' para preservar la metáfora sin introducir una categoría doctrinal adicional.'
  alternative_spanish_readings:
  - de la carne
  - naturaleza pecaminosa
  - pecaminosos
  rationale: El griego usa σάρξ en un marco moral, pero no exige traducirlo como 'naturaleza pecaminosa'. 'Carnales' retiene la metáfora y deja abierta la tensión interpretativa presente en el texto.
  doctrine_reference: 'DOCTRINE.md: Contested terms table for σάρξ'
- issue: Referencia del grupo del que escapan
  english_pob_reading: Those 'barely escaping' from people who live in error.
  chosen_spanish_reading: '''a los que apenas escapan de los que andan en error''.'
  alternative_spanish_readings:
  - a los que apenas escapan del error
  - a los que están escapando de los que andan en error
  - a los que se escapan de los que andan en error
  rationale: La sintaxis favorece entender el participio como describiendo a quienes son el grupo del que se escapa. 'Apenas' conserva la precariedad del escape y no resuelve indebidamente si la liberación ya está completa.
  doctrine_reference: 'DOCTRINE.md: Preserve theological tension rather than resolve it'
translation_notes:
  revision_awareness: El borrador español sigue de cerca la última revisión inglesa que favorece 'by' como medio/instrumento para ἐν, y mantiene la observación de que la frase sobre el escape debe conservar su precariedad sin forzar una lectura soteriológica más definida.
  spanish_consistency_notes:
  - Se mantiene un registro neutral y bíblico, apto para lectura eclesial amplia.
  - '''carnales'' se usa como equivalente metafórico de σάρξ, evitando ''naturaleza pecaminosa'' por ser más interpretativo de lo que el texto requiere.'
  - No se incluyen notas al pie porque el enunciado español no necesita marcadores alternativos para esta versión publication-readable.
