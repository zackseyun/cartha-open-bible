translation:
  language: es
  text: Y por avaricia, con palabras fabricadas, los explotarán[a]. Su juicio desde hace mucho no está ocioso, y su destrucción no está dormida.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: "harán mercancía de ustedes"; el griego usa una metáfora comercial para sacar provecho de las personas.'
    reason: lexical_alternative
lexical_decisions:
- source_word: πλεονεξίᾳ
  english_pob_choice: in greed
  chosen_spanish: por avaricia
  alternatives_spanish:
  - con avaricia
  - en avaricia
  - por codicia
  lexicon: BDAG
  rationale: πλεονεξία expresa avaricia/codicia como motivo o esfera de acción. 'Por avaricia' comunica bien la causalidad moral en español sin perder el matiz de impulso codicioso.
- source_word: πλαστοῖς λόγοις
  english_pob_choice: with fabricated words
  chosen_spanish: con palabras fabricadas
  alternatives_spanish:
  - con palabras falsas
  - con discursos fabricados
  - con palabras inventadas
  lexicon: BDAG
  rationale: πλαστός apunta a algo moldeado, inventado o fabricado. 'Palabras fabricadas' conserva la idea de discurso preparado artificialmente, más preciso que una mera falsedad genérica.
- source_word: ἐμπορεύσονται
  english_pob_choice: they will exploit you
  chosen_spanish: harán negocio de ustedes
  alternatives_spanish:
  - los explotarán
  - harán mercancía de ustedes
  - sacarán provecho de ustedes
  lexicon: BDAG
  rationale: 'El verbo conserva una metáfora comercial: tratar a las personas como objeto de lucro. ''Harán negocio de ustedes'' mantiene esa imagen mercantil en español y deja abierta la alternativa más literal de ''hacer mercancía'', tal como lo documenta la tradición auditada.'
- source_word: κρίμα
  english_pob_choice: judgment
  chosen_spanish: condenación
  alternatives_spanish:
  - juicio
  - sentencia
  - juicio condenatorio
  lexicon: BDAG
  rationale: Aquí κρίμα alude al veredicto/punición asignado a los falsos maestros. 'Condenación' explicita el peso judicial del contexto, sin cerrar indebidamente la amplitud del término.
- source_word: ἔκπαλαι
  english_pob_choice: from long ago
  chosen_spanish: desde hace mucho
  alternatives_spanish:
  - desde antiguo
  - de antiguo
  - desde largo tiempo atrás
  lexicon: BDAG
  rationale: La idea es que la sentencia está establecida desde tiempo antiguo. 'Desde hace mucho' es natural en español y conserva la antigüedad marcada por el adverbio.
- source_word: οὐκ ἀργεῖ
  english_pob_choice: is not idle
  chosen_spanish: no está ociosa
  alternatives_spanish:
  - no está inactiva
  - no está de brazos caídos
  - no se demora
  lexicon: BDAG
  rationale: ἀργέω significa estar ocioso, inactivo o sin efecto. 'No está ociosa' reproduce bien la metáfora de una condenación que no permanece pasiva.
- source_word: ἀπώλεια
  english_pob_choice: destruction
  chosen_spanish: destrucción
  alternatives_spanish:
  - ruina
  - perdición
  lexicon: BDAG
  rationale: ἀπώλεια suele significar destrucción o ruina. 'Destrucción' es la equivalencia más directa y clara en español.
- source_word: οὐ νυστάζει
  english_pob_choice: is not asleep
  chosen_spanish: no se duerme
  alternatives_spanish:
  - no está dormida
  - no adormece
  - no cabecea
  lexicon: BDAG
  rationale: νυστάζω literalmente alude a cabecear o dormitar. 'No se duerme' conserva en español la personificación viva del texto, y corresponde al sentido figurado de no estar retrasada ni inactiva.
theological_decisions:
- issue: Naturaleza de la condenación anunciada
  english_pob_reading: Render the language straightforwardly as impending divine judgment and destruction without specifying a doctrinal system beyond the text.
  chosen_spanish_reading: Traducir de modo directo la condenación y la destrucción venideras, sin definir aquí un sistema doctrinal más allá del texto.
  alternative_spanish_readings:
  - Leer 'destrucción' como aniquilación
  - Leer 'destrucción' como ruina sin juicio final
  rationale: El versículo anuncia con certeza el castigo de los falsos maestros, pero no define por sí mismo el mecanismo ni la duración de ese castigo. La traducción mantiene la advertencia sin resolver una tensión doctrinal que el griego no resuelve explícitamente.
  doctrine_reference: Preservar la tensión teológica en lugar de resolverla
translation_notes:
  revision_awareness: La revisión auditada no introdujo cambios; se conserva la lectura estable del pasaje. La versión española ajusta el registro para que suene natural en español, pero mantiene la metáfora comercial, la fuerza judicial de κρίμα y la personificación de destrucción como algo que no duerme.
  spanish_consistency_notes:
  - Se usa 'Yahvé' solo cuando el texto lo requiera; aquí no aparece.
  - Se preserva el contraste entre condenación judicial y destrucción personificada sin añadir explicaciones doctrinales.
  - '''Palabras fabricadas'' mantiene la cualidad contrived del griego πλαστοῖς λόγοις.'
  - '''Harán negocio de ustedes'' intenta conservar la metáfora económica de ἐμπορεύσονται sin perder inteligibilidad.'
