revisions:
- from: en contraste, los ángeles[a], aunque son mayores en poder y fuerza, no pronuncian contra ellos[b] un juicio blasfemo.
  to: mientras que los ángeles, aunque son superiores en fuerza y poder, no pronuncian contra ellos un juicio injurioso[a].[b]
  rationale: Se ajusta el texto principal para reflejar mejor el sentido contextual de βλάσφημον en español moderno («injurioso»), se mejora la fluidez de ὅπου con «mientras que», se naturaliza la pareja ἰσχύϊ καὶ δυνάμει como «fuerza y poder», y se corrige el anclaje de las notas para que correspondan a las palabras pertinentes.
