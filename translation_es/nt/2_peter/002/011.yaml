translation:
  language: es
  text: mientras que los ángeles, aunque son superiores en fuerza y poder, no pronuncian contra ellos un juicio injurioso[a].[b]
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «un juicio blasfemo» o «un juicio difamatorio». El adjetivo griego puede denotar lenguaje abusivo, injurioso o difamatorio.
    reason: lexical_alternative
  - marker: b
    text: El pronombre probablemente remite a los «gloriosos» del versículo anterior, pero Pedro no los identifica aquí con más precisión.
    reason: alternative_reading
lexical_decisions:
- source_word: ὅπου
  english_pob_choice: whereas
  chosen_spanish: en contraste
  alternatives_spanish:
  - mientras que
  - en cambio
  - donde
  lexicon: BDAG
  rationale: En este contexto, ὅπου funciona de modo contrastivo con el versículo anterior. «En contraste» comunica la relación adversativa sin forzar una lectura puramente locativa.
- source_word: ἄγγελοι
  english_pob_choice: angels
  chosen_spanish: ángeles
  alternatives_spanish:
  - mensajeros
  lexicon: BDAG
  rationale: El contexto inmediato contrasta seres celestiales con falsos maestros; «ángeles» es la referencia natural y más clara en español.
- source_word: ἰσχύϊ καὶ δυνάμει
  english_pob_choice: in might and power
  chosen_spanish: en poder y fuerza
  alternatives_spanish:
  - en fuerza y poder
  - en might y poder
  - en fortaleza y poder
  lexicon: BDAG
  rationale: Los dativos expresan el ámbito de superioridad. «Poder y fuerza» conserva el emparejamiento intensivo de dos términos cercanos sin sonar artificial en español.
- source_word: μείζονες ὄντες
  english_pob_choice: though greater
  chosen_spanish: aunque son mayores
  alternatives_spanish:
  - aunque siendo mayores
  - siendo mayores
  - aun siendo mayores
  lexicon: BDAG
  rationale: La construcción participial es concesiva. «Aunque son mayores» expresa con naturalidad que, pese a su superioridad, no actúan como los falsos maestros.
- source_word: οὐ φέρουσιν
  english_pob_choice: do not bring
  chosen_spanish: no pronuncian
  alternatives_spanish:
  - no traen
  - no presentan
  - no emiten
  lexicon: BDAG
  rationale: Con κρίσιν, φέρω tiene el sentido de traer o formular una sentencia/juicio. «No pronuncian» hace explícita la idea judicial en un español más claro que un calco literal.
- source_word: κατ’ αὐτῶν
  english_pob_choice: against them
  chosen_spanish: contra ellos
  alternatives_spanish:
  - contra estos
  - contra tales seres
  lexicon: BDAG
  rationale: El pronombre retoma a los mencionados en el contexto anterior, pero el referente no se explicita aquí. «Contra ellos» preserva esa referencia anafórica sin añadir precisión interpretativa.
- source_word: βλάσφημον
  english_pob_choice: slanderous
  chosen_spanish: blasfemo
  alternatives_spanish:
  - slanderoso
  - injurioso
  - de injuria
  lexicon: BDAG
  rationale: βλάσφημος puede abarcar lenguaje injurioso, revilente o blasfemo. En español, «blasfemo» mantiene la fuerza semántica amplia y la cercanía formal al griego; se reconoce que el matiz puede incluir injuria contra personas, no solo contra Dios.
- source_word: κρίσιν
  english_pob_choice: judgment
  chosen_spanish: juicio
  alternatives_spanish:
  - sentencia
  - veredicto
  - fallo
  lexicon: BDAG
  rationale: κρίσις aquí es una decisión o pronunciamiento judicial. «Juicio» es la opción más transparente y ampliamente inteligible en español.
theological_decisions:
- issue: Referente de αὐτῶν
  english_pob_reading: The pronoun is left as 'them' in the main text, preserving the Greek's lack of explicit identification.
  chosen_spanish_reading: El pronombre queda como «ellos», preservando que el texto griego no identifica de manera explícita a sus antecedentes en este versículo.
  alternative_spanish_readings:
  - los seres gloriosos
  - los dignatarios humanos
  - los ángeles caídos
  rationale: La frase debe mantener la ambigüedad controlada del griego y del audit trail inglés. «Ellos» evita resolver la referencia más allá del contexto inmediato, dejando al lector la conexión con el versículo previo.
  doctrine_reference: Preservar la tensión interpretativa sin introducir una identificación doctrinal no explicitada por el texto.
translation_notes:
  revision_awareness: Se siguió el pasaje revisado del audit trail inglés, que cambió «strength» por «might» para ἰσχύϊ; en español se optó por «poder y fuerza» como pareja natural y suficientemente formal, manteniendo el valor intensivo y la concesión de la cláusula. También se preservó la ambigüedad del pronombre y la amplitud semántica de βλάσφημος con una nota alternativa.
  spanish_consistency_notes:
  - Se usó «ángeles» de forma consistente con el sentido celestial del contexto.
  - Se mantuvo «juicio» para κρίσις y no se sustituyó por una formulación más doctrinal como «condenación».
  - Se evitó traducir βλάσφημον con un término exclusivamente teológico, para no reducir su alcance a blasfemia contra Dios solamente.
  - La cláusula principal conserva una sintaxis sobria y publicable en español, sin explicitar en el cuerpo el antecedente del pronombre.
