review_pass:
  verdict: revise
  source_alignment_summary: El borrador capta bien la estructura contrastiva, la concesión de μείζονες ὄντες y la referencia anafórica abierta de κατ’ αὐτῶν. Sin embargo, βλάσφημον está mejor representado en este contexto como «injurioso» o «difamatorio» que como «blasfemo», porque en español moderno «blasfemo» suele restringirse a lenguaje contra Dios y puede desalinear el sentido documentado en el audit trail inglés. También conviene mejorar la naturalidad de ἰσχύϊ καὶ δυνάμει como «fuerza y poder» y hacer más idiomático el conector inicial.
  spanish_quality_summary: 'El texto es legible, pero «en contraste» suena algo metadiscursivo; «mientras que» fluye mejor en español bíblico natural. «Mayores en poder y fuerza» es comprensible, aunque «superiores en fuerza y poder» suena más natural con seres personales. La nota al pie a está mal anclada: comenta βλάσφημον/juicio pero el marcador aparece en «ángeles». Además, «revilente» no es forma idiomática estándar; «injurioso» o «difamatorio» es mejor.'
  glossary_alignment: 'No hay conflicto con la terminología principal del proyecto. «Ángeles», «juicio» y el pronombre no especificado están bien. La principal desalineación es léxica/semántica: βλάσφημον no debería quedar como «blasfemo» en el texto principal aquí, dado el razonamiento aprobado por POB.'
  issues:
  - severity: high
    issue: «juicio blasfemo» en el texto principal
    rationale: βλάσφημον aquí describe una acusación/juicio injurioso o difamatorio contra otros. En español moderno «blasfemo» suele entenderse como irreverencia contra Dios, lo que introduce un matiz impropio y contradice la rationale inglesa que prefirió «slanderous» precisamente para evitar esa restricción.
  - severity: medium
    issue: Marcador de nota [a] mal colocado
    rationale: La nota a explica βλάσφημον/«juicio ...», pero el marcador está unido a «ángeles». Los marcadores deben aparecer en la palabra o frase relevante.
  - severity: medium
    issue: «en contraste» poco idiomático para ὅπου
    rationale: Aunque semánticamente posible, suena más a glosa editorial que a texto bíblico fluido. «Mientras que» expresa bien el contraste con naturalidad.
  - severity: low
    issue: «revilente» en la nota al pie
    rationale: No es la opción más natural en español general. «injurioso», «ultrajante» o «difamatorio» comunican mejor el rango semántico.
  revised_spanish_text: mientras que los ángeles, aunque son superiores en fuerza y poder, no pronuncian contra ellos un juicio injurioso[a].[b]
