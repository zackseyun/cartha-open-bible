translation:
  language: es
  text: 'Pero recibió reprensión por su propia transgresión: un animal de carga[a] mudo, hablando con voz humana[b], refrenó la locura del profeta.'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: Literalmente, «un animal de carga»; la referencia es al asno de Balaam (Núm. 22:28–30).
    reason: cross_reference
  - marker: b
    text: O «con voz de hombre». El griego probablemente significa «con voz humana», en contraste con un animal mudo.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἔλεγξιν
  english_pob_choice: a rebuke
  chosen_spanish: reprensión
  alternatives_spanish:
  - reproche
  - censura
  lexicon: BDAG
  rationale: ἔλεγξις expresa censura o reprensión correctiva. «Reprensión» conserva ese valor en español y suena natural en el contexto narrativo.
- source_word: ἰδίας παρανομίας
  english_pob_choice: his own transgression
  chosen_spanish: su propia transgresión
  alternatives_spanish:
  - su propia maldad
  - su propia infracción
  lexicon: BDAG
  rationale: παρανομία denota una conducta contraria a la norma o ley; «transgresión» mantiene la gravedad del acto. «Su propia» refleja ἰδίας y subraya culpabilidad personal.
- source_word: ὑποζύγιον
  english_pob_choice: beast of burden
  chosen_spanish: animal de carga
  alternatives_spanish:
  - bestia de carga
  - burro
  lexicon: BDAG
  rationale: El griego usa un término genérico para un animal de carga. «Animal de carga» preserva esa generalidad en español sin adelantarse al detalle narrativo de Números 22.
- source_word: ἄφωνον
  english_pob_choice: mute
  chosen_spanish: que no podía hablar
  alternatives_spanish:
  - mudo
  - sin voz
  lexicon: BDAG
  rationale: ἄφωνος significa sin voz o sin habla. En español, «mudo» funciona bien, pero la construcción relativa mantiene mejor el contraste irónico con el hecho de que habló. Aun así, se opta por reforzar en la frase principal la imposibilidad habitual del animal de hablar mediante el conjunto «animal de carga... que habló».
- source_word: ἐν ἀνθρώπου φωνῇ
  english_pob_choice: with a human voice
  chosen_spanish: con voz humana
  alternatives_spanish:
  - con voz de hombre
  - en voz humana
  lexicon: BDAG
  rationale: ἄνθρωπος aquí contrasta la voz humana con la mutitud del animal, no el género masculino con otro. «Con voz humana» expresa correctamente esa fuerza y evita una lectura exclusivamente masculina.
- source_word: φθεγξάμενον
  english_pob_choice: speaking
  chosen_spanish: que habló
  alternatives_spanish:
  - que emitió palabra
  - que se expresó
  lexicon: BDAG
  rationale: El participio indica una emisión articulada de voz o habla. «Que habló» es lo más claro y natural en español, y conserva la sorpresa del texto.
- source_word: ἐκώλυσεν
  english_pob_choice: restrained
  chosen_spanish: refrenó
  alternatives_spanish:
  - impidió
  - detuvo
  lexicon: BDAG
  rationale: κωλύω puede significar impedir, detener o refrenar. «Refrenó» mantiene la idea de poner freno a una acción o curso insensato, sin exigir que la acción quedara anulada en cada aspecto.
- source_word: παραφρονίαν
  english_pob_choice: madness
  chosen_spanish: locura
  alternatives_spanish:
  - insensatez
  - demencia
  lexicon: BDAG
  rationale: παραφρονία expresa irracionalidad o locura. «Locura» preserva la fuerza del término con naturalidad en español; no suaviza indebidamente el juicio del texto.
- source_word: τοῦ προφήτου
  english_pob_choice: the prophet’s
  chosen_spanish: del profeta
  alternatives_spanish:
  - del profeta Balaam
  lexicon: BDAG
  rationale: El genitivo es posesivo. «Del profeta» sigue de cerca el griego, sin añadir el nombre propio, aunque el trasfondo narrativo remita a Balaam.
theological_decisions:
- issue: Identificar o no ὑποζύγιον específicamente como el asno de Balaam
  english_pob_reading: Retain the broader 'beast of burden' in the main text
  chosen_spanish_reading: Mantener «animal de carga» en el texto principal
  alternative_spanish_readings:
  - asno
  - burro
  rationale: El alusión a Balaam y su asna en Números 22 es clara, pero el término griego es más general. Se conserva el vocabulario del original en el texto principal y se deja la identificación narrativa en una nota.
  doctrine_reference: Principio de primacía del idioma original y control lexical auditado
- issue: Cómo leer ἐν ἀνθρώπου φωνῇ
  english_pob_reading: human voice
  chosen_spanish_reading: voz humana
  alternative_spanish_readings:
  - voz de hombre
  rationale: Aunque ἀνθρώπου es formalmente masculino singular, aquí su fuerza es antropológica, no de género sexual. «Voz humana» evita restringir indebidamente el contraste entre habla humana y silencio animal.
  doctrine_reference: Precisión semántica del griego frente a calco género-específico
translation_notes:
  revision_awareness: 'La redacción sigue el ajuste revisado en el audit trail: παρανομίας se entiende mejor como «transgresión» en este contexto, no como una noción más general de «maldad» o «ilegalidad». Se mantuvo además la distinción entre el término genérico para el animal de carga y la alusión transparente a Balaam en la nota.'
  spanish_consistency_notes:
  - Se preservó el tono narrativo y forense del versículo sin sobrecargarlo con una paráfrasis interpretativa.
  - «Reprensión» y «transgresión» mantienen una relación natural entre corrección y falta cometida.
  - «Voz humana» evita la falsa precisión de «voz de hombre» como si el contraste fuera de sexo, no de especie.
  - Se usó «locura» para reflejar la fuerza de παραφρονίαν sin atenuación.
  - La nota sobre el animal de carga identifica el trasfondo bíblico sin sustituir el término griego en el texto principal.
