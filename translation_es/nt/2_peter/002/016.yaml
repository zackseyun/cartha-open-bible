  text: ἔλεγξιν δὲ ἔσχεν ἰδίας παρανομίας· ὑποζύγιον ἄφωνον ἐν ἀνθρώπου φωνῇ φθεγξάμενον ἐκώλυσεν τὴν τοῦ προφήτου παραφρονίαν.
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/016.yaml
  text: 'But he received a rebuke for his own transgression: a mute beast of burden[a], speaking with a human voice[b], restrained the prophet’s madness.'
  footnotes:
  - marker: a
    text: Literally 'a beast of burden'; the reference is to Balaam’s donkey (Num 22:28–30).
    reason: cross_reference
  - marker: b
    text: Or 'with a man’s voice.' The Greek likely means 'with a human voice,' contrasting the animal with a human speaker.
    reason: lexical_alternative
