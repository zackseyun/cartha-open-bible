source:
  edition: SBLGNT
  text: Ἐγένοντο δὲ καὶ ψευδοπροφῆται ἐν τῷ λαῷ, ὡς καὶ ἐν ὑμῖν ἔσονται ψευδοδιδάσκαλοι, οἵτινες παρεισάξουσιν αἱρέσεις ἀπωλείας, καὶ τὸν ἀγοράσαντα αὐτοὺς δεσπότην ἀρνούμενοι, ἐπάγοντες ἑαυτοῖς ταχινὴν ἀπώλειαν·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/001.yaml
  text: But false prophets also arose among the people[a], just as there will also be false teachers among you, who will secretly bring in destructive heresies, even denying the Master who bought them[b], bringing swift destruction on themselves.
  footnotes:
  - marker: a
    text: Or 'destructive factions.' The Greek word can denote parties or sects, but here likely refers to teachings or movements that lead to destruction.
    reason: lexical_alternative
  - marker: b
    text: Or 'the Lord who redeemed them.' The Greek says 'the Master who bought them,' preserving a purchase metaphor without resolving broader theological debates about its scope.
    reason: alternative_reading
