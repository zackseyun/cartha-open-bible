translation:
  language: es
  text: Pero también surgieron falsos profetas entre el pueblo,[a] así como también habrá entre ustedes falsos maestros, que introducirán encubiertamente herejías destructivas,[b] y hasta negarán al Amo que los compró,[c] atrayendo sobre sí mismos destrucción repentina.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O 'entre el pueblo de Israel'. El griego dice simplemente 'en el pueblo'; el contexto veterotestamentario apunta al pueblo del pacto, pero el texto no lo especifica de manera explícita.
    reason: alternative_reading
  - marker: b
    text: 'O ''herejías de destrucción''. El genitivo ἀπωλείας puede entenderse como caracterización o resultado: enseñanzas o movimientos que conducen a la ruina.'
    reason: lexical_alternative
  - marker: c
    text: O 'al Señor que los redimió'. El griego dice 'al Amo que los compró', preservando una metáfora de compra sin resolver debates teológicos más amplios sobre su alcance.
    reason: alternative_reading
lexical_decisions:
- source_word: Ἐγένοντο
  english_pob_choice: arose
  chosen_spanish: surgieron
  alternatives_spanish:
  - aparecieron
  - se levantaron
  lexicon: BDAG
  rationale: El aoristo de γίνομαι aquí introduce la aparición histórica de falsos profetas. En español, "surgieron" expresa bien el inicio de su presencia dentro del pueblo sin sonar forzado.
- source_word: ψευδοπροφῆται
  english_pob_choice: false prophets
  chosen_spanish: falsos profetas
  alternatives_spanish:
  - profetas falsos
  lexicon: BDAG
  rationale: Es el equivalente directo y transparente del compuesto griego; mantiene el paralelismo con "falsos maestros".
- source_word: ἐν τῷ λαῷ
  english_pob_choice: among the people
  chosen_spanish: entre el pueblo
  alternatives_spanish:
  - entre la gente
  - en el pueblo
  lexicon: BDAG
  rationale: '"Entre el pueblo" conserva el valor asociativo/local del dativo y evita especificar más de lo que el texto dice en la línea principal.'
- source_word: ὡς καὶ ἐν ὑμῖν ἔσονται
  english_pob_choice: just as there will also be among you
  chosen_spanish: así como también habrá entre ustedes
  alternatives_spanish:
  - de la misma manera habrá también entre ustedes
  - igual que entre ustedes habrá
  lexicon: BDAG
  rationale: Mantiene la comparación con el caso anterior y suena natural en español, sin perder el matiz de continuidad entre pasado y futuro.
- source_word: ψευδοδιδάσκαλοι
  english_pob_choice: false teachers
  chosen_spanish: falsos maestros
  alternatives_spanish:
  - falsos enseñadores
  lexicon: BDAG
  rationale: '"Maestros" es la forma natural y establecida en español bíblico para este oficio o función, y refleja el paralelo con "falsos profetas".'
- source_word: παρεισάξουσιν
  english_pob_choice: will secretly bring in
  chosen_spanish: introducirán encubiertamente
  alternatives_spanish:
  - introducirán en secreto
  - meterán disimuladamente
  lexicon: BDAG
  rationale: El verbo implica introducir algo de manera furtiva; "encubiertamente" conserva el matiz de ocultamiento sin caer en coloquialismo.
- source_word: αἱρέσεις ἀπωλείας
  english_pob_choice: destructive heresies
  chosen_spanish: herejías destructivas
  alternatives_spanish:
  - sectas destructivas
  - doctrinas destructivas
  lexicon: BDAG
  rationale: '"Herejías" preserva la fuerza doctrinal del término en este contexto, y el adjetivo mantiene el valor resultativo/atributivo del genitivo: enseñanzas caracterizadas por la destrucción o que conducen a ella.'
- source_word: τὸν ἀγοράσαντα αὐτοὺς δεσπότην
  english_pob_choice: the Master who bought them
  chosen_spanish: al Dueño que los compró
  alternatives_spanish:
  - al Dueño que los adquirió
  - al Amo que los compró
  lexicon: BDAG
  rationale: Se preserva la metáfora comercial de ἀγοράζω con "compró". Para δεσπότης, "Dueño" comunica autoridad y posesión de modo claro en español, aunque la POB inglesa distingue el título de κύριος con "Master".
- source_word: ἀρνούμενοι
  english_pob_choice: denying
  chosen_spanish: negando
  alternatives_spanish:
  - renegando de
  - rechazando
  lexicon: BDAG
  rationale: Es la equivalencia más directa para el participio y mantiene el peso teológico de la negación del Señor/Dueño.
- source_word: ἐπάγοντες ἑαυτοῖς
  english_pob_choice: bringing on themselves
  chosen_spanish: traerán sobre sí mismos
  alternatives_spanish:
  - acarrearán para sí mismos
  - se impondrán sobre sí mismos
  lexicon: BDAG
  rationale: La expresión refleja bien la consecuencia resultante de sus actos y conserva el sentido reflexivo del griego.
- source_word: ταχινὴν ἀπώλειαν
  english_pob_choice: swift destruction
  chosen_spanish: una destrucción rápida
  alternatives_spanish:
  - una destrucción súbita
  - una ruina pronta
  lexicon: BDAG
  rationale: '"Rápida" conserva la idea de prontitud/imminencia de ταχινή. Se usa "destrucción" para mantener el mismo sustantivo clave que ya aparece en la frase anterior.'
theological_decisions:
- issue: Sentido de αἱρέσεις en este contexto
  english_pob_reading: heresies
  chosen_spanish_reading: herejías
  alternative_spanish_readings:
  - sectas
  - facciones
  rationale: Aunque αἵρεσις puede significar "secta" o "partido", el contexto de introducción encubierta y de negación del Dueño favorece una desviación doctrinal; "herejías" conserva esa gravedad.
  doctrine_reference: Translation philosophy §1, §5
- issue: Tensión en τὸν ἀγοράσαντα αὐτοὺς δεσπότην
  english_pob_reading: the Master who bought them
  chosen_spanish_reading: al Dueño que los compró
  alternative_spanish_readings:
  - al Señor que los redimió
  - al Dueño que los adquirió
  rationale: Se mantiene la metáfora de compra sin resolverla hacia "redimió", para no cerrar la tensión teológica del texto. "Dueño" traduce el matiz de δεσπότης con autoridad y pertenencia.
  doctrine_reference: Translation philosophy §3
- issue: Distinguir δεσπότης de κύριος
  english_pob_reading: Master
  chosen_spanish_reading: Dueño
  alternative_spanish_readings:
  - Amo
  - Señor
  rationale: El griego usa δεσπότης, no κύριος. En español, "Dueño" preserva la idea de posesión/autoridad y evita confundir este título con "Señor".
  doctrine_reference: Translation philosophy §2, §5
translation_notes:
  revision_awareness: La redacción sigue de cerca el paquete griego y coincide con el audit trail inglés en el valor de γίνομαι='surgir', ψευδοπροφῆται/ψευδοδιδάσκαλοι='falsos profetas/maestros', παρεισάξουσιν='introducirán encubiertamente', αἱρέσεις ἀπωλείας='herejías destructivas' y la metáfora de compra en ἀγοράσαντα. Se decidió 'Dueño' para δεσπότης por claridad natural en español, manteniendo la distinción lexical con κύριος y la tensión teológica sobre el alcance de 'compró'.
  spanish_consistency_notes:
  - Se mantiene el paralelismo 'falsos profetas / falsos maestros' con registro bíblico contemporáneo.
  - '''Entre el pueblo'' y ''entre ustedes'' conservan el contraste entre el pasado de Israel y la comunidad destinataria.'
  - Se evita 'SEÑOR' como máscara para δεσπότης; el título se traduce según su matiz de posesión/autoridad.
  - '''Destrucción'' se usa de forma consistente para ἀπώλεια en ambas ocurrencias del versículo.'
