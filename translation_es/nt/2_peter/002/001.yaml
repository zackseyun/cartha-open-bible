revisions:
- from: Pero también surgieron falsos profetas entre el pueblo[a], así como también habrá entre ustedes falsos maestros, que introducirán encubiertamente herejías destructivas[b] y, negando al Dueño que los compró, traerán sobre sí mismos una destrucción rápida.
  to: Pero también surgieron falsos profetas entre el pueblo,[a] así como también habrá entre ustedes falsos maestros, que introducirán encubiertamente herejías destructivas,[b] y hasta negarán al Amo que los compró,[c] atrayendo sobre sí mismos destrucción repentina.
  rationale: Se ajusta δεσπότης de 'Dueño' a 'Amo' para reflejar mejor la decisión léxica del POB y sonar más natural en español bíblico, manteniendo la distinción con κύριος. Se añade la nota alternativa sobre 'Señor que los redimió' porque forma parte del razonamiento auditado en inglés y es teológicamente relevante. También se corrige la puntuación/estilo de la nota sobre αἱρέσεις ἀπωλείας. Se mantiene el resto de la estructura, con un leve ajuste a 'hasta negarán' y 'destrucción repentina' para mayor naturalidad sin apartarse del sentido griego.
