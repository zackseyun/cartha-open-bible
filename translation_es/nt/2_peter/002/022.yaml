translation:
  language: es
  text: 'Les ha acontecido lo que dice el verdadero proverbio[a]: «El perro vuelve a su propio vómito»[b], y «la cerda lavada vuelve a revolcarse en el barro».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O, de manera más formal: «Les ha acontecido la palabra del verdadero proverbio».'
    reason: lexical_alternative
  - marker: b
    text: Literalmente, «Perro, habiendo vuelto a su propio vómito ... y cerda lavada a revolcarse en el barro». La primera línea alude a Proverbios 26:11.
    reason: cross_reference
lexical_decisions:
- source_word: συμβέβηκεν
  english_pob_choice: has happened
  chosen_spanish: les ha acontecido
  alternatives_spanish:
  - les ha sucedido
  - les ha pasado
  lexicon: BDAG
  rationale: El perfecto griego expresa un hecho ocurrido con resultado presente. «Ha acontecido» conserva ese valor resultativo y suena natural en español bíblico actual.
- source_word: αὐτοῖς
  english_pob_choice: to them
  chosen_spanish: les
  alternatives_spanish:
  - a ellos
  - para ellos
  lexicon: BDAG
  rationale: El dativo señala a quienes se aplica el proverbio. El clítico «les» es la forma más natural en español dentro de la oración.
- source_word: τὸ τῆς ἀληθοῦς παροιμίας
  english_pob_choice: what the true proverb says
  chosen_spanish: lo que dice el verdadero proverbio
  alternatives_spanish:
  - la palabra del verdadero proverbio
  - el verdadero proverbio
  lexicon: BDAG
  rationale: La construcción es elíptica. «Lo que dice el verdadero proverbio» explicita con claridad el contenido proverbial sin perder la estructura del griego.
- source_word: ἀληθοῦς
  english_pob_choice: 'true'
  chosen_spanish: verdadero
  alternatives_spanish:
  - auténtico
  - real
  lexicon: BDAG
  rationale: «Verdadero» es el equivalente directo y mantiene la fuerza proverbial de la expresión.
- source_word: παροιμίας
  english_pob_choice: proverb
  chosen_spanish: proverbio
  alternatives_spanish:
  - refrán
  - dicho
  lexicon: BDAG
  rationale: «Proverbio» es la opción más precisa y natural en este contexto sapiencial.
- source_word: Κύων
  english_pob_choice: A dog
  chosen_spanish: El perro
  alternatives_spanish:
  - Un perro
  lexicon: BDAG
  rationale: El griego usa un nominativo proverbial genérico. En español, el artículo definido funciona bien como tipo representativo dentro del dicho citado.
- source_word: ἐπιστρέψας
  english_pob_choice: after returning
  chosen_spanish: vuelve
  alternatives_spanish:
  - después de volver
  - habiendo vuelto
  lexicon: BDAG
  rationale: Aunque el participio aoristo marca anterioridad, el español proverbial fluye mejor con un verbo finito. «Vuelve» comunica el sentido establecido por el paralelo proverbial sin sobrecargar la frase.
- source_word: ἐπὶ τὸ ἴδιον ἐξέραμα
  english_pob_choice: to its own vomit
  chosen_spanish: a su propio vómito
  alternatives_spanish:
  - sobre su propio vómito
  - a su vómito
  lexicon: BDAG
  rationale: «A su propio vómito» conserva ἴδιον («propio») y el movimiento del giro preposicional. «Vómito» es la traducción directa de ἐξέραμα.
- source_word: Ὗς
  english_pob_choice: a sow
  chosen_spanish: la cerda
  alternatives_spanish:
  - la puerca
  - la marrana
  lexicon: BDAG
  rationale: ὗς es femenino y designa una cerda/puerca. «Cerda» mantiene el matiz femenino explícito del griego y la imagen proverbial.
- source_word: λουσαμένη
  english_pob_choice: washed
  chosen_spanish: lavada
  alternatives_spanish:
  - bañada
  - habiendo sido lavada
  lexicon: BDAG
  rationale: El participio describe a la cerda como lavada. «Lavada» preserva la brevedad proverbial y la pasiva implícita.
- source_word: εἰς κυλισμὸν βορβόρου
  english_pob_choice: to wallowing in the mud
  chosen_spanish: vuelve a revolcarse en el barro
  alternatives_spanish:
  - vuelve al revolcarse en el cieno
  - vuelve al barro del revolcarse
  lexicon: BDAG
  rationale: κυλισμός expresa el acto de revolcarse/wallowing; βόρβορος es barro, cieno o lodo. «Revolcarse en el barro» es natural y conserva la imagen corporal y degradante del texto.
theological_decisions:
- issue: Cita proverbial y fuerza exhortativa
  english_pob_reading: The verse states that the content of the proverb has proved true in the false teachers' case, without adding doctrinal explanation beyond the image of relapse.
  chosen_spanish_reading: El versículo afirma que el contenido del proverbio se cumple en ellos, sin desarrollar más la imagen de recaída.
  alternative_spanish_readings:
  - El verdadero proverbio mismo les ha acontecido
  - Lo dicho por el verdadero proverbio se aplica a ellos
  rationale: La elipsis del griego permite varias formulaciones. La elegida mantiene el valor de cumplimiento aplicable a ellos y evita añadir explicaciones doctrinales no presentes en el texto.
  doctrine_reference: POB translation philosophy; warning context in 2 Pedro 2
- issue: Imagen de retorno a la inmundicia
  english_pob_reading: A dog returns to its own vomit, and a washed sow returns to wallowing in the mud.
  chosen_spanish_reading: Un perro vuelve a su propio vómito, y una cerda lavada vuelve a revolcarse en el barro.
  alternative_spanish_readings:
  - Un perro retorna a su propio vómito, y una cerda lavada retorna a revolcarse en el cieno
  rationale: La metáfora expresa recaída moral mediante una imagen proverbial de repugnancia. Se preserva sin suavizarla ni convertirla en un comentario abstracto.
  doctrine_reference: Proverbios 26:11; 2 Pedro 2:20-22
translation_notes:
  revision_awareness: La versión inglesa más reciente eliminó el participio pesado en la primera línea y completó el paralelismo con un verbo finito en la segunda. La redacción española sigue ese mismo ajuste para lograr naturalidad, manteniendo el eco proverbial y el paralelismo entre perro/cerda, vómito/barro.
  spanish_consistency_notes:
  - Se usa «Yahvé» solo cuando aparezca el nombre divino; este versículo no lo contiene.
  - Se mantiene el lenguaje proverbial concreto («perro», «cerda», «vómito», «barro») sin suavizarlo.
  - Se evita «Cristo»/«Mesías» porque el pasaje no los usa.
  - No se introduce un vocabulario eclesiástico no requerido por el griego.
