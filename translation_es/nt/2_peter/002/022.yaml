base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/022.yaml
  text: 'What the true proverb says has happened to them: “A dog returns to its own vomit,” and[b][a], “A washed sow returns to wallowing in the mud.”'
  footnotes:
  - marker: a
    text: Or, more formally, “The word of the true proverb has happened to them.”
    reason: lexical_alternative
  - marker: b
    text: Literally, “A dog, having returned to its own vomit … and a washed sow to wallowing in the mud.” The first line echoes Proverbs 26:11.
    reason: cross_reference
