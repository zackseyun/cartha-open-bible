    unchanged: false
    changes_summary: Replaced 'by the lawless in their sensual way of life' with 'by the sensual conduct of the lawless' to reflect the Greek structure more directly and formally, with ἀναστροφῆς as 'conduct' and ἐν ἀσελγείᾳ as 'sensual.'
translation:
  language: es
  text: y rescató al justo Lot, que era atormentado por la conducta sensual[a] de los malvados[b]—
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «licenciosa» o «depravada», destacando un exceso moral desvergonzado.
    reason: lexical_alternative
  - marker: b
    text: O «los sin ley»; el término griego señala a quienes desprecian lo que es recto o establecido.
    reason: lexical_alternative
lexical_decisions:
- source_word: καὶ
  english_pob_choice: and
  chosen_spanish: y
  alternatives_spanish:
  - e
  - también
  lexicon: conjunción coordinante
  rationale: Conserva la simple coordinación del griego y enlaza naturalmente con el contexto inmediato.
- source_word: δίκαιον
  english_pob_choice: righteous
  chosen_spanish: el justo
  alternatives_spanish:
  - justo
  - recto
  lexicon: BDAG
  rationale: '''Justo'' reproduce el valor evaluativo de δίκαιος sin sonar forzado en español; el artículo ayuda a que funcione como aposición descriptiva de Lot.'
- source_word: Λὼτ
  english_pob_choice: Lot
  chosen_spanish: Lot
  lexicon: nombre propio
  rationale: Se translitera el nombre propio según el uso bíblico estándar en español.
- source_word: καταπονούμενον
  english_pob_choice: was being tormented
  chosen_spanish: era atormentado
  alternatives_spanish:
  - era oprimido
  - era afligido
  - era acosado
  lexicon: BDAG
  rationale: El participio pasivo imperfectivo exige una acción continua; 'era atormentado' conserva la intensidad del maltrato o aflicción continua.
- source_word: ὑπὸ τῆς ... ἀναστροφῆς
  english_pob_choice: by ... conduct
  chosen_spanish: por la conducta
  alternatives_spanish:
  - por el proceder
  - por la manera de vivir
  - por el comportamiento
  lexicon: BDAG
  rationale: '''Conducta'' refleja bien ἀναστροφή y resulta natural en español; mantiene la relación causal del complemento con el tormento de Lot.'
- source_word: τῶν ἀθέσμων
  english_pob_choice: the lawless
  chosen_spanish: de los impíos
  alternatives_spanish:
  - de los sin ley
  - de los injustos
  - de los transgresores
  lexicon: BDAG
  rationale: '''Impíos'' comunica el campo moral-religioso de ἄθεσμος en un español bíblico claro; evita una expresión demasiado técnica como ''sin ley'' y conserva el contraste ético del contexto.'
- source_word: ἐν ἀσελγείᾳ
  english_pob_choice: sensual
  chosen_spanish: sensual
  alternatives_spanish:
  - lasciva
  - licenciosa
  - desenfrenada
  lexicon: BDAG
  rationale: '''Sensual'' sigue el valor señalado por el texto fuente y la auditoría inglesa; en español conserva la idea de exceso moral sin añadir un juicio más fuerte de lo que el griego requiere.'
- source_word: ἐρρύσατο
  english_pob_choice: he rescued
  chosen_spanish: rescató
  alternatives_spanish:
  - libró
  - salvó
  - liberó
  lexicon: BDAG
  rationale: '''Rescató'' expresa con claridad la acción puntual de ῥύομαι y funciona bien en castellano contemporáneo.'
theological_decisions:
- issue: Descripción moral de Lot
  english_pob_reading: Retain the explicit description 'righteous Lot' without softening or qualifying it.
  chosen_spanish_reading: Conservar la designación explícita 'el justo Lot' sin atenuarla.
  alternative_spanish_readings:
  - '''Lot, un hombre justo'''
  - omitir el adjetivo por dificultad narrativa
  rationale: El griego aplica δίκαιος a Lot de forma directa; la traducción debe preservar esa valoración textual sin armonizarla con reservas narrativas de Génesis.
  doctrine_reference: Affirmations; Translation philosophy §§1, 3
translation_notes:
  revision_awareness: 'La redacción sigue la última revisión inglesa al reflejar más directamente la estructura griega: ''por la conducta sensual de los impíos'', manteniendo ἀναστροφή como ''conducta'' y ἀσέλγεια como ''sensual''. No se añadieron notas porque no hay ambigüedad textual que exigiría marcadores en el texto español.'
  spanish_consistency_notes:
  - Se evitó 'SEÑOR' u otra sustitución porque no aparece el Tetragrámaton en este versículo.
  - Se prefirió 'impíos' para ἄθεσμοι por naturalidad bíblica en español, manteniendo el peso moral del término.
  - '''Rescató'' y ''era atormentado'' preservan respectivamente la acción puntual del aoristo y la duratividad del participio pasivo.'
