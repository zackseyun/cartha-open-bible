  text: καὶ δίκαιον Λὼτ καταπονούμενον ὑπὸ τῆς τῶν ἀθέσμων ἐν ἀσελγείᾳ ἀναστροφῆς ἐρρύσατο—
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/007.yaml
  text: and he rescued righteous Lot[c][b][a], who was being tormented by the sensual conduct of the lawless—
  footnotes:
  - marker: a
    text: Or 'was being oppressed' or 'was being distressed.'
    reason: lexical_alternative
  - marker: b
    text: Or 'conduct' or 'behavior' for 'way of life.'
    reason: lexical_alternative
  - marker: c
    text: '''Sensual'' translates a term that can also be rendered ''licentious'' or ''debauched,'' emphasizing shameless moral excess.'
    reason: lexical_alternative
  ai_draft:
    model_id: gpt-5.4
    model_version: gpt-5.4-2026-03-05
    prompt_id: nt_draft_v1
    prompt_sha256: e0b5b456ba9f59d8e23a6921d4d772d5ee07058bc0b13231898fd62df2fbf02b
    timestamp: '2026-04-19T00:24:37Z'
    output_hash: 12253b60f122439a229d4859b3e710c822a521994c0a4e870a9f9ebcae58144f
    temperature: 0.2
  revision_pass:
    model: gpt-5.4
