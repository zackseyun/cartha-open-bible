review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien la estructura general y la mayoría de las decisiones léxicas del griego: πηγαὶ ἄνυδροι como imagen de fuentes/manantiales sin agua, ὁμίχλαι como nieblas, ὑπὸ λαίλαπος ἐλαυνόμεναι como arrastradas/llevadas por una tormenta, y la pasiva impersonal de τετήρηται sin explicitar agente divino. Sin embargo, falla en un punto importante de referencia personal: οἷς debe sonar claramente personal (''para quienes''), no impersonal (''para los cuales''), y la cláusula final española actual suena rígida y menos natural de lo debido.'
  spanish_quality_summary: 'El español es comprensible, pero ''para los cuales'' resulta poco natural y algo mecánico en registro bíblico contemporáneo. ''La negrura de la oscuridad'' es defendible, pero suena pesada; ''la densa oscuridad'' aclararía, aunque se perdería la construcción de dos términos preservada por POB. Una mejora moderada conserva fidelidad y aumenta legibilidad: ''para quienes ha sido reservada la negrura de la oscuridad.'''
  glossary_alignment: No hay conflictos con la terminología principal del proyecto. La elección de 'nieblas' concuerda con la decisión auditada sobre ὁμίχλαι. La pasiva de juicio sin nombrar a Dios también está correctamente preservada. La revisión recomendada ajusta solo la referencia personal de οἷς y la naturalidad de τηρέω en contexto judicial mediante 'reservada', ya permitida en el audit trail.
  issues:
  - severity: medium
    issue: Referencia personal de οἷς traducida como 'para los cuales'
    rationale: Aunque gramaticalmente posible, 'para los cuales' suena impersonal y torpe en español, y no comunica tan claramente como 'para quienes' que el relativo apunta a personas (los falsos maestros), no a 'fuentes' o 'nieblas'.
  - severity: low
    issue: '''Ha sido guardada'' en la cláusula final suena menos idiomático en contexto de juicio'
    rationale: El inglés POB prefirió 'has been kept', pero también documentó 'reserved' como alternativa válida. En español bíblico natural, 'ha sido reservada' comunica mejor la idea judicial de algo guardado para castigo, sin añadir agente.
  revised_spanish_text: Éstos son fuentes sin agua y nieblas[a] llevadas por una tormenta, para quienes ha sido reservada la negrura de la oscuridad.
  revised_footnotes:
  - marker: a
    text: O “nubes llevadas por una tormenta”. El término griego denota con más precisión “nieblas” o “bruma”, aunque algunas traducciones lo amplían a “nubes”.
    reason: lexical_alternative
  revision_rationale: La revisión conserva las decisiones léxicas centrales del audit trail, pero corrige la referencia personal de οἷς con 'para quienes', más fiel y natural en español, y sustituye 'ha sido guardada' por 'ha sido reservada', que suena más idiomático en un contexto de juicio sin alterar la pasiva ni introducir agente explícito. Se mantiene la nota sobre 'nieblas'/'nubes' porque refleja una alternativa léxica documentada en la POB inglesa.
