translation:
  language: es
  text: Éstos son fuentes sin agua y nieblas[a] llevadas por una tormenta, para quienes ha sido reservada la negrura de la oscuridad.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O “nubes llevadas por una tormenta”. El término griego denota con más precisión “nieblas” o “bruma”, aunque algunas traducciones lo amplían a “nubes”.
    reason: lexical_alternative
lexical_decisions:
- source_word: πηγαὶ ἄνυδροι
  english_pob_choice: waterless springs
  chosen_spanish: fuentes sin agua
  alternatives_spanish:
  - manantiales sin agua
  - fuentes secas
  lexicon: BDAG
  rationale: πηγή designa una fuente o manantial; en español, "fuentes" comunica bien la imagen natural. ἄνυδρος significa carente de agua, por eso "sin agua" preserva la ironía del contraste sin sonar forzado.
- source_word: ὁμίχλαι
  english_pob_choice: mists
  chosen_spanish: nieblas
  alternatives_spanish:
  - neblinas
  - mists
  lexicon: BDAG
  rationale: ὁμίχλη es niebla o bruma; "nieblas" es natural en español y mantiene la imagen de algo tenue e inestable. La POB inglesa prefirió "mists" frente a "clouds" por mayor precisión léxica.
- source_word: ὑπὸ λαίλαπος ἐλαυνόμεναι
  english_pob_choice: driven by a storm
  chosen_spanish: llevadas por una tormenta
  alternatives_spanish:
  - impulsadas por una tempestad
  - arrastradas por un torbellino
  lexicon: BDAG
  rationale: λαῖλαψ denota una tormenta violenta o tempestad, y ἐλαύνω es conducir, impulsar o arrastrar. "Llevadas por una tormenta" suena natural en español y conserva la voz pasiva y la fuerza de la imagen.
- source_word: οἷς
  english_pob_choice: for whom
  chosen_spanish: para los cuales
  alternatives_spanish:
  - para quienes
  - para los que
  lexicon: BDAG
  rationale: El relativo vuelve a los falsos maestros, no a las imágenes gramaticalmente femeninas. En español, "para los cuales" mantiene la referencia personal sin perder la conexión con el antecedente masculino plural.
- source_word: ὁ ζόφος τοῦ σκότους
  english_pob_choice: the gloom of darkness
  chosen_spanish: la negrura de la oscuridad
  alternatives_spanish:
  - el lóbrego de la oscuridad
  - la sombra de la oscuridad
  lexicon: BDAG
  rationale: ζόφος expresa tiniebla densa, oscuridad negra; σκότος es oscuridad. "La negrura de la oscuridad" conserva la duplicación intensificadora sin volverlo demasiado idiomático ni suavizar el matiz ominoso.
- source_word: τετήρηται
  english_pob_choice: has been kept
  chosen_spanish: ha sido guardada
  alternatives_spanish:
  - ha sido reservada
  - permanece guardada
  lexicon: BDAG
  rationale: El perfecto pasivo de τηρέω expresa algo que ha sido guardado y sigue así. "Ha sido guardada" preserva el valor pasivo y evita especificar un agente que el griego no nombra.
theological_decisions:
- issue: Agente implícito en la cláusula final de juicio
  english_pob_reading: Render the clause as an impersonal statement of reserved judgment without specifying the divine agent.
  chosen_spanish_reading: Mantener la pasiva sin añadir explícitamente a Dios como agente.
  alternative_spanish_readings:
  - para quienes Dios ha guardado...
  - que Dios ha reservado para ellos
  rationale: El griego dice simplemente que la oscuridad ha sido guardada para ellos. La pasiva deja implícito al agente y la traducción debe conservar esa tensión sin importarla desde la teología sistemática.
  doctrine_reference: 'Principio POB: no resolver en la traducción lo que el texto deja tácito; conservar la pasiva y el matiz judicial sin sobreespecificar.'
translation_notes:
  revision_awareness: Coincide con la lectura auditada de la POB inglesa en la elección de imágenes concretas, la conservación del pasivo final y la preferencia por un término más preciso que la tradición de "nubes". No se detectaron revisiones posteriores que alteren el sentido base.
  spanish_consistency_notes:
  - Se mantiene "fuentes" para πηγαὶ y no "pozos", porque el término griego apunta a manantiales naturales.
  - Se evita "SEÑOR" u otros sustitutos porque no aparece el nombre divino en este versículo.
  - '"Nieblas" y no "nubes" en el texto principal, siguiendo la precisión léxica del audit trail.'
  - La pasiva "ha sido guardada" conserva la ambigüedad deliberada del agente en τετήρηται.
