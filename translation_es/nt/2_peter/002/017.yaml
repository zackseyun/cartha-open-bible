revisions:
- from: Éstos son fuentes sin agua y nieblas[a] llevadas por una tormenta, para los cuales ha sido guardada la negrura de la oscuridad.
  to: Éstos son fuentes sin agua y nieblas[a] llevadas por una tormenta, para quienes ha sido reservada la negrura de la oscuridad.
  rationale: La revisión conserva las decisiones léxicas centrales del audit trail, pero corrige la referencia personal de οἷς con 'para quienes', más fiel y natural en español, y sustituye 'ha sido guardada' por 'ha sido reservada', que suena más idiomático en un contexto de juicio sin alterar la pasiva ni introducir agente explícito. Se mantiene la nota sobre 'nieblas'/'nubes' porque refleja una alternativa léxica documentada en la POB inglesa.
  reviewer_model: gpt-5.4
