    unchanged: false
    changes_summary: 'Removed ''our'' to match the Greek, and changed ''Jesus Messiah'' to the more standard ''Jesus Christ'' for natural formal register and consistency with the source wording. [Regression fix applied: Messiah restored (revision_pass had changed Χριστός → Christ against DOCTRINE.md policy)]'
translation:
  language: es
  text: Pues si, después de haber escapado de las impurezas del mundo por medio del conocimiento del Señor y Salvador Jesús Mesías, vuelven a enredarse en estas cosas y son vencidos, el último estado ha llegado a ser para ellos peor que el primero.
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: ἀποφυγόντες
  english_pob_choice: after escaping
  chosen_spanish: después de haber escapado
  alternatives_spanish:
  - habiendo escapado
  - después de escapar
  lexicon: BDAG
  rationale: El participio aoristo marca una acción previa respecto del verbo principal; «después de haber escapado» conserva con claridad esa anterioridad sin volver la frase pesada.
- source_word: τὰ μιάσματα
  english_pob_choice: defilements
  chosen_spanish: las contaminaciones
  alternatives_spanish:
  - las impurezas
  - los mancillamientos
  - las defilezas
  lexicon: BDAG
  rationale: μίασμα expresa lo que contamina o mancha. «Contaminaciones» mantiene la idea moral y de corrupción sin sonar demasiado técnico en español.
- source_word: τοῦ κόσμου
  english_pob_choice: of the world
  chosen_spanish: del mundo
  alternatives_spanish:
  - del sistema del mundo
  - del mundo presente
  lexicon: BDAG
  rationale: La relación genitiva es directa y el sentido moral del «mundo» ya queda claro en el contexto.
- source_word: ἐν ἐπιγνώσει
  english_pob_choice: through the knowledge
  chosen_spanish: por medio del conocimiento
  alternatives_spanish:
  - en el conocimiento
  - mediante el conocimiento
  - por el conocimiento
  lexicon: BDAG
  rationale: Aunque ἐν es literalmente «en», aquí tiene fuerza instrumental. «Por medio del conocimiento» comunica ese valor sin sobrerresolver el matiz de ἐπίγνωσις.
- source_word: κυρίου καὶ σωτῆρος
  english_pob_choice: Lord and Savior
  chosen_spanish: del Señor y Salvador
  alternatives_spanish:
  - del Dueño y Salvador
  - del Señor y Redentor
  lexicon: BDAG
  rationale: Se conserva el par titulado y reconocido de κύριος / σωτήρ. «Señor» y «Salvador» son la forma más natural y fiel en español eclesial.
- source_word: Ἰησοῦ Χριστοῦ
  english_pob_choice: Jesus Christ
  chosen_spanish: Jesús Mesías
  alternatives_spanish:
  - Jesús Cristo
  lexicon: BDAG
  rationale: Χριστός funciona aquí como título; conforme al criterio doctrinal del proyecto, «Mesías» preserva ese valor titular en español mejor que el uso automático de «Cristo».
- source_word: τούτοις
  english_pob_choice: in these things
  chosen_spanish: en estas cosas
  alternatives_spanish:
  - en ellas
  - en tales cosas
  lexicon: BDAG
  rationale: El dativo retoma las contaminaciones; «en estas cosas» hace explícito el antecedente sin añadir contenido interpretativo.
- source_word: πάλιν ἐμπλακέντες
  english_pob_choice: again entangled
  chosen_spanish: vuelven a enredarse
  alternatives_spanish:
  - se enredan de nuevo
  - vuelven a implicarse
  lexicon: BDAG
  rationale: La imagen de quedar atrapados o enredados otra vez se expresa bien con «vuelven a enredarse», que conserva la repetición y el matiz de atrapamiento.
- source_word: ἡττῶνται
  english_pob_choice: are overcome
  chosen_spanish: son vencidos
  alternatives_spanish:
  - son derrotados
  - quedan dominados
  lexicon: BDAG
  rationale: El verbo indica ser derrotados o sometidos. «Son vencidos» mantiene el pasivo y la fuerza moral del contexto.
- source_word: γέγονεν αὐτοῖς
  english_pob_choice: has become worse for them
  chosen_spanish: les ha venido a ser
  alternatives_spanish:
  - les ha resultado
  - se les ha vuelto
  lexicon: BDAG
  rationale: El perfecto señala un estado resultante. La construcción española necesita completarse con el predicado siguiente; «les ha venido a ser» reproduce ese valor de estado resultante de modo natural.
- source_word: τὰ ἔσχατα
  english_pob_choice: the last state
  chosen_spanish: el último estado
  alternatives_spanish:
  - el estado final
  - lo postrero
  lexicon: BDAG
  rationale: Es una expresión idiomática para la condición final o ulterior. «El último estado» es claro y fiel en español.
- source_word: χείρονα τῶν πρώτων
  english_pob_choice: worse ... than the first
  chosen_spanish: peor que el primero
  alternatives_spanish:
  - peor que el estado primero
  - peor que el anterior
  lexicon: BDAG
  rationale: La comparación contrasta el estado final con el inicial. «Peor que el primero» mantiene la brevedad del original y deja que «estado» gobierne ambos miembros de la comparación.
theological_decisions:
- issue: Naturaleza del conocimiento en relación con la apostasía
  english_pob_reading: Render ἐπίγνωσις simply as 'knowledge' without specifying whether it implies saving regeneration or merely real acquaintance.
  chosen_spanish_reading: Traducir ἐπίγνωσις como «conocimiento» sin calificarlo como salvífico ni meramente externo.
  alternative_spanish_readings:
  - conocimiento pleno
  - conocimiento salvífico
  - pleno conocimiento
  rationale: El término griego no resuelve por sí mismo el debate doctrinal. La traducción española preserva esa tensión teológica en lugar de decidirla.
  doctrine_reference: Preservar la tensión teológica en vez de resolverla.
- issue: Render Χριστοῦ
  english_pob_reading: Jesus Messiah
  chosen_spanish_reading: Jesús Mesías
  alternative_spanish_readings:
  - Jesús Cristo
  rationale: 'Se sigue la norma doctrinal del proyecto: cuando Χριστός actúa como título, se vierte «Mesías».'
  doctrine_reference: 'Contested terms table: Χριστός → Mesías (where title; Cristo where name-like).'
translation_notes:
  revision_awareness: La base inglesa pasó por una revisión que osciló entre 'Jesus Messiah' y 'Jesus Christ'; el ajuste final restauró 'Messiah'. En español se mantiene «Mesías» para respetar esa decisión doctrinal y el valor titular de Χριστός. También se evita sobretraducir ἐπίγνωσις como 'pleno conocimiento' para no cerrar el debate teológico.
  spanish_consistency_notes:
  - Se mantiene «Señor y Salvador» como par titular coherente con el proyecto.
  - Se usa «Mesías» para Χριστός en una función titulativa, no como nombre propio eclesiástico fijado.
  - «Contaminaciones del mundo» conserva el sentido moral de μίασμα sin introducir un tecnicismo innecesario.
  - 'La comparación final se formula de modo natural en español: «el último estado ... peor que el primero».'
