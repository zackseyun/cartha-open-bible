    rationale: γὰρ introduce explicación o fundamento; «Pues si» suele funcionar mejor en español bíblico moderno para enlazar con el razonamiento previo sin rigidez.
  - severity: low
    issue: «contaminaciones» es defendible, pero no es la opción más natural para μιάσματα
    rationale: El término griego apunta a impurezas/defilements en sentido moral. «Contaminaciones» no es incorrecto, pero puede oírse algo más físico o ambiental en español contemporáneo.
  revised_spanish_text: Pues si, después de haber escapado de las impurezas del mundo por medio del conocimiento del Señor y Salvador Jesús Mesías, vuelven a enredarse en estas cosas y son vencidos, el último estado ha llegado a ser para ellos peor que el primero.
  revision_rationale: 'Se ajusta la redacción para mayor naturalidad y fidelidad semántica: «Pues si» enlaza mejor con γὰρ; «impurezas» expresa más claramente el sentido moral de μιάσματα; y «ha llegado a ser para ellos» comunica de forma más idiomática el perfecto γέγονεν αὐτοῖς sin perder el resultado comparativo del original. No se requieren notas adicionales.'
