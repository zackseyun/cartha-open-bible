translation:
  language: es
  text: especialmente a los que van tras la carne, en el deseo de impureza[a], y desprecian la autoridad[b]. Audaces, obstinados, no tiemblan mientras blasfeman contra seres gloriosos[c][d],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «en la lujuria de la impureza».'
    reason: lexical_alternative
  - marker: b
    text: 'O: «el señorío» o «el dominio».'
    reason: lexical_alternative
  - marker: c
    text: «Seres gloriosos» probablemente se refiere a seres celestiales gloriosos; posiblemente «ángeles».
    reason: alternative_reading
  - marker: d
    text: Lit. «glorias».
    reason: lexical_alternative
lexical_decisions:
- source_word: μάλιστα
  english_pob_choice: especially
  chosen_spanish: especialmente
  alternatives_spanish:
  - particularmente
  - principalmente
  lexicon: BDAG
  rationale: Mantiene el énfasis especial del contexto sin añadir matices que no están en el griego.
- source_word: ὀπίσω σαρκὸς
  english_pob_choice: after the flesh
  chosen_spanish: tras la carne
  alternatives_spanish:
  - después de la carne
  - siguiendo la carne
  lexicon: BDAG
  rationale: Conserva la imagen idiomática de ir 'detrás' o 'tras' la carne, y deja visible σάρξ como 'carne' según el uso moralmente cargado del contexto.
- source_word: σάρξ
  english_pob_choice: flesh
  chosen_spanish: carne
  alternatives_spanish:
  - naturaleza pecaminosa
  - naturaleza humana
  lexicon: BDAG
  rationale: '''Carne'' preserva el término fuente y la carga ética del pasaje sin resolver demasiado la metáfora.'
- source_word: ἐν ἐπιθυμίᾳ μιασμοῦ
  english_pob_choice: in the desire for defilement
  chosen_spanish: en el deseo de contaminación
  alternatives_spanish:
  - en la lujuria de la inmundicia
  - con ansia de impureza
  lexicon: BDAG
  rationale: '''Deseo de contaminación'' comunica el impulso ilícito y la idea de impureza/defilement con español claro y digno.'
- source_word: πορευομένους
  english_pob_choice: who go
  chosen_spanish: a los que van
  alternatives_spanish:
  - a los que andan
  - a los que caminan
  lexicon: BDAG
  rationale: '''Van'' conserva el participio de conducta de forma natural en español y encaja con ''tras la carne''.'
- source_word: κυριότητος
  english_pob_choice: authority
  chosen_spanish: la autoridad
  alternatives_spanish:
  - el señorío
  - el dominio
  lexicon: BDAG
  rationale: '''Autoridad'' refleja la lectura amplia y general del texto auditado, sin fijar innecesariamente un referente más estrecho.'
- source_word: καταφρονοῦντας
  english_pob_choice: despise
  chosen_spanish: desprecian
  alternatives_spanish:
  - desoyen
  - menosprecian
  lexicon: BDAG
  rationale: '''Desprecian'' expresa bien el desprecio activo y la fuerza de καταφρονέω.'
- source_word: Τολμηταί
  english_pob_choice: Bold
  chosen_spanish: Audaces
  alternatives_spanish:
  - Valientes
  - Temerarios
  lexicon: BDAG
  rationale: '''Audaces'' conserva el tono caracterizador y negativo del pasaje mejor que un simple ''valientes''.'
- source_word: αὐθάδεις
  english_pob_choice: self-willed
  chosen_spanish: obstinados
  alternatives_spanish:
  - autoritarios
  - arrogantes
  - caprichosos
  lexicon: BDAG
  rationale: Aunque 'self-willed' puede sugerir autosuficiencia voluntariosa, 'obstinados' comunica con naturalidad la terquedad autorreferente dentro del retrato condenatorio del contexto.
- source_word: δόξας
  english_pob_choice: glorious ones
  chosen_spanish: las glorias
  alternatives_spanish:
  - los seres gloriosos
  - las majestades gloriosas
  lexicon: BDAG
  rationale: Se mantiene la ambigüedad del plural griego. 'Las glorias' conserva la indeterminación del referente en el texto principal, como en la tradición auditada.
- source_word: οὐ τρέμουσιν
  english_pob_choice: they do not tremble
  chosen_spanish: no tiemblan
  alternatives_spanish:
  - no se estremecen
  - no sienten temor
  lexicon: BDAG
  rationale: Conserva la imagen física de temor/reverencia sin explicar más de lo que el griego dice.
- source_word: βλασφημοῦντες
  english_pob_choice: blaspheme
  chosen_spanish: blasfemando
  alternatives_spanish:
  - insultando
  - maldiciendo
  - hablando injuriosamente
  lexicon: BDAG
  rationale: '''Blasfemando'' preserva la gravedad del verbo y su fuerza de habla injuriosa contra seres exaltados.'
theological_decisions:
- issue: Sentido de κυριότητος
  english_pob_reading: generic ruling authority
  chosen_spanish_reading: autoridad genérica o de gobierno
  alternative_spanish_readings:
  - señorío
  - dominio
  rationale: La lectura auditada evita fijar un referente doctrinal más estrecho. 'Autoridad' permite conservar la amplitud del reproche sin resolver la identidad exacta del poder despreciado.
  doctrine_reference: Preservar la tensión interpretativa sin cerrarla indebidamente.
- issue: Sentido de δόξας
  english_pob_reading: glorious heavenly beings left unspecified in the main text
  chosen_spanish_reading: seres o majestades gloriosas dejados implícitos en el texto principal
  alternative_spanish_readings:
  - ángeles
  - glorias abstractas
  - seres celestiales
  rationale: El contexto inmediato sugiere un referente celestial, pero el griego usa un plural ambivalente. 'Las glorias' mantiene esa ambigüedad en español.
  doctrine_reference: Preservar la tensión interpretativa sin resolverla.
- issue: Función de βλασφημοῦντες
  english_pob_reading: contemporaneous participle describing the manner of their fearlessness
  chosen_spanish_reading: 'participio concomitante: ''blasfemando'''
  alternative_spanish_readings:
  - mientras blasfeman
  - al blasfemar
  rationale: El participio expresa simultaneidad con 'no tiemblan'. En español, 'blasfemando' es compacto y reproduce bien el carácter staccato de la acusación.
  doctrine_reference: Ajuste sintáctico fiel al aspecto verbal sin cambiar el sentido.
translation_notes:
  revision_awareness: 'La redacción sigue el audit trail inglés más reciente: mantiene κυριότητος como una autoridad genérica; conserva la ambigüedad de δόξας; y refleja βλασφημοῦντες como participio concomitante en español mediante ''blasfemando''.'
  spanish_consistency_notes:
  - Se usó 'carne' para σάρξ, siguiendo el valor lexical documentado y evitando 'naturaleza pecaminosa' en el texto principal.
  - Se evitó 'SEÑOR' como sustituto de nombres divinos porque el versículo no contiene el Tetragrámaton ni κύριος con esa función.
  - Se preservó el tono condenatorio con vocabulario sobrio y directamente auditable, sin ampliar el contenido más allá del griego.
