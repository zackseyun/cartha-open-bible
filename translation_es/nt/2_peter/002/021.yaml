  to: Porque habría sido mejor para ellos no haber conocido el camino de la rectitud[a] que, después de haberlo conocido, volverse atrás[b] del santo mandamiento[c] que les fue entregado.
  rationale: Se corrigió la discordancia gramatical («el santo mandamiento ... entregado»), se ajustó δικαιοσύνη a «rectitud» para reflejar mejor la decisión contextual documentada por la POB inglesa, y se repararon las notas para que sigan el audit trail léxico sin introducir alternativas menos fieles como «santa orden». También se mantuvo el matiz de retroceso de ὑποστρέψαι con una formulación española más aceptable en registro bíblico.
