  revision_rationale: Se corrigió la discordancia gramatical («el santo mandamiento ... entregado»), se ajustó δικαιοσύνη a «rectitud» para reflejar mejor la decisión contextual documentada por la POB inglesa, y se repararon las notas para que sigan el audit trail léxico sin introducir alternativas menos fieles como «santa orden». También se mantuvo el matiz de retroceso de ὑποστρέψαι con una formulación española más aceptable en registro bíblico.
