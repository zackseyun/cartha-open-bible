  text: κρεῖττον γὰρ ἦν αὐτοῖς μὴ ἐπεγνωκέναι τὴν ὁδὸν τῆς δικαιοσύνης ἢ ἐπιγνοῦσιν ⸀ὑποστρέψαι ἐκ τῆς παραδοθείσης αὐτοῖς ἁγίας ἐντολῆς·
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/021.yaml
  text: For it would have been better for them not to have known the way of righteousness than[a], after knowing it[c][b], to turn back from the holy commandment delivered to them.
  footnotes:
  - marker: a
    text: Or 'the path of righteousness'; δικαιοσύνη can also be rendered 'justice,' though 'righteousness' best fits the context here.
    reason: lexical_alternative
  - marker: b
    text: Or 'to return from' or 'to turn away from.'
    reason: lexical_alternative
  - marker: c
    text: Or 'handed down to them' for 'delivered to them.'
    reason: lexical_alternative
