translation:
  language: es
  text: Porque habría sido mejor para ellos no haber conocido el camino de la rectitud[a] que, después de haberlo conocido, volverse atrás[b] del santo mandamiento[c] que les fue entregado.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «el camino de la justicia»; δικαιοσύνη también puede traducirse «justicia», aunque «rectitud» encaja mejor en este contexto.
    reason: lexical_alternative
  - marker: b
    text: O «regresar de» o «apartarse de».
    reason: lexical_alternative
  - marker: c
    text: O «que les fue transmitido» para «que les fue entregado».
    reason: lexical_alternative
lexical_decisions:
- source_word: κρεῖττον
  english_pob_choice: better
  chosen_spanish: mejor
  alternatives_spanish:
  - preferible
  lexicon: BDAG
  rationale: El comparativo expresa conveniencia hipotética; «mejor» es la forma natural en español y conserva la fuerza comparativa sin sobrerelaborar el sentido.
- source_word: ἐπεγνωκέναι / ἐπιγνοῦσιν
  english_pob_choice: to have known / after knowing
  chosen_spanish: haber conocido / después de haberlo conocido
  alternatives_spanish:
  - haber llegado a conocer / después de llegar a conocer
  - haberlo conocido plenamente / después de conocerlo plenamente
  lexicon: BDAG
  rationale: La repetición del verbo exige reflejar conocimiento real previo. «Haber conocido» mantiene la sencillez y no fuerza el matiz de plenitud más allá de lo que el contexto exige.
- source_word: ὁδὸν τῆς δικαιοσύνης
  english_pob_choice: the way of righteousness
  chosen_spanish: el camino de la justicia
  alternatives_spanish:
  - el camino de la rectitud
  - el sendero de la justicia
  lexicon: BDAG
  rationale: ὁδός es un camino o curso de vida; «camino» es el equivalente idiomático. Para δικαιοσύνη, se eligió «justicia» porque el español bíblico moderno lo permite y conserva la posible amplitud ética del término; se deja abierta la tensión con «rectitud».
- source_word: δικαιοσύνης
  english_pob_choice: righteousness
  chosen_spanish: justicia
  alternatives_spanish:
  - rectitud
  lexicon: BDAG
  rationale: Aunque la POB inglesa prefirió «righteousness», en español «justicia» puede abarcar la fidelidad correcta ante Dios sin perder naturalidad. La alternativa «rectitud» sigue siendo válida y cercana al matiz moral.
- source_word: ὑποστρέψαι
  english_pob_choice: to turn back
  chosen_spanish: volver atrás
  alternatives_spanish:
  - regresar
  - volver
  - retirarse
  lexicon: BDAG
  rationale: «Volver atrás» expresa claramente el movimiento de retroceso implícito en el verbo y conserva el matiz de reversión tras haber conocido algo.
- source_word: ἐκ
  english_pob_choice: from
  chosen_spanish: de
  alternatives_spanish:
  - desde
  - fuera de
  lexicon: BDAG
  rationale: Con «volver atrás», la construcción española fluye mejor con «de» para indicar separación de aquello que habían recibido.
- source_word: παραδοθείσης
  english_pob_choice: delivered
  chosen_spanish: entregada
  alternatives_spanish:
  - transmitida
  - entregada a ellos
  - confiada
  lexicon: BDAG
  rationale: El participio pasivo de παραδίδωμι puede ser «entregada» en español sin perder el sentido de algo que les fue pasado/entregado. «Transmitida» podría sugerir tradición formal; «confiada» añade una idea que no está explícita.
- source_word: ἁγίας ἐντολῆς
  english_pob_choice: the holy commandment
  chosen_spanish: el santo mandamiento
  alternatives_spanish:
  - el mandamiento santo
  - el mandamiento sagrado
  lexicon: BDAG
  rationale: Se conserva el singular y la formulación bíblica sobria. «Santo mandamiento» respeta el valor religioso de ἁγίας sin volverlo más interpretativo.
- source_word: γὰρ
  english_pob_choice: For
  chosen_spanish: Porque
  alternatives_spanish:
  - Pues
  - Ya que
  lexicon: BDAG
  rationale: Introducir la razón con «Porque» es natural en español y conserva la relación explicativa del versículo con el contexto previo.
- source_word: ἦν
  english_pob_choice: would have been
  chosen_spanish: habría sido
  alternatives_spanish:
  - era
  - sería
  lexicon: BDAG
  rationale: La construcción contrafactual en español requiere el condicional perfecto para reflejar adecuadamente el valor del imperfecto en este contexto.
theological_decisions:
- issue: Cómo traducir δικαιοσύνη sin cerrar la discusión entre «justicia» y «rectitud»
  english_pob_reading: Use 'righteousness' while acknowledging 'justice' as a lexical alternative; preserve ethical/right-order sense without settling a doctrinal debate.
  chosen_spanish_reading: «Justicia» en el texto principal, con «rectitud» como alternativa abierta.
  alternative_spanish_readings:
  - «rectitud»
  - «justicia»
  rationale: 'En español, ambas opciones son defendibles. Se eligió «justicia» porque es clara y amplia, pero no se borra la tensión lexical: la nota deja constancia de la alternativa «rectitud» para no clausurar el matiz del término griego.'
  doctrine_reference: Mantener la ambigüedad léxica sin resolverla doctrinalmente.
- issue: Si el verso debe interpretarse como pérdida salvífica, mera profesión externa o apostasía
  english_pob_reading: State the comparison and reversal plainly without importing a doctrinal conclusion beyond the text.
  chosen_spanish_reading: Formulación neutral que presenta el haber conocido y el volver atrás sin explicar el estado final de las personas.
  alternative_spanish_readings:
  - Redacción más fuerte que sugiera pérdida de salvación
  - Redacción más débil que sugiera exposición superficial
  rationale: El texto griego afirma conocimiento real y retroceso real; la traducción no debe añadir una conclusión denominacional. Se preserva la tensión teológica del pasaje.
  doctrine_reference: Preservar la tensión teológica sin resolverla.
translation_notes:
  revision_awareness: El borrador sigue de cerca el griego SBLGNT y el trazado auditado de la POB inglesa. Se mantuvo la comparación contrafactual («habría sido mejor»), el paralelismo entre conocer y volver atrás, y la relación de separación expresada por ἐκ. Se adoptó una formulación española natural, preservando las alternativas léxicas donde la POB inglesa las documenta o donde el español abre una ambigüedad relevante.
  spanish_consistency_notes:
  - Se mantiene «Yahvé» como norma general, aunque este versículo no lo contiene.
  - «Camino» traduce ὁδός de manera consistente con otros contextos bíblicos.
  - Se conservó el singular de ἐντολή como «mandamiento».
  - La nota sobre δικαιοσύνη deja explícita la alternativa «rectitud» para no borrar la tensión léxica.
  - Se evitó introducir terminología eclesiástica tradicional que no esté exigida por el griego.
