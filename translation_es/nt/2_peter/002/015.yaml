translation:
  language: es
  text: Habiendo abandonado el camino recto, se desviaron[a], siguiendo el camino de Balaam, hijo de Bosor[b], que amó el salario de la injusticia.
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «se desviaron, habiendo seguido».'
    reason: previous_rendering
  - marker: b
    text: Bosor es la forma que aparece en el texto griego; en el Antiguo Testamento Balaam suele ser llamado hijo de Beor.
    reason: alternative_reading
lexical_decisions:
- source_word: καταλιπόντες
  english_pob_choice: Having abandoned
  chosen_spanish: Habiendo abandonado
  alternatives_spanish:
  - habiendo dejado
  - habiendo abandonado
  lexicon: BDAG
  rationale: El participio aoristo expresa una acción anterior a la del verbo principal. «Habiendo abandonado» conserva esa anterioridad y comunica una decisión deliberada mejor que un simple «dejando».
- source_word: εὐθεῖαν ὁδὸν
  english_pob_choice: the straight way
  chosen_spanish: el camino recto
  alternatives_spanish:
  - el camino derecho
  - la senda recta
  lexicon: BDAG
  rationale: «Recto» mantiene la imagen moral de un camino no torcido y suena natural en español. «Camino» preserva la metáfora de la vía, en lugar de interpretarla como una mera condición ética abstracta.
- source_word: ἐπλανήθησαν
  english_pob_choice: they went astray
  chosen_spanish: se desviaron
  alternatives_spanish:
  - se extraviaron
  - anduvieron errantes
  lexicon: BDAG
  rationale: El verbo griego tiene sentido moral y de extravío. «Se desviaron» reproduce bien la idea de apartarse del camino recto sin sonar excesivamente coloquial.
- source_word: ἐξακολουθήσαντες
  english_pob_choice: having followed
  chosen_spanish: siguiendo
  alternatives_spanish:
  - habiendo seguido
  - al seguir
  lexicon: BDAG
  rationale: En español, un gerundio puede expresar la manera o medio del desvío de forma natural. «Siguiendo» evita dureza sintáctica y conserva la relación lógica entre ambas acciones.
- source_word: τῇ ὁδῷ
  english_pob_choice: the way
  chosen_spanish: el camino
  alternatives_spanish:
  - la senda
  - la vía
  lexicon: BDAG
  rationale: «Camino» es la equivalencia habitual y mantiene la coherencia con «camino recto» al inicio del versículo.
- source_word: τοῦ Βαλαὰμ
  english_pob_choice: of Balaam
  chosen_spanish: de Balaam
  alternatives_spanish:
  - de Balaam
  lexicon: BDAG
  rationale: Se conserva la transliteración bíblica habitual del nombre propio.
- source_word: τοῦ Βοσὸρ
  english_pob_choice: son of Bosor
  chosen_spanish: hijo de Bosor
  alternatives_spanish:
  - de Bosor
  lexicon: BDAG
  rationale: La construcción griega se vierte de modo natural como filiación. Se mantiene «Bosor» en el texto principal porque esa es la forma del griego, sin ocultar la variante conocida del Antiguo Testamento.
- source_word: μισθὸν
  english_pob_choice: the wages
  chosen_spanish: el salario
  alternatives_spanish:
  - la paga
  - la recompensa
  lexicon: BDAG
  rationale: «Salario» conserva la idea de pago o remuneración y funciona bien en la expresión fija del griego. «Recompensa» podría sonar positivamente, lo que sería inadecuado aquí.
- source_word: ἀδικίας
  english_pob_choice: of unrighteousness
  chosen_spanish: de la injusticia
  alternatives_spanish:
  - de la iniquidad
  - de la maldad
  lexicon: BDAG
  rationale: «Injusticia» transmite la carga moral del término y permite una expresión más natural en español que una traducción demasiado literal y eclesiástica.
- source_word: ἠγάπησεν
  english_pob_choice: loved
  chosen_spanish: amó
  alternatives_spanish:
  - amó intensamente
  - apreció
  lexicon: BDAG
  rationale: El aoristo de ἀγαπάω se refleja con el perfecto simple «amó». Mantiene la fuerza verbal sin atenuarla con una paráfrasis.
theological_decisions:
- issue: Imagen del camino moral en εὐθεῖαν ὁδὸν / τῇ ὁδῷ
  english_pob_reading: Retain 'way' language rather than interpretive paraphrase such as 'true path' or 'moral course.'
  chosen_spanish_reading: 'Conservar el lenguaje de camino: «camino recto» y «el camino de Balaam».'
  alternative_spanish_readings:
  - el sendero recto
  - la senda verdadera
  rationale: La metáfora del camino está explícita en el texto griego y conviene preservarla en español. Esto evita interpretar en exceso y mantiene la continuidad imagética del versículo.
  doctrine_reference: Translation philosophy §§1, 3, 5
- issue: Identificación de Βοσόρ
  english_pob_reading: Translate as 'Bosor' in the main text while preserving the familiar alternative 'Beor' in a footnote.
  chosen_spanish_reading: Usar «Bosor» en el texto principal y explicar en nota que en el Antiguo Testamento Balaam es comúnmente llamado hijo de Beor.
  alternative_spanish_readings:
  - Beor
  - Bosor
  rationale: La primacía del texto griego exige reflejar la forma Βοσόρ. La nota evita confusión para lectores que conocen la forma veterotestamentaria tradicional.
  doctrine_reference: Translation philosophy §§1, 3
- issue: μισθὸν ἀδικίας
  english_pob_reading: the wages of unrighteousness
  chosen_spanish_reading: el salario de la injusticia
  alternative_spanish_readings:
  - la paga de la injusticia
  - la recompensa de la injusticia
  rationale: La expresión conserva el matiz de remuneración por conducta mala sin volverla más suave o positiva de lo que el griego permite.
  doctrine_reference: Translation philosophy §§1, 5
translation_notes:
  revision_awareness: El audit trail inglés muestra una revisión reciente en 2 Pedro 2:15 que volvió a una redacción más cercana al participio griego («having followed») tras una prueba con «by following». La versión española sigue esa cercanía sintáctica con «siguiendo», manteniendo una relación natural de medio/manera entre el abandono del camino recto y el desvío. También se conserva la decisión textual de reflejar «Bosor» en el texto principal y explicarlo en nota.
  spanish_consistency_notes:
  - Se mantiene «camino» para ὁδός en ambos usos del versículo.
  - Se conserva «Bosor» en el cuerpo del texto, con nota explicativa sobre la variante veterotestamentaria «Beor».
  - «Injusticia» se usa como equivalente de ἀδικία para sostener el registro moral-jurídico del pasaje.
  - La puntuación reproduce la relación entre participios y verbo principal sin endurecer el español.
