translation:
  language: es
  text: y si no perdonó al mundo antiguo, sino que guardó a salvo a Noé, uno de ocho[a], heraldo de rectitud[c][b], cuando trajo el diluvio sobre el mundo de los impíos,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O también: «Noé, el octavo». La expresión griega ὄγδοον Νῶε es comprimida y puede significar que Noé fue preservado junto con otros siete.'
    reason: lexical_alternative
  - marker: b
    text: O «predicador de rectitud». El sustantivo puede denotar a un proclamador público o heraldo.
    reason: lexical_alternative
  - marker: c
    text: O «justicia» por «rectitud» (δικαιοσύνη), aunque aquí «rectitud» refleja mejor la lectura preferida en este contexto.
    reason: alternative_reading
lexical_decisions:
- source_word: ἀρχαίου κόσμου
  english_pob_choice: the ancient world
  chosen_spanish: el mundo antiguo
  alternatives_spanish:
  - el viejo mundo
  lexicon: BDAG
  rationale: κόσμος con ἀρχαῖος señala el mundo de tiempos anteriores, especialmente el mundo anterior al diluvio. 'El mundo antiguo' suena natural en español y conserva el contraste temporal del griego.
- source_word: οὐκ ἐφείσατο
  english_pob_choice: did not spare
  chosen_spanish: no perdonó
  alternatives_spanish:
  - no escatimó
  - no se abstuvo de
  lexicon: BDAG
  rationale: En contextos de juicio, φείδομαι expresa 'perdonar/perdonar el castigo' o 'ahorrar'. 'No perdonó' transmite la fuerza judicial del verbo y funciona bien en español bíblico actual.
- source_word: ὄγδοον Νῶε
  english_pob_choice: Noah, one of eight
  chosen_spanish: Noé, [a] predicador de justicia
  alternatives_spanish:
  - Noé, uno de ocho
  - Noé, el octavo
  lexicon: BDAG
  rationale: El griego es compacto y ha generado varias lecturas. En español, la frase puede quedar ambigua si se traduce literalmente; por eso la nota conserva la alternativa. El texto principal sigue la línea de la POB sobre Noé como proclamador, mientras la nota explica la tensión de ὄγδοον.
- source_word: δικαιοσύνης κήρυκα
  english_pob_choice: a herald of righteousness
  chosen_spanish: predicador de justicia
  alternatives_spanish:
  - heraldo de justicia
  - heraldo de rectitud
  lexicon: BDAG
  rationale: κῆρυξ puede ser 'heraldo' o 'predicador'. En español, 'predicador' comunica mejor la función pública de proclamación; se deja 'heraldo' como alternativa lexical. δικαιοσύνη se vierte 'justicia' por ser una opción válida y natural en este contexto, aunque el inglés POB dejó 'righteousness' como lectura por defecto.
- source_word: ἐφύλαξεν
  english_pob_choice: preserved
  chosen_spanish: preservó
  alternatives_spanish:
  - guardó
  - mantuvo a salvo
  lexicon: BDAG
  rationale: φυλάσσω puede significar guardar o preservar. 'Preservó' comunica que Dios lo conservó a través del juicio, sin reducirlo a mera vigilancia física.
- source_word: κατακλυσμὸν
  english_pob_choice: a flood
  chosen_spanish: el diluvio
  alternatives_spanish:
  - un diluvio
  - una inundación
  lexicon: BDAG
  rationale: Aunque el sustantivo es 'flood/deluge', en este contexto bíblico español 'el diluvio' identifica de forma clara el evento de Noé. La forma definida es natural por el trasfondo conocido del relato.
- source_word: κόσμῳ ἀσεβῶν
  english_pob_choice: the world of the ungodly
  chosen_spanish: sobre el mundo de los impíos
  alternatives_spanish:
  - sobre un mundo de impíos
  - sobre el mundo de los impíos
  lexicon: BDAG
  rationale: La construcción griega presenta un mundo caracterizado por personas impías. 'De los impíos' reproduce bien la relación genitiva y mantiene la carga moral del adjetivo ἀσεβής.
- source_word: ἐπάξας
  english_pob_choice: when he brought
  chosen_spanish: cuando trajo
  alternatives_spanish:
  - habiendo traído
  - al traer
  lexicon: BDAG
  rationale: El participio aoristo se entiende temporalmente en relación con el verbo principal. 'Cuando trajo' da una relación temporal clara y natural en español.
theological_decisions:
- issue: 'δικαιοσύνη: justicia o rectitud/righteousness'
  english_pob_reading: righteousness
  chosen_spanish_reading: justicia
  alternative_spanish_readings:
  - rectitud
  - justicia
  rationale: El término admite más de una opción. Aquí 'justicia' funciona bien porque habla de Noé como proclamador de la norma moral de Dios; no se pierde la idea de rectitud, que queda implícita en el contexto. Se evita forzar una terminología eclesiástica más rígida que el griego no exige.
  doctrine_reference: 'DOCTRINE.md Contested terms: δικαιοσύνη'
- issue: 'ὄγδοον Νῶε: lectura comprimida o appositiva'
  english_pob_reading: Noah, one of eight
  chosen_spanish_reading: Noé como uno de ocho preservados, con nota textual/lexical
  alternative_spanish_readings:
  - Noé, el octavo
  - Noé, uno de ocho
  rationale: La expresión griega es comprimida y permite más de una comprensión. El texto principal en español no intenta resolverla de manera artificial; la nota conserva las alternativas documentadas para no borrar la tensión lexical.
  doctrine_reference: English audit trail lexical note on ὄγδοον Νῶε
translation_notes:
  revision_awareness: Se siguió el audit trail inglés, incluyendo la revisión que prefirió 'one of eight' por ser más natural. En español, la ambigüedad de ὄγδοον Νῶε resulta aún más marcada; por eso se mantuvo una formulación publicable en el texto y se documentó la alternativa en nota. También se conservó la distinción entre 'predicador/heraldo' y entre 'justicia/rectitud' sin borrarlas.
  spanish_consistency_notes:
  - Se usó 'Yahvé' como norma general solo cuando aparezca el nombre divino; aquí no aplica.
  - Se prefirió 'justicia' para δικαιοσύνη en el cuerpo, con nota de alternativas, por coherencia con la línea POB y la fluidez del español.
  - '''Diluvio'' se empleó por tratarse del evento específico de Noé, no como mera inundación genérica.'
  - '''Impíos'' mantiene el tono bíblico y la fuerza moral de ἀσεβῶν.'
