review_pass:
  verdict: revise
  source_alignment_summary: El borrador omite en el texto principal el elemento ὄγδοον ligado a Noé, aunque la fuente lo incluye explícitamente y la POB inglesa lo resolvió como 'one of eight' con nota de alternativa. Además, cambia δικαιοσύνης de la lectura preferida documentada ('righteousness') a 'justicia' sin necesidad contextual suficiente. El resto del sentido principal —no perdonar al mundo antiguo, preservar a Noé, traer el diluvio sobre el mundo de los impíos— está bien encaminado.
  spanish_quality_summary: El español es legible, pero presenta un problema grave de integridad semántica al dejar fuera 'uno de ocho' del cuerpo del versículo. También '[a] predicador de justicia' queda puntuacionalmente extraño y la nota queda anclada de forma incorrecta. 'Preservó' suena algo calcado; 'guardó a salvo' o 'preservó' pueden funcionar, pero 'preservó' es aceptable en registro bíblico moderno.
  glossary_alignment: 'Desalineación parcial con la política del proyecto: δικαιοσύνη normalmente debe ir como ''justicia/rectitud'' según contexto, pero aquí el rastro auditado inglés prefirió ''righteousness''; en español, ''rectitud'' o incluso ''justicia'' podrían discutirse, pero dado el registro y la documentación conviene reflejar la preferencia con ''rectitud'' en nota alternativa para ''justicia''. La elección ''predicador'' para κῆρυξ pierde algo de la fuerza más literal de ''heraldo'', aunque puede mantenerse como alternativa; mejor ''heraldo'' en el texto principal por fidelidad al razonamiento documentado.'
  issues:
  - severity: high
    issue: Omisión de ὄγδοον en el texto principal
    rationale: El borrador deja fuera 'uno de ocho'/'el octavo', elemento explícito del griego y del texto inglés auditado. No basta relegarlo a una nota si el texto principal pierde información semántica.
  - severity: medium
    issue: Anclaje y puntuación defectuosos de la nota
    rationale: La secuencia 'Noé, [a] predicador de justicia' hace que la nota interrumpa mal la aposición y no ancle claramente el término debatido.
  - severity: medium
    issue: δικαιοσύνη vertido como 'justicia' contra la preferencia auditada
    rationale: Aunque 'justicia' es posible léxicamente, la documentación del proyecto aquí favorece 'righteousness'. En español, 'rectitud' preserva mejor esa preferencia sin sonar arcaico.
  - severity: low
    issue: κῆρυξ como 'predicador' en vez de 'heraldo'
    rationale: '''Predicador'' es entendible, pero el audit trail justificó ''herald'' por su matiz de proclamación pública; conviene conservar esa decisión en español principal y dejar ''predicador'' en nota.'
