  text: καὶ ἀρχαίου κόσμου οὐκ ἐφείσατο, ἀλλὰ ὄγδοον Νῶε δικαιοσύνης κήρυκα ἐφύλαξεν, κατακλυσμὸν κόσμῳ ἀσεβῶν ἐπάξας,
base_translation:
  language: en
  yaml_path: translation/nt/2_peter/002/005.yaml
  text: and if he did not spare the ancient world[a], but preserved Noah, one of eight, a herald of righteousness, when he brought a flood upon the world of the ungodly[c][b],
  footnotes:
  - marker: a
    text: Or 'Noah, one of eight' or 'Noah the eighth'; the Greek expression ὄγδοον Νῶε is compressed and may mean that Noah was preserved along with seven others.
    reason: lexical_alternative
  - marker: b
    text: Or 'a preacher of righteousness'; the noun can denote a public proclaimer or herald.
    reason: lexical_alternative
  - marker: c
    text: Or 'justice' for 'righteousness' (δικαιοσύνη), though 'righteousness' is the default rendering here.
    reason: alternative_reading
