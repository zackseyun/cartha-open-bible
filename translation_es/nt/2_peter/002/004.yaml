review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador español transmite bien la estructura y el sentido general del griego: Dios no perdonó a ángeles que pecaron, los arrojó al Tártaro, los entregó a una condición de confinamiento tenebroso y quedan reservados para juicio. Conserva correctamente «Tártaro» frente a una generalización como «infierno». Sin embargo, hay dos puntos mejorables frente al rastro POB y al griego: (1) la nota [a] no presenta una alternativa real, sino repite la misma lectura; (2) «oscuridad» para ζόφος es aceptable, pero «lobreguez» o «tinieblas» preserva mejor el matiz opresivo/sombrío que motivó «gloom» en inglés.'
  spanish_quality_summary: El español es claro y digno, pero requiere pequeños ajustes para mayor naturalidad y fidelidad editorial. «No perdonó» funciona, aunque «no les perdonó» sería más idiomático; aun así no es imprescindible. La secuencia «los entregó a cadenas de oscuridad, para ser guardados para juicio» es comprensible, pero mejora con «cadenas de lobreguez» y «reservados para juicio», que suena más natural en contexto de custodia escatológica. La nota [a] debe corregirse porque actualmente no aporta información útil y además confunde el formato de alternativa.
  glossary_alignment: 'Alineación buena con la terminología del proyecto: θεός -> «Dios»; ταρταρώσας -> «al Tártaro», correctamente preservado; κρίσις -> «juicio», correcto; τηρουμένους puede verterse mejor como «reservados» en este contexto. No hay conflicto con glosario mayor. La principal cuestión léxica es ζόφος: «lobreguez» refleja mejor el valor de «gloom» que «oscuridad», sin caer en una paráfrasis.'
  issues:
  - severity: medium
    issue: La nota [a] no ofrece una alternativa verdadera
    rationale: El texto principal ya dice «cuando pecaron», y la nota repite exactamente esa misma frase como supuesta alternativa. Debe reflejar la alternativa documentada en inglés, como «ángeles que pecaron», o eliminarse.
  - severity: medium
    issue: «Oscuridad» atenúa el matiz de ζόφος
    rationale: El expediente inglés justificó «gloom» para conservar la idea de oscuridad opresiva, sombría, casi inframundana. «Oscuridad» es correcta pero más plana. «Lobreguez» preserva mejor ese matiz en español neutral y digno.
  - severity: low
    issue: «Para ser guardados para juicio» suena algo rígido en español
    rationale: Aunque es defendible, «reservados para juicio» expresa con más naturalidad el sentido de custodia continua de τηρουμένους en este contexto judicial/escatológico.
  revised_spanish_text: Porque si Dios no les perdonó a los ángeles cuando pecaron[a], sino que los arrojó al Tártaro y los entregó a cadenas de lobreguez, reservados para juicio[b],
  revised_footnotes:
