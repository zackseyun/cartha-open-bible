    text: 'O: «a los ángeles que pecaron». El participio aoristo puede expresarse en español como una relativa simple, aunque «cuando pecaron» conserva bien su fuerza eventiva.'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «fosas de lobreguez/oscuridad» en lugar de «cadenas de lobreguez».
    reason: textual_variant
  revision_rationale: Se corrige la nota [a] para que presente una alternativa real y útil. Se cambia «oscuridad» por «lobreguez» para reflejar mejor ζόφος conforme a la decisión lexical del POB en inglés. Se ajusta «para ser guardados para juicio» a «reservados para juicio» por mayor naturalidad en español sin perder el sentido durativo de custodia.
