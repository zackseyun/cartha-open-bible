translation:
  language: es
  text: Porque si Dios no les perdonó a los ángeles cuando pecaron[a], sino que los arrojó al Tártaro y los entregó a cadenas de lobreguez, reservados para juicio[b],
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'O: «a los ángeles que pecaron». El participio aoristo puede expresarse en español como una relativa simple, aunque «cuando pecaron» conserva bien su fuerza eventiva.'
    reason: lexical_alternative
  - marker: b
    text: Algunos manuscritos leen «fosas de lobreguez/oscuridad» en lugar de «cadenas de lobreguez».
    reason: textual_variant
lexical_decisions:
- source_word: ἐφείσατο
  english_pob_choice: did not spare
  chosen_spanish: no perdonó
  alternatives_spanish:
  - no se abstuvo de castigarlos
  - no tuvo piedad de ellos
  lexicon: BDAG
  rationale: En contexto judicial o punitivo, φείδομαι comunica no conceder clemencia. «No perdonó» reproduce bien esa fuerza en español natural sin suavizarla con una formulación menos directa.
- source_word: ἀγγέλων ἁμαρτησάντων
  english_pob_choice: angels when they sinned
  chosen_spanish: a los ángeles cuando pecaron
  alternatives_spanish:
  - a los ángeles que pecaron
  - a ángeles pecadores
  lexicon: BDAG
  rationale: La construcción participial aorística expresa una acción puntual pasada. «Cuando pecaron» conserva mejor ese valor eventivo que una simple etiqueta adjetival.
- source_word: ταρταρώσας
  english_pob_choice: cast them into Tartarus
  chosen_spanish: los arrojó al Tártaro
  alternatives_spanish:
  - los echó al Tártaro
  - los arrojó al infierno
  lexicon: BDAG
  rationale: El verbo griego es específico y alude a Tártaro, no al término más general «infierno». Mantener «Tártaro» preserva la precisión del texto y la imaginería de juicio.
- source_word: σειραῖς ζόφου
  english_pob_choice: chains of gloom
  chosen_spanish: cadenas de oscuridad
  alternatives_spanish:
  - cadenas de tinieblas
  - cadenas de densa oscuridad
  lexicon: BDAG
  rationale: «σειραῖς» es claramente «cadenas». Para ζόφος, «oscuridad» es más natural en español; «tinieblas» es posible, pero puede sonar más tradicional. Se mantiene la imaginería sombría sin forzar un giro idiomático extraño.
- source_word: παρέδωκεν
  english_pob_choice: committed them
  chosen_spanish: los entregó
  alternatives_spanish:
  - los confió
  - los puso bajo custodia
  lexicon: BDAG
  rationale: En contexto judicial, παραδίδωμι puede significar entregar a custodia o al control de otro. «Los entregó» es breve y fiel, y funciona bien con lo que sigue.
- source_word: εἰς κρίσιν
  english_pob_choice: for judgment
  chosen_spanish: para juicio
  alternatives_spanish:
  - para ser juzgados
  - para condenación
  lexicon: BDAG
  rationale: κρίσις aquí apunta al juicio venidero. «Para juicio» es directo y conserva la amplitud del término sin restringirlo a «condenación».
- source_word: τηρουμένους
  english_pob_choice: to be kept
  chosen_spanish: para ser guardados
  alternatives_spanish:
  - para ser conservados
  - siendo guardados
  lexicon: BDAG
  rationale: El participio pasivo presente indica custodia continua. «Para ser guardados» refleja bien el estado durativo y el matiz de reserva hasta el juicio.
theological_decisions:
- issue: Mantener la especificidad de ταρταρώσας sin sustituirla por una categoría interpretativa más amplia
  english_pob_reading: cast them into Tartarus
  chosen_spanish_reading: los arrojó al Tártaro
  alternative_spanish_readings:
  - los arrojó al infierno
  - los envió al abismo
  rationale: El griego usa un verbo raro y específico. Traducirlo como «infierno» o «abismo» generalizaría la imagen y podría introducir asociaciones doctrinales que el texto no formula de manera directa. «Tártaro» preserva la tensión y la exactitud lexical.
  doctrine_reference: Translation philosophy §1 (primacía del original), §3 (preservar la tensión teológica)
- issue: Relación entre las cadenas, la oscuridad y el estado de custodia hasta el juicio
  english_pob_reading: committed them to chains of gloom, to be kept for judgment
  chosen_spanish_reading: los entregó a cadenas de oscuridad, para ser guardados para juicio
  alternative_spanish_readings:
  - los entregó en cadenas de oscuridad para ser guardados para juicio
  - los entregó a cadenas de oscuridad siendo guardados para juicio
  rationale: El griego condensa las imágenes de custodia y espera del juicio. La traducción conserva esa compresión sin decidir demasiado si las cadenas son principalmente instrumentales o locativas. «Para ser guardados» refleja bien el participio pasivo y la finalidad.
  doctrine_reference: Translation philosophy §3 (preservar la tensión en vez de resolverla)
- issue: Sentido de κρίσις en el cierre del versículo
  english_pob_reading: for judgment
  chosen_spanish_reading: para juicio
  alternative_spanish_readings:
  - para condenación
  - para el juicio
  rationale: «Juicio» mantiene el alcance semántico amplio de κρίσις. «Condenación» sería más específico de lo que el término exige aquí y podría cerrar indebidamente el sentido.
  doctrine_reference: Translation philosophy §1 y §3
translation_notes:
  revision_awareness: La revisión inglesa reciente ajustó la última cláusula de «being kept for judgment» a «to be kept for judgment» para reflejar mejor la relación participial con la acción de ser entregados. En español se reflejó con «para ser guardados para juicio», manteniendo la misma relación de finalidad/resultados y conservando la imaginería de custodia. También se preservó la elección auditada de «Tartarus/Tártaro» frente a una generalización como «infierno».
  spanish_consistency_notes:
  - Se mantiene «Dios» para θεός conforme al estándar del proyecto.
  - Se conserva «Tártaro» como transliteración doctrinalmente precisa del verbo ταρταρόω, no como «infierno».
  - «Oscuridad» se eligió para ζόφος por naturalidad en español, sin perder el tono sombrío del término.
  - «Para ser guardados» respeta el pasivo presente de τηρουμένους y evita volverlo un simple estado estático.
