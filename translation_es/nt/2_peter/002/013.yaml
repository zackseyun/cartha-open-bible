    reason: textual_variant
  revision_rationale: 'Se corrigen los anclajes de las notas para que coincidan con el audit trail del inglés POB. Además, se mejora la naturalidad y precisión del español: «indulgencia en pleno día» refleja bien τρυφή + ἐν ἡμέρᾳ, y «banquetean con ustedes» evita la sobreexplicación de «comen y beben» y corresponde mejor a συνευωχούμενοι.'
