translation:
  language: es
  text: sufriendo el salario de la injusticia[a], considerando la indulgencia en pleno día como un placer. Son manchas y defectos, regodeándose en sus engaños[b] mientras banquetean con ustedes,
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «la recompensa de la maldad» para «el salario de la injusticia».
    reason: lexical_alternative
  - marker: b
    text: 'Algunos manuscritos leen «ágapes» en lugar de «engaños»: «regodeándose en sus ágapes mientras banquetean con ustedes».'
    reason: textual_variant
lexical_decisions:
- source_word: ἀδικούμενοι
  english_pob_choice: suffering
  chosen_spanish: sufriendo
  alternatives_spanish:
  - siendo perjudicados
  - padeciendo
  lexicon: BDAG
  rationale: El contexto no describe solo que otros los maltratan, sino que están experimentando la retribución ligada al 'salario de injusticia'. 'Sufriendo' conserva la idea de padecer esa consecuencia sin forzar una lectura distinta.
- source_word: μισθὸν ἀδικίας
  english_pob_choice: the wages of unrighteousness
  chosen_spanish: el salario de la injusticia
  alternatives_spanish:
  - el salario de la maldad
  - el pago de la injusticia
  - la recompensa del mal
  lexicon: BDAG
  rationale: '''μισθός'' es ''salario'' o ''pago'', y ''ἀδικία'' puede ser ''injusticia'' o ''maldad''. ''Salario de la injusticia'' mantiene la estructura genitiva y el valor moral del giro, y deja visible la tensión entre injusticia como condición y como conducta.'
- source_word: ἡδονὴν ἡγούμενοι
  english_pob_choice: considering ... a pleasure
  chosen_spanish: considerando ... como un placer
  alternatives_spanish:
  - teniendo por ... un placer
  - pensando que ... es un placer
  lexicon: BDAG
  rationale: '''ἡγέομαι'' con acusativo predicativo significa ''considerar/estimar''. ''Considerando ... como un placer'' expresa bien esa valoración.'
- source_word: τὴν ἐν ἡμέρᾳ τρυφήν
  english_pob_choice: daytime indulgence
  chosen_spanish: el desenfreno diurno
  alternatives_spanish:
  - la lujuria diurna
  - el lujo en pleno día
  - la disipación en el día
  lexicon: BDAG
  rationale: '''τρυφή'' denota lujo indolente, excesos o vida disoluta. ''Desenfreno diurno'' comunica esa idea en español y conserva la vergüenza implícita de hacerlo de día.'
- source_word: σπίλοι καὶ μῶμοι
  english_pob_choice: stains and blemishes
  chosen_spanish: manchas y defectos
  alternatives_spanish:
  - manchas y defectos morales
  - manchas y mancillas
  - máculas y defectos
  lexicon: BDAG
  rationale: Ambos sustantivos describen deshonra o contaminación moral. 'Manchas y defectos' es una pareja natural en español y preserva la imagen de impureza sin endurecerla más allá del texto.
- source_word: ἐντρυφῶντες
  english_pob_choice: reveling
  chosen_spanish: se regodean
  alternatives_spanish:
  - se entregan al deleite
  - se deleitan
  - se abandonan al placer
  lexicon: BDAG
  rationale: El participio sigue la idea de disfrute excesivo y complacencia sensual. 'Regodearse' transmite una complacencia indulgente y moralmente torpe, cercana al tono del pasaje.
- source_word: ἀπάταις αὐτῶν
  english_pob_choice: their deceptions
  chosen_spanish: sus engaños
  alternatives_spanish:
  - sus decepciones
  - sus fraudes
  - sus engañosos artificios
  lexicon: BDAG
  rationale: La lectura base es ἀπάταις, no ἀγάπαις; por eso el sentido principal es 'engaños'. 'Sus engaños' es natural y fiel al contexto de falsos maestros.
- source_word: συνευωχούμενοι ὑμῖν
  english_pob_choice: while feasting with you
  chosen_spanish: mientras comen y beben con ustedes
  alternatives_spanish:
  - mientras banquetean con ustedes
  - mientras comparten mesa con ustedes
  - al festinar con ustedes
  lexicon: BDAG
  rationale: El verbo indica participar juntos en un banquete o comida festiva. 'Comen y beben con ustedes' comunica la convivencia de mesa en español actual sin precisar indebidamente el tipo exacto de comida.
theological_decisions:
- issue: Variante textual ἀπάταις / ἀγάπαις
  english_pob_reading: The main text reads 'their deceptions'; a footnote preserves the alternative 'love feasts'.
  chosen_spanish_reading: sus engaños
  alternative_spanish_readings:
  - sus ágapes
  - sus banquetes de amor
  rationale: Se sigue la lectura del SBLGNT, ἀπάταις, porque encaja con el énfasis inmediato en la corrupción y el engaño de los falsos maestros. La alternativa tradicional 'ágapes' se preserva en nota por su valor textual e interpretativo, sin imponerla como lectura principal.
  doctrine_reference: Translation philosophy §3 (preserve meaningful textual alternatives in footnotes)
- issue: Valor de ἀδικούμενοι como participio de consecuencia
  english_pob_reading: suffering the wages of unrighteousness
  chosen_spanish_reading: sufriendo el salario de la injusticia
  alternative_spanish_readings:
  - siendo tratados injustamente
  - recibiendo el pago de la injusticia
  rationale: La frase no se limita a una injusticia padecida externamente; expresa la consecuencia retributiva que les corresponde. 'Sufriendo' mantiene esa carga de castigo/retribución sin suavizarla.
  doctrine_reference: BDAG semantic force; POB lexical consistency on recompense and moral consequence
translation_notes:
  revision_awareness: El borrador sigue el texto griego SBLGNT y el audito inglés sin cambios sustanciales respecto al pase más reciente; mantiene la variante textual en nota y conserva la fuerza retributiva de ἀδικούμενοι / μισθὸν ἀδικίας en español.
  spanish_consistency_notes:
  - Se conserva 'Yahvé' no pertinente en este versículo, por lo que no aparece.
  - '''Jesús'' / ''Cristo'' no aparecen en el versículo.'
  - Se evita 'SEÑOR' como máscara porque no corresponde aquí.
  - '''ἀπάταις'' se traduce en el texto principal como ''engaños'', con nota para la variante ''ágapes''.'
  - El cierre 'comen y beben con ustedes' busca naturalidad española sin añadir detalles no presentes en el griego.
