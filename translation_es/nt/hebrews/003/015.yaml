    issue: Registro pronominal peninsular en «oís / endurezcáis / vuestros»
    rationale: El proyecto pide español neutral latinoamericano / ampliamente legible en iglesia. La segunda persona plural con «vosotros» no cumple bien ese objetivo; «ustedes oyen ... sus corazones» es más neutral y ampliamente comprensible.
  - severity: low
    issue: Pesadez de «mientras se está diciendo»
    rationale: Aunque reproduce el aspecto progresivo, en español suena menos natural. «Mientras se dice» mantiene el sentido temporal/circunstancial del articular infinitivo sin perder fidelidad relevante.
