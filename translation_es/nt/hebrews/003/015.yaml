review_pass:
  verdict: revise
  source_alignment_summary: 'El borrador refleja bien el sentido del griego: la cláusula temporal/circunstancial de ἐν τῷ λέγεσθαι, la urgencia de «Hoy», la condición «si oyen su voz», la prohibición de endurecer el corazón y la alusión a la rebelión del desierto. También preserva correctamente la nota alternativa para παραπικρασμός. Sin embargo, la forma verbal y pronominal escogida en español no encaja con el estilo meta solicitado.'
  spanish_quality_summary: El texto es comprensible, pero «oís / endurezcáis / vuestros» suena peninsular y menos neutral para un español latinoamericano amplio. Además, «mientras se está diciendo» es gramatical pero algo pesado; «mientras se dice» conserva suficientemente bien el valor temporal del griego con mejor naturalidad en español formal.
  glossary_alignment: No hay conflictos con la terminología doctrinal principal del proyecto. «Rebelión» para παραπικρασμός está bien alineado con la decisión inglesa, con «provocación» en nota. La revisión propuesta ajusta solo registro y naturalidad panhispánica.
  issues:
