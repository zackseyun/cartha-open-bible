revisions:
- from: 'mientras se está diciendo[a]: «Hoy, si oís su voz, no endurezcáis vuestros corazones, como en la rebelión.»'
  to: 'mientras se dice[a]: «Hoy, si oyen su voz, no endurezcan sus corazones, como en la rebelión.»'
  rationale: Se reemplaza el registro de «vosotros» por formas neutrales de amplio uso («oyen / endurezcan / sus») para ajustarse al estilo meta del proyecto. También se aligera «mientras se está diciendo» a «mientras se dice», que sigue transmitiendo adecuadamente la circunstancia temporal de ἐν τῷ λέγεσθαι en español natural y digno. Se conserva la nota sobre «provocación» por fidelidad al rastro de auditoría inglés.
