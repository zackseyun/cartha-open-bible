translation:
  language: es
  text: 'mientras se dice[a]: «Hoy, si oyen su voz, no endurezcan sus corazones, como en la rebelión.»'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «como en la provocación», en eco con la traducción tradicional de la cita del Salmo 95.
    reason: lexical_alternative
lexical_decisions:
- source_word: ἐν τῷ λέγεσθαι
  english_pob_choice: while it is being said
  chosen_spanish: mientras se está diciendo
  alternatives_spanish:
  - mientras se dice
  - cuando se está diciendo
  - mientras se está leyendo
  lexicon: BDAG
  rationale: El infinitivo articular con ἐν expresa circunstancia temporal; el presente pasivo conserva la idea de una declaración en curso. «Mientras se está diciendo» mantiene esa simultaneidad de manera clara en español sin volverlo pesado.
- source_word: Σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Este día
  lexicon: BDAG
  rationale: Adverbio temporal directo. «Hoy» es natural en español y mantiene la urgencia de la cita del Salmo.
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  lexicon: BDAG
  rationale: Introduce la cláusula condicional. «Si» reproduce de forma normal la construcción exhortativa del texto.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  lexicon: BDAG
  rationale: La construcción genitiva es directa; «su voz» es idiomática en español y conserva la referencia personal a Dios en la cita.
- source_word: ἀκούσητε
  english_pob_choice: you hear
  chosen_spanish: oís
  alternatives_spanish:
  - escucháis
  - oyeren
  lexicon: BDAG
  rationale: En este contexto exhortativo y proverbial, el presente de indicativo en español comunica bien la condición. «Oís» es natural y evita una literalidad forzada.
- source_word: Μὴ σκληρύνητε
  english_pob_choice: do not harden
  chosen_spanish: no endurezcáis
  alternatives_spanish:
  - no hagáis duros
  - no dejéis que se endurezcan
  lexicon: BDAG
  rationale: El mandato negativo ecoa el Salmo 95. «Endurezcáis» conserva el sentido verbal establecido; en español el imperativo negativo plural expresa bien la prohibición.
- source_word: τὰς καρδίας ὑμῶν
  english_pob_choice: your hearts
  chosen_spanish: vuestros corazones
  alternatives_spanish:
  - sus corazones
  - vuestras almas
  lexicon: BDAG
  rationale: «Corazones» conserva el sentido bíblico del interior de la persona, no solo de las emociones. Se mantiene el plural posesivo directo para la segunda persona plural.
- source_word: ὡς ἐν τῷ παραπικρασμῷ
  english_pob_choice: as in the rebellion
  chosen_spanish: como en la rebelión
  alternatives_spanish:
  - como en la provocación
  - como en la amargura
  lexicon: BDAG
  rationale: παραπικρασμός alude a la rebelión/provocación de Israel en el desierto. «Rebelión» comunica con mayor claridad la fuerza moral y pactual del pasaje para el lector moderno.
theological_decisions:
- issue: Cómo traducir παραπικρασμός en la cita de Salmo 95
  english_pob_reading: rebellion
  chosen_spanish_reading: rebelión
  alternative_spanish_readings:
  - provocación
  rationale: El término remite a la desobediencia y oposición de Israel en el desierto. «Rebelión» hace explícito el carácter de resistencia contra Dios; «provocación» se conserva como alternativa tradicional, pero es menos transparente en español contemporáneo.
  doctrine_reference: Fidelidad al sentido intertextual de la cita veterotestamentaria y claridad lectora contemporánea.
translation_notes:
  revision_awareness: La redacción sigue de cerca el ajuste final del POB en inglés («while it is being said») y conserva la elección ya revisada para παραπικρασμός como «rebellion», adaptándola al español con «rebelión» sin perder el eco del Salmo 95.
  spanish_consistency_notes:
  - Se conserva «Dios» implícito en «su voz» según el contexto de la cita.
  - Se mantiene un registro bíblico moderno y digno, evitando el calco rígido.
  - «Corazones» se usa en sentido antropológico bíblico, no meramente emocional.
  - La nota al pie conserva la alternativa tradicional sin imponerla en el texto principal.
