translation:
  language: es
  text: como juré en mi ira[a], «No entrarán en mi reposo»
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: 'Griego literalmente: «Si entran en mi reposo», una fórmula de juramento que significa: «Ciertamente no entrarán en mi reposo».'
    reason: lexical_alternative
lexical_decisions:
- source_word: ὡς
  english_pob_choice: as
  chosen_spanish: como
  alternatives_spanish:
  - así como
  - tal como
  lexicon: BDAG
  rationale: Introduce la fórmula de cita de manera natural en español y mantiene el valor comparativo/declarativo del griego sin sobrerreformularlo.
- source_word: ὤμοσα
  english_pob_choice: I swore
  chosen_spanish: juré
  alternatives_spanish:
  - hice juramento
  - prometí con juramento
  lexicon: BDAG
  rationale: El aoristo de ὀμνύω expresa juramento; «juré» es la forma más directa y solemne en español bíblico contemporáneo.
- source_word: ἐν τῇ ὀργῇ μου
  english_pob_choice: in my wrath
  chosen_spanish: en mi ira
  alternatives_spanish:
  - en mi enojo
  - en mi furor
  lexicon: BDAG
  rationale: «Ira» conserva la fuerza judicial y solemne del término y resulta más transparente que un eufemismo más suave.
- source_word: Εἰ εἰσελεύσονται
  english_pob_choice: They shall never enter
  chosen_spanish: No entrarán
  alternatives_spanish:
  - Si entrarán
  - Ciertamente no entrarán
  lexicon: BDAG
  rationale: La construcción es una fórmula de juramento semítica; en español debe explicitarse la negación para no presentar una condición engañosa.
- source_word: εἰς τὴν κατάπαυσίν μου
  english_pob_choice: my rest
  chosen_spanish: mi reposo
  alternatives_spanish:
  - mi descanso
  - mi lugar de reposo
  lexicon: BDAG
  rationale: «Reposo» conserva el motivo teológico de Hebreos y su resonancia con el descanso prometido por Dios, con un registro bíblico claro en español.
theological_decisions:
- issue: Fórmula de juramento con εἰ εἰσελεύσονται
  english_pob_reading: 'Explicit negative oath: ''They shall never enter my rest.'''
  chosen_spanish_reading: 'Negación explícita del juramento: «No entrarán en mi reposo».'
  alternative_spanish_readings:
  - 'Literalmente formal: «Si entrarán en mi reposo»'
  - 'Más explícito: «Ciertamente no entrarán en mi reposo»'
  rationale: La forma literal podría inducir a leer una condición, no un juramento de rechazo. La negación explícita reproduce el sentido reconocido del hebreo/griego sin perder la solemnidad del texto.
  doctrine_reference: Translation philosophy §1, §3, §6
- issue: Renderización de κατάπαυσις en contexto
  english_pob_reading: rest
  chosen_spanish_reading: reposo
  alternative_spanish_readings:
  - descanso
  - resto
  rationale: «Reposo» comunica bien el motivo de Hebreos y evita reducir el concepto a mera pausa física o tranquilidad subjetiva.
  doctrine_reference: Translation philosophy §3, §5
translation_notes:
  revision_awareness: 'Coincide con el pasaje fuente y con el auditor inglés: se mantiene la fuerza juramentaria de la construcción griega y se explicita la negación para evitar una lectura condicional. No se requieren revisiones adicionales.'
  spanish_consistency_notes:
  - Se prefirió «reposo» para κατάπαυσις, en consonancia con el motivo teológico de Hebreos.
  - Se usó «ira» para ὀργή por su tono solemne y judicial.
  - La negación explícita en el texto principal evita trasladar al lector español la ambigüedad de la estructura semítica del original.
