translation:
  language: es
  text: 'Durante cuarenta años[a], por eso me indigné con esta generación, y dije: «Siempre se desvían en su corazón[b], pero ellos no han conocido mis caminos».'
  philosophy: optimal-equivalence
  footnotes:
  - marker: a
    text: O «me enojé con esta generación»; el verbo griego puede expresar fuerte disgusto, incluso repulsión.
    reason: lexical_alternative
  - marker: b
    text: Griego «en su corazón» (singular), probablemente tratando a la generación como un solo colectivo; muchas versiones lo vierten en plural por naturalidad del español.
    reason: lexical_alternative
lexical_decisions:
- source_word: τεσσεράκοντα ἔτη
  english_pob_choice: For forty years
  chosen_spanish: Durante cuarenta años
  alternatives_spanish:
  - Por cuarenta años
  - Cuarenta años
  lexicon: BDAG
  rationale: El acusativo de duración se expresa naturalmente en español con una construcción temporal como 'durante'. Conserva la duración completa sin añadir una lectura causal o narrativa ajena al griego.
- source_word: διὸ
  english_pob_choice: therefore
  chosen_spanish: por eso
  alternatives_spanish:
  - por tanto
  - así que
  - por lo cual
  lexicon: BDAG
  rationale: Marca consecuencia/inferencia. 'Por eso' comunica la relación lógica de manera clara y digna en español, manteniendo la conexión con el contexto previo.
- source_word: προσώχθισα
  english_pob_choice: I was provoked
  chosen_spanish: me disgusté
  alternatives_spanish:
  - me irrité
  - me indignó
  - me enojé
  lexicon: BDAG
  rationale: El verbo expresa fuerte desagrado o repulsión. En español, 'me disgusté' conserva mejor esa fuerza que un simple 'me enojé', aunque deja abierta la tensión afectiva sin convertirla en una sola emoción demasiado específica.
- source_word: τῇ γενεᾷ ταύτῃ
  english_pob_choice: with this generation
  chosen_spanish: con esta generación
  alternatives_spanish:
  - contra esta generación
  - de esta generación
  lexicon: BDAG
  rationale: La dativo con el verbo se vierte de forma idiomática con 'con'. Mantiene el referent concreto y reproduce bien la relación interpersonal del reproche divino.
- source_word: καὶ εἶπον
  english_pob_choice: and said
  chosen_spanish: y dije
  alternatives_spanish:
  - e hice saber
  - y les dije
  lexicon: BDAG
  rationale: La primera persona ya está implícita en el contexto; 'dije' es directo y fiel. No hace falta explicitar el objeto porque el discurso citado sigue inmediatamente.
- source_word: Ἀεὶ
  english_pob_choice: always
  chosen_spanish: siempre
  alternatives_spanish:
  - continuamente
  - perpetuamente
  lexicon: BDAG
  rationale: Adverbio de continuidad habitual; 'siempre' es la opción natural y precisa en español.
- source_word: πλανῶνται
  english_pob_choice: go astray
  chosen_spanish: se desvían
  alternatives_spanish:
  - andan errantes
  - se extravían
  - yerran
  lexicon: BDAG
  rationale: La imagen apunta a desviación moral/espiritual. 'Se desvían' suena natural en español y conserva el matiz de apartarse del camino correcto sin imponer una metáfora más fuerte que el griego.
- source_word: τῇ καρδίᾳ
  english_pob_choice: in their hearts
  chosen_spanish: en su corazón
  alternatives_spanish:
  - en sus corazones
  - en el corazón de ellos
  lexicon: BDAG
  rationale: Se preserva el singular griego para reflejar que la generación es tratada como un solo colectivo. Aunque el audit trail inglés pasó a plural por concordancia, el español puede mantener el singular sin dificultad y con mayor fidelidad al original.
- source_word: αὐτοὶ δὲ
  english_pob_choice: but they
  chosen_spanish: pero ellos
  alternatives_spanish:
  - mas ellos
  - y ellos
  lexicon: BDAG
  rationale: El δέ introduce contraste. 'Pero ellos' conserva la oposición con la cláusula anterior y hace visible la fuerza adversativa.
- source_word: οὐκ ἔγνωσαν
  english_pob_choice: have not known
  chosen_spanish: no han conocido
  alternatives_spanish:
  - no conocieron
  - no llegaron a conocer
  lexicon: BDAG
  rationale: El perfecto español expresa un fracaso que perdura y conecta bien con la cita aplicada en Hebreos. Además, 'conocido' conserva la idea relacional/covenantal, no sólo intelectual.
- source_word: τὰς ὁδούς μου
  english_pob_choice: my ways
  chosen_spanish: mis caminos
  alternatives_spanish:
  - mis sendas
  - mis obras
  lexicon: BDAG
  rationale: Metáfora bíblica estable para el modo de actuar y el curso prescrito por Dios. 'Caminos' es el equivalente más directo y reconocible en español.
theological_decisions:
- issue: Intensidad del verbo προσώχθισα y el afecto divino
  english_pob_reading: Rendered as 'I was provoked' rather than a stronger interpretive gloss such as 'I loathed' or a flatter one such as 'I was angry.'
  chosen_spanish_reading: me disgusté
  alternative_spanish_readings:
  - me enojé
  - me irrité
  - me odié de ellos
  rationale: El texto expresa una respuesta real de rechazo/repulsión ante la incredulidad persistente. 'Me disgusté' preserva esa tensión sin reducirla a simple enojo ni resolverla en una emoción más extrema de lo que el griego exige.
  doctrine_reference: Preservar la tensión teológica en la respuesta divina; no suavizar ni exagerar el juicio afectivo.
- issue: Singular colectivo en τῇ καρδίᾳ
  english_pob_reading: Greek 'in their heart' (singular), likely treating the generation as a collective whole; many English versions render 'in their hearts.'
  chosen_spanish_reading: en su corazón
  alternative_spanish_readings:
  - en sus corazones
  rationale: El singular mantiene la lectura colectiva del griego y evita individualizar indebidamente la frase. En español resulta natural y fiel al tratamiento corporativo de la generación.
  doctrine_reference: Primacía del idioma original sobre la normalización traductora; mantener la imagen corporativa cuando el texto la presenta.
translation_notes:
  revision_awareness: El borrador sigue la lectura más reciente del audit trail inglés en cuanto a la duración temporal y el carácter continuo del fracaso; sin embargo, al traducir al español se recupera el singular de καρδίᾳ porque el original griego lo permite y el español lo admite con naturalidad. También se conserva la fuerza ambivalente de προσώχθισα con una opción que expresa fuerte desagrado sin fijarla excesivamente. La adaptación de οὐκ ἔγνωσαν usa presente perfecto español para reflejar una realidad vigente en el marco de la cita.
  spanish_consistency_notes:
  - Se mantiene 'caminos' para τὰς ὁδούς μου, coherente con el léxico bíblico habitual del proyecto.
  - Se evita 'SEÑOR' para el nombre divino en este versículo; no aparece el Tetragrámaton aquí y la cita mantiene la voz divina en primera persona.
  - Se conserva un registro bíblico sobrio y apto para lectura pública, sin arcaísmos innecesarios.
  - La nota del corazón en singular se alinea con la forma griega aunque difiera del ajuste de concordancia hecho en el audit trail inglés.
