base_translation:
  language: en
  yaml_path: translation/nt/hebrews/003/010.yaml
  text: For forty years[a], therefore, I was provoked with this generation, and said, ‘They always go astray in their hearts[b], but they have not known my ways.’
  footnotes:
  - marker: a
    text: Or 'I was angry with this generation'; the Greek verb can express strong displeasure, even revulsion.
    reason: lexical_alternative
  - marker: b
    text: Greek 'in their heart' (singular), likely treating the generation as a collective whole; many English versions render 'in their hearts.'
    reason: lexical_alternative
