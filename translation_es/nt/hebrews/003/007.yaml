revisions:
- from: 'Por tanto, tal como dice el Espíritu Santo: «Hoy, si oyen su voz»,'
  to: 'Por tanto, tal como dice el Espíritu Santo: «Hoy, si escuchan su voz»,'
  rationale: Se propone una reparación menor para mejorar la fluidez y la recepción litúrgica/eclesial del español. Se mantiene el sentido del original y la atribución directa al Espíritu Santo. Aunque «escuchar» puede ser ligeramente más interpretativo que «oír», en español bíblico actual aquí suena más natural que «si oyen» y comunica adecuadamente la condición de atender a la voz divina.
  reviewer_model: gpt-5.4
