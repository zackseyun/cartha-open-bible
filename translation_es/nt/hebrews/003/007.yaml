  - Se usa 'Espíritu Santo' de forma consistente para τὸ πνεῦμα τὸ ἅγιον.
  - Se mantiene 'Hoy' en mayúscula por introducir la cita, siguiendo la convención del pasaje fuente.
  - No se añadió nota de pie porque el griego y el inglés POB no registran una variante textual o lexical significativa que requiera desdoblamiento en español.
