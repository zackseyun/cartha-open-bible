  text: 'Por tanto, tal como dice el Espíritu Santo: «Hoy, si escuchan su voz»,'
  philosophy: optimal-equivalence
lexical_decisions:
- source_word: Διό
  english_pob_choice: Therefore
  chosen_spanish: Por tanto
  alternatives_spanish:
  - Por ello
  - Así que
  lexicon: BDAG
  rationale: Conserva la relación inferencial con lo anterior y suena natural en español bíblico contemporáneo sin volverse arcaico.
- source_word: καθὼς
  english_pob_choice: just as
  chosen_spanish: tal como
  alternatives_spanish:
  - así como
  - como
  lexicon: BDAG
  rationale: La fórmula de cita/comparación queda bien con 'tal como', que mantiene el matiz de correspondencia y evita una simple subordinación débil.
- source_word: τὸ πνεῦμα τὸ ἅγιον
  english_pob_choice: the Holy Spirit
  chosen_spanish: el Espíritu Santo
  alternatives_spanish:
  - el Espíritu Santo mismo
  lexicon: BDAG
  rationale: Es la equivalencia natural y precisa en español para la designación articular; no se añade énfasis que el griego no exige.
- source_word: Σήμερον
  english_pob_choice: Today
  chosen_spanish: Hoy
  alternatives_spanish:
  - Hoy mismo
  - En este día
  lexicon: BDAG
  rationale: '''Hoy'' reproduce de manera directa el adverbio temporal del texto citado y funciona naturalmente al inicio de la cita.'
- source_word: ἐὰν
  english_pob_choice: if
  chosen_spanish: si
  alternatives_spanish:
  - cuando
  - si acaso
  lexicon: BDAG
  rationale: La condición de la cláusula se expresa con 'si', que es la equivalencia más directa y no introduce matices no presentes en el griego.
- source_word: τῆς φωνῆς αὐτοῦ
  english_pob_choice: his voice
  chosen_spanish: su voz
  alternatives_spanish:
  - la voz de él
  - el sonido de su voz
  lexicon: BDAG
  rationale: '''Su voz'' conserva el sentido relacional y personal de φωνή con ἀκούω sin sobreexplicar como ''sonido''.'
- source_word: ἀκούσητε
  english_pob_choice: you hear
  chosen_spanish: oyen
  alternatives_spanish:
  - escuchen
  - escuchen ustedes
  lexicon: BDAG
  rationale: En el español de cita general, 'oyen' comunica el valor condicional de manera fluida; 'escuchen' podría sonar demasiado exhortativo en este contexto de cita. El sujeto implícito plural se mantiene por el contexto.
theological_decisions:
- issue: Atribución del habla en la cita del Salmo
  english_pob_reading: The quotation is introduced as the speech of the Holy Spirit.
  chosen_spanish_reading: La cita se introduce como كلام/voz directa del Espíritu Santo.
  alternative_spanish_readings:
  - El Espíritu Santo habla por medio de la Escritura/el salmista
  - Dice la Escritura
  rationale: El griego dice explícitamente 'dice el Espíritu Santo'; la traducción conserva esa atribución directa sin rebajarla a una referencia impersonal a la Escritura ni añadir una formulación explicativa que el texto no incluye.
  doctrine_reference: Inspiración bíblica; Hebreos 3:7; Translation philosophy §1, §3
translation_notes:
